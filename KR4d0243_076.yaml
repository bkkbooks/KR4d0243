body:
  text: 宋樓鑰撰題䟦䟦史太師答范參政薦崔宫教帖太師魏郡王聞人一善則志之隨時薦用不遺餘力此其真帖盛大且有後薦賢之福也乾道間丞相魏文莭公守吳門魏惠憲王鎮宣城過郡宫教為教官作樂語有云天上風姿咸仰吾君之子人間官品休論異姓之王丞相極稱之以是知大參范公不茍于薦士太師謂之二難是矣紫微先生舉鑰自代遂出門下宫教之喪紫微哭之甚哀人琴俱亡未㡬亦下世矣紫微兼内外制文擅一時宫教之文人鮮知者故表其警聯可以知鼎味云䟦趙忠定公家書丞相忠定公魁多士登館殿侍經帷帥全蜀知貢舉皆本朝天族之所未有受知孝宗擢登從列又留以遺光宗兩朝眷渥特寘樞府引故實力辭至于五六重以御史之有言又列高宗聖訓以為據而詔㫖弗俞尋知樞宻院事紹熙五年七月甲子既成翊戴之功拜右丞相翰林學士李公巘所草麻制已行三命而僂終遂牢辭改樞宻使至八月二十八日鑰時以西掖直學士院主上猶在北内忽蒙宣押御筆留某以少師觀文殿大學士判建康府趙某宗姓之賢偉然忠實太上體夀皇圗任之意擢貳機衡肆朕繼承厥功為大俾居宰路控避莫回殊咈眷懐尤辜輿望朕惟不膠者卓維時之宜今政令未孚水旱間作得一賢佐度越拘攣萬㡬實繁其遂我相可除右丞相詞臣茍得君上一言敢不具載況承宸翰詳宻如此何敢不以屢書并草兩麻丞相制有云夀皇咨其切直屢敷心腹之言太上察其篤誠徑委股肱之寄擢居宥府宻贊籌帷逮予有興厥功尤大又云亟頒詔綍俾踐台符何循牆之過勤致反汗而中止既辜輿望殊咈眷懐又云矧今政令之未孚復多水旱之間作是圗賢佐以贊繁機越彼拘攣不膠者卓矣置于左右亦職有利哉非為朕私其遂我相蓋具載上語也比嵗不知者以鑰為褒稱太過謹不敢辯雲漢之章至今寳藏然則丞相之進用本末大略可攷矣公之長子太府寺丞以家問示鑰敢詳書之若其戒從子初仕數端真可以為世範云䟦白樂天集目錄香山居士之詩愛之者衆亦有輕之者山谷由貶所寄十小詩如老色日上面歡情日去心今既不如昔後當不如今又輕紗一幅巾短簟六尺床無客日自静有風終夕凉妙絶一時皆香山詩中句也周公恐懼流言日王莾謙恭下士時若使當時身便死一生真偽有誰知今在王文公集中不知亦香山詩也此特其佳句爾其間安時處順造理齊物履憂患嬰疾苦而其詞意愈益平澹曠達有古人所不易到後來不可及者未容悉數琴詩亦多有曰自彈不及聽人彈又曰近來漸喜無人聽琴意髙低心自知皆有自得難言之秘道徳二經世所尊尚讀老子詩云言者不知知者黙此語吾聞于老君若道老君是知者緣何自著五千文其所見超詣如此留侯之在漢無敢訾之者四皓廟詩云子房得沛公自謂相遇遲終雜霸者道徒稱帝者師子房爾則能此非吾所宜立論至此尤為髙勝而可輕之乎余平日佩服其妙處手編目錄寄吳門使君李公諫議併以所聞錄寄之李徳邵璜有白氏年譜尚當訪求以成此書云䟦戴式之詩卷唐人以詩名家者衆近時文人多而詩人少文猶可以發身詩雖甚工反爲屠龍之伎故好之者寡黄巖戴君棟字敏才獨能以詩自適終窮而不悔號東臯叟不肯作舉子業且死一子方在襁褓中語親友曰吾之病病矣而子甚幼詩遂無傳乎爲之太息語不及他與世異好如此子既長名曰復古字式之或告以遺言深切痛之讀書績文而尤篤意于古律雪巢林景思竹隠徐淵子皆丹丘名士既從之游又登三山陸放翁之門而詩益進一日攜大編訪余求一語余于詩雖知好之而不能工老益廢忘無以答其意夫詩能窮人或謂惟窮然後工笠澤稱玉谿生是已笑語之曰子惟能固窮則詩愈髙矣余之言顧何足為軒輊耶䟦汪季路所藏書帖唐僖宗賜憘實敕書唐末敕書讀之使人悽惻時多工于書倉猝中猶爾可觀文安王君世臣䟦語頗詳謂袁氏本得之古墓中疑即憘實之墓又言徧閲唐史及編年通載不著憘實姓氏蓋偏裨也余觀敕書委諭詳宻必非施于偏裨者治平中張唐英次功自號黄松子著外史檮杌十卷載前後蜀事王建永平四年書張琳始末有云大順初憘實為黔南節度辟為推官憘字惟集韻與喜同他未之見鄧校書名世古今姓氏書辯證正引檮杌之説且曰姓書未有此氏今增入乃知姓憘而名實也書後止書十五日尚不書月王君遽以為中和年者以書中言越在巴蜀又有雖元惡未就誅擒凶黨竝皆逃竄及已收宫闕之言蓋僖宗乾符二年乙未黄巢大盗始起至廣平元年庚子遂入長安帝幸興元次年改元中和遂幸蜀三年癸卯李克用以四月平京師巢遁去所謂元惡未誅已收宫闕殆斯時也四年夏巢既誅乙巳嵗三月始還京師改元光啟是在蜀㡬五年若大順乃昭宗之次年庚戌欲以此為昭宗之敕則昭宗雖嘗播越幸石門幸華州幸鳳翔其在鳳翔詔謀幸蜀王建迎駕而不果是為僖宗中和之敕無疑豈中和間憘實已為黔南節度至大順初始辟張琳耶其詳不可得而知僅得二書知其姓名他書未必無之顧淺陋老懶未能詳攷尚有待于博洽之士王君偶未攷檮杌又惜鄧校書之不及見此書也東坡嘯軒詩易晉卦之九四晉如鼫鼠雖近代大儒皆以爲貪而畏人之鼠然詩之碩鼠从頁石聲大也故曰若大鼠也易之鼫鼠從䑕石聲陸徳明釋文音石五技鼠也引本草螻蛄一名鼫䑕始深疑之攷許叔重説文解字註云五技䑕也能飛不能過屋能緣不能窮木能游不能度谷能穴不能掩身能走不能先人是真螻蛄也荀子所謂捂䑕五技而窮楊倞所注乃出于叔重唐本又曰六技䑕也下又有云能歌不能成曲成曲一作度曲余嘗試其五技皆然土中百蟲多能以穴掩身惟此物于淺土穿穴人或取于路窮處必得之署月雨後土中有聲若長哦者俗謂蚯蚓唱歌余既得六技之説嘗于夏夜傾聽久之篝火發土果螻蛄也坡翁詞翰不待贊嘆嘯軒詩云食土蚓無腸亦作終夕叫似亦未知為螻蛄而徇俗耶彌明石鼎聯句云時于蚯蚓竅微作蒼蠅聲亦誤矣付官奴樂毅論余見此刻多矣未有如此之精明者半山集中有江鄰㡬邀觀三館書畫詩或云梅聖俞作有云羲獻墨跡十一卷水玉作軸排疏疏最奇小楷樂毅論永和題尾付官奴豈承平時此論猶有真蹟耶淳化本修禊序余嘗蓄一二褉序近嵗得畢少董所藏豢龍董氏淳化中本最勝少董䟦其後甚詳自言董氏有三百本取其尤者三此又其最佳者後多名士題䟦而田君秀實大篇亦以此為三本中第一故尤寶之與此本無一毫之差而此長半寸許當是裝潢者用刷太重遂引而伸之爾邵康節觀物篇易之傳尚矣至本朝而後有先天後天之説戴九履一左三右七二四為肩六八為足坎以一居北坤以二居西南震以三居東巽以四居東南乾以六居西北兌以七居西艮以八居東北離以九居南故説卦云帝出乎震齊乎巽相見乎離致役乎坤説言乎兑戰乎乾勞乎坎成言乎艮此後天之説文王之易也乾一兑二離三震四巽五坎六艮七坤八乾自南而左巽自西南而右故説卦云天地定位山澤通氣雷風相薄水火不相射蓋乾上而坤下離左而坎右震東北而巽西南兑東南而艮西北二卦各各相對此先天之説伏羲之易也先儒以此二者爲先天後天之辨竊嘗攷之説卦惟帝出乎震之序合于今人之説其餘如所謂雷以動之風以散之雨以潤之日以晅之艮以止之兑以説之乾以君之坤以藏之曰乾健也坤順也震動也㢲入也坎陷也離麗也艮止也兑説也曰乾為馬坤為牛震為龍㢲為雞坎為豕離為雉艮為狗兑為羊曰乾為首坤為腹震為足㢲為股坎為耳離為目艮為手兑為口又乾稱父坤稱母震㢲為長男長女坎離為中艮兑為少又乾為天坤為地震為雷㢲為風坎為水離為火艮為山兑為澤終説卦之篇皆先天之説也顧未詳攷爾先天千載絶學麻衣得之傳于希夷累傳至康節而後盛行然余始在永嘉得先天方圎二圗于薛象先叔似傳皇極經世之書于王木叔柟而不見其全後丞外府蜀士吕澤甫疑之以閬州奏事進經世之説阜陵大喜其書留為太府丞同官為寮始得蜀本全帙因得叩其一二後有觀物篇隔眼大書云出康節親筆今見此巻悚然起敬始知板本失真為多然猶恨不見其全也二圖探索無窮康節之學雖不易窺測要皆不出于此繫辭所謂太極生兩儀兩儀生四象四象生八卦明道先生所謂加一倍法盡在是矣使伏羲文王周公孔子復生不能加損毫末于此不如是何以順性命之理通幽明之徳類萬物之情哉熟復嘆仰以還罄其謏聞書之以俟知者温公奏藁平章軍國重事止預大事十二條見申國春秋所以尊尚元老也近嵗竊平章之名而不加重字豈其力不足以得此哉欲盡總衆職以盗大權爾彼亦不足以知此蓋有教之者嗚呼非文潞公吕正獻豈可當此位耶歐公與劉原甫帖公是先生望隆一時而不容于朝出知揚州歐陽公所為賦平山堂之詞也移知青州公是作董仲舒詩云江都才子又膠西擾擾諸侯等棄之為問公孫丞相道不知東閣欲賓誰後又帥長安久之作班超詩云班超投筆起行間傅鄭甘陳不足攀何事眼昏頭髪白却思生入玉門闗二詩不無少望矣歐公與之至厚西齋蓋平時羣賢聚㑹之地歐氏至今有西齋帖然終不能挽之還朝豈非命耶韓魏王與歐公帖歐公嘗曰絫百歐陽其何敢望他韓公今觀此帖魏王之推尊歐公又如此更相欽服宜乎同心輔政以致慶歴之盛翰墨又其餘事也東坡與秦太虛帖坡公愛淮海如子弟喜黄岡如鄉曲殆前緣耶跋黄子邁所藏山谷乙酉家乗頃嵗見張志溥庇家藏山谷雜記一小巻諦玩不已因略效其筆意手錄之兹見子邁所臨乙酉家乗典刑具存為錄雜記于巻末而歸之嗚呼建中靖國以至崇寧元祐諸公多已南歸而先生乃以承天塔記更斥宜人誰能堪之先生方翛然自適觀所記日用事豈復有遷謫之歎所謂青山白雲江湖之水湛然寜復有不足者家乗止四年八月二十八日而先生卒于季秋之晦相去才月餘耳三山陸待制務觀嘗言先生臨終時暑中得雨伸足簷外沾濕清凉欣然自以為平日未有此快死生之際乃如此世言范寥信中訪先生于宜此書信然跋朱晦菴書中庸乾道末年余客授東嘉貳卿曾公以吏部郎出守嘗侍坐論訓詁音韻數端公皆以為然余因曰此皆學者之細也公正色曰不然中庸所謂博學之審問之慎思之明辨之力行之五者不可闕一兹非所謂博學者乎余為之悚然公乃文清公之次子文清及見元城龜山諸公家學有自來矣中庸之言昭如日星晦菴先生書此以告學者而又曰不可以偏有所緩至哉言乎學者試思之緩其一則必有所蔽而況以力行為可廢乎戒之哉䟦費校書肅被召省劄被召不出與陳簡齋同費校書之不赴特招竊聞之是時人情事力尚可爲恢復計遽以和議自屈忠義之士皆惜此機力既不可以囘因遂肥遯以求其志不知者謂其爲髙而已䟦胡澹菴和學官八詩澹菴先生以一書觸秦氏竄昭州諸賢救之高宗諒其忠再徙爲威武簽幕羣憸承一時風㫖相與擠之而又下石焉乃始逺置新州又復移吉陽蓋秦氏必欲致之死地也先生處之泰然雖遭摧辱略不爲屈益窮經學又以昌其詩紹興更化始得北還孝宗初政擢吏部郎隆興改元鑰就試南省先生以秘書少監為參詳官鑰䇿卷誤犯泰陵舊諱知舉内相洪公方欲為之奏聞先生贊其決遂叨末第蓋優恩也于是始得拜先生下風長身霜鬛神采昭映恭謙磬折音吐洪暢畧不見久居嶺海烟瘴之狀衣冠甚偉如見古人時以短箋投謝坐主或報或不報惟先生報章甚寵以鑰多用諱事遂引釁夏滕文等數十條為言尤切感服寶藏又已載于先生集中今見學省八詩蓋攝祭酒時也前輩固多唱酬未聞大篇而人人報之愈出而愈竒最後樊武諭以其右科魁選再登進士第先生首言舞陽次及魁紀皆樊氏之先一武一文益見其工是時年逾六十思若涌泉筆力愈勁英特之氣至今凜然周益公為隧碑言先生刻意詩騷後生投贄率次韻以酬多至百韻數十篇然則此八詩猶先生之細也鑰頃既登門又辱許從其長子季永游雖恨其蚤沒而仲子季解及季永二子伯圜仲方俱以才業自奮今為湖南憲江西漕樞宻院編修遂踐世官皆相與良厚又在中書嘗預試仲方二子燿煃童子科鑰年七十有四求歸未得于先生之門遂識四世抑以知澹菴之徳澤為未艾也謹併書于卷尾云䟦鄭徳輿歴代蒙求蒙求始于李氏後有作者終不及之蓋自王戎裴楷鳴鶴士龍之類多取其一事而成對如忌鵩畏犧人多知其事而鮮知畏忌二字出于班孟堅幽通賦中蠟屐好財似若不類而事則相闗秉燭不諧尤非切對則以事意相似屢見和韻有句賡者亦有廣編十七史或專用小説及本朝故事左傳西漢或道家之書意亦勤矣終不及李氏之盛行同年鄭君徳輿老不廢書用李氏之體備述歴代由伏羲以至大宋事不求對句以四言童子易于誦習千古大槩如指諸掌徳輿别有著述此特其一爾然比之衆作其殆最優乎其子洽濙鋟板以傳為書其後且將使諸孫誦之䟦黄長睿東觀餘論雲林子妙于攷古是書久行于世余尤所篤好惜其訛舛尚多每欲手寫以傳好事者未暇也著作莊子禮欲得善本傳後再為詳校而寄之王順伯厚之嘗言本朝始自歐陽公集古錄千卷趙徳甫金石錄至二千卷攷訂甚工然猶未免差誤惟雲林之書為盡善順伯蓄古刻最富論議不茍余觀此書辨析隠奥上下千古皆前賢所未發後人所難及修撰劉公燾紫微董公逌皆鴻博之士與之言自以為不及也以雲林之美才又仕于洛多見故家名帖及居館閣盡見太清樓所藏異書時方承平鼎彜古器具見制作款識之舊嘗自言曰攷校往古事迹先須熟讀强記遇事加之精審决無疎略又謂歐公攷校非所長則此書宜無毫髪之恨及細讀之尚有疑焉如米襄陽疑李斯書謂不知何人書雲林則曰乃李陽冰篆明州刺史裴公紀徳碣中字可謂精確矣然謂史籕書揚州􅘌易系能辨其字殊無三代體與其辭皆唐人筆顧不知正以紀徳碣額縮而小之既全取州􅘌三字又移明為易系皆取其半乃碧落碑中唐字陽冰素好碧落碑故用其字雲林誤以為揚殆未之攷也王大令静息帖礜石事異苑謂曹公同王粲見此而雲林謂劉表在荆州時未知何據題河南王氏所藏子敬帖云太極璇題猶重書自注云謂不書太極殿榜然選詩所謂璇題納行月者乃謂以玉飾椽頭如孟子之言榱題非題扁之題也王世將表云頓乏勿勿雲林引顔氏家訓云世中書翰多稱勿勿又引杜牧之詩浮生長勿勿謂古人詩中用之不特稱于書翰顔之推在牧之數十百年之前似難以此詩為證跋右軍甘蔗帖云䉀似竹于文從焉此帖以之俗從草非是按説文解字蔗从草在草部不得為非是以是益知攷古著書之不易云雲林夀止四十而精博如此余年七十有四聞見寡陋心顧好之不自知其可笑也鍾王以來多以意行筆雲林耽玩古帖與之俱化如隱之為隠最之為㝡之類尚衆此既為小學而作亦畧為正其㸃畫不敢自謂詳盡更俟博雅君子相與正之䟦揚州伯父耕織圖周家以農事開國生民之尊祖思文之配天后稷以來世守其業公劉之厚于民太王之于疆于理以致文武成康之盛周公無逸之書切切然欲君子知稼穡之艱難至七月之陳王業則又首言授衣與夫無衣無褐何以卒嵗條桑載績又兼女工而言之是知農桑為天下之本孟子備陳王道之始由于黎民不飢不寒而百畝之田牆下之桑言之至于再三而天子三推皇后親蠶遂為萬世法高宗皇帝身濟大業紹開中興出入兵間勤勞百爲櫛風沐雨備知民瘼尤以百姓之心爲心未遑他務下重農之詔躬耕耤之勤伯父時爲臨安於潛令篤意民事慨念農夫蠶婦之作苦究訪始末爲耕織二圖耕自浸種以至入倉凡二十一事織自浴蠶以至剪帛凡二十四事事爲之圖繫以五言詩一章章八句農桑之務曲盡情狀雖四方習俗間有不同其大略不外于此見者固已韙之未㡬朝廷遣使循行郡邑以課最聞尋又有近臣之薦賜對之日遂以進呈即蒙玉音嘉奬宣示後宫書姓名屛間初除行在審計司後歴廣閩舶使漕湖北湖南淮東攝長沙帥維揚麾節十有餘載所至多著聲績實基于此晚而退閒斥俸餘以為義莊宗黨被賜者近五紀則其居官時惠利之及民者多矣孫洪深等慮其久而湮沒欲以詩刋諸石鑰為之書丹庶以傳永久云嗚呼士大夫飽食煖衣猶有不知耕織者而況萬乗主乎累朝仁厚撫民最深恐亦未必盡知幽隠此圖此詩誠為有補于世夫霑體塗足農之勞至矣而粟不飽其腹蠶繅織絍女之勞至矣而衣不蔽其身使盡如二圖之詳勞非敢憚又必無兵革力役以奪其時無汙吏暴胥以肆其毒人事既盡而天時不可必旱潦螟螣既有以害吾之農夫桑遭雨而葉不可食蠶有變而壊于垂成此實斯民之困苦上之人尤不可以不知此又圗之所不能述也伯父諱从玉从夀字夀玉一字國器官至朝議大夫䟦先大父嵩嶽圖嵩高維嶽峻極于天巍然居四岳之中蓋天下之絶境也大父為登封宰家間舊有嵩山圖丹青故暗揚州伯父設于雲岫堂屏間而書大父二十四峰詩于左右鑰幼時猶及誦之先是建炎中四明遭兵燬最酷諸父僅得生全故廬焚蕩一物不遺亦不知嘗刻之石也嘉定三年鑰叨居政地鄉人張致逺翼仕京西一日得書謂北客有以雜碑至榷場貿易忽見嵩山圖碑下有序文及詩知其為大父遺蹟逺以見寄如獲拱璧真我家舊物也惜其嵗久細字欲漫乃敬書之移于樂石于是鑰年七十有四矣不能更作注字使第三子治書之碑不載嵗月知縣伯父生于元符二年小名曰嵩家藏詩序書元符庚辰大父又于少室山逹磨面壁處作菴其上后山先生陳無已為記今在集中云建中靖國元年則辛巳嵗也曇潛書潛即參寥子以二者攷之在縣首尾凡三年大父字試可參寥集中多有唱和如登嵩山絶頂等詩大父遺文顧無傳焉三十六峰賦亦不知何在故此碑尤當寶之嗚呼大父薨于宣和五年甲辰後十四年是為紹興七年丁巳而鑰始生既不獲逮事而登封舊治尚渝于胡塵中北望慨然何能自已大父登元豐八年乙科文氣政術過人逺甚讀此碑者可以想見大概受知祐陵官至徽猷閣直學士嘗守鄉郡再任涉五載其詳見于神道碑銘中後諸父累贈至少師鑰始追贈太師齊國公云攻媿集卷七十六
