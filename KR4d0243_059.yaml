body:
  text: 宋樓鑰撰記慈溪縣興修水利記慈溪本以東漢孝子董君得名溪今在大江之南江之發源自越至上亭而分一貫邑中一環邑前已復合焉縣之西北有水出羣山間迤而東來未至縣五里所抵彭山而入于江瀕江舊有閘啟閉以時遇霖潦則泄之瀦其餘以備旱暵西鄉實受其利又通下流以入縣水勢朝拱映帶左右合于隂陽家言亦猶它山之于郡城也昔人創邑之初爲長溝于井市横三縱四其間二者如帶之垂爲梁于上而通舟于下堰其南而立斗門于東呼吸江水脉絡通貫按其圖大槩如古澮洫之制嵗久閘廢水無所蓄旱則仰潮汐乍盈易涸民勞滋甚縣河淺淤菰蒲叢生居民因侵其旁藝木築室日就湮微雨集則湓溢沉墊已則汚穢停滀氣壅不宣多起癘疫豈惟不足以供濯溉之須年來縣一再火延燔數百家環拱而莫之救病又甚焉邑無丞水利之職簿實司之蓋有欲爲而不能遂者㑹今郡侯岳公方提舉常平事按行郡邑首詢利病縣人合辭有請迺下其事使亟圖之主簿趙君推跡本原慨然欲復其舊告諭父老訓率子弟莫不勸趨几田于西者畝出錢三百首建閘于彭山先爲長隄以捍江潮撤故閘餘址悉以石爲之長十有一尋廣四尋中闕丈有二尺扃以層版經始于淳熙十三年之春秋七月訖事費錢百六十萬爲工五千重築四埭以障支流西鄉之利既興遂修斗門復捐金錢爲之倡二者皆堅緻精密比舊基有加焉十月初吉又爲濬河之役趙君譬曉明白上下交孚于是家自爲役不待程督愁霖之餘開霽踰月若有相之者盡撤壅蔽始見故道攘剔浚治工不告勞河廣一丈五尺深七尺中間廣二丈六尺深如之引西流而灌之淥波汪灣舟楫通濟又可以溉邑下之田易去横彴増重河梁百年舊觀一旦復還如人之身氣血滯鬱疢疹隨生醫巧藥良導之流通則舉體和暢精神自倍耋穉雜然相賀且曰自今以往吾邑其庶幾乎趙君佳公子也種學績文以儒科自奮天資闓敏吏事極不苟二役之興皆成于同僚協謀不掣其肘更選里士之才而公者以司㑹計不使吏預其間故財不蠧民不擾一箠不施而利興害除可傳永久咸請記之余觀古循吏剖訟解紛功止一時惟水利之興則可以惠民于無窮熙豐間非不務此然而擾民之害先見則奉行者之過也善乎蘇潁濱之論曰事起無漸人不素講未知水利之所在而先遣使者興事至此蓋已甚勞皆切中當時之病恭惟皇上求民之瘼如恐弗及一以此事委之州縣而命部使者督課之是惟無作作則實利及民賞不失勞所在底績由今之法良有司奉行惟謹而佐邑之賢又有如趙君之整辦遲以年嵗所濟多矣後來者尚有以増緝之哉趙君名汝積字商卿漢恭憲王之裔熙陵八世孫也荆門軍義勇甲仗庫記文武無二道有其事則必有其備古之義也荆門王使君銖之爲郡也思不忝于先烈竭力從事有聞于時始至問民疾苦皆以財殫民貧姦豪得志逋逃爲孽人不奠居爲言君曰是當有以次第爲之汲䝉泉以釀酒而利入日倍墾荆榛以爲田而曠野以闢括隱户以増官賦務農功以勸本業崇飾學校旌賞孝悌嚴釋奠之禮勸奬士子以興文風以續先參政之墜緒鋤治豪强修飭火政明賞信令以制逋卒盜賊之尤無良者遠斥堠教義勇又能鑿頑石甓通塗増置郵傳以便往來謹邊鎖絶支徑申嚴法禁以謹泉貨才智有餘而精力足以行之諸司咸以最聞可以少休矣一卒以狂酲殺三人捕得立誅之以聞上尤嘉歎以爲無罪可待威名流聞姦宄屏跡載念郡當荆楚之郊倚義勇以爲重在尺籍者四千人顧視所用器甲之屬名數雖具在而積久不用位置無法率委于郡治廊廡滯壓朽腐兵氣不揚君既親行都試以作其勇且曰兵不犀利與空手同甲不堅宻與袒裸同是非置之高爽之地民居多茅茨萬一延燔則又將埃滅而無餘矣乃度基于郡之西北虛曠幾百餘丈繚以周牆阻以深溝計工與材以聞于朝有旨下總司幹金糓以濟其須淳熙十五年八月庀役不閱月告成爲屋若干楹廳事居中置樓于門兩廡翼如也使君爲政抑可謂知所先後文事武備無有不及者足以爲保障矣荆門多古跡義勇之士服習教法持利兵以賈勇望當陽之長阪其亦有慕張益德之横矛拒敵者乎幕府翰墨之士登斯樓也挾清漳之通浦倚曲阻之長洲其亦有爲仲宣之賦者乎使君其進之泰州重築捍海堰記東南隄防莫盛于淮東捍海之堰堰在泰州海陵縣北一百五十里起唐大歴中黜陟使李承自楚之鹽城南入揚州綿亘通泰之境不惟蔽遮民田亭竈附依尤利鹽事至天聖初范文正公又宏大之徙堰少西以避海濤之衝發運使張綸轉運使令狐儀實主張是亘一百四十三里有奇甓其外以爲固置兵五百人分列五寨專典繕修崇觀之後始充他役乃無一人守者宣和隄決壞田三百餘頃紹興七年又壞隄幾半越二年始修成已不如天聖之堅密厥後提舉朱冠卿知州事徐子寅張子正魏欽緒皆因壞増修子寅又請鹽場官分視捍堰各守其境淳熙十三年提舉趙鞏相海所衝曰六澤浦甓而新之壯于舊三倍且柵其外十三里更創夾隄六里于桑子河其餘増卑培薄悉還舊觀慶元二年二邑之民又以病告謂晏溪河東有土月堰下臨海洋了無塗泥爲之固䕶地形就下紹興以來四經移築民田之墊于海者十五里衝損海陵堰身六里餘如臯亦壞十餘處近益損甚提舉王公寧覽之惻然亟命知海陵縣陳之綱相視利害請移入二里重増九尺基厚二丈九尺面減五尺又遣捍堰巡檢劉正志量度㑹計創立基址計三十四里一百九十四步用工二十八萬公按圖察之謂西接范公大堰若不及今移築則堰内之田當爲斥鹵且將浸淫旁及横流四出爲害益大亟以奏聞且言水政臣職也敢憚攺作所費雖重撙節財用銖積寸累願就茲役不敢以煩朝廷仍及仲春農事未興之時亟圖之正月甲子剡上凡再旬而得請遂以某月某日庀役至某月某日崇成既訖事再招海清兵士百人分置五寨興窰燒磚以爲後日繕修之備仍檄之綱偕幹辦公事趙不熄董其役公亦躬爲一行凡用若干工費錢米若干民大感悅而王公不自以爲功也告成于朝遷一秩以寵之太守沈公坦走書于鑰曰捍海大堰雖跨數州而泰之利害猶重今日所修則全在下二邑賴賢使者一力爲之民既不知役凡我同僚亦皆䝉成而無預請記之鑰因爲之攷圖經舊記而得其實則作而言之曰美哉斯役也范文正興千載之大利苟非後之賢者相與扶持之亦安保其不壊自茲朝廷之上皆如今天子之垂意爲部使者爲郡將皆如王公之用心雖至于無窮可也鑰與王公嘗同朝稔知其文章政事之絶人試郡永嘉實繼沈公詹事之後泰州其子也治辦有餘尤爲王公所知樂其有成欲以傳于永久鑰長子淳方以一尉出二公之門故不復辭而屬筆焉餘姚縣海隄記餘姚爲紹興壯縣岸大海者八鄉分東西二部綿地一百四十餘里舊有長隄蔽遮民田孝義龍泉雲柯三鄉沙漲土高無風潮衝決之患開元東山蘭風梅川上林五鄉間有闕壞實爲民憂其東自雲柯而北至于上林爲二萬八千尺慶歴七年縣令謝景初爲之王文公記之今自上林以及蘭風四萬二千餘尺慶元二年冬知縣施君宿所築其中有石隄四所計五千七百尺者又其所創建也邑人求記于余謝之曰令尹之功力固倍于前人然前有文公之記何敢爲第二碑請不已則又曰文公之文不可及姑以記今日之實則可爾余外祖汪公少師宣和中嘗爲是邑修燭溪之湖建承宣之亭其後伯父從兄皆嘗爲之婦家王氏自尚書而下四世寓邑中熟知海隄之爲害而近歲猶甚大率歲起夫六千夫役二十日計工一十二萬費緡錢萬有五千夫力或不均弊孔百出故勞費如許民力不堪曽不足以支一歲而又往往蕩去矣施君始至問民疾苦咸以此爲大病親往視之詢究利害乃得要領選鄉豪之首公强幹爲人所信服者十五人分地而共圖之尉曹趙君伯感協力佽助必欲集衆力以捍怒濤謀久計以蘇民瘼承平時提刑羅公適知縣秘書丞牛君嘗以石爲之今既百年舊迹遠在海塗中則民田之侵多矣先因修築搜取塗中舊石創築二千七百尺用工二十萬三百六十以蔽東部之田惟西部三塘以紹熙五年秋潮爲菑故隄蕩盡爲害甚酷乃于謝家塘王家塘和尚塘三處度爲石隄通計三千尺尤當海水突怒之衝鄉民趙明釋子行球董其役約費甚重邑不足以供列于府于監司提舉常平劉公誠之深主其說首助糓三百斛益勉爲之凡所陳請率應如響通守王君介幹辦公事王君柄左右尤力令得恃以展布隄高一丈石厚一尺爲一層用石至三萬尺縣出緡錢四千三百有奇邑之士夫與其鄉人助三百萬工力尤重費猶未足也兹事既成則並海之田始盡可以無虞矣前者惟知修築弗思守䕶之䇿隨補隨壊迄無寧嵗況隄壊有漸特人事有所未盡爾冬而起夫春始興役因仍粗畢姑以辦聞日隳月損無肯出力蟻穴尤能潰隄況秋至潮起其壊必甚亟科近隄民夫爲之救捺農事方殷青黄未接安有財力以爲久計今則四邑官分季臨視廟山三山兩寨官月遣十兵巡其上鄉豪又伺察之隄苟有闕即以聞于邑隨即補治其視蕩然而後爲之者豈不相萬萬哉令猶以爲未也謂不有以爲千百載之圖終恐不足以繼而前功寖隳矣于是又議建一莊約爲田二千畝始得上林海沙田二百三十餘畝又得東山汝仇湖外之地六百八十三畝龍泉有桐木廢湖素不蓄水得七百四十五畝三者凡爲田一千六百六十八畝皆出官司之相視不妨公不害民收地之遺力俱有水源以爲灌溉募民耕墾假以資糧菑畬新地皆成阡陌得禾稼實利以助費又將益求曠土且以其收而嵗增之以足二千畝之數築倉于縣酒務之西專儲粟以備修隄之用嵗省重費民遂息肩浮土爲千金之隄斥鹵化膏腴之地傳之將來利顧不博哉劉公又備邑人所請奏之九重白之廟堂及當路諸公乞以此莊之田依常平法不許他用仍禁官民户之請庶可經久聖天子加惠田里諸公相與維持其說亟下俞音曽不淹時令率吏民祗拜明命刻之堅珉以詔後人今之宰劇邑者簿書期㑹日不暇給水利等事遇有急闕趣了目前其至誠愛民有不可解于心而才智足以行之如施君者幾何人施君湖之長興人實司諫之子司諫用不盡其才齎志而殁君能世其家下車以來百廢具興飾以儒雅整辦有餘銖積寸累以圖此舉中間易地之行咸恐敗于垂成及其來歸爲之愈力百年之害一日盡除去嵗他邑告歉而此獨豐海田幾于倍入明效大驗今已如此宜乎邑人歌舞之天下之事害不極則利不興若有數然民困已甚令以深長之思而興民庸部使者之賢建白甚明聖朝勤恤民隱遂躋登兹非止人力也後之人守其成規隨力補治雖至于無窮可也因作爲詩章命邑人歌之俾勿壤歌曰舜江之爲邑兮居越之東八鄉瀕海兮水浴日而吞空古有長堤兮庸蔽遮乎一同人力有限兮海濤之來無窮濤來如山兮日相撞舂一有闕壊兮葦不可障而泥不可封民將爲魚兮良田墊于馮夷之宫嵗月勞費兮民告于鞠凶萬五千之緡錢兮十二萬之民工惟令之賢而才兮有尉曹之和衷築土纍石兮折彼波臣之衝矗如長城兮繚如萬丈之晴虹部使者主盟于上兮飛章徹于九重仰明聖之恫矜兮朝奏而暮惟人欲之從墾田倍于千畝兮藏其收于廩中禁豪民之侵漁兮雖巧取而弗容化斥鹵兮土膏隆隆變歉歲兮爲年之豐良耜畟畟兮多稼芃芃穫之積之兮將櫛比而墉崇歌以訊之兮樂石是礱赤子相告兮永無忘令君之功惟後人之勉勉兮用心以公視此隄之闕兮謹爲之彌縫念經始之囏難兮尚圖功于厥終象山縣渡船記象山爲邑海巿三垂漢志鄞有越天門山輿地廣記謂即今之東門山也唐神龍二年屬台州廣德二年始屬于明元和郡縣圖志亦言本漢鄞縣地神龍元年監察御史崔皎奏于寧海縣東界海曲中象山東麓彭姥村置縣惟西南有陸路接台州寧海二說㣲有不同而郡縣志加詳焉志實李吉甫在相位所上吉甫嘗爲明州長史宜得其真今西北至慶元府水陸一百六十里中有一渡之險若由寧海陸行則囘逺倍之故多以渡爲便渡實支海南曰陳山去邑十五里北曰東宿皆潮退而行中途少憩海口俟潮登而後善逹舊以小舟往來多有風濤盜刼之虞隆興二年今資政殿大學士趙公彦逾主邑簿始創二大舟颿檣篙櫓器用畢備募習于操舟者月給之分置二渡以便行者晏然如在枕席之上所濟不知其幾邑人至今歌之鑰嘗侍公坐問何以能辦公曰句稽之職安得有力及此偶郡委以征商事舊例商賈以錢輸官以十之二爲導行費既首蠲其半以惠之餘分給胥輩因置缿筩而諭之曰前日公用有例今一切不取爾曹得百金則以一錢寘其中僅二年餘所積已多矣因首以修朝宗碶又助邑之敕書樓與邑庠遂以爲此二舟皆躬自督課費省而工倍人樂爲用故能辦耳鑰爲之三歎試吏之初孰能用心及此今日勲在社稷豈苟然哉公去既久寖以隳廢而一舟先壞間有修治往往因陋就簡不可支久撤舊増新併爲一舟行旅不堪濡滯而私渡出焉未免復有覆溺者慶元四年六月承直郎韓君元禮爲宰訪問疾苦耆老首以是告謀欲遵趙公之法而興起之鳩工度材即以八月先造一舟其長七丈廣二尋十一月既成又以次年之冬葺治舊舟去朽易堅色色鼎新幾于改作至今年二月畢工修廣之度視前少殺之若什器細大篙師名額悉循古規又月委官僚以次提督用防姦弊功就而民不知邑士請紀其事鑰以謂趙公濟川之功未易遽及今令尹忠憲裔孫雍容辦治維此一舉仰有以繼趙公之成績俯有以爲一方永久之利趙公名遂身退卜築城中親見其成喜形于色尤爲一段奇事夫子産以與濟人于溱洧孟子以爲惠而不知爲政今前後邑官之賢蓋能知爲政者惠及斯民如此後來者苟能垂意而不忽二舟之利其有既乎陳山有驛以爲賓客行人弛擔之地將刻石驛中以詔後人慨然爲直書之以補吾里地志之闕云攻媿集卷五十九
