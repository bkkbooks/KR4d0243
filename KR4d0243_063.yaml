body:
  text: 宋樓鑰撰啓代賀魏王判明州啓代先公工部以下十五首恭審顯冊中頒價藩易鎮任隆分陜久推大國之王宗茂强周咸仰吾君之子傳聞四遠歡喜一詞恭惟某官慶席璿源輝分寶緒天球不瑑中全溫粹之資金鑑洞開外廣精明之照為善深知于最樂退朝有若于無憑節旄兼兩鎮之雄劍佩領諸侯之貴啓封安化旋賜履于大名出殿宛陵復分麾于東甬靜練方賡于佳句昔襦已沸于歡謡遵海而南振元戎之號令自江而左分皇上之顧憂先聲所臨疲俗胥慶未聽教條之施設已蠲閭里之歎愁不知官髙卑聳藩維而增鞏弗違顔咫尺來休聞于無窮某連蹇孤生衰頽末路為郎粉省屢陳過輦之忠假守蓮城尋竊乘軺之遣偶緣瓜李之避苟安桑梓之居方茲需制幕之期敢意忝戚藩之屬二天在望分甘此日之杜門廣厦俱歡尚幾它時之曳履代賀史丞相浩啓恭審顯膺帝制榮正台衡總宥密之大權兼文武之重寄華夷震疊朝廷尊嚴恭惟某官有王佐才負宰相器開天闢地際千載之亨嘉旋乾轉坤贊一人之號令聲動四海禮絶百僚豈惟崛起徒步以至公侯所謂優游都城以取卿相自星郎在列已依前位之星及月寺為卿又近重輪之月惟舊學甘盤而帝心久矣簡在故爰立傅說而士論猶以為遲進既攀于龍鱗歸得承于鶴髮老萊子以綵衣為戲豈若衮衣之榮太夫人乘輕軒而遊寧及魚軒之貴增二府之門第破四明之天荒由古以來于斯為盛然而位望益重身名俱榮上有相須致太平之心又有髙拱操成功之意京洛願王化之復搢紳冀公道之行三軍五兵之問既至于廟堂一日萬幾之務又賴于帷幄蓋春秋責賢為甚備而丞相得君為最深當此秉鈞之時宜適投機之㑹繼伊周之事業用堯舜其軍民自然拯中原故境之人追尚父中書之考某老于州縣辱在泥塗惟能守分以固窮尤拙乘時而射利劉尹知己雖自知而弗如荀令進人將不進而無已仰銜恩施親見盛時聽白麻于九重深喜綴鵷行之後磨蒼崖之千丈㑹當觀鴻烈之成代賀葉丞相顒啓恭審渙號大廷晉班左揆外領機庭之重兼提史筆之嚴宗廟晏安華夷震疊竊以宣王興周道允資元老之壯猶盤庚告商民必任舊人而共政蓋功名滿人視聽故用舍為國安危況寢兵措刑方極帝王之盛將擢士拔卒以為將相之儲矧惟宗工嘗參揆路遠姬公于王室何以使四方之迓衡置裴度于巖廊自足使兩河之聽命亟登上宰庸副具瞻恭惟某官正色立朝精忠許國自任天下之重深結人主之知持論弗阿笑首鼠兩端之陋居官不苟掃狡兔三穴之姦士夫敬之如神朝野倚以為重擢從禁路處以政途獨持文武之權實行宰相之事主張公道興起治功夫何讒箭之深至徹凝旒之側方當名實之綜核肯容邪正之混淆初未辨是非幾類市中之虎及大明黜陟卒麾瓜上之蠅亟頒賜環入對前席暫登樞府之寄式寵衮衣之歸金甌久覆于姓名玉鉉正須于調燮召詞臣于紫禁都人知拜相之榮宣大廷之白麻公議賀得賢之盛九州四海萬口一辭上方注意于太平公亦同心而輔政臣作股肱耳目拜有虞戒禹之辭爾為麴糵鹽梅膺髙宗命說之訓當聖賢相逢之㑹信社稷無疆之休益展經綸以臻康乂某依仁最久荷德罙深一聞成命之頒百倍輿情之喜兔葵燕麥固匪春風之上游馬渤牛溲願為藥籠之餘物代賀蔣丞相芾啓敬趨宸陛俯聽制麻恭審爰立巨賢進居端揆朝廷肅靜宗社泰和某竊以人主必觀其所用之才宰相必視其所養之氣惟胸中之素有不可及則天下之事皆不足為蓋嘗論古之人求氣之說雖霍光之不學與周勃之少文惟其器質之渾全致此功名之翕赫使廣之以絶人之識加之以濟世之才則其視三代之臣可無愧千載之上久聞是語今見斯人恭惟某官為國元臣受天異稟德行冠四科之首真成顔閔之流文章承三變之餘迥出王楊之右家聲甲于江左譽望髙乎斗南議論依至公澄之不清撓之不濁進退有餘裕來非可招去非可麾蚤結眷知遍儀華要凡一時清切之選以數嵗周旋其間矯矯蛟龍雖已得于雲雨喬喬松柏曾不改于嵗寒極論思獻納之工見輔贊彌縫之妙果膺大用以副具瞻當聖君居九五正位之尊以太平惟二三大臣之責然而治體未定國勢未振雖甲兵之問不至于廟堂而愁嘆之聲尚多于田里當途之士蓋曰欲之而不能命世之才獨恨求之而不得比適宰司之虛席獨因遜牘以矢辭姚崇之說明皇是陳十事千秋之寤孝武端為一言凜然有王佐之風卓爾當天子之意九重動色豈欲當饋以歎蕭曹四海得人大似選衆而舉臯尹志存經濟身佩安危必欲士夫息奔競之風上下無苟且之意富國强兵于嵗月之頃移風易俗于禮樂之中迓衡之期拭目以俟某一介何取半生無聞竊郎宿之虛名將遂及瓜之代仰台星之騰曜實深賀厦之誠庶幾么麼之蹤預在生成之列代賀浙東安撫蔣丞相啓恭審詔出中宸將復鈞衡之舊權分巨屏姑煩衮繡之行郵語四馳歡聲一律恭惟某官氣全剛大學造精微倡諸儒以六經之文允謂天民之先覺舉明主于三代之盛亶為聖世之宗臣于埀紳搢笏之間負旋乾轉坤之任維持國是振舉朝綱治已嚮于迓衡悲遽纒于陟屺上方待公以共政士以奪服而為榮雖眷寵之優隆念祈陳之哀到五使銜詔莫回終制之誠三年執喪必待變衰而起惟開元之際共髙于張說而嘉祐之時獨見于韓公三人相望千載同仰甫及祥琴之御亟分帥閫之雄冷然御風姑少留于蓬島舉而見日曾不遠于長安福及京師心在王室髙牙大纛往分東顧之憂黃閣白麻行正左虛之位某退慚頑礦素出陶鎔逮茲一障之乘又託十連之屬治大府而受約束恨無鳧舄之飛如厦屋之為帡幪自喜燕巢之穩代賀范舍人成大啓伏審宸庭疏寵詞掖升華竊惟中禁之班莫重西垣之選彌綸世務論思居諌諍之先榮辱一言懲勸出賞刑之表動關國體榮冠朝行名儒既登善類相賀恭惟某官學耽八索才本六經分東方諸侯之符俄促歸于鳯闕秉南宫舍人之筆遂進立于螭坳比求膚使之行無出明公之右戎酋相顧不知李揆之肯來士論私憂或言韓愈之可惜抗穹廬而不撓全故璧以復歸天顔為開國勢增重徑上紫微之直快吟紅藥之階雖儒者最以掌制誥為榮而人言猶有典屬國之嘆眷之方渥進用未央變汙俗而制典謨正賴文章之潤色游都城而取卿相㑹攄經濟之規模某託契頗深受知尤厚靜守賢侯之範喜聞內史之除大厦穹崇竊自同于燕雀飛黃騰踏願少顧于蟾蜍代通婺州王給事曮啓瀫水開藩誤䝉知己瑣闈批敕屢幸趨風逮承山郡之流復竊寶鄰之庇夤緣有自欣抃實深恭惟某官道學淵源文章典麗家藏鄭公甘棠之笏架插鄴侯牙籖之書掣碧海之鯨魚笑翡翠蘭苕之戲運天池之鵬翼隘鷽鳩榆枋之飛蚤登瀛洲徑躋禁路肩險夷之一節際亨嘉于千齡忠若子文仕無喜已無愠情如徐邈昔非介今非通録舊學之多聞冠近班之異渥藥階苔砌方欣星掖之重游鱸鱠蓴羮又歎風舟之引去欲前半夜之席暫分千里之麾陳義甚髙急流勇退清風八詠嶽牧姑用夫詞人泰階六符廊廟正資于王佐某被恩有素圖報未遑偶緣瓜代之先期已造蓮城而視篆小侯方事夫大國短札爰具于遙懷魯之擊柝聞于鄒敢謂相依于唇齒楚之餘波及于晉尚期曲賜于帡幪燕寢優閒暑風清閏願精調于茵鼎佇入秉于鈞衡代謝户部侍郎舉升陟啓下走無能謬忝花城之二當途過聽誤形衮字之褒一經品而便佳三下拜而受命寵踰望表愧溢情涯竊以選舉之公今昔攸重近觀所為主人固不易知惟一心湛然妙絶冰壺之清徹雖萬物紛至難逃風鑒之毫釐見誠過于百聞辟或由于三語使不言則子幾失矣觀其眸則人焉廋哉未有斷然于稠人之中舉之于千里之外自非俊彥曷稱褒揚如某者術與世疏能如命薄生而多難天與數竒斗筲之才亦何足算儋石之祿秖益可憐半生從事于下僚再轉為丞于百里躬親丹墨日困秕糠蔑有哦松而自娛行矣及瓜而受代著身卑冗絶望品題敢期一紙之春風忽到窮山之寒谷退不知據得之若驚茲蓋伏遇某官髙識絶人大量容物繡衣金節屢宣江上之風月寺星曹更近長安之日進司民部簡在帝心深欲以人而事君尤喜屈身而薦士伯樂回顧自宜十倍之增匠石揮斤猥及百圍之散涸鮒已䝉于升斗羣蚊難負于丘山某敢不益守官針深緘薦墨小人懷惠藏在寸心國士報恩見之他日代賀林左史機啓恭審拜命中宸書言左陛故國非謂喬木賴有世臣我家再得青氊是為舊物望髙位著喜動搢紳恭惟某官德度粹夷道源淵奧掃千軍于筆陳敢當我哉快獨步于詞林無出右者結綬丹墀之上橫經朱邸之深重暉重輪早依光于日月從龍從虎終感㑹于風雲起分千里之憂已著九重之眷爰膺嚴召入覲清光髙宗學甘盤尚記宅河之舊孝文見賈誼果膺前席之褒欲親咫尺之威顔仍典起居之記注珥螭坳之筆豈惟富貴之逼人秉鳯閣之鈞㑹見功名之報國某披雲未遂仰斗徒勤屬分山郡之銅符阻奉侯門之珠履聞置郵之傳命慶朝廷之得人夏屋渠渠方託帡幪之庇䕃夢魂栩栩恨無羽翼之飛翻代賀汪舍人啓恭審光膺宸綍進拜詞垣搢紳欽稽古之榮制誥見代言之體正人登用善類依歸恭惟某官識際天人道隆今昔淵源奧學倡諸儒以六經之文挺特髙風立懦夫于百世之下秉赤心而自許針丹扆以結知堂堂堅許國之忠蹇蹇有愛君之節密居螭陛非堯舜之道不敢陳進批龍鱗雖賁育之勇不能過伏蒲論事名重日邉埋輪擊姦風生江水亟被賜環之寵載歸珥筆之聫承親擢于中宸陟清班于西掖階翻紅藥謝公徒詫于風流日對紫薇白傳漫矜于清貴茲惟盛德髙視古人首正官聫用明舊制大開公道以塞幸門聖君深納其忠嘉多士想聞于風采究觀今日謀謨之懿可見異時經濟之功號令一新固已追踪于姚姒規橅素定便將接武于臯䕫某假守何堪依仁有幸大厦成而燕雀賀知無風雨之虞靈丹化而雞犬升自有雲霄之望代謝除提舉福建市舶啓分侯麾于古括始終䝉全護之私總商舶于溫陵委曲荷生成之賜竊以番禺置使傳自有唐閩嶠庀司起于元祐金山珠海磊砢乎萬寶之藏輦賮航琛奔走乎百蠻之廣樓船舉帆而過肆賈胡交舶以候風豈惟貿易而求質劑之平抑將綏懷而致聲教之被是為遴選必藉通才如某者少也多艱壯而漫仕馳驅四紀備嘗州縣之勞黽勉一心尤謹簡書之畏抱虛郎省濫吹朝紳念尸祿之無功以治民而自詭試以一郡逮于二年布宣詔書不知萬里君門之遠施行義役庶幾三代井田之遺幸年穀之順成致閭閻之安靜益勤撫字以免譴訶聞尚書之履聲理應退聽掃舍人之門外自恨無階敢謂大鈞弗遺下體未作乞憐之態已叨拜命之榮仕而為貧瓜戍既欣于非久思不出位樗材或得以苟容自為之謀豈過于此茲蓋恭遇某官清朝碩輔名世真儒雷厲風飛君臣相遇于千載天開地闢日月可冀于中興顧在上引類自其本心而為官擇人尤為急務至如下走雖曰無以逾人察其平生必知老而戒得俾司互市實出殊私某敢不俯激懦衷愈全晚境慕隱之之節飲貪泉不易其心效孔戣之清罷貨燕無名之費倘逃瘝曠以報使令代通交代李知丞浚啓對松而哦自笑聾丞之老及瓜而代又迎二令之賢顧今日之交承真一時之㑹遇心未降于既見齒已幸于相依恭惟某官性稟中和家傳清白一行作吏功名小試于著鞭三載陟明才術已聞于游刃宣勤勞于蓮幕通姓字于金閨方嘉運之鼎來宣亨衢之闊步仕擇人而人不擇仕姑為金瀨之游丞負豫而豫不負丞應起藍田之嘆學美崔生之博清推景倩之真去則行遲誰非戀父母之國聞何來暮其如興民吏之謡豫想登仙茲為假道涉筆惟謹居然視雁騖之行黔突未幾行矣簉鴛鴻之列某半生從宦再轉為丞徒甘州縣之勞反出簿尉之下笑如櫟之無用愧若糠之在前雖舊尹之政必告新然老者之智不如少材不足塞既久負于曠瘝玷或可磨當益勞于礱錯代通蘇通判師德啓恭審疏恩玉陛二政金陵居百里而負丞仰二天而托庇時方㑹遇喜倍倫夷恭惟某官學殖深醇材猷敏邵泉如初湧共推大手之才山或可移難變至誠之節名家最久治世益新明良相㑹于半千閥閲當今之第一綸綍藹玉堂之譽鼎彛書鳯閣之勳惟别乘之多才信髙門之有子眷言建業今號陪京羅綺一城富六朝之風物絃歌千里綿百世之衣冠山川分龍虎之形甲胄冠貔貅之勇憂寬西顧任重維藩尤資賢治中以佐明太守疇茲異數屬我真賢已騰來暮之謡更聽不空之頌始展驥足姑憑泥軾之榮真有鳯毛行拾青氈之舊某材如樗散性若棗昏猥承弓冶之餘謬綴簪紳之列半生從宦徒甘州縣之勞再轉為丞反出簿尉之下及瓜將代幸逭前愆杭葦欲歸深虞後患既托帡幪之下諒寬鞭䇿之求雙舄願飛恨乏仙鳧之便戎幕知穩果無巢燕之危瞻霄漢之仞牆寓腹心于尺牘方盛德之在木惟衛生之有經祈為宗祊精調茵匙代賀鄧運使啓伏審榮拜帝綸寵持使節恭惟歡慶竊以自江而左最為財貨之源由古以還夙號膏腴之地菽粟有如水火山川不啻金湯十國為連盡承風乎外府三軍分駐皆仰食于太倉矧轉輸于千里之勞而儲蓄必九年之富欲責成于列職必也使乎肆圖任于舊人無如公者疇茲大任屬我真儒恭惟某官望重吏師行為世則志澄清而默斷用砉騞以無留元非百里之才多多益辦小試一同之地綽綽有餘雖儒者當任于謀謨然利器必更于盤錯狗盜鼠竊曾何置于齒牙蟻聚蜂屯固不勞于才刀姦鋒逆挫薦牘交馳謂割雞焉用乎牛刀處别駕始展其驥足銅章墨綬聊自樂于弦歌泥軾星屏俄平分于風月任居刺史之半人仰治中之賢邦國不空繄實王祥之賴老弱從借乃許寇恂之留由萬家而治十萬家自千石而升二千石吏民乃服其教化草木亦知其威名即地按臨方剖東州之竹拂衣歸去空餘南國之棠惟守正以不阿乃既踣而復振伯道載米而之吳郡已為良守于中興次公受詔而歸潁川終云治行之長者欲立賞以勸百辟豈私惠而庇一方賜爵關內侯有昔王之盛典增秩部使者見今日之殊恩邦人騰挽不留之歌江國興來何暮之歎星隨駿馹風靡列城曽未布于教條已想聞于畏愛木牛流馬非以居材金節繡衣于焉借重諒未容于暖席行即膺于賜環某孱瑣無堪衰遲有素半生從宦敢辭奔走之勞再轉為丞猶懼曠瘝之誚久欲執鞭而從轡未遑持帚以掃門念小吏之人疆際巨賢之持斧駕駑䇿蹇詎敢自安含垢匿瑕不無所賴雙舄無據曾莫效于鳧趨大厦既成徒自深于燕賀代賀徐提刑正旦啓行夏之時爰重建寅之統采周之舊式謹次王之書惟道與時而偕行宜福如川之方至恭惟某官爽邦哲匠名世大才荷宸扆之眷知儼使臺之威重明刑以弼教懋哉期于無刑聽訟吾猶人必也使之無訟比期年而報政與十國以為春茂對三朝倍膺百倍某職卑而穴道阻且長賓履躡珠遙慕簉庭之禮夀觴浮柏莫陪進酒之儀攻愧集卷六十三
