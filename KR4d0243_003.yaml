  text: 攻愧集卷三
  hash: sha256:3ce666185440acd78606db32d38622f4d9df84d20f1112f31f32b02c054bc328
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_003-1a}
body:
  text: 宋樓鑰撰古體詩送制帥林和叔歸使君一何淸鶴骨天與瘦少年場屋聲六藝飽芳潄一行起作吏所立已不苟立朝凜大節論事幾及霤發言必體國平正無矯揉藜藿為不採風采照宇宙出入有本末眼見凡三就來不為苟合薦召乃結綬去亦不好髙三宿徐出晝天官豈不貴陳義堅素守贛川嘗報政復來守鄞鄮不求赫赫名實出龔黃右情偽千萬端到眼輒空透撫民過嬰兒閭里息爭鬬姦胥及強吏時用霹靂手人誦南山判情通理亦究六邑俱帖靜稱贊不容口律身至嚴冷無能掣吾肘吏事精且勤呼燭侵夜漏公退入家孰諸孫後來秀吏卒不識面雒誦出窗牖幾年南塘路來往困僵仆一朝平似掌行歌紛老幼公心信如水古井波不皺榮觀處超然軒冕亦何有翩翩欲賦歸排雲屢騰奏廟論終不許斯民方借寇上心重閔勞祠官向廬阜闔境極攀戀人人懷杜母君看臥轍人誰能使奔走挽須不得留百拜願公壽老我幸同朝傾蓋已如舊聯事東西省交情久益厚我歸公亦來門戶託雲覆黃堂間參語惟我甥與舅揚旌鳴鼓吹賁此蓬蓽陋清談不及私翁歸況不受義命孰不知踐履或差謬惟公見善明力行真耐久有時相與言心同蘭茝臭摻袪寧忍别追送列觴豆公雖不好飲勉為引醇酎公去我亦隱菽水翻綵袖花溪渺何許望望幾雙堠千里共月明懷人重搔首惟應折梅花臨風為三嗅賦揚州伯父海檜潛虬拔地徑夭矯騰拏勢出靑雲表為誰猶向此中蟠坐閲春秋昏復曉團團圓蓋月輪平矗矗蒼叢衆星小枯槎當面結生香外有霜皮細勻繞乃知造化有神巧散作樛枝窮樹杪雖非直幹棟梁材怪怪奇奇樂幽窈獨秀海山臨浩漾駭浪翻空雲縹渺茁芽自有甘露滋弄影幾經霜月皎崢嶸老氣本天然後生矯揉何時了我家揚州真好事買歸但覺千金少夜半有力欲負之護持和璧終歸趙從來寫照無髣佛畫師欲快毫端掃解衣盤礴意慘淡卷起生綃色徒悄我來青邊立寒峭自憐氣與秋天杳倚笻一笑賓亦歡開尊相與傾淸醥謂當好此如好賢為君三復緇衣篇時時來前看不足終待結屋平湖邊跋綦北海扈從書事詩晉陽固自有髙共奉天豈可無宣公當時扶日滄海東尚想健筆驅長風指揮諸將如奴童中興內相當推功斷碑毋庸詫詩工制藁具在鑾坡中送萬耕道帥瓊管黎山千仞摩蒼穹顓顓獨在大海中自從漢武置兩郡黎人始與南州通歷歷更革不勝計唐設五管如容雍皇朝聲教久漸被事體全有中華風生黎中居不可近熟黎百洞蟠疆封或從徐聞向南望一粟不見波吞空靈神至禱如響答征帆飽挂輕飛鴻曉行不計幾多里彼岸往往夕陽春琉球大食更天表舶交海上俱朝宗勢須至此少休息乘風徑集番禺東不然舶政不可為兩地雖遠休戚同古今事變無定論難信捐之與揚雄四州隅分各置守瓊臺帥閫尤尊崇髙牙大纛擁方伯鼓吹振響驚蛟龍漢家威名兩伏波盧丁以來幾宗工衛公精爽尚如生妙語況有玉局翁使君吏事素髙了明若古鏡摩青銅叱馭行行不作難平生惟仗信與忠布宣王靈萬里外益使向化來蠻賨頑獷未率宜以漸勿示駭政先含容平平之策用定遠下下之考書陽公吏臣生長固安土尚當摩撫如童蒙屬僚宦遊豈得已士多失職悲途窮名分尊卑不可紊更念何處不相逢官事既了兩無間可使和氣俱沖融鄉閭惜别情所鍾臨岐為傾琥珀濃手遮西日念遠去欲留奈何鼓逢逢願君穩度三合溜早歸入侍明光宮寄題髙汝一少卿識山堂廬山之髙誰不識欲識其真了難得往來山中最親切嶺為橫看峯是側曾從彭蠡望山外識得山南昧山北山體如一本不動人苦求之愈多惑君搆一堂據湓城香爐五老皆嘉賓莫問前後與向背面目還君多識真君今與山如故人慎毋忽作白頭新堂中燕坐靜且壽君其于此知吾心侍仲舅同諸表遊山來遊大梅山陟山知幾重平行十仞岡俯瞰他山峯一步一步髙勢欲凌虛空左顧九地底樓臺鳴鼓鐘蓬萊反在下直恐船引風又疑海水竭洞見馮夷宮行行愈就順故步尋苔封十年舊主人相對如夢中清談虛閣上坐到夕陽春年來頗畏影掣身慕冥鴻入山非不深猶有行人蹤安得更深處尚友荷衣翁未問梅子熟寧能噉青松庶幾適吾心餘生得從容大梅山此山名大梅驅車入山麓試問山中人山名竟誰屬禪家開道埸為説梅子熟仙家指為巖曾此隱梅福或云古有梅其大蔽山谷至今二梅梁靈響皆其族他山抗驚湍禹祠橫殿屋三者尚誰憑禪師有遺族餘皆不可辨安得究圖録但愛山又山喬林間修竹金峨漱石亭溪聲真是廣長舌歷劫談空聲不絶不知來自何處山一意傾東忘萬折我欲漱石向水濱無奈齒牙搖落頻夜半寒聲到客枕只疑身是枕流人寄題台州倅廳雲壑圖頃年登臨赤城裏江繞城中萬家市治中寄我雲壑圖快讀新詩眼如洗回思嵗月如星流念念飛空尋舊遊披圖哦詩想幽致直欲攜笻上山頭聞有於莬在岑蔚晚徑寒鴉敢翔集幾年榛棘蔽鼪鼯一朝絶境從中出細路雖非五逹康縈回自覺阻且長萬壑風煙開絶頂一丘曲折于中藏老砂射日銀星炯梅峽含風襟袖冷千巖髙下各異狀如障如鋒亦如領天景須慿意匠營山不在髙仙則名規橅已定力未暇他時會有滕王亭風濤隔闊天垂幕安得扣門親剝啄吟詩夢到故山川睡美不知鐘鼓傳王原慶新遷居南堂以古風求寫恕齋二大字并石刻次韻三槐諸孫有竒士才髙特未遇時爾作詩猶能備衆體短章大篇仍雜擬解紛便掉三寸舌隨陸蘇張何足比雕鶚猶未離風塵蛟螭尚爾蟠泥滓平生曳裾向侯門豪傑聞風親瞻企只今交遊亦凋落凜凜一身嗟獨峙槐隂滿庭渺何在久寓瀛壖成故里瀕湖小樓太孤露何殊玉川洛城裏邇來深入作郊居髙屋好山成二美未能拔劒斬樓蘭幾欲袖椎摧晉鄙便將拂袖武陵溪誰能著腳長安市西門性急佩柔韋柳子氣髙戕曲几衡宇全似歸柴桑茅茨大勝居儋耳我詩非工字尤拙荷子愛忘剛見喜夜來縱筆寫恕齋自笑黔驢技止此更求古刻訪少作頗記醉中曾諾唯舊書紛沓費搜尋魚鑰未開塵事起呼童卷送三數軸僅可障風同故紙新詩鼎來亟豫和顛字敢追張長史不須更投苦海中一笑以還隨棄毁徑須攜酒登南堂朗詠白駒三四章又次韻投老歸稱前進士時與田夫相汝爾淵明賦歸何敢望曼容自免差可擬門前爵羅真可設老圃灌畦聊自比恕齋空洞最相親笑談頗覺淸無滓時時過我共銜杯望望不來豫為企丈夫未遇困泥塗誰識鸞停兼鵠峙方期從容結詩社相與浮沈向閭里一朝别我欲遠遊欲入桃源深洞裏為言半隱欲偕行二子風流真儷美向來早有四方志行盡東南到邊鄙只今名利遂兩忘爭心無復于朝市秖有哦詩興未闌連得新詩照塵几調髙韻險不易和白雪陽春驚俚耳年登六十鬢未斑乘興一行若可喜宗盟莫逆素相忘並轡笑談無彼此湖海豪氣儘收斂以恕名齋幾一唯匆匆摻袪不得留巵酒未乾人欲起寄聲半隱不容言空有語離書滿紙歸時賡和必盈箱寫盡山川詩作史送子才歸深閉門莫問是非并譽毁但期遠歸亦升堂西湖仍訪老知章周伯範棊會以足疾不赴走筆寄坐客里閭講棊社大要率且真豈惟簡苛禮正欲聚首頻向來賞花約深恐負此春春來顧多事殆如參與辰今朝怡怡堂坐上凡幾賓默計病或故約略三數人益知會合難舉酒勿問巡棊枰誰勝負淸新想歌脣僵臥一榻上執熱難屈伸斐然申前盟余將踵後塵史淸翁次前韻覓酒以金川玉友一枕瓶西安酒一斗送之次韻社中日相從此意豈不真其初定要約深期往來頻今年苦多故孤負四郊春清和到新秋其間足良辰而我獨抱疴未能會嘉賓近又得玉友風味尤可人思與君痛飲欲招復逡巡忽焉得新酒亟遣徑入脣别有酒一斗併使君意伸我雖不敢嘗為洗胸中塵陳天成用東坡趙淸獻髙齋詩韻賦適齋次韻二公晚辭軒冕勞兩齋莫辨適與髙嘗登雲山仰淸獻平地著屋山周遭白頭日過適齋下釣遊尚想隨兒曹方從家舅與俱隱野鶴誰能鳴九臯加我數年未納祿解去簮紱甘同袍世間此事要識破差處不可容一毫穎川尉仙賦長句數寸之管煩君操欲追險韻繼坡老詞鋒犀鋭真吹毛舅家見詩勉續貂長松相倚慙青蒿我今無復望祿仕不應招我更由敖送元衛弟赴長亭鹽場阿連生而秀二親所甚愛仲兄勤撫養遇事輒加誨幹蠱靜而辦胸次無卑隘今焉職牢盆官宇臨渤澥毋謂官為小要使所居大毋言才可了檢身到纎芥我家門戶重衣冠綿數代當以誠心求子視勿自懈亭民亦良民孰謂俱無賴官吏既擾之兼并責逋債熬波亦良苦樂嵗色猶菜輸鹽不得錢何以禁私賣所在積蠧久良法寖多壞吾聞不無術更當審利害熟視不為謀空餐愧難蓋不應行一切遽使絶稱貸富者能寡取倍息久仍在貧者庶少寬公私可緩帶母年登九十家居幸康泰其家不從政禮經有深戒幸子去不遠時時可歸拜小别不足惜輕舟送前邁送從子沆宰鄖鄉小阮幼鍾愛長乃遭百罹風木既深痛棣華更纒悲所賴有吾子獨立守家規上有門戶託傍有孤與嫠忽為麏國行泝江秋為期冬潦與夏漲漢水足險巇摻袪送子去風帆不可羈城中楮為幣邑下尤可知定知公事少不必事作為用智正惡鑿大道本自夷家無壯子弟宗族各天涯幸有知己人方且把一麾四海皆兄弟官寮善待之眠食謹調攝家務須自持俸薄用宜嗇無使實漏巵此别動深念毋忘故鄉思一書抵萬金時寄賓鴻歸送髙仲逺赴滁倅髙氏在四明于今為淸門二卿道素髙夫人德尤尊子弟盡恂恂夫君更春溫昔年奉慈親定省嚴晨昏今日當門戶友愛深弟昆伉儷信緣合端良由性根門中有孤嫠極意均撫存與我親兒女次第了嫁婚不可解于心肯自以為恩不言而躬行後生熟見聞諸郎已秀發穎異有佳孫鄉評共歸重內外無間言公勤官業廣所至治不煩仙舟何遽西行行佐侯藩環滁皆好山風月當平分醉翁與樂全遺迹今尚存況有賢使君易鎮方北轅公餘陪嘯詠相映如瑤琨生來仕平進自此朱兩轓從兄今鼎貴鼇禁兼掖垣君其繼英躅復收舊靑氈老我得投間頻年接淸歡同社摻君袪戀戀傾離樽梅風吹溽暑祝君尚加餐秋雨兀坐王原慶攜孫吉甫菊花倡和見過有分遺之意次韻五載杜門居海角無復翻階賦紅藥自憐荒徑菊猶存夕餐空待秋英落眼明喜見緑叢叢始也抽芽今滿握扶笻著意養孤芳荆棘旁連細開斫天香入骨徐吐芬中有秋風非外鑠傳聞南堂有佳種願過屠門思大嚼頗亦有意欲見之此意未容兒輩覺乃知便許移芳根不止園官供小摘要令壽客來駢肩何用潭水求延年有時採之東籬邉不覺南山在眼前淵明千載幸同調老我此際方悠然西風吹花日夜急散金坐看開田田兩詩先到衡門下思向平臺尋戲馬從君九日去行樂莫為登髙淚盈把送王粹中教授入蜀王粹中教授赴新蜀帥尚書黃公之招萬里有行古調一篇贈别因誦所聞以求益雜然陳敘不暇較工拙也萬山四塞圍平陸大為關中次為蜀我生東南未曽到蜀士遊從聞頗熟自從襄陽上峻途髙欲登天下臨谷女媧大山塞空虛麻線名堆千萬曲行人一升鹿頭關下瞰平川如畫幅幅員二百四十里里出萬緡民日蹙向來陜西五路兵退守諸關疆地促計臣權宜重增賦民力尚寬隨所欲爾來因仍七十年鬼不輸錢無雨粟民生哀哉不堪命外若富饒中不足益梓尚有繁盛風夔峽窮民幾比屋側耕危穫供稅租飯多稊稗無嘉穀朝廷謀帥弄印久宣諭尚書剖符竹尚書當今第一流翁壻相望冰映玉貽書挽君為此行古人義槩非流俗君亦慨然挈家去摻祛未免再三祝君行豈為溫飽計一舉髙飛快鴻鵠丈夫生有四方志登覽山川非碌碌頃為假吏到燕山未行先取山經讀所至訪尋多得力中原至今在吾目北征西征昔有賦何肯從行空逐逐子西嘗因過峴山遐想羊公欲相沃關右放賈眼拔鏃表留卒使癰潰肉試推此意向前去到處前人有遺躅五丁開山果何在贊皇籌邉言可覆劒門石角皆北向雪嶺界天望身毒髙皇將臺在漢中武候八陳留魚復棧閣繩橋世稱嶮威茂渡笮來夷族李冰離􅕞如底柱大寧鹽泉若飛瀑四路尤多未見書買歸何止三萬軸黃松次功蜀檮杌石湖居士吳船録君宜豫考經行地卻隨所見書之牘幕中便可資籌䇿遠業因兹增藴蓄又聞渡瀘不在瀘南在沈黎卭崍九折是君家世尤當知藝祖按圖揮玉斧大渡河外等棄之本朝獨無南詔患一語決定無敢違成都郡庠千白袍後來之秀日益竒周公禮殿巋然在畫像盤古繼宓犧春秋奠謁用舊樂想見節奏并威儀談經酌史各専門學問可以相發揮康節遺書有傳者不惜師問窮精微先天僅得十二三聲音律呂無由窺更有異聞多細事試因餘暇質所疑青城大面訪仙迹普賢多變窮峨嵋街名棊盤路九逵江號濯錦如汙池古柏參天二千尺水滸鼎立三石犀藥有珂貝説尤詭字書不見栮與榿金堂鸚鵡掃孤塔蒼溪橘柚五出椑嘉陵梵像為最巨閬州城南天下稀少陵入蜀往來久須行萬里方知詩我慙寡聞言又拙君其更為加詢咨老我無復為世用但當杜門待君歸歸期未知果何時時寄尺楮寬吾思山行歸來喜栽新竹平生好看竹每見覺相與小大或疏密一一皆媚嫵恨無地可種所至造竹所近方闢門徑得地尋丈許乞鄰栽百箇參差正當戶天公有老眼惠以三日雨山行不厭泥但喜竹無苦歸來報平安翠葉多楚楚不妨來子猷奚必希蔣詡何當繞扶疏嵗寒與君侣小溪道中晚出城西門循牆過南境夏橋日沈輝旅店月成影納納川路遙聒聒水聲冷攲枕擁衾禱樂此寒夜永醉題魚屏五千買得見屏風白魚相逐菰蒲中俊尾潑剌有生意旁人未易分雌雄屏後諸孫更雍容濈濈無數迷西東我雖非魚知魚樂樂處未必魚知儂范牛人問吾何愛一牛范仙真筆倍風流繩牽雖未如自放猶勝更著金籠頭白醉陶內翰淸異録首載開元時髙太素隱商山起六逍遙館各製一銘其三曰冬日初出銘曰折膠墮指夢想炙背金鑼騰空映簷白醉余愛其言取以名閣陳進道惠示大篇次韻處世難獨醒時作映簷醉年少足裘馬安知老夫味天梳與日帽且免供酒事謫居幸三適得此更慚愧向來六逍遙特書見淸異君家老希夷相求諒同氣曲身成直身朝寒俄失記醉中知其天不飲乃同意書生暫竒溫難與純綿麗贈范緯文秀才括蒼范牛自題云中興道士范子珉異人也淳熙間武昌羅端良使君遠寄詩篇有贈畫牛范秀才一詩愛玩不能去手時時誦之以寫云亡之悲今十八年矣有范緯文叩門初談風鑒旋及墨戲事自言視子珉為大父行羅使君贈詩即其人也既試其説草數語畀之中興道士以牛鳴淡墨百果尤著聲妙入神品仍有靈我不識之欽其名曽得烏犍兩橫軸又有石榴才一幅武昌使君舊寄詩末言秀才乃其族忽有緯文來款門自言真是當家孫口誦羅詩若翻水他詩歷歷俱能言一見前畫歎真迹願得生綃奮吾筆為作來禽對石榴一掃橫枝生意出我詩不工人已陳有詩豈復能動人為君一寫使君語更求知己如羅君送陳表道宰南豐與君出西郊送子之南盱子為名父子才器真璠璵乃翁老從臣循吏追兩都益公工擬人謂比王仲舒積善必餘慶于公大門閭子能傳家學何止讀父書執喪真有聞孺慕久不渝彈琴不成聲西上何徐徐文場嘗得雋一跌重歎吁通籍金閨中夷庚因少迂邑中有三曽聲名照堪輿士夫秀而文比屋多為儒萬里此發軔胸中有全模將别更求言老馬從問途乃翁同汪出親誼崇終初以規不以頌不自知其愚民社非細事況此壯大區不飲第一䇿精神長有餘以此奉塵剎以此當萬殊何官不可為禍福皆在吾劇邑最為難謹畏可無虞試看悔吝者實惟豫之辜民力久已困未免索稅租欲如古什一攻瑟難吹竽古意行今法自應知樂輸有弊勿遽革有姦勿亟鋤責已重以周檢束到錙銖兩腳踏實地處事隨精粗頑不在斯民猾不在吏胥苟以明恕行久之定交孚為善無近名實著名與俱飲啄信前定富貴不容圖三年報政成明時其舍諸老我世無用情親肯自疏盡此一杯酒惘然摻子袪相依忽成别加餐意何如陳天成詩多和東坡韻兹因寄喜雨詩走筆謝之一春垂垂困多雨雖曰如膏反成苦自知潦後必成旱果見晴天雨黃土連旬不雨已嘆嗟滌滌山川雲不吐未聞鵓鳩鳴屋角但有蚊蠅爭振羽一梅無望望重梅旱魃為妖無術禦間居憂國徯雲霓夜夜三星正當戶君王側身歎涼德雲漢之詩無愧古避殿減膳率以躬已債縱囚真有補使君精禱盡誠意千里歸心稱杜母四郊神物招螉蜒所在疲氓加手撫風伯在今誠可訟已聞石燕空中舞時時小雨慰人心渴瓦流膏僅兒乳傳言望日當通濟老巫已得靈神語霈然三日果應期靡神不舉誰為主河流頓已復舊痕良苖喜見興南畝中宵愁念不成夢摩挲便腹眠淸午從今一飽便可望坻京行見曽孫庾陳候忽就舂容篇徑遣長須入城府歎君健筆今已老不草敕書招贊普坡翁相去已百年時出新詩追步武六月十六夜觀月翼早紀所見成長謡海雲湧立雙鐵山明月正在山中間初疑渼陂藍田出水面又似長風吹度玉門關須臾雲過月愈上太虛點綴從飛翻白衣蒼狗不足究千變萬態俱可觀忽焉橫臥如蒼龍驪珠頷下光團圓山河淸影見歷歷桂枝扶疏若可攀夜深醉到雞鳴起光景不類居塵寰長庚曄然朝曦發望舒猶挂西林端我欲呼吸晶華駐朱顔左有金丹右玉丹昔聞兩曜在天如磨蟻日行日止一度慳太隂行速朔必會金餅旋復成弓彎八卦萬物盡關繫歷古不已真跳丸急景惝恍難控摶但見霞彩生斕斑老我已復卦氣闌學道無成空自歎不如安坐委天順一聽運化更循環它山堰它山吾鄉絶境也屢遊而不及賦近過其上得前四句而歸季夏鬱蒸午寂無事因足成篇寫罷長哦遐想勝地寖覺風生兩腋汙垢俱淸比之陵陽冷語尤為逃暑上䇿也它山堰頭足竒觀百萬雷霆聲不斷誰把并州快剪刀平剪波瀾成兩段四明山深水源遠衆壑會溪長漫汗滔天狂潦不少留瀉入長江勢奔竄賢哉唐家王長官欲圖永利輸長算想得慘淡經營時下上山川應飽看西偏千嶺相屬聯惟有茲山擁東岸遂于此地築橫埭截取衆流心自斷斟酌利害不全取髙下參差僅強半水大十分七入江徐挹三分供溉灌支流瀰瀰穿郡城脈絡貫通平且緩旱時反此水亦足坐使千年忘旱暵無窮廟祀報元功像設森嚴人敢玩梅梁夭矯有冥助大患于今尚能捍前輩所作多神靈日月真成赤心貫後人小智或更易費盡工夫隨破散河堙盍浚謀不集堤斷河傾流湛悍富民縮手人受殃仰望古人重興歎老木號風波甚碧畫屏俯仰丹青煥更須積雨看驚湍濡足褰裳何足憚去家不遠時一遊短艇垂綸流可亂八月倘有仙槎來便欲乘之泝天漢林復之求為僧陳君舉為寫山谷與俞淸老詩而和之次韻歸墨氣何鋭為儒意何闌勸沮皆不可要惟心所安何必收澄觀強欲加巾冠余看飲光衣以次傳阿難送秦仲防制幹秦郎相家子被服一寒士不味膏梁珍嗜書如嗜芰仕途樂平進欲上行或止制使護瀛壖婉畫幕中試不避癡兒譏但欲了官事君賢他可及好善無與比公餘仍進學訪問無巨細片言苟有聞必欲窮根柢一介有可觀窮閻必躬履老我甘投間衡門人所棄惟君異時好時來訪生死淡交久而敬淸談或移晷一朝語余别摻袪不容已向來二三公頗亦同臭味去去羣欲空今君又行矣欲歸投金瀨尚眷甬東水結交多老蒼要路有知己青氈我家舊勉旃取上第先聽傳除書使我喜不寐别後未相忘母愛書一紙送蔣德常宰鄱陽棊社頗寥落聚會多差參矧如夫君賢貴重雙南金豈可無此君周旋相與深一别歸未久征鞍又駸駸老我苦多病别酒難重斟摻袪不可留贈言效規針吾聞古番君甚得江湖心官無崇與卑時無古與今古人乃能爾斂袵當致欽我亦一丈夫毋謂力難任未暇言偃歌肯彈宓賤琴明恕加撫摩細故多親臨網密吏易姦賦重民弗禁飛梟懷桑椹烹魚溉釡鬵此邦熟往來當有慰黎黔君能踐世科朝行佇朋簪公餘昌遠業書讀松竹林故家未見書校讎如向歆時時為尋訪歸來共書淫勿以三徑荒間作莊舄吟勉哉赴功名莫待二毛侵數年倘加我寒盟尚能尋題家藏二畫一龍老龍臥海沙覺來未欠伸珠光發海底闖然目有神畫龍不畫全必雜煙與雲此龍未嘗動具見爪與鱗一龍望見之爭心生怒嗔奮迅勇欲前便爾雲滿身不知出誰筆定非塵中人若非親見之何由寫其真雲濤方洶湧恍若渺無津為霖會有時正爾良苦辛乃知青雲髙不如寂寞濵深虞或飛去什襲聊自珍一虎一虎弭耳行一虎立而顧猛鷙乃天資亦爾相媚嫵媚嫵尚耽耽況復逢其怒吾聞宣城包今古稱獨步投老筆愈精利牙爪可怖方其欲畫時閉戶張絹素磨墨備丹彩飲酒至斗許解衣恣盤礴手足平地踞顧盼或騰拏窺之真是虎捉筆一揮成神全威不露此其真是歟為我振蓬戶藜藿將不採何止讋狐兔送陳進道倅三山陳候少有場屋聲嵗在壬午聯薦名晚年倦遊安里居君亦懷綬歸家庭齊年連姻更同社臭味相與如弟兄一朝話别欲遠去洗盞更酌歌渭城金沙樂土宜宦遊或謂不減洛與京平分風月信可樂人家弦誦幾連甍豈惟帥閫賴關決定知秋闈望陶成西都外司掌宗盟須君共二為之丞勿謂為丞但虛稱亨途要當自此升惟君儒雅聞簪纓種學嵗久筆縱橫奧篇隱帙了如響淸談吐屑四座傾詩筒來往附郵傳時出妙語人為驚梅花萬樹照山白荔子百種輝空明九門雄尊盛官府三山森聳多地靈長樂一志書不盡平生頗恨未經行煩君傑句為摹寫遠寄使我心神淸送薑子謙宰鍾離濠梁自古揚州域禹娶塗山城尚留鍾離雖嘗作楚縣子男之國書春秋卑梁爭桑起吳釁隂陵失道除漢讎嬴秦屬之九江郡典午置郡任愈優蕭梁尤重北徐鎮髙齊又為西楚州貞觀割淮疆理失元和加水號名修陽冰篆虎書戶册竒畫于今照譙樓浮山築堰誰與謀漫引童謡為激溝役工沈鐵不勝計欲灌壽陽為廢丘霧昏三日水怪出一決空貽千古羞上格下格果何在西濠東濠猶並流守邉在人不在險險阻如故事不侔元魏擁兵數十萬義兵堅守竄其酋向來橫澗一失據凜凜重貽宵旰憂刺史舊帶兩城使渦口兩城今在不君候妙年筆為投名位詎肯卑微休世科髙挹更膴仕哦松壯志未足酬欲效金城上方略宦遊直到窮邉頭三光五嶽氣猶分故疆慨想何時收邑事不足煩大手往訪古今資遠猷老我無用重多病為君相與數觥籌棊社泠落故人少況復臨風送行舟看君徑赴功名會努力自取公與候又聞魚臺在近境誰知魚樂如莊周烽沈柝靜若多暇從容何惜觀遊倏送潚丞剡川工部丞昆丘我生丁巳年比吾既逾冠再轉丞金囦年齡過半百奏子哦松軒親見勤小物如彼少壯然受輸導行費略不取一錢飛粳至眯目猶恐勞弗宣汝方壯有室行行二剡川地近既便親俸外有圭田惟當念爾祖奉職罔不虔邑無不當問事亦不得専退無為避事進勿至侵權莊生才不才其間要求旃去年苦旱歉榖熟殊頗偏未知催科時何取何當蠲一十七鄉民戶口富人煙去天曽不遠媺惡易以傳大寧九十餘父母俱華顛況子勤幹蠱豈不深愛憐食祿須盡瘁毋歎我獨賢不應頻往來恃有檄可沿時時寄安書何殊在目前秋賦已復近公餘更加鞭金罍喜接境一水通鄉船他時倘少病尚能催擊鮮送王知復宰建德筮仕一何早字民一何遲歷歷三十年中間多險巇宦途秪平進分寸窮攀躋最後官胄監一蹴黃金閨秪由能自愛風鷁甘退飛寧為紅蓮幕往尋武陵溪親黨多勸止君去獨不疑治家有賢媛應門委佳兒安居捨大厦列屋間歌姬風霜登客路單車如雞棲勇決有如此端是英雄姿有志事竟成不後一年期明詔趣鵷班壯縣催瓜時嬴得為君子否泰相因依古郡足瀟灑年來困征追守宰俱賢明斯民其庶幾杭葦欲走别有足如繫維舉酒向西望離愁渺天涯惟君才素髙邑若不足為謂難易將至謂易後難支老我百念冷安能效良規猶記簿領初過庭聞舊詩惟畏為過寡惟勤無功虧遺訓儼如在終身當誦之題趙尊道渥窪圖趙尊道制幹以龍眠渥窪圖示余余曰誤矣本韓幹馬東坡曽為賦詩者此龍眠所臨而以後為前俾易之為書坡詩于後而次其韻馬實十六坡集詩云十四匹豈誤耶良馬六十有四蹄騰驤進止紛不齊權奇倜儻多不羈亦有顧影成驕嘶或行或涉更相顧交頸相靡若相語畫出老杜沙苑行將軍弟子早有聲中間名種雞羣鶴無復瘦瘡鳥暮啄當時玉花可媒龍後日去盡烏呼風開元四十萬匹馬俯仰興亡空見畫龍眠妙手欲希韓莫遣鐵面關西看題髙麗行看子髙麗賈人有以韓幹馬十二匹質于鄉人者題曰行看子接處黃綾上書韓幹馬表飾以綾尾以精紙皆麗物也聞有懷金來取因命工臨寫而歸之再用東坡韻書臨本之後竹批雙耳風入蹄霜鬛剪作三花齊相隨西去皆良種撼首勢竄迎風嘶丹青不減陸與顧麗人傳來譯通語裝為橫軸看且行云是韓幹非虛聲圉人乘馬如乘鶴人馬相語同呼啄中有二匹真遊龍爬梳迥立緑楊風賈胡攜金贖此馬亟呼工人臨舊畫我詩無分到三韓寫向新圖時自看跋李少裴修禊序唐文皇之賜韓王有崔潤甫之題為可考若李重光撥鐙書斷然無能效之者其為真筆何疑朱徐開皇之記則已見少裴之辨開元去貞觀未遠潤甫又職校定四部圖書以為最善本則真善矣辨才之本既殉昭陵今世止以定武本為第一又出歐陽率更所臨石本自應在墨迹之下則知此本信為冠絶蓋希代之寶也然考之新舊唐史崔湜弟液滌及從兄淮並有文翰居淸要液至殿中侍御史液弟滌明皇用為祕書監出入禁中後賜名澄如此則液為湜之親弟而為祕書監者滌也又宰相世系表博陵安平崔氏仁師相太宗髙宗次子擢擢之子液吏部員外郎第四子挹挹之子湜相中宗湜之弟滌祕書監如此則液為湜之從弟又不為祕書監傳之與表已自不同而滌之親筆乃爾于是知作史與考古之難也因併述之仍賦長句以副少裴好古之意蘭亭修禊永和中羣賢髙會俱雍容右軍作序亦寓爾藁草乃致傳無窮自言疑若有神助他日屢書終不同歷代傳寶在祕府尤其甚者唐太宗當時搜取極心力摹本一一頒羣公惟此真迹最竒絶蕭梁開皇有遺蹤親御奎文賜元嘉龍蟠鳳翥何其工辨才所取祕照陵此本一洗凡馬空崔家兄弟列淸要誨子況復稱龜龍圖書四部資校讎當時尚有貞觀風自云此為最善本冰銜臣液題甚恭李王深得撥鐙法筆力絶徑雄江東右軍以來皆妙筆名勝異代如相從病餘扶憊行掃松李君攜來為發蒙平生多看舊墨本一見使我開心胸摩挲歎息不自已至寶盍入明光宮隱居懷寶正不惡異氣或能牛斗衝叩門有客勿傾倒恐有御史來乘驄送鄭楚客司法之嶽陽在本卷第十二首今從他案原本脫去此首據集目于此本録補先生作賦真八吟髙處獨步無古今少從三山來四明一郡士子多青襟我嘗學事六七載膏馥沾丐資之深竊名文場掌帝制至今不敢忘指南英英二子俱秀爽遺以一經無籯金長公奉母上巴陵念君遠去因論心見君詩編筆雖敏三嘆未見朱弦音海濵熬波幸解組未知宦路多嶇嶔先生賦編更熟讀非止駢儷誇詞林其中關鍵妙一世字字諧協如鳴琴談經況有著述在持論肯為向與歆青箱但能世其業前躡雋軌將駸駸君家曽無錐可卓遲次幸此突不黔不惟母老身非少亷介又務循官針量入為出可不謹斤斤飢食寒有衾非求多藏第約已瓶儲紙裹迹可尋法曹持平守三尺平反一笑神所臨謹毋失已毋失人同列當和時盍簪上官善事免曠職首上尻髙宜致欽嶽陽樓號天下稀地坼吳楚連衡郴洞庭漫汗天立壁君山當中出青岑向來命名字以楚宦遊直到重湖潯登樓談笑領僚屬風流欣遇賢侯任君行應得江山助新篇寄我毋浮沈摻袪欲言不盡意更取濁酒從君斟洙道原太守任攻愧集卷三
