front:
  text: 攻媿集巻七
  hash: sha256:9d71f6d2304c293c9bd246200f712ad25d9112c617bfc734f96b1c956e25abe9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_007-1a}
body:
  text: 宋樓鑰撰今體詩姚江髙風閣邑有嚴先生墓不從文叔作三公歸著羊裘大澤中石瀨釣臺非故地雲山江水自髙風烟迷宿草古遺恨樹擁危樓新奏功僊馭飄颻疑不逺翩然獨鶴度寒空夜坐重雲烟雨日冥冥柱礎流津意未晴賴得谿風送雲出放開山月照人明紛紜世態長松影荏苒時光流水聲坐乆蕭然轉琴軸為君更作九臯鳴山陰道中昨望山陰古道中蕺山直上最髙峯今朝更踏山陰道郤向雲間認八松捲上疎簾莫放垂迎眸景色自淋漓有雲更覺千山秀不雨争知萬壑奇古道經行盡遺跡羣賢風度想當時奚囊莫怪新篇少應接山川不暇詩蘭亭别于果鄉山隂巖壑妙人寰十載扁舟空往還贊府端能慰牢落連朝相與上孱顔龍盤鳯翥無奇畫霞蔚雲蒸有舊山弔古凄凉更離别滿懐秋思到眉間早行水餘枯枿尚棲苴催促征夫趁曉鴉細路繚山穿亂石輕輿掠樹得飛花柔桑彌望兩三里脩竹深藏四五家徑處不容行客戀可憐一歩一天涯水漲乗小舟一番凍雨洗郊丘冷逼征衫四月秋只喜青山瀉懸瀑不知黄潦漲平疇登途已厭頻輿轎得意何妨且榜舟處順安貧聊自適未應坎止愧乗流繡川道中伏波莫作賈胡留雨意垂垂未肯休不憚征衫有㣲濕只愁平地又横流行人自厭衝泥苦野老方當得意秋倦僕如何致千里登天徒笑傳鳴鳩過蘇谿處處谿環舍家家石累牆有時逢老稚無事只耕桑野色撩詩思村醪引醉鄉山川巳如許急雨更斜陽東陽遇雨萬壑千巖巳飽看更尋佳處為開顔無端早上一番雨遮盡東陽縣裏山即事雨外山光淡烟中草色鮮斷橋依古岸流水自斜川紫椹餘桑表青藤遶樹顛人情兼物態只合付天然荆坑道中古澗隨山轉征人趁水行懸崖當歩險空翠逼人清石路無尋直沙田不畝平千巖得一二亦足慰平生馮公嶺百級山田帶雨耕驅牛扶耒半空行不如身倚市門者飽食豐衣過一生括蒼烟雨樓莫為看山只凭欄逺懐猶恨兩山間坐深卻得無窮趣秖看平川一半山晚歩少㣲閣落日謝虛閣横琴相對閒片雲將急雨一笑失前山夜坐燒香臺長晝苦炎熱夜分凉始生電中千嶂立琴外一蛩鳴急雨催詩思遥空答鼓聲誰知囗府地得此意凄清即事睡重不知曉山髙意得秋風來巳落葉潦去怱中洲幽閴素所願登臨儘自由瀕溪千萬壑何日上扁舟小雨好風先雨到危欄卻送殘雲過别山不用開襟强披拂自然凉意滿人間烟雨樓夜坐暮靄横空黯未收晚來凉動滿懐秋澹雲影裏千山月殘角聲中百尺樓參坐共為文字飲髙談不見古今愁夜闌半醉意方適徑欲乗風汗漫遊晚自擬滁亭轉烟雨樓聽角兩寺疎鐘夾岸聞荒烟無數亂前村山銜落日雲生彩谿溜孤舟水不痕蟲羽凄凄鳴綠暗星暉隠隱照黄昏欲歸重到層樓上更為梅花一斷魂重陽佳處逢佳節寜辭望眼勞有樓皆眺逺無日不登髙野栗炊新秫寒萸泛濁醪黄花何太晚籬落上蕭騷北行雪中渡淮風捲清淮夜不休曉驚急雪遍郊丘坐令和氣三邊滿便覺胡塵萬里收瑟瑟江頭輝玉節蕭蕭馬上㸃貂裘歸來風物渾相似二月楊花遶御溝泗州道中宿雪助寒色相看汴水濵輕車兀殘夢羣馬濺飛塵行役過周地官儀泣漢民中原陸沈乆任責豈無人靈壁道中古汴㣲流絶餘民尚孑遺髙丘祠漢祖荒草葬虞姬垓下空陳迹鴻溝愴近時膏腴滿荆棘傷甚黍離離陳留柏驛門深閉柏參天月可中庭夜影圓人静好風喧客枕坐令歸夢到林泉相州道中千古興亡一夢驚就中物理似持衡茜花空染朝歌血荒草猶祠羑里城但見反身知自咎誰言修政欲相傾知音只有昌黎操臣罪當誅主聖明即事行盡窮邊歲亦殫倚門應是念衣單寜知今日幕南地不似去年江上寒乗馬惟欣日可愛逢人長説雪初乾三衾四襖半無用何必重歌行路難臘月二十五日大人生朝去年沙岸倚歸舟今日驅車古涿州綵服難陪萊子戲巴詞應付雪兒謳客途行及五千里夀宴須開十二樓南望飛雲天様逺太行山外乆凝眸初出燕山去國三千里還家第一程都緣人意樂便覺馬蹄輕落日催心速飛雲逐望生莫嫌歸去晚猶得趁清明春雨石斗微㣲覆淺沙蘭叢短短茁青芽春花著眼未云乆花事于人漸有涯漫漫平湖接逺天濛濛細雨濕輕烟野橋横著草深外何處渡頭人上船送人之官池州春空吹雨作餘寒去去扁舟不可扳伊昔曾游三大水到今獨記九華山想君脈脈征途逺屬我悠悠夢境閒囘首江山固無恙懐人倚待好詩還春遊遇雨公子喜青春歡遊弗厭頻乆晴都不問好雨郤成嗔桃杏紅方入禾苖綠未勻請君停杖履俯念耦耕人糧料院葵向亭結屋蒼崖晝不譁崚嶒亂石遶簾牙濤江渺莽三千頃烟瓦參差百萬家雉堞環山餘暮雪龍樓聳闕煥朝霞登臨可是望都省但有葵心向日華廨舍小軒衮袞羣山尾横牕更此岑塵埃遮物外風物宛山陰作吏何妨隱尋山不用深居然一丘壑便足快登臨尺五亭舊説城南社今登山外亭宮牆步可到御柳望中青引嘯千巖響哦詩過鳥聽曲欄頻徙倚歸思渺東溟挈從子滌歸烏戍外家五年不泛浙西船今日重來倍黯然葦席不重寒刺被菱歌孤唱月揺川吚啞回櫓鳬鷗狎來往輕帆風雨便㸃檢湖山固無恙鴒原遺恨到黄泉烏戍道中田在港西家港東斷橋春水步難通束蘆挾瓮穩來去不礙小船分釣筒重陽寄雪牕從叔秋意未教籬菊知不妨烏帽著風吹絶憐對酒君歸矣更欲登髙誰共之風雨滿城千里夢茱茰綴席一年期君非俗物敗意者莫爲催租便不詩次伯舅汪運幹大雅所寄韻遥憶牢之舅功名志欲成離思滿方寸望眼費雙明攬筆四愁詠登樓千里情賢勞休自歎幢下本書生佛日山曉出都城暮入山杖藜蕭㪚易開顔松風五里未行盡隠隠疎鐘紫翠間遊香山次王正言逨韻四山過雨翠光流境勝心閒自㸃頭野鳥叫春多格磔晚風吹鬢故颼飀三年幾作舊山夢一笑喜成今日遊獨歎寒泉本無意强隨機械走溪溝過西興幾載京塵涴客裘江村乍入倍清幽柔桑穉麥寒猶在流水落花春又休蒼狗浮空驚易失白駒過隙若為留細思誰似垂綸者寘酒烹魚百不憂攜家再游姚江又作泛舟行浮家一葉輕潮生江外晚月比夜來明雲盡天容徹風髙水氣清五湖乘興去何苦慕功名渡揚子江豚吹浪雨颼飀望斷天涯人白頭一舸乗風渡揚子數鷗導我過瓜州曉霧曉霧冥濛水拍堤稜嶒亂石與雲齊扁舟不用兼程去到得稽城日巳西登蕺山晚歩蕺山上休辭腳力窮八松不碍眼萬里欲乗風逸興浮滄海髙歌徹太空羲之不可見猶得想胸中永嘉試院謝曾使君送酒一簾疎雨洗塵埃滿架酴醿自在開正恨烹茶殺風景忽驚門外白衣來脱身場屋幾春秋故歩重尋我自羞閉置有如三日婦畫成應遣一生愁與錢誰是老司業送酒更無賢郡侯掩巻出門花下坐真成一酌散千憂木藴之國博遷居寄齋今日又遷居門巷相過五尺餘王子何妨借人屋淵明不必愛吾廬大千眼裏無非寄三十乗中皆是書祀竈卜鄰無用爾柢今天上有鋒車名大人稱屈心閒我自餘言詩今子貢作賦古玄虛鳯沼定平進鷗盟殊未疎潭潭府中去只作寄齋居次南真宫龔道士壁間韻幽舍足留客疎篁不用林相過幾樽酒清坐一瑶琴野鶴伴僊隱閒雲寄此心黄冠如有許來者爲低簪送樂清姚令行可長官清政玉無瑕卓魯循良不足誇前席有期吾黨喜挽鬚無路邑人嗟才髙雁蕩千峯石惠足河陽一縣花欲信三年渾不擾遊山今日始攜家入雁山過雙峯眼前未見古龍湫望望前山景自幽紅日一門千嶂曉翠峯雙聳半空秋風髙落木無邉下氣勁閒雲逐處收要識雁山真面目直須霜後一來遊靈峯老笻扶我轉林丘直到僧房最上頭地擁雙峯遮勝境天分半石閟靈湫空中大士澹相對山罅清泉空自流人謂石崖宜置我不知來此有緣不龍湫地聳峯巒秀天開氣象寛九霄銀漢落千古玉龍寒壯觀供尊者幽居稱冷官何時遂肥遯不厭白頭看又次王瑞安韻雲鎖千峯碧泉飛百尺湫山蹊驚險絶洞府足深幽谷靜揺虚箔巖髙臥老虬賈胡還似我到處輙遲留忘歸亭一峯凛凛插烟霏誰築新亭占石磯標榜未應專一壑此山何處不忘歸登馬鞍嶺軋軋輕輿上馬鞍半天嵐翠逼人寒從教宿靄迷清嶂明日晴空取意看游西山次范丞公興韻東風吹我上西岡更覺僧房白晝長草色巳翻新歲碧梅花秖是去年香好山圍繞屏三面野竹蕭森玉數行千里同遊逢范叔綈袍他日未相忘喜雪曉風吹起雪漫漫來兆豐年喜有端玉樹瓊枝無限好雪牕髙閣不勝寒直疑天上梅花落莫作人間柳絮看我欲乗風游汗漫倚欄空自羡飛翰同年翁處招遊北山次韻不嫌屐齒碎莓苔秖要吾人得得來見説飛泉髙落澗待尋曲水作流杯竹林素約羣賢集雞黍相過一笑開政恐清遊自忘返不應空棹酒船囘支茂先烟蓑亭人生逆旅困風波大似寄居鸚鵡螺月白江空無一事不須更作釣魚蓑紅梅南枝零落北枝殘失喜新蕤苦耐寒莫道北人渾不識南人幾作杏花看秋意次林致甫宗丞韻河漢秋來浄飛星一㸃過好風吹暑盡疎雨送凉多紈扇收圑月桃笙捲細波自知恩到骨欹枕夢無何送春飛花一片減風光不待紅稀意巳傷今歲餘春能幾許浮生此日更須忙隴頭有雨麥初秀林下無人蘭自芳夜倚疎櫺誦佳句好風如水月如霜花披催蝶舞柳暗受鶯遷過眼忽新夢囘頭誰少年溪雲隨筍供山雨近梅天詩思正無賴一聲來杜鵑病目初愈張子家有詩次韻年來視物隔褷䙰秖有昏花似退之强起歸鴻聊自放妙穿懸蝨恐難為相親黄奶交親絶見代青姑事寖危寫照苦添雲蔽日不應更誚虎頭痴許深父餉酒覆于舟中千里貽書慰寂寥更将尊酒餉今朝先生忽巳成烏有用事何因見白超醉裏謾思鯨吸海夢囘誰悟鹿藏蕉何時痛飲論心曲雲滿江東望眼遥送朝臣濟宰湘潭君向瀟湘忽語離江城離思亂雲飛傳聞楚俗尤凋瘵勿以秦人視瘠肥宰縣要尋行志處監州空有負丞譏此行得句須頻寄直到衡陽有雁歸即事芸芸物態見天機静裏工夫得細㣲堦下秋紅千萬㸃游蜂一一採香歸正月庚申朔淳熙六年春來節物一番新今歲仍逢臘裏春莫訝連宵清不寐秖緣守歳守庚申國清寺夾道青松引客來五峰雙澗擁樓臺豐干饒舌留公案隋帝遺書暗古煤最喜親知來里社真成春月上天台陰雲掃盡尋幽去佳處端疑為我開山中懐仲兄雁山曾御九秋風更喜春深到此中芳草絶憐隨意綠野花真是映山紅未知方丈景何似直恐桃源路巳通起聽朝雞無恙否兹遊恨不與君同天台道中口占路上人家短竹籬繅蠶刈麥自熙熙可憐日對千尋瀑不解閒吟半字書宿仙居民家投暝人家欲睡時雨聲不斷水平池囘頭已過三江渡醉看車中總不知寄管儀通判并同官執别僧房日未斜别離愁緒滿天涯清宵巳落柔桑葉小雨頓開喬麥花醉裏不知身是客玉詞江南李酒闌無奈客思家中句歐公夢憑誰寄語三夫子歸路還須好句誇贈寳藏老道源骨相昂藏澗厎松平生禪窟儘從容幾年大隠清暉閣今日來瞻獨秀峯打破畫瓶無罣礙大開飯店喜迎逢今朝且逐征途去何日重來聽曉鐘過蒼嶺黄雲滿塢沙田稻白雪漫山薺菜花路入縉雲頻借問碧香酒好是誰家崇朝辛苦上孱顔泥徑初平意暫閒蒼嶺東頭移野歩眼前便得處州山婺女極目亭危樓雄據郡城東掃盡秋雲快碧空目力不容山隔斷詩情長與酒無窮先分樓下雙溪水髙挹人間萬里風興逸不知真近逺五弦聲裏送歸鴻自阿山歸再過蒼嶺雨後過蒼嶺平生行路難危層驚歩滑絶澗覺心寒就嶺山逾險趨平谷更盤年來輕世故不作險塗看攻媿集卷七
