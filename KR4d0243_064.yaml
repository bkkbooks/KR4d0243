body:
  text: 宋樓鑰撰啓代賀王樞密倫奉使回啓氏汪尚書大猷以下五首代舅交鄰國有道乎大而事小遣使臣以禮也遠而有光自昔才難于今任重十九年誠著夷狄孰謂世無蘇子卿數千里口伐可汗必有人如鄭元璹惟樂天者保天下故和戎而得戎心乘軺之人銜箠于道臨軒優造固盛世之非常杖節請行實大臣之未有揚旌亟去締兩朝魚水之歡接淅言還際千載風雲之㑹神人喜樂河海晏安么麼至微歡快以抃恭惟某官有宰相器真王佐材量括江湖不清不濁氣充天地至大至剛貌不勝衣心匪轉石言而造膝非堯舜之道不敢陳議或犯顔雖賁育之勇不能過愈膺眷注寖歷清華快吟紅藥之階久寓紫微之直敏悟如廷碩時詔誥皆自為之文精壯若燕公大述作類皆出其手進二樞府增重聖朝運籌于帷幄之中折衝于樽俎之際上方安邉境于無事時乃堅和盟于未寒禮云禮云豈玉帛乎哉使乎使乎安國家可也謂虞臣之相遜彼或一時命裴度以往釐正在今日確持志士之操果為天子而行帝曰汝諧僉言惟允身輕一葉佩四海之安危名重泰山聳萬夫之風采分憂北顧顒望東歸馬維駒馬維騏方聽皇華之選隼集栩隼集杞已聞四牡之來生靈獲按堵之安宗社有覆盂之固孤忠凜凜馳不測之深淵萬目睽睽仰難逢之盛事歡傳土宇喜動天顔去握漢旄固已虛上台之席歸調商鼎何待趣舍人之裝行慰具瞻即膺爰立某寒鄉冷族藝苑散材雖知必學于箕裘未免徒勞于州縣寡交于世知已惟公顧蒹葭之柔曽倚身于玉樹笑蟾蜍之拙難追步于飛黃誰知霄壤之殊途不替金蘭之舊分比干寸祿進拜崇墉方彭彭馳使者之車而戀戀有故人之意將曲成其羽翼乃特借以齒牙俾掃齊門獲參儉幕受丘山而有自效蛇雀以無階俯聽先聲莫負蜀郊之弩輒尋故步重瞻夫子之牆敢泚筆于下風佇宣麻于穀旦代賀錢樞密端禮兼提舉德夀宫啓恭審光奉宸綸進參樞管天子侍龍樓之膳仰裨孝治之勤聖恩加書殿之名增重本兵之寄神人歡喜宗社晏安恭惟某官才為時生美由世濟學究六經之蘊識窮庶物之原緗帙牙籖插架固踰于三萬漆書竹簡撑腸何止于五千發華藻以為文出緒餘而飾吏果由治行自致功名踐揚仕路之深密勿從班之久屬遠夷之弗靖眷邉境之多虞洊遣侍臣往宣德意星軺兩使盡清千里之烟塵羽扇一揮坐變三軍之風采隃度機事明若蓍龜確守成謨堅如金石遠膺芝檢來對楓庭君必有尊蓋以天下養也時方多事要當馬上治之自非膺眷遇于兩宫兼文武之二道安得被家令賜金之寵贊元樞總戎之權父子無難言之嫌繄公是賴廟堂銷未形之患舍我其誰久難其人今得此選自聞拜命僉曰當賢雖李衛公之髙才素恥由于進士而曹侍中之故事特先賜于儒科積此恩榮可知注倚邉聲未寂騎壒方高頃在金城固已圖上于方略今居西府自應制勝于朝廷位髙則任隆名盛則望備盡平時欲行之事當今日可為之秋願思君臣遇合之難以濟國家恢復之業某效官何補蒙眷數深側聞渙汗之頒倍極輿情之喜兔葵燕麥固匪春風之上游馬渤牛溲願為藥籠之餘物代賀錢參政兼知樞密院啓恭審榮膺宸綍進二政機兼持右府之權益壯本朝之勢郵音一播輿論交孚恭惟某官德量恢洪勳名赫奕傳龜襲紫偉岡頭澤底之家聳壑昂霄擅日下雲間之譽早膺睿眷寖歷華途游刃不見于全牛利器豈拘于錯節外臺輔郡著藩宣屏翰之功清列近班備獻納論思之益頃以邉庭之未靖嘗持使節以請行風清塞北之烟塵名震淮南之草木折衝樽俎之上運籌帷幄之中方鄧騭欲棄涼州微升卿幾誤國事惟營平固守明詔謂宣帝可為忠言披膽莫回噬臍增悔以身徇主豈欲得先知之名轉敗為功自難掩孤忠之節亟畀芝函之寵峻躋樞管之權雖士氣之已振尚兵釁之未解力裨聖算先遣軺車嘉謀無膠柱之拘天意有轉圜之易埀紳搢笏坐致元功曲突徙薪終為上客宜進參于鬷嘏俾益究于宏規士夫喜公道之行中外欣王化之復惟夷險不踰于操守故始終尤被于龍光大臣慮四方玉鉉方資于調燮人主論一相金甌將啓于姓名某竊祿無堪荷恩自舊側聽絲綸之播不勝燕雀之私鄰哉鄰哉方慶明良之遇人耳人耳願歸造化之餘代回髙參議啓假守南州方遂奉祠之請拜恩中道忽叨謀帥之行曽修問之未遑愧貽緘之先辱伏惟某官精忠報主妙略濟時英英故國之耆儒表表清朝之雅望一門父子喜富貴之鼎來萬里功名諒規橅之先定豈謂著鞭之晚尚淹入幕之留蔚相扶炳相輝適有同寅之幸起而言酌而祝尚資婉畫之餘代回陳節推柄啓擢首選于漢廷聳聞雋譽置外員于儉幕是曰異恩曷遲吾行願快先覩伏惟某官東嘉勝士西洛别傳視將相之科真拾地芥陳治安之策若吐天葩顧上游實為館殿之儲屈故事尚勞州縣之職青雲器業具在斯人歟緑水風流頗有此客否首勤髙作來訪陳人駢麗何工褒嘉過厚閒而成懶既乖桑梓之恭言不能文又愧瓊瑶之報代謝直祕閣啓溫州曽吏部逮以下四首代知假守偏州方愧承流之選升華中祕遽蒙增秩之褒揣已無堪歸恩有自伏念某稟資甚陋涉世尤疏十上空歸莫售家傳之學一行作吏但遵父教之忠素甘薄宦之驅馳敢意清時之差擇容臺議禮僅逃聚訟之嘲畿甸持刑上廣好生之德進二唐朝之銓選預參漢代之章程忽去國以難留秖杜門而自省偶屬東嘉之空乏俾分南面之顧憂被臨遣于丹陛之嚴受要束于黃扉之邃俯矜嬴俗惟恐其傷虛受瞽言其應如響鄰封移粟來蘇待哺之民下户蠲租盡革剝膚之弊赤子既寬于無告青史遂書于有年皆聖君施舍之恩繄上相燮調之賜苟逃曠戾已劇僥逾乃論尺寸之勞誕布絲綸之寵重念流離粗免凋瘵尚多倘守臣安受于誤恩則事體遂同于佳郡雖循牆而力請曽反汗之無聞風阻三山尚覺去人之逺雲興四嶽遂霑零雨之餘茲蓋伏遇某官道德宗工朝廷元老天開地闢㑹千載之明良􅊨雷厲風飛冀中興于日月深念專城之重務先良吏之求苟片善之有聞無一夫之責備坐令么麼亦玷褒嘉某敢不益勵駑才深圖雀報仙凡敻隔無從讀石渠東觀之書今昔何殊尚當奏渤海南陽之課代賀虞丞相允文啓恭審宸章渙發肇更夾輔之名制冊隨頒爰正左虛之席仰觀盛事髙掩前聞竊以阿衡左右商王作相必兼于仲虺姫旦股肱周室為保亦資于召公下及兩京以還寖隳二代之典雖大臣之委寄自若而歷時之位號不倫至用秦官領事之稱以為唐室中臺之長大聖君之有作復官制以聿新非惟遠追孔子正名之言抑欲遂行宣帝責實之政肆疇上宰首屬宗工恭惟某官千載真儒兩朝元老蘊仲舒佐王之學負孟軻命世之才竭忠力以事君肩一心于夷險出緒餘而應事了萬變于笑談勤勞何止于十年往返動踰于萬里凡四海危疑難辦之事廷臣皆斂袵而莫當求一時剛果敢為之人天子必虛懷而相屬手持威柄身佩安危王曰勳國曰功顧特書而未已出為將入為相宜注意之尤深臣主俱賢紀綱益振尊歸慈極贊九重孝治之心位正儲闈建萬國元良之本總衆職以遂大有為之志講內治以成不可勝之資當稽古建官之時選衆而舉膺奮庸熙載之任舍我其誰兼提樞管之權進極文階之品漢儀復見一新昭代之觀瞻周室中興㑹見神州之克復某久蒙知遇猥被使令方欣黃閣之開洊喜白麻之播用汝作舟楫仰知濟川獨任之專以我為鏌鎁遽有躍冶自言之意代賀沈運使復啓恭審天陛拜恩日畿授莭木牛挽粟榮分使者之權龍馬負圖寵冠奎文之直列城聳動公議傾依恭惟某官造道深淳受材髙劭潄六經之芳潤摛章驚絶代之工究千古之興衰論事有適時之用頃趨嚴召自結深知謂公等皆安在耶信明主一見決矣郎潛省户坐騰列宿之輝使行邉庭盡護長淮之境總師屯之萬竈供日費之千金民不告勞士皆宿飽試之馮翊益知治行之髙任以關中要資餉饋之給豈惟見研桑心計之妙行且膺嚴吾從臣之求于焉假途寧俟暖席某夙蒙知奬兹屬部封顧惟千里之凋殘猶賴二天之庇覆軺車澄按冀舒雅拜于前塵海嶠阻修莫厠賀裾之下列代賀吕運使正已啓恭審光被宸命寵升使名九重益厚于眷知列郡愈嚴于風采恭惟某官髙才絶俗奧學傳家納萬頃于雲夢胸破大觚于霹靂手釣璜渭水屹然尚父之功名聽履漢廷偉矣尚書之人物踐揚中外備歷險夷比講鄰盟獨膺新擢方張旜而遠聘俄全璧以來歸首加部使者之稱獨有典屬國之恨倚毗方重進用未央佇登紫槖之華徑取青氈之舊某辱知有素贊慶尤深大厦之庇千間夙荷帡幪之賜洪河之潤九里願承沾丐之餘代謝知溫州啓州王待御伯庠以下二首代知溫承流蜀道初無保障之功更治瀛壖復得股肱之郡俯慙僥幸欣戴生成伏念某少已無竒晚尤多難十年不仕惟真祠香火之依一札俄頒豈生平夢寐之及曽蔑片言而悟主未知何自以為郎方評蘭省之文忽冒柏臺之選遇事輒發初不顧于憎仇有知必言誓少酬于眷奬久為怨府卒蹈危機但求闔户以省愆敢意分符而起廢叱馭而進仰追鼻祖之忠勤鼓盆而歌有愧蒙莊之了達號啼塞耳憂患薰心願休退于田廬姑召收于魂魄詎聞衮服之貴下軫綈袍之思授以輔邦遂其私計俾控甌閩之要許尋王謝之風江海一來難冀修門之重入山川相望惟思舊隱之可歸茲蓋伏遇某官道德佐王謀猷濟世大開正路期立致于太平獨秉化鈞用陶成于善類有如朽鈍誤辱矜憐某敢不澡雪精神究詢利病奉寬大之詔務使及民勞撫字之心以報知己代賀史開府浩啓恭審頒冊九重視儀三事節旄前道聿嚴帥閫之雄衮繡交輝爰寵帝師之舊允為異數宜屬宗工恭惟某官忠冠兩朝道關百聖體仁蹈義聲名如山斗之尊聚精㑹神君臣不膠漆而固當天開地闢之際贊雷厲風飛之機天下日向于太平王化亦幾于復見晉公巨德歸為緑野之遊謝傅髙懷終為蒼生而起㑹稽輔郡曽衣錦衣閩嶠大邦更憑熊軾上篤潛藩之眷恩先召節之來前席受言改容加禮台廷虛左方圖上宰之求制綍自中首飭多儀之備參鼎司之崇品隆巖石之具瞻錫賚便蕃燕饗優渥貴盛絶諸公之右榮寵萃一門之中髙宗舊學甘盤未見報功之及武王維師尚父會聞授任之均某素辱殊知仰欽成命屬有郡章之繫莫前賓閣之趨蕭曹同心咸願股肱之夾輔甌閩接境敢睎脣齒之相依代魏丞相回趙明州伯圭啓將使指于龍庭曽無微效代王言于螭陛遽辱誤恩方自愧于抱虛乃亟蒙于贊喜恭惟某官才髙玉箭秀育銀潢人推子敬之明經自許東平之樂善享太守之祿二千石屢宣屏翰之勤賜列侯之印十九枚益見本支之盛行被芝書之寵即歸荷槖之班某久辱眷知茲蒙推借朋緘遽及可知君子之謙謙交態益深備見故人之戀戀代龔參政回廣東林提刑光朝啓入處從班已慙過分進參機務益愧非才首勤慶牘之臨尤佩誨辭之切伏惟某官學窮古始識造幾先六藝淵源得聖涯涵泳之樂一時名勝多殘膏沾丐之餘比專璧水之主盟將掩橋門之盛際乃從雅志往按遐方文翁之守蜀邦常衮之使閩部正藉遠揚于聲教豈惟詳試于刑章毋為攬轡之淹㑹有賜環之寵顧如菲陋誤被柬知忽叨共政之圖悉自更評之助疾顛是懼請益無階茲聞提耳之言當謹書紳之戒陳耽先用殊有太丘未登之慙樂正無聞恐孤孟子不寐之喜尚期弗棄警所未知代莫給事懷賀曽丞相啓恭審光奉制麻進登揆路華夷填服宗社晏安恭惟某官學殖深淳器資閎博千載際聰明之主十年居侍從之班本末源流知天下之大計論思獻納見王臣之匪躬頃二政機密參國論輔贊藏諸用不言房杜之功仁義事其君豈為管晏之烈天子意可使為相朝廷謂無以踰公正夾輔之名方革秦官之陋蘊太平之業況傳魯國之餘一聞爰立之傳實允具瞻之望某受知最久假守無堪不勝賀厦之私敢致飛緘之敬自憐老矣方日念于故山倘遂歸歟尚許全于晚節代仲兄錫謝監左藏庫門啓讞獄南徐曽無善狀司閽左帑遽冒中除誤叨特達之知倍費生成之力竊以剖訟之際自古所難吕刑謹兩造之情周官備五聽之制雖三尺從事固自有法然片言折獄存乎其人仰惟列聖之朝尤廣好生之德凡嬰罪戾咸劇哀矜用鄰邦之吏以絶請求擇練事之人以加詳密孰謂清强之選猥先寒晚之流有何微勞當此殊遇伏念某受才甚陋學道未深名粗齒于薦書仕仍由于世賞銓曹試律雖少知司空城旦之書户掾兼官顧豈是柱後惠文之手偶上司之過聽付疑獄而使評三省吾身樗材奚取一行作吏牆面是憂況縲絏之中或非其辜而箠楚之下何求不得閲簡書而致察束桁楊而不施公心以觀三日而決正自慚于拙速亦何有于平反因獲瞻上相之光儀固已劇此生之榮幸敢圖大造俯念孤蹤雀角鼠牙未知明辨牛溲馬渤首辱兼收坐令下國之參軍來職中都之外府姦胥鋤治雖云狡穴之已空寶藏所儲或恐蠧原之未盡出入親臨于朱墨啓閉尤謹于晨昏時乎為貧孟子亦容于擊柝各從其志望之自樂于抱關上得近于恩閎下不妨于吏考深知僥幸曲賴陶甄兹蓋伏遇某官夾輔聖君共康大業羣才並用或下採于芻蕘片善不忘顧豈遺于葑菲致使斗筲之賤亦霑膚寸之餘某敢不澡雪精神感藏恩紀既以備籠中之蓄詎敢貽門下之羞今日遭逄本非夢寐所及他時報效要當生死以之代陳叔揚大年謝興國軍教授啓持帚相門屢瞻公衮橫經侯泮辱在化爐揣已無堪歸恩有自伏念某涉道甚淺接物最疏不能飾貌以動人且無曲學以阿世永惟大父獨立先朝正色不回志必期于去莒著書自見心常在于尊堯雖孤忠徑節每挫抑于强臣而潛德幽光終暴白于昭代傳家有法遺子以安學焉記聞禮之言仕者守教忠之訓一經未泯賤子敢忘濫踵世科幾周嵗紀奉真祠之香火兩痛家囏司絶徼之貿遷適開邉釁妄論天下之事慨上公車之書雖幸徹君門之九重猶未試鉛刀之一割坐閲星霜之變不知升斗之謀壁立自憐瓶儲不繼投誠大造自忘躍冶之非厠迹嘉賓時遂曳裾之願麞頭鼠目何敢求官馬渤牛溲庶幾待用賴鈞播于小物俾客授于南州好為人師素守孟軻之戒此非子坐恐招有若之譏既逃州縣之徒勞仍有絃歌之可樂無非僥幸端有夤緣兹蓋伏遇某官旋斡化鈞主張吾道內治外治既陶萬國之泰和小成大成仰贊一人之化育善類悉歸于真宰危蹤尤纍于洪鈞夫何孤寒有此遭際某敢不益堅素節不負初心學不如務師曽焉知于善誘教然後知困顧敢忘于自强庶上副于眷知用少圖于報效代范孝隆棟謝提轄文思院啓掃舍人之門方欣進拜備事官之屬遽辱生成揣分已盈戴恩無藝伏念某才如樗散身若蓬飄不能飾貌以動人且無曲學以阿世偶憑門䕃獲厠官聯太上皇方御于飛龍先丞相實同于附鳯言言正色獨輸蹇諤之忠耿耿一心共濟艱難之㑹旋居元輔以佐中興依日月之末光㑹風雲之盛際生前相業但為社稷之謀身後生涯肯作子孫之計適權臣專國而方恣致故家無地以自容屏跡山樊但知畏影冥心宦路敢望求伸欣逄更化之初始興干祿之志猶念一經未售莫振家聲百技無長不為世用顧時命之大謬況拙懶之相逄雖嘗千里以效官又復三年之不調痛弟兄之淪落慨門户之衰頺不自植立以干當世之公卿幾無面目以上先人之丘壟幸真賢之並用喜公道之大明輒彈貢禹之冠徑造平津之閣回思江國嘗叨堂下一言之知仰望台衡敢敘屏間半面之愫豈圖謙德弗替昔時執轡愈恭不數信陵之義脫袍加惠猶憐范叔之寒曲記姓名俾歸陶冶鈍不及事幸而得之善自為謀不過此矣惟文思名官之義取㮚氏銘量之言鳩燕荆胡粵之良材督鄭宋魯吳之巧匠居百僚之底雖號卑微在三轄之間頗為優簡靜惟僥冒端有夤緣茲蓋伏遇某官吾道宗工本朝碩輔總衆職而稱上意明良相㑹于千齡順四時而遂物宜勳業獨髙于百世惟儒者在朝美政而上臣事君以人三握三吐而下士畢歸一貴一賤而交情自若務盡刈翹之術不嫌躍冶之私坐使孱庸亦叨造化某敢不仰銜恩施俯飭司存逄人而說項斯敢忘此意結草以報魏顆誓畢餘生代汪景孟茂良上龔參政啓程末技于省闈曾叨誤聽拜下風于帥閫始受真知不圖淪落之蹤復望熒煌之座敢陳悃愊上動髙明伏念某學不知方器非適用少修素業惟知讀先父之書壯忝末科亦嘗起當時之志但欲仕途之平進恥為俗士之詭隨猥緣假吏之行謬辱名公之舉逮其當軸許以曳裾方文武並用之時有賢愚同滯之歎薰蕕既異軌轍遂殊碌碌不為頗慕望之之從志寂寂為爾自甘鄧禹之笑人豈其若將凂焉政自不得不爾集君卿五侯之味深所不能奉南豐一瓣之香徒懷自信惟集賢之門無雜賓以進故小人之身為衆怒所歸獨念由銓選而仕京都初非有援滿吏考而為帥屬止以為貧雖造物有意于提撕而揣分但甘于靜退內省不疚浮議何傷克盡力于公家庶可逃于吏責忽傳印綬之解是為薦紳之憂欲留孔戣固已難伸于末議不負臨賀詎知反蹈于危機祠官實匪其本心化筆幾成于誤墨襥被而去杜門自怡追惟平生最號多蹇孤苦獨立險阻備嘗當此流離之時尤為災禍之㑹鼓盆之念未歇陟屺之悲已深是知膠西之行雖曰公孫之力也若夫江濱之溺豈亦子厚所為耶盡捐怨天尤人之私益廣安時處順之說數年于此寸進何言駸駸婚嫁之逼人擾擾啼號之塞耳稍收魂魄再整冠裳幸逄萬物吐氣之秋寧忍一人向隅之泣用持礦質來就洪爐茲蓋伏遇某官得時致君以道濟物卓爾聖朝之柱石凜然王佐之規模陛廉日尊藜藿為之不採威望所及草木亦皆知名惟上臣之用人無一夫之求備哀窮悼屈觀過知仁顧如貿貿之來似匪悠悠而進念千里識韓之日初不知蒙眷之由而一緘薦禰之書已大有吹生之意矧是政機之親秉實為善類之所依遂令久鬱之情居有求伸之願適㑹槐庭之虛席共期楓陛之拜麻廣厦萬間將隨燕雀之賀靈丹九轉願同雞犬之升攻愧集卷六十四
