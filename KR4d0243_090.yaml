body:
  text: 宋樓鑰撰行狀侍御史左朝請大夫直祕閣致仕王公行狀曾祖寂故任永靜軍東光縣令纍贈少傅妣趙氏贈成國夫人丘氏贈濟國夫人祖禔纍贈少師妣張氏贈衛國夫人父次翁故任資政殿學士左大中大夫致仕纍贈太師妣趙氏贈秦國夫人本貫濟南府章丘縣巨德鄉巨人里王公伯庠年六十有八狀公字伯禮其先大名府人五世祖繼文贈特進者以明經出身嘗為河中府虞鄉縣令四世祖异贈太保者以甲科為尚書郎直史館嘉岐王府翊善十餘年請老而歸避大河之患葬特進于濟南因家焉少師古學精深兼通醫卜工真行草篆尤邃于春秋既免少傅喪不樂進取攜二子屏居青崖山之兩河太師因教授其間以供甘㫖名聞東州學者雲集時號兩河先生紹興初執政凡四年力丐閒退已遂致其事居于四明西湖之陽今遂為鄞人公登紹興二年進士科授左迪功郎吉州左司理參軍試教官為第一改充明州州學教授十一年任滿循左從事郎便親自列主管潭州南嶽廟時太師方在政府詔以諸將成卻敵功皆二三大臣竒謀指縱之力可與一子職名改左宣教郎直祕閣顯仁皇太后回鑾太師充禮儀使辟公書寫機宜文字尋主管台州崇道觀十四年授兩浙東路安撫司參議官太師薨服除二十二年通判平江軍府奪職罷歸三十年主管台州崇道觀三十一年賜五品服通判鎮江軍府三十二年以覃恩轉左朝請郎隆興元年改兩浙西路安撫司參議官二年省罷知興國軍乾道元年七月召赴行在除户部左曹郎官仍有㫖復舊職明日兼皇子慶王府贊讀尋改直講二年南省試進士為參詳官就院擢殿中侍御史五月遷侍御史八月罷四年主管台州崇道觀十二月知閬州五年八月復直祕閣改知䕫州兼本路安撫七年移知溫州九年赴上才三月終于州治纍官至朝請大夫公忠孝謙勤得之天資自幼刻意問學家素清貧太師教子甚力朝夕講習至以楮衣禦寒手種苜蓿以充飢及冠猶未知肉味父子易衣以出而抗志不凡慨然有立名當世之意手抄古書往往成誦太師守道州欽宗登位奉表者例當推恩公請以叔父次臯行既乃連中世科人益竒之分教四明人士仰慕適與名士相先後或以見在過去未來三佛名之初被延閣之命時宰欲擢丞列寺太師既不欲私其子公亦力辭焉平江當冠蓋之衝毗贊郡政聲稱甚美㑹以讒間遭論自此不復造朝安貧樂道十有餘年若將終其身一旦趨召際遇聖明首論養人才裕民力理財訓兵以為不可勝之備又論考察薦舉鬻爵積粟等事奏對明白音吐洪暢上意開納陛楯亦屬耳傾聽為之咨歎即日除户部郎講讀王府究繹經㫖詞義俱勝帝子斂袵受之逮執法殿中進遷南牀自以起遠外被異知益展盡底藴謂强國在法制固國在人心然國勢可振而易强人心難得而易失乘航之諭不可不知駭輿之言不可不鑑又奏方今之弊莫大于風俗茍且而茍且之弊生于士大夫議論之不公惟不以虛言先實用不以髙論蓋真才茍且之風或可少革是時宿將類以罪廢公奏奔北固為可罪而戰多有不可掩者不應以一眚而廢之宜及此無事之日以次召還使備環衛撫之以恩折之以威庶可收效于後上深以為然稍稍録用沙田蘆場議起租稅民以為病無敢言者公乃極論之其略曰沙漲之地未嘗耕耨施工布種乃是務本之民既未能如漢置立田科以勸農而可擾之乎蘆葦之生本非種植各以其力樵刈必非游手之徒既未能如古捐山澤之利以豫民而可困之乎豪强坐據雖曰非法然怨不及上今朝廷遣官增稅怨始有歸矣上感悟即令罷去以便貧民廢省兩浙舶司簡閲宿衛之士皆自公發之由是眷意愈厚嘗奏事良久上肅容謂公曰卿所言一一可用議論全似唐王圭公平日恥言人過未嘗臧否人物恩仇一視坦無城府既居敢言之地遇事輒發抨彈所及動涉仇怨無少分顧忌意或為公危之公正色曰言責所在顧忠于君者如何爾一有愛身之念紀綱何賴焉筆力素髙作奏不能自休諫藁謹密子弟不得預論事尚多非施行于外者莫傳也諫長率公論政府乞置詔獄已乃下其事臨安一日太守請間公語之曰始得之風聞不容自默今既事在有司豈復當預獄具失實即上章自劾以故俱獲譴而公止從罷免上亦知其非出于公念之不忘或言去國之後事有涉公所嘗論者上必取元奏親加省覽而施行之且嘗曰此真臺諫也奉祠未幾以閬風起公遂易䕫帥䕫部曠遠夷夏雜糅公首圖諸郡地理合而為一分别險要獸蹊鳥道纎悉畢見區處指授盡出于此人莫得而欺也撫夷人以寬養百姓以惠馭官吏以嚴䕫以大治郡有巨剎既為嵩呼祝壽之地而祖宗諱辰薦修及三嵗合五州人士羣試皆在焉公以為厖且陋命葺廢寺分行香之所又建貢闈二區以其一與漕司土木之工皆有條理不日而成士民誦而歌舞之巴俗多略子女以為貨公特嚴其禁有綿竹獄掾者捆載而來為瞿唐關所詰蓋以此牟利者有年矣公立訊之皆遂寧潼川間人為給資各還其家或請發其事公曰不可究也惟責而遣之城素無井筧水于山杜少陵所謂白帝城西萬竹蟠接筒引水喉不乾者郡失于葺或課民以錢詹事王公十朋嘗縱民取水目曰義泉公修王公故事又增治焉市人歡呼相謂曰二公豈伯仲耶其他營繕非一先賢遺跡如子美髙齊之屬皆以餘力一新之施黔珍三州與南平軍地接生夷而思州則田氏世襲撫御尤難有何思明任鬼師楊震穆㑹等皆豪族動輒疑阻牒訴纍興公化之深得其道宣布威德譬曉禍福揭示要束至或親致尺書思明投牒乞藏榜于家傳示子孫楊震得書感泣飲血盟誓邊境帖息公遇事敏明臨機善斷戢吏至嚴莫敢仰視聽訟之際反覆究問誠意具孚無不退聽者既而有伉儷之戚亟請祠祿遂移永嘉赴闕奏事上意欲留惜公已衰矣到郡篤志從事不少懈而疾已不起實二月二十五日也娶同郡成氏封宜人柔淑孝謹克配夫子男三人曰星郎未名而卒曰有大通直郎福建路提舉市舶司幹辦公事後公九年卒曰正大文林郎新處州軍事推官女三人長適朝請郎中書門下省檢正諸房公事周舜元次適承事郎汪大有一幼亡孫男十一人坦域埴缸垍埏垓圻餘未名坦埴將仕郎女八人其一適進士孫瑜餘在室曽孫女一人淳熙元年正月九日葬公于奉化縣忠義鄉之瑞雲山太師墓側公事親至孝少時所得成夫人奩具悉以奉太師居喪哀毁盡禮有人所難及者記問絶人博覽載籍當宣政間舉子惟務金陵之學公獨貫穿經史旁出入百氏至老未嘗釋卷賓客相對諸子侍立奧篇隱帙隨意舉似以探其學問之進否後生多親附之舍人朱公翌嘗問侍郎周公綰曰比見表中用一驢載都市事偶忘所出周公素簡默僅舉一二公適參坐又以目公公厯誦臧質傳中數十語二公歎賞不已又歸以勵其子焉作文雄竒操紙筆立就若不經意而語多警拔諸公銘志類出公手有厯山集雲安集奏議告䝉資治編年宏詞集要䕫路圖經等藏于家其他不及屬藁散落甚衆人雖以公不作文字官為恨然崇論宏議日月獻納亦有以少伸素志矣立朝典州威望凜然而待人接物卑牧已甚閒居客至應酬終日倒屣延納惟恐其後朝章野服顛倒層疊人人與之傾寫略無倦色士夫無不愛敬下至閭里聞風悅服疏財好義不計家之有無義所當為無所吝惜四明舊為義郡顯謨汪公思溫為之主盟汪公殁公實繼之緩急叩門視所請曲為之經理故鄉人尤歸心焉亷節傳家他無嗜好俸給之外一毫不以費公帑在䕫首禁科買狨麝之類仍以公移鏤版遍滿山谷有以書求市者則以墨本寄之永嘉軍卒百工咸具公一切罷遣服用所需必面與之直至或倍償人謂其過而行之不疑故治溫未久病告幾半而喪行之日百姓巷哭以過車非德之感人者深乎僚屬問疾臥內見公几案蕭然鎮紙以甓皆歎息而退初治入蜀之裝于建康有以白金來售者曰以此西上當有倍蓗之獲公曰不幾于商乎止以緡錢行比歸日輕舟而下以餘錢自隨人愈咨其清方家食時未嘗忘國事凡所聞見必詢究講明務求可行之實蓋其志尚如此及膺進用期不負所學以報主知去不以罪人猶望其再入也終不得究見德業朝野共惜之病且革二子以藥進手格之去靜默焚香宴坐自如上章休致處畫家事若平時及屬纊不怛不亂翌日入斂肢體和柔如生皆積善之報也鑰汪出因外家以拜下風自蚤嵗辱知奬間置坐隅匪怒伊教殆非一日公將泝江鑰以假吏之燕㑹别于金山客授永嘉公適來守尤得窺治行之詳公之二子不鄙以行實見屬自惟荒淺不足以稱下筆復輟者屢矣壬寅之夏提幹公一疾不起殊使人有愧于泉下今推官又以為言乃取所聞見敘次之以俟當世君子立言者採擇云國子司業王公行狀曾祖景章屯田員外郎贈金紫光祿大夫祖真臣朝議大夫致仕贈銀青光祿大夫父俱左中大夫充敷文閣待制致仕贈光祿大夫公諱速字致君姓王氏上世居大名蓋三槐晉公之别派㑹河決遷墳墓于洛髙祖贈吏部尚書軫徙于陳之宛丘建炎南渡待制再為户部侍郎終工部尚書寓居越之餘姚今遂為餘姚人公幼警悟絶人書一讀輒不忘建炎二年金人破宛丘公年十一被虜能以婉言脫禍至幽燕久之㑹調發騷動脫身走河朔復歸宛丘日為南河計嘗默寫舊所記論孟六經爾雅教受汝潁間時作歌詩蓋未嘗一飯忘君親也紹興八年中原戍兵有自拔而南者公與之俱遂達行在所自是益耽玩書史一試入太學在諸生間已知名二十五年以尚書郊祀恩補登仕郎明年春中銓試第一循右修職郎特差兩浙西路安撫司准備差遣未上丁尚書憂服除監行在雜貨務雜賣場門樞密使汪公徹以御史中丞宣諭荆襄辟差充湖北京西宣諭使司准備差遣汪公素聞公名事必咨焉公亦不為茍合嘗坐中得蔡捷賔僚相賀公獨歎曰蔡人塗炭矣聞者甚之公道所以然者已而果然汪公既歸宴僚屬亟稱公論事不茍舉一巵屬之訖事特改右承奉郎幹辦行在諸司審計司隆興改元中進士第明年赴計院上問北方人材于尹侍御穡尹以公對忽有旨引見公奏對雍容上喜曰早晚當用卿退除御史臺主簿越七日遷監察御史時金人再窺淮甸朝廷旰食公與同列奏疏曰昔婁敬勸漢祖都關中張良亦勸之是日車駕西都長安趙充國上書請先誅先零六月戊申奏七月甲寅璽書報從史臣書髙祖事必曰是日書宣帝事必著日辰者皆表其從善之速也夫遷都大事也即日啓行金城去長安遠甚璽書往返僅七日應機如此事何由而不成今天下事急矣臣僚所言不可用則置之或有可采願陛下逺法髙祖宣帝斷以必行不俟終日庶乎不失事機又嘗奏論西邊上流形勢詳陳備禦之䇿凡五條大略為將帥不和務使輯睦士卒寒苦宜加勞賜益武昌舟師以張黃州之勢分兵戍郢州以防荆襄之衝且請多方疑誤敵衆使不得專意襄陽又奏疏條上急務願下哀痛之詔以收人心選宰相之賢以任國事出令必由三省則命令專一且絶姦人矯僞之萌諸將小衄不聞則必致誤事寧開功過相輔之科因極論大江而上我軍單弱乞詔沿江諸郡守臣從宜措畫一面施行以一上下之力是時宿將如李顯忠卲宏淵趙樽姚仲之徒猶有居閒者公一一條其才用有以貪殘得罪者乞加抆拭以收其死力且言姚仲舊在川陜曾將燕北兩河歸正人號赤心軍以保川蜀今江上歸正人不無危疑宜令姚仲將之以聽督府節制每一進說上皆嘉納十一月擢右正言陛對之日首論擇相之難且言專取親舊排斥異議官義制之人于有初之地置循默之士于必進之塗樞密院之權反奪于機速房尚書省之事不關于左右司皆宰相之私也次論其釁未已科擾騷然羣盜根芽姦宄不禁宜詔守宰行寬政務實惠安固羣心以靜邦本次論講和有三可疑且請督師不專于持重諸將不專于分守悉遣鋭卒以順攻逆以主待客各為决戰破敵之計此聲一出雖未必交鋒敵人聞之知吾有備和亦在其中矣次論陛下以願治力行之心憤衆事之不理慨然更革令欲必行人情或有不安終至廢格不若責當言者使之言擇其當者明坐其人之奏請而舉行之或有浮議責有所歸若其可行利興害除善聽善用之功歸于陛下矣是時朝公公武為侍御史一日與公同條具急務利害翌日得㫖朝某理財之說最長除户部侍郎公入奏言臣就朝公武家同草奏疏同銜奏入內殿又同奏陳公武既因此改除揆之義分臣不應獨留言路願繁劇自效上賜御筆曰卿方守諫職且朕親擢不須引嫌辭避繁劇之任當俟異時勿復再有陳請上意隆渥且將進用㑹論館職免召詔試非是忤執政遂除吏部郎官供職一日力求外補除直祕閣知鄂州尋以母老丐祠主管台州崇道觀乾道三年除知台州㑹永嘉闕守執政以海溢之後艱其選擬試郡有績效者五人上曰近嘗令王某守台州未行此良吏也遂除知溫州既至一意摩撫寬猛適中除積歲無名之求罷廚傳不急之費公未嘗更州縣而公庭無留訟屬邑無吏迹雖老于吏事者不逮也水利多廢得內帑錢二十萬盡心力而為之擇縣官之能者總其事召鄉之士有才幹者董其役如朱浹埭瑞安塘路石岡斗門功役浩繁皆不日而成民蒙其利災傷流移之餘歲事屢豐士民怡愈遂為樂土郡人畫像于州之普覺寺祠之至今樂清縣令顔大松邑事整辦豪右不得逞相率誣訴于部使者公審其無罪辨之事至臺省朝廷為差理官就郡訊鞫公又執前說使者憤其異已併按公黨蔽贓吏人皆為公危之獄成令果無事始服公之守正不撓四年改荆湖南路提舉常平茶鹽公事丁內艱服除提舉福建路常平茶事公奏陳常平以陳易新之法甚備上令先行之一路公乘傳至部敷諭聖意約以檢校之期親行按觀弊蠧隨革從行不過數輩所至靜謐遇僚屬之賢者一見即薦之求者弗與也裁節浮費公帑積二萬緡以其半入建寧府庫充常平本錢九年丐歸主管台州崇道觀淳熙改元除荆湖南路轉運判官明年入對上迎問曰卿去國有十年否公對向蒙陛下擢從冗官俾任臺諫分符察州十有二年恨無報效上曰毋往湖外且將用卿公奏天下之士口有至公之論而中有至私之情願有以絶覬覦塞流競舉無遺賢劾無佚罰則人無所容其私矣遂留為吏部郎官三年遷軍器監嘗因輪對奏言管子曰人君修官上之道而不言其中人臣比官中之事而不言其外又曰無代馬走使盡其力無代鳥飛使弊其羽翼此言深責成效于臣下也願陛下使羣臣各居其位職任分于臣下之所趨誅賞操于人主之獨斷日省其事歲考其成小大協心以張國勢又奏紹興以來軍器先閲于本監官然後赴部旬終進呈近用御筆軍器非進呈不得出所自此止是文移往來更不加考察臣以為職與事合則功罪可稽事職相離則誅賞竝廢欲乞略依故事仍令監丞旬月就本所察其美惡不為虛文丞二專主親臨監部總其大綱有不精詳無敢逃罪十月差充大金賀生辰使接送伴使舊例宰執具郎曹而上姓名以進上獨遣公調護使客了無間言往回奏對益稱上意四年秋國子監試進士上舍考官以子弟預上舍試引嫌自列特㫖别開院以公持文柄鑒裁精甚士論稱愜至九月遂除國子司業公在學校久士子素所欽服人情翕然謹守規繩始終如一公嘗得暍疾至是復作謁告未滿求致其事遂以五年二月二十八日終于官舍享年六十有二纍官至朝奉郎娶張氏故知漳州轔之女子男一人中行迪功郎前明州慈溪縣主簿孫男一人大臨將仕郎女一人公性孝友尚書治家嚴整子弟小有不謹正色視之公一兄二弟相繼蚤世公事尚書無闕者居喪盡禮後雖寖顯輿轎出入不敢就廳所避尚書之舊也迓吏到門一不改度母文安郡夫人黃氏生公旬浹而歿痛念終身語輒泣下遇外家特厚繼母河南郡夫人宋氏撫公于齠齡中以至成人事之尤謹尚書捐館之後率循家法加詳悉事寡嫂孤姪內外斬斬無一毫之私遇父母諱日潔齊兼辰哀動左右奉塋域及四時之祭皆可法也少歷艱苦通練世故慨然有大志不為無用之學䆒極事變著明利病動數千言初登第時張魏公方鋭意進取公上書辨論以為無規模而決大計以天幸而希成功魏公不以為忤曰正欲各出所見後省率如公言既居言責當國家多事知無不言居憲臺百日諫垣三旬而前後論奏數十上皆切中事幾有人所難言者以遺補舊人再入為郎稍遷監長士論為鬱而公處之恬然出公門入私門貴近未嘗識面旦望一見政府不請間也天資素髙而力學至老不少衰黎明誦書數十過而後盥櫛日常以六經羣書至文選韓栁李杜詩文大率成誦暇日正坐默誦左氏傳一字不遺尤通貫漢史嘗辨班固抵牾為西漢決疑三卷補注杜詩三卷編集南北戰爭事實為南北龜鑑詩文至多少作皆棄不取存者尚十卷為監門時姚令威寬嘗有所遺忘折簡問公答三百餘字皆史傳全文姚問所遣介云就筆揮答不見有所閲也姚大驚服尹朝同居臺中一日有言蓄鵝于陸者入水輒沈下公曰是必以豆飼之客曰然因引嵇康養生論豆令人重之語二公歎曰公記問可謂精博姚與二公皆號該洽自以為不及也自少才氣不凡方赴銓選時張公綱為禮部侍郎吏持銓榜來張公遽曰魁非王某乎吏曰唯同列怪問之張公因盛稱公才學之懿非第一不可其為前輩所期待如此為文務極本源謂近世學者多茍膚淺其教子弟嘗曰欲為文必自先秦文章欲為詩必自三百篇以及騷選唐人欲作字必自鍾王諸公故公之詩文皆髙古字畫有水墨積習之功尤精小楷手抄書盈溢巾衍首尾遒整開卷粲然對賓客宴笑髙談雄辨援据詳明率傾其座人晚頗務簡默叩則應明理益深聞者悚歎居家自奉甚約間以其餘賑宗親之不給者春夏間傾囷廩所有下其直以糶一邑米價賴之以平乙酉大饑為粥以食餓者里人勸率全活甚衆考公之平生以世家子淪陷異域脫身而歸力學自奮兩薦上庠不上第又以上書得罪權臣閒廢十八年不預世賞年且四十才得一官暨登一科不兩年居諫省未幾去國更憂患浮湛久之一旦天子引以自近且貴矣曾不得一在言語侍從之列齎志而殁士大夫無不痛惜兩學諸生哭之盡哀又相與祖祭于江干者數百人行道嗟呀以為未有也中行既以五月二十八日葬公于縣之雙林屬鑰狀公行事將以求銘于立言之君子鑰不肖公以兄之子妻之又為癸未同年進士公既撫兄子如己出且不以子壻遇我其敢以固陋辭謹托平日所親見聞于公者具如左謹狀直祕閣知揚州薛公行狀公諱居寶字云華世為明之鄞人曽祖辨故不仕祖唐纍贈右朝議大夫父朋龜故任右朝奉大夫知衡州纍贈通議大夫通議公以儒學起家純明簡靜鄉黨尊敬之公自幼敏悟風骨魁梧通議公期以遠到受致仕恩補將仕郎初任福州長溪縣東尉任滿循從政郎尋以監賞改宣義郎知湖州武康縣始至延父老問疾苦一以仁厚遇之追科不擾而集庭訟益稀民方喜公之政而遭母淑人王氏之憂以歸服闋差主管臨安府城南右廂公事南廂户口十四萬最為劇繁公手決訟牒了無滯礙有武辨安儼者其母嘗充掖庭怙勢橫恣公曰此而不懲是箭張禁酒趙放復生于今日也列其姦狀于府府上其事有旨鐫秩免官徙之他郡有府胥持公移造庭下肆言慢侮公以為如此何以助彈壓杖而遣之吏部尚書薛公良朋時帥臨安喜公臨事靜厚而能不畏强禦二車有闕必使攝事事多咨訪焉工部侍郎姜公說為漕副當乾道初間都下大疫漕以上命遣府僚視民疾苦惟公傾醫家至議疾賦藥醫不敢欺所活最多于是帥漕共以公績上聞被旨候任滿日升擢初四明海多盜户部侍郎趙公子潚以龍學出守復制置司以鄉兵分委士夫之里居者公曰是畦下也緩急何可用乃即遠郊勒兵以法教之坐作進退之節是時舳艫雲集而篙師輩無所用心日遨城市公獨率所部與之期而肄習之一日趙公按視公所轄百艘沿泝奮迅餘州為之辟易趙公亟稱之及任都廂曰諌大夫尹公穯出使東浙措置海道雅知公諳練辟以自隨焉授臨安府通判未赴任間㑹曽丞相懷以户簉領榷酤始議併二十一庫為七思得通敏靜重之士為之屬遂辟公為主管文字當併省之初羣失職者不樂浮議橫出欲挽取之公洞究弊源隨事更革不見其迹又能調娛上下以迄于成課入增倍至今行之公之力為多權發遣興化軍始至庭盜跖充斥吏或請分曹以治者公不聽親閲而審詰之往往得其情窮教令之黨嚴妄訴之罰處決精當訟者悅服郡以辦治興化士子盛多而學宫隘陋弗稱教養公為之建傑閣以庋御書崇齊宇以安學者廣書籍備器用奕奕一新有浮屠自謂遇金仙得咒術有疾者飲其水或愈愚民相扇所在城市財施日積旬月間纍百萬公聞之曰執左道以惑衆罪不容死弗忍究也逐浮屠境外悉以其資歸之學多士韙之郡圃嵗入苧麻以為太守圭租公視地狹不足以出此則曰朘民以自厚非吾志也立罷之就除提舉福建路常平茶事公以為監司自有體簿書期㑹固不可慢而非政之先頗以激揚為己任甌寧尉執盜謀賞㑹公攝憲疑其附㑹摘獄辭之隱以折之獄吏詞屈具得尉曹姦利之狀移官審究則良民也駮正其事而散遣之朝廷興修水利公驅馳川谷不憚勤勞所在必集故老與鄉之秀者考言遺迹一一疏濬吏受成規奉行惟謹循行諸郡約省騎從不以聲勢臨人或不知為部使者也公除郡時少保陳公當國自喜為鄉邑得賢二千石且道主上選擇之意及少保帥閩公方持使節至三山糴價翔踊公還建寧發常平粟萬斛順流而下少保公難其神速尋除廣南東路轉運判官力丐奉祠王管建寧府武夷山沖佑觀秩滿赴都堂審察得㫖內引公力言常平虛數水旱無備請盡洗宿弊與之更始又言閩中部綱公取夫力之費所至輒起夫騷擾以為常請一切禁止上嘉奬留為倉部郎官既而升郎中漕粟都至有折閲者所司括責逋負之人聨以修垣百十為羣徒困笞箠而無所從出藍縷枯瘠無復生意公憫其然為同長二奏請令漕司下所屬償納囚繫一空鼓舞而去淮西漕闕有以公姓名薦者遂除淮南轉運判官兼提刑提舉即日獨班對便殿臨遣甚寵面諭兩淮事宜委以城險要浚池隍又將立倉廥以豐塞下之粟且曰勉力辦職朕不忘卿公感激受命即日引道至治所府庫枵然公訝其已甚及㑹出入之凡則嘆曰用之無節安得不匱吾知所以治之者矣于是汰冗吏罷不急補罅導源時取而約用之蠧弊之迹剗磢殆盡漕計始優一意屯田事修築塘墟廣募種藝又以其餘資修無為軍庠校遂為淮右之冠興利除害纎悉上聞主眷既渥隨即罷行安豐軍光州舊有忠勇軍水寨不隸漕司上以公肅靜有謀併以委公陛辭之日上親語公漕司所造弓弩就令和州築屋貯藏公檢閲其目虧數尚多亟為奏審御筆仍令增造公不以纎毫擾州縣而如期辦集樞府上其勞特轉一官淮東謀帥上因公奏陳邊事深嘉之即以公知揚州淮地被邊狗鼠之盜雲合鳥散無所踪跡邊民多苦之公設醲賞置耳目取其尤者明正典刑窮治囊橐之黨疏其姓名而揭之市羣盜屏迹外户為之不閉淳熙庚子旱既太甚公以禱禬勤勞蔬素日久遂得下痢之疾郡民日到庭問公起居以安否為休戚閲兩月竟終于郡之正寢十月四日也百姓為之悲慟士夫亦傷惜之纍官至朝請大夫嘗以職事修舉除直祕閣娶朱氏封宜人男六人長揚祖迪功郎特充淮南東安撫司書寫機宜文字次佑祖以國子入太學將受公遺澤次循祖懷祖延祖述祖女四人長適進士汪閎中次適承務郎新監兩浙轉運司明州造船場王克常次許嫁將仕郎劉安正次許嫁通仕郎徐睎䕫公稟資寬亮而能濟以嚴遇事明察而不流于刻自奉甚約而未嘗嗇于人性不喜酒居官未嘗夜宴視王事如家事惜官物厯官三十年了無玷缺以緩急叩請者割俸以周之維揚公帑負民錢積數頗多公到郡捐私財先為償之遇事有可疑而難辨或以非意相干必退而深坐思有以處俟其心平氣定徐起而應之故未嘗失色于親舊事亦無不得其平者平生多巨公奬豫更為汲引馴致宦達晚結主知親擢閫寄士夫不惟以公之才業應有以得此且謂公竒龎沈毅福祿未易量也而年止五十有八不得盡其才用嗚呼天耶諸孤以九年六月七日葬公于奉化縣志義鄉雙各㠗之原從新卜也鑰母于公為中表鑰視公為諸舅行平時相與素厚公之諸子以公之行事屬鑰編次因紀其大者如右謹狀攻愧集卷九十
