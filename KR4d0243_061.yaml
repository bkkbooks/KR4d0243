body:
  text: 宋樓鑰撰啓謝發解啓決戰文場喜鏖大敵策勳計版幸綴羣英心既歉然顔之厚矣竊以真主嗣臨于萬國宸心經略于中原正紫髯將軍撫劍之秋豈白面書生鼓篋之日然用武必有文備當修德以來遠人況一士可以止百萬之師寸舌可以賢五千之騎搴旗斬將者特匹夫之勇敦詩說禮者乃元帥之資丁字徒知固難處强弓之右毛錐可用當爭雄大劍之間得奇才自足有為用真儒必將無敵爰命郡國選修潔之士且使鄉遂獻賢能之書廣數路以取人才詔直言以增士氣將取布韋之賤以為將相之儲草萊期王佐之才畎畝任天下之重坐使有志之男子羞為無用之陳言附鳯翼而攀龍鱗咸起功名之願擢犀角而拔象齒始膺藻鑑之求如鑰者賦性棗昏受材樗散幸家聲之未遠冀世業之永傳誓收黃卷之功益振青箱之學十載空隨于舉子一言未售于有司良弓之子必為箕有自來矣吹竽之門而攻瑟如不好何欣逢不諱之朝深惜難逢之㑹一鼓作氣已為勝敵之謀三年不鳴期遂驚人之舉及奏功于里選僅厠迹于行間雖叨鶚薦之書猶愧鵬飛之化沙礫已甘于在後駑駘敢望于爭先靜惟賤士之拔茅實賴大人之推轂兹蓋伏遇某官才髙今古名壓搢紳久居喉舌之司臥治股肱之郡愛民如子惟忠厚以存心遇事生風信精神之滿腹天子思大夫之國器布衣求吏部之門生遂使庸愚亦預掄擇鑰敢不益嚴筆陳力淬詞鋒敵無畏于萬人霸當成于一戰鵰在秋天之外已借髙風魚掀春浪之中更資餘澤謝省闈主文啓薄技中程豈謂單辭之誤上恩從厚猶霑末第之榮靖言僥幸之由實自生成之力德無所報感不知言竊惟選舉之公本朝為盛科條之備今日尤嚴凡羣試于有司當首遵于成法未問詞章之工拙先觀品式之從違苟有一毫之差必為終篇之纍惟時公諱尤異常規雖在祖宗不致山川器幣之廢然為臣子當明滸勢秉機之嫌著之甲令以謹臨文之疑揭之棘闈以備入門之問倘律度之不中宜衡鑒之弗容自非詞華驚絶代之工議論如古人之正又安得特加抆拭曲賜甄收既寬司敗之誅乃玷主文之選如鑰者伶俜無取坎壈數奇猥承簪紱之餘期紹箕裘之業念踵登桂籍者已三四世而不書鴈塔者幾數十年幸兄弟之聯飛喜門庭之稍振願修世學益大家聲濫由鄉老之書來赴春官之試孺子不謹嘗約日而後期窮鬼為妖復轉喉而觸諱問山犯名之二者猶有不學之愧書馬與尾而四者尚懷譴死之憂矧明見于條章乃自為于鹵莽深慮布韋之賤不勝鈇鉞之誅敢謂巨公曲成孤迹略去片言之失力收一日之長委墮甑于道中已甘絶望取焦桐于爨下實賴知音既援例于先朝遂飛章于清禁異恩俯及同輩皆驚雖不能豪奪于錦標然固已寵踰于華衮三神山上人憐不及于鼇頭千佛經中自愧得陪于驥尾退量叨冒良有夤緣茲蓋伏遇某官正始名流開元故老公車讜議與秋霜烈日以爭嚴召驛重來快鳯凰景星之先覩假道蓬山之上主盟蘭省之中凡屬品題莫逃藻鑑雖小善之占必以録盡收天下之英雄而斯言之玷不可為尤費筆端之造化遭逢若此稱報謂何鑰敢不痛自激昂益加詳謹對千人而不犯願尚友于先儒號一莊而復荒肯下同于流俗誓損頂踵以報丘山謝試中教官除溫州教授啓就試棘闈復售綴文之技庀司槐市誤叨分教之官慙無黃絹之好辭偶中青錢之妙選幸踰望表愧溢情涯竊以庠序之興人倫是賴郡國皆立王化尤先僖公能修泮宫致一時稱其多士子産不毁鄉校蓋千載以為美談在西漢李唐之盛時有文翁常衮之循吏變蜀郡如東魯至司馬氏而昌其文化七閩如上州有歐陽生而為之倡是知自京師而首善亦必崇鄉黨以勵賢惟我皇家歷參古制開學宫于四海延師席于諸儒慮擇士之或遺復設科而俾試考之經以察其識命之賦以觀其材人寡鑒精禮優選遴欲中有司之意必兼舉子之長如鑰者術業空疏詞章骩骳受過庭之教敢言匡鼎之解頤衡匡廬之匡皆作康今更正案原集避宋朝廟諱凡匡鼎匡習雕蟲之工難及溫生之叉手比幸登名于蘭省夫何困迹于銓曹念舊學之未蕪幾此途而妄進操觚染翰是皆已試之才斂板趨風咸望非常之遇顧如孱質乃預英游方期六鷁之退飛敢謂雙鵰之連中獲離場屋之餘習復逃州縣之徒勞載維永嘉實名東浙鼇頭屢占在紛紛白袍之間黌舍宏開無青青子襟之廢苟非儒匠難主文盟好為人師素守孟軻之戒此非子坐恐招有若之譏念得寵之過優復去家之不遠無非僥幸端有夤緣兹蓋伏遇某官旋斡化權主張吾道內治外治既陶萬國之泰和小成大成仰贊一人之化育善類悉歸于真宰危蹤尤纍于洪鈞久憐書馬之愆欲收置于門下茲試不龜之藥偶獲預于選中亟畀除書實由大造鑰敢不益堅素履無負初心學不如務師曾何知于善誘教然後知困顧敢忘于自强庶上副于眷知以少圖于報效回交代李教授冰啓州教授任內以下十五首溫陪鴈塔之題恍如昨夢叨鱣堂之選猥繼後塵荷委貺之洊臨愧馳緘之已後恭惟某官性天夷曠才地髙明筆陳摧鋒得雋膠庠之彥儒林振藻飛英俊造之科尚淹三館之遊俯作諸侯之客一方士子固已樂吾教中當路薦書皆欲出我門下倚聞嚴召徑挹超除鑰託契已深承顔不遠此非子坐正慙溫故之稱必有我師全賴告新之益通添差教授王太博信啓賓興鄉國曾叨推轂之知客授侯邦尤得摳衣之便撫躬甚喜剡牘先之恭惟某官賦軋兩都名髙六館文章攀桂再登俊造之科閶闔排雲首上治安之策詔開言路章交公車英詞獨徹于細旃褒語寵踰于華衮先生入太學方將育天下之英才廣文獨冷官何乃為諸侯之賓客俯從新制大屈公言風引仙舟雖覺三山之暫遠雲垂鵬翼㑹看萬里之橫飛鑰少欲傳家長而懵學閉門覓句初無虀臼之稱仰屋著書空有醬瓿之誚頃藉鶚章之薦遂叨鴈塔之題不知七年待次之遲但喜一旦同寅之幸豈止日沾于膏馥要當力踵于步趨既非中行待我以衆人方謹舊恩之報如使西河疑汝于夫子難逃良友之譏通太守曾吏部逮啓恭審疏寵宸庭承流侯服凡居庇幬罔不欣愈竊惟左浙之奧區獨以永嘉為名郡人才秀發接王謝之風流城望雄尊控甌粵之衝要海物惟錯生齒日繁屬嵗事之多虞致天災之代有颶風駕浪萬衆為魚烈火焚廬一昔而燼八潦七旱田野無以為生九牧十羊吏民疲于奔命闔境告病淵衷顧憂正藉虞升卿為開錯節不有龔渤海誰治亂繩既入奏于明光諒疾驅于逵道恭惟某官乘珠照夜衡玉懸秋學自得于家傳美蓋由于世濟矧惟我宋衣冠之盛無如曾氏閥閲之髙閩嶠勳名藹相門之清議南豐術業擅昭代之詞宗未若于門卓稱江左弟兄輝映競馳雲間日下之名門户熾蕃遂為澤底岡頭之族顧如偉望立上要津早瞻使者之星來近長安之日握蘭密勿銓衡無同滯之嗟聽棘平反囹圄有屢空之效暫從均逸亟畀于蕃將使官府復見于太平閭里盡銷于愁嘆報齊國之政諒無五月之淹趣曹相之裝即聽三公之拜鑰學不知道才非愈人偶霑末第之名濫作諸侯之客敢圖㑹遇獲事賢明歡寒士之顔願託千間之厦順下風而請敬持一瓣之香通太守莫給事濟啓恭審榮膺宸誥起鎮侯邦瑣闥需賢將復甘泉之舊左符共理暫為滄海之行先聲所加衆聽皆聳恭惟某官學該四部文擅兩科渾然金玉之相凜若松筠之操經綸自任直將舉明主于三代之隆雄挺不回信能立懦夫于百世之下韜藏既久聞望益髙獨由直道以致身自結九重之知已紬書東觀徑躋瀛洲學士之聯典奏南宫已有鳯閣舍人之樣上方修明號令鼓舞華夷爰念制詞思復深淳之體肆求卿列首推宏博之才俾代豫言仍參內相大述作多出其手豈惟復見常楊近詔誥自為之文端欲上規姚姒還直螭坳之祕進趨雞㦸之嚴更藉剛方之資為專封駮之寄危言造膝嘗有志于回天徑氣逆鱗曽不難于去國坐令時論之推重惜無諌列之拜章退安香火之祠自得林泉之樂惟永嘉之古郡實東浙之奧區乃命承流以遂均逸一麾出守肯為顔步兵之詩五馬自隨姑尋王右軍之舊矧高門之名勝著此地之聲華南院世官猶有甘棠之遺愛阿連客授尚存絳帳之餘風自聞成命之肆頒惟恐使君之來暮山川攺觀城郭增輝地控甌閩正有資于韜略道傳伊洛尤仰賴于範模第恐廊廟之資尤被冕旒之眷賜環在邇豈容皂蓋之行春視草居中復見金蓮之照夜遂聞大拜以佐中興鑰學不知方才非可用末科厠迹自憐書馬之愆再試得官人笑畫蛇之贅敢恨八年之家食第慚多士之主盟好為人師真成不韙此非子坐日懼弗堪仰千騎之鼎來幸二天之在望飛鴻遵渚咸歌姬旦之歸兮泮水采芹猶喜魯侯之戾止通邵通判範啓别駕功髙夙仰聲華之茂廣文官冷幸依庇䕃之餘念行遂于趨鳧顧敢稽于饋鯉恭惟某官風儀峻整政術髙明試以劇煩井井有條而不紊遇諸盤錯恢恢游刃以有餘矧是永嘉甲于東浙地望控甌閩之要人才承王謝之流正資賢治中以佐明太守撫摩凋瘵振起教條稔聞五月之政成盡出二車之力贊少舒驥足不妨風月之平分入簉鵷行㑹見雲霄之獨步鑰才非適用學不知方雖記問以尚疏在淵源而何有謬司芹泮偶及瓜時樂英才而教之固知非據事大夫之賢者尤得所依通趙通判公侃啓題仲舉之輿凜先聲于海嶠開馬融之帳竊大庇于雲天仰德既深遡風知幸恭惟某官派分銀漢秀挺瓊枝撑腸富萬卷之書落筆掃千人之陳儒科振藻仕路蜚英非錯節于笑談破大觚于俄頃歌合江之桃李邑人猶見于去思依上幕之芙蓉府主但聞于坐嘯眷茲名郡密邇行都屬頻年有饑饉之災況比屋被焚漂之酷公私窘匱民吏倣徨方欣郡政之一新更喜治中之鼎至湖樓風月豈惟景物之平分春草池塘㑹見精神之頓攺來播海沂之詠佇歸禁闥之班鑰才不及中學非語上淵源無自敢謂好為人師教導未明政恐此非子坐不圖幸㑹獲在帡幪闔境傾心想望二車之風采冷官修敬預通記室之姓名回錢録參佖啓久矣向風恨無半面之雅茲焉聯事幸逢三語之英拜履非遙捫心知慰恭惟某官清姿冰潔奧學淵深玉斚瓊彝壓倒千人之筆牙籖緗帙讀殘萬卷之書淮山小試于梅仙海嶠更煩于阮掾獄市無擾長賦池塘春草之詩兄弟聯飛行繼鵰鶚秋天之武鑰家傳雖久客授何堪喜聞都騎之來遂竊靈河之潤朋緘委貺驚珠璧之暗投短牘陳誠愧瑤琚之匪報回瑞安胡縣丞啓一行作吏敢興獨冷之嗟再轉為丞喜見真清之彥髙詞先辱謙德有光伏惟某官澤底名家雲間妙譽仕途詳練兩淹黃綬之司薦口瀾翻果上金閨之籍謂宜闊步徑登要津稱雨道晴又聽下邳之論事哦松掃竹不妨藍水之風流預想登仙由兹假道鑰宦遊無取客授何堪騎氣方來書一本攺氣為驥誤案騎氣見史記天官將快爭先之覩緘書敬遣少陳未見之心回陳司户僖啓芹宫客授慙博士之不治槐笏宦遊喜參軍之稱絶聞風久矣拜賜歡然某官理窟精深詞源淵奧早射廣庭之策合窺藏室之書誰謂偏州乃淹賢掾俸錢寡狹固非京兆念珠曹吏事精明共看琰之霹靂手髙才如許迅召何疑鑰行遂同寅庶幾承教日候入疆之告忽驚將命之臨廣文冷官雖有聲名而何用孟公尺牘但知藏弆以為榮回前寧海沈主簿興傑啓第後駮放不復仕沈在秦師垣館下登竊伏海隅久壓斗南之譽宦游仙里屢聞月旦之評首勤車騎之臨門更有文書之銜袖勞謙過矣自視缺然某官涵泳聖涯翺翔藝苑振三都之鼓吹韻五典之笙簧漢閣招賢貴人欲出我門下堯階賜第天子謂入吾選中一官猶恨于棲鸞萬里忽嗟于退鷁雖當邪正初分之日乃有疑似難明之人顧得喪苟無愧心雖聖賢未免流議沮魯如臧氏之子能使豫不遇哉于齊主侍人瘠環好事者為之也科第空傳于拾芥功名髙視于浮雲收還四海之虛聲自作一鄉之善士尋伊洛之故步窮洙泗之遺經仰屋著書期立言以俟君子閉門覓句推殘膏以丐後人坐歷十年事更幾變沈舟而閲千帆之過翦翮而看百鳥之翔公論自明識者增歎紛紛餘子蠅營雖見于復還落落髙懷馬喪安知其非福然而休期難再大器晚成毋忘結綬之心當起據鞍之志鑰晚生無似客授何堪久懷望履之私未遂升堂之快掩關卻掃素欽靜退之風忘年定交猥及庸虛之子焉有瓊瑶之為報但驚珠璧之暗投誦廣文官冷之詩喜遇同襟之客讀東陽郊居之賦㑹求撫掌之歡回永嘉徐主簿總啓孺子名髙方屈臨于簿領廣文官冷乃先辱于緘縢摛詞粲然為禮過矣伏惟某官學耽八索識洞九流提筆以赴文場前無堅敵彯纓而遊帝所自致巍科精金百鍊而愈剛良玉三獻而後售宜在瀛洲之選往觀藏室之書俯就鸞棲尚淹鵬運髙士不為主簿雖曰徒勞君子不卑小官何妨行志㑹聞妙擢徑上要津鑰晚出無聞散材焉用黃卷自樂豈敢好為人師絳帳方開正恐此非子坐獨幸佳郡素多賢僚匡衡鼎來可共說詩之樂鑿齒一詣便勝讀書之功回瑞安林主簿啓宦游伊始方淹枳棘之棲客授無堪徒愧蒹葭之倚先聲竦甚華翰先之伏惟某官人物粹夷天資爽邁寶甘棠之笏自有家風讀牙籤之書盡傳世學小試勾稽之職倚看趣召之行鑰久矣聞名茲焉同事髙士為主簿固知公議之未平廣文獨冷官但喜疏蹤之有託回平陽李縣尉煥啓登漢庭之第猥繼英游訪吳市之仙更逢隱吏方謹先聲之伺遽勤華翰之頒恭惟某官學有本原辭無枝葉論議醇正所得蓋自于名儒氣貌粹溫不問巳知其長者騰踔合登于要路酸寒乃就于尉曹不容警捕之淹㑹膺召對之寵鑰家傳雖久客授何堪逢君子之僚巳伸素願篤年家之好尤激義風回郡庠職事啓冷官無取豈敢好為人師佳士有聞不當列于弟子伏惟某人性天俊茂才地髙明玉斚瓊杯壓倒千人之筆牙籖錦帙讀殘萬卷之書三年已見于驚人一第何足以慁子倚觀奮發自致功名鑰久矣聞風欣于識面辱貽書之加寵歎陳義之甚髙喜荷之私敷宣岡既通交代徐教授嘉言啓讀鴈塔之題久欽聞望典鱣堂之教獲與交承既慙揚粃之在前敢俟及瓜而受代通名伊始修好在茲恭惟某官學造聖涯文髙藝苑評彼處士孺子宜當為先求之古人有功未見其比能似鼻祖今惟耳孫既已飛英聲于千佛經中固宜追俊游于三神山上何為歷歲始就冷官惟此邦餘王謝之風而多士知伊洛之學正有資于模範俾益究于淵源君子之育英才是誠所樂諸公之登臺省㑹見同升鑰夙昧家傳偶叨客授望親庭于咫尺較吏考之毫釐日冀先聲得遂歸歟之志顧瞻清峙用寬仰止之心謝除刪定官啓投誠恩地倍煩大冶之陶鎔定法清朝俾預有司之筆削密附聲光之末親承約束之嚴榮喜交深凌兢冞甚竊以國家備百王之制章程垂萬世之規小紀大綱秩然有序奇請他比或以滋彰肆當核實之朝爰舉久虛之典宏開書局共議邦條上勤元老之尊坐總羣言之首假刪詩定書之目以名其官凡摩研編削之流可知其選豈容濫吹有玷知音如鑰者才不適時資非近道雕蟲何取謾成童子之虛聲書馬有愆幾作詞場之奇祟敢歎十年之不調但知三省以加工德之不修學方圖于為已斯未能信仕豈專于為貧乃因客授之行益究家傳之旨力考淵源之所自務求斆學之半功抱素志以自憐庶此生之不苟竟緣色養來叩化鈞璞三獻而孰知鼠五技而成拙屬正人之登用矜寒士之滯留謂當在藥籠中必欲出我門下誦佳句于百僚之上有味其言持長綆于千仞之艱不遺餘力卒令弱質亦入化爐雖知隔仙府之幾塵猶使及天朝之速化適承人乏獲厠英游自為之謀不過于此兹蓋恭遇某官主盟公道厚禮人材翊贊九重不顯彌綸之用精白一意曾何適莫之容然無私乃能成私惟不德是以有德如弟兄之不振荷造化之特深之遴顯以文之亨著以功敢言競爽公山用于前正禮擢于後實出殊私鑰敢不益勵廉隅進修職業舉數事以塞詔何敢自欺慕國士以報恩豈容弗勉回詹狀元騤啓清禁傳呼喜聞第一之選長箋委貺更驚駢四之工恭惟某官學富三冬才優六館馳雋聲于藝苑承一門詩禮之傳奉大對于昕庭為四海英雄之冠賢關增氣里社重輝盍從臺閣以問津㑹見功名之發軔鑰頃由殿幕先揖辭華待尼父于季孟之間愧文衡之非據舉公孫為賢良之首仰天鑒之獨髙敢意謙撝反為巽謝通浙東安撫李參政彥頴啓判台州任內以下九首通便親求外仰䝉化筆之餘二郡之官適在帥垣之下依仁有自禀令無譁敢修大府之恭庸效小夫之智恭惟某官爽邦哲匠名世真儒以平生不欺之心為古人有用之學澄之不清淆之不濁儼然公輔之資來非可招去非可麾卓爾朝廷之望至公待物直道持身辭色不以假人毁譽未嘗經意上以此信于人主下以此服于衆心久為朝夕論思之臣遂登夙夜宥密之任進參政柄實領宰司豈惟奉養之微曽不攺于儒素若其酬應之確了無間于戚疏苟曰才能各隨器使雖有浮競自應意消故國是不容動搖而朝列為之肅靖坐鎮雅俗遠追謝安石之賢共致太平咸望楊公權之相既明且哲善始以終出殿大邦寵分祕殿七州訟理民無恨于田里之間數月令行人自得于湖山之外雖少留于蓬島曽不遠于長安㑹聞衮繡之歸亟正鈞衡之拜鑰登門最晚辱眷惟深涉筆金科顧何知于八律兼官玉牒曾弗措于一辭叨陪典領之嚴備費生成之造㑹聞半刺許置外員幸下考之再書援新制而三請匪蒙深照安得此行望故里以非遙奉安輿而在即獲承菽水之養盡出丘山之恩展驥無堪徒以負丞而增愧見韓愈案負丞本改丞為乘不必從藍田縣丞㕔璧記一登龍未遂尚須假事以有行愛日方舒寒威將徑願為宗祊之重益精茵鼎之調通吳給事芾啓甘泉宿望久懷睎驥之誠别乘贅員喜有登龍之便敢修柔削以代先游恭惟某官命世偉人爽邦哲匠才雄萬夫而持之以正名滿四海而取之甚廉出入兩朝周旋三紀選部賴典銓之鑒瑣闈髙批敕之風劇寄屢分外庸尤著侯邦訟理民舉安于田里之間帥閫令行人自得于湖山之外掃蠧源而略盡清狡穴以一空不惟所去以見思抑使所居之官大乃守東山之志屢賡彭澤之辭均逸祠庭猶俾斯人之有望告歸神武直將與世以相忘容與千巖之中傲睨羣物之表凡烟霞勝絶之地皆杖屨經行之區下流水而上青山固知自適身赤城而名絳闕豈得長閒況資元老之壯猶將任舊人而共政丘壑臯䕫衣冠巢許民具爾贍股肱蕭曹腹心良平公其母遜鑰晚生無似薄宦徒勞涉筆金科倏更三載兼官玉牒弗措一辭惟父母之年益髙念菽水之養多闕偶逢新制適契初心得請治中將遂迎親之樂强顔員外未知二郡之方幸門墻之是依信典刑之斯在使獲附聲光之末如見古人倘粗傳士苴之餘願為弟子炎威方熾仙隱獨清顧茵鼎之茂調為宗祊而自重通韓運司彥質啓伏審拜恩天陛將漕日畿龍馬負圖久寓邃嚴之直水牛挽粟允資斡運之才凡隸部封舉深抃蹈恭惟某官乘珠照夜衡玉懸秋赫赫元勳具載鼎彛之刻言言餘烈尚存帶礪之盟仰昆季之橫翔見門庭之益振竹樓赤壁增大江形勢之雄檇李嘉禾偉近輔恩威之洽剔蠧源而俱盡掃狡穴而一空齊民欣冬日之溫老吏凜春冰之薄矧是外臺之重適當虛席之初肆求能臣乃擢賢守借一州之斂惠俾列郡以觀風問津清禁之途接武昕朝之列致身自奮行預嚴徐之褒活國有謀小試管蕭之亞不勞鞭計坐致錢流便登簪槖之聯俯慰搢紳之望鑰行能無取學術尤疏涉筆刑章顧安知于八律預名史牒曽弗措于一辭惟親年之益髙念色養之多缺偶逢新制求倅偏州乘鴈雙鳧顧何加于多少懸疣附贅適有愧于駢枝莫知關決之宜幸屬按臨之下願廣萬間之大庇俾霑九里之餘波展驥何堪徒以負丞而興歎登龍正阻尚須假事以有行回王主管銖啓東閣同趨曽䝉傾蓋南州半刺首辱飛緘瞻高隱以非遙荷謙光之過厚恭惟某官神鋒秀整筆力縱橫克紹家聲善寶甘棠之笏親傳世學盡讀牙籖之書盍上亨途以攄雅志依芙蓉于邊徼俄賦歸來奉香火于仙都姑為自適正恐精金之價定不容美玉之櫝藏鑰佐郡無堪登門自喜屬暑行之疲甚愧瑶報之闕然回寧海湯知縣烈啓蝕粟周行力圖補外贅員别乘恩許便親喜同事之相依荷貽書之先辱伏惟某官詞場前輩聖世名流棲枳海邦藉甚一時之望采芹泮水盍從三館之遊尚為墨綬之淹小駐青雲之武循良所在登用可期惟慕向之已深喜瞻承之伊邇縱橫老筆歎才氣之增雄踸踔征塵愧報章之弗稱回石司户宗昭啓聞公子之名踰于十載識荆州之願始自去秋既服持衡之公更蒙傾蓋之好茲來佐郡深喜為僚素知三語之無同未省千人之小異荷貽緘之先辱審沿檄之將歸喜不自勝言何能盡伏惟某官學期于古用適于今髙挹儒科振家聲于奕世首為户掾贊郡政者纍年豈容州縣之勞㑹登臺閣之選君既不為駢儷之諛語我亦欲言去就之私心自惟無堪顧將焉用三尺所出四年其間用之則行舍之則藏詎敢論古人之懿往而不返入而不出要皆非吾道之中惟親年之益髙愧色養之有闕每切望雲之念懼乖愛日之誠幸下考之再書援新制而三請置之員外處以治中豈求半刺之優正恐負丞之誚玉川之異自異或恐未然䝉莊之才不才未知攸處既逢直諒之友良佩切磋之規賀下之先請益為便凡此地當知之事與平生有用之言不鄙其愚願悉以教回添差錢節推慶祖啓處以治中自慚無用置之員外所向適同喜傾蓋之非遙荷貽緘之先辱伏惟某官家聲赫奕性地純明早聯紳笏之華未快雲霄之武六月而息欲為擊水之遊三年不鳴必有驚人之舉暫煩婉畫來佐賢侯不移桑梓之邦徑入芙蓉之幕㑹聞交薦别遂超遷茲叨佐州甫及視事一笑莫逆俱為駢拇之流同官為僚尚恃斷金之義回寧海方知縣果啓附驥同登恍如昨夢飛鳬來下忽聽先聲方慙佐郡之無堪深喜為僚之有託伏惟某官性資通敏問學邃深屬辭甚工屢得文場之雋從政何有寖蜚仕路之英既通籍于金閨聊假途于墨綬惟茲海縣在四明天台之間久矣邑人有卓茂魯恭之望矧叨末契尤切寸心辱華翰以過優愧短章之匪報賀明州范參政成大啓恭審詔起柄臣權分制閫九重前席方深共政之圖千里褰帷暫屈于蕃之寄山川頓攺號令鼎新凡屬按臨舉增抃舞恭惟某官儒林師表聖代宗工英主有為出際五百年之運嘉謨允合遂超九萬里之程羽儀天朝金玉王度縯綸祕掖追還盤誥之風抗節殊鄰平讋彊梁之氣威名日著宸眷冞隆謀元帥于西南憺皇靈于徼塞令行八桂世稱伏波銅柱之規澤浸兩川人服武侯羽扇之略進參鬷嘏光輔太平遽辭丹陛之風雲髙蹈石湖之林壑奉身而退與世相忘屬名藩弄印之初喜元老賜環之速首頒帝綍併護瀛壖姑為試馮翊之行了無薄淮陽之志仰體皇上憂顧之重俯矜民生凋瘵之餘叱馭徑行不待東方之千騎望塵雅拜欣逢刺史之二天傳填撫之先聲極撫摩之至意吏民相賀知有所依旬月之間坐以無事輕裘談笑澄瀚海之驚瀾健筆流傳播雞林之佳句盡消愁歎倏變謳吟諒課最之易聞恐公歸之難緩台星兩兩重觀齊色之祥泰山巖巖式副具瞻之望鑰夙叨爐冶久去門牆贅員于兹阻奉維桑之敬賜履之下實云擊柝之聞尚為假事之謀少遂趨風之願敢憑慶牘敷敘勤誠畫㦸靖深薰絃和暢祈為冕旒之眷益精茵匙之調攻愧集卷六十一
