  text: 攻愧集卷八
  hash: sha256:caba0f4487cfddfb09847d4cacaa9cd468894eda7134e3ce4a7196262a205d5f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_008-1a}
body:
  text: 宋樓鑰撰今體詩鹿伯可郎中園池雜咏見一堂靈徹清詩千載傳始聞林下有斯賢傍人只道休官早見一名堂巳十年止室流行坎止事無多舉世營營自網羅珍重主人真止矣直如古井更無波小東山安石東山志不渝歸來尋得靜工夫從教更為蒼生起攜妓何妨且自娛桂堂芳樹叢生庭砌間髙枝更許後來攀主人勿戀山中桂招隱還應看小山雲龕浮雲舒卷原無定此意誰能為飽參出岫無心歸亦爾不妨今日與同龕柑隅霜著芳苞翠作圍數椽瀟灑映斜暉木奴何必須千樹乞得間身徑且歸桃蹊幾樹桃花相映開主人歸路人天台憑誰寄語玄都觀前度劉郎不更來月沼玉潔冰清一壑專籜龍何處引涓涓深知月滿還虧缺秖學蟾光一半圓星潭山頭分下一泓清石甃團團瞰小亭身在赤城名絳闕至今潭影照郎星三友經公是端人友必端世情冷暖不相干雖云門外可羅雀三益還能耐歲寒竹塢幾年種竹未成叢一日歸來翠掃空儘好閉門髙枕臥從今日日是清風梅坡江梅留待主人還見説歸時得飽看回首殘花飛作雪一峯當戶正髙寒松嶺翠雲深處曳枯笻插碧堂堂十八公全似華陽隱君子挂冠歸去聽松風戲贈張漢卿張侯理窟妙無窮雅謔于人亦有功渺渺江湖千萬頃未聞餓死信天公陪沈虞卿使君遊錢園休沐無官事公庭且放衙城中尋勝地道上引髙牙潭府臨芳徑東巖玩物華山林真敻絶棟宇謝豪奢陶令親栽菊秦侯晚種瓜裴公餘緑野六一醉琅玡幽阪森三友飛橋粲百花樹深藏曲折谷險路谽谺道院羅星斗禪房供釋迦鼇峯思御氣畫舸想乘槎佳處城環雉吟邊路繞蛇登山攜翠袖喝道屏銀檛井巿花相映湖陂柳半遮髙歌驚野鳥疊鼓亂鳴蛙陛級青珉滑秋千綵旆斜叢篁穿嫩筍芳草綻新葩靜憩方開宴徐行更試茶仙醪斟瑪瑙玉指奏琵琶清絶囂塵逺蒼茫望眼賖詩情彌海嶠飲興渺天涯賢尹民同樂名郎子克家才髙修月戶筆妙補天媧揮麈風流勝憑欄笑語誇追風慚款段倚玉愧蒹葭逸韻迷春蝶清歡接暮鴉舞茵收地錦畫燭照籠紗耋稚欣相告輿臺靖不譁微風朝趁馬好雨夜隨車土脈興原隰霖膏潤甲芽相將勸耕去和氣滿桑麻巾山曲肱齋山立青冥外人行紫翠間小窗開木末孤塔映江灣平楚一何逺白雲相與間我來不暇寢冷坐對前山廣軒夜望點點萬家燈風清醉復醒廣軒髙絶處俯瞰一天星玉霄亭玩雪羣齋髙晏雪浮空同上山城第一重今日無非銀色界此亭真是玉霄峯雲迷野路舞輕鶴風急瓦溝噓老龍便欲相將遊汗漫剡溪何必訪遺蹤倅廳雲水亭山繞澄江江繞城水雲徑接海冥冥萬家曲折在吾目一郡登臨屬此亭今日詩題隨處有幾番醉眼望中醒風流鄭老知何在回首蒼茫島嶼青再過鹿伯可又上先生見一堂淡然賔主兩相忘不知海內清風滿但覺山中白晝長小雨絡林妨蠟屐靚妝環坐快瑶觴曲終扶杖欲歸去即詠白駒三四章天姥峯剡水迂回徹底清濫觴從此一泓澄曉來蠟屐沖寒上䂿碎山頭十里冰虎丘望望古招提兹遊恨巳遲池深驚地裂野曠覺天垂聽法人千數談空松一枝從誰訪遺迹惟有石頭知洛杜老僧聽琴宴坐蕭齋不作勞謂豫何事走蓬蒿從容試問今年幾手植黃楊三丈髙自言幾載不聞琴屢聽清彈苦契心少待庭柯蟬噪靜為師更作醉翁吟中秋歲歲當秋半人人待月明絶憐今夜賞更勝去年晴光彩澄髙露氛埃廓太清衆心方閔雨卻望暮雲生又次丁端叔韻好風涼月湛中秋自笑何為作逺遊不有諸君故人戀未應連日賈胡留三千銀界俱呈色十二珠簾總上鉤飲罷客歸清不寐誰知心折大刀頭遊惠山石徑縈回入翠林草年故步喜重尋千山直上雲扉啓萬木陰中古殿深泉水泓澄風拂拂洞門幽杳晝沈沈調琴瀹茗清無限倦客忘歸到夕陰遊洞霄宫宿雨頑雲撥不開紫霄佳處訪樓臺青山九鎖固奇甚古洞一深如此哉拔地千林俱秀潤擎天一柱最崔嵬出山爽氣尚相屬數里清溪送我回遊徑山起看海日曉團團更挹神燈照夜闌百萬杉松雙徑杳三千樓閣五峯寒蟄龍何在渺難問古井于今竟不眢但覓靈泉歸洗眼誰能故把細書看送蘇伯昌大卿禁路岧嶤欲問津抗章便自乞間身閔勞劇部皇情厚寓直中奎寵數新飛挽正資經濟手典刑終念老成人赤松未許長為伴歸取青氈繼潁濵甬東曽幸拜蘇天外府官僚復備員前輩風流真在眼名公談笑辱忘年浙江相對一巵酒婺港欲行雙槳船門鍵馬銜難作逺西風停立但茫然送劉淳叟博士倅豫章熟知明主可忠言奏􅢥方陳意巳傳人言能遜千乘國我自能補九重天拔山轉石孰難易爛額徙薪誰後先不用更論如許事把君征袂且茫然送吕周輔宗丞守崇慶從昔傅家學當今良史才聲名冠西蜀風節象東臺朝迹收何速歸心挽不回一麾從此去萬里可能來四川呂為陶為給事中類試省元曽祖舊矣唐安郡龍潛府號新當年一絳帳今日兩朱輪民意來何暮仁聲暖似春劍南毋戀卻鼇禁要詞人祕甚先天學誰傳陸士龍上方留自近天豈不相容契託君家厚情惟我輩鍾殷勤訓猶子他日使追蹤上魏丞相夢菴深坐宴朝曛秖有梅花對此君今日衣冠有巢許向來元凱佐華勳入山誰解訪洪景載酒時應問子雲童諷寫成心未懶可因貪佛贊論文次韻蔣德言遊太白玉几兩山西山不到幾經春玉几猶能一再臨太白峯前成夢境直從總角到于今少日遊山不要歸老來腰腳不相宜羡君勝具了無倦踏雪尋幽更一奇賸欲扶笻隨意行要令心迹得雙清何時同入翠微去丈室先參老淨名落花影裏步春闌飛鳥翩翩相與還若得把茅成小隱等間來往兩山間誰能饒舌強參禪何用談因更説緣生死本來無大事晨朝須起夜須眠謝僧道全惠詩并菖蒲楚楚芳蓀詩樣清翠苖低護小峥嶸一泓功借幽根潤六月能令涼意生雁蕩渾如夢邊事龍湫頓覺眼中明間窗坐對思無限何日隨君繞澗行趙安國梅坡隆暑倦行役梅坡得暫間卷簾南浦岸終日對成山竹裏清風逺棊邊夕照還歲寒重卜醉覓句暗香間資聖寺野溪清淺度危橋徑䇿枯笻上紫霄曉霧暗蒸山寺雨松風深隱海門潮浮杯水漲人何在洗鉢池清意巳消又上樂亭基上望雲山萬里更逍遙次韻蔣德言壁間舊題一鈴簷角自吟風兩面松篁翠掃空山卉更藏無盡意枝頭未作去年紅上史太傅一坡煙水緑灣環竹樹樓臺縹眇間但説一丘藏曲折誰知更有四明山二十里雲隨步生潺湲洞裏訪青櫺山中要識無窮趣看取南雷問答經衮繡堂中語夜分幾將經史細評論不知世上三公貴秖是東湖八行孫贈鄭相士知君冰鑑照人寒我相儒酸未足觀東甬從來多俊秀為煩著眼細尋看雪竇道中城居久矣厭塵勞來訪名山寫鬱陶客路行隨流水逺征人與坐白雲髙千林舞翠吹蓬鬢二麥搖青照紵袍努力共登天尺五要看飛雪噴雲濤錦鏡兩溪赴壑若奔虬此地端能截衆流三版放開千丈雪一奩清徹四山秋幾年空自存公案今日重新指路頭珍重老師成勝事清名當與此山留妙峯亭一峯髙出白雲端俯瞰天涯千萬山試向岡頭轉圓石不知何日到人間隱潭靈潭深入白雲堆帶雨春雲為我開乳石半空渾欲墮瀑泉千尺正中來兩軍酣戰鼓鼙急一雨生寒霹靂催中有臥龍君勿狎有時平地起風雷遊大梅山護聖寺江東東畔更東山又過東山數里間試問招提在何處萬山深處白雲環寒雲片日忽吹開歷井捫參得得來行盡髙山天欲半不知平地有樓臺常禪師塔虎冢旁有當時道價極光華鷙獸相隨共一家象去虎亡師亦老不須百鳥更銜花從來猛虎性堅剛據石依林死不僵何待寒林班侍者千年陪葬祖師傍梅仙巖梅山遺迹若為尋怪石峻嶒一徑深未必當時真隱處清風自覺襲衣襟雲巖但見雲生谷初無石似巖得名非舊觀買地作精藍境勝環修竹門深擁翠杉禪林自家處莫問後三三啓霞冰壺亭拍拍新漪徹底清兩山寫照翠光凝笑看風動縠紋起坐我玉壺春夜冰天童玲瓏巖捫蘿歷棧上層峯寖覺芒鞋踏半空七竅幾時開渾沌八窗無處不玲瓏巳欣古洞容身過直恐丹丘有路通俯視人間懶歸去拂衣徑欲御天風送內弟汪作德赴建德主簿今日望春下送春還送行簿書須著意家世有餘清瀟灑桐廬郡文章陸士衡觀為守時陸務公餘定多暇無廢讀書聲南江酒家南江舟楫飽經行橋外人家最可人賸種寒杉映修竹快沽村酒趁鮮鱗潮痕落草櫓聲動日腳銜山涼意新酷愛老樟橫臥處他時來此坐垂綸宿登山竹輿來訪小梅山山在空濛紫翠間嵐霧滿林朝漠漠溪聲和雨夜潺潺峯頭丹井隨潮信松下禪房舊祖關誰是無生誰不死晨鐘未響夢先還羣從泛湖次叔韶弟韻倚遍瀛洲十二欄老蟾推出爛銀盤絶憐千頃波瀾闊更覺滿身風露寒境勝能令詩興逸夜深自喜酒腸寬離離挂影清如許莫惜終宵作意看送陳君舉守桂陽重尋漫壁認題名十五年來一夢驚誰料今朝攜客至卻成此地送君行桂陽臥治真談笑魯史遺編賴發明文定南軒仙去後湖湘又得一先生永嘉天慶觀斗口橫安華蓋山茂林修竹路灣環琳宫回出滄瀛表羽士如遊崑閬間東挹江山窮望眼西臨闤闠笑塵寰自知去此無多日著意來尋一餉間次許深甫寄陳頤剛韻博物曽經辨實沈論兵更覺用功深九閽未進六奇計萬卷空催一寸心流水髙山誰復會寒松春柳解相尋如君豈是長貧者作計無令歲月侵前朝折戟尚沙沈志士私憂意向深謀國未須先問陳平戎要且務攻心衣冠舊老知誰在禾黍遺宫尚可尋騎省再新人有望一言坐復故疆侵勸農一番好雨潤桑麻和氣歡聲十萬家太守勸農才出郭老農含哺競隨車土膏澤澤地宜稻雲物陰陰天養花願得四方無旱潦盡教樂歲似東嘉書吳夢豫古樂府後古來樂府近來無筆力如君郤有餘日恐遺音亡正始喜聞新作過黃初不誇藝苑徒工瑟應免侯門久曵裾更向江西詩窟去他年時寄一行書謝景英送鄭景元篇末見屬次韻張羅清似翟公門門外都無野雀喧可但風流追鮑謝直教髙論到羲軒絶憐父子為知己時把文章得細論箇裏是非何足較乍賢乍佞一王尊有一首云觸暑相案一本此首後尚光尚巋然賸記暮年專一壑想聞髙咏和流泉兩公直過憶去年汝南又得見先賢向來喬木今亡矣秖有靈載不可考今附注于此諒渾相似其末一句缺喜雨次甄雲卿監簿韻四郊苖稿勃然興頓覺歡聲滿郡城行且刈雲成歲事敢因喜雨記亭名昔如魚在釡中活今見龍從地上行憂國願豐同此樂讀君佳句欲風生又次徐仲宗通判韻老龍破蟄斬幽關亂滴天飄不復慳可但甘霖驅旱魃自然涼氣滿人寰民心徒切焦熬甚神力毋勞指顧間遙想清都應表賀紫宸軒陛曉催班又次鄭性之縣尉韻稿項疲農病夏畦喜聞煙雨四天垂旋尋粳稻供糜粥驚見新香玉滿匙閔雨才寬又畏風從朝愁到夕陽舂誰教官到二千石不學當年邴曼容幾番好雨應先占欣見階庭緑草纎秋後陰晴猶未定更看新月臥磨鎌爰居集魯要先知飛雪侵春久巳疑慚愧風師幸安靜敢將虎口鬬龍癡遊隱清簿領叢中偷得間輕輿相與出鄉關亂流先巳登孤嶼采蕨還來上北山藤繞龜身增贔屭水涵虹影照孱顔老農擁道迎人笑今日使君來破慳瀑泉奔放石坡陀回首清遊歲幾何腳力不如前日健詩盟還喜故人多滕王閣上無韓子逺景樓中欠老坡不謂鄙言成宿讖偶因晚涖得波波窮冬吏鞅解紛纏重入兹山憶少年千里幸同豐歲樂三生曽結郡人緣幾番山色望空外今日水聲來耳邊坐上何須聽絲竹與君嘯詠和風前富覽亭城郭占佳勝眼髙貞白鼉霜天開浩蕩雲屋涌嵯峨四面山總好東窗江最多腳跟盤巨石吞吐任風波贈陳居靖道人溈汭道人身御風棄家求靜慕仙蹤仙都有石立天半特立要當如此峯雪中簡林景思劉振之驟寒忽變雪花飛抱膝長吟況可知襆被可能來過我忍寒相與話新詩謝林景思和韻黃昏門外六花飛困倚胡牀醉不知凍合玉樓猶強項擁衾方詠雪巢詩送趙子固吏部帥合肥少年文價重神京遊宦還聞政有聲南省但推韓吏部北方猶問趙先生人傳殿上三千牘上喜胸中十萬兵暫輟望郎分帥閫淮南草木更知名老韓同傳我多慙意氣相傾自不凡憂患飽更俱白髮班行獨立見青山羡君真有虎頭相顧我方為馬口銜同舍幾何俄話别可堪目力送風帆襟帶長淮地望崇勳名當繼古英雄吳人止解依濡塢晉將才能過八公可但綏懷邊境靜直須經略朔庭空折衝不必居遐徼頗牧尤當在禁中曲竹放出一頭地出牆梢更新傍人為稱屈素志肯求伸苦節變甘節曲身成直身青霄看直上莫忘手援人寄題汪端明墳菴真如軒山藏佳處竹藏廬見説離家百里餘巳矣空求真學士傷哉間殺老尚書後生自恨登門晚壯歲寧忘跪履初悵望九京那可作此心徒切慕相如萬箇篔簹一草廬傷心埋壁十年餘革聲誰聽尚書履金榜空懸少保書無復遺音追正始尚傳新作過黃初真成一代風流盡歎息浮生信六如題汪季路太傅所藏龍眠陽關圖離觴别泪為君傾行李匆匆欲問程不用陽關尋舊曲圖中端有斷腸聲畫出陽關古别離蕭疏柳質不勝悲行人顧歎離人泣桞下漁翁總不知題陳簡齋寄夫人書行書滿紙遺君文可見閨門敬若賓應與少文能協趣定因元亮遂忘貧題韓氏所藏元祐選尚詔草禁臠當年選尚初難兄辭寵意何如裕陵遺旨知難改元祐湛恩信有餘今日猶存卯君筆向來誰造粉昆書韓門世寶宜無墜史有遺文尚取諸秋日懷國仲觀四明聳秀一溪流曽記經行十里秋行李今從何處住宦遊自笑幾時休兒時故舊今誰在老去光陰不借留贏得東歸訪丘壑約君同上釣魚舟客省聼燕樂曉入金門拜紫宸門前錯立士如雲未容密侍君王晏秖許鈞天隔殿聞次李季章監簿韻跪履巽巖今幾年見君風度喜跫然長編固巳翻青簡老墨猶能寶漆煙遊宦自欣天影近思家猶在夕陽邊時從甥館追清賞賸寫新詩繼謫仙賀雪八盤嶺上作平時臥雪似袁安誰肯凌晨犯苦寒百辟班中因族賀八盤嶺上得遙看層層觀闕瓊樓聳納納乾坤玉宇寬悵望仙山何處是欲從此地徑驂鸞送林子方吏部將漕江東光堯三紀煥文章寶閣岧嶤謹祕藏寓直到君才第四皇華禮樂逺增光望郎三度到長安垂上青雲作好官暫向江東一澄按卻歸徑著侍臣冠自説嵇康七不堪上教持節向江南江南父老應相賀見説清明似晦菴殿廬官燭對風簾郎舍修篁共一簷别日苦多良晤少摻袪不耐雨纖纖子方移守四明見于浙江亭春初送别欠詩篇歲晚還欣受一廛都騎始聞臨浙水先聲久巳讋鄞川里人見説俱延頸海嶠從今定息肩夜夜故山頻入夢為君端欲買歸船寄題蜀李氏義槩堂作之祖君亮著養氣非為俠輕財弗市恩仁聲髙月旦義槩徹天閽稱美推賢嗣揚名有順孫活人幾百萬何止駟容門送衛清叔著作提舉淮東漢庭早巳冠羣仙闊步登瀛最少年竊歎豈惟年叵及人門才業總翹然通泰牢盆亘海濵宅家專欲用儒臣淮南草木生顔色又見龍頭第一人虎榜先登到鳯池前良多以十年期雖知勇退急流去壯歲功名會及時羡君持節拜庭闈未老雙親看綵衣若過蓋公煩問信坐曹日念舊遊稀衛乃蓋侍郎壻外府舊為敕局屢從樽酒接從容叔寶風姿照座中他日相逢年益老棊壇尚可角雌雄送黃景聲祕丞提舉浙西江夏無雙第一人清明久矣動簪紳心平氣徑無偏黨好在皇朝作爭臣宅家親擢得真才柏府蘭堂更外臺未問遄驅向溝壑半途應有詔書催從來軒冕一毫輕朝迹初收去玉京打破畫瓶無個事不妨遊戲繡衣行論詩才了便談禪鄙吝冰消更豁然稽首心空先及第敢將癸未論同年玉節光華照日曦揚清激濁正當時阿連幸出百僚底正恐翁歸不受私雪中迎駕都人久不望威顔驚喜鳴鞘風雪間萬井歡聲迎曉仗九天和氣下人寰龍樓笑啓瑶池晏鵷序欣趨玉笋班道上峯頭皆見日絶勝銜燭照崑山題尤延之給事所藏葛仙翁徙居圖莫言家具少于車藥裹衣囊自有餘老婦親攜三稚子仙翁獨玩一篇書羊牛相與趨新築雞犬無因戀故廬到處山頭有丹井不知如此幾遷居又題楊妃上馬圖金鞍欲上故徐徐想見華清被寵初後日延秋門下路不應有暇作踟蹰題老融歸牛圖薄宦六年辭故山故山秪在夢魂間簪紳何苦自纒縛卻羡歸牛自在間天竺禱晴早奉天香禱白衣遲明宿霧故凄迷忽驚紅日穿林薄無數碧山明澗溪上竺寺連中竺寺蘇公堤映白公堤湖光一碧幾千頃賸捲荷香送馬蹄具美堂明光殿裏早催班亭午天街從駕還巳聽歡聲傳市井更看喜氣滿湖山聨鑣逺去間尋勝爛醉歸來夜叩關但願兩宫千萬夀退公時得過雲間水月園具美杯殘意未休相將重上望湖樓樓臺忽巳居平地風月何曾識舊遊更挈酒樽過水月坐增詩興滿滄洲春風共約新橋畔遙拜雙龍萬斛舟三月九日從駕昨日為親壽今朝從駕行君親俱有喜家國共增榮淑氣浮黃屋歡聲動玉京人心真易感翻手作升平湖山次袁起巖安撫韻同年紫陌再尋春力主斯盟賴尹京山外斜陽湖外雪夜來陰靄曉來晴平波灔灔新添緑凍木欣欣欲向榮此日此身清潔甚軟紅何苦太忙生攻愧集卷八
