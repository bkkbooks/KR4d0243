body:
  text: 宋樓鑰撰志銘朝奉郎主管雲臺觀趙公墓志銘公諱善譽字靜之一字德廣系出太宗皇帝後曽大父仲暹夔州觀察使贈開府儀同三司少傅嘉國公大父士逮武翼郎考不晦忠翊郎四舉進士以節行稱贈通直郎公弱不好弄年十二三誦詩書屬文如老成人未冠失怙恃固窮自立手不釋卷足不越戶不知飢渴寒暑之變兩試胄監乾道五年試禮部俱為第一登進士第調明州昌國縣主簿昌國邈在海嶼公介然有守不鄙夷其人為辨曲直皆明達平允邑人相與愛服之或訴于郡多願決于主簿今太師嗣秀王時為守俾攝邑事對易定海慈溪三年簿領而無撫字之寄踰二期三邑父老猶能道其惠政海盜竊發捕得全黨郡欲奏以上賞公言攝令捕盜不足為功誠不欲以人命希賞典嗣秀王為奏貸羣盜殊死力薦之朝公未始聞也授兩浙轉運司幹官忽報改秩知撫州臨川縣縣在江西最為繁劇公始視事即為文遍諭鄉井出于愛利之誠心告教既孚乃具為條目日限量地之逺近以定期約里長月不過一再至訟事皆躬自豫奪頃刻即釋去牒訴日省縣久困于豫借吏以嵗例來白且謂不爾必不繼公命取稅籍閲之逋負實繁蓋上下蒙蔽無有發此者按籍征催不擾而辦有無額官地嵗入頗多以資妄用公白罷之復請並罷諸邑類是者或議虛市比之私創稅場請撤屋罷市公力沮之以從民便太守趙公燁葛公郯列治績十數條奏之有旨中書籍記去邑五年人相與立生祠于縣治邑宰陸侃之記可考也添差通判常州浙右飢饉躬行賑濟一郡賴以全活倉使以荒政論薦太師丞相史公上章舉士備言文學政事之美召審察差監都進奏院遷大理寺主簿秋旱下詔求言公草封事上之凡萬餘言其略曰陛下兼收衆善而言者志在投合搜抉隱微條目益廣而姦偽益生甚者唱為任怨之説竊徇公不阿之名一切付之不恤下情安得不壅習俗安得不薄和氣安得不虧乎天下之習日趨于褊狹機巧之域而無有優遊舒泰氣象士不畏義民不畏刑則是二十年來攘臂建議爭以為功者果何補歟夀皇嘉納為大理丞有以左帑宿蠧告者逮繫天獄官吏重足以俟譴公察其無辜謂將自其作俑者罪之則不可勝誅若斷以一二年來且有刑罰不均之歎上覽奏開悟得末減平江民唐贇之獄皆以為凶惡無可矜之理公條可疑狀十六謂贓證無實情款抵捂卒釋之十一年充省試考官六月除提舉荆湖北路常平茶鹽陛辭夀皇曰朕精擇得卿公論士大夫為己之心重則愛民之誠必虧營私之念切則奉公之志必怠得失之慮深則伏節死義之風必泯上深然之先嘗進南北攻守類考上曰卿向所進書可謂有志至是又進易説謂聖人以斯道寓之書上又曰聖人以此寓之于書天何言哉易學要須兼通天人卿史學如此經學又如此及臨遣又曰卿向來學優則仕今乃仕優則學朕得人矣數日有請薦擢宗室人才上復言公經學文章雖士林中亦罕有之湖北大旱鼎澧尤甚入境一日躬走村落撫慰飢羸得戶四萬餘口二十萬通融諸郡常平之儲盡以為用賑糶貸濟三者並行動得其實疫者藥餌兼之奏閣貧弱夏稅是嵗粟麥倍收禾稼豐盈民至扶老攜幼來謝初行賑貸或謂洊飢將無所取至是民爭負以償諸郡充足嘗奏買撲稅場十餘河渡四十五嵗入甚微而豪民大為民害盡罷之十三年除潼川府路提點刑獄重囚讞議州縣鬬訟稽考平反細大不遺才三閲朔漕使闕上稱公儒者可使治財就除轉運判官公嘗論國朝置轉運使本以收藩鎮之權絶妄用之蠧脫斯民于暴征苛斂之苦近時司漕計者特以賦斂為事號為材能者務趣辦而事督迫州縣之困弊民力之寬乏未始問也故其視州縣如一體有無緩急皆得上達悉力以應之諸郡所貸緡錢至十餘萬俾守二置籍約以期年優裕乃償自是蜀東諸郡舉無憂熬窘缺之狀十四年詔諸路監司條陳民瘼公言賦役不均獄訟不平征斂繁急酒稅苛暴四事且曰陛下延見牧守固將以觀人才也而計臣請以奏劄之一陳上供之數郡守垂滿者莫不督責舊逋宿負征商榷酤肆行苟虐以藉手求進近議者有刑輕之疑帥臣治盜輒先斬以自劾而求彈壓之名使其皆當不過能速殺之而已倘歸之有司按鞫亦不免于死萬一愚誠不能自明冤恨之氣豈不上干陰陽之和乎兼遂寧郡事闔郡熙熙民有爭競且曰公未始擾我其忍負之公措置常平深察宿弊擇官就倉和糴石增百金市有增損亦隨低昻聽民隨所有求售亦不限日糴之數實惠及民官儲充積公私便之所至就郡庠立學以教宗子率知嚮學持節東蜀凡三年士民愛之如父母遂寧尤所歸心寢疾二旬上章力丐歸主管華州雲臺觀百姓始則朝夕偵問相率禱祈及歸耋稚奔送涕泣不肯去既達寓里屏絶家事獨處一室圗史自娛一日忽謂家人將歸正寢且欲自為志翌日天將明燕坐榻上瞑然而逝十六年八月癸卯也娶錢氏僅再嵗而亡贈孺人再娶杜氏祁國正獻公之後封孺人子男五人汝傅修職郎新監舒州山口鎮次汝伋以公遺澤補將仕郎次汝儼次汝何國子進士次汝仲一女許適承奉郎楊㮤孫男一人崇揆孫女二人以是年十一月甲申葬于紹興府餘姚縣緒山之原通直墓左公天資髙明識見超詣研精性命之説發為議論及所著易説明白簡易晦菴朱先生一見歎賞以為擴先儒之未明頤正郭先生嘗序易書謂貫三才之理于其中一諸儒之説于其外二公師表一世于公特厚晦菴屢以書來相期甚至頤正出一編書公以奏之上孜孜好學公退不少懈率夜分乃寐嘗即國史所載深求藝祖開創之微意為書十四卷曰皇朝開基要覽又為皇朝聖政類編不幸寢疾僅成數十卷其他如南北攻守類考晉載記年表皆行于時又有論語説鐃歌鼓吹曲祝堯文等詩文六十卷號恕齋類藁藏于家公孝行根于天性自以祿養不及祭祀務極豐潔悲慕不少衰弱弟稚妹備殫鞠育教之有成仲弟善與同登科季善􅞳亦以取應得官女弟再適人皆竭力資遣遇母家桂氏特厚舅氏既卒訪其遺腹子為之嗣且厚給之其他篤故舊撫姻族恩意稱是廉靖自將一介不妄取行郡例册皆擯不使前按例饋遺者悉歸公帑刺舉尤所盡心苟賢矣不待其請舉奏牘面授之其在他州則郵置以達人知其不可以有挾無敢以浼公者間有按劾不以強有力為憚所部肅然楚蜀之士夫類能稱道之公抗志不羣砥節礪行不泥紙上之空言必欲施所學而見之行事尚友古人思與之齊人或疑其好異公不顧行愈力久而益安人益信之考求世故貫穿今古直欲立事業以傳不腐少名齋以宗迂以勵其操後名以恕其志將以及物也出而從宦苟有利于民圗之甚于飢渴救荒施舍之外又所在為經久之計在昌國已能勸勉富室買田與山專為編氓嫁娶喪葬之資在湖外則率十四郡買田各畀郡文學司之每三嵗則以給士之預計偕者在潼川則以漕計之餘使州縣置舉子莊孕者産者俱給之米皆至于今賴之使天假之年處以大位益攄所藴膏澤必將下于民而官止于員郎夀止于四十七識者痛惜之嗚呼豈以多記損心憤世疾邪而至是抑果有數不可逃耶鑰與公相見之日可數而相與特厚汝傅妙年躋世科大似其父率諸弟力學以守素業汝伋入太學蓋前所未有義方之訓可知汝傳會稡公行事來求銘採其可銘者書之餘弗著銘曰熙陵諸孫嘉國好文流傳至公遂為儒門公起孤藐立志堅正尚友古人期與之並學貫經史仕更麾符學仕俱優形于帝俞平心濟民一變齊魯志勤道逺中道而阻齎志何言勒銘山阿有子繼之尚其不磨太府卿王公墓志銘公諱卿月字清叔世居開封府祥符縣曽祖壞左朝奉郎大理評事祖阜和安郎父思正翰林醫痊纍贈朝議大夫朝議辟地轉徙寓居台州今為台人公生于贑上嫡母太恭人商氏夢月墜于前以裾承之僅得其半是夜陸宜人實生公故以名命焉公頴悟不凡未冠而失怙恃固窮自守必欲以學奮身隆興改元試入右庠乾道二年中其科授承節郎德安府復州漢陽軍都巡檢非其志也益進于學五年遂登進士第調溫州樂清尉到官值海寇充斥制司督捕甚急諸將皇遽公處之自若密使人扼其境路所出相繼就擒以授諸將不自以為功爾後獲盜不一公謂此曹雖有凶暴實以失業至此多為寬其獄識者知其為偉器憲使程公大昌奇其才薦于朝乾道七年十一月召對稱旨改承奉郎守宗政寺主簿九年三月遷太府丞六月為祕書郎兼吳王益王府教授淳熙元年七月除起居舍人十一月除起居郎閲日兼權中書舍人二年兼直學士院公起尉曹不四年擢用為文字官制詞溫厚真若素宦嘗草胡公銓詞云吾寧身蹈東海獨仲連不欲帝秦至今名重泰山微相如何以強趙人多稱之論事尤不避權貴是嵗為殿試編排官宣召之日繳奏池州守臣忤時宰之意因以帥才薦之五月除直祕閣知廬州時方年三十八在廬僅七旬而陸宜人年髙嬰疾請祠而歸日侍醫藥衣不解帶五年春除荆湖南路計度轉運副使八月丁內艱哀毁盡禮甫終喪起知靜江府當李接陸梁之後專務摩撫八年秋閲先期有告效用將殺將官以叛公廷詰而叱之曰前帥平賊功賞有不明何預我事我待此曹如子弟汝乃誣之耶械以屬吏且曰事畢當行軍法監司遣僚佐來欲用他日公不為動陰部勒以制其變仍攜家縱觀以安衆心效用謀既泄而形格比訖事無敢譁者歸即取告者謂當反坐汗喘不能言公曰妄人無知不足以膏吾斧鉞叱遣之效用又率其衆訴曰前日誣枉已蒙辨明而市井訛言不已願納軍器于庫以釋疑謗公善諭之羅拜而退為出錢五十萬于市許告捕訛言者翕然而定其處事類此時臣僚有謂廣西鹽法不便于民欲罷官鬻而行鈔法詔監司帥臣條具可否公力言鈔法之害五千餘言雖一時不能回卒如公所料十年七月移帥襄陽觀覽形勢極論事宜致于元樞周公大要謂襄陽重地當屯三萬人乞移荆南之屯併歸襄陽仍以鄂兵萬人隸荆南分荆鄂為二軍以襄陽為都統荆南為副未幾夀皇令條列邊防利害公徑以此書繳進才一年均州報金人侵地數里削木大書曰移封疆過此均人訩訩謂必開邊釁公知其妄奮筆為檄告諭邊民安業西府馳問所以公以家族保無他每嵗敵騎多逼近境公與兵帥先期圍獵于郊視舊加逺敵騎遂不至又嘗虛傳有警為之出遊峴首抵暮而歸終以無事赴鎮之初遭嵗洊飢竭力賑濟奏陳至于五六田里得免流徙十一年言者乃謂公恬不講荒政十二月罷歸十二年再主管建寧府武夷山沖佑觀十五年冬除利州路提刑既奏事進直顯謨閣改帥瀘州敘人與石門蠻互市紛爭蠻被殺傷者三公謂蜂蠆有毒不可不備奏易守臣練兵習武時忘戰日久士卒驕惰分習徑弓強弩躬自教督軍聲大振其後石門蠻王特錯果貽書卭部川都蠻王墨崖欲借兵以侵邊又集蠻衆二十部兵事勢甚急公雖已素備不忍戕民于兵令蕃漢耆長王文通父子諭以禍福蠻人堅欲得前敘守而甘心焉相持數月公諜知蠻中有郭萬肆者最號桀黠為之主謀致此邊患以厚賞生致之或請誅以示衆公曰此易爾恐復因此生事奏請縻以重役迄今役于神泉監蠻既失心腹之人始以印狀設誓待命下吏邊徼以寧紹熙元年進龍圗閣再任明年召還三年正月始至行在所除宗正少卿尋兼中書門下檢正諸房公事六月假吏部尚書為金國生辰使未行除太府卿已而瘍發于背或勸其辭行公曰君命不可辭也七月壬午行次揚州卒于舟中享年五十有五積官至朝請大夫娶趙氏先公十年卒贈宜人子三人好謙迪功郎紹興府諸暨縣尉好問好生並將仕郎女二人在室孫男曇將受遺澤孫女二人尚幼諸孤以十月己酉葬公于臨海縣之牛極山合趙氏之墓公性警敏記誦絶人先以武舉進既精習兵書武事又登儒科詞章贍蔚隨事立就議論通暢灑灑可聽古事今事問無不知旁通釋老之書百家之學遊藝多能為士林第一醫卜星厯動皆精詣琴奕雅鄭入手輒工儀表瑰偉神情灑落唱第之日夀皇屬目良久簡記蓋有自矣從遊玉津一發中的亟被金帶之賜在瀘南教士卒衆列兩旁百矢出帳中蝟集帖上無不駭服至于考辨鼎彞古物遊戲翰墨丹青一一造妙其他世故叩之無窮而又貫穿文法練習吏事恩威兼舉所在辦治心計有餘秋豪可察而持心忠恕事率從厚僚吏有請度其可用雖忤公意幡然從之故人樂自盡公亦不勞而事集疏財容物尤所難及厯官雖久用度之餘隨以散施親舊無所計惜月給嵗賦旁及鄰里之鰥寡孤獨者身後才有田六十餘畝書畫圗籍之外儲蓄無幾暫攝檢正于讞議之際務從寬典亦有譏其過甚者公不恤也居鄉恭謹無貴賤與之均禮閉門省事而不絶物不以一毫之私干州縣鄉人以此益加敬愛築圃北山之麓取孔德璋移文中語列為扁榜泊然若與世相忘者徜徉盡日望之者以為仙平日有志事功留意世務擁麾幾遍東南所至觀山川問風俗厯厯胸次獨恨未識中原張旜有行欲周覽洪河大山以贊國家規恢之略而齎志以歿薦紳痛惜之諸孤彚其遺藁僅得三十卷藏于家鑰客授東嘉始以同寅相與特厚贅倅丹丘周旋二年見輒傾倒嘗與之論兵公曰兵不易言也指授大略則又曰謹之戒之惟忍于殺人者可以言吾儕皆不忍也每歎服之公自蜀歸一見即自言此行他無所得嘗從康節先生孫曾傳易數甚詳以兼官玉牒時時相過論人窮達夀天奇驗甚衆許以傳授久而弗得語其家人曰今年我當厄會萬里之行其能免乎一日取其書細焚之而去未幾遂下世豈偶然也哉好謙兄弟來求銘余亦痛公之不得行其志也遂為之銘銘曰穆穆王公世家開封寓居赤城乃亢其宗始以武進旋以文顯一尉討賊賞謝彞典召對明光結知至尊不四三年西掖北門于廬于桂于襄于瀘所至稱最復歸中都司宗司府拭圭北行望舒感夢卒止于卿人皆期公出入將相齎志以歿天乎不諒六尺之軀才兼百人死而可贖人百其身我志且銘辭無溢美以詔後人以慰孫子知婺州趙公墓志銘公諱師龍字舜臣太祖皇帝九世孫曽大父令蘧雍州管內觀察使纍贈少師追封昌國公諡孝良大父子翔修武郎纍贈武節大夫父伯述武翼郎改贈朝散大夫前母錢氏贈宜人繼郭氏封太恭人建炎南渡公以紹興十三年生于長興先大夫宦遊遷徙尋定居于紹興府之餘姚公幼穎悟嶷如成人七嵗聽講春秋能解其義太師史魏公初為邑尉二子與公同研席公日記千言下筆成章魏公奇之未習聲律以古體著雪賦甚工三十年取應授承節郎監潭州南嶽廟夀皇登極轉保義郎隆興二年以鎖試登丙科改授左承務郎監建康府糧料院郡委受輸庾吏以壓案銀來公正色叱去盡革宿弊俾自概量邦人已稱之有民田在大江中流訟久不決官吏憚風濤之險無親臨者率不得其實公輕舟徑至田所訪之耆老曲直始明帥閲其辭稱奬不已疑獄多以屬公仍兼領獄掾帥漕交薦秩滿調知武進縣訟牒填委剖析如流落筆精當老胥聳服縣為士夫淵藪豪民倚勢縱橫嵗輸殿諸邑送使緡錢負數萬公諭以理而嚴其期會翕然樂輸不費鞭箠先期以足乾道六年騎軍徙屯旁郡屬邑分造廬舍將校邀賂公不從徙之磽埆地倍費工力公躬自督工落成又先他邑愛民御吏寬猛適宜而若老于吏事者而公年始及壯人尤服之守知其才事無小大皆與公謀年少行卑而俾兼尊長司攝郡博士宗子儒流又皆驚歎譽益聞部使者列薦于朝權知邵武軍陛辭所奏皆郡邑利民事進止詳華占對明辨夀皇嘉納且曰秀王之孫與卿同名孰為長公對曰臣為兄行遂命幼者更名皇族更名實自此始郡以運鹽為嵗計積蠧殊甚用度益匱僚吏俸給至纍月不支公剗磢百弊規畫一新課入增衍去郡之日帑藏充溢至今賴之土俗慓悍至白晝以刃相殘有手刃十餘人者又多盜公重為之禁俗為衰止嘗捕強盜至庭公一閲知其非縱釋之邦人疑其太匆猝已而得真盜衆始駭歎以為神有富民兄子尚幼熏其目又置毒食中幽囚以覬其死偶以他事到官須其兄子為證逾期不至俾搜其家得于僻舍瞽廢骨立非復人形公為析其産命醫用藥復為全人真生死肉骨之恩也興郡縣二學增其廩給鼎新貢闈士氣益奮遂有以經學冠南宫者造鎧甲承命最後而辦集最早試于御前強弩不能徹而第賞乃次他郡上供溢額亦不自言郡人刻石以紀政績監司入境耆艾遮道攀留不可數計憲使謝公師稷首以聞漕使柴公瑾錢公佃繼之有旨審察還朝欲使持節嶠南公辭以親老除知滁州未上丁先大夫憂服闋除真州奏事睿奬尤寵儀真酒政廢闕稅課日虧公為之削酒價以便民蠲征取以通商用度頓饒會南北泛使交馳供億數倍處之從容又以公帑之餘助漕計前此未有也飭武備修社壇百廢具舉諸司爭言治狀歸奏民兵及兩淮備禦之策擢知溫州溫在東浙為劇郡人士尤繁公延見盡禮務以儒雅緣飾春秋釋奠于學元日序拜皆宴以觴豆儒士歸心焉閲牒訴數百紙不以屬吏治豪猾雪冤誣或持短長嚚訟者得其情不欲已甚正色誚責之愧謝而去不敢復至庭下缿筒為清積逋殘欠追逮日繁公悉蠲之四邑不下數萬緡而公樽節有方不以乏告也吏有偽為符印以盜庫金亦為印鈔以欺鄉民者公據法黥竄吏重足一迹無敢犯者會嵗疫甚公盡力調護全活者不知幾人年餘以謡誦轉聞徙知婺州首蠲宿逋減折苗以寬民力罷酒務敷賣之擾人尤樂之才閲月而公病一日謂家人曰吾數將盡平生不泥佛老不諂鬼神不好禨祥不信陰陽卜筮方術之書毋為禳禬使我為畏死戀生者名醫四集皆以禮遣之又曰吾死無憾惟八十之母不得終養為吾大恨吾婦吾子能孝能養有加于前則吾死亦瞑矣易簀之際不怛不亂以紹熙四年正月壬辰終于郡治之正寢享年五十一娶聞人氏封宜人子男四人希醇髙郵軍髙郵縣尉希一泰州如臯縣尉希白湖州烏程縣主簿皆迪功郎三人纍薦胄監未上禮部希章尚幼受遺澤女四人長適文學應宗度及幼女皆先亡餘未行孫男三人長與慶次俱未名女三人十二月庚申諸孤將葬公于縣東石堰西嶴之原以祕書省正字顔君棫之狀來求銘余與公同登進士科相與素厚假守東嘉去郡數月而公至如臯又娶舅氏汪韶州之女契好益厚正字嘗在公幕下所載詳實可考為掇其大者而序之嗚呼公簡重而周于物謙退而敏于事務清勤謹然諾事父母盡孝居父喪哀毁幾不勝錢宜人早喪殯于青田公自幼聞之每深霜露之感卒遷奉以歸以公遺命葬于先大夫之近山弟妹嫁娶身任其責門內專守禮法長幼進退有度事無巨細動有繩約內外肅然篤于教子雖吏道倥􅘓公退必使之環侍講貫經史商榷人物或通夕不倦故皆有場屋之效家素窶忍貧如鐵石食不重味衣無華采藏書外無他嗜好姚江一區之宅僅庇風雨觀者若不堪而公以數十口處之泰然治移于官吏事心計有不習而能者故所至可紀廉介自厲而以恕待人方在郡時親舊及寒士隨力周恤各盡其意雖居間亦以其餘周人之急作文若不經意而援筆輒就嘗採史傳治亂成敗之迹為博古摘華三十卷臨江築小室號翠霞有詩幾千篇以名其藁他文稱是嗚呼惟我國家慶系繁衍賢才輩出進與寒畯並驅仕為朝廷重臣漢唐之盛不及也以公之才抗志尤髙而進學不倦使遂登用必有以大表見于世天不假之年其所施設著于四郡而止君子以其所已為足以知其欲為者可銘也已銘曰周強以宗宋祚尤隆本支日繁人材日豐公生明時不為不逢惠洽四州聲流南東然而宏博之習以早達而事不就逺大之業以中夀而位不充家學有傳餘慶所鍾詩以揚之尚詔無窮益陽縣丞趙君墓志銘紹熙四年冬余待罪西掖臨江彭子夀龜年以祕書郎擢右史一日相與論近世皇族人物之盛余曰自元祐初子湜始見于進士題名至紹興十五年有伯攄者登甲科余時已省事人皆言南渡以來所創見此人必遂通顯矣後聞其沈滯選調而賢譽益髙子夀曰子之論乃及此耶此吾之婦翁也其仲子興化使君今夏遭母太宜人曹氏之喪以歸將祔葬于吾鄉清江縣建安鄉磐石之西宅原君之墓以君之行狀來欲併求銘于朝士子其為我銘之君字德藴藝祖皇帝七世孫也曽祖世統贈安化軍節度使濟陰侯祖令杳贈昭慶軍節度使吳興郡公父子暉武經郎君生于東都睦親宅幼而穎悟不為兒嬉五嵗誦書數千言儼如成人吳興愛而拊之曰是兒必以詩書光吾門靖康避地徽之婺源武經赴調君年才十四幹蠱有條道方梗踰年不聞問君晝夜泣禱一夕然臂武經心為之動投袂徑歸人以為孝感武經官臨安母孺人王氏屬疾君侍奉甚謹藥非嘗不進衣不解帶居喪哀毁悲號感動行路兒有歌呼過門者長老呵止之汝不聞趙孝子之泣乎里巷肅然從祖令畤以王爵司宗必欲官之君以願學辭及隨侍臨江聚會數十人君盡力調娛羣從幼孤未立友愛備至躬率講習其後聨名薦送有登科先于君者髙宗嘗諭宰臣曰朕閲取應宗子伯攄程文多引詩書良不易得可令赴正奏名及臨軒放進士劉章以下至第九人見君名顧廷臣曰是能力學取高第誠可嘉也召見稱奬欲加進擢君不屈于當國者止依格授左迪功郎徽州司戶參軍用特恩循修職郎太守初亦易君後知其廉勤而臨事明敏歎曰平昔自謂善料人幾失之趙掾殆未易量也經界法行君躬按阡陌抑強扶弱不容姦欺樞密何公鑄繼為守見君文體典雅箋奏悉以屬焉汪公勃歸自西府聞鄉人譽君甚曰吾頃為廷試諸位官嘗愛其䇿恨未識之會君沿檄至黟一見如平生歡即薦于朝秩滿循從政郎為鄱陽縣丞洪公興祖守饒亟稱之曰棄膏粱之習躬寒素之行宗室之標的也參政程公克俊方間居與君論詩文或至終日二公俱薦之調柳州州學教授武經勉使之官不得已留家侍傍單騎以往至宜春慨然曰深入瘴鄉重貽親憂仕進非所急也遂乞侍養以歸初陳文恭公康伯知貢舉擢君為舉首及登參預聞君赴調喜甚延譽時宰欲振耀之會銓曹有南安教官闕君曰是可以便親他何求焉陳公欲留之不可曰此非所以處賢者姑以成公美志爾將之官代者祈少緩君與之同年為遲遲幾年而後進會陳公入相或勸申前日之語君謂方安于此苟求非吾願也郡在庾嶺下君訓導有方士皆奮勵弦誦寖廣甫書考遭武經憂哀禮有餘治葬惟按之禮經略陰陽拘忌之説曰葬者藏也卜宅兆而安厝之禮也親喪分當即死敢徼福乎服除轉為益陽縣丞張公孝祥方師湖南邑事多以付君訟久不決君徐詰其情折以片言莫不恱服有求薦于提舉范公成象者范曰非敢惜此章欲留以待一賢者君視篆首以剡上蓋與君嘗寮知之尤深也乾道四年夏君以勤職而又禱旱重為暑氣所乘疾如痢瘧屏去醫藥起居如平時七月四日晨起猶對問疾者已而不言但以手加額若誦佛然而逝家人環泣忽顧曰毋擾我良久復瞑目既晡卒于官舍之正寢享年五十有五興化通籍朝列纍贈君朝奉大夫太宜人少君五嵗開封人左宣教郎知海門縣棟之女有賢行安其夫之貧故能保其家而又教子以有立君之葬以其年十一月壬申太宜人之卒以五月二十七日其祔也以九月庚午子四人師侗從義郎永州兵馬監押師俠即興化也官朝奉大夫師攸師翰俱為承信郎監潭州南嶽廟女二人長適通直郎知文州軍州事王沇次適子夀朝散郎試吏部侍郎兼侍讀龜年之字案子夀彭以此不書姓因巳見前是孫六人希諫蚤世希謨承節郎添差監永州在城稅務希律希諶希詢希許女七人長適王節之次許嫁王汝嘉次適承節郎胡晉餘未行曽孫女一人抑聞君之為人誠以處已恕以接物寬以待下儉以居家嘗教子弟曰人福力有分量當重惜之仕宦盡其在我不可苟求妄進與其有求于人不若無欲于已與其取賤于人不若以賤自安嗚呼賢哉君以二弟少亡撫教諸孤不翅己出君之長女未笄武經久已許嫁文州君方遭外艱語所親曰介弟諸女已長求配當先於吾女逮終喪則從子受室女出適又嫁一表妹然後畢王氏姻事親族之長者以禮待其幼以慈有疾或喪竭力赴之寒暑風雨不顧也未嘗談人之短聞人有善若已有之為人謀必長慮郤顧為經久計而忠告之性酷嗜書經史百家無不該究手抄者至數百卷動以書自娛曰老矣豈以求進但欲賴此收放心免為外事撓耳奉佛尤謹旦必課經終身不替世味沖淡不蓄長物其容退然而所存甚逺使盡其才用于世必有大過人者厥後孝宗尤親睦九族搜取人才中外進用不減周宗而君止于中夀墓木拱矣豈非命耶興化能以才諝自見庶將大其家銘曰猗嗟益陽宗姓之望也少登巍科中興之倡也受知思陵逮文恭之相也竟沈下僚何天之不諒也道行于家而賢譽之暢也使盡其用幾今之劉向也我問其賢而銘于既葬也後人勉旃尚惟宗之亢也永寧郡夫人孫氏墓志銘夫人姓孫氏池之石埭人世為大家曽祖某祖某父某夫人幼而警敏事父母以孝長歸故中書舍人直學士院王公鎡公以一時名儒篤學洽聞典內外制光顯于朝每語人曰我方窮約時刻意于學夫婦攻苦食淡久而愈相安及從仕以來尤能齊家治內賔祭省禮略不以纍吾心所以得專意宦學者皆其助也以是人益知夫人之賢舍人書無不通尤精于易一日自卜卦顧家人曰吾殆將死矣遽捐館舍年甫四十有三夫人不堪其憂時舅姑在堂幼孤滿前舍人清貴無生業家道艱窘姑實繼室性又嚴厲夫人身任一門之責娛侍阿姑率能當其意舍人有弟為廬州録事參軍亦早世孤嫠又衆夫人經紀其家撫愛其子女不翅已私憂樂與之同婚嫁與之均人尤以為難孀居十餘年二子長立從仕則盡付家事不復介意且曰我辛苦教子幸爾輩能任事吾何求哉安輿往來兩間優遊自適專精佛課諷唄無倦色暇則歌酒為娛含飴弄孫如此幾二十年長子宰鄂之崇陽迎侍滿秩夫人以微恙卒于郡中頭陀寺之寓舍淳熙二年九月五日也享年七十有三二子長曰溉朝請大夫直祕閣知平江軍府事次曰渥故朝請郎守大理少卿致仕女五人承議郎新通判施州湯允德迪功郎臨安府教授章綱進士李昌齡汪渺李熙載其壻也孫男七人長木蚤卒次克昌從事郎充四川都大茶馬司幹辦公事次伯昌迪功郎次東文林郎江州彭澤縣主簿次夢昌次汝昌次楠迪功郎嚴州夀昌縣主簿克昌暨東俱嘗上禮部而夢昌兩預首選孫女二人長適承事郎監建寧府大挺場葉延年次適承事郎監無為軍崑山鎮虞方簡夫人始葬于石埭之黃龍山少卿嘗位于朝方以才奮而遽下世東其子也痛其父齎志而歿日者又盛言黃龍山之不利紹興三年啓夫人之穴謀改卜焉平江時方將漕西蜀既歸遂以五年九月望相與遷葬于九華山下鑰少嘗誦舍人之文三入修門不及識少卿及平江為戶部郎一見如舊識慶元改元自吳門貽書以夫人之銘相屬且示以巴之通江陳宰淇所狀遺行而鑰巳得婺而歸今日又以書來曰子既得間其遂成吾志惟夫人淑範懿行皆可得銘因平江之請勤甚敢敬書之銘曰惟紫微公掌內外制謂將枋用而不永世二子克家以才致身熟知閫範自孫夫人夫人之賢用心均一始任其勞終享其逸九華之麓千載是藏我揚以詩後其允臧攻愧集卷一百二
