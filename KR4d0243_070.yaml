body:
  text: 宋樓鑰撰題跋跋王順伯所藏二帖鍾繇力命表始順伯示余以定武蘭亭序書賜官奴樂毅論余謂小字無以復加矣順伯笑曰未也又有邁此者乃出鍾繇力命表諦觀久之心為之醉字畫精到乃至是乎順伯博雅好古蓄石刻千計單騎賦歸行李亦數篋家藏可知也評論字法旁求篆隸上下數千載衮衮不能自休而一語不輕發先鍾後王字家固有定論以此三者坐判優劣豈為知者道耶定武修褉序順伯好石刻成癖蘭亭善本收至三四未已余家無一名帖心顧好之把玩不忍去手雖未若順伯之膏肓然疾在腠理矣豈所謂不治將深者耶跋秦淮海帖山谷晚游浯溪題詩磨崖碑後見少遊所書文潛詩嘗恨其已下世不得妙墨刊石間時少遊醉卧古藤下未久也而山谷老人已有此恨矧今相去幾百年此帖灑然如新得而讀之寧不感歎書仰孝子行實後先生孝行出于至誠本不求人之知清朝官之以風厲天下而後先生之名顯永嘉名臣輩起為浙河東西冠嘉遁之士至行卓然必有繼先生者第其深處巖谷不求聲稱故潜德幽光未之或發鑰不肖願與邦人訪之聞于州于部使者于朝廷使此邦之風義益髙而先生之名不孤不亦可乎跋陳氏續蒙求徐堅作初學記中山劉子儀愛其言曰非止初學可為終身記此書出入史傳援據精確何止應童蒙之求耶跋吳生畫卷李廣射虎史言將軍射沒鏃謂沒矢者殆未必然臨右北平盛秋胸奴避之畫不能真似尚可想見也神氣如此而恂恂如鄙人此所以為李將軍耶山水平逺延陵生丹青無不工適興作山水尤深逺有意趣宦游三載歸心蕩搖渡口喚舟殆屬夢境跋韓幹馬舊讀坡翁詩恨未見此畫今日得之便覺詩畫互相映發此詩此畫誰當看豈無所待耶跋徐薦伯橫槊醉藁上馬能擊賊下馬作露版古人惟以許傳修期薦伯儒者由右學以奮論議慷慨談兵如流擊賊何足言讀其詩頓挫清厲有壯士橫槊之氣倚馬而作露版有餘矣修期何人哉跋徐子由菊坡圖徐君傲睨菊坡不復出仕故其樂同彭澤令少日便賦歸而三徑已就荒松菊僅有存者則夫火馳宦途碌碌忘返之士顧有一適如君者耶書元章簡公神道碑後章簡公名德隆重詞章典裁蓋平昔之所慕者兹來佐州披圖牒訪故迹始知甓城閘門疏河建隆梁以為此邦無窮之利者皆公之力曽孫康曽適為監征叩其家世始得碑銘而讀之益加歎仰若蘇魏公之雄文韓南陽之竒畫又皆可寶也跋任氏香圓記齊晉安王以蓮華供佛願竟齊不萎七日齊畢華更鮮紅視罌中稍有根鬚史稱其孝感然猶藉于水也香圓垂之空中而敷華結實可謂異事此理殆未易致詰輕下注腳卻成蹉過跋王清叔畫卷斷崖小枯木醒菴古木大似梁鵠書有劒拔弩張之氣全幅枯木此幅筆勢尤瓌壯雜之文湖州射澤中未易辨也橫披山水觀此圖當作烟雨半開登高臨逺時想苟求形似便失妙意要不可以畫家三尺繩之跋霍氏球川圖霍君來為赤城理官垂去矣益不得志書銜袖過余曰漫仕三年不逢已知圖家之球川得名勝詞翰盈巨軸以此西歸賢于薦書逺甚余頗愛其言展卷久之字呼曰子登宦情如水而家居勝絶乃爾君之歸似晚矣他日有客道南蘭陵捨舟金斗門外徑造竹所者必我也君其容之乎跋王少保行述肅公父參政敏士夫以重名致大位雖才業足以自奮要其先必有所自來而積善纍功之人亦往往取必于後參政一代偉人恨生晚不及見得此書于公之仲子始知自無怨公以還世有隱德遂為名臣大家天之報施端不偶然後來者又堅肯堂之志湯湯淮流寧有既耶跋丁端叔所藏鼎彛款識右商周以來鼎彞尊鬲等八十有六豫遊南蘭陵從丁端叔借觀商周逺矣器之存于今者蓋寡識者望而知之以為商質周文世愈逺則文愈簡然周器亦有甚簡者不知何以别其非商也盤誥詰曲聱牙商周皆然其他訓誥誓命之文初不相逺者商頌雖止五篇求其體製比之清廟維清之詩加詳焉豈高識者它有見于此耶古人不可復見而得其器器又不可得有乃摹取款識之文茫昧難讀顧有何好而深好之是殆難與不知者道也跋陳忠肅公表藁范忠宣晚年益以天下自任尤留意人材或問其所儲蓄為今日用者曰陳某又問其次曰陳某自好蓋言忠肅公可以獨當天下之重也宣和末年或問游公察院以當今可以濟世之人曰陳了翁其人也元城先生嘗因公病勉以醫藥自輔天下將有賴于公當力加保養以待時用讀公表藁及紙尾數語氣凜然如生折而不撓有大臣之風三公真知言哉跋百醉老人詩百醉老人詩追七子凌鮑謝諸公論之已詳逰别圃有句云中原戎馬場故國虎狼窟言歸成默傷念之中心栗鑰讀而悲之此詩人黍離之歎少陵一飯不忘君之意也百醉間一醒豈真醉耶跋史魏公與心聞禪師帖太傳史魏公得法于心聞愛其子孫至今不忘明書記其從孫也持魏公書偈來讀之益信二老相得之深傳播叢林又為裴相國與黃蘗禪師添一重公案跋趙清憲公遺事挺之傳諡清憲與趙抃異案憲一本訛獻考宋史趙右丞相清憲趙公遺事其孫誼録以示鑰遂獲窺先正之風烈嗚呼建中靖國初徽皇鋭意于治親擢公為御史中丞裕陵人物之舊收用無餘黨論雖興猶有如公者屹立于諸公中讒謗競起而主意不移維持國是尚有賴焉使左右皆薛居州事寧至此耶三讀遺編為之感涕跋戴伯與石屋詩卷莊子秋水篇言坎井之蛙擅一壑之水陸士龍逸民賦富貴者是人之所欲而古之逸民輕天下細萬物而欲専一丘之歡擅一壑之美半山詩曰穰侯久擅關中政長恐諸侯客子來我亦暮年専一壑忽逢車馬便驚猜蓋用其語語則工矣惜乎其不大也石屋之勝余未及識伯與以妙思尋幽而無専擅之意思與好事者共之豈不宏哉跋劉杼山帖先子嗜書如嗜芰平生富藏名流翰墨而獨謂杼山先生之書光前絶後尤袐寶之鑰自遭家艱文字散落惟此二番宛然巾箱中疑有神物為護持焉謹帛其縵而新之以續先子之志跋朱灊山自撰墓志灊山先生少年以詞藻表見一世士林傳誦追配前良銘中之文如霜降水落掃盡翰墨餘習非飽諳世故晚歲見道不及此尚何疑于死生之際哉跋徐狀元奭祥符五年敕牒歐陽公歸田録載真宗好文雖以文辭取士然必視其形神器識或取其所試文辭有理趣者徐公鑄鼎象物賦云足惟下正詎聞公餗之欹傾鉉乃上居實取王臣之威重以為第一嗚呼公之擢舉首逺業已見于此非徒為偶儷之工祖宗之取人如是宜乎名臣之衆多也跋楊伯子詩卷平生未識誠齊而多見其詩每深向若之歎璘師示以此卷讀之灑然知其為誠齊之子也筆力駸駸真逼人哉跋秦淮海戒殺帖秦淮海妙墨前輩所推余頃得此本愛玩不能去手時在校官念此邦日事鮮食物命不可勝計欲傳于人未暇也兹來假守遂登之石釋氏戒殺誠是而言之太過不若逺庖厨之言為適中然則何取于此嘗感汝南周顒之言曰變之大者莫過死生生之所重無逾性命性命之于彼極切滋味之在吾可賖讀者宜動心焉跋鄭屯田鍔蓬萊山詩先生風神蕭散肺腑清徹不以事物自嬰故出語輒驚人晚歸自道山來賦此詩未幾遂仙去元丞相微之云我是玉皇香案吏謫居猶得小蓬萊先生殆是耶跋杜祁公草書詩鑰在郡庠直舍時薛君文老以近鄰相過出杜祁公草書雲詩嘗跋之云歐陽公答祁公惠詩言無俗韻清而徑筆有神鋒老更竒二寶收藏傳百世豈惟榮耀詫當時薛君所藏詩雖出于唐人而草聖則公真蹟也歐陽公二寶君得其一矣兹遂登之于石跋薛士隆所撰林南仲墓志淳熙四年冬鑰備員敕局陳君舉任太學録官居相鄰一日同林伯順大備相過愴然曰薛寺正之亡吾儕之所痛也嘗為伯順求先銘于寺正書以古篆恐其難辨又作楷法于後已授我而亡之矣後從薛氏子沄得其藁茫不知何語子能辨之否鑰不善篆而素好之一見才識十二三餘皆竒古難知白仲氏故嚴州使君相與遍閲字書考究幾月而後盡得之寺正于書無不讀耽玩鍾鼎古文搜竒抉怪凡易識者多不用古文所無間以小篆補其闕真好古哉君舉伯順得之喜甚又十二年假守東嘉二君來見曰寺正所授真篆二本後得之故書中取以校昔所考無差者併為刊石以授伯順使寶之以成其志以存寺正之遺蹟抑以見吾兄弟用心之勤俯仰皆有感焉始伯順葬父于金舟如寺正之志後以五年九月壬申改葬于親仁鄉龍門山合其母陳氏云書周禮井田譜㑹稽夏君林以篤學名于鄉紹興間有旨郡給筆札録其所著書以進郡出錢百萬就姚江置局謄寫幾千卷春秋易有解律歷有書余從其孫壻袁起宗鼎得其周禮井田譜讀之井田之廢久矣林勳本政書最為有志于古然僅載田制他書亦未有如此之詳且明者井邑丘甸寓兵于農凡出于井田者無不毫分縷析又皆圖以示人如指諸掌文中子曰如有用我者當執周禮以往其講之熟矣事大體重固非歲月可為惟仁政必自經界始此先王經國之本也故為廣其傳思與學者共講之刋既就錢文季文子指其間有不合者胡太初宗亦相與講明而黃君毅又作問答一卷皆有益于書陳君舉許以序引自湖南逺寄詞雄義渾尤為著明遂併刻之惟文子之說以俶裝薄遽不及附見當俟他日夏君年八十餘無一日不著書其精且博如此以上書補官一試吏而止不得少見于施用為可憾云跋諸名公翰墨韓魏公司馬公王文公韓康公富韓公文潞公王宣徽晏元獻陳文惠韓南陽右諸名公翰墨米寶晉題跋過江以來鮮有之或謂得之揚州擾攘中蓋故家物真可寶也司馬公書必施于所尊其論出處大致凜然不可奪晏元獻屬其弟于人以為不可溫顔兹非前輩之言耶是時士夫書必以小紙圓緘故多用圓印而書無摺痕禮簡而意厚字畫又不苟類可傳後今世専以録子往來語多浮溢紙尾書銜全是吏牘體雖有詞翰之工欲襲藏之終覺不韻重可歎也跋汪季路所藏書畫徐騎省篆項王亭賦舊見岸老筆談載騎省竵匾之說近有敷原王季中彥良實襄敏諸孫余及見其暮年嘗問古人篆字真蹟何以無燥筆季中笑曰罕有問及此者蓋古人力在􅓲不盡用筆力今人以筆為力或燒筆使秃而用之移筆則墨已燥矣今觀此軸信然子孫非不甚工惜其自壞家法反以端直姿媚售一時後進競倣之古意頓盡但可為知者道耳龍眠九歌圖三閭大夫見楚先王廟圖畫古聖賢怪物而作天問龍眠讀九歌而為之圖一段風流視楚人何逺王晉卿江山秋晚圖宋大夫聞襄王之夢孫興公見天台山圖皆想像為之賦文章之妙如此若丹青非親見景物則難為工晉卿固自名勝然方其以金狨遊冶都城嫩寒中安知江山秋晚時事不有南州之行寧能盡寫浩然詞意耶孫浩然詞云一帶江山如畫景物向秋蕭灑水浸碧天何處斷霽色冷光相射橘樹蓼花洲掩映竹籬茅舍天際客帆高挂烟外酒旗低亞多少六朝興廢事盡入漁樵閒話悵望倚層樓紅日無言西下亭燕右離跋元豐八年進士小録先祖少師以是年登科為三等第十人建炎中金兵至四明諸父倉猝避難室廬遭燬故物一不遺章公擇申公子也實為同年生其孫澥與鑰同登隆興元年進士科家藏此書至紹熙改元始得傳録以篤年契以示後人是時當泰陵在諒暗貢闈既試而火時有狀元焦之謡已而果然嘗聞之長老焦之文精而麗亞魁劉公之文渾然天成主文爭或不勝則曰魁恐終非逺器焦竟不及祿而劉遂為近臣是書大略與今日相似而不同者九終榜無一宗子蓋天族未有試進士者任子當有自鎖試進亦不見一人既無廷試止書第一第二等期集所供職才二十五人卷首止以二版書雜事試官書知舉而不及參詳以下猶有明經科謝恩延和殿賜優牒于崇政殿門外又不曉優牒之義四月二十九日奏號五月二十日御史拆卷封三日奏名六日奉敕放榜此皆事之變汪公澥職糾彈秦公觀掌箋奏兹又一時之盛也書張武子詩集後武子拱人也父避地南來往返明越遂家于明隆興初與余為同年生自爾益相好人物髙勝筆力可畏非敢以友友也不幸齎志而歿吾黨共哀之其季以道裒詩二編期以行逺遂初尤二卿為之序以道示余泣且言曰尤公知吾兄之詩而不深知其平生知平生者惟子爾更為我言之余曰尚忍言哉武子天資絶髙少以流寓名薦書文已怪怪竒竒或誚之笑曰吾寧僻無俗寧怪無凡此意卒不變然亦以此不偶閒居好與諸禪逰佛日宏智皆入其室穎悟超卓學亦與之大進結交老蒼聞見多前輩事聽之使人忘倦丞相壽春魏公作尉姚江一見君竒之君亦歸心投以詩曰願同丑萬輩終老孟子門後二十年試南宫魏公得其三䇿心知為武子之文袖以見知舉張公真定曰適得一卷舍人如欲取時文則不敢進果欲得士人否張公曰吾嘗言寧取有瑕玉不欲取無瑕石讀之以為佳魏公曰此某故人張某之文也舍人異而記之比揭榜驚謂魏公曰果張某也魏公罷相居小溪山中武子日從之遊如裴迪之在輞川兩仕都城司糴于外司帑于內皆甚劇泊然如在山林苟非所知雖貴而欲見不造也平時若不以事物自嬰而官業井井可觀惜乎不見用惟詩傳于江湖間爾余嘗跋其詩卷云與武子評詩謂當有悟入處非積學所能到也君讀之以為得我意嘗曰山谷晚年詩皆是悟門愛其金狨繫馬曉鶯邊之句又曰四更山吐月殘夜水明樓東坡嘗賦五更五詩詞雖工蓋惟四更為佳爾又嘗自哦其詩曰客向愁中都老盡秖留平楚伴銷凝又哦其詞曰昨日豆花籬下過忽然迎面好風吹獨自立多時其大約可見矣閉門讀書室中無一物憑案開卷終日凝然性雖嗜詩未嘗輕作或終歲無一語故所作必絶人妻孥至不免飢寒或謂君不為歲晚計君曰水禽有名信天翁者食魚而不能捕兀立沙上俟他禽偶墜魚于前乃拾之然未聞有餓死者其夷淡雅謔類此詩不必贊也其清麗粹潔上參古作旁出入禪門寄興髙逺遽讀之或不易了而中有理窟覽者當自知之跋趙君靖所藏張紫巖帖丞相魏國忠獻公名遂身退又在閒廢憂患中與友壻趙君家問悼亡方切而憂國愛君之言炯然自以為中心未嘗須㬰寧時紹興辛已邊事方擾故公尤以為憂忠肝義膽不徒因事而後見也跋東坡上樞密論開邊書裕陵鋭意攘夷晚乃信用兵不是好事樞臣得公書惜乎不蚤以聞徒流傳至今也跋陳簡齊戲學劉子曰玉屑滿匣不可以為圭璋余則曰雖不可為圭璋要可寶也于此書亦云跋李伯和所藏書畫東坡所作文與可硯屏贊老坡文如河漢而寂寥短章措意曲折不窘邊幅大似老泉名二子說而又過之使但言竹石之工何以為文湖州耶薄薄酒二篇兩頭纎纎終不如月初生虛飄飄終不如花飛不到地薄薄酒後作者寖不及前詞人務以相勝似不若别出機杼蘇氏璇璣圖晉史載竇滔妻蘇氏始平人名蕙字若蘭善屬文滔苻堅時為秦州刺史被徙流沙蘇氏思之織錦為回文旋圖詩以贈滔宛轉循環以讀之詞甚悽惋凡八百四十字即此圖也與武氏所記多不同未知孰是又武氏謂二百首而龍眠止得百二十六首細推之殆不止此也跋安光逺所藏祖廉訪詩跋廉訪公以文受知徽皇屢將使指劉延康之守真定公實佐之分守京城又引以自助尋執節以死公與其三子寶學公以下護喪間關兵火中送之建陽未至而死于道其為人可知鑰頃以假吏過趙石橋色深碧而纍甃堅緻中為大洞跨水兩旁橋基各為小洞三若品字洞中多前良題刻不能詳記意公詩在其中也此軸多北刻無别本安氏尤當寶之又張總得與其父子伸帖總得翁才氣髙邁其子紫微公文采名重一世議者猶謂不及其父所與安君子伸二帖稱歎如許欲得名章俊語為定山中故事求新詩以矜式此翁豈輕為許可者耶跋撫州崇仁縣義約媺哉義約之立也風俗之媺惡繫乎士大夫先正名公有以孤生薦于鄉歷求裹糧于親故終不滿千錢憤且慙挂錢于城門矢之曰我且顯當徙族以去已而果然非輕去父母之邦蓋病其里俗之不可變也崇仁固多士有因此約而成名他日得志必益思有以媺吾之俗凡濟人利物之事相與講求而興起之下至田里必有出入相友守望相助疾病相扶持之風近者悅逺者慕一變至道當于此乎取何止為目前寒士之利也耶書魏丞相奉使事實隆興二年金以兵壓境朝廷選使右丞相壽春魏公時在淮東宣諭司議幕見大夫無可使者召對便殿遂授使節敵勢方張事變叵測所謂飛矢在上行人在下而公握節抗議動中事機氣徑詞直要約遂定迄今三十年邊境晏然厥功茂矣此書所載皆其實跡也方來歸時鑰適在都下士大夫皆謂必有醲賞殊渥迎勞境上以寵其至至則論賞如格與平時泛使無異公亦退然即司宗官次而不自言久之而後為右史又久之僅遷左螭亦以序進而已蓋平時壽皇鋭意恢復中原紹祖宗之大烈敵未退聽嘗詔公盡以禮物授督府為犒軍費雖卒就和議聖意不以自安也公既登從班典銓縯綸封駮相繼上眷日隆一歲九遷乾道元二間以夕郎攝大天徑除同知樞密院兼參知政事不數月參預為真是冬遂登揆路宰相代天理物固非賞功之官公之大用君臣遇合殆不以使事至此也制麻初攽賀版如織有客歷叙奉使大節既而曰逮兹登用咸謂疇庸在宵人竊謂其不然待丞相不幾于太淺使蘇中郎亶典屬國固難酬抗胸奴之功然富韓公卒為大臣豈専以使契丹之故公讀之以為佳公之意可知矣元豐中裕陵命蘇魏公纂修南北通和以來國信文字賜名華夷魯衛信録仍别録一本付樞庭聖謨逺矣中更喪亂書遂不全嗚呼攄髙文之宿憤必有任其責者于此書尚有考焉攻愧集卷七十
