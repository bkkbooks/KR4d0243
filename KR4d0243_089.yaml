body:
  text: 宋樓鑰撰行狀華文閣直學士奉政大夫致仕贈金紫光祿大夫陳公行狀曽祖砥故不仕妣林氏祖嘉謨故贈右朝奉郎妣黃氏贈安人父膏故任左朝奉大夫太府少卿纍贈特進妣蔡氏贈安康郡夫人汪氏封咸寧郡太夫人贈新平郡夫人本貫興化軍莆田縣崇業鄉孝義里陳公居仁字安行年六十有九狀惟陳氏胄出姚虞為世著姓後漢文範先生以來世系蟬聯皆可推考七世祖司直避五代之亂自光州徙于泉之莆田國朝升邑為軍至今衣冠不絶特進宦游聯姻四明遂著籍慶元之鄞始特進來依甥館公以建炎己酉生于奉化未及月而寇攘蜂起親黨竄伏窮山公在襁褓不作一聲同行相與言曰此貴子也少長頴悟性不好弄厚重如成人十嵗已學屬文特進以文章氣節望于朝始分教汾州佐延康張公克戩守城捍寇知惠州值曾衮之變徑至賊壘譬曉之賊氣奪而降為御史四明有僧法恩謀不軌而事覺或請屠城以示四方力論多殺非聖世事得㫖赦不在法恩之籍者又爭之謂籍餘萬人其實不足稽據況皆脅從願悉寬宥兩州皆賴之其大節如此宜其有子也公幼時侍立聞汾州事能憤然激烈特進為泣下且曰此兒當大吾家特進嘗語之曰似聞欲以我使敵固不憚行汝能任家事乎公曰大人惠州見賊時未嘗反顧今尚何念某雖幼敢不勉特進益竒之甫十四嵗而孤執喪如禮新平夫人挈以依外氏誓終靡他公尤盡孝養相倚為命勉之學益自刻苦有一日千里之敏外祖少師外祖母王夫人撫愛如己子以特進遺澤補將仕郎調信州鉛山尉連取漕薦紹興二十一年登進士科特進舊與秦丞相投分至密時御史多由此大用嘗風特進論一二大臣堅拒之而抗疏求外坐此左遷而弗能害也時秦公威柄方盛喜公取世科或勸一見可得美官公曰是有命焉終不自通鉛山當孔道盜賊出沒公設方略部分而厲使之盜不得發嘗以公事忤泉使及行縣以威脅公公請納告辨白退束裝以俟劾使者竟負愧去繼之者翻以此知公授永豐令改監行在㸃檢贍軍激賞酒庫所糴場隆興元年孝宗修髙廟聖政妙選僚屬時參政范公成大為和劑局與公皆自管庫中兼檢討官二年考滿當改秩既已進卷丞相壽春魏公使金公嘗學事之辟公為書狀官時和戰未決敵兵在淮北人請恟懼公以身許魏公至境上議久不定突騎大至上下失據公欲上馬猶從容舉酒告魏公曰先生冒寒且釂此觴觀者壯之既退京口尋復北向真所謂飛矢在上行人在下遣諭敵兵開道而入皆引滿以待魏公察公無懼色唶曰仁者之勇也卒遂成禮減嵗幣而還公之贊畫為多改左宣教郎以奉使賞轉兩官差充諸王宫大小學教授時魏公日貴乾道元二年間進秉國均公方忍貧需遠次閉門讀書未嘗求進初虞雍公一見竒公欲引以為用公不欲就六年始赴又導公言兵謝不能退以書抵之謂有定力乃可立事若徒為大言終必無成幸成亦旋敗雍公為之動色踰年始為軍器監主簿明年宗寺闕官競謀攝事以希寶牒之賞俄得堂帖權丞宰執謂公曰求者紛然擇不求者授之輪對奏立國之要在規模先定陛下非無可致之資而規模未立孝宗初頗不懌曰朕未嘗不立規模公奏陛下鋭意恢復繼乃通和和戰守三者迄今無定論不知何者為規模上曰此則隨機而應公復奏發號施令使人必信可也今朝令夕改人得一闕臨時更易尚不能保外間至有前降指揮更不施行已差下人别與差遣之類此不可以不戒以録本納政府雍公曰適已見之規模即前日定力之論某今益知此言之當也遷將作監丞國子監丞祕書丞再對奏文武竝用長久之術陛下奬進武臣深得持平救偏之道正恐未必得智謀勇略之士或多便佞輕躁之徒又非兼用之本意上曰只為文臣太勝要當扶而正之又奏聖慮甚至但又不可過恐復至于偏勝又奏邊民盜馬事宣諭直㫖行下少蓬去位公専省事臺察奏太史局生所學淺陋請增三二書以試之公顧同舍曰國家禁此等書嚴甚不應用此增試無敢忤御史者公入奏上稱善即寢前議議者不樂公乞去相君堅卻之且曰上方譽美未巳將上則御史不安是年郊恩賜緋薦攝禮部郎中嘗奏論臺閣宜多用明習典故之士上曰知名之士試舉一二公奏如周必大洪邁久在禁林不待臣言李燾莫濟豈應棄之侯國上欣納甫數日首召李公尋再請差知徽州時朝行三數人以故去皆乞免對公不欲為異亦乞免謝辭上指曰陳某無他可令陛辭而行臨遣甚寵且曰方欲用卿乃遽求去卿其清省獄訟盡心民事政成當召又謂大臣曰陳某論事明練貌類汪大猷曽丞相曰是其甥也淳熙四年赴郡郡自五季楊行密割據刺史陶雅宿重兵賦入倍旁郡祖宗削平每下寬令又以山多田少米則輸八折十絹匹當重十二兩徽獨止十兩左帑忽加退剝守遽使如令民益不堪控訴徹聞上慨然欲蠲之出自睿斷謂申舊制恐悍吏或能重為民病乃命竝輸十二兩而舉郡所輸之數率十二匹而蠲其二以絶竝緣之姦公適當其時官吏奉行過當揀擇太精公即諭告而痛革之時版曹威嚴無敢忤之者公貽書謂天子節經費以惠儉瘠不能推廣聖德吏則有罪自今茍及度程隨至輒受敢豫以告已即自以名銜受輸植二表于庭有中度而遭抑退者抱所輸立表下老校抗聲以告親為分明之鈔至隨即批銷人無留滯吏不得搖手實惠確乎及下秋苗益選良吏減加耗之甚者石可四五升民往往裹贏以歸徽之政甚休而得民之深多此類又連嵗大稔米至不論錢民以為數十年所未有也郡有大溪嵗晏民未病涉忽鳩工造渡舟數十艘莫測所用梅霖暴漲遂得以濟始知公先事遠慮之效自是嵗一舉行抵今賴之既新軍資庫造閲武亭復于郡庠創御書閣甚偉皆取于餘財民不知役聽訟明敏剖析滯事情法曲盡或至千言鄰境有詣臺省願得公定斷者御史府索案去官吏創見為之股栗公略不排比徑以授之御史亟稱于朝曰古之良二千石也既受代吏民遮留真有截鐙斷橋者公由他道去父老或送别數十里外生為之祠去郡十餘年遇生日郡人必來拜壽後赴武昌取道郡中猶聚綵揭旗填擁道路亡慮千萬人非素有以感其心顧能爾耶還朝入對褒諭再三首曰新安之政甚好從臣臺諫屢為朕言且舉卿所斷水利之訟為之賞歎不已奏劄四篇皆依奏付出其一乞編類隆興以來寬恤詔令有曰法久則易玩事久則易怠惟申加戒飭有以警其觀聽則千萬年猶一日也上讀此數句至再曰可謂名言其二論絹賦匹數既減吏胥市例大有朘削恐後日復有苛取重擾乞加告戒上曰變法之初賴卿盡力方成實惠正恐後人未能遵守尋即御批行下本路監司常切覺察如敢違戾具申尚書省取㫖重作施行初在郡因奏五事末章極言歸正忠順過于優渥而戰士反輕雖曰猥多固自有十三處戰功之别此輩皆出萬死䇿勳之人今老矣添差已罷廪稍半給至丐于市軍士歎恨有解體者乞明詔優恤以示終始念功之意堅後生圖報之心上覽之嘉歎㑹駕幸白石大閲即以是日出命再添差兩任衣糧全給三軍為之呼舞至是上又稱向來五事中論戰功事甚當此曹既曾為國盡死力豈應老不加恤卿于職事之外能用心采訪尤見為國公遜謝玉色甚悅且曰便當用卿自是受知益深矣翌日諭大臣曰陳某詳練敏達為政極有聲奏論又切當且留為郎以俟用遂除户部右曹郎官㑹要書成奏篇適在除郎指揮之後特㫖轉行朝議大夫且語丞相曰治行方為天下第一一官不足道嘗兼攝度支二卿欲援嵗例從南帑借貸公曰用度方殷援例或不從則無䇿去嵗明堂借撥左帑金帛莫若徑乞撥還上初以借貸不可為例知為還撥即許之二卿曰公之先見乃爾耶再兼禮部㑹樞屬闕員方以著庭名進擬上曰陳某今何官對曰今為郎上曰豈有人才如陳某而可久為郎乎即除樞密院檢詳諸房文字二樞不受私謁差遣恩例悉令投牒送檢詳所公為之考令甲酌故實可否立決右選翕然歸心年除嵗遷遍厯左右司三年至中書門下省檢正諸房公事天下事上于政省者無不關都司公處事明審持心忠厚議論寬平咨白又為明暢執政曉然易從間有不可隨事辨析終歸于是乃已退亦不以語人諸公由是開心相豫綱餫調撥展轉失序謂如湘潭來赴升潤江西卻上荆鄂之類道里回遠費幸滋繁公盡搜故牘考閲程限擇其便且順者更之計嵗省導行費等百餘萬緡賞典不預軍屯得米既便且速嘗因輪對及之上曰非卿忠于體國誰能及此又歎曰似此非一端本為貪賞如此鄭重人樂因循故不能改耳荒政方急事有便民者立為稟行徽旱尤甚蠲放至八九萬緡嚴婺亦且十萬㑹有論徽饒二守救荒無術又有言流移多二州之民上震怒皆至追停自是守令罷者相踵公奏長吏不能奉行黜免為宜但送迎費重文書斷絶職業且廢今既罷去其太甚者餘或有聞請姑從鐫秩以責來效上深納之先是文書之下六曹指定勘當者三日之限或逾月不報公擲其尤者繩之長二徑白宰府請從闊略公曰六卿雖尊事在有司安可慢令吾位固卑所以糾六曹者安得以尊撓法卒治之朝綱為肅刑房獄案如山翻閲不倦一以平心應之謂有罪幸免則寃者何告以故平反雖多而無失刑士夫陳理恩賞改正過名有所拘閡者一至都司鮮有克濟公曰吾豈賣恩者若一切沮之則吏愈弄權失職者何賴躬自疏白不以屬吏有任滿賞為部吏所格者公詰之乃曰指揮中有自今後之文公曰前乎此後乎此者皆得之矣指揮本欲從寬今乃為汝輩舞文之具耶徑為放行且請刪此三字以絶吏姦又捕盜賞有執續降為言者公曰格改之法不可用乎吏駭服大禮之後埋雪紛至公為之裁訂擇取七人皆當改正丞相難之辨論數四艴然曰檢正自將上則可公曰丞相以為多耶某于二百人中精核得此皆坐罣誤而沈抑者願推內溝之念而行之固爭不可退各疏其冤狀且欲引去丞相徑以公手疏者將上上一閲之即曰陳某精審尚復何疑便與施行廟堂嘗啓擬某人能文上曰朕但聞陳某能文爾是嵗攝侍立者三嘗因旱求言公應詔乞公卿務行寬大頃嵗監察御史京鏜極論從窄之弊已䝉開納此風未革殊無和平氣象聞者韙之仲冬上謂宰執曰欲令陳某奉使聞其有親能為朕一行否試諭之公回奏有賤息可以奉老親惟命之從遂借吏部尚書差淳熙十一年賀金國生辰國信使正初陛辭公嘗兼領左藏三庫上首曰每以繁劇相浼備見忠勤但非所以纍賢者耳祖宗用人不拘清濁全才須詳試乃見公奏每恨駑蹇不足以共煩使褒諭非所敢當也使還除起居郎入謝上曰卿端靜有文將處卿以清要久矣去嵗欲用為諫官今日立螭不必多謝論墟田多勢家所據使水無所瀦復無所泄墟田未作嵗多豐稔作墟以來水旱屢告利害甚明上稱誦久之又曰卿今在邇班凡有所聞悉當忠告㑹西掖暫闕即令攝事曰朕亟欲觀陳某詞命兼同詳定一司敕令上曰朝士中如陳某惟善是從所謂心平氣定之人也明年春兼權中書舍人泛恩濫賞封繳無避有察官奏旅櫬之殯寺院及十年無子孫祭省者許自與焚爇公即繳論謂如此則緇徒之無賴者得以藉口而子孫之不肖者亦得以挾詐請增為二十年必經涉郡邑為之勘驗得實方許埋葬仍標識以待其家尋訪上大悅從公之議曰臺諫給舍多成一律如此方見和而不同時金使不通人情多疑公因對上問卿比出使見其情狀果何如對曰必不動自古敵國欲有為必匿其壯士健馬今呈露無餘又其上下習驕以兵為諱決不輕舉顧在我不可不備臣以為外敵不足畏而內患不可忽也前郊祀四日除中書舍人人益知上眷之渥升兼詳定既謝上曰已將宿齊百穴中忽記得卿未為真豈應更過一郊耶公曾以足疾求去問勞尤篤且曰當自處一方賜卿須是就補中有去風藥乃佳移時方得出奏劄論上有恩惠而小民不預名為寬逋負足以惠頑民耳名為赦宥罪足以惠姦民耳願因慶赦盡放天下五等户身丁四等户一半上笑曰正合朕意乃于赦中行之公在詞掖最久論事不為苛細而詔令有不便事關國體人所難言公輒論奏率䝉報可安定郡王乞封妾為夫人公以葵丘同盟事繳奏他日入對上迎謂曰所論子彤事極痛快且是有補風教朕為之擊節不已奏事訖求去上曰今氣宇大勝前時何為及此對曰進退之義所當講明況近列乎上曰朕用卿之意殊未艾又嘗論朝廷之事失于好詳君人之道貴在執要今陛下親細故而忽遠猷事末節而紊大體願深思漢明帝黃老養性之言俯循唐劉洎多記多言之諫舉綱要以御臣下省知慮以頤精神上曰邇亦自覺叢脞遠近大小之臣未曾及此尤見忠誠次日語輔臣陳某之言甚忠卿等相與持守簿書細故可省即省不必繁瑣自今亦當少降指揮中書務清方是朝廷之體全在卿等留意熟復其言可也後數日王丞相以外郡財賦事奏上曰前此方言之如此則又非陳某奏劄中意朕不欲自催幾錢此當責之監司方說不可叢脞不應又爾丞相以下愧謝此事已編之聖政中閣老李公巘出疆以闕官奏上曰陳某一人足辦不必更差他人內相洪公邁典貢舉復命兼直學士院王言俱出公手應之不繁上臨朝嘗曰官欲擇人信非虛語向來中書或用三人今內外制獨陳某一人當之略不見其難時因邏者興獄公奏長吏帥屬有贓不劾至煩陛下自用耳目既非執要之道又恐人不自安乞詔內外長吏各公心考察陛下端拱責成可也伺察之風誠不可長又論列聖德澤至深自熙豐變更崇觀侈靡利源日以浚廣脂血日以朘竭今賦入數倍于昔而大農調度略不少寬日以益甚聖心焦勞固欲省賦以寬之而養兵所仰有不可闕然今日曰養兵明日曰養兵是終不可為豈不深可慮哉願詔大臣博議絶浮費汰穴兵以其可省之數定為蠲除之目所以續民命而壽天下之脈豈止召和致豐而已哉上皆是之一日從容謂輔臣曰陳某老成凝重可大用葛邲亦其人也又曰使是人坐廟堂自然安靖和平天下本無事庸人擾之耳秋復丐外上固留且曰卿忠厚而疏通朕大用之意已決切勿曠也冬髙宗升遐醫官王涇死有餘罪止從鐫官編置公勃然必欲置之極典率同僚俱入奏省吏謂無前比公曰臺官既許全臺省官獨不許全省乎極論之得㫖貸命杖脊于都市刺配筠州無不快之給舍久無連銜之舉至是復振矣思陵之役臺察漕臣相繼以戒苛擾節穴費為言公獨奏欑宫應辦事重期迫不無繁擾議臣不得不以上聞陛下不得不加申飭臣剽聞沿路八頓只作二頓翻衮酌獻神幄亦欲轉移酒果微物三日一易過為裁抑四方何觀願存大體毋至削弱以全送往之孝德壽宫官屬兵衛宜與寬假上瞿然曰人但以浮穴當節不思反失欽奉之意忽泣數行下曰向非卿言朕亦未悟尤見忠藎更降一詔明示朕意如何對曰不必降詔前日詔百費自內庫支罷諸路州軍貢獻已自明白但乞持之以堅則聖孝有光矣上曰卿每事盡忠而知體久欲置卿于經筵適無闕近諌大夫有闕深欲處卿亟閲班簿在職已二年不應下遷少須徑為中司可也公力辭不敢當上曰祖宗時必用淳厚忠直者為之卿正其選又固辭上曰别思所以用卿數日兵部尚書宇文公價對方及欑宫事上遽曰若欲省費斷然不可公與權禮部侍郎顔公師魯俱久次宰臣奏各二年有半矣上曰顔某奉使回即與為真陳某則更欲少俟近及三年以其代言論事皆得體又甚盡忠俾久留後省須殊遷以報之十五年五月新平已被疾求對力丐外祠以便醫藥上卻之且曰卿每每要去可見易退即日當峻遷非平進也對曰臣豈敢以求去要進上曰尊親壽幾何何以致疾公對曰小人有母何敢當尊親之稱具以實對竟不許去公再拜復奏懇切上為之蹙額眷眷不已雖許留劄子退及家則不允之命已頒上方之藥踵至次日旬休十一日欲下除目宰執奏已遭內艱矣上嗟惻久之亟賻以金帛公哭過于哀公卿弔者不惟惜公之去國而尤慮公之幾于毁也服闋除集英殿修撰知鄂州鄂號難治唐崔郾所謂土沃民剽雜以夷俗非用威莫能治者在今日最為重鎮三司鼎立尤費調娛及公為之從容泛應三司如一家軍民帖服郡計仰商征公總大綱加惠行旅而課入倍蓰人情翕然盡心力為之三四月而領略江山得坐嘯之適政譽流聞以為前後所無有寬賦勸耕曠土加闢築隄捍江水患遂除興國沔鄂之間私鑄聚衆至數千人巢穴深阻寖成盜敓公聞之曰勢已滋熾緩之則害大急之則事生諸司欲調兵公曰計必出此然民兵習知地理可使大軍持重以為聲援不足平也密召總首諭告纖悉俾圖之不踰旬梟其魁以徇餘皆縱使歸業始以奏聞仍乞分戍以鎮其地郡有案樂寮以養窮民病夫嵗久漸隳公為增大之具器用給公田至者如歸焉紹熙三年進煥章閣待制褒治行也秋大比計使以外郡士子附試公固持不可則徑以勢臨考官公度其必致紛爭五夜躬至棘闈之前叱外郡士毋得入譁者始定屯兵數萬軍民有訟平心而處隨輕重曲直牒軍中治罪主帥既樂其不相侵亦不輕貸由是感悅而知憚去郡數年人皆祠之不忘此豈驅之使然哉秩滿移建寧府俗尤徑悍動輒殺人公始治鬭毆尤嚴于為首者環視不勸止亦且連坐鬭者為之衰息聞浦城有謀弄兵者戕一家數人鄰里擾動公召左翼戍兵五十人授以方略計日擒之崇安又有因告糴而殺傷者尋亦捕獲今上覃霈公與二使者議此輩皆亂民茍赦之不惟死者含冤將復出為惡矣遂誅之而待罪自列境內肅然郡苦多訟蓋有専以把持誣訴為業者家已致饒鑿空造事吏因為姦日不暇給公親筆數百言疏其情狀示以法禁且戒屬邑無輕受妄訴受者先坐之舉必行之令嚴反坐之法自此缿訟頓清矣寬宿逋十餘萬又代輸下五等繭稅民以生佛稱之公在鄂渚政聲行于江湖間建去行在所不遠朝家益知公為詳改知鎮江府適當洊饑請粟于朝謂郡有餘資不應公再疏曰舊將所留緡錢十有四萬不能糴三萬斛以支兵食尚不足何以為振業計又不報直以書抵丞相曰丞相平昔以愛民稱一旦得政豈應遽變所守畿甸之近尚委而不顧遐方遠徼且將若何某願乞身以歸不忍千里之民徒為餓莩也始許稱貸公分畫詳備講究深切委遣僚屬事無遺慮猶以為未盡乘扁舟屏騶衛時一到給散之所茍朝去而暮可還者皆不憚往有弊即懲有勞即勸至誠惻怛無不感勵吏胥亦習知公勞瘁之意至不忍欺人人如使君臨其旁闔境均及全活數萬計他郡流移者亦及之邦人以為自昔賑荒未有如今日者也始米價翔甚雖給糶以平之正恐不繼又告糴于荆楚遠商聞之曰是陳待制耶俱告于湘北計臺願以米就糶計使胡公瑑以書來曰公之恩信固有以孚于商賈此事殆古所未見米舟沓至價遂以平郡民不知饑之為害也前守造閘于丹徒鎮欲取江潮以灌漕河而地勢髙仰水終不登公為之撤去改造石䃮以泄霪潦父老因公按視羅拜謝曰固民所願不謂使君慮及此也埭下巨艘連檣櫛比江滸公問風濤猝起汝曹安得無患合詞對曰沈溺時有之顧無䇿以避耳公訪問舊有海鮮界港嵗久湮塞亟往營度鳩工濬治民旅相賀謂自此可以無恐矣又造二巨艦以濟揚子之險皆為永久之利嘗有一僧投牒自言結廬瀕江每為邏卒所侵擾願行禁止公察其庸悍詰之曰距此幾何曰在鎮江江隂之間各數十百里公曰吾得之矣地僻而介于二境官府既遠盜賊出沒汝必為之囊橐僧懼甚立命尉曹掩捕果得盜數輩其中多為便房曲室即破壞之悉置于理撤其屋以增養濟院籍其田歸焉吏民驚以為神咸曰此巨蠧也非迅雷不及掩耳未易鉏治自此奠枕矣饑民既蘇帑庾赤立幾不可支商旅久服公名願出于塗課入增羡公不欲多積又代下户之輸嚚訟未息公自以向者三郡令無不孚此邦獨未盡服是吾之過也乃罰俸以自咎百姓咸悅憲使何公異聞之曰韓延壽之閉閣復見于今具列政績及此事聞于上三山謀帥公為首選加寶文閣待制邦人挽留不可迓吏至或詆之曰爾輩乃奪吾慈父耶赴鎮過建上父老歡迎如過徽時喜公容貌不衰無不以手加額福之屬邑十有二有去城數百里者豫戒令佐毋得詣郡専以靜鎮之推所以治建者行之八州初入境領帥事狂民有嘯聚者公念攻之必散入旁郡分遣迓兵數路要截如指諸掌裨校奉成算以行賊計窮酋豪度不能脫皆自經餘數人定罪有差脅從者縱去姦盜為之屏跡治宗子之橫暴申蠱毒之舊禁蠲買鹽之宿逋優貢銀之市估內侍幹辦啓運宫忽折簡相要公惡其桀傲劾去之慶元三年二月召赴行在長途冒雨得疾及關遽劇既平待對蕭寺又為嵐濕所乘疾復作力請外祠至再始進華文閣直學士提舉江州太平興國宫六月庚戌抵家甲寅疾勢遽變遂薨于正寢甫歸即語諸子吾之病病矣仕至禁從五綰郡組事君臨民不敢有愧于心今日無可憾者惟先塋之碑未立義莊規矩未備汝曹其圖之其為我上章休致尋有㫖轉一官致仕遺表聞贈金紫光祿大夫娶王氏贈朝議大夫居隱之女封令人先十三年卒贈碩人子男六人曰鞏宣議郎曰革曰曅曰芾通直郎新知湖州武康縣曰卓宣教郎新知紹興府餘姚縣曰阜承奉郎鞏先一年卒革曅未命女一人未嫁皆前卒孫男四人允協承奉郎允迪允修允諧女五人長適紹興府鄉貢進士石矩次許嫁王野餘尚幼碩人葬于鄞縣豐樂鄉橫溪西奧之原諸孤將以十二月甲申奉公之柩合焉公性資渾厚風度凝遠胸次洞然而臨事甚密與物無忤而見義必勇和氣襲人望之而意消至誠待物不能以形遁忠孝篤實始終不渝恥言人過寸善必取不以己長望人而喜人之勝己自奉如寒素而周人之急則不計有無善與人交久而逾敬道廣而能周雖有强戾鄙俗之人一與之處自然降心非意相干恬不之較彼自悔忸待之如初推賢揚善不遺餘力無一毫媢嫉之心人以為不可及而公出于中心不自以為長也自為小官所立已不茍出入朝行奏論一于納忠知無不言言無不聽推誠薦士有味其言一時推挽多名流有致身法從者林公栗䕫州之罷上怒未已公力救之楊公萬里由祕書監漕江東上疏留行皆人所難獻替甚多而不自表暴故天子信之而士夫推服在都司嘗以論事忤王魯公久乃信服曰吾之益友也知院胡公晉臣同省嘗曰舊聞名而未識面今自以為得師也給事中王公信每語人曰陳公一片心地所謂海內少雙少以文受知于魏丞相汪端明應辰進學不倦文亦愈工尚書韓公元吉稱之曰文詞溫潤有制誥體異時必以名世正獻陳公嘗薦于上曰前御史陳某在太上朝挺然為名臣今其子賢而有文金玉之德絶似乃父文惠史公屢執手曰觀公人物器業必當鼎貴在相位時恨不得相成尚書程公大昌曰陳同年文章今日之巨擘而政事則龔黃當反出其下待制楊公曰陳公海內名勝某平生之知己也周益公尤愛公之文時以佳句誦于百僚上又薦之孝宗嘗曰某交游多矣耐嵗寒者惟公一人此相知之最深者也特進之徙于鄞田廬之在莆者悉與羣從鄞才有租四百斛仲氏蚤世尤愛其季每以自隨特進捐館新平命公中分以與叔父後以特恩補官卒老于貧公時自窘于用而周恤其家甚至試郡奉叔母與板輿俱行葬送婚嫁一力辦集二子諸壻及甥又皆仰給久而彌篤二女弟適張氏王氏夫婦俱亡矣以張氏中女嫁曾嚴州集又嫁其季女王氏妹生一子曰徹新平尤愛撫之今上受內禪公在建命之奉表遂補文資莆中宗族生事死葬無不被賜從弟翟仕于南而殁其兄雃方教育其孤而雃又亡公取其季以來愛之猶子也遂聯入太學兄子肇頗友愛而貧無以自存公以叩益公益公為感動遂官之公又命諸子斥田二頃略用范文正公義莊規矩以給宗姻三山之行晝繡有光族黨接踵至戲下待之如一捐俸以給之親故有急無不周恤待安康之族不異汪氏義襟特達人有難及徽州招三衙軍立表于門有願行者躬閲之有一人疑其氣度不類卒伍問姓名曰雍彥恭詳問之則泣下曰有先人之遺澤可以仕厄貧故自棄為此公惻然既飲食之命取文書來為召保任奏上且給其費命下又撫養之至數年在都司有稚子訴其父官廣中嵗餘不得俸竟死厯劵具在即堂白下左帑代支令本郡償納仍飭諸道小吏俸不以時給者劾長吏在建有嫗自言前推官之家夫婦俱沒二子乞食久矣求自便公訪其實乃華亭柳氏即為闢官舍給常平之粟取布帛于私帑為之買田又教以學去又以屬代者公之及物類如此者衆三事尤其著者公自宰掾以至禁從無嵗不上丐外之請或勸止之則曰叨在要塗不可待君相厭薄而後去晚臨四郡在外八年後來者多已得政或為公稱屈則笑曰前輩有言人生五馬政不惡與人處處為春風故能不薄其官奉職日謹精力德量皆不可及所至惠利及民水旱有禱率應如響若有相之者尤善因其俗以為政寬猛適宜鋤姦無所顧忌撫恤善良若不可解于心去徽之後尚為長慮論夏稅和買著在甲令兩數有差更法以後臣既去郡乃悉輸十二兩是欲輕而反重請竝從定制上從之徽人聞此感德深矣僚吏各盡其情樂為之用賢者推轂恐後間有按劾皆甚不得已而后發一吏一卒不至屬邑各置一厯守宰親筆往復吏不得窺情實具見如對面語不待鉤距出竒而政成于户庭矣未嘗以私喜怒施一箠亦不妄用一錢非有疾故不謁告惜官物如己物治公事如私事每曰要當一日必葺而便坐蕭然自謂凝塵滿室淡如也遂以淡名室公退則讀故書尤熟于班左摘其精要為一編名曰擷芳故公之文溫厚爾雅有二書之風有奏議制藁二十卷詩文雜著十卷藏于家諸孤將版行以傳世厯任四朝出藩入從飭已甚嚴了無玷缺天下之言長者莫先焉鑰亦汪出與公俱生長外家公見老母及舅氏尚書每興如存之感待中外諸表俱厚鑰既奉祠無時不過舅家聞公之歸謂當春容里社鄉人已有一舅二甥三學士之謠天乎何奪吾表兄之遽也始公荷孝宗隆眷埀上政塗而以憂歸今春召還謂必枋用及門而病不能朝終不得究經綸之藴豈非命耶嗚呼姑無問此以公之仁厚有餘竒龎福艾意必享上壽而年不及七旬以卒尤為可痛也薨之日上而士夫下而兒童走卒識不識無不傷嘆內外姻黨哭之盡哀五郡吏民以次致奠且道其邦人聞訃涕泣幾為罷市殆傳記所罕見也諸子承公義方各以材器自奮鞏嘗魁國子監芾兩以漕薦上禮部卓登紹熙元年進士科積善餘慶其在兹乎將葬芾等泣拜求狀公之行知公之詳無如鑰者又以舊所聞審于母氏舅氏謹書之將以告于太史氏而請諡于朝若處鄉治家之法皆公之餘事也不屢
