front:
  text: 攻愧集卷十五
  hash: sha256:7b20972e04633c45929c55da8700b0706ad6346ef65f390fd07f63efec877285
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_015-1a}
body:
  text: 宋樓鑰撰表箋請舉樂皇帝第一表春秋重攺元法蓋先于五始君子不為樂古無越于三年請為王言冀同民樂中謝恭惟皇帝陛下系隆列聖娛侍三宮綿宇屬心既極謳歌之戴重華盡孝適承遏密之餘顧烈祖之報厚且重焉然文孫之制期巳久矣況復高廟即安于神御壽皇俯和于祥琴下逮都人悉除樂禁新王春而建號進寶册以歸尊願飭攸司各揚乃職鏘八音而應律肅萬舞以充庭仰奉重親益見慈顔之喜下孚衆聽普臻和氣之祥擬第二表睿主承休光啓太平之運王正肇始益新治世之音爰伸百辟之誠未動九重之聽洊陳奏牘進冒宸旒中謝恭惟皇帝陛下仰紹心傳率循家法念德壽詒謀之重體重華盡孝之勤既居崇高富貴之尊未聞文采節奏之美聲音不足于耳豈為是哉禮樂不可去身有為貴者雖聖帝尚深于餘慕而禮經尤務于適中莫先鳳歷之頒宜上龍樓之奏豈止君臣相悅第成徴角之詩將與天地同流益致形聲之應至尊壽皇聖帝第一表高蹈萬乘聿重協帝之華躬行三年曲盡慕親之孝矧將陳于册寶盍備舉于樂章爰率具寮仰干淵聽中謝恭惟至尊壽皇聖帝陛下怡神于淡遊物之初惟付託之得人宜燕頤而養性方且羮牆在念疏素以居既巳光舜禹之傳乃親為曾閔之行期可巳矣必欲加隆祥而廓然尚云寧戚顧平時不好世俗之樂豈今日忍聞堂上之歌然而和琴俯就于成聲鑽燧再經于攺火不應慈極尚遏諧音伏望酌先王制禮之中念聖子承顔之養居處笑語寖寬追遠之思鐘鼓管絃益致導和之美第二表三年執禮巳經徙月之期五日受朝當備鈞天之奏援彛章而有請閟俞旨而未頒事恐久稽義須再瀆中謝竊以帝舜既命大禹猶欲六律五聲之聞漢皇上壽未央亦以萬歲大笑為樂蓋巳膺天下之養盍具舉朝廷之儀若稽舊章允屬盛際恭惟至尊壽皇聖帝陛下道高物表德邁古先既全與子之明尤盡因心之孝謂太宗就簡遽為三十六日之期而晉武欲為莫起數百餘年之陋出于獨斷高掩前聞羣臣仰體夫聖心薦歲忍形于奏牘逮兹即吉乃敢發端既巳遏音于三載之餘正當成歌于十月之後況卜元正之吉將新徽號之隆儻非廣奏于和聲何以崇成于縟典恭聞南內將騰聽樂之章欽想東朝亦望承顔之樂仰祈睿旨俯徇輿情擬第三表洊貢封章祈舉九成之奏未承誥命敢稽三請之勤中謝恭惟至尊壽皇聖帝陛下高視帝尊共為子道自畢因山之奉巳合外除靡從越紼之權竟全終制遠復先王之法肯循後世之常逮其今兮何以尚此至矣盡矣願聞大舜之韶皎如繹如當語太師之樂雖欲勿用其將何辭濟濟羣賢傾聽笙鏞之間欣欣百姓喜聆管籥之音擬壽聖皇太后箋三載遏音巳全于中制兩朝就養當備于和聲中謝恭惟壽聖皇太后殿下德並娀莘行齊任姒佐中興之業協濟艱難贊內禪之明共安間燕比驚慈扆忽返帝鄉乃安長樂之居密受重華之養神孫御歷寶册陳儀豈應迎年而不為樂琴瑟之友鐘鼓之樂諒未忘儷極之思羽籥之器綴兆之文願俯徇輿情之請賀正旦皇帝表歲必履端蓋重四時之首年初建號有光二帝之傳矧慶事之鼎來效羣臣之善頌中賀恭惟皇帝陛下乾剛行健離照繼明正月之吉始和春祺既集四海之內咸仰王化方行當周家布政之時乃漢歷攺元之日喜瞻萬乘上寶册于三宮肅領千官奉玉巵于前殿借備琚瑀珩璜之飾創聞鐘鼓管籥之音益知嗣德之在初孰謂太平之無象開八荒之壽域登庶俗于春臺臣猥預周行欣逢榖旦方千里者九想同望于堯雲呼萬歲者三敢競伸于虎拜至尊壽皇聖帝表歲之朝日之朝方肇新于鳳歷尊之至養之至爰啓慶于龍樓歡動宮闈澤均海宇中賀恭惟至尊壽皇聖帝陛下位居慈極仁冒羣生一道心傳六通四闢于帝王之德三登化洽上際下蟠于天地之間乃釋萬幾之繁坐受九重之養惟時上日尤異常年聖子攺元著遵制揚功之意昕朝奉册見歸美報上之誠八音克諧四方來賀豈特履端之可慶誠為曠古之未聞臣等恪謹鳧趨伏深鼇抃顧方訪道于崆洞之上正當儲神于蠖濩之中何止八千春以大椿而為久敢祝三萬歲願慈母而亦然賀三宮受册皇帝表乘翠鳳之車講盛儀于元日鏤白玉之牒上徽稱于重親慶事既成綿區交賀中賀恭惟皇帝陛下與天同大如日方中克寬克仁允協成湯之德惟精惟一密承虞舜之傳爰奉三宮之歡以垂萬世之則討論故實備極嵩高視慈福之鴻名皆有願聖人壽之祝侈重華之顯號尤彰為天子父之尊當遲日之載陽喜積陰之頓解雨師風伯既巳肅淸乾端坤倪為之呈露雲移天伏首趨漢殿之朝星拱玉皇親下堯階之拜歡聲相和叶氣橫流惟天人順應之甚明知社稷靈長之可卜臣等幸緣際會獲奉周旋快覩聖時允屬紹熙之始願隆孝治一如貞觀之初壽聖皇太后箋涓嗣歲之端辰上丕天之大號神孫具禮親來翠蹕之朝聖子承顔同受雕珉之册中賀恭惟壽聖皇太后殿下行齊任姒德邁娀萃蚤輔中興之功載裨內禪之策由長秋而登長樂安榮巳見于無加自紹興而至紹熙戩穀益知其未艾惟壽居五福之首而聖乃羣倫之先永年常奉夫母儀今日尤嚴于祖后禮容甚盛鼓舞惟均臣等獻歲云初趨班惟謹得少廣之道本無迹之可名居東朝之尊祈後天而難老壽成皇后箋萬乘來朝當夏時之上日三宮受册列文母之丕稱覆載兩間歡呼四起中賀恭惟壽成皇后殿下謙恭素稟柔懿內充奉慈極之天顔曲盡問安之禮佐壽皇之內治克全燕翼之謀禮既備于尊崇心益安于沖淡共都顯號爰歸父母之尊仰嗣徽音尤侈婦姑之盛俱以壽康而嚮用何勞警戒以相成臣等欣際休期獲觀縟典詠思齊之什維周匹休安長樂之居與宋無極皇后箋羽蓋翟車陪六飛之法駕瑶編寶刻上三殿之隆名既備盛儀式昭內助中賀恭惟皇后殿下處心淵靜迪德懿恭五日受朝常謹問安之奉九重視膳每言佐餕之勤逮兹榖旦之禮成想見長秋之喜倍尚須浹日嗣舉從容堯舜相傳禹方循于一道薑任在上似宜續于徽音臣肅領廷紳預觀國典展宮中之賀諒無異于外朝奏堂下之音爰助成于和氣賀皇后受册皇帝表九重渙號實遵慈扆之謨萬乘臨軒爰授中宮之册肆稽故實備著禮容竊以地本法天方著順成之德月惟遡日遂參久照之明況居大寶之尊盍正內朝之助天作之合王假有家中賀恭惟皇帝陛下道貫三才愛均四海親承付託之重允資輔佐之賢若時元妃作配龍潛之際儷我宸極有開熊夢之占誕布玉音進登椒掖贊侍膳問安之孝盡求賢審官之思臣等恪領廷紳預聞國典乾坤定矣式符羲畫之文鐘鼓樂之願繼周南之詠至尊壽皇聖帝表神器有傳俾正椒房之號縟儀告備肆頒寶册之嚴化浹綿區慶歸慈扆中賀恭惟至尊壽皇聖帝陛下德參覆載道極範圍堯治民以治民有光前烈天與子則與子啓佑後人乃當命禹之初首眷嬪虞之舊用修陰教以正人倫鳳蹕來朝副以翟車之盛龍樓問寢加之褘服之華臣等依附末光相成巨典仰遵睿訓見正家正國之規鞏固皇圖知卜世卜年之久壽聖皇太后箋神孫御極蚤正于長秋天仗充庭用揚于顯册事關宗社歡動宮闈中賀恭惟壽聖皇太后殿下氣育沖和性資淵靜化行南國正萬世之彛倫尊處東朝受兩宮之孝養屬涓穀旦首上隆名既先慈福之儀旋講穆淸之禮含飴示愛見寶歷之親傳佐餕得人想慈顔之有喜臣等駿奔在列鼇抃惟均家法相承咸仰徽音之嗣母儀有則益觀王化之基壽成皇后箋坤柔而剛既參內禪之策婦聽而婉俾正中闈之儀中賀恭惟壽成皇后殿下遡日為明與天同大贊至尊之孝治一紀于兹安長樂之宴居萬年有永謹二南之正始備四德以相承懿典告成慈幃胥悅侈家國非常之慶實社稷無疆之休臣等獲際昌明不勝鼓舞友琴瑟而樂鐘鼓莫先儷極之賢本夫婦而始后妃兹實齊家之要皇后箋褕翟褘衣久正內廷之禮金寶玊册式全昭代之儀慶衍宗祊歡同宮掖中賀恭惟皇后殿下肅雍成禮柔靜資生蚤開墜燕之祥允協維熊之夢躬儉節用致君子之家肥順色承顔化天下以婦道爰自御圖之始允資儷極之賢稟命慈皇蕆儀穀旦是謂人倫之至益彰女則之嚴臣等目覩彌文欣逢盛際關雎麟趾既巳先正始之基周薑太任當無愧思齊之聖謝賜春衣表春日載陽肆頒于命服上恩難報仰謝于皇扃列辟同辭闔門受賜中謝恭惟皇帝陛下業隆潤色道廣帡幪大舜之垂衣裳蔑以加此神禹之美黼冕吾無間然乃俯念于廷臣仍舉行于時令爰賁以帛俾華其躬視爵秩而有差被寵榮而如一臣等敢不退揣其分思稱所蒙慕召南在位之風期厲羔羊之節效齊國老人之語請遺天下之衣賀會慶節表有興旨百官詣重華宫拜表箋時禮部紹三年以左史攝西掖侍班扈從公請就殿廬中作今附于此郎巳在北宮候迎駕左相留虹渚發祥爰紀生商之旦龍樓啓慶敢伸戴舜之誠中賀恭惟至尊壽皇聖帝陛下遊物之初怡神于淡六通四闢于帝王之德聿成盛治之勳上際下蟠于天地之間罔匪春和之氣遍寰區而蒙福與太極以同功禮奉玉巵遠循漢殿之制書陳金鑑何待唐臣之言臣等肅領鵷行恭舒虎拜祝南山之萬壽睿算無疆效嵩嶽之三呼歡聲旁洽攻愧集卷十五
