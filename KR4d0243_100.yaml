  text: 攻愧集卷一百
  hash: sha256:e333eb65d1330ed48abe1dcc96f4e59238187a10bf743259dcc3ef67de74e7e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_100-1a}
body:
  text: 宋樓鑰撰志銘朝請大夫致仕王君墓志銘吾鄉五先生俱以文行師表士子惟桃源王先生暨我高祖之後皆大蓋其啓迪後學德澤之及來裔者源深而流長矣先生之子宗正少卿珩孫廣南提舉市舶勳繼登進士科提舉疏財尚義以廉節著所積尤厚是生三子長太府卿諱正已次即君也朝請大夫諱正功季知安慶府諱正民三人以節誼政術能世其家嘗一嵗同奏子興固未艾也嗚呼昔者鑰既銘太府之墓才八年而君與季相繼下世既葬矣君之諸子以國子正袁君燮之狀求銘惟王氏樓氏自二先生以道義定交至太府壻吾門姻好稠疊感今懷昔乃托其大概為之書而系以銘君舊名上字從心從真下曰思字有之後以避孝宗嫌名改焉遂字承甫曾祖說先生也贈銀青光祿大夫祖玩贈朝奉郎父贈金紫光祿大夫娶蔡氏元氏薛氏贈武陵永寧普寧郡夫人君薛出也家世之詳已載于太府之志惟君生而不凡幼篤于學不待彊教已如成人以金紫遺澤補將仕郎紹興二十四年由銓選授右迪功郎撫州宜黃縣主簿尋易處州青田有訴夫死于毆者君按視則更曰自經君察其必以賄故即用初情訊之具服隆興初調筠州司理參軍筠號道院而獄事亦繁精意推鞫狴岸屢空乾道二年循右從政郎四年為荆湖南路轉運司主管帳司給事黃公鈞主漕計以嚴明稱寮屬僅取充位君果于立事滯訟見屬剖析無留難黃公舉以厲同列之持兩端者尚書沈公介為帥尤簡貴威重裁決無敢輒經外臺者理或未安君改之不疑沈公更加敬異不以為忤也二公爭薦之又為延譽不朞月舉削應格七年改宣教郎知興化軍莆田縣縣素難治始至牒訴數百懲其非實而決其久滯者遂寖以清省宋氏子怙勢突入毆吏林公枅守信其從父太學諸生也喧競于庭皆捕治使服而徐釋之且戒曰後復爾不汝貸也感謝而去林公由是知君後為監司嘗表薦之邑岸大姓鬻鹽因為寇鈔捕獲數十人其黨篡取殺傷卒徒篡官亦被數創救至得免而郡怒其生事君曰拒捕至此而賞罰不伸何以厲其後即窮治之而賞官兵焉又修陳霸斗門以永灌溉之利淳熙六年賜緋衣銀魚七年通判潮州推誠佐郡守二無間言郡人有為憲屬者武斷鄉曲征利于近郊君裁以法不勝慚怨擠之不遺餘力君用是罷將歸會劇寇沈師逼城民走依官寺君開門納之力贊郡將修戰守具甚悉賊知有備而退衆唶曰是已罷官而為民深切乃如此耶至其行多涕泣者九年簽書武安軍節度判官廳公事十一年改淮南皆以伯氏將漕引嫌十四年主管湖北安撫司機宜文字紹熙元年差知澧州陛辭論沙毛錢及雜賣場二事上亦深知其弊嘉嘆再四三年到郡帑庾枵然廩祿纍月不給君去其侵蠧之已甚者節浮費汰冗食補罅漏郡計無乏及朞而用頗裕乃從邦人之請即州治之前闢城通道建澧陽樓前俯大江巨麗軒豁遂為一方偉觀嘗屬鑰記之由是人心闓懌士氣振厲比舉多決科者藥園寺僧以稔惡聞邑令發其端謂罪不可赦而以賄緩其獄君詰之治始急復賕于上司之吏移文使先縱遣而以牘來君曰欲以勢力求免耶即日杖之五年奉最還朝奏事重華宫行內深稱上意遂知蘄州自私錢之廢淮民多窶鮮有蓋藏遇霪雨至絶市無糴君以慶元四年視事急發廩而損其直且多邀米商許以蠲征舳艫輻湊又念嵗收才能自給而巨商率先以他貨來售禾始登埸厚取其贏君以為遏糴固非古訓而坐視民食之空咎將誰執力請于朝乞禁止商販許之民相謂曰使君通變如此自爾有足食之望矣有言銀礦發于山者君欲遏之而未得其說耆老訴云往嵗嘗有此事官不熟計而遽行之非徒無益冶户以虧額坐深文鬻産以償者數百家痛猶未定也君為奏罷之佛燈大師者自稱戚里挾權要書走州縣攫取無藝人病其擾莫敢詰君出郊有訴者立捕之寮佐勸止不聽比至一黥隸爾致之法六年除廣南西路提㸃刑獄公事嘉泰元年賜四品服廣右之俗輕于冒禁而上官以不按吏為從厚君深病之劾其貪暴之尤者請託一無所聽始知悚懼而君亦寖危矣興安令之子蹴小吏至死逮繫郡獄令脅治獄者欲變之君怒曰臺治所在可使死者抱冤乎劾令而移獄鄰路令誣訴于言者公遭論而歸自以無慊于中處之怡然二年冬主管建寧府武夷山沖佑觀三年正初屬疾癸未終于家享年七十有一娶同郡伍氏贈宜人先二十九年卒今宜人應氏子男六人深從事郎新無為軍巢縣尉泳永貢迪功郎新池州青陽縣尉洙迪功郎太平州蕪湖縣主簿登紹熙四年進士科泌將以遺澤補官女八人長適從事郎監紹興府㑹稽縣户部贍軍上臯酒庫毗陵張符女後君半年卒次適進士伍遵第五第六女蚤亡餘與第四第五男俱有廢疾孫男三人仁之儀之信之信之先一年卒二女一夭一未行先是伍宜人葬于鄞縣桃源鄉排隩之原諸孤以四月己酉奉君之柩合焉君資稟忠信不發一妄語妻子不見喜愠之色開心見誠吐露情素孩孺有問亦告以實不敢戲侮之田夫野老市井小人過而挹之俯接惟謹或遇機穽險巇之人一對以誠彼自意消以是善與人交終始不變筮仕之初或言邑令有心術亦當有以牢籠之太府問客言何如君曰以誠待之爾何術之可用卒與令甚厚至執手不忍别人但以君為恂恂自謹之人而遇事敢為毅然不可干以私每曰食君之祿徇情撓法以取悅于人自為計則得矣其如體國何廉潔守家法俸入非令所載者謝不受澧陽終更吏白有資送錢三百萬悉拒之惟備舟浮家而歸郡人歎服所至未嘗飾治器用不市一物莆陽荔子最盛有以名品餽者堅辭之怡于仕進不求知于人而人自知之丞相趙魏公樞密使軒山王公每欲汲引丞相京公尤稱其真淳力薦于上晚厯麾節皆其力而君不自知也張侍講栻風裁甚高在潭游從雅相愛重呼君為齊年兄清貧自處質貸以給奉已至薄得祿不足以償逋負如是者三十年然持損有餘補不足之說有義事亦勉為之後既稍裕親故有求隨力以應隆冬細民乏食賑與無倦色幼孤鞠于兄嫂少長省事自念孝養無及以事親之禮事之嫂即鑰先祖少師之季女也伍宜人亦順適君志躬執婦禮既亡祔于廟以時奉祀太府諸女之行竭力以助奩具良厚皆人所難者性嗜學多録未見之書唐諸帝實録略備今寫本及版行者各萬餘卷少喜為詩周旋太府與王信州之間佳句與之相下上暮年益造平淡有荆澧集行于時餘藏于家嗚呼書曰吉人為善惟日不足卷阿之詩言求賢用吉士也漢文帝初立召田叔問曰公知天下長者乎周家用人以吉士為首文帝之化幾三王實基于此王氏父子兄弟皆有以自見于世惟君制行醇篤立身處家施于有政風誼聳然而其本體蓋所謂吉人吉士長者人也故鄉評卒以是歸之使其得位而行可使鄙夫寬頑夫廉而風俗庶幾于古小試緒餘感化已多一區之宅始成求田足以卒嵗天假之年亦可表率鄉曲而遽已矣此鑰平日敬嘆每以語人者今也四子俱列仕版家道肅穆天之敷佑如此為善者亦可以勸矣銘曰恂恂王君家世儒雅君尤篤恭視如朴野周云吉士漢言長者君其人歟力行不捨藍田皆真元規非假施于有政不言而化義所當為勇于施舍麾節倦遊求田問舍謂宜上壽式是鄉社云何不淑棣華凋謝高其門閭尚容駟馬詩以揚之用慰泉下叔祖居士并張夫人墓志銘居士姓樓氏諱弆字元應明之鄞人也先世居奉川後徙焉曾祖杲不仕祖郁以古學全德為鄉先生登第主廬江簿以祿不逮親不復仕進終大理評事纍贈正議大夫考肖正議之季子篤學晚不衰以特奏名補和州助教居士世其家者也讀書敏而勤百氏之言無不該貫句讀音訓考證是否有先儒之所未發朱黃讎校學者取法焉小學尤精鄙流俗簡陋手以古字寫春秋左氏傳禮記莊子以課其子用志如此然淡于榮利少舉進士一再不遇已甚厭之遂不復為場屋文而學問益高娶夫人張氏里人詢之女勤儉靜專克相夫子早嵗居貧甚夫人心計有餘而濟之以識知所取豫未始與人為怨二人同心而家益饒兄弟五人居士處其仲性孝悌和州病沈綿纍嵗下二弟二妹皆幼稚未立所以奉甘旨畢婚嫁者維力之盡夫人承其意無不周悉他日罄先世家産四分之獨不取一金夫人亦無難色且贊其決正議好著書手澤盈篋兵火倉猝居士尤以為憂夫人捐金募人窖藏至今得為家寶居士中年益薄世故好浮屠氏之說名山古剎意有所寓假榻宴坐一鉢一衲或纍嵗忘返間過親族所至如歸為人樂易無少長與之無間豪飲劇談衮衮竟夕道古今涉經史旁出入釋老稗官之說如畫一二坐客傾聽不暇倦遊還家屏處一室乾道癸巳嵗于是年七十有五矣正月十有六日感疾以卒夫人既率諸孤以是年十二月二十有一日葬于陽堂鄉梅湖之原持門户愈謹奉佛愈嚴平生自奉至薄見華靡之服至瞑目不觀曰吾以儉之故不妄取不妄用雖不能甚富亦未嘗困乏此夫人治家之要也至賙人之急雖多不較病給以藥死給以棺者日相踵寺觀營繕隨所求而應之晚益了悟歎曰吾焉能以垂盡之年尚較米鹽耶聚族而謀盡以家所蓄分給子舍戒以自力毋輕費淳熙壬寅四月十有四日卒享年七十有八將以明年閏十有一月十一日啓居士之墓而合葬焉子男五人曰由仁曰行仁先居士卒曰珹先夫人卒曰球曰琰俱業儒承居士之訓書傳如流女二人福州懷安縣丞杜友直其壻也一早亡孫四人鋙鍰鉉錦女六人長適翁烜次適豐有基餘未行曾孫一人嗚呼樓氏自先生起家皇祐中衣冠相傳六七世矣豈惟祖考積善所至蓋先生教授鄉校三十餘年諸生皆當世名士一門書種賴以不絶有如和州居士雖不得施用而力紹世業流傳典刑使後生猶得沾丐其所以維持之力為多後來者可無念乎居士實先祖少師之從弟葬之日夫人以墓銘見屬鑰自念生晚少見前輩每侍居士則愛誨良渥尚厯厯能記餘論又為字鑰以大防也嘗為詮次行事未及成而夫人又亡矣乃以二叔之命併序而銘之銘曰學焉甚博行也無闕窮通有命不繫巧拙達人大觀欣戚泯絶不亡者存厥有高節孌彼賢配千載同穴孰發其潛視此幽碣盛夫人墓志銘孺人姓盛氏世為餘杭人有曰蟠者仕吳越位通顯錢氏納土始居嚴之建德又徙嘉禾因家焉曾大父偕德興令大父兑贈通直郎父師聖迪功郎充户部經界所措置官德興公且老猶提五子試場屋各明一經號六經家孺人年十有八歸于洪氏夫曰懷祖今為通直郎賜緋魚袋實吏部尚書文憲公之次子也元祐中孺人之伯祖僑以名儒為國子司業文憲公從之遊雅相器重遂為忘年交既銘德興之墓又締婚焉孺人資凝重喜怒不見于色平居斂袵危坐一語不妄發有所酬答唯而已笑才啓齒若懼有所聞閫內雍如也孺人厚資裝嬪大家舅又鼎貴而自處沖靚食不兼味裘葛無副未嘗有所表襮姑文安郡夫人尤愛之通直夙登仕版而宦情甚薄兄升朝籍弟亦補京秩通直公固不屑意孺人亦安之也文憲多孫孺人之長子藏年始髫齔文憲愛其頴悟欲先奏補孺人力辭至泣下文憲為之嘉歎然卒先之遇下有恩意待子婦如賔客未嘗見惰容妾媵有過告諭至再三不加鞭撲故有終身不忍去者淳熙乙未秋七月屬疾藏官泉南孺人念之甚苦疾遂革以二十八日卒享年六十有三㑹通直引年休致明年以郊霈贈孺人子男八藏新處之松陽令䔌新建康府司法參軍皆從政郎曰蘧先卒曰芹曰藹曰薈曰藝曰薰女四長適姑蘇翁浩次適丹丘錢起二人未行孫男八伯景仲杲昭孫叔旦會孫晧孫魯孫㬇孫孫女六長適延平陳仲達餘皆幼以其年十二月八日葬孺人于台州寧海縣鳯潭西之原通直與諸子哭之甚哀松陽一日過豫泣曰藏不孝素為吾母所鍾愛宦學垂二十年輒不偶無以奉一日歡隨牒遠方又不得終養恨不得即死以從吾母于九京願得子銘吾母之墓以塞無窮之悲豫于洪氏有連又與松陽厚也不得辭銘曰豫于善而壽不洪安于儉而報不豐夫與偕老而生不得被其封子既强仕而養不洎于千鍾嗚呼其命耶斯銘也尚以詔于無窮江元適墓志銘始余遊柯山聞南塘徐誠叟先生之名其學本于伊川欲見而不得今二十餘年乃聞其江徒君之賢于其鄉之秀士且曰南塘之門顯者固多而江君則得其傳而不仕者也君諱泳字元適世居衢之開化大父以上潛德弗耀考沔從常山起家主饒之安仁簿辟泉司屬以卒君其季子也束髮知讀書一以為已為本手抄中庸大繫置座右口誦心維寒暑不廢弱冠有聲庠序漳守陳公杲得君諸生中以其子妻之子蓋張出是為右史文潛外孫紹興初黨籍解詔沒者官其子孫一人無後者許授異姓親右史與龔公夬俱無後龔氏以官豫外孫壻臧珙陳公欲以右史之澤與君君辭焉乃及其友壻戚俟既欲奏以他官又不就至是君之年益壯學益明再應鄉大夫舉不利絶不為舉子語既遭外艱廬墓毁瘠除喪因弗去遂不復謀仕而行其志于家號所居為西莊堂室軒館下至器用悉有銘記以便觀省創樓西偏揭先聖像朝夕瞻仰如親見而師之榜家孰曰明善命其子震升謙蒙革肄業其中所訓先德行後文藝絶口不以利達啓其心亦不使預家務而治家自有法中閫有亭以限僕妾細大條理擇謹厚者董其凡不勞而辦不事生産家業無所增益伯氏仲氏資息日倍人以百畝與之謝不取樂以所聞見告人願學而力不逮者教且食之曰吾非養其口體養其才也常有小疾一日出就外寢焚香默坐間一諷詠不異平時惟勵諸子以毋忘疇昔之訓語畢而逝實乾道八年八月二十九日享年四十有九以其年十二月二十六日庚申葬于祿墩之原遺文曰西莊題意曰朋遊講習曰天籟編曰因心録易中庸有解他論述尚多藏于家未傳也葬之五年始得以銘諸墓嗚呼人孰不欲仕如君才足以取事足以得而其學又可見于用乃翛然自適以終其身余惟孔門有用之學上可以為邦南面而其流亞皆可使從政觀至人與㸃說漆雕之意則知樂道者之為高而以政學者皆自欺也余于道未有聞而仕仕而未能優也聞君之風有愧焉故為之銘銘曰仕以行志而或害義孰若不仕以全吾氣允矣南塘源由二程有派其流君挹其清德成行修不用于世淑諸人者抑君之細命維匪長後其熾昌銘以訂之觀者勿忘知嵊縣季君墓志銘皇帝即位之六年五月壬戌有旨季光弼所獻文字有補治道可與循兩資制曰上書公車日以百計高則近迂卑則涉諂至于出入經史動含諷諫覽爾奏篇朕甚嘉之進官一列不獨爾私庶聞其風亦克用勸先是四月戊辰朔日有食之君托光武十事備論以進目曰美芹文簡而旨深意篤而言婉訓詞既頒士夫相與傳誦聖天子導人使諫盛德日新而君之名亦由此暴白于天下君居八年再上萬言書敷繹前說又泛論當世之務不報一日聞西府除目愀然曰樞管與中書並立繫朝廷輕重其可忽諸遂考唐之宰相起自武德裴寂終于天祐楊涉作編年録論說二百五十有五去取抑揚皆有微意苟位之非據假以隆名雖元勛如郭子儀亦不得預讀者為之聳歎嗚呼才不得究齎志而殁著書一二亦足以不朽矣君字觀國其先家處之龍泉七世祖超為吳越錢氏常侍始籍于溫居平陽之桂源曾祖宗喬祖文瑩俱不仕父敦習以君升朝贈宣教郎妣林氏贈孺人宣教公早世君方在髫齔號慕如成人祖母猶無恙與林孺人自釐家務俾君一意問學君少穎悟痛自激昻于書無所不讀詩禮左氏春秋及諸子古文皆手自編寫寒暑不少變年十六授室益加刻苦視生産作業與閨房之私一不經意羣試庠校輒出其輩行而器識凝邃不見圭角閣學林公待聘待制蕭公振里之先達少所許可咸器重之兩薦于鄉紹興二十七年遂登進士第授左迪功郎調福州福清縣主簿以祖母憂不赴服除授臨安府鹽官主簿秩滿用薦者關升左從政郎特旨授左儒林郎充邵州教授丁太孺人憂授福州寧德縣丞改通直郎知紹興府嵊縣磨勘轉奉議郎代者且至俄疾卒于縣治享年五十有七時淳熙十年四月四日也嗚呼君之抱負厚矣學行政術皆欲以古人自期而見于用者止于州縣間所在皆著聲績而其甚可稱者數端鹽官邑庠久不振君召張橫浦高弟干恕郎曄勉以身率士子課試皆臨視之咸自奮勵登巍科如張少良等數人邵陽僻遠士無師承君遇諸生如朋儕程度甚悉鄰郡縣之士至者相屬凡經指授多成美才如陳偕謝特起輩有聲湖湘間此君之善教養者然也浙西漕河淺淤例調民運水以濟往來嵗旱民勞水愈不至君相地形鑿河引潮以灌之至今為便閩有仙湖為豪右所田君按黃諫議之舊疏濬以廣灌溉此君之善興民利者然也君之聽訟不為鉤距一以至誠臨之公而生明無不洞察羅源尉鍛錬平民為盜以希賞連帥丞相陳申公命君鞫治悉從平反公欲騰奏又力辭之有母改適而子有後言訟其不孝君曰不為伋也妻者是不為白也母安得以不孝坐之申公稱其引經之決剡民張僖之子為盜所戕疑怨家黃氏為之黃無以自明君察其非殺人者故緩其獄得子之衣于東陽遂禽真盜又有王生與僧有隙匿田家之子使其交訟之旁引曲證僧自誣服君獨以為疑求之竟得于其家告者遂伏辜焉君之救荒不為文具皆出于惻怛之意所至疚心受賜者衆隆興之初畿邑大歉尚書薛公良朋尹京以事屬君君列急務六條獻之隨即施行給事程公叔達以六察行縣喜曰使諸邑皆如君尚憂飢民哉丞相史魏公聞丞之才常下君所陳盡發常平裁價分糶民為之謡曰飢不憂與之庾儒林季公民之父寒不憂今有袴儒林季公民之母既為縣又遭洊饑山谷窮民易致嘯聚君加意拊摩豫令富室致吳中之米七千餘斛丐于府得常平緡錢二萬于鄰邑始得按堵而嗣嵗尤甚禾未登場民已菜色祕丞朱公熹力舉一道荒政尤詳于越君求哀諸司得米四萬斛縣有二十七鄉凡為賑糶場賑濟場養濟坊三十餘所戴星出入以課督之數月之後鬚髮為變朱公每貽書勞勉曰省刑緩賦以回天意非體國愛民之切不及此也君為丞二則悉心以贊其長謀事甚詳請于長而後行及為長則待寮友如兄弟莫不樂為盡力故所至皆有可紀而去輒見思卒之日剡中耋稚相持聚泣至巷哭以過車識與不識皆唶曰善人亡矣平日安于義命論說甚明儒林之命既下人謂君且通顯君曰吾豈以此釣爵位耶竟客授湖外以去巨公知已甚衆亦有欲薦于朝亦或有尼之者君雖聞之不以介介至義所當為則奮然直前無所顧忌親故以出位抗論得罪後當叙理無敢保任君方為簿領慨然許之有貴臣過縣境冠蓋相望或勸俱往君為詩曰不堪枉道依陽虎可是無心簡子敖聞者韙之亦以是終不得為時用可哀也已娶同里周氏清儉端恪克相夫子先君十年卒後以明堂恩贈孺人男五人復之泰之蒙之俱習世業次兼善舉善早世女二人長適進士林仲明次適陳權皆周出也君天資篤厚孝謹過人少小孤立奉祖母及母甚至未始暫去膝下有疾必躬治湯藥執喪以毁聞與弟兄光度友愛誦書作文自為師友終身無間言無他嗜好惟以論著自娛奉養寡薄俸錢多以買書别有文集八卷藏于家為文渾厚典雅言皆有用庶幾乎一飯不忘君者雅愛東山林泉之勝築室其下樓曰雙清軒曰靜寧欲為晚嵗歸休之地竟不得一日之適顧非命耶諸子將以某年某月甲子葬君于邑之某鄉某原以君之甥朱德成之狀來求銘鑰頃官東嘉一見辱定交盡得君之書讀之相與益厚今其可辭銘然君志不負所學而見于行事者僅如許既已屢書于前惟所著之書當表其大者以示後世銘曰惟君之生未為不遇位雖不豐朝有顯譽章交公車君獨進御美芹之書一言而寤唐三百年曰宰曰輔泛論其尤姚宋房杜君獨究觀一一論著忠邪昈分咸有旨趣位非其據勳如汾陽而不與事有責備德如晉公而不恕上可以發潛德而誅姦諛下可以垂世鑒而切時務細繹乎義命之說磊砢乎經濟之具使用于世則必古人之與稽使之作史亦必大明于勸沮嗚呼尚何言哉後之君子必有撫是書而太息者銘實昭之用以載君子名于不腐者也攻愧集卷一百
