body:
  text: 宋樓鑰塔銘徑山塗毒禪師塔銘徑山為東南第一叢林非第一等人不足以居之淳熙十五年冬丈室虛席臨安守臣奏請無錫華藏塗毒禪師夀皇素聞師名制曰可明年二月初吉方入寺遇今皇帝始登寶位詔就靈隱開堂中使齋御香以賜恩禮甚渥道俗輻湊驚歎未有且曰是為叢林一段盛事非師不足以當此也師名智䇿姓陳氏天台人自號塗毒巖生英敏穎異父母素竒之十嵗護國僧楚光見之曰此子風骨巉巉有出塵之姿又六年遂祝髮光授以經律理詣昭徹迥出流輩性剛簡居處語默肅如也尤不喜泛交善則慕之有不善雖親昵亦絶不與通年十九或告以定慧等學可以明見佛性即造護國請謁寂室光僅七日偶過門灑然有省寂室許之謂老于叢林者不能過也育王無示萬夀大圎皆一時大名德無不肯可大圎問師甚處來曰天台曰見智者大師麼曰即今亦不少曰因甚在汝腳跟下曰當面蹉過圎曰上人不耘而秀不扶而直一日辭去圎送之門拊師背曰寶所在近此誠非寶師領之時豫章雲巖遊禪師號典牛聲震江湖師往投之道由雲居風雪塞路坐閲四十二日午初版聲鏗然豁爾大悟及造門典牛獨指師曰甚處見神見鬼曰雲居聞版聲來曰是什麼師曰打破虛空全無柄靶牛曰向上事未在師曰東家暗坐西家厮罵牛曰嶄然超出佛祖他日起家一麟足矣貞淨老人若在見子亦當下拜遂領師至僧堂前撞鐘大言曰侍者大徹矣牛機辨峻峭莫有嬰其鋒者師與之平章今古泉湧風駛聞者為之錯愕踰年告别牛送以偈曰咄咄臨濟宗行行正在爾遂結菴于淮西烏崖之下典牛凡見浙客必曰識策公否客曰識之則欣然曰不虛生于浙江其器重如此大圎移大溈請居第一座秉拂之初衆已驚服嘗問訊圎圎俯眉不語師曰何其瞀悶圎曰期子濟濟多衆如雪峯存溈山祐之流而談天者謂子無徒子意如何師曰參學惟恐無本苟有本對泥像説法亦髙出諸方圎曰吾子器識過人玄酒太羮非常流所能知味也東歸又分座于國清此菴景元方住護國謂師曰公來歸三峯景元即收卷波瀾矣出世住黃巖普澤為典牛焚香是為黃龍四世孫歷天台太平吉之祥符越之等慈及大能仁所至道價興行旋自護國華藏來住此山而師已老矣力行祖道衆至千餘每謂其徒曰來日無多豈久于此者弟子請建塔于東岡之麓紹熙三年秋畢工師曰生平言出沒死生如適園觀此言幾户知之時節因緣乃在于此十六日升堂訣别舉衆曰請偈贊者如市隨叩即信筆應之二十五日門人宗惠問疾囑以後事仍曰子以文祭我師整襟危坐傾聽久之至酹茶尚饗為之旴衡一笑二十七日辰初湯沐已竟剃髮更衣萬衆雲集説偈云四大既分飛煙雲任意歸秋天霜夜月萬里轉光暉俄頃泊然而逝八月二日舉全身瘞于東塔夀七十有六臘六十夏得法弟子已出世者十二人度四十三人空缺十餘字案此下原本余非學佛者未嘗參禪又與師無半面而惠公余鄉人録師行實求銘既適越貽書不已惟師之始末徑挺洞達無一毫回護意氣于余心似有契焉乃具載所録而系以銘其實無此可也銘曰臨濟正宗直下不絶楊岐積翠何有分别矯矯典牛付授親切塗毒一聲聞者腦裂雲居版聲風撼深雪徑山一著霜夜秋月掃盡葛藤光明透徹我詞贊揚慙愧饒舌天童大休禪師塔銘余家四明十禪剎錯立名山中兒時未甚省事已聞人稱老尊宿頗衆而大覺小玨之名尤著且久大則宏智正覺小則師也師名宗玨和州烏江人姓孫氏生不茹葷世業儒而性樂空門年十六白父母願出家止之不可遂依貞州定山貞如住持德雲十八進具長蘆祖照道和聲振東南師往叩謁照與語竒之留為侍者時真歇了公為座元師入室問云佛祖不到處是什麼境界歇豎起一拳師擬議歇揮之師即領悟遂云將謂無人到歇云放過一著宣和中歇主長蘆學徒益集至千七百衆師代居第一座為衆説法建炎初元之蔣山入慈受深公室語契淵微尤相器重尋避地浙東侍歇居補陀巖道價愈髙郡請住嶽林布袋道場不就寵智時在天童視歇為兄邀歸山間又命師挂牌領衆象山廷夀虛席使君延請再三始從之紹興二年太守陸公長民仍遷師于嶽林備禮開堂丞相范公宗尹自號退晦居士與師為方外交遠來勸請參政孫公近時為部使者為范公草疏禪門以為美談師即嗣真歇幾三年退處翠山依宗禪師待制仇公悆遷之香山一住十八年衲子雲趨寺為一新二十五年尚書王公俁請住雪竇二十九年真閣張公稱遂以天童招之師念太白名山實寵智之後一遵規式無所更改道俗益嚮之師容貌竒龎度量恢偉喜慍不見于色終日頽然無所修綜亦未嘗振厲風采而見地明白深造自得死生之際卓然過人人于是尤以為不可及也時城中湖心辨公宗師與師生之年月皆同三十二年八月上浣辨以遺書來師初無恙覽書笑曰齊年既行吾亦逝矣翌日迎賓如平時晚欲小參侍僧以為暮矣即令集優婆塞衆人知其有異舉寺咸會師從容普説多致垂别之意既歸丈室濯足就座整容跏趺汨然而逝又八日學徒奉全身葬于南谷夀七十二臘五十四師等慈接物無貴賤之間侍制張公劭昆弟與師為中外親舍人孝祥又視公為父行皆一時名勝師視之藐如也嗣法三十餘人分領宗風而足菴智鑑為最顯足菴住雪竇數年與余素厚紹熙三年余官後省忽得足菴垂絶之書專以先師大休塔銘為祝大休師自號也余幼欽師之名而不忍違足菴之祝為之銘曰是釋者流視生若浮生兮若浮死兮若休生既曰休死又何求足菴之求為銘諸幽瑞巖石窗禪師塔銘師諱法恭明州奉化人俗姓林母楊氏號佛光道人日誦蓮經甚専一夕夢胡僧來謁既寤而生師父早喪年十五乃白母出家以棲真禪院僧則韶落髮為師宣和七年受具戒習南山律于湖心寺繼受天台教天童宏智覺禪師法席方盛師又更從之兄事自得暉晝夜危坐一日坐殿廡間忽傍有僧曰本自不生性無和合師一入耳根豁然開悟流汗浹體即見宏智反覆問答機應如響智遂留侍傍久之再歷江湖遍參石佛萬年間公室中嘗一舉似地擎山話經月不契他日再往間日似地擎山作麼生師掩耳而出草堂清不許暫到入室師直造前清舉拂日識得這個參學事畢師曰拈卻這箇喚作什麼清擬再舉師奪拂子擲地上曰老漢拂子也不識一衆駭嘆黃龍忠置界方槌拂于香案上師謂其侍者曰和尚此一絡索作何用少頃一一拈起問過一機不來莫言不道侍者白忠乃盡撤去三年復歸天童主藏事即分座説法遂為第一座智所舉宗要師不為苟合智愛而畏之紹興二十三年越之光孝虛席帥移書于智求一本色人智以師參學行業始終明白薦之既往會應天塔壤或請捨去師曰非我尚誰為耶塔成始行未幾復住能仁隆興改元趙公侍郎出守四明命主報恩兵燹之餘前人相繼興造凡所未備者如鍾經一臺等處皆師所建軒敞宏大遂為一城蘭若之冠乾道六年退居小溪之彰聖明年滎陽郡王又起住瑞巖居山幾一周星闢舍宇以安衆開山田以足食又建圎通傑閣輪奐甚美皆師餘事也大參范公請師于雪竇自得暉公歸自淨慈乃請以雪竇還之復居瑞巖淳熙八年八月十三日感微疾謂弟子曰毋以藥石纍我殆將行矣十九日以書招自得且促之越五日始至談笑如平時付以後事作士大夫及道友書六緘已而諸山皆會以翌日遲明升座説偈而逝郡守謝公修撰得師遺書唶曰恨不識此老即以其座元如璧繼之師夀八十臘五十九受度者四十三人嗣法者十人山之西偏夙號上方于是立塔以葬實九月三日也師之從姑歸余叔祖故自少時與師遊璧求銘于余余非學佛者然竊謂桑門之法有三曰律曰教曰禪學者當先習律以檢其身次聽教以廣其業然後參禪以求直指人心見性成佛一聞千悟世出世間法則為全人矣況是三者本無異途苟能貫通何所不可惟師天姿徑挺持律嚴甚而禪教並行直以古德自期愛身如冰玉終老不衰絫主大剎起居寢食無一日不與衆共不務緣飾無他嗜好自號石窗叟峭直骨鯁未嘗借人以詞色見有道者雖坐下版必力加提引成就名譽郡命公定師略不容私或以賂得叱之不貸至白郡將汰遣之諸方異辭輒遭呵咄衲子慧而狂者至則摧折有僧自謂罷參指地曰人人喚作地我道不是汝喚作什麼僧未及對即斥去同行僧請代一轉語遂舉一拳師曰同坑無異土併逐之臨安淨慈人所願得嘗馳書請師乃航海以避命郡為申免皇子魏王作牧每加敬禮欲訪師于山間辭曰路逺而險徒勞民耳其嚴冷類此公卿名士為方外交者甚衆丞相魏公晚嵗與師尤厚嘗嘆曰自得如深雲中片石石窗則空門中御史也緇流以為名言師行解甚髙不為夸詡以驚衆壬辰夏旱郡請説法即日甘澍次年又旱定海宰延之師曰前此偶爾非吾力也堅拒不受邑人固請即又雨焉嗚呼禪林五枝蓋出一本惟曹洞宗至芙蓉而大振石林葉公左丞稱其與之嚴者得之必精傳之必久河南邵公子文稱其為特立之士二公皆名儒言必不苟一再傳而至宏智尤光明俊偉而師得其正傳卓立傑出確然自信末後一著照映今昔盛矣師機緣有三會録瑞巖後録壁立千仞不可挹酌叢林尤所尊敬讀者當自知之瑞巖古道場璧以師故出世即居之久而衆無異辭不負所託矣銘曰此道本無二五派寖分别猗歟曹洞宗綿密更親切稽首芙蓉師壁立蹊徑絶邇來一再傳奇鄒出丹穴石窗嗣宏智遊方俱洞徹門庭晚益峻坐斷衲僧舌如識滋味人啖土炭石鐵醎酸甘苦辛開口了無説何以傳不腐君其視兹碣表裏無纎瑕琉璃含寶月雪竇足菴禪師塔銘師諱智鑑滁之全椒人俗姓吳自兒時已喜佛書每以白紙為經跏趺端坐誦之琅琅然母嘗與洗手瘍因曰是什麼手忽對曰我手是佛手遂視母大笑少長日記經文千餘言連遭親喪決意出家誓修苦行以報罔極之恩真歇禪師方住長蘆徑往依投一見異之師勤苦精進終嵗脅不至席大休小玨禪師領千七百衆為首座獨指師為法器曰汝當振吾宗已而侍真歇來四明至補陀山遇羣盜蜂起避地之馬秦駭浪翻空舉舟驚懼師坐篷外獨不沾濕真歇益異之會京城三藏道法師講菩薩戒師受戒已背若負萬金然道曰汝真得上乘戒之證也徐即身輕真歇住雪峯服勤三載雖日親示誨終未超徹復回四明遁于象山縣之鄭行山乃海岸孤絶之處相傳山有怪妖不可入入亦多以驚異逃歸師曰吾為法忘形何懼耶乃即山中盤石縛茅為菴地髙無泉脈師禱曰吾辦道來此山神其惠吾泉因鋤小坎移時而水溢食不繼則啖松枝以療飢時紹興二年也一日有巨蟒入菴矯首怒視越數日復旋繞于牀師不顧而去夜聞菴後巖谷震響如霆擊旦起視之有巨石飛墜越菴而立于門並菴大木皆為之摧拉變怪百出略可記者如此師不為動終不能害也明年正月十四夜于深定中豁然開悟師自念云威音王以前無師自證威音王以後無師自證者皆天魔外道遂下山見延夀然曰日來肚大無物可餐菴小無牀可臥若能與食展菴則住不然則去然與師反覆問答不能屈因叩師見地師云一坐四旬身心瑩徹忽爾古鏡現前非由天降不從地出自是本有垢淨光通不勞心力自照也昔真歇嘗于室中舉門一物上拄天下拄地常在動用中動用中收不得是什麼物得恁麼而今照破方知天蓋不及地載不起喚作古鏡亦是謗他遂有頌云箇鏡光流遍剎塵鑑照無礙體難分羣靈巨德皆稱妙凡聖無非裏許身然云不易到者田地師至陳山欲航海或指曰此鄭行山中肉身菩薩也人皆環繞求偈時天大風不可渡師謂篙人曰吾為汝借風洎登舟俄頃而濟扺岸則逆風如故徑至嶽林見大休云久違尊顔即不無如何是同風不間底人玨云井底蝦蟇吞卻月師云賓主不立報化平吞玨云向賓主不立處道師云不辭道恐涉唇吻玨云只今將什麼抵對師云不借玨云佛祖不奈爾何師禮拜遂令受具聞翠山宗白頭機鋒峻峭往叩焉時師方為嶽林行丐擔二布囊隨得即受備歷艱勤人所不堪宗云為衆竭力不無其勞師云須知有不勞者宗云尊貴位中收不得時何如師云觸處相逢不相識宗云猶是途中賓主作麼生是主中主師云丙丁吹滅火宗以手掩師口師拂袖出宗遷雪竇挽師偕行荷負衆事會法堂新飾且命師為衆普説宗嘆曰吾生有耳未嘗聞也叢林愈加敬焉宗乃宏智髙弟師因造宏智室動輒深契二十四年遂舉住棲真隆興二年移定水侍郎趙公子潚聞師名屬侍御王公伯庠製疏備開堂禮嗣法大休實曹洞十一世孫也乾道五年退席遂之天台八年嗣秀王來鎮請住廣慧淳熙四年皇子魏惠憲王請住香山七年參政范公移主報恩十年遂歸西山為終焉計十一年雪竇虛席衆皆以師為請師念明覺知覺道場勉為起廢一住八載所在道俗歸仰至是尤盛隨力葺理內外一新紹熙二年謝事止于寺之東庵太守林公枅稔聞道價命師再住不從必欲識面既見問道終日致請益堅力辭而歸三年七月乙未示疾己亥親筆遺書晦日以道具抄録八月哉生魄夜分戒其徒曰吾行矣送終其務簡約勿用素服哀慟言訖書偈趺坐而化時暴雨疾風震動山谷人尤嗟異四遠聞者奔赴盡哀于是相與建塔于山之左戊午奉全身以葬夀八十八臘五十三嗣法及受度三十餘人師素與余厚在雪竇作錦鏡以蓄飛雪上流為一山竒觀嘗為之記師且死手書遺余告别以大休塔銘為屬余既銘之師之徒又以此請不忍拒也余不習釋氏學然聞古德相與傳授之際多藉導師有以啓發之惟師根器過絶人自誓不悟不為僧則識趣已不凡操心如鐵石視身猶土芥又有人所不能及者初雖久依真歇鄭行之居略無怖畏非有師傳而遂得道禪門少見其比是時自覺般若有靈真有飢則一與之食寒則一與衣之驗夜行深雪自然得路若有隂相自以為大千世界無如我者一見大休誦言所歷休徐曰但盡凡心勿為異解師為之漼然意消而歸心焉師天資朴厚見地真實業履孤峻苦行堅密至死不少變等慈接物法施不吝具大辨才浩博無礙為人説法或自曉至暮或自昏達旦至連日亦無倦色音吐洪暢晚亦不衰聞者聳服學徒每出衣資請師演説此尤禪林所未有也雲深火冷尸居淵默有召之者雖祁寒隆暑不拒一毫施利悉為公用丈室蕭然故六主廢剎積逋動數千緡不過期月百廢具舉若禱雨暘救疾苦其應如響神祠烹宰物命輒為易以素饌有藏其鬚髮而得舍利者此皆世俗所創見師不欲人言之以為非此道之極致使其有之亦皆師之餘也師既亡太師史文惠公祭之以文有曰了悟圎通如觀音大士隨機化俗如善導和尚人不以為過也師生于淮南而化緣獨在四明屢易法席名震江湖而終不越境自號足菴人以古佛稱之惟師可以無愧云銘曰祖師西來乃始有禪燈燈相續皆有師傳師之得道幾于神曜心鏡孤圎大千俱照曹洞正宗實艱其承十有一傳至師中興蛇虺之宅聞者怖恐惟師宴坐曾不為動振錫出山據大道場四衆歸仰廣為津梁生于淮壖緣在甬東名震江湖卒老吾邦法施不吝辨才無礙行實堅苦而大自在人稱古佛師則無愧銘以表之用詔末世瑞巖谷菴禪師塔銘淳熙五年秋有旨以明州智門僧景蒙住台州瑞巖寺先是參政錢公請為墳院公既薨其孫今江東轉運判官象祖以大父治命辭于朝仍請敕差住持太傅史魏公再當國謂蒙可瑞巖台甲剎師一旦自海山膺敕命孤雲野鶴雖無心于去來然空門之盛舉也魏公分教永嘉時與心聞賁禪師為方外交罷相里居夢如平生傍有僧曰景蒙貌古神清談笑久之覺而叩天童朴曰僧名頗異有斯人否朴曰是方為堂中第一座招之恍如夢所見與論出世法了辨如響問其師則心聞也大異之遂為延譽而得智門一住七年寺以寖興嘗葺古殿得瓦于脊有字粲然蓋建隆改元之秋讖語六言中有師名若言超進之意抑又異矣在瑞巖前後十夏道俗傾嚮寺居兩山間樓觀層出有溪自東北橫貫寺中一夕暴漲衝決隄防棟宇漂蕩強半為瓦礫之場人以為不復可興矣師曰吾當任此既而財力交施從容規畫曾不踰時輪奐一新壯麗反過其舊師才智超邁不以毫末自見因事而顯無不嘆服韜養之深從可知矣師姓邵溫之平陽人族姓甚衆多以儒自業母感異夢而娠英特開爽幼聞鐘梵則喜年十三從惠安淨覺大師惟梵著僧伽梨明習天台教觀自以名相之學不足了大事去遊國清又參育王山佛智裕公裕問以宗門節目師不知所對嘗入室誤問鄉里師曰永嘉人還識永嘉大師麼未及答批頰而出至于再兀然如癡寢食不安者纍月行道次忽聞鐘聲而悟即造室中又問永嘉大師即今在什麼處師曰即日伏惟和尚尊體起居萬福裕隨問向上事如何師擬酬應又復逐去次日再入裕方發問師抗聲曰老漢今日敗闕也一拍而出裕曰雋哉念母而歸龍翔心聞一見深器之問曰言無展事語不投機承言者喪滯句者迷試向言詮不及處通個消息師以在手畫一圎相聞以拂子擊左師即畫以右手擊右師又畫于中以兩手托呈聞以拂子當中畫兩畫師禮拜而立聞大笑云三十年揀辨苖裔今日得此烏喙耶由是依止室中通徹無滯遂令執侍左右既歸鹿園如在菴賢雪菴瑾咦菴鑑全菴存筠谷達還菴淳會下皆一時之名流惟師妙齡傑出聞以谷名師菴且為之銘蒙侍者之名曰髙矣又嘗謁臨安顯寧志公志聞風壁立學者望崖而退獨謂師曰先世遺風餘烈若未墜者尚在汝躬吾且拭目觀之名山法席聚衆千數師分座提唱諸方咸畏而仰之師孤髙絶俗若不勝衣而嚴冷峻峭不可挹酌既坐道場槌拂所加龍象蹴踏長靈之道光焉十四年十月十有七日為施主説法似感微疾既歸趺坐良久泊然而逝山林震動鳥獸鳴悲緇白奔湊如哀所親越七日闍維舍利遺骨瘞干居禪師塔之右實晦日也夀六十四臘五十一度小師四十嗣法者十餘人鑰贅倅丹丘草疏請師赴郡假道别未幾時而師以訃聞亟遣茗奠其徒以魏公真翰來俾銘其塔且曰吾師生得公贊死又辱祭以文願終惠之鑰不敏敢不承相君之命銘曰鞔峯髙髙壓干嶺寶坊樓閣非人境大浸稽天夜溟涬世界變滅彈指頃金碧掃地誰復整谷菴若子一笑領發揮金粟舊光景手髙妙絶風斤郢稜稜鶴骨雙眸炯古廟香爐無波井栗棘橫施發深省一超透出毗盧頂真隱神交錐脫穎聲駕諸方增九鼎我遊丹丘與三請再别幾何俄奠茗石上主人呼不醒迷途多岐孰知警勿謂空言如縛影影與俱傳久逾炳延慶月堂講師塔銘吾鄉延慶教院為東南諸郡之冠祖師建立不置佛殿所以待後人者不淺纍代多得人如所期焉余不及見紹興以前事矣余嵗時見鄉人尊重圎辨講師道琛永嘉人初至説法是時宏智禪師諸大老拱手相顧曰此非闍黎也道價最髙大興此山繼以覺去豫嘗銘其塔月堂惠詢之住持在乾道五年之後然得圎辨之正傳者也惠詢字謀道月堂其自號也姓陳氏父安實家昌國縣蓬萊鄉之昫山母馬氏夢僧倚門乞食而娠生有奇相甫八歲父母攜入寶印院謁了印大師善隆摩其頂曰能出家否欣然願留不肯去父母見其幼靜不類凡兒每竊竒之不奪其志始授蓮經兩月而成誦無不駭嘆十四為僧即造延慶依澄照子先法師學日勤講業夜則坐禪迥與衆異或以飰食物玩遊戲等試之一切謝絶獨行獨坐惟以參尋祖意為急衆目之曰詢獨立章菴道因法師髙視衆作時居第一座驟加稱賞親炙數嵗盡得其説欲遍見諸山問所先因曰天台能仁法照老人當今大善知識也且送之以序有曰吾子氣貌溫恭烈暑鑠金而法服襪履望之儼然夜坐而不臥不與羣輩相狎戲又曰兩山宿學皆吾故人盍行矣法照尤喜朝夕與處衆嫉之且曰吾曹久侍老師反不若新進耶夜堂講習一呼而隨者數人俱至師前遽曰教門多途叢雜非一欲從公以決之師正容徐曰吾學佛祖之大道夀量觀法十境十乘三千三諦皆是也得之則見性成佛失之則殃墜無間有疑則問來若名相之學方困算沙非吾所知也一衆愕然不敢措辭而退或曰此學海義龍也安得以衆人待之獨步于兩山者三載圎辨方住延慶師曰百聞不如一見密入衆底竊聽開演已自欣快偶聞提唱曰吾祖之道荆溪之後傳者雖多不無小疵惟法智天資超悟不假傳而自知用一性惡之旨大闡圎頓之談論即論具豈待煩惱之轉除約佛約心寧外婆娑之别旨一理貫通諸法悉捨師于言下洞然明白感發既深涕泪俱下遂造丈室自列辨曰子再來人也特吾之點示耳既日挈包在弟子列自爾左右逢源鋒不可觸尋入堂司有監寺以事忤衆衆欲捲堂負擔于門矣師急止之吾當任責乃領衆白辨曰維那之言然即書片紙付堂司起監寺不共住衆遂帖然微師片言豈不殆哉辨亡為廣嚴第一座偶擇主僧郡以十名置瓶中一索而得師或以年少為言師曰吾何求哉力辭之尋出世住海瀕華雲以省母之便欣然就之沙岸持鉢忽遇羣盜劫盡所有將解師衣正色叱曰汝何為者我法戒貪嗔癡貪求何益于汝生有王法死有地獄眼光落地受極苦時悔將何及貧富有命強取之物豈為終身之樂幸自無事而作此業實可寒心盜曰我將殺汝師曰吾以寂滅為樂汝若殺我早歸寂滅受大快樂有何不可盜相顧曰是善知識也安可害之盡還其物羅拜而退慈力攝持又能如此移住奉川之禪院又遷淨居前田後江師曰此處可與鬼神説法夜必炷香暗坐講法華經信宿間有飛螢一二繞于前後尋有百十乃至千萬明于燃燭講罷輒去嘗夜出螢往來江上不入講室夜分既歸螢忽來迎如繁星然師見而笑曰是待吾講耶自爾每見之師不以語人然自以為差適人意也移住普和問于草菴草菴曰僻在一隅大江橫前峭壁對聳佛影岩也前輩聚徒之地吾子其當之學子雲集鐘鼓一新朝參暮請晝誦夜禪禮講以時䇿筵有節乾道五年延慶虛席公定場中一舉師名衆口翕然師氣貌魁梧儀矩凝重未嘗以詞色假人精持律範動不踰矩法席謹嚴數百衆無敢犯者説法必窮蘊奧學者有不能解昏後坐起信堂一香一燈遠在簷下僧徒畢集師乃揮塵縱辨夜靜堂深言詳理到境法俱勝隨資發越直疑祖師之復生忘其久立之疲也至今舊人過其處遐想髙風多至隕涕制帥秀王每曰延慶人中鳯也寺之西有蔬圃官欲以為貢院勢甚急師怡然不顧方杜門終日禪定才信宿府主見招迎謂師曰貢院之擾得無動心乎今已得基址可以放懷矣師謝外護之庇蓋有神現夢以為言也丞相魏文節公好內典法華中有是法住法位世間相常住稽疑以叩自得石窗終未有所契舉以問師師曰此非大力量人不能致此問乃曰春生夏長秋凋冬落世間之相乎曰然非以其遷變而致疑乎曰然師曰四時遷變歲嵗同耶異耶曰無以異也師曰非止今年明年無以異窮過去極未來亦無所異既無所異豈非世間之相常住哉以至君臣父子生息大小不動本位皆得究竟以至天地日月明暗色空海闊山髙鶴長鳧短皆出自然莫不名體不轉貞常圎極故曰是法住法位世間相常住了此法者不落階梯隨所見聞立地成佛文節有省嘆曰經綸之妙還他教家魏惠憲王臨鎮來遊獨坐一榻俾師坐而問所傳何道師曰天台教王曰恐不及禪家之直指師又曰禪教皆如在方便若就實知實見言之何為禪何為教妙悟之人一切掃除絲毫不挂然後龍菩提妙華遍莊嚴隨所住處常安樂王大悅屢以金繒為齋施尋盡出衣盂建雨華堂等又募緣一新兩廡至于臥不解衣講必更淨非入浴走厠袈裟未始去體非赴齋啜粥蓮經不曾離念廚庫諸司不一回顧工匠報作略不舉目大綱整肅不事苛細然犯必不恕欺必照破中外井井無毫髮之遺史文惠王曰能使教門增重今惟月堂一人而已師之傳道直欲追配古人非徒塞責每曰以語之相似而證其言以資之善記而駕其説皆非所以説法也惟自悟心宗而宣演之庶得祖師之傳吾求悟門切勿自畫凡説教義不出私科惟著立宗解一卷以救時弊淳熙六年十月二十五日召門人曰吾覺背痛殆將不久矣越二日辛丑集衆諷十六觀經經終而逝十一月庚申奉全身葬于崇法祖塔之側師夀六十一法臘四十五聚髮一器舍相無所葬于蓬萊先塋遵遺言也分舍利之半同法智頂骨塔于太悲閣郎中省菴陸公沅贊之甚詳所度小師嗣法者六十人今柏庭善月其上足也餘皆散處諸方靈龕即路之日緇素男女秉爐持花填郛溢郭幾于罷市觀者贊嘆以為前此未有此豈人力也哉後二十有五年其徒請銘其塔余非學佛者尤昧于教乘以其請之勤而察其實行實諦為可敬為之銘曰智者禪師祖天台教乃知禪教本無二道禪貴直指教若支離存乎其人統而一之圎辨之興教門鼎盛粵惟詢公傳得其正如淵之淳如玉之潔入自悟門縱橫演説辨才無礙脫落窠臼如老斫輪得心忘手月雖已墮孤老故躔柏庭之徒尚永其傳育王山妙智禪師塔銘丞相代魏皇帝即位之十五年有詔明州阿育王山廣利禪寺釋迦文佛舍利寶塔詣行在所住持僧從廓侍行既至命入禁中觀堂安奉上御素膳焚香瞻禮親覩殊勝遂召廓對碧琳堂問舍利從何發見奏曰自陛下聖心發見上大恱親灑宸翰大書妙勝之殿賜廓以妙智禪師號仍度僧五員頒錢萬緡眷賚優渥前所未見由是寶塔之靈益顯而廓之名愈彰矣廓姓林氏福之長溪人家世業儒踵登賢科生而穎悟不妄言笑羣兒強以聚嬉泊焉如不聞有以出世法語之則欣然解悟年十五依邑之建善寺祝髮受具戒時閩中名剎多有道之士悉往從之佛心才分室中舉四大各離今身妄身當在何處有所感發述投機頌佛心首背之而不自以為足也去之見懶菴需公為侍者復依大圎璞璞大慧果公之髙弟門庭甚髙始叩之若自失久之豁然有得服勤數載璞撫之以為類已然以未識大慧為恨不憚重趼見于衡之回鴈峯下大慧深加器重留三年告歸送之以偈又以書屬璞曰廓乃佳衲子可為成就使異日為吾家種子自此叢林爭下之紹興丙子大慧被旨來育王復來依焉大慧移徑山璞以繼之衆踰千數以為第一座制帥丞相沈公以廬山請出世大慧方名冠天下無不願出其門以借重開堂日乃以瓣香嗣大圎諸方以此益髙之已而育王虛席尚書韓公欲邀大慧而舉以自代遂主此山禪衲雲集以祖孫三人世繼坐道場築堂于丈室之東名以三秀遂為空門美談才具素髙以其暇日興土木之工皆極其壯麗增庾入數千斛施者委金帛創為長生局五所百需皆備月施金錢飰僧以萬計又造金塔以奉舍利此特其餘事爾日本國王閲師偈語自言有所發明至遜國以從釋氏嵗修弟子禮辭幣甚恭且以良材建舍利殿器用精妙莊嚴無比丞相史公帥七閩以鼓山趣其歸滎陽郡王力挽無行魏王出鎮一見其風儀目為僧中龍又聞其機辨峻發肅然加敬師晚以衣囊立菴于烏石山名以笑月為終焉計有偈云三峯斂卻間雲大海冷涵秋月庚子季春拂衣歸菴杜門不與世接俄示微疾八月四日呼左右付以後事澡浴趺坐書偈曰掣斷黃金鎖鑿碎玉樓鐘騰身大虛外半夜日輪紅擲筆而逝夀六十二臘四十七月五日葬于菴之寢室惟臨濟楊岐之宗至大慧而益震又得如師者為嫡孫上承聖天子之休寵下為帝子公相之所尊禮近焉道俗之歸向遠焉外夷之師仰可謂盛矣籌室所度未易悉數有宜意者得法最的住平江開元方有聲于時而遽即世禪家惜之徒弟至百餘人家法嚴甚嘗以師語録萃為巨編師呵之曰汝輩隨語生解去道益遠矣固不許師既沒乃始得百之一二刊之余段老山林與世相忘師謂可以語道往來無虛月警所未至相期歲寒一旦棄我而先愴念不已其徒求銘于余為之銘曰楊岐千古栗棘蓬諸方誰敢嬰其鋒佛日老子雲夢胸呵佛罵祖一洗空子孫三秀玉几峯妙智傑出傳家風碧琳一語開淵衷帝子謂是僧中龍三韓萬里滄海東酋傑稽首禮益恭一聲擊碎玉樓鐘日輪夜半通天紅亭亭寶塔上凌空烏石與之俱無窮延慶覺雲講師塔銘浮屠氏法盛于東南而明為最蘭若相望名德輩起豫固不能盡知其人然採之公言其間雖一代宗仰者往往未免評議至問覺雲師則同然無異辭余尤不能知也嘗造焉修幹古貌丹脣碧眼長松野鶴無一點世間氣與之語愈叩而愈無窮名下士信不虛矣師既以隆興癸未嵗十二月十有八日化叔祖居士語鑰曰士之難其全久矣趙魏老猶不可為滕薛大夫矧釋氏事寂滅而不免于應世二者冰炭誰能一之能使學佛者宗其教交遊者服其人周旋酬酢無一可議殆鮮有覺雲如者我與之方外交既已敘其行事汝銘之遂謹書而系以銘師諱志連字文秀覺雲其賜號也俗杜氏世家于明州鄞縣之寵山孕有祥生又不凡故母山氏篤志竺乾法令從禮寂公慧云為師肄業崇夀年十八受具戒明智目為僧中鳳雛圎照授以天台教義後從智湧頓悟圎宗年登三十適延慶為第一座始開講席辨才先放落落風生四衆聳服靖康以來更主五剎惟妙音不及暖席而遷餘皆碎于兵火師一居之卒化瓦礫為寶所圎辨重建延慶于煨燼之餘功未竟而死遺基廢礎尚多有之虛席曠歲實難其人天童宏智禪師以師為首衆議是之遂徙居焉經營十年無有不備施利山積一毫不自奉悉以資建立事雲棟雪脊傑然城隅望之如崑閬間物非大勤勞不易至此而師未嘗足也或贊其新伽藍者四當不愧智者師曰此有為功德耳豈敢以此比迹前哲深恐不能洪宣祖道為法門罪人故雖所至興建而講學不少休承學之徒翕然向風誠于祈禱感應響捷或欲記之必痛以妄語為戒祕監薑公守四明為師作真贊門人固請立石師終不以為榮其不求名聞類如此一時名士多樂與遊望之則毅不可犯即之則和易溫恭久益敬之終不得而親疏也有達官與之劇談貫穿禪律纚纚不倦驚曰師禪教並通師曰冰泮雪消固一水耳又問華嚴般若似過于繁師曰支離所以為簡易也于是肅然尤敬異之丞相沈公來鎮以僧職處師師以老疾固辭丞相遺手札曰師當表正一方紀綱諸剎毋退避以自潔且迫于諸方勸請始受命謙退謹願不見有異然主盟衆事惟是之從或有私請雖大勢力富檀那不能回也時度牒再頒受戒者僧吏邀取無藝師為立成規省十之九沙彌至于今德之有不遠數百里求附壇者所革宿弊徐而不暴嗚呼此皆人所難及者然師之所存心大而不密體卑而道尊恭而不偽博而不雜寂用之涯不可得也感疾既革衆以藥進師曰十方無礙入一道出生死書偈畢撫掌大哂又以指彈屏風或問之曰我自幸至此不覺喜樂鐘鳴當往矣已而信然師之所存果易識耶享年七十有六僧臘五十有八度弟子行丕等十有二人登門者甚衆傳道者三十餘人即以十二月二十有八日葬于城南祖塔之側銘曰舟不塗車不川離乎器用必偏惟寂滅釋所先惟應酬世所虔工與拙必一焉偉覺雲幾于全峻而通周而専得其得悟獨圎出緒餘應世緣識不識無間言教不吝道以傳建塔廟崇人天定生慧無礙禪融一理逢其原金而玉嶽而淵尊尊師豈偶然道既成如蛻蟬嗟後人視銘鐫攻愧集卷一百十
