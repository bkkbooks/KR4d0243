  text: 攻媿集卷九十一
  hash: sha256:b3e581a9ac717dcc782920adb0185e397ff3abe38ceef912341e22ee5d1af1bd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_091-1a}
body:
  text: 宋樓鑰撰行狀文華閣待制楊公行狀曾祖端故不仕妣蔣氏魏氏祖零故不仕妣邵氏父渙故宣義郎致仕贈中散大夫妣徐氏贈令人本貫慶元府象山縣政實鄉美政楊公諱王休字子美年六十六狀楊氏世居郡城公之曾門始家象山遂為邑人累世以隱徳聞于鄉公生而竒龎邵夫人中年抱孫極愛撫于髫齡中已有成人氣象莊重寡言樂然後笑相者以為必貴中散延儒士教之家苦無書傾貲買經史于胄監肄業蓬萊山僧庵中窮日夜之力至雪積于階而不自覺尤好詞賦兼通春秋游郡庠名出諸生之右紹興末年始名鄉書再薦登乾道二年進士第調左廸功郎台州黄巖縣尉首興邑庠公自課督又奬拔其尤俊秀者其後登科相踵皆以為出于公也邑有豪民武斷一方蓄雄狡數十輩分而為三曰大神者為之謀事曰中神者為之行貲曰小神者則無賴善鬬之人也官吏莫敢誰何公具得其奸狀白于郡黥隷他州閭里懽伏稱公為鐵靣少府遇略賣生口者痛懲而歸其人請捕監立賞格計實而募于衆禱雨則神龍為之示現捕盗則鯨海為之肅清蓋筮仕之初器業聞望過人已數等矣尋以賞典改左承務郎知盧州合肥縣邵夫人年過九十方欲奉重親之歡而邵夫人夀終公追慕含飴之愛不欲行中散同徐夫人執喪于家勉公前邁公攜一僕自隨晝至聽事夜寢書室洛誦或至夜分尚書王公希呂爲帥歎曰據案決是非此猶可及官舍如僧居二年如一日實有所不能也又愛公筆端箋奏皆屬之帥漕不相能久不覿靣僚吏無敢言者而皆敬公各致剡舉公因得調娱其間二公爲之釋然置酒交懽而待公益厚淮民多爲客户所侵地訟難決公親行阡陌爲之平章訟日息而野日闢至今賴之賦役均平一毫不擾民樂就役欲及公任内爲之嵗饑發防邊馬料運米給貸漕司詰之公疏艱食之狀且已責其秋償矣至期皆不督而集萬弩手赴帥司檢閲多苦傷寒喉閉之疾公擇方製藥以給之病者多全活具不幸者官又斂之郡多草廬易致延燔公白于郡請易以瓦帥曰非君孰能辦者公一力經畫市木傍境教民陶瓦未幾民居一新邊方為之壯觀淳熙四年磨勘轉承事郎明年任滿賞轉宣教郎授南康軍簽判郡素號江東道院待制朱公熹時為守日課諸生講書公亦相與發明事無巨細悉以委公自行經界以來境内苦于賦重民不聊生流移者衆公與朱公力請于朝利害甚白雖幸少寛猶惜其不盡如所陳也廬山東南勝境官宇有吏隱堂正與五老峰相直娱侍䨇親于堂上太守尤敬中散扁一亭曰敬老公餘則奉安輿遊名刹以盡其歡六年轉奉議郎初有詔臺諫給舍舉察官王公已在西掖以公及丞相京公鏜應詔京公遂峩豸而公遭内艱以歸矣扶護暑行悲感道路執喪甚苦九年又丁中散憂勉舉大事家為之罄邑鄰台州有蓋蒼山髙絶人迹罕至公處僧室閲佛經一藏以資冥福人以為難服除造朝言士風奔競皆上之人有以來之仍言海舶不可徑造都下貳相王公淮梁公克家是其言有意留公自以五年憂患之餘力求鎮江府分司糧料院以歸人尤髙之十二年到官職務至簡而少保吴公琚為總領一見公期以逺到幕府事既為盡力吴公亦開心聽可一司賴公為多明年轉承議郎吴公召還首薦公才徳之美孝宗命中書識之既滿秩王丞相欲處以司農寺簿公又力請外郡除知洋州十五年轉朝奉郎光宗時以皇太子參決庶務公辭于議事堂論淮甸撮課紹興和買最為民害又論四川綱馬利病光宗喜曰議論人物俱偉當為敷奏施行是冬赴鎮洋本佳郡近嵗有健訟者公剖決精明人不能欺坐以無事治賦期㑹信必不嚴而辦征商榷酤亦皆沛然郡有丹淵二蘇鮮于子駿四賢繪像旦望必率子弟拜之丹淵有園池三十詠公盡復故迹退食多賦詠其下又崇教化課農桑百姓安之纔一閲月俄改知金州兼管内安撫前守一武吏居興元席卷以歸又盡焚其籍公至則􅑎然且無所稽攷為之節用度懲吏姦不能給一二詔置獄前守坐編置没其家貲公又極力經理僅能成邦西津两渡公帑征利病民首罷之創浮梁于西津以惠行旅人為立祠過者必祝處分西城漢陰平利三邑綱馬以損均敷之費施竹木柴場之利去受輸倍征之害州有榷茶場其初止隷茶馬總領三司抱納息錢之外郡計亦藉其助守或乗勢權取至移用係省以増本錢從官多售既已科擾園戸深治私販配隷者相屬守亦或以自累公極白茶司欲賣引以便民朞年始有更引之命公力贊之俾官僚及諭鄉之大夫士各陳其事酌取衆説罷茶場而鬻引一方無不快之帥守尚書宇文公价憲使朱公致知相與歎曰安康之政前所未有也條其政績交薦以聞光宗登極轉朝散郎郡之士風素陋鄉舉者二人其一又流寓也公為大興學宮學者寖盛鼎新祭器春秋釋奠如禮有雅歌投壺之風焉十六年為四川類試攷官境内一水逺通襄鄂行商不絶有鬼愁灘摧舟絶險公出錢募人平理之石堅不可破公臨視之得古鐵于沙中甚夥鑄為鎚鑿嚴醯熾炭以攻之石為之解以砲竿移去遂為安流郡宿重兵多以榷利啟爭公視如一家愛軍士如愛吾民都統田公世卿固已交歡殿帥郭公棣奉祠里居相與從容無間嘗獵近郊步騎俱從三公戎服竝馳公又素善射以一矢斃䨇兔二老將敬服之閒語同僚曰中興之初余為均房鎮撫使敵騎犯塞大將以金舊隷京師置不問止保洋州饒風闗遂致此郡失守又乗勝擊破饒風直擣漢中賴王師力禦之遂由斜谷而遁今郡為西蜀喉襟上津縣即商於之舊邑自商之豐陽西至洋之重陽闗横亘一千三百里闗隘六十四邊靣闊逺而權輕財匱何以備倉猝乎聽者竦然公曰向以大將為守與三邊軍府角立廚傳動有重費交賄通及四鄰惟當痛絶舊習雖賈憎不暇恤也嵗餘以所積置防邊器具増保勝民兵衣甲親給支犒無侵漁之患時比箭賞革游惰之習休日則較禁卒事藝號令精明賞罰有差將官有夜飲于城外者私留門鑰以俟公曰吾與敵畫地而守其可弛乎懲閽者而軍中亦治其騎將内外始肅舊有撫養庫例與公使用等公曰此正以防邊也自軍用外不支一錢去之日為緡錢十餘萬紹熙元年轉朝請郎二年除利州路轉運判官自郡赴臺幾千里道遇訟牒隨即受理御吏甚嚴秋毫無擾攷察吏治置籍大書明别淑慝二條區别賢否列城爲之震悚利路屬郡多在關外漕計入不支出適當洊饑西師除掌武門下増俸不貲重以歸正之蠧方左枝右梧之不給而暑雨爲災上煩宵旰又躬撫勞賑濟之役金州大火幾無孑遺守卒僅以舟免公兼倉使即發米以救之漕司力不足寢食爲廢貳卿楊公輔方護餉四川與公同年氣義相許公力請于楊公曰安康一爇甚矣軍中有事力多使令猶可興起公私赤立何以爲州若請僧牒于朝萬里難應頃罷本州安撫司有備邊庫錢二萬萬樁留使所前守拘沒贓錢有㫖輸内帑二者皆本出于金州之民若以此建官府措居民于經費無所損而可以新此邦矣楊公慨然從之公既兼憲使聞闗外六七月方食麥盜賊横行吏惰訟淹徳意壅不宣冐暑慮囚厯階成文鳳四郡賙貧剖訟所至有恩行襃斜谷出武休闗道不通車間用籃輿徒步以度險于中暍以文州地荒民稀而力役最重為奏罷其不急者數條西帥吴公挺久鎮貴重待賓客尤厚公既深入邊闗吏曰當道武興公曰此行正欲到軺傳不到之地遂由文南以歸吴公猶以例卷至司公力辭帥服其亷蜀人翕然稱之有利州兵官告訐太守陰平知縣以縣庠爲酒肆公以爲犯名分敗風教莫甚于此俱劾罷之嘉陵江暴漲漂壊棧道郵傳隔絶公大爲經理以其費上聞總司助其役由益昌至大安軍修創棧閣二千餘間視舊加闢今成夷塗明設條約補役兵之闕畫疆分掌椽柱綯茭乗暇採取風雨侵蝕以時繕治期以勿壞自祥符皇祐元豐三爲此役元豐嘗紀用數今役不翅數倍而不以取于民有修橋閣記甚詳蜀中皆歌詠之三年移成都路提刑兼常平事得㫖護試外省公自向為攷官固已具知蜀人多為廋語于程文中有容私而幸中者謂之牢籠公身率官僚力革舊弊寒俊獲伸無不感服又詳究試闈曲折參以南省規式闗防備盡既施行之又編為成式申制司以為後舉照用綿州嵗市黄雀數十百萬一切禁絶之藥局嵗久劑料陳腐焚而易之巨室責租至使耕夫自戕公治其甚者綿漢告饑親至二郡主行荒政故饑而不害西蜀藉江水入堰灌溉舊率取竹木于民春猶未集水已大至積薪救急簡陋重擾徒有倍費公豫于冬初收買嵗始修築又眉州蟆頤山下一堰嵗苦衝決命伐石為之濬廣溝畎謹視瀦泄又捐俸為漢嘉西門石梁郡人名楊公橋皆為永久之利臺有平允齋聚獄案于中夜則閲之有疑則親筆究問緘以紫囊亦令所問官親筆批執吏不得預之故多得其平三年轉朝奉大夫四年冬除本路漕黎州蠻獠青羌攪邊州所遣兵為羌所圍公適攝帥以䇿禦之遂遁嘗聞道旁兒啼聲得嬰兒于枯木中因籍城内外得遺棄者百餘人悉加撫養俱遂生全剖決两司詞訟迎刃而解酒禁素嚴有捕郭二十五私醖至庭下公詢之郭乃一邑令公察其非滌器之徒治告捕者而慰遣之郭少城大族擁笏致謝三十餘人府庠養士至千人每月必再入攷閲程課旌其能文者庖饌豐贍士愈悦造吴蜀㑹子紙每界至六千萬漕計始十七萬緡偶㑹多事費倍平時或慮乏興而公處之裕如遂積緡錢至四十餘萬两在漕臺典外銓倖門尤衆一以公心行之量能授職多得實才人服鑒裁之明慶元元年覃恩轉朝散大夫尋又以年勞轉朝請大夫召赴行在七月除戸部郎官湖廣總領仍令奏事對便朝奏罷邊民守闗及非法役民者以軍兵爲之此安邊恤民之急務又奏禁盜賊之法彊盜已有六項指揮欲于殺人屍不經驗而無證佐依大辟疑慮奏裁指揮下添入彊盜殺人者非六字使盜賊有所憚且明示無惠姦之意又論錢弊甚悉謂貲泉取其流通今自裂而三之東南則用行在㑹子两淮則用鐵錢㑹子湖北㑹子則又異于二者是使商旅不通嗟怨相聞不若罷两淮湖北㑹子其在民間用行在官㑹收之俟收两處㑹子盡絶則官㑹通行實爲利便總司金榖浩穰公首去八弊而總計為之日充詳閲軍用而覈虧數之實親臨出入而究楮劵之姦分錢交子為三而不容互用判軍糧樁積為二而不許移易拒河支廊支之請而米綱無陳腐之憂繩兌支截支之擾而茶引有通行之便以至廣儲蓄之地两郡為屋百楹舊以蘆荻藉米一易以板後遣使盤量惟湖廣之數豐盈人益歎慮事之周也循行邊屯㑹襄陽火災之餘亟議撥錢五干緡瓦礫之場盡興棟宇公又親撫存之軍中升差赴司按試公勉以忠節親校武藝仍書公移置几上中選者即書其姓名手以授之進退既公軍士感悦三年春就除司農少卿九月令赴行在供職十一月除太府少卿十二月三日除中書門下省檢正諸房公事六日始入國門先次供職明年奏事陳備邊之䇿謂金方與韃靼相攻未知勝負然皆足以為吾患不可不慮也又列擇將審勢修戎器招勇敢士四事因薦統制而下内可為環列外可為將帥十人御筆籍記時中書積獄案甚多月日或有揩改之迹四月轉對即奏曰奏案動闗人命中書豈能悉察吏得以為姦利以小節迂囘而俟赦降或改移月日後先謂該恩宥乞以大理寺及四方案盡申御史臺置籍月委察官一員稽攷勾銷已結絶者而催督其餘或有淹延太久日月差殊則奏劾之庶無冤滯之民又論省部吏引任緦麻親之弊國家以天下之務隷于六曹而總于三省故爲吏者賞優而廩厚又爲保引之法許錄其子孫若異姓而今日厖雜殊甚習學守闕不知幾人氣習趨向非復舊風輕儇苟求詭秘百出反甚于州縣之吏乞加澄汰止許保引子孫者許引同宗大功親一名其異姓之人一切停罷庻少清吏選聞者皆韙之六月假顯謨閣學士兼侍讀為金國賀生辰使過泗州北書表初參索使副出笏公令掌儀以禮折之曰都管而下便服來參乃欲使者以盛服相見豈無差等耶竟受參如儀至眞定謝酒果金之中使忽謂使副不當用皁背白領蓋北方朝儀皆用紫也公曰本朝止用此服且泗州東京既用之儀正如此使以左袵至本朝豈為不恭即麾三節人退班終不能奪歸而奏曰臣將命殊鄰因得觀民情之向背敵勢之盛衰與夫士馬之虚實財貨之盈虧皆已可知此固已見天道好還今古不異然在我不可一日而不備又奏和糴所以惠民而備兵今平糴良法寖壞牙僧胥徒操其權而官受其敝乞置場收糴聽民商從便免致科敷可以絶姦利而價自平矣四年以勞遷轉朝議大夫又以年勞轉中奉大夫十一月遷太府卿轉對論奉使三節人從近嵗託請貨取僥賞而已安有能覘人之國者欲乞除上節親隨等選辟如舊餘悉取于三衙及江上諸軍上自統領下至隊兵輪轉差撥已行者不許再差嵗两遣使約不下百餘人彼城壁之堅瑕地理之要害必有能覘之者因使士卒經行洪河太山激昻壯志轉相傳聞一旦用之必有助焉又論郡縣拘到銅器或憚于解發而收貯不嚴竊取求售所在有之乞令盡發赴錢監仍申嚴禁戢五年差省試參詳官五月除秘書監公性嗜學久從吏道未嘗廢書自謂平日欲見袐府書而不可得遂終日坐省沈觀未見之書尤不喜趨競同省贈以詩有九衢達宦方馳轂羣玉詩仙獨下帷之句有以為後時者公笑不答九月兼實録院檢討官十一月除禮部侍郎兼修玉牒官六年進故事論監司廣朝廷之耳目攷州縣之否臧以惠安斯民者也若罷軟不擇癈耄兼容徇苟且而略風節尚資厯而混賢否亦何取于外臺之寄哉因厯陳髙宗孝宗聖訓願深詔大臣除授之際雖不可廢資厯一當先擇風力强濟材具精敏之人使充此選則一路可以蒙福矣光宗玉牒書成公讀于殿上以賞轉中大夫四月兼工部侍郎夏旱上封事請下罪已之詔修應天之實布之天下使内外之臣圖弭天變五月有詔罪已仍詔侍從而下疏陳闕失又奏備論二税徵榷之擾和糴先備之計尤詳時慈懿皇后上仙两部事繁公嘗病暍往來冐暑感暴下之疾力請外祠三請除文華閣待制提舉江州太平興國宮以歸歸而病寖革啟手足之際色莊不亂命具紙筆曰吾將逝矣書一頌甫畢遂終于正寢寔九月壬申也病中乞致其事轉大中大夫遺奏聞贈四官澤其後二人娶同邑史氏子二人燡將仕郎燧先半年卒女四人長適吴興鄉貢進士周儼次適承事郎新知常州宜興縣丞洪俌丞相之孫也二女皆先卒次適文林郎新紹興府􅌘縣丞俞杭次許嫁未行後公一年卒孫男一人基登仕郎以嘉泰二年九月庚午葬公于鄞縣通逺鄉金谷里四明龍井山之原將葬燡請狀公之行鑰少與公同薦公自海上後至遇于途峩冠粹温即語同行者曰風度如許一第何足言且當以賢貴有聞于時遂定交焉今四十年矣中間離合不一公之賢譽日起人猶日長者耳其使蜀也聞公不畏强禦幾危其舟嘗按郡守有為之地者反欲相傾人為公懼公抗辯于朝不少屈中執法為直之而後定于是益壯公之為而加敬焉京丞相嘗謂鑰曰祖宗不以蜀人帥成都又多以東南士夫參錯于諸路麾節間有深㫖哉某帥蜀時固知蜀多名士求其曉暢吏事所至治辦而不疎者無如楊嗣勲東南士夫入蜀者亦多可稱求其最賢而有才者無如楊子羙故某與之尤厚紹熙初詔内外從官薦可為卿監者首薦之公欲歸而未得㑹京公趨召公命燡浮家依京公東歸獨處于蜀者又三年蓋其清修約已一意公家如此前朝用人往往厯偏逺而後歸主大計以至柄用公之宏才逺業所莅不苟揚厯最衆見其歸而持槖意必由此而升姑未問經濟事使其婆娑從班吐胸中之竒以見于論思之間亦何止此厄而不得騁豈非命耶逮其賦歸已先卜城居棟宇閎敞猶望為老朋友以相依然公歸而病病遂不可為一見亦不及也哀哉公厚重周密與人不為翕然熟久而敬之士無賢不肖入朝見嫉自古志之矣惟公之來而朝無間言猶謂其晚去而共惜之是必有過人者素少病聞歸班時氣貌尤充悅人咸以為富貴未艾也歸自北方始覺稍衰而又連年有兒女之戚人所難堪使堂堂雅望奄至九京此尤識者之所共嘆也著述甚多宦游名山隨處題咏散落之餘入川時有遊岷漫筆一編又有東齋集五卷諸史闕疑三卷藏于家篤于孝友中散每憚航海之險屢謀入郡而不果公既貴遂問舍于湖上將赴洋州故廬先業盡以與二弟漕成都時以捧表恩任弟之子燫又攜以出疆循從事郎今為台州支鹽倉遺令燡曰吾家素寒㣲羣從多困其有以助之燡泣曰敢不承此志公在蜀中樂賢之衆多所薦引如今吏部尚書費公士寅前兵部侍郎趙公介俱嘗與公同朝此其最表表者也其他大有建立是時燡已奉母而歸不能盡記公又以為王事所當爲不惟不夸于人亦鮮以歸語其家恐尚有遺事未能備也謹摭其可記者爲之狀將以求銘焉謹狀直秘閣廣東提刑徐公行狀曾祖義贈中奉大夫妣胡氏贈令人祖佐贈宣奉大夫妣許氏贈碩人鞠氏贈碩人考立之故任朝議大夫贈特進妣李氏贈安定郡夫人本貫登州黄縣公諱子寅字協恭世居文登特進以紹聖初元登進士甲科南渡先寓㑹稽建炎四年令人梁氏生公徙居四明今遂為慶元人特進家無儋石儲而篤意教子公生而敏悟尤所鍾愛先意承志務進于學授詩于鄭先生剛中累冠鄉校紹興十年以明堂大禮恩補將仕郎十八年春銓中選授右迪功郎監渾州南嶽廟時法官多山東人與特進厚善勉公習法明年公方弱冠一試中其科二十一年丁特進憂遺訓有云吾以孤寒自奮為正郎者三十年中遭兵燬僅能立家汝曹異時莅官内勿欺心外勿虐民公泣血書紳終身誦之服除授建州司法參軍任滿闗陞右從政郎授潼川府路轉運司主管帳司未赴以法科改福建路提刑司檢法官審復囚牘累百凡駮正死罪七十九人吏部以聞減磨勘一年公曰法所當輕非敢縱囚以求賞也竟存而不用隆興元年以舉主改宣教郎授两浙西路提刑司檢法官改除大理評事乾道元年以鞫制獄除丞其詞曰志業有立操修可觀潛心于孔子孟軻之言兼邃于柱後惠文之事是于聖人之意其知之矣三年差充刪修續降指揮所刪類官四年輪對力以清刑為請上固已識之丐外補除知無為軍十一月陛辭奏两淮議營田屯田久矣地有餘而人不足每以為病比年歸正之人甚衆分處州郡仰給大農徒有重費猶患不給臣嘗因鞫勘歸正人公事嘗以詰問之皆以為飢寒所迫不得已而為此若得官備耕具使治淮上荒田以餬其口何苦犯法哉臣矜其言竊嘗詢究淮上治田之具蓋每招一家必首給錢百二十緡以其二買牛一為室廬耒耜之資是知淮上不惟人稀牛亦艱得計道途之費固應倍于内地又縁經厯商税費亦寖重臣恭覩仁宗皇帝國史凡鬻牛者免算税紹興敇令云若以牛販賣其過税勿收即遇災傷放税及五分過往税亦免欲望遵仁廟之法申甲令之文並免販牛過税至两淮者住税亦免耕牛輻湊則曠土日闢矣臣恭聞陛下方發内帑委守臣備耕具招歸正人營田若更免牛税則必欣然從事于畎畝農隙閲以武事邊備之至計也上大悦且曰牛税可免卿能保歸正人樂于耕乎對曰臣豈敢為嘗試之説盖詰以汝輩未歸此時在北方亦耕夫耳咸曰然臣使手書款狀皆其真情因袖出舊辭以進上尤擊賞玉音甚寵曰朕圖此久矣未有利害較然如卿所陳者卿于訊囚之際乃能體國逺慮及此耶卿未可試郡朕將用卿既退御批陳獻可採先次差往淮南楚州相視措置條具聞奏公在朝行恂恂似不能言一旦對奏卓然動上聽感激自奮始盡力于淮甸而眷寵日深矣公躬履阡陌募樂耕之人與之通情詳議不以使者自居上嘗念公之勞又未見圖上事宜因中使至盱眙戒以訪徐某所在宣諭催促公性簡易方在田間議事語既久出盃酒與之分酌中使適至傳宣既畢匿笑而去以其太簡也歸即奏之上曰孰肯將使㫖而為朕究心如此者明年正月歸奏上首襃諭此事公遂奏條目甚悉大略謂楚之淮陰乃沿淮極邊之地監城沿海雖有間田未有以處歸正人且于寳應山陽得空閒水陸田五百餘頃勸諭到歸正傳昌等四百餘名欲人給一頃五家為甲一為之長隨處置莊仍給備耕牛農具屋宇等錢家與草屋二两牛并屋一種糧萬錢並俟入莊日給付初年開荒免納本錢次均五年還還足給其田為已業候滿十年起納税賦其勸諭等人奬勸有差詔可其奏淮東帥奏乞措置監城喻口两地守禦上曰非徐某不可就俾措置公奏喻口當射陽湖入海之要監城築壘不堅又無屯兵乞下楚州措置守禦從之是月除大理正不候授告先次供職復往淮東御筆賜知揚州莫濛覽徐某所陳歸正人給田利便甚有條理已令施行卿宜協力使一一就緒五月詔對奏諸莊水利有二古溝可洩水田夏潦循其舊而浚之因而賑給歸正原耕之人實為两利又奏荒田及守令拊摩等事亦得㫖行下並依所乞施行七月詔以莫濛措置淮東山水寨及民兵總首并莊寨使效已及半年未曾審實委公按視激犒仍支舟師器甲等尋兼權尚書駕部郎官又奏仍舊置萬弩營六年正月有㫖徐某措置官田招集人民委有勞效除駕部告詞有云司輿郎吏髙選非曾把麾持節不以授今特命汝上曰徐某清貧不受餽遺繼命中使賚白金五百两四月差知髙郵軍公奏措置官田節次勸諭到歸正人及種田使效計一千四百餘人共置五十莊屋宇牛具畢備縁諸莊散在揚楚髙郵盱眙四郡今差知髙郵切慮諸莊疑惑欲專委才吏措置两淮官田得㫖徑委公兼領許令每年一往諸莊激犒俄改知泰州又一月召奏事因陳鹽場利害及捍海堰事甚悉遂兼權淮東提舉御札令俞召虎與徐某同措置營田郤令徐某同措置鹽場各宜協濟以副朕使令之意十一月以職事修舉除直秘閣七年賜緋衣銀魚四月奏事選徳殿復條具鹽事遂除提舉淮東茶鹽常平措置官田如故楚州申淮人陸梁恐開敵隙上令相度隨即奏聞上喜御批卿無所避憚挺身任責足見恪勤乃職朕甚嘉之當官處事正宜如此然淮民既已肅静郤當撫之以恩不可專用刑威也恐卿等或未之思故兹奬諭復示朕懐宜加體悉十二月以鹽課増羡特轉一官丞相虞公允文貽書謂一司治辦前所未有欽歎不已是年以和糴最多而先辦仍自行津運委見盡心國事又轉一官八年坐不覺察所部私渡降一官後乃得實改正屢請外祠以鹽司積壓鹽本降二秩卒以總領所申額鹽虧失罷九年七月主管台州崇道觀淳熙元年正月召赴闕奏對稱㫖除工部郎中仍舊措置官莊樞密院得㫖列具淮東官莊已成之數總五部七縣及楚州忠勇使效爲五十四莊屋二千四百四十九間耕者一千二百有竒牛六百二十有五稼器六百二十五副老穉五千四百二十有七耕田九百一十四頃上見實效尤以為喜公蒙上異恩感激盡力嘗歎曰古者專以屯田為養兵開邊之計國無重費而可成功今講和方堅無所展究將有見忘者矣已而果然淳熙二年官莊結局除將作監㸃校官莊三年四月除大理少卿六月罷十月主管建寧府武夷山沖佑觀四年春除淮南運判不赴九月再命仍專一措置督修城壘五年兼權揚州于是瓜州城成六年五月除知揚州八月除運副時暫差知楚州九月修築髙郵興化寳應縣石闥斗門函洞隄岸可以固䕶民田約三千七百餘頃特授中奉大夫封黄縣開國男食邑三百戸未幾罷歸两任提舉武夷山沖佑觀十三年轉中大夫十四年除知隨州十六年賜紫章服冬始赴郡紹熙二年任滿尚書張公杓為帥薦于朝三年除知台州公至郡詢訪利病之實思欲不闕郡計而又裕民量入為出優有餘地榷酤征税大率從寛闔郡熙然塗歌巷詠率有太平官府昔所未見之語明年版曹比較上供以台為優人謂既以利子民非天雨鬼輸何以致此益以為不可及或問公則曰求弊當求其源台有二弊偶皆得之一曰秋苗為鈔二曰軍士虚籍有姦胥増改鈔額照以倉籍偽增至八千餘石至以十為百以百為十上下蒙蔽久矣公既發之而使輸苗者每鈔不過一石弊無所容至增萬斛虛籍尤為重耗因立賞罰使之自陳置籍几案上親為銷注月餘十去二三嵗減數千斛財賦條盡較計精詳節不急之費罷饋賂之私杜刺軍之請是以能不擾而辦屬縣寧川邑庠久廢公為買田五百畝以振之剖決滯訟情法俱當人既悦服一毫使民則為之蠲積逋至十餘萬謠頌騰播逺邇寮吏亦皆感歎倅貳賢者還朝語人曰郡太守職在便民政有不平則吾當正救之今徐使君專意撫摩如恐傷之吾無所用其力惟贊之而已憲使陳公杞行郡父老擁車請留太守者累數千牒陳公歎曰得民如許諸郡未見其比當以聞于上五年四月除廣南東路提㸃刑獄公事郡人尤惜公不滿秩而去立祠塑像以歌謠刻之石攀轅臥轍喧動千里幾不容去公歸此亦倦遊矣力丐祠而促行之㫖益嚴既扺所部詳刑決獄務在寛平恩威兼行列郡皆聳慶元元年春夏之交欲徧厯諸郡或謂瘴煙季春為甚姑緩之公謂職在澄按不能自已至五羊疾作而還第四子隨侍自公得疾于道驚憂精禱願以身代公既還而此子先以疾卒公罙不堪遂相繼而逝寔五月八日相去纔五日爾痛哉享年六十有六娶汪氏累贈令人再娶陸氏封令人七子長晞臯通直郎先三年卒次睎益承直郎知台州寧海縣丞次睎稷嚴州觀察支使次睎夔儒林郎新鄂州觀察支使即死于曲江者次睎垂將授公遺澤次睎契睎夷習進士女五人長適朝奉郎主管台州崇道觀唐漼次適進士王然次適從事郎監温州在城商税琴次適承奉郎監台州在城商税汪立中次適史宣之寔太師之孫將以遺恩補官孫男十一人師顔師孟師周師偃師雍師錫師㸃師召師伋師夏孫女四人未行諸孤將以二年九月丁酉葬公于鄞縣翔鳯鄉隱學之原從新卜且公志也公天性夷曠與人以誠實素嫺吏道晚益更練故台州之政尤為人所稱孝宗知奬實千載之遇往來淮南數年詳究精密論事上前如辨白黑動輒寤朝奏暮行間有飛奏亦皆響答故凡事皆見功緒人但見其寵渥使藩成大家亦其才業勤勞有以取之公為漕時有揚州教官倚勢援迫諸司求攝傍郡守皆俯從之來求于公公曰此非所以相愛悔吝必在旦夕邊郡章奏動徹上前萬一以為問何辭以對力郤之其人遂陰擠公坐此罷公不以為恨後數年其人以賄失官舉者皆坐公蓋嘗諫之彼自不用故獨免于罰仁者之報也一閒十餘年築屋湖上日以觴奕杖履自適尤善居鄉未嘗忤物宅欲成而東南尋丈之地或執不售公曰我亦何用此左廡止為前榮而缺其後久之求售終以善價酬之晚雖豐餘而自奉如小官時兄子數人撫之有恩意調給惟均無有間言公在淮南鄉人有被盜疑公之僕為囊槖追捕治掠甚苦公聞亦不為動已而得釋伺公歸而訴之公曰我以家事付汝累嵗侵漁已多迨假手以治汝尚何訴其無競類此聞者服之麾符所至前後薦士百二十餘人其間有在從班者而公出入三朝受孝宗之知尤深官止列卿豈非命耶鑰汪出早嵗及與公同舍姨母既歸公情親寖厚丞相留公當國最重然諾鑰一日見之坐中有語及公者留公曰此人有才鑰因問曰相公何以知之曰朝廷每下邊郡措置禁銅錢過界惟隨州一奏甚明而可行因曰其人純茂向來口語非其實也其後丹丘廣東之除皆出其手鑰不惟服公之知人而又喜公之爲留公所知也諸孤請狀公行并以所聞書之俾求銘焉謹狀攻媿集卷九十一
