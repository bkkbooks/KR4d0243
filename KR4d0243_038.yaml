  text: 攻媿集巻三十八
  hash: sha256:c3ab9f9a2a0d0427df6e8853d4e51ff544e6a3adcde71c0e0122a60c24177a5f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_038-1a}
body:
  text: 宋樓鑰撰外制太府少卿兼知臨安府袁說友權戸部侍郎敕朕攬收人才思裕拜用足兵雖急要先足食之言大計是謀當求大度之士是為儒者之效孰曰民曹之難具官某文有英詞神無滯用蚤登館學嘗接武于華途旋歴麾符屢策勲于劇部居輦轂彈壓之任知里閭銖兩之姦前張後王聲望相繼東賈西萭豪猾自消疊膺晝接之榮擢寘地官之貳損上益下朕欲圖加賦之寛理財正辭爾尚明盍徹之意直祕閣兩浙運判王厚之直顯謨閣知臨安府敕具官某國家駐蹕呉會視古天府民日庶事日繁師帥之寄尤難其人以爾先世嘗爲京尹治行超卓如漢章尊汝實是似故以命汝自其少時博雅篤學世味沖澹若將終身焉一行作吏所至辦治處之以榮觀而超然投之以劇繁而不亂是宜居此官者輟自漕臺加畀延閣用爲爾寵唐人有言輦轂之下先彈壓郡邑之治本惠養此言殆未純也五方之民固為厖雜九縣之衆尤須撫字威惠交孚則為稱職且稱其家矣戸部員外郎黄黼直秘閣兩浙運判敕具官某部使者之職重矣而畿漕視他路尤劇近歳率用儒者不惟職務整辦惠愛遂及于浙河之東西是不可攺也以爾起由膠庠凝粹而開敏嘗使江東得斂散之宜澄按列城不苛不弛茲由郎省付以漕事寓直延閣以示寵嘉矧在鄉邦周知利病爾能罷行之下有月旦之評上有公朝之論當不日而徹聞矣勉哉李大卞知洋州敕具官某洋川在東蜀為望郡通儻谷駱谷之道據黄金戍之險賢牧風流相傳左符不以輕畀也以爾家世循良明習吏事雖安于閒退而閱歳已多勉為一行以副朕選用之意虛恨蠻酋首成忠郎袁弄滿三年轉一官敕具官某國家銓法文臣以四年武臣以五年乃得進秩三載攷績不以施諸庶僚也以爾慕義中華誓保西南塞下郡將有請升爾一階益貞乃心毋替于舊監建康府榷貨務武翼郎趙公遜修武郎丁昌時收趁增羨各轉一官敕具官某等摘山鬻海之利榷之以佐軍需其數實繁爾仕陪都歳課登衍何愛一秩以勸後來周珌大理寺丞敕具官某李官之屬率以文法進求其持身無玷缺以儒術飾吏事者尤難其人爾起名家乆于棘寺嘗為丞為正矣試郡有稱奉最來歸最言歸論奏明辯互證當案奉一本作奏與前卷奉奉作再轉為丞復典臬事雖若小迂而榮途自此無壅矣隨龍御前忠佐馬步軍都軍頭陸安轉遙郡刺史敕具官某爾事朕潛藩首尾三十載勤且久矣然稍逾三尺則有司執法以裁正旣進六資則朕之寵命復行上下俱為得體而爾受之亦宜往刺一州益務忠恪浙西提刑葉適吏部員外郎敕具官某郎選在今為甚重雖朝列名流必著外庸而後授今得人物之英為之則又增重矣爾博極羣書洞視千古文章之發追配作者頃由册府試以郡寄臨事知變就畀使節以寵之天官名曹實為星省之冠是不于爾而誰屬簡要清通爾其兼之判潭州周必大判隆興府敕詔起東山已報長沙之政符分南服尚提新府之封乃睠元台載颺明訓具官某閎深而肅括堅正而裕和極論思獻納之工盡輔贊彌縫之用始終一節光顯三朝進退百官聚英才而在列總領衆職任大事以不疑方安蘂館之閒往鎮藩方之遠眷懐不替委寄則均政化流行有類上公之分陜威名孚洽共期大老之歸周惟此南昌尤為要地爰命三孤之重式遄十乘之行矧爾寓居之鄉實今賜履之下旣喜衮衣之寖近抑知晝錦之有光先聲所臨羣聽自聳噫令行庭戸當還帶牛佩犢之風福及京師更佇自葉流根之效來綏四國式憲萬邦朱熹知潭州敕具官某十國為連師帥是寄矧長沙控湖湘上游賜履甚廣視邦選侯尤難其人以爾古學粹深風節峻特可以為世之師仁心仁聞威惠孚洽可以為時之帥兼是二者往臨藩方聲望所加列城聳服儒先相望士氣方振爾其為朕教之楚俗雖安尚有凋瘵爾其為朕撫之典刑所存奚俟多訓陳公亮江西運副敕具官某朕惟郡邑官吏至繁不勝其選故精擇部使者付以揚淸激濁之寄以爾抗直而詳練由宰掾持七閩使者節按刑畿甸又有能聲是豈可一日使之家食而不在事易節待次姑以徇爾之私大江之西將輸事重益謹厥職以副眷懷吏部郎中林湜太府少卿敕具官某版曹總國用之要而帑藏分之有司必以外府處其中所以檢柅財貨之出入不嫌于詳其可以輕畀哉爾奮身儒生習于吏治在縣為賢大夫入朝為才御史澄按兩道攝承十連皆有聲績徹于朕聞召寘郎闈靖共爾位進之少列以慰公言率屬究心使上下兼足爾其懋哉戸部郎中趙謐軍器監敕具官某戎監之設本以嚴飭武備而休兵歳久繕修之職各有司存長貳亦惟總其凡而已以爾舊弼之孫克自抑畏久在郎省能寡悔尤序進為長仍攝民曹往其祇欽毋替于舊龍圖閣學士正議大夫韓彦直磨勘轉官敕夙嚴銓法所以示百僚之公優待從臣猶不忘三載之攷具官某材猷通敏政術闓明歴事三朝負縉紳之素望投閒十載號簪槖之舊人心安蘂館之居職寓河圖之峻年勞旣久官簿愈高用為晩節之華其服寵光之渥寶文閣學士大中大夫顔師魯轉一官致仕敕奉香火于眞祠方徇投閒之請掛衣冠于神武遽騰告老之章雖欲挽留不如得謝具官某性資剛毅政術疏通幼學壯行曾不渝于一致出藩入從蓋詳試者累年往使殊鄰抗節不撓進登常伯典銓尤明一辭宸陛之嚴洊鎭泉山之遠力求閒退方念儀刑不知何恙之深載覽引年之奏俾升官簿以寵老臣眷簡未忘姑遂明農之志始終無玷尚餘許國之忠服此恩光體予至意顔師魯贈四官敕垂車得請尚想履聲之餘易簀有言猶存尸諫之意愴老成之已矣念冥漠以憮然具官某受才高明植操堅特莅官行法所至有循吏之風憂國愛君直欲任天下之重獨辭榮于八座乃斂惠于一方身退而名益彰年高而德彌邵眷舊臣之無幾驚遺奏之遽聞超進文階仍延世賞仰無愧俯無怍何謝古人生也榮死也哀終全晩節眷惟英爽歆此寵靈正議大夫尤袤轉一官守禮部尚書致仕敕位列儀曹屢上求閒之請恩隆儲寀俯從納祿之私兹焉告歸于以示寵具官某器資精敏學業淹該隱帙奥篇了辨無爽殘膏賸馥霑丐為多冊府道山極一時儒學之選詞垣翰苑兼兩朝制誥之工比訖外庸進儀淸禁命之夕拜有唐人批敕之風擢以春官當虞臣典禮之任乃因感疾遽欲辭榮俾陟崇階以華晩節李綱乞骸而去肯久于尚書孔戣得謝而歸仍加于禮部尚祗渙渥無媿前良尤袤贈四官敕舊老遺榮猶有留行之意表章載覽忽形垂絶之言天不憗遺人所嗟惜具官某以時耆德事朕初潛蚤歳宦游殆及王楊之接晩年貴重遂從園綺之招古事今事問無不知大言小言進必有補爰暨纂承之日首參侍從之班召自藩方喜典刑之如故擢居瑣闥嘉悻直之不衰圖任方深求歸何亟雖弗至甘盤之罔顯恨不許彦博之少閒喪此良臣動予深念進四階而命秩按三尺以疏恩學焉而後臣之正賴多聞之益死者如可作也抑惟斯人之歸或其有知毋悼不幸起居舍人陳傅良起居郎敕具官某言動之屬史官固有左右之異朝廷之用賢士豈以日月為功試之加詳旨則有在爾窮百氏之學發六經之文身方在于布衣名已傳于海内外庸旣訖衆望愈歸比再入于脩門寖擢居于清貫叩其著述之業登之記注之司螭陛直前善開明于朕意鳳池共二能震耀于王言執義不回秉心無競稍遷厥職以重此官庶幾朝宁之間猶見儀刑之舊載纂高皇之典仍陪元子之遊益啓乃心母忘忠告祕書郎彭龜年起居舍人敕具官某朕修明官制用之有條識拔人材待以不次惟此柱下史在邇列以尤親取之中秘書迨近時之罕有旣云遴選安得異辭爾操守堅剛論議剴切端公辟屬贊臺院之宏綱冊府為郎號士林之翹楚擢寘螭頭之直俾陪豹尾之班不循年限而授此官深得用魏謩之意掌錄時政以付國史尚克遵唐室之規益效忠猷以酬異渥朝請大夫權刑部尚書京鏜磨勘轉官敕六卿分職皆吾從槖之臣三載陟明優爾吏銓之制具官某謀謨宏達識度恢洪頃膺慈扆之知徑上甘泉之列張旜而使萬里折戎虜以不驕叱馭而鎮兩川撫民夷而咸服召登宸陛擢寘秋官茲以年勞應于治典爰峻文階之等益増禁路之光尚服恩榮式殫猷告兵部尚書羅㸃落權字敕尚書古之納言必求德望之妙武部周之司馬實惟邦正之專肆疇已試之良爰錫爲真之寵具宫某訏謨經遠雅量鎮浮蚤歴近臣自有老成之譽素多仁聞仍全剛毅之資推愛人利物之心為致君澤民之業詞掖久推于潤色經幃尤賴于講明旅登聽履之聯兼莅典銓之重儀刑朝著滿歲已深領袖從班優賢可後有常德以立武事正需舊學之規以軍令而振國容方倚壯猶之助往祗成命式贊永圖兵部侍郞耿秉落權字敕朕旁招賢士遴選從臣惟我舊人載處五兵之貳不煩滿歲遂頒一札之書俾正厥名敷告于衆具官某性資剛果器識宏深夙志功名善談當世之務屢更事任専以斯民爲憂故典州則千里舉安而將命則列城蒙惠徧儀華貫寖簡予衷掄才甫上于禁途引疾遽收于朝蹟勿藥有喜盍歸乎來留寘邇聯方藉論思之益願全晩節尤高廉退之風乃加眞除俾鎭雅俗櫜弓雖久豈忘武備之修持槖甚休益謹忠猷之告尚承至意毋有遐心工部侍郎謝深甫落權字敕朕昭德塞違臨政願治乃睠吉士洊兼夕拜之官樂聞嘉言俾正冬官之貳固云試可實示褒升具官某性稟粹純行能膚敏被聖父非常之遇膺周行不次之除嗣服云初首居郎省量才旣審擢寘諫垣顒顒朝望之益高亹亹奏篇之切當晉登在陛咸推記注之功就尹中都更資彈壓之重持櫜優遷于起部典銓仍領于選曹載輸批勑之忠尤見愛君之篤豈應久次宜遂為真疇若予工匪求精于技巧毋替朕命尚益效于論思汪德輸知崇慶府敕具官某始吾高宗開公社之封實自蜀國尋以崇慶名軍蓋久而後冠以府號地望滋重矣選侯可輕乎惟爾祖首貳元帥府以佐中興爾為恂恂克守家法簡池之政平易無華卑以左符往守兹蜀念之哉無忝爾祖則不負寄委此邦之意宫人符燕燕轉永寜郡夫人李進進轉通義郡夫人敕朕飭修内治靡形色選之私周覽掖庭爰秩婦官之序有嘉女德用錫命書具封某婉嫕自將柔良有素知小星盡心之美不見驕盈承樛木逮下之恩惟加肅謹寖歴歳時之久備殫夙夜之勤分樂土以疏封賁小君而示寵其祗渙渥益懋芳猷汪義端知舒州敕具官某淮右諸郡職優而事簡舒其尤也爾蚤登甲科蔚有時望近膺親擢欲振臺綱引去翩然留之不可爾才辦劇屢更盤錯是邦簡靜游刃有餘其與斯民相安于無事以稱朕安邊固圉之意集英殿修撰知紹興府趙不流知廣州趙彦操職事修舉並除煥章閣待制趙不流敕報政輔藩又見期年之變疏恩中扆載加禁路之榮具官某慶席仙源才優吏道頃由輦轂彈壓之任遂為朝夕論思之臣寶婺分符備著蕃宣之效㑹稽奏課曾陞論譔之華日坐黄堂庭無留事風行黔首時有譽言登之持橐之聯壯我維城之勢帥臨十國方為久任之圖位列四松不減近班之寵尚祗明命以訖外庸趙彦操敕帥閫雄尊著南海于蕃之蹟璽書勉勵陞西淸次對之華惟我宗英被兹渙渥具官某才猷敏劭學識該通蚤膺聖父之知超寘列卿之長俾兼天邑有趙張之威名進攝地官熟研桑之心計一辭位著久閲星霜姑蘇宣三載之勞章貢總數州之重頃踰庾嶺往鎮番禺撫蠻徼以不驚惠賈胡而無擾載嘉善最俾正從臣望雲以求蓬萊毋謂鵷行之遠把麾而去江海乃通豹尾之班兹曰殊恩益圖來效端明殿學士正奉大夫致仕鄭丙贈四官敕引年已乆無復尚書之履聲遺奏忽聞庶幾太史之尸諫舊臣無幾䘏典宜加具官某氣直而能温性剛而善下立朝正色為多士之表儀典選盡公慕古人之風裁洊更名郡遂返故鄉奉祠館以怡神據禮經而告老謂因閒適可迪壽康不知何恙之深遽起云亡之嘆疊升命秩仍茂賞延八座班高篤始終之不替九京恩及尚英爽之有知資政殿大學士通議大夫范成大轉一官致仕敕圖舊人而共政方媿未能引大體以乞身胡爲有請嗟名臣之老矣撫往事以慨然具官某俊逸不羣風流自命文章甚偉崔蔡誠不足多制誥尤工王楊當爲之伯緒餘所出施設具宜桂海冰天望皇靈而益遠瀛壖蜀道專制閫以增雄是誠宣力于四方宜俾進官于兩地出司留籥遂奉祠庭用之未盡其才退而自求其志臥公幹漳濱之疾掛隱居神武之冠寵數彌光典刑斯在噫胸中之有兵甲世稱小范之才高扁舟之泛江湖或謂鴟夷之仙去皆爾鄉閭之舊豈其苗裔之餘無忝前良以全晩節范成大贈五官敕舊弼遺榮方遂垂車之志需章上奏忍聞易簀之言天不憗遺人其殄瘁具官某身登二府仕歴三朝詞章議論之高無慚古昔東西南北之表咸著威名曾輔政之幾何乃居閒之寖乆九齡之風度可想晉公之神明不衰石湖忽墮乎文星壽櫟遽成夫陳迹云何不淑而至于斯念三呉人士之無多嘆一代風流之幾盡躐五階而進秩按二品以疏恩噫三仕三已而賦歸豈復計生前之事一官一集之傳遠尚得垂身後之名其或有知當自無憾軍器少監黃由將作監敕具官某朕有元子愛之固深而敎之惟恐不至一時賓僚極儒雅之選爾以倫魁之彦乆儀羣玉之府侃侃正色抗論不回自少匠而為長蓋亦寵矣技巧精能非以此望汝也横經朱邸使吾兒有直諒多聞之益是惟休哉開府儀同三司判隆興府趙雄少保致仕敕舊弼偃藩方倚上流之重需章請老遽求故里之歸逝矣莫留惻然興感具官某謀謨宏遠識度恢洪洞往古治忽之原識當今輕重之體臨機輒斷慕如晦彌縫之功遇事敢為有黃裳經濟之略頃辭朝會洊著民庸起之西蜀之陬付以南昌之郡仰父俯子寖銷愁嘆之心襟江帶湖雅稱詩書之帥以疾來諗乞身甚堅雖深軫予衷亦重違雅志其陟三孤之貴以華萬里之行噫圖任舊人謂尚堪于大政注想元老惜不究于長才諒服渙恩式全嘉遯趙雄贈少師敕垂車自適難留故相之歸屬纊有言尚篤大臣之誼殄瘁之嘆遠邇所均具官某以庸濟之才際明良之㑹坐廟堂而獨任光輔至尊之朝解印組以言旋猶髙勇退之節迨予嗣服嘗賴矢謨初為武侯渡瀘之行實重周公分陜之寄洊更帥閫最得士心不圖柱石之衰遂掛衣冠而去勉親醫藥猶藉典刑遽淪九京奄隔千古爰陟公師之亞仍加世賞之延噫死生旦晝之常固達人之所諒君臣始終之分豈卹典之可稽慨想冥途尚歆異渥湖北提刑張垓江西提刑知池州王謙湖北提刑敕具官某等祖宗哀矜庶獄分道置使前古未有也朕承丕緒尤遴于擇人爾垓名臣之子尚有家法爾謙儒林之彦尤長吏才大江之西人以終訟為能重湖之北民有敚攘之擾各務澄按恤民之可矜懲吏之無良使遠方之人自以為不冤朕將有以褒表之朝議大夫煥章閣待制馬大同磨勘轉官敕一麾出守實吾從橐之臣三載陟明優爾吏銓之制具官某器資精敏心計疏通比從惟月之班徑上甘泉之列民曹治賦更嘉獻納之忠京口分符備著蕃宣之效年勞寖及治典可稽俾序進于文階以増光于侯度往其祗命益務告猶吏部郎中錢象祖樞密院檢詳敕具官某天下之兵本于宥庭設屬掄才實視宰掾非夫詳練敏明之士不在兹選爾起于重珪疊組之家而以書生自處蚤更事任若老于州縣者出入郎省殆二十年敏而不疎審而無滯賛吾樞臣爾其選也益勉所長以俟登用太府丞曾三聘秘書郎敕具官某道山蓬萊圖籍鉅萬士夫仰望眞有颷車羽輪之隔遊其中者皆天下選也以爾力學自奮持論不阿憂國之心如飢如渴擢自外府徑登淸貫益讀未見書以昌遠業且使四部秩然有序是為稱職哉大理寺主簿王寜新知信陽軍劉崇之並太府寺丞敕具官某等寺監皆有丞而外府設官獨詳焉蓋欲上裨版曹之調度下柅有司之出納不可以非其人也以爾寜文詞蔚然明習吏道勾稽棘寺平反為多爰俾序遷以酬勞勩爾崇之聲稱籍甚蚤登著庭出守邊方占對尤敏使還朝蹟以慰公言所貴于儒者為其能通世務其以所學見之事功勉哉宗正少卿鄭汝諧右文殿修撰知池州敕具官某爾以科級自奮以才諝見稱持節分符俱有聲績登之卿列進攝禁途迨命為眞乃有異論朕方遴論思之選屢欲留行爾乃陳去就之義力求引退卑以右文論譔之職往撫池陽凋瘵之餘式遄其行慰彼黎庶忠翊郎屠思正監轄製造御前軍器所實及五年轉一官敕具官某除戎器以戒不虞國之務也爾職其事遂閱五年何愛一官以奬勞勩壽聖皇太后慶八十詔書文武陞朝官等加封祖父母父母定詞臺諫卿監郎官以上封祖父并父敕具官某父某朕日侍慈皇推尊祖后母儀備三朝之盛壽簡増八袠之崇奉徽稱于日至之長講慶禮于元正之始爰本親親之道用推老老之恩以爾積善有餘潛光不試粤有賢子孫子祖父云揚于王庭臺卿少云列在臺官云列屬憲曹都司云宰掾是司月卿郞宫云列在名聿觀縟典之行可後高年之渥爰陞命秩以示寵光益務教忠用圖顯報臺諫卿監郞官以上封祖母并母敕具官某母某氏至用推老老之恩同前制朕日侍慈皇以爾婦道素全壼彛甚飭粵有賢子賢孫祖母云揚于王庭臺卿少云列在臺官云列屬憲曹都司云宰掾是司月卿郎官云列在名聿觀縟典之行可後高年之渥爰加沐邑以示寵光國夫人晉封大國郡夫人爰封名郡職事官內外陞朝官京局京官選人在外京官選人封祖父母父母敇具官某父某朕以祖后壽登八袠恭侍慈皇奉上萬年之觴爰推老老之恩以廣親親之道以爾潛光不試積善有餘甚飭婦道有聞祖母并母云壼彜子仕朝行身逢慶霈云孫祖父云子仕中都在外京官選人云子在仕途仕朝行朝官云子通朝籍京局京官選人爰加異渥以惠高年知樞密院事趙汝愚初除封贈曾祖太子少保士慮太子太保敕我有宗臣進長樞筦雖循牆而避寵終出綍以疏榮貴震一時恩及三世具官某分暉帝胄履善家庭九族序遷曾不登于膴仕百年隱行乃有見于後人惟爾曾孫旣登右府亞于宫保已賁幽原爰加再命之崇遂列三師之重前無舊比歿有餘光曾祖母高平郡夫人龔氏文安郡夫人敕位尊任重必有家傳積厚流光亦由閫政恩旣加于曽廟封宜進于小君具封某以柔淑之資嬪信厚之族雖中饋之職無顯于外而内則之懿能肥其家逮三葉而益昌位元樞而鼎貴載加名郡以表芳猷祖太子少傅不求太子太傅敕紫樞元臣方隆于同姓靑宮亞傅嘗寵于大家位旣愈崇恩亦宜稱具官某奕奕帝王之胄恂恂儒素之風教子以經至孫而貴鳴珂佩玉雖不見于生前疊組重圭乃追榮于身後進登一品以慰九京祖母咸寧郡夫人晁氏濟陽郡夫人敕世胄高華本由濟北之族慶源流衍實自召南之風具封某躬蘋蘩之勤遵圖史之訓功容俱備典則不渝教子有方能甘啜菽之養撫孫甚愛眞有含飴之歡兹領樞庭以翊興運頃嘗頒夫沐邑俾載益于郡封爰分廣濟之名式慰謹終之意父太子少師善應太子太師敕眷我維城固多將相侯王之貴惟爾有子遂為股肱心膂之臣可無寵光載篤餘慶具官某家法有自天資尤高及見太平猶記開元之際結交前輩尚聞正始之音躬曾閔之孝欽慕間平之儒雅爰謹家庭之訓遂傳宥府之賢乃進宫師以彰陽報其祗明命益啓後昆母安化郡夫人李氏饒陽郡夫人敕愛君憂國繄我本兵之良嫓德娠賢可後榮親之渥具封某稟資柔懿植操幽閒以澤底之名家歸天潢之支派以澤底李與岡頭盧土門崔竝稱可證其不誤案澤底一本疑底字誤因缺之攷唐李肇國史補中閨甚肅不辭舉案之勤令子著名端自繼機之訓云何不淑其後遂興洊啓博陵之封以示冥途之寵妻鄱陽郡夫人徐氏通義郡夫人敕大臣許國有光麟趾之宗夫人起家無媿鵲巢之隱惜悼亡之已乆宜追遠以加榮具封某生自儒門嬪于皇族身能全于婦道生弗永乎天年迨夫子之登庸嗟室人之冥漠視其爵秩賁以恩光易番水之舊封卑眉山之新渥尙惟靈爽式克欽承攻媿集卷三十八
