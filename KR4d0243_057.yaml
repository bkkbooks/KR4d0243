body:
  text: 宋樓鑰撰記雪竇山錦鏡記雪竇山名天下自下而升既至絶頂而地始平曠四山又環之寺據正中氣象雄秀二水不知所從來出山之兩腋而㑹于前徑赴大壑峭石削立險不可測崩空落崖飛雪千丈洞心駭自勝絶一方此山之所以得名也繇古以來登覽之士不知其幾眩于創見何暇擬議紹興甲子郡太守尚書莫公將來游乃始發妙意于萬象之表謂水去太亟屬寺僧以田為池使二流匯其中寬納而緩出之則寺當少利有詩云能廢千畦渟玉雪不妨飛練掛丹梯讀者韙之而四十餘年十易主人咸睥睨以為難淳熙十一年足庵鑒公禪師既至百廢修舉取莫公之說斟酌之八月己未遂興畚鍤池深一尋縱四百三十尺廣半之築隄南西以便往來因橋為閘視水漲落而閉縱焉明年二月庚子池成漪漣拍隄渟濙如拭千巖倒景空明相映道俗欣嘆見未曽有禽魚下上咸有喜色師問名于雪窗張武子良臣武子曰是所謂淵林錦鏡者也遂以錦鏡名而謂余記之余不能習隂陽家言然通天下一氣耳山如人之定形水如人之脉絡或瀦或泄當適其中池之未作也水若建瓴山之氣與之俱逝而不留及其既積則淑靈之氣得以扶輿磅礴于茲矣繼自今其必有卓然超徹之士深藏若虛出于此山以振祖風者豈惟利而已哉曩嘗一再游焉間久不雨水僅相續蕭索輪囷固自不惡惟積雨暴漲則尤為壯偉可觀顧安得每每如許及今過之既坐亭上徐徹三版水則大至怒濤迅雷凌駕震疊素霓萬數哮吼層出真天下之奇觀也始惟見寒莎野卉紛駭相應少焉覺兩涯石壁亦為之低昻不已此非親至其上深矉而駐觀者不足以知此莫公止謂不妨飛雪之勝不知此池之成關機闔開乃大有功于瀑泉也足庵傳洞下心宗精鍊刻苦等慈接物法施不吝所向傾動緇白數主廢剎皆立興之壯年嘗出力于此以辦衆緣晚座道場年踰八十適丁歉歲艱食之餘他人支傾補壞猶懼不濟乃于談笑間成此勝事用錢百萬外不以謁諸人內不以費諸帑傾囊倒篋一力為之信有大過人者是役也僧德宣實相其事妙有智思規畫多出其手又得信士單承亮割膏腴以補田之廢此池益可以久矣故併書之以告來者云望春山蓬萊觀記老與佛之學行于世尚矣未知孰為輕重然以吾鄉一境計之僧籍至八千人而道流不能以百其居才十數而佛廬至不可數何耶蓋嘗聞之歐陽公矣大略以為佛能箝人情而鼓以禍福人之趨者衆而熾老氏獨好言清淨靈仙之術其事冥深不可質究故凡佛氏之動搖興作為力甚易而道家非遭人主之好尚不能獨興且曰其間能自力而不廢者豈不賢于其徒者哉明之四山去郡皆三十餘里西有湖千頃一山穹然秀出此為最近者名曰望春舊有靈波廟以祠白龍政宣間有陳孜者始崇以殿辟道院于東俾道士馮立權奉香火祖父少師典鄉邦因湖之淤請于朝而田之歲得穀亡慮四十萬斛父老以為德生立祠其中又得道士何思遠居之于是觀宇益興廊廡略備思遠澄心鍊氣得黃老之真風驅役鬼物靈迹有不可掩者嘗之京師有運船數百千艘欲絶淮而潮不登為作法于其堧未幾潮溢歡聲如雷悉賴以濟發運使以聞􅎁差明州管內副道正盜發清溪旁郡山谷間多響應者祖父大飭守備郡以無恐思逺亦有隂助石記存焉紹興癸卯太守莫公將命拜章禱雨而驗奏移象山蓬萊觀廢額手書扁榜以寵異之其後主者竭力以增益前功今知觀吳若訥繼胡志清之後里之巨室厲氏兄弟相與出力興造又得咱氏創岱嶽行祠于山麓遂為一方勝處由歐陽公之言觀之諸君可謂能自力而賢于其徒者矣鑰自念生晚不逮事祖父嘗拜祠下冠佩儼然幼年及識何君猶記其道貌能歷歷道祖父時事使人起敬吳嗣法于何為孫行厪行乃祖之法以大其居是為能負荷者故與之游一日來請曰觀之興才六十餘年懼無以傳逺久願記之應曰傳之久不久正不在記而況此骩骳之文乎世之棟宇有傾民力為之欲為無窮之計而驟起亟廢幾不能以一瞬山巔水涯結茅纍甓或遂化為殊庭自前古以至今日者非一也子以為今之琳宫蘂館據名山洞府之勝霞冠星䙱搖曳其間者皆固然耶其創始之初亦若是而已又未必能如子之居之壯也其寖致雄盛者雖曰有數亦存乎人爾揆之世法又何止棟宇也哉今蓬萊之興或作于前或繼于後以隮登兹歸語子之徒儻能念其囏勤而增葺之則真可以無窮矣吳曰正欲記此以示來者遂為之書天童山千佛閣記淳熙五年孝宗皇帝親灑宸翰大書太白名山以賜天童山景德禪寺寺之門甚雄敬刻雲章尊閣其上又于方丈專建一閣以藏真跡實為禪林盛事前所未有也初西晉永康中沙門義興卓庵此山有童子來給薪水後既有衆遂辭去曰吾太白一辰上帝以師篤于道行遣侍左右因忽不見自是始有太白天童之名山在郡東南六十里所太白一峯高壓千嶺雄尊深秀為一郡之望紹興初宏智禪師正覺欲撤其寺而新之謀于衆有蜀僧以隂陽家言自獻曰此寺所以未大顯者山川宏大而棟宇未稱師能為層樓傑閣以發越淑靈之氣則此山之名且將振耀干時矣覺深然之乃拓舊址謀興作內外鼎新以次就成智匠高妙務極崇侈門為高閣延袤兩廡鑄千佛列其上前為二大池中立七塔交映澄徹游是山者初入萬松關則青松夾道凡三十里雲棟雪脊層見林表而倒影池中未入窺樓閣已非人間世矣中建盧舍那閣尤為壯麗住山三十年其為久逺之計皆絶人逺甚後有慈航了朴一坐亦二十年起超諸有閣于盧舍那閣之前復道聨屬至今巋然相望又大築海塗增益歲入由是天童不特為四明甲剎東南數千里亦皆推為第一游宦者必至至則忘歸歸而詫于人聲聞四方江湖衲子以不至為歉皇子魏惠憲王出鎮一見慈航歡若平生暇日來游顧瞻山林登玲瓏坐宿鷺或纍日不忍去因圖以進于上㑹稽郡王太師史文惠公又從容奏請遂有四大字之賜瑰奇絶特之觀無以加矣十六年虛庵懷敞自天台萬年來主是剎百廢具舉追跡二老而千佛之閣歲久寖圮且將弗支猶以前人規模為未足以稱上賜欲從而振起更出舊閣及前二閣之上僉以為難師之志不回也先是日本國僧千光法師榮西者奮發願心欲往西域求教外别傳之宗若有告以天台萬年為可依者航海而來以師為歸及遷天童西亦隨至居歲餘聞師有攺作之意請曰思報攝受之恩糜軀所不憚況下此者乎吾忝國主近屬它日歸國當致良材以為助師曰唯未幾遂歸越二年果致百圍之木凡若干挾大舶泛鯨波而至焉千夫咸集浮江蔽河輦致山中師笑曰吾事濟矣于是鳩工度材雲委山積列楹四十多日本所致餘則取于境內之山始建于紹熙四年季秋之甲申才三載告畢費緡錢二萬有奇是歲海莊倍稔贏穀三千斛如有相之者不求于人見者樂施以迄于成凡為閣七間高為三層橫十有四丈其高十有二丈深八十四尺衆楹俱三十有五尺外開三門上為藻井井而上十有四尺為虎座大木交貫堅緻壯密牢不可拔上層又高七丈舉千佛居之位置面勢無不曲當外檐三內檐四檐牙高啄直如引繩旅楹有間翬飛跂翼周延四阿繚以欄楯內為綺疏表裏明豁自下仰望如見崑閬梵唄磬鐘半空振響徜徉登覽四山下瞰河漢星斗如在欄檻御書金榜巍乎中峙翊以翔龍護以絳綃高出雲霄之上真足以彈壓山川傳示千古善財童子大裝嚴藏入見樓閣廣博無量則不可知若經行四方室屋巨麗殆未見其比也鑰奉祠東歸嘗往遊焉驚歎傑特目眩神駭過于耳聞敞請記其事老矣學落不能形容姑記大槩以表吾鄉之勝海內好奇之士欲游而未遂者覽此則太白之景思過半矣虛庵道價素高禪子向方島夷亦聞其名而歸之加以願力深重才刃恢恢巧匠瑰材成此勝事觀者無不羡歎或請飾之敞曰殫力竭財幸躋登兹行且謝去若丹雘華飾尚有賴于後之人云安巖華嚴院記汪尚書代仲舅吾鄉僧剎最衆奉川一邑凡七十有二雪竇古道場為冠其次則安巖山也林壑幽邃非餘山比出縣治三十里創于唐之大歷而廢于㑹昌五季漢之乾祐僧清聳義仙入山求卓庵之地登高四望投以一石誓曰石所住處吾其止焉既得之曰此五龍之地居此者當利見大人皇朝乾德錢氏猶在吳越聞聳之名命住杭之靈隱寺號了悟禪師乃以此庵為四明道場爾後寖為徒弟廢壞天聖中有老禪伯其名上曰居下與泰陵廟諱同字久住天童山邑有汪居士湜自號和靜先生以其好佛里人稱為汪長老率信士十人力挽師為此來既至尤與居士契合遂相與營度形勢遷立寺基相去二百步有蔣宗盛施錢十萬鑿山平址汪君鳩合衆力建寺宇百餘楹殿堂宏敞中嚴像設康定元年括囊山人志全為之記大率稱其地之勝東接奉川西連台嶠南臨滄海北倚四明言其興造之速則曰霜暑不再金碧相輝師又自作十方遺戒謂永為十方宗師說法道場語論深切蓋凜然可畏人也手植松六千本自葛隩至門約十餘里亦有松門記三碑皆居士所立稱為檀越主則施財出力為多矣慶歷三年賜華嚴禪院之額外建玉澗流峽望春濯塵四橋中有釣臺緑蘿望海亭皆為佳境距今百六十餘載間有興作支傾補壞視舊不能有所增益今住持僧無盡俗姓汪氏實居士五世孫也出或庵體公㑹下三住名藍來主華嚴十年矣念居士經始之勤益務興起族弟智德捨俗為僧與之勠力有蓬道奧山綿亘三千畝岡壟險絶莽為盜區僻在此山之西德之已業也至是捨入山中别立一庵以謹護守林巒映發又一勝處于北名馬跡開廢田八頃又以衣盂增置三十畝以贍塔庵盡公既已重建僧堂鐘樓等比舊加壯創為舂磑機輪激水為無窮之利又將增廣大殿香積地之廢興固自有時居士植福深厚厥後族處雙溪為大家其興未艾豈苟然哉余家久與之通譜視之猶南阮也族子伋與宗黨求記于余余笑曰嘗觀白樂天沃洲禪院記謂晉宋以來白道猷始居此山中間寖荒大和有頭陀僧白寂然卜築遂為禪院寂然謂樂天為從叔乞為之記樂天系以詞云道猷肇開寂然嗣興今日樂天又垂文茲山異乎哉沃洲與白氏其世有緣乎今安巖大剎居士建立于前無盡嗣興于後又委余以記余有從子清一方禮盡公為師其于汪氏又不止如沃洲之與白氏也因慨然為書之徑山興聖萬夀禪寺記徑山天下奇處也田雙徑而上至高絶之地五峯巉然中本龍湫化為寶所國一禪師開山于天寶之初特為偉異天作地藏待斯人而後發道成名震召歸長安代宗為之執弟子禮將相不得預大丈夫事繼之以無上又繼之以法濟坐鎮羣魔刃斫禪牀而色不動識錢武肅王于微時故吳越纍世崇奉尤謹皇朝至道中太宗皇帝賜以御書并佛骨舍利元祐五年內翰蘇公知杭州革為十方祖印悟公為第一代住持紹興七年大慧禪師來主法席衲子雲集至千七百衆末年南歸重來跲而復振人境相與映發道俗趨仰龍神亦隨指麾而定顯仁皇后在慈寧宫高宗皇帝在德夀宫時皆嘗游幸就書龍游閣扁榜孝宗皇帝書興聖萬夀禪寺又賜以圓覺經解天下叢林拱稱第一大慧以來名德繼起神龍靈響素著國家民庶有禱輒應纍封神應德濟顯祐廣澤王廟為靈澤且有玉圭玉帶黃金瓶罏祭器之賜其盛極矣然而廢興有數不可豫知國一之後以㑹昌沙汰而廢咸通間無上興之又後八十餘年慶賞始以感夢起廢為屋三百楹翦去樗櫟手植杉檜不知其幾今之參天合抱之木皆是也䝉菴禪師元聰以慶元三年自福之雪峯被旨而來道譽隆洽不愧前人五年仲冬行化浙西而回祿挻災烈風佐之延燔棟宇一昔而盡異哉人皆以為四百年積纍之業一旦掃地有能興之非磨以嵗月未易就也先是寺基局于五峯之間又規模不出一手雖為屋甚夥高下奢儉各隨其時因陋就簡亦復有之衆為之請曰大慧無恙時豈不能撤而更之顧其勢未可兹焉火起龍堂瞬息埃滅豈龍神欲一新之乎況祖師之像出于烈焰而不毁開山之菴四面焦灼而茅不傷師與國一俱姓朱氏或疑以為後身比移醬壇涌泉成井今日安知非暫廢而當復大興耶聰曰有是哉微我誰當為之乃出衣盂為之倡率學徒元韶可逹等所在緣化兩宫加以錫賚施者聞風日集動以萬計又命南悟等廣募閩浙江東西良工伐木于山日役千輩斤斧之聲震動山谷凡食于山者無問比丘優婆塞相與勸勉智者獻謀壯者出力夙夜經營不翅己私開拓舊址首于東偏為龍王殿以嚴香火之奉繼為香積㕑以給伊蒲之饌延湖海大衆則有雲堂供水陸大齊則列西廡此皆一日不可緩寺之所以立也寶殿中峙號普光明長廊樓觀外接三門門臨雙徑架五鳳樓九間奉安五百應真翼以行道閣列諸天五十三善知識仍造千僧閣以補山之闕處前聳百尺之樓以安洪鐘下為觀音殿而以其東西序庋毗盧大藏經函鑿山之東北以廣庫堂輦其土石置後山巨壑中開毗那方丈于法堂之上復層其屋以尊閣思陵宸翰御榻修復妙喜塔亭仍建䝉菴于明月池上為香水海以沐浴為天慧堂以選僧禪房客館內外周備像設雄尊金碧璀璨法器什物所宜有者纖悉必具不可勝書蓋其百工競起衆志孚應經始于六年之春成于嘉泰改元之夏閲月才十餘而變瓦礫之區為大寶坊始者蕩廢于一彈指頃若甚慘矣及其興之神速則高掩前古而又雄壯傑特絶過于舊按圖而作井井有條雲棟雪脊翬飛層疊迥出于烟霏空翠之表春秋二㑹來者益衆奔輳瞻仰如見化城驚瞿踴躍稱未曽有徑山干是乎大振矣余嘗登含暉之亭如踏半空左眺雲海視日初出前望都城自西湖浙江以至越山歷歷如指諸掌真絶景也為别峯寶印賦詩有百萬檆松雙徑杳三千樓閣五峯寒之句印為之撫掌且曰山中之景幾無餘藴矣是時新創大閣丹雘未施上下一色如凝霜雪涉二十年猶屬夢境今則土木之盛何止十倍恨未能一寓目也聰忽以書相尋于寂寞之濱屬以記文遣僧契日攜書來見備道始末辭之曰年侵學落筆力隨衰子之師願力宏深成如許大佛事不求于重望雄文之士而為此來何其舛耶求之再三拙菴又助之請遂櫽括其語為之大書且告之曰大慧千僧閣之成一時稱為盛舉善乎李資政之記以謂在杲公何足道而循習齷齪者以為奇特不亦陋甚矣哉聰之為此初豈有意于興作者因鬱攸之奇變偶人情之響答上資國力廣集喜捨時節因緣有相之道以隮登兹是固不可不記以傳逺然于師何有哉矧國一之初本無可傳之法其後瞻禮之衆傾于億兆財施之廣形于千萬視之如幻等之于空居惟一室室惟一牀布褐陶匏浣衣糲食其視寵榮震耀何如也聰方以此道行而余欲以言語贊歎有為功德多言益足為贅是故言盡于此師其以為然乎江州普照院記余少侍先光祿自洪都舟行順流而東過彭蠡望廬山開翠屏于空外小泊南康迫于行役不及一至山中歷指五老香爐諸峯悵望而行猶意此生可游也老矣遇人自山中來必問泉石之勝或惠以圖與記讀之若身到其處也住育王瑞公九江人嘗以問之最能言受業普照院之詳蓋院去湓城之東才十五里為邦人游樂之地昔曇珣律師講經宴坐感白鹿之祥至今有白鹿臺臺下即此剎晉義熙中逺公與十八賢結蓮社于兹山而于山巔水涯建立法幢甚衆此蓋其一也雖非深入廬阜而面勢殊勝前橫大江江中桑落洲正與之對亦為一古剎中更兵火蕩為榛墟紹興初僧崇信始誅茅結屋而徒弟普誠與嗣子師瑞師紹師義師卿相與募緣興建已而正殿廊廡法堂寢室輪藏三門鐘樓佛閣庖湢等處無一不備瑞公自以土木但為有為功德出而游方以一大事為己任首住舒之興化移浮山未幾被命來育王時佛照光禪師自徑山乞歸來居東堂瑞其高弟也既嗣法席父子更唱迭和相為引重衲子雲集因念受業香火之傳猶有未滿人意者罄衣資度智日智月等十僧使相其事為經久之計增田以待雲水高人是剎之立幾七百餘載既廢而復大興豈無數耶瑞公清介孤高而未嘗為矯厲之行道俗歸重故能一坐大道場至于九年略無魔惱已而退居西塔又復纍嵗一日語余曰出本無心住亦隨緣拙菴既已示寂吾將歸老于前山山間素無碑志願為之記將歸而刻之噫余既無由杖屨相從以酬素願縱到山中勝具亦已無有矣師之歸度無再見之日廬山面目終不能復識既為書其始未又重為之憮然也魏塘大聖塔記僧伽本西域人唐龍朔中始來中國于泗州臨淮縣信美坊乞地建標欲為伽藍掘得古香積寺石記并金像一軀上有普照王佛字或言師頂有一穴窒之以絮夜去絮則香滿一室質明香還復窒之萬回異人謂觀音化身也示寂于長安以有靈應遷還泗上為之建塔傳于世久矣鑰先祖少師年四十為守家傳其顯應事甚衆陳子充大光了齊之孫二卿之子與余家有連比任太府寺簿余方為郎相與尤厚余既投閒而子充亦掛衣冠矣忽以書來云先侍郎自紹興十二年南蘭陵解郡組延平既無先廬無所于歸始謀禾興之居僑寓魏塘大聖院六年始得今竹橋之宅院以大聖名中有瑞像靈異幾不勝書蓋自治平紹聖時屢發妙光其明屬天圖志實載之至今水旱災疫必求于此祖父諫議嘗因從兄默堂繪像而為之贊所謂一月在天影分萬水者也方寓居時祖妣尚無恙洎吾二親闔門敬奉皆所親見久思有以崇事之老僧清梵戒行堅潔一夕夢僧伽欲建塔于寺中既以實告適符願心自淳熙六年竭力為之經理歲捐百斛以為助今將二紀土木之工悉已就緒其高七層塔心相輪以次而舉指日可畢願為我記之余方病足僵臥一榻酸呻無聊未能屬筆隔嵗而相促不已余昔誦韓文公詩僧伽後出淮泗上勢到衆佛尤魁奇且有突兀三百尺之語東坡之詩云不嫌俗士汚丹梯一看雲山繞淮甸乾道間以假吏過泗但有火燒水轉掃地空之嘆而已盤溝小像之在吳門人猶敬之不謂殊特之觀乃見于此子充疏財好施既以輕視軒冕不問家之有無獨于此舉惟力是視倡率衆施成此勝事三請之勤見于羅雀之門與世異好如許余亦不得而辭也仰山太平興國禪寺記仰山天下之勝地也雖未曽一至其處讀韓昌黎之文而知山之有神閲傳燈而知小釋迦之開山二神蕭姓釋迦之來實有靈響遜山為寺又能隂相默佑招致檀施以至于今迦之道愈高山之神益靈山之名日以著環袁之境旁及四鄰之外水旱疾疫必禱而奉香火者尤衆其詳又見于孚惠二王集録寺興于唐㑹昌之元至皇朝太宗皇帝賜以太平興國禪寺之額仍賜御書棟宇之盛甲于江右自迦至今凡三十有七代矣嘉定元年閏四月三日不戒于火延燔殿堂樓閣三百餘楹盡為煨燼茲豈有數耶太守寺正余公謂一郡倚此山為命當有以興起之亟捐金錢三百萬首建法堂及二王之殿户部尚書趙公為建僧堂三門且為之主盟知隆興府待制趙公前後施錢亦三百萬作佛殿住山清公率其徒持鉢四逺聞者樂施不數月佛殿丈室香積廊廡盡還舊觀而煥然一新則大過之嗚呼又何其神速也余侯以丞相之弟平易近民既已成民而又能致力于神尚書斂澤民之惠袖活國之手歸而燕居助成大事連帥又出俸餘為之倡率清以一衲度寒暑頃在淨慈孝宗知其名召對而賜之頌至今土木形骸不攺故時四人者相與敬孚惠之靈神興釋迦之名剎一廢一興殆不偶然清屬豫為記記其大概云爾神有二祠去寺逺者一舍近者才五里而寺亦祠之釋迦諱慧寂初來自郴余侯名應誠尚書名善堅待制名希懌清自號簡菴余四明樓鑰也攻愧集卷五十七
