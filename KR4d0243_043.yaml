  text: 攻愧集卷四十三
  hash: sha256:676f85652802cc0f905ac8756af5b3031fe62ed1a9b42560a19c013d9f6562ca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_043-1a}
body:
  text: 宋樓鑰撰內制新除户部侍郎袁說友辭免不允詔版曹天下之劇任也而卿為之之時尤難向來國家多故事緒浩穰經費之外又增不時之須屬嵗大祲調度不給卿儒學俊茂舊歷清華通敏有餘獨任大計內之無闕供之急外之無誅求之怨滿嵗有奇勞亦甚矣為真已晚又何辭焉新除少師永寧郡王郭師禹辭免不允詔阜陵之役重事也朕不得躬執紼之勞祖遣有行號慕弗已卿以王之元舅國之信臣辨護宣勤為朕任送終之責往來順濟上下無譁禮備安虞歸祔太室卿得以報孝宗之恩朕可忘所以賜卿者哉進長孤棘仍加王爵既渙告廷之命何煩避寵之詞亟其欽承朕言不再伯圭辭免兼中書令不允詔中書造命之地令公師長百僚清貴華重古人謂之鳳凰池者也國朝之制率以寵異親賢然祥符天禧以還久不除此官矣惟公明德懿親貴重無二三公兩鎮何以加此爰舉曠典以賁宗正既無兼管內樞之煩復得老成典刑之重渙汗大號毋庸固辭執謙雖勤禮難曲徇太府卿吳珽辭免換授正任觀察使在京宫觀不允詔卿生長戚閈儒雅自將佳公子也名曹繕監踐敡有年總餉殊方寖升卿列賢勞既久寵以賜環亷車內祠用循故事非以為褒美也春秋方富而才可用豈遂投閒哉毋事牢辭其祗朕意新除觀察使謝淵辭免不允詔卿以祖后至親往為使介風埃萬里不憚馳驅成禮而還褒升可後廉車之峻遂登從班毋庸空辭思所以稱此則善矣知紹興府葉翥辭免除龍圖閣學士不允詔孝宗因山之役凜然懼不克奉大事文昌老成尹兹東郊遂委己以聽焉神明不衰心計有餘酬酢萬變調度百出卒之禮成而無缺典用足而節橫費朕心嘉之絶江不風入山而雪謂非卿之力耶進職龍圖姑以示寵朕之所以待卿者非止此也而又何辭焉知樞密院事余端禮辭免攝太傅持節導孝宗靈駕及奠諡冊諡寶監掩欑宫轉一官不允詔比者營圖東越襄奉阜陵卿以本兵之崇親臨復土之重往來俱順上下無譁塗潦方深蹇蹇盡王臣之節顔色尤戚欒欒有棘人之風朕方篤孝思幸周大事既賴送終之助首加進律之褒是所宜然無可辭者郭師禹辭免備禮冊命宜允詔卿以祇奉阜陵顯頒制綍升孤卿之峻秩封異姓之真王冊命之儀朝廷當備控辭甚力引義尤髙雖俯徇于謙沖顧豈忘于嘉歎趙汝愚辭免不允詔卿輔朕初政備宣忠力兹奉孝宗大事厥功茂焉褒崇之典所宜優異正以卿素執謙沖避逺權勢凡有進擢辭遜過禮或至迫而後受故尤思所以處卿者初拜右揆已授此官還以畀卿是不為過毋復牢辭朕必不為反汗也宜州觀察使孫璫辭免孝宗隨龍特轉一官不允詔列祖上賔孝思日切仰戚靈之如在率禮不違念攀附之幾人獨汝無怠爰自亷車之秩特升留務之班其服異恩寧容反汗參知政事京鏜辭免孝宗祔廟畢特轉一官不允詔朕尊奉皇祖無所不致其厚而送終之禮祔廟尤嚴卿以輔臣相此盛儀已事而竣可後褒賞進以一秩誠不為過賞有先後既已均及卿可獨辭乎皇伯祖伯圭辭免贊拜不名加食邑實封不允詔天下有達尊三爵一德一齒一而未及言親也惟公德明爵齒俱尊而又孝宗同氣之親太上皇之伯父而朕之大父行也貴窮人爵思所以尊異之非舉曠典不足以稱紫微令公既以謙辭而不受朕其可遂已乎不名之禮蓋自尚父保衡以來實朝廷之殊禮前朝嘗以寵待親賢百有餘年無有可當此者舉以命卿人無異辭尚形遜避朕不敢從邦之榮懷亦非朕敢私也知樞密院事余端禮辭免兼參知政事不允詔朕圖回治功方倚二三大臣以為重卿頃自參預進長樞廷宰席偶虛俾兼政地兹惟故典亦今之宜非卿通才何以任此亟其承命無事謙辭新除觀文殿大學士知福州趙汝愚辭免不允詔卿以肺腑之戚為社稷之臣翊戴眇躬輔相初政力足以任天下之重識足以斷衆志之疑倚毗方隆引去何速雖有議者亦無異詞遂釋台符往分帥閫極祕殿之殊寵實纍朝之舊章事君以忠卿既全出處之致退人以禮朕當篤始終之恩尚冀告猶毋庸辭命余端禮辭免權提舉編修玉牒監修國史日歷不允詔朕惟國家以史事為重典領之任必命大臣寶牒之設蓋古者書之于策之遺意日歷則以事繫日後之信史實基于此卿問學通博攝行相事非卿其誰宜司之成命已行毋容多遜參知政事京鏜辭免權提舉實録院編修國朝㑹要不允詔髙皇帝中興之烈當遂特書纍朝庶政之規尤宜分類故實録則取史遷之舊而㑹要亦用唐室之餘爰命大臣職此二者卿素推該洽俾視纂修其躬率諸儒以趣成大典兹為故事何必謙辭寶文閣學士知遂寧府宇文價乞奉祠不允詔卿以文昌舊德往鎮蜀藩居外數年所在稱治方此政成于大府正資卧護于逺民忽騰諗疾之章欲遂奉祠之請眷倚之重神明未衰其訖外庸毋違朕志提舉臨安府洞霄宫趙汝愚辭免觀文殿大學士不允詔大臣進退之宜固知有義人主始終之遇尤當示恩矧惟宗工祈解機政念忠勞之素著曽倚注之未衰歘然賦歸若此勇決閩山舊鎮既避寵之甚堅書殿隆名豈升華之可已諒還寓里暫佚真祠其體眷懷毋為多遜少保周必大再乞致仕依已降指揮不允詔七十致仕雖著于禮經二三大臣難拘于古制矧惟元老嘗冠中台周旋兩朝負荷重事既于蕃于南國終退處于東山神明未衰德望彌劭奉真祠之香火自樂隱居挂神武之衣冠胡為早計抗章再至陳義愈髙顧難徇夫沖懷尚少安于素履寶文閣學士知太平州李巘乞宫觀不允詔卿老于文學久處禁林出守當塗日徯報政胡為諗疾欲遂求閒朕方念典刑之舊望屏翰之良卿豈不能體此眷懷為斯民而少留乎余端禮辭免右丞相不允詔朕承付託之重思紹祖宗之大業志勤道逺悠哉未艾置相之際其何敢輕寧槐位之暫虛必疇咨而後授卿純明篤厚秉德不回入從出藩望實兼著本兵二政三載于兹論事有諍臣之風謀國得宰相之體具瞻攸屬顯拜不疑惟今亦多故矣朕欲賴卿以濟書所謂若濟巨川用汝作舟楫卿其以此自任副朕倚毗萬斛之載惟卿為宜而又何辭焉新除知樞密院事京鏜辭免不允詔朕惟聖人不畏多難而畏無難于今雖曰邊鄙不聳而宥密之司正當為不虞之備無競維人朕于是注意焉卿以慷慨宏逺之資有志事功立節于殊鄰宣威于全蜀纂紹之始一見而決擢二樞管風采凜然預政未幾復為之長迹若序進實繇德選當仁無遜其又何辭新除參知政事鄭僑辭免不允詔朕以寡昧嗣無疆大歷服惟二三大臣是賴凡今日德望在人為國家用皆兩朝選擢留以遺朕者也卿周旋從班雅有公輔之器登之樞管人以為晚顧豈以日月為功乎參預政途僉言為允宜遂佐朕宏濟多艱引避抗章非朕所望新除端明殿學士簽書樞密院事謝深甫辭免不允詔卿始以縣大夫奏事孝宗一見以為有唐人風親擢再三如恐不及上皇用卿于諫省試卿于天府而登之從班肆朕纂承輟秣陵之行而置風憲之長進讀金華引以自近用卿之意久矣寵加書殿升二幾廷卿豈未知朕意耶何避寵之力也亟其祇命毋用費辭新除權兵部尚書張叔椿辭免不允詔卿出入朝列敡歷最深凡今要途多出卿後文昌入座乃爾世官端粹亮直之資視名父以無愧臺綱諌省久矣賢勞進長夏官朕命惟允往其率職何事謙辭權兵部尚書張叔椿辭免兼侍讀不允詔惟卿先正以經術侍孝宗于潛藩逮居文昌實兼露門卿立朝不阿雅有父風聽履之初仍命進讀此搢紳美談也何辭之有右丞相余端禮辭免權提舉編修玉牒實録院編修國朝㑹要不允詔史冊之成欲傳于萬世國家所重莫盛于三書大事則續為鏤玉之編中興則未就汗青之簡況舉綱而撮要欲踵事以增華宜有宗工併修巨典卿嘗兼二者未浹四旬既進秉夫鈞衡俾盡専于筆削宅百揆而熙帝載惟爾之休總衆職而稱上心非卿孰可參知政事鄭僑辭免權監修國史日歷不允詔朕惟史事至重功用浩博惟以事繫日謹而書之則後之信史于此乎取分命諸儒而領以大臣國家之令典也卿以儒英出入冊府有年矣兹參大政命總宏摹良史之才加以學識公議所屬尚何辭焉户部侍郎袁說友辭免兼侍講不允詔卿性資闓敏儒術該通雖當主計之繁每切愛君之念方御圖云始首闢經帷而建議獨先能發朕意前所陳請旋已施行近因獻納之餘復上課程之奏深嘉忠藎俾與講明惟讜論之是求何需章之為遜亟就邇英之列以禆典學之勤新除吏部侍郎林大中辭免不允詔卿天資鯁挺論事不回比以久居臺端慈皇蓋嘗命以小宰之職矣去為劇郡召歸近班既殫批勑之勤庸畀典銓之任踐敡惟舊選用匪輕清吾文部以助官人之能不亦休哉避寵丐閒非朕所望新除吏部侍郎兼太子左庶子婁機辭免不允詔天官二卿之司有資銓綜春宫中護之職尤遴選掄卿性稟深淳才猷挺特以天下士從吾兒遊頃尋里社之閒久樂祠庭之適兹方更化首遂建儲思得老成之人以重元良之輔亟頒召節重上從班毋庸固辭式副虛佇新除開府儀同三司充萬夀觀使楊次山辭免不允詔朕維新庶政豫建儲闈屬時戚閈之賢久安均逸進視鼎司之貴豈曰示私卿素迪忠勤居懷靜退謹容儀而就列允為耆艾之英養威重以闔門尤服滿盈之戒逮兹播告曽靡異辭覽巽牘之亟陳顧謙懷之難徇其祇成命毋咈豫衷新除權兵部尚書兼侍讀倪思辭免不允詔朕惟姦臣竊權上下䝉蔽導諛獻佞習以成風卿至朕前獨效忠讜誼氣足以激頽俗英詞足以發壯懷鳳鳴朝陽何足以喻逮兹更化可後趣歸來對便朝言議益偉武部之長露門之讀姑引卿以自近耳往其承命毋執牢辭新除禮部侍郎兼侍講章良能辭免不允詔卿夙富青箱之學來居紫槖之班兼直北門典司東觀朕惟親軍旅之務非以待詞翰之臣儀曹既俾為真經幃仍資勸講爰總夷䕫之任實親禇馬之賢僉謂汝諧卿毋多遜右武大夫文州刺史知閣門事楊谷辭免除觀察使不允詔爵惟馭貴當昭示于至公恩以及親遂優加于彛典卿起由戚畹列在朝紳入儀賔閣之司歸服家庭之訓克存孝謹不見驕盈爰稽閲歲之勞超進觀風之秩需章來上幾不自勝渙汗既頒固難曲徇其益堅夫素履庶長保于令猷右武郎知閣門事楊石辭免除觀察使不允詔名器至嚴豈容于輕授恩榮加厚遂越于常規卿育秀后家通班朝路素有義方之訓密參賔贊之司居存忠勤深避權勢爰考踐敡之舊躐升亷問之華成命既行固難反汗遜辭來諗尤見益恭其體至懷以永終譽兵部尚書倪思辭免兼修國史兼實録院修撰不允詔國之大典尤貴于擇人史之良才當先于求舊卿蚤嘗再入素擅三長孝宗擢之著作之庭先帝處以獻納之任皆參筆削具在簡編兹當更化之初方以得賢為喜式資班馬之體追配商周之書允謂汝諧尚何多遜禮部侍郎章良能辭免改兼修玉牒官不允詔古者大事書之于策玉牒之所由起也唐始建官而未若本朝之重寫之精縑庋之邃殿他書莫嚴焉以卿比司記注久居史館是用任以大事之重凡例昭然具有書法翦繁撮要作宋一經以詔來世方以此望卿而又何辭吏部侍郎婁機辭免兼太子詹事不允詔召還紫槖固有賴于吏銓肇建青宫尤遴求于端尹卿性姿凝逺問學老成久為資善之寮實謂甘泉之舊雍容引去恬然自如屬兹更化之初矧復建儲之重載煩哲艾以輔元良毋庸固辭服我休命攻愧集卷四十三
