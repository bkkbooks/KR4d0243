body:
  text: 宋樓鑰撰賦政事賦玉巵為夀詩注以省試光武大度同髙祖課藁案原集别有試藁一卷其目曰宣王內修卷合御試召試省試别試解試上舍試州學等試所賦宅道㶧星緯詩䇿三道注以教官試又有䇿問一並缺佚無憑録刊擬問凡十有三篇今受降如受敵賦當嚴備為韻以受降之際亦上將甚武神機獨潛雖在受降之際亦如待敵之嚴納夫授首之人敢矜已勝類彼臨戎之日以備無厭夫惟兵收決勝之功將有防微之智謂冦之窮也雖已見于屈服而心之險也猶未知其誠偽彼既降矣曾無自滿之心如受敵然必謹非常之備于時大敞堅壁旁標碧幢無醜類脅從之衆納渠魁肉袒之降如將受夫大敵懼見欺于小邦方陳釋縛之儀深虞變詐若處交綏之地敢恃敦厖莫不肅我軍容嚴豫兵衛雖殘冦之臣附猶兩軍之交際非惟伸大將之威蓋恐墮敵人之計受其璧焚其櫬豫防一旦之危稱爾戈比爾千隂養六師之鋭議者曰彼之降也既挺身而至矣我之受也當開心而待之何必招攜之日乃同禦侮之時蓋念犬戎之難信深恐狼心之或欺與其有變以無備孰若居安而慮危豈不見行儉審兹果能平夫突厥耿公明此遂終定乎車師彼有坑既降者固出詐謀使自縛者尤非善畫曷若我外弛金鼓內嚴矛戟深防禍起于所忽亦慮敵乘夫吾隙彼如犯順以欲為我則稱兵而將亦伐崇因壘既施文考之威就塞築城兼取武皇之䇿因知力角于鋒鏑者敵尚能禦變生于肘腋者患何可當今也勍敵雖聞其讋服禍心猶恐其包藏惟吾之為備也既自嚴密則彼雖好亂也烏能陸梁且異夫魏子會秦卒受欺于商鞅唐臣盟狄果見劫于平涼噫屈膝而服也人固畏威噬臍何及也吾當慮後毋弛禁以自忽必整軍而後受方今將軍納降衆而獻俘于廟焉不廢嚴兵之守擊楫誓清中原賦清中原為韻以渡江擊楫誓國讎未雪壯夫請行擊長楫以前渡誓中原之復清共涉巨川爰叩舟人之枻備言素志願恢天子之京時其典午中衰永嘉南渡憤晉元攘敵之未暇有祖逖奮身而不顧揚䑥以往方乘天塹之流擊楫而言誓復皇都之故爾乃緩引蘭棹旁瞻碧幢一鳴而英氣先奮再鼓而羣心已降志必復于故土誓有如夫大江吐我赤心忽形言于剡木指夫白水期淨掃于中邦謂夫戰塵久滿京師突騎交馳洛汭期狼煙之必掃顧鯨波而作誓方橫橈徐撫獨決䇿以前征儻諸夏未平尚何顔而復濟豈不以國始草創人思茍存江山有異也或作楚囚之泣綱維不舉也至形北客之言故我浮巨艦以勇奮視強敵而氣吞倡義有先于溫嶠定從不假夫平原遂將電掃風驅盡復神州之大肯使龍蟠虎踞久留法駕之尊果能扶神器之阽危拯遺黎之沈溺長淮以北也復見夫冠帶大河以南也悉除夫荆棘不渝江上之盟坐制目中之敵澄清抗志車同范氏之登慷慨論功柱鄙漢臣之擊向使無妖宿以示異緩若思之代終則必蠢爾醜類墮吾計中盡郊圻而申畫舉幕庭而一空振起江南益大中興之烈掃清冀朔遂成再造之功惜乎大厦未成而忽撓棟梁中流欲濟而遂亡維楫不聞壯志之成就徒有餘威之震疊方今矯矯虎臣皆欲濟河而焚舟下視祖生之事業簞食壺漿迎王師賦漿以迎為韻以王師所至食民意胥附王師出征持簞壺而咸至實食漿而相迎飲食雖微用表歡欣之志遐邇均集喜觀仁義之兵蓋憫赤子之無依奮神戈而大舉惟兵之所至也既已不擾則人之樂從也其誰敢拒櫜弓箙矢往平敵國之民簞食壺漿來勞王師之所觀夫老幼紛至饔飱共持我之至也救民于水火彼之迓也恐吾之渴飢凡爾一時之衆悉迎六月之師饋餉鼎來皆望風而逺附干戈所指曰後我以奚為兹蓋兵收不戰之功人有再生之喜竭蹶而趨也欣塗炭之時脫襁負而來也知父母之孔邇顧慕義以皆然非弔民而何以以萬乘而伐萬乘罔敢抗衡其小人以迎小人咸來造壘大抵窮兵以殘民者孰肯徯后行師以救亂者衆斯向方今也軍罔秋毫之犯人無血刃之傷是宜至者獻酌來皆裹糧夏衆咸來功可同于商后燕民不悅事有異于齊王向非東征西怨也民望來蘇邇悅逺歸也衆無攜二又安得輟仰事俯育之物見心悅誠服之意自坐見于功成曾不煩于家至如是則三軍益飽何煩挽粟之勤千里遐征不假望梅之智非不知給餉不絶也何必饋食釃酒以犒也奚煩挹漿然念禮雖薄而心則甚至食雖菲而情烏可忘茍匪同心之奉曷云厚意之將亦何異咸篚元黃人盡歸于周室爭持牛酒民皆勞于髙皇彼有築道而饋軍者用力亦多投醪而飲衆者為功非易豈知多助之舉自有爭先之饋方今中原之民皆開門而迎王師又豈止于壺漿簞食光武乘時龍而御天賦御天也為韻以時乘六龍以炎德繼統漢光得時惟乘龍而特起以御天而有為獨收興復之功系隆丕祚蓋際飛騰之會統制方維迹其奮宛邑而戰昆陽誅青犢而降銅馬念再造丕圗也雖本自于神聖而獨逢興運也故能安乎區夏軍摧九虎成止戈之武焉時乘六龍顯御天之造也觀其業務紹復符能握乾將登四七而上應于列宿載當二百而適際于中天體純剛而有作蒞至尊而獨專受命而興協彼真人之應逢辰則奮攬夫帝位之權用能驤首而飛也非在田而在淵馭世而起也遂得位而得祿威羣盜之鼠竄掃中原之鹿逐尊既正于九五祚遂興于百六爰究位天之載允協羲經詳推鬬野之符又同赤伏大抵聖不世出也世必治而斯起龍不時見也時純陽而後升今我恢雄圖之赳赳濟大業以兢兢既當陽而有造宜取象于時乘小利見之神堯第伸潛躍仰同符之髙帝果致隆興因以兆應金刀祥飛白水赤光之照也已新于育聖之際佳氣之鬱也又見于舉兵之始由天意之久屬宜帝尊之獨履蓋有致而斯能茍不然而何以遂令耿氏攀鱗翼以願從肯使聖公假風雲而能起故得息盜集之奮蝟破野戰之羣龍回飇既止于九縣彗雲寧見于髙鋒靈貺自甄類五馬渡江之化功臣皆厚笑四蛇入宇之從噫感如諸將也有鱗集之歸驤如吳公也擅風行之譽抑知天德之位亦賴人謀之助吾皇復受天命而逺跨于漢光乘時龍而在御修身以為弓賦必中矣為韻以修身為弓發學貴務本志當適中惟修身而由道遂取喻以為弓正以不他曲盡飭躬之術張而弗弛自成中的之功士有該百行以研窮端一心而折衷謂存于吾者茍不知審則發于外者何以示衆今也見聖師而由聖當明四重以四輕猶弓人之為弓要在百發而百中觀夫學問尚志操修及時忠信以進德也我則務敏驕奢所自邪也吾寧詭隨故此誠身之道類夫弦木之為慮以動動惟時罔蹈黨偏之失奠而發發必中宜先審固之持兹蓋有不言也言則中倫有弗行也行皆審是施于逺大則何止百步時乎遊息則為之一弛茍出乎而發乎信髙矣而美矣勉夫百行折中矩而周中規志在四方義為的而思為矢彼有忠信為甲胄者第取防間之固以言行為樞機者深明榮辱之因我是以鑒彼省括謹夫檢身動切戒于失鵠發何勞于扣輪亦猶率乃攸行書取若虞之度反而求已軻言如射之仁因知身之修也有立功立德之方弓之作也有尚角尚筋之術然器不藏者曷成功于射隼材不良者難求竒于貫蝨理既無邪中斯可必肯同詭遇一朝獲禽以為良尚小儀成終日射侯而不出噫主于皮者徒聞遊藝之巧佩以弦者但知矯性之柔曷如志正以體直自然誠立以身修殆將觀德于矍相奚假矜能于養由如是則有志于弧禮何拘于戴記其直如矢道兼得于成周誠以枉尺直尋也固所不為志睂中目也亦何敢忽取友必端則道豈反害與人無爭則行何有闕又當兢兢業業以修吾之身肯廢前功于一發尊賢則士願立朝賦立於朝為韻以尊賢則士願士固自重君宜罔驕惟克尊于賢德斯願立于王朝上懷樂道之誠必加優禮下起充庭之望不待旁招凡稱命世之才俱有事君之願然而世或崇儒則與朋類以偕進時乎慢士則雖佚遺而不怨惟明主有尊賢之意每務撝謙則羣髦興入仕之思誰甘肥遁時也晉晝接下鼎烹養賢德行道藝則必預旌表忠信孝友則皆蒙薦延此既加于體貌彼寧甘于棄捐神聖謙沖每優崇于儒術英豪歆慕咸樂效于官聯自是來榮軒冕之華去恥山林之人望旒纊者拭目以期見候旌車者比肩而佇立謂邦有道兮于時可見故心欲仕兮如是其急聖人在上既聞有禮之三君子于行願厠亂臣之十大抵士雖貴于求仕位尤慙于茍居視君好惡以決已進退觀道興廢以卜身卷舒惟尊德樂義而見或嗟晚則離蔬釋蹻而來惟恐徐莫不有道賤焉而恥也豈若吾身幡然而改於立或無方必負割烹之鼎待如不次自投衒鬻之書是何君専行爵之權士守立身之則儻恃祿位者因明月而按劒則安義命者必冥鴻而避戈是故好仁文后有海濱二老之歸慢罵髙皇致商嶺四人之匿譬如鳥巢不覆則鳳集阿閣駿骨必市則驥來西極今也世遇右文之盛朝惟有德之尊語而前席者非鬼神之論見而賜璧者非捭闔之言又孰不思棄商築來趨舜門盡令雍水之西同為振鷺肯顧鍾山之北猶念驚猿王者以是改容就不召之臣式閭禮非常之士俾乘駒以去者賁然而至卧廬以隱者幡然而起是之謂王公尊賢士乎士乎可以出而仕矣濟河焚舟賦在立功為韻以濟河焚舟志戰欲必勝歸寧豫謀既濟河而赴敵遂決䇿以焚舟涉彼大川肯思還于故國火其巨艦誓死報于強讎昔秦穆違蹇叔以襲人越晉邦而趨利二陵之敗也既自咎于覆將三年之戰也又貽譏于拜賜全師再出俱懷奔北之羞雪恥不忘常起向東之志孟明乃慷慨發憤歡呼即戎謂將之屢敗也固難以語勇而君之専任也當先于效忠昔也喪師曾愧萬全之䇿今焉賈勇願收一戰之功由是提虎旅以徂征絶鯨波而永逝念解驂之遺辱遂舍舟而自誓兵茍勝也仇則可報功不就也我寧復濟顧吾壯志已為死戰之期慮彼士心猶作生還之計莫若揚一炬以獨決聚萬舟而畢焚烈焰奔電長煙走雲俾歸者以絶望庶往焉而立勳回視歸途渺洪濤之千頃示無還志激壯氣于三軍故得我師奮臂以長驅鄰國斂兵而自戢縱橫馳河內之地談笑取王官之邑指茅津而反濟封殽尸而灑泣挫夫強晉既聞國恥之湔威彼西戎尤喜霸功之立茲蓋舍生而往也非徒誓于擊楫好謀而成也非不悔于馮河百敗而勇氣不讋一戰而戰功愈多歸志與灰而共滅盛烈如山而不磨誓必破于秦師類湛船之項籍悲不還于易水小叩築之荆軻噫秦將之忠也既懷報國之心秦伯之任也不數覆軍之罪茍因一眚而遂棄徒使終身而自悔又焉得千載之下仰焚舟之風凛然如在本強則精神折衝賦神折衝為韻以本強則以精本既強固人斯服從得英雋以制勝致精神之折衝俊士朋來益鞏尊崇之勢威風逺暨坐摧奔突之鋒竊原君得士則昌國以賢為本茍并謀兼智也能以德而為固則懷姦伺隙者自聞聲而逺遁蓋朝廷為諸夏之本能制勝于九重故精神折千里之衝自宣威于四逺觀其多士同德一人勵精肅爾幄中之妙算凛然堂上之竒兵勢既聞于克鞏勝自全于不爭朝有德而益尊人皆奠枕敵望風而引去孰敢爭衡兹蓋威稜之振也足以聳動于華夷譽望之隆也足以永為夫儀則人咸想于風采我何勞于聲色宜其上兵伐謀大邦畏力晏子不出于尊俎兵自罷于鄰疆齊威必勝于朝廷會果來于敵國大抵千里制難者以重任于賢士匹夫敢爭者以輕量于大臣今也俊乂垂紳而搢笏臣主聚精而會神惟用儒而無敵宜不戰而屈人止須裴度之神明以威悍將不假魯連之談笑坐鄙強秦譬如猛虎在則藜藿不採于山神龍居則網罟不親于水今也紀綱法度有以鞏固威靈氣焰不可嚮邇國家按堵以無事鄰敵從風而自靡顧厭難于無形非得人而曷以賢五千之騎隨何徒詫于片言止百萬之師處厚亦稱于一士噫子玉不去則為晉之患季梁猶在則挫楚之強矧多士之濟濟佐中國之堂堂赫然臨之則夫誰與敵望而畏之則彼烏敢當豈不見汲黯居朝寢淮南之異議仲尼相禮歸魯國之侵疆彼有威卻胸奴者未免于窮征口伐可汗者猶勞于面折未若此動容貌而鄙暴斯逺宣靈武而姦邪盡絶方今優遊于巖廊之上而精神折衝九有自聞于有截嵗星所在國有福賦其有福為韻以嵗星所居宜國既得嵗祥斯應期占是星之所在有其福以誠宜仰以驗之木精適居常次致當臨之邦域咸被純禧原天下之妖祥係嵗星之贏縮且運于上者象不虛示則居其下者應為甚速爰占景曜適當所次之躔俯驗吾邦誕受非常之福觀其瑞色明潤重華陸離應以仁也既存生育之理王于春也又司長養之時既循度而至止則錫羡以宜其右行于天居一辰而不忒下臨其地備百順以無虧是宜君明臣直而世格昌期時和年豐而人欣樂嵗師之興也戰則必克政之舉也事無不濟由龍宿之所居故鴻禧之可繼越人遇此終摧吳國之強晉室得之果挫苻堅之鋭大抵事將兆于休咎星乃為之疾徐超而前者或棄次而旅次行而失者或當居而不居事各有證象誠非虛惟嵗之在也無東西之去則福之來也有山阜之如可以伐人請驗馬遷之史所之得地願稽班固之書彼有國之昌也由太白之當期國之厚也以填星之居久况此應王者而紀于號令主嵗事而為之統首茍非次舍之當居安得休祥之備有豈不見淫在元枵之次徒致鄭飢既居析木之津遂興陳後因知嵗之行也雖本于天度嵗之居也實昭于德馨今也太史奏瑞清霄炳靈生治國之百樂開寶運之千齡如是則賢士已登不必驗少微之象刑章幾措何煩占貫索之星王者以是考星次之攸居知天心之所與斂時福而民罔不錫討有罪而人莫能禦方今天相中興而嵗星臨之孰敢犯王師之所高祖好謀能聽賦謀能聽為韻以天性明達好髙祖獨奮漢圗以成蓋有好謀之德又兼能聽之明顧夙負于英姿乘時以起尤樂聞于羣議擇善而行迹其提三尺以初興念四方之未定謂不咨于衆則孰判利害不擇其言則曷分賢佞從吾心之所好謀之其臧屈羣䇿之兼收又能審聽觀其逐鹿崛起斷蛇勃興善欲納則如恐不及䇿可用則何為不能惟大公至正之是取豈小智淺私之自矜功為最髙雖獨稱于赫赫計將安出每嘉納以兢兢莫不説辭或悅于監門謀主或資于亡命食而吐哺也恐彼敗事言而逆耳也知其利行設施皆合于衆智明逹蓋由于天性顧將軍何以教深圗東嚮之功非夫子無所聞爰下南浮之令非不知雌雄之勢可決于一戰甲兵之利可服于諸侯蓋念至仁伐不仁也何必恃勇多算勝少算也敢忘用謀我是以疑切戒于築室從有如于順流為真王為假王悟陳平躡足之語趣刻印趣銷印用張良借箸之籌帝之性也非不聰明帝之度也非無豁逹然而助桀為虐者欲居秦室之富養虎遺患者幾遂鴻溝之割謀茍匪于能用亂何由而可撥所以關東欲棄問不憚于據鞍戍卒能言見豈嫌于衣褐難者曰趙王之立也不顧叔孫之爭胸奴之伐也反囚婁氏之賢謀不詢于多士智難合于敷天殊不知過雖聞于有此改必見于幡然遂令信彼四人爰割體膚之愛封之萬户深懲械繫之愆至兹騎項雖倨也諫而必從溺冠雖慢也賢非不好吾不愛于兼聽人亦為之樂告故能舉秦如鴻毛而取楚若拾遺翦一時之強暴子使漆雕開仕賦人使之為韻以開未從仕聖夫子善誘漆雕受知念從仕之未也爰因言而使之顧至聖以何心惟均教育視吾徒之可用俾效施為蒙嘗尚友及門潛心諸子仕焉非茍于利祿學也所期于官使眷兹尼父當日則何以哉謂彼漆雕可以出而仕矣觀夫心本愛日志思澤民惟可行之道不試于事以有用之學私淑諸人及門之士也皆欲效職升堂之子也誰忘進身惟此魯人頗能參于聖學雖當周季俾往厠于王臣開也倐爾有聞欿然自視謂吾之學也固欲見于行事而學之優也乃可施于從仕茍吾信之未能何已長之足恃斯言既發殆門弟之未聞此意孰知惟聖師之獨喜議者謂士之仕也固所素願師之言也宜無不從然念道之將行則急于一命才或未充則難求萬鍾雖尚遲于奮迅聊自適以從容所以進則未能垂嘉言于穎逹喜其志道激髙論于司農噫有帝王之學者使之為邦在言語之科者使之辭命茍非此子之善學安得發言于將聖今也師以為可而猶切于退託道既未成則尚資于涵泳志有同于曾點姑樂舞雩藝或及于冉求始當從政彼有求價而沽者賜亦陋矣干祿而學者師何過哉豈若此心不求于爵祿迹寧滯于蒿萊厯考闕里賢惟子開固異夫何必讀書子路飾有民之説使之學邑尹何非製錦之才誠以志則在于恬愈心不謀于富貴才已成而已則猶歉師之可而吾猶曰未使斯人也出而仕焉功利之及民也尚何有既天下可傳檄而定賦檄而定為韻以今天下可傳世仰英主威行普天既望風而應也竹之勢也一作乘破可傳檄而定焉王旅既興將大蘇于逺邇軍書所至當自砥于安全夫惟信已結于人心助遂多于天下彼陷于塗炭也無不徯我則聞吾號令也孰能禦者赫然一怒皆延頸以望焉于以四方可傳檄而定也時其士勇咸鼓民思已深萬里起簞壺之念中原徯車馬之音茍用十行之札足安四姓之心寰宇雖遙已欣聞乎大號尺書所至自平難于當今是宜敘百世之仁恩收三軍之勇果書至河西則驚萬里之明見節入北軍則舉一呼而袒左何在我之能然蓋斯時而固可極彼不毛之地咸已順從馳吾插羽之書自然安妥大抵強人之服者必假征誅之及從民之望者止煩命令之宣今也久矣願王師之至歡然聞軍檄之傳自然姦雄畏力而屈膝老稚聞風而息肩所以光武陶儀函紙首安于平廣淮隂遣使尺書亦足以降燕或曰民已見于歸心國何煩于馳檄殊不知近者已附而逺或未至弱者欲來而強猶作敵故我形惻怛之言也慰雲霓之望振威猛之詞也若雷霆之擊俾爾懷德而畏威俾爾敉功而砥績掉舌而賢五千騎豈勞辨士之隨憑軾而下七十城何用狂生之酈向非戴商之民家則相慶思漢之人心焉悅隨則何以當率土之紛擾也可空言而聳動之興可冀也亂斯已而固異夫通彼夜郎止諭意于蜀道守夫鴨緑卒遺誚于髙麗皇乎哉鉛槧之儒也既務于討論帷幄之臣也又加于審訂俾萬姓以咸悅聳百蠻而退聽方今檄書風馳而人望中興不假一戎衣而大定仁孝二致同源賦致同源為韻以仁孝之道二仁孝至重性情所根用若出于二致理蓋同于一源究此兩端皆良知之固有初無異體以大本之中存嘗聞才非曰于爾殊人或多于自異語其大體則似有異用本之一貫則了無餘事惟兹仁孝在人皆可以廣充究厥本源是理曾何于二致觀夫惻隱素稟愛欽自持行之閨門則致終身之慕散之民物則由一念之推莫匪斯心之舉初非二道之為皆是物也孰能外之總百行以率先悉由所性雖兩兼之難備安有他岐豈不以親其親而因不失親老吾老以及人之老篤近舉逺雖則有别舉斯加彼率由內抱信此理之不殊推是心而足保顧施物事親之際雖曰殊途如鉤深探賾而言孰云異道大抵孝之化也先以博愛仁之實也本于事親茍志于仁則豈好犯上有一非孝則適能害仁雖運用或疑于前後而本原不離于真淳當戒波流之蕩曾何派别之因本立道生載考魯論之訓功多事寡備形延篤之論是源也會精粗于一致之中合內外于同歸之地使兼愛者知厚親之道而敬親者備仁民之意重輕非復于銖兩先後豈殊于源委尊而安義道同曾子之三愛則無差本異夷之之二厥後道不明而去本益逺性好偏而所施不同剔股孝也而深溺鄠人之過摩頂仁也而或淪墨子之風是皆得于此失于彼我則觸而長廣而充純若顔回可並有虞之體德如閔子豈殊管仲之功以是知天下之得蓋以其仁聖人之德無加于孝見于日用雖有殊品求之吾心初無異教信夫仁孝之道雖二致而本同源又何必分其大較孟荀以道鳴賦道而鳴為韻以二子皆以其周孔既逺孟荀挺生以斯而道自任在當時而善鳴仰兹名世之賢同宗一聖抱此覺民之術茂著英聲當六國之下衰有二賢之可考以亞聖之才而無所施用以宗王之學而終于窮老其遇于世何如也既不逢辰不得其平則鳴焉獨能以道觀夫名重楚國學傳子思優入聖人之域卓稱王者之師恐斯文之喪也振吾道以鳴其顧二儒仁義之言一根于正用六藝詩書之教大警于時兹蓋二百餘章兮皆立教之文三十二篇兮悉綴文之美闡其前而振其後著乎心而入乎耳蔑千載未光之病豈沒世無聞之恥時將駕説鼓木舌于諸儒經本吐辭和金聲于夫子誠以軻之辨也非出于得已況之説也不貴于難持奈何承道傳之弊也歎德衰之已而如草木無聲而風或撓矣如金石無聲而人或擊之茍非一鳴之善曷能萬世之知久而愈盈固異震雷之喻大而且逺允同木鐸之為寧不由别王霸之尊卑明禮義之統紀一時衛道也信同聲之相應後世聞風也有德音之不已顧響應以能然非言揚而何以假于韶樂鄙弗能之后夔鏘若鈞天小為文之韓氏故能倡正道以相和詆異端而力排南蠻之鵙兮豈巧舌之能騁天下之梟兮豈好音之孔懷俾衆議之不惑由大聲之孔皆且異夫卿雲最其善焉文徒稱于壯麗魏晉未嘗純也辭只見于淫哇噫大醇小疵也雖或不同立言指事也未嘗有二羣儒敢飾于邪説處士不容于橫議然則先王之道至今在人耳者無他由孟荀之不墜攻愧集卷八十
