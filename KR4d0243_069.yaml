body:
  text: 宋樓鑰撰題跋恭題直學士院所賜御筆留正少師判建康府趙汝愚右丞相臣紹熙五年待罪西掖兼直學士院際遇主上龍飛之初書詔填委時翰林學士李巘去國新除中書舍人陳傅良未至臣以非才當內外制斤斤幸無闕事一時册后封拜加恩等皆次第而舉八月二十七日忽蒙宣召不知為何事入院而御筆至亦不聞知既啓御封留正除少師觀文殿大學士判建康府汝愚除右丞相故事命相必設金鑾殿詞臣面受聖語是時主上猶御重華宫仍鎖南內翰苑故以御筆賜臣二者皆有訓辭而汝愚者尤詳遂具載于二制中退不敢以語人讀者往往不知所自也又九月二十三日伯圭加兩鎮節度使十月八日以季秋淫雨罪已降詔慶元元年正月八日汝愚除特進依舊右丞相十三日師夔除開府儀同三司四月四日余端禮除右丞相臣千載幸遇猥以蕪陋之詞視草摛文堂録本例留院中臣得珍藏宸翰以為家寶未遑勒之堅珉謹齊祓裝褫以傳子孫仍識嵗月大概于右嗣秀王伯圭免奉朝請并聖節批答紹熙五年皇上踐阼之初臣叨掌內外制時從臣方同班一奏事然後以次獨對臣猶未及進也七月二十九日嗣秀王伯圭以衰老乞免奉朝請內批降詔不允懷不自已輒進狂瞽之言仍有貼黃云聖意若允其請不必行出伯圭劄子徑論大臣降一指揮尤為盡善仰蒙聖慈徹去貼黃御筆批依八月十日羣臣上表請以十月十九日誕聖之日為天佑節內批宜允臣又亟奏少俟三表即再得內批降批答不允尋三請而後從之臣謹寶藏二奏中宸翰御寶于家使世世子孫仰見聖主從善如流不以人廢言之盛抑以記微臣際遇之榮仍録所撰詔書及三批答于前以著事實後以契丹僞號中有天佑二字始改瑞慶節云恭題知貢舉所賜御札皇帝御極十有五年嵗在戊辰禮部試進士五千餘人二月甲辰以御札付臣等臣亟率同知貢舉臣思臣幼學臣時暨參詳㸃檢試卷官以下三十三人班列于庭望闕重拜退而啓緘伏讀莫不驚喜感歎以為前此雖間有之未有如今日之盛舉也仰惟皇帝陛下以濬哲之資承付託之重清心寡欲崇儒典學不懈益䖍乃者權臣開邊塗炭生靈陛下憂形于色外鋤叛將內誅元惡處之晏然而天下復定所謂淵默而雷聲神動而天隨者也方且厲精而躬覽臨政而更化廪廪嚮治安矣先是三錫宸翰于貢闈其二皆以不及臨軒故戒主司以審取舍今嵗親䇿造士而又豫戒臣等至于再三蓋自比年以來姦幸弄權公道幾泯舉場寬縱以私害公士類嗟惋不勝其敝又慮人之議已也専為蒙蔽杜絶人言仰賴陛下聖心感悟首下求言之令繼頒溫詔博采芻蕘真社稷之福今聖訓有曰去取之間趨嚮所繫使精加考閲擇文體醇正議論精確者又曰或因問獻言實有可用雖涉訐直勿以為諱陛下隆寬盡下髙視千古屬意人才興起治功煌煌帝謨五三六經載籍之傳敢諌之鼓誹謗之木何以尚此猗歟休兹臣等既以宣示寮屬更相勸厲又以聖意發䇿俾士子盡言無隱矣伏念臣等受國厚恩平日所願推賢遜能圖報萬分矧以孤學誤蒙委以文衡回念場屋之舊固不敢輕于抑揚恪遵告戒謹拔其尤異者置在前列然士子局于文體雖有竒才恐不得騁又臣等智識荒淺深恐上不足以副陛下求賢之切下不足以得人物之真驚惕祗懼夙宵靡遑敢以奎畫登諸樂石以詔四方仰惟國家設科得人最盛然山林巖穴之士必有逸才髙節非科目所能致爵祿所能誘者惟陛下推此心以往不憚孜孜而求之當有魁壘不世之才出而為陛下用野無遺賢多士濟濟臣等不佞尚庶幾見之恭題賜陳傅良宸翰臣仰惟皇帝陛下龍潛嘉邸育德進學一時宫寮皆出遴選嘗逢誕辰咸獻詩頌既而置酒髙宴初酌黃裳次酌陳傅良各授文書一通致謝再三其一曰上呈翊善其一曰上呈贊讀御名謹封因請問所以謙賜之由陛下為言二公之詩雖因為夀而作皆寓警誨之意輒依所惠親書一本復以為贈以示不忘裳與傅良跽謝而退陛下踐阼之初擢裳禮部尚書傅良中書舍人未幾裳以疾歿傅良奏請以宸翰刋之堅珉玉音賜許是時臣鑰待罪瑣闥與傅良同直北門嘗過其家傅良以跋語示臣大略曰季札觀樂歌頌而曰哀而不愁太史遷讀虞書至于君臣相敕維是幾安未嘗不流涕也成王作頌推己懲艾可不謂戰戰恐懼善始善終者哉蓋頌者不専于美盛德之形容皆有警戒之義秦斯以來此義殆絶臣為之矍然作而曰偉哉論也自時大序言以成功告于神明無有以頌為警戒者舜皋賡歌世但以為盛事非司馬遷不足以發聖賢相敕之㫖自李斯頌秦専務溢美人亦不以為過韓愈有曰不以頌而以規亦不悟頌之有規也而傅良能發之臣于傅良平日所畏至是益以歎服促使刻之傅良曰今既刋奎畫于上方不敢使人代書適有目眚當俟小愈曽未信宿而已報罷臣尋亦去國相忘于江湖者十餘年傅良下世訪遺藁于其家則不知所在矣其子臣師轍求跋其下將碑之以傳逺臣既傷傅良不及見更化之日敢直書始末上以彰陛下好賢樂善之素下以侈傅良等際遇之寵抑使後學知古人賡歌頌詩本非専于形容稱美而諷諌之切未嘗不寓于斯云恭題仁宗賜董淵宸翰臣竊考皇祐五年三月辛丑朔壬子崇政殿試禮部進士圜丘象天賦辛酉放鄭獬等五百二十人前所書十四日是為甲寅蓋廷試後二日又自言以大理丞景福殿祗應豈非為諸位官耶孟子曰國家閒暇及是時明其政刑是時神文臨御已三十餘年正月平儂智髙朝廷無事而肆筆匪頒小臣猶不忘保治之要雖止二字足以示萬世法印文左曰帝右則古筆字也見義雲章臣髙祖先臣某以是年中第為第三甲第八十人臣家衣冠實始于此感歎再三謹附書下方恭題仁宗賜懷璉御頌臣仰惟紹興初元髙皇帝南巡慨念天章所藏祖宗宸翰墜失殆盡求訪山林所得不多惟明州廣利寺住持僧淨曇悉以宸奎閣中仁宗皇帝所賜懷璉贊頌寶墨上進上大悅賜以御札謂卷軸既豐護持有道又書佛頂光明之塔以寵之孝宗皇帝賜以妙勝之殿皆巳登之樂石惟淨曇摹勒昭陵詩翰雖至今珍藏而因仍七十餘年未稱尊奉之義今住山臣僧宗印始盡摹而刻之以補名山之闕典而後纍朝雲漢昭回之美于焉大備真東南禪林第一盛事也山君海王益當來朝以謹其藏若禪頌之深妙宸藻之交輝則非小臣贊歎形容之所能盡也恭題仁宗賜張中庸恤刑敕書臣家藏賜吳紹儒恤刑敕書後止書日不知何帝時祕書丞兼權兵部郎官臣張鈞以其從曽祖中庸所藏仁宗皇帝暑月敕書一通示臣凡二百五十字紹儒者二百二十七字而同者一百七十有九字始知紹儒者亦昭陵所賜也紹儒當是郡守故有云方伸共理之良中庸為部使者故稍詳焉聞之故事每更一朝則敕字别為一體此二書雖作字不同而每行皆九字璽文大小如一末有敕字絶甚相似則是同時無疑日子不同蓋以頒降逺近為先後至今先下川廣次及諸道或恐非一嵗之書也臣仰惟藝祖開基仁覆天下好生之德洽于民心開寶二年四月詔扇暍泣辜前王能事恤刑緩獄有國通規今朱夏既臨溽暑方甚眷兹縲繫深用哀矜宜令有司限詔到日其囚人枷械囹圄户庭吏每五日一檢視灑掃蕩洗務在清潔貧無所自給者供給飲食病者給醫藥小罪即時決遣重繫無有淹滯太宗太平興國六年詔當鑠石流金之候在黃沙聚棘之中亦有灑掃供饌之文雍熙三年四月詔曰當此炎蒸之際念其縲絏之人宜伸欽恤之文庶協長嬴之候宜令諸道州府軍監縣等凡禁繫之所竝須灑掃牢獄供給漿飲械繫之具皆令潔淨疾病者為致醫療供送飲食畫時傳送無令邀難減剋無家屬者官給口糧合歸法者侯處斷之時給與酒食小罪逐旋決遣大罪窮究其情無致淹延以稱朕意蓋又加詳矣自是每嵗首夏下詔恤刑遂為定制真宗大中祥符仁宗慶歷皆有詔㫖而條約大率如開寶雍熙之詔乃知此二敕書實本朝之家法纍聖遵行尤以炎蒸為念肆我主上當盛暑時臨軒疏決分命諸道慮囚悉如故典至開禧二年復因論囚又命提㸃刑獄使者仲冬巡歷如仲夏之法每嵗必再舉行又命御史劾其不䖍者欽恤之恩又益廣矣鈞蜀人也禔身肅括持心篤厚行其所學不苟于職朝譽藹然力求外補今為潼川憲使奉訓詞之丁寧寶前朝之敕書宣揚德意于萬里之外使逺民自以不寃如在畿甸真可以仰副臨遣之意矣恭題向公起所藏仁宗宸翰臣頃見故祕書省正字陳師道跋修起居注江休復之孫端禮所藏仁宗皇帝御書善法刑政四字又言其璽文曰帝籙竊疑其不倫後見昭陵他刻正用此印臣尋考之其字曰蓋古文筆字也出義雲章始知師道誤以為籙字爾密州觀察使贈太尉向惠節公傳範蒙賜以飛白帝筆二大字七世孫新知桂陽軍臨武縣公起刻于石以示臣雲漢昭回不容繪畫敢以舊聞再拜書于下方恭題趙時穆家藏兩朝賜碑臣三造朝行四官玉牒凡聖語御筆在法當書嘗預修仁宗皇帝朝玉牒十年求所謂二者絶無而僅有有則必謹書之蓋以臨朝淵默幾欲無言雲漢之章尤不輕畀有如尹孝齊公叔充乃獨蒙忠孝之褒則其賢行真可以信後世矣三子決科神宗皇帝又寵異之益彰麟趾之慶君子之澤流衍至今五世孫剡夫與其子時穆以家藏二碑示臣端拜敬誦仰歎纍朝崇篤親賢之盛事孝齊公立身訓子之懿美一時名公或序或議雄文相照碑製古雅書札精到抑以窺見承平文物之大概竊考印章左曰帝人所易識右曰筆義雲章中古字也昭陵多用此印退傳張文懿公士遜富藏書畫友正能世其家擅書名有晉宋風度此二碑皆其竒畫世所罕見友正不仕故銜中無職守養髙故第中三數十年非孝齊公父子之賢且厚未易得其書丹也剡夫寓四明有鄉曲之譽時穆登世科為開化尉奕奕佳公子也其益寶藏以無忘先朝先世之典訓恭題神宗賜沈括御札臣仰惟神宗皇帝經略西事纎悉周密萬里風烟俱入長算時四明沈公括帥鄜延閲月才十有六承密詔至二百七十三道元祐編裕陵御集悉已上送官此祕貯所存者盡元豐五年十月蓋以永樂事而公亦歸矣臣頃在都下嘗恭覩宣諭楊公繪宸翰筆法與此卷絶類倉猝戒諭邊臣而字體莊重廟謨逺矣再拜欽歎謹識于後視張丞相魏公浚潭州舊題恰六十年矣恭題徽宗賜沈晦御詩宣和六年御試䇿問非舉子所能條對惟胥山沈公晦以軼羣之才精通象數借箸籌之一揮數千萬言炳如也祐陵喜于得人聞喜宴以御詩寵之雲章昭回具在金花箋上至今如新勢欲飛動是時以貢士人衆特添省額一百人廷試士子至八百有五人文物盛一時沈氏其世世寶之使後來者猶得以想見承平氣象胥山遭時多艱不得躋時于舜禹之前能捐軀盡瘁于干戈搶攘中而去就出處卒保名節褎然舉首可謂不負徽皇知人之哲矣恭題宇文紹節所藏徽宗御書修禊序臣嘗觀蘭亭修禊序草本流傳千載唐太宗求之尤勤自謂心慕手追一人而已唐人作字無不效之者故南唐後主謂善法書者各得右軍之一體若虞世南得其美韻而失其俊邁歐陽詢得其力而失其溫秀褚遂良得其意而失其變化薛稷得其清而失于窘拘顔真卿得其筋而失于粗魯栁公權得其骨而失于生獷徐浩得其肉而失于俗李雍得其氣而失于體格張旭得其法而失于狂獨獻之俱得之而失于驚急無藴藉態度觀此言則是終無有得其全者恭惟徽宗皇帝天縱多能游心六藝筆力超邁髙掩前古自出機杼真書禊序于青繒中雖曰出于薛稷而楷法精妙何止青出于藍而已臣世受國恩先臣大父某受不世之知俾守四明鄉郡者幾五年寵光狎至細書方國之賜聮翩而下雖遭兵燬遺刻猶有存者兹焉恭覩簽書樞密院事紹節家藏御書真蹟昭回之光照耀凡目感歎不足謹流涕再拜書于左方歸其書于宇文氏恭題徽宗賜張繼先御詩嘉定五年嵗在壬申郊祀慶成中外交賀乃季冬甲午皇帝恭謝太一宫臣扈駕陪班既已竣事知宫事髙士臣易如剛以所藏徽宗皇帝賜虛靖先生張繼先詩翰示臣且求跋其後竊惟漢天師道成于蜀而教傳于龍虎山至三十代而虛靖出仙姿絶人道術驚世人謂天師復生誠不為過祐陵親御詞翰爛然如新再拜仰瞻蕩耀凡目勒之堅珉以鎮名山已為晚矣嗚呼人知祐陵之崇道教不知仁心實本乎為民人知虛靖之仙去而蜀之青城猶有見之者此詩尤不可以無傳也恭題欽宗御畫十八學士圖唐文皇十八學士猶在秦府蓋武德四年也仰惟欽宗皇帝育德春宫以仁孝恭儉聞天下手臨舊畫而又親灑宸翰以志之誠有慕于貞觀之盛也臣嘗觀後周光祿丞杜良作文皇畫像記曰太宗已定天下而髙祖已登九五矣太宗于閭閻疾瘼干戈勤勞且盡知之于仁義之治興太平極治之功容或有未究焉耳既作文學館延四方英俊講貫紬繹薰陶耳目者莫非帝王之事彼十八登瀛人必曰為如是事而治為如是事而亂以太宗之明刻記于心肯圖衰亂乎一意于求治而已仁爐義鞴道薪德火日往月來就聖神之模其為宗廟社稷生靈者炳焉與三代無以異矣故太宗之功烈自漢髙以降莫之與敵十八人之力也此真得太宗之意嗚呼欽宗游戲翰墨而為此固為萬世法由今觀之豈不為臣子萬世之痛哉抑聞後世人君能用材者無如太宗然許敬宗乃得預議者謂如摘瓜手耳取之既多其中不容無濫此又足為世戒故併載之恭題髙宗賜胡直孺御札髙宗皇帝垂精翰墨始為黃庭堅書今戒石銘之類是也僞齊尚存故臣鄭億年輩密奏豫方使人習庭堅體恐緩急與御筆相亂遂改米芾字皆奪其真嘗覩寫詩自周南至商頌全袠上有帝筆印記天縱多能人固莫及聖度恢然其視使臣下為拙筆書者霄壤矣徐俯及洪芻兄弟皆庭堅外甥有酷似之稱俯題雙廟詩有云向使不死賊未必世能容不惟自巡逺以來未有此論蓋亦隱永樂之痛庭堅亟稱之且勉諸洪進步非此舅安得此甥也然卒致大用殆亦不喜劉蕡之助云恭題髙宗賜陳正彚御札陳瓘之在四明遣正彚往浙西過杭州遽告變蔡京既得其情必欲置之死地又欲併以此殺瓘既就逮瓘以徑言得免猶謫通州故其放還謝表云狐突教子素存不二之風曽參殺人寧免至三之惑又云海島萬里不如無子之無憂淮壖一身彌覺有生之有患徽皇聰察僅得貸正彚之死既至沙門無復歸望島上巡檢知其為名家子招致館下又有神祠甚靈嘗謁之卜以杯珓且曰若得生還求百聖珓擲之至百皆然未幾欽宗即位召歸而瓘已下世痛不及見遂得心疾上殿已不能對賜以名方猶傳于世髙宗眷遇又如此擢其子大方為郎瓘之孫大年實正由之子也為臣家壻故得聞其詳謹書之以補衆人之未及者恭題汪逵所藏髙宗宸翰紹興五年御書廷試䇿問髙宗皇帝踐阼之九載當紹興五年嵗在乙卯二月車駕始自平江還臨安八月癸亥䇿士于行在所射殿時敵兵敗退厲精求治親御翰墨咨以當世之急務一士條對剴切褎然為舉首則信之汪洋也自幼天資髙邁十行俱下筆力絶人其在布衣名已聞于當世臚傳第一年始十有八聖意寤寐英傑得之喜甚且曰惟昭陵天聖八年王拱辰魁多士年實相似賜名應辰誠為儒林盛事既負重名益進于學八年為祕書省正字尋以論和議不合權臣惡其不附己屢擯于外幾二十年而其學沛然莫禦更化之明年始入為吏部郎望臨一時自爾入從出藩四方以其出處為世輕重位雖止于內相文昌用不盡其學至今學者尊敬真有泰山北斗之望可謂不負親擢矣公之次子逵能繼世科恪守家法仕為吏部尚書太子詹事博學多識綽有父風一日謂臣鑰曰先公所試䇿問思陵御墨既傳于外得為私藏禁中裝潢亦非人間所及是殆天賜以為家寶也其為逵識之臣鑰再拜聳觀歎仰驚眩前所未覩竊惟國家三年一廷試士子固必有首選惟此舉䇿問既出奎畫下寵多士雲漢昭回照耀編簡汪公一代真儒魁天下今賢嗣又得真蹟藏弆以詔將來光明俊偉未有如此者其家法書甚富此特為希世之遇雖夏之雕戈商周鼎彛款識甚髙古者亦當在下風矣謹識于後而歸之公少名師閔故字孝伯既得賜名丞相趙鼎字之以聖錫云御書中庸篇髙宗皇帝自履大位時當艱難無他嗜好惟以翰墨自娛始為黃庭堅書改用米芾動皆逼真至紹興初専倣二王不待心慕手追之勤而得其筆意楷法益妙五年䇿士首得汪應辰九月十九日言者乞依雍熙故事賜新進士儒行篇以勵士檢有㫖仍添賜中庸送祕書省校勘正字張㟸校中庸篇髙閌校儒行篇二十二日閌入奏儒行雖間與聖人之意合而其詞夸大類戰國縱橫之學蓋漢儒雜記決非聖人格言欲望止賜中庸一篇庶幾學者得知聖學淵源而不惑于偏邪駮雜之見上可其奏御書中庸以十月四日賜之仰惟思陵書六經以幸承學之士此固餘事然中庸無慮三千五百餘字萬幾至煩而挾日之間書就終篇書生勤篤者亦安能及此尊經崇儒之意真可為萬世法時趙鼎為左僕射例得墨蹟為家藏仍摹刻分賜鼎晚謫海上而素重應辰遺言以此卷歸汪氏應辰次子逵既以御題示臣併示此卷可謂汪氏二寶矣髙宗夀考遐不作人鳶飛魚躍儒風日盛中興之業實本于此應辰上不負天子下不負所學躬行直道以終其身以及子孫君臣際遇猗歟盛哉流傳千載何止一時之榮也恭題孝宗御書心經淳熙十四年嵗在丁未孝宗皇帝元命之年也十月二十二日㑹慶聖節親灑翰墨書心經于禁中觀堂先是上天竺山再建觀堂既成住山妙圭求記于臣嘗既登之石矣嘉定二年孟夏之十日圭又來言蒙皇帝賜以孝宗所書真蹟願得跋語併刻之山中臣仰惟孝宗皇帝聖學髙明度越前古是時在位已二十有六年不倦于勤治體已定而進德不已退朝餘暇游心內典深味禪悅毗盧五千餘卷而此經獨名以心蓋千經萬論之至要也列聖在御相傳以仁忠厚積纍福祚延永蘇軾有云惟佛與佛乃識其真臣謹齊祓書于下方以詔後世恭題曹勛所藏迎請太后回鑾圖臣嘗恭讀光堯太上皇帝宸翰稱譙公歷事四朝盡瘁國事始終一節夷險不渝且言令請太后天眷至金主前宣豫孝思使彼感動俾豫母子如初恭惟太上皇帝睿性仁孝天地助順以遂長樂之歡而乃推功臣下堯言炳然亦惟譙公忘身徇主有以得此也臣自為兒時聞臨平道中太后回鑾之盛恨不身見之暨官玉牒預聞史事才得窺一二今從譙公家獲覩迎請圖丹青煥爛賦篇贍蔚然後一時慶事歷歷在目敬拜歎仰嗚呼休哉夫以譙公功成之初乞身退歸無一毫矜伐意此圖之作非欲自明其功蓋所以發揮太上皇帝聖孝之蹟過于方册逺矣是豈惟其家所當寶藏後之太史氏尚有取于斯焉攻愧集卷六十九
