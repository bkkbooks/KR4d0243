  text: 攻愧集卷七十一
  hash: sha256:53390dc176e03728cf805881fa3d4712a12a34843a893b678224d6c83ad446c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_071-1a}
body:
  text: 宋樓鑰撰題跋跋汪季路書畫王岐公立英宗詔草昭陵以英宗為皇子詔曰濮安懿王之子猶朕之子也思陵以壽皇為皇子詔曰藝祖皇帝七世孫也明白洞達曉然使天下後世知之前聖後聖其歸一揆大哉王言兹豈詞臣之力也哉魏野草堂圖冦巴東終于無地起樓臺熟魏三山居乃如許宜乎不肯以此而易彼也蘇子美詩嘗見滄浪補懷素草書至不可辨雖天才豪逸自謂信手縱筆何嘗留意然非水墨積習亦未易至此東坡祭范蜀公文唐人贊狄梁公云取日虞淵洗光咸池潛授五龍夾之以飛公稱蜀公云導日而升燦如長庚事固不侔詞意亦卓然過之東坡與歐陽叔弼兄弟帖蘇以歐而顯歐以蘇而尊薦士蔽賢後人當知所擇東坡與林子中論賑濟帖荒政無第一手蓋蓄積無素聚飢民以千萬計仰給于官活者雖多其不免者亦衆盡心力而為之尚庶幾焉爾坡翁亦自言懲熙寧流殍之禍公私皇皇曉夜措置僅免狼狽九年耕必有三年之蓄古制既不明此賈誼所以哀痛公私之積也黃太史書少遊海康詩祭酒芮公賦鶯花亭詩其中一絶云人言多技亦多窮隨意文章要底工淮海秦郎天下士一生懷抱百憂中嘗誦而悲之醉臥古藤誠可深惜宜人者宜于人竟亦不免哀哉蔡京自書竄謫元符黨人詔草裕陵裁決庶政動出親札是時京方為檢正建請差官置局類而為書因委京編次逮事徽皇遂以為相業之本違御筆者初以違制論後又以大不恭論其實皆出于京也黨籍之設臣子所憤纎悉見于此藁尚可掩乎比其再相以至三入寵任既不及舊御筆一從中出京亦不知所為商鞅立法親受其弊隕身覆宗誠自取之敗國殄民中原丘墟豈不痛哉跋喬仲常髙僧誦經圖始余從鄉僧子恂得羅漢摹本舊有跋云姚仲常善畫而不易得一貴人待之三年一日欣然索匹紙為作應真數日而成其本巳經四摹固知失真巳遠而筆意尚卓然可觀衆像之外人物鬼神山水樹石無不畢備以琉璃瓶貯藕花小龜緣茄而上童子隔瓶注視末有大蛇橫行水簾中節節間斷而意象自全皆新意也恨不得見真筆後又見摹本于蘇卿伯昌家則巳題為龍眠矣大率事不深考又不謹于闕疑見唐人畫則指為道子摩詰不知有盧楞伽輩見國朝畫則指為龍眠亦不知有喬君也今見此圖洎巖壑跋語為之醒然且知姚之為誤也是僧默誦何經而仙佛諸相縹眇自其口出鬼物俯聽于後皆有妙思又使人之意也消跋遊嗣祖所藏帖歐公與薛公期駕部帖歐公有送公期得假歸絳詩山行馬瘦春泥滑野飯天寒餳粥香最為人膾炙簡肅公絳人也公為之壻稱其清德直節家法嚴子弟多賢材公期豈其人耶山谷草聖草聖可習無如俗何以山谷之髙勝晚乃得脫此耳唐子西與遊氏帖蜀士鄭太玉與先生遊俱好世出世間法嘗曰文章習氣盍痛掃除雕琢肝腎徒勞人耳先生戲答曰吾寧盡此生筆硯間寂然之樂俟來世尚未晚也其用志如此先生嘗謂其子曰我胸中有見成論五百篇當以授汝未幾疾作遂殁紫微公以為終身之恨云跋王順伯家藏帖蘇子美錦雞詩滄浪文采絶羣正似錦雞雖欲為木雞可乎悲哉范文正公與尹師魯帖師魯自筠州輿疾至南陽託范公以死蓋平日之相與者如此韓魏公與尹師魯帖嘗讀安陽集及家傳公之慮事精審非他人所及此帖尤可見兵凶戰危安保必勝或記師魯謂公置勝敗于度外者過矣王荆公書佛語公詩有云世間好事佛説盡豈為此等語耶公之書自有來處非無意于工者林和靖與通判帖通判不知何如人承平無事時佐錢塘佳郡又得此老為州民樂哉右軍章草章草之絶久矣嘗見皇象所書急就章象時有張子並陳梁甫能書甫恨逋並恨峻象斟酌其間甚得其妙中國善書者不能及字今據三國吳志趙逹傳末注文填案舊本自張子並以下六句間空七補惟如此然後可作章草此帖信是合作正使非右軍真迹決非近世所能為者是可寶也米元章三帖篆一隸一行書一孔融遺張紘書曰前勞手筆多篆書每舉篇見字欣然獨笑如復覩其人以是知古人作書亦有以篆者寶晉行書妙絶一世此卷四十三字尤髙而不善用二短何耶跋陳聞遠所藏了翁龜山元城帖楊龜山嘗宰餘杭今贊府陳棠則了齋之曾孫也出家藏二公及元城先生手帖家問凡十二紙邑大夫江君相與刻石于縣庠名德翰墨前後照映整襟讀之凜如三君子相從于一時百世之下尚當興起矧聲迹尚未遠耶跋曾氏獨醒雜志余比官成均臨江曾無逸為僚嘗言其先君子平生示以書一卷蓋狀其行事樊少從博士為之哀辭者端明忠簡胡公遺墨二畫得艮齋誠齋諸公為之跋誠齋又序其獨醒雜志嗚呼備矣無逸又曰先子非無意于用世蚤嵗得疾遂棄舉子業專務古學能懸腕作行草追配前良嚮也視富貴若不足浼而曰浮雲居士久益髙尚又以獨醒名齋晚號歸愚所造愈深故死生禍福之至了達如此家有章伯益友直飛跂墨戲數幅初未嘗摹倣落筆輒過之一日于敗紙寫二蟲精彩勝絶未幾遂下世故并手澤藏焉余曰畫不足為居士道也以誠齋之親且厚猶不知遊藝之妙其藴蓄不見之外如此畫者多矣可勝歎哉尋得獨醒志讀之益知其為博雅篤論之君子徐節孝平日默處一室幾若與世相忘至其論天下事則衮衮不倦有不出户而知天下之稱然猶居山陽往來之衝若居士遠在江右而中原故事歷歷能言則又過之矣跋趙伯山責偽楚書段太尉奮然擊朱泚人徒知出于一時忠憤栁河東拳拳録其遺事以見非出于苟然者延康二書觀者無不興起近讀其行狀在承平時遇事一一不苟故能自立于搶攘中士大夫平日苟不務操履一旦臨大節能不奪乎跋姚編禮闢敕牒議禮之家名為聚訟彼惟不得卓然名儒而雜進異議故爾嘉祐治平間朝廷清明元老大臣欲修因革禮而于下位拔用姚蘇二人書成而人無異詞為官擇人要當如此而後可以服天下成事功矣跋謝觀妙混元實録道家者流出于老氏而支分派别去本寖疏道藏之書雜取百家士之有聞于世者多以拜章役鬼煉氣􅠉金為能此皆燕齊方士之餘去本又遠矣觀妙本儒生學道于皇甫清虛蓋知尊老子者博極書傳薈稡成編窮搜約取自號實録且言凡十六變之説事迹隱晦其餘間見紀傳不載時代者不述與夫放光見瑞示夢傳言靈驗等事非化身下降者亦不復載庶幾傳世不誣然青羊白衛之靈迹瓊臺玉局之奇祥此類尚多果皆實歟嘗誦公是先生之言曰蒼茫六合外渺莽三皇初近既未必有遠亦非必無信如斯言安知其非實也跋李武義翼行狀天寶之變擁強兵坐而觀者相環也而賈賁以一尉討賊張巡以縣令起兵朝不坐燕不與古人不免有是言忠臣義士惟知盡節不以位卑為辭也李侯官不過徼吏而獨奮一臂抗方張不制之敵矢死不屈凜然如生三復遺事為之流涕跋朱巖壑鶴賦及送閭丘使君詩承平時洛中有八俊陳簡齋詩俊巖壑詞俊富季申文俊皆一時奇才也南渡以來詩俊文俊皆為執政大臣相與力引巖壑之名始以隱逸召用于朝而骯髒不偶終以退休鶴賦之作其有感于斯耶使其羽翮一成豈不能翺翔寥廓往而不返猶思以靈藥仙經求報主人愛君之意又見于此余生晚不及見猶識蘄州史君淳誠篤實似古君子宜巖壑相與之厚也書張待制字發行實後余嘗過越與士人語靖康建炎間事歎曰李鄴以吾州降金雖苟全一時之民而貽我千載之辱余慰藉之曰彼但自隤其家聲安能汚大府耶欽宗倉卒遣使廷臣多畏避苟免中書侍郎陳公慨然請行欽宗為之泣下特免其行見大夫無可使者卒遣之其副則待制張公二人皆奮不顧身深入虎狼之區淪陷十餘年竟握節以死忠義之風凜凜如生是豈不足以刷會稽之恥哉士曰然皆吾鄉人也兹讀張公行狀因記于後跋袁起巖所藏閻立本畫蕭翼取蘭亭圖此圖世多摹本或謂韓昌黎見大顛或謂李王見木平皆非也使是二者不應僧據禪牀而客在下座正是蕭翼耳吳公傅朋云書生意氣揚揚有歸全璧之色老僧口張不嗋有遺元珠之態時避廟諱所改案元珠之元宋亦非也翼以權謀被選遠取蘭亭首奏乞二王雜帖三數通以行至越衣黃衫極寬長潦倒得山東書生之體方卑辭以求見銜袖之書乃是御府所齎野童自隨亦攜書帙此正畫其納交之時後既得蘭亭則以御史召辨才曉然告之不復作此儒酸態矣且其時此僧為之絶倒良久何止口張不嗋而巳右相不惟丹青精妙其人物意度曲折尤非後人可及也跋薑堯章所編張循王遺事栁河東以段太尉逸事上史館自言好問老校退卒能言其事考其所載者三戮郭晞之軍士撫焦令諶之農者不受朱泚大綾之幣顧太尉忠節顯著何必俟此三者而後為賢蓋惜其逸墜且以見太尉之平昔非一時奮不慮死以得名者舊唐史之傳雖詳以未見河東之狀故三事皆闕而不書宋景文公謹謹書之其為佳傳之助多矣堯章慕循王大功而惜其細行小節人罕知者矻矻然訪問而得此將以補史氏之遺其志可嘉也跋東坡獲鬼章告裕陵祝文永樂之禍可勝痛哭鬼章生禽宿憤遂攄太宗平突厥髙宗平髙麗當告陵廟蓋以唐髙祖蓄憤于北狄太宗鋭意于東夷武功未終後聖繼志亦既平蕩所宜啓告此長慶中奏語也不知當奏告時有雄文如此否跋東坡送劉道原歸南康詩劉凝之棄官居南康歐陽公所為賦廬山髙山谷謂其忍貧如鐵石者是生道原坡公亟稱之所謂古君子即凝之也司馬公通鑑一書賴道原為多其子壯輿亦奇士坐客問此詩本末因為道此跋嘉祐二年進士小録鑰曾大父登治平二年乙科大父登元豐八年丙科近嵗傳得小録又因併録紹聖二年者大率與今小異今又見此書四者俱以前一葉盡録雜事而此又分試題為三等殆不可曉同年生無分職姓名下每事輒容一字事之因革類如此不能詳考矣是嵗得名士十五六人而蘇長公少公皆在焉此真千佛名經也跋揚州伯父賦歸六逸圖淵明聨句山谷西軒真長望月太白把酒玉川啜茶東坡題詠嘗見古畫六逸圖孫登長嘯阮孚蠟屐淵明以巾漉酒韓伯休貨藥邊孝先晝眠畢卓甕下皆非同時特取其逸耳非若竹溪六逸之同遊也滕子濟藏唐人出遊圖亦六人宋之問王維李白髙適史白岑參雲林子跋云據其名題或有弗同時者而揚鑣並驅睇盼相語以為得意忘象者揚州伯父所圖是豈可與俗人言耶又四賢圖謝安遊東山張翰思蓴鱸子陵釣臺淵明臨流賦詩謝公雖為蒼生一起而東山之志不渝子陵出見劉文叔終不肯為三公以歸季鷹淵明尤為髙尚伯父擁麾持節十餘年興寄髙遠尚友四賢晚而得歸殆不負此志矣跋了齋有門頌帖鑰舊讀了齋集見有門頌一篇莫知其旨慶元二年八月上浣有二僧叩門袖出了翁真迹及與延慶第四代明智講主論此頌二帖讀之恍然因問天台教觀之説云智者大師所説四門一曰有門一曰空門一曰亦空亦有一曰非空非有其實一可貫四四實歸一公之為有門頌蓋謂此也近世士大夫用力不及前輩只如學佛或僅能涉獵楞嚴圓覺淨名等經及傳燈録以資談辨爾若唐之梁補闕諸公本朝楊文公楊無為張無盡及了翁皆留心教觀深得其趣讀此頌及書可以知其所造之深矣惟公忠言大節照映千載身罹百謫視死生如旦晝平時學問深造自得固自應爾方在丹丘時逆境尤多而心地泰然深入不二法門公之學佛得力豈易測識哉二僧欲刊之石以信天台之傳謹書于後而歸之二僧曰妙珣了怡云跋施武子所藏諸帖鍾繇墓田丙舍帖慶元二年孟冬壬子見餘姚施令尹蓋司諌之子也出其家所藏墓田帖碑石余誦山谷之詩曰平生半世看墨本摩挲石刻鬢成絲為之三歎王右軍東方畫贊李陽冰上李嗣真論右軍書有云畫像贊洛神賦姿儀雅麗有矜莊嚴肅之象視之信然黃庭經硬黃小字臨黃庭平生所見三四非精筆不能到第未知玉軸黃庭比此何如耳雲林子以陶隱居之言證此經非逸少書而隱居與梁武帝啓自以黃庭為逸少有名之迹若遂以為興寧以後宋齊人書恐亦未易定也王大令洛神賦大令好書洛神賦而李陽冰論右軍書與畫像贊同稱右軍之迹不復可見不知更勝此否栁公權記于前璨題其後何止公慙卿耶東坡救月圖贊舊未見此圖直不知贊之所以作東坡竹樹猶傳之文與可兹以一點成月一抹成蛇曲盡妙趣蓋自得之若曹不興誤墨成蠅子敬為烏駮牸牛髙道興墜筆亦成畫彼皆工于畫者坡乃以遊戲至此真天人哉東坡醉中書對客醉眠詩公自言我書意造本無法點畫信手煩推求然豪逸邁往如此者不多見每每言酒氣從十指間出而飲酒正自不多豈所謂醉中醒者耶跋卞居讓攝泰州長史牒并宣徽院公文余平時見士夫家故物未嘗不起敬亦因考其所自竊考此卷前曰敕泰州團練使乃檢校太保姓荆者敕授之官如今之公牒前必曰知某州軍州事之類也自牒奉處分以後則泰州之公移也既差卞君攝長史故為之詞其後列銜皆泰州之官印文凡七皆泰州團練使印唐朝固有紙告而此非告也後一紙宣徽院之文姓柴者禹錫也禹錫以太平興國七年四月拜樞密副使至雍熙二年冬方罷而此文乃八年九月所給故知其為禹鍚也國朝舊制宣徽二使通掌院事共院異廳止用南院印又南院比北院頗優或兼樞密亦掌本院皆與此合石晉天福五年除翰林承旨改殿前承旨為殿直或云淳化三年始改殿前承旨為三班奉職蓋蘇易簡以是年除承旨而其次子耆續翰林志云舊有殿前承旨其父拜翰林承旨上以其稱呼不别又以其與清貴混淆詔改為三班奉職以避其稱因備載之然此卷乃卞氏故物相傳二百餘年又出于兵火煨燼之中是可寶也跋溫公題劉雜端孝叔奏藁為侍御史知雜事王案孝叔名述神宗初最為切直宋史本傳失載尚見東都事略安石始參知政事述疏論權數不足任云云士大夫特立獨行無待于助然亦賴巨公正人以為重韓忠獻論事切直有本末王沂公稱其不負所職諫官宜若此而忠獻益自信劉雜端之奏藁司馬文正公以為純忠懇至深識治本明主宜置座側以為觀戒雜端可以自信可以不朽矣一時得喪其猶足存耶跋陳昌年梅花賦皮日休賦桃花欲狀其天冶專取古之美女以為況此賦形容清致故又多取名勝高人以極其變梅固非桃可比體物之工亦又過之跋孫德輝作薛持國所居記南朝何子季築室秦望山山發洪水樹石皆倒拔惟子季所居巋然獨存太守衡陽王元簡命鍾嶸作瑞室頌刻石以旌之薛君家再脫鬱攸之災鄉人敬之水火雖不同亦可名瑞室云跋李光祖所藏遠祖遷定海縣丞告天福八年乃石晉髙祖之末吳越第三世弘佐之三年自同光改元武肅王建國以來二十有一年矣是時吳越雖奉中原正朔事皆專行令丞銀茜之賜豈復有關于晉朝況此告不稱敕而稱制蓋吳越國承制而行者也或者猶疑官制印文等全似中朝考之五代史吳越更名所居曰宮殿府曰朝官屬皆稱臣遣使册海中諸國封拜其君長又通鑑言建國之始儀衛名稱多如天子之制教令下統內曰制敕將吏皆稱臣惟不改元置百官有丞相侍郎等又范魯公五代通録云自稱吳越國王參佐稱臣僭朝廷百僚之號府曰朝廷但不改年號而已通鑑又有寶正之稱五代史十國年譜載至六年而後已平章事等官雖不可遍考亦有可言者中書侍郎曰鄭遨五代史一行傳有鄭遨隱居華山唐明宗以左拾遺晉髙祖以諫議大夫召之皆不起則是隱居不仕又天福四年已卒且不與吳越相干非此鄭遨也翰林學士行禮部侍郎知制誥元德昭後為吳越丞相及事弘佐與俶至顯德三年周世宗使吳越出兵擊南唐時猶在相位所謂元丞相不欲出師者元本危姓危仔倡以信州降武肅武肅惡其姓遂易元氏德昭即仔倡之子熙寧中參知政事章簡公絳厚之即德昭之孫也蘇魏公為章簡公神道碑言曾祖仔倡又言祖德昭武肅王稱制用以為相官至右僕射兼侍中晉國公銘曰憲憲公祖遂相錢塘然則此為吳越之告無疑如給事中曰輦右丞曰玄亮皆未詳若門下侍郎平章事曰鼎者疑是林鼎武肅以羅隱林鼎為賔客元瓘以鎮海節度判官林鼎掌教令恐至弘佐時為平章事未可知始武肅嘗列賔佐將校名氏于紀功碑隂者五百餘人而見于史者如沈嵩沈瑫皮光業輩不過十數人其他不可得而見姑敘其可見者以俟博古之君子云五代亂世仕于晉朝與仕于吳越不足為輕重要欲辨其所自耳李氏藏此告二百五十餘年得以存先世之舊信可尚也光祖所記清泰三年閏十一月正當後唐廢帝之末晉髙祖改元天福之際乾祐元年則漢隱帝之初也併書之又蘇黃門帖蘇少公謫居筠陽今有雜著一編别行于世吾鄉李光祖一日攜其曾祖屯田所傳筠陽唱和集見示時在元豐間雍維瞻度支為守屯田字君績為倅與潁濵及一時士夫唱和甚衆余既假而録之光祖又攜此一帖及二刺字來考之遺老傳少公以著佐為簽書南京判官長公以詩得罪從坐而謫監稅居五年移知績溪縣此帖云已離洪州正赴績溪時也餘帖既歸蘇氏此尤當寶藏之舒中丞志屯田公墓謂雖老翰墨篇章益遒贍可喜然則宜其與少公相好也書董資政耘元帥府事迹髙廟中興之初紀載時事者類非一書間有異同無從質正初史官奏請詔隨龍人與藩邸帥府舊僚并前宰執各令記録事迹撰為一書以進御取其實而不誣者降付史官計當時臣僚應為此書者多矣而髙廟獨以屬四人蓋妙選也大資政董公預焉是髙廟深知公之必不誣也舊嘗見一二編未問登載之工拙紀事之虛實往往因而自列其功狀故見者多疑其私公初為大元帥行軍録遇盜亡失既無復見今讀此編據一時見聞之實以事繫日炳炳如丹扈從之久亦云勞矣曾不自言止載二奏劄之可考者若制詔書檄及李綱宗澤之表奏何烈之小史徐偉之忠謀録及痛定録等皆公以為可信者併裒而上之然則此編是所謂實而不誣者真可備史氏之採擇以信後世豈特為董氏之家寶也跋魏忠壯侯勝行實乾道初余嘗過山陽望清河口弔忠壯魏侯戰死之地故老猶能言當時事相與悲吒久之又嘗從老校退卒問知守海州事甚衆猶記一二侯有鍮石具裝明光甲胄日射如黃金出入行陳敵望之膽落嘗被甲坐城樓觀戰備駿馬城上望見我師少卻怒甚推去雉堞飛騎而下徑入陳中敵望風奔潰又嘗戰北門既捷忽回騎徑出南門人不知所謂蓋慮酣戰于此或擊吾背也已而敵果襲南門以數矢卻之三軍敬服後得參政錢觀文所記言隆興二年仲冬敵出清河連艘而下侯率神徑弓射之矢盡而船出不已以戰艦拒之中流為敵衆所乘矢下如雨勢不可支棄船登岸敵已渡者衆被圍甚急冒東南而出身中數箭拔之復上馬告急于大軍而救不至侯膽勇善鬬而人馬被傷已十七八士氣已竭進退無所因墜馬遂死之而大軍亦喪氣矣觀文時為淮東宣諭使當得其實嗚呼使當時擁強兵坐而觀者稍出數十百騎為之聲援豈至是哉今覽行實為之三喟子孫多壯士尚其勉旃跋蘇魏公所臨閣帖此蘇魏公所臨閣帖也談訓云嘗于相國寺置得閣本法帖十卷甚奇畢文簡公賜本也魏公記誦絶人固由天分博極羣書蓋出學力觀此卷臨摹之工其勤可知中人自怠而欲追及前輩可乎跋華氏中藏經余少讀華他傳駭其醫之神奇而惜其書之火于獄使之尚存若刳腹斷臂之妙又非紙上語所能道也古汴陸從老近世之良醫也嘗與之論胍云無如華他之論最切曰性急者胍亦急性緩者脈亦緩長人脈長短人脈短究其説未暇也一日得閩中倉司所刊中藏經讀之其説具在蓋二卿薑公詵為使者時所刊凡三十餘年而余始得之序引之説頗涉神怪難于盡信然其論議卓然精深髙遠視脈察色以決死生雖不敢以為真是元化之書若行于世使醫者得以習讀之所濟多矣惜乎差舛難據遂攜至姚江以叩從老從老笑曰此吾家所祕不謂版行已久因出其書見假取而校之乃知閩中之本未善至一版或改定數十百字前有目録後有後序藥方增三之二閩本亦間有佳處可以證陸本之失其不同而不可輕改者兩存焉始得為善本老不能繕寫俾從子溉手録之蘄春王使君成甫聞之欣然欲于治所大書鋟木以惠後學且以成余之志因以溉所録面授而記其始末于左藥方凡六十道亦有今世所用者其間難曉者有之恐非凡識所及他傳稱處齊不過數種又未知此為是否好事者能以閩本校之始知此本之為可傳也攻愧集卷七十一
