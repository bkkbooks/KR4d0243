front:
  text: 攻媿集原序鄮山參政樓公攻媿先生文集一百二十卷建岁眞徳秀伏讀而嘆曰嗚呼此可以觀公立朝事君之大節矣蓋公之文如三辰五星森麗天漢昭昭乎可觀而不可窮如泰華喬嶽蓄泄雲雨巖巖乎莫測其巓際如九江百川波瀾蕩潏淵淵乎不見其涯涘人徒覩英華發外之盛而不知其本有在也慶元初韓侂冑除知閤門事忠肅彭公力諫攺侂冑內祠彭公予郡公在瑣闥極論之云去者不復侍左右留者召見無時終不能遠時侂冑之惡未著也旣而竊弄國柄以黨論盡錮天下賢士挑敵棄盟中外騷然天下始服公先見朱文公侍經筵內批予祠公持其命不下曰當今人望儒宗無岀熹之右者奏雖寢然當邪說充塞之時首倡學者共尊朱公後卒賴其言而學禁遂開道統有續然則觀公平生大節而後可以讀公之文矣公生于故家接中朝文雅博極羣書識古文奇字文備衆體非如他人窘狹僻澀以一長名家而又發之以忠孝本之以仁義其大典冊大議論則世道之消長學術之廢興善類之離合繫焉方淳紹間鴻碩滿朝每一奏篇出其援據該洽義理條達者學士大夫讀之必曰樓公之文也一詔令下其詞氣雄渾筆力雅健者亦必曰樓公之文也嗚呼所謂有本者如是非耶公旣齾侂冑之鋒退居卻掃者十有四年嘉定初起爲內相俄輔大政向來儔輩凋喪略盡而公巋然獨存遂爲一代文宗德秀嘗竊論南渡以來詞人固多其力量氣魄可與全盛時先賢並驅惟鉅野李公漢老龍溪汪公彦章及公三人而巳念昔校藝南宮白事東府或淸言竟日或極論達旦德秀退而書紳終身誦之其所以猶爲當世善人君子所與而不遂爲塗人之歸者公之教也公季子治以集序見命德秀何敢辭建安眞德秀謹序攻媿集目錄武英殿聚珍版
