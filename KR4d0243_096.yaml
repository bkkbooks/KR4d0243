body:
  text: 宋樓鑰撰神道碑寶謨閣待制致仕特贈龍圖閣學士忠肅彭公神道碑皇上踐阼之十有四年十有一月乙亥詔樓鑰林大中赴行在大中先至首言故吏部侍郎彭龜年之忠乞賜褒贈嘉定改元鑰求對又以為請且録其諌草以進皇帝為之愴悼詔贈寶謨閣直學士仍與一子升擢既又御批彭龜年係朕潛藩舊學當權臣用事之始首能抗疏折其姦萌褒恤之典理宜優異雖已追贈未稱朕懷可特加贈龍圖閣學士其子欽與寺監簿差遣三年禮部尚書章頴侍御史劉矩起居郎黃中就講筵同進公家所被賜御書御製正邪論且言公之盡忠知無不言首論托胄之姦為其沮抑抱恨以殁乞賜美諡上賜諡忠肅又云是肅敬之意恐有司行之遲緩當為批出八月三人又因晚講奏謝上云彭龜年忠鯁可嘉宜得此諡使人人如此必能置人主于無過之地先是紹熙五年七月甲子上受內禪公時以右史兼嘉王府直講上在重華宫一時舊寮惟公最承睿眷宣召幾無虛日未幾由西掖遷二卿方趙公汝愚決大䇿之初曾遣韓托胄奏憲聖慈烈皇后有一日之勞至是寖以出入兩宫始有竊弄威權之漸公極論之且乞去公除職與郡托胄罷知閣門等職事轉一官內祠時鑰為給事中大中為中書舍人同狀繳奏上批彭龜年除職與郡已為優異韓托胄無罪辭劇就閒可與書行鑰與大中再奏龜年以二卿得此若以為優異托胄無故轉承宣使非優異乎若以托胄為無罪龜年以盡忠陛下直言無隱何罪之有龜年一去必不復來托胄內祠日在左右若併使出外則人言自息矣鑰遂為吏部尚書大中竟由給事中為吏部侍郎尋皆補外郡鑰得婺不赴而奉祠公在荆南亦以疾丐閒林公在慶元罷歸三人者鐫職罷祠至于一再惟公之謫尤重托胄擅權之久罪惡貫盈妄開兵端舉世震動主上奮發威斷加以誅殛中外稱快故翌日而二人趣還獨公不幸已成千古不及見更化之盛士大夫莫不痛惜之公字子壽世為臨江軍清江縣人曾祖廣祖愈考文通俱不仕考以公貴贈朝奉大夫妣楊氏纍贈碩人公七嵗而孤奉母盡孝如成人幼穎異讀書能曉大義比長得程氏易讀之至忘寢食年十八薦于鄉三預計偕登乾道五年進士第授左迪功郎袁州宜春縣尉時丞相趙忠定公將漕公以書言月樁錢病民趙公因計為緡錢七十萬而無名者强半皆出于苛斂趙公首取最甚者如宜春麴引之類先罷之乃以聞獲盜八人自以為非親捕不就賞公方初筮而利民自立已如此關升從政郎調吉州安福縣丞縣有寅陂灌田萬三千餘畝彊宗錮其利嵗以旱告按圖疏治陂成而嵗稔郡委檢察保甲而無其籍憮然曰是縣之根本不務可乎乃以法聨合統紀又户别其老病强弱之丁士農工賈之業租稅有無多寡之數調夫既均後有賑貸按籍立辦他日檢旱賴此尤得其要蠲放不及二分而民間歡服以為前此未有得實如此者請藏此牘以為後法育嬰兒救疫疾雖不禁巫覡之禬禳而各使勉病者以服藥全活尤衆淳熙十二年用舉主改宣教郎以母碩人年高丐祠便養主管建昌軍仙都觀自初第而歸益篤于學以毋自欺名齊以書問南軒張公中庸語孟大義至是義理愈明開發後進摳衣北面者日衆復與劉子澄清之往復問辨時相與折衷于晦菴朱公而學愈成矣再請祠未滿而丁內艱執喪盡禮誠信備極葬之日觀者歎其可法以致敬致樂致憂致哀致嚴裒集格言類為一書名五致録晚又定祭儀行于家服除吏部尚書鄭公僑兵部尚書張公枃同薦之得旨引見時光宗初即位內降頗多公首論正始之道願以仁宗杜權要請屬為法以崇寧御筆為戒公又言嘉王傅相少而侍御多請用司馬光令伴讀官提舉左右之議使府寮之勢重于侍御道義之訓密于宴游光宗首肯久之且曰當世急務也又以開樂之初進逸豫之戒謂國家大讎未復而內外宴安猶襲宣和之舊淫侈成習光宗曰風俗驕侈太甚至此極矣朕日夜思所以革之因奏陛下為之不難風俗之變未有不自上始也二月除太學博士時殿中侍御史劉公光祖因論帶御器械吳端改太府少卿公上疏乞復其位又貽書宰相云祖宗嘗改易差除以伸臺諫之氣不聞改易臺諌以伸幸臣之私有諫大夫同知貢舉欲大變文格下太學選經義詩賦論策各二百篇為式長以督課學官公獨不可曰使士明經術熟古文則文格自正校文已為下策又使之習時文此非所謂教也雖忤諫官意然遂不復選二年兼魏王府教授六月除國子監丞郊禮遇雨祠于望祭光宗意鬱鬱不豫至展恭謝之日公具嘉祐中文潞公因設醮宿殿中故事白廟堂又言重華命押醫官下都堂亦欲大臣共此憂責次日乃聞內引宰執三年許國公始朝參公為言保富貴之道無過恭儉又集禮記論孟子史中朝見之禮為朝參須知且言雖與嘉王同行在禮世子不可與同名非惟名不可同色色不當相似至生日又以恭儉惟德為韻作四詩壽之六月侍御史林公大中辟公充御史臺主簿謂公操行堅正不為詭隨遇事通明不事沽激八月以舊班對乞復經筵典故謂勸講之臣當用明經之士人各有長經須素業不應不問所學例以序遷又謂宣召講官多用晝接不如夜直之有益也光宗云親儒生最有益十二月林公以論事除吏部侍郎公乞去張公叔椿代林再奏乞留卒不就四年正月除司農寺丞三月除祕書郎先是外傳召姜特立公白丞相留公恐非虛傳至是果然留公引李絳事乞退公率同館論奏又勉樞廷爭之遂寢五月兼嘉王府直講論說經理精切明白禆益為多不勝書書其大者嘗論梁燾辨邪正之奏公曰此正是元祐末年小人將進君子將退之時不可不詳覽王曰君子小人不可參用參用則小人勝公因具述元祐紹聖君子小人進退之大略王一日親製邪正辨以賜公正指燾奏而發又嘗賜所書瑤山詩乃光宗在東宫時作有雪詩云閭閻多凍餒廣厦愧膏粱公言人主當如是用心嘗因講詩王曰下以風刺上已是人臣委曲要知為君者須使人臣直言其事方是公曰願大王無忘此意而推廣之則善言至矣讀曾肇奏議因言用人須先識邪正王親題其說于奏議上贊讀沈公有開講三風十愆謂十不可有一王曰要是病根全在比頑童一比頑童何事不有公稱贊不已亦請王題講義上聞王宴居書知人難三字于坐右公質之于王王曰然畢竟人如何知君子以小人為小人小人亦以君子為小人正恐錯看爾公曰堯舜亦以為難也光宗久不詣重華宫公與同館入疏又以㑹慶節未舉進香之禮自上封事力請俱不報十二月除起居舍人明年正月直前奏事光宗曰久欲見卿說話此官待有學識人方除公謝且進內治聖鍳奏以祖宗家法集為此書光宗曰祖宗家法最善漢唐所不及待外戚尤嚴不可容易壞了公對曰聖論及此天下之福祖宗不委以權乃是愛親戚之道此書宦官女子之防尤嚴恐不得進御光宗云不至是三月直前奏起居注乃繫日之書言動無不記者今一月四次書免到宫陛下半年不出如此已書三十餘次以貽後世實纍聖德四月駕幸玉津園公言于宰相謂近捨聚景而遠幸玉津不奉三宫而獨出宴遊宰執以公言乞恭請公亦入奏㑹被命禱雨因言兩宫不和則天下不和天下不和則天地不和蓋天地和則雨未有不和而雨者自是屢許過宫或仗集而不出侍從奏陳不效皆居家待罪公又獨奏誤以臣充嘉王府講讀之官正欲臣等教以父子君臣之道臣聞身教者從言教者訟陛下以身教臣以言教者也言豈若身之切哉五月重華不豫已奏告公與侍從臺諫請對不果八日戊辰公繳納告敕乞竄逐待命江滸戊寅壽皇服藥赦下始入城癸未公念屢乞對及求去至今日不可不極諫拜訖獨不離班位伏地叩額久不已血漬甃甓搢笏取劄子置龍墀上再拜欲辭出始傳旨上殿光宗云知卿忠直理㑹何事公奏今日無大于不過宫事光宗云須用去公又極言陛下屢許羣臣一入則又不然內外不通禍亂不聞臣實痛心光宗為之慘然曰終當去六月戊戌壽皇升遐七月甲子主上受內禪是晚召公對于大堂聖容蹙額云前但聞建儲之議亦自可息浮言豈知遽踐大位泣辭不許至今怔忪公奏此乃宗廟社稷所繫陛下亦不得而辭首乞奏知太上皇因擬劄本上即寫入又問初政及人物明日再見猶云朕一日不曾食因泣下又言昨太匆匆參決可爾公奏今只得盡人子事親之誠心再擬起居劄子乞日進一通又與翊善黃公裳同奏往朝南內因定過宫之禮乞先一日入奏率百官恭謝壬申擢中書舍人庚辰上朝泰安宫至則寢門閉矣拜表箋而退上嘗問恐太上皇未肯過泰安如何公奏陛下本出于不得已必不以位為樂況宫室乎壽皇梓宫在殯且居喪次于禮為正旬日間三降㫖經營泰安紛紛不定太上微疾未瘳不若且居南內以休息聖躬陛下少留重華以居喪聽政從之代言之初李孝純孝友轉右武大夫帶行遙刺公封還詞頭謂固當推恩母黨然上事三宫禮有隆殺恩有後先乞候三宫戚屬次第推恩內侍符滌得罪于太上而差幹辦泰安宫劉慶祖已帶遙郡承宣使而以太上隨龍人落階官公皆繳奏上于劉慶祖事批可與書行公又奏曰慶祖無官可轉止有建節若念其忠勸不若任之以事不必優之以官臣非為慶祖惜此一官蓋為朝廷惜此一門陛下自登大寶聽言如流忽于此事首降可與書行指揮夫可與書行乃近世敝令也使其可行臣即書矣何待再令使不可行豈敢因再令而書哉上嘗言中宫未建聖節未立隨龍人恩例之類直俟祔廟後施行公即極口稱贊聖德後隨龍命下封還再四且言祖宗隨龍人止轉一官元符中方轉兩官如徐績何執中除待制侍講亦止轉一官靖康以後方有四官之例誠是太優今于巳分正當過為裁損酌中推恩命遂寢因對上語公曰朕尚未見父母如何敢恩及下人孰重孰輕且稱繳章為是然公亦以此等故不久而遷矣上問講筵所奏諒暗罷講舊例公奏多故以來兩三月不與儒生講矣不可不以為急務上袖出二紙一具太上講筵書目一具潛邸講堂書目謂講筵講書太少公奏今有機務不比講堂専一讀書上云朝退亦無事恐自怠惰況酬應萬務非多讀書不可又奏人君之學與書生不同惟能虛心受諫遷善改過乃聖學第一事不在多也他日又出二紙一御書經史十件春秋禮記詩書孟子通鑑唐書三朝寶訓奏議長編節本一書臣寮十人黃裳陳傅良彭龜年黃由沈有開朱熹李巘京鏜黃艾鄧馹公請聖意上云朕缺讀書太上讀許多書養德東宫垂二十年今欲添講官至十員各専講一件兩日一次五人上講早二件晚三件早依舊講殿上晚只用小衫依講堂例坐講公曰講學愈切此帝王之舉也若少讀而精庶幾有益又曰十人充講官否陛下若招徠一世之傑如朱熹輩方厭人望不可専以潛邸學官為之尋除侍講而待制朱公中書舍人陳公俱以召至公引傅堯俞乞班蘇頌之下以請繼除侍讀三辭而後受御筆舉御史有不植黨與之言公奏但當察君子小人不可問黨與元祐黨籍第一人是司馬光小人陷君子變白為黑何所不有又言近差除多自中出此不足為威斷適為小人所賣耳九月除吏部侍郎公知事勢漸變乃陳四太之說其略曰用臣太驟處臣太高臣跡太危臣分太滿因震雷暴雨言近日好出不測之號令故天應以不測之風雷因極陳今日小人竊弄權柄皆起于號令之不測借吏部尚書充金國弔祭接送伴使至平江奏漢元帝時日青無光恭顯指為堪猛用事之咎及斥堪猛復有日變始切責言者小人機心古今一轍楚州應詔一疏尤極剴切謂信任君子之意未孚于人而昵比小人之跡已見于外君子告陛下之言小人或得預聞而小人誤陛下之事君子或不能知送伴至楚聞朱公奉祠又奏君子小人消長甚詳皆不得報及歸屢乞對不許自知不能久矣明堂禮成封清江縣開國男食邑三百户公見廟堂之權日輕托胄之勢愈重言官又多出其門于是歷數其姦大要云進退大臣更易言路皆初政最關大體者大臣或不能知而托胄知之假託聲勢竊弄威福陛下總攬之權恐為此人所盜矣時二月九日也上聞奏甚駭且曰只為親戚故信之不謂如此奏事退已聞下之中書晚又聞復取以入知必不濟再入一奏丞相以聞上云托胄是親戚龜年是舊學講堂五人一死一憂去二人俱罷只有龜年在又性直肯言今當如何丞相陳兩留之說已而托胄雖罷職而豫內祠公除職與郡給舍繳駮不能回也除煥章閣待制知江陵府荆湖北路安撫使公既去丞相竟論罷矣公至荆罷和糴以平米價罷沙市官買之敝治牙儈以寬商旅撙浮費以除魚湖之輸復奏修長隄教民兵乞支還備邊庫錢俱不報公遂以疾丐祠一請而提舉江州太平興國宫慶元二年六月以論列落職罷祠五年言者以蔡璉誣告公與趙丞相言政和中嘉王事乞加貶竄于是追三官勒停嘉泰三年秋復元官再奉興國祠開禧二年起知贛州以疾力辭除集英殿修撰提舉建寧府武夷山沖佑觀俄以疾甚致其事除寶謨閣待制三月二十三日終于家享年六十有五遺奏聞特贈中奉大夫娶敖氏先三十年卒贈碩人生二子欽承事郎守司農寺主簿巨迪功郎新特差充荆湖北路提㸃刑獄司幹辦公事女四人長適進士陳復之次適鄉貢進士胡夢得次適從政郎揚州江都縣丞章瑢次適進士敖清之再娶燕王宫宣州位宗室潭州益陽縣丞贈中大夫伯攄之女封碩人後二年卒生一子鉉承務郎新監江州在城稅務孫男二人滋沄孫女四人俱幼七月壬午諸孤奉公之柩窆于縣之建安鄉金家井之原從治命也公性資剛方學識正大而議論尤為簡嚴徑直善惡是非務盡道理義所當為白刃可蹈正色立朝其愛君憂世之誠先見之識敢言之氣皆人所難及故公議浩然歸重晚既投閒専以養性讀書為事扁所居曰止堂悠然自得幾微不見于顔面賓客非親與賢不妄交郡縣吏乘時羅織公之親黨文致之罪潛窺隂伺欲捃托細微以媚權幸公視之如無彼亦不得毫毛之隙自僞學之說興鮮不變者公于關洛之書益加涵詠著止堂訓蒙一書蓋終始不變者也聞蘇師旦為節度使曰此韓氏之陽虎也其禍韓氏必矣及聞用兵曰禍其在此乎皆如公言著內治聖鑒二十卷訓蒙經解奏議外制并表箋雜著合為若干卷藏于家孰鑰幸同朝一見如故相與日厚公之三子求銘謂知公之深者莫如鑰偶然未死尚何辭銘曰矯矯彭公天豫剛介學問淵邃言議正大自其筮仕憂國愛民登朝屢奏心乎愛君嘉邸簡寮極天下選遇事獻規務納于善重華違豫問寢有愆朝夕思慮不已于言螭陛直前龍墀叩額言雖不用忠節愈白聖主龍飛風雲是依無日不召擢居綸闈開口論事略無顧避志欲回天側目多忌權姦櫱牙惟公先知抗疏逆折鳴鼓攻之上色為動公言益切聞者縮頸驚歎膽決一去一留消長遂分言者雖力無救絲棼聲生勢長附炎日盛太阿倒持竊弄威柄橫挑强敵塗炭斯民赫然天誅公論復伸改弦之初與世更始曲突徙薪如公有幾嗚呼天乎不假之年身不及見徒為知言恩光優渥施及其子公凜如生誰顙有泚九京可作非公誰歸金井之原過者式之寶謨閣待制獻簡孫公神道碑開禧三年嵗在丁卯余以衰疾引年幸而得謝因自念以凡才叨近列一時同朝多君子寮投閒以來相忘道術遂隔死生者多矣忽得故吏部侍郎孫公從之之子新瑞金西尉鐩之書寄示從之行述且曰先公不幸薨于慶元五年四月之丁丑葬未有銘因仍八九年重不幸二兄俱蚤世凜然門户之託惟先友有以碑于隧道以惠顧九京以少贖不孝之愆余執書以泣曰方公之薨余方遭嚴譴不得致生芻于前已而又自遭內艱憂苦無生意以至于今悲愧多矣老而學落本不足以銘公義激于中有不容已閲五年始克謹托行實之大概序公平生而系以銘公諱逄吉從之其字也先世居南蘭陵五季避地于吉之太和五世祖德弼奉其父銀青霸之命徙名數于龍泉今為邑人曾祖文妣李氏祖叔遇通經博古倜儻有奇節雅不喜王氏學棄科舉不就尤為里人所推晚以經旨授諸孫卒昌其家公以按行阜陵恩特贈承務郎妣李氏考宜文行尤髙兩上禮部而不及祿以公貴纍贈奉直大夫妣羅氏贈令人奉直三子公居長次逄年終上猶令季逄辰終袁州守俱中儒科里人有三傑之稱公生于紹興五年時方俶擾學士解散公就學雖晚而資實俊邁課藝頴出父祖竒之自弱冠三薦于鄉隆興元年擢進士第調左迪功郎郴州司户參軍乾道四年校試長沙場屋喧動同列踰垣避之公諭以義理衆方帖息尚書沈公介為帥給事黃公鈞領漕計相與愛敬沈公留置幕府御吏剛嚴無敢忤其意者公自以受知之深知無不言未始一語詭隨始若難合終必垂聽豪民匿罪越訴捕之不獲吏執其子于嶽麓書院沈公怒甚既得其父必欲併杖之公獨不僉書且曰父有罪子不知情何可從坐爭之數日而後得因力辭攝事而歸沈既薦公關升既而又畀以京削或謂公未可用沈公曰但知舉賢安知其他歸欲力薦于朝而不果七年升左從事郎黃公還朝薦于廟堂欲處以學官公以二弟游宦懼闕子職授常德府教授㑹侍郎李公燾出守常德以史局自隨熟聞公之該洽先以書約見于公安傾蓋之頃質以數疑公了辨如響恨得之晚且曰儀曹有京削留以待鄉人今日不可失士亟以畀公樞密劉公珙少司成鄭公伯熊劉公焞皆有重名薦章交上初不識面淳熙五年改宣教郎太令人春秋高不忍去左右閲兩嵗令人强之始授袁州萍鄉縣公以學道愛人為心不為赫赫名而慘怛惠利之政出于至誠值嵗大祲待哺者數萬荒政皆有實惠不為便文逃責事已而得雨又教民芟旱苗養禾孫是嵗饑而不害例有添給别貯之久而盈溢輟四十萬市榖創社倉以濟貧乏擇賢士主之民賴其利催科不亟不徐行雨露于膏火中民亦樂輸縣計既裕稍蠲其餘還以豫民邑之西北土瘠民窶受役甚苦公與錢市田教之義役縣苗稅素重為裁酌而損其額又以餘力代貧民之賦為錢四百餘萬馬驛三在境內嵗有繕修芻藁之擾事又不集公既葺其陋又糴粟以給之遂有經久之計修學市書督課諸生身為之師士風大振公之政直可比古之循吏非有矯飾求名之心而邑當孔道謡誦藹然起居舍人吳公燠出使湖隂過縣貽書江西諸司曰部有賢令如此雖欲蔽賢可乎諸臺競列上治最有㫖籍記士民亦至今歌之代還丁內艱服闋家居又久之十三年幹辦行在諸軍審計司十五年九月遷國子博士十六年光宗覃恩轉朝奉郎賜緋衣銀魚六月隂司農寺丞兼實録院檢討官紹熙元年五月徙祕書郎八月兼皇子嘉王府直講二年二月雷雪交作詔求直言公疏八事以獻一曰去蔽諛二曰親講讀三曰伸論駮四曰崇氣節五曰省用度六曰惜名器七曰拔材武八曰飭戎備明白剴切深中時弊輪對論今嵗初郊請遵用隆興三年詔書節用惠民以當天心上諭公曰圜壇不尚華飾亦事天簡素之意又曰中外支賜合從減省復勸上容納狷直併論和買折帛之弊上喜悉可其奏㑹諫官鄧馹請增諌員即擢公右正言首奏帝王經世之學根于一心大而隂陽寒暑之變化小而人民事物之統紀皆係于此心之運此心融徹發之政事則天地可位萬物可育舉無難者其言甚備時營繕寖廣一第之建撤民居數百咨怨者衆公力言其弊公自以受天子特達之知思欲補報切磨治道七旬中章二十上多人所難言者期于不負所學無復顧忌故亦不得久居其職臨安守潘景圭交結謀進鄧公疏其罪反以計傾之鄧移大匠公曰名為優遷而罷其言職後不可為矣兩疏不報再對復論言路壅塞諫臣結舌天下利害無由上聞願留神于逆心遜志之戒則雖失之于前尚可收之于後也併論景圭脅持臺諫蔑視紀綱連章劾奏竟逐之未幾公亦有遷官之命大臣奏踐阼以來屢易諫臣非所以示中外若以二監處之必不肯留遂除國子司業辭不拜上諭旨曰士論所推此師儒之選也不得已就職而求去愈力公之初除或議其弱丞相留公正曰是有仁者之勇上之親擢得人矣及是丞相曰某有獻替上豈能一一垂聽然不敢以是求去也公對曰宰相與諫官不同宰相平章國事不能無可否官以諫為名是専以言為職業也不得其言而不去人將狗彘我矣烏可與丞相比哉君相知其不可奪九月遂除荆湖南路提㸃刑獄公事兩學之士數百人出祖關外人謂中興以來才一再見公褰帷入境風采凜然守法度識大體不専按刺傅經決獄多所貸宥案牘盈几披閲參考決遣如流未數月文書為清民亦自以為不冤尤篤意人物太府卿項安世吏部吳鎰方銓工部徐應龍皆所薦也五峯胡先生宏之子大時元城劉先生安世之曾孫孝昌俱隱衡嶽公請官之以繼賢人之世事雖不行聞者韙之兩攝漕事通融有無深得計度之體衡之茶陵秋輸特重公曰昔祠官使臣大軍仰給于邑不免加賦今則咸無焉尚取贏可乎量出計入蠲十之三令下歡聲如雷邑人相與作佛家道場三晝夜以報伐石刻詞至今尸而祝之也愛惜公帑不以毫髮自奉諸臺月餽隨以還之一無取焉參政陳公騤首疏六名士公在其中上亦念公久外嘗曰孫逄吉好士人三年九月召為祕書少監訓詞有當今第一流人物之褒承上意也五年朝謁重華不以時公數具疏援引古誼深言之又率同館列名以進七月主上受內禪登用舊學越三日擢公兼權尚書吏部侍郎初公入諫省翊善黃公裳曰孫直講問學醇正勸講多益今遂失助上曰言路得斯人尤可慶也又言所論有不樂者上曰既為言事官豈可不使之盡言蓋上之在嘉邸知公已深至是首陳初政有曰陛下嗣膺大寶蓋非得已願起敬起孝數申溫清撫接宗戚俾之開釋太上推明陛下之本心乃若建立長秋推恩隨龍人之屬皆可緩也又請進學以養其明揆事以審其斷凡立政造事皆明以先之斷以輔之則守經事而得其宜遭變事而達其權天下可運于掌矣上欣然納之覃恩轉朝奉大夫九月除權尚書吏部侍郎賜金紫服明堂恩封廬陵縣開國男食邑三百嘗告丞相以和買折帛之價太重宜因初政稍議蠲減庶可固結民心丞相舉行之然止限以三年非公之本意也十月擢兼侍講公在嘉邸嘗集羣經格言以獻至是請講論語蓋公平日潛心此書有自得之趣欲以遂格君之志也差充孝宗􅓖宫按行使朝方議撤祕書省以為壽康宫而以東宫為館閣公毅然力爭謂于理非順地狹屋敝不可以奉慈極事亦竟止待制朱公熹在經筵持論切直忽奉祠而去公于上前爭論甚苦因講權輿之詩反覆紬繹以為諷上曰朱熹所言多不可用公曰熹論祧廟獨與衆論不合他所說皆正理未見其不可施用願留之以重經幄冬有震雷詔求闕失公言過失所當謹者二曰奉親曰親儒闕違所當講者二曰謹爵祿曰節用度又論治體之要曰治化之原肇于宫壼而達于外廷宫壼嚴則內外之禁肅外廷正則上下之職修后妃之家多啓私謁嬪御或養私身願擇老成宫嬪佐六宫之政內侍本備掃除自閣長而上願遵舊制選年四十以上者知內省之事樞宰之職論道經邦願萬幾之暇從容與之議政近習之臣職在禁密願全其恩數勿使預事上深然之十二月假煥章閣學士提舉萬壽觀兼侍讀充館伴金國賀正使金使需竹牛角之屬期以必得公奏皆難得之物戎心無厭當遏之于初大璫王德謙典司國信所密請匪頒公卒卻之慶元元年正月兼實録院同修撰使事畢入對因奏臣比緣館伴刺求北事竊聞自孝宗上賔寖有輕視中國之心比年公卿習安將帥習偷士卒習惰風俗習侈上恬下嬉無復有枕戈復讎之意願陛下拔材賢旌循良核名實蓄財用選將帥簡精鋭城要害備器械講求孝宗內治外攘之䇿上尤嘉納而公于是時已有不見容者矣待制朱公熹之去公力救之侍郎彭公龜年補郡又論不應為近習而逐正人忤韓托胄之意又嘗扈蹕有馬上回揖之者公獨不顧彼又以為簡歡也一日㑹食部中或報王喜除閣門祗候公曰此乃優伶嘗于內廷效朱侍講容止以儒為戲者豈可以汙清選當抗疏力爭否則于經筵論之有飛語上聞五月內批與郡而王喜之命亦寢或以為出于誤報而公憂國愛君之心亦云至矣潛邸恩轉朝散大夫七月除知太平州纍章丐祠九月提舉江州太平興國宫三年轉朝請大夫五年三月起知贛州言者始疏前事沮之公素有德量未嘗語人以去國之由杜門深居時事一不掛口書史自娛不以得喪介意至是以言者傳播公之直節愈顯而公已屬疾上章納祿矣終于里第壽六十有五五月除集英殿修撰致仕嘉定五年上以公舊學軫其遺忠特贈寶謨閣待制仍度越彞典賜諡獻簡娶李氏纍封令人與公相繼而卒子男三人銶承奉郎監鄂州在城鹽稅務錤迪功郎新臨安府餘杭縣尉季即鐩也女五人進士李三聘李拓羅沂迪功郎前臨江軍司户羅晟通直郎前知南康軍都昌縣事胡杙其壻也孫男四人渙溱淳溥女一人尚幼六年十一月乙酉葬公于萬安縣龍泉鄉綿津之原公資稟醇淡于外物一無所好惟刻意經史不可解于心自幼至老手不釋卷務為有用之學尤精于國朝典章事物之源委宦族之譜系除拜之嵗月與夫前代疆理卒乘之法封國行河之利參貫融液無不通流修世教植治道誠有志焉發為文詞以理為主以意為先體制具備關鍵嚴密簡而有法不為綺麗之習晚嵗自號靜閲居士有文集七十卷外集三十卷藏于家左規右矩言笑不妄恂恂似不能言遇人無賢愚貴賤少長咸接以禮平實誠慤表裏如一修身踐言樂于聞過遜賢達善心無媢忌喜怒不形于色而正大剛方之氣有臨大節不可奪之風以鑰平昔之所見聞考之胡君之行述不隱不誣足以傳遠而瑞金必欲以銘見屬老復病瘁豈敢言文念公之三子而失其二余亦視䕃幾何有不能已者與公為同年初未相知晚幸定交情義至篤為少司成則實為交承出入從班又為寮于講讀之官余與給事林公大中于晚講之次論救吕祖儉之貶公從旁贊言尤力嘗論日食事謂上即位未久多有隂翳一得明照必有背氣等變三月朔去正陽之月一間先一日大雨謂必以隂雲不見至朔日乃暸然使萬目見其剝蝕天之示戒如此公又奏曰至次日則又雨此雖片言為助多矣當紹熙慶元之間上既隆寬下亦多盡言余幸周旋其間固有激于忠憤不容不言惟公天與諒直事君不以犯顔為難與同列不以忤意為憚劉德秀為諫官以私意劾左史劉光祖公謂之曰人君寄心膂于宰相寄耳目于臺諫皆當以天之心為心倘任私以害忠良如彼蒼何願自此三思而後行其盡言類此居之不疑惟義所在嗚呼斯人而在諫爭論思之列可謂天下選時非不遇位非不至而道卒不行任以史事尤為當才相與論修史之規模甚備汗青無日而身去矣嗚呼殄瘁之悲識者所同孰知余心之悲有在于此乎銘曰帝王之興四門以闢無人不言猶恐不力官以諫名惟言是職視古已狹言又不得憂世之士所共太息孰為敢言為糾邪慝矯矯孫公古之遺直學為有用博聞多識其處友朋直諒三益幕中之辨不為婉畫一登諫垣身任言責有犯無隱攖鱗之逆天姿則然不動聲色鯁論日聞不容暖席召還蓬山上方御極首擢從班寵光赫奕經帷史館人望丞弼遑遑靡寧期補君德飛語中人又成去國命非不通而道之塞不容何病為天下惜銘以昭之後人斯式攻愧集卷九十六
