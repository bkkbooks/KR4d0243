front:
  text: 攻愧集卷四十九
  hash: sha256:256312b012ee94458fbf74a676c90df9758d4ee0e9d629c962fcf7e76f556254
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_049-1a}
body:
  text: 宋樓鑰撰諡議孝宗皇帝諡議撰奉敕臣聞帝王之出治豐功茂烈生則著見于天下而其流傳于後世者則待節惠之名要皆取其盛者而傳之文王一怒而安天下非無武也武王告武成而作洪範非無文也取其盛者而傳之則備道全美可以一言定也甚哉孝之大也虞舜之大武王之達自漢歷唐無不諡帝為孝本朝纍聖相承皆用舊典若夫集孝道之大成則未有如大行之盛者也恭惟大行至尊夀皇聖帝繩藝祖之武重光堯之華以天縱之能日新之德臨御天下二十有八載巍巍煌煌不可備述若形容天地繪畫日月則不容無辭方在初潛龍德而隱學聚問辨師教不煩日就月將君德昭著䖍鞏勞謙共為子職日趨朝謁威儀雍肅雖莫窺其涯涘而中外屬心天人協應光堯內禪髙視唐虞嗣位以來勵精庶政召收故老尊禮元臣臨朝若神待物如春崇節儉以革奢汰之風振紀綱以起偷惰之習事無小而不察人無微而不記機務雖繁酬酢無壅立法定制動為後則以科舉為未盡則立待補之法以搜遺才以武舉為未盛則優入仕之級以收智勇年勞竝用以裁濫賞而不致于纍遷銓闈加嚴以抑任子而又為之限節改秩必使之作邑謂舉以親民而使之治民御史必取之賢宰謂受人之察而後可察人以周行速化必使試郡而後為郎以延閣清華必俟有功而後除職監司守將必延見而臨遣癃老昏繆之人不得而隱藏姦贓之吏必窮治而斥逐清介潔廉之士則從而拔用朝士闕官乃除遂無待次之淹要郡留闕選才遂無輕授之冗黜贓吏之世賞進軍功于流內長慮卻顧守之至堅故雖日不暇給而四方靡然向化矣于時疆場未寧戎車方駕激厲將士嚴備邊陲張皇六師明見萬里中原起來蘇之望殊鄰多歸附之民撫而有之還以為用天威既振戎虜畏讋雖犂庭掃閭未快初志而信使復通減幣殺禮至今無煙火之警苟非雄斷逺略何以臻此臨政既久治道愈明物來能名事至輒斷精神之運上際下蟠于天地之間智慮所關六通四闢于帝王之德行公道以銷黨偏之蔽推平心而絶喜怒之私間有水旱之變應天以實而禮文尤備州縣之奏恐其不速蠲復之數恐其不多傾囷倒廩以濟其急賞勤罰惰以勵其餘民不知其有凶嵗亦隨以登熟幸太學幸祕省廷䇿貢士布文教以振士風御鞍馬親弓矢申嚴軍法立武事以張國威內外大小之臣無不列之屏以待黜陟山川險要之地無不指諸掌以立防間治具畢張風化已成方且玩意希夷而無奉道之過遊心寂寞而無佞佛之迹作敬天之圖兢懼愈深闢延和之殿諏訪愈切躬講讀之勤設遺補之官其于保治有始有卒至于脫屣萬乘燕居重華授受之際尤為雍容嗚呼身退而道彌髙尊極而用彌儉是宜萬有千嵗永處慈扆而厭代登遐歸于帝鄉此羣臣萬姓所以攀號劈踊泣盡而繼之以血也逺日有期恭定尊諡請之南郊以詔萬世謹按諡法曰能官賢才曰哲帝德廣運曰文應變無方曰神保大定功曰武持盈守滿曰成慈惠愛親曰孝迹夫知人而善任使文武各得其用非所謂能官賢才乎修德以來逺人矢文以治四國非所謂帝德廣運乎酬酢以周萬幾圖回以盡衆智非應變無方乎妙韜略而不用極聰明而不殺非保大定功乎守基圖之廣大延國祚于綿逺非持盈守滿乎若孝道之盛非惟臣子所不能稱贊雖考之諡法求之六家語其甚盛者曰慈惠愛親而已是則未足以彰大行之孝也報本反始而奉郊禋尊祖敬宗而事廟饗惟髙宗為天下而得人太皇盡母道以愛子而大行天賦至性不可解于心備四海九州之養謹五日一朝之儀委曲周盡猶恐不及兩宫九閏終無間言固已風動四方震服夷虜髙宗屬疾則衣不解帶躬自嘗藥及棄天下則勺水不入于口倚廬有過于哀鄙漢文之短喪陋晉武之無斷身服苴麻禮盡苫塊行有匹夫之所難哭則哀動于左右鄰使來弔止許朝于喪次顔色之戚哭泣之哀鄰使退而嘆曰皇帝聖孝乃如此大臣或進諭解之言則流涕被面曰大恩難報羣臣感泣莫敢仰視易月之制既終因山之役既畢孺慕無已追逺弗勝遂舉大寶以畀聖子不曰倦勤不曰求逸惟曰不得日奉先帝之几筵躬行聖母之定省又曰俾豫一人獲遂事親之心永膺天下之養于是御素服于乘輿尊几筵于內殿退處堊室以終三年之喪哀疚不忘齊潔自若欽事慈福溫凊無違嗚呼兹豈非集孝道之大成又豈慈惠愛親之所能盡也大行至尊夀皇聖帝宜天錫之曰哲文神武成孝皇帝廟號孝宗謹議成穆皇后改諡議撰奉敕臣聞帝王之興皆有天命夫婦大倫尤非偶然曰天作之合曰天立厥配正始之道王化之基于是乎在焉矧汾陽大家多為后族唐室憲宗則有懿安之盛皇朝真廟則有章穆之賢姓系相承是生聖女慶鐘戚閈實嫓夀皇生不及禕衣之榮歿而膺寶冊之禮久安别廟將奉太宫宜改尊稱以從帝諡恭惟安穆皇后柔明懿淑慈順溫恭蚤儷王藩克盡婦道設桑弧于門左屢占熊夢之祥帶弓韣于禖前每啓燕祠之瑞云何不淑遽奄九原逮烈祖之御天眷元妃而追冊欲歌流荇傷不見于令姿正號長秋遂疏恩于幽穸固已嚴蒸嘗之奉崇節惠之名綿慶祚于三朝介洪休于萬世重華厭代方服大喪吉竁因山行當升祔念今日遺弓之痛既切于神孫愴昔時故劒之求用承于先志爰因安穆之懿式遵成孝之規謹考諡法婦德均一日成德化肅雍曰穆安穆皇后窈窕好逑有關雎之美用心専一有鳲鳩之德非婦德均一乎孝欽以奉舅姑和平以儀閨門非德化肅雍乎伏請改上諡號曰成穆皇后成恭皇后改諡議撰奉敕臣竊惟至尊夀皇聖帝臨御之初仰奉髙皇首隆孝治正家刑國百度具舉而中闈久虛陰教斯闕乃奉親命乃諏卜吉考正古制閎建長秋安恭皇后淑範懿德冠于後宫君子好逑遂正乎內坤承乾而時行月遡日以為明禕揄盛服助成九廟之奉􅌨縱具禮欽承兩宫之養母儀既尊后德有輝而曽未數嵗祲纏椒掖方隆大練之飾終符素奈之祥求賢審官未展周南之志感今懷昔空形宋文之䇿固已極褒崇之典議安恭之諡祭于别廟逮今二十有八年矣夀皇上寶萬國起號弓之慕孝孫盡禮七月庀因山之役有司奏請定諡南郊二后在天皆應改號以從成孝之名謹考之諡典曰夙夜警戒曰成謙而好禮曰恭安恭皇后共繭館之職以贊親耕之勤謹雞鳴之戒以勉相承之道禁切外家不干裏謁兹不曰夙夜警戒乎躬節儉之德服浣濯之衣卻貢獻之珍麗遵圖史之針規兹不曰謙而好禮乎伏請改上諡號曰成恭皇后劉忠肅公大中覆諡議資正殿學士劉公輔政于紹興七年未幾而薨距今五十有餘年矣中更權臣當國之久故家泯然無聞公又為趙丞相鼎深知同寅之人尤無敢言者逮今始得出處之詳于行狀太常又明其立朝體國之大節諡以忠肅可謂當矣嗚呼髙宗皇帝身濟大業披荆棘而立朝廷一時人物雖經崇觀政宣之摧折靖康建炎之流離而元祐流風猶有存者趙公身任天下之重甄拔人望布滿中外論思勸講皆極天下選由是王政日修國勢日隆以啓中興是豈惟將帥攘卻之功哉抑聞之趙公入相之初首白髙宗必欲得公與王公庶為執政以自助二人遂竝用方是時君臣上下日夜講求恢復之計外與敵通使而為備甚飭所謂行在所止為時巡之謀若不可以一朝居非若後日之晏然于此也公之同心輔贊力正國本太常之言皆家世舊聞參以記傳炳炳如丹而後公之名益顯望之如神人然公議之不可泯諡法之有益于天下如此可不務哉王節愍公倫覆諡議馬或奔踶而致千里士或以負俗之纍而立功名夫泛駕之馬跅􅕟之士亦在御之而已此雖非古先用人之道漢武帝所以能得竒才為用蓋以此也靖康艱難事出倉猝承平百年衣冠如雲習于久安不知所為平時經明行修褒衣博帶之士狼狽失守不計其幾至有助桀為虐忘君賣國不忍言者樞密王公名臣諸孫跌蕩不羈浮湛閭里不見其異一旦慷慨奮發論事激烈抗章敢言欽宗為之改容擢于布衣待以國士天下方知其為奇男子也帥府既建首為勸進之舉髙宗募忠勇之士往使不測之敵罔有徇死以行者惟公機智勇辨氣吞豪酋往來再三忠肝義膽折服倔強和議之成為力最多公之志蓋朱已也故每當陛辭必以乘機用兵為請勿復以臣為意此其志豈止于和戎哉再使被留音問斷絶誘以髙爵而不就脅以嚴誅而不懼引義南向仗劒以死郡邑為之震動至畫像而祠之回視小亷之士其能以忠徇國視死如歸如公者寡矣太常易名曰節曰愍無可議者傳之來世抑以見取士之無方不應以細故而棄才也楊惠懿公偰覆諡議諡所以易名也法苟應諡雖功烈不見于世亦必隨其人之所宜而稱之此孔文子之所以為文也故特贈光祿大夫少傅楊公某生長富貴不知天下之憂患而抗志不羣篤志問學隆師親友嗜書好古若有不能自已者古人以公子而厲布衣之操者公實近之已而游太學擢上第優游都城以致顯位是時四方無事朝廷尊安周旋清華尤無以自見于事然因所職而建言類老于世故者自詭治民休有惠愛晚登禁途益有志于效忠孜孜論思時見一二不幸所藴未伸天不假之年而遽忽焉惜乎未見其止也官簿已髙一贈而至光祿禮官即其已行者揆之以法諡以惠懿得其實矣尚何異辭攻愧集卷四十九
