front:
  text: 攻愧集卷四十六
  hash: sha256:55046d57e377f300e92b9d6631cd16b57e519eb4e1136e1a1185e3e9d165913b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_046-1a}
body:
  text: 宋樓鑰撰內制伯圭再辭免兩鎮節度使不允批答年九月紹熙五省表具之朕惠于宗公務隆于體貌相豫肆祀可後于恩褒位已極于人臣官無加于師尹兼授齋壇之鉞倍多井賦之租是曰彛章未為異數儀刑所繫以為泰乎俯傴之恭再斯可矣口宣有敕卿位冠三公望髙九族兹相合宫之祀用頒雙節之華其服恩榮毋為謙避伯圭再辭免兩鎮節度使不允仍斷來章批答省表具之朕尊寵帝師惟恐不至優崇宗老尚竊慊然故因大饗之成曲示異恩之渥載加少府之節復登上將之壇城南天下稀舊臨樂土漢東國為大併領名藩式慰具瞻益綏多祉既無反汗之理奚事循牆之恭口宣有敕卿德齒俱尊名位皆備欲侈三卿之寵遂疏兼郡之恩何必固辭亟祗成渙侍講陳傅良朱熹宣赴經筵供職曲謝宣答詞有制朕務明政體首闢經帷嘉舊學之來歸喜耆儒之同集其思忠告以副疇咨初講畢案前致詞降殿曲謝陳傅良有制首頒召命渴想忠猷聳聞講貫之詳恍若從遊之舊克諧朕志益啓乃心朱熹有制久聞髙詣傾佇嘉猷來侍邇英之遊講明大學之道庶幾于治深慰豫懷余端禮再辭免知樞密院事不允仍斷來章批答省表具之卿自簉本兵積隆時望有致君澤民之志有憂邊思職之勤逮參政幾又嘗共二其于基命宥密之地詳練久矣兹疇樞長非卿誰屬夫本強則精神折衝制千里之勝者其機實在于廟堂尚究逺圖以祗寵命朕志決矣勿復有辭口宣有敕卿精白承休勤勞匪懈爰自政途之竣載登宥府之崇成命既行牢辭勿再京鏜再辭免參知政事不允仍斷來章批答省表具之本兵之任方倚于壯猶共政之求更資于夾輔朕圖回治道選用柄臣眷一相之處中有嘉同德惟萬幾之甚衆允藉協恭卿之長才朕所深識奏陳剴切剖決精明進參鬷嘏之嚴益冀訏謨之告既頒再命毋事三辭口宣有敕卿召歸全蜀旋二洪樞兹膺共政之圖實倚告猶之益何勞謙避其遂欽承鄭僑再辭免同知樞密院事不允仍斷來章批答省表具之朕惟孝宣樞機周密用以中興漢道于今本兵之地尤號才難卿以魁碩之才為士夫儀表踐揚最久望實具孚兹焉登用朕非以私于卿所以尊朝廷也朕方庶幾孝宣之治卿志在體國其遂秉德以陪朕顧豈以執謙為美乎口宣有敕卿屢分帥閫三總吏銓兹進二于機廷方允符于輿論亟其祗命何必固辭郭師禹再辭免少師不允批答省表具之朕惟三孤之貴卑于公尊于卿異姓之王苴以茅胙以土皆本朝之所重非懿戚而誰居以卿德量有餘忠誠匪懈受隆知于烈祖不專為恩護大事于阜陵克勤乃職逮兹歸報可後褒嘉既敷號以明揚雖循墻而安避毋為苛禮徒咈眷懷口宣有敕位尊三少爵重異王用酬使領之勞已播廷揚之命洊披遜牘其服殊恩郭師禹再辭免少師不允仍斷來章批答省表具之卿世為懿戚仕厯纍朝惟孝宗之恩每思所報故阜陵之役獨護其行人徒見闔門而養威今乃知任事而能辦位列三孤之長封疏五等之崇揚于大廷協彼公論何為固避屢卻復來其亟受于寵章毋重陳于遜牘口宣有敕阜陵庀役總使有行既竣事以來歸乃疏恩而示寵其祗一札何事三辭伯圭再辭免中書令不允批答元年慶元省表具之卿以伯祖之尊上公之貴名位已隆而無事任之纍冨貴已極而無危溢之虞夀考康寧子孫蕃衍此于人間世尚何慕焉獨惟烈祖孝悌之至則友其兄朕追仰音容如在左右古者思其人猶愛所憩之棠况我祖同氣之親乎是以因使範之勞加寵數之重夫髙允之在魏子儀之在唐俱以令公名者豈惟爵秩之崇蓋以德為貴也惟我父師尚何辭于此哉口宣有敕卿爵齒俱尊忠孝兼備兹授令公之秩實為皇族之光毋復固辭亟宜祗命伯圭再辭免特授兼中書令加食邑實封不允仍斷來章批答省表具之朕考國朝官制尤以中令為重親賢如魏魯陳韓諸王為此官者僅六七人元豐中曹佾以帝舅兼令有司謂無給俸之例則其稀闊又可知矣卿為達尊執德彌劭久虛之典非卿尚誰當之近命元子寵兼衮鉞恩禮之盛萃于一門邦之榮懷匪曰豫私辭之至三斯可巳矣口宣有敕卿位極人臣德高帝胄爰拜中臺之長以彰元老之尊寵命既頒謙辭勿再余端禮再辭免右丞相不允批答省表具之君臣相逢謂之千載上下協濟本乎一心必能如風雲之從斯可不膠漆而固惟卿朴厚副朕倚毗雖纍年務罄于論思而近嵗又殫于忠力眷政府樞廷之更踐知文事武備之該通儀圖老成宜置左右試之已久斷然不疑惟昔宗盟嘗居冢宰之任若時卿衮亦應柘溪之祥尚期逺邁于前人相與共興于大業朕所望者卿何辭焉口宣有敕卿比握兵機實專政柄乃徑登于次相仍纍進于崇階其服寵光勿為多遜京鏜再辭免知樞密院事不允仍斷來章批答省表具之朕惟本兵之司有國所重必得樞機周密乃可圖功自非智略縱橫何以稱職卿之能事朕所素知分制閫則推師帥之良登政途則著輔弼之望威名日起遐邇具瞻其勵壯猶益運幄中之算坐銷外侮以收堂上之奇宜已需章毋留朕命口宣有敕卿資兼文武望聳華夷輟東府之大臣長西樞之重任明綸已播遜牘毋煩鄭僑再辭免參知政事不允仍斷來章批答省表具之朕修明庶政務興起于事功圖任舊人乃布揚于命告卿行為世表文擅國華瑣闈銓部則著忠蹇之名侯藩留籥則備恩威之美再儀禁路增重朝行既擢二于本兵兹進參于鬷嘏其體責成之重毋為避寵之煩口宣有敕卿擢在樞廷久隆人望兹進參于大政庶益重于本朝洊貢忱詞亟祗明命謝深甫再辭免簽書極密院事不允仍斷來章批答省表具之朕惟九五正位每切圖安二三大臣所當遴擇乃眷幾廷之二必求禁槖之英卿外寬而內明氣和而才劭凡一時清切之選以數載周旋其間封駮之嚴屢回主意抨彈之徑益振臺綱勸誦以來陳謨尤切兹肆頒于一札俾參掌于五兵出命惟行抗章可已口宣有敕卿備厯華途寖髙雅望兹自憲臺之長入參樞管之嚴朕命既孚卿辭毋費余端禮再辭免右丞相不允仍斷來章批答省表具之商宗之命傅説也爰立之初訓告具存惟説以天下自任祗若休命不敢辭也朕之論相則又詳矣大號揚廷與衆共之需章以來既已再卻而猶未已何耶朕之菲涼有賴啓沃式克欽承卿其可使古人專美于前乎三命而僂其可已矣口宣有敕朕妙選儒英俾登揆路欲專裁于庶務顧俯事于三辭難徇勞謙亟祗成命賜右丞相錢象祖褒語朕更化之初論相為急注意已久無踰卿者大臣義當體國勿為牢辭往哉汝諧毋稽朕命附劄子臣獲望清光仰蒙聖慈開納芻蕘之言不勝千載之幸再被宣旨令撰右丞相錢象祖褒語進上竊思制麻已宣無可辭之理臣退方供職所有答詔章良能必已撰述臣謹撰褒語進呈更合取自聖裁開禧三年十二月二十四日翰林學士知制誥臣樓鑰新除右丞相兼樞密使錢象祖再辭免不允批答省表具之漢之丞相無所不統孝宗正名委任罙重朕更化善治注意尤精以卿忠孝之家台輔之望踐揚中外多厯年所邇者再預政機能斷國論去凶舉賢人望愈歸播告廷紳士夫至于相賀何謙何疑固辭不已矧是邊陲之未靖尤資右府之壯猶三命而僂執謙甚矣朕志巳定決無反汗之理卿其自任天下之重稱朕意焉口宣有敕卿兼文武之資體家國之重既巳頒于制綍何尚執于謙詞毋違朕言亟正台席新除參知政事衛涇再辭免不允仍斷來章批答省表具之朕更化之初惟二三大臣是賴以卿倫魁之彥密在邇聯贊決廟謨擢升獨坐尋卑洪樞之任仍參鬷嘏之嚴茲焉正名以贊台揆內則百度之欲治外則三邊之未寧此為何時而執故典其體責成之意勿為遜避之煩口宣有敕卿近以樞廷遂參政地兹焉錫命止用正名尚禆當軸之謀無執循牆之謹新除參知政事雷孝友再辭免不允仍斷來章批答省表具之朕躬覽萬幾與民更始欲解琴瑟之舊允藉股肱之良卿久矣蜚英居焉難進比處代言之任實懷憤世之心預同密謀卒殄元惡擢居瑣闥遂長憲臺欲新億兆之觀瞻尤急二三之輔弼其祇豫命亟贊政幾國事匪輕謙辭可略口宣有敕卿由中執法為吾大臣正資經世之猷以贊濟時之相朕志先定卿辭勿煩新除端明殿學士簽書樞密院事林大中再辭免不允仍斷來章批答省表具之卿養氣以剛秉心無競出藩入從榮利淡然久安燕居不容何病朕一新治具急欲求老成典刑以鎮服中外起舊德于垂車之後還人望于持槖之班矢謨朕前尤見克壯亟升書殿進二宥庭人無異辭國以增重時則可矣尚何遜焉口宣有敕卿禁班老成人望久屬擢置幾庭之二正資兵本之謀尚復奚辭往其祗服楊次山再辭免開府儀同三司不允批答省表具之朕愛惜名器惟賢是豫由掌武之官而視儀揆路品職益崇其可輕畀卿以肺腑之親服在爵位靖共自飭廉介有餘爰示優恩用孚至意而又何辭焉毋復重陳亟宜就列口宣有敕卿聫芳椒掖均逸琳宫爰開公府之華實視台躔之貴其祇茂渥毋事牢辭經筵進講毛詩終篇宣答詞宰執赴聽講致詞謝有制朕臨御今十五載講詩終三百篇卿等同觀朕心惟懌尚其協贊助我緝熙侍讀侍講官奏賀有制朕日勤三接共講四詩既徹篇章實資問學深賴主文之諫載嘉歸美之勤宰執率經筵侍立官再奏賀有制朕積朝夕之勤終雅頌之業究觀六義用蔽一言尚冀輸忠毋忘進戒皇太子再辭免侍立會議不允批答閏四月嘉定元年省表具之近頒中詔命元子以侍朝仍諭大臣集東宫而會議是為令典非用前規顧豫教爾以義方俾爾預聞于政理躬臨五學既親賔友以交修密拱九重具見君臣之相與爾能進德豫自忘疲何以辭為再斯可矣口宣有敕爾為元子年近成人俾入侍于昕朝且預聞于幾務勉親多益毋事牢辭衛涇乞解罷機政不允仍斷來章批答省表具之朕厲精更化遭時多虞延登俊良列在輔弼當經綸之始賴協力以共謀逮平定之初乃奉身而求退朕所未喻卿尤無他知出處之素明見忠勤之曲盡五十而服官政在古訓以甚明三千而惟一心矧大臣之無間倘遽欲去吾誰與居勿為封奏之煩尚體眷懷之渥口宣有敕卿以同德任吾大臣一為進退之圖實有重輕之繫尚安位著庸副朕心褒語卿二政更化之初備宣忠藎朕所眷屬何人異辭告歸無名理難曲徇攻愧集卷四十六
