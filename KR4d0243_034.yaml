  text: 攻愧集卷三十四
  hash: sha256:c7440186490713033ef1b9eca724fc46f186c4733ab1c1b8cbe1fa238c7cf92e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_034-1a}
body:
  text: 宋樓鑰撰外制吏部尚書趙汝愚兼侍讀敕朕退朝之餘務學為急開邇英之閣肆求經史之遺言對無逸之圖慨念祖宗之美意正有資于勸誦顧何憚于增員具官某秀出天支蚤收儒效擅開平之譽久宣出藩入從之勞條朝董之言尤見憂國愛君之意謹銓衡于選部實領袖于禁途朕惟歷代編年之詳萃于通鑑之紀三朝致治之要列于寶訓之書爾其因事進規盡忠無隱矧是宗盟之彥首陪經幄之游尚服異恩以稱公選寄資武功大夫幹辦御藥院陸彥端轉歸吏部除帶御器械依舊幹辦太一宫敕具官某爾給事宫省謹而寡過肆還寓秩列之銓選屬鞬九陛仍護行宫往哉惟欽毋替于舊武經郎趙不淹換太子右監門率府率敕具官某國家宗支視古為盛然以屬近行尊得奉朝請者亦鮮矣爾修飭有素宗老薦其詳雅授以正率日陪近班尚勉之哉以永終譽許從善循修職郎敇具官某爾以假吏往從使節兹登仕籍始得論賞雖曰踰時亦不失勞矣從政郎邵武軍司理張令照降兩資放罷敇具官某治獄之職惟公則平爾曲奉上官縱吏為僞以陷人于深文臺評來上罰其可逭再鐫厥階歸務循省修武郎前監紹興府東城酒庫馬鎰降兩官敇具官某爾職槯酤驚擾田里憲臺按治嚚訟自解削秩免官以正名分朝散夫夫知邵武軍趙師造降兩官敕具官某政平訟理郡太守之先務也爾按吏不審乃諷脅理官僞為文記以傅致其罪彼罪雖得爾其可佚罰乎褫秩二等以戒鍛鍊之吏從政郎賀正使書狀官俞南仲循兩資敕具官某朝廷選修聘之使而使之自選其屬爾以庠校之彥為之少從禮成而歸賞可後乎何謙韋益竝循修職郎敕具官某集故事以成書儒館之職也爾隸西省改東韋益省亦預有勞既登仕版仍進一階朝散郎溫州通判傅頤降一官放罷敕具官某榷貨之禁至為嚴密治中别駕實專掌之爾職在是而不能戢吏卒之冒法豈惟關防之弗嚴抑見威令之無素削秩免官以懲不恪福州觀察使王抃父康贈武功大夫成州團練使敕朕肇禋南郊祇見上帝爰推霈澤以及萬方仕登朝列皆得以及其親具官某故父具官某有子以廉車告歸爾亦預此恤典尚其有知欽承休命寄資右武大夫遙郡防禦使皇子嘉王府都監韓世榮轉歸吏部在京宫觀敇官躋橫列使領遙防是為右選之華用示內班之寵具官某進謹赤墀之奉退祗朱邸之勞歷年寖多以疾來諗俾隸名于銓部仍賦祿于真祠尚服渙恩以保終吉承節郎潘時美嫡母孔氏年九十一嵗封孺人敕具官某嫡母孔氏比肆郊霈推老老之恩爾年登九齡子為命士豫之湯沐以為晚嵗之華通奉大夫顯謨閣待制陳峴係韋潛心舉主降一官敕賢引其類固難保于終身稱匪其人亦何逃于定制具官某早登膴仕屢薦小官逮歷嵗之既深有字民之無狀按章不審雖多刻吏之文具獄既成莫掩貪夫之迹考尋舉將乃屬從臣以嘗遇于霈恩姑稍鐫于命秩尚為寬典毋有遐心嘉王府講尚書徹章官屬各轉一官承議郎中書舍人兼翊善黃裳敕朕有元子教之以義方爾以名儒導之以經術既闡百篇之奧可稽一秩之褒具官某造理精深處心夷曠出廷臣之右能介而通從吾兒之游最專且久博文約禮欲著乎心考古驗今如指諸掌因乃天資之美加之學力之優兹焉進官姑以示寵惟帝王之胄非務為章句之徒發經史之微尚益明事物之要既上紫垣之直仍先朱邸之僚進有賴于諭思退尤資于講習其祗朕命式究爾心承議郎著作郎兼贊讀黃艾朝奉郎軍器少監兼直講陳士楚敇具官某朕以元子天資之良遴選賓友以輔導之惟爾艾爾士楚俱以儒英從吾兒游典謨訓誥誓命之文講貫既久以至終篇旌爾賢勞何愛一秩其益暨乃僚秉乃心相與發明經史之要日計不足而嵗有餘厥惟休哉知揚州錢之望復直寶文閣敕具官某朕肇禋南郊爰肆霈澤士有一眚咸復厥初矧吾帥臣起臨邊閫日著聲績如爾之望者顧可後乎爾守襄陽煩言洊至稍鐫寓職于今三年因豫泰畤之恩歸汝寶奎之直其祗寵沃益懋爾功成都府路第二將高師顔制置使司奏舉知黔州敕具官某蜀道萬里士有負文武之才者朕何自而知之爾起將家歷戎職制使謂爾通練老成連帥又稱其沈毅通敏朕以二臣之言試爾以黔中之守爾能不負所舉則知所以報國矣泉州同安縣靈護廟神封威惠侯敕具某神朕之愛民至矣吏治于明神職于幽苟利吾民雖逺必録以爾神廟食海嶠久著靈迹卻蠻蛋而張官軍招海賈而銷癘疫有司核實具以上聞錫爾嘉名歆豫茂渥承直郎坑冶司檢踏官蔣蓋降一資放罷敕具官某國家置使江左以總諸道之貨泉設屬支郡以究山澤之遺利爾其屬也冶工爭攘至相戕殺爾實啓之劾章既聞其上一秩免所居官吏之不䖍庶乎知警修職郎臨安府昌化縣主簿趙善視降一等放罷敕具官某爾筮仕之初密在畿邑是何么䯢敢爾披猖鐫秩免歸尚為輕典爾則自取將誰咎哉入內內侍省都知鄧從訓該奉上高宗皇帝徽號冊寶轉協忠大夫依前奉國軍承宣使敕朕推尊烈祖務極隆名寶冊之嚴式資辦護均行賞典爾則先之具官某服在禁庭恪共衆職橫班秩峻既兼留務之華高廟禮成實任賢勞之首爰加命秩用答爾勤倪思等係常良孫舉主各降一官禮部侍郎倪思敕人未易知其來已久士不自愛乃至于斯既駭豫聞致貽伊戚具官某夙推清望遍歷華途比因繕監之遷爰謹屬寮之薦家既傳于清裁人亦謂其端良俄隱慝之遽彰何貪心之已甚考尋舉將乃屬從臣以其未脫于七階俾爾姑鐫于一秩勿以懲羮之故而忘推轂之公中散大夫知通州章沖敕具官某人之難知舊矣爾為南蘭陵以户曹為賢而舉之閲嵗既久乃以賄聞申舉將之罰不可廢也其上一秩毋忘省循隆興府佳山孚應廟神封惠濟侯敇具某神國家愛重爵賞非有功不侯人神一也以爾神生而不求聞達以忠孝而化人沒而能著靈響有功利以及物手植之槐猶在舟行之禱必答豫之好爵其尚欽承朝請郎致仕劉礎降一官敕具官某朕視嶺海猶畿甸也爾守蒼梧而部使者謂爾加賦于民且曰遂祠請而未拜聞劾章而徑行雖已挂冠豈容幸免姑鐫一秩以示薄懲從政郎錢逖降兩資候服闋日與逺小監當敕具官某細民以煮海為業私販冒禁或未能免爾仕至邑令又方執喪使者亷按謂爾為逋逃之淵藪何耶削去二階姑令終制朝祥暮貶其尚何辭寄資訓武郎嘉王府都監朱思正轉歸吏部在京宫觀敕具官某服役內廷兼官王邸克勤所職以疾丐閒祿以內祠秩之吏選尚欽朕命以善爾躬成鏞知黔州敇具官某爾奮由武科屢更事任黔中雖逺委寄不輕外控夷蠻地當一面命爾作守凡牧民固圉之事尚勉之哉寄資武義大夫果州團練使重華宫祗候董友聞轉歸吏部敕具官某爾職聯中禁使領遙團共事纍年以疾求退俾乃舊列往赴右銓益務檢身以俟收用秉義郎閣門看班祗候韋琳報班差錯降一官敕具官某朝儀尚肅賓贊尤嚴進退降登視以為節抗聲失度時汝之辜爰削一階以懲不恪郭棣知瀘州敕掌殿巖之武衛夙著勤勞分邊閫之顧憂兹煩鎮撫眷豫世將聽我訓詞具官某稟資沈雄馭下嚴整出臨淮海嘗當一面之權入總貔貅久護千廬之密比歸故里既厯纍年惟時瀘川控彼蜀道靡有蠻夷之外侮何期蟊賊之內訌狂卒稱兵衆無與者仇人假手天實誅之顧平時謀帥之甚艱豈今日擇才之可後疇堪豫選僉曰汝諧爾其設方略以靖驚疑示寬大以安反側凶徒既殄無問脅從義士實多當行第賞綏爰有衆遂令境內之清坐折遐衝益致王靈之暢佇聞嘉績别議優恩文州靈惠豐安侯加封嘉應敇具某神朕成民而致力于神陰平去都城萬里苟有利于民亦不汝遺也增以嘉名用答靈貺尚其歆奉以惠逺氓文林郎保寧軍節度推官趙善謙降一資放罷敕具官某爾以宗子居大郡幕府不能自潔其身乃與胥徒共為姦利償券焚歷欲蓋彌彰鐫黜示懲尚服寬典文林郎寧國府司理盛將之降一資敕具官某獄事至重豈容小差爾職其間乃爾失當諒其非故姑示薄懲承信郎石璿父榮年九十五保義郎致仕敕具官某父某比肆郊霈推老老之恩爾年登九齡子為命士授之武爵以為晚嵗之華興化軍莆田縣順濟廟靈惠昭應崇福善利夫人封靈惠妃敕明神之祠率加以爵婦人之爵莫及于妃倘非靈響之著聞豈得恩榮之特異具某神壼彝素飭廟食愈彰居白湖而鎮鯨海之濱服朱衣而護雞林之使舟車所至香火日嚴告賜便蕃既極小君之寵禱祈昭答遂超侯國之封仍靈惠之舊稱示褒崇之新渥其祗朕命益利吾民朝請郎張抑係舒光舉主降兩官敕具官某人之難知舊矣爾持江東使者節以池陽郡博士為賢而舉之閲嵗已久乃以賄聞比申舉將之罰惟爾在哀疚而未及既除喪矣其上二秩毋忘省循遙郡刺史知和州某依舊武功大夫祁州團練使敕具官某將門出將其說古矣紹興以來名將之後人才不乏鮮有以將略世其家者爾起自西陲屬鞬九陛頃由選擇出守山陽雖邊塵不驚智勇無以自見而首尾五載固圉有勞徙之大邦升以遙圑之秩朕之知汝深矣勉趨功名毋忝爾祖寄資訓武郎韓果轉歸吏部在京宫觀敕具官某服役禁庭屢更嵗籥恪勤厥職式閔其勞祿以內祠秩之吏選尚欽朕命以善爾躬文林郎監泰州鹽倉周大老降兩資放罷敕具官某鹽策之盛莫如海陵積弊之深亦非一日今帑中之藏至失十萬白發吏姦汝之職也詳究始末失職已多而又不能自别于貣貸之嫌再鐫厥官歸務循省朝奉郎知湖州烏程縣趙彥衛為鄉民訴水傷擁併死損八人降一官敕具官某爾試邑輔郡能聲徹聞秋潦為災訴者輻凑老羸蹂躪至有死傷雖非關防所及咎將誰歸其上一階服我寬典嘉王府講尚書徹章官屬諸色祗應人各轉一官資內知客修武郎譙令雍秉義郎戴勳敕具官某賢王務學講席徹章惟此百篇之書坐閲八年之久凡預職守咸進官聨爾起于諸生班在上閣祗事朱邸見謂恪恭渙恩所加勿謂故事尚勉思所以稱此者哉使臣忠訓郎姜文用孫昌祖忠翊郎姚思正保義郎董政中徐松成允顯高珂指揮使從義郎馮涇王良講堂使臣秉義郎蔣巨卿張克家講堂書寫文字進武校尉張桔承受所手分承信郎舒良嗣承受下主管文字忠翊郎遆興祖客司成忠郎傅宣世前都監訓武郎朱思正醫官成全大夫陳世安翰林醫候李之美成全郎陳翊敕具官某等王邸談經閲嵗滋久凡曰執事咸進厥官往其欽承益務恪恭秉義郎楊忠輔換太史局丞權同知算造敕具官某周之馮相氏保章氏皆以中士為之星厯之學為士者可不務乎爾邃于歷徹于朕聽因其所長俾二局事推步日月星辰之行以稱朕欽天授時之意爾尚勉哉殿前指揮使行門長行左班楊坦劉選李端邢敞沈明黃毅杜椿吳圭蔡顯右班王佐邊寧李鈞孫彬陳琚曹渙王浹黃義陳圭換武翼郎添差諸州駐泊兵馬都監敕具官某等行在所猛士如林又擇其雄毅之尤者列在人門為豫爪牙歷歲既久親閲挽强之技超授武爵護戒方州錫之袍帶以寵爾行毋忘衛上之忠益習近民之事尚勉之哉殿前指揮使守闕行門長行左班許坦聶榮明澤孫伸右班盛俊吳佾郭錫換從義郎敕具官某爾等以拳勇選密侍宸居有年于兹矣親閲其藝視高下而賦之爵尚勉之哉毋怠于事神騎嵌補副指揮使姜勝換秉義郎宣武嵌補指揮使徐成換從義郎天武下名副指揮使吕俊換修武郎敕具官某爾等早以武勇備豫羽衛閲嵗既久而挽强之力不衰授爵有差往親民事益務忠恪以稱所蒙趙介循從事郎敕具官某爾以刀筆為冊府之吏周旋四庫其職清矣又以奏篇之賞疊進資級其思所以稱此者哉入內內侍省都知鄧從訓轉履正大夫依前奉國軍承宣使餘如故敕總禁廷之務久矣宣勞居橫列之班兹焉進秩具官某持身克謹遇事惟勤出入宫闈習見纍朝之故實侵尋嵗月兼提衆職之綱條爰因酒正之修更陟武階之峻勿云近比思稱優恩蕭鷓巴奏孫秉義郎存德乞將磨勘轉官回授母淑人耶律氏封郡夫人敕命婦之封率從于夫爵小君之號茲越于邦彝某人早嬪名將之家同慕中華之義兩朝示寵名已著于鳩桑一子貤恩榮特頒于鸞誥往服朕命益宜爾家朝奉大夫錢之望奉使回程轉一官敇具官某比遣使華往修鄰好聞其扶疾慮有闕事見大夫非無可使恐不及期以爾志存許國才足應變輟自邊閫俾將豫指聞命引道禮成來歸進之一秩姑以勞還俟訖外庸嗣有褒擢武翼大夫楊大節奉使回程轉官敕具官某朕嵗遣使華往修鄰好必選上介以輔其行爾以扈衛之臣為行人之副中途易節調護無虧惟爾之能應豫之賞俾增命秩其尚欽承奉使官屬文林郎陳元震從事郎譙令憲迪功郎錢廷玉忠訓郎郜師孟忠翊郎黃允迪訓武郎李邦安忠翊郎楊祖烈吳良弼趙進承節郎張達符溥從義郎何洵保義郎金彥達進武副尉王沖各轉一官敕具官某嵗遣信使修好鄰邦凡為假吏之行舉有優恩之及用酬勞勩毋替忠勤武功大夫和州防禦使殿副都指揮使部杲落階官敕總千廬之衛久護戎昭頒一札之恩用申褒律具官某器資沈鷙謀略雄深飭邊備于上游坐銷外侮肅軍容于中壘允藉壯猶朕慨宿將之無多眷故家之可用繄爾昆弟為豫爪牙兹徹武階俾專使領庸示等威之峻式昭名器之公其服恩榮尚圖忠報閣門祗候訓武郎李彥機從義郎李删秉義郎楊應龍應奉人使到闕一十番各轉一官敕具官某等信使來庭掌在上閣賓贊之職不容毫釐之差祗事纍年積勞可賞進之一秩益務恪恭從事郎成州天水縣令韓廷圭降兩資敕具官某邊臣無小大皆以忠實為先爾以逸囚受罰矣而又為欺洊削一階用戒來者皇叔祖士峴男太子右監門率府率不㤏轉一官敕具官某國家以十階待近屬必十載而後一進其選嚴矣惟我宗老行尊年高爰寵其子躐等而授雖曰近比實惟異恩忠翊郎李孝純落階官閣門宣贊舍人敇具官某爾以名將諸孫中宫兄子不患不致富貴顧所以將之者何如耳頃罣吏議亦既纍年察之蓋詳克自循省賓贊之職用以命汝念之哉知復玷缺之艱難則知所以保其身矣故責授安逺軍節度行軍司馬詹儀之追復中大夫敕具官某朝廷念廣西鹽策之弊因爾建議使行其言非徒無益而又害之爾既知其不可而不能自已何也解弦更張事始少定褫官置散以謝逺民而爾亦亡矣爾豈欲害民者徒以昧于不逺復之義而致此亮其本心追復舊秩能體此意尚為有知大中大夫參知政事胡晉臣提舉修壽皇㑹要并禮儀使轉一官敕朕寅紹丕圖推尊慈極纂修帝制尤嚴于五載之餘登奉寶儲遂全此一王之法惟時近弻兼總宏模矧相禮以備成豈疇庸之可後具官某該通而知務端靜而善謀頃上禁途居然有公轉之望逮升宥府足以致朝廷之尊俾參預于政機益茂明于國體緝成大典允藉宗工誕舉縟儀更資使範以侈重華之盛以彰疊矩之傳爰序進于崇階尚勉從于遜牘增培采㑹仍衍真畬噫鋪張閎休實贊我顯親之志奉行故事尚堅而致主之心往服訓辭以綏寵渥從事郎趙彥適收使射中減磨勘循一資敕具官某國家選士于廷又命以射爾以宗支之秀既擢儒科能游于藝且應賞格何愛一階以示勸奬從事郎王堯佐前任復州司理載鐵錢入銅錢界算請鹽鈔降一資敇具官某冒利犯禁齊民則有之爾為獄掾乃敢以身而試法稍鐫命秩猶為寬恩朝請郎尉聞詩前知永康軍拖缺綱運降兩官敕具官某朕崇儉示朴未嘗加賦于郡邑然軍餉則不容缺也永康雖小賦入有度及爾為之闕供甚矣鐫去二秩以勵其餘而猶不奪爾合江之符以不得罪于民也其務足用勿以懲羮而取盈焉朝散大夫知明州高䕫為提刑陳倚申厲雄公事不自陳避嫌降一官與邊郡敕具官某爾以選擇屢典大藩四明富民之訟使能俟屬邑之公行聽憲臺之移獄則晏然無事矣部使者謂爾不能引嫌疑有未盡鐫官一等易地邊方汝往哉其思有以靜鎮之朝散郎國子博士徐嶤上殿墜笏降一官敇具官某爾以老書生獻針于朝此意勤矣朝儀貴肅乃爾失度雖欲宥過不應但已稍鐫命秩以警廷紳寄資右武大夫遙郡圑練使符滌降兩官放罷敇灑掃是職專務盡恭過愆有聞豈應從恕具官某久以勤敏祗事禁嚴當克謹于官針乃自貽于罪罟命鐫橫列尚畀遙圑罷歸銓部之班顯示貂璫之戒內侍高品李元美降忠翊郎放罷敕具官某禁廷貴肅三尺尤嚴爾職其間而越法度削官二等尚為寬恩閣門祗候潘瓚落看班敕具官某爾祗事昕朝再更嵗籥稽之故實盍正官稱益務恪恭毋怠于久皇后親嫂碩人許氏特封郡夫人敇命婦之封蓋從于夫爵小君之號兹出于上恩故某官妻許氏蚤嬪將家今為后族亷車既往莫諧偕老之宜戚閈方興實號懿親之長屬褘衣之歸謁分石窖以疏封尚惟治度之循以對寵光之渥直敷文閣史彌正為高䕫奏厲雄公事落職罷宫觀敕具官某爾奉祠就養宜無預于公府知篤葭莩之好而忘瓜李之嫌事發相重遂徹朕聽收還延閣之直仍罷祠宫之官尚其省循豫不汝棄侍御史林大中直寶文閣知寧國府敕具官某朕惟天子耳目之官與夫言語侍從之臣皆極天下選豈應輕去然進退之際君子之大致存焉朕亦欲有以全之爾以清德雅望周旋三院有年矣憂國之忠匪躬之節論事有體義形于色臺綱斯振物論洽然擢二銓衡所冀獻納之益而抗章自列引義不回宣城大邦實慈皇初潛之地寓直寶奎以寵爾行牧御之方無俟多訓勿以在外而忘告猶政成來歸副我虛佇知漳州鄧馹江東提刑敕具官某入而居獻替之選出而任澄按之寄皆朕耳目之官也以爾端靖有守雅望甚休擢在諫垣出鎮南服江左祥刑之重肆以命汝豈惟引以寖近為爾之寵抑使列城之人知朝廷垂意臬事至遣諫官以臨之書不云乎好生之德洽于民心朕將庶幾焉知廬州許及之大理少卿敕具官某朕承纍聖仁厚之餘雖罔敢兼于庶獄而明罰敕法求惟厥中乃者播告之修孚于中外矣爾以諫省之舊知豫德意而明敏詳練無施不宜召自邊閫用為廷尉之二昔張釋之使天下無冤民于定國為之民自以為不冤汝往哉其為朕持天下之平且以行汝學道愛人之志大理評事李珏再任敇具官某廷尉之屬非明于文法不以輕授非遲以嵗月不能貫通也爾以名家子庀職既久以其自列爰俾因任尚圖來效勿替厥初故太傅蒲察久安女碩人乞用父遺表恩澤封郡夫人敕命婦之封蓋從于夫爵小君之號兹出于君恩某官女碩人蒲察氏生長北方來歸王國謂父兄即世惟一身之僅存而恩渥自天曾纍嵗而未請乃叩九閽之邃願加列郡之稱亮其忱衷矧有近比特疏豫寵用慰爾心忠訓郎興州遊奕軍權統領常崇轉一官敇具官某朕周知中外將士之才間使來前用閲其實不以逺近為間也爾來自西陲人物可採何愛一秩以寵爾歸益習戎韜以俟有用殿前司神勇軍統制訓武郎劉肇步軍司左統制修武郎姚旦總轄牧放倒斃數少各轉一官敇具官某等歲分遣諸軍牧于浙右寬閒之鄉惟統御有方芻秣以時歸而閲實生全者衆進之一秩以為來者之勸高夔知廬州敕具官某爾頃守合肥嘗移之內郡近守四明又易以邊方乃自制司復分帥閫蓋以爾習熟淮甸有志事功故因以遷焉內有以固吾圉外有以宣王靈爾尚勉之哉朝奉大夫新知昌州程仲虎為虧發官錢降一官與間慢差遣敇具官某朕崇儉示朴未嘗加賦于郡邑然軍餉則不容缺也廣安雖小賦入有度及爾為之闕供甚矣姑鐫一秩以為罷軟之戒皇弟右監門衛大將軍某州刺史多能多助收使父居中遺奏各轉遙郡團練使敕具官某等朕親睦九族務從優恩而十階之進則謹守舊制未嘗私也以爾父嘗建節旄不及中夀遺奏之澤未請于朝俾爾昆弟俱領遙團之任朕之于爾厚矣尚惟恪恭以綏寵祿林㟽閣門舍人敇具官某爾以武科首選庀職上閣有年矣銜恤告歸免喪入見俾還舊班益務恭恪中大夫知寧國府蔣繼周磨勘轉官敕擁千里之麾方著民庸之茂考三載之績尚伸吏課之公具官某被眷慈皇進班言路以中執法之舊為東諸侯之尊政最有聞尚有稽于褒表封章來上何屢請于歸休兹以年勞應于銓法爰峻文階之秩遂登從槖之聯大異庶工往祗茂渥知廣州嶽霖敷文閣待制致仕敕帥閫有嚴方任顧憂之寄囊封何遽來騰告老之章驚爾疾之寖深撫豫衷而甚戚具官某秉心端亮遇事詳明少厯艱勤養成畏謹之性晚更事任率有循良之稱念方虎之舊勳擢金吾之近侍一辭軒陛洊閲嵗時起分嶺表之麾俄感漳濱之疾宦游南海曽無暖席之淹次對西清用示挂冠之寵尚期自厚以冀有瘳嶽霖贈四官敕挂冠有請方聯次對之班易簀可哀宜厚飾終之典云胡弗淑而至于斯具官某出自勳門動遵士檢攬轡登車之寄夙著賢勞簪筆持槖之除實由親擢分五羊而作牧擁駟馬以啓行何恙之深此生遂已念世臣之無幾愴長夜之不晨忍聞垂絶之言寧愛不資之寵躐四階而進秩按三尺以疏恩用大爾家庶將豫意知贛州趙彥操知廣州敇具官某爾頃為列卿攝民曹領京邑以才諝稱今二十年矣屢試劇郡政最卓然南海巨屏實控百粵去朝廷逺委任尤重章貢壤地相接不惟通知風俗之宜南方亦久聞爾之名矣舉以命爾其為朕綏編氓撫蠻蛋使嶺海之間不異畿甸庶有以副朕不忘逺之意知靜江府趙思集英殿修撰提舉江州太平興國宫敕具官某朕擇才而用謀帥尤艱廣右去朝廷逺二十五州綿地甚廣爾以甘泉舊臣起家作牧而兩載之間內外晏然治行可覩矣方圖爾功而以疾諗丐閒甚力何耶均逸祠庭遂爾賦歸之志升華論撰示豫篤舊之恩尚勉壯猶毋忘忠報攻愧集卷三十四
