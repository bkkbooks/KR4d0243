  text: 攻愧集卷三十九
  hash: sha256:a1ff5c90ab6d277a05102dccc721aef837699cb64229ab7efcf1633b44b6c306
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_039-1a}
body:
  text: 宋樓鑰撰外制大中大夫沈揆轉一官守權吏部侍郎致仕敕侍朝甚喜方儀荷橐之聯何恙之深忽上挂冠之請初不聞曾子之疾乃欲為疏傅之歸具官某文有菁華學稱博雅頃屢登于位著矧夙備于儲寮嗣服云初首頒于召節殿邦既久終入于從班謂其數器之兼卑以二銓之重預修史策勸講經帷造膝陳謨曽未浹日抗章告老胡不待年許尋里社之間仍守天官之秩子騫之在汶上莫遂挽留公幹之卧漳濱徒深懷舊尚祇渙渥以保修名沈揆贈四官敕孟軻之致為臣方軫留行之念曽參之啓豫手忽聞將死之言撫往事以何追嗟若人之不淑具官某老于文學志在事功博極羣書而發于英詞上下千載而見之篤論任握節分符之寄所在著稱登簪筆持橐之班于時未久抱疴自列納祿言歸當危惙以奏篇眷忠勤而隕涕爰加恤典悉按彝章進官序以甚優卑賞延而不吝尚惟英爽歆此寵靈皇太后慶壽武學生加封祖父母父母定詞上舍內舍生敕具某人父某朕以祖后春秋益高乃月正元日恭侍慈皇仰奉慶禮錫類之恩溥及中外一命而上祖父母父母壽登八十者始得預此爾年方從心以有子列在右庠嘗預舍選寵以命秩祖母并母云寵以恩封祖父并父云進加命秩最為優異其服明渙以迪壽康外舍生敕具某人父某朕以祖后春秋益高乃月正元日恭侍慈皇仰奉慶禮錫類之恩溥及中外惟爾有子云有孫祖父母列在右學年登八秩寵以恩封云加進恩封父母同詞加封其服渙恩以綏吉履勝捷下名都虞候楊彥換從義郎王楫換秉義郎敕具官某汝久隸羽林積勞可紀授以勇爵實應舊章往其欽承益務忠恪王進之知德慶府敕具官某爾頃以天府二車往守武陵突不得黔已復報罷朕心憫焉晉康雖遠實高皇興王之地舉以授汝以觀汝能尚其懋哉毋替朕命大理寺丞林季友吏部郎官主管侍郎右選敕具官某郎曹二十有八莫劇于武選文書盈几難以遍察涉筆占位猶恐不暇非靜而敏者未易得其要領也爾以儒者而通世務桐川奉最再轉而丞于廷尉未久也選居星省遂典三銓鶡辨之士惟吏是聽雖有抑滯不能自伸爾其念哉勉贊而長浙西提舉黃遹本路提刑敕具官某三丞出擁使節還為郎曹者多矣以爾之賢列屬憲臺丞于中祕使事修舉宜俾來歸浙河以西服爾淸裁爾亦以靜退自處無羡于登仙就易祥刑之司以為畿甸之望表廉幹警惰偷民以不寃淸我臬事朕豈使爾徒久于外哉宗正丞鄭公顯浙西提舉敕具官某朕惟倉庾斂散之法山海摘煮之利分道置使所任甚專畿甸之間選用尤重以爾學贍而文敏外寬而內剛進丞司宗華問罙暢兼掌名表屬詞最工持節有行去天尺五酌豐歉而賦政辨能否以簡僚惟爾之能思所以稱龍圖閣直學士程大昌除龍圖閣學士致仕敕引經告老為神虎挂冠之歸念舊疏榮峻龍馬負圖之職以優耆德以表高風具官某秉操堅剛著書淵博蚤遊册府擅溫厚爾雅之文晚侍儲闈賴直諒多聞之友十年筆橐人望素隆數路麾符民庸益著高蹈囂塵之表久從香火之間年既及于從心志欲祈于納祿羽翼之資黃綺毋忘伐木之詩丘壑之有臯夔當遂考槃之樂尚祗明渙式介蕃釐太府寺主簿林思濟大理寺丞敕具官某先王用刑之法莫詳于甫刑一書有曰故乃明于刑之中率乂于民棐彜爾蚤以經術先多士嘗誦其言矣入仕朝行有靖共之譽廷尉選丞以爾為之其試所學以廣朕欽恤之意主管戶部架閣孫元卿太學正敇具官某爾以甲科自奮用為掌故之官中更艱棘蓋久而後得之退然自牧亦既再歲賢關淸選爾宜居之子率以正孰敢不正橋門之士將于爾觀焉修職郎權建寧府政和縣尉胡杞擒獲許伯祥等循兩資敕具官某警捕尉曹職也姦民寇攘爾能致之連帥有言何愛旌賞余永弼知閬州敕具官某閬風錦屏之勝士誦少陵之詩恨不得身到其地爾乃以二千石臨之豈易得哉爾起儒門萬里入蜀洊更事任雅有能稱郡寄寖高事權益重無輕民事克勤小物則可以稱此矣王寅知江州敇具官某長江上遊以潯陽為重鎮分屯禁旅控禦一面守將非它郡比也以爾三領左符老于吏治番昜之政人多稱之其殫撫字之心無改中和之舊使兵民晏然隱若敵國則不負選侯之舉矣丁逢潼川府路轉運判官敕具官某爾有志當世結知慈皇守郴陽使湖外又皆有聲績可紀今日有用之才也東川飛挽之重不以輕卑叱馭而往毋憚馳驅撫摩吾民廉察羣吏以稱外臺耳目之選是惟休哉謝源明直煥章閣知溫州敕具官某朕遴選諫臣以廣聽覽爾頃居九列旋冠宰掾察其堅正擢在騎省論事不回方嚮于用銜恤而歸念之不忘亦既即吉起鎮東土惟永嘉在左浙為望郡山川秀發衣冠鼎盛四邑相去才百里而負山並海壤地深遠人物日庶事亦滋繁非得精明和惠之人未易辦治爾其人矣堯章寓職以寵爾行俟訖外庸登進未晚尚其欽哉幹辦審計司范蓀太府寺主簿敕具官某蜀之范氏如晉王謝人物輩出文獻相望爾在今日又其翹楚也以世科發身以吏課交薦其在朝列退然若無所修綜者而人自稱之勾稽外府姑以序進勉紹家學以稱所蒙趙像之福建提刑敕具官某七閩祥刑之寄選于衆久矣以爾被服儒雅屢持使節往司宗盟聲望日著雖無預于吏治已習知其民風就乘軺車不俟臨遣聽訟吾猶人也必也使無訟乎聖人之言固未易及得情勿喜尚惟勉旃江東運副傅伯壽直煥章閣敕具官某朕惟烈祖聖學高妙昭回之光下飾萬物煥乎文章尊閣惟謹寓直之寵不以輕卑也以爾天資警敏一日千里詞章精贍連收三科登著作之庭于今十有八年矣按刑將漕益著外庸爰錫寵名以示褒表討論潤色豈其舍諸朱翺大理寺丞敕具官某惟爾祖光輔思陵爾父又登從列君子之澤未艾也爾被賞延乃能明習文法致身廷評出守辰陽奉最以歸進之棘丞榮路無壅益勉厥職無忝爾先淮西運副趙師􅋷太府少卿淮西總領敕具官某國家分屯重兵布列江滸董餉之任必選朝士臨之而金陵莫重焉爾決科自奮飾以儒雅有志事功所至辦治嘗使京口見謂敏明淮甸錢幣更張之餘賴爾撫摩調護之力民情悅服名稱益彰兹以亞卿往司調度足兵足食復于爾觀焉尚殫爾心以副詳試之意廬州修城官修武郎建康都統司中軍權副將馬再興武顯郎左軍統領毛致通武經郎左軍統制馬遹各轉一官敕具官某等合肥當淮西一面俾葺堅城以固吾圉率衆庀工汔砥于成各進厥官庸勸勞勩同安郡夫人武氏進封才人敕朕肅正宫闈日修于內則整齊品秩尤戒于私恩必有柔儀乃容序進具封某稟資婉嫕履行純和久承樛木之慈得備貫魚之列疏封名郡錫號小君知閲時之滋深嘉率職之無怠登之女御示我壼彜位幾近于九嬪爵亦儕于千石帶弓箭而待君側吾豈務于燕遊理絲枲而獻歲功爾尚勤于蠶織知建康府鄭僑吏部尚書敕司管籥于留都方資賢牧典銓衡于選部當任舊人乃播綸言載儀禁路具官某性資剛毅學力精深聲華蚤擅于倫魁名節尤稱于傑特訓辭溫厚信獨步于一時朝夕論思率主盟于公議旋由夕拜進長天官閩部選侯洊更鎮撫秣陵謀帥復藉保釐屬興宣室之思俾趣鋒車之召渴聞讜論日佇尚書之履聲器使羣才更賴山公之啓事毋庸俟駕亟遂歸班趙師程大理寺主簿敕具官某朝行簿領之官勾稽之外職業素簡惟理官設屬則有近制廷評奏當之成俾分考而訂正之遴選非他比也以爾天潢之秀儒雅自將試邑佐州遇事不苟且嘗列于朝矣其服朕命益觀汝能翰林醫效王懋兼重華宫祗應實及二年轉一官敕具官某朕祇事重華尤謹于藥石之奉爾以瘍醫奉職惟謹亦又再歲在法當遷俾升爾階其思所報俞澄知常德府敕具官某武陵為湖北名邦以壽皇潛藩地望增重總數州之戎事控五溪之喉襟未嘗不選侯而用焉爾出儒門明習文法有公亷之操得溫厚之稱嘗守髙安政適其平郎曹卿寺踐歷滋久起家剖符往鎮遐服明聽朕言無輕民事中奉大夫煥章閣待制知鄂州王信磨勘轉官敕一麾出守久著于民庸三載陟明適登于吏考乃頒恩命俾進文階具官某性識疏通材猷敏劭西掖擅演綸之美東臺髙批敕之風易鎮會稽暢威名于近甸分符鄂渚增形勢于上遊茲以年勞應于治典雖曰有司之定制是為增秩之殊榮益圖爾功以謹忠報知明州何淡母太淑人石氏該慶壽恩封齊安郡太夫人敕朕禮厚兩宫當纍洽重熙之際年登八帙奉隆慈備福之尊乃推老老之心庸廣親親之道具封某氏起自名族嬪于大門善相其夫為部使者之貴親見吾子任中執法之嚴方乘輕軒以就祿養逢國家之慶霈開湯沐之新封位正小君爰擇黃岡之勝恩隆晚歲式增彤管之華益介壽祺以儀閨閫太府少卿吳珽太府卿淮東總領敕具官某國家東巡吳會列戍江淮惟此丹陽尤為近屏護餉既久可後褒升爾儒雅雍容克勤吏道詳歷版曹司金之職遂登外府亞卿之華頃以王臣往給軍食調娛酬酢上下帖然就加惟月之班其服自天之寵勿替于舊益圖爾功迪公郎李閌父儀甫該慶壽恩封承務郎致仕敕具官某爾積行有素年過九齡有子在官實應封典授之京秩以為爾寵宫人張氏封郡夫人敕朕日聽外朝退修內治婦官具設尤嚴陛級之分恩命所加必視功容之懿具位某氏雅稱柔履選自良家事宫壼以服勞閲歲時而滋久啓封名郡進位小君仍頒祿秩之優庸示禁庭之寵其祗渙渥益懋芳猷訓武郎臨安府湖州巡轄遞鋪梁靑違滯金字牌降一官敕具官某置郵所以傳命令達章奏矧制閫動係邊事可少稽乎爾怠于職行不以時奪爾一階以懲不恪國子録陳雍武學博士敕具官某爾掌教國子蔚然有稱嘗對便朝論事尤切長于右學益觀通才武尚止戈兵實貴謀其以斯意訓迪學士庶幾得有用之才以備將帥之選焉王介國子録敕具官某士登甲科立致膴仕亦惟行誼有以稱則得之斯無異辭爾當龍飛之初居俊秀前列輔邦入幕以儒雅飾吏是能稱此科級者擢居胄監典我教事又能稱此使學者宗之則爾之進未艾也樞密院編修官許介宗正丞敕具官某司宗有丞在頌臺册府之間非列寺比故其選甚高爾蚤擢乙科嘗試劇縣慈皇聞其善政就加增秩之寵再入修門其才益著比以編摩之職攝郎省參宰掾矣兹登淸途務修寶牒益謹厥職以究爾長王溉戶部郎官敕具官某版曹掌國之大計而左民尤為繁劇州邑之訟有不得其平者率造焉思得疏通詳練之士久矣爾源流家傳緣飾吏事往使于蜀精敏有餘操贏資以蘇疲瘵嘗加詔奬召對便朝審其可用往振兹職益觀汝能夔路運判馮震武戶部郎官四川總領敕具官某朕惟武王不忘遠之意西南萬里選才尤詳矧總餉之寄動關軍國見大夫臨遣而行或不及事爾蜀國之産嘗列于朝觀風夔門能宣德意加以民曹之職就董五十餘州之賦以給營壘之師民力困矣軍須方繁足食足兵佇觀儒效太常寺主簿張貴謨司農寺丞敕具官某爾學術該通論議根據一時清流也頃試劇邑乃有能聲蓋嘗見于用矣勾稽頌臺進丞農扈雖曰曾預禮樂制作之事要須詳試簿書期會之間爾惟通才其體此意太社令陳峴太學博士敕具官某爾以紹興法從之孫自奮宏博之科宜仕于朝久矣徊翔幕府列屬容臺賢士之關師儒虛位疇咨多士僉曰汝宜溫故知新爾其自勉判建康府葛邲攺判隆興府敕由端揆以殿邦允藉保釐之略為上流而易鎮更資撫御之才爰授左符載揚明綍具官某謀猷宏達德度恢洪三世名儒益致家聲之顯兩朝異眷遂專國秉之隆矧惟舊學之臣久處洪樞之任密參廟算既兼文武之資祈解政機遂付軍民之寄加延恩而寓職視上宰以疏榮顧陳義以甚堅為相攸而攺命惟襟江帶湖之地可以優賢皆耕田鑿井之民正宜坐嘯其為十連之帥式遄千騎之行噫嘗本五兵彌覺偃藩之重周知萬務豈云斂惠之難尚訖外庸益綏休寵新除吏部尚書鄭僑龍圖閣學士依舊知建康府敕召還選部行領從臣之班居守陪京復分方面之任選用之遴中外則均具官某望重兩朝才髙衆俊以三代之文掌我帝制以六經之學格于君心頃由天官出鎮閩部旋卑保釐之寄實資鎮撫之功尚書喉舌之官固應圖舊河東股肱之郡故特召君矧荒政之方修亦遜章之沓至俯徇借留之志益髙難進之風龍閣升華用為爾寵麟符增重克成厥終益著外庸以綏渙渥知臨安府錢塘縣趙盛太社令敕具官某惟爾先正光輔髙皇配饗廟廷燕及後裔凡爾昆弟序進于朝社稷之司不以輕授靖共爾位毋忝爾先新知潼川府楊虞仲直祕閣知夔州敕具官某夔子之國號稱夔門蓋蜀川之喉襟也謀帥之重實難其人爾西南望士三持使節蜀之民服爾名已久爾亦習知風俗之詳矣潼川未行易鎮茲部寓直中祕以為爾寵民生凋瘵非他路比罷行利害汔可小康其尚勉哉以稱推擇之意進士張昉陳舜咨賑濟補承節郎敕某人荒政之修勸分為急爾出私儲以濟飢民何愛一官用勸來者承信郎榷貨務檢法使臣錢煜收趁增羡轉一官敕具官某榷山海之利以佐邦儲賞典最厚爾奔走其下亦預進官尚勉公勤思有以稱陳謙夔路運判敕具官某夔門為蜀要衝川陸險絶刀耕火種民生甚難將輸之寄甚重郡計實仰給焉非通敏之士不在茲選以爾有用之學洊試劇繁以南蘭陵吏課之最領湖右斂散之權茲為朕行調度一道撫惠疲氓務去泰甚使田里得以安其生則朕之顧憂寬矣知台州徐子寅廣東提刑敕具官某朕念廣東憲臺之重疇咨其人思得資髙而練事法明而尚寬者居之大臣謂爾為可且曰是嘗為卿為部使者帥維揚矣中更退間起為漢東而治辦丹丘之政民安而歌之使持節以按嶺海其必有以稱欽恤之意朕曰俞哉式遄其驅毋替朕命奉議郎提轄榷貨務謝儼收趁增羡轉一官敕具官某榷管之繁總于京邑爾不欺于職濟以變通歲入之資坐致贏羡可無褒賞以勸後來其祇增秩之恩益謹有司之守提點坑冶鑄錢趙不迹淮南運判敕具官某朕惟外臺飛挽之司莫如東淮委寄之重兼憲使刑辟之任當使客冠蓋之衝欲求通才得我賢族以爾奮由科級尤精吏能擁麾棨于三州屢書課最總貨泉于六道式阜邦財俾行邊疆進專漕計尚思忠報益著外庸文思院造皇太后尊號册寶監官從政郎陳庶監門儒林郎黃概各循一資敕具官某朕以月正元日奉徽稱于祖后白玉之牒鏤刻甚工黃金之璽一鑄而就雖曰有司之職實惟蒞事之勤各進爾階庸示嘉寵幹辦審計司劉誠之太常寺主簿劉德秀大理寺主簿敕具官某等列寺之屬皆有勾稽惟容臺禮樂是司實預討論之事惟廷尉刑獄至重實分讞議之司銓敘人才二者尤不可輕也以爾誠之聲稱籍甚持以靖共爾德秀文采蔚然不事表襮兹庸並命其進未央尚體優恩各揚乃職福建提舉張濤提點坑冶鑄錢敕具官某國家分道遣使各揚乃職惟貨泉之寄總六道百郡之權歸于一大有司視漢之鍾官辨銅其重甚矣非得通儒不以輕卑以爾抱負不凡詞章精贍出入朝行見謂老成使于二部皆有聲績舉以命汝其為朕謹調度察姦欺使邦財阜通朕豈久汝于外哉宋之瑞福建提舉敕具官某爾以儒學之秀三仕于朝滋嚮于用而又引去朕亦念之七閩斂散之司職優而事重疇咨膚使起爾于家士之宦學不以仕已為喜愠上之用人豈以中外為重輕爾尚勉旃以俟光寵從政郎揚州司法林蕣搜獲銅錢循一資敕具官某邊郡嚴錢幣之出而吏多不虔爾能摘狀遂正其罪選階之進以懋爾勤四川量試宗子伯揚時敏補承信郎敕某人爾在屬籍遠處蜀道能以文藝優占科級錫之武爵尚其勉旃鎮江都統閻世雄管軍五年職事修舉轉遙郡刺史敕具官某國家分遣禁旅列戍江城京口捍蔽行都最為要近爾以宿將坐總戎韜威名隱然壁壘靖謐五年于此宜賞賢勞遙刺侯邦是為異寵益思忠報毋替厥初慈福宫內人安化郡夫人方氏彭原郡夫人高氏淸河郡夫人鄺氏並轉國夫人胡氏蘇氏張氏並封郡夫人敕朕承纍洽重煕之運奉隆慈備福之尊疇咨女御之良爰卑恩光之渥具位某氏稟資婉嫕植行柔嘉選在掖廷蚤備婦官之列事豫祖后寖更歲籥之深屬慶典之告成演褒綸而逮下進封大國云啓封名郡胡氏蘇氏張氏益懋小心煥章閣待制趙不流換正任承宣使知大宗正事敕擁東越之麾方騰吏課糾成周之族有賴宗英優加留務之班式寵從臣之舊具官某氣和而智敏屬近而行尊夙分帝胄之華寖歷仕途之久政成京邑嘗進二于司空身處輔藩訖褒升于次對來奉便朝之覲俾專屬籍之盟示我異恩超亷車而授職藉卿宿望壯磐石以承休是曰當才奚勞多訓修職郎鄭守仁賀正旦使親屬循一資敕具官某爾父頃使敵國爾雖不預行役而善于子職使行者不內顧而居者得所安勞還之初亦被醲賞舉行于今尚其祇服修職郎李良臣奉使書狀官循兩資敕具官某歲遣信使修聘殊鄰凡預驅馳均有勞還之賞矧以鉛槧為職潤色使華疊進選階于汝何吝慶壽詔書宗子年八十以上使臣年八十以上願致仕者並轉一官定詞敕具官某朕以正月上日奉祖后萬年之觴霈澤四方及人之老爾在屬籍春秋益高進以一階用華晚節臣使進官一等是為優恩云爾在右列引年告老宗子汝种與昉補承信郎敕某等爾在屬籍逢時覃霈能以文藝自取科級豫之武爵尚其勉旃淮東提舉陳損之創立紹熙堰除直祕閣敕具官某水利本以惠農常平使者之職也爾使淮東善于其職建議任責迄觀厥成伻來以圖如指諸掌閉縱隨時條流有序綿亘及數百里之遠灌溉為千萬頃之利農商俱濟旱潦無虞使客漕運之往來咸有賴焉謝安為埭人以召伯名之爾通敏有餘不擾而辦名以紹熙淮民不汝忘也寓直中祕以寵爾勤朕所以待汝者何止是哉姚矩知雍州敕具官某南晉深入嶺右控制蠻方唐則分建五管今亦併護數州權任亞于連帥選侯顧不重哉以爾蒞官不苟有趨事赴功之心治施與靖咸有聲績班班可紀今又命爾以此邦固圉寧民尚其勉哉大理少卿許及之權禮部侍郎敕廷尉天下之平洊居卿列宗伯春官之二徑入從班是曰異恩實由親擢具官某才兼數器識綜九流蚤以多文之儒務為有用之學方彈冠之伊始巳脫頴而不凡禁闥拾遺得真諫官之譽藩方作牧有古良將之風比因奉最之歸俾簉明刑之任惟慶霈既行之後當郊禋再舉之時儀曹久虛禮典誰屬釋爾平反之重參豫制作之司有功過于張之賢朕所知者虞舜命夷夔之事汝則兼之益勉告猶斯為稱職四川茶馬朱致知京西運判敕具官某襄漢將漕之寄雖所部不過數州而實兼諸使之職控制邊要仍居上遊不輕以授人也爾起世家能以儒雅飾吏事嘗守申伯隨侯之國又三使于蜀矣萬里召還復卑華節惟爾鼻祖致身九卿以桐鄉之嗇夫為漢世之循吏爾其苗裔當慕前烈以此位而行志豈不易于一嗇夫哉訓武郎監榷貨務陳仲堅收趁增羡轉一官敕具官某榷管之重總于中都爾能其官歲入贏羡加之命秩以勸後來倉部郎官鄭湜大理少卿敕具官某國家刑辟之寄總于廷尉而職則分任焉使習憲章者視獄之成而審聽囚徒必命儒者臨之其旨深矣爾少而發藻善為詞章立朝有鯁亮之稱治民有循良之效總餉江左威譽日聳郎潛未久卑爾臬事能深知設官分職之旨斯無負今日推擇之意往贊而長亦惟欽哉起居郎陳傅良祕閣修撰嘉王府贊讀敕具官某漢四皓起商山羽翼之功千古稱之朕則歉焉使高帝能以卑辭厚禮聘之以輔其子則善矣爾以一世名儒羽儀于朝抗議不回引去甚亟爾與吾兒遊舊矣爾既厭直承明之廬豫亦閔勞以侍從之事寵之祕撰之寓職來為朱邸之賓僚尚遄其行庸副虛佇帶御器械霍汝翼復元官轉觀察使敕具官某侍御之臣苟曠瘝而必罰歲時既久俾牽復以自新爾舊服禁嚴雅稱詳謹佩侯邦之組綬官簿寖髙屬宸陛之櫜鞬戎容甚肅頃懲慢弛知務省循況更政典之修徑授廉車之秩益思恭恪以對寵光文林郎張允中該修壽皇玉牒循一資敕具官某寶牒成書嘗頒醲賞汝供刀筆亦與進官毋曰例遷其思所報前知建昌軍趙彥禮拖欠月樁錢降一官敕具官某盱江本江右佳郡一人壞之毒流至今爾自力于政而承積弊于二十餘年之後給餉有闕無所歸咎稍鐫一秩以警後來沈合知嶽州敕具官某嶽陽據荆楚之要郡雖小而地望實重焉爾淸約詳練資歷寖深惟爾兄舊鎮長沙威望凜然父老類能道之試郡云初毋忝家聲則知共理之意趙不逖江西提舉敇具官某爾頃以吏課之優為郎起部出守輔郡蔚然有聞江右斂散之重俾爾持節以臨之昆弟三人少則俱列于儒科今又分道而為使者遠有光華宗盟之美談也其勉爾事以稱所蒙攻愧集卷三十九
