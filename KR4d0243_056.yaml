front:
  text: 攻愧集卷五十六
  hash: sha256:95f7e606a499268afb4c3447f900a7e54650f86941960e834486afd0d99f41e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_056-1a}
body:
  text: 宋樓鑰撰記遺老堂記乾道辛卯客授來東嘉一日衣冠會于黃堂廡下中有蒼顔白髮目光瞭然者心竊敬之人曰此高密郡王曾孫崇道公也遲頃俄揚笏相向字呼我家少師問于君何屬鑰拱而對曰先大父也因言在京師時相與遊從如昨日事愧晚出不及知自爾時時造門聞話言祖宗承平餘百年事之廢興人物之賢不肖內之朝廷典章近之干戈轉徙之詳歷歷言之嘆擊不暇若宗正屬籍之盛他人按圖莫能究舉以叩之了辨如響年踰八十視聽不少衰氣節剛徑門無雜賓獨以事契故厚我一日謂鑰曰豫家素貧僑居佛廬他無所用心左右圖史且以永日近闢屋數楹取趙臺卿之言榜以遺老子盍為我記之鑰曰臺卿非公比也彼嘗詭姓遁身以逃鈎黨之禍晚焉著書詞思遺老顧豈得已公以當世宗英嘗驅馳戎馬間得敵要領歸報德齒俱尊為趙氏祭酒名堂之義不應處此漢子政自以宗室遺老言事必盡今天子廣覽兼聽無間疏戚親親賢賢尤所篤意間平之懿逮無遺賢公于古事今事問無不知豈不能為更生之為而以臺卿自處耶公一笑併以為記會稽縣寬簡堂記會稽縣治之東有地三畝所舊有一堂以溫陵曾魯公嘗為之宰名曰衮繡嵗久圯壞知縣事歐陽季思伋撤而新之前軒後廡又為亭三間以臨河上巖桂官梅分植其間棟宇宏敞丹堊煥然經始于慶元四年孟秋落成于十月之望求名于余為之名其堂曰寬簡亭曰休心且語之曰文忠公君之四世祖也為郡以寬簡不擾為意故所至民便既去民思或問公為政寬簡而事不弛廢何也公曰以縱為寬以略為簡則弛廢而民受其弊吾之所謂寬者不為苛急爾所謂簡者不為繁碎爾此士夫均所當法也君承家傳為江右甲族而今之在仕版者才一二君仕中都以才諝自見諸公貴人薦之朝來治劇邑其可不以此言為法乎因為書其扁記其説使刻諸石以自勵且以示後之人縣壯而賦重民為之困官不勝繁君能以剸劇之餘力及此且再書考矣尚其勉之行百里者半九十毋忘此言後來者又能率是而行之豈惟文忠公之言可寶萬世邑之民其庶幾乎或曰臨下以簡御衆以寬此古之格言也然今之作邑者戴星出入焚膏繼晷猶恐不逮寬簡之説果可行乎曽不知為單父者彈琴而治宰山隂者晝而垂簾其必知此矣故文忠之為青州揚州南京皆號大郡公至三五日間事已十減五六一兩月間官府如僧舍豈非明效大驗乎文忠之宰夷陵為至喜堂記有曰聽事之東以作斯堂度為疏潔高明而日居之以休其心君于公退之餘吏散庭空休心亭中以養吾之神以待事物之至惟寬與簡將自此出本無二道也昌國縣學申義堂記東陽葛容甫洪為昌國令葺縣庠之講堂名曰申義求書其扁余既喜葛君知政之先務又樂其名之佳大書以遺之又欲為之記余分教永嘉時嘗作序齒文以示諸生其略曰孔子稱甚矣魯道之衰也洙泗之間齗齗如也説者謂齗齗為相遜孟子曰謹庠序之教申之以孝悌之義頒白者不負戴于道路矣夫洙泗之間行者相遜何以為魯道之衰謹庠序之教何預于道路之負戴者及究其説漢地理志云魯瀕洙泗之水其民涉渡幼者扶老而代其任俗既益薄長老不自安與幼者相遜也徐廣又曰蓋幼者患苦長者長者忿愧自守故齗齗爭辭所以為衰也想其盛時老者晏然如父兄之役子弟無復相遜子所謂老者安之殆為此也孟子亦謂孝悌之義既申則頒白負戴者少者自當代之矣噫後世教養士子以科舉得人之多寡為庠校之盛衰者與古意遠甚昌國故甬東之地民以漁鹽為業近嵗儒風日興而猶未盛葛君欲崇教化以善其俗一聞余言則曰此名堂之本意也始余從弟鏞尉東陽而歸余啓得人之問以容甫為稱首兹為鄉邑治聲卓然又將興學化民以幾古人之意誠非文法吏所能為者齊變至魯魯變至道顧不在兹乎鑰既為之記而命鏞弟題其上奉化縣恕堂記奉川余鄉邑也比因掃松見趙令君會方禱雨相與過恕堂上蓋縣齋便坐且折獄之地也棟宇一新而戶册不稱令請改書之且出舊記相示因謂令曰治獄固貴乎恕而所謂恕者非止用于此也孔門之徒最為善問子貢猝然問曰有一言而可以終身行之者乎亦難乎其答矣夫子不曰仁不曰義不及其他而曰其恕乎兹豈夫子一時姑以應弟子之叩擊哉蓋其平日踐履之實故其言藹如歷萬世終無以易此又從而言曰己所不欲勿施于人大哉恕乎曰違道不遠曰求仁莫近一貫之傳亦曰忠恕而已矣制字之初以如心為恕大率以我之心如彼之心則為恕矣若彼亦能以其心如我之心則天下豈復有他事哉世之言恕者曰我能臨民而輕其笞箠追科而緩其節目是皆恕之一端何足與言恕之大全也君子學道則愛人人能言之小人學道則易使則鮮有能説者此亦恕之説耳君子役人者也以吾心如下之心安得不以愛人為務小人役于人者也以其心如上之心安得不易使且以至微之事言之令君坐官舍而有以謁入者心欲卻之苟曰彼之來亦良難豈非有急以相投有事以相告耶則吾之迎之也必不以為憚驅車以出謁欲見主人而不出心必愠之苟曰安知其家不適有故乎姑待之則吾之心必釋然矣推此以往仁不勝用寧復有乖爭陵犯之患哉令君曰所未聞也方欲以記為請願徑書坐中語以詔後之人且曰邑有吳氏懋者既以一力葺理牢戶內外俱備又以其餘材重建此堂願託名焉令君名彥綰祕閣修撰右司公之子以清謹守家法以儒雅飾吏事明恕而行終始如一為邑中建惠政石橋分為雙洞壯麗絶出吏民以為昔所未有誠信及民上下響答此堂其餘事也沖和堂記古有宗法大宗小宗具載禮經聖人之用意深矣陽羡周孝侯廟碑後有宗簿宗尉溧陽史氏舊有家譜每一院各有簿尉之職蓋是時宗法猶在意必擇其族之有才力者為之若有司然餘姚虞氏實世南之裔有為農者故譜尚存自受氏以來莫不可紀如漢之詡吳之翻凡有名于史者皆略載其行事歷晉宋齊梁陳隋皆嘗上于朝而名臣為之修纂齊則王儉修之他悉類是聞玉山魯氏有譜亦然唐史所載甚詳至武氏而譜法大壞唐人猶能各守其閥閲今則亡矣本朝惟一二名門如杜祁公上世自三代春秋諸侯之子孫千有餘嵗不絶世譜蘇老泉之言曰情見乎親親見乎服無服則親盡親盡則塗人也吾之相視如塗人者其初兄弟也兄弟其初一人之身也悲夫一人之身分而至于塗人此吾譜之所以作也鑰嘗讀而重悲其言故族黨雖衆縱不能與之如同氣率體老泉之言以待之山谷先生文章妙天下學問冠百家而至性尤為絶人東坡先生薦之曰孝友之行追配古人其見于詩如食蓮有感等語皆藹然仁義之言于元明知命情義尤篤晚謫宜州患難極矣學道純熟不知有死生之變與再從弟靖民判官書有曰吾儕所以衣冠而仕宦者豈已力哉皆自高曾以來積纍偶然沖和之氣在此一枝其實相去不遠幸深念之嗚呼此言之發出于中心其視羣從功緦之親豈有厚薄之間秖此一語可以睦宗黨可以厲風俗可以寬鄙而崇薄聖人宗法之意盡在是矣先生之諸孫犖既刻之石名曰沖和帖又建堂于家仍以沖和扁之皇太子為之大書犖又求鑰為之記顧骩骳之詞何足以發竊嘗佩服斯言故勉書之犖以才業之美由郎曹宰掾為直顯謨閣兩浙路轉運副使其他在仕籍者多以治行見稱故家簪紳之盛在今日未有如黃氏者茲非沖和一枝之餘慶耶清芬堂記皇朝以忠厚為家法親睦九族高視千古高宗中興收用周宗以強王室如令畤令詪子嵩子晝子淔皆列之法從或紹爵郡王士樽士籛等又皆極祿位之豐更化之後首擢令襟襲封安定獨殿諸老寵眷隆渥特許非時見普安郡王倡和動盈卷軸王聖性高邁學問夙成篇章璀璨屬聨尤工其間理趣精深非若文士徒為華藻而已紹興三十二年孝宗受內禪而令襟不及見矣一子子覺以御書詩二軸裝潢以進孝宗復親灑翰墨題其一云朕在藩邸令襟以宗室老奉朝請時有唱酬子覺今標軸來上想清芬之如在復書賜之其一云此卷皆朕與令襟唱和詩令襟亡矣覽之愴然先是祐陵朝諫官江公望以抗直敢言有重名于時而又學佛超詣每謂與吾道合令襟舊與之相好得其四書俱是理到之言前後名公卿跋語甚衆嘗以進呈孝宗又書其後有曰觀江公之言其利濟方便超脫生死佛道蓋如是歟超然居士果能允蹈卓爾不羣信乎宗藩之領袖也高山仰止聊書卷末詩及此跋又書舊諱至十有一超然蓋令襟自號也子覺之長子伯禽袐藏于家亦謹題于卷尾伯禽之子師濟舉以示臣鑰敢整冠再拜而讀之仰而嘆曰皇乎盛哉臣子之家寶先日所得奎畫者有之矣未有炳曜傑特昭回之光連篇纍牘如此之夥者也惟安定天資穎悟加以篤學所交多世之名勝樂善好施胸次豁然中間嘗以客得禍終不自悔惠人利物不負公望之言寓居柯山臣外祖太府少卿汪思溫為守與之友善公望所謂事事方便物物利益者外祖蓋終身誦之後二十年先臣贈太師岐國公璩為監征公知其貧而廉貸私錢三十萬以濟臣家之歸先臣一介不取雖已償之至今懷感終不敢忘此固公之細事敢附見于此抑使人有以信公之實行也師濟將取清芬二字以名其所居之堂而求記于臣臣老矣學落不能馳騁于藝文之圃輒直書始末以著君臣相與之深庸詔後世為安定子孫無窮之榮且以見前良議論詞采更相映發為一時文獻之盛云揚州平山堂記平山堂東南勝處也長淮之東地多堆阜苟見山處皆以得名于斗野山在他郡何算自泗上南來者望而首得之故米寶晉有第一山之詠儀真西北登高見建鄴諸山而有壯觀之勝揚州大明寺所謂自有宇宙便有此山而千載無領略之者六一居士一覽而得之撤僧廬之敗屋作為斯堂而風景煥然遂名天下公以為占勝蜀岡江南諸山一目千里而王荆公亦謂一堂高視兩三州者也天造地設待人而發滁之醉翁峽之至喜皆以公得名而揚又居南北之衝士夫往來喜至其下自堂之成所謂迷樓螢苑蕪城九曲之舊亭月觀吹臺案一本作風之舊琴室俱在下風矣公之記峴山亭謂峴蓋山之小者而其名特著豈非以其人哉羊叔子與杜元凱是已亭屢廢而復興者由後世慕其名而思其人者多也此堂亦幾是耶然而物有盛衰承平才更十七年而堂巳圯壞直史館刁公約新之沈內翰括為之記紹興末年廢于兵燬周二卿淙起其廢而洪內翰邁記之近嵗趙龍圖子濛嘗加葺治鄭承宣興裔更創而增大之開禧邊釁之起環揚之境本無侵軼而庸人債帥畏怯太甚始以大言自詭事未迫而欲遁遽假清野之名縱火于外負郭室屋延燔一空而堂遂為荆榛瓦礫之場于茲數年矣嘉定三年寇攘既息而旱蝗飢饉之餘瘡痍益甚皇上思得人以鎮撫之大理少卿趙侯方以閩漕之節徯次于浙右遂除右文殿修撰起帥于揚遠繼叔祖龍圖之軌下車之初日不暇給簡節疏目恩威並用教條井井軍民帖服邊鄙既已不聳而年穀順成寖復樂土之舊郡城堡寨本俱缺案此下各攻愧集卷五十六
