front:
  text: 攻愧集卷十二
  hash: sha256:e4d4b156ea484aae237fb3d5c29987e09b6d0ecf691468dc043f2af8ea042b28
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_012-1a}
body:
  text: 宋樓鑰撰今體詩殘月如新月近晦月猶在蕭騷夜向晨已殘幾欲盡忽見恍如新老桂沈清影餘輝扣半輪纖纖兩頭玉皎皎一鉤銀明似哉生際光疑太逼真妝樓誰起早深拜誤佳人炙背俯晴軒炙背情方適融霜日正暾何妨憑曲几相與俯晴軒愛景欣亭午閒身得負暄映簷成白醉挾纊謝竒溫豈止寬寒色猶思奉至尊桃花滿肌骨佳句憶王孫置酒沛宫漢祖功成後時因過沛宫還鄉上心喜置酒故人同高㑹延遺老酣歌和衆童窮歡新笑樂起舞舊英雄慷慨悲遊子軒昻賦大風永為湯沐邑何用築新豐天寒割蜜房場圃功初畢天寒樂嵗穰山居收蜜課簷外割蜂房弱羽依晴日纖腰怯曉霜鉛刀開戶牖棘七薦甘香作室何時再趨衙未用忙百花辛苦處今日為君嘗黃知橘柚來一舸放長江遙林砥處黃自知來橘柚先已照滄浪緑葉凝烟密金苞射日光相迎蒼縣雨暗識洞庭霜味詫江陵種庭垂禹廟荒何如船上看數里更飛香背水陳十里當勍敵臨機事寖危萆山兵已遣背水陳尤竒前澤書誠有行權我獨知正須投死地何用惜羣疑拔幟終如約傳餐亦應期孫吳非紙上方略要從宜鯤化為鵬鯤大幾千里揚鬐氣日增一時俄化羽萬古記為鵬鱗族疇能比龍門不足登天池將轉徙雲翼快飛騰怪矣齊諧志壯哉莊叟稱鳶飛與魚躍曽不事誇矜一月三捷勇甚鷹揚將身從虎穴探六師心不二一月捷凡三戎卒時非久邊庭戰已酣神戈窮逐北露布屢馳南貔旅彌思奮狼心敢肆貪七旬有苗格較德可無慚清泉潔塵襟騷客事幽尋清泉一派深居然浮爽氣聊用潔塵襟徹底明蒼翠澄波漾碧岑應添山澤趣盡滌市朝心洗耳何妨聽吟詩更喜臨至哉天下樂穩坐讀書林物色訪嚴光肥遁推嚴子招賢仰漢光營求思舊學物色訪羣方聘問期終得形容尚未忘羊裘方審識蒲乘遂搜揚不羡雲臺繪還歸釣瀨傍高風今尚在江水與俱長冀北馬羣空冀北雖多馬知惟伯樂工秖因良種去便覺舉羣空遍視千蹄衆先收八駿雄漫聞餘布野無復見追風騏驥方奔逸駑駘豈混同倘非承一顧鳴意孰能通習馬長楊强漢承平後兢兢武不忘整師臨五柞習馬向長楊冀野來騏驥天間出驌驦驤騰射熊館馳驟華山陽輦路千蹄穩瑤池八駿良上方勤閲武願賦翰林章飛泉漱鳴玉翠巘幽深處飛泉觸石鳴跳珠無定態漱玉有餘情雨落千潯溜風傳萬壑聲玲瓏鏗璧韻激濺破瓊英漢水思遺珮滄浪想濯纓何須韓吏部聯句賦琮琤表兄陳安行遷右司仲兄遷大理丞余遷太府丞舅氏適齊寄詩為賀次韻東孰談經嵗月輕外家生長復何營王生此舅若無有楊惲一書安得成首寄新詩欽厚意卻思往事念平生當時更荷外祖母幼惠尤憐盛氏甥為親敢說宦情輕公退委蛇懶自營朝路一時偕寸進適齊新句已先成圉師況復今同里武子非惟愛外生舊日阿童今欲冠此恩更欲到彌甥適齊挂冠次韻致仕吾非不待年禮經自合許求田秖圖徑取衣冠挂不願更尋香火緣富貴鼎來先避地是非叢處獨翩然鄮峯相對兩真隱共仰元台為大天世事相牽無了期平生待足是何時拋官不作九閽夢納緑尚餘三徑資紫綬金章寧復戀黃冠野服自相宜耳根贏得長清淨理亂從今不用知余初除西掖適齊惠詩以二甥相繼縯綸為喜安行表兄貽書喜溢于辭謹次韻為謝竝屬安行漕臺生處寢之牀叢桂還分一葉芳紅藥階邊懷老謝桃花觀裏憶劉郎首煩賢舅書增喜想見慈親色更康無忌安能真酷似願從外氏借餘光敢謂封倫據此牀幸從科級紹餘芳紫薇繼直中書貴叢桂猶為同舍郎太史書傳得楊惲渭陽情厚為秦康外家宅相君餘事魚目何堪比夜光余丐郡得婺適齊以詩相迎次韻風際端宜鷁退飛青雲高處有危機屢遮西日成何事幾向東風詠式微塞馬云何真是福鱸魚正不為知幾休論池上翩然舉且奉潘輿得賦歸適齊約訪王卿正己巳而中輟次韻歸來親戚話通情準擬流光得再行已荷適齊容接武敢從酌古遽渝盟烏衣門巷人非遠緑野樽罍計未成官已得閒身未暇因仍恐或過清明謝太守送雪次適齊韻一冬秖見曉霜寒未得飛霙萬里看多謝黃堂贈圭璧欲從乳竇倚欄杆簾高安有冰成柱坐久空餘水在盤嵗晚願呈三白瑞要觀積玉滿林端清高閣觀雪次適齊韻衝雪上層閣真成清且高主人風節峻坐客笑談豪泛棹訪安道賦梅思水曹好因窗映夜痛飲讀離騷真率㑹次適齊韻喜奉潘輿得退身烏衣相㑹總情親樽前正好醉千日林下何妨見兩人閒暇止應開口笑詼諧尤稱掇皮真夜歸更作驚人語舅氏從來筆有神楊聖可棊集余方歸自桃源不及預次適齊韻屏處尤便野性慵故人何幸得相逢賦歸敢慕陶彭澤自免猶希邴曼容棊酒交歡情正洽江山得助景方濃嗟余誤入桃源去歸路滿城聞晚鐘汪達可招遊臧園次適齊韻城下名園稱老懷乳鶯飛燕共低徊寒梅送臘曽先到嫩緑留春喜再來眼底芳時能幾許樓頭衙鼓漫相催主人好事不嫌客素壁揮毫又一回滿架酴醿愜雅懷更添林下紫徘徊平湖不怕重門阻勝賞何妨後日來酒興已隨斜照遠詩情無待片雲催黃昏鼓棹欲歸去望望烟林首重回士穎弟作真率㑹次適齊韻何羡祖希情好隆朱陳纍世意交通舅甥巾屨頻相接兄弟樽罍喜更同參坐幸容攻愧子主盟全賴適齊翁日來愈得清閒趣斗酒不妨時一中弔王卿之喪次適齊韻去嵗同登百尺樓相期春晚更重遊舟藏大壑夜俄去橋跨清溪花自流五紀情親真是夢四山風物總成愁一朝千古尚何及空使文皇嘆薛收喜雨次適齊韻并呈郡守吳居甫一旱禱而雨此心天與通為霖三日足起舞萬家同破塊朝方爽翻盆夜正中隨車真響應巫覡又何功洗印日無幾載芟春已移龍神來鄮嶺香炷爇流陂自是受門里許堪為學稼遲洋洋添野水已足樂吾飢雨師爭自效風伯尚何施膏澤由分閫空餐愧奉祠農功今可濟水利更無隳喜雨無煩記行人口似碑安行表兄除華文閣直學士奉祠次適齊韻為賀屢報銀臺給事中忽聞喚渡浙江東長安幸免手遮日圓嶠莫嗟船引風廪繼真祠身暫逸班聨內閣眷方隆且歸同伴適齊老便看鋒車召此翁送安行表兄葬次適齊韻深沈仙洞鎖神清萬壑松聲不似晴宿草他年空悵望生芻今日寓精誠山川氣象渾如舊劍佩風吹儼若生猶記玉音稱酷似始知無忌乃其甥尋春次適齊韻一自東皇天上來坐看芽蘖起枯荄化工潛有洪鈞轉春事何勞疊鼓催晚景鬢凋寧再緑去年花謝又重開賞花攜酒那容緩走遍郊原莫便回曉來陌上雨班班同社相將便出關席地亦堪尋酒所得園徑與坐花間從教多病須行樂任是清貧也破慳門外紅塵深幾許誰人能得此身閒次適齊韻十絶休官人生寧問草堂資乞得閒身且徑歸慚愧舅甥俱就隱淡然相對兩忘機發書故人惟賴幾行書今日誰能更訪吾舊日熱心今就冷向來已得自揶揄見客客至何妨送與迎門前羅雀亦人情可憐寒士猶相望時有饑來栁絮輕出謁杜門卻掃寖多時閒傍人門亦漫為茶竈筆牀烟浪去自疑身是老天隨赴㑹此身未老已先閒到處時時盡醉還更欲相邀蓮社客共尋精舍上孱顔病起老去情懷百不宜上樓腰腳覺舒遲適齊異禀人難及病起精神略不衰安心但使心如水在槃坐令四體自然胖有人來問安心法將汝心來為汝安讀書佚老無如大字書聊將遮眼度三餘有時忠義忽相激間遇包胥與子胥染鬚染鬚欲學少年時笑殺當年榮啓期公道世間惟此耳年來猶幸不相欺修養聞道壺中别有天能將俄頃比千年千年俄頃俱成夢只任天真卻晏然同年鄭貴溫寺丞直華文閣致仕次適齊韻為賀先生久矣愛吾廬絶勝揚雄宅一區賸有珠宫來海石不妨茅屋繞畦蔬來書已許尋前諾結社方將約並驅更欲相邀預真率車公豈可座間無倦遊歸騎自吳門欲上封章叩帝閽俞旨肆頒旌素節華文進直示優恩淵明妙句羣賢和疏傳佳名萬古存加我數年祈謝事此心難與俗人論次適齊韻四絶初得曽孫女外子惟知愧可攻羡公八十未衰癃曽孫喜見新文褓尚想當年擲鏡翁茉莉花江南創見喜孤芳見說閩花遍海鄉安得一居香盛處帳中巧作寶毬妝從子澡滌築居荷池上樓臺牆宇家家月楊栁荷花處處風最喜兩涯相映帶一時倒影入池中山亭納凉不嫌西照為朝曦城郭誰知住翠微天幸外門才咫尺欲陪杖履夜忘歸次適齊韻五首山行野老問年田夫笑把褐衣牽莫問壺中别有天齒髮雖殘渾未覺精神愈勝果何緣公言已老偶能爾我本無心只自然再禱百分才及一定因椿壽八千年堅鄭貴溫棊社二公休致我來歸儘可同裁隱士衣此已屢謀登竹所君其無吝造城扉人間厭見手翻覆樂處須當頤指揮凉氣一新宜近酒盍簪莫似向來稀秋凉有感公看魚躍與鳶飛鶴脛雖長斷則悲世事不容人苦較秋風自有葉先知青奴難免交新絶素扇寧須手自持宋玉賦篇終未達不如老子笑成詩諭悲秋者黃雲萬頃一時收喜見高空風露秋嵗事及今將告畢人生到老盍歸休固知景物能興感亦有癡人苦過憂胸次果然無一纍豈容秋月使人愁舅甥賡酬之樂神明未覺晉公衰老母尤欣兄弟怡范寧王忱無許壽牢之無忌不聞詩秋風對酒勸酬處夜月乘橋來往時但要兩家同此適不須更遣外人知八月十四夜攜家泛月次適齊韻月到平湖金作波一城惟此占秋多水晶宫裏清無比何用重登漢馺娑九秋風月正分平盛滿水晶分外明老子此行端不惡夜深幾得聖之清稍先一日是中秋行遍芙蓉與菊洲作意安排卻非適不如乘興徑行舟猶記年時看水嬉不如此夜月相宜仙翁一醉非塵世為問姮娥知未知草草真成一段竒比鄰非不借餘輝板輿何敢侵風露略望簷間且勸歸次適齊韻十首懶學仙家煉火還但欣晚節在林間鴛行免奏三千牘駑駕難參十二間短艇有時浮緑水輕輿到處賞佳山莫言冷淡為生活冷淡終然無後艱秋來病體費支吾深閉柴門臥草廬藥裏多尋醫者問酒樽寖與故人疏特須勉强陪來客未免辛勤答遠書此外儒生真氣習簡編猶欲趁三餘大率舟行岸自移機緘何必更相思雨餘坐見水三尺雲淨喜看天四垂荷沼已殘霜後蓋桂林初綻日邊枝閒中氣味深長甚問卻西風總不知幸堪擊壤樂清時衰病情懷百不宜秖好灌畦陪漢叟更欣學圃慕樊遲逢人草草須傾酒得韻匆匆且和詩琴意高低猶自適高山流水久心知甥舅相尋向酒邊相忘情話更怡然人言難遇雙延閣自愧叨聨兩大天只覺光隂詩裏過何妨枕簟醉時眠此中别有真消息莫為人間醒者傳從來憂道不憂貧晚向閒中得此身直把宦途如夢過任他世事似棊新坐間可說舊時話眼底幸多同社人賡唱本求閒燕樂莫誇末路費精神自憐鶴髮奉慈親舅氏還欣託比鄰已向雲間收倦翼甘從波底作潛鱗果然松菊連三徑誰謂神仙隔一塵野服相從成二叟不須更現宰官身笑他咄咄向空書既老投閒計未疏釜裏有魚長自足門前無雀是吾居休論仙子生塵襪莫問高軒織翠裾百念已如灰樣冷更無驕色與人鋤秋宵坐到玉繩低歷歷明蟾數桂枝重露半翻蕉葉徑好風時颭豆花籬不妨起舞弄清影何用撞鐘誇小詩濁酒困人垂欲睡更揩病眼一揚眉秋到先生舊草堂凉飆林葉已飄黃漸看天宇清霜肅更覺人家白晝長歷世已經三折臂坐愁何必九回腸世間舊事消磨盡秖有詩情未遽忘客省中次適齊韻三年此日綺筵開盛意勤拳不待催豫約行人須已集先欣數客肯俱來詩筒才到先賡韻酒興方濃莫算杯更欲秋深窮勝跡鄒枚後乘可容陪花若開時定自開芳心深靚不容催上人又有新詩出佳客應尋舊雨來樓上已聞香撲鼻堂前儘放酒盈杯高燒銀燭照花睡便到更深亦願陪定數無過偶與竒達人循順更安時不于椿菌量長短豈為彭殤較疾遲雖是一時身有疾行開九秩壽無期外生六十頭先白杖履相從最得宜戲和適齊絶句三首脫索纒縳千遭趁酒巡環觀巧手競稱神莫言名利如韁鎖猛烈抽身亦在人藏擪儘教逞技儘多般畢竟甘心受面謾解把人間等嬉戲不妨笑與大家看傀儡假合隂陽有此身使形全在氣和神王家幻戲猶堅固線索休時尚木人晝寢正酣適齊以二十韻詩來亟為次韻老氏正求知我希吾今老矣更何之極知仕宦皆由命縱有功名已過時覽鏡形容寧復我還鄉交友定從誰慈親多幸方難老舅氏猶欣未覺衰教誨至今仍似舊襟期暗合自相知新詩必使篇篇和勝地還容處處隨晝永劇談俱喜聽夜深清坐更忘疲素欽行已初無玷願學持心不自欺紫槖清班叨預列黃金橫帶忝同垂六旬顧我猶加懶八秩如公尚自持但仰三尊知共慶孰云十拗敢輕嗤無情到此方為達省病從他不用治世事只將同蝶夢人生幾得見雞皮觀書自識非求解䇿杖徐行莫厭遲儉素何妨貧勝富優游真是樂忘飢雖然調樂無千指儘喜當歌有十眉報謁要須親自到赴筵直以散為期醉翁雅意非謀醉棊社清歡豈為棊白髮只宜甘散誕紅塵任彼自奔馳安輿來往常陪伴此意終身誓不移次適齊贈少微兄韻汪樓比屋古城隅彼此清貧不願餘南阮諸賢今有幾東牀佳壻竟誰如歸鄉年亦非全老對酒情猶未覺疏來往兩家無倦色此身端合老犁鋤桂花方開約客次適齊韻久疑岩桂儘遲開留待來朝伴舉杯老去欲尋千日醉客來同引百花醅況臨高閣枝枝秀好判閒身日日陪家釀盡傾君不惜莫教瓶罄恥為罍蔣德尚棊㑹展日次適齊韻棊社經年能幾回身閒深幸屢參陪一旬又見朋簪集三徑還應聽履開休苦索居徒面壁何如相遇且銜杯雖由藥裹寬初約不礙重尋舊雨來太上皇帝聖體清康老母進封信安郡太夫人適齊除敷文閣學士有詩為賀次韻清朝孝治古無倫通籍推恩總及親八秩升班惟二老九齡拜命更何人春初慶席歡猶在嵗晚宸綸喜共新須信長年多富貴秖因同見㑹昌春吾母年高絶等倫癡兒何幸得榮親九重錫類真千載八座承恩只一人共仰外門流慶遠喜同介弟寵光新兩家盛事人爭賀和氣薰為臘裏春題曉上人閒靜軒次適齊韻我居城郭子居山兩地相望數里間我已得閒猶未靜子雖處靜不曾閒莫將花與夢相似只用心如石樣頑要識箇中真信息孤雲僧事兩相關次適齊韻十首棊會歸來鄉曲大家閒同社仍欣取友端無事銜杯何不可有時㑹面亦良難少曽環坐坐常滿賴有主盟盟未寒琴奕相尋詩間作笑談終日有餘歡老態舅甥身退不為遲肥遁猶當未老時東晉雖慚古元亮晚唐知慕老天隨公開九秩身方健我甫六旬心已疲不敢自言成酷似腹心惟喜兩相知晨朝懶起坐見一翁兩鬢皤只贏曉夢到無何窗凉風透真成適日出事生還更多足弱已難堪蠟屐齒搖初不為鄰梭回思螭陛班心處日日奔趨向馺娑見客車轍常多長者臨相過肯笑席門深寒暄固有三分話臭味還傾一寸心客至自應閒不厭年來寖覺老難禁應酬既了無餘事面壁何妨學少林晝寢才盡甘為世所捐不如高臥了餘年時逢毁譽心無諍間有詩文手自編老去已知身是夢閒來更得酒中天簾深午寂渾無念只與白鷗相對眠喜閒投閒時以醉為鄉人既相忘我亦忘雨足已期南畝熟風清更愛北窗凉晝觀碧落雲千疊夜看中庭月一方時撫素琴聊自遣誰能更作鳯求凰杜陵鄭老共襟期門外紅塵勿預知近日頗荒攻愧課多時不見適齊詩竹深荷靜相留處月白風清偶㑹時地僻衣裳俱自懶黃冠野服淡相宜讀香山詩詩到香山不計篇相逢佳處輒欣然明知無子可傳業每遇為文自入編舉世慕名多諷誦惟公著句得純全胸中相似詩方似一等不為名利牽即事旋插杉枝蔽曉曦緩搖輕箑自融怡調琴不用求成曲得句何須凑作詩無復趨炎同褦襶但能尋睡學希夷太倉日糴五升米老矣不嫌人更嗤西山兩岸杉松翠䕃長輕輿連日得徜徉絶憐林下朝還暮不問人間炎與凉睡起閒情方自樂齊餘歸路未須忙何時更向月溪去願著青鞋走侍旁燕居大老今居東海濱燕居晚嵗更申申外生但喜長依教一笑相從莫問貧閒裏只將詩作活酒邊猶有筆如神乞言授几俱休論且做羲皇以上人子成兄年八十六史子久八十二舅氏八十八㑹于適齊次適齊韻二絶堂中三壽喜同時黃髮相逢齒更兒參坐共談宣政舊風流不許後生知閭里舊遊能幾人適齊猶有筆如神莫言二老升沈異各現宰官居士身攻愧集卷十二
