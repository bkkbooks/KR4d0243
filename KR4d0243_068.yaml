body:
  text: 宋樓鑰撰書上宰相書父代叔某聞天地之所以為天地者無私也而人或見其私蓋其生育長養以為事有時乎私而實非也窮冬沍寒萬物憔悴春回自東一元磅礴于太空而一草一木咸有生意造物未嘗私也間有朽枿枯株雖無萌蘖之生而其根荄餘潤猶未自絶于造物者一元之氣必且為之融液浸潰費施生之力而不憚雖其生獨後于衆卉而終亦不在造化之外故人或疑造物之私于此而不知其非私也恭惟某官弼亮兩朝經略四海巍巍勲名與嵩岱齊聚精㑹神仰贊聖天子治内治外之務方且收拾人才躬周公吐握之勞視平津東閤為不足道挾鑪錘以造化天下人物正如一元之運行無有偏頗當是時而有匹夫匹婦之失所是當春而有寸卉之不萌也敢不投誠于造化而俟其生成哉某受才最卑賦分最蹇入仕三十餘年歴州縣者七任兩宰劇邑一佐邉郡雖綿力不足以為國家使令而父教之忠粗知亷勤以自守庚辰之春仰于光範之門蒙大丞相恩造俾倅宣城方且自喜萌蘖之得生日望成就而需次之間有報罷之命今日之來其窮甚矣正猶朽枿枯株大費造化之力大丞相秉化鑪于上枯者吹之使生肯使某遂老于窮哉寒谷之黍彼吹律者猶能使之長而況造物者乎願大丞相擴無私之造使萌蘖于今日而備用于後雖吹之嘘之若私于小物而亦豈有累于造化哉天地不可報之恩猶當糜捐以報萬一上宰相書代人天地萬物惟其時而已矣聖人作易幽贊神明然于卦言時必大其義用是知易之作亦明其所謂當其可之時以示後世後世好言機而不及時以為機即㡬也竊以為不然聖人言㡬而不言機蓋㡬者動之微而機者事之要後世之所謂機者似時而非也言機即近于人為氣象迫促惟恐失之時則出乎自然者我心休休庶績自達天何言哉四時行焉百物生焉四時自行百物自生天則付之于無私而已一草一木華實各有其時或先之或後之妄者以為奇為瑞其實則反物之妖也天之于物尚爾而況于人乎宰相操造化之柄區區然欲以智力運元化則亦勞矣故當觀萬物之變而聴其時之當然我之用舍時也事物之芸芸于前者亦時也推無一夫不被澤之心以待天下然其自窮自達自進自退若不由乎我而惟物之時之聴夫然後不煩智力而王佐之氣象見矣方今聖賢相遇千載一時神㑹氣合此豈可以人為求之耶相公上佐天子下理萬務四海之求于相公者一一以智處之則且將不勝其應究極化原在乎坐以觀萬物之動植隨其時之可而應焉此相公之所以大也某何為者曩者猥叨龍虎榜之下陳則固已為今日張本屢拜下風誤蒙知遇相公之欲提撕于衆人之中乆矣有其志而未有其權有其權而或非其時故某辱在泥塗雖知相公之不遺微賤而不敢有求于相公之門相公秉鈞當軸二年于兹矣而某適在心制中杜門海嶠實不敢求聞達于時今者收召魂魄彈冠而掃門相公一見便有曲成之意兹非某之時乎敢誦言所聞于平日者以獻古人云君相造命雖曰造命非時不可今日則真可以言命矣惟相公矜而進之某如蟋蟀之秋吟非敢鳴其不平也時焉當鳴蓋有不容自已者干冒鈞嚴俯伏俟命上蔣參政書孝隆代范某聞君子之所以得人心者能以天下之心為心而以吾之心為天下之心天下之溺何預禹事禹豈無一席之地以容其足哉而其心視天下之溺猶已溺之也天下之飢何預稷事稷豈無一飽之計以充其腹哉而其心視天下之飢猶已飢之也二君子孜孜汲汲罄竭以拯天下凡能以天下之心為心而以吾之心為天下之心也公卿世家為之子孫者孰不願自植立以振門户其願之從違係乎子孫之賢否然此心則人之所同也夫己欲立而立人己欲達而達人吾夫子以為仁人之用心況夫己已立而人或未立己已達而人或未達仁人見之得無動心乎恭惟某官懐絶世之才輔之以碩大光明之學文章雅奥足以規姚姒謨謀忠嘉足以配臯稷領宥宻參機政天子虚席而論相閣下其選矣仰惟先正太師魏公勲業譽望為前朝第一等人彪炳俊偉具在史冊子孫以似以續持槖擁麾代不乏人以至于閣下閣下以經術魁儒科以詞章鳴海内優㳺都城中極天下清華之選凡書生之所夢寐而古人之所歆艷者無不親歴之人望益隆主眷益深卒以此取卿相蔣氏之家聲日大以肆天下以是知魏公之有孫而閣下之光于前人也閣下以王佐自負一意于尊主庇民固不以是區區之軒冕為事然如閣下之為人子孫可謂盛矣有人焉業弓冶之餘而弗能修播穫之職顛沛流離而呌呼攀援于門下閣下其念之也必矣伏念某先丞相妙年自布衣以䇿于天子風節翹然有聞致位上宰憂國愛君之心終身不少衰至今數紹興中興名臣然亦不在第二流也惟是諸孤不肖既不能以家學取世科委靡闒茸又不能少自振拔于搢紳之列加之憂患相仍三兄淪謝相繼惟一弟相與為命又皆困躓連蹇碌碌州縣間退揣庸虚之質顧何足以求當世聞達惟是痛念先丞相之迹未陳而門户衰落遽已至此㡬無面目以上先人之丘隴矣罷官三年固窮田里非曰絶意榮望顧當路未有為之地者故不得已而為此待時之計一日有聞于人曰朝廷大用蔣公矣問其家世則曰太師魏公之曾孫也某也釋然悟躍然喜曰吾之窮其少瘳乎或曰子于蔣公之門無一日之舊而勢位如霄壤之隔子乃以為往必得所欲何耶某應之曰吾聞蔣公之為人其心則禹之心稷之心也公與魏公相去四世巖巖相望如此某為先丞相之子而沒沒不振如此以此求之其必有以哀我者故今日之來索手無以自見不自知其不可也伏惟仁慈薫然垂徳于不報之所引手于内溝之際使他日有以少見于世士之歸心于門下者多矣豈特某哉上洪丞相書孫公和代表兄某聞臧孫諌君以徳而君子知其有後于魯管仲受下卿之禮而君子知其世祀于齊方二子之為此也求盡乎人臣之事何嘗有意于徼福而此亦豈徼福之具哉然愛君合禮天相神祐百順不期自至而子孫碩大繁衍君子已能逆知于未然嗚呼彼皆一時陪臣効小忠循常禮而天之報施已如此矧本朝鉅公以身徇國建大節排大難功成困讒身不得有爲于時天亦媿之必擁佑其後光明俊偉亦非止如臧管二子而已也恭惟先正内相忠宣公以文學志誼結主知致身華近一旦當戎馬倉卒之變翠華南狩騩馭未返此正主憂臣辱士君子畢命効死之際而肉食者類多選耎蓄縮為保家室計無肯出萬死以報國者獨我忠宣公毅然自奮仗節請行不可回挺平時徳望固已聳服夷裔而専對正辯又足以彈壓倔强不廷之衆故雖間闗險阻節旄盡落而中心如丹卒締金石之盟還長樂之駕嚮者三十年邉鄙不聳而南北無烟火警誰之力也上天助順佑我國家為生賢佐而所以報忠宣公者亦昭昭可知蓋丞相首以文章鳴而一門之秀連中宏博異科洪氏之文遂擅天下此雖在丞相為餘事而四海由是人知洪氏之名而家有洪氏之書此天所以侈忠宣公之報而示為善之利也權臣當國衆能勝天方忠宣公還朝被太上皇帝寵遇之厚駸駸大用讒人罔極一斥不復故權臣能貶其位而不知適所以大其聲能抑其身而不知乃所以昌其後天定復有以勝之未㡬而朝廷更化金昆玉季繼踵登用福善禍淫可謂差耶恭惟某官以顔孟之學負伊吕之才周旋外服而隆巖石之瞻翺翔華要而結兩宫之眷比者槐鉉虚席乆至閲歲此古今之所未聞而四海所顯望卒之覆金甌秉魁柄者丞相也明良相遇千載一時決非偶然者是雖報施常理皆人所不能及由是輔中興于無窮而成忠宣之大功天于此不為無意也某不佞一介鄙人無所取材獨念先吏部某早受忠宣公之知君子交情見于尺牘先吏部流離兵火之餘故時圖籍往往埃滅而忠宣公咫尺之書蔵弆巾箱爛然可觀先吏部既捐館舍某雖無似亦知寳祕以俟今日是敢躬自裝褫百拜以獻有以見先世之契不為不厚亦以少裨門下手澤之富比之掃舍人之門者猶為有因也恭惟丞相竭誠節以相天子鞏國勢于千載而衍家慶于綿逺八葉宰相七世内傳將不足為今日道痛念先吏部以筆硯起家忠鯁獨立終于一郡人亦歎其餘才未施而不肖之孤又不能少振于後宦路如漆四壁枵然㡬填溝壑偏親垂白菽水不繼猶强自植立以苟升斗得官安陸困于逺次之官有期矣固將奉板輿攜孥累為數千里之適以圖一飽然喜懼之年惴惴朝夕所以謀寸進而為親榮者尤切切于中仰惟閣下仁慈薫然軫念先世一日之素興哀于無用之人道援天下之餘力一振于窮困之地則髙誼絶俗寒士歸心某亦當摩頂放踵以効萬一九原有知先吏部亦不當後結草之報惟閣下哀之上趙憲書推代趙某聞疎不如親親不如賢詩曰豈無他人不如我同姓曰瓜瓞曰葛藟親親之謂也周公相武王封姬姓五十三國而天下不以為私人皆曰周以宗强噫宗故可以為强也宗而非賢其何以强使受封者五十三而不賢焉天下不以我為私乎無競惟人四方其訓之周以宗强蓋以賢强也我國家聖祖神宗敦厚同姓封爵禄廪務極隆異親親之道盡矣賢賢之義則未也乃復慨念宗室雖有才而不得試于是設教養之法開選舉之科人才班班得以自見近歲修潔博習之士因以益衆與寒雋並驅争衡天子又搜舉其尤才能者擢寘周行授之以持莭擁麾之寄視有周無媿焉恭惟某官以光明俊偉之才輔之以淵源該洽之學髙義慷慨薄乎雲天勁氣崢嶸沮乎金石間平之儒雅勉石之事業閣下誠優為之在中為鯁亮之臣在外為循良之吏中朝士夫數當世賢者必以門下為稱首朝夕論思自此升矣激濁揚清顧為閣下胸中自有定論然人才方賴以主盟倘從州邑之吏視天族之可以收拾者長養而成就之俾有以自見于世則親親之道賢賢之義足以仰贊朝廷之盛矣某疎族無似蚤歲而孤上奉孀親下撫幼弟家四壁立無以資其身攻苦讀書不能自已辛勤百戰始得一官為寮于兹亦㡬年矣亷勤自飭不敢少越規矩之外以為終身羞史君察其無他而未敢求知部使者冠葢相望而棄之不顧每自念言是豈惟孤寒之難于進蓋未有當世明公以為之引重也閣下按臨曵裾旅進天壤勢異宜不可以冒干然而決于自獻者誠以閣下方主張公道愛惜士類宗族之末尤所矜憐倘引而進之則他人必指之而曰是子也而首受知于宗英其必有以取此也假寵乞靈某之寸進有望矣故某平日之不敢為不肖以幸今日之遇非徒以親親望門下也古語有之為山九仭功虧一簣故士君子于舉士之際多以垂成為辭嗚呼九仭之虧固爲可惜然所以致九仭者不由覆一簣而進乎今日之進固有望于閣下之開其始若其終之則在他日上葉樞宻書代人某聞念子桑之飢者有裹飯之仁憐范叔之寒者有綈袍之恵故舊之情誰則無之故窮則相䘏達則相引或故舊之不及用則從而收其子孫此古人之所甚重而今之時絶無而僅有者也故山公在則嵇紹不孤而優旃之戲亦能封叔敖之子載在前史以為美談寥寥髙風非當世大臣孰能振起之恭惟某官道徳配古人聲名滿天下秉大政行公道行將入相明天子以共起中興之功而獨于故舊之情尤為垂意此所以能主盟吾道而振風教于千載之後也伏念某門緒衰微生涯淪落環視一身無寸長可録獨賴先世遺澤得官而蹭蹬連蹇絶人數等齒名仕􅡘今㡬三十年矣頃者得闕桂林待次數載望嶺外之地邈然數千里而偏親垂白不堪逺去重以乆居浙西遭去歲邉警士夫率皆東徙轉寓於越之屬邑羇單可憐無與為比痛念先君之後零丁如許今欲之炎荒之地則有狼狽之憂坐以無䇿則忽不知歲月之换而寸進愈茫茫矣分竒才薄失于初計尚誰咎哉然猶有冀寒灰復然者賴有閣下使某不于今日伸喙而一鳴是自棄于溝壑也方閣下弦歌武城先君宰剡谿獲與閣下有同僚之契而荷知遇為最深今日不肖之孤貧悴無聊至于此極此閣下之所宜動心也然閣下方坐廟堂而進退百官而某也微賤疏逺尾百僚之底前時末契何足恃此以進君子之門獨以嚮者閣下擁麾毘陵某得以桑梓修敬固已蒙眷顧之厚謂某為故人之子有惻然興憐之意今也某之窮益甚而閣下振拔滯淹一舉手力耳今日之進不為無因敢冒鈇鉞以干造化區區之命垂于閣下之手伏惟薫然之慈有以憐之振之不勝幸甚上宰相書代人某聞養才之法不一也養大才者勞之養小才者優之譬之植木彼楩楠檜柏之屬不貴其拱把椓杙之用也生于隂巖絶壑中風雨之所浸蝕霜雪之所摧折外益枯而中益腴磊砢多節目而材益剛夫然後數十百年而以爲棟梁而不橈明堂之柱非此不能勝也然爲巨室者棟梁之外椳闑扂楔之用不知其㡬故必有養小材之法焉若樸􅈪小木欲求近用苟不植根于膏腴壤墳之地使之遂其生長則將枯悴萎薾蕩然雖求拱把之材亦亡矣孟子曰天將降大任于是人也必先勞其筋骨餓其體膚此養大才之法也小雅曰薄言采芑于彼新田于此菑畝此養小才之法也才大者用大而志亦大故必先勞之而苦其成才小者用小而志亦小故必先優之而責其近未易以一概論也伏念某生無一竒學無一成猥以賞延登仕版㡬四十年矣平時碌碌以備國家之使令雖不能卓然拔茹于流俗而以功名自期然謹守父教官箴以從事思有尺寸以見乎世比仕東都自計司而為均輸之職亦不敢以為勞且宂方且躬朱出墨入之煩居無何而以罪去退念妄庸孱謬獲戾為宜而一時旁觀莫不搤腕太息知其寃而莫敢辨某亦不敢自明以速大何也坐廢田里于今五年堂有八十之母而闕旨甘之奉室有數百之指而困啼號之迫日復一日㡬不自聊嗚呼是樸􅈪之才而遭風雨霜雪之所戕置之隂崖絶壑將遂摧折于無用之地是大君子所宜動心焉者也恭惟某官以不世出之才輔贊兩朝舉天下之物皆在陶冶而進退士大夫于一舉手之頃比者起東山以鎮壓倔强不廷之國如鳯皇麒麟一出而鴞怪狐妖自然逃遁隂受公相之賜者不知其㡬千萬人而猶孜孜以人才為意不倦吐握之勤此周公之用心也重念某孤危之迹屢玷大造而公相寵遇撫存之非一日也今日以窮來歸栖栖如飛鳥之依人人將憐之而況公相耶噫某之此來則窮甚矣公相遂收録之耶則他日必有尺寸之効以報門下今日棄之則遂將槁項黄馘與糞壤俱腐雖欲糜捐以為門下用終不可得録之棄之某之命懸于公相矣伏惟公相哀憐之干冒鈞慈某下情無任戰慄之至禮書馮仁叟表兄請婚任氏書族緒單平猥紹大馮之裔人才凡下敢齒諸任之間偶因媒妁之言獲締婚姻之好伏承某人幽閒秉操素知蘋藻之誠而孫某某長孝謹傳家粗習箕裘之業兹諧燕爾夫豈偶然往之女家想見結縭之戒願爲有室遂成合卺之歡敢薦薄誠拱聞嘉命不愚弟請婚馮氏書見舅氏于渭陽慚非酷似尋世婚于髙宻兹謂好逑蓋將締百年之歡豈惟合二姓之好伏承某人素鍾淑質乆􅈺中饋之儀某男幸忝彌甥不待東牀之選蚤荷千金之諾敢稽百兩之將宜其室家既無嫌于齊鄭傳之孫子俾弗替于朱陳少虚兄請婚孫氏書託契髙門承風乆矣求婚猶子得諾欣然屬事緒之因仍閲歲華之荏苒敢持薄禮逺尋舊盟維鵲有巢正欲資夫内助迨氷未泮深有望乎來歸方當相忘于江湖之中可以盡索于形骸之外從子澤請婚舒氏書定五世之交乆篤金蘭之契合二姓之好敢稽雁幣之恭令女素習婦功某男粗修子職既無嫌于齊鄭將永好于朱陳逺不容刀何待買鄰千萬之費告先近日倚觀結縭九十之儀内弟汪文可請婚薛氏書敘百年之親素聮瓜葛合二姓之好兹始權輿既情話之相通曾媒言之不費令女夙􅈺姆訓從子粗習家傳了無耦鄭之嫌乃有齒任之幸既承面命欲奉婚期嘉禮具存何妨三者之備官占云吉尚㡬五世之昌沈虞卿侍郎女許陳氏書襟期莫逆乆為研席之交臭味不忘兹遂松蘿之託欣然承命捨是焉求伏承某人詩禮素傳稔聞于父教而子某女蘋藻是訓未習于婦容嘉納采納幣之同時實有室有家之伊邇潘楊方睦當豫卜于三星吴越相望尚將杭于一葦史侍郎女許秦氏書老矣從心猶有愛孫之念為之求耦幸逢列鼎之家某人秀出相門素傳詩禮某女幼疎姆訓未習組紃荷鴈幣之多儀知鳯占之協吉深喜潘楊之睦自此權輿既無秦晉之卑庶安家室無齊鄭之嫌又鄭府云既納幣張氏書合二姓之好荷親誼之甚髙尋十年之盟喜宦逰之相遇況老境篤抱孫之愛而兒曹懐歸養之思男女及時幸勿愆于柔日幣帛將意媿不辦于多儀共存素風一洗末習季舅第三女許顧氏書閭里相望其來已乆婚姻之好實始于今某人秀出輩流方謹詩禮之習某女幼居閨壼未􅈺纂組之工既協鳯鳴辱貽鴈幣一言決矣正湏坦腹之求百兩成之當謹結縭之戒汪表兄之子請婚書桑梓相望夙敦雅好金蘭合契幸締華姻某人素習婦功將歸千歲龍魚之裔某人粗傳家法適得五世鳯皇之占二姓是求一言而決欲將厚意敢稽納幣之儀佇俟嘉期終遂肥家之吉婦弟知道長女許李氏書里舍相望曾未諧于識面媒言一定乃屢辱于貽書臭味既同婚姻敢後伏承某人世傳儒業況是太史公之外孫某女幼習婦容未熟曹大家之女誡知鳯鳴之叶吉荷鴈幣之先臨往送之門媿不盈于百兩願為有室庶仰望于終身少及兄女許舒氏書師友從逰爰自宿昔婚姻求偶至于四三況一水之相望宜兩家之合好某令子蚤傳詩禮尚餘獨坐之儒風某女幼習組紃未解大家之女訓既叶鳯鳴之卜首勤鴈幣之臨佳耦曰妃但覺門䦨之喜色同聲相應尚何媒妁之多言次女許鄭氏書鴈塔題名夙講同登之契鳯占叶吉兹諧嘉耦之求一笑相過片言而決伏承某人幼而岐嶷早有成人之風而某女資亦善柔方親慈母之訓俱生丙午之歲真是甲辰之雌惟臭味之既同在禮文而宜簡御之百兩首勤納幣之儀加我數年當展齊眉之敬從子淶請婚陳氏書潁川譙國均著聲稱孟公君卿俱為㳺俠相望千載之下始諧二姓之歡某人柔婉有聞素􅈺姆訓而某孤㷀自立粗習家傳了無間阻之言遂定婚姻之約幸兹叶吉孰云齊鄭之嫌其或自今益締朱陳之好治請婚吴氏書識北平之三世素知事契之深牽張氏之一絲喜有姻親之託鳯占云吉鴈幣是將伏承某人出鄞水之外家遂歸于我而某某男生台山之傳舍爰娶于吴既無非耦之嫌殆有夙縁之幸一言而決因締交于延陵子之門二姓相求用徼福于東樓公之裔攻媿集卷六十八
