body:
  text: 宋樓鑰撰奏議雷雪應詔條具封事業日上任國子司臣某准紹熙二年二月六日尚書省劄子三省樞密院同奉聖㫖近日隂陽不和雷雪交作朕恐懼修省殊不遑寧深慮庶政或有缺失未能消弭可令侍從臺諫兩省卿監郎官館職各條具時政闕失聞奏臣備數學省目覩雷雪之異竊考咎證無路進言伏讀明詔陛下上畏天戒俯詢朝列此而不言臣則有罪臣仰惟陛下承列聖之正統受夀皇之付託即位以來雖有憂勤之心而初政所施未有以大慰天下之望天之仁愛陛下亦云至矣去嵗星緯失度其甚異者太白經天臣庶雖知而朝廷不聞有消弭之舉天意正以星文不足以示異故以雷雪之變發于都城不用清臺之測驗不待臣子之奏聞三尺童子亦知其為災異此天意之彰彰者也陛下發德音訪闕失此心固足以對越上天然須見之行事之實然後足以應之其他春秋之書五行之說陛下必已熟見瑣瑣細務又不足以敷陳臣請言其大者要者昧死條具如左須至奏聞者一雷者陽也雪者陰也陽氣震動蟄蟲奮起雖稍先時猶未為甚雨中間有小雹人已驚駭至于庚辰之朔晡時雷電大至天地晦冥久之方散雪霰繼作夜以至旦盈尺不已辛巳之夜又復增積寒氣凝冽幾不可堪是何祥也陽者天道也君道也夫道也君子也中國也陰者地道也臣道也妻道也小人也夷狄也天意昭然過于告語惟陛下至誠惻怛應天以實察災變之彰明覽時政之已行陽氣方興而陰沴侵陵乃至于此此不待屢數而後可知惟陛下聖明默㑹天意防微杜漸曲軫宸心然後可以消弭矣一自古人主遭值災異者多矣請以成湯宣王之事明之湯之禱旱于桑林以六事自責曰政不節與使民疾與宫室崇與女謁盛與苞苴行與讒夫興與成湯不邇聲色不殖貨利以義制事以禮制心顧安得有此六事而深以自責若不能自容者此所以消弭天災而反致勃興也宣王中興大雅以雲漢為首竊嘗考之止言靡神不舉靡愛斯牲上下奠瘞靡神不宗敬恭明神宜無悔怒若歸過于百神者蓋宣王之意以為祀神如此不應致有災變其所以至此者必由于我其刻責之深又過于成湯反已之切乃見于言外序詩者所以稱其側身修行而王化復行實始于此臣願陛下逺鑒桑林之禱六事雖無亦當自責一或有之改過不吝三復雲漢之詩至誠反已祈以應上天仁愛之意則聖德日新今日之異適當為後日之祥也一臣仰惟陛下初在恭邸英毅神武之姿觀瞻甚聳比登東宫天下屬心猶恐陛下他日或偏于剛嚴聖學日新高明柔克一于仁厚動以仁宗為法率循夀皇之訓天下涵泳聖化實宗社萬世之福也然臣聞之天以剛健為德君以法天為先臣願陛下體剛健為德本而以仁厚行之剛則不為物所移健則不為欲所怠杜請託之私絶牽制之纍如禹之惡㫖酒孔子之放鄭聲則君德日隆于上朝政日清于下而治效見矣大抵疏逺之臣惟願陛下之憂勤親密之臣惟願陛下之逸樂憂勤則幽枉必達下情得通而膏澤及于民矣逸樂則伺候顔色干求恩澤而私意得以行矣陛下自雷雪之變必且憂形于色宵旰興歎是數日間干請必少此皆切近而易察以此推之聖心憂勤恩幸自逺茍日謹一日雍雍肅肅宸襟泰然淵靜鑒明以照百官其視宴遊之惑豈不相萬此非以剛健為本寧有此耶故臣以此為應天之要一臣仰惟仁宗之治最為盛際陛下所願取法臣觀仁宗專以仁厚養天下而紀綱甚嚴者最以言路之通也大臣奏事或至于首肯內廷請謁未免于付外然崇奬直臣妙選臺諫一言可取斷在必行臣不敢以纍數都尉李瑋之貶司馬光敢言公主亦不得無罪此骨肉之愛也遂至降封王德用進女王素敢言正為其親近此袵席之事也立命出之言者無罪而主德益盛此其所以為仁宗雖唐太宗之聽諫勿及也比年以來朝行不聞直聲而有以多言被黜者雖蒙寬恩止從外補不加之罪然士氣消沮無敢出位而論事者況自去歲又開宣諭之門夫封駁諫諍之職正以維持國論主張公道干請攀援有出于法例之外者陛下間亦有不得已應之外庭有言遂與寢罷在陛下不為傷恩而有司得以執法法者陛下之所以與天下共此者也若開宣諭之門則廢有司之守不及今絶之日加一日其何以為紀綱耶臣願陛下力開直言之路杜塞宣諭之門每以今日求言之切為心則治道不患其不舉矣一臣仰惟夀皇之治始終不渝陛下得于親傳臣親夀皇二十八年之治不可形容而其卓冠于百王者非止孝儉之德最以憂民之憂不以災異水旱為諱聞之惟恐不早救之惟恐不盡蠲放惟恐不多至于竭倉廩傾帑藏以赴其急乃者水旱連年人心惶惶若非夀皇焦勞于上有司奔走于下竭力而經營之則必有盜賊奪攘百姓流離之患矣豐儲倉所以為中都之備一時欲用出聖斷排羣議積貯為之一空俟其事定收糴隨足人心愛戴天意協佑旋致豐穰此真萬世之法臣願陛下畏天之威光紹謨烈遇災而懼不以為諱專法夀皇力行消弭之道臣下有隱而弗言者隨事之小大罪之則天下曉然知聖意之所在矣一臣嘗竊究國家中間陽九百六之㑹一時臣子誤國非一而蔡京為首京之誤國非一而其甚者無如御筆之一事臣三修玉牒因得考本朝時事之變祖宗纍朝未嘗輕以御筆處分外事神宗作興凡事多出聖裁雖邊徼細故亦煩親灑是時蔡京方為檢正建請差官置局編類為書遂委京編次此蓋老姦相業之本也徽皇之初京既收召一旦得君欲逢主意固相位排同列闢公議行私心變法度崇虛文遂創御筆之制違者以違制論事由于京而書出于徽皇權歸于京而過歸于徽皇時假制禮作樂之名間以惠民之事以文過飾非御筆一下無敢議者其初猶有正人在朝間有執奏京欲其必行又改其法違者以大不恭論凡有異議即致竄逐而紀綱益以紊亂然京自為之未至于甚比其再相以至三入寵任既不及舊御筆一從中出京亦不知所為商鞅立法親受其弊雖欲支吾不可為矣敗國殄民尚忍言之此實萬世之龜鑑也陛下兢畏恭儉固知萬無此事然人主作事動為天下後世之法其端亦不可輕啓臣願陛下一遵祖宗之法戒飭有司之守條章明備動皆有則如有非常之斷固在陛下專之其餘細務悉有法在宸翰處分謹之重之若天之雷霆其發必以時而不至于䙝乃所以强主威也一臣聞元符三年九月辛卯鎮洮大雷自初夜至四鼓一百三十餘震牆屋搖動簷瓦散墜人人有覆壓之懼黎明視之雪深二尺熙河機宜文字李復言于帥臣胡宗回曰雷風天之號令其發多于盛夏今秋且盡震暴非常終夜不息而又大雪殆將有不測之變因為規畫密諭守將嚴備又以兵守邈川緩急相應援越月羌果叛攻陷城堡賴有豫備得以破之熙河以安今日銷變之事無所不當慮雷雪之為災雖不至如元符然北虜之强狡實萬倍于青唐邊備未堅臣實憂之欲望陛下俯採李復之言申飭諸道邊帥修備固圉以防不測之警論進德養生直前奏事任起居郎臣聞養生可以進德進德可以養生人受天地之中以生所謂命也是故中也者天下之大本也和也者天下之達道也喜怒哀樂之未發謂之中發而皆中節謂之和是道也所謂以之為己則順而祥以之為人則愛而公以之為心則和而平以之為天下國家則無所處而不當堯舜禹之相傳以執中湯之建中武王之皇極皆此道也人之氣也沖然而甚微泊焉而易危既不可過盛又不可過弱惟得其中則養生之要也人之心也操之則存舍之則亡既不可甚勞又不可甚逸惟得其中則進德之要也茍能于日用之間謹言語節飲食寡欲而固其本省事而清其心平喜怒之發端戒愛憎之私徇內外交養表裏如一則夀命可以延長盛德可以日新矣仰惟陛下以天縱之資撫盈成之運精一之妙固已得之夀皇之親傳臨御以來立政用人行以大中至正之道黜陟之際惟公議是從是以朝行肅靖海內小康皆中和之效也去冬違豫旋慶康復竊究所自殆恐有差其所謂中者臣誤蒙睿恩擢置柱下所當罄竭以效萬一天下之事未敢具論惟望聖聰俯聽愚言養生進德俱以中和為本視聽言動率務戒謹飲食起居不使過差喜怒之發無所容心事有可喜從而喜之非吾之所喜也事有可怒從而怒之非吾之所怒也如是發必中節不致一偏萬幾雖繁使百官有司各任其職陛下以大中之道酌其可否一吁一俞可以坐判聖心休休保合太和日復一日不惟帝德益隆心廣體胖神氣舒暢雖有陰陽愆伏安能為吾之患哉臣言雖膚淺意則甚篤冀有益于清躬伏惟陛下裁幸論郊廟之禮臣竊惟郊廟之禮國之重事非臣子所當輕議然事有戾于古而又不宜于今茍得其說不可不陳也仰惟神宗皇帝鋭意作興鼎新百度專置詳定郊廟禮文所命儒學之臣博考古今裁定儀制帝親臨決而著于令凡今日所行多出于此臣嘗恭覩神宗實録元豐六年有太常丞吕升卿建議郊祀致齊事理甚明雖不見于施用而史臣載其全文有以知時論必以為是特未見于用爾臣敢約其大略而言之升卿謂郊祀致齊之內不當先詣景靈宫及太廟朝饗遂罷景靈宫諸殿朝謁而天興殿及太廟時饗如故則是其言非不見用特行之未盡爾其言曰有天下者莫重乎饗帝歷考載籍不聞為祀天致齊乃于其間先饗宗廟者也獨有唐天寶之後用田同秀言立老子廟號曰太清宫是嵗將行郊祀以二月辛卯先躬饗焉祝用青詞饋用素饌甲午又親饗于太廟丙申乃有事于南郊雖論者以為失禮然考其所齊之日及辛卯饗于太清宫至丙申殆且五日猶得雍容休息以見上帝也今致齊三日其一日于大慶殿而用其二日三行禮焉古之大祀未有不齊三日而敢與神明交者今行禮于天興殿才齊一日爾其之太廟與郊宫前祀之一日皆嘗用之矣謂之一日之齊尚非全也夫用一日之齊以修大祀未見其可況非全日乎于此奉宗廟則齊之日不足于以奉上帝則齊之義不専論者曰宗廟之禮未嘗親行故因郊祀躬展薦獻臣曰不然人主于宗廟之饗固當嵗時躬修其事其不親饗者蓋後世之失禮也必因郊祀而行之則義尤不可以為郊禮宜如故事致齊于大慶殿二日徑赴行宫其宗廟親饗並乞寢罷天興殿朝饗乞更不行俟禮畢而恭謝别修太廟躬祠之制每遇行廟饗之時則罷景靈一孟朝謁之禮廟饗致齊乞于內殿車駕出入如常儀如此則祀天饗廟兩得其當此皆升卿之言也臣三仕于朝屢祗祀事凡曰大祀致齊三日惟祀事得行其餘悉禁蓋專致敬于所祭也而郊祀明堂大禮致齊三日之內鑾輿再動百官相祀陪祠駿奔惟謹上下俱不得盡致齊之義又太廟行事極于跛倚幾至僵外而以此跛倚之餘致齊于郊宫雖强有力者亦苦于顛頓而恭敬之心衰矣臣愚竊所未安而不敢輕議既得升卿之說敢採之以獻于陛下仍録其全文及唐明皇變禮之因列之于前以備採擇伏望聖意謹重祖宗舊典不欲盡行升卿之言臣又從而斟酌其說欲望睿斷改定儀制每遇大禮用故事停景靈冬季孟享而于孟享之日行朝饗天興之禮太廟嵗五大饗止于當郊之嵗或蒸或嘗親行其一祝詞仍以郊天先告二者致齊並于內殿車駕之出止如常儀專用三日之齊以事上帝陛下得以齊心養性對越上天君臣無併日之勞有司省供億之重考古驗今于禮為稱仍乞明詔二三大臣俾侍從臺諫兩省禮官及今集議其當裁定一王之儀其他赦宥賞賚悉如舊制革天寶之變禮以無失祖宗奉天享廟之本意實天下幸甚論諸州奏案宣引臣竊惟獄者天下之大命也歷代聖帝明王之所甚謹若夫欽恤忠厚又未有如本朝列聖之極致者也臣區區愚忠懷此久矣敢先極論古今之事而後備陳當今之宜惟陛下垂聽夫殺人之事世所不免使甲能殺乙而乙之子若孫殺甲以報之可也如此則將交仇而不已故先王制之刑辟命之士師以爾之仇麗吾之法而後大定然甲之殺乙則既殺之矣士師取甲而誅之雖以伸乙之冤而士師實以生者就死地死者不可復生脫有錯誤悔之無及又況箠楚之下何求不得間有誣服遂致冤濫此先王所以戒謹詳審惟恐其不至也自古平治之世必以省刑罰為先嘗求其故矣唐虞畫衣冠而民不犯則曰罪疑惟輕功疑惟重與其殺不辜寧失不經而後好生之德洽于民心成康囹圄空虛凡四十年則秋官司寇之書極其詳備三代以還享國之久者無如漢唐漢四百年始于約法三章唐三百年基于太宗嵗斷死刑二十九人惟我國家太祖以不殺而得天下高宗以不殺而啓中興纍朝仁厚度越千古太祖嘗讀堯典歎曰堯舜之世四凶之罪止從投竄何近代憲網之密耶蓋有意于措刑也故自開寶以來犯大辟非情理深害者多貸其死有司言自二年至八年詔所貸死罪凡四千一百八人仁宗凡有疑慮奏裁者率貸其死嵗至活千餘人國祚靈長民心固結凡以此也今之士夫不深察其故論重囚則曰漢高祖約法三章殺人者死安有殺人而不死者乎論强盜則曰太祖立法強盜贓滿三貫足皆處死今强盜之法為太輕臣又嘗求其故矣秦之苛酷以微罪而坐死者甚衆如曰誹謗者族偶語者棄市之類不知其幾商鞅論囚渭水盡赤豈皆殺人者乎天下愁怨相率而叛之故高祖約之曰殺人者死蓋言惟殺人者死爾其下云餘悉除去秦法則其他死罪皆去之矣此秦民所以大悅亦非曰殺人者必死也律文諸强盜及傷人者絞殺人者斬古之中制也而唐元和之敕京兆府奏應擒獲强盜不論有贓無贓並集衆決殺則已重矣周顯德之敕應持杖行劫不問有贓無贓並處死則又重矣本朝制法日趨于厚由今視之故以太祖之法為重不知其時正欲革五代之弊法而務輕之也是二者不知深求其故反以藉口可乎今日朝廷清明刑罰當罪雖州郡以案乞奏裁有司皆詳處既不濫及無辜又不至縱奸太甚然臣每疑州郡成案恐未必一一是其本情近有乞奏裁之獄悉以原勘始末案款繳申大理寺使之反覆閲實然後奏聞報決臣竊是之然恐事至太煩又從而講究其說欲望睿慈明詔有司奏裁之案合貸命中自依見行條法遇有情理無可憫行下依斷者仍下本路提刑司取索本州原案併碎款一一詳審若無可疑則行下依斷隨即回申或見得碎款情節與成案不同則當懲治官吏情弊或鹵莽之罪庶幾間有冤者得以平反實有罪者無所幸免獄吏知畏不至文致重辟益廣陛下好生之德比之盡取碎款者既得大體而于朝廷明謹之意益為詳盡天下幸甚貼黃臣竊見諸州奏案惟是蜀中州郡者盡録原情碎款列于成案之前若陛下更欲詳盡乞下刑部擇蜀中奏案碎款詳備者鏤板行下諸州令依此式樣備録碎款奏聞尤為幸甚論君道難易內引臣聞孔子曰為君難又曰如知為君之難也不幾乎一言而興邦乎仰惟陛下以一人之身膺上天之眷命承祖宗之基上則奉兩宫之養下則應萬機之繁在陛下可謂至難矣然陛下所謂居得致之位操可致之勢而又有能致之資威制强敵恢復中原興起祖業以大一統謂之難可也若曰承兩朝付託之重保境而養民以為內治之事在陛下初無難者兩宫備天下之養一月四朝已有定制如期盡禮則事親之道昭矣大昕受羣臣之朝興居出入皆有定時夙興聽斷則君臨之道宜矣飲燕有節則聖躬日康賜豫有度則財用日積採公議以用人才則衆心服開言路以廣聰明則下情通示廉恥則可以全士夫之義嚴典章則可以杜僥幸之門聞四方水旱之事勤而撫之則可以消弭盜賊之變知四方事機之萌敏而圖之則可以折奸雄之心國家南渡以來高宗披荆棘以立朝廷壽皇振綱紀以保治安凡今日宫室之宏麗宗廟之嚴飭百司庶府之備具三軍萬姓之阜繁皆非一日之力陛下安享盈成之業宜無難者天下當為之事固未易以一二數如前十者陛下念茲在茲日謹一日則事之大者已得其要事之小者當隨以舉矣臣之所陳陛下勤而行之俱為易事舍而弗圖難斯至矣又況人心易感上德易見事有不當于人心能言者皆能議之聖心一日見于施行則人心翕然何啻風之偃草今日大端不過三四明斷之下俄頃可畢而稽留不決遷延日久四方傳聞徒駭觀聽此在陛下尤不為難古人責難為恭而臣顧以為易者義固不同言各有當其為愛君之心則一也伏惟陛下裁察論君心臣一介孤逺比者待罪左史兼攝西掖感激恩遇不敢愛身間有論奏皆非得已上觸天威下忤人意朝夕惴懼以俟譴呵乃蒙聖慈俾遂為真周章控辭既不獲命退慚僥冒黽勉就職益知陛下不以言罪人而以言取人不惟赦之而又進之有君如此惟當勉竭以報萬一尚有孤忠可以自效天下之事不可勝陳愛君愈切尤不可茍深思熟慮不若求其至要者言之宗廟社稷之重四方萬里之逺係于陛下之一身陛下之身主乎陛下之一心臨御以來兢兢業業惟恐一事之失度一物之失所周思卻顧若不能自已向者數事雖若久而不決處之詳慮之審天下之以為是者陛下終以為是公議之以為當然者陛下終以為然方其未行人人顒望及其既行中外稱頌側聞陛下晨興之後未御昕朝澄心靜慮以待機務天德清明夜氣沖和照臨百官是非瞭然此真社稷之福也欲望睿明保持此心終日乾乾盡善盡美無可言者或恐勤勞萬幾不無游息之時退朝之暇從容良久更以一二時頃凝神儲思翻閲奏章或可或否不以人廢付之大臣使擇其可而行之則天下翕然知陛下之明斷無甚難者願垂聰聽擇而行之天下幸甚論賑濟臣仰惟陛下誠心愛民若保赤子比以諸路州軍去嵗荒歉去處各賜度牒以為賑恤之備此真為人父母之意民之受惠不知其幾然臣嘗在州縣備見荒政之修無有上䇿蓋年穀豐熟之時家給人足上之人不過撫之而已一旦嵗事不登舉無涯之衆而欲仰食于公家雖有孔墨之智亦將不給若州縣之官盡心竭力力之所及者廣則民之獲濟者多所謂博施濟衆堯舜其猶病諸況今州縣少有儲蓄倉猝無以為備今方春首傳聞宣池沿江等處流莩相望狼狽失所若非朝廷倍加拯救老弱轉乎溝壑壯者或肆敓攘稍失撫御起為盜賊特未可知度牒之頒在國家所捐雖多恐飢民未能遍及竊見沿江諸州尚有樁積米斛非特㫖不敢支動積之嵗久陳陳相因欲望聖慈出自睿斷行下諸路凡有合行賑濟去處亟加措置將樁積見米隨宜糶貸以濟急闕鄰近州郡亦許支移仍責官司以所糶錢候秋收日糴還今春幸得膏雨二麥可望此去麥熟尚有四月勸分之數恐亦不能接濟國家以樁積之米捐以豫民猶不為過況賑糶于急缺之時收糴于秋成之後既可大慰民心又不妨以陳易新為經久之利惟陛下亟圖之攻愧集卷二十二
