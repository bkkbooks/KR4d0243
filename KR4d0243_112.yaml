body:
  text: 宋樓鑰撰北行日録下乾道六年庚寅正月一日壬子晴使副率三節官從望拜兩宫交賀禮畢上馬與館伴同入賀由應天東門步入東廊幕次中大安殿門九間兩傍行廊三間為日華月華門各三間又行廊七間兩廂各三十間中起左右翔龍門皆垂紅緣簾庭中小井亭二幕次與髙麗使相鄰西夏使相對客省茶酒罷已初錦衣衛士又益以青錦袍五十餘人列立大安門庭下百官排班朝日太子為班首四拜約近三百餘人既罷客省引使副由月華門隨百官班入賀太子錦褥四鎮以銀猊出衆班中立次宰執親王次有十餘人皆金帶紫袍使副立西偏肅與子澄亦在此列意是以館伴之故不然郎官卿監不應如是之少也其後又有二百餘人預宴者除親王宰執四十餘人餘皆賀畢先退訖事凡五十七拜五次舞蹈二十五拜初入班并三次上御酒各再拜上夀罷喝與卿等同慶又四拜勸夀酒兩次共四拜初登殿就坐致語宴罷各兩拜酒七行第一行宣勸在坐兩拜第二第四第六行獨勸使副各兩拜每宣勸必先離位而立搢笏受盞赴坐宴罷謝恩拜于殿上又拜舞于丹墀而退進御酒時卻不起立餘皆如本朝之儀衛士甲卒如入見時殿下砌䃈兩道鎗子郎君紫衫幞頭執柱斧佩弓矢刀劍面殿分立凡五十人聞柱斧中藏鎗刃皆軍官子弟也大安殿十一間朵殿各五間行廊各四間東西廊各六十間中起二樓各五間左曰廣祐後對東宫門右曰弘福後有數殿以黃琉璃瓦結蓋號為金殿聞是中宫殿上鋪大花氈中一間又加以佛狸毯主座并茶牀皆七寶為之卓幃以珍珠結網或云皆本朝故物卓前設青玉花六朵看果用金壘子髙疊七層皆梨瓜之屬其次皆低釘細果傍設玉壺以貯餘酒未至時覆以真紅繡衣既坐八人皆公裳舁以前分兩翼卻行以退榻前服玉帶者八人太子許王對坐次二丞相餘不知何人其後各金帶者六人使副與左右丞相對在玉帶之南稍後自金帶以下皆用銀器榻後照屏畫龍如本朝頂為大金龍盤其上餘十間皆結罳頂小拱三層皆以金為小龍間置其中曲折皆釘以繡額壁柱衣繡幃中各有龍又有金香猊金龍山各二露臺三層兩傍各為曲水石級十四最上層中間又為澀道亦覆以氈上夀酒時太子獨至澀道下捧杯以進者三山棚起十一峯號仁夀山山下栽松柏并裝桃李各十餘株大獅象各一背負七寶又以綵索繫棚之前為小獅子二以蔽其杙弘福廣祐之前又各為綵樓三間三節人宴東廊下髙麗使次之西夏使與對二國三節人雖預宴不拜于庭其餘廊屋皆垂黃沿簾伏甲其下殿前都副㸃檢完顔仲烏古倫元忠二人各執柱斧率其徒十人立御榻兩傍東西向榻後近侍八人各執其物終席不見宦者每上國主酒係宣徽使敬嗣暉等互進以金托玳瑁碗貯食卻只覆以金扣紅木淺子令承應人率爾持進其禮文不倫如此樂人大率學本朝惟杖鼓色皆幞頭紅錦帕首鵝黃衣紫裳裝束甚異樂聲焦急歌曲幾如哀挽應和者尤可怪笑宴罷歸館二日癸丑晴張鉉賜分食圖克坦通賜酒果通舊作徒案圖克坦今改單通分食二盤一盛大肉山以生葱棗栗飾之其中藏一羊頭一盛茶食糖糯粥粟飯麥仁飯皆以棗栗布其上晚大風作三日甲寅晴風益甚赴花宴于大安殿大率如元日加酒二行五行後四䟆國主先起百官出就簮花剪綵為之惟欒枝甚異或四或二長二尺許花為雜色狀如錦帶翹起幞頭四角後垂栁四枝是日風既暴狂幾不可行花葉飄墜者往往有之少頃六䟆國主復坐又四行而罷是早見黃土鋪道中由左翔龍門出應天中門折而東向知國主以元日謁原廟云四日乙卯晴射弓宴張倬賜生餼髙蕙賜宴完顔髙賜酒果完顔仲雄押宴仲雄于進趨酬應一無所能手有雕青細字蓋以射選借官而來射雖不能命中而善于發矢人多服之酒七行各分位換窄衫束帶將出射宰執遣右司張汝弼傳語問俘虜人事既退使副及館伴射弩仲雄射弓射垜設庭下上畫火珠夾以小飛鶴二下畫一綵架以承射帖夾以大立鶴二緑竹數竿帖上初為銀碗五每頭二矢少頃加四花二矢押宴館伴國信使副知閣五人以次執一矢起揖以射皆坐胡牀庭下分列錦衣金帽衛士五十人樂人立其左又衛士一人為押宴執弓矢二人為館伴過弩一人端箭二人立垜側喝箭射每中則面㕔傴立撒手報覆樂使喝打著即樂作否則以擡捺後手見曉初中時先望闕拜賜衛士以元矢穿所中銀楪引賜物過其前就坐共飲勝者酬酢必遍然後復射楪子重三兩中角花者隨所中而得中的者舉九楪得之以其一與喝箭者初中亦如之使副拜賜之後但欲成禮即已伴使志在于得抵暮不肯休屢謝止之方已兩廳過弩者各以二楪酬其勞易衣就座又二行而罷倬口宣云逺將慶幣來㑹春朝方休徒御之勞宜有餼牽之賜蕙云長途遠屆使事告成將觀射御之容宜示宴私之寵髙云已成使事將向歸途宜有珍頒以彰寵遇五日丙辰晴入辭仁政殿客省茶酒既罷引使副欲入而閣副云合自下入辭遂復回幕次乃引三節人拜賜宣明門外次引髙麗西夏二使及使副至隔門外夏使已出麗使方辭少俟至丹墀下面西立俟通班面殿方拜喝有敕兩拜又喝賜衣帶鞍馬匹段等義手左跪受賜以賜目納懷中就一拜舞蹈五拜再喝賜酒食又五拜升露臺少立舍人兩行各三人齊揖以入欄子內副使躬身使少前拜跪受書卻行與副使齊立躬身俟傳示訖復退行三步左下丹墀再面殿立躬身聽喝好去由右而出賜茶酒五行于館韓鋼押伴六日丁巳晴先發粗車行使副率三節人同館伴出至燕賓館賜宴完顔元賜酒果完顔宗安押宴仍差安德德裕送伴盡借回程私覿泛送從之車馬欲行安德方呼其家人以細車般所得還家如木綿之類復載至汴京滯留至晚方行燕山本召公所封秦滅燕以為上谷郡武王封堯後于薊即薊縣也二世時韓廣自立為燕王項氏封臧荼髙帝封盧綰皆都此太行燕山大防山綿亘千里隱然一都㑹金又以宫室侈大之古所未有也又改曰大興府其守為尹車行六十里更盡宿良鄉縣七日戊午晴五更車行八十里涿州早食又六十里宿定興縣八日己未晴五更車行六十里安肅軍早食又四十里宿保州九日庚申晴隂風有雪意四更車行七十里望都縣早食又行五十里道中看大龍桑小龍桑宿中山府十日辛酉晴四更車行五十里新樂縣早食又行七十里宿真定府道傍老嫗三四輩指曰此我大宋人也我輩只見得這一次在死也甘心因相與泣下十一日壬戌晴賜宴張汝說口宣云復將使指少憩中途宜示宴慈以光行色又云使命改轅價藩弭節宜頒寵賜增重皇華同知真定尹田鍾吉押宴十二日癸亥晴三更車行六十里欒城易驢馬三十里飯趙州城角樹上有蘆席裹一人云是强寇李住兒自煬王時作梗劫人婦女以要財物至是以弓弦斷為弓手所捕挑脊筋挂樹上死矣直候支到賞給方取下埋殯又六十里宿柏鄉縣與去僞以馬前行再讀光武碑十三日甲子四更車行六十里飯內丘縣天明雪作至晚方止又四十五里宿邢州北門曰拱德十四日乙丑霿子下天明開霽四更車行二十五里至沙河縣易驢馬又三十五里飯臨洺鎮食後與去僞馬行四十里宿邯鄲縣雪後塵清盡見太行山色邑中沿街作燈洞頗可觀十五日丙寅晴車行七十里磁州早食燈火尤盛出門粗車有折軸者隨使副乘馬過漳河登車六十里至相州使副復上馬入城燈洞不如磁州之多而工巧過之秦樓街尤繁華自北門至南門約七八里所士女多靚糚擁觀有食店挂一燈上為胡羊中橫一瓠下為經一卷蓋河朔人語音以羮為經也宿城外安陽驛把車人言去年十二月方差使一番為年時被䝉子國炒舊時南畔用兵盡般軍器在南京今卻般向北邊去三月中般用牛三千頭般未盡間被黃河水漲後且休問驢馬價云驢上等有直四十千者馬更髙貴舊時家家有馬煬王南征盡刷去不知幾萬萬匹後來都是行歸而今又殃我等貴價買問絹帛價云好絹每匹二貫五百文絲每兩百五十文十陌並六又有云越王不平其弟為儲國主曾以女小底十人賜之遜謝不受云他日生出孩兒來亦無用處䝉古國作梗太子自去邊頭議和半年不決又且歸今又遣莫都統提兵去軍子云我輩三四日種少麻豆足了得喫舊時見說厮殺都歡喜而今只怕簽起去彼此休厮殺也好又有云我見父母說生計人口都被他壞了我輩只喚他做賊應河南北錢物都般向裏去更存活不得十六日丁卯晴四更車行三十六里飯湯隂縣又七十五里宿濬州安德暮夜叩門送私覿十七日戊辰晴風三更車行二十五里三角路上換驢馬一路可入滑州又四十五里武城鎮早飯馬行至黃河去程所行李固渡口以冰泮水深柴路不可行又稍上三四里先橫過中灘上入水牽挽數里拋過南岸待車船至方行循河至浮橋邊掃岸又行荒草陂澤中四十五里宿胙城縣十八日己巳晴三更行四十五里飯封丘短牆為城人烟牢落便遠不及河北日未午又行四十五里抵東京北郊青城側亭子換馬具衣冠所過柔遠館但有斷垣敗屋入順常元武二門二門之間過五丈河菜市橋夷門山巷口百王宫乃煬王毬場親從第一指揮舊日御龍直也由竹竿巷口斜街入第二門土市馬行街皇建院巷德勝橋轉太廟巷口東行相國寺出御街歷廊屋三十間過榷貨務又廊屋七十間中有小門是國子監前後御廊尚多不知其數投西穿門由舊路入驛十九日庚午晴收銀絹十匹兩赴宴完顔元賜宴酒果南京路都運梁銶押宴宴罷行四十五里宿陳留縣二十日辛未晴車行六十里至雍丘縣早飯臨川驛又六十里漸行汴河中宿拱州襄陵驛城外客旅往來人家頗多入城舊有橋河流既斷築隄以行子城內舊是州衙今以屯軍有三箇千户約有千二百人二十一日壬申晴四更車行六十里飯寧陵縣永寧驛又六十里宿南京甲士數十甲馬百夾道而陳城門去驛稍遠馬如來時之數而行甚疏意屯軍亦不甚多也是日日有四背氣又白虹貫日日在壬癸荆生言其應在北二十二日癸酉晴四更車行四十里飯穀熟縣又三十五里沙岡換驢又四十里宿下邑縣㑹亭鎮二十三日甲戌晴四更車行七十里飯亳州永城縣又六十里宿栁子鎮聞有天使往山東簽兵人不肯從執天使殺之二十四日乙亥晴車行四十五里飯宿州臨渙縣蘄澤鎮早頓又四十五里宿宿州汴河底多種麥二十五日丙子隂晴車行六十里飯蘄縣靜安鎮又六十里宿靈壁夜微雨作即止二十六日丁丑隂晴三更車行八十里飯虹縣又八十里宿青陽鎮驛二十七日戊寅晴四更車行八十里飯臨淮縣過縣即見龜山塔及淮山一行已不勝喜躍矣又六十里宿泗州自臨淮即依淮西行二十八日己卯晴先發遞擔粗車即上馬出城使副入草館同去僞先乘馬至河岸舟至首見季舅洪子度唐季潤及吕葵張吉來收家問喜極涕下頃之俟行李裝船了卻具衣冠入草館俟使副茶酒畢辭送伴即行是日大風拍岸良久方到盱眙謁胡漕龔守不值見王御幹取所買物譙提轄司馬尚書伋姜叔永司馬季聞張伯淳皆往來交謁後綱官屬也宿淮岸二十九日庚辰微雪早離盱眙過龜山以新制行淮大風不可進宿淮岸約去龜山數里三十日辛巳微雪天明欲舟行風又大作力行而前過瀆頭數里風正北駕浪益急又止宿二月一日壬午午後風力稍平衆舟齊行迫暮僅能入洪澤舟人交口相賀昔蔣魯公開運河六十里以避長淮之險所活不知幾人中間歐家渡最淺使人往還非借潮于神不可行官司憚開河剝載之擾創議行淮使舟才四往返無不驚虞此行至三宿淮上波濤春撞有魚腹之憂魯公今丞相曾祖為發運使將入奏計自洪澤至龜山率一二里輒鑿一井以測地之土石既得請遂開運河前輩用心至矣可輕改乎二日癸未晴過淮隂夜過楚州三日甲申晴過寶應四日乙酉晴過髙郵五日丙戌雨以沿路水澀寸進甚艱夜宿木鋪壩裏季潤過儀真俞縣尉茂先相見甚款六日丁亥雨晚晴昨晚以禮物船與前船舳艫相觸斃一篙人至召伯埭使副捐金使瘞之晚過揚州是夜禮物船為暗樁所敗漏發而人不覺同行楊劉羅三人蒙被登岸舟已沈矣抵瓜洲宿七日戊子晴渡揚子宿丹陽館下侍季舅同去僞見陳待制及魏子智其內子展參賀執禮甚恭金山印老相見渡船中八日己丑晴城中水澀良久力出門夜過丹陽縣及吕城閘九日庚寅晴天明過奔牛閘午後過毗陵十日辛卯晴天明抵無錫使副謁蔣丞相罷即行喻郎中訪及任富來知諸舅來迓夜宿楓橋十一日壬辰晴過平江城外午後過吳江久苦淺澀至是大風駕太湖水入港張帆而行陳表兄張子家丁表兄胡子淵相見十二日癸巳晴天未明到秀州同去僞尋見王江隂值送女陳宅未歸見直甫于臥內謁鄭景元判官同年不遇已聞仲兄見次到廨宇一觀出門李同年主簿相見于郵亭王表弟澤同行數里而歸讀江隂奏狀無不擊節稱歎夜過崇德抵長河閘十三日甲午晴天明起見諸親午後過臨平赤岸晚泊閘頭使副入仁和館受傳宣賜銀合茶藥因出所撰還醮青詞宿稅務下發家書附遞十四日乙未晴使副上馬赴朝參船入北關以小舟般載歸舅家一見至親喜氣自倍而歸興益勇矣是夜與諸親劇飲醉甚仲舅有詞走筆次韻二闋十五日丙申晴侍季舅同去僞謝曾知閣不遇又謁范丈甚款十六日丁酉晴士頴弟攝蕭山尉别去胡春自婺女來收景山兄書飯後出謁吳太博胡給事陸寺丞陳大諌薛國正苪司業張少卿林編修尤宗丞始聞銅坑之議十七日戊戌晴謁閭丘監丞欲問坑冶之詳不值同去僞智叟侍叔舅陳表兄以小舟見陸子山留飯而歸赴景孟舅晚飯被酒先歸十八日己亥晴飯罷赴梁參政呼召客次遇蜀士郭倅甲馮太丞仲夷十九日庚子晴吳太博盧監簿連日招飯皆力辭之治疊行李雨作買船二十日辛丑小雨即晴諸親作醵泛湖五十餘分以水淺不可傍岸盤旋湖中抵暮醉歸二十一日壬寅雨赴范丈晚飯二十二日癸卯雨侍仲舅往延祥觀醮筵同上中節兩焚香致敬齊罷各散與去僞小舟自湧金門歸先遣承局吳蓋行發家書二十三日甲辰雨先發行李下船兩返方畢使吕葵張吉宿舟中期以來早啓行以舅家挽留又展一日二十四日乙巳晴去僞生朝仲舅與諸親同作慶偷閒謁李恩州授般運法是夜大醉中拜辭諸親二十五日丙午晴早作襆被辭舅家轎行七十里出暗門由赤山出六和塔下至廟山登舟宿富陽雨作二十六日丁未晴雨作復止風逆寸進至三江口東風微動方理帆忽西風再起甚徑力挽至桐廬凡行九十里過青溪二十七日戊申晴東風張帆過鸕鷀原釣臺下伴伯原風止過烏石大浪灘十五郎灘大浪最可畏雖以水漲不見灘磧而岐頭水怒良久方上居民以小舟來助刺船什伍為羣以舟輕止用一人方當湍流忽隨篙墜水觀者膽落而少年善泅如履平地復登舟助力犒以百錢而去宿東館凡行九十里去嚴州二里二十八日己酉雨大作午間加以西風水又盛長舟人疲于牽挽屢止復行晚雨止風靜行至烏岐灘下宿小港中才行三十餘里二十九日庚戌晴風亦止但以水漲寸進遇一岐輒移時方能冒險以進懸崖飛瀑所在見之雖快覽勝處至凌犯怒濤亦可駭也所過白雁二岐尤暴怒又過橫流數處夜同衆舟宿桑林間隔岸望鄉頭終日驚險勞動止行三十餘里夜水益長至五更方少退三十日辛亥晴舟子早起候望前路黃泥岐不可上復回數里尋路避之泝流行亂林間半日方出大溪晚至蘭溪先以劄子與李尉由懇雇五夫李以庚辰登科其子遂夫又癸未同年便訪逆旅繼往見之宿客舍三月一日壬子風雨早起束裝飯後李尉來訪即行又飯竹馬館晚到婺州首見趙金華子濤不值徑入郡學直舍省景山兄周教授汝能雍無錫希稷相訪周與景山兄同官雍同舍也借周直舍安泊少選侍景山兄過周之五柳堂堂本蕭侍御振所建詩牌尚多盡得雙溪之勝王察推楠亦來訪同飲劇談至二鼓方歸二日癸丑雨侍景山兄見李使君衡留來日一飯客次遇解節推延運是日景山兄周趙雍王醵就五栁相招早飯又坐養原堂無盡藏台人陳文學願周之故人也同坐解推又約晚飯六人徑自五栁赴之李知録張義烏同集于酉退軒琴棋投壺坐客皆醉李糾又約來日早飯三日甲寅雨侍景山兄同周教授謝李使君客次遇唐正字仲友遂復還無盡藏同出梅花門過浮橋數里迓蘇倉嶠歸見唐正字歸學發五擔付張吉先歸侍景山兄赴李糾飯坐清遠樓景物尤勝同㑹七人解張雍王酒三行李守速客即往赴之劉判院藻陳子厚同集小候自公堂坐半政堂勸酒移忠堂酒罷劉先歸余四人復過五柳手談清飲夜分乃散四日乙卯隂晴微雨間作早别景山兄即行三十五里飯摩訶樣又行數里遇麗水林丞良過婺鞫獄相見逆旅宿楊公橋永康界首行八十里五日丙辰晴過永康數里飯至李溪遇承局持家書來接晚過黃壁里飯黃碧二十八里宿和尚店去李溪猶案上卷乾道五年十月二十一日行三十黃壁與黃碧係一處而壁碧互異姑各仍原文二里比云過永康數里飯至李溪晚過黃壁似六日丁巳雨過縉雲邑官相迓皆謝之獨見李同年又送過大溪而别縣得四夫又荆山寺四夫輪番舁轎冒雨登馮公嶺至天寧寺已昏黑仲兄器之仁甫不愚元聲淳張子質相接先行還家拜二親燈下上下無恙歡聲相聞喜可知也攻愧集卷一百十二
