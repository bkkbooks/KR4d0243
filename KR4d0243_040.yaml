body:
  text: 宋樓鑰撰外制知婺州葉翥知紹興府敕輔郡承流久不聽尚書之履價藩謀帥茲又懷太守之章允謂才難莫先德選具官某智周慮表學紹儒先踐揚既歷三朝侍從亦踰一紀愛人利物由天性之自然足國裕民處地官而最久屢更劇部深惠疲氓盡銷愁恨歎息之心尤見勞來安集之政眷惟東土密邇行都先帝上賓將奉因山之役大邦維屏益嚴分閫之除惟爾通材稱豫隆委規模素定既所臨而有聲威信兼行當不擾而自辦佇聞成效奚俟多辭新知紹興府倪思知婺州敕具官某視禁林之草允藉通儒分輔郡之符俯從忱請相攸既審易地皆然爾學優而醇文麗以敏早登宏博之選徑上淸華之途翰苑詞垣擅兩制絲綸之美經帷史館極一時筆槖之榮擢二儀曹獨司邦禮拭圭出使握節言旋曾坐席之未溫俄抗章而自列豈久勞侍從之事遂厭直承明之廬懷㑹稽太守之章至勤再命繼東陽隱侯之詠去擁一麾勉為朕行毋輕民事詞人而任嶽牧初無內重之偏宣室之對鬼神當俟政成之後䕫路運判陳謙湖北提刑敕具官某爾以君子儒為湖北常平使者蠻猺披猖省民驚擾船粟而往哺之爾之職也因攝憲臺併任其責就設方略隨以撫定朕聞而嘉之可謂不辭難者矣乃酌帥臣之言姑輟䕫門之役兹庸命汝持刑本道以慰民望以奬爾勞其思永圖靖此一方不汝忘也湖北提刑王謙湖南提刑敕具官某部使者之選以風采為先所以寄吾耳目于千里之外不欲其數易也以爾志操不凡居有直氣其在郡邑聲望翹然持憲湖陰正欲倚重易節鄰部非以便爾之私又將于爾乎觀焉尚勉之哉判太史局降授夏官大夫吳澤降授中官大夫荆大聲降授中官正劉孝榮同判局降授局令周端友並復元官敕具官某等天道高遠王者欲求端于上必有日官以司之爾善于觀象見謂老成頃以不謹嘗鐫命秩涉期而敘法也勿以為宜得而忘所報修武郎監建康府榷貨務門茅恭收趂增羡轉一官敕具官某榷貨之在留都歲入甚夥增羡之賞司關者亦預焉進爾一官益勉而職建寧府浦城知縣鮑恭叔降兩官永不得與親民差遣敇具官某縣令與民最親獄事所宜深察也爾為大邑以重辟告于郡卻而復上幾陷平民于死逮寃狀既白而欲便文以自解乎外臺有言奪汝二秩不復使任臨民之官尚為輕典也中大夫煥章閣待制趙彥操轉一官致仕敕鎮五羊之地方通持槖之班叩九虎之關忽上挂冠之請是為宗老宜厚寵章具官某受才素優蒞政尤敏早參民部旋自逸于燕閒晚歷藩方嘗屢騰于課最眷南海折衝之略升西清次對之聯聞囹圄之屢空見里閭之不擾胡為感疾遽欲乞身念帥閫之幾年進文階之四品鄭尚書之威信日佇來歸漢大夫之優游諒深自得以華晚節以勵能臣帶御器械某知閣門事敕設上閣之官豈惟掌朝㑹之事選名門之子抑以儲將帥之才具官某志在事功家傳韜略奏最于淮陰為侯之地易鎮于亞父所封之城聞父喪而棄官人咨其孝承召命而引道朝賞其忠釋苴杖以趨班屬櫜鞬而衛上授之以仲叔圉之任可使當公西華之言惟子道臣道之知方宜軍容國容之俱習是將用汝尚其勉旃武功大夫殿前司選鋒軍統制李浩總轄牧放合轉一官久任有勞轉行遙郡刺史敕具官某兵久不用軍中纍年勞以進武爵率有止法無得踰焉以爾久任戎務舉軍推其能出視駉牧善修馬政寵以郡刺史之職蓋異恩也其奮事功以圖報稱侍御史張叔椿權吏部侍郎敕朕祗膺丕緒董正具僚六部之分莫如選部之為重小宰之事豈應冢宰之兼行輟而風憲之嚴司我銓衡之舊具官某性資凝粹論議正平襲永嘉之儒風蚤收科級守文昌之家法雅擅鄉評再䇿足于朝行幾問津于禁路進班柱史君舉必書攝事天官吏姦無蔽自擢居于橫榻久肅正于南臺當豫御圖三日之初俾爾正位二卿之列規模素定要須甄拔之盡公藻鑒益明無使賢愚之同滯副兹隆委成爾修名左司諫章頴侍御史敕具官某朕臨御之初精求政體正心以正朝廷正朝廷以正百官朕之所務也然一朝之綱總于憲臺一臺之柄屬于端公茲得其人他可類舉以爾秉心堅正燭理融明學問之懿察于朱邸橫經之日風節之峻見于諫省論事之際不俟信宿擢之南牀其為朕别白正邪振舉蠧弊使君子有所恃小人有所畏四方風動而朝廷益尊于豫初政豈曰小補之哉右正言黃艾左司諫敕具官某古者天子有諍臣七人而後之諫官不過一二苟非精擇正士何以補衮職之闕哉朕御圖伊始下詔以來直言舊學之臣聲著騎省首命序進以示四方爾發藻士林負敢言之氣事朕宗邸動有針規輟任拾遺兼侍經幄風采凜然聞于中外茲庸命汝官以諫名豫違則汝弼汝言則豫從豈惟身處寡過之地庶幾海內之士聞其風者有樂告以善道之益焉國子司業李祥宗正少卿敕具官某爾朴茂忠恪見推士林頃二司成學者厭服蓋平日踐履之效是可以聲音笑貌為哉司宗少列位亞容臺敘百世之本支修纍朝之史牒惟老于文學著述不倦者可以當之舉以命爾公論惟允勇退之志亦可以少回矣吏部郎官葉適國子司業敕具官某國家萃天下英才而置之學選于衆而為之師經術由此而明人物由此而出豈細故哉朕御圖之初思欲作新學者耳目求當今第一流素為天下士所推服者以正師席宜莫如汝矧茲郎潛資望俱稱故用之不疑傳不云乎善待問者如撞鐘叩之以大則大鳴叩之以小則小鳴惟汝足以當此哉司農少卿蔡戡司農卿敕具官某大農本周稷之業自漢名官以來惟朱邑號循吏鄭康成為大儒唐之假秀實以忠節自奮官以人重顧不信歟爾以儒術治行選為少列徊翔朝行最為舊人進而為長雖曰序遷益勉所長以紹乃祖之風烈何止為此官之重哉劉光祖司農少卿敕具官某忠直之士為國之寶本朝名臣豈無以直道去國者旋復召用以至大位此又祖宗之家法也況爾豫之舊學相從有年執法殿中號稱謇諤雖嘗引去聖父任以外臺帥閫之寄不使之一日家食也茲庸命爾為少列于大農實為多士先尚遄爾驅以副朕傾徯之意顯謨閣待制黃裳給事中敕眇豫沖人臨政伊始惟我太上知卿最深朱邸談經專任以輔導之事銀臺批勑又屬以出納之言雖抗論而遷厥官終留行而不使去至今日而復用豈人力之能為具官某學貫九流識通千古世居劍外擅蜀士之雄文地近關中挾西人之徑氣是非邪正惟務體國利害禍福不知有身久從吾游備見爾藴逮此纂承之日付之封駮之司將求多聞毋替諄諄之誨不負所學會觀諤諤之言倚注方深權輿于此新除起居郎陳傳良中書舍人敕朕嗣膺大統收攬羣才朱邸賢僚豈容居外紫垣老手宜俾為真具官某學探聖原文追作者論議多先儒之未發行藏惟古人之與稽相從兩載之餘信為三益之友謂左氏真得春秋之旨謂周官實為太平之書推祖宗之本心明政事之要道昔信其說將行所言首卑故官洊加新渥矧是纂承之始尤資播告之修大老之居海濱是將焉往舊學之遁荒野其遂來歸式遄爾驅以副朕望起居舍人彭龜年中書舍人敕中書造命之地實王政之所先內史代言之官非賢才而孰處我有舊學時為名流擢登詞垣實預國論具官某為有用之學抱軼羣之才惟其善養之氣剛遂使所居之官大班分螭陛視言動而必書額叩龍墀抗威顔而不撓方朱邸橫經之日多赤心憂國之言逮膺超除深允衆望訓詞溫厚爾其振盤誥之文朝夕論思爾毋廢針規之益尚圖忠報奚事多辭將作監黃由起居郎敕具官某王者嗣膺丕祚首用舊僚非欲私我所與而厚平日之恩蓋將舉吾所知以來當世之士列爾二史助豫一人以爾蚤冠儒科久儀朝路不以仕已為意而益進于學不以利害為計而務極其言囊封既效忠嘉殿陛尤加剴切被眷知于慈扆為賓友于王門逮初政之方新與羣英而並進入則侍螭頭之左凡論事而直前出則班豹尾之中亦在法而當從是為爾寵期懋豫衷著作郎沈有開起居舍人敕具官某朕踐阼云初涉道尚淺實賴二三元老力濟多艱更資左右近臣交修不逮惟平日賓僚之舊分一時言動之書匪豫敢私惟爾能稱爾詞華敏贍學術淹通蚤蜚場屋之聲名久歷膠庠之師表以著庭而兼史筆之重由郎省而參宰掾之司比從豫遊實自親擢學為可用閲義理以滋多中自不欺樂講論之日益其居柱下密侍朕前尚思嘉猷以助初政參知政事陳騤知樞密院事敕九五正位方承太上之傳二三大臣俱極當今之選用人由舊錫命維新既久二于政機宜進專于省府具官某氣剛而不撓德盛而有容以博學篤志而為世醇儒以正色直道而致身近輔斯謀入告則惟后之德一夫不獲則時豫之辜厚重若絳侯而有多文之學彌縫若如晦故無揚已之名朕念周業之艱難慕漢機之周密眷我元老長豫本兵藉東省之猷為領西樞之方略事均一體威示四方噫折千里之遐衝顧豈圖于近效建萬世之長策正有賴于訏謨其務同心以康庶事同知樞密院事余端禮參知政事敕文武兩途實歸一道東西二府允賴兼資粵豫非涼膺此付託乃進鴻樞之二俾參鬷嘏之嚴具官某宅心粹夷植操堅特凜凜有大臣之體謙謙得君子之風壽皇知臺察之名擢居法從太上眷儲僚之彥授以本兵喟然形憂國之誠卓爾任正君之責言婉而切氣徑以溫故于宥密之司率藉調娛之力稽之公論蔽自朕心欲新政之設施宜舊人之圖任是資共二有賴同寅噫朕方求內外之安經理于上爾尚慮軍民之要彌縫其間庶幾有成其永無斁覃恩文臣承務郎以上轉官選人在任并嶽廟循資定詞敕具官某朕奉太上之慈訓嗣守丕圖踐阼之初大敷霈澤京秩而上咸進厥官守者皆許序進嶽廟云雖食選人在任云凡預選階有官許序進祠祿咸蓋將樂與士夫共起治功也各揚乃職以稱異恩文臣承務郎以上致仕定詞敕具官某朕仰惟太上不俟倦勤傳祚眇躬覃霈之頒仕者進秩雖致其事亦預此恩老吾老以及人之老王者之仁政也朕心庶幾焉端明殿學士知江陵府王藺資政殿大學士知潭州敕朕嗣居九重臨制萬國若刺史縣令之衆未暇究詳惟方伯連帥之功首當褒表眷時元老嘗秉鴻樞撫荆楚者有年易湖湘之重鎮具官某受天間氣為世名臣直節高風真可立懦夫于百世之下崇論宏議將欲舉明主于三代之隆受知兩朝致位四輔過江而見王導有國何憂舉衆而得臯陶不仁自遠控長江之都㑹建大將之鼓旗固邊圉以內周宣王靈而外暢惟豫初政之急念茲舊弼之賢下詔求言方期樂告視邦選牧有賴于蕃惟此昭潭峙乎南服帶洞庭而負喬嶽扼嶺嶠而震蠻猺藉卿威名壯我藩翰加以大學士之貴用為東諸侯之先噫陶公之封長沙足倚上流之重賈傅之對宣室已深前席之思尚遄十乘之行以慰一方之望知常德府袁樞右文殿修撰知江陵府敕具官某荆州居國上游自古為用武之地謀帥之重每嘆才難以爾鯁亮之資淵博之學養氣以義不撓不阿有憂國愛君之心有憤世疾邪之志一辭禁闥家食纍年起鎮武陵治行昭著寵以論撰之職以殿是邦朕承丕圖臨制四方萬里之遠謂斯民宅生于刺史故大明黜陟以示好惡由支郡而受閫寄爾實為初政第一選固圉靖民可不懋哉兵部尚書羅㸃父奉直大夫朝俊覃恩贈中散大夫敕朕祗荷慈謨嗣膺大統爰敷曠蕩之澤以及中外之臣矧喉舌是司兼領典銓之重而松楸在遠方深陟岵之思乃分寵光用賁冥漠具官某天資純茂族系繁昌早為君子之儒稱于里社自樂先王之道老矣丘園尚及郗超入幕之賓不見紀騭隔屏之坐素多隱行遂為大門兹登五品之崇足慰九原之望賢子方用侯封未央其歆綸誥之恩繼有蜜章之渥參知政事陳騤該覃恩封贈曾祖太子少保斆太子太保敕朕祗膺慈訓勉紹丕圖允賴邇臣其濟萬幾之務爰因惠澤特推三世之恩具官某積善素深秉心無競恂恂有守既高月旦之評坦坦無營自樂衡門之老侈厥餘慶流于後昆進參政地之崇追貢儲僚之峻肆由亞保薦錫明綸用昭寵靈以慰冥漠曾祖母始興郡夫人成氏河內郡夫人敕朕履位云初均福于下有如近輔之重可後曾門之光具封某生于儒家嬪此名族動謹珩璜之飾克供蘋藻之儀是有聞孫晚參大政易翁源之舊壤開河內之新封陰報可知寵光未艾祖太子少傅䇿太子太傅敕圖大宅中方布維新之令建極斂福實均共政之臣爰舉彝章加賁先世具官某履行純固禀資粹和福祉未央見生子生孫之盛人門俱勝無慙卿慙長之名申命九泉遂登六傅太傅與下句意義混不可從案六傅見晉書何劭傳一本作茲進在前之職用為有後之榮尚惟不忘其克祗服祖母和義郡夫人朱氏博平郡夫人敕惟時近臣翊豫初政厥有霈澤光爾前人具封某素稟嫕柔能循法度中饋攸職宜其室家慶源既深有此湯沐載啓博平之號益崇石窖之封是為異恩以詔幽穸父太子少師讜太子太師敕維豫沖人嗣大歷服無疆惟休均暨海宇凡列朝籍皆得以榮其親矧二三大臣顧可後歟具官某尚友古人為世善士安時處順不求聞達藴蓄弗露是宜有子既執政柄寵及泉壤義方之訓蓋可驗矣乃進宫師以慰雨露之感英靈不昧其尚寵嘉之前母平樂郡夫人成氏文安郡夫人母咸寧郡夫人王氏濟陽郡夫人敕大寶是守賴兹臣鄰湛恩普覃燕及禰廟具封某克遵壼範能謹婦儀舉案事夫聿追德曜之美斷機教子無愧軻親之賢既陟近臣屢揚恤典兹載疏于新寵用加峻于小君以寬吹棘之思庸示漏泉之澤妻東牟郡夫人宣氏封魯郡夫人敕丕緒紹隆方履重熙之運臣工翊贊宜均內助之恩庸頒鸞誥之華以詔魚軒之貴具封某靜專自守儉約有聞作配名卿能勉以正克主中饋用肥其家視夫爵以疏封由霈恩而攺命乃疇曲阜載錫贊書尚迪令猷以祗茂渥禮部侍郎許及之該覃恩封贈父朝奉郎樞贈朝請郎敕朕祗荷慈謨嗣膺大統爰敷曠蕩之澤以及中外之臣矧吾二卿欲寵先世可無渙渥以發潛光具官某坦坦幽人恂恂長者惟居鄉不變其素守而教子能知夫義方隱行有聞陽報如響親見儒科之擢蚤欣宦牒之榮遠奉安輿既愴九原之隔茲持禁橐何勝三釡之懷超官簿以升階冠郎曹而視秩是為曠典少慰孝思故母安人呂氏贈令人敕九五正位方承與子之傳小大羣臣俱有榮親之典載頒明命以示寵光具封某淑靜自將柔嘉可度嬪于善士克共蘋澗之儀生此名卿徒起棘薪之嘆既更事任遂陟禁嚴爰疏告第之恩以顯漏泉之澤尚其冥漠式克欽承繼母太恭人五氏封太令人敕五正位六句此下同前九具封某雅著壼彞恪循婦道儉勤自詔允為中饋之賢甘旨承顔坐享安輿之奉既登眉壽茂擁多祺乃因霈澤之行超示疏封之寵其祗朕命益侈爾榮故妻安人洪氏贈令人敕凡我從臣均此大霈爰及閨房之秀並膺綸綍之華具封某鍾慶相門流芳女範蚤從名士將仰望于終身胡嗇永年曾不登于中壽逮躋顯用嘗賁恤章兹超命服之榮用錫幽扃之寵姑從告第以慰悼亡妻安人潘氏封令人敕我從臣四句此下同前凡具封某稟姿靜專處已沖素動遵女戒克循待傅之言躬習婦儀果見從夫之貴治組紃而有度奉溫凊以尤恭象服是宜鸞箋增寵其服恩光之渥以彰內助之賢煥章閣直學士中奉大夫丘崈磨勘轉官敕具嚴銓法所以示百僚之公優待從班猶不忘三載之考爰頒命綍俾進文階具官某以拔萃之才負爽邦之望進二民曹之重心計有餘出臨井絡之區威名益遠方謀陟典適會年勞遂升漢大夫之名用為蜀太守之寵其祗渙渥嗣有殊褒見任侍從該覃恩轉官兵部尚書羅㸃尾詞同以下首敕朕嗣膺鴻祚祗遹燕謀九五正位之尊何德以稱二百餘年之業得人乃興眷惟禁路之英皆我慈皇之舊爰因覃霈首示優恩具官某以經世之才為致君之學早登朝著益顯時名久居侍從之班務竭論思之藴末光之依日月既親遇于三朝聽履而上星辰足儀刑于百辟方藉嘉謀之告亟升命秩之華其務同寅以光初政工部尚書趙彥逾具官某砥礪廉隅磨礱事業挺身徇國是為貴戚之卿正色立朝遂陟文昌之貴翰林學士李巘具官某德必有言文斯貫道蚤儀鵷序徑登紫槖之華進直鸞坡久被金蓮之寵刑部尚書京鏜具官某學博而智明才高而用大出分方面曾遠憺于王靈入踐文昌實坐司夫邦典兵部侍郎耿秉具官某持論不阿修身無玷參華武部久儀法從之班共二瑣闈克振塗歸之職工部侍郎謝深甫具官某忠結主知才周世務雍容禁槖屢形批勑之風潤色邦條雅得稽經之意給事中黃裳具官某性稟精忠學窮奧義潛藩勸講賴誘進以最深瑣闥除官冀塗歸之如昔中書舍人陳傅良彭龜年具官某學貫九流名滿四海純明謀猷深遠彭龜年云學識橫經朱邸遂依日月之光掌制西垣期鼓風雷之號吏部侍郎張叔椿具官某迪德粹和受才膚敏久居橫榻實高風憲之嚴兹任小天允致銓衡之重戶部侍郎袁說友具官某器度恢宏風神峻整宣威天邑政允號于神明掌計民曹道深知乎取豫禮部侍郎許及之具官某智術疏通詞章精敏拾遺諫省雅有諍臣之風掌禮儀曹克守先王之典起居郎黃由等該覃恩轉官起居郎黃由起居舍人沈有開尾詞同以下首敕具官某朕嗣膺鴻祚祗遹燕謀九五正位之尊何德以稱二百餘年之業得人乃興眷惟近臣實有舊學爰因覃霈首示優恩爾早負時名進多朝望曳裾王邸熟陳六藝之格言載筆殿坳允謂三長之良史方藉嘉謨之益亟升命秩之華其務同寅以光初政祕書少監兼權吏部侍郎孫逢吉爾學貫古今識分邪正比當言責是為諫諍之臣茲典選曹雅善銓衡之職侍御史章穎左司諌黃艾爾早陟殊科進多雅望曳𥚑王邸熟陳六藝之精微執法憲臺笏諫垣黃艾云澤獨振一時之風采監察御史并卿監郎官該覃恩轉官定詞敕具官某朕嗣服云初求賢以自助仰惟慈皇招徠衆俊置在周行殆留以遺朕也覃霈之恩其可後乎爾職在六察在月卿郎官云列在郎曹祕書監云擢長道山卿云列序進一階往其祗命尚思所以助我者以報在外大中大夫以上官知州府該覃恩轉官顯謨閣學士中大夫知紹興府葉翥尾詞同以下首敕朕奉上皇之慈訓承列聖之丕圖霈乃渙恩覃于海宇矧是文昌之舊往宣屏翰之勞爰錫明緡俾躋命秩具官某材猷通敏德度恢洪聽履禁途坐閲十年之久分麾帥閫實為九牧之先方歌求助之詩仍加進律之寵在漢比千石之秩于今為四品之階其務欽承益思猶告煥章閣學士大中大夫知明州何淡矧惟中執法之舊往為東諸侯之行爰錫明緡俾躋命秩具官某學探藴奧名冠倫魁入總臺綱見藜藿之不採出臨制閫致波濤之不驚方歌求助之詩仍加進秩之寵在隋始大夫之號于今正三品之階通議大夫煥章閣待制知建寧府陳居仁矧是詞臣之舊往宣藩服之勞爰錫明緡俾躋命秩具官某禀資端亮秉德忠純擅西掖之雄文最宜為誥奏南邦之最課尤號近民中大夫煥章閣待制知鄂州王信矧是瑣闈之舊往宣藩服之勞爰錫明緡俾躋命秩具官某詞源浩博才刃恢餘西掖東臺嘗備更于淸選武昌夏口正倚重于上游中奉大夫煥章閣待制知鎮江府馬大同矧是文昌之舊往宣屏翰之勞爰錫明緡俾躋命秩具官某性資沈毅政術闓明持槖禁途嘗主民曹之大計分麾京口實當天塹之要津方歌求助之詩仍加進秩之寵昔倪寬則以誦書而擢若朝錯則由對䇿而除龍圖閣學士正議大夫知建康府鄭僑具官某學通乎百氏文根乎六經領豹尾之班雅有公臺之望分麟符之寄實為方面之雄徽猷閣學士中大夫知襄陽府張枃具官某才高一世氣壓萬夫聽履漢廷有張京兆之英譽分麾峴首追羊太傅之流風中大夫敷文閣待制知建寧府單䕫具官某才猷膚敏政術疏通持槖禁途坐閲十九年之久分麾侯服屢稱二千石之良煥章閣直學士中大夫知興元府章森具官某風儀峻整學術疏通持槖禁途嘗典銓衡之重分麾帥閫屢專方面之雄大中大夫敷文閣待制知瀘州吳總具官某家聲素著政術甚優四松而班殿廷實視從臣之淸貴五月而渡瀘水正資邊徼之威名大中大夫煥章閣待制知太平州蔣繼周具官某才名素著經術尤高憲府宣威尚想聞于風采侯藩共理亦屢賦于中和寶文閣學士通奉大夫知遂寧府宇文價川府知潼同詞閻蒼舒具官某禀資膚敏植行粹和聽履禁途持槖禁途閻蒼舒云嘗出漢廷之右擁麾帥閫屢登蜀道之難攻愧集卷四十
