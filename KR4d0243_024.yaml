  text: 攻愧集卷二十四
  hash: sha256:b431b7b9fa774596daa7b7887f5e34d3b3dad6a6f44337ff4cb6432092a6b1ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_024-1a}
body:
  text: 宋撰奏議論初政臣仰惟陛下受天明命膺太上付託之重以承列聖億萬年之基圖覆載兩間無不悅服竊聞陛下臨朝淵默發言精當尊禮大臣凡事審訂而後行臺諫論列給舍駮議隨即聽從而聖德謙抑增置講官收召名儒有終始典學之誠宗社無疆之休基于今日誠千載之幸會也臣至愚極陋備員從班既得以詞章小技仰代王言奏對之初敢效忠言以禆聖明之萬一自古人君即位之初多能自彊以鋭意于治天下往往稱誦望太平于旦夕以其富貴崇高安逸汰侈不期而至在位既久君子日疏小人日親逆耳之言不聞而諂諛之言日進偃然自以為安而不知君門之外皆知禍亂之作獨人主不得而知嗚呼秦漢以來賢明之君而至于此或及其身或貽禍于子孫為後世笑者不知其幾也唐高宗永徽之初日引刺史十人入閣問民疾苦尊禮長孫無忌褚遂良恭己以聽百姓阜安有貞觀之風而權移房闥幾覆唐宗明皇開元之初以風俗奢靡制乘輿服御金銀器玩令有司銷毁以供軍國之用珠玉錦繡焚于殿前后妃以下皆不得服珠玉錦繡天下毋得採珠玉織錦繡而末年窮天下之欲不足為其樂以致天寶之變德宗動遵禮法罷貢獻罷樂工縱苑獸出宫女淄青將士投兵相顧曰明主出矣吾屬猶反乎政從寬大藹然有貞觀之風而其後奉天之幸又幸梁州幾不免其身而其尤可憾者初能疏斥宦官親任朝士而後乃疑暗不知所倚任晚又益忌宿將而罷之命宦官分典禁旅終唐之世為患尤深此三者最其可戒者也陛下聖性高明惡㫖酒薄嗜好孜孜以學問為急而不以位為樂臣豈當私憂至此正以平日讀史見賢明之君不克圖終未嘗不痛之使唐之三君皆能謹守如其初則末年豈至是哉今夫官吏以三年為任者能為三年之計則可保其身或茍度嵗月鮮不及者人主修身正家處事發政動為無窮之計則可以保天下陛下任天下之重承社稷之託兢兢業業終如今日而又日親賢臣益務學問增修聖德雖休勿休天下之事及其小而謀之則不至于大自其邇而防之則不及于逺守之以堅行之以久而後治效可覩也成王訪落之詩曰於乎悠哉正未有艾心誠求之此保治之道也伏惟陛下裁幸雷雨應詔封事臣准尚書省劄子十月八日三省同奉聖㫖朕以不德嗣承大寶夙夜祗畏不遑寧處乃者隂陽謬盩雷震非時淫雨為災朕心甚懼推尋厥咎未知其由凡朕躬有過失朝政有闕違可令臺諫侍從各條疏以聞無有所隱臣待罪東臺職司論駁雷雨為沴自應論奏仰勤詔㫖尤切兢惶實以兼直內制適當書詔填委之時才短思澀日不暇給雖有愚悃未能控陳慈敢一一陳述伏惟陛下採擇伏自陛下臨御之初近自都城逺及四方人心翕然陛下又守之以仁用之以儉憂勤庶政之餘親近儒生講論經理上則盡孝于重闈下則深恤于民隱此宜有嘉祥為之應而變異乃爾不惟冬雷無此蓋雖暑雨蒸鬱亦未有震雷連日夜不止如此者也臣少誦雲漢之詩嘗于詔書略發其說而未詳序詩者曰宣王承厲王之烈內有撥亂之志遇災而懼側身修行欲銷去之天下喜于王化復行百姓見憂而求之于詩若王曰嗚呼何辜今之人天降喪亂饑饉薦臻又曰耗斁下土寧丁我躬曰兢兢業業曰憂心如熏曰寧俾我遁等語皆所謂遇災而懼百姓見憂者也若曰靡神不舉靡愛斯牲圭璧既卒寧莫我聽曰不殄禋祀自郊徂宫上下奠瘞靡神不宗曰祁年孔夙方社不莫昊天上帝則不我虞敬恭明神宜無悔怒則若怨天之不佑而終篇不見側身修行之言何耶嗚呼宣王之意以為周家一嵗祀事為民而祈者不過如前數事今我既一一為之而旱災如此無所歸咎其罪在我矣故雖無側身修行之言而誠意出于言外故百姓得以見憂而序詩者亦顯然誦言之湯以六事禱于桑林曰政不節歟使民疾歟宫室崇歟婦謁盛歟苞苴行歟讒夫興歟成湯不邇聲色不殖貨利六事皆湯所無者猶拳拳深自克責此宣王所以粲然復興而成湯所以其興勃焉也太戊桑穀共生于朝伊陟曰妖不勝德武丁雉升鼎耳而鳴祖已曰修德三君修德而稱三宗夫所謂德者非他也至誠之謂也故經之言德多以僞為對曰恭儉惟德無載爾僞作德心逸日休作僞心勞日拙孟子曰以德行仁者王以力假仁者霸知以力假仁為僞則知以德行仁者為誠矣又曰恭儉豈可以聲音笑貌為哉言不可以僞為也揚子曰有人則作之無人則輟之謂之僞亦言其不出于至誠也至誠之道曰戒愼乎其所不睹恐懼乎其所不聞故君子必謹其獨也文王雍雍在宫肅肅在廟不顯亦臨無射亦保不聞亦式不諫亦入蓋于閨門衽席之間一一以禮法自處誠意著見有不可掩者所謂莫見乎隱莫顯乎微欲人不聞莫若不言欲人不知莫若不為蓋言之無不聞為之無不知者易傅曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也夫以陛下畏天之誠心下詔責躬又從而求言方在行內無殿之可避方執通喪無樂之可徹荒政日修德澤日布可謂得應天之實矣臣區區之愚尚恐有聲音笑貌之為有無人則輟之僞故敢僭越陳之陛下詢訪日勤恐未免于自用講讀日加恐未免于嬉游閨門甚正而外間已有好色之謗用度甚節而外間或議錫豫之多臣之所聞未必皆實陛下罪已惟懼不及伏望聖明鑒宣王側身修行之意求成湯自責以所無之心凡應天之事一切行之以誠持之以久一如前日雷霆轟轟于上之時斥逺讒邪親近忠直裁節橫恩修明紀綱不以有人則作之無人則輟之然後治效日有可覩矣陛下視今日為何等時一人修德于上則可以弭天變可以安人心覆載所及億兆生靈將自此而有生全安堵之望社稷益固宗廟益尊陛下為千萬世聖明之主若行之不以至誠姑以聲音笑貌為之則忠直者日疏讒佞者日進不自覺知以至禍亂有不可勝言者成王訪落之詩落始也始即政而訪問于羣臣也曰於乎悠哉正未有艾將豫就之繼猶泮渙言天下之事悠逺未有底止事若將就而又渙然難合此成王之所甚懼以保盈成之業今日正是陛下訪落保治之時臣不敢泛引天下事為對傾瀝愚悃仰答清問伏惟陛下裁幸議祧遷正太祖皇帝東嚮之位官同從臣等竊惟宗廟至重祧遷之禮尤不可茍今大行至尊夀皇聖帝祔廟有期禮官乞遷宣祖而祔夀皇聖帝此本朝之定制伏望朝廷照應禮典施行無可議者所有太常少卿曽三復請正太祖東嚮之位就乞上祧僖祖此事尤重非議不可臣等考之嘉祐中固已建議徒以親猶未盡故虛東嚮之位以待太祖而太祖尚居昭穆之間治平末年僖祖親盡而祧至熙寧大臣王安石不顧公論不稽禮典直以私意臆決紊宗廟之大經當年名臣與夫紹興之初董弅王普朱震等建議淳熙初元趙粹中盡集前後論議奏陳尤切一時已蒙採録皆以偏辭曲說阻抑至今仰惟太祖肇造區夏功邁百王廟號太祖蓋以尊無與二非曰尊諡也今郊祀既以配天宗祀以配上帝而在廟獨不得為始祖祫享獨不得正東嚮可乎正緣議論未明故屈受命開基之君而列在昭穆之序其何以示後世揆之禮經僖祖親盡當祧不因遷祔之時此事誰敢輕議況今日九廟既備尤不可忽而不圖臣等欲望聖斷明詔大臣早正巨典因大行祔廟之際定宗廟萬世之禮慰太祖在天之靈破熙寧不經之論開千載之惑以昭示無窮天下幸甚社稷幸甚貼黃自古天子止祀七廟太祖之廟居中三昭三穆實為六世與太祖之廟而七本朝崇寧按唐之制始立九廟有其舉之莫可廢也今太祖為始祖則太宗為昭真宗為穆自是而下以至夀皇四昭四穆與太祖之廟而九上參古禮而不廢崇寧九廟之制于義為允伏乞睿照治平四年從張方平等議僖祖當祧合于禮典其年三月已自祧遷藏西夾室至熙寧五年王安石以私意使章衡等建議乃復祔僖祖以為始祖又將推以配天欲罷太祖郊配韓維司馬光等力爭而安石主其說甚堅孫固慮其罷藝祖配天建議以僖祖權居東嚮之位既曰權居則當釐正明矣伏乞睿照議立四祖别廟臣等竊惟宗廟事重非可輕議兹准省劄節文太祖皇帝既正東嚮之位然僖祖宣祖既祧之主宜有所歸欲用朱震之說藏于夾室則考之周制僖順翼宣之主不當藏于太祖之廟欲用王普之說祔于天興殿則景靈宫朝獻之禮與唐禘祫朝享之儀不同欲用柳冕之說築别廟以居之則又非合食之義以是三者令臣等集議可謂詳盡臣等請先明其不可行者二而定其可行者一以裨廟堂之末議恭惟本朝去古既逺禮制不能盡循于古參取漢魏以來以至于唐考定為一代之制按唐張齊賢之言曰古者有天下者事七世而始封之君謂之太祖太祖之廟百世不遷至祫祭則毁廟皆以昭穆合食于太祖商祖玄王周祖后稷其世數逺而遷廟之主皆出太祖故合食之序尊卑不差漢以高皇帝為太祖而太上皇不在合食之列為其尊于太祖故也魏以武帝為太祖晉以宣帝為太祖武宣而上廟室皆不合食于祫至隋亦然唐以景皇帝為太祖太祖以上皆不合食于祫臣等謂齊賢之說本朝之所當取也太祖皇帝開基之初豈不能祀七世推而上之至僖祖而止故用唐制建四親廟以祀僖順翼宣四祖洎太祖祔廟尊為宋太祖蓋契始封于商稷始封于周故商周皆尊為太祖唐自涼武昭王皓而下至高祖為八世豈不能惟皓為始祖而以祖虎始封唐公父及已皆襲封于唐唐之建邦啓土比之契稷故推為太祖而太祖之上親盡則毁故如宣簡公在高祖時為四室之尊洪農府君在太祖時為六室之尊然皆親盡為祧也太祖之興上無所因與漢高祖事同故太祖尊為太祖而僖祖在治平間以親盡而祧入于夾室至熙寧中王安石始改尊僖祖為始祖遂屈太祖不得正東嚮之位以至于今今日既伸太祖東嚮之禮僖祖之主當再入于夾室既協唐洪農府君之制又遵治平已行之禮然在今日則為未安蓋自熙寧以來推尊既久難以一日遽還夾室又考之周制后稷之廟則先公之祧藏焉蓋公劉不窋以至太王王季之主皆祔文王武王之廟則先王之祧藏焉蓋自成王而下皆祔唐有興聖廟以祀涼武昭王故景皇帝既正東嚮則獻祖懿祖之主皆祔以不欲以祖先而祔子孫之廟也今之太廟順祖翼祖及宣祖之遷皆入夾室則猶曰僖祖在第一室故三祖之祔為順今太祖既入第一室則僖祖宣祖二主之祧所以當議也臣等以為朱震藏夾室之議既不可用景靈宫祭聖祖用素饌則王普祔天興之議又不可用也惟唐柳冕之說築别廟以居之朝廷謂非合食之義則臣等有說焉謹按唐陸淳之言曰太祖復位獻懿之主宜有所歸一曰藏之夾室二曰置之别廟三曰遷于園寢四曰祔于興聖然而藏之夾室則無饗獻之期置之别廟則非禮經之文遷于園寢則亂宗廟之儀唯祔于興聖為是至貞元十九年左僕射姚南仲等獻議五十七封付都省集議户部尚書王紹等五十五人請遷祔興聖廟議遂定由是太祖始復東嚮之位臣等以為僖祖當用唐興聖之制立為别廟以代夾室順祖翼祖宣祖之主皆藏焉如此則僖祖自居别廟之尊三祖不祔于孫之廟自漢魏以來太祖而上毁廟之主皆不合食今遇祫則即廟而饗于禮尤稱如朝廷以為允當更乞行下禮部太常寺考議制度施行議明堂集議部中謹按禮記曾子問天子崩未殯五祀之祭不行既殯而祭又曰自啓至于反哭五祀之祭不行已葬而祭鄭注云郊社亦然正義云未殯哀戚未遑祭祀既殯而後祀也欲葬之時從啓殯以後葬畢反哭以前靈柩既見哀摧更甚故五祀之祭不行已葬反哭殯宫畢而行其祭又引鄭云既殯以後未啓以前得行祭禮檢准本朝典故緣郊祀明堂間有在諒暗之中然皆在踰年之後别無未葬以前行禮故事若據禮經則已殯未啓可以祭祀某等竊見禮莫重于喪喪莫重于斬衰況事父孝則事天明此禮之本也若皇帝過宫執喪如禮則既殯未啓可以據經行事今來喪禮未成難以議祭合俟皇帝即喪次行禮則有司之事可以類舉再議明堂集議御史臺某等竊見本朝每三嵗一行郊祀皇祐以來始講明堂之禮二者至今遵行本無可議大行至尊壽皇聖帝之喪未及發引而大祀之期已迫考之典故纍朝間有大祀在諒暗之中而適不在當郊之嵗故無發引以前行事故實考之禮經在王制則有越紼行事之文在曾子問則有既殯而祭之說則雖未葬以前可以行事某等竊以喪莫重于斬衰祭莫重于禋祀因大喪而廢大祀禮固不可若斬衰之禮未備而祀明堂則事天如事親之義安在經曰事父孝故事天明記曰祀明堂而民知孝又曰祀乎明堂所以教諸侯之孝今皇帝之喪以日易月既經小祥其去大祥禫祭已無數日而皇帝尚未有至宫行禮之日夫所謂紼者乃菆塗龍輴之索人子居喪不離菆所故大祀則越此紼而行禮今皇帝未嘗一至殿菆之所則何紼之可越某等今議合候皇帝即次執喪之後或依據禮經而用未葬之前或參酌故事而展大祀之期徐議其當則有司之事可以次第而行矣攻愧集卷二十四
