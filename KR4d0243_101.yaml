body:
  text: 宋樓鑰撰誌銘朝散郎李公墓誌銘公諱宗質字文叔世家于濮六世祖文定公相真宗仁宗隠然為社稷臣子太子少師柬之諡懿靖又以名徳世其家徙洛中號西京房生中散大夫贈金紫光禄大夫孝孫則公之曾祖也金紫生朝奉大夫偉偉生晟承議郎知懐安軍贈奉直大夫配曰劉氏贈恭人公八嵗而孤未㡬而所生母展氏去嫡母四子又散于靖康之亂從兄提舉宗臣攜公入蜀聞叔父直閣旼亦在蜀中間闗尋訪至則已下世惟叔母劉氏在又公之從母也柔順賢明撫之如已子竟以直閣延賞命公紹興八年補将仕郎公有姊歸司馬文正公之諸孫與之俱詣行在所至江州水南始遇展氏于廛中物色良是司馬氏姊見之而信抱持相哭人以為孝感别十餘年而得奉色養者二十年贈安人赴調授右迪功郎監明州大嵩鹽場九年到官惟李氏代有顯人子孫目濡耳染為世吏師公年尚少筮仕筦庫臨事極不苟秩滿之日例裒花帶錢五十萬公悉謝遣之因家于僧坊晚卜居名塘遂為明之鄞人矣十七年為洪州新建縣丞二十年闗陞右從政郎就差處州遂昌縣令饑寇作于傍郡或告豪民将率數百人侵昬犯邑者公亟捕首惡斃之杖下而後聞于州羣黨帖息授湖州長興丞遇主上登極恩循右文林郎隆興元年改右宣教郎知紹興府蕭山縣未赴給事吴公芾為帥以會稽劇邑非健吏不可為奏改命公既至剸裁有方政譽甚休賦租素重公思有以寛之先是以奉永祐􅓖宫免三鄉支移折變公請依永安祖宗陵寢儀制舉邑皆免仍豁除折帛止輸本色吴公具以聞亦浹日而得上㫖父老歡呼拜詔至今紀之丁展氏憂服除權通判明州引寓居之嫌改隆興府時江西大旱安撫龔公茂良垂意荒政多以事屬公賑濟盡力全活者衆倅廳有贏資頗豐致之公帑帥以助公之歸不得已以其半分給吏卒義不受一錢龔公益嘉歎之提轄行在雜買務雜賣場改通判鎮江府外臺以清廉公勤列薦于朝差知台州陛辭上曰乆聞卿才宜以節用愛民為務公祗上命罙自奮勵聽訟必先抑告訐懲姦惡郡有靜鎮堂退公不入私室危坐堂上吏抱案牘至前隨即決遣庭無留事暇則黙而觀書治家尤嚴外人無識子弟面者内外斬斬人不能欺理財精察量入為出無一毫妄費帑庾為之充衍增田于學以養士者㡬百畝上下贍足凡事整辦簿書器物位置粲然惟公之精力足以行之嵗時按閱及調戍兵遣海舟咸設方略羣立庭下厲威以臨之號令簡明凜有風采舉衆聳聽無敢譁者伍符尺籍一閱而識其人間有廋隠隨即擿發人以爲神以故威名逺聞寇不得發發亦輒得治獄雖以寛縱爲戒而重囚苟有罣誤之跡必求有以生之郡縣吏重足承命而未嘗輕用鞭撻每曰此曹但欲其不犯吾令然亦民也可魚肉之耶有婦人訟前母之子不孝者親子實使之公深得其情責以子不順母弟不恭兄一等繩治母不忍視求爲母子如初諄複訓諭使之改事而退聞者服其平允年餘擢提舉兩浙東路常平茶鹽公事始至庫藏枵然八閱月而罷所蓄已四萬緡蓋公之儉勤過人食不兼味自奉至薄以其行于家者移于官真有古人竹頭木屑之智所至不加賦而用以饒侵尋暮境倦游而歸不復有當世意尋差主管建寧府武夷山沖佑觀官五轉至朝散郎淳熙十一年公于是年七十有三矣素少病俄致其事或勸止之不可拜命纔數月遽感疾六月十五日卒于正寢若前知然娶夏氏朝奉大夫知徽州承之女能相其夫亡十九年矣贈安人以十二年十二月辛酉合葬于天童山南奥之原男四人長文鑄通直郎通判臨安府先公一年卒次文鎮次文錡卒于隆興次文鑑将受公遺澤文鎮實遜之亦以成公之志也女二人長適姜處俊再適夏祖禹次適登仕郎王祐之孫男五人澤涇津潛源孫女三人尚幼公系出名門而遭時多故且以孤孽不得于親挺身自立艱難險阻有人所不能堪者先世舊物不遺一簮致位部使者退而燕閒生理頗裕皆公刻苦以至此時出其餘以濟人遇嵗寒散廩以食貧者安分知足未病而挂衣冠可謂賢矣然惜其不究于用也先君工部久與公周旋鑰贅倅丹丘以父執事公公相與殆忘輩行治郡之績皆所親見侍坐從容猶得窺中原故家典刑年來憂居公時時相勞苦庖饌有珍鮮必畀以奉甘㫖方為林下游從之約而公亡矣公抗直有祖風不輕以詞色假人不知者或以為忤獨于鑰拳拳如許使人不能忘二子求銘公之墓義不得辭銘曰矯矯李公文定之孫奮身孤藐思大其門事無劇易遇之輒辦低徊宦塗惜用之晚丹丘之政尚有可紀使其用大所立必偉未疾引年得終其天公乎不亡視此銘鐫洪子忱墓誌銘余故人洪子忱以名家子力官業而試邑之始横遭上官摧折心實念之事既白會余從兄編修作州摩撫扶持使得自見一旦聞子忱之訃乃道逺不得摩其棺一慟其子以書來求銘言甚悲請甚勤紀遺事甚備愴然其不能自巳也子忱諱蘩姓洪氏其先丹陽人曾大父固贈特進大父擬紹興初為吏部尚書終徽猷閣直學士左通奉大夫丹陽郡侯累贈左金紫光禄大夫諡文憲父光祖右朝奉郎通判湖州以君郊祀恩贈朝請郎妣王氏贈安人尚書晚居台之寧川君以婦家在南豐因家焉紹興二十四年通判遺澤補将仕郎二十九年授右迪功郎監興國軍在城酒稅未赴間以綱賞循右修職郎改監行在户部贍軍糴場君少孤有意自立一嵗金穀出入以千萬計倖門至多挾勢行賄變亂色價君一切裁之以公無敢犯者樞宻林公安宅時以户簉領糴事庖人以緘題補吏君察其偽白林公公治庖人甚峻奨君于稠人中時人兩賢之秩滿陞右從政郎又以賞循右文林郎授鎮南軍節度推官屬邑奉新有苗米五百餘斛名存而實亡公私交病宰以書抵君君為閱簿書得其始末告于帥而蠲之參政龔公召還尚書汪公為代問寮吏能否大參言君首公任怨臨事不苟尚書與君有連素知君者由是益善君督捕茶寇引以自隨無一日不同艱難功未及成而罷君復還官次分寧宰謝君磐忤後帥意有妄訴者降攝旁縣酒官囚繫滿獄君深知其誣會以漕檄行縣中父老皆詣君訟冤歸白漕使趙公汝愚始解一日帥俾君訊問即呼訟者究詰之皆無實状官吏俱按堵如故府西門火延燔數十家兵官五人捄焚甚力徹旦方止帥欲委罪兵官劾章已具君厯道其焦灼勤勞之狀始寢其奏五人者相率繫謝君無徳色淳熙五年改宣教郎知江州徳安縣始視事民以丞暴弱羣訴于漕臺跡狀昭晰丞竟罷去郡將芘之不可遷怒于君督責日峻君謀避之有以告守守益怒移徳安丞吹毛鍛鍊遽按以聞君時到官方月餘人皆知其無他尋置獄筠陽竟遂昭雪守去而君亦歸矣邑素劇至是愈不可爲逋負不貲君力請于郡吏責少寛始得整頽綱而一新之春霖暴漲田家無所得食斂手待盡君載米家至損直以糶間有無貲者以私帑償之夏亢陽躬禱名山率家人蔬食逾月徹葢行烈日中或至忘食發廩蠲征弛刑緩逋以次舉行無不極其至已而甘澤霶霈謠誦相聞疫癘繼作飭毉藥謹䕶視賴以全活者衆崇飾縣庠弦誦不輟有刲股以奉母者奨勵有加邑人勸焉初癸夘嵗旱民負官租七千餘斛至是猶未及半君曲為之圖糴及三之二從漕司和糴米以足上供期以年嵗償之可以寛箕斂之煩林公枅嘉其意俾郡給千斛未能盡行也君惓惓三請謂不及今為之他日必至重擾迨從其言而君不及見矣人尤哀之君自禱雨得疾猶勉親細務寖不自堪顧孺人曰我父年五十三水浮膚而卒我年既及而疾又甚似殆不免矣遂以八月十七日卒于縣治之正寢神色不亂三日而斂如生也娶曾氏封孺人吉州教授發之女男五人柟孫棣孫栝孫桂孫椿孫女二人長未行幼早卒孫男一人諸孤将以某年某月日葬于某鄉某里君天資孝友推誠待物髙誼過人自痛禄不逮親且以蚤鞠于外家因仍未能還鄉嵗時祀享東望松楸追慕悽愴不能自勝幼妹未行舉部綱所贏又益以曾孺人槖中物歸李君司法順之季兄芭為邵陽從事逢郡侯之怒捕擊甚急君聞之垂涕徑走湖外往來都下願納禄以贖其罪移獄江西又哀訴于當塗諸公卒脫吏議閱數嵗始得官廣州道由君家别三日而僨于道銜哀星奔䕶其喪歸葬南豐又挈其孥于邵併育伯兄之子甘苦同之勉以學問弟葆聚首二十年使之有室周給無倦隆興寓客胡峽州括挂冠家居貧不能堪縣不加禮至以逋租沒入其田君請計嵗入以償責還半俸以活其家南豐宰盧君孝孫與君定交嘗以公事忤貳車既賴君解紛其死也又周之葉君大辯免官待命邑下君念其清貧餉饋無虚日且為求直于有司而君已病矣縣主簿之妻以免乳暴卒君驚惻不已委曲調護其家遇人有急難惟力之視人或負之曾無怨言方窘辱時亦有下石者已而待之如初更覆護其所不及人以為難民有姓胡者險健好訟君治之鼠伏又善諭之絶迹不至公庭君之喪胡泣于前甚哀良民失所依至巷哭以過車君在官名為二年莅事之日纔半其得人心乃如此潔廉自將祿粟圭租有升斗之贏必懲其人而歸之然剛直自任胷中無留事一有不平空臆肆言不肯詭隨以徇人雖以此故所在整辦然亦以此寡合君殊不暇顧卹久而人亦亮之惜乎天不假之年見于事為者止此是可悲已銘曰惟文憲公策名中興丹陽之洪藹然簪纓君志自立家訓克承試邑九江罪罟是嬰人皆謂君否終則傾齎志以殁聞者歎驚急誼首公尚有令名勒銘山阿以詔昆仍蔣徳言墓誌銘仕宦以作邑為難而又有甚難者姚江為越壯縣户口繁庶士夫駢集令才而勤猶不暇給四明蔣君徳言以便親為之宰貌不勝衣年又尚少平時簡易和同或慮其不能辦吏民亦望而易之去鄉近當舟車之衝毫髮不及悔吝必至此其甚難者府主丘公崈一世吏師威望赫然君一見白事已當其意退而視篆遇事風生曾未挾日聲稱流聞滯訟見則冰釋兩造至前或片言折之無不厭服得君書判者傳播道路皆以為神明催科徭役綱目簡明不妄施一箠而官賦夙辦受役者俛首以聴令丘公及部使者大稱之以為今日之最則又以其餘力修學校葺傳舍講序拜以崇義風歌鹿鳴以勸多士應酬曲當下情益通進見者人人自以為親已殆無一人議其後纔半嵗而屬微疾不閱月而不可為矣闔境相弔如喪所親日相與聚哭于門喪舟之行耋稚長號江滸雖古之循良久于其職者未必得民之深如是是豈可以力致哉蓋君家以詩書相傳父子自為知己者累世君少俊邁近嵗尤刻意向學刳心好問進進未已故其敏于政如此以是知非作邑之難顧其人不易得爾嗚呼斯民之不見徳乆矣如君能變愁嘆為謳吟于旬月之間曾不得究見所藴天遽奪之其不仁哉丹陽金壇蔣氏自東漢有封義興函亭侯者代為聞族君之曾祖猷事徽皇為中執法終徽猷閣直學士左宣奉大夫累贈少師忠言直道冠冕一時龍溪汪公誌其墓曰至今論宣和賢者必曰蔣公嘗守明州靖康來避寇難卒于海山葬隠學山子孫遂為鄞人祖謨右朝散大夫贈金紫光祿大夫父臺卿奉直大夫皆篤厚君子也母恭人張氏君諱綸徳言其字也以乾道三年郊恩父任爲将仕郎五年試銓闈六年授迪功郎饒州安仁縣尉淳熙三年之官八年以强盜賞改承務郎知信州貴溪縣丁奉直憂不赴十年授姚江十三年七月到任磨勘轉承奉郎三月丙寅卒于縣治六月癸酉葬于定海縣太丘鄉富都奥之原與父祖之藏相望也君之在安仁已能卓然有立當路名公知己甚衆盡力所職殺傷者驗視必親人以不冤盜賊不敢發發亦輒得改秩之後憂患相仍祖母安康郡太夫人俞氏既喪而父行三人俱以毁卒君性至孝執喪甚哀調娱上下内外婣族了無間言君之志得行于其家而不得仕者七年性不喜治生而好周人之急客至必置酒不問家有無以是益匱得祿曾未信眉而已矣君之才有餘而夀甚嗇又素多病見于用者止此豈造物者不能延其定數姑使之發名譽于是數月之頃乎使又不得此則君之所長益無以自見而入未必信其能過人也今邑人稱頌之于前㡬不容口追痛于後乆而未忘是亦足以不朽矣君昆弟四人叔氏早喪君哭之不能自勝至于成疾與伯氏季氏友愛尤篤傍及羣從切磋學問觴詠相從甚適也去秋君以視篆之初不及秋賦伯氏季氏皆在選中又相繼之官搢紳以為榮太恭人首過姚江方将往來諸郎之間一旦禍起不堪晝夜之哭行道所不忍聞而况于親黨乎始余仲兄嚴州止一女為欲得快女壻戊子嵗就試漕臺歸而喜曰吾得壻矣有蔣氏子從其兄入場屋動翰如流取而讀之駸駸逼人父母少之未欲其覓舉上書請行氣宇爽甚閱三年成婚翁壻俱名薦書即徳言也徳言于余最厚既嘗為之状奉直之行今忍銘君耶仲兄之亡相抱持而哭且曰外舅既不可見事公猶舅也今女姪既失終身之託君以兄子為後曰興仁晚得一女曰餘拊之輒心折因君昆仲請銘于辭亦不忍也哀哉銘曰君之往兮秋風藹流聲兮與江俱東手摩兮瘡痍居無何兮民歌之忽不見兮何當歸父老頓足兮咨嗟涕洟君歸兮奈何風搖摇兮水揚波英爽兮如在託體兮山阿山可傾兮水可涸惟姚江之名兮不磨太府寺主簿周君墓誌銘君諱元卿字景仁别字聖予舊諱冬卿字成甫世為處之遂昌人曾大父諱從諌不仕大父諱逷贈少傅父諱綰左大中大夫敷文閣待制致仕贈正奉大夫以君陞朝贈光禄大夫文學清裁有重名兩娶李氏尚書諱南公之女孫贈永嘉郡縉雲郡夫人君縉雲所出也年十三以郊恩補将仕郎既冠授右廸功郎池州建徳縣尉光禄由祭酒遷吏部侍郎更今名奏承務郎監潭州南嶽廟充福建路安撫使準備差遣未赴丁縉雲憂尋監左藏西庫又丁光禄憂服除差充兩浙西路安撫司幹辦公事監左藏西庫提轄文思院提轄榷貨務都茶場行太府寺主簿淳熙十三年閏七月十三日以疾卒年四十有七積官至承議郎賜五品服娶樓氏封孺人伯父淮東帥諱璹之次子諱鏜之女子男二人長大受從政郎監泰州鹽倉次未名而夭女三人長適葉相次適樓椅次蚤亡孫男三人文之前君半月卒遷之将受光禄遺澤次復之三女皆幼明年九月辛酉葬君于明之奉化縣松林鄉桃花西奥之原君性明悟過人光祿為當世儒宗教子甚篤㑹伯仲俱殁于壮嵗叔氏寖長晚乃得君愛之尤切常撫之曰吾不患汝不能學然亦不强汝之苦學受命之後見葉氏甥肄業慨然曰吾舅也反不若耶遂發憤進學不半載下筆成文衆皆驚嘆自爾手卷不釋博貫經史雅有父風尤精班左二書前賢詩文稗官雜說動輒成誦鼓琴善自度曲挽弓能左右射舞劍擊刺圍碁投壺無不精到釋氏教律禪宗之說道家符籙錬養之法隂陽筮占推步之術一聞則心通類解記輒不忘發為文詞筆不停綴飲酒餘斗不亂席聞賦詩敏若風雨似不經意而語出驚人後或十數年問其故作歴舉不遺一字商㩁古今抵掌劇談通暢磊落四座傾歎間出雅謔應口如響又莫不絶倒也加以臨事能斷有志于當世之務張魏公當國上書論十事皆國家大計魏公聳然異之欲擢置朝行而未果除左帑以旌其言又嘗集漢唐事跡切于今日者著要鑑三十篇獻于朝士友相期功名不足為君道長養成就當為一世偉人平時少病精力兼數人而小疾困之挾日而逝可痛也已帥幕多不以事物自嬰君曰食焉而怠其事可乎帥知其才試以滯訟剖決如流有㫖降神勁弓俾帥司製造以頒諸州君實董之且持檄徧閱于外工力精緻至今爲用西帑最爲浩穰君處之裕如又以其餘閒温習故業登名薦書間有綱運稽程調度偶闕上下搏手無䇿君臨時制變動中事機一日郊賚甫畢而嵗幣迫期當市銀七萬餘兩君威信素著老吏巨駔無不厭服出錢纔數千緡以次分授約期償直不日登足版曹賴以無恐尤器重之任滿增秩蓋朱出墨入二年無纎毫詿誤乃始得此同僚皆藉君以濟文思雜用金玉寳貝綾錦之屬尤難稽攷君始創簿物以號别之至今遵用北使之來凡錫賚器皿下至徒御衣衾等物皆以職守次第按視至勤御覽君以為此特分賜行人不應過禮以傷事體起部以聞上深然之支用餘羨嵗乆積腐君請于部編估而鬻之得錢數萬萬以給工費侍郎李公昌圖賞歎不已力引于朝又以邊郡薦之榷筦嵗額八十萬緡類多虧數君始就職皆曰君來則嵗事無慮矣既視事宻詢訪得數十條皆名數期㑹所當先吏輩匿之以為奇貨未始輕出間因白事君引類擿發旁通無餘愕眙相顧莫知其所以然後雖有不在條中者亦不敢隠以是未嘗汲汲趣辦嵗未終而額已溢矣乙巳南郊攝符寳郎先郊三日命宿八寳于奉常君謂寳國重鎮也今先兩夕置于外非便日者祀明堂設寳于殿左宜即其所俟駕興以從㑹宰執取旨不及遂已然識者咸謂君知體焉勾稽外府方嚮于用左右揆知君素深自為筦庫時皆略去東閤苛禮見不以時君亦自喜有朝蹟将因是以見天子一吐胸中之奇使見于用當愈出而愈髙孰謂其止是耶然上而受知于當世名公往往期以國士與人無髙下賢愚又悉與之歡有以急難告輒傾身赴之匍匐救喪尤為周盡見有陷于罪者苟可以營護之無不至故位雖未甚顯而聲名已籍甚才雖未盡用而恩之及人者多殁之日朝列皆為之痛惜親黨鄉曲下至閭里無不咨嗟相弔蓋其得人心者如此括蒼達官最盛皆與君至厚亦欲引而致之華途未能也光禄晚益清苦君性至孝奉承左右常時誦書以娱恱之父子兄弟自為知己談經論文侃侃如也執喪哀毁過禮叔兄已先喪一力任門户之責襄奉勞苦人所難能自郡至蓮峯葬所凡三百里水陸險絶又適大雪君徒跣露拜以禱喪行日光粲然道中灘水激舟㡬至傾覆君號呼入水負舟以出人共哀之初光禄與鑰伯父俱将漕湖南始議締婚伯父由淮甸丐閒以歸光禄入蜀道還使江東君乃就成于四明光禄自永嘉奉祠寓于鄞置田欲為終焉計後雖還鄉治命俾叔氏之子守墳墓而俾君來依外舍然君未嘗忘鄉國也君與人甚周而待鑰尤厚相從之日又乆兩仕于朝復更為鄰無一日不奉周旋頃鑰遭外艱銜哀星奔委家不暇顧經紀其後君之力為多思欲一致泣謝未果而以訃聞矣間過君家有慟而不知所從也大受乞銘銘曰括蒼之周文獻有傳光禄大之世推儒先君濟其美有志當世天分最髙身兼數器中都十年始有朝蹟夷途發軔何夀之嗇千載之英閟此一丘尚爾後人有發其幽鮑明叔墓誌銘友人鮑氏明叔将葬其子萬里萬石萬容踵門再拜求銘于余余為之悲始余數嵗時侍二兄從李先生若訥學明叔亦與其兄徳光受業于門既冠矣余兄弟皆以兄事之明叔二十六而入太學猶時時相過友誼日篤隆興改元試南宫明叔與鄉人張伯玉璧王彦方敦義同邸余與從舅汪公刪定求分以處而舅甥偶在選中今又二十四年矣囘首舊遊徳光與伯兄俱蚤世伯玉亦不禄彦方止于一尉淳熙十年春仲兄與余䕶先君之喪歸自嚴陵明叔來弔甚哀未㡬聞明叔之訃為之失聲又兩月而仲兄不幸甲辰之冬刪定亦亡矣憂苦之餘親朋凋喪俛仰感觸尚忍言哉明叔之亡也余方在苫凷中不得摩其棺一慟今其可銘君諱俊徳字日新明叔其少時字也世居明之奉化曾大父遂良大父智俱不仕父璿以君故該慶典封迪功郎母江氏封孺人大父力穡起家迪功愛二子之敏入城就師友能相勵勉洛誦聲徹夜旦不休賦篇素工兼長于書多記經史子傳之文喜為人講說纚纚可聴以其餘力為詩詞發語清麗倡酬無虚時君性端重簡出自奉隨力不為異三兄繼殁獨任仰事俯育之寄經理生事米鹽靡宻處之裕如與人交闗務適其平門户雖大若無事者孝謹和易率子弟以學延名儒訓督之皆嶷嶷自立君尤篤親故見單寒者親解衣以遺之無徳色間有造門觴豆留連談笑彌日不倦庠校二十年閱人甚衆交情終始無纎芥之間儕輩或致位通顯曾不以毫末干請人尤敬愛之兩上禮部竟以不售病且革戒其子毋為禬禳事遺言琅琅有序三月六日卒享年纔五十有六嗚呼可哀也已娶丘氏女一人孫男二人長曰初幼未名孫女一人諸孤卜地于嵩溪王奥祖塋之側以十四年正月己酉襄事銘曰吁嗟明叔而止于斯少也篤學㡬忘寒飢足用皸瘃目侵腦脂勵志愈確期用于時命之不淑十上空歸孝友衆知月評則推有子克家尚其似之我作銘詩維後之詒攻媿集卷一百一
