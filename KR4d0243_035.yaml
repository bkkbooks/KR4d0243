body:
  text: 宋樓鑰撰外制給事中尤袤禮部尚書敕官建儀曹俾司禮樂制作之事職專宗伯當用朝廷老成之人閱一時侍從之臣極三朝髦俊之選求之公論僉曰汝諧具官某學極羣書才兼數器被眷知于慈扆參寮寀于儲宫出入累年始終一節禁路論思之益有衆人之所難瑣闈封駮之章至三進而未已積兹徳望處以文昌職務惟清實總夷䕫之任謀猷可告尚殫稷契之忠中書舍人黄裳給事中敕朕惟舜命龍出納朕命而名官以納言蓋人君之命不難于出而望其能納也瑣闥之職爲朝廷喉衿古誼昭然尤當遴擇具官某天資直諒學力粹深處之王邸則有講導之益擢之詞掖則推潤色之工是用授爾以封駮之任非以序而遷也事有不可爾則盡言言而可從朕不吝改惟能知舜所以名官之意則能體朕所以命爾者矣太常丞章穎軍器少監敕具官某爾以倫魁之彦屢用之一本改倫為掄非案倫魁見漢書揚雄傳是集端諒有聞進丞容臺預職史筆王邸講誦之益天官銓綜之公惟時名流兼此數器俾貳戎監是曰序遷萃之象曰除戎器戒不虞此亦急務尚勉之哉吏部員外郎汪義端監察御史敕具官某朕選任臺端增置諫列惟六察之分職非一人之可為泛觀在廷識擢自我以爾蚤先衆俊屢試長才風儀凜然有御史之望聲譽籍甚乃故臣之家俾踐世家往贊而長屢更劇郡尚何學邑之拘輟自名曹庸示簡僚之重其祗朕命往振臺綱右正言胡瑑左司諫敕具官某朕擢卿諫省亦既再嵗端靖有守論事加詳蓋聞古者有爭臣七人爾獨賢勞念之久矣増置諫列俾正左虚之位其益究乃心暨乃僚相與補拾闕遺以輔不逮俾朕導諫之風有聞于世亦惟休哉監察御史何異右正言敕具官某臺謀之選俱為甚重而職務自有不同臺臣當糾官邪而諫省專裨主闕爾為六察亦既年餘屢進封章凜有風采今予授以拾遺之職滋嚮用矣以峩豸之風盡造䣛之益則朕有聴言之美而爾亦無愧于古爭臣矣大理評事王補之大理寺丞敕具官某爾家傳文法久任廷評遂為同列之首賢勞著矣丞貳之職命爾遷焉罪疑惟輕繄古之訓移情就法尚戒于兹寶文閣直學士程大昌龍圖閣直學士提舉南京鴻慶宫敕朕收攬羣才緬懐耆徳矧東宫賓友之舊洊從琳館之游冠西清學士之班爰峻河圖之直具官某才髙而能下氣勁而用沖幼學壯行曽不渝于一節出籓入從實有聞于三朝退食自如著書不輟仰天觀象窮羲經八卦之文畫地成圖洞禹貢九州之域兹繼廩人之粟益髙延閣之名故國有世臣尚賴典刑之重乃心在王室毋㤀猷告之忠皇伯嗣秀王伯圭故妻秦國夫人宋氏追封兩國夫人敕伯父行尊已極三公之貴夫人徳配盍疏二國之封雖不逮于生榮顧可稽于䘏典具封某起由戚閈歸我宗英動惟圖史之遵居有珩璜之飾少同甘苦能與家人而忘貧晚被寵光固宜君子之偕老云胡不淑弗永其年賜湯沐之大邦既屢頒于翟茀兼公侯之兩社爰特畀于蜜章屢用之一本訛蜜為密或改作宸亦非案蜜章本諸晉書山懤傳所云蜜印是集以伸伉儷之情以厚幽㝠之渥尚惟精爽式克欽承御史臺檢法官李謙太常丞主簿彭龜年司農寺丞與郡張叔椿再辟辭免元係林大中辟差大中敕具官某等爾謙篤信好學表裏無玷爾龜年剛毅近仁氣節有聞又皆憂深思逺有拳拳愛君之心御史選也大中之辟叔椿之留豈其私哉而引義慨然若不可一朝居者朕既不汝捨而髙爵非所以留之也容臺農扈分以命汝丞哉丞哉其少安之以俟選擇都官員外郎趙謐户部員外郎主管左曹敕具官某爾祖父以直道佐中興配饗髙廟子孫苟在仕版以次拔用今位于朝惟爾一人外奏筠陽之課内為秋官之屬恂恂自守尚有家風遷置左民毋懈于位趙思璱知徳慶府敕具官某海康雖逺以髙廟潛藩而增重選侯亦不輕也爾以宗支之秀資歴寖髙往撫是邦毋忽民事都大提㸃坑冶鑄錢耿延年兩浙轉運判官敕具官某部使者分行諸道在外則鍾官總貨泉之重在内則畿漕任飛輓之繁皆遴選也爾長于心計敡厯已深新安之政興仆植僵徹于予聽鼓鑄以佐用度又優為之計臺虚位亟以命汝式遄其歸以副朕為官擇人之意陳揚善知光州敕具官某浮光舊為内郡今實竝邉牧民之任不輕卑也以爾嘗守輔邦見稱辦治自去郎省家食有年兹庸授以左符往臨邉徼撫民以寛處事以靜其庶㡬乎古之折衝者矣知湖州趙不迹都大提㸃坑冶鑄錢敕具官某爾秀出宗支以才自奮三試劇郡辦治有聞惟時鍾官究山澤之利興鼓鑄之饒以佐國用非心計優長風力强敏之士不足以當之輟自吳興俾趨臺治檢柅吏奸導疏利源匪急匪徐惟正之供則爾之職舉矣知平江府沈揆司農卿敕具官某朕臨御丕圖求賢如渇儲闈寮寀選用無遺蓋舉予所知非止篤舊故之恩也爾以儒學奮身周旋清貫詞藻之發追配前良肆朕纂承之初最先收召出守劇郡試之益詳矣漢二千石有治理效公卿缺則選諸所表朱邑由北海入為大司農則其事也朕之待汝豈惟掌周稷之事哉往祗厥官嗣有褒陟吕大麟知常徳府敕具官某本朝衣冠之族爵位相望文獻不墜未有盛于吕氏者也至于今日仕者寖寡慨然念之起爾于家以爾素守家法好學不衰宰郡有循良之稱在朝謹靖共之守去國既久退然自安武陵湖右奥區外控五溪之徼思得賢牧以撫安之故舉以命爾爾尚勉哉能大其家則為報國左丞相留正初除少保封贈曾祖贈太師耀卿追封英國公敕朕任賢甚專虚已以聽累奏篇之賞盍膺八命之崇覽遜牘之勤始進三孤之重乃循故事加賁曾門具官某生為善人世載隠徳傳芳中古由王國大夫之有聞席慶華宗去清源節度之未逺惟躬行無媿于幽顯故家聲大啓于孫曾是生名儒致位上宰閔書屢錫已登極品之官公社肇開爰胙真陽之土尚惟精爽歆此寵靈曾祖母周國夫人藥氏贈周國夫人敕士有奮身而仕至元臣推恩而爵及曾祖嘗迹所自必有其原豈惟奕世之賢仍多中饋之助夫或加寵婦則從之具封某以柔淑之資嬪儒素之族積功累行雖有良人之賢處順安時宜偕君子之老比及後裔是生上台封既至于小君寵仍疏于大國不改周南之舊用配留侯之祧其祗異恩以利後嗣祖贈太師沂國公寔追封福國公敕徳雖著州鄉而弗顯于朝廷身不及富貴而乃施乎孫子此古人敢以自必而天報昭然不誣我有宗工恩逮顯祖具官某坦坦幽人之履恂恂長者之風惟先世以來有功于國故餘慶所及遂肥其家果見聞孫進登孤保屢頒霈澤貴極師垣乃更沂水之舊封仍祚閩山之鄉國九京未泯百世不忘祖母楚國夫人洪氏贈商國夫人敕婦道之修相夫以順家法之懿至孫而興雖寵榮不及乎生前而恩渥屢加于身後具封某以幽閒之操崇節儉之風夫婦俱賢蓋非一日之積室家流慶遂見百年之餘賜湯沐于南荆易封圻于上洛以顯漏泉之澤以慰含飴之思父贈太師衞國公鑄追封魏國公敕朕惟東周大夫留氏號稱世賢子國子嗟之父也俱不見用詩人惜之此丘中有麻所由作也朕之用賢則異于是具官某世有潛德生爲醇儒雖富貴不在其身而善慶乃積于後惟我碩輔秉國之鈞尊顯其親貴極人臣斯教忠之效也旣胙武公之土復更畢萬之封父子之賢于是俱顯視東周之留爲盛矣死而不亡其尚知歆前母燕國夫人鄭氏贈齊國夫人母秦國夫人劉氏贈魏國夫人敕婦爵從夫已極小君之號母貴以子洊更大國之封具封某迪徳靜專處家約素相夫以禮躬孟光舉案之勤教子能賢慕軻母擇鄰之訓相予初政致位上台秩既進于三孤貴遂登于累葉表兹閫範用配禰宫改北國之舊圻卑東藩之新邑邦卑大名之新邑劉氏改四塞之舊申加閔冊增賁宗祧故妻魏國夫人徐氏贈秦國夫人敕朕寵任大臣躋榮孤保爵既加于祖禰恩又及其閨門具封某生有令姿居循内則知巨源之識度相待如賓勉仲卿以激卬及見其貴雖隔幽明之際仍深伉儷之情夏篆通旜顯漢相元勲之重魚軒象服開秦川大國之封九泉有知千載無憾大理卿王善之直龍圖閣知平江府敕具官某呉門地大物阜隠然東南一都會也爾生長浙右固已習知其風俗又嘗持節臨之聲聞藹然至今未忘矧明練憲章飾以儒術再長廷尉滋嚮用矣抗章求外自詭治民為爾相攸無踰于此卑以羲圖之直用寵爾行豈惟不減昔人晝錦之榮吏民聞之不戒以孚足以寛吾顧憂矣浙東提刑陳倚除大理卿敕具官某國家以臬事付廷尉而立制視古為祥治獄者無預于定法斷刑者不使之鞫囚而卿實總之選顧不重哉爾習于憲章而持心近厚由廷評而上至于為長踐敭有年矣綰建寧之符持浙東之節又皆有稱焉肆疇已試還爾舊物囹圄屢空病未能也爾能盡心使刑獄號為平則庶㡬乎古矣知雅州宋南强知金州敕具官某金城外控邉陲内連巴蜀有民有兵號為价藩延燔之餘正須長才以任郡寄擇人于内豈曰無之臨遣而行慮不及事疇咨西南之守就以遷焉以爾有志事功敏于從政其解蒙山之組往撫漢陰之民此而有聞朕將用汝木待問知湖州敕具官某儒科首選宦達相望儲禁舊僚收用略盡慈皇初開南省爾則為多士之先沖人頃居東宫爾則任端尹之寄而十年以來欲仕輒已朕嘗念之惟近臣為明當途之誣浮議遂定呉興劇郡視古左馮衆所憚為舉以試汝勿以多言為畏倚需最課之聞髙爵美官豈于汝吝費培大理評事敕具官某李官選屬必先試以文法然對有司之問者易為工察庶獄之情者難于盡爾為廷評其以昔之所習見于詳讞之際遇事加勉增益其所未至不倦以終之則為稱職福建提刑辛棄疾太府卿敕具官某爾蚤以才智受知慈扆盤根錯節不勞餘刃中更閒退以老其才養邁往之氣日趨于平晦精察之明務歸于恕朕則得今日之用焉召從閩部長我外府夫氣愈養則全明愈晦則光于以見之事功孰能禦之哉顔師魯知泉州敕均佚真祠遂彭澤賦歸之志起臨舊鎮慰潁川願借之心匪曰朕私徒得君重既去家之不逺俾便道以有行具官某學茂儒先朝推壽俊慨孔戣之去命典外藩念陽城之勞許歸故里而逺甿懐其惠政賈胡服其真清攀轅莫留垂涕相踵此誠心之所感非人力之能為既徹聽聞重增嘉歎方遴選惟良之守要先求已試之才追常袞之遺風當一變于閩俗用蔡襄之故事宜再領于泉麾式遄其驅以副所望新寧國府林大中知贛州敕具官某章貢居江右上流控楚粵之要民俗果悍可以義服不可以力勝也非淸德雅量練達世務者不在師帥之選爾以不羣之資爲有用之學治縣如古循吏入朝爲才御史彈劾不避于權要論議率中于事機横榻之風振于一時朕旣分爾以宛陵之符念其家食易鎭兹地先聲所臨百吏望風撫予南邦以寬憂顧朕豈汝忘哉廣東轉運判官黄掄再任敕具官某朕分遣諫官御史使行諸道以亷察列郡之吏知予徳意多稱其職爾以端諒之資選在諫省去國未㡬使于嶠南善最有聞俾之因任既以慰斯民願借留之意又以見朝廷不忘逺之仁母替厥初嗣有褒寵宫人王安安轉郡夫人敕朕謹乃儉徳固無漁色之私選于後宫亦若審官之遴宫人某稟資婉嫕祗事靜專被樛木之恩蚤預内廷之御承小星之惠躐升名郡之封其益習于壼彝庶克綏于寵數直龍圖閣知贛州楊萬里秘閣修撰提舉隆興府玉龍萬壽宮敕具官某朝廷之于賢者用而盡其才上也用未盡才而勇退寵其歸而全其髙次也上焉者朕之本心次焉者非得已也爾以清節雅道冠冕一時髙文大篇追配古作出入中外聞望日休計臺丐歸俾守章貢古郡臥治庶以優賢抗章自列欲留不可卑眞祠之佚升論譔之華詩不云乎雖無老成人尚有典刑朕不汝忘也袐書丞陳損之淮東提舉敕具官某常平使者之任重矣淮東鹽筴甲天下視他路尤重貨泉所聚出入萬計調度低昂在一路部使者事又重焉爾起西蜀慨然有志于當世通練闓敏遇事風生周旋清塗久攝宰掾彌綸省闥備著賢勞視其官可以知其才矣頃護使客往來淮堧歸論利病如示諸掌兹因求外選而用汝勉哉思所以稱任使之意起居舍人陳傅良經進壽皇聖政轉一官敕具官某朕惟壽皇在御務行聖人之政二十有八年傳祚菲躬懼弗克堪既巳申飭史臣謹以事繋日之書又掇其大端可以為法于萬世者别為一經追儷二典真我家之盛事也爾以一代名儒晩登郎省親擢道山付以史事奏篇來上奉之慈極從容進讀冠珮儼然兹焉論賞盍先于衆命増一秩以示儒者之榮尚惟欽哉浙東提舉陳𣏌本路提刑淮東提舉衛涇浙東提舉敕具官某等浙東部刺史萃于會稽宻邇行都視他部為重𣏌以辦治之才為常平使者就卑臬事任益髙矣涇以倫魁之彦領淮甸鹽筴改授簜節地益近矣其各揚乃職使刑罰無寃公私兼足以副朕選掄之意武翼郎左翼軍統制韓俊供職滿十年轉一官武修軍統制李郁同郎馬軍行司選鋒敕具官某爾出自禁旅護戎泉南陪都李郁改既厯十年内外靖謐雖功名無事以自見賢勞著矣俾循故實序進兩階益習韜鈐以俟選用參知政事胡晉臣知樞密院事敕朕纂承丕緒圖任舊人一日萬幾之繁旣久勤于裨贊三軍五兵之本兹益厚于倚毗乃播綸言式彰枋用具官某氣全剛大識造精微以端靖結慈皇之知以忠純為初政之輔同心同徳人孰知房杜之功嘉謀嘉猷日惟陳堯舜之道居宜鎮于雅俗動有助于沈機察其所安任以不貳矧一登于政地凡三入于樞廷諒憲度之愈明卑事權而增重噫予欲務孝宣之周宻以起治功爾其慕子房之從容用符眷意顧惟宿望奚俟多辭同知樞密院事陳騤參知政事敕贊本兵于右府方藉壯猷圖共政于邇聨尤資宿望我有明命告于具寮具官某學探聖源才周世務立朝謇諤素為君子之儒處事精詳居有大臣之體升之常伯擢在機廷陳告后之謀猷簡而甚切贊基命之宥宻靜以無譁雅量鎮浮不改其度正身率下敢干以私曾不俟于期年俾進陪于大政國以永賴人無異詞噫謨明弼諧朕有望股肱之助任重道逺爾其推腹心之忠永孚于休以副所屬吏部尚書趙汝愚同知樞宻院事敇西漢以同姓疏封不在公卿之位東平以至親輔政厥由聲望之隆惟我本朝尤厚皇族始則優加祿爵曾弗仕于外廷後雖竝用親賢亦無踰于法從兹開宥府蓋得宗英具官某派出天潢望髙國器早隨寒雋首冠于儒科出任藩宣久臨于蜀郡侍經帝幄選士貢闈皆故事之所無在爾身而兼備爰以樞機之寄托之肺腑之親必有若人乃堪大任匪固私于異渥將深慰于公言噫開國以來未有今日非常之舉本兵至重當展平生有用之才以增磐石之光以壯維城之勢刑部郞中沈樞度支郞中敕具官某爾生長相門明習文法爲郞憲部恪守三尺司度之職凡軍國之用㑹其入出以周知經費之數欲得清謹之士為之故以爾遷焉勿以郎潛為淹思所以稱其職者太府寺丞沈作賓刑部郎官敕具官某郎官必由宰郡而除憲部必以明法而授行之舊矣爾出名閥通習憲章久厯廷尉之屬宜在兹選向守丹丘曾不煖席而去郡之日遮道借留其必有以得此者再入脩門養資外府而後遷焉朕之用爾審矣惟盡乃心以稱斯舉右司員外郎應孟明左司吏部員外郎徐誼右司敕具官某等宰掾非他官比也調䕶闗決皆天下事非有才識可以為守常應變之助者疇克為之爾孟明介然有守練達民事爾誼能為可用通貫治體一以序遷一以選授朕方委政于二三大臣惟爾分任其勞使大臣得以綱紀庶務助朕求賢以起治功豈小補之哉度支員外郎王厚之直袐閣兩浙路轉運判官敕具官某朕惟轉運之任莫重于畿内祗承慈訓率用士人比年以來多稱其職爾庠校諸生故家人物好古博雅風裁素髙克勤小物而知大體領使淮西聲望籍甚為郎名曹侃然有守還卑道山之直兼按浙河之間飛挽以時而用不乏調度有經而民不病表率諸道尚其勉哉監都進奏院朱致民大理司直敕具官某詩云彼其之子邦之司直國家明謹用刑遂以名李官之屬近復定制審閱奏當尤不可以輕授也爾以儒學自奮而宰邑丞郡循良有稱入班于朝靖共爾位選以命汝往哉惟欽司農寺丞彭龜年袐書郎敕具官某朝列多士皆以賢選雖不以日月為功要必使宿其業爾丞大農屬耳兹又命典中袐書朕不以為煩人亦無得而言以爾之才望有以當此也道山羣玉之府涵養天下英才異時臺閣髙選于此乎取何止讀未見之書而已哉中書門下省檢正楊經太府卿四川總領湖北轉運副使張抑太府少卿湖廣總領敕具官某等國家東巡呉會宿兵楚蜀示天下以形勢給餉之任必選王人居之爾經奮身西南老成詳練樞屬宰掾裨助為多問以蜀事了辯如響是用使爾于蜀爾抑起自故家見聞殫洽屢持使節所至可紀荆湖風土尤所諳厯是用使爾于楚寵以外府長貳之任将命以行爾二人皆儒士其有以適緩急之宜無乏興無病民使上下百城不擾而兼足相安而有恃則朕之顧憂可寛矣新知湖州木待問改知婺州敕具官某浙河以西呉興為輔藩浙河以東婺女為名郡視邦選侯委任惟均爾少為舉首聲振東南從吾春宮徧歴寮寀念投閒之旣久命起家而作牧引嫌自列易地爲宜是行也非惟不使汝遠去畿甸苟盡心焉課最易聞公論自此而定則朕之眷汝人無間言矣宣教郞史彌廓係秀王孫女夫轉一官敕具官某爾以師臣之子娶秀邸之孫不習貴驕能勉家學推恩爾室遂進以官往其欽承益務修進朝奉郞給事中黃裳朝散大夫權工部倚郞謝深甫磨勘轉官敕嚴吏銓之課所以示百寮之公優法從之聯猶不忘三載之攷具官某再登朝著亟上禁途朱邸横經久藉講磨之益瑣闈批敕尤髙論駮之風著密勿禁途三輔謝深甫云翺翔朝卿任重允賴于論思政清久資于彈壓貳兹以年勞應于治典爰陟文階之等寖陞官簿之華其服恩榮尚殫猷告張允中該修玉牒循從事郎敕具官某慈皇寶牒之成一代之鉅典也爾為胥吏預有勤勞既登仕版併進二階知秀州趙充夫改知湖州敕具官某爾守臨汀政最徹聞擢之嘉興尤號辦治理財則不擾而集御吏則不惡而嚴民甚安之湖在近輔最劇就以卑汝近嵗皇族人才輩出爾宜在政事之科益勉所長為諸郡率朕將有以表異之太學正顔棫知常州無錫縣呉獵潭州教授項安世召試竝除袐書省正字敕具官某等國家開館閣以待天下士若必循次而進非所以示招延之廣也博採公言取以數路爾棫由舍法官學省爾獵方宰壯縣爾安世客授湖南一聞其賢俱命給札前此殆未有也指陳時務蔚然可稱登之冊府遂列英躔豈惟養有用之才抑以為多士之勸庶㡬巖穴之彦亦将樂從吾游焉戸部員外郎趙謐陞郎中敕具官某近嵗郎選日重非外庸之著不在此選非資厯之深猶置員外爾以名臣之孫更踐蘭省積其吏攷就正厥名官簿寖髙益思加勉蘇大任太學正敕具官某眉山蘇氏文獻相望爾雖派别以學自奮朕覽薦牘召寘學館得天下英才而教育之何樂如此益勤教事勉繼前良趙不邌知西外宗正事敕具官某國家宗支日盛散處郡國而温陵長樂猶循南西二京之舊各有司存以爾行尊而性淑奮由儒科練達政事往其主盟糾合吾族撫摩孤弱而使之得所敎奬孝秀以率其不良振振麟趾之風庶有望焉江東提舉黃黼戸部郞中主管右曹敕具官某聚天下賢士列之朝行必更外庸而後收用非惟欲重郞選亦以詳試人才亨途由是而之焉不輕卑也以爾馳聲膠庠資敏而練世故使行江左得部刺史之體召對便朝嘉其忠藎户曹動闗民事號為劇煩往既乃心以副選擢之意煥章閣學士知襄陽府張枃徽猷閣學士知建康府敇慿熊軾于上游久資填撫之畧卑麟符于重地尤藉保釐之方是為留籥之司增峻寳儲之職具官某性資闓敏智識縱横樂父兄之賢源流有自登侍從之選敡厯已深遇事敢言詞鋒甚厲臨機輒斷才刃有餘輟自文昌出當方面果肅清于邉徼務宣暢于王靈矧是秣陵實雄江左石城鍾阜六朝之風績猶存大纛髙牙先正之威名未逺俾居連帥益振家聲想具有于成謨顧何煩于多訓顯謨閣待制知江陵府章森煥章閣直學士知興元府敕荆楚奥區無若江陵之重巴蜀外蔽實賴漢川之雄我有侍臣更此名鎮峻増延閣之職用寵元戎之行具官某稟氣沖和受材宏達早被知于慈扆亟登任于禁途司留籥于陪都既騰善最建髙牙于南郡久殿上游眷炎劉始封之邦為元徳必爭之地帝之字宋時避廟案此稱蜀漢昭烈作元諱故改雲屯萬竈虎視三秦誦武侯出師之章諒其素志審漢将登壇之䇿勉乃壯圖毋有遐心徃祗成命王藺知江陵府敕運魁柄于西樞嘗贊幄中之畫開帥藩于南紀兹分閫外之權惟任舊人式孚羣聽具官某器資鯁挺智識開通世傳許國之忠躬負濟時之略明目張膽在朝廷無事不言聚精會神故君臣不膠而固輔予初政正位本兵機謀足以折千里之衝文武足以為萬邦之憲退安祠館寖閲嵗華蜀道登天之難曲從私請荆州用武之要勉為朕行諒無俟駕之淹倚聞洗印之報噫比周家之分陜允屬宗工據天塹之上游是為重鎮尚體規恢之志豈惟填拊之圖知興元府宇文价知襄陽府敕唐制以山南分東西二道西則漢中為巴蜀之捍蔽東則襄陽為荆郢之北門以是俱號重鎮而控扼之要于今尤切謀帥其可輕乎具官某以學奮身世有名徳壽皇眷知擢寘華近遂居文昌八座之選出鎮漢中于今五年撫安軍民帖帖無事襄陽易地委任惟均方時小康邉鄙不聳輕裘緩帶折衝樽俎以追羊祜之遺風不亦善乎錢象祖吏部員外郎敕具官某吏部之司七而右選最為劇曹涉筆終朝猶恐不逮非夫精敏詳練之士不足以察吏奸而澄弊源也爾明習吏事飾以儒雅分符持節民庸茂焉為郎未㡬銜恤而歸不俟造朝亟加選用靜以制動要以御詳汝知之矣尚其勉哉將作監主簿李大異司農寺丞軍器監主簿曾三聘太府寺丞敕具官某等大農外府分領食貨之重各設之丞以贊其長非才不授也爾大異强記洽聞處事有條爾三聘篤學厲操持論不苟簿正兩監退然安之竝進厥官各任以事以才自見今其時矣秦焴知嚴州敕具官某爾生長大家少而穎悟力學進徳譽者交口古括之政無愧循良嚴陵爲高宗潛藩密邇行闕選而用汝詳試其才益撫吾民以稱朕意吳宗旦知舒州敕具官某龍舒在淮右爲名郡士大夫以剖符爲樂而朝廷必選才而後授之爾以學自奮明練憲章法家者流自以爲不及也律身範俗清裁可紀家食寖久精力未愆往居專城綏靖淮服列卿之舊朕豈汝忘榷貨務監官修武郞陳仲堅董淵孫侁收趂增羨各轉一官敕具官某等摘山鬻海之利榷之以佐用度其數實廣爾等協心奉法嵗有贏貲何愛一官以勸來者新江西運副錢端忠改江東運副敕具官某爾以王人給餉江淮才諝著稱俾之將漕需次已久持節有行小疾來諗尤見㢘靖為爾易地以遂其私輔養精神庸俟器使幹辦審計司劉三傑將作監主簿王恬軍器監主簿敕具官某等爾等在太學為名流試劇邑為良吏以薦入朝嵗月當遷分命以勾稽之職而處三傑于大匠恬于戎監職清而務簡益養賢望以俟甄拔江西路轉運判官林湜吏部郎官敕具官某尚書郎為當今妙選朝行雖有名士必更外庸而後授之爾嘗峩豸冠凜有風采按刑浙東將漕江右久攝帥閫所至有稱賜環而歸敷奏詳雅資望高矣然猶處之小選所以重銓綜之任也其究乃心以贊而長攻媿集卷二十五
