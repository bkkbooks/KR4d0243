body:
  text: 宋樓鑰撰奏議蠢言瑣闥繳馮輔之等轉官緻幹辦御藥院馮輔之黃鑑吳改易製造頭冠法服等竝皆精上轉行黃鑑階官上轉行李唐卿轉行遙郡思忠李唐卿各轉一官內馮輔之吳思忠遙郡臣仰惟陛下即位之初憂勤抑畏臣子奉職朝廷清明海內欣快雖水潦為災嵗事壞于垂成而人心不恐者以政事紀綱之可恃也兹奉聖旨以御藥院改易製造頭冠法服依淳熙十六年體例幹辦御藥院四人竝特與轉行一官臣誤蒙陛下擢置瑣闥不敢不以愚忠仰圖報效臣竊惟歷代人主或出于幼沖不知爵賞之可重或强愎自用不以法制為當守又以嗜欲荒惑不能自克則左右近習之人乘時肆志引例破法惟其所欲外庭不能支吾則攀援僥幸馴致亂階者多矣陛下誕膺丕圗人心翕然詔書所至危疑之情即日盡定蓋知陛下仁孝素著而務學為急習熟世故親履時變反覆史傳之得失洞知小人之情狀無酒色之娛絶器玩之好專欲親近儒生講論經理此不世出之主也所望超然逺覽削去弊蠧排抑僥幸振起紀綱惟祖宗故典是遵惟天下公議是取則太平之期可望今即位才及兩月而已復容受欺罔遽出橫恩以塞無厭之欲其何以示天下夫人主恃以立臣民之上者以紀綱為急橫恩一出則是斜封墨敕自壞紀綱陛下心所備知目所親見凡可鑒可戒之事皆當深思切慮力自振拔豈應因仍舊例以黷初政近年以來每遇如此指揮臣僚無不繳駮率蒙依奏後雖製造頭冠法服轉行之人亦以繳奏終于回授而況于改易者乎今來馮輔之吳思忠竝係武功大夫遙郡團練使若于遙郡上轉行則皆為防禦使黃鑑見係武功大夫遙郡承宣使若與階官上轉行則為橫行右武大夫李唐卿見係武功大夫若與轉行遙郡則為刺史夫武臣至于武功大夫則為止法正如文臣之中大夫也武功大夫實歷七周年用七舉主始轉橫行非有功效顯著不帶遙郡如文臣不為侍從不得為大中大夫二者皆有纍數十年而不遷終身而不得轉凡有恩賞正許回授此一定之法也臣愚欲望睿斷將上項改易頭冠法服賞各與轉一官其礙止法人竝與依條回授以昭名器之重以示天下之公以窒僥幸之門以光初政之大不勝幸甚所有録黃臣未敢書行繳隨龍講官等轉官臣竊惟陛下龍飛御天凡舊日攀附之人均轉官資誠未為過但以國家官穴至此已極而六年之間兩遇覃霈爵賞益濫嘗考隨龍恩例在祖宗時止轉一官多不過兩官正緣高宗立國于擾攘之時一行官吏自元帥府執羈靮于萬死一生之中故南京即阼之初隨龍人竝轉四官夀皇朝雖轉四官然兩官係用建儲恩併轉非專為覃恩也太上皇朝四官之賞蓋是失于契勘陛下不以位為樂不得已而後受臣于彭龜年黃由沈有開同在後省見其引義力辭其言至切心甚服之臣愚欲望睿斷檢照祖宗之舊典裁節近年之橫恩酌為中制使隨龍講官各轉兩官曾任藩邸講堂官各轉一官以成舊僚辭寵之賢以示陛下不敢自比于祖父之意天下幸甚臣冒昧進言不避紊煩所有録黃臣未敢書讀繳戴勳除知閣門事臣仰惟陛下龍飛御天潛藩舊人際千齡之會無不有攀附之幸矧如勳者服勞五年職為內知聖心記存擢而用之誠未為過然初除帶御器械臣僚以員數巳足恐其濫額以啓幸門嘗具繳奏今奉使方歸自言閣門舍人今既故除即合解罷乞祠祿而遽以知閣處之則為過矣始八月中臣寮之奏欲少俟他日有闕以頒成命得旨依巳降指揮則是除目巳定又曰候有闕日供職則陛下所以處之者可謂詳盡矣今乃猥以員數巳足欲從朝廷乞一外祠而遂得知閣雖曰不要君臣不信也竊見夀皇即位之初龍大淵曹覿在潛邸尤久亦止除御帶至次年春間大淵自樞密院副都承旨覿自御帶俱為知閣時金安節周必大相與繳論甚切且謂二人攀附雖舊過此以往事君之日甚長儻其謹畏有加何患身不富貴奉聖旨罷劇就閒宜允衆論尚兹回繳可特依奏大淵别與差遣覿依舊帶御器械一時君臣之間如此其盛然猶其進不已恃寵弄權寖預政事貽害甚多太上皇初年譙熙載姜特立徑除知閣無有論者公議深以為惜然猶是太子春坊又非內知之比如勳本是士人素被眷知使事甫畢且當退靜以俟君命不應遽有此舉上則以御帶為未足下則欲乞外祠以徼取其所欲如控囊然若遽以知閣處之則陛下之官非惟不足以厲世摩鈍亦不足以慰滿左右之意臣實憂之欲望睿慈深察愚忠追寢新命今譙令雍既以持服未可仕宦勳則當用八月十九日聖旨候有闕日供職或恐聖意念其未有職守即乞如吳炎依蔡必勝例權差候有闕日撥填庶得允當所有録黃臣未敢書讀繳關禮張宗尹特與隨龍恩數臣竊見前項指揮頗駭觀聽臣非敢故為煩瀆實以隨龍恩數自來無有特與之法一開特與之門恐恩幸援來者無已陛下必有難處者伏覩淳熙十六年三月十七日聖旨隨龍講官承受官可各轉四官以承受官厠于隨龍之數已非令典然猶不至如今日特與恩數之濫是時承受官係劉慶祖以無官可轉已于吏部陳乞回授今來關禮張宗尹若果係承授潛邸奏報兩殿文字陛下念其有勞欲與以恩數乞照淳熙十六年指揮施行庶免開特與隨龍恩數之門以塞後來攀援之路不為小補所有録黃臣未敢書讀繳隨龍人轉官并王倓等八人恩數臣近者論奏隨龍講官及曾任藩邸講堂官轉官事乞酌為中制講官各轉兩官曾任講堂官各轉一官得旨依奏仰見陛下虛心應物從善如流臣不勝感涕有君如此何忍有懷而不言尋奉聖旨隨龍官吏諸色人軍兵等開具職位姓名可各轉四官資白身人與補保義郎曾經藩邸應奉人可各轉四官資等臣緣未知前項講官處分未敢論奏今又準今月十日指揮依已得指揮官吏諸色人等轉官補官應千恩數等竝依淳熙十六年體例臣僚繳奏數內王倓八人十四日得旨王倓等內有官人轉兩官白身人與補承信郎陛下之不私舊人足以示大公于天下然臣猶未有盡其愚須至再瀆天聽臣前奏謂隨龍恩例在祖宗時止轉一官多不過兩官正緣高宗立國于擾攘之時一行官吏自元帥府執羈靮于萬死一生之中故南京即阼之初隨龍人竝轉四官等事其理甚明今講官及曾任講堂官已蒙陛下依奏減半推恩則隨龍官例諸色人霍汝翼王德謙以下各與轉兩官白身人補承信郎曾任藩邸應奉人各與轉一官其王倓等八人照曾經藩邸應奉人推恩則事體輕重與講官等一體實為允當陛下在位統業以天下為憂身率以正無敢不服纍年橫恩至此裁定天下必當稱誦聖明自此抑僥幸振紀綱惟聖意所尚朝政清明此其本也臣職在封駮苟有管見不敢避仇怨而負天子伏惟陛下裁赦所有録黃臣未敢書讀繳鄭熙等免罪三上書所言無禮奉聖旨竝免罪後省看詳臨安府進士鄭熙等連臣竊惟陛下即位之初下詔求言章交公車來者甚衆後省被旨看詳雖未能遍其間議論剴切有補于政者猶未暇一一奏聞若鄭熙輩上書再三言寖不遜所乞幸建康事尤無足採得旨免罪仰見聖主寬宏之度然臣又有愚見不得不以奏聞古語有之狂夫之言聖人擇焉以言求人曾未聞有所褒表而遽有免罪之旨不可以家諭戶曉必有輕議于下者況士人上書亦間有無稽之言甚于此者欲望聖慈蓋之如天若此等人一切容之萬一有伏闕邀駕等事自有常規置之有司以旨赦之庶全國體若因看詳而免罪臣等受謗而不足道恐非所以廣陛下之盛德也臣一日之間屢有論奏實非得巳自非賜以矜察臣實無所逃罪如鄭熙等果有不遜之心免罪之後亦不能禁其妄發不若寢而不問靜以待之臣懷不自巳犯分瀆煩無任戰懼之至所有録黃臣未敢書讀繳蔣介除右監門衛中郎將臣竊惟古者侍御僕從罔匪正人其選擇之遴不徒取其勇力也近時環衛官閣門帶御器械等即取武勇之士又參以才諝韜略文學之人誠有古意此國家之美事也如介以右科發身人物議論足以備環衛之列久在閣門得郡逺去陛下親擢稱此選臣亦喜朝廷用人之當除目之下即已書行徐考員額則尚有可議伏見初置環衛官以來三十餘年矣元以十員為額實精其選內以嚴侍衛之職外以示將帥之儲今十員已足而又除介以介之才收置于員外無不可者特以遴選人才之地此門不可遽開一開此門權幸貴要便將攀援而進豫授苟濫則名器愈輕不可不慮也臣愚欲望聖慈别賜處分庶免攀援僥幸寖壞成法所有右監門衛中郎將録黃臣未敢書讀繳李謙召試閣門舍人臣竊惟武臣之召試閣門舍人與文臣召試館職無異必其人物才業足以厭服衆論不可以輕豫也李顯忠稱號名將而有孫能以文學自好嘗名薦書陛下寵以召試宜矣臣初不知謙何等人考其家世乃知其父師顔曾任建康府統制于紹熙四年七月十一日乞致仕如此則謙之服父喪方踰小祥猶在服制中也在法小使臣遭父母喪只給假百日本非令典近方有臣僚論奏議更此法見今看詳況本法自有願持服之文正所以待孝子也謙為小使臣固可用百日之制矣嘗獲文解則是願為士人而不持父母喪可乎未除而經營召試欲玷清選則是冒哀求仕尤法之所不容也欲望睿斷追寢成命勒令歸持父喪俟服滿而後從仕觀其見識凡下亦不足以辱召試之寵所有録黃臣未敢書讀繳劉詢帶行遙刺臣照對劉詢兩任簿書官合轉兩官酬賞得旨依劉堯咨趙友仁例特與轉行遙郡刺史臣竊考之劉堯咨淳熙六年以武功大夫奉使回程特授榮州刺史則是以奉使恩而轉遙郡非以簿書之賞也至八年始以簿書任滿賞特授忠州團練使趙友仁淳熙四年以在殿陛日久應奉有勞將兩任簿書任滿轉兩官恩例特典轉行遙郡刺史此詢所引之例也臣考之成法武功大夫為武臣止法今來雖有趙友仁例緣友仁係在淳熙四年至淳熙十六年太上皇帝即位之初所降指揮竝不許以泛賞遷轉止依條法施行自此以後凡所以泛賞引例轉遙郡橫行者皆許繳駮或吏部執奏終于回授而後已臣愚欲望聖慈特降睿旨寢罷劉詢帶行遙刺指揮令與依條回授所有録黃臣未敢書讀繳王涇等放令逐便臣伏覩上件指揮竊惟陛下聖孝仰奉三宫以涇等皆醫官舊人故許逐便以備使令然四人之貶罪有輕重未易以一概論也方高宗升遐之初涇追兩官勒停一千里外州軍編管馬希古追兩官勒停五百里外編管後省臣僚獨論涇之罪不容誅以其輕脫縱肆所用之藥不依方書不隨病證率意自任致此禍變人人憤鬱恨不食其肉罪大責輕縱未置死地乞斷配以副衆心有旨王涇追毁出身以來文字特決脊杖二十刺面配千里外牢城收管紹興三年正月指揮周昭應奉醫藥不謹除名追毁出身以來文字刺配瓊州牢城永不放還臣愚竊謂夀皇盡孝執禮不勝創巨痛深之心故處涇之罪僅恕其死而已太上皇帝之恕周昭行道之人多知其故含怒蓄憤以致違豫者久之竄之海外聖意可知在今日雖經赦宥不應遽使之齒于平民臣以為馬希古尚可恕也王涇周昭之罪不可恕也欲望睿旨將王涇周昭逐便指揮特賜追寢毋致失刑以纍初政所有録黃臣未敢書讀繳醫官鄭至逹改風科入內內宿臣聞有國有家者立法定制使有司守之有司不能守則君上當治其廢法之罪若徇一夫之請越法自便有司能執法守而上之人反欲以一時指揮而廢法開僥幸之門以來無涯之請則法令俱成無用矣醫雖曰伎然先王之所甚重矧國家禁廷之所用上奉三宫所宜精擇元豐之法選保試補其制甚嚴政和少變宣和又申嚴之俾竝依元豐法雖奉特旨傳宣宣押等仰醫局執奏不行可謂詳盡矣臣在後省所當遵執實緣年來繳奏多急于大者而以此等猶為細事亦間有書行自知其非今朝政清明凡僥幸廢法之事遇之輒論陛下俯從如響則在臣尤不敢忽所有鄭至逹特改風科與差入內內宿其于法制不可行者二而事體之大不可者一臣敢陳之揆以宣和執奏之法一不可也又乾道三年指揮內宿風科醫官以二員為額見今溢額人且令依舊今後竝不作闕差人二不可也是二不可者翰林院醫官局能執奏以為不可而聖旨特依今來指揮則是臣所謂有司能執法守而上之人反欲以一時指揮而廢法此于事體所繫尤重自此苟有勢援之人皆視法令為甚輕悉以特旨衝之則舊法幾于無用矣此臣所謂事體之大者也臣不識鄭至達為何人伎藝之精否考之案􅢥則纍經繳奏淳熙十二年為德壽宫醫官有勞特與免試驗供職差入內內宿淳熙十三年又為醫藥有勞差充德夀宫祗應皆為醫官局執奏奉聖旨特依今來指揮皆為臣僚繳奏而罷不知懲創又圗特旨以破舊法則其人頑狡可知況內宿風科醫官既以二員為額目今已有員至逹又在三人之外又聞大方脈以七員為額正緣千求不止已是濫額數員可見冗濫今若不行止遏恐來者不已是醫官局能執法守而舊法日以寖廢臣等反失其職矣是以冒昧歷歷言之欲望睿斷追寢特旨庶使僥幸攀援之人自此帖息不勝幸甚所有録黃臣未敢書讀繳謝淵請給全支本色臣仰惟陛下奉承三宫惟恐不能順適聖意然法制之設所以公天下而共守之有不可踰者知閣謝淵為皇太后親弟請給依韓托胄例特與依祿給全支本色有以見陛下奉祖后之意然真俸之支則有不可吳瓌吳琚同為太皇太后親姪同為檢校少保節度使可謂事體至切矣然吳瓌之請真俸已久無有議者而吳琚之請太上皇為之降旨則黃裳以給事中力陳者三四陛下為之降旨則黃由以攝給事中又至于再三論奏而後止疑若有甚異者無他瓌在紹興元年十月指揮之前而琚在指揮之後者指揮既定之後若又開此門則戚里攀援何時而已兩朝聖明終允其奏韓托胄之真俸以淳熙十五年十一月降旨正與吳瓌事體一同謝淵之請切似吳琚臣是以不容不論欲望聖慈收寢前項內批指揮自後若不係南班隨龍統兵戰守之人以真俸為請者一切以定制絶之既以杜僥幸之門于節用之政不為小補所有録黃臣未敢書讀繳傅昌朝改差幹辦皇城司臣竊惟皇城司之職不為輕選臣不知傅昌朝為何人第以名簿籍考之淳熙十年天申聖節皇后合得䕃補恩澤將一名回授與本閣進奉白身傅昌朝補承信郎昌朝所謂之官雖元係親屬恩澤而補官之日明言以親屬恩澤回授與主管進奉之人即顯得本非親屬而主管進奉止係一時非泛補授故頃以親屬賞典轉官先經之部告示後有給舍繳駮皆謂依元降指揮止合轉至訓武郎止不曾施行至今年七月二十七日指揮云皇太后親姪女夫傅昌朝偶用本殿捧香恩澤補官特與依親屬補授出官施行見今吏部申明朝廷未曾轉行武翼郎夫覃恩轉官以千萬數獨昌朝未得放行蓋其出身猶未明白也若止是一時非泛出身其得閣職已是過當難以遽當皇城司之選況昌朝見待幹辦軍頭司猶未赴上臣愚欲望聖慈收上前項皇城司除目俟朝廷取見出身明白放行本人轉過武翼郎然後授之未為晚也所有録黃臣未敢書讀繳李氏等依宫人例支破請給夫人李氏等係太成國信國崇國三宫人例支請上皇后親屬依臣竊惟國家賦祿俱有條式不可紊也紹興元年士歆妻梁氏支給臣僚繳奏謂一命婦之謂給事體雖若細微然幸門一開攀援者衆蟻穴之不塞可以潰隄遂蒙寢罷夫以士歆為宗室大老其妻一有干請猶為之遽止今無故而給三人尤為無名吳琚為太皇太后之親姪謝淵為皇太后之親弟其請支真俸陛下不以私害公悉從繳奏而止李氏三人因緣戚里不從夫爵得授國封已為幸矣若更依宫人祿式則例支破諸般請給僥冒益甚檢照內國夫人例一人每嵗約計錢近二千緡銀一百五十兩米四十五石綾一百二十五匹羅三十餘匹絹六百匹綿四百兩況一日而併與三人其蠧耗可知陛下恭儉節用為天下先中外方且冀望裁抑內庭用度以紓國力若遽開幸門自此攀援日至何以杜絶臣愚欲望聖慈收還上項指揮以塞戚里無厭之請實為幸甚所有録黃臣未敢書讀攻愧集卷二十九
