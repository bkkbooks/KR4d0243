front:
  text: 攻媿集巻八十一
  hash: sha256:da0f47a3807f1e24d4e7df9e703461b2e0147d71a7517cf1aaa5573120dc25a5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_081-1a}
body:
  text: 宋樓鑰撰銘胡徳容安静室銘民生之初未嘗不静私慾害之羣邪交騁不操而存必也元聖勉旃學者無非中性乃若異端寂滅清淨死灰不然何有于應寜知聖心塵不著鏡妍媸坐分不将不迎吾嘗從事萬慮悉屏求静得擾薰蕕終勝師乃有言求則増病必有事焉勿忘勿正安則何敢庶㡬游泳吾誰與歸将求安定趙振文毋自欺齋銘上欺乎天謂其甚邈下欺乎人意其㒺覺事親而欺所厚者薄事君而欺陷于大惡所利幾何所喪甚博惟不自欺乃無媿怍一不妄語所守至約事是今日勿謂爲昨推此而行餘裕綽綽心惟至靈神不可度戒之戒之惟謹惟恪君如美玉欲資磨琢他山之石可以爲錯族兄德潤硯銘惟端溪下巖之石藏古麗州之樓氏用以射䇿閱三世孫子相傳寳千祀王端本硯銘四圭兩圭同一邸未聞一璧踞十趾玉有五色今乃紫磨以禹圭滃雲起羲獻傳家不知㡬傲睨揮毫約詩史淮水不絶璧不毁書種緜緜尚百世贊伏羲像贊不履而跣不冠而髪是何人歟以治以察手持圎蓍畫卦以八嗚呼是所謂古之聰明叡知神武而不殺者夫東坡畫贊出則鳳鳴處則龍卧論議觸海翻聲名塞天破百謫九死一毫不挫嗚呼固已知前無古人後有作者殆恐無有過之者也呂真人贊神氣旺雙瞳碧一劒横飛萬里瞬息旁人道是吕洞賓堪笑旁人初不識自贊平生愛讀書眼昏健忘不如故平生愛為人只有照管不到處老矣百事好罷休山林如許盍歸去惟有媿處便須攻攻到無時方始住伯氏小崑山贊崑山片玉大不彌掌數峯天成暗合心匠懸崖崚嶒咫尺千丈主人樂山一見技癢環以清泚碧樹増兩海岸孤絶大士俯仰我亦膏肓誰㑹清賞援琴對之萬壑同響十六叔祖畫贊猗歟先生嘉遯巖谷中無一塵髙視流俗面壁燕坐形骸土木是誰丹青寫此面目旁觀未知既笑而嘻此身見在何以假為先生粲然徐曰不然若謂是假何必此畫咄哉此身又豈其真趙禹川畫贊一室懸罄萬縁俱掃道窮而志益堅心灰而形不槁予實敬之蓋宣和西洛之貢士而淳熙宗室之遺老也陸從老真贊綸巾野服河目海口膏肓泉石而能起人于九殞之餘銜盃漱醪真欲遯迹于千載之後是将傲睨塵埃之表蓋隠于藥而逃于酒者也莫子大畫贊目光深碧長鬛如漆少從諸公故身處韋布而有素官之風自適其適故年将六十而有孺子之色是将坐安輿脱世故洗眼以看令子之翺翔而逍遥乎仁壽之域者耶叔韶弟畫贊是何爲者獨立突兀目視雲漢若書咄咄江山數千里而氣益増齏鹽十九年而志不屈故能起連桂之墜緖收青氈之故物今既漸失布衣之髙是将斂湖海之豪而歸尋理窟者耶髙㑹之畫贊風標秀整興寄髙逺淟涊京塵而素衣之色不緇浮沈宦海而鐵硯之志不淺吾欲與之一局以消白日五絃而送歸鴻蓋所謂向若而歎自崖而反者也趙景瞻畫贊寫照求贊其詞多妍子求箴規意已卓然余訥于詞為誦道家之言其言曰和暢命生卑退徳生清静道生慈儉福生君能行此四者而又文之以學富貴何足論當遂爲河間東平之賢馮義叟畫贊曳笻者誰曰小馮君謂爲山澤寒儒而有食肉之相疑爲貴介公子而有驚代之文孤標如峯尖之秋隼秀句如春空之行雲退然不言無異稠人若飛書走檄之敏髙文大册之工有能試之老矣是筆力猶足以挽千鈞者耶汪彊仲畫贊頭圎骨緊短小精明種雙芝之秀擷叢桂之英宦學有傳清白是承勉之哉資禀如此毋曰賢于俗人斯可矣冀有以振吾外門之家聲也豐叔宜真贊志行超卓風神灑落襲清敏之餘慶傳黄梅之家學弟兄怡怡親髪如鶴故居鼎新樸斲丹雘已而意慕山林身去城郭掃溉松楸以自伸其志甘守簞瓢而不改其樂蕭然松廬一丘一壑捜蒼石之空洞引瀑泉之濺撲信盤谷之可序而輞川之可貌也惜乎急景不可以久留泉石之膏肓又不得而藥吾聞其風欲從之游噫九京其可作耶從子澤修淨業以彌陀像求贊彌陀何在云在西方垂一隻手接引無際視日入處知幾由旬一念感通如覿面見莊嚴五采聚紫金光全體現前若在浄土汝以色相欲見如來一念或差萬里懸隔惟此世尊衆稱慈父汝能供養懺悔歸依家有慈母與佛無二事母與佛其畢此生觀音像贊宜興蔣雲起示余曹仲元觀音像上有宣和御題筆妙在吳道子之上且曰上天竺瞻禮大士者衆今将摹刻山中使來者得此像以供養用資二親冥福乃稽首為之贊慈悲廣大相好殊勝筆意精微乃與佛稱自在在心固不在相察至秋毫出道子上攜此西還刻之天竺流傳八方植無量福定光佛像贊蟲蝕成文屋漏成痕贈之以中天然者存擬議則錯思量則昏斷是無人能㑹徒自饒舌紛紛直教喚出南安巖主也只解説無門風鈴搖殿角柔櫓過江村南山律師贊曰禪曰教無非為人惟兹律儀尤切于身仰止南山與佛無間人天師尊不容贊歎靈芝律師贊南山既逺教道中微化身再來是為靈芝持律益嚴護法甚勞靈芝之風南山相髙佛法自天竺流入震旦久矣而四海之外奉之尤謹今有日本國僧俊芿慕南山靈芝之法航海求師首畫二師之像求余為贊芿公恪守律嚴究觀諸書既得其説欲歸以淑諸人余非學佛者吾儒曲禮三千散亡多矣然見于日用者如入公門而鞠躬上東階而右足雖造次不可廢也詩曰我心匪石不可轉也我心匪席不可卷也威儀棣棣不可選也此非律之説乎歸矣使律之一宗盛行于東海之東于以補教化之所不及其為利益豈有窮哉哲老真贊本是六一居士後裔郤做臨濟老子兒孫拈槌弄拂便習成出家兒事横説豎説都不見文忠之文若是金剛圏渾身透過栗棘蓬作一口吞直得齒如劔樹口似血盆呵佛罵祖惟我獨尊真箇了此一段大事也不枉了打破家門湖心竹谿政講師贊諸佛諸祖都知源流一片靈臺莫之與儔萬論千經縱横受用一段辯才壓倒大衆定交方外一别九年再見似黄面老子依舊説教説律説禪指望他一口吸盡西湖水郤成火裏打秋千季札挂劔于徐君之樹吾亦説偈于老師之前師豈遂無知耶當亦盱衡而爲余欣然也鑑堂昕老贊咄這老頑頑于石鐵喝倒又起棒打不殺急裏翻身當機便拶若教撾鼓説禪也㑹七七八八咄把似口羅舌沸何似耳聾眼瞎瑞巖益老贊鋪席多年欲捲收又攜一錫海東頭雲門不絶僅如綫命脈有人能續不涂毒䇿老贊涂毒已化一絲不挂誰模其形強為描畫是見佛便呵見祖便罵者我銘其塔已成話霸更要注腳我則不暇為此老從來顛蹶不知今在何許而精爽猶為可怕也雪菴瑾老贊俊辯不窮靈臺無比菴空無人雪消成水若道成水流轉未巳一㸃洪爐永超生死英老真贊豎起硬脊梁論交鐵拄杖栖雲菴中若将終身十字街頭蹴踏龍象大地一變直教寸草不留大厦将傾敢将一手扶當翩然去之逺隔風浪維摩示疾幸得無恙且須留取這老古錐要與住山人作箇榜様壽上人真贊年甚髙業甚茂火冷雲深松枯鹤瘦對鬼神而獨説有翻河之辯口人望為大道師終不出一隻手邁祖風之髙絶挽末俗之卑陋求之吾鄉蓋前有顔聖徒而今見此山之壽也瞎堂逺老真贊少識師于柯山之菴晚見師于靈隠之南荆棘林中吞栗棘蓬觀堂深處見古瞿曇雲歸列岫月印寒潭真圓悟之嫡子而杲風之同參也圓覺菴澄師真贊清浄縁深塵勞念絶雖見比丘尼身有古貞女之潔居然是圓覺菴第一代住持更不須横說豎説偈頌雙峯二偈莫把資深兩處尋此心心外更無心道人欲問資深話自得元無古與今道非身外亦非中左右逢源作麽逢遶寺尋山無好處不知門外有雙峯新昌石佛費盡三生心與力造成石像一百尺相好端嚴具足尊五采黄金妙装飾道不是佛郤不得若道便是也不得上盡層樓郤下來何曽見得真彌勒游金焦兩山以雨而輟余沿檄行浙西冒秋陽之暴烈漕河絶流日有焦槁之歎至京口假舟游二山適是日風雨大作江頭尤甚豈俗語所謂平生不賣漿者耶回城道中因憶本長老金山偈戲續其韻金山寺裹山焦山山裹寺風雨勸我歸也省兩頭事本長老金山偈云水裏有塊石石上有箇寺千人萬人題只是這箇事跋惠峯詢老所編類海古徳手段決裂剥地破㔢地折説道不立文字未免横説豎説草菴文字太多只為老婆心切若不作恁麽看将謂多口饒舌題老融畫彌勒乗風欲去東南回頭此意誰參當時蹉過足菴郤來攻媿同龕戲贈怡雲平老深山中拔出閒身閙市裏尋得静處相逢了白話三通那箇是末後一句不因聞所聞而來不為見所見而去嶺上白雲君自怡何時許得同龕住送清道者住投子山一鉢一衲一丘一壑非去非住無相無作一脚踏著投子機不被旁人輕摸索戲題珪老借菴莫道菴子是借底只你也是借将來勸君莫作來生債盡底還他亦快哉不知當初問誰借至今久假而不歸畢竟還了方是了郤須還我未生時次仲舅韻寄拙菴涵秋古澗落珠旒㡬欲相将作勝游芒屩未穿心已嬾不如莫莫且休休明月堂前玉几山倦游雙徑卻來還舅甥相與成三隠城郭山林等是閒公居山外我城中不見成疎見亦空要是歸來當一見待攜藜杖訪支公莫把坐忘成坐馳歸來須是識真歸壺籌投盡無人拾澹坐藤牀風掩扉送雪竇璧老住雪峯雪竇移將住雪峯兩山雪色本皆同莫言此去八千里明月往來含太空游雪竇雙塔登雲簷有懐海印雲老來禮二師遺像小立雲簷一餉欲見徳雲比丘卻在别峯頂上金峩本老領優婆塞衆求寫選僧堂三大字示以數語行者堂中選僧衆僧堂中選佛人道是我卻不不如莫待僧伽梨便與豎起脊梁骨大丈夫休汨沒一粒爆起冷灰豆十分鈍似遼天鶻赤脚踏透祖師闗神錐擊碎精靈窟君不見盧能只在碓坊前解道本來無一物題壽居仁獨説圖向來八萬四千偈舌端辯才若翻水山空月落說向誰不如出口入吾耳當時受者兦是公烏有先生子虚子我卻曽見語録來秖有空空數張紙題璧老笑菴笑甚底笑甚底若要笑時笑殺你説夢夢中洗泥泥裏頭上安頭以水濟水箇箇一般滔滔皆是我也要笑來終不欲開脣露齒題宏老空谷君看空谷自然空聲有洪纖應則同正為中虛聲自應莫将應處做神通昕老自號鑑堂來住蘆山山中先有鑑堂鑑堂來住鑑堂中兩鑑相磨只一同要是非堂亦非鑑但見寂照含虛空跋涂毒與惠老偈我銘師塔而不識面一瞻頂相爛爛巖電横説豎説不待饒舌涂毒一聲百獸腦裂次韻伯父與心聞偈紹興二十四年伯父帥維揚時在郡齋見所與心聞一偈慶元六年昕老示及真蹟恍如隔世敬次舊韻法器何妨待晩成一朝㸃鐵便成金拽開鼻孔力無限坐斷舌頭功更深揚子江頭言在耳靈山㑹上笑傳心自憐鈍置無香氣四十年來只似今汪耐翁以最首座十玄談見示十首玄談已贅疣勞君頭上更安頭若還又有九百漢葛藤相纒幾時休題龍眠畫西域聖僧放兩不借疊雙足自在在心機在目黙然深入不二門不知師唱誰家曲戲答益老寄方竹杖瑞巖益老寄方竹杖書云不可削圓也一笑又舉大徳拈起拄杖全得這箇力話謂攻媿下語下得一任提持下不得奪卻作麽生區處快道快道家家竹杖只圓光此竹如何得許方削得團欒無可笑驀然奪去亦何妨咄哉得力處不在這箇答東山一老二偈即心是佛本無難錯郤絲毫隔萬山知有毗盧五千卷誰能分寸費躋攀閉門深坐日知味無限好山都嬾游城裏山中俱是隠江湖不若兩忘休送一老住廬山歸宗久向東山捲藏經鬼神推出舉軍驚從來要去廬山住好就山中過此生啐啄同時不偶然史君提起正當年向來閙市難行道今日人天聽説禪千古名山大道塲止因賦重遂荒凉後之君子誰能弛試向山前問老蒼歸宗法窟寖湮微拭眼餘風靡孑遺法鼓一聲精彩變要如光弼用軍時廬山面目非難識横嶺側峯皆是真若待出來方識破不知何用箇中人題庠老頤菴下震上艮下動上止分明兩片口脣包著許多牙齒禍自此出故以言語為戒病自此入故以飲食為忌庠者養也頤者養也名庠而住頤菴知他養箇甚底直待吞郤栗棘蓬更與吸盡西江水莫問這邊那邉都是一箇道理題慈溪張氏坐化頌慈溪董君之妻張氏坐化作頌云有身有苦無身無礙撒手便行這回自在柏泉諸人稱之爲下一轉語苦是自苦有誰縛汝礙是自礙非身爲害既知一物本來無何待行時方自在書全無用語錄全公無用無用之用生前已自無用死後葛藤何用雖然如是善用者必自有用不善用者不如勿用試問大衆如何則為善用有時拈起一枝草作丈六金身有時把丈六金身郤作一枝草用跋正法眼蔵正法眼藏當時滅郤那得許多落落索索問著則差答著則錯喝也喝不住棒也打不著妙喜更得工夫時與下箇注腳休休休莫莫莫若要拈花微笑底事不二法門也低一著攻媿集巻八十一
