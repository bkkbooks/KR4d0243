body:
  text: 宋樓鑰撰今體詩南山廣莫軒廣莫垂風隘九州亂山無數㸃平疇一千里外在吾目三十年來無此游地下天高俱歷歷鳶飛魚躍兩悠悠昌黎費盡南山句曠遠還能似此不送趙至道節推君來入幕恰三年我幸投閒識此賢婉畫時時因事見素風凛凛信家傳易林律本君須寄月窟天根語未圓問訊難兄無恙否相忘千里各瀛壖湖亭觀競渡涵虛歌舞擁邦君兩兩龍舟來往頻閏月風光三月景二分煙水八分人錦標贏得千人笑畫鼓敲殘一半春薄暮游船分散去尚餘簫鼓繞湖濱龍潭方丈又因寒食此中來窗戶虛明絶㸃埃山裏春風無間斷海棠開過棣棠開弔僅老塔僅老相從五十期來瞻遺塔我心悲當時舊話無人說空有門前洗鉢池夜攜家登南渡橋幾過長橋下清宵得意行風高江水急月上海潮生空迥寒逾峭更深境過清扁舟難久駐轉柂問歸程題蘿月上人送鴻小樓雨洗春山空翠新登樓不見送鴻人薜蘿清夜月依舊無復新詩泣鬼神贈于湖劉相士自笑今年卦氣闌壯心銷盡鬢毛殘明知七十無多子只問何時可掛冠五月望月蝕歷家又言六月朔日蝕閭巷夜爭呼相傳救望舒偶因風暫破真似月之初孰謂蟇能瞎端知歷不疏太陽交蝕近試看更何如題賀監李謫仙二像不有風流賀季真更誰能識謫仙人金龜換酒今何在相對畫圖如有神斗酒澆詩動百篇鑑湖牛渚兩俱仙早知今日猶相對不向稽山回酒船病後戲作河魚腹疾未全除一飯充飢不願餘縱有珍羞難下飭真成頓頓食黃魚枕上不守庚申不坐禪老來觸事總悠然天明門外無來客儘好蕭蕭聽雨眠謝蔣行之送菊秋老懷情儘自寬眼前只缺菊花團分來三徑雙株秀先得重陽兩日看玉軟金輕無限態風高露冷不勝寒幽人相對成清伴正爾落英供夕餐廳事落成老母置酒喜而成詩數椽增葺苟全時我愛吾廬喜得歸兒輩粗能勤父蠱老天無不費心機年來每愧踰初望病裏尤知悟昨非從此蕭然無一事但當日舞老萊衣十月十七日夜蟄蟲坯戶六經旬掣電驚雷若暮春震起昆蟲千百億不知何處更容身織錦棊盤錦城巧女費心機織就一枰如許齊倣佛回文仍具體縱橫方罫若分畦爛柯未易供仙奕畫紙何須倩老妻如欲拈棊輕且稱當求白象與烏犀叔韶弟以退堂洪老詩來寄謝不受人天供甘心樂隱居空窮千里目笑擁一樓書攻愧老無用退堂閒有餘相望可杭葦何日訪吾廬寄題正卿通判可高亭樟坡直上可高亭未見高亭秖見名想像豈能勝一覽登臨安得快雙明大龍湫下聽雷吼白石岩頭看日生咫尺好山隨杖屨自應老筆擅詩聲中秋次從子涔韻雨餘不見日西沈將謂中秋又作隂佳月忽開千里影騷人滿慰一年心掃除宿翳風雖動滓穢太清雲尚深坐待寒光誰㑹此阿咸為我發微吟楊花杜門無緒看芳菲見說楊花滿路飛謝汝不隨人冷暖因風翻舞到柴扉送趙南仲丞溧水不用匆匆恨别離版輿春晝綵衣隨往題斯立藍田壁更訪清真溧上詩公事毋庸犄牙角鄰封真是和塤箎日哦新句頻相寄明月清風慰所思戲題龍眠馬性圖狗子已知無佛性馬又何曽有性來伯樂若來休著眼任他騏驥混駑駘它山素霓橫臥作雷吼日射細鱗銀雪光安得此身如白鷺翛然終日在梅梁過盡水禽竝野鳧風標惟許一春鉏可憐久立梅梁上不為溪光秖為魚小酌元衛弟聽雨小閣臨流暑氣清藕花的的照人明移牀更近欄邊坐要聽棊聲雜雨聲潚再往剡中念之尤切作詩寬之剡縣不為遠丞官勿謂卑鼓盆知愛重去國倍行遲堂上森三老房中秀一兒加餐了官事莫賦悼亡詩觀雲寄簡講師蒼狗俄然又白衣來從何處去何歸無心出岫還歸去莫向秋風說是非過故家團團桂樹擁簷牙舊日輕黃滿樹花惆悵秋清無一葉空餘枯枿縋寒瓜題從子浹娛親阿戎築屋為娛親野草閒花日日新我奉版輿來舉酒祈君親壽似夫人丹桂碧雲步陳紫金㽔風靜秋高千萬枝嬌額塗黃元自好是誰深傅蜜胭脂下元日暖甚夜風雨大作早微雪從子潗以酴醿來眼明喜見早酴醿窗外風號集霰時梅蘂已慙前臘破芳心休用怨春遲納凉除夜昨幾似見雪芭蕉今不疑若使洛人真得此應須更詫百宜枝送朱叔止守南劔舍人簪筆舊甘泉家學相傳子姓賢未羡夾河為太守阿連剖竹向封川檇李曽蜚剸劇聲二車仍贊虎頭城朱轓小試承流手要繼桐鄉循吏名萬竹蟠山喉不乾兩龍潛水氣猶寒郡齊見說真圖畫公退何妨一倚欄下水上山腰帶州人家無數起危樓遨頭不用喧簫鼓秖把清詩紀勝游同盟東下或西征老我惟知管送迎秖恐政成登省戶未容歸騎向西城名畫法書知幾編俸餘寧復計求田摩挲賸買新文字歸滿米家書畫船送杓孫隨侍上虞阿斗生來十五年未曽一日去翁前聞詩勿廢家庭問習吏仍求城旦篇婚宦有涯真是幸巾箱所蓄要相傳榮罍雖小性非魯口授詩書加愛憐戲作二子為丞分越邑女兒隨壻過江南笑言屋裏成岑寂匹似當初只住庵諸塋拜掃晚歸長汀雨意早垂垂寒雲晚更低空中時散㸃道上不成泥緑栁桃相映黃花麥與齊紆回餘百里喜見舊松隄送朱季公守封川韶陽生長十餘年城郭重經固宛然歎息紫薇仙去久尚餘遺墨照山川年季公生于壬戌先舍人居韶十四桐鄉漢有大司農封守今推陳秀公君向邦人著遺愛近追相業遠家風封川有遺愛陳秀公曽守鄉評久說鴈行賢剖竹封川與劒川不用對牀風雨約政成問取舊青氈吾鄉棊社寖凋零賴有朱家好弟兄舉酒看看故人少陽關莫唱斷腸聲妙舞清歌有二姝後堂曽見繡羅襦嶺南太守風流勝不用歸舟載緑珠以玉蘭贈王習甫一種香蘭玉色新仙家分得蘂宫春調高韻勝誰能稱付與能言解語人華屋翬飛慶事綿芝蘭玉樹喜庭前似聞楚畹芽初茁便看藍田生晚煙送趙清臣宰姚江玉立君家好弟兄藍田風采照花城版輿壽母人間盛千里何曽去送迎鄞江水與舜江通久矣威名滿一同試問何時到封部數聲柔櫓一帆風長江東去跨虹橋千丈橫隄捍海潮更向燭溪圖永利坐令百里沸歌謠才刃恢恢妙撥煩鄰封撫字尚何難更能觸事加長慮自有甘棠向後看歸家故步懶重尋藏拙年來恐不勝短棹有時乘興去徑登竹所聽鳴琴楊花雨壓輕寒春較遲春深不見栁綿飛忽然飛入閒庭院疑是故人何處歸栁綿無數糝枝頭日暖隨風撲畫樓萬象可觀惟有雪喜看晴晝滿空游為我輕攀緑栁枝帶花低護笑攜歸日長深院微風動要看鬆綿當面飛野芳庭草是生涯老去秖宜閒在家幾日惜春留不住小鬟為我拾楊花送王伯奮守筠陽三槐名德萃清門七葉為州賴有君道院無忘山谷賦郡齊當繼潁濱文君應膝上憐文度我向東牀憶右軍振起家聲差易耳便看奏最躡青雲别王恭叔兩兒雖近隔江潮賴有王郎慰寂寥遠侍雙親官道院為同盡室餞西橋腦脂遮眼最關念客路尋仙勿憚遙别後飛緘問安否數來谷口訪山樵别長女淯老我年來百念輕文姬助我以琴鳴等閒相對成三弄游戲俱彈似一聲舉酒不堪千里别登途知用幾程行郡齊自是神仙窟㑹有階庭玉樹生趙資政園梅篆小徑回環里許長寒梅森列間疏篁路如古繭縈繆篆身似輕烟繚印香九折坂中經蜀險八盤嶺上趁朝忙歸來游戲通幽處笑看危途幾太行示從子東院敲棋西院琴固知猶勝别勞心少年不比老癡叔且向書窗惜寸隂贈畫梅吕生西湖處士賦疏影未似希貞好樂章豈是無情甘淡泊受他風月幾凄凉潚自剡州寄水晶蒲萄馬乳從他堆滿盤未如清嚼水晶寒固知一縣蒲萄熟不用勞人數問安送汪莊仲赴江東倉幕彊仲荆門簽判不見適齊老于今三四秋弟兄登宦路親黨駐行舟老病無詩思衰懷重别愁外家門戶盛勉力紹箕裘外氏䝉恩厚文昌獨我知居慚酷似舅喜有寧馨兒遇事行方便禔身謹護持公餘定多暇黃卷有餘師早嵗過秋浦貪程不入關君今參儉幕時得上齊山膚使資關決賢侯伴宴閒好音頻寄我藉此一開顔之子游何許平州更玉州山川稱勝絶幕府信風流翠巘寒逾秀金蓮夜不收天涯念鄉國少上仲宣樓見說荆門地如門蔽楚荆舊時為內郡今日號邊城但守平平䇿毋求赫赫名勉哉關決際從此振家聲送元積弟赴淮東總屬南徐來往飽經過總餉賓寮入禮羅子去幸陪鄒湛輩君今還是伯休那金閨通籍時方可鐵甕名城景最多我有淨名遺記在試從萬井訪維摩十人兄弟五人存心事方欣得細論可但衰遲憐遠别只因喜懼有慈尊倚門何止期吾子發䇿還知望好孫從此三年風雨夜寂寥棊局與清樽陳君舉既亡汪文子攜其所作春秋後傳及送行詩來次韻名盛望尤備枝披實亦繁無由究賢業猶幸立斯言書在經逾顯人亡道更尊九京如可作與子共南轅送趙伯藏倅永嘉當代橰閒老吏師佳兒官業具而微已煩潘令宰花縣正要王祥康海圻得助江山詩興逸平分風月羽觴揮安車何日迎清獻又向堂前戲綵衣分教分符恰五年異鄉每若故鄉然歸來幾作池塘夢送别欲隨騶御仙目斷甘林應飽熟手栽欒實想芳鮮邦人若問老州牧為說清霜繞鬢邊晝寢彈徹悲風更廣陵滄浪一為濯塵纓邯鄲枕上夢初覺喜聽簷間風雨聲喚仙閣上到危層莫喚仙才憑橫檻挹江天江天如許來供眼何用王喬更偓佺多少尋仙更不還渺茫竟墮有無間使其真有毋庸喚仙自層城我自山犯暑來登覽松風為灑然龍泉登古井虹影臥中川萬簇寒林秀四山秋色鮮詩翁不可見況敢喚飛仙送趙晦之丞彭澤淮甸歸來涉學深孤雲又出亦何心公餘巖下讀書去遠繼風流石橘林淵明事晉肯臣劉仁傑忠良不附周見說三賢參羽士光尉斯盍將吳簿配蘋羞簿有高節見六一集南唐吳舉為彭澤主陶令居官八十日始為督郵方賦歸君家門戶要興起未用飄然詠式微阿虞試晬戲作阿虞匍匐晬盤中事事都拏要學翁最是傳家清白處不將雙手向頑銅贈别盧甥申之歸吳門千里何妨命駕遲晤言未厭已西馳子休重賦瓊瑰贈我亦懶歌親戚離好向清江論樂府更從葉子說新詩樂閒引紙五十尺為篆離騷繼李斯又謝申之示詩卷不見賢甥十一年新詩示我百餘篇古風已喜能行意近體尤欣細屬聨宅相真成珠在側冷官休歎坐無氈作詩勿謂今餘事更下功夫繼玉川送秦仲防通判清德曽瞻啓慶碑孫曽清更畏人知秖緣一介弗輕取坐使斯民不忍欺瀨水家傳御書卦宣城手寫送行詩典型尚繼金鑾舊馬氏一門誰白眉題輿再到海東涯嗜學深于入幕時一字未通終不置五行俱下尚嫌遲情親端有卜鄰意别後空勞望月思老我無因可重見祝君來此擁旌麾謝剡中沈元龍惠詩東陽何事到東州百語曾無一語酬深羡松筠無敗葉自言蒲栁已先秋千金既覺成虛擲雙璧還驚又暗投别後未知何日見但將吾道付滄洲謝舒景叔寫照見贈誰寫衰容入畫圖本來面目舊形模幾年老瘦鬢如雪不道今吾非故吾庭前一蓮著花門外荷蓮浥露華緑雲平地擁秋霞病夫不耐出門去且看庭前第一花淯月下鼓琴用韻老稚團欒鯉在庭文姬為鼓玉琴聲起來同作悲風曲倍覺先秋月影清國仲觀遷居尹隩訪别晚年未定一枝巢到處蓋頭無把茅又欲浮家過尹隩何殊樂道向莘郊君今去此難招隱老更從誰可定交見說衡門臨野水秋深容我去推敲仲觀有詩來謝次韻危機屢見劔頭炊喜及挂冠神武時從此含藏三寸舌算來插得幾張匙讀書窗下頻勤習攻愧庵中老住持速辦小舟頻往返及今精力未全衰謝王粹中惠白鶴山麟川觀斑竹杖竝竹輿麟川仙館翠琅玕荷子攜來白鶴山未效葛陂龍種化絶勝湘浦淚痕斑裁為柱杖一尋許巧作乘輿四尺慳兒子門生俱努力病夫欲過虎溪還曽無逸郎中名燕居曰和三續社有詩次韻㑹三欲和雙林家以續通地通天秖箇中千岐雖别大都同兩家偶爾流傳盛一貫臨之內外融欲境掃開心在我浮雲散盡月當空感而通者後來語不感須知自有通老來老來何以度光隂秖有圍棊與鼓琴棊為心勞疏對局琴因臂弱倦調音曲肱時復同尼父面壁何妨學少林氣習未除秖自笑又還弄筆動微吟長生草玻璃擢葉玉蟠根千里提攜寄海濱雨澤不霑仍自潤土膏無著自長春嵗寒秀色鎮衣舊日暖素英能一新我欲餌之求久視恐君靈已不靈人謝黃汝濟教授惠建茶竝惠山泉幾年不泛浙西船每憶林間訪惠泉雅好誰如廣文老親攜直到病夫前細傾瓊液清如舊更瀹雲芽味始全或問此為真品否其中自有石如拳史子仁碧沚相家本有四明山更葺桃源渺莽間四面樓臺相映發一川烟水自彎環中川纍石勢嵯峩城上遙岑聳翠螺舊說夕陽無限好此中最得夕陽多題趙晞遠二畫藻翻數尾已如生妙絶魚兒作隊行不是深知濠上趣未應筆底得縱橫魚扇窗前驚見一枝斜照眼英英十數花千載簡齊仙去後何人更著好詩誇墨梅送陳表道倅嶽陽垂上青雲去如何乘二車輕為千里别時寄幾行書剸劇才無滯傳家學有餘當塗足知己應不費吹噓聞說巴陵好樓高占古城湖光千頃白山色一螺明赤壁沈沙㦸蒼烟老樹精好詩收拾下寄我慰離情元珍弟酌别賦此贈之歸來十暑又三霜衰病那知謁帝傍採菊初期老陶令種桃應是笑劉郎不辭白首登鼇禁正欲青衫及鴈行今夕團欒同醉後未知何日駕歸航靈芝寺送客靈芝寺憑欄山有無自從朝北闕始得見西湖烟外移輕槳波間浴野鳧清寒不可駐回首又神都閭丘醫視脈曰老人之脈如小春有感老去光隂似小春如何比得少年人君看桃李秋風後縱有花開不是真貢闈對硯盤發歎老去未忘黃與朱琢成三硯樂閒居豈能更作諸生業但欲頻看後世書視草北門才已盡持衡南省計尤疏便須再挂衣冠去約汝同歸故草廬次韻李孟達使君與林雪巢子季武詩古梅巨石瞰清池觴詠曽陪老啓期别我遂成千古恨傳家空有一篇詩使君尚爾悲陳迹處士惜非同此時若使南樓預清賞胡牀應奉庾元規玉堂早起早起多奔走旬休亦往還偶因二士試始得一朝閒靈鵲花枝上金魚荇蒂間素餐終有愧只憶舊家山贈徐松我為浮名愧引年老餘八十尚飄然不如合卻談天口歸向白雲深處眠經筵講詩徹章進詩聖主承丕祚于今嵗幾遷昭回光飾物剛健位乘乾善治新更化當陽獨攬權誅鉏及共鯀擢任列閎顛曩日方謀始宸心最急先未遑親政理首務闢經筵恭儉甘卑室尊嚴拱細旃晝居勤已甚坐侍禮無前講徹詩三百時逢運半千諸儒深誦說六義極摩研俯閲毛公傳旁參鄭氏箋慨尋中古意重是素王編舊本三千首終存十二篇雖遭煨燼厄所賴詠歌全開迹因農事安民在井田成功時邁酌興業大明綿東國思平賦南山樂得賢艱難由后稷勞來美周宣起自紹熙載逮兹嘉定年關雎從肇彼殷武遂終焉寵數傳中旨恩光被邇聨神文期繼踵元祐信齊肩內廄頒雲騎雕鞍絢錦韉茗分龍焙品香拂御爐烟衆俊咸宣力孤生亦備員少時曽學詠老去未忘筌納祿誠休矣歸耕久晏然鋒車俄促召梓里謂登仙詞禁容揮翰天官命典銓豈知侵暮境重得侍甘泉朽質何能報孱軀殆欲捐尚思求譎諫海嶽效塵涓題天竺圭老復菴路從天竺更微南衲子邀余過復菴八法照人瞻睿藻一峯當戶擁晴嵐竒爻初動玩羲畫萬物竝觀師老聃六用不成均此理楞嚴容我為同參為倪正甫尚書題壯懷堂扁以詩來謝次韻久矣君宜任弼諧果隨驛召上天階幾年不作相逢夢一日俄傾積别懷情厚夫君幾鮑叔愚如老我類高柴他時戶冊高懸後直欲扁舟訪水涯攻愧集卷十
