  text: 攻愧集卷十四
  hash: sha256:37338446caceb3337ca08bc4c3d039aad22e0e88471db4267ac5be5495626747
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_014-1a}
body:
  text: 宋樓鑰撰今體詩趙路鈐不枯挽詞蚤歲游金闕霞冠拜紫宸可堪天寶亂及見會昌春宛宛王孫態飄飄物外身靈光愴陳迹遺老更何人諸父論交久忘年許預盟登山陪躡屐泛月共飛觥來往開三徑安閒羡一生山深凄薤露愁憶醉歌聲姜總管浩挽詞及見開元盛曾聞正始音雕蟲徒壯歲冠鶡豈初心論事風生席疏恩帶錫金精神空滿腹愁絶病沈沈富盛俄遭變艱難却起家田園新活計詩禮舊生涯仙桂應傳秀庭蘭更茁芽真歸了無恨超徹妙蓮華祝通判鍔挽詞坦坦曾無我休休蚤見幾虛舟寧忤物抱甕自忘機老去心逾壯歸來事巳非賞延推不及有子尚家肥花縣弦歌化蓮城水竹居舊寮情意厚近别音信疏不作三刀夢空垂别駕車新阡何處是東望倍欷歔求參議子紹挽詞纍世朱陳舊宦游多向鄞飛鳧觀政美展驥愈情親久草歸田賦欣迎人幕賓斯人忽千古望斷剡溪濱玉立期淸貴龐眉望壽齡父兄嗟奄忽姑姊亦凋零厚德今誰在佳城慘欲扃孫曾聞競爽蘭玉在階庭朱坡史居士挽詞巖邑富人物才惟史氏多流傳有丹桂遺逸嘆朱坡學飽終難售詩成秖自哦空餘著書在令子挹餘波交友俱名士儀曹禮意周使華臨夏口詩興共南樓喜得江山助還同汗漫游更煩賢宅相相與發潛幽戴縣丞機挽詞小戴久仙去何堪更哭君舊遊驚昨夢陳迹愴遺文晚暮期相與死生俄遽分銘成愧贊德揮淚望新墳高士終為簿豈惟勾小稽鸞凰雖在棘桃李自成蹊官府資關決儒流仰品題定知餘慶遠遺愛滿雙溪方興化叔圭挽詞廟乏著靴鬼夢中言更明起家尤感勵為吏極廉平薦口聲名重朝行去就輕奏篇真確論何日遂施行鴈塔深論契鵷班試著行參亡聞易簀越弔後除喪支郡難留鄧佳城久夢方吁嗟德浮位回施與諸郎戴迪功應龍挽詞猶記天街會同為乳竇游姻家頻會聚親意愈綢繆吉德宜多壽奇疴竟不瘳無由見安道泛雪悵回舟好學數仍奇躬行家遂肥時將詩自樂晚悟世俱非教子惟黃卷高門看緑衣阿連悲未泯無淚為君揮王通判琰挽詞世篤青箱學驊騮更著鞭半山分近派巖壑誦新篇竹馬迎雙舄棠陰憶二天黃扉伸讜論風節尚翹然才具盍時用拂衣俄去之善藏經世手回施稱家兒嬴博延陵恨人琴子敬悲連年事如許天道杳難知姜鍾離柄挽詞門戶期興起交朋務琢磨反身求大學決意取儒科贊府聲尤著鄰封惠亦多傷心濠上路無復聽弦歌别去期三載伻來痛一書死生誠大矣力量果何如平日真知我遺言苦問豫作銘雖不愧回首倍欷歔顧養直義剛挽詞萬頃東湖下曾門起大家子孫昌世業文字作生涯堂後萱猶樹庭中桂欲華惜哉時不待誰忍送悲笳舊向君家去宜齊屢舉觴人常誦諸顧里不見他楊身世驚春暮湖山愴夕陽園林未成趣鷗鷺亦凄凉李度支嘉言挽詞忽作堂堂去門前雀巳羅夢隨彈指斷事向蓋棺多心繫六州鐵身傾千丈坡喑喑晝夜哭奈此敬姜何孰匪同升素君于我最親詞章傳自舊翰墨恍猶新别去情逾篤歸來迹遽陳無從效經紀悲結淚沾巾何司業伯謹挽詞頃歲遊孤嶼名門說二何胡為終璧水自合上鑾坡器重連城價心澄古井波傳家衣鉢在袞袞並儒科骯髒陽司業作州如理家源流知有自悃愊信無華方喜亨途遠俄驚暮景斜傷心傾蓋舊何處望東嘉王遂安時叙挽詞淮水古王氏生平熟義方三珠欣競秀兩桂早聯芳才大用何嗇源深流自長靑氈傳令子一箭取雙鶬問學自冰翁詞章聳巨公不慙循吏傳真有古人風捫蝨書猶在飛鳧迹遽空人琴悲子敬三讀愴深衷周左司頡挽詞從政心無愧敢言人所難精忠憂世切淸節照人寒交臂失持槖乞身終考槃老成今巳矣西望淚汍瀾乙丑慈恩㑹今幾六十霜軺車來握節相府記傳觴詩藪懷高隱郵筒見短章不堪千里隔丹旐想飛揚蘇江陰十能挽詞萬卷蟠胸次千篇秀筆端朝行期奮迅賢路竟艱難雖號循良守缺為文字官遺編幸無恙留與後人看伊昔初傾蓋摛文巳甚工親聞南澗語謂有魏公風既往言多驗歸來道更窮誨言非教佞後裔報宜豐魯少卿訔挽詞棣蕚儀鴛綴翛然兩鬢斑時淸嗟歲晚遊倦得身閒人在羲皇上經傳伯仲間桂枝芳未巳何止倍燕山年間六十十人登科者前輩風流泯靈光獨巋然指囷推甲族跪履記丁年有子傷埋璧惟翁亦蛻蟬功名雖巳矣千載尚遺編陸郎中沅挽詞壯歲聯雙捷衰年困百罹肉身心佛子霜髮貌嬰兒萬事幾樽酒百年千首詩浮生成夢覺吾道竟何之從弟忝東牀相從二十霜人琴一何苦冰玉兩俱傷别久成今昔歸來失老蒼稽陰終反葬西望倍凄凉梁仲蒼挽詞延賞高三讓殊科擅一鳴元賓文未極長吉記先成妙語遺膏馥玄談悟死生行人痛埋璧父子若為情人物如君少相期上石渠博文該四部篤學富三餘淚盡知無及交深未覺疏何時酹墳草細讀茂陵書王檢正回挽詞二首到處稱循吏星軺復郡侯威名致降虜恩信感亡牛省闥主公議祠庭尋舊遊善人天不憗愁絶峴湖秋客授䝉傾蓋朝參喜綴班開藩才一水去國遂千山晚遇名方重言歸鬢未斑功名付諸子含笑謝塵寰彭宣義復之父汝知子挽詞種德不在大至誠天所親但能存一念何用活千人經笥儒風遠香山句法新功名付兒輩不必在吾身籍甚淸湘守修名所在聞宦途資畏友家訓仰嚴君歸路飛丹旐長空慘白雲生芻不成奠揮涕想江濆朱婺州安國挽詞治行古循吏風稜真諫官鋤姦淸遠徼持重息羣歡久弄趙堯印重彈貢禹冠去天才尺五惜不見長安莫銅陵堂挽詞經學高餘子躬行慕古人儒風三葉秀和氣一門春台嶺漸摩久銅官撫字均庠東亡二老凝望淚沾巾張泰州禮本挽詞燕趙多奇士如公名不虛胸中九域志筆底百家書報國心尤壯籌邊智有餘功名竟齎恨西望倍欷歔徐季節挽詞公府推徐稚山陽薦仲車盛時遺此老沒世竟窮廬行道嗟無命傳家幸有書魯山終不識撫卷倍欷歔周德遠挽詞家世傳儒業鄉邦聳義風將迎無倦色交友盡名公太學飛聲早浮生轉首空怡如堂下月猶照紫荆叢之兄汝能余承彥挽詞戶外諸生屨門前長者車柳袍空自染瓶粟竟無儲隱行刑宗黨淸風照里閭沈冥誰為表賴有子雲書李堯卿唐佐挽詞里社久相從知君陰有功救人多藥喜持論恥雷同素業諸郎在浮生一夢空凄凉宋淸傳健筆愧河東方運使有開挽詞聖主一見決孤忠自致身籌邊滿軀膽處事掇皮真氣直老彌壯言高用未伸留屯十二事公論付淮民王觀國覲挽詞晚識三株樹方知獨笑翁舊遊虧半面遺恨想高風小楷墨猶濕殘膏澤未窮梅花縞寒夜埋璧衆香中沈朝奉之之父雲章宜挽詞相業富靑箱丁年稔義方生兒有如此與世遂相忘終老三牲養凌晨一炷香浮休了無恨流慶尚深長孫子才挽詞身後名何用人亡意愈深蓋棺悲昨夢掛劍答初心潛德仍能發遺言尚可尋悼元情更切接隴柏森森仁懷潘安接隴柏森森以欑植元謂道元楊戴侯之子也舊賦既興慕于戴侯亦悼元而哀嗣墳纍纍以梁運使挽詞風月詩千首烟霞宅一區三年著朝蹟一節僨亨途南海瞻遺堞西門破老巫才高不盡用無地寄長吁翁府君挽詞骯髒翁夫子高才噤不施牀頭癡叔易夢裏阿連詩德喪嗟何及天胡不憗遺淸風終未泯吹折謝庭芝徐府君挽詞孺子人如玉功名不在身死生齊物外孝友篤天倫巳有傳家子曾充觀國賓他年芳五桂傷不見靈椿魏監丞叔玠挽詞元老餘風烈優游挹美官朝行喜銀艾鄰好許金蘭醫謾肱三折生惟指一彈難兄秋夜感風雨舊盟寒族兄道州挽詞出守舂陵遠相思瀟水深精神雖滿腹撫字亦勞心人去成千古書來失萬金懷哉季公諾巳矣漢碑陰周太博汝能挽詞雨漲雙溪水風高五柳堂論交成莫逆撫事秖堪傷訪雪無回櫂面山空夕陽亂鶯穿緑樹誰復為傳觴寧海駱君季友挽詞古易人皆學惟君志益堅研朱滴秋露讀簡斷韋編空谷甘無用佳兒尚有傳清風誰得似竹滿臥牀前臧溫叟春卿挽詞白首行逾恭鄉評敬此翁心開上池水氣襲舞雩風禮貌諸公厚聲華一瞬空臧孫知有後三世著陰功陸宣城梓挽詞奕世承家學諸公薦吏能政傳花縣美心與練江澄易簀去何速攀轅悲不勝傷哉嬴博葬淚盡老延陵寧海劉君之父次臯挽詞不識紫芝眉空傳有道碑義方真可法暗室肯容欺未覺山川攺深明晝夜知薤歌慙不稱冢子素能詩宋南雄價挽詞二宋久云遠遺風君庶幾才華試文戰政譽藹王畿梅嶺方騰最雪溪俄賦歸情親今巳矣老淚不勝揮莫子執圭挽詞樂有父兄賢談經絳帳前桂林孤素志芹泮老遺編小阮情何切童烏業未傳橰閒最崇篤口口話齊年繆伯恭挽詞我實由汪出垂髫托外門非惟拜先德猶及見新婚謹厚推鄉曲恩慈篤弟昆善人今巳矣餘慶在兒孫吳通判挽詞一死交情見鄉評重此翁素車奔夕夢繡被落天風身任朋僚責心忘尺寸功毋書卓行傳非介亦非通趙縣丞彥棠挽詞玉立佳公子哦松始戍瓜拳拳飭邊瑣寸寸畫江沙慷慨志憂國清修僧在家送行詩尚濕身世遽空華石通直度之父莊問純挽詞籍甚新昌族真成萬石家源流端有自悃愊更無華奉職冰同潔持身璧不瑕慶門傳未艾蘭玉茁新芽胡監嶽祗叙挽詞賦就八叉手文高三折肱青衫雙鬢雪黃卷短檠燈夢斷采芹水神凄下馬陵諸郎追五桂洗眼看飛騰趙司戶琇夫挽詞奕奕佳公子詞場早策勳願為新進士終屈病參軍舊事成淸夢高標想斷雲傷心桑落酒無復到孤墳端明殿學士王公希呂挽詞片言寤主上亨途幾向專城佩左魚羊陸遐衝雖坐折高文宿憤竟誰攄平時屢草千言奏垂絶猶騰八難書漢殿履聲今巳矣兩州遺老倍欷歔短檠鐵硯用功深萬卷蟠胸不輟吟故國遁身來濟岱壯年發藻向儒林愛民利物平生事憂國忘家一片心史館頃年陪潤色挽公無路涕盈襟陳文恭公康伯挽詞唐虞千載道重光奕奕元臣任贊襄謝傅風流冠江左晉公威譽比汾陽折衝曾不勞聲色輔政惟先振紀綱天意高高誰可問坐令邦國歎云亡德量汪汪萬頃陂直將去就佩安危干戈雖在相尋日休沐宛如無事時奏罷未聞宫漏轉歸來俄見哲人萎哀榮終始誰能及百世旌忠頌德碑王修撰挽詞十載頻褰剌史帷名卿風裁映紳綏慶門共仰聯三鳳禁路咸嗟缺一䕫神武衣冠終遂志平泉花木總成詩傷心積翠樓前月斜入欄杆欲向誰賤子何能值一錢夫君于我獨知憐樽罍談笑幾侵夜琴劒周旋不記年此去空懸徐孺榻重來無復孝廉船百身願贖嗟何及哀涕霑襟如迸泉何內翰溥挽詞豪奪錦標天下聞慨然有志整乾坤諫坡論事言皆合帝幄談經道益尊千古高文在鼇禁一時名士上龍門經綸未究身先死痛惜誰能作九原潘大卿挽詞直上靑雲不作難壯年何事掛衣冠功名巳矣乖時望風節翹然見歲寒鴻去冥冥矰不到蝶飛栩栩夢驚殘傷心耆老今無有留得遺編向後看張運使孝仲挽詞惠周劔外與淮南歸臥空山且避讒宴坐幾年期不死臨時一著信非凡不應杜乂束高閣真使謝鯤居石巖欲向西陵尋宿草秋風何日送歸帆魏郎中熊夢挽詞相公鐘鼎蔽詩聲鯉也聞詩蚤得名高隱碧溪心更遠今遊湘浦句尤淸握蘭未足酬吾志攬轡寧知老此行今日哭君誰最切山房門下老門生姜祕監師仲挽詞文筆無勞巧翦裁一時妙斫冠蘭臺王楊仕宦曾相接游夏淵源有自來治獄心知有陰德立朝人歎有餘才功名回施與孫子公亦何為不豫哉久聞政績最淮淝鄮嶺循良親見之梓里尚遺前日愛棠陰還長舊年枝釣璜方兆非熊卜曳杖俄興梁木悲千里佳城空望斷他時歸哭峴山碑李公執挽詞乃翁志欲臥煙霞宅枕淸江欲泛槎心地共知容渤澥夢魂曾不到京華伯魚久矣聞賢訓魏子端能起外家彌望三江梁下水隴西德澤信無涯未甘辛苦去朝天故作逍遙陸地仙老子平生萬事足人間五福一身全厭看日月同奔驥擺脫塵凡等蛻蟬重到江頭人不見曉風吹淚忽潸然莫將仕隨挽詞自歎淸才久陸沈晚從內典用工深諦觀炯炯死生際寧復紛紛利祿心載酒今誰問奇字遺經古亦勝黃金十年契闊遽如許老淚臨風自不禁處士寧知卻應星忍向伯高將束帛誰從小戴授遺經佳城得卜真前定忍看一翁衰淚零伍主簿景善挽詞好賢元不減緇衣客到公家如所歸二浙聲名三鶚薦四山風物一翬飛桑榆冉冉身先蛻蘭玉森森家正肥人有百身寧可贖發棠誰復濟齊饑由來風誼獨穹然坐享家肥不計年墮幘何妨分百萬指囷寧復問三千靈椿老矣仁宜壽玉樹種成身巳仙袞袞公侯殊未巳正應含笑入重泉晚年朋舊益凋零歎絶斯人奠兩楹不忍銜悲讀佳傳可堪回首念平生交情君獨全終始人物誰能繼老成淸些楚魂招不得朔風凄切淚縱橫安恭皇后挽詞天作周文合褘揄禮可觀屢陪金輦幸幾奉玉巵歡吳女簪新奈梁房掩舊蘭春深蠶事起誰復上桑壇鬱鬱南山路傷心鳳翣紅哀歌凄薤露祕殿掩椒風故劍恩雖厚中璫事巳空但餘彤史筆內傳紀陰功又代人作玉勝標祥兆褘衣配至尊柔儀高馬鄧盛德邁娀嫄鸞掖空陳迹霓軒服厚恩傷心臨七夕素奈巳花繁圖史懷規鑒篇章妙翦裁承歡方祕殿委化巳泉臺幽壤湖濱秀淸笳日暮哀未央當月望不見翟車來齊國夫人曹氏之母趙知宗挽詞痛哭王孫去南來萬里餘解衣催艇子扶杖擁籃輿巳矣空鸞鏡誰歟得鴈書辛勤立門戶地下勿欷歔宗子今曾子夫人古敬姜邛郲承孝養浯水刻恩章湯沐封逾寵芝蘭晚更芳九齡天報遠餘慶尚流光齊安郡夫人金氏碩之室趙左司公挽詞避地供湯餅當筵接縞衣倉皇奉神版巖險遜征騑遇事智尤敏相夫家寖肥考終無可憾蝶夢繞芳菲五子俱英發尤知仲氏賢勤明真世濟廉儉信家傳别乘徑為郡高城欲捍邊版輿俄棄養事業待他年太淑人葉氏之母單侍郎䕫挽詞婦職躬蘋澗芳年誓柏舟壼儀全肅睦梵行極淸修貝葉開空性神箆豁病眸飄然指歸路淨觀日西流為國生賢子三遷備母慈版輿崇色養從橐勉論思戲舞老萊子平反雋不疑孝心天罔極腸斷蓼莪詩太令人趙氏之母王帥柟挽詞令德比鳲鳩芳年誓柏舟承歡猶有戀曠達了無憂方奉平反笑俄成汗漫遊哀榮誰得似同穴樂哉丘姻婭託三槐同朝得往來迎春煩設席舉壽荷擕杯京尹俄遭難都人亦助哀琅琅垂絶語烈婦信高哉從姑太令人挽詞伯祖八賢女惟姑壽且康又聞歌薤露誰復是靈光采藻空南澗生萱愴北堂平生好心地持以遺諸郎太恭人劉氏之母王台州挽詞籍甚成天助薰然藹婦容家肥身愈約福備禮彌恭上壽九開帙湛恩四受封何人紀遺德女壻正乘龍衛氏一兒足他人總不如一麾欣義檄千騎擁潘輿台嶽傷歸旐靑山滿送車佳城流慶遠旁可萬家居太令人軒氏號覺菴居士趙山甫母自挽詞緣斷身先隱年侵鬢未華死生猶曉夢富貴更空花佛祖親提印兒孫競起家無因拜靈几一奠趙州茶舊說蘇無著夫人亦正宗毒蛇橫在路栗棘更無蹤著無菴云栗棘蓬栗棘蓬一口吞卻更無蹤贊臨濟宗旨云一條毒蛇橫在路上覺蕭散超塵界扶持禮紺容覺庵誰嗣法别去德雲峰太孺人蔣氏挽詞之死靡他志天乎不諒人嫠孤蓬在首艱苦棘成薪晚福容千指心空滅六塵平生貞烈意終作坐忘身潤屋惟純儉居然法度循松楸先壟下風月舊湖濱子婦皆知孝孫曾亦可人浦江如可贖真欲百其身孺人陳氏之母周子及挽詞教子推陶母相望百代前詩書經口授名節誦家傳藝苑高鴻筆忠言徹細氈源流知有自何止父兄賢令子齊年好相從識壼儀蕭生結綬日孟母卜鄰時未卜升堂拜俄聞陟屺悲天涯致芻束淚落薤歌辭太淑人管氏挽詞彤史久不作誰能有婦功寧知貴家子乃有昔人風鈿軸恩何渥芝庭澤不窮死生無可憾況巳悟真空陳夫人之母程吏部挽詞作配知名士周旋內則篇宜家兼四德訓子見三遷就養榮方逮歸寧病忽纏慶源流未巳佳兆得牛眠張夫人之母余元老挽詞婦德天然備肥家五十年平生勤內則晚歲識真詮倒廩非徼福翻經亦應緣于門有孫子佳氣藹新阡王夫人外祖母羅尚書挽詞婦德勝賢士嫠居成大家陰功宜有後餘慶尚無涯楊惲出司馬陶潛傳孟嘉文昌紀遺範外氏倍增華恭人强氏之母曾南仲挽詞祠部源流遠來嬪曲阜孫事夫終婦道訓子大吾門頒誥恩光渥升堂笑語溫相期送丹旐馬鬛近周原恭人董氏頴之母劉侍郎挽詞敬饁尊夫子升堂乳阿姑鄉評推至行家慶展新圖半世悲鸞舞高年樂鳯雛蜜章應未艾卿月應階符鹿夫人振之母同年應尉挽詞內外言無間初終志不移白頭供婦職彤管著賢規慶衍珠三樹芳先桂一枝鳳岑歸去路含笑不應悲慶霈疏封日姑慈不忍違人方侈君賜我獨避恩輝孝篤神應勞風高家愈肥新傳快女壻亦復掛冠歸旌表門閭安人陳氏挽詞婦德高千古鄉評徹九重柏舟終自誓石窖啓新封孫子傳淸白閨門慕肅雍死生無憾處了不愧三從族姓朱陳盛夫人事愈明老姑俱上壽難弟各淸名事詹之姊良翰節行輝彤管門閭照赤城室鄰方有託何忍送銘旌盧夫人挽詞名族著岡頭之姊武岡邃幽閨女教修良人驚夢蝶衆子慕桑鳩物化了難問壼儀誰為收于公有佳兆袞袞看公侯百四從妹挽詞姊妹二十四凋零餘二人他鄉忽傳訃老子倍傷神巳歎嫠居久何堪逆境頻佳城千里外西望淚沾巾孝養全終始真成乳阿姑衾裯長夜共甘毳四時須衆子俱傳業諸孫足自娛吾家女兄弟似此亦幾無去歲桐川弟新從姊處歸備言家慶事猶著嫁時衣尚欲尋松社寧堪哭素幃人生真一夢回首事皆非令人王氏史之室表兄陳左挽詞嫁早仍知孝夫賢自不貧事姑如事母憂物勝憂身鳳誥恩榮渥鳩桑德意均孺哀聲不絶淚柏不成春宦達方資助家肥忽悼亡一區終異室千載尚高岡奉倩神猶慘安仁鬢欲蒼黃昏愁絶處誰伴紫微郎宜人楊氏之室鄭華文挽詞里閈依楊氏年家託鄭門升堂從壯歲擇壻得賢孫婦德儀中壼陰功燕後昆尤憐吾女子流涕說慈尊夢入枌榆社心遊水竹灣丐歸期拜壽近侍望承顔一昨聞微恙寧知竟大還佳城無路到夫婦淚俱潸陳夫人挽詞族姓甲休陽夫人懿範彰奇男巳南省快壻更東牀珍錫人加嘆佳城神所藏平生陰德在餘慶尚難量雅有幽閒操來嬪淸白家相夫全禮敬見子致淸華方享承軒樂俄興陟屺嗟誰將彤史紀大筆為雄誇碩人居氏之室蔡尚書挽詞頃侍尚書坐曾聞閫助賢晤言成勇退裏謁戒私專夢斷松江路神傷薤露篇悼亡千里淚疊嶂想新阡平江葬于王夫人之室周子及挽詞閫內誰無助夫人事特明傾囊資色養勉學就清名遁世期高節辭風歎落英丁寧猶在耳伉儷若為情荆國風流遠幽閨女教循鴿原驚逝水鶴髮倍沾巾厚夜招香魄英詞列翠珉秖愁書字拙貽笑衛夫人王夫人之室陳少南挽詞淑質依名士身期百不憂藁砧家萬里蓬首日三秋陶母傳遺業嵇孤託舊遊幽原誦詩傳無愧柏為舟王夷仲夫人挽詞彤史無人續誰能識壼儀蘋蘩奉先祖詩禮付佳兒未見魚軒樂俄興鸞鏡悲藁砧方得路腸斷悼亡詩盛夫人挽詞婉嫕閨中秀淸高林下風相夫能盡禮教子使移忠邊郡官無曠都城養得終壼儀今具在流慶復何窮恭人胡氏能之室陳奉直千挽詞懿行表閨房情親共衋傷繡衣來宅相彤管著銘章提劉為作銘舉誠之蘋澗誰供祀藁砧空悼亡芝蘭俱秀發所恨失元方長子先喪其宜人聞人氏之室趙婺州挽詞四郡歌賢牧魚軒從隼旟深閨無裏謁色養謹安輿故里稱家法諸郎讀父書美哉彤史筆三誦為欷歔宜人史氏挽詞閥閲冠三朝尊公兩珥貂夫賢能盡禮家貴肯期驕教子門風振澄神性地超悼亡無可憾直筆付孫樵安人鄭氏挽詞勤儉佐家肥猶齊舉案眉錦封俱被寵鸞鑑可勝悲謝砌森羣玉郤林先一枝木華文雋麗銘德粲堂碑事為木詹銘孺人錢氏適曹氏丞相之女挽詞家世㦸如林來嬪藹德音功容俱可度疾疹遽相侵巳矣空蘋澗誰歟助藁砧佳兒隨玉折尤切悼亡心孺人林氏之室盧彥德挽詞家世甘泉舊幽閨有令名賢明教陶侃勤苦佐淵明蘋澗今何處鳩桑空復情誰知悼亡意揮涕望佳城孺人曾氏之室葉寺正挽詞婉嫕應眉壽天胡弗與齡情深孫楚詠淚盡女拏銘蘋藻空南澗芝蘭有謝庭越山埋璧處秋雨濕銘旌信國夫人秦氏之母林子長挽詞夫人富貴出懷綳擇配和鳴得仲卿鸞誥早能封大國魚軒不及伴雙旌肥家得法晚無倦教子登科新有聲歎息南溪未成屋鳳凰山下啓佳城茅夫人之母鄭貴虛挽詞淸心玉映許誰同更有飄飄林下風政爾高情協宗老故宜嘉遁樂龐公遠謀蚤識身為重晚境還知性亦空巳擬張林碑婦德合歸彤史巨編中孺人陳氏挽詞追憶宮端舊典刑三真況復是難兄豈惟門戶生光彩直使朝廷列姓名煙海乘桴誰可奪天風反火報尤明雖云弟娣相從去自有英靈凛若生太碩人潘氏翥之母葉尚書挽詞玉映淸心著壼儀閨房賓敬到齊眉豈惟山水協高趣羅氏亦有高情與少文協趣宗少文每遊山水往輒忘歸妻更為國家生好兒賜張太宗福生得好兒為國家分憂文定齊賢母詔曰婆婆有萬口共推諸福備八旬猶負一年期伯仁冬日應腸斷不見堂前舉酒時攻愧集卷十四
