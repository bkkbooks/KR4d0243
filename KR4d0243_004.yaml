body:
  text: 宋樓鑰撰古體詩趙資政建三層樓中層藏書危樓傑立潭府雄仰望驚瞿何穹窿擎以八柱真良工恍如木天移海東扶欄三級橫復縱八窗交映光玲瓏更上一層迥不同歷覽萬象俱空濛東南太白金峩峯西山千疊青芙蓉環繞不斷如屏風平疇彌望禾芃芃城郭市井聚蟻蜂烟樹髙低知幾叢澄湖一片磨青銅潮來江漲銀在鎔海市三垂屬提封四山寬圍城在中地平樓小望易窮安得髙臥陳元龍麗譙公府難從容二閣均在道佛宮江山得助無遺蹤眼前突兀忽此逢主人幹國成棟隆鼎彞久書柱石功名遂身退兹明農卜築深靜依髙墉百間朗朗羅心胸咄嗟不待鼛鼓鼕最後奇觀凌虛空窗戶未須濕青紅似聞廬陵周益公亦作此樓髙于嵩相望落落見兩翁心匠不謀如影從我欲效顰意方濃一朝登眺若發矇不願侍公飲十鍾不願舞女紛歌僮插架三萬牙籖重此身願為書蠧蟲不然相陪夕陽春與公憑欄送冥鴻再題行看子先引護欄毬子驄九馬近遠俱相從黑駒騧黃騅素騮亦有笏面仍銀騣夏國一種青于藍五明錯靴皆如龍或驂或引恣馳驟坐覺隱耳聲瓏瓏人間安得有此輩一一必自天間中不惟骨相異凡馬圉人貴介多雍容三花翦鬛自官樣空鞍更以香羅幪中間二者蓋天馬齒雖已老氣尚雄不知幾出橫門道雙立柳下青隂濃擡韁捽頷刷背膂旋梳騣尾搖淸風人人生意馬欲動態度曲盡各不同韓生去我幾百年藻色尚濕青與紅不知何時墮雞林萬里遠在東海東賈人攜來得寓目一見絶歎丹青工千金可買真不惜忽復㩦去何匆匆亟令臨寫得形似如此神駿那得逢開元內外馬盈億色别為羣從登封韓生所貌定傑出七尺為騋八尺駥向來鶯邉繫金絨歸乘款段頭已童伏櫪寧能志千里卻笑區區據鞍矍鑠翁寄題吳漢英玩芳亭吳侯奕奕天分髙歷記萬卷無差毫青雲垂上忽歸去年來益收湖海豪志同三閭時則異玩此芳物亭之臯視彼憔悴亦何苦鼻間栩栩忘鬱陶詩文滿軸寄海嶠靈均細論無乃勞與君齊年況同袍秖今衡門沒蓬蒿有芳可玩便自適草間野卉時一遭蘺芷辛夷蘭杜若未暇一一追離騷平異同為言詩文皆以屈送孫子祥赴新昌主簿髙士不為簿子嚴論獨殊不遭何不可而況主簿乎夫君豈其裔南明筮仕初要知官無卑祿可代耕鋤正須勾小稽使民能樂輸矧復兼尉曹鼠竊隨除驅兩職去民近亨途此權輿君誠吾里秀質厚素有餘埋蛇有陰德映雪讀古書起家決儒科鄉評足名譽妻以兄之子相與久相娛小别不足惜未免摻子祛邑境連台剡好山環四隅二子丞鄰封川陸通舟車乘興或一往徑欲造庭除公餘想續文尤當惜居諸㑹看興公賦擲地金聲如送丞上虞我老不復仕行將掛衣冠兩子俱二令官職恰一般剡川且書考上虞亦之官人言易捧檄歸奉重親歡我意正不爾期汝政可觀食焉怠其事古訓戒捨鏝汝職與民親簿書當細看一邑無不問正爾良獨難江海匝三垂長堤捍驚湍埭髙幾如山潮至不留殘宣和有遺迹能使潮浸灘陂湖謹蓄泄可以救旱乾長溝濟漕運浚治令通寬此皆丞所職勿憚心力殫江頭有東山永懷謝家安邑有李與豐況復居二潘尚友更從游問學加研鑽平時固知汝亷謹無欺謾涉世終未深送汝能忘言故鄉去帝鄉舟馭多往還失已固不可待人亦多端罔求違道譽善遣非意干窮達自有時此理真如丹聚散不足較豈得長團欒閒靜我所便汝其自加餐有時或乘興往來二子間踏雨送汝行浮家當游般走筆如家書誰能苦雕剜送伯中弟尉新喻伯父盛德人伯中實暮子不惟能象賢氣貌亦相似幼日讀父書結字得皮髓粹然金玉姿少日期千里寧知游上庠蹉跎困名第晚始著青衫酸寒就一尉歘然報瓜時往戍真樂事自惟羣從希惜别不能已中年重離别況我衰如此親故例作惡況復于吾弟兹行豈得休雅懷聊漫仕勿憚三年留江南富山水尉曹官雖卑去民最密邇一日斯必葺職務毋少弛善保金石軀離觴且同醉歸來畢婚嫁相從期暮齒教子以義方忍貧授經史素業俱有傳見進未見止大兒方決科如摘頷髭耳子尚徐其驅中途聽捷喜送張子宓分教澧陽澧陽渺何許遠在天盡頭頃為郡樓記圖志不可求王侯録故實頗亦費冥搜忠以申明著學有車公優外挹蘭江水下俯仙明洲讀書記羣玉採藥思浮丘況得子厚語謂冠漢南州見謂頗詳盡豐碑照城陬可憐城與樓百姓不知修乃知尚有遺家傳載鄴侯張君將客授蓋嘗敘其由為我謝澧人聊以遮前羞君家世為儒青箱襲箕裘太玄洎潛虛探賾深可鉤君才兼數器博洽誰與儔南廟推第一鵰鶚快九秋得官愈嗜學手抄不能休館殿要人物衆寶登琳璆演綸及視草如君真勝流蘭芷生顔色暫煩為遠遊君方俟瓜時相依意綢繆樽酒接從容詩篇更唱酬論文究今昔析理到孔周老我淡無伴摻袪不容留别乘淡庵子傾蓋當相投公餘文字飲能思故人不送周君可宰㑹稽作邑誠匪易況子之稽山銀茜視兩赤朝家知其難鼎鼎數萬戶賦重民生囏山陵五雲飛辦護力更殫豫買萬世弊法貪至于殘越人瘠已甚當饋幾發歎名臣為竭力減額宜少寬不齊物之情兹事終變翻箕斂及雞豚詭戶多容姦竟未得要領條令何其煩通才善治劇南康遂通班誠心試求之要使後可觀古仕不出鄉習俗皆素嫻東嘉嘗客授尋乃乘朱轓略如仕故鄉非意不得干況昔攝邑久疾苦知民間故吏想猶在疲民知長官宜若差易耳未免送以言權雖與正同事體終兩般趣辦不計久為真事多端遇事勿生風三思庶能安試登寬簡堂取我前碑看六一真格言坐右當銘盤向來難奉母版輿今似潘外盡撫字勞退公悅慈顔蓮峯聲望重待子興門䦨勉哉發政譽行矣聞天關錢淸王千里得王大令保母甎刻為賦長句書家千載稱蘭亭蘭亭真跡藏昭陵只今定本誇第一貞觀臨寫鐫瑶瓊黃閍岡下得寶墨古人燒甎堅于石大令親書保母銘況是當時晋人刻甎雖破裂文多全妙畫遠過蘭亭鐫其間曲水悲夫字駸駸欲度驊騮前我家阿連縛虎手更得退堂方外友王君系出三槐家參坐㑹文真耐久田丁初來獻小硯尋見津津若微溜細看背刻晉獻之永和倣佛在旁右亟訪田家叩所從始知墓崩隨意取大甎支牀得前段掀倒浮屠全尾首字為十行行十二百十有七二字漏交螭方壺不復見貞石摧藏松亦朽我得此碑喜不寐摩挲三歎歎未有興寧甲子十四周更閲三年仍乙丑若非洞曉未來數安知八百餘年後坡翁應未見此志金蟬之銘何絶類又知文章有暗合智謀所見略相似二王遺蹤無所遺誰知地下此段竒三君共為成勝事至寶呈露端有時越山盤屈獻與羲付與耳孫世守之煩君更為護幽竁或恐意如猶有知趙資政招賞川海棠次袁和叔韻少陵千古詩人傑每見名花輒題絶錦棠無如蜀川盛見說千林天染纈大篇短章合無數忍對此花舌如結黃鵠銜子萬里來春光頗向東南泄橰閒老子攜春歸移石鬱林表髙潔崇桃炫晝不足言紅艷燒林疑益烈棠梨小紅自退聽不待騷人定優劣兩登蜀道歸海濵一琴一龜全晚節嘉招容我到花下春酒新篘公自挈攀翻亂插人共醉十二金叉不成列袁安參坐為長哦同氣相求磁石鐵不須髙燭映紅妝佳月自能明作哲紅潮滿頰臥林間風流誰敢來分别泉口淨明院晝寢沙頭古招提往來幾經行兹來當春晝解衣愒西楹玉立青琅玕小窗虛且明紙帳白如雪牀軟枕更平偃仰四體適缺伸困思生須㬰右脅臥徑入華胥城無人夢自覺閴然四無聲林間婆餅焦悠悠時一鳴翻身更從容意泰氣亦淸連朝走丘壟百拜不遑寧老我久倦游幸茲息營營衰相益已迫世念日愈輕自欣天與閒身是半髮僧未能遂高隱庶幾保餘齡賦蔣甥若水番馬圖何處驅來良馬六騮黃參錯如花簇胡為不作騰驤去各有游韁縶前足胡人下馬俱少休背倚氈裘眠正熟酋豪揀箭奚奴撚意欲射麞不遺鏃琵琶橫倚續續彈一夫坐聽胡中曲臥擁提壺將引飲英氣虬鬚皆貴族沙磧坡陀髙復低天寒不見寸草緑我行燕冀頗見之狼帽烏靴乃其俗勿云恃勇不知義要以赤心置其腹嗚呼安得壯士健馬咸作使坐令戎虜為臣僕陳表道惠米纜平生所嗜惟湯餅下箸輒空真雋永年來風痺忌觸口厭聞來力勑正整江西誰將米作纜捲送銀絲光可鑑仙禾為餅亞來牟細翦暴乾供健啖如來螺髻一毛拔卷然如蠆都人髮新弦未上尚盤盤獨繭長繅猶軋軋盱江珍品推南豐荷君歸來攜來東知君正直如羔羊貽我素絲踰五總仙禾本出從嘉穀色味俱同無餅毒鼎深熟煮葱豉香大美元來加臠肉有時飯素芼以虀饞口屬饜味更竒束晳一賦不及此為君卻作補亡詩盧甥申之自吳門寄顔樂閒畫箋年來吳門箋色澤勝西蜀春膏最宜書葉葉瑩栗玉賢甥更好奇惠我小畫幅開緘粲殷紅展玩光溢目巧隨砑光花傅色濕丹緑桃杏春共嫵蘭桂秋始肅趙昌工折枝露華淸可掬妙手真似之藏去不忍觸苟非歐虞輩誰敢當簡牘又聞樂閒君古篆頗絶俗併求數紙書寄我慰幽獨題申之寄示春郊畫軸郊原膴膴春意足細草凄迷芳樹緑雁鶩無數泛陂塘羊牛相與隨芻牧幾年不泛浙西船恍如蘇臺俯平川閒人憂國無他䇿但願好雨成豐年六言問天池寶華昔年曽賦虎丘猶恨靈巖未遊天池之景絶勝寶華有水倒流老矣不復西去夢入陶朱扁舟煩君為我尋訪能以新詩寄不贈成都魯講書叔獻焯字君家江發源我生瀛之壖相望萬里外中間幾山川近聞今子敬文價驚鸞鵷何由夢見之失喜瞻在前幅巾聳英標銜袖出文編倒屣平生歡劇談河漢懸老我三入朝廣識兩蜀賢相與論諸公與君最周旋自言隱青城讀書三十年城中竹溪居肥遁遠市㕓淸溪擁屋後緑樹環前軒一舟號橫雪可泝復可沿拂衣下三峽非為名利牽灔澦追古作海潮賦新篇舊依橰閒公來乘甬東船顧我何所取有懷俱盡言老親苦多病嘗藥冀少痊佳客不容留欲著歸驂鞭間為惡草具願君少流連報無錦繡段贈有朱絲絃一别無復㑹摻袪意茫然蜀山渺何許同聲惟杜鵑趙資政當山堂我公仁存心樂山心如丹平生經行處不厭行路難青城及大面萬疊連百蠻捫參仰脅息亦嘗坐長歎功成歸四明得地數畝慳城隅路窮際小橋水汪灣蕭條漁家市中有屋百間危樓俯人世一看山四環堂深無他景猶以城當山城荒披緑莎青青透橰間秀潤長滿門坐對無躋攀日夕氣亦佳鳥飛相與還終日看不厭徙倚十二欄有如擁泰華管窺見一斑況兹緑陰成連朝雨潺潺濃翠真欲滴秀色幾可餐我家但環堵窮年困彎跧出門得曠遠遙碧羅烟鬟有時碧雲湧半空聳髙顔須㬰輒變滅欲駐良亦艱羡公得佳趣容我游其藩悠然時見之重門勿令關風琴淵明有琴本無絃白傅偏喜聽人彈不如空中風度曲隨風往來聲斷續非宮非商從君聼不中律呂無虧成大如角韻來孤城細似蚓竅蒼蠅聲華亭夜鶴圓吭淸顫動長引寒蟬鳴或疑鳳咮叫霄漢又恐仙佩雲中行使其似曲無别調安得自在聲泠泠蛙喧尚謂勝鼓吹牛鳴猶以黃鍾稱絲不如竹亦漫語賴此七竅俱瓏玲幽人院靜新凉生八風不問來縱橫短簟六尺午睡足拂拂神來傳廣陵送袁恭安赴江州節推袁氏四世凡五公唐朝三相傳家風君家九代擅儒業髙曽藝苑俱稱雄大父謙尊古君子諸父名髙表吾里一門子弟更競爽挹取乙科自君始九江需次今幾年去去渌水依紅蓮忘年論交正相與叱馭欲往難流連老我秋來抱病久臨岐無由置尊酒秖從臥內叙離懷戀戀摻袪仍握手鵬程萬里兹權輿平時義方師有餘送人以言古所重雖誦所聞寧起豫君看公孝與孟博太守坐嘯仍畫諾一郡之政賴關决千里應須念民瘼鄉州義事煩主盟纖悉于余無隱情處事條理亦為政知君出仕當有聲尊公亦入閩中幕公退著書端不惡君才更得江山助簡書既省尋家學君行逺業未可量弟兄丹桂終齊芳老悖無庸況多病尚能留眼看翺翔趙南仲寄王朴畫貓犬戲為之賦䰐鬖兩狻猊胡為到庭戶細觀畫手妙摹寫真態度意足謝繁筆不待丹青汙亂掃腹背毛頭足巧分布尨也如愁胡眉攢眼光注豈惟足生氂垂耳紛敗絮掉尾固自若狸奴為驚懼側耳實畏之衝目猶敢怒誠知取形似不吠亦不捕對之輒一笑聊用慰沈痼朱季公寄詩有懷真率之集次韻伊昔羊尹臨丹陽真率之名初濫觴香山尚齒當㑹昌臥雲不羡坐巖廊七人各列官與鄉年德俱髙世所臧丙午同甲遙相望淸談生風想琅琅耆英人物尤軒昂賦詩遠追白侍郎文富歸休夀而康衣冠十二何鏘鏘吾鄉五老如雁行至今月旦尚推揚家舅仕宦接王楊眉夀遂及渭水姜我如傷禽趁鸞凰忽驚騎箕歸銀潢向來雅約猶寶藏菜羮草具烹彘肪四皓中間有夏黃藹藹義風誇句章年來抱疴久在牀同社闊别如河梁君嘗遠宦踰沅湘又向封川憩甘棠瘴雨蠻烟暗桄榔何時歸安朝士坊忽傳新詩几生光斂袵正色而寒芒詩境幾成破天荒徐為續貂未須忙靜揣歸期應未央歸縱未衰亦老蒼暮年甘與子同裳何事相望天一方吳少由惠詩百篇久未及謝又以委貺勉次來韻江左一世稱名公首出劉惔與王濛自髙直以天自況何止數仞言髙墉虛聲一傳實何在但知景附而風從我朝諸公門戶闊普納萬象如虛空羣才俱入大爐鞴鑄人端如金在鎔又如東君一布令白者自白紅自紅巖巖千載玉局老少年徑以吾道東首干樂全次六一二公自是燕許宗奏篇六論初流傳四海一日俱承風其間傑出六君子香薰班馬猶為濃涪翁又分江西派作圖序次由本中哦詩作文各務實薦鶚不愧北海融坐令文物掩前代主盟豈非諸老功固知文氣僵湜籍亦許詩律沾徐洪宛丘諸黃接前輩宜有此甥風味同蚤嘗決勝翰墨場筆端豪健誰爭工新篇句句多灑落妙畫字字真玲瓏惜哉生晚百餘載歐蘇之門久登龍尚兹踸踔未闊步吞舟之魚溝豈容我方投老與世隔映窗愛景方曈曨十年屏居可羅雀何人來顧一秃翁儼然衣冠見吾子文書銜袖名自通向來兩卷餘百篇諷詠至今未能窮更攜大篇如拱璧刻劃無鹽賁孤蹤人言霜蹄騁夷路我今秋隼凌三峯愛余過厚擬前良此事如何著得儂老我不入𣏌梓林嶧陽髙隱如孤桐平生習氣掃欲盡只有愧處著力攻子歸求之有餘師惟知歎息錦繡胸時時杖屨許來往庶可嵗寒相始終龍潭丈室一筍穿入露滿其上因賦之一筍入屋照座寒凌晨仍有清露漙益信露珠自根起正如真水朝泥丸厦屋不應為汝穿不肯屈節斜倚欄干霄拂雲已在望且復自保青琅玕旱久無水王伯容分惠桃源大溪泉將以長篇水至已雨走筆次韻七十老翁門晝閉終日蕭然無一事卻因不雨動衰懷擁笏黃堂與祠祀兼旬旱涸舟不通井泉欲竭知無計僮奴抱甕扣比鄰水不得淸僅無滓舊時見說橫溪源有水側出萬竹前考之爾雅名汍泉頗思走介分微涓去之一驛不易到午暑坐想空垂涎不知何人剝啄扣我門惠以小罌童稚驚相傳啓封一勺挹淸泚烹試茗碗真增妍況當精禱已孚應三日簷溜傾潺湲病中一笑誠莞爾城闉安有泉如此吳松四橋思陸羽白帝城西歌子美何用中􅍽取揚子已覺清甘冰入齒前人所品殊不定一下一髙隨所喜老我住世能幾年引飲一瓢幾子淵行見甫田取十千坐使遠近俱安然欲和大篇不覺沈吟久擊鉢成章慙敏手送潚宰富陽富春富山水地勝雄三吳壯哉十萬戶畿邑拱行都大江橫吾前上下萬賈趨吾子丞剡川攝事姦已鉏試縣力愈難勉旃立規橅治縣古有譜近頗多著書橰閒愛汝厚誨語皆良圖老我不惜别所望安官居汝亦頗練事正恐才尚疏我以熱肺腸有求應所須遇事費十思一跌真不虞雖當從心年兢兢矩不踰況汝年方壯勿恃才有餘據輪始窺井任誕寧失拘三年待汝歸二親真倚閭又送從子漼二孫吾所愛别去殊關情阿剡將賞延伴子性亦靈煩子善誘之他日使有成公餘松竹林共勉雒誦聲寄題林宗山巢龜彼澤之陂蒲與荷有美一人傷如何潔淸如許豈不好紉蘭綴蘺何足多七十二鑽無遺䇿不靈于已徒遭厄人生何用千歲為願似巢蓮足淸白送趙仲禮守天台橰閒社稷臣卷藏經濟手功名付諸郎秀出諸公右大兒倅東嘉洗印去未久次子鎮赤城急流去何驟二者皆為親欲奉喬松壽況有戲綵堂可繼淸獻後鄰封尤便養榮侍各晝繡春風扇微和安輿雲出岫家傳吏師法從政于何有還歸鴛鷺行金印當繫肘向來嘗佐郡山川若僚友南渡多北客風味中都舊士夫喜公來紛然迎馬首其中多故知頗問老夫否贈相手文李道人生有文在手縱橫殆天豫其間動成字往往傳自古舜褎梁武武老十子貢五季友太叔虞仲子竟歸魯仲弓有鈎文宰我亦握戶敏士自文雅習道本因輔鄧淵彭城符瑣瑣不足數李郃陶士行三公皆定數白帝矜竒瑞見誚漢世祖何為言禍福歷歷如君語自言傳希夷妙處勝貌取見手知國封況此細紋縷研油燎栴檀始見掌中虜何如一覽頃坐談樂與苦老我縮袖間不復煩推步子其訪城中英傑在何許跋余子壽所藏山谷書范孟博傳山谷晚在宣州或求作字山谷問欲何書則曰惟先生之意山谷許以書范孟博傳或謂南方無復書山谷曰平時好讀此傳遂默誦而書之舊聞此說又知在上饒大夫家願見不可余子夀來入制幕博記善屬文偶談及此又出摹本及尊公跋語始知其為先世舊物也為賦長句宜人初未宜于人菜肚老人竟不振承天院記顧何罪一斥致死南海濵賢哉别駕眷遷客不恤罪罟深相親攘攘不容處城闉夜遣二子從夫君一日攜紙丐竒畫引筆行墨生烟雲南方無書可尋閲默寫此傳終全文補亡三篋比安世偶熟此卷非張巡巖巖汝南范孟博淸裁千載無比倫坡翁侍母曽啓問百謫九死氣自伸别駕去官公亦已身雖既衰筆有神我聞此書久欲見摹本尚爾況其真輟公淸俸登堅珉可立懦夫羞佞臣葉處士寫照頃在朝行葉處士光遠為余寫照置于山林中欣然自贊有云山林如許盍歸去蓋志于歸也一歸十三年既掛冠再寄一圖為老人星狀形容變盡非復故吾矣戲作長句謝之老我舊曽官日邉隨衆年除仍嵗遷母子日夜念鄉國但欲共耕綿上田葉君寫照妙一世畫我形模在山水有如虎頭貌幼輿正合置之巖石裏猶記有客為諛言盍更野服為貂蟬我笑不答心不然拂衣徑得歸林泉歸來嵗月不知久十餘年中何不有此心炯炯尚如丹只為幽憂成老醜久矣與世俱相忘荷君念我應老蒼新圖白髭添一二豈知雙鬢皆成霜兩圖對掛耿相照顧盼從容成一笑更添松竹作壽星我已甘心就枯槁人言姿態與真同如照止水窺青銅明知己非故吾矣小孫指㸃能呼翁君居天街號稱首侯王生面羅左右邊頭飛將新立功颯爽英氣照窗牖名滿四方求者多千金造門君不呵能事固不受促迫應酬雖繁可奈何胡為有暇及衰朽楚楚裝潢意尤厚我今已是行路人不須重纍丹青手送宣宗禹保寧軍掌書記宣之為姓世所稀暇日試為君家推宋之宣公舍與夷子孫相承此為基或云出自魯宣伯元和姓纂言則非西京功臣虎與義侯封纍世皆宗枝盛哉雲陽宣巨公光武稱其勝二龔酆為司空懷在趙遙遙久矣無亢宗君家本自太末來世以儒術為家風尚及瞻識諸父行君方髫齓成孤童艱難歷遍屹中立五行俱下攻時習自從一登賢士庭貴名日起人誰及舍選真似青銅錢一躍龍門浪三級吾鄉驚喜破天荒歸見朋儔愈謙抑寶婺古郡名浙東往泛緑水依芙蓉如君入幕假途爾及今民事宜加工亨途萬里才發軔摻袪勿使金樽空從今家聲當愈大坐使宣氏崔盧同攻愧集卷四
