body:
  text: 宋樓鑰撰題跋跋揚州伯父所藏魏元理畫卷蓮荷爾雅釋草言荷最詳其莖茄其葉蕸其本蔤其華菡萏其實蓮其根藕其中的的中薏觀魏君墨戲曲盡形狀殆無餘藴又有熟芡生菱鳧茈之屬一一如生袢暑尤宜觀之所謂宛然坐我水仙府也桂花伯父揚州持節擁麾幾遍東南襟度髙勝所至多與雅士遊若魏君元理之畫徐公明叔之書皆擅名一時者桂花才一枝諦觀佳處疑有秋風生其間跋龍眠二馬余家藏白氏長慶集久矣近又得吳門大字者周伯範模欲得舊本以所藏龍眠二馬遺余古有以妾換馬者矣以書換馬自攻愧始可博一笑跋趙共甫古易補音小學之廢久矣陸氏經典釋文可謂詳盡近世讀書或至苟簡率意誦習字有不識者始加閲視有訛謬終身不自覺知而况補音乎吳氏好古博洽始作詩補音雖不能變儒生之習而讀之者始知詩無不韻韻無不叶祛所未悟有功于古詩多矣吾友趙共甫又取其説以補古易之音用志甚勤逺以示余閲之不去手鑰老矣習氣未除頗為是正一二目昏成懶愧不能盡力也噫凡將爰歷等書今不復見惟許叔重説文解字為小學之本顏黃門家訓稱其檢以六文貫以部分櫽括有條例剖析窮根源集韻雖博贍于考古則未可全據共甫今本諸吳氏多以集韻為證更當以説文解字定之可傳無窮吳氏之書不知者以為苟然而已共甫祖其餘論鑰又喋喋及此皆謂之癖可也雖然自當有好之者題拳毛騧杜少陵觀曹將軍畫馬圖詩云國初已來畫鞍馬神妙獨數江都王又云昔日太宗拳毛騧近時郭家師子花名畫記江都王緒乃霍王元軌之子多藝善書畫鞍馬擅名陳后山亦謂一紙千金不當價人傳此馬為江都筆誠有之長安志太宗昭陵有六駿在陵後曰拳毛騧金石録昭陵琢石象平生征伐所乘六馬為贊刻之此馬神駿耐戰是橫行萬里堪託死生者史稱秦王自起兵以來前後數十戰身先士卒輕騎深入雖屢危殆而未嘗為矢刃所傷今觀帝手書親乘之馬槊箭之瘡十有二處而不及其身真大人哉考之史其平黑闥也洺水大陳信然榖州乃河南府之新安福昌二邑武德元年改榖州至顯慶二年始廢此言合鬬蓋征世充時黑闥乃在山東也跋趙振文經幢碑趙振文為臨安郡從事寄示小碑得于井中蓋錢氏專知回圖酒務曹從暉所立經幢也從書會同十年嵗在丁未七月十五日試考之石晉嵗在丙申改元天福三年戊戌契丹耶律德光改元會同至天福九年晉改元開運至開運四年嵗實丁未契丹入汴滅晉六月劉知逺建國曰漢仍用天福十二年正契丹會同十年是丁未一年實晉之開運而漢仍稱天福契丹則日會同也明年戊申漢始改乾祐錢氏兼有兩浙自唐乾寧二年至皇朝太平興國三年凡八十五年當五代時貢奉中國不絶惟唐明宗時安重誨奏削鏐王爵元帥尚父以太師致仕時嘗稱寶正年號安重誨死復鏐官爵復用中國正朔今乃用契丹年號耶律滅晉時大赦改晉國為大遼國開運四年為會同十年意必亦頒正朔于諸國故錢氏用之此史氏所未見也錢弘佐以是年卒而俶立史不書月舊五代史弘佐以漢初卒于位而倧立漢祖入汴之嵗十二月倧為胡進思所廢此蓋弘佐已卒當倧之時也因併著之跋王伯長定武修禊序定武本凡湍流帶右天五字全者皆謂在薛紹彭之前然不能知嵗月之久近此誠善本王順伯謂是熙寧前摹拓于中山者為可貴近見畢少董所藏董氏淳化間本尤為精好自言為兒時親在定武見青石本帶右天三字已闕壞大觀再見之與舊所見無異則五字未必皆紹彭劖損也更當考紹彭在中山時嵗月云跋余襄公題崖碑襄公以孤生起嶠南忠言劘上顯于慶歷嘗出居庸關口伐戎酋于九十九泉退其二十萬之師西邊亦賴以定晚而經制五管前後十年如交趾大理特磨南詔之國皆可以頤指氣使使坐廟堂真可以鎮撫四夷乃終于南方人之功業不惟有時亦各自有地如伏波之在南孔明之在蜀蓋非一人不然昭陵非棄才之主而公之用不得盡為可歎也此帖字有顔體石崖天齊人物亦俱與之相髙云跋李莊簡公與其壻曹純老帖韓文公潮州表柳河東囚山劉賓客謫九年文愈竒而氣愈下盛哉本朝諸公如忠宣之德度元城之徑節東坡先生英特之氣行乎患難髙掩前人莊簡公流竄瀕死重以愛子之戚尤所難堪家書中言議振發略不少貶其氣何如哉三誦以還慕仰不已純老姓曹氏諱粹中吾鄉之善士有詩傳行于世真冰玉也跋金花帖子綾本小録盛京王扶集賢王公金花帖子其孫鄜州謂端拱二年太宗朝第三榜者誤也當以益公所考為正尚書宋公名白時以翰林學士禮部侍郎知貢舉其同知貢舉則知制誥李公沆帖子花押蓋二公也咸平元年知舉四人楊給事礪李舍人若拙梁司諫灝朱祕丞台符盛公帖子花押乃此四人也太宗以至道三年上賓咸平改元真宗諒暗遂不廷試而敕下禮部放榜登科記亦稱省試故猶得以帖子報中選者非以不臨軒策試而廢兹制也知舉止列祖父不及三代糊名復于淳化三年至是已七年矣藝祖一朝進士凡十五舉多者不過三十餘人太宗朝取士寖廣至二百餘人獨孫何一榜放三百五十五人諸科合千餘人後世但駭其多而不知前兩年詔權停貢舉至是集闕下者萬人太宗既多取之而後連四年俱有權停之詔次五年為至道三年三月以大喪不暇及至咸平之初詔以久停貢舉頗滯時才令禮部據合格人內進士放五十人諸科百五十人來嵗不得為例于是進士孫僅等及高麗所貢並賜及第此小録所載五十一人是也祖宗時貢舉之疏數取士之多寡惟上所命非若近世之定制也鑰髙曽先祖仍三世登科中遭兵燬故書無一存者先祖少師元豐末年焦蹈榜丙科後從年家章氏傳當時小録雖印為大編而與今制不侔者已十餘條又嘗見嘉祐二年章衡榜東坡兄弟小録與焦榜者不殊今始見王盛二家金花帖子及綾本小録前此真未聞也諸公跋語如載知舉家諱私忌等外若韻腳明主空一字脫落字句案此下有詩限六十字以上成論限五百字以上成皆與今小異今止書第一人此直書狀元外氏書其母之封五十人貫開封者三十七人不應如此之多按端拱二年有旨國子監生並須品官子弟開封府有户貫者充豈以此故士子多用開封貫耶貫建州者二人一日建寧軍一日建州書事不同如此者非一祖父俱存者今曰重慶而第四人張景書榮侍下父祖未仕者書不仕三代名下書皇任者柳河東作陳京行狀云五代祖某陳宜都王曾祖某皇會稽司馬祖某皇晉陵郡司功參軍父某皇右補闕云云或謂書皇者以表其仕于唐也此又不然多有稱皇不仕者又或止書見任某官每一頂各空一字皆與今不同此榜止五十人可以綾書不知前此孫何一榜三百餘人亦可以綾書耶小録之作近亦屢有輕以意改者要知典故所在前人多有深意一遵其舊可耳吁又何止此耶司諫祕丞各稱其官楊公為翰林學士而止稱給事李公知制誥而稱舍人亦因可見前朝之官稱云楊公開國之初為第一人李公為乾德四年進士第五人梁公與其子固俱為大魁朱公則孫何榜第二人主文極天下選宜乎得人之盛僅繼兄何固為盛事劉燁子嶽父溫􅙕是終身不聽樂者中山劉子儀參政李子淵皆在此榜髙輔國曾祖季興祖從誨俱為南平王蓋荆南髙氏輔國之父保寅不知在從誨十五子中為第幾人與繼沖俱歸本朝者也吕蒙休三代俱贈師傅父龜圖母劉氏徐國太夫人文穆公蒙正之弟也王克從為彥超中令之孫句希吉為中正之子盛京為文肅公度之弟樂黃庭父史任職方員外郎是作太平寰宇記者其任職方宜矣李山房謂知名之士幾三之一後生寡陋不能盡知姑誦所聞一時人物不亦盛哉借摹本於豐宅之有俊老眼不能細書令從子溉臨寫藏于家仍備書其後而歸之跋雲丘草堂慧舉詩集余頃嵗遊雲巖有詩牌挂壁上拂塵讀之云朝見雲從巖上飛暮見雲歸巖下宿朝朝暮暮雲來去屋老僧移幾翻覆夕陽流水空亂山巖前芳草年年緑愛其清甚視其名則僧舉也曰非季若乎僧曰此今之廬山老慧舉也後得其詩編號雲丘草堂集及與吕東萊紫微公雪溪王性之後湖蘇養直徐師川朱希真諸公遊最後尤為范石湖所知盡和其大峨諸詩余赴東嘉亦辱詩為贈近世詩僧如具圓復瑩溫叟輩淪落既盡而師亦亡矣其徒覺淨求跋其後感念疇昔因為書之師老于禪悅詩句特其餘事而能兼得衆體佳處不可以一二數讀之者可想見其人不勞贊歎也跋蘇氏回文錦詩圖晉史載竇滔苻堅時為秦州刺史被徙流沙蘇氏思之織錦為回文旋圖以贈滔宛轉循環以讀之武氏及見晉史之成不知何所據依記載如此之詳滔字連波記之末云因述若蘭之多才復美連波之悔過故山谷題此圖云千詩織就回文錦如此陽臺暮雨何亦有英靈蘇蕙手只無悔過竇連波正用武氏之記而任子淵止以晉史注之豈未考此記耶余前後見舊畫數本大小不侔未有如此卷之精者跋東坡行香子詞揮塵第三録載東坡自黃州移汝州中道起守文登舟次泗上偶作詞云何人無事燕坐空山望長橋上燈火閙使君還太守劉士彥法家者流山東木強人也聞之亟謁東坡云知有新詞學士名滿天下一出則京師便傳在法泗州夜過長橋者徒二年况知州耶切告收起勿以示人東坡笑曰軾一生罪過開口不在徒二年以下吾鄉豐吏部叔賈誼倅盱眙遊南山寺有老僧云寺舊有苦條木一段上有東坡親書行香子詞後沈于深水中亟募人取得之遺墨如新就刻其上尋為一軍官買去析為槍幹矣此詞惟曾寶文端伯所編本有之亦云與泗守遊南山作則揮塵所載殆未盡豈與之同遊後乃閲其詞耶偶從豐氏得墨本既登之石又以寄施使君武子請刻之以為都梁一段嘉話跋黃氏所藏東坡山谷二張帖東坡與黃潁州父子厚善嘗書潁州之父子思詩集之後又龍圖二女為少公二子適遜之婦觀此祭潁州之文與龍圖直閣二公書問情好可知子思名上字孝下字先潁州名上字好下字謙龍圖名從宀從是字師是直閣名從宀從辛字才叔居宛丘家藏二蘇翰墨甚富此二十一帖及孫志康二帖墨妙亭記鴉種麥行及山谷二張公挽詩直閣之孫約之年才十三遭靖康之變隨其父郎中公脫身來南能攜以自隨既又力貧登之石其未刻者一二爾可謂善守家法者也余嘗銘其墓亦為及此約之幼子直義以真迹見示為記其大略坡書皆有法石本類多失真此卷字字飛動惠州儋耳及北歸等帖尤為老筆信可寶也第六帖云因志康行即孫君也第七帖云乞會稽使其得請則題詩必滿浙東矣第十六帖云乏人寫大狀不罪簡率蓋今所謂外啓者前輩書問皆用之故云第十九帖在曲江云何時定居少安晚節歸及毗陵而仙去曾不得一日之安也悲哉黃太史張右史張浮休皆一時人物之英則潁州之賢可知太史先自金華徙豫章潁州之先自浦城徙宛丘嘗敘宗盟故稱從姪右史為龍圖友壻且居于陳嘗為潁州作友于泉記故敘鄉曲浮休又周旋伯仲間任道即汝陽守誦三公之詩使人興起也墨妙亭記惜未登之石鴉種麥行有章草體别是一種風氣祭潁州文故潁州使君同年黃兄集云幾道大夫年兄之靈終焉玉雪集身為玉雪不緩不􅔰集不絙與義降升集與道含章不矜集終焉不矜墨妙亭記以為吳興新集集無以字余以事至吳興集至湖乃為差久集猶為差久山谷詩仕路厭風沙集厭作困袖有投虛手集手作刀張右史詩但使將軍桃李在集使作得聞凶哭朋友集聞哀若朋友張浮休詩常憶之官潁上時集作憶昔著靴騎馬集作乘馬三公詩皆親筆集中猶不同如此豈編集時嘗改定耶跋遺教經歐陽叔弼集古録目遺教經卷第二百六十三右不著書人名氏刻石年月世以為王羲之書石在永興歐陽公集古録跋尾遺教經相傳云羲之書偽也蓋唐世寫經手所書爾唐時佛書今在者大扺書體皆類此第其精粗不同爾近有得唐人經題其一云薛稷一云僧行書者皆與二人他所書不類而與此頗同豫知寫經手所書也然其字亦自可愛故録之蓋今士夫筆畫能髣佛乎此者鮮矣山谷云不知何世何人書或曰右軍羲之書吾嘗評此書在楷法中小不及樂毅論爾清徑方重蓋度越蕭子雲數等非右軍筆畫也趙明誠金石録云唐遺教經正書無姓名第一千九百四十八跋云國初時人盛傳為王右軍書惟歐公識其非是考諸公之論非右軍書明矣然歐公謂唐寫經手所書明誠定著為唐遺教經則尚有可疑以世民二字俱如此寫不空筆畫恐非唐人書或若山谷之言不知何世何人得闕如之意也跋東坡紙帳詩坡公次韻柳子玉二詩曰地爐曰紙帳此紙帳詩也集中紋作文㲲作疊暖作暖秖作但皆可通惟以鯨為衾則非也少陵有太子張舍人遺織成褥段詩有云開緘風濤湧中有掉尾鯨後又云錦鯨卷還客始覺心和平坡正用此事而編集者未之考也此卷字畫飛動不可形容公嘗和子由論書曰端莊雜流麗剛健含婀娜豈自道耶跋陳進道所藏杜祁公詩右杜正獻公詩翰界紙謹書三誦起敬第不知請郡四明者何姓公自注云君侯逺祖諱郃始知其為孫氏按四明題名記云孫郃博學髙才唐末授左拾遺淨惠院即其故宅載于圖經唐文粹有古意效陳拾遺有哭玄英方干先生詩有卜世論春秋無賢臣論皆郃之作也又不知孫氏為守者為誰太守題名記中無之止有孫扶在端拱中又與正獻不同時慶歷中王周以司封郎中為守鄉人也政和七年鑰先祖少師為鄉郡兩任涉五年在任除次對所居號晝錦坊南門內有錦照橋與正堂相直宅之後有錦照堂在今竹洲上宅之左有堂名以繼繡以繼王公之後也不聞有姓孫而為鄉守者王岐公作孫威敏墓志嘗以樞密直學士知益州道中罹母憂服除以為陜西都轉運使未欲逺去墳墓得知明州屬盜起山東改知徐州威敏越人王荆公在鄞時答元規大資書有云比方得邑海上而聞左右之别業實在敝境豈威敏以别業在此故有仁里之言又豈威敏得請而正獻贈以此詩既改徐而不及至郡耶淺陋姑誦所聞未必真是進道好古博雅更試考之蔡君謨詩會亭遇資政孫公赴闕公致仕已七年時召歸將有西鄙之任有云新治甬上居間逸安暮齒以是知亦嘗居于四明書從兄少虛教授金書金剛經後嗚呼此從兄教授少虛之真迹也兄少好二王書筆力素髙後得樂毅論石刻深愛之一筆不妄下故楷法精妙字字可敬觀者當自知之兄諱鈜少虛其字也幼有俊才日誦千言未冠能屬文十五應鄉書中其選又十年始入太學聲聞諸公間公試聖人肆筆成書賦薛叔雲元鼎魁文固佳而兄之賦云元聖有作斯文在兹惟得書之體也故肆筆以成之兄自少習書未嘗作賦時方兼經一出而爭誦之私試惟聖人可以踐形論冠絶一時蓋他人皆謂聖人能踐形兄獨謂可以踐形尤得孟子之旨而文又勝蜀名士馮圓仲方李知幾石為學官相與擊歎且曰東南乃有如此人才耶必欲置首選雖以異議小卻而名愈重紹興二十有九年解試為第七名明年省試為第六名三場俱髙而堯仁如天光武總攬權綱二論尤為世所稱述錢子和豫為參詳官批其卷云議論雄特文勢雅健非老于史學者不及此無有與之爭衡者方未第時嫂鄭氏不幸勉強赴省既登丙科授鹽官尉已成見次遭伯父朝散之喪哀毁瘠甚奉親至謹真是食在口則吐之至是欲寬伯母陳氏安人之憂先意承志曲盡子道服闋除泰州教授未幾又罹內艱何其多難耶乾道三年莊文太子將葬宫僚二詹事庶子諭德當作祭文而難于言或以屬兄為之文曰嗚呼惟天惟祖宗啓佑我國家純篤生哲人允惟元良及兹重離並明家用平康於萬斯年肆用二我宸極承我兩朝用奉若于天休洪惟我億萬年並受丕丕基者庶其在兹若之何弗弔旻天降割于我家虛我主器惟御事庶士越在外服越百姓里居罔不䀌傷心矧惟某等有服在百僚惟我儲君既冠成人夙敏日躋弗勤弗煩惟兹四人無能往來厥有顯德亦罔克紀述惟速戾于厥躬是懼若涉淵水今日月有時惟是窀穸之事所以奉神靈于幽宮者其孰敢弗虔肆惟靈其監于兹雖多用盤誥語而體正文古無能易者衆作為之皆廢尋為臨安府教授以為郡國首善為上庠之亞堅持規矩學者翕然師尊之光宗以東宫尹京內侍知省甘升怙勢橫恣欲廣湖上園囿諷府中移置社壇府命兄為祝文兄執不可以書抵少尹曰依奉令旨改移社壇就昭慶寺前築疊令撰祝文某竊以社稷繫一府利害不可輕有改作况今皇太子殿下領尹事大體重尤難輕議某雖聞見今社壇委是荒蕪沮洳每嵗不問晴雨只就寺宇祠祭深失禮意此實纍嵗有失修治止合芟治增築别建祭屋孟子云祭祀以時然而旱乾水溢則變置社稷趙岐謂其間有旱乾水溢之災則毁社稷而更置蓋謂國之事神者既備而神或不職然後可以易置示加責于神也今六氣順序别無災沴若今輕改社稷神何所依祝史之文其將何辭揆之幽明事未穩便欲望别取令旨止下本府如法修築若必欲改移所有祝文不知所謂難以下筆未敢製撰言雖不用而聞者歎服咸曰昔知其能文不謂風節如是之髙也淳熙改元考試婺女得疾卒于貢院夀止四十有二嗚呼痛哉天胡豫以才而嗇其夀畀之名而奪其祿耶娶鄭氏宣和太宰居中之曾孫再娶孫氏紹興參政近之孫郎中大雅之女俱無子以族人之子演為後又得一子澧于民家以其為遺體也始日者唐杞謂兄不夀且大期不逺齋戒泥金以書此經冀望少延而竟如其言尤可哀也兄喜讀莊子漢書故文氣有近似者嘗謂鑰曰我欲手寫古書意所好者首以檀弓繼以天問天對之屬必與時好不合欲名曰攻瑟編大率志尚如此甥壻盛箕號能文自婺來明作四明八詠頗工衆方環坐讀之兄久與之厚字呼曰次龍沈約文體卑弱可憎君又效之耶坐客赦然盛亦悔愧藏其藁不出鄭先生剛忠席下數十人兄一日忽私謂鑰曰吾默觀同舍中惟楊聖可與吾弟為佳問之則曰惟汝二人清而有福問兄何如又曰我雖清如無福何今同舍凋謝存者蓋寡聖可名公冶晚得官而有子琛登甲科兄非相形者而風鑒乃如此鑰少兄四嵗愛撫訓奬過于同氣其卒于婺也往為護喪以歸兄之昆弟五人惟幼弟在其子浹裝潢此卷以求跋痛念兄之抱負不羣宜乎逺到顧其少作與場屋之文俱不足為兄道而區區具載于此者傷其不夀而見于世者止此其亡也志銘不立羣從輩行今亦無幾鑰不書此則兄之哲蹤逺韻遂泯泯矣故書之不嫌于詳鑰非不慕兄之書而天資不潁不及逺甚于是年六十有七矣勉追後塵而猶如此雖覺我形穢亦無所辭焉跋仲兄嚴州所書安遇山房題扁先君銀青嘗讀葛文康公集見其父清孝公行狀云所居以安遇名軒言遇無定遇安有常安先君欣然曰此吾之心也遂以名所居之堂自號安遇居士先是卜夀藏于報國山仁濟院祖妣魏國墓左因作小菴于山下號安遇山房命仲兄書其扁後既葬于長汀而山房亦廢仲兄遺墨尚存從子濚裝池求跋痛念父兄相繼下世二十餘年撫卷不勝感泣跋王恭叔所藏淵明雪中詩圖初寮跋祖潁所藏東坡帖言吏部趙公元豐元祐與坡為代所藏則公使淮南時坡所行詞也言公之孫竒育而不及棄竒蓋寮之愛壻也集中與之賡唱近三十篇亦謂之趙十六有云何敢壻君真好友端來學道伴衰翁與之别則曰吾詩如鐘須子撞豈可一日相參商則翁壻之間固可知觀此圖則又知其兄弟之相與風度殊不凡王郎示余此卷余何敢望寮君之伴我亦我家之祖穎也跋先大父徽猷閣直學士告政和間先大父少師被命守鄉邦再任至四年宣和二年方臘起睦州連陷睦杭歙處四郡聲搖兩浙承平既久至勤京師遣大兵而後剿滅時先祖備禦甚嚴保全郡境適召赴闕下不敢遽去奏乞侯代以安人心事定奏聞遂升學士綸告既登之石足為家寶惟是詞臣不知其詳褒詞既簡外祖汪公所記鑰實知之時諸父多仕于外九伯父暨先君待次里中揚州倅卞公養直圜在伯父館下為此跋語亦未深考也鑰昔聞之臘之初起本無足畏朱勔父子以花石進奉等結怨東南所在頑民好亂者與臘相應賊勢日張其實皆村民也少隨侍處州聞其來處也止以數舟載百餘人絳帛帕首帶鏡于上日光照耀自龍泉山間亂鳴鉦鼓順流而下諸邑洎城中望風而遁略無守備遂據州城又欲破溫州賴劉教授士英唱義堅守台州賴滕司户膺二城皆全鑰嘗仕二州尤聞其詳溫則處賊洪再使其徒來攻其西呂師囊以魔術發于台之仙居既破樂清又攻其東危甚郭少保仲荀等以西師來援始免台亦師囊之黨攻城甚急久而後解二城雖僅免而城外皆為盜區蹂躙殘滅甚矣越分帥府雖不至為賊所迫而剡川新昌魔冦大熾被害最酷及寧海俱與奉化為鄰避地而來者如織恐賊徒雜于衆中人心恟恟先祖經畫大略如汪公之記神道碑云台越二城雖全而外境皆殘破惟明六邑秋毫無犯為得其實矣爰是東備海道南塞新剡寧川之衝布耳目逺斥堠戒僧寺不復鳴鐘有急則鳴以為警賊知有備不敢犯我在諸郡中闔境獨全明賞信罰境內之盜亦不得發發亦輒得祐陵知之深嘉屢歎故賞之尤厚冦既平改睦州為嚴歙州為徽剡縣為嵊亦可見當時之事變矣鑰不肖且老每念先祖之功無有發其幽潛者會從子深以此卷求跋敬敘所聞使後來者知之書機汲記贈薑子陽題其後乾道五六年間先光祿守括蒼兄弟隨侍郡齋中無處不對溪山之勝而山無水源取汲于溪一日試同仲兄步至溪滸一下數百步又攀援而歸喘汗久不定相顧曰徒手上下猶如此彼卒輩負水而登日不下數四其勞甚矣思有以免之竟無策而止後偶讀劉賓客集有機汲記聱牙難曉詳究其説則啞然曰是可施于括蒼無疑然久無所告語薑子陽鈐轄沿檄來歸因語及此詢問甚悉是有心于利物者因為録賓客所記又命工作小式以遺之歸見黃堂儻獻其説而贊成兹事縱未能筧以達于正堂但得引置山上而運之比汲于溪者大有間矣外而公廚及公帑釀酒之須皆可以濟下至巖居而谷汲者亦可倣此若小有不合則又在潤澤之功子陽幸加之意焉跋豫章别集苑英華跋清閟居士臨修褉序二首案原目此首後有跋王伯奮所藏文其文今並佚一詩二銘贊頌三序説四記律賦箋注老子一篇杜詩六十首東坡少遊參寥各賦春日詩十首參寥第八首云梅梢青子大于錢慙愧春光又一年亭午無人初破睡杜鵑聲在柳花邊山谷别集書王氏夢錫扇乃是此詩但首句云壓枝梅子末句云杜鵑啼在柳梢邊豈山谷愛參寥詩嘗書之扇耶山谷以承天院塔記為人所訐遂貶宜州記文及毁壁序皆見此集攻愧集卷七十三
