front:
  text: 攻媿集巻二十七
  hash: sha256:721d3d74546497fba88f56abef4030ed1f5082c7ef9f9ad5c9c3886768789d09
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_027-1a}
body:
  text: 宋樓鑰撰奏議奏槀西掖繳泉州吳淨黨罪案臣比緣承乏暫攝西掖刑房之事職所當書人命所繫尤當加謹嘗攷近歲所斷過四百餘人非不欲求以生之而奏案所言愚民犯法多其自取不敢輕有論奏臣聞之書曰罪疑惟輕功疑惟重與其殺不辜寧失不經經者常也殺人者死法之常也殺人而不死是失之不常也聖人初無意于庇有罪之人而使死者銜冤也特以罪有可疑者可以殺可以無殺殺之則恐其無辜不殺則失之不常寧失之而不忍其不辜而死也國家列聖仁厚凡大辟刑名疑慮情理可憫皆許奏裁率從寛貸國祚靈長此其大者竊詳泉州百姓吳淨黨之事本州見以疑慮具奏以臣觀之亦幾于可憫者矣臣請舉其大略而言之吳淨黨雖非良善之人然其所犯止因巳醉而求酒旣無殺人之心又初不操殺人之器許應遂惡其穢語先以木扁擔趕打案中明稱淨黨勢迫見有木柄鐵齒爬挐急把起爬挐以枕背打許應遂額中心一下血出倒地再以爬挐木枕背打左邊肋下虚處扇骨上一下傷重于辜限内身死爬挐旣非殺人之具又當夜分之時穢語初無切害許應遂先以木扁擔趕打偶有爬挐而取擊之止于二下遂致重傷原其本心非是兇惡寘之死地罪有可疑欲望聖慈體大舜惟輕之仁廣列聖好生之徳矜愚民之無知察所犯之非故特下刑寺重别定斷儻蒙寛貸亦必杖脊配流或加逺惡足以償死者之冤矣所有録黄臣未敢書行小貼子臣詳攷本州奏案許應遂被打之時妻阿曽弟許應明同蘇穗奴扶䇿許應遂于煮糖竈前坐向火炙救蘇穗奴等依舊打糖則可見當時亦不以為重傷況本州具奏有云原其所犯本無殺意若便行正斷竊恐不中有此疑慮檢準淳熙敕大辟刑名疑慮奏裁則是本州亦以為疑竊恐難以正斷伏祈睿照繳刑部劄子郎鄭汝諧劄子三省同奉聖㫖依朝㪚大夫守宗正少卿兼權刑部侍臣竊見在法大辟情法相當之人合申提刑司詳覆依法斷遣其有刑名疑慮情理可憫屍不經驗殺人無證見四者皆許奏裁此本朝累聖仁厚之至紹興以來凡奏裁者必貸見今所行屍不經驗殺人無證佐而奏案中情理分明者皆自依斷必委提刑親臨察其無冤而後處決不以其奏裁而幸免也其刑名疑慮情理可憫者又皆詳酌罪犯或貸或不貸亦非盡從輕典也年來死罪日報思欲澄源正本以幾刑措而未有以為䇿今忽奉前項指揮臣再三細繹雖是申嚴舊法欲革淹延之弊深恐未易施行敢因其言條列如後一謂州郡之吏慮申提刑司未免有財賄之費徑以聞之于朝廷提刑司亦利其安靜無事不惟不復詰問間有申詳覆者亦疏下州郡使之奏聞臣竊以為未然提刑以提㸃一路刑獄為職州郡詳覆而本司之吏利于受賄此當責之提刑非法之弊也當有以禁止之豈可縱而不問若以為提刑司之吏利于詳覆之有得則所謂利其安靜間有詳覆亦疏下州郡使之奏聞者官耶吏耶以為吏則彼方利詳覆之財賄而疏下者非其所利也以為官則亦當以此責之提刑别議申飭可也一謂刑名初無疑慮情理初無可憫類皆飾為辭說而以數百幅之案牘上干九重之聴覽中書之務不清都司之事日積刑部疲于擬議棘寺困于約法臣竊以為未然初無疑慮可憫飾為辭說者蓋有之矣然求之于古用刑之際寧過于詳毋過于簡故王制曰成獄辭史以告于正正以告于大司寇大司寇聴之以告于王王命三公參聴之三公復以告于王王三又然後制刑蓋如此其詳唐制諸州斷死罪雖非疑慮各三覆奏亦不以為繁也今奏案之上九重亦惟以視其成而已中書之務不清恐不專為此若都司刑部棘寺則職專在此為此言者恐未免于憚煩之譏一謂諸州囚禁以候奏案之下淹延日久其間證佐牽聨之人或監或繫多有死于疾病飢餓者豈不傷聖世欽恤之仁而上奸天地至和之氣臣以為此論誠美矣奏案之稽留以至淹延誠為大患是當别議措置如此令一行州郡承風觀望鍛錬周内或至移情就法茍免駮糾徑從詳覆處斷鮮以上聞殺人愈多傷欽恤之仁奸至和之氣必有甚于今日兼恐囚無生路翻異愈繁淹延愈甚囚繫愈多矣一謂欲乞明降指揮應諸州不當奏之事而輒奏者其當職官吏悉坐不應奏而奏之法朝廷知其難行旣以貼去而改之云今後應諸州軍勘鞫公事如罪犯委有疑惑情理可憫者方許奏裁其有情法相當所犯初無疑慮者令徑申提刑司詳覆斷遣施行臣以為議者固以必不可行而改者亦未應如此行下蓋二者自有見行條法不待申言言之先後意有重輕必欲申嚴若曰情法相當者申提刑司詳覆依法斷遣其委有疑惑情理可憫者方許奏裁則其辭尚緩或别議戒諭則可若今所降臣愚實恐州郡妄希風旨奏裁之案日少詳覆而斷者益衆雖都司刑寺之事簡而殺人愈多此臣所以寒心也一謂自此敢有違戾者必罰無赦又小貼子内稱間有將賊賍低估價錢止作四貫七八百文以應賍不滿之條若此等類乞今後許從刑部㸃對將官吏取旨施行臣竊以爲尤非也漢景帝之詔曰獄疑者讞有司有司所不能決移廷尉有令讞而後不當讞者不爲失政恐人之畏罪而不讞故以此誘之今而曰必罰無赦則誰敢讞乎近蓋嘗以讞之不當而罰檢法之官論者固已深慮而況此明禁之乎低估價錢者取㫖施行則今後必多贓滿之人尤非臣所敢聞也竊觀自古書傳所載惟務寛宥如與其殺不辜寧失不經之類不一而足矧祖宗以來惟恐有司不以冤獄上聞大中祥符六年眞宗以外郡斷獄有疑及情理可憫者避大理駮糾不卽申奏詔令申提㸃刑獄官覆實具案附驛以奏聞付大理寺詳覆取㫖天聖四年仁宗詔自今大辟案情理可憫而刑名疑慮者更不申提㸃刑獄官竝具案聞奏如無枉濫情弊更不駮勘未聞有使之不讞者也右前件所陳上瀆天聴罪在不赦竊以為今日斷獄旣未有澄源正本長䇿使斯民之無犯莫若且仍舊貫無事改作深恐講之未詳反致已甚拳拳納忠不敢愛身臣非好為立異利害所在職所當言不容緘黙伏望聖慈詳察寝罷上件指揮實為天下幸甚所有録黄臣未敢書行繳皇后宅恩澤尚有八名乞依安恭皇后宅體例李孝純等奏合得恩澤一十八名行施臣仰惟皇后母儀天下所得恩數自有故事然司封格法但載大禮恩澤數目其冊寳推恩止係特降指揮大率國家循例等事有其舉之莫可廢也有其廢之莫可舉也皇后冊寳親屬推恩舊得二十五人隆興二年因臣寮申請特減七人此安恭皇后之例也至淳熙三年壽成皇后自以别無承受之人于十八人中又乞減省遂又減八人紹興元年皇后受冊先得㫖應照淳熙三年以前條例及有司别具前後體例以聞得㫖與十人仰見陛下遵守家法莫敢舉之之意今因李孝純等陳乞卻復八人雖比之舊制仍少七人正合安恭皇后之例然已經淳熙三年減作十名及紹興元年特㫖裁定而今日又復增添在陛下崇尚恭儉之時不宜有此如聖意以李氏三位子孫數多俯循其請乞降睿㫖所添八人止許奏本宗親如此則既不失恩厚又有樽節不致汎溢已甚所有録黄臣未敢書行繳林大中辭免權吏部侍郎除直寳文閣與郡給同尤袤事中臣等聞之蘇軾上書于神宗其論存紀綱曰建隆以來未嘗罪一言者縱有薄責旋卽超升許以風聞而無官長風采所繫不問尊卑言及乘輿則天子改容事闗廊廟則宰相待罪臺諌固未必皆賢所言未必皆是然須養其鋭氣而借之重權者豈徒然哉將以折姦臣之萌而救内重之弊也又曰彈劾積威之後雖庸人亦可奮揚風采消委之餘即豪傑有所不能振起此天下之至論也仰惟陛下隆寛盡下和顔受言而臺諌之臣相繼去國者已多侍御史林大中任言責者三年餘矣最䝉眷注言聴諌行前因論事除吏部侍郎雖去言職遂正從班人皆以為陛下賞之也辭免一再除職與郡大中以書生起家陛下拔擢至此在大中之分足矣而臣等猶敢有言者非為一大中也為臺諌事體惜也非止為臺諌事體也為國家惜紀綱之地也大中論一少卿亦不知所言之詳而同日與郡陛下既以為權侍臣矣而僅一直寳文閣天下傳聞必以為朝廷以言罪人乃與所論之人俱坐汰斥實傷國體且虧仁厚之政近年臺諌風采日消正賴陛下主張使之振作以强主威以尊朝廷以讋姦邪以沮僥倖言脱于口應之如響中外竦動紀綱自張不然則所損甚多來者亦不可為矣公議皆賴陛下選大中言職或留之論思獻納之班度今事勢大中義難復留敢望聖慈念祖宗之深意鑒蘇軾之至論詳察事體無令言者與被論者同日而去施行稍有次第使得從容引退優禮以遣之養臣下敢言之氣全國家退臣之禮猶足以示四方儻陛下慨然感悟曲留其行則臣等幸甚過望士大夫感悦奮勵孰不思罄竭以圖報哉所有録黄臣等未敢書行書讀繳皇后宅門客親屬補官恩數内門客蔣孝曾親皇后歸謁家廟親屬推霍溥白身補官屬張孝詵霍淵臣比者以李孝純等陳乞還給皇后恩澤八名嘗具繳奏乞將所添八名止許奏本宗親奉御筆特與書行臣伏而思之雖比之壽成皇后添此八人然正合安恭皇后之例臣亦不敢固執旣巳施行近者伏覩皇后歸謁家廟一行推恩給事中論駮蒙陛下曲從其言仰見聖主化由近始中宮以義制私朝政清明中外悅服近來親屬推恩雖人數比舊爲多然出自宸斷裁節横恩大率略盡臣輩尚復何言仰惟陛下從善如流千載一遇詎敢失職以負聖明如李孝純孝友轉行右武郎臣亦不復論列命婦加封親屬轉官悉當書行惟是門客蔣孝曽白身補將仕郎親屬張景詵霍淵霍溥白身補承信郎求之故事既無比例比之衆人最為太優蓋白身補官豈是細事官穴已甚不應開此倖門前此止以李氏子孫親屬衆多特㫖放行恩澤張景詵霍淵霍溥既是親屬即合于所添八名恩澤内補官庶免又于十八名之外别添三人反過安恭皇后之例若門客則無補官之例尤不當僥冒補授欲望睿㫖今親屬三人于所添八名内奏補仍追寢將孝曽補將仕郎指揮或與免文觧一次實為允當所有録黄臣未敢書行攻媿集巻二十七
