body:
  text: 宋樓鑰撰誌銘知梅州張君墓誌銘龍游為浙東壯縣號難治自紹興間陶安世定有聲之後厯數政不以善罷四明張和卿由袁州萬載尉以捕盜賞改右承務郎年壯氣鋭往為之宰親黨或勸止之既至謁廟以亷勤公平自誓上不負于君下不欺于民終始如一神其臨之聞者竦然首定規畫凡聽訟追科出納簡稽公吏抱案進退皆有程度鄉胥姦弊智者不能盡察君左右參驗甲乙相紏簿籍更川薄楮以防削改字畫分明欺偽畧盡有宗室子與强民為仇各聚衆至數百期操兵夜鬭于市尉趨告公曰安有是事命置酒尉股栗不敢飲吏又告將合矣君笑不答俄散去約明日復至遲明召二人者至庭謂曰汝自相仇彼衆何罪而使濫被殺傷乎不如挺身持刃決雌雄于前兩人者相顧欲退公曰官府有法可容爾耶分囚廡下至累月始悔過求免邑衆為言願相保任使自新即縱之俱媿惕感服君既歸猶以時節致書問起居者數年設保伍之法繪爲魚鱗圖居處嚮背山川逺近如指諸掌又籍其家之長幼姓名年齒生業纖悉畢載其崛强無行鄰里可以糾告或犯法未就捕而君已知其人私忿鬭毆鄰不爲勸止者與同罪牒訴誣妄必坐其教令者法令易行井若畫一欲以獻之朝通行天下未果也豪右竝大溪爲舂磑以擅利久爲舟行之害間有廢之僅能徹去浮屋君始併其基址去之初謁太守司諫施公元之迎謂曰邑大未易治蓋以君尚少也君曰正恐上官以爲易今知其難則可爲矣守待寮屬嚴一日令賦外别輸四令奉命惟謹君獨爭曰使某左枝右梧月獻緡錢千計未爲甚難如貽患後人何守盛怒君辭益堅且曰寧棄官以歸已束裝矣守曰試子爾乃能剛果如此更薦之後日書問如待子姓家事亦或咨謀焉白革湖鎭當水陸之衝戍兵經由不翅寇盜莫敢誰何君白帥府以軍法齊之無敢譁者有一士籠禽于市爲惡少年侵侮君責其不學送縣庠從師受業謹其程課居數日而後杖其所侮者人皆悦服視事纔三月有訴君于部使者覈其言不根反以此受知又訴之朝洎付有司乃扳引前令事為言其人既伏辜君之治行益白久之謡誦雜然如十德詩能官賦十可喜歌頌鋟木鏤石幾不勝數流聞四逺境内多立生祠惟靈耀成志二寺至以神事之或致禱焉帥憲具績效奏聞有㫖候任滿赴都堂審察淳熙初元既造朝幹辦行在諸軍審計司俄改差權發遣均州制詞有云風力敏彊有聲劇邑是時孝宗皇帝垂意民事由治縣而擢為郡者不過數人如丞相葉公衡自於潛守毘陵卒至大用均有管内安撫之權人謂君自此升矣四年陛辭奏事稱上意且屬以有機密事奏來而臺評以資淺論罷五年差知興國軍前論者又以為言改通判筠州遭所生母安人方氏憂服除通判衡州既授代而報罷紹熙二年主管台州崇道觀四年通判廣州幾年適梅州闕守諸司奏辟未幾而屬疾慶元三年十月丙子歿于郡之正寢享年六十有一官止朝散郎嗚呼命矣夫娶伍氏封安人子男五人度廙庠序廉度將以君遺澤補官孫男六人竒之湘之衡之環之次俱未名先一年竒之卒孫女三人尚幼君之入廣從行者多困于瘴癘第四子序卒于梅君念之切閲月而君亡安人來自富家善事其姑君既受命悉以祖産歸諸兄而又不事生産安人攻苦食淡閫助爲多人無間言奉祭祀未嘗不躬親撫庶子不翅如已出初封孺人後得今封率諸孤扶君之喪逺歸悲苦勞勩人所難堪歸而治葬尋亦感疾五年三月乙巳不起始公卜壽藏于鄞縣清道鄉邵家橋祖塋之側既以四年十一月丙申大葬又以五月壬寅祔安人于君之墓嗚呼天之禍張氏何其酷耶先是君之諸子爲君求銘以君既葬而遲之弔安人之喪又哭踊以請余于君有連又以齊年相好尚何辭惟張氏自仲以孝友稱衣冠代不乏人永嘉南渡始居于呉五季之亂避地東來有官于四明者因家焉君之曾大父綸累贈宣奉大夫大父寅贈朝散大夫父邦彦政和二年繇太學上舍擢進士第官左朝散郎贈朝議大夫自叔祖宏舉經明行修為吏部郎遂為鄉之望族君諱祖順和卿其字也生七歲而孤當紹興十四年以朝議致仕恩補將仕郎性資明悟執喪如成人長從鄉先生僉判沈公銖游沈公愛之至育于家曉暢世務以氣義自許庻幾大其家者居官所至可紀萬載有盜竊發躬勒部伍禽得之念其窮無所衣食而致此以為案問自首盜得不死衡陽歲饑道殣相望君遽發廩賑給而後報監司不罪其専而以才具優長薦之提刑姚公恪轉運張公縯提舉陳公傅良謂君敏彊精勤㢘平簡素不詭隨而失守不强梗以侵權嘗稽其簿書條目雖多撮為一編上収下支日總其最簡當精密無所容姦委之決獄酌情參法隨手剖析人稱平允相率列其狀于上今諫議張公釡為廣帥以歲有登歉欲廣儲蓄以備緩急為經畧司樁備倉創立未久専以委君為之條畫綱紀辦事既速了無遺䇿張公亟稱之梅在萬山間官舍民居率以茅竹為屋公慮火災更以木瓦自驛舍庫廩兩獄先以公帑為之民亦樂從郡計匱竭為之經理而用稍足又能葺學校為養士計汀贛接境歲晚輒百十為羣名曰負販實為剽掠松源石下為二州淵藪淳熙間有嘯聚者自是幾無寧歲君下車即用龍游魚鱗比伍之法行之羣盗為之屏跡郡治之後茅葦彌望君令民築室兩傍者復其身遂為通途舊以土客户社丁供州家之役各有科調為罷去之皆起來暮之嘆惜其見于用者止此也與人樂易持論平恕而勇于立事不顧彊禦毅然不可囘奪居官㢘約為令時鬻産以繼禄又好周人之急力竭而無倦色嫉吏姦如仇洞見肺肝人不能欺衡陽之劾良以此也平居念當世利害擬為奏草以待施用久遂成編名愚見録藏書教子尤所留意朝議有經解雜著數十卷大書編次寶藏甚飭對之輒泣下嗚呼古人以方六七十如五六十猶可以行志為邑宰而得名于史傳者衆如君龍游之政可以不朽故余表而出之家有治縣捷徑等書皆公見于已試者後來尚得以攷其規橅云銘曰張氏著姓孝友惟仲漢良晉華支派尤衆永嘉南渡始為呉人或官于明遂大于鄞君起孤藐以才自奮所至可紀芒刃不頓龍游之政絶後光前治聲燁然徹于帝前謂自此升欲起輒仆晚試于梅遂罹變故抱負有餘齎志而亡哀哀賢助又不勝喪邑人尸祝足以不朽銘以表之尚啓厥後黄仲友墓誌銘余從兄編修娶黄氏諸暨名族也嫂氏兄子定之又為編修壻定之佳子弟聞其父推官之賢恨未識也一日以書來訴推官亡于上饒之官舍歸葬而求銘為摭所録行實而銘之君諱宗諒字仲友世居洪之雙井與豫章先生俱本于婺州之黄五季有避亂而居剡者又遷諸暨遂為縣人七世而上失其譜矣曾祖舜卿贈正議大夫祖彦朝議大夫贈大中大夫父克寛朝散大夫贈中大夫君幼而孤刻意問學手卷不釋紹興初建太學以弱冠上優選月書季攷屢占前列馳聲二十餘年秦申王當國之久士子習爲諛言漢唐非七制三宗不道時文中不復及興亡治亂事至不識資治通鑑爲何書二十六年歲在丙子高宗更化之初公道大開申挾書之禁防閑甚密秋賦多趑趄其行君以素業賈勇而前登名薦書儕輩歎服時命不偶淳熙五年始以特恩補將仕郎明年中銓授處州遂昌尉年近六旬而勞苦不憚警捕之職甚舉境接建安俗獷悍小歉則盜竊公行里正嘗以嘯聚聞君亟率所部操兵往遂之凶徒相顧駭曰黄佛出矣忍犯之耶相與遁去一境晏然十年任滿調台州司法參軍到官適歲大祲義倉出納惟謹尋授信州軍事推官慶元二年始入幕國正季君翔爲守布衣交也郡事多以委君幾于畫諾君老而益壯剖析滯訟案牘山積推究無遺據法予奪不容一毫之私二年間類爲四冊近五百事四年之夏忽苦脾濕雖多在告竭力公務不見惰容痼疾復作遂求致其事轉承事郎方將俶裝東歸放意林壑以樂餘年未幾疾革竟以十月戊寅卒于正寢享年七十有七娶趙氏融州觀察使贈開府儀同三司潤國公士筏之女聯姻天族袒免親法當補官君獨不就識者高之子四人與之先六年卒次即定之登仕郎次一之尚之皆業儒女二人長蚤亡次許嫁姚銓參政令憲之諸孫也孫男三季雅季文季野孫女四諸孤將以五年季秋某日葬君于縣之孝義鄉魯墓之原合趙氏之墓君資彊毅而與人謙和及見前輩源流有自他無嗜好惟教子甚力交游至多未嘗失色遂昌邑庠草剏二丁祭器亦不能備君悉力整辦為之一新課試士子翕然悦服尚書王公佐方尹京邑貽書相賀有闢黌舍以延生員為斯文宗主之語在丹丘時直閣田公渭以倉使按郡一見唶曰老先生尚爾淹恤乃令吾徒冒乘傳之寄自顧歉然即以舉削來詞曰學高前輩政有典刑允謂老成尚堪繁劇人以為知言禮部尚書尤公袤時居西掖以詩寄君有云金馬玉堂慙我輩青衫白髮念君遲三數公皆上庠故人故知君尤深推此可見君之為人垂絶不亂命諸子無他言惟以進業保家勉之自號隠退老人有文集二十卷藏于家銘曰吁嗟黄君馳騁文囿少蜚雋聲不為不售晚服官政感歎耆舊踰七望八不為不壽日月逝矣用不及究善積慶餘尚啓厥後趙深甫墓誌銘長兄績溪尉蚤世三子五女以次婚嫁丘嫂最愛季女聞小溪寓居趙氏家法媒妁之言曰武德夫婦偕老杜門約居教子甚嚴諸子聯中科第多有賢稱其第三子師信既以淳熙二年賜進士出身得尉台之臨海矣請婚審于鄉評曰然遂以兄之子妻之後以近制改師潯字深甫既壻于我與之游處被服儒雅畧無膏粱之習慶元二年君既悼亡謀葬于通逺鄉白石里石營保之原而後之官甫四年而君亡矣哀哉母安人馮氏尚無恙一女二子哭聲不忍聞石營去所居纔里許將舉深甫之喪合焉求銘于余忍銘君乎哉君實為藝祖皇帝系孫贈保康軍節度使高密郡公令儇君之曾祖也贈武義大夫子葢祖也主管台州崇道觀伯􅙝武德也武德生長承平南渡流落居四明之鄞縣大抵居官㢘儉謹蓄俸餘以為待次計與鄰里不以財交故内外肅然深甫生而竒龐長服義方自力于學登第五年而後授室彊敏自喜始調官或賀之曰臨海尉多以捕盜改秩者君以為非吾志也在官果兩得强盜一獲私鹽甚夥皆應受賞照驗明備終不自言又達于吏事以此受知于諸公邑民自經而有傷又以移尸興訟令受私謁諭君毋生事君正色曰事干人命今日正欲得實耳長揖而起終直其事人皆稱平令慙且不樂時以職事相窘君弗恤也有十將雄狡無賴前政莫敢誰何偶有犯當治輒肆言曰尉欲治我不望改官耶君寘之理窮詰宿過卒逐之餘皆聳服尋為衢州西安丞工部尚書謝公源明時為守趨召轉運使潘公景珪問曰郡中有賢丞乎謝公以二人對而以君為優備言㢘勤曉暢民事之詳潘公曰得之矣俄列上謂才術優長可以作邑兩易知嚴州桐廬縣最號難治君為之談笑而辦才譽益顯任滿授紹興府録事參軍丁武德憂不赴服除㑹有㫖侍從臺諫各舉宗子二人余在西掖薦君之兄師津今知樞密院謝公深甫台人也極知君恨舉員已足未有以及之方為御史中丞而吏部尚書劉公德秀為監察御史問人于憲長謝公亟稱君之賢劉公慨然薦之其詞曰奥學有源素履無玷雖厯官未久而聲聞益彰併及辭盜賞事為逺到之識乞以備朝廷選擢初不識靣真公舉也天族蕃衍人才衆多昆仲屏居山間憂患之餘名徹天聽照移狎至幾于羔鴈成羣者鄉人榮之本無意于干進僅以此俱得添差幕官君授建康府節度推官留守尚書張公枃多以滯訟屬君處之當人情合法意衆議有未定者獨招入郡齋議之或至夜分而後退大資趙公彦逾素知其才見其盡心贊畫受輸決事無不曲當首授京削參政又為之延譽諸司交薦僅二攷而歸既調嚴州節度掌書記為部胥所賣再往都下久之得疾逆旅遂以五年四月戊寅卒哀哉若人之不淑也始既辭盜賞而不用蹉跎至此知己方當路可以伸矣而止于儒林郎素壯强飯年五十有二何疾遽困之耶子希偘希倕女未行君性質直忍貧自立職務之外進學不倦垂意經史同寮賡和往往傾其座人心計精密治公事如家事言不妄發持論甚正孝友勤謹自奉淡薄不務華飾思有以自見于世遂吞志而已矣方鼓盆時手記費用之目甚悉其子請曰何用爾君忽曰我且死汝輩從此為之兹聞訃音變起倉猝昆仲方議經紀之希偘等出舊所編按以從事適奢儉之中噫豈有知耶葬以六月某日銘曰父子之賢聞于鄉閭兄弟之美徹于帝都君才甚優知已當塗謂進未艾而止斯乎兄子既殂又銘其夫尚惟諸孤承慶之餘安光逺墓誌銘淳熙十二年余方懐東嘉之綬于家頗聞安君光逺詩聲一日褏長箋臨門倒屣迎之貌甚偉文甚工與之語纚纚可聽而忘倦也又六年過余于外府求跋其大父詩卷比余投閒里居故人罕不見者獨光逺未能相過已而聞其病遂不起寔慶元四年七月丙辰也六年諸孤將以四月丁酉葬君于鄞縣之通逺鄉建隩南山其次子踵門以銘爲請手編先集列載行實粲然可觀余既哀光逺之不遇愛其子之克家遂屬筆焉惟安氏系出唐忠義傳金藏五代後唐中書門下平章事金全之後國朝勲籍節度留後守忠即君之九世祖司徒忠果雄勇功臣習七世祖也曾祖希文崇信軍節度使祖㝢武德大夫真定中山府路㢘訪使者父時從義郎三世皆娶趙氏家開封祥符縣建炎避地著籍于明今為慶元府居小溪鎮四十年矣君諱昭祖娶軒氏亳社左承議郎中美之孫子男四勝非辟彊去華棄疾女二長歸馮季參次未行孫男一女三君世為名將至㢘訪始以文采受知祐陵與樞密宇文公虛中雍帥蔡公靖游尤與寶學劉公子羽厚善劉公狀其行自謂急難之義天屬莫加也從義仕不顯而家學尤懿見于張公總得祁之帖正字王公衜之銘兄弟終鮮承父祖之傳幼敏悟力學抗志高邁從義指物命題脱手成句見類書輒屏去曰此豫以不能待人者性端靜衣或數歲一瀚繙書已熟若手未觸者舉動不苟絶無子弟過從義年踰四十得君篤愛之擇師以教日益秀發父子短檠相對至十餘載自為知己出入不能相捨既冠同客都下從義得疾委頓君憂惴願以身代旋即東歸竟至捐館執喪哀毁悲感行路母素嚴重家政至是益肅君亦敬事盡其歡心及疾革醫禬未效至刲股以進家人竊窺而後知之喪葬俱備哀禮自以世襲衣冠未有以文發身者扁其室曰觀行朝暮激昻期紹先志蹉跎至五十始慨歎曰科舉之不效命也遂一意于義理性命之學舍後築圃中闢一徑自號通村老子好為古文尤工于詩平澹敷腴不為艱深之詞每曰工夫到處卻無竒特有文集二十卷名通村遺藁丞相壽春魏公退處碧谿山中之客惟雪窻張武子與君從容觴詠如裴迪之在輞川也鄭黄中王德新龔養正薛清卿湯孫將諸君皆相與為文㑹酬倡之友致仕應君良弼一鄉推為長者老而益高君尤與之厚嘗銘其墓人以君為應之亞匹云與物無競不見喜愠之色每戒子弟勿與人辨是非待其自釋又曰横逆之來如在荆棘中徐行緩解而已禮法自將不識公府以誠待人久而相孚内外無間言喜事愛客客至趣備酒肴擷蔬買魚陶然徑醉氣同志合或館致累日室無長物惟好古不衰先世遺書殘編斷簡皆手自整比書尺往來有可觀者亦謹藏之筆札素工稱其文骯髒高簡莫窺其際客去則取所聞見者劇談示訓諸子不待出門而家傳充然有得也自卜葬地無復世間意參閲内典旁接諸禪趺坐至深夜不動年纔五十有七而疾病垂絶猶大書偈語詞意超詣亦足以知君所存矣銘曰窮亦樂困而亨奚其為政不言而行惟卒不施以昌其詩江山為助筆乃縱横優游田里以得此生彼其憂于心而毁于後雖曰得志未知與此孰重而孰輕安氏之積厚矣非此其身後其有興者乎朝奉大夫李公墓誌銘太師史文惠公兩登相位其持論以求賢用吉士為先蓋其天資寛宏務為忠厚家傳孝謹以此教子以此擇壻玉局李公刪定其一也公諱友直字叔益世家紹興府之餘姚太師為尉與公之父游見公所為文竒之又喜其端粹遂締姻焉公甫冠入上庠太師鼎貴公退然未嘗自言同舍有不知其為丞相壻者共恬于勢利自為諸生時已如此太師尤器重之既登科而太師再相孝宗垂意人物一日問太師子壻孰賢以公對即除詳定一司勑令所刪定官時淳熙五年二月也有以資淺為言者雖寢前命至七年再除始就職朝論翕然以為眞吉士可謂冰清玉潤矣公曾祖尚邕州太平寨主簿祖竑從事郎累贈奉直大夫父梓承務郎累贈朝請大夫妣茅氏贈宜人公幼警悟蚤已能綴文父祖竒愛之稍長益自刻厲主簿學行爲里人所宗以貢入京師晚纔得一官延師儒訓子孫孫曾四人踵入太學公最以詞賦得名屢占上游首名薦書後以恩免舉將再上禮部俄遭外艱乾道初試上舍中優等又丁茅夫人憂淳熙改元該免省者五人公獨不就遂登二年進士第授迪功郎明州慈谿縣主簿易太平之蕪湖未上而有勑局之擢纔半載以修進條法事類特改承奉郎輪對便殿進止詳雅敷奏明白歴陳救荒漕運附試三事孝宗嘉納悉以付中書或諷公謁廟堂施行之公曰吾知盡愚忠爾後議者立附試之額卒如公言同列序遷方擬以客臺博士處公言者又以為驟得㫖外補丞相王魯公諭使求倅謂杭則不失故步明則可以便鄉公止匄祠魯公深歎其逺識也九年主管台州崇道觀十一年通判婺州既至郡參正李公彦穎中丞蔣公繼周為守皆知公賢厚每事咨焉公外寛内明政務大體而畧苛細恂恂若不能言而從容裁決無不均當謙和樂易事上官以禮雖不為異亦不肯希意苟合惟是之從不可干以私僚屬吏民敬而信之不忍欺也既歸宦情愈薄去國且十年未嘗以一字自媒于諸公居歲餘復求郡丞遂倅湖州劇郡數易守公間行郡事輒稱治吏引例卷以攝承當增俸叱去之一金不取也提刑陳公公亮提舉黄公遹將列薦于朝公力辭之趙公不迹來守强敏明察官吏嚴憚且謂公必不合公不改其度守為之降色辭公亦以吏師事之始終賓敬不可得而親疎時人兩賢之後守至未煗席劾去外臺怒未釋偵邏日至符移旁午先是郡有舊胥為守家吏與之俱來已而頗肆籍其家得守與其壻數書戎官將發之公曰何忍發私書以隮人于險乎亟焚之止械其人以前使者聞之弗罪也後窮詰之守果無預事遂白微公幾殆矣秋賦多鼓譟之患公為監試前期以訪鄉老具得其情為之區畫無敢譁者攷官以去取求決于公辭不可以詞賦定取四人時預計偕者十一人獨此四人擢上第人深服鑒裁之精也尚書程文簡公大昌舊為司業素知公嘗曰公澄之不清撓之不濁眞淵乎似道者哉侍郎莫公叔光代公為刪定郎嘗貽書曰公如美玉固未嘗掩瑕而純粹之至無瑕可指此平昔之所敬慕未易及也其為名勝所重如此慶元改元制曾兩任通判者方許拜州曾經擢用者方許除職事官交親趣之起勉至修門謂公必留而一造相府即以小壘自詭丞相余公謂何取之廉耶許知臨江軍命未下已謁告歸矣五年夏以疾求閒甚力今左丞相京公意謂憚逺委曲勉諭既不可囘又為之易廣德且諭公曰地近事簡可以卧治毋惜一行也時廣德守已得祠需公之至公謂求閒居而得便郡辭逺次而就見禄君相之恩誠厚非本志也復申前請改成都府玉局觀後兩月疾益侵求致其事竟以其年八月乙亥卒于正寢享年六十有六積官至朝奉大夫賜緋衣銀魚史宜人有賢操先二年卒蓋宜人朝祥而公以暮捐館舍人尤哀之子四人曰賡曰康迪功郎婺州浦江縣主簿曰庸曰庲以公遺澤補官賡庸皆蚤世四女長適迪功郎臨安府新城縣尉趙師固而卒次適修職郎監紹興府和㫖酒庫史實之實之亡矣餘在室孫男三人該將仕郎謐詡女一人諸孤將以六年九月辛酉葬公于縣之蘭風鄉新湖劉公隩之原合于宜人之兆嗚呼公金玉人也簡淡無嗜好經學䆳于二禮屬文長于駢四儷六間為人草箋奏談笑成篇初若未始經意詞㫖明切號為得體他有碑志銘贊等出輒為人取去無留藁公既沒僅裒二百餘篇藏于家詞氣雄渾似其為人字畫遒美鄉有石刻必求焉凡公所長不以自衒也性至孝禄不及親終身以為恨故于族黨恩意有加訓子若弟示以趣向使自知勸誘掖後進絶口不言人過杜門卻掃或十餘年不至城邑令佐歆其賢多就見之清修謙謹無賢不肖一接以禮犯者不校不見喜愠之色故哭公之喪者無不盡哀里閭耋穉亦咨嗟痛惜謂無復見若人矣康少而幹蠱即委以家事俾毋闗我築堂曰竹隠一丘一壑不啻自足多焚香黙坐得喪榮辱不以介懷疏財喻義不事生産而趨人之急成人之美恐力不及既無德色或莫之知也先卒一月忽告二子曰吾以進士起家仕至二千石將以善終無可憾者遽屏醫藥至屬纊無一語亂膚色温潤竟日無小異家人幾不忍斂顧非寡欲積善之效耶鑰父子出入太師之門識公甚久既又同朝婦王氏之姪歸康與鑰之次子實爲僚壻稔知公平日大槩故康來求銘康謹愿克孝濡染有自來嘗薦漕臺進學不已是能世其家者銘曰温良恭儉先聖規橅門人從事有無實虛猗歟李公渾金璞玉終始如一慊不自足施于有政如古循良進稱于朝退淑于鄉云胡不弔喪此吉士慶必有餘昌爾來裔知復州張公墓誌銘孝宗龍潛妙選寮寀端明張忠簡公與太師史文惠公實為贊讀直講内禪之際二公翊贊為多文惠既相忠簡為工部尚書告老而歸上意恨用之不盡恩數優渥視簽書樞密院君臣相遇可謂盛矣公諱仲梓字才卿忠簡次子也世為温之永嘉人曾祖稹祖忱贈中奉大夫忠簡諱闡母盧氏累贈魏國夫人公資彊敏少承義方力學博記年十四入上庠時中興學校更新在選多名士已能與之相下上月書季攷率在前列又兩預薦書紹興三十一年以明堂恩補將仕郎非公志也明年授右迪功郎監潭州南嶽廟隆興二年丁忠簡憂乾道五年差監行在豐儲倉九年史公以使相帥福州過闕力薦其才孝宗念舊學之子即日召對閏月改宣義郎三月除大理寺主簿淳熙元年遷太府寺丞四年乞外補知通州七月陛辭因論常平利病敷奏詳明上為之嘉歎問闕在何時以實對即許改除且諭公曰他日莅職毋忘所陳遂改荆南路提舉常平茶鹽公事六年持節入境體臨遣丁寧之意疚心區畫利興害除因劾寮吏之慢令者忤同事意㝷遭論罷公之仕進自此齟齬矣十年主管建寧府武夷山沖佑觀後知江州再知通州俱不赴凡三授祠禄至慶元改元始為兩浙西路安撫司參議官秩滿知復州四年赴郡古號竟陵廢置靡定旁枕襄沔地卑水匯間三四歲僅一熟富商歲首以鹺茗貸民秋取民米大艑捆載而去公至首訪民瘼嘆曰種未入土民已無所告糴可無以處此乎騰書帥漕借所儲粟禁止商販又廣為収糴之計倉廩充實邦人賴之野曠多盜重為民害公分置鄉兵部分嚴整犯者痛懲以法盜為引去期年公感末疾視事不少懈未幾寖革遂以五年十月辛酉卒享年七十有一積官至朝請大夫娶周氏朝議大夫奉先之曾孫視永嘉先生行已為大父行少公一歲先一年二月甲午卒封宜人男三人爚通仕郎既冠而亡次烜燠俱以公任補將仕郎女三人孫一人埴當授公遺澤孫女二人公蚤厯艱苦忠簡晚既貴家事賴公經理性介特不好華飾圖史之外他無長物通經餘暇諸子漢晉唐諸史鈎竒撮要手自抄録所為詩文盈帙簡古䆳深今藏于家既登仕版又再薦于外臺四上禮部竟不偶中間困于煩言才不得試孝宗簡記擢守九江亦不果出卜築謝池陶然自樂終不見戚戚之色家傳有自來矣宜人幼穎悟嫁時公家尚窶相與刻苦以奉忠簡閨門無間言善相其夫者也二子將以六年十月甲申奉公及宜人之喪合葬于縣之吹臺鄉西山法濟院之右來求銘鑰于公家為有連歲在癸未與公之弟尚書公春卿為同年進士獲拜忠簡下風迨官勑局公之季弟延卿為寮公方丞外府居又比鄰客授公鄉後又假守昆仲偶皆家居春卿同列從班公入議幕交情事契日益加厚公之在復春卿以華文閣學士守鎮江延卿為濠州伯兄之子晦之為泰州一門四郡守諸孫秀發人皆嘆忠簡君子之澤夫何公與春卿繼卒于郡逺不能致束芻而駭悼實深故不得辭而為之銘銘曰忠簡深醇求之古人位嗇台輔望壓薦紳君承義方蚤入太學嘗顯于朝卒困流落復政未報而乃忽焉哀哀介弟相隨九原君子之澤其流未已我惟銘之以詔孫子攻媿集卷一百四
