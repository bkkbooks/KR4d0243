body:
  text: 宋樓鑰撰書答楊敬仲論詩解鑰蒙示教詩解以病故相仍近始讀竟荷開發鄙陋至多感歎擊服之餘恨未得一遂請益于門下若夫發明無邪之思一貫之旨天人同心大道至平古説難盡信雖載之左傳者亦不可據爾雅亦多誤大學所引亦有牽合詩序多失經意釋文多好異音詩人諷詠或自包于事實制度名數不盡合于禮典先王皆在商世難拘以周禮文王以服事商不應作禮樂如此類未易槩舉皆前輩之所未發者尤用服膺然惟尊意每不自以為足而欲人之言鑰亦不能自已欲效所見試陳其甚明者正欲反覆論辨以歸至當非恃相與之厚非愛此書之深不及此也葛覃毛詩傳曰覃延也其義未安覃本義深也葛葉大而蔓小故墜焉而深下俗謂墜下曰覃徒紺切而廣韻集韻無此字音釋文徒南切方音不同不可知也而謂延也則未安曰覃及鬼方由中國而覃及之則中深旁淺實有覃義實覃實訏后稷之聲深廣也故水中深旁淺曰覃加水以别其字先儒徒因葛推義釋覃曰延然施即延也無乃重復乎大田以我覃耜覃者深也耜宛然有微深之狀故曰覃耜毛傳殆未親見耜徒見易有剡木為耜之義故以覃為利後儒求其説而不獲又轉音為剡又轉字為䎦今正其字義平聲如字覃爾雅釋言流覃也覃延也郭注皆謂蔓延相被及説文長味也從􅳀鹹省聲詩曰實覃實訏徒含切又篆文覃省潭説文從水覃聲集韻一説楚人名深曰潭潭字在六書中為形聲如江河之從水而工與可止取其聲而無義潭從水覃亦取其聲非有義也潭有深義今之言潭潭是也覃郤無深義字書凡有意者如人為為偽人言為信之類皆入會意之科王荆公字説所以不能傳者往往以形聲諸體皆入會意故有牽合強通之病以葛之蔓延故施于中谷亦未為重復也覃耜之音剡疑是方言集韻以為利耜止以詩傳釋文為據如八月剝棗剝音普卜反荆公以為養老者剝棗之皮而進之後行田野間羣兒相呼撲棗方知釋文之有自來此二覃字更望考之鵲巢維鳩居之爾雅釋鳥云鳲鳩鴶鵴郭云布榖未安音如布榖者不居鵲巢音如鴶鵴者乃居鵲巢為鸜鵒魯昭公二十五年鸜鵒來巢而公如乾侯此亦假他巢之應也故文成之世已有童謡曰鸜鵒跦跦公在乾侯矧鸜鵒亦鴶鵴之音凡鳥名多用其音埤蒼云鴶鵴方言云戴勝今審究戴勝首有竦毛鸜鵒亦有之而鸜鵒身色黑戴勝身色毼而稍長大豈埤蒼考之未審歟布榖其音渾然鸜鵒其音亟然穫榖毛毼頭有斑者李氏亦以鳲鳩為鸜鵒多識鳥獸草木之名考之當如此之詳然鳲鳩之為鸜鵒甚明浙人呼為八八兒川人呼為阿八所謂音如布榖者乃今斑鳩俗謂之步姑其性雖拙粗能為巢戴勝首有竦毛向後鸜鵒竦毛直上又自不同鳲鳩之刺不一正謂鸜鵒也郭景純云布榖固已失之歐公言拙鳩極然不知此乃鸜鵒吕氏具載皆未當也簡兮日之方中在前上處將祭習舞以日中為期碩人在前列上處方中將中也碩大也大德之人俁俁德容也前輩曾云日之方中則明而易見之時在前上處則近而易察之地君猶不能見況幽逺者乎此意甚切氓于嗟女兮無與士耽士之耽兮猶可説也女之耽分不可説也耽樂也説解説也今俗説亦以女淫為大醜毛傳云女與士耽則傷禮義鄭箋云士有百行可以功過相補至于婦人無外事惟以貞信為莭然功過相補則士可耽也每疑其害教近得一説無與士耽已是自悔而反正之言蓋其初抱布貿絲來即我謀後又以車來則非女之奔之也其言曰始者以士之耽兮故我今日猶可説也若是女之耽兮則我不可説矣如此則得詩之意又免功過相補之害教也兔爰雉離于羅雉文明比君子非為其文明也羅之設所以取鳥獸兔狡如小人爰爰緩行不至觸冒雉性耿介多罹其中世亂網密小人多幸免而君子多陷于罪言文明則意差蘀兮此詩凡言女皆指君也女者愛之之辭民勞王欲玉女是用大諌此意尤明又卷阿俾爾彌爾性之類不惟是愛君如古之稱我為朕未至如秦以來分别之嚴也出其東門聊樂我員我自有員姓者吾妻也此説未然毛鄭不解員字疏言樂我心云耳云員古今字助句辭也唐員半千齊州人其先本彭城劉氏十世祖凝之事宋為起部郎及齊受禪奔元魏以忠烈自比伍員因賜姓員古無此姓也況此詩解內云陸德明以爾雅云徂存也牽合上章思存改且作徂甚無謂也且語助也于義自通何必牽強又改字以此知員亦語助耳侯人維鵜在梁不濡其翼不濡其咮鵜鶘啄長尺餘頷下胡大如數升囊羣飛入水食魚今也在梁不濡其翼咮長如此而亦不濡是當食魚而不得食喻賢者宜得祿而不得祿歐陽氏曰此鵜當居泥水中以自求魚而食今乃邈然髙處魚梁之上竊人之魚以食而得不濡其翼咮如彼小人竊祿于髙位而不稱其服也鵜不當以喻賢者不若歐陽氏之説為長不遂其媾小人富貴縱肆好色淫恣而棄其婦媾婚媾也毛氏曰媾厚也張氏曰不遂其媾不稱其寵待也今人謂遂意亦曰稱意薈兮蔚兮南山朝隮婉兮孌兮季女斯飢董曰集注作嬒蔚文也南山朝隮蝃蝀也人莫敢指者乃隂陽交感不正之氣南山喻在高位朝隮喻淫縱淫縱者惟其意所溺固有其妻雖婉孌而自不説者如衛莊薑雖美而不見答蓋不樂于靜正而放于情欲季女者年少之義以其未嘗相親如不為婦也故曰季女不説之則失所至于斯飢矣張氏詩曰林木南山薈蔚時工斤樵斧竸朝隮舉知趨利青冥上不念幽居季女飢陳氏曰壯者趨利于山則弱者餒窮于室小人肆志于上則君子困窮于下張陳二説雖未必盡得詩人之意然其説猶雅馴今為一媾字一嬒字又婉孌季女遂生此説然朝隮實非蝃蝀也彼蝃蝀之詩首章曰蝃蝀在東莫之敢指故次章曰朝隮于西崇朝其雨至今朝日在東則虹出于西夕日在西則虹出于東鮮有見于南者且此詩初不言虹而徑以朝隮為蝃蝀則不可既曰季女如有齊季女而曰如不為婦亦覺費辭若以南山喻髙位朝隮喻淫縱亦不成詩語宜有以更之七月一之日觱發二之日栗烈觱發者寒氣徑發萬籟盡鳴如觱栗也野俗有語籬端吹觱栗謂烈風吹籬端之虛管作聲也栗烈者丑月寒氣益烈人股戰栗也毛傳謂栗烈寒氣也其以是歟毛氏曰觱發風寒也栗烈寒氣也王氏曰風而寒尚非其至也無風而寒于是為至只如此説足矣觱栗乃胡樂一名悲篥一名笳管羌胡龜兹之樂也其聲悲栗胡人吹之以驚中國馬後世樂始譜其音以為衆器之首周時安得有此俗語尤不足取股戰而栗漢人始有此語二之日鑿氷沖沖鑿氷之時擇沖和之日慮寒氣之傷人也豳公之愛民如此毛氏曰沖沖鑿氷之意孔氏曰沖沖非貌非聲故云鑿氷之意左傳曰深山窮谷固隂沍寒于是取之豳尤寒盛冬安得有沖和之日不如只從毛説東山鸛鳴于垤婦歎于室毛傳曰垤蟻冢也將隂雨則穴處先知之鸛好水長鳴而喜也孔疏曰將雨則蟻避濕而上冢鸛鳴于垤詩意與零雨其濛同婦歎于室聞其夫將歸感傷而歎也毛公齊人必自知之解不甚詳孔疏亦未明皆不見于垤之義惟胡德輝珵蒼梧雜志言之最明云新經釋鸛鳴于垤謂垤為丘垤非蟻冢蓋荆公未嘗到山東蟻冢有極髙大者如冢墓然每天將雨則鸛集蟻垤而鳴蟻知雨鸛喜雨以其類也方説得于垤字分曉正以雨將作故婦歎于室如殷其雷之意正念其勞也若我征聿至自在下句婦歎于室意聮于上孟子所謂丘垤以是知丘是自然髙處垤乃蟻冢下王洪盤馬于蟻封亦謂此也狼跋老狼有胡進則躐其胡退則跲其尾周公欲進則成王未授公以政如狼跋其胡欲退則又深念民人社稷之重欲退不可如狼疐其尾周公雖進退不可亦何至如狼之跋疐故程氏有云狼獸之貪者猛于求欲故陷于機穽羅縶前跋後疐進退困險詩人取之以言狼之所以致禍難危困如是者以其有貪欲故也若周公者雖在危疑之地安步舒泰赤舄几几然也又云先儒以狼跋疐不失其猛與周公不失其聖猛奚若虎豹胡獨取狼也詩人比興以類是以香草譬君子惡鳥譬小人豈有以豺狼興聖人乎程氏之説美矣然詩中無機穽之意猶未為盡也嘗得其説于蜀人楊少卿民望云狼之遇人先旋繞于人之四旁甚疾人為之戰懼自失然後食之詩人蓋以狼之跋疐比四國而周公處其中不懼也此説最為得之常棣儐爾籩豆飲酒之飫兄弟既具和樂且孺妻子好合如鼓瑟琴兄弟既翕和樂且湛孺有柔義兄弟既具猶曰皆在于是和樂且柔孺言辭氣柔巽也其妻其子情好合同言夫婦父子和順孝慈如琴瑟之和毛傳曰翕合孥子也湛和樂之至此解亦平然説詩意未出此詩極言兄弟之間如伐木極言朋友之間前章引陳曰兄弟之急難相救助如此及其既安寧乃謂兄弟不如友生乎此正詩之本意也此二章言凡人以儐爾籩豆飲酒之飫為樂若兄弟既具如謂兄弟無故其樂又何止籩豆飲酒而已其和樂又且如孺子之真情如孺慕之孺有不可解于心者凡人妻子止以好合尚能如鼓瑟琴之和若兄弟翕合而無間其和樂不足以盡之又且湛矣如湛酒湛色然如此方見詩意六月棲棲六月建巳之月也棲淒也淒淒有泠意時有麥秋之寒也毛氏曰棲棲簡閲也蘇黃門曰棲棲不安也李氏曰與論語栖栖同注栖栖猶皇皇言其不安也雖未為定論然以為棲棲有泠意麥秋之寒則不可俗諺云江南兩浙春寒秋熱若中原北方則立春便溫和入夏便熱入秋便涼冬則極寒宣王在西周四月豈復有泠也車攻不失其馳舍矢如破惟善御者兩驂不猗雖馳而一無所失此一段不盡其義蘇黃門曰四黃既駕兩驂不猗御者之善也不失其馳舍矢如破射者之善也蓋不善射者必待御者為之詭遇則獲故王良為之範則嬖奚不能獲一惟御者不失其馳而舍矢如破方見射者之善不惟此詩意明孟子一段亦皆焕然吉日既伯既禱毛傳曰禱禱獲也禱未必為獲也云云禱者禱其無傷人也弓矢驅馳之間或偶傷人故禱歟毛以禱為禱獲固已贅矣此謂禱其無傷人亦未為的當將田而用馬故禱于馬祖不必専為獲亦不必専為求無傷人與廄焚不問馬之意不侔漆沮之從禹貢雍州漆沮既從從者從入渭水然則天子之所其在渭漆沮之會歟漆沮既從禹貢自説治水此詩自説從漆沮驅禽而至天子之所似不必泥此從字庭燎毛傳曰庭燎大燭也云云秋官司烜氏凡邦之大事共墳燭庭燎故書墳為蕡鄭司農云蕡燭麻燭也然則與庭燎有異焉今俗曰盆者庭燎歟麻滓也音詵毛傳以為大燭未安今説亦未安乃麻餅毛謂大燭司農謂麻燭皆是也古者如男子夜行必以燭童子隅坐而執燭又如顔叔之秉燭非如今之蠟燭也凡點火而明者如麻骨樺皮松明之類可以照者皆謂之燭今祭祀所用庭燎以麻骨一大束立于地而然其上照耀一庭故毛謂之大燭司農謂之麻燭卻非盆也斯干如跂斯翼如鳥之跂立而張兩翼鳥首如棟甍兩翼如二霤孔氏曰如跂如人跂足直立若如今説下三句已言如矢如鳥如翬矣不應又以跂為鳥之跂不若只用舊説如人之跂立翼言其翼然不必謂鳥之翼也小旻人知其一莫知其他不敢暴虎不敢馮河此固膚近柔懦之士所執常論然而人知其一莫知其他不知聖智所及當大有為亦無所懾但聖智雖不懾亦無慢易忽略而亦戰戰兢兢范氏曰人皆知虎不可暴河不可馮而不知小人之不可不畏臨深履薄懼之甚也此説似勝不必更加委曲也小宛交交桑扈率埸啄粟哀我填寡宜岸宜獄握粟出卜自何能榖桑扈名竊脂食肉之鳥也云云今不得食而率場啄粟喻食肉富貴者今猶失所困乏而況于疹病孤寡貧弱之徒宜其尤甚于入犴獄也云云民窮苦握粟出卜問曰何自而能榖善耶此章言貴賤皆困窮前輩大率如此説意既不屬亦覺其言泮涣桑扈竊脂爾雅釋鳥自有兩義非名竊脂也其曰夏鳸竊玄秋鳸竊藍冬鳸竊黃桑鳸竊脂棘鳸竊丹者竊皆訓淺注竊藍青色然則竊脂謂其色淺白也其前又别有兩句云桑鳸竊脂鳭鷯剖葦注云食肉好盜脂膏蘇黃門古史序有云聖人之不為不善如騶虞之不殺竊脂之不榖小宛正謂此竊盜脂膏之義此章蓋言遭誣陷而無告者桑扈食肉而謂其率場啄粟可謂是非顛倒矣惟其填寡宜乎陷于岸獄也此事甚易見試握粟以卜之謂握粟以試桑扈彼何嘗能食榖乎言是非在目前分明如此而上不能察若以為卜筮之卜則意差矣何人斯維暴之云詳觀是詩非刺暴公也刺其從暴公者也此詩之序必有所傳詩不言蘇而序言之一詩中只有維暴之云一句不知果暴公否鄭氏以蘇暴皆畿內國名孔疏云蘇國在河內溫縣是東都之畿內也春秋為公者多是畿內諸侯遍檢書傳未聞畿外有暴國今暴公為卿士明畿內此説亦不定記得鄭漁仲曾辨此云周之畿內無所謂暴者更當考巷伯捷捷幡幡幡幡者隨風翻覆反覆不定之狀如此幡幡誠有反覆之意然謂之隨風翻覆則是今釋道所立之幡也恐古無此秦已有幡信之書未知幡信起于何代更考北山或王事鞅掌在腹曰鞅此詩士子其職卑矣其鞅在掌方駕車馬故任此勞故世以煩勞為鞅掌毛氏曰鞅掌失容也孔氏曰鞅掌煩勞之狀只須用孔説今説頗迂韅靷鞅靽皆在馬之身惟轡則在御者之手鞅既在馬腹如今之肚襻不應在人之手掌也陸機草木疏機當作璣非晉之陸士衡也吕氏讀詩記皆作璣又答論易鑰何敢言易間有聞見輒以一二求教兹蒙下問以口耳之所得録呈恐可以少裨聰明坤元亨利牝馬之貞坤利牝馬之貞説者止謂取其順爾曾不知聖人取象皆曲有妙理禽獸之牝者皆順惟牝馬之性最貞遊牝率以一牡引十牝雖雜以千百苟非其偶他牡犯之則踶齧不可近坤之卦雖主乎順惟其能貞乃成地道故曰至柔而動也剛至靜而德方也妻道臣道豈曰順而已哉答張正字論莊子書鑰比自同朝初欲相親而未能髙才飽學深藏若虛亦不可得而親也後始得稍稍承教蒙以莊子講義借示遂得以窺見素藴每切感歎謂請益未艾也忽爾去國為之恍然亟令傳寫元本九册謹以納還伏幸視至聞尚留關外無由執别尤增悵惘平時讀蒙莊之書安能如執事用功之深士友來言處得喪之際鼻間栩栩則造詣可知略閲講義開發為多然亦有一二鄙見疏之别紙更望示誨治萬里之船何時可行尚容别布今之隱几者非昔之隱几者也郭象云子遊常見隱几者而未有若子綦也非也講義略之此意甚妙方子綦隱几而臥未有以異于人也仰天而噓嗒焉似喪其耦則講義所謂超然萬物之表而萬物無與為對者也隱几雖自若忽然有覺則今之隱几者别是一人非適之隱几者矣昔猶適也故子綦善其問且曰今者吾喪我吾遇天難講義云天難注與疏皆不解按易雲雷屯剛柔始交而難生動乎險中則天造之難也竊尋上下文恐不為此前曰天忘朕耶後又曰天降朕以德則是雲將謂鴻濛為天矣講義亦云雲將再見鴻濛而謂之為天蓋天其施也前則雲將三問而鴻濛曰吾弗知又三年願聞一言而鴻濛遣之使歸不盡告也故雲將曰吾之遇天可謂難矣故願聞一言而鴻濛始告以心養等言不必求之屯卦也以瓦注者巧以鉤注者憚以黃金注者昏講義云以操舟博塞明之又云博塞之事以瓦注為戲則得失之心忘而其智巧以帶鉤為注得失之心漸重而憚以黃金為注則得失之心愈重而昏今之博者謂所出錢物為注王冀公所謂以陛下為孤注是也然莊子前此説操舟本無博塞之言而博者亦不至以瓦為注蓋注者抵擲也謂如玉抵鵲金抵竈之類試欲抵物以瓦抵之則巧以鉤抵之則已有憚心以黃金抵之則必不中此所謂外重則內拙也鉤亦刀之異名如吳鉤是亦不必帶鉤也答徐丞適書鑰比為從弟致謝承報章甚勤且蒙示惠忠壯公事實伏讀不勝歎仰靖康之變死事者寡世以為恨逮五路之失執節守義者衆人以為關陜多豪英而然若忠壯生于太末而忠勇兩盡是無待而興者也馮通奉之狀之誄范君之傳皆能以雄文發幽光足以傳不朽矣惟後篇稱蕭參政奏請者乃王仲言明清揮塵第三録第二卷具載此文自竊惟國家而下至少厲偷俗之弊則仲言所見而失所著人姓氏者也自此紙頃歲而下至有道處士迥之兄也則皆仲言所述也蕭參政臨江人恐或者謂李邈是其鄉人而為此奏是又不然此文之作蓋是朝廷未知三人之時據馮公之狀建炎三年十二月忠壯死事明年賜諡贈節度而蕭公乾道始仕于朝為宫教至淳熙始居言路登政府不應始有此奏今當易去蕭參政某奏請六字而改題云王通判明清揮塵第三録則為得之恃臭味相與不自外如此若更以程北山所作志銘編入則尤為全備也併幾垂照攻愧集卷六十七
