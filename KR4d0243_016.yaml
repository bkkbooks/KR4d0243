  text: 攻愧集卷十六
  hash: sha256:ee49f44774c3b34674462b94dfaebb900c8cf5dfcc3eb45e6fec8243647fd771
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_016-1a}
body:
  text: 宋樓鑰撰表箋謝溫州到任表起家為郡俄及成時便道之官巳共侯度戴睿恩而甚厚宣德意以具孚中謝伏念臣一介書生纍朝世祿當聖主飛龍之始偶玷末科簉明時振鷺之班每安平進久預憲章之筆削屢參史牒之編摩嘗佐治于遍州復勾稽于列寺天府式邦財之重司宗書帝系之繁比終素韠之期忽冒朱轓之寄惟此東甌之勝實為左浙之雄頃任冷官兹叨假守山川如故風俗粗諳雖無竹馬之迎頓起蒲鞭之望以前日待諸生之意加惠斯民于此邦揚泮水之波廣為膏澤要令上下俱無所茍且庶幾田里寖銷于歎愁兹蓋伏遇皇帝陛下深軫黎元敷求長吏謂臣洊登王國必能弘惻怛之仁念臣四對天顔固無俟丁寧之諭是以左符分畀不待朝參嚴旨趣行免加臨遣幸遂養親之志實勤戀闕之私臣敢不律己奉公平心待物惟忠惟孝誓堅終始之誠濟猛濟寬務勉中和之政謝中書舍人表史筆屢書深慚無補綸闈久假遽命為真嘗控避而弗俞竟周章而就列中謝伏念臣受才譾薄涉世闊疏偶承纍葉之儒科寖預淸朝之官使往分郡寄何有民庸當壽皇御極之時曾四登于文陛逮聖主臨朝之始遂三入于修門首汙郎省之聯旋備賢關之式貨泉出納粗謹攸司寶牒纂修伏尋故步晉班左墄攝事西垣記注非工有愧螭坳之直詞章至陋殆為鳳閣之羞矧執愚之不移或遇事而輒發妨賢巳甚忤物且多方喜懼之交懷恐顚躋之未免力求引退敢覬褒升才思欲枯安得湧泉之敏身章增煥更貽濡味之譏茲蓋伏遇皇帝陛下翕受羣言旁招衆俊謂臣粗親小伎故使當訓誥之司察臣素廪朴忠或可效涓埃之助考于詳試有此誤恩臣敢不思稱所䝉益共乃位言惟作命少裨雷風鼓舞之神忠以事君當謹朝夕論思之職謝壽皇聖帝表柱史充員久虞幽黜詞臣掌制遽忝超除揣陋質以無堪望慈宸而知幸中謝伏念臣頃叨末第巳出異恩再玷周行惟自安于平進仰承淸問嘗屢貢夫愚忠出分海嶠之符入就星曹之列聖作明述親見盛時年除歲遷寖塵清貫書言書動慙無載筆之功如絲如綸徒積代庖之愧將以外庸而自詭乃叨親擢以為真退省僥逾益增戰栗兹蓋伏遇至尊壽皇聖帝陛下達源繫表探賾古初齊聖廣淵居域中之有大危微精一為天下而得人式詒燕翼之謀茲見儲才之效肆令么䯢猥預論思臣敢不深念遭逢誓堅操守仰戴兩朝之眷敢務苟容願殫千慮之愚以伸忠報謝給事中表充員詞掖久懼罔功進職瑣闈忽驚誤渥辱訓辭之甚寵揣分量以奚堪中謝竊惟封駁之司實關出納之要詔敕之布咸仰君相所為有唐則許塗竄而奏還本朝則令詳酌其可否宜求人望以贊政經豈伊妄庸乃與詮擇伏念臣迂愚自信執滯不通秉筆螭坳固有慚于良史演綸鳳閣曾何取于陳言屬兼直于禁林幸親逢夫興運書詔填委靡容晷刻之淹號令流行欲助風雷之迅僅無乏事安敢辭勞荷簡記于宸衷俾驟膺于夕拜不攺北門之舊族仍東觀之華加賁身章增光從橐茲蓋伏遇皇帝陛下勵精初政垂意羣才用舍之間初無適莫論奏或至不吝改更知臣備歷險夷粗有愛君之志謂臣素懷憃直願殫論事之忠遂致孤蹤亦叨隆委臣敢不俯思幼學務勉後圖親年益高但有歸耕之意主恩未報尚希批敕之風謝權吏部尚書表充員瑣闥自顧罔功攝長銓衡忽䝉誤寵仰皇慈之至渥揣微分以何堪中謝竊以選部持衡夙號六卿之長文昌聽履實為八座之聯非素推公方不足以柅吏姦非妙有德望不足以壓輿論雖黃散之下無忝異同而搢紳之流鮮不關繫宜求精敏之彥以當要劇之司伏念臣才不逮人學徒泥古一為支郡三入修門久侍上皇愧愚忠之無補親逢嗣聖荷褒擢之有加代言非陸贄之工批敕謝李藩之器俯徇芻蕘之論屢寬鈇鉞之誅去省眼者五年遂躐登于冢宰離班心者一載遽首列于後臣禁林兼內制之文史館涉信書之筆滿盈巳甚控避莫回頒御府之襲衣益之鞶帶駕天間之良馬覆以雕鞍但喜悅親之私敢云稽古之效茲蓋伏遇皇帝陛下多能天縱盛德日新搜舉異才踵登持槖之選優容棄物獨負吹竽之慙宜黜而遷以榮為懼臣敢不深思僥冒勉竭疲庸為山公啓事之書知非所及守崔亮停年之格何足言勞尚幾典選之平少助官人之道謝兼侍讀表升班文部方虞典選之難進讀露門更辱兼官之寵循牆莫避據蒺是憂中謝竊以帝王之興必以學問為急如懷素元量之選本為覽史之資由宋綬夏竦以來始有讀書之職仰惟睿聖光紹炎圖首開講帷詳延從槖考邇英之舊加賜坐以甚優于共膳之餘俾侍言而更入首閲三朝之寶訓次觀先正之奏篇宜求鴻博之儒以助緝熙之學如臣至陋涉世多艱豈期纍歲之推遷寖歷明時之華要詞垣翰苑代王者之敷言史觀經筵極書生之榮遇況從夕拜擢置天官朝入君門方被宸綸之渥暮歸私室又驚渙汗之頒是何遭逢有此僥冒茲蓋伏遇皇帝陛下勵精庶政埀意多聞廣厦細旃許奉淸閒之宴裒衣博帶不違咫尺之顔自古所稀于今獨盛猥令末至躐冠羣賢臣敢不紬繹舊章勉圖微效海涵天覆或容草芥之忠日往月來庶有毫釐之補謝顯謨閣直學士知婺州表典選無聞方上便親之請承流巳試載叨出守之行寵躋延閣之班增賁輔藩之寄祗膺明命倍激危衷中謝伏念臣奮迹孤單逢時休盛昨自東嘉之收召尋登左省以推遷代言慙潤色之工封詔乏塗歸之效及夫紬書視草勸講掄材皆儒者之至榮豈生平之敢望叨誤恩而踰分致私室之挻災重貽慈母之憂益動故鄉之念力祈閒退仰賴矜從侯邦分寶婺之區學士寓文謨之直繇常伯而出于故事或有此除考公論之歸在小臣恐非所稱莫遂循牆之避徒深戀闕之誠茲蓋恭遇皇帝陛下覆育羣生敷求長吏察臣昔當一郡拊摩粗竭于微勞念臣今歷三朝進退欲全夫素守俾司乃牧俯便其私臣敢不欽服訓詞益思砥礪五百里曰甸不違咫尺之威二千石惟良少展涓埃之報謝中大夫表由選部以守藩方陳祠請因年勞而進秩更沐綸言祇拜以還感銘何極中謝伏念臣生逢聖主世受國恩雖歷任纍朝幸相繼百年之外而傳家三葉俱弗踰六品之階敢期後嗣之微乃越先臣之舊共承遺訓未知聞詩聞禮之言追仰前蹤徒有慙長慙卿之誚豈特一門之幸實為千載之逢茲蓋伏遇皇帝陛下優待臣工仍嚴銓法三年考績既容賞典之參一體疏榮爰示禁途之寵臣敢不激昻素守銜戴隆知漢議方興愧乏倪寬之對淮陽既遠敢忘汲黯之忠謝提舉江州太平興國宮表分共理之符敢起一麾之嘆廪祝釐之祿終俞三請之辭盡出上恩獲伸素志中謝伏念臣禀資至陋涉世最疏誤䝉三聖之知寖躐六官之長輟金華之講而為金華之守曲從外補之求由學士之直而寓學士之班仍冒親除之渥巳過家而上冢將叱馭以登途屬以母老易危暑行致疾羣醫俱試百口相驚亟上需章謂必嬰夫嚴譴首班溫詔乃許緩于官期感泣之深憂惶實切率更旬浹又露忱衷特寬方命之誅竟允奉祠之願仰隆私之過厚誠近代之所無去魯行遲難效齊邦之接淅報劉日短幸容李密之陳情茲蓋伏遇皇帝陛下仁本愛人孝先錫類凡加識拔舉無簪履之遺苟有懇祈俯詢芻蕘之賤使退安于貞館得娛侍于慈闈臣敢不銘著肺肝躬陳菽水況此塵勞之久少休疲曳之餘凱風自南獲遂奉親之樂衆星共北誓堅報主之心賀重明節表元年慶元述者明作者聖方兼備于孝慈一曰壽二曰康宜大來于瑞慶兹逢誕節倍激忱衷中賀恭惟太上皇帝陛下玩道希夷儲神蠖濩尊居特室成三朝脫屣之高坐閲皇齡受萬歲奉巵之養功隆太極事越古初當今賓鴈之時際此流虹之旦慶綿宗社歡動宮闈臣久玷從班適叨外補天街簇仗莫陪豹尾之中海嶠傾葵仰望龍樓之表賀瑞慶節表神策紀元方懋繼承之烈流虹啓瑞載逢震夙之期凡屬照臨率均抃舞中賀恭惟皇帝陛下聰明冠古歷數在躬纂列聖之丕圖謹三宮之色養益仰守成之美日聞典學之勤良月就盈爰輯大來之慶從天難老坐隆不拔之基臣竊食祠宮馳神天陛修菽水之敬既諧潁谷之私奉香火之緣敢效華封之祝謝再任宮觀表祠庭既廪其命維新敕牒臨門從天而下恍不知其何自凛欲受以猶驚仰惟異恩敢不祇拜中謝伏念臣才非適用學不知方幸逢熙洽之朝寖冒淸華之選四載預論思之列無補毫釐平時于出處之間粗分尋尺始因請外亟畀輔邦旋以便親力求貞館塵瀆蓋高之聽俱䝉從欲之仁繼辱簡知再叨共理不圖出守乃復一麾來者猶可追惟闔門而退省觀其所以養敢謀食以自營重尋香火之緣盡出冕旒之眷惟廬阜棲真之勝自熙陵紀年而來竊祝釐之虛名得與釡之實惠喜同毛檄歡動萊衣茲蓋伏遇皇帝陛下覆載無私照臨丕顯選搢紳之髦士咸與明揚念簪槖之舊臣未嘗終棄賦以斗升之奉增以儋石之儲臣敢不益體洪私誓堅晚節為子華之母而請粟寧待人言班周室之祿以代耕實銜君賜賀皇子降誕皇帝表天啓昌期方侈三宮之慶國生元嗣實隆億載之基溫詔四馳歡聲一律中賀竊以本朝之傳列聖古所未聞長嫡之出中闈今方再見況五世高曾之上壽當三朝揖遜之盛時首開長發之祥益茂無疆之祉恭惟皇帝陛下仁霑動植德冒華戎堯帝聰明既親于九族周家忠厚宜見于百男爰稽熊夢之占允協燕禖之吉事關宗社喜浹穹祇臣頃玷從臣幸休真館拜殿陛之名表莫綴鴛班誦朝廷之德音敢同鼇抃太上皇帝表尊居慈扆方均萬國之歡慶篤神孫益衍四朝之盛宮闈喜溢海宇恩深中賀竊以漢甘露中嘗有甲觀命名之愛唐開元際亦稱三日臨澡之儀曾未有視黃屋以非心見緑車之載育恭想天顔之悅咸欣帝系之昌恭惟尊號太上皇帝陛下道體純乾功參太極傳神器而與子為天下而得人仁聲素洽于編民福祚遂綿于世嫡克岐克嶷含飴自適于聖情曰壽曰康戲綵愈隆于色養臣曾從屬車之後遙瞻特室之嚴奏未央五日之朝阻陪下列效嵩嶽三呼之祝徒罄微衷太皇太后箋慈尊無上方歌眉壽之隆慶系有傳及見耳孫之育古今創覩中外均歡中賀恭惟尊號太皇太后殿下化始周南德同坤厚翊中興之運母儀坐閲于三朝濬長發之祥帝統遹觀于五世備壽富康寧之福形覃訏岐嶷之歌仰推育夏之原是啓生商之瑞臣叨塵禁路退奉祠庭春而秋秋而春孰計後天之算子又孫孫又子益延過歷之朝皇太后箋居壽慈之宮仰尊祖后歌震夙之雅誕育曾孫兹振古之未聞亦本朝之初覩中賀恭惟尊號皇太后殿下德先恭儉性本仁明親見堯舜禹之傳共循一道上有姜任姒之聖宜致百男果慶中闈遂生元子惟天心之眷佑成國勢之安彊臣祗奉真祠阻陪賀版本支百世方欣五世之同堂壽考萬年坐看卜年之過歷太上皇后箋思齊文母嫓慈極以俱尊於赫湯孫由中闈而載育仙源有自聖統其昌中賀恭惟尊號太上皇后殿下德茂塗山禮隆渭涘上皇與子贊成脫屣之高聖主奉親倍喜含飴之樂當漢觀命名之始想唐宮臨澡之同四方流聞萬口交賀臣嘗叨持槖退獲奉祠移壽康之班莫預千官之末衍雲來之慶更綿百世之期皇后箋位正柔坤將行冊禮祥開洊震首行天材上承列聖之休益侈重闈之慶中賀恭惟皇后殿下世傳勳閥德應帝姻帶弓韣于禖前允協燕祠之瑞設桑弧于門左果符熊夢之占三宮喜嫡長之昌萬乘啓元良之正稽前朝而嘗見在今日以增光臣退處衡門阻趨祕殿壽如山升如日願賡歸美之章衣之裳弄之璋更獻多男之祝賀重明節表二年慶元黃屋非心坐撫重離之節玉巵為壽適臨載震之辰慶溢宮闈歡均海宇中賀恭惟尊號太上皇帝陛下仁心愛物德澤在民天下為一家既全揖遜之盛域中有四大獨冠古今之尊明繼聖而帝業愈隆子生孫而宗支自衍咸啓華封之祝想聞漢殿之儀臣恪奉外祠遙瞻慈極嵩呼萬歲莫陪就日之班花覆千官猶預需雲之宴賀瑞慶節表虹流電繞式符長發之祥地闢天開方際中興之運一人有慶萬壽無疆中賀恭惟皇上陛下受命皇穹紹休列聖問之朝問之野莫知神化之方作之君作之師獨得道原之大惟此就盈之月是為載夙之辰仰三宮燕吉之歡衍億世延洪之祉臣叨陪法從得奉真祠帝所遙瞻敢作鈞天之夢廷紳布列想聞嵩嶽之呼賀奉上夀聖隆慈備福光佑太皇太后壽成惠慈皇太后聖安壽仁太上皇帝聖安壽仁太上皇后冊寶禮成皇帝表尊處九重莫先于孝治慶綿百世俱上夫隆名誠振古之未聞喜當今之獨盛中賀竊以加光佑惠慈之號既歸二后之尊崇聖安壽仁之稱仍謹雙親之奉縟儀具設綵仗交輝天地為之淸明宗社于焉鞏固恭惟皇帝陛下日行舜德思廣文聲謂治國必自齊家惟篤近乃能舉遠矧當旋乾轉坤之始克躬問安視膳之勤乃因萬國之歡用顯三宮之懿臣屏居東甬寓直西清澤笏彯纓雖阻陪于鳯蹕範金鏤玉徒想望于龍樓太上皇帝表備九重之色養祗奉慈仁得萬國之歡心載揚顯號皇儀具舉孝治彌光中賀竊以聖聖相承本朝為盛安安克遜三葉尤隆惟壽居五福之先惟仁在四端之首尊無與二固不可以易言蕩無能名要當舉其大者恭惟尊號太上皇帝陛下躬帝堯之盛篤仲尼之恭廣大之配乾坤宜享延洪之算忠厚之及草木益昌積纍之休仰睿聖之韙明極愛欽而盡道親奉範金之寶首披鏤玉之篇兼衆美以特書粲彌文而相接凡居覆幬罔不瞻依臣頃侍詞垣兹歸真館飾琚瑀珩璜之佩莫陪天仗之朝聞鐘鼓管籥之音尚想龍樓之曉太皇太后箋尊處東朝坐見魯孫之孝治禮嚴北闕載加文母之鴻稱大冊告成本朝增重中賀竊以壽先嚮用具著箕疇聖本思齊是歌周雅慈為三寶之首既以益隆福者百順之名又皆兼偹茲仰鋪張之盛彌光保佑之功恭惟尊號太皇太后殿下德厚柔坤道參太極堯舜禹之相授贊睿斷于宮中姜任姒之俱賢播徽音于宇內隆興而後四舉縟儀紹熙之間洊修盛事矧親提于神器付託得人宜首上夫瑶編祗承于帝歡傳有載燕及無疆臣嘗玷從班欣逢矌典宮闈再闢想聞天仗之來賀版羣趨莫預廷紳之後皇太后箋鏤白玉之牒上徽稱于慈尊建翠華之旗藏縟儀于聖代歡傳宮壺慶浹垓埏中賀恭惟尊號皇太后殿下德嫓娀㜪聖齊任姒再世揖遜實參決于廟謨三宮康寧爰竝崇于色養惟神孫之盡孝仰祖后以承休取仲尼五美之言明老聃三寶之訓用形容夫懿範以昭著于彌文臣退處海瀕阻趨天闕瞻壽慈之新榜莫預班聯歌思齊之首章第勤頌禱太上皇后箋寶冊誕揚仰奉慈闈之懿徽稱備舉益增母道之光宗祉愈隆華夷交賀中賀恭惟尊號太上皇后殿下聖齊任姒德嫓皇英方綿四方之休親受九州之養王母之坐少廣壽固無期騶虞之應召南仁不勝用仰嗣皇之盡孝極禮典以歸尊三殿交歡萬方同慶臣比叨荷槖兹獲奉祠引振鷺之班莫陪進旅而退旅粲雕珉之牒更聽大書而特書皇后箋三殿祲容俱上鴻名之懿一人孝治端由內助之勤凡屬照臨舉深抃蹈中賀恭惟皇后殿下慶綿奕世位處內朝陰教所覃有卷耳樛木之美柔儀克謹奉長樂未央之尊聿嚴揄翟之衣同上雕珉之冊邦彜有耀家法愈新臣頃玷禁途兹安海嶠側聞曠典但知獸舞之歡遙望昕朝莫遂鳧趨之願賀皇后受冊皇帝表廷揚大冊克備于祲容位正中圍聿嚴于內治歡傳禁掖喜浹編民中賀竊以尊尊親親既極三宮之奉夫夫婦婦是為萬世之基頒制綍于嗣服之初飾褘衣于歷年之後禮文惟稱地道有光恭惟皇帝陛下德本世修合由天作上未央之萬壽方陳漢殿之儀嗣太姒之徽音更篤周詩之慶卷耳之志當佐于君子思齊之聖以御于家邦朝夕永致其憂勤夙夜不忘于警戒于焉正始豈專為恩臣退奉真祠恭聞盛典漢之廣江之永遹觀美化之流行渭之涘洽之陽咸慶舊章之復見皇后箋陳儀楓陛具招丹冊之華正位椒塗光被褘揄之飾事關宗社歡動宮闈中賀恭惟皇后殿下慶襲安陽行高媯汭起家而居爵位蚤締天姻好逑而樂鼓鐘益彰后德密輔九重之孝治仰承三后之徽音盛典告成內朝增耀臣祝釐惟謹竊粟自慚迹雖滯于周南化巳行子漢域禁林草制曾䝉乙夜之觀從橐趨班阻預長秋之賀攻愧集卷十六
