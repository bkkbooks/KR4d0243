body:
  text: 宋樓鑰撰志銘端明殿學士致仕贈資政殿學士黃公墓志銘公諱裳字文叔其先出江夏唐晚徙梓之安泰六世祖曰文友者寶元康定間發粟賑梓劍閬三州飢民所活萬計朝廷特官之文友生阜阜生􅠐􅠐生楰是為公祖壻何氏始籍隆慶之普成考安中居縣東郊顧公齒長恐無所見聞悉捐舊産居邑中不治他事篤于教子母鄭氏繩之加嚴公未冠刻勵激昻登乾道五年進士第調閬州新井尉未赴罹外艱邑子從授業公語以經義又為之講解其後學益詣悉焚其稿服闋授巴州通江尉三年杜門潛究經傳出入古今默而精思或達旦不寐人與語若無聞然于是剖微析幽宏深四達文詞明暢動中律度始時人傳其詩不知其學已成非復前日文叔矣總領趙公公説聞其名俾諸子從之遊賴其束修葬父祖及其諸父兩世九喪已而奉太夫人遊青城無為諸山率賦詩以寄意其純孝幽尚有古風于世淡如也後總領李公蘩復招以往時邊民苦和糴實不得一錢吏且督輸旁午漢中尤以為病公作漢中行以諷與李公意合力奏罷之民大恱公又作罷糴行至今歌之公將之官經紀其昆弟親族之家而後行考滿用舉主關升為興元府録事參軍能以情求獄脫冤死伸無告甚衆終不訊一囚用舉主當改秩制帥留公正薦五士公為之首召對論蜀兵民大計曰蜀中民貧兵困極矣臣思其故有二恨焉關外四州邊于敵境勢便地饒兵火之餘田萊多荒不用屯田積榖之䇿乃榷民以養兵嵗月既深兵民俱困此一恨也邊民仰給外府米運率指沿江若稍分邊屯使就食諸郡外計費省今千里漕粟商因為利幾以三石而致一石名為養兵十萬實養三十萬人兵困民窮職此之由此二恨也今屯田積榖勢已難行分兵就糧事猶可及孝宗下其説卒不果行次論常平賑濟其略曰古人救荒良法不過常平義倉見今官司豈無樁積以一州言之則少以一路計之則多水旱之災決不常有不幸而有決不同時苟甲乙相推遞相賑救則豐凶迭用可以無窮以此救荒似為良䇿又論關外義士人材驍徑緩急可使往年師出秦州鼓譟先登官軍坐視不救遂皆陷沒自今苟遇調發宜令主將自作一軍專攻守之謀任成敗之責明日除國子録未幾太夫人不幸宰相以闕官進擬孝宗怪問黃裳何在因奏其故特賜錢七十萬甫除喪而趣召既至太上已登極公謂守成之主要在恢張志度為先因論大利害凡數千言大略以為古人論創業守成中興謂之三難今陛下雖當守成之時而實任中興之責守成之道必有能為陛下言之者若夫中興規模則與守成不同出攻入守當據利便之勢不可不定行都富國強兵當求功利之實不可不課吏治捍內禦外當有緩急之備不可不立重鎮因論都建康有五利天下大勢終在建康及言方今官雖具而職實不修一當立品式以課其功二當計資考以久其任既建都邑課官吏根本固矣則又據要地立名城環大兵以守之分大臣以鎮之今吳蜀綿亘萬里雖號為重鎮宿師之地受兵之處率三年一易僅同列郡所謂國之藩籬門户者固當若是耶陛下即位之始所與共濟中興者宰相也陛下主其謀宰相任其責用之則勿疑疑之則勿用苟輕用之于始必輕棄之于終别奏國方有大讎大恥大害大憂而為人臣子乃狃于無事忽然忘之此風之成已非一日其要在陛下篤于躬行以感愧之而已矣又上奏曰今日之最弊兵多而食少一也吏多而官少二也變而通之惟當省兵省吏臣以為守備不闕則戰兵可省竊謂沿邊郡守宜悉除用武臣付以民兵責以軍政無事則耕有事則守如此則藩籬固而邊備實省兵之説始可言矣以民兵守雖多而無養兵之費以官軍戰雖少而有可用之實官軍之食可以少增吾民之賦可以漸減豈非至計乎若夫省官之説則當以理論之縱有怨咨寧無曲直夫實邊備則可以省兵執事理則可以省吏使即日行之其效猶將在十年之後苟又不然兵日以衆吏日以多他時雖欲逃怨于目前嫁禍于後日不可得矣公在憂中益熟觀天下大勢至陛對其言條達明切太上異之于是始被簡記除太學博士不敷月改祕書郎又旬日親擢公為嘉王府翊善曰黃裳善論事必能開益皇子公感主知遂以輔導為己任前後凡五年規切諷諌之語無虛日前朝號為能直言如姚坦輩皆所不及後來諸賢講貫切劘亦皆自公發之公講春秋初及王正月曰周之王即今之帝也王不能號令諸侯則王不足以為王帝不能統御郡鎮則帝不足以為帝今之郡鎮即古之諸侯也周之王惟其不能號令諸侯故春秋必書王正月所以一諸侯之正朔也今天下境土比祖宗時不能十之四然猶連跨吳蜀荆廣閩越二百州兵與民分任任吾民者二百州也任吾兵者九都統也中興以來三聖相授苟惟不能統御則何以服之上曰何謂九都統公曰唐太宗年十八起義兵平禍亂今大王年既過之而國家九都統之設豈容不知然則是可不汲汲于學乎公性真率而語疏達上大感悟恨得公晚及講鄭伯克段于鄢公曰段驕而有過鄭伯乃以兵取勝使大王如鄭伯之有段宜如何處之上思良久公曰大王獨不見孟子載舜之事乎象舜弟也舜封之有庳不及以政凡親親之道但當富貴之不可使之預政事此舜與鄭伯之得失也上曰善公因事啓發大率類此他日有東宫舊人除帶御器械詣王府謁謝上接之重輕中節左右咸大驚退以告公公翌日講左氏禮有等衰因問上曰昨日聞大王待某人正得等衰之説有之乎上曰有之人不可無學前日臨事胸中即有區處如有人在心腹間商度也公大喜曰大王之學正當見之處事今日等衰之説即是意也公大抵即某事則以某書言舉某書則以某事合雖所泛論亦必曰前日某書云云或上所未喻又曰某日某書云云上意益嚮因作八圖以獻曰太極曰三才正性曰天文曰地理曰王霸學術曰九流學術曰帝王紹運而終之以百官文武各述其大旨陳之可謂該盡而宏逺矣公每曰為學之道要當體之于身本之于心大王宜以心為嚴師于王心有一毫不安者皆所不可為也凡上所行有一善必誘掖稱贊俾日進不已否則盡言無所諱上謂人曰黃翊善言語亦難堪惟我則能受之每至喪敗危亡之事無不為上精言之上必傾聽上嘗侍宴宫中從容誦酒誥語太上喜曰翊善之功也一日輪對勸太上曰陛下有五美三戒何謂五美曰仁曰誠曰明曰公曰斷公各指事如此如此曰此陛下之五美也何謂三戒曰立規模崇儉德受忠言時太上意主安靜之説因循寖怠而用度賜豫過多忠鯁之士相踵去國故以諷焉後命接伴金使因通兩國名諱而高宗猶稱帝名公曰高宗祔廟已久乃不稱廟諱前實失之安可不改乎令典儀通意使者難之公曰前乎此在二十七朔之內故未遑及今已即吉當互傳廟諱往返數四來使語塞然卒以前例不果從公還奏曰臣以理詰之其辭已順事關國體後遣使人當力議改正太上納其説紹熙二年二月雷雪交作公具封事其略曰謹按易帝出乎震震為雷君象也震本坤體陽自外來交之有動乎情欲之象是以聖人于六十四卦之中凡涉震體者取義尤嚴在復則曰雷在地中先王以至日閉關欲其復之靜也在隨則曰澤中有雷君子以嚮晦入宴息欲其居之安也在頤則曰山下有雷君子以慎言語節飲食欲其養之正也復之靜晝不可以鄭聲撓之居之安夜不可以欲心蕩之養之正食不可以旨酒亂之夫人主起居動息人雖不知而天則知之變異之來豈容掩覆震之象曰洊雷震君子以恐懼修省修省云者謂省己之私也豈時政之謂哉公疏特切深皆人所難言者時求言之詔及館職郎省而不及公不果上四月擢起居舍人未幾瘡發于背告滿百日甫出即直前奏事曰唐太宗最重魏徵一旦至欲殺之凡人主私心非必如好色好貨之類然後謂之私也事苟不出于公而執以己見皆私也私心既生則以諌者為病必求有以勝之勝心既生則以諌者為仇必求有以逐之因私心而生勝心因勝心而生忿心是三物者為之蔽雖以太宗之于徵猶不免況其他乎陛下即位以來臺諌之臣不得其職而去者幾七八輩陛下亦知三蔽之所以然乎且如陛下之待某人本不甚厚徒以臺諌攻之愈甚故陛下庇之愈力陛下之本心亦忽不自知其如此也望陛下靜察吾心勿使有秋毫之私此心既公無所偏係則聞臺諌之言必從何由以勝心臨之待臺諫之情必厚何由以忿心加之乎公久侍王邸一再遷官兼翊善如故見上為學日益因誕日作渾天儀輿地圖以獻皆以木為之因為歌詩勉上進學如天之運行而不息及念祖宗郡國大半陷為賊區乃王心所宜感憤者觀公之志凡可以動悟王意者無不為也居數月除中書舍人制詞坦明人多傳誦公既擢禁從念國家日忘武備勢寖削弱復勸太上以右武為事曰壽皇在位三十年待遇武臣拊循士卒恩意深厚三軍之士至今言者無不感激恨天下無事不得效死以報君父願陛下勿替此意又請權撥鄂渚兵一二萬人分屯襄漢張形勢以備敵公心之素所存者然也天下方恬于宴安公䇿無所施用都人比嵗日夜望車駕之出譁言紛紛公奏疏極論自今宜五日一朝以解中外之謗一疏之中凡六七致意焉尋除給事中同知貢舉未幾除侍講公在瑣闥甫一月封駮之章無慮數十上貴戚宦寺一限以法最後指侍臣進用不當繳論甚切翌日遷公兵部侍郎公不受命堅乞去久之王邸奏乞留公遂除顯謨閣待制專為翊善公始就職未幾瘡復作轉甚連丐去不許病稍差又上封事請車駕即日過兩宫言極苦尋復除公侍講引對便坐又為太上力言父子天性陛下于重華不應有他疑太上徐勞公曰近見嘉王學問殊進應對議論益非前日比皆卿力也公曰臣伎止此朱熹四十年學問陛下宜收召使備僚屬且言王初就傅蜀士楊輔劉光祖相繼在選可復充學官以廣王之聞見太上悉嘉納時太上久不過宫中外莫喻其故侍從同班抗論不已孝宗不豫中外憂危事勢益急轉臣交口諫不聽公復抗聲切諫至號泣隨之宫門閉掩涕而出公自是瘡復作連章請外又請歸田里書再上不報即移疾關外待命兼旬聞孝宗遺詔亟入臨瘡遂大作上即位公病不能朝再除給事中上語輔臣此黃裳舊官宜改擬他職明日以權禮部尚書進上曰獨不可真尚書乎且令兼侍讀上意即欲大用數問公疾如何公力疾入謝出一奏諄諄數千言備極忠愛大略謂書傳所載前古人君如堯舜禹湯文武壽皆百餘嵗在位之日多至五六十年而其所為之事自少至老只如一日至于後世之主享國之日率多不久其間如漢武帝梁武帝唐明皇此三君者得年稍高在位稍久而其平生所為是非美惡如出兩人治亂安危亦全相反此非他故由其持心之一與不一也持心一則始終如一否則有始而無終陛下今日正如涉大川行萬里固未知登岸稅駕之期臣請略舉已行之事諭之且陛下新即大位初臨萬幾虛心忘我委任大臣政出中書萬事坐理此正得人君好要之道使大臣得人常如今日則陛下雖終身守之可也臣恐數年之後陛下應酬日熟聰明日新亦欲出意作為躬親聽斷左右迎合之徒竊窺聖意因而獻説謂陛下委任大臣意非不善然事皆決于外庭權不歸于人主日積月纍恐成亂階陛下聞之能不介然于心乎臣恐是時委任大臣不能如今日矣若不委任大臣必須借助左右小人得志何所不為隂竊主權潛移上意引用邪黨殘害忠良其為禍患何所不至乎臣之所憂者此也陛下深鑒近弊奬用臺諫每有彈劾無不聽從善惡區分綱紀振立此正得祖宗設官之意使臺諫得人常如今日則陛下雖終身守之可也然臣恐自今以往臺諫之言日關聖聽或斥小人之過使陛下欲用之而不能或暴近習之罪使陛下欲親之而不可所言滋多不能無厭厭心既生不能無怒左右迎合之徒竊窺聖意因而獻説謂陛下奬用臺諫本以革弊然臺諫得志遂使人主不能自由陛下聞之能不怫然于心乎臣恐是時奬用臺諌亦不能如今日矣夫朝廷所恃以分别善惡使君子小人不相侵亂者專在臺諫陛下苟厭其多言不復聽用則為臺諌者咋舌閉口無所論列君子日退小人日進而天下亂矣臣之所憂者此也此二事者朝政之大者也若自其切于陛下之身者言之又有大者焉因條舉曰陛下篤于孝愛如是勤于學問如是薄于嗜好如是然臣亦恐陛下自不能保其常如今日也又曰天下之事不可勝言也人君之憂不可勝計也姑自臣所言數事思之其可憂者已如此其衆而臣安得不以為憂乎昔唐太宗老于世故在位日久魏徵猶以十漸戒之一謂其漸不寡欲二謂其漸不愛民三謂其漸不利物四謂其漸疏君子五謂其漸貴異物六謂其漸疑大臣七謂其漸好畋獵八謂其漸輕臣下九謂其漸倦朝政十謂其漸忽水旱使徵生于今時其所以為陛下憂者又當如何夫心者動物易縱難收人主之心又與常人不同溺于富貴放于安逸朝善暮惡固不可保陛下欲求所以持心之説臣請終言之自古及今有治則有亂有安則有危有存則有亡使人主之心常知亂知危知亡則又豈肯須臾自放于安逸之地書曰豫臨兆民凜乎若朽索之馭六馬又曰栗栗危懼若將隕于深淵又曰心之憂危若蹈虎尾此聖人持心之法也世豈有馭六馬臨深淵蹈虎尾而安危存亡之念不關于心者乎凡首末皆主此意公絶筆之作也明日上復召公移坐與語從容良久後數日有旨充明堂禮頓使公疾寖羸不復可出時時獨語曰五年之功無使一日壞之度吾必不可為矣後之君子必有能任其責者蓋憂之深也公連三嵗病瘡至是以積憂故瘡雖損而他疾乘之九月二十四日卒不起方疾亟命子弟秉筆口占遺表大抵不異前奏意曰陛下好為之上大驚詫傷悼即日批出除公端明殿學士致仕他恩禮悉依執政朝廷上下聞公死皆撫手相弔以為國之不幸也丞相為上言至泣下不能已遂贈公資政殿學士所以賻恤之加厚公寬簡樂易不為拘拘平時于利害是非若不經意至忠義所激奮然忘身每論事人主前其氣平其辭切其事核其理盡人但見其發于造次若天機之自然不知其燕居深念索之精而見之切也為人喜思慮樂辛勤而對客輒歡然言笑終日飲酒無算其為學恥一物之不知苟一家言無不與之交而究其説推賢奬善憫孤恤貧蓋出天性外內僅書一十考積官至朝請郎公娶蘇氏繼王氏王氏既喪又連失二孫每語人曰富貴真博禍之具也既病客視公公嘻笑曰僕甚愛田間與耕夫為伍此時稻芋蓊然豆飰藜羮山中之樂真無央也倘得乞骸骨以歸足矣嗚呼公之立朝終始大節如此朝野望公即預大政而天遽奪之壽止四十有九惜哉皇考贈承議郎母妻皆贈碩人一子瑾承務郎女二人許適進士何鏜前進士何伯巽鑰與公同在後省年餘相與甚厚抵掌談世故言議多合各誦所聞終日不倦地相去萬里而肝膽相照傾倒無不盡嘗笑謂鑰曰前後得制詞數篇皆出君手思有以報未能也尚忍言之左史劉公光祖狀公之行瑾以請銘于鑰因盡得誦公遺文高處殆不可及平處亦自有一種風氣至論事之書明白洞達夫人而能知之若其剴切精忠憂深而思遠撫卷三歎使人流涕而不自已也惟左史之作文實事核敬俾載于石而系之以銘銘曰井絡之區為東西川鍾秀在人名士出焉有卿有雲有武有淵三蘇諸范踵登英躔巖巖劍門山險地偏勢連關隴秀氣弗宣涉厯千載扶輿蜿蟺萬山之中乃生斯賢英特雄邁高視八埏輔以學力窮探本源移孝為忠立朝卓然大放厥辭亹亹百篇惟我慈皇識之最先俾侍嗣聖設職惟專官雖屢進職終不遷公能盡忠左右纍年引經據古指事陳前義所當為執之彌堅死生禍福咸委于天神會氣合奉以周旋夾日以飛入侍細旃將降大任忽焉登仙上心震悼恩賁九泉炳炳八圖今置經筵殄瘁之悲心折涕漣嗚呼余嘗評之先見如呂中丞勇決如范蜀公敢言如蘇文忠蓋司馬公自以為不及者公或過之而皆得其全嗚呼尚何言哉惟知公之深者然後以余為知言朝議大夫祕閣修撰致仕王公墓志銘紹興七年有旨王勳召赴行在所三十二年有旨王正已不畏強禦節槩可稱三省詳加訪問其人如在可與甄録尋召赴行在二人蓋父子也先是公之父知湖州長興縣有治聲髙宗皇帝以廣南舶政大弊命二府大臣擇士人修潔者為之樞密沈公與求參政陳公與義俱以為薦既對擢提舉市舶果以清裁著名嵗大疫夫婦繼殁賈胡哀之率錢二百萬為賻公時才冠固卻之且曰吾父以廉直聞吾雖貧旅猶能負喪以歸不愧廉叔度也聞者歎服以為有是父而有是子公在海陵當孝宗皇帝厲精之初既有訪問之寵至淳熙元年詔求廉吏以勵末俗丞相葉公衡方在政府以公辭賻事為稱首又復召用嗚呼人亦有言廉者士大夫之所當為古者在位皆節儉正直故不以廉稱然考之周禮天官小宰以聽官府之六計弊羣吏之治一曰廉善二曰亷能三曰廉敬四曰廉正五曰廉法六曰廉辨説者曰弊斷也既斷以六事又以亷為本然則成周盛時亦以廉為難而況廉恥道喪之久惟王氏仍父子以廉顯父不究于用而子卒為世名卿皆自此發之盛哉公舊名上字從小從真下字言以避孝宗嫌名改焉字伯仁父舊字正之至今以舊字行其先桐廬人六世祖仁鎬仕吳越為明州衙推因家于鄞之桃源曾祖説以學行為鄉里所宗師實五先生之一也以季子宗正少卿珩贈銀青光祿大夫祖玩贈朝奉郎父提舉也終左朝散郎贈金紫光祿大夫母蔡氏元氏薛氏贈武陵永寧普寧郡夫人公蔡出也事後母尤謹幼警悟少長益嗜書史既免喪首以金紫遺澤奏長弟少卿尚無恙自欲任公又請與季弟必欲自取世科少卿諭勉再三始授將仕郎既而幡然曰仕行吾志不負所學足矣何必爾遂不復事舉業而與信州王使君從相與通經考古務為有用至今二王為桃源之望焉為洪州豐城縣主簿漕檄部綱方詣臺受要束使者卻謁叱鈴下卒迫遣公不勝憤遽乞休致遂遭重劾公處之如平時使者罷乃免帥以公易理官有寓公為時相姻黨先與一富民有他憾會冢舍失瑞香花以疑似誣之逮繫郡獄諷公文致其罪公證其無他又忤帥意竟稱疾而去遊宦之始所立已然歸而攻苦食淡左圖右書饘粥幾不繼泊如也又二年始授婺州司法參軍詔舉縣令會稽郡王史公浩為司封郎以公姓名進知泰州海陵縣張忠獻公浚募萬弩手官吏畏怖奔走恐後公獨以邑民方脫兵火之酷募既難從聚亦無用陳利害以獻旁觀為之股栗公亦謁告以俟忠獻以書遜謝慰勉安職人始服公有守而歎忠獻之樂善也隆興改元正月對垂拱殿上意嚮納改宣教郎幹辦行在諸軍糧料院乾道二年詔薦監司郡守丞相魏公𣏌在瑣闥薦對祥曦殿權司農寺主簿知江隂軍在任得旨沿江郡籍民為兵防江守城為大軍聲援公抗疏列上徒擾良民無益備禦者七條且言舊嘗為山水寨騷動兩淮競進圖册謂得勝兵數十萬完顔亮深入乃無一人為用敵退起焚官寺聲言欲燒棄山水寨案牘以絶後害此最深切著明者公以此罷而他郡亦徒擾如公言起知饒州改嚴州復改饒州以事忤憲司劾罷主管台州崇道觀以葉丞相之薦除尚書吏部員外郎權右司郎官遂為真葉公去國公亦遭論再奉祠除嚴州改婺州內引奏事尤加褒納至漏下數刻治婺數月改荆湖北路轉運判官移知湖州未半年罷而版曹以一全年逋欠奏公鐫兩秩不辨也又為外祠除廣南西路轉運判官議臣請行客販鈔鹽薦浙西帥屬胡庭直至二廣議可否公首貽書于胡又奏其事胡還朝盡變前説議臣亦駮公所陳金字牌踵至必欲施行公不為屈復辨析甚苦大略謂西路官賣誠非鹽法之善然科折有弊尚可禁止若客鈔有虧無法可救漕計立見空匱諸郡取辦勢必不勝弊而又變矣臣去替不遠計任內決可支吾豈以利害不及身遂為詭隨以欺陛下移公漕湖南而議臣帥桂林以庭直代公且領鹽事行其説庭直身受其弊以憂死既而公私告乏民不聊生孝宗聞之震怒議臣坐嚴譴而法果變矣為江西提刑易節江東未到改運判又移淮南以職事修舉直寶文閣江東運判俄除左司遷中書門下省檢正諸房公事借禮部尚書接送伴金國賀正旦使正使者之非儀折儐者之踞肆無不聳服太上皇帝踐阼賜金紫遷宗正少卿自以任子不當預玉牒史事力辭改太府卿丐外除祕閣修撰江東提刑俄改浙西以未疾求歸主管建寧府武夷山沖祐觀既再任紹熙五年八月乞致其事十月以今上覃恩轉朝議大夫慶元二年三月二日屬疾卻藥不進翌日終于正寢享年七十有八娶樓氏徽猷閣直學士贈少師之季女封宜人先七年卒贈恭人子男五人汲洌渙皆蚤世澤文林郎監紹興府都稅務潛登仕郎洌出繼少卿為曽孫女六人文林郎鎮江府金壇縣丞延平陳大應武節郎閣門舍人開封朱龜年同郡樓錝將仕郎延平陳仲紱宣教郎新提領建康府户部贍軍酒庫所幹辦公事廣漢張忠恕其壻也一幼亡今惟朱氏樓氏二女在孫男八頤之顒之額之顯之頔之頡之穎之皓之先一年顒之卒孫女五長適同郡樓滌次適毗陵張篪餘未行曾孫男四惟賢惟寅惟明惟清女三俱幼諸孫以五月丙申奉公之喪合于恭人之墓是為午嶺之原公資不凡而自力于學多識前言往行曉暢事理立身立朝所守一定不可回奪尤安義命置禍福于度外始則不畏上官之嚴久益自強雖壓以大君之命亦固執而明辨之仕以此多齟齬上下既信服亦以此踣而復振云平生惟是之行視人所難揆以古道謂彼亦人也吾何為不可人駭其不易而自處恬然亦不以此干名于時廣東一節有孫偉竒甫者知名士自號七澤老漁作蔣周翰傳具載始末公嘗刻于金紫碑隂以彰先德而削去辭賻數十言則公豈干名者耶未嘗求合于人而當世大賢相知甚衆孝宗擢公于下僚奬待尤渥漕淮南時或言鎮江軍帥張詔不法幾中深文特命公竟其事公為辨明止坐薄責前此監司未有越所部而治事者眷倚之意可知然中外踐揚終不得一登禁近非命耶身退之後聞朝論欲再起之笑曰少欲挂衣冠老乃強吾顔以進耶風力素高晚而益嚴絶不可干以私剖符數郡持節幾半東南所至無聚斂之政省鞭撲之苛不徒以文法臨賔屬而有父兄教子弟之意薦舉必公按刺至寡而端毅簡默望風畏之及其即之也溫洞見肺腑一善可取口之不置臭味苟同忘年忘輩行與之傾倒風流韻度如晉宋名勝又使人意也消藏書至二萬卷手抄為多號酌古居士又以名其堂詩文似其為人少嗜山谷詩造詣已深為紫微王公洋所擊賞晚又以杜少陵蘇長公為標準石湖參政范公成大見公近詩唶曰不惟把降幡殆將焚筆硯矣有文集若干卷藏于家始孤撫養弟妹妹得所歸二弟教之有成正功今為蘄州正民倅天邑鑰不肖晚出以威姑之故辱在親黨省事以來蒙誨豫特異比點朝行聞公林泉甚適夢寐欲侍巾屨歸而相得愈歡以為不負我所期也劇談痛飲或連日不倦人之云亡有識共歎豈鑰一夫之私哭之以詩曰稿梧誰共語空斷伯牙絃嗚呼尚忍銘公也哉銘曰士為民瞻莫先于廉惟公父子持身特嚴父不究用子以是顯終始一節百行俱善皇皇孝宗知公最深視公之心如日斯臨風裁日高譽望日偉三仕三已踣而復起毅焉而和介焉而通老成典刑今孰踰公人惜公歸公自謂晚一丘一壑往而不返我銘斯阡匪哭其私繄爾後人尚其似之攻愧集卷九十九
