body:
  text: 宋樓鑰撰內制明堂禮畢告謝五嶽四瀆祝文告謝天慶觀青詞案原集此首前有表今刪滿散朱伏以祗奉慈謨親行大饗多儀既備景貺孔昭實惟山川之靈陰相馨香之薦尚歆誠悃滋介純禧明堂禮畢祭謝五嶽四海四瀆祝文伏以肇祀合宫告成熙事惟二儀祖宗之禮皆已備修凡五嶽河海之神悉均望祭雖靈祠之尚逺顧虔報之敢稽明堂禮畢奏謝諸陵表文節建康府茅山崇禧觀案原集此首後有瑞慶詞滿散朱表今刪啓建祝夀道場青伏以嗣厯云初奉先為大適三嵗當郊之際祇薦總章惟列聖在天之靈俯垂陰佑雖潔齋之粗備懼誠悃之未孚髙厚顧歆神明來格既訖成于熙事敢恭布于深衷遙望陵宫不勝感涕安穆安恭皇后改諡告太廟祝文伏以仰惟烈祖將祔太宫易别廟之舊稱從成孝之尊諡先期以告英鑒其臨大行至尊夀皇聖帝靈座祝文伏以集百官于南郊首定稱天之諡奉二后于太室改從祔廟之名將舉盛儀敢伸昭告奉上孝宗皇帝諡册寶成穆成恭皇后改諡册寶奏告天地社稷十神太一祝文瑞慶節滿散道場案原集此首前有瑞慶節萬夀觀滿散道場青詞滿散朱表瑞慶節賜三省樞密院殿前司馬軍司步軍司乳香口宣報恩光孝觀青詞太上皇帝本命萬夀觀設醮青太一宫設醮青詞滿散朱表又此首後有天慶觀表今並刪詞滿散朱伏以夀皇即逺方定于尊稱祖后俱從當更于舊諡將嚴寶册敢告神祇孝宗皇帝諡號下日改換銘旌奏告祝文伏以烈祖在天南郊定諡既遵節惠之典載飭神明之旌仰惟威靈俯鑒誠恪孝宗皇帝欑宫神圍除去鋪屋窠木等奏告昭慈聖獻皇后永祐永思陵祝文伏以皇祖上仙期方臨于七月稽山庀役地實近于諸陵暫撤徼廬稍開宰木懼有驚于神御敢先叩于威靈仰冀洪慈俯加陰佑孝宗皇帝祔廟修製祏室太廟殿宇廊廡權奉安祖宗神主于初獻廳時前奏告祝文伏以仰尊烈祖將祔太宫奉二代之宗祧飾纍朝之祏室暫遷神主敢告威靈權奉安神主祝文伏以崇飾太宫奉遷神主少寓齋居之邃以須祏室之成敢冀慿依用伸虔告祭祀太廟土地祝文伏以修崇清廟升祔孝宗念斤斧之交興懼神祇之或聳敢先昭告願相多儀閻仲續康伯修奉欑宫傳宣撫問并賜銀合茶藥及喝賜一行官吏工匠等犒設口宣有敕卿等視役山陵宣勤夙夜勞風寒之匽薄頒茗劑之珍芳好賜有差工徒無怠孝宗皇帝梓宫發引祝文啓欑伏以阜陵既飭靈駕將行遂從禹穴之藏式啓商楹之殯攀號何及昭告宜先前夕日初昏奏告伏以窀穸有期念終天之永訣靈輿即遠痛詰旦之將行重惜分陰罙增孺慕發引時前祭告伏以六紼有行九京寖遠追念抱孫之愛阻伸臨穴之勤少駐須臾不勝哀殞啓奠行禮伏以于穆孝宗將趨神穴爰諏穀旦肅引靈輀顧挽紼以難留遂遵途而即遠音容愈邈慟哭何堪祖奠行禮伏以陵宮既備愴我祖之何之紼翣啓行痛仙遊之不返拊龍輴而永訣駕鯨浪以遂東祖祭是修哀號愈切下皇堂時前奏告伏以於皇文祖將就菆塗愴永閟于衣冠痛莫親于兆域式安玉體絶望天顔掩欑畢迎奉御容詣下宮奉安伏以明明我祖奉窀穸以既安雍雍在宫痛威容之愈邈天顔惟肖神宇具依不勝追逺之悲敢致妥靈之告孝宗皇帝梓宫發引奏告天地社稷太廟别廟太一宫祝文伏以烈祖上賔阜陵告備慈啓菆塗之舊將趨兆域之藏敢告先期仰祈陰佑至欑宫奏告帝后祝文報恩光孝觀青詞此首後案原集此首前有天慶觀皇帝本命萬夀觀青詞滿散朱表今並刪有冬至節孝宗皇帝几筵水陸道場齋文伏以奉皇祖之菆塗勉襄大事近纍朝之兆域敢告威靈未遑洛邑之歸尚奉會稽之葬仰祈孚佑咸遂妥安孝宗皇帝虞主自浙江還重華宫鼓吹導引曲孝宗純孝前聖更何加髙蹈處重華丹成仙去龍輴逺越岸暮山遐波臣先為捲寒沙來往護靈槎九虞禮舉神祇樂萬世佑皇家孝宗皇帝神主自重華宫至太廟祔廟鼓吹導引曲吾皇盡孝宗廟務崇尊巨典備彌文巍巍東向開基主七世祔神孫追思九閏整乾坤環宇慕洪恩從今密邇髙宗室千載事如存孝宗皇帝虞祭畢卒哭行祭禮祝文伏以阜陵復土既修易奠之虞班祔有期遂卒無時之哭仰遵禮典莫究哀悰孝宗皇帝神主祔廟并成穆成恭皇后神主同時祔謁升祔奏告祖宗帝后祝文伏以竣事阜陵既畢九虞之祭寧神祏室實同二后之升祖宗是依昭穆以序實循禮典敢告威靈孝宗皇帝祔廟樂章聖人之德無加于孝思皇孝宗履行立教始終純誠非曰笑貌於萬斯年是則是效太廟修置太祖至髙宗室帝后神主祏室畢工時前奏告還殿室祝文伏以班祔孝宗崇新清廟備纍朝之祏室奉列聖之神靈敢告先期冀垂昭格還殿正奉安祝文伏以阜陵竣事太室鳩工爰蕆禮于宫庭用妥靈于宗祏以享以祀來燕來寧孝宗皇帝祔廟時前告遷成穆成恭皇后神主詣幄次權行奉安以俟同時祔謁升祔祝文伏以阜陵竣事奉神主以即安室祏致嚴妥柔靈而並祔稍遷邃幄將奠太宫惟時之良敢豫以告孝宗皇帝神主祔廟前二日奏告祝文首前有太案原集此醮青詞滿散朱表今刪上皇帝本命太一宫設天地伏以尊祖禮嚴因山事畢用宏開于宗祏將升祔于靈儀信宿之先潔齋以告仰祈昭鑒永賴孚休宗廟伏以於皇文祖既畢安虞爰考禮于前朝盍妥靈于太室仰瞻列聖敢告先期其永無疆克昌厥後别廟伏以惟我孝宗將登清廟設九虞而既畢奉二后以同升永世是承前期敢告太社太稷伏以永阜訖功孝宗升祔惟億載萬年之巨典告九土五榖之明神願鑒先期式垂孚佑太一宮伏以烈祖上賓太宮升祔國之大事其敢弗虔天之尊神是當先告冀垂昭格用妥威靈改元慶元奏告昭慈聖獻皇后永祐陵永思陵永阜陵成穆成恭皇后欑宮表文天慶觀報恩光孝案原集此首前有今刪觀青詞伏以仰奉慈謨勉承丕祚將興嗣歲首議嘉名惟慶歷最為盛時而元祐尤伸公道履端伊邇敷號云初敢告威靈式祈孚佑改元奏告祝文夀觀設醮青詞滿散朱表今刪案原集此首前有皇帝本命萬天地觀報恩觀同景靈宫天慶伏以纘緒何堪改元惟謹稽仁祖致平之盛洎泰陵嗣德之初合取嘉名用綿丕祚敢伸昭告仰冀孚休宗廟諸陵表文同景靈宫帝后伏以承列聖之休謹踰年之制合太宗明皇之號有唐實創于嘉名仰慶厯元祐之時我宋尤稱于盛際爰肇新于嵗紀敢虔告于威靈社稷伏以嗣位承休踰年改號取慶厯元祐之盛期紹重規仰勾龍后稷之神用伸昭告尚祈靈佑益介炎圖太一宫伏以嗣厯云初紀年敢後合兩朝之盛爰號慶元告十神之靈用祈福佑尚惟昭鑒永助丕基上辛祀感生帝以太祖升侑奏告祝文天地伏以祀感生之帝蓋已有年侑創業之君始從今日敢伸昭告仰冀孚休宗廟伏以推功藝祖既居東向之尊升侑感生兹謹上辛之祀仰瞻列聖豫告先期社稷伏以感太微之精夙祗大祀推藝祖之烈升侑明神惟社稷之炳靈設豆籩而致告諸陵諸欑宫表文伏以上辛榖旦大旅盛儀爰推立極之功克配感生之祖遙瞻陵域敢告吉期事體至嚴威靈斯鑒僖祖順祖翼祖宣祖還正殿奉安祝文伏以新廟是營羣言允協爰卜太宫之右用安四祖之靈敢冀威神式歆典祀奏告太廟祝文伏以肇舉盛儀宏開别廟祧僖宣之祀視夾室以尤嚴遷順翼之靈祔先公而惟謹仰祈列聖俯鑒忱衷春分前修飾欑宫奏告諸陵祝文伏以嵗序流易春陽正中既當雨露之濡益愴宫陵之念繕修惟謹種藝以時敢告先期尚祈昭格進奉皇太后生辰表詞帝本命太一宫設醮青詞案原集此首前有太上皇表今刪滿散朱伏以尊居長樂方歌難老之詩時屆芳春適啓誕彌之節邦家均慶宫壼交欣中賀恭惟夀成皇太后殿下德合坤元心同天大贊淳熙之內治恭儉具孚命菲質以嗣興恩私未報方具遊神淡泊玩志清虛益觀過厯之期坐閲後天之算臣夙承大造獲奉慈顔含飴弄孫咸仰薑任之盛戲綵為樂惟祈箕翼之年伏以修蘭亭之禊事方樂春陽上椒殿之夀觴仰尊祖后夀成皇太后殿下恭願坐膺多福日介修齡國治家齊合三宮而同慶天長地久見千載之太平太陽交蝕祭告太社祝文伏以季春五陽日食于朔側身修行朕不敢怠伐鼓于社彝章具存尚抑羣陰以助陽德陰雲不見交蝕祭謝祝文伏以淸臺獻占太陽當食引咎自省方切兢兢東方未晞陰雲布濩實惟神賜敢恃天休孝宗皇帝小祥奏告永阜陵欑宮表詞首前有皇案原集此命太一宫設醮青詞滿散朱表又有太一宫祝延帝本命萬夀觀設醮青詞滿散朱表太上皇帝本詞滿散朱表今並刪太上皇帝聖夀設醮青伏以念兹皇祖遽驚新榖之升瞻彼阜陵罙切髙山之仰恭惟尊號皇帝恢宏帝業垂裕孫謀兹當祥練之初敢後馨香之薦馳誠惟謹隕涕無從改元嘉定奏告祝文十二月開禧三年天地景靈宫天慶觀報恩光孝觀伏以祗奉洪圖寖逾周紀屬時多故欲開嗣嵗之祥乃選嘉名用冠新元之首敢伸昭告祈介宏休宗廟諸陵伏以承列聖之休方深夕愓紀新元之號式介春祺開景運之亨嘉期武功之耆定仰惟敷佑敢不欽承太社太稷伏以為國家者尤謹于紀年有社稷焉敢稽于蕆事仰冀神靈之佑庶開嘉定之期肇易美名爰伸昭告太一宫伏以國之大事莫重改元天之尊神當嚴昭告願介亨嘉之會遂成耆定之功益卑多祥以興嗣嵗諸陵欑宫表文伏以祗奉洪圖寖踰周紀屬時多故欲開嗣嵗之祥乃選美名用冠新元之首取商宗嘉定之旨睎武王耆定之功仰冀孚休敢伸虔告閏四月起居諸帝后表詞元年嘉定諸帝旦表伏為積分成閏適當孟夏之餘告廟有儀敢飭先王之典恭惟諡號皇帝德參高厚仁及華戎仰賴在天之靈益綿奕世之慶式供嘉薦用妥威神諸后旦表伏為元年建巳閏月定時既當視朔之初爰謹奉先之禮恭惟諡號皇后坤隆厚載世嗣徽音慨莫望于聲容尚永綿于慶羡式修孝敬敢薦馨香諸帝望表伏為閏以正時方謹居門之禮月惟既望敢修朝廟之儀恭惟諡號皇帝澤寖羣黎慶綿百世望仙遊而雖邈席丕祚于無疆爰薦孝思用循彛典諸后望表伏為四月維夏閏式紀于歸餘先后在天禮用陳于改望恭惟諡號皇后母儀如在神御即安永陪衣冠之遊用綿宗社之慶奉承思孝奠薦惟馨洞霄宫徑山天目山龍井祈雨祝文伏以國方多事所願年豐春夏以來甘澤未足種不入土遺蝗已繁當寧興思旱氣甚廣近雖得雨猶未霈然遣官禱祠齋心以俟庶祈響答三日為霖大慰九農敢忘伸報故皇子肅王垍興靈前夕敕祭祭文嗚呼哀哉頃欣嬪御得此誕育晬盤將設何去之速情之所鍾念念顰蹙苗而不秀無乃太促一奠寓哀往從幽卜成肅皇后小祥奏告永阜陵欑宫香表詞伏以祖后上賔尚想含飴之愛嵗華遽易忽驚鑽燧之期遙瞻陵寢之嚴倍切音容之感期已久矣儼追慕以如新練而慨然顧加隆而敢怠肅陳寶炷用表哀誠雨澤愆期奏告祝文天地十神太一九宫貴神嶽鎮海瀆伏以旱魃為災間有不免在于今嵗利害尤深疆埸甫寧流徙未復中外空匱正望有秋屬兹常暘種或未入苟失嵗事何以有邦顧慚菲涼久蒙敷佑髙髙在上地皇土靈祇祇云后俯鑒哀祈三日為霖庶以活國側身引慝恭俟嘉應宗廟别廟伏以時方常暘憂懼實甚種未入土何望收成間有一雨未能霑足齋心致禱靡神不宗在天之靈願垂矜憫有請于帝救此下民沛為膏澤遍及遐邇迄用康年以夀國脈太社太稷雨師雷師風師慶觀報恩光孝觀青案原集此首後有天刪詞今伏以社稷與君以民為重民之司命以食為天時方多艱仰望一稔久矣不雨雨又復霽傾心禱祈願垂嘉答廣布甘澤普濟羣生報以秋冬其敢不飭禳蝗祝文夀觀設醮青詞滿散朱表今刪案原集此首前有皇帝本命萬天地伏以稼穡維寶方興播種之功蝗蝻為災備舉禬禳之術雖都城之少靜顧畿甸之尚繁遠邇何殊焦勞則一敢祈上帝后土地云俯念斯民既敕酺神盡屏衆多之害更令田祖益昭秉卑之靈社稷伏以禾苗方茂社稷焉依雖旱魃之巳驅復飛蝗而為孽神既職幽冥之事朕不勝宵旰之憂爰致禱祈願垂感格掃螟蟊而無迹庶稼穡之有成酺神伏以比以飛蝗之作孽嘗遵故典以祭酺都邑頓淸無非昭答郊圻未免敢怠祈禳惟盡除振振揖揖之災庶幾有薿薿芃芃之望雩祀祝文前一日奏告太宗室伏以旱魃挻災禱而既應覆出為虐其害愈深爰即紫壇仰祈清昊熙陵之德實配彼天豫告威靈願垂昭格有請于帝蘇此遺黎上帝伏以旱氣方隆禱既如響飛蝗肆孽禳之亦消奈何常暘又以示譴朕實不德民則非辜祗祓郊丘謹修雩祀仰祈上帝哀閔下民蚤興雲雷大沛雨澤無有逺邇均被滂沱坐變凶年復成樂歲邦本所繫惟天佑之太宗伏以天災流行固知代有今嵗之旱尤所弗堪禱雨應期方幸周浹陽居大夏兹焉益驕爰即泰壇恪修雩祭稽諸故典作主侑神曽孫菲涼宜致疵癘殃及萬姓實惟焦心在天之靈願垂矜閔亟頒甘澤以迄康年皇地祇伏以至哉坤元厚德載物生我百榖以活斯人比雨應祈種幸入土苗而未秀又復亢陽滌滌山川物意焦灼國有故典禱旱以雩后土資生敢伸虔告願垂大惠敕使百神三日為霖溥及萬域以蘇焦稿以致豐登庶幾有邦可以長保再奏告宗廟别廟伏以顧惟菲涼負荷至重常暘之罰乃遍黎元飛蝗未清雨而復旱投誠列聖威靈在天閔豫曽孫以及赤子亟垂昭格沛以甘霖迄用康年保邦是賴復旱兹焉致别廟云雨而感通禱願昭太社大稷嶽鎮海瀆五方山林伏以惟民之生以食為命聰明正直亦惟相依今兹旱災日既太甚側身致禱遍于百神仰冀為霖沛然四洽庶有秋之可望豈嘉報之敢稽內中禳蝗文中元節水陸道場齋文今刪案原集此首前有成肅皇后伏以旱魃云初遂致飛蝗之作孽雨師既應不圖遺種之滋繁逺侵閩楚之疆近集郊關之內遇災是懼惟帝焉依願敕百靈盡除螟螣之害俯令萬國咸保稻粱之豐祈雨感應報謝祝文天地伏以涉春以來旱氣甚廣種未入土上下隱憂宵旰齋心日致忱禱皇皇后帝坤元后土皇地祇云實賜鑒臨曰雨而雨隨時孚應藝我稷黍寖成小康盡彼萬物不足以報矢詞告謝少致衷誠宗廟伏以亢陽為災幾害穡事國計所繫無所控祈夙夜投誠父母先祖敢期上徹在天之靈霡霂滂沱幾無虛日旱魃退聽良苗勃然所在中熟實踰始望傾心報謝其敢弗虔别廟伏以亢陽已甚嘗致禱祈甘雨以時實為孚應兹成中熟獲濟民生幽贊為多可無致謝十神太一九宮貴神伏以民為邦本食乃民天嵗一不登何以為國頃以旱甚禱于尊神禱于貴神九宫貴神云如饗應聲隨車滂沛肅時雨若易歉為豐敢罄謝誠尚求終惠嶽鎮海瀆五方山林伏以國方多事豈堪旱災虔誠禱祠靡神不舉時雨之降實由山川三日之霖四逺霑足嵗事將就虔謝敢稽太社太稷雨師雷師風師慶觀報恩光孝觀青案原集此首後有天刪詞今伏以顧惟菲德致此亢陽仰賴百神鑒豫忱禱風雨時至雷霆疾驅逺邇均霑成此中熟一祈一報敢怠此誠尚惟居歆益加敷佑祭告酺神蟊賊為災秉卑有資于田祖蝗蝻肆孽掃除實賴于酺神既隨禱以盡消俄蔽空而復至人心相恐嵗事可憂疑有物以驅之殆非力可及者載修祀事仰叩髙靈俾食葉食心之妖罔存噍類成多黍多稌之慶還保豐登攻愧集卷四十八
