body:
  text: 宋樓鑰撰奏議蠢言瑣闥繳朱熹除寶文閣待制與州郡差遣臣仰惟仁宗皇帝聖度如天御史唐介以言事得罪貶春州别駕明日中悔命改英州巳處之善地矣又明日用其言罷文彥博而遣中使護介之行未幾遂復召用此所以為慶歷之盛臣觀陛下容納直言改過不吝無愧仁皇朱熹始除宫祠深駭觀聽物論紛紛巳而聞仍次對之旨則知聖意之已回臣寮繳奏又加寶文之職而與州郡則聖意又愈釋然矣臣雖已論奏兹益進其愚陛下本以閔其耆老當此甚寒不欲使之立講欲望聖慈授以內祠仍令修史少俟春和復還講筵如此則君臣之道終始周盡熹之難進易退陛下素知顧豈以加職為寵惟陛下待以恩意亟使留行進之以禮則熹雖已去猶未出晝可以留矣臣茍有愚見不敢不盡伏冀垂聽而採用之所有録黃臣未敢書讀繳祧廟事且從禮官第一次陳請奉聖旨恭依御史中丞謝深甫等奏集議祧廟事乞臣竊惟宗廟重事非可輕議雖議禮之家古稱聚訟然在上之人所以擇之者如何爾凡事固當從衆要以不專視議者之衆寡惟其是而已矣本朝自開國以來立四親廟之後凡宗廟之事據經守正本無可議治平末年英宗祔廟僖祖親盡遷之夾室而順祖遂居第一室天下無可議者蓋僖祖之遷夾室于禮為順太廟者宋之太廟非以第一室為主也自王安石異論奉僖祖已遷之主復入第一室正東嚮而議論始紛紛至今神宗祔廟翼祖遂遷亦禮之宜也蔡京用事專務紹述熙寧之政又唱九廟之制復奉翼祖已遷之主入廟當時詔書明言自我作古可見無所經據若太祖東嚮之議自熙寧以來議者不知其幾至陛下而始定甚盛舉也此事既定遂又議僖祖宣祖祧主所歸考之于禮經計之以治平故事止合並遷夾室如順祖翼祖之制正緣熙寧之後推尊僖祖已久又紛然有不當使僖祖下祔子孫之説故衆議中制取唐柳冕之言創為别廟二事皆已得聖旨恭依矣豈應更有異議比聞朱熹曾入文字未蒙降出臣輩無由辨正是否忽又得旨恭依臺諌之奏且從禮官第一次陳請則是止祧宣祖而祔孝宗所謂太祖東嚮之禮又復寢而不行臣實惶駭竊謂如此重事陛下再降旨恭依今忽以數語而改之行之四方實惑衆聽臣未深辨欲望降出朱熹劄子庶見得有所據依者何事果能使中外心悅而誠服則改之未晚若如今日所行則宗廟重事議已定而復搖重事反輕非所以示中外如臣淺陋何足以預議大事苟有所見不敢以畏避而不言伏惟陛下裁赦所有録黃臣未敢書讀再繳李氏等依宫人請給臣近者繳奏李氏國夫人三人請給事伏準御筆可依皇太后妹嘉國夫人例特與書行仰見陛下尊奉太上皇后念三女兄之意故有上項指揮臣豈應不承威命竊惟封駮之地以出納為職君命之出從而出之豈不順便惟知其不可而納之是為舉職況一事之僥幸從之亦未甚害所可慮者幸門一開便以為例援例而進得之者不以為恩不得者遂以為怨此喉舌之地所以必爭正恐其攀援而不已也嘉國夫人淳熙四年初支俸給一時有司失于爭執開此幸門李氏三人遂援此例初失于一今有其三三人既行則後之攀援者又不知其幾凡曰后族姊妹得之則兄弟之婦援之兄弟之子婦又將援之不知何時而已乎況今日國力甚屈不惟不可以望承平之時比之紹興既不可及雖欲比之淳熙比之紹熙亦不大舛今嵗遭夀皇之大喪遣金國之信使固已不勝其費而天時如此救荒不暇朝廷傾資以為民民之受實惠者無緣得遍飢疫可指日而俟盜賊所在而萌芽凜乎可懼之時陛下惟當躬率儉素橫恩濫豫損之又損猶恐不逮安可聽戚里之無厭援不得當之舊例不思以義斷恩如此之類侵尋不已何以善後臣是以輒忘忌諱再瀆天聰伏望聖慈終賜寢罷如聖意深念從母毋寧别豫之財太上皇帝以吳琚不得真俸遂賜之錢庶可全肺腑之恩而不廢天下之法更取聖裁所有録黃臣未敢書讀繳毛伯益轉行遙刺臣仰惟陛下嗣服之初愛惜名器間有出于左右求請或並緣賞典或引用近例或出于三宫之親屬茍戾于法有司執奏無不垂聽故朝廷清明可望治效近有李革以應奉有勞由副尉而轉承信郎亦不可不論正以事體至微不敢瀆冒天聽今忽來有上項指揮毛伯益者知其為內侍不知有何因緣直以職事宣榮理宜優異與轉遙郡刺史實駭公論夫以內侍甚衆遙郡至嚴有以賞典等事遷轉者猶不可行指揮再三終于回授而況全無來歷內庭趨走安得言勞便嬖使令豈應優異若此門一開凡有無厭之求陛下遽與施行而臣等又不能繳奏則遙郡不巳便圖正任正任不巳廉車留務以致節鉞何厭之有如此則祖宗之法度朝廷之紀綱將遂蕩然何以為國自來內侍求請遷轉屢經繳駮皆有一二可言蓋未有如今日指揮僥濫太甚臣是以尤不得不論欲望聖斷追寢上件指揮推究伯益無故僥求上罔聖聰之罪特賜黜責以懲其餘庶幾自此可以少戢此曹不致過有踰分之請實為幸甚所有録黃臣未敢書讀繳重華宫官吏諸色人等及五年推恩轉官臣仰惟陛下欽事三宫務盡孝道重華宫一行官吏等人用德夀宫故事服勞五年例轉一官資前此方以推恩為遲今幸舉行故典本不當有言然臣有愚見如醫官及礙止法人二項不容不論醫官久叨廩祿竊取寵榮本是庸人僥幸在選夀皇違豫之久中外日伺脈狀以候康復而其詞不倫固已憂慮一旦彌留無不憤痛雖其罪不至如王涇之甚亦以一時多事未嘗明正典刑六月二十三日奉太皇太后聖旨醫官大方脈蔚仲堅郭儀李九齡瘡腫科王懋陳世安口齒科俞時雍並罷重華宫祗應此蓋太皇太后明知其醫藥狀而至仁覆露不欲加罪止從罷遣後至八月間因臺官論奏郭儀李九齡蔚仲堅輩庸繆之罪其言某輩則非止此三人也尋得旨僅降三人者一官未幾至十月初王良佐李九齡郭儀又以應奉太上皇帝醫藥有勞而轉官矣其僥幸已甚皆不復論其于重華醫藥失職如此不至嚴譴已為厚幸安得一例皆與轉官之賞乎其醫官已經降官及罷祗應之人乞更不推恩武臣及內侍等礙止法人數目不少若盡與轉行實為太濫正引乾道二年之制隱下後來即次指揮致有今日施行欲乞並照淳熙八年七月指揮回授其指揮使以下礙止法人亦乞照前項指揮依條施行其他人數猥衆宫掖事嚴臣不能一一究知其顯然可論者如此欲望明照三省樞密院及所屬曹部照應逐次指揮及臣所奏二項事理仔細開具施行庶幾實有勞效者不至遺失僥濫太甚者稍得樽節其于愛惜名器之朝不為小補所有録黃臣未敢書讀繳陸彥端將覃恩並解帶各轉一官恩例特與階官上轉行一官臣待罪東臺論奏固多皆是為陛下愛惜名器節省財用排抑僥幸以存國家之紀綱若礙止法人或轉橫行或轉遙刺二事尤當固執一失職守來者無窮不可復為矣陸彥端事太上皇帝為隨龍人衆所知以隨龍之故超授官爵不為少矣若縱其無厭之求則何時而已耶比者太上皇后歸謁家廟彥端于武功大夫併轉遙郡兩宫臣寮繳奏三次以一時人衆太上皇帝聖旨其他礙止法等人並從所請時令與三人者轉行彥端其一也是以一日隨行之勞而轉與二十年磨勘之官矣去年八月又以睿思殿內東門司等歷過日月并使人到闕等泛賞乞于遙郡上轉行後省察見其月日皆是重疊引用繳奏三次乞令吏部契勘年月遂寢而不行今又有此請夫覃恩轉官解帶轉官使其不礙止法則當循序而進何待特旨正以二者皆是泛賞礙止法人不可用故疊以二者冒干天聽又欲于階官上轉行則是以礙止法不可用之賞而轉右武大夫其為壞祖宗成法尤甚臣是以不得不論欲望聖斷察其情狀追寢上件指揮庶使退聽且以塞後來無窮之請臣載惟陛下初政猶未及半仁恩隆寬左右近習戚里之衆干請恩幸瀆紊聖聽動勞特旨臣愚駮論雖荷矜從更乞奮威斷擇其干請太甚者有以懲戒之則朝廷益清紀綱不紊尤為幸甚所有録黃臣未敢書讀繳成立帶行遙刺四官內兩資轉馬步軍都軍頭御前忠佐成立該登寶位合轉般請給等並依周興體例支賜外兩資轉特與帶行遙郡刺史諸臣竊惟國家名器之重在今日尤宜謹守引例破法之弊在今日尤宜痛革臣待罪瑣闥頃者屢有駮奏不敢顧恤仰惟陛下恭垂明聽從善如流近來方得小定忽準前項指揮又不容己者御前忠佐止有六資曰步軍副都軍頭馬軍副都軍頭步軍都軍頭馬軍都軍頭馬步軍副都軍頭馬步軍都軍頭六資之外無法可以選補其轉行遙郡刺史者蓋橫恩也武臣轉至武功大夫為止法非有軍功等不許轉行而況此乎歷考太上皇帝在位六年放行忠佐轉行者才二人然皆有迹可考周興以馬軍都軍頭轉行尤在紹興二年七月是時太上皇帝即位已三年矣至十月又以陸安為之中書後省繳奏而止紹熙三年四月又有指揮又以門下後省繳奏而止且以周興之轉行是有司失于執奏者直至紹熙四年再與而再繳至勤御筆以其久在潛邸應奉有勞特與轉遙刺時方多事因遂放行蓋亦三經繳奏不得巳而後行非苟然得之也今可援為例乎況陸安在太上潛藩隨龍應奉餘三十年録其久勞猶艱難如此陛下即位未久若成立引例破法六資猶未曾轉滿徑以四資之恩超授遙刺則今之為忠佐者又援此例而進不可遽止名器愈濫矣陸安援周興之例止言請給而不及大禮支賜進狀下戶部本部執奏而不行今成立破法所乞指揮則又全備以此知祈恩僥幸之人宛轉攀援無時而已欲望聖斷特賜詳酌其以兩資轉至馬步軍都軍頭者法也則令有司照條格施行其餘兩資則與寢罷塞幸門而守舊法實為允當所有録黃臣未敢書讀再繳成立帶行遙刺臣近者繳奏隨龍御前忠佐成立帶行遙郡刺史奉聖旨兩該隨龍可特與書行天威所臨即合承命然詳究事體輕重寧受一夫之怨不敢廢陛下紀綱寧被方命之罪不敢變有司法守也陛下明知帶行遙郡刺史為僥幸又知兩朝隨龍忠佐人衆恐開幸門以成立兩該隨龍故令特與書行庶使餘人退聽臣略考之太上皇帝隨龍人有兵級八十八人內吳翊等十餘人又在陛下隨龍人數如此則未問其餘名色只就成立本等人數內兩該隨龍已有十餘人若成立帶行則此十餘人者必將援例而進不若杜之于初則來者自然絶望一開其端僥求日滋縱之則名器愈輕賜豫益濫止之則或得或否不惟無以服其心多方營求不與不已煩瀆天聽陛下將自厭之臣愚欲望睿斷寢罷上件指揮以塞僥幸之路況陛下即位未久如此等事但當一切止絶若初年不難于發端後省不得而繳論誠恐國家爵賞有限不足以塞此曹無窮之請為害愈甚矣所有録黃臣未敢書讀繳韓托胄轉一官彭龜年除職與郡林大中韓同中書舍人觀彭龜年除煥章閣待制與郡托胄轉一官依所乞除在京宫臣等今月初九日竊聞吏部侍郎彭龜年內殿奏事退而居家待罪不知其由已而又聞知閣門事韓托胄見求祠祿方有傳聞謂龜年論托胄甚切故皆不自安然而不知所論者何事也今有上項指揮則知傳聞之不謬龜年以侍郎得次對與郡托胄解閣門及都承旨職事轉一官內祠有以見陛下之處事不失一偏然臣等愚忠猶有當言者陛下自在嘉邸眷禮僚舊一旦龍飛不惟寵以爵秩延見訪問幾無虛日天下不以為私而服陛下好賢篤舊之德不謂三數月間所謂五人者黃裳遽成長往黃由尋遭外艱沈有開陳傅良相繼論罷惟龜年一人猶在從列經筵又其賦性伉直論事不回尤蒙眷奬必其懷不自已盡言無隱今又去之則陛下之舊寮無遺不惟傷伐木之義而四方謂其以盡言得罪尤害政體此臣等所以重惜也知閣門事及都承旨皆武臣之高選陛下不難于托胄之罷可謂英斷然次對不過在外之職序位反下于二卿廉車之升留務則寵之已至況一去一留恩意不同去者遂逺不復得侍左右留者既曰內祠則召見無時終不能逺人言籍籍尚以為不平臣等欲望睿慈更加詳處或留龜年于經筵則可以不失講讀之舊若其不然則命托胄以外祠或豫以外任事體適平人亦無可言者如龜年之賢陛下素知顧豈遂將終棄後日召用正自未晚然目前處事貴于得宜臣等誠恐指揮一出難于反汗故敢罄竭愚慮以俟採擇所有録黃臣等未敢書讀再繳韓托胄彭龜年優異韓托胄初無過尤屢求聖旨彭龜年除職與郡已是為過並依已降指揮間退罷職奉祠亦不臣等昨繳論彭龜年韓托胄事得旨令並依已降指揮施行臣等何敢不承君命然二人者事既相關須當適平龜年以真侍郎除職與郡若以為優異則托胄之轉承宣使非優異乎若謂托胄初無過尤則龜年論事乃出于愛君之誠心不顧其身以進忠言豈為過乎臣等區區不敢更留龜年在龜年進退之義亦不可復留但直臣去國公議為之歎息恐自此無敢有為陛下出力論事者矣龜年既以決去托胄難以獨留欲望聖慈俯從臣等所奏豫托胄以外任或奉外祠以均事體以慰公議不勝幸甚再犯天威無任震懼伏惟陛下裁幸所有録黃臣等未敢書讀攻愧集卷三十
