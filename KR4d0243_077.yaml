body:
  text: 宋樓鑰撰題跋跋春秋繁露繁露一書凡得四本皆有髙祖正議先生序文始得寫本于里中亟傳而讀之舛誤至多恨無他本可校已而得京師印本以為必佳而相去殊不逺又竊疑竹林玉柸等名與其書不相關後見尚書程公跋語亦以篇名為疑又以通典太平御覽太平寰宇記所引繁露之書今書皆無之遂以為非董氏本書且以其名謂必類小説家後自為一編記雜事名演繁露行于世開禧三年今編修胡君仲方矩宰萍鄉得羅氏蘭堂本刻之縣庠考證頗備凡程公所引三書之言皆在書中則知程公所見者未廣遂謂為小説者非也然止于三十七篇終不合崇文總目及歐陽文忠公所藏八十二篇之數余老矣猶欲得一善本聞婺女潘同年叔度景憲多收異書屬其子弟訪之始得此本果有八十二篇是萍鄉本猶未及其半也喜不可言以校印本各取所長悉加改定義通者兩存之轉寫相訛又古語亦有不可強通者春秋會解一書皇祐間進士杜諤集繁露諸書斷以己案是書未詳孰撰考朝公武讀書志有秋會義意名春仲方托其引繁露十三條今皆具在余又據説文解字王字下引董仲舒曰古之造文者三畫而連其中謂之王三者天地人也而參通之者王也許叔重在後漢和帝時今所引在王道通三第四十四篇中其餘傳中對越三仁之問朝廷有大議使使者及廷尉張湯就其家問之求雨閉諸陽縱諸隂其止雨反是三䇿中言天之仁愛人君天道之大者在隂陽陽為德隂為刑故王者任德教而不任刑之類今皆在其書中則其為仲舒所著無疑且其文詞亦非後世所能到也左氏傳猶未行于世仲舒之言春秋多用公羊之説嗚呼漢承秦敝旁求儒雅士以經學專門者甚衆獨仲舒以純儒稱人但見其潛心大業非禮不行對䇿為古今第一余竊謂惟仁人之對曰仁人者正其誼不謀其利明其道不計其功又有言曰不由其道而勝不如由其道而敗此類非一是皆真得吾夫子之心法蓋深于春秋者也自揚子雲猶有愧于斯況其他乎其得此意之純者在近世惟范太史唐鑑為庶幾焉褒貶評論惟是之從不以成敗為輕重也潘氏本楚莊王篇為第一他本皆無之前後增多凡四十二篇而三篇闕焉惟玉柸竹林二篇之名未有以訂之更俟來哲仲方得此尤以為前所未見相與校讎將寄江右漕臺長兄祕閣公刻之而謂余記其後跋宋宣獻公書李公垂詩編李公垂詩編自號追昔遊宋宣獻公手書之可謂兩絶乾道七年嘗宿剡川之龍宫寺見李公詩碑今在編中而有闕文亟為求石刻于寺補百餘言宣獻字畫精妙而參以惡札如碔砆列于璠璵中益歎前輩之難及也宣獻父名臯不惟于本字缺筆髙字亦去其口尤見真迹不疑如此等書皆親自傳録春明三世以博洽稱有以也夫公垂短小精悍才氣絶人其自言治行之偉如此人品真可與文饒相上下惜乎二公德度如此恩讎太明以此得名位亦以此掇禍大雅曰君子實維秉心無競誰生厲階至今為梗詩人之意謂厲階之生由夫好競者為之也牛李二黨更相摩軋數十年而唐益以衰可不戒哉跋周氏棣華編歐陽公于燕兄弟之詩發不如友生之義髙矣此詩方以兄弟為急而毛鄭二氏失其本義得公之言詩意始明而末章猶未甚詳深哉詩人之旨也儐爾籩豆飲食之飫特一時之適耳使兄弟既具而無他則和樂至于且孺猶孺慕之孺此真情也妻子人合也茍能好合猶如瑟琴兄弟天倫也如其既翕而無間則其樂至于且湛猶湛酒之湛其樂尤深矣故又曰如此則可以宜爾室家樂爾妻孥所謂人不間于昆弟之言而家肥矣是究是圗亶其然乎而後篇終兄弟之道無餘藴矣前嵗武寧周氏昆仲俱自上庠來見以棣華集求詩許之已久今其季又至且流涕曰始與吾兄同致此懇不幸兄亡矣願終惠之兄弟無故天下之樂事也余伯仲九人僅存其四備嘗手足之痛為之感歎不足併書古詩之義以遺之因以勉其後人毋隳此意以保其家周氏其有興乎跋林氏所藏趙清獻公父子詩清獻公以元豐二年春加太子少保致仕明年次子景仁倅永嘉從公遊天台雁蕩吳越間榮之至今廨宇有戲綵堂猶以為盛事萱堂林先生隱居樂道與公父子遊頃嵗客授之初登堂慕想嘗録三人唱和之篇兹從萱堂之元孫晉獲見真迹以神道碑考之正三年庚申嵗也清獻父子定交寒士萱堂以布衣與大臣為寮友髙風凜然俱可敬而仰哉跋八陳圗八陳自桓溫一言之後無能究其説者乾道末年客授東嘉始聞其説于毗陵使君薛士隆而陳君又以薛氏所傳握機及馬隆贊示余于是始見武侯之遺意王清叔曉以要略建安蔡季通元定著論尤詳嘉定三年編修胡仲方矩示余一篇蓋其婦翁王景醇方帥夔門裒前後衆説寄仲方且俾訪求遺逸余遂取所藏薛陳王蔡四家之書悉以授之將以復寄夔帥併刻焉武侯之陳原于先天六十四卦之方圖而其實則井田之遺法也文中子以不井田為茍道且曰諸葛亮不死禮樂其有興乎蓋以深知井田之制也毗陵嘗問余曰一部周禮兵制何在對曰在夏官曰此但畋獵閲習坐作進退之説且非兵制也對曰寓兵于農比閭族黨為伍為什即其制也毗陵曰固然當知古人法制素明中外一致非如後世别有兵法八佾之舞六十四人即此法也祭祀燕饗猶以為用人人習熟公卿皆可為將帥用此道也法制既隳知兵者猶得遺意余因其言而考之韓信連百萬之衆戰必勝攻必取自謂多多益辦者此也項羽敗亡之後以二十八騎分四隊而下尚能披靡漢軍亦此也晉之馬隆以一小將自薦武帝傾意用之孤軍深入略無後繼音問既絶而捷奏忽聞則已斬樹機能而平涼州矣史但言其用偏箱車今乃知其深于八陳如此後之任將帥者可不知此哉跋山谷奇崛帖山谷草書釣魚船上謝三郎之詞後有云上藍寺燕堂夜半鬼出助吾作字故尤奇崛吾儕生晚恨不識山谷上藍何等鬼物乃得以夜半助竒崛之筆此鬼正自不凡跋劉資政遊縣學留題資政靖文劉公以大魁發身髙宗擢至侍從賢德日著而不見赫赫之名蓋其人深沈醇厚盛德若不足晚益受知于孝宗乾道五年起之間廢中先卑內祠兼侍讀除禮部侍郎權尚書年髙求退不至大用後以資政殿學士致其事名莭始終與黃公中徐公嚞名位相似前則有王公十朋周公操陳公良翰此皆孝宗盛時尊老貴德之懿也龍遊有石而鋭古記有之曰尖石圜出狀元紹興十有四年嵗在甲子大水去其鋭次年乙丑公遂魁天下人皆以此為奇讖而公處之泊然不有也鑰生晚不及拜公親聞介菴趙公少卿彥端云嘗自以好論時事不知諱避時朝廷方經略中原日為恢復之計調兵造甲諸郡頗擾多指言其非是或譖于上曰陛下究心大舉凡所圗回但資趙彥端一笑爾趙頗聞之不勝恐懼且謂使漢武帝聞此誅滅何疑已而寂然久乃知劉公夜對上從容問曰聞卿監中有人笑朕所為者公初不知端倪徐對曰聖主所為人安敢笑若議論不同則恐有之上意頓解亦曰止是議論不同耳趙公聞此感不容言又歎倉猝中出言之盡善若止曰無之未必可以深悟聖意也帝前動笏移南山推此一端以見獻納之有益于國者多矣鑰年十六時侍先太師仕柯山兄弟學于郡庠者二年頗聞鄉之名公始末但聞公之為士固窮力學以致膴仕不知其他也鑰四明汪出表弟之子之強力學決科作尉兹邑聞其居官殊有可紀校文漕臺竣事來見曰縣學大成殿建于至和二年頽圯已甚齋館又甚焉幸士民之相安謀欲撤而新之翕然響應動有緡錢數千可以興役此志甚嘉方勉使成之又曰聞劉公布衣時因鄉飲酒禮之成嘗書講堂壁間以勉後學而壁壞不復存訪其家得之求跋于鑰取而讀焉益知公之平素所以自勉所以教人之大方槩見于此矣其曰山川雖秀未足誇而師友之益為可恃旨哉斯言然則尖石之讖豈足為公道是宜刻之堅珉以詔後來公以平日謙退故知之者寡此鑰所以不能自己于言亦不嫌于太詳也頃先公守括蒼公之子之衡宰龍泉縣有聲後為御史臺檢法官今諸孫為守為倅公之餘慶殆未艾也跋袁光祿轂與東坡同官事迹慶歷詔郡國立學而置教官者才數處多延致鄉里之有文學行誼者為之師我髙祖正議先生教授四明前後三十餘年一時名公皆在席下是時赴鄉舉者才百餘人解額六人試于譙樓秋賦之年先生謂舒公亶袁公轂羅公適曰二三子學業既成不應有妨里人薦名于是舒試于鄉袁試于開封羅試于丹丘三人皆在魁選實為一時之盛舒以舜琴歌南風袁以易更三聖賦名于時而袁之著述傳于世者有韻類題選百卷後學賴之元祐五年倅杭州東坡為郡守相得歡甚有迓新啓事坡書龍泉何氏留槎閣記介亭唱和詩坡次韻二詩一謝芎椒一為除夜如别乘一來風月平分破之詞最為膾炙正為公而作則其賓主之間風流可想而知也抑嘗聞坡一日謂公曰素知博洽試徴襪事公一夕録數十百項坡曰可謂博矣又從而增之前輩之不倦于學如此尚書豐公稷亦正議之髙弟志公之墓當崇寧中方諱言蘇氏但言為守者至不言坡之姓字鑰隨侍括蒼于郡齋見公作守時十詩石刻摹遺其家此外罕見公之遺文自少學賦最重韻類之書竊以為古今類書第一蓋類書必須分門雖多出名公而事多重疊又必有雜門惟此書以韻别之讀者隨字徑取一索而獲每一目之下必有賦題故以題選為名況公編纂精確諸經注疏搜括無遺蜀有書林號為該博止取白氏六帖散于此書之間其實反成猥釀殊失本意世鮮知者公之五世孫槱録公與東坡同官事迹及豐公所為銘謂鑰書干後因誦所聞併書之兩家子弟衰門既幸未墜而公之後儒風日興有孫字質甫好古篤學教子有聞于時覺名鄉書燮以吏部知九江槱以特科為丞燮之子肅甫一孫字叔平又有名方亦以特科進其子洽與肅俱收世科其興殆未艾也羅公亦為杭之二車與坡同時有啓云談笑風雲咳唾珠玉弟兄射䇿有機雲慷慨之風父子談經無歆向異同之論是故名動四海號稱三蘇亦為坡所深知意與公適相先後因附見云書陳止齋所作張忠甫墓銘後乾道七年客授東嘉獲從一時賢士遊忠甫居城南相見如平生歡學校中小有所聞必詰其始末而是正之略無隱情嘗曰性直言蠢執友或不能堪不意子之從我如流也鑰曰朋友道喪已久徑語實所樂聞以此終三年往來如一日又自言舊與其友謝君黔講易謂易與春秋未易窺測詩書執禮夫子雅言于是相與讀書與詩儀禮雖非全書而禮節具在自古以為難讀而公獨熟復而躬履之二卿曾公逮時以吏部典州取其所校定大字刻之實為善本嘗問何以不仕曰今之仕皆非古之道是以雖貧而不願祿也問其説曰始至則朝拜遇國忌則引緇黃而薦在天之靈皆古所無也其持論不回類此後十五年叨冒假守則公已亡又二十五年當嘉定四年凡始以志銘求書丹感念疇昔併書于後跋唐林夫父子帖唐質肅公盛名士大夫户知之少時見唐氏風憲記及東坡守杭州贈林夫詩又知有林夫之名鄭君寅宰吉之太和今工部尚書汪季路其舅也以林夫嘗自諫院謫五羊移監太和鹽酒稅遂取所藏林夫所書少陵劍器行哀江頭二詩與家問等及其父翰林侍讀學士彥猷二帖併使刻之縣有林夫墨池山谷後為令嘗為之賦詩則其工書可知父子筆墨相照映後來當自知識别不待贊揚云季路好古有素鄭宰實知樞密院惠叔之次子聞其博雅有能稱必能訪求遺迹以增益之跋六逸圖孫登長嘯馬融卧吹笛陶潛漉酒巾邊韶晝眠阮孚蠟屐金貂換酒畢卓甕下雅放樂暢逹逸蘇子美書頃在髙炳如家見案上有六逸圗意其為竹溪李白孔巢父諸賢閲之乃孫登馬融陶潛邉韶阮孚畢卓此卷絶似而有滄浪真迹以六字目之尤為可寶余于此見淵明又在館中見唐人為太白寫照始知今世所畫陶則狀其逺韻李則極其俊氣殆出龍眠諸人意匠未必真也展玩未已童子忽曰豈針灸圖耶坐客為之絶倒跋吉日圖此圖古矣意其出于唐人是時六經未版行本各不同故滄浪録舊文而以今本證之前有壯士驅羣醜而前以待王射得悉率左右以燕天子之意然御者當居中以執轡主將居左必擇勇者為右此畫御者或在左或在右殊未曉也跋史文惠公帖四明沈氏纍世為儒鑰幼年猶及識博羅公是生三子長字公權為鄉人師表晚始得官太師史文惠王篤布衣之交薦之孝宗上殿改秩為紹興簽判次字髙卿少負俊才紹興十四年初開太學時侍郎髙公為司業陳公少南為博士皆極天下選得髙卿春秋卷置之首選聲名籍甚竟以恩科得一尉食祠祿以終簽判有子曰煥官雖不逹而有盛名尉有子燠力學未效家藏太師所作博羅挽詩及薦尉公于梁丞相帖足以見太師垂情寒士又以知尉之有以得此也前輩日逺後來者可不勉紹遺風乎撫卷三歎謹書其後而歸之跋范丞相江西唱和詩卷髙平公相業之詳見于王大參瞻叔所作行狀公之第四子孝隆棟實為鑰妻之姑之夫獲聞公平生尤著初赴廷試京師人已傳惟襄陽一范吳興一劉直言時方佞諛成風人已想望風采暨臚傳盡甲科不見二公姓名李丞相士美以考官侍立出班奏知徽宗亟命索此二卷進讀嘉歎再三遂俱置第二甲首公既得官時何丞相文縝方為內相往别之何公曰如公等人物豈應墮州縣中公年始逾冠對曰偶叨名第且欲歸山中讀書未暇求進也何公尤加歎賞贈以詩曰漢廷初唱乙科時陛楯何知亦歎咨天子方將前席問將軍焉用免冠為髙風已側諛臣目異日應伸壯士眉更向山中讀書去功名如此不嫌遲然公竟自此橫翔三十一嵗為髙宗朝名相兹得敬觀詩篇遺墨敢識舊聞于後劉公名寧止云跋米元暉著色春山向薌林有題元暉橫軸云早為山谷印可晚陪帝所清間筆力休論扛鼎神工更解移山向日家居道士今朝筆落仙鄉胸次山髙水逺筆端雲起風狂可謂曲盡矣關同李成皆世名筆多大山喬嶽之形元暉專貌江南山水自成一家此卷尤為勝絶超然故物也後人多作贋本去此逺矣跋王都尉湘鄉小景國家盛時禁臠多得名賢而晉卿風流尤勝頃見雅集圖坡谷張秦一時巨公偉人悉在焉淮海詞所謂憶昔西池會鴛鷺同飛蓋者又有詩云夢入平陽舊池館隔花猊口吐清寒皆為此也嘗畫孫浩然金陵離亭燕詞多少六朝興廢事盡入漁樵間話曲盡其妙今又見湘鄉小景著身富貴不以平陽池館為戀而樂荒間之野雖嘗因謫居而見之四時草木羣飛皆有生意胸次可想而知跋楊叔禹所藏東坡帖二疏淵明洎文太師其退一也老矣既退復來求去未得尤有感于斯言坡公猶以名位過分日負憂責吾曹豈容安處耶人言作文當如作家書長公家書即文也如此等帖可以弔喪問疾而廢之乎紹熙四年余以左史攝詞掖為殿試編排官楊渾甫為檢院其子叔禹登甲科明年嘗書此卷又明年當慶元改元余自天官出守婺女叔禹送以詩有云為漢寢謀惟汲直在唐無黨只香山雖不敢當實佳句也萬里之别余自廢退十三年又已休致不謂復來而叔禹召還由學館入册府再見恍如隔世坡帖八軸復得披閲慨念疇昔遂書卷末云又跋東坡三笑圗贊坡書三笑圗贊不言為誰山谷實以陶陸逺公事陳賢良舜俞廬山記亦云舉世信之有宗室彥通字叔逹作廬嶽獨笑一編乃以為不然謂逺公不與修靜同時余曾因其言細考之十八賢傳逺公卒于晉義熙之十二年丙辰年八十三而吳筠所撰簡寂陸君碑修靜卒于宋明帝元徽五年丙辰去逺公之亡正一甲子而修靜年七十有二推而上之生于義熙之三年丁未逺之亡修靜才十嵗況修靜宋元嘉末始來廬山逺之亡已三十餘年淵明之亡亦二十餘年矣淵明生于晉興寧之乙丑少逺公三十一嵗卒于元嘉之四年丁卯逺亡時淵明年已五十矣固宜相從姑志之以示好事者跋曾召南所藏先侍郎訓戒諡法尚矣子孫孰不欲顯其先世然罕有以清為諡者嘗求之周公之法及春秋廣諡沈約扈蒙諸書皆無清字惟賀琛之書乃有其三曰弗邇聲色曰清弗殖貨利曰清臨官潔正曰清蘇老泉之書有其一曰避逺不義曰清有如趙清獻公豐清敏公皆世所歸重若趙清憲則未免有議之者矣葛文康公之父官雖未及特諡清孝頃見文康謝表有云俯惟先臣夙有卓行飲氷自勵清每畏于人知負米服勤孝實由于天稟觀休寧以語薑尉之言可謂嚴矣至曾文清公乃得此名公論為之翕然鑰初筮永嘉時侍郎由吏部郎典州親見美政後十五年叨冒假守凡事以為模楷今閲此卷訓戒其子引文康之言洎文清之書兩家皆以清易名者清白之傳可知三讀歎仰不已召南久更事任已有所試矣其益思所以振家聲者哉攻愧集卷七十七
