  text: 攻愧集卷十一
  hash: sha256:8f3c24b7fea4e8aa53e7194827e338a5228c1de49baae7c406d7591851d2cfe4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_011-1a}
body:
  text: 宋樓鑰撰今體詩送趙德老觀文東歸趣還宗老侍經筵宿望訏謨信偉然引疾屢煩頒漢制賦歸先已買吳船去年趨召叨同傳今日求間愧著鞭未得相隨出關去羡公徒御若登仙往還不過酒三行成敗同觀棊一枰東海敢言成二老西湖自足度餘生朅來便覺廢兹事歸去定須尋舊盟錦里錦坊秋色裏夢魂先已到江城送倪正甫尚書守南徐君如春栁我如松晚嵗重逢意逾通日日公餘搜理窟時時史暇樂談叢友朋罕有心相照兄弟惟應姓不同此别未知何日見摻袪無語對西風滿腔忠膜與嘉謨空洞他無一物餘有語莫非憂國志欲行猶上薦賢書已欣勇退成清節更喜高眠即故廬廊廟須公經濟手不應斂惠向南徐幾回去國向吳興出處雖高事不平茲以優恩臨北固不妨禁直寓西清羡君決去行何速愧我求歸計未成浙水東西又千里壯懷堂上未忘情戲題十四弦十四朱弦欲動時泛商流羽看瑤姬弦疏不隔如花面聲急還同墮馬兒溪蟹霜餘縈密網簷蛛雨後理輕絲曲終勸客杯無算一吐空喉醉不知樞密新府平生苦欲住山間每恨家居不傍山遊倦匆來參宥密公餘卻得對孱顔援琴萬壑自同響緩步一丘猶可攀信美終非吾久處乞身惟待老鄉關門號簽書府心存攻愧齋倚欄臨曲沼拄杖看懸崖稿葉鳴輕雨殘山擁半階退公成吏隱足以暢幽懷大雪趙振文寄詩言乘月泛舟清甚次韻老我心知筆力衰頗欣臘雪瑞清時三茅竒觀亦難遇白玉峯頭燈萬枝萬玉真妃搖珮琚梁園授簡屬相如莫嫌一水限吳越兩岸交輝合太虛雪光絶勝水銀銀未覺仙家隔一塵真境宜君著佳句賞心樂事更良辰見説中宵泛綵舟何人同賞大江流陽冰伯雪應為伴更約襌人白道猷舊聞老具擅詩聲夜泛錢塘向鳯城今日清遊更豪逸雪花和月帶潮生遊錢塘江詩云小舟為我載月色白法具字圓復紹興初詩僧也有月夜下金陵四百年無此豪逸沙翠竹光相射自從李白酒邊戲作未年六十已言歸七十重來自覺癡未報君恩歸未許樽前羞聽摸魚兒葉處士畫貂蟬喜神見惠重煩妙手費丹鉛貌出衰容信宛然君看頭顱已如許豈堪頭上著貂蟬頃遊龍井得一聯王伯齊同兒輩遊因足成之路入風篁上翠微老龍蟠井四山圍水真緑淨不可唾來不知處一作水從何魚若空行無所依勝處雖多終莫及舊遊誰在事皆非秖今匏繫何由到徒羡聯鑣帶月歸海潮圖錢塘佳月照青霄壯觀仍看半夜潮每恨形容無健筆誰知收拾在生綃蕩搖直恐三山沒咫尺真成萬里遙金闕岧嶢天尺五海王自合日來朝題施武子所藏醉白堂記有序醉白堂記相臺舊刻已不多見施武子得太清樓所藏真迹一代竒寶也魏王尚友香山坡翁詞翰兩絶晝錦故居昔嘗以假吏過其門巷恨不一到其處太清圖書流傳至此撫卷無非可歎者事至今日歎又不足為之慟哭可也堂名醉白尚存不詞翰輝光射兩眸天下曾除蘇氏學禁中卻有太清樓舊碑于世已難見真迹惟君乃得收感歎不堪衰淚落林慮山下水空流無水于林慮山引魏王以相州城中溢為灌溉之利水入城貫第中謝雷季仲樞密惠社餅寵分餅卷荷深情割肉烹鮮不厭精潭府始知嚴社祭衰門又得詫侯鯖洗杯用薦逡巡酒下箸如餐骨董羮回首枌榆未能去欲隨秋燕問歸程婁彥發參政十一日八月二壽詩有序某伏承生申之旦正得秋而萬寶成真是一年好處中秋佳月浙江大潮皆每嵗所有芙蓉菊桂俱不復重陳今則實惟巖壑所誇一百省嵗之時況值合宫大禮儲君受册前星誕育昴宿凝祥相去只五十間賓僚惟公為舊學都省後堂祝壽之儀久不講此公首當之今又以慶朝按試鼓吹嚴更警場輒成唐律發樽前一粲青宫册寶盛朝章玉佩珠旒照日光儲寀久資三善得生朝相去半旬強五千餘卷學尤富一百省年身更康都省先曽同舉酒貢闈最喜又傳觴易逢皓齒令歌曲難值嚴更聽警場慶事方來真可卜祝公黃髮相虞唐題孫谷橋墦間圖墦間不足又之他猶自施施驕室家齊國一人如許爾寧知後日事如麻因知義利本殊途莫笑璠間乞祭徒正使往來多顯者此中尤要著工夫肆赦小雨余曰君雖長未免雨立歸途成小詩時章達之樞密在麗正樓上禮畢戲謂端門宣赦樂欣然膏澤還應降九天始覺耳邊鳴槭槭漸看笏上溜涓涓我班金闕闌干側君侍玉皇香案前雨立固知同陛楯一言猶幸賴優旃題桃源王少卿占山亭納納乾坤一草亭西山盡見若秋屏霜餘遠水呈天碧雨過遙空現帝青逸叟真成陶令隱高懷長似屈原醒肯堂固賴賢孫子精爽猶疑尚有靈題汪季路侍郎所藏吳道子天龍八部妙絶天龍八部圖細看真不失錙銖聲名自足高千古題品尤難遇二蘇旌旆冕旒猶可想鬼神人物亦何殊君看坐位蘭亭草費盡工夫學得無美子瞻也二蘇謂子謝顔樂間篆離騷樂間下筆素推高攻愧耽書老更叨顧我好看秦小篆煩君為作楚離騷晚年應悟成竵扁痛飲猶堪寫鬱陶喜劇但知嵗十襲瓊瑤無以報投桃題徐聖可知縣所藏楊補之二畫誰種疏梅古岸頭推篷瞥見倍清幽君看竹外一枝好真有江南萬斛愁梅花屢見筆如神松竹寧知更逼真百卉千華皆面友嵗寒秖見此三人嵩嶽圖有序先祖太師齊國公元符中知河南府登封縣建炎兵燬先集故物煨燼無遺兒時猶及見揚州伯父藏嵩山圖丹青僅存雖傳録草四峯詩以生晚既不逮事不知有石刻也張致遠為京西僚屬寄登封舊碑得之驚喜唐律為謝先世前蹤不可追君從何處得全碑上橫嵩嶽三千丈下列齊公草四詩室號揖仙懷舊事菴名面壁認遺基青氈真是吾家物欲以瓊瑤厚報之寫照葉處士求僧幾年依樣畫葫蘆自作葫蘆學佛徒一筆從今勾斷了一瓶一鉢任江湖元日嵗當庚午旦庚寅最喜明朝遇上辛五福來臨吳越分更欣三日即頒春題郭恕先雪霽江行圖妙絶丹青郭恕先幻成雪霽大江船沿流更飽輕帆舉上水仍勞百丈牽捩柂長年渾欲動褰帷佳客若將仙侍親曽泛滄浪月猶記蘭成射䇿年太師行大江十八歲時侍先寄題江西劉氏勤有齋朴斫敷災皆用勤況吾儒者務多聞萬書插架非關我一卷入心方屬君為學從來無止法立身寧秖富多文自憐習氣今猶在尚欲楚膏到夜分書葛氏詩卷間適十首詩有致仕心未年六十蚤休官海角投間儘自安一紀時容奉香火七旬遂許挂衣冠重來深愧妨賢路此去終期保歲寒三上封章歸未得葛家詩卷却羞看殿上聞杜鵑衰晚三年侍玉墀高梧又擢鳯凰枝封章屢上未容去更向殿頭聞子規王伯齊染髭垂髫相見舜江濵荏苒俄驚過五旬顧我頽齡真似葉訝君長鬛亦如銀萬金安得神仙藥一笑重來舊日春縱使星星還復出不妨時作少年人乞出過傳法聞伯齊歸姚江扶病還朝一秃翁重來寧免笑何公夢魂長是尋雲北歸路何時向浙東深願聳身隨畫鷁空勞舉目送飛鴻主人竹所終須到最憶東軒一枕風行香聞杜鵑牆西緑栁杜鵑聲我老何堪側耳聽我自賦歸歸不得不須苦語更丁寧送蔣甥若水使屬北行曽為假吏到燕山送子長征不作難故國能無歎禾黍中原應欲覩衣冠黑甜軟飽宜加愛紅皺黃團正可觀行矣勿為兒女戀指期良月待君還夜讀王承家縣丞詩編向來深夜快揮犀不聽清談又許時淨洗昏眸急呼燭為君讀盡一編詩鍊句工深興味長固知家學富青箱莫言一臠能嘗鼎更欲為余傾錦囊寒食輔政無功日歉然佳時頒賚屢傳宣已蒙授粲仍分茗既荷貽牟更擊鮮酒號流香盛寶榼燭然新火散青煙兒孫不識君恩重但覓東宫賜劇錢夫人攜家泛湖三分春色二分休始見魚軒泛緑舟諸子待行歡盡日一翁獨坐淡于秋滿斟美酒應同醉是處名園為少留隂靄在前雷雨後特晴此日稱君遊即事壯志摧頽貌亦衰豈知官舍傍巖隈此身不是京塵裏飯了沿山看臘梅劉寺即事不到兹山二十年豈知重見舊山川煙深雖不見湖水且看長空萬里天飛泉何事仰空流無數明珠散不收注輦昔時曽撒殿至今拋擲未曽休􅗍發漕薦喜而成詩併勉杓戊辰貢舉忝余知曽礙孫兒到省闈欣汝今秋重預薦喜吾即日可言歸門闌有慶人爭賀父子同登世所希癡望十人俱上第坐令晝錦倍光輝十月旦尚暖用夾公服二月初吉雪寒甚服單尚暖先添夾方寒卻用單不惟春料峭況值雪飛翻但欲朝儀肅難求已分安衣囊如欲懶歸去老江干從子淮過省寄伯中弟我家伯父德餘輝吾弟風標具體微七葉欣聞五爭奮四人先喜一雄飛忍貧老尚甘簞食教子今方擢省闈他日雙椿臨六桂麻衣俱換緑衣歸贈僧文可往黃州建東坡寺一坡久矣郡城東居士來遊地望崇問舍求田煩作計拈槌豎拂看談空共分龎老沈江寶要奉儋州秃鬢翁去作開山第一代燈燈相續到無窮三月七日上賜牡丹並薔薇露勸酒幾見牡丹東海涯暮年敢謂到京華休論千品洛中譜驚看百枝天上花況有八珍來禁苑更加雙榼賜流霞闔門飽暖聊同醉稽首將何報宅家史清翁談詩走筆次韻公退門庭靜輕風輥絮毬故人驚一見小酌散千憂西上不容久東歸又别愁何當附舟尾從此遂歸休以興安石阮底寄顔樂間興安樂石響于桐作阮猶堪繼仲容茂苑樂間真好事為君添起玉玲瓏觀冷泉亭放水冷泉淺濁使人愁開板黃波去不休岸側細泉穿亂石始知别是一清流贈蜀二史有序紹熙四年蜀士李德秀甫登科求致其事以榮親先帝詔從其請某時任西掖預草詞命今皇帝䇿士蜀又有二人焉同姓史氏其一綿州司戶天應與其子簨同登遂以身之官求封贈父母其一成都府司户公亮自陳素志晚得一官亦為此舉上益嘉之各特循從事郎致仕聖朝孝治之盛十九年間見此三人坤維士風于是尤振輒成唐律表贊喜之私仍寄后溪劉德修老我挂冠慚復彈羡君登第遽休官幸哉有子事尤美專以為親人更難舊説三賢皆特操今看二士倍榮觀同歸猶及襄陽老一舸清風草四灘題汪季路尚書所藏米元暉蔣山出雲龍盤往昔名鍾山雲起從龍意自間膚寸須臾成戴帽坐看膏雨滿人間九月十一日杓孫得男郡齋弧矢記垂門今日衰翁更覺尊生晚不能瞻大父年高卻喜有曾孫從今鏡鑷知無用但喜芝蘭近愈繁願汝孳孳守家法為傳衣鉢到仍昆送叔韶弟宰華亭試邑雲間事最多直將心力細礱磨固知三泖五茸勝其奈千瘡百孔何敏手未須施霹靂疲民正欲聽弦歌規橅穩作三年計徐上青雲鬢未皤又示從子澶壯縣人歌第一竒過庭為有寧馨兒親旁色養宜加謹戶外分毫勿預知寓意杯觴須自節讀書松竹有餘師他時刮目相期待連桂家風望一夔寄叔韶弟阿連試邑有成規誰謂雲間不可為能使鑊湯偏滾處直如官府太平時容容非欲後多福赫赫何如去見思子路當年曾請益更須無倦以終之朝退謝事不得去趨朝愈更難誰憐八旬老日冒五更寒指凍怯持笏腰酸強踞鞍細思誰縳汝只合挂衣冠劉德修赴遂寧示和篇改除荆南復寄之老矣思歸鋏屢彈七旬望八合拋官我將東去計安出君欲西還事亦難好向渚宫尋故迹更從雄楚縱遐觀上遊正倚公為重莫向蓬溪更上灘李起宗舍人悠然亭遠遊蜀道歷艱難徑上甘泉豹尾間荷橐忽思辭北省拂衣自喜見南山當時旁舍基猶在回首垂髫鬢已斑先友碑隂盡陳迹寒空依舊濕煙鬟伯中弟可休堂夫婦老相對閨門貧甚安六兒俱力學一子幸仙官香火祠初奉勳名鏡裏看更當聨五桂納祿尚何難海棠海棠昨日始萌芽一夜驚雷發萬葩老眼恍然何所得凌雲庵外見桃花海棠初發為題詩倐見輕紅萬點吹已惜落英鋪滿地更憐幾片罥蛛絲後圃春雨才晴氣已和暖風吹動百花窠絶憐玉屑如吾髮緑者全稀白者多贈熊道人十載隱潭衡居然腑肺清枯禪參懶瓚老氣激彌明筆底煙雲妙人間勢利輕款門俄告别江海一浮萍韻借題汪季路尚書所藏米元暉湖山瑞雪圖筆力誰能似虎兒思陵親為御珍題小臣不識湖山好但欲扁舟泛剡溪揚州瓊花回憶靈根六十年秋深恨不見芳鮮茲從淮上來千里非比人間聚八仙曽有畫圖稱小異諒應后土愛孤妍或言天杖誠虛語榮悴中分亦偶然題林宗魯校書所藏宣和御畫周公多藝孔多能徽廟才高更倍增除却萬幾都不會至今遺老話昭陵贈别章茂獻尚書我輩重來鬢已皤正元朝士苦無多才堪柱石猶歸去奈此摧頽一老何戲咏戎葵簇成芍藥回首間來婪尾春橫風吹盡已成塵戎葵簇就誰嘗巧紅藥當前太逼真觀洧贈人迷冶子翻階得句誤詞臣園丁妙手有如許猶勝隋園剪綵人戲題膽瓶蕉垂膽新瓷出汝窑滿中幾莢浸雲苗瓶非貯水無由罄葉解流根自不凋露綴疑儲陶令粟風搖欲響許由瓢相攜同到緑天下别是閩山一種蕉午暑炎官火傘罩中區病老低垂氣不蘇難學孫兒頻飲冷時將冰水洗霜鬚省宿樹滿茅山緑正肥昏鴉日日向南歸如今身在三茅外卻看歸鴉正北飛水蕉獵獵水芭蕉如將隱士招清風來處遠溽暑坐中消送楊晦叔提舉浙西並寄陳表道兩兩郎星映使星老人星彩對晶明褰帷共喜行畿甸洗印仍欣就帝城五馬況當恩始拜三吳從此政尤清便看瑞慶求稱壽同聽嵩呼萬嵗聲八月四日晚霹靂碎大栁木秋分雷自合收聲白露明朝忽震霆怪得坐中驚欲倒鄰牆萬栁碎中庭靈光魯邦宫殿久蕪荒惟有靈光最久長身似靈光終變幻巋然别有一靈光謝陸伯業通判示淮西小藁四海詩名老放翁遺編俱在迹成空忽從淮右傳詩卷近比劒南真父風暫向壺頭追馬援何當甫里訪龜蒙江山為助多佳句莫惜南來寄斷鴻蕉菴清坐薄晚歸來煙已蒼蠻蕉一葉障斜陽不須久住潭潭府始覺山林興味長蕉菴暮歸緑蕉隂下繞斑衣飯了從容到夕暉老子才攜笻杖去孫兒各捧竹團歸病告閉戶垂簾儘自如兀然終日擁紅爐得歸足可優遊老此地何堪養病軀殿上侍立寒甚小雪以來霜氣清今朝寒色倍嚴凝榻前侍立無遮障吹得半身真是冰齒落戲作零落殘牙齒年來落欲空得魚惟食凍捨肉只餐蔥休憶紅綾餤難吞栗棘蓬何須如劒樹始解振宗風重陽淳生日時年四十九矣汝生四十九年春猶記雙親始得孫當暮知非過能寡敢言學易道彌尊喜吾父子為知己賴爾詩書遂滿門但得團欒長似此年年萸菊醉清樽范敘剛舍人示文正公象笏千載威名文正公忽瞻遺笏照雙瞳敢從象齒窺清裁屢批龍鱗奮大忠秉立定知端若柱至今猶想氣如虹舍人接武登廊廟宜寶甘棠振祖風送黃貞護道人住茅山贈以黑玉虎少從黑虎谷中行晚得於菟玉琢成輟以贈君俱隱處大茅峯頂看風生贈凌一源道人知君曽住武當山更解尋幽灊皖間老矣無緣窮勝處但思歸去臥鄉關謝滕宰彥可惠詩與君相遇海東頭明月如何忽暗投自愧重來千嵗鶴永懷靜對五湖鷗新編不覺成三復妙思誠堪比四愁還肯來遊鄮山否與君攜手上東樓薌林雪中過峽圖不土之里無言詩泛雪清圖事已非墨隱為君傳舊迹宛然興起剡溪西賀監湖上萬頃平湖一葦杭此歸喜似賀知章上恩賜與西湖曲遂老吾家歸照堂狂客歸來終好夸越王城下占煙霞此中信美非吾土不是西湖是我家攻愧集卷十一
