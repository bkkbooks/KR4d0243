body:
  text: 宋樓鑰撰外制同知樞密院事趙汝愚知樞密院事敕朕延登樞臣方務親賢之並用擢專兵本豈以日月而為功式隆磐石之宗益聳維巖之望具官某仙源有自天分素高發之以埸屋之聲名博之以師友之問學論思禁路真有諍臣之風填撫藩方著古循吏之績望之堂堂折而不撓元齡孜孜知無不為卓爾士夫之間居然公輔之器頃為儲寀已知許國之忠兹二機廷尤見愛君之篤俾升右府之長密贊中宸之謀增衍真腴併昭異數噫三軍五兵之問雖未至于廟堂一日萬幾之繁正有資于帷幄朕方越拘攣而圖任爾其勉忠力以赴功惟既厥心同砥于治吏部尚書余端禮同知樞密院事敕朝建幾廷實總事樞之要任專軍政尤資副二之賢乃圖舊人用稱隆委具官某氣和而有守資介而能通蚤膺慈扆之知遍儀清貫爰列儲闈之屬久事初潛禔身有肅括之稱立朝奏正直之德典銓衡于選部尤推鍳裁之公守管籥于留都允藉保釐之略召還位著益簡豫衷蓋君臣相知非一日之積而文武並用何二柄之分屢登朝夕論思之班宜居夙夜宥密之地啓侯封之土宇卑采邑之圭腴噫運籌帷幄之中當逺追乎前躅折衝樽俎之上正有望于壯猶尚服寵光毋替朕命萬鍾司農卿敕具官某爾以才諝早為九卿去國久之擢冠宰掾仕已之際不見幾微召對便朝奏論詳雅是用命汝復長豫周稷之任王城內外儲粟動以百萬計上下仰給事則浩繁往哉惟欽以稱朕意通議大夫知樞密院事胡晉臣致仕敕三年輔政是為股肱之良一旦乞身欲挂衣冠而去勉從爾請深軫豫衷具官某迪德粹和秉心正直尊賢容衆無一毫忌刻之私學道愛人備四時溫厚之氣察其有守任以不疑典封駮于東臺贊樞機于西府進參鬷嘏遂長本兵方期竭節以相資乃以沈疴而有請任重道逺知許國之未量名遂功成奚退身之太早無君子者如蒼生何噫垂車而傳子孫顧莫回于雅志就第而問籌䇿尚有冀于壯猶其服寵光以綏吉履胡晉臣贈金紫光祿大夫資政殿大學士敕抗章自列俯從納祿之言遺奏上聞猶篤愛君之義驚柄臣之已矣撫往事以愴然具官某天賦純誠世推厚德仁必有勇立朝多謇諤之忠正而不它致主盡忠清之節自登近弼可謂大臣何抱疾之遽深願辭榮而勇退始猶未許遂不可為愛之欲其生謂何恙之不已死者如可作微斯人而誰歸加祕殿之隆名極文階之三品俾昌厥後均賜以官噫命方士而求馬周空軫如存之念輟餘瓜而奠如䀲徒增追悼之懷顧一鑑之既亡嗟九京之何及尚惟英爽歆此寵靈潼川運判劉光祖奏儒林郎知資州龍水縣楊安益賑濟有方循一資敕具官某潼川去朝廷逺頃修荒政部使者察一道官吏之能否以龍水為最而聞于朝進爾選階以示褒表徐元德知均州敕具官某均之為州雖逺以其控制洞蠻置武當之節使填撫一境任不輕矣爾蚤以經學教授鄉里旋以聲望登進朝行二郡新安績用罙著剖符兹土以惠逺民往哉惟欽益行所學太常博士陳柄祕書丞著作佐郎李唐卿著作郎祕書郎范仲黼著作佐郎校書郎王奭祕書郎正字蔡幼學校書郎敕具官某等道山羣玉之府聚天下英俊其間所以涵養器業以為進用之儲也爾柄以容臺議禮之舊爾唐卿爾仲黼登瀛既久爾奭爾幼學給札著間或分典丞郎之職或序進著作之庭校讎未見之書不改共二之故職優選遴孰邁于此其思稱崇奬之意以為邦家之光太學博士邵康太常博士曾祕國子博士太學録雷孝友國子正田淡並太學博士敕具官某等博士秦官掌通古今員多至數十人國朝稽古建官凡以博士名者皆淸選也爾康學問該洽俾議禮于奉常爾祕資稟純篤俾典教于胄學爾孝友爾淡俱以上庠糾正之職升教育之任一日而拔士以十數亦足以知朕好賢之意也其祗明命毋曰序遷費士寅藉田令敕具官某朕立賢無方視所為主苟得茂才多列于朝爾以西州之雋褒然為舉首薦口既重又當有以表異之往司帝藉實預容臺清華之選權輿于此惟務靖共以俟甄拔主管吏部架閣陳希㸃國子正湯璹國子録敕具官某士修于家而仕于朝又典膠庠之教事可謂榮矣爾希㸃蚤上甲科久為掌故爾璹首冠南宫未登華途嘉其靜退之風俾參樂育之選雅有聲望司豫成規子率以身疇敢弗恪湖南提舉郭德麟宗正少卿敕具官某宗正一星在帝座之東朝廷以屬籍為重設官以象之卿少之選亞于太常非他寺比也爾以諒直周密久司六察之職出持使節深簡豫衷賜環來歸優置少列豈徒為飬望之地將有以進汝焉皇叔祖贈少師士峴追封郡王敕冠三孤之位既頒恤典之優疏千里之封更極真王之貴具官某分暉天派擢秀宗支琚瑀珩璜允矣朝儀之肅櫜兜㦸纛居然將閫之崇雖平生坐致美官而終老不愆素履逮朕纂承之始方形親睦之風曾頒爵之未遑乃抱疴而自晦云何不淑遂止于斯噫搢笏垂紳愴典刑之安在分茅胙土尚冥漠之有知用慰爾靈益昌厥後士峴女三人並封縣主敕某人朕丕承慶基崇篤宗老凡今屬近行尊歷事三朝如爾父者幾人奄其告終遺奏來上粲然三女願賜湯沐朕何愛大邑之封不以慰爾父之意乎益懋壺彛以對隆渥同知樞密院事余端禮初除封贈曽祖慶太子少保敕士有致位廟堂而光顯于時其上世終身韋布而追榮于後惟源流必有所自而貴盛亦豈偶然具官某樂道丘園隱居閭里人無知者實有侔于天我自得之故無待于外比及三世乃生二樞朕方以儲闈舊學之臣擢居宥府基命之地首以宫保之亞用為曾門之光豈徒顯爾宗之祧抑以為善士之勸曽祖母徐氏齊安郡夫人敕朕延登儲寮進二樞管既已寵及上世又念伉儷之賢必有以相之者故加以小君之號焉具封某生太末之樞盛偃王之族嬪于良士託以終身諒閫範之可稱至曾孫而遂顯擇黃岡之佳郡開石窖之新封賁爾泉扄歆豫渙渥祖鐸太子少傅敕君子之澤既被于後人朝廷之恩宜及于先世有德必大可考不誣具官某探六藝之遺言為一鄉之善士雖文學行誼不見于用而孝悌忠信能行于家再傳而興致身樞近推跡先祖之自欲亢余氏之宗青宫六傳舉以命汝尚惟不泯服兹寵靈祖母傅氏高平郡夫人敕儒者篤行不顯于世而能垂裕子孫則亦惟閨門能循法度以為之助追贈之寵殁宜共之具封某謹蘋蘩之儀佩圖史之訓克事君子相敬如賓是生賢孫為朕良佐以高都之名郡為湯沐之新邑惟爾靈其預享之父贈通議大夫繪太子少師敕信安自趙抃以來仕登宰輔不過三數人我有本兵之賢固由自致跡夫義方之教當揆所元具官某秉心靜淵履行淳固分薛包之田而愛形于兄弟折馮歡之劵而義篤于鄉閭積善有餘固非一日之力延師不倦遂成令子之名周旋清班登進宥府蜜章加贈屢升法從之階禰廟益親獨簉宫師之選以示教忠之效以寬追逺之思母淑人虞氏咸寧郡夫人敕士之家傳固出父師之訓古有胎教實由母氏之賢仕既顯于朝廷寵宜加于泉壤具封某天資婉嫕婦德靜專謹以事夫逺追舉案之美勤于教子不愧斷機之言雖魚軒不見于生前而鸞誥屢頒乎身後兹錫義川之號蓋由樞管之恩慶則有餘澤其未艾妻淑人葉氏信安郡夫人敕大臣許國能有羔羊正直之風夫人起家必如鳲鳩均一之德既資內助之力宜啓小君之稱具封某姆訓是遵壺彞甚飭相爾夫子不以事物嬰其心為時名卿得以廉白厲其操位登兩地之貴恩霑三世之先矧惟魚軒宜爾象服視樞臣而命爵就鄉郡以疏封益肥汝家庸稱豫渥浙東提舉李謙乞將合轉朝奉郎一官回授本生父珝贈承事郎敕具官某故本生父某朕方以孝治天下凡以親為請者多曲從之爾世有令德躬履特操是生賢子而嗣其兄既已能顯其父母矣願捨外郎之一秩求贈本生之二親淳化淳熙況有故事是用寵爾以廷評之階詩不云乎孝子不匱永錫爾類爾子方為部刺史以此風厲郡邑其助吾風化多矣本生前母王氏本生母陳氏並贈孺人敕具官某故本生母某氏爾有賢子出繼伯父既顯其親又追惟本生之重願加贈典有司已援舊比且言員郎所係為重而其請于義可矜足以勸臣子榮親之孝朕曰俞哉並進湯沐之封以為泉壤之寵胡澄知光州趙彥珖知容州敕具官某等光山之在淮右今為保障之區容管之在廣西舊為經略之所選候而往寄任匪輕以爾澄起由名家嘗奏郡課爾彥珖秀出天族洊佐藩條往分顧憂當體朕意有政可紀無逺不聞勉哉四川總領楊經直寶文閣提舉四川茶馬敕具官某爾以宰掾之長往餉蜀門之師萬里馳驅之勞計當入境四川榷牧之寄尤在得人與其遴選于中朝孰若就煩于便道載頒英簜寓直寶奎摘山以惠逺人市駿以備戎事惟鄉閭之在望宜利病之詳聞往既乃心用掦厥職淮西提舉張同之奏修職郎安豐軍六安縣令陸子虡救活被水人一千四百餘人循一資敕具官某鼓鐘代鼛淮有三洲詩人所以興嘆也安豐之潦朕聞而念之部使者謂爾有字民之能乃得救災之術進爾一階又以少徇父老借留之意其亦寵矣益勉之哉朝奉大夫知敘州計孝似夷賊作過不能彈壓降一官敕具官某僰道被邊郡將實當控御之寄而威令不申夷獠侵侮驚擾邊氓害及徼吏久而後定是不于汝而誰責哉其上一秩尚思後圖朝散郎敘州通判李楰孫節制義軍驚動夷賊降一官放罷敕具官某逺夷匪茹侵我王略爾為别駕受帥檄而不進擁義軍以自尊致此猖獗而又貪功幸賞迹狀昭然削秩免官以示邊吏之戒尚為寬典其務省循諸王宫教授楊大法國子監丞黃度並監察御史敕具官某等憲臺設屬實分六察之司御史虛員當極一時之選孰堪此任今得其人以爾大法以端恪之資而達于時宜爾度以深沈之量而敏于吏事舊臨劇縣俱著能聲嘗對便朝各陳讜論尚忠而用夏政既已先明詔之頒約史而作宋經亦已考遺編之載並加親擢蓋自簡知爾其助正紀綱振揚風采務求稱職之實毋負官人之能福建提刑盧彥德本路運判敕具官某爾屢持使節為時老成暫居郎曹復按閩部祥刑之寄方藉平反將漕之司又煩調度不改山川之舊仍頒郡邑之條益靖吾民以稱朕指知郴州吳鎰湖南提舉敕具官某爾以冊府之英起當郡寄慈惠之政徹于朕聞夫士之務學固將見之用也始以宜章之最俾任一州茲由郴陽之能得廉一道矧是湖湘之逺方當旱潦之餘醝茗阜通雖攸司之甚重倉庾斂散尤荒政之宜先爾能究心部刺史之職則朕之用汝等而上之庸止此耶曽集知嚴州敕具官某贛川之曾人物相望仕至二千石者前後以十數聲績茂焉爾習于家傳有志乎古試以郡寄有志乎民還奏便朝嘉其詳練惟嚴陵之輔郡實高廟之潛藩分以左符用撫吾民由小州得大州蓋亦寵矣益勉厥職以大爾家沈維知房州敕具官某爾以相家子明習文法自致膴仕蓋嘗久于廷評為丞為正又出為二千石矣中更閒退閲歲滋深起爾于家俾分房陵之符戢吏愛民省刑節用治郡之大端也爾皆知之奚俟多訓知江州王師古廣東提刑知吉州胡長卿廣西提刑敕具官某等國家分道遣使以祥刑為重嶺海之逺尤遴于擇人爾師古奏潯陽之課爾長卿報廬陵之政俱以儒雅飾吏踐揚嵗久授之軺傳其必能為朕審用刑章平反庶獄使百城之民自以為不冤亦惟休哉吏部員外郎錢象祖升郎中敕具官某爾自淳熙初元攝事列曹今二十年矣三易州麾一擁使節凡今郎吏出入省戶未有如爾之久者也茲以積考始正其名資望俱高益稱詳練雖曰銓法尚服優恩新成都府司戶李僑乞將所得官資回授父證贈迪功郎母廖氏贈孺人敕具官某士之發策決科以求仕也爾之子萬里造庭得官名都而求致其事以榮二親此非追逺報本不可解于心者能之乎朕甚嘉之曲從其請于以風厲四方使知慕焉新徽猷閣學士知建康府張枃依舊知襄陽府敇金陵為帝王之宅方藉保釐羊祜得江漢之心爰加因任具官某忠嘉傳世才智絶人兼言語政事之科何施不可更彈壓惠養之政易地皆然惟今襄陽在昔畿甸暢皇靈于遐徼控天塹于上游謀帥留都已畀玉麟之重還車舊鎮諒多竹馬之迎惟首公而忘私遂聞命而引道吏民如故不煩條教之載頒城郭重來但覺精明之頓改其祗茂渥以訖外庸左司應孟明中書門下省檢正右司徐誼左司員外郎敕具官某等宰掾之任重矣自爾二人為之實能謹守程度參稽事宜佐吾二三大臣以平章中書之務大臣亦言其能朕用嘉之以序而遷滋嚮于用益習天下之事以昌逺業尚勉之哉何淡煥章閣學士知泉州敕弄大夫之印方渴想夫嘉猷分刺史之符尚往臨于重鎮眷知有素中外惟均具官某名檀倫魁望髙風憲由辟水師儒之任厯騎省諍臣之班披腹而呈琅玕獨任臺綱之長把麾而去江海更觀吏治之優矧是泉山實雄閩嶠徒得君重勉為朕行煥乎文章示西清學士之寵凜然風采增南國諸候之嚴倚聞報政之期其體顧憂之意樞密院編修官吕棐太常丞敕具官某三丞號高選而容臺為最不惟禮樂是司凡朝廷有大議必咨焉是可以輕卑哉以爾奮自儒科又精吏事持論不苟亷直自將久于編摩擢置華列惟寅惟清往贊而長國子監主簿王源國子監丞敕具官某胃監以教養人才而金榖細務丞實司之爾父頃在從班有批勑之風能繼世科風烈未逺久服勾稽之職就俾序遷資望寖髙尚思所以稱其家者監登聞鼓院李友直宗正寺主簿監都進奏院羅克開國子監主簿敇具官某等國家銓擇人才進各有敘勾稽之職在寺則司宗為清在監則胄庠為重以爾友直儒學老成舊傳夫素業爾克開士行修飭自奮于世科進官于朝雅有賢譽俱遷簿領實階華途罙務靖共以祗朕命潘景圭知湖州敕具官某吳興名邦今為輔郡地大而民阜賦重而訟繁視邦選侯弗以輕卑爾練逹吏事明習憲章入從出藩踐揚舊矣起家為二千石顧豈擇地而後安移前日彈壓之威而為惠養之政尚優為之以稱朕意沈瀛知江州敕具官某大江之險分戍重兵潯水之陽號稱要地軍民錯處牧御須才爾奮迹膠庠馳聲場屋仕雖三已而無愠豫豈一端而取人既輟新安之行復分共理之寄綏靖十同之衆撫安萬竈之屯此而有稱進則未艾承節郎敘州管界巡檢程仲乾因夷人作過被殺特贈兩官與一子進武校尉敕具官某爾為徼吏勇于捍寇而捐其軀謀雖不足過于逗撓自全者逺矣以二秩告第而官其子庸勸邊臣之用命者湖南提刑孫逢吉祕書少監敕具官某道山羣玉之府聚天下英才其間必又求才之傑然者領袖之遴選之久今得其人以爾禀資端方充之以學九流百氏之書該綜無遺良史之才諍臣之風爾實兼之頃由少司成出使湖湘刺舉惟公風采凜然是今日第一流人物也還為少蓬孰不曰宜來游來歌以副虛佇楚州奏忠訓郎添差副將魏昌教習效用弩手轉一官敕具官某爾以名將之子習于戎昭練兵山陽守將以告授之一秩以勵能者蔣藺邵公翰奚士遜邵衮並大理評事敕具官某等理官之屬惟廷評為甚勞獄成之告必躬必親非習于文法者不在茲選今又試以經術蓋欲兼用儒者也爾等俱以場屋之舊明司空城旦之書而中其科虛位既久並舉而用各揚乃職使人知引經決獄之效焉太常少卿薛叔似祕書監敕具官某朕以冊府為重選才甚嚴信宿之間既得逢吉為之二又俾叔似長之所謂朝取一人焉拔其尤暮取一人焉拔其尤士論翕然朕亦自樂于得賢也爾問學淵博論議明辨結知慈皇擢在諫省有古諍臣之風逺乘軺車歸二容臺物望無不宗之既授以太史氏之職復使正此久虛之位表儀雋遊儒者之至榮也雍容養望以俟甄擢司農少卿詹體仁太常少卿敕具官某奉常惟禮樂是司而去古寖逺放失尚多非得博物洽聞學有根據者未易輕卑也爾少明經術務為有用探賾索隱恥一物之不知總餉之久蓋已由郎省而二大農矣召對雍容效忠無隱其為朕典禮樂之事鐘鼓玉帛抑末也尚求其本而釐正之蔡戡司農少卿敇具官某爾起由名家以甲科自奮登用最蚤揚歷已多深沈之度廉退之節朕知之舊矣比總軍儲嘗二外府升之農扈備豫九卿朕欲收拾人才共興治功覽爾奏篇又有得士之喜顧豈獨望以周稷之事然積貯天下之大命也方平糴以為備尚贊而長使事集而民不擾則豫汝嘉新知泉州何淡兩易知明州敇起鎮泉山將趨于閩部易麾鄞水併護于瀛壖凜聞憲府之名增光制閫之寄具官某受材精敏履行粹和場屋文鳴蚤先衆俊朝廷德選寖歷華途屬豫纂紹之初賴爾論思之益擢居騎省端有古諍臣之風進長烏臺真得中執法之體遽收朝蹟再更嵗華洊畀郡符俾近畿甸地當一面海匝三垂蔽遮浙河之東控御島夷之外布宣德意豈惟欲田里愁恨之銷敷暢王靈正欲藉文武威風之重倚聞成績嗣有殊褒知明州朱佺兩易知泉州敕具官某才有小大之異而選用當適其宜郡有逺近之殊而委寄之重則一爾詳練世故揚歷仕途鄮嶺分麾報政久矣溫陵改鎮易地皆然此則控東夷之要衝彼則據南海之都會內修侯度外暢王靈諒無憚于修途當復聞于善最司農少卿胡瑑湖北運判敕具官某朕臨御萬方寄耳目于部使者又間遣諫官御史為之俾遐陬之氓如在畿甸矧湖右實據上游而外臺當軍民錯處之地任顧不重哉爾外靜而內明言簡而氣徑一見而決亟置諫垣雍容論奏多所裨益乃自引嫌遷二大農丐外再三察其勇退茲用授爾以飛挽之寄為官擇人非以遂爾之私因事進規無忘愛君之意高文虎將作監丞敕具官某朕旁招俊乂布列周行德進言揚如恐不及矧以太史氏之舊引疾家居十有四年昔病今愈豫環可後乎爾博學篤志承伯父之傳網羅舊聞述史遷之緒採之公論僉曰汝賢再轉為丞尚居繕監職務清簡可以卒汗青之業毋以匠為嫌也汪粹軍器監丞敕具官某爾舊弼之子以才自見出臨邊郡綏靖有方奉最言歸論奏明辨丞于戎監孰不謂宜矧爾久在塞垣有志事功除戎器以戒不虞國之務也亦惟欽哉戶部侍郎趙彥逾工部尚書敕考六典之書實重冬官之職總百工之事今惟起部之司乃得宗英俾居常伯具官某聯休天派擢秀儒科立志孤高萬鍾何加于我持身廉潔一介不取諸人令名逺紹于間平惠政遍加于楚蜀任國大計為豫良臣朝夕論思有猷必告簿書期㑹惟正之供勤勞已著于纍年寵數遂登于八座親賢並用朕方隆睦族之風技巧咸精爾尚敬若工之命攻愧集卷三十七
