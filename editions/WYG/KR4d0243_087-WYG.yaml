body:
  text: 攻媿集巻八十七宋樓鑰撰行状少師觀文殿大學士魯國公致仕贈太師王公行状曾祖本累贈太師魯國公妣陳氏贈魯國夫人祖登故任承議郎累贈太師魏國公妣陳氏贈魏國夫人父師徳故任宣義郎累贈太師楚國公妣時氏封魏國太夫人本貫婺州金華縣大雲鄉安期里王公諱淮字季海年六十有四状王氏系出太原五季避地至婺居義烏之鳯林後徙金華遂占名數八世為儒至魯公守道自晦始闢家塾延名士以訓子孫政和二年魏公以科第起家知潭州湘潭縣是生四子次曰師心繼踵世科仕為吏部尚書終顯謨閣學士其幼即楚公也倜儻有大志義風為鄉里所敬故翰林學士何公溥志其墓公生于靖康元年六月七日幼穎悟粹温凝遠寡言正色顧瞻步趨率有彛度力學善屬文紹興十五年由漕薦擢進士科調左迪功郎台州臨海縣尉郡守蕭公振一見即以公輔期之郡事多委公裁決捕盜應格不就二十三年秩滿循左從政郎蕭公帥蜀辟以自隨已而召還諸公爭欲羅致公曰受蕭公深知故奉親為萬里行詎為利禄計耶既歸授國子監書庫官改主管吏部架閣文字二十七年為省試㸃檢試卷官知舉湯公鵬舉薦除樞密院編修官冬兼檢詳諸房文字二十八年改左宣教郎八月為祕書省校書郎二十九年兼呉王益王府教授既入館屏遠人事益讀未見書假休亦入抵暮始歸一時名臣汪公應辰史公浩虞公允文陳公俊卿劉公珙雅相器重三十年再攷省試知舉朱公倬尤知公詔舉臺察薦公及史虞劉四人四月擢監察御史六月遷右正言首論大臣矜勢以養尊小臣持禄以遂私二三執政以括囊為智以引去為髙願陛下正朝廷以正百官體貌大臣勿假以權刑賞黜陟之柄一聴于上使號令無紛更官吏無數易則其他將不革而自去上欣然嘉納公自以不世之遇論事益切其大者論時宰初無素望偶中科目權臣引之要途致位公宰竊弄威權動循覆轍假封駮以行其意嫉風憲以沮其言既罷政又論其植黨營私懐諼迷國竟鐫其職又論大將劉寶之在鎮江私殖貨財隂交權倖方命掊克之罪而罷之此外遇事必言言之必盡時高宗更化之初興滯補弊公所言無非經綸要務嘗謂道揆正于上則法守明于下乃者用事之臣持己私以専國柄四方奏請有送部勘當看詳措置之類當處以無心總要聴成以詔廢置而已今乃均是事而有前批後批之殊同是法而有元降續降之别情法不相當則云更合取自朝廷指揮自知無法可行則云如朝廷特降指揮于本部成法即無所礙變舊章而惑觀聴有司失其守而名實亂矣欲望明詔大臣令各以成法來上盡去宿弊或依違遷就則坐以違制御筆令三省六曹遵守此實公之相業也眷遇日隆且將大用三十一年正月轉左奉議郎四月丁楚國憂上聞之惻然因諫議大夫何公溥入對就令傳㫖慰問亟有金繒之賜隆興元年服除孝宗勵精政事妙選部使者是冬除直敷文閣福建路計度轉運副使除科鹽之宿弊洗滯訟之寃枉治最上聞乾道改元召赴行在陳責難之説必欲致君于堯舜又奏監司郡守數易及内治外治之䇿尤詳上皆賞難且曰卿居言責有補治體四月除秘書少監又以公端厚誠慤五月兼皇子恭王府直講六月兼國史院編修官未幾皇孫降生申乞檢照典故有沮之者與外任三年閏七月轉左承議郎十一月起知江州四年奏事改建寧府仍舊職對祥曦殿陳擇將備器簡兵足食四事又言差役關征賦籍𣙜酤水旱義倉典獄御軍之要既赴鎮人熟公仁厚炷香以迎莅政尤以慈祥清簡崇風教務節儉為先明年就遷轉運副使尋有召命言者尼之公亦力辭而止始建谿用浮梁潦水則撤去行者告病公命以石為之既去而橋成榜曰平政生為立祠八月轉左朝奉郎六年六月改兩浙西路提㸃刑獄公事入奏閩中利病及建劍汀邵上供銀悉施行之奏事畢上令一至東宫皇太子以師儒之重加以拜禮公于詳讞之際尤切哀矜直欲使無一人之獄又切戒豫借折帛之擾冬轉左朝散郎七年天申節上壽奏浙右水災欲令許浦水軍任疏鑿之役又言州郡任情或以輕罪編置失太宗奉法除姦之戒賜田之家或取民間已佃之田所當禁止縣之推吏當行重禄盜販𣙜貨配𨽻加詳上曰議論切當朕所簡注八年十一月除太常少卿十二月兼權中書舎人九年閏正月兼權吏部侍郎二月兼太子左庶子四月兼權直學士院七月除中書舎人仍兼直學士院論軍興以來上下相沿事干機速則先施行而後書押朝臣除授亦有先次供職者望申舊制正救于未行使天下不見其過九月兼侍講十二月兼太子詹事轉左朝請郎封東陽縣開國男食邑三百户淳熙元年陳覺民非隨龍而援例轉兩官龍大淵已致仕而越例求恩數執政罪罷而猶除資政殿皆封還之訓詞深厚得王言之體十二月除翰林學士知制誥兼侍讀依舊太子詹事二年知禮部貢舉上俾擇文學行誼之士薦鄭伯熊李燾程叔達三人皆被進擢張説罷樞密除太尉在京宮觀力陳其不可竟奉外祠三月以東宫講易徹章轉朝奉大夫四月兼修國史兼實録院修撰公在禁林晝接夜對退不以語家人無得而傳焉閏九月除端明殿學士簽書樞密院事進爵開國伯公懇辭上謂卿存心至誠學有淵源及倚用之意且戒以推誠待遇將帥同濟國事有曰人臣須是徇公不當邀權古人有願公無權之説又嘗曰樞密每事詳審有未合法度處必將上理㑹其善朕亦從容多暇又稱遇事無私詳練謹密深賴協濟四川制置使范公成大奏郭鈞馭衆無術幾致生變命龍雱體究上曰成大所陳則鈞之罪大雱條奏亦有不然者公奏雱謂其留心軍務但繩治弛墮甚嚴乃是稱其所長然謂僻于自用剋剥侵漁勢不可復留因薦可代者六人又奏江西捕茶寇真是有功行賞太濫卻須核實此皆大節目也其他應酬邊事如湖北之夷人占城之劫掠皆因事制宜隨即帖息髙宗慶壽奉上尊號為篆寶官進爵東陽郡開國侯三年申議使湯邦彦使囘上怒金人無禮公奏天下為度惟當講自治之䇿以待之四月國史日厯書成轉朝散大夫八月授中大夫除同知樞密院事上又稱公盡公無私禆益為多簽書樞宻院事趙公雄留身奏事上又語之曰王某難得卿宜同寅協恭傜人姚明敷已就禽而率逄原擅入多殺文州蕃部漸就安業而李昌祖誘殺降人公皆謂不足為武徒傷好生之徳上皆令體究責罰上言中宫躬儉誠信太子温恭儉薄本朝后妃多賢朕自以為幸所少者則是功業未成公奏功業雖中主可成齊家治國非上聖莫能及上曰然徳行為本功業次之嘗宣諭十年來欲令宰執進呈退將得㫖文字再具熟状進入朕再行審閲批出然後施行既免専擅之嫌且無遷令之患參知政事李公彦頴奏曰此光武以吏事責三公之道也公奏唐制宰相奏事止是口奏曲折或賜茶而退即作聖㫖施行國初范質等係前代舊人懐不自安始日具事目進呈退就殿廬批㫖然後上焉今若再經審閲然後付外則事無過舉人無可議亦保全大臣之一端也翌日又命進擬仍注鄉貫于臣寮姓名之下公謂除授當論賢否不事形迹誠賢耶不敢以鄉曲故舊而廢苟曰非才亦不當以己私而庇之上曰善郊祀充儀仗使禮成進爵開國公四年六月除參知政事時宰席久虚公與李公同行相事五年三月知樞宻院事十月拜大中大夫樞宻使公在右府憂邊思職約束諸軍擅差白身人任職事揀汰筋力未衰屯駐離軍人改陞等為合入差遣禁黎州所部邀功生事撫存草羌山招到作過人措置歸正添差員闕及冒名承代之弊安邊鄙以懐遠人動中機㑹江西賴文政郴寇陳峒李接之變淮隂刧寇等公應酬羽書號令賞罰明審平當上亦稱其毫釐不差又嘗顧簽書樞宻院事錢公良臣曰王某臨事至公遇事不曾放下卿宜恊贊又曰向來大臣不知兵所以用兵多無成功今卿等究心軍務朕復何憂錢公亦語公曰近郭棣嘗云䝉宣諭王樞使在西府數年不曾錯了一事六年四月日厯書成轉通議大夫八月㑹要書成轉通奉大夫九月明堂充禮儀使或請主兵官置親軍者宰執謂主帥不可無此如韓世忠置背嵬卒能成功上欲令三衙建康主帥相度聞奏公獨曰若令主帥相度孰不願置此軍恐内有肘腋之虞外有尾大不掉之患世忠等輩當艱難日握兵于外置背嵬等軍以募死士今無事而置此他軍必謂主帥自有私人不肯為用又請受賞給勢須加厚怨望日生萬一有警使之擇勇敢出死力亦何不可上曰卿任腹心之寄長慮卻顧如此真善謀者也嘗論立賢無方而或言閩人不可用者公謂固有章子厚吕恵卿蔡京蔡卞然曾公亮蘇頌蔡襄陳襄亦閩人也江浙固多名臣亦有王欽若丁謂輩顧人主所以用之如何爾上極以為然七年八月詔公今後垂拱殿及後殿奏事並免宣名賜宴隱秀上曰朕比來臨事未嘗茍且近欲按軍法誅成光延等王樞使言平常寇賞格比北敵戰功減半議罰亦宜如此朕釋然而悟稱奨久之公復奏曰敗軍之將罪固當戮聖恩溥博遂從寛宥臣何力之有十二月四朝正史書成進正議大夫食邑實封滿萬户封信國公公執政累年謹守成憲執内降之難行者張説之子薦以水教溺士卒褫官封還叙復詔命至于再三乃止守邊綂兵之官各當其才孝宗明見萬里公區處軍務率皆合宜眷意益厚公歸美君上無一毫矜伐之色人望愈歸之八年九月拜右丞相兼樞宻使授光禄大夫封福國公累月亢旱至是大雨霑足人心闓懌公奏事力辭上曰卿直道自將知無不言朕所信用卿而不宜尚誰宜者又曰卿等朕所倚信當盡言無憚公對曰有君如此茍為緘黙豈不辜任用之意右丞相趙公雄罷政朝中蜀士率有去意公曰若宰臣一出而引用之人相隨以去是激之使為黨也皆以次進遷于是始按堵矣大拜之初好進者蟻附踰月無所更易或問之公曰此正奔競之秋若驟爾陞黜非惟有駭觀瞻尤非平日所喜也旱勢既廣力贊荒政起李椿于休致以次對帥長沙知南康朱熹擢浙東提舉以為郡國之倡兩路出粟専濟邊郡歸正之闕食者借貸二麥種子戒飭檢視官司甚嚴孝宗遴選從臣皆出獨㫁版曹闕貳俾公擇才因薦曾逮周嗣武皆從之尤見責任之意公為閩漕時侍御史李處全嘗論公召命至是公謂處全久閒若不録用將有私憾之嫌奏起知處州同列皆服公之仁朝士有論朋黨始聞五鬼七殤之目者上以為問公曰此乃不得志者所為示之以静則無事矣金使魏正吉朝見執書未進公諭以禮而正吉䣛行欲退公即奏請皇帝還宫降㫖别日引令館伴議之次日卒如儀而去樞密副都承㫖王抃竊弄威柄招權納賄軍機邊事輙用白劄子徑作得㫖行下朝廷又不預知士論籍籍無敢斥言公憂之已久至此頗甚造膝極陳上始為之動色既而欣然開納曰非卿盡言朕不聞此當為卿斥之後數日上又及之公奏近習弄權人主鮮不以此受謗一旦斥去中外無不服陛下之明㫁既而宣諭欲改用文臣公曰救弊之初當有以新天下之耳目力薦蕭燧以待制為之上嘗諭丞相直諒無隱君臣之間正欲如此今後有合處分事只與丞相議之上曰朕欲奬用直言以起治道而好名之士至于以虚為實毁譽亂真豈朕所望公曰誠有此病然不可因噎廢食必欲興天下之大利除天下之大害非奬用忠言不能濟也㑹章頴輪對上以為言涉沽激全無根蔕自王藺以言進用一傳而為劉堯夫此後如周洎鄭建徳輩妄肆臆説相師成風不少示以好惡則此風遂扇而章頴又有甚焉欲批與外任以卿前奏故留至今公奏頃以象緯失度陛下畏天求言搢紳當不諱之朝以言相髙恥不相若雖入于激訐而不自知士風如此良亦可賀或加阻抑則有諱言之諦莫若奬其切于治道者好名無實置而不問以示優容則自各安其分矣上稱善久之豐儲倉蠧弊上聞有司請窮治公奏將有不勝治者欠數雖多厯年亦深吏已隨所犯流配官則更易已多難以令見任人獨任其責上即蠲之知䕫州林栗奏譚汝翼之罪而汝翼亦伏闕訴陳有㫖索案而栗奏譚省劄上怒其擅格君命鐫秩罷之大理當汝翼死罪公以其與夷人殺傷略相當又詣闕聲寃欲貸命編管内地處以不死潛消姦宄之心又奏栗亷介有才學此亦無他上曰少俟復職除二廣監司恭涪忠萬饑公奏去嵗荒政施行略備蜀遠旱傷尤當賑卹乞就江陵及總所各撥萬斛以濟之職事官闕上令先及侍從薦舉人公拔其尤如羅㸃陸九淵彭仲剛劉清之並與職事官莫叔光趙鞏除刪定官武臣鄒詡乞大減任子之數以清宂官上付外集議公奏去郊尚遠姑令熟議若行之當自大臣始遂定宰相十人執政八人侍從六人卿監四人帶職員郎以上三人致仕遺表裁減有差上曰張大經説近日差除頗協人望亦欲卿知上又曰黄洽稱成都除留正甚當以得人為賀朕諭以近日進擬莫非公道二人皆臺諫也公奏聖主在上賢不肖較然稟受聖訓庶幾寡過敢不竭誠以圖報嘗因進擬宣諭曰選得甚當丞相于人物不茍如此公奏臣于人物恐不能盡記自有手記有繙閲十餘過而不得其人者何敢輕也九年七月為明堂大禮使九月拜特進左丞相進封冀國公監修國史日厯提舉編修玉牒詳定一司敕令制詞有曰似不能言而智足以決天下之疑如不勝衣而勇足以任天下之重士林誦之是日梁公克家拜右丞相同心輔政上益傾任之公首以用人為己任以館職及郎官多闕欲召試及選治郡髙第者為之于是薦召蔡戡謝師稷周頡尤袤林枅鄭僑羅㸃鄭鍔等又以張枃傅淇徐詡王正已京鏜等分為監司一時翕然稱為得人户部申明赦文蠲閣税租之外其餘赦所不載者欲起催則洊饑方蘇恐致重困公奏嘗令計之為緡錢三十七萬有竒若朝廷補其經費方可蠲放上慨然從之明堂訖事上以任子減前郊幾半公奏仁宗時韓琦等減任子猶不免紛紛陛下行之既盡人情後效不止此也十年以太夫人將八十久任機衡求退甚力上不許嘗欲行推排事公謂同列曰非不知其利以臣寮所請而行猶或可緩若作直㫖則奉行過當利未及而害先之吾輩在此見民所苦當如疾痛之在身可不救乎天長水害七十餘家或謂不必以聞公曰昔人謂人主不可一日不聞水旱盜賊禮曰四方有敗必先知之可謂人之父母矣因擬周極安豐軍公奏跅㢮之士緩急可用臨難不顧其身小亷曲謹者未必能之平日愛惜人才正為此耳對境報金主歸上京所差人使權止一年公既陳設備之詳又謂接伴亦不湏遣葢彼既止吾使之來亦難受彼之使上意恐啓爭端已而敵又報使人更不差發上曰卿言乃驗于今豈非真廟謨哉十二年十一月為郊祀大禮使髙宗慶八十議典禮賞賚甚詳既被命撰尊號冊文又為禮儀使禮成轉兩官力辭恩許囘授十三年三月象緯告異求解機政章四上不允九月公喪長子求去愈力天語開勉又不敢去國史院進四朝國史列傳秘書省㑹要為禮儀使玉牒又進書力辭官進封魯國公十四年以旱又求去上一日以手札問樞宻非古制晩唐不足法欲罷之人吏併歸三省公奏廟謨雄㫁非臣下所及未敢輕對乞少俟籌度已而晝度夜思基命之地軍中稟承號令習熟見聞一旦更張非所謂振士氣又批貞觀開元兵强天下其視唐末密院豈係輕重哉公又奏祖宗規模既定難以輕改上令促擬指揮且曰此于兵將别無利害公奏唐之盛時兵柄在外藩鎮權重不無疑貳故置監軍事從中覆後患其難制又建本兵之地謂之内樞天子臨朝親加裁決實收天下兵柄以制外重于軍中豈無利害與其行而中輟孰若小忍以待大業之定其事遂已髙宗不豫公諸依唐貞觀四年典禮權不視朝以見不遑安之意逮升遐扈從于徳壽宫門外一時典禮皆參畫成之充撰諡號冊文官及陵名廟號充上冊寶禮儀使公撰冊文號大手筆稱天定諡衆説競進髙廟之號公力主其議及定永思陵名因山之役事緒非一皇太子參決庶務于議事堂調䕶尤多兵部侍郎林栗乞增置遺補御筆欲除薛叔似許及之二人資序才望相當否密具奏來公復奏曰陛下方修廢官遴選在廷難逃聖鑑雖非臣所敢預知然二人資序才望實與官職相當上乃出命葢孝宗無事不與公議如此者非一謹著其大者公又以親年益髙上章丐外議政復不茍同十五年髙宗祔廟禮畢請益力五月除觀文殿大學士判衢州内殿朝辭襃諭勞勉至于再三退辭東宫慰撫尤厚宰執百官郊餞奉版輿還鄉極衮衣晝錦戲綵之盛又以便親求閒秋提舉臨安府洞霄宫明堂大禮加恩積食邑一萬五千户食實封五千七百户十六年嵗旦諧鄉校講釋菜序拜之禮齒于韋布間二月光宗受内禪以詔書咨詢初政略曰卿曩以經術羽翼朕躬以徳業股肱聖父周旋政地十有四年凡國家利害生民休戚與夫因革損益之宜可以禆朕者其悉以告朕將受而行之公奉詔感泣遂奏疏曰初詔求言中外之臣咸得條奏不遺舊臣復加特詔臣受國恩至深至厚此而不言臣則有罪天下之事莫難厥初厯陳盡孝懋徳奉天敬民用人立政六事又言髙宗壽皇如堯舜而以禹處陛下又力言禹之所以繼舜者以對有㫖建節開府儀同三司㑹魏國薨候服闋日降制公執喪孺慕悲泣無時不肯少近滋味仲秋中使傳宣撫問賜内帑銀絹七百匹兩為賻公親具表謝纔數日忽語諸子曰六十有四卦氣已盡而衰苦衰病如此其能久乎主恩未報母葬未舉為恨耳遂乞休致口授遺表戒子孫忠孝無一語及他前一月大星隕于第至是神色不少變夜漏下一刻黙然而薨實八月十二日也拜少保致仕遺表上聞兩宫震悼輟朝二日贈少師賜銀絹一千匹兩親屬一人添差本路幹官以䕶葬官其子若孫七人䘏典甚備殄瘁之歎中外所同紹熙元年十二月甲申葬于婺城之北十里許隆壽之原紹熙二年贈太傅五年贈太師皆以諸子陞朝該大禮恩也娶何氏左奉議郎知温州瑞安縣紳之女封冀國夫人後公十二年薨子八人長曰模通直郎監西京中岳廟次曰樞朝散大夫新知岳州軍州事次曰機通直郎監西京中岳廟次曰樸迪功郎次曰棟朝散郎通判臨安軍府事次曰檝通直郎知紹興府上虞縣事次曰橚朝散大夫新知辰州軍州事次曰栻修職郎新監台州支鹽倉模機樸皆先卒女三人長適故宣教郎通判平江軍府事姚頴餘皆蚤卒孫男十三人儼承奉郎儀倫俱承務郎億將仕郎俌承奉郎脩承務郎侑仍承奉郎佖偃儔信倓孫女十一人長適廸功郎新建康府府學教授程珌次適將仕郎姚元特次適姚元哲次適從事郎信州貴溪縣主簿趙汝鍨次適將仕郎丁嗣延餘未行公神宇秀整雅有丰度清虛粹夷望之自是風塵表物加以問學邃深詞藻贍麗蚤步清要輿望已屬中雖邅迴晚乃際遇孝宗皇帝以不世出之資直欲鞭笞四夷以遂大有為之志一時進用多趨事赴功之人淳熙以來益務内治選任儒雅厚重經遠好謀之士而公為之稱首君臣相遇千載一時國家左右相之下則有參知政事右府則有使知樞密院同知簽書凡七府公獨遍厯以王端揆近所未有也孝宗聰明果㫁臨照百官公以寛厚精深調娯萬務守法度行故事大綱小紀持守無失取人才則先器識治民事則務優容理財則不為苛急論兵則尤極周密賞不遺勞而裁其濫刑必當罪而歸于寛中外之官各當其職方内乂安君相儆戒上無驕盈之迹下無危溢之憂至今言治者必稱淳熙之際焉天資謙謹輔贊彌縫而藏諸用者外人不得而見其所薦進能盡其才而避遠名迹若不自已出葢有受恩而不自知者沖澹寡欲自奉至薄食不重味衣至十年不易素不喜酒外物一無所好屏絶聲色之奉一意篤學聚書數萬巻無所不觀雖機務業委退坐靜室飲食亦不釋巻夜則使子弟讀而聴之制誥尤有體要一時文學之士皆出衡鑑上選詞臣必以密訪之有詩文制草奏議四十卷藏于家聚族餘百口上奉慈親既極其誠敬友愛諸弟任子恩先以及之撫息遺孤居無惰容家人不見喜愠之色不治生産門無雜賓功緦之慘素服盡禮皆當于古人中求之鑰不肖再㸃朝行負丞太府忽有容臺博士之除上問班序反下若左遷者公奏議禮之地最當擇人而近嵗乃以序遷臣所以為此者欲重其選也鑰何足以當之有以見公知遇之深雖以私諱不及就職至今不敢忘公之薨一紀鑰之投閒亦久矣樞等以行状為屬將以上于太史氏仰惟公之備道全美宏才遠業鑰何足以知之謹叙次爵里履厯行實之大槩參以見聞而書之葢公之為善不可勝書徒恐辭費又不敢以溢美也嗚呼髙宗擢之言路不及大用孝宗眷倚最久經綸未究而乞身以去光宗以舊學之重待以為政而公不勝喪矣此搢紳之所重歎然自古稱君臣遇合之難而善始以終者尤為罕遇如公之受知累朝哀榮終始士之致身至此者有幾亦可以無憾矣謹状攻媿集巻八十七
