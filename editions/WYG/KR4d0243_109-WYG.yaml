body:
  text: 攻媿集卷一百九宋樓鑰撰誌銘周伯範墓誌銘周氏為四明望族不惟名宦相繼而前輩源流其來也逺孰不欲仕惟周氏之仕者多以壮年退休有四休堂則家風可知明今為慶元府周氏世為鄞人居城中西湖十洲之西君之髙祖告贈正議大夫曾祖師厚登皇祐五年進士科娶范氏文正公之女忠宣公之姊也仕至朝散郎任荆湖南路轉運判官贈銀青光禄大夫次子曰鍔元豐二年登科娶胡氏右丞宗愈之女兩娶王氏翰林學士覿之女又娶陳氏正言伯强之女仕至中大夫才業尤髙嘗以忠憤上書遂陷黨籍又以外家妻族皆一時名公俱在姦黨動輒拘礙以經世之才僅知南雄小郡賢士大夫多痛惜之仲子諱淵亦有家聲仕止右儒林郎娶俞氏君即儒林之子也諱模字伯範性敏悟承家世之傳幼篤志于學如成人從濟南劉夀夫游又學書于睢陽徐濟甫有楷法年纔十七而儒林下世兄弟終鮮四姊一妹俱未行親黨為之危慮君雅有心計沈靜善謀既訖𦵏送女兄弟俱歸里之善士皆人所難免喪之後一舉不遂即棄舉子業一意世學繙經閱史㡬不釋卷以為名第有命不可彊求不墜家聲足矣建炎兵燬先廬蕩然儒林所居湫隘以此事屬之君君承先志大啓堂宇甲于吾鄉奉累世丘壟隨力葺理嵗時修祀事物必親臨器必親濯諸父既亡從兄伯濟比隣君事之如同氣榜所居曰怡怡堂以著其友愛之篤中大夫遺文甚多如承宣集等行于世文集僅二十卷君恐其久而墜失手加編校以千緡為鋟版印造之費始得家有此書年登半百即以槥櫝施貧人之喪所濟甚衆官道傾圮加以甃甓行者賴焉經理家務井井有條時出其餘以周人之急姊妹既行及宗族之疎逺者恩意有差居閒好客觴豆終日不倦晚又增葺後圃益以自適號得閒居士縱心之㑹鄉里合慶以為君福夀未艾也明年是為嘉定元年三月二十九日以疾卒于家娶朱氏子男二人曰熺慶元四年為鄉貢進士次曰烜先五年卒女三人長適汪之彦次適鄉貢進士李夢龍幼在室孫男六壄垓圭垍堪埏女五人長適陳錤餘未笄先是朱夫人𦵏于通逺鄉銀山熺将以十二月壬午奉君之柩合焉君素了達不以窮通死生累其心豫卜夀藏美檟之備已十餘年吾邦舊有真率之集仲舅尚書汪公主盟斯事君實預焉余投閒一紀從容其間君少余一嵗棊品又相近在㑹中尤為親宻後雖以憂患疾疢寖廢去冬西上君送于郊握手道别尚期餘生為老伴侣聞君之訃䀌傷殊甚熺來求銘義不得辭余有表妹之夫子建植于君為疎族死無所歸君呼其子某使𦵏于其先塋之傍某游學又任其掃松之勞是尤可書也銘曰四明之周著名吾州家在十洲堂有四休君承其流抱才則優不忮不求無悔無尤家立身修晚益夷猶棊枰觥籌里閭沉浮積善未酧如穡有秋我銘諸幽後人其收承奉郎致仕李君墓誌銘江口李氏鑰及識其五世矣始秉義諱珂善富樂施鄉稱長者再娶王氏寔提舉廣東市舶勲之女兄太府卿正己之姑也卿為鑰之姑之夫以是與李氏有連鑰生長外門幼年外祖汪公少師外祖母越國王夫人過其家先妣吴國攜侍行時李氏鼎盛夫婦偕老子孫滿前宴樂連日侍御史王公伯庠銘秉義之墓謂其持心廣大與造物者合三子長諱佾字子列一善幹蠱奉親有稱仕為修武郎建炎三年冦殘四明遊騎向奉川出財力募鄉兵守禦邑境以全鑰嘗記其事甚詳是生九子第四子諱充庭則君也字伯振資孝謹最為大父母鍾愛昆弟既衆家析而非舊矣君躬行善道刻意教子元白居長受學于舒貳車元彬歸以淑諸弟既為大學上舍優選待年廷試弟及子俱有場屋聲聮翩科級詵伯中嘉定元年進士第迪功郎監紹興府三江鹽場詒伯鄉貢進士訓伯國學免解以稱内舍生又中上舍選以制中開禧元年進士第迪功郎新紹興府餘姚縣尉詞伯在兄弟間才氣實相上下雖進取未效而士友固已期之從子森同以舍法待年從弟之子誨伯亦薦于鄉于是文風大振遂為儒門鄉里歆艷其興未艾也君澹與物無競善處宗黨周旋彌縫無間言父母既沒撫弟妹畢昏嫁經理不遺餘力親族子弟不問賢否一家誨誘里人間有彊獷之人遇君輒斂避教子以踐履為先不専事舉業諸子學成而不偶不以介意及其名第寖興視之亦藐然人莫窺其際平居以書史自娱前言徃行有契于心者必書之座右首曰有一言而可以終身行之者其恕乎如心之謂恕也又曰我必不忠不仁無禮皆自反之道也又曰一飯之徳必報况其有甚于一飯之徳者乎可以知君所存矣間作歌詩平淡如其人閱名臣言行録遇合意即作詩以記之至百餘篇慈福宫慶典以二子在學封迪功郎嘉定二年郊祀恩轉承奉郎就養三江以疾卒于官舍寔三年十月二十三日也娶張氏封孺人朝奉郎嗣良之女姑之子也六男子長即元白次詵伯詒伯詞伯諴伯訓伯惜詒伯諴伯先卒女四人黄直愛張復袁邦傑張繹其壻也孫男九以稱以制以牧以豫以清以寧以生以似以翼孫女六人長適袁沂餘在室曾孫女一人明年閏二月甲子諸孤𦵏君于鄞縣塔嶺之原書來求銘數年以來日見李氏昆仲奮發益歎積善餘慶之盛聞君既亡家人始得遺言于篋中區處後事甚悉且戒喪𦵏俱循古制無徇世俗有曰家中遺産惟有一經教子而已又曰吾幸有子所欠惟一死不以諱也賢哉銘曰祖開慶門父全鄉邑君繼以善子孫玉立或升于學或慶于鄉儒風大振名第相望衣冠方興所貴持乆毋渝淳則用篤厥後承議郎謝君墓誌銘余家世業儒五世祖正議始以鄉先生決科起家五子俱傳業而季子夢弼諱肖尤攻小學又傳其五子其仲元應諱弆獨殿諸老說文解字經典釋文始末通貫㡬于成誦鑰侍教累年故頗知字學客授東嘉與諸名士游獨謝君季澤最為同好相與攷訂文字毫髮必計後十五年復叨假守時過郡齋晤語甚樂也别後時見其筆畫愈工余既投閒聞其亡矣亡又十五年當嘉定四年得其子有開書以銘為請既列君之行實又以張忠甫所作乃祖志銘陳君舉序君所著正字韻類五卷來撫其書為之傷歎此真季澤留意之書也因為掇其大槩而系以銘君諱雩季澤其字也温之永嘉人曾祖文淵祖君任有鄉行父知柔嘗居瑞安之樂善里里人稱樂善先生君仕升朝贈承事郎母張氏贈孺人兄黔有聲上庠君性穎悟承父兄之訓博學强記自經子百家之書皆手自校定音訓句讀一一不苟以是文亦日進援筆立就不為艱深之辭紹興三十年入太學乾道五年登進士科授左迪功郎福州連江縣主簿丁母憂服除再調台州司户參軍闗陞從事部淳熙十二年為髙郵軍軍學教授改宣教郎知福州寧徳縣主上覃恩轉奉議郎賜緋衣銀魚慶元改元年勞轉承議郎三年以疾卒于官享年六十有三娶萬氏有婦道先君五年卒贈孺人十一月庚申合𦵏于西山廣惠院先塋之後山二子有開有大孫四人師中師善師俞師心女三人君講學務出于正早受知于舅氏端明忠簡張公闡忠甫名淳君之内兄君舉名傳良又張氏壻龍圖鄭公伯熊毗陵薛使君季宣皆里之名公周旋其間不扶而直聞佛老巫覡之說必深排之既仕而知者益衆丹丘郡用不足取于民者多居甞受輸為之撙額外之求宿蠧一空五邑稱之朱公熹為庾使風裁甚髙一見君如故交留語或至終夕屬以荒政及滯訟以辦集稱祭酒李公祥為淮南提舉薦四人于朝籍記中書髙郵教官預焉錢公之望為帥舊與君同舍知其才訪以民瘼君為論科買瓦甓薪葦洎差役工匠之害尤悉帥得書喜曰仁人之言其利溥哉下屬郡盡蠲之及試邑日危坐聴事事至立決故無留獄出儲粟以賑之增學糧以養士閩有蠱毒法禁數嚴而姦民反以誣善良吏復鍜鍊或至誣服君察其誣白之部使者曰蓄蠱者固不可赦誣人者自應反坐卒平反之鄰邑連江亦有是獄太師鄭公僑復以委君又得其情無不感服故吏畏其明而民樂其寛焉死之日巷哭相聞有攀號輀車不忍去者士夫挽章盈帙祭文率數十百言且相與祠于老氏之宫平時勤謹禮法冠昏喪祭皆有典則律子弟尤嚴于拜跪舉止之際衣冠服色斥去浮薄之飾君既亡其子行絞紟之制悉去世俗不經之文承君志也君性孝友二兄早世撫育諸孤為之畢婚嫁治室廬又勉之學勇于赴人之急惟力是視樂聞人善有過多面折之敏而善謀審度事宜往往中的惜乎不假之年其見于用者僅止此耳韻類一書援據精確不知者以為苟然惟好之者然後信其積學之工每謂使之在天禄校讐之職必有補于斯文然亦不及此余所以重歎也銘曰古之設教學有大小六藝之目殆不為少幼而貞淳習之既成壮而用世足了一生惟此字學是為一藝後世忽之謂學之細禮樂既壊射御罕知數亦失傳惟書可為我家有原余亦素嗜間亦語人鮮有同志頃仕東嘉日親友朋惟此謝君時稱筆精以文發身又敏于政篤意斯文字為之正亡年五十始得其書著之于銘以賁幽墟贈銀青光禄大夫宇文公墓誌銘宇文氏本居河南唐末入蜀遂為成都大家隆興初元鑰忝進士科與淮東總領子震兵部尚書价同登尚書嘗幸同朝而總領以出入參差竟不及識三仕周行多見蜀士尤聞今貳卿及樞宻之名恨未遇也告老復來樞宻由京襄宣威召還文昌遂躋右府貳卿以棘寺奉使北歸上從班皆一見如故交貳卿引嫌出守當塗鑰既叨參預與樞宻情好日隆一日親攜貳卿書以二親銀青及夫人之銘為委謝不敏至再三終不得辭謹摭所示行述書而銘之銀青諱師說字徳承曾祖宗象累贈太師魏國公祖邦彦故任朝奉大夫尚書屯田員外郎累贈太師齊國公父時中故任左中大夫直龍圖閣累贈通議大夫公之二伯父以文學被固陵深知迭掌翰苑繼為丞轄樞廷家聲臨一時公少在富貴中而天資沖淡惟專意于學自為程度風雨不渝由伯父任補承務郎銳情舉業兩占薦書尚選父母既鍾愛之公亦不忍離膝下既冠三請祠禄以便養龍圖勉以仕始為潼川府路轉運司主管文字使長喜興獄一道騷然州邑為之屏息凌忽官寮雖有言不屑也公氣平而語勁遇事堅執未嘗少屈下期于用己之學長為斂容獄亦寖息俄丁母碩人房氏憂父既奉祠公亦不調龍圖服除又任常平司幹辦公事甫到官而以疾卒年止四十寔紹興二十六年五月二十八日也官止奉議郎平時鄉黨搢紳品論世家子弟之賢必以公為稱首至是相與嗟惜又不能自已也兩娶房氏贈通議文安郡夫人四子紹猷故奉直大夫知漢州紹諤故文林郎知敘州南谿縣次紹彭由權户部侍郎右文殿修撰知太平州次紹節以龍圖治命繼伯祖樞宻太傅肅愍公後端明殿學士簽書樞宻院事兼太子賔客一女適承議郎新知簡州楊思成孫五人景韓景脩俱終于将仕郎景琦迪功郎監漢州商稅景度儒林郎添差兩浙西路提㸃刑獄司幹辦公事景厚迪功郎邛州安仁縣尉孫女三人曾孫人二子以郊恩累贈公銀青光禄大夫以某年某月某日𦵏于廣都縣龍華山之原後三十餘年文安夫人祔焉公既蚤殁諸子尚幼公之學行俱不得顯于世文安每舉公之遺烈以教之大略以為公之讀書為文皆有繩準經史百家之言悉以次第繙閱沈濳反覆隨疏坐右旦為某書夜為某氏之文手抄成誦若布衣初學之勤者喜與士友談易時誦家人正家之道以勉我相敬如賔公退則閉閣弦誦哦詩緝文一不以家事介意此皆公之所安而道行于妻子之實也歐陽公幼失所怙罔知其父崇公之詳其見于瀧岡阡表者皆鄭夫人之言也敢引以為比公之隠徳所謂非此其身在其子孫貳卿方以名從臣出典藩方樞宻先膺大用宇文氏之興真未艾也天之報施豈不昭昭乎銘曰宇文之先其積已厚樞筦丞轄赫然華胄公居其間卓稱孝秀天爵為貴多文為富學優入仕不渝素守出門軸折才不及究非此其身宜昌厥後我惟銘之用詔不朽文安郡夫人房氏墓誌銘夫人姓房氏諱妙光其先顯于唐廣明中扈䟆西狩因家于成都之華陽曾祖審能贈朝請郎妣安人宇文氏祖希參朝散郎贈通議大夫妣碩人張氏杜氏父永朝奉大夫通判嘉州妣宜人張氏夫人性明悟在羣兒中獨若成人少長事親知色難之義不但長于女工也宇文氏世有姻好嘉州先以次女歸直龍圖閣時中之子銀青公師說又以第四女繼室是為夫人夫人之姑姑也未㡬即世執喪哀慕扶護以歸又謹視龍圗次舍食飲之宜已而治閫内奉烝嘗一如姑無恙時以寛龍圖悼亡之悲銀青為潼川漕幕夫人年纔過笄恪守家法食不重肉而豐賓客之奉夫子盡職不苟退則耽書一不以事物自嬰内助之力也嘗侍龍圖疾奉藥餌甚謹少間曰吾婦孝敬他日願汝子婦如此銀青事兄如父夫人待長姒如姑百口無間言銀青卒于潼川倉司夫人三十有二諸子皆幼送終治𦵏無一不盡自後専意教子晝夜不怠又舉銀青學行以為法故諸子益自刻苦相繼預薦季子紹節遂登淳熙十四年進士第銀青之兄赴合州夫人領諸子留里舍教愈力用愈儉嵗入之餘悉儲以聴一毫不自私合州晚嵗閒適夫人與其姒分月主家務或客至紛沓供酒肴無倦色伯與姒皆敬歎之姒既寡居相好益篤事夫大小未嘗先可否至不敢専席而坐若非輩行然二十年如一日親黨皆以為不可及姒止中夀四女未行悲卹撫摩不啻已出俱使之得所歸長子紹猷得官成都張宜人年髙喜于便親即聴迎侍一二日必歸母側曲盡孝養宜人及見外孫以次授室相繼出仕謂夫人曰汝父與舅皆稱汝孝盛年守志不以悲哀亂所守固知其有今日矣送子之官戒飭尤備引雋不疑之母之語及談上世官業以勉之且俾亷勤首公無躁進無詭隨不以馳騖寵禄為急也肅愍公靖康奉使結約舉義謀泄遭變盡室死之龍圖命銀青以紹節繼伯祖為孫甫冠夫人即遣詣行在所以其事本末請于朝留十寒暑每以書戒其盡力毋念我事既昭明卹典優渥乃俾追喪略無嫌忌人尤以為難平生動中準繩髙見絶識有士大夫所不逮然語笑不妄發未嘗以所長自為表襮賙人之急如恐弗及故奩衣襦乆而如新視世之紛華榮耀一無所累其中者淳熙九年六月十八日卒享年五十有九明年十一月甲子祔于銀青之墓子女孫曾悉在銀青誌中嗚呼夫人在家為賢女既嫁為孝婦妻道母道又皆兼盡可以為閨門之規範矣是宜銘銘曰彤管不作傅姆無教孰能閨門惟敬惟孝猗歟夫人謹于三從事姒如姑又篤其終義方尤嚴繩繩孫子慶必有餘川至雲委典刑如存是為壼彞凡此婦道百世仰之朝散郎致仕宋君墓誌銘隆興改元永嘉進士得人最盛尚書木藴之既在魁選一郡同登至二十七人余忝末科至乾道七年客授此邦三年間多與同年往還甚樂也後又假守則在者已寡矣今四十載惟余叅議光逺宋貳車正卿在鑰亦偶未死故三人時以音問往來而正卿又亡矣明年其弟習之持書求銘正卿之墓抆涕之餘為序其平生而系之銘且請光逺篆其葢云君諱晉之正卿其字也舊名孝先字舜卿五季時處士靖自福之長谿徙温之樂清邑有張文君隠居築室為鄰而緱山僊人吹簫臺峙其前真勝地也今八葉矣子孫繁衍為名族曾祖惟表祖世則俱晦徳不耀考允修行義過人有聲舍選而終不偶篤意教子既口授以尚書大義又力貧為之擇師君既升朝生封承務郎後又贈至奉直大夫妣萬氏繼母張氏皆贈恭人由是邑人益勵子于學君幼穎悟日誦數百千言弱冠從梅溪先生王公十朋游學徒數百人獨君首出王公器之曾以詩贈别襃借甚至未㡬入太學登乙科授左迪功郎汀州司户參軍王公又以詩送行期待尤逺到官明銳任事不擇劇易郡政待户曹乃決有霹靂手之名秋稼加耗病民君以郡命蠲之人皆讙服校文三山士踰二萬杜君申有場屋聲又嘗名薦書文卷已遭摧剥君識于衆人中引義力爭竟寘舉首果以經魁南省人尤服鑒裁之明時丞相王公淮檢正吴公龜年少卿鄭公伯熊同為部使者皆欲出其門外移長谿丞縣去福州數百里休戚㡬不相同丞相陳公俊卿為帥君言邑之利病多所開納贊其長黄君藻和而不同相得尤深罷官祖餞揮涕而别海舟之𨽻于邑者數千艘君既被檄總籍其目分番以備調發舟人安之時造戰艦期㑹趣迫君緩其期事亦隨辦伐木必親相視而後取其免于斧斤者號宋公松丁奉直憂治喪諸費一金不仰于公家歸營𦵏送仍自為夀藏于側泣曰尚當供養于地下也除服調臨海令以辦治聞催科不擾囹圄屢空太守邀入簽幕郡縣視猶一體知無不為軺車行部士民遮道稱徳政者動數百人樞宻丘公崈為憲使率諸臺薦于朝及去官壺漿攀戀旗幟咽道相望不絶前此未有也再調光化令鄉人王公自中為守每稱為老先生被邊事簡作亭豐山之顛遙望卧龍舊隠暇日相與登髙弔古哦詩度曲不復以僚屬相遇改奉議郎知奉化縣君三更邑寄熟于綱目刓方為圜坐以無事民大愛之丞相謝公深甫臨海人素知治行時在參預欲引之周行君赴部授信州通判以歸佐郡期月即引年求謝事謝公又卻其請且勉留之秩滿竟以朝散郎致仕或謂理賞可及正郎君曰不翅足矣翩然還家聞者愧服天資孝友奉直素為鄉曲所敬憚以儒術自信黜釋老之說每曰親亡而藉緇黄以薦何待之薄也死欲速𦵏或溺于隂陽家之言以幸富貴至累年不入土者不孝為大其卓見類如此君之執喪一遵遺言追慕老而不衰嵗時祭祀焄蒿悽愴如将見之言及則必泫然弟習之少君四十嵗撫之如子捐祖産以畀之而不忍析爨弟亦恭謹好學事君猶父門内以禮法稱護墳塋如䕶頭目拜掃必躬必親宗黨貧者收卹經紀有孤女則為遣嫁之不惟子弟承教修飭厮僕亦能以生事相戒有古樟䕃蔽甚廣自號樟坡居士晚又築亭其上榜曰可髙賦詩賡酬者衆鑰亦預焉嘉定四年八月屬疾終于家享年八十有六娶孫氏繼萬氏皆贈安人二子長曰統迪功郎寧徳主簿衢州比校務調邵武軍司法姿稟端重居家臨政綽有父風不幸先二年亡矣次曰纓孫四人㑂僑俶皆業儒幼曰宅孫女四人伯適進士劉頤仲適國學進士張復道叔從浮屠名法定季適進士萬逵女孫三人習之與纓将以五年十月丁酉𦵏君于縣盖竹山寔附先塋君志也君敏而靜貫穿百家不為艱深之文明白豐贍詩辭髙勝淡而實腴即席唱酬鋒起泉湧人畏其捷而服其工所至留心風教勉厲後學長谿有隠君子林君維屏號榕臺先生君屈致邑庠遇講書與其長率邑之寓公聴焉學者益勵丞相梁文靖公聞之遂招入郡中一時政化之盛君實啓之憂居開義學來者輒受勸諭有文齋舍有銘深衣大帶濟濟翼翼習俗益媺臨海官事整暇太守熊公克遇視學則請君為說春秋光化既為一新軍學至奉化則又親見之銳意興作里士監南嶽廟汪君伋與其弟份斥家財為之倡衆亦競勸輸奐鼎新照映山川舉梁之文落成之記皆鑰為之自爾累舉得士為多家素貧孫安人初以田四頃自隨伏臘粗給仕㡬四紀無一丘之益客至必留盡歡或假貸以續食人為不堪晏如也歸老餘年齒落復生髮白更黑頎然為鄉曲之望詩文甚多隨有散佚今惟乾坤二卦中庸大學禹貢洪範講義春秋十二公論各一卷厯代中興君臣論二卷擬進萬言書一卷樟坡集三十卷藏焉銘曰阜陵取士隆興之春惟溫􅇰盛二十七人我幸同升洊官海濵相與往來乆而益親四十餘年如星向晨惟宋與余夀踰八旬宋君忽焉而迹遽陳行義治政藹然弗泯難弟貽書其請甚勤哀懐易感勒銘翠珉從兄樓府君墓誌銘我大父太師齊國公五子二十五孫惟九伯父五子皆鑰之兄也諸兄凋零殆盡惟兄長鑰一嵗自幼少追逐晚益相親鑰投閒十三年時時步屧相過山肴野䔩聴琴觀奕酒酣而歸甚適也憂患之餘既掛衣冠期與兄樂此晚暮嚴召還朝重惜此别初謂可以復㝷舊銘兄亦促使蚤歸忽聞兄訃驚痛不自勝乞身未遂又聞将𦵏二子來求銘嗚呼遂無兄可事矣雪涕書之兄諱鎡字少及吾家世為明之奉化人入城而著籍于鄞者至吾兄弟五世矣推而上之僅得八世積徳有素至髙祖先生諱郁決科起家一仕遽休仍教授鄉里官止大理評事累贈正議大夫曾祖諱常朝議大夫累贈太傅祖諱异徽猷閣直學士累贈太師齊國公父諱琚朝散郎母陳氏封安人朝散兒女俱衆與安人勤儉治家尤篤意教子叔子鋐有場屋盛名以丙科仕至臨安教官季子鉅亦自太學晚為歙丞兄幼子也天姿謹恪讀書之外竭力事親于伯仲間急病讓夷心計精宻既不及禄仕一意守家法安分知足自奉至薄量入為用數十年如一日朝散得齊公繼繡堂故基為宅後既不足以容衆兄得田三畝力營築室未㡬落成過者駭觀入其家濟濟如禪房精舍地無一塵闢門臨水得城南勝處内地纔㡬弓花卉果蓏手植以供小摘之需真隠士之廬也朝而誦經晝則假寝暮止三酌陶然自適一呼燭則不復飲食故絶少疾病性諒直語輒見肺肝親故有過忠告或面折之自謂愛人以徳人亦諒而服之奉丘壟及致祭謹甚一物一器必出親臨尤好賓客至則談笑欵洽小酌亦有恩義夫婦齊年俱至七十親黨合樂髙㑹扁其堂曰雙慶冬至元旦鄉校有序拜之禮兄必夙戒子弟率先而往風雨不渝每自言曰吾無才術以發身賴祖先宗族之庇處夏屋三紀何以堪之生計素薄不足以卒嵗斤斤自處人不見其際遂為鄉里善人以終嘉定四年六月屬疾初無他苦丙申卒于家享年七十有六娶寧海李氏克相夫子以齊其家二子浹洽一女適文林郎撫州崇仁縣丞舒祐孫六人權柄校槢檜榗俱業儒柄出繼為長兄主簿鈺之孫孫女人長適方楷次許適舒樞外孫也餘尚幼将以五年八月丙申𦵏兄于通逺鄉金谷之原植徳菴後兄所自卜欲從父兄于地下也兄雖出世家辛苦自立竹頭木屑未始輕棄物多可為兩用若瑣瑣者先具美檟夀藏雖一日二日可為者亦皆豫辦略無拘忌之嫌又可見兄之曠達矣二子事親素謹兄亦以家務分委之繼繡舊堂㡬不能保兄言之或至泣下浹力圖而得之兄又喜甚将以故扁揭之未能也鑰既不得歸奉吾兄自念叨竊逾分上有憂責下困應酬每起伏波羨少游之嘆今日東望尤為心折淚迸哀哉無及也已銘曰齊公守鄉始立錦坊五家聚處昆令季强兄之與我親如同氣期盡此生日夕陪侍病不及問喪不得歸尚銘諸幽以寫我悲鄉里善人又以考終咨爾後來尚振素風攻媿集卷一百九
