body:
  text: 宋樓鑰撰表牋謝大中大夫表一身去國方叨祠廪以娯家四品頒綸乃次年勞而増秩素餐已甚丹悃知歸中謝㐲念臣少也數竒晚而多幸備皂衣之吏三朝許厠于周行聫紫橐之華四載得陪于從列踰涯自愧補外以行荷聖君從欲之仁賦真館祝釐之粟班通禁路尚汙文謨内閣之嚴法應吏銓遂躐秦官大夫之首寄禄寖高于世胄被恩得奉于親承視賈誼之超遷固非敢望比申公之即拜豈不懐慙兹葢伏遇皇帝陛下器使羣工曲成萬物念論思之舊侍未忍遐遺付品式于有司許容平進周章登受俯傴何言臣敢不祗服訓辭欽承命數老疾而無職事實深稱於閒居優游不易公卿特未知於報所賀重明節表慶元三年少暭司秋適届肅霜之候重明麗正欣逢繞電之辰慶浹三宫歡騰四海中賀恭惟尊號太上皇帝陛下道隆邃古澤潤生民引養引恬自得怡神之樂無倫無敵尤高與子之明福如日以正中年與天而同久千秋紀節固知黃屋之非心萬嵗爭呼又見玉巵之為壽自他有耀申錫無疆臣嘗侍宸旒兹游真館恭陳虎拜阻陪漢殿之儀遥思龍樓徒效華封之祝賀瑞慶節表斗樞電繞良月占載震之祥崖石天齊令名採中興之頌四方來賀百福具宜中賀恭惟皇帝陛下夙亶聰明躬行勤儉奉三宫之色養孝治日中得萬國之歡心休祥雲委當重熙而累洽能持盈而守成咸傾舊日之誠仰贊後天之􅈫臣頃陪鷺振親覩龍飛上萬年之觴夢徒游于帝所接千嵗之統心惟祝于皇齡慰壽聖太皇太后上仙皇帝表奉慈尊於四世孝治方隆傳遺誥于萬方哀號何極中慰恭以尊號太皇太后道高任姒徳邁娀㜪三朝居長樂之尊九秋享無疆之壽手提神器親授曾孫功成不居仙去何速恭惟皇帝陛下躬承慈訓圖報洪恩北面昕朝備四海九州之養東朝晏起懐千秋萬嵗之悲忍從五日之哀特用周期之服願少寛於聖抱期益慰夫親承太上皇帝表太皇厭代慈扆興哀覆幬所臨悲號何及中慰恭以尊號太皇太后道妙千古母儀四朝決内禪之訏謨功在社稷受曽孫之色養福等岡陵乃以微疴遽傳晏起恭惟尊號太上皇帝陛下仰遵遺訓祗服通喪願寛聖子之孝心勉徇先王之中制皇太后牋慈福上賓悲纒率土愛欽素著哀動重闈中慰恭惟尊號皇太后殿下夙奉太任親承大舜婦聽而婉實為内壼之觀喪致其哀莫贖終天之痛願遵禮制少抑孝思太上皇后牋壽聖升遐慈尊永慕恭承凶問均極悲悰中慰恭惟尊號太上皇后殿下寅奉重闈恪修隂教方日勤於孝養期仰嗣于徽音胡不萬年忽成千古在人情而難處冀聖念之少寛皇后牋光佑訃聞邇遐哀動驟失慈尊之䕃誤増悲慕之心中慰恭惟皇后殿下四世承顔累年逮事雞鳴問寢每勤禕翟之行鶴馭登仙遂有雲霄之隔願推至理少抑深衷謝再任宫觀表僻居海嶠推戴上恩洊畀祠官忽頒嚴㫖慙無報國之所喜便事親之私中謝伏念臣潦倒無堪遭逢過分奉身而去徑歸綿上之田畏影自憐更卧漳濱之疾當一喜一懼之交切何三仕三已之敢云幸遂投閒庻幾養志屬書再攷未免有言既徹九重亟䝉從欲闔門相賀遂寛乞米之憂連歲何功徒致取禾之誚茲葢伏遇皇帝陛下纊旒無蔽簪履不遺求齊國之世臣尚其餘幾數正元之朝士今亦無多賜以斗升濟其菽水臣敢不仰銜隆施退適餘生顧朝暮承顔得效老萊之戲雖漁樵混迹敢忘魏闕之心賀重明節表慶元四年繼明而照四方夙紀誕彌之節得秋而成萬寳是當載穫之辰慶溢霄垠歡均海宇中賀恭惟尊號太上皇帝陛下尊同太極福浸黎元由父作子述之明得内聖外王之道脱履崇高之表怡神蠖濩之中鳯蹕來朝當電繞虹流之日龍樓上壽皆山呼鼇抃之人睿算無疆洪圖有永臣既収朝蹟洊處祠庭與造物者遊敢陳金鑑之録獻封人之祝徒想玉巵之儀賀瑞慶節表良月就盈出應五百年之運四方來賀仰祝三萬嵗之期宫壼交歡宗祊協慶中賀恭惟皇帝陛下行符乾徤徳與日新寅奉重闈深思付托之重洊開二閣用廣緝熙之明益増孝治之隆坐振儒風之盛如雲如日喜逢誕聖之辰非露非烟茂鬱興王之瑞敢伸虎拜用贊堯齡臣再奉真祠僻居下國峩冠就列莫陪嵩嶽之呼泚筆歌功願獻浯溪之頌謝落職罷宫觀表杜門卻掃幸家食之少安褫職罷祠忽臺評之下及尚從寛典祗荷隆恩中謝伏念臣戇直有餘頑冥自信生逢昭代屢玷周行年除嵗遷實由於親擢左提右挈敢藉于先容久居封駮之司幾作怨仇之府用過其分思稱所䝉始求補外以牧人已叨臨遣旋請投閒而奉母又辱矜從五年自放於江湖一飯不忘于君父獲棲故隱可謂幸民然猶通内閣之清班竊殊庭之厚禄餘生何有惟㫁㫁以無他公論弗容尚齗齗而不可煩言果至百謫奚逃仰聖度之恢洪閔危縱之孤露爰施薄罰以示小懲茲葢伏遇皇帝陛下仁務包荒爵惟馭貴衛纓雖許終不可以假人漢印既銷適足明於無我俯憐簪履之舊猶齒搢紳之間臣敢不屏息訟愆投誠戴徳循南陔而戒養退甘三釡之貧望北闕以傾心莫効一毫之報謝宫觀表杜門窮巷將沒世以訟愆賦粟珍臺僅踰時而復舊開孤迹自新之路承大君莫報之恩得之若驚感而至泣中謝伏念臣頃承鴛綴親覩龍飛詞禁代言首播絲綸之命經帷進讀不違咫尺之顔一去闕庭四叨祠禄初出懇祈之切兩蒙簡記之思惟此僥逾尤為憂異雷霆所擊寧忘失箸之憂日月有明忽照覆盆之下豈無望於嵗年之後不謂得於旬朔之間顧䥴職之告未頒而祝釐之領已繼人謂去珠之再得自憐墮甑之猶全頓増菽水之歡足慰桑榆之晚兹葢伏遇皇帝陛下仁無棄物道本用中芝柱呈祥方炳靈于太室玉巵為壽喜親慶於慈闈廣四海以推恩軫一夫之失所有如閒廢亦荷矜存臣敢不仰體隆知益安愚分半九十里深嗟末路之難取三百囷徒切素餐之愧謝進封開國子加食邑表職在琳宫方謹祝釐之奉詔分榖璧更濛與邑之多敢期洪私下及散地中謝㐲念臣頃叨推擇濫預論思自登鎻闈之聫已經采食之賜明時未棄歸猶得於祠官比嵗以前居幸霑于郊霈賤息既承于延賞先臣復被于追榮獨此加恩格而不下方斯念咎噤弗敢言顧三百戸之逋㒺知所自念五十里之小相去幾何迨茲祭澤之頒始冐綸言之寵毋升次郡爵進小邦再拜知歸一門増耀兹葢伏遇皇帝陛下禮嚴宗祀惠及臣工仁不忍于遐遺福靡求于專嚮遂令逺外亦荷寵光臣敢不俯媿素餐著鉻丹悃奉璋就列莫輸奔走之勞分土疏封安有藩宣之力謝通議大夫表祠館無庸猶㑹八年之課宸綸甚渥俾居四品之官拜命増榮撫躬知懼中謝伏念臣才非適用仕止為貧幸逢揖遜之朝寖冐論思之列久司封駮徒積悔尤親覩龍飛實専内外之制旋升鴛綴更兼文武之銓爰揣分之易盈以治民而自詭母既登于大耋身亦覺于倦游力請投閒仰䝉從欲江湖麤足久甘漁者之爭限簪履弗遺深媿廪人之繼粟方奪榮之是懼何増秩之敢言漢詔聿頒尚得從大夫之後隋官平進猶使陪廷議之餘兹葢伏遇皇帝陛下圖大澤中謹微接下幽明攷績一付有司之公日月為功俯及從臣之舊有如衰廢亦玷襃遷臣敢不仰佩鴻私愈堅晚節與之三釡方承戲綵之歡加以數年祈遂懸車之願謝再任宫觀表孤蹤去國六換嵗華明命臨門五叨祠廪積素餐而自媿拜黃牒以知歸中謝伏念臣處世最踈逢時多幸把麾江海因得遂於歸耕聼履星辰今殆成于昨夣賤齒已開於七秩親年既越於九齡無由陳力于清朝秖合投閒于故里先疇至薄歎微禄之未忘吏攷將更驚俞音之洊及豈止寛憂煎于數口又將竊温飽于二年有何勞能䝉此撫養兹葢伏遇皇帝陛下躬操八柄坐制萬方念筆橐之舊臣雖無可録軫葢帷之至意尚爾不遺使仍香火之縁以遂山林之適臣敢不祇承恩渥涵泳化風菽水有餘得效萊衣之戲雲霄在望惟存魏闕之心謝復職表四年負譴尚玷從臣之階一札疏恩復還學士之直周章拜賜感激為榮中謝伏念臣愚不知方志徒泥古頃更郡寄嘗辱賜環屢玷朝行寖叨持槖代言批敕曾何有于論思約史侍經每自慙于玩愒典銓未㡬懐綬以歸尋力請于真祠仍寓班於内閣致煩言之俯及甘暮景之冝休敢意矜存曲加枚拭特寛漢律申畀文謨深憐為養之懃又予祝釐之禄從天而下撫已尤驚兹葢伏遇皇帝陛下大度兼容至仁善貸謂臣親逢初政曾厠衆賢之後陳察臣自訟宿愆不忍一眚而終棄爰軫葢帷之念未嘗簪履之遺臣敢不祗戴寵光日思報稱奉百嵗之無益増萊子之歡誦萬年之詩願效封人之祝賀瑞慶節表嘉㤗三年踐阼十年益啓昇平之運逢辰千載又更震夙之期兆姓交歡一心同戴中賀恭惟皇帝陛下儲神淵靜流化儉慈仰列聖之好生守為家法視四方而兼愛務得民心坐凝稽古之勳増衍後天之筭臣屏居海嶠遥睇宸廷見黃河千里一曲之清第勤善頌效嵩嶽萬嵗三呼之祝莫預周行謝再任宫觀表一収朝蹟分老瀛壖六畀祠宫誠知帝寵顧胡顔而亟拜徒空食以懐慙中謝伏念臣晚幸偷安近尤多病四支而三痛楚幾遂作于廢人十日而九呻吟惟退量于薄命第以慈親之待飬曽無他計以謀生尚存未盡之年更望無功之禄仰於洪造方局地以靡遑敢謂隆寛俄自天而賜允里閭改觀耄穉交歡共瞻新渥之光榮又獲全家之飽煖即衡門而被寵望宸極以銜恩兹葢伏遇皇帝陛下大度海􅉼至仁天覆俯憐簪履之舊未忍遐遺又與升斗之餘使能麤給豈止一人之受惠實令羣下之歸心臣敢不强整衰殘愈思感勵奉琳宫之香火每自處於幸民掛神武之衣冠冀終全於晚節謝落職表孤臣失察盍寘大呵上聖隆寛止從薄責俄自天而有命幾無地以容身中謝伏念臣生則多艱仕皆過分幸遇千齡之㑹寖叨八座之聫歸奉祠庭猶寓西清之直坐縻廩粟不勞南畝之耕頃䝉乘障之除庸示起家之寵方循牆而引避痛陟屺以纒悲顧平時藏拙之最深矧洊歲執䘮而致毁猥縁親黨非意相干不善防閑自貽伊戚仰公朝之矜恕念舊物之顛連褫學士之班再斯可矣使臣工之肅其在兹乎迨釋服以及朝敢陳詞而謝罪慈葢伏遇皇帝陛下冕旒無蔽簪履不遺以天地之心為心何止國君含垢之意謂兄弟之子猶子真得聖人觀過之仁遂於危蹤止用輕典臣敢不闔門念咎望闕歸恩三黜何言但有動心忍性之戒餘生無幾徐上引經告老之章謝龍圖閣直學士致仕表致大夫之仕仰賴矜從進學士之班弗容避免念餘齡之無幾幸晚節之茍全量小已盈感深至泣中謝伏念臣學徒泥古才匪適時三列皂衣寖叨嚴近久塵青𤨏遂積怨仇敢自詭以治民為專求于奉母侵尋一紀孤苦再期耄矣無能每媿祝釐之廪仕焉而已況逢告老之期洊貢封章逺投君父喜下情之上逹荷人欲以天期誥頒東海之濱職峻西清之直鹿車還里難忘貧賤之時龍馬負圖乃畀衰殘之候何夣寐之敢及亦家世之所無茲非幸歟不翅足矣兹葢伏遇皇帝陛下徳新惟日仁覆如天俯眷么微忝螭陛隨班之舊更憐骫骳當龍飛草詔之初尚問生全不忍遐棄聿頒茂渥式賁窮途臣敢不内誓丹心益堅素節退人以禮已増鏤骨之私教子以忠使效捐軀之報謝落致仕除翰林學士表代庖儤直又見卯年之周視草為真復塵乙夜之覧撫危蹤而何幸尋故步以知慙中謝竊以詞禁邃嚴宸居密邇有直諒多聞之益乃可預于論思為温厚爾雅之文始宜司於播告鼓風雷之大號増日月之末光匪得英髦曷勝遴選伏念臣學惟涉獵才乏菁華頃載筆于螭㘭尋演綸於鳯閣以先朝之門客為天子之私人方成王訪落之初預聞國論逮漢家更化之始首被召音惟投閒一紀之餘且告老三時之久茲以晚節衰殘之迹參内朝供奉之班念齊國之世臣所存無幾歎元和之學士不謂重來茲葢伏遇皇帝陛下思任舊人聿修庻政朝綱日振急聞忠藎之言疆事未寧尤務坦明之制遂令庸陋亦玷招延臣敢不修葺蕪詞仰裨藻飾尚祈聖度俯矜草芥之微終俾凋年遂逐桑榆之晚謝吏部尚書兼翰林學士侍讀修史表比䝉召節趣歸紫橐之班疊被恩綸盡復青氈之物徳有乾坤之重身同淵谷之危中謝竊以才不可以强為人當知于自度非山濤之識量豈足典銓必陸贄之文章始堪視草露門贊緝熙之益虎觀資潤色之工曽未能其一焉奚可兼兹四者伏念臣既衰無用已試罔功屏居一紀之餘且經告老入對九重之下恍若更生而乃冐選部之真除尋禁林之故步進讀清閒之燕充員筆削之間敢言眼赤之何時深媿汗青之無日身章愈煥轡飾増華儒生之為祠臣誤辱公朝之寵天子以賜學士尤加暮景之榮茲葢伏遇皇帝陛下政務惟新人先求舊取之數路宜廣擇于時髦備于一夫恐徒妨夫㨗徑凌兢拜命頽墮知慙臣敢不勉䇿庸愚仰酬眷奬掌選而分文武詎敢辭勞埀車以示子孫終期得謝辭免簽書樞密院事表誤恩下逮俾綴邇聫遜牘上陳未頒俞㫖仰冐葢高之聽不嫌再瀆之煩中謝恭惟累朝特重右府豈獨無三軍五兵之本抑使聞一日萬幾之微才則甚難官何必備顧愚臣之無取荷上聖之深知起之掛冠聞廢之餘處以持槖清華之舊強顔寖久告老未諧尚不堪朝夕之論思何以禆夙夜之宥密進寓承明之直更列元良之賓揣已奚堪逾涯莫甚欲望皇帝陛下俯埀淵鍳洞察忱衷念已迫于桑榆盍居閒地儻未遺于簮履姑置從班别求經濟之材以翌昇平之運謝簽書樞密院事表銓部為真猶未經于滿嵗機廷簉式乃遽辱于頒恩遜避靡遑周章增愓中謝竊以官莫崇于執政軄尤重于本兵必求文武之全才以任國家之重事邊圉甫定尚勤宵旰之憂邦域以寧允藉弼諧之助豈應疲卒可預㡬微如臣者資實腐儒仕叨法從由乆司于封駮故多積于怨仇十載歸閒仰戴乾坤之施一朝収召復觀日月之明不堪聼履之華伏上埀車之請敢期誤渥俾贊洪樞血氣既衰止合奉身而去軍旅未學曷賛基命之嚴玷書殿之清班忝儲扃之下客被繡韉于上駟束鏐帶于襲衣采食有加寵榮已甚茲葢伏遇皇帝陛下人惟求舊政務圖新謂代言于受禪之初未忘孤迹迨趣職于更化之始深鍳凋年豈云術業之可稱葢自眷私之過厚遂容僥幸倍切凌兢臣敢不深感隆恩愈堅晚節老當益壮固欲殫報主之忠耄矣無能終恐負知人之咎謝皇太子牋謬參樞筦仍汚紫殿之班兼預儲賓始下青宫之拜以榮為懼得寵若驚中謝伏念某少也無竒晚将焉用掛冠而去真成治世之幸民扶杖以觀親覩大君之更化首祇嚴召重覲清光俾視草于鑾坡旋典銓于選部露門進讀冊府細書舊物復還空積妨賢之愧故山在望但祈得謝而歸敢冀明倫擢登右府致此血氣既衰之迹厠于衣冠甚偉之中揣已奚堪荷恩有自茲葢伏遇皇太子殿下惟中玉粹學振金聲子職日供肅侍凝旒之側官僚妙選誤収華髪之餘某敢不益勵駑才用酬鴻造退憐已老莫能陪宥密之司勉訟所聞庻或補温文之徳辭免同知樞密院事表宥府選寮忽叨再命需章避寵尚閟一俞爰洊瀆于宸聰冀終囘于渙渥中謝伏念臣引經納禄奉詔還朝始膺典選之除適預和戎之議既不能出竒䇿以強國勢又不敢抗高論以竊時名深為世務之宜遂定從官之論鄰盟已講邊備粗寛魏絳何功姑欲就懐戎之得利張昭雖老當使知將相之有人頼聖慈俯徇于和親在臣下盍為之引咎自媿寡謀之甚難陪基命之司殆無地以寄顔惟竭誠而報主日圖内治之要未知所先靡厭衆言之求尚不睱給有何勞效遽被推遷不勝據蒺之憂徒謹循牆之走伏望皇帝陛下俯埀淵鑒洞察愚衷豈惟微臣懐以榮為懼之恐仰祈睿筭篤居安慮危之心精求文武之才用贊樞密之任謝同知樞密院事表簉宥密之班未知圖報拜便蕃之渥弗許終辭自揆僥逾實深感惕中謝竊以皇家嚴二府之建任固匪輕機庭分四等之差官毋求備賢相並兼于使領副樞足贊于事幾既曰才難豈容序進伏念臣少無可用老尚何堪扶病以對便朝幸不違于咫尺强顔而居舊著顧奚補于毫分假寵已多匄間未得敢謂七旬之後冐叅兩地之榮畀興國熙奏之官已為過分加淳化宼凖之職尤媿無名偶縁廷告之同時因與政途而接踵在法當從既超筆槖之聫計日而言僅周天地之數併増采食洊被匪頒茲葢伏遇皇帝陛下懋建大中丕乘興運謂股肱所寄方彚進于時髦雖筋力既衰亦使陪于末議未遑席暖復俾陛升臣敢不仰戴隆私益堅素守邊陲甫定願裨内治之謀里社相望期遂歸休之請辭免叅知政事表進參政柄誠出誤恩冐貢遜函未囘淵聼洊布懇祈之切敢辭俯傴之恭中謝伏念臣才不逮中身今既老十載排根之已甚實倍費于保全一朝収召而復還又屢叨于襃擢非敢忘知止之義葢欲堅圖報之心今則疾疢交侵徒強顔而自靦年齡云邁顧納禄之未能使在旬月之間稍有毫釐之補序遷而上已分已逾而况據案牘而書名雖具員而益愧對冕旒而奏事無長䇿之可陳誤寵所加羣言必駭欲望皇帝陛下念經綸之事重思輔贊之才難别選英髦俾作調元之助毋容衰瘁更貽濫吹之譏或畀舊班俯存孤迹謝參知政事表充貳樞庭方慙玩愒晉陪宰路遽被推遷倍深臨谷之危莫遂循牆之請中謝竊以朝廷建輔號天子之四鄰政事參聞下丞相之一等定名稱于乾徳復官制於建炎必求異能乃副隆委伏念臣頺齡景迫壯志日彫再掌吏銓但守停年之格濫居宥府未寛思職之憂雖粗竭于謭才終莫禆于末議負二宜去有七弗堪宿恙漸侵將籲天而致禱誤恩狎至真蹐地以靡遑況秉鈞當軸之虚貟而知印押班之分日兼與漢章之約仍從商皓之游命服匪頒復賜天閑之駿爰田増衍更開公社之封昔在本兵尚為僥冐茲叨助理尤懼曠瘝茲葢伏遇皇帝陛下盛徳又新至誠樂與折衝禦侮坐底于外寧聚精㑹神力先于内治揀求俊乂置在弼諧聿令衰退之蹤亦忝延登之數臣敢不益殫愚慮仰贊宏規曰都曰俞願竊慕賡歌之喜知足知止庻幾從告老之私攻媿集巻十七
