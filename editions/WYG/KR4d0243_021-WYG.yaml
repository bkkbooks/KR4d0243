body:
  text: 攻媿集巻二十一宋樓鑰撰奏議乞正太祖皇帝東嚮之位任温州日上臣仰惟陛下聖孝冠古通于神明諒陰端憂哀禮兼盡稱天定諡博採衆説務極其當臣假守偏郡安敢妄議宗廟以干嚴誅自以世受國恩蒙被使令有懐不言是為欺天臣竊見近降指揮恭為大行太上皇帝升祔有期增置太廟一室以奉神靈臣不學無術又在逺外道聽塗説嘗有見聞臣居明州近故龍圗閣待制趙粹中寓居臣鄉里聞其任吏部侍郎日曾進廟議請觀其書熟復其説臣既擊服粹中亦深自慨然至于流涕葢謂太祖皇帝開基創業之盛而不得正東嚮之尊攷之典禮稽之古誼本無可疑熙寧五年首以王安石之臆説變亂古制陰使章衡倡為謬論雖名臣如馮京梁夀盧士宗司馬光等力辨而不能回孫固反覆論議僅得不廢配天之祀而東嚮之禮竟不獲伸紹興五年董弅建議孫近李光折彦質劉大中廖剛晏敦復王俁劉寧止胡交修梁汝嘉張致逺朱震任申先何慤楊震莊必彊李弼直皆是其議趙煥奏陳尤力太上皇帝擢弅為侍從渙為監察御史言已行矣而一趙霈獨不以為然徒以諫大夫之重議不出已横加阻抑然猶畏公論不敢非毁但以徽宗在逺未當專議遂寢其事淳熙元年粹中以當時羣臣所奏悉加銓次為陛下言之既蒙睿旨下之禮官國子司業戴幾先兼權禮部侍郎力沮其説而言無經據粹中又進闢異一書深切著明終亦不行臣詳叩之粹中言幾先本不足以搖大事葢嘗密言于執政以為太上皇帝萬夀之日未應議此以致中輟今大行太上皇帝方將袝廟維其時矣陛下親承付託以太祖皇帝七世之孫奉紹興五年制禮之遺意取粹中所進一書申命討論正太祖東嚮之位參先朝羣臣之説定我宋宗廟之禮省有司增室之役為萬世不易之法以慰列聖在天之靈臣不勝大願不敢茍避斧鉞失今不論後實難言使他日未先狗馬填溝壑雖有可言之路亦已晚矣惟陛下赫然英斷舉而行之實天下幸甚貼黄臣照得粹中所集廟議及闢異等書又有雜説一編皆已經進御或恐内府深藏未易尋究臣嘗傳録副本乞降敕旨取索謹當繕寫投進臣伏以宗廟之事事大體重不敢聞于外庭如蒙聖慈不以人廢言伏乞睿旨以粹中之書出自聖意付三省施行臣職居逺外合具奏狀正以事當嚴密恭讀中興㑹要紹興三十一年四月二十四日太上皇帝宣諭宰臣曰臣僚于利害奏劄士大夫自合親書不須計較字畫工拙敢循故事以劄子親書投進仰乞睿照論恢復知温州被旨奏事臣仰惟陛下親受至尊夀皇聖帝付託之重兢兢萬幾惟日不足天下之事不勝其繁臣愚以為當先立乎其大孔子于魯則先三家于衛則先正名豈無他事可為葢莫先于此也國家之大者莫先于恢復之計君臣之間所當朝夕以謀之而在天者有數存焉不可以强為也高宗立國于兵戈擾攘之中保全東南兼愛西北葢三十六年而傳之夀皇夀皇即位之初慨然有志于中原練兵選將躬親騎射以作士卒之氣不惟時未可為正以高宗年高厭兵聖孝承志終守和好以修内治葢二十八年而傳之陛下陛下念祖宗積累之業痛二聖播遷之禍承兩朝未集之勲軫遺黎陷溺之久今日之事豈復有先于此者臣在逺外固莫窺廟謨之祕若自登極以來詔令為民而下所以戒飭士夫警䇿將帥皆足以感動人心今又講蒐田之法人固已知聖意之所在臣猶有言者非敢勸陛下好兵亟戰挑強鄰開邊釁縱將士以邀功而生事也誠願陛下專以恢復之計為心旦旦而思之嵗嵗而圗之陛下果篤志于此祈上天之助順則畏天之心益謹望祖宗之陰祐則敬祖宗之心益篤思欲如唐太宗俘頡利以奉神堯之歡則事親之孝益至以至欲圗外攘必先務内修則政事日以舉欲謀西北先保東南則邦本日以固非將相無以佐大業則求文武之才必備非儲蓄無以舉大事則用天下之財必儉務求忠良節義以備使用則讒諂面諛凡可以害吾之治者不約而自退務養神氣精力以待事機則宴安嗜欲凡可以傷吾之生者不戒而自定邊防以修軍政以嚴如此則遲以嵗月雖甲兵未動版圗未歸而恢復之計成矣一旦天道好還天心悔禍文武之士雲蒸霧集王師順動豪傑響應則大計可舉于以攄高皇之宿憤焚老上之龍庭奉萬年之觴為重華之夀而後陛下之孝道光矣國家之大恥雪矣若非及今而圗之事機之來豈能以一日之力而得此哉臣區區愚衷犯分進説惟陛下裁赦乞寛茶鹽榷貨之法臣聞古者官養民後世民養官葢古有井里之法民生而授之以田法度明備養生無憾是官養民也自井田法壊流弊日久尺寸之地無非斯民交易以為世業而出其租税以供公上此民養官也後世用度日廣什一取之而不足又重取之又有曰茶曰鹽與夫𣙜貨之屬皆出于山澤之利民取之以自養者酒所以成禮所以養生古惟以沈湎為禁而後世榷之凡此數者國家既擅其利以供養兵與支費之大端其勢不得不立法以禁切之豈特使利孔專出于上亦所以抑制豪强恐其專利以陵貧弱也為政者要當究其本源而興利聚斂之臣不思大體繁文日增至于今日網密甚矣搖手犯禁非所謂易避而難犯細民貪利法出奸生不惟不足以勝之而奉法之吏臨事雖欲坐以深文亦有不得而盡行者使其盡行必致生事蘇綽在西魏以國用不足為征税頗重既而嘆曰今所為者正如張弓非平世法也後之君子誰能弛之臣嘗感其言而智識短淺未能為國家建畫長䇿若從而輕之又恐愚民無知抵冒益衆欲望聖慈軫念元元謂設禁者本有不得已之意而犯法者初非甚可罪之人或有不體國家寛大之徳于是數者更有陳請重設法禁視平民如冦仇于見行條法外創意增添之者惟陛下一切寢而不行甚者或懲其妄言播告中外使天下知聖意之所在則斯民陰受天地之大賜所以保護元氣而夀天下之脈者或在是矣論訓練禁兵臣聞天下雖安忘戰必危自辛巳甲申用兵之後天下狃于無事兵備寖弛夀皇聖帝長慮卻顧外欲為恢復之圗内欲修固本之計申飭州郡訓練禁兵立揀中之額有路鈐按教之法有朝廷㸃摘之制雖未能盡為精鋭而每州各有數百人可用俾兵威日振盜賊帖息可謂明效大驗矣臣試郡海瀕恪遵故事月自按試以行賞罰不敢不謹而猶有可疑者兩軍決戰弓弩可以及逺而短兵可以角敵較之二者則短兵之用尤多軍器固不一而足大約弓弩鎗牌長刀皆不可不習至如擊砲以禦敵馳逐以據險皆當習于無事之時乾道元年專降指揮禁軍武藝只得教弓弩手餘外武藝更不教習軍士有長技而不得自見既以阻其勇氣亦恐閲嵗因循無所激勸日成廢墮萬一欲用必至扞格至如定礮之類尤非一日可習州郡但知奉行指揮而逺慮不可不及欲望聖慈旨下三省樞密院議定速賜行下依舊制閲習于軍政誠非小補論保治任攷功郎中日上臣聞無虞者盛帝之所戒無難者聖人之所懼持盈守成大雅所以稱太平之君子也高宗皇帝中興之初身濟大業時巡東南艱勤百為葢十餘年而後小康晚有辛巳之擾兢畏克終以享九齡肆我夀皇聖帝受禪之初鋭意有為加以甲申之警雖卒從和議而經略之志不忘益勤萬幾聖徳日新比年有旱潦之災寅畏天戒廣求民瘼四方章奏惟恐不聞蠲放惟恐不多賑䘏惟恐不至愁歎化為謳吟奸盜為之帖息脱履萬乘以授聖子二帝相傳體堯蹈舜冠徳百王皆由兢兢業業以致此崇高之盛陛下承熙洽之運膺付託之重垂拱以視天民之阜誠千載之一時也縟儀鉅典次第蒐舉又足以為太平之榮觀也中外靜謐邊鄙不聳夫何為哉況復仰遵夀皇之訓日晏坐朝孜孜聽政講論經理篇帙有加為臣子者何以仰贊聰明然區區愚忠不勝愛君憂國之心以為無難之世易于因循此如人之一身時有小疾則飲食起居動知戒謹固有尫羸而夀考者强壯之人未必無病血氣尚盛多恣所欲疾偶未形因謂之安此固良醫之所懼也孟子曰國家閒暇及是時明其政刑今日之無事實陛下聞暇之時也改元之初三宫徽號之儀長秋冊寶之禮皆不可少後自今凡稽古禮文之事動有重費而無益于治道姑俟于施行務求實效無事虛文軫未雨徹桑之言思大寒索裘之戒旦旦而圗之使事事有備先為不可勝以待可用之機以保盈成之業于無窮天子之孝顧復有大于此者乎論流民臣試郡永嘉本無善狀既迫替期誤蒙陛下收召使備郎列二年之間粗知利病近聞有流徙之民日夜念之民生豈欲輕去鄉土自非水旱太甚何忍散流去嵗早禾成熟人心晏然螟蟲為孽所損不多晚禾未登偶缺秋雨然未至甚害也而流散不已州郡既為之減收苗米招來海商存撫賑䘏雖得少定而去者已多不得不為之計也臣聞富弼賑濟之政在本朝最為稱首然攷其時弼知青州本自無事流民乃自河北而來弼不以非吾土之民而不任其責調護惠養委曲周旋迨麥熟而歸又予之以道途之費收其强壯以備卒伍今日亦可倣而行之古者徙民歸鄉其徙必有法其歸必有處今之流民扶老攜㓜顛頓暴露不知息肩之所其有親戚知識以為歸者無幾率皆茫然逺去以僥倖萬一未至淮上其狼狽于道者已多至而失所則老弱轉乎溝壑壯者不為盜賊則或為好人誘畧北去以為奴婢無復生還之日又可慮可哀也臣愚欲望睿慈興念愚民早賜處分行下兩淮監司帥守條畫措置如其已有所依未能自還者聽其自便苟無所投吿願歸而不得者量給貲糧使之復歸如此等人亦足以語化鄉里使之安土重遷其願備卒伍者欲貸種糧者有宫君子各以富弼之心為心隨宜措置救于瀕死之際其所以救民心而鎮邊服者于是乎在條目聽其自為俟其事定各以給貸招撫之數申聞庶幾官無重費而無知之民不致陷于飢餓之水火實國家之仁澤也乞罷温州船塲臣竊惟官冗甚矣而未易遽去其有無用之官徒費廪祿而一司之費又為甚多貽害公私者不可不去也温州有造船場一司究其建立之初本因高宗南巡駐蹕臨安漕臣一時措置謂漕舟全缺而良材興販自處過温以入于海者衆于是置船場立抽解是時材木不可勝用客販既盛而漕計有餘州郡係省之錢可以支撥嵗造百艘以供漕運誠一時之利也爾後本司自有船場又近地如明州華亭亦皆造船足以供轉輸之用今則山林大木絶少客販不多係省不足以給費本司亦知其難辦嵗朘月削毎年止造十船而一司尚存凡費如故其所謂益于官者不過十舟若就辦于本司及近地之船場不甚費力請言温州之為害者監官初止一員既增其一已而又增遂為三員雖是宗子添差而皆釐務請給人從並同正官則有俸給之費所養工匠則有衣糧之費造船之日又添以米十舟分為春秋兩料除材植取于客販抽解貼買不多而有鐵炭灰油之費其起發而來也以運河平底之舟而行鯨海不測之淵虛舟既不可以進勢必載私商客貨其中逺出海港而復攬載不可禁察又有將校借請篙梢犒給之費少或半載多或數月而後能逹多有覆溺沈破之患此其官司所任勞費之目也若其煩擾百姓則又甚焉十舟梢工輪差永嘉縣有田産船戸每船所用水手則又泛差諸縣瀕海之細民為之此曹各有漁業深憚此行吏人乘時為奸追擾迨遍始得人足其實不用自行率以雇人之直納于梢工始得脱身萬一船敗于海上將校等人均償不足又以其名籍追元差水手勒使填還間一有此嗟怨尤甚臣在任日先究此弊每水手一名除追呼譍官之費錢之實及梢工人止六貫有奇遂舉一嵗之數官為出數百緡而罷水手之差又恐吏輩久復擾之盡取諸縣水手名籍俟其齊足焚于公庭海瀕細民始得休息然此司不罷終為勞費而于漕運甚闗利害臣愚欲望睿慈特降聖旨行下轉運司及本州罷去此司以惠一方監官姑給添差之俸聽其滿攷已差下人省罷兵匠收隸廂軍其抽解及排岸司職事使監税官兼之既無造船之用則客販抽解亦當蠲減省一州之煩費息百姓之追擾少助仁政之萬一不勝幸願貼黄臣嘗略會計一嵗之費造船工料官兵請給衣糧起發等為錢三千六百貫有奇米七百餘石監官衣綿將校借請在外伏乞睿照轉運司若以為難乞令本州詳具細數除官兵請給衣糧外如丁鐵等費及抽解木植出賣量認錢數每年發赴本司以裨造船之費論寛刑罰臣聞刑罰所以懲奸也然聖王用之所以弼教非得已也人主之用刑惟當務寛皇朝專以仁恕得天下之心列聖哀矜惟恐一物之失所陛下遵有宋之家法紹夀皇之心傳臨御以來仁恩徳澤浹洽無外用刑之際尤軫聖心誠斯民之幸也然有司奉行惟上意所向自古已然唐太宗時自張蘊古之刑法官以失出罪為戒時有失入者人不加罪嘗謂大理卿劉徳威曰近日刑網稍密何也對曰此在主上不在羣臣人主好寛則寛好急則急律文失入減三等失出減五等今失入者無罪失出更獲大罪是以吏各自免競就深文初非有教使之然畏罪故爾倘一斷以律則此風立變矣帝悦從之由是斷獄平允此最千古之龜鑒也夀皇聖帝事事寛恤尤謹于刑乾道元年之冬刑寺定斷陸知微兄弟三人冒官之罪太輕夀皇震怒刑部侍郎王拂大理少卿陳良翰放罷其餘郎官寺郎各鑴一秩天下咸以為當然在是時正如徳威之言頗有各求自免競就深文之弊至次年春三月夀皇聞之亟下手詔曰獄重事也用法一傾其平則民無所措手足比年以來治獄之吏大率巧持多端隨意援引而重輕之故有罪者興歎而不辜者罹酷朕甚患焉卿等其革玩習之弊明審克之公使奸不容情罰必當罪用迪于刑之中勉之哉其聽朕命毋忽大哉王言過于太宗逺矣自時厥後刑為之平邇者科舉之病太甚其欲革而去之葢不止上之人之所欲也潘顯伯兄弟之獄在兄弟私情則若可恕在貢舉條制則無可逃有司定罪太輕至勤睿斷所謂非常之斷人主專之衆論無不稱快愚臣過計乃竊憂之葢自陛下龍飛之初覃霈所及與民更始寛恤之詔聮翩而下四方日有刑措之望此雖至公之舉終是罪重刑輕況復罰自近始官僚之外上至刑房之吏下及刑寺之胥無不責罰固足以懲奸矣而猶有所慮者官吏震恐或有便文自營之心則讞議之際寧免傅致深文以圗自免者唐太宗以仁恕為先夀皇聖性隆寛中外具知然前事如此則知陛下雖本無尚嚴之心而天威所加事迹相類或恐未免有競就深文之弊臣區區私憂懷此累月矣既已輪對奏事無路自逹敢因轉對傾心獻忠欲望睿慈深加矜察鑒太宗之咨詢體夀皇之詔旨酌徳威之至論審事迹之近似出自聖意特賜處分或未欲顯頒詔令乞命大臣明諭至意俾持刑官吏毋以此事自艾務從平允以稱明聖審克之心天下幸甚臣一介疎逺不勝愛君之心昧死有言罪在不赦伏惟裁幸攻媿集巻二十一
