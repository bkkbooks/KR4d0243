body:
  text: 攻媿集卷六十六宋樓鑰撰書答綦君更生論文書鑰講聞雋譽乆矣茲承恵然肯顧教以長書論文章大體筆力衮衮大過所聞幸甚幸甚鑰少習舉業不過欲應有司之求作吏以來雖粗有意于此而精神多敝于無用宦游往來忽焉半百重以二三年間憂禍薫心偶然不死以至今日舊學本自無㡬益覺荒落尚何足以言此而厚意不可虛辱試吐一二相與質正之來書謂長江東流不見其怪瞿塘灔澦之所廹束而後有動心駭目之觀誠是也然豈水之性也哉水之牲本平彼遇風而紋遇壑而奔浙江之濤蜀川之險皆非有意于竒變所謂湛然而平者固自若也灎澦之立中流或謂其乃所以為平此言尤有深致故樂之未亡也與天地同和可以感發人之良心而其既亡也史紀其精者謂能使人歎息悽愴至泣下霑襟者然後以為聲之妙曽不知哀以思者乃亡國之音所謂安以樂者何在耶清廟之瑟一唱而三嘆其亦異于後世之樂矣妄意論文者當以是求之不必惑于奇而先求其平唐三百年文章三變而後定以其歸于平也而栁子厚之稱韓文公乃曰文益竒文公亦自謂怪怪竒竒二公豈不知此蓋在流俗中以為竒而其實則文之正體也宋景文公知之矣謂其粹然一出于正至其所自為文徃徃竒澀難讀豈平者難為工竒者易以動文人氣習終未免耶典謨訓誥無一語之竒無一字之異何其渾然天成如此文人欲髙一世或挾戰國策士之氣以作新之誠可以傾駭觀聴要必有太過處嗚呼如伊川先生之易傳范太史之唐鑑心平氣和理正詞直然後為文之正體可以追配古作而遽讀之者未必深喜波平水静過者以為無竒必見髙崖懸瀑而後快韓文公之文非無竒處正如長江數千里竒險時一間見皆有觸而後發使所在而然則為物之害多矣故古文之感人如清廟之瑟若孟郊賈島之詩窮而益工者悲憂憔悴之言雖能感切不近于哀以思者乎鑰本不敢為人言言之又極平平視來書豪壯頓挫之氣亦甚異矣人之少而壯壯而老如朝氣之鋭晝墮而暮則歸鑰方墮而將歸欲以當足下之鋭宜其説之不相似然時時讀足下之書以作其墮足下亦味鑰之言以趨于平亦朋友相資之義也豈惟文哉喜怒哀樂之未發與夫平旦之氣顧豈有一毫之不平古人欲寡其過而未能此意安在幸併思之多言媿甚惟足下諒之而已答朱晦菴書鑰伏自壬寅夏間修敬紹興臺治之下伏䝉與進加以宴犒獲侍博約之誨未㡬先生賦歸鑰亦繼遭外艱沈迷憂患後數年赴官永嘉才聞台旆造朝已復還山後知起鎮臨漳俱不得一拜記史之問請違台範遂一紀矣青天白日奴隸知仰歎慕師席無由進拜時得門下所著作誦詠探索尚庶㡬在弟子之列仰惟名徳為一世師表今日端揆而下諸公無不有先登之媿嘗見講筵班退黄夕郎對人浩歎或問之曰好一箇去處吾曹冒處此如晦菴乃不使一來耶鑰學殖荒疎無所可用三入脩門推遷至此進無補于君上退不能寧其親蕪類之詞不足以代絲綸之言孱瑣之資不足以立雷霆之下曰坐針氈未知自免于戾前者表兄陳舎人之子赴楚州户曹一見即言嘗拜牀下䝉齒及賤姓名固已慚愓感著之不暇蔡季通傾盖如故亦言軫記之意晚出何以得此季通定交日淺而得益已多而況得親炙于先生乎諸公方謀以麾節强起門下庶㡬因得伏謁以遂師承之願因季通歸敢此少見悃愊不敢累牘以為苛禮顧雖承顔接辭未有其便或以為可敎欲得警誨使知所歸不勝幸甚易學啓䝉之書反復熟觀無從叩請亦託季通寓下意一二何當摳衣以請伏紙馳誠之切答杜仲髙旃書鑰向者天街一别忽忽四五年兹辱恵書以慰以荷鑰杜門郤掃荷上恩再畀祠禄仰以奉九十之親俯以自適不肖之軀不翅足矣況老態日見夏秋間病足延痛左腕嘗作醮詞云四肢而三痛楚十日而九呻吟其況可知近方稍安九十者其家不從政但當虞侍膝下暇日則以故書遮眼而昏花已不可視細字矣鼓琴足以自娱奕棊可以遣日此外一不以經意來書論出處大致意甚篤詞甚偉佩荷雖深然非所敢當也寄示新詩快讀降歎杜詩集注等書恨未盡見發㣲一編誦之數過卓乎髙哉賢父子真足以發少陵之㣲意非淺識者所及來書云云姑置是事且説杜詩以寄逺懐如何杜之詩韓之文如王右軍之書皆古今一人而已近世士夫水墨積習之工類不甚至唐人多能書歐虞褚薛是其尤穎異者疲精竭神各名家終不足以望右軍閫域若詩與文可以力取而强進之耶詆之為村夫子者固自難言然王荆公以為與元氣侔蓋極言詩之髙致若曰所以拜公像再拜涕泗流正為茅屋為秋風所破歎一詩用意之大東坡謂自是稷契等輩口中語正謂其語似稷契輩爾唐史贊之詩人以來未有如子美者皆極口稱其詩工部之詩真有參造化之妙别是一種肺肝兼備衆體間見層出不可端倪忠義感慨憂世憤激一飯不忘君此其所以為詩人冠冕後人著意形似亦有可雜之詩中而不可辨者至其奔逸絶塵雖諸名公恐未免瞠乎若後此難與不知者道也然儗人必于其倫以言取人先聖所難若直以上比禹稷與孔孟之進退則亦愛之過甚此老如在亦未必敢當鄙見如此更試思之非面言不能究也如中自誅襃妲前輩嘗稱之而陳將軍之不没其實未有人能發此者發㣲如此者非一末篇尤佳歎誦不已又記一二事雖非詩之大節因併及之留花門詩連雲屯左輔百里見積雪以趙次公之詳且博畧不注釋四明舊有卞倅養直圜為注甚詳竟不得其書嘗與之論及此亦止云意其偶有積雪爾蓋花門即回鶻也鑰嘗攷回鶻之俗衣冠皆白故連屯左輔而百里如積雪然不既多乎以此意讀之方覺語意精彩頓别又嘗與蜀士黄文叔裳食花椑因問蜀中有此乎黄曰此物甚多正出閬州杜詩所謂黄知橘柚來極為佳句然誤矣曾親到蒼溪縣順流而下兩岸黄色照耀真似橘柚其實乃此椑也問之土人云工部既誤以為橘柚有好事者欲為之解嘲為于其處大種橘柚終以非其土宜無一活者又云嘉陵江水何所似一本作山水者是蓋嘉陵江至閬州西北折而趨南横流而東復折而北州城三面皆水故亦謂之閬中閬内如河内然地勢平闊江流舒緩城南正當佳處對面即錦屏山蓋山如石黛水如碧玉故云嘉陵山水何所似石黛碧玉相因依真絶唱也此皆前所未聞恐可以助異聞之萬一又信乎不行萬里不可讀杜詩也信筆為報惟為逺業目厚㑹昆仲併道甫問訊為荷答柴殿院之子楙書鑰承長書之貺且示以事目甚詳區區非不知之鑰自叨典選凡滯案至前必究觀之可行則屬使胥輩施行若必不可行求其説而不得則必悉以底藴明告之使知其決不可以倖望息心而歸且曰毋徒為逆旅也是皆未嘗問識不識求盡吾職而已況如先殿院厚徳前輩幸及同朝今見賢子來理遺澤豈不願奉周旋重䝉垂諭不得不詳布之遺表自重官之外舊日惟中奉中散大夫以上方得一名若先殿院生前持服時中奉大夫之告已下未及授而捐館則尚可料理捨此則無説矣何也以為帶貼職朝議大夫與不帶貼職人事體一同則鑰之外祖汪公帶直顯謨閣二十年轉朝議大夫數年而後致仕未嘗敢陳乞遺表恩澤盖無此法也來教所謂一職合比四官不知何所據而言亦所未聞也以為已該唐勘轉中奉大夫之人則苟未授告猶朝議也鑰之親伯父紹興三十二年已下磨勘告未及下而終于朝議大夫亦不敢求遺表蓋告未下則無縁可得也觀尊意所以未能決然者以猶有虞氏之例也亦甞為之求其説虞君終承議郎無可得遺澤之理以其寓直龍圖閣乃在朝請大夫之上想是時有人為之地以其寓直之髙故特與之致仕一名若先殿院所寓之職則猶在朝奉郎之下況已得致仕恩澤而欲以此更得遺表一官求之法例無一而可既必知其不可而不以明告徒使左右乆旅營營則鑰之所不安也病中草草授筆吏以為報切幸加亮答趙共甫書易補音之作所謂鮮不抵掌􅃌為迂闊誠然誠然鑰雅好吴氏詩補音今者皆取其説然尚有當言者如幡幡之下注文用之不盡似有未圓處不若全用或節去不甚親切者如即鹿无虞不叶中字亦可若以音五公謂詩叶蓬豵則上章葭豝又尚何叶此一音可去之詩必有韻易則有不必叶者又不可强通也車之音斤于韋昭之辨只得寫詩補音全文節之意不完難曉艮卦薰心思尋切此不可曉如此則是本音非叶也注中引易林太𤣥乃叶鄰民豈誤音耶小畜象獨富乃取詩瞻卬補音内引老子二項知足者富强行者有志可用如以正叶富呉氏之意不可通不若易之大率古語多韻跋語所謂言出而聲諧辭比而響順不待勉强牽屬而自中音節者極然如聖謨洋洋嘉言孔彰作善降之百祥作不善降之百殃之類甚多只如補音首論服字方悟漢書順天者昌逆天者亡名其為賊敵乃可服作蒲北切方可通耳吴氏以集韻為據而不深攷説文解字之書如碩人盼字注文未為甚當説文盼恨視也从目兮聲胡計切盼詩曰美目盼分从目分聲匹莧切眄目偏合也一曰衺視也乆目丐聲莫甸切三字甚明蓋盼如孟子使民盼盼然眄如老商之一眄又眄庭柯以怡顔以匹莧一切為與倩絢二音不相叶又似太甚若眄則㡬不成字則以不攷信説文之故也姑舉此一端耳江不與陽唐相連而綴于三鍾之後上去入皆然蓋古音江音工謂之轉聲與東通亦有據否有疑處必有攷證方可決然定説不然寧闕之爾毎疑十二齊不綴于支脂之㣲之後而與十三佳十四皆相比乆不得其説後因觀後漢語如天下中庸有胡公萬事不理問伯始五經紛綸井大春之類皆是七字為句而四字一韻下三字一韻若天下模楷李元禮方知楷與禮叶齊之所以近佳皆也非好古者亦不語及此不知者不止謂迂闊而已來教所説屯離蹇乾隨臨噬嗑革卦中諸字今本既叶如王鄭諸家改字不同皆可略而不問如乾之若厲等十二處有不可通者不必强通只如潜龍勿用亢龍有悔見羣龍无首吉雖欲通之不可得也但當採吴氏之説通其可通者足矣如晦菴之説亦及叶韻漸卦上爻以陸為逵雖改經文于儀字卻叶雜卦之末蓋雜而又雜不可終窮自大過顛也而後更不復反對坡公疑之改從反對大非古意觀其韻叶可見非差如歸妹女之終也未濟男之窮也可求反對乎此皆晦菴之説為是若實之從去聲則似未然更湏詳攷此亦未暇入聲之叶去聲恐無此例有則韻皆少差如讀之為讀豆復之為復扶富切覆之為覆敷救切宿之為宿秀無有從其本字之去聲者盡入聲韻中只有厭入厭去二字通用本音卻是實有此二字義又不同實為去聲恐難從也如伸正當為敬比輔也比吉下順從也履艮同人卦首合别著卦名賁彖天文上闕文旅彖兩小亨當是衍來説皆然但流傳已乆不可輕改然亦不可不知也鑰又别有跋語見他紙可用否午暑連日揮汗方能辦此餘不暇及亦不可為不好者道也答徐敬甫書鑰辱示及主敬扁牓艮齋真蹟文昌章公跋語固深歎服然不敢著語者頃竊聞之太府卿王公字正之鑰姑之夫也嘗言此字本翼祖廟諱雖已再經祧遷而在臣子終不當以此為名字及齋室之名張南軒以此為字嚮不以為然鑰又嘗見文潞公帖或勸以為翼祖已入夾室可復舊姓潞公云老夫弼亮四世未敢遽改蓋是時猶是七廟也徽宗朝立九廟翼祖復入廟祏又以為諱後至欽宗祔廟始復祧遷省元錢敬直永嘉人也鑰忠告之遂改易直此不可不知也特臭味相與敢及此切幸加亮答趙郎中崇憲書鑰乆不嗣音正爾馳仰辱書翰以慰以荷䝉示諭濓溪書院尤見政最之餘儒術潤飾甚休甚休謹為冩四字去但谿字當如此寫溪出于陽冰之變體非古也二者俱寫去惟台意所擇濓字有少曲折見之别紙望詳覽九江江古郡于今為重鎮幸有周先生之遺迹表而出之又使士子得以館榖于其下儒風自此愈興賢使君之名與之無窮矣鑰衰瘁求未得尚爾勉强草草修報不究欲言併㡬台察濓谿之濓字書所無鑰少時見林侍郎黄中知江州曾作濓谿祠堂記今想尚有石本便中望以寄示其中亦似説濓字如元次山之􅝓峿浯出于意見近嵗得晁氏參記許氏文字一書以道所編也有云濓徐力鹽反唐力簟反从水从兼徐本曰薄冰也一曰中絶小水唐本曰薄冰也或曰中絶小水又曰淹也或从亷徐本闕濓字接素問夏三月之病至隂不過十日隂陽交期在濓水楊上善曰溓水静也七月水生時也然則从兼者亦古文㢘字非兼并之兼以上皆以道之説徐本謂今世所行徐鉉所定説文解字也以道得唐人本時以校其不同者鑰按素問二十四卷隂陽類論夏三月云云在溓水注溓水者七月也建申水生于申陰陽逆也楊上善云溓㢘檢反水静也七月水生時也唐本既曰或从㢘則非無濓字晁氏之書甚佳止有三冊若因刋之尤佳攻媿集卷六十六
