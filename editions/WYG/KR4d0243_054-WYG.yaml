body:
  text: 攻媿集卷五十四宋樓鑰撰記中興顯應觀記奉敕撰嘉定三年十一月朔制詔臣鑰顯應觀為國家集福之地自建立以來未有為之記者汝其碑之文成朕當書其額曰中興顯應觀記已而宸翰下頒昭囘之光輝耀千載臣既承命謹拜手稽首言曰百神在天地間昭布森列皇朝咸秩無文非有功不祀其間靈效顯著遠邇奔走者不過數處而䕶國顯應真君其一也真君崔姓廟在磁州旁為道觀河朔人奉之五百餘年矣靖康中高宗由康邸再使金磁去金營不百里既去謁祠下神馬擁輿肸蠁炳然州人知神之意勸帝還轅孝宗誕育于嘉興先形絳服擁羊之夢生有神光燭天之祥此皆其最著者也中興駐蹕錢塘初置觀于城南尋徙于西湖之濱分靈芝僧寺故基為之祠宇宏麗像設森嚴長廊靚深采繪工緻鐵騎戎卒左出右旋戈鋋旗葢勢若飛動敞西齋堂以挹湖山之秀為崇祐館以處羽衣之流稱其為大神之居高宗脱屣萬乗嘗同憲聖臨幸以丹堊故暗賜金藻飾一新既又三十餘年矣皇帝皇后聿追祖考之意載命興葺復賜緡錢二萬俾都監右街鑒義主管教門公事明素大師陳永年買田以増齋供之費所以妥靈而錫福斯民者甚至是誠不可以無紀也竊攷神之所自不知者以為北魏之伯淵其知者以為後漢之子玉雖皆名公而實非也續會要等書亦不詳諦或誤後人唐武德元年置磁州貞觀元年州廢而以滏陽屬相至永泰初始復舊仁宗實録景祐二年封崔府君為護國顯應公且言府君貞觀中為相州滏陽令再遷蒲州刺史史失其名在滏陽有愛惠民為立祠後因葬其地咸平二年始賜府君之廟而京師北郊及郡縣奉之如嶽祠至是因民之所信嚮而封崇之故詔曰惠在滏邑恩結蒲人又曰按求世系雖史逸其傳尸祝王官而民賴其德使果為子王與伯淵安得謂史逸其傳歟元符二年即舊號封王大觀賜廟額政和賜冠冕七年加封䕶國顯應昭惠王宣和三年郡守韓景朝辭承上命葺治祠曰敷靈觀曰顯應且按舊碑為之記其説略與實録同又言唐太宗夢得之碑詔入覲刺蒲州河北採訪使因命刑曹曹弋編録神之靈迹五十餘條傳于世淳熙十三年奉光堯聖旨改封真君然至今以府君為號者尤見其本于為令也初命延福宫使安德軍承宣使張去為為提舉官傳子及孫延慶復庀此職宣力于觀為多道士初止十餘人今益以衆田止百餘畝今益以廣啓觀門而許士庶祈䙢咸有定期季夏六日相傳以為府君生朝都人無不歸嚮駢擁一夕尤為一時之盛孟冬十日又謂為府君朝元之節或云以是日上升禁庭皆設齋醮北人之寓居者是日亦必至焉乾道六年遣使賀金國正旦臣以假吏從行過磁使介而下相率望拜于驛中蓋往來者必致敬行則先禱于西湖之祠歸則潔羞以謝之臣謹摭其始末之實為記而又播以詩云惟漢之司農兮著遺愛于桐鄉使葬我于桐兮必他時之奉嘗繄神之仕兮于滏之陽惠及斯民兮久而愈彰擢刺河中兮任河北之採訪生則祠于舊邑兮歿又冢于其旁神之既遠兮雖尊以姓而逸其名神之威靈兮信千載之流芳謂子玉與伯淵兮皆流傳之𣺌茫獨昭陵之詔録兮載顚末之為詳北方之人兮謹廟食而自唐膺累朝之封賜兮誠有赫乎龍光功在社稷兮著明效于靖康神馬乗輿兮實顯祐于高皇始孝宗之方娠兮夢絳衣而擁羊迨震夙之夕兮又神光而發祥敞祠宫之百楹兮繚千丈之周牆儼像設之雄尊兮煥金碧之焜煌仰皇明之臨御兮未嘗求福而專鄉灑奎畫以寵嘉兮粲鳯翥以龍翔前三茅而後太乙兮與四聖而相望肆隂隲而黙相兮鞏國勢于無疆上宫掖而下士民兮藉神休而禬禳偉明神之英烈兮夫豈斂惠于一方願謁于上帝兮掃欃槍而殄豺狼吾君将中天下而立兮開壽域于八荒神亦歸其所兮報何可忘重修太常寺記禮樂一也舜命伯夷作秩宗典朕三禮曰夙夜惟寅直哉惟清無他言也命䕫典樂教胃子而及詩言志歌永言聲依永律和聲八音克諧無相奪倫䕫亦曰於予擊石拊石百獸率舞又曰戛擊鳴球以至鳥獸蹌蹌蕭韶九成鳯凰來儀何樂之詳也三禮之書樂亦在焉而名書皆以禮春官掌邦禮而大司樂以下屬焉則夷䕫之任已歸于一矣為樂設官十餘自中大夫而下府史胥徒凡一千三百餘人其間上中下瞽至三百人眡瞭又三百人而舞者衆寡尚無數抑何其備也孔子之時禮樂已缺其觀于周而歴聘諸國志固在于行道未始不切切于二者故問于老耼問于萇𢎞止以論語一書求之執禮固所雅言而言樂為尤衆至聞韶而不知肉味且曰不圖為樂之至于斯也所感深矣與人歌而善必使反之而後和之説者或不知此章之意蓋鄉人邦國所用之外樂歌多失其聲苟聞歌而善必使再歌之所謂和之者又得此一詩之聲矣太史公知之言三百五篇孔子皆絃歌之以求合韶武雅頌之音禮樂自此可得而述故曰吾自衛反魯然後樂正雅頌各得其所豈苟云乎哉自太師摯適齊至少師陽擊磬襄入于海亦多不得其説摯而下皆樂工散之四方夫子謹志之如有欲用則皆知其所之殆所謂樂失求諸夷者耶安上治民莫善于禮夫人而能知之至于移風易俗莫善于樂烏可不求其故哉今又幾二千年禮既多廢樂尤失之皇朝累聖非不講明所謂禮者尚可求之簡冊一時鉅公樂樂甚盛卒不可復古蓋其本已亡矣樂之本在聲無知之者而力求于尺度秬黍之未為可歎也近世陳氏兄弟禮樂二書流傳于世禮尚可攷樂亦名與器而已耳高宗嗣歴庶事草創而卿列不以一日廢迨駐蹕錢塘以法惠僧寺東偏隙地為敕令所又街之東則為容臺尚不足以盡設禮樂之器遇閱習則列宫架于法惠寺中紹興三十一年少卿王公普始請易地會敕局中廢遂遷焉中為寅清堂耽耽夏屋于是為稱法惠既廢為懐遠驛又以為臺諫官舍敕局再建于寺之舊處而容臺不移于今五十年矣梁棟墮圯日有覆壓之虞卿少久闕嘉定二年崇慶張君鈞為主簿已歎其不可居既丞胄監又轉而丞于此時司農太府俱舍舊以趨新或謂亦可遷矣君曰此禮樂之司庭宇宏敞位置崇嚴不應輕棄矧盜泉勝母古人所避不若因而增葺之請于朝度材于天邑凡而叢費取其貲而親出納之都下之煩末吏曹之謾欺一切痛革之手賦工直察其勤惰惰者至執扑以抶勤者或釃酒以勞百堵皆興衆役競勸始于三年之仲冬明年三月八日告畢用工三千五百有竒而内外堅鞏丹堊輝華于舊有加而無不及觀者駭歎謂工于營私者未必如是之敏且辦也發地得泉石刻名曰觀音且曰飲者可以愈疾猶是法惠之舊濬而澄之泉甘且冽結亭其上扁以汲古皆不在調度之數宜其大有不足而反因撙節之有方餘錢三十萬歸之府中而寺有勲臣畫像及書籍嵗久脱落又欲為一碑未能也府帥將作監王君柟復以為助今皆如所圖不愆于素而求記于余余自念老矣豈復為文頃嵗嘗叨簿正博士少列之命三以家諱而改除終不得進退周旋于其間兹喜寺之新因君之請又欲以平日所聞者自見故弗辭君飽學工辭章沈黙靜重號蜀士之秀而克勤小物乃如此漢之什邡劇邑也辦治有餘力今日葺理官寺朝論翕然稱之每言前後同僚協力以隮登茲不自以為勞其言曰今之天下雖不易于為而于其尚可為之中卒至于不可為者意其無不息之誠且不能充是心以往故也君之所存者如此宜乎見諸實用者有此也寺無他碑乾道七年黄公鈞為壁記謂後世以儀為禮以器為樂其于聖賢之道遠矣惟儀與器又皆因陋就寡寖非六經之故蓋嘗誦其言而歎息今鐘鼓玉帛具在而官寺又備矣若安上治民移風易俗者可不求其彷彿于古者乎台州社壇記台州之北大山綿亘其一支自東而西蜿蜒委蛇至江而止勢若囘顧是為龍顧之山子城據其下官寺在焉城西南隅去儀門百步步為社稷之壇厥位面陽爽塏平曠昔人相攸而為此必不苟也有司不戒日就荒圮頽垣成蹊蕘牧無禁淳熙己亥正月宗正寺丞沈侯被選來守仲春行祀愀然顧其僚曰是可以奉吾神乎乃命撤而新之臨海令彭仲剛建縣治于煨燼之餘侯知其才舉以任焉首按圖籍斥地之舊繚以周牆數十百丈始治地得仆碑土中洗而讀之蓋政和中所頒社稷壇式也制度明甚横列三壝門各四出中立社稷二壇風師居東雷師雨師居西亦各為壇壇之高二尺有半又為燎壇于風師之東南壝外稍高于諸壇于是悉倣名數因其舊而増築之故有屋四楹為視饌待事之所既葺新之又增其一為齋潔之地其途北出表以二柱中建臺門嚴闗鍵以守之作于六月朔旦又六旬有七日告成靡金錢五十萬有竒民不知役工不告勤過者肅然始知有地主之敬侯命鑰書之鑰聞古者先成民而後致力于神侯之下車訪民隱飭吏事廩廩乎循良之風而思不倦以終之以是邦被山帶江水旱仍嵗又間有鬱攸之災謂職諸幽者非人力所及故于神無所不致其敬社稷之重其可後乎秋社展禮氣象一新環佩琮琤豆籩靜嘉神貺昭答如在左右繼自今氣淑民和雨暘時若其必有相之者然則侯之政真知所先後而致力于神者乃所以成民也侯名揆字虞卿秀之嘉興人澧陽樓記紹熙四年三月戊寅澧州澧陽樓成于是太守王侯承甫以書屬余為記且曰澧之為州始于開皇後雖廢置不一而栁河東謂自漢以南州之美者十七八莫若澧則在唐已為名郡國朝建隆四年始脱僭竊之餘而為王土乾德二年始𨽻荆湖北路東接洞庭西連施黔武陵在其前江陵在其北為湖廣之孔道承平日久戸口滋蕃嵗輸米以斛計者十五萬養禁旅至三千有畸盛矣建炎之末妖民弄兵倡亂加以劇宼一再攻陷民居官府蕩為埃煤因以饑饉幾無噍類蓋六年而後定翦除榛棘招集流散僅復城郭之舊今六十餘年矣米輸猶不及盛時十一屯兵百餘人而郡治尤偪小黄堂之前重門相去不能尋丈外逼郡城又有酒壚相直纔于東偏啟一門以通出入心竊隘之訪諸故老或曰酒壚之後舊為城門兵燬以來閉塞至今倘闢而新之郡之氣且伸吾民其庶幾乎士民援以請為告于部使者始作新門酒壚既遷斸其故基則古甃宛然言益有驗節費以為資募民以供工官吏勸趨日以就緒外鑿城雉上建華屋即前日之外門為儀門而撤其舊于是治事之㕔始得軒豁寛敞而前無蔽障得以挹蘭江之秀俯仙明之洲經始于去年之十二月庚申至是訖工合樂以落之氣象煥然頓還舊觀不敢自以為功也要不可以不紀余因為之太息曰今之為郡者或能以亷白自喜則于營繕之事一切置之恐以擾民而招謗不問其事之當為與否也前後相承謂非吾責若此樓之于澧陽是可已乎余與侯世有道義之好又為世姻侯之兄弟皆承清白之傳侯里居時恂恂然一長者而莅官遇事人有難及莆田劇邑談笑辦治茲試彫郡謂將日不暇給而能振起固陋興五紀之闕典開一郡之眉目是可記也又攷之地志是邦有浮丘子採藥之仙蹤李羣玉讀書之遺跡又楚之申明以忠孝著晉之車武子以學術顯皆其郡人也先是層城横前重扃壅底士氣亦因以不揚是役也豈惟于隂陽家之言有利于郡其必有秀士為時而出者侯于是時勤撫以致其庶尚儉以益其富闢庠序以教之後來者又能繼此將寖復承平之盛而賢能以興實自侯發之侯名正功四明人承甫其字也真州修城記眞之為州未遠也自唐永淳中始析江都置永正縣南唐為迎鑾鎮皇朝乾德二年升建安軍大中祥符六年以聖像一鑄而成遂以名州而實當江淮之要㑹大漕建臺江湖米運轉輸京師嵗以千萬計維揚楚泗俱稱繁盛而以真為首中興以來不復置發運使而山陽通泰之鹽泝江而上商賈輻湊猶為淮堧大郡佛狸之駐𤓰步近在六合之境逆亮之至瓜州去此無數十里郡居二者之間故亦再罹兵禍朝廷以保障之未固屢飭守臣築城鑿池以為設險之計林君伯成興役于前及四百餘丈鎮江游奕統制郭君超繼之僅八百丈雖務欲速未底于成嘉定二年八月諸軍糧料院潘君被命出守當兵荒饑饉之餘幾不成邦既屬以勞來安集之政又以城築委之君自下車愛民如子手自摩撫左餐右粥加以醫藥呻吟疾痛不翅切身之苦視人之饑眞若由己食寢為廢此意孚乎上下通于幽明斯民感悦頓有生意和氣致祥年糓順成劭農通商寖復舊觀乃大肆其力于斯城因前功而増築之合四百六十餘丈基厚六丈上居三之一可列七騎高二十二尺浚濠五百餘丈闊者至一十五丈深稱之女易土以甓凡鵲臺礮臺武臺角臺城馬面等甃結堅緻金湯之固巋然與維揚相為長雄足為邊庭之壯觀既又興造葺修自儀門黄堂凡官府公宇大小二十八所合為屋二百二十六楹郡之内外為之一新朝家以緡錢十萬米七千斛庚費而所用不貲不復有請惟以𣙜酤之餘及撙節用度以充之斯已勤矣郡之井市與漕臺皆在城南大江之濱議者欲如𤓰州之城剏為兩翼自城到江以蔽遮之事重費多未易驟舉余追記未冠時侍親泊江干登鑑遠亭訪之居民指其前曰頃有閧市悉墊于淵江外有沙洲數十里雖隔皇天蕩之風濤而激水北來相侵未已不數年間之宦游者則鑑遠亦為壑矣是知兩翼之城不至江濱則不足恃岸既善隤不知所止又何恃也將為久計則更宜詳處而審訂之抑又聞合肥之城自乾道修築嵗嵗増葺工費不可數計竹木灰甓出于帥漕二司而工役則又金陵戎帥任之以躋登兹山陽歴陽大率類此今是邦城郭雖就而方有兩翼之議又前者林郭二君之所築已多隳圯尚須隨處補苴又别儲二萬緡豫為後日不時之備繼此者當知今日之艱難益加不測之防則當與揚廬和楚嶺嶭相貫而掎角之勢固矣惟潘氏自紫微舍人以風節名一世君之二父以從子被賞延俱為時吏師先正柯山使君能輕財重義君實似之自其幼年躬行孝謹篤志問學有不可解于心者行矣而著日進未已嘗宰崑山去之日無以續食及倅京口以荒政自任民以父母稱之今則江之南江之北草木亦知君名制帥既以治最上聞士大夫公論莫不以為循良之冠君則退然未嘗自足也使守邊者誠心體國皆能如君何有北顧之憂哉官僚以郡人公言求記為書大槩尚勉其成云君名友文字文叔婺之金華人奉化縣學記四明六邑奉川為大號難治然俗尚氣而服義秀士尤多治之得其道非難也神文在位郡國始建學張文定公方平謂庠序俶落乎睢渙嗣音乎郟鄏而是邑舊記謂相國清河公士遜出鎮秣陵為椎輪之始蓋寳元初祕書丞于君房為宰以石夫人之廟為縣學自為之記云然且曰願以奉川為縣學始亦可以知吾邑儒風之興舊矣宣和中周君因徙于邑治之東面勢益勝未幾舍法罷廢為亭傳又遭弄兵者燬焉紹興九年榮君彜復新之于今五紀棟宇寖壞圮陋不可復支永嘉宋君始至謁奠顧瞻廟像愀然曰教化根本之地不振如此何以示斯民之欲謀焉未遑也財用之空乏期會之迫遽固已不勝其應而連嵗大祲愈不暇給政成欲去介介若不滿邑士汪君汲素好為鄉里義事聞之謂其弟份曰是吾曹責也不待勸率不謀于衆以身先之首創大成殿増廣舊址不日而成一木一瓦皆不苟設必欲堅緻宏敞為久遠計重立先聖先師十哲之像儀兩門廡以次興作前有墨池濬而廣之方正清深冰壺澄澈南山千尺倒影其中輪奐翬飛照映江縣為費不貲曽無吝色乃季夏戊申宋君率僚佐士夫釋菜學宫用以掲䖍妥靈觀者如堵驚嘆贊美以為前此未有而民不知役也于是里中善士董安嗣徐如松等三十有二人爭趨競勸相與再建駕説之堂挾以直廬傍列諸齋庖湢廥廩器用畢備凡為屋四十楹又以去嵗始有自右學登科者為闢射圃以勸方來舉梁之初屬鑰為之文今既崇成又託以記鑰世居奉川高祖正議先生教授邑中寳元學記預名刻石尋掌鄉校前後幾三十年始為郡人然五世皆反葬境内區區封邑猶不敢捨辭不獲命敢告于里人曰令尹洎諸賢所以惠吾邑者至矣自爾必能相勉以學相高以文躡儒科登膴仕使吾邑簪纓日盛為四方榮觀則今日之舉斯為稱矣然孟子有曰謹庠序之教申之以孝悌之義頒白者不負戴于道路矣是殆與今人論學之意不同何耶孔子之教人亦必曰弟子入則孝出則悌蓋庠序所以申孝悌孝悌之義明則老而負戴于道者少者必從而代之以此為庠序之效不為利禄地也誠能因今之學行古之意月書季攷不害進取而父兄之告語師友之講習率以孝悌為先此義既明則凡學于此者施于家則為孝子順孫出而仕則為忠臣良吏蹌蹌濟濟化及里閭寖有不負戴之風幾于一變而至道者將以此望吾黨之士豈直為是觀美而已哉宋君名晉之字正卿悃愊無華三為邑長皆以儒術飾吏事首欲興學迄于有成邑人紀之實鑰之同年生也安慶府修學記舒本羣舒之地于今最為佳郡灊皖之勝欲游而不遂見從宦擁麾而之焉者輒企慕如登仙然嘉泰二年嚴陵詹侯下車以寛明之資臨淳古之俗平易近民因其俗而施之政未幾坐以無事顧謂僚屬曰官府俱飭而黌舍不稱兹不可後乃即其舊而增葺之學始建于紹興八年中更繕修嵗久圮壞以某年庀工至某月日訖役煥然一新郡人謂役不及我而躋登茲願有以紀之教授王君君玉度以書來余與詹侯俱壻王氏而侯為尊行知其賢有年矣以西樞之子謙厚亷介所至有聲績而飾以儒雅澄江既以政最舶使尤著清節謂文翁興學于蜀變巴夷如鄒魯翁實舒人尤敬慕之故未暇他事而首屬意于庠校可謂知所先務矣舒之人將何以報之侯非有望于報也惟爾父兄相與率其子弟益進于學亦因其淳古之習而文之以儒術不必以取科級之多寡為輕重文翁既祠于學如漢大司農朱邑以一嗇夫而遺愛傳于千載周瑜以文武才略獨步江湖間其名尤高皆郡人也誠使異能之士間出為國家用如前數公豈非侯之望于斯郡者尚勉之哉黃州貢院記黃岡東南佳處也大江東下赤壁西峙武昌夏口鼎立相望其在皇朝王蘇二翰林一以州馳名一以坡自命皆千載傑特之偉人竹樓雪堂既壞復葺風流文獻至今增重近時郡太守博士皆不輕其選秀士亦彬然出矣建炎兵燬以來秋賦多附他邦乾道七年始試于州而因陋就簡寓貢闈于庠校三載必一毁撤既非所以作士氣而學宫寖以頽靡州人病之嘉定二年四明高君仲遠來守承開禧兵戍之餘日不暇給首謁夫子廟嘆其弗葺已甚未遑他務與教授李君宗勉飭而新之廊廡齋舍以次興立而大比又近不可復蹈前轍亟相與謀得驛舍遺址鳩工調度分委僚屬創貢院五十餘楹庀工于二月丙寅訖役于五月己丑重門正㕔攷試分位左右長廊庖湢吏舍備具嚴整費緡錢五百萬米二百斛悉出于撙節之餘民不知役工不告勞而八十五年之闕典一旦復興父老謂承平殆亦不及士類歡奮起象振發且請記之仲遠與余有中外之好相與素厚以書來委且曰去中秋才月餘願即為屬筆以慰千里之望余為之欣然且曰仲遠長余一嵗恂恂似不能言與人語如恐傷之月評以長者稱兩乘貳車而後試郡撫字固所長不謂振起事功敏辦如此高氏蓋名家也高宗皇帝中興初駐蹕錢塘始建太學妙選師儒先侍郎首為國子司業豈惟文行經學足以表率士林馳名京師規繩具舉未幾車駕幸學擢貳儀曹至今四海尊仰之仲遠其次子也居家孝友恪守家法故為政彫郡知所先後士子尚勉進學業以稱使君期待之意使人物聲望與江山相高二翰林有靈實寵嘉之仲遠名得全朝散大夫云建寧府紫芝書院記建寧當閩浙之衝是為孝宗皇帝龍潛之舊雖宦游不得一至其地聞其山川聳秀武夷諸山皆非塵境蓋八州之門戸也鍾為英傑古今相望士夫多挺挺尚氣節秋賦動踰萬數薦送率八十餘人儒風最盛學有生徒三百分十二齋猶不足以容之今郡侯寳謨閣直學士諫議李公鎮臨以來治行稱最百廢具舉功利及物不可以數計周知而尤篤意于教養顧瞻府庠悉加葺治猶以為未能甚稱樂育之意謂晉范甯之守豫章大設庠序資給衆費一出私禄心實慕之乃捐俸錢三千餘緡度地于學之東西兩隅廣為四齋鳩工于嘉定三年仲冬朔旦訖役于明年二月之望脩廊廣厦翬飛跂翼名齋以志道據德依仁游藝以其前挹紫芝之峯扁曰紫芝書院蓋前所未有也財不費于官斂不及于民増弟子員又廣田疇以豐其儲舉郡之士歡奮感勵咸請記之公學有家傳伯仲競爽且素號博洽富于文詞不以自有乃列致郡博士暨學職諸生三百餘人之請貽書以屬于鑰顧年侵氣索何以承命勉為之言曰諌議此舉固已甚偉當屢書以傳後若名齋之義其待學者尤深矣是四者出于先聖之言學之大端莫過于是道者百聖之所傳非可以須臾離不志于此則易以流遁必至惑于異端德者誠也經之言德必以偽對之以是決知德之為誠據此一誠可以終身行之仁之為器重其為道遠苟能依之形于參倚之際非學之要乎德不可言志仁不可言據藝不可言依言之各有攸當也或謂藝成而下聖人以游言之疑其為可輕是不然所謂藝者非如今之技藝乃禮樂射御書數古所謂六藝是也稽之禮經各有名數先王設教及人之幼少眞淳未散之時使習而熟之則身在有餘不可勝用君子未有不兼此而能為全德者今禮壞樂亡射御號為武事數亦不復見惟六書可傳士又罕垂意焉夫謂之小學謂小年所當學非曰學之細也洒掃進退尚由此可以上逹而況六藝乎苟能盡力于三者而游于此則為士庶幾于備矣學者其母忽于名齋之義勉而進之以答諫議之賜豈以科舉利鈍為吾儒之盛衰耶本朝庠校權輿乎睢渙嗣音乎郟鄏寳元中詔建州立學賜田五頃至慶歴四年郡邑始得立學熙寧設官分教建州首置教授一員諸郡亦未之有元豐又賜田十頃則知是邦之學國家最所屬意尤在他郡之先也或曰郡既有學而復有書院不既多乎是又不然潭之嶽麓衡之石鼓南康之白鹿皆此比也古者家有塾黨有庠術有序國有學以今準之百里之邑千里之郡其為學當有幾所而謂此為多乎姑誦所聞以謝諫議及多士之意若公餘詣學與郡博士講明經術以訓迪好學之士則諫議之任也鑰何敢贅為之辭攻媿集卷五十四
