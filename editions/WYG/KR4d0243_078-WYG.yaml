body:
  text: 攻媿集卷七十八宋樓鑰撰題跋跋􅚏書蜀隆州有山名跨鼇郡人李公新號跨鼇先生有書一編名􅚏書觀物先生張公行成跋云方言曰􅚏倦也丁度謂字或作䜪故司馬相如云窮極倦䜪而釋者亦云倦䜪疲憊也先生之書以􅚏名盖示其倦游不睎時用也余攷之集韻二十陌有􅚏字與劇同音註引方言倦也然則此書之名音從劇義則倦跨鼇之意不過此爾然説文解字無􅚏而有集韻􅚏胡官切䜱􅚏亭名在上谷䜱謨官切説文解字其虐切相踦也二字若不類而俗書足以相亂􅚏從山谷之谷彈丸之丸則是欽宗廟諱嫌名第三十六字止是亭名别無義可取跨鼇卒于宣和之末故不以靖康之嫌名為避從谷亦其虐切口上阿也從口上象其理郤絡皆從此俗書與山谷之谷無别已逆切持也象手也集韻云𨽻變為丸執孰等之丸凡恐筑之凡當从俗書與丸凡無别司馬相如上林賦曰徼䜪受詘曰窮極倦䜪俱音劇倦􅚏疲憊也而説文字徐錯通釋亦引上林賦徼䜪受屈謂以力相踦角徼要極而受屈也䜪竭㦸切其虐切聲亦相近疑即字也跨鼇之書不應取踦之義正用方言上林賦倦䜪之意耳區區雖若辭費詳攷及此因併見之以俟好古者癸未申同年錫赴宏詞多用竒字已在選中正用倦􅚏字而有司以為犯廟諱嫌名而罷之過矣跋􅬊書余君穜編大易粹言刋于龍舒又自著書名曰􅬊書以八起數或問􅬊字何義余攷説文解字二字部亟字注敏疾也从人口又二二天地也去吏反徐錯通釋曰承天之時因地之利口謀之手執之時乎時不可失疾也㑹意氣至切集韻于去聲七志正引上文而又于入聲二十四職出此字亟䓧注亦引上文而云或作䓧余君既擬太元潛虚以為書謂此字實備三才故用之亦務用竒字故又加廾第未知䓧字止用集韻為據雖復别見他書其下又加木則未之見也當攷去吏乃本音也要當从去聲為正跋汪季路所藏書畫東坡西山詩西山詩碑止有坡谷張右史三篇近嵗鄧公裔孫以前輩和篇數十首相示輒不揣次韻附見于後時在翰苑仍效周益公用印章盖南渡來官府印多更鑄惟翰林院猶用承平時舊印鑄于景徳二年蘇鄧二公俱曾用此也顔魯公書裴將軍詩魯公集中不見此詩裴將軍不知為誰既言劍舞疑為裴旻曾子言有若無實若虛犯而不校昔者吾友嘗從事于斯矣初不指名為何人而後世皆以為顔子不疑此書不見姓名其劍拔弩張之勢非忠肝義膽不能為此所謂言言如嚴霜烈日真可畏而仰哉温公倚几銘文正公自不妄語推之亹亹千餘言一出于正是以輔成元祐之治古之人所以大過人者無他善推其所為而已耳蔡端明吐谷渾曲此柳河東鐃歌鼓吹曲第十篇李靖滅吐谷渾西海上曲也忠恵公字人言愈小愈好而大字亦足名世瑰詞妙墨可稱二絕富鄭公帖國初襲前代之舊士夫隔品致敬則端拜自文忠公為相一切罷之潞公嘗云宰相事體都被富鄭公壞了兹觀與李待制師中書詞謙尊而光尤增歎仰公在當時猶山嶽然一趙濟敢摇之而師中亦凌慢如此况他人乎趙徳甫帖趙徳甫為金石錄二千巻最稱精鑑此巻謂宋公無名􅒋者而黄長睿謂汲冢師春書宋之世次曰景公􅒋者昭公子與此銘合當以􅒋為正周􅒋女及􅒋亦人名此謂仲忽以為魯公器者無所據而薛尚功謂乃説文魯字古之文字形聲假借魯公者周公始封為魯公為周公祭文王之器無疑攷古之難如此哉范寛雪景范寛畫亦可模見真者輒能辨之刻削窮絲髮而行筆堅勁鐡屋石人無能及者非其天性甚寛亦不能為此也燕文貴畫卷圖畫見聞誌載燕文貴本𨽻尺籍工畫山水不専師法自立一家規範預玉清昭應宫之役偶畫山水一幅人有告都知者因補圖畫院祗候實為精品此巻不入家數而布置精工别有一種風氣豈其是耶跋王逸老飲中八仙歌朱巖壑跋逸老草書蘭亭禊序云逸少作行書逸老為草字外人那得知當家有風味逸老以草聖擅名其為名公稱道如許寓居烏戍是時先太師岐國公為監鎮與之往還舊亦得其八仙歌此本改从九从日字為顛葢長史素有此稱也羔羊居士乃其自號聖采為所居之堂得柳軒豈亦其家耶鑰隨侍時當紹興十一二年間猶識其人此巻書于庚午嵗自言年七十有五則知生于丙辰余生于丁巳後公六十一年方識公時纔五六嵗嘉定四年辛未始見此書則亦七十五矣感今念昔為之惘然跋張謙中篆金剛經謙中之篆自成一家近嘗跋復古編頗詳此葢其真蹟也然坡公有與趙清獻公帖云表忠觀碑額可用張子野之孫有書之子野吳興人名先而此云追薦亡父張三先生何耶更當詳攷其間以袒為但以轉為褥以薩為薛之類是終不欲書篆法之所無也跋李晉明所藏書畫文與可竹笑字從竹從天而字書不述其義李陽冰云竹得風其體夭屈如人之笑坡公亦曾用其説湖州兩枝開卷一閲真欲向人而笑者妙處可得而窺哉與可老木亷博士宣仲以古木墨戲得名于紹興間嘗以坡公真筆映之全無光彩兹見湖州老筆又出其上坡公有云孰有愛其徳如愛其畫者乎東坡漁父詞元真子生為魯公客後又為坡谷所稱至櫽括其詩篇大書之其與屈靈均答問于江濱者何異耶東坡獲鬼章告廟文鬼章擾邊如唐之黙啜种誼之竒功似郝靈筌第未知當時有詞臣如此否翟忠恵作安南制有云亦惟恃我朝廷爵秩假寵有邦用能保爾山川土田傳祚永世文人多稱服之葢出坡公之遺意時方禁蘇氏學而文人之傑如忠恵公亦祖其緒餘是真不可揜矣跋宇文廷臣所藏吳彩鸞玉篇鈔始余讀文簫傳言吳彩鸞書唐韻事疑其不然近于汪季路尚書家見之雖不敢必其一日可辦然亦竒矣為之賦詩且辨其為陸法言切韻兹見樞宻宇文公所藏玉篇鈔則又過之是尤可寶也既謂之鈔竊謂如北堂書鈔之類盖莭文耳以今玉篇驗之果然不知舊有此鈔而書之耶抑彩鸞以意取之耶有可用之字而畧之有非日用之字而反取之部居如今本皆以朱字别之而三字五字止以墨書字之次序亦不與今合皆不可致詰輒書前嵗所與汪氏詩跋于左庶來者得以覽觀今玉篇惟越本最善末題㑹稽吳氏三一娘寫問之越人無能知者楷法殊精豈亦彩鸞苗裔耶跋所書卞公祠堂記東晉死節之士卞公為最顯忠獻公為之立祠忠簡公為之作記忠肝義膽千載鼎立既成而忠獻趨召碑未及建今五十年矣忠簡之子澥將漕江左俾鑰書之將登于石鑰為何人而敢預此顧惟平生慕卞公之節義恨不及登忠獻之問叨末第時受忠簡公深知實門下士也兹乃幸得以惡札託名于不朽故謹書之跋趙氏所藏大士趙君所供大士聞竹石皆亷博士宣仲之筆梵相則出于司馬參議端行亷諱布司馬諱棿皆以畫得名于紹興初余家亦有此像端行併作山林此軸得二名士各盡所長尤可寶也跋胡五峯論語指南論語一書自昔大儒不知㡬人未有能發明仁之一字樊遲問仁夫子固嘗答以愛人矣韓昌黎原道首曰博愛之謂仁他何望焉自伊洛二先生始發千古之秘洙泗言仁深見本原兹讀指南一巻樞宻黄公察院沈公皆深于此者五峯斷以一言方見二公猶有差處一曰有心于為仁則曰如此立言恐不識心不識仁也一曰能惡人則或者疑焉于是復明仁者之心曰本無所惡也則曰只是當好惡之時胸中元未了了也烏得為仁又顔淵問仁之下有曰人有仁不仁心無不仁此要約處不可毫釐差嗚乎此言㫖哉此論語之本體也然而非二公相與講貫亦無以發五峯之言故易以朋友講習為説盖天下之説未有過于此者夫子以學之不講為憂盖君子之憂未有甚于此者學者可不勉哉跋張樂全上范文正公書范文正公講道睢陽樂全以文受知晏元獻公欲擇二㛰其一則富文忠公次則樂全樂全雖不成㛰然皆文正所薦文正通守河中樂全以布衣寄此書自敘南都知奬甚深蒲坂㑹府則河中也又曰經術興于南郡士林歸乎北海北海濰州也文正未嘗仕于濰亦無北海之稱南郡亦非為南都恐是引用馬季良孔文舉事故俱不平闕而集中却有上北海范天章書又有謝范天章薦應制科詩在明道二年又有謁青州范天章等詩攷之乃范中丞諷也樂全雖為文正所知二范俱曾為天章閣待制俱曾知青州然文正在明道間始為通守而諷已為天章文正知睦州蘇州之後始得此職又執政之後知邠鄧杭晚知青州則已疾甚樂全亦已通顯而諷正以天章守青社又實以明道二年同宋宣獻蔡文忠列薦樂全茂才異等然則集中詩及書皆為諷而作青州在漢屬北海唐天寶曰北海郡皇朝以青北海縣置軍後升為濰州政和始以青州為齊郡以濰州為北海郡此書稱北海葢謂青州也因具列之以俟知者此書當在范氏而乃傳于女孫豈書成不及上仍藏于家耶跋東坡備水帖蘇少公序黄樓賦謂長公之備水有三焉水至而民不恐水大至而民不潰水既去而民益親此帖言得㫖見役七千餘人葢水去之後請增築徐城以木堤捍水衝之時熙寧七年七月河决澶淵九月水至城下帖稱二月十日則其明年元豐元年戊午也坡時年四十三筆雖未老而精彩照人可寶也跋李莊簡公與傅樵風帖建炎四年金陵潰卒四散三月戚方既殘廣徳五月遂圍宣州鋒不可當參政莊簡李公時為太守無兵可恃亟設方畧招潰卒于郊野厚待之以為用戚與其副並馬近城指畫攻具公以一書傅矢射副馬前大畧言戚乃凶冦天誅必加汝為將家何至附賊二人相顧曰此間我也攻稍緩始得為備詔遣統制巨師古劉晏率兵救之晏戰死第三帖所言巨劉為此也嘗廵城親以鐡扇障面而賊箭正中之危機屢矣舊曾問于老校退卒而得其詳經畧潘公其婿也嘗言公當危時寘匕首枕匣中與家人約曰城不可必保若使人取匕首則我必死汝輩亦俱自戕無落賊手一日危甚果遣人至一家慟哭既而報少寛矣公誓以死守勵志如此故將士用命賊遯而城全郡人至今祠事之觀所與給事傅公手帖則所聞益信二公里人忠義相勉風節凛然皆可畏而仰哉跋東萊舍人所作趙鈐轄墓表趙侯死節九江三子相從于難父死于君子死于父忠孝之道萃于一門殆有東晉卞氏之風劉公嘗任從班丞相沆之孫也為之墓表甚詳東萊紫微吕公有文章重名又為之墓表足以傳不朽矣侯之元孫吳興使君崇規先以墓碑示恵朱晦菴跋語謂東萊碑銘今不復存當為求之其家吳興之父道州亦自言未入石而家多故因亡其本吳興一日又過鑰曰近從臨川宗族家遂得墓表錄本且得東萊所答簽判書真蹟欲俾書墓表以補先世之遺慨然為書且勉其併刻東萊之帖以信後世鑰何幸乃得以鄙札託名于斯跋彭子夀甲寅奏藁并日錄手澤紹熙五年嵗在甲寅七月甲子皇上初受内禪恭儉仁孝中外具孚勵精圗治羣賢在列曾未㡬時而權臣已寖寖孽牙其間無有敢白發其端者時惟吏部侍郎彭公以舊學受眷最渥忠憤激發數其奸狀自此補外鑰在東䑓同中書舍人林公繳奏至再竟不得回消長自此分矣三人之言皆騐于後而公尤為曲突徙薪之首更化之初與林公俱召遂列邇聮獨公不及見今日為可痛也公之子司農寺主簿欽出奏藁及日錄手澤等見示覽之輒為流涕公論既白上㤙加厚公亦不自悼其不幸于九原矣欽倅嘉禾求跋其後林公下世亦已五年感念疇昔病中扶憊書此公之徳業皆已見于隧碑不復屢書嗚呼子夀可以不朽矣跋韓熙載投吳狀楊行宻之據淮南一傳渥再傳隆演徐温已專政矣九年温始進隆演為吳王而建國天祐十六年始即吳王位改唐之天祐為武義元年又傳至溥改元順義拜温左丞相其子知誥為左僕射六年嵗在丙戌温雖在金陵制朝權而政已歸知誥立延賓館以待士四方豪傑歸之時中原多故名賢宿徳皆亡身歸順此正熙載投吳之時也其父光嗣為後唐明宗所殺煕載方隠嵩丘懼禍及而南奔所謂司空者非温即知誥而史傳江南諸書不載其為司空宋齊丘雖為司空乃在太和六年嵗在甲午相去九年矣熙載文華擅一時南唐諡以文靖此狀雖挾戰國縱横之氣不脱五季萎􅒒之體然詞翰俱勝惜乎生不逢辰﨑嶇危亂中自朱元之變嗣主益忌北人多酖之遂至自汙要其論議未曾少屈信英物也想見分裂之時南走北走之士類假此等文詞以自見禪月貫休之投孟蜀有詩云一瓶一鉢垂垂老萬水千山得得來亦此類耶跋向薌林拘偽楚檄藁博陸侯既立宣帝威權益重而嚴延年劾其無人臣禮事雖不行朝廷肅然敬憚之使博陸雖有驕慢之心亦足以奪其氣偽楚虛有其表中實謬懦豈敢望博陸之萬一建君主龍天之議則其人可知向公一聞竒變即檄合肥拘其家想其方在惶擾憂恐中聞此寧復敢桀耶封府庫以臣名奉昭慈垂簾而上璽綬于髙宗雖出一時諸公之議而此舉實中其機此豈淺丈夫所能及哉又薌林家規薌林遺訓凛然如生而三子俱賢興國及郡倅既遵行維持于前貳車髙夀獨殿諸公保家之慮尤為深長既聞于郡又刻之石諸孫相與結約為久逺之計士夫名家能守素業少見其比臨武令君悉以見示歎仰不已然嘗聞古之循吏有云律設大法禮緣人情盖不欲專以法臨民也家規如學規然師與弟子以道義相處不得不立規矩以警其不率者非恃此以為庠校當有行于規矩之外者而況家乎臨武令為一門最長更惟勉之以全雍煕之軌則向氏之興未艾也既以薌林文集求序引又書此以贈之代史少保恭題御製和詩臣不肖仰蒙陛下矜念簪履之舊俾待罪經帷寵光殊奕夐無前比廼季秋壬子錫宴于澄碧殿因獲縱觀清激之勝洞心駭目如上崑閬捧手從遊天顔益温命宿玉堂之直廬顧謂臣此㑹不可以無紀臣亦思敘感遇之萬一是夕裁成古詩三十韻上進陛下賜以宸章俯同其韻華衮之褒下飾小已雖聖主所以優禮老臣者務極其至而隆天厚地之恩臣愚何以稱塞竊觀有虞盛時帝庸作歌而後臯陶颺言載賡猶得大書簡䇿垂文後代臣之蕪陋焉敢言詩而乃上勤睿作之妙是豈惟近世儒世遭逢之所未有視臯陶抑有光焉倘不能勒之堅珉以侈大賜臣則有罪臣洪惟陛下聖學淵奥句法深醇渾然天成兼備衆體一詩之中屢致意焉有曰躋民期仁夀有曰朕瘠天下肥得以見陛下之用心有曰都䕶萬年觴何當至庭戺得以見陛下之立志若夫罄嘉謨以起勲業則非臣衰朽之所敢承至使直筆以紀中興臣不佞茍未先狗馬填溝壑雖在田里尚庶㡬見之代仲舅汪尚書跋了齋表藁徳夀皇帝中興慨念裕陵實錄之誣紹興甲寅乃詔三館之士是正之内相范公沖中書舍人任公申先相繼職其事當時英俊皆在選中吾鄉禮部侍郎髙公閌其一也先少卿方官于朝髙公以姻連館寓間見諸公往來議論之餘鑰因得剽聞一二及取忠肅陳公所著尊堯集讀之其立言措意無非忠憤所激英風義氣凛凛乎方冊之上自恨晚出不得端拜下風逮今五十年始獲見公手書表藁于蔣君輝之家盥手諦觀為之歛袵遐想氣象如在左右竊嘗攷之國史政和初元張公商英猶在相位編修政典局其所建也于是得㫖命公繳進此書及奏御留中而張公以八月罷政用事者隠其詔索之實而誣以私九月遂有台州之謫觀公題識數語雖在顛沛艱危中其尊君戴上之心死生禍福有不能奪者抱抑鬰于一時昭聲烈于萬世以此較彼孰得孰失鑰輒不揆敬書其後而歸之攻媿集巻七十八
