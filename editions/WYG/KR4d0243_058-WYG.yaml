body:
  text: 攻媿集卷五十八宋樓鑰撰記新昌縣丞廰壁記余表弟汪履道得中丞新昌尋前任人名氏自紹興末年得李君結而下凡十餘人以壁記為請報之曰昌黎藍田有記尚可著筆乎書再來曰藍田之文誠美矣殆有激而言不然既曰於一邑無不當問而崔斯立乃日哦二松之間丞果誰負也我先人季父及吾兄皆嘗為之率以勤幹貳其令有聲於時是邑雖小思繼家聲庀職以來勉於所事日不暇給追科讞獄凡邑之寄大府下之縣必屬令丞謂之知佐簿與尉或不預也侵官固所不敢敢慢官乎求丞之職又自有常平雇役經制等緡錢動以千萬計境内河渡水利等事固已不勝應帥垣部使者萃於越委以吏事文符旁午又時奉檄以走它郡㑹邑大夫更易攝承久之惟恐無尺寸自見以及吾民誠知古今事不類人才有高下顧雖欲一日掃溉之暇不可得未可以藍田之言為當然也余讀書莞然曰子之言有理勉旃其以此記之錢塘縣廰壁記錢塘古都㑹繁富甲於東南高祖南巡駐蹕於兹厯三朝五十餘年矣民物百倍於舊負郭二邑事體寖重他郡邑莫敢望紹興二十七年有㫖錢塘仁和比開府祥符兩赤縣中書擇才授任秩滿許以陛擢於是選任又重仁和乃錢塘之分故錢為尤重焉舊治在錢塘門内尋入景靈禁籞乃以華嚴僧坊故址為之在國庠之西南邑鉅事叢才者或病之紹熙二年宋君价始至興滯撥煩坐以無事首作夫子廟以崇儒風建狴獄以清囚禁因又裒彚前任人名氏將刻石以記縣既甚古蒐攷史傳自宋元嘉中劉道真至呉越羅隠凡十人國朝張君房而下抵今凡三十九人具載嵗月亡者缺之使後有攷焉君實景文公四世孫風流未逺儒雅飾吏敏於從政故其施設知所先後如此鑰與君素有姻好喜君之優於仕也為之記始末而又告之曰壁記不可無也然縣令去民最親賢否不可得欺彼卓太傅元魯山諸公著於民心千載猶不忘蓋有不待碑而後傳者君尚勉之沿海制置司參議廰壁記四明為東南大邦海帀三垂北通海岱東控高麗日本諸國高皇南巡駐蹕臨安尤為控扼要地始置沿海置制使尋命守臣兼之凡閩浙淮東瀕海之州皆𨽻焉後分道置使乃專領浙東四郡檢校少保郭公仲荀徽猷閣待制仇公悆皆嘗領之仍有參謀參議官紹興三年二司俱罷隆興元年海寇猖獗户部侍郎趙公子潚以敷文閣直學士出鎮復兼置制使以重其權獨置議幕非老成資高者不在兹選於是張君大年始為之五傳而至先君先君嘗以軍器監丞兼攝起部出守括蒼倦游念歸遂仕於家又閱八人至今呉候候一日謂鑰曰時平罷警幕府雖省文書然制司任重為之參佐敢怠其事將刻石紀前任人名氏自隆興始且子之先君嘗為是官矣子為我記之候嘗為鵝城濠梁二守有能名精神未衰才力過人此職雖無以表見然嘗造其公宇前日支傾拄壊之不暇今皆煥然又有餘力以及此臨事類不苟識者多稱其賢鑰既與候游又因得以不肖姓名託先君之後遂謹書之昌國縣主簿廳壁記昌國明之屬邑實海中一大島也以山經地志數家攷之唐開元二十六年七月十三日析越州鄮縣置州仍置奉化慈溪翁山等縣大率多析於鄮明今為慶元府鄮復為鄞翁山即昌國也大厯六年三月四日廢於袁晁之亂故唐書地理志元和郡縣圖志止列四縣曰鄮奉化慈溪象山而圖志於鄮縣云翁洲入海二百里即春秋所謂甬東越滅呉請呉王居之者也其洲周環五百里有良田湖水多麋鹿圖經翁山一名翁洲十道四蕃志云徐偃王居處城基猶存皆今之縣境也皇朝端拱二年始為鹽場熙寧六年部使者以蓬萊安期富都三鄉與鄞縣隔海請置一尉以司鬬訟盗賊事王文公嘗為鄞令創縣賜以今名元豐元年又割定海縣之一鄉𨽻焉初以邑小憚費以尉兼簿領之職隆興改元海寇猖獗郡守尚書韓公仲通奏更置武尉而職始分邑之未立一尉獨尊承平民有餘力官舍壯麗他邑無能及者而簿廳始因草創久覺弊陋居者懼將壓焉累政欲為而力不逮慶元二年平陽楊君既至慨然欲一新之既數月公勤敏明孚於上下嘗試為之圖郡造浮梁邑有餘材君請得之捐資調度邑人相與分材効力不勸而集鳩工於三年初夏落成於十月之乙未為廳三間高廣加於前數尺階與軒稱是徒廳右之神祠於左廊廡吏舍一切更造木工一千五百有竒役夫二千優與之直費錢才千緡父老爭持酒幣以犒工役唶曰民不告勞而輪奐如此何其神速也始余官於朝故人劉閒叟嶠雲以書來曰外子楊正臣欲附計臺一試望有以惠頋之已而中其選遂登紹熙元年進士第鑰也初一見而竒其貌與文今又益知其才矣余鄞人也而未嘗涉海第聞出定川鮫門山水天無際風帆迅駛窮日而後至昌國故雖有寳陀安期蓬萊之勝願游而不果惟邑人徃來誦楊君之政至不容口發軔之初臨事不苟如此逺業殆未可量也邑士請記其實且曰楊君將去不可以無傳故欣然為書之慶元府通判南廳壁記郡縣丞雖不侔然位高而偪大率如藍田壁記所言余頃贅倅丹丘問於故給事呉公芾公曰吾嘗三為之進則有侵權之譏退則有避事之謗余曰處於材不材之間可乎公曰子得之矣慶元於今為輔郡貳車有三分東西南廳而南為勝城中一湖最為絶境公宇據其陽盡得十洲三島之要舊為𣙜酤之所至今猶以名其橋南渡増員始以居此參政錢公重建紅蓮閣於前運使楊公大興廳戺然二廳皆有題名此獨闕焉今董君嘗入制幕先君工部時為參議官同僚頗久樂此邦風土别駕車以來既至首欲編前任名氏登之石以序列見屬病故相仍三請不倦遂為之書併以所親厯而知者告之君之大父資政在思陵元帥府為名臣家法流傳猶有世臣之風只此一舉足以見居官之不苟淳熙初魏王易鎮罷倅貳而置長史司馬之職故更六年而後葉君以太社令員外置云錢清鹽場廳壁記錢清鎮去紹興府四十五里而近有江曰浦陽蓋自婺之浦江發源浦江舊名浦陽也唐志載越州有府一曰浦陽乃府兵之府城基猶在有橋曰隠兵而錢清之名則不知所始相傳以為錢武肅王誅董昌於浮梁因以得名然近嘗發土得靈助廟捨路記乃㑹昌中碑已言錢清則名已久矣昌傳言執昌至西江五代呉越世家又言西小江豈正謂此江耶或言後漢父老持百錢送太守劉寵寵各為取一大錢以此表其清云熙寧間部使者盧秉論鹽課云越之錢清場江水清淡以六分為額不言三江曹娥兩場老吏云崇寧改鹽法始以錢清分為三場場基堆阜四環乃舊教閱之所今猶目為教場亭民本九十餘户户每月出鹽一席豪民既侵奪其地邑胥又多方漁獵之復有私貶通注之擾僅餘三十八户而額不減使之均出是以重困四五十年來未嘗及額而逋負愈積矣從弟鏞孤苦力學久處上庠幸取世科頃尉東陽頗著能聲轉而為此不敢不謹撫存亭民既為之剔蠧疏源又間為之代稅輸三十八户欣然如更生而課亦隨羨遂加増九分有竒廨宇建於崇寧二年適百年矣雖頽敝之甚高宗幸四明畧嘗駐蹕其中鏞為一新之倉使得十萬錢而為屋三十餘楹宏敞雅潔什器俱備使亭民之解事者司錢物之出入官吏皆不預居民仰嘆以為前未有也又嘗為府中修山隂兩鄉海上石隄八百丈土塘千三百餘丈添創兩埭造南岸大石橋以便徃來亦可謂勤矣去替止三月以書來求壁記將書前任名氏嵗月之詳因為取其大槩併記之庶後來者有攷云池州教官廳壁記秋浦為江左名郡齊山九華之勝人物秀發又有李太白杜牧之遺風庠校之興有自來矣吾甥永嘉盧申之祖􅆏力學繼世科為郡博士其行也求贈以言申之俊而好文進學不待勸勉特以其少立而自立將為人師慮鮮琢磨之益大書無有師保如臨父母以遺之之官未幾則聞教育有序衿佩向風以書來求壁記告之曰余嘗客授子之鄉矣學無止法學然後知不足教然後知困古人之言其㫖深矣非真知學者自以為足非篤於教人者亦不能知困惟斆學半傳說之說本以勉其君而學記以為教學相長此又一說也今之教者不待問而講說又所從事惟舉子業雖皆非古之道然勵志於學當自知其不足用力於教當知其困不足與困子當自知之非余所能告也試書諸壁以銘坐右且將以告後來者攻媿集卷五十八
