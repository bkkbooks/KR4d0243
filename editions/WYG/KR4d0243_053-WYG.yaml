body:
  text: 攻媿集巻五十三宋樓鑰撰序六老圖序記曰福者備也備者百順之名也蓋一有不順不得謂之備一有不備不得謂之福世之得福者有之而備與順者百不一二易曰積善之家必有餘慶善至於積則非一人之為一日之力而後慶為有餘慶至於有餘而後能備能順哉恭惟致政太保大丞相魏國公際遇真主於龍潛之日光輔初政名遂身退之後兩鎮巨藩再專國秉皇上篤舊學之恩二紀之間所以寵綏其身榮其親而燕及其宗黨者無所不用其至上印綬則賜第於京師挂衣冠則分湖之一曲雍容進退為國元老四方之人無不以備福為可羨而未知夫備之至也始丞相事母齊國太夫人至孝及見大拜者數年九鼎之養囘班之儀照映今昔凡孝於親者親其身欲冀望萬一而不可是生一女五男子至淳熙乙巳嵗丞相年登八袠其女兄八十有三四弟亦皆六十餘矣一門同氣咸夀而康舉觴相屬朱顔華髪嬉嬉如小兒狀鄉閭親識歎仰盛事咸請繪而為圖丞相曰幸哉兄弟無故是吾門之餘慶也乃大合樂置酒高㑹簪纓樽俎極一時之盛以上方所賜金帛香茗以侑酒作為歌詩播之樂府於時風日清美簫鼓振作長子禮部侍郎某以次對奉祠次子都官郎官某入制司議幕率羣從子壻皆盛服環侍行酒授饔躬子弟職樂飲終日而罷昔眉山洛下耆英之集且有四人同生丙午之歌然皆合衆姓而成之無出於一家者若燕山竇氏稱丹桂之芳襄陽馬良擅白眉之譽亦未聞以大耋之年而全對床共被之樂而又得燎鬚之愛如今日者是千載樂事曾未之有嘻兹始可謂備福也已圖成適得良工為之寫照逼真烏紗道服前奉女兄恂恂怡怡如欲笑語雖名位有高下才業有先後而溫乎其容薰然之慈大率相似識不識望而知其俱為徳人長者也惟史氏世有隠徳八行先生又以奥學絶識不言而躬行既不得顯用於世福慶流演是生我公其在朝廷專務以道徳佐人主規恢宏大不求近功絶口不道開邊事其在郡國愛民如子涵養教化惟恐傷之待人接物謙下已甚好賢樂善收選寒俊薦進若不及位極人臣退然如老書生源已深而日濬之本已厚而日培之闔門習成忠厚無一人為剋核事者史氏之興殆未艾也何止今兹乎人有為一善而責報於天躬不自後而欲徼無妄之福者可以媿矣然則疏吾鄉風化之原助聖朝孝治之盛不在兹圖乎丞相顧鑰曰子為我序此鑰不侫辭不獲命謹再拜而書之樂書正誤序樂之壊久矣自孔子時問樂於萇𢎞學琴於師襄語魯太師翕如純如之變記闗雎洋洋盈耳之美聞韶而忘肉味與人歌而善必反之而後和之太師摯而下適齊適楚入河入海必謹識之蓋周衰而樂工散亡一日欲用則猶可訪求也聖人之用意深切如此故自衛反魯然後樂止雅頌各得其所詩三百五篇皆絃歌之以求合韶武雅頌之音去今又二千餘年雜之以鄭衛混之以兜離而樂幾亡矣以祖宗全盛之時聚天下博洽之士不惜重費欲定樂律以求合於古而不可得蓋其聲者樂之本也不得其本而求其末取之尺寸是以度也求之秬黍是以量也未有能吹律而求聲者而况於今乎嘗從知樂者得十二律均旋相為宫之法益以變宫變徵而求八十四調調為七聲其說其備蓋本出於龜兹而鄭譯首好之以傳於世乃與周官大司樂之說不合又不可曉近嵗得陳禮部樂書謂周禮止以圜鍾函鍾黄鍾為宫如三統三正不過子丑寅而止又謂古無四清聲痛夷樂之入中國必欲盡去之頗與其他論樂者異閒居無事讀之盡二百巻古今之樂曰雅曰俗曰胡器用舞曲無所不該其間重見者亦多要可謂浩博矣求其所謂聲者終不可得然念其用心之勤樂家之書未有此比又苦其舛誤無所攷證聞建昌陳使君刋此書與禮書竝傳取而校之賴以改定者甚衆又亦互有得失併為質之經傳而是正之尚三數百條㑹表兄華文閣直學士陳公之子芾為南豐宰因以寄之南豐欲别刋此編以補郡本之缺求書其後老矣精力日衰而氣習未除强為少年書生事亦可笑矣校書如掃塵而況拙者尚望多聞之士增益其所不及以全此書使後來者有攷焉亦區區之志也燕樂本原辨證序樂之失久矣本朝諸鉅公逄時遇主不可謂不行所學而終無定論今之君子學此者益寡建安蔡季通久從晦菴朱先生游學問該洽持論皆有信據一見而及此因得叩請曰大樂之書卷帙繁重不能自隨出所著一編曰燕樂本原辨證謂雅鄭固已遼絶而燕樂尤為淫靡然推其所自實出於雅唐志論雅俗之别謂俗樂有與律吕同名而聲不近雅者其宫調乃應夾鍾之律季通謂律度量衡言蓋有叙若有尺寸求之則是律生於度若以累黍為之則是律生於量皆非也故自為律以吹之而得其聲每疑今之樂以夾鍾為黄鍾得唐史之言而信故為圖為說而又列律本正律俗名三者使人知今之俗樂雖非古而其本則不能外此也則又歎曰為此俗樂者不知其何人使後世耽玩而人心日漓風俗日薄不能自還於雅正其亦不仁也矣然名宫與調猶曰黄鍾中吕南吕以紀律本意謂聲雖變而名尚存不没其本以待後之知者其用心又何其仁也故欲民之歸於厚當先正樂欲樂之正不可不先求俗樂之原此書之作非一日之積余雖好之亦未能遽解老矣恐不能自進於此季通又長余二嵗安貧樂道壯嵗已棄科舉此志其遂申否乎季通此行得一觀頌臺之樂歸而益攷諸書欲使樂書全備善矣然古謂妙解者猶不如神解如萬寳常等人亦幾於神者恐非書所能盡季通用功已深更加勉焉必無歉於我然後可傳諸人求大樂之書而觀之尚俟後日辨志録序學記曰一年視離經辨志此書之所以立名也學者則先辨志志不辨則不知所守矣東萊吕伯恭甫與鑰為同年生而又齊年聞道甚蚤心實師之博學篤志深造自得規模宏大而克勤小物其所著書如大事記近思録閫範之類不一而足又雜取子史傳記下逮醫書精要而切於日用者以為此編易知易行中人皆可企及擴而充之則可以入聖人之道用雖委曲而體則正大事若淺易而理實精㣲凡處已待人臨事之方詳盡縝蜜而大要以忠信篤敬為本將令學者循循然如履平地步步就實其用意切矣章貢李君和卿得而玩味法其可法戒其可戒又將刻而廣之此真東萊之本㫖也俾鑰為之序孟子曰可欲之謂善有諸已之謂信天下之事凡可欲者皆善其不可欲者非善也可欲而不能有諸已則猶天下之善也譬之五穀無非嘉種然必藝於土而後有苗有葉以至於實然必有諸已而後有所謂美所謂大以至於聖神此書誠善矣然君子多識前言徃行蓋將以蓄其徳非以資口耳之習也學者讀之必以有諸已而力行之則東萊之意庶其無負矣此書初以帥初名後又改為少儀外傳云復古編序文字之書世謂之小學或者因陋就簡指以為學之細事而忽之非也古者四民擇其秀者為士而教之所謂八嵗入小學者教以禮樂射御書數是六者雖不見古人之大全周禮注疏亦見其畧是皆有名數法度及人之幼真淳未散記識性全使習六藝則終身可以為用此為少年之學非曰學者之小事禮壊樂崩射御弗習數學亦復罕傳猶幸六書之說具存凡將爰厯等書不復可見急就章止存大畧惟許叔重著說文解字垂範千載李陽冰中興斯文於唐若南唐二徐兄弟尤深此學楚金在江南既為通釋部叙通論祛妄類聚錯宗疑義系述等篇總謂之繫傳又著韻譜備矣鼎臣入本朝逮事熙陵命校定叔重之書至今賴之爾後楊南仲章友直文勛邵疎陳睎諸公皆以篆鳴遺跡猶班班見之然不聞有書以惠後來呉興張謙中有篤志古道傷俗學之混淆為書一編號曰復古宋史藝文志張有復古編二巻用功數十年書成于大觀政和之間陳了齋程北山為前後序稱美甚至足以不朽矣鑰晩出何敢容喙尚有欲言而未盡者謙中攷證精詣字之合於古者皆所不論惟俗書亂之者必正其訛舛毫釐不貸讀者悦服無有異論聞其落筆作篆如真行然畧無艱辛之態惟體脩而末重與人小異不入俗目漢宣帝時器械工巧元成間鮮及之有谷口銅甬傳於世款識銅字其體正爾始知謙中之作蓋有自來非以意為之也巍字從委從嵬或省山以為韓魏之魏謙中為林中書家篆墓碑終不省去山字古無菴字謙中以為當作闇而難於題扁山谷雖定從草謙中亦不用也嘗篆楊龜山所作踵息菴記終篇偶無此字碑額雖從疾竟作隸體書之其信古不從俗類如此鑰不能作篆心頋好之陽冰新義猶為楚金所祛使二徐見此編殆無以訾之陽冰務新而謙中一意於古優劣可以坐判矣班馬字類序淳熙壬寅余丞宗正同年李聖俞為簿暇日以一書相示蓋婁君機所編史漢字類也余讀之因相與言曰古字不多率假借以為用後世寖廣隨俗更改多失造字之意此好古者所歎也以史籀之大篆或云書法已壊其書俗惡已不可言以叔重之說文而云野陋淺薄謬妄欺世後之字書又可知矣西漢去古未逺文章固非後人所及而字亦多古雖已變秦文科斗書廢要之假借簡朴髣髴古意其興亡之大端忠邪之異趣千載自不可誣而綴文之士又摘取竒字以資華藻片言隻字施之鉛槧自有一種風味故誨䝉漢雋等書作者不一此書更取史記之字合為一編從韻類分粲然可覩婁君之志勤矣蓋孟堅生於東都源流叔皮以成信史子長事武帝紬金匱石室之藏網羅天下放失舊聞孟堅實祖之多用其文不敢改定婁君尤為知所本矣然亦有難解者班子於馬時有遺失文意泯没如彘肩之不言生有以起自布衣而去也夫之類殆不曉其意又其甚者垓下之圍以項羽之用兵未嘗接戰止以楚歌而潰去疑無此理至誤儒者謂惜乎項羽韓信不曽一戰引孔明仲達以為比史載甚詳而孟堅畧不及此是可遺耶嘗有意一一證之性懶未暇婁君此書將傳於世觀其趣向進進未已或更攷究以補孟堅之闕以發揮子長之餘不亦善乎聖俞啞然笑曰婁君屬我以序久未落筆當盡以子之言寄之西漢㑹要序梁王筠論家門集自言吾門人人有集以為盛事然自永嘉南渡以至齊梁文氣日以卑弱所謂連篇累牘不出月露之形者也臨江徐氏以儒名家始余讀思叔左氏國紀故中書舍人陳公君舉為之序固已甚重其書後見貳卿彭公子夀為其表兄祕閣商老求儒榮堂詩始知其編北閣録甚富史官奏其有益於史筆遂膺延閣之寵尋傳其書知其有思叔之兄伯仲皆以詩書發身晩皆挂冠家居為鄉里標表已而思叔長子孟堅著漢官攻次子仲祥又倣唐㑹要之體為西漢㑹要一書疏為七十巻目録二卷總為十五門分三百六十有七事嘉定四年表進仲冬丁夘有㫖付尚書省藏之祕閣是昆仲父子間四書俱行於時俱有益於世用非止如王氏詞華之比也三代之餘治效近古莫如西京典章文物立法定制不惟輝煥周宻其言語亦皆雅馴非後世可及然而散於紀傳表志之間讀者未易識其倫緒仲祥究心於此二十餘年無一事不録無一語無據條列臚分秩然有叙開巻一閱而二百餘年之事厯厯在目其體專以班氏為主又旁取荀恱諸書參攷異同視古之文類與近時漢嶲博聞六帖法語字類等書皆出其上士夫之好古者無不欲録而藏之不患其不傳頋何待於序引而求之不置余既書儒榮之堂又銘祕閣之墓思叔致書又以此為屬為著其大畧惟老憊不能盡纂述之詳為有媿云商老莘夢莘紹興二十四年登科思叔名得之孟堅名筠淳熙十一年同登第孟堅今知全州仲祥名天麟開禧元年延試第六人今為湖廣總領所幹官云厯代帝王總要序帝王之傳尚矣鴻荒以來至於高辛其事莫得而詳故夫子定書㫁自唐虞司馬遷亦以為薦紳先生難言之洛陽邵雍為皇極經世書以為唐堯即天子位嵗在甲辰推而下之以迄我宋之熙寧又畧載嵗之卦爻以推其政迹比世之紹運圖編年通載詮要等書最為優焉給事中婁公機嗜學如嗜芰手不釋巻尤長於攷訂著書不一始為資善堂教授輔導帝子備竭心思去國二年青宫始建妙柬僚宷以吏部侍郎召還首兼端尹皇太子天資高明篤學好古禮待賓友咨訪不倦上下三千餘年興亡治亂固已綱舉而領挈矣公益思有以補報取平時所著帝王總要一書精加潤色輯成四帙又備録年號輔臣各有一編始自唐虞以至光宗皇帝凡君道之汙隆治效之優劣既書其大畧以至離合割據餘分閏位五徳之相生世系之聨屬靡不提綱撮要又擇前賢立論精確者各系世次之末開卷粲然如指諸掌獻於扄俾鑰序之鑰竊窺此書嘆曰彼瑤山玉彩之集皆非此比也皇太子講誦之餘垂意閱習不待徧攷史牒古今厯厯在目矣況公之持身挺特論議直諒凡所著述皆有依據亦未嘗茍為高論以駭俗故規畫一出於正無可議者皇上崇建國本教以義方既命丞相為之少傅執政大臣皆為賓客左右勸講罔匪正人公為之領袖又以此書日陳於前此宗社無窮之福也鑰何敢贅辭溫州進士題名序永嘉自晉為名郡宋興六十餘年人物未有顯者至天聖初朱君士亷第進士邦人榮之以名其閭自天聖至今厯四十有八年舉其上第者凡三百三十有七人夷攷鄉薦之額初止二人中十有三今益以五他繇大學外臺以進一舉所第率過鄉薦書之數而魁南宫者四冠大廷者再嗚呼亦盛矣河南二先生起千載之絶學以倡學者此邦之士漸被為多議論詞篇類有㫖趣進士之盛豈其是歟鑰濫授於兹樂儒風之方興爰攷姓名之高下嵗時之後先次而書之刋置學官又訪其氏族爵里别為一編咸虛其末以待來者雖然程氏之學大要在知本而敬以行之事業文章皆其發也而禄爵之得喪不與存焉向以此邦之士因故家之傳充而不止沿流而逹於源其為盛也又將有立言者樂為此邦書之鑰也斯拱而竢送趙亷州序趙使君以貴介公子好古嗜學自少交名士寓居東嘉避逺囂塵築屋城西偏環以竹樹如山中居擁書數千巻沈酣其間客至則清談终日無倦色澹若與世相忘者遇其適意揚眉抵掌論兵講其道咸纚纚有端緒又自許以有用之才一時貴人爭薦之錫對便朝神㑹氣合可立致要津下亦當在蓬萊道山也自以家貧急養分合浦之符以歸且行頋謂鑰當有言鑰曰奉太夫人輕軒逺遊嶺海撫字之外惟謹視藥餌經行佳山水有詩願以寄我此外尚何言然有一於此昔嘗疑孟伯周去珠復還事謂明月之胎固靈物也政苛則去平則歸雖知幾士不及殆史失之誣觀栁子厚記零陵郡乳穴之復載穴人之言曰向吾以刺史之貪戾嗜利吾是以病而紿焉今吾刺史令明而志潔吾是以誠告焉且乳穴必在深山窮林入者觸昏霧扞龍蛇束火以知其物靡繩而志其返其勤若是出又不得得直吾安得不以盡告讀之啞然笑曰是珠還之說也蓋天之生物凡世所謂寳者必在深險之地劉氏在嶠南役兵採珠至縻石於其足而縋之海使不至其下不止以是知求珠之難不止如乳穴之深一去一來豈其然乎使君行矣自爾或聞合浦之珠曰盛則公之政成而民生可樂矣當舉巵酒南望相賀以待公之歸送王粹中序粹中力學起家馳聲上庠優在舍選又其問學該洽其進進未已慨然有志於功名者也客授厯陽學子雲集凡經指授多所成就當路諸公非無知己尚為江右漕幕之行君向欲入蜀嘗為大篇後亦為詩以送厯陽之役老為此來日不暇給何處有詩輒效昌黎先生以規之義為贈君子疾没世而名不稱非必欲求名也疾吾無是實而致名也善乎名箴之言曰内不足者急於人知沛然有餘厥聞四馳昔者子路惟恐有聞赫然千載徳譽愈尊蓋名者實之賓也實至則名隨之非可要於鄉黨朋友也非可以違道而干也予人以金帛不足以收也飲人以酒不足以得也惟求其在我者而已凡得於外者分毫皆是過分一切聴之其求於我者則無止法所謂死而後已不亦逺乎茍進徳修業惟日不足雖欲逃名不可得也士之決科姑以進身而已所過者化陳迹俱不足言世之為大魁中大科者是仕進第一選後日賢否毁譽皆不係此場屋之聲亦不足以名世吾曹相與勉之愛厚不覺費辭其所以相期者逺也増釋南陽活人書序世以醫為難醫家尤以治傷寒為難仲景一書千古不朽蓋聖於醫者也本朝累聖篤意好生務使方論著明以惠兆庶積而久之名醫輩出如蘄春之龎泗水之楊孫晁張銳諸公未易悉數無求子朱公肱士夫中通儒也著南陽活人書尤為精詳吾鄉王君作肅為士而習醫自號誠菴野人以活人書為本又博取前輩諸書凡數十家手自編纂蠅頭細字參入各條之下名曰増釋南陽活人書可謂勤且博矣自言暮齒駸駸不欲為私藏將版行于世來求一言余好醫而不能學與之論辨皆有據依學者可按而求求而得其用始知此書之為有功也然嘗聞之老醫京師李仁仲之子云前朝醫官雖職在藥局方書而階官與文臣同活人書既獻於朝蔡師垣當軸大加稱賞即令頒行而國醫皆有異論蔡公恕始盡改醫官之稱不復與文臣齒不知當時異論之詳若許學士知可近世推尊其術本事方之外為活人指南一書謂傷寒惟活人書最要最備最易曉最合於古典余平日所酷愛觀許公之言則無求子所著可輕訾乎因併書之鄭屯田賦集序先生姓鄭氏唐之名族後累世居福州少時以孝文集書囊為殿帷賦魁其鄉繼以玉路建太常賦入太學人多傳誦尋寓四明開門受徒來者雲委躬孝友之行該貫羣經多有講解旁通子史百家年至四十五紹興三十年始登科文備衆體尤工於賦源流李唐諸名公出入三元元祐二李之間集古人所長而藻思絶人興寄高邁聞見層出講明題意立詞用韻精切平妥古語隨用奔湊筆端而一語不出程度之外元祐有域中有四大先生作域中四大王居一有輿議稱太平人猶議其率先生有太平無象皆突過前人不可企及讀之熟知之深者方服其理明而辭順蓋古文之有韻者也鑰年及弱冠侍親游宦而歸始得登門時亦粗成賦篇及見先生機杼望洋回若而嘆一意摹倣先生時猶未第間作一篇俟諸生既畢始出之迥出人上視瞠乎若後者又引進之嘗曰前四韻固當加工然皆有規矩前輩以妙意英詞震耀人耳目者多在後四韻而學者忽之致讀者無味雖舜琴歌南風可謂傑作先生猶曰後三韻皆空矣其嚴如此閱諸生所作語雖工或引經史全句屬對可觀而意不貫者皆所不取每令人讀堯舜不能化朱象大舜五十而慕富嵗子弟多賴等賦以為韻韻有意终篇尚有餘味可以為法或有一字切題既不可對而又與題字相犯者謂不若寘之送聨如以禮為翼之以翼星而配禮之類先生作詔諸儒講五經則曰厥後孝章開白虎之名蓋亦遵於此詔魯秉周禮云不然何以韓宣子見易象於春秋知周禮之盡在魯鑰服膺有素既沾殘膏以竊名第老猶不敢忘命兒輩收纂先生舊作僅得三十篇兒輩又以鑰少作八篇綴於後此編不惟筌蹄而已亦不求傳於世區區辭費如許不惟人笑之亦竊自笑姑使子孫知師承之自爾先生諱鍔字剛中官至屯田郎嘗為主上小學教授近録其後又特加贈官云法華經顯應録序西竺之教其高處至不可思議有厯刼贊揚所不能盡其神通發現攝魔救苦雖非人力所及皆其餘事也然其教所以盛行於世者亦賴此為多法華經凡三譯而鳩摩羅什所譯舉世誦之功徳効驗昭然顯著傳記所載非一蓋此經實如來祕宻藏非思量分别之所能解故其神異如此鄉僧宗曉朝夕誦習嘗刺血書之又集古今簡䇿之言凡一百五十事遂成巨編皆有依據將版行於世以助流通一日訪其所居蕭然自適與之語貫穿教秉問何以不出領衆曰非所敢當也因出此書求余為序余笑曰黄面老子本不欲言大藏所見與夫龍宫海藏之所祕無邊無盡其實本不曽言況此經之外見於餘之餘者乎子既集之而余又序之耶請不已漫書以授之且語之曰子欲了此而後游方他日一登寳所悟明本性筌蹄且將忘之而况此乎曉曰唯聰老語録序余頃投閒門可羅爵有僧以徑山聰老書來求寺記甚勤再三辭之不惟與聰無半面身隠言遜何能屬文徑山之名甲於東南一燔之後欲興瓦礫為寳坊兩宫賜予檀施山委舊觀鼎新又大過之宜得玉堂金閨之英為之登載頋乃訪老朽於寂寞之濱何耶僧曰寺倚神龍為命率衆致禱肸蠁昭答欲以屬公余感其意而為之辭晩歸朝行始與之識退然老衲也再相過忽已亡矣其徒集六㑹語刋之求序余不能學佛莫知師之所至但見臨濟揚岐之下曰白雲端曰五祖演曰佛眼逺皆古徳之光明傑特者逺傳行雪堂行傳光晦菴以及師其相付囑又非他人茍然之比光將示寂以行所付法衣集衆書偈以授師偈曰再來毒種元聰侍者叵耐吾宗滅汝邊也我今高枕百無憂聴子時撾塗毒鼓叢林遂有毒種之稱聚徒說法三十年自雪峯來此山法席大振復成金碧之區人謂為國一後身則師之所得者可知矣讀者其自參之攻媿集卷五十三
