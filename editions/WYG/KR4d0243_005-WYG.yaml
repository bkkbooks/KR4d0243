body:
  text: 攻媿集巻五宋樓鑰撰古體詩林和叔侍郎龜潭莊林和叔侍郎永康别墅龜潭莊以蜀中烏絲欄為寄使賦詩而書之頃年曽記逰花谿宗樞潭府谿之湄徘徊其上嘆秀爽宜有英才瑞明時巖巖林公天與竒勁氣不為金石移少以六藝鳴上庠游宦所至英聲馳瀾翻薦口徹旒冕通籍直上黄金閨出宰長城如卓魯至今遺愛人歌之入朝一冠御史豸臺綱振厲先光輝光宗聖度如天度俾承舊制形宸奎言所當言公不屈上書抗直深倚毗歴居三院上横榻首尾獨擊及四期擢居小天不肯仕逺指章貢把一麾政成召節不旋踵神與清漲促公歸代言批勅節彌勵藜藿不採非公誰竟以松班分制閫海邦雖陋不鄙夷撫摩赤子厪一稔功利及物難周知公方在臺我立螭臺省相望心事齊皇上初政公賜環我居青瑣公紫薇時平論事同努力寄名雷霆如恐遲我求外補徑投閒公亦出闗喜相隨受㕓親見賢郡侯攀轅卧轍同旄倪公時自謂二宜去吏民猶誦三不欺棠陰蔽芾勿翦伐萬人來往城南隄書來不復説餘事頗言别墅躬鉏犁頻年日渉愈成趣去家三里共游嬉首崇御扎極尊閤又以副墨登之碑非欲自詫稽古力鋪張聖徳彰仁慈猶記殿上爭挽衣咫尺龍顔犯天威坐以漢法當粉虀廷臣就列仍紳緌箧藏常裾不容毁如以折檻存軒墀公嚴十襲我書榜老臣追往空涕洟吾聞一潭浩深緑上有怪石形如龜是為古麗最佳處地藏天作公發揮大谿横貫地坦平演迤明秀山四圍十峯歴歴可名數餘如芙蓉聳天涯獨此一山亘里許中立壁峻難攀躋堂名娛老正東南比漢二疏公庶幾海棠炫畫遶欄檻細數嫣紅遍繁枝雜花滿地秀而野何殊迂居洛師千嵗靈龜巢蓮葉祝公耆夀登龎眉桃花源杳號霞隱木奴霜後黄金垂深可藏書曠可射初篁細香臨月池狎鷗渚邊鷗為下觀魚梁上魚不疑懸崖石横筍斜出拒霜為城媚清漪公既垂車棄軒冕鴻飛冥冥不受羈超然但欲適吾意抱甕直欲心忘機我雖未到景畧序盡録無心圖畫為花朝月夕景何限想見晴好雨亦宜落霞孤鶩映西日多少空翠仍烟霏此雖見之咏不足强欲著雨是耶非兩守寳婺行或止無由徃叩山中扉舊聞趙公訪歐陽千里命駕如呂稽清風明月兩閒人萬口猶傳樂府詩我雖掛冠病雙足頌繫一榻當炎曦荷公雖若魚相忘尺書時來自緘題屢索鄙書懶未暇又恐境勝難為詞兹來督我語益峻逺寄蜀絹欄烏絲為吾贈詩仍就寫欲待相好無時衰想像試作髙堂賦身知難往心欲飛才固不多老更盡況此病瘁神亦疲不如及今為公作語成不工不敢辭兩家子弟向後日庶幾二老同襟期次韻黄文叔正言送日鑄茶龍圖正言年兄寄日鑄貢品且以東坡詩中妖邪奴𨽻等語為病使為直之既與佳客品嘗比平日所得者絶不同仰嘆鍳賞之精也細觀坡公和錢安道寄惠建茶詩一時和韻反爲雙井所牽後在北方和蔣䕫寄茶則云沙谿北苑强分别水腳一線争誰先又云老妻稚子不知愛一半已入薑鹽煎人生所遇無不可南北嗜好知誰賢死生禍福久不擇更論甘苦争媸妍則是此老初亦無定論似不必深較輒次前韻聊為日鑄解嘲以資一笑古人養老食而酳後人既飽須啜茗唐稱陽羨顧渚茶惠建之名猶未省小團花􅙧矞雲龍競巧争妍動天聼要之造化生萬物甘苦酸鹽適其性古來水品多異同茶品知誰得其正芽新火活善調湯種類雖殊俱雋永坡翁立論亦疲當一貶一襃何太猛北苑固為天下最未必餘茶盡邪懭越山日鑄名最髙種在陽坡性非冷父老不堪痛摧抑待以奴隸心若鯁草木端有地所宜此品標竒惟一嶺秖應雜取應人須寖使虚名成畫餅坡公殆未識吾真真者如珠光自炯白頭拾遺辨真贗非是容心為鄉井寄來雙缶妙絶倫病新嘗信僥倖七盌自煎成水厄笑看腹似支離癭長生草我方髫齔時已復見兹草仲舅尉江陽奉親顔色好牕門掛經冬珠絲罩輕縞意為霜雪殘白花乃明杲世間三友外此有嵗寒操年至十七八童心如木槁隨時到柯山逢人細訪考買之野人手何須訪蓬島嘗為伯氏夀作詩頌難老經今五十年得自江南道老我日就衰嵗月豈長保一笑哦子詩猶將伴棃棗又次王㳟叔韻仲冬方寒荔挺出仲夏方炎靡草死若將朝菌北大椿相去何啻千萬里金芝僊草不可見長生之草畧相似少時曽識青青色今日得之乃真是天工矜憫輕喪生故出珍苖普相示若言神僊可學致自是未得養生理人爲天地最靈物野卉無情猶若此石間薜荔水昌陽巻柏生崖并葛藟是皆草中號長久末見懸空解葩蘂柯葉不改耐嵗寒土著青松那可擬不須丹砂訪葛洪毋用僊方傳李耳未知此種誰為傳烏有先生子虚賦寄題閬風劉允叔月波浮海思乘桴拾月或掛席何如閬風僊渤澥坐中得隱几時觀瀾黏天四無壁清夜水不揺孤蟾浄沈璧飄風一過之波光湛空碧萬頃玻璃田蕩以黄金液我欲從之游尚恐一層隔何當擕珍茶石井試餘滴題楊子元琪所藏東坡古木東坡筆端游戲槎牙老氣横秋笑揖退廉博士信酷似文湖州同倪正甫尚書㳺西湖靈芝寺臨西湖倪正甫尚書曰此湖如賢者别久再見儼然如昨感其言而作舊說西湖比西子君言西湖似賢士吁嗟契濶十五年一日相逢祇如此南山北山兩髙峯春波灔灔摩青銅未能蕩槳窮勝處倚欄一望開心胸老我掛冠隱田里豈知再見烟連水小須夏日醉滿荷脱屣東歸甘已矣贈犁春謝耕道歸耕十三年此來殊欿然一犁正春雨君行欲何處我方買紅船重歸尋舊㕓君亦早歸來勿荒負郭田訪李國器于包山同登寺後山庵訪客包家山相與登層顚嶙峋巨石中屈曲扶欄干夜來雨初過石罅時涓涓輕輿到岡頭大江横吾前亭午潮方盛千艘散平川道人茅三間花木羅後先朅來汨京塵曠望為洗煎山斷塔層層西陵渺蒼烟此道走邯鄲歸心更翩翩謝林徳久正字惠詩次韻老我甘投閒晏然十三秋兹來何所似反衣狐白裘京塵素為緇夢想思首丘低徊未成去黽勉終自羞久聞歌楚騷欲見知無由詩文惠盈軸一誦消百憂便當細論文夜雨同春蒭平生萬事了此去復何求尚貪未見書痛洗千斛愁得此不翅足擕歸老先疇次韻東坡武昌西山詩讜論一興誰可回賢路荆棘爭先栽竄流多能擅筆墨囚拘或可為鹽梅雪堂先生萬人敵議論磊落心崔嵬向來羅織脱一死至今詩話存烏臺憑髙望逺想宏放眼界四海空無埃黄岡踏遍興未盡絶江浪破琉璃堆漫郎神交信如在石為窊樽勝金罍鄧侯先曽訪遺跡銘文深刻山之隈山荒地僻分埋没二公前後分莓苔元祐一洗人間怨天地清寧公道開玉堂同念舊㳺勝筆端萬物挫欲摧時哉難得復易失弟兄逺過崖與雷北歸天涯望陽羨買田不及歸去來我為長歌弔此老慟哭未扺長歌哀盛山十二詩俱在石刻而不見于諸公集中唱和之盛未有如西山者舊軸既不知所在後來跋語亦僅存録本爾輒不揣和韻以寓弔古之意仍效周益公用翰苑印章重嘆二公俱曽佩此也次韻雷知院觀因詩因叙家中銅像之詳鼻祖家住江東邉推擇為吏心静淵朝朝趨邑過圯上時見暗磧光煜然平時奉佛心至謹建立塔廟崇諸天試令便介識所在退公始得來其前揮鉏去沙若有物微見銅像傷其顚須㬰衆覩全體見端嚴相好巧且堅迎歸供飬備精潔我家舊物猶青氈銖衣飄揺俱梵相珠纓垂裊穿淮蠙雖非丈六黄金身他處像設無能先不知何人妙陶冶㡳用五色増華妍自兹累葉永為寳如以衣鉢更相便是時承平最盛際正在景徳咸平間畫工難貌天人妙劫風不動神光圓益知佛教來已逺徧滿震旦尊金僊慈悲無量應成禱影響若與人周旋耳則聞音目可觀此有妙理誰能詮寳光燄燄擁身後貝花葉葉俱成全頂戴天冠工莫及中有一佛立不偏有孫是為鄉先生決科衣冠遂蟬聨大父持䘮久廬墓曽以此事形碑鐫起身月卿出為郡殿上寤主以一言易守鄉邦凡五年寵光赫奕當政宣移至湖心值兵燬精廬灰滅因亡焉初聞諸父話遺跡興歎欲見無因縁揚州伯父初賦歸慨念孝感如參騫零丁募以十萬錢里巷響應慶愈綿木工先為小臺殿居以古像小之旃後人事之加篤敬日裊香篆長蜿蜒衰宗幸有此竒特信知福利非唐捐安得東歸奉香火晏坐終老甘三椽桃園圖夷堅丙志載桃園圖畫事甚詳曽茂昭尚書以所藏墨本題識其上後見遺余益信夷堅之説不誣作長句以謝桃園初傳武陵谿靖節作記人不疑其先深避嬴政虐嘉遯與世真相違尚不知漢況晋魏子孫綿逺無終期正如三韓有秦語傳為神僊愈難知桃園洞府漁人窺别有天地均四時意必志者塞其谿不然將為世所羈後人想像作圖畫但見耋稚咸嬉嬉人家隨處成井市畎畝頗亦分塍畦井鬼不照坤之維方士異人多崛竒筠籠二版堅如鐵能刻景物窮纖微浄室給以酒盈斗一昔圖成了無虧同寮欲求第二本版忽震裂人已非夷堅作怪言歴歴何意今乃親見之未知桃源有此否此事茫昧不可稽初疑長房縮地脈又似照影歸摩尼巨麗寫成阿房賦牽連貌出連昌辭采女細數七十二人言霓裳舞羽衣樓閣玲瓏在縹緲其間恐有太眞妃刻畫工巧世固鮮磨以嵗月或可為彩鸞唐韻已甚㨗未見神速能如斯尚有漁舟傍階遲咫尺安知前路迷天聖已踰三甲子何人寳藏至今兹南豐丈人惠墨本老眼増明失昏眵固知凡蹤不可到一夢遊僊猶庶幾祕之十襲何以報贈子相好無衰時吳山井寒泉堂道流王徳正屢求呉山井記而臨安圖經所載甚畧無可考證賦長句以遺之錢塘東南一都㑹西湖宛在髙城外鑿為六井引入城唐相鄴侯功尚在吳山横亘城中央左右江湖盡襟帶寒泉迸溢清且甘發自靈源匪分派天目兩乳龍鳳來秀氣所鍾此其最海濵斥鹵潤作醎安得一泉獨滂沛四朝駐蹕八十年民聚五方真衆大抱甕桔橰萬夫汲飛泉仰流筒吸快大旱不乾潦不溢數里頳肩競分賣人言神龍宅其下濟物陰功至今在川澤固多資灌溉此井猶能濟闤闠皇家徳澤如此泉福祚與之俱不改代書寄内弟耐翁總幹我昔生外家半世猶相依至今連牆居日日相聞知諸表如羣從休戚眞同之耐翁生而秀愛惜從兒時文采既俊發吏才人共推低徊久選調毎毎為嘆咨兹行佐王人未到聲已蜚郵置屢得書論事語益竒使長首推薦婉畫多所資近觀㑹稽編分析及毫釐益知足心計薦書徧諸司正欲助才選非敢請以私惜君年欲侵正以逺大期得書再三讀惘然増愕眙非所望于子所言何背馳江湖兩路間弄兵分潢池羽檄以時至廟堂日三思調度供軍需發兵帀四垂吾事誠可慮彼亦安能為豈曰白頭賊指日當誅夷使子任賊衝尚望羽扇揮如何隔千里遽來奉檄歸長沙屹巨鎮洞庭渺無涯鄂渚屯重兵上㳺藉兵威當思深逺謀胡為先自萎此言及同寮必為人所窺歸以語閨門徒驚妾與妻無端使禀議在此何為辭望子置私憂志立官無卑張巡起縣令力拒百萬師逆徒哽喉牙蔽遮賴渙濉韋寛守玉璧臧質全盱眙丈夫立節義有才尤當施殺身以成仁致命須見危讀書不念此萬卷終何禆但當安義命前定無參差勉哉盡所職造物不汝遺況復受國恩當與相維持今子仕髙沙偶然脱危機正須加義方豈應使同斯向也未得禄遑遑不自支既入紅蓮幕圖進亦其宜今日寧為民此乃無聊詞歸來事若定又思登王畿胸中空擾擾禍福不在兹倘能悟愚言便可知昨非著枕必安寢食淡甘如飴老誖非强聒鄙見不可移少安常毋躁通籍看金閨題汪季路家藏吳彩鸞唐韻後舊説僊人吳彩鸞日書切韻歸毫端不應神速有如此令人至今疑稗官相傳此事三百載誰知眞蹟儼然在筆精墨妙信入神間以朱丹倍晶彩法言初為此韻時賸裒文字覺後知寧知遂經謫僊手諱字曽闕民與基經生矻矻盡精力摩以嵗月或可得動翰如飛猶恐遲一日一揮出心畫神僊之説云渺茫僊凡配耦尤荒唐簫史弄玉乗鳳去藍田空説容裴航文簫之遇真是否豈比虚名傳不朽五篇歴歴為全書始信傳聞是真有當時所直才五緡于今千金價未均十年蓋有數百本未知幾本傳今人惜哉字畫太纎細後日傳之知幾嵗秖今已有字不全欲鐫翠珉固非易我踰七十方見之暫借一觀聊自怡平生願見心便足何必更謀身後為隋開皇初陸法言與劉儀同等八人論具音韻燭下握筆略記綱紀至仁夀元年始成切韻五卷比之前人韻集韻畧音譜等書已不羣矣後有郭知立等九人各有増加惟天寳十載孫愐唐韻最著今世所行廣韻則皇朝景徳祥符重修遂至二萬六千一百九十四言而集韻又在其後也今以廣韻較彩鸞所書東有十七而此本止三字同有四十五而此止十九公有十三而此止于八䝉有二十七而此止于十二注文亦多不全況法言及愐二序今該立于唐韻之前彩鸞所書既名曰切韻又首書法言之序則其為法言之切韻明矣傳記已誤曰孫愐唐韻今亦多以三書為一或至謂廣韻為唐韻而彩鸞能書之是皆非也且五篇其四皆于其首書凡若干韻而于上聲獨闕序中辛得源偶言旁有闕文後人遽以東字足之為諫議非也葢諮議云題汪宏輔三馬圖玉花流雲照夜白開元尚想行九街韓李鄭君俱已矣健筆誰能如順齋樞密府雪後作故韓氏子舍也平生好流水雅欲臨流賦澗谿或過之眷眷不能去青山圍故鄉不肯入城府寧知開八表重來尋故歩勢家遺故居傳舍偶成寓軒楹立竒石巉巖髙丈許三面立屏障曲沼水深貯荏苒將半載未見有時雨新春積雪餘簷聲夜如注曉起推閒窻石穴水噴吐下穿玲瓏餘數尺成瀑布髣髴小龍湫雖㣲體畧具退公輒對之相逢歡遲暮有客與同賞酌酒更告語雖云京塵深燕坐得幽趣懸崖掛長藤絶頂列佳樹㣲風一披拂墜㸃紛無數吾方謀乞身信美難久駐未能寫成圖聊用賦長句謝文思許尚之石函廣陵散譜余好彈廣陵散比見周待制清真集序石函中譜歎味不已念無從可得文思許尚之中行云家有此本後自武昌録寄深嘆雅尚又以知然諾之不輕也因作是詩以謝之叔夜千載人生也當晋魏君卑臣寖强駸駸司馬氏幽憤無所洩舒寫向桐梓慢商與宮同惨痛聲足備規橅既𢎞濶音節分巨細撥剌洎全扶他曲安有是昌黎贈潁師必為此曲製眤眤變軒昂悲壯見英氣形容泛絲聲雲絮無根蒂孤鳳出喧啾或失千丈勢謂此琵琶詩歐蘇俱過矣余生無他好嗜此如嗜芰清彈五十年良夜或無寐向時幾似之激烈至流涕素攷韓臯言神授託竒詭别姊取韓相多用聶政事近讀清眞序始知石函祕賢哉許阿訥自言家有此文君昔寳藏人亡琴亦廢荷君重然諾寫譜逺相寄按拍三十六大同小有異此即名止息八拍信為贅君逺未能來我老從此逝何當為君彈更窮不盡意韓文公聼潁師彈琴詩幾為古今絶唱前十句形容曲盡是必為廣陵散而作他曲不足以當此歐公以為琵琶詩而蘇公遂櫽括為琵琶詞二公皆天人何敢輕議然俱非深于琴者也丁卯夏秋間嘗有一詞謾録呈所謂激烈至流涕者也正聲第一拍名取韓相第十三拍名别姊又一本序五拍亦有名第一拍名井里史記刺客傳聶政軹深井里人也刺殺韓相俠累為姊曰榮韓臯知叔夜之託于神授以避禍而不知名拍以聶政事又以見古有此曲也鮮有知者故及之王叔達以尉彭澤潛玉洞述見示書巖已竒甚潛玉尤偉哉李君漫盤谷元子空峿臺神不得自祕天應為君開淵明如得此應不賦歸來題董亨道八景圖錢塘怒濤天下無誰將尺紙為新圖賀家湖上如鏡浄屢向烟波逢釣徒彩虹横卧吳淞上洞庭一螺浮具區亦曽泛舟彭蠡湖插立千劍名大孤廬山髙哉不得到歴歴五老聨香爐上鍾下鍾夾湖口半江清濁涇渭如多景雄據金焦間夕陽㣲照海門山其餘知名不知處赤壁但歌前後賦江漢至鄂始合流黄鶴樓前鸚鵡洲瀟湘見説青如染道林岳麓横清秋我欲逺逰嗟暮齒蝶夢翩翩漫千里但欲絶江尋越山歸老故山吾已矣魚計亭平生信天公頽然不作計顧我雖非魚想見亦相似潛深本其性魚亦非有意浮陽或在渚不能終自祕或為饑所驅危機在香餌輕絲引纎鈎性命困刀几魚以味得烹我以名自累安得兩相忘容我從此逝跋盧申之所藏韋偃三馬名畫記言韋鍳工龍馬妙得精氣從子鶠善小馬有小馬放牧圖傳于代思陵親為再書尤為可寳申之求詩感而有作嗟哉馬之生馳驟乃其性一為人所羈寸歩不得騁局促閑廐中專俟圉人令調服無踶齧始可用朝請戰騎冒鋒鏑或致隕其命繡羈非不華金狨號為盛青黄木之此此亦馬所病立仗尤貴重一鳴輒斥屏何如在牧時卧起玩煙景豐草勝芻荳清波恣㳺泳韋侯擅筆精幻出無人境思陵賜珍題昭回光炳炳身方縛名韁三年慙負乗細窺樂寛閒悠然動歸興宇文樞宻借示范寛春山圖妙絶一時以詩送還范生本以寛得名不學闗仝與李成筆端自出一機杼理通神㑹真其能横披小軸屢到眼頗亦時能辨真贗未見𢎞大如公藏茂樹喬山春爛漫此圖不是江南山寒空青嶂疑商顔髙髙下下幾佳處莊家時有茅三間橋梁樓觀各有趣一夫驅驢何處去安得隨入杳靄間布襪青鞋踏空霧近山忽斷見遥碧天涯一望無中極胸中丘壑誰測知鐵屋石人驚筆力鵞谿六幅髙堂空終日坐對心神融看罷為我捲還客自此歸余境夢中錢文季少卿以蜀中織成山谷書廬山髙為夀次韻七十衰翁年愈髙意氣銷盡湖海豪平生萬事不翅足但欲乞身歸故巢幾番掛冠不容去歸夢屢渉滄浪濤縱使不去豈能久命如槁葉風將飄一陽來復值初度方念吹棘心夭夭何期老友加記録乃爲衰朽親揮毫廬山髙哉山谷字蜀女織就新氷綃安得東歸抱四絶雙鳧飛舄追王喬張圖痛飲信一快更須傳寳留兒曹慶朝非逺卻圖報别當作頌齊崧髙以太湖石響板為季文夀太湖中心洞庭山千巖萬壑髙孱顔風濤舂撞自太古漱成樂石如雕剜玲瓏中空窮變態竒竒怪怪羅滄灣良工巧手琢威鳳片雲承足同飛翻叩之五聲八音足疑有僊風揺珮環月􅀸蜚聲塞宇宙文如九苞瑞世間秖今在治眞若鳳朝陽一鳴聞九闗先從鵷閣掌帝制徑上鸞臺領朝班徳既不衰石不泐祝君遐夀如彭籛次韻章樞宻賦吳彩鸞玉篇文簫躡彩鸞夜半恐不逮山深忽呼名驚喜不得退僊謫無所逃士貧何可耐乃以三生縁遂為二姓配至人與凡夫伉儷豈其輩鬻書以自給細字如玉碎一一存楷法明珠蔑瑕纇初出鶼比翼久若魚同隊終日了韻編心畫無罣礙人間八百本終古知敬愛玉篇尤可珍何必贈雜珮倘邀千黄金雖貧亦當貸摩挲惜見晚老眼看茫昧墨妙饒精神筆勁含姿態次第部居中盤曲法庫内九齡美風度孟博信清裁書拙無合作見此増愧慨尤物難久假雪牕暫相對遺蹤雖已邈眞蹟儼然在輒效西子顰小楷書牘背題太乙宫武林山贈易髙士易居求賦武林山日困塵勞無暫間我求掛冠欲歸去念此詩債須當還武林山出武林水靈隱後山無乃是此山亦復用此名細攷其來真有以天目兩乳到錢塘一山環湖萬龍翔扶輿磅礴擁王氣皇居壯麗環宮牆湖陰一峯如怒猊勢臨城北尤瑰竒吳越大作緇黄廬為穿百井以厭之從來有龍必有珠此雖培塿千山餘中興南渡為行都崇列原廟太乙廬曽因祀事來登眺闤闠塵中有圓嶠薰風時來洗袢暑緑樹陰陰隱殘照我得暫來猶醒心羨君清福住年深長安信美非吾土倦翼惟思歸故林寄題王以道寧蘭墅百卉生深林無人皆自芳楚騷發妙意惟蘭乃能當我欲效潞公賸種坡之陽不須强披拂風來味愈長君乃先為之滋畹雙雁鄉正欲生階庭聚書教諸郎父子自同心久之不聞香老我行西歸一造君子堂勉哉篤義方雙雁看髙翔蕉菴雜言環植巒蕉數十株幻成方丈一屠蘇幾重青蒼兩邊合四壁穿空一物無早凉日薄坐其下爽氣肅颯風來徐此為天下易生物不多嵗月眞可廬王愷謾夸紫歩障石崇安得青珊瑚寓居得地不畝許好事便可傳規模顧余老矣豈久處後來得此自足娛若謂霜雪成摧枯瓊臺瑶室今何如攻媿集卷五
