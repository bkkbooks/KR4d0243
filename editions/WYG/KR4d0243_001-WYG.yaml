front:
  text: 攻媿集卷一
  hash: sha256:0c9b643f977ffb6220f8de22626d208e9714fcdb23e19babfde4f1a0b6e58aad
body:
  text: 宋樓鑰撰古體詩攻媿齋余以攻媿名齋俞致翁惠書謂若無媿可攻者讀之悚然不敢當以謝之聖賢不得見道散固已久學者多自賢鮮肯事師友顚㝠聲利中悔吝皆自取動言無媿怍未知果然否寡過云未能先聖欣善誘凛凛孟氏言幾希異禽獸參乎病知免遂使啟足手寧知起易簀又在此叚後吾儕況小人氣質素凡陋以其所以養孝道亦何有勉前類水馬立處祇如舊倘復不自立其末當愈謬毎思攻所媿扁牓銘座右三誦故人書慙汗幾欲溜夫豈爲戲言知君于我厚因之更加警補過尚无咎謝湖山居士示和陶詩吳給事芾淵明千載人風節仰孤峭豈惟辭督郵蓮社不得召書不求甚解眼髙得𤣥要詩亦本無意但寫胸中妙齊梁紛衆作嘈雜春禽叫稚子候簷隙文通劇捜紹矯矯玉局翁尚友謝浮漂飽喫惠州飯追和欲同調湖山老居士宏才蓋廊廟出入官五紀懐歸自年少屢賡歸來辭吾行有先兆老龍卧林壑年髙徳彌劭向來批勅手甘心事耕釣築室據仙居泉石造深奥亭榭望堂皇蓬萊對圓嶠渉園日成趣遇客酒頻釂巖巖鸞鶴姿炯炯雙眸瞭墮體黜聰明坐忘樂遺照西疇時告春東臯快舒嘯襟期古暗合此事不容詔盡和靖節詩筆走追風驃又如斐旻劍騰空徑投鞘人生嗜欲深山林不供燒何當從公游翛然寧荷蓧小子敢言詩未免事華彯西施難效顰邯鄲恐貽笑思欲焚舊藁世味輕咀嚼稍尋韋蘇州旁引孟貞曜絶去翰墨畦母鑿渾沌竅尚或庶幾焉未暇期速肖送袁和叔尉江陰澄江少日曽經行髙城傍有長江横君山特立江之汀下瞰淮甸一堂平中港引潮深無聲萬頃灌注滋農耕戰國今幾二千齡黄歇此地猶垂名舊以邑屬南蘭陵疲于奔命吏失寧今焉裂地為專城獨當一面行雙旌井市雖小民厚生四十萬緡輸賦征舶商輻凑衆貨贏牒訴簡省官曹清一邑負郭相依憑守宰同僚齊弟兄脈絡貫通易盡情尉職無卑近編氓坐閲是否真權衡傍郡孔道困將迎我乃静趣如郊坰安輿並行人子榮況有海錯供庖烹河肫鰣􅚝鮮不鯹車螯蛤蟹均藜羮夫君傳家有典刑父子知己人一經詩書滿門不慙卿豈羨漢士黄金籯薦口久已徹帝京九萬自此開鵬程平生寒牕照短檠興亡千古無遁形妙年射䇿當彤庭歸領後生為主盟友朋講習誠專精世故多端須飽更京口直下連滄溟官府濶稀行旅驚邉頭久無夕烽青要在彈壓潢池兵簿書期㑹勤經營人物酬應審重輕一言行之可終身謹毋失己毋失人贈人以言豈吾能頗嘗于此三折肱舉以送君君試聼登育王山望海亭瘦藤拄破山頭雲山溪盡處開危亭平田萬頃際大海海無所際空冥冥乾端坤倪悉呈露飛帆去鳥無遺形蓬萊去人似不逺指㸃水上三山青褰裳濡足恐未免倘有飈馭吾當乗是中始覺宇宙大眼力雖窮了無礙雲夢八九不足吞回視塵寰一何隘曽聞芥子納須彌漫説草菴舍法界看我振衣千仞岡笑把毫端捲烟海林景思雪巢四時不皆雪陸居本非巢髙人興寄逺表此一把茅吾非二祖可夜立寒齊腰吾非鳥巢師結廬置樹梢白日照我心不以見晛消兩腳踏實地風雨無漂揺作詩窮益工寒瘦逼島郊落筆句驚人不復尋推敲客至不問誰淡若君子交直氣干霄上不視鄙斗筲富貴頃刻花疇能等幻泡附離如幕燕自謂漆與膠先生閲世熟兀坐山城坳春陽㑹有時豈曰終繫匏錫山寄雄文凛然䜿髪毛我非敢言詩為君聊解嘲題龍眠畫騎射抱毬戲緑楊幾枝插平沙柔梢裊裊隨風斜紅綃去地不及尺錦袍壯士斫鬃射横磨箭鋒滿分靶一箭正截紅綃下前騎長纓抱繡毬後騎射中如星流繡毬飛䃂最難射十中三四稱為優元豐䇿士集英殿金門應奉人方倦日長因過衛士班飛騎如雲人馬健駕幸寳津知有日窮景馳驅欣縱觀龍眠胸中空萬馬駭目洞心千百變追圖大槩寫當時至今想象如親見静中似有叱咤聲墨淡猶疑錦繡眩閒牕撫卷三太息五紀胡塵暗幾甸安得士馬有如此長驅為決單于戰題羅春伯所藏修禊圖序東遊登㑹稽祇見蘭亭不見碑北過中山府欲訪此碑不知處間從故家看墨本如此二者絶難遇曽經耶律氈裹去至今薊北猶知慕時將一二餽北使持歸往往快先覩未知玉石真在否要比江南終近古他日縛取呼韓作編户勒銘歸來過定武只問君王乞此碑打向人間莫論數題孟東野聼琴圖因次其韻誰歟住前溪夜深以琴鳴天髙顥氣肅日斜映疎星橡林助蕭瑟泉聲激琮琤彈者人定佳能使東野聼束帶不立朝遥夜甘空庭龍眠發妙思神交窮杳冥不見彈琴人畫出琴外聲郊寒凛如對作詩太瘦生恨不從之遊撫卷空含情壽安撫伯父東樓徳澤流無窮我公挺生慶所鍾瓊枝玉樹瑩精彩迥然不墮風塵中少年慷慨吐虹氣文彩元不減儕輩胸中妙藴經綸才剸劇裁繁特餘事曽從蓮幕試牛刀舉城但識劉功曹瀾翻薦口動天聼一語便逾華袞襃上方欲革嶺南弊柬才果得吳刺史不妨一勺飲貪泉清徳泠泠今可紀憑軾雍容安七閩列郡合詞稱得人從兹十載秉麾節坐令萬里回陽春洞庭風月瀟湘雨君王無復憂南顧抗章乞得半生閒遥指山家賦歸去廟堂未肯閒宏才大開東閣需公來朝隨召節赴天闕夜馳使馹歸長淮廣陵卧治要汲直金節熒煌照熊軾底用腰纒十萬錢且看身享二千石忽思鱸膾寒菰羮拂衣欲遂鄉闗情視去西陽如脫屣意色蕭然同鬭生畫船重汎西湖上水光山色都恙恙主人管領東風回故園桃李倍清爽六鼇背負三山歸輪囷老檜蒼龍姿了無塵俗敗人意棐儿長物皆瑰竒横岸綸巾披鶴氅神情直出羲皇上塵事到頭曽不聞卧聼歌臺傳緩響百花堂前手自栽興來一杯復一杯人生亦欲自適爾富貴于我何為哉仲春況屬懸弧旦使君亭榭風光煖東君豫借一分春不許芳菲作春殿綺羅香深初肆筵弟兄酬酢盃相傳此時更復借一醉君從何處拌垂蓮五侯貴盛徳未美簪纓不滿髙陽里何如清白傳家風奕世青氈盡朱紫燕居今喜相比隣其如四海須陶鈞羽書鼎來在朝夕何數羔雁徒成羣芙蓉城中有仙室十洲三島環其側此中樂不減商山功成歸作茹芝客送伯舅汪運幹大雅人生自古悲别離别離今日何足悲試問今日行者誰鄞江名族真男兒虬鬚燕頷軀十圍凛凛端有熊豹姿毅然剛立不怒威笑視鼠輩何脂韋州縣小試囊中錐政績今在衆口思姓名通籍黄金閨便泛王儉紅蓮池平時幕府多素尸坐縻公粟遨以嬉只今方當多事時正要名士同驅馳森森百萬虎與貔荷戈分駐淮東西兩淮千里雙使麾幕中僚吏皆耀犀惟公婉畫明蓍龜辯如懸河不可隄胸中武庫深難窺決䇿固有堂上竒朔風吹空黄草齊正恐秋髙胡馬肥萬人相顧目睽睽見公此去多腹非公獨襆被行不疑單車西去征馬嘶平生氣槩衝虹霓恨無尺箠笞羌夷方今天相中興期黠虜戴頭來邉陲顧公速蹈功名機匈奴不滅何家為出門千里何足辭但願滿引金屈巵夜月泛舟姚江秋暑不可耐幾思泛中川晚來興有適溪船偶及門凉月纔上弦平湖可黄昏倚楫縱所如卧看龍泉山長虹跨空濶過之凛生寒坐穩興亦佳夜氣方漫漫草蟲鳴東西飛鳥相與還仰頭數明星垂手揺碧瀾主客惜此景不及攜清樽無酒要不惡徜徉足幽歡幽歡有何好扣舷澹無言送王正言守永嘉江頭潮生江月小暝烟緑暗垂楊道有客扁舟送使君道傍不怕揶揄笑向來一别三換嵗正喜親情得傾倒吏民引領望推麾空有離愁滿懐抱使君讀殘萬巻書古事今事俱了了便應珥筆侍天陛不然代言登鳳沼瀛堧山水久寂寥為屈朱轓來坐嘯帢幘峰髙舊題咏赤城所在經行飽永嘉名郡太守尊靈運後來詩絶少天作雁蕩地為藏蠟屐穿山未曽到改轅卻向箇中去更得江山助詩好齋鈴静處定得句不待池塘夢春草去年海水上平地大風駕浪從天杪蒼生濈濈生魚頭聚落隨波迹如掃今年二麥連野秀田家扶犂事秔稻使君憂國眉不開叱馭徑行仍及早哀哉千里方更生縣官租錢酒力曉縱民自恐上不足誅取何憐下無告邦儲邦本孰輕重肯使疲民困征擾君不見巖巖千古陽道州政拙催科自書攷游龍瑞宫隔山望危石老面凛如鐵路回兩屏開見此髙嵽嵲偉哉名公卿峩冠㑹朝列又如鼓迅霆𤣥雲助擊烈癡雲不作雨空翠襲氷雪野水不知源遶徑幾萬折子長真愛竒萬里探禹穴我家甬水東扁舟輕入越竊此半日閒到處輒清絶傳聞古洞天瓊臺照金闕神仙杳難問一笑山石裂相逢客路中翻手數年别勝地更躋扳莫厭屐齒折三日不得過都泗堰南朝何公棲禹穴嘉遯悠然老髙潔一朝送人都泗埭歸歎此途於此絶我亦何為走塵埃數年不記幾往來船横三日不得度愧想髙風安在哉宿佛日山平生臨平山知誦藕花句輕帆幾來往山色澹如故寧知千萬峯中間著佳趣蕭蕭蒼髯翁為指花城路我來春正濃天寒日將暮雲深鐘唄鳴自喜得勝具緬懐玉局仙老筆掃朝霧玉槊儼相持珠旒竟何所惟餘渥洼水蒼龍角牙露人間翻覆手烈日變烟雨俗子眩炎凉三四錯賦芋道人笑視之萬化隨所寓深坐十笏地一息了千慮箇中誰得知幽鳥背人去求仲抑招逰山歸途遇雨竹輿遶湖濵宿露尚厭浥徑到玉岑下坐久客始集起穿靈石山萬松介而立梅天氣清潤空翠行可挹古藤幾百年枝蔓兩山及見説暮春時花紫光熠熠直疑老潛虬初起夜來蟄俯玩嵗寒泉齒冷不敢吸相將上龍泓塵鞅謝羈􅎗洞有靈獸居臨深心岌岌魚遊明鏡中巨浪無三級寒苔載水去萬頃潤原隰濛濛山雨來歸僕鳥飛急野興殊未已日昃不暇給衝泥上湖船雨陣遽奔襲飄風將急㸃回旋驚四入中流益蕩兀短篷不當笠停篙亦久之怒勢不少戢我徒方嘯歌弗謂改豪習但苦瓶罍罄莫問衣裳濕吳江舟中阿連久已共一被小别愁生夜無寐風帆將我上征途回首江中日千里小舟横卧吳江水夢回依約蕭齋裏五更漏急月黄昏鳥散一聲人未起讀范吏部三髙祠堂記三髙之風天與髙三髙之靈或可招小山以後無此作具區笠澤空寥寥幾從垂虹蕩雙槳寓目滄浪獨怊悵筆端不倒三峡流欲遽招之恐長往前身陶朱今董狐襟抱磊落吞江湖瑰詞三章妙天下大書深刻江之隅我來誦詩凛生氣若有人兮在江水扁舟獨釣膾鱸魚茶竈筆牀歸南里先生同是丘壑人只今方迫功與名謝公捉鼻恐未免便看林藪生風雲他年事業滿彞鼎乞身歸來坐佳境不嫌俗士三斗塵容我漁蓑理烟艇仙都獨峯漢家武徹求神仙方士搤掌多夸言蓬萊隔海不可到屬車徜徉上喬山傳聞黄帝久仙去胡為有石髙巑岏游談不經理欲屈謾言此地藏衣冠縉雲自是仙窟宅萬壑千巖比如櫛突然一石摩青雲造化應勞巨靈擘仙風吹墮碧蓮花玉井半空人不識望之不計幾千尺八柱擎天此其一伯夷制行髙且孤萬世猶能立懦夫英魂凛凛今不死化作此石山之隅横斜轍跡依然在我亦何能窮古初靈壁道傍怪石飽聞兹山産竒石東南寳之如尺璧誰知狼籍亂如麻往往嵌空類鑱刻長安東南萬嵗山捜抉珍怪窮人間汴流一舸載數輩徑上艮嶽増孱顔當時巧匠斵山骨寘之江干髙突兀干戈動地胡塵飛坐使竒材成棄物君不見黄金横帶號神運不數臺城拜三品只今零落荒草中萬古凄凉有遺恨木人漂漂不如土坐閲興亡知幾許行人沈嘆馬不前石雖不言恐能語括蒼溪漲雨餘大溪觸山流氣勢直欲凌沙洲浮梁中分斷螮蝀流沬東去行蛟虬人家嘈嘈避新漲雲稼苒苒添平疇漁翁輕生有如此小艇横絶隨飛鷗石門洞扁舟百里遶城回青山中斷立兩崖清都虎豹隱不見但見閶闔排雲開峯回失喜大飛瀑聲震萬壑驚春雷掀髯目極九霄外玉虹千丈飛空來一冬青女靳天雪不知聚此山之隈傳聞神龍卧其上寳藏擊碎真瓊瑰胸中先自無塵埃到此更覺心崔嵬天風為我噀空翠春水瀉入騷人懐謫仙曽來寫勝句劉郎又為開天台我慙筆無挽牛力醉墨滿壁誰為裁或言龍湫更竒絶鴈山髙處深雲埋我方攜笻往尋訪未知比此何如哉大龍湫北上太行東禹穴鴈蕩山中最竒絶龍湫一派天下無萬衆贊揚同一舌行行路人兩山間踏碎苔㾗屐將折山窮路斷腳力盡始見銀河落雙闕矩羅宴坐看不厭騷人弄詞困捜抉謝公千載有遺恨李杜復生吟不徹我遊石門稱勝地未信此湫真卓越一來氣象大不侔石屏倚天驚鬼設飛泉直自天際來來處益髙聲益烈溟池倒瀉三峡流到此誰能定優劣鴈山佳趣須要領一日盡游神惡䙝驪龍髙卧喚不應自愧筆端無電掣輪囷蕭索湍不怒非霧非煙亦非雪我聞凍雨初霽時噴擊生風散空濶更期雨後再來看净洗一生煩惱熱連雲亭望海中諸山鴈山本在雲海中波濤千古相撞舂泥沙洗盡見山骨巖壑所在皆玲瓏是誰一口汲水盡平地卓立成竒峯至今往往有遺跡相傳渺漭何能窮我乗單車來自東佳處十數一覽空晚登四十九峯頂曠望巨海烟濛濛羣山錯立不知幾朝日照燿天霞紅是間瑰竒定多有鯨波掩蔽深莫通我無太真燃犀法安得一闖馮夷宮㑹聞滄海變成陸卻與鴈山争長雄寄題張法曹瞻雲軒張侯名軒意可知如登太行看雲移我雖未得登軒墀不鄙要我巴人詞爾時膝下遨以嬉欲斵數語語不隨娛侍東嘉樂無涯官舍偪仄親不怡安輿相將甬水湄日日東望勞支頤秋風得檄欣星馳歸拜親下聊信眉官事有程不得違欲去故國行遲遲重來橘柚黄金垂霜著新蟹雙螯肥海魚甘鮮一尺圍欲奉色飬春為期瞻雲之思今同之慨然落筆成新詩人間至樂在庭闈何用自縛㣲官為君方欲解左顧龜我亦日思投檄歸相望百里俱萊衣從他天外閒雲飛次韻翁處度同遊北山兩夫持鎌行我先巧尋徑路其智專我扶枯藤衣短後意氣已出層峯巔何郎鮑叔飽經歴勝處一一手自編我攜舊紀訪陳迹止恐急景不得延徜徉共登青雲梯今日邀我為擊鮮始觀神龜闖青泚上有石壁來飛泉隱蹟遺基平可坐下顧亂石如磨鋋懸崖雙瀑灑空雪來自一握孤雲天郤從下流泝深險﨑嶇直到青潭邉朝陽射光破幽閟斷虹上下遮潺湲傳聞髙山更髙處雅有行路從西偏同行無乃深好事盃酒自犒腳力全誅鋤荆棘窮鳥道欲進不得意愈堅旋呼童僕累危石笑採野菊聊盤旋捫蘿騰身上苔磴往往歡呼爭著鞭側行危歩汗浹背石角或使衣裳褰少焉身在雙瀑上又見髙派衝泓淵自笑泉石成膏盲愛賞不減蟻慕羶巉巖數峯巧遮護妙處二老初無傳脱迹塵埃到此地便覺神思飄飄然回首江南塵一聚城郭歴歴眼欲穿相期更看水流處歩履未倦夸輕翩一上千尺窮山椒碧澗靡迤流蒼烟尋源不能且忘返石猊巍距驚神鐫退求歸徑惘難問藤蘿所在相縈纒我方踟蹰風煙表披披衣袂身欲仙晚歸招提各痛飲讀盡屋壁長短篇截筒環山覧清駛竅出珠穗心亦憐棊枰相與論𤓰葛横琴不妨揮五絃人生易老費扶掖勝具大率須少年伊余歴聘佳山水愛竒切慕太史遷明年炎暑襲故歩與君共枕清流眠遊白石巖我遊仙都觀獨峯轍跡雖在車不通鼎湖望極幾怊悵悵無羽翮凌天風兹來樂成望白石玉甑突兀摩蒼穹人言真人老耼裔鑿開洞府遺仙蹤無人共登青雲梯躋攀伴我惟枯笻縈回約畧三十里踏遍萬疊髙嶐嵸斷崖泠泠落殘雨雙石凛凛亭孤松郤從山椒下谷口石欄屈曲遮碧椶頗疑山髙氣凝凛古來積雪今未融是誰玉斧妙鐫斵仙洞雙闢驚神工巖深白日尚幽閟别有石竅開天聰傳聞峯頭貯清泚苔罅涓滴聲冬瓏奮身便與上虚閣海山錯立烟濛濛腳㡳千山行伏龍手揮五絃俯冥鴻霜林摇落當𤣥冬長嘯一覽萬象空解衣寄宿旦過寮魂夢亦墮氷壺中曉看日出滄海東蠟炬百萬燒天紅眼髙不數鴈蕩雄行田下笑康樂公未能辟糓追仙翁頗亦有意棲琳宫三山不覺去人逺安期羨門宜相從驂鸞駕鶴太多事但欲御氣游無窮約諸公再游龍湫昨暮與君上龍湫天久不雨無湍流笑呼拊掌喚不應悵望頗亦令人愁夜來雷鼓驚龍起溪聲已覺亂人耳莫辭重訪尊者居坐看倒翻三峽水送劉仲起主簿劉郎鸞棲海瀕邑不減向來人性習凛然軀幹即之温語恐傷人中有立論交雖厚笑甘醴御史以嚴無束濕公餘黄卷頻巻舒藝圃工夫日加葺永嘉數多君子僚休沭新盟有清集伯倫忽去誰鯨吸欲挽不留情悒悒君年方盛才有餘逸驥寧容在羈􅎗期君欲蹈功名機塞草連雲朔風急王侍御夀詩使君威名聞四方南牀凛凛凝秋霜使君和氣到甌越幕府初開夜飛雪頗聞此雪近嵗無定知來隨御史車黄堂洗印未多日慶朝況此當懸弧明年豐登日可數父老兒童爭起舞遲明賀版擁譙門試拾歡謡作詩語使君風度神仙人相門出相寧非真妙齡兩科談笑得脱趨嚴召依風雲臺端敢言姦聼聳至今讜論時傳誦踏遍巫山十二峯却尋春草池塘夢人傳使君威稜稜我知威愛元兼行蒼髯如㦸面如鐵惠養自有循良稱髙牙入境紛進謁賔屬庭趨躬磬折民生共喜愛日温吏行獨畏春氷裂向來夔州妙籌邉夷蠻落膽皇靈宣還朝奏課居第一夜半帝席為之前東嘉今為股肱郡小試望之三輔近㑹循故事入三公致君要使登堯舜東風未動春先回梅花照眼歌筵開吏民合詞誦難老一笑千里傳銀杯佳兒恂恂受衣鉢玉樹芝蘭俱秀發江南世胄比長淮更看雲來萃簪笏平生知己今上天敢復作歎寒無氈巴言未足贊公夀載誦峻極崧髙篇鮑清卿病目不赴竹院之集詩寄坐客次韻鮑侯少年老文學藝苑優㳺富耕穫胸中涵養自成趣妙處正恐兒輩覺我慚門巷非尺五字欲問竒誰與㩁開樽竹院望同醉遮眼腦脂何太虐圓圞十客踏雨来相從不負東風約投壺雅歌了無恨秖恨公車一前卻海棠春深照眼明風物融融悟非昨從教雨洗臙脂淡小摘何妨供把握夜䦨燒燭照何睡靚妝如在結綺閣牆頭西望爛蜀錦嫣然一笑無聲樂飛紅㸃地繡作茵正須席地天為幕要知富貴出天姿艷杏夭桃何足録主人小築眞好事肯學區區專一壑洞門不鎖要客來笑君太似羊公鶴雨餘珠淚色慘悽一顧正嫌無伯樂忽驚新詩來叩門妙語天然不煩琢坐中傳觀字欲漫我䜿降幡甘面縛清明已過雨不休雲霧猶屯四山腳揩摩病目不應遲及此紅英半零落枝頭尚有未開花縱已離披亦何惡知君既負西岑遊可使一春終落寞㑹須來此共賦之正要重聞誦新作贈光孝益老光孝長老師益蘇魏公諸孫兄延壽為台州判官别四十餘年一見歡甚林吏部有詩次韻原鴒鴻雁行此理懸諸天萬事可變滅天性難推遷顯庵幼出家潔飲同𤣥蟬一鉢寄西東悠悠經幾年外慕等浮雲百念灰無煙難兄忽相逢觸動歡喜縁光隂信可惜征袂何翩翩叱胥掩簿領来問妙峰禪剌剌道家世客淚如迸泉玉堂與黄閣衣鉢親相傳游宦非為貧不敢替所先老師雖晏坐至情豈唐捐此㑹非偶爾絶倒秋風前手持詩卷來謂予得無言曉以天性語人生要有原嗟哉偽日薄萁荳本同根一旦成讐敵釡中急相煎寧知有佳人芳草夢阿連相見無幾時瞥見魚躍淵固知出世法惜别詎不然又當作大觀勿為愛網牽千山原不隔毋庸對牀眠送王道州九疑之南為舂陵瀟木清駛山為城郡齋正據山直上一覽萬家無遺形家君頃年入蓮幕我不得往空馳情先生分符此中去心旌揺颺隨雙旌先生平生飽文學身上著作承明庭奥篇隱帙亦如響一時自許文章鳴髙辭坐奪造化巧凛凛韶濩聲鏗鏘把麾江海非無意親扶版輿賦南征頗聞楚俗未蘇息糟糠不厭嗟疲氓正資儒術飭吏事拔去强薤摩孩嬰政成環召事未晚天子日夜開延英風流千古三刺史往繼聱叟陽先生毋庸自書追科攷但願寄我舂陵行哭王知幾墓知幾少也爽萬事談笑了自謂頗寡合見我輒傾倒百年能幾見一别迹如掃父子俱埋璧嗚呼何其早向來論文酒和淚傾宿草此意誰復知寤嘆令人老仲舅尚書生朝去年生朝燕稽山館舍朗朗屋百間紅裙合樂飲徹旦坐上衆客皆酡顔今年生朝半歸路竹輿瀟瀟曉衝雨回頭風景非去年當時賔客今何處仕已喜愠曽何分適齊未減楚子文鼻間栩栩固自若世情物態徒紛紛平生知足志閒退歸老鄉關了無悔但欲年年醉西風坐閲人間百千嵗人間萬事日不同尚書人望方顒顒明年舉酒拜公夀安知不在槐庭中送鄭惠叔司封江西提舉君名切斗魁歩武上霄極蓬萊羣玉府圖書照奎壁郎官應列宿寢覺象緯逼胡為作使星烱烱向江國仰奉鶴髮親版輿映萊服昔日紅蓮池帥垣資婉畫方將散餘潤連城被膏澤官𣙜與民繇豐儉煩振糴小試活國手疲氓賴休息便歸侍玉皇拱立香案側富貴殊未已行行上鸞掖君其妙演綸三能看齊色次韻胡元川茉莉花殘暑未盡秋欲來玉刻萬葉瓊英開孤標雅韻一枝足江上紫翠空成堆素娥嘗與明月約青女細把輕綃裁主人好事趂時買買寘此地真宜哉牆間閒地方丈所幾年累甓裝層臺春花秋卉紛互發胡葵芍藥参徘徊眼明忽見此竒絶弟畜素馨兄事梅夜深飛香性幽獨未許蜂蝶來相陪糖甖封餘有閩土㑹須掃取添花栽吾聞閩山千萬本人或視此齊蒿萊何如航海上天闕玉色照映琉璃盃新凉徙倚看不足坐見日影敧庭槐同官登勅局小樓觀雪去年嵗豐登雨暘應時須所欠惟一雪祈禳遍精廬晚亦粗飄瞥六花舞空虚雲氣不待簇風伯隨驅除殘春寒尚深忽見雲糢糊撒鹽壓衡茅晨興粟生膚隨班上廊廟恍若登蓬壺岧嶢宫殿深朱扉黄金鋪百神衛靈居半天散瓊琚又疑守䕶嚴寳網絡明珠参差鴛鴦行簪笏皆沾濡退歸冷局中牕間竹扶疎為思此絶景往往終年無不應憚凌寒閉門守紅爐為君登危樓深盃泛酴酥崔巍瞻吳山莽蒼望西湖瓊枝宿饑鷹玉階走韓盧酒興萬里逺容我歌且呼坐欲斵五言所媿李與蘇君與工屬聨灞橋去騎驢久不作詩喜仲兄遷隣因成長句宦遊各天涯皇州今鴈行官居半里所相過復相望西鄰得老屋往來連戸牕水竹占幽勝風雨對一牀十年短擎燈今夜分餘光兒曹亦可樂洛誦聲洋洋天邊有白雲隨風正飛揚相期奉甘㫖萊衣戲親傍軒冕皆倘來此意可暫忘詩成喜可知且復釂此觴送林宗丞浙東議幕劭先生風骨天與清孤松野鶴何瘦生胷中落落笥五經大篇短章筆縱横壯年文塲諸老驚俯仰世故雙鬢星萬事不理詩自鳴笑視軒冕秋毫輕市者爭利朝爭名著腳往往遭譏評先生四五官神京又復歸去鴻冥冥臺家急賢理不應況復寮舊離觴傾先生自喜行此行禄粟可以號號聲秦望之山髙且平卧龍横亘環州城鏡湖千頃波不興晋宋遺跡多豪英議幕了無塵務縈撫物弔古皆闗情我亦久矣懐滄溟旦夕欲乗緹油屏相望縱復三四程詩筒尚得尋前盟臨海縣治琴堂子賤彈琴真是琴我今無絃知琴心使我不得琴中趣弦以修綆誰知音才術髙低不自由單父二子心則侔後人不得彈琴暇勿以戴星為可羞送石應之司戸歸剡以室邇人逺為韻㨗徑指終南索價譏少室窮達豈無命踏地胡不實之人吏海隅所吐百未一夷途澹無營君其有終吉年來歎離羣磨琢殆無幾資凡學益落駑駘費尺箠羨君富春秋發軔方自邇驊騮更著鞭洗眼日千里南明千古秀慶源久益新剡谿照人清況復屈斯人摻袪不容留椒觴思拜新他年風雪中扁舟倘知津平生企賢心山川恨悠緬寧知日相見懐抱竟不展樽酒了無暇離情果深淺室邇猶許疎況今乃眞逺送王仲矜倅興元蜀道難難于上青天蜀道易易于履平地蜀山天險固自若視難為易在人爾王尊眞有四方志叱馭徑行了無累早登岷峨仕陰城談笑動行千萬里漢中由來説鷄肋意謂棄之為可惜君今此去良似之更欲逺遊尋故迹漢都南鄭啟炎圖秦置石牛山徑闢淮陰拜將餘髙臺武伯葬處空松柏大笑出門何慨慷天涯離愁各盡觴荷君走馬卻送我李侯參語夜未央君方往蹈功名機何止别駕歌王祥先正九年遺愛在更攜故笏訪甘棠仲矜象簡乃參政入蜀時所用巾山兩鼇贔屭隨西行勢欲吸盡西江清是誰繚以千丈城欲去不去豈不靈化為青山鎮東溟首冠窣堵雙崢嶸安輿從東喜逢迎笑指鼇背同來登春殘雨足緑陰成山鳥相和聲咿嚶自從半山經小亭仰望巨石扶軒楹千山萬山擁翠屏陰霾歸静纖雲興翠㣲下有長江横滾滾不盡千古情横軒俯瞰萬瓦平佳處歴歴堪指名雪蓬蹙雲連曲肱蜂房蟻垤棲殘僧扶欄更上三兩層一覽衆物無遺形徙倚未厭茗椀傾長嘯兩腋清風生親顔甚怡輪為停我亦色笑喜不勝願我雙親俱遐齡方瞳鍊顔華髮星如此兩峯相對青沿檄柯山歸别張特秀我昔志學年侍親宦西安弟兄逰庠校見君平生歡君才獨頴出逸駕不可攀夜牕共檠燈春逰合盃盤虚堂卧雪嶺傑閣横雲槃爛柯上危磴烏巨沿溪灣是時氣相髙辨論俱瀾翻一别三十年天街見峩冠殿廬看決科藍袍立清班黄牒墨猶濕大弨力能彎爾來又五載短書能幾番兹焉捧檄來吏牘方挐煩室邇嘆人逺一朝脱籠樊滿意縱劇談痛飲到夜䦨十歩九太息此事亦孔艱進哭老先生畵圖惨青綸特顯顧何爲一昔成大還回思我伯氏人琴有餘嘆感今念疇昔相與涕淚潸故人悵無幾恍如春夢殘有酒不得飲有琴不成彈復歸坐冷屋使我凋朱顔我歸不可遲倚門夢連環君言欲舂糧伴我行路難欲去不得去僧房話閒闗年各幾半百後㑹鬢亦斑何處更有待此心匪石頑羣憂發孤笑屬聨不當慳氣岸有如君著身簿尉間鹽車復長鳴㑹當上天閑掺袪不忍别雨聲為潺潺君有門户責慇懃願加餐次韻沈使君懐浮岡梅花玉人迥立山谷裏不有使君誰與憐毋庸髙牙煞風景為著佳句増孤妍寒溪照影漫千樹横笛吹殘又一年傳聞年後更多發便須躍馬趨平川送王木叔推官分韻得錦字王郎天下士中和自生禀澹然初無營見者輙斂袵幕中資婉畫處事極精審與人如恐傷律已淵氷懔深恐馬駃輿要使鴞食葚一寸憂國心幾年不甘寢此意大未酬退静若已甚使之行所學庶幾人奠枕向來孰閒之未免斯立噤川詠而雲飛賴有東陽沈露章極推轂分韻句裁錦風流有如許不復歎踔踸如君豈蓬蒿人物妙流品才應奉香火為養謀禄廪與君幸𤓰葛心交今十稔豈惟我惜别行道情苒荏紅蓮色何似翠柏風愈凛願君疏藥裹一意䕶茵餁棄鼎寳康瓠浮名如拾瀋行矣無多言臨岐且劇飲彭子復臨海縣齋乾道癸巳冬此邦我經行鬱攸氣未殄千家眞赤城来訪臨海令瓦礫紛縱横翹然二尺髙問是戒石銘徘徊重太息更聞愁嘆聲試詢來者誰共言令姓彭我時語傍人此邑其將興迨予來贅倅客館方暫停夜聞簫鼔沸㕔事先落成起望輪奐美壯觀聳連薨百堵日已作斧斤喜丁丁層樓庋敕書兩廡環中庭久乃逰其間宏大使我驚位置既深穩斵削仍工精田里不知役纎粟無輸征安得屋朗朗突兀有寧馨退食不苟處扁榜皆佳名中虚物自照政平由心平樨柏已可悦況有賢弟兄小亭眞吏隱縣擁髙山青琴堂雖増舊此意宜細評智調天下理夸言笑後生大弦可以急小弦恐弗勝舉意屬俄頃立言如所營手足民無措吏姦意相乗不如疎節目示以信與誠施行有次第幽逺無隱情上下始相應温和亮以清子賤意不傳僅許勝戴星彭令蓋得此所以千里稱此非以政學淵源甚分明行笑解印去衆心已先傾太守薦之朝一鶚飛青冥傍無蚍蟻援日夜思歸耕我無薦賢柄直書氣塡膺安得採詩官取以徹明廷送虞仲房赴潼川漕我來丹丘乗貳車送客往往萬里餘盛山使君别寖久漢中郡丞今寄書公指四明喜鄰境典午何知成畫餅揚旌忽作梓潼行去路六千抑何迥餘杭名家多俊竒君于輩行尤白眉雍容音韻足夷曠百家到手無停披向來郎曹天咫尺引山閩山接商舶賈胡嘆仰清節髙霧中親見越王石此行叱馭不作難手遮西日又長安長安日近公應往未放使星臨蜀山不然一行亦不惡潼川應如錦城樂鄧侯功名凛如在拾遺風采今猶昨流馬木牛諸葛公飛輓正欲修前功蜀民險逺日凋瘵撫摩要令畿甸同況公五絶追鼻祖𨽻古真有兩漢風歸來富貴固未晚為傳此學川西東奉口遇雨七月欲盡八月初天久不雨暑未徂下田焦卷上田槁愁嘆不止田間夫嘔啞水車日夜響漕河揚塵成坦途喜見此溪深且廣𤣥雲忽起西北隅林間槭槭氷漚起兩岸人物歡欲呼未聞滂沛潤龜坼且使萬物聊沾濡船牕飄灑疎篷漏客意自適凉襟裾引身東望雲氣薄未知帝城有此無傳聞今日方奏告便有響應來斯須人家百萬苦炎熇君王齋禱幾月餘君王齋禱幾月餘雲師雨師其疾驅游天台石橋兩龍争欲起深壑觸破山骨成修梁滔滔共出一門去凛凛直落千丈强初疑鞭石跨滄海絶勝乗鵲横銀潢要須髙躡前峯過往叩山中眞寳坊攻媿集巻一
