body:
  text: 攻媿集卷二宋樓鑰撰古體詩史少師賜第賞芍藥分韻得木字帝城有僊山雙徑森萬王洞户入深􅆼突兀見華屋相君領衆客紅藥想芬馥霜刀妙裁翦臙胋㸃氷縠枝弱不勝花翠葉共斜矗向來爭春風桃李媿粗谷百卉紛何在庭樹擁新緑此花丈人行儼立見幽獨相君戴花笑和氣俱可掬人言此花勝相君意傾屬誰知心廣大何物不䝉幅豈以庭中花而肯棄凡木君看擇勝具所可可追逐自言居閒時情話㑹親族一花有可觀爛賞費銀燭此心何揀擇寓意本無欲以此宰天下以此鎮藩服兒童與走卒人人歌相國有能逹此觀春風四時足送錢伯同寺丞守嚴陵嚴陵錢使君丐外得請外府同僚相與飲餞於錢塘之津某病疹弗得預方得請之初某歎曰去年送君來今年送君歸君笑曰此節送行詩也卧病枕上口占去年送君來今年送君歸君善全去就我獨念别離君是忠孝家襲紫傳金龜門户二百年所寄在一夔少年便老蒼况今更險夷不獨妙言語理窟深莫窺健筆照手澤典刑從可知向來御祥琴欲把江海麾促召歸舊班退食方委蛇世事等飄瓦人情嘆然萁向非渾金質百鍊豈不衰浩然賦歸歟潔身而去之為寮曾未幾棄我忽若遺君既棄我去謫僊復追隨陡去二良友撡袪重分岐前别易再㑹後見當何時才具素絶倫涵養日以滋且為牧嚴陵赤手磨瘡痍歸來應不晚青氈當屬誰願君厚自愛嵗寒尚相期送楊嗣勲校書守眉山我生東南陬不識蜀道難觀君眉宇秀想見岷峨山漢廷射䇿時連璧照鴛班伯氏書萬言逸駕不可攀兹焉從君游頗得窺一斑僊凡隔弱水接辭良亦艱矧兹萬里别望望何當還三蘇騎鯨去詞章滿人問豈無後來者遺珠有餘歎願君效樂全飛章逹天闗報國此最急餘事付等閑宜室行見思朝暮當予環别語敢言詩屬聨不容慳送何道夫祕監守潼川妙齡冠蜀士名聲振王畿晚隨召節來天朝增羽儀我昔倅丹邱鹿侯掛冠歸羣公俱祖送見公四三詩頗恨著鞭先自言乞身遲拳拳慕下風直欲夢見之還朝挹髙致氣宇清且竒稱者不容口往往同一詞始見荷傾倒笑談欲忘疲况當秋風髙濫吹叅試闈鼎臠得一嘗豹班容管窺叔度真似道莊生信忘機親疎皆不可況容磷與緇諸生得公來歎曰真吾師叩簾或三請響答了不疑私謂如此人定應備論思胡為歸興勇抗章氣不衰鼓盆萬里外抱孫更成悲擁麾東川去無人留孔戣别懐不自勝别酒聴淋漓他時念老成追風且復西公能重來否此意非吾私送趙子直貳卿帥三山一蹴登從班人胡謂公遲建牙帥七閩人胡為公疑公今第一流志操古與期雨州有遺愛江西憺霜威重來長道山批勅兼瑣闈一片憂國心輾轉中夜思正色抗危言傳誦滿紳綏造膝有啟沃削藁知者誰此心與天通此意上所知所以名愈尊萬口同一詞進用恐不速小卻成歎咨天語自昭然更欲試望之況彼三山重謀帥皆衮衣兹行豈細事報政不待期登門恨最晚臭味忘賤微自慙空惜别不解留孔戣十連終斂惠居中乃其宜試問行道人但知望公歸玉版鮮次陸子亢郎中韻鱘黄不減鯨與鱣迎風鼓鬛噴腥涎漁人不顧浪如山談笑坐致扁舟前不鉤香餌不得去何用大網相索纒揮刀紛紜臠肉骨巨口噞喁誠可憐珍鮓萬甕不論錢頭顱萬里赬行肩星郎日叅玉版禪頗厭蔬食供盤筵尚書親作孟宗寄坐覺匕箸生春妍卻笑多事張茂先光怪異説空十年走筆送僧義沖一氣行太虚流行紛不齊要之本無物洞然無是疑梵志有至言還我未生時燒了似不曾亦有毛僧詞沖師名家子少年習裘箕談吐霏木屑落筆皆珠璣自稱十年來不復念作詩空門坐枯禪綺語知昨非聞之意已消談笑到日西習氣終未盡舊編還自携秀句堪供佛古作力可追愛玩不去手未免成一癡又欲上西湖駐錫來語離我生墮宿業筆硯置藩籬拔擢困胃腎未老神已疲幾欲焚故稿要使清夷君詩既不化作何不等棄之萬事都放下一意控𤣥機語罷復自笑無使髙人知作詩固無用叅禪亦胡為勸人反自蹈此紙何必揮不知兩俱忘他時體體歸催老融墨戲古人惜墨如惜金老融惜墨如惜命濡亳洗盡始輕拂意匠經營極深夐人非求似韻自足物已忘形影猶映地蒸宿霧日未髙雨帯寒烟山欲暝中含太古不盡意筆墨超然絶畦逕畫家安得論三尺身世生縁俱墮甑人言可望不可親夜半叩門寜復聴三生宿契誰得知一見未言心已應巖傾千丈雪散空上有清池開錦鏡意行忽發虎溪笑許作新圖寫幽勝歸尋一紙五十尺傅以礬膠如練淨自知能事難促迫捲送松忩待清興筆端膚寸今何如西抹東塗應畧定何當一日快先睹洗我昏眸十年病獨旦蕈次九五從叔韻朝菌晦朔雖不知食之實冠東南味庾郎二十有七品一見流涎驚絶異擷蔬剪韭皆可却味苦應無夏蟲避大阮哦詩聲未了又索蒸芝今再遺邇來枯枿尚未茁拳拳頗媿臺無餽倘容小摘寄情親㑹見長髪見芹意雪丙午九月才入冬晦日忽驚雪墮空傳聞都城更復早萬官入賀明光宫自從開霽更不雨和氣真似青春濃斗柄插子日丁邜夜煽裂缺鞭雷公從以震霆至三四驚破蟄户紛昆蟲寜知𤣥冥全未究翻手作雲千里同暗牕初聴灑珠雹巽二勝六方施工一日喜見瓦溝積忍寒待伴炯不融二日三日遂盈尺髙潤四海恩無窮古來詩人詠不盡巧思横出昌黎公少時奮筆不肯已老矣䄂手便疎慵兒曹作戲記昨夢舞狻獰踞金雙瞳誰人若欲撩詩思更作玉山髙數峯移將劉义兩氷柱暉映愈覺清心胸見之躍躍忽技養起呵凍筆尋詩筒開門一見天宇濶棄蜺百萬飛長空瓊樓玉宇滿妙畧干林寳樹春玲瓏恨無髙臺三百尺從觀萬象凌空濛固知幻景有變滅一時如入崑閬中僊家俄頃閲塵刦安知此際非神功賸喜年來米價賤便欲扶犁隨老農牆頭濁醪走來過相與痛飲歌年豐少潜兄真率㑹晝錦坊中作真率羣從相過無俗物主人就樹折楊梅醉倒薫風凉拂拂小舟傍城登雉堞坐看白鳥蒼烟沒須臾撑出洞天去傑閣三層髙突兀樽前賦詩貴神速十分鈍似遼天鶻從他銀漏促殘更要見林間紅日出送元聲弟赴水陽監鎮吾翁積徳厚九子官其六不幸失二人孤嫠紛在目三弟尚白丁升沈猶未卜吾人扶門户叅立如鼎足脱死憂患餘偏親須水菽阿連先著鞭去去長江曲弱冠承賞延十載荷衣緑間闗困家食才就五斗粟要知官無卑毫髮當畏肅督耕兩丈圩受輸十萬斛處之誠未易勉㫋直自朂執别動萬感酌酒再三祝吾子素解自涉世要未熟意行須揆理言輕恐招辱王事究一心言玷復三復細行累大徳隂財損陽禄豈惟贈爾言余亦每自恧公餘稍有暇更取故書讀行矣更自愛家聲要人續伯中弟生朝賦荼䕷春日足風雨不知艷陽天桃李俱成塵懶上西湖船春餘忽微和荼䕷發清妍池塘芳草夢況復向阿連中庭月方午密林澹清烟䝉䝉青羅帔粲粲白玉鈿幽歡久不講羣從俱讙然銀燭煩髙燒妃子浴温泉花以酒為名我以杯相傳爛醉不復辭此㑹期明年黄巖令鄭仁叔索委羽洞府詩君不見王君羽化脱尋厄故山至今名落翮又不見烏程野鶴投氅毛佞臣稱瑞民斯勞何如奉林控鶴凌青霄蕩然委羽登山椒青衣出入洞方杳紫氣氤氲風尚飄今君頗似丁令威鶴馭久去雙鳬歸山川良是人民非一新琳宫還舊規黄山父老歌循良誦君詩句游雲房更將山名比堅操百嵗猶能徹骨芳青林郡齋偶休沐驅車出西城依依山水佳瀟瀟松栢聲雪餘春意動新緑生㘭泓行行到青林老眼增雙明主人喜客來倒屣欣逄迎幽居迹甚遐健筆詩方鳴回首幾年别千里搖心旌相見又暌隔此意猶未平不如造齋閣四座酒重傾風流陶彭澤骯髒阮步兵看劍引三尺論文驅六丁緑野秀横檻山寺傍連甍石罅幽泉溢脚底輕雲生詩盟忝予㑹奕道從君爭哦詩谷禽應列炬林雅驚清歎未云足累句忽已成環坐粲十眉舉酒酬三英滿壁灑醉墨歸夢含餘清我方媿此集君欲尋前盟吏鞅才縳我秋風為君行隠清右軍訪文君遁迹入深竹我來尋歔歈人亡但空谷靈龜闖澄潭華宇對我瀑若人今何之尚想舊茅屋吾聞古君子千載守孤獨楚些不可招懐我愴喬木送劉晉父監嶽濟南劉夫子生來逄百罹乃翁負長才宦游至京西時當建炎間宼盜紛不齊轉徙入湘廣一家屢阽危五羊買海舟萬里向鮚埼舟破投永嘉有如鳥擇棲哀哀老治中藁葬山之陲母家在衡陽孤嫠往相依久卧漳濵疾羇窮命如絲事母以孝聞執喪禮無虧廬墓屏葷茹至行徹丹墀有詔寵數蕃得官祗奉祠行年六十二霜髯照龎眉慨然念防墓千里來海涯西山如蓮華古今冢纍纍况此久宿草蕪穢不復治孝思雖甚切冥漠何從催行道為興歎智力無所施有僧幾九齡自言記當時君聞亟叩請東崗指荒墓吾師慕泓公少也從吾師墓中有版識倉猝不暇碑素棺無石槨灰炭周四圍君方感斯言鑚穴從旁窺其言皆可驗自此不知疑惟餘蓋棺木遺骨不堪移斲石表故阡遂塞無窮悲此僧老而壮斗酒如覆巵與君登山椒下上幾如飛竣事才數日溘然不可為孝感人益仰真有神相之君曰某不孝遷奉致失期未得如有失既得滴滴頤嗟我誠寡陋識君顧已遲一朝來短札謂我從此辭皎皎真白駒安得施縶維戴侯舊山長叅語心相知謂余當此時頽風激澆漓世出世間法君方控𤣥機引証即賸語焉用骩骳詞衡陽尚寄書當有鴻鴈歸後㑹𣺌無日為賦古别離王成之給事囿山堂烟雨望麗陽前山羅紫翠照氷挹南明不與巾子對朅來登囿山一覽萬山㑹蓮城山固多此地要為最主人意軒豁物景供曠快山椒湧華屋迴立風埃外一物無遁形所在皆鮮芥清霜肅天壤佳樹隔闤闠俯仰隨取舍左右從盻睞門牆尋故步杖屢許從邁恍然至絶頂更覺宇宙大樽酒屢勸酧棊枰更勝敗秋髙月色皎浮雲了無碍不俟攀僊掌徙手吸溪瀬兹堂極崇敞意若欠深䆳先植易生木徐待松栢兑望逺仍可喜意滿聊自晦無使山下人或得窺外内但恐趣賜環樹藝或不逮先生味斯言一笑相領解吾將飭園丁隨我添醫薈他時遶扶疎吾廬益可愛游初暘谷及白巖重來游僊都止欲訪獨峯寜知一峯外佳境無終窮何處頴川子鏡巖便相逄約我游白巖輕舟借溪翁齋餘尋宿諾秋霽波溶溶清徹見石底鑱刻驚神工昨登初暘谷但見石嵌空兹浮懸崖下萬石森巃嵸上有勝絶地古語留郭公鬼神謹呵䕶雷霆掃塵蹤換船到白巖修篁搖清風縈回進石屋孤竹攅沙蜂洞府僊所閟無由辨西東扣船過巖下數仞如崇墉石趾平如秋竒怪遮蒼穹更尋小蓬萊俯瞰馮夷宫篙師進深窈捫蘿捨枯笻游子非不多無人解從容我因一日留幽尋極山中秋旻快排蕩日暖如春融歸坐獨峯下石影横空濛急呼醽醁清澆此磊磈胸幸有濟勝具未能上金龍為君揮五絃決眥送飛鴻夜游獨峯下峯背正白月舒光峯影横野萬丈强仰之彌髙立卓爾蔽遮星斗摩穹蒼半秋風露清徹骨望望直欲隨風翔歸尋玉虚步松徑月輪正湧門中央送顔希聖尚書守泉南聖朝寳運開虞唐太平天子垂衣裳恢張治具崇儒良孰不願依日月光用之則行舍則藏孔門賢徳遙相望朝望方隆位文昌跬步可到中書堂問公擁麾何太忙公獨三清志益剛俞音一下冥鴻翔行李徑出臨濤翔爭留公戣動朝行公更傴俯不敢當老成全徳真圭璋温如春風嚴如霜栢臺峩豸肅朝綱賢闗之風士氣揚大天小天稱公方五年吏姦葢而彰金華勸講言加詳明主傾聴談皇王盍膺枋除任贊襄名遂身退天所臧明哲保身身更康髙風可仰不可量泉山壤土接臨漳建牙千里開封疆老龍負圖寵煌煌何殊衣錦還故鄉賤子薄宦接王楊曾陪御史臨文場風簾官燭夜未央劇談獨記聲琅琅兹來誤忝尚書郎始尋故步依門牆西風津頭望歸艎輓公不留逺予將兩宫念公未詎忘公雖逺去如在旁庻幾重來上錢塘夾輔大業恢中邦倘有重事須平章陳順之靈壁石硯山陳順之吏部靈壁石硯山中有雙澗低處為硯下米元章題云唐𢎞文館校書李羣玉有詩南唐李重先故物也蔣教授文㑹有詩次韻名畫法書環四壁中有米家真寳石壁峯森聳外澗流他物雖竒敢爭席舊屬半山老僊人佛印乞之如乞鄰阿章有力負之走一時攘取成紛綸此石天然非琢磨是時有水生巖阿至今硯池尚餘潤嵗月既久惜不多幾年徒見士夫説一旦喜看形偃月傍連玉立兩於莬主人照映氷壺澈陳侯之富可敵國會有寳光驚四塞呼童吸盡硯中水更為輕翻玩竒刻不堪回首江南李空唱多愁似春水不如此石千載傳玉砌雕欄等糠粃寳晉得之真不易身後寜知亦輕棄只今傳玩知幾人當日瑣忩空自秘端歙爭名南北部勿向雷門揚布鼓銅臺渴瓦更不須秪合觚稜䕃風雨跋汪季路所藏修禊序永和嵗癸丑羣賢㑹蘭亭流觴各賦詩風流見丹青右軍草禊序文采粲日星選文乃見遺至今恨昭明字畫最得意自言勝平生七傳到永師襲藏過金籯辯才畫祕重名以徹天庭屢詔不肯獻託言墮戎兵妙選蕭御史微服山隂行譎詭殆萬徑徑取歸神京辯才恍如失何異敕六丁文皇好已甚丁寜殉昭陵當時馮趙輩臨寫賜公卿惟此定武本謂出歐率更採擇獨稱善遂以鑴瑤瓊流傳迨五季皆在御寢扄耶律殘石晉睥睨不知名意必希世寳氈裏載輜軿帝羓既北去棄與朽壤并久乃遇知者龕置太守㕔或云政宣間此石歸紹彭又言入内府宣取恐違程焚膏繼知晷拓本手不停疊紙至三四肥瘠遂異形南渡愈難得得者輒相矜我見十數本對之心欲酲汪侯端明子嗜古自弱齡錦囊荷傾倒快覩喜失聲帯流及右天往往字不成而此獨全好䕶持如有靈尤王號愽雅異論誰與評硬黄極摹冩唐人若無稱贗本滿城南𤨏𤨏不足呈猶有婺與撫碔砆近璜珩右軍再三作已覺不稱情心摹且手追安能效筆精響摺固近似形似神不清不如叅其意到手隨縱横況我筆素拙何由望羣英近亦得舊物庻幾窺典型此本更髙勝著語安敢輕孤風邈難繼悵望冥鴻征送劉徳修少卿潼川漕清朝重諍臣選取妙一世矯矯劉御史一鶚勝百鷙顧瞻最有力步武亦嚴毅一生憂國心千古敢言氣氣足充所學文能行其意遇事輒奮發觸邪無顧忌乗驄行且止斂手已知避但思補衮闕何暇為身計獨立當雷霆三進氣彌厲去魯固遲遲出晝豈濡滯上終行其言羣賢挽挽致將輸向潼川寓直尚書祕風裁仰清峻進退審難易伊昔聨周行暌違十餘嵗來為同舍郎愈篤金蘭契洗眼盼騰上寜知攬征袂抗章歎髙絶勇退尤知愧去勿窮日力予環日月冀承君送道鄉硬語吁可畏毋以此自滿當為不止是臨别提斯語少盡交朋誼萬里句同心呉蜀安有異次韻李季章監簿泛湖僊舟共泛滄波去且向蘇公堤下住西風吹就芙容城青鏡閑妝兩呈露皇家家法常儉素宸心但欲乘啇輅離宫别殿無興作天以西湖共一豫吾儕公退得清賞酒醆棊枰不知暮深知夕照戀狎鷗又恐昕朝追振鷺自憐三人鳯凰城嵗月黄塵等閑度湖光正欲捲簾看風色更煩褰幙䕶孤山不見處士廬司馬空尋蘇小墓酒乾人醉歡有餘聨騎還趨湧金路歸路健倒渾不知睡覺燈前裊香霧文人公子真氷玉曾為出遊揮妙句匆匆借韻僅成章敢託尊前鸚鵡賦送楊廷秀祕監赴江東漕平生楊誠齋可仰不可見去年尺一書老忽忽同傳道山故僊伯再上右文殿蓬萊幾清淺筆力愈雄健獨挾風雅輈孰敢當白戰一官定一集流傳殆千巻拙工見大匠有技不敢獻誰持所鬃篇徑掣巖下電誦之百寮上慙汗幾被面公今欲何之江左去乗傅鼻間長栩栩仕已忘欣怨英英日暮雲薦紳極追戀挽公不得留觴豆紛祖餞惟應三山髙須公和江練君王念疇昔臨遣尤繾綣公乎遂來歸密侍清閑燕坐寢淮南謀如彼雪帷見睥睨從容處侵疆歸古汴送曾無玷寺丞守池陽我朝衣冠盛名家數三曾南豐暨頴川後起叅温陵邇來騾川族駸駸著簮纓春風雁塔中叅差見姓名君才素頴出健筆泛縱横江右兩壯縣談笑政已成河陽桃李花武城弦歌聲入朝八九載去擁池陽旌年家有舊好一見意氣傾更因劉御史為君寫先銘去年少省郎君轉為寺丞中都但交謁名紙空毛生惟因候賔廡接膝傾交情分隂尤可惜翻恐到屣迎阿連幸為寮庻幾多合并寜知成勇退拂袖尋歸程秩滿素簡靜不足煩公行要當試盤錯操刀新發硎似聞有劇部或已薦長卿君其少停驂有詔來皇扄劉望之國録惠示文卷次韻為謝君聞三峽江湍流下無底吾聞岷峩山聳秀且千里坤維氣淑靈所産多名士髙文既鑑然特立亦卓爾久慕黄中劉近有貢公喜氣從蜀士問人物定誰比少年負竒節論事如翻水萬里見張胡義激非氣使賢闗遂為寮八尺見英偉諸君皆斂避相與推徳齒惠我春容篇句法叅子美再誦平生言作者真近似戰國信徒勞秦貪不知止漢唐取與守反覆皆造理藩鎮論加詳河朔分鼎峙詞源既淵深浩博渺無涘從今使諸生教育均䝉被論議歸正平辭章掃浮靡古人去已逺時毋分彼此君其挽之回續絃須鳯髓餞李君亮著作守眉山分韻得翠字天下大峨山雄秀盤厚地山雖不在眉所在擁空翠矯矯三蘇公挹此淑靈氣文章垂日星照映蓋一世李侯起廣漢射䇿叩丹陛裒然出羣英東南藹名字來上著作庭行入甘泉侍胡為把一麾西歸尋藥市吾聞此州俗秉法更陳義厚徳坐鎮之近古翻易治君家義槩堂活人百萬計老親懐故山色養謹承志還家萬里餘赴鎮夕可至不作題柱驕豈有晝繡意班班老萊衣人間真樂事忠孝兩無心出處固一致他日上思君命駕當不俟此别諒非久毋庸撡征袂送張定叟尚書鎮襄陽武部尚書張公鎮襄陽士夫莫不惜其去昔韓昌黎送鄭尚書詩韻必以來字祝使成政而來歸疾去而願歸蓋人之至情也而公自受隆委謂邊事非可趣辦願加久任庻有成績憂國而不為身謀聞者壯之某嘗陪郎省餞别分韻得壤字未能措辭繼又隨西蜀諸賢之後始得詳聞臨遣奏請之言被酒夜歸亟述長韻公家忠獻公勲名照穹壤南軒傳聖學後進斗山仰尚書天分髙百聞真朗朗日坐四益堂濡染助涵養小出輒驚世發譽自英蕩兩朝倚才辦三接氶睿奬堂堂尹京手風采漢張敞九街寢桴鼓終朝清訟缿汙流化清溝閙市鋤巨駔鈴齋晝無人士友厚吾黨政成化自行渾笑揮浩穰皇家重閫寄拊髀勞注想頗牧起禁中帝曰汝其往人多惜公去地位切台兩惟公不擇地引義猶慨慷諏度更周詢千里若尋丈再拜受臨遣因得進忠讜邊臣固多事備禦當素講要須久其任百弊隨剗磢願假臣嵗月表裏如指掌人材固不乏第一戒欺罔樸拙勝巧心好佞寜不彊願求忠信士枉植謹誅賞更須寛㘘䇿奏請應如響上問卿何先安靜最為上上憂襄漢間呉楚欠遮障公因論形勢衮衮到遜抗是時晉在洛武昌勢相向是為必爭地南北謹隄防今雖居上游事與古殊狀狂宼縱欲來無處可傳向況今三埵靜皇靈方逺暢與蜀相倚角國勢自爭壯尚期效尺寸才疎意非廣忠肝氣凜凜秋旻足排蕩上喜憂顧寛趣行開玉帳捐金示優寵諭賜煩上相惟公最得士離别俱惘惘薦紳紛祖餞直欲傾家釀賦詩冩胸臆一一成技癢家聲與國事負荷有餘量邊頭十萬兵公臨如挾纊吾聞胡運窮羣酋欲爭長不戢將自焚前轍有狂煬當為不可勝有和謹毋倡千載羊叔子制敵恢天網行將友斯人山川固無恙備成撫機動應煩䕶諸將功髙歸未晚㑹見登弼亮他時名父子繼踵凌烟像送鄭惠叔尚書守建寜十五年前送别詩道山持節向江西今年又見送公别大夭擁麾鎮閩越向來惜别固已深今日撡袪尤動心尚書自是第一人氣義相許披胸襟南宫平表平明入列辟傳聞俱聳立夀皇聖孝冠百王三復髙文天為泣擢處螭㘭寵數新果然百日掌絲綸拭圭修聘稱應變握節不撓威殊鄰直上銀臺尤振職李藩氣槩時批敕嗣皇鋭意新百度筆端真有回天力星辰聴履冠文昌急流勇退驚朝行望之正欲試馮翊長儒寜肯薄淮陽孤拙自憐銷壯志三入修門空負媿薦人不進終不已獨頼當時言有味公在猶歎一居州公去無人為王留公乎行歸佐天子肯休管晏卑微休送蘇夀甫少卿赴潼川漕老坡送江直入海君今歸尋江之源外臺去鄉若不逺為持使節臨潼川君家家世四海聞單于一問驚胡塵歸來便合上清禁胡為日念横峨岷賢哉羣從傳家風夕郎名節世所宗諸卿亦復載清徳况君又似尚書公夀皇念舊久更深聖明親擢傳王音君歸寜能及黔突定應召驛來追尋清獻入蜀携一龜君今數鶴同載歸他時未免蕙帳怨人在西清鶴自飛分韻送孫從之司業使湖南得千字夫君靜而敏十人已則千讀破萬巻書操筆思湧泉古事與今事一一探本源蚤蜚場屋聲作吏志益堅朅來上清班漢庭在在先雍容行必書史館躬槧鉛片言寤明主立使登諫垣拳拳憂國心傾倒十三篇司成天下選歸志已浩然赤日送妻子襆被尋豁船諸生慕陽城欲挽不得専竟持湖南節征袂何翩翩憶昨忝同登于今三十年朝行喜相㑹終恨非官聨請益殊未饜匆匆啟離筵始以長官來來以繡衣還書生素安分豈問卻與前第惟公輩流自應留日邊徳星聚南楚予環當茹連事體有闗繫臨岐欲無言送王恭甫倉部知洋州天清無雲秋氣明好風叢桂傳芳聲乃於此時送君行江空日短難為情蚤從兩川馳大名眉宇瑩徹春壺冰語輒傾倒心地平大篇小篇韶鈞鳴夀皇一見喜不勝璧水邊山照羣英潼川題輿逺有聲痛洗鹽筴疲民醒天子呼來再登瀛典領著作承明庭絶域往陪蘇子卿馬上談笑胡人驚歸來期君侍西清胡為西去謀専城士友重歎君不譍視此進退秋毫輕洋川風物天下稱文翁流詠人載賡當時猶待羣政成君今未到意已傾岢峩大艑秋江澄圖史萬巻鷗與盟殘編㫁軸恐飄零數輩装潢手不停我亦重來預彯纓三日不見鄙吝生況此撡袪將長征欲挽不留鴻冥冥賜環勿憚萬里程江山多助筆縱横黼藻王度扶中興題范寛秋山小景山髙最難圖意足不待大尺楮眇千里長江浸横翠畫家雜雲烟戃恍徒意㑹苟或森三尺便若俗子對此畫格律嚴興寄獨超邁洗眼映牕明妙處乃不昧流泉見原委著屋分向背推車度危橋指路向闗隘輕舟最渺茫浦嶼如有待山稜瘦露骨汀洲横若帶木蔕黄欲脱秋容儼然在霜餘無片雲厯厯數沙界搜尋因力疲欲賦無可奈近山才四寸萬象紛納芥欲識無窮意聳翠更天外江西李君千能能和墨及畫梅艮齋許以三竒而詩非所長也游藝無小大要皆知本原後人率意作終當媿前賢老潘妙對膠法從玉局傳或假季心名空掃干鐙烟補之貌梅花疎瘦仍清妍折枝映月影真態得之天李君信雅尚二者將求全諸公競稱許試之乃誠然江西有詩派皎皎俱成編兹事未易窺屬君尚加鞭分韻送盧國華福建提刑得華字盧侯場屋聲天馬騰渥洼殘膏沾後人竒芬􅄍天葩來踏九陌塵去種河陽花向來再去國盛山建髙牙平生長者譽靜篤語不譁古井絶微波璞玉無纎瑕使星照蜀道惠愛流三巴吏姦賴刮磨民瘼煩搔爬田里誦虚公兒童知國華白首尚郎潛坐曹如如麻翩翩擁軺車去去向合沙朝行惜君去與酒相邀遮共登獅子峯巨石臨唅呀郤來登湖邊野梅訪萌芽老栁掃黄葉枯荷矗寒茄碁枰戰文楸醉㡌欹烏紗倚昔送君行相去萬里賖荷君逺寄書得得來東嘉一見又成别感念成咨嗟羡君徑褰帷往戍不待􅆶先尋上水船何殊泛仙槎作粥喜奉姊上冢仍過家此計正未疎所恨成天涯尚幾或留行船皷毋庸撾題老融畫牛溪烟雨暝烟吹雨冥冥兩牛半渡深清京塵久汚巾履頗思歸濯吾纓慧元畫寒林七賢舊有唐人出游圖謂宋之問王維李白髙適史白岑叅六人多畫七賢不知第七人為誰或云是潘趙遙然未見所據病起坐攻媿齋元公忽作寒林七賢相寄余方夢寐故山見之灑然戲作數語謝之羣賢俱詩豪世代不同處安得寒林中聨鑣睇相語誰歟創妙意臭味無今古吾聞顧陸輩寓意或如許桃李並芙蓉雪中蕉葉吐元師師老融淡墨掃風雨作此寄攻媿歸興渺烟渚舊六今則七未知果誰與我欲從之遊詎敢厠儔侣畫我往執鞭欣為李君御李文綬和所贈老融詩復次韻為謝鄴侯插架書最多筆力雄竒天所命萬人深中深閉門理窟搜尋到幽夐我詩無律如山謳形穢豈㻣珠玉映時時歸入夢故山曳杖松間記投瞑因君佳句撩秋思便欲歸尋舊三徑兼旬足痺不良行況復炎蒸如釡甑夜來一雨洗河漢簷溜涓涓清入㕔晨興剥啄誰叩門乃有同聲喜相應讀之恍若濯清風自覺昏眸怯明鏡伊余何幸㸃班行結交往往多名勝夫君平處顧清新解道澄江如練淨從今我乃得四友不特官梅動詩興推枕裁詩謝髙致扶憊搖毫心靡定舊聞讀檄愈頭風今頼長篇起衰病次韻六和塔秀江亭壁間留題江外叅差列萬山我家深在萬山間好山正不用錢買但要未老身先閑長江比愁終似少江水能回愁不了扁舟何日過西陵鄮山佳處吾歸老跋袁起巖所蔵修褉亭悵望當時真蹟臨慕所在支分千載但稱合作誰能有感斯文定本為世第一此又在定定前今日錦標玉軸向來不直一錢送陳君舉舍人東歸皇天生人物千載非偶然冲和兼萬人始得一美賢夫君乃其人人一已百千飛黄欲追風況復勤著鞭文陣蚤奔放氣欲摩青天短褐東海濵名貫斗牛躔聞道更獨蚤自言若墜淵出登龍虎榜徑上鵷鷺聨中間幾流落清湘窮泝沿自首始為郎一見意已傳登臨上麟臺授簡游兔園擢為柱下史遂居紫㣲垣去天真尺五朝綱頼扶顛龍樓闕問寢萬口爭進言惟君最湧決螭頭屢直前危言破人膽三進加勤拳天髙聴亦髙歸决何翩翩髙風激頽波同列空慚顔君雖未必去一去勝九遷我欲留孔戣有懐不得專况我自欲去何心挽歸船嗟我生何為與君幸齊年先後才九日相與同氣然幾年若契闊班心忽差肩判花同代庖君思如湧泉上房草數制一房時一篇一篇輒髙妙隗始媿余先春秋隠公傳國史建隆編周官授大㫖所得俱未全聚散不可料餞别滄江邊君將處於陵我耕綿上田君行無疾驅中途恐傳宣不然遂能别孤㠶渺風烟夢魂不可制隨君墮中川次韻趙子野石城釣月圖石城江頭可憐月曾照六朝清夜獵古往今來知幾何長江衮衮蕭蕭葉謫僊去後詩盟寒王孫詩瘦清欒欒詩情浩蕩坐無奈扁舟笑把磻溪笑江平風輕波瑟瑟宿靄巻空天一色東風吹句入長安一巻風流坐中得初得神意清再讀胷次平回顧明月秪如故世上興廢徒分更想君一葉方掀舞夜靜水寒誰與語船頭有酒且孤斟莫向金陵重懐古戍溪道中寒潮髙于埭黄流濯西河人牛俱力壯相與衝流過潮落勢回禦轉櫂依丘阿暮靄起平楚隂雲翳寒莎夜分潮復上櫓聲相擊摩大江𣺌無津不知身在何餘生一虚舟兀然聴風波吾親白雲下況爾方卧疴逺遊非吾事歸矣毋蹉跎哭表弟汪去偽墓内弟幼而敏抗志欲決科一行試曹掾吏才猶患多謂當為時用舌在如命何通籍已難阻入幕終蹉跎我生依外家侵尋閲羲娥視君如同氣竹馬聲相和少長聨硯席詞場深琢磨相期到晚嵗杖履俱婆娑寜知五年别君隨東逝波憶同戍溪行我馬君乘驘馬駑費十駕驘俊已倍過重來意慘愴樹擁山嵯峩嗟君父與兄相望空山阿宿草埋白璧寒風撼林柯沈吟痛疇昔有淚如懸河次韻蔣徳要三徑居山或稱囚得閑乃賦謫我方樂靜退來作三徑客西山致朝爽膏肓在泉石況當秋空靜萬里看一碧呉叅議逹觀齋君不見大鵬與鷽鳩自適俱是逍遙遊又不見大椿視朝􅌲一修一短終期盡況乎秋毫為大泰山小莫夀殤子彭為天漆園老子超衆作立論雖竒定非矯鳬脛從短鶴脛長蠻觸亦能成戰場譽堯非桀兩置之讀書博簺俱亡羊世人顛倒名利途躋攀分寸爭錙銖河伯猶驚北海若井蛙醯雞何足誅試同萬衆走城市躍馬途行分賤貴卻登髙處望塵中但見紛紛如聚蟻暫髙猶爾況真髙神遊八表非矜豪寜能髙舉去人世勿以役役隨滔滔是知逹人有大觀蝶夢為周聊自玩翛然無入不自得處若終身仕成漫呉侯晚到東海濵飽諳世故無戚欣相逄一笑成莫逆似知我亦個中人送姜子謙丞於潛處則有超蓮出則將哦松眉宇無一塵出處皆雍容君看妙蓮花本出汙泥中兩松痛掃溉下有簿書叢汙潔無二致喧寂本亦同於潛今畿邑蜀道里通通至今存古意民風尚醇醲一邑既當問尤宜撫疲癃藍田文最髙後學仰韓公彼言蓋有激昩者但稱工成案漫不省丞哉豈真聾姜氏太嶽後夷門慕家風教子延名師列碑多儒宗宫庠既開荒書種慶所鍾換桂雙枝秀益見筆硯功後生日加勉衣鉢傳無窮君才有餘刃壯行氣方充功名此椎輪勁翮看摩空我歸幸同社棊酒時相從尊前不忍别吟愁夕陽春我家老揚州五記有遺蹤向來耕織圖為煩訪溪翁送從弟叔韶尉東陽阿連少也爽孤立生氣燄壯年淬詞鋒傾心事鉛槧膠庠困虀鹽世科終穏占再興蘭桂堂爾祖真不忝況將尉東白士友尚歆豔惟我愛子深老矣猶不厭固知為子喜頗亦動吾念贈子當以言苦口當針砭此邑子舊游厯厯數行店棠隂見郎君遺老喜窺覘其民最服義情偽靡容掩莫恃彩棒威要使慕巾墊子文多立就詞采更華贍吾聞得雋者塞門差反坫前賢最加謹臨用更重檢他時可待取天庭得錦吾家有素風耳目久濡染毋庸慕豪舉助亷先以儉湎酒更宜戒平地有深塹酣暢當有時勿習盃瀲灧將論毋過髙斯言卻防玷立節毋務竒躐等恐成僣外物思過分檢身但多欠勿嫌一尉卑封清尚為傔仕途固嶮巘大要進以漸不須若求知真知奏應剡向來湖海豪四十可收斂寜為處囊錐莫作露刃劍匆匆撡袪别魚鮮酒方釅刮目待子歸罔俾吾言驗攻媿集巻二
