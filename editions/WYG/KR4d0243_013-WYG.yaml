body:
  text: 攻媿集巻十三宋樓鑰撰今體詩陳文懿公居仁輓詞衆口推文伯何人識吏師義襟惟古有心地只天知至死終無玷平生本不欺在公無可憾猶恨哲人萎珍館徑歸鄞人猶望秉鈞郵傳千里訃哀動五州民躃踊森賢嗣攀號感路人公乎不忘矣衮衮看簪紳宅相惟公乆伊余忝後塵十年追桂籍兩禁踵詞臣接武參吾舅承顔奉老親幸成三學士何意失斯人一别屢經嵗歸舟已及門方期情話悦空訝語音存善行傳千載蕪詞愧九原傷心歌楚些無地可招魂邱文定公崈輓詞謀國規模闊絶人才具高三朝千載遇四海一身勞儒將通鴛序樞庭握豹韜皇家資柱石天遽奪伊臯初擬文翁化誰知懷逺圖廟謨專制閫世將易兵符養虎竟遺患斷蛇由不殊寧同死諸葛空恨失吞呉處事拘攣外鋤姦談笑中幾年亡主將全蜀頼明公畏愛盾衰日清和夷恵風屢書終不盡詩意亦何窮王文忠公十朋輓詞夙負敢言氣輸忠不愛身劉蕡仍遇主綺季更憂民治行真循吏風稜古諍臣搢紳千載恨不得究經綸梁木今其壞誰能問大鈞恩深兩宫賻哀慟四州民已矣天人䇿傷哉社稷臣吾生良可恥不及見斯人婁忠簡公機輓詞壯嵗志先定耆年氣不衰治高為縣日名重佐州時雅望登朝著忠言徹帝墀亨途日千里闊步不容遲邊事釁初開惟公論不囘深謀比婁敬極力阻王恢兒戲何堪用冰山忽已摧朝廷始更化大老盍歸來共政三年乆蜚英四海尊色詞無假借風裁弭囂喧但欲持公道寧容啓幸門經綸終未究猶有典型存寮寀侍儲闈如公乆任稀載欣啇皓起終惜漢疏歸問字煩參訂談經頼發輝一書真總要星日重光輝得姓共東樓同朝兩故侯文編叨二序誕日頌千秋老矣俱宜去公乎不少留來書墨猶濕展讀淚空流程文簡公大昌輓詞仕宦接王楊諸公嘆老蒼門生多紫禁子舍屢黄堂自得垂車樂誰傳郤老方桃花千樹滿空憶舊劉郎徐邈今非介申棖焉得剛立朝無附麗受謫更芬香戲綵衣冠盛圍棊日月長典刑今已矣無復巋靈光持論真遺直操心本至公贏貲寧市寵平㓂不言功光禄文階峻嘉興色養豐誰能死生際猶得教之忠晚出荷公知登門未覺遲通班依漢橐試郡守蕭規藻翰猶頻寄宫牆不再窺新阡何處是西望不勝悲林正惠公大中輓詞愛直趙清獻忠文范景仁累朝推舊徳今日見斯人正色欲劘上敢言寧顧身紫樞方大用惜不究經綸去國名逾重還朝道益尊清虚懷骨鯁嚴冷帶春温公綽真無欲臧孫尚立言騎箕雖永隔精爽儼如存凛凛古循吏堂堂真巨公死生忘度外邪正炯胸中憂世心誠切籌邊事已空龜潭山下水流淚與無窮觀文殿學士陳公騤輓詞台嶽鍾神秀居然社稷臣海涵書萬巻魁冠數千人南服頻懷綬西垣屢演綸惜哉真漢相不遂秉洪鈞幾見衣冠偉終聞羽翼成先皇崇舊學大政任名卿神器親傳授崇朝再太平功成身自退寵利一毫輕朝著登門乆詞林辱眷深代言稱據古議禮許同心去國臨歸路還家寄好音病中聞訃告老淚動盈襟觀文殿學士趙公彦逾輓詞千古盛周宗皇朝實比隆謂多擔貴爵誰見立王功一語國先定寸心天與通龍飛稽事實信史詔無窮授受唐虞際從容平勃間宗英誰柄用人望屬橰閒晚侍經闈讀寖登秘殿班帝鄉留不住歸去老湖山麾節稱循吏三朝藹政聲治如黄霸最心慕伯夷清諸道俱遺愛兩川尤著名起家臨制閫更羡錦衣榮聴履領簪纓忠言徹帝城公方扶日月我亦寄雷霆憂世形辭色卧家存典刑靈光更陳迹楚些不堪聴端明殿學士汪公應辰輓詞制閫詩書帥公朝侍從臣身能全進退人可得疎親曵履聲猶在持衡迹遂陳從今幾百載更復見斯人蚤嵗聲名大婆娑始遇時難兄屏隔坐令子桂芳枝人望還為用天胡不憗遺成蹊堪喻大墮淚不湏碑道學不盡試功名秖緒餘立朝惟正色薦士有遺書百贖嗟無及九京誰與居莫酬推轂意哀淚濕巾裾端明殿學士張公枃輓詞枃舊訛杓今據宋史本傳改正籍甚張京兆精神滿腹中才高觧牛刃手敏運斤風河滸恩波逺廛間狡穴空章臺舊時栁無復映金英略古無對外庸今最良衆方期共政人已難云亡不聴尚書履猶懷太守章匡廬星忽墮丹旐裊清湘昔幸參朝列于公更有連規橅恢世界風義薄雲天送别詩猶在貽書墨尚鮮偉人無復見惟務寶青氈仲舅敷文閣學士汪公輓詞籍甚牢之舅難追宅相風惟公能愛我獨我最知公潭府書無繼西州事已空形容盡心力庶或慰幽宫外氏桂成叢諸甥長養中名稱無酷似宦達偶相同澹室既長徃適齋俄考終絶憐三學士只賸一衰翁樞密謝公廊然輓詞臣主一意合風雲平地生立朝專論諫為國總樞衡行矣登三事悲哉奠兩楹輟瓜恩意重終始備哀榮千古台山秀名流列雁行惟公登政路一旦破天荒故里空華屋佳城映夕陽送車無路到東望淚浪浪尚書尤公袤輓詞敏甚五行下毫釐恥不知千人揮筆陣萬巻納湏彌有夏傳追蠡先秦拾斷碑鄴侯書插架分付稱家兒憂國言多切囘天力有餘衆推真學士上念老尚書直道終難進高懷只遂初梁溪釣游處此意竟何如舊學方登用公來領從臣末光依日月聴履上星辰共政將圖舊騰章屢乞身甘盤終罔顯雨露未霑新北面願師承東臺拜老成忘年容末坐叙契若平生風月吟千首雷霆寄一名送車無路到寒涕為君傾尚書湯公碩輓詞先正真良弼彤墀四拜麻決科承奕世摛藻擅傳家禁路優持槖侯藩幾建牙相門宜出相恨不見隄沙秦邸崇先契周旋古括州殿庭觀唱第海郡繼承流方快飛騰上俄聞汗漫遊鳯凰山下路丹旆想悠悠尚書張公抑輓詞文靖饒風度高皇記曲江賢孫真是似才氣號無雙幾見持英蕩終看擁碧幢誠齋主詩社到此亦心降撫字推循吏論思領從班宏才名北闕高興屬東山同嵗叨崇篤比鄰足徃還舊遊成昨夢哀涕不勝潸商侍郎飛卿輓詞矯矯真御史風生白筆端出持膚使節始著侍臣冠給饟鬢先雪籌邊心為寒天乎驚玉折不及上金鑾所至仁聲著甘棠幾去思敬姜嗟哭子伯道痛無兒郎省傷連璧文闈見刻辭邊民紛墮淚忍讀峴山碑顔侍郎度輓詞宴坐勿菴上睎顔亦是顔平心真似水立説信如山屢擁皇華節重登清禁班始終無玷闕風裁許誰攀禄養嗟何及朝朝飯一僧移忠躬蹇蹇錫類日烝烝報政優呉郡知賢仰阜陵清忠與公恕餘慶啓昆仍贅倅丹邱日眼看康濟泉同朝叨奬與侍坐得周旋妙畫多傳寶遺文合細編典刑今已矣西望涕潸然曾侍郎炎輓詞文獻南豐裔源流曲阜公巖巖雙法從凛凛舊家風金玉方交映人琴忽併空平生心地直流慶尚無窮紫陌尋春日惟公最少年鱣堂慚隗始熊軾媿盧前寄我書猶濕思君迹遽仙同登今有幾揮淚撫遺編少保李公孝友輓詞戚閈疏恩厚勲門積慶餘弓彎飛將臂架插鄴侯書六纛秦官重三槐漢相如惜哉終半日聞者為欷歔錢殿撰佃輓詞雋譽蜚庠校孤忠動冕旒救荒心欲斷憂國鬢先秋惠滿長江水風清八詠樓禁途交一臂人物等閒休枌社歸來晚翛然得故吾哦詩頻刻燭㸃易細研朱有淚悲連璧無階奠束芻名門餘慶逺丹穴看竒雛趙待制粹中輓詞明主晝三接清班嵗九遷一居周柱史徑入漢甘泉批敕嚴東省掄材上小天平生經國志惜不冠貂蟬詩近劉賓客手追歐率更雙旌古良吏萬巻老書生世諦浮雲薄生縁曉夢驚吁嗟東向議何日遂施行半世誰知已登門意氣傾交情忘父行文㑹忝余盟持論先忠厚談經嘆老成幽光誰為發落筆淚縱横呉待制博古輓詞御史再乘驄忠言沃帝聰處心平似水疾惡迅如風遇合嘆何晚論思信有功惜哉辛佐治竟不到三公三仕入儲闈堂堂來日飛初同四皓起終作二疏歸冰玉清班近衣冠盛事稀聞君忽仙去西望是耶非東甬預賓興文闈頼主盟菲葑無下體衣鉢有門生劍佩今何處樽罍空復情自慙無報所老淚為君傾楊待制王休輓詞望重威無怒仁深勇有餘百年憂國志滿篋薦賢書徳政不勝載才猷未盡攄佳兒人物似真可大門閭蜀道名天險馳驅敢憚勞劒頭懸六印夢裏益三刀漢殿聫簪橐燕山擁節旄惜哉覘國意不得試龍韜蜀用東南彦皇家屬意深貳卿頻報政上相最知心泛宅俱杭葦同朝擬斷金廟廊期引類疾病兩侵尋事契因同薦交情晚益親半生文㑹少萬里宦游頻别後書猶濕歸來迹遽陳何能發潛徳空有淚霑巾許待制尹輓詞蚤擅文章價名公屢品題碑銘摹諫省邱壑訪愚溪得句追飛兔摛毫走怒猊遺編聞好在後學仰筌蹄十載更麾節陽春萬里同時時逢蜀士一一話文翁到處留遺愛諸郎守教忠慶源知未艾徃日有隂功陳秘撰舉善輓詞陳氏多名徳兹來慕典刑宫端驚宿草謂邦彦也邦彦名良翰官太子詹事諡獻肅宋史有傳秘撰又泉扄自古有遺直祗今誰獨醒蒼蒼何可問耆舊日凋零跬步不忘孝掇皮皆是真移忠思致主務實見臨民三諫言猶炳平生迹遽陳清風凛衰俗自足盪秋旻王給事信輓詞主眷逢千載龍光傾一時銓曹著官簿禁掖粲英詞論議推東省威聲憺北夷平生經世意懷巻竟何之宦學素稱豪仍聞吏事高精神雖腹滿撫字亦心勞藩輔連三組沈疴見二毛胡牀庾樓在殘月墮江臯余給事崇龜輓詞烏府仍螭陛銀臺更掖垣事幾無弗論外似不能言厚徳鎮浮薄平心剸劇煩用才殊未盡無地可招魂桂籍兄聫弟蘭階子克家上恩嘉踵武京秩為增華朝著蒙傾葢綸闈覩判花遽成千古别南望想悲笳史敷文彌正輓詞八行諸孫盛三公嗣子賢連収四鶚薦秪欠一書氈郎省刑章肅侯邦政譽傳平生憂國意齎志入重泉學問源流逺樂哉賢父兄人琴亡舊曲風木愴寒聲深痛幾成毁沈疴汔喪心孝恭無可憾猶得傍佳城少小相從乆自慙䳄甲辰交情日加厚姻好晚逾親别去驚葭律歸來見棘人西莊行樂地望斷為沾巾袁府君文輓詞家學傳三世几間無二書力行真勇猛進取故舒徐前輩多遺墨先人祗故廬後來窺甕牖袁文字質甫有雜著一編名曰甕牖閒評志士為欷歔坦坦幽人履恂恂長者言憂時見顔色樂道竟邱園隱行推同氣高賢萃一門四明耆舊傳他日數諸袁周路分良臣輓詞蚤負功名志從戎豈素心治軍先肅靖游藝亦精深湖海開豪氣雲天廓義襟高門尚餘慶蘭玉正森森台嶺論交契天街惜别離飛書能幾到埋璧遽成悲舊識歸樵句在丹邱時探梅浮江李使君有樵字韻詩公和篇最工云郤從谷口問歸樵愁看結局詩紫髯無復夢空有淚交頤趙左司鞏輓詞行誼高餘子文章自一家嶽神均客禮敵國歎才華直節曾無苦全瑜更不瑕儒流有遺恨不見草黄麻淮甸爭錢幣䕫城辦戍兵詔歸南郡近公去北門輕避寵若將凂求閒竟不成亦期無適莫一笑老於行許國終無撓居家不願餘深䝉明主眷未覺故人踈高論三千牘隂功四一書佳兒承積慶端可大門閭鄉貢早馳譽郎潛方比肩求仙容我學成佛嘆君先天癸年將暮金丹語未圓忽傳長别偈天闊㪚雲烟王提刑正功輓詞亷白真家法原由金紫賢兄辭嶺南賻弟郤豐陽錢築屋吾將老藏書手自編老成俄已矣聞者為潜然籍甚青箱學醇乎赤子心片言皆可復一偽不容侵處事幾游刃論交欲斷金諸郎傳素業桂子看成林二廣外臺首威棱著一門志期諸郡肅忍見匹夫寃奮擊猶鷹鷙興讒有兔爰投閒了無限此意與誰論伯仲三珠樹優為一世才人琴先起恨金玉遂俱推南阮方深痛阿連尤可哀桃花源上路老眼更堪開王大卿正已輓詞少壯節先著年侵氣不衰忠雖由父教清亦畏人知處世無求合安時竟數竒甘泉人物㑹一老漢空遺麾節東南半澄清冠一時權輿周翰傳頂踵阜陵知自謂二宜去人稱三不欺巻懷終未盡流慶稱家兒圖史但環堵江湖幾問津雖多暮年樂誰忍半年貧海内清名滿毫端秀句新風流嗟頓盡晉韻更何人老去王摩詰歸來道更全賸添天美禄真得地行仙日欲增三徑君胡欠百年桃源不無路重上慘風煙劉吏部俁輓詞總角異羣兒庭趨蚤學詩一鳴登桂籍百里静潢池所至清民瘼平生號吏師郎闈方進用何乃棄明時剸劇最雲間題輿上越山洞庭王澤逺庾嶺使星還中道趨臺治名曹切近班隂功多及物陽報看循環誰擾奚山衆焚林獸已窮徙新能逺慮下瀬得深功南嶠肩隨息中朝論愈公但知分謗喜寧肯自論功兄長與慈恩相親色笑温公方持使節余忝代王言共約遊三徑俄悲作九原佳城隔風浪丹旐愴飛翻朱南劍輓詞再世文章伯三朝侍從臣傳家推篤學遊宦肯謀身别駕歌章水甘棠想劍津虚堂兩遺像誰不倍傷神朔望第一客廵寮意更親有詩欣和韻不飲喜娛賓名帖藏中古珍茶試早春據鞌猶矍鑠何遽迹成陳棊戰乆不對詩盟亦寖寒方期㑹真率乃爾變悲歡嵗晚本無憾情深忍那看佳城何處是東望淚汍瀾石南康􅗐輓詞挺挺石可轉恂恂意不勝平生憂國志長夜讀書燈大易窺三古中庸進百能惜哉天不憗無復見川增家有春秋學淵源更得師風高葢公舍淚落蔡邕碑官早終難進才全竟弗施遺編屬賢子孝謹不應衰伊昔為君御儒流頼主盟執經容後進傾葢若平生坐見埋黄壤空勞望赤城友朋相與泣反袂不勝情鄭華文若容輓詞蚤擅春秋學賢關第一流少公清澤國贊府著神州試邑人交薦還朝譽更優如何急流退不使上瀛洲籍甚柯山政兒意識貴温本集有賀鄭貴温寺丞直華文閣致仕詩貴温當是若容之字歡謠聞魏闕殊寵鎮呉門就養家傳子休官澤及孫吾鄉耆舊傳千載徳彌尊兄弟忝同登論交最有情頺波知勁節徹㡳嘆真清正爾尋姻好胡然喪老成抱疴難執紼揮淚望佳城袁通判章輓詞大道知如路一心長似齋耄期稱不倦胷次樂無涯孝謹古難及友恭人自懷無瑕夜光璧黄壤痛深埋盛徳不容贊多言可奈何大圭原不琢古井竟無波前輩苦凋謝後生誰琢磨同庚適齋老託體共山阿僅有一區宅曾無二頃田相過惟載酒至老不言錢幾得拜狀下何堪哭道邊門人多著籍下馬向新阡張工部季樗輓詞忠簡傳清白家聲屬弟晜惟公殿諸老積善見多遜兩桂昌書種雙椿藹慶門夀終無可憾况有典刑存壯嵗登郎省旌麾歴五州仁聲號循吏治行最諸侯憂國言多切籌邉慮更周積薪無恨望終老得夷猶敕局同寅舊雌堂屢肯過故人今有幾朝士更無多問信書猶濕相望鬢已皤忽聞埋璧痛薤露不成歌高端叔元之輓詞百氏極旁搜潛心老不休鄰光時自照簞食誰堪憂弟子多藍綬先生竟白頭凄凉數間屋知我獨春秋鐵石賦梅花閒情白玉瑕兩公終磊落千載敢喧譁清節成瑰偉浮詞尚孽芽君看死生際不見一毫差滿巻變離騷歐公一素袍豈惟將厚意要使匄殘膏宿草成千古生芻為一號雖無韓子誄貞曜本來高趙提刑子濛輓詞毓秀從天派旴衡動至尊使星方炳燿卿月遽侵昬已矣悲呉館誰歟䕶北門慶源流未艾文獻靄諸孫處事才游刃論文辯粲花英姿凛熊豹健筆走龍蛇持橐身終外垂車夢到家平原花木在愁絶舊生涯客授早登龍襟期一笑同門清心似水論正氣如虹近問書猶濕重來跡遂空無因送丹旐老淚灑西風李撫州庚輓詞與物初無忤臺評反謂傾麾符成漫仕林壑寄平生跪履嗟何晚揮犀空復情天台隔風浪無地拜佳城李下真無徑門前可設羅詩如翰林逸書似鄴侯多竒字今誰問遺編尚不磨從來好哀輓薤露忍興歌蚤嵗文聲振長沙見賈生積薪看晚輩推轂致名卿子舍真連璧生涯付短擎風流今李漢極口贊氷清張欽州舟之輓詞少誦東牕句從君見典型義襟希竇十才刃比庖丁古鏡悲鸞偶寒原愴脊鴒恂恂守家法蘭玉滿階庭姻好自諸馮東狀取阿戎平時深念我晚嵗忍銘公書字今猶濕心期誰與同回頭三十載灑涕向西風錢江隂佖輓詞庾嶺梅花暖賢侯恵愛深精神雖滿腹撫字亦勞心九轉竟難遇二毛何處侵傷哉東逝水無復大江隂前知南安軍移知江隂客授向東甌君為郡督郵豈惟寮契篤更喜吏才優每歎頻年别俄驚一夢休虞山𣺌何許淚落不能收李刪定叔益輓詞積善務增厚求名惟恐多白圭寧有玷古井竟無波議法資修定監州極撫摩佳兒傳素業留眼看巍科冰玉心相照誰云内舉私深居無浪出清節畏人知尚憶紫芝宇無慙有道碑填空雨黄葉西望不勝悲樊運使光逺輓詞科目公餘事南宫第一人七閩新使節三署舊儒臣倦拜方辭餽哀良莫贖身家聲知有繼仙桂兩枝春模浦云亡後斯文付此賢命其隨道喪學又絶心傳河洛湮來派西州憶舊縁傷心耆老盡揮淚對霜天丁寺丞允元輓詞家世傳經術膠庠藹雋聲上方思舊學公乃擅專城滁上功尤著潮陽政愈明哀哉鍔流水猶觧不平鳴嚴冷不可向其中實曠然行藏暌素志燕樂了餘年鶴化人何處鸞孤影自憐才高不盡用流慶尚綿綿曹工部耜輓詞箕潁文章士儀同社稷功惟公承慶裔有意振家風祠禄真崇道郎潛嘆老馮傷心循吏手齎志九原中宦達推公早丁年備皂衣幾為銅虎去終向石橋歸齊國世臣少貞元朝士稀松風談笑地囘首倍歔欷范致政錞輓詞義俠乆無迹吾鄉見此翁紫㣲欣税駕飛將許同功銀茜聫恩渥金蘭藹義風雖增嬴博恨猶喜桂成叢酒後昇平曲閒中安樂窩千金曾累致一醉竟無何老驥志空在孤鸞悲亦多相望纔嵗許託體共山阿梁審計季琦輓詞壯嵗嶄頭角夷途試著鞭羣公争倒屣諸老亦忘年論議傾朝譽功名短世縁神傷賢伯仲風雨夜無眠壽夭固難問吁嗟不忍言嬰啼摧玉樹衰淚灑芳萱事契深羣從英才愴九原悲吟慙楚些無地與招魂吕從徳晝問輓詞剸劇推才刃臨機妙斵輪傳家得清白滿腹是精神未上金閨籍空留花縣春善人陽報在蘭玉正詵詵回首情親處相過瀨水陽十年能幾見一疾痛云亡縣郭山空秀家園橘自霜主人今已矣鷗鷺亦凄凉王縣尉彦正輓詞幹蠱恢才刃誰能貨殖私人皆競毫髪我獨破藩籬風雨空殘夢池臺愴昔時板輿臨穴處行道亦興悲潤屋公餘事能為人所難蓼莪遺恨在夜雨舊盟寒家有書堪讀囊無錢為看情親悲不那望絶旐飛丹唐舍人關輓詞鴈塔名三世螭坳侍九重循循儀學館諤諤囊著封至性悲三釡高懷薄萬鐘典刑傷不見哀涕忽無從夷路方馳輿甘棠喜問津廟廊平日志露電百年身搯掌雖多恨為箕自有人發棠隂徳在陽報質蒼旻徐少卿子寅輓詞聖主一言寤長淮千耦耕山川皆在目草木尚知名盍被腰金寵徒為攬轡行諸郎襲餘慶定自繼長卿所至多遺愛丹邱最有聲奉常千載乆攀戀一城傾已恨數離别寧知隔死生湖邊舊門巷一到一心驚陸提刑洸輓詞數馬謙恭甚揮犀色笑温風流士龍裔文采左丞孫晚幸成三徑身胡遽九原素欽仁者勇大嶽竟平反早嵗擅詞場夷途列鴈行一麾分楚甸雙節照江鄉蓮社容寒晚葭莩接老蒼八旬俱已矣囘首倍凄凉陸參議沇輓詞中外衣冠盛流傳識後凋聲名三語掾身世半身寮寶晉書尤逸坡仙隱可招梅溪殘月墮蕪没舊風標飾吏先儒雅低徊五十霜萑蒲掃韶右桑柘滿黄岡知已平津老家傳删定郎八龍無半在風雨夜侵牀蔣慈谿鶚輓詞伊昔丹邱去相逢意氣傾樓前巾子秀山下育泉清敬梓情逾厚交梨論益明凄凉千古意潮落又潮生下筆欲生風磨礱日有功推敲詩益練駢儷語尤工經問南雷叟家傳十八公詞人誰可繼文陣滑稽雄呉大監飛英輓詞庠校聲名早朝廷譽望尊忠言如日皎笑語若春温四擁皇華節屢登金馬門用才終不盡流慶在仍昆曠典將行日南宫得舍人銓衡輕易地造化漫勞神舊事誰能記交情獨我親吁嗟三昧手不見掌絲綸俞通判茂元輓詞强仕賦歸去頻年亦漫行宦情雖淡泊官事極精明贊畫王公幕監州亞父城佳兒守遺訓清白勝金籯象邑推三俊靈光頼此賢老成俄已矣逺邇為澘然孝敬心何極公平録尚傳佳城隔風浪忍賦薤歌篇陳崇道輓詞學造龜山藴詩傳汝水餘于公足隂徳陶令竟閒居白業追蓮社丹經授寢虚其父號寢虚先生平生了無恨善類勿欷歔未第聲先振纔官節已竒精誠與神合隂行畏人知晚境終無玷遺文尚可師功名齎志殁囘施稱家兒鮑潮州潚輓詞三試皆前列一官何後時低徊廣文舍齟齬使君麾遇事有如燭衛生寧及葵舊游成隔世流涕讀新碑客授壬辰嵗巍科盛永嘉芹宫屢揮塵竹院幾烹茶假守深交誼清談及道家猶懷郡齋晚羣雀噪簷蛇攻媿集巻十三
