body:
  text: 攻媿集巻九宋樓鑰撰今體詩試俞珣長頭筆倦逰俞老入中州霜兔抽毫飽盛秋平日相親管城子結交今得賈長頭訪留昭文于范村山間不得見黄扉處士掩松闗小立松風去住難可歎山中真宰相未容神武挂衣冠送倪正甫侍郎出使經帷親見犯天顔口伐何勞抗可汗故國應悲周黍稷遺黎猶識漢衣冠殊鄰諜報終難測累嵗要盟恐易寒馳至京城上方畧始知頗牧在金鑾送王仲言添倅海陵二首萬卷詩書老雪谿頎然二子和塤箎絶憐伯氏久亡矣猶幸夫君及見之來上鵷行人未晚往舒驥足自嫌遲他時還向雲門否布韈青鞋尚可期遂初陳迹遽凄凉擊歎青箱極薦揚談笑于儂情易厚典刑使我意差强重屏舊畫論中主古殿遺文話阿章舊事從今向誰得尺書時許到淮鄉寄題延平范氏六桂堂髙門儒效許誰同秀氣于今照演峯家學一椿連五桂地靈兩劒化雙龍三人衣鉢清名接累世簪纓慶事重彼茁孫枝更林立不須萬戸羨侯封京仲逺尚書為澹然子作二大字濃墨新題付澹然松坡為子老談天憑君推我行年㸔何日歸耕綿上田送李伯和吏部題舉浙東伯珍寺丞將漕夔門奕奕君家好弟兄皇華交映棣華明幾年並列金閨彦同日俱持玉節行萬里往臨夔子國一江先到越王城㑹聞歸取青氈舊都似當年老貳卿送范文叔禮部守彭州憂國鬢先雪愛君心似丹旌麾雖自適懐抱未全寛直道任三黜故人憐一寒濛陽毋久駐旋復簉鵷鸞送趙徳老端明帥蜀身名俱泰老尚書叱馭寧辭萬里途兩地恩榮真赫奕四川父老定歡呼乖崖袍帶今重見清獻琴龜我更無頻向籌邉樓上望歸來方畧上新圖次盧國華提刑所寄韻持節歸來上粉圍秖今一節又何之樂天好句追長慶元亮髙風挹義熙我恨别多仍㑹少君雖去速豈來遲閩山荔子熏晴晝莫惜登臨賸賦詩古梅遺張時可枝封蒼蘚澹花疎一種風流髙更孤試問約齋三百樹林中還有此枝無李才翁賀除天官次韻九年奔走祇思閒歸夢時時墮故山已媿演綸詞禁上更堪曵履侍臣間官曹顧我空無補世事惟君了不闗但欲相從㳺物外不應久此玷清班我居銓部閙簪裾終羨寒牕只蠧魚每念故交今有幾況如盛徳豈容疎京塵共歎催人老市道誰知有隱居久苦筆端枯渴甚楚波正欲借君餘劉徳修右史去國示所和從父東谿及楊子直詩走筆次韻無人為辨樂羊書卻向空山問草廬世上榮枯無定在眼前毁譽竟何如寸心未徹九重上百口仍行萬里餘只恐君王思舊學便看飛詔促嚴徐東谿詩似老彌明傾葢論詩絶㸃塵筆墨為供無盡藏江湖乞得自由身出門逺送成惆悵無計相留更主臣但願皇天開老眼不應空谷滯斯人閣下相期久山中把酒稀未能容我去又復送君歸柱史寧終隱威顔暫咫違壯心誰與語看劍一燈㣲謝袁起巖侍郎送盆梔奉老母翠綃飛葢擁生香氷雪精神試晚妝鶴髪慈親俄一笑玉人何事晚升堂送曽南仲寺丞守永嘉六和久坐趣歸鞭卻送旌麾水竹邉無說可俾新令尹有時重送老同年城隅緑竹今安否庭下朱欒定儼然回首東州真夢境羨君此去若登仙過上虞懐謝驛喜雨夢回簷溜作驚湍浄洗炎敲百慮寛咫尺東山見膏澤令人更憶謝家安答杖錫平老老我平生不願餘歸來但欲賦閒居灌園自足供朝膳日奉夫人御版輿送尉海陵併寄示潚二子俱從宦重親足自怡汝能行㓜學吾豈恨輕離平日自知己眞心更與誰臨文有遺忘此是憶兒時處已幸寡過居官勿願餘動成經嵗别賸寄幾行書公退仍多學心清任索居但知行所職通塞聼何如次潘安叔寄新溪詩韻曽游明月舊雙谿老去情懐百不宜夢繞新谿身不到更休重和寄來詩送内弟汪强仲赴台州税官雕鞍去去不容攀柳下門牆輟往還可但征商私龍斷不妨拄頰看巾山右軍墨妙惟修禊太傅才髙亦抱闗咫尺親庭毋苦戀有人能作適齋閒少潛兄再立晝錦坊伯中弟有詩次韻東樓舊日史君家盛徳于今説孟嘉晝錦門牆再興起烏衣巷口倍輝華雖無崔氏聨三㦸肯學楊家簇五花尤喜桂枝香不斷藏書滿屋是生涯王原慶訴盤餐蕭然走筆次韻愁絶詩人太瘦生也無北食與南烹君看俚語亦堪笑何日能塡鼻下横莫嗜鰒魚如老曹但應菜飯學参寥坡翁晚節更清苦玉糝新羮手自調送趙振文主簿去去江西不作難片帆雙槳蕩秋瀾已知宦業非時様尤喜親情耐嵗寒志大自然羞附驥官卑何用歎棲鸞少卿膝上加文度更比年時刮眼看病足戲效樂天體課得退連茹藥逢新太醫居閒幸餘暇養病任多時歩屧雖非便調琴足自怡晚來風雨急髙卧到晨炊叔韶弟上連桂堂牓㑹羣從我家簪紱百餘年書種于今幸有傳折桂時能取黄牒肯堂賴子抱青氈一新扁牓照華屋共集樽罍招衆賢須信後生尤可畏要當爭著祖生鞭題林氏香巖庵緩歩尋佳處林深路欲迷偃松披數畝立竹漱三溪瀹茗憑山檻呼燈照石梯輕輿空翠濕投暝喜幽棲送汪强仲還官所又向丹丘去安書易往還固因官事了莫放舊書閒問訊雪巢老寄懐巾子山經行皆夢境自笑日蒼顔寄題吳紹古縣尉經徳堂問舍玉眞下讀書經徳中心期知共逺臭味許誰同吹笛夜凉月舞雩春暮風直須涵泳熟毋負象山翁送季舅汪江州大定二首清直如公天自知晚年百順了無虧九城臺下方還斾五老峯前又擁麾題坐喜逢陳仲舉據牀好繼庾元規太平散吏無由到倚聼中和樂職詩舅甥相與自垂髫㳺宦歸來鬢已凋坐上可無車武子酒酣時賴蓋寛饒喜公自此驅千騎顧我從今守一瓢閒與適齋同悵望草堂樽酒幸清朝送内弟汪耐翁隨侍因赴臨川推官之子長才盍要津未知此别幾經春且爲湓浦過庭子徑作臨川入幕賔生長外家身已老周旋中表意尤親從今家問須情實莫事虚文學外人環村踏雪一冬求雪雨還晴賸喜春朝見玉霙不為偶同佳客到誰能深入亂山行雲牕霧閣知何限玉樹瓊枝到處明更喚輕舟同穩泛小谿何似剡谿清荀輿衝雪過谿橋流水方東未晚潮白裏不知梅奪色青邉尤喜麥成苖烟深帶雨参差下空濶隨風自在飄可是忍寒請更切故求野路踏瓊瑶又次蔣甥仲愚韻山色空濛雪更竒滿空撃碎碧瑠璃寒侵茅屋春無寐凍合梅花夜不知泛泛輕舟勝路滑洋洋流水樂人飢興來但覺酒腸濶江海安能實滿巵送元積弟赴永嘉酒官宦遊五載住中川似與邦人有夙縁昔日江山知好在舊游人物想依然吾衰無復逢梅福子去惟應夢阿連或問故侯霜鬢未吾言潘令是齊年我家清白世相傳工部真清更有年百口未曽營活計一生惟喜種心田吾方奉母耕綿上子更移封向酒泉兄弟凋零期自勉只將家訓作青氈同王原慶知道游天童舊游曽記夢中身一日重來白髮新行盡杉松三十里看來樓閣幾由旬狎鷗亭外波瀾濶宿鷺池邉草木春自笑賦歸如許久始來此地作閒人東谷舊説東阿谷兹來到此山樹深烟冉冉花落雨潺潺有客禮師塔何人叩祖闗天連秋水逺此意尚人間千佛閣平横雲棟塞空虚倒影仍臨碧玉壺千佛威光歸寳所九霄宸藻粲河圖人天共歎未曽有燕雀相驚不敢踰試問南詢童子看化城曽見此樓無從子滌濯寒納凉楊栁陰陰映粉牆宻雲藏雨晚來凉髙荷欲出欄干上笑挹紅英吸浄香謁告歸省復還海陵吾子逺歸省重闈俱粲然難留毛義檄又送子眞仙西去仍千里東歸約二年詞場期自力收取舊青氈題少潛兄得閒亭下水吞空輕舟處處通閒情誰得似逸興更何窮詩社率相過醉鄉時一中我家原不逺只在小橋東平日君多暇如今我亦閒人歸真得地吏隱勝居山烟浪一千頃茅簷三四間天寒倚修竹空翠濕攲鬟送從子淵宰浦江誰云宦路足嶇嶔送子之官獨放心亷介有餘無矯亢謙㳟已甚自崇深安輿何用資三釡慶問時能扺萬金公退讀書三子侍縣齋松竹已成林慈溪道中雙櫓真成鵝鸛鳴客愁厭苦夢魂驚須臾寖覺耳根熱一覺醒來天已明題惠崇著色四時景物舊説惠崇眞畫師生綃四幅見天機鷺翻桃岸韶光嫵鵝浴蓮塘暑氣㣲風勁賔鴻霜始肅寒欺花鴉雪初飛分明知是丹青巻仍欲沙頭喚渡歸送吳參議褱才氣勇無前人推季子賢侯藩聨剖竹制幕晚依蓮勢利從身外風流到酒邉四明欣㑹遇兩載得周旋為記題名石仍吟達觀篇留行何及矣執别但茫然我已甘投老君方欲引年未知重見日目斷五湖船即事十日陰寒雪不成臘殘春近更霜晴深山髙卧如春暖遶鬢飛蚊自在鳴弔陳衛道墓平生學博更加詳和㑹三家儘較量一覺可憐成夢蝶多岐終是易亡羊門前修竹連岩桂道上芙蓉間海棠何似剗除閒草木青松一色蔭髙岡㳺大梅山梅仙岩為憶西京梅子眞人言羽化匪沈淪海瀕古墓已無迹山外髙風寧有神鯁論至今光漢傳清風猶足盪秋旻何須更說神仙事終老市門良可人虎冢辛勤玉柙更珠繻或見乂牙出骨須鷙獸一心能䕶法敝帷千載尚全軀餘威凛凛空埋骨遺像耽耽若負嵎及見當年梅子熟自應驚倒老妖狐謝潘端叔惠紅梅有序潘端叔惠紅梅一本全體皆江梅也香亦如之但色紅爾來自湖湘非他種比自此當稱為紅江梅以别之王文公蘇文忠石曼卿諸公有紅梅詩意其皆未見此種也感歎不足為賦二十絶舊家桃李種河陽今日紅梅自楚湘根墢送春君意重為移絶艶到吾鄉黄姑曽為㸃氷肌亦有緇塵染素衣何似臙脂天賜與暗香猶在是耶非為君手種向南牕誤認昌州移海棠元是玉妃生酒暈帳中仍帶返魂香前身施粉忌太白今日施朱恐太紅說似旁人剛不信清香萬斛在花中殿後鞓紅色漫穠絳桃空自笑春風何人擊碎珊瑚樹惱得瑶姬靣發紅舊見寒花蠟蔕紅寧知沁入雪膚中絶憐金谷佳人墜到地餘香散曉風梅花幾種盡相聞老矣才欣見此君相與對花文字飲絶勝歌舞醉紅裙人間丹桂亦㣲黄未見紅葩觧有香惟喜此花兼衆美麝臍薰徹絳紗囊初移湘水一枝春賸馥還欣為我分夢入山房三十樹何時醉倒看紅雲嵗晚紅英繞凍柯玉人無那醉顔酡廣平賦就如逢汝鐵石心腸可奈何少陵年後詠花開未見臙脂一抹腮可惜當時詩興動止因東閣看官梅坡翁著意賦三詩漫説濃香已透肌若見此花應絶倒惜君生晚不逢時花品無庸定等差國香國色屬吾家海棠正自慚粗俗莫問漫山桃李花不學江頭玉樹寒夀陽紅粉舊妝殘嬋娟可是慚隨俗莫作金沙鎖骨看客來試與倚䦨干拂拂清香觸鼻端儘教北人渾不識不應改作杏花看全體江梅臘裏芳紫綿新拂漢宮妝臨川借得江梅句傾國天教扺死香詩老為花空自忙想應未識此竒芳青枝緑葉何須辨桃杏安能如許香只説梅花似雪飛朱顔誰信暗香隨不須添上徐熙畫付與西湖别賦詩縞帬練帨玉為肌誰㸃㣲頳向北枝若是羅虬見顔色定須將此比紅兒自昔梅花雪作團紅梅晚出可人看江梅不觧追時好秖守氷姿度嵗寒山行行入春山紫翠中入山深處更桃紅一百五日麥秋冷二十四番花信風千頃揺青幾蔽地四山聳翠欲浮空野橋横跨溪如練待買輕舟下釣筒金蹄金蹄垂耳小韓盧飾以重環馴可呼誰繫冬青碧陰下恍然如見撃桐圖次吳伯華韻一身遇坎復乘流景物當前亦自由淺草人行回作徑水來沙聚看成洲哦詩首為鉤棘句適意即是逍遥遊爛醉不知門外事夕陽日日下西頭從子渢送梅枝戲作向來地暖見東嘉帶葉江梅殿嵗華不似青春三月暮南枝梅子北枝花菁江迓客菁江十里路透遲兩岸平疇接翠㣲贏得閒中乘畫舫隨潮西上趁潮歸午睡聼雨老年樂事莫如閒午睡醒來夢已䦨枕上欠伸猶懶起更聼簷外雨珊珊放鶴送潘㳟叔司理沖霄六翮困蓬蒿清唳時時發九臯鵠立固應能獨出雞羣未免嘆徒勞相投顧我憐氷玉欲去知君刷羽毛幸脫樊籠隨所適平平飛去不須髙宿育王山涵秋清秋來此尚涵秋雨後山泉自在流夜暗聲寒鏘玉珮燈明清影粲珠旒枕流正自憐孫楚洗耳何須訪許由我亦暫來專一壑倚欄耽玩不知休長女淯歸夫家寄以小詩胡笳未了遽成歸婦職如何敢失期彈到佳聲重入塞伯喈未免念文姬太湖響石何處飛來一叚雲太湖風急到江城雲中疑有羣仙過時聼丁東環珮聲送朱季公倅嚴陵朱家族裔甲龍舒循吏清名史特書正為嗇夫思所部至今廟食盛鄉閭舍人曽賦嚴公瀨季子方題仲舉輿但向棠陰増蔽芾桐鄉今卻在桐廬以十月桃雜松竹寘缾中照以鏡屏用潚韻中有桃源天地寛杳然溪照武陵寒莫言洞府無由入試向桃花背後看次周益公韻有序某比從朱南劒獲拜覩丞相益公送行末章齒及舅甥姓氏既又得盡見詩刻文潞公同甲㑹之盛世所共聞公與王錢三府名丙午坊尤為竒事今歐葛二賢士以布衣交五載與齊年之集夀樂未央髙風厚誼古未有也舅氏尚書既已屬和命某同賦課成五首以謝厚意天將間氣孕山川名世還當五百年已是有官居鼎鼐不妨平地作神仙書林尚欲校三豕筆力猶能驅兩肩前日勲名身既退斯文留與後人傳六一先生葛稚川兩孫俱并相君年詞場鏖戰今成夢潭府齊盟望若仙政路三公舊同甲洛陽四老信差肩坊名丙午真竒事寫入詩編盍並傳頃嘗假守向中川公在黄扉已數年毎念夔龍容接武自期雞犬亦登仙入朝終嘆一交臂問道幾思偏袒肩數仞宮牆天様逺此心何日遂親傳别駕歸來自贛川相迎方歎别經年為言相國珠璣語寄問洞庭山澤仙妙句聳觀親盥手滿城爭玩日駢肩退憐母子方偕隱卻恐虚名似此傳舅甥相與老鄞川況值慈親九十年畫舫時追唐賀監筍輿聨訪漢梅仙官名自媿偶同轍才望如何敢並肩誤辱品題稱酷似此聲梁楚更堪傳題施武子所藏老融二牛圖佳哉淡墨掃人牛一笛横風各自由平日深知焉用稼如今但欲老西疇烏犍離立意逶遲鞭䇿俱忘取次歸騃犢跳風仍卻顧老融于此露天機謝少㣲兄惠牡丹乍觀泉石分新種想為黟山憶舊葩病後不妨風韻在此花之外更無花方翦欄干第四花玉人聨袂過吾家捻紅玉翼皆名品醉眼相看到月斜簫鼓聲中醉九旬落紅萬㸃正愁人眼明忽見傾城色更向尊前作好春戲和詩卷琴奕心偏好丹鉛手自磨衰翁㑹同社吾子楫餘波歌動玉條脱酒傾金叵羅好為文字飲行樂未宜多山色藍初染湖光鏡始磨竹梢輕墜雨花片亂隨波麈尾揮東晋龍舟弔汨羅莫愁春易老暢飲一春多澄江如練浄新月似鎌磨老栁飄輕絮良苖颭細波歌聲追古郢詩價怯新羅到處還成醉芳醪㫖且多暮年甘散誕壯志久消磨自媿今摩詰誰憐老伏波清新慚庾信敏慧謝甘羅惟有詩情在猶能益辨多過從子澤家楚楚初篁脱緑苞城居約畧似荒郊土膏更得春風力直引薔薇上竹梢題陸放翁詩卷沙畫初驚渴驥奔新詩熟讀歎㣲言四明知我豈相屬一水思君誰與論茶竈筆牀懐甫里青鞋布韈想雲門何當一棹訪深雪夜語同傾老瓦盆送内弟汪莊仲赴浙西倉幕家食八經秋兹焉喜宦遊徃依王仲寳況事薛居州寄信憑鴻羽題詩寄虎丘飛雲親舍近時望海東頭贈龍游術士胡杲方笑劉郎問大鈞從來禍福本無門世間生老病死苦時至即行何足論夜坐晚來徐歩出柴扃萬變浮雲在窈冥濃似鐵山擎缺月薄于春絮透疎星正欣夜久沈天籟尤喜空明鬰帝青雨氣未平龍欲動電光前後射中庭再送潘㳟叔我似冥鴻弋猶慕君如放鶴去還歸我空今日眞成去好伴閒雲自在飛以六經左氏傳莊子遺伯中弟有詩來謝次韻手披欲究百家編奴婢年來識鄭𤣥顧我幸多千巻蓄念君未有一經全詩書心醉不容醒父子筆耕期有年此但古人糟粕爾更須從此悟眞筌書種傳來直到今讀書幾似孝標淫欲君終就九經庫與子平分一片心更向漆園窮妙㫖何殊清廟奏遺音中郎書籍付王粲想得知余此意深中秋無月凉意秋將半深期月影清昨霄雲㸃綴今夜雨縱横睡久何曽著更闌喜暫晴起來聊曠望終欠十分明贈丁相士相形何似且論心眼力工夫見淺深古怪清竒任君説靈臺一片若為尋送叔韶弟赴官錢清蕞爾錢清鎮兹行正為貧九夷猶可處十室豈無人官守無卑小城居緩卜鄰老夫平日事所至若終身净明方丈雲深宿雨未忺晴短艇還來叩曉扃山溜擁溪侵石磴天風吹霧暗空庭茵鋪野草滋新緑玉立脩篁洗舊青老我時時假僧榻夢魂直向醉中醒新闢門徑或謂太窄門外頓空曠雙眸豁太虚誰歟列佳樹正爾對吾廬蚤嵗曽修業衰年得定居買鄰賢伯仲衣錦舊門閭未辨三間屋先栽數席蔬歡娛戲萊服晨夕奉潘輿駟馬容雖狹齋郎任有餘牀金知己盡瓶粟豈無殊細草沿堦嫩新篁得雨初竊希仁者静未覺故人疏晝永翻名畫更長理舊書何妨抱琴醉儘好帶經鋤耋穉同甘苦兒孫共卷舒眼花多掩巻鬢雪不堪梳少飲無求醉徐行可當車此生千萬足秖願老樵漁小溪道中簇簇蒼山隱夕暉遥看野雁著行歸久之不動方知是一撘碎雲寒不飛後衕環村儘遡㳺鳳山寺下換輕舟舟人努力雙篙急引得清溪逆岸流送從子淵葬晨起霜如雪天寒水欲氷引舟拖急瀨扶杖立危層北阮苦多事二疏俄喪明山阿埋白璧悲慟不能勝早起戲作枕穩衾温夢乍回閒居不怕漏聲催天明更欲從容睡長被孫兒惱覺來午睡戲作早起三朝當一工老來貪睡不相同偶然一次五更起卻用重眠到日中攻媿集巻九
