body:
  text: 攻媿集卷一百七宋樓鑰撰誌銘林府君墓誌銘四明有善士林君諱碩字興祖開禧二年十一月七日卒年七十有四力學而不見于用言議亦無以表暴于外躬行于家里閭敬之其亡也弔者盡哀明年三月丙申葬于鄞縣通逺鄉金谷里之赤隴楊敬仲簡既識其壙袁和叔燮又状其行樓鑰納交既乆君之子若孫請銘銘曰惟林之先著籍于青五季避地遂居四明曾祖曰簡隠徳自髙祖暐漫仕韶司户曹財雄一鄉積豐施厚植徳名堂用昌厥後父嵩儒科晚仕不顯節度推官官止清逺母也馮氏賢如軻親君少挺特篤于自信講學至勤求友至切質疑請益甚于飢渇網羅百家博覽彊記或問所在開卷指示儉不苟費傾貲買書手不停披萬卷有餘㝷得目眚謂當佚我使人誦之竦聴無惰君之讀書根本經學乆而愈明自詳趨約恭敬誠慤檢柅此身劇暑甚病飯必冠巾心若無倦形體自攝聖學之要正在兢業人靈于物知反為累吾有知哉道斯可致執喪盡禮水漿不入祭祀必齋箴規汲汲捄人之失退無後言謀人必忠赴急必先清心窒慾不作無益聞過則喜改無難色嫠不恤緯惟時是憂賢否用舍如身戚休禹功萬世予獨何人究觀聖心専在為民敬奉遺體不敢不懼涕唾不輕爪髮藏去克勤小物動有彛則端勁小楷見之心畫誦言行録自深愧怍詠康節詩如在伊洛躬行于家是亦為政恂恂二子處恭事敬伯曰惟忠叔曰惟孝字之以全義方之教叔既登科伯亦舍選人謂君家慶由積善伯也忽焉人疑于天宗一繼進纔閱三年夫人曰任克相夫子叔官從政司越之理孫主邑簿宣之旌徳次傳省任不渝淳則壻曰周焯僅試一尉次曰楊忻孫女惟二祖葬豐林逺七十里願依九京今從其志君疾病矣呼友執别神氣泰定怡然不屑收視云久已無晝夜今忘生死安有怛化君則無憾士友傷尚其不亡視此銘章戴俊仲墓誌銘乾道七年余客授東嘉盖士夫之淵也職于學者多佳士而戴君俊仲為録以文行為鄉先生著春秋經解數萬言能為詞章詩清婉有思致性質粹溫不得而親疎乆處庠校與之議事詳審而寡失故尤與之密君是時已嘗薦于鄉五上禮部至淳熙八年始以特奏名試補賀州文學尋授迪功郎婺州金華縣尉光堯慶夀恩循修職郎余去官十五年而復假守真欲下榻以禮孺子避堂以舍盖公而君已得末疾監潭州南嶽廟不可出矣徒有室邇人逺之歎十六年既以光宗覃恩循從事郎余以八月去郡聞君以十有一月甲申終于家享年六十有八娶陶山張氏相敬待如賔家無間言後君十五年卒寔嘉泰三年七月十二日也年八十男二人誠之為郡直學淇為太學生女六人長適張渙次適諸葛詵次適包暹次適迪功郎廬州州學教授張泳次為尼名法夀住處州回向院幼適王廷碩孫男三人橚杕復孫女五人君之喪以紹熙元年三月辛酉殯于徳政鄉湖嶼之原夫人以開禧元年仲冬合葬焉君方領袖諸生時誠之已能屢試上游淇雖幼亦秀爽可喜與余諸子同硯席雖嘆君之滯留庶二子之奮發今誠之亦困于場屋淇在上庠尚可望也公之初喪二子來求銘乆而因仍未就夫人既祔又以請余投閒多病又復許乆杜工部既葬四十年其孫過江陵謁銘于元微之一日而成余既許君之銘二十年而不就有媿多矣君性孝友幼失怙恃語一及則痛自憫悼至飲泣不已弟一飛夫婦蚤沒力貧治葬撫愛其子女如已出開門授徒席下多名士郡延之學後進皆知所矜式至今猶推淵源所自而卒不偶兹非命歟經解三十卷文集號横蕩類藁五十卷藏于家後人尚猶因此以見君之大概云俊仲諱厚又字長文世為鄉之著姓曾大父天休大父臨父端夫俱隠徳不曜後其有興乎從兄之子溪闓之俱擢儒科溪有盛名今為兵部侍郎太子右庶子在君諸生中尤傑然者也銘曰嗟嗟俊仲鄉之勝流學博文優衿佩從游坎壈半生不忮不求命也奈何何所怨尤我銘雖緩尚銘諸幽後有知者其惟春秋通判姚君墓誌銘四明自國初以來端拱二年至乾道末登進士科者㡬二百人矣淳熙五年姚君穎始以第一人及第實為吾鄉之光又其才業足以稱褎然之選意必逺到而竟以不顯可哀也已君字洪卿世家吴興後徙于明明今為慶元府曾大父阜迪功郎容州司户輕財好施創必慶堂于城南延師以教宗族之子弟于是姚氏後又有曰太任曰持曰孚者相踵擢第遂為聞族孚即君之大父也尤號博洽三預計偕入太學宦情素薄再調和州録事參軍遂致其事終左奉議郎父孝全封朝奉大夫致仕賜紫金魚袋母宜人楊氏君在髫齔嶷然已有成人風五嵗讀書過目不忘十嵗能屬文試鄉校占前列郡博士疑之别命題使試于前應手成章時號神童師事屯田鄭先生鍔累年能自刻苦洛誦多至徹旦㡬忘寒暑飢渴經史百氏傳記注疏下至稗官小說多所貫穿大書論語置几案間又取二程上蔡龜山之書仁義禮樂道徳性命之說決擇是非類聚成帙以便講習文體簡嚴自出機杼有以為後時者曰是有命焉由漕臺試南宫參知政事范文穆公成大以宗伯知貢舉得公文竒之及發策集英推明中庸大學之㫖㡬數千言末論敵國事宜尤備孝宗皇帝以其議論正大剴切親擢首選而戒勿版行盖不欲傳于外也聞喜宴御書旅獒篇以賜授承事郎簽書寧國軍節度判官㕔公事特命員外置力祈寝免上嘉歎而許之皇子魏惠憲王鎮吾邦欲侈其盛命以騶哄鼓吹迓君而扁舟已歸郊居矣祖妣史氏盖太師文惠王之姑時文惠再相侍立上前一聞臚傳再拜謝恩丞相王魯公方知樞蜜院問與公何物文惠道所以且盛稱其賢魯公鍾愛一女託文惠以締婚焉魯公後因對及之孝宗曰策中用趙逢墜馬事甚佳乃知簡眷之深也七年之官龍圖鄭公伯熊為守相得歡甚繼之者治尚嚴君能濟之以寛乗間語之曰催科之急郡有十之一則邑十之五吏曹以為利懼民之不堪也守感其言為之霽威適大旱𣙜酤之課不登逮治苛峻君緩其期而蠲其無所從出者人心歡然甘澍隨應邦人尤徳之八年被召有㫖引見以未經審察辭不敢當次日遂對便殿君首以數被異恩叙謝繼論治體切于時者凡十有八條進讀未終玉音琅然云道理當如是又論義倉等利病及守令乆任上皆嘉納除秘書省校書郎供職之日胥吏例以雌黄塗數字請書其上以應故事君不欲循襲非手校真有譌舛不下筆也時言路多選于館中頗有饋遺君不啓書加以緘封而還之魯公當國引嫌丐外周益公欲處以一郡君力辭添差通判平江府又辭釐務不果館閣皆一時名勝惜君之去相與餞飲道山用風流半刺史清絶校書郎分韻賦詩以送之仲冬奉二親以行㑹郊祀以曾任館職恩封及親吴門一都㑹地大事夥闗決無壅吴江民交訟乆不決部使者以屬君邑以其人素不可追君曰張官置吏非以治貧弱正以制豪强耳窮竟黨與卒究其獄一郡竦服君自念蚤以大魁丞輔藩斂藏淵靚若無所能為者間有所為亦不欲人之指目為能也不要名不混俗無所阿附名齋曰迂嗚呼可謂深藏若虚者矣十年禱旱勞悴感疾以終年纔三十有四官止宣教郎屬纊之際語不及他惟以君恩未報親養不終為恨寔十有一月十三日也二子元特四嵗元哲二嵗一女在二子之間君未第時欲卜築于鄞之陽堂鄉延夀山至是遂以其年十二月壬申歸葬妻以丞相恩封孺人于時年二十有三泣告父母誓不背姚氏卻鉛華不御賦柏舟之詩撫教其子女大夫公夫婦至今夀且康嵗時供婦禮無敢慢嗚呼賢哉魯公家訓清肅孺人處昆弟無間言後諸昆弟遵秦國夫人之命以遺奏恩予元特未㡬朝家用故事命元哲以官今俱為迪功郎調饒州安仁福州連江縣主簿皆壻于外家女適承奉郎新監臨安府糧料院王儼又魯公之孫新吉州通判檝之子也孫男女今各二人君性孝謹少居大父母之喪已能悲慕盡禮大夫素嚴重先意承志未嘗少忤遇有慍色至閉户自撾屏息不敢喘母病疽衣不解帶藥非親嘗不進祈以身代友愛弟妹惟力之盡平日動以古人自期文詞之作尤為精敏他人汲汲不能發舒者下筆輒過之掩抑覆護不欲衒耀而自不可掩真如其為人也裒為家集十卷方在甥館時諄諄言宰相之職惟進賢退不肖昔王文正在位僉壬豈能悉去不以為憂也惟多引諸賢使不為小人所勝耳因宻疏賢才三十餘人雖不及盡用終多為知名士君之志豈小哉體瘠神清人以為似文惠而與魯公真有冰玉之譽出門軸折此識不識所共嘆也開禧三年君之二子踵門泣曰先君之葬時兄弟穉幼未及銘墓念不可以無傳又以通判贑州袁君燮所作行状為請余尤哀其意為之銘銘曰人之生子惟恐不敏敏而好學乃善之盡既敏而學又或恃才浮躁衒露為身之災猗歟洪卿實具才美蚤冠儒科一日千里抗志逺古力行在躬文惠是似清如魯公天胡不仁蘭摧玉折二親俱存共姜守節有子競爽志于家傳不在其身天其舍旃王夫人墓誌大名王氏至晉公魏公益顯占籍京師號三槐家魏公之兄諱懿仕秘書丞贈兵部侍郎曾孫為夫人之曾祖震吏部尚書龍圖閣直學士贈少師妣潘氏越國夫人祖仰尚書金部員外郎贈大中大夫妣閻氏碩人唐氏淑人父從知信州贈正議大夫母金氏陳氏俱贈碩人大中建炎避地來明後遂葬于鄞正議定居桃源鄉夫人生于紹興八年十一月年十九歸于向氏文簡公八世孫欽聖憲肅皇后五世侄名公援字伯劭太府卿兼權兵部侍郎士偉之子也終修職郎徽州司法參軍夫人金出也幼失所恃唐淑人鞠育以至成長淑人為質肅公之孫有家法夫人習熟閫範動以為楷至疾革猶以祖母為言逮事侍郎之母游碩人者一紀曲盡誠敬寝疾厯嵗奉養無怠容侍郎季女適仇氏寳學悆之孫由尉贑之㑹昌夫婦俱喪一子伸孤立伯劭與夫人既經紀其家夫人又以幼妹歸之以振仇氏之門侍郎之薨有女纔七嵗夫人拊愛教以婦徳擇曾文清公之孫樵以歸之伯劭友愛素至介弟登仕郎公擢蚤世無嗣其婦髙氏嫠居二女俱幼夫人承夫之志命仲孫大年為之繼以其長女歸髙氏兄子銳賴其經理之助次歸蔣興邦亦名家子也伯劭晚有女甚愛之夫人篤于手足議以歸仲弟涵之次子槩涵授樂清令而不禄資送加厚過于已出伯劭先娶括蒼葉氏僅閱嵗而亡寄葬山寺夫人為繼室略無諱忌土冢修祀如奉其先伯劭将葬謂二子曰葉無子而又别葬若不舉以同穴則後日必寖致廢禮遂合祔焉此尤人所難能也伯劭嗜書手不釋卷或忘寝食夫人時其寒煖不以俗務累其心及其亡也治葬送撫諸孤益謹家政米鹽靡宻井井有條平居凝重語笑不輕發闔門㡬百口内外肅然嵗時姻族㑹聚始假借顔色雖諸院子弟亦知敬憚苟有過惟恐夫人聞之性明淑曉文義旁通醫卜之說又善攝養少病疾年七十忽得疾遂不可為寔開禧三年二月戊午也二子之邵之翰二女長適甥王蒼舒次即槩也孫男四人大成大卞大方大應女二人長許嫁蒼舒之子将仕郎簡次尚幼将以五月甲申祔于雙鴈鄉蓮峯之原司法之墓始余妻祖尚書公俣上世由大名徙宛丘自晉公分派故南渡以來與三槐通譜二王氏向氏皆居明越間夫人之弟柯山使君淹又與余締婚焉于是使君哭女兄甚哀以書來曰自涵弟云亡與吾姊相倚為命幼而至老氣同聲應専以謹守學業不辱門户相勉罔敢怠忽今舍我而逝人皆謂其令終吾今獨存何以善吾後冤乎痛哉吾姊夙佩慈訓善學力行遇事處決有大丈夫所不及某實敬畏之與君姻連必亦稔聞為我志之以塞吾悲以慰諸甥之孝思可乎余姑之夫太府卿王公正已與信州為莫逆之友每稱伯劭風度之佳記問之博一日見伯劭于鄞簿廨舍而不值夫人相見于碧梧軒縱談家務世故及伯劭所職纚纚移晷卿退而語鑰曰吾與信州通家如兄弟而又同姓知其女之慧亦不知其通曉如許雖嫺于辭令者所不逮也蒼舒及簡又尚書之孫曾余以故屢獲升堂辱延遇益信卿公之言敢併敘之云承議郎孫君墓誌銘淳熙五年余贅倅天台已而會稽孫君應時季和尉黄巖見其學行吏事詞采翰墨動輒過人與之定交問其家世始知其父雪齋先生之賢甚悉方與四方士友期季和以逺到開禧二年二月二十三日将赴邵武貳車忽一疾不起遂以朝奉郎致仕識與不識莫不痛之三年十月二十五日其母太孺人張氏繼卒于家季和之兄應符遣其子祖祐來見余曰祖父雪齋之亡季父嘗持故國子録沈君煥所状行實乞銘于晦菴朱公公許以銘曰古所謂志士仁人今復見之恨不及展龎公之拜銘文見屬其何敢辭既而公亡迄不果銘今不幸祖妣繼季父以逝顧當今孰能繼晦菴者敢泣以請余以衰病掛衣冠而迫于上㫖收置北扉震懼固辭不獲命念季和之交誼又不可以固陋為解讀其所示事實見雪齋七十嵗時倣程公大中自誌其墓有云雪齋野叟孫介字不朋越之餘姚人也族緒寒㣲難援譜系但聞五代祖自睦州徙居此力田自業余曾祖諱亮生二子余祖為長諱政孝慈馴善鄉黨稱之生四子長從釋氏為昇師次為十伯父次為十三伯父次先考十七府君諱子全昇師持苦行而有髙識兼通儒書喜聴賢士大夫語歸葬父母守冢三年則聚諸弟之子躬授語孟詩禮蘄變其家為儒已而余生于政和甲午八月辛未實十三伯父之子命以為先考嗣四嵗能離家入郡庠隨兄夀朋讀書日數百言七嵗學于鄉先生胡定翁家聞本生伯母及先考之訃號噎奔喪哭臨以時孝悌之端發于天性衆稍驚異其後兄常攜寓鄉館側聴講說文義粗通然退侣燕朋弛怠不進十四五潛喜哦詩兄使誦杜集頗費日寡益十八九始學舉子賦遽罹兄喪哀痛之情如失乳哺如割肺腸倀倀無相㡬不自立因從畏友厲徳輔肄業紫溪漸漬稍勝既冠迫于凍飢踵兄故步授書自給益發憤自課經史注疏且閱且抄不敢荒逸竊志古人務為實學時文非其所好而又無師屢試不利決意退藏尊拜先聖覬扶吾道晨誦孝經以致時思人多非笑不之恤也壮室張氏既得三子捨館歸訓鬻田就竭人不堪其憂五十九嵗始幸小子應時試入太學閱三載遂叨中進士科其後長子亦厠鄉選余于是家居寡出諸兒分寓歸辦菽水今既七十已隨應時滿尉黄巖還鄉閉門養疴不交人事挾策自適凡余自少至老備嘗艱阻不可具言初侍所後母陳氏遭義兄陵暴慨然景念孤臣孽子竊以舜曾閔為師承意調諧各終其世紹興乙丑仲兄有重罪余未諳律令以身援之㡬併坐縲絏偶值星變原赦俱免其他困阨危難苦心衡慮改過遷善迄能自持厥躬不見薄于鄉里吾家父行享年多止五十今幸同産次兄七十有七與余白髮相保夫妻兒婦歡聚無缺捫心感舊粗足樂矣然余所以行已立心不忘恭敬近而冠屨微而紙筆未嘗輒輕易服用嘗謂不能動天地不足以言誠不能正室家不可以為道故其在畎畝未始一日忽忘君民對妻子惟恐食息偝違禮教一言一事必求合于人情可無怨悔者而後出之其受人子弟之託教之不啻己子隨才指授専事講釋至老不倦與人交不敢失信廢禮受侮不敢爭忿蓄怨平居確意安貧守分不萌非義之求聞人有善心恨弗及見人之惡口不忍言自信不移量力而動平生謹畏求寡乎愧怍而已噫使余少年微有依怙不厯屯剥壮嵗窒于理性不明否泰未必能操心慮患固窮順命亦何以至于今哉凡吾子孫勿墜家學推本源流念之敬之此吾之實録也余三復而嘆曰嗚呼其可謂躬行篤學樂道知命之君子矣凡君平生操履大槩已見于此而國録沈君所状尤為詳備余復何所措其辭至于蓬藋之居陋甚玉川而門堦户庭咸有銘勒簞食菜羮終日不飽而潔齋整齊如對大賓子良婦教孫枝競秀家法修明門雍户肅下逮僮僕舉訢訢也其遺風餘範至今藹然亦足以想見其典刑矣初君以淳熙十一年太上皇后慶夀恩封承務郎致仕十三年上皇再慶進承奉郎十五年正月二十八日甲子卒于泰州海陵縣丞官舍享年七十有五後應時陞朝累贈承議郎張氏同邑人也曾大父嚞大父儼父日休封太孺人享年八十有六三子長曰應求後君四年卒次曰應符次即應時也一女未嫁而夭孫男三人祖祐祖詒祖開孫女五人長適文正范公五世孫克家次適宣教郎知婺州義烏縣丞胡衍次適里士胡伯韶次許嫁四明沈嚴曾一尚幼曾孫男二曰珍曰珤君初葬于燭溪湖潘山之塢穴頗不安季和之亡得吉卜于新奥竹山始遂遷葬今将以嘉定改元某月某日奉太孺人之柩祔焉太孺人質性荘重雪齋動以古人自律孺人事之如賔終始若一日季和宰平江之常熟縣號難治吏民歡服既滿横為郡将所捃摭困阨兩朞至開人使訴卒無一詞猶被鐫降孺人曰但不得罪于公論足矣窮達非所計也閒廢累年方權臣用事不肯附麗求進菽粟不繼族黨姻舊皆勉以禄仕孺人獨未嘗一語及之曰使吾兒失節以為養不如粗糲之為甘盖不如此不足以配君子不足以生賢子孫不足以成禮法之家也季和不幸出門軸折不得究所抱負以彰積慶諸孫皆孝友以承先訓後其有興乎銘曰徳在隂報必明活千人後必興天人間響應聲有篤行出志誠子必賢家必名偉孫君真不朋動以禮善服膺不愧怍無虧成廟之璉壺之冰行于家森典刑噤不施閟幽扄過者式視斯銘攻媿集卷一百七
