body:
  text: 攻媿集卷八十四宋樓鑰撰祭文祭叔父彬州代工部嗚呼我父是生五子惟我與弟年差無幾幼則同隊長則共被矯矯三兄雍熙同軌歲星一周淪謝相繼雁序彫零門户亦替相與為命二人而已平生宦遊動則干里晚食祠祿俱還桑梓築室比隣為終焉計弟室先成如跂如矢我家未就猶費經理寓止外舎相去密邇有景共賞有酒同醉杖屢相過中有真味所期百年同此燕喜弟抱㣲疴時作時止我官于朝祖餞如禮執手郊原勉進藥餌時得安書亹亹盈紙猶子來調得官辟水弟雖卧病頗亦自慰歸侍十日遽已疲瘁醫禱百端竟以不起嗚呼哀哉才術之施十不一二兩宰劇縣一佐邊壘精明絶人所至可紀莅官行法治家處已内外斬斬無小不治謂宜進用以繼先世天乎不淑遽已亡矣吾之干祿聊復爾耳為飢所驅未免漫仕又謂小别不甚為意安知數旬便隔生死心摧肝裂哀淚如洗使吾之心知其至是雖有萬鐘詎肯舍爾他時賦歸浮湛閭里隻影翩然寧忍念此今也死不得撫其棺葬不得臨其隧向風長號不知有生之為美㫖酒嘉殽遣子以祭情傷不文姑寓哀㫖嗚呼九京其有知乎猶以少見吾手足之義祭安康郡俞夫人蔣㕘議母代工部起于名門作配君子壼助之賢輝于彤史惟子惟孫斑衣盈庭子列朝行孫秀而文嵗時上壽簮笏相映家慶成圖一時之盛年登八十胡不百年日月云吉將祔九原某等相與有連事契不薄哀而送之奠此清酌祭伯母馮恭人同兄弟巨族之胄華宗是歸婚好益締室家具宜事夫如賓捧案齊眉撫族以和恩愛無虧秩秩子舍兟兟孫枝撫循鞠育夫人是依季父游宦十年秉麾夫人從行魚軒生輝方期來歸慰此離思親戚團圞情話嬉嬉何意中途一疢寖危繼以訃聞舉宗傷悲靈轝西旋郊迎奔馳不覿温顔徒瞻靈旗涕洒百行何悲如斯矧此仲春窀穸有期嘉殽在俎㫖酒在巵情寓于文靈其聴之祭王樞密剛中舅代仲猗歟王公生宋八葉身厯四朝險夷一節貫穿百家藝苑耕獵其在江湖名已超躐出陳治安為天下甲道山峩巍金門岌嶪鳯掖優處螭蚴獨攝大哉王言與典謨接坤維謀帥公論誰協帝曰汝諧徃即功業蜀道之難捫參仰脅尊為忠臣叱馭不懾朝無顧憂威動邊堞奉祠以歸高臥鄉邑東山雅志鷗盟不歃邊塵忽驚騎􅅽四匝羽檄星馳軍書夜急尺一趣還承明再入首定國是終始堅執忠肝義膽越見眉睫臣主相遇神㑹氣合樽爼折衝敵人震讋智略縱横闗機開闔王師増氣一月三㨗侵疆復歸信使響答遂登西府以贊調燮人皆謂公行矣爰立大厦梁棟巨川舟楫輔成太平光明煒熠天何不憗變生呼吸人之云亡孰不嗚唈天子震悼為輟朝集見之恨晩用之無及存殁哀榮贈賻雜沓鑰列官于朝莫拜馬鬛靈輿啓途丹旐帖帖哀以送之千載一訣祭鄭衡州若容舅代仲嗚呼衡州才大屈宋筆擅雕龍調高吐鳯妙年馳聲出冠鄉貢吾州多賢不利首送惟公開荒徑挹晁董吏事精明萬口歸重亨途方闢八駿飛鞚䜛口含沙巧發竒中退墜諸淵公不為動天定勝人復為時用惟公之文盍儀禁從清廟作歌追配雅驥足方馳三刀形夢悠然漫仕無所修綜閉閤卻掃胸次空洞至寶横棄稱屈彌衆公乎云亡鄉曲嗟痛來祖公喪為之一慟祭趙路鈐不枯鄉代仲舅同人惟公派出天潢生長昭代政宣隆平出入廣内艱危奮忠脱身騎􅅽卒歸行闕官以寖大來歸四明踰四十載待人謙恭處身静退蓮社從游今為前輩樽酒相過雍容貴介揚清歌以歡洽談中都而感慨葢今日宗室之遺老猶使人識承平王孫之故態也年踰七十風度不改郊廟侍祠峩峩冠佩屬近行尊富貴未艾一疾困之遽至危殆嗚呼安閒一堂真率高㑹忽焉陳迹樂不可再相與設奠以致哀尚英靈之如在也祭徐少卿子寅鄉代仲舅同人惟公骨相竒龎徳量汪汪和而知介圓而能方早繼家聲明習憲章旋自幕府徑登朝行乃分左符乃奏明光留屯之策結知壽皇委寄日隆寵賚相望富貴逼人進用未央賦歸十年林壑徜徉漢東天台尤稱循良持節踰嶠澄按南邦云胡不淑季子夭傷情鍾弗堪公亦云亡歸途千里兩旐飛揚行道霣涕而況州鄉某等從游日望歸艎兹登公門繐帷在堂遺像如生奠此一觴相向失聲尚其來享祭趙恭人王滁州之室人代仲舅同鄉嗚呼彤史不書女教不修閨門之間動多悔尤賢哉夫人獨異輩流天予淑質婉嫕和柔不虐不妬不忮不求事姑以孝與物以周舉無間言豐裕優游宜備五福益高春秋胡為累年心熏百憂使君既亡二子不留馴致末疾遂不可瘳某等辱在親黨具聆芳猷設奠一哀非為膳羞尚爾後人壼彞是收祭袁通判章同代仲舅鄉嗚呼惟袁氏四世五公盛于東都五世登科望于鄉閭惟吾叔平尤為耆儒少鳴膠庠文高行孤中年漫仕日著令譽晩益倦游有宅一區安貧樂道隨時巻舒古所謂篤信好學守死善道居處恭執事敬與人忠者惟公兼之而有餘壽登八帙皤鬢霜鬚出則舎車而徒字則蠅頭細書外和内剛不可得而親疎勞謙終吉矢死弗渝進不聞呂父之卜獵退不見申公之安車禄不及子二孫蚤孤養不至于列鼎仕不過于題輿人或不堪其憂而公處之則晏如也沈疴來侵水已浮膚天不憖遺奄歸泉途識與不識聞者歎吁惟余齊年往來舒徐凡我同社視公步趨有几有杖有琴有壺載平時問字之酒奠今日一束之芻欲寫余悲言與淚俱嗚呼尚復有全徳篤行博物洽聞之君子如吾叔平者乎祭魏丞相代王知道嗚呼惟公盛徳不可涯涘雖欲屢數莫究一二竊窺緒餘葢本實地故其設施不誣不偽少而篤學寢食不置壮而從政動施實恵其奉太夫人也既備于色養又及手足之愛以承其意其事明天子也既盡于輔贊又罄啓沃之忠以順于外敵再犯境淮甸鼎沸見大夫無可使者召從幕府張旜出使所謂飛矢在上行人在下而公神色不動講解而歸和議至今南北之人受公之賜者又不知其幾也晚居碧溪不渝東山之志潭潭之居固已因其舊而山林日涉隨其高下葢天作地藏以為公宴居之計益覽載籍出入釋老觸物而咏遇客則醉其雍容蕭散野老爭席風流醖藉有晉宋之風度則又其餘事也人皆望公再登端揆使其小卻猶當出侯藩方使萬物為之吐氣不然處之林下尚可以典刑于善類天不憖遺奄棄塵世詩不云乎人之云亡邦國殄瘁其公之謂乎某等先祖諸父俱託夙契來官異縣獲拜簪履憐其孤㷀視猶子弟引而進之極力于嘘枯吹生之際頭顱如許莫報洪施再拜公前俯伏流涕嗚呼公乎尚歆此蘋蘩之意祭王令人代陳閣學惟陳氏世家閩中我先少卿兄弟始徙鄞川叔父之外他無期功之親族猶未大也迺嵗在丙戌余得庶子是時年方壮而處貧不得已鞠于趙氏迨今十有九年夫人無恙時屢以為言謂趙氏有子可以歸矣庚子之秋既哭子曅因念夫婦俱涉半百而子姓凋疎兹有意請于趙氏因仍至今夫人忽以疾亡而言猶在耳此子已不得逮事于生前豈應更緩于今日二子鞏芾扶靈轝以東卒哭在邇且將卜塟以十二月戊午之吉命子歸伏喪次使執喪如禮以成夫人之美意以廣陳氏之嗣續又以全諸子手足之愛且俾無忘趙氏撫育之恩夫人有知尚臨此言嗚呼尚忍言之祭劉宜人代陳閣學嗚呼夫人之徳柔恵淳直夫人之福康寧戩榖相夫而夫聞于鄉教子而子顯于朝年益尊而無一事之遺家愈肥而無一毫之驕自奉至約以施則饒言無枝葉聞者意消母儀婦則真可以表儀于閨閫葢八十四年處之如一朝晚嵗尤盛賢侯宴喜安輿徐行去鄉密邇干騎奉迎金章拱侍含飴弄孫斑衣濟濟乃開慶筵大集珠履歡謠雜然洋溢千里云何不淑禍福伏倚内外䀌傷幾為罷市夫人之身固無憾矣他人為壻猶曰半子我壻王氏維子是似撫愛之辱今踰三紀室人云亡神傷未巳夫人訃聞痛哭流涕效官詞掖欲歸無計喪不得摩其棺而一慟塟不得臨其穴而盡禮敬状行事不敢溢美雖已大書特書而淑徳懿行終有不能盡言之媿也二甥東歸致奠甚菲東望長號靈其歆止祭王參政之望部代曾吏惟公負卓犖不羣之才養剛大不屈之氣富閎深自得之學奮經綸四海之志出其緒餘十不一二葢文章直欲追兩都之風而政事已足絶俗而驚世矣正色立朝官曰諫議明白賢佞公非公是振舉綱紀使君子有所恃而小人有所畏督師淮堧長城千里雅歌投壺坐卻敵騎進參政機人謂且相而翩然去之高蹈赤城視富貴如脱屣東坡先生稱張文定公曰上不求合于人主故雖貴而不用用而不盡下不求合于士大夫故悦公者寡不悦者衆然至言天下偉人則以公為首者豈公之謂耶某登公之門俯仰二紀假守海邦猥繼英軌欲一拜公于床下而公已屬疾欲見不遂巍巍巨公何恙不已人之所以期公者未艾也而泰山其頺千丈松崩聞者為之流涕嗚呼吏民方相與泣于甘棠之下亟遣薄奠以寓千里去思之意尚當力追公于步趨之餘庶乎不為九京之媿也祭劉衢州朔吏代曾部嗚呼天之生賢其嗇已甚鍾山川之靈委造化之和不為不靳予之以賢授之以才而獨短其命伯牛之疾顔淵之夭豈獨其身之不幸人物器業有如公者儵焉奪之蒼蒼者又何其太忍耶嗚呼我公受天異稟當今人才在第一品處之孔門未必不升堂而在寢居之廟堂上可使藜藿之不採下可使斯民之奠枕南宫一鳴萬口皆噤風節日新利害益深激貪立懦議論鯁挺不事孫劉身不得一日安于朝廷之上小試兩州皆足以追龔黄之遺軫三仕三已重以疾病正路坦坦孤蹤凜凜四方屬心謂公之未達者天將降以大任孰知夫堂堂王佐之才百不一騁而遂至于隕乎嗚呼公之純孝温靖定省鶴髪在堂公必不瞑公之友愛不見畦町十年相望俱負重名于時忽相從于九原此尤薦紳韋布之所悲哽也某慕公風髙歲月良逺假守東嘉方視公以為繩準惟兹邦人崇仰最謹君子服道德之教小人懷撫字之政訃音一聞哀感萬井詩不云乎人之云亡邦國殄瘁要當為天下惜爾何止為海隅之一郡耶祭王詹事十朋部代曾吏惟公行出乎誠學根乎經髙見逺識特立獨行射策論事仲舒賈生面折廷諍汲黯王陵功成羽翼政如神明人或一得公集其成公論之興公為主盟事失其平公為權衡一有抑揚人為辱榮一有去就國以重輕人亡一鑑夢奠兩楹明主震悼善類失聲天亦惜之為之隕星某昔拜公屣履以迎公去不回誰其典刑往哭不可郡紱是縈設祭道周酹公之靈精爽凜然尚其顧歆又代莫守嗚呼某之于公殆有夙契稽山定交歲踰一紀晩寮青宫益敬益畏道義相勉草木臭味哭公之喪義如同氣兹焉假守實公梓里九京不作何所則視公雖云亡道在百世嘗錄遺事上太史氏盛德大節略具是矣嗚呼我公詩不云乎髙山仰止景行行止奉以周旋未敢失墜視焉如生庶幾無愧欲酹宿草相望一水馳奠告哀澘然出涕祭薛士正代曾吏部惟公學博而知約行髙而不孤政嚴而無苛論正而不迂求之海内未見其比意者天生斯人其必將回狂瀾于千載之絶學建功名于萬里之亨途纔小試而奪之蒼蒼者又何其忍乎公之守吳余在故廬我來剖符公歸里居固嘗服髙風于踐履之舊聴宏論于謦欬之餘方將日親直諒多聞之益盡讀篋中未見之書曾不見于幾日驚死生之頓殊寓哀情于短章灑衰淚于生芻嗚呼吾老矣不知餘生尚復見人物如公者乎祭鄭司法頡官同嗚呼德升止于斯乎早名薦書而不得上太常之一第晚歴曹掾而不能脫七階之選途欲試無所有銜不袪旁觀者為之歎息而君處之則裕如也方其釃酒劇談裁燭賦詩精神爽拔不見衰相謂當收功名于桑榆孰謂夫江風匽薄得疾膚腠一入膏肓而不可除方瞳瞭然强忽笑語凜如對面而葢棺事定青衫已上于畫圖矣嗚呼倡酬之詩易而為哀挽之歌清飲之樽今而酹祖奠之芻德升尚能飲而聴之否淚盡詞殫空相與望君于路隅君則已矣有子是似古人所謂非在其身在其子孫者其在斯人歟祭陳司户僖惟君之家世篤儒學君之皇考尤號淵博噤不得施晚而君生謂興吾宗教之以經齠齔秀發書無不讀中童子科老生嗟服遊學十年暮鹽朝虀乃登上第乃瞻龍飛得官户曹千里跬步云何不淑至此大故君之于家孝友天成收䘏孤露糾合宗盟君之于文亹亹不倦自公之餘手不釋卷君之于義勇于敢為親舊有急匍匐救之積是三者宜其逺到壯年長才廢于中道峩峩閩山靈轝何歸歸旐翩然云何不悲惟我同寮周旋最乆菲奠薦誠疚心疾首又路祭嗚呼武仲學甚富而命甚奇也氣甚髙而位甚卑也天畀之以才而不與以時也又嗇其夀使不及四十之期也一疾困之遽成九原人皆悼其不幸而同寮之心又何其悲也詩盟文㑹書名居以為永好非君主之而誰也青衫畫圖宛宛乎君之芝眉也炎天赫曦道阻且長丹旐翩然君將安歸也官則有守欲送不可惟君家暑行之無恙猶可慰我之思也祖奠于郊外向風長號不可及已嗚呼武仲知乎不知也祭湯寧海烈惟君之資如玉之粹惟君之辭如綺之麗來宰寧川政尚平易悃愊無華彈琴而治兹方及𤓰束擔歸計奇疾困之一旦長逝囊無襲衣室有孤累吏民興哀幾于罷市矧同王事休戚所繫不圖善人忽焉隔世雖有菲奠不得自致君其歸乎望望揮涕祭陳安人詹事良翰女兄旌表門閭同守倅台之著姓朱陳是推既生自陳朱子誠歸一門孝友累世不虧夫人贊之室家具宜之死靡他面割耳剺夫人視之婦道與稽夫人之姑年登期頤孝養既勤夀祉孔齊夫人之弟名德峩巍同氣是似為家門楣月評升聞寵光陸離旌表髙門彤史有輝某兹叨假守欽歎壼彞思播清風以勵幽閨爰設菲奠來瞻繐帷節孝有閭過者式之祭劉天台孝憲倅同守名父之子徒勞州縣悃愊無華夙宵不倦平易近民民罔怨咨生無赫赫死則痛之知君清貧賻贈加厚知君無歸謀葬山阜更率同僚奠此一觴君而有知庶其來享祭周侍郎代侍從惟公惟識淵沖智略輻輳悃愊無華持心近厚趨事赴功力瘁心疚險夷屢更介然有守五溪深入四蜀奔奏給餉數年簡在斯乆擢主大計亨途方驟云何末疾遽啓足手位不稱徳年不及夀急義首功可以不朽信息從班于公何有天其或者欲昌厥後某等為僚屬耳底藴未究忽拜繐帷孰不疾首乃陳斯殽乃酹斯酒矢哀以文公乎知不攻媿集卷八十四
