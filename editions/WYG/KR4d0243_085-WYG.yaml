body:
  text: 攻媿集卷八十五宋樓鑰撰事略髙祖先生事略樓某字子文其先婺人不詳徙居之始居奉化縣世以財雄于鄉祖以選為縣錄事有陰徳及人父某尤積善以古學為鄉人所尊慶厯中州縣立學掌教縣庠者數年郡學尋又延請至十餘年遂居城中為郡人登皇祐五年進士第調舒州廬江主簿祿不及親不欲出官以繼母無以養弟妹未成立具見辭墓祝文既歸遂致仕授大理評事其孝行節操如此自後又主郡庠十餘年為州縣士子師前後凡三十餘年號樓先生四明五先生某其次也成就一時人物甚衆豐尚書稷舒中丞亶俞待制充袁知府轂等皆其門人又羅提刑適自天台來學諸公學業既成舒公試鄉里袁公試開封羅公試台州一舉三處皆魁選其亡也舒公為墓銘豐公書丹袁公篆額羅公以仕北方不得預後為浙東提刑拜墓下用闕里故事手植數木今有存者祭文見赤城先生集中郡邑學中皆立祠碑志登載甚備莫教授冠卿一書尤詳子常光孫弁异五世孫鍔鈜鑰鏞六世孫汶皆踵世科异受知祐陵仕都司大卿前後知泗秀蘇州再典鄉郡居晝錦坊宣和初盗發青谿攻陷旁郡一路惶擾异調兵守備軍聲甚振羣盗望風而退郡境獨全以功進徽猷閣直學士諸孫以門蔭入仕者又數十人有文集藏于家行狀亡妣安康郡太夫人行狀亡妣姓汪氏諱慧通字正柔明之鄞人曾祖元吉不仕祖洙明州助教累贈正奉大夫父思温左朝議大夫仕為太府少卿直顯謨閣累贈少師妣恭人王氏累贈越國夫人明今為慶元府亡妣生于大觀四年歲在庚寅五月八日少師長女也先君諱璩曾以軍器監丞兼權尚書工部郎官知處州終朝議大夫累贈銀青光祿大夫先君之祖諱常朝議大夫累贈銀青光祿大夫父諱异徽猷閣直學士朝議大夫累贈少師兩家少師實為中表金紫無恙時始命締婚年十九而歸于我紹興十六年封孺人二十三年封安人二十八年封宜人乾道三年封恭人淳熙九年十二月先君捐館十二年鑰該郊祀恩封太令人十三年髙宗慶霈封太碩人紹興五年夀聖皇太后慶夀恩封太淑人慶元五年光宗聖體清安天子行慶于下封信安郡太夫人六年明堂恩進封大寧郡嘉泰三年郊禮進封安康郡不及拜四年正月癸酉以疾薨于晝錦坊之第室享年九十有五子九人鐊右迪功郎徽州績谿縣尉錫承議郎權發遣嚴州軍州事鑰顯謨閣直學士通議大夫提舉江州太平興國宫錧登仕郎鏘奉議郎知福州永福縣事錙文林郎監淮東總領所鎮江府太平惠民局兼户部大軍倉鋁鍨迪功郎温州司理叅軍鉼女二人蚤夭孫三十一人渢澡迪功郎新泰州海陵縣尉溆滌淳從政郎紹興府上虞縣丞濛潚從政郎紹興府嵊縣丞淜淶涔濚溗洎潗涷治承務郎況濓淛㵄洔潯浯濋㶕淔濡溍渟渥溧孫女十二人此下長適次適云云百餘字間空弗連屬今㮣節去曾孫男十六人棟機杓登仕郎椷枝樾槱格枚札桔櫑櫟机柯檉曾孫女十人第二人許適戴闓之第四人許適陳篚餘在室二兄及錧鏘溆濛棟第二第六第八孫女皆先卒先君葬于奉化縣金鍾之原將以十二月丙申奉亡妣之喪合焉亡妣幼而敏悟五歳從外祖教授雄州歴歴能道河朔所見及邊上風物騎射之詳日在親側凡箋書往來皆能記其人之名字親庭或有遺忘問之如響將嫁外祖曰吾之紺珠往矣數歳已能作家書越國賢明口授詩語教以裁剪紉縫纂組之類不待習而工平正端整皆可為法外祖為王府贊讀敵犯京師事定㩦家南京以歸亡妣及笄籨具遭亂散失餘又壞于漏舟不以為懟也先君自少清介亡妣實為合徳事李氏姑及伯父伯母如公姑之禮曉練世故謙抑遜順被服寒素内外交稱之先祖有幼女亡妣愛育如妹隨事教飭箱篚直與共之為擇良配遂歸王公正己仕至太府卿與之偕老王公之父提舉時方宰長興而外祖知湖州挈往郡治相與為結縭之助罄所有以送之王氏初得賢婦致謝再三是時亡妣年纔二十有七秖此一節過人逺矣自爾同先君宦游内助亷平言不出閫或有觸怒必勸使從寛有所饋予必贊予從厚故廬既碎于兵火先君仕不加進生計日削多寓外家亡妣因得盡晨昏定省之敬二舅出仕叅理家務上下歡服既遂終養執喪盡禮自以不逮事舅姑歳時祭祀蠲潔誠至必躬必親晩雖分命子婦猶臨視之先君乳母劉氏本中原人惠愛子孫亡妣待之甚厚卒老于家又以亡姑三人無後春秋皆預饗焉節序薦新未始少廢竣事飲福必欲家人俱集齠齔不遺暮年髪不勝冠或勸裹以烏紗則曰非所以為禮也謹守家法至于終身澹于榮利素不蓄財有則緣手而盡不喜為時世妝沖靚雅正無珠璣之侈飲食有節靡務精鑿毎言避宼時僅以澗水進脫粟飯有饋以豆豉者其甘如飴今日所享不翅足矣篤于教子至質貸以供束脩諸子粗有成立或問何以為訓曰平生不曾對兒輩出一不義語故薰染至此耳一視九子無嫡庶之間方授室時視家之有無以為豐殺平心處事自無間言其遣嫁女孫亦然女孫有嫁及逺適者多誦北方安夫人之詩有曰女長終為婦親邊不是家睦婣存古訓勤苦是生涯之句以勉之先君有再從弟妹幼孤無依取而育之亡妣為畢其婚嫁其他解衣為助者不能悉書也喜周人之急家藏奪命丹秘方歳營珍劑以為施治疾起死甚多先君在烏鎮時友婿陳公膏已自御史貳外府亡妣毎聞有除目則為女弟贊喜遣賀惟恐後無分毫羡慕及欿然之意少卿忽下世輕舟入都以慰之其達識類此嘗在親戚家聞從子過省之報喜不自勝坐中以夫夫人之子也問得其詳唶曰心地乃爾耶先君夀終固已難堪未半載而嚴州兄又以毁卒亡妣年已髙皆憂其不能處而曠度了達晝夜之哭哀至若不可解哭已則胸次豁然起居不改其度人尤以為難鑰守永嘉迎侍為八十之度暇時領婦孫周行郡圃不假扶掖擷黄甘以分啗略無衰相鑰亦仰體慈訓不敢以嚴苛臨民在後省嘗以封駮乆不決跪以告曰朝夕且得嚴譴恐一有斥逐徒驚尊抱莫若先歸故里脫不可逃寧身當之亡妣曰我亦念歸乆矣盡室為之東下嗣歳復來時仕者間自引去同列或謂鑰曰子有親老可明告于朝使子弟奉以歸非他人比也鑰亦以告亡妣曰吾兩陷圍城中還鄉又脫宼厄以是知生死真有定分在此則猶知事宜外方傳聞多過徒亂人意鑰竦而承命不敢復請聞者無不歎服鑰自吏部尚書謀補外亡妣聞之曰可去即去毋以祿位為累也既歸見親黨道舊故甚自適也越國生二女一子仲舅尚書諱大猷引經告老而陳氏從母之子諱居仁為中書舎人終華文閣直學士里有一舅二甥三學士之語從母及舅母亦皆封贈至夫人外門切鄰亡妣年九十尚書公亦八十里之族姻孟春為慶既報之又合樓氏年過七十者男女二十餘人别為一席以侈其盛仲春為尚書慶酬酢稠疊奉為重客季春又夫人生朝也簫鼓之聲幾無虛日未幾聖朝推老老之恩亡妣授郡封尚書公進直學士郡太守致上命羊酒粟帛之賜焜燿兩家先君在日固已贏八十口逮今二十許年未問納婦及婿惟孫曾子女增四十有五人童丱滿前愛撫惟均歡笑雜沓不以為厭問安直頷之而已晚歳備福誠世所鮮儷也奉佛素謹甫三旬已閱大藏經取龍龕手鑑以正竒字越國嘗再誦及半又與二舅補之近年猶作梵唄時舉因果以示人晨餐以前無非佛事寒暑如一晝靜多觀大字未見之書不問多寡必自首至尾而後已書傳過目如素所習諸史舉大端興亡之際賢否之著者類能道之稗官小說所見尤衆性復善記非出彊勉二族交婚如朱陳然親連至多姓第之外姻婭宗𣲖如燭照數計後生取質焉及見宣和盛時暨靖康間事言之皆有端緒如痛定泣血等書間能指其不然者後得夢華錄覧之曰是吾見聞之舊且謂今之茶褐墨綠等服皆出塞外自開燕山始有至東都者深歎習俗之變也太師史文惠公丞相魏文節公見必加敬數年間遇舉夀則大資趙公郡侯洎倅貳而下俱集或歎曰人間縱有此夀若斑衣珠履之盛則未之見也既倦于行或過諸院近則鑰輩抱持稍逺則子若孫親扶板輿每過笑以為樂客或求升堂苟非有疾未嘗不見問勞周悉旁及其近親之安否談舊事不少差咸仰神明之未衰也燈前則與諸婦為依經馬之劇或至夜分不倦去年方覺頓弱雖齒豁體羸已乆而耳聰目明如鑰比䝉恩與郡以九十者家不從政力辭亡妣亦以為然疾既革元日猶自力危坐以待賀者鑰痛念嚴州兄祿不及後郊恩以奏從子澡歳首受命亡妣猶能以手加額六日忽命浴且理髮自此叩之則應不復出語面西側卧時若㣲哂三日不動以至屬纊殆善業之報也仁慈薰然待妾媵有恩人人懷感不待鞭朴而自馴服去者必使得所歸閭巷匹婦有來者一以恩意接之故弔者無不盡哀聞者無不傷歎已而大資率鄉之士夫近百人制帥尚書黄公郡縣官及鄉校正錄而下各來致祭多有哀辭以形容甚羙與哀榮終始之備且言上夀全福無可憾者嗚呼人子之心豈有窮極況自父兄凋喪以來母子相倚為命年彌髙懼彌甚不敢一日輕去膝下而天祸我家遽降酷罸不孝罪逆以至于此尚何以生為哉方忍死以襄大事追惟吾母淑質懿範著聞逺邇若其容徳廣大孝敬淳篤髙明諒直慈祥清粹曲盡人情而動依大義非惟閨閫之賢婦所不能及有烈丈夫名薦紳之所難能者不肖子鑰自省事以來親見實行聞格言舊矣是敢泣血具載以少伸哀痛孺慕之誠非不欲極意贊揚而屏伏苫塊肝膽潰裂魂魄紛亂不能盡究始末以發濳徳窀穸有時未敢求銘于當世大賢輒援曾文昭公亡妣之稱效后山陳公先夫人行狀之體敬刋之石以對先君之碑銘以示子孫使毋忘哀哉餘生無母可事長號擗踊冀相尋于九原之下耳嗚呼痛哉嗚呼痛哉孝子樓鑰泣血謹狀先兄嚴州行狀曾祖常故任朝議大夫累贈金紫光祿大夫妣翁氏贈永嘉郡夫人祖异故任徽猷閣直學士朝議大夫累贈少師妣馮氏贈秦國夫人馮氏贈魏國夫人父璩故任朝議大夫主管亳州明道宫母汪氏封恭人先兄諱錫字予善一字申伯世家明之奉化今居于鄞葢自我髙祖正議先生始四明之樓實出于東陽不知所遷其可尋者自兄以上才八世先生以古學教授鄉後來者又繼之衣冠彬彬焉先公嘗以軍器監丞攝工部郎有忠厚亷平之稱太保魏國史公為墓銘生九子兄其仲也兄天資穎悟精力絶人自幼從學迥出流輩年十三游郡庠三山陳公元裕典教事鑒裁甚精兄一試占髙第祖居遭建炎之燬依外家以居先公攝事平江母氏攜伯氏繼往兄已能理門内如老成人自爾舉業之餘幹蠱尤篤樓汪二族吉㓙㑹集人夥事叢他人智力所不給兄為主辦則應酬中度談笑自若遇事有膽略不怯不躁委蛇曲盡無劇易必舉故雖未冠而中外親識已極口稱其能而期用于世矣先公乆欲問舎而無其貲兄承親意竭力圖之銖積寸累以立堂宇先公懷太守章歸寓奉川兄慨然曰親年益髙兹可緩耶入城謀度日以就緒落成奉二親定居而後待行葢一力任事米鹽靡密有無相通以全其家者幾二紀隆興二年以先公遇郊祀大禮奏補將仕郎乾道改元中銓授右迪功郎秀州司户叅軍先公赴處州兄率諸弟分掌家務鷄初鳴時左右至受謁聴訟則俟于屏内公退候伺顔色承命惟謹書尺之繁委行李之往來一不以累先公之心故先公專意郡政無有内顔既赴户椽太守徐公蕆曾公逢一見如故交事多資決糾曹懵甚守方委兄恊濟俄有㫖使錄事曹典獄漕使吕公正己行郡部民有訴獄寃者以詰糾曹呿不能答兄前曰兹事甚明是時新制未行錫預聞之因引姓名歳月與事之始末辯數明暢四座屬耳吕公歎曰作吏不當爾耶顧吏一依兄所言糾曹得解而訴者伏辜㑹鎮江有軍校訴于朝且自言乆掌軍用力校貸錢以萬計知其欲訴將殺以滅口脫身而來後必有追者出此門則不得生矣丞相虞公駭其言具奏于上先令郡置獄盡繫所訴者欲遣理官以往今丞相梁公方叅大政慮摇軍心請敕漕臣擇州縣清强官許以理寺推獄行時胡公昉新為東漕與吕公合詞薦兄吕言秀州事胡曰自淮南易節以來密訪人物至秀稱樓君者如出一口徑取㫖以檄兄二公使來見面趣之行兄曰事闗軍旅君相所屬意錫試吏未半歲豈應預此二公不許曰隆暑不可乆繫獄吏已候于郊外數日以待子之來也請械軍校以自隨途中時與之語鉤得其情比至桁楊滿庭所繫有官横行者兄以所訴貸錢之目詰之皆曰誠有此而悉已償矣各以左卷來有須㑹問于軍者頌繫一二餘即日縱遣復引訴者謂之曰爾妄明甚察爾之情欲逃而死耳上㒺朝廷下駭軍伍死有餘責即吐實尚全爾生其人頓首感服一箠不用僅三日而竣事大理吏跽請曰事體甚重今遽已後必有悔兄曰我不知觀望惟盡其情而已汝第為我行文書他日有責我當任之既出尚書蔡公洸為守握兄臂曰何其神也始得制書府庭為之震動非君來某亦無所逃責然尚疑兄年少氣鋭或有疎略因為備言之唶曰弗可及已歸塗比文案該叙請密老獄吏所不能為二漕聞兄及門大驚既見道所以喜甚曰吾二人舉士不謬矣亟呼吏草奏兄曰已具于此讀之又大喜過望涉筆書名即攜兄詣丞相府先入白相唯唯問安在自賓戺徑以便服謁見色尚不怡曰折獄誠敏然訴者肯黙乎亦得所謂伏辯者乎二漕相目兄曰伏辯有二如使吏曹附口語代書辭容有誣服今其親筆也袖出囚辭數百言視首辭筆跡不少異又無一字揩改注乙者相始大稱賞且曰使者誠知人翌日與梁公奏聞上為之嘉嘆因共薦兄謂如此等人不應使沈州縣請以中都官處之適左帑吏有巨蠧既正典刑以兄監都門相謂兄曰是何足慁子特不欲使子捨祿而遲次也既就職潤色成法隨請于上積弊寖銷在法譏訶出入得其過失者賞有差故雖名同事而偵伺甚嚴或成仇隙兄曰吾儕為國主藏任責匪輕各謹攸司錫亦不願得此賞也由是相處甚歡而事益集南庫闕官朝旨命兄兼攝兄視寶貨品目至繁而位置紛糅躬督帑吏彚分之各得其所列屋有定數而總其凡于籍標識粲然未幾上忽遣中使臨視兄執籍取物如探諸囊使無以返命即取屋角敝繒將封以歸奏官吏失色兄徐曰是非軍衣所需葢裒以備賜花等用數實若干籍具在也神氣湛然使無以詰尚書張公津曰某號典領初不得親臨胥輩又不任事㣲君吾其殆乎張公由此受賞兄不屑也任滿主管都茶場㑹子庫闗陞右從政郎上方留意楮幣兄服勤其中纎悉明備凡事皆立成規吏不得搖手日造萬紙無不精好一日謁丞相曾公有同僚力言省罷之便兄立其後具聞之僚顧見兄踧踖而退兄亦不之便果罷已又進謁曰相君曰國家賴楮幣以資用度今罷已何敢復言然度必復于後吏曹失業散之四方他日恐難遽集况作偽者他皆可為惟貫百例不能亂真故多敗此曹無聊若冒為之智者不察也願擇可用者分隸官司使得以自活丞相曰子不謀身而逺慮及此即白于上如兄言旋攝主管尚書刑工部架閣文字遂為真職最清簡靖共自守垂滿欲詣銓部時史魏公再相素以兄為可用力薦上前丞相趙公又舉鎮江獄事贊之且奏曰是時虞某即欲處以職事官今丞相雖知之尚避鄉曲之嫌未敢遽言上曰朕猶記向時事信可用豈應顧小嫌耶遂除詳定一司勑令所刪定官以薦章及格改宣教郎時方修一司一路酬賞法取諸路專降指揮五千餘項立條一千三百繼又編類海行法兄夙夜疚心筆削損益多出其手書成奏篇轉通直郎輪對首誦主上孝儉之徳上曰朕之即位卿預觀否對曰臣是時雖不及見今叨朝列冬至正旦親見陛下拜太上皇夀真千古盛事也上顧而笑再奏請明詔有司議立科目凡是則是傚有一于此者令郡國察舉以聞擇其尤者尊顯以風厲天下孝者舉則忠臣可以求亷者進則贜吏不必治又論乾道修法乆已奉行間有牴牾重加審核雖已出于睿㫁修定新書止緣頒降尚遲州縣無所依㨿胥吏因得為姦反致淹延獄訟欲望頒行使得遵守續有陳請自編别敕仍下諸道且用舊法理㫁免致因循待報遷太府寺丞又以輪對論紹興和買事謂㑹稽一郡賦額最重然經界之初物力及四萬錢者始敷一絹今乃半之既無物力之增徒有科敷之倍止緣下户舊與免科聖朝優恤之恩反為豪户欺隠之地上焉者財力豐裕與吏為市莫可究尋盡以本户之田析以占籍五等分立砧基多至百本卻致中産之家和買歲增偏重已甚乞以産錢均敷不復更問等第議者必曰始科不及下户葢恤之也今反加賦可乎是大不然今名為下户者實富室也真是貧乏十無二三若仍舊貫不為更張則必盡歸五等之籍無復可敷之絹矣又言身丁錢者皆出于下户欲將所取之額總計為絹若干與和買絹數合為歲額止以産錢均開上户雖就和買敷身丁而和買之敷則頓減下户雖就身丁敷和買而身之免丁則甚優上下各得其利而官賦所入無虧鈔書仍以和買身丁為名用防異時重疊倍敷之患若有丁無産之民則又可以全免而為太平之氓矣上褒嘉再四且曰卿所陳利害甚明朕即為􅏔漕臣與郡守共措置而又論左帑權出之弊謂出入之吝具有科條物貨權出勢不能免此等既非正支止是私置文記遇出即注纔入即銷雖有據憑終難檢柅萬一乆假不歸因有重出不無姦弊欲從外府印給二簿付都中兩門專記權出之物門者以時拘收太府每季稽攷上曰其弊如此朕殊不知即命行下至今遵用之宣諭宰執天語甚寵兄前後再對所陳九事皆䝉睿奬今錄其施行于時與其最著者遷大理寺丞獄人之司命廷尉又天下之平因所當謹兄尤恪意從事謂天獄追逮非他處比一夫所向閭里驚搖每見吏牘必詳究其人擇不可已者始稟卿長而行之既至則窮日之力親加聴察茍無用拘留則亟去之或先有案卷者豫審事節一問即得故囚之宿于獄者寡拷掠尤稀闊視之如傷情實俱露而猶有為廋隠者僅施十數囚徒至前未嘗厲威以臨之斥退吏卒使得盡其欲言遇有婦人孺子深以驚迫為戒適有大獄三數皆晻昧翻覆最為難事兄究見底藴處㫁公平不為勢力顧忌亦不詭法以惠姦軍民鬬訟例送寺中是非立決率皆厭服而去由是廟堂相知愈深士大夫則曰此真得人矣始至寺吏曰是為初官時能決詔獄者乆之熟見兄官業咸謂未之見也兄乆去親庭力求外補九年四月差知嚴州時謁告歸省拜命于家未幾交代奉祠有旨趣行不俟臨遣便道之官九月到任郡更旱潦之餘財用空匱陋不成邦逋負動以千萬督責交至以郡計訪寮屬具訴煎熬困急之狀先是曹掾筦庫之官分往諸邑公吏五百又旁午于道日不暇給兄曰郡尚可為也何亟如是悉使歸之一跡不留也諸邑既已肅然然後使來受要束盡取財賦本末審緩急之序與夫當蠲而未蠲已發而更催者人皆得以自言首尾七八日朝暮相處如父兄之詔子弟凡可蠲者落筆掃盡其他或為之倚閣或為之分限其應輸者皆指期至郡倅貳以下爭以為不可兄不為變邑無官吏之擾又罷無名之斂期㑹寛而信欣然承命以行且各置二歴緘以紫囊公文之外守宰欲有所言親題歴上不時往還吏不得預聞其間脈絡貫通了無壅滯文移簡寡上下安便及期無一金之負寮吏聳服郡始少蘇矣木栰出于歙郡由城下以趨錢塘郡帑賴此以濟比歲苛取商賈不通兄為之簡節疎目按舊額而寡取之㑹計甫畢牙儈一為保識即縱之順流而下賈人更相告語來者益衆以故三閲月而錢之入大農者踰十萬緡曾不倍征也版曹漕司差官相踵至則與之道其所以然甚悉又隨所索而應之相與嘆其通敏且曰下車幾何時洞徹乃至此耶歸語諸長故兄之譽益彰民訟多据案親決各適其平受責者亦無辭舉手加額稱誦神明者相屬也外邑番訴間取其甚者自處之必窮其情狀而抑彊扶弱不為己甚有訴喪衣囊于津亭者期以餔時必獲已而果然學校頽圮所未暇及兄為之區處表裏一新像設嚴整士類感嘆人不知役或以疑事來諗從容響答動中要領而以愛民近厚為先務近城本埸苦于潦水築墻則善隤挿籬則易壞或以請兄應聲曰種木以環之則可乆矣聞者以為難及大率迎刃而解庭無留事馭吏接物廚傳賓廡下至舟子軍士之差次具有方略人情翕然愁歎之聲化為謳吟傍郡之訴于監司者亦求直于兄其感化流聞有非人力之所及者十二月丁先公憂徒跣扶喪哀感行路郡人如失慈父設祭于道者相望巷哭以送之在官僅八十餘日人謂良二千石終更以去者未必得此户部侍郎曾公選當今吏師謂人曰試郡而辦事者有之若樓嚴州為政平靜百廢具舉雖老于治民者未易過也既歸追慕摧割不可解于心力貧謀葬顔色深墨十年四月感疾去卒哭未逺也閱七日至五月丁卯竟不勝喪以歿嗚呼痛哉享年五十官至承議郎娶馮氏封孺人子男三人澡濚滐女一人適承務郎新知紹興府餘姚縣蔣綸將以十一年八月壬午葬兄于奉化縣龍潭正議先生之墓左澡錄兄之行事以告于鑰與之相抱持而哭語之曰吾忍言哉子之所不知者吾為汝書之嗚呼兄之所以過人者天才之優也然人之有才者或量不足以容物或學不能以自將恃氣而兀傲矜敏而怠惰察以為明嚴而近刻為已而嗜進計利以自豐者間有未免惟兄器度恢洪莫見涯涘受人之觸傍觀為之憤怒而辭色不少異朋友同寮所閱多矣無不得其歎心居家作吏幾無暇日而學問不倦尤好說詩得風雅之深旨兩薦漕臺卒困于南宫筆力日進動翰如風對客作書真行俱精瞬息數函不見其勞嘗見徐公兢作篆心顧好之下筆輒工好事者爭求扁牓流傳甚多晚更斂制稍尋斯冰之體近方攷證說文仍集張氏復古與鍾鼎遺文從韻昈分欲為一書竟不就餞别慶賀間為詩詞皆清新切當壓倒坐人此其見于外者至涵養饜飫增益徳性委運自適則又其所安也和氣薰然無貴賤長少與之盡禮人有所求惟力是視告以急難必傾身以應之或就之謀事先䆒情實能道人胷中之欲言者為之致曲不翅已事人亦感其誠而許之故率能如請者之意濟則如身得之喜否則介介若有失焉葢其資性篤厚雅存濟物之心而才又足以行其志此所以為不可學遇有不可亦必曲為其言所以不可者以曉之人亦不以為忤克勤小物略不茍簡所居一日必葺船居旅次容膝之地亦務整潔創造器用巧思横出人取以為法終日矻矻有古人運甓之志每日勤則不匱一有自惰則不足以立身矣人之情偽絲髮不能逃而自晦其明含垢匿瑕如弗聞者動有規矱不以己長望人人有弗及率歸于恕徊翔筦庫知已滿前不一登權貴人之門昔人所謂性至通而自然有節者兄為近之心計有餘使之利析秋毫有不足道而䟽財尚義不問家之所有貧無告者時推以濟其須俸入不足以給用而食客無虚日間遇士子就試親賓坌集兄豫為館穀之計帷帳器用咸備手行觴豆彌月無倦色少間又問勞其乏絶商㩁文義人人自以為親已婦家寖窶輟衣食之資以助之外舅姑之喪及葬皆兄為之存歿無憾再從弟鏞幼孤求師所在兄曰是吾叔父子愛子也飲食教誨積數年遂入上庠東陽有族子曰溥以窮來歸兄育其數口又為謀資身之䇿温飽至今少游西安與張元晦汝明厚善乙未張赴省闈兄取其新作讀之曰君文誠工而乆不售者正坐用意太深為取前三年程文數十通使熟觀之曰是未必勝于子惟以筆端無滯礙耳張爽然悟場屋中一揮成篇既在選謂所親曰吾霑一第益友之賜也其于故舊類此嗚呼在私門為亢宗之子在公家為有用之才徳之感人者深惠之及物者廣況復容貌頎偉素少疾病謂必將建立事功為時聞人而止于此是可痛也故斂之日親戚交游下至閭里耋穉皆相向慟哭搏膺盡哀傳聞訃音交相驚悼乆而後信之至今弔者尚未絶也兄亦自度抱負不凡抗志宏逺紹興和買之請既行郡民聞之無不鼓舞且曰不知是何官來惠吾州耶帥奏催科方急未易遽改上尤注意令候省限滿日取旨近臣復有請者遂遣漕臣以行僅能蠲減􅓖宫及寺觀撥賜無名之額終未能盡如兄之言兄深惜上意之未究益訪利害期申言之而無及矣兄之齎志于地下何止此哉嗚呼兄之孝友篤矣伯氏喪于丹丘星馳䕶喪治葬撫孤甚有恩意第八弟鍨之生先公以多男子之故命兄育之撫愛如子以至成人澡之居喪鍨實同力以報焉方伯氏之亡而諸弟尚幼每與鑰相語曰仰事俯育之類吾二人分任之鑰自度才具智略去兄逺甚一聴命焉而悉以意佐其傍處宦從宦更為勉勵欲寡其過以毋貽親憂官敕局丞外府適相後先連簷以居並轡以趨非敢以為榮父母俱存兄弟無故誠人間之一樂也先公七十同歸拜夀壬寅屬疾又同時省侍己而先公益安而兄得輔郡奉雙親西上鄉曲艷其盛丞相史公魏公率里之士夫大合樂以送之兄曰當以一身服為郡之勞而使家女子子極奉親之歡躬調旨甘又間以政事施設具言于庭闈以請益甚適也不幸天禍我家先公棄諸孤兄號慕深切大事未涯百口仰給憂苦鬱結以殞其身天乎哀哉游宦許乆不足以餬其口生事日廢幸能以器業自奮改秩纔四年而得郡紱卒不及澤其子竟何為哉竟何為哉今日之事固有能言之者豈真有定數不可逃耶世言陰德隠行有益夀之理未問兄之平生以棘寺數月治獄平允之心嚴陵一時臨民循良之效亦宜得祐于神明而大禍之餘復不自免福善禍淫豈又有時差耶不可曉也垂白之母晝哭之淚未乾而重以晝夜之哭門户責任之重以兄當之猶懼不能勝鑰何以堪之嗚呼不可活矣與澡等忍死以圗窀穸之事又雪涕以書此或曰子之志雖切詞不亦太繁乎鑰泣曰吾兄之亡㫁吾手足不足以喻其痛且重悲夫人品才氣如此而不得顯于用特書屢書猶未能形容大槩以寫吾之悲也吾暇文乎哉乃號號授澡而使之求銘焉謹狀攻媿集卷八十五
