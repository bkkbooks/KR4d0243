body:
  text: 攻媿集卷十四宋樓鑰撰今體詩趙路鈐不枯輓詞蚤嵗游金闕霞冠拜紫宸可堪天寳亂及見㑹昌春宛宛王孫態飄飄物外身靈光愴陳迹遺老更何人諸父論交久忘年許預盟豋山陪躡屐泛月共飛觥來往開三徑安閒羨一生山深凄薤露愁憶醉歌聲姜總管浩輓詞及見開元盛曾聞正始音雕蟲徒壯嵗冠鶡豈初心論事風生席疏恩帶錫金精神空滿腹愁絶病沈沈富盛俄遭變艱難却起家田園新活計詩禮舊生涯仙桂應傳秀庭蘭更茁芽眞歸了無恨超徹妙蓮華祝通判鍔輓詞坦坦曾無我休休早見㡬虚舟寧忤物抱甕自忘機老去心逾壮歸來事已非賞延推不及有子尚家肥花縣弦歌化蓮城水竹居舊寮情意厚近别音信疎不作三刀夢空垂别駕車新阡何處是東望倍欷歔裘參議子紹輓詞累世朱陳舊宦游多向鄞飛鳧觀政美展驥愈情親久草歸田賦欣迎入幕賔斯人忽千古望斷剡溪濵玉立期清貴龎眉望壽齡父兄嗟奄忽姑姊亦凋零厚德今誰在佳城慘欲扃孫曾聞競爽蘭玉在階庭朱坡史居士輓詞巖邑富人物才惟史氏多流傳有丹桂遺逸嘆朱坡學飽終難售詩成秖自哦空餘著書在令子挹餘波交友俱名士儀曹禮意周使華臨夏口詩興共南樓喜得江山助還同汗漫游更煩賢宅相相與發潛幽戴縣丞機輓詞小戴久仙去何堪更哭君舊遊驚昨夢陳迹愴遺文晚暮期相與死生俄遽分銘成媿贊德揮淚望新墳高士終為薄豈惟勾小稽鸞凰雖在棘桃李自成蹊官府資闗決儒流仰品題定知餘慶遠遺愛滿雙谿方興化叔珪輓詞廟乏著靴鬼夢中言更明起家尤感勵為吏極廉平薦口聲名重朝行去就輕奏篇真確論何日遂施行鴈塔深論契鵷班試著行參亡聞易簀越弔後除喪支郡難留鄧佳城久夢方吁嗟德浮位回施與諸郎戴迪功應龍輓詞猶記天街㑹同為乳竇游姻家頻㑹聚親意愈綢繆吉德冝多壽奇疴竟不瘳無由見安道汎雪悵回舟好學數仍奇躬行家遂肥時將詩自樂晚悟世俱非教子惟黄卷高門看緑衣阿連悲未泯無淚為君揮王通判琰輓詞世篤青箱學驊騮更著鞭半山分近派巖壑誦新篇竹馬迎雙舄棠陰憶二天黄扉伸讜論風節尚翹然才具盍時用拂衣俄去之善藏經世手回施稱家兒嬴博延陵恨人琴子敬悲連年事如許天道杳難知姜鍾離柄輓詞門户期興起交朋務琢磨反身求大學決意取儒科贊府聲尤著鄰封惠亦多傷心濠上路無復聽絃歌别去期三載伻來痛一書死生誠大矣力量果何如平日真知我遺言苦問予作銘雖不愧回首自欷歔顧養直義剛輓詞萬頃東湖下曾門起大家子孫昌世業文字作生涯堂後萱猶樹庭中桂欲華惜哉時不待誰忍送悲笳舊向君家去冝齋屢舉觴人常誦諸顧里不見他楊身世驚春暮湖山愴夕陽園林未成趣鷗鷺亦凄凉李度支嘉言輓詞忽作堂堂去門前雀已羅夢隨弹指斷事向盖棺多心繫六州鐵身傾千丈坡喑喑晝夜哭奈此敬姜何孰匪同升素君于我最親詞章傳自舊翰墨恍猶新别去情逾篤歸來迹遽陳無從效經紀悲結淚沾巾何司業伯謹輓詞頃嵗遊孤嶼名門説二何胡為終璧水自合上鑾坡器重連城價心澄古井波傳家衣鉢在袞袞並儒科骯髒陽司業作州如理家源流知有自悃愊信無華方喜亨途遠俄驚暮景斜傷心傾盖舊何處望東嘉王遂安時叙輓詞淮水古王氏生平熟義方三珠欣競秀兩桂早聨芳才大用何嗇源深流自長青氈傳令子一箭取雙鶬問學自冰翁詞章聳巨公不慙循吏傳真有古人風捫蝨書猶在飛鳧迹遽空人琴悲子敬三讀愴深𠂻周左司頡輓詞從政心無愧敢言人所難精忠憂世切清節照人寒交臂失持槖乞身終考槃老成今已矣西望淚汍瀾乙丑慈恩㑹今㡬六十霜軺車來握節相府記傳觴詩藪懷高隠郵筒見短章不堪千里隔丹旐想飛揚蘓江陰十能輓詞萬卷蟠胸次千篇秀筆端朝行期奮迅賢路竟艱難雖號循良守欠為文字官遺編幸無恙留與後人看伊昔初傾盖摛文已甚工親聞南澗語謂有魏公風既往言多驗歸來道更窮誨言非教佞後裔報冝豐魯少卿訔輓詞棣蕚儀鴛綴翛然兩鬢斑時清嗟嵗晚遊倦得身閒人在羲皇上經傳伯仲間桂枝芳未已何止倍燕山六十年間豋科者十人前輩風流泯靈光獨巋然指囷推甲族跪履記丁年有子傷埋璧惟翁亦蛻蟬功名雖已矣千載尚遺編陸郎中沅輓詞壮嵗聨雙㨗衰年困百罹肉身心佛子霜髮貌嬰兒萬事㡬樽酒百年千首詩浮生成夢覺吾道竟何之從弟忝東牀相從二十霜人琴一何苦冰玉兩俱傷别久成今昔歸來失老蒼稽陰終反葬西望倍凄凉梁仲蒼輓詞延賞高三讓殊科擅一鳴元賔文未極長吉記先成妙語遺膏馥𤣥談悟死生行人痛埋璧父子若為情人物如君少相期上石渠博文該四部篤學富三餘淚盡知無及交深未覺疎何時酹墳草細讀茂陵書王檢正回輓詞到處稱循吏星軺復郡侯威名致降虜恩信感亡牛省闥主公議祠庭尋舊遊善人天不憗愁絶峴湖秋客授䝉傾盖朝參喜綴班開藩才一水去國遂千山晚遇名方重言歸鬢未斑功名付諸子含笑謝塵寰彭宣義汝知子復之父輓詞種德不在大至誠天所親但能存一念何用活千人經笥儒風遠香山句法新功名付兒輩不必在吾身籍甚清湘守修名所在聞宦途資畏友家訓仰嚴君歸路飛丹旐長空慘白雲生芻不成奠揮淚想江濆朱婺州安國輓詞治行古循吏風稜真諫官鋤姦清遠徼持重息羣讙久弄趙堯印重彈貢禹冠去天纔尺五惜不見長安莫銅陵堂輓詞經學高餘子躬行慕古人儒風三葉秀和氣一門春台嶺漸摩久銅官撫字均庠東亡二老凝望淚沾巾張泰州禮本輓詞燕趙多奇士如公名不虚胸中九域志筆底百家書報國心尤壮籌邊智有餘功名竟齎恨西望倍欷歔徐季節輓詞公府推徐穉山陽薦仲車盛時遺此老沒世竟窮廬行道嗟無命傳家幸有書魯山終不識撫卷倍欷歔周德遠輓詞家世傳儒業鄉邦聳義風將迎無倦色交友盡名公太學飛聲早浮生轉首空怡如堂下月猶照紫荆叢汝能之兄余承彦輓詞户外諸生屨門前長者車柳袍空自染瓶粟竟無儲隠行刑宗黨清風照里閭沈冥誰為表賴有子雲書李堯卿唐佐輓詞里社久相從知君陰有功救人多藥喜持論耻雷同素業諸郎在浮生一夢空凄凉宋清傳健筆媿河東方運使有開輓詞聖主一見決孤忠自致身籌邊滿軀膽處事掇皮真氣直老彌壮言高用未伸留屯十二事公論付淮民王觀國覲輓詞晚識三株樹方知獨笑翁舊遊虧半面遺恨想高風小楷墨猶濕殘膏澤未窮梅花縞寒夜埋璧衆香中沈朝奉雲章冝之之父輓詞相業富青箱丁年稔義方生兒有如此與世遂相忘終老三牲養凌晨一炷香浮休了無恨流慶尚深長孫子才輓詞身後名何用人亡意愈深盖棺悲昨夢掛劍答初心潛德仍能發遺言尚可尋悼元情更切接隴柏森森潘安仁懷舊賦既興慕於戴侯亦悼元而哀嗣墳纍纍以接隴柏森森以欑植元謂道元楊戴侯之子也梁運使輓詞風月詩千首烟霞宅一區三年著朝蹟一節僨亨途南海瞻遺堞西門破老巫才高不盡用無地寄長吁翁府君輓詞骯髒翁夫子高才噤不施牀頭癡叔易夢裏阿連詩德喪嗟何及天胡不憗遺清風終未泯吹折謝庭芝徐府君輓詞孺子人如玉功名不在身死生齊物外孝友篤天倫已有傳家子曾充觀國賔他年芳五桂傷不見靈椿魏監丞叔玠輓詞元老餘風烈優游挹美官朝行喜銀艾鄰好許金蘭醫謾肱三折生惟指一彈難兄秋夜感風雨舊盟寒族兄道州輓詞出守舂陵遠相思瀟水深精神雖滿腹撫字亦勞心人去成一古書來失萬金懷哉季公諾已矣漢碑陰周太博汝能輓詞雨漲雙溪水風高五柳堂論交成莫逆撫事秖堪傷訪雪無回櫂面山空夕陽亂鶯穿緑樹誰復為傳觴寧海駱君季友輓詞古易人皆學惟君志益堅研硃滴秋露讀簡斷韋編空谷甘無用佳兒尚有傳清風誰得似竹滿卧牀前臧温叟春卿輓詞白首行逾恭鄉評敬此翁心開上池水氣襲舞雩風禮貌諸公厚聲華一瞬空臧孫知有後三世著陰功陸宣城梓輓詞奕世承家學諸公薦吏能政傳花縣美心與練江澄易簀去何速攀轅悲不勝傷哉嬴博葬淚盡老延陵寧海劉君次臯之父輓詞不識紫芝眉空傳有道碑義方真可法闇室豈容欺未覺山川改深明晝夜知薤歌慙不稱冢子素能詩宋南雄价輓詞二宋久云遠遺風君庶㡬才華試文戰政譽藹王畿梅嶺方騰最雪谿俄賦歸情親今已矣老淚不勝揮莫子執珪輓詞樂有父兄賢談經絳帳前桂林孤素志芹泮老遺編小阮情何切童烏業未傳橰閒最崇篤口口話齊年繆伯恭輓詞我實由汪出垂髫托外門非惟拜先德猶及見新婚謹厚推鄉曲恩慈篤弟昆善人今已矣餘慶在兒孫吳通判輓詞一死交情見鄉評重此翁素車奔夕夢繡被落天風身任朋僚責心忘尺寸功毋書卓行傳非介亦非通趙縣丞彦棠輓詞玉立佳公子哦松始戍瓜拳拳飭邊瑣寸寸畫江沙慷慨志憂國清修僧在家送行詩尚濕身世遽空華石通直荘問純度之父輓詞籍甚新昌族真成萬石家源流端有自悃愊更無華奉職冰同潔持身璧不瑕慶門傳未艾蘭玉茁新芽胡監嶽祗叙輓詞賦就八叉手文高三折肱青衫雙鬢雪黄卷短檠燈夢斷采芹水神凄下馬陵諸郎追五桂洗眼看飛騰趙司户琇夫輓詞奕奕佳公子詞場早策勲願為新進士終屈病參軍舊事成清夢高標想斷雲傷心桑落酒無復到孤墳端明殿學士王公希呂輓詞片言寤主上亨途㡬向專城佩左魚羊陸遐衝雖坐折高文宿憤竟誰攄平時屢草千言奏垂絶猶騰八難書漢殿履聲今已矣兩州遺老倍欷歔短檠鐵硯用功深萬卷蟠胸不輟吟故國遁身來濟岱壮年發藻向儒林愛民利物平生事憂國忘家一片心史館頃年陪潤色挽公無路涕盈襟陳文恭公康伯輓詞唐虞千載道重光奕奕元臣任贊襄謝傅風流冠江左晉公威譽比汾陽折衝曾不勞聲色輔政惟先振紀綱天意高高誰可問坐令邦國歎云亡德量汪汪萬頃陂直將去就佩安危干戈雖在相尋日休沐宛如無事時奏罷未聞宫漏轉歸來俄見哲人萎哀榮終始誰能及百世旌忠頌德碑王修撰輓詞十載頻褰刺史帷名卿風裁映紳綏慶門共仰聨三鳳禁路咸嗟欠一䕫神武衣冠終遂志平泉花木總成詩傷心積翠樓前月斜入欄杆欲向誰賤子何能值一錢夫君于我獨知憐樽罍談笑㡬侵夜琴劍周旋不記年此去空懸徐孺榻重來無復孝廉船百身願贖嗟何及哀涕霑襟如迸泉何内翰溥輓詞豪奪錦標天下聞慨然有志整乾坤諫坡論事言皆合帝幄談經道益尊千古高文在鼇禁一時名士上龍門經綸未究身先死痛惜誰能作九原潘大卿輓詞直上青雲不作難壮年何事掛衣冠功名已矣乖時望風節翹然見嵗寒鴻去冥冥矰不到蝶飛栩栩夢驚殘傷心耆老今無有留得遺編向後看張運使孝仲輓詞惠周劍外與淮南歸卧空山且避讒宴坐㡬年期不死臨時一著信非凡不應杜乂束高閣真使謝鯤居石巖欲向西陵尋宿草秋風何日送歸㠶魏郎中熊夢輓詞相公鐘鼎蔽詩聲鯉也聞詩早得名高隠碧谿心更遠今遊湘浦句尤清握蘭未足酬吾志攬轡寧知老此行今日哭君誰最切山房門下老門生姜祕監師仲輓詞文筆無勞巧剪裁一時妙斵冠蘭臺王楊仕宦曾相接游夏淵源有自來治獄心知有陰德立朝人歎有餘才功名回施與孫子公亦何為不豫哉久聞政績最淮淝鄮嶺循良親見之梓里尚遺前日愛棠陰還長舊年枝釣璜方兆非熊卜曵杖俄興梁木悲千里佳城空望斷他時歸哭峴山碑李公執輓詞乃翁志欲卧烟霞宅枕清江欲泛槎心地共知容渤澥夢魂曾不到京華伯魚久矣聞賢訓魏子端能起外家彌望三江梁下水隴西德澤信無涯未甘辛苦去朝天故作逍遙陸地仙老子平生萬事足人間五福一身全厭看日月同奔驥擺脱塵凡等蛻蟬重到江頭人不見曉風吹淚忽澘然莫將仕隨輓詞自嘆清才久陸沈晚從内典用工深諦觀炯炯死生際寧復紛紛利禄心載酒今誰問奇字遺經古亦勝黄金十年契濶遽如許老淚臨風自不禁樊運使光遠輓詞代人作妙齡便有老成風孝友丹心天與通師友淵源得西洛文章聲價冠南宫固知夫子才難用猶喜先生道不窮他日鳯泉山下路㡬人下馬拜塋中樊侯勲德佐中興百世兒孫尚典刑闔境民蘓御史雨列城人仰使君星憲臺嚴冷獨峩豸道院清閒誰掣鈴謠頌洋洋在人耳不須樂石更刋銘戴縣丞樟輓詞蚤嵗鄉書薦弟兄羨君再舉上青冥藍田方欲新漫壁處士寧知卻應星忍向伯高將束帛誰從小戴授遺經佳城得卜真前定忍看一翁衰淚零伍主簿景善輓詞好賢元不減緇衣客到公家如所歸二浙聲名三鶚薦四山風物一翬飛桑榆冉冉身先蛻蘭玉森森家正肥人有百身寧可贖發棠誰復濟齊饑由來風誼獨穹然坐享家肥不計年墮幘何妨分百萬指囷寧復問三千靈椿老矣仁冝壽玉樹種成身已仙袞袞公侯殊未已正應含笑入重泉晚年朋舊益凋零歎絶斯人奠兩楹不忍銜悲讀佳傳可堪回首念平生交情君獨全終始人物誰能繼老成清些楚魂招不得朔風凄切淚縱横安恭皇后輓詞天作周文合褘揄禮可觀屢陪金輦幸㡬奉玉巵歡吳女簪新柰梁房掩舊蘭春深蠶事起誰復上桑壇鬱鬱南山路傷心鳳翣紅哀歌凄薤露秘殿掩椒風故劍恩雖厚中璫事已空但餘彤史筆内傳紀陰功又代人作玉勝標祥兆褘衣配至尊柔儀高馬鄧盛德邁娀嫄鸞掖空陳迹霓軒服厚恩傷心臨七夕素柰已花繁圖史懷規鑒篇章妙翦裁承歡方秘殿委化已泉臺幽壤湖濵秀清笳日暮哀未央當月望不見翟車來齊國夫人曹氏趙知宗之母輓詞痛哭王孫去南來萬里餘解衣催艇子扶杖擁籃輿已矣空鸞鏡誰歟得鴈書辛勤立門户地下勿欷歔宗子今曾子夫人古敬姜卭郲承孝養浯水刻恩章湯沐封逾寵芝蘭晚更芳九齡天報遠餘慶尚流光齊安郡夫人金氏趙左司公碩之室輓詞避地供湯餅當筵接縞衣倉皇奉神版巖險遜征騑遇事智尤敏相夫家寖肥考終無可憾蝶夢遶芳菲五子俱英發尤知仲氏賢勤明真世濟廉儉信家傳别乘徑為郡高城欲捍邊版輿俄棄養事業待他年太淑人葉氏單侍郎䕫之母輓詞婦職躬蘋澗芳年誓柏舟壼儀全肅睦梵行極清修貝葉開空性神箆豁病眸飄然指歸路淨觀日西流為國生賢子三遷備母慈版輿崇色養從橐勉論思戲舞老萊子平反雋不疑孝心天罔極腸斷蓼莪詩太令人趙氏王師柟之母輓詞令德比鳲鳩芳年誓柏舟承歡猶有戀曠達了無憂方奉平反笑俄成汗漫遊哀榮誰得似同穴樂哉丘姻婭託三槐同朝得往來迎春煩設席舉壽荷擕杯京尹俄遭難都人亦助哀琅琅垂絶語烈婦信高哉從姑太令人輓詞伯祖八賢女惟姑壽且康又聞歌薤露誰復是靈光采藻空南澗生萱愴北堂平生好心地持以遺諸郎太恭人劉氏王台州之母輓詞籍甚成天助薰然藹婦容家肥身愈約福備禮彌恭上壽九開宅湛恩四受封何人紀遺德女壻正乘龍衛氏一兒足他人總不如一麾欣義檄千騎擁潘輿台嶽傷歸旐青山滿送車佳城流慶遠旁可萬家居太令人軒氏趙山甫母自號覺菴居士輓詞縁斷身先隠年侵鬢未華死生猶曉夢富貴更空花佛祖親提印兒孫競起家無因拜靈几一奠趙州茶舊說蘓無著夫人亦正宗毒蛇横在路栗棘更無蹤無著贊臨濟宗㫖云一條毒蛇横在路上覺菴云栗棘蓬栗棘蓬一口吞卻更無蹤蕭散超塵界扶持禮紺容覺庵誰嗣法别去德雲峰太孺人蔣氏輓詞之死靡他志天乎不諒人嫠孤蓬在首難苦棘成薪晚福容千指心空滅六塵平生貞烈意終作坐忘身潤屋惟純儉居然法度循松楸先壟下風月舊湖濵子婦皆知孝孫曾亦可人浦江如可贖真欲百其身孺人陳氏周子及之母輓詞教子推陶母相望百代前詩書經口授名節誦家傳藝苑高鴻筆忠言徹細氈源流知有自何止父兄賢令子齊年好相從識壼儀蕭生結綬日孟母卜隣時未卜升堂拜俄聞陟屺悲天涯致芻束淚落薤歌辭太淑人管氏輓詞彤史久不作誰能有婦功寧知貴家子乃有昔人風鈿軸恩何渥芝庭澤不窮死生無可憾況已悟真空陳夫人程吏部之母輓詞作配知名士周旋内則篇冝家兼四德訓子見三遷就養榮方逮歸寧病忽纒慶源流未已佳兆得牛眠張夫人余元老之母輓詞婦德天然備肥家五十年平生勤内則晚嵗識真詮倒廩非徼福翻經亦應縁于門有孫子佳氣藹新阡王夫人羅尚書外祖母輓詞婦德勝賢士嫠居成大家陰功冝有後餘慶尚在涯楊惲出司馬陶潛傳孟嘉文昌紀遺範外氏倍增華恭人强氏曾南仲之母輓詞祠部源流遠來嬪曲阜孫事夫終婦道訓子大吾門頒誥恩光渥升堂笑語温相期送丹旐馬鬛近周原恭人董氏劉侍郎頴之母輓詞敬饁尊夫子升堂乳阿姑鄉評推至行家慶展新圖半世悲鸞舞高年樂鳯雛蜜章應未艾卿月應階符鹿夫人同年應尉振之母輓詞内外言無間初終志不移白頭供婦職彤管著賢規慶衍珠三樹芳先桂一枝鳳岑歸去路含笑不應悲慶霈疏封日姑慈不忍違人方侈君賜我獨避恩輝孝篤神應勞風高家愈肥新傳快女壻亦復掛冠歸旌表門閭安人陳氏輓詞婦德高千古鄉評徹九重柏舟終自誓石窌啟新封孫子傳清白閨門慕肅雍死生無憾處了不媿三從族姓朱陳盛夫人事愈明老姑俱上壽難弟各清名詹事良翰之姊節行輝彤管門閭照赤城室隣方有託何忍送銘旌盧夫人輓詞名族著岡頭武岡邃之姊幽閨女教修良人驚夢蝶衆子慕桑鳩物化了難問壼儀誰為收于公有佳兆袞袞看公侯廿四從妹輓詞姊妹二十四凋零餘二人他鄉忽傳訃老子倍傷神已歎嫠居久何堪逆境頻佳城千里外西望淚沾巾孝養全終始真成乳阿姑衾裯長夜共甘毳四時須衆子俱傳業諸孫足自娛吾家女兄弟似此亦㡬無去嵗桐川弟新從姊處歸備言家慶事猶著嫁時衣尚欲尋松社寧堪哭素幃人生真一夢回首事皆非令人王氏表兄陳左史之室輓詞嫁早仍知孝夫賢自不貧事姑如事母憂物勝憂身鳳誥恩榮渥鳩桑德意均孺哀聲不絶淚柏不成春宦達方資助家肥忽悼亡一區終異室千載尚高岡奉倩神猶慘安仁鬢欲蒼黄昏愁絶處誰伴紫微郎冝人楊氏鄭華文之室輓詞里閈依楊氏年家託鄭門升堂從壮嵗擇壻得賢孫婦德儀中壼陰功燕後昆尤憐吾女子流涕説慈尊夢入枌榆社心遊氷竹灣匄歸期拜壽近侍望承顔一昨聞微恙寧知竟大還佳城無路到夫婦淚俱澘陳夫人輓詞族姓甲休陽夫人懿範彰奇男已南省快壻更東牀珍錫人加嘆佳城神所藏平生陰德在餘慶尚難量雅有幽閒操來嬪清白家相夫全禮敬見子致清華方享承軒樂俄興陟屺嗟誰將彤史紀大筆為雄誇碩人居氏蔡尚書之室輓詞頃侍尚書坐曾聞閫助賢晤言成勇退裏謁戒私專夢斷松江路神傷薤露篇悼亡千里淚疊嶂想新阡葬于平江王夫人周子及之室輓詞閫内誰無助夫人事特明傾囊資色養勉學就清名遯世期高節辭風歎落英丁寧猶在耳伉儷若為情荆國風流遠幽閨女教循鴒原驚逝水鶴髮倍沾巾厚夜招香魄英詞列翠珉秖愁書字拙貽笑衛夫人王夫人陳少南之室輓詞淑質依名士身期百不憂藁砧家萬里蓬首日三秋陶母傳遺業嵇孤託舊遊幽原誦詩傳無媿柏為舟王夷仲夫人輓詞彤史無人續誰能識壼儀蘋蘩奉先祖詩禮付佳兒未見魚軒樂俄興鸞鏡悲藁砧方得路腸斷悼亡詩盛夫人輓詞婉嫕閨中秀清高林下風相夫能盡禮教子使移忠邊郡官無曠都城養得終壼儀今具在流慶復何窮恭人胡氏陳奉直千能之室輓詞懿行表閨房情親共衋傷繡衣來宅相彤管著銘章劉提舉誠之為作銘蘋澗誰供祀藁砧空悼亡芝蘭俱秀發所恨失元方先喪其長子冝人聞人氏趙婺州之室輓詞四郡歌賢牧魚軒從隼旟深閨無裏謁色養謹安輿故里稱家法諸郎讀父書美哉彤史筆三誦為欷歔冝人史氏輓詞閥閱冠三朝尊公兩珥貂夫賢能盡禮家貴肯期驕教子門風振澄神性地超悼亡無可憾直筆付孫樵安人鄭氏輓詞勤儉佐家肥猶齊舉案眉錦封俱被寵鸞鑑可勝悲謝砌森羣玉郄林先一枝木華文雋麗銘德粲堂碑木詹事為銘孺人錢氏丞相之女適曹氏輓詞家世㦸如林來嬪藹德音功容俱可度疾疹遽相侵已矣空蘋澗誰歟助藁砧佳兒隨玉折尤切悼亡心孺人林氏盧彦德之室輓詞家世甘泉舊幽閨有令名賢明教陶侃勤苦佐淵明蘋澗今何處鳩桑空復情誰知悼亡意揮涕望佳城孺人曾氏葉寺正之室輓詞婉嫕應眉壽天胡弗與齡情深孫楚詠淚盡女拏銘蘋藻空南澗芝蘭有謝庭越山埋璧處秋雨濕銘旌信國夫人秦氏林子長之母輓詞夫人富貴出懷綳擇配和鳴得仲卿鸞誥早能封大國魚軒不及伴雙旌肥家得法晚無倦教子登科新有聲歎息南谿未成屋鳳凰山下啟佳城茅夫人鄭貴虛之母輓詞清心玉映許誰同更有飄飄林下風政爾高清協宗老故冝嘉遯樂龎公遠謀蚤識身為重晚境還知性亦空已擬張林碑婦德合歸彤史巨編中孺人陳氏輓詞追憶宫端舊典刑三真況復是難兄豈惟門户生光彩直使朝廷列姓名煙海乘桴誰可奪天風反火報尤明雖云弟娣相從去自有英靈凛若生太碩人潘氏葉尚書翥之母輓詞玉暎清心著壼儀閨房賔敬到齊眉豈惟山水協高趣宗少文每遊山水往輙忘歸妻羅氏亦有高情與少文協趣更為國家生好兒太宗賜張文定齊賢母詔曰婆婆有福生得好兒為國家分憂萬口共推諸福備八旬猶負一年期伯仁冬日應腸斷不見堂前舉酒時攻媿集卷十四
