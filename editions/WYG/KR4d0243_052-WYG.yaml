body:
  text: 攻媿集卷五十二宋樓鑰撰序薌林居士文集序知人古以為難苟未見其實行形貌言語名譽文華皆未可以保其徃此今人所以難知也及其葢棺事定登載史冊又有好惡之不公流傳之失實不得其賢否之真此昔人所以難知也至於近世前輩耳目所接雖銘誌多溢美章疏多溢惡以為難攷然其行事具見於己為交游皆出於善類又其平生所著詩文集以成編始末備在粲然不誣察其所安㫁可識矣薌林居士向公寔文簡公五世孫也重珪疊組生長富貴而抗志不羣卓然自立所交多天下名士方全盛時居官守職固已不畏强禦聲績著聞靖康元二間為江淮制置發運使一聞偽楚之變即移文合肥拘留其家屬以折其姦心聞者韙之高宗初開元帥幕府以羽檄起四方之兵未有應者公募士人李稙首齎金幣以濟艱難之用上章勸進切中事機上深嘉之承制補稙以官公之功名及受不世之知實始於此及帥長沙金兵猝至堅守奮擊外救阻絶力不足而城破猶保牙城巷戰以拒敵兵退盡所以撫摩之力楚人至今徳之尋改鄂州行次衡陽曹成李宏賊衆十萬將肆侵敓公肩輿入曹成賊壘曉以大義不敢為暴遂獲鍾相降楊正表上眷愈渥擢之户簉入從出藩竭其忠力幾至大用媢嫉者衆而公雅志退休抗疏面陳不一而足卜居臨江古木無藝多植巖桂又素慕香山自號曰薌林有船曰汎宅高宗親御翰墨書四大字及企疏堂以寵其歸公家東望閤皂山連玉筍靚深如隠君子居壁皆畫以山水木石門皆裝以古刻靈龜老鶴馴擾其間自著五十詩以形容景物亦多和篇嘗云淵明生於興寧之乙丑歸以義熙之乙巳年四十有一余生於元豐之乙丑歸以紹興之壬子有述懐詩云我與淵明同甲子歸休已恨七年遲又言香山得洛陽履道坊楊常侍舊宅薌林得臨江五栁坊楊遵道光禄别墅有詩云莫問清江與洛陽山林總是一般香兩家地占西南勝可是前人例姓楊又題樂天真云香山與薌林相去幾百祀丘壑有深情市朝多見忌杭州總看山蘇州俱漫仕才名固不同出處畧相似上梁文云坊名五栁仰陶令之高風洲號百花乃東坡之遺事其尚友前賢類此標致可知矣士夫徃來者必造見又素喜客相與觴詠其下蓋自建炎初元罷六路漕明年歸臨江紹興八年起至平江力辭不克次年三月復歸自是不出優游十五年以夀終焉勤勞著於中外名節全其終始雖有異論亦皆厭服無可議者諸子又能世其家不待平泉之記草木數十年來幽致儼然復裒一時名公書尺刻為薌林帖公之忠孝大槩愈著而世之持論者大定矣公之曽孫公起為湖廣總屬分司九江受知於使君袁和叔燮介以求序且言已刋公之家傳行狀志銘為一編又刋拘偽楚檄稿及諸賢跋語他日又將刋家集行於世鑰生晩雖不及拜公牀下生長外家外祖汪公少師與公同朝相好曽為汪氏友恭堂生雲閣賦詩先太師岐公初丞崑山及趨事於呉門最䝉眷與故多見公之藻翰熟聞高風今又盡得公之詩文雜著如㫁碑風雨碎文章等句皆素所膾炙今乃知為公之詩公為徐東湖詩集後序有云始為詩以數百計一見師川快說詩病盡焚其藁則知公之少作尤多其所存者止此耳章表奏議明白直亮可舉而行兼備體制而又能出入内典此蓋由前朝涵養之久文簡典刑之存非曲學之士所易及也鑰庸陋不侫何敢預品題之末姑誦所聞如此猶記九嵗時仲舅尚書公尉江山乙丑登乙科以書為謝公答書親題其外云書上明州鎖元先輩汪下書薌林居士此亦近時之所未聞也公諱子諲字伯恭官至徽猷閣直學士累贈至少師云洪文安公小隠集序番易洪氏自忠宣公以文學致位通顯忠誠許國逺使殊庭當干戈俶擾之際執節不屈迨蘇子卿之歸而二子已俱中詞科矣一子又繼之自唐設此科本朝又增廣之名公多出此途然未有兄弟三人聨中如此之盛者也況父子俱掌帝制出入鑾坡文章聲問萃於一門赫然為天下冠而仲子文安公又其先逹者也公生於宣和二年至紹興二十五年自秘書省正字已兼中書舍人獨押六房暫直學士院又三年以左史再攝西掖明嵗為真遂擢翰林學士出守呉門高宗皇帝將行内禪聖意謂一時大典冊不可輕屬召為翰林承㫖禪位之詔登極之赦尊號改元等文皆出公手紛至沓來從容應之動合體制天下傳誦極儒生之榮遇孝宗皇帝命知貢舉未幾遂登樞近蓋仕宦終始以文字為職也唐張燕公稱富嘉謨之文既而曰施於廊廟則駭矣惟公天分素高加以篤學文體蚤成天生廊廟之文也文從字順隨物賦形非如寒士苦志悲鳴口吻者所可望也公以隆興初元知舉鑰由鄉書就試公一得文巻必欲寘之前列而第二䇿中誤犯泰陵舊諱公嘆惜不已為引呉若等例奏聞襃借甚寵得㫖降充末等首名鑰何者受公特達之知既竊名第以至晩登政途不敢忘也公之子二楀嘗守峽州將赴闕至上饒而殁橰知餘姚縣又亡於旅舍峽州無羌時刻公之文將俾鑰為序未及也其壻汪君杲通判信州以峽州遺意為言鑰方經紀餘姚之家其子伷又面以為請鑰何敢當獨以銜恩未報又願託不朽因不敢辭公之兄為右丞相諡文惠弟以翰林閣老終端明殿學士諡文敏世稱三洪以比錦屏三陳而又過之公諱遵字景嚴若世系治行則文敏所作行狀甚詳不待愚言而後見小隠則公自號也靜退居士文集序歐陽文忠公為本朝文章宗師猶昌黎文公之在唐也光燄萬丈不容贊嘆諸子叔弼兄弟咸得家傳季黙之子徽猷閣待制徳孺則諸孫之益顯者也嘗見中書舍人王公鉌銘公之墓云忠厚之質孝友之性皆稟於自然不勞追琢詩篇賦頌章奏碑誌之文古律雖殊體製不一各極其妙而家法燦然當時推能世其家者惟公也嘗訪求遺文於館中僅三十餘篇每恨不得其全公之孫伋守連州以公家集二十巻鋟諸版而來求序始得而盡見之嗚呼真得六一先生之傳而王紫㣲之稱非溢美也中遭亂離挈族南徙流離困苦憂國愛君之心盡發於詩文中皆不苟作平生著述散逸為可惜然此足以不朽矣前輩既不可得而見文章流傳士夫皆當傳録而況於子孫乎歐陽氏久振振連州能傳斯文於其家世尚勉之哉公諱懋徳孺其字自號静退居士遂以名其集云筠溪文集序士大夫種學績文孰不欲流傳於後資稟有厚薄用力有淺深固不可誣然湏器度過人則自應高勝有非勤苦之所能强進者此可與知者道爾筠溪先生以父兄之賢少有聲於太學一夕奏厠有同舍投繯於梁間公時年纔十七八畧無懼意亟解其繫卧而枕於股上親撫摩而嘘呵之㑹有後至者怪而問焉徐語其故馳報齋中羣士競篝火而來相與抱持而歸竟全其生即日名動京師弱冠遂為大觀三年上舍第一人繼登科其才固足以得此天報亦昭昭矣公之器度絶人逺甚如許加以問學之懿其發為文章頋豈淺見者所能及也政和間以南宫舍人使契丹擢左史因訐直貶宣和未知冀州獨能堅壁以抗强敵靖康初漕江東平叛卒之變入紹興為饒吉二州七年復立左螭尋掌書命雄深之文黼藻王度四方傳誦之論事封駮皆人所難又以力闢和議益與時忤遷户簉丐外補去國之際猶拳拳以立國待夷狄之大計為言竟請祠以歸隠福之連江山西凡十六年不復有仕宦意哦詩自娛筆力愈偉居閒憂世著議古數十篇雖貶論古事而皆闗於當事利病深切著明有范太史唐鑑之遺風乃心王室惜乎用之之不盡也迨今將一甲子公之孫珏以郎曹典大藩今居江西憲臺方迎奉老親而當寇攘驚危中竭力不少頋避琪以上舍魁決科克繼大門為京口貳車皆有時名有以知公之澤未艾也二孫以鑰游從之厚出公遺文三十卷求序鑰晚進何足以測識前軰所蘊以平日慕用之誠幸託名於不腐敢謹書之公諱彌遜字似之昆仲六人文字為一門之盛兄尚書彌大宋史季彌遜傳訛作弟彌大弟太史彌正俱負重望筠溪則公自號云曹忠靖公松隠集序淳熙改元九月癸丑昭信軍節度使開府儀同三司曹公薨十月壬戌徳夀宫遺中使賜以宸翰有曰厯事四朝盡瘁國事從徽考北狩至燕被宻㫖晝伏夜行持御札御衣俾予繼統金人敗盟犯江奮身請行見敵帥力陳禍福敵退渡淮繼令請太后天眷至金主前宣予孝思使彼感動俾予母子如初完顔亮方圖南下令徃觀其意陳前後盟約聲色俱厲亮令以繡褥藉之終始一節夷險不渝今遽告終為之惻然因疏其行事大概賜其後具見予不忘之懐嗚呼士生斯世苟有一概可以自見皆足以取重於時其殁也苟得名士巨公為之志亦足以垂不朽惟公之生屢立竒節殁纔浹旬而斯文出於慈極震耀一世先正諸公間得碑銘多屬詞臣為之若夫親御翰墨大書特書聖作高妙文簡事核未有如此之盛者頋雖刻銘鼎彛無以尚兹史冊登載足以傳無窮矣鑰於公三子俱識於宦游中仲子工部相與有連事契尤厚公薨十七年矣集公之文俾鑰序之且曰先公早入太學負時名中更險艱晚遂安逸其於六藝百家無一日輟吟而停披也詩文至多畧備衆體紹興乾道間出入兩宫奉清燕之閒最承寵眷謙謹已甚無毫髪之玷一時筆墨類多出其手易簀之際以藁屬耜曰爾為我傳之涕泣拜受襲藏至今追念平生大概固已具於高宗之製然文字未有以自表矧家世業儒大父箕潁之文參政上蔡謝公為之序引行於世自度多病早衰恐負九京之託與子幸同郎省能加一言於篇首志願畢矣工部近以衡州奏事上記尹京時實在幕府問勞優渥遂留為郎庀職未幾他不暇問拳拳獨以遺文為言誠足以稱其家矣公之詩文其來有原其發不苟慷慨論事有古烈士之氣雍容適意有隠君子之風又未易以一端盡也蓋嘗登沖嗇之廬玩雲壑之勝想高致而不及見而又重違工部之請故為之書公諱勛字功顯諡忠靖累贈太師松隠公晚嵗游息之地遂以名其集云詅癡符序客有以書一編示余曰此赤城李公察院所為詩文名曰詅癡符公亡矣莫曉其名書之意余曰公於書無不讀此名殆不苟也海邦貨魚於市者夸詡其美謂之詅魚雖㣲物亦然字書以為詅衒賣也顔黄門之推作家訓曰吾見世人至無才思自謂清華流布醜拙亦已衆矣江南號為詅癡符公之意蓋出於此特謙辭耳公諱庚子長其字也少年筆力絶人始為長沙尉一時帥守部使者傾待之皆以牋翰委公從容泛應無不曲當時余伯父揚州為漕使公首以長牋進謁有曰衰懐錯落有秋風鱸鱠之思舊學荒涼無春草池塘之夢伯父一見擊賞延為賓客不復以寮吏遇之湯公參政時帥湖南後為中司遂辟公檢法官遷六察為郎而歸自此三數十年間僅一再以麾節出終不得為文字官以展究所長識者恨之余倅丹丘始得拜公之門公方買屋近郊古木交隂庭草錯列若隠士居聚書數萬巻於樓上閉門不與人通老矣猶沈酣其中里閭罕識其面間與人接雖㣲賤必與之抗禮後生有以經史叩請隨即響答詩文晚益高時出一篇即日傳誦哀挽之作尤為悽惋真可以泣鬼神也公之子浵因求余序其首余度公所著甚多猶有遺者更搜故藁盡出而行於世以慰其平生筆硯之功則箕裘可以不墜矣陳子高克台人也詩名已久而所傳不多公嘗盡得其遺逸者板行於江右視舊殆過倍蓰而子高之詩益顯公亦將以此望於後人乎然讀此編者亦足以知公之所存矣環溪文集序道無終窮學無止法自非聖人誰能盡之觀志學以至從心猶有等級如此學者之於斯道隨造詣之淺深用功之多寡如獵於山漁於海死而後已猶不足以究聖人之蘊奥若環溪者殆深而多者乎余少讀能改齋漫録等書而知有臨川呉虎臣之名隆興改元同年有二呉曰澥曰鎰皆虎臣之族虎臣名曽嘗分嚴陵之符澥字徳深終太學録鎰字仲權終湖南轉運判官三人者皆博學多識而善屬文晚嵗投閒四明里中有醴陵宰呉君琮來一見知其佳士與之接從容於杯酒間亦是族也既别去始得環溪之文一編玩味不置又知醴陵乃其叔子分教澧陽時所刋恨不及面與之商㩁既老還朝有名大禮者見余自言奉其祖環溪大全業八卷併以江右諸臺請賜諡事聞於朝錢丞相嘗知撫州熟知其名既以遺才為惜欲於科目之外收巖穴之遺而下之有司久未及報再見泣以請曰大父著書滿家貧不能盡刻先醴陵又齎志以殁藐然孤孫以其言行大畧求伸於身後而事有未成幾無以歸告兩世丘壟謂余於呉氏素有事契求一序以傳余曰環溪不待序而傳也篤志好古盡孝事親固已師表鄉閭名聞京師工部尚書何公異稱之云易旋璣明天理自然終歸之人事幾㣲之應本制論期黼黻王度若以身周旋從事於禮制樂作之末虎臣云通言簡不及陋侈不及宂事順而意宏辭嚴而理婉仲權吏部云宋文人之文唐詩人之詩而漢經生學士之學也其書通言云者法言中說類也醴陵亦云學通五經尤長於易禮旁通於百家而游藝於文觀此四者可以知其平生矣深於易故三十而著璇璣圖論深於禮故又二年而著周禮本制圖論六官析㣲論皆傳於世通言最所注意名言善誘實惠後學其曰不為言之言言立不朽又曰孔孟之書無難讀之文無難明之字此不易之論也而通言未免於為言間亦有難讀者嗚呼其學早成而進修不自已使天假之年且將有不為言之言而夀止同於韓昌黎為可歎也唐李愿何等人盤谷亦無聞於時徒以序而傳先生視愿有餘而環溪之窈而深繚而曲又豈減於盤谷所歉於愿者特余之文不足以發之耳江右多秀士大禮其别圖之王文定公内外制序藏書以經史子集為四庫尚矣國家中秘之儲士夫家塾之目莫不由此然惟集部必居十之七八方來未已充棟汗牛不厭其多非特玩其辭也蓋尚論古之人史傳銘志不若家傳最詳然必見其遺文而後得之文章之作出於胸臆讀其文則如親見其人攷其言則如生其時不可誣也左丞相魯國王文定公天分素高涵養深厚自少時已有場屋聲中外翺翔未始一日去書及為天子代言外制内制詞㫖溫淳殆有西漢遺風如春之和如玉之粹措意高逺而渾然不見圭角實似其為人一時爭傳誦之其後徧厯七府位極人臣事業之偉鑰嘗狀其行為詳然傳於不朽要不若遺文之具備公之子知筠州樞與諸季編緝西掖北門舊藁為三十卷俾鑰具之鑰平時誦公之文恨不能多見薰沐三誦而後歎曰曩見禮部侍郎史公彌大言嘗問視草之體於魯公公曰蘇長公才氣邁徃不可强追軌躅少公沈厚爾雅尚庶幾焉鑰於公之文不敢輕為贊揚讀斯文者不惟可見乾道淳熙之盛欲知公之詞源當於長公少公之間求之酌古堂文集序故太府卿王公實鑰之姑之夫也其亡也鑰為之志銘甚詳公之子惟潛在裒其詩文若干巻號酌古當集㑹國史院下索志銘及奏議等文求序於鑰向固不忍銘公而卒銘之此不應辭惟公天資頴悟雖世家四明而幼隨父金紫仕西北如京洛故家子弟既冠而孤叔祖宗正少卿欲命以官力辭之欲以與其季而自奮於科級少卿以公昆弟三人必使之受而以遺澤官其長弟又自以一官與季子可以見王氏之義風公之自立者已可知矣既而翻然曰學不必爾仕以行其志足矣遂不復為舉子業而一意於學忍貧深居窮經閱史手自編緝及見王紫㣲洋諸公作詩直欲追儷陳簡齋及子高軰一語不苟作名公多畏服之近時以詩鳴如石湖范公見公詩亦自言欲焚其藁未嘗無為而作文遇論事則明白洞達援據審諦切於世務理之所在無所回撓壓之以萬鈞震之以雷霆不動也如江隂論民兵之终於無益廣西論鹽法之不可輕變其為宰掾看定四方章奏之類皆如五榖藥石之適於實用若其立論謂翼祖雖已入祧廟而臣子终不當以其諱為名字及扁榜六十甲子古人惟以紀日所謂天有十日是也若書嵗則當如通鑑之用嵗陽字以表徳不應自稱其言皆可以為後法風流醞藉如晉宋間人若不以事物自嬰者至其莅官而克勤小物立節而不媿古人詩文中亦間見之讀者自可得其為人又不待於費辭自少至老聚書六萬餘卷多自讎校為之目甚詳名堂以酌古鼎彛古刻分列其下鑰少公十有九嵗忘年與進不以輩行自高笑語至通夕無間鑰未死不可不為發其幽光餘已見於志銘者不復載公諱正已字正之潛今丞徳清能守先訓尚當勉紹素風以亢王氏之宗云見一堂集序赤城鹿公以望郎顯於淳熙間當服官政之年不以病不以故致為臣而歸天子既寵襃之朝之名卿大夫學校之士爭為歌詩以餞其行郡太守侈其事裒以為見一堂集傳於世將三十年矣其子龍泉大夫又輯一時諸公寄贈若山園留題等益之為十巻所以顯揚先君子之清風峻節歆動中外蓋其祖帳之盛如二疏歌詩之多如楊巨源而其齒尚强其去尤高雖時移嵗久一覽此編赫赫若前日事真足以亷貪立懦也觀夫大篇短章鏗鏘眩晃極其形容之美寫其慕歎之懐非不欲庶幾公之所立也然而至今未聞有繼之者豈非坡公所謂有其言而無其心有其心而無其決者哉鑰初謁公於堂上實與周子及彭子復同之獲陪杖屨接觴豆於烟霏空翠之表退而賦十三詩以獻其後又嘗銘公之墓故龍泉復以序引為屬自惟宦情素薄而投閒十年屢更奉祠淟涊戀粟視公不待年而去誠甚不勇然親在為養尚得自恕也今免喪未死年甫七十真老矣方將上挂冠之章期於得請是敢落筆而不辭公之本末具於志銘龍泉亦已繫之巻末兹不復贅檗菴居士文集序江都李氏名族也紹興間名之從民者尚多俊茂余生晩猶及識將作監端民平叔及其子泳皆有聲詩又有名璜字徳劭者平原公之從孫將作之再從弟少負雋才而頗誕放恥從進士舉里人或譙之則曰我非不欲試但恐奪爾曹魁爾又嗤笑之乃曰爾曹不信我將試矣一試果魁維揚後寓四明筆力雄邁人所罕及時初脫兵火之厄郡縣庠校記文多出其手太守仇公泰然愈周公元舉綱潘公子賤良貴皆一時名公莫不低簪禮之侍御史王公伯禮伯庠為敎官與之游最厚蓋文字之友也明多禪刹徃來其間或以書來云孟信安欲招為壻資送特送且可得官擲於地曰老大乃復於此耶竟不報既不得志場屋蕭散骯髒以終其身不娶無子晩從宏智禪師於言下有省益耽内典以其筆耕之餘買田一頃施於阿育王山使奉嘗我寫照而題其上今至留水陸堂中遇薦羞則為設伊蒲其贊有云分明便是龐居士又卻無人賣罩籬不可謂無所得然亦可哀也已嘗見侍御言徳劭病革徃候之問向為文用僧騰客為何事曰侯景臺城是也又問平日了逹今何所見曰都無所見但覺神氣消散爾出書一囊乃其遺藁猶頋而言曰以屬吾子勿竊吾詩文以為己作平時相忘方緜惙時戲調尚如此里人戴伯與權雅士也託館王氏慕其文名從侍御諸子借囊出藁而手編之又多殘紙㫁壊不可盡録故所存十之二三僅得詩文雜著幾二百篇釐為十二卷俾余為序久未暇及嘗取其白氏長慶詩譜録寄呉門使君李諫議既為刋於集後又索其詩文且曰近為建寧當為版行余喜其文之將就泯没而有傳也為序其大槩而記之嗚呼世之騷人才士耽嗜成癖哦詩屬文皆欲有聞於世而因仍埋没與草木同腐不得以一語自見由古以來不知其幾徳劭之集藏於侍御之家傳於伯與又因余與諫議而行於世兹非幸歟若其詩句之工妙文體之高勝出入古今追配前良不待余言覽者當自知之檗菴其自號云雪巢詩集序淳熙五年余自刪定郎贅倅丹丘始識雪巢林君景思行誼高潔骯髒不與世合環堵蕭瑟忍窮如鐡石一郡人士稱重之讀其詩恍然自失愈叩愈無窮身雖未達而以詩文於諸公聞於是遂初尤公尚書誠齋楊公侍制俱為之序此可以不朽矣一日寫數十百篇遺余又使序之余曰二公已序何待於鑰景思笑不答而請不已余啞然曰吾知之矣君詩出入古今作者門户善備衆體二公極力稱道猶有未及者詩之衆體惟大篇為難非積學不可為而又非積學所能到必其胸中浩浩包括千載筆力宏放間見層出如淮隂用兵多多益辦變化舒巻不可端倪而後為不可及君蓋於此有得者如羅漢嶺頭羅漢樹楊花飛後無可飛等篇直欲與渼陂行茅屋為秋風所破歌相周旋君豈欲余之及此乎景思捧腹久之曰吾於此非曰能之而願學焉子何以得余心吾行於世五六十年得此於人者蓋寡因相與劇論詩家事不知更僕之久酒酣欲去遂書以遺之静齋迂論序静齋李君才翁自號也才翁真静者也幼厯艱苦與其兄徳翁相與為命寓柯山嘗試流寓為魁選故參知政事錢忠肅公聞其賢延致館下今丞相實從之學才翁學有本原又自刻厲文章日高兼備衆體嘗叩錢公以親黨舉削公信其言而許之彼以金為謝才翁曰乃欲以此汚我耶白公不可與公益高之欲授以官力辭曰使有仕進之分則已效於科舉矣强與之又不肯仕為求祠禄使藉此以試漕臺兩預薦書又不利於春官遂不為進取計葢取經史百家讀之以昌其詩以大放於文錢公秉政亦不畧為身謀從錢氏祖孫終其身如一日素安貧約粗給即止家無冠裳通謁止稱長安李某台之人無貴賤老少莫不敬而愛之幾如康節之在洛也郡邑來仕者聞其風多與之交俗務一絲不挂得酒則酣暢自適貫穿今古多識前輩行事清談亹亹聴者忘倦丞相屢出仕必與之偕行有直諒多聞之益以才翁之才不得少施見於世又不幸年六十八而殁善類皆嗟惜之有子曰􅙝丞相視之如子姓撫其家不替於昔一日俾􅙝來見出才翁所著迂論五十餘篇求為序引鑰舊聞才翁之名贅倅丹丘始交下風觴詠相從欣然莫逆交情久而罙篤間徃來都下飄然如不繫之舟見之使人意也消嘗以詩贈君歸有云文可演綸詩更工翛然蟬脫世塵中平生不復遇飄瓦兩腳何妨類轉蓬彼尚勞心論出處我今無夢計窮通江神閱徧憧憧者來徃無營只此翁才翁得之甚喜回首三十年矣才翁家長安大父及與横渠浮休諸公游號潏水先生文集行於世多入陜西戎幕曉暢邉事腐夫握兵以抗議不合坐廢嵗久賊犯闗中年高且病乃以為舊徳知兵强起以守秦州空城卒死於賊此志士人人之所痛也其家避地深入嶠南父又卒於瘴鄉禍患何可堪耶才翁詩文至多未暇編集迂論則其所學之著見者言議正大文詞溫淳論治體則欲返本而不求於末論世故則由相激而成壊謂道之弊極而必反謂聖人無心化物而化自行其論漢事尤為詳明既無科舉之累又不求賣論以取官直取諸胸中實見而筆之名曰迂論而實非迂也若言情貴得其直而養心在於明分則有自其躬行得之非真静者能及此也余既為之序又念才翁之葬未有志銘併書其大槩以授之才翁諱龜朋􅙝能世其家今為丹丘人放麑子集序秦西巴不忍一麑而與其母孟孫遂以為子傳是出於一時之仁耳然猶未及放麑之稱至唐陳子昻感遇詩始曰吾聞中山相乃屬放麑翁后山託疾謁告擅去官治以送坡公其詩有云豈不畏簡書放麑誠不忍正用此然亦一時之不忍耳吾友蔣仲武天資仁厚自號放麑子蓋終身拳拳於此者其為人不言可知始與之同從國先生仲宏之綱相與最厚余是時讀書於荒園破屋中家貧僅有書一厨仲武時時相過清談繙書動至終日以是知予益深余老矣回首舊游凋落殆盡仲武之子和中以遺藁求序閲其名曰放麑子集讀之慘然是誠吾亡友之本心也仲武嗜學如嗜芰於書無所不讀於詩無不記雖字畫任真而手抄之書至不可計其孝友慈祥愛人利物之心既不得少見於世一寓之詩大篇短章藹然仁義之言溢於編牘若奥篇隠帙稗官小說問之如響少工詞賦每屈其儕輩而輙不偶於有司以此窮老而不厭鄉評無不以善人長者稱之斯人既不可復見撫遺編而歎息余聞人之積徳不必活千人而後興以放麑之心推之後其有興者和中自力於學效張横渠體以絶句發古詩之㣲咄咄有父風又聞其三孫頎然而立興仲父之門者庶其在兹乎紙閤詩序我家業儒舊矣曾叔祖承議才氣尤俊偉不羣妙年決科剛介自守承平時宰畿縣尹以勢臨之不為動未幾罷歸卒不偶以死時時聞諸父言之恨生晩不及識也叔祖實承議仲子少力學有父風言議英發率傾坐人視功名若不足以浼焉者事親盡孝道既終喪貲産一不取與妻子郊居自業方其四方之志未衰以一介行李徃來江湖間上武昌浮彭蠡厯覽勝地挹秀氣以充胸中之竒晩居龍潭安貧裕如槿籬荆門背山俯溪如世所畫老龎之居客至則清談去則宴坐老圃老農爾汝無間謙恭樂易宗黨鄉曲無不敬而愛之年已八十矣每取伊洛道徳之書釋老清淨之說讀之隨意手抄細書著行動盈編帙日不下數千字以訓子弟以勵後進雖書生舉子以為難且勞者為之不少勌老成典刑此尤人之所畏服也鑰官永嘉一日以書來曰我處此二十年簡儉粗足無復縁飾紙閤方可丈餘藏修游息不出於出番易張紫㣲嘗有此詩吾既與子和之矣今和者益多巻軸益富亦居閒勝事也汝為我序之鑰謝不敏敢取叔祖平日大槩書於巻首使覽者詳焉舊聞荆國文公有和王樂道紙閤詩學易先生劉公斯立亦嘗賡韻始知紫㣲蓋循諸公之舊非倡也併録二詩以歸獨恨未見樂道之作耳鑰仲兄頃亦同賦有曰但愛窗間冬日煖不知門外北風涼叔祖擊節歎賞以為正得我之意抑所存又可知矣三家詩押韻序吾家自高祖正議先生以儒學師表鄉曲是生五子曾祖金紫曾叔祖承議俱躡世科助教最幼家傳擅名而邃於小學亦有五子其次子則居士叔祖也字元應記問該閤書經覽輙不忘許叔重說文解字畧皆記誦其於六經句讀㸃法悉有定規如不字本方久切凡書之不字皆㸃入聲其字皆㸃平聲惟夜如何其則不㸃蓋本是以箕字而借為其也嘗曰陸氏釋文最為詳宻集古人之全後之作者如孟子音之類皆所不及讀書者多自茍簡口口相授遇有難字始為檢閱故謬誤者多我兄弟少時皆讀之自至尾殆無遺失鑰侍坐最久粗傳緒餘又以授兒曹使不至於甚陋者皆叔祖之訓也教子尤篤五鼓而興燈前坐對同讀一書多至百遍諸叔父經書皆通念如流真可畏服也惜乎父子不偶叔父三人俱下世弟四人字君秉骯髒寡合獨居郊外先廬中疎財處窘蹭蹬場屋年過六十而氣不衰取歐陽蘇黄三家詩集類以聲韻細字楷法凡四十萬字親經四寫而後成書以示鑰曰此吾以適晩景者也雖若無補然因此書見前軰用韻之妙雖曰本朝詩律壊於和韻如三公多記善用若天成然不知者必以我為無所用心而為此吾子其為我言之鑰曰唯舊見叔祖手寫春秋左氏傳禮記二書悉以古字今又見叔父之勤如此敢書所聞見以勉後生之偷惰者求定齋詩餘序吾宗自高祖正議先生以儒學起家仍三世登科者五人最後伯祖宗子博士元符三年鎖試以來雁塔不書者至於五紀從兄編修景山始因太學舍選與教授兄少虚同上紹興三十年進士第又三年而後鑰繼之大率羣從中入上庠躡世科登朝行擁州麾皆兄為之倡兄少有場屋聲一語不茍作遂以詞章聞於時由太學正宗正寺主薄玉牒所檢討官樞宻院編修官守江隂以治最聞自九江移武昌以疾奉祠而遂已矣門户不競可勝歎哉遺文散失未暇㑹稡平日游戲為長短句甚多深得唐人風韻其得意處雖雜之花間香奩集中未易辨也其壻黄定之安道偶得殘藁遽鋟之版而求序引嗚呼吾兄抱負不凡志尚高逺居家孝謹臨政明恕讀書博而能精屬文麗而有體長短句特詩之餘又尚多遺者此何足以見兄之所存耶少工賦篇驪駢尤高曽不得一日為文字官韓退之云乃令吾徒掌帝之制翻閱此篇為之於邑兄嘗以為能定未易言故自號曰求定齋云攻媿集巻五十二
