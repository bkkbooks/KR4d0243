body:
  text: 攻媿集巻三十一宋樓鑰撰狀劄知温州舉胡宗應賢良科狀右某伏覩本州士人胡宗左朝散郎裒之孫修職郎序之子家世業儒自少頴悟誦書屬文隨見輒解臣乾道七年為本州教授蚤已見其不凡去此十餘年聞其學問日進有聲上庠兹叨假守首訪人物而邦人又咸言宗習應制舉詞業已就因見其書蓋學有師承文無蹈襲博攷經傳有志于斯文參驗古今將期于世用且其資禀温良家居孝友表裏無玷言行俱優可謂儒林之俊彦聖世之英才臣謹遵奉詔書保舉堪應賢良方正能直言極諫科于貢舉條制並無違礙今具本人所習詞業䇿論合五十篇謹繕寫成八巻目録一巻繳進謹録奏聞伏候敕旨除中書舍人舉莫光朝自代狀右臣伏覩迪功郎臨安府鹽官縣尉莫光朝粹純無玷㢘介自將種學績文足為後來之秀臣今舉以自代舉楊簡劉仲光狀准尚書省劄子奉聖旨令侍從兩省臺諫各舉通亮公清不植黨與曽任知縣人二名者右臣伏覩奉議郎知饒州樂平縣事楊簡學問深淳操行介潔議論堅正皆有本原愛民之政著于劇邑是臣郷人素為畏友非敢私薦公論所推朝請郎監登聞鼓院劉仲光純粹而能剛疏通而有立曾知隆興府奉新縣甚有政聲次厯福州通判又有闗決之譽此二人者實可應通亮公清不植黨與之選除給事中舉高似孫自代狀右臣伏見文林郎紹興府㑹稽縣主簿高似孫夙有俊聲能傳家學詞章敏贍吏道通明臣今舉以自代舉宗室伯洙師津狀准尚書省劄子奉聖旨比來宗室在朝者少可命兩省臺諫侍從各舉有文學器識者二人以備選擇者右臣伏覩朝請大夫前知處州趙伯洙少登世科退然儒雅操守素堅政事中和若蒙擢寘朝行可以素率宗盟春秋寖高伏望速加進用儒林郎新池州銅陵縣丞趙師津忍貧好學厲操勤廉舊名師囦嘗在江東與應孟明同為縣丞一路稱此二人而師津至今沈滯選調窮而益堅不改其操國家敎養之久宗室賢才日衆臣敢以此二人仰備選擇除權吏部尚書舉謝天錫自代狀右臣伏見從事郎廣南西路經略司幹辦公事謝天錫經明行修推重鄉曲一入太學衆譽翕然省試為上三名㢘退謹飭至今尚以選調逺宦人皆有遺才之歎臣今舉以自代除顯謨閣直學士舉馮端方自代狀右臣伏覩迪功郎前隆興府奉新縣主簿馮端方學問淹該詞章典麗自其少時已為故户部尚書孫覿所稱晚霑世賞筆力愈高雖名士交稱而尚沈選調矧又稟資謙靜吏事不茍臣實不如舉以自代舉馮端方江疇樓昉狀准尚書吏部牒奉聖旨令侍從給舍臺諫各許薦舉所知謂如某人學識可任清要某人材術可任劇敏某人剛正某人疏通下至将士智謀勇略或有所長亦各以名來上者右臣伏覩承直郎前楚州團練判官馮端方性行淳茂文詞瑰偉直可以掌誥代言久沈下僚衆論所惜其人已老欲望蚤賜擢用如淳熙間韓元吉劉孝韙之比從事郎江疇學問精博議論閎放居為人師頃為徽州司户參軍不惟吏事公勤門有諸生授業甚衆可備學官之選從事郎監行在㸃檢贍軍激賞酒庫所糴場門樓昉少負俊聲記問該洽居有鄉曲之譽文有制誥之體宜居館閣養才之地使之涵養成就端方昉二人與臣皆同鄉曲昉姓氏偶同却非宗黨如蒙朝廷擢用後不如所舉臣甘坐繆舉之罰除吏部尚書兼翰林學士舉張虙自代狀右臣伏覩從政郎新兩浙東路安撫司幹辦公事張虙操履至純表裏如一學問詞采俱有過人舉以代臣實允公議舉俞應符李兼鄭肇之充監司狀准尚書省劄子奉聖旨攷察見任待闕監司公共薦舉者臣等仰惟國家多事急于求才而監司所繫尤重臣節即當恭承明詔竊謂進退人才者朝廷之權分别是否者臺諫之職臣等雖在論思獻納之列不應預聞攷察之事若公共薦舉所不敢辭但以人既難知知亦不能皆合如列銜其舉復恐所見不齊既不敢有私資淺之人又不敢太拘資格並是公共商㩁不敢有私親黨合謹同狀各隨所知開具職位姓名及其所長聞奏謹列具如後一臣某舉承議郎行司農寺丞俞應符蚤繼世科嘗辦劇邑疏通而有守精敏而善謀朝請郎權知臺州軍州事李兼清白承家公廉鎮物已著維蕃之績宜為攬轡之行朝請郎權發遣全州軍州事鄭肇之才猷挺特論議公平使居部刺史之職必有古膚使之功右謹錄奏聞伏候敕旨薦沈端叔王度劄子同從官某等竊惟國家自更化以來求賢最急得人亦多其大者固已收召進用其小者亦䝉揀拔器使然以某等耳目所接猶有遺焉伏見承直郎前監行在左藏西庫沈端叔文學老成操行無玷自為諸生由舍選釋褐成均多士咸所推重分教章貢振作士氣人知嚮方其時權臣擅國方斥逐上封言事之人而端叔奉檄校試廬陵乃以封事謗木之遺命題又發策言言路之通塞繫乎人材之消長議論鯁切不徇時好及在左帑委蛇筦庫錙銖必謹抱負所長不事表暴至今猶困選階端叔處之泊如也從事郎前安慶府府學敎授王度性資粹和詞采藻麗馳聲上庠之久遂由舍選登科屢更憂患幾二十年僅有三攷學殖愈進文氣不衰為安慶府教授江淮士子不逺千里而至居鄉又以孝行有聞某等深攷其人俱知其事茍不以上聞當任蔽賢之責欲望朝廷擢用寘之館學實稱其選舉閻一德綦奎趙積謙充邊郡狀准尚書吏部牒奉聖旨令侍從兩省臺諫各薦舉邊郡太守三二人姓名來上者右臣伏覩朝㪚郎監登聞鼓院閻一德出自世家屢更繁劇纂輯經史著古今政事錄以為規警頃知建昌軍諸司交薦得知泰州以憂不赴今任列院物譽甚美迪直郎前知建寧府建陽縣綦奎名門之裔官業可稱建陽最號劇邑奎勤于撫字號稱治辦列剡政績未䝉擢用曾叔祖故翰林學士崈禮建炎艱難之時實掌書命著兵籌機要上之奎習熟聞見使之乘障必有可觀通直郎主管台州崇道觀趙積謙西洛故家少年嘗冠銓闈方為幕職取知當路不緣介紹遂得改秩作邑宜興前政實權臣之黨月解拖欠至多積謙方議區畫補解而郡不容積謙謂一時奉命必致鑿空取辦慨然請祠而去人咸惜之臣今並舉充邊郡一德累經任使尤所當先薦黄膚卿林椅劄子同倪思臣等叨塵從列仍侍經帷既不勝愛君之心無以効報國之志惟有奬提英俊振拔滯淹使其人有能致身于時則臣等可逭蔽賢之責今得二人焉竊見從事郎前臨安府府學教授黄膚卿志節有稱詞章特出所著北鑒八巻專論本朝昔與契丹為鄰後為金人所辱究切事實雖祖宗盛時不曾一得志于北朝靖康以來動皆國家失計指陳事實略不忌諱刪削繁文極便觀覽自亂華編諸書以來皆不及此若陛下以備乙覽則必憤累代之世仇痛人謀之致辱臣子讀之則必廣求禦戎之策務為彊國之謀文林郎紹興府府學教授林椅淹貫經術博攷古今所著周禮綱目一書專論成周法度官職以類相從皆撮精要周公遺制可舉而行既非泥古以違今直可据經而從事自新莽北周名具實喪熙寧新法專以理財遂使指爲虚言實不可用惟椅之說燦然可觀二人者皆負才名務為有用之學不惟編載有體其所著論又皆明白洞達有益于世聞其書各自繳進臣等仰惟聖學高明于經于史皆所留意而二人所著書實可以上裨緝熙之萬一欲望聖慈特頒睿旨降付三省看詳如其實可採録乞加擢用以示襃勸攻媿集巻三十一
