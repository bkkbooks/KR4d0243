body:
  text: 攻媿集巻三十六宋樓鑰撰外制國子司業彭椿年除祭酒敕具官某祭酒尊者之稱也荀卿任齊最為老師蓋三為之後世遂以名冑監之長非夫儒先哲艾德齒俱尊者豈輕畀哉爾蚤以文行表于諸生歴官朝行好禮不變擢居小司成士論久已厭服為國學師無以易汝往哉惟不言而躬行使人益觀感于規矩之餘則首善之風振矣樞密院檢詳李祥國子司業敕具官某成均教事師道貴尊近歲雖長貳不並除而為士擇師不應以此為拘也爾馳譽膠庠見謂前輩文學行誼久服衆心諒直簡嚴不移素守郎潛以來藹有師儒之望兹庸命以少司成之職追還古風變而至道于以副朕作成之意尚勉之哉左司諫胡瑑司農少卿敕具官某朕之用人謹守成憲惟爾之用獨異他人始以編摩見于便朝奏對詳雅朕心嚮焉擢典中秘遂居六察居無幾何徑登諌垣期月之間屢獻忠讜引嫌自列執義不囘俾貳大農豈朕初志往祗乃事庸俟甄升同知樞密院事趙汝愚初除封贈曾祖東頭供奉官士慮贈太子少保敕國家親睦九族本支蕃衍侯王使相寵禄相望然雖在近屬無子孫贈典之文惟爾孫曽進秉事樞追榮之恩上及三世有宋以來實自汝始豈不榮哉具官某胄出熙陵慶綿漢邸生長承平之日涵濡信厚之風不顯其躬以燾于後本兵之任我得宗英推迹本原寵之宫保蜜章之渥賁爾九京曽祖母龔氏贈高平郡夫人敕士大夫遭時遇主致身兩地必有慶源之自仍多内助之先矧在吾宗可無異渥具封某婉嫕之質幽閒之度克相夫子寖大其家孫又生子起為公輔既錫曽門之寵併推婦爵之崇惟沁水之名邦實河東之沃壤以示廟祧之寵以増屬籍之光祖贈秉義郎不求太子少傅敕唐之宗室大用者九人而李適之為稱首追榮乃祖襃冊典物焜照都邑行道咨嘆著于史牒今爾之寵視古過之具官某禀資甚賢為善知樂雖事功不見于世而隠行實侔于天是生聞孫首致樞近既嘗逮事當揆所元用推黄壤之恩爰授青宫之傅三錫之命尚其未央祖母太孺人晁氏贈咸寧郡夫人敕惟晁氏世有名士在濟北號稱華宗女教既嚴壼彞可紀矧來歸于天族乃深篤于義方宜有後人克顯先世具封某結縭之訓蓋自家傳采蘋之儀實遵禮度相夫以道躬德曜齊眉之勤有子甚仁兼仲由負米之養三遷之教燕及元孫時元孫之元宋避廟諱所改一命之榮胙之大郡是為陽報尚服殊恩父贈大中大夫善應太子少師敕躬行之實莫著于隠微天報之昭殆同于影響苟能用一日之力何必活千人而興惟深仁厚誼有以過絶于人則隂功隠德終當暴白于世具官某生長富貴遭罹險艱菽水僅充而事親有卧氷躍鯉之孝伏臘未給而於人有解衣推食之仁片言可質于神明一飯不忘于君父教忠之訓既著生前篤行之名遂彰身後朕方命爾元子貳吾西樞察其許國之忠想見過庭之學寵之師範冠彼儲僚豈惟禰廟之是崇抑亦宗盟之未有尚其英爽式謹歆承母淑人李氏贈安化郡夫人敕朕顯登樞筦既以崇趙氏之祧加賁幽原其可忘孟母之訓具封某生自名閥歸于賢宗秉志靜專與少文而協趣處家約素為彭澤以忘貧一門相勉以孝慈奕世俱傳于清白是有賢子為予輔臣爰開順化之封用示追榮之寵毋重杯棬之感庶寛霜露之思妻淑人徐氏贈鄱陽郡夫人敕朕竝用親賢延登宥密雖曰家傳之懿如麟趾仁厚之風亦惟閫助之良有雞鳴警戒之道宜與偕老胡不永年用加寵榮以賁冥漠具封某天資柔淑婦德慈祥冊府道山才及見夫子英游之際副笄翟茀傷不逮小君命服之榮獨惟南渡以來久寓楚東之近始封此郡尚慰爾靈知䕫州趙鞏江西路轉運判官敕具官某爾起書生有志當世頃由名曹出鎮淮右孳孳邊備論奏相踵易帥䕫子民夷帖服事有當辯不已于言可謂首公忘私者矣大江之西漕事為重引以漸近朕意可知順流而歸祗率厥職江西提刑劉光祖知䕫州敕具官某䕫子之國介于楚蜀之間山川險固民夷雜糅謀帥之重心惟通才爾正色立朝號稱敢言出擁使軺威望日聳既授以江右之節矣尚兹家食非以優賢分閫之寄易以命汝亟其洗印以安逺民知昭州莊方知瓊州敕具官某瓊管以四州之壤屹立海中實與番禺相為引重大艑獻琛賴以為歸麾符不輕畀也爾進由儒科練達吏事貳郡濱水承流昭潭必能習知南海之俗往其輯寧蠻蜑勞撫賈胡以稱朕選侯之意軍器少監章穎左司諌敕具官某古者箴規之求下逮工瞽矧位于朝孰不進言以諌名官視古已狹選用之際其可不嚴爾蚤以掄魁寖登華序清標直節照映周行約史東觀横經朱邸端靖無華物自宗之擢居諌垣允協時望山甫補衮職之闕孟子格君心之非尚惟勉旃以伸素藴將作少監黄艾右正言敕具官某諌省設官備矣大夫而下幾于古諍臣之目比方並建遺補俱以引嫌而去妙選時彦乃今得之爾抱負不凢學為有用言簡氣勁宜備諌列輟自王邸命以拾遺爾其振厲風采别白是非引經据古以佐朕之不逮將虛已以聽焉資正殿學士正奉大夫蕭燧轉一官致仕敕朕睠言故老方深仄席之思遽覽封章乃有垂車之請勉從所志殊咈予懷具官某洪毅而裕和洪洪毅之宋時避廟諱所改閎深而肅括擢儒科于紹興之際登朝蹟于乾道之初自結主知蓋正人無待于助久司言責使天下想聞其風遍儀論思獻納之班遂參輔贊彌縫之用粤從去國亦既累年卧疾清漳興鄴下文人之詠掛冠神武慕山中宰相之高爰序進于崇階以曲全夫晩節噫漢疏知止既永謝于軒裳蕭傅素剛尚勉親于藥石蕭燧贈金紫光禄大夫敕舊弼退休方徇辭榮之懇奏函踵至驚聞垂絶之言撫往事以慨然愴吉人之已矣具官某名高一代仕歴三朝官以諫為名真得諍臣之體后非賢罔乂俾參鬷嘏之尊雖為故里之歸尚佇壯猷之告云何屬疾亟願乞身載覽遺章尚想伏蒲之氣優加卹典以彰告第之恩庸寄予悲務昌厥後噫求馬周儀形之見遂隔九京歌晉公柱石之衰重増一涕知建康府余端禮吏部尚書敕朝列選曹妙簡持衡之任位登常伯尤高荷槖之班兹得名臣式符時望具官某稟資洪毅履行精純慈扆結知蚤預甘泉之侍儲闈列屬久陪少海之游頃出鎮于雄藩實典司于畱籥既聞報政亟命還朝矧惟十載以來屢歴三銓之劇士論夙推于平允吏行素憚其嚴明乃于晝接之餘寵以天官之舊老成復進豈惟躬簿書期㑹之繁忠蹇自將正有賴朝夕論思之益其祗成渙用副虛懷湖北提舉張孝曽䕫路提刑敇具官某䕫子一道視四川為差近而山川深險雜以夷蠻民物凋陋困于征取典刑之使選用不輕爾出自名家敏于吏事持節湖外斂散以時往按蜀門布宣德意使深山窮谷舉無冤民則庶乎得職矣右正言何異湖南運判敇具官某朕監觀四方志不忘逺寄耳目于部使者猶恐不逮故間遣諫官御史以臨之爾自登朝行雅有清望頃因奏對擢居憲臺升之諍臣之列方有賴于規益引嫌求外授節湖湘典司將輸光華煜然夫以峩廌伏蒲之風抗攬轡登車之志揚清激濁在此行矣有猷以告毋有遐心四川制置使京鏜權刑部尚書敕朕體列聖寛仁之訓務謹刑章求一時忠厚之臣俾居司寇久虛此位今得其人具官某器度恢洪才猷挺特蚤結慈宸之眷亟登要路之津修聘殊鄰壯蘇武持旄之節開藩全蜀慨王尊叱馭之行百城咸服其恩威四載備聞于勞烈爰示賜環之寵俾陞聽履之班錫以贊書付之臬事罔兼庶獄朕方推文王敬忌之心明用五刑爾其慕臯陶邁種之徳尚殫辰吿以副予知秘閣修撰知紹興府趙不流職事修舉除集英殿修撰敕懷會稽之章久煩填撫報齊邦之政可後襃嘉具官某分派天潢服休仕路頃由淮甸來任飛芻輓粟之司旋尹京都遂登簪筆持槖之選起臨輔郡就擢帥垣迨茲期年知職務之時舉去此一水亦舉言之日聞乃諭柄臣俾陞寓職以璽書示勉勵之意母曰彞章使田里亡愁嘆之心尚圗來效梁季珌知光州敕具官某爾父在紹興間以才敏致位文昌其後未有至二千石者爾守上饒政務簡靜銜恤而去未究職業浮光易治地則被邊舉以命汝委寄為重尚其勉之母忝前人李沐吏部郎官敕具官某爾以舊學大臣之子自奮巍科寖登膴仕出使閩浙有志于民為養求歸嘉其靖退晉接之頃處以名曹親庭無信宿之遙選部乃攝承之舊往祇厥職無復固辭新知興元府章森改知瀘州敕開藩蜀部曾洗印之未聞易鎮邊陲又改轅而于邁惟首公之有素諒承命而遂行具官某知略該通才猷挺特進儀禁路入陪豹尾之嚴擢殿留都出擁麟符之重由上流之奏課畀西道以折衝十年而守漢中田叔固宜于久任五月而渡瀘水武侯豈憚于遐征矧羣情安集之初藉元帥撫綏之力推君子之心置小人之腹能坦然而不疑脱慈母之懐立嚴師之傍當翕爾而自定亟祗成渙用寛顧憂知福州鄭僑知建康府敕開帥藩于閩嶠曾未彌年司留籥于秦淮兹焉易鎮渴想儀形之見亟令郵置之傳具官某執徳不回秉心無競論議逺追于晁董文章高軋于漢周正色立朝尤推批勑之手至公典選允藉持衡之權皂葢頒春出臨千里錦衣行晝就撫三山欲改畀于麟符仍從馳于驛騎朝受命夕引道諒無憚于暑行退補過進盡忠正有資于辰告入奉受釐之對徐為分閫之行惟我舊臣服茲休命廣東提刑李信甫江東提刑敕具官某爾為御史直道而行出守信安旋使南嶠皆有聲績可紀矧錄囚于嶺海煙瘴之地不憚深逺勞亦甚矣抗章求閒未應捨汝其典泉事于大江之東少休馳驅而後攬轡以行亦惟休哉太府卿辛弃疾集英殿修撰知福州敕具官某七閩奥區三山為一都會地大物阜甲于東南負山並海綿亘數千里舉聽命于大府連帥之選豈云易哉爾以軼羣之才蚤著事功夀皇三畀大藩寵以論譔之華于今幾二十年召對便朝擢長外府益平豪爽之氣而見温粹之容朕心嘉焉比居外臺讞議從厚閩人户知之陞之集賢増重閫寄徃其為朕布宣徳意撫吾赤子以寛一面之顧憂朕豈汝忘哉著作郎黄由軍器少監敕具官某著庭之選最為清高矧爾以掄魁之英謇諤之氣周旋三館于兹有年經上要津無不可者然朝廷序進人物不厭于詳薦紳綿歴事任不以遲速計也進貳戎監仍攝劇曹益養資望以俟器使司農卿沈揆權吏部侍郎敕古有六官孰若天官之重部分四選無如武選之繁兹擇貳卿宜求吉士具官某高文贍麗古學精深自登周行雅有清望凡一時華要之選以累載周旋其間壁水道山為諸儒之領袖儲寮詞掖振六藝之英華屢垂上于禁途復優聞于郡課蔽自朕志召長大農寵之荷槖之聯畀以典銓之寄惟公可以守成憲惟明可以察衆欺倚聞稱職之名用助官人之道新知襄陽府宇文价改知遂寧府敕朕惟今日謀帥之難深以數易為戒卿有大邦遺愛之舊無嫌改命之繁具官某學有家傳才為世用奮身西蜀膺慈皇特逹之知累嵗中朝歴儒者清華之選佩印屢更于劔外分符最久于漢中峴首名藩方尋羊叔子之迹遂寧舊治更喜郭細侯之來諒去思之未忘宜外庸之益著往祖成渙嗣有寵光知遂寧府單夔知建寧府敕逺臨蜀部念頻年跋履之勞易鎮閩邦示鄉國旋歸之寵具官某受才通敏蒞政精明繇廷尉之年蚤被慈宸之眷擢侍臣之列最居羣彦之先祠庭寖閲于十年帥閫雄開乎三峽旋更㑹府罙著外庸仍次對之舊班畀建安之新組山川伊邇諒少慰乎遐心民社匪輕方有資于善政惟時舊徳服我茂恩張孝伯司農寺主簿敕具官某爾以學自奮吏治有聞三入朝行閲嵗滋久凡爾等夷騰上多矣退然靖共物論歸之兹以序遷勾稽農扈尚共乃事以就器業知廣徳軍林孝友大理寺丞敕具官某列寺皆有丞惟廷尉之屬其選為尤重必求通儒以治庶獄已試之效吾其捨諸爾頃居是官見謂稱職出守桐川又以最聞兹還舊班進用無壅惟明克允以副朕好生之意中奉大夫知襄陽府張枃大中大夫知建寧府陳居仁磨勘轉官敕夙嚴銓法所以示百僚之公優待從臣猶不忘三載之攷具官某神機敏悟器度閎深禁路升華久聽星辰之履帥藩因任葢得江漢之心陳居仁云性資夷曠學問淹該西掖代言雅得深醇之體南邦共理尤明寛猛之宜兹以年勞應于治典爰陟文階之等益增侯服之光思稱恩勞尚殫猷吿中奉大夫吏部侍郎沈揆磨勘轉官敕制禄以官式序百僚之進在法當從乃登四品之崇具官某儒學老成文華高勝儲寀有執經之舊祠臣推為誥之工屢結綬于朝行幾問津于禁路攝承民部更一紀而有餘積累年勞雖九遷而未艾茲擢天官之貳始伸銓格之優太中不易公卿庸表褒遷之渥大夫既掌論議益思獻納之忠新除兵部侍郎黄裳顯謨閣待制依舊嘉王府翊善敕朕惟國朝謹教子之法王府建翊善之官在太宗務選正人惟姚坦最稱直士自時厥後何代無賢我有論思之臣俾專輔導之任具官某以天下士從吾兒游自典秘書已參講席雖寖歴瑣闈之貴曾不離朱邸之僚誦典謨百篇之書既得坦明之制正春秋一王之法尤多深切之言力辭武部貳卿之除俾就文謨次對之秩于以究遺經之終始于以示朕意之眷留尚服訓詞益殫猷吿成忠郎邕州横山寨招馬官黄世明轉兩官敕具官某戎馬之須多自南徼爾招誘盡力累賞日厚併陞二秩以旌其勞敇賜進士及第陳亮承事郎簽書建康軍節度判官㕔公事敕具官某三嵗大比人徒知為布衣進身之途藝祖皇帝有言曰國家設科取士本欲求賢以共治天下大哉王言朕所當取法也廷䇿者再乃始得汝爾蚤以文藝首賢能之書旋以論奏勤慈扆之聽親閲大對嘉其淵源擢寘舉首殆留以遺朕也尚循故事往佐帥幕益懋逺業以須登用集英殿修撰耿秉權兵部侍郎敕長才被選嘗擢侍從之聮末疾自言閔勞官職之事丏閒寖久簡記不忘既加晝接之餘復畀夏官之貳具官某稟資端亮厲操堅剛篤志愛民雖細故必加逺慮推誠致主無一事不以上聞屢布藩條率騰善最甫登禁路俄領外祠乃俾賜環再趨文石之陛亟令持槖徑歸武部之班益勵壯猶以答隆眷皇叔祖少保士峴贈少師敕屬近行尊富貴既無危溢年髙徳邵死生宐備哀榮􅾜官某迪徳忱恂處心夷曠分暉帝籍雖坐致于顯融席慶王門曾不形夫驕吝磊砢維城之望雍容鳴玉之班奉香火于内祠允謂三朝之舊建節旄於輔郡更居亞保之尊胡不百年困于一病驚奉章之上達愴遺老之㡬何輟九陛之視朝冠三孤而錫命噫髙爵厚祿既已見于生前䘏典優恩顧何㤀于身後尚惟英爽歆我寵靈武徳大夫鄂州都統制張詔軍政修舉轉一官敕具官某國家分屯重兵列戍江滸申飭將帥務嚴紀律爾居鄂渚實當上㳺緩帶輕裘如一儒生而氣稟山西沈鷙善斷軍政修整徹于朕聞何愛一官以示表勸益勵戎昭用圖爾功直袐閣京西運判朱晞顔直煥章閣知靜江府敕具官某桂林為嶺右都會控制最逺帥閫久虚掄擇尤遴惟爾儒雅醇明練達世故葢嘗為部使者矣當鹽筴蠱弊之後協心扶持民懐其惠輟京西飛輓之重還撫南方增堯章寓直之名用為爾寵内安甿俗外戢蠻蜑人心知向條教易孚予自以為得人爾其有以稱此哉廣西運判方崧卿京西運判提舉張釜廣西運判敕具官某等嶺右分百越之半漕計匪輕京西總三司之繁事權尤重爾崧卿儒雅飭吏廉按有稱是用易以襄漢之節爾父清白傳家斂散惟謹是用圖爾桂林之居道里略同委寄無異飛芻輓粟既資辦治之才攬轡登車益抗澄清之志爾惟自勉朕不汝㤀太常丞李謙浙東提舉敕具官某部使者任常平之寄一道之休戚繫焉朕固不以輕畀而况近㡬乎爾篤志于學力行其言弦歌之政見于已試憂國之心形乎辭色輟從朝行畀以使節旱澇之餘嵗事未知周爰咨詢先事而圖浙河以東汝其任是責哉知寧國府蔣繼周知太平州敕偃藩巨屏正資共理之良易鎮鄰邦允藉上流之重惟時宿望聽我訓辭具官某經術融明材猷挺特厯居言路凜乎中執法之威屢剖郡符翕爾東諸侯之最念千里相安之久為三年報政之期乃睠當途猶為重地民風純靜素稱道院于江東訟諜簡稀真是太平之官府更藩舊徳為撫黎民矧擊柝之相聞亟驅車而及境雙溪疊障難伸願借之私五馬一驄又得宦㳺之樂其因詳試遂訖外庸木待問知寧國府敕具官某朕念儲闈寮寀之舊㒺匪極一時之選既已延登四人為予宰輔其在外里居者亦未嘗㤀也爾事朕有素家食累年起為二千石以示舊恩相攸久之兹焉始定宛陵為江右名郡以壽皇潛藩地望尤崇爾其往為朕撫字吾民篤志賑䘏以銷愁恨歎息之心豈惟有以副選侯之意爾亦将由是而進焉成都提刑楊王休本路運判知閬州續耆成都路提刑敇具官某等朕臨御萬方寄耳目于部使者地愈逺則任愈重蜀道萬里成都奥區其選又可知矣爾王休移自潼川方祗臬事易以漕節就按本道爾耆自守閬風頗著能稱俾乘憲以表表列城使民之利病徹于朕聞而朕之徳意布于遐徼揚清激濁威愛兼舉則為稱職矣知常州陳謙湖北提舉敕具官某為常平而置使專以惠民選名士以乗軺示不㤀逺邇服勤儒術抗志事功頃居編摩已著才望甫試繁劇優有治聲往行重湖之區典司義廩之政貿遷鬻海之利務在通商綏靖摘山之徒無致生事佇觀成績嗣有寵章吏部員外郎雷潨直煥章閣知平江府敕具官某姑蘇古郡號稱呉門宻輔行都最為重鎮地大物阜訟訴實繁衣冠走集應酬不暇非寛博强敏之士其何以居師帥之任乎爾以辦劇之才飾以儒雅嘗以一邑之長膺千里之寄又以十連之帥撫五羊之民召對便朝郎潛選部念未足以究爾之能也視邦選侯為朕一行加以堯章之職用為臨遣之寵倚聞異政以稱所蒙章森依舊知興元府敕國家謀帥豈命令之可移臣子徇公亦東西而惟命閒因有為未免從宜具官某文有古風神無滯用以禁路論思之舊為藩方師帥之良建業留都允藉保釐之略江陵巨屏久煩填撫之威惟此興元控于蜀道念開藩之未及又易鎮以有行不如舊貫之仍毋庸新尹之吿漢中地重肯形雞肋之書南國教明當息鼠牙之訟尚圖茂渥以答顯庸呉總知瀘州敕禁路通班久遂燕閒之適藩方謀帥允資撫御之良方起家而臨民諒聞命而引道具官某胄出勲門而被服儒雅世傳戎韜而深涉藝文澤笏彯纓舊為儀于朝列擁麾持節屢宣力于坤維眷此瀘川控彼南徼民生繁阜當勞來安集之餘軍律申明嚴坐作進退之節正賴中和之正往宣寛大之書西平王之在唐固多賢子諸葛侯之仕漢自有美聲益振爾家用固吾圉知太平州葉翥知婺州敕聽履而上星辰緬懐舊徳把麾而去江海又著外庸錫以明綸處之輔郡具官某性寛而有制道廣而能周為天子之從臣最先衆俊主國家之大計殆過十年謀謨備罄于忠嘉仕已不形夫喜愠乃睠文昌之老俾臨寳婺之區姑熟最聞未及賜金之寵括蒼地近何殊衣繡之榮倚觀中和樂職之詩益表平易近民之政其祗隆眷嗣有優恩劉俁廣東提舉敕具官某朕嗣服之初首下寛大之諂俾部使者分察屬郡務寛民力爾守岳陽推誠奉行凡加賦橫歛之病吾民者悉加蠲除幾去嵗額之半薦章交上朕甚嘉之嶺海去朝廷逺畀爾一節專歛散之權推岳陽之意而行之遐陬其息肩乎攻媿集巻三十六
