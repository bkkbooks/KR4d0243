body:
  text: 攻媿集卷八十三宋樓鑰撰祭文孝宗皇帝靈駕發引祭文同侍從維紹熙五年嵗次甲寅十有一月戊子朔十五日壬寅具位臣某等伏覩哲文神武成孝皇帝靈駕發引臣某等謹于道左恭陳薄奠攀慕龍輴臣等謹泣血頓首死罪言曰恭惟尊號皇帝道全徳備仁熟義豐列聖儲休承藝祖神明之胄中興垂統紹髙宗揖遜之傳亶超今冠古之資妙旋乾轉坤之略髙出百王之表規恢億載之圖若孝徳之大成葢聖人之未有永惟四海之養仰奉兩宫之歡以萬乘之尊躬行舜慕以三年之久親執堯喪釋神器以不疑事慈闈而盡禮方且凝神泰極介壽無疆乘飇馭以上賓攀龍髯而何及千官號慟兆姓悲摧茲當同軌之期既庀因山之役臣等叨塵班列夙荷生成痛靈駕之莫囘俯濤江而欲濟同傾丹悃敢薦芹誠臣等無任號天摧絶哀慕感切之至臣等泣血頓首死罪謹祭龔參政茂良嗚呼哀哉先生之生殆不偶然先生之用人則望焉先生之貶自古有此先生之亡則天道亦不可知矣嗚呼哀哉尚何言哉聖度如天斥者多還使先生少須臾毋死且少北矣而何朝露之遽先嗚呼禍福之變處之晏如疾在血脉而居非人之所居以馬伏波之堅壯猶不堪飛鳶之墮況愛嫡埋玉之痛雖有鐵心石腸能無動乎斯人也而有斯禍兹非命夫兹非命夫鑰受知先生十有七年出入東閤託身陶甄既驚嘆于云亡又哀夫父子之相隨于九原也聞旅櫬之言歸愧生芻之闕然向風一慟有淚徹泉祭謝樞密廓然丞同寺監簿丹丘之境上應泰階名徳輩出未躋公台惟公特起抱負竒才遇事風生游刃恢恢一言寤主風雲壯懐含香蘭省峩豸栢臺言聴諌行天顔屢開青霄直上富貴鼎來洪樞運動大政參陪謂當自此麴糵鹽梅天乎不淑梁壊山頽上意震悼生榮死哀某等叨列周行屢登翹材劍佩儼然公安在哉乃列斯殽乃酌斯罍失辭一慟我腸九回祭王丞相淮官同郎嗚呼魯公氣備才全結知三朝運逢半千紹興之季已任諫垣敭厯中外再歸日邊巍巍夀皇尤急親賢知公日深擢之邇聮憂國孜孜愛君拳拳無喜無愠不黨不偏若不勝衣似不能言臨機輒斷得君最專愛惜名器避逺勢權旁求髦俊坐鎮浮儇其崇如山其澄如淵宰輔七府十有四年彌縫藏用海内晏然縟儀大典奉以周旋無器可名靡勞弗宣經綸未究精力未愆名遂身退來歸林泉舜亦命禹龍飛御天甘盤舊學盍歸帝前上意傾屬虛左待旃嗚呼慶門多故天命不延嬴博痛念風木悲纒竟不勝喪一病弗痊兩宫震悼四方驚傳某等叨列郎吏久與陶甄絶望衮衣阻拜新阡敬以菲奠逺致几筵矢哀以詞有淚如川祭羅樞密㸃嗚呼天之生才足用一世如公之生為國之瑞氣勁而和色温而厲立登要津以學自致年不可及衆惟大器亹亹九遷逼以富貴而公謙虚得寵思畏樂善貪賢惟恐弗至公爾忘私力捄時弊憂深思逺語輒歔欷論事剴切無所顧忌退省其私不改端粹謂如若人宜居大位上以舊學眷寵尤異擢貳西樞望以經濟才五浹旬一疾而逝天胡不仁孰主張是賦以宏才登之兩地乃遽奪之哀哉殄瘁平生無玷俯仰何媿母方逺歸子不及侍公之齎恨有此一二某等仕同班列情均兄弟同寅協恭相勉忠義比日扈從尚得聨騎一宿九原驚悼喪氣潭府方新賀弔相繼矢詞寓哀痛哭流涕祭趙觀文彦逾惟我朝之天族兮分銀潢于仙源極富貴于承平兮盛人才于𤓰瓞之緜仰高帝之子孫兮固龍種之不凡惟我公尤為傑出兮掇儒科于妙年初小試于簿領兮騰政譽于瀛壖葺水利于不朽兮兩舟之濟人不知其㡬千由宰縣以佐郡兮聲名上徹于細氈阜陵畀以三輔兮藹遺愛之流傳上不畏于强禦兮下撫恤于黎元鉏積蠧之狡穴兮伸累載之幽寃將使指于諸道兮振風采于兩川一介不輕取予兮信靡勞之弗宣出藩入從兮擢文章之邇聯當紹熙之末年兮鯁論至于駢肩公實領袖于時髦兮心鐵石而愈堅劇羣情之危疑兮方憂夫杞國之天發大計于丹衷兮皇天后土實臨公之一言彼頌梁公之取日兮謂咸池與虞淵未若公之善斷兮定䇿于萬衆之先進忠謀于長樂兮又從容于平勃之間覩大明之繼升兮措世于泰山之安無官可以酬公兮視政路之清班偉君子之勞謙兮推勲名而弗專望蜀道而再登兮兼制閫于帥垣服袍帶而攜琴龜兮追軌躅于趙張之賢方讒邪之競起兮若蜩螗之羣喧馳睿旨于萬里兮俾書龍飛之末與顛陷宗臣于罔測兮將于此而求旃孰知公方平心直筆以進兮無一語之黨偏守陪都之管鑰兮歸佚于橰閒繙萬書以自適兮若將終其身焉痛妖孽之肆行兮裒凶鞠頑而盜大權又妄興于兵端兮致塗炭于三邊公雖身在外兮切憂時而拳拳豁天地之開闢兮更漢化而改弦起大老于海濵兮詢黄􅄠而罔愆屈故事而不得共政兮為帝師于經筵俄引疾以吿歸兮返錦里而名全猶薦賢以報上兮又開東宫之新編曾經濟之未究兮忽一疾而不痊邦國為之殄瘁兮惟我十倍于哀纒悵登門之雖晚兮幸接武于甘泉頃丐外而投閒兮亦來問舍以求田登百尺之樓兮十載奉公以周旋約五日以往還兮澹若水而無閒然酒三行而棊再戰兮望之者或以為仙時抵掌以劇談兮若相和之篪壎忝賜環之同日兮祖生先我而著鞭我方困于沈疴兮尚踸踔而蹣跚陪露門之進讀兮又聨鑣于九閽公既扁舟而東下兮謂將相隨而出闗乃匏繫而不得去兮徒尺書之翩翩謂獨居而無偶兮幸蚤歸而毋留連荷公之心相知兮夢曰繞乎故園何天之不慗遺兮棄塵區而蛻蟬念吾母之窀穸兮公之賜及乎九原感二子之受知兮正禮舉于後而公山舉于前繄龍門之高峻兮殆吾父子之宿縁何雲翰之未乾兮驚身世之遽遷寄薄奠于繐帷兮慘東望之風烟尚乞身以挂冠兮期執紼于南陽之阡相距纔四歲兮亦豈久于人寰爰矢心以致辭兮灑哀涕之潺湲又塟事惟公操厲冰霜忠貫日月東西惟命險夷一節求之古人葢以安社稷為悅者也功成不居橰閒道尊更化還朝進讀露門人望所歸尚秉政機難進易退竟歌式微送公江干欲隨出闗匏繫于茲夢寐故山寄聲促歸相從暮年我未得去公已登仙疾不及問喪不得慟尚期執紼少展悲痛抗章乞身六請未俞聞公窀穸哀不足而媿有餘亟遣長孫往致芻奠東望佳城老淚如濺祭趙侍郎粹中嗚呼惟公族糸盛于山東貂蟬風烈衣冠所宗建炎南渡名勝昂顒源深流逺古今貫通父子兄弟師友磨礱惟公問學俊氣如虹詞場策勲雁行雝雝一登朝班雅望已崇上嗟見晚眷意日隆年除嵗遷龍飛雲從容臺道山螭坳儲宫瑣闈批敕仇然獻忠天官銓綜姦弊一空論議從厚古人追蹤遇事敢言執節始終煌煌藝祖配天其功東向之議公論所同引經据古昭若發蒙言雖未用後當折衷出守池陽吏凜民雍自兹倦游冥冥飛鴻僧坊蕭瑟暮鼓晨鐘人不堪處公方沖融巻不去手圖書横縱顔筋栁骨翰墨尤工一觴一咏其樂無窮四明尚齒猶存古風雖有鄉老亦賴寓公公居其間俯首鞠躬人化其徳事之滋恭慶霈既頒盡還故封宜對宣室自茲登庸胡為小疾樂石弗攻一朝傾摧如千丈松某等辱居里閭許入社中登臨歗歌樽酒從容回首不堪頓失兩翁遺像儼然素髮方瞳有酒既旨有殽斯豐公乎來乎淚如奔洪祭莫侍郎叔光嗚呼國之用賢夫豈易然成徳如公而夀不延禀資中和宅心靜淵決科者三其勇無前朝行恂恂似不能言義有不可論正而堅璧水道山柱史掖垣揚厯清華斤斤十年直如朱絲思若湧泉簡知益深擢居右銓進也未央何疾之綿方將引歸朝露忽先一子秀發衣鉢有傳公固無憾人誰舍旃矧如我輩俱忝官聮不見㡬何遽驚蛻蟬相率來奠尚陳豆籩公能來乎有淚如川祭陳閣學居仁惟公少馳雋聲晚以文鳴徳望寖隆俊偉光明海内孰不知仰而知公之深者非至親不得其真情葢公之性資渾然天成如渾金與璞玉器用莫得而名故人知其坦蕩蕩而不知其日用之矩矱人知其無不可而不知其胸中之渭涇其治郡也但見惠利之及物而孰知鋤姦之若談笑其立朝也但見文章之經國而孰知獻納之出于忠誠以是舉世稱其長者士夫以為儀刑周旋五州有衰之愛盾之畏出入四朝有惠之和夷之清嗚呼人不為不知而知之不盡才不為不用而用之未盈可以穆天縡而謀王體可以運樞極而秉鈞衡於皇孝宗知公至矣謂使是人而坐廟堂自然安靖而和平大哉王言大用之意已形天胡嗇之殊遷之命交臂而失十年外庸身益逺于昕廷皇上趣歸既及帝京衆心顒顒謂今必用矣而一疾困之身欲進而不能君門咫尺而成萬里舟欲至而風引去于蓬瀛奉祠而歸人已觖望猶庶㡬復起而為蒼生豈知到家纔越信宿而千丈之松已傾矣親黨為之慟哭逺邇于焉嘆驚天蒼蒼而難問遂將埋玉璧于泉扄耶鑰生長外家小公九齡挹叢桂之芳潤攀紫薇之餘英相與事諸舅如諸父而中外親密如一門之弟兄卒不欵于情話徒追痛于幽冥朗朗百間可以安享于上夀乃不得一日之寧登虚堂而進拜悵遺像于丹青銜悲送公鬱鬱佳城舉一觴而致奠不知涕淚之交横也祭史敷文彌正八行之孫三公之子術業傅家公實是似小試詞場再拔其萃才名已昭所欠一第入丞大農蘭省攝事持節擁麾所至可紀太師年高貳卿即世相公煌煌惟公是倚拂衣賦歸一則以喜周旋數年先意承志一旦執喪不堪哀毁窀穸之奉杖而後起遂抱沈疴忽若蟬蛻使假嵗年顧何止此嗚呼長才葢棺已矣某等託契素深游從晩嵗持憲者五遽隔生死存誠觴豆兹乃來祭感今念昔相向出涕祭王侍御伯庠嗚呼公之學術能世其家公之操履終始無瑕出遇聖明風雲千載正色立朝藜藿不採退居里門善刀而藏天子念之起殿大邦䕫子萬里蕭然一舸尚無圖書安問蜀貨一來東嘉益見真清愛民戢姦郡政向成公病已侵公志益壯孜孜于民以至屬纊閭里相弔老稺涕洟正人云亡善類疇依精爽如生尚歆薄奠奉公之喪不敢不勉又同官惟公少年有場屋聲晩登霜臺四方威名出入蜀門清節著稱凡我士夫想望典刑一聞公來奔走出迎待人之謙與人之誠相顧歎仰如見古人孰不自勉以事父兄郡政一行風采已新庭訟無留日益精明恂恂拊摩薰然慈仁時濟以猛宿姦震驚博洽諒直如劉更生剛正亷介如宋廣平此真吏師所願奉承盛徳如公宜百其齡天胡不仁奪我老成飲泣巷哭嗟嘆相聞矧在僚吏若何為情巵酒未酹悲涕先傾又路祭嗚呼公之來兮雙旌紛馬輿兮往迎公之去兮丹旐慘千里兮相弔曾日月兮㡬何樂何少兮哀多欲攀轅兮執紼變歡謠兮悲歌嗟若人兮宜久蹇何為兮中夀巷哭兮失聲紛雨淚兮如溜設祖祭兮道周奠單杯兮泣柩瞻望兮弗及此恨兮何究甘棠兮峴碑尚千載兮不朽祭薛寺正季宣嗚呼天之不佑斯文耶如公之道學而施不昌天之未欲平治耶如公之宏才而用不彰議論之醇操履之剛根六經而貫百氏闡微言而蹈大方破千載利欲之謬妄掃諸儒章句之披猖葢書無不通事無不練一話一言皆絶人意表横騖别驅窮極幼眇而究其旨歸貫之以一初無相去之尋常施之政事著之文章真所謂不見其短又惡知其所長者也斯人也而不及中夀福善禍滛之道奈何乎蒼蒼嗚呼公之聲名海内所尊然形之于外者不茍徇乎衰俗之見藴之于中者人亦莫究其所存故不知者以為徒剛而已爾而知之者亦惟稱其直諒而多聞知公之深不過㡬人言之則大而似夸矣尚何言哉相向而哭失聲者葢嘗登公之門者也巵酒之奠相與悼善類之不幸一哀而出涕又何止為薛使君而已耶又辭靈鑰登門最晚受知獨深人之云亡百身何贖解組東去莫預執紼英爽如生諒歆菲誠知己之報嗟無及矣尚行所知毋羞九原淚盡辭窮嗚呼哀哉祭鄭龍圖伯熊嗚呼和氣生物本無偏頗惟公之生得之者多徳量淵澄而不見其涯涘性質玉粹而不勞于琢磨其形于文也渾然天成而上軋于周漢其進于道也怡然理順而深探于雄軻與之游如在春風之中登其門如入泰山之阿是非至明而涵容不顯其迹進退至切而雍容不見其他至于莅官則有不惡而嚴之風憂世則有哀而不傷之意發而中節兹又皆其所以為至和者也外庸既積物望罙重是當羽儀天朝登進法從獻納論思而格君心輔贊彌縫而藏諸用何皇天之不憖忽兩楹之奠夢仰絶識之超詣豈死生之能動惟慈母之垂白反銜哀而擗踊雖行道而心折矧為公之伯仲者耶某等登門最久渉學昏瞢時摳衣而請益或執經而折衷聞公之亡相與嗟痛喪不得束芻而酹葬不得執紼以送馳菲奠以寓哀徒向風而一慟祭吕太史祖謙嗚呼才難之歎豈謂凡才治不如古亦云久哉思得一人庶㡬于此才非不多未知孰是必也學窮本源行有根柢古今貫穿而守之以約規模宏大而不遺其細議論正平而得事機之要人物兼取而無愛憎之累表裏如一俯仰無愧若人者夫然後退可以為後學之師表進可以居朝廷之大位覬斯民之小康抑吾道之不墜惟公其人歟胡為抱道而不得試也嗚呼天之生公其亦甚難而不易賦之徳而嗇其夀誘其衷而不使伸其志葢天子欲用而公已病病不可以有為矣卧家優游尚足以矜式于一世何疾困之宿昔而逝嗟此數年凋喪善類天乎天乎又奪吾大賢是眞可為痛哭流涕者矣某等登公之門嘗聞餘論之一二顧平時師仰之不暇尚何敢知公之所至詩不云乎人之云亡邦國殄瘁抑公其人也相與設奠而哭以斯文是豈曰吾徒之私意也耶祭吕寺丞凝之嗚呼澤甫百夫之特學博而通文麗以則雅量鎮浮長才辦劇妙齡世科幕府婉畫乗邊二年日著聲績分符閬風再登上國入奏帝前漏下數刻論事衮衮濟以亮直庸節之學茫昧莫測君得其傳若數白黑往古來今可驗可索上意響合動容歎息曰卿毋行其在予側俾丞外府始有朝蹟雁序横飛家聲赫奕行且用矣何喪之亟向也聞君才氣無敵迨入脩門已見病色惟我同僚得友三益毎懐私憂勉親藥石戊辰之朝末疾俄得徑走君家已云易簀嗚呼天與以才而夀之嗇秘此絶學不使究極樽酒論文談笑翰墨俯仰之間已為陳迹岷峨西來萬里泛宅今將安歸行道嗟惜難兄乞州經紀甚力庶㡬孤嫠同此休戚鑰定交雖晚義深匍匐遇哀一動涕淚如激祭從舅汪刪定大辯嗚呼惟舅甥之間兮固曰至親粤我之于諸舅兮有異于他人葢生長外家兮非一朝一夕之積公亦依于伯父兮自齠齔而為羣飛黄著鞭兮媿駑馬之弗進一日千里兮悵奔逸之絶塵無詩不酬兮無樽酒之弗與琢磨至切兮亦游焉息焉而是均迨公之鼓篋上庠兮我亦繼薦于鄉老喜南宫之接武兮相與賜第于楓宸情好益篤兮㡬類于同氣年不相遠兮亦忘其分之卑尊仕于百僚之底兮氣出萬夫之上小試以事兮無不闗于細氈之聞逢此百罹兮凡三仕而三已鼻間栩栩兮眇軒冕于浮雲不負臨賀兮反貽怒于柄臣引經諏律兮又以激僚友之紛紜卷懐于家兮志則在于當世沈酣經籍兮益以探聖賢之深醇進于朝兮可以使藜藿之不採居于外兮可以使功利之及民投以所問兮惟明時之所用此公之所自許兮人亦以期于君忽竒禍之作兮真出于意表曾一指之傷兮害右肱之屈伸驚一世之英兮奄葢棺而事已紛孤嫠之叫號兮何蒼蒼之不仁嗚呼鑒裁至高兮不以我為不足語詞章之雄兮若謂我其可以與于斯文顧憂患之沈迷兮荷撫憐之日至登公之堂兮君今其安存望丹青之圖像兮何精神之逼真念一息之千古兮不知淚涕之沾襟翩飛旐之南征兮今其已矣言不成章兮尚何問于穹旻又同鄉人嗚呼景孟天賦竒倔少小孤立氣已英發一登上庠徑挹簪笏讀書俊甚如千里之駒遇事敏强若遼天之鶻知已在朝聲動魏闕當夷途之欲驤驚霜蹄之屢蹶浮湛里閭中不自屈方且横騖藝苑深探理窟冀此生之有用恥修名之泯沒雖矯矯亢亢高視一世而和之者寡然揆之公言顧豈非明時之人物也耶況復顙廣頤張生有竒骨音吐洪暢辭條豐蔚充其所養􅅽壤劘刜何竒疾之遽嬰禍乃生于所忽迨親友之及知則已葢棺而竟歿矣嗚呼今而後里有疑謀孰為之析理于茫昧事有難辦孰為之應變于倉猝此士友之所痛而以福善禍淫欲歸之于恍惚者也家四壁立夫將安施孤嫠一慟行道傷割某等義篤金蘭契連瓜葛悲埋璧于黄壤攬寒涕而執紼嗚呼景孟精爽何之尚能聞此言于髣髴矣乎祭姜總管惟公生長京華起自戚閈積習富貴遭時多難乃能奮身自喜吏幹天資精敏儒雅飾縁治絲之紛解繩之亂投以劇繁談笑立辦結交老蒼衆口爭薦中外筦𣙜所至增衍郡國韜鈐足當一面五十餘年宦游不倦晚而退休雍容閒宴為生有涯雅意作善結廬百間藏書萬卷蘭玉秀發簪笏輝炫外臺薦書上閤賓贊寓公寄客如公者鮮夀㡬八帙鄉閭歆羨胡為沈疴奄如露電嗚呼中原戰氛陸沈赤縣開元舊事于今㡬見承平王孫少日更練靈光一荒有識相喭某等里社從遊交情戀戀嵗月侵尋驚此物變曰樽曰醑曰爼曰饌矢哀以文有淚如濺祭劉宜人王台州母猗歟夫人婉嫕靜專生自名族嬪于太原夫人之夫學行推賢樂善好施餘慶綿綿夫人之子壯嵗騰騫高牙大纛名郡蕃宣相夫一心教子三遷綵衣斑斕孫曾滿前慈祥愷悌舉無間言五福兼備富貴俱全丹丘赤城版輿輕軒壺彛婦則誰其比肩自奉愈約執謙愈堅待人愈厚奉佛愈䖍一語不妄一言不偏坦夷真醇得全其天少疾考終忽如蛻蟬夀開九帙尚何憾焉某等託在鄉曲又忝姻連升堂進拜于兹有年慈容如生望之退然設奠矢哀涕泗潺湲祭史宜人太傳女兄惟靈八行之孫拾遺之婦孟母之賢共姜之守古稱五福其一曰夀夫人尤盛年帙開九惟我魏公視姊如母唐楊慎矜兄弟友愛事姊如母躬率四弟備極孝友俱登高年世所未有六老成圖夫人稱首慶事方隆疾已在腠進粥燎鬚醫禬趨走夜半訃聞悲哽心疚㳟惟此風俗可歸厚女壻乘龍芝蘭俱秀終始哀榮何憾何咎某等出入相門于茲嵗久薄奠薦羞淚落巵酒祭族兄心上人惟我鼻祖四子俱賢仲生先生衣冠蟬聨曰伯叔季仍居奉川既富且庶後乃日朘人物彫零賴有達源天乎不淑朝露溘先壽雖已穹惜不少延達源之生俊氣騰騫使其起家必收青氈少從釋氏白業精専結交老顔直與比肩曰律曰教又參枯禪説祖正令室中機縁通貫一理如珠在穿旁及百家覃思鑽研纂言記事細大不捐出其緒餘翰墨詩篇流傳江湖聲價愈喧世晚寖薄空門亦然耕而鹵莽乃芸人田耳剽塗説妄夸真詮行有説空誑欺人天惟師髙蹈得味中邉或勸出世如墜諸淵先君愛重挽之使前陳義甚髙萬牛莫旋我倅丹邱來游萬年欲與同車往尋祇園曰無累我徒驚林猿踏遍勝境徑歸海壖孤雲悠悠獨鶴翩翩念之意消望之若仙詩晩益工節窮益堅一鉢一衲遂以終焉我媿晩出最辱愛憐家有書種俾其力傳名節器業俾其勉旃我恐不稱服膺拳拳師棄塵世其猶蜕蟬有骨已灰無銘可鐫敬書梗槩以贊遺編茗盌三酹淚下迸泉祭謝雲臺傑嗚呼謝公人物之英爰自上蔡斯以道鳴繼以大參又有列卿文獻奕世不殞其名惟公巋然見謂老成文如綺錯辯欲河傾誘掖後進糾合宗盟髙懐骯髒不以事嬰漫仕委順浮湛半生一邱一壑自喜獨清永嘉名邦來為郡丞闗決之餘名流合并風流醖藉至今有稱然諾不侵自主門庭有如不肖一見心傾忘年許交語必盡誠去秋末宦寄徑赤城衝熱遠臨握手通情黄山密邇詩筒屢賡自言多病懶入帝京慨然奉祠欲為此行冀幕府之裨助望前輩之典刑喜而不寐日聴先聲茍孤縱之未汰當倒屣以逢迎訃音忽聞心折魂驚痛斯人之云亡傷耆老之彫零覽翰墨以猶濕乃遽隔于幽冥亟馳菲奠以寫中扃望東山以興哀尚髣髴其來聴祭周通判去非嗚呼直夫而謂止于斯乎始雖同登各天一隅余分郡符君方憂居間至偃室退公之餘講易談元為之躊躇劇論世故發蒙砭愚再仕嶠南備歴﨑嶇代答一書曲盡錙銖倘不忘逺當有取諸前宰劇邑赫然有譽遇事不茍動有規橅憂患熏心篤志弗渝渇然自憂求方于余謂當良已乃終弗除抱負不凡有銜不袪曽是半刺僅得緋魚近傳短牘周姓言孤啓緘恍然乃君遺書死生大矣何其舒徐揮翰寄别其言穆如數五十五尚明堪輿明月清風猶能自悟通乎晝夜晏然不殊嗚呼直夫而又何憾乎下交私情驚愴欷歔對客三誦淚與之俱淨光東麓遥望故廬矢哀以詞奠之生芻祭陸提刑洸陸氏家聲源流雲間左丞儒宗振于陶山大漕徙鄞及見盛際雙椿偕老八龍列侍公尤秀出三薦漕臺漫登膴仕益展長才荆門擁麾課最上徹孝宗一見畀以華節斂散得宜流殍再生就陞憲車刑期無刑大獄株連平反甚勇煩言俄興公不為動得請祠庭賦歸翩然士師辨明卒如公言宏逺之業巻藏退處卜居斯成生計楚楚里社相從期公長年小病困之卒隨逝川窀穸有時來致菲奠矢哀以詞有淚如濺祭趙安國鎮惟君孝于奉親友于羣弟自信淳直澹乎世味心計有餘能振其家乃築新堂不陋不華優游卒歳足以自適忽焉已矣天乎莫測青山滿門寒梅滿坡公則云亡傷如之何喪此善人鄉里嗟惜舉觴一酹涕淚霑臆祭張梅州祖順嗚呼刺史為千里之尊人生以五馬為貴茍仕宦之平進率以次而馴致今之士夫孰不為之何于君而獨不以畀公之才足以辦劇其嚴足以戢吏折獄則敏于片言理財則優于心計謹于奉法鋭于立事此真良二千石之選也而屢得屢失得又不久終不得以行其志自宰龍游政聲甚美擢守武當時方壮嵗既而數竒三仕三已徃倅番禺薦牘交至就秉一麾謂自此升矣而遽以不起予之早而奪之屢引之深而寘之于烟瘴之地是果有司之者耶豈造物小兒之見戲也嗚呼踰嶺來歸川陸迢遞一家纍然行道隕涕矧鄉黨之素交而同社之深契公之将行開樽盡醉曽嵗月之幾何而舉觴以為酹靈其來乎庶知此悲痛之意嗚呼哀哉祭趙運使善公生于荆南長于五嶺與七閩居乎樂成卒于杭而葬于鄞余與公傾葢稽山尋忝姻家中雖屢見而莫從容于永嘉望公自此嚮用矣而送公之喪于啓霞嗚呼是豈偶然也哉惟公才具有稱既敏而明受知孝皇擢寘列卿謂宜持槖仍尹神京流離數年起擁雙旌飛芻江右轉餉帝城文母上賔因山為陵公方力疾辦護訖成跬步要津徑登西清疾勢寖革大命以傾天子震悼親黨嘆驚夫孰知公此理素精悟死生幾如旦晝知吾身之不可以久生也謝醫郤藥湛然中扃爵禄在前不復入于心恩愛至重不以闗吾情泊然長往無物可嬰然則公之自處者如此吾黨亦何為而哭失聲耶鑰投分素深齊年為兄爰設薄奠以寫此誠蓋一死一生而交情乃見余亦不知夫涕淚之縱横也祭舒簽判琬通判璘猗歟舒氏何其多賢昆仲飛英俱自少年西美元英既已玉折于往嵗所賴以主門户者惟傳正傳道元質之鼎立而乃相隨于九原耶惟吾傳正負氣敢言晩對大廷直聲凛然止或尼之不至帝前尉于武昌恩威並宣日剖滯訟自以不冤五溪峒蠻動興戈鋋匹馬深入且諭且鐫投戈解仇羅拜馬前遠邇驚嘆咏歌四傳通籍金閨将宦閩川一疾困之遂至沈綿祠禄甫頒朝露遽先惟吾元質良知自天蚤登上庠受知南軒一日千里師友淵源學道愛人中心拳拳新安客授範模陶甄横陽撫字吏畏民安私淑諸人春誦夏絃本思無邪貫三百篇處以治中傷哉士元嗚呼二公之亡也固無所憾于其身我之弔也傷吾今不復見此二人兄之于事如燭照而數計季之于人如熙然之陽春主盟義風聲至響臻事無劇易人無故新鄉有曲直不于公堂而惟兄之愬人有叩請不之他人而惟季之親今而忽焉連璧沈淪嗚呼天之于舒氏何多予以才而不使究于用不予以利禄而强其名豈名者造物之所甚貴有非利禄之所能均耶我有疑慮從誰咨詢里有後生繄誰是遵悲夫傷哉靈輀有行雙旐相因薄奠寫哀豈吾儕之私情上為清時惜此人物而下為吾鄉痛二公之不得伸也祭從兄少微縣丞惟我大父二十餘孫列為五家同出一門嵗久凋零僅有十人兄為之長又殞其身兄號秀頴早登成均謂收世科致身青雲留落久之始預搢紳數年之間為尉為丞介然自守不緇不磷歸而後病卜築湖濵奉祠香火女嫁男婚庶可佚老而疾已成抱疴視䕃傷哉沈淪諸父盛時游宦頻仍禮智二院久矣比鄰兩家子弟情誼尤親讀書從師調琴相應方期晩嵗杖屨逢迎幽明遽隔孤嫠惸惸葬從其先遠日數旬酌奠送行涕淚霑巾祭李府君奉化鄉人東郭之外湖水清澈脩梁駕空霜筠茂樾居者何人如湖之清有隱君子隴西先生先生之家為儒絫世上舍之孫香彎之弟仰屋著書其書滿家不偶于世鄉閭之華鸞鶴精神方瞳華髮望之儼然叩之斯發三絶韋編究極微言身則已矣此書當傳謂君百年後進承楷一疾困之無不傷駭原始反終旦暮死生書種有繼何戀何營惟今來者非親則舊典刑之亡使我心疚窀穸有期來奠一巵哭者失聲先生何之祭表兄馮耤田端方外門汪氏諸表森然惟我與兄始終周旋姻好絫世生又齊年嬉則同隊學則差肩惟兄敏悟得之于天加以篤學經史貫穿長而屬文思若湧泉俱從鄭師尤工賦篇鴻慶孫公一代儒先見兄駢儷歎驚屬聨得兄百韻報以長箋二文照映至今流傳盍登青雲操筆如椽命胡數竒場屋迍邅年及半百始沾賞延所至文鳴筆力翩翩詞人所長多工一偏兄備衆體詞妥意全間見層出左右逢原持之以謙似不能言晩尤清修一室罄懸久依相門賔主俱賢貴名日起益壮益堅擢居掌故進司耤田享途伊始一疾弗痊薦紳嗟惜親黨涕漣兄我所畏猥先著鞭吾徒掌制媿在盧前極口贊揚未嘗舍旃喜兄欲達而乃忽焉繐帷咫尺欲酹無緣亟遣兒曹往陳豆籩矢哀以詞歴歴究宣言不盡意老淚如川攻媿集卷八十三
