body:
  text: 攻媿集卷四十七宋樓鑰撰内制提舉淮南東路常平茶鹽公事陳損之奨諭敕書以常平司見在米麥及收糴物斛分撥入州軍賑糶共二十萬石朕嗣服之始旱潦相仍宵旰興懐務行實恵首形詔告所望部使者推廣上恩初不以重費為憚也卿使淮堧盖嘗乆興水利兹又能發其餘蓄上不仰給于大農下有以平八郡之糴邉民被恵已廣而又將為後日之儲有臣如此實寬顧憂載覧奏章良深嘉歎賀金國生辰使副梁總戴勲到闕傳宣撫問并賜銀合茶藥口宣卿等逺聘殊鄰旋歸近境念舟車之勞勩頒茗劑之珍芳仍命行人往将予意賜銀合臘藥敕書荆湖南路安撫使王藺卿西樞故老南國元侯念兹觱發之辰賜以竒􅎇之劑體予至意勉爾壯猶四川安撫制置使趙彦逾卿視儀兩地出鎮四川錫品劑之竒珍慰風寒之匽薄益厚頥養用寛顧憂主管侍衛馬軍行司張師顔卿肅領騎兵分屯江國頒寳奩之珍劑慰玉帳之凝寒其體眷懐益恩忠藎御前諸軍都統制閻世雄皇甫斌張詔趙廞劉忠劉震卿等肅提禁旅列戍藩方念乆處于轅門俾匪頒于奩劑毋云例卷其服恩綸御前諸軍副都統制馮湛張國珍田世輔李世廣王宗㢘王知新田臯卿等逺臨外戍宻贊中權念營壘之嚴寒錫禁庭之上藥尚思奮勵以答恩私報登寳位使副鄭湜范仲壬到闕傳宣撫問并賜銀合茶藥口宣卿等握節言旋及門伊邇厚荈劑珍芳之賜勞川途跋履之勤庸序爾情特将予意賜銀合夏藥敕書荆湖南路安撫使王藺卿嘗位元樞往臨南椘爰錫珍芳之劑用清暑愠之祥将以寳奩賁于帥四川安撫制置使趙彦逾卿不辭叱馭諒已開藩爰加珍劑之頒仍賁寳奩之賜用示恩于宗老期解愠于吾民侍衛馬軍都虞侯張師顔卿總提騎将往駐金陵當溽暑之在辰出珍芳而分賚尚綏衆士如濯清風御前諸軍都綂制閻世雄張詔趙廞劉忠劉震田世輔卿等分戍价藩撫安戎壘出上方之凉劑分内府之珍奩坐覺生風諒欣承命御前諸軍副都統制馮湛張國珍李世廣王宗亷王知新田臯卿等分提禁旅宻贊戎和乃馳賜夫芳珍冀逺清于蒸鬰惟兹解愠可以忘勞賜銀合夏藥敕書知潼川府費士寅卿舊居兩社出撫東川緩帯輕裘逺著藩維之效寳奩珍劑往寛炎鬰之煩益謹節宣以綏寵渥四川宣撫使安丙卿仕聫執政職佐宣威蜀道籌邉想帥垣之多暇暑風届候将珍劑以分頒豈惟清遐徼之塵抑以解吾民之愠江淮制置大使丘崈卿恩視政塗任分制閫炎威将熾念戎幕之賢勞靈劑匪頒均上方之珍品庸昭渙渥以滌歊煩四川安撫制置使兼知成都府呉獵卿寓直從班鎮臨制閫増雪山之重念撫御之良勞當南風之薰冀節宣之撫爽爰頒珍劑庸示優恩京西湖南北路宣撫使宇文紹節名在經幃威宣將閫上流増重念袢暑之賢勞良劑匪頒助薰風之清穆其均此賜以慰彼民殿前副都指揮使兼江淮制置使趙淳職領殿巖任隆制閫屬風埃之甫定當溽暑之寖隆爰錫珍奩用將寳劑坐消煩鬰仍助節宣侍衛步軍都虞侯措置防捍江靣王處乆肅領衛兵出臨天塹壁壘多暇濤波不驚屬當炎暑之隆宜厚珍芳之錫尚承殊渥以豁煩襟侍衛馬軍行司權管榦本軍馬職事張良顯肅提精騎分駐留都當溽暑之寖隆屬氛埃之甫定爰頒珍劑用滌煩襟益謹節宣以圖綏靖御前諸軍都統制李郁畢再遇秦世輔王大才彭輅某等肅提戎律綏靖邊陲當溽暑之寖隆屬風埃之甫定永懐勞勩宜助節宣爰畀珍芳以銷煩鬰御前諸軍副都統制周整莊松何汝霖劉元鼎魏友諒薛九齡王鉞某等協佐戎昭克勤軍務撫帥徒而整暇當炎暑之藴隆緘寳劑以分頒即栁營而加勞賜安南國王李龍翰嘉定二年厯日敕書敕安南國王某朕仰稽天運豫受民時爰分厯象之書徧及方隅之境眷惟南國世奉中朝此疆雖逺于山川嗣嵗先頒夫正朔用均恵利尚克欽承金國弔祭使人赴闕口宣紹熈五年十月盱眙軍傳宣撫問賜御筵有敕卿肅持使指来慰國哀眷入境之云初豈肆筵之可後往宣予意以勞爾勤鎮江府賜銀合茶藥有敕卿等肅擁使華逺將慰禮經鐡甕山川之險錫寳奩茗劑之珍宜體眷懐用安旅次鎮江府賜御筵有敇卿等来趨素幄行次丹陽雖深銜恤之悲不廢示慈之宴是将厚意式寵行人平江府賜御筵有敕卿等逺從燕驛近及吴門深嘉唁問之勤宜備賔筵之渥其承異眷益進来程金國弔祭使人赴闕口宣赤岸賜酒果有敕卿等逺将慰問来届近郊先之㫖酒之頒増以嘉肴之錫少安次舍用息勤勞賜御筵有敕卿等握節載馳赴疆来弔将展國喪之禮宜先郊勞之儀其體眷私少休匽薄賜被褥鈔鑼有敕卿等逺致奠儀乆勞客路爰厚寝衣之賜仍分盥器之珍跋履之餘撫存加渥宻賜大銀器有敕使華既接弔禮斯勤宴已備于饔飱器仍加于銀鏤是為異渥少慰賢勞賜生餼有敕卿等少安賔館既畢弔儀按聘禮以受饔命廩人而致餼諒均徒御咸體眷懐賜内中酒果有敇卿等禮謹弔喪退將即次頒酒殽于内府示恩寵于来賔意則一餘物惟俱稱朝見訖歸驛賜御筵有敕卿等慰此國哀見于喪次爰暫休于燕館用初秩于賔筵首示殊私嗣加好賜就驛特賜衣服金帯銀器衣著有敕卿等弔喪自逺率禮無違器分山溢之珍衣有身章之寵雖云多品未盡至懐賜内中酒果有敕卿等肅将使節来唁䘮幃嘉有客之多儀出尚方之珍品甘芳俱厚寵眷彌加在驛特賜射弓酒果有敕卿等既肅哀儀難修賔射雖輟主皮之藝仍加設醴之勤殽核俱頒情文尤厚特賜射弓御筵有敕卿等交鄰有道序賔以賢屬當變禮之時仍飭初筵之賜穿楊何取折爼惟優特賜射弓例物有敕卿等慰予國恤厚乃賔儀雖觀射之未遑顧匪頒之可後悉從常禮以表眷懐朝辭訖歸驛賜酒果有敕卿等弔哀事畢贈賄禮成將遄車馬之歸載厚壺籩之錫其承嘉貺復啓長途賜御筵有敕卿等既趨素幄遂别彤墀禮下替于權輿恩更加于觴豆尚安旅次徐屇歸程回弔祭國書皇祖上仙嘗馳赴問沖人嗣位方服通喪荷信使之逺来辱弔儀之加厚益堅盟好彌切感懐哀疚既深敷陳難究回賀登寳位國書祇奉慈謨勉承丕祚比飭行人之告兹勤信使之来儀物有加書函尢備既荷禮文之厚益欣盟好之堅爰謹報章用陳謝悃報謝登寳位國書祖武是繩孝思方切勤使華之逺暨知盟好之彌隆品物具陳情文俱稱比已騰于報櫝爰再飭夫行人仍致彞儀用將謝悃報謝賀慶元元年正旦國書三陽攸慶方夙戒于行人萬里交歡復逺勤夫信使恵以函書之厚加之篚幣之豐爰飭報章備宣謝臆惟益堅夫世好冀均介于春祺金國弔祭人使回程口宣賜龍鳳茶并金鍍銀合有敕逺修問兹遂旅歸茶分北苑之珍器備南金之飭是為異渥用慰遐征赤岸賜酒果有敕卿等返斾云初出郊于邁加六壺六籩之饋致三辭三揖之勤式慰爾歸用將予意賜御筵有敕卿等成禮云歸啓途未逺意方勤于郊送恩宜視夫賔初既厚眷私益堅信睦平江府賜御筵有敕卿等弔儀既備使事言旅行已次于蘇臺恩仍頒夫鎬燕禮及加厚客路具宜沿路賜使副冬至節絹有敕使且北歸日方南至載念脩途之役俾加厚幣之將其服恩榮尚寛旅思讀祭文官有敕卿逺陪膚使歸遇新陽爰頒束帛之温以助重裘之燠益昭眷渥庸慰賢勞三節人從有敕長至維時逺歸在道言念禦寒之具特加實篚之珍賚賜有差恩私無異鎮江府賜御筵有敕卿等来修慰禮既畢使儀望北薊以還轅至南徐而憩節庸加燕衎其悉眷私盱眙軍賜御筵有敕卿等来成使禮歸吹邊疆更加燕豆之勤不替權輿之舊其承眷禮遂戒征途金國賀登寳位使人赴闕口宣盱眙軍傳宣撫問賜御筵有敕卿等持禮逺来入疆伊始念川途之匽薄加燕勞之優隆徒御少休賔儀無爽鎮江府賜銀合茶藥有敕卿等来擁使華逺申盟好念舟車之勞役頒茗劑之珍芳爰飾寳奩以迎玉節賜御筵有敕卿阼云初親仁是務肅使華于近鎮謹賔禮于初筵益屇来程以承眷渥平江府賜御筵有敕卿等逺持賀禮来次輔邦再加燕衎之私庸示眷存之渥少休跋履且慰勤勞赤岸賜酒果有敕卿等来次郊闉肅将賀禮寵以上尊之賜加之碩果之珍式佇来游以堅信好賜御筵有敕初御丕圖逺勤信使既次郊闗之近載如燕豆之優其體眷私以承虗佇金國賀正旦使人赴闕口宣盱眙軍傳宣撫問賜御筵有敕卿等逺將聘禮来賀嵗元既加壹勞之勤首示肆筵之渥其祇眷意益謹賔儀鎮江府賜銀合茶藥有敕玉節方来寳奩是錫取雪芽于北苑輟珍劑于尚方并寵行人用昭眷意賜御筵有敕卿等逺持華節近来次方行登象日之畿重錫需雲之宴益加盛禮庸示眷私平江府賜御筵有敕履靖之始修聘甚勤行既次于近藩禮宜加于載燕是為異渥其服多儀赤岸賜酒果有敕卿等逺從萬里来賀三朝望觀闕以非遥賜壺籩而加腆尚承眷渥以締歡盟賜御筵有敕履端之始将命以来既聞畿甸之登宜厚賔筵之錫春私所逮使介維均賜使副春幡勝有敕綵杖土牛方舉春郊之禮寳幡金勝爰如使客之恩和氣所鍾歡盟益厚賜三節從人春幡勝有敕卿等修好時重履端爰加厚于使華乃分頒夫節物儀雖辨等意則均優朝見畢歸驛賜酒果有敕卿等既覲軒墀歸安次舍俾厚壺籩之賜少休車馬之勞毋曰彛章實惟至意賜生餼有敕卿等進講賀儀退休賔館既設豆籩之渥仍加饔餼之頒尚體眷懐以湏異數賜内中酒果有敕卿等来趨日正兹遇嵗除出御府之甘芳助驛庭之晏集益修賔禮用介春祺賜被褥䤬鑼有敕卿等来趨元日将覲大昕爰加賜于寝衣仍分頒夫盥器用安次旅以示恩私入賀畢就驛賜酒果有敕嵗律更新使軺逺暨酒致屠蘇之勝盤隨椒栢之芬均受春陽益増和氣玉津園射弓賜御筵有敕兹開禁籞用設射侯既觀舍矢之能爰錫在公之燕有發必中不醉無歸朝辭畢歸驛賜酒果有敇卿等甫辭殿渥尚憩賔郵載為川陸之行更厚壺籩之錫益祇眷渥以示初终賜大銀器有敕卿等既成聘禮將治歸装乃頒什器之豐皆用五金之次是為異渥式助遐征囬程賜御筵有敕卿等成禮言歸登途欲逺仍特頒于載燕曽不替于初筵春日尚寒賔僚加厚賜接伴使副春幡勝口宣有敕卿等往迓使軺還趨行闕值陽和之届律加好賜之如儀其服殊私益祇厥事金國賀登寳位使人到闕口宣賜被褥䤬鑼有敕卿等肅将使指来賀君臨爰頒盥洗之珍仍致衾茵之麗用安次舍其服恩私賜使副春幡勝有敕卿等逺修邦好適遇春陽爰加節物之頒庸示使華之寵尚祇渙渥益締歡盟賜接伴使副春幡勝有敕卿等迓客于畿還朝有日當此新春之始特加好賜之優其體眷私益修使事賜三節人從春幡勝有敕春起于東使来自北舉綵杖土牛之禮頒寳幡金勝之華儀則有差恩無所異朝見畢歸驛賜御筵有敕卿等来致賀儀歸安賔舘念川途之勞勩設樽爼之優隆庸示眷勤少休跋履賜酒果有敕卿等拭圭修聘將幣成儀爰加芳醖之頒仍厚嘉殽之錫少休徒御以俟賔筵宻錫大銀器有敕卿等陳儀既備執禮滋勤欲深示于情文爰宻頒夫用器非金之貴惟意之將賜内中酒果有敕卿等来修邦好克謹賔儀分御府之甘芳示使軺之華寵雖云例卷蓋出殊恩賜生餼有敕卿等既謹朝儀退安賔次俾廩人之致餼冀使者之加餐異數相望眷懐増厚特賜御筵有敕卿等趨朝甚謹授館方安修客禮以無違秩賔筵而有楚特将予意庸慰爾勤特賜酒果有敕卿等進謹朝儀退安賔館賚此壺尊之腆加以肴核之珍蓋示殊私尚承好賜玉津園射弓賜酒果有敕卿等肅駕使軺共修賔射諒慰四方之志想聞百發之能爰錫甘芳少休勞勩賜射弓例物有敕卿等講射寳津視儀相圃爰首頒于弧矢仍加賜夫金繒張弛具宜恩私愈渥朝辭畢歸驛賜酒果有敕卿等講射寳闕事畢言旋錫列甕之芳醪洎加籩之珍果少休賔馭行届歸程賜御筵有敕卿等履勤入覲兹遂告歸更加籩豆之優不替權輿之始尚祇燕禮徐戒行装特賜銀有敕卿等備成使事俱趋歸程特頒山溢之珍用助清馳之役毋云故事蓋示優思回程赤岸賜酒果有赦卿等已祇聘禮初計歸程迺馳賜于上尊仍分頒夫碩果少安旅次徐屇征逺賜御筵有敕卿等持禮言還戒途伊始爰啓在公之燕用華修聘之歸既秩賔筵遂登客路賜龍鳳茶金鍍銀合有敕卿等邦好既修回途未逺珍茗選春芽之賜寳奩分山溢之餘是曰殊恩用將厚意平江府賜御筵有敕卿等賀禮既周歸程寖逺甫即蘇䑓之次載修鎬燕之儀益向長途毋忘厚意鎮江府賜御筵有敕卿等逺来致慶倏遂言旋念北客之改轅即南徐而錫爵眷私無替禮貌罙修盱眙軍賜御筵有敕卿等来持慶禮回次邊疆欲締好于兩朝復陳儀于四簋行當上道更祝加餐金國賀正旦使人到闕囘程口宣賜龍鳳茶金鍍銀合有敕卿等將命言旋登途寖逺飾寳奩而加恵實珍茗以分頒深示恩私式安行役平江府賜御筵有敕卿等来賀履端更勤歸報洊錫吴門之宴用津燕驛之行春日尚寒征途加䕶鎮江府賜御筵有敕肅持玉節還次丹陽仍優宴豆之儀用慰川途之役其均既醉毋憚遄驅盱眙軍賜御筵有敕卿等逺賀元正汔修使事爰肆筵于邊服将夙駕于歸途眷禮之私始终無異報謝使副林季友郭正已回程到闕傳宣撫問并賜銀合茶藥口宣慶元元年正月一日有敕卿等握節言旋登載告至想風寒之匽薄念川陸之艱勤茗劑寳奩併加存撫金國諭成使赴闕口宣嘉定元年八月盱眙軍傳宣撫問并賜御筵有敕卿等載馳原隰始届疆陲當和議之既成喜歡盟之復締首加勞問仍示宴私鎮江府賜御筵有敕卿等持節鼎来楊舲既濟望信書之漸近啟賔燕以加勤其體眷慈式遄行邁鎮江府賜銀合茶藥有敕卿等肅擁使華来修邦好爰厚寳奩之錫用加珍品之頒庶滌煩勞式祇延佇平江府賜御筵有敕卿等逺將信幣来次近畿嘉膚使之再馳宜賔筵之三錫是為異數用賁行人赤岸賜酒果有敕卿等徒御逺来郊圻宻邇爰再頒于甘醴仍分錫夫嘉肴行色休休賔儀是飾賜御筵有敕卿等遥驅使傳切近國郊將修昕旦之儀重錫需雲之宴式昭眷意益謹前窺賀生辰國書使介載馳伸講誕辰之慶郵音垂諭少遲良月之期䖍致函書逺将篚幣用祝無疆之算益堅有永之盟施及黎元同躋仁夀攻媿集卷四十七
