body:
  text: 攻媿集卷五十一宋樓鑰撰序止齋春秋後傳左氏章指序春秋後傳左氏章指二書故中書舍人止齋陳公傅良之所著也春秋之學不明久矣啖趙之後至本朝而後有泰山孫先生復尊王之說彌顯公是劉先生敞權衡意林等書訂證尤詳伊川程先生頤雖無全書而一序所該聖人之大法備矣自王荆公安石之說盛行此道幾廢建炎紹興之初高宗皇帝復振斯文胡文定公安國承伊洛之餘推明斯道勸講經筵然後其學復傳學者以為標準可謂大全矣東萊吕公祖謙又有集解行於世春秋之義殆無遺蘊止齋生於東嘉天資絶人誦書屬文一旦逈出諸老先生上歛然布衣聲名四出六經之說流行萬里之外而其學尤深於春秋鑰非深於此者嘗涉獵諸公之書非不明白然亦不過隨文辯釋間有前後相為發明者亦不見體統所在鑰自客授之初即從止齋游雖不得執經其門嘗深叩之同在西掖時始以隠公後傳數篇相示因為道春秋之所以作左氏之所以有功於經者其說卓然且曰自余有得於此而欲著書於諸生中擇其能熟誦三傳者首得蔡君幼學蔡既仕又得二人焉曰胡宗曰周勉游宦必以一人自隨遇有所問其應如響而此書未易成也未幾去國而鑰亦歸雖若相忘於江湖而友朋之來必以此書為問雖親炙之者跪以請則曰此某身後之書也迨卒於嘉泰三年而此書始出其壻林子燕最得其傳又四年而後長子師轍與其徒汪龍友以二書來鑰老矣如獲希世之珍屏去他書窮晝夜讀之始盡得其大意嗚呼盛哉蓋未有此書也先儒以例言春秋者切切然以為一言不差有不同者則以為變例竊以為未安公之書不然深究經㫖詳閱世變蓋有所謂隠桓莊閔之春秋原集因避宋欽宗諱凡桓字皆作威今改正後同有所謂僖文宣成之春秋有所謂襄昭定哀之春秋始焉猶知有天子之命王室猶甚威重自霸者之令行諸候不復知有王矣桓公之後齊不競而晉霸文公既亡晉不競而楚霸悼公再霸而又衰楚興而復㣲呉出而盟諸夏於越入呉而春秋終矣自杜征南以來謂平王東周之始王隠公遜國之賢君其說甚詳而公以為不為平王亦不為隠公而為桓王其說為有據依又其大節目如諸候改元前所未有齊魯諸大國比數世間有世而無年至記厲王奔彘始有紀年古者諸候無私史乗與檮杌春秋皆東遷之史也書齊鄭盟於石門以志諸候之合書盟於鹹以志諸候之散是春秋之終始也隠桓莊之際惟鄭多特筆襄昭定哀之際惟齊多特筆諸候専征而後千乗之國有弑其君者矣大夫專將而後百乗之家有弑其君者矣宋魯衛陳蔡為一黨齊鄭為一黨公㑹齊鄭於中丘而後諸候之師衡行於天下罪莫甚於鄭莊宋魯齊衛次之而父子兄弟之禍亦莫甚於五國是可為不臣者之戒矣齊桓公卒鄭隨朝楚夏之變夷鄭為亂階侵蔡遂伐楚以志齊桓之霸侵陳遂侵宋以志楚莊之霸足以見夷夏之盛衰矣書公孫兹帥師書公孫敖帥師書公子季友卒皆見三家之所從始首止之盟鄭伯逃歸不盟則書以其背夏盟也厲之役鄭伯逃歸不書蓋逃楚也夷夏之辨嚴矣自隠而下春秋治在諸候自文而下治在大夫有天下之辭有一國之辭有一人之辭於于戈無所不貶於玉帛之使則從其爵勸懲著矣文十年而狄秦又三十年而狄鄭又五十餘年而狄晉狄鄭猶可也狄晉甚矣貶不於其甚則於事端餘實録而已矣此皆先儒所未發至僖之三十一年四卜郊不從乃免牲猶三望極言魯之用天子禮樂以明堂位之言為不然惠公始乞郊而不常用僖公始作頌而以郊為夸引祝鮀之言為證此尤為前所未聞也若左氏或以為非為經而作惟公以為著其不書以見春秋之所書者皆左氏之力章指一書首尾専發此意昔人以杜征南為丘明忠臣然多曲從其說非忠也公之章指謂君子曰者蓋博采善言禮也者蓋據史舊文非必皆合於春秋或曰後人増益之或曰後人依倣之或以凡例義淺而不取或以例非左氏之意蓋愛而知其惡者乃所以為忠也又言莊公元年至七年及十九年以後訖終篇多無傳疑有佚墜公之求於傳者詳矣嗚呼與止齋遊前後三十年不得卒業於其門既興殄瘁之悲而後得二書其間尚有欲質疑而不可得此所以撫卷三歎而不能自已也息齋春秋集註序吾鄉四明慶厯皇祐間杜楊二王及我高祖正議號五先生俱以文學行誼表率於鄉杜先生又繼之講明經術名公軰起儒風益振厥後伊洛二程先生之興得其傳以歸者惟故禮部侍郎高公公天資純篤濟以勤敏師友淵源學問精詣入上庠登舍選已有盛名諸公貴人爭欲壻之拂衣而歸建炎二年升補上舍紹興改元徳音免殿試賜同進士出身十三年高宗初建太學遴選名儒為四方所推服者為少司成公實應選士子雲集凡學之規則皆所裁定明年三月車駕幸學講易泰卦於上前擢貳卿將嚮用矣以直道忤時宰一斥不復家居累年中夀而殁洎端明汪公登從班奏言公學行出處之詳始詔復次對官諸子而公之名愈顯矣自頃王荆公廢春秋之學公獨耽玩遺經専以程氏為本又博采諸儒之說為之集註其說粹然一出於正然猶未行於世也仲子得全知黄州始取遺藁刻之而屬鑰以序鑰生長外家汪氏於公有連雖生晚不及承教而猶記拜公牀下竊聞之公既投閒杜門屏居畧不以事物自攖日有定課風雨勿渝此書之所以成也嗚呼泰山孫公明復前篇書名此書字故異著尊王發㣲深欲明夫子襃貶之㫖伊川先生則謂後世以史觀春秋謂襃善貶惡而已至於經世之大法則不知也自有春秋以來未有發此祕者公亦曰仲尼懼先王經世之法墜地莫傳欲立為中制俾萬世可以通行故假周以立王法而託始於隠公焉且以文武之道期後王以周公之事業望魯之子孫也以此推之春秋固非一王之法乃萬世通行之法也其推明伊川之意類如此昔曾子每誦夫子之言則必曰吾聞諸夫子子夏使西河之民疑汝於夫子曾子罪之說者曰言其不稱師也觀公之序直引伊川之序不更一辭可謂稱師而知其所本矣伊川有序而傳未成公之書成而未有序此當屬之深於春秋者鑰何人而敢預此黄州言之再四竊幸因得託名於不腐乃弗敢辭公諱閌字抑崇子孫能守家法其興蓋未艾也古文孝經指解後序古文孝經實吾夫子之舊秦火之後出於屋壁而顔芝所藏十八章已先行於世翼奉張禹等五人各自名家古文惟孔安國馬融為之傳而又不顯隋開皇中劉炫為作稽疑一篇已多譏笑唐陸徳明亦云古文世既不行隨俗用鄭康成註十八章本獨一劉知幾以為行孔而廢鄭諸儒爭辯蠭起明皇亦以今本註而序之書以八分刻之經臺猶在長安童而習之皆此也司馬文正公僅得古文於祕閣之藏為之指解嘗以進仁宗哲宗而范太史祖禹繼為之說噫自漢以來何其好者之寡也故信州使君季公天資純孝篤學好古尊敬此書又為詳說不惟發明夫子之㫖又以文正公之解隨文演暢用意甚勤辭亦詳備如愛敬可行於匹夫而惡慢不可行於天子如論忠順之不可失如不敢遺之機甚㣲而其效甚大又曰要路云者言所敬者寡所說者衆也曰至徳云者言所敬者廣而所因者本也皆有所啟發非苟然者紹熙五年七月皇上踐阼有詔求賢公以八月進此書未幾中書舍人陳公傅良又為之繳進於經筵初欲刋於廣信而不及公之子淇念此書之未行將刋於家求為後序經曰故自天子至於庶人孝無終始而患不及者未之有也明皇注云始自天子終於庶人尊卑雖殊孝道同致而患不能及者未之有也言他此理故曰未有此說非也古文小異故自天子以下至於庶人文正公則曰始則事親也終則立身行道也患謂禍敗言雖有其始而無其終猶不得免於禍敗而羞及其親未足以為孝也季使君又以明皇之事證之是矣鑰竊以為猶未為詳且明敢申言之夫聖人一經可謂詳矣而其立教之要専在此數語孩提之童無不知愛其親是人之於孝未有無其始者夫子所以為曽子諄諄言之正欲人之有終也夫子首以總言孝道次分天子諸候卿大夫士庶人之孝大小之分固自不同而又於此謂孝道有始而無終未有不及於禍患者此則無有貴賤之别後雖具述孝治聖治之效以至終篇然其教人之最切無過於此上下一體俱當盡心焉明皇惟不知此所以不克其終可不戒哉篇末云孝子之事親終矣止為喪祭之終猶未為孝之終也若所謂孝之終與此孝無終始之終蓋為立身行道死而後已者也故雖曾子既啟足手以其能全而歸之自以為知免矣然而易簀一節猶在其後蓋大夫之簀猶非其正也嗚呼聖人之言可謂深切而能有終者亦豈易易乎鑰餘生無幾深知兢懼得正而斃所願加勉故以告有志之士且以補二公之說云范忠宣公文集序惟昔賢者皆後世之師表而學者之慕古人則自各有不同如汲黯之慕袁盎司馬子長之慕藺相如若有不可解於心者本朝先正名徳相繼如泰山喬嶽景星鳳皇事近而易考嘉言善行皆當取則而區區之愚少而讀元祐丞相忠宣范公言行録反復終始正學大節偉識宏度贊歎不足於諸鉅公間尤願執鞭欲追逐其萬一而不可得也如奏議國論等書責人如責已助亷成徳之訓又若避好名之嫌則無為善之路等語皆當終身誦之每恨未見其家集也嘉定五年三月甲戌公之從曽孫中書舍人之柔見過謂鑰曰忠宣文集未行於世晩而謫居永州三年邦人至今懐仰比因沈使君圻赴郡以家藏本屬之既已刋就而舊無序引徑以見委鑰謹謝之且曰託名不腐豈非晚進之幸豈非平日之願頋年衰學落何足以預此三辭不獲則取而伏讀越兩日而盡得之蓋公天資誠確篤志學問承文正公之親傳愽之以泰山孫明復徂徠石守道盱江李泰伯三先生師友之益發為詞章根柢六經切於論事無有長語而一出於正文忠蘇公序文正公集有曰其於仁義禮樂忠信孝弟如飢渴之於飲食欲湏臾忘而不可得又曰雖弄翰戲語率然而作必歸於此故天下信其誠爭帥尊之公真是似者哉而鑰之所尊敬者此又其餘事自其立朝出鎮廟謨相業具載史册不待贅言惟公本於忠恕得二者之功用深入吾夫子閫域非淺丈夫所能窺者溫恭惟謹無異稠人遇有當為勇決過於賁育此其大過人者然亦尚可勉也心平而寛慮周而逺喜恕哀樂所發而必中克伐怨欲不止於不行包含太虛無所適莫姑以其見於外者一二言之鄧綰嘗奏罷公襄州及言者攻綰則極力爭之謂已經先朝責降不應再有所貶公亦非有意於以徳報怨自謂上惜朝廷事體下以安人情反側黄黄門誦楊畏彈章而公去相位他日哲宗面斥黄門公從容為解黄門謂公為佛地位中人章子厚得罪父年九十議與一便郡公言當置徃咎而念其親公本以議新法不合而去及溫公將盡改熙豐之法公謂特當去其太甚又湏徐徐經理論差役一事尤不可暴操心類如此公既喪明而責知隨州尋竄永州蓋子厚必欲寘之死地而公素安義命無一語怨之家人猶未平也風雨中覆舟於江以救僅免拭面而語家人曰此亦子厚所為耶嗚呼使之從夫子於陳蔡當亦有不容何病之言此非他人所及也蔡新州重得罪公力救之上忤亷中下違同列賢如劉元城諸人以呉處厚為義存君親而詆公不遺餘力公不為動卒貰其死一時不以為快及事之變自劉忠肅吕汲公等雖終於貶所其得免於已甚著始知公之不寘新州於死之力也汲公軰竄嶺表郊赦未頒先謂難從恩宥公齋戒奏大防等年老疾病何以自存迹其所罪亦因持心失恕好惡任情以異已為怨讎以疑似為訕謗誤國害公覆車可鍳此不惟欲寤泰陵正欲感動子厚輩使之革心而從厚也嗚呼自熙豐元祐以至元符紹聖之間世事屢變翻覆非一徽皇踐阼改元建中靖國流人悉歸四海望太平於朝暮欽聖顯肅皇后與徽皇待公而為政至遣中使逺至湖外好賜牽復迎勞不絶公時在瞽廢風痺中知上果用我亦欲感激自奮而病不可為矣嗚呼天乎倘延以三數年之夀使再得政則調一天下可以仰副建中靖國之意豈復有後日之禍哉公既已矣而蔡吕俱召吕又為蔡所擠而任蔡愈専矣此所以撫卷長懐而繼之以太息流涕也後之君子多識前言徃行以蓄其徳者於此書可不熟復而力行之以代絃韋之佩乎文正四子長監簿以疾蚤殁忠宣與二季皆顯衣冠蟬聨然自忠宣以來一百二十有四年而後中書舍人始繼世科實監簿之曾孫范氏之興未艾也王魏公文集序神宗皇帝不世之資高出百王始相荆國王文公君臣之間義同賓友奏對徃復載於史可知也元豐之初主徳已成天容毅然羣臣尊仰將順之不暇非復熙寧之比惟左丞魏公起由庶僚自結主知以省寺八品官而特許賜坐與府尹奏事而命奏罷獨進一為柱史許以直前而又導之使諫待遇之意固已卓異於餘子公亦感慨自奮不負所學論事上前守正不阿精當剴切其視同列如野鶴之在鷄羣一時才氣無出其右者若其論說古今治亂災變警戒計邊餽之非實杜西師之再舉除市易之罰息而别以内外救徐勲之詔獄而戒其出入折姦侫之萌辨是非之際皆深中事機有以變移主意而一出於義理之正言議風烈凜凜生氣神宗傾聴奬拔嘗謂公曰朕與卿兄弟如同産然是知神宗聖度恢偉容受直言而當時俛伏聴命無能有所論說者蓋皆具臣不足以佐下風耳不然公之抗直安得容於朝廷之上乎公之五世孫直顯謨閣厚之編次遺文屬鑰為序鑰曰文公之文固不待序而顯校理之文曽南豐為之序而陳后山繼之使鑰誦左丞之書則可何敢以此自任顯謨公求之不置鑰曰吾有以應子之求矣田承君晝天下士也送别鄒道鄉之言可畏可仰是豈苟於從人者在公幕府至十有五年㣲公不足以致此客㣲承君不足以入公之幕也為公家傳其稱公之文則曰踔厲駿發卒歸宿於道制誥溫潤豐美得中和之氣而屬辭贍洽成於口授上數稱之誥命有可以通行者俾公為定辭以新之公在翰林舊制尹京者不行詞時高麗修貢數以奏來上而所用答詔以十數有㫖學士等槩為之執政欲人求一通以塞㫖而上乃獨用公所草其後既為丞弻每下大詔令與通好夷狄多屬於公若籌邊之妙畧立朝之大節皆炳炳如丹又採長老之論縉紳大夫之談謂公厚徳懐人如晉羊祜直節敢諫如魏辛毗吏治儒雅如漢張敞風槩整峻如唐溫造昌黎有曰知其客可以信其主知其主可以信其客公之賢足以表千古承君之言可以信後世鑰不侫尚何敢措辭於其間陳都官文集後序制置使陳官由地官貳卿出鎮四明政成暇日以家藏曾祖都官文集刻之郡庠屬鑰為序謝不敢且曰蔣魯公之序詳矣何敢贅既不得命敬題於後曰高哉都官之節也魯公稱公之學曰雅志之所學以謂為道而不為利此學者之所當守而不失仕者之所當遵而不變者也若夫平日之論高出於䕫契之上而至其趨時之事乃卑出於管晏之下者此固令舉之所鄙也稱公之文曰大者則以經世務極時變小者猶足以詠情性暢幽鬱蓋其於道如此而其辭亦不足道也可謂備矣然猶若有所畏避而不敢盡言鑰不侫敢補其所未言者嘗三復公之遺文而得其為人蓋其抱負素已不羣本之忠義充以學問以安定胡先生為師所友自東坡先生而降皆天下士淵源又如此萬言之䇿經濟之規模定矣自以親結昭陵之知身雖在外遇事輒發書論災異言尤激烈三上英宗書又皆人所難言迨神宗作興銳意治功王文公得君用事法度更新諸老大臣爭不能得抵巇取爵位之人不可勝數風俗為之大變至有逺在蜀萬里外官為偏州騰奏於朝盛稱青苗新法之美而捷登膴仕者公方宰山隂例以秩滿登館閣小忍不言豈不足以平進而抗章力辯繳納召試堂劄自取竄責而不悔方且優游廬山與劉公凝之騎牛松下窮幽尋勝以自娛適呼嗚非凝之不足以當歐陽公之廬山高非公不足以侣凝之之賢也使當時以公一言而寤君相之意安有後日之紛紛哉公既窮老以死其子訴寃又重得罪然其後再傳而得祕丞及刪定二公三傳而貳卿出陳氏益大天之報施何如哉讀公之文者能以是求之然後知公之高風大節猶將廉頑立懦于百世之下毋徒玩其華藻而已也清真先生文集序班孟堅之賦兩都張平子之賦二京不獨為五經鼓吹直足以佐大漢之光明誠千載之傑作也國家定都大梁雖仍前世之舊當四通五逹之㑹貢賦地均不恃險阻真得周家有徳易以王之意祖宗仁澤深厚承平百年高掩千古異才間出曾未有繼班張之作者神宗稽古有為鼎新百度文物彬彬號為盛際錢塘周公少負庠校雋聲未及三十作為汴賦賦凡七千言富哉壯哉極鋪張揚厲之工期月而成無十稔之勞指陳事實無夸詡之過賦奏天子嗟異之命近臣讀於邇英閣由諸生擢為學官聲名一日震耀海内而皇朝太平之盛觀備矣未幾神宗上賓公亦低徊不自表襮哲宗始寘之文館徽宗又列之郎曹皆以受知先帝之故以一賦而得三朝之眷儒生之榮莫加焉公之殁距今八十餘載世之能誦公賦者蓋寡而樂府之詞盛行於世莫知公為何等人也公嘗守四明而諸孫又寓居於此嘗訪其家集而讀之參以他本間見手藁又得京本文選與公之曾孫鑄裒為二十四卷中更兵火散墜已多然足以不朽矣公壯年氣銳以布衣自結於明主又當全盛之時宜乎立取貴顯而攻其嵗月仕宦殊為流落更就銓部試逺邑雖歸班於朝坐視捷徑不一趨焉三綰州麾僅登松班而旅死矣蓋其學道退然委順知命人望之如木鷄自以為喜此尤世所未知者樂府播傳風流自命又性好音律如古之妙解顧曲名堂不能自已人必以為豪放飄逸高視古人非攻苦力學以寸進者及詳味其辭經史百家之言盤屈於筆下若自己出一何用功之深而致力之精耶故見所上獻賦之書然後知一賦之機杼見續秋興賦後序然後知平生之所安磬鏡烏几之銘可與鄭圃漆園相周旋而禱神之文則送窮乞巧之流亞也驟以此語人未必遽信惟能細讀之者始知斯言之不為溢美耳居閒養疴為之校讎三數過猶未敢以為盡力淇水李左丞讀賦上前多以偏旁言之因為攷之羣書畧為音釋闕其未知者以俟博雅之君子非敢自比張載劉逵為三都之訓詁也鑰先世與公家有事契且嘗受廛焉公之詩文幸不泯没鑰之願也公諱邦彦字美成清真其自號厯官詳見志銘云制使待制陳公政事之餘既刋曾祖賢良都官家集又以清真之文竝傳以慰邦人之思君子謂是舉也加於人數等類非文吏之所能為也北海先生文集序皇朝文章之盛高掩前古徽宗在御天下承平上則日月戴承星文雲彩之效祥下則靈芝朱草赤烏白鵲之呈瑞名表進賀殆無虛時文士角立爭奮所長無不工緻形容鋪張以為盛觀㑹進築順州得枸杞宿根於土中其形􅋙伏仙家以為千載所化馳獻闕廷上生於壬戌正符所屬之辰尤以為善祥百寮欲以詰朝拜表諸公閣筆相視無以措詞先是庠校英才久束於王氏之學不習應用之文車駕幸學欲進一表而無能應者時翰林學士綦公為諸生出藁袖間無不驚服至是已為學官有薦公名者延致東閣授以題意公從容屬聨妙絶一時首曰靈根夜吠變異質於千年驛騎朝馳薦聖人之萬夀眷荒裔沈藏之久實王師恢復之初物豈無知時各有待既進天子為之改容即日喧傳京師諸公咸自以為不及也公初起北海之濱學殖甚富不求人知自是貴名日起遂登館殿未及施用而以内艱去矣建炎二年高宗駐蹕維揚公航海朝行在一再還而為郎明年輪對一見契合恨見之晚擢左史攝瑣闈召試中書文不加㸃玉音擊歎即正西掖進用之捷未有近比永嘉南渡之行公在帝側實代王言詔㫖所至讀者感動諸將奔走承命如陸宣公之在奉天也尋入翰苑當羽檄旁午書詔填委之㑹而播告之修不匿厥指吕忠穆公以首相開督府訓辭尤為宏偉有曰盡長江表裏之封悉歸經畧舉宿將王侯之貴咸聴指呼其能布宣威靈張大國體類此語公篤意經術博覽强記以直道自任才高而氣剛平時為文不為崖異之言而氣格渾然天成故一旦當書命之任明白洞達雖武夫逺人曉然知上意所在非規規然取青嫓白以為工者比也夫唐文三變宋之文亦幾變矣止論駢儷之體亦復屢變作者爭名恐無以大相過則又絶為長句全引古語以為竒倔反累正氣況本以文從字順使於宣讀而一聨或至數十言識者不以為善也惟公與汪龍溪追述古作謹四六之體至於今行之然此等在公皆為餘事盡忠竭誠遇事極論進而造膝退多削藁以輔成中興之業公之力為多焉公之薨於紹興十有二年秦丞相方當國専政以罷相草麻之憾恨不得甘心焉至二十九年而後宗丞李公益能始狀其行又至三十三年而後得參政周忠簡公銘公之墓公之從孫煥丰集公文為五十六卷藏於家鑰生晚不及拜公下風而多誦公文文贅倅丹丘始見家集益聞出處之詳晚而投閒有更生者亦公之從孫蚤有雋聲寓居吾鄉嘗以公海上詩刻求跋為之詩曰晉陽固自有高共奉天豈可無宣公當時扶日滄海東尚想健筆驅長風指麾諸將如奴童中興當數第一功㫁碑毋庸詫詩工制藁具在鑾坡中更生致謝再三且曰今之知北海先生者蓋寡遺文將遂版行願為之序鑰曰公之文有傳又得託名於不朽不復固辭屬更憂患既免喪而後敢為下筆懼不足以發揚公之盛烈謹銜媿而書之公諱崈禮字叔厚濰州人北海其自號也攻媿集卷五十一
