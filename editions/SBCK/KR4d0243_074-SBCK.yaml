  text: 攻媿集卷七十四
  hash: sha256:9a198aea29184b624d9c417e22f21e0dccb8a0cd81e03f052603b8288904f288
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_074-1a}
body:
  text: 宋樓鑰撰題跋跋沈智甫所藏東坡帖諌帖一首今佚其文案原目此首前有跋五坡公以端明殿學士侍讀學士為定州安撫使紹聖元年落職知英州道貶寧逺軍節度副使安置惠州帖中又言過邢州疑是此時再遭逺斥不知所與何人既言道友恐是佛印參寥諸公以書唁之公不領細人姑息之愛而望其警策以進于道一見梁邢州之善政而亟稱之不計身之百謫恐一善之不聞嗚呼此其所以不可及也跋揚州伯父所藏張魏公帖魏公謫連州凡四載夫人侍太夫人居長沙紹興二十年移永州始迎版輿同處時伯父揚州以湖南漕兼潭帥權臣當國士夫或以傾覆遷客為進身計伯父義概凜然劉杼山在全則持使節以過之魏公在連則時節餽問其母自潭過永又津其行魏公所以致謝之勤也百謫不怨惟思報上徳而收拾人物之心猶不少忘可以畧見公之所存矣又錢希白三經堂歌紹興二十四年嵗在甲戌先銀青部綱過儀真鑰實侍行時七伯父方以漕使兼揚州遂到郡齋公餘出示書畫卷有草書一軸末章云君家世世為好官後書錢希白今五十年矣偶以問諸孫而桂始出此卷葢三經堂歌也希白名易呉越國王倧之子與其兄昆隨俶歸朝願從科舉年十七舉進士御試三題日中而就言者以其輕俊而黜之太宗語蘇易簡曰朕恨不與李白同時易簡曰有錢易者李白才也太宗喜曰若然當用唐故事召至禁林㑹盜起劍南不果用復舉進士甲科又舉賢良方正科官翰林學士俊逸過人為文數千言頃刻而就又善行草書有文集在秘閣觀此卷可知其人也宋諫議敏求著東京記載崇慶坊司空致仕李昉宅有孝經道徳經為三經堂家有東京圖崇慶坊在城之東北有李昉司空宅則詩所謂夾城盡北十里街者也黑轓葢用漢舊儀丞相兩黑轓事攷其家譜子孫為郎者衆獨未知客曹為誰司空之子宗諤為翰林學士年不及五十真宗甚悼之恨不及大用且曰自國朝將相家能以聲名自立不墜門閥者惟昉與曹彬家爾宗諤之子昭述亦為翰林侍讀學士從子昭道爲天章閣待制世世為好官非虛言也跋從子深所藏書畫東坡公以元祐五年在杭州治西湖四明圖經載太守七人皆止書元祐年韓宗道李莘李閌王子淵張脩劉淑吕温卿不知所與何人謂視此民猶公民雖欲勿與得乎錢明逸張文潛錢子飛父子兄弟俱中制科作字猶有父風然以言事致杜范富三公皆罷政惜哉張右史手書自有一種風氣與大禮慶成賦藳相類林和靖蔡端明范太史和靖名逋字君復而曰君復頓首古有此例比西臺差少肉信然求仲蓋用三徑事也蔡端明詩見于集中第八卷題云二十二日山堂小飲和元郎中牡丹向謝之什范太史筆勢端重似其爲人集中今無此詩家傳謂自紹聖之後貶責萬里屢遭焚溺之厄元符喪歸再嚴黨禁家藏文字固已不全靖康避地遷徙所存益少悲夫劉杼山伯父揚州與杼山同在京師太學相與最厚觀此書詞交情可見此皆在貶所書也第二帖三霍之言雖出雅謔葢是時鮮有與遷客相親者故鴻慶孫尚書亦有望望然如避垢汙之言其志先伯之墓有曰余謫洮陽夀玉方持湖南使者節過我相勞苦如平生與此意不侔矣第三帖問疾而進苦語有味其言哉鑰少隨侍溧陽及拜公牀下見與伯父一書其言尤切有曰久聞夀玉後堂甚盛某不敢謂然吾儕老矣違情逆境固不可堪若縱意于聲色之娛為計似疎其于保夀命也左矣人世浮生其誰不死眼前亦何嘗見有百嵗之人然古人必謂衞生有經者大恐未死以前或因此疾病纒身舉動須人其況亦何可堪也嘗歴歴服膺此言不知舊帖何在前輩責善之義如此陶公安世因公之言遂為伯父上客後所立亦不負二公之知時先君銀青為道州僉幕避伯父親嫌而歸亦過清湘見公故帖中兩問及後在溧陽受知尤深公嘗曰某無他長頗能對客發書草聖飛動觀者必謂敏手鑰親見其落筆沈著詳緩甚不茍也感愴疇昔謹為詳志之李西臺西臺不惟以書名毎見其詩真有唐人風度紙尾花押筆力亦不凡錢曲臺昆吕芸閣大臨蘇後湖庠錢裕之善草􅀠而字體又與希白子飛不同郤近李西臺但未老耳芸閣先生經學之餘詞翰皆有餘韻後湖居士詩筆俱老豈奪命鬼手之後哦詩結字尚有餘習耶止之諱正由了翁次子其與前輩相接如此家風可知游御史酢建安游先生從伊川遊在謝上蔡楊􅀛山之間宜其與了翁父子相厚也龍舒爲今佳郡是時乃空乏如此天災流行可無先備耶趙清獻清獻平生四入蜀先為蜀州江原縣後歴梓益兩路漕使又兩知成都最後則已為執政矣神宗亦曰能為我行乎帖中言寄家甬上單騎入蜀是為部使者攜一琴一􅀛時耶徐東湖徐東湖與了翁家相厚如家人通判郎中即了翁次子止之也呼以仁弟情義可知韓南陽宋宣獻文潞公南陽為元章簡公書神道碑字體莊重正如此宣獻傳言筆法精妙上嘗取所書千字文及其家之墨迹藏禁中故敝紙渝墨尚有典刑潞公翰墨飛動使人望而畏之曹子方祐陵盛時曹公上書極論時事廟堂質責之問所從知對曰天下皆知之而相公不知所謂焉用彼相遂貶去京尹不忍辱之引頸荷校而行吏卒問何以為路費曰少俟吾子已而一介草履負擔而至即其子也問所攜前則草履後則乾糧卒輩憤然欲加捽辱子奮曰我父得罪朝廷爾曹敢加無禮我當殺爾愕不敢動靖康初召還寖至樞筦又閩人也宜乎逰了翁之門石曼卿張都官石學士以書名所謂愈大愈竒者張都官未知何等人要是前輩作字不茍如再拜尊􅀱施于所敬今亦不見此風矣張魏公紫巖翁忠肝義膽炳炳如丹蓋矢死而不變也使士夫俱能懐此心國其庶幾乎吕子約哀哉子約見其書如見其人始余以隆興初元與其兄東萊為同年聞子約之賢而未識也淳熙九年子約来掌庾事余在先君服中時時相過情義日篤服除舍弟買舟赴調或傳以為余將西上子約在庾中亟以片紙力言其不可前余固不為行計然此意不可忘也其後兩得同朝迨天台贅倅之行又見其遭貶自此不復得見亦不意其蚤没也嘗評其人楊秉三不惑之外視軒冕又如浮雲非勉强然也見其進未見其止觀人多矣未有表裏如一如子約者所謂葢有之矣我未之見也九原可作微斯人吾誰與歸周蓮峯朱􅈞山王侍御伯庠紹興之末蓮峯周貳卿歸自永嘉􅈞山朱公舍人歸自平江俱以次對來寓四明僧舍侍御王公年雖未及而從二公遊完顔亮既平周公賀表用萬馬救中原對一驢載都市朱公問之侍御適參坐誦臧質傳中數十言二公俱稱其强記故倡醻之頻如此周公之詩三惟中篇及朱公一詩皆親筆侍御皆使人代書葢至敬之地不敢縱筆也山谷與王才元舍人詠牡丹詩云欲搜佳句恐春老試遣七言賖一枝周公豈用此事耶鑰少時俱及拜三公牀下撫卷惘然豈復得此前輩人物乎徐明叔剡溪雪霽圖伯父揚州所至辦治官府清簡坐多佳客如徐公明叔其一也幼時猶及望見徐公之風流韻度如晉唐間人翰墨篆畫四明人家多有之時徐貳卿獻之為守與敘宗盟久留郡齋如秦詔刻石篆韻皆其筆也嘗為髙麗使屬盡圖其山川器物以歸兄穉山侍郎有重名從子子禮志其出處甚詳謂畫入神品山水人物二俱冠絶濡毫漱墨成于須臾此卷幾是矣命女壻狀其行則近故參政張公伯子也因併記之跋再刋裴公紀徳碣熙陵命王著集法帖第五巻有李斯篆十八字米南宮云未知何人書蓋亦不敢以爲斯之書也黄秘書伯思長睿著法帖刊誤云按其文云田疇耕耨為政期月而致法令使父子爲鄒魯乃李陽冰篆王密所撰明州刺史河東裴公紀徳碣中字也此帖乃摹田疇等十八字爲斯書與碑中篆無銖黍差而米云不知何人書葢未見此碑也校書攷古精確類此然秘書又云自蒼頡至程邈書皆偽史籀書傳後世者岐鼓耳今此書云揚州裴易惠糸字殊無三代體與其辭皆唐人筆亦爲未盡葢所謂史籀書者即此碑額中字也乃碧落碑第二字唐字也陽冰最愛碧落碑故用之秘書以爲楊字殆未攷爾州􅘌惠三字皆在糸即紀字之半但無易字疑以明字疊而成之特以大爲小豈秘書卻未攷此碑之額耶若謂字無三代體與其辭皆唐人筆亦可謂精鑒矣建炎三年此邦兵燬最酷舊物幾無存者待制仇公得此碑于蓁莽中重刻之而或毁焉僅存其額識者深惜之貳卿李公以臺省舊徳来臨政成多暇訪得墨本新知繁昌縣玉牒善潼素工小篆專以屬之輦石其家臨視摹刻漫者闕之以成此一段奇事使裴公之政陽冰之筆與公之名俱傳又俾鑰書其後亦預有榮焉按東武趙明誠徳甫金石録此碣又有八分書者今不知所在矣貳卿名景和九江人也為趙晦之書金剛經口訣題其後鑰七世祖以貲為奉化縣錄事當咸平中民俗富厚一意奉佛邑之告成明化等塔廟多所營建時杭州新印華嚴經贖十部以歸又刊法華經版造百部皆以分施邑下諸寺至今猶有存者嘗得古銅觀音像于江沙中長僅尺餘而相好端嚴寶藏于家是生四子六世祖其次也尤篤厚種徳五世祖正議先生以文行教授鄉里三十年皇祐間登第起家一時名公舒豐羅袁童郭姚俞皆為髙弟曾祖金紫兄弟繼世科諸公又皆執友而與提刑羅公尤厚葢其醇茂勤篤甚相似也開禧元年表妹壻新彭澤趙丞晦之師侊欲刊六祖金剛經口訣鑰方居先妣安康郡太夫人之喪痛念先妣平生佛課至謹既于卒哭前手寫法華經以資㝠福因許為晦之書此口訣及觀後序則羅公所作敷暢經意又發明六祖之說且云士大夫無不樂助而四明樓君某願助成其事則我曾大父也遂謹書之且易注文為大字以便觀者區區之誠願以追薦祖先二親無量功徳其中妙旨開警迷懵者非一善讀者當自知之跋山谷西禪聴琴詩此山谷西禪聴戴道士彈琴詩也山谷之詩不待贊揚手自分内外篇今之詩集傳于世任公子淵為之注者皆自入館後詩纔七百餘首外集乃有千餘有如此詩而不得在内篇又或云晚年刪去詩可易言乎内篇有聴宋宗儒摘阮歌不知與此何以分必有能辨之者集中幽水曰幽泉更作曰更似外集又有招戴道士彈琴詩豈亦斯人耶跋晁深甫所藏東萊吕舍人九經堂詩伯父揚州家有錢内翰希白三經堂歌其蹟甚偉初不知為誰氏作後閱宋諫議所著東京志始知為崇慶坊李司空家三經乃孝經道經徳經也末章云三經不滅堂不壊君家世世為好官兹見東萊紫微公題晁氏九經堂詩益知大家文獻相承未始不以經術為本也跋葉氏夫人墓誌四明衣冠雖盛自開國以至紹興曾未有仕登兩府恩及三世者二十四年嵗在甲戌史公才始為端明殿學士簽書樞密院事兼參知政事贈三世為東宫三少隆興元年從子浩為參知政事未幾為尚書右僕射同中書門下平章事至淳煕五年再為右丞相其後位極人臣生為太師賜第行在所玉帶金魚勳名富貴康寧夀考為近代臣子之冠子孫繁衍不惟為吾鄉衣冠盛事四方搢紳亦莫不歆艷企慕而求其源流之所自則出于八行之一人又遡而上之則八行之母葉氏夫人流慶也夫人以子孫贈典凡十七封為冀國夫人太師文恵王推原本始追崇極品之外上及五世之祖其敘致積慶之由可謂極其至矣然猶未能知葉夫人之詳也開禧二年新監文思院彌忠致族黨之意叩門而告鑰曰葉夫人之志銘碑石既碎于兵火不知所在近方得于故書中始知于煨燼之餘僅得斷碑上世能録其銘雖有闕文而其志銘則子之大父少師為鄉郡時所作也嗚呼建炎三年吾鄉遭兵燬最酷我家先世遺文片紙不存粗能班班見一二不謂乃有此碑伏而讀之不肖孫不敢為溢美之言至其言曰人皆謂天之報施善人在此而余獨以為曷止是哉葢本固則葉茂源深則流長累行積徳厚矣後必有顯者未易量也銘詞又有曰天之報施固未易量後必有顯以大厥光是時樞密方爲遂昌縣丞而終貳大政文恵王卽夫人之曾孫也碑中五子一尚幼者後名光七孫若訥卽文恵王之舊名若愚後名淵終朝奉郎知江隂軍若谷後名溥終湖州通判若樸名源爲曹娥監場涓以刪定官爲南康軍簽判悛為婺州通判是時猶未生也元孫今數十人彌大爲禮部侍郎敷文閣待制彌正兩浙東路提刑今彌逺方爲起居郎彌堅方爲樞密院檢詳彌字一行登科者已六人其餘名薦書遊賢闗以賞延登膴仕者未易縷數況其子孫承上世積善之慶大率性行端良相勉于學以是益知史氏之興未艾而吾大父之言于今已為明驗矣既謹錄之以補家集之闕又著其説于世使為善者知勸他日有秉彤史之筆為列女傳者當以夫人為稱首焉闕文尚多可補者補之餘當以傳疑不敢茍也嗚呼蘇文忠公為三槐堂銘有云善惡之報至于子孫而其定也久矣國之將興必有世徳之臣厚施而不食其報然後其子孫能與守文太平之主共天下之福今夫寓物于人明而取之有得有否而晉公修徳于身獲報于天取必于數十年後如持左契交相付吾是以知天之果可必也又曰世有以晉公比李栖筠者栖筠之子吉甫其孫徳裕功名富貴略與王氏等而忠信仁厚不及魏公父子由此觀之王氏之福葢未艾也鑰不佞于史氏之門亦云跋姚宣伯所立許斯二孝子墓表東陽在婺為壯縣號難治近嵗議者以東鄉尤曠逺别置一尉以領之余里人姚宣伯為之數月以書來曰税籍不明賦役不平非民之頑驅之使頑也余報之曰固也良心人所同然或仁或鄙顧為之上者如何子益勉之未幾又以書来曰管内有許斯二孝子墓許見晉書孝友傳墓在藍硎村所居名孝順里及其親家尚可識鹿峰虎峰俱以得名斯蓋吳赤烏間人墓在后侣村地名孝義塘事併見圖經二人皆嘗表其門閭今不復存欲立巨石以表其墓且各刻其事于碑隂以詔邑之人使慕焉願為書之余欣然曰尉以警捕為職而加意于風教子之意逺矣且必耿令君之所樂為也自念得姓于東樓公而望出東陽郡上世遷于四明而婺實吾宗之故里也既書其碑又且勸宣伯併刻之跋張忠簡公闡詩帖煕寧六年日當食四月朔裕陵為徹饌避正殿一夕微雨不見日食百官入賀蔡子正挺為副樞獻詩前四句曰昨夜薫風入舜韶君王未御正衙朝陽輝已得前星助陰沴潛隨夜雨消當時無能過之者蓋又有皇子之慶也端明張公紹興十三年為秘書郎是時事既相類詩語精切可以追配前人後以孝宗舊學仕為尚書雖不及大用而清徳映照寵數優渥三子一孫同為郡守叔子遂踐世官張氏之興未艾也拳拳愛君憂國之誠巳見于此詩伏讀為之三歎跋王如晦文卷開禧二年下元前二日王周伯垕示余以巨軸曰此曾大父朝議少時場屋之文也大父滁州藏之贈告箱中余曰周伯妙年固非漢之老人而余年七十及識君之曾大父于少時余與表兄中書陳舍人安行俱汪出生長外家舍人幼孤侍母以汪氏為歸余十嵗時見舍人取朝議之女外祖少師待朝議如姻家往来無時後六年而朝議亡外祖銘其墓而仲舅尚書為之文紹興三十年嵗在庚辰滁州登科余適在都下侍仲舅往賀滁州泣曰先君少在郡庠以明易試優等升内舍籍上庠兵火之後再以本經中鄉舉太學再興又以詩賦聨薦一日外報省榜而不及門先君方理髮吾母勸之曰君髮已種種兹事可已徒費精神何為先君握其髮曰未死終不可已然竟齎志以殁某之僥倖先君之澤也今見所著易義十三篇論二首雖非今時文格然既盡當時之體而議論詳明益見學問之蚤成而老不得售非命也耶滁州既成先志仕至二千石亦足為善士之勸矣若其髙誼樂施雖巳見志中抑聞遇西變時鄉之寒士襆被附舟日為食客又濟其乏絶者不知幾人項文學彦思伋貧甚以場屋之舊叩門無時公知使令者厭之一聞項之謦欬則徑出迎之袖出所贈以應其須嘗在旅中項來謁不值逡巡既去而銀盃羽化從者遽白公以為無疑公怡然曰必無之因置不問後乃知從者之廀也聞者益歎服其他折劵已債不可數計王氏之澤未艾也周伯拱而曰皆孫曾所未聞願書卷尾以補家傳之闕又以詔後之人跋趙大資政所藏趙忠定公帖開禧二年大資政趙公奉祠居四明一日理故篋有簡韜紫羅囊中緘封甚密發而視之乃丞相趙公報章翰墨如新蓋皇上受禪前一日事已豫定公密以報丞相丞相時爲知樞密院喜甚而書此所謂陸賈交歡爲公以大義諭殿帥郭杲正如平勃之安劉氏也公慨然感念倏已十三年矣公方爲蜀帥時嘗被㫖上内禪本末無一言之誣茲欲以此簡登之石以示後人公之意深矣鑰待罪直學士院甲子昧爽之前密聞大議于公相君示以太皇太后之命播告四方實叨視草遂得在二公之間正元朝士存者無幾矣幸日陪杖屨之末公曰微吾子無有深知當時事者為我序之鑰曰唯跋劉師文昆仲乞増母夀疏藁文王謂武王曰我百爾九十吾與爾三焉文王九十七乃終武王九十三而終有是哉正義曰年夀之數賦命自然不可延之寸隂不可減之晷刻然劉氏兄弟以母暴得病欲絶各乞減算三年増母之夀而母後六年乃卒嗚呼真有是哉跋東坡與宗人帖宗人容貧甚吾無以濟之昔年嘗見李駙馬瑋以五百千買王夷甫帖吾書不下夷甫其人則吾之所羞書此以遺生生不得五百千勿以與人然事在五百年後價直如是吾佛一坐六十小劫五百年何足道哉東坡居士俟河之清人夀幾何容方苦貧而使待五百年後坡亦善謔矣錢大參書法源出于坡歎仰若此必能審其為真書李氏建炎備禦錄後始余八九嵗時侍外祖汪少師外祖母福國夫人先妣安定郡夫人季舅江州赴奉川任氏慶集江口秉義李君及王夫人邀過其家隠然巨室猶記及見雙椿芝蘭之盛既長始知二老人康適由長子修武子列一力幹蠱才智絶人孝養備至秉義自六十嵗即以家事付之一絲不掛時已近八十略無老人衰憊之氣夀至八十八而終侍御王公志其墓先是建炎三年吾鄉被兵禍最酷逺如昌國顓顓獨居一海中亦遭焚燬時髙宗南巡永嘉奉川為孔道敵勢方張承平既久人不知兵望風奔散而邑境獨全嘗以問諸父洎故老則曰此李君子列之力也邑有義社素號趫勇邑官召人士議事皆已竄伏山谷君所居去邑一舍令馳檄使自備餱糧從便控扼而數百人已列庭下君延致其長自任館穀之責椎牛釃酒以勞勉之衆皆感奮逺近来歸隨即撫定軍聲既振冦望風而郤麾衆追躡得其數級而還事定又出私藏犒之方是時虛張功閥冒賞射利者甚衆君不自言賞亦不及逮今將八十年李氏之貲産雖寖不及舊而隂徳必報文風大興君有九子長過庭蚤入太學得官亦轉為丞矣第四子迪功充庭是生六子長曰元白授學于舒元彬璘歸以誨諸弟今為上舍生諸弟與其羣從入太學預鄉書者已五六人元白長子亦入學次以制中開禧元年進士第鄉里莫不歆艷盛矣一日迪功理故書盡得修武備禦時支犒總目手澤具存欲以顯揚先人之烈俾鑰序其後詳已見于張公仲房所作行狀矣抑聞之衣冠南渡所在顛躓者非一鑰親見王信州正夫從言時侍二親避地南来倀倀然無所歸寄命一航聞有義勇所聚遂投之衆見其北音遽日此姦細也欲􅆷之舉室不知所為忽一士人攘臂曰毋害善良此士大夫之族也問知其為三槐家益善遇之則子列也且曰微子列吾家無噍類矣又聞秉義嘗慶夀百客皆集有壻劉氏獨不至子列欲盡親歡以此為歉問之則以官逋三數百千方繫于有司不可脱也即具舟載錢如所負之數輸之官取壻以歸大率髙誼宏略如許然則李氏之興殆未艾也今方多事思得疎財好義徇公忘私如修武君者豈易得哉故慨然為之書跋秦王獨獵圖山谷題摹燕郭尚父圖云往時李伯時為余作李廣奪胡兒馬挾兒南馳取胡兒弓引滿以擬追騎觀箭鋒所直發之人馬皆應􅁌也伯時笑曰使俗子為之當作中箭追騎矣余因此深悟畫格此文皇獨獵圖唐小李將軍之筆建炎間内府宣取于宗室家奏以非所敢惜但以前射一豕而上生于亥故不敢進復令取之亟摹一本而以真者進御三馬一豕皆極奔驟弓既引滿而箭鋒正與豕相直豈山谷龍眠俱未見此畫耶攻媿集卷七十四
