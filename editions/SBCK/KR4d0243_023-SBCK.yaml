  text: 攻媿集卷二十三
  hash: sha256:ff4990f20c8a64731daebcbf4b90fa66e3d39c233f45b2ef048cd030af21f3ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_023-1a}
body:
  text: 宋樓鑰撰奏議請車駕過重華宫第一劄臣仰惟陛下承夀皇付託之重以天下養猶恐未足以報天地之恩乃者間以聖躬違豫積廢起居宸心靡遑寧處正月九日千乘萬騎衝冒風雪中萬衆歎仰以為天子之孝前古未有後又以瘍疾不出者幾半年雖臨朝如禮而外人久不瞻望天表進香之日無不鼓舞以為吾君康復久矣景靈宫以四孟分詣者道逺不可太勞非得已也重華既近會慶在邇鑾輿一動自此五日一朝之禮必如平時乃二十二日有司命戒于夙昔羽衛環立于廷中百官趨班拱俟鳴蹕而燭殘日出寂不聞聲相顧失色謂邇者陛下無故而不一視朝已駭羣聽今日何日安有不出之理列立又久之進退不可臣以待立為職法許直前使是時得望清光必且頓首百拜以請而清禁嚴䆳何由伸吐泯黙而退震悚無地中外觖望歡意索然天氣晴和又無雨雪乘輿将駕莫知何故然而大臣不敢言臺諫不敢論猶以未知事實之如何昨日本合具聞赴宴貢院忽傳今日駕出人人相賀臣中夜起坐以俟夙興漏且盡矣又無所聞忠誠所激敢昧死上奏伏望陛下深思社稷大計亟降指揮若曰夀皇聖節偶以某事不及上夀今以某日詣重華宫起居則天下之疑議頓解兩宫之聖意交懽孝治無虧國祚愈隆雖復費錢百萬極奉親之禮所不當惜親上玉卮為千萬夀未為晚也臣拳拳愚忠惟陛下裁幸第二劄臣仰惟陛下聖主也然有一事臣初疑之已而思之而懼今則憂矣敢爲陛下言之事有至大而陛下以爲至小至重而以爲至輕至易而以爲至難朝夕之所當行而視之若曠典此臣之所以疑而懼懼而憂也文王朝于王季日三武王帥而行之不敢有加焉漢爲五日一朝之禮已爲疎闊本朝家法事母后之禮皆朝夕一再見夀皇之事高宗以相去之逺勉從五日之制茍非有故未嘗輟也陛下之事夀皇三年之間率循舊典四海悦服去冬聖躬違豫繼有瘍疾暫廢起居人亦無得而言今則無故而屢止此人之所以紛紛也蓋天下之事無大于此無重于此然而在陛下行之為當然為甚易進香一出而人心歡然㑹慶節一不出而人心遽駭事可睹矣朔日不出猶曰有冬至冬至不出而人心幾于離矣朔望比其他過宫之日已非細事特以會慶冬至為尤重姑以朔望為輕然聖節至日猶曰毎嵗有之至于聖政之成全載夀皇一朝之事玉牒㑹要足成淳熙末年之書陛下之所以奉貽謀而鋪張聖父之閎休者止此一事可謂尤重矣一展九月再展十月以聖躬之未安也今則禮儀畢備宰執觀書者三有司習儀者一忽又改日萬衆震驚固知擇日之不逺終亦不知何故陛下亦思改日之説乎卜吉既定豈應復改正以進呈之後十七日必須恭進又非時節起居之比三書相踵仗衛羅列皆是五更夙辦萬一又不成出則事體利害尤甚故不免為此一策非美事也欲望聖慈翻然感悟亟降指揮若曰屢蒙夀皇聖㫖免到宫不敢有違今已奏請以某日過宫此令一出歡聲必聞是日仍須必出雨雪即賜雨具進書之前得再為此則人心翕然而定自後不復再展而五日一朝如舊則天下晏然無事矣可謂至易之舉而足以了至大至重之事惟陛下斷然不疑實宗社無疆之慶同侍從請過宫第一劄思陳傅良等同趙彦逾倪臣等比以車駕久不過宫乞宣引同班奏事伏蒙聖慈俾並進于玉階方丈之地臣等于初七日至東華門伺􅀱宣引間續准傳㫖改用今日臣等區區之誠正以過宫一事欲得面控悃素臣等竊謂父子之道天性也以夀皇至慈陛下篤孝顧何待臣等譊譊冒溷聖聰第以近日之事觀之陛下朔望不出許以進香進香不出許以上夀上夀又復不出明降指揮二十八日必出萬姓歡呼踴躍以望翠華又復中輟重失人心莫此為甚旋聞展用月旦今又聞欲用十五日仰惟陛下臨御萬方以信為本成王剪桐為戲周公遂封唐叔以為天子無戲言況過宫美事孝治所繫四方所仰而反汗至于再三實恐因此朝廷命令無以行于四方載惟陛下容納直言雖小臣忤㫖亦不加罪然言雖容而不行事欲濟而復輟日復一日寖為常事闗係非輕今臣欲望聖慈確然不易則社稷幸甚臣等幸甚萬一聖心未決姑示順從使臣等無辭可措至臨期不出則又失信于中外良可惜也臣等前居家俟罪本不敢供職既蒙許以宣引故黽勉就列以冀一瞻清光如又未決臣等何顔尚在班行非敢數忤雷霆自取誅斥誠以三軍萬姓不知宫禁中事不知聖父聖子慈孝本自無他怨讟横生至不忍聞恐自此不已馴致叵測非敢以引退為高以合班為喧正欲感悟聖心以消弭未然之患也冒犯天威臣等無任惶懼俟命之至貼黄臣等伏見㑹慶聖節合􅀱過宫上夀之後方可錫宴今緣未曽過宫遂行展日若因循未出則錫宴難以舉行況天下郡國皆已設宴而中都反未講禮闕典尤甚傳之四方書之史冊是錫宴不行将自今始深為陛下惜之伏乞睿照第二劄臣等伏見㑹慶節在即十二日禮合進香都人顒望翠華忽又得㫖免過宫無不失望既而十三日内教十六日十七日孟饗皆聖躬親臨中外益望陛下必躬上玉卮之夀伏計聖心素篤仁孝知此禮至大至重決意必出固無待臣等再三之請政緣進香之前已有定論旋復反汗是以不免過慮須至溷瀆臣等竊惟人子事親朝夕定省自天子達于庶人其禮一也五日一朝已為希簡今陛下自三月恭請之後至今八閲月矣皆以夀皇聖㫖而免至于生辰上夀恭想聖意必欲陛下一來此人之至情也陛下重明聖節既受羣臣萬年之觴竊聞今日嘉王生朝設宴禁中夀親之際父子歡洽陛下寧不動心上念兩宫延望之意且臣等料度聖意所以久不過宫者或謂陛下有所疑有所畏父慈子孝本于天性夀皇既以神器親授聖子方頤神沖澹凡軍國之事悉不預聞五年之間初無纖芥斷無可畏第恐猶有左右小人妄生離間撰造言語惑亂聖聽全在陛下深思洞察斷然勿疑臣等竊見今年夏秋之間太白晝見至于經天九月七日金星掩心大星而又黒祲亘天萬目駭觀熒惑見入太微垣逼近内屏房星爲明堂又屬宋分太微内屏均近帝座此皆天變之大者也所在洪水爲災衡岳山摧正逼祠宇劍門峯墜塞斷谷口今月十六日夜當陛下齋宿之時行都地震有聲如雷夫衡岳南方之鎮行都駐蹕之所此皆地變之大者也至于人情下而閭閻衆而三軍近而禁衛以陛下久缺定省之禮口語籍籍謗讟紛紜所不忍聞自廟堂大臣至于百辟數進苦言徒勞容受竟不施行莫不憂懼愁苦不能自存此則人情之所甚不安者也陛下乘輿一駕如反掌之易則天地之變異必銷人心之憂疑立解陛下何憚而不為若聖意固執又復遲疑則天地之變決非虚設人心動搖必至叵測又非去嵗之比矣臣等蒙陛下擢置從列感恩至深目擊事勢可畏如此不忍上負聖知是敢罄竭血誠控告君父伏望聖慈斷然一出不勝宗社之福如臣等所言更不能感悟聖心則臣等皆為失職實難茍安不免引去以俟罪譴激切之衷傾盡于此伏乞睿照貼黄臣等伏見司馬光為諫官上皇帝疏又上皇太后疏臣等今不勝拳拳之忠輒具奏劄上進重華宫所有錄本併以繳進伏乞睿照上夀皇聖帝劄子臣等仰惟陛下功成不居以舜禪禹上繼光堯垂耀萬世臣等素蒙長育又荷拔擢竭忠主上如事夀皇所願兩宫孝慈永久無間使宗社靈長朝廷尊安無愧典謨之盛而半載以來車駕毎欲過宫起居毎蒙聖慈䧏㫖暫免蓋昨緣積雨極熱深軫慈眷然而因循日久寖闕禮文觀瞻所係馴致疑惑而皇帝天姿恭謹兢業過甚深念蒙付託之重懷不自安幾若嚴憚倘非夀皇聖帝加意開接毎事慰安切恐漸成疑阻闗係非輕今兹㑹慶節合上夀伏望睿慈先期勿復更免過宫俾皇帝得以躬率羣臣展前殿玉卮之敬三宫歡洽四海欣慶不勝幸甚竊惟父子至情本無纖芥或恐左右小人妄有間言使孝慈之懷兩不能盡更望聖明以宗社生靈為念曲賜洞察愈加慈愛勉以必來皇帝素篤仁孝又蒙皇慈委曲如此必無遲回于以釋四海危疑之心于以光兩朝孝治之美臣等無任懇祈激切之至上兩宫奏疏臣某等昧死再拜上疏至尊夀皇聖帝陛下皇帝陛下臣等竊惟父子之間人所難言也而況萬乘之貴兩宫之尊崇高莫大慈孝兼全在于臣子何敢容喙伏見嘉祐中英宗皇帝嗣極之初慈聖光獻皇后垂簾聽政天下安危之機實在于此司馬光不勝愛君憂國之心上疏英宗則專陳子道上疏慈聖則專論母慈又慮母子未能深屬或有疑阻遂併以一疏上之慈聖之慈英宗之孝終于無間顧豈臣下之力然光之心出于至誠未必無助臣等是敢仰慕先正竭盡區區共為一疏上干兩宫伏惟聖慈俯垂聽納臣等聞聖人之德無加于孝一人有慶兆民賴之以天下與人易為天下得人難為天子父慈之至也以天下養養之至也高宗以天下授之壽皇壽皇以天下授之皇帝為天下得人而宗社尊安孝之大者也前則壽皇盡孝于高宗今則皇帝盡孝于壽皇以天下養孝之尤大者也内禪之盛自堯舜以來未有如今日者再世揖遜不待倦勤輝光今古震耀夷夏若壽皇享為天下得人之福皇帝盡以天下養之孝則天地祖宗垂佑于上臣民夷狄厭服于下非所謂一人有慶兆民賴之者乎今日之事父子至親雖非嘉祐之比然司馬光之言有切于事情者其略曰孔子曰孝哉閔子騫人不間于其父母昆弟之言蓋言誠信純至表裏著明而他人不能間也孟子曰父子責善賊恩之大者蓋言骨肉至親尚以恩意相厚不尚較錙銖之是非也今日之事或見于此雖天性無間本無可疑嵗月寖久頗見形迹臣等欲望皇帝深思孔子之言壽皇無忘孟子之戒萬一奸人欲有關説涉于離間者顯行誅斥以明示天下日遣使介交馳兩間重華篤慈愛之仁南内盡愛恭之實夙整法駕視膳問安及清和之時講恭請之禮或邀迎于内庭或娯侍于禁籞使都人擁觀萬國懽舞破羣情之惶惑消衆口之讒謗兩宫慈孝之道昭明于時傳誦于後和氣嘉生充塞宇宙變愁歎為謳吟化驕陽為甘澤豈不盛哉豈不快哉臣等欲望兩宫同降指揮指日順動夀皇為宴設之具皇帝當奉養之儀驩欣交通于未見之先慈孝翕合于無疆之久於萬斯年燕及中外天下幸甚社稷幸甚論君道臣聞孔子曰為君難何為其難也以為四海之大萬幾之繁賢否之辨是非之明皆君之難事而未足為難也以常人之情凡可喜而易為者人君必戒之絶之凡可厭而難行者人君必勉之進之而後可以為明君可以服人心可以追三代之盛可以為萬世之法此其所以難也宫室服用宴飲歡樂聲色俳優馳射弋獵珍禽奇獸寶玉祕玩此皆人情之甚喜者恨無力以致之而人君頤指如意有求必獲然而一縱意焉則亂亡之機實自此始故必戒之絶之是非所謂難乎恭儉樸素憂勤篤謹講論經理攷證古今廣求民瘼招致賢能此皆人情之易厭者雖一介之士所不能行而以萬乘之主行之然而一留意焉則治平之基實兆于此故必勉之進之是非所謂難乎喜人而予之爵賞稍過則為濫予怒人而加以刑罰稍過則為淫刑而其尤難者其聽言之際乎巽與之言人所樂聽在人君則當察之不惟察之又當屏之忠鯁之論人所難受在人君則當容之不惟容之又當行之此皆人之至難而人主任天下之重雖富貴崇高無倫無敵而欲去人之所喜行人之所厭是為艱哉仰惟陛下聖性天縱其所可喜者能戒之絶之其所可厭者能勉之進之是將盡為君之道以厭服天下之心然臣區區猶恐有未盡者不敢泛引古事多援經史以為煩瀆直以人情之所甚喜與夫可厭者為陛下言之誠能深知為君之難戒其可喜而有大可喜者見矣勉其可厭而有不容厭者效矣大抵為人君者皆不可以常人之情自恕而以人所難者自勉忍人之所不能忍容人之所不能容謹人之所不能謹戒人之所不能戒人以為自苦而我樂之人以為甚難而我安之夫然後可以盡君道矣臣久汚朝列無補事功誤蒙聖恩拔擢至此朝思夕慮未有長䇿奇論以補報陛下聰明于萬一直以愚忠所存懇懇奏陳伏望睿慈略其言而採其意不以為愚而力行之庶其有涓埃之益以無負責難之義伏惟陛下裁幸攻媿集卷二十三
