front:
  text: 攻媿集卷四十五
  hash: sha256:2dd63fddd2ffc1ab6ecc4cd689e7935a1499decd726d1bd6ea033ad7ea552ad6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_045-1a}
body:
  text: 宋樓鑰撰内制右丞相趙汝愚加食邑實封制門下朕祗膺丕緒肇祀合宫賴天地之靈儼百神而顧享嚴祖宗之配綿萬世以承休惟時大臣贊我縟禮肆頒祭澤敷告朝倫具官某寛博而崇深裕和而肅括學造聖賢之藴才兼文武之優有經濟四海之志而行之以忠有酬酢萬變之智而決之以果擢由樞筦進秉國鈞是爲社稷之元勲非止衣冠之盛事處心無競休休多容物之仁守道不阿蹇蹇盡匪躬之節予所毗倚國其庶幾頃卜仲辛恭修大饗上稽皇祐之故典近遵慈極之宏謨致精三日之齋䖍奉九筵之制惟辟公之顯相厥有賢勞顧熈事之備成敢云專鄉増多采邑併衍眞畬以隆巖石之瞻以壯維城之勢於戲載貂蟬而展采固宰路之所同被衮繡以侍祠實宗盟之未有惟親賢之並用于邦國以増光其服渙恩益圖治績賜告口宣有敕卿爲時上相贊我盛儀是宜與邑之多用見疇庸之渥其祗成命毋事謙辭士歆加食邑實封制門下朕嚴九筵之禮是曰肇禋逆三神之釐若䝉昭答餕惠所暨臣鄰斯均矧惟屬籍之尊可後恩光之渥集廷紳而誕告示詔綍之匪私具官某徳性寛洪風猷端粹重珪疊組生長富貴之中簜節騂旄雍容閒燕之乆惟夙夜之匪懈仰春秋之益髙實長周家之宗盟是爲劉氏之祭酒兹崇宗祀預贊上儀冠班列于三孤聳儀刑于九族乃加井賦仍侈圭腴以表耆英以隆孝治於戲祭有十倫之義莫如同姓之先備者百順之名益介遐齡之永願如夀俊奚假訓辭賜告口宣有敕卿位冠孤卿望髙宗老既奉合宫之祀宜加采邑之封雖曰彛章是為新渥郭師禹加食邑實封制門下朕祇事總章荷神祇之來格廣施惠術普中外以惟均顧予元舅之親嘗預羣工之相肆加異數明告周行具官某迪徳忱恂飭躬謙靖祖后實為同氣夀皇尤篤優恩淑旂綏章蚤授齋壇之鉞篆車希冕近升棘位之班疏三吳公社之封廪萬夀祠庭之禄能屏膏梁之習自忘圭組之崇比卜季秋親祠重屋茂對三神之祉宜先四姓之賢用衍爰田載加眞食於戲兢兢業業以事上帝朕敢懐專鄉之私洞洞屬屬而存小心爾尚介方來之寵益昭吉履永保修名賜告口宣有敇禮畢九筵恩均百辟賜予伯舅之胙均兹宣室之釐與邑旣多頒綸可後周必大加食邑實封制門下朕嗣守邦圖肇修宗祀父天母地祭既重于合祛尊祖敬宗禮尤嚴于並予一人越紼以行事爾多士奉璋而侍祠眷舊弼以興思顧慶條之可後誕揚渙號敷告昕廷具官某簡重而閎深直方而膚敏典誥上規于姚姒詞章逺軋于漢周弼亮兩朝未究經綸之藴鎭安四海有懷康濟之功偃藩南國之雄均逸東山之勝比以霈恩之渥升之亞傅之崇注想不忘乞言方切屬伸大報爰啟合宫載謀載惟聖父嘗頒于先甲我將我享季秋乃卜于仲辛熈事既成蕃釐來介申衍多田之賦仍加眞食之封於戲明堂王者之堂方荷神休之答二老天下之老宜先祭澤之施尚迪逺猷永綏殊寵賜告口宣有敇卿嘗位冡司均休真館屬總章之竣事賦多邑以示恩其即欽承以祗眷渥師䕫加食邑實封制門下朕寅紹丕圖䖍修大饗親惟伯父既有助于多儀神介蕃釐詎敢云夫專鄉亶敷命綍用告昕廷具官某履行粹和稟質端靖生長神明之胄源流詩禮之傳出分顧憂見民庸之甚茂入趨班綴奉朝謁以尤恭建六纛以承家視三孤而命秩屬講肇禋之禮適當越紼之行攝事太宫降登有度陪祠重屋顯相無違庸推祭澤之優可後宗盟之懿爰加井賦併衍畬租兹謂恩襃式昭名數於戲奉犧牲粢盛而告聿嚴布政之宫拓山川土田之封益示展親之義其祗異渥以對靈娭賜告口宣琚同吴瓌吴有敇禮成重屋賚及萬方宜首及于懿親用申加于多邑載頒明命其服殊恩吴瓌加食邑實封制門下朕穆卜季秋躬修大祀靈祇授職幸熈事之備成多士在廷賴懿親之顯相宜頒惠術敷告羣工具官某謹畏自將純和無玷聨四姓小侯之貴承三朝外戚之恩入侍中宸屬櫜鞬而甚肅進班上閤飭冠佩以尤嚴頃建齋壇退安琳宇旋視孤卿之秩併開公社之封逮蕆禮于九筵實均釐于萬國乃増采邑仍衍圭腴以彰寵數之優以表肅雝之助於戲蒐上儀于陽館豈惟黍稷之馨鍚蕃祉于后家可後脹膰之賜尚綏吉履以服彛章吴琚加食邑實封制門下合宫肇祀實祗奉于慈謨宣室受釐爰大頒于霈澤惟時懿戚夙著賢稱庸舉徽章式孚渙號具官某美由世濟才應時須登簮筆持槖之聨惟知避寵更握節擁麾之選不專爲恩比崇建于齋旄旋寖加于孤棘逮兹大報贊我上儀禮既備于八階胙惟優于四姓俾増多賦仍衍眞腴於戲文徳以講明堂幸神祇之顧饗賀慶以親異姓宜福履之均霑雖曰邦彜尚承惠渥郭杲加食邑實封制門下朕頃用盛秋䖍修宗祀奉犧牲以薦備陳重屋之儀賴爪牙之良肅領千廬之衛既云竣事可後均釐我有明綸告于列位具官某生資沈毅世濟忠勤氣禀山西期逺追于起翦書傳圯上自有合于孫吴久專將閫之雄入侍殿巖之邃屬祗孝饗務罄齋誠奉璋惟多士之賢執㦸有元戎之重肆疇采邑仍啟侯封以介靈休以彰異渥於戲茅簷蒿柱朕方躬大禮之嚴玉節琱戈爾尚體中權之寄益思忠報以答殊知賜告口宣巴同蕭鷓有敇禮嚴重屋澤及羣工錫多邑于巖除啟新封于侯甸臣疇兹多賦蕭改眷我勁其祇明命益勵忠猷蕭鷓巴加食邑實封制門下奠圭瓉以薦誠既䖍修于宗祀執豆籩而在列宜咸被于靈娭眷我虎臣董兹羽衛厥有渙恩之錫式彰顯相之勞具官某智略雄深性資沈鷙望雲就日夙肩面内之誠建旐設旄馴致總戎之拜奉眞祠而均佚視左棘以疏榮乃因霈澤之行増畀爰田之賦申加眞食用侈神休於戲承異眷于三朝蓋屢覿彌文之盛敷大賚于四海顧可無寵數之優益綏令圖以保終吉郭師禹特授少師封永寜郡王加食邑實封制門下朕纂上皇之丕緒承列祖之通喪復土告功既克襄于大事提綱置使實有賴于懿親爰播明綸肆加殊寵具官某小心自牧吉徳著聞蚤席慶于椒闈寖升華于棘位恂恂家法靡矜金穴之奢侃侃朝班久遂琳宫之適兹卜㑹稽之麓往營永阜之陵靈駕徐驅飭廞儀而肅靖重臣主辦訖閟寢之固安粤惟元舅之崇可忘醲賞之報繄勞之稱匪朕敢私衮服命圭顯冠孤卿之秩金印盭綬進封異姓之王仍旄􅃏于東秦徹土疆于南晉申陪井賦併侈轅疇以昭四姓之華以篤三朝之眷於戲節侯仕漢得謹畏謙恭之聲尙父在唐有富貴繁衍之盛豈其苗裔見此親賢其踵前人之休以爲密戚之勸賜告口宣有敇阜陵復土元舅策􅈴旣升冠于􅀌􅀸仍疏封于王爵其祗渙渥毋事謙辭皇伯祖太師嗣秀王伯圭特授兼中書令加食邑實封制門下朕祗紹炎圖遹繩祖武追仰抱孫之愛謹奉菆塗實繄同氣之賢式專使領克襄大事悉按舊章昭示殊襃用孚羣聽具官某聨休皇極正位泰階直大以方厚載體坤爻之二爵齒與徳達尊全天下之三惟我孝宗最崇秀邸眷乃象賢之懿襲兹開國之封敬其所尊愛其所親今當推于宗老反也如疑往也如慕況密䕶于廞儀每入臨于朝晡曽不避于塗潦能以從心之嵗躬為復土之勤有司莫敢不哀行路為之感動語必流涕誓報平生之恩賞不踰時肆舉非常之典是兼紫㣲令之重以為大父行之華仍衍爰田併豐眞食匪以爵而馭貴恨無官以酬公於戲隆專席之榮蓋用祥符之故實第中書之攷會參尚父之勲名以増師尹之嚴以侈邦家之盛益綏夀嘏庸對寵光賜告口宣有敕卿貴隆人爵尊襲王封親臨永阜之藏寵冠中臺之列是為殊渥尚體眷懐右丞相趙汝愚特授銀青光禄大夫加食邑實封制門下聖人因親教愛蓋本于躬行大臣以道事君莫先于協賛朕方遵皇祖之訓形四方之風眷我宗英相予孝理惟忠勞之備著繄命數之宜加爰集具僚載申襃律具官某崇深而行簡直諒而能容學有淵源究前聖天人之藴志存節誼立本朝社稷之勲相業素髙民瞻允屬自擢登于右揆獨光輔于冲人於皇孝宗克振炎祚朕既荷緑車之鍾愛遂紹于重規卿亦䝉丹扆之異知寖基于大任惟推心而相勉念圖報之尤難三年之喪服勤敢怠七月而塟宣力居多因山為陵得丘原之爽塏稱天定諡極寳冊之鋪張迓吉仗以來歸奉太宫而班祔誠信無悔哀禮有餘仰慰在天之靈實由同徳之助是用超文資之峻徑授三階衍井賦之腴幾盈萬户勉從遜牘少屈恩綸於戲明徳懿親既居金鉉黄耳之貴勞謙終吉僅登銀章青綬之聨益成亷退之名尚副倚毗之意賜告口宣有敕卿祗奉阜陵爰加賞典班既髙于百辟位亦次于三公其體眷懐亟祗成命皇伯師夔特授開府儀同三司加食邑實封制門下朕丕膺寳祚加厚皇支惟我祖之君萬邦既訖因山之禮顧天子之謂伯父實參置使之行眷吉仗之言旋豈襃緡之可後視儀宰路敷號廷紳具官某賦敏給之資擅温恭之譽分左符而出鎭嘗專制閫之雄易留務以歸班徑擢齋旄之峻迨沖人之臨御進孤保以疏恩鳳闕晨趨見朝儀之甚肅鯉庭日侍知家法之尤嚴匪惟族姓之光允謂衣冠之盛比營東越崇建阜陵願躬除道之勤往䕶成梁之役久安閒燕退若無慿小試才能燦然可覩宜加寵數以答賢勞公府肇開遂擬三師之貴珍臺兼領併増千户之封用侈宗盟兹為使相於戲有是父有是子俱膺華衮之滎拜于後拜于前克紹緇衣之美勉圖休問以對殊私賜告口宣有敇惟予伯父表我宗盟爰升衮鉞之華已播絲綸之寵其祗異數毋事謙辭知樞宻院事余端禮特授銀青光禄大夫右丞相加食邑實封制門下稽古建官莫重王朝之論相代天理物必資揆路之得賢朕臨御惟艱疇咨敢怠爰命紫樞之長進居黄閤之崇乃輯廷紳誕􅆒制綍具官某温恭而氣勁凝静而謨明智周萬事之原學貫九流之邃孝宗擢之于庶列亟躋法從之班聖父召之于留都遂處輔臣之任益殫忠藎力賛政㡬迨予嗣厯之初尤藉同寅之助迭掌東西之二府兼明文武之兩途内則密勿廟論以慮四方外則整齊戎律以令諸將清規足以範俗深謀足以濟時進退百官詳試知人之鑒調娱衆務究觀識治之才蔽自予衷與之國秉用正鈞衡之寄毋勞夢卜之求超授文階増陪井賦以示奮庸之選以昭注意之隆於戲夙夜基命而單厥心朕欲起太平之盛朝夕納誨以輔台德爾其繼良弼之名表正士風訪求民瘼及閒暇而修政刑之要專燮理以致陰陽之和若股肱耳目之相需將天地祖宗之臨汝懋承明渙期厎成功賜告口宣有敇卿比領樞廷兼行相事兹延登于右揆已誕布于明綸注意方深拜恩可後攻媿集卷四十五
