body:
  text: 宋樓鑰撰神道碑簽書樞密院事致仕贈資政殿學士正恵林公神道碑開禧三年十有一月四日有旨樓鑰林大中召赴行在先是平章軍國事韓􅇑胄専國弄權妄啓兵端禍及南北生靈國勢幾殆主上赫然震怒俾誅殛之更化善治之始才一日而有此命公足以當此矣鑰何以堪之公字和叔婺之永康人曾祖禄太子少保妣陳氏延寧郡夫人祖邦太子少傅妣姚氏高平郡夫人考茂臣太子少師妣李氏信安郡夫人皆以公貴追贈初少傅隨母嫁盧氏再世承其姓公始復為林公少篤志問學文章自出機杼紹興二十七年入太學文行俱高士論歸重三十年登進士科調左迪功郎湖州烏程縣主簿貧甚俸薄郡欲月有增餽卒謝之所立已如此乾道六年丞貴池用薦者改左宣教郎淳熙三年知撫州金谿縣郡督財計太急公堅請寛以數月不敢有負又貽書至四三不聴公取告敕納之州求劾而去守媿謝許之邑民感公之深恐其受責競輸于郡已而視嵗額反加焉差役盡公多端寛䘏受役者無異詞有先一年而豫定者丁少師憂役人泣曰反誤我矣七年知湖州長興縣在浙右號難治公益究心官事民情孚洽若有相之者縣境高于太湖嵗旱河涸米價翔貴已有攘奪之患民寡葢藏官無贏蓄公方憂慮而無䇿夜半涌水自荻浦灌河聲震數里米舟輻湊闔境以為神和買比經界前增四之三公必欲寛之推見衆􅁦獲免者五千餘戸増輸以實者帖然訟牒必竟曲直不許私和或謂恐益多事公曰此乃省事之法也以是缿訟曰稀期限寛而信可展而不可違去如始至所下文移無一紙遺于民間二邑遺愛迨今未泯也詹侍郎儀之力薦于朝十年幹辦行在諸司糧料院十二年冬求補外同擬者四人孝宗皇帝指公與計衡姓名曰此二人佳可除職事官遂除太常寺主簿十四年遭内艱十六年夏除諸王宫大小學教授時光宗皇帝初即位詔侍從舉察官户部葉尚書翥等四人俱以公薦擢監察御史論事無所回挺紹熙改元三月御批賜公等曰臺綱正則朝廷理委寄匪輕言事覺察各有舊制兹示朕意宜務遵承公謂臺官不當踰越分守誠如聖訓然居此當以抗直敢言爲稱職遂與同列答奏又曰職有常守期各務于遵承言所當言庶不孤于委寄自是風采益振五月遷殿中侍御史二年八月除侍御史三年三月兼侍講公之論事根于忠實上不求合于人主下亦不避嫌怨而愛君憂國務存大體毁譽皆有所試抨彈無不聳服在臺首尾四年最爲稱職知靜江府陳賈將奏事之任知潭州趙善俊得㫖奏事皆極論而寢其命其論善俊也謂若欲收用宗室以强本朝當擇其賢者善俊何人而可當特召上問孰賢公以知福州汝愚對退又申其説御批善俊與郡又兩日遂召汝愚此諌行言聴之始也鄧司諫馹以忤㫖移將作監公請曲加優容俾復舊職丞相留公正丐去公率同寮奏乞宣諭使安相位遂不果去身居言路而伸諫省之氣誦宰相之賢他人不敢為也有薦公入臺而論其多可而無特操不可為執政與公舊故而論其囘邪不靖不可典刑獄户簉督迫州郡太甚公上彈章上曰别易一部何如對曰昨為刑郡専為深刻易别部亦不可章至三上宣諭宰臣遣都司道上意公曰言事不行只有一去更無可商㩁者此語既聞竟與郡而去監文思院常良孫以賄遭重劾公奏此人死有餘責然其曾祖安民為元祐名臣高宗念其以忠直斥死擢其子同為中司願特免其真決寧加遠竄公勇于逐方用之從臣而拳拳于一纍囚如此排擊固多此皆其著者至其論議尤為切直而當理首論君子小人大槩曰趨向果正雖小節可議不害為君子趨向不正雖小有可喜不失為小人正者當益厚其養無責其一節之過差以消沮其直大之氣不正者深絶其漸無以一節之可喜而長其姦偽之萌則君子得以全其美而小人無所容其姦又論今日之事莫大于讎恥之未復此事未就則此念不可忘然事變不常我有備而後可為彼有釁而後可乗恢復固未容輕議惟此念存于心則陵寢如見于羮牆故都如見其禾黍于以來天下之才作天下之氣倡天下之義根本既立綱紀日張而治功可得而成矣雷雪求言公以事多中出疏曰雷電之後大雪繼作則隂勝陽之明驗也當毋使小人得以間君子夷狄得以窺中國女謁得以行于外嘗論邊事謂今之言備邊者皆其細務當遴選行實才略之人付以江淮荆襄經理之任使文武合為一道慶歴中分河北陜西各為四路悉用文臣為大帥武臣副之平時使之通情而共事則緩急可以協濟而成功無事則同任撫養士卒之責有事則獨當號令行營之寄久其任重其權則邊防立而國勢張矣又奏律有别籍異財之禁祖父母父母令别籍者減一等而令異財者無罪淳熙敕令所看詳亦然今州縣不明法意父祖令異財者亦罪之知美風教之虚名而不知壊風教之實禍欲申嚴律文疏議及淳熙指揮若止令其異財初不析開户籍自不應坐父祖之罪其非理破蕩所異田宅者理為己分則不肖者不萌昏賴之心而其餘子孫皆可自安實美化移風之大要也詔頒行之至今為便江浙四路以和買折帛重困公奏有産則有税于税絹而折帛猶有説也和買其初先支錢而後輸絹中以錢與鹽分數均給後遂白納紬絹今又使納折帛反成倍輸全失立法之本意欲求對補之䇿以寛民力而固邦本于是減其輸者三嵗公初論版曹齟齬者幾月僅能去之繼論棘卿至四章不報遂明以姓名申尚書省而力求補外改除吏部侍郎丐外祠除直寶文閣與棘卿俱與郡後省同奏留公且言當與被論者有别公尋知寧國府改贛州而卿以祠去何正言異因對上謂曰林某好人朕甚念之已為易章貢見次矣贛為劇郡公一以平心處之文移期㑹動有成規裁斷曲直不可動摇聴訟初有數百後惟十餘紙猾胥豪民為之束手所奏便民五事一論州之􅔙官無職事而糜廪禄者可罷二請添置土軍弓兵三請以錢分給諸邑而禁科罰四乞禁廣東之民誘致盜掠郡人賣為奴婢五謂贛縣兩武尉乞差文臣一員皆郡之急務五年七月主上登極趣召公還贛石至險公欲行不雨而水高數尺怪石盡没俗謂之清漲殆出神助趙清獻公以後惟此時得之九月除中書舎人十二月遷給事中尋兼侍講公代言得制誥之體而繳詞批敕風裁如臺中時􅇑胄來見公接之無他語因使人通問願内交又笑卻之㑹彭侍郎􅀛年抗論􅇑胄甚切有㫖􅇑胄特轉一官依所乞除在京宫觀􅀛年除煥章閣待制與郡公尚在西掖鑰在鎖闥連名上疏謂次對不過在外之職序反下于貳卿亷車之升留務則寵之已至況一去一留恩意不侔去者不復得侍左右留者既曰内祠則召見無時終不能遠請留􅀛年于經筵不然則命􅇑胄以外祠奉御筆􅀛年除職與郡已爲優異􅇑胄初無過尤罷職奉祠亦不爲過可並書行又同繳奏􅀛年以眞侍郎除職與郡若以爲優異則􅇑胄之轉承宣使非優異乎若謂􅇑胄初無過尤則􅀛年論事乃出于愛陛下之誠心豈為過乎恐自此無敢為陛下出力論事者􅀛年既已決去􅇑胄難以獨留望予外任或予外祠以慰公議初趙丞相登政府汪義端為監察御史力攻之不得遂罷去至是􅇑胄引為右史公又駮之改除公吏部侍郎蓋兩以言事得此官竟不拜除煥章閣待制知慶元府時慶元元年鑰素聞贛上之最慶元鄉郡也奉祠家居公之善政實親見之公清心寡欲無一物可以動其念日坐黄堂非二膳不入克勤小物如為長興宰時剖決民訟是非立辨人固不敢干以私亦無可干者始居郡齋有盜若鬼神之状人人皇惑公以為此黠賊也必欲捕治已而果然前政所失器物亦皆得之由是姦人屏息公亷明敏皆安而行之不可屢數精力有餘足以行其志城南有河而江浦抵隄下者數處河漲潮登幾混為一行者病之間遇潮退隄決河水盡傾鑰自幼即熟聞此害不知自舊幾年矣嚮之有才知者屢謀而未遂公聞之初不以語人在郡纔數月撙節浮費得贏貲二萬緡一日委官置局命富室才力兼備者七人分董其役悉以石為之吏不得預民不知擾指日而成砥平繩直自甬水橋以至北渡凡二十五里有欲記者公曰何用而利及永久民用歌之二年求祠至于再三始得請郡人曰守有三林後林尤冠謂侍郎栗郎中枅皆在前有聲也得守如此未聞有所襃進又不留以福吾州乃聴其求閒耶未行銀臺駮論鐫職罷祠而歸耋穉攀留嗟惋如出一口公怡然而行五年四月提舉武夷山沖佑觀六年引經有請復元職致仕未幾御史承風㫖論列摭四明異政一二為最謬再落職公道安在哉嘉泰三年十月再復職一閒一紀退然一布衣也去邑居三里所得􅀛潭之勝作莊園其上最得一縣勝處時挾書以徃客至則擷􅂎菊取谿魚以佐酒談笑自適亭榭隨意有獨樂之風或謂公不以書入脩門縱不求福亦欲免禍公則曰禍福皆天也豈智力所能移乎邊釁既啓朝夕憂之歎曰恢復之名則不可議權臣之心則不可知今欲宗社再安非息兵不可欲息兵非去權臣不可既有召命令州軍以禮津遣又促其行始到闕而吏部尚書之命已五日矣内引奏對玉音嘉奬公首論防微杜漸無求更化之名必務更化之實次歴陳朱熹彭􅀛年呂祖儉以論擊􅇑胄皆以貶死其他類此者量輕重旌表之以伸其冤且以為直言之勸末謂􅇑胄之竊權陳自强之貪沓官有定價乞嚴贓吏之罪是月除端明殿學士簽書樞密院事嘉定改元閏四月命宰執並兼東宫官公兼太子賓客公抱負所學中外俱有聲績及在西府當􅇑胄殘毒之餘未易經理事之當為推誠以佐其長但論事之是否不顧身之利害亦不暇顧忌而後發嘗在榻前議講解事上曰朕為生靈不憚屈已事定之後亦欲與卿等作家計􅇑胄十三年敝政豈可不革公與同列謝且賀曰陛下之言及此國之福也退為所親言年將八十豈堪勞勩獨念和議未成未能體承聖訓盡革敝倖為經久之計略遂此心則乞身以歸然和使未囘而公薨矣廬帥王柟初徃通好金人謂之曰近報韓􅇑胄已就戮矣又問公與鑰同日被召二人如何王以實對歸誦其語公以語鑰且益相勉不可忘也公孝于親友愛諸弟既終信安夫人之喪悉以先疇分與之又官其從子二人自奉甚薄清俸之餘以給宗黨莊敬好禮不惡而嚴一言之出終身可復讀書至老不倦郡齋公退躬督諸孫課程吏卒或聞洛誦聲而不識其面悼亡之後自言子雖蚤殁而三孫足以承家清修幾二十年尤人所難家居不以事干州縣守令能訪利病則極口告之接人深有恩意或浼以外事雖至親不答也所居殊陋既貴不改出以二僕肩輿僅免徒行而已素不求人知人自服其名節朱待制嘗貽書朝士有曰林和叔初不識之但聞其入臺無一事不中的去國一節風誼凜然當于古人中求之後同在從班相得愈深公文詞淳實如其為人未嘗無用而作有奏議十卷外制三卷文集二十卷藏于家冒暑得病猶自力以趨朝謁六月壬申薨于位上爲之震悼徹視朝三日賜水銀龍腦及銀絹各五百東宫亦致賻焉享年七十有八積官至朝議大夫爵東陽郡侯食邑一千一百户食實封一百户贈資政殿學士正奉大夫有司將設軷祭力辭之以二年十一月已未葬公于縣之長安鄉南塘山之原有司定諡曰正恵特添差從子籥爲婺之司户參軍護其葬朝旨轉運司應辦可謂終始哀榮矣娶趙氏先十八年卒贈永嘉郡夫人至是合祔焉子簡以公樞府恩例特贈登仕郎女七人長適從事郎新汀州州學教授陳黼次適進士胡一之王樾宣教郎新通判臨安軍府事應懋之國學生喬時敏里士趙遜孫栻孫三人楷樅竝迪功郎監西京中嶽廟棫迪功郎新湖州歸安縣主簿楷實承重觧官曾孫四人子熙子㸃竝將仕郎餘未名女五人尚幼公標矩自髙望之儼然若不可以挹酌臭味苟同歡如平生始在宫庠鑰為攷功郎一見傾葢公久在御史府鑰入後省當紹熙間各欲維持公議徃徃不謀而同交情由是益厚已又同司論駮相隨出闗託芘桑梓别後俱墮百謫自謂此生不復再見矣赴闕之初握手笑且歎相語曰吾儕相逢此殆天也嘗為􅀛潭賦大篇公見而喜寄烏絲欄使書之鑰取友固多晚而出處略相似名位相上下未有如公者非所謂君子之交淡以成者耶天不憗遺喪此元老殄瘁之悲又非他人比楷等求銘義不容辭發揮幽光愧弗克稱詩曰我心匪石不可轉也我心匪席不可卷也范太史稱司馬溫公曰其清如水而澄之不已其直如矢而端之不止嗚呼林公其幾于是乎銘曰儒者制行或流于偏猗歟林公行幾于全喜怒未發公名斯得發而中節以表公徳學以致身政能及民秉心無競掇皮皆真具區灌河贛石清漲心與天通動有隂相謹終如始視險若夷非通非介不磷不緇遇事敢言獨立不懼兩貳天官不合則去號三不欺藹然吏師四明之政實親見之風生柏臺節著瑣闥百謫横加清聲四達歸老􅀛潭若將終身更化之初首圖舊人上喜見公俾貳宥府望尊朝廷名讋蕃部經綸未究胡不憗遺一鑑云亡殄瘁何悲子産遺愛叔向遺直孰其兼之視此銘刻中書舎人贈光禄大夫陳公神道碑公諱希㸃字子與處州青田人陳姓出于有媯其來遠矣九世祖名師訥呉越王時為銀青光禄大夫積勲上柱國曾祖圭贈宣奉大夫祖汝錫擢紹聖四年進士第仕至左朝請大夫秘閣修撰知紹興府兩浙東路安撫贈中奉大夫高宗駐蹕㑹稽朝廷草創賴彈壓辦䕶之力為多威名甚聳直道自將不能與時高下一斥不復士論惜之父棣篤學有賢行奉議郎通判潭州贈中太夫妣葉氏馮氏俱封孺人贈碩人公葉出碩人石林先生從兄之女也公承家訓少有場屋聲入太學再預薦連丁内外艱淳熙八年以南省第六人登甲科授從事郎平江府觀察推官樞密丘公崈為守屢以職事爭辯丘公或憑怒折之公退立屏息俟其少霽執論如初至于再三竟不能奪自爾公所書擬望而許之樞密羅公㸃以浙西提舉兼府事舉兩司事無大小悉以屬公行荒政修水利決積訟皆公左右之除主管尚書吏部架閣文字再嵗遷國子正日進諸生問難經史而嚴私謁所拔多宿學有行誼之士時重華寢疾光宗亦不豫省覲闊疏或夙戒而中止物論紛然公謂上實被疾而間其心者得以肆其邪説因疑成畏遂至猜阻上疏備言之讀者以為辯而不激直而有禮深體父子之至情又嘗代從班兩疏反覆至數千言皆剴切出于衷誠言及則悲傷感泣不能自已愛君憂國其深切類此尋遷太學博士上即位之初輪對首陳三事曰畏天命曰法祖宗曰結人心敷敘詳明用故事不納副封時宰以公嘗出其門不以間見固己不樂至是以為輕我且曰是不尊廟堂也奏令赴吏部銓上獨喜公所奏遷大理寺主簿人爲之憤公曰上知我矣欣然就職素不讀律而原情引經法家自以爲不及丞將作監又幾年丞司農大農除江浙十一州運米外餘仰和糴中糴以助嵗計淳熙初州郡嵗額糴降本緡錢計一百六十八萬是時年豐楮重未至迫蹙後又議寛減加以虚額及收馬料等凡減去二十餘萬有竒中熟僅可支吾一或不登則廪廪有乏興之懼公與同列究弊源權輕重爲之少裕時權倖方張公不少屈遲囘久之丐外知泰州陛辭陳農寺四弊三策且曰此其在有司者耳弊在朝家有大于此者乾道二年一嵗除馬軍一司二十二萬石之外實支一百三十八萬餘石馬司既已移屯而紹熙以來不下支一百六十萬此臣所未解也願究昔之所以省今之所以多力圖而痛革之然後採三策而去四弊庶幾國計稍可為官吏亦得以任責上從公言方議施行而不樂者益衆言者有未作縣不當守邊為辭公上祠請改知衢州州當舟車之衝訟繁事夥將迎無虚日公謂財裕則可以行志首閲嵗入之籍痛節浮費力裁厨傳用既不闕時有蠲減得以裕民寓公服其風裁軍士犒給無闕而憚其嚴愛民如子惜官錢不啻己私或用至數十緡拊心歎息曰此皆民之膏血箠楚所取安可輕用耶秩滿視帑藏元額餘十四萬緡吏請上聞公曰吾豈以羡餘取世資者止以少過舊數申發留其贏以寛征取召赴行在首奏農寺和糴嵗歉價増富商大賈反操其權以邀原利不若乗此粒米狼戾之時廣行收貯積及三百萬則可以備凶年之急矣又言役法之弊欲以限田視品秩為等限以止法三品以上自依舊法四品至六品止于曾孫七品至正八品止于孫從八品止于子八品而未嘗歴任與九品止于本身一依宣和舊法子孫自致通顯者别計庶官户既有限節下户可以少寛詭寄之弊亦可漸革除户部右曹郎官嘉泰四年都市大火延燔省部家人進饌公輟七箸曰主上無失徳皆姦邪致此言畢流涕㑹求直言遂極論弊事大略謂西漢之末人主無甚過行徒以上下偷安風俗脂韋寖成衰弱併論贓吏債帥及士風日偷州郡數易皆闕政之大者又言晉之南渡未嘗主和故不弛備而戰亦不慴今上下恃和為安將驕卒怨敵勢雖衰未易乗也遷右司郎官時權臣専制政柄貪相濁亂朝綱公與今知樞密院雷公彌縫其間一裁以法雖盡所職而念去已深遷軍器監平章之初方觀衆情向背公一見首求外補旁觀者為公危之公曰去意已久非容心于矯也遂以直寳謨閣為福建路提㸃刑獄訟訴萃于憲司明恕而行處決不倦人以不冤時方用兵征求益繁建有飢民鈔略逮繫百數公謂皆迫于乏食不足深治取為首數人寘之輕典餘悉縱遣之召還論邊事皆深長之思切中時務復歸舊著不數日元惡就誅遂除中書門下省檢正諸房公事未幾擢起居舎人兼太子侍講進兼侍讀兼左諭徳公講讀之際至人道大綱治亂大端祖宗立國之本意必反覆陳述太子為之起敬聴者聳然立螭之初首陳西蜀兵事謂重兵駐漢沔東南禁旅不能為之輕重成都者漢沔之根柢也今漢中三大軍無慮十萬而成都之兵不滿百何以制末大之患逆曦之變至無敢抗者謂宜如揚廬帥司增置親兵仍增募屬縣之卒庶足以鎮一方緩急可以倚仗策無便于此嘉定初元當兵荒之餘久旱飛蝗人情惶惑或謂成肅喪制未終主上不應親出禱雨公直前奏謂出而于逸于畋于觀則不可若循仁皇禱西太乙故事親屈萬乗為民一出則人人皆知陛下閔雨之切人心悦而天意解孚應必矣上為之感動越三日車駕禱于太乙宫甘雨隨車都人歡呼嵗亦中熟進起居郎未踰月兼權中書舎人尋為真公既代言詞尚體要隨職戒諭不為虚美遇有繳奏身任其責奏或未下不憚繼入事闗大體漸不可長者必痛抑一二以警其餘末節細故亦不屑屑也詔求時政闕失公言太上知天其次畏天其下慢天知天者興畏天者存慢天者亡請以周事明之文王知天故以之興成王宣王以畏天而存厲王幽王以慢天而亡累聖繼承祈天永命中更變亂而天命人心彌久彌固者在此也陛下即位十有六年恭儉之心敬畏之誠上通于天下信于民是陛下有其心矣夫有其心者必有其政有其政者必有其事苟徳意未宣政事多闕是殆未知推其所為而已公前後論奏于天命人心之際必反覆開説指切事情雖不盡見于施行而立論率可稱述公素多疾至是以久次方擬進擢而公之病病矣二年十二月壬午卒于位享年六十有六積階至通議大夫遺奏聞贈宣奉大夫以皇太子冊寶恩贈光禄大夫爵青田縣開國男食邑三百户先三日設榻正堂至是斂襟危坐而逝問以家事一無所答識與不識莫不傷正人之云亡上深惜之賻贈加禮贈官之制首引唐文皇之言曰收也若在當以中書令處之亦足以見眷遇之深矣皇太子尤爲惻然三年二月諸孤奉公之柩以歸十二月甲申葬于鳴鶴鄉慈明之原公娶同邑朱氏封碩人子仲堪迪功郎福州羅源縣主簿仲埴承務郎仲垍國學生先公九年卒仲垓仲坊將以公致仕遺表恩補承務通仕郎女二人文林郎新汀州州學教授孔夢符迪功郎鎮江府延陵鎮税兼煙火公事盛立禮其壻也孫男女五人尚幼公性素剛交際簡淡其不為阿附人以為難公蓋優為之慕王陵汲長孺為人少作見剛録以寓意其哭知樞宻院胡公晉臣文曰朝有正臣其國乃重漢曰汲蕭唐稱魏宋誼形于色賁育其勇或招麾之亢立不動其抱負如此三登朝著二十餘年終以落落不為當路所知自博士左遷遠迹清要更化以來始遂向用以世道為己任嘗曰世之不治非謂無法法亂之弊也救時之相固不易得苟得平心守法者其庶幾乎蓋自許也孝友勤儉得于家傳碩人能承公意謹奉甘旨既畢葬送弟妹婚嫁謹奉先志事兄如事父春冬賜帛必先奉其兄而後入私室既又推所遺田宅悉以予兄弟自奉如未遇時所居纔蔽風雨作詩雖多録其得意者文尤簡古字畫端方如其為人公靜黙嚴重出于天資兒時已如成人及長左右規矩風標益峻起居飲食之處終始如一喜愠不見于辭色雖家人莫窺其際笑語有度使人意消讀書觀大略苟有㑹心處則涵泳充廣必使心通意解達于踐履執喪哀慕之餘一意探討免喪始登東萊吕太史之門一見契合相與質疑辨惑由是聞見益明而所守愈定矣有淡齋筆談淇渌遣興璧水雜著西掖類藁經筵講解及奏議各藏于家此皆右史王公介状公行之詞也仲堪等求銘于鑰自念及識潭州已服其賢厚與公同朝相好非一日掛冠復來恩及三世一嵗間封贈至三四訓詞皆出公手知鑰家世之詳敘述委折使自爲之亦不過是也殄瘁之歎倍于他人故不敢以固陋辭銘曰誦詩讀書孰非儒雅悠悠千載未見剛者我重彼輕惡圓喜方禍福度外乃全吾剛惟公不羣尚友陵黯持志養氣明目張膽天分既高學力尤深閲世多變秉吾一心進退以義落落難合更化始用論思獻納西掖代言訓詞温淳東宫横經輔道諄諄折而不撓人望公輔一疾困之遂隔千古鶴溪之原父祖相從孰有如公一節始終龍圖閣待制趙公神道碑孝宗皇帝在位之十三年吏部侍郎趙公粹中奏乞正太祖東嚮之位上攷三代六經之制旁引漢魏晉唐之規近取本朝馮公京司馬公光范公鎮孫公固中興以來董公弅王公普朱公震以下及公之叔父渙奏議參訂其説集而成編謂太祖當居太廟第一室永為不祧之祖太宗居第二室永為不祧之宗遇祫饗當奉太祖居中東嚮尊無與二昭穆旁列以侍所尊實允萬世公議久而未正願陛下一定廟制上當天心光昭祖烈上極向之㑹有沮其議者公又為闢異一書尤為著明人以比唐之陳京而攷論過之上既謙遜未遑公嘗撫其書而歎曰兹事未明吾死不瞑後之君子誰能信之至上遺表猶曰推藝祖肇造之功早正東嚮之位念中原沈淪之久無忘北伐之圖其志可哀也蓋我宋之興與商周不同契稷為始封之祖其下皆親盡則毁漢魏祖廟凡曰太祖而上四親之廟亦親盡則毁禮之正也惟唐雖起于高祖而景皇帝始封唐公故以比契稷為唐太祖建隆初元立僖祖順祖翼祖宣祖四廟如漢魏之祀太祖造邦之主所以列于昭穆者以上有四廟也仁宗祔廟七世已備至英宗既祔祧僖祖于西夾室禮也神宗熙寧五年王安石異議請祔僖祖以為太廟始祖居第一室祫祭居東嚮之位故馮公司馬公等引經爭之安石强辯固執至欲以僖祖配天孫公欲救其已甚請以僖祖權居東嚮之位哲宗祔則宣祖當祧蔡京在徽宗朝又建九廟之議遂不祧宣祖而復奉翼祖于廟高宗中興公之叔父以將作監丞對首陳其説時方明宣仁之誣謗除元祐之黨籍皆足以快天人之憤故一聞此議慨然從之擢爲御史俾廷臣共議議者十有七人皆合亦以横議而止光宗時太常少卿丘公崈有請盡用公之説得㫖集議又不果上嗣服將祔孝宗始議祧宣祖而少卿曾公三復又申此議吏部尚書鄭公僑以下集于御史臺無不以爲當然而鮮有知其詳者鑰不肖素荷公之知嘗授以全書得以備究始末時待罪瑣闥羣公俾爲之辭既又有㫖使定祧廟之制再議而益定自熙寧至是一百四年而藝祖始居第一室正東嚮之位實自公發之而公之亡已八年不及見矣又十年鑰方投閒四明公之子來請曰先公之亡既辱状其行而墓隧之碑未立且先公立朝建明之大者無如廟議又蒙力信其説卒正國家之大典先公死且不朽今之知此者幾人哉願有以詩之泣拜不已鑰亦為之流涕敢敬列斯事以冠碑首又序而銘之公字叔達密州諸城人家世多以文發身號東西趙西有丞相清憲公而公則東趙也曾祖伸不仕祖公綽累贈右正奉大夫父濬左朝散大夫累贈通奉大夫通奉因官東南久寓㑹稽卒葬明之鄞遂占名數明今為慶元府公天資絶人書一覽不忘厲志高邁自幼篤學不煩師傅下筆成章詞鋒鋭甚通奉文高一時父子間自為知己謂此兒必大吾門紹興二十四年與弟大猷同登進士科授左迪功郎南劍州順昌縣主簿乞免截鹽充失收經制錢州與邵武虚認明谿寨兵請給乞正支官錢以寛民力蓋初筮己不苟于其職如此三十一年闗陞左從政郎監行在雜買務雜賣場門雖在筦庫論當世事皆天下大計人已屬望以為國器矣乾道元年用薦者改左宣教郎調吉州永豐縣丞二年丁妣碩人高氏憂四年通奉公下世公抱負不凡聲望已聳七年甫免喪除太常寺主簿公世明禮學用贊其長輪對奏乞辨雪岳少保飛之􅬁録功定諡優䘏其家以激厲將士又乞募人耕江淮荆襄荒田不税不役家出一兵如四川義士進恢復機密十論俾邊帥招中原之人用竒以擣燕山又進制狄權鑑取書傳制狄之説參攷歴代事迹總歸條例為十六門四十卷又富强要䇿十卷専論屯田頻年雖嘗留意而未及前代者其説有三利害未盡爵賞未重委任未専三書既進送給舎看詳咸云學問淵源議論詳確八年冬遷太府寺丞再對極論文具之弊願詔大臣崇尚實用明年春除秘書郎翼日兼權起居舎人閏月暫權給事中自後凡三攝此職論事無所囘挺建康將佐以獲盜轉官承旨司主之公謂軍律不修部曲劫盜曾無責罰反以捕獲推賞何以示警權臣館客奪官已久直赴殿試除倅臨安公謂其無一日攷第如此則其類進矣耶律适哩乞其子閤職又二子爲額外綂領乞寢罷使遠人知朝廷之尊不敢妄有僥覬劉光祖濫以邊功求厚賞條其不應格者五以駮之又論紹興府㑹稽和買太重欲除子户之弊莫若以田畝均科仍下兩省集議亦不拘臣之説上曰如此則利害詳盡又奏選將于行伍中有才武智略者許自相推擇更加攷察上曰誠如卿言已試而顯者多輭熟不足用對曰彼惟保守富貴不思報國自下拔擢人始奮勵上以公誠實振職每加激奬不可屢書大將真俸從臣召命亦行繳奏上尤歎其正直且曰卿不沽激不求名封駮皆當正欲如此朕見卿有節概是以用卿公奏臣孤立惟陛下聖明是以容臣愚直後省維持紀綱封駮多則可見公朝臣屢攝瑣闈無非務發明公道陛下總攬于上宰執圖囘于中臣輩扶持于下如此一心皆能守法則僥倖路塞小人道消矣但以不避仇怨恐遭中傷上曰朕自照知無慮也五月遷起居郎冬兼太子左諭徳嘗奏講求渡江以來用度酌立定制以賦入之數七為經費儲其三以備水旱非常又命江東漕臣及此稔嵗糴米分貯諸郡郊祀先雪後霽願益加兢業以答上天之眷州郡或獻羨餘請更加覈實以代下户之輸除權吏部侍郎暫權刑部侍郎淳熙元年金遣泛使梁肅富察守中來蒲察今改案富察舊作二月借朝請大夫試工部尚書充接送伴使待之以誠折之以理因論和好公曰煬王敗盟送死為千古笑肅等唯唯且言其主遣使正欲再堅和好不肯舉兵先舉則曲有所歸公曰皇帝守天下以仁尤以南北生靈為念豈肯容易言兵彼此從順自然和好堅固肅等相顧云如此則濟矣以尚書開懐見待略無疑忌是以盡布腹心不敢有隠事訖備奏上大悦曰卿可謂専對之才矣二年九月除吏部侍郎公久貳天官盡公革弊不遺餘力乞將堂除架閣以下歸部以開公道以清中書右選必候呈試方許參選免試恩例並不許用曾經堂除人及舊許壓在部者請依次注擬以均寒素而待才能川廣福建到任賞格輕重不等宜加裁抑以革􅔙濫選人有力者初任或併取京状有妨平進公請次任方許薦舉改官條列銓試之禁甚密嘗奏自入銓曹不敢苟簡惟恐有負委任之意近懲數吏為之肅然上曰公生明卿既無私澄汰多矣公雖愛惜名器而持心近厚士夫受賜者衆有蜀士數人當改秩而吏以微文沮格累嵗公立為申改有恩科得官而復衰病來赴銓量公慰藉周至或問之公曰一官姑以慰其蹉跎待次尚數年何忍沮之聞者感歎此皆本職大概若論思之際知無不言嘗奏承平日久士風不振凡取人材當以氣節爲先論軍政則乞遴選大將郡守申嚴藝祖階級之法使分守益明一日又論四事一博訪諳悉水利之人開震澤百瀆以除壅塞二歸正添差猥多難以贍養宜分給田廬以爲兩淮殿最三文武官欲換授者竝試文藝四罷大學混補令方州于解試内取貢敷奏詳蔚上曰似卿人材難得前後更無一人説卿嘗論王安石及雱父子姦邪當罷從祀畫像又乞崇奬直言謂人主能來天下之言則下情通下情通則君子有所恃小人有所畏近日襃贈魏掞之奬諭鄭鑑足以風動天下監司郡守治状顯著宜候任滿召還或令因任過失苟非已甚且令鐫降以責後效庶免數易之患宰執侍從嵗舉邊帥一人堂察奏聞且與邊方差遣以儲将帥之才又論唐取武士以八科不試孫呉之書欲倣其制止以步射步弩步槍步刀四事招兵號武士科中者與免丁役如齊之内政唐之府兵農隙教閲以次犒賞擇其出衆者為之長又請條具積欠錢物有名無實之數因行慶典咸賜蠲除尋遇高宗過南内宴賞坐出此奏兩宫歡甚就宴降旨施行公前後四求外補上眷曲留求之愈力三年始得請十二月御批久典銓曹勞績日著除敷文閣待制知池州時孝宗方以職名為重非有功不除公以簡眷之深首得之四年三月赴鎮臨政勤敏寛猛相濟布宣徳意詢訪利病以簡静不擾為本而賞罰必行吏畏民愛姦盜為之屏迹理財節用久而充溢既補積逋又代貧民之税決訟如流吏不得預秋税受輸多取于民公深疾之至是使輸者自槩事既徹聞有㫖行之諸路増葺學校親較諸生課程時加餽遺以勉之嘗謂􅅦禁太嚴愚民抵冒者衆嘗獲私茶其數甚多但籍其物而薄其罪官醖價亷味醇私酤不禁而自戢有邑令侵漁官帑止令備償其人慙甚引去公曰錮人聖世不忍為也大軍分屯下車大閲以錢三百萬犒之軍士歡服營壘取水囘遠為創大池以便汲者百廢具舉兵民安之五年冬詔郡政修舉實恵及民陞龍圖閣待制民為立生祠六年春移知湖州挽留者繫道不絶在池陽與監司互乞囘避㑹有言者到任三日而罷凡四任提舉江州太平興國宫初遞卒汪青私啓遞筒實以匿名書至徹宸聴獄成具奏公因言事闗邊徼此而不懲恐有甚于此者上深以為然遂處極典八年臺評以為疑公坐鐫職十三年高宗八十之慶盡復舊職十四年屬疾寖劇自言厄運方迫必不可為卻藥不進求致其事四月甲戌薨于寓舎公自持橐之後年勞賞格不用者二十餘年故官止承議郎爵高密縣開國伯食邑七百户遺奏聞特贈四官官其家二人娶錢氏朝議大夫億年之女封碩人先公一年卒子四人長幼亡次端承事郎知平江府常熟縣丞次䇕承奉郎後公十五年卒次竴修職郎新吉州永豐縣主簿女三長適迪功郎前温州司法參軍辛勸次適修職郎監嘉興府澉浦鎮税曾晏次適承事郎知滁州清流縣魏峴孫男七槩棨棐梁􅙫杲棠女二尚幼碩人葬縣之陽堂鄉同奥之原通奉墓側六月乙酉諸孤奉公之喪合焉公事親盡孝居喪哀禮俱至先以通奉遺澤遜與長兄之子靖次兄以疾廢又無後公經紀其家取從子竦為之嗣先以世賞及之崇篤外家養從母終身事乳母尤謹親故有以緩急告者力周之孤忠亮直無所附離名公前輩多知己者不縁介紹自結主知器業蚤就年幾五十始有朝績乾道末年一嵗幾于九遷入從出藩睿簡罙厚人謂枋用而遽退閒居鄞十年夷然不以得喪芥蔕與太師史公丞相魏公尚書汪公為真率之集僑居僧坊僅芘風雨自號曰梅堂號燕坐曰意足曰樂静聚書萬卷手不停披持身玉潔表裏無異望之儼然即之甚和無貴賤疏戚均為盡禮愈貴愈謙儉素不啻寒士杜門寂寂郡邑幾于相忘凝塵滿席處之淡如暇日幅巾蕭散猝遇之不知其為甘泉舊徳也字有楷法水墨積習出入率更公權之間尺牘為人藏弆告身書名端重勁正見者敬之學有原本文有體要表章雅健追配前人尤喜論治道古今典章無不該貫論事剴切通暢能動人主之聴詩律酷似唐人杜詩韓筆深造精詣劉白之作誦習無遺不為艱深奇澀之言矯激崖異之行貌若介而有容交雖淡而能久位既通顯専以薦士為己任片善必欲揚之使達所舉至多皆知名之彦有至公輔者文集十卷奏議二卷梅堂雜誌五卷史評五卷及廟議諸書藏于家晚猶取歴朝實録纂提綱目當世之志未衰也遺令諸子友悌守家法治葬以時親戚之貧者廪給之或請禱曰吾素不欺無事于此嗚呼公之所存可知也矣銘曰藝祖造邦功冠萬世廟立四親如漢如魏廟曰太祖尊無二上室居第一祫則東嚮昔在五朝四親未祧開基之主列穆與昭猶虚東嚮以俟後世既祧而復熙寧横議羣公爭論百有餘年惟公會稡集其大全神堯興唐封始于虎陳京抗論為唐太祖公之為力倍過于京惜議之行不見其成孝宗聖明惟賢是柬問公安在何見之晚乾道末年幾于九遷入從出藩聲望􅂱然建明非一廟議為大自公發之禮正昭代惟兹大端足以不朽在天之靈其昌厥後我作斯銘不顯幽光巖巖豐碑以賁其藏攻媿集卷九十八
