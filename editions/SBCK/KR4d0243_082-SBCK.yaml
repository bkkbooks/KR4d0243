body:
  text: 宋樓鑰撰祝文農文三首合為一卷已缺佚無存又有青詞三案原目此卷前有致語十五首上梁文四首勸道場祈醮佛寺功徳求僧募縁之作今竝刪去十四首别為一卷疏文九十六首分為二卷大率温州修大成殿祝文教授殿久弗葺隳蠧日甚神像在兹懼将壓焉易敝從新飭工伊始恐驚神靈不敢不告台州謁廟祝文通判東嶽行祠泰嶽以膚寸之澤及天下功利之在民物者何止一邦鑰佐郡此來伏謁祠庭巖巖之瞻邈在天外神聽則近尚其顧歆靈康行祠惟神之祠肇于永康而靈響之著盛于台城乃崇寜元祀曾祖來守以神之隂功聞于朝是以有仁濟之封鑰佐郡此來所以事神者何敢不肅祗事之始先欵祠下靈康之謁少俟朝夕惟神其鑒之諸廟州之民吏治其明神理其幽神之血食于此既久功利之及民者深鑰佐郡此來祗謁祠下吏之事不敢不勉惟神其隂佑之靈康正廟王之威神震于一方疫癘雨暘罔不禬禳昔曾大父來守海邦列功于朝侯封有光鑰兹叨佐州祗敬靈響巋然祠庭襟山帶江千載喬木鬱乎蒼蒼再拜致謁肴鮮酒薌願廣隂佑保綏此疆十雨五風豐年穰穰吏責茍逃神賜敢忘辭廟祝文先聖夫子曰君子學道則愛人鑰未知道而願學焉羨員此邦所未厎于戾者夫子之教也今去矣敢敬致辭然夫子之道無乎不在鑰之心亦當無乎不勉蓋夫子之廟可辭而道不可須臾離也諸廟鑰贅倅此邦首尾二年年榖順成無菑無害神之福吾民者如此而吏之被賜也尤為不貲今去矣祇拜祠下非敢邀福于身願神之福吾民者千載猶今日也温州謁廟祝文知郡先聖夫子之道萬世所尊夫子之尊萬國所共鑰頃嘗分教今十五年奉釋奠之舊儀葺大成之廣殿兹叨假守尤仰師尊夫子有言曰敬事而信節用而愛人使民以時鑰雖不敏請事斯語惟夫子實鑒之諸廟永嘉内外百神咸著靈響創祠此邦民已受賜海神祠山云惟王威徳著于東南室威徳著于是邦云惟王勲業冠于唐鑰頃嘗客授祈報屢矣兹焉假守獲共香火之奉今嵗旱災甚廣獨吾州有年神之賜厚矣國家張官置吏凡以為民祀典所載亦惟有功于民者祀之秋氣方中岌岌然以風濤為憂愁霖未止願亟開霽以全農功鑰不敏竭力以祗王事惟神有以相諸幽則吾民其庶㡬乎祗謁之初敢敬以告祭酺神祝文惟周禮族師之職春秋祭酺鄭康成云蝝螟之酺慶厯之制有蝗蟲則祭煕寕議臣欲每嵗春秋行禮終不果行乃閏五月丙戌以蟲螟爲害祭以致禱賴神之賜隨卽衰息兹當晚禾秀茂之際又有食其心者士民以前日之靈異來請不憚再瀆復舉斯典詩云靡神不舉靡愛斯牲而況明神見之禮經著之祀典専職于蝝螟者吏不敢辭其勞神其不倦于應俾田祖之神畀之炎火以全嵗事于垂成不亦休哉辭廟祝文先聖嗚呼聖人之言可寳萬世而況吾夫子集大成而又拔其萃者乎夫子之言曰道千乗之國敬事而信節用而愛人使民以時鑰不肖試郡以來伏謁之始固嘗請事斯語黽勉萬一由是得二年之間田里相安今去矣敢以展謝四五年間十修釋奠之禮顧瞻廟庭不忍遽去若拳拳願學之志又非止乎此也諸廟惟明神福永嘉之民民之謹奉香火于兹有年矣鑰試郡此來荷神之休凡有禱祠無不響答今歳尤幸十雨五風以迄康年晚禾闕雨不免煩瀆秋髙氣清忽霈膏澤豈么麽能動神聽蓋千里之幸也吏之撫民不過二三年鑰拳拳此邦無異鄉社今去矣既謝靈貺神其加惠斯民于無窮哉工部加贈焚黄祝文四首國家蕆事于南郊大賚四海鑰以叨列朝籍贈先考為中散大夫嗚呼惟樓氏世有積徳衣冠相襲既百三十餘載矣自曽大父金紫而下階官至朝議者三人俱不及生登五品我先考厯仕㡬一甲子謹廉周密始終無玷闕官簿益髙壽七十有六而束于新制乃今而後得之仲兄既不勝喪遂不得同致卹典焚黄九京追痛罔極伏惟昭鑒歆承寵渥鑰伏自淳熙十四年七月假守永嘉辭拜塋下聖朝恩賚動及泉壌先君贈典乃至于八前四者固嘗燔黄以告矣今皇帝登極已而鑰遷秩中奉又遇明堂大禮累贈先君為正議大夫今者鑰由權吏部尚書丐郡得婺按故事以請于是遂有正奉之贈歸掃松楸涙沾宿草敢以四告併侈上恩惟我先君位不稱徳積慶流衍十年之間寵渥踵至不肖子鑰蒙被遺澤年除歳遷寖逾分量幸逃譴何得遂一歸皆先君之賜也尚惟祗服命數以佑我後人于無斁惟皇帝御宇之四年親祀南郊霈大澤于天下追榮之恩普及泉壤嗚呼顯考積厚流光鑰不肖祗服義方慿藉隂佑幸不墜門户以為先君羞十有四載之間告第燔黄至是而九兹敢以宣奉大夫之命薦于塋域顧瞻松楸音容如在尚惟歆鑒式綏寵渥伏自嘉泰三年郊祀大禮考加贈銀青光禄大夫妣加封安康郡夫人恩命未頒顯妣遽棄諸孤憂苦摧割未遑蕆事去歳天子宗祀合宫又贈考金紫光禄大夫妣安定郡夫人嗚呼顯考捐館于今二十有六年告第之典至十有二今既視秩天官追蹤曾祖顯妣克享上壽石窌啓封至再至三康寜考終洊更大郡餘慶所暨燕及孫曽世受國恩存歿俱幸惟是奉顯妣色養之久近經初忌又首行燔黄之禮鑰等不勝哀慕之劇謹併以四告三黄展儀塋下移長汀菴祭告祝文三代并陪葬位鑰等罪逆酷罰母氏大寜郡太夫人汪氏傾逝伏自淳熙十年先考葬于長汀祖庵之後是時即議少遷冡舍因循二十餘年兹以母氏卜日合祔移菴于左敢先奉祖考神主于享亭庶免斤斧工役驚動神靈俟新菴之成復還廟室伏惟鑒察密賜隂佑俾大事克修鑰等不勝哀痛感激之至先君工部嗚呼先考之葬二十餘年矣體魄安静子孫蒙休久議遷移祖菴不敢輕易天禍我家母氏大寕郡太夫人以正月九日棄諸孤攀號擗踊痛割何極鑰等忍死力貧已豫卜十二月八日丙申奉太夫人之喪祔先考之墓将以此月二十二日丙辰解屋填基伏恐驚動神靈先于今日設祭昭告惟我先考黙相大事使區區孝誠早遂素志永奠二親九原之居不勝悲痛感激之至䘏典将頒燔黄未果寒食之節以凶服不敢墓祭挂旛追薦併惟歆鑒痛吾母之不及見也土地先祖少師之葬建立菴舍今八十年其鎮安松楸保佑存歿惟神是賴兹以母氏大寕郡太夫人之喪将祔于先考光禄之墓豫卜吉日遷菴于左方伏恐有冒明神謹用昭告奉神位稍就西廂俟工役訖事别當築室妥靈永祗香火惟神鑒察尚隂相之畢工奉安神主長汀建菴垂八十年物各有數撤而新旃顯考之藏安康合焉惟此舊基實蔽新阡忍死竭力徙于東偏土木初興神主告遷兹焉訖役奉以言旋載髹新位敬書掲䖍捨舊從新憑依永傳佑我後來慶系其綿鄉校奉安先生祠堂祝文部代工惟我曾祖以古學起家不務仕進退而教授鄉校一時名公横經授業最爲盛際里人推本文風之所由興相與祀于學有年矣近又請于郡願徙祠東序以致尊尚之意郡太守欣然從之遂爲四明美事衰族預有榮焉粤子孫不敢以是勤鄉曲身任其責堂宇一新像設嚴備其率子弟祗拜祠下以妥先生之靈世蒙餘休懼弗克稱繼自今歳時瞻敬其勉進學業惟孝惟友以庶幾先生之風以無負里人之意惟先生其鑒之立皇太子祭諸廟祝文温州守以下代皇帝惟宗祧之重豫建太子以固國本爰推恩沛惠綏萬方凡郡國大小之神有功及民者命長吏咸致敬焉惟神廟食兹土法應得祀謹涓吉辰遣某官一作謹奉酒醴牲牢以薦馨香神之聽之相我千里之民自今無或有旱潦疫癘之災仰以答上之賜俯以為邦人之休顧不在兹乎海神廟祈謝祝文祈雨五首惟神相唐若旱作霖精爽凛然廟食歳深民以旱告吏實疚心潔齋致禱罔或弗欽願沛膏澤視古猶今庶幾歎愁變為謳吟海邦之民神所勞驕陽傷農下無告吏實不肖心是悼三日再瀆神勿躁旱魃既虐風亦暴吹雲使醨氣不冒平疇良苖日就燥安得上天隂雨膏神兮至靈随所禱牲牢馨香敢忘報夏旱致禱神既應之驕陽復興實慙再瀆暑氣日甚嘉榖将槁吏無所告惟神是求願為甘露迄成歳事靈應益彰報敢後哉頃歳夏旱秋而得雨農功雖失尚收桑榆惟今之災秋晚未巳千里内外日以告病間有火驚無敢安處麥不入土後日可憂瀆神再三顧豈得已願為膏澤捄此疲氓三時務農以神為命雨暘不若随禱輒應農事既閒人亦少休旱暵吿病惟神之求連甍而居甘井枯竭宜寒而燠疫癘将孽神芘斯民尚聽禱祈三日之霖拱而竢之迎神像行道祈雨旱災致禱雖日造于靈祠甘澍愆期意尚虧于舊禮願同佛像周厯郡城列處黄堂慰萬衆瞻依之切悉裒緇侶盡六時諷唄之勤庶神力之益彰俾雨師之速應人所欲者神其聽之謝雨四首夏旱而雨功歸于神神安厥居蓋亦未㡬秋陽為虐于于復來不以為瀆而不我聽三日之澤如響應聲苖興勃然一稔可待神之賜也敢謂偶然敬拜于庭神其來格神居是邦民之司命曰雨曰暘來禱必應亢旱既久千里告病迎處黄堂用彰禮敬人心惶惶神實來聽以隂以雨不俟雩禜肅神之歸如初之迎掲䖍妥靈牲酒斯盛或言海氣則風之證祈佑農功俾終有慶秋日亢陽正此無告海風助虐其何以堪吏之不徳不能銷去精祈未既靈貺已昭神之愛民若父于子隨禱而應是焉可誣尚請于朝以伸陽報旱災之餘人心易恐雨小不應千里嗷嗷所不甚恐惟神是恃衛公精爽凛然如生膏澤所霑闔境告足率屬來謝其敢不䖍尚冀時若以汔稔歳祈晴二首惟神廟食之久于民有功曰雨曰暘調護無爽吏政實愆致此隂沴雨雪不已欲耕未能怨咨無告惟神是賴毋以吏故而害于民廓清頑隂使遂開霽吏敢不勉重為神羞春耕欲雨多則告病人既無厭神亦難應然念此邦倚神為命淫霖未巳隂沴日甚嘉種不蘖汨于深濘東作茍失曷為農慶日在甲子占匪休證驅斥雨師惟神之令有禱于兹神其來聽謝晴春霖太甚良農病之吏求于神日俟嘉應上勤宵旰徳音四馳曾不淹辰廓清氛翳回視四野物物昭蘇神實相唐功著千載燮調之妙又及我朝曰雨曰暘尚期終惠祈雨雪惟兹東嘉歳事屢愆神厚其賜書大有年農隙而旱敢瀆神聽泉竭麥枯人亦告病歳云暮矣煖然如春又恐疫癘重困吾民立雲滃興密雪交下益以霡霂潤及原野是在明神不勞餘力倘終芘之何以報徳謝雪冬温不雨為嗣歳憂致禱于神靈應如響微雪欲作先集于霰報神之賜庸有既乎發海舟郡祗天子命遣巨艦數十艘由海道以戍四明惟神廟食此邦靈應如響願隂相之俾往來鯨波如乗安流無有驚畏則所以報神者敢怠哉禳謝􅄓風三首永嘉災荒首尾十年今歳之稔近所無有時暘時雨神賜實宏秋霖未巳害我穡事積隂之久或致􅄓風窮民易驚愁嘆相屬垂成之賜惟神是依驅除雲師使見白日風伯退聽鳴條不聞倘終惠之其敢忘報魯有爰居止于東門展禽曰今其有災乎是歳也海多大風先事之占有可信者此邦歳苦􅄓風邦人畏甚春有飛雪以秋為期暑雨未休深恐馴致惟神靈響千里具依是用祗謁祠下豫罄丘禱曰暘曰雨神已佑之于前其終惠之汔我穡事吏實不肖無功于民神曷芘之隨禱輒應反風之感雖曰偶然如神之靈答貺昭甚震風凌雨一昔掃除祗謝祠庭其敢不恪龍女廟祈雨祝文二首旱潦有數天實爲之千里之潤神實司之歳以旱告将困吾民天高難諶用求于神幽蟄奮起霈然膏澤俾成豐年何以報徳靈貺在民廟食久矣靈雖不渝祠則甚圯旱禱未答或其在是吏職養民視飢猶已神相于幽休戚共只願噓立雲沛澤千里何以報神葺祠舊址丹青相輝棟宇豐侈神之聽之誓有如水二龍潭請聖水祝文歳以旱告靡神不舉百榖方仰于膏雨神龍猶卧于靈湫爰遣屬僚修郡故事仍将緇流諷唄致禱挹彼注兹雖曰聖水一勺之多賦靈于中端如泰山膚寸之潤三日之霖将于此乎求之神尚肯來慰此渇望迎四龍王行道祝文深山大澤是生神龍旱魃為灾迎之幽宫聖水一勺神在其中甘霖未施吏罔措躬旗旄幡幢往從紺容願驅妖沴回禄祝融願呼羣靈屏翳豐隆尊居黄堂指麾成功膏雨浪浪黍苖芃芃策勲而歸報神何窮巾子山龍潭請聖水祝文記曰天降時雨山川出雲然惟神龍所居則膚寸之雲雨輙應之郡苦亢旱祈禬之禮徧于羣神雲出相望膏澤禾下竊惟巾子山一郡之望真龍之所居也謹命縣大夫修敬靈湫勺聖水以伸誠禱願興雲霓沛以甘雨以慰渇想以蘇千里以示神應于無窮不其休哉九龍潭請聖水祝文神龍之居實為靈山旱憂吾民神不得閒從人之來奮起幽蟄來即公堂杯水可挹􅀇雲四興千畝含滋為此澤者非神而誰求之于初萬目所矚于以将之其敢不肅神乎既居願安幽宫節宣雨暘相予屢豐平水王禱旱祝文亢陽為虐方憂誠禱之未孚故老有言始悟靈神之在邇謂護國通天之號有濟民惠物之功比歳以來幽祠寖廢既上雨旁風之未免何西廂東序之足觀雖吏民已謹于祈禳而守宰久愆于禮敬旱既太甚咎或在兹聞之惕然其敢寜止爰陳菲奠來謁明靈伏願矜小己之寡聞憫斯人之無告沛乎百里之潤為之三日之霖誓率耄倪益謹牲牢之報且令棟宇聿觀輪奐之新郭先生廟祈雨祝文維兹斗城先生卜之厯千百年民用安之亢陽有禱神又聽之廟貌之崇後其圖之祭勾芒神祝文二首正月惟閏既望始春甘雨霢霂土膏墳興祀牛于門協氣是迎司我穡事惟帝與神歆此菲奠用介豐登維時發春盛徳在术帝實主之神實輔之迺祀土牛用介穡事其尚居歆以迄康年春賽諸廟祝文惟神功利及物廟食此邦維暮之春聿修歳祀涓辰致潔徼福于民神之聽之惠我無疆畢文簡公祠堂奉安祝文台州興國之初台爲王土擢公朝行首綰郡組宣暢皇風蠲除虐賦去厯華途爲公室輔遺愛一方美談千古君子人歟章聖天語迺昔尤侯建祠黌宇遺像未設闕典思舉傳之番易冠佩容與道貌睟然爭先快覩鑰去二百年叨繼前武敢曰尚友庶㡬趨步于以奠之掲示儀矩曰士曰民惟敬惟慕鄉校序拜奠謁祝文人代鄉先聖夫子于鄉恂恂爲先鄉人飲酒後杖者出正月之吉敬拜殿庭退序長幼仰遵聖訓兹與鄉人飲酒以齒謹以清酌薦籩式陳明獻兗國公惟公亞聖苦孔之卓非禮勿動不改其樂願言睎之敬拜于學兹與鄉人飲酒以齒釋菜于先聖謹以薦籩之禮配陳明祀鄒國公學以明倫孝悌具申徐行後長舜予何人鄉黨尚齒遺言是遵兹與鄉人飲酒以齒釋菜于先聖謹以薦籩之禮配陳明祀攻媿集巻八十二
