body:
  text: 宋樓鑰撰誌銘高端叔墓誌銘余與端叔游舊矣宦游契闊而情好愈篤蓋其清苦勤敏皆余所畏而與人薫然又不得而疎也投閒來歸攜變離騷一軸遺余曰試讀之當相與論其當余退而讀之擊歎其精深而悲其志方將與之痛飲而極論之而端叔已病病久而不可為精爽猶前日也一日遣女奴來手札炳然以所藏歐陽公爲進士時白襴及其史藁詩章見遺且曰吾將亡以此爲永好辭之又至未幾而亡矣寔慶元三年九月癸丑也往而哭之哀將葬其門人來告曰先生葬有日願得銘其墓余爲之泣曰嚮固嘗狀其先君之行今又忍銘端叔耶卒敘而銘之君姓高氏諱元之端叔其字也韓國武烈王曾孫曰士擥朝議大夫是爲君之曾祖祖公仔右宣教郎燕山府路宣撫使司主管機宜文字考世埴修職郎致仕母洪氏封孺人高氏家薊門五代之亂徙濠梁又徙亳是爲蒙城高氏後居京師建炎衣冠南渡修職始寓明州今曰慶元府著籍于鄞安貧而喜教子君性穎悟絶人勤篤亦絶人居近市獨處赭山蕭寺顧無書得易一編晝夜誦不輟遂曉大㫖鄰士異焉稍借以書君下意質疑謹聽强記執禮甚恭人亦樂告之饑寒寥落辛苦萬狀人或厭且怒至排擯不容瀕死者屢矣而志愈厲夜依佛燈寒擁敗楮或數月不盥櫛由是博通經史諸子百家之書少未知名屯田郎三山鄭公鍔一見竒之俾訓其子鄭公為鄞士師表人以此加敬始寖得束修以奉親旦力于學今漳州使君傅公伯成為教授折節定交不以諸生遇之由是門人益衆殆數百人少讀襄陵許公翰書及從沙隨程公迥故尤邃于春秋博采諸儒所長搜抉無遺聞人有書曾不憚遠裹糧徒步而求之前後凡三百餘家訂其指歸刪其不合者㑹稡為一書間出己意號義宗蓋十餘年而後成晚多所更定專務明經自三傳而下不盡以為可吾鄉及旁郡之為春秋者多出君之門或其門人之弟子也嘗病學者不務下學上達驟而求之太高故自天文地理稗官小説隂陽方技種藝之書靡不究極雖庸人一技可取亦盡禮問焉佛氏大藏經五千卷讀之再過他可知也含英咀華以昌其文困阨多故其思苦憤悱極故其得深真有劌目鉥心穿天出月之工既乃日造平淡以幾于古作詩數萬存不能什一自謂樂府不媿前作嘗謂離騷之學幾亡矣為之九篇曰愍畸志曰臣薄才曰惜來日曰感囘波曰力敶曰危衷曰悲嬋娟曰古誦曰繹思深得三閭大夫㫖意且曰變離騷者沿流于千載之後而探端于千載之前非變而求異于騷所以極其志之所歸引而達于理義之衷以障隄于隤波之不反者也又日班固揚雄王逸劉勰顔之推揚之者或過其實抑之者多損其真宋玉賈誼東方朔嚴忌淮南小山王襃劉向之徒皆悲原意各有纂著大抵紬續緒言相與詹詠而已原之微㫖不能有所建明噫君以為騷人之本意將亡君之意又將誰明之耶性嗜書家藏數千卷手自㸃勘寶之如珠玉遇所未見解衣輟餐不計其直又好周人之急有古人内溝之心田不滿半頃或割十畮以遺親黨事父母盡孝浣濯炊爨必身親之初入郡庠一羮胾必以奉甘㫖而食淡自如人設異饌不敢嘗必歸以遺親平居無疾言遽色彊力而忍訽薄之以患難而不可奪教導生徒勤慤盡誠如訓己子貧者致貨財則卻之而訓愈力有念其孤苦衣食教誨卒名于鄉君無德色也婺士柳義老于逆旅君哀其窮率鄉人供給之死為之棺斂至殯于家皆人所難乾道四年薦于鄉淳熙改元又為第一凡五上春官卒不第僅得因慶霈以榮其親去年當受特恩不就年纔五十有六而卒疾既革不食者月餘自分必死卻葯屏醫而處之怡然區處身後事纖悉無遺獨以不得終養母氏為痛修職葬奉化之察亷岡力疾作書以母氏他日事屬其門人屠君槐以其居近察亷也且為書以别親舊君子曰終豈不信哉豈不哀哉娶朱氏里士友聞之女先三年卒子男三人子高子亯子文一女淑尚幼家貧無以葬門人相與經紀其家以十二月甲申葬君于桃源鄉蔣山新盛隩之原始修職生名門實為殿撰睢陽劉公棐之甥君學問固有自來蚤受知于殿撰從子侍郎孝韙周公侍郎綰周公年八十有二為君記謙齋稱君之刻苦雖聚螢積雪和膽刺股不能過也屬文贍蔚咄咄逼人學益富文益進行益修此其志欲立于萬人之上而以謙名齋可謂有志之士矣客游括蒼吏部何公偁風裁最高愛君之才教以詩律其子參政公遇君尤厚至今不衰也禮部㑹稽陸公游文章少所許可以詩人稱君君又好前輩遺墨故物對之則起敬如見其人得之則喜而不寐以遺余者一二也老校退卒與之語中原及兵家事抵掌忼慨有封狼居胥之志故論兵法尤精或得其一䇿以干時宰諸公為之驚歎使得少分自見且將著于事業而坎壈終身不得一官以死豈非命耶義宗百五十卷又有易論詩説論語傳後漢厯志解各一卷揚子發揮三卷詩三千雜著五百號荼甘甲乙藁藏于家嘗結廬察廉在大小萬竹之間著萬竹先生傳自言為人達生任性不拘拘儒者之節好學而未至于道好文而不中繩墨好閒而刳心干古澹苦吟而不能自已鄉評亦謂君有不可曉者三貧而疎財貎古氣嚴而樂易已甚衣冠垢敝望之如木雞而胸次灑落綽有晉韻知君者以為然銘曰君之生兮何為君之往兮何之學窮百氏兮五上而空歸蓄書萬卷兮竟死而何裨天不可問兮吾將誰訴君視如歸兮吾又何悲志在乎魯史之義宗文存乎楚人之騷詞噫後有欲知萬竹先生者其視諸斯工部郎中曹公墓誌銘尚書代汪公諱耜字仲本姓曹氏世為開封府祥符縣人曾祖之器宣義郎祖組由太學登宣和三年進士第晚因郊祀進祥光賦徽宗稱賞召試中書省換授武階兼閤職仍給事殿中仕至道州刺史有箕潁集叅政謝公克家為之序父勛得世父官厯事四朝為昭信軍節度使開府儀同三司累贈太師諡忠靖三代皆贈至太師宣義為嘉國公道州為魏國公忠靖之亡也高宗皇帝在德壽宫悼念平昔賜以宸翰具言其嘗從徽廟北狩親被密㫖持御札御衣以歸俾予繼統且達二后書信請梓宫太后之還盟烏珠而卻其師术今改後同案烏珠舊作兀使逆亮而得其情且曰終始一節夷險不渝厚其賻贈之禮因疏行事大概賜其後且見予不忘之懐搢紳讀之無不感歎以為君臣之際古所未有也公為忠靖仲子幼而敏慧孝謹好學屬文忠靖尤愛之紹興十九年忠靖為保信軍承宣使以郊恩奏補成忠郎二十六年添差幹辦翰林司二十九年忠靖北使適當危疑之時高宗念其忠勤無以示寵遇之意乃召公赴中書後省試䇿深喜其才特改授右承奉郎差充奉使大金國信所親屬十月充顯仁皇后􅓖宫總䕶使司幹辦公事三十年幹辦行在諸司審計司三十二年除軍器監主簿隆興元年知大宗正丞二年遷宗正丞乾道二年以便親主管台州崇道觀四年差通判紹興府五年除太府寺丞俱不赴添差通判明州公未嘗厯州縣而曉暢吏事通練人情如素宦者時嗣秀王出鎮多以郡事委之公亦盡心禆贊相得甚歡八年太上皇帝時以皇太子尹京妙選寮宷除公臨安府推官尤被眷奬未幾隨府罷出知嚴州年未四十初試畿輔為治得寛嚴之中吏民安之尚書張公枃亦以妙年為别駕俱敏于政庭無留事至今相與如兄弟然錢塘江岸為風濤所壊大興工役公進錢萬緡石版五千片以佐其費朝廷嘉其不擾而事辦特轉一官以寵之淳熙元年秋丁忠靖憂執喪盡禮號慕毁瘠聞者稱美始忠靖既奉梓宫太后以歸功高眷渥見忌于權臣因丐外祠卜居天台至是奉喪歸葬遂為台人四年起知徽州到官尤篤意民事剖決滯訟皆得其平山城民生甚艱下至薪炭㣲物必竭力而後得之公知其然因細民負重至城而不能售遂以官錢居之以俟嚴冬用元價以應民之須初非有規利之心故人皆感其惠因此乃反致繁言江東大饑公拊摩如不及荒政備舉而百姓終以艱食未免流移孝宗皇帝深軫疲甿令言者以徽饒二州流民獨多謂不峻其罰則無以勵方國遂與饒守俱鐫三秩停任于是列郡聳然民益受賜公退而安之不敢自辯尋主管建寧府武夷山沖佑觀十三年差知衡州十六年冬陛辭奏事太上一見曰此吾尹京時賢寮也問勞甚寵留為尚書司封郎官以職兼司勲避父嫌名改工部郎中既出親擢朝士不知所自或告之故且曰曹工部宦逹最久今日卿相在小官或布衣時已嘗丞宗正矣公以故家子雍容省戸言議文采豐蔚可觀人始翕然稱之謂其宜有以得此也紹熙改元夏上章求外補差知常州未赴以論罷明年復任沖佑慶元元年差知蘄州待次里第三年閏六月乙未卒于正寢享年六十有一積官至中奉大夫祥符縣開國男食邑三百户服四品娶洪氏吏部尚書擬之孫通判明州光祖之女封令人子男二人恕承奉郎志忠翊郎改奏授迪功郎處州松陽縣主簿俱先卒孫一人復將以遺澤補官是歲八月丙申葬公于臨海縣靖安鄉小石保之原忠靖奉佛老甚謹即小石建精舍以延往來公奉先志又加葺焉先一年自營夀藏于其側從新卜也公生長富貴而以儒素自將幼少無驕矜之色忠靖出入禁中手擅筆墨而謹畏無比有萬石君之風避遠權勢辭謝寵榮高宗知公為愛子又閲其詩文故擢之朝列後受知于太上進登郎省然三十年更厯内外才不見于施用迄止于此非命也耶忠靖樂桐柏山水築庵于西偏高宗書沖嗇二字榜之傍有雲壑尤勝公閒居日久增飾其舊徜徉于中意度蕭散不復嬰拂世故獨好以餘財為鄉曲義事為邑中建西橋甃通途榖貴則損其直以平市價雪寒則散所積以賑貧民死喪者助以棺斂逆旅者濟其空乏野有暴骸為之焚瘞建佑聖殿于松隠山為一方祈福之地水旱為沴必齋戒躬禱多獲嘉應自邑入郛有三渡之險為置大舟以濟不通民户無擾邑人德之故死之日士夫相率致祭厯言其事鄉閭無不嗟痛嘗過越上見茶園路僻雨濘則不可行又天姥一嶺尤巉巖難進皆捐金平治加之以石為利大矣官至六品賞延未及其子先以奏弟之子怤今為奉化縣尉宗族親黨倚以自給者甚衆風誼出于天性非勉强為之者達于時變自以再世由文華際遇累朝亦欲以此自見既不得與寒畯爭執每遇吏事必疚心圖之觀其所已見者如此使得盡其才設施必有過人者既感疾卻葯弗進嘿無一語及家事恬然而化又可知其所存矣修謹潔亷仕途略無玷闕新安雖坐嚴譴無有為之明白者及得毘陵言者止謂引疾丐去不應治劇當别與閒地然其中却稱在徽之政捄荒自有條理而人或咎其有膏粱之習夷攷其迹乃大不然罷非其罪人多冤之由是知人有善可稱者公論自不能掩也噫公今亦可以無恨矣某女弟為洪文憲公孫婦與公有連又素相好也公之將葬復在齠齔奉祖母洪氏之命求銘余既哀公之不究于用子皆蚤世不得詳載行事姑掇其家所録參以平日見聞者為敘而銘之銘曰有周振鐸始封于曹參起相漢至當塗高中更累代達者蓋鮮惟我國初武惠最顯猗歟太皇門多侯王公家晚著奮于潁昌曰文曰章名馳宣政忠靖繼起閥閲益盛公實鍾愛克世其家蚤登三丞荏苒歲華受知太上始在郎列卒不得施蘭摧玉折二州遺愛一鄉隂功孤孫秀潁其報必豐天台赤城父子仙去我惟銘之以詔不腐孺人俞氏墓誌銘紹熙四年余為殿廬諸位官臚唱之日掌以甲乙科號名奏御時前五名婺人居其四君相以下皆動色以為一郡之盛喬君行簡則第五人也余從父弟鏞嘗與喬君兄弟同研席又與行簡為同年生同以表牋事人期集所時相與見過故與喬君尤稔慶元改元余既丐外得婺而歸喬君有書介鏞以來則知去載季冬之癸酉遭其母太孺人俞氏之艱矣未幾又以教授李君誠之所爲太孺人行狀至且曰行簡不孝不得以一日之禄奉吾母菽水願求銘以賁九京余哀其言又知李君非溢美者遂摭其實而書之太孺人世家東陽曾大父羲大父咨益父嗣囘年二十嫁同邑喬居士森時舅姑已歿恨不逮事事其神主于正寢如生問其平生所嗜如古人所謂昌歜羊棗者歲時祭祀必供焉見親黨之事舅姑者每加羨慕且曰宜善事之吾不及盡此禮矣治家嚴整内外肅然自奉甚薄時儲酒肴以待居士之須賓至則奔走治具晤言燕語必以善道有犯者諭居士以不爭居士深于黄帝岐伯之書鄉有病者多即之頗厭其繁必勉之曰是可以濟人不務規利何厭也由是所活滋多比鄰以室廬求售成劵已久忽欲復取人皆難之則贊其夫曰法不可復取矣然彼戀故棲而我必取之則非所安也居士即還之其人感悦終身居士憂二妹之嫠而貧孺人慨然曰吾未有以報舅姑況君之同氣忍坐觀其失所耶併其子挈以歸撫養皆有恩意有子不責以營生惟勉之學里巷舊無學者喬氏獨闢家塾延師儒以為之倡逺來者館榖之􅁌誦日相聞助成居士之羙皆此類也寡居之後身任家事一毫不以累諸子子嘗手揣輕重曰是猶足存耶既不得求師四方則合鄉之秀士相勵以學業當論文時往往立屏間傾聽記其要處退必詢究之不㑹于中不已也故士亦樂與其子游升堂進拜禮如家人春秋寖高子屢舉不得志念無以慰母心則諭之曰吾欲汝為善士豈求必于進取乎行簡以上第歸鄉曲歆豔孺人視之淡然徐省其私持身益謹不以驕人始為之喜及屬疾既革則又曰吾生于宣和之三年至此不為不壽汝曹第求自見于世以顯其親禄養不及吾無憾焉人以是知孺人之教子眞有義方非夫慕富貴以為悦者也子三人長德佐先三年卒次子驤業儒幼即行簡也從事郎饒州州學教授女二人長適王元諭次適杜之琮孫男三人從龍次龍元龍女六人尚幼先是長子既喪孺人于婦孫慈愛有加至是冡婦鄭氏以毁卒亦可以知婦姑之間矣十一月丙申將合葬孺人于居士之墓孺人嘗該慈福慶壽恩故得封云銘曰柔而寡識閨門則均愛而失教婦人之仁猗歟夫人乃異于是以義相夫以學教子子登甲科喜猶未深察其所安始慰于心壼彞之懿莫此為盛我銘諸幽尚篤餘慶趙明道墓誌銘慶元二年趙共甫自丹丘來主鄞簿粹然佳士也已而其長兄見過晜仲俱賢意源流必有自一日共甫為余雪涕言曰先君之葬三十餘年矣既不及銘願有以表墓道庶幾有傳焉以贖不孝之罪且以行實來余悲其意矧共甫之言篤實必無溢美為次而書之昌陵皇子燕懿王德昭生彰化軍節度使舒國公惟忠舒國生定州觀察使博陵侯從實博陵生保康軍節度使開府儀同三司房國公世彊是為公之曾祖房國生皇兄昭慶軍節度使安康郡公令磾是為祖武德郎子祐公之父也武德南渡轉徙久之始寓于台公諱伯直字明道建炎二年三月詔宗室羣試于有司特授承節郎累轉至訓武郎初監南劍州沙縣鹽税厯台州黄巖縣酒税明州奉化縣税婺州兵馬監押以親老不赴三任嶽祠再調贑州興化軍兵馬監押明州兵馬都監又以外艱不赴遂主管台州崇道觀乾道三年八月辛丑以疾終于家享年六十有五十有一月丙寅葬于臨海縣大固鄉蔡嶺之原去武德墓西少南三十步娶程氏以紹興二十一年五月庚子朔卒殯于白龍潭之精舍至是合焉四男子師紘今為忠訓郎添差充潭州排岸次師泉亡矣次師絳保義郎添差監婺州都税務次師䢼修職郎共甫也各以科目進二女長適修武郎李蒙次適成忠郎張萬孫男九人希魚希珉希賀希淵希魯希瑀希韺希韶希梴女十人公生承平時習見富貴而天資端靜莊謹自將長好儒學善屬文治尚書博觀史傳尤習知國朝憲章性至孝兵燬流離事親就養無闕武德晚嬰末疾葯必先嘗而進十餘年如一日居喪毁瘠兄弟和樂無間言介不絶物和不同流聞善則勇于必爲見惡則避之若將浼焉居無縁飾動有典刑雖退然若不勝衣言如不出諸口至是非利害剖決明辨人以爲不可及横逆或加未嘗校也蓋其質本夙成而厯世故蹈艱險困心衡慮多識前言往行故能躬行如此居官廉恪御下多得其心在章貢日羣卒忽擁門告曰軍且變恐併害公盡徙公家出城而後去公始諭之不從乃㣲服間道以入迨羣集郡庭則公從中出衆愕相顧因開譬禍福羅拜聽命事遂息公雖不自言而郡人甚德之自奉雖薄而豐于祭祀教子嚴篤觀其義方之訓可知仲弟早世公善撫其孤卒使有成有子師酇今為承節郎公恬于利禄北客之同寓居者如參政賀公錢公皆欲力挽其進公謝曰國家多難大父而上陪葬山陵悉淪異域痛心北望不如無生禄仕實非素志家貧親老無以為養故未能自已而暇求榮耶二公皆愴其言不欲强也晚號老圃每愛歐陽公吾欲四時攜酒去莫教一日不花開之句負郭卜居手種花卉時節互秀無日不徜徉其中帶月荷鋤臨風曵杖㣲吟舒嘯自適其適既不事生産禄又不足代耕因以别畦蓺蔬日鬻以助用安分自足與物無競超然獨樂以終此生嗚呼賢哉使其得試于用其志決不在富貴而已惜其終不少見于世然胸次夷曠無毫髮怨尤形于詞色識者可以見其所存矣余以淳熙五年贅倅丹丘一介之善多與之接聞公之風已後之矣幸因其子之請得為公銘姑以致尊慕之意云銘曰王孫翩翩舊聞其賢篤學自立詞采燦然孝以事親欽以奉先半生漫仕樂以窮年教子義方科目相傳定交令子獲聆緒言老圃之適吾將學焉為發幽光見此銘鐫奉議郎黄君墓誌銘君諱仁儉字約之姓黄氏本出建寧浦城谿東之族慶厯皇祐間高祖銀青仕于中原因家于陳之宛丘曾祖好謙朝散郎知潁州贈通議大夫祖宰承事郎特贈直秘閣累贈金紫光禄大夫父子游朝請大夫以君升朝贈奉直大夫母武氏贈恭人紹興初奉直自度支郎出守台州遂居明之奉化縣十三年之任補將仕郎次年監潭州南嶽廟次調嚴州淳安縣主簿秩滿以奉直年高不敢去左右再奉祠未幾遭外艱服除監台州支鹽倉厯處州青田縣紹興府餘姚縣丞綱賞循從政郎孝宗覃恩循文林郎高宗慶典循儒林郎引年致仕授通直郎賜緋衣銀魚今上登極轉奉議郎慶元二年四月丙子卒于黄巖長子官舍享年八十有三娶高氏建昌軍通判公惕之女后族也先四十一年卒再娶陸氏處州通判康民之女實左丞諸孫先八年卒皆贈孺人子三人直行迪功郎監台州黄巖縣鹽監管押袋鹽次直古早卒次直義女二人長未行而亡次適進士陳經孫男三人正蒙正需正師女四人長許適進士鄭樞君先葬高氏于縣之寶化山又自卜壽藏于禽孝鄉車盤隩之原既葬陸氏今諸孤以十二月庚申奉君之喪合陸氏之墓君家世多名德性警悟長于記問史記兩漢杜詩韓文黙誦連數百言無遺忘及見前輩逮事直閣公典刑具存多記承平舊事談之纚纚不倦内明而行以至誠不事外飾居家孝友端愿絶口不言人過有德于人亦不道也確守官箴亷勤自將不爲矯激沽名事韜晦恬淡不與物競人莫窺其際淳安俗獷悍競渡多致殺傷尉懼而在告君攝事處之以術帖然不譁邑人謂未有也嚴歲取米數萬斛于婺多不得全數君被漕檄受米于蘭溪去取以公吏不能欺婺既如約嚴乃得實用焉在台攝郡幕給軍衣有紕薄者羣卒掉臂忿怨坐上倉惶失措君徐呼其長諭以禍福羅拜曰黄佛子有言安敢不聽汔事肅然邑隸縱􅅦貨受賕不盈尺而法當流君攝法官曰法重情輕可從輕乎吏以為不可君曰法本忠恕非爾所知請于守詹公儀之卒如君議赴青田日道由縉雲今樞密葉公自户簉居喪一見道舊久之且曰青田鐵阬錢多以促辦害民今得長者為丞民其少蘇乎君期㑹寛而信課反盈于舊永嘉遣海舟詣軍前既籍篙師為兵乞取家屬樞密院下其事帥司檄君覈實小人憑勢妄指怨家妻女以為其家人君悉究其實吏曰此軍事恐有不可測者君曰如此何名覈實彼豈不能徑取之不為動人多懷其德始奉直公間闗南渡聚族頗衆身任其責君又從旁經紀之宦既不達家道益困未嘗問也先世與二蘇公為同年且通婚姻書尺甚多兵火之後所存無幾君力貧悉刻之石君書法甚精源流二王而遒勁似歐率更至老不衰在黄巖年餘真草行書幾滿屋壁見者驚歎臨終初無疾苦對客歌笑如平時少焉就寢則已逝矣豈非善人君子之報乎鑰妻祖尚書王公舊居宛丘娶君之祖姑奉川又為同郡識君諸父及昆仲甚稔二子求銘銘曰中原故家存者無幾典刑尚在言議可紀惟君壽考龎眉兒齒上接前輩終殿餘子舊事厯厯及聞正始靈光獨存今焉已矣吉德之報手足為啟後其昌兮勒銘千祀周伯濟墓誌銘周氏為鄞聞族始慶厯中殿中丞造以進士起家是生三子曰處厚温厚師厚伯季俱躡世科仲亦以特恩入官父子兄弟皆以儒奮家聲卓然伯知建州永州季為荆湖兩路轉運判官終左朝散郎累贈銀青光禄大夫娶范氏文正公之女二子皆有俊聲鍔登元豐二年第以宏才直節有志當世坐黨籍仕至左中大夫知南雄州而止公論歎息銖登崇寧二年第仕為邑令小不合棄官而歸鄉里尤高之中大夫長子沖任右迪功郎監潭州南嶽廟憂患之餘又更建炎兵燬慕叔父之節不復仕進優游終身蓋自崇寧至淳煕相去八十有七年歲在屠維作噩有􅂱薦于鄉焯薦于漕臺紹熙改元焯遂登第鑰時待罪朝行問之鄉人曰此周伯濟之二子監嶽之孫也淮周氏名士繼出仕不甚達而多以退為高中大夫望最偉而不究于用伯濟守家法有隠德不務進取鄉人亦罕識其靣故其二子能振發如許鑰晚出及拜監嶽下風而隨侍游宦在都下嘗見其二子而聞伯濟之賢獨未之識既而奉祠里居慶元四年二月壬申聞伯濟之亡因往弔之二子一日率諸季泣以請曰先君雖不及定交而託契已數世先君嘗卜通逺鄉金谷里銀山之原去祖塋二里而近將以九月丙午襄大事願有以銘君諱楫伯濟其字也莊重剛簡幼不喜嬉戲從濟南劉壽夫學凜如成人扃户誦書率至夜分家人不得而入抄書用楷法既冠一舉不售即棄舉子業而耽翫書史以詩自娯好讀杜工部韋蘇州詩至忘寢食故下筆有二公之風對客清談無一語及名利事監嶽燕居好客日與賢士夫從容觴豆君無兼侍奉承惟謹朝廷搜訪黨籍之後欲加録用清敏豐公少尹夏公之家皆以此登仕版君為中大夫適長孫郡上于朝未報連遭内外艱遂不以介意又不事生産奉祀之餘僅取自給田有逋租未嘗訟于官公賦則先期而輸間至質貸了無愠色寡言若訥不為諂諛克勤小物憂深慮逺舉足如蹈規矩遇人無少長與之均禮真有不欺闇室之意教子甚篤每以門户之重訓飭之且曰吾家以清白相傳使汝輩能自奮勵貧非所患也延禮師儒意不少懈躬自督課始終如一鄉校月書季攷焯焯屢占前列君曰吾方以此卜汝之進否投卷必以實年兩際慶霈㷆年不及或為惜之君更喜其不欺焯拜恩以歸賀客滿門君以為幸不失舊物繼此有望矣亦不見其甚喜也焯之官請君御安輿以行曰吾方蕭散物外寧能閉置車中自為局促耶晚益杜門簡出入絶嗜好薄滋味康强少疾不近葯石先一年忽以脾疾不喜食他皆如平時歲除祀先不改其度正旦㣲覺困憊疾遽侵矣諸子日奉毉禬不效竟卒于家享年七十善人云亡識與不識相與嗟悼是宜銘矣娶林氏子男九人煇􅂱焯煥㷆炤煜煒燀長子及炤煜早卒焯迪功郎台州臨海縣尉女三人壻孫輈劉佃紀橒皆里士孫二人塤坦女四人在室銘曰周為名門中有人豪世以學為業而仕以退為高猗歟夫君閲世滔滔哦詩擁書隠居以自遨有子克家為時髦君則已矣後其有遭乎知江州汪公墓誌銘外祖少師生于熙寧十年後自太府少卿爲兩浙轉運副使年六十一季舅始生年丁巳時庚申皆與少師同深異之母氏歸寧亦以是年生鑰又長于外家與季舅丱角嬉戲少長同研席年十三同冠而公已受世賞周旋二十餘年相與不翅如同氣中雖游宦南北見輒傾倒對酒劇談幾忘輩行不謂去歲一别遂成千古每拜繐帷哭之未嘗不盡哀也將葬内弟求銘何忍銘吾季舅又何敢不銘公諱大定字季應世為鄞人曾祖元吉有隠德于鄉祖洙為鄉先生以特恩補官贈正奉大夫父思温左朝議大夫直顯謨閣贈少師母王氏封恭人贈越國夫人所生母沈氏贈宜人公性開爽宏達了無城府十四歲遭越國憂伯仲二舅未及歸弔客盈門公哀毁擗踊如成人受弔盡禮宗黨稱之少師撫愛尤篤甫冠又丁外艱服除授右迪功郎特監潭州南嶽廟未幾沈宜人下世隆興二年差兩浙西路安撫使幹辦公事未赴省罷監行在排岸司乾道五年就充賀金國正旦國信所官屬六年任滿七年以奉使賞循文林郎監鎮江府􅅦貨務都茶場請兩浙轉運司文解九年到任務場歲課三百萬公平時不屑㑹計至是躬親簡書乃以増羨受賞獨厚淳熙元年循承直郎四年改通直郎知紹興府上虞縣以賞典用新制對實歴凡十年至朝請郎公在上虞政務平易吏民相安事日以理邑有寓公吏部豐公誼左司潘公畤皆清介之士相與如平生觀魏王薨于四明將葬于越詔遣刑部尚書謝公廓然運副韓公彦質䕶喪使者旁午州縣震動官吏股栗他邑不過供頓之勞惟上虞通明一堰最為高峻潮汐雖登僅過數舟則已涸矣公相視地形復興舊閘増浚渣湖别于支港創小堰以通餘舟募游手二百人别以旗色分列左右俟大舟入閘立柵既定引湖水灌之水溢堰平衆力掖喪舟以進略無欹側舳艫相銜序進而不譁俄頃俱濟二公驚歎稱不容口至邑復見館舍三十餘區一一整辦器用精明帟幕華煥祭饌頓食尤為珍腆上下翕然迨至府中貽書求假供張之具公又擇新潔者七十襲以應之二公既歸言于廟堂諸公以為一路之最故公之才益顯贊府嘗以縣録事小忤其意不以闗白徑杖之吏來謝且訴公曰本縣丞何為不可撻汝輩尚敢訴耶更加懲治丞始媿服聞者以公為善處事也九年郊祀大禮恩賜緋衣銀魚通判揚州大鄉趙公子濛為帥政事嚴明公謹事之而從容忠告開心相與禆贊為多間遇其怒徐而解之終為之平僚屬恃公以無恐久而相知益深移憲浙右握手惜别時人兩賢之税契一司有所謂導行費者吏引例以啗公公正色卻之曰我知勾攷簿書盡吾職而已他日代者以此得譴獄吏推尋根源公汔無一毫之累漕司交歲幣于金遴選其人命公與幹官權公安節俱行敵貪而愎齟齬萬狀至欲易白金四之一濡滯踰期雖已過淮北使者辭疾不出一日與權公誓曰今日不決斷不可空囘于是襆被為留宿計始相感歎遣人遜謝不待有請而事畢漕使以聞權公以是進擢公不自言也知韶州郡計惟仰諸邑常賦而令多攝官去來不一幾不可攷究舊者未足新者復積計逋緡錢三萬公曰民貧可重困耶徒費文移且以飽吏貪爾盡蠲舊負惟新是圖五邑欣然承命民亦樂輸焉舊有漏澤園在光運寺之側其廢已久遺骸多貯以瓶罌垂之梁間纍纍無數公因勞農見之其間亦有游宦不能歸者惻然興念而未有以充費㑹曲江尉許君教老無妻子卒于官下公既為之經紀葬送篋中尚餘數百千公悉舉以辦役掩骼埋胔各得其所曰以此為許君植福勝于他用逺矣邦人尤德之幕官陳光祖為之記甚詳經畧趙公彦操漕使黄公掄倉使呉公昭夫各以所知薦漕又與憲車李公信甫倉使趙公不迂列于朝其畧言以寛得衆行簡臨民勤儉公亷慈祥愷悌庶幾古循吏之風代還朝廷用諸司薦書而嘉其才遂除知江州江素號名郡訟簡財裕可以卧治及公之至大異故時帑藏不盈萬緡而負諸司之錢幾二十萬官兵俸給亦積至萬五千公為之矍然日與同寮圖之蓋征賦既弗辦而游士耗之又特甚公曰浚民膏血而使往來者挹取之以邀虛譽吾不忍為也㑹有㫖申游謁之禁公奉行尤嚴凡有挾而來者止以尊酒謝遣之或恐由此起謗公不為動剔蠧剗弊謹朱墨節浮費飾廚傳稱過使客之事一切畧去屬邑舊逋蠲貸之如曲江不三數月而用粗足補解諸司十七萬緡吏俸亦以次支行民不加賦益安公之政而不得志者萋斐寖成矣公竟以此罷歸郡人冤之相與語曰不知誰為飛語厚誣吾賢侯耶有曹官坐侵用郡帑吏乘為姦既下有司公曲為保全姑與易地以息衆譁彼更以為怨鼓倡游言巧為隂中人尤為不平二倅張君泌陳君邕總幹王君興翁皆一時名士情交意浹驩然莫逆有頼叶濟數月政成公退觴詠相樂前此未有惜公之歸尤眷眷不忍别二郡皆有大兵屯駐待軍帥一以誠意敬公亦有加焉士卒有犯結證明白送軍中使自懲戒了無間言兩造至庭究問詳盡俟其首服多歸于恕惟姦惡盜竊之徒治必盡法爲之屏跡則又仁者之勇也水旱有禱隨輒響應舊祭社多委寮吏代行寖以弗䖍公曰社稷重事豈可憚勞乃躬修祠禮貳車有詩曰九江代拜嗟從昔五馬親祠始自今公自以由支郡升巨鎭荷朝家選委之重洗手奉職罙自奮厲又素著廉潔而横遭口語皆出風聞不能無怏怏去郡尚無他重罹風雪之苦將次池陽忽得㣲疾一昔歿于舟中寔慶元四年正月丙辰也嗚呼痛哉享年六十有二官朝請大夫娶陸氏故發運使寘之女明慧勤約内助甚飭相夫教子俱有可稱先二十六年卒贈宜人子男五人敏中從事郎撫州軍事推官教中將受公遺澤餘幼亡女八人其三亦先卒一適陸森宜人弟之子其次迪功郎監鎮江府延陵鎮趙希一從事郎台州臨海縣丞趙師侊里士黄沐皆壻也一尚幼孫男一人之綱迪功郎臨安府富陽縣主簿始宜人葬于慈溪縣石臺鄉龍潭之原敏中等將以十二月壬申奉公之喪合焉公之處家居鄉出而從宦表裏如一明白空洞不問大小待之鈞禮故所至與人無所怨惡檢身謹密杜門省事又不治生産了無贏餘婚嫁交迫俸入縁手而盡處故廬西偏欲少增闢竟莫之遂外家友恭之名聞于時仲舅尚書任兄弟之子猶子也叔舅運幹蚤世澤不及子公奏闡中以官其篤于友愛有父兄之風焉訃音至鄉親故無不隕涕母氏洎仲舅皆以高年見公之亡傷悼尤甚公素少疾持心近厚孰謂其止于此耶公洊以臨遣奏事上動兩朝之聽其一論韶州岑水場兵匠之弊甚悉謂諸路配隸之餘選以應役或聚而為盜害及一方若從爐户之便添認銅額可省廩給之費其到場及四年者照舊格給據縱遣餘人以次歸元配州軍實逺方經久之利敢書大概庶幾後人或有取于斯銘曰猗歟汪氏積德數世先生淳篤文行兼備少師起家深仁厚義舅承其傳慈祥愷悌載擁州麾仕非不遂胡嗇其年歿而齎志公之為政慕古循吏害公客耶亦命之制龍潭之原往從伉儷有銜不袪慶在來裔攻媿集卷一百三
