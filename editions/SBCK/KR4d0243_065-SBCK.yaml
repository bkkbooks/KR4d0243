body:
  text: 宋樓鑰撰啟代通王明州佐啟恭審光膺一札移鎮四明加延閣之清華示雄藩之風采自聞成命已播先聲恭惟某官學造聖涯行為世表韋編竹簡讀殘萬卷之書玉斚瓊彛壓倒千人之筆才出于天人䇿上名冠于龍虎榜中蓮幕掄才未舒婉婉之畫蘭臺選士已聞衮衮之登立螭陛以書言接鵷行而布武俄分郡寄遠暢王靈以黄霸神明止著循良之譽雖子游文學無關政事之科未有以千載之通材兼一時之要任直節在庭臣之右治最為天下之先飽聞兩地之生靈自樂二天之庇䕃惟時鄞水實近行都海匝三埀地綿千里清朝偃武久無烽火之驚潢池弄兵或恃風波之險近禦狗偷之盗遠防虎視之隣必欲得第一流以之為二千石忽聞鳯詔更畀菟符宿姦甚落膽之憂罷俗有息肩之望帡幪伊邇桑梓知歸便道過家大似衣買臣之錦近臣還闕豈惟得子敬之氈行據要津以前大用某夙蒙異顧近别台躔豈知閒冷之身復拜熒煌之座曽是堂前之燕知故壘之可依自憐屋上之烏因丈人而亦好代通福州陳丞相俊卿啟上公分陜聿嚴帥閫之雄寒士依劉叨處貳車之任爰通名于下執喜託跡于洪鈞恭惟某官百代偉人兩朝元老負特立獨行之氣堅任重道遠之心奥學淵源根六經而排百氏忠誠挺特貫三光而洞九泉當天開地闢之秋遇雷厲風飛之主臣作股肱耳目備宣輔贊之宜爾為麴糵鹽梅尤著燮調之效維持國是進退人才士夫喜公議之有歸中外知王化之將復功成而退道大不容麾分十國之連地控七閩之要故鄉在望何殊朱買臣衣錦之榮盛徳若虛肯為蘇季子佩印之樂經綸未究威望益隆公尚居東行見衮衣之復席方虚左重膺玉鉉之求某學術荒疎性資凡下遲頓不能以及事容貌不足以動人良弓之子必為箕粗守傳家之舊吹竽之門而攻瑟自憐應世之乖念平生願上于膺門而今日得游于儉府趨風伊邇撫已知榮駑馬加鞭倘緩一時之驅䇿頑金躍冶尚希他日之陶鎔潭府靖深暑風清潤願體冕旒之眷茂加茵鼎之調代謝葉丞相衡奏門客恩澤啟孤蹤何取妄干鳯閣之元臣洪造不遺俾預龍門之下客生成有自感戴惟深伏念某一介寒儒半生苦學蹉跎場屋徒堅鐡硯之心荏苒嵗時有愧青箱之業家惟四壁之徒立野無二頃之可耕重念嚴君久為漫仕心勞王事嘗抗塵于三紀之間位亞郎曹竟賚恨于九泉之下弟兄孱弱門户羇單記先友于碑隂孰是金蘭之舊候舍人于門外頓驚霄壤之殊敢期當路之知不忍向隅之泣念子路為曽參所畏固知事契之深有山公則嵇紹不孤尤覺義風之厚假以手援之力開其寸進之階是何遭逄獲此成就茲蓋伏遇某官夙髙耆望光輔昌辰雷厲風飛君臣相遇于千載天開地闢日月可冀于中興方將任使于賢能顧豈遺忘于微賤至而不肖亦使有成某敢不俯激懦衷仰酬恩紀便當銜袖以上先壟且將藉手以戰文場黄壤有知豈無結草之報青氈如在敢忘推轂之私代通薛通判鳯啟庠校師儒兩著佐州之效塵埃俗吏方為學邑之行獲在下風豈勝幸㑹恭惟某官性資沖静經學通明文字五千􅄅波瀾于筆下雲夢八九忘芥蔕于胸中早収俊造之科徑躡清華之武先生入太學久居賢士之關博士伴雙旌乃為刺史之半公論甚鬱髙懷自如登臨洪府之江山嘯詠爛柯之風月撫摩凋瘵關決是非似聞五月之政成多賴貳車之力贊龎士元之展驥其可再乎班景倩之登仙行且升矣某么微晚出蹭蹬半生頃辭箠楚于尉曹復較錐刀于征筦貳令海邦之表脱身選路之初任花縣以無堪驚瓜期之甫及尚祈加惠俾免矌官非曰能之姑試鉛刀之一割所可恃者正依廣厦之千間代通劉湖州啟建牙三輔誰無附驥之心涉筆一同乃有登龍之幸敢修竿牘仰徹齋鈴恭惟某官聞望雷霆文章河漢穿天心出月脅英詞侔造化之工嚅道真泳聖涯奥學究誠明之蘊周旋中度左右逄源歴窮千古而若在目前泛覽百家而不專紙上羲文既遠尚有言傳釋老雖殊皆為我用惟其蓄于中者厚故其發于外也閎入仕皇都聲動百寮之底出臨壯縣治髙三異之書惟聖主以斯民為先而中興視循吏之盛大襃卓魯徑躡龔黄越觀二十載之間不過三數人而止久難其選今見我公矧茲苕霅之區是曰股肱之郡白蘋泛月想神仙窟宅之深皁葢頒春稱師帥風流之美來紆丈二之組密依尺五之天課最易聞上心素簡丈夫功濟四海尚鬱壯猶刺史入為三公更觀盛舉某初無他技早預一官徒堅鐡硯之心猶負金籯之訓典閩山之醝務俄閲十年充檇李之法曹媿無三語轉丞茲邑獲居是邦方涓日以載塗行束身而受察豈惟庀職于吏師之側抑將横經于政學之餘哦二松之間敢言公事而姑退得廣厦之庇庶幾寒士之俱歡代通趙郡王伯圭啟瞻帥閫于瀛壖曽以部民而修敬望齋旄于澤國更容邑吏之趨風肅貢朋緘豫通下執恭惟某官璇源毓秀嵩嶽儲神東平之在漢京為善深知最樂汝陽之居唐室退朝端若無憑宛然韋布之流籍甚搢紳之望惟親賢之並眷宜富貴之逼人寓直西清屢拜兩宫之雨露疏封南服不移十載之旌戲清和兼惠夷之風畏愛如衰盾之日潢池赤子憺威名于鯨海之深大舶賈胡傳政譽于鷄林之遠樂苕溪山水之勝奉珍臺香火而歸濯纓而賦滄浪闔門而養威重四子之官二千石用昭磐石之宗列侯之印十九枚式廣維城之助雖有蒼生之徯望不妨緑野之雍容胙新鄭之真封分閬中之巨屏櫜兜㦸纛益嚴亞保之多儀衮繡貂蟬入侍合宫之盛禮寵光有赫福履難量某早預一官本無他技典閩山之醝務俄閲十年充檇李之法曹愧無三語茲叨貳令又獲登門梓里有光復見魯公之拜後棠隂未改尚歌召伯之去思自念孤蹤適逄幸㑹矧是典刑之舊願承土苴之餘哦二松之間敢言公事而姑退得廣厦之庇庶幾寒士之俱歡代通李都大啟髙山仰徳久欲事于賢大夫冷局效官幸獲依于部刺史迹雖殊于兩地庇實托于二天敢因告始之恭少見投誠之素恭惟某官風儀岳峙徳量淵澄才兼文武之資學究天人之際義嘗許國忠不忘君決䇿請行不獨在十九人之列論功頒賞已足稱五千騎之賢成桃李不言之蹊堅松柏後彫之操爰受朱轓之寄入趨丹陛之嚴宣室受釐謂賈生久不見矣中朝召對歎徐樂皆安在耶亟示睿恩俾遷輔郡擁麾出守屢宣愷悌之仁攬轡觀風端有澄清之志眷貨泉之至重移使節以按臨盡収數路之權悉總三官之利錢流于地貨積如山已書朽貫之功卽聽召環之命某濟南冷族海内腐儒辛苦半生甘在百僚之底﨑嶇末宦濫參九府之司豈期樸􅈪之資獲在帡幪之下鈍金無用尚期良匠之鈞鎔躍冶不祥敢覬洪爐之造化代謝知潮州啟曳裾東閤載瞻元衮之光華剖竹南州復預大爐之造化寵驚神悚感極涕零竊以在廣極東以掲陽為列郡自唐而後有昌黎之遺風置鄉校以教千里之民驅鱷魚以除百世之害坐使蠻夷之地一如畿甸之間惟我皇家尤重邉徼正當擇士以職承流如某者踸踔無堪嶔﨑可􅀏紹弓冶之餘習綴搢紳之後塵兩地監征力較錙銖之利六年學邑備宣朱墨之勞雖無健吏之聲稱頗究生民之利病頃罷邉城之佐首干上相之尊得倅宛陵忽坐遭于擯斥奉祠梓里亦久就于休閒孤迹若萍歸棲何所仕途如漆跬步而登悵毁譽之交攻驚鐫黜之四至息黥補劓苟逃城旦之書滌慮洗心敢賦大鈞之問㑹中興之英主復圖任于真儒自憐香火之散官曽是門牆之舊物念丘山之莫報幸溝壑之未填尋故步于鈞墀仰勤三握髮三吐哺之禮訴危衷于洪造復煩一舉手一投足之勞俾守海陬以安蠻蜑惡溪瘴聚不妨叱馭以前驅秦嶺雲横何必問家之所在但如僥倖端有夤縁茲蓋伏遇某官以王佐才為天子相内以緝熙于庶績外焉鎮撫于四夷虎嘯龍吟弼亮兩朝之治鳶飛魚躍陶成多士之材遂致庸愚亦叨任使某敢不布宣詔㫖撫字民生益遵父教之忠毋怠官司之守興瀧吏之問敢辭行路之八千捐國士之軀庶報龎恩之萬一代謝劉提舉薦舉啟畿邑負丞未展秋毫之效上臣誤聽已形華衮之褒恩重山丘感深肺腑伏念某才如命薄術與世疎妄嘗有志于事功頗亦早親于經學屢操筆硯之習往從場屋之遊良弓之子必為箕有自來矣吹竽之門而攻瑟如不好何衰遲白髪之雙親齟齬青衫之一第賞延于世遂因委質以入官父教之忠粗識律身而奉法念家聲之淪替嗟世緒之凋零敢言隠忍以就功名但欲植立以興門户一行作吏亦知棲枳之為卑再轉為丞寧復哦松之可樂困簿書之叢委驚塵土之昏霾應無窮之求急于星火酬方來之務紛若毛釐但能催科粗可逃責當官動礙于掣肘莅事況多于面牆公家之利無不為誰為知已君子之仕行其義求無媿心曽微片善之可書敢冀當途之肯舉仰鄉閭之先達方彭彭持使者之車憐上世之至交猶戀戀有故人之意夫何么麽適隸按臨忽傳一紙之春風為振孤生之寒色周章拜賜俯僂知歸茲蓋恭遇某官識量恢洪風度凝遠北宫黝之勇一毫弗挫于人栁下惠之和三公不易其介聲猷籍甚節義凜然攬轡近畿起澄清天下之志推轂後進稱品題人物之公廣務搜羅誤収庸瑣某敢不飲冰勵操結草酬恩鮒轍可憐方賴激西江之水鵬程欲起更祈借北海之風代賀王詹事十朋啟恭審顯膺宸命擢處宫端朝廷益尊國本増固凡在紳緌之列舉深抃舞之私恭惟某官學探精微氣全剛大聳公台之望于庠校談經之日吐廊廟之言于殿廷射䇿之初結知兩朝傾譽四海堂堂不撓豈惟近古社稷之臣諤諤以昌信是當今諫諍之選進以禮而退以義用之行而舍之藏四擁隼旟掩漢室龔黄之迹一登鶴禁追商山園綺之蹤朝廷固喜于得人公議咸期于且相弼諧審諭方資李文紀之忠清輔贊彌縫㑹致房􅀇齡之事業某薾然無似少也何知備更州縣之勞幸脱譴何之域貳車來止方將掃齊相之門召驛趣行莫獲為李君之御敢馳賀牘少見忱衷尚期茵鼎之調仰副冕旒之眷代通薛尚書良朋啟拜棨㦸于黟山當辱老商之一眄駕屏星于梓里幸依夫子之仞牆俯已知歸陳誠敢後恭惟某官身兼數器才出萬人深造道眞傳伊洛淵源之學發為詞藻追舒向金玉之文自結上知遍儀清貫談􅀏不妨于剸劇功名自覺其逼人握節擁旄外著廉平之績簪筆持槖内為侍從之臣凡建明遇事而敢言宜寵遇在廷之莫及盡四方而屬望期兩地之問津聽履而上星辰忽驚勇退把麾而去江海徑作賦歸周旋泉石之間盤屈公台之器謝傅東山之志寧久遂夫髙懷賈生宣室之思行即膺夫迅召某生平無似門下所知自幕府之終更叨貳車之承乏十年徳施未知圖報之階一代吏師喜有趨風之便始茲洗印未及掃門沈侯方賦郊居輙通名于記室龐公倘入城府期雅拜于前塵仲夏清和燕居優暇願調鼎食以候鋒車代賀趙明州伯圭啟恭審課績上聞為南國諸侯之最寵光下被進西清學士之聫曽何異登瀛之榮又以顯維城之效恭惟某官為善最樂大雅不羣風流追配于古人被服必先于儒者天潢近􅂀于周為魯衛之親帝胄竒才在漢擅間平之譽號宗藩之儀表為聖世之豪英海沂歌别駕之功丹丘著剖符之烈眷深于上進不以親奉夫人之輿創聞盛事送列侯之印獨被殊恩睠二浙之奥區有四明之佳郡地綿千里海匝三垂浪舶風帆萃卉服獻琛之利蜂屯蟻聚有潢池弄兵之虞必得升卿以當錯節正須龔遂來理亂繩既易地以䇿勲果自天而渙號賜金増秩爰示寵于侯邦簪筆持荷徑問津于政路幾京師之蒙福見城郭之生輝坐令風濤萬頃之間隂受刺史二天之庇命召公而江漢化已知治效之優得李勉而朝廷尊行聽召音之播某戴恩最厚仰徳方深側聞二千石寵數之頒實同十萬户驩心之劇恨官司之有守望賓廡以無階燕雀賀大厦之成喜得營巢之地騏驥騁夷途之逸豈無附尾之心代上吕鎮江啟憔悴餘生幸叨末契風波千里敬謁明公敢陳迫切之愚仰溷髙明之聽雖云無因而自至詎敢亡説以為先竊以文舉不羇妄謂李君之有分山公如在定知嵇紹之不孤載在信書以為盛事蓋先契者古人最重而高誼者叔世所艱不有豪傑之人孰振頽靡之俗恭惟某官量吞四海氣壓萬夫夙懷公輔之壯猷早屈功名之奇志釣璜渭水世傳柱石之勲取日虞淵身預風雲之㑹獨以有用之學兼濟非常之才精忠上結于主知儒術下飾于吏事發硎游刃未見全牛錯節盤根久知利器總軍儲于邉徼仰分西顧之憂守留籥于行都更任東釐之寄惟京口之巨鎮控天塹之要津坐嘯未幾卧治自若已聞政績之上達側聽召音之鼎來立懦律貪以名節而自任哀窮悼屈崇風義以獨高寒士赴之如歸羇人倚以為命矧在門牆之舊尤祈甄冶之収伏念某身與萍浮命随葉薄紹箕裘之業不能自振于家風厠簪紱之聨徒以猥縁于世賞羇蹇加人數等流落在天一涯憂患相仍不及養親之三釡飢寒復迫焉能餬口于四方比参醝局之僚越在瀛堧之表方苟升斗而自活未容尺寸之暫施適承弊政之餘例有譴章之及二年于此十口無歸雖嘗知安分之言亦能誦固窮之戒然而比之顔氏既無負郭之田較以淵明更乏儲瓶之粟不求濟于旌麾之下是自投于溝壑之中重念某大父獲游相君之門最䝉知遇先人亦為藥籠之物屢辱生成恩紀未酬存殁知感迨宵人攝職于越邑遇明府弭節于舜江蹤跡雖微曽辱步兵之青眼眷私不替間遣使君之白衣是敢仰憑一日之知輙忘三瀆之僭大鵬欲化固將借北海之風涸鮒方危且願激西江之水代通韓總領彥直啟居百僚之底雖知仰泰山之名輕千户之封但願識荆州之面幸茲末屬預在下風雖擁篲之未遑顧馳緘之敢後恭惟某官雄才冠古壯氣横秋當世家聲功孰踰于八柱國妙齡上第名獨高于千佛經錯節盤根共知利器發硎游刃未見全牛顧大丈夫所以致身惟明天子以為知已乃眷江淮之壤實為財貨之淵萬竈列屯用増天塹之險三軍宿飽正資鞭䇿之才爰擢貳于月卿仍暫煩于星使威名逺暨城池不啻金湯儲庤益充菽粟有如水火當邉隅之息燧肅營壘以無譁非惟操贏貲以佐軍所謂不加賦而足用簿書期㑹豈久為外府之淹朝夕論思行即簉甘泉之侍某伶俜何數結約亡竒少讀父書未䇿勲于筆硯早承世賞偶厠迹于簪纓自紆俗吏之青衫羞見古人之黄卷奉祠庭之香火遽纒風木之悲依幕府之芙蓉又屬沙金之汰朅來上國猥備微官董舳艫之轉輸謹朱墨之出入幸預使令之列祗承約束之嚴得大君子為之依歸庶賤有司安于職守駑馬十駕寜敢憚于驅馳鷦鷯一枝願永棲于芘䕃代謝臨安府通判啟拜赤舄于泰階方深榮幸駕緹屏于天邑遽辱生成退而捫心感至流涕伏念某材如樗散性若棗昬妄嘗有志于功名頗亦早親于筆硯與聖賢對獨躭黄卷之書從場屋游終阻青衫之第强顔宦路刻意官箴兩仕窮邉僅脱微軀于萬死一參下幕幸離小選之七階學邑寧川慮傷美錦分司京口莫試鉛刀比改畀于除書俾總提于市􅅦謹朱墨之出入較財賄之有無誓殫一日之長不憚數年之次忽從省汰何所怨尤八嵗三得官莫霑升斗一門四立壁但有啼號驚薄命之數竒覺晚途之甚窶顧已往之迹了如蒼狗之浮空閲去速之辰常若白駒之過隙髪種種以如是身遑遑其何之幸宵人未填溝壑之時際元宰方慶風雲之㑹勢殊霄壤契篤金蘭傳好語于西山跫然有喜進孤蹤于東閤歡若平生窮猿方急于投林駑馬但知夫戀棧周旋久矣委曲從之三握三吐而謙徳不衰一貴一賤而交情自見官不離于都下職況忝于治中惑于多岐初類亡羊之牧未必非福今成喪馬之翁頂踵知歸丘山莫重茲蓋恭遇某官為天下宰負王佐才元首明哉股肱良哉適臣主相逄之日受命長矣茀禄康矣佐國家無疆之休大開衆正之門共築太平之址惟賢者在位引類而上臣事君以人凡厥有知誰無附鳯翼之志顧如無似亦叨展驥足之榮某敢不仰戴已知恪居官次飲冰厲操懼為門下之羞結草酬恩敢後古人之報代通李縣丞啟始為刀筆吏愧居栖棘之聨獲逄君子寮行視哦松之樂顧惟幸㑹殊劇懽悰伏惟某官秀毓山川慶鍾閥閱學淵源而有守才砉騞而不留致身于紅蓮幕中舉無遺䇿書名于金閨籍上益著休聲仕不擇地而安丞有負予之嘆立吏行之雁鶩豈端使然哉造朝列之鵷鴻殆亦非晚矣某江湖泠族簿領下僚父教之忠粗可律身而執贄學失其道徒嗟莅事之面牆疐尾跋胡轉吭觸諱一邑無不當問肯例以嫌三人必有我師願提其耳攻媿集卷六十五
