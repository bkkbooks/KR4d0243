body:
  text: 宋樓鑰撰奏議論實用空言定官輪對任敕令所刪臣聞善為天下者貴實用不貴空言然名為空言而行可厎績者乃所以為實用號為實用而行之不實者適足以為空言此不可不察也陛下即位以來大開言路收攬人才慨然念治效之未及鄙無用之空言而務求其切于實用者此誠得孝宣總覈之意而言者不思曾為實用之説累年以來言者甚衆往往已陳而厭聞于是旁搜曲取毛舉以應故事民力方匱而言利不已法令已煩而變更日增凡此皆號為實用者言之則真若可聽行之則不見所益從而委以施行課其成效則且多其圗冊列數以美觀覽然則所謂實用者果非空言乎孟子陳堯舜之道以為齊人莫如我敬王陸贄論諫于搶攘日不暇給之時未嘗不本于仁義堂堂本朝陛下聰明英睿隆寛盡下而進言之士不聞引今據古訏謨逺猷徒藉細故以為實用而售其迎合之術臣竊惑之唐太宗求治之初魏徵仁義之説自今觀之是為空言封徳彞法律之説自今觀之是為實用然太宗斷然行魏徵之言而成貞觀之治外戸不閉行糧不齎斗米三錢幾致刑措蠻夷君長帶刀宿衛且曰惜不令徳彞見之然則孰為實用孰為空言也臣誠不佞瞻望清光之初誠不忍自棄所學捃摭細故以幸于施用且深懼六經致治之成法寖為空言是以冒天威而進其説惟陛下赦之論災異臣聞魏相之事宣帝多以異文為言李沆之相真宗每奏不美之事皆忠臣所以事君而良史所以垂教也蓋人主居富貴之極操生殺之柄諂士日進佞説而直者亦難盡言祥瑞之出則潤色而張大其辭災異之見則掩覆而變易其占此二臣之所憂而明主之所察也陛下之畏天可謂至矣四方水旱盜賊之事無有不知知之未嘗不深圗而力行之天之仁愛陛下亦可謂至矣不以休祥為太平之應而時出災異以示警戒之端夫天人之間相去不逺太戊稱宗實由拱桑之祥宣王復古厥有雲漢之詩罪已而興諒非虛語遇災而懼適為盛徳臣愚欲望陛下深求其故俯詢愚言寛民力録囚徒凡可以應天者務求其實則治道日舉聖徳日新上答天心下遂人欲今日之異後日之福也臣之論奏動涉迂緩而愛君之心不勝惓惓惟陛下裁幸論二廣賞典臣竊惟賞典之設以勸勛勞輕重均一則人心厭服抑揚失當則不能無辭立法之際不可不謹也廣南東路西路轉運使副提㸃刑獄到任許奏補子孫或期親一名蓋以其逺入烟瘴之地人或憚行故以此勸之頃因言者謂廣西漕憲置司靜江到任不許奏補任滿止轉一官然廣東漕司在惠州憲司在韶州與靜江風土不甚相逺廣西以言者所論而減賞廣東以論者不及而仍舊數年以來未之改定夫廣南兩路皆有瘴鄉監司巡歴其間豈應以易地而鐫賞若舊法為是則廣西不應獨減以其太濫則廣東不應獨得比年臣僚以敕令所見行修法難以著為定令嘗有申請得旨令給舍看詳因循至今未有明文欲望睿旨檢舉淳熙元年臣僚所奏令給舍疾速定議或予或奪著爲成法則事出于一無不平之議矣論玉牒聖語臣聞堯言布天下非若後世詔誥之言也蓋其都俞吁咈出于心而應于口行于身而形于言是所謂有徳必有言者也陛下臨御以來言之聞于外者天下誦而歌舞之臣前載幸獲一望清光天語之發震服不暇獨念親逢堯帝之聖而寒逺小臣無由時聞玉音既而蒙恩兼職玉牒始盡見記注所載仰而歎曰陛下之言隨事而應是皆出于心行于身察見治亂成敗之機質之六經而暗合攷諸三王而不謬備在編簡不一而足臣不能悉舉以進敢取其大者而鋪張之陛下嘗語臣下曰聲色之事未嘗略以經意至于寶貨珠玉侈麗奇異之物心所不好亦未嘗蓄之讀通鑑至楊阜見人主之非則勃然觸之與人言未嘗不道陛下曰人君聽言不可以人臣漏泄為罪縱使漏泄適足以彰君之美因舉陸䞇之言曰諫者之狂誣明我之能恕諫者之漏泄彰我之能從又讀至黄皓事陛下曰人主于近習不可不逺昔仇士良教其徒固寵之術可以見矣又讀至馮紞沮張華事陛下曰小人之讒君子其浸潤膚受委曲如此使人主墮其術中而不知紹興三十二年十一月有旨令入内侍省權免進子陛下曰祖宗以來止許人進一子此曹人多則黨盛今人數不少若平居無事猶可漢唐之事是已隆興元年九月有旨已降親札付張浚王彦應兵將官有奏報文字及有陳乞並宜付通進司投入毋得依托左右近侍以進凡此六條皆人主之要道當今之急務愛君憂國之士欲言而不敢且累千百言而不能得其要者陛下于從容問答之間形之于言可以大書于方䇿可以為法于後世猗歟盛哉故斥聲色異物之奉容人臣諫諍之直逺近習察小人減内侍之進子禁兵官之依託皆陛下躬行之實心術之妙宜其不假潤色而發于外者如此其巍巍也臣昧死不勝惓惓惟望陛下持之以誠守之以久日行其道日新其徳當如周之文武終得逸樂之福毋使唐之魏徵謂不及于貞觀之初則天下之幸社稷無疆之慶也論土木之費臣仰惟陛下恭儉惟徳敦朴為先宫室苑囿未嘗興作禁御遊觀之地至有弗葺者自非殿宇之繕修學校之崇飾府庫之闢官寺之徙不肯輕用民力蓋聖意深知土木之功實為官私之蠧故節費省事以垂後則然臣竊見比年以來工役相繼亦間有不急而可以緩為之者土役之勞擾非一蓄材植者有强買之懼事末作者有苛役之擾廣道路則列肆有毁撤之驚撇基址則連甍失已成之業如此等事未易悉數或曰是役于游手而不妨田里之農事是出于贏貲而不闗有司之經費物皆給以市直而無科斂之擾勞皆予以賞典而有勸功之心是皆不究夫利害之實者也游手之役不費于財乎贏貲之用不出于民乎給以市直徒有其名予以賞典不及于下命令之出誰敢不承要不若前數年之無事于此也故嘗謂人君之善儉者當如漢之文帝而善于用言者當如我朝之太宗夫以漢室之富百金之費宜不足惜而文帝以吾之百金計民之常産一臺之費可資十家遂終罷之每事如此安得妄用此所以為善儉也以王府之貴營一假山亦不為奢而姚坦之言深切似過太宗時已為之一聞坦言歎其傷民亟命毁去言非親聞感悟如響此所以為善用言也以今觀之民貧益甚下戸之產不直一金田野之夫終嵗勤動而不免飢寒閭閻之人以數百錢為資生之䇿一役之興費以千萬計者不知可為幾家之産州縣之間一金一粟之不輸則鞭笞立至追科之日械繫滿前號呼塞耳錙銖積之以充府庫一役之興費以千萬計者不知出于幾人之輸然則文帝之言為有旨姚坦之言為甚切太宗皇帝之徳卓乎其不可及也以陛下之恭儉敦朴而臣猶敢以此為言者誠以今日事力尤非文帝太宗之時之比則愛惜浮費當又過之臣愚欲望睿慈念財用之至艱罷土木之不急逺追文帝之美近法太宗之聖更復深軫姚坦之言則節省之益非止一端恭儉之盛冠乎百王日計不足嵗計有餘富庶之源當在于此臣狂愚妄論惟陛下赦之論六曹法司臣仰惟陛下垂意章程務極平允爰念吏部七司所關者大修書之日詳加裁擇書成之後又為總類名目雖分條貫歸一誠以法守之地不可有毫釐之差也臣竊惟修法之事固已周密用法之吏尚有可言蓋七司之法頒之四方而用在吏部長貳郎官年除嵗遷難以必其通習吏人各自行案又未必盡知源流則是用法之責全在法司夫文法之習至以名家要須明練條章旁通倫類習之有素以為術業然後可以審處是非議定輕重竊見紹興元年臣僚申請七司各有掌法案止係收掌文書即不共檢條法乞將掌法案改為檢法案内手分並于本部人吏内選差諳曉條法之人如本部無可選差許踏逐指差使掌本選之法事有不能決者聽委法司鋪敘條格然後長貳據法與奪此誠用法之要也屬縁節次降旨裁減吏額往往將外差法司充其減罷之數目今雖有法司去處亦不抽差諳曉文法之人止是就本部遷補既非素習又復遷徙案分不常其守安得明習貫穿以資闗決修之甚勤而用之不求其要誠恐有所未盡也臣愚欲望睿旨明詔攸司詳攷紹興元年指揮專置法司厚其廪給而嚴其罪罰久其嵗月而優其遷補使事有所任責有所歸庶幾有以仰稱陛下立法之至意如蒙聖慈採擇以為可行六部亦乞盡依吏部處分或恐重于多置吏額莫若隨其事之劇易吏戸刑三部則各置二名禮兵工三部則各置一名並擇曉法之吏使之專意于此長貳郎官提綱于上法司守職于下則六部之事皆得其平矣論治道主簿日上任宗正寺臣聞人主之徳與臣下不同臣下苟有寸長皆可以自見上之人捨所短而取所長則無不可以用者人主天縱多能下視臣庶是必備道全美百行衆善無一毫之歉長慮卻顧萬幾庶務無一事之失然後足以御四海而圗治功由漢以來人主鋭意修政率不過數年而怠陛下以睿哲之資臨御二十年而憂勤兢畏踰于初載臣下不足以望清光尚何俟于微臣之言獨惟人臣之事君非必皆好為諛悦蓋其心每期君于善一有盛徳謨訓將順歸美惟恐不盡以期人主為善之心間有不及則敢言者寡故天下之事惟見其全之盡之也人之一身見有無受病之處天下之大見有無蠧弊之原善養病者不以無病而廢調攝善為國者不以無事而緩戒懼然後為得也漢唐賢君非無可傳之烈如高祖之好謀能斷文帝之以徳化民武帝之雄材大略宣帝之信賞必罰光武之身濟大業明帝之幽枉必逹唐太宗之除亂致治明皇之勵精庶政憲宗之剛明果斷有一于此誠足以建功立事措天下于小康然而必有以議其後而民亦有受其弊者正以如前所陳見其所長不見其不及而不能以自勉也是以堯舜之盛曰儆戒無虞曰兢兢業業一日二日萬幾湯以六事自責曰政不節與使民疾與宫室崇與婦謁盛與苞苴行與讒夫興與故儆戒兢業在堯舜為不必慮所謂六事者又皆湯之所無而聖帝明王舉其不必慮與其所無者日以自勉蓋不惟未嘗一日忘天下亦惟恐吾身毫髪之不盡此漢唐之君所以不能進也方今邊陲雖靖而夷狄未賔紀綱雖舉而萬目尚疎敦勵士氣而㢘恥不振撙節國用而公私俱匱比嵗豐登民力且困重以嵗旱尤難支吾陛下日昃視朝廣求民瘼無所不用其至臣誠不佞竊希古人責難于君恥不及堯舜之意欲望陛下逺稽古昔俯鑒近代凡其可取者必思兼備于今日凡其可戒者日思所以去之如湯之六事皆今之所無亦從而深求其端倪則聖徳日日新又日新上益有以當天心下益有以澤民物以是而求所欲爲者無不濟矣臣不勝惓惓愛君之心進芻蕘之言惟陛下擇焉論責成臣仰惟陛下臨政願治垂二十年孳孳萬幾興利除害誠不爲少臣愚無知竊有進焉凡天下之事君相講求于上士夫獻納于下大綱小紀略已周徧而事之已議議之已行未厎于成而遂止者尚多有之臣嘗攷求其故蓋朝廷議之既熟成命一頒則謂事已施行下之人奉承約束文移行遣紛紜良久則以具文告于上方其播告之初天下皆謂其必行書之記注亦曰某日行某事其實事未及竟而止矣此所以事緒徒繁奉行者無所適從良法美意日講于前而澤不得下究事不見成績故迄今算計見效未能甚稱陛下大有為之志也事有大小小者可以立辦一出睿旨隨即罷行若事涉大體所以為國家深長之訓者是非磨以嵗月不見其成且如屯田為富國之本水利為農事之要陛下最所留意施行不一然至今不見成效行之太遽者或至擾而無益行之太緩者或至寢而不報豈天下之事終不可為也臣愚欲望陛下遇事之欲行者俾大臣詳加審訂若度其行之終無益或利賴㣲末而不足行者悉從簡省若其必可行而稍費嵗月者朝廷置籍記其事端及施行之日月約事之大小為久近之期以時舉催不辦不已如此則事之欲為者皆有端緒陛下聽納之勤圖回之妙日厎于成而後治效可覩矣論宗室右選嶽廟臣竊惟國家忠厚之徳冠絶前古親睦九族無所不用其至是以慶源蕃衍人才輩出皇朝盛事尤非歴代之所可及近嵗以來修謹好學者日衆士夫敬仰之不暇此皆陛下聖徳感化之所致也然由進士任子為左選者堂除銓選各有成法無官人有孤遺請給亦足以活其家惟是官右選者人數極多往往逺外無援鮮能自抜于稠人中以求用于時添差又有限員不可多得惟恃嶽廟以餬其口州縣又以窘匱之故俸給不能一一如期所在多有無告之人歴嵗寖久員多缺少已不免待次之窘近降指揮頓減員額大約四分中幾減去其二三凡宗室之賴嶽廟以為生者待次遂至四年狼狽立見誠可矜憫如此則有官者還不若無官人孤遺請給之優陛下富有四海寧肯于天族較此毫末但以宗室不敢自言故此情無由上逹況夫禮義生于富足一有失所則流蕩為惡如水就下犯法者必衆尤非所以愛之也臣愚欲望聖慈深軫磐石之宗盡復嶽廟員闕庶得天族各遂仰事俯育之計以助成信厚之風不勝幸甚倘或聖意猶以為􅔙則乞明降指揮于前所減數内復三之二或且復一半之數亦可少寛目下艱窘之狀不為小補論浙江渡船臣竊惟江水之險無如錢塘不惟水面闊逺風濤可畏加以沙漲無定日有改易大駕駐蹕往來尤衆紹興初年渡舟屢有覆溺蓋舟人貪利稇載以行弭櫂中流恣以乞取忽遇風濤舉舟覆没操舟者獨以善泅獲免是時留守司轉運使措置官造巨艦舟之受人各有定數立旗賣牌各有色别以賣牌之入為篙梢及補苴之費自此往來安便所利甚溥成規具在可舉而行中間一再修葺近復廢壞不惟渡舟罅漏成規亦不復遵守人畜雜糅私渡競進近者連日有覆溺之害都人駭愕行道傷歎臣愚欲望聖慈行下兩浙轉運司修造官舟務極堅壯悉舉元立約束以濟病涉之人在官司為力甚易而人之受實惠者不知其幾惟朝廷亟圗之論道學朋黨丞日上任宗正臣聞天下之大患每起于細微明者察之昧者忽焉不惟忽之復以察之為過迨其既成又已無及此天下之患所以相尋而不已也後漢黨錮始于甘陵南北二部之謠唐之朋黨始于李宗閔賢良之對本朝元祐黨籍始于二三士夫不得志之徒事之初生若不足憂横流不止害不可言今日朝廷清明豈復有此然初見端倪不得不慮是敢先事而言寧犯狂僣之誅不忍自為緘黙惟陛下察之夫道者天下之所常行學者士君子之所當務秦漢而下斯道不明誦説相夸去本彌逺國家累聖傳授敦尚斯文教風聿興名儒間出講明經術究極精微然後語道者不涉于異端為學者不至于無用恭惟陛下天縱聖性帝學高妙體斯道于已安而行之賞不輕予刑不遽施寛猛相濟無有駭政執中之傳也喜怒不私嗜好不聞隆寛盡下有言必從克己之仁也雝雝在宫臨朝尊嚴清閒之燕不見惰容謹獨之戒也清心省事湛然凝靜物來斯應無所適莫正心誠意之學也凡前儒講貫發明之大端惟是數者而陛下兼而有之臣愚何足以測識然青天白日孰不知仰而士大夫之議論則有可疑者臣竊惑焉比年以來曰執中曰克己曰謹獨曰正心誠意往往有所諱而不敢言人主躬行此道于上而士大夫反諱言于下試攷之十數年間章奏無慮千萬未聞以一語及此而又相戒以毋言孟子曰齊人無以仁義與王言者我非堯舜之道不敢陳于王前以為齊人莫如我敬王者而聖世乃有此風何耶故凡士之端謹好修談論經禮者一切指之以為道學小則譏笑大則折辱又甚則疾之如仇士之遭此者其間蓋亦有以自取然而俱為士夫由學以進所謂同是堯舜同非桀紂而何相疾之甚也臣嘗讀大雅之詩曰君子實維秉心無競誰生厲階至今為梗詩人之意蓋曰厲階之梗由夫好競者之為之也使士大夫操心無競則何自而至此耶臣嘗求之牛李之事雖曰李黨多君子牛黨多小人然徳裕一聞御史大夫之除則流涕寄謝至其不然則遂為仇敵嗚呼非競而生厲階者乎元祐紹聖之事又可知矣故嘗以為近習之排士夫非衰季之世無此若士夫之自相排雖盛時亦不能無之漢之黨錮權在宦官乗主之昏而肆為之無足怪者若唐之朋黨元祐之黨籍則士夫自相傾軋使人主莫知適從為害尤甚蓋惟人主能用中然後可以消弭于未然而使天下不至于甚弊惟士大夫能無競然後可以衆賢和于朝而使國家不生于厲階今陛下執其兩端而用其中自不應過慮而察士大夫之間未能無競向者猶止以虛言相譏訶而近者頗有其迹矣臣愚欲望睿慈明詔中外咸推無競之心勿徇一偏之見精白一義以承明主之休徳臣前所過慮自可以消弭于冥冥之中臣不勝拳拳惟陛下裁幸論明政刑臣聞孔子曰道之以政齊之以刑民免而無恥道之以徳齊之以禮有恥且格孟子曰國家閒暇及是時明其政刑孔子以政刑為緩而孟子以政刑為先人或疑之蓋一道也孔子非以政刑為可廢孟子非以徳禮為可忘蓋政刑不修無以為國及其既立化乃可行仰惟陛下臨政願治二十餘年而憂勤不怠圗治日切今者中外少事朝廷清明年榖既登流莩麤息外則邊鄙之不聳内則盜賊之不興既非賢哲馳騖之秋可謂國家閒暇之日而又延登宰輔共圗事功當此之時若復玩嵗愒日文恬武熙視國之蠧弊為當然而民之疾苦為細事置而不講趨了目前使一旦有水旱盜賊邊方之警則必事出倉猝無復優暇今日光隂豈不可惜仰惟國家累聖相傳仁宗皇帝太上皇帝在位最久仁宗開天章閣命名臣條上當世急務乃在慶歴三年太上逐權臣之黨更化善治乃在紹興二十五年皆是在位二十餘年之後非若前代人主始勤終怠之比是以士氣振作朝綱不隳嘉靖有邦此實我宋之家法也陛下垂意政刑何事不舉臣愚過慮猶竊有言刑政二端所該甚廣無問内外皆在其中今日􅔙官之員最多而乏周用之才養兵之費最重而少精鋭之卒游手倍于農人而趨末者日衆歸明坐困州縣而冒詐者日繁問食貨則國用既虛又非藏于天下問力役則貧弱日困不能安于田里加賦之害莫甚于和買而紹興近輔之地斯民無聊未知所以寛恤之術取民無制莫甚于榷酤而行都首善之地設法尤盛日求所以張大之方水旱雖曰稍息而蝗蝻遺種尚多安得不為來嵗之慮盜賊雖曰不作而民間愁歎尚衆安得不思豫備之宜此皆政之大端也如此等事未易悉數未問外攘之説先求内治之謨如以為小康則真若無事試加思慮不勝私憂用刑之道在今日實為公平人主無喜怒之私朝廷無風旨之聞一付有司動循三尺然而四方寃獄尚多有之若無辜陷罪固當痛懲詭法惠奸亦非令典祖宗非不隨事寛宥然當是時法家者流皆是西北强毅之士堅執成法或至少恩故每使儒臣治獄讞議其間有司既不失官守而法禁亦不至煩苛今則不然用法之人多言陰徳重辟強刦亦或失刑雖曰忠厚所漸者深然有奸宄不勝之弊刑之不修此其大者臣愚竊為陛下惜此閒暇故願陛下速為永圗雖未能每事更張曠然一變豈可不深思其故使之日新伏望睿慈採孟子之至言明政刑之二柄般樂怠傲固聖世之所無苟且因循恐良時之易失臣憂國有素不敢煩瀆惟陛下幸赦而留意焉天下幸甚攻媿集巻二十
