body:
  text: 宋樓鑰撰誌銘戴伯度墓誌銘紹興三十二年鑰叨薦于鄉時二戴皆在前列曰機為詞賦之冠曰樟以周禮選長字伯度次字伯臯戴氏世為鄞人居桃源鄉曽大父侃以財雄大父冕以通經屬文上禮部不及仕而卒父汝明能傳家學見二子蚤歳競爽尤篤意訓教母夫人朱氏亦課督之一日俱擅場屋聲父以二子故尋封至宣義郎賜五品服母封孺人而戴氏愈著伯臯擢乾道五年進士科終諸暨丞伯度至紹熙之元始以特恩補官鄉黨固已歎其晚暮纔歴金華簿待次鐡冶而一疾已矣寔嘉泰元年二月甲午也君之子燧以行狀踵門泣且拜曰既已忍死治墳于鄉之萬隩將以十二日丁酉襄事敢求銘于先友余亦爲之泣曰蓋嘗銘子之祖矣忍銘吾伯度耶讀其狀則袁和叔之文也和叔不輕許可又爲伯度内弟知之尤深無一語溢美又念頃與昆仲定交晚與伯度益厚君之歸余偶苦足疾竟不及一見遂備錄所狀益以見聞而系之以銘惟昆仲皆游郡庠朋儕斂袵畏之伯度尤長于賦俊逸而不肆妥帖而不局體物匠意有前輩風君初調迪功郎紹興府蕭山縣尉未上丁宣義憂服除始為主簿官雖卑惟既厥心夜漏未盡而起旦即坐曹簿書鈎校不遺纖微皁吏莫不苦其勤憚其嚴而心敬服焉事不詭隨亦不苟異每以出位近名為戒歴事五太守或寛或嚴同列或未免少變君趣操自若曰吾知盡吾職爾田賦之入異時莅其事者有刻下奉上以溢數為能輸者苦之累月而未畢漕以屬君更前之為僅兩月告具貧弱下户有積年未盡輸者守俾督之君詢究得實言于郡曰民畏法敢有不盡吏擅私隱欺爾郡計幸無乏奈何重困吾民守悚聽亟命蠲減合七萬餘緡先是縣吏輕侮士類被以惡名有赴愬者多沮挫不能自直而眞為姦者庇之君處心公平于吏無所聽沮者伸而庇焉者屏迹邑人稱誦之守與憲交薦其詞甚美既終更今丞相謝公一見深念之以為提㸃江淮湖北鐵冶鑄錢司檢踏官踰年會屬疾以承務郎致仕終于家享年六十有七娶汪氏二子長即燧也次炳女適嚴仲游伍玠方復嚴輔之皆里士孫男塤埴一女君風規峻整志尚卓犖恥與碌碌者伍平居介然未嘗諂辭令色蘄悅于人非道義之契不與深語區别善惡若已甚者而徳性温温胷懐四達不設防畛色養親闈恪謹朝夕不敢少忤其意友愛諸弟于仲氏尤篤拊存孤嫠族黨稱述初師事鄉先生髙公開而深為先生之兄侍郎公所器重自是為學愈力有勝己者必從之研窮講切日進而不止根本諸經博采百氏喜史漢書敘事奮筆效之沛若泉湧英詞麗藻出必驚俗愈出而愈新尤工偶儷之文如覩寶藏金珠象犀爛然溢目喜作七字詩多關風教有蟄齋集十卷蓋庶㡬乎詞人之秀一第易爾而困躓若是人為慨嘆君處之怡然無隕穫憔悴之色晚得一官稍見施設方為當路所知則又不幸而病病愈復作竟致大故嗚呼如彼其才發攄素藴足以顯于用顧若是而止乎然君之持身傳後自有不可泯沒者官金華也俸入至微而尉廪差厚守曰主簿尉官等爾而勤怠有間勤者薄而怠者厚可乎使均之固辭不許曰吾以懲勸官吏非為主簿也然卒不受其義利昭晰如此官事稍暇時從名勝相與講貫有日新之益教詔二子朝夕諄諄無非切己曰吾平生所守不欺二字而已其子亦刻志自立親炙師友將大其門君之培養根源顧不厚哉銘曰昔吾鄉兮兵燬求故家兮無㡬訪戴氏兮故廬自熙寧兮經始歎古風兮猶在信不陋兮不侈川流兮無窮喬木兮髙風忽不見兮伯度儼丹青兮徳容嗟二雋兮齊名抱器業兮長終百不試兮一二泣遺稿兮焉從幸素業兮有傳庶不悼兮土中表斯銘兮宿草尚過者兮必恭駱觀國墓誌銘易道不明乆矣夫子之于易不可及已然讀之至于韋編三絶是時十翼猶未作也近世通易者莫如康節先生亦寫易一部貼屋壁間日誦數十遍今之學者未論明易能讀者蓋寡甞聞旁邑有駱君觀國能凌晨暗誦全帙大寒暑如一日至老不廢每歎以為難及而未之識近者叔父學賔與從子沐致郡博士楊君成己之意云有里士駱士宏與之有連求志其先人之墓既而沐又介以見泣拜且請就閱行實即觀國也乃為序而系之銘駱氏統仕吴為偏将軍封新陽侯姓苑曰東陽人又曰㑹稽烏傷人至唐有賓王以文章顯貫義烏實烏傷也五季之末有友義延訓者相繼為台守自義烏徙寧海遂為邑人君諱季友觀國其字也曾大父益大父全父恂世為著姓君于兄弟為季幼敏慧父竒愛之多買書而題其卷末曰留遺子孫君少長即感勵力學未冠而父與長兄俱亡母項氏以悲憂感疾氣㿂如石鍼藥弗及君創屋一區寛明温凊娱侍無闕家人化之未期年而頓愈至九十以夀終鄉黨稱孝事仲兄尤謹協刀克家嘗讀佛書有感脫略世故逍遙林壑者數年儼若凝思専以達性為事聞儒士釋子有理學明徹者不問逺近必往叩請後果通悟幡然而歸曰吾乃今知天地萬物初無二致儒墨殊塗而同歸求其體用具存者莫大乎吾聖人之事業精義入神所以致用由是求為有用之學家政益井井有條年近五十不復作出仕念讀書必研究至極嘗自嘆曰若欲窮理盡性知時識勢開物成務無出于易非圓機之士孰可與論是哉其子至前間取卦爻象辭以警之使之通貫而後已子雖鍾愛十歳即就外傅有名士必使從之逺亦不憚歸必使誦所聞士宏讀孟子至引而不發躍如也君撫几三嘆且令掩卷曰此正孟子警拔人處既不待發尚思其所躍如者何以得此此不可以口耳章句求之語至數四士宏聳然因名以躍而字以子發後始改焉淳熙間髙宗慶霈封迪功郎致仕非其志也鰥居二十餘年不復再醮獨處一室植竹繞榻而讀書其中雍容閒雅作詩如其人暇則風詠以自適日渉家圃好吟歸去來辭其于聲利澹如也性耿介事有曲直必為之辯析里人憚之感疾既革神閒氣定不異平時至親環立忽語之曰生必有死世間止如此爾初非異事命筆俾書四句頃之氣絶慶元五年十月七日也娶同里魏氏生一男士宏也二女長適進士王夏國子監丞知信州及之堂弟次適楊考叔成己之從兄也孫男五人朝宗光宗儒宗可宗皆業儒開宗尚幼以嘉泰元年九月十四日葬君于縣北大中山之原合孺人之墓余將屬稿會閬風劉允叔次臯過余問以鄉評曰此真吾邑之善士也贊余銘銘曰君之于易日讀一通百徧義見況終其躬學成不試得正而斃積慶之餘尚啟來裔朝請大夫曹君墓誌銘紹興李莊簡公光以直道大節屹然為中興元臣聞四明曹公粹中之賢妻以長女翁壻間自為知已學問大率以躬行實用為先真有冰玊之譽君其仲子也天資穎悟記誦絶人長而力學既有家傳而又源流外門氣節自許詞章煥發落筆千言仕雖不顯而見于政事有可紀者足為一世名士余里人也客授東嘉君時主平陽簿深歎其不可及交情日深三十年來君之文益工政益明操守益固方相期為世用而遽亡矣哀哉將葬君之子孝忠以行録泣求銘君諱盅字困明明之定海縣人曾祖慎微贈宣教郎祖實贈奉議郎曽祖妣袁氏祖妣閔氏黄氏皆贈太孺人父朝㪚郎建寧府通判君既升朝累贈中奉大夫妣太宜人乾道三年君以中奉致仕恩補將仕郎明年銓試上等授迪功郎為平陽主簿次調江陵令遭内艱淳熙九年循從政郎監行在贍軍激賞酒庫十五年以舉者改宣教郎知秀州嘉興縣既書再攷引親嫌改知福州長溪縣慶元改元通判楚州六年授福建轉運司主管文字積官至朝請大夫嘉泰二年九月朔以疾終于官舍享年六十有八娶陸氏封宜人子二人長孝忠也將仕郎次孝先當被遺澤一女尚幼十月還鄉三年三月癸酉葬君于奉化縣禽孝鄉童隩先塋之側宜人祔焉君兄弟競爽而君尤俊邁不羣十二能作舉子業未冠已博綜經史百家之言天文地理與夫天下形勢兵家之學靡不通貫詩章文賦命題立就動輒驚人少嘗留題寧都金精山有曰手擎白日浴滄海氣使列嶽如羣兒中奉見之為失色且戒以力除此等氣象見其留心詩文以為當究經術務為實學君自是日則幹蠱夜則讀書昏定率飲三盃君止求小盂置書燈上至四鼓酒温始一引而寢奉親盡于敬愛不忍頃刻違膝下貧不足養恐貽親憂至躬負米之勞中奉被疾衣不解帶藥必先嘗既革許誦金剛經萬卷誦之終身至于倍蓰自少攻苦食淡忍貧自克奉身至薄至用于義則不吝尤篤于友愛伯氏多女為嫁其二餘又厚助之介弟寓江陵逺宦相值情好尤篤見其子與能書不翅身得之喜幼弟早亡撫其孤為次子即孝先也其在平陽能聲已著上司委以事㡬無虚日訟者亦多自請求決士民歸心去而挽留殆不容行侍郎曽公逮自温除漕深知其才而薦之大卿辛公棄疾帥江陵治盜素嚴有盜牛者配江州吏縁其意欲沈之江君慨然禀白公改容歎賞卒俾如令寸金隄去城二里實捍大江衝突之患歳役人夫數千具文而徒勞君調夫均平躬自督課増卑培厚以為永利又以農隙修築沿江官隄使前日巨浸衝決之地復為膏腴流移歸業耕墾日闢諸司公舉具載實跡南軒張公栻尤知君引置簽幕其舉詞有云直論敢言不肯詭隨有足嘉者􅅦酤餘杭京尹尚書張公枃韓公彦質更薦之遂以更選公餘任刀筆之須談笑揮翰無難色嘉興劇邑且當孔道牒訴山積君以五鼓秉燭治事遲明而畢人歎其敏既至長溪辛公帥閩以鬻鹽來委君謂縣為出産之地開國以來未嘗與民爭利持不可帥怒易糾曹比至帥已釋然不使就職相與觴咏彌旬會貳車闕即以處君其在山陽尤悉邊事帥漕總餉合詞乞不次擢用嘗論五事一乞令楚州守臣仍舊節制出戍軍馬二乞開壽河以為山陽饋餉之備三乞申嚴淮禁四乞止用官會不必再印兩淮鐵錢交子五乞開淮東荒田以實邊儲習邊事者皆以為當思欲一登玉陛方寸之地以吐胸臆而所向不偶性素剛銓部偶有漕幕見次授之以歸㑹閩中歳旱白使長此不可謂細故緇黄禱祈亦置勿論辯析滯訟疏決岸獄加以振貸庶可感格貳卿曽公炎悉從其說隨獲甘澍君位不稱徳其見于政事者止此中奉詩易皆有傳先以詩傳俾鑰為序而刋之遺藁自甲至辛凡八帙尚可傳逺也君之屬文兼備衆體高宗七十之慶一時文賦表頌獻于闕下者無慮千數君進賦篇無媿古作尋有旨付後省看詳取文理優長者十人以聞給事王公希吕中書舍人鄭公丙李公木以君為第六觀者無不嘆服其工開府吴公琚倅京邑監漕臺試夢神人以黃牒書君之名者不能遽識明以語同事俱異之君時自平陽來試吴得君名而喜已而果在選中比為浙漕君引夢事為詩以見之吴公加禮焉君抱負不凡動以古人自期標致甚高不合于俗每謂與其取美以求合孰若行吾之志官雖不顯而氣不少慴所至放達不暇商計嘗嘆曰識真者少從古以然知我者希則我貴矣君御家嚴整居鄉尚和父老童孺相為爾汝非意相干自能理遣晚卜築奉川一區雅潔聚書萬卷多手自讎校每言夜以一燈使婦奉姑别以一燈觀書積學老不衰客至則討論古今觴詠奕棊意殊不倦客去則凝坐一室多採釋氏高勝之言可以警悟者書之坐右自號牧庵居士不喜雜交以傍人門為恥骯髒兀傲自適其適既不能少貶以求進使得壽考為鄉里老成夫豈不可中更游宦處此室廬僅十稔而夫婦俱以喪歸可哀也已宜人世居台之寧海曾祖熙祖扆父之機起于富室而温恭勤儉無媢妒之私事姑相夫婦道惟謹君有幼妹寡居君欲奪而嫁之妹自以姑嫂相處無間不願再適同居二十年此尤可稱者君之成家出處無玷缺内助為多年纔五十有二先君一年卒七月二十有一日也孝忠痛怙恃之繼亡併求著其母之賢亦君平時之所稱者牽聨書之以慰孝子之思云銘曰矯矯囦明天與令姿學有自來而文益奇駢四儷六篤論工詩奏賦明光大放厥辭見于有政精敏光輝才髙位下知我者希胸中耿耿噤不得施吾徒掌制愧先于之伉儷同穴行道興悲我銘其藏慰爾孝思參議方君墓誌銘余為兒時先光禄知烏戍已知秀州使君方公之名既冠公守四明纔三閲月而去民歌之至今乾道七年由永嘉郡文學為秀之攷官公方奉祠居城中訖事始得一拜牀下侍徳容聆教言從同事者各詢其鄉里官所之詳故家意象寛􅀪歎仰前輩風度以為不可及公既云亡始識其子夷吾納交雖淺而意甚親後貳司府夷吾之子叔恭為打套局喜其有父祖之遺風遂薦之幸遂識方氏三世嘉泰元年聞夷吾以九月八日終于家二年叔恭等既以二月甲申葬君于臨安縣靈鳯鄉歸長山之原祖禰塋次以書來求銘新浙西參議官王明清仲言實余所敬娶君之女弟既狀其行又助之請仲言有史學書詳備乃摭其實而系之銘君諱導夷吾其字也方氏自周之方叔以來逺有世譜後居嚴之鸕鷀原晚唐元英先生以詩鳴七世而楷以進士起家仕至駕部員外郎生蒙朝㪚郎尚書屯田員外郎贈銀青光祿大夫君之曽祖也妣陳氏贈永嘉郡夫人祖元修朝請郎大名府主管機宜文字贈特進妣王氏贈餘杭郡夫人父滋敷文閣學士通議大夫累贈少師妣李氏贈越國夫人少師未四十而專城擁麾㡬徧東南所至有惠愛晚登從班隠然為一代名臣及見正始源流深逺所交皆當世名士在二廣八年自趙忠簡公鼎張忠獻公浚洪忠宣公皓李莊簡公光諸巨公皆為秦氏所擯斥流散湖廣或在海外秦方興羅織之獄急進者睥睨遷客以為奇貨少師獨一一以時存省饋遺濟其乏絶不幸歿于煙瘴者又為津致北歸旁觀者危之曾弗之卹竟亦不能害此其最為世所稱君忠垕孝謹目濡耳染之久故濟物之心切因得師承侍郎横浦張公九成又從御史樊公光逺三山宗丞林公之奇游講究精微達識宏度是以似之局于名位雖不得展布而平生出處有可書者紹興十九年以郊恩補將仕郎㝷兩該恩例循右從事郎二十一年差充總領淮東軍馬錢糧所幹辦公事改辟福建路安撫司主管書寫機宜文字少師罷四明寓姚江不忍去側自監潭州嶽廟凡兩任孝宗登極循右文林郎乾道初元少師出疆以親屬恩循右承直郎差充兩浙西路提㸃刑獄司幹辦公事七年入幕冬遭内艱九年丁少師憂淳熙三年兼兩浙運司造船場八年改通直郎知湖州武康縣明年明堂大禮賜緋衣銀魚十二年差通判平江府十六年光宗覃恩授朝散郎紹熙二年到官五年差知沅州主上覃恩授朝散大夫請祠主管建寧府武夷山沖祐觀三年差知黄州復請武夷之祠久之差淮南安撫司參議官而遂已矣享年六十有九積階至朝請大夫娶常氏御史中丞同之女君之姑秦國太夫人所出封宜人相敬如賓動合法度閨閫視以為則子男三人長叔恭也朝奉郎新通判臨安軍府事次叔寛宣教郎淮南東路提舉常平司幹辦公事皆賜緋魚袋次叔敏繼季弟後承事郎新監鎮江府大軍倉女四人長從釋氏次適進士張淳厚次適計詵季尚幼孫男六人熙將仕郎㸃將以遺恩補官黙熊照然女五人長未行次適承奉郎知常州晉陵縣丞張佺齡次許嫁四明史文卿次許嫁進士李景藩餘尚幼初君在憲幕王丞相淮為使長雅知君賢君亦疚心協贊多所平反德清縣鞫茹菜者數十人請論如律君究其實乃鄰邑鄉民因售薪致競為怨家誣訴兩造俱斃案中皆牽連者又婺有倡家子規富室之産既已伏辜而嚚訟不已君悉白使者平其獄魯公大喜欲以論薦而君憂去矣船場在華亭造船本錢舊屬五郡期㑹玩弛歲額侵虧君克勤細務額既登足異時闕廩貸物者俱償之漕司于青龍鎮剏許浦移屯寨屋三百餘間久之未定君承檄定基既便于事請以所征商販木植為用尅日而辦仍為痛除重征之弊武康密邇行都易致越訴君律身既嚴剖決公平不科罰一錢寛猛得宜訟亦衰少縣出絲纊賴以濟税課郡利其羨使别儲以俟命縣無所從出商人患苦倍征旁出山蹊公私交病君請于郡復舊規蠲宿逋申法禁減則例以招之曾不踰時來者輻輳并邑亦為之改觀米運至豐儲倉退卻至數百斛典吏鬻妻子不足以償君為于他州賤糴取贏以補其數又以餘貲代下五等畸税義役良法也行之或反以致害君更立規式勸諭誠篤民咸信之追科不事鞭扑間出郊野食用百須皆以自隨無纖粟之擾于是爭先就役他縣至取以為法後有欲更張者老稚叩閽幾二千人竟仍其舊嘗久雨有怪民昌言水且大至人皆悚懼謀避亟捕至庭焚其書械繫以俟期既不驗杖而逐之有訴夫久出不還知其必死而迹不明者君為設方畧得姓徐者一問即承境内盜賊帖息雨暘致禱多驗洊値豐歲上下熙然寓客任公紳諌議古之從兄也靖康失母長齋泣血以求之金人歸我河南徒步走北方奉之以歸孝行上聞擢敕令所刪定官改秩主管官告院母終廬墓事之如生與世相忘久矣君訪其家列其高節于朝控懇備至遂賜金紫聞者欽嘆風化之美提刑劉公潁行郡謂太守曰自蘇至此惟武康無一詞至前蓋君專務行所學視四境如一家不表暴以取赫赫名而民受實惠便坐有梧桐瑞香一曰甘露降其上晶熒潤液浹日不晞邑人聚觀士夫形于歌詠者數十人其去也遮道挽留越境追送者不以數計此豈可力致耶呉門最號劇郡君闗決閒暇貳卿沈公揆同里之舊相得甚歡外臺多屬公以事無不得其平兩攝郡事尤為得體秩滿久滯逆旅今丞相謝公深甫大資政趙公彦逾俱在起部亟稱公始有沅州之命黄州陛辭乞銓擇巡檢以備不虞又論犯茶鹽之禁多妄引仇怨與多藏之家乞不許淹延枝蔓敷奏詳敏上甚悦皆見于施行逾年㑹言路申七十之制君官簿適及即為納禄計再就祠禄又授議幕皆非其志也呉門苦旱嘗躬禱于横山龍母祠有隨車之應都城延燔之後人情未定秀亦連歲大旱公憂惴尤甚若任其責者率里人禱于道宫極其精誠至四晝夜雨為霈然既病猶以裕民之要聞于廟堂丞相擊嘆致謝少師在番禺羅致洪忠宣公長子适為屬丞相文惠公也仍命君定交共處郡齋文惠入相然後引之退然惟循塗守轍而已入仕甚早重去親側居官之日可數若刲股以救越國之疾執親之喪號慕幾致滅性皆人所難誦列子如流達其㫖奥尤喜讀通鑑策其治亂原委往往懸合嘗論太湖高于運河當疏霅川浦漊之要者庶無饑歲後湖守得其説為之果有功焉少師敭歴最久非令甲當給者悉不取閒居又戒與民爭利君守遺訓惟謹歲歉或食不足未始以語人也取友必端志趣相投一見如平生歡苟非其人雖强附弗與年甫弱冠夜聞有溺于江者竭力拯之從叔希文以窮來歸少師解衣推食君又為畢其喪葬婚嫁事隆興二年金人犯淮少師守鎮江警檄交馳君日視烽火安危之報多至夜䦨軍士有失號者法當誅君黙念之㝷訪而還其人少師喜為似我也明年凶荒之後饑􅥌盈路嬰孩悲啼不忍聞君取道旁數十人育之皆遂全活既長男女各有所歸或詢訪其家而還之好周人之急假貸亦隨力而應之施藥餌以濟貧疾歲時酒炙以遺鄰里先有小圃相羊其中客至稱家有無歡宴終日不倦蘇氏女兄既寡奉之盡禮晚年姊弟合處夫婦垂白子孫衆多簪紱滿前雍睦之風鄉閭稱焉又以平日見聞為覺齋見聞録病中呼子弟戒以孝弟保家終制從約書四句偈以見志幼嘗有得于佛書長從大慧宗杲游且死猶誦杲舊所遺法語而逝是皆可銘銘曰惟方叔之在周兮以壯猶而為勇子孫蟬聨兮見衣冠之光寵元英出晚唐兮擅詩名而最重六傳七傳兮為名臣于我宋仰少師之深仁厚義兮有盛德之邁種禱祠求子兮感精神于吉夢君之初度兮信釋氏之抱送宇量是似兮惟慈顔之是奉孝弟根于心兮利欲不為之動推是心以往兮仁將不可勝用源流老蒼兮學無不綜䇿千古之治忽兮寤沖虚而成誦小試雖不得騁兮著聲望之已聳片言可以折獄兮幾空庭而無訟蹇挽須與扣閽兮何不約而有衆致甘露之下墜兮著碧梧而流湩懷憂世之心兮不敢諫而以諷吐其一二以自見兮言必有中悲長者之云亡兮非夫人之誰慟幸相從于九京兮依世上之丘隴詩以颺之兮顧何取于折衷尚後之人傳業兮庶家風之接踵知鍾離縣姜君墓誌銘嘉泰元年春姜君子謙赴鍾離既餞之又為攷濠梁故迹為大篇以贈别所以期之者甚逺也明年冬初其兄鈐轄子陽來見涕泣而言曰鍾離弟將亡矣以書來相報亟往赴之袖出其書言甚悲而不亂謂得疾之不可為而復甦殆不可免婦弱子幼非兄來不可其末猶曰見攻媿尚書為致永決之意鑰為之失聲而泣然猶冀其無恙也未幾而訃至比間關扶喪以歸往哭之哀見其遺書一卷甚備又曰求攻媿數語以表吾墓其友袁木叔槱又得書云欲懇攻媿求銘而孤介能自植立不肯頽墮惟子深知我望與發揮之嗚呼子謙死生之際不亂如此而何拳拳于我之銘將葬木叔為述其平昔大槩文核而事實子陽又以見屬余不得而辭也君諱柄子謙其字也家世汴京曾祖侁故右侍禁閤門祗候贈武德郎祖寛故成忠郎閤門祗候贈吉州刺史以靖康避地始徙鄞今為慶元府人父浩故武顯大夫累贈和州防禦使君既升朝改贈宣奉大夫母朱氏仁懷皇后姪也封宜人累贈碩人君初以世賞補承節郎監潭州南嶽廟秩滿充樞密院準備差使淳熙十二年轉保義郎監行在豐儲倉丁宣奉公憂服除辟差監婺州蘭谿酒庫十六年覃恩轉成忠郎紹熙四年轉忠翊郎是年登進士科改授承務郎知臨安府於潛縣丞五年覃恩轉授承事郎慶元三年轉宣教郎知濠州鍾離縣五年轉奉議郎以疾卒于縣治十月四日也享年四十有九娶魏氏丞相文節公母弟知寧國府涇縣梠之女封孺人男一煓女二長許嫁迪功郎新黄州黄岡縣尉司馬遂三年九月乙酉葬君于縣之豐樂鄉東山唐家隩之原從治命也初姜氏之富甲于京師而喜延名儒以立家塾宣奉記覧多聞教子弟尤力兵火流離貲財蕩盡銖積寸累以立門户雖事力不及上世之一二而儒風寖昌矣宣奉之弟諱濤始登科于紹興十二年終諸王宫大小學教授君與四兄皆朱出模四取漕薦棫蒙孝宗召對特除閤職樸雖抱疾不仕其子有場屋聲桐即子陽也與君同升禮部君最幼一再垂翅南宫必欲以科第發身感慨奮發蚤夜力學不知饑渴寒暑蚊䖟噆膚洛誦不輟謂事不成則無靣目見先人于地下卒遂其志又與子陽之子光同登後六年光之弟燧復躡世科目爾兄弟之子薦漕臺登胃監人太學者相繼實自君興之在密院時已名薦書不以官卑而辭勞近郡有禁卒犯階級而主帥不以實聞君上書樞密使周益公謂軍政不修緩急何以使人語苦切益公大竒之宣奉之喪或言可免解官者君曰吾忍為此哉倚廬三年哭不絶聲不茹葷亦不入于家寺丞吕子約時仕于明見其居處容貌愀然動色遂相與討論喪禮洗末俗之陋後數年貽書朋舊猶曰君執喪有禮足勉世俗士友所共欽也君資素警敏初止鋭意舉業年二十六七翻然自以昨非為悔有志于古人為己之學折節虛心親近師友里社先達及四方賢士大夫遇之必斂袵求益反覆叩請其在蘭谿與婺女諸賢尤稔陶染既久懲忿矯薄見于踐履臨事規規典刑中其進殆未已也於潛巖邑士風久不振君之邑庠為選士之秀者補弟子員每旦升堂講書校藝皆有尺度口授指畫與士日親期年而向學者彬彬然鄉舉占名者三而登第者二尹光庭者名在第五邑人榮之相語曰贊府作成之倡也昌化為鄰舊許民釀酒而輸賦于官有議欲􅅦酤者衆訴于府尹以屬君或謂出于朝㫖且欲以裨郡計君曰此實民便安可漁奪卒免之老稚歡呼爭繪像立祠君力止其議尹益重之檄入僉幕贊助為多君本以鍾離事簡而往而訟牒紛委不減内地君疚心剖析日力不足夜以繼之内和外剛勇于為義人不能奪有獄吏罪惡貫盈而持吏短長不能去有盜牛馬者就逮已得其情而輒翻異君曰必吏教之也一鞫而服白于郡竄之逺近無不快之或言在君左右者皆其黨恐有為之報者君不為動吏民聳服聲聞煒然外臺多以滯訟相委隨即剖決總領韓公亞卿以文章政事科薦于朝郡太守尤加敬異應用之文又以屬君體素弱撫字已勞而種學績文畧不少懈縣事畢舉而君病矣君生長膏梁而丰度高勝簡澹清苦無聲色之奉又不喜飲酒藏書數千卷凝塵滿室蕭然如物外人即所居超蓮堂池西累石創亭名曰磻隖時從雅士徜徉其中坐無雜賓尤工小楷作詩清婉有思致文節公于詩少許可閒居惟雪牕張武子為山中客碧谿泉石勝絶君每至甥舘遇遊賞必參坐論詩善與人交同寮相與如至親疾既侵至相率寢食于縣齋醫禬盡力前數日即命妻子治後事已而屏人危坐既為子陽書又書以與親故人人致訣别之意作偈以寄禪衲之厚善者大書數紙以戒其子弟區處細故纖悉明白意象正大思深而見逺皆平時薰染講切見于躬行者如此可以信君之所存而推見其所未為者其亡也邑人為之聚哭喪歸鄉曲無不為之痛惜者哀哉銘曰嗚呼子謙是好名耶躬行自立疾沒世而無稱耶以其學力致其身起其家施于政事末而見于死生之際足以不朽矣而何待于余之銘耶余方畸于人無用于世吾何足為九京之重輕耶顧言猶在耳遺墨未乾余不得而黙然悼痛之深將何時而卒耶攻媿集卷一百六
