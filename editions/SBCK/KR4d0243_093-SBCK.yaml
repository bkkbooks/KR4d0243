body:
  text: 宋樓鑰撰神道碑純誠厚徳元老之碑保寜軍節度使致仕魏國公奉敕撰案標題一作太師篇中親灑宸翰云云則此為當日原題諡文惠追封㑹稽郡王史公神道碑據髙宗皇帝以孝宗君徳日就將屬以社稷妙選天下學行端粹之士以輔導之紹興二十有九年太師㑹稽郡王史浩以國子博士奏事殿中髙宗一見契合屬目送之諭大臣曰浩今日有用之才也除秘書省秘書郎粤五日兼普安郡王府教授受知髙宗被遇孝宗實昉于此明年孝宗封建王遷司封員外郎兼直講又明年爲宗正少卿三十二年五月立皇太子擢起居郎兼左庻子六月孝宗受内禪遷中書舍人兼侍讀十日爲翰林學士知制誥八月參知政事明年正月拜尚書右僕射同中書門下平章事兼樞密使未幾罷政再典巨藩淳熙四年春召爲侍讀五年三月復拜右丞相十一月罷仍侍經筵八年告歸得請一再召見恩賚罙渥每以老先生呼之孝宗移御重華宮以宴處清閒思見舊學太上皇為攽詔諭賜御札明年遣幹辦御藥院楊舜卿撫問趣行命守臣以禮津發既入覲孝宗顧公曰卿輔朕初潛親遇朕建朱邸陞儲宮登大寳两居相位三入經幃逮今三十餘年君臣相得殆非他人比也五年四月五日公薨于里第之正寢訃聞孝宗上皇震悼賻贈有加有㫖以公身居極品又為夀皇潛藩舊學贈䘏之典宜從優異可特追封自餘賻葬恩數並如陳康伯例今皇帝登極賜諡文惠親灑宸翰書純誠厚德元老之碑以賜焉且命臣鑰為之文臣以末學待罪北門乃得對揚明命敷述盛美以詔不朽臣雖甚陋何敢辭竊伏思自古君臣以遇合為難而篤眷不替善始以終殆千載而不一遇也方孝宗以藝祖統系之逺承髙廟付託之重時公以所學糾正贊弼自其緝熙光明推而至于事親以孝事天以誠兵不輕用刑不妄施人才盛多夷夏乂肅孝宗繼志述事之功承顔順色之愛刑于四海光于萬世而又惠顧帝師日篤日親胙我太師福慶流衍光大顯休追嫓典謨孝宗奄棄慈極公先六旬以遺表聞嗚呼豈偶然哉公諱浩字直翁世為慶元之鄞人曾祖簡祖詔父師仲俱贈太師冀國公曾祖妣葉氏祖妣徐氏妣洪氏俱贈冀國夫人曾祖蚤卒母葉夫人有遺腹指天自誓願得子以續史氏之祧是生公祖教之甚嚴以八行薦于朝積徳垂祐寖大其家仲子才紹興二十三年為簽書樞密院事公又繼登揆路衣冠盛事莫尚焉公性穎異記誦絶人少孤自力于學貫穿經史理致超詣措詞持論出人意表年四十始登進士科授左迪功郎紹興府餘姚縣尉尋為温州州學教授郡守張九成有重名待以國士諸生推崇之以中書舍人吴秉信薦除太學正遷博士改宣教郎自此六年以至相位近世未有也公智慮深長臨機輒斷平居若不勝衣而剸裁勇決毅然不可囘推究經㫖多先儒所未發引經處事動中要領完顔亮南牧邊廷用兵建王抗疏請為前驅誓不與賊俱生公方以疾移告聞之亟往問孰為大王計誤矣國歩方艱父子豈可須臾離使唐肅宗能隨明皇幸蜀安得有靈武事建王大悔立俾公草奏請扈蹕以供子職辭意懇到髙宗聞議出于公歎曰眞王府官也廟堂方議以建王督師由是不果遂從視師之行而内禪之意決矣髙宗將過徳夀宮公議嗣皇當乗馬扶輦髙宗諭公曰執鞚前導不足為法公對曰臣于肅宗何取父行而子隨萬世不易之道也孝宗竟用公議髙宗數遣使邀還出皇城門而止既參大政召宴禁中公奏臣頃在翰苑雖暮夜宣召可也今居政地非有中使不敢前若恃恩奔命非大臣體孝宗深然之嘗問當今施設何先公曰莫如保邊境收人才前言辛次膺張燾人望所屬即日召還又薦周葵任古胡銓張戒王十朋等以次收用公平時咨問天下人物有所聞密疏其實且識言者録為一編皆于此乎取又得金安節王大寳周必大等三十五人各書所長以聞並為時用嘗對徳夀宮髙宗曰皇帝誠孝卿輔導之效居多今又得卿佐之朕心亦安又曰卿為皇帝親臣凡有規正不可囘忌賴卿悉力調䕶公既推謝次日又因奏事言之上封事者多乞減任子公請嵗一試且損其額試者必習所業以應詔既不傷恩足以激厲孝宗顧左相陳康伯議合公因奏凡有所陳皆先與丞相議而後言自是臣僚奏請更改政令必先以示公然後施行嘗因諌擊鞠事張燾共政退而曰相公愛君至矣燾又嘗語人曰參政今之賢輔不可妄議向來柄臣得君多以威嚴脇人史則不然事多迎刃而解志于寛厚上前别白是非甚明宰相器也康伯乞罷政孝宗批問恩禮已盡當與何職意蓋屬公也公即奏康伯前朝老臣不可不留以為重若其請未已必得徳夀聖諭可安其意是日髙宗賜以御筆康伯乃安職尋密詔公曰朕粗勤庻政然軍務民事未得其要若礦金璞玉方以卿為良工其毋怠焉公既相益思所以報上者首言前宰相趙鼎參政李光之無罪大將岳飛之久冤宜復其官爵録其子孫凡坐廢者次第昭雪悉從之時外建都督府歸正人及諜者日衆公雖憂之而深察其能否故拔皇甫倜于境外官胡昉于書生皆賴其用有滕忠信等八人還自山東自言已結集萬五千人可為内應公詰問再三皆無其實語塞汗下而退初已借閤門宣贊舍人遂令赴督府張浚亦以其無證僅補承信郎而已燕人劉藴古該通古今談辯如流一日濠州奏募到北方游手僅萬人欲以營田藴古力請以抗敵時欲許之公獨謂此必姦人姑欲藉以反其國耳因詰之曰樊噲欲以十萬横行匈奴季布猶以為可斬君得萬人何以成功藴古錯愕不知所對曰此皆無家必不為朝廷留不如乗其未定而用之公曰其家不來宜無固志不知君家何在藴古曰老幼皆在幽燕自知失言戰灼久之後因刺探事宜私遣僕歸燕僕以告遂伏誅吴璘以兵取徳順㨗至方議行賞公奏諸葛亮出師必攻陳倉及郿即今之鳳翔得之則可窺長安髙祖出漢中正此道也姜維舍此而多出隴西狄道臨洮得之無益今乃蹈維覆轍臣恐遂失蜀矣宜勉諭其歸登命公即選徳殿廬作詔令徹戍班師專保蜀口以俟大舉斯須而就詞㫖明暢孝宗閲之曰他人必不能道朕意竒才也既而吴拱王彥奏敵已扼璘歸路方募人往報璘亦勢迫間道以歸袁孚罷右正言公曰初政而遽去諫官何耶孝宗曰妄言徳夀宮有私酤公曰陛下事親可謂曲盡然宮中左右皆閹官有何知識若非言路時以正論折其萌則將有甚此者上怒少霽又奏諌官無故而罷天下必以爲疑若暴其罪恐啓兩宫之間願少須之使其引去尋除直秘閣知温州自是益無纖芥之隙張浚屢奏欲取山東公曰宿師于外守備先虚我能出兵山東以牽制川陜彼獨不知警動两淮荆襄以解山東之急耶惟當固守要害為不可勝之計必俟两淮無致敵之慮然後可前若乃順諸將之鋭氣收無用之空城宼去則論賞于朝宼至則僅保山寨顧何益乎繼而大將李顯忠邵宏淵奏乞進兵公又奏二將輒乞戰豈督府之命令不行耶浚繼請入覲乞即日降詔幸建康孝宗以問公公陳三説謂若下詔親征則無故招致敵兵㓂邊何以應之若巡邊犒師則徳夀去年一出州縣供億重費之外朝廷自用緡錢千四百萬今何以繼若曰移蹕欲奉徳夀以行則未有行宮若陛下自行萬一敵人有一騎衝突則都城騷動何以處之孝宗感悟曰都督先往臨邊俟有功緒朕亦不憚一行浚言陛下當以馬上成功豈可懐安以失事機公執不可退又以詰公公曰帝王之兵當出萬全豈可嘗試而圖僥倖主上承二百年基業之託漢髙祖起于亭長敗亡之餘烏可比也尋復論辯于殿上浚曰中原久陷今不取豪傑必起而收之公曰中原决無豪傑若有之何不起而亡金浚曰彼民間無寸鐵不能自起待我兵至而為内應公曰勝廣能以鉏耰棘矜亡秦彼必待我兵至非豪傑矣若有豪傑而不能起則是彼猶有法制維持之未可以遽取也今不審思將貽後悔又上疏力諫曰靖康之禍臣子孰不痛心疾首思欲蹀血北廷以雪大恥恭想宸衷寢膳不忘然邇安則可以服逺若大臣未附百姓不信而遽為此舉安保其必勝浚老臣慮宜及此而溺于幕下新進之謀􅅭于北人誑惑之語是以有請耳徳夀豈無報敵之心時張韓劉岳各擁大兵皆西北勇士燕薊良馬猶不能進今欲以顯忠之輕率宏淵之寡謀而取全勝可乎惟當練士卒備器械固邊圉蓄財賦寛民力十年而後用之則進有闢國復讐之功退無勞師費財之患此臣區區素志實天下之至計也督府乏用欲取之民公曰未施徳于民遽重征之恐外賊未必至民貧將自為盜康伯與公相顧同奏曰必欲取于民臣等皆當丐退上為之給虚告五百道以庚費浚又奏歸正人當優待之公以為不可浚康伯俱曰彼以善心至安可拒乎公又两入奏其一曰敵日為姦謀以撓我縱流民以困我而沿邊方以招徠為功數年之後蠶食既多國用益乏彼將反有怨悔之心可不逺慮乎固不可絶其内嚮之意其有至者當諭之使安土以俟恢復彼且無所歸怨而敵亦知國之有人豈應先為自蹙之計其二曰棄實而務名捨近而謀逺見利而忘害願棄名取實以集大勲先近後逺以安邊鄙見利思害以杜亂萌言甚切至又與浚言平時願執鞭而不可得幸同事任而數日議論不同不惟為社稷生靈計亦為相公計相公養成名望一旦失利豈不有損威重浚曰公言良是但浚老矣公曰杜預輩有平吴之功而晉歸功于羊祜以祜立規模而預竟其功相公若先立規模後使人藉是有成亦相公之功也何必身自為之浚因内引奏曰史浩意不可囘恐失機㑹乞出英斷既而省中忽得宏淵出兵知稟狀始知不由三省徑檄諸將公語康伯曰吾屬俱兼右府而出兵不得預聞則焉用相哉由是求去不已孝宗曰何苦至是公對曰道徳元老無如陳康伯忠義慷慨無如張浚臣與之議論俱不合諸將出兵而臣不知近習積憾而臣不去尚何待乎因又言康伯欲納歸正人臣恐他日必為陛下子孫之憂浚鋭意用兵若一失之後恐陛下終不得復望中原臣即日去國遂逺清光然惓惓之忠不容緘黙言訖拜辭而退遂以觀文殿大學士知紹興府公力辭提舉臨安府洞霄宮以歸未及月而宿州失利䘮士馬甚衆軍資器械不可計人心沮喪上降詔罪已而浚亦自劾去位矣初浚措置萬弩營及他所建請公應之如響或問之公曰事力未備故止其進兵若邊防捍禦安可不從公既去其所奏請多不以時報浚亦悔之嗚呼公本欲修政固圉裕民練兵雖不求近功而規模甚逺議者不察以爲獨無意于事功惟知之者乃信其非苟爲異也公卜居東湖之麓徜徉山水勝絶之地以奉親歡嵗時賀表外不以一字至行在所後除四川制置使知成都府以親老辭月餘改知紹興府兩浙東路安撫使孝宗見公首曰卿前所奏陳如􅀛兆數計無一不驗從容賜坐訪以治道公以求治太速聽言太雜爲對至鎭為民興利除害不可縷舉越人至今徳之進檢校少傅領保寧軍節度使㑹洪夫人屬疾思歸力丐祠不允乃許謁告迎侍未幾罹内艱公性至孝平日奉母甚周孝宗素知之在王府時得上方珍饌必以分遺登位之後間問動静以正旦賜酒肴使為夀特于洪夫人生朝拜公為相又嘗以御筆徑賜之曰丞相今日正謝賜酒果為太夫人之慶其歸自帥閫旌旄行前公擁版輿于後人子之榮極矣至是悲毁骨立忍哀舉葬纖悉周備世所難及前即吉數日除知福州兼福建路安撫使避魏王同鎮改崇信軍節度入對賜宴内庭勞問加優後三日除開府儀同三司公自言臣何功徳叨此眷寵孝宗指心而言曰于此甚有功朕學力堅固心術明正皆卿之力也初過越老穉迎拜擁道有垂泣者時方滋為帥謂公曰公去此時有緡錢十六萬米斛四萬漕司取充羡餘遂為嵗例奈何公奏除之至閩甃山路七百餘里葬旅櫬以千萬計闢官舍以益貢闈每事立規四方傳以為式建劔四州多不舉子臧獲則取于福與漳泉間公置田為莊貧婦孕育月有所給既使生齒益繁又免誘畧之害淳熙元年秋丐祠提舉洞霄宮後三年孝宗問執政久不見史浩無他否遂除少保觀文殿大學士充醴泉觀使兼侍讀頗聞有尼之者至两降親批三遣金字牌又取尚書省移文封以付公不得已而後起抵都城聞輔臣謫英州及見奏曰陛下未嘗以大臣投嶺南實國家忠厚之意此門恐不可開孝宗唯唯他日語近臣曰史浩厚徳人蓋深知前日事也進讀三朝寳訓及眞宗正説事闗治體及當法祖宗者必委曲援引開廣上心嘗宴澄碧殿酒數行步至清激觀機泉宣勸無算至二鼓孝宗攜手登橋又賜三爵命宿玉堂夜參半引雙蓮燭以送且曰此游不可無紀是夕公進古詩三十韻孝宗和答之引陳襄故事薦石斗文等五人皆赴闕既再相孝宗曰自葉衡罷虚席以待丞相久矣與執政入謝徳夀宮髙宗曰卿再入相天下之幸也公以士夫留滯旅寓者凡八百人各隨其分處之為之一清初相時蜀帥以緡錢獻公謂宜以儉徳風天下請以賜蜀郡復二税是年紹興所獻復倍此孝宗曰郤之必有散失姑令封椿如何公對曰郡方困于和買丁錢願以代輸其半孝宗欣然從之是年金歴以八月晦為九月朔或言㑹慶節使人將先一日入境請治歴宫公曰天道難測未知孰是而遽治歴官是自彰其失也但當諭接伴使若使人渡江則當語以晦朔尚可議皇帝生辰則不可改先一日乃是藝祖忌後若欲行慶禮當如舊期孝宗以為當後皆如公之言車駕既幸太學公因請幸秘書省三衙皆與坐乃奏閤門舍人方以比館職亦當列于西廡崇儒矯弊皆有深意孝宗謂公視文武如一為得大體十月諸軍以多闕額又有逃亡請得自招捕許之而並縁强取被掠者或至斷指以求免都下洶洶公飛奏盡釋所捕又禽為首者送棘寺宣宰輔及樞密都承㫖議罪欲取兵民各一人梟首以徇公謂未得其平兵士可斬百姓陸慶童當坐流罪上怒不以為然公曰陛下恐軍人有語而百姓為可欺耶豈不聞等死死國可乎此豈是軍人語上愈怒曰是比朕為秦二世也同列相顧失色公徐進曰如時日害䘮予及汝偕亡豈二世事聞者縮頸而公不為動議罪既如初遂日求去位除少傅保寧軍節度使醴泉觀使兼侍讀後有言慶童之冤者孝宗曰史浩蓋嘗力争坐此求去至今悔之賜第城中出御製長春花詩酬和至再以示眷留之意又薦薛叔似而下十五人叔似召用餘以次收擢佑聖觀故建邸也孝宗嘗自北宮臨幸語曰去此十七年今得與卿為豐沛故人之飲可謂盛事甘盤無此樂也公屢求歸時陳俊卿已奉祠八年二月除判建康府公奏俊卿年未及七十而去臣以七十有六而往豈不媿見吏民耶孝宗嘗自擬館職䇿極言取士用人之􅁦大要謂國朝過于忠厚以示公公讀畢奏曰太祖不忍殺一不辜以得天下累朝仁徳至仁宗而大備夫忠厚豈有過耶乞改曰一于忠厚孝宗曰非卿不能為此言五月始許歸除少師留至八月陛辭猶進八事十年請老除太保致仕公嘗歴永衛魯三國公于是進封于魏仍如曾公亮例入謝明年先降㫖候至國門百官郊迎見畢對御賜宴用文彦博故事道中具辭再三奉俞音乃絶江公晚治第西湖之左裒两朝所賜御書建閣以奉之因奏聞孝宗書明良慶㑹之閣以賜公謝不敢當孝宗曰古人願為良臣卿輔朕之久日聞忠言深悟朕心尚何慊乎敕後苑造扁榜命中使馳賜之上嘗以舊學二字即政事堂賜公同列咸曰自古際遇莫盛于此請鑱諸石爲省中榮觀公又謝不敢既歸以名其堂嵗遇誕日錫以金器者十四年年八十又加器寳兩宮使命相望髙宗再舉慶典詔公隨班上夀進太傅賜玉帶金魚踰月乃東上皇御極進太師降詔求言首及故老公上封事數千言皆當世要務重華之召引辭甚切孝宗誥曰今與卿皆閒人當衣褐見何必求免耶詔乗肩輿入隔門仍命孫定之扶掖特改京官朝退次詣重華孝宗從容謂公曰與卿復得相見既無嫌疑足可爲度暑計毋亟言歸因奏陛下躬行三年之喪復見堯舜三代之盛孝宗曰此皆卿平昔所以語朕者今日得以行之正如滕文公盡哀戚之情而弔者大悦實自然友反命之一言蓋公平時專以忠孝二者發明聖學謂父子天倫雖自有至性亦宜先意承志曲盡誠心後又屢奏欲報莫大之恩惟應尊事不倦使慈孝两盡為萬古父子之懿範垂之子孫永永無極故孝宗不忘此言再對奏陛下召臣非徒使霑被寵光亦恐有一得之愚少裨繼明之治敢為四説以獻曰立天下之大本平天下之隱難收天下之人望伸天下之直氣謂教皇子備夷狄舉人才受盡言也太上垂聽慰奬再三既歸之次年長子彌大以疾不起公起居寖衰後感疾危甚呼諸子及孫戒曰吾受國厚恩欲報無所汝等惟當世竭忠節以圖尺寸命左右取手藁遺表曰吾且死其以是進遂瞑享年八十有九娶貝氏追封魏國夫人先三十九年卒子四人彌大故通奉大夫充敷文閣待制新知寧國軍府事贈銀青光禄大夫彌正朝奉大夫復直祕閣主管華州雲臺觀彌逺朝奉郎主管建寧府武夷山沖佑觀彌堅通直郎两浙路轉運司主管文字彌大彌逺皆登進士第彌正彌堅亦累舉春官人以是服公之教子也女五人長適朝請郎新權發遣永州軍州事陸杞次適從事郎充江淮荆浙福建廣南路都大提㸃坑冶鑄錢司檢踏官豐謙次適朝請郎前通判湖州軍州事李友直次適迪功郎新荆湖北路提舉茶鹽司幹辦公事夏鼎次適承議郎簽書寧海軍節度判官㕔公事王橚孫十二人宗之通直郎改添差沿海制置司幹辦公事宜之宣教郎知臨安府富陽縣丞定之宣議郎新知婺州蘭溪縣守之承事郎前監平江府糧料院安之迪功郎温州瑞安縣主簿實之修職郎監紹興府和㫖酒庫宣之憲之寯之寛之崈之賓之孫女十五人長適奉議郎新知建康府上元縣方叔恭次適通直郎新知明州鄞縣丞吴樸次適宣教郎前知湖州武康縣丞秦鉅次適宣義郎新監臨安府仁和縣臨平鎮税胡綱次適修職郎新秀州華亭縣支鹽官王友元餘未行曾孫八人唐卿虞卿文卿夏卿商卿周卿漢卿顯卿曾孫女十人皆幼以其年十二月庚申􅁙公于鄞縣翔鳳鄉吉祥安樂山合魏國之兆公盛徳絶人備福無比蓋嘗竊窺其大者性本至孝有不可解于心故為士時惟見其事親事長篤朋友鄉黨之義及出而事君則盡其忠謀國則竭其慮接物則極其寛臨事則務于恕匹夫孺子不失其懽心而義有不可不以死生禍福少變率自孝道發之君臣道合脗然無間蓋近古人主躬行通䘮自孝宗始而公又以此事之其能不膠漆而固豈無所自哉孝宗嘗謂公曰卿所薦用人其間有負卿者亦知之乎公頓首曰此臣所以報陛下也臣所薦未嘗以語人亦不受其私謝故人人自以為得上意薦賢者臣之責用賢者君之恩也嘗擬知湖州陳之茂進職知平江孝宗知之茂嘗毁公曰卿豈以徳報怨耶對曰臣不知有怨若以為怨而以徳報之是有心也莫濟作詹事王十朋行狀詆毁尤甚公薦濟掌内制孝宗曰濟非議卿者乎公曰臣不敢以私害公遂除中書舍人兼直學士院待之如初蓋公之寛厚類此人雖有不悦然無物可以忤意古人所謂澄之不清淆之不濁雷霆破柱而神色不動者猶未足道也公既極貴處鄉曲一如布衣時每以事親為未足又推本史氏積徳累行之原自為之文時節誦于家廟上以報祖考之施下以勵子孫之習其用意篤矣事物之來不問劇易雖至難甚宂或連日夜廢寢食而精神酬應益有餘裕攷其克勤小物凡事精密園館器用動出新意其在富貴中望之如神人而謙虚退然若無與者野服蕭散皆不足以累其中此如萬斛之舟容物有餘不見其多而經濟之業則用之猶未盡也而又居權之日少安佚之日長故舉世無怨無惡惟以鉅公大度推之生榮死哀無可憾者公屬文多立就雖老表章猶自爲之有文集五十卷外集二十卷論語口義尚書講義周禮天官地官講義傳于世餘皆公之細也不勝書銘曰於皇髙宗天開中興鞏宋基業思永繼承藝祖七世有孫神武是用付託纘宋之緒髙宗曰嘻帝命不易我儀圖之謹厥輔翼孝宗武文實惟承之雍雍太帥實維成之帝咨臣弼一本于學緝熙光明徳修罔覺两輔予政毋輕黷兵毋過取民毋濫用刑言如蓍􅀛靡有差忒旁招多士寧我王國天地清夷中外晏然繼志述事二十八年两宮燕娱天夀平格三奉玉巵四登寳冊召對徳夀嘉帝之孝又曰太師輔翼之效帝謂聖父教誨之功臣亦歸美媚于髙宗天用昌之耆艾康寧帝用休之福禄寵榮孝宗乗雲太師騎箕君臣始終雖恨莫追有赫景命湯孫是纂顧瞻遺烈于以追逺錫之篆碑孝宗有臣報我天子詔爾後人忠文耆徳之碑撰者同在當日原題應只此六字奉敕撰案標題一本與後卷自嘉泰四年十月庚寅朔故左丞相少傅觀文殿大學士益國周公年七十有九薨于吉州之里第十二月丙申􅁙于廬陵縣斗岡之原至嘉定元年公之子綸告于朝曰先臣備位首相既􅁙而隧碑未立敢泣以請天子曰嘻此四朝之宗臣也諡以文忠御書忠文耆徳之碑以賜且詔臣鑰為之文臣鑰不侫荷文忠公知奬之深屏居四明先已撰公隧道之碑矣聖恩起于告老之餘待罪翰苑欲引前碑以辭綸又曰昔歐陽公修已銘程文簡公琳之墓復以敕命為之碑故事甚切願毋辭臣既共二史館敢不敬承明㫖以答孝子之請以揚公之休光用詔後世公諱必大字子充一字洪道世家鄭州之管城曾祖衎朝奉郎妣郭氏祖詵左朝散大夫妣潘氏李氏張氏父利建左宣教郎太學博士妣王氏公既貴三世俱累贈太師秦國公妣俱贈秦國夫人宣和中祖通判吉州因家焉公幼而孤十三又遭内艱天資髙亮記問絶人紹興二十一年擢進士第授左迪功郎徽州司户參軍改監行在和劑局門二十七年中博學宏詞科建康府府學教授三十年除太學録召試館職髙宗見奏篇曰他日可掌制除秘書省正字次年改左宣教郎兼權國史院編修官明年五月除監察御史六月孝宗即位八月除起居郎直前奏事上曰朕舊見卿文可進近作兼編類聖政所詳定官暫權給事中兼權中書舍人嘗論翟婉容位官吏轉行礙止法事上曰初止謂卿能文不謂剛正如此此其被眷注之始也應詔條上十事皆切時病其一嚴銓試之法又奏羣臣六參除朔望過宮外勿改舊制至今行之事有未便者不憚極論上亟奬歎公亦曰陛下有納諌之資故臣輩各思自竭龍大淵曾覿除知閤門事公與給事中金公安節同奏大淵罷副都承㫖覿罷帶御器械俱為知閤若以攀附舊恩尚有可諉正以搢紳指目臺諌有言外議方喧而除命遽加非舍己從人之義有㫖罷劇就閒己允公論尚茲回繳可特依奏既而再除公曰前已反汗今復申命豈復但已格除目不下越三日不獲命以遷奉請祠两任主管台州崇道觀乾道四年權發遣南劍州未赴六年改福建路提㸃刑獄公事陛對留為秘書少監兼直學士院兼國史院編修官上改告詞首尾公奏陛下取漢宣帝之意親制贊書臣觀漢社稷臣乃在周勃汲黯霍光之徒儒者公孫􅀪輩皆持禄保位故宣帝以為俗儒不達時宜使宣帝求眞儒用之何至雜霸哉上曰卿學術精深記問該博所藴可以自見當日夕與卿論文兼實録院檢討官加上徳夀尊號公謂太上萬夀而紹興末議文及近上表用嗣皇帝爲未安按建炎以後遥拜徽宗表及唐憲宗上順宗尊號冊文皆稱皇帝議遂定七年奏四事重侍從以儲將相増臺諌以廣耳目郎官專以旌外庸監司郡守皆當久任上稱以爲要務兼權兵部侍郎上云學士院湫隘公奏宫城不容増廣陛下欲卑宫室臣等居此亦過矣若遴選名儒而信任之不在棟宇之麗也除權禮部侍郎仍兼直學士院陞同修國史實録院修撰有㫖公與吏部侍郎王之竒太子詹事陳良翰對選徳殿出御札引唐太宗魏徵問對以在位之久功未有成治效優劣苦不自知使各極陳其當否公退而條陳練兵以圖恢復而用將之道未盡擇人以守郡國而責實之方未至又指陳大將郡守數易之􅁦且言貞觀政要四十篇既先之以魏徵論為君之道又著不克終之戒于篇末蓋是時惟徵為善諌願思太宗廣諫諍之徳使嘉言日聞治道日興上嘉納又奏諌官虗位願蚤擇正人先朝參用古制卑其品而厚其禮責其盡言使姦邪望風畏戢銷患未形如近嵗張松韓玉等使臺諌無所顧忌蚤為力言豈至勞民費財始勤英斷上曰朕自此知戒矣又奏曰人主無職事惟在察臣下邪正凡輕于任事速于求售者必至敗事若疑儒者不足用而專用才臣今既累年其效可睹唐太宗之臣即隋之臣藝祖之臣即五代之臣非前愚而後智顧人主用之如何耳又論臣寮務為新説欲徼竒功王安石以堯舜之道告君實行管商之術指司馬光蘇軾輩為流俗尤當察之江湖亢旱上稱龔茂良措置有理公請出緡錢二十萬代民租乃不乏事非不知縣官急闕然艱食則盜起盗起則調兵費可省乎上曰卿議論殊善使朕聞所未聞兼侍講又奏近奉詔以僕射名官非古欲更其名周之太宰卿也小宰中大夫也中間所改非是上曰止欲為左右丞相如同中書門下平章事皆可削公遂奏前古沿革而退八年兼中書舍人固辭且言外制之設正欲謹于出令凡有未當欲其繳奏非專責以詞翰也卒因繳奏而遂免兼張説再除簽書樞密院公當草不允詔奏謂昨者舉朝以為不可陛下欣然聽納曾未周嵗復有此除貴戚預政公私两失臣未敢具草時權給事中莫濟亦封還御筆遂俱與外祠九年除知建寧府再辭不許中道引疾提舉江州太平興國宮天下愈髙之淳熙元年除右文殿修撰説罷召為敷文閣待制兼侍講六月兼權兵部侍郎八月兼直學士院上嘗稱公持重不迎合無附麗除兵部侍郎兼侍講進太上尊號詔草上曰此文難于言而温純典雅無一字可議公奏初上光堯之號臣已預議庚寅之詔亦出臣手上愕然曰前詔亦卿所草耶兼太子詹事嘗論用人惟上智與下愚不移中人惟上所御為官擇人則引中人為君子為人擇官則引中才為小人又奏聞陛下日御毬場固知不忘閲武然太祖二百餘年之天下屬在聖躬可不自愛上作色曰卿言甚忠正以讎恥未雪不欲自逸耳嘗奏聞金星近前星武士擊毬太子亦預臣甚危之上曰卿可語太子公曰太子人子也陛下命以馳驅臣安敢勸以違命陛下勿命之可也陞兼侍讀郊祀禋禮執綏備顧問除吏部侍郎奏朝廷守至公之道有司持一定之法行以無私孰不心服四年除翰林學士奏自唐至本朝優待詞臣以其無簿書之冗可以朝夕論思或有補于治道得人固多最可慕者陸贄歐陽修也五年為御試詳定官得㫖撰選徳殿記及皇朝文鑑序上尤稱之賜御書白居易七徳舞墨猶濕也除禮部尚書兼翰林學士嘗論本朝專以仁立國而又以禁暴安人為本上曰兵勢似弱公曰仁故似弱實非弱也社稷靈長職此之由上曰所以並無禍亂耳公曰本朝似周秦兵雖强興衰竟如何六年詔禮官詳議明堂典禮公定圜丘合宫互舉之議再執綏草赦明著古禮以示來世禮成獻詩又進動天之戒上曰動天誠當以徳惟知道乃可語此公曰皇天親有徳饗有道此豈聰明作爲所能爲哉除吏部尚書兼翰林學士承㫖論六部長貳判依字改爲從上謂公視草勞甚公奏臣素無汗馬之勞致此爵位宣力文字之間未爲勞也上曰翰墨之功豈小補哉若大述作固當煩卿七年五月除參知政事上曰卿遇事殊不依違宰執自當和而不同公曰韓琦歐陽修殿上日有所争退則歡然最爲可法大臣自應互相可否秦檜用事執政至不敢措一辭後遂以為當然陛下惟恐臣下不言人臣乃欲自是乎嘗極陳民困之由上問其故公曰且以平江府論之二十年前歸正添差等官嵗用五萬緡今已數倍民安得不困此特其一耳上為之悵然進呈湖北月樁錢數公曰固出于不得已亦須平時有以存䘏去嵗荒旱若非先事賑救禁戢苛暴何以免流殍之苦舒州汪革始謀不善若如前代失軍民之心則乘災唱亂必致蠭起亦安肯束身自歸于司敗所貴得民正為是耳此非倉猝所能成也上深以為然有恃長樂之援求為郎者上俾諭給舍繳奏公謂不可諭意不從則失體從之則壊法命下臣等自當執奏上曰卿等肯任怨如此公曰當與而不與則有怨不當與而不與何怨之云上歎曰所謂任責非任怨也九月知樞密院事上曰三省本未可輟卿每見難處之事卿以數語決之可謂敏矣上嘗歎養兵費邦賦之八公奏自古未有五十年屯兵不解古者講和則罷兵今既有嵗幣而兵不敢撤所以倍費上眷公益深嘗奏事退御筆卿臨事明敏而有決朕每嘉之又稱公通練軍政深副擢用之意公謝曰臣本以文墨受知豈曉武事誤蒙任使不敢不勉十一年御筆欲移興元義勝軍于襄陽此軍皆契丹渤海漢兒慕義來歸者上以金商山險非用騎之地聞其營砦遺火因遷之公奏路經金洋當先計人馬之數使郭杲于襄陽豫辦更令彭杲具以此意深察衆情六月拜樞密使上曰卿在西府光前絶後若有邊事宣撫使惟卿可為也先是金主避暑夀安過上京北牒以道逺權止賀正生辰使一年宣諭卿嘗料未必遣使今果不來可謂廟謨矣十二年金州謀帥公欲合侍從管軍薦舉上曰軍帥當自上除授公曰舜用九官皆咨四岳與其私薦不若明揚若能攷實孰敢妄舉因論邊報異同上奬諭云事無巨細卿皆究心昨密問一事條上數端深謀逺慮朕所不及也上謂王藺論事頗偏公奏藺雖稍過然汲黯在朝淮南寖謀盡言而不顧身帝之左右豈可無此等人況以獻納為職若上下相蒙非國之福也御筆嘗謂大石契丹欲加兵于金又諭結約夏國又有呼嚕竊據上京之報魯今改後同案呼嚕舊作忽公奏但當嚴備隨機應之未幾上諭公所傳皆妄眞有先見之明矣十四年二月乙亥面諭卿在樞筦事皆經心更旬日拜相後人難繼也丁亥拜右丞相尋兼提舉國史院㑹要所敕令所上諭以委任之意公奏自古鮮有無事時今賴陛下勤政内外晏然殆將二紀此正可懼之時當思經逺之計又奏舜禹君臣相戒唐太宗不存形迹臣等過失望隨事戒勑免積罪戾臣有所見不敢廢弼直之義日有論奏動繫天下休戚比至給舍繳駮臺諌論列已為後時不若致審于初又奏人才不失之虛夸則失之緘默凡宂宜求篤實為國者因旱求退甚力請依慶歴中例降秩皆不許遂奏實惠及民莫若寛減夏税施徳當自近始上方篤意救荒其所以贊寛仁之政不可勝紀封事多言宰執同異公奏要當各盡所見豈可尚同既是協心體國苟有未然雖面詰何害若人才邪正政事得失安危所繫自應反覆論難止欲歸于是耳陛下復祖宗密白之制使三省覆奏而後行正欲上下相維非止奉行文書也髙宗升遐始末稽攷制度奏置山陵五使贊成聖孝哀禮两備㑹賀生辰使至上在喪次議令館伴使諭遣公奏賀禮固不可行但彼行人逺來而朝無一辭于理未安遂口占數語使歸報焉正旦使將至或請易淡黄袍御殿受書然後素幄見使者公力陳不可止以縞素引見使者果心服手詔討論皇太子參決典禮初欲開資善堂公奏天禧故實恐不宜于今不若取西晉宣猷堂為議事堂十五年正月戊戌公請上特御延和殿令宰執奏事畢始過議事堂思陵發引公奏永熙故典呂端一相猶攝太傅親往而欲用顯仁舊例非是遂再拜請行乃以公攝太傅上慮使人堅欲上夀公奏必無争執上欲先令侍從臺諌集議公曰國之重事謀之帷幄有不必詢衆者上尤稱奬卿能如此國之幸也仲冬之初奏乞骸骨忽宣諭以病倦欲傳位太子卿須少留公奏聖體康寧止是孝思稍過豈應倦勤上曰禮莫嚴于事宗廟而孟饗多以病而分詣孝莫重于執喪而不得日至徳夀欲不退休得乎朕以此委卿公泣而退十二月壬申密賜紹興傳位親札辛卯留身議定二月壬戌之吉又命公草詔專以奉几筵侍東朝為意十六年正月己亥拜左丞相壬子因奏事始諭二府旬日當内禪又令公獨呈詔兼提舉玉牒及監修日歴二月辛酉朔降傳位詔翼日上吉服御紫宸殿公奏陛下巽位與子古今盛典再見聖朝中外同慶臣等輔政無狀自此無由日侍天顏無任依戀之至哽噎幾不能言上亦􅊄然曰正賴卿等協贊新君光宗首問當世急務公奏用人求言二事尋即降詔公積階至特進爵自管城縣開國男至滎陽郡公歴封濟許二國公三月拜少保益國公公以三孤之官不應以覃霈而得力辭不可又乞囘授至于四五不得已而始受之奏以朔望之次日朝重華宫五月求去方力而諌省有言請益切除觀文殿大學士判潭州言者不已殿中助之遂以少保充醴泉觀使而歸孝宗賜金器勞問紹熙改元判隆興府辭不赴二年除觀文殿學士判潭州罷倍税牙契錢二十萬緡郡事皆親理之三年四月復元職七月坐所舉官以賄敗降滎陽郡公四年八月復舊封冬易鎮隆興力求奉祠主上登極求言于舊弼公奏聖孝敬天崇儉久任四事皆切于世用遣閤門官賜少傅告控免至再始許貤恩慶元元年于是公年七十矣三表引年遂以少傅致仕嘉泰元年布衣上書及公姓名臺評降一官明年乃復遺奏既聞上爲震悼輟朝二日贈太師賻銀絹各千累食邑一萬五千六百戸食實封五千八百戸娶王氏監察御史葆之女封益國夫人先一年薨一子即綸也朝請大夫新知筠州軍州事孫顥宣義郎新監饒州浮梁縣景徳鎮兼煙火公事孫女五人長適承事郎監嘉興府糴納倉蕭彖餘尚幼嗚呼天之生公固授之以間氣公之出仕亦可謂千載之遇矣自決科以至考終五十有三年始以文字受知髙宗孝宗以至位極人臣晚輔光宗之初政退被主上之休寵孝宗在位二十有八年公實相為終始其中以十年出入翰苑時方承平極鋪張揚厲之美以十年輔政秉鈞盡輔贊彌縫之妙兩以逆折姦鋒深忤上意事定言驗得眷愈隆致身元宰出處為時重輕幾無纖瑕㣲纇之可指文章則追配作者論議則究極古今風度如張九齡謀謨如崔祐甫宋廣平之守文杜如晦之善斷公幾兼之乃所願則尤切切于陸宣公歐陽文忠此非臣之私言也平日著述為書十餘種總為二百巻行于世校之前碑撮取其名節國事而略其餘謹再拜特書以對揚休命銘曰巍巍孝宗天錫勇智二十八年是為盛際猗歟益公善始以終始進以文終察其忠再折姦萌逆鱗以批事定言驗表表忠規獻納論思知無不為彌縫輔贊百工惟熙三聖相授同守一道公實佐之家有宸藻憂邉思職具存宏模臨機輙斷華夷謐如告老既休著書自若拳拳斯文以惠後學天不憗遺殄瘁興悲既銘公墓又勒豐碑生榮死哀身美君顯是為宗臣後慶其衍攻媿集卷九十三
