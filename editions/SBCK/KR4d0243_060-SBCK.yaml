body:
  text: 宋樓鑰撰記范氏復義宅記吳門范氏自唐柱國麗水府君居于靈芝坊今在雍熙佛寺之後五世孫文正公少長北地皇祐中守杭始至故鄉訪求宗族買田千畝作義莊以贍之宅有二松名堂以歲寒閣曰松風因廣其居以爲義宅聚族其中義莊之收亦在焉中更兵燬族黨星散故基榛蕪編民豪據爲居室爲場圃僦直無幾甚失遺意粟無所儲寓于天平山墳寺倍有往來給散之勞久復圮廢改寘城中反寄他舍病此久矣自公長子監簿而下又五世而至良器一日謂二弟曰先君奉議念此有年齎志而殁吾儕當有以振起之慨然自任思圖其新于是歴告居民盡除僦直約期而遣之不服者訴于郡于監司以至上達臺省提刑臨川何公異太守四明鄭公若容咸義此舉力主張是復得故地周一千四百四十八丈首捐私帑繚以垣牆創建一堂仍扁歲寒以祠文正結屋十楹以處貧族就立新倉寖復舊觀庀役于慶元二年之季夏仲秋告成不愆于素觀者無不歎息親掌出納一年以爲後式選族子之廉謹者二人繼之詳具要束以補舊規揭于堂上且刻田籍于石以爲永久之計介季之柔續世科于百二十有四載之後尤勇于義既力贊其兄謀之屬鑰爲記始末鑰不佞先祖少師收䘏宗族有意于此而歲不與伯父揚州始爲之雖不及文正公之盛而寒宗之貧者賴以自給亦四十餘年于兹先工部欲附益之而清貧終身猶未果也見范氏家法爲之媿歎是舉也衍文正公累世之遺澤伸先奉議九原之餘恨又以綿范氏無窮之休豈不偉哉嗚呼文正公奮身孤藐未嘗賴宗人毫髪之力既達則闔族受解衣推食之恩天祐范氏三子鼎貴皆以宏才高誼上繼父風後人得維持憑藉以保其家良器以布衣而決意興起不惟義宅載新義莊亦復整飭剔蠧省費又爲數世之利用心如此後其興乎嗚呼文正初立規矩止具給予之目僅設豫先支請之禁不數年忠宣公已慮其廢壊故治平奏請聖旨違犯義莊規矩之人許令官司受理又與右丞侍郎自熙寧以至政和隨事立規關防益密今之規約又加密矣一門同姓爲此義事其難如此而況天下之大思所以爲億萬世之計者又可忽乎嗚呼衣冠之族不免飢寒者甚衆願如范氏之宗派而不可得今坐享飽煖者幾人若人人如良器用心更相扶持以永其傳則善矣若曰是我所當得者而不思自力甚者反爲蠧于其間則文正諸公實臨之其聞于有司曰公元者蓋今之族長云汪氏報本庵記惟四明汪氏代有隠德上世葬城南之俞村鑰汪出也嘗隨拜掃裴回松下顧瞻前後中有一丘隆然奇峰遙峙秀水縈抱磬折面勢岡阜非若近時積土平田强爲丘壟出于人力者比氣象秀潤真吉竁也是爲外高祖大府君之墓府君以才選爲吏古君子也終身掌法一郡稱平范文正公王荆公皆以士人待之我高祖正議先生爲之志銘蓋積德之尤著者是生正奉四先生而汪氏之衣冠始于此鑰生長外家逮事外祖少師二十餘年親見孝友之懿奉墳墓尤謹遇忌日必躬至墓下爲薦羞之禮遂爲汪氏家法仲舅尚書恪遵先志不敢少怠而増潤色焉俞村之墓始于十二府君其子若孫葬于左右者凡十餘所迨今百七十餘載矣冢舍三易歲久易圮仲舅投閒既久度不可支吾乃營基于松楸之東輟費于伏臘之餘鳩工兩月而告成爲堂三間後出一間併爲修祀之地前爲軒如堂之數可以聚族列拜兩廡凡六楹前又爲門及享亭以淳熙十二年三月二日奉神座于堂之東室宗人雖墳墓在遠遇清明必合而祭者凡數十人列于其次規畫纖悉一一親授以板爲障而平其前祀則取以陳祭器臨事可不移而辦下至庖湢罔不備具靡錢五十萬一力爲之贍塋舊有田初出于諸院其子孫間有生計凋落視爲已業而私售者久不能制于是積累細㣲益以俸入以元直取之用供僧徒歲仍例卷命族人迭掌祀事其器用則分任其責且爲出穀以助他日尚將益之庵成未有名夢中若有告以報本者公爲之恍然遂以名之正奉始卜葬西山少師兄弟皆從仲舅大爲墓阡甲于鄉里又以外祖母福國之先壠在奉川桃花隩王氏既不振亦爲買田建屋以奉香火凡其先冢域至是無所不備可以傳遠矣鑰既得歸日侍函丈一日顧鑰道始末使記其詳以詔子孫惟我舅氏克振家聲光紹前人以燕後葉庵之落成時年六十有八矣誠孝不衰而又精力絶人克勤小物壯者有所不逮皆可爲人子法遂謹書之後人能不墜少師尚書之意汪氏之興殆未艾也長汀庵記樓氏自周武王封夏后氏之後東樓公于杞實始得姓後有食采于婁者因以爲氏或著樓焉東京雍丘縣即杞之舊故亦稱杞縣樓氏以杞國爲郡而望出東陽雖聞吾族自婺而遷不知所始自鑰一行推而上之至八世祖而止惟曽叔祖二十五助教墓志云六世祖自婺遷于明是鑰之九世祖也又不書其諱明化院之西南一山坡陁數十百畮上世葬埋甚衆邑人號樓太婆墓亦不知太婆爲幾世爲何姓今墳墓可尋者七世祖大録葬白水雷家隩六世祖二評事葬太婆墓山之中劉夫人葬于西偏相去數十步徐夫人葬明化側平地蓋祖宅之後也高祖十八正議及陳氏和義郡朱氏歴陽郡二夫人曾祖三金紫永嘉郡夫人翁氏葬龍潭先祖三少師兩守鄉郡首尾五年每寒食上冡旌旗鼓吹皆集塋下鄉里以爲榮少師教授兗州時祖妣秦國夫人馮氏蚤喪葬南山再娶魏國夫人馮氏先卒得地于報國山之左今爲仁濟院作三穴以右穴葬魏國少師親寫馮令人藏扁榜猶存約他日自居中穴而遷秦國于左晚歲有閩人上官仲恩獻金鍾山圖得于舒氏尤喜之知平江日病中語諸父曰我死當葬金鍾比薨二夫人葬已久金鍾墓域頗狹至今三墳相去或二十里而遠初營葬時四山皆願求售仲恩亦勸之五伯父曰人其謂我家乘勢并包非先志也仲恩歎服且曰第三虎山不可不買可以爲庵其實庵後亦一穴也少師龍虎二山皆平正如畫至江而止龍山之前俯臨沙洲相傳下有金鍾曾見光景今神龍居之亦聖迹也俗謂江水一段爲一汀近金鍾一汀最長彌勒每浴其中號長汀子故地名金鍾而庵名長汀少師薨于宣和五年至七年歲在丙午而葬今且八十年矣先君銀青卜夀穴于庵之後荷諸院相從嘗買鄰山以葬亡弟錧夀穴正在兩山之間坐艮向坤面勢環擁下直金鍾之洲前有一峯錢令公葬其下號令公尖爲山五重惟此峯中立深秀正與之對自他處視之俱不如也先君以淳熙九年十二月十七日卒于仲兄嚴州郡治以次年九月二十日大葬庵之右屋適在其前雖不礙前山而神道門起于谿次不能相望爲曲徑以入是時以仲兄繼亡無力攺造先妣年已七十有四亦不敢輕動因仍幾二紀嘉泰四年正月九日先妣不幸棄諸􅀌荒迷哀苦之餘卜以臘月八日丙申襄事謀之羣從銜哀􅀒土決意先期移建冢舍以八十年左支右吾之屋撤而新之舊木之可用者十無二三又遷基于左半在田間築疊尤費工力幸及大事之前粗畢工役爲屋三十餘間造石橋三所材良工緻庶幾可久于是始得神道坦平墓與門直列植檆檜移置石獸等平揖前山氣象愈偉少伸兄弟夙昔志願皆祖考陰祐之賜宗族相成之力也祖塋松行有干霄合抱之材然侵耕者多亦有枯瘁稍正疆界又補其闕别爲屋數楹于外以爲廥廩是役也雖出于一力而事實關于諸院已戒僧徒日謹焚修以資冥福若羣從及子弟掃松㳂幹而至者自當館穀于此如挈家寓處或封寄什器必至觸汙冢舍非奉先之本旨自兹幸無啟此意亦宜相與戒飭僕使一竹一木毋容侵犯斯有可傳之望前輩言子孫以仕宦不能自守墳墓而使人代之故守墓之人不可待以奴隸而況庵僧乎此庵始建僧希亮入主之三十五年傳其弟子本權權住三十年又傳妙悟才三易人俱善于其事後來者宜善待之李氏思終亭記淳熙八年嵗在辛丑鑰預攷南廟試蜀人李君子思以審計司聨事先是固已得其江東十鑑讀之一見如平生歡既而出所著易解相與講明警發爲多竣事鑰叨丞外府君代主宗正簿鑰尋丞司宗方以同僚爲幸而君忽焉亡矣哭之盡哀且與諸蜀士經紀其家君之父年已八十諸子皆幼弔者無不傷䀌送其西去哭以二詩殆不勝情今三十有二年矣間者闊焉不相聞知慶元之初鑰既投閒明年閲登科記見君之子道傳在乙科又一紀而復來則已聞其召命同朝五年寖登館學上著庭攝攷功時時相過以先友故厚我其季性傳又擢嘉定四年第來見獨未識長子心傳聞其嘗名薦書一不上第年未四十棄舉業而著書朝廷取其建炎以來繫年要録百卷寘館中嘗得其副而盡讀之然後知天之報施本無差忒而子思家學日盛爲不亡矣子思之論易專究心于卦畫其言甚富如中孚豚魚等說前未有發明及此者十鍳極陳南北朝戰守勝敗如指諸掌書有小傳又有諸經解義皆其節目之大者吐其所見論議過人一宰饒之德興治行有循吏之績其所抱負十未見一二此識與不識所以恨其蚤殁也五年七月癸亥攷功涕泣而謂鑰曰先君子之葬兄弟尚弱萬里亦無由相告已得後谿劉先生爲之銘矣墓前有亭取終身慕父母之義以致深長之思非敢自言能盡此也名以思終併致昆仲之意俾記之凡子思文學事業與其家世履歴後谿之志已詳不復書語之曰先公有子如此固已不悼其不幸于土中矣終之義豈云小哉近方爲金華季氏爲古文孝經詳說後序因論古自天子至于庶人孝無終始而患不及者未之有也爲之言曰聖人一經立教之要專在此數語孩提之童無不知愛其親者是人之于孝未有無其始者夫子作此一經正欲人之有終也自天子以至庶人孝之大小固自不同于此復言若孝有始而無終未有不及于禍患者此則無貴賤之别上下一體俱當盡心焉末篇云孝子之事親終矣止爲喪祭之終猶未爲孝之終也夫所謂孝之終與孝無終始之終蓋謂立身行道死而後已者也故雖曾之旣啟足手以其能全而歸之自以爲知免矣然而易簀一節猶在其後蓋大夫之簀猶非其正也嗚呼聖言可謂深切而能有終者亦豈易易乎鑰餘生無幾深知兢懼得正而斃所願加勉故以告有志之士云鑰老退學落加以病餘輒拾前說以慰孝思之切惟昆仲勉之碑聚奎堂碑兵部尚書趙師􅋷謂臣鑰曰淳熙初年龍集乙未高宗在德夀宫先臣和州防禦使贈少師伯驌久被眷顧師􅋷由鎖應賜進士出身德夀喜甚謂其有子賜金更新所居増創一樓以榮桂書其榜蓋摭孝宗聖製聞喜宴詩桂林爭占一枝榮之句而寵之慶元攺元師􅋷卜築吳門之晝錦坊闢堂曰聚奎奉先世前後所藏真蹟匪惟侈雲漢昭囘之盛抑取竇儼所謂五星聚奎天下太平之義累聖崇儒右文高視千古蓋天人之符應也主上誤加奬拔寖塵禁近嘗因奏對以宸翰爲請上首肯再三嘉定二年冬起家長武部兼天府明年正月見于便殿昧死申言上又許之七月甲寅中使宣諭拜三大字之賜未幾又錫三扁曰宗表日玉輝曰與閒鋟鏤髹飾皆出尚方恍然從天而下周章踧踖感激自誓思所報稱移刊樂石願有以記之臣辭不獲竊攷所元蓋非一日國家親睦九族恩禮兼備神明之胄繁衍盛大教養既至人才輩出獻詞章躬課試承平百年史不絶書崇國公世恬好學績文有聲前朝徽皇命翰林學士承旨鄭居中爲志銘知淮陽軍米芾書丹其子開府儀同三司嘉國公令晙及從蘇軾黄庭堅游刻而龕諸睦親北宅之壁間嘉國之子通判泰州子笈陪從康邸最膺顧遇又見芾所書而愛之紹興間既得墨本訪求其後伯驌與兄浙西路兵馬鈐轄伯駒方贅員筦庫以近臣召薦待以家人禮念其􅀌露自立厚加撫勞勉以温習賜第都城俾日趨中禁圖書之府曰于此可觀人間未見之書少師老成詳練歴記舊事盡瘁職守襃賞相仍博洽醞藉歌詩聲畫取法晉唐游戲丹青深造其妙德夀怡神物表密侍清燕預翰墨之選直廬邃嚴且給珍膳名畫法書鼎彞款識攷訂商略從容畢景肆筆成書楷法行草分賚稠疊王粲登樓及謝莊月賦則全而書之二王懐素帖則倣而臨之合作逼真以少師鑒裁精審猶不能辨又雜取唐宋名賢佳句形諸幅箋便面者踰十數持憲近畿孝宗出内帑緡錢萬嚴飾天慶觀親札丁寧示弗勤民之意神毫睿藻數以賜焉乃今奎畫申攽于以承二祖之休于以奬聲績之楙三朝寳墨萃于私室光華絢爛衣被草木有歴劫贊揚所不能盡者而臣何足以知此雖然蓋可稽焉堂以玉輝名則取陸機文賦石韞玉而山輝之語樓以與閒名則取蘇軾賴有高樓能聚遠一時分付與閒人之詩而宗表之襃實用唐宰相李勉故事聖意攸屬昭然著見復揭榮桂舊題于便坐植巖桂以環之始乾道間遴選聘使擢少師爲副别授國書議事敵知其爲宗老相與歎服以爲備待時之說歸報蓋久而後益信師􅋷稔承家訓力沮開禧用兵之議以是不合而去聖化更新復登邇聨委寄益隆俯俞忱請則所以䝉被簡記者有自來矣惟昔君臣際㑹一字之襃踰于華衮今少師父子才美世濟爲趙氏祭酒帝筆之儲盈溢巾衍有傳家之寳無登牀之嫌六丁豐隆呵禁護持昭示將來以永無斁爲子若孫顧瞻豐碑齋莊斂袵仰聖作之淵懿知忠厚之積累盡萬物而不足報可不勉諸臣衰顇無庸方期謝事跂望斯堂無由一拜于其下敢述始末而爲之詩曰煌煌聖朝親睦九族有制有恩克保世禄信厚振振麟趾之時才學自奮見于設施於穆少師相逢盛際受知高皇蚤被簡記源流有來元祐名臣賜對入侍禮如家人博洽醖藉翰墨之選帝筆昭回溢于巾衍賜第崇成有子策名迺書榮桂表于家庭阜陵掄才輶軒載牽出奉六條申畀一札子克負荷致身文昌四尹神臯如漢趙張卜築姑蘇有嚴尊閣户􅁽狎攽増賁丘壑奎壁之光聚于吾門顧瞻斯堂庸侈上恩是父是子並膺殊眷非止爲榮于以示勸生子生孫其報伊何忠孝一心永矢弗磨王節愍公忠肅廟碑嘉定四年某月某日詔爲故樞密節愍王公立廟賜額忠肅某年某月某日廟成惟公建炎紹興間五使不測之地卒執節以死忠烈顯著人户知之大臣欲專和戎之功不以實聞故䘏典多闕至孝宗皇帝聞之始特官其三孫曰杞曰柟曰機開禧權臣横挑氈裘三邊俱震始復求專對之才以通好柟捐軀徇國爲人所難母夫人又以節愍之事勉之張旜三往終定信誓祖孫相望勲在社稷可謂無負三槐之家風矣紹熙元年諡公節愍柟既奏功擢帥合肥尋尹天邑請于朝求爲乃祖立廟于是天子嘉歎且曰爾祖葬吳郡其廟于城中柟拜稽首退而營求㑹提㸃刑獄陳芾攝府事爲度基于郡之北真慶坊地周百三十丈有奇闢門三楹旁翼二挾以入兩廡中爲寢堂敞以高軒肖公之像以安康郡夫人陳氏配命服如禮鼎爼具列深邃崇嚴既足以揭䖍妥靈又啓旁舍以處道流買田續食使永香火之奉可謂備矣少卿以新廟成不可無紀命鑰碑之鑰嘗銘公之隧若平生大節與夫勤勞機辯之詳既屢書之兹不復列獨著立廟之本末以詔後世竊觀昌黎韓公爲廟碑者三曰烏氏曰田氏曰袁氏烏以重􅅌田以􅀪正袁以滋皆以子至將相寵及上世非自以功業而得廟食也以死節而得祀者莫盛于張巡許遠之廟而兩家子弟才智下後無聞焉惟節愍公上承三槐之盛以忠義自奮風烈昭灼膺此廟食之寵尸而祝之子以死孝而歸其骸孫又以探虎穴而就功名既不忝其先而又増大之王氏之廟其最優乎因爲之歌詩以侑四時之享云公之生兮不辰投大艱兮期殉以身掉三寸兮驚嚴宸起布衣兮立登從臣痛二聖兮䝉塵出萬死兮氣益振得要領兮折殊鄰辯懸河兮機若神數往返兮就和親功既高兮遭厄屯握漢節兮死朝紳地震裂兮天霾昏祀于河間兮秋復春紹祖烈兮世有人始雖屈兮終獲伸墓于山兮祠于城之闉依琳宇兮輪奐一新肖公之像兮凜然如存芳菲菲兮薦苾芬洋洋在上兮傷不見而不聞公其訴上帝兮叫九閽或爲鬼以厲賊兮如張巡九原有知兮煥絲綸享廟食兮報君恩佑爾後人兮傳無垠攻媿集卷六十
