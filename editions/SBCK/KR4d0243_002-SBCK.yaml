body:
  text: 宋樓鑰撰古體詩史少師賜第賞芍藥分韻得木字帝城有僊山雙徑森萬玉洞戸入深窈突兀見華屋相君領衆客紅藥想芬馥霜刀妙裁翦臙脂㸃冰縠枝弱不勝花翠葉共斜矗向來爭春風桃李媿粗俗百卉紛何在庭樹擁新綠此花丈人行儼立見幽獨相君戴花笑和氣俱可掬人言此花勝相君意傾屬誰知心廣大何物不䝉福豈以庭中花而肯棄凡木君看擇勝具所在可追逐自言居閒時情話會親族一花有可觀爛賞費銀燭此心何揀擇寓意本無欲以此宰天下以此鎭藩服兒童與走卒人人歌相國有能達此觀春風四時足送錢伯同寺丞守嚴陵嚴陵錢使君丐外得請外府同僚相與飮餞于錢塘之津某病疹弗得預方得請之初某歎曰去年送君來今年送君歸君笑曰此卽送行詩也臥病枕上口占去年送君來今年送君歸君善全去就我獨念别離君是忠孝家襲紫傳金龜門戸二百年所寄在一䕫少年便老蒼況今更險夷不獨妙言語理窟深莫窺健筆照手澤典刑從可知向來御祥琴欲把江海麾促召歸舊班退食方委蛇世事等飄瓦人情嘆然萁向非渾金質百鍊豈不衰浩然賦歸歟潔身而去之爲寮曾未幾棄我忽若遺君旣棄我去謫僊復追隨陡去二良友摻袪重分岐前別易再㑹後見當何時才具素絶倫涵養日以滋且爲牧嚴陵赤手摩瘡痍歸來應不晚青氈當屬誰願君厚自愛歲寒尚相期送楊嗣勲校書守眉山我生東南陬不識蜀道難觀君眉宇秀想見岷峨山漢廷射策時連璧照鴛班伯氏書萬言逸駕不可攀兹焉從君游頗得窺一斑僊凡隔弱水接辭良亦艱矧兹萬里別望望何當還三蘓騎鯨去詞章滿人問豈無後來者遺珠有餘歎願君效樂全飛章達天關報國此最急餘事付等閒宣室行見思朝暮當予環別語敢言詩屬聯不容慳送何道夫祕監守潼川妙齡冠蜀士名聲振王畿晚隨召節來天朝增羽儀我昔倅丹丘鹿侯掛冠歸羣公俱祖送見公四三詩頗恨著鞭先自言乞身遲拳拳慕下風􅀡欲夢見之還朝挹高致氣宇淸且夷稱者不容口往往同一詞始見荷傾倒笑談欲忘疲況當秋風髙濫吹參試闈鼎臠得一嘗豹斑容管窺叔度眞似道莊生信忘機親疎皆不可況容磷與緇諸生得公來歡曰眞吾師叩簾或三請響答了不疑私謂如此人定應備論思胡爲歸興勇抗章氣不衰鼔盆萬里外抱孫更成悲擁麾東川去無人留孔戣别懷不自勝別酒聽淋漓他時念老成追鋒且復西公能重來否此意非吾私送趙子􅀡貳􅀸帥三山一蹴登從班人胡謂公遲建牙帥七閩人胡爲公疑公今第一流志操古與期兩州有遺愛江西憺霜威重來長道山批勅兼瑣闈一片憂國心輾轉中夜思正色抗危言傳誦滿紳綏造膝有啓沃削藁知者誰此心與天通此意上所知所以名愈尊萬口同一詞進用恐不速小卻成歎咨天語自昭然更欲試望之況彼三山重謀帥皆袞衣茲行豈細事報政不待期登門恨最晚臭味忘賤微自慙空惜别不解留孔戣十連終斂惠居中乃其宜試問行道人但知望公歸玉版鮓次陸子亢郞中韻鱘黃不減鯨與鱣逆風鼓鬛噴腥涎漁人不顧浪如山談笑坐致扁舟前一鉤香餌不得去何用大網相索纒揮刀紛紜臠肉骨巨口噞喁誠可憐珍鮓萬甕不論錢頭顱萬里赬行肩星郎日參玉版禪頗厭蔬食供盤筵尚書親作孟宗寄坐覺七箸生春妍卻笑多事張茂先光怪異說空十年走筆送僧義沖一氣行太虛流行紛不齊要之本無物洞然無是疑梵志有至言還我未生時燒了似不曾亦有毛僧詞沖師名家子少年習裘箕談吐霏木屑落筆皆珠璣自稱十年來不復念作詩空門坐枯禪綺語知昨非聞之意巳消談笑到日西習氣終未盡舊編還自攜秀句堪供佛古作力可追愛玩不去手未免成一癡又欲上西湖駐錫來語離我生墮宿業筆硯置藩籬拔擢困胃腎未老神巳疲幾欲焚故稿要使心清夷君詩旣不作何不等棄之萬事都放下一意控􅀇機語罷復自笑無使高人知作詩固無用參禪亦胡爲勸人反自蹈此紙何必揮不如兩俱忘他時赤體歸催老融墨戲古人惜墨如惜金老融惜墨如惜命濡毫洗盡始輕拂意匠經營極深夐人非求似韻自足物巳忘形影猶映地蒸宿霧日未高雨帶寒烟山欲􅊕中含太古不盡意筆墨超然絶畦逕畫家安得論三尺身世生緣俱墮甑人言可望不可親夜半叩門寧復聽三生宿契誰得知一見未言心巳應巖傾千丈雪散空上有淸池開錦鏡意行忽發虎溪笑許作新圖寫幽勝歸尋一紙五十尺傅以礬膠如練淨自知能事難促迫捲送松牕待清興筆端膚寸今何如西抹東塗應略定何當一日快先睹洗我昏眸十年病獨旦蕈次九五從叔韻朝菌晦朔雖不知食之實冠東南味庾郎二十有七品一見流涎驚絶異擷蔬剪韭皆可却味苦應無夏蟲避大阮哦詩聲未了又索蒸芝今再遺邇來枯枿尚未茁拳拳頗媿臺無餽倘容小摘寄情親會遣長鬚見芹意雪丙午九月才入冬晦日忽驚雪墮空傳聞都城更復早萬官入賀明光宮自從開霽更不雨和氣眞似青春濃斗柄插子日丁卯夜煽裂缺鞭雷公從以震霆至三四驚破蟄戶紛昆蟲寜知􅀇冥全未究翻手作雲千里同暗牕初聽灑珠雹巽二滕六方施工一日喜見瓦溝積忍寒待伴炯不融二日三日遂盈尺膏潤四海恩無窮古來詩人詠不盡巧思橫出昌黎公少時奮筆不肯巳老矣袖手便疎慵兒曹作戲記昨夢舞狻獰踞金雙瞳誰人苦欲撩詩思更作玉山高數峯移將劉叉兩冰柱輝映愈覺淸心胸見之躍躍忽技癢起呵凍筆尋詩筒開門一看天宇闊素蜺百萬飜長空瓊樓玉宇滿妙界千林寶樹春玲瓏恨無高臺三百尺縱觀萬象凌空􅄥固知幻景有變滅一時如入崑閬中僊家俄頃閱塵刦安知此際非神功賸喜年來米價賤便欲扶犂隨老農牆頭濁醪走來過相與痛飮歌年豐少潛兄眞率㑹晝錦坊中作眞率羣從相過無俗物主人就樹折楊梅醉倒薰風凉拂拂小舟傍城登雉堞坐看白鳥蒼烟沒須臾撑出洞天去傑閣三層高突兀樽前賦詩貴神速十分鈍似遼天鶻從他銀漏促殘更要見林間紅日出送元聲弟赴水陽監鎭吾翁積德厚九子官其六不幸失二人孤嫠紛在目三弟尚白丁升沈猶未卜吾人扶門戸參立如鼎足脫死憂患餘偏親須水菽阿連先著鞭去去長江曲弱冠承賞延十載荷衣綠間關困家食才就五斗粟要知官無卑毫髮當畏肅督耕兩丈圩受輸十萬斛處之誠未易勉旃􅀡自朂執别動萬感酌酒再三祝吾子素解事涉世要未熟意行須揆理言輕恐招辱王事究一心言玷復三復細行累大德陰財損陽祿豈惟贈爾言余亦每自恧公餘稍有暇更取故書讀行矣更自愛家聲要人續伯中弟生朝賦荼䕷春日足風􅀨不知艷陽天桃李俱成塵􅂴上西湖船春餘忽微和荼䕷發淸妍池塘芳草夢況復向阿連中庭月方午密林澹淸煙䝉䝉青羅帔粲粲白玉鈿幽歡久不講羣從俱讙然銀燭煩高燒妃子浴温泉花以酒爲名我以杯相傳爛醉不復辭此會期明年黃巖令鄭仁叔索委羽洞府詩君不見王君羽化脫秦厄故山至今名落翮又不見烏程野鶴投氅毛佞臣稱瑞民斯勞何如奉林控鶴凌青霄蕩然委羽登山椒青衣出入洞方杳紫氣氤氲風尚飄今君頗似丁令威鶴馭久去雙鳧歸山川良是人民非一新琳宮還舊規黄山父老歌循良誦君詩句游雲房更將山名比堅操百歲猶能徹骨芳青林郡齋偶休沐驅車出西城依依山水佳瀟瀟松柏聲雪餘春意動新綠生㘭􅇦行行到青林老眼增雙明主人喜客來倒屣欣逢迎幽居迹甚遐健筆詩方鳴囘首幾年別千里搖心旌相見又暌隔此意猶未平不如造齋閣四座酒重傾風流陶彭澤骯髒阮步兵看劍引三尺論文驅六丁綠野秀橫檻山寺傍連甍石罅幽泉溢腳底輕雲生詩盟忝予㑹奕道從君爭哦詩谷禽應列炬林鴉驚淸歡未云足累句忽巳成環坐粲十眉舉酒酬三英滿壁洒醉墨歸夢含餘淸我方媿此集君欲尋前盟吏鞅才縛我秋風爲君行隱淸右軍訪文君遁迹入深竹我來尋歔歈人亡但空谷靈􅀛闖澄潭華宇對飛瀑若人今何之尚想舊茅屋吾聞古君子千載守孤獨楚些不可招懐哉愴喬木送劉晉父監嶽濟南劉夫子生來逢百罹乃翁􅀒長才宦游至京西時當建炎間寇盜紛不齊轉徙入湘廣一家屢阽危五羊買海舟萬里向鮚埼舟破投永嘉有如鳥擇棲哀哀老治中藁葬山之陲母家在衡陽孤嫠往相依久臥漳濱疾羇窮命如絲事母以孝聞執喪禮無虧廬墓屏葷茹至行徹丹墀有詔寵數蕃得官祗奉祠行年六十二霜髯照龐眉􅁣然念防墓千里來海涯西山如蓮華古今冢纍纍況此久宿草蕪穢不復治孝思雖甚切冥漠何從推行道爲興歎智力無所施有僧幾九齡自言記當時君聞亟叩請東岡指荒基吾師慕􅇦公少也從吾師墓中有版識倉猝不暇碑素棺無石槨􅁅炭周四圍君方感斯言鑽穴從旁窺其言皆可驗自此不置疑惟餘蓋棺木遺骨不堪移斲石表故阡遂塞無窮悲此僧老而壯斗酒如覆巵與君登山椒下上幾如飛竣事才數日溘然不可爲孝感人益仰眞有神相之君曰某不孝遷奉致失期未得如有失旣得涕滴頤嗟我誠寡陋識君顧巳遲一朝來短札謂我從此辭皎皎眞白駒安得施縶維戴侯舊山長參語心相知謂余當詩此頽風激澆漓世出世間法君方控􅀇機引証卽賸語焉用骫骳詞衡陽尚寄書當有鴻鴈歸後㑹􅄅無日爲賦古别離王成之給事囿山堂煙雨望麗陽前山羅紫翠照水挹南明不與巾子對朅來登囿山一覽萬山會蓮城山固多此地要爲最主人意軒豁物景供曠快山椒湧華屋迥立風埃外一物無遁形所在皆纖芥淸霜肅天壤佳樹隔闤闠俯仰隨取舍左右從盼睞門牆尋故步杖屨許從邁恍然至絶頂更覺宇宙大樽酒屢勸酬棊枰更勝敗秋高月色皎浮雲了無碍不俟攀僊掌徒手吸溪瀨兹堂極崇敞意若欠深䆳先植易生木徐待松柏兌望遠仍可喜意滿聊自晦無使山下人或得窺外內但恐趣賜環樹藝或不逮先生味斯言一笑相領解吾將飭園丁隨處添翳薈他時遶扶疎吾廬益可愛游初暘谷及白巖重來游僊都止欲訪獨峯寧知一峯外佳境無終窮何處潁川子鏡巖便相逢約我游白巖輕舟借溪翁齋餘尋宿諾秋霽波溶溶淸徹見石底鑱刻驚神工昨登初暘谷但見石嵌空兹浮懸崖下萬石森巃嵸上有勝絶地古語留郭公鬼神謹呵護雷霆掃塵蹤換船到白巖脩篁搖清風縈囘進石屋孤竹攅沙蜂洞府僊所閟無由辨西東扣舷過巖下數仞如崇墉石趾平如甃奇怪遮蒼穹更尋小蓬萊俯瞰馮夷宮篙師進深窈捫蘿捨枯笻游子非不多無人解從容我因一日留幽尋極山中秋旻快排蕩日暖如春融歸坐獨峯下石影橫空􅄥急呼醽醁淸澆此磊磈胸幸有濟勝具未能上金龍爲君揮五􅃶決眥送飛鴻夜游獨峯下峯背正白月舒光峯影橫野萬丈強仰之彌高立卓爾蔽遮星斗摩穹蒼半秋風露淸徹骨望望􅀡欲隨風翔歸尋玉虛步松徑月輪正湧門中央送顔希聖尚書守泉南聖朝寳運開虞唐太平天子垂衣裳恢張治具崇儒良孰不願依日月光用之則行舍則藏孔門賢德遙相望朝望方隆位文昌跬步可到中書堂問公擁麾何太忙公獨三請志益剛俞音一下冥鴻翔行李徑出臨濤江爭留孔戣動朝行公更傴俯不敢當老成全德真圭璋温如春風嚴如霜柏臺峩豸肅朝綱賢關嚮風士氣揚大天小天稱公方五年吏姦葢而彰金華勸講言加詳明主傾聽談皇王盍膺枋除任贊襄名遂身退天所臧明哲保身身更康高風可仰不可量泉山壤土接臨漳建牙千里開封疆老龍􅀒圖寵煌煌何殊衣錦還故鄉賤子薄宦接王楊曾陪御史臨文場風簾官燭夜未央劇談猶記聲琅琅兹來誤忝尙書郎始尋故步依門牆西風津頭望歸艎輓公不留遠予將兩宮念公未詎忘公雖遠去如在旁庶幾重來上錢塘夾輔大業恢中􅀖倘有重事須平章陳順之靈壁石硯山陳順之吏部靈壁石硯山中有雙澗低處爲硯下米元章題云唐􅀪文館校書李羣玉有詩南唐李重光故物也蔣教授文會有詩次韻名畫法書環四壁中有米家眞寶石壁峯森聳外澗流他物雖奇敢爭席舊屬半山老僊人佛印乞之如乞鄰阿章有力􅀒之走一時攘取成紛綸此石天然非琢磨是時有水生巖阿至今硯池尙餘潤歲月旣久惜不多幾年徒見士夫說一旦喜看形偃月傍連玉立兩於莬主人照映冰壺澈陳侯之富可敵國會有寳光驚四塞呼童吸盡硯中水更爲輕翻玩奇刻不堪囘首江南李空唱多愁似春水不如此石千載傳玉砌雕欄等糠粃寶晉得之眞不易身後寧知亦輕棄只今傳玩知幾人當日瑣窓空自秘端歙爭名南北部勿向雷門揚布鼓銅臺渴瓦更不須秖合觚稜蔭風雨跋汪季路所藏修禊序永和歲癸丑羣賢會蘭亭流觴各賦詩風流見丹靑右軍草禊序文采粲日星選文乃見遺至今恨昭明字畫最得意自言勝平生七傳到永師襲藏過金籯辯才尤祕重名巳徹天庭屢詔不肯獻託言墮戎兵妙選蕭御史微服山陰行譎詭殆萬狀徑取歸神京辯才恍如失何異敕六丁文皇好巳甚丁寧殉昭陵當時馮趙輩臨寫賜公卿惟此定武本謂岀歐率更採擇獨稱善遂以鑴瑤瓊流傳迨五季皆在御寢扄耶律殘石晉睥睨不知名意必希世寳氈裹載輜軿帝羓既北去棄與朽壤并久乃遇知者龕置太守廳或云政宣間此石歸紹彭又言入內府宣取恐違程焚膏繼知晷拓本手不停疊紙至三四肥瘠遂異形南渡愈難見得者輒相矜我見十數本對之心欲酲汪侯端明子嗜古自弱齡錦囊荷傾倒快覩喜失聲帶流及右天往往字不成而此獨全好䕶持如有靈尤王號博雅異論誰與評硬黃極摹寫唐人苦無稱贗本滿東南瑣瑣不足呈猶有婺與撫碔砆近璜珩右軍再三作巳覺不稱情心摹且手追安能效筆精響搨固近似形似神不淸不如參其意到手隨縱橫況我筆素拙何由望羣英近亦得舊物庶幾窺典型此本更高勝著語安敢輕孤風邈難繼悵望冥鴻征送劉德修少卿潼川漕淸朝重諍臣選取妙一世矯矯劉御史一鶚勝百鷙顧瞻最有力步武亦嚴毅一生憂國心千古敢言氣氣足充所學文能行其意遇事輒奮發觸邪無顧忌乗驄行且止斂手巳知避但思補袞闕何暇爲身計獨立當雷霆三進氣彌厲去魯固遲遲出晝豈濡滯上終行其言羣賢爭挽致將輸向潼川寓􅀡尚書秘風裁仰淸峻進退審難易伊昔聯周行暌違十餘歲來爲同舍郞愈篤金蘭契洗眼看騰上寧知攬征袂抗章歎髙絶勇退尤知愧去勿窮日力予環日月冀承君送道鄉硬語吁可畏毋以此自滿當爲不止是臨別提斯語少盡交朋誼萬里苟同心呉蜀安有異次韻李季章監簿泛湖僊舟共泛滄波去且向蘇公堤下住西風吹就芙蓉城靑鏡閑妝兩呈露皇家家法常儉素宸心但欲乘商輅離宮別殿無興作天以西湖供一豫吾儕公退得淸賞酒醆碁枰不知暮深知夕照戀狎鷗又恐昕朝追振鷺自憐三入鳯皇城歲月黃塵等閒度湖光正欲捲簾看風色更煩褰幙護孤山不見處士廬司馬空尋蘇小墓酒乾人醉歡有餘聯騎還趨湧金路歸來健倒渾不知睡覺燈前裊香霧文人公子眞冰玉曾爲出遊揮妙句匆匆借韻僅成章敢詫尊前鸚鵡賦送楊廷秀祕監赴江東漕平生楊誠齋可仰不可見去年尺一書老韓忽同傳道山故僊伯再上右文殿蓬萊幾淸淺筆力愈雄健獨挾風雅輈孰敢當白戰一官定一集流傳殆千卷拙工見大匠有技不敢獻誰持斫鬃篇徑掣巖下電誦之百寮上慙汗幾被面公今欲何之江左去乗􅀓鼻間長栩栩仕巳忘欣怨英英日暮雲薦紳極追戀挽公不得留觴豆紛祖餞惟應三山高須公和江練君王念疇昔臨遣尤繾綣公乎遂來歸密侍淸閒燕坐寢淮南謀如彼雪見晛從容處籌帷侵疆歸古汴送曾無玷寺丞守池陽我朝衣冠盛名家數三曾南豐曁潁川後起參温陵邇來螺川族駸駸著簪纓春風雁塔中參差見姓名君才素穎出健筆泛縱橫江右兩壯縣談笑政巳成河陽桃李花武城􅁌歌聲入朝八九載去擁池陽旌年家有舊好一見意氣傾更因劉御史爲君寫先銘去年叨省郞君亦轉爲丞中都但交謁名紙空毛生惟因候賓廡接膝傾交情分陰尤可惜翻恐到屣迎阿連幸爲寮庶幾多合并寧知成勇退拂袖尋歸程秩滿素簡靜不足煩公行要當試盤錯操刀新發硎似聞有劇部或巳薦長卿君其少停驂有詔來皇扃劉望之國錄惠示文卷次韻爲謝君聞三峽江湍流下無底吾聞岷峩山聳秀且千里坤維氣淑靈所產多名士高文旣鏗然特立亦卓爾久慕黃中劉近有貢公喜亟從蜀士問人物定誰比少年􅀒奇節論事如翻水萬里見張胡義激非氣使賢關遂爲寮八尺見英偉諸君皆斂避相與推德齒惠我春容篇句法參子美再誦平生言作者眞近似戰國信徒勞秦貪不知止漢唐取與守反覆皆造理藩鎭論加詳河朔分鼎峙詞源旣淵深浩博渺無涘從今使諸生教育均䝉被論議歸正平辭章掃浮靡古人去巳遠時毋分彼此君其挽之囘續􅃶須鳳髓餞李君亮著作守眉山分韻得翠字天下大峨山雄秀盤厚地山雖不在眉所在擁空翠矯矯三蘇公挹此淑靈氣文章垂日星照映蓋一世李侯起廣漢射策叩丹陛襃然出羣英東南藹名字來上著作庭行入甘泉侍胡爲把一麾西歸尋藥市吾聞此州俗秉法更陳義厚德坐鎭之近古翻易治君家義槩堂活人百萬計老親懷故山色養謹承志還家萬里餘赴鎭夕可至不作題柱驕豈有晝繡意斑斑老萊衣人間眞樂事忠孝無兩心出處固一致他日上思君命駕當不俟此别諒非久毋庸摻征袂送張定叟尙書鎭襄陽武部尚書張公出鎭襄陽士夫莫不惜其去昔韓昌黎送鄭尙書詩韻必以來字祝使成政而來歸疾去而願歸蓋人之至情也而公自受隆委謂邊事非可趣辦願加久任庶有成績憂國而不爲身謀聞者壯之某嘗陪郞省餞别分韻得壤字未能措辭繼又隨西蜀諸賢之後始得詳聞臨遣奏請之言被酒夜歸亟述長韻公家忠獻公勲名照穹壤南軒􅀓聖學後進斗山仰尙書天分高百聞真朗朗日坐四益堂濡染助涵養小出輒驚世發譽自英蕩兩朝倚才辨三接承睿奬堂堂尹京手風采漢張敞九街寢桴鼓終朝淸訟缿汙流化淸溝閙市鋤巨駔鈴齋晝無入士友厚吾黨政成化自行談笑揮浩穰皇家重閫寄拊髀勞注想頗牧起禁中帝曰汝其往人多惜公去地位切台兩惟公不擇地引義猶􅁣慷諏度更周詢千里若尋丈再拜受臨遣因得進忠讜邊臣固多事備禦當素講要須久其任百弊隨剗磢願假臣歲月表裏如指掌人材固不乏第一戒欺罔樸拙勝巧心好佞寧木彊願求忠信士枉􅀡謹誅賞更須寬轡策奏請應如響上問􅀸何先安靜最爲上上憂襄漢間呉楚欠遮障公因論形勢衮衮到遜抗是時晉在洛武昌勢相向是爲必爭地南北謹隄防今雖居上游事與古殊狀狂宼縱欲來無處可傳餉況今三埵靜皇靈方遠暢與蜀相掎角國勢自增壯尙期效尺寸才疎意非廣忠肝氣凜凜秋旻足排蕩上喜憂顧寛趣行開玉帳捐金示優寵諭賜煩上相惟公最得士離別俱惘惘薦紳紛祖餞􅀡欲傾家釀賦詩寫胸臆一一成技癢家聲與國事負荷有餘量邊頭十萬兵公臨如挾纊吾聞胡運窮羣酋欲爭長不戢將自焚前轍有狂煬當爲不可勝有和謹毋倡千載羊叔子制敵恢天網行將友斯人山川固無恙備成撫機動應煩護諸將功高歸未晚會見登弼亮他時名父子繼踵凌烟像送鄭惠叔尚書守建寧十五年前送别詩道山持節向江西今年又見送公別大天擁麾鎭閩越向來惜別固巳深今日摻袪尤動心尚書自是第一人氣義相許披胸襟南宮五表平明入列辟傳聞俱聳立壽皇聖孝冠百王三復高文天爲泣擢處螭㘭寵數新果然百日掌絲綸拭圭修聘稱應變握節不撓威殊鄰􅀡上銀臺尤振職李藩氣槩時批敕嗣皇銳意新百度筆端眞有囘天力星辰聽履冠文昌急流勇退驚朝行望之正欲試馮翊長儒寧肯薄淮陽孤拙自憐銷壯志三入脩門空負媿薦人不進終不巳獨賴當時言有味公在猶歎一居州公去無人爲王留公乎行歸佐天子肯作管晏卑微休送蘇壽甫少􅀸赴潼川漕老坡送江􅀡入海君今歸尋江之源外臺去鄉若不遠爲持使節臨潼川君家家世四海聞單于一問驚胡塵歸來便合上淸禁胡爲日念橫峨岷賢哉羣從傳家風夕郞名節世所宗諸􅀸亦復載淸德況君又似尙書公壽皇念舊久更深聖明親擢傳玉音君歸寧能及黔突定應召馹來追尋淸獻入蜀攜一龜君今數鶴同載歸他時未免蕙帳怨人在西淸鶴自飛分韻送孫從之司業使湖南得千字夫君靜而敏人十己則千讀破萬卷書操筆思湧泉古事與今事一一探本源蚤蜚場屋聲作吏志益堅朅來上淸班漢庭誰在先雍容行必書史館躬槧鉛片言寤明主立使登諫垣拳拳憂國心傾倒十三篇司成天下選歸志巳浩然赤日送妻子襆被尋谿船諸生慕陽城欲挽不得專竟持湖南節征袂何翩翩憶昨忝同登于今三十年朝行喜相會終恨非官聯請益殊未饜匆匆啟離筵始以長官來來以繡衣還書生素安分豈問卻與前第惟公輩流自應留日邊德星聚南楚予環當茹連事體有關繫臨岐欲無言送王恭甫倉部知洋州天淸無雲秋氣明好風叢桂傳芳馨乃于此時送君行江空日短難爲情蚤從兩川馳大名眉宇瑩徹春壺冰語輒傾倒心地平大篇小篇韶鈞鳴壽皇一見喜不勝壁水道山照羣英潼川題輿遠有聲痛洗鹽筴疲民醒天子呼來再登瀛典領著作承明庭絶域往陪蘇子􅀸馬上談笑胡人驚歸來期君侍西清胡爲西去謀專城士友重歎君不譍視此進退秋毫輕洋川風物天下稱文翁流詠人載賡當時猶待羣政成君今未到意巳傾岢峩大艑秋江澄圖史萬卷鷗與盟殘編斷軸恐飄零數輩装潢手不停我亦重來預彯纓三日不見鄙吝生況此摻袪將長征欲挽不留鴻冥冥賜環勿憚萬里程江山多助筆縱橫黼藻王度扶中興題范寛秋山小景山髙最難圖意足不待大尺楮眇千里長江浸横翠畫家雜雲烟戃恍徒意會苟或森三尺便若俗子對此畫格律嚴興寄獨超邁洗眼映牕明妙處乃不昧流泉見原委著屋分向背推車度危橋指路向關隘輕舟最渺茫浦嶼如有待山稜瘦露骨汀洲橫若帶木葉黄欲脫秋容儼然在霜餘無片雲歴歴數沙界搜尋因力疲欲賦無可奈近山才四寸萬象紛納芥欲識無窮意聳翠更天外江西李君千能能和墨及畫梅艮齋許以三奇而詩非所長也游藝無小大要皆知本原後人率意作終當媿前賢老潘妙對膠法從玉局傳或假季心名空掃千鐙煙補之貌梅花疎瘦仍淸妍折枝映月影眞態得之天李君信雅尚二者將求全諸公競稱許試之乃誠然江西有詩派皎皎俱成編茲事未易窺屬君尙加鞭分韻送盧國華福建提刑得華字盧侯場屋聲天馬騰渥洼殘膏沾後人奇芬吐天葩來踏九陌塵去種河陽花向來再去國盛山建高牙平生長者譽靜篤語不譁古井絶微波璞玉無纖瑕使星照蜀道惠愛流三巴吏姦賴刮磨民瘼煩搔爬田里誦盧公兒童知國華白首尙郞潛坐曹事如麻翩翩擁軺車去去向合沙朝行惜君去舉酒相邀遮共登獅子峯巨石臨唅呀郤來登湖邊野梅訪萌芽老柳掃黃葉枯荷矗寒茄碁枰戰文楸醉帽欹烏紗伊昔送君行相去萬里賒荷君遠寄書得得來東嘉一見又成别感念成咨嗟羨君徑褰帷往戍不待瓜先尋上水船何殊泛僊槎作粥喜奉姊上冢仍過家此計正未疎所恨成天涯尚幾或留行船鼓毋庸檛題老融畫牛溪煙雨􅊕煙吹􅀨冥冥兩牛半渡深清京塵久汚巾履頗思歸濯吾纓慧元畫寒林七賢舊有唐人出游圖謂宋之問王維李白高適史白岑參六人多畫七賢不知第七人爲誰或云是潘逍遙然未見所據病起坐攻媿齋元公忽作寒林七賢相寄余方夢寐故山見之灑然戲作數語謝之羣賢俱詩豪世代不同處安得寒林中聯鑣睇相語誰歟創妙意臭味無今古吾聞顧陸輩寓意或如許桃李並芙蓉雪中蕉葉吐元師師老融淡墨掃風雨作此寄攻媿歸興渺煙渚舊六今則七未知果誰與我欲從之遊詎敢厠儔侶畫我往執鞭欣爲李君御李文綬和所贈老融詩復次韻爲謝鄴侯插架書最多筆力雄奇天所命萬人海中深閉門理窟搜尋到幽夐我詩無律如山謳形穢豈㻣珠玉映時時歸夢入故山曳杖松間記投􅊕因君佳句撩秋思便欲歸尋舊三徑兼旬足痺不良行況復炎蒸如釡甑夜來一􅀨洗河漢簷溜涓涓淸入聽晨興剝啄誰叩門乃有同聲喜相應讀之恍若濯淸風自覺昏眸怯明鏡伊余何幸㸃班行結交往往多名勝夫君平處顧淸新解道澄江如練淨從今我乃得四友不特官梅動詩興推枕裁詩謝髙致扶憊搖毫心靡定舊聞讀檄愈頭風今賴長篇起衰病次韻六和塔秀江亭壁間留題江外參差列萬山我家深在萬山間好山正不用錢買但要未老身先閒長江比愁終似少江水能囘愁不了扁舟何日過西陵鄮山佳處吾歸老跋袁起巖所藏修褉序悵望當時眞蹟臨摹所在支分千載但稱合作誰能有感斯文定本爲世第一此又在定武前今日錦標玉軸向來不􅀡一錢送陳君舉舍人東歸皇天生人物千載非偶然沖和兼萬人始得一美賢夫君乃其人人一巳百千飛黃欲追風況復勤著鞭文陣蚤奔放氣欲摩靑天短褐東海濱名貫斗牛躔聞道更獨蚤自言若墜淵出登龍虎榜徑上鵷鷺聯中間幾流落淸湘窮泝沿白首始爲郞一見意巳傳登瀛上麟臺授簡游􅈷園擢爲柱下史遂居紫微垣去天真尺五朝綱賴扶顚龍樓闕問寢萬口爭進言惟君最勇決螭頭屢􅀡前危言破人膽三進加勤拳天高聽亦高歸袂何翩翩髙風激頽波同列空慚顔君雖未必去一去勝九遷我欲留孔戣有懐不得專況我自欲去何心挽歸船嗟我生何爲與君幸齊年先後才九日相與同氣然幾年若契闊班心忽差肩判花同代庖君思如湧泉上房草數制下房時一篇一篇輒高妙隗始媿余先春秋隱公傳國史建隆編周官授大旨所得俱未全聚散不可料餞别滄江邊君將處於陵我耕綿上田君行無疾驅中途恐傳宣不然遂成別孤帆渺風烟夢魂不可制隨君墮中川次韻趙子野石城釣月圖石城江頭可憐月曾照六朝淸夜獵古往今來知幾何長江衮衮蕭蕭葉謫僊去後詩盟寒王孫詩瘦淸欒欒詩情浩蕩坐無奈扁舟笑把磻溪竿江平風輕波瑟瑟宿靄卷空天一色東風吹句入長安一卷風流坐中得初得神意淸再讀胷次平囘顧明月秖如故世上興廢徒紛更想君一葉方掀舞夜靜水寒誰與語船頭有酒且孤斟莫向金陵重懷古戍溪道中寒潮高于埭黃流濯西河人牛俱力壯相與衝流過潮落勢囘禦轉櫂依丘阿暮靄起平楚陰雲翳寒莎夜分潮復上櫓聲相軋摩大江渺無津不知身在何餘生一虛舟兀然聽風波吾親白雲下況爾方臥疴遠遊非吾事歸矣毋蹉跎哭表弟汪去僞墓內弟幼而敏抗志欲決科一行試曹掾吏才猶患多謂當爲時用舌在如命何通籍巳艱阻入幕終蹉跎我生依外家侵尋閱羲娥視君如同氣竹馬聲相和少長聯硯席詞場深琢磨相期到晚歲杖履俱婆娑寧知五年別君隨東逝波憶同戍溪行我馬君乘驘馬駑費十駕驘俊巳倍過重來意慘愴樹擁山嵯峩嗟君父與兄相望空山阿宿草埋白璧寒風撼林柯沈吟痛疇昔有淚如懸河次韻蔣德要三徑居山或稱囚得閒乃賦謫我方樂靜退來作三徑客西山致朝爽膏肓在泉石況當秋空淨萬里看一碧呉參議達觀齋君不見大鵬與鷽鳩自適俱是逍遙遊又不見大椿視朝􅌲一脩一短終期盡況乎秋毫爲大泰山小莫壽殤子彭爲夭漆園老子超衆作立論雖奇定非矯鳧脛從短鶴脛長蠻觸亦能成戰場譽堯非桀兩置之讀書博簺俱亡羊世人顚倒名利途躋攀分寸爭錙銖河伯猶驚北海若井蛙醯雞何足誅試同萬衆走城市躍馬途行分賤貴卻登高處望塵中但見紛紛如聚蟻暫高猶爾況眞高神游八表非矜豪寧能高舉去人世勿以役役隨滔滔是知達人有大觀蝶夢爲周聊自玩翛然無入不自得處若終身仕成漫呉侯晚到東海濱飽諳世故無戚欣相逢一笑成莫逆似知我亦個中人送姜子謙丞於潛處則有超蓮出則將哦松眉宇無一塵出處皆雍容君看妙蓮花本出汙泥中兩松痛掃漑下有簿書叢汙潔無二致喧寂本亦同於潛今畿邑蜀道萬里通至今存古意民風尙醇醲一邑旣當問尤宜撫疲癃藍田文最高後學仰韓公彼言蓋有激昩者但稱工成案漫不省丞哉豈眞聾姜氏太嶽後夷門慕家風教子延名師列碑多儒宗宫庠旣開荒書種慶所鍾換桂雙枝秀益見筆硯功後生日加勉衣鉢傳無窮君才有餘刃壯行氣方充功名此椎輪勁翮看摩空我歸幸同社棊酒時相從尊前不忍别吟愁夕陽舂我家老揚州五記有遺蹤向來耕織圖爲煩訪溪翁送從弟叔韶尉東陽阿連少也爽孤立生氣燄壯年淬詞鋒傾心事鉛槧膠庠困虀鹽世科終穩占再興蘭桂堂爾祖真不忝況將尉東白士友尚歆豔惟我愛子深老矣猶不厭固知爲子喜頗亦動吾念贈子當以言苦口當針砭此邑子舊游歴歴數行店棠陰見郎君遺老喜窺覘其民最服義情僞靡容掩莫恃彩棒威要使慕巾墊子文多立就詞采更華贍吾聞得雋者塞門差反坫前賢最加謹臨用更重檢他時可待取天庭得錦吾家有素風耳目久濡染毋庸慕豪舉助廉先以儉湎酒更宜戒平地有深塹酣暢當有時勿習盃瀲灧將論毋過高斯言卻防玷立節毋務奇躐等恐成僭外物思過分檢身但多欠勿嫌一尉卑封清尙爲傔仕途固嶮巘大要進以漸不須苦求知眞知奏應剡向來湖海豪四十可收斂寧爲處囊錐莫作露刃劍匆匆摻袪別魚鮮酒方釅刮目待子歸罔碑吾言驗攻媿集卷二
