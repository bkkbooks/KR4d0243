front:
  text: 攻媿集卷二十五
  hash: sha256:bcc049b6dc0750b1cbb442f25e8586d93203e60106da6ef15a1a81d92674893f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_025-1a}
body:
  text: 宋樓撰奏議講筵論資治通鑑臣仰奉聖訓讀資治通鑑有以見陛下務攷周秦以來興亡治亂之迹以為鑒戒此誠聖學之要也司馬光為此書始于周威烈王二十三年命三晉為諸侯以為天子自壊其紀綱周衰既久自此遂不可支故極論禮與名分最詳以為此書首篇誠足為後世之深戒然臣嘗攷之此書之作又有深意自古史法皆以編年春秋是也自司馬遷史記創為紀傳之體無復編年之作荀恱袁宏書又不顯光之此書實繼左氏傳而不敢顯言之春秋一經公羊止獲麟魯哀公之十四年也左氏經終孔丘卒哀公之十六年也而傳終哀公之二十七年其末篇敘知伯事其略曰知伯不悛趙襄子由是惎知伯遂喪之知伯貪而愎故韓魏反而喪之注謂在春秋後二十七年臣攷獲麟而春秋絶筆絶筆二年而孔子卒又七十六年是為周威烈王二十三年而三晉為諸侯通鑑之始也其實三晉之分知伯在周貞定王之十六年去孔子卒纔二十七年左氏傳以三晉事終通鑑以三晉事始其實繼左氏傳編年之法此讀通鑑者之所當知也又通鑑首巻起著雍攝提格盡􅀇黓困敦太嵗在戊曰著雍在寅曰攝提格在壬曰􅀇黓在子曰困敦光豈不能書戊寅壬子而直以此紀年者爾雅釋天篇嵗陽嵗陰甚詳其以甲子乙丑云者在書法止可以紀日光之書此非好為泥古蓋其嵗陽嵗陰書法當然也伏乞睿照論通下情臣聞天尊地卑乾坤定矣卑髙以陳貴賤位矣君臣之分萬世不易之道也然天爲髙矣不以髙爲貴而以下濟而光明乾爲剛矣亢龍則有悔而以用九而爲治在易坤上乾下卦反爲泰其彖曰天地交而萬物通也上下交而其志同也乾上坤下卦反爲否其彖曰天地不交而萬物不通也上下不交而天下無邦也此皆聖人之深意也故古之君子分甚嚴而道則同勢甚尊而情則通舜之求于臣者則曰予違汝弼汝無面從退有後言禹之告舜則曰安汝止惟㡬惟康其弼直孔子教人以事君之道曰勿欺也而犯之禮經亦曰事君有犯而無隠孔子事君盡禮春秋專為尊王而作而在禮尊君之至至于蹙路馬芻有誅齒路馬有誅可謂嚴矣而二帝三王之君其所以求于臣者直以為惟后非賢不又后非衆㒺與守邦直以為君之與臣相與共治天下故其見大臣則在輿為下御坐或為起蓋尊徳樂義不得不然上下一體不事形迹是以治功可興而事業可就也中古以還君益尊臣益卑至于晚唐五代猶有坐而論道之餘意太祖收攬權綱以救天下之弊可畏可仰孰敢干犯然與趙普論事心通氣合或夜半而至其家其相與何如也累聖相承共由斯道尊如天嚴如神而隆寛盡下容受狂直如出一律本朝隆平既久中興以來三聖授受綿七十年以至陛下仰惟聖德恢洪無不覆幬講論經理日昃不倦真古帝王之用心藝祖神宗之家法也今日陛下臨朝儼然若帝之臨宰臣而下奔走拜伏莫敢仰視號令之發方尺之紙風動萬方疇敢不應人主之尊不患不及臣愚欲望睿慈嚴上下之分而通君臣之情隆堂陛之勢而明否泰之道陛下體天道之下濟而羣臣得以卑而上行使芻蕘之說不壅于下狂夫之言聖人擇焉則君道愈尊國勢愈隆下下以成其政歡欣交通而後天下可為也臣言若迂實切于治惟陛下裁赦論君心朝辭知婺州臣聞庖丁之技因悟養生輪扁之工可以語道言有甚小可以喻大多此類也臣無所取材嘗守温州號為煩劇若趣了目前簿書期會財賦賓客之事亦可麤辦臣嘗自念受朝廷千里之寄不可止了目前環境之内山巔水涯茍有一夫之失所皆已之責于是分任官僚訪詢耆老不自任耳目之私而以衆智為明雖不設鉤距不為巧術而下情麤通二年之閒茍幸無事矧今立朝七年䝉陛下拔擢爵髙祿厚授以便郡委寄益重尤當布宣寛大以惠斯民當此違離君父之初尚効論思獻納之益願以涓埃之微細仰裨海嶽之髙深恭惟陛下為天之子受付託之重天之所覆祖宗之所臨御陛下以一身應之日晏坐朝躬親聽斷大臣議政羣下獻説崇朝之間應酬已多退閱奏章坐判可否况復聖性恭儉勤于講學人主之道不為不至然臣竊恐猶是趣了目前未必能致幽逺治道多端未可以為止于此也臣輩所治一州實恐日力不給陛下所臨如臣輩所臨之州不知其㡬四方所至幅員動以數千萬里必欲家給人足無不得所則所謂博施濟衆堯舜其猶病諸謂其力所不及則禹思天下之溺由已溺之稷思天下之飢由已饑之人主用心不得不然陛下試于清閒之燕披輿地之圖不知某路今付之某人為監司帥臣某州今付之某人為太守某軍今付之某人為将帥其人之才不才事之治不治察其事實而賞罰隨之猶庶乎其可乎雖好惡之道惟應任大臣先有司而四海之逺治之在心茍不能以吾一心包括宇内每思有以舉偏而補弊篤近而舉逺臣恐四海之民將有不安其生者陛下如此存心則下受賜者衆以其非趣了目前而已也臣竊聞孝宗皇帝嘗語近臣曰朕每日于天下游行一遭此真帝王之言故延見訪問無一事之不周此陛下所宜取法臣未能知効一官而推廣事理敢以為獻惟垂聽而赦其愚論本朝專尚忠厚林學士召除翰臣孤危之蹤頃嵗際遇陛下踐阼之始獲侍講筵進讀資治通鑑至孟子見梁襄王問天下惡乎定孟子對曰定于一孰能一之曰不嗜殺人者能一之是時臣嘗奏曰孟子在戰國時人皆謂之迂闊于事正謂此等蓋當時七雄分據專以殺人為務所謂爭地以戰殺人盈野爭城以戰殺人盈城殺人多者國愈强惟秦為甚伊闕之戰殺人二十四萬華陽之戰殺人十五萬其尤甚者長平之戰一日殺四十萬卒平六國一天下烏在其不嗜殺人而能一之也然則孟子之言果迂闊乎是不然孟子之所謂一者非若秦之一也三代之得天下以仁傳皆數百嵗秦止再傳而四海塗炭嬴氏無遺種是不若不一之為愈也臣竊惟孟子之言至皇朝而後驗唐自天寳之亂藩鎮盛强丗襲根據不可動摇憲宗剛明果斷武宗成其功烈兵威稍振然他鎮不能盡服僅能羈縻之而已周世宗不血刃而下二闗奪李氏之淮南已為甚盛之舉至我太祖太宗削平僭偽四方賓服重熙累洽綿百餘年人但知祖宗之善于用兵不知所以一天下者本于不嗜殺人也靖康之禍其何忍言自王安石開邉結怨王韶伐青唐章子厚開梅山劉彞沈起生事于南蠻童貫蔡攸起釁于北夷有如髙遵裕靈武之潰徐禧永樂之陷殺氣妖氛轉入中國使中原百年丘墟天地之大徳曰生豈専以殺而定天下哉髙宗披荆棘而立朝廷外有方張不制之虜内有江湖甚劇之寇而卒能光啟中興正以聖性不嗜殺人天相人助以躋登兹是知本朝家法専在于不殺而孟子之言明效大驗于此陛下玉音稱善至于再三臣違離闕廷十有三年屏居畎畝不敢㤀君惟陛下聖慈仁孝畏天愛民施之于政皆出誠心是以郊祭之禮上帝昭格年穀順成中外小康真得列聖之用心而權臣愚好自用輕信寡謀横挑强近兵連禍結中外寒心者數月臣竊自惟念天道虧盈益謙好生惡殺我宋立國二百四十餘年專于不殺北虜之强盛殆將百年專于好殺天意其將孰佑之乎是以去嵗擁兵南來屢有敗衂且多失其酋豪而糧道不繼為之退散今嵗聲言入寇卒亦不能大入此固國家福祚無疆陛下威徳逺被將士用命民心不離以至今日然迹其所本實曰不嗜殺人積累忠厚之報也臣衰老得謝待盡朝夕仰䝉柬記更化之初首加收召誠以久苦足疾趨拜甚難控辭不一而上迫于威命趣行郡守津遣翰苑之除下于里門皇恐就道復覲清光誠為微臣千載之幸顧無以上答乾坤之施敢以昔時經帷之說申言之伏望下採芻蕘之言力行寛大之政光紹前烈益恢逺圖臣雖退伏田里志願畢矣論風俗紀綱臣竊惟國家元氣全在風俗風俗之本實繫紀綱本朝紀綱素定風俗醇厚度越前古自權臣擅朝政以賄成十餘年來無復公道紀綱廢弛風俗凌夷㡬不復可以爲國矣天開聖明竄殛元惡黨與以次誅斥此如沈疴去體而元氣未盡復調䕶保養不可緩也其要莫如正紀綱厚風俗之二者向者紀綱既廢貨賂公行苞苴之弊徧及中外仕者朘削民財以奉權臣則美官可翹足而待兵官尅剥士卒以奉權臣則將帥可計日而取是以民力益竭軍政大壊今日盡籍其家數至鉅萬俸祿有限何緣至此則其取于民力取于士卒者不知其㡬也文武之臣所賴以爲國家之用而專以趨媚爲能奔競拜伏竭資效産不復知有亷恥之道至奴事其僕隸以自進既得所欲則傲然于外小則驕人甚則害物士大夫茍可自致無不效尤否則爲州爲縣公取竊取以自効舉削或以厚賂而後得然則欲求賢令宰以臨民得乎風俗至此不可勝誅陛下寛仁必不欲一一究見其罪亦恐搜求已甚人情不安欲望聖慈念民力之困弊縣官之不給而丘山之積實出于鞭笞膏血之餘縱未能盡捐以予民烏可不思所以救其倒垂之急會計凡目舉以補大農之經費而稍寛州縣之督責使陛下惠養之意曉然示于天下而所以壽國脉者無出于此矣更乞明詔大臣以及臺諌給舍去其太甚以懲其餘使自今以始紀綱益振則風俗庶乎歸厚實宗社無疆之福外侮雖為可慮然治外者當自内始故臣拳拳首為陛下陳之論仁徳剛徳臣聞乾徤坤順震動艮止各以其盛者言之乾之下濟未嘗不順坤動也剛未嘗不健震亦有止而艮亦有動聖人之徳亦然文王之武武王之文可知矣人皆曰天以剛為徳人主亦以剛為徳此萬世不易之論也在易大有之盛五爻皆陽而君位以六居五曰柔得位而上下應之曰大有繫辭又曰天之所助者順也人之所助者信也履信思乎順又以尚賢也蓋天與人君一也雖曰以剛為徳而尤以好生為仁臣事陛下于龍飛之初年投閒一紀再䝉收用日夕思念願有以裨益聖徳于萬一惟國家累聖專以仁厚不殺為主如積善之家必有餘慶仰窺聖性承忠厚之習如必欲强爲剛强之事度亦非陛下所安臣又求之于古周過其歴漢祀四百本朝累聖相承平治最久究其所以雖曰積累之厚而周之世世修徳莫若文王漢之結人心無如文帝本朝之盛仁宗皇帝尤爲隆平四十二年之事至今人人能稱頌之文王徽柔懿恭視民如傷亹亹穆穆順帝之則文帝恭儉寛仁專務以徳化民仁宗皇帝聖度如天萬物並育自有諡法以來未有以仁爲諡者天實命之夫以周漢暨本朝盛際自文王及文帝及我宋仁宗不以剛徳為稱而皆本仁柔以出治陛下聖性隆寛實似之而又謙恭勤約身先天下雖欲强為剛强之事亦有所難誠能逺慕文王文帝而近法仁宗使好生上當于天心皇恩浹洽于上下則保治之道何以尚兹臣又有愚見敢申言之文王之赫然斯怒以安天下之民文帝以嚴致平仁宗皇帝干戈鈇鉞之誅未嘗有所私貸所謂仁者必有勇此皆自仁徳發之此尤陛下所當取法也陛下外鉏叛将内誅姦臣雄斷廟謨天下聳服臣願陛下不必改聖性之所安而于用賢去佞收攬威權懲艾奸惡時出聖斷以裁之則仁足以壽天下之脈而威足以折姦諛之心行之無倦謹終如始則宗社之福誠未艾也論内外之治臣竊惟國家馭外之道與古不同藝祖開基未始一日㤀幽燕之民太宗乗河東兵威亦欲一舉而終不遂真宗初以邉民苦于戰爭戒邊将各自城守以圖安靜達賚之來乗虚而入直抵河上澶淵親征出于不得已而履此危道自解講之後累聖不復有北伐之舉宣和燕山之役是時中國軍政大壊委于姦人腐夫以取禍敗此又非所忍言臣嘗以假吏至燕親見舊邉所謂白溝河者真一衣帶水而安肅等處水櫃榆栁塘泊之遺跡亦皆人力設險而非天險也前代雖漢唐之盛豈無失徳而患不至此秦之長城千古以為無䇿然猶有以限制之自周徳威失榆闗之要石晉獻十六州之地而後中國不復可為此如編氓之家與盜為鄰所恃以禦之惟垣牆耳一旦盜入垣牆之内而畫平地以守其勢但多與之金帛冀其勿擾爾故雖以累朝承平䇿止于此况自建炎以來限以淮水蜀猶有險可守襄漢則平陸相接天未悔禍髙宗孝宗豈不痛念勢既未順遵養至今姦臣擅權狂悖生事㡬危社稷陛下之所親履又不免屈己以求和和之成否尚未可必臣雖預末議非不知振發激烈以攄宿憤敕牓一出外議紛然雖浮言胥動不究事實然皆有强人意者雖不可用正自不可以為不然而疾之古語有云主憂臣辱陛下宵旰未㤀顧臣輩無有長策以盡雪國家之恥其辱惟甚臣觀歐陽修言于仁宗曰元昊叛逆一方而勞困及于天下北虜乗釁違盟而動其書侮慢至有貴國祖宗之言陛下憤恥雖深但以邉防無備未可與爭屈己買和莫大之辱是時猶以為莫大之辱則今日之事豈特可為流涕太息而已陛下以生靈為念雖姦臣已誅而國勢愈弱不得已而屈己増幣尚未保其必從則國家之辱甚矣君臣上下惟當以宗社為念臥薪嘗膽以圖之臣恐和議一成喜慶相賀文恬武嬉便為無事則後日之害其何可勝言陛下躬行恭儉更化善治欲大有為而邉事未靖欲為未可宜先定規模内修自治之計日夕與二三大臣講明其要次第施行如邉備屯田安集流移葺治戎器節約宂費等事皆為要切之務臣年過七十本不當仕敢竭丹衷以告陛下退伏田里死無所恨惟陛下亟圖之攻媿集卷二十五
