body:
  text: 宋樓鑰撰神道碑資政殿大學士致仕贈特進婁公神道碑國家中興八十餘年四朝以聖繼聖相守一道夫豈不欲復大讎歸侵疆而申締鄰好遵養時晦以俟天命蓋其廟謨深矣比嵗權臣竊弄威柄富貴已極猶以為未足假恢復之名以逭危溢之禍其黨又相與嗾之平章軍國益無忌憚一旦妄發以債帥為方召以驕兵當犬羊人人知其必危競進者方縱臾以苟爵位不在其位者固不容强聒仕于朝者雖面從而腹非無敢有誦言爭之者時惟婁公機以直諒之資抗議無所回撓一為御史即上疏明辯之是時權臣雖倡此議猶未敢自任鄧友龍初不知兵將漕淮右騰書投合妄薦大將既叨召還専主此議為侍御史為給事中公皆與為寮每語及此未始不奮然力詆以為必敗國事友龍至不能堪曰不逐此人則異議者不已公亦自以不合丐歸除職與郡竟求奉祠㑹泗州獲㨗友龍上表稱賀自以為勢當如破竹羣讙競和諫大夫遂以詆公褫職罷祠此開禧二年之五月也已而延敵致寇塗炭數郡姦黨失措始媿公之言八月再畀祠禄明年二月復職十一月元惡既誅大明黜陟天子思公之忠十二月除吏部侍郎兼太子左庶子嘉定改元正月到闕兼太子詹事五月除給事中兼權工部尚書七月除禮部尚書兼給事中八月擢同知樞宻院事兼太子賓客十月參知政事蓋公天資忠鯁不畏强禦逆折兵鋒言雖不用而後日皆驗先見敢言人所畏服既坐廟堂不以詞色假人相與維持和議密贊更化惜乎年高疾侵奉身而退居無何考終于家經濟未究孰不興殄瘁之悲諸孤以鑰同宗同朝交情之厚既葬而求銘義不得以老退為解先書立朝之大節系以言行履歴之詳而銘之惟樓氏自武王封夏禹之後東樓公于杞而始得姓後有食采于婁者别為婁氏其實則一宗也建信侯在漢為劉蟬聨數十世至䢿事呉越避武肅王嫌名始復為婁仕左千牛衞上將軍占數嘉興五傳而至公之曾祖諱億億生乾曜俱為將仕郎父壽朝奉郎以公貴三世累贈少保少傅少師曾祖妣杜氏祖妣鄧氏顧氏妣郭氏為譙國崇國榮國成國夫人少師荘重有家法教子甚嚴公其第三子也字彦發幼而頴悟日誦數百言能自刻苦長益奮勵該貫經史百家之書作文直欲以左氏班馬韓柳為標的或謂其持論太高公曰他日以此致君澤民要當自立詎可苟徇時好蓋其立志已不凡矣兩上鄉書乾道二年賜進士出身授左迪功郎臨安府鹽官縣尉丁成國憂服除主和之含山簿銅城有八十四圩遭夏潦大壞僅存其一郡以委公役工三千有竒設廬以處之優給庸直時犒酒炙器用材植一出于官民樂勸趨兩旬告畢邑人歡服礱石以記七攝淮邑率以治辦聞薦章交上尋丞於潛漕使檄公攝宰之闕潛川以蠶桑為命織紡貿易至于再税公首罷其一民甚徳之酒坊縣計所仰久廢弗葺公大修酒政嵗羡息錢近二十萬日以寛裕先代輸貧民之竒税寖以及四等户所被廣矣版籍既亡有産去税存之害公一新之獄訟幾絶庭空圄虛治行稱最邑素無學大比無應選之士公首建夫子廟啓庠序擇師儒士有以養李廷光首預賓送擢賢科親書桂枝坊以表具廬士益知勸政聲上聞有旨都堂審察以少師得疾而歸既遭外艱士民莫不借留匍匐奔慰縞素盈門公性至孝居喪盡禮手書華嚴法華等經以伸冥報免喪爲江東提舉司幹辦公事嘗易淮東已而復舊淳熙十二年以舉主改宣教郎知衢州西安縣十六年光宗覃恩賜銀緋縣當舟車之衝號難治公以學道愛人自任不可干以私有騰謗者不爲動巨室買地爲塋域發地遇石復索元價公曰設得金將誰歸守督賦峻厲公不忍施一箠課亦不乏親閲案籍豫定役次民服其公紹興二年通判饒州五年皇上踐阼轉朝請郎慶元二年到官事多關決而無侵官之嫌滯訟隨以清省一重囚獄具欲上察其誣白郡覆鞫之得不冤死又二人已經詳覆以其可疑者同太守以聞俱得減等參政袁公説友帥蜀辟議幕不就攝州及南康諸臺益稱其能相率列薦内相洪公邁稱道尤不容口謂公學有源委工詞章身端行治既以敘公所輯漢隸字源又以監司科薦之丞相京公一見即除幹辦諸軍審計司五年之七月也輪對奏祖宗盛時吏禄兵廩嵗不過緡錢十數萬熙寧月支四萬南渡無嵗不用兵月猶不及百萬乾道已支百六十萬欲請裁損經費又論刑名疑慮之弊六年十一月遷宗正寺主簿嘉泰元年爲太常博士秘書郎請續編中興館閣書目又請寛䘏淮浙被旱州縣時皇太子以恵國公始就外傅遴選學官以公兼資善堂小學教授國公鋭情學問公日陳正言正道又以累朝事親修身治國愛民四事手書以獻寘之坐右朝夕觀省嘗謂公曰今日甚熱禁廷深邃尚爾閭閻細民豈能堪之公以奏之上問昨日與先生説何事國公具言之上喜曰唐文宗但云人皆苦炎熱我愛夏日長更無一句及百姓此意過之遠矣又嘗語孝宗戒食蛤蜊事國公曰此無他只是廣好生之意公隨事開明多所禆益三年除太常丞仍兼資善旋兼右漕郎官五月為秘書省著作郎尋以民曹事煩改兼駕部以専訓導都城大火命百官條具闕政公力言三弊謂朝臣務為奉承不能出已見以禆國論外臣不稱其職至苛刻以困民財將帥偏禆務為交結而不知訓閲以强軍律時公年七十丐閒上以資善倚重不允周旋四載不懈益䖍同寮予告公每當之首尾如一日國公睠顧最親字畫少差必求是正公深于小學辨析如響又著廣干禄字一編國公得之尤喜命講官戴公溪為之跋四年六月擢監察御史講未退而除命已頒國公戀戀幾不忍捨公亦為之感涕入臺省論近時士風薄惡聞者聳然又論京官必兩任有舉主年三十以上方許作縣又論郡守輕濫太甚貽害千里時小史蘇師旦怙勢妄作蒙蔽自肆語及者必罪去而獨憚公嘗與閤門納謁公于寒暄外他無所及師旦俛首不敢吐一詞而去兵端方開惟公極口沮之謂恢復之名非不美亦孰不願今士卒驕逸遽驅于鋒鏑之下人才難得財力未裕萬一兵連禍結久而不解奈何權臣聞之不悦所議愈宻外廷罔測公又上疏極論雖宻謀人莫得知而羽書一馳中外惶惑友龍方為臺端主議甚力公日以苦語勸之且曰今日大將為誰計臣孰任正使以殿巖當之能保其可用乎開禧改元六月除右正言兼侍講首論廣蓄人才乞詔侍從臺諫學士待制三衙管軍各舉將帥邊郡一二人召問甄抜優養以備緩急八月除太常少卿兼權中書舎人閏月真除今丞相史公樞宻宇文公同省毎㑹坐親見公力詆友龍用兵之説㑹有㫖令宰執侍從臺諫集議公義形于色略不少變聞欲以公宣諭荆襄公昌言曰使往慰安人情則可必欲開邊啓釁有死而已不能從也春初卒以此去四月聞諸道進兵謂吾老矣無所施力惟晨香致禱願天佑國家以安邊境及聞泗㨗愈増憂危且曰若自此成功以攄高文之宿憤老臣雖死亦幸謫官尚何言但恐進鋭退速禍愈深耳未幾還朝徳望益隆鸞鶴精神照映朝列人莫不想聞風采見上首論三事謂至公始可以服天下權臣以私意横生敗國殄民今惟當行以至公若曰私恩未報首爲汲引私讎未復且爲沮抑一涉于私人心將無所觀感矣次論兩淮招集敢勇不難于招而難于處若非繩以紀律課其勤惰必爲後害仍請檢柅權臣内侍等所籍家貲專爲養兵之助天顔悦穆玉音嘉奬曰太子尚小煩卿教導待卿久矣公謝以衰暮耄昏恐無以補儲徳上曰昨已除詹事猶未知耶皇太子念公最篤嘗親書問安否以多事未果發聞公來歸問信絡繹仍致前書以示不忘之眷自是簡注尤深而東宫愈加愛重矣公在選部守法革弊吏銓為清有里人故任天官喪未舉而子赴調公謂彼既冒法禁而部胥不之問即撻數吏使之治葬而後來聞者韙之上望治甚切公奏古人為國之心頃刻不忘而望治之誠未嘗以日月冀夫子無欲速之戒誠以維持成就非可亟圖而驟致也又言貢舉貴公乞下禮部具朝官親族有赴廷對者並與免差御試諸位官以絶異議嘗繳奏海巡八廂親從都軍頭指揮使年勞轉資恩㫖太濫乞收寝未應年格之人年已及者予之上顧宰臣曰所繳極當庶不為小人欺隠又稱至再三上以皇太子春秋鼎盛欲使預聞廟論諳知民瘼命日侍昕朝宰執竝兼宫官仍時赴宫㑹議公為宫端益思所以禆助遂取舊所著歴代帝王總要一書加以潤色上下三千年間君道之汙隆治效之優劣綱舉領挈燦然畢陳俾鑰為之序以備參決之餘可用攷訂儲扄尤以為要覽時以飛蝗求言公奏和議甫成先務安静葺罅漏以成紀綱節財用以固邦本練士卒以壮國威又謂臺諌論奏以為月課若政有闕失人有非賢或除授之不當患在不知知之則恐去之不亟當隨事輙言無嫌于數所論皆切于時既登兩地當干戈甫定信使往來之始瘡痍方深弊蠧紛然公彌縫協恭禆贊為多重惜名器持循法度進退人物直言可否不市私恩不避嫌怨有舉員及格當改秩作邑而必欲内除公曰如此則有勞者何以勸孤寒者何以伸若至上前自應執奏堂吏寄資未仕而例以陞朝官賞陳乞封贈公曰士夫辛勤一第非通籍不能及親汝輩乃以白身得之㫁不可行嘉定二年八月臨軒行皇太子冊命公攝中書令讀冊于廷百辟傾聴九月明堂為禮儀使前導趨拜如少壯然儲君與公俱生于癸丑雖相去一甲子而生日同在仲秋先後纔五日賜生餼詔曰九秋風露之清裒時英氣三呉山水之秀生我耆儒固已寵甚是年七十有七盛典縟儀適聚旬浹間都省後堂久不講祝頌之禮公首當之貢闈方按鼓吹嚴更警場五使同坐堂上正用公之生朝鑰退而慶以詩公與諸公皆屬和尤為晚景一段美談冬再納禄不允三年五月以禱雨感疾復四上告老之章詔曰太公既老猶起海濱留侯雖病强輔太子公弗敢復言孟冬分詣原廟疾又大作求歸尤切上猶未許方形詔旨云年雖耄矣初未聞知慮之昏志方浩然亦未見精神之憊公復叙四説以進懇請不已皇太子又遣宫寮勉留而去意堅決除資政殿學士知福州力辭提舉臨安府洞霄宫以歸延見親故上冢燔黄寖復康强尋上休致之請忽感微疾猶取表奏展閲檢視命筆書偈顧諸子曰大期迫矣勿以藥來是夕遂薨寔四年十一月辛酉也享年七十有九累官正議大夫除資政殿大學士致仕爵至嘉興郡開國公食邑二千六百户食實封六百户國史實録敕令㑹要皆嘗提舉纂修遺奏聞上為之震悼輟視朝贈金紫光禄大夫旋以東宫徹章加贈特進賞延䘏典如制皇太子賻奠加厚可謂哀榮矣娶徐氏大晟府典樂申之曾孫封呉郡夫人先公四年卒子三人紹曾迪功郎紹彭從事郎紹耼承務郎以公參預俱監西京中嶽廟女一人適故朝請大夫直煥章閣知慶元府程準孫二人續祖承務郎知於潛縣丞同祖尚幼女三人長適進士史沾次適承務郎監兩浙轉運司慶元府造船場程端節次適進士魯之績曾孫一楚孫女一五年三月甲寅葬公于嘉興縣履仁鄉東洲之原公天分素高加以篤學而家訓尤嚴親聞公言初第拜親少師戒之曰得官誠爲可喜然爲官正自未易爾其謹之義方類如此又禾興輔郡紹興間寓公寄客多時英賢朱少卿自號巖壑最爲名勝次如董公彌大將方公景南雲翼祝舜俞師龍鮑任道仔聞人務徳滋皆源流前輩詞章政事學問論議各有所長公從之遊聞見益廣所著諸書悉有功于後學既以此發身又自初筮歴官所至可紀逢辰雖晚譽望已高擢用甚峻而士論遲之主眷日隆注意大用皇太子垂情宫寮雖在遠外念之不忘惟公侍資善最久輔導最勤顧遇尤渥然方居急流而抗議以沮權姦翩然求閒不復顧忌一歸若將終身焉憂國一心耿耿不少變再為聖主一出干霄直上建立愈偉老而益壮然用之太晚耄未及而疾困之性篤孝友少師囑公以二弟模年貌相若愛之固深棟未冠而孤撫育訓飭卒為善士近嵗先卒貤恩贈官詔特從之嘗命諸子以遺澤任二弟之子居鄉以誠接物不事縁飾是非枉直判于語下不爲後言人雖憚而服之周貧濟急尤篤姻黨生理素薄輸送自同編民門無雜賓亦無敢干以私者故廬僅庇風雨既歸闢丈室于左以東宫所書一軒榜以銀題朝夕游處庭前殆不容旋馬清裁若不可犯而樂善好賢稱奨人才不遺寸長又訪問賢能疏列姓名及其可用之實以備采取其所薦進亦不欲人之知也近時小學日微公素耽嗜字源干禄用意最深好之者始知其爲工作字遒美行草俱勝隸古小篆動皆有法尺牘人多藏弆扁榜亦所在寶之鑰初未識公而同年李吏部聖俞嘉言同在宗寺出班馬字類致公之意俾為序引則知公之相與有年矣既老復來公亦賜環而歸㑹當集議傾葢于政事堂一見如平生歡同入兩地協心無間議政餘閒啇㩁古今論文説詩亦時出法書名畫清談從容温然如春事有不可剛毅不囘久而益敬真畏友也執别而歸書問時徃來墨猶未乾而訃聞云亡之痛固非稠人比既受銘文之託偶以多病心志凋耗筆硯盡廢日過故府惕然于中乞身欲歸僅能屬稿既不能發明潛徳終有媿于公云銘曰婁之得姓實本東樓在漢為劉自建信侯後復厥初乃因避鏐累葉嘉禾義豐徳修惟公國器河圖天球文以發身仕學俱優立朝正色告后嘉猷寖登要津貴名日休權姦専國欲挑氈裘債帥總師妄人運籌衆莫敢言徒懐私憂公獨抗論力遏狂謀六月出師石爍金流人厭綌絺士困櫜兜僅取邊壘㨗書置郵自謂破竹期功于秋老師致寇氣索語偷幾如鄧騭欲棄涼州謂公立異屏居林丘一偓不容衆楚競咻初謂沮軍末乃思婁元惡既誅舊徳是求四皓來漢二老歸周間于兩社克壮其猶同寅協恭厚徳鎮浮饑饉寇攘瘡痍未瘳彌縫調燮相與咨諏勢方向平公去不留哀榮雖備急景已遒典刑已矣後孰與儔殄瘁悲深為銘諸幽尚爾後人先烈是侔集英殿修撰致仕贈光禄大夫曾公神道碑宋興崇尚儒術振起一代之治直史館贈太師密國公南豐曾公致堯以文鳴當世直道正言事太宗真宗為名臣是生博士贈太師魯國公易占有文章政事材而仕不合為文十餘萬言又著時議十卷荆國王文公志其墓蓋首稱之六子皆登進士第達者三人曰鞏為中書舎人以道徳文章名世學者宗之號南豐先生曰布位宰相諡文肅曰肇終翰林學士諡文昭當元祐盛際徽皇初政再為詞臣氣節論議尤挺特卓偉名儒如上蔡􅀛山俱謂端嚴有大臣之風其後亦最盛後六十餘年曾孫刑部侍郎炎與從弟吏部尚書㬇相繼取世科同為天子從臣故家文獻表表一時而南豐之曾益重于天下矣侍郎字南仲祖纁明春秋擢第奉使數道歴知高郵軍舒州甫强仕終承議郎贈左中奉大夫父協年十九以詞賦魁胄監一上不第則攷古著書有雲莊集行于世終朝奉大夫知永州贈正奉大夫自文昭三世皆娶强氏文憲公家永州始居湖之徳清公幼警悟能言即知讀書正奉語公曰吾家由密魯二公至而祖雖皆取科第然師友淵源非止利禄而已汝當志其遠且大者因銘其書室曰求已以勉之公服膺義方益自刻勵從名儒授毛鄭詩紹興三十年入太學端明汪公應辰為司業深器之隆興元年賜進士出身授左迪功郎㤗州海陵縣尉兼主簿時敵騎驚擾所在寇攘官吏多解散公曰巡徼職也吾其可去乎乃廣為榜諭以安集之親捕劇盜數十輩不以賞格介意而言于理官兵燬之後宜從矜貸類得末減臺郡爭論薦將羅致幕下竟守職不就秩滿以闗陞及酬奬循左儒林郎調徽州教授篤意教養更新學宫課試精審有自旁郡執經席下者奉二親就養與其季燮俱公立三樂齋以見志丞相周文忠公必大參政李忠文公彦穎繼為禮部侍郎與當路交上京削垂滿丁正奉憂服除再為温州教授如所以治徽學者凡經指授皆為時名人淳熙八年改通直郎知建康府江寧縣事轉奉議承議郎江寧軍民雜處治訟多牽制公不以利害囘撓一意字民獄犴屢空催科無擾民感其恵皆先期樂輸推排陞降悉得其實至役有不俟差而願充者公先于暇時摭前輩賢令嘉言善行與法令之所當守者為邑政總類一書講畫既詳故施于臨民迎刃而解父老詣臺府借留參政錢文恵公良臣帥江東偕監司上治最吏部侍郎沈公揆繼將漕又請亟加奬拔以為天下治邑者勸任滿命赴都堂審察十五年以明堂恩賜緋衣銀魚十一月幹辦行在諸司糧料院光宗覃恩暨年勞轉朝奉朝散郎紹熙元年八月遷大理寺主簿以新制兼左評事究心詳讞稱為平允輪對請選劇縣嵗命近臣舉歴任二人以授之無拘資格隨事旌賞治有殊績則待以不次又請申飭􅅦酤征税之禁利害詳明時論韙之二年八月除司農寺丞被㫖和糴米石五十萬選屬吏之才者授以成算戒以苛取不趣而辦三年轉朝請郎九月丁母碩人憂五年十二月擢知温州慶元元年三月陛辭復申劇邑薦舉為令之議又請稽版籍聯保伍汰巡尉之罷輭者永嘉號多士素服公化故教令所下不誡用勸闢良田以贍學養濟院以醫廪其廢疾無告者民産子棄而弗字月以公錢給乳哺者費全活甚衆二年秋未穫颶風淫雨海溢為菑樂清尤酷具舟筏畚梮以濟捍之極意賑䘏奏蠲丁錢數千緡水退修築瑞安石岡及平陽三斗門為東塘以殺其衝皆使可久至今人賴其利公正身帥下細大畢舉戢吏拊民以循良稱里社生為立祠且碑以紀其徳丞相葛文定公邲鎮越及諸使者皆以最列二年轉朝奉大夫三年召赴行在所四月入對勸上垂意經術恪守祖訓嘉納忠諫斥遠私昵杜絶用例之弊申嚴贓墨之科遴選邊將久任帥守停印造以重楮劵禁銷泄以羡銅錢廣和糴以厚邦儲蠲逋負以寛民力皆當世急務除尚書户部郎中治左曹事躬理文案滯訟頓清九月充金國正旦國信使將行值憲聖慈烈之喪既越境諭使去樂接伴納噶厚之以他辭解抵故京地前導奏胡伎公叱止之比押宴者至猶然公避席不拜引義詰責往復論難竟去口宣賜樂等語始就位授館燕山凡命宴皆請去樂及罷燕射悉勉從使還未嘗道其事惟以講求内治諄諄為上言之始文昭嘗使朔方増重國體及是有問公家世以南豐對稱歎名家者再知典刑之所存也四年以竣事轉朝散大夫六月復除户部郎中總領淮西江東軍馬錢糧諸郡賦不時入侵欺移用其目實繁綱運􅁦蠧特甚緡錢失期者三百萬餘他物稱是師不宿飽公奏請下諸路期以兩月起發且議賞罰上可之公復手疏屬部約以不多為文書不遣吏卒要束既定輸送以時凡部運當進秩者面以奏剡授之競知趨勸軍給以饒五年轉朝請大夫七月除直敷文閣福建路計度轉運副使首亷所部疾苦民有被訟久繫而訟者反匿不出乃戒郡縣必兩造俱集始得予決自是良愿無擾姦無容欺奉詔上便民事公奏請委部使者以翻訴之多寡當否為縣令殿最詳列賦税于契劵之首以革産去税存之患二税不許高價折估獄案以時奏報定物力選獄官多見施行又奏倚閣上四州積負鹽本併免州縣所負正税及虧收錢合十有六萬緡累嵗困于郡邑囚繫者呼舞散去而漕計視始至増鏹百萬悉付來者以寛氓征嘉泰元年三月詔入奏計因論屬縣掊克之弊謂縣有内外内縣于州取給故苗税征商悉歸于州若外縣則俸給衣糧與凡支費不一而足今為郡者苗税或概輸于州倉征商或使他官吏侵擾為縣者反藉以旁征巧取肆行無忌小民赴訴郡不敢詰宜戒其交相規奪上嘉納之除樞密院檢詳諸房文字歴右司左司郎中兼刪修勑令官二年三月遷中書門下省檢正諸房公事嵗中徧居宰掾禆贊為多四月除起居舎人因直前奏事請捜舉遺逸長吏禮遣詣闕以備咨訪九月敕令所修進慶元條法事類轉朝議大夫十一月除起居郎兼權刑部侍郎同詳定敕令十二月轉中奉大夫尋改兼國史院編修官實録院檢討官三年四月除權侍郎賜服金紫經筵讀兩朝寶訓終篇轉中大夫公持心忠恕臨事明審每謂刑獄為生民之命必使姦豪畏法吏不舞文乃可言政廣右鉅商虐死其弟流竄逃歸輙從外臺改正復有訴者下棘寺閲實權門諸用事者表裏寺吏曲為道地綴補文書肆為誕嫚公察其姦執付京兆獄吏求解萬端公持不少貸且併劾商人罪卒以是去六月提舉江州太平興國宫史院進孝宗光宗實録轉大中大夫郊祀恩封曲阜縣開國男食邑三百户開禧三年轉通議大夫嘉定改元皇上更化盡起故老二月公被命守婺未幾改姑孰暑行抵郡適師旅饑饉之後勞來流徙寛逋節費政聲徹聞至秋感暈􅅭疾㑹合肥擇帥詔以集英殿修撰移鎮公曰臣子事君東西惟命今既屬疾焉可冒為丐免之章數上有旨輟行治姑孰如故雖整軍息民為國遠慮而疾日以侵求去益堅二年二月竟遂祠請復提舉隆興府玉隆萬壽宫宗祀禮成進封開國子加食邑二百户四年自為奏述出處大槩乞骸骨詔以通奉大夫仍本職致仕越數日薨矣寔正月二十日甲辰也享年七十有一遺奏聞以光禄大夫告第官其後如格八月丙午葬于臨安府錢塘縣欽賢鄉西谿山先塋之次從所自卜也娶九江王氏封碩人克有令徳善相夫子先十年卒子掄承務郎前監嘉興府都税務女適承事郎新知婺州東陽縣陳貴誠孫仲良登仕郎公資稟純明器識凝遠事親盡禮謹守家法妙年決科安于平進自海陵赴調有同姓為聘使者金人問其氏族自言蜀人又問南豐後孰在班列既歸以告于是朝廷始加搜訪時相意屬公而公方欲從校官卒故業遂為新安之行不復以姓名通未受代三十六日遭外艱既免喪或以銓制方嚴欲為圖賞典以補餘日公亦不顧竟遲次六年而前舉者皆無恙恬于勢利乃如是先世資産推與其季又以正奉遺澤及公郊恩任二從子内外族姻以至鄉黨鄰里婚葬急難必賑而助焉待人接物謙抑有加而律己持正不可迴奪敭歴中外徊翔久之始登禁從既不得其職而去杜門卻埽谿園數畝杖屨徜徉自號覺翁因以名菴晚年意象簡黙所造益深由少至老好學不倦六經子史手自校定且以諸史傳記攷釋資治通鑑續于攷異後短章大篇凡所述作率皆温潤典雅而楷法行草見謂精詣尺牘書判好事者藏弆爲榮有覺菴集與邑政總類藏于家公既葬掄以校書郎陳君貴謙之状來曰先君子于法當得諡將有請矣願先爲銘詩表于隧道慨念在昔先太師岐公初掌奏邸正奉接武周行一時列院有子若弟多為新進士鑰于公事契既深襟期莫逆攝事西垣公丞大農俱奉親輿升堂展敬兩仕永嘉載筆左螭皆有在前之媿及鑰起于挂冠公方奏最藩部同年生落落如晨星日徯公歸以慰遲暮而公薨矣鑰長于公四嵗亦豈久于世者死生契闊撫事興悲衰顇何足言文惟公不負文獻之傳故立本朝使鄰壤挺挺有祖風烈詩云惟其有之是以似之非公之謂歟銘其可辭銘曰惟曾受氏曲列始封舞雩之傳望于南豐有户部郎事我二宗博士繼之顯不在躬六子聯芳弟上攷功徳望彰徹曰文昭公本厚源深寔生覺翁學以求己中積外充早挹世科奏最一同翺翔周行敭歴西東仗節殊鄰氣讋夷戎外庸既訖從上法宫進難退易先哲之風聖化更新起于閒中申畀鉅藩疾已内攻施弗盡才奄其令終西谿之原父祖是從後來方興銘詔無窮攻媿集卷九十七
