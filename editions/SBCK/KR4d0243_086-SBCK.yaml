body:
  text: 宋樓鑰撰行状皇伯祖太師崇憲靖王行状曾祖世將華州觀察使贈太師福國公妣李氏封淑人贈商國夫人祖令譮武略大夫贈太師益國公妣劉氏封宜人贈齊國夫人父子偁左朝請郎秘閣修撰贈皇兄太師中書令追封秀王諡安僖妣張氏封秀王夫人本貫玉牒所諱伯圭字禹錫年七十有八状鑰仰惟皇朝以忠厚仁澤涵養天下累聖家法相守一道本支繁衍日熾而昌親睦九族恩禮隆備真足以度越千古恭攷國史開國以來屬近行尊貴窮人爵富溢萬鍾不知幾人然皆生長宫邸専奉朝請雖威望彰明有如周王亦未嘗著民庸于外自熙寧間稍就外補才業寖顯各以所長自見爲世豪英代不乏人曾未有位極人臣出處繫海内重輕者若夫歴事四朝寵光赫奕以間平之賢躬曾閔之行出為龔黄之政入有旦奭之望兼是數者而又壽考康寧子孫盛大始終無憾二百四十餘年間其惟崇憲靖王乎鑰四掌玉牒嘗攷福國公藝祖皇帝之元孫也建炎元年安僖為秀州嘉興縣丞孝宗寔生于官舍安僖生不及進用殁有追封賜諡之寵尋又築祠堂于行在所建園廟于塋域如濮安懿王故事又升秀州為嘉興府所以寵賚之極矣王其長子也安僖被服儒雅由舎選擢宣和元年貢士第交游皆一時名公王在髫齡有成人風安僖肅重客必命王侍植立拱聴長而彌謹安僖任子請以先外表張似之安僖大喜雖銓曹以法不許王之器識自少已不凡矣紹興七年明堂恩奏補將仕郎十三年安僖薨王號慟哀毁見者隕涕有㫖令秀州應辦王傾橐以襄事一毫不取于公家十八年授廸功郎秀州華亭縣尉邑苦多盜王周行境内以五家爲甲一家警盗則四家應之一家容姦則四家同坐盜無所容焉有鹽鐵塘自金山海口屬郡城二百里而近嵗久淤塞鹽運不通王建議疏鑿卒賴其利齊國之喪以承重解官二十五年調宣州司法參軍既至㑹常平帑廩事發興獄逮繫甚衆守將案前政王請寛假守不聴王曰法固甚重然官劾吏竄則亡失者不可復得若少假嵗月庶可償納懲治未晩也代者得以保全尋為補足有囚當死王疑而爭之守是獄掾觀望者隨靡王辯愈力後加詳讞罪止流役戚方出戍道郡境津險而梁敝檄郡為桴筏期㑹迫甚郡以屬王且行且謀凡官地有林木皆黙識之歴津梁則度廣狹材既周用馳詣軍中勞以牛酒且告戚云筏材已具役民恐不及事又非所習若調軍士五百繕治之可立辦也方既樂從王臨視優犒士卒競勸甫畢而師至民不知役守益歎服三十年孝宗自普安郡王爲皇子封建王是冬以舉主循從政郎明年夏添差兩浙西路提刑司幹辦公事未赴特改宣義郎尋添差通判明州三十二年六月孝宗受内禪八月除集英殿修撰知台州隆興元年十二月以職事修舉擢敷文閣待制二年秋潦暴漲加以潮溢亟遣舟濟溺者水將入城囊士塞門補苴罅漏水殆及女垣不爾則民幾爲魚矣細民多以鬻鹽抵罪王深念之諭巡尉使嚴譏邏獲鹽則歸之官而縱其人獄訟為之衰息而嵗課自若也以治行改知明州充沿海制置使敵再犯邊嚴海道之備傳檄不絶驚譌訩訩王命邀郵筒于遠郊宻受以入民始晏然乾道元年嵗大歉飢民麕至分處寺觀發廩振救多所全活真里富國大商死于城下囊齎巨萬吏請没入王曰遠人不幸至此忍因以為利乎為具棺斂屬其徒䕶喪以歸明年戎酋致謝曰吾國貴近亡没尚籍其家今見中國仁政不勝感慕遂除籍没之例矣來者且言死商之家盡捐所歸之貲建三浮屠繪王像以祈壽島夷傳聞無不感悦至今其國人以琛貢至猶問王安否六月以獲海寇功陞敷文閣直學士二年冬以邦人舉留再任益思所以恵民者定海有沈窖湖豪右侵築民失其利開浚復舊蓄泄以時規模宏固抵今賴之又有茅砧碶與慈谿接畛定海居上流旱則足以溉灌水則以慈谿為壑紛爭久不定王以帥事行縣親視其宜俾浚舊溝溝成兩邑皆利而爭者息矣三年秀王夫人寢疾藥必親嘗衣不解帶既遭内艱擗踊攀號絶而復蘇溢米不入于口喪行邦人擁道送之面色深墨哀動行路四方賻禮日至自以俸餘足以終大事悉辭之五年服除八月再知明州下車謁先聖顧瞻學宫頽敝大出緡錢葺之自大成殿御書閣稽古明倫二堂以至齋舎門廡為之一新增置書籍月課諸生所習以酒醴勸之宗子不遵防檢者俾入學舎閑以規矩與生員同後多修飾取科級者于是相與立生祠于東序制司水軍舊屯于城外之江東時得㫖移定海軍于平江之許浦王請于朝謂定海控扼之衝不可撤備移制司軍以實之增葺舊營度容萬竈又造鎧甲器械甚備璽書襃焉歸正揀汰軍士來者無所歸王為度地城隅為屋數十楹以處之頃嵗膠西大㨗之後海波不驚而降者言始謀本欲直犯吾境或譌傳連結髙麗者上下疑之王益治戰艦嚴閲習以張軍聲遣郡人徐徳榮覘之得要領以歸遂寛東顧之憂六年陞學士海寇葛明張甚王以方略授將佐毎遇必勝王曰兵不可久也遣人諭以逆順禍福遂降羅拜于庭股栗莫敢仰視王為卻兵衞霽威嚴以問始末明感泣悔懼願自效又進其黨詰之其脅從者縱使復業寮屬謂明之罪不可貸且恐其飽則颺去王曰既懐來之反其鋒以為用餘孽不足平也奏請授以官有以佚罰為言者王復奏曰誘之降而殺之後日何以使人遂補將校又有倪徳號倪郎尤為難制遣明禽捕人尤危之恐其合而為一也明感恩盡力徳技窮亦從招服明年王以此轉一官願以分及將士復請以徳為禆將自是賊之巢穴虛實動息皆知情見力屈姦黨破散海道一清以王善撫二人而用之也八年陞顯謨閣學士九年陞龍圖閣學士皆以郡人借寇之請也嵗饑糴價翔踊王曰此富者閉糴以幸災治之則益甚乃出二十萬緡遣人糴于浙西閉糴者計窮爭先出糶米舟尋亦踵至其價大平饑而不害官無一金之失而行者又得其利王之慮事周密類此在郡前後十年政尚中和寛猛相濟平易近民千里安之禮遇寮寀人樂為用兩造在庭必据案究其情實多勸諭使平之其抵于罪率從未減平反死囚至數十百人嘗獲鑄銅者數輩謂曰汝欲希利而冒重禁耶人與錢二萬使易業碎其器而書姓名于籍後犯決不貸也亦無敢再犯者每曰節用愛人不易之道與其苛取急征以資妄用孰若量入爲出以求裕乎不飾㕑傳不事包苴鄰郡交餽盡歸公帑行之既久沛然有餘百廢具舉斂不及民以郡之西湖爲放生池扁其堂曰廣生列石于側刻採捕之禁待遇賓客不爲豪侈而尊爼風流恩意周洽寓公寄客皆得其歡心而不敢干以私也自以久去松楸屢求閒退雖優詔狎至而歸志不囘淳熙元年十一月始得請除端明殿學士提舉江州太平興國宫去郡之日貴賤耋稺攀轅挽留出境不絶三年積官至朝奉大夫二月換授安徳軍節度使提舉隆興府玉隆萬壽宫九月加開府儀同三司充萬壽觀使九年九月充明堂大禮橋道頓遞使至是始見孝宗天顔感動清問款密王性素謹不敢以語人又朝于徳壽宫髙皇喜曰久欲見卿撫勞甚至禮成加少保封滎陽郡王髙皇曰吾欲自見篤睦之恩賜以玉帶十二年充郊祀别廟亞獻十四年髙宗登遐王奔赴見孝宗于素幄龍輴啓塗事大體重詔充總䕶使十五年六月加少傅八月充明堂禮頓使十六年二月光宗龍飛以皇伯加少師紹興元年三月詔入覲加太保嗣秀王仍賜甲第于安僖祠堂之側屢欲奉孝宗幸祠第王力辭憲聖慈烈皇后賜水月園堂曰瀛燕亭曰玉林湖州私第中又有堂曰慶遠圃曰小隱樓曰溪山勝㮣扁榜皆三朝宸翰也紹熙中憲聖洎孝宗光宗皆同中闈屢嘗臨幸光賁林壑詔益其地竝湖為複閣有司既度材矣王恐重費縣官又固辭焉每侍情燕之閒兩宫皆待以家人禮王執禮愈恭語不輕發一日孝宗宴私隆洽不覺前席密問潛龍時事王遜避良久徐奏臣老矣不復記省問至再三終不敢言孝宗笑曰何太謹也然以此益加愛重嘗召王及諸子宴于北宫之静齋孝宗曰近者元夕簫鼓之聲不絶斯民自得其樂不欲禁止然物戒太盛為之惕然是夕不飲酒僅啜一盃湯而已大抵人君不可不事節省若肆意所為將何所不至王對曰陛下兢業如此雖堯舜無以過自古人君誠能不溺于宴安則怠荒之念何從而起孝宗深然之二年六月判大宗正事宗司任法太過天族固賴以整肅而頗虧親睦之意王處以平恕厲以亷恥鮮犯令者每言要當先教導而後齊之嘗建議别立宗學月書季攷以教天下之宗子請出餘禄以助贍給又以減宫廟員闕之多請復増數以優之事雖不行識者韙之三年六月拜太師五年辭大宗正事七月主上登極加皇伯祖免奉朝請九月充明堂亞獻詔加兩鎮于是兼崇信軍節度使十一月充永阜陵􅓖宫禮儀使慶元元年以復土拜中書令王以曠典五辭御筆答曰遜避莫囘勉從所請可别議襃崇之禮乃詔贊拜不名嘉泰改元賜第為火災延燔乞還湖州故居守園廟二年春趣召賜肩輿至殿門令子孫扶掖命有司復營舊邸四月王丐歸九月癸亥薨于正寢遺奏訃聞上震悼輟視朝三日賵贈加厚賜棺含以蟬冠朝服斂遣内侍押班左武大夫保康軍承宣使呉思忠等五人䕶喪設祭之文甚寵曰藝祖造邦源深流長子孫繩繩百世其昌巖巖秀邸不顯其光積久愈厚篤生賢王濯濯祥麟玉質金相允文孝宗則友其兄召繇外藩賜第于京迺分茅社于彼滎陽赤旂金節絢爛綏章文考念功曰篤不忘建祠秀園舊履是荒太師維垣衮衣煌煌爰暨沖人應龍初翔宣力百為調娯多方予嘉乃勲臚句不名紫㣲是令遜避勿遑貴極愈謙年耋益莊踰七望八熾昌壽臧子侍孫攜蟬冕相望王比來朝精神方强謂當百年鎮此宗盟不遠伊邇降此弗祥維大父行生死哀榮王實無憾典刑云亡緘辭徃尊寄哀一觴又遣太常博士錢易直等軷祭于都門外文曰我伯祖父標的宗英奉釐列邸隱然維城天胡忍予殱此老成爰飭邦典命使以行遥致奠斚以賁泉扄爰以量幣清酌齊牲粢盛庶品用薦哀誠十一月癸卯諸孤奉王之喪葬于烏程縣永新鄉成山之原王娶安徳帝姬之女信安郡主宋氏父保慶軍承宣使駙馬都尉邦光寔徽宗皇帝外孫也封衞國夫人先二十四年薨追贈齊魏國夫人夙有懿範嫓徳娠賢用肥王家子男十人長師䕫興寧軍節度使開府儀同三司充萬壽觀使以王之襄奉哀毁而薨贈少師追封新安郡王諡恭滎次師揆檢校少保奉國軍節度使提舉佑神觀兼秀安僖王園令次師垂定江軍節度使提舉佑神觀次師稷蚤亡次師禼深州防禦使提舉佑神觀先五年卒贈昭慶軍節度使追封信國公次師禹慶遠軍承宣使提舉佑神觀次師臯保慶軍承宣使提舉佑神觀次師嵒朝奉郎新權發遣通州軍州事次師彌奉議郎添差通判嘉興軍府事次師貢宣教郎添差通判廣徳軍事師嵒師彌師貢俱得㫖除直秘閣未拜女三人長嘉興縣主適故朝議大夫直秘閣知蘄州軍州事鄭嗣宗蚤亡次永嘉郡主適故宣教郎添差兩浙轉運司主管文字張似續次新安郡主適朝奉郎直秘閣新權發遣髙郵軍事史彌堅孫男二十四人希道朝散郎新權發遣嚴州軍州事希明承議郎新權發遣黄州軍州事希遠通直郎添差通判慶元軍府事希徳通直郎添差權通判衢州軍州事希永武翼郎特添差兩浙西路兵馬鈐轄湖州駐劄希顔故儒林郎紹興府上虞縣主簿希行故將仕郎希古武翼郎特差行在㸃檢贍軍激賞酒庫所幹辦公事希純奉議郎添差通判衢州軍州事希閔右千牛衞將軍權主奉秀安僖王祠事希忼右千牛衞將軍希䚱太子右監門率府率權充秀安僖王園令希憕忠翊郎特添差兩浙西路兵馬副都監嘉興府駐劄希栞承事郎新差監臨安府糧料院希諟太子右監門率府率希呂忠翊郎希怟成忠郎希復忠翊郎希邛承事郎餘五人未賜名補官孫女十人長永康縣主適通直郎知江隂軍江隂縣事胡元卿次適承務郎特改添差監兩浙轉運司造船場范莘次適保義郎新差幹辦御前忠佐軍頭引見司呉璞次適從仕郎特添差婺州觀察推官林燮次適承事郎特添差通判嘉興軍府事韓杞次適承節郎新差幹辦御前忠佐軍頭引見司呉珙餘未行曾孫九人未賜名補官曾孫女十五人長適文林郎特改添差婺州觀察推官沈煜餘尚幼嗚呼杜甫謂汝陽王爲眞天人鑰謂崇王天人也其生也秀王夫人夢彩仗傳呼導朱袍而冕者直至寢所奏鈞天之樂既覺聲猶在耳免乳之際香霧滿室終日方散及為安僖卜宅兆銜哀走數百里惟烏程之菁山最佳卜之而食然念力不能致裴囘其處一叟忽前曰官豈姓趙而欲求葬地乎王矍然曰汝何以知之叟曰嘗夢神告我矣指所卜之地以售今寢園是也方丞郡時居湖心僧舍夢有形狀獰異而繡衣者乘小舟環繞數四訶問之則曰公他日當為地主故巡䕶爾既為守又嘗夢其人言有召公者過小橋人之憔悴與支體不具者紛紛求拯援甚哀尋見所召者曰適所見得無動心乎此曹久不安居願庇之唯而覺莫知何故後出郊過一橋恍如夢所見而道旁藁葬纍纍有暴露者王悟曰神豈以是望我耶悉為掩瘞之晩嘗率鄉人禱雨道士伏章王盛服端立左右見嵲屼久之瞑而不跌頃之語人曰適覺神遊帝所以閔雨告帝既許我矣翌日膏雨如注闔境告足翰林學士洪公邁載于夷堅志尤詳神異之事固為難言如王之交于神皆明白而又有驗于後故屬纊之日起處如平時夜尚觀書甫二鼓始覺體中有異集子孫告之曰時至矣了無怛化殆仙去矣嗚呼王真天人也王風姿秀挺襟度粹夷忠孝誠篤恭儉謙勤皆其天分加以好學善持論春秋二丁必具盛饌祭先聖于家塾率子孫拜之四十年未嘗廢每曰熟讀論語一書平生受用不盡又喜誦孟子間舉二書之疑與客反覆論辯又摭其㫖而為言曰食色雖重禮義以安之富貴可求非道則不處又旁取釋老二家而為之説曰愛欲煩惱對治法門又曰願有情皆得度無情保長生書之坐隅以自警嘗有方外之士書廣大慈悲方便忍辱八字以獻其徒復為之辭幾數百言王書其旁曰廣大聖之事也慈悲仁之用也方便智之功也忍辱謙之徳也㫖要在此奚俟多言其人愕而退蓋其所存者如此喜玩法書字畫温秀如其為人賦詠賡酬愈出愈新多記詩詞筆端富麗棊品甚髙皆其餘事居閒則以此自娯也寛厚有餘事秀王夫人尤謹迎養在官退食娯侍夫人必勉以恕服膺慈訓不嚴而治未嘗案一寮屬作尉時有部使者責以躬督人舟王無難色使者見王徒步亦悔之後其子將丞屬邑久之不敢進王趣之且曰何待我之淺也終為剡奏丞至感泣燕居自怡申申夭夭無疾言遽色侍側勝冠者衆童丱紛如也皆假之色辭第戒以謹守儒素下至臧獲未嘗怒辱之不以貴盛自居嘗見丞相魏文節公于山間先屏騶閧及門下車趨就賓廡呉興太守旦日拜表僅畢而謁已入矣賓客至前少賤亦為之加禮總角朋游雖寒左皆能記憶至録其小字以示不忘鄉人為真率之集以勢位遼絶不敢有請王曰非所聞也竟與之周旋自奉至薄食不重味器不華飾衾襦用布浣濯紉補不棄也買屋而居稍加葺治詹事王公十朋為守歎曰某起書生築屋尚窮事力意邸第必極輪奐之美今見之使人媿歎親舊之貧者月有廩給嫁娶病故隨髙下濟之雨雪日久則令人走閭里賑施嬰孩遺棄則募乳者收育之蓋用之以義者則所不吝也鑰父子兄弟出入王門晩預班綴時得進拜眷撫有加焉王在朝端山立玉色貂蟬寶帶進止有度照映班列固已增重朝廷紹熙末年徃來兩宫調虞密勿若不動聲色而外廷屬目倚王以為重造厀從容多有獻替一語不露于人或有以傳聞求質者但曰無之故莫得聞焉此鑰所親見者兼直禁林王之加恩兩鎮拜中令三制皆忝視草迨丐外而歸隆暑中訪别于官舍屏居海角不敢以姓名入脩門王賜之書且致酒殽之饋若施于敵已者銘于心不敢忘也王之訃聞識不識皆有殄瘁之痛惟明之人去思最深至流涕相弔葬既不及為執紼之役亟走五詩以寓哀挽之私王之諸子自少保而下遠寄事實俾狀王之行將以求墓隧之碑鑰不佞竊惟王之抱負非淺陋者所能究識爰自建節之後富貴逼人名位日尊而所藴自是無由表見于外人但見其養威重保明哲而已盛徳全美細事本不必書王自少涉歴至多克勤小物持循有素故能善始以終為一代宗工重臣正以平時踐履積而至此故亦不得而略也敢具列之告于太史氏以備採擇謹状攻媿集巻八十六
