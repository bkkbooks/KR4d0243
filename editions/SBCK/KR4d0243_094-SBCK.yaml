body:
  text: 宋樓鑰撰神道碑少傅觀文殿大學士致仕益國公贈太師諡文忠周公神道碑二年原目以奉敕撰列前今仍之案前巻忠文耆徳之碑作于此篇後孝宗皇帝在位二十八年厲精求治久而不倦聖徳日新光紹祖宗宰相凡十有五人明良㑹遇可謂盛矣求其相爲終始全徳備福亦未有如益國周文忠公者始公親見龍飛御名之立已嘗預議中間再以力排權倖沮其枋用忤㫖去國略不少貶士大夫之過計者謂公不復用矣聖明洞照愈加襃擢遂至元宰任天下之重周旋密勿終贊與子之決以孝宗之實睿實聰公之明敏肅給眞千載之遇而又事光宗于春宮夾輔初政功成身退既掛衣冠猶被主上寵光者十年嗚呼其可謂聖朝之宗臣矣公薨之二年嗣子綸以書抵四明樓鑰曰先公既􅁙而隧碑未立謂鑰荷公之知晚而益深又嘗待罪太史氏俾為之辭且示以今參知政事李公璧所作行狀鑰不佞謹摭其大槩洎平日見聞之實而書之公諱必大字子充一字洪道世為鄭州管城縣人曾祖衎朝奉郎祖詵左朝散大夫父利建以上舍魁登第終左宣教郎太學博士以公貴三世俱贈太師秦國公曾祖妣郭氏祖妣潘氏李氏張氏妣王氏俱贈秦國夫人宣和中祖為吉州通判因家焉外祖給事中靚知平江府靖康元年公生于郡治幼孤歸信州外家從汳人陳持學太夫人躬督誦書率至夜分十三而太夫人卒公記誦絶人徒手入舉場有問者應如響文又工緻遂名薦書紹興二十一年擢進士第授左迪功郎徽州司戸參軍改監行在和劑局門以鄰火罷二十七年中博學宏詞科循左修職郎建康府府學教授三十年除太學録召試館職髙宗稱奏篇謂他日可掌制除秘書省正字循左文林郎三十一年改左宣教郎兼權國史院編修官三十二年五月除監察御史六月孝宗即位八月除起居郎直前奏事上曰朕舊見卿文有近作進來此眷注之始也侍立講筵奏勸講非爲分章析句正欲從容訪問以禆聖聰究治體兼編類聖政所詳定官暫權給事中兼權中書舎人嘗論邊事上以蜀爲憂對曰蜀民久困征求願降詔撫諭許以事定寛其力又奏比嵗史官不備故記注多闕欲先自六月十一日修纂前未備者併修之論翟婉容位官吏轉行礙止法事上曰初謂卿止能文不謂剛正如此公奏前宰執侍從依赦復職亦有不合人望當繳奏者上曰固然卿論事但令適中朕無不從也應詔條上十事皆切中時病其一嚴銓試之法又奏羣臣六參除朔望過宫外勿改舊制至今行之安穆皇后追冊祔饗公奏神主謁諸室前殿則不以欽宗服而廢祖宗之樂别廟奉安則乞備而不作金人來邀舊禮詔從臣指陳定論公率同列奏向者祐陵未卜慈寧未返以講好之故寧親寧神兩遂所欲禮雖屈而志則伸今而遽許之必謂我怯將有難塞之請使者之行當再用鄰國之禮彼或有辭則告以通好于用兵之後以何名而屈以何名而受耶事有當駮者皆極論其不可上亟加奬歎公亦言陛下有納諫之資故臣輩各思自竭龍大淵曾覿除知閤門事公同給事中金安節奏大淵罷副都承旨覿罷帶御器械俱以閤門處之實遷也若以攀附舊恩尚有可諉正以搢紳指目臺諌有言外議方喧而除命遽加陛下于將相要官或罷或貶一付公論略無適莫獨此二人乃為之遷就諱避殆非舎已從人之義也有旨罷劇就閒巳允公論尚兹囘繳可特依奏已而二相宣示御札謂給舎為人鼓惑議論羣起小事豈應如此公等奏言昧于事體専徇流俗輕瀆天威居家俟罪再乞重賜竄責俱不允入謝上曰朕察卿務舉職但朕欲破朋黨振紀綱耳旬日二相又道上意已再除兩知閤且云後省想亦無他公曰前已反汗今復申命豈敢但已格除目不下右揆以聞越三日不獲命以信州遷奉請祠兩任主管台州崇道觀乾道四年權發遣南劍州未赴六年改福建路提㸃刑獄公事陛對論帥臣有名而無其實將副具官而非其人又論雜舉中外文武之才以備選用益縣令之俸而責其亷及捕盜官􅀱六攷行賞執政奏擬秘書少監上可之仍令兼直學士院㑹草晁公武知揚州不允詔御筆改定公引故事乞罷不許兼國史院編修官初鄭聞草公制上改首尾詞公奏陛下取漢宣帝之言親制贊書明示好惡敢因訓詞推廣聖意臣觀漢社稷臣乃在乎周勃之鄙樸汲黯之少文霍光之不學至于儒者持禄保位則公孫􅀪輩實爲之故宣帝嫉之以爲俗儒不達時宜蓋有激而云爾使宣帝求真儒用之何至雜霸哉陛下以漢爲監則士風趨向歸于正矣上曰卿學術精深記問該博又嘗曰平昔所藴可以自見矣自此當日夕與卿論文兼實録院檢討官加上徳壽尊號公謂太上萬壽而紹興末議文及近上表例用嗣皇帝爲未安按建炎以後遥拜徽宗表及唐憲宗上順宗尊號冊文皆稱皇帝議遂定趙丞相雄以中書舍人奉使賀金主生日宗室伯驌為介御札生辰使兼齎國書一封理㑹受書公立具草有云尊卑分定或校等威叔姪情親豈嫌坐起後四日對秘殿上曰朕未嘗諭國書之意而卿能道朕心中事可謂大才賜坐久之欲退而不記來路上指示之命内侍導而出七年奏四事重侍從以儲將相增臺諫以廣耳目郎官専以旌外庸監司郡守皆當久任上稱其為要務皇太子領臨安尹公既草制因奏恐别無被受欲依詔書體式降付東宫兼權兵部侍郎上云學士院湫隘公奏宫城不容增廣陛下欲卑宫室臣等居此亦過矣若遴選名儒而信任之不在棟宇之麗也除權禮部侍郎仍兼直學士院升同修國史實録院修撰有旨公與吏部侍郎王之竒太子詹事陳良翰對選徳殿袖出御札引唐太宗魏徵問對以在位之久功未有成治效優劣苦不自知各極陳其當否公退而條陳練兵以圖恢復而用將之道未盡擇人以守郡國而責實之方未至又指陳大將郡守數易之弊且言貞觀政要四十篇既先之以魏徴論為君之道又著不克終之戒于編末蓋是時惟徵為善諌願思太宗廣諌諍之徳使嘉言日聞治道日興上嘉納且曰方圖力革二弊又奏諫官虚位願早擇正人先朝參用古制卑其品而厚其禮責其盡言使姦邪望風畏戢消患未形如近嵗張松韓玉等使臺諫無所顧忌早為力言豈至勞民費財始勤英㫁雖天縱濬哲安能盡見上曰如人奕碁當局多誤惟旁觀乃見之朕自此知戒矣又奏人主無職事惟在察臣下邪正凡輕于任事而速于求售者他日必至敗事不可不察若疑儒者不足用而専謂才臣能趣辨今既累年其效可睹唐太宗之臣即隋之臣藝祖之臣即五代之臣非前愚而後智顧人主用之如何耳又論臣寮務爲新説欲徼奇功王安石以堯舜之道告人主實行管商之術指司馬光蘇軾輩爲流俗尤當深察之上曰蘇軾卻是流俗可謂顛倒嘗奏江湖大旱上稱龔茂良措置有理公請出南庫緡錢二十萬代民租乃不乏事非不知大農急闕然艱食則盜起盜起則調兵費可省乎上曰卿議論殊善使朕聞所未聞謝曰臣惟以不欺事陛下兼侍講上以雨雪愆亢欲加精禱公奏洪範肅時雨若此殆言路曠官之證臺端一日不可闕今乃五旬不除上言未有人公奏百執事何至乏才兼御史臺令殿中闕具察官姓名取旨差權苟未欲輕用人亦可舉行此制上驚曰朕不知此遂宣諭宰相具上又奏近奉詔以僕射名官非古欲更其名周之太宰卿也小宰中大夫也中間所改亦未可用上曰太宰今吏部尚書爾止欲為左右丞相如同中書門下平章事皆可削公遂歴奏前古沿革而退八年權中書舎人公奏西浙為今日根本之地而賦税供億反重于他路且户部既理財朝廷又理財爭肆漁取致以隠漏為名増無實之税上曰此漕臣之繆公曰陛下既知何不改正因辭西掖且言外制之設正欲謹于出令凡有未當欲其繳奏非専責以詞翰也上曰正有望于卿因奏閩漕陳峴議變鹽法恐擾民難行又奏曹耜除府推事上曰知其人才欲與寺丞公曰臣即有文字上意不悦退而繳詞頭願别擇俊寮協贊元良耜知嚴州公亦免兼矣張説再除簽書樞密院王之竒賜出身並命公當草不允詔奏謂昨者舉朝以為不可陛下欣然聴納嘗云兹事誠誤旋即改命曾未周嵗復有此除貴戚預政公私兩失若謂西府間以武臣願擇大將有威望者畀之臣非欲専任文吏也且當是時之竒亦曾論奏今乃與説同升恐亦未當遽受也臣未敢具草時權給事中莫濟再封還御筆遂俱與外祠又趣公出門匹馬便面翩然徑行九年除知建寧府再辭不允中道引疾提舉江州太平興國宫天下愈高之淳熙元年除右文殿修撰説罷召還除敷文閣待制兼侍講六月兼權兵部侍郎嘗論改官舉削到部放散之制後雖潤色然自公發之八月兼直學士院上稱公持重不迎合無附麗除兵部侍郎仍兼侍講進太上尊號詔草上曰此文難于言而温純典雅無一字可議公奏向者初上光堯之號臣已預議庚寅之詔亦出臣手上愕然曰前詔亦卿所草耶兼太子詹事上論史事公奏李燾于史學如嗜飲食長編攷證異同罕見其比嘗論用人惟上智與下愚不移中人惟上所御為官擇人則引中人為君子若為人擇官則引中才為小人今不及數月已望遷擢後將無官可遷願力革此風愛惜名器又奏兵將官刻削等事上曰今不如此且言王友直極亷安有刻下公曰昨聞殿司進羨餘二十萬緡此何從而得上曰朕已不受公曰雖則不受當思其所自來上曰統制官不治財賦綂領卻治之可相闗防不致妄費公則曰此尤非也主將而下須令各得懽心今因小利更相猜察情既不通緩急何由得其死力又奏聞陛下日御毬塲固知不忘閲武然太祖二百餘年之天下屬在聖躬可不自愛上作色曰卿言甚忠得非憂銜橜之虞乎正以讎恥未雪不欲自逸耳又奏聞金星近前星上曰止是略近公曰天道高遠當論人事武士擊毬太子亦預臣甚危之上曰卿可語太子公曰太子人子也陛下命以驅馳臣安敢勸以違命陛下勿命之可也陞兼侍讀大禮執綏備顧問除吏部侍郎奏朝廷守至公之道有司持一定之法行以無私孰不心服近乃有任怨之説法行以公人自無怨上曰朕每諭大臣彌縫人情無有是處四年除翰林學士奏自唐至本朝優待詞臣以其無簿書之宂可以朝夕論思或有補于治道得人固多最可慕者陸贄歐陽修而已若乃進則有隠退則不密擠人而利己揚己以取名安能逃日月之照哉上曰學士宴見無時至為親近五年為御試詳定官屢乞去上問文士可代者聞吕祖謙能文公謂翰苑須用有學問者祖謙涵養既久習知典故史院甚得其力不但文字之工也得㫖撰選徳殿記又命書之後内直宣對别令中使引至碑下傳㫖記文詞采贍蔚召卿觀覽既見上又有博美之稱歸至玉堂御書白居易七徳舞賜之墨猶濕也後進呈皇朝文鑑序上曰卿之文在廷莫及真匠手也除禮部尚書兼翰林學士嘗論本朝専以仁立國兵非不用而以禁暴安人為本上曰兵勢似弱公曰仁故似弱實非弱也社稷靈長職此之由上曰所以竝無禍亂公曰本朝似周彼秦兵雖彊興衰竟如何六年詔禮官詳議明堂典禮公奏祀帝祀天以祖宗配此前朝已行之制世俗止誦孝經之語未嘗深攷其義致以今日為疑由是定圜丘合宫互舉之議公再執綏草赦引周漢故事有曰俶經路寢有皇祐之彛儀徧秩羣神有紹興之近制蓋明著古禮以示來世也禮成獻詩又進動天之誡上曰動天誠當以徳惟知道乃可語此公曰皇天親有徳饗有道此豈聰明作為所能為哉除吏部尚書兼翰林學士承㫖論六部長貳判依字遂改為從嘗奏祖宗涵養善類名卿才大夫相望自章蔡沮士氣以壊風俗奬讒諂以植黨與卒致播遷之禍中興一洗前􅁦得人為多秦檜以患失之心濟忌刻之資引庸人以充侍從對畢輙納副封既出其門無所不有人才衰落貽患至今論思之職上規人主次及大臣下及四方安可納副封耶願博求文武之英布列中外上曰如曾開輩今豈易得又及舜之無為非皆無所為也特不為期㑹之屑屑耳又言自古上自人君下至士庶鮮有不為左右前後之人所牽制者上謂公視草勞甚公奏臣素無汗馬之勞致此爵位正使宣力文字之間未為勞也上曰翰墨之功豈小補哉若大述作固當煩卿七年五月除參知政事上曰近見卿遇事殊不依違執政之于宰相事任非遠自當和而不同公曰韓琦歐陽修殿上日有所爭退則懽然無間最為可法後又嘗曰前此宰相議事執政更無語今乃肯各述所見公奏大臣自應互相可否秦檜用事執政至不敢措一辭後遂以為當然臣嘗以紹興初聖語示同列勉其協濟況陛下虚心無我惟恐臣下不言人臣乃欲自是乎惟小事不敢有隠則大事何縁蔽欺八月以久旱御筆付三省求直言初回奏慮所在因是皆有賑濟之請公言上明目達聰而吾儕不能將順獨不愧于心乎萬一上自行之或以此奏示外豈不􅀗罪公議相亟從之又奏聖明在上星變旱災殆繇臣等所致上曰若封事及大臣朕須留中公曰付出何害未聞有過而人不知也昌化有箭􅂖得米相以上再三及此議宣示外廷公曰天若爲瑞必無水旱乾道間有以九華山竹米爲瑞而得罪者且宣和有此豈是休徵遂已有乞改常平不以赦原之法公奏紹興中因孔括申請遂與謀叛等同科乞令削去祇從海行法遇兩赦或非次赦聴原公嘗極陳民困之由上問其故公曰且以平江府論之二十年前歸正添差等官嵗用五萬緡今乃數倍支移折變之數日有所増齊民安得不困此特其一爾上為之悵然進呈湖北月樁錢數公曰固出于不得已亦須平時有以存卹去嵗旱荒若非陛下先事賑救禁戢苛暴何以免流殍之苦舒州汪革始謀不善若如前代失軍民之心則乘災唱亂必致蠭起彼亦安肯束身自歸于司敗所貴得民正為是耳此非倉猝所能成其來有漸矣上大以為然上嘗謂樞密非古官公奏在唐止司傳導五代始置崇政院分宰相之權神宗亦有意廢併聖諭可謂盡善但二百年官制難以驟改不若且令二府互領更加熟慮有恃長樂之援求為郎者上俾諭給舎公奏臺諫給舎與三省相維持豈可諭意不從則失體從之則壞法命下之日臣等自當執奏上曰卿等肯如此任怨公曰當與而不與則有怨不當與而不與何怨之云上歎曰此所謂任責非任怨也上嘗言唐鑑一書興衰治亂之理甚明公奏祖禹著書皆可備乙夜之覽篇篇即是諌疏九月除知樞密院事上曰卿才堪其任三省本未可輟卿每見難處之事卿以數語決之可謂敏矣上謂公如統制官之類可時與之接以觀其才公因奏雷世賢説淮南地形緩急欲守滁臣謂不然廬和則當其衝滁沮山林可自守而不可以禦敵楚州舊屯軍八千雷世方乞止差鎮江軍五千人公奏山陽控扼清河口韓世忠實屯重兵今無故減戍他時或增必致敵疑揚州武鋒軍有衆八千本屯山陽若嵗撥三千同戍誠為兩便十年奏白氣自西南亘天宜為兵備上曰日脚之氣冬常有之公言此日官相寛之詞然有備乃能無患上嘗歎養兵費邦賦之八公奏自古未有五十年屯兵不解古者講和則罷兵今既有嵗幣而兵不敢徹所以倍費文州蕃部刧殺二漢人呉挺止申照㑹公請督其根治使知朝廷事必留意不敢忽略日有萬幾不察于微弊不勝救上曰自昔多因不防其微馴致禍敗温州軍士喧悖憲司欲先定汪義端刻削之罪仍正紀律公奏此風不可長恐兵愈驕郭杲請移江陵萬二千人與其孥永屯襄陽公言止當以兵之半分戍杲謂襄陽為要地而江陵亦在江北為呉楚喉衿爭辯甚力乃許萬人且令騎兵盡行上眷公益深嘗奏事退特命中使賜御筆卿臨事明敏而有決朕每嘉之宣諭金主避暑壽安所徙器用倍多且分諸子出鎮或謂欲至東都秋間議過上京公奏當豫為之備甚詳上稱公通練軍政深副朕擢用之意公謝曰臣本以文墨受知豈能曉暢武事誤蒙任使不敢不勉彼方恫疑虚喝正恐我或先動所當精擇邊將鎮之以靜上曰朕嘗戒臣下以公心人自無説公曰所以私者欲收人情其來無窮得者寡不得者衆若不裁以公道恐譽者不若毁者之多以陛下聖明臣等智慮所不及則有之何敢有所欺也十一年奏廣中鹽法既更州縣空乏事勢可憂詹儀之胡庭直皆賢而才短故鋭于革弊而不能計其後已而果然公言趙汝愚在福州百廢具舉孜孜國事殆不多得王希呂緩急可當一面彼小亷曲謹雖無瑕可指卻恐誤事上曰如趙雄汝愚希呂皆帥才也義勝軍皆契丹渤海漢兒慕義來歸屯于興元御筆以金商山險欲移襄陽用騎之地聞其營砦遭火因以遷之公奏路經金洋當先計人馬之數使郭杲于襄陽豫辦方可議遷更令彭杲具以此意深察衆情御批卿謀慮深遠良用嘉賞六月拜樞密使上曰卿在西府光前絶後若有邊事宣撫使惟卿可他人不能也呈諸軍陞差籍公奏已及一季欲間召一二雖不専用此取人亦因以察其能否使主將不敢容私上令赴樞密院審察後池州李思孝自言正將二人不能開弓乞與罷軍上曰此皆樞使措置之效北牒以上京道遠權止賀正生辰使一年宣諭卿等料未必遣使今果不來可謂廟謨矣王希呂乞增兵戍廬州上以萬弩手民兵已多止可分數千人公奏須與萬人蓋當以正軍為主則帥司可立帥司既立則沿淮歸正山水寨民兵皆為我用矣十二年留正申西兵巳免起二年今年取㫖上以三衙不可闕欲令發來公奏襄陽兵少閻世雄欲得此人敵不得志于四川又嘗送死淮南深恐睥睨荆襄遂與一年金州謀帥公欲令侍從管軍薦舉上曰大帥當自上除授公曰舜用九官皆咨四岳與其私薦不若明揚若能攷實孰敢妄舉因論邊報異同上奬諭云事無大小卿皆究心公又曰天下安有不可措置之事上曰昨密問一事卿便條上數端深謀遠慮朕所不及也上謂王藺論事頗偏公奏藺雖稍過然汲黯在朝淮南寢謀盡言而不顧身者陛下左右豈可無此等人況以獻納為職若上下相䝉非國家之福也先是御筆大石契丹欲加兵于金果有之在我豈得漠然固不可違誓或有釁端何以為詞公奏彼一方小警何至移文宿泗若果有釁何患無詞急在間探精審耳至是又諭結約夏國事公奏頃嘗因任令公帛書通信金以示范成大夏國難保如此似未可也後又報呼嚕大王據上京上問公公奏兹事體大當隨機應之未幾上諭公所傳皆妄樞使眞有先見之明矣廣東帥潘畤以擅斬逃兵自劾上批無罪公奏帥無便宜之文不經録問詳覆而斬四人雖鋭于除惡然人命至重不可輕許洪邁守婺誅首亂六人止是放罪後不妨旌賞十四年二月乙亥宣諭卿在樞筦凡事無不經心更旬日拜相後人難繼丁亥拜右丞相尋兼提舉國史院㑹要所敕令所上諭以擢用人才及委任之意公奏東府事繁非西樞比自古鮮有無事時今賴陛下勤政内外晏然殆將二紀此正可懼之時當思經遠之計又奏舜禹君臣相戒唐太宗不存形迹臣等過失望陛下隨事戒勑免積罪戾臣有所見不敢廢弼直之義日有論奏動係天下休戚比至給舎繳駮臺諫論列已為後時不若致審于初又奏人才不失之虚夸則失之緘黙凡宂宜求篤實為國者大旱求退甚力上曰方賴卿等協贊若捨朕而去誰與共此又請依慶歴中例降秩一等亦不許徧禱羣望下詔求言遂奏實恵及民莫若寛減夏税施徳當自近始㑹稽和買詭避至多請權免一年徐議釐正秀州乞權減大軍總制錢二萬餘緡吏擬勘當公曰此豈勘當時耶奏蠲之上方篤意捄荒其所以贊寛仁之政不可勝紀封事多言大臣同異公奏豈可尚同要當各盡所見臣每謂同心體國茍有未然雖面相詰責何害止欲歸于是耳若人才邪正政事得失安危治忽所繫自當反覆論難陛下復祖宗密白之制使三省官覆奏而後行正欲斟量可否上下相維非止奉行文書也高宗上仙始末稽攷制度奏置山陵五使贊成聖孝哀禮兩備初欲用顯仁例遣三使公固謂事體不同不當曲徇㑹賀生辰使至上在喪次議令館伴使發遣公奏賀禮固不可行但彼遠來朝無一辭于理未安遂口占數語使歸報後正旦使將至或請權易淡黄袍御殿受書然後素幄見使者公力陳不可止以縞素引見使者果心服手詔討論皇太子參決庶務典禮初欲開資善堂公奏天禧時仁廟尚幼始見輔臣恐不可用西晉有宣猷堂今作議事堂可也十五年正月戊戌公請上特御延和殿令宰執奏事畢然後過議事堂思陵發引公奏陛下既行三年之喪又用七月之制永熙故典呂端一相猶攝太傅親往而有司欲用顯仁舊例非是遂再拜請行乃以公攝太傅上慮使人堅欲上壽公奏引見受書即是成禮上壽時不過隨班拜舞若奉觴致詞皆無所預臣等保無爭執上欲先令侍從臺諫集議公曰國家大事謀之帷幄中有不必詢衆者況事理曉然不必徒為紛紛上尤稱奬卿能任責如此國之幸也仲冬之初留身奏臣歸自陵下即欲求外縁京鏜使囘聖慮來賀者求報復令臣少待人使已行願乞骸骨上奬勞再三忽宣諭比年病倦欲傳位太子卿須且留公奏聖體康寧止因孝思稍過豈應遽爾勌勤上曰禮莫大于事宗廟而孟饗多以病而分詣孝莫大于執喪而不得日至徳壽欲不退休得乎朕方以此委卿公泣而退十二月壬申密賜紹興傳位親札辛卯留身議定二月壬戌之吉又命公草詔専以奉几筵侍東朝為意十六年正月己亥拜左丞相壬子始因奏事宣諭二府旬日當内禪又令公留身呈詔草兼提舉玉牒及監修日歴二月辛酉朔降傳位詔翌日上吉服御紫宸殿公奏陛下巽位與子古今盛典再見聖朝中外同慶臣等輔政無狀自此無由日侍天顔無任依戀之至哽噎幾不能言上亦􅊄然曰正賴卿等協贊新君光宗問當世急務公奏用人求言二事尋即降詔公積階至特進爵自管城縣開國男至滎陽郡公歴封濟許二國三月拜少保益國公公以三孤之官不應以霈恩而得力辭不可又乞囘授至于四五不得已而後受焉奏以朔望之次日朝重華宫五月求去甚力既而諫省有言請益切除觀文殿大學士判潭州言者不已副端助之遂以少保充醴泉觀使而歸孝宗賜金器勞問紹熙改元判隆興府辭不赴二年除觀文殿學士判潭州親理郡政不以簡貴自居罷倍税牙契錢二十萬緡三年四月復元職七月坐所舉官以賄敗降滎陽郡公四年八月復舊封冬易鎮隆興五年力求奉祠主上踐阼詔求言于舊弼公奏四事曰聖孝曰敬天曰崇儉曰久任皆訏謨也遣閤門官賜少傅告一再辭免始許貤恩慶元元年公于是年七十矣三上表引年遂以少傅致仕嘉泰元年布衣上書及公姓名臺評降一官明年乃復四年十月庚寅朔薨年七十有九累食邑一萬五千六百户食實封五千八百户遺奏聞上為震悼輟朝兩日贈太師賻銀絹各千仍命弟之子縝添差江南西路轉運司主管帳司以護襄奉尋賜諡文忠娶王氏監察御史葆之女封益國夫人先一年薨一子即綸也朝請大夫行大理司直孫顥宣義郎新監饒州浮梁縣景徳鎮兼烟火公事孫女五人長適承事郎監嘉興府糴納倉蕭彖餘尚幼初益國夫人葬廬陵縣斗岡之原十二月丙申奉公之喪合焉公在高宗朝已擢臺察事孝宗最久始皆以詞章受知可以平挹美官而秉心不欺遇事輙發不復顧身屢跲復奮上久而深察其精忠北門之官有四公徧為之前後十年兩宫極孝治之盛講慶壽加尊號親祠赦宥立后升儲過宫出郊無非盛事大典公皆在屬車間鋪張揚厲實有以佐宋之光明若水旱災異夷狄冦盜之辭咸無焉自參預樞筦以歴二揆又涉十年榻前論事出入經史練習典章動有援據不為空言故天子聳聴嘉奬而同列自以為不及以國事為己任進退人才一本公道養民擇守憂邊訓兵仰贊睿謨慮周而敏被遇日隆數當大事典禮論議裁處曲當内禪尤為至重吉日徽稱宮名母后孝宗獨與公素定于數旬之前近將浹旬始諭宰執注意委任可謂不膠漆而固矣天資超穎非凡材可及而體夫子忠恕之道大易勞謙之義孝友淳篤事從兄如諸父自奉甚約絶聲色之娯周䘏族姻具有恩意官同姓者六異姓者五少自號省齋居士中年曰青原野夫既貴而閒曰平園老叟孝宗生于丁未一時輔相多在丙午丁未間公及丞相王公淮參政錢公良臣同爲參樞人謂三府爲丙午坊公嘗作詩用文潞公同生丙午之韻告老之後猶引故等夷之齊年者遇生朝同㑹用韻賦詩者數年方其端委廟堂一介之善收拾如恐不及退而均逸汲引無虚日士類莫不歸心焉以文苑英華及六一居士集訛舛太甚率同志者朱黄手校如老書生鋟板家塾以恵學者卜築貢院故基公實預薦此地故以充賦名堂作唐虞二典閣藏兩朝内禪詔書洎崇陵宸翰又爲玉和蜀錦二堂皆自爲之記晚嵗康强神明不衰天下猶望公之再起不謂天之不憖遺也嗚呼殄瘁之痛四海所同有如鑰之不肖素辱知遇假守東嘉屢有收用之意未滿秩而公已歸比忝代言公之除少傅暨加恩兩預草制又四作不允詔書嘗蒙摘句稱賞投閒以來書函詩筒倍加奬予當世銘記多求于公間使鑰書之公已書丹或徑以賤姓名題葢此意甚厚皆非所敢當也嘗竊謂公初入禁林自謂所慕者惟陸宣公歐陽文忠公公之始卒絶似二公者無事不言無言不盡而卒至大用上不負天子下不負所學既不媿于宣公而得時遇主無追仇盡言之患文忠晚居于潁望瀧岡而不得歸公乃優游平園使里人矜式是兼二公之美而又無遺恨者也若克勤小物誘掖後進皆公之細不勝書有省齋文藁别藁平園續藁掖垣叢藁玉堂類藁詞科舊藁政府應制藁歴官表奏奏議奉詔録承明集玉堂雜記龍飛録親征録及閒居紀録等書總二百巻藏于家其行于世者已多屬文之士傳誦以為模楷公之文不待贊揚微至題跋之語攷古證今嵗月先後通徹明白讀者歎服末為三忠堂記謂歐陽文忠楊忠襄胡忠簡皆郡人也精確簡嚴幾于絶筆嗚呼一代風流于焉盡矣鑰何足以銘公銘曰世非乏才何謂才難有君無臣自古所歎吝驕平凡動則為己不合是憂安得竒偉直道而行無患失心一有遇合奚翅斷金於皇孝宗才選于衆誕謾畏縮慨不足用堂堂益公負王佐才始以文名芸省蘭臺高文大冊追配古作獨步禁林不負所學二十八年相為始終屢跲而奮致身上公堯既授舜舜亦命禹首贊大議龍飛再覩功成身退樂哉平園晚陳四事不已于言既挂衣冠無與世道胡不百年遺此一老星隕于堂人之云亡不亡者存文章光芒惟子是似觀行取則後其有興視此銘刻攻媿集卷九十四
