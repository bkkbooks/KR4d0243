  text: 攻媿集卷六十二
  hash: sha256:0fe950c2a6482778ea63ed812eecef479c5ffcb2197639b99266b94e753fe3ce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_062-1a}
body:
  text: 宋樓鑰撰啟謝除宗正寺主簿啟容臺列屬方驚出命之從天宗寺勾稽更許引嫌而易地事應如響人以為神倍煩致曲之私益戴不貲之賜伏念鑰頃持孤迹入玷周行叨金科筆削之司三嵗于此預寳牒討論之末貳職最優念親年之益髙思色養之多闕偶逢新制幸遂贅員天台四明喜家山之在望治中别駕奉菽水之餘歡甫更二攷之書復捧三州之檄苟逃吏責來赴朝參登光範之門始尋故步索長安之米甘作畸人素䝉一顧之隆重辱千金之諾屏身逆旅忘意洪鈞不圖信宿之間忽被生成之渥方羣才之競進或累月之曲留是何庸愚首勞記軫俾居制作之地得以周旋其間雖公府無私諱之可疑而人子有至情之當隠范蔚宗謂郭㤗爲太司馬遷以趙談爲同彼雖千載不刋之書亦有一時随宜之例矧從兄正有近比而律經端爲此文非敢爲循牆之恭姑以避入門之問洊勤敷奏許以徇私再窺天派之慶源恍若華胥之昨夢輕舟浮海方虞風引于三山零雨自天終賴雲興于四嶽茲蓋伏遇某官聖時間氣王佐真才進退百官而坐廟朝悉從公論總領衆職而稱上意專幹化權矜雁塔之舊題惜龍門之下客遂由遠外徑被甄収鑰敢不仰首厚恩服膺髙誼況獲居典領之下猶得附聲光之餘譜磐石之宗益加修纂圖國士之報誓竭疲駑通温州交代沈詹事樞啟温州任内以下三首知偃藩滄海真有古方伯之風易鎮温陵庸示東諸侯之勸乃容賤子獲繼後塵敢言一月之間再辱五雲之貺撝謙甚矣揣分悚然恭惟某官學貫九流氣髙八表天分已超于凡品心傳自得于遺經嚅道真泳聖涯信師友淵源之遠穿天心出月脅仰文章黼黻之工首振臺綱早膺睿奬洊居宰掾遂陟禁途儲寮推商皓之賢朝望出漢庭之右粤從壯嵗已著外庸使節帥垣凜威名之猶在閩山江國懷惠愛以如新獨瀛壖未識于旌旄故上意特分于符竹教條所及掃狡穴以一空政務日清剔蠧原而欲盡朞年而變百堵皆興精力如黄潁川而事不繁方略如薛馮翊而用自省撫摩多暇賦詠流傳繡口錦心在昔接王楊之舊風樓月觀從今齊沈謝之名忽傳舜詔之頒更與泉麾之重佇聞歸奏别拜襃遷刺史之為三公厥存故事人主之論一相用佐中興伏念鑰晚出無堪冥行自信當血氣盛强之際不能大所居之官矧父兄憂患之餘豈復有敢為之志茲叨郡寄遽迫戍期雖懷烏養之私未識牧民之體仰惟耆徳嘗拜下風庭内芝蘭已見朱轓之賢守門前桃李居多黄閤之名臣望重儒先年為父行退慚孤遠敢謂交承瞻之在前知堅髙之可慕瞠乎若後豈可逸之能追尚須修敬之初躬請告新之益署風清潤燕寢邃深願精茵鼎之調仰副冕旒之眷囘瑞安呉知縣敦義啟朱轓就道未知郡太守之宜墨綬臨民正須邑大夫之助同寅為幸良覿非遥伏惟某官璧水勝流桂林秀士絺章繪句蚤騰場屋之名錯節盤根尤藹簪紳之譽尚淹闊步俯就徒勞已報政于羅川更字人于安固一同何幸獲依明府之仁三異有聞行應清朝之選鑰疎愚自信憂患何聊忽為雙旌五馬之行欲訪孤嶼中川之舊人情物態雖曰素諳吏事邦條正資恊濟曽未馳于尺牘乃先辱于朋緘欣荷良深敷宣罔既回沈主簿興傑啟别十五年願復為李君之御官二千石又獲在鄭公之鄉入境云初飛緘未暇不圖前輩先辱英詞伏惟某官厚徳鎮浮髙風立懦蚤勤學殖視富貴若易然晚悟性空置功名于度外笑孟嘗之下客為羲皇之上人以濟南伏生之年抱西河子夏之病隠居求志之士吾見其人焉耄期稱道之賢蓋僅有存者行見鶴書之聘仍加鳩杖之扶乞三老之格言為千載之盛事鑰頃因客授獲預英遊茲叨銅竹之分方厚金蘭之好拔薤一本惟忠告之是求束帛十端懼寡聞之貽誚敢俟及階也而相帥冕便當從牀下以拜徳公回楊秘監萬里啟鑰猥自左庠謬參外府兼史牒討論之職皆英躔吹借之私垂問甚勤撝謙良渥再念一登末第曽因公諱而退飛三入容臺率以祖名而引避雖曰周人事神之義亦惟窮鬼轉喉之妖敢因修謝之餘併發自公之粲瞻依益切感敘奚殫回王原父主簿洙啟頃傳新作慙妄正于雌黄茲荷勞謙喜再來于尺素志期遠到學有雋功曽日月之幾何覺詞章之頓進伏惟某官才由天與業本家傳孔鯉過庭素佩學詩之訓相如入室肯希用賦之圖既決世科寖登宦路移平昔窮經之力為一時應用之文今日侍親既供子職他時遇主可代王言尚云老馬之智專不鄙雕蟲之技小謂白圭之玷固曰可磨而清濟若毫豈如無有不量衰朽輙指纎瑕非惟欲補于聰明抑亦願加于砥礪今則下語俱當屬聫更工囘念舊編如出兩手雖未至飄飄凌雲之氣然已有咄咄逼人之風盱衡以觀刮目相視要知駢儷之有體不必怪竒以為髙既不當窘于邉幅之間又不可施之廊廟而駭文從字順意足氣全苟進學之未央諒蜚英之有助君如斵輪者須得手而應心此若持衡然懼俯首而至地果或亮我尚惟勉旃回李希岳先輩詢伯啟澤底名家素聫枌社雲間俊譽未覿芝眉辱華翰之先臨喜髙詞之創見伏惟某人天資近道學力過人繡口錦心期赴功名之㑹金昆玉季已蜚場屋之聲豈大才之未逢何小敵以猶怯然焚舟而進者有決勝之志手劍而盟者乃敗北之餘試看今日著朱騎馬之流多是前年㸃額暴腮之輩㑹見出一隻手竟當取第二籌欲大振于家風惟益修于賢業自慙朽拙莫助掀騰輙馳緘以附鴈足之還方洗眼以俟龍頭之選回張子宓教授虙謝作辨虛跋啟虛以擬􅀇仰儒先之述作言不盡意冀學者之發揮惟後世之子雲有本朝之君實探賾索隠著書立言頃尚多于闕文旋獲逢于全帙蓋丁年得之張御史之手謂蜀本出于范太史之家且言令慈水之時親曽覩徳深之説既逾三紀始遇一編專窮象數之微備見淵源之藴輙伸末議具載舊聞初未有演義之篇故尤欽于絶識及今見發微之論乃盡掩于前功念其生不得用于時賴有此可少見于世況家傳之甚的實鄉義之所推掠而有之忍亦甚矣不勝憤懣併為辨明豈惟慰九原之英抑亦表一介之善伏惟某官義尊從祖力取世科知奥學之有來發幽光之不泯懷問一得三之喜極駢四儷六之工荷意甚勤非吾敢望蔵于屋壁何殊孔氏之遺報以瓊瑶徒愧衛人之厚囘上虞杜君昆仲啟伯氏決科出世真成于一佛華宗積慶克家又見于二難琴劍踵門文書銜袖大篇見憐才之切長箋知種學之深陳義甚髙撝謙似過有如衰悴自揆庸疎論道徳則虛負于初心言文章則難追于古作徒勤盛意秪益厚顔尚冀融明均垂孚照回陳勝私先輩屺啟謁次通名初喜見秀公之裔世家論契乃知為侍講之門握手定交傾葢莫逆伏惟某人父書素讀天分更髙盤萬卷于雲夢胸中巢四松于匡廬山上及見開元之故老尚聞正始之遺音古事今事問無不知儒家道家應皆如響稍窺新作歎温厚爾雅之文側聽髙談眞直諒多聞之友言誠可用學有自來蚤負俊聲眞是崑山之片玉晚甘肥遯竟成滄海之遺珠退念少時熟聆慈訓遭戈兵之肆燬寓冢舍以偷安荷先正之相求闢數椽而共聚窮百家之奥㫖信一代之偉人三紀以還尚求過于仲舅交臂而失恨不拜于下風豈謂暮年得逢賢嗣自幸無涯之樂且聞未見之書遊邉忽作于宵征訪别更厪于夜辱餘生能幾再見未期相送仙舟第有加餐之祝㑹從傔籍或觀破賊之章回翟司户大正啟服忠惠之英名固已踰于四紀聞孫曾之競爽曾未識于一人喜户掾之鼎來撫衰蹤而自幸伏惟某官家傳未遠天分更髙書讀五車多是牙籖之舊仕因三語密參蓮幕之遊諒無暖席之温即有交章之薦杜門老矣承問欣然倒屣相迎及見故家之人物揮犀晤語尚傳前輩之風流囘劉監場啟客授仙鄉夙聞俊譽屏居海嶠喜聽先聲知望履之匪遥荷飛緘之下及伏惟某官性資純厚問學邃深毓秀簫臺真得江山之助䇿名楓陛榮登將相之科宜徑為結綬之行乃俯就熬波之職時則可矣君其升乎退念衰蹤再瞻英峙回思三紀知故舊之幾何來共一樽庶笑談之莫逆回奉化趙縣尉伯鳳啟居閒已久喜逢梅隠之來投分素深知是雪齋之子貽緘先辱修報何遲伏惟某官挺秀天枝傳芳祖烈翩翩佳公子稟資固自不凡顯顯世豪英游宦已知自立暫宣威于綵棒㑹接踵于青氈舊識二難又迎一尉輕輿徑造豈惟桑梓之必恭先壟相望正爾松楸之有託回曽簽判棨謝復官啟賢者受誣輿情久鬱聖恩牽復公論終明方深贊喜之私乃勤言謝之寵伏惟某官世傳清白政本廉平蚤通籍于金閨旋字民于花縣方政譽之旁達俄毁言之上聞乃以乾餱之愆重為白圭之玷呌閽徒切欲復雁門之踦投匭莫伸屢索長安之米忽聞昭雪盡釋猜嫌首畀故官遂登上幕自此升矣已知復玷缺之難惟其有之行遂赴功名之㑹比傳邸報尋辱郵音荷雅眷之未忘愧蕪辭之不敏容容多福固匪吾人之當言皓皓易汙願全君子之終吉回賀致仕啟頃自投閒已作終焉之計迨茲告老亦惟仕者之宜況平生不敢為髙至今日自應知止過䝉褒拂深荷謙勤及神虎挂冠之年幸酬素志若龍馬負圖之直實出誤恩方此控辭未遑敘謝敢輸微悃以報先施回西安髙寺丞文善啟七旬得謝方報君恩千里貽緘仰欽友誼誦髙詞而増歎附陋迹以何堪鑰仕本為貧才非適用數竒命薄何望寵榮年除嵗遷寖踰涯分積有妨賢之媿遂叨宰郡之行自頃投閒已作終焉之計逮茲告老亦惟仕者之宜奉母九齡都無外慕執喪三載苟幸生前偶當納禄之期始上叩閽之請平生易足非敢為髙今日既衰固應知止俞音初閟遂過神虎掛冠之年誤寵太優乃有龍馬負圖之直控辭弗獲修謝頗稽不圖撝謙俯加贊喜伏承某官曲崇鄉黨不倦詞章能于劇部之餘閒俯念陳人之末路予之題品賁此衰遲來日無多但欲堅杜門卻掃之志褒言已甚詎敢為驚世絶俗之誇矧災星之尚存致宿恙之不已軒裳俱脱既無是中有鬼之嗟藥石弗靈未見其效如神之速呻呼一榻之上荏苒再朔之餘舊學已忘豈知雕篆之習報章自勉慚非駢儷之工何足拜嘉適堪取笑幸投苦海毋玷文盟囘留校理元剛啟中宏博之科夙聞令譽陳治安之䇿首見雄文喜承秘省之異除乃辱私門之謙謝摛詞甚麗陳義尤髙伏惟某官胄出相家名標學海牙籖象軸讀殘萬卷之書玉斚瓊盃壓倒千人之筆始膺妙選徑上周行給札北門大明當世之務紬書東觀更用先朝之官忽䝉駢儷之工猶見淵源之自惟我宋文體之盛掃晚唐風格之餘楊劉始以藻麗擅名歐蘇惟以才氣獨步後來争奮分派寖差凡詞采之有聞或雕鎪之未免不圖晚景獲見勝流洗末習而一空視前良而無愧何有報酬之稱第知蔵弆之榮囘真正字徳秀啟給札北門首閲治安之䇿紬書東觀先勤駢儷之文退視歉然勞謙過矣伏惟某官乘珠照夜衡玉懸秋宇量邃深吞雲夢者八九胸襟宏放貯文字之五千連中異科徑登左學茲更化之云始以急賢為最先落筆萬言無非當世之務奏名九陛遂結明主之知擢處道山尚迂俊軌雖百家之富未及于盛際而四部所蓄孰比于秘蔵嗟朽蠧之日侵亦校讎之幾廢倘絶意軒冕之進能埀精竹素之間竭其心思磨以嵗月豈惟辨正于訛舛抑以多益于見聞遠業罙昌貴名増重此時冊府共推為行秘書他日玉堂信可謂真學士有如衰朽喜見豪英頃聞禮闈之言頗以里俗為念知所存之甚大致相與之尤深强飾蕪詞以酬雅眷文不足採意或可通囘趙昌甫監嶽蕃啟書寄鳧飛喜見章泉之姓氏亭名魚計曽觀小宇之賦篇驚二寳之俱來顧千金其何算伏惟某官學耽八索識洞九流雖離鄭圃之居猶是趙家之玉舊傳文獻不知幾世淵源時出詞章自然一種風氣流傳寖廣慕用良深恨無半面之恩忽枉五雲之貺惟上饒夙名于佳郡而南渡猶多于寓公東萊文清之重名典刑斯在南澗稼軒之妙語酬唱相從接絺繪之王楊為衣冠之巢許到霜降水落之後擅日光玉潔之稱不圖加念于陳人使得遠沾于賸馥鑰倦游既久得謝重來慚共政之無堪歎妨賢之已甚屢嘗求去猶苦留行陽杲杲其未光首肅大昕之謁景翳翳以將入尚通殘客之來當血氣之既衰以筋力而為禮心存北闕欲報未能日薄西山不歸何待況茲踰七望八之際安有駢四儷六之工猥以蕪辭妄希雅好曽不盡意無以為顔囘張伯修汝礪結交啟貴賤雖殊無不須友以成者交遊當謹必先擇善而從之愧我非才誤君永契惟朋友實為士之急務故古今以備人之大倫不取乎挾有勲挾貴挾賢每求夫友多聞友直友諒是以合志則一朝傾葢如故或至興思則千里命駕而行道義所存器重如此古人混混去不返俗子紛紛何足云倚貴勢以為山視貧交而如土平時相遇雖款誠偽盡少物所動則仇隙頓成經一死生因以知情者多矣臨于利害賣而取寵者有之豈能無媿伐木之詩固已不勝谷風之刺悵聖賢不可跂而及顧風流孰能坐而還舍君其誰當今何遜伏惟某人勃窣為理窟慷慨真人英器大難容反為下士所笑才髙無用直以巨儒自期思得同志而與之偕遊故凡庸才皆不足為伍肯許陳餘之刎頸未逢范氏之殺雞遇無益之交朋過輙忘其姓字時惟公琰威重有守獨與祖希情好日隆同心之言臭如蘭樂則生矣君子之交淡若水久而敬之惟情不可間而疎故人皆欲得而友退量陋質敢廁英游初期蓮社中不許謝生居其列豈意竹林下乃容向秀預其流畀以雄文深為縟禮咳唾已成珠玉寳擲地當作金石聲實昭盛徳之過謙益使小人之不稱鑰區區何數斷斷無他雖相距一望之遥恨未諧半面之雅講聞髙誼日久矣豈若吾身親見哉將抱季任之幣而願交于下風乃盡嘉賓之心而奬成于後進鑰敢不竭愚者衆慮之得裨上性就學之明終身無變于炎凉一節不渝于風雨同自同異自異吾懶為玉川子吟我用我卿用卿君毋作庾中郎語攻媿集卷六十二
