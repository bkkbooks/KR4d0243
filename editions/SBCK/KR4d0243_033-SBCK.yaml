body:
  text: 宋樓鑰撰狀劄乞歸田里劄子年七月嘉定元臣輒傾誠悃仰干天聽伏念臣危孤之蹤自慶元改元補外因遂投閒十有三年而尚遭排拫不已屢欲陳乞致仕以年既未及恐涉矯激繼遭内難即吉之日甫及七十引經至再始遂掛冠臣自去國即為終焉之計人所共知去冬仰蒙聖恩更化之始首賜收召是時非敢俟駕而行實以方苦足疾控辭不獲除目下及于里門郡守又從而津遣扶病赴闕再瞻淸光洊􅀩親擢加以兼職又且俾典貢舉非不願勉竭衰悴少伸報效重念臣年巳七十有二精力益耗銓曹有簿書之煩翰苑有文字之􅔙經筵史館皆非所堪近以中暑招醫不敢謁告步趨拜跪強勉不前不求退休必至顚踣久妨賢路且玷明時伏望聖慈俯矜孤迹再許納祿歸老田閭實戴天地之恩敢忘君父之賜辭免簽書樞密院事劄子年八月嘉定元臣伏蒙聖慈除臣端明殿學士簽書樞密院事兼太子賓客特降中使宣押臣赴院治事者惕聞渙渥俯震危衷伏念臣三際聖君四汙朝蹟仕甘平進惟義命之是安心實靡他以樸忠而自立頃嘗去國本為奉親置散投閒久作山林之計匿瑕含垢率由天地之仁雖屢遭摧剝之餘终不至排拫之甚幸逢更化首辱召還既叨長于六官且悉歸于衆職亶為過分何敢僥求況已越于從心比再祈于納禄不圗睿眷擢簉樞臣典選固難尚能自勉本兵尤重安得冒居寵加秘殿之名兼預儲寮之列誤恩下逮羣聽皆驚殊非衰迹之所堪抑亦多言之可畏伏望皇帝陛下收回成命改畀英髦俾仍獻納之班馴遂退休之志儻獲免妨賢之誚庶不累知人之明辭免賜衣帶鞍馬劄子臣蒙恩除簽書樞密院事兼太子賓客又蒙賜臣對衣金帶魚袋鞍馬竊以出珍服于尚方錫名駒于内廏臣庀職之始拜賜已隆豈應旬浹之間復冒恩榮之辱禮誠過厚心則靡遑伏望皇帝陛下察臣僥倖既多負乗有靦使之安分抑免傷㢘特降指揮追還所賜辭免同知樞密院事劄子臣准尚書省劄子奉聖旨除臣同知樞密院事依舊兼太子賓客特降中使宣押臣赴院治事者誤恩狎至撫已增慚伏念臣頃備論思久投閒散荷皇明之收召加寵渥以便蕃俾參樞筦之班仍預儲扄之客已為過幸每懼弗堪曾煖席之未遑俄歴階而使進本兵至重寧容濫吹之人偃伯云初兹豈養疴之地尚蔑一毫之效遂叨二府之真念朝行之髦士甚多況天下之逸民未舉不應邇列乃以序遷欲望皇帝陛下俯鑒由衷母嫌反汗遴選英才而圗任姑令舊著之少安亟賜俞音免貽羣議辭免參知政事劄子臣准尚書省劄子奉聖旨除臣參知政事特降中使宣押臣赴都堂治事者承命下臨撫躬增惕竊以中書之本萬化固資參預之良近弼之有貳臣足稱倚毗之重敢言推擇誤及凡庸伏念臣洊㸃從班叨塵宥府才再周于月琯已疊被于恩綸玩愒自慙于事功而何補衰疲既甚況疾病之復侵方將俟使介之旋便請掛衣冠而退忽驚寵渥俾預政機載攷舊章間有三人之同列若稽近比未聞兩地之贅員伏望皇帝陛下俯察由衷曲憐過分收還成渙願亟賜于俞音茂柬英才以共扶于興運賀東宫上御書居仁牌劄子恭審寵錫宸章聿新户冊前星少海益嚴壯麗之規安宅廣居深寓藏修之意震亨協吉日進無疆某叨預下寮欣聞盛事容即陪于賀旅敢先貢于忱衷伏望令慈俯垂鑒察乞歸田里劄子年四月嘉定三臣輒伸衷悃仰干天聽臣聞七十而致仕禮之經也一介孤逺素安平進遭際累朝三入周行寖塵法從年未六十即遂投閒屢思納禄正恐或以為矯母喪既終適當七十再疏得請自謂平生志願不啻足矣敢圗聖慈更化之日首賜收召力疾趨朝一見天顔盡畀舊物旋由樞筦進貳政機皆非夢寐之所敢及玩愒嵗月毫髪無補日負憂懼重念臣今已七十有四當戒得之時而況筋力日衰每虞僵仆素有足疾曾爲廢人近者益不堪奔走之勞非不戀慕聖徳願效尺寸陳力就列不能者止欲望睿慈矜憐衰悴許臣仍舊致仕歸伏田里以盡餘生不勝萬幸第二劄上章有請願致爲臣頒詔甚温未容得謝敢洊陳夫愚悃用仰冒于宸聰伏念臣少已無稱老將安用仰被聖神之眷擢登樞近之班然而雖號參知了無裨補彌縫輔贊何所建明拜跪進趨率皆強勉十目所視一心靡寧久矣妨賢自知不可衰而戒得衆必有言矧同召之三人今止存于隻影汗顔在列歸夢先形漏盡鐘鳴夜行當巳日暮途逺逆施謂何欲望睿慈俯回淵聽放歸田里俾遂畢于餘生再掛衣冠庶可全于晚節第三劄臣疊具劄子陳乞致仕伏奉詔書不允不得再有陳請洊頒渙渥未許告歸三貢需章終期得請敢冒蓋高之聽仰干方命之誅伏念臣猥以迂儒叨塵近綴上恩至厚加寵數之便蕃同列咸和務寅恭之相勉非縁他故借以自陳惟是年實寖高夙若負薪之疾位為甚過了無横草之功冠已掛而復彈車既垂而再駕識分知足之意雖曰素明安煩戀劇之譏豈能戸曉久妨賢路奚補公家屢屬藁于皂嚢終投誠于丹扆仰祈聰鑒俯察衰蹤與其僵踣于朝重貽鐫誚孰若曲從所請先賜保全矢辭已窮屏息以俟繫數頒詔諭宜悉朕懐勉竭壯猷毋庸遽去御筆卿為時耆艾秉國樞機進退之間重輕所乞致仕劄子閏二月嘉定四年臣敢傾危悃仰冒天聰臣聞七十而致仕古之道禮之經也臣五十九而投閒十載而遭母喪比及三年年適七十連年再請巳遂納祿平生仕宦至此不啻足矣加以多病早衰素有足疾是歲一發數月甘爲廢人國家更化之初記錄簪履之舊首賜收召病不能進旣叨翰苑之除又頒趣行之命扶憊造朝本擬一拜淸光歸安田里旋􅀩拔擢歲中屢遷冒列政途荏苒三載頃申懇請未賜俞音因仍强顔又復許久今年遂七十有五矣旣違古義又乖初心筋力益衰舊疾發動重以手足之戚撫事傷感久在朝假不遑安處勉强參告顚踣是虞兹敢投誠君父乞骸以歸非惟麤全晚節亦免久妨賢路陳力就列不能者止臣既不能不止何待伏望聖慈許臣再掛衣冠以畢首丘之願不勝惶懼祈懇俟命之至第二劄臣昨具劄子陳乞致仕伏奉詔書不允上疏力陳頒綸未許念乞身而至再望得請以爲期竊以七旬而加五年在微臣而宜去一日而降四旨驚眷寵之過優舊或施于累押之餘今乃用于初求之頃莫知所處益不遑安伏念臣學術素疎宦情尤薄禁路已知其踰分政途深媿于罔功況在縱心之時既從謝事之願豈容今日猶玷邇聯凡今在朝惟臣最老不以妨賢而自列殆幾貪禄以忘歸福過災生重以鴒原之戚日暮途逺恍然駒隙之馳贊襄何有于建明趨拜每虞于僵仆覬息影于田廬之下敢投誠于君父之前伏望皇帝陛下俯賜矜容曲憐疲瘁恩榮素厚非無犬馬戀棧之心志意已凋但有麋鹿投林之想倘得退尋于醫藥庶幾尚保于桑榆第三劄臣再貢封章陳乞休致兩奉詔書不允者引經告老尚閟俞音造膝陳情敢祈恩許難避再三之瀆庶蒙萬一之從伏念臣屢忝登朝幾成去國投閒置散自分終焉避寵辭榮不啻足矣頭童齒豁固知竟死以何裨漏盡鐘鳴烏可夜行而不止豈知末路重上要津同寅協恭雖粗逃于瘝曠玩嵗愒日恐徒積于悔尤久踰休致之期深有滿盈之懼弟兄猥衆凋謝奚堪疾疢交侵衰頽已甚惟應納禄或免挻災伏望皇帝陛下洞鑒由衷俾令得謝既不敢請麾符之寄亦不能奉香火之祠掛神武之衣冠復尋故步樂清時之鐘鼓尚佚餘生再乞致仕劄子年五月嘉定四臣比者三上封章懇求納禄聖意眷留温詔稠疊仰體隆寛復就班綴本未敢再有陳請瀆冒君父實以今年七十有五自念厚恩未報勉强奔走使其無病尚可支吾臣近者四月十七日扈駕朝獻景靈宫乘騎拜跪幾致顛踣翌日鞭䇿不前不免謁告復于二十七日堂中議政之次方欲夙退縁積雨陰濕不惟發動足疾適苦腹痛忽作旋暈不知人者良久此丞相以下之所親見十目環視不可掩覆亟歸私第招醫用藥僅得少定至今氣短力乏連請朝參等假彌不遑安使當殿陛朝謁宗廟駿奔之際不測有此豈不有玷班列必致倍費保全兼臣先已掛冠又過數嵗強顔寖久自知人言不貸以為貪禄忘歸一旦疎虞無所逃罪是敢投誠于陛下之前深恐不任趨拜亦不敢又勞宣押之煩輒貢囊封籲天有請伏望睿慈矜其過老察其由衷許臣依舊致仕放歸田里以畢餘年不勝百生之幸第二劄臣茲以感疾旋暈既蒙聖恩給以朝參等假自度老而氣耗難以黽勉趨走既忝參預又不容安坐養疾是以控告九重力求歸老伏奉詔書未賜俞允臣仰戴恩紀俯增震惕伏念臣舊有宿疾甘為廢人不自意全得至今日適有天幸又延數年及見聖君更化之初叨預明時共政之久非不知思竭愚慮仰酬異恩外若强而中實枯心欲為而力不逮日見衰羸之狀乃無報效之勤立則欲僵坐多假寐徒妨賢路難免人言況復近因風濕之侵初為飡泄之疾􅅭暈幾成于顛仆摧頽重費于扶持雖轉刻以復醒亟還家而歸卧仰蒙予告得遂呼醫自憐蒲柳之零宜逐桑榆之暖豈容强勉更效驅馳一朝或作于周行萬死難逃于大譴伏祈天鑒俯察忱衷許掛衣冠往尋丘壟庶可訪尋藥石收聚精神茍餘喘之尚存皆再生之大賜第三劄臣近以衰病陳乞致仕兩奉詔書不允仍不得再有陳請臣仰感聖慈未賜嚴譴非敢瀆蓋高之造實縁有未盡之誠輒干蕭斧之誅冀動凝旒之聽伏念臣少無所用老則可知頃叨獻納之聯甘處廢閒之地屬睿主當改􅁌之始俾微臣仍曳履之餘擢寘樞庭遂進參于鬷嘏重糜廩粟曾何補于治功不惟見誚于人自知非久于世然而七旬以後三載于茲麤能力勉于步趨因謂尚堪于驅役鳥雖飛而宜下可不知還燈欲滅而復明安能長保當未及衰殘而告退況今以疾病而有求倘遂伏于先廬庶少延于暮景伏望皇帝陛下俯憐疲瘁亟賜允俞用人固欲盡其才而臣才已盡使人不欲窮其力而臣力既窮辭雖已殫情則甚切遡九重而請命祈一札以賜歸大臣之進退繫朝家之重輕有如賢卿蔚爲國老頻閲御筆引年納禄在常情則然養老乞言猶古人不廢況懐益務交修毋思獨善抗陳之奏殊乖眷委之親書奏謝御筆劄子臣待罪政路荏苒三載累上引年之請必蒙陛下曲賜眷留本未敢洊冒天威近在堂中忽作暈􅅭幾至顛仆謁告呼醫尋即上章求致其事兩拜温詔尚閟俞音情意迫切遂成三瀆初七日早仰荷聖慈特遣中使傳奉恩旨臣旣粗可支吾且聞居家引疾素無宣押之例惶懼承命卽時入堂巳具奏知敢圖天地之隆私申賁雲漢之親札奬飾備至訓以去就之宜臣實何人叨被殊渥周章震􅋺無以自容雖勉力就列終恐衰悴不能仰酬洪造之萬一謹于中夜齋祓躬伸奏謝來日自當俯伏宸陛控敘危衷臣下情無任感天荷聖激切屏營之至伏乞睿照乞增葺錦照堂劄子臣輒有微誠仰干天聽臣祖贈太師齊國公臣某政和中由卿列擢守鄉郡興利除害非止一端每有奏聞隨即報可其後在任首尾五年宣和初方臘猖獗鄰郡嘯聚相應如杭嚴處州皆遭攻破越及温台僅餘城郭外邑亦多塗炭惟臣祖申飭備禦多設方略闔境無虞就陞徽猷閣直學士告墨具在前後璽書襃美皆親灑宸翰雲章昭回海邦增耀城内一湖舊有十洲三島最南一處適與私家相近遂于其上建錦照堂刻碑堂中以侈上賜中更兵燬巍然獨存是時州治初復移為小㕔碑石暴露隆興元二年間州郡方始再建及今五十年棟宇弗支加以連嵗暴風秋霖頽損尤甚臣自顧么微猥叨誤恩置諸邇列累疏乞身未蒙俞允顧惟家世之舊不敢自黙欲望聖慈特降睿旨許容臣自備材植以時增葺倘遂歸休得以周旋其間仍不許本家及官司指占安泊居止庶可永久尊奉先朝奎畫之嚴抑使子孫表揚前人之志進東宫耕織圖劄子某衰遲之蹤叨逾過分自塵樞筦即備儲寮仰蒙令慈眷顧加渥退念略無毫髪可以補報每切慚悚某伯父故淮東安撫璹嘗令於潛深念農夫蠶婦之勞苦畫成耕織二圖各為之詩尋蒙高宗皇帝召對曾以進呈亟加睿奬宣示後宫至今尚有副本某嘗書跋其後仰惟皇太子殿下淵沖玉裕學問日益密侍宸旒恤下愛民固已習熟聞見究知世務惟是農桑為天下大本或恐田里細故未能盡見某輒不揆傳寫舊圖親書詩章併録跋語裝為二軸伏望講讀餘閒俯賜觀覽或可備知稼穡之艱難及蠶桑之始末寘諸几案庶幾少裨聰明之萬一亦以見下寮拳拳之誠乞致仕劄子年三月嘉定五臣輒伸丹悃仰冒宸聰臣聞之禮經自幼學以至致仕具有節目古今用之臣生而多幸年未四十而仕遭際三朝四入周行年除嵗遷寖至通顯七十掛冠不啻足矣陛下更化之初首蒙收召迫于威命扶病復來恩渥益隆遂塵樞筦進參鬷嘏亦既三年中間屢嘗自列眷留再三不敢煩瀆去冬自丞相而下三人求去俱不允俞臣難以繼進伏念臣今年七十有六矣齒髪凋壊衰相日侵筋骸疲瘁隠痛交攻每趨朝謁悉出勉强深懼僵踣于宗廟會同之際有玷陛下保全之恩顧豈有入仕則在古制之先而休官乃在其後又復過數年矣貪冒之譏難免人言臣自知媿有靦面目伏望聖慈矜念衰殘許歸田里賜以餘齡使全晩節不勝百生之幸第二劄臣昨具劄子陳乞休致放歸田里伏奉詔書不允臣竊惟皇朝忠厚專以禮義㢘恥養士夫之心先正名公多有不待年而告老者先帝臨御申嚴此制凡已七十而仕者御史必彈糾之有去七十尚二三嵗者廟堂不敢除以待次郡守是為愛養臣子不使犯禮經之戒伏自陛下改􅁌更張以來興念正元朝士所餘無幾又多久厄于權臣用事之時雖年登耋艾亦皆以次收召徳至渥也迨至今日荏苒六年召用之人或去或亡幾于略盡獨臣久玷政途未容得謝誠不遑安近者臺評有言人臣視爵禄為己有則昧止足之義無㢘退之行貪競之俗成矣又曰路不妨賢則詘者可信而塞者通矣又曰凡在朝列有懇懇願補外者當從其請此皆犁然有當于人心而臣忝在近列年已過期使其精力尚强猶可圖報老而耄及將焉用之伏讀詔書不勝震越正以材疏智短不足以任共政之責所以切切求退非為圖山林閒燕之適也若商山之終隠當以自師如渭水之圖功安能為役與其後日徒費陛下保全不若及今尚可黽勉之時使之進退合宜則不惟微臣晚暮榮幸亦足以成聖朝風化之大端示天下以止足之義第三劄臣累具劄子陳乞休致伏奉詔書不允不得再有陳請告老將歸籲天有請蒙恩未允􅐲地靡遑敢干方命之誅三貢乞身之悃伏念臣屏居既久得謝復來初期一拜于天光徑還鄉社豈謂五經于嵗律尚玷政途屢求再掛于衣冠亦已疊勤于詔諭詞窮復止福過難安念久據于要津致坐妨于賢路況復衰頽益甚遂已至踰七望八之年參預無聞何以佐咸五登三之治爰自去冬而草奏必期嗣嵗以辭榮親奉玉音謂正資于輔佐洊頒綸命又有及于典刑仁慈優隆詞旨詳縟仰聖主所以逮下在微臣皆非敢當不復更引禮經逺希前哲直以血氣衰瘁疾既交侵心志凋殘事尤健忘行多則蹇于進步坐久則昏不知人但可投閒豈堪任責欲望陛下特垂睿鑒洞察忱衷推從欲之至仁使歸安于故里巢由長往孰云堯帝之遺黄綺終辭無損漢家之盛切于得請不覺費辭再乞致仕劄子年八月嘉定五臣輒瀝危衷仰干天聽伏念臣衰瘁至此實不堪為世用仰蒙聖恩擢寘政路首尾五年平生自知分量不敢貪榮久處于此日不遑安是以無嵗不求再掛衣冠或以疾故請至再三率蒙睿眷溫詔曲留不敢頻有煩瀆又復中輟今年七十有六矣已無顔面尚玷邇聯況自入春以來屢以病告兩嘗吐痢俱作再以淋澀為苦近復以暴下累日薾然弗支形體瘦瘁飲食絶少近雖勉强朝參深恐不能支吾一旦僵仆大廷萬目並觀徒為清朝之玷臣之獲譴顧何足言伏望皇慈深察誠悃使之歸伏田里以迄餘生以全暮景實為孤臣之幸第二劄臣近者上章乞身自知僭冒甘俟刑誅重蒙聖慈不惟未賜俞允又勤詔旨仍降四項指揮不容引退臣感激恩遇衰涕交横不免再有陳述陛下更化之初臣首􅀩收召旋自西府進貳東省三數年來聖德日新治效益進凡前日水旱饑疫蟲螟盜竊悉就消弭邊陲寧謐年穀順成此皆國家運祚方興聖德光被使臣等得以充員尸素于此豈不仰戀明時而乃自求屏退況今郊祀大禮在近千載際遇又將預駿奔之列引疾匄去此豈臣子之情實以屢困疾病筋力頓衰精神戃恍不能自持正恐當聖主精意明禋之際冒居使名不足以效奔走萬一顚沛于郊廟壇壝之前有汙大儀則臣死不足以塞責是以不復更敢引經據古直述情素投告君父及此秋季祀事未講之時賜以殘骸俾歸桑梓得為太平之遺民免玷知人之聖鑒誠為餘生之幸再瀆天威臣無任俯伏感涕祈懇之切第三劄臣再具劄子陳乞休致伏奉詔書不允不得再有陳請念臣久叨共政之地屢上乞身之章兹焉三瀆于冕旒誠欲一歸于巖穴危衷傾敘温詔洊頒已窮告老之辭深感留行之眷惟是臣荏苒五載侵尋八旬略無横草之功固已難居于邇列若匪負薪之疾猶能強處于周行誠以一年以來百病交作幾經告假日媿空餐近雖勉赴于昕朝實亦每懐于隠痛不知者尚謂其矍鑠旁觀者寧免于揶揄今則骨露神癡行遲坐困髪種種以如許視茫茫而愈昏孔子老而戒得之言莊周夀則多辱之訓皆所當鑒不敢重陳直述腹心仰投君父惟乞皇帝陛下察其衷曲加以哀矜及兹未至顛沛之時使得早遂歸休之請首丘在望没齒難酬重冒天威臣下情無任惶懼俟命之至乞致仕劄子年正月嘉定六臣輒瀝危悃干冒宸聽伏念臣衰薾無堪叨塵政地四年于兹屢貢乞身之章曲蒙睿眷詔旨丁寧又復中止舊嵗多病内外交攻齒髪並侵心神凋耗秋間自列正恐不任郊禋駿奔之勞既不得請日夕兢懼迨原廟太宫圜丘行禮之際陛下寅恭䖍鞏神􅅘昭格而臣筋力弗彊足膝俱憊侍祠跛倚幾于僵仆臣實無以措躬旁觀亦為臣危之獨以熙事備成恭謝日近未敢奏陳雖幸俱免疎虞而雪深寒勁罙所弗堪拜起蹣跚有失臣子之敬況今遂年七十有七若又不能掛冠而去則寡㢘鮮恥安煩戀劇之誚必不逭于公議而臣平日知止知足難進易退之志至晚節而掃地雖百口無以自明是敢仰瀆天威求致其事少休故里以畢餘生伏望聖慈亟賜俞允使得納祿以塞盈溢垂車以示子孫不勝百生之幸貼黄臣昨者齋沐修寫奏劄只俟恭謝禮畢榻前控陳既而展日再臣賤疾愈致發動適值同列在告勉強陪班痛楚特甚呻吟宛轉幾不聊生元正朝謁使客在廷皆弗獲預機務叢委非可養疴病體支離豈堪任事雖欲一伏軒墀有所不能用敢殫瀝寸誠仰祈保全生成之賜見今居家以俟威命伏乞睿照第二劄臣近具奏陳乞致仕伏奉詔書不允者伏念臣頃自從班為親求歸繼遭排拫十有三載百謫備矣不敢遽掛衣冠恐或者以為躁憤其實無所怨尤母喪既除適當謝事之時再疏而後得請自謂餘齡無幾平生出處遂保始終敢圖睿恩起于既老擢寘近列皆出天地生成之賜職高任重憂懼日積俸優分溢滿盈自畏況兼年垂八袠衰疢交侵醫療未效玩愒滋深合是數端豈復有可留之理欲望聖慈察其真情檢㑹累奏亟賜一俞上以廣清朝養老之懿下以全微臣首丘之願感戴恩紀沒齒圗報干犯雷霆之威席藁俟譴第三劄臣近者再上封章力求納祿伏奉詔書不允不得再有陳請臣自揆逾分不當更申黷冒真情迫切敢犯威嚴臣竊惟陛下更化善治百度維新比年以來大臣之進退猶未有全其終始者殆非所以示四方也皇恩如天保護臣下邇聯求退率多留行固足以仰見眷注之深然如臣者本乏才術少不如人今焉及耄顧何足算力不逮心既無以佐萬機之煩年當戒得又無以逃衆口之誚使其蹣跚後塵已為徒妨賢路矧復病苦相纏雖欲勉竭有所不能歴數立朝之人臣最衰老其為宜去亦莫先于臣者是以不避三瀆期于得請居家屏息以俟俞音臣無任惶懼震灼之至第四劄臣近具奏陳乞納祿准尚書省劄子備奉聖旨依已降詔不允不得更有陳請臣洊有危悃不容自已敢畢陳之臣竊惟仕而請老古今之通義而在漢尤以二疏為賢方父子相期俱歸移病賜告廣遂稱篤上疏乞骸而後許之及其都門祖餞至今想見藹藹之盛此豈真疾篤者而宣帝不以為欺公議不以為過正以其年既篤老且欲以全其節也如臣不肖無能為役起于掛冠貳政累嵗賢路久妨一宜去年登七十有七望八十幾何踰禮越法甚矣二宜去福過災生拙恙交攻呻吟宛轉殆無生意三宜去三上封章皆出由衷之言不敢遽稱疾篤以欺君父又敢望聖慈推宣帝保全臣下之意使臣庶幾二疏之風抑以示聖朝退人以禮之美倘得以餘年歸休山林以畢首丘之志天施地生恩紀無極若筋力尚可勉强猶當一拜軒陛之下以展犬馬戀戀之心銘肌刻骨九殞不忘疊犯威顔臣下情無任激切懇祈之至第五劄臣比者四上封章力請納禄詞殫情極竊意或可以感動宸聰仰􅀩聖慈親御翰墨眷留至渥予告至再祗服異恩敢不退聽初亦自謂幸得兼旬休養益近藥餌庶可勉强自振上副九重之至意而空餐已久福過災生終歲疾病入春反深醫者伎窮假限將滿衰悴痛楚愈難支吾屢瀆君父實非得巳伏望俯矜垂老使致其事歸伏田里消弭悔咎少延殘喘不勝百生之幸第六劄臣輒瀝危悃洊瀆宸聰臣老朽抱疴五上乞身之請三􅀩予告之恩專意醫藥又復許時拙恙曾無差減晝夜呻楚左右所不忍聞垂絶之命去死一髪伏念臣入仕以來服膺怠事之戒奔走外郡凡公家參集之會未嘗托病苟且況冒居邇聯首尾六載日謹昕謁退而贊貳政機應酬庶務延接賓客或逼昏晚雖曰徒勞然竭其區區之愚毎欲粗伸報效猶以不稱為懼今則筋力已愆病又困之恭謝之後元日朝賀使者在廷皆阻于就列蓋兩月餘不獲進瞻威顔豈有高爵重禄養此衰殘之人上辜任使下妨賢路懐安尸廩負罪愈深雖聖眷之優加實公言之可畏内自揣度如臨淵谷假限既滿不容勉强揆以漢法三月當免稽諸著令止許百日是敢申布忱衷控投君父伏望睿慈察其迫切曲賜矜憐俾得再掛衣冠早歸田里消弭悔咎苟存喘息以見松楸實戴天地生成之徳矢辭已窮臣無任戰栗俟命之至第七劄臣情實迫切不避斧鉞之威言出由衷仰干天地之造期于得請遂忘屢瀆伏念臣忝塵邇列于今五年自揣疎庸嵗嵗求去奏疏徹聞無慮數十聖度容納非直寛其譴呵而又親灑宸藻過形奬飾區區所陳竟閟俞音使臣筋力未愆尚可勉强固當殫竭駑蹇以答隆恩公論私計猶弗暇䘏而今者一病累旬略無退證醫療備至不容措手惟有決意乞身歸休田里既釋重負稍免憂懼庶幾消弭災咎假息餘齡倘得畢志丘壑則君父生死肉骨之賜淪肌浹髓雖九殞不足以論報矣干冒宸嚴臣無任戰粟貼黄臣以病體衰羸天氣尚暄若俟假滿有請必致重勞處分故敢不俟半月之限竭其懇悃欲乞聖慈免再給假賜臣骸骨及今得歸尚可生還故里不然則必至斃踣于此情實可矜伏乞睿照乞御書錦照二字劄子臣昨者陳乞自備材植修葺先祖贈太師楚國公臣某守明州日所建錦照堂永逺嚴奉徽宗皇帝御筆碑石已蒙聖慈依臣所奏臣今者乞身得歸輒瀝愚誠欲望特灑宸翰賜臣錦照二字庶幾奎畫昭回庸侈祖孫被遇累朝眷寵之厚以為敝里私家無窮之光不勝榮幸乞東宫書懐綬二字劄子某昨者陳乞自備材植修葺先祖贈太師楚國公某守明州日所建錦照堂永逺嚴奉徽宗皇帝御筆碑石已蒙聖旨依某所奏某乞身得歸欲于堂側立懐綬扁榜是敢仰干令慈望賜某二大字以為子孫不朽之傳不勝幸願攻媿集卷三十三
