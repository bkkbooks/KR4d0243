body:
  text: 宋樓鑰撰誌銘朝請大夫史君墓誌銘四明衣冠之族紹興以來莫盛于史氏自八行先生以純德奥學積善餘慶是生樞密公吾鄉之登政地者實自公始樞密兄之子是爲太師會稽郡王文惠公位極人臣而史氏益大故君之髙曾皆重疊追贈者四十年不惟賞延繁衍而決取世科者累舉不乏人其興又未艾也盛哉君樞密之子也諱浚字堯翁世為明州鄞人今為慶元府曽祖簡祖詔俱贈太師冀國公曽祖妣葉氏祖妣徐氏皆冀國夫人樞密諱才嘗任端明殿學士簽書樞密院事官左朝奉郎致仕累贈金紫光禄大夫妣孫氏封齊安郡夫人累贈大寧郡夫人樞密以紹興二十四年歸休三十年致其事奏君將仕郎授右迪功郎監潭州南嶽廟以便養三十二年丁樞密憂服除引孝宗登極恩循修職郎再奉祠乾道六年調福州古田縣尉九年文惠公帥閩以避親不赴崇憲靖王知明州辟為定海制置使司準備差遣淳熙四年秩滿闗陞從政郎用舉主改宣教郎知紹興府新昌縣十三年差權通判婺州十六年光宗覃恩轉朝散郎紹熙五年今上覃恩轉朝散大夫餘以年勞積官至朝請大夫嘉泰元年引年致仕三年九月旦卒于家享年七十有五嗚呼君年三十而得官歸自婺女纔六十有三已無復宦情其見于施設者止新昌婺女兩任而所至聲績可紀其奉親立身處家居鄉又皆以古人前軰自期是亦為政豈虛語哉樞密之歸君已壯矣謂君曰吾之進退固自無歉第郊恩不能及汝耳公拱而對曰大人方欲全晚節豈當以某為念樞密喜曰吾姑試之而氣貌泰然足以成吾志矣參政李莊簡公守永嘉樞密為簽幕待遇極厚君方就傅附學郡齋每旦必束書以俟户外寒暑如一李公奇愛之樞密赴餘杭君侍大寧次長安埭時有數百艘相持旬餘公猶總角為之登岸處分使往來之舟以敘而行己舟獨殿不日遂通樞密被召將行吏有以白金遺僕夫者公侍側奮然曰是將汙我當發之樞密喜曰吾兒可謂清白吏子孫矣性篤孝大寧既下世樞密年益髙父子相與為命娛侍左右藥非親嘗不進未食不敢食執䘮盡禮既葬結廬其旁捨城居而家焉致敬家廟旦旦集家人拜謁風雨不渝蔬菜之屬未薦者弗敢嘗祭祀備極誠潔滌濯烹飪必躬必親將奉祀則衣深衣以寢諱日先期齋素哀慕涕洟如始䘮生朝不為宴樂在官吏民無知者同氣惟一女兄適周氏事之甚篤見其卜居以金谿别墅遺之制幕例得僦直君曰吾有先人之故廬在僕從亦以鄉曲不當用悉辭之魏王來鎮君以職事迎謁境上典客謂當庭拜君曰此必非王旨揖而出王首以此見重遂被論薦將校捕海寇㡬百人吏欲逮治匿贓事君曰彼出死力得盜以贓為賞亦不為過若以屬吏是為賊報仇也誰復用命王為寛之皆感激盡力海道亦清幕寮蔡君大成亷明有守或汙衊之將寘于法君力辯其非辜及出又厚為之禮東錢湖積葑膠轕王欲開治之有請于朝欲給錢穀及設醲賞且以屬君君引嫌以不敏辭又白王曰今為民興利所費非不多水軍有舟楫畚臿之屬儻優給軍士當必樂趨第嚴為紀律毋令擾民足矣請列杙岸旁取葑積之日久自成隄矣若屬之官吏必致煩擾民疲于奔命吏急于言功止得目下瀰漫可觀根蔓不除適滋後害爾已而皆如君言始至新昌待制朱公熹時為提學一見如舊即以滯訟委之天台有王烏頭者中産之民以析戸交訟三紀矣案牘山積君盡召其黨諭之曰至親終訟未有不破家者我非不能處㫁一有勝負汝必將復訴詞意愿款察其感動遂與酒肴使交相悔謝明日俱拜庭下曰今不復訟矣朱公深為器重自是親戚有訟率以此處之或使之拜起揖遜于前而去得罪于父母者輕重亦惟父母之聽曰吾盡法則傷恩矣由是無不感厲自新蓋平時鄉鄰有失孝弟之義者必諭之以禮曉之以法不悛者或媿辱之感悟則與以酒食之資使其奉父兄之歡乃已其有暴戾恣睢狠于鬬昌于貨者亦誨之諄諄俾歸于善故見于政者專以風化為本也君于催科不擾而集嘗曰寛之于粒米狼戾之時而迫之于半菽不給之際是罔民也乃為之曉諭謂及今不即輸納將來不免追催諒勤周悉無慮數百言讀之者雖頑鈍之夫亦知感悟租賦不待促而辦部使者至以移示旁邑至今邑人猶傳誦之邑在山間異時趣辦役夫以稱過使客近鄉之民一月或至數四君令鄉各置籍據籍㸃差出厯爲信自輦輸官物之外一無所役三年間户不過再及之逺者或終不及也大谿自天台而下溉田甚廣舊有隄以障狂潦而善壊㡬無寜歳君曰人力不至爾出官錢屬耆老督民修築民競勸趨其他陂埭經君修繕者無不堅久鄉吏銷鈔不以時遇有㸃追擾及已輸之民者多矣君深慰勞其人問其道里期㑹之費官爲還之罰吏金以償官吏困于輸金其弊遂絶有士與民訟田君謂士直而牘未具士復來謁君曰兹事已決彼當無辭今見諭則成請求之私移丞佐決之後無敢有私請者僧訟一民負錢至數百緡君疑之問民妻安在曰近鬻于人矣即詰僧曰此人甚窶何屢貸之汝必私其妻妻鬻故訟爾僧詘又有訴僧寺殺其子而屍亡者君念筍蕨方盛此必為盗被擒而竄爾責僧令㝷訪而寛其期㝷獲之一訊而服豪民以稱貸獲利倍蓰償者無所出則以錢百萬獻于官公問錢安在曰散于民間官取之易耳君曰以此餌我而欲自為計也即受其獻而列名及數悉蠲之無不稱快或殺人于野而未獲尉兩以他盜塞責君察其非是皆縱使去既而眞盜乃見猶微服至其處覈之與獄辭合縣計初無百金之儲而逋負以萬計君攷歳入之目窮蠧耗之原曰吏姦耳吾能裕之先是歳用一吏司出納號場典羣吏表裏假貸為姦君使日一易之凡一日之入暮歸諸帑久而寖饒曰此理官錢法也規模既立上下寖以相安再歳所用益衍重門頽圯衆以為請區畫自出一物不取之民有與官為市及就役者加與之庸直有獻木者君曰官自足用此汝先壟中物或與族黨不平將假手于我耶卻之先嘗籍諸鄉之盜日飼之而拘焉民間無復犬吠之警既數月相率而訴曰某等失業為此然朝暮惕恐未嘗得飽食安卧如今日也各已知悔且望少寛許其日就傭役夜必歸宿及是皆執役于官元夕落成棟宇華煥鄉民不知有役咸聚觀以為神縣庠久敝欲新之而前迫于民業一徑㡬不容車馬君謀闢地或曰其家富饒未易得也君召與議即以為獻厚償其直于是面勢軒豁新殿廡列棨㦸觀者唶曰吾邑文風其昌乎其後名薦書取儒科者相踵元日為敘拜禮衣冠畢集為陳尊爼設介僎敘長少獻酬雍臾無敢譁者且曰鄉飲之禮昔固嘗行之未有濟濟如此者耋穉皆相與觀禮焉君資明而健決兩詞至前情偽立見書判數百千言反覆切當每曰久訟廢業實官司不決之過惟詳盡不可轉移則安居矣故一經予決雖宿姦巨猾無復異辭及君將去念一任所決滯訟幸無翻訴吾去之後猾吏或為姦利則貧弱必受其害乃許請㫁由以備于是請者日至一一給之或感泣者曰令君為我長慮及此眞父母也咸請立生祠君力止之既去民知其不可留扶老攜幼前期出境數十百里俟于水濵泣且拜曰不復有此知縣矣婺遭大水溪南之民登屋緣木以避者數千計守倅乗陴君首募善舟者救之令曰活一人者給錢五千竭貳㕔之蓄繼以私帑到者分處官舍既飲食之又列炬通夕以男女混處恐其淆雜也人尤伏其慮深盜入民舍覺而遁隱于桑間主人訪求盜投以石㡬中主舂以矛盜墜而殞吏以盜徒手受矛當主人以殺人之罪君詰之曰石非仗乎雖非所持然中則主人死矣闇中偶傷于刃此為登時勿論可也守不能決交讞以上棘寺卒從君議有毆傷保辜限日未滿而殂者吏坐毆者以重辟君已知傷者能遨于市飲啗自若偶以宿疾發而斃再訊如所聞吏民驚伏蓋于獄事尤留意深思以得其情平反如此等者非一也婦人有欲棄其夫者誣舅以私舅不承而死于獄吏白無所攷證守將從婦君曰使其有之亂倫之罪固不為輕使其無之厚誣其舅亦當反坐舅由此以死婦可已乎聞之憲臺遂坐婦罪里婦獨處惡少謔之不從夜詐稱夫歸婦痛無以自明泣告其夫而縊君聞而為葬之表曰義婦家罪其為詐者君之莅政多此類嘗禱􅀨于龍潭冒險親至其處肅然若有所感雲出湫中得神物以歸隂雲隱隱及郡而霈然作邑時凡禱皆應如此豈人力哉守既行而新刺史之兵百餘人未知所歸君使盡集于庭探籌分管隨即帖定三易郡將備盡禮敬事有利害必力爭事已和好如初君在州縣一時監司帥守多名公相知甚深然不為苟求終無有以姓名薦達者恬于仕進改秩之初文惠公在經筵欲以請于孝宗而君辭焉曰未更吏事且欲字民以行志耳晚年閒居歳久祠禄亦不復就廟堂聞其亷退亟稱之以厲躁競者山居蕭然棊酒自適不以一事至公庭鄉之太守或欲見而不可得居官以亷節自厲俸給之外凡有例者皆不取用度一切取贍于家歳計僅給均爲十二每月一出之效東坡段作三十塊之説不治産業凡貨利之事未嘗爲也好仁樂施聞親戚之貧乏者以濟之喪不能舉女不能嫁多爲成就爲梁以濟渉解衣以蔽寒塗潦者予以笠屨年凶則爲粥以飼餓者疾疫之家既遺以藥至量其所食昬暮潛送其家不使知也親見義役之便民及歸見鄉鄰有以爭役破家者君謂受役之害小爭役之害大勸率為之為請于邑大夫力主其説今賴其利焉近山有虎樵牧失業者㡬月募獵者許以厚賞獵具入山虎亦遁去晚益嚴重端莊守禮語不輕發居不雜交親朋有過靣折之有一善則奬借勸勉如自已出取司馬公家範書儀約為冠婚䘮祭之禮行于家子弟有惰容必正色以臨之童穉笑語亦不敢妄衣服器用不追逐時好家人俱不敢為華靡之飾或見之則嘆息世態之薄也嘗在衆中服布衣鄉先生沈公銖笑其激君曰某不知其為陋也淡然一室無他嗜好惟取禮記檀弓學記中庸大學祭義祭統儒行表記等篇通鑑唐鑑朝夕從事尤篤于教子招延名士宗族子弟之願學者皆預勉以修身之要不徒望其取青紫也長子中第又二子入太學未嘗以為喜蓋所期望者不止此夜課童幼語孟為之講大義每曰雒誦之聲賢于絲竹逺矣莊談梵帙深究理趣病中區處家事秩秩有條醫至嬉笑待之呼諸子曰我無所憾惟汝祖隱德實行太史紀載甚略我死則汝輩不復知矣口授數千言既革神觀愈清自書一頌尤為曠逺又書二紙戒毋受賻贈大略言生無益于親故歿可擾之乎仍戒毋用緇流既畢盥手炷香奄然而逝其視死生眞若旦晝耶君娶舒氏御史中丞亶之曽孫先君十四年卒贈宜人孝敬誠篤四德全備樞密方為國子監簿宜人未嫁而樞密超遷臺諫大寧喜曰此婦其昌吾家乎未歸登政地歸享上壽康寧宴衎宜人未始一日不在側也大寧性嚴事之至謹遂信愛之樞密久未有弄孫之樂宜人請君置妾君曰設心如此何患不昌既而得子今兹蕃衍蓋不妒忌之效也新昌相傳有白虎神為祟吏言請避正堂君弗顧宜人亦曰何物小鬼敢據公宇乎不為動而亦帖然族妹為邑士之室始至遣饋之及歸則與之酌别中間不時求見則謝之果有私請也在官未嘗問梱外事俸入亦不舉知其目君之清德所助為多凡君所為極意奉承君待之如賓言必稱名有出入宜人必攝衣揖之子婦侍側雍雍如也待婢使未嘗譴怒詈言不出諸口衣必澣濯不事珠翠綺綉之飾年纔五十有七卒于婺之官舍葬于陽堂鄉包家山之原子男五人彌遜迪功郎紹興府蕭山縣主簿彌迥迪功郎新台州臨海縣主簿彌遵先卒彌進將仕郎彌逮太學生女二人早夭孫男十三人麟之中之介之舉之希之翬之阜之常之準之异之􅠐之􅋷之彛之女九人在室諸孤將以十二月壬寅奉君之葬合于宜人之墓來求銘鑰託契非一日君之清介實所難及諸孤録君行實甚詳且其施于政者皆可為後法又自言其母之賢尤痛其早没懼無以顯于世願併書之故為具載而系以銘用慰孝子之思云銘曰史氏之賢德惟邁種衣冠之盛輔相我宋君生而秀弱不好弄父兄濡染以義折衷比宰百里始見于用亷白照人輕徭清訟人皆望君夷庚飛鞚僅乗貳車其退甚勇平生介然晚益嚴重閨門自養無所修綜潭府不居歸侍丘隴家廟時享極其欽奉動循禮度周旋勉中閨門化之無敢奢縱屏絶聲樂喜聆雒誦謝去機事志甘抱甕力行所知不牽于衆誰毁誰譽終不為動老成云亡鄉黨所痛君則了達如幻如夢我方臥痾向風一慟詩以颺之後人其諷太孺人蔣氏墓誌銘衞世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許此栢舟之詩所為作也女不事二夫古之道也共姜獨見于詩則知是時必有不能守者而況後世然共姜亦惟知守義不聞他美若從嫂太孺人蔣氏眞有共姜之節而婦道壼彛則又過之其可以無紀乎蔣氏世著籍于明之鄞今曰慶元府曽祖諱侃隱德不仕鄉里稱長者祖諱浚明贈金紫光祿大夫父諱珫朝請大夫贈宣奉大夫妣宜人周氏贈碩人方孺人兒時有善相者謂他日必領百口既歸于我寔伯父揚州諱璹之仲子也諱鏜字仲宏紹興十五年伯父提舉福建市舶從兄以疾卒于官舍兄資孝謹事親主于敬接物謙和遇臧獲亦未嘗失色伯父宦未達産薄累重或至乏食上不以病二親下不以語妻孥經營彌縫以盡其歡間輟口腹以與兒輩猶嘆曰人多不能報上但知報下爾壯益進學屬文舊作止存一二手抄書皆有楷法雖米鹽細事亦然在泉南嘗受詩于柯先生宋英先生亟稱之伯父與恭人馮氏尤所鍾愛哭之甚哀孺人年纔二十有九一女六歳居長四子幼者生始半月時二兄一弟皆在仕途所生母楊氏太安人眞欲奪而嫁之舅姑亦不能必其留也其伯父中奉璿諭之曰守志固美行顧汝年尚少能自保乎泣謝曰相待如賓誠所不忍抑不如是諸孤何以自存卒不爲動揚州擁麾持節厯十餘年所在隨侍雖舅姑存撫備至兒女子羣居間有人所難處者一切安之而婦職愈謹歸自維揚恭人得疾就醫于京口一力奉藥餌非親嘗不進臥起必俱既卒執喪盡禮歳在辛巳揚州以廪橐均付子舍用稍裕矣即戒諸子曰父葬未安而當遷汝曹俱壯而當娶異時長穉猥衆何以待之吾性儉約有素汝其毋徇侈習衣食之餘銖積而寸累之後數年由奉化之長汀舉從兄之柩改葬于松林鄉報國山祖妣魏國夫人塋之右求姻家蓮峯侍郎周公綰為之志諸子遂以次授室將析居黙禱于先曰未亡人願守故廬也果得之㕔宇不改餘皆一新視舊不敢加瀕湖仍存風月閣之號謂家法子孫所當世守命鑰大書勤儉二字扁于正堂揚州略用范文正公義莊規約以贍宗族之不給者孺人思有以増益之戒諸子及從子節他費遇稔歳則儲其贏今有端緒焉延慶寺有十六觀堂禮長懺僧未免乞食揚州欲賣田贍之始捐百斛孺人復用四十萬錢以酬先志且為揚州立祠得龍眠李公伯時所繪五十三善知識于故家置廣慧寺中有以乏告隨力周卹葢義所當用者大率不吝至其自奉則衣雜布素不事華飾纖粟不輕用也諸子少小蒙訓夜坐則諄諄然語昔者嫠孤艱棘與夫處已治家事上撫下之道一燈明滅泊如也每言今衣食登足不惟汝曹享其成我亦何力之有僅知守而勿失爾故凡牟利稱貸等事未嘗過而問惟計所入而嗇其出磨以歳月而至此亦不復詳記多寡坐總其凡諸子幹母之蠱無敢欺者子若孫今已九房孫㑹詵詵時節上壽斑衣滿前遂成大家和氣浹洽終孺人之世百口無間言内外姻戚莫不歎仰以為古之烈女無以過或謂節約已甚者至是皆心服焉然終不以此自滿時以手加額曰非舅姑之賜不及此故于諱日及家廟香火四時祭享必躬親之孀居㡬六十年執禮益恭吾母大寧郡太夫人間一過之奉之如姑未始少失禮于上下前數年嘗至奉川凡樓氏蔣氏松楸一一躬拜之曰吾老矣恐不能再至也病中不喜服藥區處家事甚詳且謂家人曰汝既不能留我吾亦不復戀汝勿爲哀毁能保家如今日足矣戒䘮葬母侈以髙侍郎夫人爲法嘉泰二年四月辛巳終于家享年八十有六男子長曰淵承議郎知婺州浦江縣賜緋魚袋仲曰源皆先亡叔曰洪季曰深國學生女歸故承議郎太府寺主簿周元卿孫十三人椅國學生桐國子進士棣梓㯃枅栱槐植根棁櫛栟俱業儒桐梓栱槐植先卒女九人兩浙轉運司進士趙巘夫從政郎新差監行在太平惠民和劑局趙師固宣教郎建康府溧水縣丞趙善潼國學上舍生宣繒髙保孫吳槱之國子進士趙汝括皆壻也二未行曽孫六人儀伾僖儲儒儼女六人俱在室明年將奉孺人之䘮以十二月丙午祔于從兄之墓淵既陞朝贈父至宣教郎孺人先以髙宗慶壽恩被封孺人壽考康寧安享備福如相者之言而子孫亦復多故淵最為可哀蓋其資禀有父之謹承母之訓而又充之以學問文辭蔚然鄉評甚休厯五任所至以賢稱職事無不辦受知于名公而未嘗一與同寮相忤行已無毫髪之玷此宗族之所痛而況母子乎然孺人之䘮洪深率婦孫哀禮俱至孺人為不亡矣銘曰女教不興彤史無稱猗歟孺人婦道備成執節守義固女子之髙致處事善㫁㡬烈丈夫之所不能蓋孟光之潔顧婦之清軻親之嚴篤陶母之賢明殆將兼而有之何止乎繼柏舟之名耶從妹樓夫人墓誌銘夫人姓樓氏名某字靚之曾祖常左朝議大夫累贈金紫光祿大夫祖异徽猷閣直學士左朝議大夫累贈少師父琚右朝散郎世為明之鄞人母安人陳氏朝散子女最衆及娶嫁者男五女六而家訓素嚴紹興二十三年知紹興之新昌縣夫人于是年十有八矣謹擇所歸石氏為邑中衣冠名族有娶吾鄉金川馮氏者其子曰文朝散曰馮亦吾外家而又知文之賢遂以歸之文字時亨生未晬而孤所生母太孺人某氏相與為命忍貧扶持備嘗艱棘人視之蔑如也得夫人而家寖以立夫人性資曉慧容止端莊幼閑禮度動有儀矩尤勤婦功且精其能既歸石氏仰奉其姑謹相夫子一以儉約職中饋事婦姑相安慈孝兩盡若親母子相處四十載怡愉如一日太孺人舉家務付之年未侵而身得優逸遂以上壽被慶典之封加賜冠帔以華晚節時亨有志古學結交多名士客至則酒肴不待需而具或游他郡從師友一不以俗務嬰拂之䇿名薦書賢譽日聞而夫人亦有内助之稱焉時節烝嘗必躬必親嚴潔精專至晚不倦石氏族黨最盛夫人承順上下皆有禮而恩意加之遇有慶弔率先而往無不敬歎時亨尉羅源道逺單騎以行夫人與家人奉姑尤謹有疾則調藥餌須臾不去左右既喪哀踊不勝棺椁衣衾既已豫備送終纖悉舉出其手雖皆子婦之職亦云難矣時亨相待如賓夫人性剛氣直習聞論議以及死生之說往往領解慶元六年年六十有四聰明如少壯髪無斑白又素少疾病一旦以下利奄然如蜕既斂面如生兩手俱結釋氏印信爲善之報寔六月乙未也親黨哭之皆盡哀生四男子穉徠侗顓長先十二年卒次爲太學生二女子長適里士黄日宣先八年卒次在室二孫順孫興孫將以嘉泰二年某月某日葬夫人于仙桂鄉石谿之原祔祖塋金紫之兆次時亨不堪悼亡之戚來求銘鑰諸父五院猶記少時惟伯父洎先工部多鄉居兩家往來最為親密夫人與余齊年而後一月相與㡬如同氣又念羣從兄弟及姊妹五十餘人存者僅十數而夫人又亡矣時亨復雅與余以臬味相好兩嘗過其家登飽山閣舉酒道舊故如昨日至是不勝愴悼而為之銘云時亨今為修職郎新嚴州桐廬縣主簿銘曰夫出名門孤立無朋夫人相之家道以成事姑克終睦族以禮子且有稱遽悲陟屺窆而求銘伉儷之情吾有感焉引筆涕零績谿縣尉樓君墓誌銘先光祿有十丈夫子惟伯兄績谿尉生于紹興二年仲兄嚴州生于四年至七年而鑰始生二兄愛鑰厚期待尤逺硯席相從有師友之義伯兄年方三十有二而蚤世仲兄與鑰不堪手足之痛祭之以文有云左琴右書一室環堵熒熒夜燈共㡬寒暑讀者悲之葬送之餘調䕶孤嫠不一而足仲兄不勝先公之䘮五十而終鑰益孤露上奉慈母以及二嫂下領諸弟從子幸不失雍熙之軌猶可樂也不幸丘嫂又亡矣哀哉兄卒于隆興元年十月丙子以十二月庚申葬于奉化縣長汀先祖冢舍之側嫂卒于慶元六年七月辛巳嘉泰改元得吉卜于禽孝鄉白石里徐隩之原二年二月甲申諸孤遷兄之藏以三月丙午朔奉夫人之柩合焉先葬泣以請曰渢滌不天父之葬不及銘今䘮吾母忍死竭力以襄大事惟潛徳懿行叔父知之爲詳請併登之石鑰亦爲之泣念吾伯兄抱負不凡不見于用不惟他人莫知諸弟生晚亦不及知也欲無為銘得乎兄諱鐊字昭聲世為明之鄞人為今慶元府曽祖常朝議大夫累贈金紫光祿大夫祖异徽猷閣直學士朝議大夫累贈少師父璩嘗權工部郎出知處州終朝議大夫累贈光祿大夫母汪氏今為大寧郡太夫人兄生而英發少長風姿灑落從鄉先生游自力于學舉業之外哦詩結字遇其得意警拔清新無不稱歎登覽勝地好風佳月必倡率儕輩觴詠酣適未始虚度寓處室亦必隨宜増葺拳石􅇦水昌陽蘭蕙芬馥秀穎而燕居其中間作墨戲小山叢篠雅有思致及見杼山劉公慕用其人摹草書千文㡬于亂真又有幹才先公築室深入窮山取材董工身任其勞疎財好義篤于親故恨力之不足宗族託以吉凶事未嘗云難甚劇者亦談笑而辦人以逺業期之歳在戊寅光禄丞溧陽以郊祀恩補將仕郎次年中銓選授右迪功郎徽州績谿縣尉未赴今嗣秀王方守丹丘檄監大田酒庫勤于所職檢柅弊蠧不擾而事集能令一方之人惜其去詣郡乞畱未㡬以小疾不祿使假之年其自見于世者何止此而已耶嫂陳氏家番易祖宗道父兖登政和八年進士科止于發運司幹官母太安人徐氏新城名族膳部公偉達之女也無子生三女嫂其季也光祿知烏戍鎮事從姑之夫吏部孫公邦亦新城人與徐氏親厚以膳部之壻為屬遂締姻焉素有母訓歸而家人宜之嫁十六年而兄亡嫂方盛年幼穉纍纍長女始及笄而吾家清貧又非今日比徐安人尚無恙欲嫁之自以幼更多難又爾寡居命也奈何矢死靡他一意俯育人已服其守義自爾斥去鉛華專靜勤約心計精密銖積寸累五女遣嫁三子納婦雖次第成立而嫂氏亦為之早衰年逾從心猶執婦道姑嫜娣姒歡然終身晚耽内典一絲不掛養痾自佚得壽七十有五中子漵後七月而卒女長適蔣與求次適奉直大夫知南劍州軍事朱軝次適迪功郎紹興府新昌縣尉兼主簿孫逢吉次適儒林郎添差建康軍節度推官趙師潯伍趙二壻及趙氏女亦俱亡矣孫七人曰棟年十三而夭曰機曰椷曰枝曰樾曰枚曰格孫女七人皆在室銘曰嗚呼伯氏自立千仞齎志壯年其用勿盡變彼賢配厥有髙節柏舟自誓以汔同穴俯仰疇昔首尾四紀稱于宗姻光于彤史徐隩之藏捨舊從新我為詩之用啟後人攻媿集卷一百五
