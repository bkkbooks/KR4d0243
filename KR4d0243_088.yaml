body:
  text: 宋樓鑰撰行狀敷文閣學士宣奉大夫致仕贈特進汪公行狀曾祖元吉不仕妣何氏祖洙皇明州助教纍贈正奉大夫妣陳氏纍贈太碩人父思溫皇左朝議大夫直顯謨閣致仕纍贈少師妣王氏封恭人纍贈越國夫人本貫慶元府鄞縣武康鄉沿江里汪大猷字仲嘉年八十有一狀惟汪氏派出黃帝得姓尚矣然自厯代以至本朝未嘗有一顯者宣城鄱陽上饒四明諸郡大率皆出于新安英濟王廟食千載後裔繁衍宦路相遇多講宗盟祐陵時大司成澥以耆儒名翰林學士藻以文章顯嘗謝司成薦舉止用張衡思玄賦汪氏龍魚及檀弓童汪踦事且曰遙遙譜牒之相傳沒沒衣冠之不振雖更魏晉之遠莫厠崔盧之間槩可知矣丞相伯彥首相髙宗遂為佐命之臣紹興間簽書樞密院事勃樞密使徹俱至大位子孫宦達相踵端明殿學士尚書應辰以重名崛起雖不至公輔而道誼風烈足為一世師表此其尤盛者也公以文昌舊臣厯仕四朝康寧耆艾獨殿諸老抑其次焉今汪氏所在衆多幾如王謝家豈族姓盛衰亦有待于時耶公之曾祖處約而有士君子之行受知范文正公王荆公正奉為鄉先生文行淳備沾丐後學少師紹興初為太府少卿兩浙漕使風誼尤髙搢紳推重生四子公其仲也始越國方娠公之從伯父夢應真受生産于叔父吏部鄞縣丞之官舍生而岐嶷骨相頴異四嵗誦孝經能對客問學中所講論語孟子輒述口義以示同舍一日千里儕輩皆畏之紹興七年以少師遇宗祀補將仕郎調右迪功郎衢州江山縣尉公漸漬義方曉暢吏道若老于州縣者所部百人默識姓名及幹力之優劣輒得其用分鄉警捕境內肅然鉤考滯訟斷之以理嵗在甲子洪水稽天發廩為粥以食避水者又取鹽商大舟救之存活為多時方申兼經之制以嘗試南宫公餘肄業再薦漕臺遂中十五年進士乙科秩滿關升左從事郎為婺州金華縣丞處事益明期限必信文引可以質錢至有以潤其屋者豪民陸氏析産嚚訟案牘紛積公詰其要謂祖屋枕山長兄據其前而使諸弟由山蹊以出公曰此最其不平者按圖更分已得要領又訴義遜及贍塋嫁姑之厚公曰爾父兄同力起家義遜有法奉先冢嫁諸姑豈得不厚一婦以衆錢買田託以嫁資公考婦家户籍不滿半頃復取均之且諗之曰若送所司一門無全人至親不復可相見汝家破矣命講長幼之禮歎服而退時户部侍郎李公椿年建議行經界選公為龍游縣覆實官約束嚴峻已量之田隱藏畝步不以多寡率至黥配盛氣臨人無敢忤者公獨曰愚民不識弓步不善度量若田少而所供反多須使之首復乃可竝行李公問當何如公曰凡有不實許其自陳俟驗實與改正悉皆施行受賜者已不知其幾既至躬行阡陌唱弓量之目則已默計其廣袤之實吏運籌久之無毫釐差觀者以為神凡事俱有方略邑人鼓舞旁縣皆取為法事畢躬納圖帳李公又欲以十保合為一圖仍與鄰都犬牙相入公曰一保之圖用紙二百番已無地可展又從而十之不惟不能圖畫亦安所用之徒重勞費無益于經界也由是諸郡俱免催科辦事談笑而了不失忠厚二十年丁越國憂星奔哀毁悲動行路服除為嚴州建德縣丞二十四年饑民嘯聚熾甚守禦調度多出規畫以訖無事分都賑給衆中指一夫詰曰是某都某人也蓋居兩都之間而冒請者械繫于前餘多引去事已徐釋之又嘗遜薦牘辭受輸皆人所難能明年用舉者改宣教郎知平江府崑山縣旋遭外艱既造朝有達官使獻生財之說將用以為薦公曰財不可生也生財者必害于民寧甘心寸進耳遂謝之差總領淮西江東軍馬錢糧所幹辦公事金亮犯邊饋餉王師髙宗巡幸供億百出公佐其長以辦羣工扈從咸知公名三十二年賜緋魚袋改幹辦行在諸司糧料院文書盈几目不給視公間摘一二無不切中老吏驚歎謂未有也或言榷貨務左藏庫有羡儲朝㫖以諉公躬自檢校得其實以對隆興二年四月參政錢簡肅公宣諭淮東辟為幹辦公事九月改充參議官內禆幕府外按邊陲海泗唐鄧之棄錢公執以為不可公亦贊之雖不得盡行終免倉猝之變者宣諭司之力也遷大宗正丞乾道元年兼吏部郎官主管侍郎左選又兼户部右曹有蜀士理和糴酬賞吏必欲以小節取㑹公曰在法有旁照可驗許比類而行即取其同類者併上之省吏沮抑尤急公力爭之自是始為定例六月輪對錢公先薦于上乞與之言察其人物公奏總核名實責任臣下因才而任毋違所長量能授官毋拘流品又乞表薦宗子隨事録用止注目久之謂輔臣曰疏通詳雅有議論今日有用之才也除禮部員外郎公自登第嘗習宏辭科應用之文足以行意在州縣時守將多委以箋奏南宫名表一出士林誦之此外無他職務同列言于廟堂謂公撥繁治劇有餘而清簡太甚丞相洪文惠公以此諭公七月遂兼吏部侍郎右選九月除吏部郎官主管尚書左選莊文太子初建東宮妙選僚寀是月以公兼太子左諭德太子侍講兩日一講孟子多寓規戒莊文深所欽重嘗出龍大淵禁中所進侍燕樂章諭宫僚同賦既退公謂同列曰燕既不預無以措辭若出于御製或儲禁為之猶可賡和鄭衛之音近習為倡非講讀官所當預也白于太子而止二年為省試參詳官參政林公安宅以户簉同知貢舉就除諫議大夫自言去場屋久以考校事屬公公為之協心焉訖事日欲邀公議論辭不往林既罷政獨免于評議六月除祕書少監髙宗聖政書成進讀于紫宸殿德壽宫道山清髙領袖名士職當修神宗以來㑹要而曠嵗不舉深懼典故散逸率屬分纂上聞之為置局命宰臣提舉書奏五朝之大典始備金國來賀四年正旦借吏部尚書為接送伴使上閲語録見公敏于酬對處事有體滋嚮之尋兼權刑部侍郎六月兼崇政殿說書八月兼權給事中孝宗厲精民事訪問不倦宿直玉堂夜宣對選德殿賜坐從容導公使言時欲遣察官決獄畿邑公奏使果有滯囚亦且先次決遣事體太重徒擾諸縣必又甚于監司之臨按不得不謹于始遂改命通判以行公首以一言移主意自爾每遇夜對上多訪以時事嘗曰卿為侍從天下之事無所不當論朕每厭宦官女子之言思與卿等款語正欲知朝政闕失民情利病茍有所聞可極論之公悉進所欲陳者奏對明白曲盡情僞上多聳聽而行之其造膝啓沃之際若講義進故事論治道之要具有遺編亦或削藁而不傳惟見于事功之實者謹書之以池饒信建水災乞用澶州劉渙收買耕牛之法令州郡廣收糴以備賑糶論役法則陳一鄉通差物力均差均錢雇人官户例減限田之詳又别白里正則専主煙火盜賊耆長壯丁則催科承引今取耆長雇直撥入經總制司竝緣法意里正承役之初抑使兼充役者受害為甚至死必爭又乞改定役法未可輕變廣求衆議而後可必須遲以嵗月若欲寬其困苦當先嚴禁誅求又論亭户不充役次以鹽折稅或有未嘗親熬波之勞居近場監貸錢取息射利為厚且三公尚有限田而此曹獨無定數反受官户隱寄又均和買于編民欲將家産及二等以上依官户充役又論給賜勳舊近戚以田一得指揮豪奪占據桀黠者妄指官之籍沒民之户絶者以為獻藉勢陵轢州縣至不能誰何寧忍惠及一家而使人重罹其苦自今惟當錫以金帛使自求之又論籍沒財産止可行于强盜囊橐官吏犯贓之人然朝為富室暮為窮民流離凍餒已自可念至有倉庫綱運負陷官錢而致破家者宜有以處此欲應以缺負拘産不在給賜出賣之數計其租入償缺既足則以給還使復故業以至廢鄉村私立稅鋪罷官監酒坊及陳萬户酒之䇿嘗因輪對論銅器之害則曰産銅之地不發浸銅之水漸涸鼓鑄重費楮劵弊深泄于邊境而法不嚴壞為器用而官不問若立用銅之罪重于銷銅之人居官而使人為器用者坐以贓私罪則法乃可行論捕酒之害則曰民户遭劫盜者猶有官司可告盜既不敢肆毒鄰里亦得救應今捕酒者空人之家鄰里至前則誣以拒捕官司不復明白則是捕酒之暴甚于劫盜也殺人者罪止一身而老幼自若今一遇捕酒舉家拘縶非法受苦則是犯酒之罪重于殺人也大率公之論事皆深切著明考究詳備玉音嘉奬嘗曰卿前後所言皆今日可行之事臣僚所未及一一付外雖議有不同不盡見諸施用亦有遂著之甲令者五年再為參詳官四月除權刑部侍郎兼侍講職于秋官二年餘孝宗垂意刑章哀矜庶獄公乞重修法令謂中興之初首立詳定一司自建炎四年六月以前著為紹興法今四十年多編集監學貢舉常平茶鹽等一司之法而一代條章因革損益迄無成書敕局官多吏繁俸優賞厚因減穴官遽行廢罷舉數十年之法一切不省建炎以後續降指揮二萬餘條若不刪其繁重定其當否有司率用新制而棄舊法日移月改輕重舛牾無所遵承使舞文之吏時出而用之以售其姦及今不為久益難考乞明詔盡行編纂命大臣典領而選廷臣討論庶幾筆削必當以杜吏姦以一民聽上極以為然即令條具仍差大理二卿本部三郎官寺丞司直各一員公遂兼重修敕令詳定官此四年之冬也他官去留不一惟公疚心修定以為己任推舉詳明通練之士以自佐訪求舊吏網羅故牘若一司一路専法不係海行者即釐送之一時申嚴或雖係續降尋即衝改者即刪去之于見行法中增損元文五百七十四條帶修創立者三百六十一全刪舊文八十三存留照用者百二十有八墨書舊文朱書新條年餘書成進書之奏公所草也謂將前後續降參以纍朝法意酌以四方人情考訂編入各有看詳案冊明言去取之因而例不以頒降欲申敕有司凡州縣于新書有所未曉許條具申所當以元修因依行下孝宗取進本列于選德殿之左右朝夕觀覽嘗宣問所疑隨即奏對上又取條冊指問與所奏俱合嘉賞再三曰文字繁拏不易盡記留意所職乃至于此對曰此法將與天下共之況屢承宣諭敢不盡心他日又問如初遂亟稱于宰執有忌公者遽入譖言賴聖明不以為信爾後屢更修定今凡再易矣其規畫大率循公之舊而精力不能逮也上又嘗問本職事刑罰黜陟豈無過差公因奏溫台大水郡不以聞使之具析以守臣王之望嘗為執政陳巖肖為從官特免違慢之劾乃移罪二漕各降一官上云亦覺未是待作一名目改正公又奏知其未是當明以示衆若别作緣故則前失仍在不若徑改之有㫖改正又奏知信州趙師嚴補糴前政所虧常平米方及半而坐擅用鐫兩秩永不得任親民提舉李庚巳嘗申明送饒州取勘亦以不行檢察坐之且不得與監司雖欲示警而皆不當其罪案上皆得追改前命辨台民楊大任匿盜而能告捕不應坐以越訴即依條給賞仍免其罪論一案推結之法屢變㑹問無期獄訟淹延即令别行立法時尚書周公執羔韓公元吉樞密劉公珙以强盜率不處死無所懲艾侍郎林公栗為右司謂今之强盜非親下手已殺人者類皆不死請依太祖舊法贓滿三貫者皆斬公恐遂行曰此吾職也遂具奏曰強盜豈可恕用舊法而痛懲之何為不可惟是天聖景祐宣和以來益用中典太上與民更始非以刃殺人者一切貸死遠近歸心循襲既久寖失禁姦之意今已議為法六項犯者依法處斷非此而但得財惟再犯者死可謂寬嚴適中矣此輩雖愚豈無黠者為謀知有可生之路志在得財而已所全尚多若不分首從雖不殺傷悉皆抵死則凡得財鮮不及三貫者此法既立未必能禁其為盜彼先以死自處則被盜者將無噍類為盜者無復全人究其極而計之死者益衆矣陳公良祐為諫議大夫請取案例公以見定一案聞奏用六項法則死者十七人用見行法則才四人若如舊法則百七人俱死遂從公議借吏部尚書為六年賀金國正旦國信使歸至盱眙得印榜云今後犯强盜竝依祖宗舊法所有六項指揮更不施行到闕未及結局即以不得其職自列求去上聞其詳即日復行六項之制至今遵用焉有請以大辟奏案如情理可憫即上朝廷若情法相當者止從刑部審覆行下公以為既經奏聞非有司所得自専當依舊例擬斷降㫖處分尤見詳審欽恤之仁監司按發官吏不得送置司州軍根勘紹興之良法也久而寖紊為弊亦多公申嚴之使見有違戾者竝行改送勘院翻異當究問其詞具申監司有詔物價騰踊以絹定罪者每匹增為三貫公乞以錢定罪者亦如之其明罰敕法助聖朝好生之德者未易悉數也使金之役權要為輔行公在朝纍年于人甚周而介然有守未嘗與之通至是惟議使事相處亦不為異惟不能過為奉承事已又疏之衆服其裁正而其人自此不相樂矣時孝宗方欲經略中原使回者或承順㫖意過為大言公歸首以為問因具陳經行所見聞者上曰如卿所言則未可為攻取計耶公頓首曰誠如聖訓今日豈可輕動且須益務內治以俟機㑹耳玉色不悅公又曰臣不敢妄論迎合聞者以為名言七月除權吏部侍郎九月兼權尚書再置敕局兼詳定一司敕令先少師嘗為吏部郎仕者脫兵火亡失文書訴者日集躬為辨析吏不得蔽建請改官狀五紙之外許令改舉聲績卓然公少親見之自為郎嘗厯三選以至長二清通簡要兼古人之長建明尤多率以先德為法或曰今日凡事從窄非曩時比蓋有務為沮抑號能任怨而至顯用者公曰方且鄙之何忍效尤乎調官陳詞者多孤寒之人于此不為留意使不得其平尚謂之銓衡耶由是鬱者得伸滯者得速求者得遂人人感悅亦未嘗屈法以從人其有不可明以告之退無所恨辨宗室及陳亡人女夫不當在七色之數乞恩科權官選人願致仕者請以厯過嶽廟為考修正川廣定差之弊命官被訴不經勘正者免關刑寺注籍以妨差注縣令臧否欲俟其任滿奏聞案後收坐不當之人止就部檢照免行下取㑹又條列部中留滯節目附赦施行皆欲去弊剔蠧使選法流通以為公私之便中使嘗夜傳㫖學士院袖出資治通鑑一冊指唐沈既濟論選舉事曰今日有無此弊其說可與不可行來蚤面對退即呼燭草奏既入先厯陳數項謂事與今異弊雖似之其言則難行上曰卿言甚明更試一言因奏正恐言不能盡曾筆于紙深夜書寫不謹上即令展讀讀畢不敢留中退至廡下又遣宣取且云更欲詳觀可遂留下宸眷日隆㑹當郊特差充鹵簿使人知枋用有漸而忌者愈甚竣事力求外祠上亦知之七年正月除敷文閣待制提舉江州太平興國宮侍從館閣諸公賦詩留題以餞行色今石刻存焉還鄉四月起知泉州到郡遇事風生不勞而辦郡實瀕海中有沙洲數萬畝號平湖忽為島夷號毗舍邪者奄至盡刈所種他日又登海岸殺略禽四百餘人殱其渠魁餘分配諸郡初則每遇南風遣戍為備更迭勞擾公即其地造屋二百間遣將分屯軍民皆以為便不敢犯境後左翼軍狃于盜賞忽又報侵犯徑捕至庭自以為功公曰毗舍邪面目如漆黥涅不辨此其人服飾俱不類何耶察之乃真臘大商四舟俱行其二已到餘二舟以疑似被誣公驗其物貨什器信然軍人猶譊譊不已公諭其將曰使真是寇賊固不應縱捨既知其為商旅又豈得陷以深文始皆退聽即使盡入來遠驛所販黃蠟償以官錢命牙僧旬日間遣行軍屯城外有入盜庫銀者踰垣而出為邏者所偵反執而歸誣以為盜而上之郡公已得其情仍械邏者使參對失銀十二鋌得十而遺其二主將辨數甚苦公不為動已而軍士首伏即其所窖取之皆伏辜微公明察善處則俱失其情矣蕃商雜處民間而舊法與郡人爭鬭非至折傷皆用其國俗以牛贖罪寖亦難制公號于衆曰安有中國而用夷俗者茍至吾前當依法治之始有所憚無敢鬭者三佛齊請就郡鑄銅瓦三萬片舶司得㫖令泉廣二州守臣監造付之公上疏極論其不可既犯中國之禁又為外夷所役獨不與南外宗正司廪給嵗廣久以為病公撙節用度增價以糴民始免于苛取公再嵗兩求奉祠九年以治行尤異除敷文閣直學士再任賜衣帶淳熙元年申前請始有興國宫之命歸次延平除知隆興府兼江南西路安撫使赴闕奏事甫入國門即令引對臨遣甚寵江上有篙師謀害主人而據其女因有資財女聞公威名密告縣令公為究治得主人夫婦二尸于神祠之傍寃始獲伸吉民王氏雄于財怒武尉之不容冒佃官地誣訴于州尉不屈夜歸過其門使人折其足事逹帥憲公同奏其事且謂父子皆以資得官恐從末減無以懲姦乞先除其名孝宗閲奏震怒徑下所勘建昌軍皆黥配嶺海併坐推吏之受賕者江右無不快之五月茶寇賴文政等起湖北自湖南向江西帥司即令境上防託江西所恃惟贛吉將兵亟遣未及而賊已入境與吉兵遇一使臣死之以湖南曾戕官軍至此又小勝止為逃死之計遂據禾山洞公遣副總管賈和仲總數州之兵以討之和仲老將意頗輕敵或已議其狠愎難任然兵官無踰此人者未及出門而得㫖果以委之主帥調發而簉牧領兵職也武人謂朝廷専委凡事寖不相關一到賊壘暮夜驅迫將士入山反為所覆不可復用又遽遣約降至折箭為誓人知其為詐而不寤賊立旗幟為疑兵由鳥道竄去兩日而後知之六月初有㫖湖南令帥臣王炎節制如已入江西即令賈和仲統率四路人馬討捕是時猶未委公及和仲輕舉妄發將兵已潰賊勢日張則乞就委江州都統制月末始得金字牌令公節制大暑中兼程而進洪至吉七百里勢不相及賊亡命習險阻常隱叢薄間弓矢所不及官兵驅逐接戰十餘殺傷相當多猝遇于狹隘之處交鋒者不過數人餘已遁去不知蹤跡使荷戈被甲之士與之追逐雖欲列陳併力有所不可既逐入廣而又復回初就招安列六百餘人後止餘百輩則知所喪已多勢既已窮而有許拔身自首指揮間有禽獲者亦言本非凶逆若開其生路必來降矣遂以小榜具載指揮募人入賊賊云望此久矣茍得曉事文官來即當隨往提刑辛棄疾同議遣士人借補以行而公已罷盡復逃去未幾興國尉黃倬請行正合前說遂降公初以和仲敗事自劾降龍圖閣待制㑹有為和仲地者又降集英殿修撰後帥既以儶功受賞公遂落職南康軍居住至四年自便十二年始得外祠十三年髙宗慶霈復龍圖閣待制十四年再奉祠十六年提舉鳯翔府上清太平宮紹熙改元盡復舊職二年致仕兩朝即位之初皆有詔求言上又賜詔書撫問賜銀合茶藥公退閒既久無復用世拳拳憂國終不弭忘疏論天下事各數千言慶元五年十一月朝家優老特除敷文閣學士賜衣帶鞍馬六年秋初感疾七月庚辰薨于正寢遺奏上贈四官官一子娶樓氏封碩人先二十七年卒于隆興男三人端中奉議郎兩浙西路提舉常平司幹辦公事立中宣教郎知婺州武義縣丞沿檄歸省弗可久留方將丐祠就養而公亡矣􅔲中將以遺恩補官女四人三蚤夭一適奉議郎知福州永福縣事樓鏘孫男四人之翰承奉郎監嘉興府華亭縣市舶務之幹之輔之範碩人以淳熙五年葬于慈溪縣石臺鄉龍潭之原諸孤將以十二月丙申奉公之柩合焉禮也嗚呼公之為人幾于全矣少而孝弟稱于鄉黨長而聲譽振于場屋入仕則公勤亷恕施惠于民立朝則忠諒精白結知于君用雖不盡退而居鄉髙誼特達四明素為義郡至公而忠厚之風益盛焉天性樂易于人無不容而風裁自髙截然有不可犯者其在朝行史文惠公有同年之好錢公知奬最深魏成公少小相處如兄弟蔣丞相同為宫僚王侍御伯庠實為姻家前後同時公樂于平進既無附炎之迹又不涉于指議公精敏而寬和處事有體其在禁路尤為梁文靖公陳正獻公及今少傅周益公所知惟虞雍公與史魏錢三公不咸雅不相樂徐而避之孝宗察見隱微幸保終始方龍曽鼎貴一時諸公不事孫劉者蓋寡龍在閣門聞諭德之除亟稱以為當有史官坐中問曰亦與之熟耶龍曰在此未嘗往來某少為三衢兵官只見人說江山汪縣尉之賢如出一口聞者益以此服公之介曾向有簡歡之嫌隆興之屢貶南康之久謫既歸而八年不得祠多其力也時碩人未葬豈不念歸史公風公通書修好謂求進則不可不爾恐梗歸計公歎曰若能為此前必不致相失竟達空函貽羞千載老矣一聽天命耳後得善脫史公深歎美此節每以語人謂不可及南康之行親戚恐公未免攖懷或致摧沮公方挹送行者曰使某年近六十以恩科得官今赴星子一尉豈不為我賀其曠達類此既至樂廬山之勝杖履徜徉登臨自適若將終身者借書郡庠益沈酣于史冊上下數千載興亡大槩下至稗官小說罔不該究塗中和淵明歸去來辭平易精切視前輩無愧佳處或出其上遇觴客則使歌之王魯公謂公不求復用公聞之曰求之廟堂而辭之君父非自欺乎既登七十即抗章引年求致其事朝論以為髙又豫之祠再申力請其後諸公相繼得謝遂為清時美事實自公發之尚書鄭公丙貽書曰公少某二嵗先吾著鞭矣始少師以深仁厚義稱于世嘗曰事事上行方便物物上有利益此吾志也公又能推廣之少師奉先塋素謹公之葬二親皆力貧襄事規橅宏大纎悉周備鄉人視以為式既畢窀穸假貨經營久而冢舍方就廬居終喪拜掃之外諱日必親薦羞于山間南城祖隴外家王氏奉川諸墳一一經理可為永久三妹尚幼竭力嫁遣俱得所歸聚族寖衆闢先廬房宇百餘楹皆身任之內外百口獨當家務出私財以佐用者二十餘年凡公所得盡為諸院公費又以及女弟之貧者二外孫既孤收養至今官賦輸送皆親為之不以纍兄弟又得整辦無一金之負少師既任諸子晚嵗一以及伯氏長子行中次當及公位以伯氏子衆推以與次子積中尋又奏其二子得中稽中又及季弟江州之子敏中既拘限員將復與叔弟之子闡中而不果然終念之厥後江州沿公之意命以一官甚愜初志而公之孫今尚有白丁焉兩宫聖節非有疾未嘗謁告子弟之已仕者必使之俱行曰汝曹世受國恩終嵗閒處獨不能以頃刻之勞效後天之祝乎宗黨有急以公為歸産業素薄僅足自給納祿之後用亦寖窘隨力周施嫁人之孤女葬貧者之喪不知其幾敘宗盟及纍世外門姻黨宗派條列號興仁録以遺子孫使之不替親好豫營美檟嘗輟以豫人至于再三無靳色家有一池鄰里來汲每歎曰安得有財如水以濟人之欲乎力既不及遂率鄉之人為義莊首割二十餘畝以為倡衆皆競勸至三百畝又得郡中益以絶産二頃凡賢士夫之清貧身後不給者量多寡周之買地立莊于城西門之阿親為約束防間曲盡可謂無窮之利庠校自兵火草創嵗久寖圮勸率巨室且為之文謂崇釋老之居以徼福不如新夫子之宫以助風化首創儀門聞者不約而趨黌舍一新冠于東南冬至嵗旦序拜有規主盟斯事少長以禮推年長者為學賓遇釋菜則為祭酒自編于布韋之間以為一鄉矜式凡里中義事率自公倡之賓客造門必與鈞禮不問遠近必親謝其門性不喜飲而好客觴豆不至過豐而情意周備嵗講壽席自為歌詞皆安分知足之語人多傳誦㑹者不下百客手自勸酬連夕不厭貤及僮僕無不霑給間赴宴集必盡主人之歡危坐笑談雖達旦不先退真率之約觴詠琴奕未嘗以爵齒自居此皆終身行之後生之官多以卷軸求教公樂于訓誘隨所職一一以告能行公言者多著能稱真一代之吏師也成就人固多矣而薦舉非名士不預樞密大資政葉公翥方為掌故公一見識拔于稠人中尚書錢公象祖侍郎劉公孝韙史公彌大經略潘公畤屯田鄭公鍔簽判沈公銖皆卓然者其他汲引光顯于中外有知人之稱晚更篤學如少年書生有適齊存藁二十冊觀書手抄曰適齊備忘十七冊取唐宋名公詩集編為詩韻四十冊又有漫録訓鑒等書端中等方㑹稡俟他日鋟木以傳今藏于家鑰曾祖金紫娶翁氏公祖母陳氏翁陳出也兩家少師為表兄弟行又甚相好先君工部遂締姻焉公之碩人又鑰從伯父之女交婚至今如朱陳然先君依甥館鑰輩生長外家䝉外祖教育之賜事諸舅如諸父受知于公尤深且久公為禮部祕監時鑰留侍側護客使金皆許侍行晚而僥幸與表兄華文閣直學士陳公居仁繼登從班居素切鄰公既謝事而鑰得奉祠六年之間有行必從有唱必和徒步往來殆無虛時劇談傾倒其樂無涯去嵗老母年九十公少十嵗鄉閭合慶元夕之後簫鼓相聞暮春方止嵗晚公既為真學士老母亦進封信安郡太夫人郡奉詔㫖均致粟帛羊酒之賜皆為一時之盛平時慕白樂天之為人仕俱至尚書白以五十八歸休猶一出為京尹公之歸又先二年而壽過之以適名齊宜靜名室畫履道宅圖于屏且書池上等篇于其顔後又易以無可奈何之歌詩造平淡能道人情曲折和達哉樂天行等篇置之集中殆莫能辨也鑰嘗與公同閲石林避暑録話論樂天事甚詳公厯言出處大槩慨然而歎謂吾非敢追配古人而大略偶似之鑰遂録于冊益公見之賦詩甚工以公比樂天尤切公曰雖不敢當然足為不朽之榮矣遂礱石置適齊中公既有疾時問安否一日奉版輿過公笑語竟日不見少異才隔再宿有報公之疾變者亟走牀下則已不可為矣藥石禬禳皆所不及嗚呼公豈厭塵世而徑仙耶何去之速也內行修飾名節純全壽考令終幾無可憾惟仙風道骨必謂上壽禍起非意最為驚痛聞公之亡者無問貴賤大小駭怛赴弔相向而哭俱為盡哀鄉之達尊郡太守而下至庠校之士相與設奠而寓哀于文皆盛德之感也鑰痛徹肺肝固已不堪若太夫人之悲慟罙不忍聞行道之人所共歎也諸孤以葬日迫近未遑求銘于當世儒宗俾鑰敘次行事竊自維念愛我撫我莫如吾舅而知舅之詳者亦莫如鑰公之名位至此小官時事不必屢書痛惟侍坐之次公厯言入仕之初以至通顯凡經區處者嵗月姓名一一不忘聞見所及既不可勝書謹擇其可法者備載之不嫌于詳也他日定諡法秉史筆者庶有取于斯焉謹狀攻愧集卷八十八
