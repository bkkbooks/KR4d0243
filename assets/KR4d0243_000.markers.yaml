  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書集部四攻媿集别集類三宋提要臣等謹案攻媿集一百一十二巻宋樓鑰撰鑰有范文正年譜已著録其集載於諸家書目者或作百巻或作八十五巻而世所傳鈔本有僅存四十二巻者葢流傳既乆多所佚脱此本原作一百二十卷與宋史藝文志及陳振孫書録解題所載相同猶為舊帙惟中缺第七十七巻據原目為宣王内修政事光武大度同髙祖二賦玉巵為夀宅道炳星緯二詩用人安民治兵三䇿又缺第七十八巻據原目為御試進士舉人台試館職閣職省試别試解試上舍州學諸試所擬䇿問十五篇又缺第七十九巻據原目為宴㑹慶賀致語十五篇上梁文四篇勸農文二篇其第七十三卷據原目缺跋王伯奮所藏文苑英華跋清閟居士臨修禊序二篇第七十四卷據原目缺跋劉元城江諫議任諫議鄒道鄉陳了齋五諫帖一篇而第五十六巻中揚州平山堂記亦缺其後半諸家所藏刻本鈔本並同今俱無從校補至第四十八巻第八十巻第八十一巻第八十二巻有青詞朱表齋文疏文之類凡一百六十七篇均非文章之正軌謹稟承聖訓槩從刪削重編為一百一十二巻用聚珍版摹印以廣其傳鑰居官持正有守而學問賅博文章淹雅尤多為世所傳述本傳稱其代言坦明得制誥體葉紹翁四朝聞見録載鑰草光宗内禪制詞有雖喪紀自行於宫中而禮文難示于天下二語為海内所稱此言其工於内外制也本傳又稱鑰試南宫以犯諱請㫖冠末等投贄諸公胡銓稱為翰林才今集中謝省闈主文啓一首即是時所作此言其工于啟劄也王應麟困學紀聞取其門前莫約頻來客坐上同觀未見書二句載入評詩類中此言其工於聲偶也而袁桷延祐四明志稱其于中原師友傳授悉窮淵奥經訓小學精据可傳信尤能盡鑰之實葢宋自南渡而後士大夫多求勝于空言而不甚究心於實學鑰獨綜貫今古折衷攷校凡所論辨悉能洞澈源流可謂有本之文不同浮議王士禎居易録稱其行盡松杉三十里看來樓閣幾由旬一百五日麥秋泠二十四番花信風水真緑净不可唾魚若空行無所依諸句而病是集多叢冗謂表狀内外制之類刪去半部亦可然貪多務博即誠齋劍南平園諸集亦然葢一時之風氣不必以是為鑰病也至於題跋諸篇尤多原原本本證據分明不止於居易録所稱三笑圗賛吳彩鸞玉篇鈔唐昭宗賜憘實勅書三篇毛晉輯津逮秘書摘録宋人題跋共為一集而獨不及鑰其偶未見此書歟乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀}
