  - {type: variant, offset: 605, length: 335, content: 論著大哉堯英聲早巳昭横飛欽遠業特立仰高標言議超千載風猷聳四朝惜乎經世學不及珥金貂太上崇耆舊龍鱗手可攀胡爲遯荒野竟復老商山漢閣頒綸渥灑壖擁旆還靈光遂陳迹西望涕空潸設卦探羲畫隨山究禹謨仰天眞見象畫地可成圖健筆凌前輩残膏浹萬夫登門嗟最晚猶得覘宏模楊武恭王存中輓詞歴數中興將誰爲第一功兩朝忠衞上四海雅推公富貴無危溢哀榮有始終吾知尚遺恨不見朔庭空勇氣眞虒虎仁心劇放麑推鋒多折馘解縛屢招攜細柳門堅閉長楊馬不嘶夜深星忽墮何處問撑犁父祖成完節丹心激懦夫枕戈梟逆首撫劍志伊吾忠孝公何媿哀榮世所無從今柴荷橐接武上亨衢王爵報元勲臨危更致身鯨波飛戰艦狼子歎江神木落淮南暮塵淸塞外春功臣誰第一圖畫在麒麟沈憲敏公樞輓詞天使魁鄉薦上令卿攺官蚤峩烏府豸終著侍臣冠持節威行惠專城猛濟寛紹熙多舊學胡不相宮端, WYG: ''}
