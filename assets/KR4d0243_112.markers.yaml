惜終霄作意看送陳君舉守桂陽重尋漫壁認題名十五年來一夢驚誰料今朝携客至却成此地送君行桂陽卧治真談笑魯史遺編頼發明文定南軒僊去後湖湘又得一先生永嘉天慶觀斗口横安華蓋山茂林脩竹路灣環琳宫迥出滄瀛表羽士如遊崑閬間東挹江山窮望眼西臨闤闠笑塵寰自知去此無多日著意來尋一餉閒次許深甫寄陳頤剛韻博物曽經辨實沈論兵更覺用功深九閽未進六竒計萬卷空催一寸心流水髙山誰復㑹寒松春桞解相尋如君豈是長貧者作計無令嵗月侵前朝折㦸尚沙沈志士私憂意向深謀國未湏先問陳平戎要且務攻心衣冠舊老知誰在禾黍遺宫尚可尋騎省再新人有望一言坐復故疆侵勸農一番好雨潤桑麻和氣歡聲十萬家太守勸農􅅻出郭老農􅅤哺競隨車土膏澤澤地宜稻雲物陰陰天養花願得四方無旱潦盡教樂嵗似東嘉書吳夢予古樂府後古来樂府近來無筆力如君郤有餘日恐遺音亡正始喜聞新作過黄初不誇藝苑徒工瑟應免侯門乆曵裾更向江西詩窟去他年時寄一行書謝景英送鄭景元篇末見屬次韻張羅清似翟公門門外都無野雀喧可但風流追鮑謝直教髙論到羲軒絶憐父子為知己時把文章得細論箇裏是非何足較乍賢乍佞一王尊一本此首後尚有一首云觸暑相過憶去年汝南又得見先賢向来喬木今亡矣秪有靈光尚巋然賸記暮年專一壑想聞髙咏和流泉兩公直諒渾相似其末一句缺載不可攷今附注于此喜雨次甄雲卿監簿韻四郊苖槁勃然興頓覺歡聲滿郡城行且刈雲成嵗事敢因喜雨記亭名昔如魚在釡中活今見龍從地上行憂國願豐同此樂讀君佳句欲風生又次徐仲宗通判韻老龍破蟄斬幽闗亂滴天飄不復慳可但甘霖驅旱魃自然凉氣滿人寰民心徒切焦熬甚神力毎勞指顧間遥想清都應表賀紫宸軒陛曉催班又次鄭性之縣尉韻槁項疲農病夏畦喜聞烟雨四天垂旋尋秔稻供糜粥驚見新香玉滿匙閔雨才寛又畏風從朝愁到夕陽舂誰教官到二千石不學當年邴曼容幾番好雨應先占欣見堦庭綠草纎秋後陰晴猶未定更看新月卧磨鎌爰居集魯要先知飛雪侵春乆已疑慚愧風師幸安静敢将虎口闘龍癡游隱清簿領叢中偷得閒輕輿相與出鄉闗亂流先已登孤嶼采蕨還来上北山藤遶龜身増贔屭水涵虹影照孱顔老農擁道迎人笑今日使君来破慳瀑泉奔放石坡陀回首清游嵗幾何脚力不知前日健詩盟還喜故人多滕王閣上無韓子逺景樓中欠老坡不謂鄙言成宿䜟偶因晚泣得波波窮冬吏鞅解紛纒重入兹山憶少年千里幸同豐嵗樂三生曽結郡人緣幾番山色望空外今日水聲來耳邊坐上何湏聼絲竹與君嘯詠和風前富覧亭城郭占佳勝眼髙貞白鼉霜天開浩蕩雲屋涌嵯峨四靣山總好東窻江最多脚跟盤巨石吞吐任風波贈陳居靖道人溈汭道人身御風棄家求静慕僊蹤僊都有石立天半特立要當如此峯雪中簡林景思劉振之驟寒忽變雪花飛抱膝長吟况可知襥被可能來過我忍寒相與話新詩謝林景思和韻黄昏門外六花飛困倚胡牀醉不知凍合玉樓猶强項擁衾方詠雪巢詩送趙子固吏部帥合肥少年文價重神京游宦還聞政有聲南省但推韓吏部北方猶問趙先生人傳殿上三千牘上喜胸中十萬兵暫輟望郎分帥閫淮南草木更知名老韓同傳我多慙意氣相傾自不凡憂患飽更俱白髪班行獨立見青山羡君真有虎頭相顧我方為馬口銜同舍幾何俄話别可堪目力送風帆襟帶長淮地望崇勲名當繼古英雄吳人止解依濡塢晋將才能過八公可但綏懐邊境静直湏經畧朔庭空折衝不必居遐徼頗牧尤當在禁中曲竹放出一頭地出墻梢更新傍人為稱屈素志肯求伸苦節變甘節曲身成直身青霄看直上莫忘手援人寄題汪端明墳菴真如軒山藏佳處竹藏廬見説離家百里餘已矣空求真學士傷哉閒殺老尚書後生自恨登門晚壯嵗寜忘跪履初悵望九京郡可作此心徒切慕相如萬箇篔簹一草廬傷心埋壁十年餘革聲誰聼尚書履金榜空懸少保書無復遺音追正始尚傳新作過黄初真成一代風流盡歎息浮生信六如題汪季路太傅所藏龍眠陽闗圖離觴别泪為君傾行李匆匆欲問程不用陽闗尋舊曲圖中端有斷腸聲畫出陽闗古别離蕭疎桞質不勝悲行人顧歎離人泣桞下漁翁總不知題陳簡齋寄夫人書行書滿紙遺君丈可見閨門敬若賔應與少丈能協趣定因元亮遂忘貧題韓氏所藏元祐選尚詔草禁臠當年選尚初難兄辭寵意何如裕陵遺㫖知難改元祐湛㤙信有餘今日猶存卯君筆向来誰造粉昆書韓門世寳宜無墜史有遺文尚取諸秋日懐國仲觀四明聳秀一溪流曽記經行十里秋行李今從何處住宦游自笑幾時休兒時故舊今誰在老去光陰不借留贏得東歸訪邱壑約君同上釣魚舟客省聼燕樂曉入金門拜紫宸門前錯立士如雲未容宻侍君王晏秪許鈞天隔殿聞次李季章監簿韻跪履巽巗今幾年見君風度喜跫然長編固已翻青簡老墨猶能寳漆烟游宦自欣天影近思家猶在夕陽邊時從甥館追清賞賸寫新詩繼謫僊賀雪八盤嶺上作平時卧雪似袁安誰肯凌晨犯苦寒百辟班中因族賀八盤嶺上得遥看層層觀闕瓊樓聳納納乾坤玉宇寛悵望僊山何處是欲從此地徑驂鸞送林子方吏部將漕江東光堯三紀煥文章寳閣岧嶤謹祕藏寓直到君才第四皇華禮樂逺増光望郎三度到長安垂上青雲作好官暫向江東一澄按却歸徑著侍臣冠自説嵇康七不堪上教持節向江南江南父老應相賀見説清明似晦菴殿廬官燭對風簾郎舍修篁共一簷别日苦多良晤少掺袪不耐雨纎纎子方移守四明見于浙江亭春初送别欠詩篇嵗晚還欣受一廛都騎始聞臨浙水先聲乆已讋鄞川里人見説俱延頸海嶠從今定息肩夜夜故山頻入夢為君端欲買歸船寄題蜀李氏義槩堂君亮著作之祖養氣非為侠輕財弗市恩仁聲髙月旦義槩徹天閽稱美推賢嗣揚名有順孫活人幾百萬何止駟容門送衛清叔著作提舉淮東漢庭早已冠羣僊闊歩登瀛最少年竊歎豈惟年叵及人門才業總翹然通㤗牢盆亘海濵宅家專欲用儒臣淮南草木生顔色又見龍頭第一人虎榜先登到鳯池前良多以十年期雖知勇退急流去壯嵗功名㑹及時羡君持節拜庭闈未老雙親看綵衣若過葢公煩問信坐曹日念舊游稀外府舊為敕局衛乃葢侍郎壻屢從樽酒接從容叔寳風姿照座中他日相逢年益老棊壇尚可角雌雄送黄景聲秘丞提舉浙西江夏無雙第一人清明乆矣動簪紳心平氣勁無偏黨好在皇朝作争臣宅家親擢得真才柏府蘭堂更外臺未問遄驅向溝壑半途應有詔書催從来軒冕一毫輕朝蹟初收去玉京打破畫瓶無個事不妨游戲繡衣行論詩纔了便談禪鄙吝氷消更豁然稽首心空先及第敢將癸未論同年玉節光華照日曦揚清激濁正當時阿連幸出百僚底正恐翁歸不受私雪中迎駕都人乆不望威顔驚喜鳴鞘風雪間萬井歡聲迎曉仗九天和氣下人寰龍樓笑啟瑶池晏鵷序欣趨玉笋班道上峰頭皆見日絶勝銜燭照崑山題尤延之給事所藏葛僊翁徙居圖莫言家具少于車藥褁衣囊自有餘老婦親携三稚子僊翁獨玩一篇書羊牛相與趨新築雞犬無因戀故廬到處山頭有丹井不知如此幾遷居又題楊妃上馬圖金鞍欲上故徐徐想見華清被寵初後日延秋門下路不應有暇作踟蹰題老融歸牛圖薄宦六年辭故山故山秪在夢魂間簪紳何苦自纒縛却羡歸牛自在間天竺禱晴早奉天香禱白衣遲明宿霧故凄迷忽驚紅日穿林薄無數碧山明澗溪上竺寺連中竺寺蘇公堤映白公堤湖光一碧幾千頃賸捲荷香送馬蹄具美堂明光殿裏早催班亭午天街從駕還已聼歡聲傳市井更看喜氣滿湖山聨鑣逺去閒尋勝爛醉歸來夜叩闗但願兩宫千萬夀退公時得過雲間水月園具美盃殘意未休相将重上望湖樓樓臺忽已居平地風月何曾識舊游更挈酒樽過水月坐増詩興滿滄洲春風共約新橋畔遥拜雙龍萬斛舟三月九日從駕昨日為親夀今朝從駕行君親俱有喜家國共増榮淑氣浮黄屋歡聲動玉京人心真易感翻手作昇平湖山次袁起巗安撫韻同年紫陌再尋春力主斯盟頼尹京山外斜陽湖外雪夜來陰靄曉来晴平波灔灔新添緑凍木欣欣欲向榮此日此身清潔甚軟紅何苦太忙生攻媿集巻八欽定四庫全書攻媿集巻九宋樓鑰撰今體詩試俞珣長頭筆倦逰俞老入中州霜兔抽毫飽盛秋平日相親管城子結交今得賈長頭訪留昭文于范村山間不得見黄扉處士掩松闗小立松風去住難可歎山中真宰相未容神武挂衣冠送倪正甫侍郎出使經帷親見犯天顔口伐何勞抗可汗故國應悲周黍稷遺黎猶識漢衣冠殊鄰諜報終難測累嵗要盟恐易寒馳至京城上方畧始知頗牧在金鑾送王仲言添倅海陵二首萬卷詩書老雪谿頎然二子和塤箎絶憐伯氏久亡矣猶幸夫君及見之來上鵷行人未晚往舒驥足自嫌遲他時還向雲門否布韈青鞋尚可期遂初陳迹遽凄凉擊歎青箱極薦揚談笑于儂情易厚典刑使我意差强重屏舊畫論中主古殿遺文話阿章舊事從今向誰得尺書時許到淮鄉寄題延平范氏六桂堂髙門儒效許誰同秀氣于今照演峯家學一椿連五桂地靈兩劒化雙龍三人衣鉢清名接累世簪纓慶事重彼茁孫枝更林立不須萬戸羨侯封京仲逺尚書為澹然子作二大字濃墨新題付澹然松坡為子老談天憑君推我行年㸔何日歸耕綿上田送李伯和吏部題舉浙東伯珍寺丞將漕夔門奕奕君家好弟兄皇華交映棣華明幾年並列金閨彦同日俱持玉節行萬里往臨夔子國一江先到越王城㑹聞歸取青氈舊都似當年老貳卿送范文叔禮部守彭州憂國鬢先雪愛君心似丹旌麾雖自適懐抱未全寛直道任三黜故人憐一寒濛陽毋久駐旋復簉鵷鸞送趙徳老端明帥蜀身名俱泰老尚書叱馭寧辭萬里途兩地恩榮真赫奕四川父老定歡呼乖崖袍帶今重見清獻琴龜我更無頻向籌邉樓上望歸來方畧上新圖次盧國華提刑所寄韻持節歸來上粉圍秖今一節又何之樂天好句追長慶元亮髙風挹義熙我恨别多仍㑹少君雖去速豈來遲閩山荔子熏晴晝莫惜登臨賸賦詩古梅遺張時可枝封蒼蘚澹花疎一種風流髙更孤試問約齋三百樹林中還有此枝無李才翁賀除天官次韻九年奔走祇思閒歸夢時時墮故山已媿演綸詞禁上更堪曵履侍臣間官曹顧我空無補世事惟君了不闗但欲相從㳺物外不應久此玷清班我居銓部閙簪裾終羨寒牕只蠧魚每念故交今有幾況如盛徳豈容疎京塵共歎催人老市道誰知有隱居久苦筆端枯渴甚楚波正欲借君餘劉徳修右史去國示所和從父東谿及楊子直詩走筆次韻無人為辨樂羊書卻向空山問草廬世上榮枯無定在眼前毁譽竟何如寸心未徹九重上百口仍行萬里餘只恐君王思舊學便看飛詔促嚴徐東谿詩似老彌明傾葢論詩絶㸃塵筆墨為供無盡藏江湖乞得自由身出門逺送成惆悵無計相留更主臣但願皇天開老眼不應空谷滯斯人閣下相期久山中把酒稀未能容我去又復送君歸柱史寧終隱威顔暫咫違壯心誰與語看劍一燈㣲謝袁起巖侍郎送盆梔奉老母翠綃飛葢擁生香氷雪精神試晚妝鶴髪慈親俄一笑玉人何事晚升堂送曽南仲寺丞守永嘉六和久坐趣歸鞭卻送旌麾水竹邉無說可俾新令尹有時重送老同年城隅緑竹今安否庭下朱欒定儼然回首東州真夢境羨君此去若登仙過上虞懐謝驛喜雨夢回簷溜作驚湍浄洗炎敲百慮寛咫尺東山見膏澤令人更憶謝家安答杖錫平老老我平生不願餘歸來但欲賦閒居灌園自足供朝膳日奉夫人御版輿送尉海陵併寄示潚二子俱從宦重親足自怡汝能行㓜學吾豈恨輕離平日自知己眞心更與誰臨文有遺忘此是憶兒時處已幸寡過居官勿願餘動成經嵗别賸寄幾行書公退仍多學心清任索居但知行所職通塞聼何如次潘安叔寄新溪詩韻曽游明月舊雙谿老去情懐百不宜夢繞新谿身不到更休重和寄來詩送内弟汪强仲赴台州税官雕鞍去去不容攀柳下門牆輟往還可但征商私龍斷不妨拄頰看巾山右軍墨妙惟修禊太傅才髙亦抱闗咫尺親庭毋苦戀有人能作適齋閒少潛兄再立晝錦坊伯中弟有詩次韻東樓舊日史君家盛徳于今説孟嘉晝錦門牆再興起烏衣巷口倍輝華雖無崔氏聨三㦸肯學楊家簇五花尤喜桂枝香不斷藏書滿屋是生涯王原慶訴盤餐蕭然走筆次韻愁絶詩人太瘦生也無北食與南烹君看俚語亦堪笑何日能塡鼻下横莫嗜鰒魚如老曹但應菜飯學参寥坡翁晚節更清苦玉糝新羮手自調送趙振文主簿去去江西不作難片帆雙槳蕩秋瀾已知宦業非時様尤喜親情耐嵗寒志大自然羞附驥官卑何用歎棲鸞少卿膝上加文度更比年時刮眼看病足戲效樂天體課得退連茹藥逢新太醫居閒幸餘暇養病任多時歩屧雖非便調琴足自怡晚來風雨急髙卧到晨炊叔韶弟上連桂堂牓㑹羣從我家簪紱百餘年書種于今幸有傳折桂時能取黄牒肯堂賴子抱青氈一新扁牓照華屋共集樽罍招衆賢須信後生尤可畏要當爭著祖生鞭題林氏香巖庵緩歩尋佳處林深路欲迷偃松披數畝立竹漱三溪瀹茗憑山檻呼燈照石梯輕輿空翠濕投暝喜幽棲送汪强仲還官所又向丹丘去安書易往還固因官事了莫放舊書閒問訊雪巢老寄懐巾子山經行皆夢境自笑日蒼顔寄題吳紹古縣尉經徳堂問舍玉眞下讀書經徳中心期知共逺臭味許誰同吹笛夜凉月舞雩春暮風直須涵泳熟毋負象山翁送季舅汪江州大定二首清直如公天自知晚年百順了無虧九城臺下方還斾五老峯前又擁麾題坐喜逢陳仲舉據牀好繼庾元規太平散吏無由到倚聼中和樂職詩舅甥相與自垂髫㳺宦歸來鬢已凋坐上可無車武子酒酣時賴蓋寛饒喜公自此驅千騎顧我從今守一瓢閒與適齋同悵望草堂樽酒幸清朝送内弟汪耐翁隨侍因赴臨川推官之子長才盍要津未知此别幾經春且爲湓浦過庭子徑作臨川入幕賔生長外家身已老周旋中表意尤親從今家問須情實莫事虚文學外人環村踏雪一冬求雪雨還晴賸喜春朝見玉霙不為偶同佳客到誰能深入亂山行雲牕霧閣知何限玉樹瓊枝到處明更喚輕舟同穩泛小谿何似剡谿清荀輿衝雪過谿橋流水方東未晚潮白裏不知梅奪色青邉尤喜麥成苖烟深帶雨参差下空濶隨風自在飄可是忍寒請更切故求野路踏瓊瑶又次蔣甥仲愚韻山色空濛雪更竒滿空撃碎碧瑠璃寒侵茅屋春無寐凍合梅花夜不知泛泛輕舟勝路滑洋洋流水樂人飢興來但覺酒腸濶江海安能實滿巵送元積弟赴永嘉酒官宦遊五載住中川似與邦人有夙縁昔日江山知好在舊游人物想依然吾衰無復逢梅福子去惟應夢阿連或問故侯霜鬢未吾言潘令是齊年我家清白世相傳工部真清更有年百口未曽營活計一生惟喜種心田吾方奉母耕綿上子更移封向酒泉兄弟凋零期自勉只將家訓作青氈同王原慶知道游天童舊游曽記夢中身一日重來白髮新行盡杉松三十里看來樓閣幾由旬狎鷗亭外波瀾濶宿鷺池邉草木春自笑賦歸如許久始來此地作閒人東谷舊説東阿谷兹來到此山樹深烟冉冉花落雨潺潺有客禮師塔何人叩祖闗天連秋水逺此意尚人間千佛閣平横雲棟塞空虚倒影仍臨碧玉壺千佛威光歸寳所九霄宸藻粲河圖人天共歎未曽有燕雀相驚不敢踰試問南詢童子看化城曽見此樓無從子滌濯寒納凉楊栁陰陰映粉牆宻雲藏雨晚來凉髙荷欲出欄干上笑挹紅英吸浄香謁告歸省復還海陵吾子逺歸省重闈俱粲然難留毛義檄又送子眞仙西去仍千里東歸約二年詞場期自力收取舊青氈題少潛兄得閒亭下水吞空輕舟處處通閒情誰得似逸興更何窮詩社率相過醉鄉時一中我家原不逺只在小橋東平日君多暇如今我亦閒人歸真得地吏隱勝居山烟浪一千頃茅簷三四間天寒倚修竹空翠濕攲鬟送從子淵宰浦江誰云宦路足嶇嶔送子之官獨放心亷介有餘無矯亢謙㳟已甚自崇深安輿何用資三釡慶問時能扺萬金公退讀書三子侍縣齋松竹已成林慈溪道中雙櫓真成鵝鸛鳴客愁厭苦夢魂驚須臾寖覺耳根熱一覺醒來天已明題惠崇著色四時景物舊説惠崇眞畫師生綃四幅見天機鷺翻桃岸韶光嫵鵝浴蓮塘暑氣㣲風勁賔鴻霜始肅寒欺花鴉雪初飛分明知是丹青巻仍欲沙頭喚渡歸送吳參議褱才氣勇無前人推季子賢侯藩聨剖竹制幕晚依蓮勢利從身外風流到酒邉四明欣㑹遇兩載得周旋為記題名石仍吟達觀篇留行何及矣執别但茫然我已甘投老君方欲引年未知重見日目斷五湖船即事十日陰寒雪不成臘殘春近更霜晴深山髙卧如春暖遶鬢飛蚊自在鳴弔陳衛道墓平生學博更加詳和㑹三家儘較量一覺可憐成夢蝶多岐終是易亡羊門前修竹連岩桂道上芙蓉間海棠何似剗除閒草木青松一色蔭髙岡㳺大梅山梅仙岩為憶西京梅子眞人言羽化匪沈淪海瀕古墓已無迹山外髙風寧有神鯁論至今光漢傳清風猶足盪秋旻何須更說神仙事終老市門良可人虎冢辛勤玉柙更珠繻或見乂牙出骨須鷙獸一心能䕶法敝帷千載尚全軀餘威凛凛空埋骨遺像耽耽若負嵎及見當年梅子熟自應驚倒老妖狐謝潘端叔惠紅梅有序潘端叔惠紅梅一本全體皆江梅也香亦如之但色紅爾來自湖湘非他種比自此當稱為紅江梅以别之王文公蘇文忠石曼卿諸公有紅梅詩意其皆未見此種也感歎不足為賦二十絶舊家桃李種河陽今日紅梅自楚湘根墢送春君意重為移絶艶到吾鄉黄姑曽為㸃氷肌亦有緇塵染素衣何似臙脂天賜與暗香猶在是耶非為君手種向南牕誤認昌州移海棠元是玉妃生酒暈帳中仍帶返魂香前身施粉忌太白今日施朱恐太紅說似旁人剛不信清香萬斛在花中殿後鞓紅色漫穠絳桃空自笑春風何人擊碎珊瑚樹惱得瑶姬靣發紅舊見寒花蠟蔕紅寧知沁入雪膚中絶憐金谷佳人墜到地餘香散曉風梅花幾種盡相聞老矣才欣見此君相與對花文字飲絶勝歌舞醉紅裙人間丹桂亦㣲黄未見紅葩觧有香惟喜此花兼衆美麝臍薰徹絳紗囊初移湘水一枝春賸馥還欣為我分夢入山房三十樹何時醉倒看紅雲嵗晚紅英繞凍柯玉人無那醉顔酡廣平賦就如逢汝鐵石心腸可奈何少陵年後詠花開未見臙脂一抹腮可惜當時詩興動止因東閣看官梅坡翁著意賦三詩漫説濃香已透肌若見此花應絶倒惜君生晚不逢時花品無庸定等差國香國色屬吾家海棠正自慚粗俗莫問漫山桃李花不學江頭玉樹寒夀陽紅粉舊妝殘嬋娟可是慚隨俗莫作金沙鎖骨看客來試與倚䦨干拂拂清香觸鼻端儘教北人渾不識不應改作杏花看全體江梅臘裏芳紫綿新拂漢宮妝臨川借得江梅句傾國天教扺死香詩老為花空自忙想應未識此竒芳青枝緑葉何須辨桃杏安能如許香只説梅花似雪飛朱顔誰信暗香隨不須添上徐熙畫付與西湖别賦詩縞帬練帨玉為肌誰㸃㣲頳向北枝若是羅虬見顔色定須將此比紅兒自昔梅花雪作團紅梅晚出可人看江梅不觧追時好秖守氷姿度嵗寒山行行入春山紫翠中入山深處更桃紅一百五日麥秋冷二十四番花信風千頃揺青幾蔽地四山聳翠欲浮空野橋横跨溪如練待買輕舟下釣筒金蹄金蹄垂耳小韓盧飾以重環馴可呼誰繫冬青碧陰下恍然如見撃桐圖次吳伯華韻一身遇坎復乘流景物當前亦自由淺草人行回作徑水來沙聚看成洲哦詩首為鉤棘句適意即是逍遥遊爛醉不知門外事夕陽日日下西頭從子渢送梅枝戲作向來地暖見東嘉帶葉江梅殿嵗華不似青春三月暮南枝梅子北枝花菁江迓客菁江十里路透遲兩岸平疇接翠㣲贏得閒中乘畫舫隨潮西上趁潮歸午睡聼雨老年樂事莫如閒午睡醒來夢已䦨枕上欠伸猶懶起更聼簷外雨珊珊放鶴送潘㳟叔司理沖霄六翮困蓬蒿清唳時時發九臯鵠立固應能獨出雞羣未免嘆徒勞相投顧我憐氷玉欲去知君刷羽毛幸脫樊籠隨所適平平飛去不須髙宿育王山涵秋清秋來此尚涵秋雨後山泉自在流夜暗聲寒鏘玉珮燈明清影粲珠旒枕流正自憐孫楚洗耳何須訪許由我亦暫來專一壑倚欄耽玩不知休長女淯歸夫家寄以小詩胡笳未了遽成歸婦職如何敢失期彈到佳聲重入塞伯喈未免念文姬太湖響石何處飛來一叚雲太湖風急到江城雲中疑有羣仙過時聼丁東環珮聲送朱季公倅嚴陵朱家族裔甲龍舒循吏清名史特書正為嗇夫思所部至今廟食盛鄉閭舍人曽賦嚴公瀨季子方題仲舉輿但向棠陰増蔽芾桐鄉今卻在桐廬以十月桃雜松竹寘缾中照以鏡屏用潚韻中有桃源天地寛杳然溪照武陵寒莫言洞府無由入試向桃花背後看次周益公韻有序某比從朱南劒獲拜覩丞相益公送行末章齒及舅甥姓氏既又得盡見詩刻文潞公同甲㑹之盛世所共聞公與王錢三府名丙午坊尤為竒事今歐葛二賢士以布衣交五載與齊年之集夀樂未央髙風厚誼古未有也舅氏尚書既已屬和命某同賦課成五首以謝厚意天將間氣孕山川名世還當五百年已是有官居鼎鼐不妨平地作神仙書林尚欲校三豕筆力猶能驅兩肩前日勲名身既退斯文留與後人傳六一先生葛稚川兩孫俱并相君年詞場鏖戰今成夢潭府齊盟望若仙政路三公舊同甲洛陽四老信差肩坊名丙午真竒事寫入詩編盍並傳頃嘗假守向中川公在黄扉已數年毎念夔龍容接武自期雞犬亦登仙入朝終嘆一交臂問道幾思偏袒肩數仞宮牆天様逺此心何日遂親傳别駕歸來自贛川相迎方歎别經年為言相國珠璣語寄問洞庭山澤仙妙句聳觀親盥手滿城爭玩日駢肩退憐母子方偕隱卻恐虚名似此傳舅甥相與老鄞川況值慈親九十年畫舫時追唐賀監筍輿聨訪漢梅仙官名自媿偶同轍才望如何敢並肩誤辱品題稱酷似此聲梁楚更堪傳題施武子所藏老融二牛圖佳哉淡墨掃人牛一笛横風各自由平日深知焉用稼如今但欲老西疇烏犍離立意逶遲鞭䇿俱忘取次歸騃犢跳風仍卻顧老融于此露天機謝少㣲兄惠牡丹乍觀泉石分新種想為黟山憶舊葩病後不妨風韻在此花之外更無花方翦欄干第四花玉人聨袂過吾家捻紅玉翼皆名品醉眼相看到月斜簫鼓聲中醉九旬落紅萬㸃正愁人眼明忽見傾城色更向尊前作好春戲和詩卷琴奕心偏好丹鉛手自磨衰翁㑹同社吾子楫餘波歌動玉條脱酒傾金叵羅好為文字飲行樂未宜多山色藍初染湖光鏡始磨竹梢輕墜雨花片亂隨波麈尾揮東晋龍舟弔汨羅莫愁春易老暢飲一春多澄江如練浄新月似鎌磨老栁飄輕絮良苖颭細波歌聲追古郢詩價怯新羅到處還成醉芳醪㫖且多暮年甘散誕壯志久消磨自媿今摩詰誰憐老伏波清新慚庾信敏慧謝甘羅惟有詩情在猶能益辨多過從子澤家楚楚初篁脱緑苞城居約畧似荒郊土膏更得春風力直引薔薇上竹梢題陸放翁詩卷沙畫初驚渴驥奔新詩熟讀歎㣲言四明知我豈相屬一水思君誰與論茶竈筆牀懐甫里青鞋布韈想雲門何當一棹訪深雪夜語同傾老瓦盆送内弟汪莊仲赴浙西倉幕家食八經秋兹焉喜宦遊徃依王仲寳況事薛居州寄信憑鴻羽題詩寄虎丘飛雲親舍近時望海東頭贈龍游術士胡杲方笑劉郎問大鈞從來禍福本無門世間生老病死苦時至即行何足論夜坐晚來徐歩出柴扃萬變浮雲在窈冥濃似鐵山擎缺月薄于春絮透疎星正欣夜久沈天籟尤喜空明鬰帝青雨氣未平龍欲動電光前後射中庭再送潘㳟叔我似冥鴻弋猶慕君如放鶴去還歸我空今日眞成去好伴閒雲自在飛以六經左氏傳莊子遺伯中弟有詩來謝次韻手披欲究百家編奴婢年來識鄭𤣥顧我幸多千巻蓄念君未有一經全詩書心醉不容醒父子筆耕期有年此但古人糟粕爾更須從此悟眞筌書種傳來直到今讀書幾似孝標淫欲君終就九經庫與子平分一片心更向漆園窮妙㫖何殊清廟奏遺音中郎書籍付王粲想得知余此意深中秋無月凉意秋將半深期月影清昨霄雲㸃綴今夜雨縱横睡久何曽著更闌喜暫晴起來聊曠望終欠十分明贈丁相士相形何似且論心眼力工夫見淺深古怪清竒任君説靈臺一片若為尋送叔韶弟赴官錢清蕞爾錢清鎮兹行正為貧九夷猶可處十室豈無人官守無卑小城居緩卜鄰老夫平日事所至若終身净明方丈雲深宿雨未忺晴短艇還來叩曉扃山溜擁溪侵石磴天風吹霧暗空庭茵鋪野草滋新緑玉立脩篁洗舊青老我時時假僧榻夢魂直向醉中醒新闢門徑或謂太窄門外頓空曠雙眸豁太虚誰歟列佳樹正爾對吾廬蚤嵗曽修業衰年得定居買鄰賢伯仲衣錦舊門閭未辨三間屋先栽數席蔬歡娛戲萊服晨夕奉潘輿駟馬容雖狹齋郎任有餘牀金知己盡瓶粟豈無殊細草沿堦嫩新篁得雨初竊希仁者静未覺故人疏晝永翻名畫更長理舊書何妨抱琴醉儘好帶經鋤耋穉同甘苦兒孫共卷舒眼花多掩巻鬢雪不堪梳少飲無求醉徐行可當車此生千萬足秖願老樵漁小溪道中簇簇蒼山隱夕暉遥看野雁著行歸久之不動方知是一撘碎雲寒不飛後衕環村儘遡㳺鳳山寺下換輕舟舟人努力雙篙急引得清溪逆岸流送從子淵葬晨起霜如雪天寒水欲氷引舟拖急瀨扶杖立危層北阮苦多事二疏俄喪明山阿埋白璧悲慟不能勝早起戲作枕穩衾温夢乍回閒居不怕漏聲催天明更欲從容睡長被孫兒惱覺來午睡戲作早起三朝當一工老來貪睡不相同偶然一次五更起卻用重眠到日中攻媿集巻九欽定四庫全書攻媿集巻十宋樓鑰撰今體詩南山廣莫軒廣莫垂風隘九州亂山無數㸃平疇一千里外在吾目三十年來無此游地下天高俱歴歴鳶飛魚躍兩悠悠昌黎費盡南山句曠遠還能似此不送趙至道節推君來入幕恰三年我幸投閒識此賢婉畫時時因事見素風凛凛信家傳易林律本君須寄月天根語是圓問訊難兄無恙否相忘千里各瀛壖湖亭觀競渡涵虛歌舞擁邦君兩兩龍舟來往頻閏月風光三月景二分煙水八分人錦標贏得千人笑畫鼓敲殘一半春薄暮游船分㪚去尚餘簫鼓繞湖濱龍潭方丈又因寒食此中來牕戸虛明絶㸃埃山裏春風無間斷海棠開過棣棠開弔僅老塔僅老相從五十期來瞻遺塔我心悲當時舊話無人説空有門前洗鉢池夜攜家登南渡橋幾過長橋下清宵得意行風高江水急月上海潮生空迥寒逾峭更深境過清扁舟難久駐轉柂問歸程題夢月上人送鴻小樓雨洗春山空翠新登樓不見送鴻人薜蘿清夜月依舊無復新詩泣鬼神贈于湖劉相士自笑今年卦氣闌壯心銷盡鬢毛殘明知七十無多子只問何時可掛冠五月望月蝕歴家又言六月朔日蝕閭巷夜爭呼相傳救望舒偶因風暫破真似月之初孰謂蟇能瞎端知歴不疎太陽交蝕近試看更何如題賀監李謫仙二像不有風流賀季真更誰能識謫仙人金龜換酒今何在相對畫圖如有神斗酒澆詩動百篇鑑湖牛渚兩俱仙早知今日猶相對不向稽山囘酒船病後戲作河魚腹疾未全除一飯充飢不願餘縱有珍羞難下飭真成頓頓食黄魚枕上不守庚申不坐禪老來觸事總悠然天明門外無來客儘好蕭蕭聽雨眠謝蔣行之送菊秋老懷情儘自寛眼前只欠菊花團分來三徑雙株秀先得重陽兩日看玉輭金輕無限態風高露冷不勝寒幽人相對成清伴正爾落英供夕餐廳事落成老母置酒喜而成詩數椽増葺苟全時我愛吾廬喜得歸兒輩粗能勤父蠱老天無不費心機年來每愧踰初望病裏尤知悟昨非從此蕭然無一事但當日舞老萊衣十月十七日夜蟄蟲坯戸六經旬掣電驚雷若暮春震起昆蟲千百億不知何處更容身織錦棊盤錦城巧女費心機織就一枰如許齊彷彿囘文仍具體縱横方罫若分畦爛柯未易供仙奕畫紙何須倩老妻如欲拈棊輕且稱當求白象與烏犀叔韶弟以退堂洪老詩來寄謝不受人天供甘心樂隱居空窮千里目笑擁一樓書攻媿老無用退堂閒有餘相望可杭葦何日訪吾廬寄題正卿通判可高亭樟坡直上可高亭未見高高秪見名想像豈能勝一覽登臨安得快雙明大龍湫下聽雷吼白石岩頭看日生咫尺好山隨杖屨自應老筆擅詩聲中秋次從子涔韻雨餘不見日西沉將謂中秋又作隂佳月忽開千里影騷人滿慰一年心掃除塵翳風難動滓濊太清雲尚深坐待寒光誰㑹此阿咸為我發微吟楊花杜門無緒看芳菲見説楊花滿路飛謝汝不隨人冷暖因風翻舞到柴扉送趙南仲丞溧水不用怱怱恨别離版輿春晝綵衣隨往題斯立藍田壁更訪清真溧上詩公事毋庸犄牙角鄰封真是和塤箎日哦新句頻相寄明月清風慰所思戲題龍眠馬性圖狗子已知無佛性馬又何曽有性來伯樂若來休著眼任他騏驥混駑駘他山素蜺横臥作雷吼日射細鱗銀色光安得此身如白鷺翛然終日在梅梁過盡水禽竝野鳬風標惟許一春鉏可憐久立梅梁上不為谿光秖為魚小酌元衛弟聽雨小閣臨流暑氣清藕花的的照人明移牀更近欄邊坐要聽棊聲雜雨聲潚再往剡中念之尤切作詩寛之剡縣不為遠丞官勿謂卑鼓盆知愛重去國倍行遲堂上森三老房中秀一兒加餐了官事莫賦悼亡詩觀雲寄簡講師蒼狗哦然又白衣來從何處去何歸無心出岫還歸去莫向秋風説是非過故家團團桂樹擁簷牙舊日輕黄滿樹花惆悵秋清無一葉空餘枯枿縋寒𤓰題從子浹娛親阿戎築屋為娛親野草閒花日日新我奉版輿來舉酒祈君親壽似夫人丹桂碧雲步肇紫金㽔風靜秋高千萬枝嬌額塗黄元自好是誰深傅蜜臙脂下元日暖甚夜風雨大作早微雪從子潗以酴醿來眼明喜見早酴醿牕外風號集霰時梅蘂已慙前臘破芳心休用怨春遲納凉除夜昨㡬似見雪芭蕉今不疑若使洛人真得此應須更詫百宜枝送朱正守南劔舍人簪筆舊甘泉家學相傳子姓賢未羡夾河為太守阿連剖竹向封川檇李曽蜚剸劇聲貳車仍贊虎頭城朱轓小試承流手要繼桐鄉循吏名萬竹蟠山喉不乾兩龍潛水氣猶寒郡齋見説真圖畫公退何妨一倚欄下水上山腰帶州人家無數起危樓遨頭不用喧簫鼓秪把清詩紀勝游同盟東下或西征老我惟知管送迎秖恐政成登省戸未容歸騎向西城名畫法書知幾編捧銓寧復計求田摩挲賸買新文字歸滿米家書畫船送杓孫隨侍上虞阿斗生來十五年未曽一日去翁前聞詩勿廢家庭問習吏仍求城旦篇婚宦有涯真是幸巾箱所蓄要相傳榮罍雖小性非魯口授詩書加愛憐戲作二子為丞分越邑女兒隨壻過江南笑言屋裏成岑寂匹似當初只住庵諸塋拜掃晚歸長汀雨意早垂垂寒雲晚更低空中時散㸃道上不成泥緑栁桃相映黄花麥與齊紆囘餘百里喜見舊松隄送朱季公守封川韶陽生長十餘年城郭重經固宛然歎息紫薇仙去久尚餘遺墨照山川先舍人居韶十四年季公生于壬戌桐鄉漢有大司農封守今推陳秀公君向邦人著遺愛近追相業遠家風陳秀公曽守封川有遺愛鄉評久説鴈行賢剖竹封川與劒川不用對牀風雨約政成問取舊青氈吾鄉棊社寖凋零賴有朱家好弟兄舉酒看看故人少陽闗莫唱斷腸聲妙舞清歌有二姝後堂曽見繡羅􅃭嶺南太守風流勝不用歸舟載緑珠以玉蘭贈王習甫一種香蘭玉色新仙家分得蘂宫春調高韻勝誰能稱付與能言解語人華屋翬飛慶事緜芝蘭玉樹喜庭前似聞楚畹芽初茁便看藍田生晚煙送趙清臣宰姚江玉立君家好弟兄藍田風采照花城版輿壽母人間盛千里何曽去送迎鄞江水與舜江通久矣威名滿一同試問何時到封部數聲柔櫓一帆風長江東去跨虹橋千丈横隄捍海潮更向燭谿圖永利坐令百里沸歌謠才刃恢恢妙撥煩鄰封撫字尚何難更能觸事加長慮自有甘棠向後看歸家故步懶重尋藏拙年來恐不勝短棹有時乗興去徑登竹所聽鳴琴楊花雨壓輕寒春較遲春深不見栁綿飛忽然飛入閒庭院疑是故人何處歸栁綿無數糝枝頭日暖隨風撲畫樓萬象可觀惟有雪喜看晴晝滿空游為我輕攀緑栁枝帶花低護笑攜歸日長深院微風動要看鬆綿當面飛野芳庭草是生涯老去秖宜閒在家幾日惜春留不住小鬟為我拾楊花送王伯奮守筠陽三槐名德萃清門七葉為州賴有君道院無忘山谷賦郡齋當繼頴濱文君應膝上鄰文度我向東牀憶右軍振起家聲差易耳便看奏最躡青雲别王恭叔兩兒雖近隔江潮賴有王郎慰寂寥遠侍雙親官道院為同盡室餞西橋腦脂遮眼最闗念客路尋仙勿憚遙别後飛緘問安否數來谷口訪山樵别長女涓老我年來百念輕文姬助我以琴鳴等閒相對成三弄游戲俱彈似一聲舉酒不堪千里别登途知用幾程行郡齋自是神仙窟㑹有堦庭玉樹生趙資政園梅篆小徑囘環里許長寒梅森列間疎篁路如古繭縈繆篆身似輕烟繚印香九折坂中經蜀險八盤嶺上趁朝忙歸來游戲通幽處笑看危途幾太行示從子東院敲棋西院琴固知猶勝别勞心少年不比老癡叔且向書牕惜寸隂贈畫梅吕生西湖處士賦疎影未似希貞好樂章豈是無情甘澹泊受他風月幾凄凉潚自剡州寄水晶蒲萄馬乳從他堆滿盤未如清嚼水晶寒固知一縣蒲萄熟不用勞人數問安送汪莊仲赴江東倉幕彊仲荆門簽判不見適齋老于今三四秋弟兄登宦路親黨駐行舟老病無詩思衰懷重别愁外家門戸盛勉力紹箕裘外氏䝉恩厚文昌獨我知居慚酷似舅喜有寧馨兒遇事行方便禔身謹護持公餘定多暇黄巻有餘師早嵗過秋浦貪程不入闗君今參儉幕時得上齊山膚使資闗決賢俁伴宴閒好音頻寄我藉此一開顔之子游何許平州更玉州山川稱勝絶幕府信風流翠巘寒逾秀金蓮夜不收天涯念鄉國少上仲宣樓見説荆門地如門蔽楚荆舊時為内郡今日號邊城但守平平䇿毋求赫赫名勉哉闗決際從此振家聲送元積弟赴淮東總屬南徐來往飽經過總餉賓寮入禮羅子去幸陪鄒湛輩君今還是伯休那金閨通籍時方可鐵甕名城景最多我有淨名遺記在試從萬井訪維摩十人兄弟五人存心事方欣得細論可但衰遲憐遠别只因喜懼有慈尊倚門何止期吾子發䇿還知望好孫從此三年風雨夜寂寥棊局與清樽陳君舉既亡汪文子攜其所作春秋後傳及送行詩來次韻名盛望有備枝披實亦繁無由究賢業猶幸立斯言書在經逾顯人亡道更尊九京如可作與子共南轅送趙伯藏倅永嘉當代投閒老吏師佳兒官業具而微已煩潘令宰花縣正要王祥康海圻得助江山詩興逸平分風月羽觴揮安車何日迎清獻又向堂前戲綵衣分教分符恰五年異鄉每若故鄉然歸來幾作池塘夢送别欲隨騶御仙目斷甘林應飽熟手栽欒實想芳鮮邦人若問老州牧為説清霜繞鬢邊晝寢彈徹悲風更廣陵滄浪一為濯塵纓邯鄲枕上夢初覺喜聽簷間風雨聲喚仙閣上到危層莫喚仙纔凭横檻挹江天江天如許來供眼何用王喬更偓佺多少尋仙更不還𣺌茫竟墮有無間使其真有毋庸喚仙自層城我自山犯暑來登覽松風為洒然龍泉登古井虹影臥中川萬簇寒林秀四山秋色鮮詩翁不可見況敢喚飛仙送趙敏之丞彭澤淮甸歸來涉學深孤雲又出亦何心公餘巖下讀書去遠繼風流石橘林淵明事晉肯臣劉仁傑忠良不附周見説三賢參羽士尉斯光盍將吳簿配蘋羞南唐吳舉為彭澤主簿有高節見六一集陶令居官八十日始為督郵方賦歸君家門戸要興起未用飄然詠式微阿虞試晬戲作阿虞匍匐晬盤中事事都拏要學翁最是傳家清白處不將雙手向頑銅贈别盧甥申之歸吳門千里何妨命駕遲晤言未厭已西馳子休重賦瓊瑰贈我亦懶歌親戚離好向清江論樂府更從葉子説新詩樂閒引紙五十尺為篆離騷繼李斯又謝申之示詩巻不見賢甥十一年新詩示我百餘篇古風已喜能行意近體尤欣細屬聨宅相真成珠在側冷官休歎坐無氈作詩勿謂今餘事更下功夫繼玉川送秦仲防通判清德曽瞻啓慶碑孫曽清更畏人知秖縁一介弗輕取坐使斯民不忍欺瀨水家傳御書卦宣城手寫送行詩典型尚繼金鑾舊馬氏一門誰白眉題輿再到海東涯嗜學深于入幕時一字未通終不置五行俱下尚嫌遲情親端有卜鄰意别後空勞望月思老我無因可重見祝君來此擁旌麾謝剡中沈元龍惠詩東陽何事到東州百語曾無一語酬深羡松筠無敗葉自言蒲栁已先秋千金既覺成虛擲雙璧還驚又暗投别後未知何日見但將吾道付滄洲謝舒景叔寫照見贈誰寫衰容入畫圖本來面目舊形模幾年老瘦鬢如雪不道今吾非故吾庭前一蓮著花門外荷蓮浥露華緑雲平地擁秋霞病夫不耐出門去且看庭前第一花淯月下鼓琴用韻老穉團欒鯉在庭文姬為鼓玉琴聲起來同作悲風曲倍覺先秋月影清國仲觀遷居尹隩訪别晚年未定一枝巢到處葢頭無把茅又欲浮家過尹隩何殊樂道向莘郊君今去此難招隱老更從誰可定交見説衡門臨野水秋深容我去推敲仲觀有詩來謝次韻危機屢見劔頭炊喜及挂冠神武時從此含藏三寸舌算來插得幾張匙讀書牕下頻勤習攻媿庵中老住持速辦小舟頻往返及今精力未全衰謝王粹中惠白鶴山麟川觀斑竹杖竝竹輿麟川仙館翠琅玕荷子攜來白鶴山未效葛坡龍種化絶勝湘浦淚痕斑裁為柱杖一尋許巧作乗輿四尺慳兒子門生俱努力病夫欲過虎谿還曽無逸即中名燕居曰和三續社有詩次韻欲和㑹三家以續雙林通地通天秖箇中千岐雖别大都同兩家偶爾流傳盛一貫臨之内外融欲境掃開心在我浮雲散盡月當空感而通者後來語不感須知自有通老來老來何以度光隂秖有圍棋與鼓琴棊為心勞疎對局琴因臂弱倦調音曲肱時復同尼父面壁何妨學少林氣習未除秖自笑又還弄筆動微吟長生草玻璃擢葉玉蟠根千里提攜寄海濱雨澤不霑仍自潤土膏無著自長春嵗寒秀色鎮衣舊日暖素英能一新我欲餌之求久視恐君靈已不靈人謝黄汝濟教授惠建茶竝惠山泉幾年不泛浙西船每憶林間訪惠泉雅好誰如廣文老親攜直到病夫前細傾瓊液清如舊更瀹雲芽味始全或問此為真病否其中自有石如拳史子仁碧沚相家本有四明山更葺桃源𣺌莽間四面樓臺相映發一川烟水自彎環中川累石勢嵯峩城上遙岑聳翠螺舊説夕陽無限好此中最得夕陽多題趙晞遠二畫藻飜數尾已如生妙絶魚兒作隊行不是深知濠上趣未應筆底得縱横魚扇牕前驚見一枝斜照眼英英十數花千載簡齋僊去後何人更著好詩誇墨梅送陳表道倅岳陽垂上青雲去如何乗貳車輕為千里别時寄幾行書剸劇才無滯傳家學有餘當塗足知己應不費吹嘘聞説巴陵好樓高占古城湖光千頃白山色一螺明赤壁沈沙㦸蒼烟老樹精好詩收拾下寄我慰離情元珍弟酌别賦此贈之歸來十暑又三霜衰病那知謁帝傍採菊初期老陶令種桃應是笑劉郎不辭白首登鼇禁正欲青衫及鴈行今夕團欒同醉後未知何日駕歸航靈芝寺送客靈芝寺憑欄山有無自從朝北闕始得見西湖烟外移輕槳波間浴野鳬清寒不可駐囘首又神都閭丘醫視脈曰老人之脈如小春有感老去光隂似小春如何比得少年人君看桃李秋風後縱有花開不是真貢闈對硯盤發歎老去未忘黄與朱琢成三硯樂閒居豈能更作諸生業但欲頻看後世書視草北門才已盡持衡南省計尤疎便須再挂衣冠去約汝同歸故草廬次韻李孟遠使君與林雪巢子季武詩古梅巨石瞰清池觴詠曽陪老啓期别我遂成千古恨傳家空有一篇詩使君尚爾悲陳迹處士惜非同此時若使南樓預清賞胡牀應奉庾元規玉堂早起早起多奔走旬休亦往還偶因二士試始得一朝閒靈鵲花枝上金魚荇蔕間素餐終有媿只憶舊家山贈徐松我為浮名媿引年老餘八十尚飄然不如合卻談天口歸向白雲深處眠經筵講詩徹章進詩聖主承丕祚于今嵗幾遷昭回光飾物剛健位乗乾善治新更化當陽獨攬權誅鉏及共鯀擢任列閎顛曩日方謀始宸心最急先未遑親政理首務闗經筵恭儉甘卑室尊嚴拱細旃書居勤已甚坐侍禮無前講徹詩三百時逢運半千諸儒深誦説六義極摩研俯閱毛公傳旁參鄭氏箋慨尋中古意重是素王編舊本三千首終存十二篇雖遭煨燼厄三賴詠歌全開迹因農事安民在井田成功時邁酌興業大明緜東國思平賦南山樂得賢艱難由后稷勞來美周宣起自紹熙載迨兹嘉定年闗雎從肇彼殷武遂終焉寵數傳中旨恩光被邇聨神文期繼踵元祐信齊肩内廄頒雲騎雕鞌絢錦韉茗分龍焙品香拂御爐烟衆俊咸宣力孤生亦備員少時曽學詠老去未忘筌納禄誠休矣歸耕久晏然鋒車俄促召梓里謂登僊詞禁容揮翰天官命典銓豈知侵暮境重得侍甘泉朽質何能報孱軀殆欲捐尚思求譎諫海嶽效塵涓題天竺珪老復菴路從天竺更微南衲子邀余過復菴八法照人瞻睿藻一峯當戸擁晴嵐竒文初動玩羲畫萬物竝觀師老耼六用不成均此理楞嚴容我為同參為倪正甫尚書題壯懷堂扁以詩來謝次韻久矣君宜任弼諧果隨驛召上天階幾年不作相逢夢一日俄傾積别懷情厚夫君幾鮑叔愚如老我類高柴他時戸冊高懸後直欲扁舟訪水涯攻媿集巻十欽定四庫全書攻媿集卷十一宋樓鑰撰今體詩送趙德老觀文東歸趣還宗老侍經筵宿望訏謨信偉然引疾屢煩頒漢制賦歸先已買吳船去年趨召叨同傳今日求閒媿著鞭未得相隨出闗去羡公徒御若登仙往還不過酒三行成敗同觀棊一枰東海敢言成二老西湖自足度餘生朅來便覺廢兹事歸去定須尋舊盟錦里錦坊秋色裏夢魂先已到江城送倪正甫尚書守南徐君如春栁我如松晚嵗重逢意逾通日日公餘搜理窟時時史暇樂談叢友朋罕有心相照兄弟惟應姓不同此别未知何日見摻袪無語對西風滿腔忠膜與嘉謨空洞他無一物餘有語莫非憂國志欲行猶上薦賢書已欣勇退成清節更喜高眠即故廬廊廟須公經濟手不應歛惠向南徐幾囘去國向吳興出處雖高事不平茲以優恩臨北固不妨禁直寓西清羡君決去行何速媿我求歸計未成淛水東西又千里壯懷堂上未忘情戲題十四弦十四朱弦欲動時泛商流羽看瑤姬弦疏不隔如花面聲急還同墮馬兒谿蟹霜餘縈密網簷蛛雨後理輕絲曲終勸客杯無算一吐空喉醉不知樞密新府平生苦欲住山間每恨家居不傍山游倦怱來參宥密公餘卻得對孱顔援琴萬壑自同響緩步一丘猶可攀信美終非吾久處乞身惟待老鄉闗門號簽書府心存攻媿齋倚欄臨曲沼拄杖看懸崖槁葉鳴輕雨殘山擁半階退公成吏隱足以暢幽懷大雪趙振文寄詩言乗月泛舟清甚次韻老我心知筆力衰頗欣臘雪瑞清時三茅竒觀亦難遇白玉峯頭燈萬枝萬玉真妃搖珮琚梁園授簡屬相如莫嫌一水限吳越兩岸交輝合太虛雪光絶勝水銀銀未覺仙家隔一塵真境宜君著佳句賞心樂事更良辰見説中宵泛綵舟何人同賞大江流陽冰伯雪應為伴更約襌人白道猷舊聞老具擅詩聲夜泛錢塘向鳯城今日清游更豪逸雪花和月帶潮生法具字圓復紹興初詩僧也有月夜游錢塘江詩云小舟為我載月白色沙翠竹光相射自從李白下金陵四百年無此豪逸酒邊戲作未年六十已言歸七十重來自覺癡未報君恩歸未許樽前羞聽摸魚兒葉處士畫貂蟬喜神見惠重煩妙手費丹鉛貎出衰容信宛然君看頭顱已如許豈堪頭上著貂蟬頃游龍井得一聨王伯齊同兒輩遊因足成之路入風篁上翠微老龍蟠井四山圍水真緑淨不可唾一作水從何來不知處魚若空行無所依勝處雖多終莫及舊游誰在事皆非秖今匏繫何由到徒羡聨鑣帶月歸海潮圖錢塘佳月照青霄壯觀仍看半夜潮每恨形容無健筆誰知收拾在生綃蕩搖直恐三山没咫尺真成萬里遙金闕岧嶢天尺五海王自合日來朝題施武子所藏醉白堂記有序醉白堂記相臺舊刻已不多見施武子得太清樓所藏真蹟一代竒寳也魏王尚友香山坡翁詞翰兩絶晝錦故居昔嘗以假吏過其門巷恨不一到其處太清圖書流傳至此撫巻無非可歎者事至今日歎又不足為之慟哭可也堂名醉白尚存不詞翰輝光射兩眸天下曾除蘇氏學禁中卻有太清樓舊碑于世已難見真蹟惟君乃得收感歎不堪衰淚落林慮山下水空流魏王以相州城中無水于林慮山引水入城貫第中溢為灌溉之利謝雷季仲樞密惠社餅寵分餅巻荷深情割肉烹鮮不厭精潭府始知嚴社祭衰門又得詫侯鯖洗杯用薦逡巡酒下箸如餐骨董羮囘首枌榆未能去欲隨秋燕問歸程婁彦發參政八月二十一日壽詩有序某伏承生申之旦正得秋而萬寳成真是一年好處中秋佳月浙江大潮皆每嵗所有芙蓉菊桂俱不復重陳今則實惟巖壑所誇一百省嵗之時況值合宫大禮儲君受冊前星誕育昴宿凝祥相去只五十間賓僚惟公為舊學都省後堂祝壽之儀久不講此公首當之今又以慶朝按試鼓吹嚴警場輒成唐律發樽前一粲青宫冊寶盛朝章王佩珠旒照日光儲寀久資三善得生朝相去半旬强五千餘巻學尤富一百省年身更康都省先曽同舉酒貢闈最喜又傳觴易逢皓齒令歌曲難值嚴更聽警場慶事方來真可卜祝公黄髪相虞唐題孫谷橋墦間圖墦間不足又之他猶自施施驕室家齊國一人如許爾寧知後日事如麻因知義利本殊途莫笑墦間乞祭徒正使往來多顯者此中尤要著工夫肆赦小雨時章達之樞密在麗正樓上禮畢戲謂余曰君雖長未免雨立歸途成小詩端門宣赦樂欣然膏澤還應降九天始覺耳邊鳴槭槭漸看笏上溜涓涓我班金闕闌干側君侍玉皇香案前雨立固知同陛楯一言猶幸賴優旃題桃源王少卿占山亭納納乾坤一草亭西山盡見若秋屏霜餘遠水呈天碧雨過遙空現帝青逸叟真成陶令隱高懷長似屈原醒肯堂固賴賢孫子精爽猶疑尚有靈題汪季路侍郎所藏吳道子天龍八部妙絶天龍八部圖細看真不失錙銖聲名自足高千古題品尤難遇二蘇旌斾冕旒猶可想鬼神人物亦何殊君看坐位蘭亭草費盡工夫學得無二蘇謂子美子瞻也謝顔樂閒篆離騷樂閒下筆素推高攻媿耽書老更饕顧我好看秦小篆煩君為作楚離騷晚年應悟成竵扁痛飲猶堪寫鬱陶喜劇但知嵗十襲瓊瑤無以報投桃題徐聖可知縣所藏楊補之二畫誰種疎梅古岸頭推篷瞥見倍清幽君看竹外一枝好真有江南萬斛愁梅花屢見筆如神松竹寧知更逼真百卉千華皆面友嵗寒秖見此三人嵩岳圖有序先祖太師齊國公元符中知河南府登封縣建炎兵燬先集故物煨燼無遺兒時猶及見揚州伯父藏嵩山圖丹青僅存雖傳録廿四峯詩以生晚既不逮事不知有石刻也張致遠為京西僚屬寄登封舊碑得之驚喜唐律為謝先世前蹤不可追君從何處得全碑上横嵩岳三千