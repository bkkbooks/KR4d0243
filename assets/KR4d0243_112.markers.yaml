首事皆非令人王氏表兄陳左史之室輓詞嫁早仍知孝夫賢自不貧事姑如事母憂物勝憂身鳳誥恩榮渥鳩桑德意均孺哀聲不絶淚柏不成春宦達方資助家肥忽悼亡一區終異室千載尚高岡奉倩神猶慘安仁鬢欲蒼黄昏愁絶處誰伴紫微郎冝人楊氏鄭華文之室輓詞里閈依楊氏年家託鄭門升堂從壮嵗擇壻得賢孫婦德儀中壼陰功燕後昆尤憐吾女子流涕説慈尊夢入枌榆社心遊氷竹灣匄歸期拜壽近侍望承顔一昨聞微恙寧知竟大還佳城無路到夫婦淚俱澘陳夫人輓詞族姓甲休陽夫人懿範彰奇男已南省快壻更東牀珍錫人加嘆佳城神所藏平生陰德在餘慶尚難量雅有幽閒操來嬪清白家相夫全禮敬見子致清華方享承軒樂俄興陟屺嗟誰將彤史紀大筆為雄誇碩人居氏蔡尚書之室輓詞頃侍尚書坐曾聞閫助賢晤言成勇退裏謁戒私專夢斷松江路神傷薤露篇悼亡千里淚疊嶂想新阡葬于平江王夫人周子及之室輓詞閫内誰無助夫人事特明傾囊資色養勉學就清名遯世期高節辭風歎落英丁寧猶在耳伉儷若為情荆國風流遠幽閨女教循鴒原驚逝水鶴髮倍沾巾厚夜招香魄英詞列翠珉秖愁書字拙貽笑衛夫人王夫人陳少南之室輓詞淑質依名士身期百不憂藁砧家萬里蓬首日三秋陶母傳遺業嵇孤託舊遊幽原誦詩傳無媿柏為舟王夷仲夫人輓詞彤史無人續誰能識壼儀蘋蘩奉先祖詩禮付佳兒未見魚軒樂俄興鸞鏡悲藁砧方得路腸斷悼亡詩盛夫人輓詞婉嫕閨中秀清高林下風相夫能盡禮教子使移忠邊郡官無曠都城養得終壼儀今具在流慶復何窮恭人胡氏陳奉直千能之室輓詞懿行表閨房情親共衋傷繡衣來宅相彤管著銘章劉提舉誠之為作銘蘋澗誰供祀藁砧空悼亡芝蘭俱秀發所恨失元方先喪其長子冝人聞人氏趙婺州之室輓詞四郡歌賢牧魚軒從隼旟深閨無裏謁色養謹安輿故里稱家法諸郎讀父書美哉彤史筆三誦為欷歔冝人史氏輓詞閥閱冠三朝尊公兩珥貂夫賢能盡禮家貴肯期驕教子門風振澄神性地超悼亡無可憾直筆付孫樵安人鄭氏輓詞勤儉佐家肥猶齊舉案眉錦封俱被寵鸞鑑可勝悲謝砌森羣玉郄林先一枝木華文雋麗銘德粲堂碑木詹事為銘孺人錢氏丞相之女適曹氏輓詞家世㦸如林來嬪藹德音功容俱可度疾疹遽相侵已矣空蘋澗誰歟助藁砧佳兒隨玉折尤切悼亡心孺人林氏盧彦德之室輓詞家世甘泉舊幽閨有令名賢明教陶侃勤苦佐淵明蘋澗今何處鳩桑空復情誰知悼亡意揮涕望佳城孺人曾氏葉寺正之室輓詞婉嫕應眉壽天胡弗與齡情深孫楚詠淚盡女拏銘蘋藻空南澗芝蘭有謝庭越山埋璧處秋雨濕銘旌信國夫人秦氏林子長之母輓詞夫人富貴出懷綳擇配和鳴得仲卿鸞誥早能封大國魚軒不及伴雙旌肥家得法晚無倦教子登科新有聲歎息南谿未成屋鳳凰山下啟佳城茅夫人鄭貴虛之母輓詞清心玉映許誰同更有飄飄林下風政爾高清協宗老故冝嘉遯樂龎公遠謀蚤識身為重晚境還知性亦空已擬張林碑婦德合歸彤史巨編中孺人陳氏輓詞追憶宫端舊典刑三真況復是難兄豈惟門户生光彩直使朝廷列姓名煙海乘桴誰可奪天風反火報尤明雖云弟娣相從去自有英靈凛若生太碩人潘氏葉尚書翥之母輓詞玉暎清心著壼儀閨房賔敬到齊眉豈惟山水協高趣宗少文每遊山水往輙忘歸妻羅氏亦有高情與少文協趣更為國家生好兒太宗賜張文定齊賢母詔曰婆婆有福生得好兒為國家分憂萬口共推諸福備八旬猶負一年期伯仁冬日應腸斷不見堂前舉酒時攻媿集卷十四欽定四庫全書攻媿集卷十五宋樓鑰撰表牋請舉樂皇帝第一表春秋重改元法葢先於五始君子不為樂古無越于三年請為王言冀同樂樂中謝恭惟皇帝陛下系隆列聖娯侍三宫綿宇屬心既極謳歌之戴重華盡孝適氶遏密之餘顧烈祖之報厚且重焉然文孫之制期已久矣况復高廟即安於神御壽皇俯和於祥琴下逮都人悉除樂禁新王春而建號進寳冊以歸尊願飭攸司各揚乃職鏘八音而應律肅萬舞以充庭仰奉重親益見慈顔之喜下孚衆聽普臻和氣之祥擬第二表睿主承休光啓太平之運王正肇始益新治世之音爰伸百辟之誠未動九重之聴洊陳奏牘進冐宸旒中謝恭惟皇帝陛下仰紹心傳率循家法念徳壽詒謀之重體重華盡孝之勤既居崇高富貴之尊未聞文采節奏之美聲音不足於耳豈為始哉禮樂不可去身有為貴者雖聖帝尚深於餘慕而理經尤務於適中莫先鳯厯之頒宜上龍樓之奏豈止君臣相悦第成徴角之詩將與天地同流益致形聲之應至尊壽皇聖帝第一表高蹈萬乘聿重恊帝之華躬行三年曲盡慕親之孝矧將陳於冊寳盍備舉於樂章爰率具寮仰于淵聽中謝恭惟至尊壽皇聖帝陛下怡神于淡游物之初惟付託之得人宜燕頤而養性方且羮牆在念疏素以居既已光舜禹之傳乃親為曾閔之行期可已矣必欲加隆祥而廓然尚云寧戚顧平時不好世俗之樂豈今日忍聞堂上之歌然而和琴俯就于成聲鑽燧再經于改火不應慈極尚遏諧音伏望酌先王制禮之中念聖子承顔之養居處笑語寖寛追逺之思鐘鼓筦絃益致導和之美第二表三年執禮已經徙月之期五日受朝當備鈞天之奏援彛章而有請閟俞㫖而未頒事恐久稽義須再瀆中謝竊以帝舜既命大禹猶欲六律五聲之聞漢皇上壽未央亦以萬嵗大笑為樂葢已膺天下之養盍具舉朝廷之儀若稽舊章允屬盛際恭惟至尊壽皇聖帝陛下道高物表徳邁古先既全與子之明尤盡因心之孝謂太宗就簡遽為三十六日之期而晉武欲為莫起數百餘年之陋出於獨斷高掩前聞羣臣仰體夫聖心薦嵗忍形於奏牘迨兹即吉乃敢發端既已遏音于三載之餘正當成歌於十月之後況卜元正之吉將新徽號之隆儻非廣奏于和聲何以崇成于縟典恭聞南内將騰聽樂之章欽想東朝亦望承顔之樂仰祈睿㫖俯徇輿情擬第三表洊貢封章祈舉九成之奏未承誥命敢稽三請之勤中謝恭惟至尊壽皇聖帝陛下高視帝尊共為子道自畢因山之奉己合外除靡從越紼之權竟全終制逺復先王之法肯循後世之常迨其今兮何以尚此至矣盡矣願聞大舜之韶皦如繹如當語太師之樂雖欲勿用其將何辭濟濟尋賢傾聽笙鏞之間欣欣百姓嘉聆管籥之音擬壽聖皇太后牋三載遏音已全于中制兩朝就養當備于和聲中謝恭惟壽聖皇太后殿下徳竝娀莘行齊任姒佐中興之業協濟艱難贊内禪之明共安閒燕比驚慈扆忽返帝鄉乃安長樂之居密受重華之養神孫御歴寳冊陳儀豈應迎年而不為樂琴瑟之友鐘鼓之樂諒未忘儷極之思羽籥之器綴兆之文願俯徇輿之情賀正旦皇帝表嵗必履端葢重四時之首年初建號有光二帝之傳矧慶事之鼎來效羣臣之善頌中賀恭惟皇帝陛下乾剛行健離照繼明正月之吉始和春祺既集四海之内咸仰王化方行當周家布政之時迺漢歴改元之日嘉瞻萬乘上寳冊于三宫肅領千官奉玉巵于前殿借備琚瑀珩璜之飾創聞鐘鼓管籥之音益知嗣徳之在初孰謂太平之無象開八荒之壽域登庻俗于春臺臣猥預周行欣逢榖旦方千里者九想同望于堯雲呼萬嵗者三敢競伸於虎拜至尊壽皇聖帝表嵗之朝日之朝方肇新于鳯歴尊之至養之至爰啓慶於龍樓歡動宫闈澤均海宇中賀恭惟至尊壽皇聖帝陛下位居慈極仁冐羣生一道心傳六通四闢于帝王之徳三登化洽上際下蟠于天地之間乃釋萬幾之繁坐受九重之養惟時上日尤異常年聖子改元著遵制揚功之意昕朝奉冊見歸美報上之誠八音克諧四方來賀豈特履端之可慶誠為曠古之未聞臣等恪謹鳧趨伏深鼇抃顧方訪道於崆峒之上正當儲神于蠖濩之中何止八千春以大椿而為久敢祝三萬嵗願慈母而亦然賀三宫受冊皇帝表乘翠鳯之車講盛儀於元日鏤白玉之牒上徽稱於重親愛事既成綿區交賀中賀恭惟皇帝陛下與天同大如日方中克寛克仁允恊成湯之徳惟精惟一密承虞舜之傳爰奉三宫之歡以埀萬世之則討論故實備極嵩高視慈福之鴻名皆有願聖人壽之祝侈重華之顯號尤彰為天子父之尊當遲日之載陽喜積隂之頓解雨師風伯既已肅清乾端坤倪為之呈露雲移天㐲首趨漢殿之朝星拱玉皇親下堯階之故歡聲相和叶氣橫流惟天人順應之甚明知社稷靈長之可卜臣等幸縁際㑹獲奉周旋快覩聖時允屬紹興之始願龍孝治一如貞觀之初壽聖皇太后牋涓嗣嵗之端辰上丕天之大號神孫具禮親來翠蹕之朝聖子承顔同受雕珉之冊中賀恭惟壽聖皇太后殿下行齊任姒徳邁娀萃蚤輔中興之功載裨内禪之䇿由長秋而登長樂安榮已見于無加自紹興而至紹熙戩穀益知其未艾惟壽居五福之首而聖乃羣倫之先永年常奉夫母儀今日尤嚴于福后禮容甚盛鼓舞惟均臣等獻嵗云初趨班惟謹得少廣之道本無迹之可名居東朝之尊祈後天而難老壽成皇后牋萬乘來朝當夏時之上日三宫受冊列文母之丕稱覆載兩間歡呼四起中賀恭惟壽成皇后殿下謙恭素禀柔懿内充奉慈極之天顔曲盡問安之禮佐壽皇之内治克全燕翼之謀禮既備于尊崇心益安于沖淡共都顯號爰歸父母之尊仰嗣徽音尤侈婦姑之盛俱以壽康而嚮用何勞警戒以相成臣等欣際休期獲觀縟典詠思齊之什維周匹休安長樂之居與宋無極皇后牋羽葢翟車陪六飛之法駕瑶編寳刻上三殿之隆名既備盛儀式昭内助中賀恭惟皇后殿下處心淵静迪徳懿恭五日受朝常謹問安之奉九重視膳每言佐餕之勤迨兹榖旦之禮成想見長秋之喜倍尚須浹日嗣舉從容堯舜相傳禹方循于一道姜任在上似宜續于徽音臣肅領廷紳預觀國典展宫中之賀諒無異于外朝奏堂下之音爰助成于和氣賀皇后受冊皇帝表九重渙號實遵慈扆之謨萬乘臨軒爰受中宫之冊肆稽故實備著禮容竊以地本法天方著順成之徳月惟遡日遂參久照之明況居大寳之尊盍正内朝之助天作之合王假有家中賀恭惟皇帝陛下道貫三才愛均四海親承付託之重允資輔佐之賢若時元妃作配龍潛之際儷我宸極有開熊夢之占誕布玉音進登椒掖贊侍膳問安之孝盡求賢審官之思臣等恪領廷紳預聞國典乾坤定矣式符羲畫之文鐘鼓樂之願繼周南之詠至尊壽皇聖帝表神器有傳俾正椒房之號縟儀告備肆頒寳冊之嚴化浹綿區慶歸慈扆中賀恭惟至尊壽皇聖帝陛下徳叅覆載道極範圍堯治民以治民有光前烈天與子則與子啓佑後人乃當命禹之初首眷嬪虞之舊用修隂教以正人倫鳳蹕来朝副以翟車之盛龍樓問寢加之褘服之華臣等依附末光相成鉅典仰遵睿訓見正家正國之規鞏固皇圖知卜世卜年之久壽聖皇太后牋神孫御極蚤正于長秋天仗充庭用揚于顯冊事關宗社歡動宫闈中賀恭惟壽聖皇太后殿下氣毓沖和性資淵靜化行南國正萬世之彛倫尊處東朝受兩宫之孝養屬涓榖旦首上隆名既先慈福之儀旋講穆清之禮含飴示愛見寶厯之親傳佐餕得人想慈顔之有喜臣等駿奔在列鼇抃惟均家法相承咸仰徽音之嗣母儀有則益觀王化之基壽成皇后牋坤柔而剛既參内禪之策婦聽而婉俾正中闈之儀中賀恭惟壽成皇后殿下遡日為明與天同大贊至尊之孝治一紀于兹安長樂之宴居萬年有永謹二南之正始備四德以相承懿典告成慈幃胥恱侈家國非常之慶實社稷無疆之休臣等獲際昌明不勝鼓舞友琴瑟而樂鐘鼓莫先儷極之賢本夫婦而始后妃兹實齊家之要皇后牋褕翟褘衣久正内廷之禮金寶玊冊式全昭代之儀慶衍宗祊歡同宫掖中賀恭惟皇后殿下肅雍成禮柔靜資生蚤開墜燕之祥允協維熊之夢躬儉節用致君子之家肥順色承顔化天下以婦道爰自御圖之始允資儷極之賢禀命慈皇蕆儀榖旦是謂人倫之至益彰女則之嚴臣等目覩彌文欣逢盛際闗雎麟趾既已先正始之基周姜太任當無媿思齊之聖謝賜春衣表春日載陽肆頒于命服上恩難報仰謝于皇扃列辟同辭闔門受賜中謝恭惟皇帝陛下業隆潤色道廣帡幪大舜之埀衣裳蔑以加此神禹之美黼冕吾無間然迺俯念于廷臣仍舉行于時令爰賁以帛俾華其躬視爵秩而有差被寵榮而如一臣敢不退揣其分思稱所䝉慕召南在位之風期厲羔羊之節效齊國老人之語請遺天下之衣賀㑹慶節表紹興三年以左氏攝西掖侍班扈從有㫖百官詣重華宫拜表牋時禮部郎已在北宫候迎駕左相留公請就殿廬中作今附於此虹渚發祥爰紀生啇之旦龍樓啓慶敢伸戴舜之誠中賀恭惟至尊壽皇聖帝陛下游物之初怡神于淡六通四闢于帝王之徳聿成盛治之勲上際下蟠于天地之間罔匪春和之氣徧寰區而䝉福與太極以同功禮奉玉巵逺循漢殿之制書陳金鑑何待唐臣之言臣等肅領鵷行恭舒虎拜祝南山之萬壽睿算無疆效嵩岳之三呼歡聲旁洽攻媿集巻十五欽定四庫全書攻媿集巻十六宋樓鑰撰表牋謝温州到任表起家為郡俄及成時便道之官已共侯度戴睿恩而甚厚宣徳意以具孚中謝伏念臣一介書生累朝世禄當聖主飛龍之始偶玷末科簉明時振鷺之班每安平進久預憲章之筆削屢叅史牒之編摩嘗佐治于徧州復勾稽于列寺天府式邦財之重司宗書帝系之繁比終素韠之期忽冐朱轓之寄惟此東甌之勝實為左浙之雄頃任冷官兹叨假守山川如故風俗粗諳雖無竹馬之迎頓起蒲鞭之望以前日待諸生之意加惠斯民于此邦揚泮水之波廣為膏澤要令上下俱無所茍且庻幾田里寖銷於歎愁兹葢伏遇皇帝陛下深軫黎元敷求長吏謂臣洊登王國必能𢎞惻怛之仁念臣四對天顔固無俟丁寧之運是以左符分畀不待朝叅嚴㫖趣行免加臨遣幸遂飬親之志實勤戀闕之私臣敢不律己奉公平心待物惟忠惟孝誓堅始終之誠濟猛濟寛務勉中和之政謝中書舍人表史筆屢書深漸無補綸闈久假遽命為真嘗控避而弗俞竟周章而就列中謝伏念臣受才譾薄涉世闊疎偶承累葉之儒科寖預清朝之官使往分郡寄何有民庸當壽皇御極之時曽四登于文陛逮聖主臨朝之治遂三入于脩門首汙郎省之聫旋備賢闗之式貨泉出納粗謹攸司寳牒纂修伏尋故步晉班左墄攝事西垣記注非工有媿螭㘭之直詞章至陋殆為鳯閣之羞矧執愚之不移或遇事而輙發妨賢已甚忤物且多方喜具之交懐恐顛躋之未免力求引退敢覬襃升才思欲枯安得湧泉之敏身章増煥更貽濡味之譏茲葢伏遇皇帝陛下翕受羣言旁招俊乂謂臣粗親小伎故使當訓誥之司察臣素廪樸忠或可效涓埃之助攷于詳試有此誤恩臣敢不思稱所䝉益共乃位言惟作命少裨雷風鼓舞之神忠以事君當謹朝夕論思之職謝壽皇聖帝表柱史充員久虞幽黜詞臣掌制遽忝超除揣陋質以無堪望慈宸而知幸中謝伏念臣頃叨末第已出異恩再玷周行惟自安于平進仰承清問嘗屢貢夫愚忠出分海嶠之符入就星曹之列聖作明述親見盛時年除嵗遷寖塵清貫書言書動慙無載筆之功如絲如綸徒積代庖之媿將以外庸而自詭乃叨親擢以為真退省僥逾益増戰慄兹葢伏遇至尊壽皇聖帝陛下逹源繫表探賾古初齊聖廣淵居域中之有大危微精一為天下而得人式詒燕翼之謀茲見儲才之效肆令么䯢猥預論思臣敢不深念遭逢誓堅操守仰戴兩朝之眷敢務茍容願殫千慮之愚以伸忠報謝給事中表充員詞掖久懼罔功進職瑣闈忽驚誤渥辱訓辭之甚寵揣分量以奚堪中謝竊惟封駁之司實關出納之要詔敕之布咸仰君相所為有唐則許塗竄而奏還本朝則令詳酌其可否宜求人望以贊政經豈伊妄庸乃與詮擇伏念臣迂愚自信執滯不通秉筆螭㘭固有切于良史演綸鳯閣曽何取于陳言屬兼直于禁林幸親逢夫興運書詔填委靡容晷刻之淹號令流行欲助風雷之迅僅無乏事安敢辭勞荷簡記于宸衷俾驟膺于夕拜不改北門之舊族仍東觀之華加賁身章増光從橐茲葢伏遇皇帝陛下勵精初政埀意羣才用舍之間初無適莫論奏或至不吝改更知臣備歴險夷麤有愛君之志謂臣素懐憃直願殫論事之忠遂致孤蹤亦叨隆委臣敢不俯思㓜學務勉後圖親年益高但有歸耕之意主恩未報尚希批勅之風謝權吏部尚書表充員瑣闥自顧罔功攝長銓衡忽䝉誤寵仰皇慈之至渥揣微分以何堪中謝竊以選部持衡夙號六卿之長文昌聽履實為八座之聫非素推公方不足以柅吏姦非妙有徳望不足以壓輿論雖黃散之下無忝異同而搢紳之流鮮不關繫宜求精敏之彦以當要劇之司伏臣才不逮人學徒泥古一為支郡三入脩門門久待上皇愧愚忠之無補親逢嗣聖荷襃擢之有加代言非録贄之工批勅謝李藩之噐俯徇芻蕘之論屢寛鈇鉞之誅去省眼者五年遂躐登于冢宰離班心者一載遽首列于後臣禁林兼内制之文史館涉信書之筆滿盈已甚控避莫囘頒御府之襲衣益之鞶帶駕天閑之良馬覆以雕鞌但喜悦親之私敢云稽古之效茲葢伏遇皇帝陛下多能天縱盛徳日新蒐舉異才踵登持槖之先優容棄物獨負吹竽之慙宜黜而遷以榮為懼臣敢不深思僥冒勉竭疲庸為山公啓事之書知非所及守崔亮停年之格何足言勞尚幾典選之平少助官人之道謝兼侍讀表升班文部方虞典選之難進讀露門更辱兼官之寵循牆莫避據蒺是憂中謝竊以帝王之興必以學問為急如懐素元量之選本為覧史之資由宋綬夏竦以來始有讀書之職仰惟睿聖光紹炎圖首開講帷詳延從槖攷邇英之舊加賜坐以甚優于共膳之餘俾侍言而更入首閲三朝之寳訓次觀先正之奏篇宜求鴻博之儒以助緝熙之學如臣至陋涉世多艱豈期累嵗之推遷寖歴明時之華要詞垣翰苑代王者之敷言史觀經筵極書生之榮遇況從夕拜擢置天官朝入君門方被宸綸之渥暮歸私室又驚渙汗之頒是何遭逢有此僥冒茲葢伏遇皇帝陛下勵精庻政埀意多聞廣厦細旃許奉清閒之燕裒衣博帶不違咫尺之顔自古所稀于今獨盛猥令末至躐冠羣賢臣敢不紬繹舊章勉圖微效海涵天覆或容草芥之忠日往月來庻有毫釐之補謝顯謨閣直學士知婺州表典選無聞方上便親之請承流已試載叨出守之行寵躋延閣之班増賁輔藩之寄叨膺明命倍激危衝中謝伏念臣奪迹孤單逢時休盛昨自東嘉之収召尋登左省以推遷代言慙潤色之工封詔乏塗歸之效及夫紬書視草勸講掄材皆儒者之至榮豈生平之敢望饕誤恩而踰分致私室之挻災重貽慈母之憂益動故鄉之念力祈閒退仰頼矜從候邦分寳婺之區學士寓文謨之直繇常伯而出于故事或有此除攷公論之歸在小臣恐非所稱莫遂循牆之避徒深戀闕之誠茲葢恭遇皇帝陛下覆育羣生敷求長吏察臣昔當一郡拊摩麤竭于微勞念臣敭歴三朝進退欲全夫素守俾司乃牧俯便其私臣敢不欽服訓詞益思砥礪五百里曰甸不違咫尺之威二千石惟良少展涓埃之報謝中大夫表由選部以守藩方陳祠請因年勞而進秩更沐綸言祇拜以還感銘何極中謝㐲念臣生逢聖主世受國恩雖歴任累朝幸相繼百年之外而傳家三葉俱弗踰六品之階敢期後嗣之微乃越先朝之舊共承遺訓未知聞詩聞禮之言追仰前蹤徒有慙長慙卿之誚豈特一門之幸實為千載之逢茲葢伏遇皇帝陛下優待臣工仍嚴銓法三年攷績既容賞典之參一體疏榮爰示禁途之寵臣敢不激昻素守銜戴隆知漢議方興媿乏倪寛之對淮陽既逺敢忘汲黯之忠謝提舉江州太平興國宫表分共理之符敢起一麾之嘆廪祝釐之禄終俞三請之辭盡出上恩獲伸素志中謝伏念臣禀資至陋涉世最疎誤蒙三聖之知寖躐六官之長輟金華之講而為金華之守曲從外補之求由學士之稱而寓學士之班仍冒親除之渥已過家而上冢將叱馭以登途屬以母老易危暑行致疾羣醫俱試百口相驚亟上需章謂必嬰夫嚴譴首班温詔乃許緩于官期感泣之深憂惶實切率更旬浹又露忱衷特寛方命之誅竟允奉祠之願仰隆施之過厚誠近代之所無去魯行遲難效齊邦之接淅報劉日短幸容李密之陳情茲葢伏遇皇帝陛下仁本愛人孝先錫類凡加識拔舉無簪履之遺茍有懇祈俯詢芻蕘之切使退安于真館得娯侍于慈闈臣敢不銘著肺肝躬陳菽水況此塵勞之久少休疲曳之餘凱風自南獲遂奉親之樂衆星共北誓堅報主之心賀重明節表慶元元年述者明作者聖方兼偹于孝慈一曰壽二曰康宜大來于瑞慶兹逢誕節倍激忱衷中賀恭惟太上皇帝陛下玩道希夷儲神蠖濩尊居特室成三朝脱屣之高坐閲皇齡受萬嵗奉巵之飬功隆太極事越古初當今賓燕之時際此流虹之旦慶綿宗社歡動宫闈臣久玷從班適叨外補天街簇伏莫陪豹尾之中海嶠傾葵仰望龍樓之表賀瑞慶節表神筴紀元方懋繼承之烈流虹啟瑞載逢震夙之節凡屬照臨率均抃舞中賀恭惟皇帝陛下聰明冠古歴數在躬纂列聖之丕圖謹三宫之色飬色仰守成之美日聞典學之勤良月就盈爰輯大來之慶從天難老坐隆不抜之基臣竊食祠宫馳神天陛修菽水之敬既諧潁谷之私奉香火之縁敢效華封之祝謝再任宫觀表祠庭既廪其命維新敕牒臨門從天而下恍不知其何自凛欲受以猶驚仰惟異恩敢不祇拜中謝伏念臣才非適用學不知方幸逢熙洽之朝寖冒清華之選四載預論思之列無補毫釐平時于出處之間麤分尋尺始因請外亟畀輔邦旋以便親力求真館塵瀆葢高之聽俱䝉從欲之仁繼辱簡知再叨共理不圖出守乃復一麾來者猶可追惟闔門而退省觀其所以養敢謀食以自營重尋香火之縁盡出冕旒之眷惟廬阜棲真之勝自熙陵紀年而來竊祝釐之虚名得與釡之實惠喜同毛檄歡動萊衣茲葢伏遇皇帝陛下覆載無私照臨丕顯選搢紳之髦士咸與明掦念簪槖之舊臣未嘗終棄賦以斗升之奉増以儋石之儲臣敢不益體洪私誓堅晚節為子華之母而請粟寧待人言班周室之禄以代耕實銜君賜賀皇子降誕皇帝表天啓昌期方侈三宫之慶國生元嗣實隆億載之基温詔四馳驩聲一律中賀竊以本朝之傳列聖古所未聞長嫡之出中闈今方再見況五世高曽之上壽當三朝揖遜之盛時首開長發之祥益茂無疆之祉恭惟皇帝陛下仁霑動植德冒華戎堯帝聰明既親于九族周家忠厚宜見于百男爰稽熊夢之占允協燕禖之吉事關宗社喜浹穹祇臣頃玷從臣幸休真館拜丹陛之名表莫綴鴛班誦朝廷之徳音敢同鼇抃太上皇帝表尊居慈扆方均萬國之歡慶篤神孫益衍四朝之盛宫闈喜溢海宇恩深中賀竊以漢甘露中嘗有甲觀命名之愛唐開元際亦稱三日臨澡之儀曽未有視黄屋以非心見緑車之載育恭想天顔之悦咸欣帝系之昌恭惟尊號太上皇帝陛下道體純乾功參太極傳神器而與子為天下而得人仁聲素洽于編民福祚遂綿于世嫡克岐克嶷飴飴自適于聖情曰壽曰康戲愈愈隆于色飬臣曽從屬車之後遥瞻特室之嚴奏未央五日之朝阻陪下列效嵩岳三呼之祝徒罄微衷太皇太后牋慈尊無上方歌眉壽之隆慶系有傳及見耳孫之育古今創覩中外均歡中賀恭惟尊號太皇太后殿下化洽周南徳同坤厚翊中興之運母儀坐閲于三朝濬長發之祥帝統遹觀於五世備壽富康寧之福形覃訏岐嶷之歌仰推毓夏之原是啓生商之瑞臣叨塵禁路退奉祠庭春而秋秋而春孰計後天之算子又孫孫又子益延過歴之朝皇太后牋居壽慈之宫仰尊祖后歌震夙之雅誕育曽孫之志古之未聞亦本朝之初覩中賀恭惟尊號皇太后殿下徳先恭儉性本仁明親見堯舜禹之傳共循一道上有姜任姒之聖宜致百男果慶中闈遂生元子惟天心之眷佑成國勢之安疆臣祇奉真祠阻陪賀版本支百世方欣五世之同堂壽考萬年坐㸔卜年之過歴太上皇后牋思齊文母嫓慈極以俱尊於赫湯孫由中闈而載育仙源有自聖統其昌中賀恭惟尊號太上皇后殿下徳茂塗山禮隆渭涘上皇與子贊成脱屣之高聖主奉親倍喜含飴之樂當漢觀命名之始想唐宫臨澡之同四方流聞萬口交賀臣嘗叨持槖退獲奉祠移壽康之班莫預千官之末衍雲來之慶更綿百世之期皇后牋位正柔坤將行冊禮祥開洊震首行天材上承列聖之休益侈重闈之慶中賀恭惟皇后殿下世傳勲閥徳應帝姻帶弓韣于禖前允協燕祠之瑞設桑弧于門左果符熊夢之占三宫喜嫡長之昌萬乗啓元良之正稽前朝而嘗見在今日以増光臣退處衡門阻趨秘殿壽如山升如日願賡歸美之章衣之裳㺯之璋更献多男之祝賀重明節表慶元二年黃屋非心坐撫重臨之節玉巵為壽適臨載震之辰慶溢宫闈歡均海宇中賀恭惟尊號太上皇帝陛下仁心愛物徳澤在民天下為一家既全揖遜之盛域中有四大獨冠古今之尊明繼聖而帝業愈隆子生孫而宗支自衍咸啓華封之祝想聞漢殿之宜臣恪奉外祠遥瞻慈極嵩呼萬嵗莫陪就日之班花覆千官猶預需雲之宴賀瑞慶節表虹流電繞式符長發之祥地闢天開方際中興之運一人有慶萬壽無疆中賀恭惟皇上陛下受命皇穹紹休列聖問之朝問之野莫知神化之方作之君作之師獨得道原之大惟此就盈之月是為載夙之辰仰三宫燕吉之歡衍億世延洪祉臣叨陪法從得奉真祠帝所遥瞻敢作鈞天之夢廷紳布列想聞嵩岳之呼賀奉上夀聖夀仁太上皇帝聖安安夀仁太上皇皇太后聖安壽仁太上皇帝聖安壽仁太上皇后冊寳禮成皇帝表尊處九重莫先于孝治慶綿百世俱上夫隆名誠振古之未聞喜當今之獨盛中賀竊以加光佑惠慈之號既歸二后之尊崇聖安壽仁之稱仍謹雙親之奉縟儀具設綵仗交輝天地為之清明宗社于焉鞏固恭惟皇帝陛下日行舜徳思廣文聲謂此國必自齊家惟篤近乃能舉逺矧當旋乾轉坤之始克躬問安視膳之勤迺因萬國之歡用顯三宫之懿臣屏居東甬寓直西清澤笏彯纓雖阻陪于鳯蹕範金鏤玉徒念望于龍樓太上皇帝表備九重之色養祇奉慈仁得萬國之歡心載揚顯號皇儀具舉孝治彌光中賀竊以聖聖相承本朝為盛安安克遜三葉尤隆惟壽居五福之先惟仁在四端之首尊無與二固不可以易言蕩無能名要當舉其大者恭惟尊號太上皇帝陛下躬帝堯之盛篤仲尼之恭廣大之配乾坤宜享延洪之筭忠厚之及草木益昌積累之休仰睿聖之韙明極愛欽而盡道親奉範金之寳首披鏤玉之篇兼衆美以特書粲彌文而相接凡居覆幬罔不瞻依臣頃侍詞垣兹歸真館飾琚瑀珩璜之佩莫陪天仗之朝聞鐘鼓管籥之音尚想龍樓之曉太皇太后牋尊處東朝坐見魯孫之孝治禮嚴北闕載加文母之鴻稱大冊告成本朝増重中賀竊以壽先嚮用具著箕疇聖本思齊是歌周雅慈為三寳之首既以益隆福者百順之名又皆兼偹兹仰鋪張之盛彌功保佑之功恭惟尊號太皇太后殿下徳厚柔坤道參太極堯舜禹之相授贊睿㫁于宫中姜任姒之俱賢播徽音于宇内隆興而後四舉縟儀紹熙之間洊修盛事矧親提于神器付託得人宜首上夫瑶編祇承于帝歡傳有載燕及無疆臣嘗玷從班欣逢矌典宫闈再闢想聞天仗之來賀版羣趨莫預廷紳之後皇太后牋鏤白玉之牒上徽稱于慈尊建翠華之旗藏縟儀于聖代歡傳宫壺慶浹垓埏中賀恭惟尊號皇太后殿下徳嫓娀㜪聖齊任姒再世揖遜實參決于廟謨三宫康寧爰竝崇于色養惟神孫之盡孝仰祖后以承休取仲尼五美之言明老聃三寳之訓用形容夫懿範以昭著于彌文臣退處海瀕阻趨天闕瞻壽慈之新牓莫預班聫歌思齊之首章第勤頌禱太上皇后牋寳冊誕揚仰奉慈闈之懿徽稱備舉益増母道之光宗祉愈隆華夷交賀中賀恭惟尊號太上皇后殿下聖齊任姒徳嫓皇英方綿四方之休親受九州之養王母之坐少廣壽固無期騶虞之應召南仁不勝用仰嗣皇之盡孝極禮典以歸尊三殿交歡萬方同慶臣比叨荷槖兹獲奉祠引振鷺之班莫陪進旅而退旅粲琱珉之牒更聽大書而特書皇后牋三殿祲容俱上鴻名之懿一人孝治端由内助之勤凡屬照臨舉深抃蹈中賀恭惟皇后殿下慶綿奕世位處内朝隂教所覃有巻耳樛木之美柔儀克謹奉長樂未央之尊聿嚴揄翟之衣同上琱珉之冊邦彜有耀家法愈新臣頃玷禁途兹安海嶠側聞曠典但知獸舞之歡遥望昕朝莫遂鳧趨之願賀皇后受冊皇帝表廷提大冊克備于祲容位正中圍聿嚴于内治歡傳禁掖喜浹編民中賀竊以尊尊親親既極三宫之奉夫夫婦婦是為萬世之基頒制綍于嗣服之初飾褘衣于歴年之後禮文惟稱地道有光恭惟皇帝陛下徳本世修合由天作上未央之萬壽方陳漢殿之儀嗣太姒之徽音更篤周詩之慶巻耳之志當佐于君子思齊之聖以御于家邦朝夕永致其憂勤夙夜不忘于警戒于焉正始豈專為恩臣退奉真祠恭聞盛典漢之廣江之永遹觀美化之流行渭之涘洽之陽咸慶舊章之復見皇后牋陳儀楓陛具招丹冊之華正位椒塗光被褘揄之事事闗宗社歡動宫闈中賀恭惟皇后殿下慶襲安陽行高媯汭起家而居爵位蚤締天姻好逑而樂鼓鐘益彰后徳密輔九重之孝治仰承三后之徽音盛典告成内朝増耀臣祝釐惟謹竊粟自慚迹雖滯于周南化已行子漢域禁林草制曽䝉乙夜之觀從橐趨班阻預長秋之賀攻媿集巻十六欽定四庫全書攻媿集巻十七宋樓鑰撰表牋謝大中大夫表一身去國方叨祠廪以娯家四品頒綸乃次年勞而増秩素餐已甚丹悃知歸中謝㐲念臣少也數竒晚而多幸備皂衣之吏三朝許厠于周行聫紫橐之華四載得陪于從列踰涯自愧補外以行荷聖君從欲之仁賦真館祝釐之粟班通禁路尚汙文謨内閣之嚴法應吏銓遂躐秦官大夫之首寄禄寖高于世胄被恩得奉于親承視賈誼之超遷固非敢望比申公之即拜豈不懐慙兹葢伏遇皇帝陛下器使羣工曲成萬物念論思之舊侍未忍遐遺付品式于有司許容平進周章登受俯傴何言臣敢不祗服訓辭欽承命數老疾而無職事實深稱於閒居優游不易公卿特未知於報所賀重明節表慶元三年少暭司秋適届肅霜之候重明麗正欣逢繞電之辰慶浹三宫歡騰四海中賀恭惟尊號太上皇帝陛下道隆邃古澤潤生民引養引恬自得怡神之樂無倫無敵尤高與子之明福如日以正中年與天而同久千秋紀節固知黃屋之非心萬嵗爭呼又見玉巵之為壽自他有耀申錫無疆臣嘗侍宸旒兹游真館恭陳虎拜阻陪漢殿之儀遥思龍樓徒效華封之祝賀瑞慶節表斗樞電繞良月占載震之祥崖石天齊令名採中興之頌四方來賀百福具宜中賀恭惟皇帝陛下夙亶聰明躬行勤儉奉三宫之色養孝治日中得萬國之歡心休祥雲委當重熙而累洽能持盈而守成咸傾舊日之誠仰贊後天之􅈫臣頃陪鷺振親覩龍飛上萬年之觴夢徒游于帝所接千嵗之統心惟祝于皇齡慰壽聖太皇太后上仙皇帝表奉慈尊於四世孝治方隆傳遺誥于萬方哀號何極中慰恭以尊號太皇太后道高任姒徳邁娀㜪三朝居長樂之尊九秋享無疆之壽手提神器親授曾孫功成不居仙去何速恭惟皇帝陛下躬承慈訓圖報洪恩北面昕朝備四海九州之養東朝晏起懐千秋萬嵗之悲忍從五日之哀特用周期之服願少寛於聖抱期益慰夫親承太上皇帝表太皇厭代慈扆興哀覆幬所臨悲號何及中慰恭以尊號太皇太后道妙千古母儀四朝決内禪之訏謨功在社稷受曽孫之色養福等岡陵乃以微疴遽傳晏起恭惟尊號太上皇帝陛下仰遵遺訓祗服通喪願寛聖子之孝心勉徇先王之中制皇太后牋慈福上賓悲纒率土愛欽素著哀動重闈中慰恭惟尊號皇太后殿下夙奉太任親承大舜婦聽而婉實為内壼之觀喪致其哀莫贖終天之痛願遵禮制少抑孝思太上皇后牋壽聖升遐慈尊永慕恭承凶問均極悲悰中慰恭惟尊號太上皇后殿下寅奉重闈恪修隂教方日勤於孝養期仰嗣于徽音胡不萬年忽成千古在人情而難處冀聖念之少寛皇后牋光佑訃聞邇遐哀動驟失慈尊之䕃誤増悲慕之心中慰恭惟皇后殿下四世承顔累年逮事雞鳴問寢每勤禕翟之行鶴馭登仙遂有雲霄之隔願推至理少抑深衷謝再任宫觀表僻居海嶠推戴上恩洊畀祠官忽頒嚴㫖慙無報國之所喜便事親之私中謝伏念臣潦倒無堪遭逢過分奉身而去徑歸綿上之田畏影自憐更卧漳濱之疾當一喜一懼之交切何三仕三已之敢云幸遂投閒庻幾養志屬書再攷未免有言既徹九重亟䝉從欲闔門相賀遂寛乞米之憂連歲何功徒致取禾之誚茲葢伏遇皇帝陛下纊旒無蔽簪履不遺求齊國之世臣尚其餘幾數正元之朝士今亦無多賜以斗升濟其菽水臣敢不仰銜隆施退適餘生顧朝暮承顔得效老萊之戲雖漁樵混迹敢忘魏闕之心賀重明節表慶元四年繼明而照四方夙紀誕彌之節得秋而成萬寳是當載穫之辰慶溢霄垠歡均海宇中賀恭惟尊號太上皇帝陛下尊同太極福浸黎元由父作子述之明得内聖外王之道脱履崇高之表怡神蠖濩之中鳯蹕來朝當電繞虹流之日龍樓上壽皆山呼鼇抃之人睿算無疆洪圖有永臣既収朝蹟洊處祠庭與造物者遊敢陳金鑑之録獻封人之祝徒想玉巵之儀賀瑞慶節表良月就盈出應五百年之運四方來賀仰祝三萬嵗之期宫壼交歡宗祊協慶中賀恭惟皇帝陛下行符乾徤徳與日新寅奉重闈深思付托之重洊開二閣用廣緝熙之明益増孝治之隆坐振儒風之盛如雲如日喜逢誕聖之辰非露非烟茂鬱興王之瑞敢伸虎拜用贊堯齡臣再奉真祠僻居下國峩冠就列莫陪嵩嶽之呼泚筆歌功願獻浯溪之頌謝落職罷宫觀表杜門卻掃幸家食之少安褫職罷祠忽臺評之下及尚從寛典祗荷隆恩中謝伏念臣戇直有餘頑冥自信生逢昭代屢玷周行年除嵗遷實由於親擢左提右挈敢藉于先容久居封駮之司幾作怨仇之府用過其分思稱所䝉始求補外以牧人已叨臨遣旋請投閒而奉母又辱矜從五年自放於江湖一飯不忘于君父獲棲故隱可謂幸民然猶通内閣之清班竊殊庭之厚禄餘生何有惟㫁㫁以無他公論弗容尚齗齗而不可煩言果至百謫奚逃仰聖度之恢洪閔危縱之孤露爰施薄罰以示小懲茲葢伏遇皇帝陛下仁務包荒爵惟馭貴衛纓雖許終不可以假人漢印既銷適足明於無我俯憐簪履之舊猶齒搢紳之間臣敢不屏息訟愆投誠戴徳循南陔而戒養退甘三釡之貧望北闕以傾心莫効一毫之報謝宫觀表杜門窮巷將沒世以訟愆賦粟珍臺僅踰時而復舊開孤迹自新之路承大君莫報之恩得之若驚感而至泣中謝伏念臣頃承鴛綴親覩龍飛詞禁代言首播絲綸之命經帷進讀不違咫尺之顔一去闕庭四叨祠禄初出懇祈之切兩蒙簡記之思惟此僥逾尤為憂異雷霆所擊寧忘失箸之憂日月有明忽照覆盆之下豈無望於嵗年之後不謂得於旬朔之間顧䥴職之告未頒而祝釐之領已繼人謂去珠之再得自憐墮甑之猶全頓増菽水之歡足慰桑榆之晚兹葢伏遇皇帝陛下仁無棄物道本用中芝柱呈祥方炳靈于太室玉巵為壽喜親慶於慈闈廣四海以推恩軫一夫之失所有如閒廢亦荷矜存臣敢不仰體隆知益安愚分半九十里深嗟末路之難取三百囷徒切素餐之愧謝進封開國子加食邑表職在琳宫方謹祝釐之奉詔分榖璧更濛與邑之多敢期洪私下及散地中謝㐲念臣頃叨推擇濫預論思自登鎻闈之聫已經采食之賜明時未棄歸猶得於祠官比嵗以前居幸霑于郊霈賤息既承于延賞先臣復被于追榮獨此加恩格而不下方斯念咎噤弗敢言顧三百戸之逋㒺知所自念五十里之小相去幾何迨茲祭澤之頒始冐綸言之寵毋升次郡爵進小邦再拜知歸一門増耀兹葢伏遇皇帝陛下禮嚴宗祀惠及臣工仁不忍于遐遺福靡求于專嚮遂令逺外亦荷寵光臣敢不俯媿素餐著鉻丹悃奉璋就列莫輸奔走之勞分土疏封安有藩宣之力謝通議大夫表祠館無庸猶㑹八年之課宸綸甚渥俾居四品之官拜命増榮撫躬知懼中謝伏念臣才非適用仕止為貧幸逢揖遜之朝寖冐論思之列久司封駮徒積悔尤親覩龍飛實専内外之制旋升鴛綴更兼文武之銓爰揣分之易盈以治民而自詭母既登于大耋身亦覺于倦游力請投閒仰䝉從欲江湖麤足久甘漁者之爭限簪履弗遺深媿廪人之繼粟方奪榮之是懼何増秩之敢言漢詔聿頒尚得從大夫之後隋官平進猶使陪廷議之餘兹葢伏遇皇帝陛下圖大澤中謹微接下幽明攷績一付有司之公日月為功俯及從臣之舊有如衰廢亦玷襃遷臣敢不仰佩鴻私愈堅晚節與之三釡方承戲綵之歡加以數年祈遂懸車之願謝再任宫觀表孤蹤去國六換嵗華明命臨門五叨祠廪積素餐而自媿拜黃牒以知歸中謝伏念臣處世最踈逢時多幸把麾江海因得遂於歸耕聼履星辰今殆成于昨夣賤齒已開於七秩親年既越於九齡無由陳力于清朝秖合投閒于故里先疇至薄歎微禄之未忘吏攷將更驚俞音之洊及豈止寛憂煎于數口又將竊温飽于二年有何勞能䝉此撫養兹葢伏遇皇帝陛下躬操八柄坐制萬方念筆橐之舊臣雖無可録軫葢帷之至意尚爾不遺使仍香火之縁以遂山林之適臣敢不祇承恩渥涵泳化風菽水有餘得效萊衣之戲雲霄在望惟存魏闕之心謝復職表四年負譴尚玷從臣之階一札疏恩復還學士之直周章拜賜感激為榮中謝伏念臣愚不知方志徒泥古頃更郡寄嘗辱賜環屢玷朝行寖叨持槖代言批敕曾何有于論思約史侍經每自慙于玩愒典銓未㡬懐綬以歸尋力請于真祠仍寓班於内閣致煩言之俯及甘暮景之冝休敢意矜存曲加枚拭特寛漢律申畀文謨深憐為養之懃又予祝釐之禄從天而下撫已尤驚兹葢伏遇皇帝陛下大度兼容至仁善貸謂臣親逢初政曾厠衆賢之後陳察臣自訟宿愆不忍一眚而終棄爰軫葢帷之念未嘗簪履之遺臣敢不祗戴寵光日思報稱奉百嵗之無益増萊子之歡誦萬年之詩願效封人之祝賀瑞慶節表嘉㤗三年踐阼十年益啓昇平之運逢辰千載又更震夙之期兆姓交歡一心同戴中賀恭惟皇帝陛下儲神淵靜流化儉慈仰列聖之好生守為家法視四方而兼愛務得民心坐凝稽古之勳増衍後天之筭臣屏居海嶠遥睇宸廷見黃河千里一曲之清第勤善頌效嵩嶽萬嵗三呼之祝莫預周行謝再任宫觀表一収朝蹟分老瀛壖六畀祠宫誠知帝寵顧胡顔而亟拜徒空食以懐慙中謝伏念臣晚幸偷安近尤多病四支而三痛楚幾遂作于廢人十日而九呻吟惟退量于薄命第以慈親之待飬曽無他計以謀生尚存未盡之年更望無功之禄仰於洪造方局地以靡遑敢謂隆寛俄自天而賜允里閭改觀耄穉交歡共瞻新渥之光榮又獲全家之飽煖即衡門而被寵望宸極以銜恩兹葢伏遇皇帝陛下大度海􅉼至仁天覆俯憐簪履之舊未忍遐遺又與升斗之餘使能麤給豈止一人之受惠實令羣下之歸心臣敢不强整衰殘愈思感勵奉琳宫之香火每自處於幸民掛神武之衣冠冀終全於晚節謝落職表孤臣失察盍寘大呵上聖隆寛止從薄責俄自天而有命幾無地以容身中謝伏念臣生則多艱仕皆過分幸遇千齡之㑹寖叨八座之聫歸奉祠庭猶寓西清之直坐縻廩粟不勞南畝之耕頃䝉乘障之除庸示起家之寵方循牆而引避痛陟屺以纒悲顧平時藏拙之最深矧洊歲執䘮而致毁猥縁親黨非意相干不善防閑自貽伊戚仰公朝之矜恕念舊物之顛連褫學士之班再斯可矣使臣工之肅其在兹乎迨釋服以及朝敢陳詞而謝罪慈葢伏遇皇帝陛下冕旒無蔽簪履不遺以天地之心為心何止國君含垢之意謂兄弟之子猶子真得聖人觀過之仁遂於危蹤止用輕典臣敢不闔門念咎望闕歸恩三黜何言但有動心忍性之戒餘生無幾徐上引經告老之章謝龍圖閣直學士致仕表致大夫之仕仰賴矜從進學士之班弗容避免念餘齡之無幾幸晚節之茍全量小已盈感深至泣中謝伏念臣學徒泥古才匪適時三列皂衣寖叨嚴近久塵青𤨏遂積怨仇敢自詭以治民為專求于奉母侵尋一紀孤苦再期耄矣無能每媿祝釐之廪仕焉而已況逢告老之期洊貢封章逺投君父喜下情之上逹荷人欲以天期誥頒東海之濱職峻西清之直鹿車還里難忘貧賤之時龍馬負圖乃畀衰殘之候何夣寐之敢及亦家世之所無茲非幸歟不翅足矣兹葢伏遇皇帝陛下徳新惟日仁覆如天俯眷么微忝螭陛隨班之舊更憐骫骳當龍飛草詔之初尚問生全不忍遐棄聿頒茂渥式賁窮途臣敢不内誓丹心益堅素節退人以禮已増鏤骨之私教子以忠使效捐軀之報謝落致仕除翰林學士表代庖儤直又見卯年之周視草為真復塵乙夜之覧撫危蹤而何幸尋故步以知慙中謝竊以詞禁邃嚴宸居密邇有直諒多聞之益乃可預于論思為温厚爾雅之文始宜司於播告鼓風雷之大號増日月之末光匪得英髦曷勝遴選伏念臣學惟涉獵才乏菁華頃載筆于螭㘭尋演綸於鳯閣以先朝之門客為天子之私人方成王訪落之初預聞國論逮漢家更化之始首被召音惟投閒一紀之餘且告老三時之久茲以晚節衰殘之迹參内朝供奉之班念齊國之世臣所存無幾歎元和之學士不謂重來茲葢伏遇皇帝陛下思任舊人聿修庻政朝綱日振急聞忠藎之言疆事未寧尤務坦明之制遂令庸陋亦玷招延臣敢不修葺蕪詞仰裨藻飾尚祈聖度俯矜草芥之微終俾凋年遂逐桑榆之晚謝吏部尚書兼翰林學士侍讀修史表比䝉召節趣歸紫橐之班疊被恩綸盡復青氈之物徳有乾坤之重身同淵谷之危中謝竊以才不可以强為人當知于自度非山濤之識量豈足典銓必陸贄之文章始堪視草露門贊緝熙之益虎觀資潤色之工曽未能其一焉奚可兼兹四者伏念臣既衰無用已試罔功屏居一紀之餘且經告老入對九重之下恍若更生而乃冐選部之真除尋禁林之故步進讀清閒之燕充員筆削之間敢言眼赤之何時深媿汗青之無日身章愈煥轡飾増華儒生之為祠臣誤辱公朝之寵天子以賜學士尤加暮景之榮茲葢伏遇皇帝陛下政務惟新人先求舊取之數路宜廣擇于時髦備于一夫恐徒妨夫㨗徑凌兢拜命頽墮知慙臣敢不勉䇿庸愚仰酬眷奬掌選而分文武詎敢辭勞埀車以示子孫終期得謝辭免簽書樞密院事表誤恩下逮俾綴邇聫遜牘上陳未頒俞㫖仰冐葢高之聽不嫌再瀆之煩中謝恭惟累朝特重右府豈獨無三軍五兵之本抑使聞一日萬幾之微才則甚難官何必備顧愚臣之無取荷上聖之深知起之掛冠聞廢之餘處以持槖清華之舊強顔寖久告老未諧尚不堪朝夕之論思何以禆夙夜之宥密進寓承明之直更列元良之賓揣已奚堪逾涯莫甚欲望皇帝陛下俯埀淵鍳洞察忱衷念已迫于桑榆盍居閒地儻未遺于簮履姑置從班别求經濟之材以翌昇平之運謝簽書樞密院事表銓部為真猶未經于滿嵗機廷簉式乃遽辱于頒恩遜避靡遑周章增愓中謝竊以官莫崇于執政軄尤重于本兵必求文武之全才以任國家之重事邊圉甫定尚勤宵旰之憂邦域以寧允藉弼諧之助豈應疲卒可預㡬微如臣者資實腐儒仕叨法從由乆司于封駮故多積于怨仇十載歸閒仰戴乾坤之施一朝収召復觀日月之明不堪聼履之華伏上埀車之請敢期誤渥俾贊洪樞血氣既衰止合奉身而去軍旅未學曷賛基命之嚴玷書殿之清班忝儲扃之下客被繡韉于上駟束鏐帶于襲衣采食有加寵榮已甚茲葢伏遇皇帝陛下人惟求舊政務圖新謂代言于受禪之初未忘孤迹迨趣職于更化之始深鍳凋年豈云術業之可稱葢自眷私之過厚遂容僥幸倍切凌兢臣敢不深感隆恩愈堅晚節老當益壮固欲殫報主之忠耄矣無能終恐負知人之咎謝皇太子牋謬參樞筦仍汚紫殿之班兼預儲賓始下青宫之拜以榮為懼得寵若驚中謝伏念某少也無竒晚将焉用掛冠而去真成治世之幸民扶杖以觀親覩大君之更化首祇嚴召重覲清光俾視草于鑾坡旋典銓于選部露門進讀冊府細書舊物復還空積妨賢之愧故山在望但祈得謝而歸敢冀明倫擢登右府致此血氣既衰之迹厠于衣冠甚偉之中揣已奚堪荷恩有自茲葢伏遇皇太子殿下惟中玉粹學振金聲子職日供肅侍凝旒之側官僚妙選誤収華髪之餘某敢不益勵駑才用酬鴻造退憐已老莫能陪宥密之司勉訟所聞庻或補温文之徳辭免同知樞密院事表宥府選寮忽叨再命需章避寵尚閟一俞爰洊瀆于宸聰冀終囘于渙渥中謝伏念臣引經納禄奉詔還朝始膺典選之除適預和戎之議既不能出竒䇿以強國勢又不敢抗高論以竊時名深為世務之宜遂定從官之論鄰盟已講邊備粗寛魏絳何功姑欲就懐戎之得利張昭雖老當使知將相之有人頼聖慈俯徇于和親在臣下盍為之引咎自媿寡謀之甚難陪基命之司殆無地以寄顔惟竭誠而報主日圖内治之要未知所先靡厭衆言之求尚不睱給有何勞效遽被推遷不勝據蒺之憂徒謹循牆之走伏望皇帝陛下俯埀淵鑒洞察愚衷豈惟微臣懐以榮為懼之恐仰祈睿筭篤居安慮危之心精求文武之才用贊樞密之任謝同知樞密院事表簉宥密之班未知圖報拜便蕃之渥弗許終辭自揆僥逾實深感惕中謝竊以皇家嚴二府之建任固匪輕機庭分四等之差官毋求備賢相並兼于使領副樞足贊于事幾既曰才難豈容序進伏念臣少無可用老尚何堪扶病以對便朝幸不違于咫尺强顔而居舊著顧奚補于毫分假寵已多匄間未得敢謂七旬之後冐叅兩地之榮畀興國熙奏之官已為過分加淳化宼凖之職尤媿無名偶縁廷告之同時因與政途而接踵在法當從既超筆槖之聫計日而言僅周天地之數併増采食洊被匪頒茲葢伏遇皇帝陛下懋建大中丕乘興運謂股肱所寄方彚進于時髦雖筋力既衰亦使陪于末議未遑席暖復俾陛升臣敢不仰戴隆私益堅素守邊陲甫定願裨内治之謀里社相望期遂歸休之請辭免叅知政事表進參政柄誠出誤恩冐貢遜函未囘淵聼洊布懇祈之切敢辭俯傴之恭中謝伏念臣才不逮中身今既老十載排根之已甚實倍費于保全一朝収召而復還又屢叨于襃擢非敢忘知止之義葢欲堅圖報之心今則疾疢交侵徒強顔而自靦年齡云邁顧納禄之未能使在旬月之間稍有毫釐之補序遷而上已分已逾而况據案牘而書名雖具員而益愧對冕旒而奏事無長䇿之可陳誤寵所加羣言必駭欲望皇帝陛下念經綸之事重思輔贊之才難别選英髦俾作調元之助毋容衰瘁更貽濫吹之譏或畀舊班俯存孤迹謝參知政事表充貳樞庭方慙玩愒晉陪宰路遽被推遷倍深臨谷之危莫遂循牆之請中謝竊以朝廷建輔號天子之四鄰政事參聞下丞相之一等定名稱于乾徳復官制於建炎必求異能乃副隆委伏念臣頺齡景迫壯志日彫再掌吏銓但守停年之格濫居宥府未寛思職之憂雖粗竭于謭才終莫禆于末議負二宜去有七弗堪宿恙漸侵將籲天而致禱誤恩狎至真蹐地以靡遑況秉鈞當軸之虚貟而知印押班之分日兼與漢章之約仍從商皓之游命服匪頒復賜天閑之駿爰田増衍更開公社之封昔在本兵尚為僥冐茲叨助理尤懼曠瘝茲葢伏遇皇帝陛下盛徳又新至誠樂與折衝禦侮坐底于外寧聚精㑹神力先于内治揀求俊乂置在弼諧聿令衰退之蹤亦忝延登之數臣敢不益殫愚慮仰贊宏規曰都曰俞願竊慕賡歌之喜知足知止庻幾從告老之私攻媿集巻十七欽定四庫全書攻媿集巻十八宋樓鑰撰表牋代宰臣謝宣示太上皇御書宋玉高唐賦傅毅舞賦陸機文賦嵇康琴賦曹植洛神賦王粲登樓賦史節故事段陳羽古意詩蘇軾養生論周興嗣千字文御跋表乾道辛卯春被賜真行草書總十巻臣下拜瞻玩心目開明竊惟書法自東漢迄于晉唐代有名家然莫不祖述鍾張憲章羲獻而各得一偏未有超軼拔乎其萃者恭惟光堯夀聖憲天體道太上皇帝高蹈羲皇之上遊戲翰墨之間初若無意而筆力所到自得之妙集乎大成如春雲行空千狀萬態逺視前古有不足述固知天縱之能心與神㑹非衆庶曲學之所可致也帝王餘事猶能至此顧不休哉三月二日臣某恭題奎畫昭回來從慈極睿思優渥宣示邇聯是何不世之逢獲快爭先之覩中謝竊以翰墨有法肇自東都帝王好書無如貞觀雖具龍蟠鳯翥之體徒為心摹手追之勤若夫天縱之能拔乎其萃自得之妙集此大成聿觀歴代以還未有今日之懿恭惟尊號太上皇帝陛下宸衷淵靜帝學融明一札細書居多方國之賜六經大訓式畀膠庠之傳既全脱屣之高益有怡神之樂坐進此道作新斯文取楚客之賦篇迨梁臣之韻語舒牋自適肆筆而成乃因五日之朝併演十編之富恭惟皇帝陛下茂隆孝治仰識聖心金口登明究羣書之薀奥雲章交煥掩二典之光華是雖餘事之能然誠非曲學之所及中秘將嚴于尊閣外廷咸預于榮觀臣夙際休期幸瞻鴻藻登牀競取詎敢效昔人之豪鏤玉匪頒尚幾為私室之寶代宰臣進吏部七司法表朝建天官實總吏銓之要詔刊治典恭承聖作之規會衆目以畢張集前編之未備幸終載筆敢後奏篇中謝臣竊以皇家韙累洽之期選部有一成之法蜀中興之始爰盡纂于舊章迨更化以來嘗再參于中制惟奇請它比隨日以滋而巧吏猾徒縁姦而奮迺裒四紀之治革修為一代之經常然而漢定章程止由柱史唐更律令亦任柄臣未有上軫淵衷俯埀明聴凡曰甲令之著首塵乙夜之觀親灑宸毫具標汗簡必使繹尋而盡善更容開釋其所然既咨可録之言時出非常之斷合吏封勳攷之目貫敕命格式之文以至黜贓罪之賞延進軍功于流内恩防寛縱例絶扳援莫非近古而便今務在舉宏而撮要筆則筆削則削罔有差訛官言官朝言朝此為依據恭惟皇帝陛下治先自内名不假人澄三省之源已嚴道揆定七司之制更肅班僚立通用以去煩文申權宜以存故典警捕有酬奬之等陞改易參照之科使官人之方得以兼明于覈實之次誠非小補臣等粗殫末技莫望清光事倣石渠稱制仰勤于臨決才非山甫有司終媿于將明尚冀頒行庶憑遵用代宰臣進仁宗皇帝今上皇帝玉牒表神文出治光紹三朝睿主膺期系隆列聖鬯皇猷而潤色寫翠琰以齊輝中謝恭惟皇帝陛下政用時中言為世則繼志述事親承太上之心傳遵制揚功盡循我宋之家法眷仁皇之盛際延今日之宏規惟天聖之元實基四十二年之治惟乾徳之懿將繼五三六經之隆爰命儒臣並修史牒登載斯謹會萃不遺稽故事以成編肅昕朝而進御忠厚之及草木知積累之自來廣大之配乾坤豈繪畫之能見牙籤初秩金匱秘藏臣獲遇休明居慙典領祖功如在期載纘于無疆帝業方崇當特書而不一代皇子鄧王辭免冊立皇太子表丹悃冒陳祈免升儲之命皇恩加厚未頒賜允之書仰叩九重敢伸再瀆中謝臣聞元良以正萬國記言世子之能繼明而照四方易謹大人之象以奉粢盛之祀以繫億兆之心苟素望之無聞豈盛儀之敢受伏念臣性難語上學不知方仰承君父之規久親師傅之誨奉長安日邊之對蚤乏奇辭辨陳留牘上之書素無英識戴乾坤之大造升爵位之崇班安知懐徳之維城但媿無功而受禄綸言忽播綺殿爰開實懐不稱之慙難冒非常之寵伏望皇帝陛下特回聖意俯聽忱辭不嫌渙汗之收姑寢震宫之建誓䖍子職少答睿慈又代謝冊立表睿旨中頒誕開宫邸微躬内媿亟上封章恩深弗遂于循牆懼甚有同于臨谷中謝臣聞仰觀乾象前星密邇于帝星俯察坤維少海實源于大海歴稽盛古必建元良自非有賢聖仁孝之聞備恭敬温文之懿何以貳體宸極正位少陽伏念臣學識無長器資非敏實託本支之盛屢叨爵位之崇日就月將幼已慙于慈訓夏絃春誦今未底于多聞自媿孱庸居懐兢懼忽拜玉音之寵冒陞銅輦之榮入侍皇居仰承天序茲葢伏遇皇帝陛下仁周溥率明照幾微膺列聖之丕圖奉上皇之色養眷求主鬯以重承祧儲徳未充曷副人神之望睿謨素定不由羽翼之成臣敢不益念前脩永遵雅誥謹文王安否之問敢怠帥行書唐宗仁孝之詩仰祈札賜又代謝太上皇帝表從五日之朝夙荷抱孫之愛拜十行之札俄膺立貳之求仰慈訓之曲臨懼微躬之匪稱中謝臣竊以大人有繼明之義葢取諸離長子為主器之親故受之震豫建儲嗣雖本前規獲奉重親未如今日伏念臣幸以弱植出逢聖時列亞保之崇班初非功致胙真王之尊爵深愧名浮徒以託體嚴宸承休慈極忽頒丹詔叨處青宫共知睿斷之不同實本聖謨之丕顯兹葢伏遇尊號太上皇帝陛下徳高堯舜道合羲黃雖與造物者遊自求至樂仍有孫謀之燕以永無疆爰舉曠儀以安神器臣敢不力修四學祗奉兩宫立愛自親仰體承祧之重聿修厥徳敢忘念祖之勤又代謝皇后牋坤徳無疆實依厚載震宫肇建遽及凡材中謝伏念臣託質天支承華壼則干戈羽籥教雖備于四時父子君臣學不臻于三善忽奉襃揚之冊俾當監撫之權仰宸斷之剛明賴母儀之裨助茲葢恭遇皇后殿下徳齊任姒賢過娀㜪陰教聿修坐致人倫之正淑謀經逺更圗國本之安臣敢不居近正人力尋舊學祗召而不犯馳道當奉君尊問安而必至寢門益闕又代謝受冊表銅門肇啓方慙主鬯之良珉冊誕頒更舉臨軒之禮恩隆天地懼劇淵冰中謝伏念臣素乏材猷積叨寵數金印盭綬蚤處于宗藩青葢斑輪俄升于儲位復差良日爰御正衙備金石以盈庭儼纓縷而就列授之寶牒訓以綸言退省其私不知所稱兹葢恭遇皇帝陛下道高世表機照物先斷自宸衷豈私于愛子蕆茲曠典葢重于承祧臣敢不仰體聖謨恪供子職出有師入有保起居惟近于正人親則父尊則君夙夜益勤于順事代宰臣賀立皇太子表冡嗣稱賢夙仰吾君之子儲闈定禮果安天下之心歡動兩宫慶均四海中賀恭以離著麗天之象繼明實繫于大人震有洊雷之文主器必歸于長子闢東朝之縟禮綿列聖之丕基曠古難逢于今創見恭惟皇帝陛下孝如虞舜樂似文王敬奉親嚴屢上玉巵之夀大寧國本首開銀榜之宫慶幼海之澄瀾瞻前星之騰耀一人獨斷非由羽翼之成三善自將克荷宗祧之守臣叨居近列恭覩盛儀日下重光已備夙成之徳嵩呼萬嵗敢忘歸美之誠代宰臣賀太上皇帝表神謨早定俾建元儲聖孝丕承誕揚宸制事闗宗社喜動華夷中賀恭以甲勸之生嫡王孫但有命名之愛一日而見三天子止聞臨澡之歡載在信書以為美事曾未有傳神器而與子見東宫之立孫介茀禄于無疆固蘿圖而有永恭惟尊號太上皇帝陛下道高百聖仁覆萬方翼燕孫謀獨享後天之算儲登世嫡共仰前星之輝問安獲事于重親主器仍歸于長子臣欣逢盛際獲在邇聯卜世卜年期過周家之歴重輪重潤願賡漢樂之詩代宰臣賀皇太子牋儲徳日新久繫于衆望睿謨獨斷爰舉于曠儀覆載兩間懽呼四起中賀恭惟皇太子殿下地居冡嫡天與奇姿震一索而得長男宣膺主鬯之寄漢元年而建太子益知享國之長仰九廟之儲休信兩宫之增慶人心自定神器愈安某等肅領鵷行進瞻雞㦸元良既正不煩賈誼之言盛美難名莫盡卞蘭之述代謝吏部侍郎表以下四首代魏丞相杞代言西掖方拜誤恩攝貳東銓復叨改命循牆莫避臨谷増危中謝伏念臣濩落無堪迂愚自信正以經營于菽水故嘗希望于斗升昨自外官恭趨嚴召猥厠内朝之鵷列親覩上聖之龍飛五歴粉闈一參月寺籌邊戎幕無婉畫之可稱將命薊庭幸歡盟之復締冒柱史詞臣之選兼宫端寶牒之司初無左右之先容盡出聖神之親擢忽承帝制俾倅大官一新龜紫之榮仍假銓衡之長莫回成渙徒激懦衷兹葢恭遇皇帝陛下虚以受人明于分職憐臣孤立于宦路借以末光謂臣曾歴于劇曹付之重委臣敢不寅遵邦憲嚴制吏姦朝夕論思雖素乏嚴吾之譽簿書期㑹庶勉追裴馬之名代謝侍講表攝居選部已困劇曹擢在經幃更承清問退慙衰朽有此遭逢中謝伏念臣幼歴羇艱學無師法顧孤陋寡聞之習但為決科之資無疏通知逺之經素匪專門之業矧是帝王之大學非為章句之小儒必求鴻博之人以究淵源之蘊豈容樸學獲奉細旃茲葢恭遇皇帝陛下巍巍成功謙謙終吉時降至尊之勢兼收可録之言遂容草莽之臣亦預金華之講臣敢不黽勉微力綴緝舊聞為二三萬言之辭敢求釋義暢五十八篇之旨庶補重明代辭免進國史轉官表約史何功敢叨醲賞騰章避寵未拜俞音洊貢誠衷仰干睿聴中謝竊以三朝之治迹允為萬世之成規信傳信疑傳疑已備不刊之典筆則筆削則削屢資多學之儒而臣方貳政之未幾適成書之已久暫領纂修之職曾無潤色之勞使冒賞而不疑則叨榮之太甚而況近辭珍賜陛下固已許其㢘兹躐崇資公議必傳以為笑謂少者辭而多者則受謂今日是則前日為非雖故事之有初在微臣而焉敢伏望皇帝陛下俯矜賤悃特寢異恩益使人心知清朝以名器為重誓殫愚慮効薄伎于志傳之間代遺表生而致主曾亮采之無聞死不忘君豈效忠之可已危悰欲吐老淚先傾中謝伏念臣奮自羇單本無僥覬蚤厠熙朝之鵷序親逢上聖之龍飛猥以謭材屢叨隆委凡一時清切之選皆九重特逹之知兵交而使在其間備更險阻猷告而爾順于外嘗預論思寖歴政塗遂登揆席迄縁樸拙用速顛隮俯憐簪履之遺旋畀屏藩之寄人言噂沓何敢控陳天鑒高明卒蒙昭雪賦以真祠之禄予之秘殿之名屏跡衡門銜大恩而莫報馳心魏闕顧一飽以何安今則蒲柳益衰桑榆既逼老將智而耄及福已過而災生卧疾漳濱恍精神之易散游魂岱嶽嗟頃刻之難留僅存餘息之微重結明時之戀伏望皇帝陛下治功惟敘聖徳又新總萬幾之要以充毓天和合羣賢之智以維持國是問安慈極日承尊養之歡注想中原身濟規恢之業臣命隨氣索志與辭殫王度清夷固無煩于尸諌死期迫促徒自切于哀鳴代知泉州謝進職再任表以下四首代舅氏汪尚書大猷承南服之流忽叨因任進西清之秩併辱柬知拜寵命以增榮俯懦躬而有靦中謝伏念臣奮自寒逺遭世休明分甘州縣之塵勞敢望朝廷之抜擢十年服采寖登侍從之班千載逢辰曲被聖神之眷此雖攝六官之長猶未為貳卿之真及遂求閒遽超次對退惟愚孱已劇優隆起試外藩以治民而自詭洊更下攷無報政之可書方將重上真祠之章豈意更升學士之列一變閩俗初無常袞之稱更與泉麾仍繼蔡襄之後已試如此其可再乎無功而遷誠為過矣茲葢伏遇皇帝陛下政先實核恩不遐遺念微臣非可用之才麤堪郡寄謂長吏多數易之弊就畀璽書復增延閣之華益重專城之任臣敢不勉其未至究所當行久悉邦風既無勞于問俗務攻吏事庶不負于分憂代謝隆興府到任表上印泉南方遂祠庭之請把麾江右遽叨帥閫之除猥荷柬知若為稱塞中謝伏念臣幸逢昌運忝綴從班昨辭逺于脩門効蕃宣于遐服目駐堯天之日月身留閩徼之山川未及終更已叨因任共知鼯鼠不堪五技之窮自分鷦鷯惟望一枝之足屢申誠悃仰扣淵聰卒蒙從欲之仁獲遂投閒之志千里未還于榆社十連復冒于綸音旋促對于清光誤親承于睿奬授之方略俾以奉行茲延見于吏民方究詢夫風俗惟南昌之名郡實上聖之潛藩襟帶江湖首尾吳楚雨暘方若正賴春耕秋斂之勤凋瘵已蘇猶藉左粥右餐之惠必得循良之吏庶安流宂之民豈應惷愚堪此委寄茲葢伏遇皇帝陛下恢張治具駕御人材察臣久被使令既深知于徳意念臣備嘗險阻亦粗識于民情特畀虎符俾殫駑力臣敢不布宣寛大禁戢姦欺當使田間盡改帶刀之習且令州縣母存珥筆之風代賀太上皇帝上尊號表啓龍樓七十之慶春朝將展于上儀率鵷列三千之臣至朔先加夫媺稱事高治古懽溢綿區中賀竊以薦舜于天堯帝聰明而遜位以武為子文王逸樂以延年不有極尊之稱曷為甚盛之舉鏤白玉之牒歸美兩宫建翠華之旗親朝五日書契未有宗社無疆恭惟皇帝陛下道盡事親仁先自内謂富夀之福為彞倫之所先而父母之年在常人而猶喜況承社稷之託親見春秋之高自非得九州四海之懽心備五帝三王之全美何以效之慈極副我淵衷爰集廷紳取于經而定大號更推帝澤斂時福以錫庶民上皇增萬夀之昌太姒嗣徽音之懿至矣盡矣不可有加舞之蹈之莫知所自臣退甘屏處莫預駿奔奏薄技于從官之間敢懐故步效三祝于封人之請徒切愚誠代謝宫觀表十年念咎蹐地靡遑一日奉祠從天而下孤迹有自新之路聖朝無終棄之人恩重難名感深至泣中謝伏念臣猥由寒陋誤辱眷知持槖近班何有論思之益把麾逺郡粗殫惠養之勤鄉闗甫遂于歸休帥閫忽叨于推擇患生意表盜起鄰封調戍卒于屬州授伍符于簉牧不虞宿將反墮姦謀方騰訟過之章乃被督師之命大兵雲集謂當指日而可擒醜類麕奔曾不回戈而内向力追蹤于山谷尚假息于朝晡績既弗成罪將誰執七旬未格莫寛西顧之憂三褫猶輕難逭南遷之謫獲歸故里已佩深仁自量擯斥之餘宜在孰何之外敢圖鴻造憫其垂朽之年特渙綸言廩以祝釐之禄削刋丹籍叨竊素餐茲葢伏遇皇帝陛下治本隆寛政先總核動加矜軫豈為匹夫而求全凡與使令不以一眚而終廢俯憐庸懦曲賜涵容臣敢不擢髪省愆銘肌感徳散材無用深知復玷闕之囏壯志雖衰尚得效糜捐之報攻媿集巻十八欽定四庫全書攻媿集巻十九宋樓鑰撰表牋代謝宫觀表以下三首代史待制彌正賦禄真祠俯從私請升班次對更出鴻恩是何極陋之蹤得此殊常之渥中謝伏念臣志徒慕古才不逮人由庠校之諸生叨承延賞勉箕裘之餘習傳玷世科甘從州縣之勞敢覬朝廷之選惟睿主曲敦于舊學故微臣誤簡于淵衷自給札于中書寖彯纓于冊府退量倖冒秖務靖共固嘗持節以言歸旋即予環而就列寸長尺短第知自竭于愚衷年除嵗遷何意遂塵于法從代言西掖進讀東宫皆老父之故官實儒生之希遇力辭禁筦改貳秩宗威儀三千兹豈養痾之地春秋八十不勝愛日之思奏牘朝聞俞音夕至廩以祝釐之粟寵之荷橐之聯毫釐莫報于公家頂踵悉由于聖造甫還私室已拜宸綸兹葢伏遇皇帝陛下政本用中仁惟厚下素矜樸拙初無進取之心重賜襃揚庸示保全之意父子感深而至泣里閭圜視以為榮臣敢不增激懦衷稍休弱質循陔承志庶幾棄官歸養之風戀闗馳誠尚勉移孝為忠之節代謝皇太子牋儲禁簡僚久充員于中護祠庭得請仍寓職于西清退省至愚敢忘所自中謝伏念某稟生甚弱賦性尤疎一經徒守于家傳累嵗寖汙于朝蹟獨惟老父獲際聖君乃眷潛藩曾是甘盤之舊遂容小子亦陪綺季之游自慚遲鈍之資無補温文之學丏閒得寵拜命知歸茲葢伏遇皇太子殿下盛徳在躬勞謙禮士兩宫侍膳益勤愛日之誠千里懷親深察望雲之念俾從私志實荷隆寛某敢不祇服訓詞仰承色養扶羸東下遽收迹于鵷行矯首西瞻尚馳心于雞㦸代謝皇太子宫講堂徹章轉官牋儲闈進讀嘗預英游奏議終篇遂遷爵秩曾是優隆之渥亦霑逺外之蹤中謝伏念某學匪洽聞身逢盛際宸扆念甘盤之舊俾鯫生獲綴于賓僚經帷繙陸䞇之書命鶴禁亦為之訓説備見經綸之用具存仁義之言戒彼覆車實為可監申其佔畢顧有何勞方茲去國以奉祠乃以徹章而受賞被恩有自揣已知慚兹葢伏遇皇太子殿下任重承祧志勤好古傳聖父誠明之學自得之心玩名臣論諫之文如對其面尚思記誦使遂襃陞某敢不拜手祇榮銘心戴徳一物三善固知裨贊之無功九弊六條更冀講明之不怠代賀光堯夀聖憲天體道太上皇帝夀聖明慈太上皇后上尊號表以下六首代温州曾吏部逺熙事備成惟聖人能饗帝徽稱具舉雖天子必有尊懽動兩宫化刑四海中賀竊以太上立徳本無事于飾名大美不言顧曷資于崇報雖九載已都于顯號而一人尚歉于宸衷乃因泰畤之精禋併舉累朝之曠典恭惟皇帝陛下恩被動植孝通神明登大位之崇高受上皇之付託玉巵稱夀視昔有光寶冊奉親自我作古謂天祖羣物式昭時憲之明謂道法自然更著體元之正俞音誕布盛事一新萬國得懽心共仰仁天之大百姓加徳教益知聖治之彰臣出守偏州恭承明詔捧觴再拜頓回鳯閣之春稽首三呼但想龍樓之曉代賀太上皇帝表禮行于郊咸慶縟儀之備尊歸于父聿嚴媺稱之加覆載兩間歡呼四起中賀竊以巍巍者至高之貌用形容于博衍優游蕩蕩乎民無能名獨著見于聰明文思仰堯仁之天大邁湯徳之日新宜因百神受職之時更益大徳得名之懿恭惟尊號太上皇帝陛下怡神于淡遊物之初膺寶籙以興拜授神器而與子凡此知人安民之要傳諸問安侍膳之間黄屋非心樂逍遙于特室紫壇蕆事介福履于慈闈雖秉謙尊莫回忱請光之大大之謂聖已陶萬國之歡天法道道法自然益顯百王之冠臣叨憑熊軾莫簉鵷行想漢殿之觴寧免滯南之歎効華封之祝敢忘拱北之誠代賀太上皇后牋備舉盛儀誕揚懿號凡資持載㒺不懽呼中賀竊以迎長者三王之郊既告䖍于上帝有名者萬物之母爰歸美于慈親益增地道之光深副天心之願恭惟尊號太上皇后殿下徳高任姒功邁娀㜪力贊睿謀親授重華之帝尊同太極式安長樂之居受五日一朝之榮備四海九州之養爰因大祀載舉徽音箕疇謂視曰明用顯進賢之志老氏以慈為寶於昭生物之恩合茲二者之稱仰止一時之盛臣分符有守戀闕無階莫陪椒掖之趨但劇葵心之向代謝立皇太子降赦表儲禁宏開宸綸誕布法前星之瑞象仰粲重暉揚少海之餘波沛為膏澤神人胥悦宗社奠安中謝恭惟皇帝陛下道冠皇王仁霑動植端居南面受光堯付託之隆豫建東宫綿有宋延洪之福爰推恩霈下及黎民罄萬國之歡心屬一人之有慶臣叨紆郡紱阻賀闕庭比屋歡呼咸喜元良之正微衷感勵謹宣寛大之書代謝御書戒百僚手詔石刻表詔旨中頒具孚羣聽宸章申錫下及侯邦凡屬照臨舉知感奮中謝竊以官刑儆有位之士成湯切戒于三風手書賜萬國之臣光武尤嚴于一札聿稽前代王者之盛未如今日天語之温葢九重雖備于躬行而百辟或違于徳意玩嵗愒日猶有謬悠拱黙之流易慮洗心尚乏砥勵激昂之氣仰勞翰墨下訪臣鄰一新琬琰之刋傳甚置郵之速兹葢恭遇皇帝陛下循名責實任賢使能形憂勤于宵旰之間十年于此示好惡于用舍之際四海胥然爰申播告之修更勤勵精之始臣叨膺郡寄肅奉訓辭祗率乃僚各共厥職欲令真偽母亂敢為欺謾之文會聞上下相安莫有茍且之志代謝直秘閣表濫膺郡寄初無善狀之稱寓直奎文忽被寵光之渥拊躬有靦拜命增榮中謝伏念臣學昧家傳才非時用猥縁遭際得効馳驅衣以繡衣雖謹惟良而折獄置之粉省未知何自以為郎退尋於越之居俄假東嘉之守四郊菜色重丹扆之憂勤一介萍蹤荷玉音之臨遣首問吏民之疾苦備聞田里之歎愁凡所奏陳悉蒙垂應移鄰邦之粟不容遏糴之私蠲下邑之租又免追科之擾罷民粗給和氣隨生雨暘以時黍麥增稔闔境方歌夫聖徳誤恩乃及于守臣顧撫字之徒勞媿清華之非據兹葢伏遇皇帝陛下核孝宣之名實總光武之權綱民瘼是求尤重専城之寄璽書加勵滋多循吏之賢顧如微臣亦霑醲賞臣敢不仰銜鴻施俯竭駑才未讀五千巻之書已冒登瀛之目加撫十萬戸之衆誓堅報國之心謝慶夀赦加恩表代龔參政茂良慈皇介夀幸陪前殿之儀慶沛頒春首被通侯之寵循牆莫避蹐地自驚中謝竊以堯年符巽位之期舜孝極重華之盛請福夀之祝百僚咸預于駿奔下寛大之書萬國宜霑夫錫賚豈繄邇列獨冒殊恩況骫骳之文嘗獲登于徽冊以蹣跚之質偶進攝于上公固已不勝千載之榮敢意更竊九重之眷封疏故郡地衍多畬端章甫以立朝安識周旋之中禮分茅土而建社自慙談笑以封侯兹葢伏遇皇帝陛下義篤奉親仁均厚下廣宫闈之至樂用以及人録臣子之微勞遂先與邑臣敢不誓殫素節仰報鴻私五日一朝密扈天顔之睟穆萬年億載永瞻孝治之光華代仲兄謝嚴州到任表負丞棘寺久媿空餐假守桐廬遽叨共理初以還鄉而拜命終然便道以之官被寵過優撫躬莫稱中謝竊以子陵舊隠浙水奥區昔為太上之潛藩今實行都之近輔頻年旱潦寖多凋瘵之民累政推遷宜擇循良之吏如臣者稟生甚陋懵學寡聞猥承延賞之餘甘老徒勞之役偶平詔獄入仕帝京財貨暴如丘山敢辭委吏文書盈于几閣第謹攸司逮聯敕局之刪修纔脱選途之塵穴進參外府曾何補于公家移贊司刑頗服勤于臬事銜上恩而莫報念色養之多違因謁告以遄歸以治民而自詭仰蒙睿眷徑畀左符方少遂于家居忽又承夫人乏葢歉嵗方勞于旰食謂小臣曾對于清光頒嚴旨以趣行免内朝之臨遣望龍顔于九陛不勝戀闕之心侍鶴髪之雙親少展循陔之志兹葢伏遇皇帝陛下天臨萬宇器使羣材培植邦基尤重牧人之任茂隆孝治俯推錫類之仁雖久歴于王官必加試以民事有如臣輩亦在選中臣敢不恪奉教條布宣徳意中外本一致顧何有于重輕忠孝無二心誓益殫于報効謝南郊肆赦表代温州莫給事濟泰畤陳儀聳百神而受職端門肆眚罄萬國以歸仁覆載兩間懽呼四起中謝竊以聖人享上帝既竣事于圜丘厚福浸黎元爰疏恩于方夏配天其澤與物為春恭惟皇帝陛下歴數在躬聰明作后治内以治外期臻宴粲之隆事天如事親曲盡寅恭之至粢盛豐潔圭幣輝華風馬來臨已見高靈之隨星雞載舉喜聞鴻霈之頒不俟終朝遂霑四逺臣逖居支郡莫望清光趨左右而奉章徒想冠裳之盛率將吏而拜詔更欣囹圄之空北齊宋良為清河太守甚有善政天保初大赦獄内蓬蒿俱滿無囚可赦惟率將吏拜詔而已時温州兩獄俱空代謝舉官不當降官表守臣繆舉莫葢前愆司敗議刑尚從寛典仰至仁之善貸拜嚴旨以猶驚中謝伏念臣頃自作州屢嘗薦士雖昧知人之鑒敢不盡心偶緣入幕之賓實能辦事察之既至舉者亦多況聞奏牘之交馳皆謂吏材之足取逮升劇縣頗著能聲雀角鼠牙乃寖招夫仇怨瓜田李下曾不謹于嫌疑嘖有煩言自貽伊戚在昔親民之始嘗陳同罪之章歴時雖多逃責無所與潔而不保其往祗佩訓詞之温取人而失之以言深犯聖門之戒僅行鐫削仰賴保全茲葢伏遇皇帝陛下馭下惟公待臣以恕謂引其類以俱進任則甚專若簡乃僚而弗䖍咎將誰執臣敢不深思創艾益謹品題應物未明當起懲羮吹虀之念求賢圗報敢萌因噎廢食之心代謝知瓊州表一札十行俾逺憑于熊軾四州百洞幸利涉于鯨波首及治封具宣徳意中謝伏念臣奮身疎逖賦性愚蒙蚤叨世賞之延屢困宦途之滯字民淮甸慙非製錦之工式政衡陽有玷題輿之選頃分陋郡未及期年資淺望輕易致人言之噂沓地偏財匱不堪嵗計之支吾已甘置散之科安有復然之望豈圗抆拭更任蕃宣眷古珠崖實今瓊筦邈在萬里之外顓居一海之中漢晉廢置之不齊隋唐分合之靡定久服本朝之聲教遂同内地之流風惟黎母錯居當謹邊防之慮而賈胡遙集實為舶政之源自揆庸虛難勝寄委茲葢伏遇皇帝陛下仁思濟衆徳務包荒緬懐卉服之人遴選竹符之守知臣嘗更于逺外或可承流謂臣備歴夫險艱庶幾使過臣敢不仰銜恩紀謹布邦條幸依兩伏波之神毋憚三合溜之險仕方行志敢為乘桴浮海之言忠不忘君徒詠登樓望京之句誓殫駑力用答鴻私代賀太上皇帝慶夀表啓七十之慶將傳萬嵗之玉巵率三千之臣先上兩宮之寶冊美備形容之至光增授受之初孝治愈隆生民未有中賀竊以子有天下而尊為父方當祝耆艾之辰徳為聖人而得其名詎可襲尋常之號一紀再加夫縟典九重尚慊于淵衷兹講未央之儀爰採康衢之頌榮歸慈扆燕及中闈恭惟尊號太上皇帝陛下道大難窮功成不有聰明遜位於昭與子之公逸樂延年自得從心之適曰仁曰徳無能名焉乃武乃文紀其盛者尊號太上皇后殿下久參太極密贊重離天下濟而地上行允謂相成之道堯南鄉而舜北面實同稀有之期皇帝陛下愛篤嚴君親傳家法謂夀富之福惟彝倫之所先而父母之年在常人而猶喜況承社稷之託獲見春秋之高不有極尊之稱曷為甚盛之慶優游博衍雖問之朝野而不知揚厲鋪張要編之詩書而無媿禮文照古雲物致祥歡均軒陛之間化浹華夷之外臣預瞻鸞輅入覲龍樓嵩岳傳呼誠四海九州之至樂赭袍端拜願十年一慶于脩齡代新進士謝賜花表柳染青袍叨預天官之燕花裁絳綵更分禁籞之春敢望微生遽承華寵中謝伏念臣等性根浮弱學植荒疎吐天葩之奇篇初無詞采啓瓊林之茂典咸戴恩榮謝槐市之舊遊尋杏園之故事兹葢伏遇皇帝陛下仁霑行葦材育菁莪萬國春陽顧豈遺于寒谷九天雨露遂均及于羣英臣等敢不種學績文去華務實芝蘭馥烈但堅自潔之心桃李芬芳共樂不言之化代趙侍郎粹中遺表負罪屏居方還舊物臥痾垂絶將謝明時顧屬纊以甚危猶戀軒而不忍孤忠未泯衰涕徒傾中謝伏念臣起自諸生粗傳末學弟兄射䇿偶登俊造之科州縣服勞安有功名之望奉聖旨欲收于羣䇿謂故家或有夫遺才嘗因輪對之初悞辱衮襃之寵神㑹氣合不自知遇主之因年除嵗遷俄寖上從臣之列二史屢書于言動三銓深柅于奸欺承攝瑣闈亦知效古人批敕之節建明謀議欲以奉列聖在天之靈雖自詭以治民詎敢忘于報國迨池陽之奏課就苕水以交符投檄得閒歸處四明之舊隠騰章褫職誦言一卒之幽冤固知不辨而自明卒荷容光之必照矜其久困賜以更生通禁路之班許尋故步繼廩人之粟俾盡餘年未酬骨肉之恩俄屬負薪之疾水浮膚而成痼藥苦口而勿靈殘息僅存大期已迫媿論思之無補尚攀戀而有言伏望皇帝陛下寅奉慈闈益隆寶祚以寛仁夀天下之脉以清靜養主躬之和尊藝祖肇造之功早正東向之位念神州沈淪之久無忘北伐之圖臣易簀何為葢棺遂已生無可戀敢言滯太史于周南死或有知尚可抗杜回于輔氏代陳閣學居仁遺表承命造朝旋抱負薪之疾奉祠還舍遽興易簀之言忍死有陳報恩無所戀明時而何及灑哀涕以空悲中謝伏念臣生也無奇幼而孤立自世賞而䇿進士奉大對于高皇之廷繇穴僚而登皇官受異知于孝宗之聖晉游學省出試州麾收寘郎曹殆遍更于宰掾擢居柱史遂徑躐于詞垣陟彼屺以纒哀予之琴而終制誤蒙慈扆屢畀左符際真主之膺期升大邦而分閫每經煩使實堅徇國之心縱有微勞皆是守藩之職敢意凝旒之眷忽叨召節之頒雲氣在前不許三山之到君門甚邇翻成萬里之遙撫薄命以自傷懐孤忠而莫吐卒困陰陽之冦竟違咫尺之顔洊貢忱誠僭干淵聽念甘泉從臣之已老況正元朝士之無多祝釐之請則卻而後從寓直之寵則辭而不獲仰戴天地生成之造得為山林休養之謀然而精爽欲離形容盡變抵家而迹未定過信而病益增身方臥于漳濱魂已遊于岱嶽龍光罙厚愧未補于秋毫駒隙易馳將溘先于岱露少留殘景冒進危衷恭願皇帝陛下寅紹皇圗聿新孝治躬憂勤以致中興之業進英俊以鞏太平之基内修外攘坐復祖宗之舊東漸西被聿觀聲教之行臣假息幾何葢棺遂已塵勞五紀悵莫賦夫歸田冥漠九原顧敢忘于結草攻媿集巻十九欽定四庫全書攻媿集巻二十宋樓鑰撰奏議論實用空言任敕令所刪定官輪對臣聞善為天下者貴實用不貴空言然名為空言而行可厎績者乃所以為實用號為實用而行之不實者適足以為空言此不可不察也陛下即位以來大開言路收攬人才慨然念治效之未及鄙無用之空言而務求其切于實用者此誠得孝宣總覈之意而言者不思曾為實用之説累年以來言者甚衆往往已陳而厭聞于是旁搜曲取毛舉以應故事民力方匱而言利不已法令已煩而變更日增凡此皆號為實用者言之則真若可聽行之則不見所益從而委以施行課其成效則且多其圗冊列數以美觀覽然則所謂實用者果非空言乎孟子陳堯舜之道以為齊人莫如我敬王陸贄論諫于搶攘日不暇給之時未嘗不本于仁義堂堂本朝陛下聰明英睿隆寛盡下而進言之士不聞引今據古訏謨逺猷徒藉細故以為實用而售其迎合之術臣竊惑之唐太宗求治之初魏徵仁義之説自今觀之是為空言封徳彞法律之説自今觀之是為實用然太宗斷然行魏徵之言而成貞觀之治外戸不閉行糧不齎斗米三錢幾致刑措蠻夷君長帶刀宿衛且曰惜不令徳彞見之然則孰為實用孰為空言也臣誠不佞瞻望清光之初誠不忍自棄所學捃摭細故以幸于施用且深懼六經致治之成法寖為空言是以冒天威而進其説惟陛下赦之論災異臣聞魏相之事宣帝多以異文為言李沆之相真宗每奏不美之事皆忠臣所以事君而良史所以垂教也葢人主居富貴之極操生殺之柄諂士日進佞説而直者亦難盡言祥瑞之出則潤色而張大其辭災異之見則掩覆而變易其占此二臣之所憂而明主之所察也陛下之畏天可謂至矣四方水旱盜賊之事無有不知知之未嘗不深圗而力行之天之仁愛陛下亦可謂至矣不以休祥為太平之應而時出災異以示警戒之端夫天人之間相去不逺太戊稱宗實由拱桑之祥宣王復古厥有雲漢之詩罪已而興諒非虛語遇災而懼適為盛徳臣愚欲望陛下深求其故俯詢愚言寛民力録囚徒凡可以應天者務求其實則治道日舉聖徳日新上答天心下遂人欲今日之異後日之福也臣之論奏動涉迂緩而愛君之心不勝惓惓惟陛下裁幸論二廣賞典臣竊惟賞典之設以勸勛勞輕重均一則人心厭服抑揚失當則不能無辭立法之際不可不謹也廣南東路西路轉運使副提㸃刑獄到任許奏補子孫或期親一名葢以其逺入烟瘴之地人或憚行故以此勸之頃因言者謂廣西漕憲置司靜江到任不許奏補任滿止轉一官然廣東漕司在惠州憲司在韶州與靜江風土不甚相逺廣西以言者所論而減賞廣東以論者不及而仍舊數年以來未之改定夫廣南兩路皆有瘴鄉監司巡歴其間豈應以易地而鐫賞若舊法為是則廣西不應獨減以其太濫則廣東不應獨得比年臣僚以敕令所見行修法難以著為定令嘗有申請得旨令給舍看詳因循至今未有明文欲望睿旨檢舉淳熙元年臣僚所奏令給舍疾速定議或予或奪著為成法則事出于一無不平之議矣論玉牒聖語臣聞堯言布天下非若後世詔誥之言也葢其都俞吁咈出于心而應于口行于身而形于言是所謂有徳必有言者也陛下臨御以來言之聞于外者天下誦而歌舞之臣前載幸獲一望清光天語之發震服不暇獨念親逢堯帝之聖而寒逺小臣無由時聞玉音既而蒙恩兼職玉牒始盡見記注所載仰而歎曰陛下之言隨事而應是皆出于心行于身察見治亂成敗之機質之六經而暗合攷諸三王而不謬備在編簡不一而足臣不能悉舉以進敢取其大者而鋪張之陛下嘗語臣下曰聲色之事未嘗略以經意至于寶貨珠玉侈麗奇異之物心所不好亦未嘗蓄之讀通鑑至楊阜見人主之非則勃然觸之與人言未嘗不道陛下曰人君聽言不可以人臣漏泄為罪縱使漏泄適足以彰君之美因舉陸䞇之言曰諫者之狂誣明我之能恕諫者之漏泄彰我之能從又讀至黄皓事陛下曰人主于近習不可不逺昔仇士良教其徒固寵之術可以見矣又讀至馮紞沮張華事陛下曰小人之讒君子其浸潤膚受委曲如此使人主墮其術中而不知紹興三十二年十一月有旨令入内侍省權免進子陛下曰祖宗以來止許人進一子此曹人多則黨盛今人數不少若平居無事猶可漢唐之事是已隆興元年九月有旨已降親札付張浚王彦應兵將官有奏報文字及有陳乞並宜付通進司投入毋得依托左右近侍以進凡此六條皆人主之要道當今之急務愛君憂國之士欲言而不敢且累千百言而不能得其要者陛下于從容問答之間形之于言可以大書于方䇿可以為法于後世猗歟盛哉故斥聲色異物之奉容人臣諫諍之直逺近習察小人減内侍之進子禁兵官之依託皆陛下躬行之實心術之妙宜其不假潤色而發于外者如此其巍巍也臣昧死不勝惓惓惟望陛下持之以誠守之以久日行其道日新其徳當如周之文武終得逸樂之福毋使唐之魏徵謂不及于貞觀之初則天下之幸社稷無疆之慶也論土木之費臣仰惟陛下恭儉惟徳敦朴為先宫室苑囿未嘗興作禁御遊觀之地至有弗葺者自非殿宇之繕修學校之崇飾府庫之闢官寺之徙不肯輕用民力葢聖意深知土木之功實為官私之蠧故節費省事以垂後則然臣竊見比年以來工役相繼亦間有不急而可以緩為之者土役之勞擾非一蓄材植者有强買之懼事末作者有苛役之擾廣道路則列肆有毁撤之驚撇基址則連甍失已成之業如此等事未易悉數或曰是役于游手而不妨田里之農事是出于贏貲而不闗有司之經費物皆給以市直而無科斂之擾勞皆予以賞典而有勸功之心是皆不究夫利害之實者也游手之役不費于財乎贏貲之用不出于民乎給以市直徒有其名予以賞典不及于下命令之出誰敢不承要不若前數年之無事于此也故嘗謂人君之善儉者當如漢之文帝而善于用言者當如我朝之太宗夫以漢室之富百金之費宜不足惜而文帝以吾之百金計民之常産一臺之費可資十家遂終罷之每事如此安得妄用此所以為善儉也以王府之貴營一假山亦不為奢而姚坦之言深切似過太宗時已為之一聞坦言歎其傷民亟命毁去言非親聞感悟如響此所以為善用言也以今觀之民貧益甚下戸之產不直一金田野之夫終嵗勤動而不免飢寒閭閻之人以數百錢為資生之䇿一役之興費以千萬計者不知可為幾家之産州縣之間一金一粟之不輸則鞭笞立至追科之日械繫滿前號呼塞耳錙銖積之以充府庫一役之興費以千萬計者不知出于幾人之輸然則文帝之言為有旨坦之之言為甚切太宗皇帝之徳卓乎其不可及也以陛下之恭儉敦朴而臣猶敢以此為言者誠以今日事力尢非文帝太宗之時之比則愛惜浮費當又過之臣愚欲望睿慈念財用之至艱罷土木之不急逺追文帝之美近法太宗之聖更復深軫姚坦之言則節省之益非止一端恭儉之盛冠乎百王日計不足嵗計有餘富庶之源當由于此臣狂愚妄論惟陛下赦之論六曹法司臣仰惟陛下垂意章程務極平允爰念吏部七司所闗者大修書之日詳加裁擇書成之後又為總類名目雖分條貫歸一誠以法守之地不可有毫釐之差也臣竊惟修法之事固已周密用法之吏尚有可言葢七司之法頒之四方而用在吏部長貳郎官年除嵗遷難以必其通習吏人各自行案又未必盡知源流則是用法之責全在法司夫文法之習至以名家要須明練條章旁通倫類習之有素以為術業然後可以審處是非議定輕重竊見紹興元年臣僚申請七司各有掌法案止係收掌文書即不共檢條法乞將掌法案改為檢法案内手分並于本部人吏内選差諳曉條法之人如本部無可選差許踏逐指差使掌本選之法事有不能決者聽委法司鋪敘條格然後長貳據法與奪此誠用法之要也屬縁節次降旨裁減吏額往往將外差法司充其減罷之數目今雖有法司去處亦不抽差諳曉文法之人止是就本部遷補既非素習又復遷徙案分不常其守安得明習貫穿以資闗決修之甚勤而用之不求其要誠恐有所未盡也臣愚欲望睿旨明詔攸司詳攷紹興元年指揮專置法司厚其廪給而嚴其罪罰久其嵗月而優其遷補使事有所任責有所歸庶幾有以仰稱陛下立法之至意如蒙聖慈採擇以為可行六部亦乞盡依吏部處分或恐重于多置吏額莫若隨其事之劇易吏戸刑三部則各置二名禮兵工三部則各置一名並擇曉法之吏使之專意于此長貳郎官提綱于上法司守職于下則六部之事皆得其平矣論治道任宗正寺主簿日上臣聞人主之徳與臣下不同臣下苟有寸長皆可以自見上之人捨所短而取所長則無不可以用者人主天縱多能下視臣庶是必備道全美百行衆善無一毫之歉長慮卻顧萬幾庶務無一事之失然後足以御四海而圗治功由漢以來人主鋭意修政率不過數年而怠陛下以睿哲之資臨御二十年而憂勤兢畏踰于初載臣下不足以望清光尚何俟于微臣之言猥惟人臣之事君非必皆好為諛悦葢其心每期君于善一有盛徳謨訓將順歸美惟恐不盡以期人主為善之心間有不及則敢言者寡故天下之事惟見其全之盡之也人之一身見有無受病之處天下之大見有無蠧弊之原善養病者不以無病而廢調攝善為國者不以無事而緩戒懼然後為得也漢唐賢君非無可傳之烈如高祖之好謀能斷文帝之以徳化民武帝之雄材大略宣帝之償賞必罰光武之身濟大業明帝之幽枉必逹唐太宗之除亂致治明皇之勵精庶政憲宗之剛明果斷有一于此誠足以建功立事措天下于小康然而必有以議其後而民亦有受其弊者正以如前所陳見其所長不見其不及而不能以自勉也是以堯舜之盛曰儆戒無虞曰兢兢業業一日二日萬幾湯以六事自責曰政不節與使民疾與宫室崇與婦謁盛與苞苴行與讒夫興與故儆戒兢業在堯舜為不必慮所謂六事者又皆湯之所無而聖帝明王舉其不必慮與其所無者日以自勉葢不惟未嘗一日忘天下亦惟恐吾身毫髪之不盡此漢唐之君所以不能進也方今邊陲雖靖而夷狄未賔紀綱雖舉而萬目尚疎敦勵士氣而㢘恥不振撙節國用而公私俱匱比嵗豐登民力且困重以嵗旱尤難支吾陛下日昃視朝廣求民瘼無所不用其至臣誠不佞竊希古人責難于君恥不及堯舜之意欲望陛下逺稽古昔俯鑒近代凡其可取者必思兼備于今日凡其可戒者日思所以去之如湯之六事皆今之所無亦從而深求其端倪則聖徳日日新又日新上益有以當天心下益有以澤民物以是而求所欲為者無不濟矣臣不勝惓惓愛君之心進芻蕘之言惟陛下擇焉論責成臣仰惟陛下臨政願治垂二十年孳孳萬幾興利除害誠不為少臣愚無知竊有進焉凡天下之事君相講求于上士夫獻納于下大綱小紀略已周徧而事之已議議之已行未厎于成而遂止者尚多有之臣嘗攷求其故葢朝廷議之既熟成命一頒則謂事已施行下之人奉承約束文移行遣紛紜良久則以具文告于上方其播告之初天下皆謂其必行書之記注亦曰某日行某事其實事未及竟而止矣此所以事緒徒繁奉行者無所適從良法美意日講于前而澤不得下究事不見成績故迄今算計見效未能甚稱陛下大有為之志也事有大小小者可以立辦一出睿旨隨即罷行若事涉大體所以為國家深長之訓者是非磨以嵗月不見其成且如屯田為富國之本水利為農事之要陛下最所留意施行不一然至今不見成效行之太遽者或至擾而無益行之太緩者或至寢而不報豈天下之事終不可為也臣愚欲望陛下遇事之欲行者俾大臣詳加審訂若度其行之終無益或利賴㣲末而不足行者悉從簡省若其必可行而稍費嵗月者朝廷置籍記其事端及施行之日月約事之大小為久近之期以時舉催不辦不已如此則事之欲為者皆有端緒陛下聽納之勤圖國之妙日厎于成而後治效可覩矣論宗室右選嶽廟臣竊惟國家忠厚之徳冠絶前古親睦九族無所不用其至是以慶源蕃衍人才輩出皇朝盛事尤非歴代之所可及近嵗以來修謹好學者日衆士夫敬仰之不暇此皆陛下聖徳感化之所致也然由進任子子為左選者堂除銓選各有成法無官人有孤遺請給亦足以活其家惟是官右選者人數極多往往逺外無援鮮能自抜于稠人中以求用于時添差又有限員不可多得惟恃嶽廟以餬其口州縣又以窘匱之故俸給不能一一如期所在多有無告之人歴嵗寖久員多缺少已不免待次之窘近降指揮頓減員額大約四分中幾減去其二三凡宗室之賴嶽廟以為生者待次遂至四年狼狽立見誠可矜憫如此則有官者還不若無官人孤遺請給之優陛下富有四海寧肯于天族較此毫末但以宗室不敢自言故此情無由上逹況夫禮義生于富足一有失所則流蕩為惡如水就下犯法者必衆尤非所以愛之也臣愚欲望聖慈深軫磐石之宗盡復嶽廟員闕庶得天族各遂仰事俯育之計以助成信厚之風不勝幸甚倘或聖意猶以為宂則乞明降指揮于前所減數内復三之二或且復一半之數亦可少寛目下艱窘之狀不為小補論浙江渡船臣竊惟江水之險無如錢塘不惟水面闊逺風濤可畏加以沙漲無定日有改易大駕駐蹕往來尤衆紹興初年渡舟屢有覆溺葢舟人貪利稇載以行弭櫂中流恣以乞取忽遇風濤舉舟覆没操舟者獨以善泅獲免是時留守司轉運使措置官造巨艦舟之受人各有定數立旗賣牌各有色别以賣牌之入為篙梢及補苴之費自此往來安便所利甚溥成規具在可舉而行中間一再修葺近復廢壞不惟渡舟罅漏成規亦不復遵守人畜雜糅私渡競進近者連日有覆溺之害都人駭愕行道傷歎臣愚欲望聖慈行下兩浙轉運司修造官舟務極堅壯悉舉元立約束以濟病涉之人在官司為力甚易而人之受實惠者不知其幾惟朝廷亟圗之論道學朋黨任宗正丞日上臣聞天下之大患每起于細微明者察之昧者忽焉不惟忽之復以察之為過迨其既成又已無及此天下之患所以相尋而不已也後漢黨錮始于甘陵南北二部之謠唐之朋黨始于李宗閔賢良之對本朝元祐黨籍始于二三士夫不得志之徒事之初生若不足憂横流不止害不可言今日朝廷清明豈復有此然初見端倪不得不慮是敢先事而言寧犯狂僣之誅不忍自為緘黙惟陛下察之夫道者天下之所常行學者士君子之所當務秦漢而下斯道不明誦説相夸去本彌逺國家累聖傳授敦尚斯文教風聿興名儒間出講明經術究極精微然後語道者不涉于異端為學者不至于無用恭惟陛下天縱聖性帝學高妙體斯道于已安而行之賞不輕予刑不遽施寛猛相濟無有駭政執中之傳也喜怒不私嗜好不聞隆寛盡下有言必從克己之仁也雝雝在宫臨朝尊嚴清閒之燕不見惰容謹獨之戒也清心省事湛然凝靜物來斯應無所適莫正心誠意之學也凡前儒講貫發明之大端惟是數者而陛下兼而有之臣愚何足以測識然青天白日孰不知仰而士大夫之議論則有可疑者臣竊惑焉比年以來曰執中曰克己曰謹獨曰正心誠意往往有所諱而不敢言人主躬行此道于上而士大夫反諱言于下試攷之十數年間章奏無慮千萬未聞以一語及此而又相戒以毋言孟子曰齊人無以仁義與王言者我非堯舜之道不敢陳于王前以為齊人莫如我敬王者而聖世乃有此風何耶故凡士之端謹好修談論經禮者一切指之以為道學小則譏笑大則折辱又甚則疾之如仇士之遭此者其間葢亦有以自取然而俱為士夫由學以進所謂同是堯舜同非桀紂而何相疾之甚也臣嘗讀大雅之詩曰君子實維秉心無競誰生厲階至今為梗詩人之意葢曰厲階之梗由夫好競者之為之也使士大夫操心無競則何自而至此耶臣嘗求之牛李之事雖曰李黨多君子牛黨多少人然徳裕一聞御史大夫之除則流涕寄謝至其不然則遂為仇敵嗚呼非競而生厲階者乎元祐紹聖之事又可知矣故嘗以為近習之排士夫非衰季之世無此若士夫之自相排雖盛時亦不能無之漢之黨錮權在宦官乗主之昏而肆為之無足怪者若唐之朋黨元祐之黨籍則士夫自相傾軋使人主莫知適從為害尤甚葢惟人主能用中然後可以消弭于未然而使天下不至于甚弊惟士大夫能無競然後可以衆賢和于朝而使國家不生于厲階今陛下執其兩端而用其中自不應過慮而察士大夫之間未能無競向者猶止以虛言相譏訶而近者頗有其迹矣臣愚欲望睿慈明詔中外咸推無競之心勿徇一偏之見精白一義以承明主之休徳臣前所過慮自可以消弭于冥冥之中臣不勝拳拳惟陛下裁幸論明政刑臣聞孔子曰道之以政齊之以刑民免而無恥道之以徳齊之以禮有恥且格孟子曰國家閒暇及是時明其政刑孔子以政刑為緩而孟子以政刑為先人或疑之葢一道也孔子非以政刑為可廢孟子非以徳禮為可忘葢政刑不修無以為國及其既立化乃可行仰惟陛下臨政願治二十餘年而憂勤不怠圗治日切今者中外少事朝廷清明年榖既登流莩麤息外則邊鄙之不聳内則盜賊之不興既非賢哲馳騖之秋可謂國家閒暇之日而又延登宰輔共圗事功當此之時若復玩嵗愒日文恬武熙視國之蠧弊為當然而民之疾苦為細事置而不講趨了目前使一旦有水旱盜賊邊方之警則必事出倉猝無復優暇今日光隂豈不可惜仰惟國家累聖相傳仁宗皇帝太上皇帝在位最久仁宗開天章閣命名臣條上當世急務乃在慶歴三年太上逐權臣之黨更化善治乃在紹興二十五年皆是在位二十餘年之後非若前代人主始勤終怠之比是以士氣振作朝綱不隳嘉靖有邦此實我宋之家法也陛下垂意政刑何事不舉臣愚過慮猶竊有言刑政二端所該甚廣無問内外皆在其中今日冗官之員最多而乏周用之才養兵之費最重而少精鋭之卒游手倍于農人而趨末者日衆歸明坐困州縣而冒詐者日繁問食貨則國用既虛又非藏于天下問力役則貧弱日困不能安于田里加賦之害莫甚于和買而紹興近輔之地斯民無聊未知所以寛恤之術取民無制莫甚于榷酤而行都首善之地設法尤盛日求所以張大之方水旱雖曰稍息而蝗蝻遺種尚多安得不為來嵗之慮盜賊雖曰不作而民間愁歎尚衆安得不思豫備之宜此皆政之大端也如此等事未易悉數未問外攘之説先求内治之謨如以為小康則真若無事試加思慮不勝私憂用刑之道在今日實為公平人主無喜怒之私朝廷無風旨之聞一付有司動循三尺然而四方寃獄尚多有之若無辜陷罪固當痛懲詭法惠奸亦非今典祖宗非不隨事寛宥然當是時法家者流皆是西北强毅之士堅執成法或至少恩故每使儒臣治獄讞議其間有司既不失官守而法禁亦不至煩苛今則不然用法之人多言陰徳重辟強刦亦或失刑雖曰忠厚所漸者深然有奸宄不勝之弊刑之不修此其大者臣愚竊為陛下惜此閒暇故願陛下速為永圗雖未能每事更張擴然一變豈可不深思其故使之日新伏望睿慈採孟子之至言明政刑之二柄般樂怠傲固聖世之所無苟且因循恐良時之易失臣憂國有素不敢煩瀆惟陛下幸赦而留意焉天下幸甚攻媿集巻二十欽定四庫全書攻媿集巻二十一宋樓鑰撰奏議乞正太祖皇帝東嚮之位任温州日上臣仰惟陛下聖孝冠古通于神明諒陰端憂哀禮兼盡稱天定諡博採衆説務極其當臣假守偏郡安敢妄議宗廟以干嚴誅自以世受國恩蒙被使令有懐不言是為欺天臣竊見近降指揮恭為大行太上皇帝升祔有期增置太廟一室以奉神靈臣不學無術又在逺外道聽塗説嘗有見聞臣居明州近故龍圗閣待制趙粹中寓居臣鄉里聞其任吏部侍郎日曾進廟議請觀其書熟復其説臣既擊服粹中亦深自慨然至于流涕葢謂太祖皇帝開基創業之盛而不得正東嚮之尊攷之典禮稽之古誼本無可疑熙寧五年首以王安石之臆説變亂古制陰使章衡倡為謬論雖名臣如馮京梁夀盧士宗司馬光等力辨而不能回孫固反覆論議僅得不廢配天之祀而東嚮之禮竟不獲伸紹興五年董弅建議孫近李光折彦質劉大中廖剛晏敦復王俁劉寧止胡交修梁汝嘉張致逺朱震任申先何慤楊震莊必彊李弼直皆是其議趙煥奏陳尤力太上皇帝擢弅為侍從渙為監察御史言已行矣而一趙霈獨不以為然徒以諫大夫之重議不出已横加阻抑然猶畏公論不敢非毁但以徽宗在逺未當專議遂寢其事淳熙元年粹中以當時羣臣所奏悉加銓次為陛下言之既蒙睿旨下之禮官國子司業戴幾先兼權禮部侍郎力沮其説而言無經據粹中又進闢異一書深切著明終亦不行臣詳叩之粹中言幾先本不足以搖大事葢嘗密言于執政以為太上皇帝萬夀之日未應議此以致中輟今大行太上皇帝方將袝廟維其時矣陛下親承付託以太祖皇帝七世之孫奉紹興五年制禮之遺意取粹中所進一書申命討論正太祖東嚮之位參先朝羣臣之説定我宋宗廟之禮省有司增室之役為萬世不易之法以慰列聖在天之靈臣不勝大願不敢茍避斧鉞失今不論後實難言使他日未先狗馬填溝壑雖有可言之路亦已晚矣惟陛下赫然英斷舉而行之實天下幸甚貼黄臣照得粹中所集廟議及闢異等書又有雜説一編皆已經進御或恐内府深藏未易尋究臣嘗傳録副本乞降敕旨取索謹當繕寫投進臣伏以宗廟之事事大體重不敢聞于外庭如蒙聖慈不以人廢言伏乞睿旨以粹中之書出自聖意付三省施行臣職居逺外合具奏狀正以事當嚴密恭讀中興㑹要紹興三十一年四月二十四日太上皇帝宣諭宰臣曰臣僚于利害奏劄士大夫自合親書不須計較字畫工拙敢循故事以劄子親書投進仰乞睿照論恢復知温州被旨奏事臣仰惟陛下親受至尊夀皇聖帝付託之重兢兢萬幾惟日不足天下之事不勝其繁臣愚以為當先立乎其大孔子于魯則先三家于衛則先正名豈無他事可為葢莫先于此也國家之大者莫先于恢復之計君臣之間所當朝夕以謀之而在天者有數存焉不可以强為也高宗立國于兵戈擾攘之中保全東南兼愛西北葢三十六年而傳之夀皇夀皇即位之初慨然有志于中原練兵選將躬親騎射以作士卒之氣不惟時未可為正以高宗年高厭兵聖孝承志終守和好以修内治葢二十八年而傳之陛下陛下念祖宗積累之業痛二聖播遷之禍承兩朝未集之勲軫遺黎陷溺之久今日之事豈復有先于此者臣在逺外固莫窺廟謨之祕若自登極以來詔令為民而下所以戒飭士夫警䇿將帥皆足以感動人心今又講蒐田之法人固已知聖意之所在臣猶有言者非敢勸陛下好兵亟戰挑強鄰開邊釁縱將士以邀功而生事也誠願陛下專以恢復之計為心旦旦而思之嵗嵗而圗之陛下果篤志于此祈上天之助順則畏天之心益謹望祖宗之陰祐則敬祖宗之心益篤思欲如唐太宗俘頡利以奉神堯之歡則事親之孝益至以至欲圗外攘必先務内修則政事日以舉欲謀西北先保東南則邦本日以固非將相無以佐大業則求文武之才必備非儲蓄無以舉大事則用天下之財必儉務求忠良節義以備使用則讒諂面諛凡可以害吾之治者不約而自退務養神氣精力以待事機則宴安嗜欲凡可以傷吾之生者不戒而自定邊防以修軍政以嚴如此則遲以嵗月雖甲兵未動版圗未歸而恢復之計成矣一旦天道好還天心悔禍文武之士雲蒸霧集王師順動豪傑響應則大計可舉于以攄高皇之宿憤焚老上之龍庭奉萬年之觴為重華之夀而後陛下之孝道光矣國家之大恥雪矣若非及今而圗之事機之來豈能以一日之力而得此哉臣區區愚衷犯分進説惟陛下裁赦乞寛茶鹽榷貨之法臣聞古者官養民後世民養官葢古有井里之法民生而授之以田法度明備養生無憾是官養民也自井田法壊流弊日久尺寸之地無非斯民交易以為世業而出其租税以供公上此民養官也後世用度日廣什一取之而不足又重取之又有曰茶曰鹽與夫𣙜貨之屬皆出于山澤之利民取之以自養者酒所以成禮所以養生古惟以沈湎為禁而後世榷之凡此數者國家既擅其利以供養兵與支費之大端其勢不得不立法以禁切之豈特使利孔專出于上亦所以抑制豪强恐其專利以陵貧弱也為政者要當究其本源而興利聚斂之臣不思大體繁文日增至于今日網密甚矣搖手犯禁非所謂易避而難犯細民貪利法出奸生不惟不足以勝之而奉法之吏臨事雖欲坐以深文亦有不得而盡行者使其盡行必致生事蘇綽在西魏以國用不足為征税頗重既而嘆曰今所為者正如張弓非平世法也後之君子誰能弛之臣嘗感其言而智識短淺未能為國家建畫長䇿若從而輕之又恐愚民無知抵冒益衆欲望聖慈軫念元元謂設禁者本有不得已之意而犯法者初非甚可罪之人或有不體國家寛大之徳于是數者更有陳請重設法禁視平民如冦仇于見行條法外創意增添之者惟陛下一切寢而不行甚者或懲其妄言播告中外使天下知聖意之所在則斯民陰受天地之大賜所以保護元氣而夀天下之脈者或在是矣論訓練禁兵臣聞天下雖安忘戰必危自辛巳甲申用兵之後天下狃于無事兵備寖弛夀皇聖帝長慮卻顧外欲為恢復之圗内欲修固本之計申飭州郡訓練禁兵立揀中之額有路鈐按教之法有朝廷㸃摘之制雖未能盡為精鋭而每州各有數百人可用俾兵威日振盜賊帖息可謂明效大驗矣臣試郡海瀕恪遵故事月自按試以行賞罰不敢不謹而猶有可疑者兩軍決戰弓弩可以及逺而短兵可以角敵較之二者則短兵之用尤多軍器固不一而足大約弓弩鎗牌長刀皆不可不習至如擊砲以禦敵馳逐以據險皆當習于無事之時乾道元年專降指揮禁軍武藝只得教弓弩手餘外武藝更不教習軍士有長技而不得自見既以阻其勇氣亦恐閲嵗因循無所激勸日成廢墮萬一欲用必至扞格至如定礮之類尤非一日可習州郡但知奉行指揮而逺慮不可不及欲望聖慈旨下三省樞密院議定速賜行下依舊制閲習于軍政誠非小補論保治任攷功郎中日上臣聞無虞者盛帝之所戒無難者聖人之所懼持盈守成大雅所以稱太平之君子也高宗皇帝中興之初身濟大業時巡東南艱勤百為葢十餘年而後小康晚有辛巳之擾兢畏克終以享九齡肆我夀皇聖帝受禪之初鋭意有為加以甲申之警雖卒從和議而經略之志不忘益勤萬幾聖徳日新比年有旱潦之災寅畏天戒廣求民瘼四方章奏惟恐不聞蠲放惟恐不多賑䘏惟恐不至愁歎化為謳吟奸盜為之帖息脱履萬乘以授聖子二帝相傳體堯蹈舜冠徳百王皆由兢兢業業以致此崇高之盛陛下承熙洽之運膺付託之重垂拱以視天民之阜誠千載之一時也縟儀鉅典次第蒐舉又足以為太平之榮觀也中外靜謐邊鄙不聳夫何為哉況復仰遵夀皇之訓日晏坐朝孜孜聽政講論經理篇帙有加為臣子者何以仰贊聰明然區區愚忠不勝愛君憂國之心以為無難之世易于因循此如人之一身時有小疾則飲食起居動知戒謹固有尫羸而夀考者强壯之人未必無病血氣尚盛多恣所欲疾偶未形因謂之安此固良醫之所懼也孟子曰國家閒暇及是時明其政刑今日之無事實陛下聞暇之時也改元之初三宫徽號之儀長秋冊寶之禮皆不可少後自今凡稽古禮文之事動有重費而無益于治道姑俟于施行務求實效無事虛文軫未雨徹桑之言思大寒索裘之戒旦旦而圗之使事事有備先為不可勝以待可用之機以保盈成之業于無窮天子之孝顧復有大于此者乎論流民臣試郡永嘉本無善狀既迫替期誤蒙陛下收召使備郎列二年之間粗知利病近聞有流徙之民日夜念之民生豈欲輕去鄉土自非水旱太甚何忍散流去嵗早禾成熟人心晏然螟蟲為孽所損不多晚禾未登偶缺秋雨然未至甚害也而流散不已州郡既為之減收苗米招來海商存撫賑䘏雖得少定而去者已多不得不為之計也臣聞富弼賑濟之政在本朝最為稱首然攷其時弼知青州本自無事流民乃自河北而來弼不以非吾土之民而不任其責調護惠養委曲周旋迨麥熟而歸又予之以道途之費收其强壯以備卒伍今日亦可倣而行之古者徙民歸鄉其徙必有法其歸必有處今之流民扶老攜㓜顛頓暴露不知息肩之所其有親戚知識以為歸者無幾率皆茫然逺去以僥倖萬一未至淮上其狼狽于道者已多至而失所則老弱轉乎溝壑壯者不為盜賊則或為好人誘畧北去以為奴婢無復生還之日又可慮可哀也臣愚欲望睿慈興念愚民早賜處分行下兩淮監司帥守條畫措置如其已有所依未能自還者聽其自便苟無所投吿願歸而不得者量給貲糧使之復歸如此等人亦足以語化鄉里使之安土重遷其願備卒伍者欲貸種糧者有宫君子各以富弼之心為心隨宜措置救于瀕死之際其所以救民心而鎮邊服者于是乎在條目聽其自為俟其事定各以給貸招撫之數申聞庶幾官無重費而無知之民不致陷于飢餓之水火實國家之仁澤也乞罷温州船塲臣竊惟官冗甚矣而未易遽去其有無用之官徒費廪祿而一司之費又為甚多貽害公私者不可不去也温州有造船場一司究其建立之初本因高宗南巡駐蹕臨安漕臣一時措置謂漕舟全缺而良材興販自處過温以入于海者衆于是置船場立抽解是時材木不可勝用客販既盛而漕計有餘州郡係省之錢可以支撥嵗造百艘以供漕運誠一時之利也爾後本司自有船場又近地如明州華亭亦皆造船足以供轉輸之用今則山林大木絶少客販不多係省不足以給費本司亦知其難辦嵗朘月削毎年止造十船而一司尚存凡費如故其所謂益于官者不過十舟若就辦于本司及近地之船場不甚費力請言温州之為害者監官初止一員既增其一已而又增遂為三員雖是宗子添差而皆釐務請給人從並同正官則有俸給之費所養工匠則有衣糧之費造船之日又添以米十舟分為春秋兩料除材植取于客販抽解貼買不多而有鐵炭灰油之費其起發而來也以運河平底之舟而行鯨海不測之淵虛舟既不可以進勢必載私商客貨其中逺出海港而復攬載不可禁察又有將校借請篙梢犒給之費少或半載多或數月而後能逹多有覆溺沈破之患此其官司所任勞費之目也若其煩擾百姓則又甚焉十舟梢工輪差永嘉縣有田産船戸每船所用水手則又泛差諸縣瀕海之細民為之此曹各有漁業深憚此行吏人乘時為奸追擾迨遍始得人足其實不用自行率以雇人之直納于梢工始得脱身萬一船敗于海上將校等人均償不足又以其名籍追元差水手勒使填還間一有此嗟怨尤甚臣在任日先究此弊每水手一名除追呼譍官之費錢之實及梢工人止六貫有奇遂舉一嵗之數官為出數百緡而罷水手之差又恐吏輩久復擾之盡取諸縣水手名籍俟其齊足焚于公庭海瀕細民始得休息然此司不罷終為勞費而于漕運甚闗利害臣愚欲望睿慈特降聖旨行下轉運司及本州罷去此司以惠一方監官姑給添差之俸聽其滿攷已差下人省罷兵匠收隸廂軍其抽解及排岸司職事使監税官兼之既無造船之用則客販抽解亦當蠲減省一州之煩費息百姓之追擾少助仁政之萬一不勝幸願貼黄臣嘗略會計一嵗之費造船工料官兵請給衣糧起發等為錢三千六百貫有奇米七百餘石監官衣綿將校借請在外伏乞睿照轉運司若以為難乞令本州詳具細數除官兵請給衣糧外如丁鐵等費及抽解木植出賣量認錢數每年發赴本司以裨造船之費論寛刑罰臣聞刑罰所以懲奸也然聖王用之所以弼教非得已也人主之用刑惟當務寛皇朝專以仁恕得天下之心列聖哀矜惟恐一物之失所陛下遵有宋之家法紹夀皇之心傳臨御以來仁恩徳澤浹洽無外用刑之際尤軫聖心誠斯民之幸也然有司奉行惟上意所向自古已然唐太宗時自張蘊古之刑法官以失出罪為戒時有失入者人不加罪嘗謂大理卿劉徳威曰近日刑網稍密何也對曰此在主上不在羣臣人主好寛則寛好急則急律文失入減三等失出減五等今失入者無罪失出更獲大罪是以吏各自免競就深文初非有教使之然畏罪故爾倘一斷以律則此風立變矣帝悦從之由是斷獄平允此最千古之龜鑒也夀皇聖帝事事寛恤尤謹于刑乾道元年之冬刑寺定斷陸知微兄弟三人冒官之罪太輕夀皇震怒刑部侍郎王拂大理少卿陳良翰放罷其餘郎官寺郎各鑴一秩天下咸以為當然在是時正如徳威之言頗有各求自免競就深文之弊至次年春三月夀皇聞之亟下手詔曰獄重事也用法一傾其平則民無所措手足比年以來治獄之吏大率巧持多端隨意援引而重輕之故有罪者興歎而不辜者罹酷朕甚患焉卿等其革玩習之弊明審克之公使奸不容情罰必當罪用迪于刑之中勉之哉其聽朕命毋忽大哉王言過于太宗逺矣自時厥後刑為之平邇者科舉之病太甚其欲革而去之葢不止上之人之所欲也潘顯伯兄弟之獄在兄弟私情則若可恕在貢舉條制則無可逃有司定罪太輕至勤睿斷所謂非常之斷人主專之衆論無不稱快愚臣過計乃竊憂之葢自陛下龍飛之初覃霈所及與民更始寛恤之詔聮翩而下四方日有刑措之望此雖至公之舉終是罪重刑輕況復罰自近始官僚之外上至刑房之吏下及刑寺之胥無不責罰固足以懲奸矣而猶有所慮者官吏震恐或有便文自營之心則讞議之際寧免傅致深文以圗自免者唐太宗以仁恕為先夀皇聖性隆寛中外具知然前事如此則知陛下雖本無尚嚴之心而天威所加事迹相類或恐未免有競就深文之弊臣區區私憂懷此累月矣既已輪對奏事無路自逹敢因轉對傾心獻忠欲望睿慈深加矜察鑒太宗之咨詢體夀皇之詔旨酌徳威之至論審事迹之近似出自聖意特賜處分或未欲顯頒詔令乞命大臣明諭至意俾持刑官吏毋以此事自艾務從平允以稱明聖審克之心天下幸甚臣一介疎逺不勝愛君之心昧死有言罪在不赦伏惟裁幸攻媿集巻二十一欽定四庫全書攻媿集巻二十二宋樓鑰撰奏議雷雪應詔條具封事任國子司業日上臣某准紹熈二年二月六日尚書省劄子三省樞密院同奉聖㫖近日隂陽不和雷雪交作朕恐懼修省殊不遑寧深慮庶政或有缺失未能消弭可令侍從臺諫兩省卿監郎官館職各條具時政闕失聞奏臣備數學省目覩雷雪之異竊攷咎證無路進言伏讀明詔陛下上畏天戒俯詢朝列此而不言臣則有罪臣仰惟陛下承列聖之正統受夀皇之付託即位以來雖有憂勤之心而初政所施未有以大慰天下之望天之仁愛陛下亦至云矣去嵗皇緯失度其甚異者太白經天臣庶雖知而朝廷不聞有消弭之舉天意正以星文不足以示異故以雷雪之變發于都城不用清臺之測驗不待臣子之奏聞三尺童子亦知其為災異此天意之彰彰者也陛下發德音訪闕失此心固足以對越上天然須見之行事之實然後足以應之其他春秋之書五行之説陛下必已熟見瑣瑣細務又不足以敷陳臣請言其大者要者昧死條具如左須至奏聞者一雷者陽也雪者陰也陽氣震動蟄蟲奮起雖稍先時猶未為甚雨中間有小雹人已驚駭至于庚辰之朔晡時雷電大至天地晦冥久之方㪚雪霰繼作夜以至旦盈尺不已辛巳之夜又復增積寒氣凝冽幾不可堪是何祥也陽者天道也君道也夫道也君子也中國也陰者地道也臣道也妻道也小人也四裔也天意昭然過于告語惟下至誠惻怛應天以實察察災變之彰明覽時政之已行陽氣方興而陰沴侵陵乃至于此此不待屢數而後可知惟陛下聖明黙㑹天意防微杜漸曲軫宸心然後可以消弭矣一自古人主遭值災異者多矣請以成湯宣王之事明之湯之禱旱于桑林以六事自責曰政不節與使民疾與宫室崇與女謁盛與苞苴行與讒夫興與成湯不邇聲色不殖貨利以義制事以禮制心顧安得有此六事而深以自責若不能自容者此所以消弭天災而反致勃興也宣王中興大雅以雲漢為首竊嘗攷之止言靡神不舉靡愛斯牲上下奠瘞靡神不宗敬恭明神宣無悔怒若歸過于百神者蓋宣王之意以為祀神如此不應致有災變其所以至此者必由于我其刻責之深又過于成湯反已之切乃見于言外序詩者所以稱其側身修行而王化復行實始于此臣願陛下逺鑒桑林之禱六事雖無亦當自責一或有之改過不吝三復雲漢之詩至誠反已祈以應上天仁愛之意則聖德日新今日之異適當為後日之祥也一臣仰惟陛下初在恭邸英毅神武之姿觀瞻甚聳比登東宫天下屬心猶恐陛下他日或偏于剛嚴聖學日新高明柔克一于仁厚動以仁宗為法率循夀皇之訓天下涵泳聖化實宗社萬世之福也然臣聞之天以剛健為德君以法天為先臣願陛下體剛健為徳本而以仁厚行之剛則不為物所移健則不為慾所怠杜請託之私絶牽制之累如禹之惡㫖酒孔子之放鄭聲則君德日隆于上朝政日清于下而始郊見矣大抵疏逺之臣惟願陛下之憂勤親密之臣惟願陛下之逸樂憂勤則幽枉必達下情得通而膏澤及于民矣逸樂則伺候顔色干求恩澤而私意得以行矣陛下自雷雪之變必且憂形于色宵旰興歎是數日間干請必少此皆切近而易察以此推之聖心憂勤恩倖自逺茍日謹一日雍雍肅肅宸襟泰然淵靜鑒明以照百官其視宴遊之惑豈不相萬此非以剛健為本寧有此耶故臣以此為應天之要一臣仰惟仁宗之治最為盛際陛下所願取法臣觀仁宗專以仁厚養天下而紀綱甚嚴者最以言路之通也大臣奏事或至于首肯内廷請謁未免于付外然崇奨直臣妙選臺諫一言可取斷在必行臣不敢以累數都尉李瑋之貶司馬光敢言公主亦不得無罪此骨肉之愛也遂至䧏封王徳用進女王素敢言正為其親近此袵席之事也立命出之言者無罪而主德益盛此其所以為仁宗雖唐太宗之聽諫勿及也比年以來朝行不聞直聲而有以多言被黜者雖蒙寛恩止從外補不加之罪然士氣消沮無敢出位而論事者況自去歳又聞宣諭攀援有封駁諫諍之職正以維持國論主張公道干請攀援有出于法例之外者陛下間亦有不得已應之外庭有言遂與寢罷在陛下不為傷恩而有司得以執法法者陛下之所以與天下共此者也若開宣諭之門則廢有司之守不及今制之日加一日其何以為紀綱耶臣願陛下力開直言之路杜塞宣諭之門毎以今日求言之切為心則治道不患其不舉矣一臣仰惟夀皇之治始終不渝陛下得于親傳臣親夀皇二十八年之治不可形容而其卓冠于百王者非止孝儉之德最以憂民之憂不以災異水旱為諱聞之惟恐不早救之惟恐不盡蠲放惟恐不多至于竭倉廩傾帑藏以赴其急乃者水旱連年人心惶惶若非夀皇焦勞于上有司奔走于下竭力而經營之則必有盜賊奪攘百姓流離之患矣豐儲倉所以為中都之備一時欲用出聖斷排羣議積貯為之一空俟其事定收糴隨足人心愛戴天意協佑旋致豐穰此真萬世之法臣願陛下畏天之威光紹謨烈遇災而懼不以為諱專法夀皇力行消弭之道臣下有隱而弗言者隨事之小大罪之則天下曉然知聖意之所在矣一臣嘗竊究國家中間陽九百六之㑹一時臣子誤國非一而蔡京為首京之誤國非一而其甚者無如御筆之一事臣三修玉牒因得攷本朝時事之變祖宗累朝未嘗輕以御筆處分外事神宗作興凡事多出聖裁雖邊徼細故亦煩親灑是時蔡京方為檢正建請差官置局編類為書遂委京編次此蓋老姦相業之本也徽皇之初京既收召一旦得君欲逢主意固相位排同列闢公議行私心變法度崇虛文遂創御筆之制違者以違制論事由于京而書出于徽皇權歸于京而過歸于徽皇時假制禮作樂之名間以惠民之事以文過餙非御筆一下無敢議者其初猶有正人在朝間有執奏京欲其必行又改其法違者以大不恭論凡有異議即致竄逐而紀綱益以紊亂然京自為之未至于甚比其再相以至三入寵任既不及舊御筆一從中出京亦不知所為商鞅立法親受其弊雖欲支吾不可為矣敗國殄民尚忍言之此實萬世之龜鑑也陛下兢畏恭儉固必萬無此事然人主作事動為天下後世之法其端亦不可輕啓臣願陛下一遵祖宗之法戒節有司之守條章明備動皆有則如有非常之斷固在陛下專之其餘細務悉有法在宸翰處分謹之重之若天之雷霆其發必以時而不至于䙝乃所以强主威也一臣聞元符三年九月辛卯鎮洮大雷自初夜至四鼓一百三十餘震牆屋搖動簷瓦㪚墜人人有覆壓之懼黎明視之雪深二尺熈河機宜文字李復言于師臣胡宗回曰雷風天之號令其發多于盛夏今秋且盡震暴非當終夜不息而又六雪殆將有不測之變因為規畫密諭守将嚴備又以兵守邈川緩急相應援越月羌果叛攻陷城堡賴有豫備得以破之熙河以安今日銷變之事無所不當慮雷雪之為災雖不至如元符然金人之强狡實萬倍于青唐邊備未堅臣實憂之欲望陛下俯採李復之言申飭諸道邊師修備固圉以防不測之警論進德養生任起居郎直前奏事臣聞養生可以進德進德可以養生人受天地之中以生所謂命也是故中也者天下之大本也和也者天下之達道也喜怒哀樂之未發謂之中發而皆中節謂之和是道也所謂以之為己則順而祥以之為人則愛而公以之為心則和而平以之為天下國家則無所處而不當堯舜禹之相傳以執中湯之建中武王之皇極皆此道也人之氣也沖然而甚微泊焉而易危既不可過盛又不可過弱惟得其中則養生之要也人之心也操之則存舍之則亡既不可甚勞又不可甚逸惟得其中則進德之要也茍能于日用之間謹言語節飲食寡欲而固其本省事而清其心平喜怒之發端戒愛憎之私徇内外交養表裏如一則夀命可以延長盛德可以日新矣仰惟陛下以天縱之資撫盈成之運精一之妙固已得之夀皇之親傳臨御以來立政用人行以大中至正之道黜陟之際惟公議是從是以朝野肅靖海内小康皆中和之效也去冬違豫旋慶康復竊究所自殆恐有差其所謂中者臣誤蒙睿恩擢寘柱下所當罄竭以效萬一天下之事未敢具論惟望聖聰俯聽愚言養生進德俱以中和為本視聽言動率務戒謹飲食起居不使過差喜怒之發無所容心事有可喜從而喜之非吾之所喜也事有可怒從而怒之非吾之所怒也如是發必中節不致一偏萬幾雖繁使百官有司各任其職陛下以大中之道酌其可否一吁一俞可以坐判聖心休休保合太和日復一日不惟帝德益隆心廣體胖神氣舒暢雖有陰陽愆伏安能為吾之患哉臣言雖膚淺意則甚篤冀有益于清躬伏惟陛下裁幸論郊廟之禮臣竊惟郊廟之禮國之重事非臣子所當輕議然事有戾于古而又不宜于今茍得其説不可不陳也仰惟神宗皇帝鋭意作興鼎新百度專置詳定郊廟禮文所命儒學之臣博攷古今裁定儀制帝親臨決而著于令凡今日所行多出于此臣嘗恭覩神宗實錄元豐六年有太常丞吕升卿建議郊祀致齋事理甚明雖不見于施用而史臣載其全文有以知時論必以為是特未見于用爾臣敢約其大略而言之升卿謂郊祀致齋之内不當先詣景靈宫及太廟朝饗遂罷景靈宫諸殿朝謁而天興殿及太廟時饗如故則是其言非不見用特行之未盡爾其言凢有天下者莫重乎饗帝厯攷載籍不聞為祀天致齋乃于其間先饗宗廟者也獨有唐天寶之後用田同秀言立老子廟號曰太清宫是嵗将行郊祀以二月辛卯先躬饗焉祝用清詞饋用素饌甲午又親饗于太廟丙申乃有事于南郊雖論者以為失禮然攷其所齋之日及辛卯饗于太清宫至丙申殆且五日猶得雍容休息以見上帝也今致齋三日其一日于大慶殿而用其二日三行禮焉古之大祀未有不齋三日而敢與神明交者今行禮于天興殿纔齋一日爾其之太廟與郊宫前祀之一日皆嘗用之矣謂之一日之齋尚非全也夫用一日之齋以修大祀未見其可況非全日乎于此奉宗廟則齋之日不足于以奉上帝則齋之義不専論者曰宗廟之禮未嘗親行故因郊祀躬展薦獻臣曰不然人主于宗廟之饗固當嵗時躬修其事其不親饗者蓋後世之失禮也必因郊祀而行之則義尤不可以為郊禮宜如故事致齋于大慶殿二日徑赴行宫其宗廟親饗並乞寢罷天興殿朝饗乞更不行俟禮畢而恭謝别修太廟躬祠之制毎遇行廟饗之時則罷景靈一孟朝謁之禮廟饗廟齋乞于内殿車駕出人如常儀如此則祀天饗廟兩得其當此皆升卿之言也臣三仕于朝屢祗祀事凡曰大祀致齋三日惟祀事得行其餘悉禁蓋專致敬于所祭也而郊廟明堂大禮致齋三日之内鑾輿再動百官相祀陪祠駿奔惟謹上下俱不得盡致齋之義又太廟行事極于跛倚幾至僵外而以此跛倚之餘致齋于郊宫雖强有力者亦苦于顛頓而恭敬之心衰矣臣愚竊所未安而不敢輕議既得升卿之説敢採之以獻于陛下仍錄其全文及唐明皇變禮之因列之于前以備採擇伏望聖意謹重祖宗舊典不欲盡行升卿之言臣又從而斟酌其説欲望睿斷改定儀制毎遇大禮用故事停景靈冬季孟享而于孟享之日行朝饗天興之禮太廟嵗五大饗止于當郊之嵗或烝或嘗親行其一祝詞仍以郊天先告二者致齋並于内殿車駕之出止如常儀專用三日之齋以事上帝陛下得以齋心養性對越上天君臣無併日之勞有司省供億之重攷古驗今于禮為稱仍乞明詔二三大臣俾侍從臺諫兩省禮官及今集議其當裁定一王之儀其他赦宥賞賚悉如舊制革天寶之變禮以無失祖宗奉天享廟之本意實天下幸甚論諸州奏案宜引臣竊惟獄者天下之大命也厯代聖帝明王之所甚謹若夫欽恤忠厚又未有如本朝列聖之極致者也臣區區愚忠懷此久矣敢先極論古今之事而後備陳當今之宜惟陛下垂聽夫殺人之事世所不免使甲能殺乙而乙之子若孫殺甲以報之可也如此則将交仇而不已故先王制之刑辟命之士歸以爾之仇麗吾之法而後大定然甲之殺乙則既殺之矣士師取甲而誅之雖以伸乙之冤而士師實以生者就死地死者不可復生脱有錯誤悔之無及又況箠楚之下何求不得間有誣服遂致冤濫此先王所以戒謹詳審惟恐其不至也自古平治之世必以省刑罰為先嘗求其故矣唐虞畫衣冠而民不犯則曰罪疑惟輕功疑惟重與其殺不辜寧失不經而後好生之德洽于民心成康囹圄空虛凡四十年則秋官司寇之書極其詳備三代以還享國之久者無如漢唐漢四百年始于約法三章唐三百年基于太宗嵗斷死刑二十九人惟我國家太祖以不殺而得天下高宗以不殺而啟中興累朝仁厚度越千古太祖嘗讀堯典歎曰堯舜之世四凶之罪止從投竄何近代憲網之密耶蓋有意于措刑也故自開寶以來犯大辟非情理深害者多貨其死有司言自二年至八年詔所其死嵗至四千一百八人仁宗凡有疑慮奏裁者率貸其死嵗至活千餘人國祚靈長民心固結凡以此也今之士夫不深察其故論重囚則曰漢高祖約法三章殺人者死安有殺人而不死者乎論强盜則曰太祖立法強盜贓滿三貫足皆處死今强盜之法為太輕臣又嘗求其故矣秦之苛酷以微罪而坐死者甚衆如曰誹謗者族偶語者棄市之類不知其幾商鞅論囚渭水盡赤豈皆殺人者乎天下愁怨相率而叛之故高祖約之曰殺人者死蓋言惟殺人者死爾其下云餘悉除去秦法則其他死罪皆去之矣此秦民所以大悦亦非曰殺人者必死也律文諸强盜及傷人者絞殺人者斬古之中制也而唐元和之敕京兆府奏應擒獲强盜不論有贓無贓並集衆決殺則已重矣周顯徳之敕應持杖行劫不問有贓無贓並處死則又重矣本朝規制日趨于厚由今視之故以太祖之法為重不知其時正欲革五代之弊法而務輕之也是二者不知深求其故反以藉口可乎今日朝廷清明刑罰當罪雖州郡以案乞奏裁有司皆詳處既不濫及無辜又不至縱奸太甚然臣毎疑州郡成案恐未必一一是其本情近有乞奏裁之獄悉以原勘始末案款繳申大理寺使之反覆閲實然後奏聞報決臣竊是之然恐事至太煩又從而講究其説欲望睿慈明詔有司奏裁之案合貸命中自依見行條法遇有情理無可憫行下依斷者仍下本路提刑司取索本州原案併碎款一一詳審若無可疑則行下依斷隨即回申或見得碎款情節與成案不同則當懲治官使情弊或鹵莽之罪庶幾間有冤者得以平反實有罪者無所幸免獄吏知畏不至文致重辟益廣陛下好生之徳比之盡取碎款者既得大體而于朝廷明謹之意益為詳盡天下幸甚貼黃臣竊見諸州奏案惟是蜀中州郡者盡錄原情碎款列于成案之前若陛下更欲詳盡乞下刑部擇蜀中奏案碎款詳備者鏤板行下諸州令依此式樣備錄碎款奏聞尤為幸甚論君道難易内引臣聞孔子曰為君難又曰如知為君之難也不幾乎一言而興邦乎仰惟陛下以一人之身膺上天之眷命承祖宗之基上則奉兩宫之養下則應萬機之繁在陛下可謂至難矣然陛下所謂居得致之位操可致之勢而又有能致之資威制强敵恢復中原興起祖業以大一統謂之難可也若曰承兩朝付託之重保境而養民以為内治之事在陛下初無難者兩宫備天下之養一月四朝已有定制如期盡禮則事親之道昭矣大昕受羣臣之朝興居出入皆有定時夙興聽斷則君臨之道宜矣飲燕有節則聖躬日康賜予有度則財用日積採公議以用人才則衆心服開言路以廣聰明則下情通示㢘恥則可以全士夫之義嚴典章則可以杜僥倖之門聞四方水旱之事勤而撫之則可以消弭盜賊之變知四方事機之萌敏而圖之則可以折奸雄之心國家南渡以來高宗披荆棘以立朝廷壽皇振綱紀以保治安凡今日宫室之宏麗宗廟之嚴飭百司庶府之備具三軍萬姓之阜繁皆非一日之力陛下安享盈成之業宜無難者天下當為之事固未易以一二數如前十者陛下念茲在茲日謹一日則事之大者已得其要事之小者當隨以舉矣臣之所陳陛下勤而行之俱為易事舍而弗圖難斯至矣又況人心易感上德易見事有不當于人心能言者皆能議之聖心一日見于施行則人心翕然何啻風之偃草今日大端不過三四明斷之下俄頃可畢而稽留不決遷延日久四方傳聞徒駭觀聽此在陛下尤不為難古人責難為恭而臣顧以為易者義固不同言各有當其為愛君之心則一也伏惟陛下裁察論君心臣一介孤逺比者待罪左史兼攝西掖感激恩遇不敢愛身間有論奏皆非得已上觸天威下忤人意朝夕惴懼以俟譴呵乃蒙聖慈俾遂為真周章控辭既不獲命退慚僥冒黽勉就職益知陛下不以言罪人而以言取人不惟赦之而又進之有君如此惟當勉竭以報萬一尚有孤忠可以自效天下之事不可勝陳愛君愈切尤不可茍深思熟慮不若求其至要者言之宗廟社稷之重四方萬里之逺係于陛下之一身陛下之身主乎陛下之一心臨御以來兢兢業業惟恐一事之失度一物之失所周思卻顧若不能自已向者數事雖若久而不決處之詳慮之審天下之以為是者陛下終以為是公議之以為當然者陛下終以為然方其未行人人顒望及其既行中外稱頌側聞陛下晨興之後未御昕朝澄心靜慮以待機務天德清明夜氣沖和照臨百官是非瞭然此真社稷之福也欲望睿明保持此心終日乾乾盡善盡美無可言者或恐勤勞萬幾不無游息之時退朝之暇從容良久更以一二時頃凝神儲思翻閲奏章或可或否不以人廢付之大臣使擇其可而行之則天下翕然知陛下之明斷無甚難者願垂聰聽擇而行之天下幸甚論賑濟臣仰惟陛下誠心愛民若保赤子比以諸路州軍去嵗荒歉去處各賜度牒以為賑卹之備此真為人父母之意民之受惠不知其幾然臣嘗在州縣備見荒政之修無有上䇿蓋年穀豐熟之時家給人足上之人不過撫之而已一旦嵗事不登舉無涯之衆而欲仰食于公家雖有孔墨之智亦将不給若州縣之官盡心竭力力之所及者廣則民之獲濟者多所謂博施濟衆堯舜其猶病諸況今州縣少有儲蓄倉猝無以為備今方春首傳聞宣池沿江等處流莩相望狼狽失所若非朝廷倍加拯救老弱轉乎溝壑壯者或肆敚攘稍失撫御起為盜賊特未可知度牒之頒在國家所捐雖多恐飢民未能遍及竊見沿江諸州尚有樁積米斛非特㫖不敢支動積之嵗久陳陳相因欲望聖慈出自睿斷行下諸路凡有合行賑濟去處亟加措置將樁積見米隨宜糶貸以濟急闕鄰近州郡亦許支移仍責官司以所糶錢候秋收日糴還今春幸得膏雨二麥可望此去麥熟尚有四月勸分之數恐亦不能接濟國家以樁積之米捐以予民猶不為過況賑糶于急缺之時收糴于秋成之後既可大慰民心又不妨以陳易新為經久之利惟陛下亟圖之攻媿集巻二十二欽定四庫全書攻媿集巻二十三宋樓鑰撰奏議請車駕過重華宫第一劄臣仰惟陛下承夀皇付託之重以天下養猶恐未足以報天地之恩乃者間以聖躬違豫積廢起居宸心靡遑寧處正月九日千乘萬騎衝冒風雪中萬衆歎仰以為天子之孝前古未有後又以瘍疾不出者幾半年雖臨朝如禮而外人久不瞻望天表進香之日無不鼓舞以為吾君康復久矣景靈宫以四孟分詣者道逺不可太勞非得已也重華既近會慶在邇鑾輿一動自此五日一朝之禮必如平時乃二十二日有司命戒于夙昔羽衛環立于廷中百官趨班拱俟鳴蹕而燭殘日出寂不聞聲相顧失色謂邇者陛下無故而不一視朝已駭羣聽今日何日安有不出之理列立又久之進退不可臣以待立為職法許直前使是時得望清光必且頓首百拜以請而清禁嚴䆳何由伸吐泯黙而退震悚無地中外觖望歡意索然天氣晴和又無雨雪乘輿将駕莫知何故然而大臣不敢言臺諫不敢論猶以未知事實之如何昨日本合具聞赴宴貢院忽傳今日駕出人人相賀臣中夜起坐以俟夙興漏且盡矣又無所聞忠誠所激敢昧死上奏伏望陛下深思社稷大計亟降指揮若曰夀皇聖節偶以某事不及上夀今以某日詣重華宫起居則天下之疑議頓解兩宫之聖意交懽孝治無虧國祚愈隆雖復費錢百萬極奉親之禮所不當惜親上玉卮為千萬夀未為晚也臣拳拳愚忠惟陛下裁幸第二劄臣仰惟陛下聖主也然有一事臣初疑之已而思之而懼今則憂矣敢為陛下言之事有至大而陛下以為至小至重而以為至輕至易而以為至難朝夕之所當行而視之若曠典此臣之所以疑而懼懼而憂也文王朝于王季日三武王帥而行之不敢有加焉漢為五日一朝之禮已為疎闊本朝家法事母后之禮皆朝夕一再見夀皇之事高宗以相去之逺勉從五日之制茍非有故未嘗輟也陛下之事夀皇三年之間率循舊典四海悦服去冬聖躬違豫繼有瘍疾暫廢起居人亦無得而言今則無故而屢止此人之所以紛紛也蓋天下之事無大于此無重于此然而在陛下行之為當然為甚易進香一出而人心歡然㑹慶節一不出而人心遽駭事可睹矣朔日不出猶曰有冬至冬至不出而人心幾于離矣朔望比其他過宫之日已非細事特以會慶冬至為尤重姑以朔望為輕然聖節至日猶曰毎嵗有之至于聖政之成全載夀皇一朝之事玉牒㑹要足成淳熙末年之書陛下之所以奉貽謀而鋪張聖父之閎休者止此一事可謂尤重矣一展九月再展十月以聖躬之未安也今則禮儀畢備宰執觀書者三有司習儀者一忽又改日萬衆震驚固知擇日之不逺終亦不知何故陛下亦思改日之説乎卜吉既定豈應復改正以進呈之後十七日必須恭進又非時節起居之比三書相踵仗衛羅列皆是五更夙辦萬一又不成出則事體利害尤甚故不免為此一策非美事也欲望聖慈翻然感悟亟降指揮若曰屢蒙夀皇聖㫖免到宫不敢有違今已奏請以某日過宫此令一出歡聲必聞是日仍須必出雨雪即賜雨具進書之前得再為此則人心翕然而定自後不復再展而五日一朝如舊則天下晏然無事矣可謂至易之舉而足以了至大至重之事惟陛下斷然不疑實宗社無疆之慶同侍從請過宫第一劄同趙彦逾倪思陳傅良等臣等比以車駕久不過宫乞宣引同班奏事伏蒙聖慈俾並進于玉陛方丈之地臣等于初七日至東華門伺候宣引間續准傳㫖改用今日臣等區區之誠正以過宫一事欲得面控悃素臣等竊謂父子之道天性也以夀皇至慈陛下篤孝顧何待臣等譊譊冒溷聖聰第以近日之事觀之陛下朔望不出許以進香進香不出許以上夀上夀又復不出明降指揮二十八日必出萬姓歡呼踴躍以望翠華又復中輟重失人心莫此為甚旋聞展用月旦今又聞欲用十五日仰惟陛下臨御萬方以信為本成王剪桐為戲周公遂封唐叔以為天子無戲言況過宫美事孝治所繫四方所仰而反汗至于再三實恐因此朝廷命令無以行于四方載惟陛下容納直言雖小臣忤㫖亦不加罪然言雖容而不行事欲濟而復輟日復一日寖為常事闗係非輕今臣欲望聖慈確然不易則社稷幸甚臣等幸甚萬一聖心未決姑示順從使臣等無辭可措至臨期不出則又失信于中外良可惜也臣等前居家俟罪本不敢供職既蒙許以宣引故黽勉就列以冀一瞻清光如又未決臣等何顔尚在班行非敢數忤雷霆自取誅斥誠以三軍萬姓不知宫禁中事不知聖父聖子慈孝本自無他怨讟横生至不忍聞恐自此不已馴致叵測非敢以引退為高以合班為喧正欲感悟聖心以消弭未然之患也冒犯天威臣等無任惶懼俟命之至貼黄臣等伏見㑹慶聖節合候過宫上夀之後方可錫宴今緣未曽過宫遂行展日若因循未出則錫宴難以舉行況天下郡國皆已設宴而中都反未講禮闕典尤甚傳之四方書之史冊是錫宴不行将自今始深為陛下惜之伏乞睿照第二劄臣等伏見㑹慶節在即十二日禮合進香都人顒望翠華忽又得㫖免過宫無不失望既而十三日内教十六日十七日孟饗皆聖躬親臨中外益望陛下必躬上玉卮之夀伏計聖心素篤仁孝知此禮至大至重決意必出固無待臣等再三之請政緣進香之前已有定論旋復反汗是以不免過慮須至溷瀆臣等竊惟人子事親朝夕定省自天子達于庶人其禮一也五日一朝已為希簡今陛下自三月恭謁之後至今八閲月矣皆以夀皇聖㫖而免至于生辰上夀恭想聖意必欲陛下一來此人之至情也陛下重明聖節既受羣臣萬年之觴竊聞今日嘉王生朝設宴禁中夀親之際父子歡洽陛下寧不動心上念兩宫延望之意且臣等料度聖意所以久不過宫者或謂陛下有所疑有所畏父慈子孝本于天性夀皇既以神器親授聖子方頤神沖澹凡軍國之事悉不預聞五年之間初無纖芥斷無可畏第恐猶有左右小人妄生離間撰造言語惑亂聖聽全在陛下深思洞察斷然勿疑臣等竊見今年夏秋之間太白晝見至于經天九月七日金星掩心大星而又黒祲亘天萬目駭觀熒惑見入太微垣逼近内屏房星為明堂又屬宋分太微内屏均近帝座此皆天變之大者也所在洪水為災衡岳山摧正逼祠宇劍門峯墜塞斷谷口今月十六日夜當陛下齋宿之時行都地震有聲如雷夫衡岳南方之鎮行都駐蹕之所此皆地變之大者也至于人情下而閭閻衆而三軍近而禁衛以陛下久缺定省之禮口語籍籍謗讟紛紜所不忍聞自廟堂大臣至于百辟數進苦言徒勞容受竟不施行莫不憂懼愁苦不能自存此則人情之所甚不安者也陛下乘輿一駕如反掌之易則天地之變異必銷人心之憂疑立解陛下何憚而不為若聖意固執又復遲疑則天地之變決非虚設人心動搖必至叵測又非去嵗之比矣臣等蒙陛下擢置從列感恩至深目擊事勢可畏如此不忍上負聖知是敢罄竭血誠控告君父伏望聖慈斷然一出不勝宗社之福如臣等所言更不能感悟聖心則臣等皆為失職實難茍安不免引去以俟罪譴激切之衷傾盡于此伏乞睿照貼黄臣等伏見司馬光為諫官上皇帝疏又上皇太后疏臣等今不勝拳拳之忠輒具奏劄上進重華宫所有錄本併以繳進伏乞睿照上夀皇聖帝劄子臣等仰惟陛下功成不居以舜禪禹上繼光堯垂耀萬世臣等素蒙長育又荷拔擢竭忠主上如事夀皇所願兩宫孝慈永久無間使宗社靈長朝廷奠安無愧典謨之盛而半載以來車駕毎欲過宫起居毎蒙聖慈䧏㫖暫免蓋昨緣積雨極熱深軫慈眷然而因循日久寖闕禮文觀瞻所係馴致疑惑而皇帝天姿恭謹兢業過甚深念蒙付託之重懷不自安幾若嚴憚倘非夀皇聖帝加意開接毎事慰安切恐漸成疑阻闗係非輕今兹㑹慶節合上夀伏望睿慈先期勿復更免過宫俾皇帝得以躬率羣臣展前殿玉卮之敬三宫歡洽四海欣慶不勝幸甚竊惟父子至情本無纖芥或恐左右小人妄有間言使孝慈之懷兩不能盡更望聖明以宗社生靈為念曲賜洞察愈加慈愛勉以必來皇帝素篤仁孝又蒙皇慈委曲如此必無遲回于以釋四海危疑之心于以光兩朝孝治之美臣等無任懇祈激切之至上兩宫奏疏臣某等昧死再拜上疏至尊夀皇聖帝陛下皇帝陛下臣等竊惟父子之間人所難言也而況萬乘之貴兩宫之尊崇高莫大慈孝兼全在于臣子何敢容喙伏見嘉祐中英宗皇帝嗣極之初慈聖光獻皇后垂簾聽政天下安危之機實在于此司馬光不勝愛君憂國之心上疏英宗則專陳子道上疏慈聖則專論母慈又慮母子未能深屬或有疑阻遂併以一疏上之慈聖之慈英宗之孝終于無間顧豈臣下之力然光之心出于至誠未必無助臣等是敢仰慕先正竭盡區區共為一疏上干兩宫伏惟聖慈俯垂聽納臣等聞聖人之德無加于孝一人有慶兆民賴之以天下與人易為天下得人難為天子父慈之至也以天下養養之至也高宗以天下授之壽皇壽皇以天下授之皇帝為天下得人而宗社奠安孝之大者也前則壽皇盡孝于高宗今則皇帝盡孝于壽皇以天下養孝之尤大者也内禪之盛自堯舜以來未有如今日者再世揖遜不待倦勤輝光今古震耀夷夏若壽皇享為天下得人之福皇帝盡以天下養之孝則天地祖宗垂佑于上臣民夷狄厭服于下非所謂一人有慶兆民賴之者乎今日之事父子至親雖非嘉祐之比然司馬光之言有切于事情者其略曰孔子曰孝哉閔子騫人不間于其父母昆弟之言蓋言誠信純至表裏著明而他人不能間也孟子曰父子責善賊恩之大者蓋言骨肉至親尚以恩意相厚不尚較錙銖之是非也今日之事或見于此雖天性無間本無可疑嵗月寖久頗見形迹臣等欲望皇帝深思孔子之言壽皇無忘孟子之戒萬一奸人欲有闗説涉于離間者顯行誅斥以明示天下日遣使介交馳兩間重華篤慈愛之仁南内盡愛恭之實夙整法駕視膳問安及清和之時講恭謁之禮或邀迎于内庭或娯侍于禁籞使都人擁觀萬國懽舞破羣情之惶惑消衆口之讒謗兩宫慈孝之道昭明于時傳誦于後和氣嘉生充塞宇宙變愁歎為謳吟化驕陽為甘澤豈不盛哉豈不快哉臣等欲望兩宫同降指揮指日順動夀皇為宴設之具皇帝當奉養之儀驩欣交通于未見之先慈孝翕合于無疆之久於萬斯年燕及中外天下幸甚社稷幸甚論君道臣聞孔子曰為君難何為其難也以為四海之大萬幾之繁賢否之辨是非之明皆君之難事而未足為難也以常人之情凡可喜而易為者人君必戒之絶之凡可厭而難行者人君必勉之進之而後可以為明君可以服人心可以追三代之盛可以為萬世之法此其所以難也宫室服用宴飲歡樂聲色俳優馳射弋獵珍禽奇獸寶玉祕玩此皆人情之甚喜者恨無力以致之而人君頤指如意有求必獲然而一縱意焉則亂亡之機實自此始故必戒之絶之是非所謂難乎恭儉樸素憂勤篤謹講論經理攷證古今廣求民瘼招致賢能此皆人情之易厭者雖一介之士所不能行而以萬乘之主行之然而一留意焉則治平之基實兆于此故必勉之進之是非所謂難乎喜人而予之爵賞稍過則為濫予怒人而加以刑罰稍過則為淫刑而其尤難者其聽言之際乎巽與之言人所樂聽在人君則當察之不惟察之又當屏之忠鯁之論人所難受在人君則當容之不惟容之又當行之此皆人之至難而人主任天下之重雖富貴崇高無倫無敵而欲去人之所喜行人之所厭是為艱哉仰惟陛下聖性天縱其所可喜者能戒之絶之其所可厭者能勉之進之是將盡為君之道以厭服天下之心然臣區區猶恐有未盡者不敢泛引古事多援經史以為煩瀆直以人情之所甚喜與夫可厭者為陛下言之誠能深知為君之難戒其可喜而有大可喜者見矣勉其可厭而有不容厭者效矣大抵為人君者皆不可以常人之情自恕而以人所難者自勉忍人之所不能忍容人之所不能容謹人之所不能謹戒人之所不能戒人以為自苦而我樂之人以為甚難而我安之夫然後可以盡君道矣臣久汚朝列無補事功誤蒙聖恩拔擢至此朝思夕慮未有長䇿奇論以補報陛下聰明于萬一直以愚忠所存懇懇奏陳伏望睿慈略其言而採其意不以為愚而力行之庶其有涓埃之益以無負責難之義伏惟陛下裁幸攻媿集巻二十三欽定四庫全書攻媿集巻二十四宋樓鑰撰奏議論初政臣仰惟陛下受天明命膺太上付託之重以承列聖億萬年之基圖覆載兩間無不悦服竊聞陛下臨朝淵黙發言精當尊禮大臣凡事審訂而後行臺諫論列給舍駮議隨即聽從而聖德謙抑増置講官收召名儒有終始典學之誠宗社無疆之休基于今日誠千載之幸會也臣至愚極陋備員從班既得以詞章小技仰代王言奏對之初敢效忠言以禆聖明之萬一自古人君既位之初多能自彊以鋭意于治天下往往稱誦望太平于旦夕以其富貴崇高安逸汰侈不期而至在位既久君子日疎小人日親逆耳之言不聞而諂諛之言日進偃然自以為安而不知君門之外皆知禍亂之作獨人主不得而知嗚呼秦漢以來賢明之君而至于此或及其身或貽禍于子孫為後世笑者不知其幾也唐高宗永徽之初日引刺史十人入閣問民疾苦尊禮長孫無忌褚遂良恭己以聽百姓阜安有貞觀之風而權移房闥幾覆唐宗明皇開元之初以風俗奢靡制乘輿服御金銀器玩令有司銷毁以供軍國之用珠玉錦繡焚于殿前后妃以下皆不得服珠玉錦繡天下毋得採珠玉織錦繡而末年窮天下之欲不足為其樂以致天寳之變徳宗動遵禮法罷貢獻罷樂工縱苑獸出宫女淄青将士投兵相顧曰明主出矣吾屬猶反乎政從寛大藹然有貞觀之風而其後奉天之幸又幸梁州幾不免其身而其尤可憾者初能疎斥宦官親任朝士而後乃疑暗不知所倚任晚又益忌宿将而罷之命宦官分典禁旅終唐之世為患尤深此三者最其可戒者也陛下聖性高明惡㫖酒薄嗜好孜孜以學問為急而不以位為樂臣豈當私憂至此以平日讀史見賢明之君不克圖終未嘗不痛之使唐之三君皆能謹守如其初則末年豈至是哉今夫官吏以三年為任者能為三年之計則可保其身或茍度嵗月鮮不及者人主修身正家處事發政動為無窮之計則可以保天下陛下任天下之重承社稷之託兢兢業業終如今日而又日親賢臣益務學問增修聖德雖休勿休天下之事及其小而謀之則不至于大自其邇而防之則不及于逺守之以堅行之以久而後治效可覩也成王訪落之詩曰於乎悠哉正未有艾心誠求之此保治之道也伏惟陛下裁幸雷雨應詔封事臣准尚書省劄子十月八日三省同奉聖㫖朕以不德嗣承大寶夙夜祗畏不遑寧處乃者隂陽謬盭雷震非時淫雨為災朕心甚懼推㝷厥咎未知其由凡朕躬有過失朝政有闕違可令臺諫侍從各條疏以聞無有所隱臣待罪東臺職司論駁雷雨為沴自應論奏仰勤詔㫖尤切兢惶實以兼直内制適當書詔填委之時才短思澀日不暇給雖有愚悃未能控陳慈敢一一陳述伏惟陛下採擇伏自陛下臨御之初近自都城逺及四方人心翕然陛下又守之以仁用之以儉憂勤庶政之餘親近儒生講論經理上則盡孝于重闈下則深恤于民隱此宜有嘉祥為之應而變異乃爾不惟冬雷無此蓋雖暑雨蒸鬱亦未有震雷連日夜不止如此者也臣少誦雲漢之詩嘗于詔書略發其説而未詳序詩者曰宣王承厲王之烈内有撥亂之志遇災而懼側身修行欲銷去之天下喜于王化復行百姓見憂而求之于詩若王曰嗚呼何辜今之人天䧏喪亂饑饉薦臻又曰耗斁下土寧丁我躬曰兢兢業業曰憂心如熏曰寧俾我遯等語皆所謂遇災而懼百姓見憂者也若曰靡神不舉靡愛斯牲圭璧既卒寧莫我聽曰不殄禋祀自郊徂宫上下奠瘞靡神不宗曰祁年孔夙方社不莫昊天上帝則不我虞敬恭明神宜無悔怒則若怨天之不佑而終篇不見側身修行之言何耶嗚呼宣王之意以為周家一嵗祀事為民而祈者不過如前數事今我既一一為之而旱災如此無所歸咎其罪在我矣故雖無側身修行之言而誠意出于言外故百姓得以見憂而序詩者亦顯然誦言之湯以六事禱于桑林曰政不節歟使民疾歟宫室崇歟婦謁盛歟苞苴行歟讒夫興歟成湯不邇聲色不殖貨利六事皆湯所無者猶拳拳深自克責此宣王所以粲然復興而成湯所以其興勃焉也太戊桑穀共生于朝伊陟曰殆不勝徳武丁雉升鼎耳而鳴祖已曰修徳三君修徳而稱三宗夫所謂徳者非他也至誠之謂也故經之言徳多以偽為對曰恭儉惟徳無載爾偽作徳心逸日休作偽心勞日拙孟子曰以徳行仁者王以力假仁者霸知以力假仁為偽則知以徳行仁者為誠矣又曰恭儉豈可以聲音笑貌為哉言不可以偽為也揚子曰有人則作之無人則輟之謂之偽亦言其不出于至誠也至誠之道曰戒慎乎其所不睹恐懼乎其所不聞故君子必謹其獨也文王雝雝在宫肅肅在廟不顯亦臨無射亦保不聞亦式不諫亦入蓋于閨門衽席之間一一以禮法自處誠意著見有不可掩者所謂莫見乎隱莫顯乎微欲人不聞莫若不言欲人不知莫若不為蓋言之無不聞為之無不知者易傅曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也夫以陛下畏天之誠心下詔責躬又從而求言方在行内無殿之可避方執通喪無樂之可徹荒政日修徳澤日布可謂得應天之實矣臣區區之愚尚恐有聲音笑貌之為有無人則輟之偽故敢僭越陳之陛下詢訪日勤恐未免于自用講讀日加恐未免于嬉游閨門甚正而外間已有好色之謗用度甚節而外間或議錫予之多臣之所聞未必皆實陛下罪已惟懼不及伏望聖明鑒宣王側身修行之意求成湯自責以所無之心凡應天之事一切行之以誠持之以久一如前日雷霆轟轟于上之時斥逺讒邪親近忠直裁節横恩修明紀綱不以有人則作之無人則輟之然後治效日有可覩矣陛下覩今日為何等時一人修徳于上則可以弭天變可以安人心覆載所及億兆生靈将自此而有生全安堵之望社稷益固宗廟益尊陛下為千萬世聖明之主若行之不以至誠姑以聲音笑貌為之則忠直者日疎䜛佞者日進不自覺知以至禍亂有不可勝言者成王訪落之詩落始也始即政而訪問于羣臣也曰於乎悠哉正未有艾将予就之繼猶泮渙言天下之事悠逺未有底止事若将就而又渙然難合此成王之所甚懼以保盈成之業今日正是陛下訪落保治之時臣不敢泛引天下事為對傾瀝愚悃仰答清問伏惟陛下裁幸議祧遷正太祖皇帝東嚮之位同從官臣等竊惟宗廟至重祧遷之禮尤不可茍今大行至尊夀皇聖帝祔廟有期禮官乞遷宣祖而祔夀皇聖帝此本朝之定制伏望朝廷照應禮典施行無可議者所有太常少卿曽三復請正太祖東嚮之位就乞上祧僖祖此事尤重非議不可臣等攷之嘉祐中固已建議徒以親猶未盡故虚東嚮之末以待太祖而太祖尚居昭穆之間治平末年僖祖親盡而祧至熙寧大臣王安石不顧公論不稽禮典直以私意臆決紊宗廟之大經當年名臣與夫紹興之初董弅王普朱震等建議淳熙初元趙粹中盡集前後論議奏陳尤切一時已蒙採錄皆以偏辭曲説阻抑至今仰惟太祖肇造區夏功邁百王廟號太祖蓋以尊無與二非曰尊諡也今郊祀既以配天宗祀以配上帝而在廟獨不得為始祖祫享獨不得正東嚮可乎正緣議論未明故屈受命開基之君而列在昭穆之序其何以示後世揆之禮經僖祖親盡當祧不因遷祔之時此事誰敢輕議況今日九廟既備尤不可忽而不圖臣等欲望聖斷明詔大臣早正鉅典因大行祔廟之際定宗廟萬世之禮慰太祖在天之靈破熙寧不經之論開千載之惑以昭示無窮天下幸甚社稷幸甚貼黄自古天子止祀七廟太祖之廟居中三昭三穆實為六世與太祖之廟而七本朝崇寧按唐之制始立九廟有其舉之莫可廢也今太祖為始祖則太宗為昭真宗為穆自是而下以至夀皇四昭四穆與太祖之廟而九上參古禮而不廢崇寧九廟之制于義為允伏乞睿照治平四年從張方平等議僖祖當祧合于禮典其年三月已自祧遷藏西夾室至熙寧五年王安石以私意使章衡等建議乃復祔僖祖以為始祖又将推以配天欲罷太祖郊配韓維司馬光等力爭而安石主其説甚堅孫固慮其罷藝祖配天建議以僖祖權居東嚮之位既曰權居則當釐正明矣伏乞睿照議立四祖别廟臣等竊惟宗廟事重作可輕議兹准省劄節文太祖皇帝既正東嚮之位然僖祖宣祖既祧之主宜有所歸欲用朱震之説藏于夾室則攷之周制僖順翼宣之主不當藏于太祖之廟欲用王普之説祔于天興殿則景靈宫朝獻之禮與唐禘祫朝享之儀同欲用柳冕之之説築别廟以居之則又非合食之義以是三者令臣等集議可謂詳盡臣等請先明其不可行者二而定其可行者一以裨廟堂之末議恭惟本朝去古既逺禮制不能盡循于古參取漢魏以來以至于唐攷定為一代之制按唐張齊賢之言曰古者有天下者事七世而始封之君謂之太祖太祖之廟百世不遷至祫祭則毁廟皆以昭穆合食于太祖商祖𤣥王周祖后稷其世數逺而遷廟之主皆出太祖故合食之序尊卑不差漢以高皇帝為太祖而太上皇不在合食之列為其尊于太祖故也魏以武帝為太祖晉以宣帝為太祖武宣而上廟室皆不合食于祫至隋亦然唐以景皇帝為太祖太祖以上皆不合食于祫臣等謂齊賢之説本朝之所當取也太祖皇帝開基之初豈不能祀七世推而上之至僖祖而止故用唐制建四親廟以祀僖順翼宣四祖洎太祖祔廟尊為宋太祖蓋契始封于商稷始封于周故商周皆尊為太祖唐自涼武昭王暠而下至高祖為八世豈不能惟暠為始祖而以祖虎始封唐公父及已皆襲封于唐唐之建邦啟土比之契稷故推為太祖而太祖之上親盡則毁故如宣簡公在高祖時為四室之尊洪農府君在太祖時為六室之尊然皆親盡為祧也太祖之興上無所因與漢高祖事同故太祖尊為太祖而僖祖在治平間以親盡而祧入于夾室至熙寧中王安石始改尊僖祖為始祖遂屈太祖不得正東嚮之位以至于今今日既伸太祖東嚮之禮僖祖之主當再入于夾室既協唐洪農府君之制又遵治平已行之禮然在今日則為未安蓋自熙寧以來推尊既久難以一日遽還夾室又攷之周制后稷之廟則先公之祧藏焉蓋公劉不窋以至太王王季之主皆祔文王武王之廟則先王之祧藏焉蓋自成王而下皆祔唐有興聖廟以祀涼武昭王故景皇帝既正東嚮則獻祖懿祖之主皆祔以不欲以祖先而祔孫子之廟也今之太廟順祖翼祖及宣祖之遷皆入夾室則猶曰僖祖在第一室故三祖之祔為順今太祖既入第一室則僖祖宣祖二主之祧所以當議也臣等以為朱震藏夾室之議既不可用景靈宫祭聖祖用素饌則王普祔天興之議又不可用也惟唐柳冕之説築别廟以居之朝廷謂非合食之義則臣等有説焉謹按唐陸淳之言曰太祖復位獻懿之主宜有所歸一曰藏之夾室二曰置之别廟三曰遷于園寢四曰祔于興聖然而藏之夾室則無饗獻之期置之别廟則非禮經之文遷于園寢則亂宗廟之儀唯祔于興聖為是至貞元十九年左僕射姚南仲等獻議五十七封付都省集議户部尚書王紹等五十五人請遷祔興聖廟議遂定由是太祖始復東嚮之位臣等以為僖祖當用唐興聖之制立為别廟以代夾室順祖翼祖宣祖之主皆藏焉如此則僖祖自居别廟之尊三祖不祔于孫之廟自漢魏以來太祖而上毁廟之主皆不含食今遇祫則即廟而饗于禮尤稱如朝廷以為允當更乞行下禮部太常寺攷議制度施行議明堂部中集議謹按禮記曾子問天子崩未殯五祀之祭不行既殯而祭又曰自啟至于反哭五祀之祭不行已葬而祭鄭注云郊社亦然正義云未殯哀戚未遑祭祀既殯而後祀也欲𦵏之時自啟殯以後葬畢反哭以前靈柩既見哀摧更甚故五祀之祭不行已葬反哭殯宫畢而行其祭又引鄭云既殯以後未啟以前得行祭禮檢准本朝典故緣郊祀明堂間有在諒闇之中然皆在踰年之後别無未葬以前行禮故事若據禮經則已殯未啟可以祭祀某等竊見禮莫重于喪喪莫重于斬衰況事父孝則事天明此禮之本也若皇帝過宫執喪如禮則既殯未啟可以據經行事今來喪禮未成難以議祭合俟皇帝即喪次行禮則有司之事可以類舉再議明堂御史臺集議某等竊見本朝每三嵗一行郊祀皇祐以來始講明堂之禮二者至今遵行本無可議大行至尊壽皇聖帝之喪未及發引而大祀之期已迫攷之典故累朝間有大祀在諒闇之中而適不在當郊之嵗故無發引以前行事故實攷之禮經在王制則有越紼行事之文在曾子問則有既殯而祭之説雖未葬以前可以行事某等竊以喪莫重于斬衰祭莫重于禋祀因大喪而廢大祀禮固不可若斬衰之禮未備而祀明堂則事天如事親之義安在經曰事父孝故事天明祀曰祀明堂而民知孝又曰祀乎明堂所以教諸侯之孝今皇帝之喪以日易月既經小祥其去大祥禫祭已無數日而皇帝尚未有至宫行禮之日夫所謂紼者乃菆塗龍輴之索人子居喪不離菆所故大祀則越此紼而行禮今皇帝未嘗一至殿菆之所則何紼之可越某等今議合候皇帝即次執喪之後或依據禮經而用未塟之前或參酌故事而展太祀之期徐議其當則有司之事可以次第而行矣攻媿集巻二十四欽定四庫全書攻媿集巻二十五宋樓鑰撰奏議講筵論資治通鑑臣仰奉聖訓讀資治通鑑有以見陛下務攷周秦以來興亡治亂之迹以為鑑戒此誠聖學之要也司馬光為此書始於周威烈王二十三年命三晉為諸侯以為天子自壊其紀綱周衰既久自此遂不可支故極論禮與名分最詳以為此書首篇誠足為後世之深戒然臣嘗攷之此書之作又有深意自古史法皆以編年春秋是也自司馬遷史記創為紀傳之體無復編年之作荀恱袁宏書又不顯光之此書實繼左氏傳而不敢顯言之春秋一經公羊止獲麟魯哀公之十四年也左氏經終孔丘卒哀公之十六年也而傳終哀公之二十七年其末篇敘知伯事其略曰知伯不悛趙襄子由是惎知伯遂喪之知伯貪而愎故韓魏反而喪之注謂在春秋後二十七年臣攷獲麟而春秋絶筆絶筆二年而孔子卒又七十六年是為周威烈王二十三年而三晉為諸侯通鑑之始也其實三晉之分知伯在周貞定王之十六年去孔子纔二十七年左氏傳以三晉事終通鑑以三晉事始其實繼左氏傳編年之法此讀通鑑者之所當知也又通鑑首巻起著雍攝提格盡𤣥黓困敦太嵗在戊曰著雍在寅曰攝提格在壬曰𤣥黓在子曰困敦光豈不能書戊寅壬子而直以此紀年者爾雅釋天篇嵗陽嵗陰甚詳其以甲子乙丑云者在書法止可以紀日光之書此非好為泥古葢其嵗陽嵗陰書法當然也伏乞睿照論通下情臣聞天尊地卑乾坤定矣卑髙以陳貴賤位矣君臣之分萬世不易之道也然天為髙矣不以髙為貴而以下濟而光明乾為剛矣亢龍則有悔而以用九而為治在易坤上乾下卦反為泰其彖曰天地交而萬物通也上下交而其志同也乾上坤下卦反為否其彖曰天地不交而萬物不通也上下不交而天下無邦也此皆聖人之深意也故古之君子分甚嚴而道則同勢甚尊而情則通舜之求于臣者則曰予違汝弼汝無面從退有後言禹之告舜則曰安汝止惟㡬惟康其弼直孔子教人以事君之道曰勿欺也而犯之禮經亦曰事君有犯而無隠孔子事君盡禮春秋專為尊王而作而在禮尊君之至至于蹙路馬有誅齒路馬有誅可謂嚴矣而二帝三王之君其所以求于臣者直以為惟后非賢不又后非衆㒺與守邦直以為君之與臣相與共治天下故其見大臣則在輿或為御坐或為起葢尊徳樂義不得不然上下一體不事形迹是以治功可興而事業可就也中古以還君益尊臣益卑至于晚唐五代猶有坐而論道之餘意太祖收攬權綱以救天下之弊可畏可仰孰敢干犯然與趙普論事心通氣合或夜半而至其家其相與何如也累聖相承共由斯道尊如天嚴如神而隆寛盡下容受狂直如出一律本朝隆平既久中興以來三聖授受綿七十年以至陛下仰惟聖聽恢洪無不覆幬論經理日昃不倦真古帝王之用心亦藝祖神宗之家法也今日陛下臨朝儼然若帝之臨宰臣而下奔走拜伏莫敢仰視號令之發方尺之紙風動萬物疇敢不應人主之尊不患不及臣愚欲望睿慈嚴上下之分而通君臣之情隆堂陛之勢而明否泰之道陛下體天道之下濟而羣臣得以卑而上行使芻蕘之說不壅于下狂夫之言聖人擇焉則君道愈尊國勢愈隆天下以成其政歡欣交通而後天下可為也臣言若迂實切于治惟陛下裁赦論君心知婺州朝辭臣聞庖丁之技因悟養生輪扁之工可以語道言有甚小可以喻大多此類也臣無所取材號為温州號為煩劇若趣了目前簿書期會財賦賓客之事亦可麤辦臣嘗自念受朝廷千里之寄不可止了目前環境之内山巔水涯茍有一夫之失所皆已之責于是分任官僚訪詢者老不自耳目之私私而以衆智為明雖不設鈎距不為巧術而下情麤通二年之閒茍幸無事矧今立朝七年䝉陛下拔濯爵髙祿厚授以便郡委寄益重尤當布宣寛大以惠斯民當此違離君父之初尚効論思獻納之益願以涓埃之微細仰裨海嶽之髙深恭惟陛下為天之子受付託之重天之所覆祖宗之所臨御陛下以一身應之日晏坐朝躬親聽斷大臣議政羣下獻説崇朝之間應酬已多退閱奏章坐判可否况復聖性恭儉勤于講學人主之道不為不至然臣竊恐猶是趣了目前未必能致幽逺治道多端未可以為止于此也臣輩所治一州實恐日力不給陛下所臨如臣輩所臨之州不知其㡬四方所至幅員動以數千萬里必欲家給人足無不得所則所謂博施濟衆堯舜其猶病諸謂其力所不及則禹思天下之溺由已溺之稷思天下之飢由已饑之人主用心不得不然陛下試于清閒之燕披輿地之圖不知某路今付之某人為監司帥臣某州今付之某人為太守某軍今付之某人為将帥其人之才不才事之治不治察其事實而賞罰隨之猶庶乎其可乎雖好惡之道惟應任大臣先有司而四海之逺治之在心茍不能以吾一心包括宇内每思有以補偏而補弊篤近而舉逺臣恐四海之民將有不安其生者陛下如此存心則下受賜者衆以其非趣了目前而已也臣竊聞孝宗皇帝嘗語近臣曰朕每日于天下遊行一遭此真帝王之言故延見訪問無一事之不周此陛下所宜取法臣未能知効一官而推廣事理敢以為獻惟垂聽而赦其愚論本朝專尚忠厚召除翰林學士臣孤危之蹤頃嵗際遇陛下踐祚之始獲侍講筵進讀資治通鑑至孟子見梁襄王問天下惡乎定孟子對曰定于一孰能一之曰不嗜殺人者能一之是時臣嘗奏曰孟子在戰國時人皆謂之迂闊于事正謂此等蓋當時七雄分據專以殺人為務所謂爭地以戰殺人盈野爭城以戰殺人盈城殺人多者國愈强惟秦為甚伊闕之戰殺人二十四萬華陽之戰殺人十五萬其尤甚者長平之戰一日殺四十萬卒平六國一天下烏在其不嗜殺人而能一之也然則孟子之言果迂闊乎是不然孟子之所謂一者非若秦之一也三代之得天下以仁傳皆數百嵗秦止再傳而四海塗炭嬴氏無遺種是不若不一之為愈也臣竊惟孟子之言至皇朝而後騐唐自天寳之亂藩鎮盛强丗襲根本不可動摇憲示剛明果斷武宗成其功烈兵威稍振然他鎮不能盡服僅能羈縻之而已周世宗不血刃而下二闗奪李氏之淮南已為甚盛之舉至我太祖太宗削平僭偽四方賓服重熙累洽綿百餘年人但知祖宗之善于用兵不知所以一天下者本于不嗜殺人也靖康之禍其何忍言自王安石開邉結怨王韶伐青唐章子厚開梅山劉彞沈起生事於南蠻童貫蔡攸起釁於北邉有如髙遵裕靈武之潰徐禧永樂之陷殺氣妖氛轉入中國使中原百年丘墟天地之大徳曰生豈専以殺而定天下哉髙宗披荆棘而立朝廷外有方張不制之敵内有江湖甚劇之寇而卒能光啟中興正以聖性不嗜殺人天相人助以躋登兹是知本朝家法専在于不殺而孟子之言明效大驗于此陛下玉音稱善至于再三臣違離闕廷十有三年屏居畎畆不敢㤀君惟陛下聖慈仁孝畏天愛民施之于政皆出誠心是以郊祭之禮上帝昭格年穀順成中外小康真得列聖之用心而權臣愚好自用輕信寡謀横挑强近兵連禍結中外寒心者數月臣竊自惟念天道虧盈益謙好生惡殺我宋立國二百四十餘年專于不殺北敵之强盛殆將百年專於好殺天意其將孰佑之乎是以去嵗擁兵南來屢有敗衂且多失其酋豪而糧道不繼為之退散今嵗聲言入敵卒亦不能大入此固國家福祚無疆陛下威徳逺被將士用命民心不離以至今日然迹其所本實曰不嗜殺人積累忠厚之報也臣衰老得謝待盡朝夕仰䝉柬記更化之初首加收召誠以久苦足趨拜甚難控辭不一而上迫于威命趣行郡守津遣翰苑之除下于里門皇恐就道復覲清光誠為微臣千載之幸顧無以上答乾坤之施敢以昔時經帷之說申言之伏望下採芻蕘之言力行寛大之政光紹前烈益恢逺圖臣雖退伏田里志願畢矣論風俗紀綱臣竊惟國家元氣全在風俗風俗之本實繫紀綱本朝紀綱素定風俗醇厚度越前古自權臣擅朝政以賄成十餘年來無復公道紀綱廢弛風俗凌夷㡬不復可以為國矣天開聖明竄殛元惡黨與以次誅斥此如沈疴去體而元氣未盡復調䕶保養不可緩也其要莫如正紀綱厚風俗之二者向者紀綱既廢貨賂公行苞苴之弊徧及中外仕者朘削民財以奉權臣則美官可翹足而待兵官尅剥士卒以奉權臣則將帥可計日而取是以民力益竭軍政大壊今日盡籍其家數至鉅萬俸錄有限何緣至此則其取于民力取于士卒者不知其㡬也文武之臣所賴以為國家之用而專以趨媚為能奔競拜伏竭資效産不復知有亷恥之道至奴事其僕隸以自進既得所欲則傲然于外小則驕人甚則害物士大夫茍可自致無不效尤否則為州為縣公取竊取以自効舉削或以厚賂而後得然則欲賢令宰以臨民得乎風俗至此不可勝誅陛下寛仁必不欲一一究見其罪亦恐搜求已甚人情不安欲望聖慈念民力之困弊縣官之不給而丘山之積實出于鞭笞膏血之餘縱未能盡捐以予民烏可不思所以救其倒垂之急會計凡目舉以補大農之經費而稍寛州縣之督責使陛下惠養之意曉然示于天下而所以壽國脈者無出于此矣更乞明詔大臣以及臺諌給舍去其太甚以懲其餘使自今以始紀綱益振則風俗庶乎歸厚實宗社無疆之福外侮雖為可慮然治外者當自内始故臣拳拳首為陛下陳之論仁徳剛徳臣聞乾徤坤順震動艮止各以其甚者言之乾之下濟未嘗不順坤動也剛未嘗不健震亦有止而艮亦有動聖人之徳亦然文王之武武王之文可知矣人皆曰天以剛為徳人主亦以剛為徳此萬世不易之論也在易大有之盛五爻皆陽而君位以六居五曰柔得位而上下應之曰大有擊辭又曰天之所助者順也人之所助者信也履信思乎順又以尚賢也葢天與人君一也雖曰以剛為徳而尤以好生為仁臣事陛下于龍飛之初年投閒一紀再䝉收用日夕思念願有以裨益聖徳于萬一惟國家累聖專以仁厚不殺為主如積善之家必有餘慶仰窺聖性承忠厚之習如必欲强為剛强之事度亦非陛下所安臣又求之于古周過其厯漢祀四百本朝累聖相承平治最久究其所以雖曰積累之厚而周之世世修徳莫若文王漢之結人心無如文帝本朝之盛仁宗皇帝尤為隆平四十二年之事至今人人能稱頌之文王徽柔懿恭視民如傷亹亹穆穆順帝之則文帝恭儉寛仁專務以徳化民仁宗皇帝聖度如天萬物並育自有諡法以來未有以仁為諡者天實命之夫以周漢暨本朝盛際自文王及文帝及我宋仁宗不以剛徳為稱而皆本仁柔以出治陛下聖性隆寛實似之而又謙恭勤約身先天下雖欲彊為剛强之事亦有所難誠能逺慕文王文帝而近法仁宗使好生上當于天心皇恩浹洽于上下則保治之道何以尚兹臣又有愚見敢申言之文王之赫然斯怒以安天下之民文帝以嚴致平仁宗皇帝干戈鈇鉞之誅未嘗有所私貸所謂仁者必有勇此皆自仁徳發之此尤陛下所當取法也陛下外鉏叛将内誅姦臣雄斷廟謨天下聳服臣願陛下不必改聖性之所安而于用賢去佞收攬威權懲艾奸惡時出聖斷以裁之則仁足以壽天下之脈而威足以折姦諛之心行之無倦謹終如始則宗社之福誠未艾也論内外之治臣竊惟國家馭外之道與古不同藝祖開基未始一日㤀幽燕之民太宗乗河東兵威亦欲一舉而終不遂真宗初以邉民苦於戰爭戒邊将各自城守以圖安靜達來之來乗虚而入直抵河上澶淵親征出于不得已而履此危道自解講之後累聖不復有北伐之舉宣和燕山之役是時中國軍政大壊委于姦人腐夫以取覆敗此又非所忍言臣嘗以假吏至燕親見舊邉所謂白溝河者真一衣帶水而安肅等處水櫃榆栁塘泊之遺跡亦皆人力設險而又天險也前代雖漢唐之盛豈無失徳而患不至此秦之長城千古以為無䇿然猶有以限制之自周徳威失榆闗之要石晉獻十六州之地而後中國不復可為此如編氓之家與盜為隣所恃以禦之惟垣牆耳一旦盜入垣牆之内而畫平地以守其勢但多與之金帛冀其勿擾耳故雖以累朝承平䇿止于此况自建炎以來限以淮水蜀猶有險可守襄漢則平陸相接天未悔禍髙宗孝宗豈不痛念勢既未順遵養至今姦臣擅權狂悖生事㡬危社稷陛下之所親履又不免屈己以求和和之成否尚未可必臣雖預末議非不知振發激烈以攄宿憤敕牓一出外議紛然雖浮言胥動不究事實然皆有强人意者雖不可用正自不可以為不然聞之古語有云主憂臣辱陛下宵旰未㤀顧臣輩無有長策以盡雪國家之恥其辱惟甚臣觀歐陽修言于仁宗曰元昊叛逆一方而勞困及于天下北人乗釁違盟而動其書侮慢至有貴國祖宗之言陛下憤恥雖深但以邉防無備未可與爭屈己買和莫大之辱是時猶以為莫大之辱則今日之事豈特可為流涕太息而已陛下以生靈為念雖姦臣以誅而國勢愈弱不得已而屈己増幣尚未保其必從則國家之辱甚矣君臣上下惟當以宗社為念臥薪嘗膽以圖之臣恐和議一成喜慶相賀文恬武嬉便為無事則後日之事其何可勝言陛下躬行恭儉更化善治欲大有為而邉事未靖欲為未可宜先定規模内修自治之計日夕與二三大臣講明其要次第施行如邉備屯田安集流移葺治戎器節約宂費等事皆為要切之務臣年過七十本不當仕敢竭丹衷以告陛下退伏田里死無所恨惟陛下亟圖之攻媿集巻二十五欽定四庫全書攻媿集巻二十六宋樓鑰撰奏議論聽納臣竊惟人主求言非是止循故事人臣進說必欲有益國家君臣之間各思致治上下相應本同一體而上之求於下下之進于上齟齬不一今古患之前賢之論可謂詳備更有二事臣敢詳陳一是忌諱拘牽一則指摘效驗為害實廣人或未思何謂忌諱拘牽蓋人主崇髙獻謏者衆以年則稱億萬以祚則謂無疆頌徳則必擬堯舜論治則不數漢唐習聞順指之辭罕陳兢業之戒天文示異則移占于殊域水旱為灾則委罪于州縣姑務一時之美聽本非平日之後言一有立論稍髙出言据正或相苛責以為過豈知言不激烈不可以動人言無顧忌乃足以達意故禹以丹朱而戒舜周公以商受而戒成王君臣一心不以為異秦漢而下忌諱實多京房之說王章之言既大悟于君心又深中于時事可謂一時之至論羣臣之未發止緣權倖側目姦諛蔽欺棄其大端摘其小過因緣人主之諱惡顯坐臣子之非宜致之死地以箝衆口由今觀之驗以漢事使房之說獲用則石顯之徒可誅而孝元之政不壊矣使章之言卒行則王鳳之黨盡去而西京之祚不隊矣拘牽忌諱以至于此此臣之所謂害之一也何謂指摘效驗葢人臣進言求益于國前有據依後有證驗庶㡬得事理之實可以囘君上之聽傳之簡册以為格言如賈誼之論侯國江統之論徙戎言雖不用事則果然證驗之明如合符契可謂善于立說者矣然而進言之士指陳事實必曰如是則治安如是則危亂或引商為鑒或借秦為喻自是進言之體無非愛君之言正欲人主垂聽可以制治于未亂豈願他日有悔徒取知言之虚名然而未形而言多謂其已甚既言之後或未必盡然便謂好為過言不見其效成䜛夫浸䦞之閒啓人主厭言之心人臣既為君上而言固當不茍人主但求有益于我何問其他且如水旱之始皆謂盜賊可憂賴陛下圖之於初救之備至饑饉者既得所養姦傑者無所發端至于今日卒以無事此非天道實出人謀在今日事雖不然而其初真有可慮若謂太過則誠不可以此知但當視其鑒戒之言益增警懼之意若始疑其過未指其妄則言者憚矣陛下愛養敢言之氣深察羣下之心如臣所陳又何足進竊惟古人之論猶未及此敢因奏對輒罄愚衷倘聖明少賜採擇不為小補論帥臣不可輕出臣竊惟諸道置帥官稱安撫兼兵民之權有分閫之制朝廷選擇甚重不輕比年以來遇有盜賊竊發州縣所不能制者必使帥臣親行雖多成功臣竊慮此水旱饑饉既不能免潢池弄兵安保其無若自此以為故事帥臣動輒臨戎恐非國家之長䇿也仰惟神宗皇帝垂意邊事廟謨深逺迺熙寧九年知成都府蔡延慶言乞發陕西兵援茂州候兵集自将以往令轉運司攝府事詔朝廷已遣将部兵延慶務在持重毋得輕去成都元豐九年河東經略司言西賊入麟州神堂寨知州訾虎等領兵出戰有功詔虎自今毋得輕易出入遇有冦邉止令裨將出兵揜逐神宗之慮深矣葢帥守之臣民之司命一有失宜衆心易動當令指授方略調度軍食持重鎮撫以靖一方雖有挫衂根本不摇若使輕出利害實大蓋帥臣之行建牙郊野堪戰之士咸在行陳從行兵卒必是單弱而又隨宜遷次登陟險隘脱有黠傑之盜伏隠篁竹乗閒捷出以犯大帥之顔行則賊勢易張國威難振倉猝之頃可勝言哉故延慶有請既拒而不從訾虎成功亦因以切戒此臣平日之所慮適合信史之所傳無事而言似非時務愚者一得願效君前伏惟俯矜微悃曲留宸念臣幸甚論役法臣竊惟州縣之事其切于民者莫大于役法其害于民者亦莫大于役法役法不明民受其害仰惟陛下愛民如子罷行利害惟恐不及而民猶有未安田里者葢役法有以害之也夫民之畏役如避仇讎茍可以幸免則無所不至甲當為之必曰乙富於我乙當為之必曰丙之增産倍我民之姦偽百出吏之上下百端州以為甲可甲不已而訴之運司則以乙為之乙又訴于常平司則復及于丙矣取其案而觀之則據法援例皆不可破三者交訴不勝不已卒之豪强得志而害及下户小人以氣相髙往往未被供役之害而生涯蕩于吏手矣臣在州縣見斯弊詳求其故葢前後臣僚論列有為朱腳白腳之法者有為鼠尾輪差之法者朝廷行之正求以便民然而申明愈多法令愈繁有司不知所守而舞文之吏因得並緣為姦而民益病矣臣嘗求之一鄉而得之其法明而易行簡而易守凡物力及百緡者役一月及千緡者役十月其閒多寡有差大率皆以月計行之既久上下相安甲滿而乙代之乙去而丙為之不容吏預其閒而民亦樂其力役之均無復訟訴為令者誠使他鄉皆然則邑事去强半矣惟其官司素無定法故難以推而行之臣以為茍以此施于天下何為而不可如曰風土有異同版籍有多寡不可一律則使凡鄉之富者或數倍于此則以此法等而上之以三百緡五百緡供一月之役鄉之貧者或不及于此則以此法等而下之以三十緡五十緡供一月之役以天下視之疑若輕重之不同以各鄉視之乃所以為均也各鄉既均訟訴皆息是豈不明而易行簡而易守哉然吏之與民迭有利害役法不明則民病民病則訟繁訟繁則吏可得志役法一定則民安民安則訟清訟清則吏無所措手為治者將安從乎陛下如以為可行茍但付之有司則必有老姦宿猾豫為後日之計爭執前後成法以撓之者惟陛下斷之果行之必精擇詳練之人使推此法行之一州一州便之則使監司行之一路一路便之則使諸道皆行之而實惠遍及于天下矣論軍器宂費臣竊惟國家軍器之備置監以總其要置所以鳩其工器械犀利誠得戒不虞之上䇿臣愚以謂戒不虞者本以安民也而無名之斂或至于擾民本以衛國也而無用之工或至于蠧國何謂無名之斂每嵗收買軍器物料朝廷雖許支錢州縣或無錢可支不免科擾又有津遣之費大率多出于民民輸常賦猶不能給况重之以此乎此所謂擾民者也何謂無用之工本所萬全指揮及東西作坊見役五千七百餘人嵗支錢二十九萬緡約米四萬餘斛用人不為不多廩之不為不厚而猶以為未足更于諸州作院差撥兵士入所又一千餘人嵗支錢八萬餘緡米九千餘斛而諸州又厚有衣糧以贍給之此所謂蠧國者也陛下睿明洞照灼知擾民之弊近已将諸路日前嵗額泛抛軍器物料並皆除放民頗息肩矣惟蠧國之弊未有以上聞者夫以本所日役三千七百餘人茍能汰除老弱嚴禁宂占專擇可用之卒日督其程則軍器不患于不辦今既以無用之人雜處其中而徒取外郡之卒更置于此重耗廩給將焉用之臣愚欲望聖慈特賜詳酌攷軍器之程計工徒之費如臣言或有可採即乞睿旨將本所三千餘人專其工役所有諸州兵匠遣還原來去處嵗省公家之錢㡬萬緡米㡬萬斛蠧國之害既衰而小人亦免旅居之歎有利而無害惟陛下圖之論福建鹽法臣仰惟陛下勤恤民隠宵旰求治民生利害無小不聞或罷或行曽不淹日兹非勵精之明驗歟竊惟𣙜鹽之法天下通行七閩之法公私尤便上州得鹽下州得米民不淡食官收其贏漕司平其多寡州縣賴以充用田里之民尤為樂業而行之既久不能無弊官無本錢而豪民出其資故大半之利歸于私家縣有積逋而漕司取其數故般運之贏廢于中道支發紊先後之次網船有滯留之費寖失古人立法之旨議者不知講求弊源去其太甚者而圖其餘使害去而人不知利興而民有賴乃一切欲以榷筦之法齊之行之未㡬公私俱病賴聖明盡復其舊吏民無不鼓舞然新法之害既去而舊法之弊則未之講亦未為盡善也臣愚欲望聖慈行下監司諸州講求監行鹽法有未盡者纖悉必聞舉其偏而補其弊立為成法俾之遵行以惠閩粤於無窮不勝幸甚臣恭聞仁宗皇帝有欲增河北鹽價者仁宗御批所奏有曰朕終不忍使河北人食貴鹽父老聞之掬香于手望闕焚之以謝聖恩祖宗徳澤之在人如此葢鹽者人之所共利立法茍善所被實廣惟陛下裁幸論主簿差出之弊臣竊惟縣治主簿專以勾簿書之稽為職凡一縣稅賦之輸納實總之銷簿對鈔尤為𦂳切而監司郡守循習故常以主簿在縣官中最為事簡差出不時甚者至沿檄無虚月朝歸而暮出雖有勤榦之吏困于往來欲竭力效職而不可得簿書期會比之教化則為細事在州縣之閒則急務也小民輸官租得鈔而歸官司勾銷名簿則可以優㳺卒嵗豪强頑猾據簿之未銷者督之則無所逃罪其閒利害皆係于簿書簿書不明則吏得以肆意為姦貧民下戸至有已納而更輸豪猾之家苞苴把持或至于幸免則主簿之職若閒而實要如此任職而不勤責固有所歸矣幸走道塗而一旦以不職被譴彼有辭焉臣愚欲望睿旨諸路監司守臣遇有差出輪㸃諸縣主簿量立定制每嵗不得過兩次又計日月之多寡較道里之逺近而比折之當差出者不得以請求而免已滿兩次者不得復差庶使小官得少安職守簿書不至猥弊而民被實惠矣乞東宫官進嘉言善行臣仰惟陛下深惟天下之大本立儲宫以安社稷置僚佐以任輔導之職真一代之盛典也臣猥以庸陋備員其閒且得執經從容以侍承華千載榮遇非所宜得思欲殫智竭慮以稱陛下任使之意補太子聰明之餘雖太子天資明敏謙勤好學而臣不過于誦説之間可以少效其愚講罷而退雖欲陳述古今以資盛徳無由以進退而思之實不遑處臣竊聞祖宗時應東宫王府官屬每五日必使各進嘉言善行一條臣愚欲望睿旨申行故事使臣等毎五日必以一事進如有己見因而詳論其是非當否不問興衰治亂帝王臣子凡古人言行可以勸可以戒者採于百家擇其機要以奉太子則上性愈明輔成儲徳區區之心得逃尸素之責矣王府僚屬亦倣此而行之必有日新之益此故事也論朱熹補外臣竊惟欲收天下之人心必用天下之人望帝王之興罔不取此文王作興而二老歸孟子所謂二老者天下之大老而歸之者也晉元帝初鎮建康吳人不附士庶莫有至者一日王導及諸名勝騎從而出吳人紀瞻顧榮皆江南之望竊覘之乃相率拜于道左導因請引二子以結人心二人應命而至由是吳㑹風靡百姓歸心焉此尤其明驗也下至劉備之入蜀薄許靖而不用法正曰靖有虚譽今主公始創大業人不可戸曉宜加敬重以慰逺近之望備乃禮而用之夫太公伯夷固非後世所及紀瞻顧榮一歸而江左之君臣遂定許靖知無實用先王以其虚譽猶禮而用之事雖不侔意則一也陛下不得已而嗣位兢業當百倍于平時首闢經筵刻意典學天下風動以為新政之第一而又出自宸衷收召朱熹寘之講席渴于一見惟恐不及次對之寵擢于中途當今人望儒宗無出熹之右者雖不可以望太公伯夷其視紀瞻顧榮過之逺甚平生為有用之學非若許靖之虛譽也故天下士夫視其進退以為重輕及其來前陛下傾待以禮禮記一經又先令講大學之篇學士翕然向風謂將大有補于聖徳忽然去之如振槁然舉朝失色言之喪氣此非細故也陛下之去劉正已失之倉猝然曰去宰相而已又去黄度亦為之紛紜然曰去諫官而已二事已致物議然未若朱熹之舉之為甚也取天下之人望以收人心陛下既已得之今又去之人心謂何此可想而知不待臣言而後喻也不知陛下所以去之者曷故熹無職事惟有論議必是論議之間有許聖心知前日所以處之者不以代言不以為六部之貳俾以次對侍講是專求其言也以言求之而以言棄之尤非所以示天下也抑又有大不可者熹之去就固已闗係甚重始聞此事臣自以備位後省可繳奏以裨聖聰命猶未頒而熹已出門乃知御批徑以付之皇恐而去此尤不可如此則是命令不由中書不由封駮之地此其利害又甚于失人望矣臣事太上皇帝論事動至十數違忤已甚而事終以不行葢重惜喉舌之地雖有不從不過不報故張子仁終不建節鄭汝諧終于外補陳源終不得俸率逢原終不得告如此等事尚能扶持不致傾危者此太上皇帝之盛徳也今成命未至于後省而御批已自别行正使聖斷排逐姦邪猶不當爾況施于此乎此臣所以忠憤感激懼職業之遂廢而無以事陛下也欲望聖慈翻然感悟念古人進退人以禮之意無貽加膝墜淵之譏在陛下若反掌之易而氣象頓還矣蘇軾論漢高祖刻印銷印有同兒戲何嘗累高祖之知人適足明聖人之無我臣實有望焉干犯天威罪當萬死伏惟陛下裁幸乞賜莫叔光諡及錄用鄭鍔之後同倪思臣等竊惟為寮潛邸者儒生之榮遇施恩舊學者人君之盛徳仰惟陛下聰明天縱聖敬日躋而終始典學習與性成榮儒重道增光家法凡臣子之執經于初潛輔導于朱邸者寵數特異仰見聖明不遺故舊之至仁其有身為侍從而不及覩龍飛之盛終于庶寮而不得霑霈澤之餘者有二人焉竊見故吏部侍郎莫叔光性行端良問學該洽立朝正色有仁者之勇始以秘書郎兼平陽郡王府教授後以著作佐郎兼嘉王府贊讀在陛下左右四年嘗賜以恬靜二字後雖免兼而朔望必見愛眷優渥陛下憫其蚤世賜以金繒而贈典之外未嘗加以異恩易名定諡故屯田員外郎鄭鍔素明經術通貫古今教導諸生著録甚衆任秘書郎日先帝時在東宫陛下為英國公孝宗擢兼小學教授創置一員與知樞密院何澹輪日入侍首尾再朞嘗進勸戒元龜一書尤蒙襃美御書無逸一篇及學問清修嵗寒等字以賜之鍔之身後尤為衰替無家可歸一子逺宦奉九十之母無以為養一子累舉未第無有為二人言者臣思臣鑰實與同朝而鍔又臣鑰之師也臣等幸日侍經幄敢以奏聞伏望聖慈特加矜念使恩逮泉壤澤及遺孤簪履不遺民徳為厚實有補于聖治乞加贈彭龜年及録用其後臣聞太宗征遼追思魏徵明皇幸蜀乃祭九齡葢忠臣之言常時或不見用事有其驗雖悔莫追此明主之所宜加察也陛下即位之初一時舊學多在外服惟彭龜年自起居舍人擢中書舍人遷吏部侍郎臣同在後省見其無日不蒙召見恩至渥也韓侂胄方有弄權之漸龜年知其必為後患上疏力言遂以待制知江陵府而侂胄留為内祠是時臣為給事中林大中為中書舍人同銜繳奏乞留龜年既不可得再奏龜年義必不留言又不從三人相繼去國侂胄因之愈肆以致禍敗今十餘年矣去嵗仲冬之三日甫誅姦臣而大中與臣明日即蒙收召起于既老獨龜年蚤没不及見更化之盛實可憐憫臣嘗從其家得諫草敢繕冩進呈伏望睿覽則知龜年先見之明獻言之力或加贈䘏或録用其後仍以奏檢宣付史館上以廣聖君念舊之心下以激忠臣敢言之氣實為幸甚御筆彭龜年係朕潛藩舊學當權臣用事之始首能抗疏折其姦謀襃䘏之典理宜優異雖已追贈未稱朕懐可特加贈龍圖閣學士其子彭欽與寺監簿差遣乞録用陳傅良之後臣仰惟陛下自更化以來拔用人物凡曾被選擇而阨于逺外之人存者無不收召如臣等輩皆不遺忘其不幸溘先朝露不及見今日盛際者或加贈諡錄用其後而尤篤于舊學之臣如彭龜年莫叔光鄭鍔是也惟故中書舍人陳傅良以一世名儒為嘉邸直講最蒙恩遇陛下踐阼之初置之從列爾後困于排抵幾至危殆起知泉州不及赴而卒其家索然次子已夭長子師轍窮匱孤獨曾經一任改奏京秩年過五十栖栖逆旅所向不偶誠為可憫臣與傅良為布衣交後又同朝俱掌内外制情義至厚真是畏友其學問文章過臣逺甚實不忍其後之不振竊見紹熙中陛下生辰傅良獻詩大蒙嘉賞親御翰墨寫其詩篇反以賜之臣嘗再拜而為之跋奎墨既已刊之樂石敢以墨本及臣跋語同以上進伏望聖慈俯賜睿覽興念簪履之遺特降恩旨録其嗣子上以見聖主甘盤遯野之思下以慰傅良沈泉之痛不勝臣子之幸攻媿集巻二十六欽定四庫全書攻媿集巻二十七宋樓鑰撰奏議西掖奏槀繳泉州吳淨黨罪案臣比緣承乏暫攝西掖刑房之事職所當書人命所繫尤當加謹嘗攷近歲所斷過四百餘人非不欲求以生之而奏案所言愚民犯法多其自取不敢輕有論奏臣聞之書曰罪疑惟輕功疑惟重與其殺不辜寧失不經經者常也殺人者死法之常也殺人而不死是失之不常也聖人初無意于庇有罪之人而使死者銜冤也特以罪有可疑者可以殺可以無殺殺之則恐其無辜不殺則失之不常寧失之而不忍其不辜而死也國家列聖仁厚凡大辟刑名疑慮情理可憫皆許奏裁率從寛貸國祚靈長此其大者竊詳泉州百姓吳淨黨之事本州見以疑慮具奏以臣觀之亦幾于可憫者矣臣請舉其大略而言之吳淨黨雖非良善之人然其所犯止因已醉而求酒旣無殺人之心又初不操殺人之器許應遂惡其穢語先以木扁擔赶打案中明淨黨黨勢迫見有木柄鐵齒爬挐急把起爬挐以枕背打許應遂額中心一下血出倒地再以爬挐木枕背打左邊肋下虚處扇骨上一下傷重于辜限内身死爬挐旣非殺人之具又當夜分之時穢語初無切害許應遂先以木扁檐趕打偶有爬挐而取擊之止于二下遂致重傷原其本心非是兇惡寘之死地罪有可疑欲望聖慈體大舜惟輕之仁廣列聖好生之徳矜愚民之無知察所犯之非故特下刑寺重别定斷儻蒙寛貸亦必杖脊配流或加逺惡足以償死者之冤矣所有録黄臣未敢書行小貼子臣詳攷本州奏案許應遂被打之時妻阿曽弟許應明同蘇穗奴扶䇿許應遂于煮糖竈前坐向火炙救蘇穗奴等依舊打糖則可見當時亦不以為重傷況本州具奏有云原其所犯本無殺意若便行正斷竊恐不中有此疑慮檢準淳熙敕大辟刑名疑慮奏裁則是本州亦以為疑竊恐難以正斷伏祈睿照繳刑部劄子朝㪚大夫守宗正少卿兼權刑部侍郎鄭汝諧劄子三省同奉聖㫖依臣竊見在法大辟情法相當之人合申提刑司詳覆依法斷遣其有刑名疑慮情理可憫屍不經驗殺人無證見四者皆許奏裁此本朝累聖仁厚之至紹興以來凡奏裁者必貸見今所行屍不經驗殺人無證佐而奏案中情理分明者皆自依斷必委提刑親臨察其無冤而後處決不以其奏裁而幸免也其刑名疑慮情理可憫者又皆詳酌罪犯或貸或不貸亦非盡從輕典也年來死罪日報思欲澄源正本以幾刑措而未有以為䇿今忽奉前項指揮臣再三紬繹雖是申嚴舊法欲革淹延之弊深恐未易施行敢因其言條列如後一謂州郡之吏慮申提刑司未免有財賄之費徑以聞之于朝廷提刑司亦利其安靜無事不惟不復詰問間有申詳覆者亦疏下州郡使之奏聞臣竊以為未然提刑以提㸃一路刑獄為職州郡詳覆而本司之吏利于受賄此當責之提刑非之之弊也當有以禁止之豈可縱而不問若以為提刑司之吏利于詳覆之有得則所謂利其安靜間有詳覆亦疏下州郡使之奏聞者官耶吏耶以為吏則彼方利詳覆之財賄而疏下者非其所利也以為官則亦當以此責之提刑别議申飭可也一謂刑名初無疑慮情理初無可憫類皆餙為辭說而以數百幅之案牘上干九重之聴覽中書之務不清都司之事日積刑部疲于擬議棘寺困于約法臣竊以為未然初無疑慮可憫飾為辭說者蓋有之矣然求之于古用刑之際寧過于詳毋過于簡故王制曰成獄辭史以告于正正以告于大司寇大司寇聴之以告于王王命三告參聴之三公復以告于王王三又然後制刑蓋如此其詳唐制諸州斷死罪雖非疑慮各三覆奏亦不以為繁也今奏案之上九重亦惟以視其成而已中書之務不清恐不專為此若都司刑部棘寺則職專在此為此言者恐未免于憚煩之譏一謂諸州因禁以候奏案之下淹延日久其聞證佐牽聨之人或監或繫多有死于疾病飢餓者豈不傷聖世欽恤之仁而上奸天地至和之氣臣以為此論誠美矣奏案之稽留以至淹延誠為大患是當别議措置如此令一行州郡承風觀望鍛錬周内或至移情就法茍免駮糾徑從詳覆處斷鮮以上聞殺人愈多傷欽恤之仁奸至和之氣必有甚于今日兼恐囚無生路翻異愈繁淹延愈甚囚繫愈多矣一謂欲乞明降指揮應諸州不當奏之事而輒奏者其當職官吏悉坐不應奏而奏之法朝廷知其難行旣以貼去而改之云今後應諸州軍勘鞫公事如罪犯委有疑惑情理可憫者方許奏裁其有情法相當所犯初無疑慮者令徑申提刑司詳覆斷遣施行臣以為議者固以必不可行而改者亦未應如此行下蓋二者自有見行條法不待申言言之先後意有重輕必欲申嚴若曰情法相當者申提刑司詳覆依法斷遣其委有疑惑情理可憫者方許奏裁則其辭尚緩或别議戒諭則可若今所降臣愚實恐州郡妄希風㫖奏裁之案日少詳覆而斷者益衆雖都司刑寺之事簡而殺人愈多此臣所以寒心也一謂自此敢有違戾者必罰無赦又小貼子内稱間有將賊賍低估價錢止作四貫七八百文以應賍不滿之條若此等類乞今後許從刑部㸃對將官吏取㫖施行臣竊以為尤非也漢景帝之詔曰獄疑者有司有司所不能決移廷尉有令讞而後不當讞者不為失政恐人之畏罪而不讞故以此誘之今而曰必罰無赦則誰敢讞乎近蓋嘗以讞之不當而罰檢法之官論者固已深慮而況此明禁之乎低估價錢者取㫖施行則今後必多贓滿之人尤非臣所敢聞也竊觀自古書傳所載惟務寛宥如與其殺不辜寧失不經之類不一而足矧祖宗以來惟恐有司不以冤獄上聞大中祥符六年眞宗以外郡斷獄有疑及情理可憫者避大理駮糾不卽申奏詔令申提㸃刑獄官覆實具案附驛以奏聞付大理寺詳覆取㫖天聖四年仁宗詔自今大辟案情理可憫而刑名疑慮者更不申提㸃刑獄官竝具案聞奏如無枉濫情弊更不駮勘未聞有使之不讞者也右前件所陳上瀆天聴罪在不赦竊以為今日斷獄旣未有澄源正本長䇿使斯民之無犯莫若且仍舊貫無事改作深恐講之未詳反致已甚拳拳納忠不敢愛身臣非好為立異利害所在職所當言不容緘黙伏望聖慈詳察寝罷上件指揮實為天下幸甚所有録黄臣未敢書行繳皇后宅恩澤李孝純等奏合得恩澤一十八名尚有八名乞依安恭皇后宅體例施行臣仰惟皇后母儀天下所得恩數自有故事然司封格法但載大禮恩澤數目其冊寳推恩止係特降指揮大率國家循例等事有其舉之莫可廢也有其廢之莫可舉也皇后冊寳親屬推恩舊得二十五人隆興二年因臣寮申請特減七八此安恭皇后之例也至淳熙三年壽成皇后自以别無承受之人于十八人中又乞減省遂又減八人紹興元年皇后受冊先得㫖應照淳熙三年以前條例及有司别具前後體例以聞得㫖與十人仰見陛下遵守家法莫敢舉之之意今因李孝純等陳乞卻復八人雖比之舊制仍少七人正合安恭皇后之例然已經淳熙三年減作十名及紹興元年特㫖裁定而今日又復增添在陛下崇尚恭儉之時不宜有此如聖意以李氏三位子孫數多俯循其請乞降睿㫖所添八人止許奏本宗親如此則既不失恩厚又有樽節不致汎溢已甚所有録黄臣未敢書行繳林大中辭免權吏部郎除直寳文閣事與郡同給事中尤袤臣等聞之蘇軾上書于神宗其論存紀綱曰建隆以來未嘗罪一言者縱有薄責旋卽超升許以風聞而無官長風采所繫不問尊卑言及乘輿則天子改容事闗廊廟則宰相待罪臺諌固未必皆賢所言未必皆是然須養其鋭氣而借之重權者豈徒然哉將以折姦臣之萌而救内重之弊也又曰彈劾積威之後雖庸人亦可奮揚風采消委之餘即豪傑有所不能振起此天下之至論也仰惟陛下隆寛盡下和顔受言而臺諌之臣相繼去國者已多侍御史林大中任言責者三年餘矣最䝉眷注言聴諌行前因論事除吏部侍郎雖去言職遂正從班人皆以為陛下賞之也辭免一再除職與郡大中以書生起家陛下拔擢至此在大中之分足矣而臣等猶敢有言者非為一大中也為臺諌事體惜也非止為臺諌事體也為國家惜紀綱之地也大中論一少卿亦不知所言之詳而同日與郡陛下既以為權侍臣矣而僅一直寳文閣天下傳聞必以為朝廷以言罪人乃與所論之人俱坐汰斥實傷國體且虧仁厚之政近年臺諌風采日消正賴陛下主張使之振作以强主威以尊朝廷以讋姦邪以沮僥倖言脱于口應之如響中外竦動紀綱自張不然則所損甚多來者亦不可為矣公議皆賴陛下選大中言職或留之論思獻納之斑度今事勢大中義難復留敢望聖慈念祖宗之深意鑒蘓軾之至論詳察事體無令言者與被論者同日而去施行稍有次第使得從容引退優禮以遣之養臣下敢言之氣全國家退臣之禮猶足以示四方儻陛下慨然感悟曲留其行則臣等幸甚過望士大夫感悦奮勵孰不思罄竭以圖報哉所有録黄臣等未敢書行繳皇后宅門客親屬補官皇后歸謁家廟親屬推恩數内門客蔣孝曽親屬張孝詵霍淵霍溥白身補官臣比者以李孝純等陳乞還給皇后恩澤八名嘗具繳奏乞將所添八名止許奏本宗親奉御筆特與書行臣伏而思之雖比之壽成皇后添此八人然正合安恭皇后之例臣亦不敢固執即已施行近者伏覩皇后歸謁家廟一行推恩給事中論駮䝉陛下曲從其言仰見聖主化由近始中宮以義制私朝政清明中外悦服近來親屬推恩雖人數比舊為多然出自宸斷裁節横恩大率略盡臣輩尚復何言仰惟陛下從善如流千載一遇詎敢失職以負聖明如李孝純孝友轉行右武郎臣亦不復論列命婦加封親屬轉官悉當書行惟是門客蔣孝曽白身補將仕郎親屬張景詵霍淵霍溥白身補承信郎求之故事既無比例比之衆人最為太優蓋白身補官豈是細事官宂已甚不應開此倖門前此止以李氏子孫親屬衆多特㫖放行恩澤張景詵霍淵霍溥既是親屬即合于所添八名恩澤内補官庶免又于十八名之外别添三人反過安恭皇后之例若門客則無補官之例尤不當僥冒補授欲望睿㫖今親屬三人于所添八名内奏補仍追寢將孝曽補將仕郎指揮或與免文觧一次實為允當所有録黄臣未敢書行攻媿集巻二十七欽定四庫全書攻媿集巻二十八宋樓鑰撰奏議西掖奏槀繳潘景珪差知平江府臣仰惟陛下不忘簪槖之舊念景珪家食之久授以大藩本無不可兼景珪屢試劇郡節用明法未嘗有不善于民惟是近歳洊致煩言倍費君上保全之賜王畿輔邦吳門最大而起于散地而遽得之必至公論籍籍恐非所以愛之也士大夫茍無大過清朝不忍終棄矧如景珪付以一州自可辦治而臣猶以為言蓋恐未允公議終難區處欲望聖慈改畀以次州郡俟其治績稍見以序陞遷不過少遲歲月人亦無得而言所有録黄臣未敢書行繳劉煒監司差遣聖㫖首議禁戢私錢今已見效依舊與監司差遣臣與劉煒初不相聞知第聞其為人頗有志于事功故朝廷任以邊郡權為淮漕然以前年禁私鐵錢之事觀之則知其人非善于處事者也兩淮鐵錢私鑄太甚浸淫入于内郡合行措置禁戢人雖以為私憂然無敢以身任其事者朝廷以衆言下之漕司煒自任其事故一以委之然而慮之不審處之不詳行一切之令而欲去積年之弊當時公私兵民行啇坐賈雖貧富多寡之不同茍蓄一錢則望一錢之用而煒為之太遽徒以片紙出令使盡失其平一路騷然無不怨憤愁苦其不致生事者特天幸耳是後倍費朝廷調䕶為之遣使為之集議始則降官㑹終則給交子紛紜乆之中外寒心僅得少定至今追咎未已猶未有以為久久之計識者方且憂之雖得私錢粗息所傷已多是何異拔小兒之齒齒雖得脱而兒殆矣如此處事誰則不能若非朝廷改圖幾無以善其後方是時煒亦倉皇無䇿幸而罷歸得以茍免尚足以為功乎陛下若念其為國任事其志可憐前日之擾非始謀所及不忍廢棄則可耳今忽有㫖以其首議禁戢私錢今已見效依舊與監司差遣若反以為功而賞之者誠恐此命一出必致大駭物論亦無以謝淮甸之人臣雖甚愚知其必不可行故不敢以仇怨為憚冒昧奏陳欲望睿慈寢罷上件指揮少俟事體平息録之未晚臣數犯天威罪在不赦惟陛下原貸所有録黄臣未敢書行繳陳峴差知靖江府臣竊惟國家之待士大夫亦厚矣雖有過愆陷于罪籍未嘗終棄遲以歲月多抆拭而用之此朝廷之至恩也然亦當視其人之如何彼雖有廢放之歎我則有民社之重平時既無善狀而又貪黷太甚者自不應復以民社畀之而況師藩乎峴之處家醜聲甚彰棄妻之訟人憤其寃峴之居官汙聲尤著帥蜀之跡最不可揜前後章疏指陳實事臣不敢復論頃除鄂渚守臣公議尚且不容隨即寢罷桂林重鎮控制南方非有才具不足以應事機非有亷節不足以服逺民其可使峴居之乎間廢雖久衆尚斷斷臣若不言亦必有論之者欲望聖聰寝新命于未行之時别選良牧以鎭撫二十五州之民庶使士夫知畏公議所有録黄臣未敢書行繳鄭汝諧除權吏部侍郎臣伏見四月二十七日鄭汝諧除權吏部侍郎二十八日給事中黄裳繳奏五月二日黄裳除兵部侍郎于是汝諧與裳俱不就職因仍不決遂至踰月臣下罔測聖意所在今三月三日始有前項指揮臣竊惟給舍臺諫紀綱風采日以振作則朝廷益尊寢以消彌則亷陛陵夷蓋紀綱者陛下之紀綱風采者國家之風采必頼陛下主張然後可為故自來中外之臣所以畏朝廷者以其有給舍臺諫也所以畏給舍臺諫者蓋以尊朝廷也故非才而得美官無故而求横恩者皆惴惴然不敢自安始則曰給舍肯故過否一聞臺諫奏事則又曰不至及我否累朝以來務謹重此選使人不肅而嚴蓋未有如今日不振者也況所貴於士夫者為其能存㢘恥侍從之官又士大夫所屬望以為表率也小大之臣一聞給舍臺諫語及姓名不當辦說是非即合奉身而去脱有不當公論固存不惟伸言者之氣正以増朝廷之嚴臣不敢更引古義只以近事明之淳熙二年莫濟以袐書監兼權中書舍人因司諫湯邦彦論韓彦古職名事後有貼黄云初除職名後省失於繳駮莫濟自念前在後省曽經書行皇恐引咎即求補外壽皇謂輔臣曰濟何故求去輔臣以實對壽皇即取入文字掲去貼黄而後出濟終不敢復留壽皇亦聴其去人皆以濟為賢而服壽皇之重言路也是時習熟見聞亦不以為異事近日一二士夫明見臺諌推彈乃敢睥睨復留名為引退實有覬望强愎之氣反出言路之上汨喪亷恥取笑朝野不得已而後去言者又與之俱是以風采摧頽無復氣燄汝諧士人也一聞裳有繳駮即已出城待命一再入奏力求外補固已深知事體不復可留陛下雖使就職汝諧必畏公議不敢效尤彼莫濟初無姓名在白簡中推迹其故猶自引去矧汝諧親為黄裳繳論何顔復就從列黄裳已䝉陛下眷留臣不敢復論然終以不得其言而奪封駮之矣而汝諧秋毫不動儼然居職事理顛倒公論不平亦何以表率朝列宣示中外流傳四方重取譏訕雖欲以職事自見亦無以為容矣臣愚欲望睿慈重紀綱風采之地全士夫亷恥之道許其補外以正事之體度汝諧未敢就職必再辭免而從之則陛下退人以禮汝諧處身有義君臣之際頗為得體實天下幸甚臣誠不肖攝事西掖泯默憤懣寢食不安正以事未經申不論奏今而不言則為失職是敢不避斧鉞冒貢愚忠伏惟陛下深察早賜處分所有録黄臣未敢書行繳鄭汝諧第二狀臣今月初三日準録黄鄭汝諧日下赴部供職初四日嘗具奏繳至今未䝉處分初七日再準録黄鄭汝諧辭免乞祠禄或一郡奉御筆依已降指揮供職臣么麽攝承西掖以論駮為職言語拙訥不足以動天聴汝諧之奏既勤陛下親灑宸翰必是已䝉省覽其言曰自叨除命之後凡三遭省官論奏其意不過欲正國家之事體而存給舍之紀綱是其言可聴者一也又曰論事者罷被論者留不惟事體不順而紀綱幾于盡廢是其言可聽者二也又曰自始被命至今已四十日矣有合區處施行之事不為不多乃以一小除目閲日已久何必留臣以啟多事之原是其言可聴者三也其説皆與臣言暗合以此猶知人情本不相逺此天下之公言也況黄裳一經繳奏陛下察其難以竝在從列故處以王府舊職而汝諧之命謝深甫繳之臣又論之矣汝諧必知難以竝立深甫與臣又當如黄裳之引去自此一有論奏則先危其身向來猶得與之俱去去非臣子之所憚與之俱去事已可駭今則論事者罷被論者留臺諌給舍不復可為雖具其官而職盡廢其何以為國乎陛下若徇其請付以外郡以靖朝列在陛下一舉手之頃耳朝廷則可以正紀綱振風采汝諧則可以全去就知亷恥上下兩得之矣近來事緒日出論駮日至煩瀆聖聴皆非得已陛下本務安靜而滋益多事臣愚不避萬死伏望聖慈採之公論付之無心刻印銷印惟是之從使朝廷肅然是非别白實為幸甚不然恐紛紛未已徒駭觀聴無益也所有鄭汝諧供職指揮此特其一爾欲望先賜宸斷俯從所乞他日如欲用之亦未為晚上項録黄臣未敢書行繳鄭汝諧第三狀臣備數左史誤䝉聖恩兼攝西掖比因鄭汝諧除吏部侍郎曽經給舍繳奏之後得㫖令日下供職繼又準御筆批汝諧乞祠劄子臣兩具繳奏未承處分又䝉宣諭書行臣以愚惷固執不敢奉詔伏念臣以么麽小臣區區抗論實非有他正為朝廷維持紀綱庶幾後省猶有官守然自知荒陋之文不足以立雷霆之下朝夕俟命靡遑寧處今兹再降指揮仰窺聖意以汝諧為有才故排羣議而用之萬鈞勢重罪無可逃三諌不從臣可以去不敢更有繳奏但以上件録黄難以書行臣亦無顔復玷朝列謹具奏聞見今居家俟命伏望聖慈將臣早賜罷黜庶免久妨賢路冒犯宸嚴臣下情無任惶懼戰慄之至所有録黄臣未敢書行繳給還陳源産業什告告劄臣竊惟陳源近除内侍省押班後有繳奏䝉陛下採納雖許其趨走于禁中而外廷之議獲伸告命不給俸禄不支仰見皇明洞燭足使近習屏氣今來忽有指揮給還物産臣亟取㑹數目除追納及賣過外所餘不多若不必深較然事體所闗則有不可陳源罪惡貫盈死有餘辜幸䝉寛宥復備使令陛下既已伸外廷之議而復還其已沒之物產則賞罰近于無章矣且其前後賜賚及其侵盜其數不貲今其所餘田産不滿萬緡雜物稱是又多不可售之物舉以與之豈惟不足以示恩適所以啓寵納侮且小人無厭之求其勢未必遽止臣愚欲望聖慈追寝上件指揮以絶姦萌不勝幸甚所有録黄臣未敢書行繳封樁庫取金銀臣竊惟祖宗置内藏庫蓋以乗輿服用之餘别儲以備邊費壽皇置封樁庫亦欲蓄于無事之時以為有事之用非若前代瓊林大盈專以為私藏而輕費也故累朝惟聞時出内藏以補有司之不給借用或至百萬償還不足徃徃貰之未嘗無故反取外帑以實之也高宗皇帝嘗曰祖宗儲積内帑本以備邊陲緩急之用此眞陛下所當取法也今日比祖宗時事力不及十之三四專仰東南以立國取已竭澤矣州縣困乏田里憔悴重以去年水旱所在饑荒江上流殍盈路徃來皆能言之聖慈力加賑恤所濟無幾二麥未熟可為寒心當今别無生財之道惟賴陛下身履恭儉愛惜財用禁戢貪暴檢柅姦弊尤恐不給而竊聞内庭宴飲無時費用無度内帑所積支用不貲既不領于有司無從知其虚實然觀屢降指揮多取樁錢物則所謂當亦不妄臣職分戸房每見宣取數多實為驚懼葢今日民財竭盡既不在民則當在官而經費既不可減用之又如此不節封樁家計所儲正自不多若如此支用又將竭矣内帑既虚封樁所竭國將奈何古者無三年之蓄猶曰國非其國而況虚竭如此豈細故哉臣職當論奏正以每降指揮必以恭奉三宫為名故臣子不敢有言然而外議籍籍謂所取之錢多為内廷浮費不過支散樂工賜予近幸日甚一日如此以江海實漏巵山林供野燒豈有紀極哉州縣上煎下迫不惟民不堪命吏不得息縣既不可為州亦無少寛監司例被督責版曹日憂不足椎剥疲民取其膏血百十之逋動遭鞭撻取之盡錙銖用之如泥沙豈不可痛哉今月十三日連有兩項録黄其一曰令封樁庫支銀八萬兩㑹子二十萬貫赴内藏庫供納恭奉壽聖隆慈備福皇太后尊壽皇聖帝壽成皇后使用陛下自正月一日行慶壽禮之後至今未曽再駕内外方日夜望鳴蹕之行既欲以錢糧為恭謁之用臣敢不書行又一日得㫖令于封樁庫取金二萬兩銀五萬兩内藏庫送納此項實為無名之費一日兩指揮前者則為奉重親之用猶為有名如後一項則為不可府庫陛下之府庫微臣安敢方命誠願聖慈惻然興念母以生民膏血供無涯之費以固邦本以保宗社夫二萬之金五萬之銀在陛下富貴之極視之若不多以民間計之不知為中人幾家之產細民幾萬之資州縣取之于民不知用多少笞箠竭多少資産輟多少衣食而後得此故拳拳為陛下言之望俯鑒愚衷收還詔㫖務為節儉以益聖徳以寛民力實天下幸甚所有録黄臣未敢書行繳萬鍾除起居郎兼權中書舍人臣仰惟陛下即位以來求賢是急收召人物布滿班行是以政事雖有闕遺而紀綱不到隳紊茲忽聞萬鍾為起居郎兼權中書舍人人已甚駭臣尤不遑鐘之為人臣所深識性資浮薄舉止輕儇少有不檢之名老無自艾之意世居京邑日偶賤倡至今市井之間咸知姓字凡曰縉紳之彦鮮與交游重玷臺評難逃物議頃方屏處俄報召還何縁受知不使置散言者强顔就職固已可羞鐘乃先期入朝如恐不及復居卿列尚曰舊人謬厠從班實汙清選但工諧謔何以當吏筆之嚴僅習歌調何以代王言之重斷然不可衆所共知豈微臣視樊噲恥與為伍將有正士問元稹適從何來若陛下必用萬鍾則孤蹤謹避三舍議已出口安可同寅詞不逮心姑陳大概敢祈睿斷凾寝誤恩況茲西掖之司下房最宂身當衆怨力拒斜封今欲使斯人在官是先與羣小為地亟伸繳奏仰冀聴從重千天威恭俟嚴譴所有録黄臣未敢書行攻媿集巻二十八欽定四庫全書攻媿集巻二十九宋樓鑰撰奏議瑣闥惷言繳馮輔之等轉官改易製造頭冠法服等竝皆精緻幹辦御藥院馮輔之黄鑑吳思忠李唐卿各轉一官内馮輔之吳思忠遙郡上轉行黄鑑階官上轉行李唐卿轉行遙郡臣仰惟陛下即位之初憂勤抑畏臣子奉職朝廷清明海内欣快雖水潦為災嵗事壊于垂成而人心不恐者以政事紀綱之可恃也兹奉聖旨以御藥院改易製造頭冠法服依淳熙十六年體例幹辦御藥院四人竝特與轉行一官臣誤蒙陛下擢寘瑣闥不敢不以愚忠仰圖報効臣竊惟歴代人主或出于幼沖不知爵賞之可重或强愎自用不以法制為當守又以嗜慾荒惑不能自克則左右近習之人乗時肆志引例破法惟其所欲外庭不能支吾則攀援僥倖馴致亂階者多矣陛下誕膺丕圗人心翕然詔書所至危疑之情即日盡定葢知陛下仁孝素著而務學為急習熟世故親履時變反覆史傳之得失洞知小人之情狀無酒色之娛絶器玩之好專欲親近儒生講論經理此不世出之主也所望超然逺覽削去弊蠧排抑僥倖振起紀綱惟祖宗故典是遵惟天下公議是取則太平之期可望今即位纔及兩月而已復容受欺罔遽出横恩以塞無厭之欲其何以示天下夫人主恃以立臣民之上者以紀綱為急横恩一出則是斜封墨敕自壊紀綱陛下心所備知目所親見凡可鑒可戒之事皆當深思切慮力自振抜豈應因仍舊例以黷初政近年以來每遇如此指揮臣僚無不繳駮率蒙依奏後雖製造頭冠法服轉行之人亦以繳奏終于回授而況于改易者乎今來馮輔之呉思忠竝係武功大夫遙郡團練使若于遙郡上轉行則皆為防禦使黄鑑見係武功大夫遙郡承宣使若與階官上轉行則為横行右武大夫李唐卿見係武功大夫若與轉行遙郡則為刺史夫武臣至于武功大夫則為止法正如文臣之中大夫也武臣大夫實歴七周年用七舉主始轉横行非有功效顯著不帶遙郡如文臣不為侍從不得為大中大夫二者皆有累數十年而不遷終身而不得轉凡有恩賞正許回授此一定之法也臣愚欲望睿斷將上項改易頭冠法服賞各與轉一官其礙正法人竝與依條回授以昭名器之重以示天下之公以窒僥倖之門以光初政之大不勝幸甚所有録黄臣未敢書行繳隨龍講官等轉官臣竊惟陛下龍飛御天凡舊日攀附之人均轉官資誠未為過但以國家官宂至此已極而六年之間兩遇覃霈爵賞益濫嘗攷隨龍恩例在祖宗時止轉一官多不過兩官正縁高宗立國于擾攘之時一行官吏自元帥府執羈靮于萬死一生之中故南京即阼之初隨龍人竝轉四官夀皇朝雖轉四官然兩官係用建儲恩併轉非專為覃恩也太上皇朝四官之賞葢是失于契勘陛下不以位為樂不得已而後受臣于彭龜年黄由沈有開同在後省見其引義力辭其言至切心甚服之臣愚欲望睿斷檢照祖宗之舊典裁節近年之横恩酌為中制使隨龍講官各轉兩官曾任藩邸講堂官各轉一官以成舊僚辭寵之賢以示陛下不敢自比于祖父之意天下幸甚臣冒昧進言不避紊煩所有録黄臣未敢書讀繳戴勲除知閤門事臣仰惟陛下龍飛御天潛藩舊人際千齡之㑹無不有攀附之幸矧如勲者服勞五年職為内知聖心記存擢而用之誠未為過然初除帶御器械臣僚以員數已足恐其濫額以啓倖門嘗具繳奏今奉使方歸自言閤門舍人今既故除既合解罷乞祠禄而遽以知閤處之則為過矣始八月中臣寮之奏欲少俟他日有闕以頒成命得旨依已降指揮則是除目已定又曰候有闕日供職則陛下所以處之者可謂詳盡矣今乃猥以員數已足欲從朝廷乞一外祠而遂得知閤雖曰不要君臣不信也竊見夀皇即位之初龍大淵曹覿在潛邸尤久亦止除御帶至次年春間大淵自樞密院副都承旨覿自御帶俱為知閤時金安節周必大相與繳論甚切且謂二人攀附雖舊過此以往事君之日甚長儻其謹畏有加何患身不富貴奉聖旨罷劇就閒宜允衆論尚兹回繳可特依奏大淵别與差遣覿依舊帶御器械一時君臣之間如此其盛然猶其進不已恃寵弄權寖預政事貽害甚多太上皇初年譙熙載姜特立徑除知閤無有論者公議深以為惜然猶是太子春坊又非内知之比如勲本是士人素被眷知使事甫畢且當退靜以俟君命不應遽有此舉上則以御帶為未足下則欲乞外祠以徼取其所欲如控囊然若遽以知閤處之則陛下之官非惟不足以厲世摩鈍亦不足以慰滿左右之意臣實憂之欲望睿慈深察愚忠追寢新命今譙令雍既以持服未可仕宦勲則當用八月十九日聖旨候有闕日供職或恐聖意念其未有職守即乞如吳炎依蔡必勝例權差候有闕日撥填庶得允當所有録黄臣未敢書讀繳闗禮張宗尹特與隨龍恩數臣竊見前項指揮頗駭觀聽臣非敢故為煩瀆實以隨龍恩數自來無有特與之法一開特與之門恐恩倖援來者無已陛下必有難處者伏覩淳熙十六年三月十七日聖旨隨龍講官承受官可各轉四官以承受官厠于隨龍之數已非令典然猶不至如今日特與恩數之濫是時承受官係劉慶祖以無官可轉已于吏部陳乞回授今來闗禮張宗尹若果係承授潛邸奏報兩殿文字陛下念其有勞欲與以恩數乞照淳熙十六年指揮施行庶免開特與隨龍恩數之門以塞後來攀援之路不為小補所有録黄臣未敢書讀繳隨龍人轉官并王倓等八人恩數臣近者論奏隨龍講官及曾任藩邸講堂官轉官事乞酌為中制講官各轉兩官曾任講堂官各轉一官得旨依奏仰見陛下虚心應物從善如流臣不勝感涕有君如此何忍有懐而不言尋奉聖旨隨龍官吏諸色人軍兵等開具職位姓名可各轉四官資白身人與補保義郎曾經藩邸應奉人可各轉四官資等臣縁未知前項講官處分未敢論奏今又準今月十日指揮依已得指揮官吏諸色人等轉官補官應千恩數等竝依淳熙十六年體例臣僚繳奏數内王倓八人十四日得旨王倓等内有官人轉兩官白身人與補承信郎陛下之不私舊人足以示大公于天下然臣猶未有盡其愚須至再瀆天聽臣前奏謂隨龍恩例在祖宗時止轉一官多不過兩官正縁高宗立國于擾攘之時一行官吏自元帥府執羈靮于萬死一生之中故南京即阼之初隨龍人竝轉四官等事其理甚明今講官及曾任講堂官已蒙陛下依奏減半推恩則隨龍官例諸色人霍汝翼王徳謙以下各與轉兩官白身人補承信郎曾任藩邸應奉人各與轉一官其王倓等一體照曾經藩邸應奉人推恩則事體輕重與講官等一體實為允當陛下在位統業以天下為憂身率以正無敢不服累年横恩至此裁定天下必當稱誦聖明自此抑僥倖振紀綱惟聖意所尚朝政清明此其本也臣職在封駮苟有管見不敢避仇怨而負天子伏惟陛下裁赦所有録黃臣未敢書讀繳鄭熙等免罪後省看詳臨安府進士鄭熙等連三上書所言無禮奉聖旨竝免罪臣竊惟陛下即位之初下詔求言章交公車來者甚衆後省被旨看詳雖未能徧其間議論剴切有補于政者猶未暇一一奏聞若鄭熙輩上書再三言寖不遜所乞幸建康事尤無足採得旨免罪仰見聖主寛宏之度然臣又有愚見不得不以奏聞古語有之狂夫之言聖人擇焉以言求人曾未聞有所襃表而遽有免罪之旨不可以家諭戸曉必有輕議于下者況士人上書亦間有無稽之言甚于此者欲望聖慈葢之如天若此等人一切容之萬一有伏闕邀駕等事自有常規寘之有司以旨赦之庶全國體若因看詳而免罪臣等受謗而不足道恐非所以廣陛下之盛徳也臣一日之間屢有論奏實非得已自非賜以矜察臣實無所逃罪如鄭熙等果有不遜之心免罪之後亦不能禁其妄發不若寢而不問靜以待之臣懐不自已犯分瀆煩無任戰懼之至所有録黄臣未敢書讀繳蔣介除右監門衞中郎將臣竊惟古者侍御僕從罔匪正人其選擇之遴不徒取其勇力也近時環衛官閤門帶御器械等即取武勇之士又參以才諝韜略文學之人誠有古意此國家之美事也如介以右科發身人物議論足以備環衛之列久在閤門得郡逺去陛下親擢稱此選臣亦喜朝廷用人之當除目之下即已書行徐攷員額則尚有可議伏見初置環衛官以來三十餘年矣元以十員為額實精其選内以嚴侍衛之職外以示將帥之儲今十員已足而又除介以介之才收置于員外無不可者特以遴選人才之地此門不可遽開一開此門權倖貴要便將攀援而進予援苟濫則名器愈輕不可不慮也臣愚欲望聖慈别賜處分庶免攀援僥倖寖壊成法所有右監門衛中郎將録黄臣未敢書讀繳李謙召試閤門舍人臣竊惟武臣之召試閤門舍人與文臣召試館職無異必其人物才業足以厭服衆論不可以輕予也李顯忠稱號名將而有孫能以文學自好嘗名薦書陛下寵以召試宜矣臣初不知謙何等人攷其家世乃知其父師顔曾任建康府統制于紹熙四年七月十一日乞致仕如此則謙之服父喪方踰小祥猶在服制中也在法小使臣遭父母喪只給假百日本非令典近方有臣僚論奏議更此法見今看詳況本法自有願持服之文正所以待孝子也謙為小使臣固可用百日之制矣嘗獲文解則是願為士人而不持父母喪可乎未除而經營召試欲玷清選則是冒哀求仕尤法之所不容也欲望睿斷追寢成命勒令歸持父喪俟服滿而後從仕觀其見識凡下亦不足以辱召試之寵所有録黄臣未敢書讀繳劉詢帶行遙刺臣照對劉詢兩任簿書官合轉兩官酬賞得旨依劉堯咨趙友仁例特與轉行遙郡刺史臣竊攷之劉堯咨淳熙六年以武功大夫奉使回程特授榮州刺史則是以奉使恩而轉遙郡非以簿書之賞也至八年始以簿書任滿賞特授忠州團練使趙友仁淳熙四年以在殿陛日久應奉有勞將兩任簿書任滿轉兩官恩例特典轉行遙郡刺史此詢所引之例也臣攷之成法武功大夫為武臣止法今來雖有趙友仁例縁友仁係在淳熙四年至淳熙十六年太上皇帝即位之初所降指揮竝不許以泛賞遷轉止依條法施行自此以後凡所以泛賞引例轉遙郡横行者皆許繳駮或吏部執奏終于回授而後已臣愚欲望聖慈特降睿旨寢罷劉詢帶行遙刺指揮令與依條回授所有録黄臣未敢書讀繳王涇等放令逐便臣伏覩上件指揮竊惟陛下聖孝仰奉三宫以涇等皆醫官舊人故許逐便以備使令然四人之貶罪有輕重未易以一概論也方高宗升遐之初涇追兩官勒停一千里外州軍編管馬希古追兩官勒停五百里外編管後省臣僚獨論涇之罪不容誅以其輕脱縱肆所用之藥不依方書不隨病證率意自任致此禍變人人憤鬱恨不食其肉罪大責輕縱未置死地乞斷配以副衆心有旨王涇追毁出身以來文字特決脊杖二十刺面配千里外牢城收管紹興三年正月指揮周昭應奉醫藥不謹除名追毁出身以來文字刺配瓊州牢城永不放還臣愚竊謂夀皇盡孝執禮不勝創鉅痛深之心故處涇之罪僅恕其死而已太上皇帝之恕周昭行道之人多知其故含怒蓄憤以致違豫者久之竄之海外聖意可知在今日雖經赦宥不應遽使之齒于平民臣以為馬希古尚可恕也王涇周昭之罪不可恕也欲望睿旨將王涇周昭逐便指揮特賜追寢毋致失刑以累初政所有録黄臣未敢書讀繳醫官鄭至逹改風科入内内宿臣聞有國有家者立法之制使有司守之有司不能守則君上當治其廢法之罪若徇一夫之請越法自便有司能執法守而上之人反欲以一時指揮而廢法開僥倖之門以來無涯之請則法令俱成無用矣醫雖曰伎然先王之所甚重矧國家禁廷之所用上奉三宫所宜精擇元豐之法選保試補其制甚嚴政和少變宣和又申嚴之俾竝依元豐法雖奉特旨傳宣宣押等仰醫局執奏不行可謂詳盡矣臣在後省所當遵執實縁年來繳奏多急于大者而以此等猶為細事亦間有書行自知其非今朝政清明凡僥倖廢法之事遇之輒論陛下俯從如響則在臣尤不敢忽所有鄭至逹特改風科與差入内内宿其于法制不可行者二而事體之大不可者一臣敢陳之揆以宣和執奏之法一不可也又乾道三年指揮内宿風科醫官以二員為額見今溢額人且令依舊今後竝不作闕差人二不可也是二不可者翰林院醫官局能執奏以為不可而聖旨特依今來指揮則是臣所謂有司能執法守而上之人反欲以一時指揮而廢法此于事體所繫尤重自此苟有勢援之人皆視法令為甚輕悉以特旨衝之則舊法幾于無用矣此臣所謂事體之大者也臣不識鄭至逹為何人伎藝之精否攷之案牘則累經繳奏淳熙十二年為徳夀宫醫官有勞特與免試驗供職差人内内宿淳熙十三年又為醫藥有勞差充徳夀宫祗應皆為醫官局執奏奉聖旨特依今來指揮皆為臣僚繳奏而罷不知懲創又圗特旨以破舊法則其人頑狡可知況内宿風科醫官既以二員為額目今已有員至逹又在三人之外又聞大方脈以七員為額正縁千求不止已是濫額數員可見冗濫今若不行止遏恐來者不已是醫官局能執法守而舊法日以寖廢臣等反失其職矣是以冒昧歴歴言之欲望睿斷追寢特旨庶使僥倖攀援之人自此帖息不勝幸甚所有録黄臣未敢書讀繳謝淵請給全支本色臣仰惟陛下奉承三宫惟恐不能順適聖意然法制之設所以公天下而共守之有不可踰者知閤謝淵為皇太后親弟請給依韓侂胄例特與依禄給全支本色有以見陛下奉祖后之意然真俸之支則有不可吳瓌吳琚同為太皇太后親姪同為檢校少保節度使可謂事體至切矣然吳瓌之請真俸已久無有議者而吳琚之請太上皇為之降旨則黄裳以給事中力陳者三四陛下為之降旨則黄由以攝給事中又至于再三論奏而後止疑若有甚異者無他瓌在紹興元年十月指揮之前而琚在指揮之後者指揮既定之後若又開此門則戚里攀援何時而已兩朝聖明終允其奏韓侂胄之真俸以淳熙十五年十一月降旨正與吳瓌事體一同謝淵之請切似吳琚臣是以不容不論欲望聖慈收寢前項内批指揮自後若不係南班隨龍統兵戰守之人以真俸為請者一切以定制絶之既以杜僥倖之門于節用之政不為小補所有錄黄臣未敢書讀繳傅昌朝改差幹辦皇城司臣竊惟皇城司之職不為輕選臣不知傅昌朝為何人第以名簿籍攷之淳熙十年天申聖節皇后合得䕃補恩澤將一名回授與本閤進奉白身傅昌朝補承信郎昌朝所謂之官雖元係親屬恩澤而補官之日明言以親屬恩澤回授與主管進奉之人即顯得本非親屬而主管進奉止係一時非泛補授故頃以親屬賞典轉官先經之部先示後有給舍繳駮皆謂依元降指揮止合轉至訓武郎止不曾施行至今年七月二十七日指揮云皇太后親姪女夫傅昌朝偶用本殿捧香恩澤補官特與依親屬補授出官施行見今吏部申明朝廷未曾轉行武翼郎夫覃恩轉官以千萬數獨昌朝未得放行葢其出身猶未明白也若止是一時非泛出身其得閤職已是過當難以遽當皇城司之選況昌朝見待幹辦軍頭司猶未赴上臣愚欲望聖慈收上前項皇城司除目俟朝廷取見出身明白放行本人轉過武翼郎然後授之未為晚也所有錄黄臣未敢書讀繳李氏等依宫人例支破請給成國信國崇國三夫人李氏等係太上皇后親屬依宫人例支請臣竊惟國家賦禄俱有條式不可紊也紹興元年士歆妻梁氏支給臣僚繳奏謂一命婦之謂給事體雖若細微然倖門一開攀援者衆蟻穴之不塞可以潰隄遂蒙寢罷夫以士歆為宗室大老其妻一有干請猶為之遽止今無故而給三人尤為無名吳琚為太皇太后之親姪謝淵為皇太后之親弟其請支真俸陛下不以私害公悉從繳奏而止李氏三人因縁戚里不從夫爵得授國封已為幸矣若更依宫人祿式則例支破諸般請給僥冒益甚檢照内國夫人例一人每嵗約計錢近二千緡銀一百五十兩米四十五石綾一百二十五疋羅三十餘疋絹六百疋綿四百兩況一日而併與三人其蠧耗可知陛下恭儉節用為天下先中外方且冀望裁抑内庭用度以紓國力若遽開倖門自此攀援日至何以杜絶臣愚欲望聖慈收還上項指揮以塞戚里無厭之請實為幸甚所有錄黄臣未敢書讀攻媿集巻二十九欽定四庫全書攻媿集巻三十宋樓鑰撰奏議瑣闥惷言繳朱熹除寶文閣待制與州郡差遣臣仰惟仁宗皇帝聖度如天御史唐介以言事得罪貶春州别駕明日中悔命改英州已處之善地矣又明日用其言罷文彦博而遣中使護介之行未幾遂復召用此所以為慶歴之盛臣觀陛下容納直言改過不吝無愧仁皇朱熹始除宫祠深駭觀聽物論紛紛已而聞仍次對之旨則知聖意之已回臣寮繳奏又加寶文之職而與州郡則聖意又愈釋然矣臣雖已論奏兹益進其愚陛下本以閔其耆老當此甚寒不欲使之立講欲望聖慈授以内祠仍令修史少俟春和復還講筵如此則君臣之道終始周盡熹之難進易退陛下素知顧豈以加職為寵惟陛下待以恩意亟使留行進之以禮則熹雖已去猶未出晝可以留矣臣茍有愚見不敢不盡伏冀垂聽而採用之所有録黄臣未敢書讀繳祧廟事御史中丞謝深甫等奏集議祧廟事乞且從禮官第一次陳請奉聖旨恭依臣竊惟宗廟重事非可輕議雖議禮之家古稱聚訟然在上之人所以擇之者如何爾凡事固當從衆要以不專視議者之衆寡惟其是而已矣本朝自開國以來立四親廟之後凡宗廟之事據經守正本無可議治平末年英宗祔廟僖祖親盡遷之夾室而順祖遂居第一室天下無可議者葢僖祖之遷夾室于禮為順太廟者宋之太廟非以第一室為主也自王安石異論奉僖祖已遷之主復入第一室正東嚮而議論始紛紛至今神宗祔廟翼祖遂遷亦禮之宜也蔡京用事專務紹述熙寧之政又唱九廟之制復奉翼祖已遷之主入廟當時詔書明言自我作古可見無所經據若太祖東嚮之議自熙寧以來議者不知其幾至陛下而始定甚盛舉也此事既定遂又議僖祖宣祖祧主所歸攷之于禮經計之以治平故事止合竝遷夾室如順祖翼祖之制正緣熙寧之後推尊僖祖已久又紛然有不當使僖祖下祔子孫之説故衆議中制取唐柳冕之言創為别廟二事皆已得聖旨恭依矣豈應更有異議比聞朱熹曾入文字未蒙降出臣輩無由辨正是否忽又得旨恭依臺諌之奏且從禮官第一次陳請則是止祧宣祖而祔孝宗所謂太祖東嚮之禮又復寢而不行臣實惶駭竊謂如此重事陛下再降旨恭依今忽以數語而改之行之四方實惑衆聽臣未深辨欲望降出朱熹劄子庶見得有所據依者何事果能使中外心悦而誠服則改之未晚若如今日所行則宗廟重事議已定而復搖重事反輕非所以示中外如臣淺陋何足以預議大事苟有所見不敢以畏避而不言伏惟陛下裁赦所有録黄臣未敢書讀再繳李氏等依宫人請給臣近者繳奏李氏國夫人三人請給事伏準御筆可依皇太后妹嘉國夫人例特與書行仰見陛下尊奉太上皇后念三女兄之意故有上項指揮臣豈應不承威命竊惟封駮之地以出納為職君命之出從而出之豈不順便惟知其不可而納之是為舉職況一事之僥倖從之亦未甚害所可慮者倖門一開便以為例援例而進得之者不以為恩不得者遂以為怨此喉舌之地所以必爭正恐其攀援而不已也嘉國夫人淳熙四年初支俸給一時有司失于爭執開此倖門李氏三人遂援此例初失于一今有其三三人既行則後之攀援者又不知其幾凡曰后族姊妹得之則兄弟之婦援之兄弟之子婦又將援之不知何時而已乎況今日國力甚屈不惟不可以望承平之時比之紹興既不可及雖欲比之淳熙比之紹熙亦不大舛今嵗遭夀皇之大喪待金國之信使固已不勝其費而天時如此救荒不暇朝廷傾貲以為民民之受實惠者無縁得徧饑疫可指日而俟盜賊所在而萌芽凜乎可懼之時陛下惟當躬率儉素横恩濫予損之又損猶恐不逮安可聽戚里之無厭援不得當之舊例不思以義斷恩如此之類侵尋不已何以善後臣是以輒忘忌諱再瀆天聰伏望聖慈終賜寢罷如聖意深念從母毋寧别予之財太上皇帝以吳琚不得真俸遂賜之錢庶可全肺腑之恩而不廢天下之法更取聖裁所有錄黄臣未敢書讀繳毛伯益轉行遙刺臣仰惟陛下嗣服之初愛惜名器間有出于左右求請或竝緣賞典或引用近例或出于三宫之親屬茍戾于法有司執奏無不垂聽故朝廷清明可望治效近有李革以應奉有勞由副尉而轉承信郎亦不可不論正以事體至微不敢瀆冒天聽今忽來有上項指揮毛伯益者知其為内侍不知有何因縁直以職事宣榮理宜優異與轉遙郡刺史實駭公論夫以内侍甚衆遙郡至嚴有以賞典等事遷轉者猶不可行指揮再三終于回授而況全無來歴内庭趨走安得言勞便嬖使令豈應優異若此門一開凡有無厭之求陛下遽與施行而臣等又不能繳奏則遙郡不已便圖正任正任不已㢘車留務以致節鉞何厭之有如此則祖宗之法度朝廷之紀綱將遂蕩然何以為國自來内侍求請遷轉屢經繳駮皆有一二可言葢未有如今日指揮僥濫太甚臣是以尤不得不論欲望聖斷追寢上件指揮推究伯益無故僥求上罔聖聰之罪特賜黜責以懲其餘庶幾自此可以少戢此曹不致過有踰分之請實為幸甚所有録黄臣未敢書讀繳重華宫官吏諸色人等及五年推恩轉官臣仰惟陛下欽事三宫務盡孝道重華宫一行官吏等人用徳夀宫故事服勞五年例轉一官資前此方以推恩為遲今幸舉行故典本不當有言然臣有愚見如醫官及礙止法人二項不容不論醫官久饕廩禄竊取寵榮本是庸人僥倖在選夀皇違豫之久中外日伺脈狀以候康復而其詞不倫固已憂慮一旦彌留無不憤痛雖其罪不至如王涇之甚亦以一時多事未嘗明正典刑六月二十三日奉太皇太后聖旨醫官大方脈蔚仲堅郭儀李九齡瘡腫科王懋陳世安口齒科俞時雍竝罷重華宫祗應此葢太皇太后明知其醫藥狀而至仁覆露不欲加罪止從罷遣後至八月間因臺官論奏郭儀李九齡蔚仲堅輩庸繆之罪其言某輩則非止此三人也尋得旨僅降三人者一官未幾至十月初王良佐李九齡郭儀又以應奉太上皇帝醫藥有勞而轉官矣其僥倖已甚皆不復論其于重華醫藥失職如此不至嚴譴已為厚幸安得一例皆與轉官之賞乎其醫官已經降官及罷祗應之人乞更不推恩武臣及内侍等礙止法人數目不少若盡與轉行實為太濫正引乾道二年之制隠下後來即次指揮致有今日施行欲乞竝照淳熙八年七月指揮回授其指揮使以下礙止法人亦乞照前項指揮依條施行其他人數猥衆宫掖事嚴臣不能一一究知其顯然可論者如此欲望明照三省樞密院及所屬曹部照應逐次指揮及臣所奏二項事埋仔細開具施行庶幾實有勞效者不至遺失僥濫太甚者稍得樽節其于愛惜名器之朝不為小補所有録黄臣未敢書讀繳陸彦端將覃恩竝解帶各轉一官恩例特與階官上轉行一官臣待罪東臺論奏固多皆是為陛下愛惜名器節省財用排抑僥倖以存國家之紀綱若礙止法人或轉横行或轉遙刺二事尤當固執一失職守來者無窮不可復為矣陸彦端事太上皇帝為隨龍人衆所知以隨龍之故超授官爵不為少矣若縱其無厭之求則何時而已耶比者太上皇后歸謁家廟彦端于武功大夫併轉遙郡兩宫臣寮繳奏三次以一時人衆太上皇帝聖旨其他礙止法等人竝從所請時令與三人者轉行彦端其一也是以一日隨行之勞而轉與二十年磨勘之官矣去年八月又以睿思殿内東門司等歴過日月并使人到闕等泛賞乞于遙郡上轉行後省察見其月日皆是重疊引用繳奏三次乞令吏部契勘年月遂寢而不行今又有此請夫覃恩轉官解帶轉官使其不礙止法則當循序而進何待特旨正以二者皆是泛賞礙止法人不可用故疊以二者冒干天聽又欲于階官上轉行則是以礙止法不可用之賞而轉右武大夫其為壊祖宗成法尤甚臣是以不得不論欲望聖斷察其情狀追寢上件指揮庶使退聽且以塞後來無窮之請臣載惟陛下初政猶未及半仁恩隆寛左右近習戚里之衆干請恩倖瀆紊聖聽動勞特旨臣愚駮論雖荷矜從更乞奮威斷擇其干請太甚者有以懲戒之則朝廷益清紀綱不紊尤為幸甚所有録黄臣未敢書讀繳成立帶行遙刺御前忠佐成立該登寳位合轉四官内兩資轉馬步軍都軍頭外兩資轉特與帶行遙郡刺史諸般請給等竝依周興體例支賜臣竊惟國家名器之重在今日尤宜謹守引例破法之弊在今日尤宜痛革臣待罪瑣闥頃者屢有駮奏不敢顧恤仰惟陛下恭垂明聽從善如流近來方得小定忽準前項指揮义不容己者御前忠佐止有六資曰步軍副都軍頭馬軍副都軍頭步軍都軍頭馬軍都軍頭馬步軍副都軍頭馬步軍都軍頭六資之外無法可以選補其轉行遙郡刺史者葢横恩也武臣轉至武功大夫為止法非有軍功等不許轉行而況此乎歴攷太上皇帝在位六年放行忠佐轉宫者才二人然皆有迹可攷周興以馬軍都軍頭轉行尤在紹興二年七月是時太上皇帝即位已三年矣至十月又以陸安為之中書後省繳奏而止紹熙三年四月又有指揮又以門下後省繳奏而止且以周興之轉行是有司失于執奏者直至紹熙四年再與而再繳至勤御筆以其久在潛邸應奉有勞特與轉遙刺時方多事因遂放行葢亦三經繳奏不得已而後行非茍然得之也今可援為例乎況陸安在太上潛藩隨龍應奉餘三十年録其久勞猶艱難如此陛下既位未久若成立引例破法六資猶未曾轉滿徑以四資之恩超授遙刺則今之為忠佐者又援此例而進不可遽止名器愈濫矣陸安援周興之例止言請給而不及大禮支賜進狀下户部本部執奏而不行今成立破法所乞指揮則又全備以此知祈恩僥倖之人宛轉攀援無時而已欲望聖斷特賜詳酌其以兩資轉至馬步軍都軍頭者法也則令有司照條格施行其餘兩資則與寢罷塞倖門而守舊法實為允當所有録黄臣未敢書讀再繳成立帶行遙刺臣近者繳奏隨龍御前忠佐成立帶行遙郡刺史奉聖旨兩該隨龍可特與書行天威所臨即合承命然詳究事體輕重寧受一夫之怨不敢廢陛下紀綱寧被方命之罪不敢變有司法守也陛下明知帶行遙郡刺史為僥倖又知兩朝隨龍忠佐人衆恐開倖門以成立兩該隨龍故令特與書行庶使餘人退聽臣略攷之太上皇帝隨龍人有兵級八十八人内吳翊等十餘人又在陛下隨龍人數如此則未問其餘名色只就成立本等人數内兩該隨龍已有十餘人若成立帶行則此十餘人者必將援例而進不若杜之于初則來者自然絶望一開其端僥求日滋縱之則名器愈輕賜予益濫止之則或得或否不惟無以服其心多方營求不與不已煩瀆天聽陛下將自厭之臣愚欲望睿斷寢罷上件指揮以塞僥倖之路況陛下即位未久如此等事但當一切止絶若初年不難于發端後省不得而繳論誠恐國家爵賞有限不足以塞此曹無窮之請為害愈甚矣所有錄黄臣未敢書讀繳韓侂胄轉一官彭龜年除職與郡同中書舍人林大中韓侂胄轉一官依所乞除在京宫觀彭龜年除煥章閣待制與郡臣等今月初九日竊聞吏部侍郎彭龜年内殿奏事退而居家待罪不知其由已而又聞知閤門事韓侂胄見求祠禄方有傳聞謂龜年論侂胄甚切故皆不自安然而不知所論者何事也今有上項指揮則知傳聞之不謬龜年以侍郎得次對與郡侂胄解閤門及都承旨職事轉一官内祠有以見陛下之處事不失一偏然臣等愚忠猶有當言者陛下自在嘉邸眷禮僚舊一旦龍飛不惟寵以爵秩延見訪問幾無虛日天下不以為私而服陛下好賢篤舊之徳不謂三數月間所謂五人者黄裳遽成長往黄由尋遭外艱沈有開陳傅良相繼論罷惟龜年一人猶在從列經筵又其賦性伉直論事不回尤蒙眷奬必其懐不自已盡言無隠今又去之則陛下之舊寮無遺不惟傷伐木之義而四方謂其以盡言得罪尤害政體此臣等所以重惜也知閤門事及都承旨皆武臣之高選陛下不難于侂胄之罷可謂英斷然次對不過在外之職序位反下于貳卿㢘車之升留務則寵之已至況一去一留恩意不同去者遂逺不復得侍左右留者既曰内祠則召見無時終不能逺人言籍籍尚以為不平臣等欲望睿慈更加詳處或留龜年于經筵則可以不失講讀之舊若其不然則命侂胄以外祠或予以外任事體適平人亦無可言者如龜年之賢陛下素知顧豈遂將終棄後日召用正自未晚然目前處事貴于得宜臣等誠恐指揮一出難于反汗故敢罄竭愚慮以俟採擇所有録黄臣等未敢書讀再繳韓侂胄彭龜年聖旨彭龜年除職與郡已是優異韓侂胄初無過尤屢求閒退罷職奉祠亦不為過竝依已降指揮臣等昨繳論彭龜年韓侂胄事得旨令竝依已降指揮施行臣等何敢不承君命然二人者事既相闗須當適平龜年以真侍郎除職與郡若以為優異則侂胄之轉承宣使非優異乎若謂侂胄初無過尤則龜年論事乃出于愛君之誠心不顧其身以進忠言豈為過乎臣等區區不敢更留龜年在龜年進退之義亦不可復留但直臣去國公議為之歎息恐自此無敢有為陛下出力論事者矣龜年既以決去侂胄難以獨留欲望聖慈俯從臣等所奏予侂胄以外任或奉外祠以均事體以慰公議不勝幸甚再犯天威無任震懼伏惟陛下裁幸所有録黄臣等未敢書讀攻媿集巻三十欽定四庫全書攻媿集巻三十一宋樓鑰撰狀劄知温州舉胡宗應賢良科狀右某伏覩本州士人胡宗左朝散郎裒之孫修職郎序之子家世業儒自少頴悟誦書屬文隨見輒解臣乾道七年為本州教授蚤已見其不凡去此十餘年聞其學問日進有聲上庠兹叨假守首訪人物而邦人又咸言宗習應制舉詞業已就因見其書蓋學有師承文無蹈襲博攷經傳有志于斯文參驗古今將期于世用且其資禀温良家居孝友表裏無玷言行俱優可謂儒林之俊彦聖世之英才臣謹遵奉詔書保舉堪應賢良方正能直言極諫科于貢舉條制並無違礙今具本人所習詞業䇿論合五十篇謹繕寫成八巻目録一巻繳進謹録奏聞伏候敕旨除中書舍人舉莫光朝自代狀右臣伏覩迪功郎臨安府鹽官縣尉莫光朝粹純無玷㢘介自將種學績文足為後來之秀臣今舉以自代舉楊簡劉仲光狀准尚書省劄子奉聖旨令侍從兩省臺諫各舉通亮公清不植黨與曽任知縣人二名者右臣伏覩奉議郎知饒州樂平縣事楊簡學問深淳操行介潔議論堅正皆有本原愛民之政著于劇邑是臣郷人素為畏友非敢私薦公論所推朝請郎監登聞鼓院劉仲光純粹而能剛疏通而有立曾知隆興府奉新縣甚有政聲次厯福州通判又有闗決之譽此二人者實可應通亮公清不植黨與之選除給事中舉高似孫自代狀右臣伏見文林郎紹興府㑹稽縣主簿高似孫夙有俊聲能傳家學詞章敏贍吏道通明臣今舉以自代舉宗室伯洙師津狀准尚書省劄子奉聖旨比來宗室在朝者少可命兩省臺諫侍從各舉有文學器識者二人以備選擇者右臣伏覩朝請大夫前知處州趙伯洙少登世科退然儒雅操守素堅政事中和若蒙擢寘朝行可以素率宗盟春秋寖高伏望速加進用儒林郎新池州銅陵縣丞趙師津忍貧好學厲操勤廉舊名師囦嘗在江東與應孟明同為縣丞一路稱此二人而師津至今沈滯選調窮而益堅不改其操國家敎養之久宗室賢才日衆臣敢以此二人仰備選擇除權吏部尚書舉謝天錫自代狀右臣伏見從事郎廣南西路經略司幹辦公事謝天錫經明行修推重鄉曲一入太學衆譽翕然省試為上三名㢘退謹飭至今尚以選調逺宦人皆有遺才之歎臣今舉以自代除顯謨閣直學士舉馮端方自代狀右臣伏覩迪功郎前隆興府奉新縣主簿馮端方學問淹該詞章典麗自其少時已為故户部尚書孫覿所稱晚霑世賞筆力愈高雖名士交稱而尚沈選調矧又稟資謙靜吏事不茍臣實不如舉以自代舉馮端方江疇樓昉狀准尚書吏部牒奉聖旨令侍從給舍臺諫各許薦舉所知謂如某人學識可任清要某人材術可任劇敏某人剛正某人疏通下至将士智謀勇略或有所長亦各以名來上者右臣伏覩承直郎前楚州團練判官馮端方性行淳茂文詞瑰偉直可以掌誥代言久沈下僚衆論所惜其人已老欲望蚤賜擢用如淳熙間韓元吉劉孝韙之比從事郎江疇學問精博議論閎放居為人師頃為徽州司户參軍不惟吏事公勤門有諸生授業甚衆可備學官之選從事郎監行在㸃檢贍軍激賞酒庫所糴場門樓昉少負俊聲記問該洽居有鄉曲之譽文有制誥之體宜居館閣養才之地使之涵養成就端方昉二人與臣皆同鄉曲昉姓氏偶同却非宗黨如蒙朝廷擢用後不如所舉臣甘坐繆舉之罰除吏部尚書兼翰林學士舉張虙自代狀右臣伏覩從政郎新兩浙東路安撫司幹辦公事張虙操履至純表裏如一學問詞采俱有過人舉以代臣實允公議舉俞應符李兼鄭肇之充監司狀准尚書省劄子奉聖旨攷察見任待闕監司公共薦舉者臣等仰惟國家多事急于求才而監司所繫尤重臣節即當恭承明詔竊謂進退人才者朝廷之權分别是否者臺諫之職臣等雖在論思獻納之列不應預聞攷察之事若公共薦舉所不敢辭但以人既難知知亦不能皆合如列銜其舉復恐所見不齊既不敢有私資淺之人又不敢太拘資格並是公共商㩁不敢有私親黨合謹同狀各隨所知開具職位姓名及其所長聞奏謹列具如後一臣某舉承議郎行司農寺丞俞應符蚤繼世科嘗辦劇邑疏通而有守精敏而善謀朝請郎權知臺州軍州事李兼清白承家公廉鎮物已著維蕃之績宜為攬轡之行朝請郎權發遣全州軍州事鄭肇之才猷挺特論議公平使居部刺史之職必有古膚使之功右謹錄奏聞伏候敕旨薦沈端叔王度劄子同從官某等竊惟國家自更化以來求賢最急得人亦多其大者固已收召進用其小者亦䝉揀拔器使然以某等耳目所接猶有遺焉伏見承直郎前監行在左藏西庫沈端叔文學老成操行無玷自為諸生由舍選釋褐成均多士咸所推重分教章貢振作士氣人知嚮方其時權臣擅國方斥逐上封言事之人而端叔奉檄校試廬陵乃以封事謗木之遺命題又發策言言路之通塞繫乎人材之消長議論鯁切不徇時好及在左帑委蛇筦庫錙銖必謹抱負所長不事表暴至今猶困選階端叔處之泊如也從事郎前安慶府府學敎授王度性資粹和詞采藻麗馳聲上庠之久遂由舍選登科屢更憂患幾二十年僅有三攷學殖愈進文氣不衰為安慶府教授江淮士子不逺千里而至居鄉又以孝行有聞某等深攷其人俱知其事茍不以上聞當任蔽賢之責欲望朝廷擢用寘之館學實稱其選舉閻一德綦奎趙積謙充邊郡狀准尚書吏部牒奉聖旨令侍從兩省臺諫各薦舉邊郡太守三二人姓名來上者右臣伏覩朝㪚郎監登聞鼓院閻一德出自世家屢更繁劇纂輯經史著古今政事錄以為規警頃知建昌軍諸司交薦得知泰州以憂不赴今任列院物譽甚美迪直郎前知建寧府建陽縣綦奎名門之裔官業可稱建陽最號劇邑奎勤于撫字號稱治辦列剡政績未䝉擢用曾叔祖故翰林學士崈禮建炎艱難之時實掌書命著兵籌機要上之奎習熟聞見使之乘障必有可觀通直郎主管台州崇道觀趙積謙西洛故家少年嘗冠銓闈方為幕職取知當路不緣介紹遂得改秩作邑宜興前政實權臣之黨月解拖欠至多積謙方議區畫補解而郡不容積謙謂一時奉命必致鑿空取辦慨然請祠而去人咸惜之臣今並舉充邊郡一德累經任使尤所當先薦黄膚卿林椅劄子同倪思臣等叨塵從列仍侍經帷既不勝愛君之心無以効報國之志惟有奬提英俊振拔滯淹使其人有能致身于時則臣等可逭蔽賢之責今得二人焉竊見從事郎前臨安府府學教授黄膚卿志節有稱詞章特出所著北鑒八巻專論本朝昔與契丹為鄰後為金人所辱究切事實雖祖宗盛時不曾一得志于北朝靖康以來動皆國家失計指陳事實略不忌諱刪削繁文極便觀覽自亂華編諸書以來皆不及此若陛下以備乙覽則必憤累代之世仇痛人謀之致辱臣子讀之則必廣求禦戎之策務為彊國之謀文林郎紹興府府學教授林椅淹貫經術博攷古今所著周禮綱目一書專論成周法度官職以類相從皆撮精要周公遺制可舉而行既非泥古以違今直可据經而從事自新莽北周名具實喪熙寧新法專以理財遂使指爲虚言實不可用惟椅之說燦然可觀二人者皆負才名務為有用之學不惟編載有體其所著論又皆明白洞達有益于世聞其書各自繳進臣等仰惟聖學高明于經于史皆所留意而二人所著書實可以上裨緝熙之萬一欲望聖慈特頒睿旨降付三省看詳如其實可採録乞加擢用以示襃勸攻媿集巻三十一欽定四庫全書攻媿集巻三十二宋樓鑰撰狀劄辭免除起居郎狀紹興三年四月右臣准尚書省劄子奉聖旨除起居郎者有命自天措躬無地竊以柱下之史密侍于清光螭頭之班尤先于左陛必得俊髦之士以居記注之司如某者學不知方才非適用自登仕路屢㸃朝行但期平進之安敢啟超遷之望忽叨新擢實出誤恩已深據蒺之憂更重積薪之媿自知若此公論謂何伏望朝廷特賜敷奏收還成渙改畀真才俾退即于卿聮庶少安于愚分所有恩命未敢祗受辭免兼權中書舍人狀右臣准尚書省劄子奉聖旨兼權中書舍人者自揣僥逾彌增震惕伏念臣技能至薄見謂頓遲學術素疎且多廢忘躐遷左陛曾閲日之未深密侍清光懼記言之非稱矧是縯綸之要實參造命之嚴非智畧該通不足以裨贊國論非辭章典麗不足以潤色王猷可使凡才而預華選暫承人乏雖弗許于控辭退睥時髦顧豈容于冒進欲望朝廷特賜敷奏曲回宸命更選詞臣俾專柱下之官庶愜廷中之議辭免除中書舍人狀右臣准尚書省劄子奉聖旨除中書舍人者有命自中撫躬失措竊以仕朝廷者以三字為要知制誥者以一日為榮前代選才必考言而後授近時攝事多滿嵗以為真察之加詳過于明試臣自頃承乏最為罔功詞華不足以彰播告之修論議不足以效論思之益久虞幽黜敢冀親除伏望皇帝陛下俯鑒忱衷亟收成渙俾仍記注之舊精求潤色之工庶穆師言且安愚分辭免兼實録院同修撰狀右臣准尚書省劄子奉聖旨差兼實錄院同修撰者疊拜寵光伏增震懼竊惟高宗皇帝中興之烈信逺邁于前王必如太史公實錄之書乃可傳于後世當求直筆仰贊宏模如臣憃愚遭世明盛自慙薄宦幸三入于脩門雖㸃從班未一登于東觀為直詞掖方忝誤恩共貳史官敢汙清選欲望皇帝陛下俯垂睿照改畀時髦使專掌于王言庶或逃于公論辭免兼直學士院狀右臣准尚書省劄子奉聖旨兼直學士院者忽拜恩光俯增震灼竊惟翰苑之職儒者至榮雖曰兼官亦當遴選如臣之陋與世多違蚤玷世科麤嘗為場屋之技久從吏役豈能工制誥之文獨蒙睿主之深知獲備詞臣之下列叨居西掖已懼空餐攝直北扉尤驚誤寵矧清䟆尚稽于問寢顧禁林何急于充員伏望皇帝陛下洞鑒愚衷亟收成渙詔書日簡方當視草之得人英俊駢羅安用積薪之居上辭免除給事中狀右臣准尚書省劄子奉聖旨除臣給事中依舊兼直學士院者惕聞寵命莫措微躬竊以掌制紫垣久慚無補進官青瑣尤懼非宜葢機要之愈嚴繄出納之攸繫自非學足以與聞國論智足以深照事機或非其人必害于政臣退量至陋深恐不堪昔惟潤色之司猶虞疎闕兹任塗歸之職是速顛隮矧當書詔填委之時仍兼詞翰清切之地聖恩誠厚愚分難安自知斷斷以無他衆必齗齗而不可伏望皇帝陛下收還成渙俯鑒忱衷别擇時髦俾當夕拜庶幾得批敕之手不至累知人之明辭免除權吏部尚書狀右臣准尚書省劄子奉聖旨除權吏部尚書兼職依舊者寵光下逮惕懼靡遑竊以選部攸司是曰六官之長文昌攝事亦叨八座之稱縱難求傑異之才猶當取踐敭之舊臣一登仕路三入脩門年除嵗遷寖踰于始望寢驚夢愕屢蹈于危機惟兹瑣闈幾更月琯遇事輒發徒自積于怨仇忤旨為多方日虞于呵譴敢期睿奬亟賜襃遷徑由夕拜之聯擢試天官之職兼汗青于東觀仍視草于北門揣愚分以何堪恐公言之不貸伏望皇帝陛下收還成渙改畀真賢俾退服于舊班庶漸伸于歸志辭免陞兼實録院修撰狀右臣准尚書省劄子奉聖旨陞兼實錄院修撰者疊被恩榮深增戰灼竊以思陵在位著三紀之治功儒館修書垂百王之憲則宜求良史以贊宏模臣才不逮中職多共貳北門視草顧五技之已窮東觀濫竽曾一辭之未措矧乍躐選曹之長方將謝史筆之兼敢冒寵光進升論譔銓曹至宂尚憂綿力之弗勝髦俊滿前安用庸才之備數仰祈睿鑒遴選實能庶大典之速成免公朝之虛授辭免兼侍讀狀右臣准尚書省劄子奉聖旨兼侍讀者朝拜宸綸暮叨恩命退量謭薄罙切驚惶竊以帝幄執經之臣尤高露門進讀之選自非耆儒博碩古學精深雖得侍清燕之間何以贊緝熙之盛如臣至陋冒寵已多推遷才閲于七年起躐寖登于八座已不堪于共貳尚敢望于至三昨為載筆之官猶慙于記注今進邇英之列安有于發明當觀術業以旁求豈以班聮而序進仰祈睿鑒俯照愚衷儀圖名世之賢增光稽古之治庶容一介專意三銓乞補外劄子臣輒傾丹悃上瀆天聽伏念臣庸陋無堪敢萌榮望比自三汚朝蹟六閲嵗華太上擢之宂散之中俾居詞掖陛下賜以便蕃之寵遂長銓曹侍帝幄之深嚴極儒生之榮遇汔無毫末仰贊高明況今福過災生量盈器溢近遭介弟之戚復有冢婦之喪重貽親憂尤不遑處重念臣有老母年八十有六氣血寖衰喜懼交切久去鄉國日夕念歸伏望聖慈俯矜孤迹畀臣祠祿使息疲勞或得州郡差遣許其効力于外庶幾不妨賢路少逭身災干冒天威臣下情無任惶懼俟命之至辭免除職與郡狀慶元元年五月右臣准尚書省劄子奉聖旨除職與郡者聞命云初揣躬知懼伏念臣久汙近綴無補明時自憐小器之易盈況復私門之多故輒傾危悃仰叩宸聰果蒙從欲之仁俯遂閒歸之志已為厚幸敢冒殊榮乃叨寓職之恩仍畀典州之寄實踰始望爰瀝忱辭欲望朝廷特賜敷奏俾遂真祠之請庶安故里之居辭免除顯謨閣直學士知婺州狀右臣准尚書省劄子奉聖旨除顯謨閣直學士知婺州者恭拜絲綸若臨淵谷竊以東陽望郡當選循良延閣顯名以優耆徳豈容一介之賤併叨二者之榮伏念臣三入脩門十更除目經帷史觀實為儒學之華翰苑銓曹寖躐從班之長屬以私門多故老母念歸力陳匄外之章幸動葢高之聽本欲少休于疲曳敢期疊受于寵光伏望皇帝陛下俯鑒忱衷特回成命廩以祝釐之祿從其學稼之心庶使微臣得安愚分乞宫觀第一狀臣輒瀝危衷仰干宸扆伏念臣比以便親求外自詭治民伏䝉聖恩俯從所請文謨寓直寶婺分符一旦得之實踰分量臣因得過家上冢以遂私心誓當勉竭疲駑圖報君父已擇行日即戒征途偶緣臣母以犯暑來歸感疾頗重始則冒風作熱以臟腑下利年已八十有六平時雖幸康强而血氣既衰不堪觸動今既伏枕旬日其勢未有向安之期訪醫治藥曾無退候舉家惶擾朝不謀夕自知稽留官期合取違慢之罪又准七月二日指揮以臣寮奏請將應未申到任帥守監司排日催促疾速起發仰惟陛下以千里重寄付之㣲臣在臣豈不願即祗郡事上寛顧憂情迫意切不免有言偃然方命迹幾似之儻不投誠陛下竊恐難逃譴責震恐憂懼無以自容臣與老母相與為命既未容扶持上道又不可單騎先行若更遷延月日深恐輔郡久無正官或致闕誤重臣之罪無以自逭欲望聖慈察臣由中之言出于懇切特賜宫觀差遣一次使得少遂其私庶幾母子或可保全盡出天地父母之恩糜捐頂踵不足以報冒犯天威臣下情無任惶懼俟命之至第二狀臣比蒙聖恩除臣顯謨閣直學士知婺州者臣暫還鄉曲即欲之官臣母年八十有六忽以冒暑感疾瘧痢交攻屢瀕危殆不免控告君父乞奉祠侍養得旨不允此猶是朝廷故事又有量展赴官日限指揮明詔之頒詞旨温厚俯矜危悃洞照真情登拜三讀闔門感涕臣仰銜隆天厚地之恩不敢隨即再請今詔下幾旬跼蹐不遑臣母雖幸向安年高易于感動其勢非更寛以日月安得頓復舊觀黽勉上道深慮顛隮母子相與為命又不可單騎先往深恐稽留君命使婺女久曠守臣之職臣則有罪不免復申誠禱欲望睿慈察臣之請出不獲已差臣在外宫觀一次使得杜門專意醫藥不惟保全母子之至恩亦足仰助孝治之萬一干冒天威臣下情無任惶懼俟命之至第三狀臣比以母病陳乞宫觀伏准尚書省劄子奉聖旨不允依已降指揮前去之任者拜命三次周章跼蹐無所措躬伏念臣憃愚不肖誤蒙陛下拔擢便親求外過家上冡悉荷矜從誠願勉竭少圗報效而況臣所得州素為浙東佳郡財計粗優嵗事登熟去鄉不逺使臣得奉親之官宣布徳意豈非臣之至願實縁臣母一病五十餘日雖曾少間而年高易于感動近嘗夜作嘔吐次日心脾痛楚幾于委頓闔門無以自存驚惴度日此去舟行三日至越遵陸七程始到婺州見今尚須扶掖方能起坐委難支吾若迫于威命勉强登途脱有不虞萬死莫贖昔陳實為太丘長吏有詐稱母病求假事覺收之以為欺君不忠病母不孝不忠不孝其罪莫大臣雖不孝安敢為此不免復冒斧鉞之誅三以情實披訴于君父之前欲望聖慈特賜矜察除臣在外宫觀一次使臣得以杜門專意醫藥之奉保全老母之餘生臣無任祈天望聖惶懼懇禱之至辭免再差知婺州狀右臣准尚書省劄子奉聖旨差知婺州者自天有命無地措躬伏念臣比剖左符暫歸故里屬親闈之感疾叩宸陛以陳情荷温詔之一頒控忱辭而三請因殊庭香火之奉得專心醫禬之營仰戴恩私寖成藥喜忽蒙柬記再畀藩宣不移東婺之輔邦俾遂南陔之孝養固當仰體趣行之旨勉圗共理之良惟母夀益高幾近九齡之耄雖官程甚邇尚踰數驛之遙儻扶侍以亟驅恐疲勞之未免況臣世系本出部封至今三邑同姓之人不減四明聚族之衆向于宦路或講宗盟親疎之間悔吝斯起憂患不堪于累嵗聰明尤減于前時敢以妄庸冒此煩劇欲望皇帝陛下收還成渙别選長才庶安衡泌之居以盡晨昏之職辭免復職狀右臣准尚書省劄子奉聖旨復元職名依舊宫觀者臣逖聞成命深震危衷伏念臣生遇昌期仕叨從列頃以便私而請外旋因奉母以求閒處此累年安如一日閉門自屏尚遭白簡之彈蹕地靡遑敢冀青氈之舊忽頒綸于北闕復寓職于西清拜寵若驚祝釐如故不圗簡記逺及微蹤揣愚分以非宜恐人言之可畏伏望皇帝陛下俯矜賤悃亟寢誤恩庶安敝里之居免玷甘泉之列辭免與郡狀右臣准尚書省劄子奉聖旨與郡者臣恭聞明命莫措微躬伏念臣少習一經本因覓舉仕踰三紀非敢為高論思無補于清朝更迭遂求于輔郡為親而歸故里九易嵗華復職而畀外祠一由上賜與郡有旨闔門皆驚久伏丘樊豈不願承于任使儻無疾病猶當出效于驅馳兹貢需章實有危悃母以九十四之耄日抱沈疴臣以六十七之年又嬰宿疢顧二人相與為命無一日不曾用醫湯藥扶持茍延暮景里閭勞苦具見真情心志已凋豫切不虞之懼頭顱如許寧堪共理之良伏望聖慈俯憐舊物許令終養以全烏鳥之私仍俾祝釐少安麋鹿之性乞致仕狀開禧二年十二月右臣么微之迹遭際聖時叨綴從班曾無補報憂患餘生自貽嚴譴杜門省愆衰瘁日甚重念臣生于紹興七年今年及七十揆之禮經實當告老伏望睿慈許臣致仕干冒天威臣下情無任祈天請命激切屏營之至第二狀右臣昨具奏乞致仕奉聖旨不允者引年有請願畢餘生賜旨未俞敢申再瀆仰動葢高之聽冀垂從欲之仁竊以致為臣者實累載之素心不得謝者乃清朝之異數茍非宿望厥有彞章如臣者少既無奇今將安用不堪荷橐賦彭澤之歸來但切杜門類介推之偕隱子欲養而親已矣老將知而耄及之而況拜不能興扶而後起退量病體何必待年揆以禮經適當納祿弗容自黙非敢為高伏望聖慈俯矜愚悃俾安畎畝遂終齒于幸民許掛衣冠庶獲全于晚節辭免復職狀右臣准尚書省劄子奉聖㫖與復元職者臣忽聞牽復倍切驚惶伏念臣久遂退閒晚更憂患不知自謹宜得大呵曲荷隆寛止從薄責既坐糜于祠禄復進冒于侯封增衍圭腴方申謝牘敢圖睿眷尚及孤蹤未容掛神武之冠仍為洗丹書之籍寵還故職以賁餘生感上意之至優恐輿言之弗貸欲望皇帝陛下鑒由衷之悃憫垂盡之年追寢誤恩少安愚分辭免除龍圗閣直學士致仕狀開禧三年四月右臣准尚書省劄子奉聖旨除龍圗閣直學士依所乞致仕者聞命自天措躬無地竊以引年載請方拜命音進律過優幾成誤寵重念臣仕參法從歸即隠居多病蚤衰久有掛衣冠之志為貧急祿尚存戀棧豆之私不因及七十之期安敢為再三之瀆幸兹得謝何望叨榮矧惟漢閣之班莫重河圗之直當以處赴功之彦豈應畀納祿之人伏望聖慈收還渙渥念臣素知止足俾臣粗保始終惟舊貫之是仍庶餘生之無媿臣除已遵奉聖旨致仕外所有龍圗閣直學士恩命臣未敢祗受辭免召赴行在狀開禧三年十一月右臣准尚書省劄子奉聖旨召赴行在者臣聞命震驚罔知所措伏念臣本無可用老而益衰既已引年方兹待盡忽蒙頒命不知所為況號召之一新以人才而為急有如臣者將焉用之輸忠竭誠則已忘舊學陳力就列則又為廢人伏望朝廷特賜敷奏非敢飾辭以控免悉自衷誠而吐陳冀别用于真賢庶少安于愚分再辭免召命狀右臣准尚書省劄子樓鑰召赴行在即具奏辭免恩命奉聖旨不允令所在州軍以禮津遣疾速赴行在又蒙賜臣詔書一道者召命鼎來亟伸控免詔音俯及未賜允俞敢陳再瀆之私上動九重之聽伏念臣投閒已久告老方新憂患薰心積有負薪之疾權豪側目尤深據蒺之危不賴至仁豈存孤迹忽聞上聖雷霆之斷復見中天日月之明四方相賀以同聲萬物亦為之吐氣雖曰杜門而待盡寧當俟駕而後行實以蒲柳蚤凋桑榆暮迫病纒雙足時歴半年弱質既衰曾鍼砭之弗及餘災未殄致醫禬之無功已分終窮豈萌他望仰蒙簡記首預旁招已掛衣冠敢效從班之專逹肆頒綸綍更加禮遣之優恩洊瀝丹心仰干洪造伏望皇帝陛下恕其方命察此由衷畧反汗之小嫌遂乞骸之素志或寛嵗月俾息田廬儻拜起之粗堪豈奔趨之敢後辭免落致仕除翰林學士狀右臣近具奏再辭免召命未准回降間又准尚書省劄子奉聖旨樓鑰落致仕除翰林學士日下前來供職者臣控辭未允聞命尤驚伏念臣性資顓蒙學殖荒淺仰逢休運屢㸃周行本無藻繪之工每叨文字之選知南宫之名表有媿錦窠代西掖之王言久塵薇省攝承翰苑親預禪書兼内外播告之修當書詔填委之際疚心自勉血指知慚伏自一去闕庭已周嵗紀飽更憂患嗟視蔭之幾何絶望功名幸引年之得遂矧嬰沈痼期保餘齡逮茲更化之初狎奉趣歸之旨循牆固請出綍又新彈虎門已掛之冠殊乖素志正鼇禁久虛之席尤懼非才伏望皇帝陛下俯察忱衷别求髦俊俾司是職大放厥辭庶徳音昭示于萬方雖武夫亦為之三歎獲茍安于故里免有玷于隆知再辭免狀右臣蒙恩落致仕除翰林學士繼具奏辭免狀准詔書不允者屢辭召節已干方命之誅疊遜詔綸又冒執愚之懼自量其分不已于言竊以起廢江湖豈非臣子之大願充員翰墨尤號儒生之至榮而臣昔者攝空實由西省今焉被命乃自外方身已納祿而復齒垂紳之間仰上恩之特異年過從心而使當視草之職真近此之所無臣自知其弗堪人必以為不可進退之際跼蹐靡遑欲望皇帝陛下念及衰殘許其引避或不容于固請姑别處于閒曹雖懐知止之慚猶有可勉之理謝宣召入院狀右臣伏蒙聖慈除臣翰林學士仍依故事本院待詔李舜臣至臣所居宣入院充學士者逺頒除命賁臨東海之濵甫覲威顔徑上北扉之直重勤主眷申遣王人荷新渥以無堪撫舊游而自失伏念臣學徒泥古仕本代耕素甘州縣之勞敢冀朝廷之選而乃屢參鵷序寖上螭坳紫薇久典于訓辭青瑣進司于封駮天官掌選兼侍金華之嚴史觀綴文久攝玉堂之䆳投閒置散已分終焉告老休官遂將已矣寜知末路復被優恩不容臥家趣使赴闕對邇英之閤曲軫淵衷登螭文之堂殆成陳迹自歎形容之盡變況聞榱棟之洊更已試罔功既衰焉用兹葢伏遇皇帝陛下才無終棄仁不遐遺解琴瑟以更張聿修治具出絲綸而彌大下取故臣欽佩隆知頗驚羣聽臣敢不勉尋末學增葺寡聞彊為骫骳之詞少答便蕃之寵辭免除吏部尚書兼翰林學士兼侍讀狀右臣准尚書省劄子奉聖旨除吏部尚書兼翰林學士兼侍讀者疊拜恩光彌深震恐伏念臣頃者攝承文部兼直禁林進讀露門無匪高華之選退耕綿上不堪憂患之罹冀垂車以示子孫辱賜骸而歸田里敢圗出綍復使彈冠況在七旬之餘悉紆三組之重不惟共貳俱俾為真有如朽鈍之蹤曷稱便蕃之寵欲望皇帝陛下别圗衆俊無備一夫念齒髪之早衰察精神之不及姑仍舊貫尚竭庸材再辭免狀右臣蒙恩除吏部尚書兼翰林學士兼侍讀繼具奏辭免伏准詔書不允者詞禁再登甫祗官次恩光三錫益震愚衷貢遜牘以未俞望宸居而力請伏念臣才本無用病困易衰休官方幸于杜門承詔忽驚于赴闕尋鑾坡之舊已懼不堪居從槖之先尤為非據況二選並稱于劇部而九重密侍于邇英仍兼視草之司深切負芒之懼欲望皇帝陛下俯矜誠悃曲軫頽齡既知斷斷以無他安得多多而益辦許容避寵庶免妨賢辭免兼修國史實錄院修撰狀右臣准尚書省劄子奉聖旨兼修國史兼實錄院修撰者臣再入脩門屢膺寵渥周章亟拜跼蹐靡寧伏念臣頃簉從班嘗共衆職既典銓于選部仍視草于禁林兹皆遂于為真又已參于進讀更頒恩旨俾預史官比縁疊組之煩疲于奔命乃若汗青之重無所措詞至今媿之況復老矣三者已難于勝任一身安得以貪榮欲望皇帝陛下憫其已過于七旬察其難兼于數器以國典為甚鉅擇英才而别求庶使微蹤粗殫駑力攻媿集巻三十二欽定四庫全書攻媿集巻三十三宋樓鑰撰狀劄乞歸田里劄子嘉定元年七月臣輒傾誠悃仰干天聽伏念臣危孤之蹤自慶元改元補外因遂投閒十有三年而尚遭排根不已屢欲陳乞致仕以年既未及恐涉矯激繼遭内難即吉之日甫及七十引經至再始遂掛冠臣自去國即為終焉之計人所共知去冬仰蒙聖恩更化之始首賜收召是時非敢俟駕而行實以方苦足疾控辭不獲除目下及于里門郡守又從而津遣扶病赴闕再瞻清光洊蒙親擢加以兼職又且俾典貢舉非不願勉竭衰悴少伸報效重念臣年已七十有二精力益耗銓曹有簿書之煩翰苑有文字之穴經筵史館皆非所堪近以中暑招醫不敢謁告步趨拜跪强勉不前不求退休必至顛踣久妨賢路且玷明時伏望聖慈俯矜孤迹再許納禄歸老田閭實戴天地之恩敢忘君父之賜辭免簽書樞密院事劄子嘉定元年八月臣伏蒙聖慈除臣端明殿學士簽書樞密院事兼太子賓客特降中使宣押臣赴院治事者惕聞渙渥俯震危衷伏念臣三際聖君四汙朝蹟仕甘平進惟義命之是安心實靡他以樸忠而自立頃嘗去國本為奉親置散投閒久作山林之計匿瑕含垢率由天地之仁雖屢遭摧剝之餘终不至排根之甚幸逢更化道辱召還既叨長于六官且悉歸于衆職亶為過分何敢僥求況已越于從心比再祈于納禄不圗睿眷擢簉樞臣典選固難尚能自勉本兵尤重安得冒居寵加秘殿之名兼預儲寮之列誤恩下逮羣聽皆驚殊非衰迹之所堪抑亦多言之可畏伏望皇帝陛下收回成命改畀英髦俾仍獻納之班馴遂退休之志儻獲免妨賢之誚庶不累知人之明辭免賜衣帶鞍馬劄子臣蒙恩除簽書樞密院事兼太子賓客又蒙賜臣對衣金帶魚袋鞍馬竊以出珍服于尚方錫名駒于内廏臣庀職之始拜賜已隆豈應旬浹之間復冒恩榮之辱禮誠過厚心則靡遑伏望皇帝陛下察臣僥倖既多負乗有靦使之安分抑免傷㢘特降指揮追還所賜辭免同知樞密院事劄子臣准尚書省劄子奉聖旨除臣同知樞密院事依舊兼太子賓客特降中使宣押臣赴院治事者誤恩狎至撫已增慚伏念臣頃備論思久投閒散荷皇明之收召加寵渥以便蕃俾參樞筦之班仍預儲扄之客已為過幸每懼弗堪曾煖席之未遑俄歴階而使進本兵至重寧容濫吹之人偃伯云初兹豈養疴之地尚蔑一毫之效遂叨二府之真念朝行之髦士甚多況天下之逸民未舉不應邇列乃以序遷欲望皇帝陛下俯鑒由衷母嫌反汙遴選英才而圗任姑令舊著之少安亟賜俞音免貽羣議辭免參知政事劄子臣准尚書省劄子奉聖旨除臣參知政事特降中使宣押臣赴都堂治事者承命下臨撫躬增惕竊以中書之本萬化固資參預之良近弼之有貳臣足稱倚毗之重敢言推擇誤及凡庸伏念臣洊㸃從班叨塵宥府才再周于月琯已疊被于恩綸玩愒自慙于事功而何補衰疲既甚況疾病之復侵方將俟使介之旋便請掛衣冠而退忽驚寵渥俾預政機載攷舊章間有三人之同列若稽近比未聞兩地之贅員伏望皇帝陛下俯察由衷曲憐過分收還成渙願亟賜于俞音茂柬英才以共扶于興運賀東宫上御書居仁牌劄子恭審寵錫宸章聿新户冊前星少海益嚴壯麗之規安宅廣居深寓藏修之意震亨協吉日進無疆某叨預下寮欣聞盛事容即陪于賀旅敢先貢于忱衷伏望令慈俯垂鑒察乞歸田里劄子嘉定三年四月臣輒伸衷悃仰干天聽臣聞七十而致仕禮之經也一介孤逺素安平進遭際累朝三入周行寖塵法從年未六十即遂投閒屢思納禄正恐或以為矯母喪既終適當七十再疏得請自謂平生志願不啻足矣敢圗聖慈更化之日首賜收召力疾趨朝一見天顔盡畀舊物旋由樞筦進貳政機皆非夢寐之所敢及玩愒嵗月毫髪無補日負憂懼重念臣今已七十有四當戒得之時而況筋力日衰每虞僵仆素有足疾曾為廢人近者益不堪奔走之勞非不戀慕聖徳願效尺寸陳力就列不能者止欲望睿慈矜憐衰悴許臣仍舊致仕歸伏田里以盡餘生不勝萬幸第二劄上章有請願致為臣頒詔甚温未容得謝敢洊陳夫愚悃用仰冒于宸聰伏念臣少已無稱老將安用仰被聖神之眷擢登樞近之班然而雖號參知了無裨補彌縫輔贊何所建明拜跪進趨率皆強勉十目所視一心靡寧久矣妨賢自知不可衰而戒得衆必有言矧同召之三人今止存于隻影汗顔在列歸夢先形漏盡鐘鳴夜行當巳日暮途逺逆施謂何欲望睿慈俯回淵聽放歸田里俾遂畢于餘生再掛衣冠庶可全于晚節第三劄臣疊具劄子陳乞致仕伏奉詔書不允不得再有陳請洊頒渙渥未許告歸三貢需章終期得請敢冒葢高之聽仰于方命之誅伏念臣猥以迂儒叨塵近綴上恩至厚加寵數之便蕃同列咸和務寅恭之相勉非縁他故借以自陳惟是年實寖高夙若負薪之疾位為甚過了無横草之功冠已掛而復彈車既垂而再駕識分知足之意雖曰素明安煩戀劇之譏豈能戸曉久妨賢路奚補公家屢屬藁于皂嚢終投誠于丹扆仰祈聰鑒俯察衰蹤與其僵踣于朝重貽鐫誚孰若曲從所請先賜保全矢辭已窮屏息以俟御筆卿為時耆艾秉國樞機進退之間重輕所繫數頒詔諭宜悉朕懐勉竭壯猷毋庸遽去乞致仕劄子嘉定四年閏二月臣敢傾危悃仰冒天聰臣聞七十而致仕古之道禮之經也臣五十九而投閒十載而遭母喪比及三年年適七十連年再請已遂納禄平生仕宦至此不啻足矣加以多病早衰素有足病是嵗一發數月甘為廢人國家更化之初記録簪履之舊首賜收召病不能進既叨翰苑之除又頒趣行之命扶憊造朝本擬一拜清光歸安田里旋蒙拔擢嵗中屢遷冒列政途荏苒三載頃申懇請未賜俞音因仍强顔又復許久今年遂七十有五矣既違古義又乖初心筋力益衰舊疾發動重以手足之戚撫事傷感久在朝假不遑安處勉强參告顛踣是虞兹敢投誠君父乞骸以歸非惟麤全晚節亦免久妨賢路陳力就列不能者止臣既不能不止何待伏望聖慈許臣再掛衣冠以畢首丘之願不勝惶懼祈懇俟命之至第二劄臣昨具劄子陳乞致仕伏奉詔書不允上疏力陳頒綸未許念乞身而至再望得請以為期竊以七旬而加五年在微臣而宜去一日而降四旨驚眷寵之過優舊或施于累押之餘今乃用于初求之頃莫知所處益不遑安伏念臣學術素疎宦情尤薄禁路已知其踰分政途深媿于罔功況在縱心之時既從謝事之願豈容今日猶玷邇聮凡今在朝惟臣最老不以妨賢而自列殆幾貪禄以忘歸福過災生重以鴒原之戚日暮途逺恍然駒隙之馳贊襄向有于建明趨拜每虞于僵仆覬息影于田廬之下敢投誠于君父之前伏望皇帝陛下俯賜矜容曲憐疲瘁恩榮素厚非無犬馬戀棧之心志意已凋但有麋鹿投林之想倘得退尋于醫藥庶幾尚保于桑榆第三劄臣再貢封章陳乞休致兩奉詔書不允者引經告老尚閟俞音造膝陳情敢祈恩許難避再三之瀆庶蒙萬一之從伏念臣屢忝登朝幾成去國投閒置散自分終焉避寵辭榮不啻足矣頭童齒豁固知竟死以何裨漏盡鐘鳴烏可夜行而不止豈知末路重上要津同寅協恭雖粗逃于瘝曠玩嵗愒日恐徒積于悔尤久踰休致之期深有滿盈之懼弟兄猥衆凋謝奚堪疾疢交侵衰頽已甚惟應納禄或免挻災伏望皇帝陛下洞鑒由衷俾令得謝既不敢請麾符之寄亦不能奉香火之祠掛神武之衣冠復尋故步樂清時之鐘鼓尚佚餘生再乞致仕劄子嘉定四年五月臣比者三上封章懇求納禄聖意眷留温詔稠疊仰體隆寛復就班綴本未敢再有陳請瀆冒君父實以今年七十有五自念厚恩未報勉强奔走使其無病尚可支吾臣近者四月十七日扈駕朝獻景靈宫乘騎拜跪幾致顛踣翌曰鞭䇿不前不免謁告復于二十七日堂中議政之次方欲夙退縁積雨陰濕不惟發動足疾適苦腹痛忽作旋暈不知人者良久此丞相以下之所親見十目環視不可掩覆亟歸私第招醫用藥僅得少定至今氣短力乏連請朝參等假彌不遑安使當殿陛朝謁宗廟駿奔之際不測有此豈不有玷班列必致倍費保全兼臣先已掛冠又過數嵗強顔寖久自知人言不貸以為貪禄忘歸一旦疎虞無所逃罪是敢投誠于陛下之前深恐不任趨拜亦不敢又勞宣押之煩輒貢囊封籲天有請伏望睿慈矜其過老察其由衷許臣依舊致仕放歸田里以畢餘年不勝百生之幸第二劄臣茲以感疾旋暈既蒙聖恩給以朝參等假自度老而氣耗難以黽勉趨走既忝參預又不容安坐養疾是以控告九重力求歸老伏奉詔書未賜俞允臣仰戴恩紀俯增震惕伏念臣舊有宿疾甘為廢人不自意全得至今日適有天幸又延數年及見聖君更化之初叨預明時共政之久非不知思竭愚慮仰酬異恩外若强而中實枯心欲為而力不逮日見衰羸之狀乃無報效之勤立則欲僵坐多假寐徒妨賢路難免人言況復近因風濕之侵初為飡泄之疾眩暈幾成于顛仆摧頽重費于扶持雖轉刻以復醒亟還家而歸卧仰蒙予告得遂呼醫自憐蒲柳之零宜逐桑榆之暖豈容强勉更效驅馳一朝或作于周行萬死難逃于大譴伏祈天鑒俯察忱衷許掛衣冠往尋丘壟庶可訪尋藥石收聚精神茍餘喘之尚存皆再生之大賜第三劄臣近以衰病陳乞致仕兩奉詔書不允仍不得再有陳請臣仰感聖慈未賜嚴譴非敢瀆葢高之造實縁有未盡之誠輒干蕭斧之誅冀動凝旒之聽伏念臣少無所用老則可知頃叨獻納之聯甘處廢閒之地屬睿主當改弦之始俾微臣仍曳履之餘擢寘樞庭遂進參于鬷嘏重糜廩粟曾何補于治功不惟見誚于人自知非久于世然而七旬以後三載于茲麤能力勉于步趨因謂尚堪于驅役鳥雖飛而宜下可不知還燈欲滅而復明安能長保當未及衰殘而告退況今以疾病而有求倘遂伏于先廬庶少延于暮景伏望皇帝陛下俯憐疲瘁亟賜允俞用人固欲盡其才而臣才已盡使人不欲窮其力而臣力既窮辭雖已殫情則甚切遡九重而請命祈一札以賜歸御筆引年納禄在常情則然養老乞言猶古人不廢況大臣之進退繫朝家之重輕有如賢卿蔚為國老頻閲抗陳之奏殊乖眷委之懐益務交修母思獨善親書奏謝御筆劄子臣待罪政路荏苒三載累上引年之請必蒙陛下曲賜眷留本未敢洊冒天威近在堂中忽作暈眩幾至顛仆謁告呼醫尋即上章求致其事兩拜温詔尚閟俞音情意迫切遂成三瀆初七日早仰荷聖慈特遣中使傳奉恩旨臣既粗可支吾且聞居家引疾素無宣押之例惶懼承命即時入堂已具奏知敢圖天地之隆私申賁雲漢之親札奬飾備至訓以去就之宜臣實何人叨被殊渥周章震悚無以自容雖勉力就列終恐衰悴不能仰酬洪造之萬一謹于中夜齋祓躬伸奏謝來日自當俯伏宸陛控敘危衷臣下情無任感天荷聖激切屏營之至伏乞睿照乞增葺錦照堂劄子臣輒有微誠仰于天聽臣祖贈太師齊國公臣某政和中由卿列擢守鄉郡興利除害非止一端每有奏聞隨即報可其後在任首尾五年宣和初方臘猖獗鄰郡嘯聚相應如杭嚴處州皆遭攻破越及温台僅餘城郭外邑亦多塗炭惟臣祖申飭備禦多設方略闔境無虞就陞徽猷閣直學士告墨具在前後璽書褒美皆親灑宸翰雲章昭回海邦增耀城内一湖舊有十洲三島最南一處適與私家相近遂于其上建錦照堂刻碑堂中以侈上賜中更兵燬巍然獨存是時州治初復移為小㕔碑石暴露隆興元二年間州郡方始再建及今五十年棟宇弗支加以連嵗暴風秋霖頽損尤甚臣自顧么微猥叨誤恩置諸邇列累疏乞身未蒙俞允顧惟家世之舊不敢自黙欲望聖慈特降睿旨許容臣自備材植以時增葺倘遂歸休得以周旋其間仍不許本家及官司指占安泊居止庶可永久尊奉先朝奎畫之嚴抑使子孫表揚前人之志進東宫耕織圖劄子某衰遲之蹤叨逾過分自塵樞筦即備儲寮仰蒙令慈眷顧加渥退念略無毫髪可以補報每切慚悚某伯父故淮東安撫璹嘗令於潛深念農夫蠶婦之勞苦畫成耕織二圖各為之詩尋蒙高宗皇帝召對曾以進呈亟加睿奬宣示後宫至今尚有副本某嘗書跋其後仰惟皇太子殿下淵沖玉裕學問日益密侍宸旒恤下愛民固已習熟聞見究知世務惟是農桑為天下大本或恐田里細故未能盡見某輒不揆傳寫舊圖親書詩章併録跋語裝為二軸伏望講讀餘閒俯賜觀覽或可備知稼穡之艱難及蠶桑之始末寘諸几案庶幾少裨聰明之萬一亦以見下寮拳拳之誠乞致仕劄子嘉定五年三月臣輒伸丹悃仰冒宸聰臣聞之禮經自幼學以至致仕具有節目古今用之臣生而多幸年未四十而仕遭際三朝四入周行年除嵗遷寖至通顯七十掛冠不啻足矣陛下更化之初首蒙收召迫于威命扶病復來恩渥益隆遂塵樞筦進參鬷嘏亦既三年中間屢嘗自列眷留再三不敢煩瀆去冬自丞相而下三人求去俱不允俞臣難以繼進伏念臣今年七十有六矣齒髪凋壊衰相日侵筋骸疲瘁隠痛交攻每趨朝謁悉出勉强深懼僵踣于宗廟會同之際有玷陛下保全之恩顧豈有入仕則在古制之先而休官乃在其後又復過數年矣貪冒之譏難免人言臣自知媿有靦面目伏望聖慈矜念衰殘許歸田里賜以餘齡使全晩節不勝百生之幸第二劄臣昨具劄子陳乞休致放歸田里伏奉詔書不允臣竊惟皇朝忠厚專以禮義㢘恥養士夫之心先正名公多有不待年而告老者先帝臨御申嚴此制凡已七十而仕者御史必彈糾之有去七十尚二三嵗者廟堂不敢除以待次郡守是為愛養臣子不使犯禮經之戒伏自陛下改弦更張以來興念正元朝士所餘無幾又多久厄于權臣用事之時雖年登耋艾亦皆以次收召徳至渥也迨至今日荏苒六年召用之人或去或亡幾于略盡獨臣久玷政途未容得謝誠不遑安近者臺評有言人臣視爵禄為己有則昧止足之義無㢘退之行貪競之俗成矣又曰路不妨賢則詘者可信而塞者通矣又曰凡在朝列有懇懇願補外者當從其請此皆犁然有當于人心而臣忝在近列年已過期使其精力尚强猶可圖報老而耄及將焉用之伏讀詔書不勝震越正以材疏智短不足以任共政之責所以切切求退非為圖山林閒燕之適也若商山之終隠當以自師如渭水之圖功安能為役與其後日徒費陛下保全不若及今尚可黽勉之時使之進退合宜則不惟微臣晚暮榮幸亦足以成聖朝風化之大端示天下以止足之義第三劄臣累具劄子陳乞休致伏奉詔書不允不得再有陳請告老將歸籲天有請蒙恩未允蹐地靡遑敢干方命之誅三貢乞身之悃伏念臣屏居既久得謝復來初期一拜于天光徑還鄉社豈謂五經于嵗律尚玷政途屢求再掛于衣冠亦已疊勤于詔諭詞窮復止福過難安念久據于要津致坐妨于賢路況復衰頽益甚遂已至踰七望八之年參預無聞何以佐咸五登三之治爰自去冬而草奏必期嗣嵗以辭榮親奉玉音謂正資于輔佐洊頒綸命又有及于典刑仁慈優隆詞旨詳縟仰聖主所以逮下在微臣皆非敢當不復更引禮經逺希前哲直以血氣衰瘁疾既交侵心志凋殘事尤健忘行多則蹇于進步坐久則昏不知人但可投閒豈堪任責欲望陛下特垂睿鑒洞察忱衷推從欲之至仁使歸安于故里巢由長往孰云堯帝之遺黄綺終辭無損漢家之盛切于得請不覺費辭再乞致仕劄子嘉定五年八月臣輒瀝危衷仰于天聽伏念臣衰瘁至此實不堪為世用仰蒙聖恩擢寘政路首尾五年平生自知分量不敢貪榮久處于此日不遑安是以無嵗不求再掛衣冠或以疾故請至再三率蒙睿眷溫詔曲留不敢頻有煩瀆又復中輟今年七十有六矣已無顔面尚玷邇聯況自入春以來屢以病告兩嘗吐痢俱作再以淋澀為苦近復以暴下累日薾然弗支形體瘦瘁飲食絶少近雖勉强朝參深恐不能支吾一旦僵仆大廷萬目並觀徒為清朝之玷臣之獲譴顧何足言伏望皇慈深察誠悃使之歸伏田里以迄餘生以全暮景實為孤臣之幸第二劄臣近者上章乞身自知僭冒甘俟刑誅重蒙聖慈不惟未賜俞允又勤詔旨仍降四項指揮不容引退臣感激恩遇衰涕交横不免再有陳述陛下更化之初臣首蒙收召旋自西府進貳東省三數年來聖徳日新治效益進凡前日水旱饑疫蟲螟盜竊悉就消弭邊陲寧謐年穀順成此皆國家運祚方興聖徳光被使臣等得以充員尸素于此豈不仰戀明時而乃自求屏退況今郊祀大禮在近千載際遇又將預駿奔之列引疾匄去此豈臣子之情實以屢困疾病筋力頓衰精神戃恍不能自持正恐當聖主精意明禋之際冒居使名不足以效奔走萬一顛沛于郊廟壇壝之前有汙大儀則臣死不足以塞責是以不復更敢引經據古直述情素投告君父及此秋季祀事未講之時賜以殘骸俾歸桑梓得為太平之遺民免玷知人之聖鑒誠為餘生之幸再瀆天威臣無任俯伏感涕祈懇之切第三劄臣再具劄子陳乞休致伏奉詔書不允不得再有陳請念臣久叨共政之地屢上乞身之章兹焉三瀆于冕旒誠欲一歸于巖穴危衷傾敘温詔洊頒已窮告老之辭深感留行之眷惟是臣荏苒五載侵尋八旬略無横草之功固已難居于邇列若匪負薪之疾猶能強處于周行誠以一年以來百病交作幾經告假日媿空餐近雖勉赴于昕朝實亦每懐于隠痛不知者尚謂其矍鑠旁觀者寧免于揶揄今則骨露神癡行遲坐困髪種種以如許視茫茫而愈昏孔子老而戒得之言莊周夀則多辱之訓皆所當鑒不敢重陳直述腹心仰投君父惟乞皇帝陛下察其衷曲加以哀矜及兹未至顛沛之時使得早遂歸休之請首丘在望没齒難酬重冒天威臣下情無任惶懼俟命之至乞致仕劄子嘉定六年正月臣輒瀝危悃于冒宸聽伏念臣衰薾無堪叨塵政地四年于兹屢貢乞身之章曲蒙睿眷詔旨丁寧又復中止舊嵗多病内外交攻齒髪並侵心神凋耗秋間自列正恐不任郊禋駿奔之勞既不得請日夕兢懼迨原廟太宫圜丘行禮之際陛下寅恭䖍鞏神示昭格而臣筋力弗彊足膝俱憊侍祠跛倚幾于僵仆臣實無以措躬旁觀亦為臣危之獨以熙事備成恭謝日近未敢奏陳雖幸俱免疎虞而雪深寒勁罙所弗堪拜起蹣跚有失臣子之敬況今遂年七十有七若又不能掛冠而去則寡㢘鮮恥安煩戀劇之誚必不逭于公議而臣平日知止知足難進易退之志至晚節而掃地雖百口無以自明是敢仰瀆天威求致其事少休故里以畢餘生伏望聖慈亟賜俞允使得納祿以塞盈溢垂車以示子孫不勝百生之幸貼黄臣昨者齋沐修寫奏劄只俟恭謝禮畢榻前控陳既而展日再臣賤疾愈致發動適值同列在告勉強陪班痛楚特甚呻吟宛轉幾不聊生元正朝謁使客在廷皆弗獲預機務叢委非可養疴病體支離豈堪任事雖欲一伏軒墀有所不能用敢殫瀝寸誠仰祈保全生成之賜見今居家以俟威命伏乞睿照第二劄臣近具奏陳乞致仕伏奉詔書不允者伏念臣頃自從班為親求歸繼遭排拫十有三載百謫備矣不敢遽掛衣冠恐或者以為躁憤其實無所怨尤母喪既除適當謝事之時再疏而後得請自謂餘齡無幾平生出處遂保始終敢圖睿恩起于既老擢寘近列皆出天地生成之賜職高任重憂懼日積俸優分溢滿盈自畏況兼年垂八袠衰疢交侵醫療未效玩愒滋深合是數端豈復有可留之理欲望聖慈察其真情檢㑹累奏亟賜一俞上以廣清朝養老之懿下以全微臣首丘之願感戴恩紀沒齒圗報干犯雷霆之威席藁俟譴第三劄臣近者再上封章力求納祿伏奉詔書不允不得再有陳請臣自揆逾分不當更申黷冒真情迫切敢犯威嚴臣竊惟陛下更化善治百度維新比年以來大臣之進退猶未有全其終始者殆非所以示四方也皇恩如天保護臣下邇聯求退率多留行固足以仰見眷注之深然如臣者本乏才術少不如人今焉及耄顧何足算力不逮心既無以佐萬機之煩年當戒得又無以逃衆口之誚使其蹣跚後塵已為徒妨賢路矧復病苦相纏雖欲勉竭有所不能歴數立朝之人臣最衰老其為宜去亦莫先于臣者是以不避三瀆期于得請居家屏息以俟俞音臣無任惶懼震灼之至第四劄臣近具奏陳乞納祿准尚書省劄子備奉聖旨依已降詔不允不得更有陳請臣洊有危悃不容自已敢畢陳之臣竊惟仕而請老古今之通義而在漢尤以二疏為賢方父子相期俱歸移病賜告廣遂稱篤上疏乞骸而後許之及其都門祖餞至今想見藹藹之盛此豈真疾篤者而宣帝不以為欺公議不以為過正以其年既篤老且欲以全其節也如臣不肖無能為役起于掛冠貳政累嵗賢路久妨一宜去年登七十有七望八十幾何踰禮越法甚矣二宜去福過災生拙恙交攻呻吟宛轉殆無生意三宜去三上封章皆出由衷之言不敢遽稱疾篤以欺君父又敢望聖慈推宣帝保全臣下之意使臣庶幾二疏之風抑以示聖朝退人以禮之美倘得以餘年歸休山林以畢首丘之志天施地生恩紀無極若筋力尚可勉强猶當一拜軒陛之下以展犬馬戀戀之心銘肌刻骨九殞不忘疊犯威顔臣下情無任激切懇祈之至第五劄臣比者四上封章力請納禄詞殫情極竊意或可以感動宸聰仰蒙聖慈親御翰墨眷留至渥予告至再祗服異恩敢不退聽初亦自謂幸得兼旬休養益近藥餌庶可勉强自振上副九重之至意而空餐已久福過災生終嵗疾病入春反深醫者伎窮假限將滿衰悴痛楚愈難支吾屢瀆君父實非得已伏望俯矜垂老使致其事歸伏田里消弭悔咎少延殘喘不勝百生之幸第六劄臣輒瀝危悃洊瀆宸聰臣老朽抱疴五上乞身之請三蒙予告之恩專意醫藥又復許時拙恙曾無差減晝夜呻楚左右所不忍聞垂絶之命去死一髪伏念臣入仕以來服膺怠事之戒奔走外郡凡公家參集之會未嘗托病苟且況冒居邇聯首尾六載日謹昕謁退而贊貳政機應酬庶務延接賓客或逼昏晚雖曰徒勞然竭其區區之愚毎欲粗伸報效猶以不稱為懼今則筋力已愆病又困之恭謝之後元日朝賀使者在廷皆阻于就列葢兩月餘不獲進瞻威顔豈有高爵重禄養此衰殘之人上辜任使下妨賢路懐安尸稟負罪愈深雖聖眷之優加實公言之可畏内自揣度如臨淵谷假限既滿不容勉强揆以漢法三月當免稽諸著令止許百日是敢申布忱衷控投君父伏望睿慈察其迫切曲賜矜憐俾得再掛衣冠早歸田里消弭悔咎苟存喘息以見松楸實戴天地生成之徳矢辭已窮臣無任戰栗俟命之至第七劄臣情實迫切不避斧鉞之威言出由衷仰干天地之造期于得請遂忘屢瀆伏念臣忝塵邇列于今五年自揣疎庸嵗嵗求去奏疏徹聞無慮數十聖度容納非直寛其譴呵而又親灑宸藻過形奬飾區區所陳竟閟俞音使臣筋力未愆尚可勉强固當殫竭駑蹇以答隆恩公論私計猶弗暇䘏而今者一病累旬略無退證醫療備至不容措手惟有決意乞身歸休田里既釋重負稍免憂懼庶幾消弭災咎假息餘齡倘得畢志丘壑則君父生死肉骨之賜淪肌浹髓雖九殞不足以論報矣干冒宸嚴臣無任戰粟貼黄臣以病體衰羸天氣尚暄若俟假滿有請必致重勞處分故敢不俟半月之限竭其懇悃欲乞聖慈免再給假賜臣骸骨及今得歸尚可生還故里不然則必至斃踣于此情實可矜伏乞睿照乞御書錦照二字劄子臣昨者陳乞自備材植修葺先祖贈太師楚國公臣某守明州日所建錦照堂永逺嚴奉徽宗皇帝御筆碑石已蒙聖慈依臣所奏臣今者乞身得歸輒瀝愚誠欲望特灑宸翰賜臣錦照二字庶幾奎畫昭回庸侈祖孫被遇累朝眷寵之厚以為敝里私家無窮之光不勝榮幸乞東宫書懐綬二字劄子某昨者陳乞自備材植修葺先祖贈太師楚國公某守明州日所建錦照堂永逺嚴奉徽宗皇帝御筆碑石已蒙聖旨依某所奏某乞身得歸欲于堂側立懐綬扁榜是敢仰干令慈望賜某二大字以為子孫不朽之傳不勝幸願攻媿集卷三十三欽定四庫全書攻媿集巻三十四宋樓鑰撰外制吏部尚書趙汝愚兼侍讀敕朕退朝之餘務學為急開邇英之閣肆求經史之遺言對無逸之圖慨念祖宗之美意正有資于勸誦顧何憚于増員具官某秀出天支蚤收儒效擅開平之譽久宣出藩入從之勞條晁董之言尤見憂國愛君之意謹銓衡于選部實領袖于禁途朕惟歴代編年之詳萃于通鑑之紀三朝致治之要列于寶訓之書爾其因事進規盡忠無隱矧是宗盟之彦首陪經幄之游尚服異恩以稱公選寄資武功大夫幹辦御藥院陸彦端轉歸吏部除帶御器械依舊幹辦太一宫敕具官某爾給事宫省謹而寡過肆還寓秩列之銓選屬鞬九陛仍護行宫往哉惟欽母替于舊武經郎趙不淹換太子右監門率府率敕具官某國家宗支視古為盛然以屬近行尊得奉朝請者亦鮮矣爾修飭有素宗老薦其詳雅授以正率日陪近班尚勉之哉以永終譽許從善循修職郎敇具官某爾以假吏往從使節兹登仕籍始得論賞雖曰踰時亦不失勞矣從政郎邵武軍司理張令照降兩資故罷敇具官某治獄之職惟公則平爾曲奉上官縱吏為偽以䧟人于深文臺評來上罰其可逭再鐫厥階歸務循省修武郎前監紹興府東城庫馬鎰降兩官敇具官某爾職槯酤驚擾田里憲臺按治嚚訟自解削秩免官以正名分朝㪚夫夫知邵武軍趙師造降兩官敕具官某政平訟理郡太守之先務也爾按吏不審乃諷脅理官偽為文記以傅致其罪彼罪雖得爾其可佚罰乎褫秩二等以戒鍜鍊之吏從政郎賀正使書狀官俞南仲循兩資敕具官某朝廷選修聘之使而使之自選其屬爾以庠校之彦為之少從禮成而歸賞可後乎何謙韋益竝循修職郎敕具官某集故事以成書儒館之職也爾隸西省韋益改東省亦預有勞既登仕版仍進一階朝㪚郎温州通判傅頤降一官放罷敕具官某𣙜貨之禁至為嚴密治中别駕實專掌之爾職在是而不能戢吏卒之冒法豈惟闗防之弗嚴抑見威令之無素削秩免官以懲不恪福州觀察使王抃父康贈武功大夫成州團練使敕朕肇禋南郊祇見上帝爰推霈澤以及萬方仕登朝列皆得以及其親具官某故父具官某有子以㢘車告歸爾亦預此䘏典尚其有知欽承休命寄資右武大夫遙郡防禦使皇子嘉王府都監韓世榮轉歸吏部在京宫觀敇官躋横列使領遙防是為右選之華用示内班之寵具官某進謹赤墀之奉退祗朱邸之勞歴年寖多以疾來諗俾隸名于銓部仍賦祿于真祠尚服渙恩以保終吉承節郎潘時美嫡母孔氏年九十一嵗封孺人敕具官某嫡母孔氏比肆郊霈推老老之恩爾年登九齡子為命士予之湯沐以為晩嵗之華通奉大夫顯謨閣待制陳峴係韋潛心舉主降一官敕賢引其類固難保于終身稱匪其人亦何逃于定制具官某早登膴仕屢薦小官逮歴嵗之既深有字民之無狀按章不審雖多刻吏之文具獄既成莫掩貪夫之迹攷尋舉將乃屬從臣以嘗遇于霈恩姑稍鐫于命秩尚為寛典毋有遐心嘉王府請尚書徹章官屬各轉一官承議郎中書舍人兼翊善黄裳敕朕有元子教之以義方爾以名儒導之以經術既闡百篇之奥可稽一秩之襃具官某造理精深處心夷曠出廷臣之右能介而通從吾兒之游最專且久博文約禮欲著乎心攷古驗今如指諸掌因乃天資之美加之學力之優兹焉進官姑以示寵惟帝王之胄非務為章句之徒發經史之微尚益明事物之要既上紫垣之直仍先朱邸之僚進有賴于諭思退尤資于講習其祗朕命式究爾心承議郎著作郎兼贊讀黄艾朝奉郎軍器少監兼直講陳士楚敇具官某朕以元子天資之良遴選賓友以輔導之惟爾艾爾士楚俱以儒英從吾兒游典謨訓誥誓命之文講貫既久以至終篇旌爾賢勞何愛一秩其益暨乃僚秉乃心相與發明經史之要日計不足而嵗有餘厥惟休哉知揚州錢之望復直寶文閣敕具官某朕肇禋南郊爰肆霈澤士有一眚咸復厥初矧吾帥臣起臨邊閫日著聲績如爾之望者顧可後乎爾守襄陽煩言洊至稍鐫寓職于今三年因予泰畤之恩歸汝寶奎之直其祗寵沃益懋爾功成都府路第二將高師顔制置使司奏舉知黔州敕具官某蜀道萬里士有負文武之才者朕何自而知之爾起将家歴戎職制使謂爾通練老成連師又稱其沈毅通敏朕以二臣之言試爾以黔中之守爾能不負所舉則知所以報國矣泉州同安縣靈䕶廟神封威惠侯敕具某神朕之愛民至矣吏治于明神職于幽苟利吾民雖逺必錄以爾神廟食海嶠久著靈迹卻蠻蜑而張官軍招海賈而銷癘疫有司覈實具以上聞錫爾嘉名歆予茂渥承直郎坑冶司檢踏官蒋蓋降一資放罷敕具官某國家置使江左以總諸道之貨泉設屬支郡以究山澤之遺利爾其屬也冶工爭攘至相戕殺爾實啓之劾章既聞其上一秩免所居官吏之不䖍庶乎知警修職郎臨安府昌化縣主簿趙善視降一等放罷敕具官某爾筮仕之初密在畿邑是何么䯢敢爾披猖鐫秩免歸尚為輕典爾則自取将誰咎哉入内内侍省都知鄧從訓該奉上高宗皇帝徽號冊寶轉協忠大夫依前奉國軍承宣使敕朕推尊烈祖務極隆名寶冊之嚴式資辦護均行賞典爾則先之具官某服在禁庭恪共衆職橫班秩峻既兼留務之華高廟禮成實任賢勞之首爰加命秩用答爾勤倪思等係常良孫舉主各降一官禮部侍郎倪思敕人未易知其來已久士不自愛乃至于斯既駭予聞致貽伊戚具官某夙推清望遍歴華途比因繕監之遷爰謹屬寮之薦家既傳于清裁人亦謂其端良俄隱慝之遽彰何貪心之已甚攷尋舉將乃屬從臣以其未脱于七階俾爾姑鐫于一秩勿以懲羮之故而忘推轂之公中㪚大夫知通州章沖敕具官某人之難知舊矣爾為南蘭陵以户曹為賢而舉之閲嵗既久乃以賄聞申舉将之罰不可廢也其上一秩毋忘省循隆興府佳山孚應廟神封惠濟侯敇具某神國家愛重爵賞非有功不侯人神一也以爾神生而不求聞達以忠孝而化人沒而能著靈響有功利以及物手植之槐猶在舟行之禱必答予之好爵其尚欽承朝請郎致仕劉礎降一官敕具官某朕視嶺海猶畿甸也爾守蒼梧而部使者謂爾加賦于民且曰遂祠請而未拜聞劾章而徑行雖已挂冠豈容幸免姑鐫一秩以示薄懲從政郎錢逖降兩資候服闋日與逺小監當敕具官某細民以煮海為業私販冒禁或未能免爾仕至邑令又方執喪使者亷按謂爾為逋逃之淵藪何耶削去二階姑令終制朝祥暮貶其尚何辭寄資訓武郎嘉王府都監朱思正轉歸吏部在京宫觀敕具官某服役内廷兼官王邸克勤所職以疾丐閒祿以内祠秩之吏選尚欽朕命以善爾躬成鏞知黔州敇具官某爾奮由武科屢更事任黔中雖逺委寄不輕外控夷蠻地當一面命爾作守凡牧民固圉之事尚勉之哉寄資武義大夫果州團練使重華宫祇候董友聞轉歸吏部敕具官某爾職聮中禁使領遙團共事累年以疾求退俾乃舊列往赴右銓益務檢身以俟收用秉義郎閤門看班祗候韋琳報班差錯降一官敕具官某朝儀尚肅賓贊尤嚴進退降登視以為節抗聲失度時汝之辜爰削一階以懲不恪郭棣知瀘州敕掌殿巖之武衛夙著勤勞分邊閫之顧憂兹煩鎮撫睠予世將聽我訓詞具官某稟資沈雄馭下嚴整出臨淮海嘗當一面之權入總貔貅久護千廬之密北歸故里既厯累年惟時瀘川控彼蜀道靡有蠻夷之外侮何期蟊賊之内訌狂卒稱兵衆無與者仇人假手天實誅之顧平時謀師之甚艱豈今日擇才之可後疇堪予選僉曰汝諧爾其設方略以靖驚疑示寛大以安反側凶徒既殄無問脅從義士實多當行第賞綏爰有衆遂令境内之清坐折遐衝益致王靈之暢佇聞嘉績别議優恩文州靈惠豐安侯加封嘉應敇具某神朕成民而致力于神陰平去都城萬里苟有利于民亦不汝遺也増以嘉名用答靈貺尚其歆奉以惠逺氓文林郎保寧軍節度推官趙善謙降一資放罷敕具官某爾以宗子居大郡幕府不能自潔其身乃與胥徒共為姦利償券焚歴欲葢彌彰鐫黜示懲尚服寛典文林郎寧國府司理盛將之降一資敕具官某獄事至重豈容小差爾職其間乃爾失當諒其非故姑示薄懲承信郎石璿父榮年九十五保義郎致仕敕具官某父某比肆郊霈推老老之恩爾年登九齡子為命士授之武爵以為晩嵗之華興化軍莆田縣順濟廟靈惠昭應崇福善利夫人封靈惠妃敕明神之祠率加以爵婦人之爵莫及于妃倘非靈響之著聞豈得恩榮之特異具某神壼彝素飭廟食愈彰居白湖而鎮鯨海之濱服朱衣而護雞林之使舟車所至香火日嚴告賜便蕃既極小君之寵禱祈昭答遂超侯國之封仍靈惠之舊稱示襃崇之新渥其祗朕命益利吾民朝請郎張抑係舒光舉主降兩官敕具官某人之難知舊矣爾持江東使者節以池陽郡博士為賢而舉之閲嵗已久乃以賄聞比申舉将之罰惟爾在哀疚而未及既除喪矣其上二秩毋忘省循遙郡刺史知和州某依舊武功大夫祁州團練使敕具官某將門出將其説古矣紹興以來名將之後人才不乏鮮有以將略世其家者爾起自西陲屬鞬九陛頃由選擇出守山陽雖邊塵不驚智勇無以自見而首尾五載固圉有勞徒之大邦陞以遙圑之秩朕之知汝深矣勉趨功名毋忝爾祖寄資訓武郎韓果轉歸吏部在京宫觀敕具官某服役禁庭屢更嵗籥恪勤厥職式閔其勞祿以内祠秩之吏選尚欽朕命以善爾躬文林郎監泰州鹽倉周大老降兩資放罷敕具官某鹽筴之盛莫如海陵積弊之深亦非一日今帑中之藏至失十萬百發吏姦汝之職也詳究始末失職已多而又不能自别于貣貸之嫌再鐫厥官歸務循省朝奉郎知湖州烏程縣趙彦衛為鄉民訴水傷擁併死損八人降一官敕具官某爾試邑輔郡能聲徹聞秋潦為災訴者輻凑老羸蹂躪至有死傷雖非闗防所及咎將誰歸其上一階服我寛典嘉王府講尚書徹章官屬諸色祗應人各轉一官資内知客修武郎譙令雍秉義郎戴勲敕具官某賢王務學講席徹章惟此百篇之書坐閲八年之久凡預職守咸進官聨爾起于諸生班在上閤祗事朱邸見謂恪恭渙恩所加勿謂故事尚勉思所以稱此者哉使臣忠翊郎姜文用孫昌祖忠翊郎姚思正保義郎董政中徐松成允顯高珂指揮使從義郎馮涇王良講堂使臣秉義郎蒋巨卿張克家講堂書寫文字進武校尉張桔承受所手分承信郎舒良嗣承受下主管文字忠翊郎遆興祖客司成忠郎傅宣世前都監訓武郎朱思正醫官成全大夫陳世安翰林醫候李之美成全郎陳翊敕具官某等王邸談經閲嵗滋久凡曰執事咸進厥官往其欽承益務恪恭秉義郎楊忠輔換太史局丞權同知算造敕具官某周之馮相氏保章氏皆以中士為之星厯之學為士者可不務乎爾邃于厯徹于朕聽因其所長俾貳局事推步日月星辰之行以稱朕欽天授時之意爾尚勉哉殿前指揮使行門長行左班楊坦劉選李端邢敞沈明黄毅杜樁呉珪蔡顯右班王佐邊寧李鈞孫彬陳琚曹渙王浹黄義陳圭換武翼郎添差諸州駐泊兵馬都監敕具官某等行在所猛士如林又擇其雄毅之尤者列在人門為予𤓰牙厯嵗既久親閲挽强之技超授武爵護戒方州錫之袍帶以寵爾行毋忘衛上之忠益習近民之事尚勉之哉殿前指揮使守闕行門長行左班許坦聶榮明澤孫伸右班盛俊呉佾郭錫換從義郎敕具官某爾等以拳勇選密侍宸居有年于兹矣親試其藝視高下而賦之爵尚勉之哉毋怠于事神騎嵌補副指揮使姜勝換秉義郎宣武嵌補指揮使徐成換從義郎天武下名副指揮使吕俊換修武郎敕具官某爾等早以武勇備予羽衛閲嵗既久而挽强之力不衰授爵有差往親民事益務忠恪以稱所蒙趙介循從事郎敕具官某爾以刀筆為冊府之吏周旋四庫其職清矣又以奏篇之賞疉進資級其思所以稱此者哉入内内侍省都知鄧從訓轉履正大夫依前奉國軍承宣使餘如故敕總禁廷之務久矣宣勞居横列之班兹焉進秩具官某持身克謹遇事惟勤出入宫闈習見累朝之故實侵尋嵗月兼提衆職之綱條爰因酒正之修更陟武階之峻勿云近北思稱優恩蕭鷓巴奏孫秉義郎存德乞將磨勘轉官回授母淑人耶律氏封郡夫人敕命婦之封率從于夫爵小君之號茲越于邦彝某人早嬪名將之家同慕中華之義兩朝示寵名已著于鳩桑一子貤恩榮特頒于鸞誥往服朕命益宜爾家朝奉大夫錢之望奉使回程轉一官敇具官某北遣使華往修鄰好聞其扶疾慮有闕事見大夫非無可使恐不及期以爾志存許國才足應變輟自邊閫俾將予指聞命引道禮成來歸進之一秩姑以勞還俟訖外庸嗣有襃擢武翼大夫楊大節奉使回程轉官敕具官某朕嵗遣使華往修鄰好必選上介以輔其行爾以扈衛之臣為行人之副中途易節調護無虧惟爾之能應予之賞俾増命秩其尚欽承奉使官屬文林郎陳元震從事郎譙令憲迪功郎錢廷玉忠訓郎郜師孟忠翊郎黄允迪訓武郎李邦安忠郎郎楊祖烈呉良弼趙進承節郎張達符溥從義郎何洵保義郎金彦達進武副尉王沖各轉一官敕具官某嵗遣信使修好鄰邦凡為假吏之行舉有優恩之及用酬勞勩毋替忠勤武功大夫和州防禦使殿副都指揮使部杲落階官敕總千廬之衛久護戎昭頒一札之恩用申襃律具官某器資沈鷙謀略雄深飭邊備于上游坐銷外侮肅軍容于中疉允藉壯猶朕慨宿將之無多眷故家之可用繄爾昆弟為予𤓰牙兹徹武階俾專使領庸示等威之峻式昭名器之公其服恩榮尚圖忠報閤門祗候訓武郎李彦機從義郎李删秉義郎楊應龍應奉人使到闕一十番各轉一官敕具官某等信使來庭掌在上閤賓贊之職不容毫釐之差祗事累年積勞可賞進之一秩益務恪恭從事郎成州天水縣令韓廷圭降兩資敕具官某邊臣無小大皆以忠實為先爾以逸囚受罰矣而又為欺洊削一階用戒來者皇叔祖士峴男太子右監門率府率不㤏轉一官敕具官某國家以十階待近屬必十載而後一進其選所以將之者何如耳頃罣吏議亦既累年察之蓋詳爰寵其子躐等而進雖曰近比實惟異恩忠翊郎李孝純落階官閤門宣贊舍人敕具官某爾以名将諸孫中宫兄子不患不致富貴顧所以將之者何如耳頃罣吏議亦既累年察之蓋詳克自循省賓贊之職用以命汝念之哉知復玷缺之艱難則知所以保其身矣故責按安逺軍節度行軍司馬詹儀之追復中大夫敕具官某朝廷念廣西鹽筴之弊因爾建議使行其言非徒無益而又害之爾既知其不可而不能自已何也解弦更張事始少定褫官置散以謝逺民而爾亦亡矣爾豈欲害民者徒以昧于不逺復之義而致此亮其本心追復舊秩能體此意尚為有知大中大夫參知政事胡晉臣提舉修壽皇㑹要并禮儀使轉一官敕朕寅紹丕圖推尊慈極纂修帝制尤嚴于五載之餘登奉寶儲遂全此一主之法惟時近弻兼總宏模矧相禮以備成豈疇庸之可後具官某該通而知務端靜而善謀頃上禁途居然有公轉之望迨升宥府足以致朝廷之尊俾參預于政機益茂明于國體緝成大典允藉宗工誕舉縟儀更資使範以侈重華之盛以彰疊矩之傳爰序進于崇階尚勉從于遜牘増培采㑹仍衍真畬噫鋪張閎休實贊我顯親之志奉行故事尚堅而致主之心往服訓辭以綏寵渥從事郎趙彥适收使射中減磨勘循一資敕具官某國家選士于廷又命以射爾以宗支之秀既擢儒科能游于藝且應賞格何愛一階以示勸奨從事郎王堯佐前任復州司理載鐵錢入銅錢界算請鹽鈔降一資敇具官某冒利犯禁齊民則有之爾為獄掾乃敢以身而試法稍鐫命秩猶為寛恩朝請郎尉聞詩前知永康軍拖欠綱運降兩官敕具官某朕崇儉示樸未嘗加賦于郡邑然軍餉則不容缺也永康雖小賦入有度及爾為之闕供甚矣鐫去二秩以勵其餘而猶不奪爾合江之符以不得罪于民也其務足用勿以懲羮而取盈焉朝散大夫知明州高䕫為提刑陳倚申厲雄公事不自陳避嫌降一官與邊郡敕具官某爾以選擇屢典大藩四明富民之訟使能俟屬邑之公行聽憲臺之移獄則晏然無事矣部使者謂爾不能引嫌疑有未盡鐫官一等易地邊方汝往哉其思有以靜鎮之朝散郎國子博士徐嶤上殿墜笏降一官敇具官某爾以老書生獻箴于朝此意勤矣朝儀貴肅乃爾失度雖欲宥過不應但已稍鐫命秩矣儆廷紳寄資右武大夫遙郡圑練使符滌降兩官放罷敇洒掃是職專務盡恭過愆有聞豈應從恕具官某久以勤敏祗事禁嚴當克謹于官箴乃自貽于罪罟命鐫横列尚畀遙圑罷歸銓部之班顯示貂璫之戒内侍高品李元美降忠翊郎放罷敕具官某禁廷貴肅三尺尤嚴爾職其間而越法度削官二等尚為寛恩閤門祗候潘瓚落看班敕具官某爾祗事昕朝再更嵗籥稽之故實盍正官稱益務恪恭毋怠于久皇后親嫂碩人許氏特封郡夫人敇命婦之封蓋從于夫爵小君之號兹出于上恩故某官妻許氏蚤嬪将家今為后族亷車既往莫諧偕老之宜戚閈方興實號懿親之長屬褘之之歸謁分石窌以疏封尚惟治度之循以對寵光之渥直敷文閣史彌正為高䕫奏厲雄公事落職罷宫觀敕具官某爾奉祠就養宜無預于公府知篤葭莩之好而忘𤓰李之嫌事發相重遂徹朕聽收還延閣之直仍罷祠宫之官尚其省循予不汝棄侍御史林大中直寶文閣知寧國府敕具官某朕惟天子耳目之官與夫言語侍從之臣皆極天下選豈應輕去然進退之際君子之大致存焉朕亦欲有以全之爾以清徳雅望周旋三院有年矣憂國之忠匪躬之節論事有體義形于色臺綱斯振物論洽然擢貳銓衡所冀獻納之益而抗章自列引義不回宣城大邦實慈皇初潛之地寓直寶奎以寵爾行牧御之方無俟多訓勿以在外而忘告猶政成來歸副我虚佇知漳州鄧驛江東提刑敕具官某入而居獻替之選出而任澄按之寄皆朕耳目之官也以爾端靖有守雅望甚休擢在諫垣出鎮南服江左祥刑之重肆以命汝豈惟引以寖近為爾之寵抑使列城之人知朝廷垂意臬事至遣諫官以臨之書不云乎好生之德洽于民心朕将庶幾焉知廬州許及之大理少卿敕具官某朕承累世仁厚之餘雖㒺敢兼于庶獄而明罰敕法求惟厥中乃者播告之修孚于中外矣爾以諫省之舊知予德意而明敏詳練無施不宜召自邊閫用為廷尉之貳昔張釋之使天下無冤民于定國為之民自以為不冤汝往哉其為朕持天下之平且以行汝學道愛人之志大理評事李珏再任敇具官某廷尉之屬非明于文法不以輕授非遲以嵗月不能貫通也爾以名家子庀職既久以其自列爰俾因任尚圖來效勿替厥初故太傅富察久安女碩人乞用父遺表恩澤封郡夫人敕命婦之封蓋從于夫爵小君之號兹出于君恩某官女碩人富察氏生長北方來歸王國謂父兄即世惟一身之僅存而恩渥自天曾累嵗而未請乃叩九閽之邃願加列郡之稱亮其忱衷矧有近比特疏予寵用慰爾心忠訓郎興州遊奕軍權綂領常崇轉一官敇具官某朕周知中外将士之才間使來前用閲其實不以逺近為間也爾來自西陲人物可採何愛一秩以寵爾歸益習戎韜以俟有用殿前司神勇軍統制訓武郎劉肇步軍司左統制修武郎姚旦總轄牧放倒弊數少各轉一官敇具官某等嵗分遣諸軍牧于淛右寛閒之鄉惟統御有方芻秣以時歸而閲實生全者衆進之一秩以為來者之勸高夔知廬州敕具官某爾頃守合肥嘗移之内郡旋守四明又易以邊方乃自制司復分帥閫蓋以爾習熟淮甸有志事功故因以遷焉内有以固吾圉外有以宣王靈爾尚勉之哉朝奉大夫新知昌州程仲虎為虧發官錢降一官與閑慢差遣敇具官某朕崇儉示朴未嘗加賦于郡邑然軍餉則不容缺也廣安雖小賦入有度及爾為之闕供甚矣姑鐫一秩以為罷軟之戒皇弟右監門衛大将軍某州刺史多能多助收使父居中遺奏各轉遙郡團練使敕具官某等朕親睦九族務從優恩而十階之進則謹守舊制未嘗私也以爾父嘗建節旄不及中夀遺奏之澤未請于朝俾爾昆弟俱領遙團之任朕之于爾厚矣尚惟恪恭以綏寵禄林㟽閤門舍人敇具官某爾以武科首選庀職上閤有年矣銜恤告歸免喪入見俾還舊班益務恭恪中大夫知寧國府蒋繼周磨勘轉官敕擁千里之麾方著民庸之茂攷三載之績尚伸吏課之公具官某被眷慈皇進班言路以中執法之舊為東諸候之尊政最有聞尚有稽于襃表封章來上何屢請于歸休兹以年勞應于銓法爰峻文階之秩遂登從槖之班大異庶工往祗茂渥知廣州岳霖敷文閣待制致仕敕師閫有嚴方任顧憂之寄囊封何遽來騰告老之章驚爾疾之寖深撫予衷而甚戚具官某秉心端亮遇事詳明少厯艱勤養成畏謹之性晩更事任率有循良之稱念方虎之舊勲擢金吾之近侍一辭軒陛洊閲嵗時起分嶺表之麾俄感漳濱之疾宦游南海曽無暖席之淹次對西清用示挂冠之寵尚期自厚以冀有瘳岳霖贈四官敕挂冠有請方聯次對之班易簀可哀宜厚飾終之典云胡弗淑而至于斯具官某出自勲門動遵士檢攬轡登車之寄夙著賢勞簪筆持槖之除實由親擢分五羊而作牧擁駟馬以啟行何恙之深此生遂已念世臣之無幾愴長夜之不晨忍聞垂絶之言寧愛不貲之寵躐四階而進秩按三尺以疏恩用大爾家庶将予意知贛州趙彦操知廣州敇具官某爾頃為列卿攝民曹領京邑以才諝稱今二十年矣屢試劇郡政最卓然南海巨屏實控百粤去朝廷逺委任尤重章貢壤地相接不惟通知風俗之宜南方亦久聞爾之名矣舉以命爾其為朕綏編甿撫蠻蜑使嶺海之間不異畿甸庶有以副朕不忘逺之意知靜江府趙思集英殿修撰提舉江州太平興國宫敕具官某朕擇才而用謀帥尤艱廣右去朝廷逺二十五州綿地甚廣爾以甘泉舊臣起家作牧而兩載之間内外晏然治行可覩矣方圖爾功而以疾諗丐閒甚力何耶均逸祠庭遂爾賦歸之志陞華論譔示予篤舊之恩尚勉壯猶毋忘忠報攻媿集卷三十四欽定四庫全書攻媿集卷三十五宋樓鑰撰外制給事中尤袤禮部尚書敕官建儀曹俾司禮樂制作之事職專宗伯當用朝廷老成之人閱一時侍從之臣極三朝髦俊之選求之公論僉曰汝諧具官某學極羣書才兼數器被眷知于慈扆參寮寀于儲宫出入累年始終一節禁路論思之益有衆人之所難瑣闈封駁之章至三進而未已積兹徳望處以文昌職務惟清實總夷䕫之任謀猷可告尚殫積契之忠中書舍人黄裳給事中敕朕惟舜命龍出納朕命而名官以納言葢人君之命不難于出而望其能納也瑣闥之職為朝廷喉衿古誼昭然尤當遴擇具官某天資直諒學力粹深處之王邸則有講導之益擢之詞掖則推潤色之工是用授爾以封駮之任非以序而遷也事有不可爾則盡言言而可從朕不吝改惟能知舜所以名官之意則能體朕所以命爾者矣太常丞章穎軍器少監敕具官某爾以倫魁之彦屢倫魁見漢書揚雄傳是集用之一本改倫為掄非端諒有聞進丞容臺預職史筆王邸講誦之益天官銓綜之公惟時名流兼此數器俾貳戎監是曰序遷萃之象曰除戎器戒不虞此亦急務尚勉之哉吏部員外郎汪義端監察御史敕具官某朕選任臺端增置諫列惟六察之分職非一人之可為泛觀在廷識擢自我以爾早先衆俊屢試長才風儀凜然有御史之望聲譽籍甚乃故臣之家俾踐世家往贊而長屢更劇郡尚何學邑之拘輟自名曹庸示簡僚之重其祗朕命往振臺綱右正言胡琢左司諫敕具官某朕擢卿諫省亦既再嵗端靖有守論事加詳葢聞古者有爭臣七人爾獨賢勞念之久矣増置諫列俾正左虚之位其益究乃心暨乃僚相與補拾闕遺以輔不逮俾朕導諫之風有聞于世亦惟休哉監察御史何異右正言敕具官某臺謀之選俱為甚重而職務自有不同臺臣當糾官邪而諫省專裨主闕爾為六察亦既年餘屢進封章凜有風采今予授以拾遺之職滋嚮用矣以峩豸之風盡造䣛之益則朕有聴言之美而爾亦無愧于古爭臣矣大理評事王補之大理寺丞敕具官某爾家傳文法久任廷評遂為同列之首賢勞著矣丞貳之職命爾遷焉罪宜惟輕繄古之訓移情就法尚戒于兹寶文閣直學士程大昌龍圖閣直學士提舉南京鴻慶宫敕朕收攬羣才緬懐耆徳矧東宫賓友之舊洊從琳琯之㳺冠西清學士之班爰峻河圖之直具官某才髙而能下氣勁而用冲㓜學壯行曽不渝于一節出籓入從實有聞于三朝退食自如著書不輟仰天觀象窮羲經八卦之文畫地成圖洞禹貢九州之域兹繼廩人之粟益髙延閣之名故國有世臣尚賴典刑之重乃心在王室毋㤀猷告之忠皇伯嗣秀王伯圭故妻秦國夫人宋氏追封兩國夫人敕伯父行尊已極三公之貴夫人徳配盍疏二國之封雖不逮于生榮顧可稽於䘏典具封某起由戚閈歸我宗英動惟圖史之遵居有珩璜之飾少同甘苦能與家人而㤀貧晚被寵光固宜君子之偕老云胡不淑弗永其年賜湯沐之大邦既屢頒于翟茀兼公侯之兩社爰特畀于蜜章屢蜜本諸晉書山濤傳所云云蜜印是集用之一本訛蜜為宻或改作宸亦非以伸伉儷之情以厚幽㝠之渥尚惟精爽式克欽承御史臺檢法官李謙太常丞主簿彭龜年司農寺丞元係林大中辟差大中與郡張叔椿再辟辭免敕具官某等爾謙篤信好學表裏無玷爾龜年剛毅近仁氣節有聞又皆憂深思逺有拳拳愛君之心御史選也大中之辟叔椿之留豈其私哉而引義慨然若不可一朝居者朕既不汝捨而髙爵非所以留之也容臺農扈分以命汝丞哉丞哉其少安之以俟選擇都官員外郎趙謐尸部員外郎主管左曹敕具官某爾祖父以直道佐中興配饗髙廟子孫苟在仕版以次拔用今位于朝惟爾一人外奏筠陽之課内為秋官之屬恂恂自守尚有家風遷置毋民毋懈于位趙思璱知徳慶府敕具官某海康雖逺以髙廟潛藩而增重選侯亦不輕也爾以宗支之秀資歴寖髙往撫是邦毋忽民事都大提㸃坑冶鑄錢耿延年兩浙轉運判官敕具官某部使者分行諸道在外則鍾官總貨泉之重在内則畿漕任飛輓之繁皆遴選也爾長於心計敭厯已深新安之政興仆植僵徹于予聽鼓鑄以佐用度又優為之計臺虚位亟以命汝或遄其歸以副朕為官擇人之意陳揚善知光州敕具官某浮光舊為内郡今實竝邉牧民之任不輕畀也以爾嘗守輔邦見稱辦治自去郎省家食有年兹庸授以左符往臨邉徹撫民以寛處事以靜其庶㡬乎古之折衝者矣知湖州趙不迹都大提㸃坑冶鑄錢敕具官某爾秀出宗支以才自奮三試劇郡辦治有聞惟時鍾官究山澤之利興鼓鑄之饒以佐國用非心計優長風力强敏之士不足以當之輟自吳興俾趨臺治檢柅吏奸導疏利源匪急匪徐惟正之供則爾之職舉矣知平江府沈揆司農卿敕具官某朕臨御丕圖求賢如渇儲闈寮寀選用無遺葢舉予所知非止篤舊故之恩也爾以儒學奮身周旋清貫詞藻之發追配前良肆朕纂承之初最先收召出守劇郡試之益詳矣漢二千石有治理效公卿缺則選諸所表朱邑由北海入為大司農則其事矣朕之待汝豈惟掌周稷之事哉往祗厥官嗣有褒陟吕大麟知常徳府敕具官某本朝衣冠之族爵位相望文獻不墜未有盛吕氏者也至于今日仕者寖寡慨然念之起爾于家以爾素守家法好學不衰宰郡有循良之稱在朝謹靖共之守去國既久退然自安武陵湖右奥區外控五溪之徼思得賢牧以撫安之故舉以命爾爾尚勉哉能大其家則為報國左丞相留正初除少保封贈曾祖贈太師耀卿追封英國公敕朕任賢甚專虚已以聽累奏篇之賞盍膺八命之崇覽遜牘之勤始進三孤之重乃循故事加賁曾門具官某生為善人世載隠徳傳芳中古由王國大夫之有聞席慶華宗去清源節度之未逺惟躬行無媿于幽顯故家聲大啓于孫曾是生名儒致位上宰閔書屢錫已登極品之官公社肇開爰胙真陽之土尚惟精爽歆此寵靈曾祖母周國夫人藥氏贈周國夫人敕士有奮身而仕至元臣推恩而爵及曾祖嘗迹所自必有其源豈惟奕世之賢仍多中饋之助夫或加寵婦則從之具封某以柔淑之資嬪儒素之族積功累行雖有良人之賢處順安時宜偕君子之老比及後裔是生上台封既至于小君寵仍疏于大國不改周南之舊用配留侯之祧其祗異恩以利後嗣祖贈太師沂國公寔追封福國公敕徳雖著州鄉而弗顯于朝廷身不及富貴而乃施乎孫子此古人敢以自必而天報昭然不誣我有宗工恩逮顯祖具官某坦坦幽人之履恂恂長者之風惟先世以來有功于國故餘慶所及遂肥其家果見聞孫進登孤保屢頒霈澤貴極師垣乃更沂水之舊封仍祚閩山之鄉國九京未泯百世不㤀祖母楚國夫人洪氏贈商國夫人敕婦道之修相夫以順家法之懿至孫而興雖寵榮不及乎生前而恩渥屢加於身後具封某以幽閒之操崇節儉之風夫婦俱賢蓋非一日之積室家流慶遂見百年之餘賜湯邑于南荆易封圻于上洛以顯漏泉之澤以慰含飴之思父贈太師衛國公鑄追封魏國公敕朕惟東周大夫留氏號稱世賢子國子嗟之父也俱不見用詩人惜之此丘中有麻所由作也朕之用賢則異於是具官某世有潛徳生為醇儒雖富貴不在其身而善慶乃積于後惟我碩輔秉國之鈞尊顯其親貴極人臣斯教忠之效也既胙武公之土復更畢萬之封父子之賢于是俱顯視東周之留為盛矣死而不忘其尚知歆前母燕國夫人鄭氏贈齊國夫人母秦國夫人劉氏贈魏國夫人敕婦爵從夫已極小君之號母貴以子洊更大國之封具封某迪徳靜專處家約素相夫以禮躬孟光舉案之勤教子能賢慕軻母擇鄰之訓相夫初政致位上台秩既進于三孤貴遂登于累葉表兹閫範用配禰宫改北國之舊圻畀東藩之新邑劉氏改四塞之舊邦畀大名之新邑申加閔册增賁宗祧故妻魏國夫人徐氏贈秦國夫人敕朕寵任大臣躋榮孤保爵既加于祖禰恩又及其閨門具封某生有令姿居循内則知巨源之識度相敬如賓勉仲卿以激卬及見其貴雖隔幽明之際仍深伉儷之情夏篆通旜顯漢相元勲之重魚軒象服開秦川大國之封九泉有知千載無憾大理卿王善之直龍圖閣知平江府敕具官某呉門地大物阜隠然東南一都會也爾生長浙右固已習知其風俗又嘗持節臨之聲聞藹然至今未㤀矧明練憲章飾以儒術再長廷尉滋嚮用矣抗章求外自詭治民為爾相攸無踰於此畀以羲圖之直用寵爾行豈惟不減昔人晝錦之榮吏民聞之不戒以孚足以寛吾顧憂矣浙東提刑陳倚大大理卿敕具官某國家以臬事付廷尉而立制視古為祥治獄者無踰于定法斷刑者不使之鞫囚而卿實總之選顧不重哉爾習于憲章而持心近厚由廷評而上至于為長踐􅆒有年矣綰建寧之符持浙東之節又皆有稱焉肆疇已試還爾舊物囹圄屢空病未能也爾能盡心使刑獄號為平則庶㡬乎古矣知雅州宋南强知金州敕具官某金城外控邉陲内連巴蜀有民有兵號為价藩延藩之餘正須長才以任郡寄擇人于内豈曰無之臨遣而行慮不及事疇咨西南之守就以遷焉以爾有志事功敏於從事其解蒙山之組往撫漢陰之民此而有聞朕將用汝木待問知湖州敕具官某儒科首選宦達相望儲禁舊僚收用略盡慈皇初開南省爾則為多士之先沖人頃居東宫爾則任端尹之寄而十年以來欲仕輒已朕嘗念之惟近臣為明當途之誣浮議遂定呉興劇郡視古左馮衆所憚為舉以試汝勿以多言為畏倚需最課之聞髙爵美官豈于汝吝費培大理評事敕具官某李官選屬必先試以文法然對有司之問者易為工察庶獄之情者難于盡爾為廷評其以昔之所習見于詳讞之際遇事加勉增益其所未至不倦以終之則為稱職福建提刑辛棄疾太府卿敕具官某爾蚤以才智受知慈扆盤根錯節不勞餘刃中更閒退以老其才養邁往之氣日趨于平晦精察之明務歸於恕朕則得今日之用焉召從閩部長我外府夫氣愈養則全明愈晦則光于以見之事功孰能禦之哉顔師古知泉州敕均佚真祠遂彭澤賦歸之志起臨舊鎮慰潁川願借之心匪曰朕私徒得君重既去家之不逺俾便道以有行具官某學慕儒先朝推壽俊慨孔戣之去命典外藩念陽城之勞許歸故里而逺甿懐其惠政賈胡服其真清攀轅莫留垂涕相踵此誠心之所感非人力之能為既徹聽聞重增嘉歎方遴選惟良之守要在求已試之才追常袞之遺風當一變于閩俗用蔡襄之故事宜再領于泉麾式遄其驅以副所望新寧國府林大中知贛州敕具官某章貢居江右上流控楚粤之要民俗果悍可以義服不可以力勝也非清徳雅量練達世務者不在師帥之選爾以不羣之資為有用之學治縣如古循吏入朝為才御史彈劾不避於權要論議率中于事機横榻之風振于一時朕既分爾以宛陵之符念其家食易鎮兹地先聲所臨百吏望風撫予南邦以寛憂顧朕豈汝㤀哉廣東轉運判官黄掄再任敕具官某朕分遣諫官御史使行諸道以廉察列郡之吏知予徳意多稱其職爾以端諒之資選在諫省去國未㡬使于嶠南善最有聞俾之因任既以慰斯民願借留之意又以見朝廷不忘逺之仁母替厥初嗣有褒寵宫人王安安轉郡夫人敕朕謹乃儉徳固無漁色之私選于後宫亦若審官之遴宫人某稟資婉嫕祗事靜專被樛木之恩蚤預内廷之御承小星之惠躐升名郡之封其益習于壼彝庶克綏于寵數直龍圖閣知贛州楊萬里秘閣修撰提舉隆興府玉龍萬壽宮敕具官某朝廷之於賢者用而盡其才上也用未盡其才而勇退寵其歸而全其髙次也上焉者朕之本心次焉者非得已也爾以清節雅道冠冕一時髙文大篇追配古作出入中外聞望日休計臺丏歸俾守章貢古郡臥治庶以優賢抗章自列欲留不可畀眞祠之佚升論撰之華詩不云乎雖無老成人尚有典刑朕不汝㤀也袐書丞陳損之淮東提舉敕具官某常平使者之任重矣淮東鹽筴甲天下視他路尤重貨泉所聚出入萬計調度低昂在一路部使者事又重焉爾起西蜀慨然有志于當世通練闓敏遇事風生周旋清塗久攝宰掾彌綸省闥備著賢勞視其官可以知其才矣頃護使客往來淮堧歸論利病如示諸掌兹因求外選而用汝勉哉思所以稱任使之意起居舍人陳傅良經進壽皇聖政轉一官敕具官某朕惟壽皇在御務行聖人之政二十有八年傳祚菲躬懼弗克堪既以申飭史臣謹以事繋日之書又掇其大端可以為法于萬世者别為一經追儷二典真我家之盛事也爾以一代名儒晩登郎省親擢道山付史史事奏篇來上奉之慈極從容進讀冠珮儼然兹焉論賞盍先於衆命増一秩以示儒者之榮尚惟欽哉浙東提舉陳杞本路提刑淮東提舉衛經浙東提舉敕具官某等浙東部刺史萃于會稽宻邇行都視他部為重杞以辦治之才為常平使者就畀臬事任益髙矣涇以倫魁之彦領淮甸鹽筴改授簜節地益近矣其各揚乃職使刑罰無寃公私兼足以副朕掄選之意武翼郎左翼軍統制韓俊供職滿十年轉一官修武郎馬軍行司選鋒軍統制李郁同敕其官某爾出自禁旅護戎泉南李郁改陪都既厯十年内外靖謐雖功名無事以自見賢勞著矣俾循故實序進兩階益習韜鈐以俟選用參知政事胡晉臣知樞宻院事敕朕纂承丕緒圖任舊人一日二日萬㡬之䌓勤于裨贊三軍五兵之本兹益厚于倚毗乃播綸言式彰枋用具官某氣全剛大識造精微以端靖結慈皇之知以忠純為初政之輔同心同徳人孰知房杜之功嘉謀嘉猷日惟陳堯舜之道居宜鎮于雅俗動有助于沈機察其所安任以不貳矧一登于政地凡三入于樞廷諒憲度之愈明畀事權而增重噫予欲務孝宣之周宻以起治功爾其慕子房之從容用符眷意顧惟宿望奚俟多辭同知樞宻院事陳騤參知政事敕贊本兵于右府方藉壯猷圖共政于邇聨尤資宿望我有明命告于具寮具官某學探聖源才周世務立朝謇諤素為君子之儒處事精詳居有大臣之體升之常伯擢在機廷陳告后之謀猷簡而甚切贊基命之宥宻靜以無譁雅量鎮浮不改其度正身率下敢干以私曾不俟于期年俾進陪于大政國以永賴人無異詞噫謨明弼諧朕有望股肱之助任重道逺爾其推腹心之忠永孚于休以副所屬吏部尚書趙汝愚同知樞宻院事敇西漢以同姓疏封不在公卿之位東平以至親輔政厥山聲望之隆惟我本朝尤厚皇族始則優加祿爵曾弗仕于外廷後雖竝用親賢亦無踰于法從兹開宥府葢得宗英具官某𣲖出天潢望髙國器早隨寒雋首冠于儒科出任藩宣久臨于蜀郡侍經帝幄選士貢闈皆故事之所無在爾身而兼備爰以樞機之寄托之肺腑之親必有若人乃堪大任匪固私于異渥将深慰于公言噫開國以來未有今日非常之舉本兵至重當展平生有用之才以增磐石之光以壯維城之勢刑部郎中沈樞度支郎中敕具官某爾生長相門明習文法為郎憲部恪守三尺司度之職凡軍國之用會其入出以周知經費之數欲得清謹之士為之故以爾遷焉勿以郎潛為淹思所以稱其職者太府寺丞沈作賓刑部郎官敕具官某郎官必由宰郡而除憲部惟以明法而授行之舊矣爾出名閥通習憲章久厯廷尉之屬宐在兹選向守丹丘曾不煖席而去郡之曰遮道借留其必有以得此者再入修門養資外府而後遷焉朕之用爾審矣惟盡乃心以稱斯舉右司員外郎應孟明左司吏部員外郎徐誼右司敕具官某等宰掾非他官比也調䕶闗決皆天下事非有才識可以為守常應變之助者疇克為之爾孟明介然有守練達民事爾誼能為可用通貫治體一以序遷一以選授朕方委政于二三大臣惟爾分任其勞使大臣得以綱紀庶務助朕求賢以起治功豈小補之哉度支員外郎王厚之直袐閣兩浙路轉運判官敕具官某朕惟轉運之任莫重于畿内祗承慈訓率用士人比年以來多稱其職爾庠椊諸生故家人物好古博雅風裁素髙克勤小物而知大體領使淮西聲望籍甚為郎名曹侃然有守還畀道山之直兼按浙河之閒飛挽以時而用不乏調度有經而民不病表率諸道尚其勉哉監都進奏院朱致民大理司直敕具官某詩云彼其之子邦之司直國家明謹用刑遂以名李官之屬近復定制審閱奏當尤不可以輕授也爾以儒學自奮而宰邑丞郡循良有稱入班于朝靖共爾位選以命汝往哉惟欽司農寺丞彭龜年袐書郎敕具官某朝列多士皆以賢選雖不以日月為功要必使宿其業爾丞大農屬耳兹又命典中袐書朕不以為煩人亦無得而言以爾之才望有以當此也道山羣玉之府涵養天下英才異時臺閣髙選于此乎取何止讀未見之書而已哉中書門下省檢正楊經太府卿四川總領湖北轉運副使張抑太府少卿湖廣總領敕具官某等國家東巡呉會宿兵楚蜀示天下以形勢給餉之任必選王人居之爾經奮身西南老成詳練樞屬宰掾裨助為多問以蜀事了辯如響是用使爾于蜀爾抑起自故家見聞殫洽屢持使節所至可紀荆湖風土尤所諳厯是用使爾于楚寵以外府長貳之任将命以行爾二人皆儒士其有以適緩急之宜無乏興無病民使上下百城不擾而兼足相安而有恃則朕之顧憂可寛矣新知湖州木待問改知婺州敕具官某浙河以西呉興為輔藩浙河以東婺女為名郡視邦選侯委任惟均爾少為舉首聲振東南從吾春宫徧厯寮寀今投閒之既久命起家而作牧引嫌自列易地為宜是行也非惟不使汝逺去畿甸苟盡心焉課最易聞公論自此而定則朕之眷汝人無閒言矣宣教郎史彌廓係秀王孫女夫轉一官敕具官某爾以師臣之子娶秀邸之孫不習貴驕能勉家學推恩爾室遂進以官往其欽承益務修進朝奉郎給事中黄裳朝散大夫權工部倚郎謝深甫磨勘轉官敕嚴吏銓之課所以示百寮之公優法從之聨猶不㤀三載之攷具官某再登朝著亟上禁途朱邸横經久藉講磨之益瑣闈批敕尤髙論駮之風謝深甫云翺翔朝著宻勿禁途三輔政清久資于彈壓貳卿任重允賴於論思兹以年勞應於治典爰陟文階之等寖陞官簿之華其服恩榮尚殫猷告張允中該修玉牒循從事郎敕具官某慈皇寶牒之成一代之鉅典也爾為胥吏預有勤勞既登仕版並進二階知秀州趙充夫改知湖州敕具官某爾守臨汀政最徹聞擢之嘉興尤號辦治理財則不擾而集御吏則不惡而嚴民甚安之湖在近輔最劇就以畀汝近嵗皇族人才輩出爾宜在政事之科益勉所長為諸郡率朕將有以表異之太學正顔棫知常州無錫縣呉獵潭州教授項安世召試竝除袐書省正字敕具官某等國家開館閣以待天下士若必循次而進非所以示招延之廣也博採公言取以數路爾棫由舍法官學省爾獵方宰壯縣爾安世客授湖南一聞其賢俱命給札前此殆未有也指陳時務蔚然可稱登之册府遂列英躔豈惟養有用之才抑以為多士之勸庶㡬巖穴之彦亦将樂從吾㳺焉戸部員外郎趙謐陞郎中敕具官某近嵗郎選日重非外庸之著不在此選非資厯之深猶置員外爾以名臣之孫更踐蘭省積其吏攷就正厥名官簿寖髙益思加勉蘇大任太學正敕具官某眉山蘇氏文獻相望爾雅派别以學自奮朕覽薦牘召寘學館得天下英才而教育之何樂如此益勤教事勉繼前良趙不邌知西外宗正事敕具官某國家宗支日盛散處郡國而温陵長樂猶循南西二京之舊各有司存以爾行尊而性淑奮由儒科練達政事往其主盟糾合吾族撫摩孤弱而使之得所教㢡孝秀以率其不良振振麟趾之風庶有望焉江東提舉黄黼户部郎中主管右曹敕具官某聚天下賢士列之朝行必更外庸而後收用非惟欲重郎選亦以詳試人才亨途由是而薦之焉輕畀也以爾馳聲膠庠資敏而練世故使行江右行部刺史之體召對便朝嘉其忠藎户曹動闗民事號為劇煩往既乃心以副選擢之意煥章閣學士知襄陽府張枃徽猷閣學士知建康府敇慿熊軾于上游久資填撫之略畀麟符于重地尤藉保釐之方是為留籥之司增峻寳儲之職具官某性資闓敏智識縱横樂父兄之賢源流有自登侍從之選敭厯已深遇事敢言詞鋒甚厲臨機輒斷才刃有餘輟自文昌出當方面果肅清于邉徼務宣暢于王靈矧是秣陵實雄江左石城鍾阜六朝之風績猶存大纛髙牙先正之威名未逺俾居連帥益振家聲想具有于成謨顧何煩于多訓顯謨閣待制知江寧府章森煥章閣直學士知興元府敕荆楚奥區無若江陵之重巴蜀外蔽實賴漢川之雄我有侍臣更此名鎮峻増延閣之職用寵元戎之行具官某稟氣冲和受材宏達早被知于慈扆亟登任于禁途司留籥于陪都既騰善最建髙牙于南郡名殿上㳺眷炎劉始封之邦為元徳必爭之地帝此稱蜀漢昭烈之字宋時避廟諱故改作元雲屯萬竈虎視三秦誦武侯出師之章諒其素志審漢将登壇之䇿勉乃壯圖毋有遐心往祇成命王藺知江陵府敕運魁柄于西樞嘗贊幄中之畫開帥藩于南紀兹分閫外之權惟任舊人式孚羣聽具官某器資鯁挺智識開通世傳許國之忠躬負濟時之略明目張膽在朝廷無事不言聚精會神故君臣不膠而固輔予初政正位本兵機謀足以折千里之衝文武足以為萬邦之憲退安祠館寖閲嵗華蜀道登天之難曲從私請荆州用武之要勉為朕行諒無俟駕之淹倚聞洗印之報噫比周家之分陜允屬宗工據天塹之上㳺是為重鎮尚體規恢之志豈惟填附之圖知興元府宇文价知襄陽府敕唐制以山南分東西二道西則漢中為巴蜀之捍蔽東則襄陽為荆郢之北門以是俱號重鎮而控扼之要于今尤切謀帥其可輕乎具官某以學奮身世有名徳壽皇眷知擢寘華近遂居文昌八座之選出鎮漢中于今五年撫安軍民帖帖無事襄陽易地委任惟均方時小康邉鄙不聳輕裘緩帶折衝樽俎以追羊祜之遺風不亦善乎錢象祖吏部員外郎敕具官某吏部之司七而右選最為劇曹涉筆終朝猶恐不逮非夫精敏詳練之士不足以察吏奸而澄弊源也爾明習吏事飾以儒雅分符持節民庸茂焉為郎未㡬銜恤而歸不俟造朝亟加選用靜以制動要以御詳汝知之矣尚其勉哉將作監主簿李大異司農寺丞軍器監主簿曾三聘太府寺丞敕具官某等大農外府分領食貨之重各設之丞以贊其長非才不授也爾大異强記洽聞處事有條爾三聘篤學厲操持論不苟簿正兩監退然安之竝進厥官各任以事以才自見今其時矣秦焴知嚴州敕具官某爾生長大家少而穎悟力學進徳譽者交口古括之政無愧循良嚴陵為髙宗潛藩宻邇行闕選而用汝詳試其才益撫吾民以稱朕意呉宗旦知舒州敕具官某龍舒在淮右為名郡士大夫以剖符為樂而朝廷必選才而後授之爾以學自奮明練憲章法家者流自以為不及也律身範俗清裁可紀家食寖久精力未愆往居專城綏靖淮服列卿之舊朕豈汝㤀榷貨務監官修武郎陳仲堅董淵孫侁收趂增羨各轉一官敕具官某等摘山鬻海之利𣙜之以佐用度其數實廣爾等協心奉法嵗有贏貲何愛一官以勸來者新江西運副錢端忠改江東運副敕具官某爾以王人給餉江淮才諝著稱俾之將漕需次已久持節有行小疾來諗尤見㢘靖為爾易地以遂其私輔養精神庸俟器使幹辦審計司劉三傑將作監主簿王恬軍器監主簿敕具官某等爾等在太學為名流試劇邑為良吏以薦入朝嵗月當遷分命以勾稽之職而處三傑于大匠恬于戎監職清而務簡益養賢望以俟甄拔江西路轉運判官林湜吏部郎官敕具官某尚書郎為當今妙選朝行雖有名士必更外庸而後授之爾嘗峩豸冠凜有風采按刑浙東將漕江右久攝帥閫所至有稱賜環而歸敷奏詳雅資望高矣然猶處之小選所以重銓綜之任也其究乃心以贊而長攻媿集卷三十五欽定四庫全書攻媿集巻三十六宋樓鑰撰外制國子司業彭椿年除祭酒敕具官某祭酒尊者之稱也荀卿任齊最為老師蓋三為之後世遂以名冑監之長非夫儒先哲艾德齒俱尊者豈輕畀哉爾蚤以文行表于諸生歴官朝行好禮不變擢居小司成士論久已厭服為國學師無以易汝往哉惟不言而躬行使人益觀感于規矩之餘則首善之風振矣樞密院檢詳李祥國子司業敕具官某成均教事師道貴尊近歲雖長貳不並除而為士擇師不應以此為拘也爾馳譽膠庠見謂前輩文學行誼久服衆心諒直簡嚴不移素守郎潛以來藹有師儒之望兹庸命以少司成之職追還古風變而至道于以副朕作成之意尚勉之哉左司諫胡瑑司農少卿敕具官某朕之用人謹守成憲惟爾之用獨異他人始以編摩見于便朝奏對詳雅朕心嚮焉擢典中秘遂居六察居無幾何徑登諌垣期月之間屢獻忠讜引嫌自列執義不囘俾貳大農豈朕初志往祗乃事庸俟甄升同知樞密院事趙汝愚初除封贈曾祖東頭供奉官士慮贈太子少保敕國家親睦九族本支蕃衍侯王使相寵禄相望然雖在近屬無子孫贈典之文惟爾孫曽進秉事樞追榮之恩上及三世有宋以來實自汝始豈不榮哉具官某胄出熙陵慶綿漢邸生長承平之日涵濡信厚之風不顯其躬以燾于後本兵之任我得宗英推迹本原寵之宫保蜜章之渥賁爾九京曽祖母龔氏贈高平郡夫人敕士大夫遭時遇主致身兩地必有慶源之自仍多内助之先矧在吾宗可無異渥具封某婉嫕之質幽閒之度克相夫子寖大其家孫又生子起為公輔既錫曽門之寵併推婦爵之崇惟沁水之名邦實河東之沃壤以示廟祧之寵以増屬籍之光祖贈秉義郎不求太子少傅敕唐之宗室大用者九人而李適之為稱首追榮乃祖襃冊典物焜照都邑行道咨嘆著于史牒今爾之寵視古過之具官某禀資甚賢為善知樂雖事功不見于世而隠行實侔于天是生聞孫首致樞近既嘗逮事當揆所元用推黄壤之恩爰授青宫之傅三錫之命尚其未央祖母太孺人晁氏贈咸寧郡夫人敕惟晁氏世有名士在濟北號稱華宗女教既嚴壼彞可紀矧來歸于天族乃深篤于義方宜有後人克顯先世具封某結縭之訓蓋自家傳采蘋之儀實遵禮度相夫以道躬德曜齊眉之勤有子甚仁兼仲由負米之養三遷之教燕及元孫時元孫之元宋避廟諱所改一命之榮胙之大郡是為陽報尚服殊恩父贈大中大夫善應太子少師敕躬行之實莫著于隠微天報之昭殆同于影響苟能用一日之力何必活千人而興惟深仁厚誼有以過絶于人則隂功隠德終當暴白于世具官某生長富貴遭罹險艱菽水僅充而事親有卧氷躍鯉之孝伏臘未給而於人有解衣推食之仁片言可質于神明一飯不忘于君父教忠之訓既著生前篤行之名遂彰身後朕方命爾元子貳吾西樞察其許國之忠想見過庭之學寵之師範冠彼儲僚豈惟禰廟之是崇抑亦宗盟之未有尚其英爽式謹歆承母淑人李氏贈安化郡夫人敕朕顯登樞筦既以崇趙氏之祧加賁幽原其可忘孟母之訓具封某生自名閥歸于賢宗秉志靜專與少文而協趣處家約素為彭澤以忘貧一門相勉以孝慈奕世俱傳于清白是有賢子為予輔臣爰開順化之封用示追榮之寵毋重杯棬之感庶寛霜露之思妻淑人徐氏贈鄱陽郡夫人敕朕竝用親賢延登宥密雖曰家傳之懿如麟趾仁厚之風亦惟閫助之良有雞鳴警戒之道宜與偕老胡不永年用加寵榮以賁冥漠具封某天資柔淑婦德慈祥冊府道山才及見夫子英游之際副笄翟茀傷不逮小君命服之榮獨惟南渡以來久寓楚東之近始封此郡尚慰爾靈知䕫州趙鞏江西路轉運判官敕具官某爾起書生有志當世頃由名曹出鎮淮右孳孳邊備論奏相踵易帥䕫子民夷帖服事有當辯不已于言可謂首公忘私者矣大江之西漕事為重引以漸近朕意可知順流而歸祗率厥職江西提刑劉光祖知䕫州敕具官某䕫子之國介于楚蜀之間山川險固民夷雜糅謀帥之重心惟通才爾正色立朝號稱敢言出擁使軺威望日聳既授以江右之節矣尚兹家食非以優賢分閫之寄易以命汝亟其洗印以安逺民知昭州莊方知瓊州敕具官某瓊管以四州之壤屹立海中實與番禺相為引重大艑獻琛賴以為歸麾符不輕畀也爾進由儒科練達吏事貳郡濱水承流昭潭必能習知南海之俗往其輯寧蠻蜑勞撫賈胡以稱朕選侯之意軍器少監章穎左司諌敕具官某古者箴規之求下逮工瞽矧位于朝孰不進言以諌名官視古已狹選用之際其可不嚴爾蚤以掄魁寖登華序清標直節照映周行約史東觀横經朱邸端靖無華物自宗之擢居諌垣允協時望山甫補衮職之闕孟子格君心之非尚惟勉旃以伸素藴將作少監黄艾右正言敕具官某諌省設官備矣大夫而下幾于古諍臣之目比方並建遺補俱以引嫌而去妙選時彦乃今得之爾抱負不凢學為有用言簡氣勁宜備諌列輟自王邸命以拾遺爾其振厲風采别白是非引經据古以佐朕之不逮將虛已以聽焉資正殿學士正奉大夫蕭燧轉一官致仕敕朕睠言故老方深仄席之思遽覽封章乃有垂車之請勉從所志殊咈予懷具官某洪毅而裕和洪洪毅之宋時避廟諱所改閎深而肅括擢儒科于紹興之際登朝蹟于乾道之初自結主知蓋正人無待于助久司言責使天下想聞其風遍儀論思獻納之班遂參輔贊彌縫之用粤從去國亦既累年卧疾清漳興鄴下文人之詠掛冠神武慕山中宰相之高爰序進于崇階以曲全夫晩節噫漢疏知止既永謝于軒裳蕭傅素剛尚勉親于藥石蕭燧贈金紫光禄大夫敕舊弼退休方徇辭榮之懇奏函踵至驚聞垂絶之言撫往事以慨然愴吉人之已矣具官某名高一代仕歴三朝官以諫為名真得諍臣之體后非賢罔乂俾參鬷嘏之尊雖為故里之歸尚佇壯猷之告云何屬疾亟願乞身載覽遺章尚想伏蒲之氣優加卹典以彰告第之恩庸寄予悲務昌厥後噫求馬周儀形之見遂隔九京歌晉公柱石之衰重増一涕知建康府余端禮吏部尚書敕朝列選曹妙簡持衡之任位登常伯尤高荷槖之班兹得名臣式符時望具官某稟資洪毅履行精純慈扆結知蚤預甘泉之侍儲闈列屬久陪少海之游頃出鎮于雄藩實典司于畱籥既聞報政亟命還朝矧惟十載以來屢歴三銓之劇士論夙推于平允吏行素憚其嚴明乃于晝接之餘寵以天官之舊老成復進豈惟躬簿書期㑹之繁忠蹇自將正有賴朝夕論思之益其祗成渙用副虛懷湖北提舉張孝曽䕫路提刑敇具官某䕫子一道視四川為差近而山川深險雜以夷蠻民物凋陋困于征取典刑之使選用不輕爾出自名家敏于吏事持節湖外斂散以時往按蜀門布宣德意使深山窮谷舉無冤民則庶乎得職矣右正言何異湖南運判敇具官某朕監觀四方志不忘逺寄耳目于部使者猶恐不逮故間遣諫官御史以臨之爾自登朝行雅有清望頃因奏對擢居憲臺升之諍臣之列方有賴于規益引嫌求外授節湖湘典司將輸光華煜然夫以峩廌伏蒲之風抗攬轡登車之志揚清激濁在此行矣有猷以告毋有遐心四川制置使京鏜權刑部尚書敕朕體列聖寛仁之訓務謹刑章求一時忠厚之臣俾居司寇久虛此位今得其人具官某器度恢洪才猷挺特蚤結慈宸之眷亟登要路之津修聘殊鄰壯蘇武持旄之節開藩全蜀慨王尊叱馭之行百城咸服其恩威四載備聞于勞烈爰示賜環之寵俾陞聽履之班錫以贊書付之臬事罔兼庶獄朕方推文王敬忌之心明用五刑爾其慕臯陶邁種之徳尚殫辰吿以副予知秘閣修撰知紹興府趙不流職事修舉除集英殿修撰敕懷會稽之章久煩填撫報齊邦之政可後襃嘉具官某分派天潢服休仕路頃由淮甸來任飛芻輓粟之司旋尹京都遂登簪筆持槖之選起臨輔郡就擢帥垣迨茲期年知職務之時舉去此一水亦舉言之日聞乃諭柄臣俾陞寓職以璽書示勉勵之意母曰彞章使田里亡愁嘆之心尚圗來效梁季珌知光州敕具官某爾父在紹興間以才敏致位文昌其後未有至二千石者爾守上饒政務簡靜銜恤而去未究職業浮光易治地則被邊舉以命汝委寄為重尚其勉之母忝前人李沐吏部郎官敕具官某爾以舊學大臣之子自奮巍科寖登膴仕出使閩浙有志于民為養求歸嘉其靖退晉接之頃處以名曹親庭無信宿之遙選部乃攝承之舊往祇厥職無復固辭新知興元府章森改知瀘州敕開藩蜀部曾洗印之未聞易鎮邊陲又改轅而于邁惟首公之有素諒承命而遂行具官某知略該通才猷挺特進儀禁路入陪豹尾之嚴擢殿留都出擁麟符之重由上流之奏課畀西道以折衝十年而守漢中田叔固宜于久任五月而渡瀘水武侯豈憚于遐征矧羣情安集之初藉元帥撫綏之力推君子之心置小人之腹能坦然而不疑脱慈母之懐立嚴師之傍當翕爾而自定亟祗成渙用寛顧憂知福州鄭僑知建康府敕開帥藩于閩嶠曾未彌年司留籥于秦淮兹焉易鎮渴想儀形之見亟令郵置之傳具官某執徳不回秉心無競論議逺追于晁董文章高軋于漢周正色立朝尤推批勑之手至公典選允藉持衡之權皂葢頒春出臨千里錦衣行晝就撫三山欲改畀于麟符仍從馳于驛騎朝受命夕引道諒無憚于暑行退補過進盡忠正有資于辰告入奉受釐之對徐為分閫之行惟我舊臣服茲休命廣東提刑李信甫江東提刑敕具官某爾為御史直道而行出守信安旋使南嶠皆有聲績可紀矧錄囚于嶺海煙瘴之地不憚深逺勞亦甚矣抗章求閒未應捨汝其典泉事于大江之東少休馳驅而後攬轡以行亦惟休哉太府卿辛弃疾集英殿修撰知福州敕具官某七閩奥區三山為一都會地大物阜甲于東南負山並海綿亘數千里舉聽命于大府連帥之選豈云易哉爾以軼羣之才蚤著事功夀皇三畀大藩寵以論譔之華于今幾二十年召對便朝擢長外府益平豪爽之氣而見温粹之容朕心嘉焉比居外臺讞議從厚閩人户知之陞之集賢増重閫寄徃其為朕布宣徳意撫吾赤子以寛一面之顧憂朕豈汝忘哉著作郎黄由軍器少監敕具官某著庭之選最為清高矧爾以掄魁之英謇諤之氣周旋三館于兹有年經上要津無不可者然朝廷序進人物不厭于詳薦紳綿歴事任不以遲速計也進貳戎監仍攝劇曹益養資望以俟器使司農卿沈揆權吏部侍郎敕古有六官孰若天官之重部分四選無如武選之繁兹擇貳卿宜求吉士具官某高文贍麗古學精深自登周行雅有清望凡一時華要之選以累載周旋其間壁水道山為諸儒之領袖儲寮詞掖振六藝之英華屢垂上于禁途復優聞于郡課蔽自朕志召長大農寵之荷槖之聯畀以典銓之寄惟公可以守成憲惟明可以察衆欺倚聞稱職之名用助官人之道新知襄陽府宇文价改知遂寧府敕朕惟今日謀帥之難深以數易為戒卿有大邦遺愛之舊無嫌改命之繁具官某學有家傳才為世用奮身西蜀膺慈皇特逹之知累嵗中朝歴儒者清華之選佩印屢更于劔外分符最久于漢中峴首名藩方尋羊叔子之迹遂寧舊治更喜郭細侯之來諒去思之未忘宜外庸之益著往祖成渙嗣有寵光知遂寧府單夔知建寧府敕逺臨蜀部念頻年跋履之勞易鎮閩邦示鄉國旋歸之寵具官某受才通敏蒞政精明繇廷尉之年蚤被慈宸之眷擢侍臣之列最居羣彦之先祠庭寖閲于十年帥閫雄開乎三峽旋更㑹府罙著外庸仍次對之舊班畀建安之新組山川伊邇諒少慰乎遐心民社匪輕方有資于善政惟時舊徳服我茂恩張孝伯司農寺主簿敕具官某爾以學自奮吏治有聞三入朝行閲嵗滋久凡爾等夷騰上多矣退然靖共物論歸之兹以序遷勾稽農扈尚共乃事以就器業知廣徳軍林孝友大理寺丞敕具官某列寺皆有丞惟廷尉之屬其選為尤重必求通儒以治庶獄已試之效吾其捨諸爾頃居是官見謂稱職出守桐川又以最聞兹還舊班進用無壅惟明克允以副朕好生之意中奉大夫知襄陽府張枃大中大夫知建寧府陳居仁磨勘轉官敕夙嚴銓法所以示百僚之公優待從臣猶不忘三載之攷具官某神機敏悟器度閎深禁路升華久聽星辰之履帥藩因任葢得江漢之心陳居仁云性資夷曠學問淹該西掖代言雅得深醇之體南邦共理尤明寛猛之宜兹以年勞應于治典爰陟文階之等益增侯服之光思稱恩勞尚殫猷吿中奉大夫吏部侍郎沈揆磨勘轉官敕制禄以官式序百僚之進在法當從乃登四品之崇具官某儒學老成文華高勝儲寀有執經之舊祠臣推為誥之工屢結綬于朝行幾問津于禁路攝承民部更一紀而有餘積累年勞雖九遷而未艾茲擢天官之貳始伸銓格之優太中不易公卿庸表褒遷之渥大夫既掌論議益思獻納之忠新除兵部侍郎黄裳顯謨閣待制依舊嘉王府翊善敕朕惟國朝謹教子之法王府建翊善之官在太宗務選正人惟姚坦最稱直士自時厥後何代無賢我有論思之臣俾專輔導之任具官某以天下士從吾兒游自典秘書已參講席雖寖歴瑣闈之貴曾不離朱邸之僚誦典謨百篇之書既得坦明之制正春秋一王之法尤多深切之言力辭武部貳卿之除俾就文謨次對之秩于以究遺經之終始于以示朕意之眷留尚服訓詞益殫猷吿成忠郎邕州横山寨招馬官黄世明轉兩官敕具官某戎馬之須多自南徼爾招誘盡力累賞日厚併陞二秩以旌其勞敇賜進士及第陳亮承事郎簽書建康軍節度判官㕔公事敕具官某三嵗大比人徒知為布衣進身之途藝祖皇帝有言曰國家設科取士本欲求賢以共治天下大哉王言朕所當取法也廷䇿者再乃始得汝爾蚤以文藝首賢能之書旋以論奏勤慈扆之聽親閲大對嘉其淵源擢寘舉首殆留以遺朕也尚循故事往佐帥幕益懋逺業以須登用集英殿修撰耿秉權兵部侍郎敕長才被選嘗擢侍從之聮末疾自言閔勞官職之事丏閒寖久簡記不忘既加晝接之餘復畀夏官之貳具官某稟資端亮厲操堅剛篤志愛民雖細故必加逺慮推誠致主無一事不以上聞屢布藩條率騰善最甫登禁路俄領外祠乃俾賜環再趨文石之陛亟令持槖徑歸武部之班益勵壯猶以答隆眷皇叔祖少保士峴贈少師敕屬近行尊富貴既無危溢年髙徳邵死生宐備哀榮􅾜官某迪徳忱恂處心夷曠分暉帝籍雖坐致于顯融席慶王門曾不形夫驕吝磊砢維城之望雍容鳴玉之班奉香火于内祠允謂三朝之舊建節旄於輔郡更居亞保之尊胡不百年困于一病驚奉章之上達愴遺老之㡬何輟九陛之視朝冠三孤而錫命噫髙爵厚祿既已見于生前䘏典優恩顧何㤀于身後尚惟英爽歆我寵靈武徳大夫鄂州都統制張詔軍政修舉轉一官敕具官某國家分屯重兵列戍江滸申飭將帥務嚴紀律爾居鄂渚實當上㳺緩帶輕裘如一儒生而氣稟山西沈鷙善斷軍政修整徹于朕聞何愛一官以示表勸益勵戎昭用圖爾功直袐閣京西運判朱晞顔直煥章閣知靜江府敕具官某桂林為嶺右都會控制最逺帥閫久虚掄擇尤遴惟爾儒雅醇明練達世故葢嘗為部使者矣當鹽筴蠱弊之後協心扶持民懐其惠輟京西飛輓之重還撫南方增堯章寓直之名用為爾寵内安甿俗外戢蠻蜑人心知向條教易孚予自以為得人爾其有以稱此哉廣西運判方崧卿京西運判提舉張釜廣西運判敕具官某等嶺右分百越之半漕計匪輕京西總三司之繁事權尤重爾崧卿儒雅飭吏廉按有稱是用易以襄漢之節爾父清白傳家斂散惟謹是用圖爾桂林之居道里略同委寄無異飛芻輓粟既資辦治之才攬轡登車益抗澄清之志爾惟自勉朕不汝㤀太常丞李謙浙東提舉敕具官某部使者任常平之寄一道之休戚繫焉朕固不以輕畀而况近㡬乎爾篤志于學力行其言弦歌之政見于已試憂國之心形乎辭色輟從朝行畀以使節旱澇之餘嵗事未知周爰咨詢先事而圖浙河以東汝其任是責哉知寧國府蔣繼周知太平州敕偃藩巨屏正資共理之良易鎮鄰邦允藉上流之重惟時宿望聽我訓辭具官某經術融明材猷挺特厯居言路凜乎中執法之威屢剖郡符翕爾東諸侯之最念千里相安之久為三年報政之期乃睠當途猶為重地民風純靜素稱道院于江東訟諜簡稀真是太平之官府更藩舊徳為撫黎民矧擊柝之相聞亟驅車而及境雙溪疊障難伸願借之私五馬一驄又得宦㳺之樂其因詳試遂訖外庸木待問知寧國府敕具官某朕念儲闈寮寀之舊㒺匪極一時之選既已延登四人為予宰輔其在外里居者亦未嘗㤀也爾事朕有素家食累年起為二千石以示舊恩相攸久之兹焉始定宛陵為江右名郡以壽皇潛藩地望尤崇爾其往為朕撫字吾民篤志賑䘏以銷愁恨歎息之心豈惟有以副選侯之意爾亦将由是而進焉成都提刑楊王休本路運判知閬州續耆成都路提刑敇具官某等朕臨御萬方寄耳目于部使者地愈逺則任愈重蜀道萬里成都奥區其選又可知矣爾王休移自潼川方祗臬事易以漕節就按本道爾耆自守閬風頗著能稱俾乘憲以表表列城使民之利病徹于朕聞而朕之徳意布于遐徼揚清激濁威愛兼舉則為稱職矣知常州陳謙湖北提舉敕具官某為常平而置使專以惠民選名士以乗軺示不㤀逺邇服勤儒術抗志事功頃居編摩已著才望甫試繁劇優有治聲往行重湖之區典司義廩之政貿遷鬻海之利務在通商綏靖摘山之徒無致生事佇觀成績嗣有寵章吏部員外郎雷潨直煥章閣知平江府敕具官某姑蘇古郡號稱呉門宻輔行都最為重鎮地大物阜訟訴實繁衣冠走集應酬不暇非寛博强敏之士其何以居師帥之任乎爾以辦劇之才飾以儒雅嘗以一邑之長膺千里之寄又以十連之帥撫五羊之民召對便朝郎潛選部念未足以究爾之能也視邦選侯為朕一行加以堯章之職用為臨遣之寵倚聞異政以稱所蒙章森依舊知興元府敕國家謀帥豈命令之可移臣子徇公亦東西而惟命閒因有為未免從宜具官某文有古風神無滯用以禁路論思之舊為藩方師帥之良建業留都允藉保釐之略江陵巨屏久煩填撫之威惟此興元控于蜀道念開藩之未及又易鎮以有行不如舊貫之仍毋庸新尹之吿漢中地重肯形雞肋之書南國教明當息鼠牙之訟尚圖茂渥以答顯庸呉總知瀘州敕禁路通班久遂燕閒之適藩方謀帥允資撫御之良方起家而臨民諒聞命而引道具官某胄出勲門而被服儒雅世傳戎韜而深涉藝文澤笏彯纓舊為儀于朝列擁麾持節屢宣力于坤維眷此瀘川控彼南徼民生繁阜當勞來安集之餘軍律申明嚴坐作進退之節正賴中和之正往宣寛大之書西平王之在唐固多賢子諸葛侯之仕漢自有美聲益振爾家用固吾圉知太平州葉翥知婺州敕聽履而上星辰緬懐舊徳把麾而去江海又著外庸錫以明綸處之輔郡具官某性寛而有制道廣而能周為天子之從臣最先衆俊主國家之大計殆過十年謀謨備罄于忠嘉仕已不形夫喜愠乃睠文昌之老俾臨寳婺之區姑熟最聞未及賜金之寵括蒼地近何殊衣繡之榮倚觀中和樂職之詩益表平易近民之政其祗隆眷嗣有優恩劉俁廣東提舉敕具官某朕嗣服之初首下寛大之諂俾部使者分察屬郡務寛民力爾守岳陽推誠奉行凡加賦橫歛之病吾民者悉加蠲除幾去嵗額之半薦章交上朕甚嘉之嶺海去朝廷逺畀爾一節專歛散之權推岳陽之意而行之遐陬其息肩乎攻媿集巻三十六欽定四庫全書攻媿集卷三十七宋樓鑰撰外制同知樞密院事趙汝愚知樞密院事敕朕延登樞臣方務親賢之並用擢專兵本豈以日月而為功式隆磐石之宗益聳維巖之望具官某仙源有自天分素高發之以埸屋之聲名博之以師友之問學論思禁路真有諍臣之風填撫藩方著古循吏之績望之堂堂折而不撓元齡孜孜知無不為卓爾士夫之間居然公輔之器頃為儲寀已知許國之忠兹貳機廷尢見愛君之篤俾陞右府之長密贊中宸之謀増衍真腴併昭異數噫三軍五兵之問雖未至于廟堂一日萬幾之繁正有資于帷幄朕方越拘攣而圖任爾其勉忠力以赴功惟既厥心同底于治吏部尚書余端禮同知樞密院事敕朝建幾廷實總事樞之要任專軍政尤資副貳之賢乃圖舊人用稱隆委具官某氣和而有守資介而能通蚤膺慈扆之知徧儀清貫爰列儲闈之屬久事初潛禔身有肅括之稱立朝奏正直之徳典銓衡于選部尤推鍳裁之公守管籥于留都允藉保釐之略召還位著益簡予充葢君臣相知非一日之積而文武並用何二柄之分屢登朝夕論思之班宜居夙夜宥密之地啓侯封之土宇畀采邑之圭腴噫運籌帷幄之中當逺追乎前躅折衝樽爼之上正有望于壯猶尚服寵光毋替朕命萬鍾司農卿敕具官某爾以才諝早為九卿去國久之擢冠宰掾仕已之際不見幾微召對便朝奏論詳雅是用命汝復長予周稷之任王城内外儲粟動以百萬計上下仰給事則浩繁往哉惟欽以稱朕意通議大夫知樞密院事胡晉臣致仕敕三年輔政是為股肱之良一旦乞身欲挂衣冠而去勉從爾請深軫予衷具官某迪徳粹和秉心正直尊賢容衆無一毫忌刻之私學道愛人備四時温厚之氣察其有守任以不疑典封駮于東臺贊樞機于西府進參翮嘏遂長本兵方朝竭節以相資乃以沈疴而有請任重道逺知許國之未量名遂功成奚退身之太早無君子者如蒼生何噫垂車而傳子孫顧莫囘于雅志就第而問籌䇿尚有冀于壯猶其服寵光以綏吉履胡晉臣贈金紫光禄大夫資政殿大學士敕抗章自列俯從納禄之言遺奏上聞猶篤愛君之義驚柄臣之已矣撫用事之愴然具官某天賦純誠世推厚徳仁必有勇立朝多謇諤之忠正而不它致主盡忠清之節自登近弼可謂大臣何抱疾之遽深願辭榮而勇退始猶未許遂不可為愛之欲其生謂何恙之不已死者如可作微斯人而誰歸加秘殿之隆名極文階之三品俾昌厥後均賜以官噫命方士而求馬周空軫如存之念輟餘𤓰而奠如䀲徒増追悼之懐顧一鑑之既亡嗟九京之何及尚惟英爽歆此寵靈潼川運判劉光祖奏儒林郎知資州龍水縣楊安益賑濟有方循一資敕具官某潼川去朝廷逺頃修荒政部使者察一道官吏之能否以龍水為最而聞於朝進爾選階以示襃表徐元徳知均州敕具官某均之為州雖逺以其控制洞蠻置武當之節使填撫一境任不輕矣爾蚤以經學教授鄉里旋以聲望登進朝行貳郡新安績用罙著剖符兹土以惠逺民往哉惟欽益行所學太常博士陳棅秘書丞著作佐郎李唐卿著作郎秘書郎范仲黼著作佐郎校書郎王奭秘書郎正字蔡幼學校書郎敕具官某等道山羣玉之府聚天下英俊其間所以涵養器業以為進用之儲也爾棅以容臺議禮之舊爾唐卿爾仲黼豋瀛既久爾奭爾㓜學給札著稱或于典丞郎之職或序進著作之庭校讎未見之書不改共二之故職優選遴孰邁于此其思稱崇奨之意以為邦家之光大學博士邵康太常博士曾秘國子博士太學録雷孝友國子正田澹並太學博士敕具官某等博士秦官掌通古今員多至數十人國朝稽古建官凡以博士名者皆清選也爾康學問該洽俾議禮于奉常爾秘資稟純篤俾典教于胄學爾孝友爾澹俱以上庠糾正之職陞教育之任一日而拔士以十數亦足以知朕好賢之意也其祗明命毋曰序遷費士寅耤田令敕具官某朕立賢無方視所為主苟得茂才多列于朝爾以西州之雋襃然為舉首薦口既重又當有以表異之往司帝耤實預容臺清華之選權輿于此惟務靖共以俟甄拔主管吏部架閣陳希㸃國子正湯璹國子録敕具官某士修于家而仕于朝又典膠庠之教事可謂榮矣爾希㸃蚤上甲科久為掌故爾璹首冠南宫未登華途嘉其靜退之風俾參樂育之選雅有聲望司予成規子率以身疇敢弗恪湖南提舉郭徳麟宗正少卿敕具官某宗正一星在帝座之東朝廷以屬籍為重設官以象之卿少之選亞于太常非他寺比也爾以諒直周密久司六察之職出持使節深簡予衷賜環來歸優寘少列豈徒為飬望之地將有以進汝焉皇叔祖贈少師士峴追封郡王敕冠三孤之位既頒䘏典之優疏千里之封更極真王之貴具官某分暉天𣲖擢秀宗支琚瑀珩璜允矣朝儀之肅櫜兜㦸纛居然將閫之禁雖平生坐致美官而終老不愆素履逮朕纂承之始方形親睦之風曾頒爵之未遑乃抱疴而自晦云何不淑遂止于斯噫搢笏垂紳愴典刑之安在分茅胙土尚冥漠之有知用慰爾靈益昌厥後士峴女三人並封縣子敕某人朕丕承慶基崇篤宗老凡今屬近行尊歴事三朝如爾父者幾人奄其告終遺奏來上粲然三女願賜湯沐朕何愛大邑之封不以慰爾父之意乎益懋壺彛以對隆渥同知樞密院事余端禮初除封贈曽祖慶太子少保敕士有致位廟堂而光顯于時其上世終身韋布而追榮於後惟源流必有所自而貴盛亦豈偶然具官某樂道丘園隱居閭里人無知者實有侔于天我自得之故無待于外比及三世乃生其樞朕方以儲閣舊學之臣擢居宥府基命之地首以宫保之亞用為曾月之光豈徒顯爾宗之祧抑以為善士之勸曽祖母徐氏齊安郡夫人敕朕延登儲寮進貳樞筦既已寵及上世又念伉儷之賢必有以相之者故加以小君之號焉具封某生太末之樞盛偃王之族嬪于良士託以終身諒閫範之可稱至曾孫而遂顯擇黃岡之佳郡開石窌之新封賁爾泉扄歆予渙渥祖鐸太子少傅敕君子之澤既被于後人朝廷之恩宜及于先世有徳必大可攷不誣具官某探六藝之遺言為一鄉之善士雖文學行誼不見于用而孝悌忠信能行于家再傳而興致身樞近推迹先祖之自欲亢余氏之宗青宫六傳舉以命汝尚惟不冺服兹寵靈祖母傅氏高平郡夫人敕儒者篤行不顯於世而能埀裕子孫則亦惟閨門能循法度以為之助追贈之寵殁宜共之具封某謹蘋蘩之儀佩圖史之訓克事君子相敬如賓是生賢孫為朕良佐以高都之名郡為湯沐之新邑惟爾靈其預享之父贈通邑大夫繪太子少師敕信安自趙抃以來仕登宰輔不過三數人我有本兵之賢固由自致跡夫義方之教當揆所元具官某秉心靜淵履行淳固分薛包之田而愛形于兄弟折馮驩之劵而義篤于鄉閭積善有餘固非一日之力延師不倦遂成令子之名周旋清班登進宥府蜜章加贈屢升法從之階禰廟益親獨簉宫師之選以示教忠之效以寛追逺之思母淑人虞氏咸寧郡夫人敕士之家傳固出父師之訓古有胎教實由母氏之賢仕既顯于朝廷寵宜加于泉壤具封某天資婉嫕婦徳靜專謹以事夫逺追舉案之美勤于教子不媿㫁機之言雖魚軒不見于生前而鸞誥屢頒乎身後兹錫義川之號葢由樞筦之恩慶則有餘澤其未艾妻淑人葉氏信安郡夫人敕大臣許國能有羔羊正直之風夫人起家必如鳲鳩均一之徳既資内助之力宜啓小君之稱具封某姆訓是遵壺彞甚飭相爾夫子不以事物嬰其心為時名卿得以亷白厲其操位登兩地之貴恩霑三世之先矧惟魚軒宜爾象服視樞臣而命爵就鄉郡以疏封益肥汝家庸稱予渥浙東提舉李謙乞將合轉朝奉郎一官囘授本生父珝贈承事郎敕具官某故本生父某朕方以孝治天下凡以親為請者多曲從之爾世有令徳躬履持操是生賢子而嗣其兄既以能顯其父母矣願捨外郎之一秩求贈本生之二親淳化淳熙況有故事是用寵爾以廷評之階詩不云孝子不匱永錫爾類爾子方為部刺史以此風厲郡邑其助吾風化多矣本生前母王氏本生母陳氏並贈孺人敕具官某故本生母某氏爾有賢子出繼伯父既顯其親又追惟本生之重願加贈典有司已援舊比且言員郎所係為重而其請于義可矜足以勸臣子榮親之孝朕曰俞哉並進湯沐之封以為泉壤之寵胡澄知光州趙彥珖知容州敕具官某等光山之在淮右今為保障之區容管之在廣西舊為經略之所選候而往寄任匪輕以爾澄起由名家嘗奏郡課爾彦珖秀出天族洊佐藩條往分顧憂當體朕意有政可紀無逺不聞勉哉四川總領楊經直寳文閣提舉四川茶馬敕具官某爾以宰椽之長往餉蜀門之師萬里馳驅之勞計當入境四川𣙜牧之寄尤在得人與其遴選于中朝孰若就煩于便道載頒英簜寓直寳圭摘山以惠逺人市駿以備戎事惟鄉閭之在望宜利病之詳聞往既乃心用掦厥職淮西提舉張同之奏修職郎安豐軍六安縣令陸子虡救活被水人一千四百餘人循一資敕具官某鼓鐘代鼛淮有三洲詩人所以興嘆也安豐之潦朕聞而念之部使者謂爾有字民之能乃得救災之術進爾一階又以少徇父老借留之意其亦寵矣益勉之哉朝奉大夫知叙州計孝似夷賊作過不能彈壓降一官敕具官某僰道被邊郡將實作控御之寄而威令不申夷獠侵侮驚擾邊氓害及徼吏久而後定是不于汝而誰責哉其上一秩尚思後圖朝散郎叙州通判李楰孫節制義軍驚動夷賊降一官放罷敕具官某逺夷匪茹侵我王略爾為别駕受帥檄而不進擁義軍以自尊致此猖獗而又貪功倖賞迹狀昭然削秩免官以示邊吏之戒尚為寛典其務省循諸王宫教授楊大灋國子監丞黃度並監察御史敕具官某等憲䑓設屬實分六察之司御史虚員當極一時之選孰堪此任今得其人以爾大灋以端恪之資而達于時宜爾度以深沈之量而敏于吏事舊臨劇縣俱著能聲嘗對便朝各陳讜論尚忠而用夏政既已先明詔之頒約史而作宋經亦已攷遺編之載並加親擢葢自簡知爾其助正紀綱振揚風采務求稱職之實毋負官人之能福建提刑盧彦徳本路運判敕具官某爾屢持使節為時老成暫居郎曹復按閩部祥刑之寄方藉平反將漕之司又煩調度不改山川之舊仍頒郡邑之條益靖吾民以稱朕指知郴州呉鎰湖南提舉勅具官某爾以冊府之英起當郡寄慈惠之政徹于朕聞夫士之務學固將見之用也始以宜章之最俾任一州繼以郴陽之能得亷一道矧是湖湘之逺方當旱潦之餘醝茗阜通雖攸司之甚重倉庾歛散尤荒政之宜先爾能宨心部刺史之職則朕之用汝等而上之庸止此耶曽集知嚴州敕具官某贛川之曾人物相望仕至二千石者前後以十數聲績茂焉爾習于家傳有志乎古試以舉寄有志乎民還奏便朝嘉其詳練惟嚴陵之輔郡實高廟之潛藩分以左符用撫吾民由小州得大州葢亦寵矣益勉厥職以大爾家沈維知房州敕具官某爾以相家子明習文法自致膴仕葢嘗久于廷評為丞為正又出為二千石矣中更閒退閲嵗滋深起爾于家俾分房陵之符戢吏愛民省刑節用治郡之大端也爾皆知之奚俟多訓知江州王師古廣東提刑知吉州胡長卿廣西提刑敕具官某等國家分道遣使以祥刑為重嶺海之逺尤遴于擇人爾師古奏潯陽之課爾長卿報盧陵之政俱以儒雅飾吏踐􅆒嵗久授之軺傳其必能為朕審用刑章平反庶獄使百城之民自以為不冤亦惟休哉吏部員外郎錢象祖陞郎中敕具官某爾自淳熙初元攝事列曹今二十年矣三易州麾一擁使節凡今郎吏出入省戸未有如爾之久者也茲以積攷始正其名資望俱高益稱詳練雖曰銓法尚服優恩新成都府司戸李僑乞將所得官資囘授父証贈迪功郎母廖氏贈孺人敕具官某士之發䇿決科以求仕也爾之子萬里造庭得官名都而求致其事以榮二親此非追逺報本不可解于心者能之乎朕甚嘉之曲從其請于以風厲四方使知慕焉新徽猷閣學士知建康府張枃依舊知襄陽府敇金陵為帝王之宅方藉保釐羊祜得江漢之心爰加因任具官某忠嘉傳世才智絶人兼言語政事之科何施不可更彈壓恵養之政易地皆然惟今襄陽在昔畿甸暢皇靈于遐徼控天塹于上游謀帥留都已畀玉麟之重還車舊鎮諒多竹馬之迎惟首公而忘私遂聞命而引道吏民如故不煩條教之載頒城郭重來但覺精明之頓改其祇茂渥以訖外庸左司應孟明中書門下省檢正右司徐誼左司員外郎敕具官某等宰掾之任重矣自爾二人為之實能謹守程度參稽事宜佐吾二三大臣以平章中書之務大臣亦言其能朕用嘉之以序而遷滋嚮于用益習天下之事以昌逺業尚勉之哉何澹煥章閣學士知泉州敕弄大夫之印方渴想夫嘉猷分刺史之符尚往臨于重鎮眷知有素中外惟均具官某名檀倫魁望髙風憲由辟水師儒之任厯騎省諍臣之班披腹而呈琅玕獨任臺綱之長把麾而去江海更觀吏治之優矧是泉山實雄閩嶠徒得君重勉為朕行煥乎文章示西清學士之寵凜然風采增南國諸候之嚴倚聞報政之期其體顧憂之意樞密院編修官吕棐太常丞敕具官某三丞號高選而容臺為最不惟禮樂是司凡朝廷有大議必咨焉是可以輕畀哉以爾奮自儒科又精吏事持論不苟亷直自將乆於編摩擢寘華列惟寅惟清往賛而長國子監主簿王源國子監丞敕具官某胃監以教養人才而金榖細務丞實司之爾父頃在從班有批勑之風能繼世科風烈未逺乆服勾稽之職就俾序遷資望寝髙尚思所以稱其家者監登聞鼓院李友直宗正寺主簿監都進奏院羅克開國子監主簿敇具官某等國家銓擇人才進各有敘勾稽之職在寺則司宗為清在監則胄庠為重以爾友直儒學老成舊傳夫素業爾克開士行修飭自奮于世科進官于朝雅有賢譽俱遷簿領實階華途罙務靖共以祗朕命潘景珪知湖州敕具官某吳興名邦今為輔郡地大而民阜賦重而訟繁視邦選候弗以輕畀爾練逹吏事明習憲章入從出藩踐敭舊矣起家為二千石顧豈擇地而後安移前日彈壓之威而為惠養之政尚優為之以稱朕意沈瀛知江州敕具官某大江之險分戍重兵潯水之陽號稱要地軍民錯處牧御須才爾奮迹膠庠馳聲場屋仕雖三已而無愠予豈一端而取人既輟新安之行復分共理之寄綏靖十同之衆撫安萬竈之屯此而有稱進則未艾承節郎叙州管界巡檢程仲乾因夷人作過被殺特贈兩官與一子進武校尉敕具官某爾為徼吏勇于捍寇而捐其軀謀雖不足過于逗撓自全者逺矣以二秩告第而官其子庸勸邊臣之用命者湖南提刑孫逢吉秘書少監敕具官某道山羣玉之府聚天下英才其間必又求才之傑然者領袖之遴選之久今得其人以爾禀資端方充之以學九流百氏之書該綜無遺良史之才諍臣之風爾實兼之頃由少司成出使湖湘刺舉惟公風采凜然是今日第一流人物也還為少蓬孰不曰宜來游來歌以副虚佇楚州奏忠訓郎添差副將魏昌教習效用弩手轉一官敕具官某爾以名將之子習于戎昭練兵山陽守將以告授之一秩以勵能者蔣藺邵公翰奚士遜邵衮並大理評事敕具官某等理官之屬惟廷評為甚勞獄成之告必躬必親非習于文法者不在茲選今又試以經術葢欲兼用儒者也爾等俱以場屋之舊明司空城旦之書而中其科虚位既久並舉而用各揚乃職使人知引經決獄之效焉太常少卿薛叔似秘書監敕具官某朕以冊府為重選才甚嚴信宿之間既得逢吉為之貳又俾叔似長之所謂朝取一人焉抜其尤暮取一人焉抜其尤士論翕然朕亦自樂于得賢也爾問學淵博論議明辯結知慈皇擢在諫省有古諍臣之風逺乗軺車歸貳容臺物望無不宗之既授以太史氏之職復使正此久虚之位表儀雋㳺儒者之至榮也雍容養望以俟甄擢司農少卿詹體仁太常少卿敕具官某奉常惟禮樂是司而去古寖逺放失尚多非得博物洽聞學有根據者未易輕畀也爾少明經術務為有用探賾索隠恥一物之不知總餉之久葢已由郎省而貳大農矣召對雍容效忠無隠其為朕典禮樂之事鐘鼓玉帛抑末也尚求其本而釐正之蔡戡司農少卿敇具官某爾起由名家以甲科自奮登用最蚤敭歴已多深沈之度㢘退之節朕知之舊矣比總軍儲嘗貳外府升之農扈備予九卿朕欲收拾人才共興治功覽爾奏篇又有得士之喜顧豈獨望以周稷之事然積貯天下之大命也方平糴以為備尚贊而長使事集而民不擾則予汝嘉新知泉州何澹兩易知明州敇起鎮泉山將趨于閩部易麾鄞水併護于瀛壖凜聞憲府之名增光制閫之寄具官某受材精敏履行粹和場屋文鳴蚤先衆俊朝廷徳選寖歴華途屬予纂紹之初賴爾論思之益擢居騎省端有古諍臣之風進長烏臺真得中執法之益遽收朝蹟再更嵗華洊畀郡符俾近畿甸地當一面海帀三陲蔽遮浙河之東控御島夷之外布宣徳意豈惟欲田里愁恨之銷敷暢王靈正欲藉文武威風之重倚聞成績嗣有殊襃知明州朱佺兩易知泉州敕具官某才有小大之異而選用當適其宜郡有逺近之殊而委寄之重則一爾詳練世故敭歴仕途鄮嶺分麾報政久矣温陵改鎮易地皆然此則控東夷之要衝彼則據南海之都會内修侯度外暢王靈諒無憚于脩途當復聞于善最司農少卿胡瑑湖北運判敕具官某朕臨御萬方寄耳目于部使者又間遣諫官御史為之俾遐陬之氓如在畿甸矧湖右實據上游而外臺當軍民錯處之地任顧不重哉爾外靜而内明言簡而氣勁一見而決亟寘諫垣雍容論奏多所裨益乃自引嫌遷貳大農丏外再三察其勇退茲用授爾以飛輓之寄為官擇人非以遂爾之私因事進規無忘愛君之意高文虎將作監丞敕具官某朕旁招俊乂布列周行徳進言揚如恐不及矧以太史氏之舊引疾家居十有四年昔病今愈予環可後乎爾博學篤志承伯父之傳網羅舊聞述史遷之緒採之公論僉曰汝賢再轉為丞尚居繕監職務清簡可以卒汗青之業毋以匠為嫌也汪粹軍器監丞敕具官某爾舊弼之子以才自見出臨邊郡綏靖有方奉最言歸論奏明辯丞于戎監孰不謂宜矧爾久在塞垣有志事功除戎器以戒不虞國之務也亦惟欽哉戸部侍郎趙彦逾工部尚書敕攷六典之書實重冬官之職總百工之事今惟起部之司乃得宗英俾居常伯具官某聯休天派擢秀儒科立志孤高萬鍾何加于我持身㢘潔一介不取諸人令名逺紹于閒平惠政徧加于楚蜀任國大計為予良臣朝夕論思有猷必告簿書期㑹惟正之供勤勞已著于巧咸寵數遂登于八座親賢並用朕方隆睦族之風技巧咸精爾尚敬若工之命攻媿集卷三十七欽定四庫全書攻媿集巻三十八宋樓鑰撰外制太府少卿兼知臨安府袁説友權戸部侍郎敕朕攬收人才思裕拜用足兵雖急要先足食之言大計是謀當求大度之士是為儒者之效孰曰民曹之難具官某文有英詞神無滯用蚤登館學嘗接武于華途旋歴麾符屢䇿勲于劇部居輦轂彈壓之任知里閭銖兩之姦前張後王聲望相繼東賈西萭豪猾自消疊膺晝接之榮擢寘地官之貳損上益下朕欲圖加賦之寛理財正辭爾尚明盍徹之意直祕閣兩浙運判王厚之直顯謨閣知臨安府敕具官某國家駐䠋呉㑹視古天府民日庶事日繁師帥之寄尤難其人以爾先世嘗為京尹治行超卓如漢章尊汝實是似故以命汝自其少時博雅篤學世味沖澹若將終身焉一行作吏所至辦治處之以榮觀而超然投之以劇繁而不亂是宜居此官者輟自漕臺加畀延閣用為爾寵唐人有言輦轂之下先彈壓郡邑之治本惠養此言殆未純也五方之民固為厖雜九縣之衆尤須撫字威惠交孚則為稱職且稱其家矣户部員外郎黄黼直祕閣兩浙運判敕具官某部使者之職重矣而畿漕視他路尤劇近歳率用儒者不惟職務整辦惠愛遂及于浙河之東西是不可改也以爾起由膠庠凝粹而開敏嘗使江東得斂散之宜澄按列城不苛不弛茲由郎省付以漕事寓直延閣以示寵嘉矧在鄉邦周知利病爾能罷行之下有月旦之評上有公朝之論當不日而徹聞矣勉哉李大卞知洋州敕具官某洋川在東蜀為望郡通儻谷駱谷之道據黄金戍之險賢牧風流相傳左符不以輕畀也以爾家世循良明習吏事雖安於閒退而閲歳已多勉為一行以副朕選用之意虛恨蠻酋首成忠郎袁弄滿三年轉一官敕具官某國家銓法文臣以四年武臣以五年乃得進秩三載攷績不以施諸庶僚也以爾慕義中華誓保西南塞下郡將有請升爾一階益貞乃心毋替于舊監建康府𣙜貨務武翼郎趙公遜修武郎丁昌時收趁增羡各轉一官敕具官某等摘山鬻海之利𣙜之以佐軍需其數實繁爾仕陪都歳課登衍何愛一秩以勸後來周珌大理寺丞敕具官某李官之屬率以文法進求其持身無玷缺以儒術飾吏事者尤難其人爾起名家乆于棘寺嘗為丞為正矣試郡有稱奉最來歸最奉一本作奏與前卷奉言歸論奏明辦互證當作奉再轉為丞復典臬事雖若小迂而榮途自此無壅矣隨龍御前忠佐馬步軍都軍頭陸安轉遙郡刺史敕具官某郎選在今為甚重雖朝列名流必著外庸而三尺則有司執法以裁正既進六資則朕之寵命復行上下俱為得體而爾受之亦宜往刺一州益務中恪浙西提刑葉適吏部員外郎敕具官某郎選在今為甚重雖朝列名流必著外庸而後授今得人物之英為之則又增重矣爾博極羣書洞視千古文章之發追配作者頃由冊府試以郡寄臨事知變就畀使節以寵之天官名曹實為星省之冠是不于爾而誰屬簡要清通爾其兼之判潭州周必大判隆興府敕詔起東山已報長沙之政符分南服尚提新府之封乃睠元台載颺明訓具官某閎深而肅括堅正而裕和極論思獻納之工盡輔贊彌縫之用始終一節光顯三朝進退百官聚英才而在列總領衆職任大事以不疑方安蘂館之閒往鎮藩方之逺眷懐不替委寄則均政化流行有類上公之分陜威名孚洽共期大老之歸周惟此南昌尤為要地爰命三孤之重式遄十乘之行矧爾寓居之鄉實今賜履之下既喜衮衣之寖近抑欣晝錦之有光先聲所臨羣聽自聳噫令行庭戸當還帶牛佩犢之風福及京師更佇自葉流根之效來綏四國式憲萬邦朱熹知潭州敕具官某十國為連師帥是寄矧長沙控湖湘上游賜履甚廣視邦選侯尤難其人以爾古學粹深風節峻特可以為世之師仁心仁聞威惠孚洽可以為時之帥兼是二者往臨藩方聲望所加列城聳服儒先相望士氣方振爾其為朕教之楚俗雖安尚有凋瘵爾其為朕撫之典刑所存奚俟多訓陳公亮江西運副敕具官某朕惟郡邑官吏至繁不勝其選故精擇部使者付以揚清激濁之寄以爾抗直而詳諫由宰掾持七閩使者節按刑畿甸又有能聲是豈可一日使之家食而不在事易節待次姑以徇爾之私大江之西將輸事重益謹厥職以副眷懷吏部郎中林湜太府少卿敕具官某版曹總國用之要而帑藏分之有司必以外府處其中所以檢柅財貨之出入不嫌于詳其可以輕畀哉爾奮身儒生習于吏治在縣為賢大夫入朝為才御史澄按兩道攝承十連皆有聲績徹于朕聞召寘郎闈靖共爾位進之少列以慰公言率屬究心使上下兼足爾其懋哉户部郎中趙謐軍器監敕具官某戎監之設本以嚴飾武備而休兵歳乆繕修之職各有司存長貳亦惟總兵凡而已以爾舊弼之孫克自抑畏乆在郎省能寡悔尤序進為長仍攝民曹往其祇欽毋替于舊龍圖閣學士正議大夫韓彦直磨勘轉官敕夙嚴銓法所以示百僚之公優待從臣猶不忘三載之攷具官某材猷通敏政術闓明歴事三朝負縉紳之素望投閒十載號簮槖之舊人心安蘂館之居職寓河圖之峻年勞既乆官簿愈髙用為晩節之華其服寵光之渥寳文閣學士大中大夫顔師魯轉一官致仕敕奉香火于真祠方徇投閒之請掛衣冠于神武遽騰告老之章雖欲挽留不如得謝具官某性資剛毅政術疏通幼學壯行曽不渝于一致出藩入從蓋詳試者累年往使殊鄰抗節不撓進登常伯典銓尤明一辭宸陛之嚴洊鎮泉山之逺力求閒退方念儀刑不知何恙之深載覽引年之奏俾升官簿以寵老臣眷簡未忘姑遂明農之志始終無玷尚餘許國之忠服此恩光體予至意顔師魯贈四官敕垂車得請尚想履聲之餘易簀有言猶存尸諫之意愴老成之已矣念冥漠以憮然具官某受才髙明植操堅特莅官行法所至有循吏之風憂國愛君直欲任天下之重獨辭榮于八座乃斂惠于一方身退而名益彰年高而徳彌邵眷舊臣之無幾驚遺奏之遽聞超進文階仍延世賞仰無愧俯無怍何謝古人生也榮死也哀終全晩節眷惟英爽歆此寵靈正議大夫尤袤轉一官守禮部尚書致仕敕位列儀曹屢上求閒之請恩隆儲寀俯從納禄之私兹焉告歸于以示寵具官某器資精敏學業淹該隱帙奥篇了辨無爽殘膏賸馥霑丐為多冊府道山極一時儒學之選詞垣翰苑兼兩朝制誥之工比訖外庸進儀清禁命之夕拜有唐人批敕之風擢以春官當虞臣興禮之任乃因感疾遽欲辭榮俾陟崇階以華晩節李綱乞骸而去肯乆于尚書孔戣得謝而歸仍加于禮部尚祗渙渥無媿前良尤袤贈四官敕舊老遺榮猶有留行之意表章載覽忽形垂絶之言天不憗遺人所嗟惜具官某以時耆徳事朕初潛蚤歳宦游殆及王楊之接晩年貴重遂從園綺之招古事今事問無不知大言小言進必有補爰暨纂承之日首㕘侍從之班召自藩方喜典刑之如故擢居𤨏闥嘉悻直之不衰圖任方深求歸何亟雖弗至甘盤之罔顯恨不許彦博之少閒喪此良臣動予深念進四階而命秩按三尺以疏恩學焉而後臣之正賴多聞之益死者如可作也抑惟斯人之歸或其有知毋悼不幸起居舎人陳傅良起居郎敕具官某言動之屬史官固有左右之異朝廷之用賢士豈以日月為功試之加詳㫖則有在爾窮百氏之學發六經之文身方在于布衣名已傳于海内外庸既訖衆望愈歸比再入于脩門寖擢居于清貫叩其著述之業登之記注之司螭陛直前善開明于朕意鳯池共二能震耀于王言執義不回秉心無競稍遷厥職以重此官庶幾朝宁之間猶見儀刑之舊載纂高皇之典仍陪元子之遊益啓乃心母忘忠告祕書郎彭龜年起居舎人敕具官某朕修明官制用之有條識拔人材待以不次惟此柱下史在邇列以尤親取之中秘書迨近時之罕有既云遴選安得異辭爾操守堅剛論議剴切端公辟屬賛臺院之宏綱冊府為郎號士林之翹楚擢寘螭頭之直俾陪豹尾之班不循年限而授此官深得用魏謩之意掌録時政以付國史尚克遵唐室之規益效忠猷以酬異渥朝請大夫權刑部尚書京鏜磨勘轉官敕六卿分職皆吾從槖之臣三載陟明優爾吏銓之制具官某謀謨宏達識度恢洪頃膺慈扆之知徑上甘泉之列張旜而使萬里折戎虜以不驕叱馭而鎮兩川撫民夷而咸服召登宸陛下寘秋官茲以年勞應于治典爰峻文階之等益増禁路之光尚服恩榮式殫猷告兵部尚書羅㸃落權字敕尚書古之納言必求徳望之妙武部周之司馬實惟邦正之專肆疇已試之良爰錫其真之寵具宫某訏謨經逺雅量鎮浮蚤歴近臣自有老成之譽素多仁聞仍全剛毅之資推愛人利物之心為致君澤民之業詞掖乆推于潤色經幃尤賴于講明旅登聴履之聨兼莅典銓之重儀刑朝著滿歳已深領䄂從班優賢可後有常徳以立武事正需舊學之規以軍令而振國容方倚壯猶之助往祗成命式賛永圖兵部侍郎耿秉落權字敕朕旁招賢士遴選從臣惟我舊人載處五兵之貳不煩滿歳遂頒一札之書俾正厥名敷告于衆具官某姓資剛果器識宏深夙志功名善談當世之務屢更事任専以斯民為憂故典州則千里舉安而將命則列城䝉惠徧儀華貫寖簡予衷掄才甫上于禁途引疾遽收于朝蹟勿藥有喜盍歸乎來留寘邇聨方藉論思之益願全晩節尤髙亷退之風乃加真除俾鎮雅俗櫜弓雖乆豈忘武備之修持槖甚休益謹忠猷之告尚承至意毋有遐心工部侍郎謝深甫落權字敕朕昭徳塞違臨政願治乃睠吉士洊兼夕拜之官樂聞嘉言俾正冬官之貳固云試可實示褒升具官某性稟粹純行能膚敏被聖父非常之遇膺周行不次之除嗣服云初首居郎省量才既審擢寘諫垣顒顒朝望之益髙亹亹奏篇之切當晉登在陛咸推記注之功就尹中都更資彈壓之重持櫜優遷于起部典銓仍領于選曹載輸批勑之忠尤見愛君之篤豈應乆次宜遂為真疇若予工匪求精于技巧毋替朕命尚益效于論思汪徳輸知崇慶府敕具官某始吾髙宗開公社之封實自蜀國尋以崇慶名軍蓋乆而後冠以府號地望滋重矣選侯可輕乎惟爾祖首貳元帥府以佐中興爾為恂恂克守家法簡池之政平易無華畀以左符往守兹蜀念之哉無忝爾祖則不負寄委此邦之意宫人符燕燕轉永寜郡夫人李進進轉通義郡夫人敕朕飭修内治靡形色選之私周覽掖庭爰秩婦官之序有嘉女徳用錫命書具封某婉嫕自將柔良有素知小星盡心之美不見驕盈承穋木逮下之恩惟加肅謹寖歴歳時之乆備殫夙夜之勤分樂土以疏封賁小君而示寵其祗渙渥益懋芳猷汪義端知舒州敕具官某淮右諸郡職優而事簡舒其尤也爾蚤登甲科蔚有時望近膺親擢欲振臺綱引去翩然留之不可爾才辦劇屢更盤錯是邦簡静游刃有餘其與斯民相安于無事以稱朕安邊固圉之意集英殿修撰知紹興府趙不流知廣州趙彦操職事修舉並除煥章閣待制趙不流敕報政輔藩又見期年之變疏恩中扆載加禁路之榮具官某慶席仙源才優吏道頃由輦轂彈壓之任遂為朝夕論思之臣寳婺分符備著蕃宣之效㑹稽奏課曽陞論譔之臣寳坐黄堂庭無留事風行黔首時有譽言登之持橐之職壯我維城之勢帥臨十國方為乆任之圖位列四松不減近班之寵尚祗明命以訖外庸趙彦操敕帥閫雄尊著南海于蕃之蹟璽書勉勵陞西清次對之華惟我宗英被兹渙渥具官某才猷敏劭學識該通蚤膺聖父之知道寘列卿之長俾兼天邑有趙張之威名進攝地官熟研桑之心計一辭位著乆閲星霜姑蘇宣三載之勞章貢總數州之重頃踰庾嶺往鎮番禺撫蠻徼以不驚惠賈胡而無擾載嘉善最俾正從臣望雲以求蓬萊毋謂鵷行之逺把麾而去江海乃通豹尾之班兹曰殊恩益圖來效端明殿學士正奉大夫致仕鄭丙贈四官敕引年已乆無復尚書之履聲遺奏忽聞庶㡬太史之尸諫舊臣無幾䘏典宜加具官某氣直而能温性剛而善下立朝正色為多士之表儀典選盡公慕古人之風裁洊更名郡遂返故鄉奉祠館以怡神據禮經而告老謂因閒適可迪夀康不知何恙之深遽起云亡之嘆疊升命秩仍茂賞延八座班髙篤始終之不替九京恩及尚英爽之有知資政殿大學士通議大夫范成大轉一官致仕敕圖舊人而共政方媿未能引大體以乞身胡為有請嗟名臣之老矣撫往事以慨然具官某俊逸不羣風流自命文章甚偉崔蔡誠不足多制誥尤工王楊當為之伯緒餘所出施設具宜桂海冰天望皇靈而益逺瀛壖蜀道専制閫以增雄是誠宣力于四方宜俾進宫于兩地出司留籥遂奉祠庭用之未盡其才退而自求其志卧公幹漳濱之疾掛隱居神武之冠寵數彌光典刑斯在噫胸中之有兵甲世稱小范之才高扁舟之泛江湖或謂鴟夷之仙去皆爾鄉閭之舊豈其苗裔之餘無忝前良以全晩節范成大贈五官敕舊弼遺榮方遂垂車之志需章上奏忍聞易簣之言天不憗遺人其殄瘁具官某身登二府仕歴三朝詞章議論之髙無慚古昔東西南北之表咸著威名曾輔政之幾何乃居閒之寖乆九齡之風度可想晉公之神明不衰石湖忽墮乎文星夀櫟遽成夫陳迹云何不淑而至於斯念三呉人士之無多嘆一代風流之幾盡躐五階而進秩按二品以疏恩噫三仕三已而賦歸豈復計生前之事一官一集之傳逺尚得垂身後之名其或有知當自無憾軍器少監黃由將作監敕具官某朕有元子愛之固深而教之惟恐不至一時賓僚極儒雅之選爾以倫魁之彦乆儀羣玉之府侃侃正色抗論不回自少匠而為長蓋亦寵矣技巧精能非以此望汝也横經朱邸使吾兒有直諒多聞之益是惟休哉開府儀同三司判隆興府趙雄少保致仕敕舊弼偃藩方倚上流之重需章請老遽求故里之歸逝矣莫留惻然興感具官某謀謨宏逺識度恢洪洞往古治忽之原識當今輕重之體臨機輒斷慕如晦彌縫之功遇事敢為有黄裳經濟之畧頃辭朝㑹洊著民庸起之西蜀之陬付以南昌之郡仰父俯子寖銷愁嘆之心襟江帶湖雅稱詩書之帥以疾來諗乞身甚堅雖深軫予衷亦重違雅志其陟三孤之貴以華萬里之行噫圖任舊人謂尚堪于大政注想元老惜不究于長才諒服渙恩式全嘉遯趙雄贈少師敕埀車自適難留故相之歸屬纊有言尚篤大臣之誼殄瘁之嘆逺邇所均具官某以庸濟之才際明良之㑹坐廟堂而獨任光輔至尊之朝解印組以言旋猶髙勇退之節迨予嗣服嘗賴矢謨初為武侯渡瀘之行實重周公分陜之寄洊更帥閫最得士心不圖柱石之衰遂掛衣冠而去勉親醫藥猶藉典刑遽淪九京奄隔千古爰陟公師之亞仍加世賞之延噫死生旦晝之常固達人之所諒君臣始終之分豈卹典之可稽慨想冥途尚歆異渥湖北提刑張垓江西提刑知池州王謙湖北提刑敕具官某等祖宗哀矜庶獄分道置使前古未有也朕承丕緒尤遴于擇人爾垓名臣之子尚有家法爾謙儒林之彦尤長吏才大江之西人以終訟為能重湖之北民有敚攘之擾各務澄按恤民之可矜懲吏之無良使逺方人人自以為不冤朕將有以褒表之朝議大夫煥章閣待制馬大同磨勘轉官敕一麾出守實吾從橐之臣三載陟明優爾吏銓之制具官某器資精敏心計疏通比從惟月之班徑上甘泉之列民曹治賦更嘉獻納之忠京口分符備著蕃宣之效年勞寖及治典可稽俾序進于文階以増光于侯度往其祗命益務告猶吏部郎中錢象祖樞密院檢詳敕具官某天下之兵本于宥庭設屬掄才實視宰掾非夫詳練敏明之士不在兹選爾起于重珪疊組之家而以書生自處蚤更事任若老于州縣者出入郎省殆二十年敏而不疎審而無滯賛吾樞臣爾其選也益勉所長以俟登用太府丞曽三聘秘書郎敕具官某道山蓬萊圖籍鉅萬士夫仰望真望颷車羽輪之隔遊其中者皆天下選也以爾力學自奮持論不阿憂國之心如飢如渇擢自外府徑登清貫益讀未見書以昌逺業且使四部秩然有序是為稱職哉大理寺主簿王寜新知信陽軍劉崇之並太府寺丞敕具官某等寺監皆有丞不外府設官獨詳焉蓋欲上裨版曹之調度下柅有司之出納不可以非其人也以爾寜文詞蔚然明習吏道勾稽棘寺平反為多爰俾序遷以酬勞勩爾崇之聲稱籍甚蚤登著庭出守邊方占對尤敏使還朝蹟以慰公言所貴于儒者為其能通世務其以所學見之事功勉哉宗正少卿鄭汝諧右文殿修撰之池州敕具官某爾以科級自奮以吏諝見稱持節分符俱有聲績登之卿列進攝禁途迨命為真乃有異論朕方遴論思之選屢欲留行爾乃陳云就之餘式遄其行慰彼右文論譔之職往撫池陽凋瘵之餘式遄其行慰彼黎庶忠翊郎屠思正監轄製造御前軍器所實及五年轉一官敕具官某除戎器以戒不虞國之務也爾職其事遂閲五年何愛一官以奬勞勩夀聖皇太后慶八十詔書文武陞朝官等加封祖父母父母定詞臺諫卿監郎官以上封祖父并父敕具官某父某朕日侍慈皇推尊祖后母儀備三朝之盛夀簡増八袠之崇奉徽稱于日至之長講慶禮于元正之始爰本親親之道用推老老之恩以爾積善有餘潛光不試粤有賢子祖父云孫子揚于王庭臺官云列屬憲臺卿少云列在月卿郎宫云列在名曹都司云宰掾是司聿觀縟典之行可後髙年之渥爰陞命秩以示寵光益務教忠用圖顯報臺諫卿監郎官以上封祖母并母敕具官某母某氏同前制朕日侍慈皇至用推老老之恩以爾婦道素全壼彛甚飭粤有賢子祖母云賢孫揚于王庭官官云列屬憲臺卿少云列在月卿郎官云列在名曹都司云宰掾是司聿觀縟典之行可後髙年之渥爰加沐邑以示寵光郡夫人爰封名郡國夫人晉封大國職事官内外陞朝官京局京官選人在外京官選人封祖父母父母敇具官某父某朕以祖后夀登八袠恭侍慈皇奉上萬年之觴爰推老老之恩以廣親親之道以爾潛光不試積善有餘祖母并母云壼彜甚飭婦道有聞子仕朝行身逢慶霈祖父云孫仕朝行朝官云子通朝藉京局京官選人云子仕中都在外京官選人云子在仕途爰加異渥以惠髙年知樞密院事趙汝愚初除封贈曽祖太子少保士慮太子太保敕我有宗臣進長樞筦雖循牆而避寵終出綍以疏榮貴震一時恩及三世具官某分暉帝胄履善家庭九族序遷曽不登于膴仕百年隱行乃有見于後人惟爾曽孫既登右府亞于宫保已賁幽原爰加再命之崇遂列三師之重前無舊比殁有餘光曾祖母髙平郡夫人龔氏文安郡夫人敕位尊任重必有家傳積厚流光亦由閫政恩既加于曽廟封宜進于小君具封某以柔淑之資嬪信厚之族雖中饋之職無顯于外而内則之懿能肥其家逮三葉而益昌位元樞而鼎貴載加名郡以表芳猷祖太子少傅不求太子太傳敕紫樞元臣方隆于同姓靑宮亞傅嘗寵于大家位既愈崇恩亦宜稱具官某奕奕帝王之胄恂恂儒素之風教子以經至孫而貴鳴珂佩玉雖不見于生前疊組重圭乃追榮于身後進登一品以慰九京祖母咸寧郡夫人晁氏濟陽郡夫人敕世胄高華本由濟北之族慶源流衍實自召南之風具封某躬蘋蘩之勤遵圖史之訓功容俱備典則不渝教子有方能甘啜菽之養撫孫甚愛真有含飴之歡兹領樞庭以翊興運頃嘗頒夫沐邑俾載益于郡封爰分廣濟之名式慰謹終之意父太子少師善應太子太師敕眷我維城固多將相侯王之貴惟爾有子遂為股肱心膂之臣可無寵光載篤餘慶具官某家法有自天資尤髙及見太平猶記開元之際結交前輩尚聞正始之音躬曾閔之孝欽慕間平之儒雅爰謹家庭之訓遂傳宥府之賢乃進宫師以彰陽報其祗明命益啓後昆母安化郡夫人李氏饒陽郡夫人敕愛君憂國繄我本兵之良嫓徳娠賢可後榮親之渥具封某稟資柔懿植操幽閒以澤底之名家歸天潢之支派以澤底一本疑底字誤因缺之攷唐李肇國史補澤底李與岡頭盧土門崔竝稱可證其不誤中閨甚肅不辭舉案之勤令子著名端自㫁機之訓云何不淑其後遂興洊啓博陵之封以示冥途之寵妻鄱陽郡夫人徐氏通義郡夫人敕大臣許國有光麟趾之宗夫人起家無媿鵲巢之隠惜悼亡之已乆宜追逺以加榮具封某生自儒門嬪于皇族身能全于婦道生弗永乎天年迨夫子之登庸嗟室人之冥漠視其爵秩賁以恩光易番水之舊封畀眉山之新渥尚惟靈爽式克欽承攻媿集卷三十八欽定四庫全書攻媿集巻三十九宋樓鑰撰外制大中大夫沈揆轉一官守權吏部侍郎致仕敕侍朝甚喜方儀荷橐之聨何恙之深忽上掛冠之請初不聞曽子之疾乃欲為疎傅之歸具官某文有菁華學稱博雅頃屢登於位著矧夙備於儲寮嗣服云初首頒於召節殿邦既乆終入於從班謂其數器之兼畀以二銓之重預修史策勸講經帷造膝陳謨曽未浹日抗章告老胡不待年許尋里社之閒仍守天官之秩子騫之在汶上莫遂挽留公幹之卧漳濱徒深懷舊尚祇渙渥以保修名沈揆贈四官敕孟軻之致為臣方軫留行之念曽參之啓予手忽聞將死之言撫往事以何追嗟若人之不淑具官某老於文學志在事功愽極羣書而發于英詞上下千載而見之篤論任握節分符之寄所在著稱登簮筆持橐之班於時未乆抱疴自列納禄言歸當危惙以奏篇眷忠勤而隕涕爰加卹典悉按彛章進官序以甚優畀賞延而不吝尚惟英爽歆此寵靈皇太后慶夀武學生加封祖父母父母定詞上舎内舎生敕具某人父某朕以祖后春秋益髙乃月正元日恭侍慈皇仰奉慶禮鍚類之恩溥及中外一命而上祖父母父母夀登八十者始得預此爾年方從心以有子列在右庠嘗預舎選寵以命秩祖父并父云進加命秩祖母并母云寵以恩封最為優異其服明渙以迪夀康外舎生敕具某人父某朕以祖后春秋益髙乃月正元日恭侍慈皇仰奉慶禮錫類之恩溥及中外惟爾有子祖父母云有孫列在右學年登八秩寵以恩封父母同詞加封云加進恩封其服渙恩以綏吉履勝㨗下名都虞侯楊彦換從義郎王檝換秉義郎敕具官某汝乆隸羽林積勞可紀授以勇爵實應舊章往其欽承益務忠恪王進之知徳慶府敕具官某爾頃以天府貳車往守武陵突不得黔已復報罷朕心憫焉晉康雖逺實髙皇興王之地舉以授汝以觀汝能尚其懋哉毋替朕命大理寺丞林季友吏部郎官主管侍郎右選敕具官某郎曹二十有八莫劇于武選文書盈几難以徧察涉筆占位猶恐不暇非静而敏者未易得其要領也爾以儒者而通世務桐川奉最再轉而丞於廷尉未乆也選居星省遂典三銓鶡弁之士惟吏是聴雖有抑滯不能自伸爾其念哉勉賛而長浙西提舉黄遹本路提刑敕具官某三丞出擁使節還為郎曹者多矣以爾之賢列屬憲臺丞於中秘使事修舉宜俾來歸浙河以西服爾清裁爾亦以静退自處無羨於登仙就易祥刑之司以為畿甸之望表亷幹儆惰偷民以不冤清我臬事朕豈使爾徒乆於外哉宗正丞鄭公顯浙西提舉敕具官某朕惟倉庾斂㪚之法山海摘煮之利分道置使所任甚専畿甸之間選用尤重以爾學贍而文敏外寛而内剛進丞司宗華問罙暢兼掌名表蜀詞最工持節有行去天尺五酌豐歉而賦政辨能否以簡僚惟爾之能思所以稱龍圖閣直學士程大昌除龍圖閣學士致仕敕引經告老為神虎掛冠之歸念舊疏榮峻龍馬負圖之職以優耆徳以表髙風具官某秉操堅剛著書淵博蚤游冊府擅温厚爾雅之文晩侍儲闈賴直諒多聞之友十年筆橐人望素隆數路麾符民庸益著髙蹈囂塵之表乆從香火之閒年既及於從心志欲祈於納禄羽翼之資黃綺毋忘伐木之詩丘壑之有皋䕫當遂考槃之樂尚祗明渙式介蕃釐大府寺主簿林思濟大理寺丞敕具官某先王用刑之法莫詳於甫刑一書有曰故乃明於刑之中率又於民棐彜爾蚤以經術先多士嘗誦其言矣入仕朝行有靖共之譽廷尉選丞以爾為之其試所學以廣朕欽恤之意主管戸部架閣孫元卿太學正敇具官某爾以甲科自奮用為掌故之官更厯艱棘蓋乆而後得之退然自莫亦既再歳賢關清選爾宜居之子率以正孰敢不正橋門之士將於爾觀焉修職郎權建寜府政和縣尉胡杞擒獲許伯祥等循兩資敇具官某警捕尉曹職也姦民寇攘爾能致之連帥有言何愛旌賞余永弼知閬州敕具官某閬風錦屏之勝士誦少陵之詩恨不得身到其地爾乃以二千石臨之豈易得哉爾起儒門萬里入蜀洊更事任雅有能稱郡寄寖髙事權益重無輕民事克勤小物則可以稱此矣王寅知江州敇具官某長江上游以潯陽為重鎭分屯禁旅控禦一面守將非它郡比也以爾三領左符老于吏治番易之政人多稱之其殫撫字之心無改中和之舊使兵民晏然隠若敵國則不負選侯之舉矣丁逢潼川府路轉運判官敇具官某爾有志當世結知慈皇守郴陽使湖外又皆有聲績可紀今日有用之才也東川飛輓之重不以輕畀叱馭而往毋憚馳驅撫摩吾民亷察羣吏以稱外臺耳目之選是惟休哉謝源明直煥章閣知温州敕具官某朕遴選諫臣以廣聽覽爾頃居九列旋冠宰掾察其堅正擢在騎省論事不回方嚮於用銜恤而歸念之不忘亦既即吉起鎮東土惟永嘉在左浙為望郡山川秀發衣冠鼎盛四邑相去才百里而負山並海壤地深逺人物日庶事亦滋繁非得精明和惠之人未易辦治爾其人矣堯章寓職以寵爾行俟訖外庸登進未晚尚其欽哉幹辦審計司范蓀太府寺主簿敕具官某蜀之范氏如晉王謝人物輩出文獻相望爾在今日又其翹楚也以世科發身以吏課交薦其在朝列退然若無所修綜者而人自稱之勾稽外府姑以序進勉紹家學以稱所䝉趙像之福建提刑敕具官某七閩祥刑之寄選於衆乆矣以爾被服儒雅屢持使節往司宗盟聲望日著雖無預於吏治已習知其民風就乘軺車不俟臨遣聽訟吾猶人也必也使吾訟乎聖人之言固未易及得情勿喜尚惟勉旃江東連副傳伯夀直煥章閣敕具官某朕為烈祖聖學髙妙昭回之光下飾萬物煥乎文章尊閣惟謹寓直之寵不以輕畀也以爾天資警敏一日千里詞章精贍連收三科登著作之庭於今十有八年矣按刑將漕益著外庸爰錫寵名以示褒表討論潤色豈其舎諸朱翺大理寺丞敕具官某惟爾祖光輔思陵爾父又登從列君子之澤未艾也爾被賞延乃能明習文法致身廷評出守辰陽奉最以歸進之棘丞榮路無壅益勉厥職無忝爾先淮西運副趙師􅋷太府少卿淮西總領敕具官某國家分屯重兵布列江滸董饟之任必選朝士臨之而金陵莫重焉爾决科自奮飾以儒雅有志事功所至辦治嘗使京口見謂敏明淮甸錢幣更張之餘賴爾撫摩調護之力民情悦服名稱益彰兹以亞卿往司調度足兵足食復於爾觀焉尚殫爾心以副詳試之意廬州修城官修武郎建康都統司中軍權副將馬再興武顯郎左軍統領毛致通武經郎左軍統制馬遹各轉一官敇具官等合肥當淮西一面俾葺堅城以固吾圉率衆庀工汔底於成各進厥官庸勸勞勩同安郡夫人武氏進封才人敕五官正宫闈日修於内則整齊品秩尤戒於私恩必有柔儀乃容序進具封某稟資婉嫕履行純和乆承樛木之慈得備貫魚之列疏封名郡錫號小君知閲時之滋深嘉率職之無怠登之女御示我壼彜位幾近於九嬪爵亦儕於千石帶弓箭而待君側吾豈務於燕游理絲枲而獻歳功爾尚勤於蠶織知建康府鄭僑吏部尚書敇司筦籥於留都方資賢牧典銓衡於選部當任舊人乃播綸言載儀禁路具官某性資剛毅學力精深聲華蚤擅於倫魁名節尤稱於傑特訓辭温厚信獨步於一時朝夕論思率主盟於定議旋由夕拜進長天官閩部選侯洊更鎮撫秣陵謀帥復藉保釐屬興宣室之思俾趣鋒車之召渇聞讜論日佇尚書之履聲器使羣才更賴山公之啓事毋庸俟駕亟遂歸班趙師程大理寺主簿敕具官某朝行簿領之官勾稽之外職業素簡惟理官設屬則有近制廷評奏當之成俾分攷而訂正之遴選非他比也以爾天潢之秀儒雅自將試邑佐州遇事不苟且嘗列于朝矣其服朕命益觀汝能翰林醫效王懋兼重華宫祇應實及二年轉一官敕具官某朕祇事重華尤謹于藥石之奉爾以瘍醫奉職惟謹亦又再歳在法當遷俾陞爾階其思所報俞澂知常徳府敕具官某武陵為湖北名邦以夀皇潛藩地望增重總數州之戎事控五溪之喉衿未嘗不選侯而用焉爾出儒門明習文法有公亷之操得温厚之稱嘗守髙安政適其平郎曹卿寺踐歴滋乆起家剖符往鎮遐服明聽朕言無輕民事中奉大夫煥章閣待制知鄂州王信磨勘轉官敕一麾出守乆著于民庸三載陟明適登于吏攷乃頒恩命俾進文階具官某性識疏通材猷敏劭西掖擅演綸之美東臺髙批敕之風易鎮㑹稽暢威名于近甸分符鄂渚增形勢于上游茲以年勞應于治典雖曰有司之定制是為增秩之殊之榮益圖爾功以謹忠報知明州何澹母太淑人石氏該慶夀恩封齊安郡太夫人敕朕禮厚兩宫當累洽重熙之際年登八袠奉隆慈備福之尊乃推老老之心庸廣親親之道具封某氏起自名族嬪于大門善相其夫為部使者之貴親見吾子任中執法之嚴方乘輕軒以就禄養逢國家之慶霈開湯沐之新封位正小君爰擇黄岡之勝恩隆晩歳式增彤管之華益介夀祺以儀閨閫太府少卿呉珽太府卿淮東總領敕具官某國家東巡呉㑹列戍江淮惟此丹陽尤為近屏䕶餉既乆可後褒升爾儒雅雍容克勤吏道詳歴版曹司金之職遂登外府亞卿之華頃以王臣往給軍食調娯酬酢上下帖然就加惟月之班其服自天之寵勿替于舊益圖爾功迪公郎李閌父儀甫該慶夀恩封承務郎致仕敕具官某爾積行有素年過九齡有子在官實應封典授之京秩以為爾寵宫人張氏封郡夫人敕朕日聽外朝退修内治婦官具設尤嚴陛給之分恩命所加必視功容之懿具位某氏雅稱柔履選自良家事宫壼以服勞閲歳時而滋乆啓封名郡進位小君仍頒禄秩之優庸示禁庭之寵其祗渙渥益懋芳猷訓武郎臨安府湖州巡轄遞鋪梁青違滯金字牌降一官敕具官某置郵所以傳命令達章奏矧制閫動係邊事可少稽乎爾怠於職行不以時奪爾一階以懲不恪國子録陳邕武學博士敕具官某爾掌敎國子蔚然有稱嘗對便朝論事尤切長于右學益觀通才武尚止戈兵實貴謀其以斯意訓迪學士庶幾得有用之才以備將帥之選焉王介國子録敕具官某士登甲科立致膴仕亦惟行誼有以稱則得之斯無異辭爾當龍飛之初居俊秀前列輔邦入幕以儒雅飾吏是能稱此科級者擢居胄監典我教事又能稱此使學者宗之則爾之進未艾也樞密院編修官許介宗正丞敕具官某司宗有丞在頌臺憲府之間非列寺比故其選甚髙爾蚤擢乙科嘗試劇縣慈皇聞其善政就加增秩之寵再入修門其才益著比以編摩之職攝郎省參宰掾矣兹登清途務修寶牒益謹厥職以究爾長王溉户部郎官敕具官某版曹掌國之大計而左民尤為繁劇州邑之訟有不得其平者率造焉思得疏通詳練之士乆矣爾源流家傳緣飾吏事往使於蜀精敏有餘操贏貲以蘇疲瘵嘗加詔奬召對便朝審其可用往振兹職益觀汝能䕫路運判馮震武戸部郎官四川總領敕具官某朕惟武王不忘逺之意西南萬里選才尤詳矧總餉之寄動關軍國見大夫臨遣而行或不及事爾蜀國之産嘗列於朝觀風䕫門能宣徳意加以民曹之職就董五十餘州之賦以給營壘之師民力困矣軍須方繁足食足兵佇觀儒效太常寺主簿張貴謨司農寺丞敕具官某爾學術該通論議根據一時清流也頃試劇邑乃有能聲蓋嘗見於用矣勾稽頌臺進丞農扈雖曰曾預禮樂制作之事要須詳試簿書期㑹之間爾惟通才其體此意太社令陳峴太學博士敕具官某爾以紹興法從之孫自奮宏博之科宜仕於朝乆矣徊翔幕府列屬容臺賢士之關師儒虛位疇咨多士僉曰汝宜温故知新爾其自勉判建康府葛邲改判隆興府敕由端揆以殿邦允藉保釐之略為上流而易鎮更資撫御之才爰授左符載揚明綍具官某謀猷宏達徳度恢洪三世名儒益致家聲之顯兩朝異眷遂専國秉之隆矧惟舊學之臣乆處洪樞之任密參廟算既兼文武之資祈解政機遂付軍民之寄加延恩而寓職視上宰以疏榮顧陳義以甚堅為相攸而改命惟襟江帶湖之地可以優賢皆耕田鑿井之民正宜坐嘯其為十運之帥式遄千騎之行噫嘗本五兵彌覺偃藩之重周知萬務豈云斂惠之難尚訖外庸益綏休寵新除吏部尚書鄭僑龍圖閣學士依舊知建康府敕召還選部行領從臣之班居守陪京復分方面之任選用之遴中外則均具官某望重兩朝才髙衆俊以三代之文掌我帝制以六經之學格於君心頃由天官出鎮閩部旋畀保釐之寄實資鎮撫之功尚書喉舌之官固應圖舊河東股肱之郡故特召君矧荒政之方修亦遜章之沓至俯徇借留之志益髙難進之風龍閣陞華用為爾寵麟符增重克成厥終益著外庸以綏渙渥知臨安府錢塘縣趙盛太社令敕具官某惟爾先正光輔髙皇配饗廟廷燕及後裔凡爾昆弟序進於朝社稷之司不以輕授靖共爾位毋忝爾先新知潼川府楊虞仲真秘閣知䕫州敕具官某䕫子之國號稱䕫門蓋蜀州之喉衿也謀帥之重實難其人爾西南望士三持使節蜀之民服爾名已乆爾亦習知風俗之詳矣潼川未行易鎮茲部寓直中秘以為爾寵民生凋瘵非他路比罷行利害汔可小康其尚勉哉以稱推擇之意進士張昉陳舜咨賑濟補承節郎敕某人荒政之修觀分為急爾出私儲以濟饑民何愛一官用勸來者承信郎𣙜貨務檢法使臣錢煜收趁増羡轉一官敕具官某𣙜山海之利以佐邦儲賞典最厚爾奔走其下亦預進官尚勉公勤思有以稱陳謙䕫路運判敕具官某䕫門為蜀要衝川陸險絶刀耕火種民生甚難將輸之寄甚重郡計實仰給焉非通敏之士不在茲選以爾有用之學洊試劇繁以南蘭陵吏課之最領湖右斂散之權茲為朕行調度一道撫惠疲氓務去泰甚使田里得以安其生則朕之顧憂寛矣知台州徐子寅廣東提刑敕具官某朕念廣東憲臺之重疇咨其人思得資髙而練事法明而尚寛者居之大臣謂爾為可且曰是嘗為卿為部使者帥維揚矣中更退閒起為漢東而治辦丹丘之政民安而歌之使持節以按嶺海其必有以稱欽恤之意朕曰俞哉式遄其驅毋替朕命奉議郎提轄𣙜貨務謝儼收趁增羨轉一官敕具官某𣙜筦之繁總於京邑爾不欺於職濟以變通歳入之貲坐致贏羨可無褒賞以勸後來其祇増秩之恩益謹有司之守提㸃坑冶鑄錢趙不迹淮南運判敕具官某朕惟外臺飛輓之司莫如東淮委寄之重兼憲使刑辟之任當使客冠葢之衝欲求通才得我賢族以爾奮由科級尤精吏能擁麾棨于三州屢書課最總貨泉於六道式阜邦財俾行邊彊進専漕計尚思忠報益著外庸文思院造皇太后尊號冊寶監官從政郎陳庶監門儒林郎黄概各循一資敕具官某朕以月正元日奉徽稱於祖后白玉之牒鏤刻甚工黄金之璽一鑄而就雖曰有司之職實惟莅事之勤各進爾階庸示嘉寵幹辦審計司劉誠之太常寺主簿劉徳秀大理寺主簿敕具官某等列寺之屬職皆勾稽惟容臺禮樂是司實預討論之事惟廷尉刑獄至重實分議之司銓叙人才者尤不可輕授也以爾誠之聲稱籍甚持以靖共爾徳秀文采蔚然不事表襮兹庸並命其進未央尚體優恩各揚乃職福建提舉張濤提㸃坑冶鑄錢敕具官某國家分道遣使各揚乃職惟貨泉之寄總六道百郡之權歸於一大有司視漢之鍾官辯銅其重甚矣非得通儒不以輕畀以爾抱負不凡詞章精贍出入朝行見謂老成使於二部皆有聲績舉以命汝其為朕謹調度察姦欺使邦財阜通朕豈乆汝於外哉宋之瑞福建提舉敕具官某爾以儒學之秀三仕于朝滋嚮于用而又引去朕亦念之七閩斂散之司職優而事重疇咨膚使起爾于家士之宦學不以仕已為喜愠上之用人豈以中外為重輕爾尚勉旃以俟光寵從政郎揚州司法林橓搜獲銅錢循一資敕具官某邊郡嚴錢幣之出而吏多不䖍爾能摘狀遂正其罪選階之進以懋爾勤四川量試宗子伯揚時敏補承信郎敕某人爾在屬籍逺處蜀道能以文藝優占科級錫之武爵尚其勉旃鎮江都統閻世雄管軍五年職事修舉轉遙郡刺史敕具官某國家分遣禁旅列戍江城京口捍蔽行都最為要近爾以宿將坐總戎韜威名隠然壁壘清謐五年于此宜賞賢勞遙刺侯邦是為異寵益思忠報毋替厥初慈福宫内人安化郡夫人方氏彭原郡夫人髙氏清河郡夫人鄺氏竝轉國夫人胡氏蘇氏張氏竝封郡夫人敕朕承累洽重煕之運奉隆慈備福之尊疇咨女御之良爰畀恩光之渥具位某氏稟資婉嫕植行柔嘉選在掖廷蚤備婦官之列事予祖后寖更歳籥之深屬慶典之告成演褒綸而逮下進封大國胡氏蘇氏張氏云啓封名郡益懋小心煥章閣待制趙不流換正任承宣使知大宗正事敕擁東越之麾方騰吏課糾成周之族有賴宗英優加留務之班式寵從臣之舊具官某氣和而智敏屬近而行尊風分帝胄之華寖歴仕途之乆政成京邑嘗進貳于司空身處輔藩訖褒升于次對來奉便朝之覲俾專屬籍之盟示我異恩超亷車而授職藉卿宿望壯磐石以承休是曰當才奚勞多訓修職郎鄭守仁賀正旦使親屬循一資敕具官某爾父頃使敵國爾雖不預行役而善于子職使行者不内顧而居者得所安勞還之初亦被醲賞舉行于今尚其祇服修職郎李良臣奉使書狀官循兩資敕具官某歳遣信使信聘殊鄰凡預驅馳均有勞還之賞矧以鉛槧為職潤色使華疉進選階于汝何吝慶夀詔書宗子年八十以上使臣年八十以上願致仕者竝轉一官定詞敕具官某朕以正月上日奉祖后萬年之觴霈澤四方及人之老爾在屬籍春秋益髙進以一階用華晩節使臣云爾在右列引年告老進官一等是為優恩宗子汝种與昉補承信郎敕具等爾在屬籍逢時覃霈能以文藝自叙科級予之武爵尚其勉旃淮東提舉陳損之創立紹熙堰除直祕閣敕具官某水利本以惠農常平使者之職也爾使淮東善于其職建議任責迄觀厥成伻來以圖如指諸掌閉縱隨時條流有序綿亘及數百里之逺灌溉為千萬頃之利農商俱濟旱澇無虞使客漕運之往來咸有賴焉謝安為埭人以召伯名之爾通敏有餘不擾而辦名以紹熙淮民不汝忘也寓直中祕以寵爾勤朕所以待汝者何止是哉姚榘知邕州敕具官某南晉深入領右控制蠻方唐則分建五管今亦併䕶數州權任亞于連帥選侯顧不重哉以爾莅官不苟有趨事赴功之心治施於靖咸有聲績班班可紀今又命爾以此邦固圉寜民尚其勉哉大理少卿許及之權禮部侍郎敕廷尉天下之平洊居卿列宗伯春官之貳徑入從班是曰異恩實由親擢具官某才兼數器識綜九流蚤以多文之儒務為有用之學方彈冠之伊始已脱頴而不凡禁闥拾遺得真諫官之譽藩方作牧有古良將之風比因奉最之歸俾簉明刑之任惟慶霈既行之後當郊禋再舉之時儀曹乆虛禮典誰屬釋爾平反之重參予制作之司有功過于張之賢朕所知者虞舜命夷䕫之事汝則兼之益勉告猶斯為稱職四川茶馬朱致知京西運判敕具官某襄漢將漕之寄雖所部不過數州而實兼諸使之職控制邊要仍居上游不輕以授人也爾起世家能以儒雅飾吏事嘗守申伯隨侯之國又三使於蜀矣萬里召還復畀華節惟爾鼻祖致身九卿以桐鄉之嗇夫為漢世之循吏爾其苖裔當慕前烈以此位而行志豈不易于一嗇夫哉訓武郎監𣙜貨務陳仲堅收趁增羨轉一官敕具官某𣙜筦之重總於中都爾能其官歳入贏羨加之命秩以勸後來倉部郎官鄭湜大理少卿敕具官某國家刑辟之寄總于廷尉而職則分任焉使習憲章者視獄之成而審聽囚徒必命儒者臨之其㫖深矣爾少而發藻善為詞章立朝有鯁亮之稱治民有循良之效總餉江左威譽日聳郎潛未乆卑爾臬事能深知設官分職之㫖斯無負今日推擇之意往贊而長亦惟欽哉起居郎陳傅良祕閣修撰嘉王府贊讀敕具官某漢四皓起商山羽翼之功千古稱之朕則歉焉使髙帝能以卑辭厚禮聘之以輔其子則善矣爾以一世名儒羽儀於朝抗議不回引去甚亟爾與吾兒游舊矣爾既厭直承明之廬予亦閔勞以侍從之事寵之祕撰之寓職來為朱邸之賓僚尚遄其行庸副虛佇帶御器械霍汝翼復元官轉觀察使敕具官某侍御之臣苟曠瘝而必罰歳時既乆俾牽復以自新爾舊服禁嚴雅稱詳謹佩侯邦之組綬官簿寖髙屬宸陛之櫜鞬戎容甚肅頃懲慢弛知務省循况更政典之修徑授亷車之秩益思恭恪以對寵光文林郎張允中該修夀皇玉牒循一資敕具官某寳牒成書嘗頒醲賞汝供刀筆亦與進官毋曰例遷其思所報前知建昌軍趙彦禮拖欠月椿錢降一官敕具官某盱江本江右佳郡一人壞之毒流至今爾自力于政而承積弊于二十餘年之後給餉有闕無所歸咎稍鐫一秩以儆後來沈合知岳州敕具官某岳陽據荆楚之要郡雖小而地望實重焉爾清約詳練資歴寖深惟爾兄舊鎮長沙威望凜然父老類能道之試郡云初毋忝家聲則知共理之意趙不逷江西提舉敇具官某爾頃以吏課之優為郎起部出守輔郡蔚然有聞江右斂散之重俾爾持節以臨之昆弟三人少則俱列于儒科今又分道而為使者逺有光華宗盟之美談也其勉爾事以稱所蒙攻媿集巻三十九欽定四庫全書攻媿集巻四十宋樓鑰撰外制知婺州葉翥知紹興府敕輔郡承流久不聽尚書之履价藩謀帥茲又懷太守之章允謂才難莫先徳選具官某智周慮表學紹儒先踐􅆒既歴三朝侍從亦踰一紀愛人利物由天性之自然足國裕民處地官而最久屢更劇地深惠疲氓盡銷愁恨歎息之心尤見勞來安集之政眷惟東土密邇行都先帝上賓將奉因山之役大邦維屏益嚴分閫之除惟爾通材稱予隆委規模素定既所臨而有聲威信兼行當不擾而自辦佇聞成效奚俟多辭新知紹興府倪思知婺州敕具官某視禁林之草允藉通儒分輔郡之符俯從忱請相攸既審易地皆然爾學優而醇文麗以敏早登宏博之選徑上清華之途翰苑詞垣擅兩制絲綸之美經帷史館極一時筆槖之榮擢貳儀曹獨司邦禮拭圭出使握節言旋曾坐席之未温俄抗章而自列豈久勞侍從之事遂厭直承明之廬懷㑹稽太守之章至勤再命繼東陽隱侯之詠去擁一麾勉為朕行毋輕民事詞人而任岳牧初無内重之偏宣室之對鬼神當俟政成之後䕫路運判陳謙湖北提刑敕具官某爾以君子儒為湖北常平使者蠻猺披猖省民驚擾船粟而往哺之爾之職也因攝憲臺併任其責就設方略隨以撫定朕聞而嘉之可謂不辭難者矣乃酌帥臣之言姑輟䕫門之役兹庸命汝持刑本道以慰民望以奬爾勞其思永圖靖此一方不汝忘也湖北提刑王謙湖南提刑敕具官某部使者之選以風采為先所以寄吾耳目于千里之外不欲其數易也以爾志操不凡居有直氣其在郡邑聲望翹然持憲湖隂正欲倚重易節隣部非以便爾之私又將于爾乎觀焉尚勉之哉判太史局降授夏官大夫吳澤降授中官大夫荆大聲降授中官正劉孝榮同判局降授局令周端友並復元官敕具官某等天道高遠王者欲求端于上必有日官以司之爾善于觀象見謂老成頃以不謹嘗鐫命秩涉期而敘法也勿以為宜得而忘所報修武郎監建康府𣙜貨務門茅恭收趂增羡轉一官敕具官某𣙜貨之在留都嵗入甚夥增羡之賞司闗者亦預焉進爾一官益勉而職建寧府浦城知縣鮑恭叔降兩官永不得與親民差遣敇具官某縣令與民最親獄事所宜深察也爾為大邑以重辟告于郡卻而復上幾限平民于死迨冤狀既白而欲便文以自解乎外臺有言奪汝二秩不復使任臨民之官尚為輕典也中大夫煥章閣待制趙彦操轉一官致仕敕鎮五羊之地方通持槖之班叩九虎之闗忽上挂冠之請是為宗老宜厚寵章具官某受才素優莅政尤敏早參民部旋自逸于燕閒晩歴藩方嘗屢騰于課最眷南海折衝之略升西清次對之聨聞囹圄之屢空見里閭之不擾胡為感疾遽欲乞身念帥閫之幾年進文階之四品鄭尚書之威信日佇來歸漢大夫之優游諒深自得以華晩節以勵能臣帶御器械某知閤門事敕設上閤之官豈惟掌朝㑹之事選名門之子抑以儲將帥之才具官某志在事功家傳韜略奏最于淮隂為侯之地易鎮于亞父所封之城聞父喪而棄官人咨其孝承召命而引道朝賞其忠釋苴杖以趨班屬櫜鞬而衛上授之以仲叔圉之任可使當公西華之言惟子道臣道之知方宜軍容國容之俱習是將用汝尚其勉旃武功大夫殿前司選鋒軍統制李浩總轄牧放合轉一官久任有勞轉行遙郡刺史敕具官某兵久不用軍中累年勞以進武爵率有止法無得踰焉以爾久任戎務舉軍推其能出視駉牧善修馬政寵以郡刺史之職蓋異恩也其奮事功以圖報稱侍御史張叔椿權吏部侍郎敕朕祗膺丕緒董正具僚六部之分莫如選部之為重小宰之事豈應冢宰之兼行輟而風憲之嚴司我銓衡之舊具官某性資凝粹論議正平襲永嘉之儒風蚤收科級守文昌之家法雅擅鄉評再䇿足于朝行幾問津于禁路進班柱史君舉必書攝事天官吏姦無蔽自擢居于横榻久肅正于南臺當予御圖三日之禆俾爾正位貳卿之列規模素定要須甄拔之盡公藻鑒益明無使賢愚之同滯副兹隆委成爾脩名左司諌章頴侍御史敕具官某朕臨御之初精求政體正心以正朝廷正朝廷以正百官朕之所務也然一朝之綱總于憲臺一臺之柄屬于端公茲得其人他可類舉以爾秉心堅正燭理融明學問之懿察于朱邸横經之日風節之峻見于諫省論事之際不俟信宿擢之南牀其為朕别白正邪振舉蠧弊使君子有所恃小人有所畏四方風動而朝廷益尊于予初政豈曰小補之哉右正言黄艾左司諫敕具官某古者天子有諍臣七人而後之諫官不過一二苟非精擇正士何以補衮職之闕哉朕御圖伊始下詔以來直言舊學之臣聲著騎省首命序進以示四方爾發藻士林負敢言之氣事朕宗邸動有箴規輟任拾遺兼侍經幄風采凜然聞于中外茲庸命汝官以諫名予違則汝弼汝言則予從豈惟身處寡過之地庶幾海内之士聞其風者有樂告以善道之益焉國子司業李祥宗正少卿敕具官某爾樸茂忠恪見推士林頃貳司成學者厭服蓋平日踐履之效是可以聲音笑貌為哉司宗少列位亞容臺叙百世之本支修累朝之史牒惟老于文學著述不倦者可以當之舉以命爾公論惟允勇退之志亦可以少囘矣吏部郎官葉適國子司業敕具官某國家萃天下英才而置之學選于衆而為之師經術由此而明人物由此而出豈細故哉朕御圖之初思欲作新學者耳目求當今第一流素為天下士所推服者以正師席宜莫如汝矧茲郎潛資望俱稱故用之不疑傳不云乎善待問者如撞鐘叩之以大則大鳴叩之以小則小鳴惟汝足以當此哉司農少卿蔡戡司農卿敕具官某大農本周稷之業自漢名官以來惟朱邑號循吏鄭康成為大儒唐之叚秀實以忠節自奮官人以重顧不信歟爾以儒術治行選為少列徊翔朝行最為舊人進而為長雖曰序遷益勉所長以紹乃祖之風烈何止為此官之重哉劉光祖司農少卿敕具官某忠直之士為國之寳本朝名臣豈無以直道去國者旋復召用以至大位此又祖宗之家法也況爾予之舊學相從有年執法殿中號稱謇諤雖嘗引去聖父任以外臺帥閫之寄不使之一日家食也茲庸命爾為少列于大農實為多士先尚遄爾驅以副朕傾徯之意顯謨閣待制黄裳給事中敕眇予沖人臨政伊始惟我太上知卿最深朱邸談經專任以輔導之事銀臺批勅又屬以出納之言雖抗論而遷厥官終留行而不使去至今日而復用豈人力之能為具官某學貫九流識通千古世居劍外擅蜀士之雄文地近闗中挾西人之勁氣是非邪正惟務體國利害禍福不知有身久從吾游備見爾藴迨此纂承之日付之封駮之司將求多聞毋替諄諄之誨不負所學㑹觀諤諤之言倚注方深權輿于此新除起居郎陳傳良中書舍人勅朕嗣膺大統收攬羣才朱邸賢僚豈容居外紫垣老手宜俾為真具官某學探聖原文追作者論議多先儒之未發行藏惟古人之與稽相從兩載之餘信為三益之友謂左氏真得春秋之旨謂周官實為太平之書推祖宗之本心明政事之要道昔信其説將行所言首畀故官洊加新渥矧是纂承之始尤資播告之修大老之居海濵是將焉往舊學之遯荒野其遂來歸式遄爾驅以副朕望起居舍人彭龜年中書舍人敕中書造命之地實王政之所先内史代言之官非賢才而孰處我有舊學時為名流擢登詞垣實預國論具官某為有用之學抱軼羣之才惟其善養之氣剛遂使所居之官大班分螭陛視言動而必書額叩龍墀抗威顔而不撓方朱邸横經之日多赤心憂國之言迨膺超除深允衆望訓詞温厚爾其振盤誥之文朝夕論思爾毋廢箴規之益尚圖忠報奚事多辭將作監黄由起居郎敕具官某王者嗣膺丕祚首用舊僚非欲私我所與而厚平日之恩蓋將舉吾所知以來當世之士列爾二史助予一人以爾蚤冠儒科久儀朝路不以仕已為意而益進于學不以利害為計而務極其言囊封既効忠嘉殿陛尤加剴切被眷知于慈扆為賓友于王門迨初政之方新與羣英而並進入則侍螭頭之左凡論事而直前出則班豹尾之中亦在法而當從是為爾寵期懋予衷著作郎沈有開起居舍人敕具官某朕踐阼云初涉道尚淺實賴二三元老力濟多艱更資左右近臣交修不逮惟平日賓僚之舊分一時言動之書匪予敢私惟爾能稱爾詞華敏贍學術淹通蚤蜚場屋之聲名久歴膠庠之師表以著庭而兼史筆之重由郎省而參宰掾之司比從予遊實自親擢學為可用閱義理以滋多中自不欺樂講論之日益其居柱下密侍朕前尚思嘉猷以助初政參知政事陳騤知樞密院事敕九五正位方承太上之傳二三大臣俱極當今之選用人由舊錫命維新既久貳于政機宜進專于省府具官某氣剛而不撓德盛而有容以博學篤志而為世醇儒以正色直道而致身近輔斯謀入告則惟后之德一夫不獲則時予之辜厚重若絳侯而有多聞之學彌縫若如晦故無揚已之名朕念周業之艱難慕漢機之周密睠我元老長予本兵藉東省之猷為領西樞之方略事均一體威示四方噫折千里之遐衝顧豈圖于近效建萬世之長䇿正有賴于訏謨其務同心以康庶事同知樞密院事余端禮參知政事敕文武兩途實歸一道東西二府允賴兼資粤予非涼膺此付託乃進鴻樞之貳俾參鬷嘏之嚴具官某宅心粹夷植操堅特凜凜有大臣之體謙謙得君子之風壽皇知臺察之名擢居法從太上眷儲僚之彦授以本兵唯然形憂國之誠卓爾任正君之責言婉而切氣勁以温故于宥密之司率藉調娛之力稽之公論蔽自朕心欲新政之設施宜舊人之圖任是資共二有賴同寅噫朕方求内外之安經理于上爾尚慮軍民之要彌縫其間庶幾有成其永無斁覃恩文臣承務郎以上轉官選人在任并嶽廟循資定詞敕具官某朕奉太上之慈訓嗣守丕圖踐阼之初大敷霈澤京秩而上咸進厥官選人在任云凡預選階有官守者皆許序進嶽廟云雖食祠禄咸許序進蓋將樂與士夫共起治功也各揚乃職以稱異恩文臣承務郎以上致仕定詞敕具官某朕仰惟太上不俟倦勤傳祚𦕈躬覃霈之頒仕者進秩雖致其事亦預此恩老吾老以及人之老王者之仁政也朕心庶幾焉端明殿學士知江陵府王藺資政殿大學士知潭州敕朕嗣居九重臨制萬國若刺史縣令之衆未暇究詳惟方伯連帥之功首當襃表眷時元老嘗秉鴻樞撫荆楚者有年易湖湘之重鎮具官某受天間氣為世名臣直節高風真可立懦夫于百世之下崇論宏議將欲舉明主于三代之隆受知兩朝致位四輔過江而見王導有國何憂舉衆而得臯陶不仁自遠控長江之都㑹建大將之鼓旗固邊圉以内周宣王靈而外暢惟予初政之急念茲舊弼之賢下詔求言方期樂告視邦選牧有賴于蕃惟此昭潭峙乎南服帶洞庭而負喬嶽扼嶺嶠而震蠻猺藉卿威名壯我藩翰加以大學士之貴用為東諸侯之先噫陶公之封長沙足倚上流之重賈傅之對宣室已深前席之思尚遄十乗之行以慰一方之望知常德府袁樞右文殿修撰知江陵府敕具官某荆州居國上游自古為用武之地謀帥之重每嘆才難以爾鯁亮之資淵博之學養氣以義不撓不阿有憂國愛君之心有憤世疾邪之志一辭禁闥家食累年起鎮武陵治行昭著寵以論譔之職以殿是邦朕承丕圖臨制四方萬里之遠謂斯民宅生于刺史故大明黜陟以示好惡由支郡而受閫寄爾實為初政第一選固圉靖民可不懋哉兵部尚書羅㸃父奉直大夫朝俊覃恩贈中散大夫敕朕祗荷慈謨嗣膺大統爰敷曠蕩之澤以及中外之臣矧喉舌是司兼領典銓之重而松楸在遠方深陟岵之思乃分寵光用賁冥漠具官某天資純茂族系繁昌早為君子之儒稱于里社自樂先王之道老矣丘園尚及郗超入幕之賓不見紀騭隔屏之坐素多隱行遂為大門兹登五品之崇足慰九原之望賢子方用侯封未央其歆綸誥之恩繼有蜜章之渥參知政事陳騤該覃恩封贈曽祖太子少保斆太子太保敕朕祇膺慈訓勉紹丕圖允賴邇臣共濟萬幾之務爰因惠澤特推三世之恩具官某積善素深本心無競恂恂有守既高月旦之評坦坦無營自樂衡門之老侈厥餘慶流于後昆進參政地之崇追賁儲僚之峻肆由亞保薦錫明綸用昭寵靈以慰冥漠曽祖母始興郡夫人成氏河南郡夫人敕朕履位云初均福于下有如近輔之重可後曽門之光具封某生于儒家嬪此名族動謹珩璜之飾克供蘋藻之儀是有聞孫晩參大政易翁源之舊壤開河内之新封隂報可知寵光未艾祖太子少傅䇿太子太傅敕圖大宅中方布維新之令建極歛福寔均共政之臣爰舉彝章加賁先世具官某履行純固禀資粹和福祉未央見生子生孫之盛人門俱勝無慙卿慙長之名申命九泉遂登六傅六傅見晉書何劭傳一本作太傅與下句意義混不可從茲進在前之職用為有後之榮尚惟不忘其克祗服祖母和義郡夫人朱氏博平郡夫人敕惟時近臣翊予初政厥有霈澤光爾前人具封某素稟嫕柔能循法度中饋攸職宜其室家慶源既深有此湯沐載啓博平之號益崇石窌之封是為異恩以詔幽穸父太子少師讜太子太師敕維予沖人嗣大歴服無疆惟休均暨海宇凡列朝籍皆得以榮其親矧二三大臣顧可後歟具官某尚友古人為世善士安時處順不求聞達藴蓄弗露是宜有子既執政柄寵及泉壤義方之訓蓋可驗矣乃進宫師以慰雨露之感英靈不昧其尚寵嘉之前母平樂郡夫人成氏文安郡夫人母咸寧郡夫人王氏濟陽郡夫人敕大寳是守賴兹臣鄰湛恩普覃燕及禰廟具封某克遵壼範能謹婦儀舉案事夫聿追德曜之羙斷機教子無愧軻親之賢既陟近臣屢揚卹典兹載疏于新寵用加峻于小君以寛吹棘之思庸示漏泉之澤妻東牟郡夫人宣氏封魯郡夫人敕丕緒紹隆方履重熙之運臣工翊贊宜均内助之恩庸頒鸞誥之華以詔魚軒之貴具封某靜專自守儉約有聞作配名卿能勉以正克主中饋用肥其家視夫爵以疏封由霈恩而改命乃疇曲阜載錫贊書尚迪令猷以祗茂渥禮部侍郎許及之該覃恩封贈父朝奉郎樞贈朝請郎敕朕祗荷慈謨嗣膺大統爰敷曠蕩之澤以及中外之臣矧吾貳卿欲罷先世可無渙渥以發潛光具官某坦坦幽人恂恂長者惟居鄉不變其素守而教子能知夫義方隱行有聞陽報如響親見儒科之擢蚤欣宦牒之榮遠奉安輿既愴九原之隔兹持禁橐何勝三釡之懷超官簿以升階冠郎曹而視秩是為曠典少慰孝思故母安人吕氏贈令人敕九五正位方承與子之傳小大羣臣俱有榮親之典載頒明命以示寵光具封某淑靜自將柔嘉可度嬪于善士克共蘋澗之儀生此名卿徒起棘薪之嘆既更事任遂陟禁嚴爰疏告第之恩以顯漏泉之澤尚其冥漠式克欽承繼母太恭人五氏封太令人敕此下同前九五正位六句具封某雅著壼彞恪循婦道儉勤自詔允為中饋之賢甘旨承顔坐享安輿之奉既登眉壽茂擁多祺乃因霈澤之行超示疏封之寵其祗朕命益侈爾榮故妻安人洪氏贈令人敕凡我從臣均此大霈爰及閨房之秀並膺綸綍之華具封某鍾慶相門流芳女範蚤從名士將仰望于終身胡嗇永年曽不登于中壽迨躋顯用嘗賁卹章兹超命服之榮用錫幽扃之寵姑從告第以慰悼亡妻安人潘氏封令人敕此下同前凡我從臣四句具封某稟姿靜專處已沖素動遵女戒克循待傅之言躬習婦儀果見從夫之貴治組紃而有度奉温凊以尤恭象服是宜鸞牋増寵其服恩光之渥以彰内助之賢煥章閣直學士中奉大夫丘崈磨勘轉官敕具嚴銓法所以示百僚之公優待從班猶不忘三載之攷爰頒命綍俾進文階具官某以抜萃之才負爽邦之望進貳民曹之重心計有餘出臨井絡之區威名益遠方謀陟典適㑹年老遂升漢大夫之名用為蜀太守之寵其祗渙渥嗣有殊襃見任侍從該覃恩轉官兵部尚書羅㸃以下首尾詞同敕朕嗣膺鴻祚祗遹燕謀九五正位之尊何德以稱二百餘年之業得人乃興眷惟禁路之英皆我慈皇之舊爰因覃霈首示優恩具官某以經世之才為致君之學早登朝著益顯時名久居侍從之班務竭論思之藴末光之依日月既親遇于三朝聽履而上星辰足儀刑于百辟方藉嘉謀之告亟升命秩之華其務同寅以光初政工部尚書趙彦逾具官某砥礪亷隅磨礱事業挺身徇國是為貴戚之卿正色立朝遂陟文昌之貴翰林學士李巘具官某德必有言文斯貫道蚤儀鵷序徑登紫槖之華進直鸞坡久被金蓮之寵刑部尚書京鏜具官某學博而智明才高而用大出分方面曽遠憺于王靈入踐文昌實坐司夫邦典兵部尚書耿秉具官某持論不阿修身無玷參華武部久儀法從之班共二瑣闈克振塗歸之職工部侍郎謝深甫具官某忠結主知才周世務雍容禁槖屢形批勑之風潤色邦條雅得稽經之意給事中黄裳具官某性稟精忠學窮奥義潛藩勸講賴誘進以最深瑣闥除官冀塗歸之如昔中書舍人陳傅良彭龜年具官某學貫九流名滿四海彭龜年云學識純明謀猷深遠横經朱邸遂依日月之光光制西垣期鼓風雷之號吏部侍郎張叔椿具官某迪德粹和受才膚敏久居横榻實高風憲之嚴兹任小天允致銓衡之重户部侍郎袁説友具官某器度恢宏風神峻整宣威天邑政允號于神明掌計民曹道深知乎取予禮部侍郎許及之具官某智術疏通詞章精敏拾遺諫省雅有諍臣之風掌禮儀曹克守先王之典起居郎黄由等該覃恩轉官起居郎黄由起居舍人沈有開以下首尾詞同敕具官某朕嗣應鴻祚祗遹燕謀九五正位之尊何德以稱二百餘年之業得人乃興眷惟近臣實有舊學爰因覃霈首示優恩爾早負時名進多朝望曵裾王邸熟陳六藝之格言載筆殿㘭允謂三長之良史方藉嘉謨之益亟升命秩之華其務同寅以光初政秘書少監兼權吏部侍郎孫逢吉爾學貫古今識分邪正比當年責是為諫諍之臣兹典選曹雅善銓衡之職侍御史章穎左司諌黄艾爾早陟殊科進多雅望曵􅅂王邸熟陳六藝之精微執法憲臺黄艾云澤笏諫垣獨振一時之風采監察御史并卿監郎官該覃恩轉官定詞敕具官某朕嗣服云初求賢以自助仰惟慈皇招徠衆俊寘在周行殆留以遺朕也覃霈之恩其可後乎爾職在六察秘書監云擢長道在卿云列在月卿郎官云列郎曹序進一階往其祗命之思所以助我者以報在外大中大夫以上官知州府該覃恩轉官顯謨閣學士中大夫知紹興府葉翥以下首尾詞同敕朕奉上皇之慈訓承列聖之丕圖霈乃渙恩覃于海宇矧是文昌之舊往宣屏翰之勞爰錫明緡俾躋命秩具官某材猷通敏德度恢洪聽履禁途坐閱十年之久分麾帥閫實為九牧之先方歌求助之詩仍加進律之寵在漢比千石之秩于今為四品之階其務欽承益思猶告煥章閣學士大中大夫知明州何澹矧惟中執法之舊往為東諸侯之行爰錫明緡俾躋命秩具官某學探藴奥名冠倫魁入總臺綱見藜藿之不採出臨制閫致波濤之不驚方歌求助之詩仍加進秩之寵在隋始大夫之號于今正三品之階通議大夫煥章閣待制知建寧府陳居仁矧是詞臣之舊往宣藩服之勞爰錫明緡俾躋命秩具官某禀資端亮秉德忠純擅西掖之雄文最宜為誥奏南邦之最課尤號近民中大夫煥章閣待制知鄂州王信矧是𤨏闈之舊往宣藩服之勞爰錫明緡俾躋命秩具官某詞源浩博才刃恢餘西掖東臺嘗備更于清選武昌夏口正倚重于上游中奉大夫煥章閣待制知鎮江府馬大同矧是文昌之舊往宣屏翰之勞爰錫明緡俾躋命秩具官某性資沈毅政術闓明持槖禁途嘗主民曹之大計分麾京口實當天塹之要津方歌求助之詩仍加進秩之寵昔倪寛則以誦書而擢若晁錯則由對䇿而除龍圖閣學士正議大夫知建康府鄭僑具官某學通乎百氏文根乎六經領豹尾之班雅有公臺之望分麟符之寄實為方面之雄徽猷閣學士中大夫知襄陽府張枃具官某才高一世氣壓萬夫聽履漢廷有張京兆之英譽分麾峴首追羊太傅之流風中大夫敷文閣待制知建寧府單䕫具官某才猷膚敏政術疏通持槖禁途坐閱十九年之久分麾侯服屢稱二千石之良煥章閣直學士中大夫知興元府章森具官某風儀峻整學術疏通持槖禁途嘗典銓衡之重分麾帥閫屢專方面之雄大中大夫敷文閣待制知瀘州呉總具官某家聲素著政術甚優四松而班殿廷實視從臣之清貴五月而渡瀘水正資邊徼之威名大中大夫煥章閣待制知太平州蔣繼周具官某才名素著經術尤高憲府宣威尚想聞于風采侯藩共理亦屢賦于中和寳文閣學士奉直大夫知遂寧府宇文价知潼川府閻蒼舒同詞具官某禀資膚敏植行粹和聽履禁途閻蒼舒云持槖禁途嘗出漢廷之右擁麾帥閫屢登蜀道之難攻媿集卷四十欽定四庫全書攻媿集巻四十一宋樓鑰撰外制在外大中大夫以上任宫觀該覃恩轉官龍圖閣學士正奉大夫韓彦直以下首尾詞同敕朕奉上皇之慈訓承列聖之丕圖霈乃渙恩覃于海宇矧是文昌之舊屢從閒燕之居爰錫明緡俾躋命秩具官某才周庶務仕歴四朝進長地官職論思而最久退安真館奉趨謁以甚恭方歌求助之詩仍加進律之寵爰陟文階之等遂冠侍臣之班其務欽承益思猶告煥章閣直學士朝奉大夫謝諤具官某純誠自守全德兼容聽履而上星辰已高勇退之節把麾而去江海竟尋嘉遯之風通奉大夫顯謨閣待制陳峴矧是瑣闈之舊久從蘂館之居爰錫明緡俾躋命秩具官某天資通敏門第高華入處東臺早儀簪槖之列出臨西蜀遂安香火之閒中奉大夫敷文閣待制吳益矧惟次對之舊久遂真祠之游爰錫明緡俾躋命秩具官某禀資和粹植行端良壯嵗逢辰已列甘泉之侍高懷去國惟求蘂館之閒大中大夫煥章閣待制劉國端矧是論思之舊久從閒燕之居爰錫明緡俾躋命秩具官某秉心無競持論不阿横榻宣威徑上甘泉之列西清寓職遂安蘂館之游大中大夫敷文閣待制賈選具官某才周世務識照事機憲部持平蚤列甘泉之侍閩山報政遂安蘂館之游在外大中大夫以上致仕官該覃恩轉官龍圖閣學士通奉大夫張大經以下首尾詞同敕朕仰奉慈謨嗣膺聖緒肆頒大霈覃及萬邦當代英才雖賜環而畢至前朝故老乃上印以言歸顧注想之方深豈渙恩之可後具官某純明而有執亮直而能容諫大夫之伏蒲明行甚肅大常伯之聽履物望愈高挹神虎挂冠之風寓龍馬負圖之職居然壽考允矣典刑比歌求助之詩庶有乞言之福爰陟文階之峻用為晩節之華其服寵光益介繁祉敷文閣直學士正奉大夫汪大猷具官某性通而自節道廣而能周雍容簪橐之班凡有謀而必告出入麾符之後乃未老而求閒辭滎上北闕之章寓職峻西清之舊正議大夫寶文閣待制沈樞具官某風猷高邁政術淹通揚歴禁嚴嘗任宫端之重周旋郡寄遂專帥連之雄聨次對之清班樂辭榮之嘉遯朝散大夫敷文閣待制李昌圖具官某才周通變氣禀直方登蜀道之難屢稱膚使出漢廷之右遂列從臣通次對之清班樂辭榮之嘉遯中奉大夫萬鍾直龍圖閣守本官致仕敕具官某朝廷用人豈容其無故而去臣子納禄或遂其知止之高爾以文奮身以才用世外臨兩郡既治行之有聞内列九卿非宦游之不達方將執筆于左螭之陛乃欲掛冠于神虎之門畀以河圖之華成而緜上之隱是或一道毋有遐心著作郎李唐卿江東提舉太常丞吕棐湖北提舉敕具官某等朕惟一人之聰明不能周知天下之故分道遣使不惟寄耳目于外臨遣朝士又得以宣布予之德意志慮于民常平以斂散為職括山澤之利事顧不重哉爾唐卿心平而論篤久于著作之庭爾棐氣勁而言忠丞于禮樂之地俱以儒學老成見于有用治縣稱最寘彼周行輟從郎曹將我使指一往大江之左一往重湖之北各揚乃職朕不汝忘知建康府鄭僑吏部尚書敕金陵為王者之宅固有藉于保釐吏部有天官之名尤欲精于流品粤求舊德復領從班具官某執德不回秉心無競舉明主于三代之上倡諸儒以六經之文論思不憚于犯顔封駮尤高于批勅出臨鄉部載守留都肆纂承丕祚之初乃董正治官之日亟頒召節方欲聽尚書之履聲盡付銓曹豈令書干木之紙尾佇聞猷告其疾爾驅太常少卿詹體仁太府卿敕具官某容臺之禮樂外府之財用其實皆政也後世治出于二而後有流品之分然禮以養人為本又曰樂以殖財惟知古道者能言之爾好古而志于用頃由道山冊府出為常平使者遠護軍儲能聲益昭歸處少列明禮修樂亶惟其長序進卿長上以佐民曹之調度下以柅有司之出納以若之才不勞而辦朕將思所以用汝者焉監察御史曾三復太常少卿敕具官某憲府設屬以六察為重容臺少列非七寺之比壽皇厭朝士之數易御史峩廌或二三年而不遷若其察事能審敢言不阿擢居禮樂之司不以為吝士亦以此競勸朕之用爾蓋此道也爾氣剛而克和才敏而能詳其在周行表表自立報政于輔郡簡僚于南牀助正臺綱閱時最久朕知其有靖共之譽故拔而用之禮方從宜大饗伊邇引經据古使禮行于上而人孚于下朕于是望汝焉李壁秘書省正字敕具官某惟爾父爾兄並游英俊之躔有臯綬之遺風無歆向之異論能繼厥後爾惟其人自登世科亟寘冊府銜卹萬里素冠三年召收來歸復畀舊物豈惟以是正簡冊望汝史事甚重爾有家傳朕將于汝乎求之知樞密院事趙汝愚該覃恩封贈曽祖太子太保士慮少保敕朕祗膺慈訓勉紹丕圖允賴邇臣共濟萬幾之務爰因惠澤特推三世之恩具官某宅慶璇霄聨芳寶牒少而從宦雖官政之莫施孝以宜家諒躬行之無媿侈厥餘福流于後昆進參宥府之崇嘗賁儲寮之峻兹疇故典遂陟孤卿用昭寵光以慰冥漠曽祖母安郡夫人龔氏崇國夫人敕朕履位云初均福于下有如近輔之重可後會門之光具封某生于儒家嬪我皇族動謹珩璜之飾克共蘋藻之儀爰及諸孫進居兩地遂啓封于大國以錫命于小君隂報可知寵光未艾祖太子太傅不求少傅敕圖大宅中方布維新之令建極歛福實均共政之臣爰舉彜章加賁先世具官某履行純固禀資粹和生長承平及見累朝之全盛始終信厚遂臻後葉之繁昌進秩青宫申命黄壤兹以湛恩之布徑躋亞傅之榮尚惟不忘其克祗服祖母濟陽郡夫人晁氏濮國夫人敇惟時近臣翊予初政厥有霈澤光爾前人具封某素禀嫕柔能循法度中饋攸職宜其室家慶源既深有此湯沐載啓濮陽之號益崇石窌之封是為異恩以詔幽穸父太子太師善應少師敕維予沖人嗣大歴服無疆惟休均暨海宇凡列朝籍皆得以榮其親矧二三大臣顧可後歟具官某孝友實根于天禀躬行無愧于古人為吾宗盟之表善言善行稱于搢紳即世之後隱然不忘是宜其有子也寵及泉壤遂冠六傅兹以周官貳公之秩以告于第且以慰雨露之感英靈不昧其尚寵嘉母饒陽郡夫人李氏申國夫人敕大寶嗣守賴兹臣鄰湛恩普覃燕及禰廟具封某克遵壼範能謹婦儀四德備全恊山水之高趣三遷垂教為廊廟之鉅賢屢錫恩封以昭寵遇乃開申伯之國載徹饒陽之封以寛吹棘之思庸示漏泉之澤妻通義郡夫人徐氏安定郡夫人敕丕緒紹隆方履重熙之運臣工翊賛宜均内助之恩具封某婉嫕自將柔嘉可度克相夫子遂為當代之名卿乃嗇天年不見機庭之異數亶敷寵渥豈間幽明用疇涇水之封載徹眉山之舊尚惟英爽欽此卹章簽書樞密院事羅㸃初除封贈曽祖起太子少保敕延登邇臣翊贊初政維時偉望進參宥府之嚴庸錫明綸以厚曽門之寵具官某持身無玷制行有嚴寡悔寡尤自潔幽人之履以嗣以續遂開餘慶之源厥聞惟彰其後乃大爰畀青宫之秩用疏黄壤之恩尚惟不忘其克祇服曽祖母陳氏臨川郡夫人敕參宥密之司是謂百僚之表煥顯揚之典宜加三世之榮具封某婦德素充姆儀尤備柏舟自誓知勤苦以成家彤管有光篤義方而教子至孫曽而遂顯信隂報之不誣錫命小君疏封鄉郡以侈漏泉之澤以彰告第之恩祖琢太子少傅敕士有積德在躬弗見于用施及後嗣追榮厥先于百年之後豈人力所能致哉具官某孝友天禀義概素篤人不間于其昆弟之言深沈不二安分知足長者之號著于鄉黨積此慶羡篤生樞臣申命九泉遂登東儲六傅之秩如有知也庶克自慰祖母鄧氏新興郡夫人敕登用大臣所以贊廟謨也錫命之初則必有以寵其先世又所以示優典也具封某勤儉柔淑如古賢婦克相夫子以廣義風為族婣之所依賴含飴之愛素篤于生前雖不及親見其貴而湯沐之頒方來未艾榮亦至矣新興名邦用賁冥漠惟爾靈其預享之父贈中散大夫朝峻太子少師敕積厚流光既陟機庭之峻位高寵厚肆崇禰廟之恩厥有故常式昭渙渥具官某操履純固性資靖夷共被對床素深同氣之愛指囷倒廪尤高周急之風是鍾令子之賢親見儒科之擢速超登于近著嘗屢被于卹章進位宫師疏榮泉壤庸示教忠之效庶寛追遠之思母齊安郡夫人繆氏封通義郡夫人敕遴選名儒密贊紫樞之貴推恩賢母式頒鸞誥之華具封某性秉賢明動循鑒戒從夫協趣克共蘋澗之儀教子有方首擢桂林之秀承顔甚樂就養有年受福祉而未央見寵光之狎至兹易眉山之號用崇石窌之封其服異恩益介遐壽妻贈淑人黄氏永嘉郡夫人敕進秉事樞實倚朝廷之重載疏湯沐以旌閨閫之賢具封某禀姿懿柔處已莊靜毓慶儒族知女則之不踰作配名卿循婦儀而克謹云何不淑弗見顯庸兹疇甌海之雄用錫鸞牋之寵姑從告第少慰悼亡妻淑人陳氏封咸安郡夫人敕進秉事樞實倚朝廷之重載疏湯沐以旌閨閫之賢具封某鍾慶相門流芳女範無違夫子形鵲巢積累之風宜其家人有鳴鳩均一之德克謹旨甘之奉居惟法度之循兹開名郡之封用錫贊書之寵其祗異渥益懋芳猷中書舍人彭龜年兼侍郎敕朕自臨帝位首闢經帷詳延舊學之賢不改潛藩之舊具官某始以德選久從吾游素知朕意之所安況有詔書之備列不待多訓自應具知惟孟軻所著七篇之書非戰國以來餘子所及蓋嘗三復其説間有一得于中若知言養氣之難存心盡性之妙人無不善聖可踐形正須反覆屢陳使予通徹無蔽若夫爵禄之制井地之規凡諸所傳皆我當講食云則食坐云則坐朕當審尊賢之方義莫不義仁莫不仁爾其務正君之學給事中黄裳禮部尚書敕朕嗣膺大統首擢舊僚然建安七子之賢先推徐幹商山四皓之盛最數黄公徑躋八座之崇庸侈一時之盛具官某學足以充其性辯足以達其心貫穿經史之言而纚纚可聽論議古今之變而歴歴如睹自予幼學屢得良師若夫上皇委任之專潛邸游從之久無間于我未有如卿規過舉則何止血山之言執正道則不數邪蒿之説開性天之所蔽知學力之自來幸不容甘盤遯野之行是宜被伯夷典禮之命孺子王矣方夕惕以爾勤良言旨哉尤日資于獻納其祗予訓益勉爾忠著作佐郎王容范仲黼並著作郎秘書郎王奭校書郎蔡幼學並著作佐郎敕具官某等學士大夫以道山冊府比之蓬萊瀛洲之勝而著作之庭又其高選也爾容學博而文優爾仲黼忠純而意篤既皆升處其長奭之遠業幼學之英才又均使為之佐或以倫魁而聲稱昭于時或以名門而學問世其家是皆稱此選者朕篤意人材共興治功公卿將于此乎取何止以史事而望汝哉秘書省正字顔棫秘書郎項安世吳獵並校書郎敕具官某等比嵗一日給札而得三俊館閣之盛舉也然秀頴之才將于此乎養之以待用若棫之聲名發于上庠獵之才略著于劇縣安世之節概又士論之所推是三人者不惟老于文學又俱練于世故舉而用之何所不可況年皆自强而艾固無俟乎菁莪之育也兹命棫典中秘書獵與安世為校讐之職姑以序遷朕將有以用汝焉浙西提刑黄遹湖南運判江東運副傅伯壽浙西提刑敕具官某等朕分道遣使以寄耳目于外地有遠近職有劇易選任之意則無不均爾遹以諒直之姿抗澄清之志使于近畿威望甚聳引疾求退故畀爾以湖外漕計少休其勞爾伯壽以精敏之才在文章之選使于江左職業日修惜其久外故授爾以畿甸臬事引以自近然飛輓讞議二者俱重事也一日不理則必有受其弊者其各勉旃以稱予選知樞密院事陳騤初除封贈曽祖太子太保斆少保敕朕嗣守大寶凛乎重器所賴左右大臣輔其不逮乃由政地進陟機庭追榮厥先是有彝典具官某隱德不耀躬行有餘孫子相承代傳清白之訓施及三世遂登廟堂推恩泉壤至于再三是必有以致此也兹舉周官孤卿之秩以告于第尚惟歆承嘉命佑爾後人曽祖母河内郡夫人成氏滕國夫人敕夫人之號古者謂之小君歴觀在昔蓋未有無因而得之者也具封某躬節儉之行有柔嘉之德克相夫子以肥其家隂功所昭至于孫曽而後見湯沐疏寵蓋嘗歴始興河内之郡今茲封國間于齊楚庶幾冥漠其克自慰祖太子太傅䇿少傅敕學士大夫必知尊祖非獨禮典之攸尚至于為世顯人往往推迹先世之所自隱德彰著其應不誣具官某出太丘之華胄生赤城之儒族棲遲衡泌不以利欲貳其心躬行之篤見信鄉黨雖不及施用于世而積厚流光屢被追榮之典兹登亞傅品秩益崇如有知也可以無憾祖母博平郡夫人朱氏崇國夫人敕婦人之爵必從夫子若夫異恩之頒加賁王母非二府大臣則不預此具封某動遵圖史雅習組紃婦道甚飭隱然朱陳之好也含飴之愛素篤雖不及親見其貴而積善之效乃暴白而不可掩疏封一國以為廟室之光父太子太師讜少師敕陳氏著姓自媯汭之後歴三代建國不絶漢以來多名卿大夫百世相望君子之澤未泯亦可謂盛矣具官某以隱逸遂其性以詩禮訓其子内行之積既有以大其門閭而教忠之效卒為朝廷之端士存殁雖異哀榮則均夫三孤之長貳公洪化有子如此遂申命于九泉豈惟慰爾子深長之思亦所以示予體貌之意前母文安郡夫人成氏杞國夫人母濟陽郡夫人王氏信國夫人敕延登樞臣所以贊廟謨也錫命之初必有以寵其先世又所以示恩典也具封某禀姿婉嫕處已儉約有光彤管之訓不愧采蘩之詩是有賢子為吾近輔副筓六珈屢頒石窌之封矣兹徹沐邑改命于杞伯所都之地王氏云命于廣信之區以勸天下之為人婦者妻魯郡夫人宣氏封魏郡夫人敕朕初膺丕祚晉用近弼惟東西二府兼以任之夙夜匪懈是可不厚其内助之恩乎具封某性資賢明能循法度歸于名士用勤儉以起其家閨閫之政不以累焉使得一意精白以承休德是足嘉者兹啓大名之郡以詔予寵其尚祗服永綏燕譽知樞密院事陳騤該覃恩轉官敕朕祗荷慈謨欽承丕緒萬幾之務每懼弗堪共政之臣實資夾輔因霈恩而申命覽遜牘以力辭序進一階僅同百辟具官某忱恂而堅正渾厚而温恭久處從班以嘉謀而入告自居宥府任大事以不疑比當内禪之初嘗求小毖之助善調庶事動懐永圖執義示公惟知議軍國之利害忘身徇主豈復計官資之崇卑乃詔攸司俾行故事不已循墻之避遂忘反汗之嫌矧東府彌縫之是兼尤當代觀瞻之所繫姑循撝謙之志稍行進律之褒噫文武兼資尚深思于並用内外無患當益勉于交修惟肩乃心以翊予治參知政事余端禮該覃恩轉官敕朕以寡昩之資傳泰安之祚既登九五之正位允賴二三之大臣盍因覃霈以疏恩終以謙辭而改命具官某崇深而有裕莊肅而能容幼學壯行終始勿渝一節出藩入從精白不形二心比參鴻樞實贊初政俾進居于東府仍兼領于宥廷一日萬幾之繁既調娛而曲當三軍五兵之問又該綜以無遺雖官簿之當升曽身謀之不顧命由中出事則公行何陳義之益高乃抗章而不已姑徇三辭之請僅升一秩之華噫訏謨遠猶乃所望于賢輔高爵厚禄豈有吝于予懷其尚欽承以副隆委四川制置使丘崈煥章閣學士再任敕乗乾德以御圖始受四方之籍念坤維之作牧久分一面之權眷威惠之並行豈恩榮之可後寵加延閣因任帥垣具官某道廣而能周才高而善下躬履冰霜之操手揮河漢之文握節擁麾所在著神明之政簪筆持槖周行推仁義之言頃出鎮于成都實總臨于諸道先聲所暨遠俗自孚瀘川除暴之餘施賞刑而曲當武興闕帥之久藉方略以無虞兵民無不歸心奸宄為之破膽封陲宴若政績炳然東西六十州敢違號令幅員數千里燕及羌髳寛朝廷之顧憂信京師之流福堯章増煥正學士之清班蜀道借留慰吾民之素望示予隆睠表爾異能德裕籌邊何止山川之洞見孔明識治或言禮樂之可興益懋前功以需登用朱熹煥章閣待制侍講敕朕初承大統未暇他圖首闢經幃詳延學士眷儒宗之在外頒召節以趣歸徑登從班以重吾道具官某發六經之藴窮百氏之源其在兩朝未為不用至今四海猶謂多竒擢之次對之班處以邇英之列若程頤之在元祐如尹焞之于紹興副吾尊德樂義之勤究爾正心誠意之説豈惟慰滿乎士論直將増益夫朕躬非不知政化方行帥垣有賴試望之于馮翊不如置之本朝召賈傅于長沙自當待以前席慰茲渇想望爾遄驅翰林學士李巘寶文閣學士知婺州敕登鼇戸以摛文久資潤色分虎符而出守有賴蕃宣中外雖殊眷倚無間具官某性資淵靜學問該通視八代文章之工欲齊驅于藝苑極三朝辭命之選幾獨步于禁林周旋十年終始一致古事今事問無不知公門私門行皆可迹方進遷于翰長何遽動夫歸思寵西清學士之班仍寓宸奎之職為東方諸侯之長更當寶婺之躔是誠岳牧之用人宜有江山之為助徒得君重其為朕行勉著民庸以觀儒效檢正應孟明太府卿敕具官某爾以純一之德惻怛之誠見于牧人御衆之間備著愛民利物之效召由帥閫徧儀宰掾蓋朝列之老成士林之標表也外府上佐大農之調度下柅有司之出納卿士惟月實艱其選舉以命之公議允諧問津要途自茲始矣右司徐誼中書門下省檢正諸房公事吏部郎中錢象祖右司刑部郎中沈作賓檢詳敕具官某等朕初政是圖惟二三大臣夾輔之賴樞機至重當先其大者豈可以細故縈之于是詳擇掾屬以次而遷爾誼深沈而善謀爾象祖詳審而無滯爾作賓在郎曹有通敏之稱其為朕簡節疏目清東西府之務俾吾大臣惟振綱絜領以贊予遠猷則爾為稱職矣吏部郎官李沐將作監敕具官某東都李固好學尋師同業不知為司徒郃之子其所成就復為李公爾以輔臣之子退然寒生蚤擢甲科仕進甚緩文敏而蔚追企古作郎潛既久避遠繁劇處之繕監以遂其志素尚如此遠業未可量也軍器監承汪梓倉部郎中大理寺丞周珌刑部郎官敕具官某等列曹為郎其選俱重非治郡有聲績者不預焉國家行之幾三十年弗可改也已爾梓博涉文學有志事功出守都梁邊防甚飭爾珌明習憲法恪意操守濡須之政田里妥安況俱以名臣之子嘗在朝列奉最而歸宜登兹選肆令並命以究爾能積貯者天下之命寛仁者累聖之規深體至懷各贊而長兵部侍郎耿秉煥章閣待制知太平州敕入而奉上為言語侍從之臣出則殿邦任蕃宣屏翰之寄士之從官是為通顯國之用人初無重輕第于臨遣之間終惜老成之去具官某天資鯁亮政術精詳自其居下位之時已有澤斯民之志功利及物既所至而可稱懇惻愛君凡有猷而必告甫上甘泉之列亟求故里之歸旋即賜環復令持橐為真武部固有賴于論思攝事瑣闈尤見推于抗直比力祈于補外亦深察其由中畀以當塗真是太平之官府寵之次對仍聨兩禁之清班用昭眷懷増重侯度訪民碞之疾苦諒無假于訓辭控天塹之要衝尚往圖于方略勿以在遠而忘獻言大宗正丞李大性軍器少監兼權司封郎官敕具官某朝士之職優而事簡者無如二監非所以處才者然而銓序人物具有差等不可廢也爾一門競爽刻意記問出而丞邊郡入而簉周行心計有餘遇事多辦進貳戎監仍攝郎曹益務靖共以俟選擇大理寺丞彭演大宗正丞敕具官某朕惟國家本支百世繁衍盛大高出近古既擇屬近行尊之賢者以糾合宗盟又選學士大夫以貳其事職雖清簡不以輕畀也以爾經術該綜吏事精明丞于外府于廷尉踐揚既久而後登此蓋亞于三丞之選仕益進矣優游養望其進未央大理司直朱致民大理寺丞陳樸大理司直敕具官某廷尉天下之平而國家設屬為尤備囚徒之聽自昔以吉士臨之奏當之成今又使分董而察焉以爾致民儒學老成久預臬事故俾升而為丞爾樸才具資品皆應近制故以為邦之司直朕嗣服之始專以祖宗家法為務雖罔兼于庶獄懼不獲于一夫各既乃心毋懈于位太府卿詹體仁直龍圖閣知福州敕具官某朕覽長樂之志知其地大物阜真東南一都㑹也帥守掄才初政為急以爾學問該洽性識深明試之劇繁所在辦治入為九卿嚮于用矣願求閩部求便其私徑疏晝錦之榮仍畀河東之直跨州連邑要風氣之不殊並海負山賴威名而為重倚觀政績以究爾能廣西運判張釡直秘閣知廣州敕具官某朕臨御萬國一視同仁嶺海之遠待猶畿甸矧番禺重鎮實控南服謀帥之際其何可輕以爾紹興舊弼之孫以家學登世科潤飾吏事所在稱辦湖湘明歛散之宜廣右謹將輸之要就移五筦之長以當一面之權寓直道山以為爾寵爾其填撫遠氓招徠海賈斥貪殘奬亷介以稱予倚任之意是惟休哉知建寧府陳居仁知鎮江府敕由詞掖以偃藩久騰善最分輔邦而易鎮用奬賢勞宜錫明緡以昭寵數具官某風猷凝粹心地平夷識者嘆其遠道之資望而知為大度之士文華緯國久從鳯沼以代言愷弟宜民屢以虎符而出守恩威並用寛猛適時不惟人樂其中和所至嵗為之登熟眷兹京口控彼江津城郭増雄有山川之映發兵民雜處無牒訴之浩繁屬旱魃之為災賴賢侯之勤撫毋庸臨遣亟望遄驅坐理南徐其首修夫荒政時登北固尚有賴于良籌惟服訓詞嗣圖襃表瀘州安溪寨蕃官王鑒男天麟承襲補承信郎敕某國家填撫萬邦燕及方外惟爾父祖恭順相傳爾之承襲請命于朝武爵之頒益務忠謹江西運判趙鞏直顯謨閣知隆興府敕具官某國家選侯甚重謀帥尤艱既懲數易之繁重戒迎新之費就移使節俾正帥垣爾受才甚高得譽最早以文學之彦為慈惠之師其在合肥極論淮錢之弊迨移䕫子載言蜀戍之詳主漕計以宣勞總邦條而攝事撫綏凋瘵賑救凶災因江西頌韋侯之言念河内借宼君之意徑令洗印以遂開藩俟訖外庸成爾歸志沈清臣江東提舉敕具官某士有自重其身而輕視軒冕嘉遯于世而獨樂山林是雖出于一概較之浮競者相去遠矣此有國者之所當與也爾以古學為任不計時之用舍頃游館學從予潛藩儼然自持古之畏友也茲予纂紹念爾退閒起以江左之節用慰家食之久其尚少安以俟恩渥中書舍人蔡幼學兼侍讀以下二首嘉定元年以吏部尚書兼翰苑偶西掖無兼員用故事行詞併附于此敕春秋天子之事具存一國之書筆削聖人之公實為萬世之法朕久勤講貫期廣見聞兹擇名儒共論斯道具官某深知經旨素有師承未冠而擅論魁士皆取則既壯而登膴仕人以為遲近升禁路之華庸代王言之重予欲旁通夫六藝豈容弗措于一辭所以至日昃而不遑庶幾學古訓而有獲懲惡勸善其力究于微言攷古驗今將益明于大體蔡幼學講詩終篇轉官敕朕踐阼十五載尤先講貫之勤誦詩三百篇端賴緝熙之益談經既畢第賞可稽具官某早冠時髦寖為朝望踐揚已久既昭著夫外庸獻納于今喜時陳夫讜論謹鳯掖代言之職當金華卒業之辰序進文階以酬儒效其罄格心之學用為報上之忠攻媿集卷四十一欽定四庫全書攻媿集卷四十二宋樓鑰撰内制擬進郊祀御札紹熙五年也郊是年七月光宗禪位寧宗未嘗祀篇中有寖厯六年云云盖在光宗未禪位時豫擬而事不果行朕祇膺慈訓嗣守洪圖仰天地之儲休以綏四海賴祖宗之垂裕寖厯六年欲涓長至之辰載舉親郊之禮膏澤可占于農扈信盟乆締于鄰歡汔可小康敢忘昭報率由舊典無事虛文上萬夀于重親式嚴孝治均蕃釐于兆姓匪鄉朕躬按令甲以陳儀體先庚而申命朕以今年十一月祇事于南郊播告中外之臣咸謹駿奔之職其飭爾事毋愆于儀故兹札示想宜知悉擬立皇子喜王皇太子制朕祇若大猷紹休列聖念承祧之重允屬元良惟主器之嚴莫如長子仰稽古制詳攷舊章匪予一人之私繄爾四海之望誕揚明綍敷告天廷皇子具位某夙禀謙恭動循儀法生長帝王之胄周旋詩禮之經迨予纘承勉爾諭教宏開邸第寵之茅土之封妙選英賢為之羽翼之助而能服勤講貫尚論古先閲義理以滋多屏驕奢而不顧朕惟儲貳不可以曠位國本宜先于正名其從朱邸之尊入䖏青宫之重於戲立嫡以長所以綿宗社之休為下得人所以係臣民之望擬進登極赦文紹熈五年七月五日朕共為子職日守宗藩烈祖上賔曽未釋服聖父違豫㡬不勝喪屬上意之倦勤屢思退託䝉太皇之出令遽命纂承眇兹沖人膺此大器驚惶失次涕泣固辭謂二百年社稷之傳豈容執遜惟億兆人謳歌之戴乆已屬心仰有體于慈謨俯難違于衆志祇承丕祚以撫萬方自維寡昧之資深思付託之重祈天永命用綿龜鼎之休發政施仁首播風雷之號可大赦天下云云於戲奉三無以勞天下敢懐以位為樂之心歛五福而錫庶民盍布與物惟新之澤罔閒遐邇之衆咸瞻曠蕩之恩季秋滛雨震電罪已責躬詔紹熈五年十月朕臨御以来三閲月矣廼者洚水為災畿甸尤甚悉意賑撫未知攸濟而又隂氣為沴天作滛雨繼之震電信宿猶未已也時維季秋實已孟冬兹豈其時耶變不虛致朕甚懼焉豈朕之徳薄不足以承祖宗之休烈抑眇躬有過朝政或闕而致然歟雲漢之詩遇災而懼終篇惟及靡神不舉靡愛斯牲等語葢言如此而天災之見罪必在我側身修行之誠見于言外此朕之所當勉也朕欲應天以實而方執夀皇之喪避殿撤樂皆無以自見惟是罪已責躬其曷敢後布告中外使知朕恐懼修省之意孝宗祔廟徳音紹熈五年十二月朕躬繩祖武日懋孝思萬邦之君允有貽孫之典七月而𦵏適當同軌之期悵莫報于皇慈惟謹襄于大事卜夏禹廵狩之地近高廟衣冠之藏載謀載惟既營神域必誠必信已窆靈輿迓吉仗以言旋肅太官而班祔縟儀云備舊制可稽固已遵三年之通喪體累朝之儉徳蠲除浮費戒節虛文然念遺誥初頒都下有奔號之擾因山之際國人多供億之勤未免煩㑹稽之徒宜特肆櫟陽之赦神祇效順咸議恩封官吏宣勞均行賞賚寛井里之賦調清囹圄之縲囚庸推澤物之仁用繼憂民之志於戲蒼梧不返人心惟慕于重華温洛未歸陵邑尚安于永阜咨爾有衆服予異恩改嘉定元年詔朕嗣承大統勤撫庶邦更星紀之一周見厯元之三易頻年相繼寰宇多虞邊釁遽開顧生靈之何罪蟲蝗為孽與旱潦以相仍皆權臣誤國之致斯在菲質應天之敢慢方今典刑已正綱紀益張乃因正月之和適際三陽之泰誕揚大號亶告多方取啇宗嘉靖之言暨周王耆定之義用光嗣嵗式迓休祥庶㡬叶氣之薰太平可望行見萬民之集得所為期衍丕祚于無疆與斯人而更始其以明年為嘉定元年戒飭貪吏詔嘉定元年三月十四日朕臨御以来仰遵累朝恭儉之規菲食卑宫靡敢怠遑庶㡬躬行以移風俗而志勤道逺觀感未孚况以姦倖㺯權故相同惡上下交利賄賂公行贓吏債帥益無忌憚監司為吾澄按之官郡守受吾民社之寄至相倣傚貪婪無厭反恃苞苴狼籍已甚席卷帑藏或盈鉅萬郡縣經費秏蠧㡬盡軍民衣食椎剝無餘積敝有年雖悔何及大臣簠簋不飭殆弗容遷就而為之諱也朕方厲精庶政與民更始申加訓飭以警有位繼自今各務精白一心以承至意其有並緣公家以濟其私尚為故態必罰無赦至如互送無藝屢形切責遐方循習曽不少悛並當禁戢或徹聴聞攷驗有迹皆以贓坐嗚呼咎莫追于既往法欲勵于將来宜存素絲之風毋蹈覆車之轍使人知自愛罔或敢干冀民力之少蘇期士風之益媺朕意厚矣尚其戒哉戒飭四川將士詔嘉定元年四月九日朕端居法宫慨念蜀道敢泄邇而忘逺庶一視以同仁自叛將之既誅與斯人而更始已講休兵之䇿冀臻徹戍之期惟是師徒屢更征役暴露乆矣夙宵惕焉毎咨督餉之臣仍飭列屯之師究心調度加意撫循然而養兵于無事之時在國家而靡吝効命于多虞之日乃吏士之當為儻饋運之或愆及勤勞之弗恤罔孚朕志豈逭官常凡爾在行亦宜深體其有狃于姑息不知律紀之遵妄肆讙譁㡬失等威之辨流傳易惑闗繋匪輕爰頒一札十行之書用嚴三令五申之制各思戒儆毋抵憲章閔雨求言詔嘉定元年閠四月二十六日朕惟祖宗傳祚之重祇懼靡遑而自去嵗以来蝗蝻為災冬既無雪春又不雨以至于今陂澤揚塵種未入土夏且半矣祈禬不應間有霡霂未能通濟天災流行固亦有之在于今兹闗繋實重邊鄙甫定流徙未復漕運不至糴價日増苟失嵗事何以保邦朕于宫中齋心致禱又將躬謁于靈神且飭臣鄰廣求民瘼六官帥漕各令條具可以慰安人心消弭天變者矣載惟雲漢之詩靡神不舉靡愛斯牲祈年孔夙方社不莫祈于天以及父母先祖不見責躬之言葢宣王謂周家祈禳之典既已備舉而旱既太甚是必在我有以得罪于天其遇災而懼側身修身之意藹然見于言外朕心慕焉固知大軍之後必有凶年不敢以此自解也傳不云乎屋漏在上知之在下人苦不能自知其播告中外凡朕躬之不逮朝政之缺失與夫田里愁嘆之由軍民疾苦之狀盡言無隐朕将採而用之庶㡬以實應天冀消災沴以迄康年無小無大惟既乃心稱朕意焉右丞相錢象祖等以旱蝗星變待罪不允詔朕臨御寖乆兢惕靡寧更化以来厲精深切雖邊鄙有息肩之日而民生當望嵗之時旱魃為災飛蝗肆孽方陽光之煜畫見太白之争輝豈天道之難知實朕躬之自致無所歸咎惟知反身尚虞抑塞之未伸正欲交修于不逮騰章来上憂國良深有何愆尤而欲引去退惟涼徳詎可不移于大臣所冀同心庶以靈承于上帝尚安厥位益逺乃猷趙彦逾再上劄子辭免端明殿學士并執政恩數不允詔卿以起部太常伯領䄂從班主耳忘身預陪國論金陵吾之北門固以謀帥為重文明之峻職政府之異數所以寵卿之行今欲辭二者而之鎮顧豈若留卿以自近乎朕慮之甚審乆而後發不應至此乃復反汗無以多言為也新除安徳崇信軍節度使伯圭辭免不允詔朕肇禋重屋懼弗克堪贊予盛儀賴我宗老首頒祭澤無加于達尊者乃因舊鎮益以漢東之大國備三公之典䇿兼兩鎮之節旄先正以為異數非如卿者其孰能當之何用撝謙以避斯寵新除少傅周必大辭免不允詔卿三朝元老身佩安危退處東山直欲棄置人間事顧豈以爵秩為心哉朕初臨御注想不忘下詔乞言疏恩進律亦可以見朕意矣覃霈之頒無逺弗届安有達尊如卿而可但已保傳一間不必固辭遜草甚力非朕所望趙汝愚再辭免提舉編修國朝㑹要不允詔卿進専國秉總領衆職無所不就固無待于兼官也國家以史事為重故必擇其尢重者屬之上相疊畀三組既已再命而又欲辭其一何耶㑹要之書故實所萃諸儒載筆坐總宏摹兼人之才豈復憚此其祇成渙以訖奏篇吏部尚書鄭僑辭免兼實録院修撰不允詔髙宗中興臨御三紀一代之史簡冊挐䌓設官累年汗青無日朕既命大臣為之典領思得鴻儒耆徳為諸儒倡卿自陪都還朝表儀從班論撰之重非卿誰屬矧惟舊物不待疇咨趣上奏篇毋勞謙避吏部侍郎彭龜年辭免兼侍讀詔朕開邇英之閣瞻無逸之圖上慕唐虞近法祖宗正有賴于啓沃之助卿以舊學之臣勸講多益升之進讀亦惟序遷朕方汲汲于舊卿欲濟濟相遜固經帷之美事也然雖有徳齒之尊不曰朝廷莫如爵乎其毋固辭徒稽朕命王藺再辭免知潭州不允不得再有陳請詔惟有周之盛時以分陕為重任故煩舊弼往鎮邊陲升秘殿之隆名易昭潭之巨屏輿言允協憂顧滋寛胡為再辭至勤三命粤漢詔流行之既久諒楚人徯望之已深倚聞叱馭之行毋執循墻之避新除四川安撫制置使趙彦逾辭免不允詔蜀道險逺人所憚入一之為甚其可再乎然朝廷為官擇人不免于推轂以遣忠臣忘身徇國豈難于叱馭而行昔趙抃以匹馬入蜀為政簡易及其再命神宗諭之曰近嵗無自政府復往者卿能為我行乎抃曰陛下有言即法也顧豈有例哉今朕知卿清節著于蜀遂用熈寧故事卿能體抃之忠其得辭行乎新知鄂州吴琚辭免不允詔卿奮自戚閈被服儒雅雖齋壇授鉞棘位通班人終以用未盡其才為言矧襄漢上㳺嘗騰善最武昌重地宜分顧憂何必固辭亟其祇命趙彦逾再辭免新除端明殿學士中大夫四川安撫制置使兼知成都府不允不得再有陳請詔蜀道天下之極險也然以為難則難于上青天以為易則易于履平地是在人爾卿嘗總軍餉度厯五十餘州公㢘明恕蜀人誦之兹庸命以制閫之寄蜀父老聞卿之来必有不待教而孚者矧視儀政地位望愈隆尤足以示朕不忘逺之意謀帥之重盖無以易卿者矣趙汝愚辭免大禮加食邑實封不允詔朕祇事總章懼弗克堪卿以端揆實専使領天地並貺神明顧歆熈事備成顯相之力也賦以多邑具有故實既免告廷之禮何事循墻之避新除刑部侍郎梁總辭免不允詔卿少習憲章厯觀棘寺為郎為卿皆以此選正以明練吏事心計有餘遂持使節遂董軍餉擢貳民曹俱􅃅稱職若今秋官虛員舍卿尚誰屬耶明允篤誠若自道萬里使使還徑俾為真僉曰汝諧何辭之有吴琚再辭免不允不得再有陳請詔朕立賢無方惟才是用亦不必曰右賢而左戚也爾嘗主漕計總軍餉出帥襄陽皆有治狀可紀而強仕之餘使之奉祠燕處可乎鄂渚兵民雜居號稱難治正倚才刃勿復謙辭王藺辭免覃恩轉一官不允詔朕嗣位云初覃霈四方小大之臣罔不均被卿以元樞舊徳出鎮雄藩序進一階亦惟彛典忽披遜牘殊咈眷懐其服恩光毋留朕命周必大再辭免少傳不允不得再有陳請詔朕勉紹丕圖方修初政首推霈澤溥及羣工惟予元老之賢宜陟孤卿之秩偃息而藩魏室何必在廷寅亮而命周官是為進律載披来奏殊咈眷懐卑于公尊于卿亦惟均耳一而俯再而傴何以多為兹繫具瞻毋庸固避梁總辭免奉使回程時轉一官不允詔卿輟自從班逺使鄰國服勞已甚成禮而還序進文階厥有舊典往祇渙命何事謙辭知明州何澹辭免曽任藩邸講官轉一官不允詔卿頃以儒英授經于朕逮予嗣服眷注不忘求之近比當進兩秩舊僚遜避俯徇其請在卿又何辭焉宜遂欽承毋至于再知泰州韓同卿辭免改授正任觀察使在京宫觀不允詔朕勉承丕祚肇正中宫爾為后父之親召自淮壖之守眷惟相種本出儒門屬王姬下嫁之恩致武爵流傳之衆兹優戚閈超授亷車俾仍奉于内祠葢一遵于故典是為允惬其又奚辭賜觀文殿學士致仕李彦穎銀合茶藥詔朕祇紹丕圖緬懐故老卿前朝舊弼佑我烈祖遺榮告歸世推典型比進嘉言尢見忠藎一水間之日勞注想爰頒飲劑以實寳奩問勞有加將予至意賜龍圖閣學士致仕程大昌張大經敷文閣直學士致仕汪大猷顯謨閣待制致仕程叔達寳文閣待制致仕沈樞敷文閣待制致仕李昌圖銀合茶藥詔朕寤寐賢俊懐思老成卿頃侍孝宗夙著聲望引經告老張大經改垂車告老世推典型逮予纂承渇于一見爰加問勞仍有匪頒體予至懐無忘忠告資政殿大學士黄洽辭免覃恩轉一官不允詔朕踐阼云初訪予落止緬懐舊弼嘗下求言之詔矣乃因覃霈俾進文階國有彛章非有私于卿也其服訓詞毋煩多避周必大再辭免少傳不允不得再有陳請詔朕嗣膺洪祚注想宗工比升孤棘之班實霈蓼蕭之澤雖云恩厚非曰予私凡卿之言近已行于一二顧朕所與辭何至于再三若夫貤爵之科尢匪尊賢之意尚承眷渥毋事勞謙殿前都指揮使郭杲辭免修葢大内福寧殿等特轉一官減三年磨勘回授不允詔朕俯徇羣臣之請歸安廣内之宫顧棟宇之崇成命工徒之勞止卿親臨鼛鼓祗事殿巖訖役云初懋官可後既有貤恩之命毋煩避寵之詞知樞宻院事陳騤乞歸休不允詔卿儒學老成有大臣體肆朕纂服方原倚毗何為露章遽祈間退謀猷克壯神明未衰其謹輔予無事力請新除知樞宻院事余端禮辭免不允詔朕惟宥廷之任事體至嚴非長材不可以濟時非壯猶不可以經逺卿兼資文武乆贊樞機輔政以来輸忠無隐輟自中臺之貳進専西府之權蔽自朕心益隆兵本是為妙選非以叙遷公論具孚遜章可略新除參知政事京鏜辭免不允詔卿以通敏宏達之才受知烈祖擢之法從付以全蜀太上召還文昌有意大用肆朕纂服登貳西樞闗決籌帷動稱朕意是用進參機政以究經綸之藴鎮浮應變卿所優為眷倚方深毋庸多遜新除同知樞宻院事鄭僑辭免不允詔卿乆儀禁路人望最髙垂上政途詳試帥閫天官之長至勤三入西樞為貳蓋已晚矣朕訪落求助二三大臣是託以卿宏才素藴練達國體急于登用以冀治功其祇成命以圖回本兵之務勿以謙避為煩也正議大夫陳騤辭免除職與郡不允詔朕惟釋政機而均逸者大臣全進退之宜畀華職以示寵者累朝篤始終之眷矧惟耆哲朕所倚毗専西樞本兵之權兼東府基命之地俯徇忱請暫分外藩恩禮加優典章可攷少須除命何用謙辭王藺再辭免覃恩轉一官不允不得再有陳請詔朕勉承基緒猶懼弗堪實賴臣鄰相與協濟不有近輔孰為之贊襄不有价藩孰為之屏翰霈恩所逮中外惟均矧如舊弼之賢方倚上㳺之重需章洊至渙號難回其遂欽承毋為固避御史中丞謝深甫辭免兼侍讀不允詔進讀雲門自昔髙選肆朕纂承之始首務詳延妙擇法從之賢不以輕畀以卿器資端亮學問淹該議論正平實長風憲俾侍經幄士莫之先胡為引辭尚留朕命令行弗反倚聴嘉猷新除資政殿大學士陳騤辭免不允詔卿器資剛毅經術該通乆任事樞臨機輙斷力祈閒退善始以終况辭藩屏之除願處祠庭之佚由衷有請反汗無嫌若規殿之隆名乃大臣之彛典再披遜牘殊咈眷懐用榮買臣衣錦之歸毋作考父循墻之避攻媿集巻四十二欽定四庫全書攻媿集卷四十三宋樓鑰撰内制新除户部侍郎袁説友辭免不允詔版曹天下之劇任也而卿為之之時尤難向來國家多故事緒浩穰經費之外又増不時之須屬嵗大祲調度不給卿儒學俊茂舊厯清華通敏有餘獨任大計内之無闕供之急外之無誅求之怨滿嵗有奇勞亦甚矣為真已晩又何辭焉新除少師永寜郡王郭師禹辭免不允詔阜陵之役重事也朕不得躬執紼之勞祖遣有行號慕弗已卿以王之元舅國之信臣辨護宣勤為朕任送終之責往來順濟上下無譁禮備安虞歸祔太室卿得以報孝宗之恩朕可忘所以賜卿者哉進長孤棘仍加王爵既渙告廷之命何煩避寵之詞亟其欽承朕言不再伯圭辭免兼中書令不允詔中書造命之地令公師長百僚清貴華重古人謂之鳳凰池者也國朝之制率以寵異親賢然祥符天禧以還久不除此官矣惟公明徳懿親貴重無二三公兩鎮何以加此爰舉曠典以賁宗正既無兼管内樞之煩復得老成典刑之重渙汗大號毋庸固辭執謙雖勤禮難曲徇太府卿吴珽辭免換授正任觀察使在京宫觀不允詔卿生長戚閈儒雅自將佳公子也名曹繕監踐􅆒有年縂饟殊方寖升卿列賢勞既久寵以賜環亷車内祠用循故事非以為襃美也春秋方富而才可用豈遂投閒哉毋事牢辭其祇朕意新除觀察使謝淵辭免不允詔卿以祖后至親往為使介風埃萬里不憚馳驅成禮而還襃升可後亷車之峻遂登從班毋庸空辭思所以稱此則善矣知紹興府葉翥辭免除龍圖閣學士不允詔孝宗因山之役凜然懼不克奉大事文昌老成尹兹東郊遂委己以聽焉神明不衰心計有餘酬酢萬變調度百出卒之禮成而無缺典用足而節横費朕心嘉之絶江不風入山而雪謂非卿之力耶進職龍圖姑以示寵朕之所以待卿者非止此也而又何辭焉知樞密院事余端禮辭免攝太傅持節𨗳孝宗靈駕及奠諡冊諡寳監掩攢宫轉一官不允詔比者營圖東越襄奉阜陵卿以本兵之崇親臨復土之重往来俱順上下無譁塗潦方深蹇蹇盡王臣之節顔色尤戚欒欒有棘人之風朕方篤孝思幸周大事既賴送終之助首加進律之襃是所宜然無可辭者郭師禹辭免備禮冊命宜允詔卿以祇奉阜陵顯頒制綍升孤卿之峻秩封異姓之真王冊命之儀朝廷當備控辭甚力引義尤髙雖俯徇于謙沖顧豈忘于嘉歎趙汝愚辭免不允詔卿輔朕初政備宣忠力兹奉孝宗大事厥功茂焉襃崇之典所宜優異正以卿素執謙沖避逺權勢凡有進擢辭遜過禮或至迫而後受故尤思所以處卿者初拜右揆已授此官還以畀卿是不為過毋復牢辭朕必不為反汗也宜州觀察使孫璫辭免孝宗隨龍特轉一官不允詔列祖上賔孝思日切仰戚靈之如在率禮不違念攀附之幾人獨汝無怠爰自亷車之秩特升留務之班其服異恩寜容反汗參知政事京鏜辭免孝宗祔廟畢特轉一官不允詔朕尊奉皇祖無所不致其厚而送終之禮祔廟尤嚴卿以輔臣相此盛儀已事而竣可後襃賞進以一秩誠不為過賞有先後既已均及卿可獨辭乎皇伯祖伯圭辭免贊拜不名加食邑實封不允詔天下有達尊三爵一徳一齒一而未及言親也惟公徳明爵齒俱尊而又孝宗同氣之親太上皇之伯父而朕之大父行也貴窮人爵思所以尊異之非舉曠典不足以稱紫微令公既以謙辭而不受朕其可遂已乎不名之禮葢自尚父保衡以來實朝廷之殊禮前朝嘗以寵待親賢百有餘年無有可當此者舉以命卿人無異辭尚形遜避朕不敢從邦之榮懐亦非朕敢私也知樞宻院事余端禮辭免兼參知政事不允詔朕圖回治功方倚二三大臣以為重卿頃自參預進長樞廷宰席偶虛俾兼政地兹惟故典亦今之宜非卿通才何以任此亟其承命無事謙辭新除觀文殿大學士知福州趙汝愚辭免不允詔卿以肺腑之戚為社稷之臣翊戴𦕈躬輔相初政力足以任天下之重識足以斷衆志之疑倚毗方隆引去何速雖有議者亦無異詞遂釋台符往分帥閫極祕殿之殊寵實累朝之舊章事君以忠卿既全出處之致退人以禮朕當篤始終之恩尚冀告猶毋庸辭命余端禮辭免權提舉編修玉牒監修國史日厯不允朕惟國家以史事為重典領之任必命大臣寳牒之設葢古者書之于策之遺意日厯則以事繫日後之信史實基于此卿問學通博攝行相事非卿其誰宜司之成命已行毋容多遜參知政事京鏜辭免權提舉實録院編修國朝㑹要不允詔髙皇帝中興之烈當遂特書累朝庶政之規尤宜分類故實録則取史遷之舊而㑹要亦用唐室之餘爰命大臣職此二者卿素推該洽俾視纂修其躬率諸儒以趣成大典兹為故事何必謙辭寳文閣學士知遂寜府宇文价乞奉祠不允詔卿以文昌舊徳往鎮蜀藩居外數年所在稱治方此政成于大府正資卧護于逺民忽騰諗疾之章欲遂奉祠之請眷倚之重神明未衰其訖外庸毋違朕志提舉臨安府洞霄宫趙汝愚辭免觀文殿大學士不允詔大臣進退之宜固知有義人主始終之遇尤當示恩矧惟宗工祈解機政念忠勞之素著曽倚注之未衰歘然賦歸若此勇決閩山舊鎮既避寵之甚堅書殿隆名豈升華之可已諒還寓里暫佚真祠其體眷懐毋為多遜少保周必大再乞致仕依已降指揮不允詔七十致仕雖著于禮經二三大臣難拘于古制矧惟元老嘗冠中台周旋兩朝負荷重事既于蕃于南國終退處于東山神明未衰徳望彌劭奉真祠之香火自樂隠居挂神武之衣冠胡為早計抗章再至陳義愈髙顧難徇夫沖懐尚少安于素履寳文閣學士知太平州李巘乞宫觀不允詔卿老于文學久處禁林出守當塗日徯報政胡為諗疾欲遂求閒朕方念典刑之舊望屏翰之良卿豈不能體此眷懐為斯民而少留乎余端禮辭免右丞相不允詔朕承付託之重思紹祖宗之大業志勤道逺悠㢤未艾置相之際其何敢輕寜槐位之暫虚必疇咨而後授卿純明篤厚秉徳不回入從出藩望實兼著本兵貳政三載于兹論事有諍臣之風謀國得宰相之體具瞻攸屬顯拜不疑惟今亦多故矣朕欲賴卿以濟書所謂若濟巨川用汝作舟楫卿其以此自任副朕倚毗萬斛之載惟卿為宜而又何辭焉新除知樞宻院事京鏜辭免不允詔朕惟聖人不畏多難而畏無難于今雖曰邊鄙不聳而宥宻之司正當為不虞之備無競維人朕于是注意焉卿以慷慨宏逺之資有志事功立節于殊鄰宣威于全蜀纂紹之始一見而決擢貳樞筦風采凜然預政未㡬復為之長迹若序進實繇徳選當仁無遜其又何辭新除參知政事鄭僑辭免不允詔朕以寡昧嗣無疆大厯服惟二三大臣是賴凡今日徳望在人為國家用皆兩朝選擢留以遺朕者也卿周旋從班雅有公輔之器登之樞筦人以為晩顧豈以日月為功乎參預政途僉言為允宜遂佐朕宏濟多艱引避抗章非朕所望新除端明殿學士簽書樞宻院事謝深甫辭免不允詔卿始以縣大夫奏事孝宗一見以為有唐人風親擢再三如恐不及上皇用卿于諫省試卿于天府而登之從班肆朕纂承輟秣陵之行而寘風憲之長進讀金華引以自近用卿之意久矣寵加書殿升貳㡬廷卿豈未知朕意耶何避寵之力也亟其祇命毋用費辭新除權兵部尚書張叔椿辭免不允詔卿出入朝列􅆒厯最深凡今要途多出卿後文昌入座乃爾世官端粹亮直之資視名父以無愧臺綱諌省乆矣賢勞進長夏官朕命惟允往其率職何事謙辭權兵部尚書張叔椿辭免兼侍讀不允詔惟卿先正以經術侍孝宗于潛藩逮居文昌實兼露門卿立朝不阿雅有父風聽履之初仍命進讀此搢紳美談也何辭之有右丞相余端禮辭免權提舉編修玉牒實録院編修國朝㑹要不允詔史冊之成欲傳于萬世國家所重莫盛于三書大事則續為鏤玉之編中興則未就汗青之簡況舉綱而撮要欲踵事以増華宜有宗工併修鉅典卿嘗兼二者未浹四旬既進秉夫鈞衡俾盡専于筆削宅百揆而熙帝載惟爾之休總衆職而稱上心非卿孰可參知政事鄭僑辭免權監修國史日厯不允詔朕惟史事至重功用浩博惟以事繫日謹而書之則後之信史于此乎取分命諸儒而領以大臣國家之令典也卿以儒英出入冊府有年矣兹參大政命總宏摹良史之才加以學識公議所屬尚何辭焉户部侍郎袁説友辭免兼侍講不允詔卿性資闓敏儒術該通雖當主計之繁每切愛君之念方御圖云始首闢經帷而建議獨先能發朕意前所陳請旋已施行近因獻納之餘復上課程之奏深嘉忠藎俾與講明惟讜論之是求何需章之為遜亟就邇英之列以禆典學之勤新除吏部侍郎林大中辭免不允詔卿天資鯁挺論事不回比以久居臺端慈皇葢嘗命以小宰之職矣去為劇郡召歸近班既殫批勑之勤庸畀典銓之任踐􅆒惟舊選用匪輕清吾文部以助官人之能不亦休哉避寵丐閒非朕所望新除吏部侍郎兼太子左庶子婁機辭免不允詔天官貳卿之司有資銓綜春宫中護之職尤遴選掄卿性稟深淳才猷挺特以天下士從吾兒遊頃尋里社之閒久樂祠庭之適兹方更化首遂建儲思得老成之人以重元良之輔亟頒召節重上從班毋庸固辭式副虚佇新除開府儀同三司充萬夀觀使楊次山辭免不允詔朕維新庶政豫建儲闈屬時戚閈之賢久安均逸進視鼎司之貴豈曰示私卿素迪忠勤居懐静退謹容儀而就列允為耆艾之英養戚重以闔門尤服滿盈之戒逮兹播告曽靡異辭覽㢲牘之亟陳顧謙懐之難狥其祇成命毋咈予衷新除權兵部尚書兼侍讀倪思辭免不允詔朕惟姦臣竊權上下䝉蔽𨗳諛獻佞習以成風卿至朕前獨效忠讜誼氣足以激頹俗英詞足以發壯懐鳳鳴朝陽何足以喻迨兹更化可後趣歸來對便朝言議益偉武部之長露門之讀姑引卿以自近耳往其承命毋執牢辭新除禮部侍郎兼侍講章良能辭免不允詔卿夙富青箱之學來居紫槖之班兼直北門典司東觀朕惟親軍旅之務非以待詞翰之臣儀曹既俾為真經幃仍資勸講爰總夷䕫之任實親禇馬之賢僉謂汝諧卿毋多遜右武大夫文州刺史知閤門事楊谷辭免除觀察使不允詔爵惟馭貴當昭示于至公恩以及親遂優加于彛典卿起由戚畹列在朝紳入儀賔閤之司歸服家庭之訓克存孝謹不見驕盈爰稽閲歲之勞超進觀風之秩需章來上㡬不自勝渙汗既頒固難曲徇其益堅夫素履庶長保于令猷右武郎知閤門事楊石辭免除觀察使不允詔名器至嚴豈容于輕授恩榮加厚遂越于常規卿毓秀后家通班朝路素有義方之訓密參賔賛之司居存忠勤深避權勢爰攷踐􅆒之舊躐升亷問之華成命既行固難反汗遜辭來諗尤見益恭其體至懐以永終譽兵部尚書倪思辭免兼修國史兼實録院修撰不允詔國之大典尤貴于擇人史之良才當先于求舊卿蚤嘗再入素擅三長孝宗擢之著作之庭先帝處以獻納之任皆參筆削具在簡編兹當更化之初方以得賢為喜式資班馬之體追配商周之書允謂汝諧尚何多遜禮部侍郎章良能辭免改兼修玉牒官不允詔古者大事書之于策玉牒之所由起也唐始建官而未若本朝之重寫之精縑庋之邃殿他書莫嚴焉以卿比司記注久居史館是用任以大事之重凡例昭然具有書法翦繁撮要作宋一經以詔來世方以此望卿而又何辭吏部侍郎婁機辭免兼太子詹事不允詔召還紫槖固有賴于吏銓肇廷青宫尤遴求于端尹卿性姿凝逺問學老成久為資善之寮實謂甘泉之舊雍容引去恬然自如屬兹更化之初矧復建儲之重載煩哲艾以輔元良毋庸固辭服我休命攻媿集卷四十三欽定四庫全書攻媿集卷四十四宋樓鑰撰内制端明殿學士四川宣撫副使安丙乞宫觀不允詔卿沈毅善謀尤長將略内鉏臣姦外禦強敵履天下之至難為全蜀之司命虜實畏卿如所謂祭北門祭西門者然彼之披亦窮矣乃睠西顧嘉歎不忘方升書殿之班以重閫外之寄胡為引疾願解印章朕方賴卿以當一面賢于長城逺矣卿其身任保障之責以稱朕意京西湖南北路宣撫使宇文紹節辭免除寳謨閣學士不允詔入陪經幄外暢王靈既物望之愈隆豈襃章之可後卿受才挺特抗志崇深不惟誓報于國恩尤欲仰追于祖烈宣威邊徼遂寛北顧之憂寓直文謨益峻西清之職尚殫忠藎嗣有寵嘉毋事牢辭亟祇新渥新除寳謨閣直學士李寅仲辭免召赴行在不允詔朕志于有為心不忘逺矧惟簪槖之舊具宣藩翰之勞既頒優恩仍趣歸覲卿素全忠孝備著事功豈惟勁草之知實障狂瀾之倒峻西清之職未稱眷懐望東海之來方深渇想尚騰遜牘未就鋒車式遄其馳勿重有請禮部侍郎章良能乞宫觀不允詔卿以該洽通敏之才洊直鼇禁亦既三載身兼數器宣勞翰墨之間夥矣朕更化之初大述作多出卿手方有賴于論思之助遽欲以目眚求退非所樂聞也卿雖欲奉身而去使朕幾似于棄才者可乎其安厥位勿重有請新除觀文殿學士趙彦逾再辭免不允不得再有陳請詔朕更化之始登用賢才宗老典刑無如卿者閔勞以官職之事雍容進讀以冀日新之益進班延恩少示眷意一辭贅矣況于再乎身其康強謀猶克壯少親醫藥毋復重陳勉為朕留以繫人望侍讀趙彦逾倪思宇文紹節侍講章良能辭免進講毛詩終篇轉一官不允詔朕日御邇英講明經理三百五詩至是終篇叙進官聨厥有故典卿為宗老倪思章良能云卿居從列宇文紹節云卿雖處閫外實助緝熈毋事固辭益思所以輔朕之不逮新除刑部侍郎曽㬇辭免不允詔朕更新治化欽恤刑章遴選貳卿久令攝事以卿性資直諒器度寛洪承東魯之儒風襲南豐之家學比安閒外促使來歸入對便朝喜聞正論刑惟弼敎方有望于老成徳本好生當務先于明恕亟祇隆委勿事牢辭吏部侍郎梁季珌乞宫觀不允詔惟卿先正受知髙皇既登聽履之班尤多活國之計是宜有子為予從臣比更民曹浩穰之司又厯銓部公方之選胡為引疾乃欲求閒尚安厥官以副眷倚之意刑部侍郎曽㬇辭免兼同修國史兼實録院同修撰不允詔昔在先世嘗繼列于史官爾為近臣亦洊司于直筆間居自適更化惟新召還獻納之聨兼畀纂修之舊豈特助成于國典抑將大振于家聲明命既頒遜辭可略福州觀察使鎮江府駐劄御前諸軍都統制兼知揚州畢再遇乞奉祠不允詔牧守之良方圖久任將帥之重尤戒迭更惟卿沈鷙之資拳勇自奪身經數載最多汗馬之勞賞不踰時亟上亷車之峻領京口戎旃之寄鎮淮堧制閫之雄深明保障之圖日講留屯之策流民寖復信使始通甫臻按堵之期遽上奉祠之䇿良民爾位以訖外庸皇太子某辭免毎遇視事令侍立宰執赴資善堂㑹議不允詔嘉定元年閏四月朕惟古者立國必建儲闈共為子職實資主器之重惟予元子篤意問學年未及冠綽如成人朕欲俾爾習知國家之務侍立吾左預聞政事師賔㑹議皆吾大臣朕方一新治體兼聽公言爾當周旋其間日増聞見以成温文之徳尚其勉旃毋事多遜四川宣撫副使安丙再辭免資政殿學士不允不得再有陳請詔朕更化以來愛惜名器未嘗輕以假人其有度越拘孿超資級而授者非如卿之雋功茂績不予也書殿升華以所以待執政者待卿其内撫兵民外飭邊備使全蜀之境奠枕無虞以稱朕委任之意以保爾功名之成可矣服我休命毋為固辭皇伯嗣秀王師揆生日詔嘉定元年五月十五日薰風南來當朱明之方半望舒東出慶伯父之始生是曰宗英宜膺天夀匪頒惟舊寵數益新新除吏部侍郎章良能辭免不允詔卿以剛勁之資濟以博洽之學為吾詞臣仍兼數器其在儀曹事有不可者堅執不移朕所歎嘉進貳天官其以處儀曹者處之柅吏姦明銓法庶使無賢愚同滯之嗟何為固辭更欲求去非所望也新除侍衛步軍副都指揮使夏震辭免不允詔卿赤心體國忠勇自將久攝殿巖尤見勞效步旅謀帥卿實宜之其為吾協和三軍訓之以義密衛行闕以折遐衝胡為固辭其服休命開府儀同三司楊次山生日詔嘉定元年六月二十三日卿志樂燕間躬持亷靖時當初度宜介多祥是為戚閈之華爰厚上方之錫知閤門事楊谷乞祠不允詔卿戚畹之良周行素謹職司賔閤寵畀亷車忽求祠館之閒欲侍家庭之佚且弟兄並列于朝著以何嫌倘父子退休在眷私而有歉惟益崇于謙靖亦奚慮于滿盈其服厥官毋庸有請寳謨閣學士前四川安撫制置使楊輔乞宫觀不允詔朕以國家多囏更化善治收用耆耉如恐不及慨念舊學存者㡬人就傳之初卿為首選葢吾烈祖之所親擢向者持槖未久翩然西歸朕念此弗忘也非不知制閫之重有賴壯猶而圖任之意則有所在召節既往注想待卿控辭愈切殊用憮然載覽封章宣示邇列備見愛君憂國之志益知尊主庇民之學然與其獻言于萬里孰若造膝而陳前乃欲引疾求間效蜀莊之沈冥何耶矧西蜀之士卿為標表肯為朕行則後生英俊將于于而來矣三命益勤朕志不易勿復有讀式遄爾征京西湖南北路宣撫使宇文紹節乞祠不允詔卿以通敏之才淵博之學起趨勲名之㑹欲報家國之仇輟從經帷出撫邊徼修好伊始息肩可期有如賢勞盍還舊著屬以繕修備禦之未畢勞來安集之方勤將圖爾功少俟其定忽上真祠之請欲為便道之歸在卿則固所願焉于朕則豈所望者其攄長算毋有遐心右丞相錢象祖乞解罷機政不允詔方國家多事之時任廟堂一相之職卿蓋屢形于固避朕亦自知其甚難然而朕以更化云初尤冀和平之福而卿受恩最厚素為忠孝之家正使慮有未周力有弗及猶需同心協志求以尊主庇民而況察卿之才為衆所服寵以告廷之拜豈曰厯階而升幸邊瑣之粗寜恐事機之難測中外未能小息臣主靡容自安旱魃既馳星文未格日不暇給他何可言偶㣲爽于節宣宜倍加于攝養勿念去計共圖治功宵盰實勤曷嘗以位為樂燮調有賴安得奉身而歸新除御史中丞章良能辭免不允詔朕惟振朝廷之紀綱當先重紀綱之地新天下之耳目必遴求耳目之官卿鯁亮之資淵深之學自奮于韋布之日有聞于搢紳之儒雖遍厯于清華亦屢更于夷險處身無玷疾惡如風欲堅塞于倖門曽不辭于怨府彈撃之任簡求實宜其力辨于官邪以共扶于國論發卿所藴助朕有為勿騰避寵之章益勵敢言之氣衛涇乞解罷機政不允不得再有陳請詔居九五之正位方以遇災而憂何二三之大臣皆欲引身而去豈朕所望于卿奚安尚賴同寅而協恭庶幾轉禍而為福要須持久或可圖功雖屢請以難從毋再辭而為贅錢象祖乞歸田里不允不得再有陳請詔朕慨踐阼之既久念治效之不進不惟不進殆將阽危是以惕然改圖勵精更化庶幾更也人皆仰之之意首論一相得卿之賢旁招俊乂如恐不及前此寒心數月方幸交鄰少定可以盡力内治自卿及執政以至論思之臣造膝而言無不傾聽君臣之間了無疑阻卿等以災異請去朕方側身自儆不容重陳而數日以來廟堂五臣而三求退留行之詔屢下請猶未巳不惟朕失所望四方傳聞其謂朕何卿以勤勞致愆調攝惟益謹藥餌以速痊愈所謂故國者有世臣之謂也非卿而誰其體一心勿致三瀆褒語卿相予未久備整忠勞方圖内修正藉協賛知卿小疾予告甚優佇聞有瘳勿復言去刑部侍郎曽㬇乞祠不允詔朕延登耆雋列在邇聨豈惟資讞議之平真有賴論思之益卿夙髙譽處久樂燕閒粤從一節之趨増重貳卿之選惟明克允方持憲以盡公非道不陳曽閲時之未久忽披來諗遽欲告歸有嘉易退之風殊匪趣還之意刑章方簡議無待于過三史筆至嚴職何妨于共二少安定著難徇謙辭禮部尚書倪思乞祠不允詔朕召收舊人以圖新政比者凡有一事宰輔相與謀于廟堂侍從相與議于臺省粗無過舉朕心以懌今兹未能略定而求去者紛然從班亦有一二矣矧卿素為敢言自陳讜論不畏強禦不避怨仇厯厯為朕陳之擢長儀曹以示襃表亦為此舉何耶朕求其故豈朕有以致此耶相應以文止見辭費惟當一切不聽庶㡬以一天下之觀瞻其體眷懐勿復有請簽書樞密院事林大中乞仍舊休致不允詔朕更化之初未遑他務求賢甚急首召耆英起自挂冠之餘擢居持橐之長延登樞筦増重朝廷言必出于内心謀實稽于古訓倚毗方切而疾遽侵沖養有來何恙不已胡為騰奏即欲告歸尚精醫藥之調以繋搢紳之望江淮制置大使丘崈乞致仕不允詔朕惟屯禁兵百萬而邊鄙是虞開幕府四三而留都尤急畀以樞廷之寄増吾天塹之雄卿久安里閭洊分帥閫徒得君重肯為朕行上寛宵旰之憂外撫貔貅之衆盡護諸將獨當北門草木亦知其威名狄鞮想聞乎風采力禆廟論卒靖封陲人皆望歸衮之期卿乃有掛冠之請矧方叔之謀猷克壯而晉公之神明不衰益堅體國之心毋作明農之計寳謨閣直學士李寅仲乞祠不允詔朕緬懐巴蜀之民未嘗忘逺夢想淵雲之彦尤務招來卿蚤冠倫魁久騰英譽洊登朝蹟嘗為獻納之臣出殿侯邦尤著蕃宣之績特立搶攘之際實増嘉歎之深升學士之班既以旌其風節趣鋒車之召誠有望于謀謨何辭之煩以疾來諗萬里云逺當已戒途三命滋恭諒無俟駕右丞相錢象祖辭免提舉國史院實録院提舉編修國朝㑹要不允詔纂修史冊深賴于公平㑹稡典章尤先于鴻博允資碩輔坐總宏摹卿識洞古今學該流略接詞華于奕葉用則有餘攷故實于累朝藎其素習舉以並命了無異辭毋遜牘之重陳期奏篇之俱上參知政事雷孝友辭免權監修國史日厯不允詔宻贊政塗日預萬機之決參提史筆正資數器之兼卿早冠詞場寖登冊府迨通班于侍從已嘗賴于纂修朕慨大典之未興選鴻儒而坐領趣就累朝之策仍嚴繫日之書故事當然謙辭可略刑部侍郎曽㬇辭免兼太子詹事不允詔朕遴選從臣方賴論思之益精求儲寀尤資輔𨗳之功卿累葉儒風半生朝蹟何止衣冠之偉實為簮槖之英擢處宫端允符公論亟承明命毋庸固辭觀文殿學士侍讀趙彦逾乞歸田里不允詔朕更化之始起大老于東海之濵明徳懿親老成典刑趣行造朝國勢増重訏謨逺慮見于進讀圖任共政束于定制偃息藩魏人望所歸小疾既痊正宜休養大臣不可以暑行其為朕留庶幾猶得奉露門之從容也吏部侍郎梁珌乞待次州郡不允詔朕惟論思之臣欲全進退之義若其未可以去則亦難以遽從卿為國宣勞既云累嵗任予典選實號劇曹胡為抗章必欲求外冕旒密侍正有賴于協恭符節屢更顧奚煩于詳試尚安舊著以副眷懐禮部尚書倪思乞待次州郡不允詔卿以一時人物之望召還未乆拳拳獻納朕所樂聞何嫌何疑屢欲求外此固足以見難於韓退之節非朕所以待卿者且更迭之制豈為卿輩設㢤江淮制置大使丘崈再辭免召赴行在不允不得再有陳請詔卿以超世之資篤濟時之志久安故里曽不忘畎畂之思洊鎮陪都専以徇國家之急言皆底績事不辭難禦侮折衝既以著偃兵之效聞命引退謂不應俟駕而行一歸疑丞之班足為宗社之重既頒温詔日俟來音共政而圖舊人注想以待元老而乃抗章至再稱疾愈堅極知難進之風殊非虚佇之意況聞老而益壯氣不少衰式遄其馳以副所望使朝廷得以諮訪而搢紳視為表儀務逺乃猷以弼予治顧何恙之不已諒無説之可辭知平江府李大異辭免除寳謨閣直學士不允詔朕惟斯民宅生于牧守苟有治理效者倣虞朝攷績之法取宣帝増秩之意不惟示勸抑以數易為重也卿以諍臣出守吳㑹政聲上徹朕所深知進職西清庸示襃表成命已頒尚何辭焉賜皇太子生日詔嘉定元年八月十七日敕某商顥中分良初度賜生設醴用為宴衎衎之資授粲貽牟仍厚匪頒之寵共期難老益體隆私通奉大夫趙師􅋷辭免復寳謨閣直學士依所乞宫觀不允詔卿起臨近甸嘗著外庸既辭制閫之行仍徇祠庭之請念宣勞于北固欲華爾歸俾寓直于西清但仍其舊卿毋多遜朕不汝忘觀文殿學士何澹再辭免知建昌府仍奉祠禄不允不得再有陳請詔以金陵而為陪都保釐素重護天塹而開制閫委寄尤隆卿以時名人為予舊學蚤膺擢任屢嘗入從以出藩尋遂登庸俾爾貳公而洪化時洪化之洪宋避廟諱所改方權臣之用事宜正論之多違久鎮三山時稱治最言歸數載朕不汝忘屬邊鄙之甫寜擇邦侯而分遣惟大使之所莅非良弼其誰宜朕方躬宵旰之勤卿當體股肱之寄聞命引道知己屈于中途奉親為榮顧何妨于色養毋格成渙式遄爾驅鎮江府都統制畢再遇乞歸田里不允詔卿以拳勇之資挾忠毅之氣撫士最為得衆遇敵幾于無前外則營壘之不譁内則里閭之甚靖屬邊陲之甫定亦信使之交通諸將于焉少休來奏亦求引退乃眷維揚之重鎮實為淮甸之要衝其為朕以少留豈于卿而獨後總周廬而入衛終當誰歸歌出車以勞還固應有日京西湖南北路宣撫使宇文紹節辭免召赴行在不允詔卿以勸誦之近臣往宣威于遐徼邊陲以靖邦好汔修爰念賢勞亟頒命召何控辭之未已义引疾以為言朕渇想風儀急聞方略俟交符于制閫即趣駕于歸途毋復重陳副予虚佇何澹辭免兼江淮制置大使不允詔國家間遣輔臣往營邊事粤從近代加以大名不惟欲憂顧之寛正以増使華之寵疇咨于衆喜得其人卿以舊弼之賢畀留都之寄英聲有素輿望已孚疆場甫寜先上宣威之組江淮併護再隆分閫之稱其為朕行徒得君重獨當一面正資經理之良坐使諸軍咸屬指呼之下往祇成命毋致牢辭新除煥章閣學士改知江陵府充京西湖北路制置使李大性辭免乞奉祠不允詔謀帥以鎮上游素為重任分閫以護兩道尤賴長才卿久列從臣屢更藩服比奏三吳之課繼擁七閩之麾方塞北之休兵屬荆南之缺守仁聲夙著僉論攸推進學士之清班益隆眷倚總邊庭之諸將咸莅指呼引道既前遄驅毋緩爰事循墻之避佇聞洗印之期新除同知樞宻院事丘崈辭免不允詔朕厲精更化當饋思賢樞庭既得于耆英宣室實深于注想謂何恙之不已故申命以益勤載覽封章備陳疾狀使翦須而可療亦所當為倘賜几而肯來自應増重宜進萬金之藥勿為三命之辭攻媿集卷四十四欽定四庫全書攻媿集卷四十五宋樓鑰撰内制右丞相趙汝愚加食邑實封制門下朕祇膺丕緒肇祀合宫賴天地之靈儼百神而顧享嚴祖宗之配綿萬世以承休惟時大臣賛我縟禮肆頒祭澤敷告朝倫具官某寛博而崇深裕和而肅括學造聖賢之藴才兼文武之優有經濟四海之志而行之以忠有酬酢萬變之智而決之以果擢由樞筦進秉國鈞是為社稷之元勲非止衣冠之盛事處心無競休休多容物之仁守道不阿蹇蹇盡匪躬之節予所毗倚國其庶幾頃卜仲辛恭修大饗上稽皇祐之故典近遵慈極之宏謨致精三日之齋䖍奉九筵之制惟辟公之顯相厥有賢勞顧熈事之備成敢云専鄉増多采邑併衍真畬以隆巖石之瞻以壯維城之勢於戲載貂蟬而展采固宰路之所同被衮繡以侍祠實宗盟之未有惟親賢之並用于邦國以増光其服渙恩益圖治績賜告口宣有敕卿為時上相贊我盛儀是宜與邑之多用見疇庸之渥其祇成命毋事謙辭士歆加食邑實封制門下朕嚴九筵之禮是曰肇禋逆三神之釐若䝉昭答餕恵所暨臣鄰斯均矧惟屬籍之尊可後恩光之渥集廷紳而誕告示詔綍之匪私具官某徳性寛洪風猷端粹重珪疊組生長富貴之中簜節騂旄雍容閒燕之乆惟夙夜之匪懈仰春秋之益髙實長周家之宗盟是為劉氏之祭酒兹崇宗祀預賛上儀冠班列于三孤聳儀刑于九族乃加井賦仍侈圭腴以表耆英以隆孝治於戲祭有十倫之義莫如同姓之先備者百順之名益介遐齡之永願如夀俊奚假訓辭賜告口宣有敕卿位冠孤卿望髙宗老既奉合宫之祀宜加采邑之封雖曰彛章是為新渥郭師禹加食邑實封制門下朕祇事總章荷神祇之來格廣施恵術普中外以惟均顧予元舅之親嘗預羣工之相肆加異數明告周行具官某迪徳忱恂飭躬謙靖祖后實為同氣夀皇尤篤優恩淑旂綏章蚤授齋壇之鉞篆車希冕近升棘位之班疏三吳公社之封廪萬夀祠庭之禄能屏膏梁之習自忘圭組之崇比卜季秋親祠重屋茂對三神之祉宜先四姓之賢用衍爰田載加真食於戲兢兢業業以事上帝朕敢懐専鄉之私洞洞屬屬而存小心爾尚介方來之寵益昭吉履永保修名賜告口宣有敇禮畢九筵恩均百辟賜予伯舅之胙均兹宣室之釐與邑宰多頒綸可後周必大加食邑實封制門下朕嗣守邦圖肇修宗祀父天母地祭既重于合祛尊祖敬宗禮尤嚴于並予一人越紼以行事爾多士奉璋而侍祠眷舊弼以興思顧慶條之可後誕揚渙號敷告昕廷具官某簡重而閎深直方而膚敏典誥上規于姚姒詞章逺軋于漢周弼亮兩朝未究經綸之藴鎮安四海有懷康濟之功偃藩南國之雄均逸東山之勝比以霈恩之渥升之亞傅之崇注想不忘乞言方切屬伸大報爰啟合宫載謀載惟聖父嘗頒于先甲我將我享季秋乃卜于仲辛熈事既成蕃釐來介申衍多田之賦仍加真食之封於戲明堂王者之堂方荷神休之答二老天下之老宜先祭澤之施尚迪逺猷永綏殊寵賜告口宣有敇卿嘗位冡司均休真館屬總章之竣事賦多邑以示恩其即欽承以祇眷渥師䕫加食邑實封制門下朕寅紹丕圖䖍修大饗親惟伯父既有助于多儀神介蕃釐詎敢云夫專鄉亶敷命綍用告昕廷具官某履行粹和稟質端靖生長神明之胄源流詩禮之傳出分顧憂見民庸之甚茂入趨班綴奉朝謁以尤恭建六纛以承家視三公而命秩屬講肇禋之禮適當越紼之行攝事太宫降登有度陪祠重屋顯相無違庸推祭澤之優可後宗盟之懿爰加井賦併衍畬租兹謂恩施式昭名數於戲奉犧牲粢盛而告聿嚴布政之宫拓山川土田之封益示展親之義其祇異渥以對靈娭賜告口宣吴瓌吴琚同有敇禮成重屋賚及萬方宜首及于懿親用申加于多邑載頒明命其服殊恩吴瓌加食邑實封制門下朕穆卜季秋躬修大祀靈祇授職幸熈事之備成多士在廷賴懿親之顯相宜頒恵術敷告羣工具官某謹畏自將純和無玷聨四姓小侯之貴承三朝外戚之恩入侍中宸屬櫜鞬而甚肅進班上閤飭冠佩以尤嚴頃建齋壇退安琳宇旋視孤卿之秩併開公社之封逮及禮于九筵實均釐于萬國乃増采邑仍衍圭腴以彰寵數之優以表肅雝之助於戲蒐上儀于陽館豈惟黍稷之馨鍚蕃祉于后家可後脈膰之賜尚綏吉履以服彛章吴琚加食邑實祇制門下合宫肇祀實祇奉于慈謨宣室受釐爰大頒于霈澤惟時懿戚夙著賢稱庸舉徽章式孚渙號具官某美由世濟才應時須登簮筆持槖之聨惟知避寵更握節擁麾之選不専為恩比崇建于齋旄旋寖加于孤棘逮兹大報賛我上儀禮既備于八階胙惟優于四姓俾増多賦仍衍真腴於戲文徳以講明堂幸神祇之顧饗賀慶以親異姓宜福履之均霑雖曰邦彜尚承恵渥郭杲加食邑實封制門下朕頃用盛秋䖍修宗祀奉犧牲以薦備陣重屋之儀賴爪牙之良肅領千廬之衛既云竣事可後均釐我有明綸告于列位具官某生資沈毅世濟忠勤氣禀山西期逺追于起翦書傳圯上自有合于孫吴久専將閫之雄入侍殿巖之邃屬祇孝饗務罄齋誠奉璋惟多士之賢執㦸有元戎之重肆疇采邑仍啟侯封以介靈休以彰異渥於戲茅簷蒿柱朕方躬大禮之嚴玉節琱戈爾尚體中權之寄益思忠報以答殊知賜告口宣蕭鷓巴同有敇禮嚴重屋澤及羣工錫多邑于巖除啟新封于侯甸蕭改眷我勁臣疇兹多賦其祇明命益勵忠猷蕭鷓巴加食邑實封制門下奠圭瓉以薦誠既䖍修于宗祀執豆籩而在列宜咸被于靈娭眷我虎臣董兹羽衛厥有渙恩之錫式彰顯相之勞具官某智略雄深性資沈鷙望雲就日夙肩面内之誠建旐設旄馴致總戎之拜奉真祠而均佚視左棘以疏榮乃因霈澤之行増畀爰田之賦申加真食用侈神休於戲承異眷于三朝葢屢覿彌文之盛敷大賚于四海顧可無寵數之優益綏令圖以保終吉郭師禹特授少師封永寜郡王加食邑實封制門下朕纂上皇之丕緒承列祖之通䘮復土告功既克襄于大事提綱置使實有賴于懿親爰播明綸肆加殊寵具官某小心自牧吉徳著聞蚤席慶于椒闈寖升華于棘位恂恂家法靡矜金穴之奢侃侃朝班久遂琳宫之適兹卜㑹稽之麓往營永阜之陵靈駕徐驅飭廞儀而肅靖重臣主辦訖閟寢之固安粤惟元舅之崇可忘醲賞之報翳勞之稱匪朕敢私衮服命圭顯冠孤卿之秩金印盭綬進封異姓之王仍旄鉞于東秦徹土疆于南晉申陪井賦併侈轅疇以昭四姓之華以篤三朝之眷於戲節侯仕漢得謹畏謙恭之聲尚父在唐有富貴繁衍之盛豈其苗裔見此親賢其踵前人之休以為密戚之勸賜告口宣有敇阜陵復土元舅策勲既升冠于孤卿仍疏封于王爵其祇渙渥毋事謙辭皇伯祖太師嗣秀王伯圭特授兼中書令加食邑實封制門下朕祇紹炎圖遹繩祖武追仰抱孫之愛謹奉菆塗實繄同氣之賢式専使領克襄大事悉按舊章昭示殊襃用孚羣聽具官某聨休皇極正位泰階直大以方厚載體坤爻之二爵齒與徳達尊全天下之三惟我孝宗最崇秀邸眷乃象賢之懿襲兹開國之封敬其所尊愛其所親今當推于宗老反也如疑往也如慕況密䕶于廞儀每入臨于朝晡曽不避于塗潦能以從心之嵗躬為復土之勤有司莫敢不哀行路為之感動語必流涕誓報平生之恩賞不踰時肆舉非常之典是兼紫㣲令之重以為大父行之華仍衍爰田併豐真食匪以爵而馭貴恨無言以酬公於戲隆専席之榮葢用祥符之故實第中書之攷曽參尚父之勲名以増師尹之嚴以侈邦家之盛益綏夀嘏庸對寵光賜告口宣有敕卿貴隆人爵尊襲王封親臨永阜之藏寵冠中臺之列是為殊深尚體眷懐右丞相趙汝愚特授銀青光禄大夫加食邑實封制門下聖人因親教愛葢本于躬行大臣以道事君莫先于協賛朕方遵皇祖之訓形四方之風眷我宗英相予孝理惟忠勞之備著繄命數之宜加爰集具僚載申襃律具官某崇深而行簡直諒而能容學有淵源究前聖天人之藴志存節誼立本朝社稷之勲相業素髙民瞻允屬自擢登于右揆獨光輔于冲人於皇孝宗克振炎祚朕既荷緑車之鍾愛遂紹于重規卿亦䝉丹扆之異知寖基于大任惟推心而相勉念圖報之尤難三年之䘮服勤敢怠七月而葬宣力居多因山為陵得邱原之爽塏稱天定諡極寳冊之鋪張迓吉仗以來歸奉太宫而班祔誠信無悔哀禮有餘仰慰在天之靈實由同徳之助是用超文資之峻徑授三階衍井賦之腴幾盈萬户勉從遜牘少屈恩綸於戲明徳懿親既居金鉉黄耳之貴勞謙終吉僅登銀章青綬之聨益成㢘退之名尚副倚毗之意賜告口宣有敕卿祇奉阜陵爰加賞典班既髙于百辟位亦次于三公其體眷懐亟祇成命皇伯祖太師嗣秀王伯圭特授兼中書令加食邑實封制門下朕丕膺寳祚加厚皇支惟我祖之君萬邦既訖因山之禮顧天子之謂伯父實參置使之行眷吉仗之言旋豈襃緡之可後視儀宰路敷號廷紳具官某賦敏給之資擅温恭之譽分左符而出鎮嘗専制閫之雄易留務以歸班徑擢齋旄之峻迨沖人之臨御進孤保以疏恩鳳闕晨趨見朝儀之甚肅鯉庭日侍知家法之尤嚴匪惟族姓之光允謂衣冠之盛比營東越崇建阜陵願躬除道之勤往䕶成梁之役久安閒燕退若無慿小試才能燦然可覩宜加寵數以答賢勞公府肇開遂擬三師之貴珍臺兼領併増千户之封用侈宗盟兹為使相於戲有是父有是子俱膺華衮之榮拜于後拜于前克紹緇衣之美勉圖休問以對殊私賜告口宣有敇惟予伯父表我宗盟爰升衮鉞之華已播絲綸之寵其祇異數毋事謙辭知樞宻院事余端禮特授銀青光禄大夫右丞相加食邑實封制門下稽古建官莫重王朝之論相代天理物必資揆路之得賢朕臨御惟艱疇咨敢怠爰命紫樞之長進居黄閤之崇乃輯廷紬誕􅆒制綍具官某温恭而氣勁凝静而謨明智周萬事之原學貫九流之邃孝宗擢之于庶列亟躋法從之班聖父召之于留都遂處輔臣之任益殫忠藎力賛政㡬迨予嗣厯之初尤藉同寅之助迭掌東西之二府兼明文武之兩途内則密勿廟論以慮四方外則整齊戎律以令諸將清規足以範俗深謀足以濟時進退百官詳試知人之鑒調娱衆務究觀識治之才蔽自予衷與之國秉用正鈞衡之寄毋勞夢卜之求超授文階増陪井賦以示奮庸之選以昭注意之隆於戲夙夜基命而單厥心朕欲起太平之盛朝夕納誨以輔台德爾其繼良弼之名表正士風訪求民瘼及間暇而修政刑之要専燮理以致陰陽之和若股肱耳目之相位若天地祖宗之臨汝懋承明渙期底成功賜告口宣有敇卿比領樞廷兼行相事兹延登于石揆已誕布于明綸注意方深拜恩可後攻媿集卷四十五欽定四庫全書攻媿集卷四十六宋樓鑰撰内制伯圭再辭免両鎮節度使不允批答紹熈五年九月省表具之朕恵于宗公務隆于體貌相予肆祀可後于恩襃位已極于人臣官無加于師尹兼授齋壇之鉞倍多井賦之租是曰彛章未為異數儀刑所繋以為泰乎俯傴之恭再斯可矣口宣有敕卿位冠三公望髙九族兹相合宫之祀用頒雙節之華其服恩榮毋為謙避伯圭再辭免両鎮節度使不允仍斷来章批答省表具之朕尊寵帝師惟恐不至優崇元老尚竊慊然故因大饗之成曲示異恩之渥載加少府之節復登上將之壇城南天下稀舊臨樂土漢東國為大併領名藩式慰具瞻益綏多祉既無反汗之理奚事循牆之恭口宣有敕卿徳齒俱尊名位皆備欲侈三卿之寵遂疏兼部之恩何必固辭亟祇成渙侍講陳傳良朱熹宣赴經筵供職曲謝宣答詞有制朕務明政體首闢經帷嘉舊學之来歸喜耆儒之同集其思忠告以副疇咨初講畢案前致詞降殿曲謝陳傅良有制首頒召命渇想忠猷聳聞講貫之詳恍若從㳺之舊克諧朕志益啓乃心朱熹有制乆聞髙諧傾佇嘉猷来侍邇英之㳺講明大學之道庶㡬于治深慰予懐余端禮􅄪辭免知樞宻院事不允仍斷来章批答省表具之卿自簉本兵積隆時望有致君澤民之志有憂邊思職之勤迨參政幾又嘗共二其于基命宥宻之地詳練乆矣兹疇樞長非卿誰屬夫本强則精神折衝制千里之勝者其機實在于廟堂尚究逺圖以祇寵命朕志決矣勿復有辭口宣有敕卿精白承休勤勞匪懈爰自政途之竣載登宥府之崇成命既行牢辭勿再京鏜再辭免參知政事不允仍斷来章批答省表具之本兵之任方倚于壯猶共政之求更資于夹輔朕圖回治道選用柄臣眷一相之處中有嘉同徳惟萬㡬之甚衆允藉協恭卿之長才朕所深識奏陳剴切剖决精明進㕘鬷嘏之嚴益冀訏謨之告既頒再命毋事三辭口宣有敕卿召歸全蜀旋貳洪樞兹膺共政之圖實倚告猶之益何勞謙避其遂欽承鄭僑再辭免同知樞宻院事不允仍斷来章批答省表具之朕惟孝宣樞機周宻用以中興漢道于今本兵之地尢號才難卿以魁碩之才為士夫儀表踐揚最乆望實具孚兹焉登用朕非以私于卿所以尊朝廷也朕方庶㡬孝宣之治卿志在體國其遂秉徳以陪朕顧豈以執謙為美乎口宣有敕卿屢分帥閫三總吏銓兹進貳于機廷方允符于輿論亟其祇命何必固辭郭師禹再辭免師不允批答省表具之朕惟三孤之貴卑于公尊于卿異姓之王苴以茅胙以土皆本朝之所重非懿戚而誰居以卿徳量有餘忠誠匪懈受隆知于烈祖不専為恩䕶大事于阜陵克勤乃職迨兹歸報可後襃嘉既敷號以明揚雖循墻而安避毋為苛禮徒咈眷懐口宣有敕位尊三少爵重異王用酬使領之勞已播廷揚之命洊披遜牘其服殊恩郭師禹再辭免少師不允仍斷来章批答省表具之卿世為懿戚仕厯累朝惟孝宗之恩毎思所報故阜陵之役獨䕶其行人徒見闔門而養威今乃知任事而能辦位列三孤之長封疏五等之崇揚于大廷協彼公論何為固避屢卻復来其亟受于寵章毋重陳于遜牘口宣有敕阜陵庀役總使有行既竣事以来歸乃疏恩而示寵其祇一札何事三辭伯圭再辭免中書令不允批答慶元元年省表具之卿以伯祖之尊上公之貴名位已隆而無事任之累冨貴已極而無危溢之虞夀考康寧子孫蕃衍此于人間世尚何慕焉獨惟烈祖孝悌之至則友其兄朕追仰音容如在左右古者思其人猶愛所憩之棠况我祖同氣之親乎是以因使範之勞加寵數之重夫髙允之在魏子儀之在唐俱以令公名者豈惟爵秩之崇葢以徳為貴也惟我父師尚何辭于此哉口宣有敕卿爵齒俱尊忠孝兼備兹授令公之秩為皇族之光毋復固辭亟宜祇命伯圭再辭免特授兼中書令加食邑實封不允仍斷来章批答省表具之朕攷國朝官制尤以中令為重親賢如魏魯陳韓諸王為此官者僅六七人元豐中曹佾以帝舊兼令有司謂無給俸之例則其稀闊又可知矣卿為達尊執徳彌劭乆虚之典非卿尚誰當之近命元子寵兼衮鉞恩禮之盛萃于一門邦之榮懐匪曰予私辭之至三斯可已矣口宣有敕卿位極人臣徳髙帝胄爰拜中臺之長以彰元老之尊寵命既頒謙辭勿再余端禮再辭免右丞相不允批答省表具之君臣相逢謂之千載上下協濟本乎一心必能如風雲之從斯可不膠漆而固惟卿朴厚副朕倚毗雖累年務罄于論思而近嵗又殫于忠力眷政府樞廷之更踐知文事武備之該通儀圖老成宜置左右試之已乆斷然不疑惟昔宗盟嘗居冢宰之任若時卿衮亦應柘溪之祥尚期逺邁于前人相與共興于大業朕所望者卿何辭焉口宣有敕卿比握兵機實専政柄乃徑登于次相仍累進于崇階其服寵光勿為多遜京鏜再辭免知樞宻院事不允仍斷来章批答省表具之朕惟本兵之司有國所重必得樞機周密乃可圖功自非智略縱横何以稱職卿之能事朕所素知分制閫則推師師之良登政途則著輔弼之望威名日起遐邇具瞻其勵壯猶益運幄中之算坐銷外侮以收堂上之奇宜已需章毋留朕命口宣有敕卿資兼文武望聳華夷輟東府之大臣長西樞之重任明綸已播遜牘毋煩鄭僑再辭免參知政事不允仍斷來章批答省表具之朕修明庶政務興起于事功圖任舊人乃布揚于命告卿行為世表文擅國華瑣闈銓部則著忠蹇之名侯藩留籥則備恩威之美再儀禁路增重朝行既擢貳于本兵兹進參于鬷嘏其體責成之重毋為避寵之煩口宣有敕卿擢在樞廷久隆人望兹進參于大政庶益重于本朝洊貢忱詞亟祇明命謝深甫再辭免簽書極宻院事不允仍斷来章批答省表具之朕惟九五正位毎切圖安二三大臣所當遴擇乃眷㡬廷之貳必求禁槖之英卿外寛而内明氣和而才劭凡一時清切之選以數載周旋其間封駮之嚴屢回主意抨彈之勁益振臺綱勸誦以来陳謨尤切兹肆頒于一札俾㕘掌于五兵出命惟行抗章可已口宣有敕卿備厯華途寖髙雅望兹自憲臺之長入㕘樞筦之嚴朕命既孚卿辭毋費余端禮再拜辭免右丞相不允仍斷来章批答省表具之啇宗之命傳説也爰立之初訓告具存惟説以天下自任祇若休命不敢辭也朕之論相則又詳矣大號揚廷與衆共之需章以来既已再卻而猶未已何耶朕之菲涼有賴啓沃式克欽承卿其可使古人専美于前乎三命而僂其可已矣口宣有敕朕妙選儒英俾登揆路欲専裁于庶務顧俯事于三辭難徇勞謙亟命成命賜右丞相錢象祖襃語朕更化之初論相為急注意已乆無踰卿者大臣義當體國勿為牢辭往哉汝諧毋稽朕命附劄子臣䕶望清光仰䝉聖慈開納芻蕘之言不勝千載之幸再被宣旨令撰右丞相錢象祖襃語進上竊思制麻已宣無可辭之理臣退方供職所有答詔章良能必已撰述臣謹撰襃語進呈更合取自聖裁開禧三年十二月二十四日翰林學士知制誥臣樓鑰新除右丞相兼樞宻使錢象祖再辭免不允批答省表具之漢之丞相無所不統孝宗正名委任罙重朕更化善治注意尤精以卿忠孝之家台輔之望踐敭中外多厯年所邇者再預政機能斷國論去凶舉賢人望愈歸播告廷紳士夫至于相賀何謙何疑固辭不已矧是邊陲之未靖尤資右府之壯猶三命而僂執謙甚矣朕志已定决無反汗之理卿其自任天下之重稱朕意焉口宣有敕卿兼文武之資體家國之重既已頒于制綍何尚執于謙詞毋違朕言亟正台席新除㕘知政事衞涇再辭免不允仍斷来章批答省表具之朕更化之初惟二三大臣是賴以卿倫魁之彦宻在邇聫贊决廟謨擢升獨坐尋畀洪樞之任仍參鬷嘏之嚴兹焉正名以贊台揆内則百實之欲治外則三邊之未寧此為何時而執故典其體責成之意勿為遜避之煩口宣有敕卿近以樞廷遂參政地兹焉錫命止用正名尚禆當軸之謀無執循墻之謹新除參知政事雷孝友冄辭免不允仍斷来章批答省表具之朕躬覽萬㡬與民更始欲解琴瑟之舊允藉股肱之良卿乆矣蜚英居焉難進比處代言之任實懐憤世之心預同宻謀卒殄元惡擢居瑣闥遂長憲臺欲新億兆之觀瞻尤急二三之輔弼其祇予命亟贊政㡬國事匪輕謙辭可略口宣有敕卿由中執法為吾大臣正資經世之猷以贊濟時之相朕志先定卿辭勿煩新除端明殿學士簽書樞宻院事林大中再辭免不允仍斷来章批答省表具之卿養氣以剛秉心無競出藩入從榮利澹然久安燕居不容何病朕一新治具急欲求老成典刑以鎮服中外起舊徳于垂車之後還人望于持槖之班矢謨朕前尤見克壯亟升書殿進貳宥庭人無異辭國以増重時則可矣尚何遜焉口宣有敕卿禁班老成人望乆屬擢寘㡬庭之貳正資兵本之謀尚復奚辭往其祇服楊次山再辭免開府儀同三司不允批答省表具之朕愛惜名器惟賢是予由掌武之官而視儀揆路品職益崇其可輕畀卿以肺腑之親服在爵位靖共自飭㢘介有餘爰示優恩用孚至意而又何辭焉毋復重陳亟宜就列口宣有敕卿聫芳椒掖均逸琳宫爰開公府之華實視台躔之貴其祇茂渥毋事牢辭經筵進講毛詩終篇宣答詞宰執赴聴講致詞謝有制朕臨御今十五載講詩終三百篇卿等同觀朕心惟懌尚其協贊助我緝熈侍讀侍講官奏賀有制朕日勤三接共講四詩既徹篇章實資問學深賴主文之諫載嘉歸美之勤宰執率經筵侍立官再奏賀有制朕積朝夕之勤終雅頌之業究觀六義用蔽一言尚冀輸忠毋忘進戒皇太子再辭免侍立㑹議不允批答嘉定元年閏四月省表具之近頒中詔命元子以侍朝仍諭大臣集東宫而㑹議是為令典非用前規顧予教爾以義方俾爾預聞于政理躬臨五學既親賔友以交修宻拱九重具見君臣之相與爾能進徳予自忘疲何以辭為再斯可矣口宣有敕爾為元子年近成人俾入侍于昕朝且預聞于㡬務勉親多益毋事牢辭衛涇乞解罷機政不允仍斷来章批答省表具之朕厲精更化遭時多虞延登俊良列在輔弼當經綸之始賴協力以共謀迨平定之初乃奉身而求退朕所未喻卿尢無他知出處之素明見忠勤之曲盡五十而服官政在古訓以甚明三千而惟一心矧大臣之無間倘遽欲去吾誰與居勿為封奏之煩尚體眷懐之渥口宣有敕卿以同徳任吾大臣一為進退之圖實有重輕之繫尚安位著庸副朕心襃語卿貳政更化之初備宣忠藎朕所眷屬何人異辭告歸無名理難曲徇妏媿集卷四十六欽定四庫全書攻媿集卷四十七宋樓鑰撰内制提舉淮南東路常平茶鹽公事陳損之奨諭敕書以常平司見在米麥及收糴物斛分撥入州軍賑糶共二十萬石朕嗣服之始旱潦相仍宵旰興懐務行實恵首形詔告所望部使者推廣上恩初不以重費為憚也卿使淮堧盖嘗乆興水利兹又能發其餘蓄上不仰給于大農下有以平八郡之糴邉民被恵已廣而又將為後日之儲有臣如此實寬顧憂載覧奏章良深嘉歎賀金國生辰使副梁總戴勲到闕傳宣撫問并賜銀合茶藥口宣卿等逺聘殊鄰旋歸近境念舟車之勞勩頒茗劑之珍芳仍命行人往将予意賜銀合臘藥敕書荆湖南路安撫使王藺卿西樞故老南國元侯念兹觱發之辰賜以竒􅎇之劑體予至意勉爾壯猶四川安撫制置使趙彦逾卿視儀兩地出鎮四川錫品劑之竒珍慰風寒之匽薄益厚頥養用寛顧憂主管侍衛馬軍行司張師顔卿肅領騎兵分屯江國頒寳奩之珍劑慰玉帳之凝寒其體眷懐益恩忠藎御前諸軍都統制閻世雄皇甫斌張詔趙廞劉忠劉震卿等肅提禁旅列戍藩方念乆處于轅門俾匪頒于奩劑毋云例卷其服恩綸御前諸軍副都統制馮湛張國珍田世輔李世廣王宗㢘王知新田臯卿等逺臨外戍宻贊中權念營壘之嚴寒錫禁庭之上藥尚思奮勵以答恩私報登寳位使副鄭湜范仲壬到闕傳宣撫問并賜銀合茶藥口宣卿等握節言旋及門伊邇厚荈劑珍芳之賜勞川途跋履之勤庸序爾情特将予意賜銀合夏藥敕書荆湖南路安撫使王藺卿嘗位元樞往臨南椘爰錫珍芳之劑用清暑愠之祥将以寳奩賁于帥四川安撫制置使趙彦逾卿不辭叱馭諒已開藩爰加珍劑之頒仍賁寳奩之賜用示恩于宗老期解愠于吾民侍衛馬軍都虞侯張師顔卿總提騎将往駐金陵當溽暑之在辰出珍芳而分賚尚綏衆士如濯清風御前諸軍都綂制閻世雄張詔趙廞劉忠劉震田世輔卿等分戍价藩撫安戎壘出上方之凉劑分内府之珍奩坐覺生風諒欣承命御前諸軍副都統制馮湛張國珍李世廣王宗亷王知新田臯卿等分提禁旅宻贊戎和乃馳賜夫芳珍冀逺清于蒸鬰惟兹解愠可以忘勞賜銀合夏藥敕書知潼川府費士寅卿舊居兩社出撫東川緩帯輕裘逺著藩維之效寳奩珍劑往寛炎鬰之煩益謹節宣以綏寵渥四川宣撫使安丙卿仕聫執政職佐宣威蜀道籌邉想帥垣之多暇暑風届候将珍劑以分頒豈惟清遐徼之塵抑以解吾民之愠江淮制置大使丘崈卿恩視政塗任分制閫炎威将熾念戎幕之賢勞靈劑匪頒均上方之珍品庸昭渙渥以滌歊煩四川安撫制置使兼知成都府呉獵卿寓直從班鎮臨制閫増雪山之重念撫御之良勞當南風之薰冀節宣之撫爽爰頒珍劑庸示優恩京西湖南北路宣撫使宇文紹節名在經幃威宣將閫上流増重念袢暑之賢勞良劑匪頒助薰風之清穆其均此賜以慰彼民殿前副都指揮使兼江淮制置使趙淳職領殿巖任隆制閫屬風埃之甫定當溽暑之寖隆爰錫珍奩用將寳劑坐消煩鬰仍助節宣侍衛步軍都虞侯措置防捍江靣王處乆肅領衛兵出臨天塹壁壘多暇濤波不驚屬當炎暑之隆宜厚珍芳之錫尚承殊渥以豁煩襟侍衛馬軍行司權管榦本軍馬職事張良顯肅提精騎分駐留都當溽暑之寖隆屬氛埃之甫定爰頒珍劑用滌煩襟益謹節宣以圖綏靖御前諸軍都統制李郁畢再遇秦世輔王大才彭輅某等肅提戎律綏靖邊陲當溽暑之寖隆屬風埃之甫定永懐勞勩宜助節宣爰畀珍芳以銷煩鬰御前諸軍副都統制周整莊松何汝霖劉元鼎魏友諒薛九齡王鉞某等協佐戎昭克勤軍務撫帥徒而整暇當炎暑之藴隆緘寳劑以分頒即栁營而加勞賜安南國王李龍翰嘉定二年厯日敕書敕安南國王某朕仰稽天運豫受民時爰分厯象之書徧及方隅之境眷惟南國世奉中朝此疆雖逺于山川嗣嵗先頒夫正朔用均恵利尚克欽承金國弔祭使人赴闕口宣紹熈五年十月盱眙軍傳宣撫問賜御筵有敕卿肅持使指来慰國哀眷入境之云初豈肆筵之可後往宣予意以勞爾勤鎮江府賜銀合茶藥有敕卿等肅擁使華逺將慰禮經鐡甕山川之險錫寳奩茗劑之珍宜體眷懐用安旅次鎮江府賜御筵有敇卿等来趨素幄行次丹陽雖深銜恤之悲不廢示慈之宴是将厚意式寵行人平江府賜御筵有敕卿等逺從燕驛近及吴門深嘉唁問之勤宜備賔筵之渥其承異眷益進来程金國弔祭使人赴闕口宣赤岸賜酒果有敕卿等逺将慰問来届近郊先之㫖酒之頒増以嘉肴之錫少安次舍用息勤勞賜御筵有敕卿等握節載馳赴疆来弔将展國喪之禮宜先郊勞之儀其體眷私少休匽薄賜被褥鈔鑼有敕卿等逺致奠儀乆勞客路爰厚寝衣之賜仍分盥器之珍跋履之餘撫存加渥宻賜大銀器有敕使華既接弔禮斯勤宴已備于饔飱器仍加于銀鏤是為異渥少慰賢勞賜生餼有敕卿等少安賔館既畢弔儀按聘禮以受饔命廩人而致餼諒均徒御咸體眷懐賜内中酒果有敇卿等禮謹弔喪退將即次頒酒殽于内府示恩寵于来賔意則一餘物惟俱稱朝見訖歸驛賜御筵有敕卿等慰此國哀見于喪次爰暫休于燕館用初秩于賔筵首示殊私嗣加好賜就驛特賜衣服金帯銀器衣著有敕卿等弔喪自逺率禮無違器分山溢之珍衣有身章之寵雖云多品未盡至懐賜内中酒果有敕卿等肅将使節来唁䘮幃嘉有客之多儀出尚方之珍品甘芳俱厚寵眷彌加在驛特賜射弓酒果有敕卿等既肅哀儀難修賔射雖輟主皮之藝仍加設醴之勤殽核俱頒情文尤厚特賜射弓御筵有敕卿等交鄰有道序賔以賢屬當變禮之時仍飭初筵之賜穿楊何取折爼惟優特賜射弓例物有敕卿等慰予國恤厚乃賔儀雖觀射之未遑顧匪頒之可後悉從常禮以表眷懐朝辭訖歸驛賜酒果有敕卿等弔哀事畢贈賄禮成將遄車馬之歸載厚壺籩之錫其承嘉貺復啓長途賜御筵有敕卿等既趨素幄遂别彤墀禮下替于權輿恩更加于觴豆尚安旅次徐屇歸程回弔祭國書皇祖上仙嘗馳赴問沖人嗣位方服通喪荷信使之逺来辱弔儀之加厚益堅盟好彌切感懐哀疚既深敷陳難究回賀登寳位國書祇奉慈謨勉承丕祚比飭行人之告兹勤信使之来儀物有加書函尢備既荷禮文之厚益欣盟好之堅爰謹報章用陳謝悃報謝登寳位國書祖武是繩孝思方切勤使華之逺暨知盟好之彌隆品物具陳情文俱稱比已騰于報櫝爰再飭夫行人仍致彞儀用將謝悃報謝賀慶元元年正旦國書三陽攸慶方夙戒于行人萬里交歡復逺勤夫信使恵以函書之厚加之篚幣之豐爰飭報章備宣謝臆惟益堅夫世好冀均介于春祺金國弔祭人使回程口宣賜龍鳳茶并金鍍銀合有敕逺修問兹遂旅歸茶分北苑之珍器備南金之飭是為異渥用慰遐征赤岸賜酒果有敕卿等返斾云初出郊于邁加六壺六籩之饋致三辭三揖之勤式慰爾歸用將予意賜御筵有敕卿等成禮云歸啓途未逺意方勤于郊送恩宜視夫賔初既厚眷私益堅信睦平江府賜御筵有敕卿等弔儀既備使事言旅行已次于蘇臺恩仍頒夫鎬燕禮及加厚客路具宜沿路賜使副冬至節絹有敕使且北歸日方南至載念脩途之役俾加厚幣之將其服恩榮尚寛旅思讀祭文官有敕卿逺陪膚使歸遇新陽爰頒束帛之温以助重裘之燠益昭眷渥庸慰賢勞三節人從有敕長至維時逺歸在道言念禦寒之具特加實篚之珍賚賜有差恩私無異鎮江府賜御筵有敕卿等来修慰禮既畢使儀望北薊以還轅至南徐而憩節庸加燕衎其悉眷私盱眙軍賜御筵有敕卿等来成使禮歸吹邊疆更加燕豆之勤不替權輿之舊其承眷禮遂戒征途金國賀登寳位使人赴闕口宣盱眙軍傳宣撫問賜御筵有敕卿等持禮逺来入疆伊始念川途之匽薄加燕勞之優隆徒御少休賔儀無爽鎮江府賜銀合茶藥有敕卿等来擁使華逺申盟好念舟車之勞役頒茗劑之珍芳爰飾寳奩以迎玉節賜御筵有敕卿阼云初親仁是務肅使華于近鎮謹賔禮于初筵益屇来程以承眷渥平江府賜御筵有敕卿等逺持賀禮来次輔邦再加燕衎之私庸示眷存之渥少休跋履且慰勤勞赤岸賜酒果有敕卿等来次郊闉肅将賀禮寵以上尊之賜加之碩果之珍式佇来游以堅信好賜御筵有敕初御丕圖逺勤信使既次郊闗之近載如燕豆之優其體眷私以承虗佇金國賀正旦使人赴闕口宣盱眙軍傳宣撫問賜御筵有敕卿等逺將聘禮来賀嵗元既加壹勞之勤首示肆筵之渥其祇眷意益謹賔儀鎮江府賜銀合茶藥有敕玉節方来寳奩是錫取雪芽于北苑輟珍劑于尚方并寵行人用昭眷意賜御筵有敕卿等逺持華節近来次方行登象日之畿重錫需雲之宴益加盛禮庸示眷私平江府賜御筵有敕履靖之始修聘甚勤行既次于近藩禮宜加于載燕是為異渥其服多儀赤岸賜酒果有敕卿等逺從萬里来賀三朝望觀闕以非遥賜壺籩而加腆尚承眷渥以締歡盟賜御筵有敕履端之始将命以来既聞畿甸之登宜厚賔筵之錫春私所逮使介維均賜使副春幡勝有敕綵杖土牛方舉春郊之禮寳幡金勝爰如使客之恩和氣所鍾歡盟益厚賜三節從人春幡勝有敕卿等修好時重履端爰加厚于使華乃分頒夫節物儀雖辨等意則均優朝見畢歸驛賜酒果有敕卿等既覲軒墀歸安次舍俾厚壺籩之賜少休車馬之勞毋曰彛章實惟至意賜生餼有敕卿等進講賀儀退休賔館既設豆籩之渥仍加饔餼之頒尚體眷懐以湏異數賜内中酒果有敕卿等来趨日正兹遇嵗除出御府之甘芳助驛庭之晏集益修賔禮用介春祺賜被褥䤬鑼有敕卿等来趨元日将覲大昕爰加賜于寝衣仍分頒夫盥器用安次旅以示恩私入賀畢就驛賜酒果有敕嵗律更新使軺逺暨酒致屠蘇之勝盤隨椒栢之芬均受春陽益増和氣玉津園射弓賜御筵有敕兹開禁籞用設射侯既觀舍矢之能爰錫在公之燕有發必中不醉無歸朝辭畢歸驛賜酒果有敇卿等甫辭殿渥尚憩賔郵載為川陸之行更厚壺籩之錫益祇眷渥以示初终賜大銀器有敕卿等既成聘禮將治歸装乃頒什器之豐皆用五金之次是為異渥式助遐征囬程賜御筵有敕卿等成禮言歸登途欲逺仍特頒于載燕曽不替于初筵春日尚寒賔僚加厚賜接伴使副春幡勝口宣有敕卿等往迓使軺還趨行闕值陽和之届律加好賜之如儀其服殊私益祇厥事金國賀登寳位使人到闕口宣賜被褥䤬鑼有敕卿等肅将使指来賀君臨爰頒盥洗之珍仍致衾茵之麗用安次舍其服恩私賜使副春幡勝有敕卿等逺修邦好適遇春陽爰加節物之頒庸示使華之寵尚祇渙渥益締歡盟賜接伴使副春幡勝有敕卿等迓客于畿還朝有日當此新春之始特加好賜之優其體眷私益修使事賜三節人從春幡勝有敕春起于東使来自北舉綵杖土牛之禮頒寳幡金勝之華儀則有差恩無所異朝見畢歸驛賜御筵有敕卿等来致賀儀歸安賔舘念川途之勞勩設樽爼之優隆庸示眷勤少休跋履賜酒果有敕卿等拭圭修聘將幣成儀爰加芳醖之頒仍厚嘉殽之錫少休徒御以俟賔筵宻錫大銀器有敕卿等陳儀既備執禮滋勤欲深示于情文爰宻頒夫用器非金之貴惟意之將賜内中酒果有敕卿等来修邦好克謹賔儀分御府之甘芳示使軺之華寵雖云例卷蓋出殊恩賜生餼有敕卿等既謹朝儀退安賔次俾廩人之致餼冀使者之加餐異數相望眷懐増厚特賜御筵有敕卿等趨朝甚謹授館方安修客禮以無違秩賔筵而有楚特将予意庸慰爾勤特賜酒果有敕卿等進謹朝儀退安賔館賚此壺尊之腆加以肴核之珍蓋示殊私尚承好賜玉津園射弓賜酒果有敕卿等肅駕使軺共修賔射諒慰四方之志想聞百發之能爰錫甘芳少休勞勩賜射弓例物有敕卿等講射寳津視儀相圃爰首頒于弧矢仍加賜夫金繒張弛具宜恩私愈渥朝辭畢歸驛賜酒果有敕卿等講射寳闕事畢言旋錫列甕之芳醪洎加籩之珍果少休賔馭行届歸程賜御筵有敕卿等履勤入覲兹遂告歸更加籩豆之優不替權輿之始尚祇燕禮徐戒行装特賜銀有敕卿等備成使事俱趋歸程特頒山溢之珍用助清馳之役毋云故事蓋示優思回程赤岸賜酒果有赦卿等已祇聘禮初計歸程迺馳賜于上尊仍分頒夫碩果少安旅次徐屇征逺賜御筵有敕卿等持禮言還戒途伊始爰啓在公之燕用華修聘之歸既秩賔筵遂登客路賜龍鳳茶金鍍銀合有敕卿等邦好既修回途未逺珍茗選春芽之賜寳奩分山溢之餘是曰殊恩用將厚意平江府賜御筵有敕卿等賀禮既周歸程寖逺甫即蘇䑓之次載修鎬燕之儀益向長途毋忘厚意鎮江府賜御筵有敕卿等逺来致慶倏遂言旋念北客之改轅即南徐而錫爵眷私無替禮貌罙修盱眙軍賜御筵有敕卿等来持慶禮回次邊疆欲締好于兩朝復陳儀于四簋行當上道更祝加餐金國賀正旦使人到闕囘程口宣賜龍鳳茶金鍍銀合有敕卿等將命言旋登途寖逺飾寳奩而加恵實珍茗以分頒深示恩私式安行役平江府賜御筵有敕卿等来賀履端更勤歸報洊錫吴門之宴用津燕驛之行春日尚寒征途加䕶鎮江府賜御筵有敕肅持玉節還次丹陽仍優宴豆之儀用慰川途之役其均既醉毋憚遄驅盱眙軍賜御筵有敕卿等逺賀元正汔修使事爰肆筵于邊服将夙駕于歸途眷禮之私始终無異報謝使副林季友郭正已回程到闕傳宣撫問并賜銀合茶藥口宣慶元元年正月一日有敕卿等握節言旋登載告至想風寒之匽薄念川陸之艱勤茗劑寳奩併加存撫金國諭成使赴闕口宣嘉定元年八月盱眙軍傳宣撫問并賜御筵有敕卿等載馳原隰始届疆陲當和議之既成喜歡盟之復締首加勞問仍示宴私鎮江府賜御筵有敕卿等持節鼎来楊舲既濟望信書之漸近啟賔燕以加勤其體眷慈式遄行邁鎮江府賜銀合茶藥有敕卿等肅擁使華来修邦好爰厚寳奩之錫用加珍品之頒庶滌煩勞式祇延佇平江府賜御筵有敕卿等逺將信幣来次近畿嘉膚使之再馳宜賔筵之三錫是為異數用賁行人赤岸賜酒果有敕卿等徒御逺来郊圻宻邇爰再頒于甘醴仍分錫夫嘉肴行色休休賔儀是飾賜御筵有敕卿等遥驅使傳切近國郊將修昕旦之儀重錫需雲之宴式昭眷意益謹前窺賀生辰國書使介載馳伸講誕辰之慶郵音垂諭少遲良月之期䖍致函書逺将篚幣用祝無疆之算益堅有永之盟施及黎元同躋仁夀攻媿集卷四十七欽定四庫全書攻媿集卷四十八宋樓鑰撰内制明堂禮畢告謝五岳四瀆祝文原集此首前有告謝天慶觀青詞滿散朱表今刪伏以祇奉慈謨親行大嚮多儀既備景貺孔昭實惟山川之靈陰相馨香之薦尚歆誠悃滋介純禧明堂禮畢祭謝五嶽四海四瀆祝文伏以肇祀合宫告成熈事惟二儀祖宗之禮皆已備修凡五岳河海之神悉均望祭雖靈祠之尚逺顧䖍報之敢稽明堂禮畢奏謝諸陵表文原集此首後有瑞慶節建康府茅山崇禧觀啟建祝夀道場青詞滿散朱表今刪伏以嗣厯云初奉先為大適三嵗當郊之際祇薦總章惟列聖在天之靈俯垂陰佑雖潔齋之粗備懼誠悃之未孚髙厚顧歆神明来格既訖成于熈事敢恭布于深衷遥望陵宫不勝感涕安穆安恭皇后改諡告太廟祝文伏以仰惟烈祖將祔太宫易别廟之舊稱從成孝之尊諡先期以告英鑒其臨大行至尊夀皇聖帝靈座祝文伏以集百官于南郊首定稱天之諡奉二后于太室改從祔廟之名將舉盛儀敢伸昭告奉上孝宗皇帝諡冊寳成穆成恭皇后改謚冊寳奏告天地社稷十神太一祝文原集此首前有瑞慶節滿散道塲賜三省樞宻院殿前司馬軍司步軍司乳香口宣瑞慶節萬夀觀滿散道場青詞滿散朱表瑞慶節太一宫設醮青詞滿散朱表又此首後有天慶觀報恩光孝觀青詞太上皇帝本命萬夀觀設醮青詞滿散朱表今並冊伏以夀皇即逺方定于尊稱祖后俱從當更于舊諡將嚴寳冊敢告神祇孝宗皇帝謚號下日改換銘旌奏告祝文伏以烈祖在天南郊定謚既遵節恵之典載飭神明之旌仰惟威靈俯鑒誠恪孝宗皇帝欑宫神圍除去鋪屋窠木等奏告昭慈聖獻皇后永祐永思陵祝文伏以皇祖上仙期方臨于七月稽山庀役地實近于諸陵暫撤徼廬稍開宰木懼有驚于神御敢先叩于威靈仰冀洪慈俯加陰祐孝宗皇帝祔廟修製祐室太廟殿宇廊廡權奉安祖宗神主于初獻㕔時前奏告祝文伏以仰尊烈祖將祔太宫奉二代之宗祧飾累朝之祐室暫遷神主敢告威靈權奉安神主祝文伏以崇飾太宫奉遷神主少寓齋居之邃以須祐室之成敢冀慿依用伸䖍告祭祀太廟土地祝文伏以修崇清廟升祔孝宗念斤斧之交興懼神祇之或聳敢先昭告願相多儀閻仲續康伯修奉欑宫傳宣撫問并賜銀合茶藥及喝賜一行官吏工匠等犒設口宣有敕卿等視役山陵宣勤夙夜勞風寒之匽薄頒茗劑之珍芳好賜有􅏔工徒無怠孝宗皇帝梓宫發引祝文啓欑伏以阜陵既飭靈駕將行遂從禹穴之蔵式啓啇楹之殯攀號何及昭告宜先前及日初昏奏告伏以窀穸有期念终天之永訣靈輿即逺痛詰旦之將行重惜分陰罙増孺慕發引時前祭告伏以六紼有行九京寖逺追念抱孫之愛阻伸臨穴之勤少駐須臾不勝哀殞啓奠行禮伏以扵穆孝宗將趨神穴爰諏榖旦肅引靈輀顧挽紼以難留遂遵途而即逺音容愈邈慟哭何堪祖奠行禮伏以陵宫既備愴我祖之何之紼翣啓行痛仙㳺之不返拊龍輴而永訣駕鯨浪以遂東祖祭是修哀號愈切下皇堂時前奏告伏以扵皇文祖將就菆塗愴永閟于衣冠痛莫親于兆域式安玉體絶望天顔掩欑畢迎奉御容詣下宫奉安伏以明明我祖奉窀穸以既安雝雝在宫痛威容之愈邈天顔惟肖神宇具依不勝追逺之悲敢致妥靈之告孝宗皇帝梓宫發引奏告天地社稷太廟别廟太一宫祝文伏以烈祖上賔阜陵告備慈啓菆塗之舊將趨兆域之蔵敢告先期仰祈陰佑至欑宫奏告帝后祝文按原集此首前有天慶觀報㤙光孝觀青詞此首後有冬至莭孝宗皇帝几筵水陸道場齊文皇帝本命萬夀觀青詞散滿朱表今並刪伏以奉皇祖之菆塗勉襄大事近累朝之兆域敢告威靈未遑洛邑之歸尚奉㑹稽之𦵏仰祈孚佑咸遂妥安孝宗皇帝虞主自浙江還重華宫鼓吹導引曲孝宗純孝前聖更何加髙蹈處重華丹成仙去龍輴逺越岸暮山遐波臣先為捲寒沙来往護靈槎九虞禮舉神祇樂萬世佑皇家孝宗皇帝神主自重華宫至太廟祔廟鼔吹導引曲吾皇盡孝宗廟務崇尊鉅典備彌文巍巍東向開基主七世祔神孫追思九閏整乾坤環宇慕洪恩從今宻邇髙宗室千載事如存孝宗皇帝虞祭畢卒哭行祭禮祝文伏以阜陵復土既修易奠之虞班祔有期遂卒無時之哭仰遵禮典莫究哀悰孝宗皇帝神主祔廟并成穆成恭皇后神主同時祔謁升祔奏告祖宗后帝祝文伏以竣事阜陵既畢九虞之祭寜神祏室實同二后之升祖宗是依昭穆以序實循禮典敢告威靈孝宗皇帝祔廟樂章聖人之徳無加于孝思皇孝宗履行立教始终純誠非曰笑貌於萬斯年是則是傚太廟修置太祖至髙宗室帝后神主祏室畢工時前奏告還殿室祝文伏以班祔孝宗崇新清廟備累朝之祏室奉列聖之神靈敢告先期冀垂昭格還殿正奉安祝文伏以阜陵竣事太室鳩工爰蕆禮于宫庭用妥靈于宗祏以享以祀来燕来寜孝宗皇帝祔廟時前告遷成穆成恭皇王神主詣幄次權行奉安以俟同時祔謁升祔祝文伏以阜陵竣事奉神主以即安室祏致嚴妥柔靈而並祔稍遷邃幄将奠太宫惟時之良敢豫以告孝宗皇帝神主祔廟前二日奏告祝文首原集此前有太上皇帝本命太一宫設醮青詞滿散朱表今刪天地伏以尊祖禮嚴因山事畢用宏開于宗祏将升祔于靈儀信宿之先潔齋以告仰祈昭鑒永賴孚休宗廟伏以於皇文祖既畢安虞爰攷禮于前朝盍妥靈于太室仰瞻列聖敢告先期其永無疆克昌厥後别廟伏以惟我孝宗將登清廟設九虞而既畢奉二后以同升永世是承前期敢告太社太稷伏以永阜訖功孝宗升祔惟億載萬年之鉅典告九土五榖之明神願鑒先期式垂孚佑太一宫伏以烈祖上賔太宫升祔國之大事其敢弗䖍天之尊神是當先告冀垂昭格用妥威靈改元慶元奏告昭慈聖獻皇后永祐陵永思陵永阜陵成穆成恭皇后欑宫表文原集此首前有天慶觀報恩光孝觀青詞今刪伏以仰奉慈謨勉承丕祚將興嗣嵗首議嘉名惟慶厯最為盛時而元祐尤伸公道履端伊邇敷號云初敢告威靈式祈孚佑改元奏告祝文夀原集此首前有皇帝本命萬觀設醮青詞滿散朱表今刪天地景靈宫天慶觀報恩觀同伏以纘緒何堪改元惟謹稽仁祖致平之盛洎泰陵嗣徳之初合取嘉名用綿丕祚敢伸昭告仰冀孚休宗廟景靈宫帝后諸陵表文同伏以承列聖之休謹踰年之制合太宗明皇之號有唐實創于嘉名仰慶厯元祐之時我宋尤稱于盛際爰筆新于嵗紀敢䖍告于威靈社稷伏以嗣位承休踰年改號取慶厯元祐之盛期紹重規仰勾龍后稷之神用伸昭告尚祈靈佑益介炎圖太一宫伏以嗣厯云初紀年敢後合兩朝之盛爰號慶元告十神之靈用祈福佑尚惟昭鑒永助丕基上辛祀感生帝以太祖升侑奏告祝文天地伏以祀感生之帝蓋已有年侑創業之君始從今日敢伸昭告仰冀孚休宗廟伏以推功藝祖既居東向之尊升侑感生兹謹上辛之祀仰瞻列聖豫告先期社稷伏以感太㣲之精夙祇大祀推藝祖之烈升侑明神惟社稷之炳靈設豆籩而致告諸陵諸欑宫表文伏以上辛榖旦大旅盛儀爰推立極之功克配感生之祖遥瞻陵域敢告吉期事體至嚴威靈斯鑒僖祖順祖翼祖宣祖還正殿奉安祝文伏以新廟是營羣言允協爰卜太宫之右用安四祖之靈敢冀威神式歆典祀奏告太廟祝文伏以肇舉盛儀宏開别廟祧僖宣之祀視夾室以尤嚴遷順翼之靈祔先公而惟謹仰祈列聖俯鑒忱衷春分前修飾欑宫奏告諸陵祝文伏以嵗序流易春陽正中既當雨露之濡益愴宫陵之念繕修惟謹種藝以時敢告先期尚祈昭格進奉皇太后生辰表詞帝原集此首前有太上皇本命太一宫設醮青詞滿散朱表今刪伏以尊居長樂方歌難老之詩時届芳春適啟誕彌之節邦家均慶宫壼交欣中賀恭惟夀成皇太后殿下徳合坤元心同天大贊淳熈之内治恭儉具孚命菲質以嗣興恩私未報方具㳺神澹泊玩志清虛益觀過厯之期坐閲後天之算臣夙承大造獲奉慈顔含飴㺯孫咸仰姜任之盛戲綵為樂惟祈箕翼之年伏以修蘭亭之禊事方樂春陽上椒殿之夀觴仰尊祖后夀成皇太后殿下恭願坐膺多福日介脩齡國治家齊合三宫而同慶天長地乆見千載之太平太陽交蝕祭告太社祝文伏以季春五陽日食于朔側身修行朕不敢怠伐鼔于社彛章具存尚抑羣陰以助陽徳陰雲不見交蝕祭謝祝文伏以清臺獻占太陽當食引咎自省方切兢兢東方未晞隂雲布濩實惟神賜敢恃天休孝宗皇帝小祥奏告永阜陵欑宫表詞原集此首前有皇帝本命萬夀觀設醮青詞滿散朱表太上皇帝本命太一宫設醮青詞滿散朱表又有太一宫祝延太上皇帝聖夀設醮青詞滿散朱表今竝刪伏以念兹皇祖遽驚新榖之升瞻彼阜陵罙切髙山之仰恭惟尊號皇帝恢宏帝業垂裕孫謀兹當祥練之初敢後馨香之薦馳誠惟謹隕涕無從改元嘉定奏告祝文開禧三年十二月天地景靈宫天慶觀報恩光孝觀伏以祇奉洪圖寖逾周紀屬時多故欲開嗣嵗之祥乃選嘉名用冠新元之首敢伸昭告祈介宏休宗廟諸陵伏以承列聖之休方深夕愓紀新元之號式介春祺開景運之亨嘉期武功之耆定仰惟敷佑敢不欽承太社太稷伏以為國家者尢謹于紀年有社稷焉敢稽于蕆事仰冀神靈之佑庶開嘉定之期肇易美名爰伸昭告太一宫伏以國之大事莫重改元天之尊神當嚴昭告願介亨嘉之㑹遂成耆定之功益卑多祥以興嗣嵗諸陵欑宫表文伏以祇奉洪圖寖踰周紀屬時多故欲開嗣嵗之祥乃選美名用冠新元之首取啇宗嘉定之㫖睎武王耆定之功仰冀孚休敢伸䖍告閏四月起居諸帝后表詞嘉定元年諸帝旦表伏為積分成閏適當孟夏之餘告廟有儀敢飭先王之典恭惟諡號皇帝徳參髙厚仁及華戎仰賴在天之靈益綿奕世之慶式供嘉薦用妥威神諸后旦表伏為元年建巳閏月定時既當視朔之初爰謹奉先之禮恭惟謚號皇后坤隆厚載世嗣徽音慨莫望于聲容尚永綿于慶羡式修孝敬敢薦馨香諸帝望表伏為閏以正時方謹居門之日月惟既望敢修朝廟之儀恭惟謚號皇帝澤寖羣黎慶緜百世望僊㳺而雖邈席丕祚于無疆爰薦孝思用循彛典詣諸后望表伏為四月維夏閏式紀于歸餘先后在天禮用陳于改望恭惟諡號皇后母儀如在神御即安永陪衣冠之㳺用綿宗社之慶奉承思孝奠薦惟馨洞霄宫徑山天目山龍井祈雨祝文伏以國方多事所願年豐春夏以来甘澤未足種不入土遺蝗已䌓當宁興思旱氣甚廣近雖得雨猶未霈然遣官禱祠齋心以俟庶祈響答三日為霖大慰九農敢忘伸報故皇子肅王垍興靈前夕敕祭祭文嗚呼哀哉頃欣嬪御得此誕育晬盤將設何去之速情之所鍾念念顰蹙苗而不秀無乃太促一奠寓哀往從幽卜成肅皇后小祥奏告永阜陵欑宫香表詞伏以祖后上賔尚想含飴之愛嵗華遽易忽驚鑽燧之期遥瞻陵寝之嚴倍切音容之感期已乆矣儼追慕以如新練而慨然顧加隆而敢怠肅陳寳炷用表哀誠雨澤愆期奏告祝文天地十神太一九宫貴神嶽鎮海瀆伏以旱魃為災間有不免在于九嵗利害尢深疆埸甫寧流徙未復中外空匱正望有秋屬兹常暘種或未入苟失嵗事何以有邦顧慚菲涼乆䝉敷佑髙髙在上皇地祇云后土靈祇俯鑒哀祈三日為霖庶以活國側身引慝恭俟嘉應宗廟别廟伏以時方常暘憂懼實甚種未入土何望収成間有一雨未能霑足齋心致禱靡神不宗在天之靈願垂矜憫有請于帝救此下民沛為膏澤徧及遐邇迄用康年以夀國脉太社太稷雨師雷師風師原集此首後有天夀觀報恩光孝觀青詞今刪伏以社稷與君以民為重民之司命以食為天時方多艱仰望一稔乆矣不雨雨又復霽傾心禱祈願垂嘉答廣布甘澤普濟羣生報以秋冬其敢不飭禳蝗祝文原集此首前有皇帝本命萬夀觀設醮青詞滿散朱表今刪天地伏以稼穡維寳方興播種之功蝗蝻為災備舉禬禳之術雖都城之少静顧畿甸之尚䌓逺邇何殊焦勞則一敢祈上帝地云后土俯念斯民既敕酺神盡屏衆多之害更令田祖益昭秉畀之靈社稷伏以禾苗方茂社稷焉依雖旱魃之已驅復飛蝗而為孽神既職幽冥之事朕不勝宵旰之憂爰致禱祈願垂感格掃螟蟊而無迹庶穡稼之有成酺神伏以比以飛蝗之作孽嘗遵故典以祭酺都邑頓清無非昭答郊圻未免敢怠祈禳惟盡除振振揖揖之災庶㡬有薿薿芄芄之望雩祀祝文前一日奏告太宗室伏以旱魃挻災禱而既應覆出為虐其害愈深爰即紫壇仰祈清昊熈陵之徳實配彼天豫告威靈願垂昭格有請于帝蘇此遺黎上帝伏以旱氣方隆禱既如響飛蝗肆孽禳之亦消柰何常暘又以示譴朕實不徳民則非辜祇祓郊丘謹修雩祀仰祈上帝哀閔下民蚤興雲雷大沛雨澤無有逺邇均被滂沱坐變凶年復成樂郊邦本所繋惟天佑之太宗伏以天災流行固知代有今嵗之旱尤所弗堪禱雨應期方幸周浃陽居大夏兹焉益驕爰即泰壇恪修雩祭稽諸故典作主侑神曽孫菲凉宜致疵癘殃及萬姓實惟焦心在天之靈願垂矜閔亟頒甘澤以迄康年皇地祇伏以至哉坤元厚徳載物生我百榖以活斯人比雨應祈種幸入土苗而未秀又復亢陽滌滌山川物意焦灼國有故典禱旱以雩后士資生敢伸䖍告願垂大恵敕使百神三日為霖溥及萬域以蘇焦槁以致豐登庶幾有邦可以長保再奏告宗廟别廟伏以顧惟菲涼負荷至重常暘之罰乃徧黎元飛蝗未清雨而復旱投誠列聖威靈在天閔予曽孫以及赤子亟垂昭格沛以甘霖迄用康年保邦是賴别廟云雨而復旱兹焉致禱願昭感通太社大稷嶽鎮海瀆五方山林伏以惟民之生以食為命聰明正直亦惟相依今兹旱災日既太甚側身致禱徧于百神仰冀為霖沛然四洽庶有秋之可望豈嘉報之敢稽内中禳蝗文按原集此首前有成肅皇后中元節水陸道場齋文今刪伏以旱魃云初遂致飛蝗之作孽雨帥既應不圖遺種之滋䌓逺侵閩楚之疆近集郊闗之内遇災是懼惟帝焉依願敕百靈盡除螟螣之害俯令萬國咸保稲梁之豐祈雨感應報謝祝文天地伏以渉春以来旱氣甚廣種未入土上下隐憂宵旰齋心日致忱禱皇皇后帝皇地祇云坤元后土實賜鑒臨曰雨而雨隨時孚應藝我稷黍寖成小康盡彼萬物不足以報矢詞告謝少致衷誠宗廟伏以亢陽為災㡬害穡事國計所繫無所控祈夙夜投誠父母先祖敢期上徹在天之靈霡霂滂沱㡬無虛日旱魃退聴良苗勃然所在中熟實踰始望傾心報謝其敢弗䖍别廟伏以亢陽已甚嘗致禱祈甘雨以時實為孚應兹成中熟獲濟民生幽贊為多可無致謝十神太一九宮貴神伏以民為邦本食乃民天嵗一不登何以為國頃以旱甚禱于尊神九宫貴神云禱于貴神如饗應聲随車滂沛肅時雨若易歉為豐敢罄謝誠尚求终恵嶽鎮海瀆五方山林伏以國方多事豈堪旱災䖍誠禱祠靡神不舉時雨之降實由山川三日之霖四逺霑足嵗事将就䖍謝敢稽太社太稷雨師雷師風師原集此首後有天慶觀報恩光孝觀青詞今刪伏以顧惟菲徳致此亢陽仰賴百神鍳予忱禱風雨時至雷霆疾驅逺邇均霑成此中熟一祈一報敢怠此誠尚惟居歆益加敷佑祭告酺神蟊賊為災秉卑有資于田祖蝗蝻肆孽掃除實賴于酺神既隨禱以盡消俄蔽空而復至人心相恐嵗事可憂疑有物以驅之殆非力可及者載修祀事仰叩髙靈俾食葉食心之妖罔存噍類成多黍多稌之慶還保豐登攻媿集卷四十八欽定四庫全書攻媿集卷四十九宋樓鑰撰謚議孝宗皇帝諡議奉敕撰臣聞帝王之出治豐功茂烈生則著見于天下而其流傳于後世者則待節恵之名要皆取其盛者而傳之文王一怒而安天下非無武也武王告取成而作洪範非無文也取其盛者而傳之則備道全美可以一言定也甚哉孝之大也虞舜之大武王之達自漢厯唐無不論帝為孝本朝累聖相承皆用舊典若夫集孝道之大成則未有如大行之盛者也恭惟大行至尊夀皇聖帝繩藝祖之武重光堯之華以天縱之能日新之徳臨御天下二十有八載巍巍煌煌不可備述若形容天地繪畫日月則不容無辭方在初潛龍徳而隐學聚問辨師教不煩日就月將君徳昭著䖍鞏勞謙共為子職日趨朝謁威儀雝肅雖莫窺其涯涘而中外屬心天人協應光堯内禪髙視唐虞嗣位以来勵精庶政召收故老尊禮元臣臨朝若神待物如春崇節儉以革奢汰之風振紀綱以起偷惰之習事無小而不察人無微而不記機務雖䌓酬酢無壅立法定制動為後則以科舉為未盡則立待補之法以蒐遺才以武舉為未盛則優入仕之級以收智勇年勞並用以裁濫賞而不致于累遷銓闈加嚴以抑任子而又為之限節改秩必使之作邑謂舉以親民而使之治民御史必取之賢宰謂受人之察而後可察人以周行速化必使試郡而後為郎以延閣清華必俟有功而後除職監司守將必延見而臨遣癃老昏繆之人不得而隐藏姦贓之吏必窮治而斥逐清介潔㢘之士則從而㧞用朝士闕官乃除遂無待次之淹要郡留闕選才遂無輕授之宂黜贓吏之世賞進軍功于流内長慮卻顧守之至堅故雖日不暇給而四方靡然向化矣于時疆場未寜戎車方駕激厲將士嚴備邊陲張皇六師明見萬里中原起来蘇之望殊鄰多歸附之民撫而有之還以為用天威既振强敵畏讋雖犂庭掃閭未快初志而信使復通減幣殺禮至今無煙火之警苟非雄斷逺略何以臻此臨政既乆治道愈明物来能名事至輙斷精神之運上際下蟠于天地之間智慮所闗六通四闢于帝王之徳行公道以銷黨偏之蔽推平心而絶喜怒之私間有水旱之變應天以實而禮文尤備州縣之奏恐其不速蠲復之數恐其不多傾囷倒廩以濟其急賞勤罰惰以勵其餘民不知其有凶嵗亦隨以登熟幸太學幸秘省廷䇿貢士布文教以振士風御鞍馬親弓矢申嚴軍法立武事以張國威内外大小之臣無不列之屏以待黜陟山川險要之要無不指諸掌以立防閑治具畢張風化已成方且玩意希夷而無奉道之過㳺心寂寞而無佞佛之迹作歌天之圖兢懼愈深闢延和之殿諏訪愈切躬講讀之勤設遺補之官其于保治有始有卒至于脱屣萬乗燕居重華授受之際尤為雍容嗚呼身退而道彌髙尊極而用彌儉是宜萬有千嵗永處慈扆而厭代登遐歸于帝鄉此羣臣萬姓所以攀號擗踊泣盡而繼之以血也逺日有期恭定尊諡請之南郊以詔萬世謹按謚法曰能官賢才曰哲帝徳廣運曰文應變無方曰神保大定功曰武持盈守滿曰成慈恵愛親曰孝迹無知人而善任使文武各得其用非所謂能官賢才乎修徳以来逺人矢文以洽四國非所謂帝徳廣運乎酬酢以周萬㡬圖回以盡衆智非應變無方乎妙韜略而不用極聰明而不殺非保大定功乎守基圖之廣大延國祚于綿逺非持盈守滿乎若孝道之盛非惟臣子所不能稱贊雖攷之諡法求之六家語其甚盛者曰慈恵愛親而已是則未足以彰大行之孝也報本反始而奉郊禋尊祖敬宗而事廟饗惟髙宗為天下而得人太皇盡母道以愛子而大行天賦至性不可解于心備四海九州之養謹五日一朝之儀委曲周盡猶恐不及兩宫九閏終無間言固已風動四方震服荒裔髙宗屬疾則衣不解帯躬自嘗藥及棄天下則勺水不入于口倚廬有過于哀鄙漢文之短喪陋晉武之無斷身服苴麻禮盡苫塊行有匹夫之所難哭則哀動于左右鄰使来弔止許朝于喪次顔色之戚哭泣之哀鄰使退而嘆曰皇帝聖孝乃如此大臣或進諭解之言則流涕被面曰大恩難報羣臣感泣莫敢仰視易月之制既终因山之役既畢孺慕無已追逺弗勝遂舉大寳以畀聖子不曰倦勤不曰求逸惟曰不得日奉先帝之几筵躬行聖母之定省又曰俾予一人獲遂事親之心永膺天下之養于是御素服于乗輿尊几筵于内殿退處堊室以終三年之喪哀疚不忘齋潔自若欽事慈福温凊無違嗚呼兹豈非集孝道之大成又豈慈恵愛親之所能盡也大行至尊夀皇聖帝宜天錫之曰哲文神武成孝皇帝廟號孝宗謹議成穆皇后改諡議奉敕撰臣聞帝王之興皆有天命夫婦大倫尤非偶然曰天作之合曰天立厥配正始之道王化之基于是乎在焉矧汾陽大家多為后族唐室憲宗則有懿安之盛皇朝真廟則有章穆之賢姓系相承是生聖女慶鐘戚閈實嫓夀皇生不及禕衣之榮歿而膺寳冊之禮乆安别廟將奉太宫宜改尊稱以從帝諡恭惟安穆皇后柔明懿淑慈順温恭蚤儷王藩克盡婦道設桑弧于門左屢占熊夢之祥帯弓韣于禖前每啓燕祠之瑞云何不淑遽奄九原迨烈祖之御天眷元妃而追冊欲歌流荇傷不見于令姿正號長秋遂疏恩于幽穸固已嚴烝嘗之奉崇節恵之名綿慶祚于三朝介洪休于萬世重華厭代方服大喪吉竁因山行當升祔念今日遺弓之痛既切于神孫愴昔時故劍之求用承于先志爰因安穆之懿式遵成孝之規謹攷謚法婦徳均一日成徳化肅雍曰穆安穆皇后窈窕好逑有闗雎之美用心専壹有鳲鳩之徳非婦徳均一乎孝欽以奉舅姑和平以儀閨門非徳化肅雍乎伏請改上諡號曰成穆皇后成恭皇后改謚議奉敕撰臣竊惟至尊夀皇聖帝臨御之初仰奉髙皇首隆孝治化家刑國百度具舉而中闈乆虛陰教斯闕乃奉親命乃諏卜吉攷正古制閎建長秋安恭皇后淑範懿徳冠于後宫君子好逑遂正乎内坤承乾而時行月遡日以為明禕揄盛服助成九廟之奉􅌨縱具禮欽承兩宫之養母儀既尊后徳有輝而曽未數嵗祲纏椒掖方隆大練之飾终符素柰之祥求賢審官未展周南之志感今懐昔空形宋文之䇿固已極襃崇之典議安恭之謚祭于别廟迨今二十有八年矣夀皇上寳萬國起號弓之慕孝孫盡禮七月庀因山之役有司奏請定謚南郊二后在天皆應改號以從成孝之名謹攷之謚典曰夙夜警戒曰成謙而好禮曰恭安恭皇后共繭館之職以贊親耕之勤謹雞鳴之戒以勉相承之道禁切外家不干裏謁兹不曰夙夜警戒乎躬節儉之徳服澣濯之衣卻貢獻之珍麗遵圖史之箴規兹不曰謙而好禮乎伏請改上謚號曰成恭皇后劉忠肅公大中覆謚議資正殿學士劉公輔政于紹興七年未㡬而薨距今五十有餘年矣中更權臣當國之乆故家泯然無聞公又為趙丞相鼎深知同寅之人尢無敢言者迨今始得出處之詳于行状太常又明其立朝體國之大節謚以忠肅可謂當矣嗚呼髙宗皇帝身濟大業披荆棘而立朝廷一時人物雖經崇觀政宣之摧折靖康建炎之流離而元祐流風猶有存者趙公身任天下之重甄抜人望布滿中外論思勸講皆極天下選由是王政日修國勢日隆以啟中興是豈惟將帥攘卻之功哉抑聞之趙公入相之初首白髙宗必欲得公與王公庶為執政以自助二人遂並用方是時君臣上下日夜講求恢復之計外與敵通使而為備甚飭所謂行在所止為時巡之謀若不可以一朝居非若後日之晏然于此也公之同心輔贊力正國本太常之言皆家世舊聞參以記傳炳炳如丹而後公之名益顯望之如神人然公議之不可泯謚法之有益于天下如此可不務哉王節愍公倫覆謚議馬或奔踶而致千里士或以負俗之累而立功名夫泛駕之馬跅􅕟之士亦在御之而已此雖非古先用人之道漢武帝所以能得竒才為用盖以此也靖康艱難事出倉猝承平百年衣冠如雲習于乆安不知所為平時經明行修襃衣博帯之士狼狽失守不計其㡬至有助桀為虐忘君賣國不忍言者樞宻王公名臣諸孫跌蕩不羈浮湛閭里不見其異一旦慷慨奮發論事激烈抗章敢言欽宗為之改容擢于布衣待以國士天下方知其為竒男子也帥府既建首為勸進之舉髙宗募忠勇之士往使不測之敵罔有徇死以行者惟公機智勇辯氣吞强敵往来冄三忠肝義膽折服倔強和議之成為力最多公之志盖未已也故毎當陛辭必以乗機用兵為請勿復以臣為意此其志豈止于和戎哉冄使被留音問斷絶誘以髙爵而不就脅以嚴誅而不懼引義南向仗劍以死郡邑為之震動至畫像而祠之回視小亷之士其能以忠徇國視死如歸如公者寡矣太常易名曰節曰愍無可議者傳之来世抑以見取士之無方不應以細故而棄才也楊恵懿公偰覆謚議謚所以易名也法苟應謚雖功烈不見于世亦必隨其人之所宜而稱之此孔文子之所以為文也故特贈光禄大夫少傅楊公某生長富貴不知天下之憂患而抗志不羣篤志問學隆師親友嗜書好古若有不能自已者古人以公子而厲布衣之操者公實近之已而㳺太學擢上第優㳺都城以致顯方是時四方無事朝廷尊安周旋清華尤無以自見于事然因所職而建言類老于世故者自詭治民休有恵愛晩登禁途益有志于效忠孜孜論思時見一二不幸所藴未伸天不假之年而遽忽焉惜乎未見其止也官簿已髙一贈而至光禄禮官即其已行者揆之以法謚以恵懿得其實矣尚何異辭攻媿集卷四十九欽定四庫全書攻媿集卷五十宋樓鑰撰進故事唐鑑李絳對憲宗曰人臣死生繫人主喜怒敢發口以諫者有㡬就有諌者皆晝度夜思朝刪暮減比得上達十無二三故人主孜孜求諌猶懼不至况罪之乎帝善其言比舊唐書李絳傳不載此新唐書載絳見浴堂殿帝曰諌官多朋黨論奏不實皆陷謗訕欲黜其尤者若何絳曰此非陛下意必憸人以此營誤上心自古納練昌拒諫曰夫人臣進言于上豈易哉君尊如天臣卑如地如有雷霆之威彼晝度夜思始欲陳十事俄而去五六及將以聞則又憚而削其半故上達者纔十二何哉干不測之禍顧身無利耳雖開納奨勵尚恐不至今乃欲譴訶之使直士杜口非社稷利也帝曰非卿言我不知云云與此大意同而詳約其異帝謂宰相曰太宗以神聖之資羣臣進諌者猶往覆數四况朕寡昧自今事有違宜卿當十論毋但一二而已舊唐書憲宗本紀元和二年十二月丙辰上謂宰臣曰朕覽國書見文皇帝行事少有過差諫臣論諍往復數四况朕之寡昧涉道未明今後事或未當卿等毎事十論不可一二而止與此無異意而語句不盡同臣嘗謂近古敢言者在唐太宗時無如魏徴太宗嘗賞其直言徴對曰陛下導臣使言所以敢爾不然臣敢數批逆鱗哉在憲宗時無如李絳而絳之言如此不惟曲盡人臣之情盖亦躬自蹈之而後能言之以此知一介之臣敢言于人主之前者至鮮惟在人主有以導之憲宗有意貞觀之治魏原集因避宋仁宗諱魏徵作證貞觀作正觀今並更正謂事有違宜卿當十論毋但一二而已絳既能開廣帝意憲宗又能勵其羣臣如此中興唐祚不在兹乎仰惟陛下和顔聴言好善忘勢凡有奏對無不俯納臣宻侍清光實親見之而臣猶援憲宗李絳之言者蓋當國家閒暇人心易弛朝廷之上罕聞直殾又曰聖躬康復以来羣臣深恐仰勞聴覽奏事不敢遲乆言而簡切固不在多第恐相習成風各務省事朝刪暮減恐無二三情實不輸事理不究羣臣苟免煩瀆之過陛下因謂無事可言私憂過計昧死陳述願陛下厲太宗憲宗之志俾廷臣竭魏徴李絳之忠知無不言言無不盡上下交泰以興治功聖度優容擇其可用者力行之顧何事之不濟哉竊見陛下視朝之際宰輔奏事已乆亦難以坐至日宴壽皇在御之日多于進膳之後便殿引見臣寮得以從容詢訪此實陛下家法可舉而行也資治通鑑武徳九年九年舊本訛八年今據資治通鑑改正房𤣥齡嘗言秦府舊人未遷官者皆嗟怨曰吾屬奉事左右㡬何年矣今除官反出前宫齊府人之後太宗曰王者至公無私故䏻服天下之心朕與卿軰日所衣食皆取諸民者也故設官分職以為民也當擇賢才而用之豈以新舊為先後哉新而賢舊而不肖安可舍新而取舊乎今不論其賢不肖而直言嗟怨豈為政之體乎貞觀元年或上言秦府舊兵宜盡除武職進入宿衞進舊本訛追今據資治通鑑改正太宗謂之曰朕以天下為家惟賢是與豈舊兵之外皆無可信者乎汝之此意非所以廣朕徳于天下也三年濮州刺史龐相夀坐貪汚解任自陳嘗在秦王幕府上憐之欲聴還舊任魏徴諫曰秦府左右中外甚多恐人人皆恃私恩是使為善者懼上欣然納之謂相夀曰我昔為秦王乃一府之主今居大位乃四海之主不以獨私故人大臣所執如是朕何敢違賜帛遣之相夀流涕而去九年岷州都督髙甑生坐減死徙邊或言甑生秦府功臣寛其罪太宗曰甑生違李靖節度又誣其反此而可寛法將安施且國家自起晉陽功臣多矣甑生獲免則人人犯法安可復禁乎我于舊勲未嘗忘也為此不敢赦耳臣聞書曰官不及私眤惟其賢爵罔及惡徳惟其能盖官爵者天下之公器人主所以厲世摩鈍犇走天下而天下為之服役者以其用之公也唐太宗由秦王嗣位其平日陪從于左右者往往經百戰之餘冒矢石犯霜露出萬死而得一生及見興王之盛者盖無㡬也太宗以至公為心雖有故人舊勲而求遷官者未始輕予祈入衛者不肯偏用至於坐貪汙者雖憐之而終遣之去犯法者雖不忘而終不敢赦惟其見之明而行之果是以能成貞觀之治本朝列聖故事一一可攷陛下毓徳春宫之乆攀附之人官之禄之其人甚多既厯四年而扳援求請今猶未已動煩宸衷曲為區處臣願陛下逺鑒文皇之公心近遵列聖之定法裁抑僥倖使各安分而退聼則外此而妄求者亦當息心朝政清明非為小補唐鑑太宗貞觀三年帝謂侍臣曰中書門下機要之司詔敕有不便者皆應論執比来惟睹順從不聞違異若但行文書則誰不可為何必擇才也房𤣥齡等皆頓首謝舊唐書太宗本紀及資治通鑑令百司自今詔敕有不便者皆應執奏毋得阿從云云並載在貞觀四年七月與此作貞觀三年異臣聞機要之司譬之人身則喉舌也舜之命龍曰夙夜出納朕命惟允盖命令之出或出焉或納焉惟欲其允而已然必先之曰命汝作納言以納名官正欲其能納也命令之頒于天下猶飲食之入腹也飲食不擇則身必病命令不審則下必傷人之飲食也柔則當茹剛則當吐喉舌之責也若不問剛柔知茹而不知吐一過喉舌所傷必多雖欲悔之已無及矣大雅之稱仲山甫曰出納王命王之喉舌惟其或出或納如喉舌之謹焉夫然後賦政于外而四方爰發也太宗其可謂知此者矣不惟聴臣下之言又敕責而使之言范祖禹亦曰朝廷設官分職非徒使上下相從欲交修其所不逮也苟取充位而奉行上令則是胥吏而已仰惟陛下平心處事虛已聴言後省間有論奏率䝉賜可不憚更改是將比隆大舜予違汝弻之訓而臣猶以太宗之事為言者言切而易明事近而可鍳亦工執藝事以諫之意惟陛下行事毎毎如此則聖徳益新朝政亦清貞觀之治不難致也三朝政要太宗淳化七年六月以左諫議大夫魏庠司封郎中知制誥柴成務同知給事中事凡制敕之有所不便許依故事封駮以聞八月命樞宻直學士向敏中張詠同知銀䑓通進司凡天下章奏案牘必由二司然後進御先是中外奏報但由尚書内省籍以下有司有司或行或否得縁而為姦禁中不得知外司無糾察之職至是始命敏中等謹視其出入而鈎稽焉事無大小不敢有所留滯矣九月以給事中封駮隸銀臺通進司應詔敕並令樞宻直學士向敏中張詠詳酌可否然後行下富弻等釋曰古者詔令皆中書奉行門下省審封駮改正厥有司存太宗親選向敏中張詠同判通進司等以察稽失二府奉行之過皆得改駮闗防之意謹之于始也今之羣臣多不舉職官有封還之名未聞駮正之實所以命令不由此司十有六七盖因循之蔽也臣竊惟唐給事中之職凡百司奏鈔侍中既審則駮正違失詔敕不便者塗竄而奏還謂之塗歸李藩為給事中制有不便就敕尾批卻之吏驚請聫他紙藩曰聫紙是牒豈曰批敕耶唐制之嚴如此中更五季寖失其職太宗皇帝深究治亂之源特振其職業妙選名臣為之曰凡制敕有所不便許依故事封駮曰應詔敕並令詳酌可否然後行下則是事無輕重政無大小官無尊卑封駮詳酌是其職也近者給事中論奏除目或謂止當駮論横恩不當及此臣深恐此論有誤宸聰使後省寖失其職紀綱廢紊所闗者大是敢仰稽太宗致治之要為陛下言之庶使後省臣僚得舉其職言聴計行以禆聖治臣不勝惓惓漢書髙帝紀六年上歸櫟陽五日一朝太公云云詔曰人之至親莫親于父子故父有天下傳歸于子子有天下尊歸于父此人道之極也臣聞文王之為世子也朝于王季日三武王帥而行之不敢有加焉父子之道天性也一日不見豈容自安漢髙帝五日一朝其父比之文武雖曰稍踈然文武皆以世子事親髙帝已有天下曰見則有所不暇故立五日之制焉本朝列聖務盡孝道凡事祖后母后于宫中見之無時至尊夀皇聖帝之事髙宗正以異宫而處不得已俯從漢制二十八年终始不倦陛下今春過宫者再恭請者一人情感悦歡聲四起自兹以後積雨既不可出極暑又難進拜因仍至今五閲月矣都人顒顒日望翠華之駕今則雨師灑道之餘仲秋新凉之始伏望早降睿旨夙戒有司講定省之禮上以奉兩宮之歡下以慰兆姓之望臣不勝惓惓資治通鑑唐貞觀六年監察御史馬周上䟽云云太上皇春秋已髙陛下宜朝夕視膳今九成宫去京師三百餘里太上皇或時思念陛下陛下何以赴之又車駕此行欲以避暑太上皇尚留暑中而陛下獨居凉處温凊之禮竊所未安今行計已成不可復止願速示返期以解衆惑上深納之臣竊攷唐太宗時髙祖以太上皇居大安宫而太宗欲往九成宫避暑馬周切諌以為車駕此行欲以避暑太上皇尚㽜暑中陛下獨居凉處温凊之禮竊所未安又曰九成宫去京師三百餘里太上皇或時思念何以赴之此皆忠臣愛君之切足以感悟主聴垂憲後世仰惟陛下誠孝著聞乃去嵗之冬及至日嵗旦三詣重華都人歡呼中外慶快今猶未乆也霜寒陰雨固難屢出竊聞夀皇近曽宣醫外間傳聞日望翠華夫以九成宫去大安之逺馬周切切欲太宗之速還今則鳴蹕至近伏恐夀皇思念敢望出自聖意亟修定省之禮實天下幸甚攻媿集卷五十欽定四庫全書攻媿集卷五十一宋樓鑰撰序止齋春秋後傳左氏章指序春秋後傳左氏章指二書故中書舍人止齋陳公傅良之所著也春秋之學不明久矣啖趙之後至本朝而後有泰山孫先生復尊王之說彌顯公是劉先生敞權衡意林等書訂證尤詳伊川程先生頤雖無全書而一序所該聖人之大法備矣自王荆公安石之說盛行此道幾廢建炎紹興之初高宗皇帝復振斯文胡文定公安國承伊洛之餘推明斯道勸講經筵然後其學復傳學者以為標準可謂大全矣東萊吕公祖謙又有集解行於世春秋之義殆無遺蘊止齋生於東嘉天資絶人誦書屬文一旦逈出諸老先生上歛然布衣聲名四出六經之說流行萬里之外而其學尤深於春秋鑰非深於此者嘗涉獵諸公之書非不明白然亦不過隨文辯釋間有前後相為發明者亦不見體統所在鑰自客授之初即從止齋游雖不得執經其門嘗深叩之同在西掖時始以隠公後傳數篇相示因為道春秋之所以作左氏之所以有功於經者其說卓然且曰自余有得於此而欲著書於諸生中擇其能熟誦三傳者首得蔡君幼學蔡既仕又得二人焉曰胡宗曰周勉游宦必以一人自隨遇有所問其應如響而此書未易成也未幾去國而鑰亦歸雖若相忘於江湖而友朋之來必以此書為問雖親炙之者跪以請則曰此某身後之書也迨卒於嘉泰三年而此書始出其壻林子燕最得其傳又四年而後長子師轍與其徒汪龍友以二書來鑰老矣如獲希世之珍屏去他書窮晝夜讀之始盡得其大意嗚呼盛哉蓋未有此書也先儒以例言春秋者切切然以為一言不差有不同者則以為變例竊以為未安公之書不然深究經㫖詳閱世變蓋有所謂隠桓莊閔之春秋原集因避宋欽宗諱凡桓字皆作威今改正後同有所謂僖文宣成之春秋有所謂襄昭定哀之春秋始焉猶知有天子之命王室猶甚威重自霸者之令行諸候不復知有王矣桓公之後齊不競而晉霸文公既亡晉不競而楚霸悼公再霸而又衰楚興而復㣲呉出而盟諸夏於越入呉而春秋終矣自杜征南以來謂平王東周之始王隠公遜國之賢君其說甚詳而公以為不為平王亦不為隠公而為桓王其說為有據依又其大節目如諸候改元前所未有齊魯諸大國比數世間有世而無年至記厲王奔彘始有紀年古者諸候無私史乗與檮杌春秋皆東遷之史也書齊鄭盟於石門以志諸候之合書盟於鹹以志諸候之散是春秋之終始也隠桓莊之際惟鄭多特筆襄昭定哀之際惟齊多特筆諸候専征而後千乗之國有弑其君者矣大夫專將而後百乗之家有弑其君者矣宋魯衛陳蔡為一黨齊鄭為一黨公㑹齊鄭於中丘而後諸候之師衡行於天下罪莫甚於鄭莊宋魯齊衛次之而父子兄弟之禍亦莫甚於五國是可為不臣者之戒矣齊桓公卒鄭隨朝楚夏之變夷鄭為亂階侵蔡遂伐楚以志齊桓之霸侵陳遂侵宋以志楚莊之霸足以見夷夏之盛衰矣書公孫兹帥師書公孫敖帥師書公子季友卒皆見三家之所從始首止之盟鄭伯逃歸不盟則書以其背夏盟也厲之役鄭伯逃歸不書蓋逃楚也夷夏之辨嚴矣自隠而下春秋治在諸候自文而下治在大夫有天下之辭有一國之辭有一人之辭於于戈無所不貶於玉帛之使則從其爵勸懲著矣文十年而狄秦又三十年而狄鄭又五十餘年而狄晉狄鄭猶可也狄晉甚矣貶不於其甚則於事端餘實録而已矣此皆先儒所未發至僖之三十一年四卜郊不從乃免牲猶三望極言魯之用天子禮樂以明堂位之言為不然惠公始乞郊而不常用僖公始作頌而以郊為夸引祝鮀之言為證此尤為前所未聞也若左氏或以為非為經而作惟公以為著其不書以見春秋之所書者皆左氏之力章指一書首尾専發此意昔人以杜征南為丘明忠臣然多曲從其說非忠也公之章指謂君子曰者蓋博采善言禮也者蓋據史舊文非必皆合於春秋或曰後人増益之或曰後人依倣之或以凡例義淺而不取或以例非左氏之意蓋愛而知其惡者乃所以為忠也又言莊公元年至七年及十九年以後訖終篇多無傳疑有佚墜公之求於傳者詳矣嗚呼與止齋遊前後三十年不得卒業於其門既興殄瘁之悲而後得二書其間尚有欲質疑而不可得此所以撫卷三歎而不能自已也息齋春秋集註序吾鄉四明慶厯皇祐間杜楊二王及我高祖正議號五先生俱以文學行誼表率於鄉杜先生又繼之講明經術名公軰起儒風益振厥後伊洛二程先生之興得其傳以歸者惟故禮部侍郎高公公天資純篤濟以勤敏師友淵源學問精詣入上庠登舍選已有盛名諸公貴人爭欲壻之拂衣而歸建炎二年升補上舍紹興改元徳音免殿試賜同進士出身十三年高宗初建太學遴選名儒為四方所推服者為少司成公實應選士子雲集凡學之規則皆所裁定明年三月車駕幸學講易泰卦於上前擢貳卿將嚮用矣以直道忤時宰一斥不復家居累年中夀而殁洎端明汪公登從班奏言公學行出處之詳始詔復次對官諸子而公之名愈顯矣自頃王荆公廢春秋之學公獨耽玩遺經専以程氏為本又博采諸儒之說為之集註其說粹然一出於正然猶未行於世也仲子得全知黄州始取遺藁刻之而屬鑰以序鑰生長外家汪氏於公有連雖生晚不及承教而猶記拜公牀下竊聞之公既投閒杜門屏居畧不以事物自攖日有定課風雨勿渝此書之所以成也嗚呼泰山孫公明復前篇書名此書字故異著尊王發㣲深欲明夫子襃貶之㫖伊川先生則謂後世以史觀春秋謂襃善貶惡而已至於經世之大法則不知也自有春秋以來未有發此祕者公亦曰仲尼懼先王經世之法墜地莫傳欲立為中制俾萬世可以通行故假周以立王法而託始於隠公焉且以文武之道期後王以周公之事業望魯之子孫也以此推之春秋固非一王之法乃萬世通行之法也其推明伊川之意類如此昔曾子每誦夫子之言則必曰吾聞諸夫子子夏使西河之民疑汝於夫子曾子罪之說者曰言其不稱師也觀公之序直引伊川之序不更一辭可謂稱師而知其所本矣伊川有序而傳未成公之書成而未有序此當屬之深於春秋者鑰何人而敢預此黄州言之再四竊幸因得託名於不腐乃弗敢辭公諱閌字抑崇子孫能守家法其興蓋未艾也古文孝經指解後序古文孝經實吾夫子之舊秦火之後出於屋壁而顔芝所藏十八章已先行於世翼奉張禹等五人各自名家古文惟孔安國馬融為之傳而又不顯隋開皇中劉炫為作稽疑一篇已多譏笑唐陸徳明亦云古文世既不行隨俗用鄭康成註十八章本獨一劉知幾以為行孔而廢鄭諸儒爭辯蠭起明皇亦以今本註而序之書以八分刻之經臺猶在長安童而習之皆此也司馬文正公僅得古文於祕閣之藏為之指解嘗以進仁宗哲宗而范太史祖禹繼為之說噫自漢以來何其好者之寡也故信州使君季公天資純孝篤學好古尊敬此書又為詳說不惟發明夫子之㫖又以文正公之解隨文演暢用意甚勤辭亦詳備如愛敬可行於匹夫而惡慢不可行於天子如論忠順之不可失如不敢遺之機甚㣲而其效甚大又曰要路云者言所敬者寡所說者衆也曰至徳云者言所敬者廣而所因者本也皆有所啟發非苟然者紹熙五年七月皇上踐阼有詔求賢公以八月進此書未幾中書舍人陳公傅良又為之繳進於經筵初欲刋於廣信而不及公之子淇念此書之未行將刋於家求為後序經曰故自天子至於庶人孝無終始而患不及者未之有也明皇注云始自天子終於庶人尊卑雖殊孝道同致而患不能及者未之有也言他此理故曰未有此說非也古文小異故自天子以下至於庶人文正公則曰始則事親也終則立身行道也患謂禍敗言雖有其始而無其終猶不得免於禍敗而羞及其親未足以為孝也季使君又以明皇之事證之是矣鑰竊以為猶未為詳且明敢申言之夫聖人一經可謂詳矣而其立教之要専在此數語孩提之童無不知愛其親是人之於孝未有無其始者夫子所以為曽子諄諄言之正欲人之有終也夫子首以總言孝道次分天子諸候卿大夫士庶人之孝大小之分固自不同而又於此謂孝道有始而無終未有不及於禍患者此則無有貴賤之别後雖具述孝治聖治之效以至終篇然其教人之最切無過於此上下一體俱當盡心焉明皇惟不知此所以不克其終可不戒哉篇末云孝子之事親終矣止為喪祭之終猶未為孝之終也若所謂孝之終與此孝無終始之終蓋為立身行道死而後已者也故雖曾子既啟足手以其能全而歸之自以為知免矣然而易簀一節猶在其後蓋大夫之簀猶非其正也嗚呼聖人之言可謂深切而能有終者亦豈易易乎鑰餘生無幾深知兢懼得正而斃所願加勉故以告有志之士且以補二公之說云范忠宣公文集序惟昔賢者皆後世之師表而學者之慕古人則自各有不同如汲黯之慕袁盎司馬子長之慕藺相如若有不可解於心者本朝先正名徳相繼如泰山喬嶽景星鳳皇事近而易考嘉言善行皆當取則而區區之愚少而讀元祐丞相忠宣范公言行録反復終始正學大節偉識宏度贊歎不足於諸鉅公間尤願執鞭欲追逐其萬一而不可得也如奏議國論等書責人如責已助亷成徳之訓又若避好名之嫌則無為善之路等語皆當終身誦之每恨未見其家集也嘉定五年三月甲戌公之從曽孫中書舍人之柔見過謂鑰曰忠宣文集未行於世晩而謫居永州三年邦人至今懐仰比因沈使君圻赴郡以家藏本屬之既已刋就而舊無序引徑以見委鑰謹謝之且曰託名不腐豈非晚進之幸豈非平日之願頋年衰學落何足以預此三辭不獲則取而伏讀越兩日而盡得之蓋公天資誠確篤志學問承文正公之親傳愽之以泰山孫明復徂徠石守道盱江李泰伯三先生師友之益發為詞章根柢六經切於論事無有長語而一出於正文忠蘇公序文正公集有曰其於仁義禮樂忠信孝弟如飢渴之於飲食欲湏臾忘而不可得又曰雖弄翰戲語率然而作必歸於此故天下信其誠爭帥尊之公真是似者哉而鑰之所尊敬者此又其餘事自其立朝出鎮廟謨相業具載史册不待贅言惟公本於忠恕得二者之功用深入吾夫子閫域非淺丈夫所能窺者溫恭惟謹無異稠人遇有當為勇決過於賁育此其大過人者然亦尚可勉也心平而寛慮周而逺喜恕哀樂所發而必中克伐怨欲不止於不行包含太虛無所適莫姑以其見於外者一二言之鄧綰嘗奏罷公襄州及言者攻綰則極力爭之謂已經先朝責降不應再有所貶公亦非有意於以徳報怨自謂上惜朝廷事體下以安人情反側黄黄門誦楊畏彈章而公去相位他日哲宗面斥黄門公從容為解黄門謂公為佛地位中人章子厚得罪父年九十議與一便郡公言當置徃咎而念其親公本以議新法不合而去及溫公將盡改熙豐之法公謂特當去其太甚又湏徐徐經理論差役一事尤不可暴操心類如此公既喪明而責知隨州尋竄永州蓋子厚必欲寘之死地而公素安義命無一語怨之家人猶未平也風雨中覆舟於江以救僅免拭面而語家人曰此亦子厚所為耶嗚呼使之從夫子於陳蔡當亦有不容何病之言此非他人所及也蔡新州重得罪公力救之上忤亷中下違同列賢如劉元城諸人以呉處厚為義存君親而詆公不遺餘力公不為動卒貰其死一時不以為快及事之變自劉忠肅吕汲公等雖終於貶所其得免於已甚著始知公之不寘新州於死之力也汲公軰竄嶺表郊赦未頒先謂難從恩宥公齋戒奏大防等年老疾病何以自存迹其所罪亦因持心失恕好惡任情以異已為怨讎以疑似為訕謗誤國害公覆車可鍳此不惟欲寤泰陵正欲感動子厚輩使之革心而從厚也嗚呼自熙豐元祐以至元符紹聖之間世事屢變翻覆非一徽皇踐阼改元建中靖國流人悉歸四海望太平於朝暮欽聖顯肅皇后與徽皇待公而為政至遣中使逺至湖外好賜牽復迎勞不絶公時在瞽廢風痺中知上果用我亦欲感激自奮而病不可為矣嗚呼天乎倘延以三數年之夀使再得政則調一天下可以仰副建中靖國之意豈復有後日之禍哉公既已矣而蔡吕俱召吕又為蔡所擠而任蔡愈専矣此所以撫卷長懐而繼之以太息流涕也後之君子多識前言徃行以蓄其徳者於此書可不熟復而力行之以代絃韋之佩乎文正四子長監簿以疾蚤殁忠宣與二季皆顯衣冠蟬聨然自忠宣以來一百二十有四年而後中書舍人始繼世科實監簿之曾孫范氏之興未艾也王魏公文集序神宗皇帝不世之資高出百王始相荆國王文公君臣之間義同賓友奏對徃復載於史可知也元豐之初主徳已成天容毅然羣臣尊仰將順之不暇非復熙寧之比惟左丞魏公起由庶僚自結主知以省寺八品官而特許賜坐與府尹奏事而命奏罷獨進一為柱史許以直前而又導之使諫待遇之意固已卓異於餘子公亦感慨自奮不負所學論事上前守正不阿精當剴切其視同列如野鶴之在鷄羣一時才氣無出其右者若其論說古今治亂災變警戒計邊餽之非實杜西師之再舉除市易之罰息而别以内外救徐勲之詔獄而戒其出入折姦侫之萌辨是非之際皆深中事機有以變移主意而一出於義理之正言議風烈凜凜生氣神宗傾聴奬拔嘗謂公曰朕與卿兄弟如同産然是知神宗聖度恢偉容受直言而當時俛伏聴命無能有所論說者蓋皆具臣不足以佐下風耳不然公之抗直安得容於朝廷之上乎公之五世孫直顯謨閣厚之編次遺文屬鑰為序鑰曰文公之文固不待序而顯校理之文曽南豐為之序而陳后山繼之使鑰誦左丞之書則可何敢以此自任顯謨公求之不置鑰曰吾有以應子之求矣田承君晝天下士也送别鄒道鄉之言可畏可仰是豈苟於從人者在公幕府至十有五年㣲公不足以致此客㣲承君不足以入公之幕也為公家傳其稱公之文則曰踔厲駿發卒歸宿於道制誥溫潤豐美得中和之氣而屬辭贍洽成於口授上數稱之誥命有可以通行者俾公為定辭以新之公在翰林舊制尹京者不行詞時高麗修貢數以奏來上而所用答詔以十數有㫖學士等槩為之執政欲人求一通以塞㫖而上乃獨用公所草其後既為丞弻每下大詔令與通好夷狄多屬於公若籌邊之妙畧立朝之大節皆炳炳如丹又採長老之論縉紳大夫之談謂公厚徳懐人如晉羊祜直節敢諫如魏辛毗吏治儒雅如漢張敞風槩整峻如唐溫造昌黎有曰知其客可以信其主知其主可以信其客公之賢足以表千古承君之言可以信後世鑰不侫尚何敢措辭於其間陳都官文集後序制置使陳官由地官貳卿出鎮四明政成暇日以家藏曾祖都官文集刻之郡庠屬鑰為序謝不敢且曰蔣魯公之序詳矣何敢贅既不得命敬題於後曰高哉都官之節也魯公稱公之學曰雅志之所學以謂為道而不為利此學者之所當守而不失仕者之所當遵而不變者也若夫平日之論高出於䕫契之上而至其趨時之事乃卑出於管晏之下者此固令舉之所鄙也稱公之文曰大者則以經世務極時變小者猶足以詠情性暢幽鬱蓋其於道如此而其辭亦不足道也可謂備矣然猶若有所畏避而不敢盡言鑰不侫敢補其所未言者嘗三復公之遺文而得其為人蓋其抱負素已不羣本之忠義充以學問以安定胡先生為師所友自東坡先生而降皆天下士淵源又如此萬言之䇿經濟之規模定矣自以親結昭陵之知身雖在外遇事輒發書論災異言尤激烈三上英宗書又皆人所難言迨神宗作興銳意治功王文公得君用事法度更新諸老大臣爭不能得抵巇取爵位之人不可勝數風俗為之大變至有逺在蜀萬里外官為偏州騰奏於朝盛稱青苗新法之美而捷登膴仕者公方宰山隂例以秩滿登館閣小忍不言豈不足以平進而抗章力辯繳納召試堂劄自取竄責而不悔方且優游廬山與劉公凝之騎牛松下窮幽尋勝以自娛適呼嗚非凝之不足以當歐陽公之廬山高非公不足以侣凝之之賢也使當時以公一言而寤君相之意安有後日之紛紛哉公既窮老以死其子訴寃又重得罪然其後再傳而得祕丞及刪定二公三傳而貳卿出陳氏益大天之報施何如哉讀公之文者能以是求之然後知公之高風大節猶將廉頑立懦于百世之下毋徒玩其華藻而已也清真先生文集序班孟堅之賦兩都張平子之賦二京不獨為五經鼓吹直足以佐大漢之光明誠千載之傑作也國家定都大梁雖仍前世之舊當四通五逹之㑹貢賦地均不恃險阻真得周家有徳易以王之意祖宗仁澤深厚承平百年高掩千古異才間出曾未有繼班張之作者神宗稽古有為鼎新百度文物彬彬號為盛際錢塘周公少負庠校雋聲未及三十作為汴賦賦凡七千言富哉壯哉極鋪張揚厲之工期月而成無十稔之勞指陳事實無夸詡之過賦奏天子嗟異之命近臣讀於邇英閣由諸生擢為學官聲名一日震耀海内而皇朝太平之盛觀備矣未幾神宗上賓公亦低徊不自表襮哲宗始寘之文館徽宗又列之郎曹皆以受知先帝之故以一賦而得三朝之眷儒生之榮莫加焉公之殁距今八十餘載世之能誦公賦者蓋寡而樂府之詞盛行於世莫知公為何等人也公嘗守四明而諸孫又寓居於此嘗訪其家集而讀之參以他本間見手藁又得京本文選與公之曾孫鑄裒為二十四卷中更兵火散墜已多然足以不朽矣公壯年氣銳以布衣自結於明主又當全盛之時宜乎立取貴顯而攻其嵗月仕宦殊為流落更就銓部試逺邑雖歸班於朝坐視捷徑不一趨焉三綰州麾僅登松班而旅死矣蓋其學道退然委順知命人望之如木鷄自以為喜此尤世所未知者樂府播傳風流自命又性好音律如古之妙解顧曲名堂不能自已人必以為豪放飄逸高視古人非攻苦力學以寸進者及詳味其辭經史百家之言盤屈於筆下若自己出一何用功之深而致力之精耶故見所上獻賦之書然後知一賦之機杼見續秋興賦後序然後知平生之所安磬鏡烏几之銘可與鄭圃漆園相周旋而禱神之文則送窮乞巧之流亞也驟以此語人未必遽信惟能細讀之者始知斯言之不為溢美耳居閒養疴為之校讎三數過猶未敢以為盡力淇水李左丞讀賦上前多以偏旁言之因為攷之羣書畧為音釋闕其未知者以俟博雅之君子非敢自比張載劉逵為三都之訓詁也鑰先世與公家有事契且嘗受廛焉公之詩文幸不泯没鑰之願也公諱邦彦字美成清真其自號厯官詳見志銘云制使待制陳公政事之餘既刋曾祖賢良都官家集又以清真之文竝傳以慰邦人之思君子謂是舉也加於人數等類非文吏之所能為也北海先生文集序皇朝文章之盛高掩前古徽宗在御天下承平上則日月戴承星文雲彩之效祥下則靈芝朱草赤烏白鵲之呈瑞名表進賀殆無虛時文士角立爭奮所長無不工緻形容鋪張以為盛觀㑹進築順州得枸杞宿根於土中其形􅋙伏仙家以為千載所化馳獻闕廷上生於壬戌正符所屬之辰尤以為善祥百寮欲以詰朝拜表諸公閣筆相視無以措詞先是庠校英才久束於王氏之學不習應用之文車駕幸學欲進一表而無能應者時翰林學士綦公為諸生出藁袖間無不驚服至是已為學官有薦公名者延致東閣授以題意公從容屬聨妙絶一時首曰靈根夜吠變異質於千年驛騎朝馳薦聖人之萬夀眷荒裔沈藏之久實王師恢復之初物豈無知時各有待既進天子為之改容即日喧傳京師諸公咸自以為不及也公初起北海之濱學殖甚富不求人知自是貴名日起遂登館殿未及施用而以内艱去矣建炎二年高宗駐蹕維揚公航海朝行在一再還而為郎明年輪對一見契合恨見之晚擢左史攝瑣闈召試中書文不加㸃玉音擊歎即正西掖進用之捷未有近比永嘉南渡之行公在帝側實代王言詔㫖所至讀者感動諸將奔走承命如陸宣公之在奉天也尋入翰苑當羽檄旁午書詔填委之㑹而播告之修不匿厥指吕忠穆公以首相開督府訓辭尤為宏偉有曰盡長江表裏之封悉歸經畧舉宿將王侯之貴咸聴指呼其能布宣威靈張大國體類此語公篤意經術博覽强記以直道自任才高而氣剛平時為文不為崖異之言而氣格渾然天成故一旦當書命之任明白洞達雖武夫逺人曉然知上意所在非規規然取青嫓白以為工者比也夫唐文三變宋之文亦幾變矣止論駢儷之體亦復屢變作者爭名恐無以大相過則又絶為長句全引古語以為竒倔反累正氣況本以文從字順使於宣讀而一聨或至數十言識者不以為善也惟公與汪龍溪追述古作謹四六之體至於今行之然此等在公皆為餘事盡忠竭誠遇事極論進而造膝退多削藁以輔成中興之業公之力為多焉公之薨於紹興十有二年秦丞相方當國専政以罷相草麻之憾恨不得甘心焉至二十九年而後宗丞李公益能始狀其行又至三十三年而後得參政周忠簡公銘公之墓公之從孫煥丰集公文為五十六卷藏於家鑰生晚不及拜公下風而多誦公文文贅倅丹丘始見家集益聞出處之詳晚而投閒有更生者亦公之從孫蚤有雋聲寓居吾鄉嘗以公海上詩刻求跋為之詩曰晉陽固自有高共奉天豈可無宣公當時扶日滄海東尚想健筆驅長風指麾諸將如奴童中興當數第一功㫁碑毋庸詫詩工制藁具在鑾坡中更生致謝再三且曰今之知北海先生者蓋寡遺文將遂版行願為之序鑰曰公之文有傳又得託名於不朽不復固辭屬更憂患既免喪而後敢為下筆懼不足以發揚公之盛烈謹銜媿而書之公諱崈禮字叔厚濰州人北海其自號也攻媿集卷五十一欽定四庫全書攻媿集卷五十二宋樓鑰撰序薌林居士文集序知人古以為難苟未見其實行形貌言語名譽文華皆未可以保其徃此今人所以難知也及其葢棺事定登載史冊又有好惡之不公流傳之失實不得其賢否之真此昔人所以難知也至於近世前輩耳目所接雖銘誌多溢美章疏多溢惡以為難攷然其行事具見於己為交游皆出於善類又其平生所著詩文集以成編始末備在粲然不誣察其所安㫁可識矣薌林居士向公寔文簡公五世孫也重珪疊組生長富貴而抗志不羣卓然自立所交多天下名士方全盛時居官守職固已不畏强禦聲績著聞靖康元二間為江淮制置發運使一聞偽楚之變即移文合肥拘留其家屬以折其姦心聞者韙之高宗初開元帥幕府以羽檄起四方之兵未有應者公募士人李稙首齎金幣以濟艱難之用上章勸進切中事機上深嘉之承制補稙以官公之功名及受不世之知實始於此及帥長沙金兵猝至堅守奮擊外救阻絶力不足而城破猶保牙城巷戰以拒敵兵退盡所以撫摩之力楚人至今徳之尋改鄂州行次衡陽曹成李宏賊衆十萬將肆侵敓公肩輿入曹成賊壘曉以大義不敢為暴遂獲鍾相降楊正表上眷愈渥擢之户簉入從出藩竭其忠力幾至大用媢嫉者衆而公雅志退休抗疏面陳不一而足卜居臨江古木無藝多植巖桂又素慕香山自號曰薌林有船曰汎宅高宗親御翰墨書四大字及企疏堂以寵其歸公家東望閤皂山連玉筍靚深如隠君子居壁皆畫以山水木石門皆裝以古刻靈龜老鶴馴擾其間自著五十詩以形容景物亦多和篇嘗云淵明生於興寧之乙丑歸以義熙之乙巳年四十有一余生於元豐之乙丑歸以紹興之壬子有述懐詩云我與淵明同甲子歸休已恨七年遲又言香山得洛陽履道坊楊常侍舊宅薌林得臨江五栁坊楊遵道光禄别墅有詩云莫問清江與洛陽山林總是一般香兩家地占西南勝可是前人例姓楊又題樂天真云香山與薌林相去幾百祀丘壑有深情市朝多見忌杭州總看山蘇州俱漫仕才名固不同出處畧相似上梁文云坊名五栁仰陶令之高風洲號百花乃東坡之遺事其尚友前賢類此標致可知矣士夫徃來者必造見又素喜客相與觴詠其下蓋自建炎初元罷六路漕明年歸臨江紹興八年起至平江力辭不克次年三月復歸自是不出優游十五年以夀終焉勤勞著於中外名節全其終始雖有異論亦皆厭服無可議者諸子又能世其家不待平泉之記草木數十年來幽致儼然復裒一時名公書尺刻為薌林帖公之忠孝大槩愈著而世之持論者大定矣公之曽孫公起為湖廣總屬分司九江受知於使君袁和叔燮介以求序且言已刋公之家傳行狀志銘為一編又刋拘偽楚檄稿及諸賢跋語他日又將刋家集行於世鑰生晩雖不及拜公牀下生長外家外祖汪公少師與公同朝相好曽為汪氏友恭堂生雲閣賦詩先太師岐公初丞崑山及趨事於呉門最䝉眷與故多見公之藻翰熟聞高風今又盡得公之詩文雜著如㫁碑風雨碎文章等句皆素所膾炙今乃知為公之詩公為徐東湖詩集後序有云始為詩以數百計一見師川快說詩病盡焚其藁則知公之少作尤多其所存者止此耳章表奏議明白直亮可舉而行兼備體制而又能出入内典此蓋由前朝涵養之久文簡典刑之存非曲學之士所易及也鑰庸陋不侫何敢預品題之末姑誦所聞如此猶記九嵗時仲舅尚書公尉江山乙丑登乙科以書為謝公答書親題其外云書上明州鎖元先輩汪下書薌林居士此亦近時之所未聞也公諱子諲字伯恭官至徽猷閣直學士累贈至少師云洪文安公小隠集序番易洪氏自忠宣公以文學致位通顯忠誠許國逺使殊庭當干戈俶擾之際執節不屈迨蘇子卿之歸而二子已俱中詞科矣一子又繼之自唐設此科本朝又增廣之名公多出此途然未有兄弟三人聨中如此之盛者也況父子俱掌帝制出入鑾坡文章聲問萃於一門赫然為天下冠而仲子文安公又其先逹者也公生於宣和二年至紹興二十五年自秘書省正字已兼中書舍人獨押六房暫直學士院又三年以左史再攝西掖明嵗為真遂擢翰林學士出守呉門高宗皇帝將行内禪聖意謂一時大典冊不可輕屬召為翰林承㫖禪位之詔登極之赦尊號改元等文皆出公手紛至沓來從容應之動合體制天下傳誦極儒生之榮遇孝宗皇帝命知貢舉未幾遂登樞近蓋仕宦終始以文字為職也唐張燕公稱富嘉謨之文既而曰施於廊廟則駭矣惟公天分素高加以篤學文體蚤成天生廊廟之文也文從字順隨物賦形非如寒士苦志悲鳴口吻者所可望也公以隆興初元知舉鑰由鄉書就試公一得文巻必欲寘之前列而第二䇿中誤犯泰陵舊諱公嘆惜不已為引呉若等例奏聞襃借甚寵得㫖降充末等首名鑰何者受公特達之知既竊名第以至晩登政途不敢忘也公之子二楀嘗守峽州將赴闕至上饒而殁橰知餘姚縣又亡於旅舍峽州無羌時刻公之文將俾鑰為序未及也其壻汪君杲通判信州以峽州遺意為言鑰方經紀餘姚之家其子伷又面以為請鑰何敢當獨以銜恩未報又願託不朽因不敢辭公之兄為右丞相諡文惠弟以翰林閣老終端明殿學士諡文敏世稱三洪以比錦屏三陳而又過之公諱遵字景嚴若世系治行則文敏所作行狀甚詳不待愚言而後見小隠則公自號也靜退居士文集序歐陽文忠公為本朝文章宗師猶昌黎文公之在唐也光燄萬丈不容贊嘆諸子叔弼兄弟咸得家傳季黙之子徽猷閣待制徳孺則諸孫之益顯者也嘗見中書舍人王公鉌銘公之墓云忠厚之質孝友之性皆稟於自然不勞追琢詩篇賦頌章奏碑誌之文古律雖殊體製不一各極其妙而家法燦然當時推能世其家者惟公也嘗訪求遺文於館中僅三十餘篇每恨不得其全公之孫伋守連州以公家集二十巻鋟諸版而來求序始得而盡見之嗚呼真得六一先生之傳而王紫㣲之稱非溢美也中遭亂離挈族南徙流離困苦憂國愛君之心盡發於詩文中皆不苟作平生著述散逸為可惜然此足以不朽矣前輩既不可得而見文章流傳士夫皆當傳録而況於子孫乎歐陽氏久振振連州能傳斯文於其家世尚勉之哉公諱懋徳孺其字自號静退居士遂以名其集云筠溪文集序士大夫種學績文孰不欲流傳於後資稟有厚薄用力有淺深固不可誣然湏器度過人則自應高勝有非勤苦之所能强進者此可與知者道爾筠溪先生以父兄之賢少有聲於太學一夕奏厠有同舍投繯於梁間公時年纔十七八畧無懼意亟解其繫卧而枕於股上親撫摩而嘘呵之㑹有後至者怪而問焉徐語其故馳報齋中羣士競篝火而來相與抱持而歸竟全其生即日名動京師弱冠遂為大觀三年上舍第一人繼登科其才固足以得此天報亦昭昭矣公之器度絶人逺甚如許加以問學之懿其發為文章頋豈淺見者所能及也政和間以南宫舍人使契丹擢左史因訐直貶宣和未知冀州獨能堅壁以抗强敵靖康初漕江東平叛卒之變入紹興為饒吉二州七年復立左螭尋掌書命雄深之文黼藻王度四方傳誦之論事封駮皆人所難又以力闢和議益與時忤遷户簉丐外補去國之際猶拳拳以立國待夷狄之大計為言竟請祠以歸隠福之連江山西凡十六年不復有仕宦意哦詩自娛筆力愈偉居閒憂世著議古數十篇雖貶論古事而皆闗於當事利病深切著明有范太史唐鑑之遺風乃心王室惜乎用之之不盡也迨今將一甲子公之孫珏以郎曹典大藩今居江西憲臺方迎奉老親而當寇攘驚危中竭力不少頋避琪以上舍魁決科克繼大門為京口貳車皆有時名有以知公之澤未艾也二孫以鑰游從之厚出公遺文三十卷求序鑰晚進何足以測識前軰所蘊以平日慕用之誠幸託名於不腐敢謹書之公諱彌遜字似之昆仲六人文字為一門之盛兄尚書彌大宋史季彌遜傳訛作弟彌大弟太史彌正俱負重望筠溪則公自號云曹忠靖公松隠集序淳熙改元九月癸丑昭信軍節度使開府儀同三司曹公薨十月壬戌徳夀宫遺中使賜以宸翰有曰厯事四朝盡瘁國事從徽考北狩至燕被宻㫖晝伏夜行持御札御衣俾予繼統金人敗盟犯江奮身請行見敵帥力陳禍福敵退渡淮繼令請太后天眷至金主前宣予孝思使彼感動俾予母子如初完顔亮方圖南下令徃觀其意陳前後盟約聲色俱厲亮令以繡褥藉之終始一節夷險不渝今遽告終為之惻然因疏其行事大概賜其後具見予不忘之懐嗚呼士生斯世苟有一概可以自見皆足以取重於時其殁也苟得名士巨公為之志亦足以垂不朽惟公之生屢立竒節殁纔浹旬而斯文出於慈極震耀一世先正諸公間得碑銘多屬詞臣為之若夫親御翰墨大書特書聖作高妙文簡事核未有如此之盛者頋雖刻銘鼎彛無以尚兹史冊登載足以傳無窮矣鑰於公三子俱識於宦游中仲子工部相與有連事契尤厚公薨十七年矣集公之文俾鑰序之且曰先公早入太學負時名中更險艱晚遂安逸其於六藝百家無一日輟吟而停披也詩文至多畧備衆體紹興乾道間出入兩宫奉清燕之閒最承寵眷謙謹已甚無毫髪之玷一時筆墨類多出其手易簀之際以藁屬耜曰爾為我傳之涕泣拜受襲藏至今追念平生大概固已具於高宗之製然文字未有以自表矧家世業儒大父箕潁之文參政上蔡謝公為之序引行於世自度多病早衰恐負九京之託與子幸同郎省能加一言於篇首志願畢矣工部近以衡州奏事上記尹京時實在幕府問勞優渥遂留為郎庀職未幾他不暇問拳拳獨以遺文為言誠足以稱其家矣公之詩文其來有原其發不苟慷慨論事有古烈士之氣雍容適意有隠君子之風又未易以一端盡也蓋嘗登沖嗇之廬玩雲壑之勝想高致而不及見而又重違工部之請故為之書公諱勛字功顯諡忠靖累贈太師松隠公晚嵗游息之地遂以名其集云詅癡符序客有以書一編示余曰此赤城李公察院所為詩文名曰詅癡符公亡矣莫曉其名書之意余曰公於書無不讀此名殆不苟也海邦貨魚於市者夸詡其美謂之詅魚雖㣲物亦然字書以為詅衒賣也顔黄門之推作家訓曰吾見世人至無才思自謂清華流布醜拙亦已衆矣江南號為詅癡符公之意蓋出於此特謙辭耳公諱庚子長其字也少年筆力絶人始為長沙尉一時帥守部使者傾待之皆以牋翰委公從容泛應無不曲當時余伯父揚州為漕使公首以長牋進謁有曰衰懐錯落有秋風鱸鱠之思舊學荒涼無春草池塘之夢伯父一見擊賞延為賓客不復以寮吏遇之湯公參政時帥湖南後為中司遂辟公檢法官遷六察為郎而歸自此三數十年間僅一再以麾節出終不得為文字官以展究所長識者恨之余倅丹丘始得拜公之門公方買屋近郊古木交隂庭草錯列若隠士居聚書數萬巻於樓上閉門不與人通老矣猶沈酣其中里閭罕識其面間與人接雖㣲賤必與之抗禮後生有以經史叩請隨即響答詩文晚益高時出一篇即日傳誦哀挽之作尤為悽惋真可以泣鬼神也公之子浵因求余序其首余度公所著甚多猶有遺者更搜故藁盡出而行於世以慰其平生筆硯之功則箕裘可以不墜矣陳子高克台人也詩名已久而所傳不多公嘗盡得其遺逸者板行於江右視舊殆過倍蓰而子高之詩益顯公亦將以此望於後人乎然讀此編者亦足以知公之所存矣環溪文集序道無終窮學無止法自非聖人誰能盡之觀志學以至從心猶有等級如此學者之於斯道隨造詣之淺深用功之多寡如獵於山漁於海死而後已猶不足以究聖人之蘊奥若環溪者殆深而多者乎余少讀能改齋漫録等書而知有臨川呉虎臣之名隆興改元同年有二呉曰澥曰鎰皆虎臣之族虎臣名曽嘗分嚴陵之符澥字徳深終太學録鎰字仲權終湖南轉運判官三人者皆博學多識而善屬文晚嵗投閒四明里中有醴陵宰呉君琮來一見知其佳士與之接從容於杯酒間亦是族也既别去始得環溪之文一編玩味不置又知醴陵乃其叔子分教澧陽時所刋恨不及面與之商㩁既老還朝有名大禮者見余自言奉其祖環溪大全業八卷併以江右諸臺請賜諡事聞於朝錢丞相嘗知撫州熟知其名既以遺才為惜欲於科目之外收巖穴之遺而下之有司久未及報再見泣以請曰大父著書滿家貧不能盡刻先醴陵又齎志以殁藐然孤孫以其言行大畧求伸於身後而事有未成幾無以歸告兩世丘壟謂余於呉氏素有事契求一序以傳余曰環溪不待序而傳也篤志好古盡孝事親固已師表鄉閭名聞京師工部尚書何公異稱之云易旋璣明天理自然終歸之人事幾㣲之應本制論期黼黻王度若以身周旋從事於禮制樂作之末虎臣云通言簡不及陋侈不及宂事順而意宏辭嚴而理婉仲權吏部云宋文人之文唐詩人之詩而漢經生學士之學也其書通言云者法言中說類也醴陵亦云學通五經尤長於易禮旁通於百家而游藝於文觀此四者可以知其平生矣深於易故三十而著璇璣圖論深於禮故又二年而著周禮本制圖論六官析㣲論皆傳於世通言最所注意名言善誘實惠後學其曰不為言之言言立不朽又曰孔孟之書無難讀之文無難明之字此不易之論也而通言未免於為言間亦有難讀者嗚呼其學早成而進修不自已使天假之年且將有不為言之言而夀止同於韓昌黎為可歎也唐李愿何等人盤谷亦無聞於時徒以序而傳先生視愿有餘而環溪之窈而深繚而曲又豈減於盤谷所歉於愿者特余之文不足以發之耳江右多秀士大禮其别圖之王文定公内外制序藏書以經史子集為四庫尚矣國家中秘之儲士夫家塾之目莫不由此然惟集部必居十之七八方來未已充棟汗牛不厭其多非特玩其辭也蓋尚論古之人史傳銘志不若家傳最詳然必見其遺文而後得之文章之作出於胸臆讀其文則如親見其人攷其言則如生其時不可誣也左丞相魯國王文定公天分素高涵養深厚自少時已有場屋聲中外翺翔未始一日去書及為天子代言外制内制詞㫖溫淳殆有西漢遺風如春之和如玉之粹措意高逺而渾然不見圭角實似其為人一時爭傳誦之其後徧厯七府位極人臣事業之偉鑰嘗狀其行為詳然傳於不朽要不若遺文之具備公之子知筠州樞與諸季編緝西掖北門舊藁為三十卷俾鑰具之鑰平時誦公之文恨不能多見薰沐三誦而後歎曰曩見禮部侍郎史公彌大言嘗問視草之體於魯公公曰蘇長公才氣邁徃不可强追軌躅少公沈厚爾雅尚庶幾焉鑰於公之文不敢輕為贊揚讀斯文者不惟可見乾道淳熙之盛欲知公之詞源當於長公少公之間求之酌古堂文集序故太府卿王公實鑰之姑之夫也其亡也鑰為之志銘甚詳公之子惟潛在裒其詩文若干巻號酌古當集㑹國史院下索志銘及奏議等文求序於鑰向固不忍銘公而卒銘之此不應辭惟公天資頴悟雖世家四明而幼隨父金紫仕西北如京洛故家子弟既冠而孤叔祖宗正少卿欲命以官力辭之欲以與其季而自奮於科級少卿以公昆弟三人必使之受而以遺澤官其長弟又自以一官與季子可以見王氏之義風公之自立者已可知矣既而翻然曰學不必爾仕以行其志足矣遂不復為舉子業而一意於學忍貧深居窮經閱史手自編緝及見王紫㣲洋諸公作詩直欲追儷陳簡齋及子高軰一語不苟作名公多畏服之近時以詩鳴如石湖范公見公詩亦自言欲焚其藁未嘗無為而作文遇論事則明白洞達援據審諦切於世務理之所在無所回撓壓之以萬鈞震之以雷霆不動也如江隂論民兵之终於無益廣西論鹽法之不可輕變其為宰掾看定四方章奏之類皆如五榖藥石之適於實用若其立論謂翼祖雖已入祧廟而臣子终不當以其諱為名字及扁榜六十甲子古人惟以紀日所謂天有十日是也若書嵗則當如通鑑之用嵗陽字以表徳不應自稱其言皆可以為後法風流醞藉如晉宋間人若不以事物自嬰者至其莅官而克勤小物立節而不媿古人詩文中亦間見之讀者自可得其為人又不待於費辭自少至老聚書六萬餘卷多自讎校為之目甚詳名堂以酌古鼎彛古刻分列其下鑰少公十有九嵗忘年與進不以輩行自高笑語至通夕無間鑰未死不可不為發其幽光餘已見於志銘者不復載公諱正已字正之潛今丞徳清能守先訓尚當勉紹素風以亢王氏之宗云見一堂集序赤城鹿公以望郎顯於淳熙間當服官政之年不以病不以故致為臣而歸天子既寵襃之朝之名卿大夫學校之士爭為歌詩以餞其行郡太守侈其事裒以為見一堂集傳於世將三十年矣其子龍泉大夫又輯一時諸公寄贈若山園留題等益之為十巻所以顯揚先君子之清風峻節歆動中外蓋其祖帳之盛如二疏歌詩之多如楊巨源而其齒尚强其去尤高雖時移嵗久一覽此編赫赫若前日事真足以亷貪立懦也觀夫大篇短章鏗鏘眩晃極其形容之美寫其慕歎之懐非不欲庶幾公之所立也然而至今未聞有繼之者豈非坡公所謂有其言而無其心有其心而無其決者哉鑰初謁公於堂上實與周子及彭子復同之獲陪杖屨接觴豆於烟霏空翠之表退而賦十三詩以獻其後又嘗銘公之墓故龍泉復以序引為屬自惟宦情素薄而投閒十年屢更奉祠淟涊戀粟視公不待年而去誠甚不勇然親在為養尚得自恕也今免喪未死年甫七十真老矣方將上挂冠之章期於得請是敢落筆而不辭公之本末具於志銘龍泉亦已繫之巻末兹不復贅檗菴居士文集序江都李氏名族也紹興間名之從民者尚多俊茂余生晩猶及識將作監端民平叔及其子泳皆有聲詩又有名璜字徳劭者平原公之從孫將作之再從弟少負雋才而頗誕放恥從進士舉里人或譙之則曰我非不欲試但恐奪爾曹魁爾又嗤笑之乃曰爾曹不信我將試矣一試果魁維揚後寓四明筆力雄邁人所罕及時初脫兵火之厄郡縣庠校記文多出其手太守仇公泰然愈周公元舉綱潘公子賤良貴皆一時名公莫不低簪禮之侍御史王公伯禮伯庠為敎官與之游最厚蓋文字之友也明多禪刹徃來其間或以書來云孟信安欲招為壻資送特送且可得官擲於地曰老大乃復於此耶竟不報既不得志場屋蕭散骯髒以終其身不娶無子晩從宏智禪師於言下有省益耽内典以其筆耕之餘買田一頃施於阿育王山使奉嘗我寫照而題其上今至留水陸堂中遇薦羞則為設伊蒲其贊有云分明便是龐居士又卻無人賣罩籬不可謂無所得然亦可哀也已嘗見侍御言徳劭病革徃候之問向為文用僧騰客為何事曰侯景臺城是也又問平日了逹今何所見曰都無所見但覺神氣消散爾出書一囊乃其遺藁猶頋而言曰以屬吾子勿竊吾詩文以為己作平時相忘方緜惙時戲調尚如此里人戴伯與權雅士也託館王氏慕其文名從侍御諸子借囊出藁而手編之又多殘紙㫁壊不可盡録故所存十之二三僅得詩文雜著幾二百篇釐為十二卷俾余為序久未暇及嘗取其白氏長慶詩譜録寄呉門使君李諫議既為刋於集後又索其詩文且曰近為建寧當為版行余喜其文之將就泯没而有傳也為序其大槩而記之嗚呼世之騷人才士耽嗜成癖哦詩屬文皆欲有聞於世而因仍埋没與草木同腐不得以一語自見由古以來不知其幾徳劭之集藏於侍御之家傳於伯與又因余與諫議而行於世兹非幸歟若其詩句之工妙文體之高勝出入古今追配前良不待余言覽者當自知之檗菴其自號云雪巢詩集序淳熙五年余自刪定郎贅倅丹丘始識雪巢林君景思行誼高潔骯髒不與世合環堵蕭瑟忍窮如鐡石一郡人士稱重之讀其詩恍然自失愈叩愈無窮身雖未達而以詩文於諸公聞於是遂初尤公尚書誠齋楊公侍制俱為之序此可以不朽矣一日寫數十百篇遺余又使序之余曰二公已序何待於鑰景思笑不答而請不已余啞然曰吾知之矣君詩出入古今作者門户善備衆體二公極力稱道猶有未及者詩之衆體惟大篇為難非積學不可為而又非積學所能到必其胸中浩浩包括千載筆力宏放間見層出如淮隂用兵多多益辦變化舒巻不可端倪而後為不可及君蓋於此有得者如羅漢嶺頭羅漢樹楊花飛後無可飛等篇直欲與渼陂行茅屋為秋風所破歌相周旋君豈欲余之及此乎景思捧腹久之曰吾於此非曰能之而願學焉子何以得余心吾行於世五六十年得此於人者蓋寡因相與劇論詩家事不知更僕之久酒酣欲去遂書以遺之静齋迂論序静齋李君才翁自號也才翁真静者也幼厯艱苦與其兄徳翁相與為命寓柯山嘗試流寓為魁選故參知政事錢忠肅公聞其賢延致館下今丞相實從之學才翁學有本原又自刻厲文章日高兼備衆體嘗叩錢公以親黨舉削公信其言而許之彼以金為謝才翁曰乃欲以此汚我耶白公不可與公益高之欲授以官力辭曰使有仕進之分則已效於科舉矣强與之又不肯仕為求祠禄使藉此以試漕臺兩預薦書又不利於春官遂不為進取計葢取經史百家讀之以昌其詩以大放於文錢公秉政亦不畧為身謀從錢氏祖孫終其身如一日素安貧約粗給即止家無冠裳通謁止稱長安李某台之人無貴賤老少莫不敬而愛之幾如康節之在洛也郡邑來仕者聞其風多與之交俗務一絲不挂得酒則酣暢自適貫穿今古多識前輩行事清談亹亹聴者忘倦丞相屢出仕必與之偕行有直諒多聞之益以才翁之才不得少施見於世又不幸年六十八而殁善類皆嗟惜之有子曰􅙝丞相視之如子姓撫其家不替於昔一日俾􅙝來見出才翁所著迂論五十餘篇求為序引鑰舊聞才翁之名贅倅丹丘始交下風觴詠相從欣然莫逆交情久而罙篤間徃來都下飄然如不繫之舟見之使人意也消嘗以詩贈君歸有云文可演綸詩更工翛然蟬脫世塵中平生不復遇飄瓦兩腳何妨類轉蓬彼尚勞心論出處我今無夢計窮通江神閱徧憧憧者來徃無營只此翁才翁得之甚喜回首三十年矣才翁家長安大父及與横渠浮休諸公游號潏水先生文集行於世多入陜西戎幕曉暢邉事腐夫握兵以抗議不合坐廢嵗久賊犯闗中年高且病乃以為舊徳知兵强起以守秦州空城卒死於賊此志士人人之所痛也其家避地深入嶠南父又卒於瘴鄉禍患何可堪耶才翁詩文至多未暇編集迂論則其所學之著見者言議正大文詞溫淳論治體則欲返本而不求於末論世故則由相激而成壊謂道之弊極而必反謂聖人無心化物而化自行其論漢事尤為詳明既無科舉之累又不求賣論以取官直取諸胸中實見而筆之名曰迂論而實非迂也若言情貴得其直而養心在於明分則有自其躬行得之非真静者能及此也余既為之序又念才翁之葬未有志銘併書其大槩以授之才翁諱龜朋􅙝能世其家今為丹丘人放麑子集序秦西巴不忍一麑而與其母孟孫遂以為子傳是出於一時之仁耳然猶未及放麑之稱至唐陳子昻感遇詩始曰吾聞中山相乃屬放麑翁后山託疾謁告擅去官治以送坡公其詩有云豈不畏簡書放麑誠不忍正用此然亦一時之不忍耳吾友蔣仲武天資仁厚自號放麑子蓋終身拳拳於此者其為人不言可知始與之同從國先生仲宏之綱相與最厚余是時讀書於荒園破屋中家貧僅有書一厨仲武時時相過清談繙書動至終日以是知予益深余老矣回首舊游凋落殆盡仲武之子和中以遺藁求序閲其名曰放麑子集讀之慘然是誠吾亡友之本心也仲武嗜學如嗜芰於書無所不讀於詩無不記雖字畫任真而手抄之書至不可計其孝友慈祥愛人利物之心既不得少見於世一寓之詩大篇短章藹然仁義之言溢於編牘若奥篇隠帙稗官小說問之如響少工詞賦每屈其儕輩而輙不偶於有司以此窮老而不厭鄉評無不以善人長者稱之斯人既不可復見撫遺編而歎息余聞人之積徳不必活千人而後興以放麑之心推之後其有興者和中自力於學效張横渠體以絶句發古詩之㣲咄咄有父風又聞其三孫頎然而立興仲父之門者庶其在兹乎紙閤詩序我家業儒舊矣曾叔祖承議才氣尤俊偉不羣妙年決科剛介自守承平時宰畿縣尹以勢臨之不為動未幾罷歸卒不偶以死時時聞諸父言之恨生晩不及識也叔祖實承議仲子少力學有父風言議英發率傾坐人視功名若不足以浼焉者事親盡孝道既終喪貲産一不取與妻子郊居自業方其四方之志未衰以一介行李徃來江湖間上武昌浮彭蠡厯覽勝地挹秀氣以充胸中之竒晩居龍潭安貧裕如槿籬荆門背山俯溪如世所畫老龎之居客至則清談去則宴坐老圃老農爾汝無間謙恭樂易宗黨鄉曲無不敬而愛之年已八十矣每取伊洛道徳之書釋老清淨之說讀之隨意手抄細書著行動盈編帙日不下數千字以訓子弟以勵後進雖書生舉子以為難且勞者為之不少勌老成典刑此尤人之所畏服也鑰官永嘉一日以書來曰我處此二十年簡儉粗足無復縁飾紙閤方可丈餘藏修游息不出於出番易張紫㣲嘗有此詩吾既與子和之矣今和者益多巻軸益富亦居閒勝事也汝為我序之鑰謝不敏敢取叔祖平日大槩書於巻首使覽者詳焉舊聞荆國文公有和王樂道紙閤詩學易先生劉公斯立亦嘗賡韻始知紫㣲蓋循諸公之舊非倡也併録二詩以歸獨恨未見樂道之作耳鑰仲兄頃亦同賦有曰但愛窗間冬日煖不知門外北風涼叔祖擊節歎賞以為正得我之意抑所存又可知矣三家詩押韻序吾家自高祖正議先生以儒學師表鄉曲是生五子曾祖金紫曾叔祖承議俱躡世科助教最幼家傳擅名而邃於小學亦有五子其次子則居士叔祖也字元應記問該閤書經覽輙不忘許叔重說文解字畧皆記誦其於六經句讀㸃法悉有定規如不字本方久切凡書之不字皆㸃入聲其字皆㸃平聲惟夜如何其則不㸃蓋本是以箕字而借為其也嘗曰陸氏釋文最為詳宻集古人之全後之作者如孟子音之類皆所不及讀書者多自茍簡口口相授遇有難字始為檢閱故謬誤者多我兄弟少時皆讀之自至尾殆無遺失鑰侍坐最久粗傳緒餘又以授兒曹使不至於甚陋者皆叔祖之訓也教子尤篤五鼓而興燈前坐對同讀一書多至百遍諸叔父經書皆通念如流真可畏服也惜乎父子不偶叔父三人俱下世弟四人字君秉骯髒寡合獨居郊外先廬中疎財處窘蹭蹬場屋年過六十而氣不衰取歐陽蘇黄三家詩集類以聲韻細字楷法凡四十萬字親經四寫而後成書以示鑰曰此吾以適晩景者也雖若無補然因此書見前軰用韻之妙雖曰本朝詩律壊於和韻如三公多記善用若天成然不知者必以我為無所用心而為此吾子其為我言之鑰曰唯舊見叔祖手寫春秋左氏傳禮記二書悉以古字今又見叔父之勤如此敢書所聞見以勉後生之偷惰者求定齋詩餘序吾宗自高祖正議先生以儒學起家仍三世登科者五人最後伯祖宗子博士元符三年鎖試以來雁塔不書者至於五紀從兄編修景山始因太學舍選與教授兄少虚同上紹興三十年進士第又三年而後鑰繼之大率羣從中入上庠躡世科登朝行擁州麾皆兄為之倡兄少有場屋聲一語不茍作遂以詞章聞於時由太學正宗正寺主薄玉牒所檢討官樞宻院編修官守江隂以治最聞自九江移武昌以疾奉祠而遂已矣門户不競可勝歎哉遺文散失未暇㑹稡平日游戲為長短句甚多深得唐人風韻其得意處雖雜之花間香奩集中未易辨也其壻黄定之安道偶得殘藁遽鋟之版而求序引嗚呼吾兄抱負不凡志尚高逺居家孝謹臨政明恕讀書博而能精屬文麗而有體長短句特詩之餘又尚多遺者此何足以見兄之所存耶少工賦篇驪駢尤高曽不得一日為文字官韓退之云乃令吾徒掌帝之制翻閱此篇為之於邑兄嘗以為能定未易言故自號曰求定齋云攻媿集巻五十二欽定四庫全書攻媿集巻五十三宋樓鑰撰序六老圖序記曰福者備也備者百順之名也蓋一有不順不得謂之備一有不備不得謂之福世之得福者有之而備與順者百不一二易曰積善之家必有餘慶善至於積則非一人之為一日之力而後慶為有餘慶至於有餘而後能備能順哉恭惟致政太保大丞相魏國公際遇真主於龍潛之日光輔初政名遂身退之後兩鎮巨藩再專國秉皇上篤舊學之恩二紀之間所以寵綏其身榮其親而燕及其宗黨者無所不用其至上印綬則賜第於京師挂衣冠則分湖之一曲雍容進退為國元老四方之人無不以備福為可羨而未知夫備之至也始丞相事母齊國太夫人至孝及見大拜者數年九鼎之養囘班之儀照映今昔凡孝於親者親其身欲冀望萬一而不可是生一女五男子至淳熙乙巳嵗丞相年登八袠其女兄八十有三四弟亦皆六十餘矣一門同氣咸夀而康舉觴相屬朱顔華髪嬉嬉如小兒狀鄉閭親識歎仰盛事咸請繪而為圖丞相曰幸哉兄弟無故是吾門之餘慶也乃大合樂置酒高㑹簪纓樽俎極一時之盛以上方所賜金帛香茗以侑酒作為歌詩播之樂府於時風日清美簫鼓振作長子禮部侍郎某以次對奉祠次子都官郎官某入制司議幕率羣從子壻皆盛服環侍行酒授饔躬子弟職樂飲終日而罷昔眉山洛下耆英之集且有四人同生丙午之歌然皆合衆姓而成之無出於一家者若燕山竇氏稱丹桂之芳襄陽馬良擅白眉之譽亦未聞以大耋之年而全對床共被之樂而又得燎鬚之愛如今日者是千載樂事曾未之有嘻兹始可謂備福也已圖成適得良工為之寫照逼真烏紗道服前奉女兄恂恂怡怡如欲笑語雖名位有高下才業有先後而溫乎其容薰然之慈大率相似識不識望而知其俱為徳人長者也惟史氏世有隠徳八行先生又以奥學絶識不言而躬行既不得顯用於世福慶流演是生我公其在朝廷專務以道徳佐人主規恢宏大不求近功絶口不道開邊事其在郡國愛民如子涵養教化惟恐傷之待人接物謙下已甚好賢樂善收選寒俊薦進若不及位極人臣退然如老書生源已深而日濬之本已厚而日培之闔門習成忠厚無一人為剋核事者史氏之興殆未艾也何止今兹乎人有為一善而責報於天躬不自後而欲徼無妄之福者可以媿矣然則疏吾鄉風化之原助聖朝孝治之盛不在兹圖乎丞相顧鑰曰子為我序此鑰不侫辭不獲命謹再拜而書之樂書正誤序樂之壊久矣自孔子時問樂於萇𢎞學琴於師襄語魯太師翕如純如之變記闗雎洋洋盈耳之美聞韶而忘肉味與人歌而善必反之而後和之太師摯而下適齊適楚入河入海必謹識之蓋周衰而樂工散亡一日欲用則猶可訪求也聖人之用意深切如此故自衛反魯然後樂止雅頌各得其所詩三百五篇皆絃歌之以求合韶武雅頌之音去今又二千餘年雜之以鄭衛混之以兜離而樂幾亡矣以祖宗全盛之時聚天下博洽之士不惜重費欲定樂律以求合於古而不可得蓋其聲者樂之本也不得其本而求其末取之尺寸是以度也求之秬黍是以量也未有能吹律而求聲者而况於今乎嘗從知樂者得十二律均旋相為宫之法益以變宫變徵而求八十四調調為七聲其說其備蓋本出於龜兹而鄭譯首好之以傳於世乃與周官大司樂之說不合又不可曉近嵗得陳禮部樂書謂周禮止以圜鍾函鍾黄鍾為宫如三統三正不過子丑寅而止又謂古無四清聲痛夷樂之入中國必欲盡去之頗與其他論樂者異閒居無事讀之盡二百巻古今之樂曰雅曰俗曰胡器用舞曲無所不該其間重見者亦多要可謂浩博矣求其所謂聲者終不可得然念其用心之勤樂家之書未有此比又苦其舛誤無所攷證聞建昌陳使君刋此書與禮書竝傳取而校之賴以改定者甚衆又亦互有得失併為質之經傳而是正之尚三數百條㑹表兄華文閣直學士陳公之子芾為南豐宰因以寄之南豐欲别刋此編以補郡本之缺求書其後老矣精力日衰而氣習未除强為少年書生事亦可笑矣校書如掃塵而況拙者尚望多聞之士增益其所不及以全此書使後來者有攷焉亦區區之志也燕樂本原辨證序樂之失久矣本朝諸鉅公逄時遇主不可謂不行所學而終無定論今之君子學此者益寡建安蔡季通久從晦菴朱先生游學問該洽持論皆有信據一見而及此因得叩請曰大樂之書卷帙繁重不能自隨出所著一編曰燕樂本原辨證謂雅鄭固已遼絶而燕樂尤為淫靡然推其所自實出於雅唐志論雅俗之别謂俗樂有與律吕同名而聲不近雅者其宫調乃應夾鍾之律季通謂律度量衡言蓋有叙若有尺寸求之則是律生於度若以累黍為之則是律生於量皆非也故自為律以吹之而得其聲每疑今之樂以夾鍾為黄鍾得唐史之言而信故為圖為說而又列律本正律俗名三者使人知今之俗樂雖非古而其本則不能外此也則又歎曰為此俗樂者不知其何人使後世耽玩而人心日漓風俗日薄不能自還於雅正其亦不仁也矣然名宫與調猶曰黄鍾中吕南吕以紀律本意謂聲雖變而名尚存不没其本以待後之知者其用心又何其仁也故欲民之歸於厚當先正樂欲樂之正不可不先求俗樂之原此書之作非一日之積余雖好之亦未能遽解老矣恐不能自進於此季通又長余二嵗安貧樂道壯嵗已棄科舉此志其遂申否乎季通此行得一觀頌臺之樂歸而益攷諸書欲使樂書全備善矣然古謂妙解者猶不如神解如萬寳常等人亦幾於神者恐非書所能盡季通用功已深更加勉焉必無歉於我然後可傳諸人求大樂之書而觀之尚俟後日辨志録序學記曰一年視離經辨志此書之所以立名也學者則先辨志志不辨則不知所守矣東萊吕伯恭甫與鑰為同年生而又齊年聞道甚蚤心實師之博學篤志深造自得規模宏大而克勤小物其所著書如大事記近思録閫範之類不一而足又雜取子史傳記下逮醫書精要而切於日用者以為此編易知易行中人皆可企及擴而充之則可以入聖人之道用雖委曲而體則正大事若淺易而理實精㣲凡處已待人臨事之方詳盡縝蜜而大要以忠信篤敬為本將令學者循循然如履平地步步就實其用意切矣章貢李君和卿得而玩味法其可法戒其可戒又將刻而廣之此真東萊之本㫖也俾鑰為之序孟子曰可欲之謂善有諸已之謂信天下之事凡可欲者皆善其不可欲者非善也可欲而不能有諸已則猶天下之善也譬之五穀無非嘉種然必藝於土而後有苗有葉以至於實然必有諸已而後有所謂美所謂大以至於聖神此書誠善矣然君子多識前言徃行蓋將以蓄其徳非以資口耳之習也學者讀之必以有諸已而力行之則東萊之意庶其無負矣此書初以帥初名後又改為少儀外傳云復古編序文字之書世謂之小學或者因陋就簡指以為學之細事而忽之非也古者四民擇其秀者為士而教之所謂八嵗入小學者教以禮樂射御書數是六者雖不見古人之大全周禮注疏亦見其畧是皆有名數法度及人之幼真淳未散記識性全使習六藝則終身可以為用此為少年之學非曰學者之小事禮壊樂崩射御弗習數學亦復罕傳猶幸六書之說具存凡將爰厯等書不復可見急就章止存大畧惟許叔重著說文解字垂範千載李陽冰中興斯文於唐若南唐二徐兄弟尤深此學楚金在江南既為通釋部叙通論祛妄類聚錯宗疑義系述等篇總謂之繫傳又著韻譜備矣鼎臣入本朝逮事熙陵命校定叔重之書至今賴之爾後楊南仲章友直文勛邵疎陳睎諸公皆以篆鳴遺跡猶班班見之然不聞有書以惠後來呉興張謙中有篤志古道傷俗學之混淆為書一編號曰復古宋史藝文志張有復古編二巻用功數十年書成于大觀政和之間陳了齋程北山為前後序稱美甚至足以不朽矣鑰晩出何敢容喙尚有欲言而未盡者謙中攷證精詣字之合於古者皆所不論惟俗書亂之者必正其訛舛毫釐不貸讀者悦服無有異論聞其落筆作篆如真行然畧無艱辛之態惟體脩而末重與人小異不入俗目漢宣帝時器械工巧元成間鮮及之有谷口銅甬傳於世款識銅字其體正爾始知謙中之作蓋有自來非以意為之也巍字從委從嵬或省山以為韓魏之魏謙中為林中書家篆墓碑終不省去山字古無菴字謙中以為當作闇而難於題扁山谷雖定從草謙中亦不用也嘗篆楊龜山所作踵息菴記終篇偶無此字碑額雖從疾竟作隸體書之其信古不從俗類如此鑰不能作篆心頋好之陽冰新義猶為楚金所祛使二徐見此編殆無以訾之陽冰務新而謙中一意於古優劣可以坐判矣班馬字類序淳熙壬寅余丞宗正同年李聖俞為簿暇日以一書相示蓋婁君機所編史漢字類也余讀之因相與言曰古字不多率假借以為用後世寖廣隨俗更改多失造字之意此好古者所歎也以史籀之大篆或云書法已壊其書俗惡已不可言以叔重之說文而云野陋淺薄謬妄欺世後之字書又可知矣西漢去古未逺文章固非後人所及而字亦多古雖已變秦文科斗書廢要之假借簡朴髣髴古意其興亡之大端忠邪之異趣千載自不可誣而綴文之士又摘取竒字以資華藻片言隻字施之鉛槧自有一種風味故誨䝉漢雋等書作者不一此書更取史記之字合為一編從韻類分粲然可覩婁君之志勤矣蓋孟堅生於東都源流叔皮以成信史子長事武帝紬金匱石室之藏網羅天下放失舊聞孟堅實祖之多用其文不敢改定婁君尤為知所本矣然亦有難解者班子於馬時有遺失文意泯没如彘肩之不言生有以起自布衣而去也夫之類殆不曉其意又其甚者垓下之圍以項羽之用兵未嘗接戰止以楚歌而潰去疑無此理至誤儒者謂惜乎項羽韓信不曽一戰引孔明仲達以為比史載甚詳而孟堅畧不及此是可遺耶嘗有意一一證之性懶未暇婁君此書將傳於世觀其趣向進進未已或更攷究以補孟堅之闕以發揮子長之餘不亦善乎聖俞啞然笑曰婁君屬我以序久未落筆當盡以子之言寄之西漢㑹要序梁王筠論家門集自言吾門人人有集以為盛事然自永嘉南渡以至齊梁文氣日以卑弱所謂連篇累牘不出月露之形者也臨江徐氏以儒名家始余讀思叔左氏國紀故中書舍人陳公君舉為之序固已甚重其書後見貳卿彭公子夀為其表兄祕閣商老求儒榮堂詩始知其編北閣録甚富史官奏其有益於史筆遂膺延閣之寵尋傳其書知其有思叔之兄伯仲皆以詩書發身晩皆挂冠家居為鄉里標表已而思叔長子孟堅著漢官攻次子仲祥又倣唐㑹要之體為西漢㑹要一書疏為七十巻目録二卷總為十五門分三百六十有七事嘉定四年表進仲冬丁夘有㫖付尚書省藏之祕閣是昆仲父子間四書俱行於時俱有益於世用非止如王氏詞華之比也三代之餘治效近古莫如西京典章文物立法定制不惟輝煥周宻其言語亦皆雅馴非後世可及然而散於紀傳表志之間讀者未易識其倫緒仲祥究心於此二十餘年無一事不録無一語無據條列臚分秩然有叙開巻一閱而二百餘年之事厯厯在目其體專以班氏為主又旁取荀恱諸書參攷異同視古之文類與近時漢嶲博聞六帖法語字類等書皆出其上士夫之好古者無不欲録而藏之不患其不傳頋何待於序引而求之不置余既書儒榮之堂又銘祕閣之墓思叔致書又以此為屬為著其大畧惟老憊不能盡纂述之詳為有媿云商老莘夢莘紹興二十四年登科思叔名得之孟堅名筠淳熙十一年同登第孟堅今知全州仲祥名天麟開禧元年延試第六人今為湖廣總領所幹官云厯代帝王總要序帝王之傳尚矣鴻荒以來至於高辛其事莫得而詳故夫子定書㫁自唐虞司馬遷亦以為薦紳先生難言之洛陽邵雍為皇極經世書以為唐堯即天子位嵗在甲辰推而下之以迄我宋之熙寧又畧載嵗之卦爻以推其政迹比世之紹運圖編年通載詮要等書最為優焉給事中婁公機嗜學如嗜芰手不釋巻尤長於攷訂著書不一始為資善堂教授輔導帝子備竭心思去國二年青宫始建妙柬僚宷以吏部侍郎召還首兼端尹皇太子天資高明篤學好古禮待賓友咨訪不倦上下三千餘年興亡治亂固已綱舉而領挈矣公益思有以補報取平時所著帝王總要一書精加潤色輯成四帙又備録年號輔臣各有一編始自唐虞以至光宗皇帝凡君道之汙隆治效之優劣既書其大畧以至離合割據餘分閏位五徳之相生世系之聨屬靡不提綱撮要又擇前賢立論精確者各系世次之末開卷粲然如指諸掌獻於扄俾鑰序之鑰竊窺此書嘆曰彼瑤山玉彩之集皆非此比也皇太子講誦之餘垂意閱習不待徧攷史牒古今厯厯在目矣況公之持身挺特論議直諒凡所著述皆有依據亦未嘗茍為高論以駭俗故規畫一出於正無可議者皇上崇建國本教以義方既命丞相為之少傅執政大臣皆為賓客左右勸講罔匪正人公為之領袖又以此書日陳於前此宗社無窮之福也鑰何敢贅辭溫州進士題名序永嘉自晉為名郡宋興六十餘年人物未有顯者至天聖初朱君士亷第進士邦人榮之以名其閭自天聖至今厯四十有八年舉其上第者凡三百三十有七人夷攷鄉薦之額初止二人中十有三今益以五他繇大學外臺以進一舉所第率過鄉薦書之數而魁南宫者四冠大廷者再嗚呼亦盛矣河南二先生起千載之絶學以倡學者此邦之士漸被為多議論詞篇類有㫖趣進士之盛豈其是歟鑰濫授於兹樂儒風之方興爰攷姓名之高下嵗時之後先次而書之刋置學官又訪其氏族爵里别為一編咸虛其末以待來者雖然程氏之學大要在知本而敬以行之事業文章皆其發也而禄爵之得喪不與存焉向以此邦之士因故家之傳充而不止沿流而逹於源其為盛也又將有立言者樂為此邦書之鑰也斯拱而竢送趙亷州序趙使君以貴介公子好古嗜學自少交名士寓居東嘉避逺囂塵築屋城西偏環以竹樹如山中居擁書數千巻沈酣其間客至則清談终日無倦色澹若與世相忘者遇其適意揚眉抵掌論兵講其道咸纚纚有端緒又自許以有用之才一時貴人爭薦之錫對便朝神㑹氣合可立致要津下亦當在蓬萊道山也自以家貧急養分合浦之符以歸且行頋謂鑰當有言鑰曰奉太夫人輕軒逺遊嶺海撫字之外惟謹視藥餌經行佳山水有詩願以寄我此外尚何言然有一於此昔嘗疑孟伯周去珠復還事謂明月之胎固靈物也政苛則去平則歸雖知幾士不及殆史失之誣觀栁子厚記零陵郡乳穴之復載穴人之言曰向吾以刺史之貪戾嗜利吾是以病而紿焉今吾刺史令明而志潔吾是以誠告焉且乳穴必在深山窮林入者觸昏霧扞龍蛇束火以知其物靡繩而志其返其勤若是出又不得得直吾安得不以盡告讀之啞然笑曰是珠還之說也蓋天之生物凡世所謂寳者必在深險之地劉氏在嶠南役兵採珠至縻石於其足而縋之海使不至其下不止以是知求珠之難不止如乳穴之深一去一來豈其然乎使君行矣自爾或聞合浦之珠曰盛則公之政成而民生可樂矣當舉巵酒南望相賀以待公之歸送王粹中序粹中力學起家馳聲上庠優在舍選又其問學該洽其進進未已慨然有志於功名者也客授厯陽學子雲集凡經指授多所成就當路諸公非無知己尚為江右漕幕之行君向欲入蜀嘗為大篇後亦為詩以送厯陽之役老為此來日不暇給何處有詩輒效昌黎先生以規之義為贈君子疾没世而名不稱非必欲求名也疾吾無是實而致名也善乎名箴之言曰内不足者急於人知沛然有餘厥聞四馳昔者子路惟恐有聞赫然千載徳譽愈尊蓋名者實之賓也實至則名隨之非可要於鄉黨朋友也非可以違道而干也予人以金帛不足以收也飲人以酒不足以得也惟求其在我者而已凡得於外者分毫皆是過分一切聴之其求於我者則無止法所謂死而後已不亦逺乎茍進徳修業惟日不足雖欲逃名不可得也士之決科姑以進身而已所過者化陳迹俱不足言世之為大魁中大科者是仕進第一選後日賢否毁譽皆不係此場屋之聲亦不足以名世吾曹相與勉之愛厚不覺費辭其所以相期者逺也増釋南陽活人書序世以醫為難醫家尤以治傷寒為難仲景一書千古不朽蓋聖於醫者也本朝累聖篤意好生務使方論著明以惠兆庶積而久之名醫輩出如蘄春之龎泗水之楊孫晁張銳諸公未易悉數無求子朱公肱士夫中通儒也著南陽活人書尤為精詳吾鄉王君作肅為士而習醫自號誠菴野人以活人書為本又博取前輩諸書凡數十家手自編纂蠅頭細字參入各條之下名曰増釋南陽活人書可謂勤且博矣自言暮齒駸駸不欲為私藏將版行于世來求一言余好醫而不能學與之論辨皆有據依學者可按而求求而得其用始知此書之為有功也然嘗聞之老醫京師李仁仲之子云前朝醫官雖職在藥局方書而階官與文臣同活人書既獻於朝蔡師垣當軸大加稱賞即令頒行而國醫皆有異論蔡公恕始盡改醫官之稱不復與文臣齒不知當時異論之詳若許學士知可近世推尊其術本事方之外為活人指南一書謂傷寒惟活人書最要最備最易曉最合於古典余平日所酷愛觀許公之言則無求子所著可輕訾乎因併書之鄭屯田賦集序先生姓鄭氏唐之名族後累世居福州少時以孝文集書囊為殿帷賦魁其鄉繼以玉路建太常賦入太學人多傳誦尋寓四明開門受徒來者雲委躬孝友之行該貫羣經多有講解旁通子史百家年至四十五紹興三十年始登科文備衆體尤工於賦源流李唐諸名公出入三元元祐二李之間集古人所長而藻思絶人興寄高邁聞見層出講明題意立詞用韻精切平妥古語隨用奔湊筆端而一語不出程度之外元祐有域中有四大先生作域中四大王居一有輿議稱太平人猶議其率先生有太平無象皆突過前人不可企及讀之熟知之深者方服其理明而辭順蓋古文之有韻者也鑰年及弱冠侍親游宦而歸始得登門時亦粗成賦篇及見先生機杼望洋回若而嘆一意摹倣先生時猶未第間作一篇俟諸生既畢始出之迥出人上視瞠乎若後者又引進之嘗曰前四韻固當加工然皆有規矩前輩以妙意英詞震耀人耳目者多在後四韻而學者忽之致讀者無味雖舜琴歌南風可謂傑作先生猶曰後三韻皆空矣其嚴如此閱諸生所作語雖工或引經史全句屬對可觀而意不貫者皆所不取每令人讀堯舜不能化朱象大舜五十而慕富嵗子弟多賴等賦以為韻韻有意终篇尚有餘味可以為法或有一字切題既不可對而又與題字相犯者謂不若寘之送聨如以禮為翼之以翼星而配禮之類先生作詔諸儒講五經則曰厥後孝章開白虎之名蓋亦遵於此詔魯秉周禮云不然何以韓宣子見易象於春秋知周禮之盡在魯鑰服膺有素既沾殘膏以竊名第老猶不敢忘命兒輩收纂先生舊作僅得三十篇兒輩又以鑰少作八篇綴於後此編不惟筌蹄而已亦不求傳於世區區辭費如許不惟人笑之亦竊自笑姑使子孫知師承之自爾先生諱鍔字剛中官至屯田郎嘗為主上小學教授近録其後又特加贈官云法華經顯應録序西竺之教其高處至不可思議有厯刼贊揚所不能盡其神通發現攝魔救苦雖非人力所及皆其餘事也然其教所以盛行於世者亦賴此為多法華經凡三譯而鳩摩羅什所譯舉世誦之功徳効驗昭然顯著傳記所載非一蓋此經實如來祕宻藏非思量分别之所能解故其神異如此鄉僧宗曉朝夕誦習嘗刺血書之又集古今簡䇿之言凡一百五十事遂成巨編皆有依據將版行於世以助流通一日訪其所居蕭然自適與之語貫穿教秉問何以不出領衆曰非所敢當也因出此書求余為序余笑曰黄面老子本不欲言大藏所見與夫龍宫海藏之所祕無邊無盡其實本不曽言況此經之外見於餘之餘者乎子既集之而余又序之耶請不已漫書以授之且語之曰子欲了此而後游方他日一登寳所悟明本性筌蹄且將忘之而况此乎曉曰唯聰老語録序余頃投閒門可羅爵有僧以徑山聰老書來求寺記甚勤再三辭之不惟與聰無半面身隠言遜何能屬文徑山之名甲於東南一燔之後欲興瓦礫為寳坊兩宫賜予檀施山委舊觀鼎新又大過之宜得玉堂金閨之英為之登載頋乃訪老朽於寂寞之濱何耶僧曰寺倚神龍為命率衆致禱肸蠁昭答欲以屬公余感其意而為之辭晩歸朝行始與之識退然老衲也再相過忽已亡矣其徒集六㑹語刋之求序余不能學佛莫知師之所至但見臨濟揚岐之下曰白雲端曰五祖演曰佛眼逺皆古徳之光明傑特者逺傳行雪堂行傳光晦菴以及師其相付囑又非他人茍然之比光將示寂以行所付法衣集衆書偈以授師偈曰再來毒種元聰侍者叵耐吾宗滅汝邊也我今高枕百無憂聴子時撾塗毒鼓叢林遂有毒種之稱聚徒說法三十年自雪峯來此山法席大振復成金碧之區人謂為國一後身則師之所得者可知矣讀者其自參之攻媿集卷五十三欽定四庫全書攻媿集卷五十四宋樓鑰撰記中興顯應觀記奉敕撰嘉定三年十一月朔制詔臣鑰顯應觀為國家集福之地自建立以來未有為之記者汝其碑之文成朕當書其額曰中興顯應觀記已而宸翰下頒昭囘之光輝耀千載臣既承命謹拜手稽首言曰百神在天地間昭布森列皇朝咸秩無文非有功不祀其間靈效顯著遠邇奔走者不過數處而䕶國顯應真君其一也真君崔姓廟在磁州旁為道觀河朔人奉之五百餘年矣靖康中高宗由康邸再使金磁去金營不百里既去謁祠下神馬擁輿肸蠁炳然州人知神之意勸帝還轅孝宗誕育于嘉興先形絳服擁羊之夢生有神光燭天之祥此皆其最著者也中興駐蹕錢塘初置觀于城南尋徙于西湖之濱分靈芝僧寺故基為之祠宇宏麗像設森嚴長廊靚深采繪工緻鐵騎戎卒左出右旋戈鋋旗葢勢若飛動敞西齋堂以挹湖山之秀為崇祐館以處羽衣之流稱其為大神之居高宗脱屣萬乗嘗同憲聖臨幸以丹堊故暗賜金藻飾一新既又三十餘年矣皇帝皇后聿追祖考之意載命興葺復賜緡錢二萬俾都監右街鑒義主管教門公事明素大師陳永年買田以増齋供之費所以妥靈而錫福斯民者甚至是誠不可以無紀也竊攷神之所自不知者以為北魏之伯淵其知者以為後漢之子玉雖皆名公而實非也續會要等書亦不詳諦或誤後人唐武德元年置磁州貞觀元年州廢而以滏陽屬相至永泰初始復舊仁宗實録景祐二年封崔府君為護國顯應公且言府君貞觀中為相州滏陽令再遷蒲州刺史史失其名在滏陽有愛惠民為立祠後因葬其地咸平二年始賜府君之廟而京師北郊及郡縣奉之如嶽祠至是因民之所信嚮而封崇之故詔曰惠在滏邑恩結蒲人又曰按求世系雖史逸其傳尸祝王官而民賴其德使果為子王與伯淵安得謂史逸其傳歟元符二年即舊號封王大觀賜廟額政和賜冠冕七年加封䕶國顯應昭惠王宣和三年郡守韓景朝辭承上命葺治祠曰敷靈觀曰顯應且按舊碑為之記其説略與實録同又言唐太宗夢得之碑詔入覲刺蒲州河北採訪使因命刑曹曹弋編録神之靈迹五十餘條傳于世淳熙十三年奉光堯聖旨改封真君然至今以府君為號者尤見其本于為令也初命延福宫使安德軍承宣使張去為為提舉官傳子及孫延慶復庀此職宣力于觀為多道士初止十餘人今益以衆田止百餘畝今益以廣啓觀門而許士庶祈䙢咸有定期季夏六日相傳以為府君生朝都人無不歸嚮駢擁一夕尤為一時之盛孟冬十日又謂為府君朝元之節或云以是日上升禁庭皆設齋醮北人之寓居者是日亦必至焉乾道六年遣使賀金國正旦臣以假吏從行過磁使介而下相率望拜于驛中蓋往來者必致敬行則先禱于西湖之祠歸則潔羞以謝之臣謹摭其始末之實為記而又播以詩云惟漢之司農兮著遺愛于桐鄉使葬我于桐兮必他時之奉嘗繄神之仕兮于滏之陽惠及斯民兮久而愈彰擢刺河中兮任河北之採訪生則祠于舊邑兮歿又冢于其旁神之既遠兮雖尊以姓而逸其名神之威靈兮信千載之流芳謂子玉與伯淵兮皆流傳之𣺌茫獨昭陵之詔録兮載顚末之為詳北方之人兮謹廟食而自唐膺累朝之封賜兮誠有赫乎龍光功在社稷兮著明效于靖康神馬乗輿兮實顯祐于高皇始孝宗之方娠兮夢絳衣而擁羊迨震夙之夕兮又神光而發祥敞祠宫之百楹兮繚千丈之周牆儼像設之雄尊兮煥金碧之焜煌仰皇明之臨御兮未嘗求福而專鄉灑奎畫以寵嘉兮粲鳯翥以龍翔前三茅而後太乙兮與四聖而相望肆隂隲而黙相兮鞏國勢于無疆上宫掖而下士民兮藉神休而禬禳偉明神之英烈兮夫豈斂惠于一方願謁于上帝兮掃欃槍而殄豺狼吾君将中天下而立兮開壽域于八荒神亦歸其所兮報何可忘重修太常寺記禮樂一也舜命伯夷作秩宗典朕三禮曰夙夜惟寅直哉惟清無他言也命䕫典樂教胃子而及詩言志歌永言聲依永律和聲八音克諧無相奪倫䕫亦曰於予擊石拊石百獸率舞又曰戛擊鳴球以至鳥獸蹌蹌蕭韶九成鳯凰來儀何樂之詳也三禮之書樂亦在焉而名書皆以禮春官掌邦禮而大司樂以下屬焉則夷䕫之任已歸于一矣為樂設官十餘自中大夫而下府史胥徒凡一千三百餘人其間上中下瞽至三百人眡瞭又三百人而舞者衆寡尚無數抑何其備也孔子之時禮樂已缺其觀于周而歴聘諸國志固在于行道未始不切切于二者故問于老耼問于萇𢎞止以論語一書求之執禮固所雅言而言樂為尤衆至聞韶而不知肉味且曰不圖為樂之至于斯也所感深矣與人歌而善必使反之而後和之説者或不知此章之意蓋鄉人邦國所用之外樂歌多失其聲苟聞歌而善必使再歌之所謂和之者又得此一詩之聲矣太史公知之言三百五篇孔子皆絃歌之以求合韶武雅頌之音禮樂自此可得而述故曰吾自衛反魯然後樂正雅頌各得其所豈苟云乎哉自太師摯適齊至少師陽擊磬襄入于海亦多不得其説摯而下皆樂工散之四方夫子謹志之如有欲用則皆知其所之殆所謂樂失求諸夷者耶安上治民莫善于禮夫人而能知之至于移風易俗莫善于樂烏可不求其故哉今又幾二千年禮既多廢樂尤失之皇朝累聖非不講明所謂禮者尚可求之簡冊一時鉅公樂樂甚盛卒不可復古蓋其本已亡矣樂之本在聲無知之者而力求于尺度秬黍之未為可歎也近世陳氏兄弟禮樂二書流傳于世禮尚可攷樂亦名與器而已耳高宗嗣歴庶事草創而卿列不以一日廢迨駐蹕錢塘以法惠僧寺東偏隙地為敕令所又街之東則為容臺尚不足以盡設禮樂之器遇閱習則列宫架于法惠寺中紹興三十一年少卿王公普始請易地會敕局中廢遂遷焉中為寅清堂耽耽夏屋于是為稱法惠既廢為懐遠驛又以為臺諫官舍敕局再建于寺之舊處而容臺不移于今五十年矣梁棟墮圯日有覆壓之虞卿少久闕嘉定二年崇慶張君鈞為主簿已歎其不可居既丞胄監又轉而丞于此時司農太府俱舍舊以趨新或謂亦可遷矣君曰此禮樂之司庭宇宏敞位置崇嚴不應輕棄矧盜泉勝母古人所避不若因而增葺之請于朝度材于天邑凡而叢費取其貲而親出納之都下之煩末吏曹之謾欺一切痛革之手賦工直察其勤惰惰者至執扑以抶勤者或釃酒以勞百堵皆興衆役競勸始于三年之仲冬明年三月八日告畢用工三千五百有竒而内外堅鞏丹堊輝華于舊有加而無不及觀者駭歎謂工于營私者未必如是之敏且辦也發地得泉石刻名曰觀音且曰飲者可以愈疾猶是法惠之舊濬而澄之泉甘且冽結亭其上扁以汲古皆不在調度之數宜其大有不足而反因撙節之有方餘錢三十萬歸之府中而寺有勲臣畫像及書籍嵗久脱落又欲為一碑未能也府帥將作監王君柟復以為助今皆如所圖不愆于素而求記于余余自念老矣豈復為文頃嵗嘗叨簿正博士少列之命三以家諱而改除終不得進退周旋于其間兹喜寺之新因君之請又欲以平日所聞者自見故弗辭君飽學工辭章沈黙靜重號蜀士之秀而克勤小物乃如此漢之什邡劇邑也辦治有餘力今日葺理官寺朝論翕然稱之每言前後同僚協力以隮登茲不自以為勞其言曰今之天下雖不易于為而于其尚可為之中卒至于不可為者意其無不息之誠且不能充是心以往故也君之所存者如此宜乎見諸實用者有此也寺無他碑乾道七年黄公鈞為壁記謂後世以儀為禮以器為樂其于聖賢之道遠矣惟儀與器又皆因陋就寡寖非六經之故蓋嘗誦其言而歎息今鐘鼓玉帛具在而官寺又備矣若安上治民移風易俗者可不求其彷彿于古者乎台州社壇記台州之北大山綿亘其一支自東而西蜿蜒委蛇至江而止勢若囘顧是為龍顧之山子城據其下官寺在焉城西南隅去儀門百步步為社稷之壇厥位面陽爽塏平曠昔人相攸而為此必不苟也有司不戒日就荒圮頽垣成蹊蕘牧無禁淳熙己亥正月宗正寺丞沈侯被選來守仲春行祀愀然顧其僚曰是可以奉吾神乎乃命撤而新之臨海令彭仲剛建縣治于煨燼之餘侯知其才舉以任焉首按圖籍斥地之舊繚以周牆數十百丈始治地得仆碑土中洗而讀之蓋政和中所頒社稷壇式也制度明甚横列三壝門各四出中立社稷二壇風師居東雷師雨師居西亦各為壇壇之高二尺有半又為燎壇于風師之東南壝外稍高于諸壇于是悉倣名數因其舊而増築之故有屋四楹為視饌待事之所既葺新之又增其一為齋潔之地其途北出表以二柱中建臺門嚴闗鍵以守之作于六月朔旦又六旬有七日告成靡金錢五十萬有竒民不知役工不告勤過者肅然始知有地主之敬侯命鑰書之鑰聞古者先成民而後致力于神侯之下車訪民隱飭吏事廩廩乎循良之風而思不倦以終之以是邦被山帶江水旱仍嵗又間有鬱攸之災謂職諸幽者非人力所及故于神無所不致其敬社稷之重其可後乎秋社展禮氣象一新環佩琮琤豆籩靜嘉神貺昭答如在左右繼自今氣淑民和雨暘時若其必有相之者然則侯之政真知所先後而致力于神者乃所以成民也侯名揆字虞卿秀之嘉興人澧陽樓記紹熙四年三月戊寅澧州澧陽樓成于是太守王侯承甫以書屬余為記且曰澧之為州始于開皇後雖廢置不一而栁河東謂自漢以南州之美者十七八莫若澧則在唐已為名郡國朝建隆四年始脱僭竊之餘而為王土乾德二年始𨽻荆湖北路東接洞庭西連施黔武陵在其前江陵在其北為湖廣之孔道承平日久戸口滋蕃嵗輸米以斛計者十五萬養禁旅至三千有畸盛矣建炎之末妖民弄兵倡亂加以劇宼一再攻陷民居官府蕩為埃煤因以饑饉幾無噍類蓋六年而後定翦除榛棘招集流散僅復城郭之舊今六十餘年矣米輸猶不及盛時十一屯兵百餘人而郡治尤偪小黄堂之前重門相去不能尋丈外逼郡城又有酒壚相直纔于東偏啟一門以通出入心竊隘之訪諸故老或曰酒壚之後舊為城門兵燬以來閉塞至今倘闢而新之郡之氣且伸吾民其庶幾乎士民援以請為告于部使者始作新門酒壚既遷斸其故基則古甃宛然言益有驗節費以為資募民以供工官吏勸趨日以就緒外鑿城雉上建華屋即前日之外門為儀門而撤其舊于是治事之㕔始得軒豁寛敞而前無蔽障得以挹蘭江之秀俯仙明之洲經始于去年之十二月庚申至是訖工合樂以落之氣象煥然頓還舊觀不敢自以為功也要不可以不紀余因為之太息曰今之為郡者或能以亷白自喜則于營繕之事一切置之恐以擾民而招謗不問其事之當為與否也前後相承謂非吾責若此樓之于澧陽是可已乎余與侯世有道義之好又為世姻侯之兄弟皆承清白之傳侯里居時恂恂然一長者而莅官遇事人有難及莆田劇邑談笑辦治茲試彫郡謂將日不暇給而能振起固陋興五紀之闕典開一郡之眉目是可記也又攷之地志是邦有浮丘子採藥之仙蹤李羣玉讀書之遺跡又楚之申明以忠孝著晉之車武子以學術顯皆其郡人也先是層城横前重扃壅底士氣亦因以不揚是役也豈惟于隂陽家之言有利于郡其必有秀士為時而出者侯于是時勤撫以致其庶尚儉以益其富闢庠序以教之後來者又能繼此將寖復承平之盛而賢能以興實自侯發之侯名正功四明人承甫其字也真州修城記眞之為州未遠也自唐永淳中始析江都置永正縣南唐為迎鑾鎮皇朝乾德二年升建安軍大中祥符六年以聖像一鑄而成遂以名州而實當江淮之要㑹大漕建臺江湖米運轉輸京師嵗以千萬計維揚楚泗俱稱繁盛而以真為首中興以來不復置發運使而山陽通泰之鹽泝江而上商賈輻湊猶為淮堧大郡佛狸之駐𤓰步近在六合之境逆亮之至瓜州去此無數十里郡居二者之間故亦再罹兵禍朝廷以保障之未固屢飭守臣築城鑿池以為設險之計林君伯成興役于前及四百餘丈鎮江游奕統制郭君超繼之僅八百丈雖務欲速未底于成嘉定二年八月諸軍糧料院潘君被命出守當兵荒饑饉之餘幾不成邦既屬以勞來安集之政又以城築委之君自下車愛民如子手自摩撫左餐右粥加以醫藥呻吟疾痛不翅切身之苦視人之饑眞若由己食寢為廢此意孚乎上下通于幽明斯民感悦頓有生意和氣致祥年糓順成劭農通商寖復舊觀乃大肆其力于斯城因前功而増築之合四百六十餘丈基厚六丈上居三之一可列七騎高二十二尺浚濠五百餘丈闊者至一十五丈深稱之女易土以甓凡鵲臺礮臺武臺角臺城馬面等甃結堅緻金湯之固巋然與維揚相為長雄足為邊庭之壯觀既又興造葺修自儀門黄堂凡官府公宇大小二十八所合為屋二百二十六楹郡之内外為之一新朝家以緡錢十萬米七千斛庚費而所用不貲不復有請惟以𣙜酤之餘及撙節用度以充之斯已勤矣郡之井市與漕臺皆在城南大江之濱議者欲如𤓰州之城剏為兩翼自城到江以蔽遮之事重費多未易驟舉余追記未冠時侍親泊江干登鑑遠亭訪之居民指其前曰頃有閧市悉墊于淵江外有沙洲數十里雖隔皇天蕩之風濤而激水北來相侵未已不數年間之宦游者則鑑遠亦為壑矣是知兩翼之城不至江濱則不足恃岸既善隤不知所止又何恃也將為久計則更宜詳處而審訂之抑又聞合肥之城自乾道修築嵗嵗増葺工費不可數計竹木灰甓出于帥漕二司而工役則又金陵戎帥任之以躋登兹山陽歴陽大率類此今是邦城郭雖就而方有兩翼之議又前者林郭二君之所築已多隳圯尚須隨處補苴又别儲二萬緡豫為後日不時之備繼此者當知今日之艱難益加不測之防則當與揚廬和楚嶺嶭相貫而掎角之勢固矣惟潘氏自紫微舍人以風節名一世君之二父以從子被賞延俱為時吏師先正柯山使君能輕財重義君實似之自其幼年躬行孝謹篤志問學有不可解于心者行矣而著日進未已嘗宰崑山去之日無以續食及倅京口以荒政自任民以父母稱之今則江之南江之北草木亦知君名制帥既以治最上聞士大夫公論莫不以為循良之冠君則退然未嘗自足也使守邊者誠心體國皆能如君何有北顧之憂哉官僚以郡人公言求記為書大槩尚勉其成云君名友文字文叔婺之金華人奉化縣學記四明六邑奉川為大號難治然俗尚氣而服義秀士尤多治之得其道非難也神文在位郡國始建學張文定公方平謂庠序俶落乎睢渙嗣音乎郟鄏而是邑舊記謂相國清河公士遜出鎮秣陵為椎輪之始蓋寳元初祕書丞于君房為宰以石夫人之廟為縣學自為之記云然且曰願以奉川為縣學始亦可以知吾邑儒風之興舊矣宣和中周君因徙于邑治之東面勢益勝未幾舍法罷廢為亭傳又遭弄兵者燬焉紹興九年榮君彜復新之于今五紀棟宇寖壞圮陋不可復支永嘉宋君始至謁奠顧瞻廟像愀然曰教化根本之地不振如此何以示斯民之欲謀焉未遑也財用之空乏期會之迫遽固已不勝其應而連嵗大祲愈不暇給政成欲去介介若不滿邑士汪君汲素好為鄉里義事聞之謂其弟份曰是吾曹責也不待勸率不謀于衆以身先之首創大成殿増廣舊址不日而成一木一瓦皆不苟設必欲堅緻宏敞為久遠計重立先聖先師十哲之像儀兩門廡以次興作前有墨池濬而廣之方正清深冰壺澄澈南山千尺倒影其中輪奐翬飛照映江縣為費不貲曽無吝色乃季夏戊申宋君率僚佐士夫釋菜學宫用以掲䖍妥靈觀者如堵驚嘆贊美以為前此未有而民不知役也于是里中善士董安嗣徐如松等三十有二人爭趨競勸相與再建駕説之堂挾以直廬傍列諸齋庖湢廥廩器用畢備凡為屋四十楹又以去嵗始有自右學登科者為闢射圃以勸方來舉梁之初屬鑰為之文今既崇成又託以記鑰世居奉川高祖正議先生教授邑中寳元學記預名刻石尋掌鄉校前後幾三十年始為郡人然五世皆反葬境内區區封邑猶不敢捨辭不獲命敢告于里人曰令尹洎諸賢所以惠吾邑者至矣自爾必能相勉以學相高以文躡儒科登膴仕使吾邑簪纓日盛為四方榮觀則今日之舉斯為稱矣然孟子有曰謹庠序之教申之以孝悌之義頒白者不負戴于道路矣是殆與今人論學之意不同何耶孔子之教人亦必曰弟子入則孝出則悌蓋庠序所以申孝悌孝悌之義明則老而負戴于道者少者必從而代之以此為庠序之效不為利禄地也誠能因今之學行古之意月書季攷不害進取而父兄之告語師友之講習率以孝悌為先此義既明則凡學于此者施于家則為孝子順孫出而仕則為忠臣良吏蹌蹌濟濟化及里閭寖有不負戴之風幾于一變而至道者將以此望吾黨之士豈直為是觀美而已哉宋君名晉之字正卿悃愊無華三為邑長皆以儒術飾吏事首欲興學迄于有成邑人紀之實鑰之同年生也安慶府修學記舒本羣舒之地于今最為佳郡灊皖之勝欲游而不遂見從宦擁麾而之焉者輒企慕如登仙然嘉泰二年嚴陵詹侯下車以寛明之資臨淳古之俗平易近民因其俗而施之政未幾坐以無事顧謂僚屬曰官府俱飭而黌舍不稱兹不可後乃即其舊而增葺之學始建于紹興八年中更繕修嵗久圮壞以某年庀工至某月日訖役煥然一新郡人謂役不及我而躋登茲願有以紀之教授王君君玉度以書來余與詹侯俱壻王氏而侯為尊行知其賢有年矣以西樞之子謙厚亷介所至有聲績而飾以儒雅澄江既以政最舶使尤著清節謂文翁興學于蜀變巴夷如鄒魯翁實舒人尤敬慕之故未暇他事而首屬意于庠校可謂知所先務矣舒之人將何以報之侯非有望于報也惟爾父兄相與率其子弟益進于學亦因其淳古之習而文之以儒術不必以取科級之多寡為輕重文翁既祠于學如漢大司農朱邑以一嗇夫而遺愛傳于千載周瑜以文武才略獨步江湖間其名尤高皆郡人也誠使異能之士間出為國家用如前數公豈非侯之望于斯郡者尚勉之哉黃州貢院記黃岡東南佳處也大江東下赤壁西峙武昌夏口鼎立相望其在皇朝王蘇二翰林一以州馳名一以坡自命皆千載傑特之偉人竹樓雪堂既壞復葺風流文獻至今增重近時郡太守博士皆不輕其選秀士亦彬然出矣建炎兵燬以來秋賦多附他邦乾道七年始試于州而因陋就簡寓貢闈于庠校三載必一毁撤既非所以作士氣而學宫寖以頽靡州人病之嘉定二年四明高君仲遠來守承開禧兵戍之餘日不暇給首謁夫子廟嘆其弗葺已甚未遑他務與教授李君宗勉飭而新之廊廡齋舍以次興立而大比又近不可復蹈前轍亟相與謀得驛舍遺址鳩工調度分委僚屬創貢院五十餘楹庀工于二月丙寅訖役于五月己丑重門正㕔攷試分位左右長廊庖湢吏舍備具嚴整費緡錢五百萬米二百斛悉出于撙節之餘民不知役工不告勞而八十五年之闕典一旦復興父老謂承平殆亦不及士類歡奮起象振發且請記之仲遠與余有中外之好相與素厚以書來委且曰去中秋才月餘願即為屬筆以慰千里之望余為之欣然且曰仲遠長余一嵗恂恂似不能言與人語如恐傷之月評以長者稱兩乘貳車而後試郡撫字固所長不謂振起事功敏辦如此高氏蓋名家也高宗皇帝中興初駐蹕錢塘始建太學妙選師儒先侍郎首為國子司業豈惟文行經學足以表率士林馳名京師規繩具舉未幾車駕幸學擢貳儀曹至今四海尊仰之仲遠其次子也居家孝友恪守家法故為政彫郡知所先後士子尚勉進學業以稱使君期待之意使人物聲望與江山相高二翰林有靈實寵嘉之仲遠名得全朝散大夫云建寧府紫芝書院記建寧當閩浙之衝是為孝宗皇帝龍潛之舊雖宦游不得一至其地聞其山川聳秀武夷諸山皆非塵境蓋八州之門戸也鍾為英傑古今相望士夫多挺挺尚氣節秋賦動踰萬數薦送率八十餘人儒風最盛學有生徒三百分十二齋猶不足以容之今郡侯寳謨閣直學士諫議李公鎮臨以來治行稱最百廢具舉功利及物不可以數計周知而尤篤意于教養顧瞻府庠悉加葺治猶以為未能甚稱樂育之意謂晉范甯之守豫章大設庠序資給衆費一出私禄心實慕之乃捐俸錢三千餘緡度地于學之東西兩隅廣為四齋鳩工于嘉定三年仲冬朔旦訖役于明年二月之望脩廊廣厦翬飛跂翼名齋以志道據德依仁游藝以其前挹紫芝之峯扁曰紫芝書院蓋前所未有也財不費于官斂不及于民増弟子員又廣田疇以豐其儲舉郡之士歡奮感勵咸請記之公學有家傳伯仲競爽且素號博洽富于文詞不以自有乃列致郡博士暨學職諸生三百餘人之請貽書以屬于鑰顧年侵氣索何以承命勉為之言曰諌議此舉固已甚偉當屢書以傳後若名齋之義其待學者尤深矣是四者出于先聖之言學之大端莫過于是道者百聖之所傳非可以須臾離不志于此則易以流遁必至惑于異端德者誠也經之言德必以偽對之以是決知德之為誠據此一誠可以終身行之仁之為器重其為道遠苟能依之形于參倚之際非學之要乎德不可言志仁不可言據藝不可言依言之各有攸當也或謂藝成而下聖人以游言之疑其為可輕是不然所謂藝者非如今之技藝乃禮樂射御書數古所謂六藝是也稽之禮經各有名數先王設教及人之幼少眞淳未散之時使習而熟之則身在有餘不可勝用君子未有不兼此而能為全德者今禮壞樂亡射御號為武事數亦不復見惟六書可傳士又罕垂意焉夫謂之小學謂小年所當學非曰學之細也洒掃進退尚由此可以上逹而況六藝乎苟能盡力于三者而游于此則為士庶幾于備矣學者其母忽于名齋之義勉而進之以答諫議之賜豈以科舉利鈍為吾儒之盛衰耶本朝庠校權輿乎睢渙嗣音乎郟鄏寳元中詔建州立學賜田五頃至慶歴四年郡邑始得立學熙寧設官分教建州首置教授一員諸郡亦未之有元豐又賜田十頃則知是邦之學國家最所屬意尤在他郡之先也或曰郡既有學而復有書院不既多乎是又不然潭之嶽麓衡之石鼓南康之白鹿皆此比也古者家有塾黨有庠術有序國有學以今準之百里之邑千里之郡其為學當有幾所而謂此為多乎姑誦所聞以謝諫議及多士之意若公餘詣學與郡博士講明經術以訓迪好學之士則諫議之任也鑰何敢贅為之辭攻媿集卷五十四欽定四庫全書攻媿集卷五十五宋樓鑰撰記麻姑山顔魯公祠記顔魯公嘗為撫州刺史至今有南城縣麻姑僊壇記南城今屬建昌軍郡人祠公于僊都觀中曽南豐一記論公之風節備矣正平張公戒又發明邪正禍福之説尤為著明張南軒已謂無可言者于是系之以辭使祠者歌之以侑神然則後來者可無作矣慶元六年觀遭火災祠宇灰燼巨石皆毁裂大鐘亦融液不可尋而公之碑獨儼然人益敬之太學甯君居麻姑下下與觀相望慕公之為人以私財撤而新之求記于余又以李盱江麻姑山賦求宇文樞密之書余雖不識甯君而嘉其好古以扣工部尚書何公公曰此山與吾月湖山莊皆同郡嘗建一閣于觀門之西藏書萬卷餘以效李公擇山房之舊因亦與甯氏游且促余記之魯公事業載新舊二史然得南豐正平二記而幽光發越不容贅詞獨惟公既親為僊壇記眞有意于神僊之説故附會者亦衆姑以為作尉時或謂子有金骨可以為僊又謂希烈使人刺之公曰吾服殷七七丹在頂解金帶與之故得縊死而全其首領及其既死又有寄書小顔家之説皆方士之言無所取信固不必辦觀公視烈火滿坑忠憤一發徑欲投其中賊徒捄而得免當是時豈暇顧身首之全否耶因誦平日所聞以授甯君使刊之以袪世人之惑亦不失曾張二公之本意又與盱江一賦詞旨暗合云甯君名式聚族頗衆又多為儒甯氏未艾則公之祠亦賴以不壞矣廣德軍范文正公祠記文正范公勲業在國史其祠于廣德則已具見于内相浮谿汪公之記兹以祠宇久圮不修從弟鏞以嘉定二年為郡博士撤而新之求記于鑰語之曰文正公盛德絶識才兼文武非贊揚所能盡然大要在立志不苟而已耳方在貧約則朝暮甘虀粟之味既已富貴則子弟均布帳之清在海陵為一倉官而築海隄數百里在桐川為一獄掾而所立已卓然如此一馬微矣居則鬻以養士去又鬻之徒步而歸其跋乞米帖云顔魯公唐朝第一等人而饘粥不繼非所謂君子固窮者歟又有家書云老夫平生屢經風波惟能忍窮故得免禍公之所存類如此此其所以大過人者故曰志士不忘在溝壑勇士不忘喪其元公之自處直欲追古人而友之故其見于行事亦非今人所能及也學既奉公之祠則為士者無徒慕公之名位當求其所以致此者鑰既為推公之所以致此者而為之記又因以勉吾弟與吾黨之士鑰雖老尚當相與思古人與稽之義云鄞縣經綸閣記始慶歴七年荆國王文公宰明之鄞縣元祐中縣治建閣以紀遺愛名曰經綸肖公之像而祠其下俯仰百餘年間嘗再興于紹興淳熙而又廢壊紹熙五年知縣事莆陽吳君泰初新之起于三月戊寅踰月而訖工舊觀復還而有加焉求記于郡人樓鑰鑰以史牒攷之公為縣時世當承平公方讀書為文章率三日一治縣事垂意斯民為之起隄堰決陂塘為水陸之利貸榖于民立息以賞俾新陳相易興學校嚴保伍又刻善救方立縣門外邑人便之此相業之權輿也公之于鄞厚矣觀經游之記皆為農田而行歴東西十有四鄉鄉之民畢已爭事而遂歸上書外臺極論浚河捕鹽利害則公之為政可知詩文之傳于世為鄞而作者班班也鄉有五先生鑰之五世祖及王公杜公皆與之定交是以教化興行學者競勸後有憶鄞及憶東吳太白山等詩則又知公之戀戀于鄞也熙寧遇主千載一時盡以所行于鄞者推廣之嗚呼使一時奉行者皆能如公之在鄞則天下豈以為病哉天下雖病之然吾邑人之于公不敢忘也故尸而祝之以至于今若吳君可謂知務矣政成且去如始至然一新縣樓出于人之樂輸以其餘材又為此舉蓋將以表先正仁民之效慰父老甘棠之思而示後日循吏之勸一舉而三善具非直為是觀美而已也定海縣淮海樓記慶元五年十月甲戌慶元府東海縣淮海樓成主簿陳君廣孫求記于余問樓何以名曰秦公少游初筮之地也舊有此樓碎于建炎兵火至是始得再作退而攷之國史有傳云元祐初調定海主簿信矣又求于文集則絶無一語及之訪諸父老相去百餘年間耳目所不接不可得而攷矣公受知于東坡王荆公本欲以大科發身俯就進士舉實與先祖少師同在元豐八年丙科家藏小録淮海獨掌牋表蓋其布衣時名已重矣然亦不聞仕鄉邑之詳謂公鄙夷吾鄉而不出一語耶則公所至必有詩文不應于此獨爾頃游括蒼公之故迹班班可見水邊沙外之詞後人作為鶯花亭登臨賦詠猶使人想見風度樓今在簿領官舍余未及登也聞其東望大海浮天浴日之波殆無津涯大江自東而南西抵郡城横陳樓前潮汐往來風帆浪舶尤為壯觀北有蛟門招寳伏龍之山南有長山太白諸峯一覽而盡得之此宜公之所甚樂豈亦有詩文而遺佚不傳耶公未第前一年嘗自題其閒居集之首曰將赴京師索文稿于囊中得數百篇辭鄙而悖于理者輒刪去之豈後來亦嘗取少作而刪之耶陳君元樞之子宦學有家法知所向慕故一官雖小慨念前聞人而興斯樓及瓜且去矣必欲記此余既喜其意因又念一時諸公與公同時秉鈞怙權富貴隆盛者多矣由今觀之雖窮達賢否之不同同歸子盡彼或甚達而民無稱至有搢紳所羞道者公以軼羣竒才為蘇門上客賦似屈宋詩凌鮑謝壯猶碩畫直欲鞭笞二虜而困于煩言陷于黨人僅得一校勘黄紙書籍為正字史院編修官遂倅杭州監處州酒竄郴及横雷坎壈流離醉臥古藤一笑而終亦可悲已而聲名至今暴白家有其書望之如神仙然其所經行之地了無片言可尋猶為士夫愛慕如此然則士之立于世可不知所擇乎鶯花亭詩祭酒芮公國器一章最佳人言多技亦多窮隨意文章要底工淮海秦郎天下士一生懷抱百憂中余嘗誦而悲之因併記焉東萊吕太史祠堂記乾道淳熙間儒風日盛晦菴朱公在閩南軒張公在楚而東萊吕公講道婺女是時以學問著述為人師表者相望惟三先生天下共尊仰之而婺人被東萊之教尤深至今名士班班其傳蓋未艾也先王為文靖公之七世孫自正獻公而下名德繼起又為文清曾公之外孫淵源固已甚遠而天資絶人讀書五行俱下少從三山林公之竒游學徒百數卓然出其上博極羣書究通千古興亡治亂之變而耽嗜經學至忘寢食年二十有七禮闈既擢前列又中博學宏詞科舉名震于都城鑰既忝同登復媿齊年意其為豪俊之士一日相遇則頽然似不能言者殊不稱其名與之坐而敂焉不惟使人意消欽嘆擊服雖定交于是日終不敢以友友也公入館學鑰在敕局又鄰居于百官宅聽教為多亦嘗造婺之寓居留連夜話幾至達旦又六年而再造焉則公已病矣嘗為之歎息曰少為國器長為人師使居大位則必稱物平施庶幾直道之行也而公已矣世間物物自書之外無一可動其心者推明道德性命之説而不流于迂盡排佛老異端之論而不至于甚愛惜士友如待子姓而持論不阿别白是否如持水鏡而不事于察著書立言粹然一出于正而克勤小物雖使之仕于州縣亦甘心焉蓋其造詣精深本末具舉用志不分必欲至于聖賢閫域沛乎不見其止也其教人則以孝弟忠信為先以窮經躬行為務故登其門者隨其性質咸有得焉自建炎南渡父祖始寓于婺假官屋以居其地在光孝觀之側入仕雖久而在官之日僅四年故在婺之日最多四方學者幾千雲集横經受業皆在于此晚始買屋于城之北隅以舊居歸之官公之亡既二十有七載是為開禧之三年邦之士夫及其門人請于郡欲以舊居之半為堂以祀先生郡侯諫議李公大異慨然從之又出錢五十萬屬掌書記宣君繪經理其事前增城主簿潘君頤孫實董斯役郡寮及其門人合力以佐費庀工之初相率持牛酒以犒焉嘉定改元之秋為屋纔十餘楹外門五間祠室及前軒各三間又欲前為一堂扁以麗澤書院以存公之舊且為後來講習之地後為遺書閣以庋平日所著如大事記讀詩記閫範近思録春秋尚書講議家法祭禮及他書之未成者皆可以傳遠垂後而工費猶未備國子司業王公介與其同門友生謁記于鑰感念疇昔自以宦游不得日陪函丈亦不謂公之蚤歿也老矣公之墓木拱矣雖欲一拜祠下而不可得遂不復辭而書其始末將使吾黨之士自今瞻先生之像如在左右毋忘先生之淑諸人者以自勉且思有以稱賢使君所以風厲振起之意則先生之傳寕有既乎先生諱祖謙字伯恭其季曰祖儉字子約確守素業能世其家頃以忠憤上書貶死江右主上更化念其困于權倖之手贈直祕閣澤一子學術操行亞于先生恐久而泯沒敢牽聨書之平江府瞻儀堂畫像記慶元二年知衢州鄭公若容治行彰聞浙東部使者合詞以最課表于朝某月甲子有旨除直祕閣改知平江府自皇帝踐阼以來垂意民瘼郡太守以異等效膺不次之寵實自公始四方流傳莫不聳動而公之名益顯吳門地大物夥郡務又十倍于西安舊嘗聞吳中士夫言吾邦使君當得三數人以治賓客答牋書理財賦聽民訟分典之乃可辦治雖若戲言蓋甚言其日不暇給也公精力絶人年侵而彊直不衰今蒙天子親擢以平日臨事不苟之意窮日夜之力以從事于簿書期會宜視前後數公愈勞而無頃刻之閒然下車未幾而治聲已隨舟車而東矣一日貽書于鑰謂郡中自至道以迄于今更郡守一百五十人率有繪像舊在齊雲樓兩廡紹興末年洪公樞密以内相出守嘗建瞻儀堂而列像其中范公參政為之記今又三十六年繪事故暗裝潢寖以陊脱欲盡圖于壁間良工名筆一開生面而以舊像庋之閣上庶幾可久子為我記之鑰唶曰以繪事為甘棠固他郡所無于浩穰膠擾中公餘豐豫雍容及此非身兼數器之才寧能爾耶舉此一事可以知公之政下轉而上聞天子之用公殆未艾也鑰祖父宣和中嘗以徽猷閣直學士為守遺像在諸公間慮其久或失眞謹以家藏寫照因託公是正之併書始末以塞公命慈溪縣董孝子廟記慶元二年某月甲子慶元府慈溪縣重修董孝子廟成邑令朱君堂求記于郡人樓鑰以傳記圖經參攷之孝子諱黯字叔逹一字孝治㑹稽句章人生後漢時家貧少孤事母盡孝採薪供養甘果美味奔獻于母母甚肥悦比舍有王寄者富而不孝二母各言其子寄聞而銜之伺孝子出苦辱其母孝子知之恐貽母憂黙而不言母既葬斬寄首以祭母墓自囚以告有司和帝釋其罪召為郎不就以壽終句章今之鄞縣也孝子之母嘗寢疾喜飲大隱溪水不以時得于是築室溪傍以便日汲厥疾用瘳溪在今縣南一舍故以慈名溪而又以溪名縣母反葬于鄞鄞為郡太守治所故州邑與其墓側皆世祠之城之祠宇即其故居先其母塑像在南郭草堂中康憲錢公億迎歸于廟鑰親訪其墓宰木猶存近存城南豈所謂草堂者耶晉虞預㑹稽典録亦載其事但言㑹赦免而不言為郎之詳然至今鄉人猶稱董孝郎中廟也吳之虞翻稱其盡心色養喪致其哀單身林野鳥獸歸懷怨親之辱白日報仇海内聞名昭然光著以為㑹稽英俊之首唐大歴中刺史崔殷作碣徐浩書之亦云其徙居也庭出寒泉其執喪也林集祥鳥無貽一日之憂終報共天之怨又載其六代祖仲舒漢大中大夫嗣孫字春領廬江太守世為郡中名族既不可詳攷又言環堵已蕪遺記將落意前此必有碑版今不得見矣若董孝名鄉慈溪名縣亦謂之董溪則不可磨也祥符元年冬真宗皇帝封岱禮畢詔賜號純德徴君或云起于錢康憲之請夫孝子豈有意身後名耶發于至誠自不可揜生䝉和帝之恩越九百載而膺章聖之寵然則隱約之士可不慕而勉哉唐神龍中有張孝子無擇墓在慈溪之虎胛山結廬負土有湧泉芝草之異仕至和州刺史比郡中有揚孝子慶自紹聖至宣和刲股割乳以愈父母之疾者至于五六卒旌表其門孝秀相望蔚為義郡其源流有所自矣元豐間盛君次仲為令嘗書董溪事于碑下建炎改元林君叔豹祠于東山之陽紹興之末戸掾董君鄰攝邑又崇大之為前後二殿前以奉孝子而處其母于内今三十五年矣寖以圮壞朱君始至進謁慨然以為此蓋風化所繫宜為先務顧荒陋如許是闕典也君既以儒雅飾吏剸決如流縣務畢舉以政成之餘一新廟貎視舊增闢首捐俸錢助以餘帑斂不及民給工直如私家人徒見輪奐之美而不知役莫不驚嘆稱服又率邑之士夫酌奠以落之是足以仰贊天子之孝治而示邦人于無窮皆可書故備書之嵊縣嶀浦廟記剡壯縣也兩火一刀自古記之晉宋名勝遺跡至多地以豁名以谿之山水俱秀也邑城之北山圍平野谿行其中至四十里許兩山相向愈廹剡之水易于暴漲者以此然水口氣聚所以為壯縣也西曰嶀山巨石突踞水上其下曰嶀浦巖壑竒聳尤為勝絶溪多積沙深淺不等惟此數里間淵渟澄澈不知為幾尋丈潭在石下為羣魚淵藪相傳中有神物無敢觸犯亦險絶之地也上善濟物侯廟貎像嚴毅夙著威靈據山瞰谿稱其為明神之居谿通曹娥大江山為台越孔道舟車所經無不致敬吉凶響答求夢尤應遠近以雨暘祈禱蒙賜為深時節報謝者相踵畫像以祠于家者俱是也駱氏世為廟史有吳越時公牒稱陳長官祠嘉祐七年鄉貢進士何淹為給事郎太子中舍知縣高安世為記亦云侯姓陳氏為台之仙居令始過此隂有卜居之志秩滿舟覆于下拯之復溺死焉自爾顯靈民遂祠之天福初有神兵之助而受此封然酈道元之注水經出于後魏已言嶀山北有嶀浦浦口有廟廟甚靈驗行人及樵伐者皆克敬焉若相盜竊必為蛇虎所傷則廟已古矣況台州樂安縣五代時改永安至皇朝景祐四年始改為仙居不應石晉之前已有此名豈侯實為永安縣令後人誤承仙居之名耶正如磁州崔府君國家奉之甚嚴㑹要以為後漢之崔子玉孝宗聖德事跡謂賜名從玉從爰蓋以始生符瑞黙契其名而昭陵實録乃謂唐貞觀中滏陽一縣令也幽冥之事不可究知傳記亦有謂靈祠間有以剛方之士代之者惟其血食有素授職于朝故封爵之報與臣子不殊也建炎時敵騎入越而叛兵欲犯邑境以神之威不戰而退乾道中曾賜香茗之奠今丞相大觀文謝公布衣時由丹丘赴南宫神已告之富貴之期是舉登科作尉此邑事之尤謹公既登樞筦修職魏君必大率邑人以加封為請慶元改元賜廟額曰顯應公之力也魏君年及八十為一鄉之老既募衆力新其嗣而鑰之子潚適為丞介以請記惟神之姓氏事跡著聞已久潚又能道祠宇祈禬之祥且將捐私財而刻石併為記之修廟之役劉令君榘先以十萬錢市材魏君以宰木助之周令君悦取以建殿宇始于慶元四年十一月成于六年六月而終始經理者魏君也桐廬縣桐君祠記荆州多荆薊州多薊豫章以木氏都酸棗以棘名邦茲邑以一桐之大垂葢如廬古有隱者採藥求道于此或問其姓則指桐以示之人因稱為桐君故桐江桐谿桐峴皆以此得名既以為縣又因以名郡焉大谿澄澈横其前又一谿出天目至此而㑹一山巋然聳于谿之東林樾秀潤號小金山上有祠宇肖君之像蓋一方之絶境也新婺州貳車詹君乂民以書來曰家本嚴陵郡中慕桐君之高風來寓邑下念古祠之蕪廢思有以興起之未能也邑尉趙君某公餘為一新之士民稱美思有以登載傳後求記于余昔未冠時嘗侍親過其下雖甚愛山川之清淑曽不能登嵲􅣈以致一觴之薦徒誦盧公贊元招僊之詞而去之至今猶屬夢境也夫所謂隱者正欲逃名于世嚴之高士有三人焉子陵隱于漢風節最高而其名終不可泯方干隱于唐又以詩顯桐君不知為何人身既隱而姓氏竟不傳其殆最優乎余既喜詹趙二君之好事有契夙心因併書之俾刻焉建寧府沖應周眞人祠記神仙之説茫乎邈哉有耶無耶不可得而知也以為無者謂以秦皇漢武之力求之而不得故以為必無之殆未必然以為有者則指傳記以為信傳記雖多夸言然耳目所不及者非必無之噫蓋有之矣我未之見也洪内相志夷堅言建之周生事以為丹欲成而失之出神往求而魔又困之勸家人火其尸而無所歸又謂其山淺陋非神仙所居也嘉定五年學士院權直真希元建人也為其里浦城周眞人之祠求記于余且示以真人之弟待制公所為行狀及閒樂先生陳公師錫容臺何博士去非所書陳何皆同鄉始末甚明始知内相得于傳聞而未見此三書也眞人天分素高夙有仙骨神既授之又加以眞積力久之功其妻楊氏文公之孫亦有隱操相與枯槁于山林之深及其垂成猶未至于形神俱妙輕舉飛昇之地則世之謂一有遇而遂羽化者又難矣然其精神聚而不散遂著靈響水旱有禱至今猶能惠其里社里人以其祈禬之明驗聞于府于監司以徹于朝封沖應眞人舊有祠宇因而興葺以侈上賜而眞人之名益顯矣余聞建多偉人山川孕秀非他郡比近閱圖志武夷之外名山無數造化豈故私于一方哉自有宇宙融結自然而秀氣特多人才方興而未艾蓋不止神仙道家之盛也余家于鄞少有四方之志而宦游不出温台粗窮東南之勝欲入閩而終不遂老矣方乞身以歸將隱于四明山中望建安無可到之期第切悵歎而已既為書此且囑希元併與前三公之文刻之此不復具載云眞人名霞字史卿希元名德秀攻媿集巻五十五欽定四庫全書攻媿集卷五十六宋樓鑰撰記遺老堂記乾道辛卯客授來束嘉一日衣冠㑹于黄堂廡下中有蒼顔白髪目光瞭然者心竊敬之人曰此高密郡王曾孫崇道公也遲頃俄揚笏相向字呼我家少師問于君何屬鑰拱而對曰先大父也因言在京師時相與游從如昨日事媿晚出不及知自爾時時造門聞話言祖宗承平餘百年事之廢興人物之賢不肖内之朝廷典章近之干戈轉徙之詳歴歴言之嘆擊不暇若宗正屬籍之盛他人按圖莫能究舉以叩之了辨如響年踰八十視聽不少衰氣節剛勁門無雜賓獨以事契故厚我一日謂鑰曰予家素貧僑居佛廬他無所用心左右圖史且以永日近闢屋數楹取趙臺卿之言牓以遺老子盍為我記之鑰曰臺卿非公比也彼嘗詭姓遁身以逃鈎黨之禍晚焉著書詞思遺老顧豈得已公以當世宗英嘗驅馳戎馬間得敵要領歸報德齒俱尊為趙氏祭酒名堂之義不應處此漢子政自以宗室遺老言事必盡今天子廣覽兼聽無間疎戚親親賢賢尤所篤意間平之懿迨無遺賢公于古事今事問無不知豈不能為更生之為而以臺卿自處耶公一笑併以為記㑹稽縣寛簡堂記㑹稽縣治之東有地三畆所舊有一堂以溫陵曾魯公嘗為之宰名曰衮繡嵗久圮壞知縣事歐陽季思伋撤而新之前軒後廡又為亭三間以臨河上巖桂官梅分植其間棟宇宏敞丹堊煥然經始于慶元四年孟秋落成于十月之望求名于余為之名其堂曰寛簡亭曰休心且語之曰文忠公君之四世祖也為郡以寛簡不擾為意故所至民便既去民思或問公為政寛簡而事不弛廢何也公曰以縱為寛以略為簡則弛廢而民受其弊吾之所謂寛者不為苛急爾所謂簡者不為繁碎爾此士夫均所當法也君承家傳為江右甲族而今之在仕版者才一二君仕中都以才諝自見諸公貴人薦之朝來治劇邑其可不以此言為法乎因為書其扁記其説使刻諸石以自勵且以示後之人縣壯而賦重民為之困官不勝繁君能以剸劇之餘力及此且再書攷矣尚其勉之行百里者半九十毋忘此言後來者又能率是而行之豈惟文忠公之言可寳萬世邑之民其庶幾乎或曰臨下以簡御衆以寛此古之格言也然今之作邑者戴星出入焚膏繼晷猶恐不逮寛簡之説果可行乎曽不知為單父者彈琴而治宰山隂者晝而垂簾其必知此矣故文忠之為青州揚州南京皆號大郡公至三五日間事已十減五六一兩月間官府如僧舍豈非明效大驗乎文忠之宰夷陵為喜喜堂記有曰聽事之東以作斯堂度為疏潔高明而日居之以休其心君于公退之餘吏散庭空休心亭中以養吾之神以待事物之至惟寛與簡將自此出本無二道也昌國縣學申義堂記東陽葛容甫洪為昌國令葺縣庠之講堂名曰申義求書其扁余既喜葛君知政之先務又樂其名之佳大書以遺之又欲為之記余分教永嘉時嘗作序齒文以示諸生其略曰孔子稱甚矣魯道之衰也洙泗之間齗齗如也説者謂齗齗為相遜孟子曰謹庠序之教申之以孝悌之義頒白者不負戴于道路矣夫洙泗之間行者相遜何以為魯道之衰謹庠序之教何預于道路之負戴者及究其説漢地理志云魯瀕洙泗之水其民涉渡幼者扶老而代其任俗既益薄長老不自安與幼者相遜也徐廣又曰蓋幼者患苦長者長者忿媿自守故齗齗爭辭所以為衰也想其盛時老者晏然如父兄之役子弟無復相遜子所謂老者安之殆為此也孟子亦謂孝悌之義既申則頒白負戴者少者自當代之矣噫後世教養士子以科舉得人之多寡為庠校之盛衰者與古意遠甚昌國故甬東之地民以漁鹽為業近嵗儒風日興而猶未盛葛君欲崇教化以善其俗一聞余言則曰此名堂之本意也始與從弟鏞尉東陽而歸余啓得人之問以容甫為稱首兹為鄉邑治聲卓然又將興學化民以幾古人之意誠非文法吏所能為者齊變至魯魯變至道顧不在兹乎鑰既為之記而命鏞弟題其上奉化縣恕堂記奉川余鄉邑也比因掃松見趙令君㑹方禱雨相與過恕堂上蓋縣齋便坐且折獄之地也棟宇一新而戸冊不稱令請改書之且出舊記相示因謂令曰治獄固貴乎恕而所謂恕者非止用于此也孔門之徒最為善問子貢猝然問曰有一言而可以終身行之者乎亦難乎其答矣夫子不曰仁不曰義不及其他而曰其恕乎兹豈夫子一時姑以應弟子之叩擊哉蓋其平日踐履之實故其言藹如歴萬世終無以易此又從而言曰己所不欲勿施于人大哉恕乎曰違道不遠曰求仁莫近一貫之傳亦曰忠恕而已矣制字之初以如心為恕大率以我之心如彼之心則為恕矣若彼亦能以其心如我之心則天下豈復有他事哉世之言恕者曰我能臨民而輕其笞箠追科而緩其節目是皆恕之一端何足與言恕之大全也君子學道則愛人人能言之小人學道則易使則鮮有能説者此亦恕之説耳君子役人者也以吾心如下之心安得不以愛人為務小人役于人者也以其心如上之心安得不易使且以至微之事言之令君坐官舍而有以謁入者心欲卻之苟曰彼之來亦良難豈非有急以相投有事以相告耶則吾之迎之也必不以為憚驅車以出謁欲見主人而不出心必愠之苟曰安知其家不適有故乎姑待之則吾之心必釋然矣推此以往仁不勝用寧復有乖爭陵犯之患哉令君曰所未聞也方欲以記為請願徑書坐中語以詔後之人且曰邑有吳氏懋者既以一力葺理牢戸内外俱備又以其餘材重建此堂願託名焉令君名彦綰祕閣修撰右司公之子以清謹守家法以儒雅飾吏事明恕而行終始如一為邑中建惠政石橋分為雙洞壯麗絶出吏民以為昔所未有誠信及民上下響答此堂其餘事也沖和堂記古有宗法大宗小宗具載禮經聖人之用意深矣陽羡周孝侯廟碑後有宗簿宗尉溧陽史氏舊有家譜每一院各有簿尉之職蓋是時宗法猶在意必擇其族之有才力者為之若有司然餘姚虞氏實世南之裔有為農者故譜尚存自受氏以來莫不可紀如漢之詡吳之翻凡有名于史者皆略載其行事歴晉宋齊梁陳隋皆嘗上于朝而名臣為之修纂齊則王儉修之他悉類是聞玉山魯氏有譜亦然唐史所載甚詳至武氏而譜法大壞唐人猶能各守其閥閲今則亡矣本朝惟一二名門如杜祁公上世自二代春秋諸侯之子孫千有餘嵗不絶世譜蘇老泉之言曰情見乎親親見乎服無服則親盡親盡則塗人也吾之相視如塗人者其初兄弟也兄弟其初一人之身也悲夫一人之身分而至于塗人此吾譜之所以作也鑰嘗讀而重悲其言故族黨雖衆縱不能與之如同氣率體老泉之言以待之山谷先生文章妙天下學問冠百家而至性尤為絶人東坡先生薦之曰孝友之行追配古人其見于詩如食蓮有感等語皆藹然仁義之言于元明知命情義尤篤晚謫宜州患難極矣學道純熟不知有死生之變與再從弟靖民判官書有曰吾儕所以衣冠而仕宦者豈已力哉皆自高曾以來積累偶然沖和之氣在此一枝其實相去不遠幸深念之嗚呼此言之發出于中心其視羣從功緦之親豈有厚薄之間秪此一語可以睦宗黨可以厲風俗可以寛鄙而崇薄聖人宗法之意盡在是矣先生之諸孫犖既刻之石名曰沖和帖又建堂于家仍以沖和扁之皇太子為之大書犖又求鑰為之記顧骩骳之詞何足以發竊嘗佩服斯言故勉書之犖以才業之美由郎曹宰掾為直顯謨閣兩浙路轉運副使其他在仕籍者多以治行間稱故家簪紳之盛在今日未有如黄氏者茲非沖和一枝之餘慶耶清芬堂記皇朝以忠厚為家法親睦九族高視千古高宗中興收用周宗以强王室如令畤令詪子崧子晝子淔皆列之法從或紹爵郡王士樽士籛等又皆極禄位之豐更化之後首擢令衿襲封安定獨殿諸老寵眷隆渥特許非時見普安郡王倡和動盈卷軸王聖性高邁學問夙成篇章璀璨屬聨尤工其間理趣精深非若文士徒為華藻而已紹興三十二年孝宗受内禪而令衿不及見矣一子子覺以御書詩二軸裝潢以進孝宗復親灑翰墨題其一云朕在藩邸令衿以宗室老奉朝請時有唱酬子覺今標軸來上想清芬之如在復書賜之其一云此卷皆朕與令衿唱和詩令衿亡矣覧之愴然先是祐陵朝諫官江公望以抗直敢言有重名于時而又學佛超詣每謂與吾道合令衿舊與之相好得其四書俱是理到之言前後名公卿跋語甚衆嘗以進呈孝宗又書其後有曰觀江公之言其利濟方便超脱生死佛道蓋如是歟超然居士果能允蹈卓爾不羣信乎宗藩之領袖也高山仰止聊書卷末詩及此跋又書舊諱至十有一超然蓋令衿自號也子覺之長子伯禽袐藏于家亦謹題于巻尾伯禽之子師濟舉以示臣鑰敢整冠再拜而讀之仰而嘆曰皇乎盛哉臣子之家寳先日所得奎畫者有之矣未有炳曜傑特昭囘之光連篇纍牘如此之夥者也惟安定天資穎悟加以篤學所交多世之名勝樂善好施胸次豁然中間嘗以客得禍終不自悔惠人利物不負公望之言寓居柯山臣外祖太府少卿汪思温為守與之友善公望所謂事事方便物物利益者外祖蓋終身誦之後二十年先臣贈太師岐國公璩為監征公知其貧而亷貸私錢三十萬以濟臣家之歸先臣一介不取雖已償之至今懐感終不敢忘此固公之細事敢附見于此抑使人有以信公之實行也師濟將取清芬二字以名其所居之堂而求記于臣臣老矣學落不能馳騁于藝文之圃輒直書始末以著君臣相與之深庸詔後世為安定子孫無窮之榮且以見前良議論詞采更相映發為一時文獻之盛云揚州平山堂記平山堂東南勝處也長淮之東地多堆阜苟見山處皆以得名于斗野山在他郡何算自泗上南來者望而首得之故米寳晉有第一山之詠儀真西北登高見建鄴諸山而有壯觀之勝揚州大明寺所謂自有宇宙便有此山而千載無領略之者六一居士一覽而得之撤僧廬之敗屋作為斯堂而風景煥然遂名天下公以為占勝蜀岡江南諸山一目千里而王荆公亦謂一堂高視兩三州者也天造地設待人而發滁之醉翁峽之至喜皆以公得名而揚又居南北之衝士夫往來喜至其下自堂之成所謂迷樓螢苑蕪城九曲之舊一本作風亭月觀吹臺琴室之舊俱在下風矣公之記峴山亭謂峴蓋山之小者而其名特著豈非以其人哉羊叔子與杜元凱是已亭屢廢而復興者由後世慕其名而思其人者多也此堂亦幾是耶然而物有盛衰承平才更十七年而堂已圮壞直史館刁公約新之沈内翰括為之記紹興末年廢于兵燬周貳卿淙起其廢而洪内翰邁記之近嵗趙龍圖子濛嘗加葺治鄭承宣興裔更創而增大之開禧邊釁之起環揚之境本無侵軼而庸人債帥畏怯太甚始以大言自詭事未迫而欲遯遽假清野之名縱火于外負郭室屋延燔一空而堂遂為荆蓁瓦礫之場于茲數年矣嘉定三年宼攘既息而旱蝗饑饉之餘瘡痍益甚皇上思得人以鎮撫之大理少卿趙侯方以閩漕之節徯次于浙右遂除右文殿修撰起帥于揚遠繼叔祖龍圖之軌下車之初日不暇給簡節疏目恩威竝用教條井井軍民帖服邊鄙既已不聳而年糓順成寖復樂土之舊郡城堡寨本此下各俱缺攻媿集巻五十六欽定四庫全書攻媿集卷五十七宋樓鑰撰記雪竇山錦鏡記雪竇山名天下自下而升既至絶頂而地始平曠四山又環之寺據正中氣象雄秀二水不知所從來出山之兩腋而㑹於前徑赴大壑峭石削立險不可測崩空落崖飛雪千丈洞心駭目勝絶一方此山之所以得名也繇古以來登覽之士不知其幾眩於創見何暇擬議紹興甲子郡太守尚書莫公將來游乃始發妙意於萬象之表謂水去太亟屬寺僧以田為池使二流匯其中寛納而緩出之則寺當少利有詩云能廢千畦渟玉雪不妨飛練掛丹梯讀者韙之而四十餘年十易主人咸睥睨以為難淳熙十一年足庵鍳公禪師既至百廢修舉取莫公之說斟酌之八月己未遂興畚鍤池深一尋縱四百三十尺廣半之築隄南西以便徃來因橋為閘視水漲落而閉縱焉明年二月庚子池成漪漣拍隄渟濙如拭千巖倒景空明相映道俗欣嘆見未曽有禽魚下上咸有喜色師問名於雪窗張武子良臣武子曰是所謂淵林錦鏡者也遂以錦鏡名而謂余記之余不能習隂陽家言然通天下一氣耳山如人之定形水如人之脈絡或瀦或泄當適其中池之未作也水若建瓴山之氣與之俱逝而不留及其既積則淑靈之氣得以扶輿磅礴於兹矣繼自今其必有卓然超徹之士深藏若虚出於此山以振祖風者豈惟利而已哉曩嘗一再游焉間久不雨水僅相續蕭索輪囷固自不惡惟積雨暴漲則尤為壯偉可觀頋安得每每如許及今過之既坐亭上徐徹三版水則大至怒濤迅雷凌駕震疊素蜺萬數哮吼層出真天下之竒觀也始惟見寒莎野奔紛駭相應少焉覺兩涯石壁亦為之低昻不已此非親至其上深矉而駐觀者不足以知此莫公止為不妨飛雪之勝不知此池之成闗機闔開乃大有功於瀑泉也足菴傳洞下心宗精鍊刻苦等慈接物法施不吝所向傾動緇白數主廢刹皆立興之壯年嘗出力於此以辦衆縁晚座道場年踰八十適丁歉嵗艱食之餘他人支傾補壊猶懼不濟乃於談笑間成此勝事用錢百萬外不以謁諸人内不以費諸帑傾囊倒篋一力為之信有大過人者是役也僧徳實實相其事妙有智思規畫多出其手又得信士單承亮割膏腴以補田之廢此池益可以久矣故併書之以告來者云望春山蓬萊觀記老與佛之學行於世尚矣未知孰為輕重然以吾鄉一境計之僧籍至八千人而道流不能以百其居才十數而佛廬至不可數何耶蓋嘗聞之歐陽公矣大畧以為佛能箝人情而鼓以禍福人之趨者衆而熾老氏獨好言清淨靈仙之術其事㝠深不可質究故凡佛氏之動搖興作為力甚易而道家非遭人主之好尚不能獨興且曰其間能自力而不廢者豈不賢於其徒者哉明之四山去郡皆三十餘里西有湖千頃一山穹然秀出此為最近者名曰望春舊有靈波廟以祠白龍政宣間有陳孜者始崇以殿辟道院於東俾道士馮立權奉香火祖父少師典鄉邦因湖之淤請於朝而田之嵗得榖亡慮四十萬斛父老以為徳生立祠其中又得道士何思逺居之於是觀宇益興廊廡畧備思逺澄心鍊氣得黄老之真風驅役鬼物靈迹有不可掩者嘗之京師有運船數百千艘欲絶淮而潮不登為作法於其堧未幾潮溢歡聲如雷悉賴以濟發運使以聞􅎁差明州管内副道正盗發清谿旁郡山谷間多響應者祖父大飭守備郡以無恐思逺亦有隂助石記存焉紹興癸夘太守莫公將命拜章禱雨而驗奏移象山蓬萊觀廢額手書扁牓以寵異之其後主者竭力以増益前功今知觀呉若訥繼胡志清之後里之巨室厲氏兄弟相與出力興造又得昝氏創岱嶽行祠於山麓遂為一方勝處由歐陽公之言觀之諸君可謂能自力而賢於其徒者矣鑰自念生晚不逮事祖父嘗拜祠下冠佩儼然幼年及識何君猶記其道貌能厯厯道祖父時事使人起敬呉嗣法於何為孫行厪行乃祖之法以大其居是為能負荷者哉與之游一日來請曰觀之興才六十餘年懼無以傳逺久願記之應曰傳之久不久正不在記而况此骩骳之文乎世之棟宇有傾民力為之欲為無窮之計而驟起亟廢幾不能以一瞬山巔水涯結茅累甓或遂化為殊庭自前古以至今日者非一日子以為今之琳宫蘂館據名山洞府之勝霞冠星䙱搖曳其間者皆固然耶其創始之初亦若是而已又未必能如子之居之壯也其寖致雄盛者雖曰有數亦存乎人爾揆之世法又何止棟宇也哉今蓬萊之興或作於前或作於後以隮登兹歸語子之徒儻能念其囏勤而増葺之則真可以無窮矣呉曰正欲記此以示來者遂為之書天童山千佛閣記淳熙五年孝宗皇帝親灑宸翰大書太白名山以賜天童山景徳禪寺寺之門甚雄敬刻雲章尊閣其上又於方丈專建一閣以藏真跡實為禪林盛事前所未有也初西晉永康中沙門義興卓菴山有童子來給薪水後既有衆遂辭去曰吾太白一辰上帝以師篤於道行遣侍左右因忽不見自是始有太白天童之名山在郡東南六十里所太白一峯高壓千嶺雄尊深秀為一郡之望紹興初宏智禪師正覺欲撤其寺而新之謀於衆有蜀僧以隂陽家言自獻曰此寺所以未大顯者山川宏大而棟宇未稱師能為層樓傑閣以發越淑靈之氣則此山之名且將振耀於時矣覺深然之乃拓舊址謀興作内外鼎新以次就成智匠高妙務極崇侈門為高閣延袤兩廡鑄千佛列其上前為二大池中立七塔交映澄澈游是山者初入萬松闗則青松夾道凡三十里雲棟雪脊層見林表而倒影池中未入窺樓閣口非人間世矣中建盧舍那閣尤為壯麗住山三十年其為久逺之計皆絶人逺甚後有慈航了朴一坐亦二十年起超諸有閣於盧舍那閣之前複道聨屬至今巋然相望又大築海塗増益嵗入由是天童不特為四明甲刹東南數千里亦皆推為第一游宦者必至至則忘歸歸而詫於人聲聞四方江湖衲之以不至為歉皇子魏惠憲王出鎮一見慈航歡若平生暇日來游頋瞻山林登玲瓏坐宿鷺或累日不忍去因圖以進於上㑹稽郡王太師史文惠公又從容奏請遂有四大字之賜瑰竒絶特之觀無以加矣十六年虚菴懐敞自天台萬年來主是刹百廢具舉追跡二老而千佛之閣嵗久寖圮且將弗支猶以前人規模為未足以稱上賜欲從而振起更出舊閣及前二閣之上僉以為難師之志不回也先是日本國僧千光法師榮西者奮發願心欲徃西域求教外别傳之宗若有告以天台萬年為可依者航海而來以師為歸及遷天童西亦隨至居嵗餘聞師有改作之意請曰思報攝受之恩糜軀所不憚况下此者乎吾忝國主近屬它日歸國當致良材以為助師曰唯未幾遂歸越二年果致百圍之木凡若干挾大舶泛鯨波而至焉千夫咸集浮江蔽河輦致山中師笑曰吾事濟矣於是鳩工度材雲委山積列楹四十多日本所致餘則取於境内之山始建於紹熙四年季秋之甲申才三載告畢費緡錢二萬有竒是嵗海莊倍稔贏穀三千斛如有相之者不求於人見者樂施以迄於成凡為閣七間高為三層横十有四丈其高十有二丈深八十四尺衆楹俱三十有五尺外開三門上為藻井井而上十有四尺為虎座大木交貫堅緻壯宻牢不可拔上層又高七丈舉千佛居之位置面勢無不曲當外檐三内檐四檐牙高啄直如引繩旅楹有閑翬飛跂翼周延四阿繚以欄楯内為綺疏表裏明豁自下仰望如此崑閬梵唄磬鐘半空振響徜徉登覽四山瞰河漢星斗如在欄檻御書金榜巍乎中峙翊以翔龍䕶以絳綃高出雲霄之上真足以彈壓山川傳示千古善財童子大藏嚴藏入見樓閣廣博無量則不可知若經行四方室屋巨麗殆未見其比也鑰奉祠東歸嘗徃遊焉驚歎傑特目眩神駭過於耳聞敞請記其事老矣學落不能形容姑記大槩以表吾鄉之勝海内好竒之士欲游而未遂者覽此則太白之景思過半矣虚菴道價素高禪子向方鳬夷亦聞其名而歸之加以願力深重才刃恢恢巧匠瑰材成此勝事觀者無不羡歎或請飾之敞曰殫力竭財幸躋登兹行且謝去若丹雘華飾尚有賴於後之人云安巖華嚴院記代仲舅汪尚書吾鄉僧刹最衆奉川一邑凡七十有二雪竇古道場為冠其次則安巖山也林壑幽䆳非餘山比出縣治三十里創於唐之大厯而廢於㑹昌五季漢之乾祐僧清聳義仙入山求卓菴之地登高四望投以一石誓曰石所住處吾其止焉既得之曰此五龍之地居此者當利見大人皇朝乾徳錢氏猶在呉越聞聳之名命住杭之靈隠寺號了悟禪師乃以此菴為四明道場爾後寖為徒弟廢壊天聖中有老禪伯其名上曰居下與泰陵廟諱同字久住天童山邑有汪居士湜自號和静先生以其好佛里人稱為汪長老率信士十人力挽師為此來既至尤與居士契合遂相與營度形勢遷立寺基相去二百步有蔣宗盛施錢十萬鑿山平址汪君鳩合衆力建寺宇百餘楹殿堂宏敞中嚴像設康定元年括囊山人志全為之記大率稱其地之勝東接奉川西連台嶠南臨滄海北倚四明言其興造之速則曰霜暑不再金碧相輝師又自作十方遺戒謂永為十方宗師說法道場語論深切蓋凜然可畏人也手植松六千本自葛隩至門約十餘里亦有松門記三碑皆居士所立稱為檀越主則施財出力為多矣慶厯三年賜華嚴禪院之額外建玉澗流峽望春濯塵四橋中有釣臺緑蘿望海亭皆為佳境距今百六十餘載間有興作支傾補壊視舊不能有所増益今住持僧無盡俗姓汪氏寔居士五世孫也出或菴體公㑹下三住名藍來主華嚴十年矣念居士經始之勤益務興起族弟智徳捨俗為僧與之勠力有蓬道奥山緜亘三千畆岡壟險絶莾為盜區僻在此山之西徳之已業也至是捨入山中别立一菴以謹䕶守林巒映發又一勝處於北名馬跡開廢田八頃又以衣盂增置三十畆以贍塔菴盡公既已重建僧堂鐘樓等比舊加壯創為舂磑機輪激水為無窮之利又將増廣大殿香積地之廢興固自有時居士植福深厚厥後族處雙谿為大家其興未艾豈苟然哉余家久與之通譜視之猶南阮也族子伋與宗黨求記於余余笑曰嘗觀白樂天沃洲禪院記謂晉宋以來白道猷始居此山中間寖荒大和有頭陀僧白寂然卜築遂為禪院寂然謂樂天為從叔乞為之記樂天系以詞云道猷肇開寂然嗣興今日樂天又垂文兹山異乎哉沃洲與白氏其世有縁乎今安巖大刹居士建立於前無盡嗣興於後又委余以記余有從子清一方禮盡公為師其於汪氏又不止如沃洲之與白氏也因慨然為書之徑山興聖萬夀禪寺記徑山天下竒處也田雙徑而上至高絶之地五峯巉然中本龍湫化為寳所國一禪師開山於天寳之初特為偉異天作地藏待斯人而後發道成名震召歸長安代宗為之執弟子禮將相不得預大丈夫事繼之以無上又繼之以法濟坐鎮羣魔刀斮禪牀而色不動識錢武肅王于㣲時故呉越累世崇奉尤謹皇朝至道中太宗皇帝賜以御書并佛骨舍利元祐五年内翰蘇公知杭州革為十方祖印悟公為第一代住持紹興七年大慧禪師來主法席衲子雲集至千七百衆末年南歸重來跲而復振人境相與映發道俗趨仰龍神亦隨指麾而定顯仁皇后在慈寧宫高宗皇帝在徳夀宫時皆嘗游幸就書龍游閣扁牓孝宗皇帝書興聖萬夀禪寺又賜以圓覺經解天下叢林拱稱第一大慧以來名徳繼起神龍靈響素著國家民庶有禱輙應累封神應徳濟顯祐廣澤王廟為靈澤且有玉圭玉帶黄金缾罏祭器之賜其盛極矣然而廢興有數不可預知國一之後以㑹昌沙汰而廢咸通間無上興之又後八十餘年慶賞始以感夢起廢為屋三百楹翦去樗櫟手植杉檜不知其幾今之參天合抱之木皆是也䝉菴禪師元聰以慶元三年自福之雪峯被㫖而來道譽隆洽不媿前人五年仲冬行化浙西而回禄挻災烈風佐之延燔棟宇一昔而盡異哉人皆以為四百年積累之業一旦掃地有能興之非磨以嵗月未易就也先是寺基局於五峯之間又規模不出一手雖為屋甚夥高下奢儉各隨其時因陋就簡亦復有之衆為之請曰大慧無羌時豈不能撤而更之頋其勢未可兹焉火起龍堂瞬息埃滅豈能神欲一新之乎况祖師之像出於烈燄而不毁開山之菴四面焦灼而茅不傷師與國一俱姓朱氏或疑以為後身比移醬壇涌泉成井今日安知非暫廢而當復大興耶聰曰有是哉㣲我誰當為之乃出衣盂為之倡率學徒元韶可逹等所在縁化兩宫加以錫賚施者聞風日集動以萬計又命南悟等廣募閩浙江東西良工伐木於山日役千輩斤斧之聲震動山谷凡食於山者無問比丘優婆塞相與勸勉智者獻謀壯者出力夙夜經營不翅己私開拓舊址首於東偏為龍王殿以嚴香火之奉繼為香積厨以給伊蒲之饌延湖海大衆則有雲堂供水陸大齋則列西廡此皆一日不可緩寺之所以立也寳殿中峙號普光明長廊樓觀外接三門門臨雙徑賀五鳳樓九間奉安五百應真翼以行道閣列諸天五十三善知識仍造千僧閣以補山之闕處前聳百尺之樓以安洪鐘下為觀音殿而以其東西序庋毗盧大藏經函鑿山之東北以廣庫堂輦其土石置後山巨壑中開毗那方丈於法堂之上復層其屋以尊閣思陵宸翰御榻修復妙喜塔亭仍建䝉菴於明月池上為香水海以沐浴為天慧堂以選僧禪房客館内外周備像設雄尊金碧璀璨法器什物所宜有者纖悉必具不可勝書蓋其百工競起衆志孚應經始於六年之春成於嘉泰改元之夏閱月才十餘而變瓦礫之區為大寳坊始者蕩廢於一彈指頃若甚慘矣及其興之神速則高掩前古而又雄壯傑特絶過於舊按圖而作井井有條雲棟雪脊翬飛層疊逈出於烟霏空翠之表春秋二㑹來者益衆奔輳瞻仰如見化城驚瞿踊躍稱未曽有經山於是乎大振矣余嘗登含暉之亭如踏半空左眺雲海視日初出前望都城自西湖浙江以至越山厯厯如指諸掌真絶景也為别峯寳印賦詩有百萬檆松雙徑杳三千樓閣五峯寒之句印為之撫掌且曰山中之景幾無餘藴矣是時新創大閣丹雘未施上下一色如凝霜雪涉二十年猶屬夢境今則土木之盛何止十倍恨未能一寓目也聰忽以書相尋於寂寞之濱屬以記文遣僧契日攜書來見備道始末辭之曰年侵學落筆力隨衰子之師願力宏深成如許大佛事不求於重望雄文之士而為此來何以舛耶求之再三拙菴又助之請遂櫽括其語為之大書且告之曰大慧千僧閣之成一時稱為盛舉善乎李資政之記以謂在杲公何足道而循習齷齪者以為竒特不亦陋甚矣哉聰之為此初豈有意於興作者因攸攸之竒變偶人情之響答上資國力廣集喜捨時節因縁有相之道以隮登兹是固不可不記以傳逺然於師何有哉矧國一之初本無可傳之法其後瞻禮之衆傾於億兆財施之廣形於千萬視之如幻等之於空居惟一室室惟一牀布褐陶匏澣衣糲食其視寵榮震耀何如也聰方以此道行而余欲以言語贊歎有為功徳多言益足為贅是故言盡於此師其以為然乎江州普照院記余少侍先光禄自洪都舟行順流而東過彭蠡望盧山開翠屏於空外小泊南康迫於行役不及一至山中厯指五老香爐諸峯悵望而行猶意此生可游也老矣遇人自山中來必問泉石之勝或惠以圖與記讀之若身到其處也住育王瑞公九江人嘗以問之最能言受業普照院之詳蓋院去湓城之東才十五里為邦人游樂之地昔曇珣律師講經宴坐感白鹿之祥至今有白鹿臺臺下即此刹晉義熙中逺公與十八賢結蓮社於兹山而於山巔水涯建立法幢甚衆此蓋其一也雖非深入廬阜而面勢殊勝前横大江江中桑落洲正與之對亦為一古刹中更兵火蕩為榛墟紹興初僧崇信始誅茅結屋而徒弟普誠與嗣子師瑞師紹師義師卿相與募縁興建已而正殿廊廡法堂寢室輪藏三門鐘樓佛閣庖湢等處無一不備瑞公自以土木但為有為功徳出而游方以一大事為己任首住舒之興化移浮山未幾被命來育王時佛照光禪師自徑山乞歸來居東堂瑞其高弟也既嗣法席父子更唱迭和相為引重衲子雲集因念受業香火之傳猶有未滿人意者罄衣貲度智日智月等十僧使相其事為經久之計増田以待雲水高人是刹之立幾七百餘載既廢而復大興豈無數耶瑞公清介孤高而未嘗為矯厲之行道俗歸重故能一坐大道場至於九年畧無魔惱已而退居西塔又復累嵗一日語余曰出本無心住亦隨縁拙菴既已示寂吾將歸老於前山山間素無碑誌願為之記將歸而刻之噫余既無由杖屨相從以酬素願縱到山中勝具亦已無有矣師之歸度無再見之日廬山面目終不能復識既為書其始末又重為之憮然也魏塘大聖塔記僧伽本西域人唐龍朔中始來中國於泗州臨淮縣信美坊乞地建標欲為伽藍掘得古香積寺石記并金像一軀上有普照王佛字或言師頂有一穴窒之以絮夜去絮則香滿一室質明香還復窒之萬回異人謂觀音化身也示寂於長安以有靈應遷還泗上為之建塔傳於世久矣鑰先祖少師年四十而守家傳其顯應事甚衆陳子充大光了齋之孫貳卿之子與余家有連比任太府寺簿余方為郎相與尤厚余既投閑而子充亦掛衣冠矣忽以書來云先侍郎自紹興十二年南蘭陵解郡組延平既無先廬無所於歸始謀禾興之居僑寓魏塘大聖院六年始得今竹橋之宅院以大聖名中有瑞像靈異幾不勝書蓋自治平紹聖時屢發妙光其明屬天圖志實載之至今水旱災疫必求於此祖父諫議嘗因從兄黙堂繪像而為之贊所謂一月在天影分萬水者也方寓居時祖妣尚無恙洎吾二親闔門敬奉皆所親見久思有以崇事之老僧清梵戒行堅潔一夕夢僧伽欲建塔於寺中既以實告適符願心自淳熙六年竭力為之經理嵗捐百斛以為助今將二紀土木之工悉已就緒其高七層塔心相輪以次而舉指日可畢願為我記之余方病足僵卧一榻酸呻無聊未能屬筆隔嵗而相促不已余昔誦韓文公詩僧伽後出淮泗上勢到衆佛尤魁竒且有突兀三百尺之語東坡之詩云不嫌俗士汚丹梯一看雲山繞淮甸乾道間以假吏過泗但有火燒水轉掃地空之嘆而已盤溝小像之在呉門人猶敬之不謂殊特之觀乃見於此子充疎財好施既以輕視軒冕不問家之有無獨於此舉惟力是視倡率衆施成此勝事三請之勤見於羅雀之門與世異好如許余亦不得而辭也仰山太平興國禪寺記仰山天下之勝地也雖未曽一至其處讀韓昌黎之文而知山之有神閱傳燈而知小釋迦之開山二神蕭姓釋迦之來實有靈響遜山為寺又能隂相黙佑招致檀施以至於今迦之道愈高山之神益靈山之名以日著環袁之境旁及四鄰之外水旱疾疫必禱而奉香火者尤衆其詳又見於孚惠二王集録寺興於唐㑹昌之元至皇朝太宗皇帝賜以太平興國禪寺之額仍賜御書棟宇之盛甲於江右自迦至今凡三十有七代矣嘉定元年閏四月三日不戒於火延燔殿堂樓閣三百餘楹盡為煨燼兹豈有數耶太守寺正余公謂一郡倚此山為命當有以興起之亟捐金錢三百萬首建法堂及二王之殿户部尚書趙公為建僧堂三間且為之主盟知隆興府待制趙公前後施錢亦三百萬作佛殿住山清公率其徒持鉢四逺聞者樂施不數月佛殿丈室香積廊廡盡還舊觀而煥然一新則大過之嗚呼又何其神速也余侯以丞相之弟平易近民既已成民而又能致力於神尚書歛澤民之惠袖活國之手歸而燕居助成大事連帥又出俸餘為之倡率清以一衲度寒暑頃在淨慈孝宗知其名召對而賜之頌至今土木形骸不改故時四人者相與敬孚惠之靈神興釋迦之名刹一廢一興殆不偶然清屬予為記記其大概云爾神有二祠去寺逺者一舍近者才五里而寺亦祠之釋迦諱慧寂初來自郴余侯名應誠尚書名善堅待制名希懌清自號簡菴余四明樓鑰也攻媿集巻五十七欽定四庫全書攻媿集卷五十八宋樓鑰撰記新昌縣丞廰壁記余表弟汪履道得中丞新昌尋前任人名氏自紹興末年得李君結而下凡十餘人以壁記為請報之曰昌黎藍田有記尚可著筆乎書再來曰藍田之文誠美矣殆有激而言不然既曰於一邑無不當問而崔斯立乃日哦二松之間丞果誰負也我先人季父及吾兄皆嘗為之率以勤幹貳其令有聲於時是邑雖小思繼家聲庀職以來勉於所事日不暇給追科讞獄凡邑之寄大府下之縣必屬令丞謂之知佐簿與尉或不預也侵官固所不敢敢慢官乎求丞之職又自有常平雇役經制等緡錢動以千萬計境内河渡水利等事固已不勝應帥垣部使者萃於越委以吏事文符旁午又時奉檄以走它郡㑹邑大夫更易攝承久之惟恐無尺寸自見以及吾民誠知古今事不類人才有高下顧雖欲一日掃溉之暇不可得未可以藍田之言為當然也余讀書莞然曰子之言有理勉旃其以此記之錢塘縣廰壁記錢塘古都㑹繁富甲於東南高祖南巡駐蹕於兹厯三朝五十餘年矣民物百倍於舊負郭二邑事體寖重他郡邑莫敢望紹興二十七年有㫖錢塘仁和比開府祥符兩赤縣中書擇才授任秩滿許以陛擢於是選任又重仁和乃錢塘之分故錢為尤重焉舊治在錢塘門内尋入景靈禁籞乃以華嚴僧坊故址為之在國庠之西南邑鉅事叢才者或病之紹熙二年宋君价始至興滯撥煩坐以無事首作夫子廟以崇儒風建狴獄以清囚禁因又裒彚前任人名氏將刻石以記縣既甚古蒐攷史傳自宋元嘉中劉道真至呉越羅隠凡十人國朝張君房而下抵今凡三十九人具載嵗月亡者缺之使後有攷焉君實景文公四世孫風流未逺儒雅飾吏敏於從政故其施設知所先後如此鑰與君素有姻好喜君之優於仕也為之記始末而又告之曰壁記不可無也然縣令去民最親賢否不可得欺彼卓太傅元魯山諸公著於民心千載猶不忘蓋有不待碑而後傳者君尚勉之沿海制置司參議廰壁記四明為東南大邦海帀三垂北通海岱東控高麗日本諸國高皇南巡駐蹕臨安尤為控扼要地始置沿海置制使尋命守臣兼之凡閩浙淮東瀕海之州皆𨽻焉後分道置使乃專領浙東四郡檢校少保郭公仲荀徽猷閣待制仇公悆皆嘗領之仍有參謀參議官紹興三年二司俱罷隆興元年海寇猖獗户部侍郎趙公子潚以敷文閣直學士出鎮復兼置制使以重其權獨置議幕非老成資高者不在兹選於是張君大年始為之五傳而至先君先君嘗以軍器監丞兼攝起部出守括蒼倦游念歸遂仕於家又閱八人至今呉候候一日謂鑰曰時平罷警幕府雖省文書然制司任重為之參佐敢怠其事將刻石紀前任人名氏自隆興始且子之先君嘗為是官矣子為我記之候嘗為鵝城濠梁二守有能名精神未衰才力過人此職雖無以表見然嘗造其公宇前日支傾拄壊之不暇今皆煥然又有餘力以及此臨事類不苟識者多稱其賢鑰既與候游又因得以不肖姓名託先君之後遂謹書之昌國縣主簿廳壁記昌國明之屬邑實海中一大島也以山經地志數家攷之唐開元二十六年七月十三日析越州鄮縣置州仍置奉化慈溪翁山等縣大率多析於鄮明今為慶元府鄮復為鄞翁山即昌國也大厯六年三月四日廢於袁晁之亂故唐書地理志元和郡縣圖志止列四縣曰鄮奉化慈溪象山而圖志於鄮縣云翁洲入海二百里即春秋所謂甬東越滅呉請呉王居之者也其洲周環五百里有良田湖水多麋鹿圖經翁山一名翁洲十道四蕃志云徐偃王居處城基猶存皆今之縣境也皇朝端拱二年始為鹽場熙寧六年部使者以蓬萊安期富都三鄉與鄞縣隔海請置一尉以司鬬訟盗賊事王文公嘗為鄞令創縣賜以今名元豐元年又割定海縣之一鄉𨽻焉初以邑小憚費以尉兼簿領之職隆興改元海寇猖獗郡守尚書韓公仲通奏更置武尉而職始分邑之未立一尉獨尊承平民有餘力官舍壯麗他邑無能及者而簿廳始因草創久覺弊陋居者懼將壓焉累政欲為而力不逮慶元二年平陽楊君既至慨然欲一新之既數月公勤敏明孚於上下嘗試為之圖郡造浮梁邑有餘材君請得之捐資調度邑人相與分材効力不勸而集鳩工於三年初夏落成於十月之乙未為廳三間高廣加於前數尺階與軒稱是徒廳右之神祠於左廊廡吏舍一切更造木工一千五百有竒役夫二千優與之直費錢才千緡父老爭持酒幣以犒工役唶曰民不告勞而輪奐如此何其神速也始余官於朝故人劉閒叟嶠雲以書來曰外子楊正臣欲附計臺一試望有以惠頋之已而中其選遂登紹熙元年進士第鑰也初一見而竒其貌與文今又益知其才矣余鄞人也而未嘗涉海第聞出定川鮫門山水天無際風帆迅駛窮日而後至昌國故雖有寳陀安期蓬萊之勝願游而不果惟邑人徃來誦楊君之政至不容口發軔之初臨事不苟如此逺業殆未可量也邑士請記其實且曰楊君將去不可以無傳故欣然為書之慶元府通判南廳壁記郡縣丞雖不侔然位高而偪大率如藍田壁記所言余頃贅倅丹丘問於故給事呉公芾公曰吾嘗三為之進則有侵權之譏退則有避事之謗余曰處於材不材之間可乎公曰子得之矣慶元於今為輔郡貳車有三分東西南廳而南為勝城中一湖最為絶境公宇據其陽盡得十洲三島之要舊為𣙜酤之所至今猶以名其橋南渡増員始以居此參政錢公重建紅蓮閣於前運使楊公大興廳戺然二廳皆有題名此獨闕焉今董君嘗入制幕先君工部時為參議官同僚頗久樂此邦風土别駕車以來既至首欲編前任名氏登之石以序列見屬病故相仍三請不倦遂為之書併以所親厯而知者告之君之大父資政在思陵元帥府為名臣家法流傳猶有世臣之風只此一舉足以見居官之不苟淳熙初魏王易鎮罷倅貳而置長史司馬之職故更六年而後葉君以太社令員外置云錢清鹽場廳壁記錢清鎮去紹興府四十五里而近有江曰浦陽蓋自婺之浦江發源浦江舊名浦陽也唐志載越州有府一曰浦陽乃府兵之府城基猶在有橋曰隠兵而錢清之名則不知所始相傳以為錢武肅王誅董昌於浮梁因以得名然近嘗發土得靈助廟捨路記乃㑹昌中碑已言錢清則名已久矣昌傳言執昌至西江五代呉越世家又言西小江豈正謂此江耶或言後漢父老持百錢送太守劉寵寵各為取一大錢以此表其清云熙寧間部使者盧秉論鹽課云越之錢清場江水清淡以六分為額不言三江曹娥兩場老吏云崇寧改鹽法始以錢清分為三場場基堆阜四環乃舊教閱之所今猶目為教場亭民本九十餘户户每月出鹽一席豪民既侵奪其地邑胥又多方漁獵之復有私貶通注之擾僅餘三十八户而額不減使之均出是以重困四五十年來未嘗及額而逋負愈積矣從弟鏞孤苦力學久處上庠幸取世科頃尉東陽頗著能聲轉而為此不敢不謹撫存亭民既為之剔蠧疏源又間為之代稅輸三十八户欣然如更生而課亦隨羨遂加増九分有竒廨宇建於崇寧二年適百年矣雖頽敝之甚高宗幸四明畧嘗駐蹕其中鏞為一新之倉使得十萬錢而為屋三十餘楹宏敞雅潔什器俱備使亭民之解事者司錢物之出入官吏皆不預居民仰嘆以為前未有也又嘗為府中修山隂兩鄉海上石隄八百丈土塘千三百餘丈添創兩埭造南岸大石橋以便徃來亦可謂勤矣去替止三月以書來求壁記將書前任名氏嵗月之詳因為取其大槩併記之庶後來者有攷云池州教官廳壁記秋浦為江左名郡齊山九華之勝人物秀發又有李太白杜牧之遺風庠校之興有自來矣吾甥永嘉盧申之祖􅆏力學繼世科為郡博士其行也求贈以言申之俊而好文進學不待勸勉特以其少立而自立將為人師慮鮮琢磨之益大書無有師保如臨父母以遺之之官未幾則聞教育有序衿佩向風以書來求壁記告之曰余嘗客授子之鄉矣學無止法學然後知不足教然後知困古人之言其㫖深矣非真知學者自以為足非篤於教人者亦不能知困惟斆學半傳說之說本以勉其君而學記以為教學相長此又一說也今之教者不待問而講說又所從事惟舉子業雖皆非古之道然勵志於學當自知其不足用力於教當知其困不足與困子當自知之非余所能告也試書諸壁以銘坐右且將以告後來者攻媿集卷五十八欽定四庫全書攻媿集巻五十九宋樓鑰撰記慈溪縣興修水利記慈溪本以東漢孝子董君得名溪今在大江之南江之發源自越至上亭而分一貫邑中一環邑前已復合焉縣之西北有水出羣山間迤而東來未至縣五里所抵彭山而入於江瀕江舊有閘啟閉以時遇霖潦則泄之瀦其餘以備旱暵西鄉實受其利又通下流以入縣水勢朝拱映帶左右合於隂陽家言亦猶它山之於郡城也昔人創邑之初為長溝於井市横三縱四其間二者如帶之垂為梁於上而通舟於下堪其南而立斗門於東呼吸江水脈絡通貫按其圖大槩如古澮洫之制嵗久閘廢水無所蓄旱則仰潮汐乍盈易涸民勞滋甚縣河淺淤菰蒲叢生居民因侵其旁藝木築室日就湮㣲雨集則湓溢沉墊已則汚穢停滀氣壅不宣多起癘疫豈惟不足以供濯溉之湏年來縣一再火延燔數百家環拱而莫之救病又甚焉邑無丞水利之職簿實司之蓋有欲為而不能遂者㑹今郡侯岳公方提舉常平事按行郡邑首詢利病縣人合辭有請迺下其事使亟圖之主簿趙君推跡本原慨然欲復其舊告諭父老訓率子弟莫不勸趨凡田於西者畆出錢三百首建閘於彭山先為長隄以捍江潮撤故閘餘址悉以石為之長十有一尋廣四尋中闕丈有二尺扃以層版經始於淳熙十三年之春秋七月訖事費錢百六十萬為工五千里築四埭以障支流西鄉之利既興遂修斗門復捐金錢為之倡二者皆堅緻精蜜比舊基有加焉十月初吉又為濬河之役趙君譬曉明白上下交孚於是家自為役不待程督愁霖之餘開霽踰月若有相之者盡撤壅蔽始見故道攘剔浚治工不告勞河廣一丈五尺深七尺中間廣二丈六尺深如之引西流而灌之緑波汪灣舟楫通濟又可以溉邑下之田易去横彴増重河梁百年舊觀一旦復還如人之身氣血滯鬱疢疹隨生醫巧藥良導之流通則舉體和暢精神自倍耋穉雜然相賀且曰自今以徃吾邑其庶幾乎趙君佳公子也種學績文以儒科自奮天資闓敏吏事極不苟二役之興皆成於同僚協謀不掣其肘更選里士之才而公者以司㑹計不使吏預其間故財不蠧民不擾一箠不施而利興害除可傳永久咸請記之余觀古循吏剖訟解紛功止一時惟水利之興則可以惠民於無窮熙豐間非不務此然而擾民之害先見則奉行者之過也善乎蘇潁濱之論曰事起無漸人不素講未知水利之所在而先遣使者興事至此蓋已甚勞皆切中當時之病恭惟皇上求民之瘼如恐弗及一以此事委之州縣而命部使者督課之是惟無作作則實利及民賞不失勞所在底績由今之法良有司奉行惟謹而佐邑之賢又有如趙君之整辦遲以年嵗所濟多矣後來者尚有以増緝之哉趙君名汝積字商卿漢恭憲王之裔熙陵八世孫也荆門軍義勇甲仗庫記文武無二道有其事則必有其備古之義也荆門王使君銖之為郡也思不忝於先烈竭力從事有聞於時始至問民疾苦皆以財殫民貧姦豪得志逋逃為孽人不奠居為言君曰是當有以次第為之汲䝉泉以釀酒而利入日倍墾荆榛以為田而曠野以闢括隠户以増官賦務農功以勸本業崇飾學校旌賞孝悌嚴釋奠之禮勸奬士子以興文風以續先參政之墜緒鋤治豪强修飭火政明賞信令以制逋卒盜賊之尤無良者逺斥堠教義勇又能鑿頑石甓通塗増置郵傳以便徃來謹邊鎖絶支徑申嚴法禁以謹泉貨才智有餘而精力足以行之諸司咸以最聞可以少休矣一卒以狂酲殺三人捕得立誅之以聞上尤嘉歎以為無罪可待威名流聞姦究屏跡載念郡當荆楚之郊倚義勇以為重在尺籍者四千人頋視所用器甲之屬名數雖具在而積久不用位置無法率委於郡治廊廡滯壓朽腐兵氣不揚君既親行都試以作其勇且曰兵不犀利與空手同甲不堅宻與袒祼同是非置之高爽之地民居多茅茨萬一延燔則又將埃滅而無餘矣乃度基於郡之西北虛曠幾百餘丈繚以周牆阻以深溝計工與材以聞於朝有㫖下總司幹金穀以濟其湏淳熙十五年八月庀役不閱月告成為屋若干楹廳事居中置樓於門兩廡翼如也使君為政抑可謂知所先後文事武備無有不及者足以為保障矣荆門多古跡義勇之士服習教法持利兵以賈勇望高陽之長阪其亦有慕張益徳之横矛拒敵者乎幕府翰墨之士登斯樓也挾清漳之通浦倚曲阻之長洲其亦有為仲宣之賦者乎使君其進之泰州重築捍海堰記東南隄防莫盛於淮東捍海之堰堰在泰州海陵縣北一百五十里起唐大厯中黜陟使李承自楚之鹽城南入揚州綿亘通泰之境不惟蔽遮民田亭竈附衣尤利鹽事至天聖初范文正公又宏大之徙堰少西以避海濤之衝發運使張綸轉運使令狐儀實主張是亘一百四十三里有竒甓其外以為固置兵五百人分列五寨專典繕修崇觀之後始充他役乃無一人守者宣和隄決壊田三百餘頃紹興七年又壊隄幾半越二年始修成已不如天聖之堅密厥後提舉朱冠卿知州事徐子寅張子正魏欽緒皆因壊増修子寅又請鹽場官分視捍堰各守其境淳熙十三年提舉趙鞏相河所衝曰六澤浦甓而新之壯於舊三倍且柵其外十三里更創夾隄六里於桑子河其餘増卑培薄悉還舊觀慶元二年二邑之民又以病告謂晏溪河東有土月堰下臨海洋了無塗泥為之固䕶地形就下紹興以來四經移築民田之墊於海者十五里衝損海陵堰身六里餘如皋亦壊十餘處近益損甚提舉王公寧覽之惻然亟命知海陵縣陳之綱相視利害請移入二里重増九尺基厚二丈九尺面減五尺又遣捍堰巡檢劉正志量度㑹計創立基址計三十四里一百九十四步用工二十八萬公按圖察之謂西接范公大堰若不及今移築則堰内之田當為斥鹵且將浸淫旁及横流四出為害益大亟以奏聞且言水政臣職也敢憚改作所費雖重撙節財用銖積寸累願就兹役不敢以煩朝廷仍及仲春農事未興之時亟圖之正月甲子剡上凡再旬而得請遂以某月某日庀役至某月某日崇成既訖事再招海清兵士百人分置五寨興窰燒磚以為後日繕修之備仍檄之綱偕幹辦公事趙不熄董其役公亦躬為一行凡用若干工費錢米若干民大感恱而王公不自以為功也告成於朝遷一秩以寵之太守沈公坦走書於鑰曰捍海大堰雖跨數州而泰之利害猶重今日所修則全在下二邑賴賢使者一力為之民既不知役凡我同僚亦皆䝉成而無預請記之鑰因為之攷圖經舊記而得其實則作而言之曰美哉斯役也范文正興千載之大利苟非後之賢者相與扶持之亦安保其不壊自兹朝廷之上皆如今天子之垂意為部使者為郡將皆如王公之用心雖至於無窮可也鑰與王公嘗同朝稔知其文章政事之絶人試郡永嘉實繼沈公詹事之後泰州其子也治辦有餘尤為王公所知樂其有成欲以傳於永久鑰長子淳方以一尉出二公之門故不復辭而屬筆焉餘姚縣海隄記餘姚為紹興壯縣岸大海者八鄉分東西二部綿地一百四十餘里舊有長隄蔽遮民田孝義龍泉雲柯三鄉沙漲土高無風潮衝決之患開元東山蘭風梅川上林五鄉間有闕壊實為民憂其東自雲柯而北至於上林為二萬八千尺慶厯七年縣令謝景初為之王文公記之今自上林以及蘭風四萬二千餘尺慶元二年冬知縣施君宿所築其中有石隄四所計五千七百尺者又其所創建也邑人求記於余謝之曰令尹之功力固倍於前人然前有文公之記何敢為第二碑請不已則又曰文公之文不可及姑以記今日之實則可爾余外祖汪公少師宣和中嘗為是邑修燭溪之湖建承宣之亭其後伯父從兄皆嘗為之婦家王氏自尚書而下四世寓邑中熟知海隄之為害而近嵗猶甚大率嵗起夫六千夫役二十日計工一十二萬費緡錢萬有五千夫力或不均弊孔百出故勞費如許民力不堪曽不足以支一嵗而又徃徃蕩去矣施君始至問民疾苦咸以此為大病親徃視之詢究利害乃得要領選鄉豪之首公强幹為人所信服者十五人分地而共圖之尉曹趙君伯感協力佽助必欲集衆力以捍怒濤謀久計以蘇民瘼承平時提刑羅公適知縣秘書丞牛君嘗以石為之今既百年舊迹逺在海塗中則民田之侵多矣先因修築搜取塗中舊石創築二千七百尺用工二十萬三百六十以蔽東部之田惟西部三塘以紹熙五年秋潮為菑故隄蕩盡為害甚酷乃於謝家塘王家塘和尚塘三處度為石隄通計三千尺尤當海水突怒之衝鄉民趙明釋子行球董其役約費甚重邑不足以供列於府於監司提舉常平劉公誠之深主其說首助穀三百斛益勉為之凡所陳請率應如響通守王君介幹辦公事王君柄左右尤力令得恃以展布隄高一大石厚一尺為一層用石至三萬尺縣出緡錢四千三百有竒邑之士夫與其鄉人助三百萬工力尤重費猶未足也兹事既成則並海之田始盡可以無虞矣前者惟知修築弗思守䕶之䇿隨補隨壊迄無寧嵗況隄壊有漸特人事有所未盡爾冬而起夫春始興役因仍粗畢姑以辦聞日隳月損無肯出力蟻穴尤能潰隄況秋至潮起其壊必甚亟科近隄民夫為之救捺農事方殷青黄未接安有財力以為久計今則四邑官分季臨視廟山三山兩寨官月遣十兵巡其上鄉豪又伺察之隄苟有闕即以聞於邑隨即補治其視蕩然而後為之者豈不相萬萬哉令猶以為未也謂不有以為千百載之圖終恐不足以繼而前功寖隳矣於是又議建一莊約為田二千畆始得上林海沙田二百三十餘畆又得東山汝仇湖外之地六百八十三畝龍泉有桐木廢湖素不蓄水得七百四十五畝三者凡為田一千六百六十八畝皆出官司之相視不妨公不害民收地之遺力俱有水源以為灌溉募民耕墾假以資糧菑畬新地皆成阡陌得禾稼實利以助費又將益求曠土且以其收而嵗增之以足二千畝之數築倉於縣酒務之西專儲粟以備修隄之用嵗省重費民遂息肩浮土為千金之隄斥鹵化膏腴之地傳之將來利頋不博哉劉公又備邑人所請奏之九重白之廟堂及當路諸公乞以此莊之田依常平法不許他用仍禁官民户之請庶可經久聖天子加惠田里諸公相與維持其說亟下俞音曽不淹時令率吏民祗拜明命刻之堅珉以詔後人今之宰劇邑者簿書期㑹日不暇給水利等事遇有急闕趣了目前其至誠愛民有不可解於心而才智足以行之如施君者幾何人施君湖之長興人實司鍊之子司鍊用不盡其才齎志而殁君能世其家下車以來百廢具興飾以儒雅整辦有餘銖積寸累以圖此舉中間易地之行咸恐敗於垂成及其來歸為之愈力百年之害一日盡除去嵗他邑告歉而此獨豐海田幾於倍入明效大驗今已如此宜乎邑人歌舞之天下之事害不極則利不興若有數然民困已甚令以深長之思而興民庸部使者之賢建白甚明聖朝勤恤民隠遂躋登兹非止人力也後之人守其成規隨力補治雖至於無窮可也因作為詩章命邑人歌俾之勿壤歌曰舜江之為邑兮居越之東八鄉瀕海兮水浴日而吞空古有長堤兮庸蔽遮乎一同人力有限兮海濤之來無窮濤來如山兮日相撞舂一有闕壊兮葦不可障而泥不可封民將為魚兮良田墊於馮夷之宫嵗月勞費矣民告於鞠凶萬五千之緡錢兮十二萬之民工惟令之賢而才兮有尉曹之和衷築土纍石兮折彼波臣之衝矗如長城兮繚如萬丈之晴虹部使者主盟於上兮飛章徹於九重仰明聖之恫矜兮朝奏而暮惟人欲之從墾田倍於千畝矣藏其收於廩中禁豪民之侵漁兮雖巧取而弗容化斥鹵兮土膏隆隆變歉嵗兮為年之豐良耜畟畟兮多稼芃芃穫之積之兮將櫛比而墉崇歌以訊之兮樂石是礱赤之相告兮永無忘令君之功惟後人之勉勉兮用心以公視此隄之闗兮謹為之彌縫念經始之囏難兮尚圖功於厥終象山縣渡船記象山為邑海帀三垂漢志鄞有越天門山輿地廣記謂即今之東門山也唐神龍二年屬台州廣徳二年始屬於明元和郡縣圖志亦言本漢鄞縣地神龍元年監察御史崔皎奏於寧海縣東界海曲中象山東麓彭姥村置縣惟西南有陸路接台州寧海二說㣲有不同而郡縣志加詳焉志實李吉甫在相位所上吉甫嘗為明州長史宜得其真今西北至慶元府水陸一百六十里中有一渡之險若由寧海陸行則回逺倍之故多已渡為便渡實支海南曰陳山去邑十五里北曰東宿皆潮退而行中途少憩海口俟潮登而後善逹舊以小舟徃來多有風濤盜刼之虞隆興二年今資政殿大學士趙公彦逾主邑簿始創二大舟颿檣篙櫓器用畢備募習於操舟者月給之分置二渡以便行者晏然如在枕席之上所濟不知其幾邑人至今歌之鑰嘗侍公坐問何以能辦公曰句稽之職安得有力及此偶郡委以征商事舊例商賈以錢輸官以十之二為導行費既首蠲其半以惠之餘分給胥輩因置缿筩而諭之曰前日公用有例今一切不取爾曹得百金則以一錢寘其中僅二年餘所積已多矣因首以修朝宗碶又助邑之敕書樓與邑庠遂以為此二舟皆躬自督課費省而工倍人樂為用故能辦耳鑰為之三歎試吏之初孰能用心及此今日勲在社稷豈苟然哉公去既久寖以隳廢而一舟先壊間有修治徃徃因陋就簡不可支久撤舊増新併為一舟行旅不堪濡滯而私渡出焉未免復有覆溺者慶元四年六月承直郎韓君元禮為宰訪問疾苦耆老首以是告謀欲遵趙公之法而興起之鳩工度材即以八月先造一舟其長七丈廣二尋十一月既成又以次年之冬葺治舊舟去朽易堅色色鼎新幾於改作至今年二月畢工修廣之度視前少殺之若什器細大篙師名額悉循古規又月委官僚以次提督用防姦弊功就而民不知邑士請紀其事鑰以謂趙公濟川之功未易遽及今令尹忠憲裔孫雍容辦治維此一舉仰有以繼趙公之成績俯有以為一方永久之利趙公名遂身退卜築城中親見其成喜形於色尤為一段竒事夫子産以與濟人於溱洧孟子以為惠而不知為政今前後邑官之賢蓋能知為政者惠及斯民如此後來者苟能垂意而不忽二舟之利其有既乎陳山有驛以為賓客行人弛擔之地將刻石驛中以詔後人慨然為直書之以補吾里地志之闕云攻媿集卷五十九欽定四庫全書攻媿集卷六十宋樓鑰撰記范氏復義宅記呉門范氏自唐柱國麗水府君居於靈芝坊今在雍熙佛寺之後五世孫文正公少長北地皇祐中守杭始至故鄉訪求宗族買田千畝作義莊以贍之宅有二松名堂以嵗寒閣曰松風因廣其居以為義宅聚族其中義莊之收亦在焉中更兵燬族黨星散故基榛撫編民豪據為居室為場圃僦直無幾甚失遺意粟無所儲寓於天平山墳寺倍有徃來給散之勞久復圮廢改寘城中反寄他舍病此久矣自公長子監簿而下又五世而至良器一日謂二弟曰先君奉議念此有年齎志而殁吾儕當有以振起之慨然自任思圖其新於是厯告居民盡除僦直約期而遣之不服者訴于郡于監司以至上達臺省提刑臨川何公異太守四明鄭公若容咸義此舉力主張是復得故地周一千四百四十八丈首捐私帑繚以垣牆創建一堂仍扁嵗寒以祠文正結屋十楹以處貧族就立新倉寖復舊觀庀役於慶元二年之季夏仲秋告成不愆於素觀者無不歎息親掌出納一年以為後式選族子之亷謹者二人繼之詳具要束以補舊規揭於堂上且刻田籍於石以為永久之計介季之柔續世科於百二十有四載之後尤勇於義既力贊其兄謀之屬鑰為記始末鑰不佞先祖少師收䘏宗族有意於此而嵗不與伯父揚州始為之雖不及文正公之盛而寒宗之貧者賴以自給亦四十餘年於兹先工部欲附益之而清貧終身猶未果也見范氏家法為之媿歎是舉也衍文正公累世之遺澤伸先奉議九原之餘恨又以綿范氏無窮之休豈不偉哉嗚呼文正公奮身孤藐未嘗賴宗人毫髪之力既達則闔族受解衣推食之恩天祐范氏三子鼎貴皆以宏才高誼上繼父風後人得維持憑藉以保其家良器以布衣而決意興起不惟義宅載新義莊亦復整飭剔蠧省費又為數世之利用心如此後其興乎嗚呼文正初立規矩止具給予之目僅設豫先支請之禁不數年忠宣公已慮其廢壊故治平奏請聖㫖違犯義莊規矩之人許令官司受理又與右丞侍郎自熙寧以至政和隨事立規闗防益宻今之規約又加宻矣一門同姓為此義事其難如此而況天下之大思所以為億萬世之計者又可忽乎嗚呼衣冠之族不免飢寒者甚衆願如范氏之宗派而不可得今坐享飽煖者幾人若人人如良器用心更相扶持以永其傳則善矣若曰是我所當得者而不思自力甚者反為蠧於其間則文正諸公實臨之其聞於有司曰公元者蓋今之族長云汪氏報本菴記惟四明汪氏代有隠徳上世葬城南之俞村鑰汪出也嘗隨拜掃裴回松下頋瞻前後中有一丘隆然竒峯遙峙秀水縈抱磬折面勢岡阜非若近時積土平田强為丘壟出於人力者比氣象秀潤真吉竁也是為外高祖大府君之墓府君以才選為吏古君子也終身掌法一郡稱平范文正公王荆公皆以士人待之我高祖正議先生為之志銘蓋積徳之尤著者是先生奉四先生而汪氏之衣冠始於此鑰生長外家逮事外祖少師二十餘年親見孝友之懿奉墳墓尤謹遇忌日必躬至墓下為薦羞之禮遂為汪氏家法仲舅尚書恪遵先志不敢少怠而増色焉俞村之墓始於十二府君其子若孫葬於左右也凡十餘所迨今百七十餘載矣冢舍三易嵗久易圮仲舅投閒既久度不可支吾乃營基於松楸之東輟費於伏臘之餘鳩工兩月而告成為堂三間後出一間併為修祀之地前為軒如堂之數可以聚族列拜兩廡凡六楹前又為門及享亭以淳熙十二年三月二日奉神座於堂之東室宗人雖墳墓在逺遇清明必合而祭者凡數十人列於其次規畫悉一一親授以板為障而平其前祀則取以陳祭器臨事可不移而辦下至庖湢罔不備具靡錢五十萬一力為之贍塋舊有田初出於諸院其子孫間有生計凋落視為已業而私售者久不能制於是積累細㣲益以俸入以元直取之用供僧徒嵗仍例巻命族人迭掌祀事其器用則分任其責且為出穀以助他日尚將益之菴成未有名夢中若有告以報本者公為之恍然遂以名之正奉始卜葬西山少師兄弟皆從仲舅大為基阡甲於鄉里又以外祖母福國之先壠在奉川桃花隩王氏既不振亦為買田建屋以奉香火凡其先冢域至是無所不備可以傳逺矣鑰既得歸日侍函丈一日顧鑰道始末使記其詳以詔子孫惟我舅氏克振家聲光紹前人以燕後葉菴之落成時年六十有八矣誠孝不衰而又精力絶人克勤小物壯者有所不逮皆可謂人子法遂謹書之後人能不墜少師尚書之意汪氏之興殆未艾也長汀菴記樓氏自周武王封夏后氏之後東樓公於杞實始得姓後有食采於婁者因以為氏或著樓焉東京雍丘縣即杞之舊故亦稱杞縣樓氏以杞國為郡而望出東陽雖聞吾族自婺而遷不知所始自鑰一行推而上之至八世祖而止惟曽叔祖一十五助教墓志云六世祖自婺遷於明是鑰之九世祖也又不書其諱明化院之西南一山坡陁數十百畮上世葬埋甚衆邑人號樓太婆墓亦不知太婆為幾世為何姓今墳墓可尋者七世祖大録葬白水雷家隩六世祖二評事葬太婆墓山之中劉夫人葬於西偏相去數十步徐夫人葬明化側平地蓋祖宅之後也高祖十八正議及陳氏和義郡朱氏厯陽郡二夫人曾祖三金紫永嘉郡夫人翁氏葬龍潭先祖三少師兩守鄉郡首尾五年每寒食上冡旌旗鼓吹皆集塋下鄉里以為榮少師教授兖州時祖妣秦國夫人馮氏蚤喪葬南山再娶魏國夫人馮氏先卒得地於報國山之左今為仁濟院作三穴以右穴葬魏國少師親寫馮令人藏扁榜猶存約他日自居中穴而遷秦國於左晚嵗有閩人上官仲恩獻金鍾山圖得於舒氏尤喜之知平江日病中語諸父曰我死當葬金鍾比薨二夫人葬已久金鍾墓域頗狹至今三墳相去或二十里而逺初營葬時四山皆願求售仲恩亦勸之五伯父曰人其謂我家乗勢并包非先志也仲恩歎服且曰第三虎山不可不買可以為菴其實菴後亦一穴也少師龍虎二山皆平正如畫至江而止龍山之前俯臨沙洲相傳下有金鍾曾見光景今神龍居之亦聖迹也俗謂江水一段為一汀近金鍾一汀最長彌勒每浴其中號長汀子故地名金鍾而菴名長汀少師薨於宣和五年至七年嵗在丙午而葬今且八十年矣先君銀青卜夀於於菴之後荷諸院相從嘗買鄰山以葬亡弟錧夀穴正在兩山之間坐艮向坤靣勢環擁下直金鍾之洲前有一峯錢令公葬其下號令公尖為山五重惟此峯中立深秀正與之對自他處視之俱不如也先君以淳熙九年十二月十七日卒於仲兄嚴州郡治以次年九月二十日大葬菴之右屋適在其前雖不礙前山而神道門起於谿次不能相望為曲徑以入是時以仲兄繼亡無力改造先妣年已七十有四亦不敢輕動因仍幾二紀嘉泰四年正月九日先妣下幸棄諸孤荒迷哀苦之餘卜以臘月八日丙申襄事謀之羣從銜哀負土決意先期移建冢舍以八十年左支右吾之屋撒而新之舊木之可用者十無二三又遷基於左半在田間築疊尤費工力幸及大事之前粗畢工役為屋三十餘間造石橋三所材良工緻庶幾可久於是始得神道坦平墓與門直列植檆檜移置石獸等平楫前山氣象愈偉少伸兄弟夙昔志願皆祖考隂祐之賜宗族相成之力也祖塋松行有干霄合抱之材然侵耕者多亦有枯瘁稍正疆界又補其闕别為屋數楹於外以為廥廩是役也雖出於一力而事實闗於諸院已戒僧徒日謹焚修以資㝠福若羣從及子弟掃松㳂幹而至者自當館穀於此如挈家寓處或封寄什器必至觸汙冢舍非奉先之本㫖自兹幸無啟此意亦宜相與戒飭僕使一竹一木毋庸侵犯斯有可傳之望前輩言子孫以仕宦不能自守墳墓而使人代之故守墓之人不可待以奴隸而況菴僧乎此菴始建僧希亮入主之三十五年傳其弟子本權權住三十年又傳妙悟才三易人俱善於其事後來者宜善待之李氏思終亭記淳熙八年嵗在辛丑鑰預攷南廟試蜀人李君子思以審計司聨事先已固已得其江東十鑑讀之一見如平生歡既而出所著易解相與講明警發為多竣事鑰叨丞外府君代主宗正簿鑰尋丞司宗方以同僚為幸而君忽焉亡矣哭之盡哀且與諸蜀士經紀其家君之父年已八十諸子皆幼弔者無不傷䀌送其西去哭以二詩殆不勝情今三十有二年矣間者闊焉不相聞知慶元之初鑰既投閒明年閲登科記見君之子道傳在乙科又一紀而復來則已聞其召命同朝五年寖登館學上著庭攝攷功時時相過以先友故厚我其季性傳又擢嘉定四年第來見獨未識長子心傳聞其嘗名薦書一不上第年未四十棄舉業而著書朝廷取其建炎以來繫年要録百卷寘館中嘗得其副而盡讀之然後知天之報施本無差忒而子思家學日成為不忘矣子思之論易專究心於卦畫其言甚富如中孚豚魚等說前未有發明及此者十鍳極陳南北朝戰守勝敗如指諸掌書有小傳又有諸經解義皆其節自之大者吐其所見論議過人一宰饒之徳興治行有循吏之績其所抱負十未見一二此識與不識所以恨其蚤殁也五年七月癸亥攷功涕泣而謂鑰曰先君子之葬兄弟尚弱萬里亦無由相告已得後谿劉先生為之銘矣墓前有亭取終身慕父母之義以致深長之思非敢自言能盡此也名以思終併致昆仲之意俾記之凡子思文學事業與其家世履厯後谿之志已詳不復書語之曰先公有子如此固已不悼其不幸於土中矣終之義豈云小哉近方為金華季氏為古文孝經詳說後序因論古自天子至於庶人孝無終始而患不及者未之有也為之言曰聖人一經立教之要專在此數語孩提之童無不知愛其親者是人之於孝未有無其始者夫子作此一經正欲人之有終也自天子以至庶人孝之大小固自不同於此復言若孝有始而無終未有不及於禍患者此則無貴賤之别上下一體俱當盡心焉末篇云孝子之事親終矣止為喪祭之終猶未能孝之終也夫所謂孝之終與孝無終始之終蓋謂立身行道死而後已者也故雖曾之既啟足手以其能全而歸之自以為知免矣然而易簀一節猶在其後蓋大夫之簀猶非其正也嗚呼聖賢可謂深切而能有終者亦豈易易乎鑰餘生無幾深知競懼得正而斃所願加勉故以告有志之士云鑰老退學落加以病餘輙拾前說以慰孝思之切惟昆仲勉之碑聚奎堂碑兵部尚書趙師􅋷謂臣鑰曰淳熙初年龍集乙未高宗在徳夀宫先臣和州防禦使贈少師伯驌久被眷顧師􅋷由鎖應賜進士出身徳夀喜甚謂其有子賜金更新所居増創一樓以榮桂書其榜蓋遮孝宗聖製聞喜宴詩桂林爭占一枝榮之句而寵之慶元改元師􅋷卜築呉門之晝錦坊闢堂曰聚奎奉先世前後所藏真蹟匪惟侈雲漢昭回之盛抑取竇儼所謂五星聚奎天下太平之義累聖崇儒右文高視千古蓋天人之符應也主上誤加將拔寖塵禁近嘗因奏對以宸翰為請上首肯再三嘉定三年冬起家長武部兼天府明年正月見於便殿昧死申言上又許之七月甲寅申使宣諭拜三大字之賜未幾又錫三扁曰宗表曰玉輝曰與閒鋟鏤髹飾皆出尚方恍然從天而下周章踧踖感激自誓思所報稱移刋樂石願有以記之臣辭不獲竊攷所元蓋非一日國家親睦九族恩禮兼備神明之胄繁衍盛大教養既至人才輩出獻詞章躬課試承平百年史不絶書崇國公世恬好學績文有聲前朝徽皇命翰林學士承㫖鄭居中為志銘知淮陽軍米芾書丹其子開府儀同三司嘉國公令晙及從蘇軾黄庭堅游刻而龕諸睦親北宅之壁間嘉國之子通判泰州子笈陪從康邸最膺頋遇又見芾所書而愛之紹興間既得木本訪求其後伯驌與兄浙西路兵馬鈐轄伯駒方贅員筦庫以近臣召薦待以家人禮念其孤露自立厚加撫勞勉以温習賜第都城俾日趨中禁圖書之府曰於此可觀人間未見之書少師老成詳練厯記舊事盡瘁職守襃賞相仍博洽醖藉歌詩聲畫取法晉唐游戲丹青深造其妙徳夀怡神物表宻侍清燕預翰墨之選直廬邃嚴且給珍膳名畫法書鼎彞款識攷訂商畧從容畢景肆筆成書楷法行草分賚稠疊王粲登樓及謝莊月賦則全而書之二王懐素帖則倣而臨之合作逼真以少師鍳裁精審猶不能辨又雜取唐宋名賢佳句形諸幅箋便而者踰十數持憲近畿孝宗出内帑緡錢萬嚴飾天慶觀親札丁寧示弗勤民之意神毫睿藻數以賜焉乃今奎畫申攽於以承二祖之休於以奬聲績之楙三朝寳墨萃於私室光華絢爛衣被草木有厯劫贊揚所不能盡者而臣何足以知此雖然蓋可稽焉堂以玉輝名則取陸機文賦石韞玉而山輝之語樓以與閒名則取蘇軾賴有高樓能聚逺一時分付與閒人之詩而宗表之襃實用唐宰相李勉故事聖意攸屬昭然著見復揭榮桂舊題於便坐植巖桂以環之始乾道間遴選聘使擢少師為副别授國書議事敵知其為宗老相與歎服以為備待時之說歸報蓋久而後益信師􅋷稔承家訓大沮開禧用兵之議以是不合而去聖化更新復登邇聨委寄益隆俯俞忱請則所以䝉被簡記者有自來矣惟昔君臣際㑹一字之襃踰於華衮今少師父子才美世濟為趙氏祭酒帝筆之儲盈溢巾衍有傳家之寳無登牀之嫌六丁豐隆呵禁䕶持昭示將來以永無斁為子若孫頋瞻豐碑齋莊斂袵仰聖作之淵懿知忠厚之積累盡萬物而不足報可不勉諸臣衰顇無庸方期謝事跂望斯堂無由一拜於其下敢述始末而為之詩曰煌煌聖朝親睦九族有制有恩克保世禄信厚振振麟趾之時才學自奮見於設施於穆少師相逄盛際受知高皇蚤被簡記源流有來元祐名臣賜對入侍禮如家人博洽醖藉翰墨之選帝筆昭回溢於巾衍賜第崇成有子䇿名迺書榮桂表於家庭阜陵掄才輶軒載牽出奉六條申畀一札子克負荷致身文昌四尹神皋如漢趙張卜築姑蘇有嚴尊閣户冊狹攽増賁丘壑奎壁之光聚於吾門頋瞻斯堂庸侈上恩是父是子並膺殊眷非止為榮於以示勸生子生孫其報伊何忠孝一心永矢弗磨王節愍公忠肅廟碑嘉定四年某月某日詔為故樞宻節愍王公立廟賜額忠肅某年某月某日廟成惟公建炎紹興間五使不測之地卒執節以死忠烈顯著人户知之大臣欲專和戎之功不以實聞故䘏典多闕至孝宗皇帝聞之始特官其三孫曰杞曰柟曰機開禧權臣横挑氈裘三邊俱震始復求專對之才以通好柟捐軀徇國為人所難母夫人又以節愍之事勉之張旜三徃終定信誓祖孫相望勲在社稷可謂無負三槐之家風矣紹熙元年諡公節愍柟既奏功擢帥合肥尋尹天邑請於朝求為乃祖立廟於是天子嘉歎且曰爾祖葬呉郡其廟於城中柟拜稽首退而營求㑹提㸃刑獄陳芾攝府事為度基於郡之北真慶坊地周百三十丈有竒闢門三楹旁翼二挾以入兩廡中為寢堂敞以高軒肖公之像以安康郡夫人陳氏配命服如禮鼎爼具列深邃崇嚴既足以揭䖍妥靈又啟旁舍以處道流買田續食使永香火之奉可謂備矣少卿以新廟成不可無紀命鑰碑之鑰嘗銘公之隧若平生大節與夫勤勞機辯之詳既屢書之兹不復列獨著立廟之本末以詔後世竊觀昌黎韓公為廟碑者三曰烏氏曰田氏曰袁氏烏以重𦙍田以𢎞正袁以滋皆以子至將相寵及上世非自以功業而得廟食也以死節而得祀者莫盛於張巡許逺之廟而兩家子弟才智下後無聞焉惟節愍公上承三槐之盛以忠義自奮風烈昭灼膺此廟食之寵尸而祝之子以死孝而歸其骸孫又以探虎穴而就功名既不忝其先而又増大之王氏之廟其最優乎因為之歌詩以侑四時之享云公之生兮不辰投大艱兮期殉以身掉三寸兮驚嚴宸起布衣兮立登從臣痛二聖兮䝉塵出萬死兮氣益振得要領兮折殊鄰辯懸河兮機若神數徃返兮就和親功既高兮遭厄屯握漢節兮死朝紳地震裂兮天霾昏祀於河間兮秋復春紹祖烈兮世有人始雖屈兮終獲伸墓於山兮祠於城之闉依琳宇兮輪奐一新肖公之像兮凜然如存芳菲菲兮薦苾芬洋洋在上兮傷不見而不聞公其訴上帝兮叫九閽或為鬼以厲賊兮如張巡九原有知兮煥絲綸享廟食兮報君恩佑爾後人兮傳無垠攻媿集卷六十欽定四庫全書攻媿集卷六十一宋樓鑰撰啟謝發解啟決戰文場喜鏖大敵䇿勲計版幸綴羣英心既歉然顔之厚矣竊以真主嗣臨于萬國宸心經略于中原正紫髯將軍撫劒之秋豈白面書生鼔篋之日然用武必有文備當修徳以來遠人況一士可以止百萬之師寸舌可以賢五千之騎搴旗斬將者特匹夫之勇敦詩説禮者乃元帥之資丁字徒知固難處强弓之右毛錐可用當争雄大劒之間得竒才自足有為用真儒必將無敵爰命郡國選修潔之士且使鄉遂獻賢能之書廣數路以取人才詔直言以増士氣將取布韋之賤以為將相之儲草萊期王佐之才畎畆任天下之重坐使有志之男子羞為無用之陳言附鳯翼而攀龍鱗咸起功名之願擢犀角而拔象齒始膺藻鑑之求如鑰者賦性棗昏受材樗散幸家聲之未遠冀世業之永傳誓収黄卷之功益振青箱之學十載空随于舉子一言未售于有司良弓之子必為箕有自來矣吹竽之門而攻瑟如不好何欣逄不諱之朝深惜難逄之㑹一鼔作氣已為勝敵之謀三年不鳴期遂驚人之舉及奏功于里選僅側迹于行間雖叨鶚薦之書猶愧鵬飛之化沙礫已甘于在後駑駘敢望于争先静惟賤士之拔茅實賴大人之推轂兹盖伏遇某官才髙今古名壓搢紳久居喉舌之司卧治股肱之郡愛民如子惟忠厚以存心遇事生風信精神之滿腹天子思大夫之國器布衣求吏部之門生遂使庸愚亦未掄擇鑰敢不益嚴筆陣力淬詞鋒敵無畏于萬人霸當成于一戰鵰在秋天之外已借髙風魚掀春浪之中更資餘澤謝省闈主文啟薄技巾程豈謂單辭之誤上恩從厚猶霑末第之榮靖言僥倖之由實自生成之力徳無所報感不知言竊惟選之公本條為盛科條之備今日尤嚴凡羣試于有司當守遵于成法未問詞章之工拙先觀品式之從違苟有一毫之差必為終篇之累惟時公諱尤異常規雖在祖宗不致山川器幣之廢然為臣子當明滸勢秉機之嫌著之甲令以謹臨文之疑掲之棘闈以備入門之問倘律度之不中宜衡鑒之弗容自非詞華驚絶代之工議論如古人之正又安得特加􅋞拭曲賜甄収既寛司敗之誅乃玷主文之選如鑰者伶俜無取坎壈數竒猥承簪紱之餘期紹箕裘之業念踵登桂籍者已三四世而不書鴈塔者幾數十年幸兄弟之聫飛喜門庭之稍振願修世學益大家聲濫由鄉老之書來赴春官之試孺子不謹嘗約日而後期窮鬼為妖復轉喉而觸諱問山犯名之二者猶有不學之愧書馬與尾而四者尚懷譴死之憂矧明見于條章乃自為于鹵莽深慮布韋之賤不勝鈇鉞之誅敢謂巨公曲成孤迹略去片言之失力収一日之長委墮甑于道中已甘絶望取焦桐于爨下實賴知音既援例于先朝遂飛章于清禁異恩俯及同輩皆驚雖不能豪奪于錦標然固已寵踰于華衮三神山上人憐不及于鼇頭千佛經中自愧得陪于驥尾退量叨冐良有夤縁茲盖伏遇某官正始名流開元故老公車讜議與秋霜烈日以争嚴召驛重來快鳯凰景星之先覩假道蓬山之上主盟蘭省之中凡屬品題莫逃藻鑑雖小善之占必以録盡収天下之英雄而斯言之玷不可為尤費筆端之造化遭逄若此稱報謂何鑰敢不痛自激昂益加詳謹對千人而不犯願尚友于先儒號一莊而復荒肯下同于流俗誓損頂踵以報丘山謝試中教官除温州教授啟就試棘闈復售綴文之技庀司槐市誤叨分教之官慙無黄絹之好辭偶中青錢之妙選卓踰望表愧溢情涯竊以庠序之興人倫是賴郡國皆立王化尤先僖公能修泮宫致一時稱其多士子産不毁鄉校盖千載以為美談在西漢李唐之盛時有乂翁常衮之循吏變蜀郡如東魯至司馬氏而昌其文化七閩如上州有歐陽生而為之倡是知自京師而首善亦必崇鄉賞以勵賢惟我皇家厯参古制開學宫于四海延師席于諸儒慮擇士之或遺復設科而俾試攷之經以察其識命之賦以觀其材人寡鑒精禮優選遴欲中有司之意必兼舉子之長如鑰者術業空疎詞章骩骳受過庭之教敢言匡鼎之解頤衡原集避宋朝廟諱凡匡鼎匡匡廬之匡皆作康今改正習雕蟲之工難及温生之乂手比幸登名于蘭省夫何困迹于銓曹念舊學之未蕪幾此途而妄進操觚染翰是皆已試之才斂板趨風咸望非常之遇顧如孱質乃預英游方期六鷁之退飛敢謂雙鵰之連中獲離場屋之餘習復逃州縣之徒勞載維永嘉實名東浙鼇頭屢占在紛紛白袍之間黌舎宏開無青青子衿之廢苟非儒匠難主文盟好為人師素守孟軻之戒此非子坐恐招有若之機念得寵之過優復去家之不遠無非僥倖端有夤縁茲盖伏遇某官旋斡化權主張吾道内治外治既陶萬國之泰和小成大成仰贊一人之化育善類悉歸于真宰危蹤尤累于洪鈞久憐書馬之愆欲収置于門下茲試不龜之藥偶獲預于選中亟畀除書實由大造鑰敢不益堅素履無負初心學不如務師曾何知于善誘教然後知困顧敢忘于自强庶上副于眷知以少圖于報効囘交代李教授冰啟以下十五首温州教授任内陪鴈塔之題名如昨夢叨鱣堂之選猥繼後塵荷委貺之洊臨愧馳緘之已後恭惟某官性天夷曠才地髙明筆陣摧風得雋膠庠之彦儒林振藻飛英俊造之科尚淹三館之遊俯作諸侯之客一方士子固已樂吾教中當路薦書皆欲出我門下倚聞嚴召徑挹超除鑰托契已深承顔不逺此非子坐正慙温故之稱必有我師全賴告新之益通添差教授王太博信啟賔興鄉國曾叨推轂之知客授侯邦尤得摳衣之便撫躬甚喜剡牘先之恭惟某官賦軋兩都名髙六館文章攀桂再登俊造之科閶闔排雲首上治安之䇿詔開言路章交公車英詞獨徹于細旃襃語寵踰于華衮先生入太學方將育天下之英才廣文獨冷官何乃為諸侯之賓客俯從新制大屈公言風引仙舟雖覺三山之暫遠雲垂鵬翼㑹㸔萬里之横飛鑰少欲傳家長而懵學閉門覔句初無虀臼之稱仰屋著書空有醬瓿之誚頃藉鶚章之薦遂叨鴈塔之題不知七年待次之遲但喜一旦同寅之幸豈止日沾于膏馥要當力踵于步趨既非中行待我以衆人方謹舊恩之報如使西河疑汝于夫子難逃良友之譏通太守曾吏部逮啟恭審疏寵宸庭承流侯服凡居庇幬㒺不欣愉竊惟左浙之奥區獨以永嘉為名郡人才秀發接王謝之風流城望雄尊控甌粤之衝要海物惟錯生齒日繁屬嵗事之多虞致天災之代有􅄓風駕浪萬衆為魚烈火焚廬一昔而燼八潦七旱田野無以為生九牧十羊吏民疲于奔命闔境告病淵衷顧憂正藉虞升卿為開錯節不有龔渤海誰治亂繩既入奏于明光諒疾驅于逵道恭惟某官乗珠照夜衡玉懸秋學自得于家傳美盖由于世濟矧惟我宋衣冠之盛無如曾氏閥閱之髙閩嶠勲名藹相門之清議南豐術業擅昭代之詞宗未若于門卓稱江左弟兄輝映競馳雲間日下之名門户熾蕃遂為澤底岡頭之族顧如偉望立卜要津早瞻使者之星來近長安之日握蘭密勿銓衡無同滯之嗟聽棘平反囹圄有屢空之效暫從均逸亟畀于蕃將使官府復見于太平閭里盡銷于愁嘆報齊國之政諒無五月之淹趣曹相之裝即聽三公之拜鑰學不知道才非瘉人偶霑末第之名濫作諸侯之客敢圖㑹遇獲事賢明歡寒士之顔願託千間之厦順下風而請敬持一瓣之香通太守莫給事濟啟恭審榮膺宸誥起鎮侯邦瑣闥需賢將復甘泉之舊左符共理暫為滄海之行先聲所加衆聽皆聳恭惟某官學該四部文擅兩科渾然金玉之相凜若松筠之操經綸自任直將舉明主于三代之隆雄挺不囘信能立懦夫于百世之下韜蔵既久聞望益髙獨由直道以致身自結九重之知已紬書東觀徑躋瀛洲學士之聫典奏南宫已有鳯閣舍人之様上方修明號令鼔舞華夷爰念制詞思復深淳之體肆求卿列首推横博之才俾代予言仍參内相大述作多出其手豈惟復見常楊近詔誥自為之文端欲上規姚姒還直螭坳之秘進趨雞㦸之嚴更藉剛方之資為專封駮之寄危言造膝嘗有志于囘天勁氣逆鱗曽不難于去國坐命時論之推重惜無諌列之拜章退安香火之祠自得林泉之樂惟永嘉之古郡實東淛之奥區乃命承流以遂均逸一麾出守肯為顔步兵之詩五馬自随姑尋王右軍之舊矧高門之名勝著此地之聲華南院世官猶有甘棠之遺愛阿連客授尚存絳帳之餘風自聞成命之肆頒惟恐使君之來暮山川改觀城郭増輝地控甌閩正有資于韜略道傳伊洛尤仰賴于範模第恐廊廟之資尤被冕旒之眷賜環在邇豈容早盖之行春視草居中復見金蓮之照夜遂大拜以佐中興鑰學不知方才非可用末科厠迹自憐書馬之愆再試得官人笑畫蛇之贅敢恨入年之家食第慚多士之主盟好為人師真成不韙此非子坐日懼弗堪仰千騎之鼎來幸二天之在望飛鴻遵渚咸歌姬旦之歸兮泮水采芹猶喜魯侯之戾止通邵通判範啟别駕功髙夙仰聲華之茂廣文官冷幸依庇䕃之餘念行遂於趨鳧顧敢稽于饋鯉恭惟某官風儀峻整政術髙明試以劇煩井井有條而不紊遇諸盤錯恢恢游刃以有餘矧是永嘉甲于東浙地望控甌閩之要人才承王謝之流正資賢治中以佐明太守撫摩凋瘵振起教條稔聞五月之政成盡出貳車之力贊少舒驥足不妨風月之平分入簉鵷行㑹見雲霄之獨步鑰才非適用學不知方雖記問以尚疏在淵源而何有謬司芹泮偶及𤓰時樂英才而教之固知非據事大夫之賢者尤得所依通趙通判侃禀啟題仲舉之輿凜先聲于海嶠開馬融之帳竊大庇于雲天仰徳既深遡風知幸恭惟某官派分銀漢秀挺瓊枝撑腸富萬卷之書落茟掃千人之陣儒科振藻仕路蜚英非錯節于笑談破大觚于俄頃歌合江之桃李邑人猶見于去思依上幕之芙蓉府主但聞于坐嘯眷茲名郡密邇行都屬頻年有饑饉之災況比屋被焚漂之酷公私窘匱民吏彷徨方欣郡政之一新更喜治中之鼎至湖樓風月豈惟景物之平分春草池塘㑹見精神之頓改來播海沂之詠佇歸禁闥之班鑰才不及中學非語上淵源無自敢謂好為人師教導未明政恐此非子坐不圖幸㑹獲在帡幪闔境傾心想望貳車之風采冷官修敬預通記室之姓名囘錢録參佖啟久矣向風恨無半面之雅茲焉聫事幸逄三語之英拜履非遥捫心知慰恭惟某官清姿冰潔奥學淵深玉斚瓊彛壓倒千人之筆牙籖緗帙讀殘萬卷之書淮山小試于梅仙海嶠更煩于阮掾獄市無擾長賦池塘春草之詩兄弟聫飛行繼鵰鶚秋天之武鑰家傳雖久客授何堪喜聞都騎之來遂竊靈河之潤朋緘委貺驚珠璧之暗投短牘陳誠愧瑶琚之匪報囘瑞安胡縣丞啟一行作吏敢興獨冷之嗟再轉為丞喜見真清之彦髙詞先辱謙徳有光伏惟某官澤底名家雲間妙譽仕途詳練兩淹黄綬之司薦口瀾翻果上金閨之籍謂宜闊步徑登要津通雨道晴又聽下邳之論事哦松掃竹不妨藍水之風流預想登仙由茲假道鑰宦遊無取客授何堪騎氣方來騎氣見史記天官書一本改氣為驥誤將快争先之覩緘書敬遣少陳未見之心囘陳司户僖啟芹宫客援慙博士之不治槐笏宦遊喜參軍之稱絶聞風久矣拜賜懽然某官理窟精深詞源淵奥早射廣庭之䇿合窺蔵室之書誰謂偏州乃淹賢掾俸錢寡狹固非京兆念珠曹吏事精明共㸔琰之霹靂手髙才如許迅召何疑鑰行遂同寅庶幾承教日候入疆之告忽驚將命之臨廣文冷官雖有聲名而何用孟公尺牘但知蔵弆以為榮囘前寧海沈主簿輿傑啟沈在秦師垣館下登第後駮放不復仕竊伏海隅久壓斗南之譽宦遊仙里屢聞月旦之評首勤車騎之臨門更有文書之銜袖勞謙過矣自視缺然某官涵泳聖涯翺翔藝苑振三都之鼔吹韻五典之笙簧漢閣招賢貴人欲出我門下堯階賜第天子謂入吾選中一官猶恨于棲鸞萬里忽嗟于退鷁雖當邪正初分之日乃有疑似難明之人顧得喪苟無愧心雖聖賢未免流議沮魯如臧氏之子能使予不遇哉于齊主侍人瘠環好事者為之也科第空傳于拾芥功名髙視于浮雲収還四海之虛聲自作一鄉之善士尋伊洛之故步窮洙泗之遺經仰屋著書期立言以俟君子閉門覓句推殘膏以丐後人坐厯十年事更幾變沈舟而閱千帆之過翦翮而㸔百鳥之翔公論自明識者増歎紛紛餘子蠅營雖見于復還落落髙懷馬喪安知其非福然而休期難再大器晚成毋忘結綬之心當起據鞌之志鑰晚生無似客授何堪久懷望履之私未遂升堂之快掩關卻掃素欽静退之風忘年定交猥及庸虛之子焉有瓊瑶之為報但驚珠璧之暗投誦廣文官冷之詩喜遇同襟之客讀東陽郊居之賦㑹求撫掌之歡囘永嘉徐主簿緦啟孺子名髙方屈臨于簿領廣文官冷乃先辱于緘縢摛詞粲然為禮過矣伏惟某官學耽八索識洞九流提筆以赴文場前無堅敵彯纓而遊帝所自致巍科精金百鍊而愈剛良玉三獻而後售宜在瀛洲之選往觀蔵室之書俯就鸞棲尚淹鵬運髙士不為主簿雖曰徒勞君子不卑小官何妨行志㑹聞妙擢徑上要津鑰晚出無聞散材焉用黄卷自樂豈敢好為人師絳帳方開正恐此非子坐獨幸佳郡素多賢僚匡衡鼎來可共説詩之樂鑿齒一詣便勝讀書之功囘瑞安林主簿啟宦游伊始方淹枳棘之棲客授無堪徒愧蒹葭之倚先聲竦甚華翰先之伏惟某官人物粹夷天資爽邁寳甘棠之笏自有家風讀牙籖之書盡傳世學小試勾稽之職倚㸔趣召之行鑰久矣聞名茲焉同事髙士為主簿固知公議之未平廣文獨冷官但喜疎蹤之有託囘平陽李縣尉煥啟登漢庭之第猥繼英游訪呉氏之仙更逄隠吏方謹先聲之伺遽勤華翰之頒恭惟某官學有本原辭無枝葉論議醇正所得盖自于名儒氣貌粹温不問已知其長者騰踔合登于要路酸寒乃就于尉曹不容警捕之淹㑹膺召對之寵鑰家傳雖久客授何堪逄君子之僚已伸素願篤年家之好尤激義風囘郡庠職事啟冷官無取豈敢好為人師佳士有聞不當列于弟子伏惟某官性天俊茂才地髙明玉斚瓊盃壓倒千人之筆牙籖錦帙讀殘萬卷之書三年已見于驚人一第何足以慁子倚觀奮發自致功名鑰久矣聞風欣于識面辱貽書之加寵歎陳義之甚髙喜荷之私敷宣岡既通交代徐教授嘉言啟讀鴈塔之題久欽間望典鱣堂之教獲與交承既慙揚粃之在前敢俟及𤓰而受代通名伊始修好在茲恭惟某官學造聖涯文髙藝苑評彼處士孺子宜當為先求之古人有功未見其比能似鼻祖今為耳孫既已飛英聲于千佛經中固宜追俊游于三神山上何為厯嵗始就冷官惟此邦餘王謝之風而多士知伊洛之學正有資于模範俾益究于淵源君子之育英才是誠所樂諸公之登臺省㑹見同升鑰夙昧家傳偶叨客授望親庭于咫尺較吏攷之毫釐日冀先聲得遂歸歟之志顧瞻清峙用寛仰止之心謝除刪定官啟投誠恩地倍煩大冶之陶鎔定法清朝俾預有司之筆削密附聲光之末親承約束之嚴榮喜交深凌兢冞甚竊以國家備百王之制章程垂萬世之規小紀大綱秩然有序竒請他比或以滋彰肆當核實之朝爰舉久虛之典宏開書局共議邦條上勤元老之尊坐總羣言之首假刪詩定書之目以名其官凡摩研編削之流可知其選豈容濫吹有玷知音如鑰者才不適時資非近道雕蟲何取謾成童子之虛聲書馬有愆幾作詞場之竒祟敢歎十年之不調但知三省以加功徳之不修學方圖于為已斯未能信仕豈專于為貧乃因客授之行益究家傳之㫖力攷淵源之所自務求斆學之半功抱素志以自憐庶此生之不苟竟縁色養來叩化鈞璞三獻而就知䑕五技而成拙屬正人之登用矜寒士之滯留謂當在藥籠中必欲出我門下誦佳句于百僚之上有味其言持長綆于千仞之艱不遺餘力卒令弱質亦入化爐雖知隔仙府之幾塵猶使及天朝之速化適承人乏獲厠英游自為之謀不過于此茲盖恭遇某官主盟公道厚禮人材諷贊九重不顯彌綸之用精白一意曾何適莫之容然無私乃能成私惟不徳是以有徳如弟兄之不振荷造化之特深之遴顯以文之亨著以功取言競爽公山用于前正禮擢于後實出殊私鑰敢不益勵廉隅進修職業舉數事以塞詔何敢自欺慕國士以報恩豈容弗勉囘詹狀元騤啟清禁傳呼喜聞第一之選長牋委貺更驚駢四之工恭惟某官學富三冬才優六館馳雋聲于藝苑承一門詩禮之傳奉大對于昕庭為四海英雄之冠賢關増氣里社重輝盍從臺閣以問津㑹見功名之發軔鑰頃由殿幕先揖辭華待尼父于季孟之間愧文衡之非據舉公孫為賢良之首仰天鑒之獨髙敢意謙撝反為巽謝通浙東安撫李參政彥頴啟以下九首通判台州任内便親求外仰䝉化筆之餘貳郡之官適在帥垣之下依仁有自禀令無譁敢修大府之恭庸効小夫之智恭惟某官爽邦哲匠名世真儒以平生不欺之心為古人有用之學澄之不清淆之不濁儼然公輔之資來非可招去非可麾卓爾朝之望至公待物直道持身辭色不以假人毁譽未嘗經意上以此信于人主下以此服于衆心久為朝夕論思之臣遂登夙夜宥密之任進參政柄實領宰司豈惟奉養之微曽不改于儒素若其酬應之確了無間于戚疏苟曰才能各随器使雖有浮競自應意消故國是不容動摇而朝列為之肅靖坐鎮雅俗遠追謝安石之賢共致太平咸望楊公權之相既明且哲善始以終出殿大邦寵分秘殿七州訟理民無恨于田里之間數月令行人自得于湖山之外雖少留于蓬島曽不遠于長安㑹聞衮繡之歸亟正鈞衡之拜鑰登門最晚辱眷惟深涉筆金科顧如知于八律兼官玉牒曾弗措于一辭叨陪典領之嚴備費生成之造㑹聞半刺許置外員幸下攷之再書援新制而三請匪蒙深照安得此行望故里以非遥奉安輿而在即獲承菽水之養盡出丘山之恩展驥無堪徒以負丞而増愧見負丞韓愈藍田縣丞㕔璧記一本改丞為乗不必從登龍未遂尚須假事以有行愛日方舒寒威將勁願為宗祊之重益精茵鼎之調通呉給事芾啟甘泉宿望久懷晞驥之誠别乗贅員喜有登龍之便敢修柔削以代先游恭惟某官命世偉人爽邦哲匠才雄萬夫而持之以正名滿四海而取之甚廉出入兩朝周旋三紀選部賴典銓之鑒瑣闈髙批敕之風劇寄屢分外庸尤著侯邦訟理民舉安于田里之間帥閫令行人自得于湖山之外掃蠧源而略盡清狡穴以一空不惟所去以見思抑使所居之官大乃守東山之志屢賡彭澤之辭均逸祠庭猶俾斯人之有望告歸神武直將與世以相忘容與千巖之中傲睨羣物之表凡烟霞勝絶之地皆杖屨經行之區下流水而上青山固知自適身赤城而名絳闕豈得長閒況資元老之壯猶將任舊人而共政丘壑皋䕫衣冠巢許民具爾贍股肱蕭曹腹心良平公其母遜鑰晚生無似薄宦徒勞涉筆金科倐更三載兼官玉牒弗措一辭惟父母之年益髙念菽水之養多闕偶逄新制適契初心得請治中將遂親迎之樂强顔員外未知貳郡之方幸門墻之是依信典刑之斯在使獲附聲之末如見古人倘粗傳士之苴餘願為弟子炎威方熾仙隠獨清顧茵鼎之茂調為宗祊而自重通韓運司彥質啟伏審拜恩天陛將漕日畿龍馬負圖久寓邃嚴之直水牛輓粟允資斡運之才凡𨽻部封舉深抃蹈恭惟某官乗珠照夜衡玉懸秋赫赫元勲具載鼎彛之刻言言餘烈尚存帶礪之盟仰昆季之横翔見門庭之益振竹樓赤壁増大江形勢之雄檇李嘉禾偉近輔恩威之洽剔蠧源而俱盡掃狡穴而一空齊民欣冬日之温老吏凜春冰之薄矧是外臺之重適當虛席之初肆求能臣乃擢賢守借一州之斂惠俾列郡以觀風問津清禁之途接武昕朝之列致身自奮行預嚴徐之襃活國有謀小試管蕭之亞不勞鞭扑坐致錢流便登簪槖之聫俯慰搢紳之望鑰行能無取學述尤疎涉筆刑章顧安知于八律預名史牒曽弗錯于一辭惟親年之益髙念色養之多缺偶逢新制求倅偏州乗鴈雙鳧顧何加于多少懸疣附贅適有愧于駢枝莫知關決之宜幸屬按臨之下願廣萬間之大庇俾霑九里之餘波展驥何堪徒以負丞而興歎登龍正阻尚須假事以有行囘王主管銖啟東閣同趨曽䝉傾盖南州半刺首辱飛緘瞻高隠以非遥荷謙光之過厚恭惟某官神鋒秀整筆力縱横克紹家聲善寳甘棠之笏親傳世學盡讀牙籖之書盍上亨途以攄雅志依芙蓉于邉徼俄賦歸來奉香火于仙都姑為自適正恐精金之價定不容美玉之櫝蔵鑰佐郡無堪登門自喜屬暑行之疲甚媿瑶報之闕然囘寧海湯知縣烈啟蝕粟周行力圖補外贅員别乗恩許便親喜同事之相依荷貽書之先辱伏惟某官詞場前輩聖世名流棲枳海邦藉甚一時之望采芹泮水盍從三館之遊尚為墨綬之淹小駐青雲之武循良所在登用可期惟慕向之已深喜瞻承之伊邇縱横老筆歎才氣之増雄踸踔征塵媿報章之弗稱囘石司户宗昭啟聞公子之名踰于十載識荆州之願始自去秋既服持衡之公更蒙傾盖之好茲來佐郡深喜為僚素知三語之無同未省千人之小異荷貽緘之先辱審沿檄之將歸喜不自勝言何能盡伏惟某官學期于古用適于今髙挹儒科振家聲于奕世首為户掾贊郡政者累年豈容州縣之勞㑹登臺閣之選君既不為駢儷之諛語我亦欲言去就之私心自惟無堪顧將焉用三尺所出四年其間用之則行舍之則蔵詎敢論古人之懿往而不返入而不出要皆非吾道之中惟親年之益髙愧色養之有闕每切望雲之念懼乖愛日之誠幸下攷之再書援新制而三請置之員外處以治中豈求半刺之優正恐負丞之誚玉川之異自異或恐未然䝉莊之才不才未知攸處既逄直諒之友良佩切磋之規賀下之先請益為便凡此地當知之事與平生有用之言不鄙其愚願悉以教囘添差錢節推之禀啟處以治中自慚無用置之員外所向適同喜傾盖之非遥荷貽緘之先辱伏惟先大家聲赫奕性地純明早聫紳笏之華未快雲霄之武六月而息欲為撃水之遊三年不鳴必有驚人之舉暫煩婉畫來佐賢候不移桑梓之邦徑入芙蓉之幕㑹聞交薦别遂超遷茲叨佐州甫及視事一笑莫逆俱為駢拇之流同官為僚尚恃斷金之義囘寧海方知縣之啟附驥同登恍如昨夢飛鳬來下忽聴先聲方慙佐郡之無堪深喜為僚之有託伏惟文之性資通敏問學邃深屬辭甚工屢得文場之雋從政何有寖蜚仕路之英既通籍于金閨聊假途于墨綬惟茲海縣在四明天台之間久矣邑人有卓茂魯公之望矧叨末契尤切寸一辱華翰以過優媿短章之匪報賀明州范參政成大啟恭審詔起柄臣權分制閫九重前席方深共政之圖千里褰帷暫屈于蕃之寄山川頓改號令鼎新凡屬按臨舉増抃舞恭惟某官儒林師表聖代宗工英主有為出際五百年之運嘉謨允合遂叨九萬里之程羽儀天朝金玉王度縯綸秘掖追還盤詰之風抗節殊鄰平讋疆梁之氣威名日著宸眷冞隆謀元帥于東南憺皇靈于徼塞令行八桂世稱伏波銅柱之規澤浸兩川人服武侯羽扇之略進參鬷嘏光輔太平遽辭丹陛之風雲髙蹈石湖之林壑奉身而退與世相忘屬名藩弄印之初喜元老賜環之速首頒帝綍併䕶瀛壖姑為試馮翊之行了無薄淮陽之志仰體皇上憂顧之重俯矜民生凋瘵之餘叱馭徑行不待東方之千騎望塵雅拜欣逄刺史之二天傳填撫之先聲極撫摩之至意吏民相賀知有所依旬月之間坐以無事輕裘談笑澄瀚海之驚瀾健筆流傳播雞林之佳句盡消愁歎倐變謳吟諒課最之易聞恐公歸之難緩台星兩兩重觀齊色之祥泰山嚴嚴式副具瞻之望鑰夙叨鑪冶久去門牆贅員于茲阻奉維桑之敬賜履之下實云擊柝之聞尚為假事之謀少遂趨風之願敢憑慶牘敷叙勤誠畫㦸靖深薫絃和暢祈為冕旒之眷益精茵匕之調攻媿集卷六十一欽定四庫全書攻媿集卷六十二宋樓鑰撰啟謝除宗正寺主簿啟容臺列屬方驚出命之從天宗寺勾稽更許引嫌而易地事應如響人以為神倍煩致曲之私益戴不貲之賜伏念鑰頃持孤迹入玷周行叨金科筆削之司三嵗于此預寳牒討論之末貳職最優念親年之益髙思色養之多闕偶逢新制幸遂贅員天台四明喜家山之在望治中别駕奉菽水之餘歡甫更二攷之書復捧三州之檄苟逃吏責來赴朝參登光範之門始尋故步索長安之米甘作畸人素䝉一顧之隆重辱千金之諾屏身逆旅忘意洪鈞不圖信宿之間忽被生成之渥力羣才之競進或累月之曲留是何庸愚首勞記軫俾居制作之地得以周旋其間雖公府無私諱之可疑而人子有至情之當隠范蔚宗謂郭㤗為太司馬遷以趙談為同彼雖千載不刋之書亦有一時随宜之例矧從兄正有近比而律經端為此文非敢為循牆之恭姑以避入門之問洊勤敷奏許以徇私再窺天派之慶源恍若華胥之昨夢輕舟浮海方虞風引于三山零雨自天終賴雲興于四嶽茲盖伏遇某官聖時間氣王佐真才進退百官而坐廟朝悉從公論總領衆職而稱上意專幹化權矜雁塔之舊題惜龍門之下客遂由遠外徑被甄収鑰敢不仰首厚恩服膺髙誼況獲居典領之下猶得附聲光之餘譜磐石之宗益加修纂圖國士之報誓竭疲駑通温州交代沈詹事樞啟以下三首知温州任内偃藩滄海真有古方伯之風易鎮温陵庸示東諸侯之勸乃容賤子獲繼後塵敢言一月之間再辱五雲之貺撝謙甚矣揣分悚然恭惟某官學貫九流氣髙八表天分已超于凡品心傳自得于遺經嚅道真泳聖涯信師友淵源之遠穿天心出月脅仰文章黼黻之工首振臺綱早膺睿奬洊居宰椽遂陟禁途儲寮推商皓之賢朝望出漢庭之右粤從壯嵗已著外庸使節帥垣凜威名之猶在閩山江國懷惠愛以如新獨瀛壖未識于旌旄故上意特分于符竹教條所及掃狡穴以一空政務日清剔蠧原而欲盡朞年而變百堵皆興精力如黄潁川而事不勞方略如薛馮翊而用自省撫摩多暇賦詠流傳繡口錦心在昔接王楊之舊風樓月觀從今齊沈謝之名忽傳舜詔之頒更與泉麾之重佇聞歸奏别拜襃遷刺史之為三公厥存故事人主之論一相用佐中興伏念鑰晚出無堪冥行自信當血氣盛强之際不能大所居之官矧父兄憂患之餘豈復有敢為之志茲叨郡寄遽迫戍期雖懷烏養之私未識牧民之體仰惟耆徳嘗拜下風庭内芝蘭已見朱轓之賢守門前桃李居多黄閣之名臣望重儒先年為父行退慙孤遠敢謂交承瞻之在前知堅髙之可慕瞠乎若後豈可逸之能追尚須修敬之初躬請告新之益署風清潤燕寢邃深願精茵鼎之調仰副冕旒之眷囘瑞安呉知縣敦義啟朱轓就道未知郡太守之宜墨綬臨民正須邑大夫之助同寅為幸良覿非遥伏惟某官璧水勝流桂林秀士絺章繪句蚤騰場屋之名錯節盤根尤藹簪紳之譽尚淹闊步俯就徒勞已報政于羅川更字人于安固一同何幸獲依明府之仁三異有聞行應清朝之選鑰疎愚自信憂患何聊忽為雙旌五馬之行欲訪孤嶼中川之舊人情物態雖曰素諳吏事邦條正資恊濟曽未馳于尺牘乃先辱于朋緘欣荷良深敷宣罔既回沈主簿興傑啟别十五年願復為李君之御官二千石又獲在鄭公之鄉入境云初飛緘未暇不圖前輩先辱英詞伏惟某官厚徳鎮浮髙風立懦蚤勤學殖視富貴若易然晚悟性空置功名于度外笑孟嘗之下客為羲皇之上人以濟南伏生之年抱西河子夏之病隠居求志之士吾見其人焉耄期稱道之賢盖僅有存者行見鶴書之聘仍加鳩杖之扶乞三老之格言為千載之盛事鑰頃因客授獲預英遊茲叨銅竹之分方厚金蘭之好拔薤一本惟忠告之是求束帛十端懼寡聞之貽誚敢俟及階也而相帥冕便當從牀下以拜徳公回楊秘監萬里啟鑰猥自右庠謬參外府兼史牒討論之職皆英躔吹借之私垂問甚勤撝謙良渥再念一登末第曽因公諱而退飛三入容臺率以祖名而引避雖曰周人事神之義亦惟窮鬼轉喉之妖敢因修謝之餘併發自公之粲瞻依益切感叙奚殫回王原父主簿沬啟頃傳新作慙妄正于雌黄茲荷勞謙喜再來于尺素志期遠到學有雋功曽日月之幾何覺詞章之頓進伏惟某官才由天與業本家傳孔鯉過庭素佩學詩之訓相如入室肯希用賦之圖既決世科寖登宦路移平昔窮經之力為一時應用之文今日侍親既供子職他時遇主可代王言尚云老馬之智專不鄙雕蟲之技小謂白圭之玷固曰可磨而清濟若毫豈如無有不量哀朽輙指纎瑕非惟欲補于聰明抑亦願加于砥今則下語俱當屬聫更工囘念舊編如出兩手雖未至飄飄凌雲之氣然已有咄咄逼人之風盱衡以觀刮目相視要知駢儷之有體不必怪竒以為髙既不當窘于邉幅之間又不可施之廊廟而駭文從字順意足氣全苟進學之未央諒蜚英之有助君如斵輪者須得手而應心此若持衡然懼俯首而至地果或亮我尚惟勉旃回李希岳先輩詢伯啟澤底名家素聫枌社雲間俊譽未覿芝眉辱華翰之先臨喜髙詞之創見伏惟某官天資近道學力過人繡口錦心期赴功名之㑹金昆玉季已蜚場屋之聲豈大才之未逢何小敵以猶怯然焚舟而進者有決勝之志手劒而盟者乃敗北之餘試㸔今日著朱騎馬之流多是前年㸃額暴腮之輩㑹見出一隻手竟當取第二籌欲大振于家風惟益修于賢業自慙朽拙莫助掀騰輙馳緘以附鴈足之還方洗眼以俟龍頭之選回張子宓教授虙謝作辨虛跋啟虛以擬𤣥仰儒先之述作言不盡意冀學者之發揮惟後世之子雲有本朝之君實探賾索隠著書立言頃尚多于闕文旋獲逢于全帙盖丁年得之張御史之手謂蜀本出于范太史之家且言令慈水之時親曽覩徳深之説既踰三紀始遇一編專窮象數之微備見淵源之藴輙伸末議具載舊聞初未有演義之篇故尤欽于絶識及今見發微之論乃盡掩于前功念其生不得用于時賴有此可少見于世況家傳之甚的實鄉義之所推掠而有之忍亦甚矣不勝憤懣併為辨明豈惟慰九原之英抑亦表一介之善伏惟某官義尊從祖力取世科知奥學之有來發幽光之不泯懷問一得三之喜極駢四儷六之工荷意甚勤非吾敢望蔵于屋璧何殊孔氏之遺報以瓊瑶徒愧衛人之厚囘上虞杜君昆仲啟伯氏決科出世真成于一佛華宗積慶克家又見于二難琴劒踵門文書銜袖大篇見憐才之切長箋知種學之深陳義甚髙撝謙似過有如衰悴自揆庸疎論道徳則虛負于初心言文章則難追于古作徒勤盛意秪益厚顔尚冀融明均垂孚照回陳勝私先輩屺啟謁次通名初喜見秀公之裔世家論契乃知為侍講之門握手定交傾盖莫逆伏惟某官父書素讀天分更髙盤萬卷于雲夢胸中巢四松于匡廬山上及見開元之故老尚聞正始之遺音古事今事問無不知儒家道家應皆如響稍窺新作歎温厚爾雅之文側聽髙談真直諒多聞之友言誠可用學有自來蚤負俊聲真是崑山之片玉晚甘肥遯竟成滄海之遺珠退念少時熟聆慈訓遭戈兵之肆毁寓冢舍以偷安荷先正之相求闢數椽而共聚窮百家之奥㫖信一代之偉人三紀以還尚求過于仲舅交臂而失恨不拜于下風豈于暮年得逢賢嗣自幸無涯之樂且聞未見之書遊邉忽作于宵征訪别更厪于夜辱餘生能幾再見未期相送仙舟第有加餐之祝㑹從傔籍或觀破賊之章回翟司户大正啟服忠惠之英名固已踰于四紀聞孫曾之競爽曾未識于一人喜户掾之鼎來撫衰蹤而自幸伏惟某官家傳未遠天分更髙書讀五車多是牙籖之舊仕因三語密參蓮幕之遊諒無暖席之温即有交章之薦杜門老矣承問欣然倒屣相迎及見故家之人物揮犀晤語尚傳前輩之風流囘劉監場啟客授仙鄉夙聞俊譽屏居海嶠喜聽先聲知望履之匪遥荷飛緘之下及伏惟某官性資純厚問學邃深毓秀簫臺真得江山之助䇿名楓陛榮登將相之科宜徑為結綬之行乃俯就熬波之職時則可矣君其升乎退念衰蹤再瞻英峙回思三紀知故舊之幾何來共一樽庶笑談之莫逆回奉化趙縣尉伯鳳啟居閒已久喜逢梅隠之來投分素深知是雪齋之子貽緘先辱修報何遲伏惟某官挺秀天枝傳芳祖烈翩翩佳公子稟資固自不凡顯顯世豪英游宦已知自立暫宣威于綵棒㑹接踵于青氈舊識二難又迎一尉輕輿徑造豈惟桑梓之必恭先壟相望正爾松楸之有託回曽簽判棨謝復官啟賢者受誣輿情久鬱聖恩牽復公論終明方深贊喜之私乃勒言謝之寵伏惟某官世傳清白政本廉平蚤通籍于金閨旋字民于花縣方政譽之旁達俄毁言之上聞乃以乾餱之愆重為白圭之玷呌閽徒切欲復雁門之踦投匭莫伸屢索長安之米忽聞昭雪盡釋猜嫌首畀故官遂登上幕自此升矣已知復玷缺之難惟其有之行遂赴功名之㑹比傳邸報尋辱郵音荷雅眷之未忘愧蕪辭之不敏容容多福固匪吾人之當言皓皓易汙願全君子之終吉回賀致仕啟頃自投閒已作終焉之計迨茲告老亦惟仕者之宜況平生不敢為髙至今日自應知止過䝉褒拂深荷謙勤及神虎掛冠之年幸酬素志若龍馬負圖之直實出誤恩方此控辭未遑致謝敢輸微悃以報先施回西安髙寺丞文善啟七旬得謝方報君恩千里貽緘仰欽友誼誦髙詞而増歎附陋迹以何堪鑰仕本為貧才非適用數竒命薄何望寵榮年除嵗遷寖踰涯分積有妨賢之媿遂叨宰郡之行自頃投閒已作終焉之計逮茲告老亦惟仕者之宜奉母九齡都無外慕執喪三載苟幸生前偶當納禄之期始上叩閽之請平生易足非敢為髙今日既衰固應知止俞音初閟遂過神虎掛冠之年誤寵太優乃有龍馬負圖之直控辭弗獲修謝頗稽不圖撝謙俯加贊喜伏承某官曲崇鄉黨不倦詞章能于劇部之餘閒俯念陳人之末路予之題品賁此哀遲來日無多但欲堅杜門卻掃之志褒言已甚詎敢為驚世絶俗之誇矧災星之尚存致宿恙之不已軒裳俱脱既無是中有鬼之嗟藥石弗靈未見其效如神之速呻呼一榻之上荏苒再朔之餘舊學已忘豈知雕篆之習報章自勉慚非駢儷之工何足拜嘉適堪取笑幸投苦海母玷文盟囘留校理元剛啟中宏博之科夙聞令譽陳治安之䇿首見雄文喜承秘省之異除乃辱私門之謙謝摛詞甚麗陳義尤髙伏惟某官胄出相家名標學海牙籖象軸讀殘萬卷之書玉斚瓊盃壓倒千人之筆始膺妙選徑上周行給札北門大明當世之務紬書東觀更用先朝之官忽䝉駢儷之工猶見淵源之自惟我宋文體之盛掃晚唐風格之餘楊劉始以藻麗擅名歐蘇惟以才氣獨步後來争奮分𣲖寖差凡詞采之有聞或雕鎪之未免不圖晚景獲見勝流洗末習而一空視前良而無愧何有報酬之稱第知蔵弆之榮囘真正字徳秀啟給札北門首閲治安之䇿紬書東觀先勤駢儷之文退視歉然勞謙過矣伏惟某官乘珠照夜衡玉懸秋宇量邃深吞雲夢者八九胸襟宏放貯文字之五千連中異科徑登左學茲更化之云始以急賢為最先落筆萬言無非當世之務奏名九陛遂結明主之知擢處道山尚迂俊軌雖百家之富未及于盛際而四部所蓄孰比于秘蔵嗟朽蠧之日侵亦校讐之幾廢倘絶意軒冕之進能埀精竹素之間竭其心思磨以嵗月豈惟辨正于訛舛抑以多益于見聞遠業罙昌貴名増重此時冊府其推為行秘書他日玉堂信可謂真學士有如衰朽喜見豪英頃聞禮闈之言頗以里俗為念知所存之甚大致相與之尤深强飾蕪詞以酬雅眷文不足以意或可通囘趙昌甫監嶽蕃啟書寄鳧飛喜見章泉之姓氏亭名魚計曽觀小宇之賦篇驚二寳之俱來顧千金其何算伏惟某官學緘八索識洞九流雖離鄭甫之居猶是趙家之玉舊傳文獻不知幾世淵源時出詞章自然一種風氣流傳寖廣慕用良深恨無半面之恩忽枉五雲之貺惟上饒夙名于佳郡而南渡猶多于寓公東萊文清之重名典刑斯在南澗稼軒之妙語酬唱相從接絺繪之王楊為衣冠之巢許到霜降水落之後擅日光玉潔之稱不圖加念于陳人使得遠沾于賸馥鑰倦游既久得謝重來慚共政之無堪歎妨賢之已甚屢嘗求去猶苦留行陽杲杲其未光首肅大昕之藹景翳翳以將入尚通殘客之來當血氣之既衰以筋力而為禮心存北闕欲報未能日暮西山不歸何待況茲踰七望八之際安有駢四儷六之工猥以蕪辭妄希雅好曽不盡意無以為顔囘張伯修汝礪結交啟貴賤雖殊無不須友以成者交遊當謹必先擇善而從之愧我非才誤君永契惟朋友實為士之急務故古今以備人之大倫不取乎挾有勲挾貴挾賢每求夫友多聞友直友諒是以合志則一朝傾盖如故或至興思則千里命駕而行道義所存器重如此古人混混去不返俗子紛紛何足云倚貴勢以為山視貧交而如土平時相遇雖欵誠偽盡少物所重則仇隙頓成經一死生因以知情者多矣臨于利害賣而取寵者有之豈能無媿伐木之詩固已不勝谷風之刺悵聖賢不可跂而及顧風流孰能坐而還舍君其誰當今何遜伏惟某人勃窣為理窟慷慨真人英器大難容反為下士所笑才髙無用直以巨儒自期思得同志而與之偕遊故凡庸才皆不足為伍肯許陳餘之刎頸未逢范氏之殺雞遇無易之交朋過輙忘其姓字時惟公琰威重有守獨與祖希情好日隆同心之言臭如蘭樂則生矣君子之交淡若水久而敬之惟情不可間而疎故人皆欲得而友退量陋質敢側英游初期蓮社中不許謝生居其列豈意竹林下乃容向秀預其流畀以雄文深為縟禮咳唾已成珠玉寳擲地當作金石聲實昭盛徳之過謙益使小人之不稱鑰區區何數斷斷無他雖相距一望之遥恨未諧半面之雅講聞髙誼日久矣豈若吾身親見哉將抱季任之幣而願交于下風乃盡嘉賓之心而奬成于後進鑰敢不竭愚者衆慮之得裨上性就學之明終身無變于炎凉一節不渝于風雨同自同異自異吾懶為玉川子吟我用我卿用卿君毋作庾中郎語攻媿集卷六十二欽定四庫全書攻媿集卷六十三宋樓鑰撰啟代賀魏王判明州啟以下十五首代先公工部恭審顯冊中頒价藩易鎮任隆分陜久推大國之王宗茂强周咸仰吾君之子傳聞四遠懽喜一詞恭惟某官慶席璿源輝分寳緒天球不瑑中全温粹之資金鑑洞開外廣精明之照為善深知于最樂退朝有若于無憑節旄兼兩鎮之雄劒佩領諸侯之貴啟封安化旋賜履于大明出殿宛陵復分麾于東甬静練方賡于妙句昔襦已沸于歡謡遵海而南振元戎之號令自江而左分皇上之顧憂先聲所臨疲俗胥慶未聽教條之施設已蠲閭里之歎愁不知官髙卑聳藩維而増鞏弗違顔咫尺來休聞于無窮某連蹇孤生衰頽末路為郎粉省屢陳過輦之忠假守蓮城尋竊乗軺之遣偶縁𤓰李之避苟安桑梓之居方茲需制幕之期敢意忝戚藩之屬二天在望分甘此日之杜門廣厦俱驩尚幾它時之曳履代賀史丞相浩啟恭審顯膺帝制榮正台衡總宥密之大權兼文武之重寄華夷震壘朝廷尊嚴恭惟某官有王佐才負宰相器開天闢地際千載之亨嘉旋乾轉坤贊一人之號令聲動四海禮絶百僚豈惟崛起徒步以至公侯所謂優游都城以取卿相自星郎在列已依前位之星及月寺為卿又近重輪之月惟舊學甘盤而帝心久矣簡在故爰立傅説而士論猶以為遲進既攀于龍鱗歸得承于鶴髪老萊子以綵衣為戲豈若衮衣之榮太夫人乗輕軒而遊寧及魚軒之貴増二府之門第破四明之天荒由古以來于斯為盛然而位望益重身名俱榮上有相須致太平之心又有髙拱操成功之意京洛願王化之復搢紳冀公道之行三軍五兵之問既至于廟堂一日萬幾之務又賴于惟幄盖春秋責賢為甚備而丞相得君為最深當此秉鈞之時宜適投軍之㑹繼伊周之事業用堯舜其軍民自然拯中原故境之人追尚父中書之攷某老于州縣辱在泥塗惟能守分以固窮尤拙乗時而射利劉尹知己雖自知而弗如荀令進人將不進而無已仰銜恩施親見盛時聽白麻于九重深喜綴鵷行之後磨蒼崖之千丈㑹當觀鴻烈之成代賀葉丞相顒啟恭審渙號大廷晉班左揆外領機庭之重兼提史筆之嚴宗廟晏安華夷震疊竊以宣王興周道允資元老之壯猶盤庚告商民必任舊人而共政盖功名滿人視聽固用舍為國安危況寢兵措刑方極帝王之盛將擢士拔卒以為將相之儲矧惟宗工嘗參揆路遠姬公于王室何以使四方之迓衡置裴度于巖廊自足使兩河之聽命亟登上宰庸副具瞻恭惟某官正色立朝精忠許國自任天下之重深結人主之知持論弗阿笑首䑕兩端之陋居官不苟掃狡三穴之姦士夫敬之如神朝野倚以為重擢從禁路處以衆途獨持文武之權實行宰相之事主張公道興起治功夫何讒箭之深至徹凝旒之側方當名實之綜覈肯容邪正之混淆初未辨是非幾類市中之處及大明黜陟卒麾瓜上之蠅亟頒賜環入對前席暫登樞府之寄式寵衮衣之歸金甌久覆于姓名玉鉉正須于調燮召詞臣于紫禁都人知拜相之榮宣大廷之白麻公議賀得賢之盛九州四海萬口一辭上方注意于太平公亦同心而輔政臣作股肱耳目拜有虞戒禹之辭爾為麴糵鹽梅膺髙宗命説之訓當聖賢相逢之㑹信社稷無疆之休益展經綸以臻康乂某依人最久荷徳罙深一聞成命之頒百倍輿情之喜兎葵燕麥固匪春風之上游馬渤牛溲願為藥籠之餘物代賀蔣丞相芾啟敬趨宸陛俯聽制麻恭審爰立巨賢進居端揆朝廷肅静宗祖㤗和某竊以人主必觀其所用之才宰相必視其所養之氣惟胸中之素有不可及則天下之事皆不足為盖嘗論古之人求氣之説雖霍光之不學與周勃之少文惟其器質之渾全致此功名之翕赫使廣之以絶人之識加之以濟世之才則其視三代之臣可無愧千載之上久聞是語今見斯人恭惟某官為國元臣受天異稟徳行冠四科之首真成顔閔之流文章承三變之餘迥出王楊之右家聲甲于江左譽望髙乎斗南議論依至公澄之不清撓之不濁進退有餘裕來非可招去非可麾蚤結眷知遍儀華要凡一時清切之選以數嵗周旋其間矯矯蛟龍雖已得于雲雨喬喬松栢曾不改于嵗寒極論思獻納之工見輔贊彌縫之妙果膺大用以具副瞻當聖君居九五正位之尊以太平惟二三大臣之責然而治體未定國勢未振雖甲兵之問不至于廟堂而愁嘆之聲尚多于田里當途之士盖曰欲之而不能命世之才獨恨求之而不得比適宰司之虚席獨因遜牘以矢辭姚崇之説明皇是陳十事千秋之寤孝武端為一言凜然有王佐之才卓爾當天子之意九重動色豈欲當饋以歎蕭曹四海得人大似選衆而舉皋尹志存經濟身佩安危必欲士夫息奔競之風上下無苟且之意富國强兵于嵗月之頃移風易俗于禮樂之中迓衡之期拭目以俟某一介何取半生無聞竊郎宿之虛名將遂及瓜之代仰台星之騰􅋯實深賀厦之誠庶幾么麽之蹤預在生成之列代賀浙東安撫蔣丞相啟恭審詔出中宸將復鈞衡之舊權分巨屏姑煩衮繡之行郵語四馳歡聲一律恭惟某官氣全剛大學造精微倡諸儒以六經之文允謂天民之先覺舉明主于三代之盛亶為聖世之宗臣于埀紳搢笏之間負旋乾轉坤之任維持國是振舉朝綱治已嚮于迓衡悲遽纒于陟屺上方待公以共政士以奪服而為榮雖眷寵之優隆念祈陳之哀到五使銜詔莫囘終制之誠三年執喪必待變衰而起惟開元之際共髙于張説而嘉祐之時獨見于韓公三人相望千載同仰甫及祥琴之御亟分帥閫之雄冷然御風姑少留于蓬島舉而見日曾不遠于長安福及京師心在王室髙牙大纛往分東顧之憂黄閣白麻行正左虛之位某退慚頑鑛素出陶鎔迨茲一障之乗又託十連之屬治大府而受約束恨無鳧舄之飛如厦屋之為帡幪自喜燕巢之穏代賀范舎人成大啟伏審宸庭疏寵詞掖升華竊惟中禁之班莫重西垣之選彌綸世務論思居諌諍之先榮辱一言懲勸出賞刑之表動關國體榮冠朝行名儒既登善類相賀恭惟某官學耽八索才本六經分東方諸侯之符俄促歸于鳯闕秉南宫舍人之筆遂進立于螭坳比求膚使之行無出明公之右戎酋相顧不知李揆之肯來士論私憂或言韓愈之可惜抗穹廬而不撓全故璧以復歸天顔為開國勢増重徑上紫微之直快吟紅藥之階雖儒者最以掌制誥為榮而人言猶有典屬國之嘆眷之方渥進用未央變汙俗而制典謨正賴文章之潤色游都城而取卿相㑹攄經濟之規模某託契頗深受知尤厚静守賢侯之範喜聞内史之除大厦穹崇竊自同于燕雀飛黄騰踏願少顧于蟾蜍代通婺州王給事曮啟瀫水開藩誤䝉知己瑣闈批敕屢幸趨風迨承山郡之流復竊寳隣之庇夤縁有自欣抃實深恭惟某官道學淵源文章典麗家蔵鄭公甘棠之笏架插鄴侯牙籖之書掣碧海之鯨魚笑翡翠蘭苕之戲運天池之鵬翼隘鷽鳩榆枋之飛蚤登瀛洲徑躋禁路肩險夷之一節際亨嘉于千齡忠若子文仕無喜已無愠情如徐邈昔非介今非通録舊學之多聞冠近班之異渥藥階苔砌方欣星掖之重游鱸鱠蓴羮又歎風舟之引去欲前半夜之席暫分千里之麾陳義甚髙急流勇退清風八詠岳牧姑用夫詞人㤗階六符廊廟正資于王佐某被恩有素圖報未遑偶縁𤓰代之先期已造蓮城而視篆小侯方事夫大國短札爰具于遥懷魯之擊柝聞于鄒敢謂相依于唇齒楚之餘波及于晉尚期曲賜于帡幪燕寢優閒暑風清閏願精調于茵鼎佇入秉于鈞衡代謝户部侍郎舉陞陟啟下走無能謬忝花城之貳當途過聽誤形衮字之褒一經品而便佳三下拜而受命寵踰望表愧溢情涯竊以選之之公今昔攸重近觀所為主人固不易知惟一心湛然妙絶冰壺之清澈雖萬物紛至難逃風鑒之毫釐見誠過于百聞辟或由于三語使不言則子幾失矣觀其眸則人焉廋哉未有斷然于稠人之中舉之于千里之外自非俊彦曷稱褒揚如某者術與世疎能如命薄生而多難天與數竒斗筲之才亦何足算儋石之禄祗益可憐半生從事于下僚再轉為丞于百里躬親丹墨日困秕糠蔑有哦松而自娱行矣及𤓰而受代著身卑穴絶望品題敢期一紙之春風忽到窮山之寒谷退不知據得之若驚茲盖伏遇某官髙識絶人大量容物繡衣金節屢宣江上之風月寺星曹更近長安之日進司民部簡在帝心深欲以人而事君尤喜屈身而薦士伯樂囘顧自宜十倍之増匠石揮斤猥及百圍之散涸鮒已䝉于升斗羣蚊難負于丘山某敢不益守官箴深緘薦墨小人懷惠蔵在寸心國士報恩見之他日代賀林左史機啟恭審拜命中宸書言左陛故國非謂喬木賴有世臣我家再得青氊是為舊物望髙位著喜動搢紳恭惟某官徳度粹夷道源淵奥掃千軍于筆陣敢當我哉快獨步于詞林無出右者結綬丹墀之上横經朱邸之深重暉重輪早依光于日月從龍從虎終感㑹于風雲起分千里之憂已著九重之眷爰膺嚴召入覲清光髙宗學甘盤尚記宅河之舊孝文見賈誼果膺前席之褒欲親咫尺之威顔仍典起居之記注珥螭坳之筆豈惟富貴之逼人秉鳯閣之鈞㑹見功名之報國某披雲未遂仰斗徒勤屬分山郡之銅符阻奉侯門之珠履聞置郵之傳命慶朝廷之得人夏屋渠渠方託帡幪之庇䕃夢魂栩栩恨無羽翼之飛翻代賀汪舍人啟恭審光膺宸綍進拜詞垣搢紳欽稽古之榮制誥見代言之體正人登用善類依歸恭惟某官識際天人道隆今昔淵源奥學倡諸儒以六經之文挺特髙風立懦夫于百世之下秉赤心而自許箴丹扆以結知堂堂堅許國之忠蹇蹇有愛君之節密居螭陛非堯舜之道不敢陳進批龍鱗雖賁育之勇不能過伏蒲論事名重日邉埋輪擊姦風生江水亟被賜環之寵載歸珥筆之聫承親擢于中宸陟清班于西掖階翻紅藥謝公徒詫于風流日對紫微白傳漫矜于清貴茲惟盛徳髙視古人首正官聫用明舊制大開公道以塞倖門聖君深納其忠嘉多士想聞于風采究觀今日謀謨之懿可見異時經濟之功號令一新固已追踪于姚姒規橅素定便將接武于皋䕫某假守何堪依仁有幸大厦成而燕雀賀知無風雨之虞靈丹化而雞犬升自有雲霄之望代謝除提舉福建市舶啟分侯麾于古括始終䝉全䕶之私總商舶于温陵委曲荷生成之賜竊以番禺置使傳自有唐閩嶠庀司起于元祐金山珠海磊砢乎萬寳之蔵輦賮航琛奔走乎百蠻之廣樓船舉飄而過肆賈胡交舶以候風豈惟貿易而求質劑之平抑將綏懷而致聲教之被是為遴選必藉通才如某者少也多艱壯而漫仕馳驅四紀備嘗州縣之勞黽勉一心尤謹簡書之畏抱虚郎省濫吹朝紳念尸禄之無功以治民而自詭試以一郡逮于二年布宣詔書不知萬里君門之遠施行義役庶幾三代井田之遺幸年穀之順成致閭閻之安静益勤撫字以免譴訶聞尚書之履聲理應退聽掃舍人之門外自恨無階敢謂大鈞弗遺下體未作乞憐之態已叨拜命之榮仕而為貧𤓰戌既欣于非久思不出位樗材或得以苟容自為之謀豈過于此茲盖恭遇某官清朝碩輔名世真儒雷厲風飛君臣相遇于千載天開地闢日月可冀于中興顧在上引類自其本心而為官擇人尤為急務至如下走雖曰無以逾人察其平生必知老而戒得俾司互市實出殊私某敢不俯激懦衷愈全晚境慕隠之之節飲貪泉不易其心效孔戣之清罷貨燕無名之費倘逃瘝曠以報使令代通交代李知丞浚啟對松而哦自􅀏龔丞之老及𤓰而代又迎貳令之賢顧今日之交承真一時之㑹遇心未降于既見齒已幸于相依恭惟某官性稟中和家傳清白一行作吏功名小試于著鞭三載陟明才術已聞于游刃宣勤勞于蓮幕通姓字于金閨方嘉運之鼎來宣亨衢之闊步仕擇人而人不擇仕姑為金瀨之游丞負予而予不負丞應起藍田之嘆學美崔生之博清推景倩之真去則行遲誰非戀父母之國聞何來暮其如興民吏之謡豫想登仙茲為假道涉筆惟謹居然視雁騖之行黔突未幾行矣簉鴛鴻之列某半生從宦再轉為丞徒甘州縣之勞反出簿尉之下􅀏如櫟之無用愧若糠之在前雖舊尹之政必告新然老者之志不如少材不足塞既久負于矌瘝玷或可磨當益勞于礱錯代通蘇通判師徳啟恭審疏恩玉陛貳政金陵居百里而負丞仰二天而托庇時方㑹遇喜倍倫夷恭惟某官學殖深醇材猷敏邵泉如初湧共推大手之才山或可移難變至誠之節名家最久治世益新明良相㑹于半千閥閲當今之第一綸綍藹玉堂之譽鼎彛書鳯閣之勲惟别乗之多才信髙門之有子眷言建業今號陪京羅綺一城富六朝之風物絃歌千里綿百世之衣冠山川分龍虎之形甲胄冠貔貅之勇憂寛西顧任重維藩尤資賢治中以佐明太守疇茲異數屬我真賢已騰來暮之謡更聽不空之頌始展驥足姑憑泥軾之榮真有鳯毛行拾青氈之舊某材如樗散性若棗昏猥承弓冶之餘謬綴簪紳之列半生從宦徒甘州縣之勞再轉為丞反出簿役之下及𤓰將代幸逭前愆杭葦欲歸深虞後患既托帡幪之下諒寛鞭䇿之求雙舄願飛恨乏仙鳧之便戎幕知穏果無巢燕之危瞻霄漢之仞牆寓腹心于尺牘方盛徳之在木惟衛生之有經祈為宗祊精調茵七代賀鄧運使啟伏審榮拜綸寵持使節恭惟懽慶竊以自江而左最為財貨之源由古以還夙號膏腴之地菽粟有如水火山川不啻金湯十國為連盡承風乎外府三軍分駐皆仰食于太倉矧轉輸于千里之勞而儲蓄必九年之富欲責成于列職必也使乎肆圖仕于舊人無如公者疇茲大任屬我真儒恭惟某官望重吏師行為世則志澄清而黙斷用砉騞以無留元非百里之才多多益辦小試一同之地綽綽有餘雖儒者當任于謀謨然利器必更于盤錯狗盜䑕竊曾何置于齒牙蟻聚蜂屯固不勞于才刃姦蜂逆挫薦牘交馳謂割雞焉用乎牛刀處别駕始展其驥足銅章墨綬聊自樂于弦歌泥軾星屏俄平分于風月任居刺史之半人仰治中之賢邦國不空繄實王祥之賴老弱從借乃許㓂恂之留由萬家而治十萬家自千石而陞二千石吏民乃服其教化草木亦知其威名即地按臨方剖東州之竹拂衣歸去空餘南國之棠惟守正以不阿乃既踣而復振伯道載米而之呉郡已為良守于中興次公受詔而歸潁川終云治行之長者欲立賞以勸百辟豈私惠而庇一方賜爵關内侯有昔王之盛典増帙部使者見今日之殊恩邦人騰挽不留之歌江國興來何暮之歎星随駿馹風靡列城曽未布于教條已想聞于畏愛木牛流馬非以居材金節繡衣于焉借重諒未容于暖席行即膺于賜環某孱瑣無堪衰遲有素半生從宦敢辭奔走之勞再轉為丞猶懼曠瘝之誚久欲執鞭而從轡未遑持帚以掃門念小吏之人疆際鉅賢之持斧駕駑䇿蹇詎敢自安含垢匿瑕不無所賴雙舄無據曾莫効于鳧趨大厦既成徒自深于燕賀代賀徐提刑正旦啟行夏之時爰重建寅之統采周之舊式謹次王之書惟道與時而偕行宜福如川之方至恭惟某官爽邦哲匠名世大才荷宸扆之眷知儼使臺之威重明刑以弼教􅅷哉期于無刑聽訟吾猶人必也使之無訟比期年而報政與十國以為春茂對三朝倍膺百倍某職卑而宂道阻且長賓履躡珠遥慕簉庭之禮夀觴浮柏莫陪進酒之儀攻媿集卷六十三欽定四庫全書攻媿集卷六十四宋樓鑰撰啟代賀王樞密倫奉使回啟以下五首代舅氏汪尚書大猷交鄰國有道乎大而事小遣使臣以禮也遠而有光自昔才難于今任重十九年誠著夷狄孰謂世無蘇子卿數千里口伐可汗必有人如鄭元璹惟樂天者保天下故和戎而得戎心乗軺之人銜箠于道臨軒優造固盛世之非常杖節請行實大臣之未有揚旌亟去締兩朝魚水之歡接淅言還際千載風雲之㑹神人喜樂河海晏安么麽至微驩快以抃恭惟某官有宰相器真王佐材量括江湖不清不濁氣充天地至大至剛貌不勝衣心匪轉石言而造膝非堯舜之道不敢陳議或犯顔雖賁育之勇不能過愈膺眷注寖厯清華快吟紅藥之階久寓紫微之直敏悟如廷碩時詔誥皆自為之文精壯若燕公大述作類皆出其手進貳樞府増重聖朝運籌于帷幄之中折衝于樽俎之際上方安邉境于無事時乃堅和盟于未寒禮云禮云豈玉帛乎哉使乎使乎安國家可也謂虞臣之相遜彼或一時命裴度以往釐正在今日確持志士之操果為天子而行帝曰汝諧僉言惟允身輕一葉佩四海之安危名重泰山聳萬夫之風采分憂北顧顒望東歸馬維駒馬維騏方聽黄華之選鵻集栩鵻集杞已聞四牡之來生靈獲按堵之安宗社有覆盂之固孤忠凜凜馳不測之深淵萬目睽睽仰難逢之盛事歡傳土宇喜動天顔去握漢旄固已虚上台之席歸調啇鼎何待趣舍人之裝行慰具瞻即膺爰立某寒鄉冷族藝苑散材雖知必學于箕裘未免徒勞于州縣寡交于世知已惟公顧蒹葭之柔曽倚身于玉樹􅀏蟾蜍之拙難追步于飛黄誰知霄壤之殊途不替金蘭之舊分比干寸禄進拜崇墉方彭彭馳使者之車而戀戀有故人之意將曲成其羽翼乃特借以齒牙俾掃齊門䕶參儉幕受丘山而有自効蛇雀以無階俯聽先聲莫負蜀郊之弩輙尋故步重瞻夫子之牆敢泚筆于下風佇宣麻于穀旦代賀錢樞密端禮兼提舉徳夀啟恭審光奉宸綸進參樞筦天子侍龍樓之膳仰裨孝治之勤聖恩加書殿之名増重本兵之寄神人歡喜宗社晏安恭惟某官才為時生美由世濟學究六經之蘊識窮庶物之原緗帙牙籖插架固踰于三萬漆書竹簡撑腸何止于五千發華藻以為文出緒餘而餙吏果由治行自致功名踐敭仕路之深密勿從班之久屬遠夷之弗靖眷邉境之多虞洊遣侍臣往宣徳意星軺兩使盡清千里之烟塵羽扇一揮坐變三軍之風采隃度機事明若著龜確守成模堅如金石遠膺芝檢來對楓庭君必有尊盖以天下養也時方多事要當馬上治之自非膺眷遇于兩宫兼文武之二道安得被家令賜金之寵贊元樞總戎之權父子無難言之嫌繄公是賴廟堂銷未形之患舍我其誰久難其人今得此選自聞拜命僉曰當賢雖李衛公之髙才素恥由于進士而曹侍中之故事特先賜于儒科積此恩榮可知注倚邉聲未寂騎􅅽方高頃在金城固已圖上于方略今居西府自應制勝于朝廷位髙則任隆名盛則望備盡平時欲行之事當今日可為之秋願思君臣遇合之難以濟國家恢復之業某効官何補蒙眷數深側聞渙汗之頒倍極輿情之喜兎葵燕麥固匪春風之上游馬渤牛溲願為藥籠之餘物代賀錢參政兼知樞密院啟恭審榮膺宸綍進貳政機兼特右府之權益壯本朝之勢郵音一播輿論交孚恭惟某官徳量恢洪勲名赫奕傳龜襲紫偉岡頭澤底之家聳壑昂霄擅日下雲間之譽早膺睿眷寖厯華途游刃不見于全牛利器豈拘于錯節外臺輔郡著藩宣屏翰之功清列近班備獻納論思之益頃以邉庭之未靖嘗持使節以請行風清塞北之烟塵名震淮南之草木折衝樽俎之上運籌帷幄之中方鄧騭欲棄涼州微升卿幾誤國事惟營平固守明詔謂宣帝可為忠言披膽莫回噬臍増悔以身徇主豈欲得先知之名轉敗為功自難掩孤忠之節亟畀芝函之寵峻躋樞筦之權雖士氣之已振尚兵釁之未解力裨聖算先遣軺車嘉謀無膠柱之拘天意有轉圜之易埀紳搢笏坐致元功曲突徙薪終為上客宜進參于鬷嘏俾益究于宏規士夫喜公道之行中外欣王化之福惟夷險不踰于操守故始終尤被于龍光大臣慮四方玉鉉方資于調燮人主論一相金甌將啟于姓名某竊禄無堪荷恩自舊側聽絲綸之播不勝燕雀之私鄰哉鄰哉方慶明良之遇人耳人耳願歸造化之餘代回髙參議啟假守南州方遂奉祠之詞拜恩中道忽叨謀帥之行曽修問之未遑媿貽緘之先辱伏惟某官精忠報主妙略濟時英英故國之􅂄儒表表清朝之雅望一門父子喜富貴之鼎來萬里功名諒規橅之先定豈謂著鞭之晚尚淹入幕之留蔚相扶炳相輝適有同寅之幸起而言酌而祝尚資婉畫之餘代囘陳節推棅啟擢首選于漢廷聳聞雋譽置外員于儉幕是曰異恩曷遲吾行願快先覩伏惟某官東嘉勝士西洛别傳視將相之科真拾地芥陳治安之策若吐天葩顧上游實為館殿之儲屈故事尚勞州縣之職青雲器業具在斯人歟緑水風流頗有此客否首勤髙作來訪陳人駢麗何工褒嘉過厚閒而成嬾既乖桑梓之恭言不能文又媿瓊瑶之報代謝直秘閣啟以下四首代知温州曽吏部逮假守偏州方媿承流之選陞華中秘遽蒙増秩之褒揣已無堪歸恩有自伏惟某稟資甚陋涉世尤疎十上空歸莫售家傳之學一行作吏但遵父教之忠素甘薄宦之驅馳敢意清時之差擇容臺議禮僅博聚訟之嘲畿甸持刑上廣好生之徳進貳唐朝之銓選預參漢代之章程忽去國以難留祇杜門而自省偶屬東嘉之空乏俾分南面之顧憂被臨遣于丹陛之嚴受要束于黄扉之邃俯矜嬴俗惟恐其傷虚受瞽言其應如響鄰封移粟來蘇待哺之民下户蠲租盡革剥膚之弊赤子既寛于無告青史遂書于有年皆聖君施舍之恩繄上相燮調之賜苟逃曠戾已劇僥逾乃論尺寸之勞誕布絲綸之寵重念流離粗免凋瘵尚多倘守臣安受于誤恩則事體遂同于佳郡雖循牆而力請曽反汗之無聞風阻三山尚覺去人之逺雲興四嶽遂霑零雨之餘茲盖伏遇某官道徳宗工朝廷元老天開地闢㑹千載之明良雷厲風飛兾中興于日月深念專城之重務先良吏之求苟片善之有聞無一夫之責備坐令么麽亦玷褒嘉某敢不益勵駑才深圖雀報仙凡夐隔無從讀石渠東觀之書今昔何殊尚當奏渤海南陽之課代賀虞丞相允文啟恭審宸章渙發肇更夾輔之名制冊随頒爰正左虛之席仰觀盛事髙掩前聞竊以阿衡左右商王作相必兼于仲虺姫旦股肱周室為保亦資于召公下及兩京以還寖隳二代之典雖大臣之委寄自若而厯時之位號不倫至用秦官領事之稱以為唐室中臺之長大聖君之有作復官制以聿新非為遠追孔子正名之言抑欲遂行宣帝責實之政肆疇上宰首屬宗工恭惟某官千載真儒兩朝元老蘊仲舒佐王之學負孟軻命世之才竭忠力以事君肩一心于夷險出緒餘而應事了萬變于笑談勤勞何止于十年往返動踰于萬里凡四海危疑難辦之事廷臣皆斂袵而莫當求一時剛果敢為之人天子必虚懷而相屬手持威柄身佩安危王曰勲國曰功顧持書而未已出為將入為相宜注意之尤深臣主俱賢紀綱益振尊歸慈極贊九重孝治之心位正儲闈建萬國元良之本總衆職以遂大有為之志講内治以成不可勝之資當稽古建官之時選衆而舉膺奮庸熙載之任舍我其誰兼提樞筦之權進極文階之品漢儀復見一新昭代之觀瞻周室中興㑹見神州之克復某久蒙知遇猥被使令方欣黄閤之開洊喜白麻之播用汝作舟楫仰知濟川獨任之專以我為鏌鎁遽有躍冶自言之意代賀沈運使復啟恭審天陛拜恩日畿授莭木牛輓粟榮分使者之權龍馬負圖寵冠奎文之直列城聳動公議傾依恭惟某官造道深淳受材髙劭潄六經之芳潤摛章驚絶代之工究千古之興衰論事有適時之用頃趨嚴召自結深知謂公等皆安在耶信明主一見決矣郎潛省户坐騰列宿之輝使行邉庭盡䕶長淮之境總師屯之萬竈供日費之千金民不告勞士皆宿飽試之馮翊益知治行之髙任以關中要資餉饋之給豈惟見研桑心計之妙行且膺嚴吾從臣之求于焉假途寧俟暖席某夙蒙知奬兹屬部封顧惟千里之凋殘猶賴二天之庇覆軺車澄按兾舒雅拜于前塵嶠海阻脩莫厠賀裾之下列代賀吕運使正已啟恭審光被宸命寵升使名九重益厚于眷知列郡愈嚴于風采恭惟某官髙才絶俗奥學傳家納萬頃于雲夢胷破大觚于霹靂手釣璜渭水屹然尚父之功名聽履漢廷偉矣尚書之人物踐敭中外備厯險夷比講鄰盟獨膺親擢方張旜而遠聘俄全璧以來歸首加部使者之稱獨典屬國之恨倚毗方重進用未央佇登紫槖之華徑取青氈之舊某辱知有素贊慶尤深大厦之庇千間夙荷帡幪之賜洪河之潤九里願承沾丐之餘代謝知温州啟以下二首代知温州王待御伯庠承流蜀道初無保障之功更治瀛壖復得股肱之郡俯慙僥倖欣載生成伏念某少已無竒晚尤多難十年不仕惟真祠香火之依一札俄頒豈生平夢寐之及曽篾片言而悟主未知何自以為郎方評蘭省之文忽冐柏臺之選遇事輙發初不顧于憎仇有知必言誓少酬于眷奬久為怨府卒蹈危機但求闔户以省愆敢意分符而起廢叱馭而進仰追鼻祖之忠勤鼔盆而歌有媿蒙莊之了達號啼塞耳憂患薫心願休退于田廬姑召収于魂魄詎聞衮服之貴下軫綈袍之思授以輔邦遂其私計俾控甌閩之要許尋王謝之風江海一來難兾脩門之重入山川相望惟思舊隠之可歸茲盖伏遇某官道徳佐王謀猷濟世大開正路期立致于太平獨秉化鈞用陶成于善類有如朽鈍誤辱矜憐某敢不澡雪精神究詢利病奉寛大之詔務使及民勞撫字之心以報知己代賀史開府浩啟恭審頒冊九重視儀三事節旄前道聿嚴帥閫之雄衮繡交輝爰寵帝師之舊允為異數宜屬宗工恭惟某官忠冠兩朝道關百聖體仁蹈義聲名如山斗之尊聚精㑹神君臣不膠漆而固當天開地闢之際贊雷厲風飛之機天下日向于太平王化亦幾于復見晉公巨徳歸為緑野之遊謝傅髙懷終為蒼生而起㑹稽輔郡曽衣錦衣閩嶠大邦更憑熊軾上篤潛藩之眷恩先召節之來前席受言改容加禮台廷虚左方圖上宰之求制綍自中首􅅚多儀之備參鼎司之崇品隆巖石之具瞻錫賚便蕃燕饗優渥貴盛絶諸公之右榮寵萃一門之中髙宗舊學甘盤未見報功之及武王維師尚父會聞授任之均某素辱殊知仰欽成命屬有郡章之繫莫前賓閤之趨蕭曹同心咸願股肱之夾輔甌閩接境敢睎齒之相依代魏丞相囘趙明州伯圭啟將使指于龍庭曽無微効代王言于螭陛遽辱誤恩方自媿于抱虚乃亟蒙于贊喜恭惟某官才髙玉箭秀毓銀潢人推子敬之明經自許東平之樂善享太守之禄二千石屢宣屏翰之勤賜列侯之印十九枚益見本支之盛行被芝書之寵即歸荷槖之班某久辱眷知茲蒙推借朋緘遽及可知君子之謙謙交態益深備見故人之戀戀代龔參政囘廣東林提刑光朝啟入處從班已慙過分進參機務益愧非才首勤慶牘之臨尤佩誨辭之切伏惟某官學窮古始識造幾先六藝淵源得聖涯涵泳之樂一時名勝多殘膏沾丐之餘比專璧水之主盟將掩橋門之盛際乃從雅志往接遐方文翁之守蜀邦常衮之使閩部正藉遠揚于聲教豈惟詳試于刑章毋為攬轡之淹㑹有賜環之寵顧如匪陋誤被柬知忽叨共政之圖悉自更評之助疾顛是懼請益無階茲聞提耳之言當謹書紳之戒陳耽先用殊有太丘未登之慙樂正無聞恐孤孟子不寐之喜尚期弗棄警所未知代莫給事懐賀曽丞相啟恭審光奉制麻進登揆路華夷填服宗社晏安恭惟某官學殖深淳器資閎博千載際聰明之主十年居侍從之班本末源流知天下之大計論思獻納見王臣之匪躬頃貳政機密參國論輔贊蔵諸用不言房杜之功仁義事其君豈為管晏之烈天子意可使為相朝廷謂無以踰公正夾輔之名方革秦官之陋蘊太平之業況傳魯國之餘一聞爰立之傳實允具瞻之望某受知最久假守無堪不勝賀厦之私敢致飛緘之敬自憐老矣方日念于故山倘遂歸歟尚許全于晚節代仲兄錫謝監左蔵庫門啟讞獄南徐曽無善狀司閽左帑遽冐中除誤叨特達之知倍費生成之力竊以剖訟之際自古所難吕刑謹兩造之情周官備五聽之制雖三尺從事固自有法然片言折獄存乎其人仰惟列聖之朝尤廣好生之徳凡嬰罪戾咸劇哀矜用隣邦之吏以絶請求擇練事之人以加詳密孰謂清强之選猥先寒晚之流有何微勞當此殊遇伏念某受才甚陋學道未深名粗齒于薦書仕仍由于世賞銓曹試律雖少知司空城旦之書户掾兼官顧豈是柱後惠文之手偶上司之過聽付疑獄而使評三省吾身樗材奚取一行作吏牆面是憂況縲絏之中或非其辜而箠楚之下何求不得閲簡書而致察束桁楊而不施公心以觀三日而決正自慚于拙速亦何有于平反因獲瞻上相之光儀固已劇此生之榮幸敢圖大造俯念孤蹤雀角䑕牙未知明辨牛溲馬渤首辱兼収坐令下國之參軍來職中都之外府姦胥鋤治雖云狡穴之已空寳蔵所儲或恐蠧原之未盡出入親臨于朱墨啟閉尤謹于晨昬時乎為貧孟子亦容于擊柝各從其志望之自樂于抱關上得近于恩閎下不妨于吏攷深知僥倖曲賴陶甄兹盖伏遇某官夾輔聖君共康大業羣才並用或下採于芻蕘片善不忘顧豈遺于葑菲致使斗筲之賤亦霑膚寸之餘某敢不澡雪精神感蔵恩紀既以備籠中之蓄詎敢貽門下之羞今日遭逄本非夢寐所及他時報効要當生死以之代陳叔揚大年謝興國軍教授啟持帚相門屢瞻公衮横經侯泮辱在化鑪揣已無堪歸恩有自伏念某涉道甚淺接物最踈不能飾貌以動人且無曲學以阿世永為大父獨立先朝正色不囘志必期于去莒著書自見心常在于尊堯雖孤忠勁節每挫抑于强臣而潛徳幽光終暴白于昭代傳家有法遺子以安學焉記問禮之言仕者守教忠之訓一經未泯賤子敢忘濫踵世科幾周嵗紀奉真祠之香火兩痛家囏司絶徼之貿遷適開邉釁妄論天下之事慨上公車之書雖幸徹君門之九重猶未試鉛刀之一割坐閲星霜之變不知升斗之謀壁立自憐瓶儲不繼投誠大造自忘躍冶之非厠跡嘉賓時遂曳裾之願麞頭鼠目何敢求官馬渤牛溲庶幾待用賴鈞播于小物俾客授于南州好為人師素守孟軻之戒此非子坐恐招有若之譏既逃州縣之徒勞仍有絃歌之可樂無非僥倖端有夤縁兹盖伏遇某官旋斡化鈞主張吾道内治外治既陶萬國之泰和小成大成仰贊一人之化育善類悉歸于真宰危蹤尤累于洪鈞夫何孤寒有此遭際某敢不益堅素節不負初心學不如務師曽焉知于善誘教然後知困顧敢忘于自强庶上副于眷知用少圖于報効代范孝隆棟謝提轄文思院啟掃舍人之門方欣進拜備事官之屬遽辱生成揣分已盈戴恩無藝伏念某才如樗散身若蓬飄不能飾貌以動人目無曲學以阿世偶憑門䕃獲厠官聫太上皇方御于飛龍先丞相實同于附鳯言言正色獨輸蹇諤之忠耿耿一心共濟艱難之㑹旋居元輔以佐中興依日月之末光㑹風雲之盛際生前相業但為社稷之謀身後生涯肯作子孫之計適權臣專國而方恣致故家無地以自容屏跡山樊但知畏影冥心宦路敢望求伸欣逄更化之初始興干禄之志猶念一經未售莫振家聲百技無長不為世用顧時命之大謬況拙懶之相逄雖嘗千里以効官又復三年之不調痛弟兄之淪落慨門户之衰頺不自植立以干當世之公卿幾無面目以上先人之丘壟幸真賢之並用喜公道之大明輙彈貢禹之冠徑造平津之閤囘思江國當叨堂下一言之知仰望台衡敢叙屏間半面之愫豈圖謙徳弗替昔時執轡愈恭不數信陵之義脱袍加惠猶憐范叔之寒曲記姓名俾歸陶冶鈍不及事幸而得之善為為謀不過此矣惟文思名官之義取栗氏銘量之言鳩燕荆胡粤之良材督鄭宋魯呉之巧匠居百僚之底雖號卑微在三轄之間頗為優簡静惟僥冐端有夤緣茲盖伏遇某官吾道宗工本朝碩輔總衆職而稱上意明良相㑹于千齡順四時而遂物宜勲業獨髙于百世惟儒者在朝美政而上臣事君以人三握三吐而下士畢歸一貴一賤而交情自若務盡刈翹之術不嫌躍冶之私坐使孱庸亦叨造化某敢不仰啣恩施俯􅅚司存逄人而説項斯敢忘此意結草以報魏顆誓畢餘生代汪景孟茂良上龔參政啟程末技于省聞曾叨誤聽拜下風于帥閫始受真知不圖淪落之蹤復望熒煌之座敢陳悃愊上動髙明伏念某學不知方器非適用少修素業惟知讀先父之書壯忝末科亦嘗起當時之志但欲仕途之平進恥為俗士之詭随猥縁假吏之行謬辱名公之舉逮其當軸許以曳裾方文武並用之時有賢愚同滯之歎薫蕕既異軌轍遂殊碌碌不為頗慕望之之從志寂寂為爾自甘鄧禹之笑人豈其若將凂焉政自不得不爾集君卿五侯之味深所不能奉南豐一瓣之香徒懷自信惟集賢之門無雜賓以進故小人之身為衆怒所歸獨念由銓選而仕京都初非有援滿吏攷而為帥屬止以為貧雖造物有意于提撕而揣分但甘于静退内省不疚浮議何傷克盡力于公家庶可逃于吏責忽傳印綬之解是為薦紳之憂欲留孔戣固已難伸于末議不負臨賀詎知反蹈于危機祠官實匪其本心化筆幾成干誤墨襥被而去杜門自怡追惟平生最號多蹇孤苦獨立險阻備嘗當此流離之時尤為災禍之㑹鼔盆之念未歇陟屺之悲已深是知膠西之行雖曰公孫之力也若夫江濱之溺豈亦子厚所為耶盡捐怨天尤人之私益廣安時處順之説數年于此寸進何言駸駸婚嫁之逼人擾擾啼號之塞耳稍収魂魄再整冠裳幸逄萬物吐氣之秋寧忍一人向隅之泣用持鑛質來就洪鑪茲盖伏遇某官得時致君以道濟物卓爾聖朝之柱石凜然王佐之規模陛廉日尊藜藿為之不採威望所及草木亦皆知名惟上臣之用人無一夫之求備哀窮悼屈觀過知仁顧如貿貿之來似匪悠悠而進念千里識韓之日初不知蒙眷之由而一緘薦禰之書已大有吹生之意矧是政機之親秉實為善類之所依遂令久鬱之情居有求伸之願適㑹槐庭之虚席共期楓陛之拜麻廣厦萬間將随燕雀之賀靈丹九轉願同雞犬之昇攻媿集卷六十四欽定四庫全書攻媿集卷六十五宋樓鑰撰啟代通王明州佐啟恭審光膺一札移鎮四明加延閣之清華示雄藩之風采自聞成命已播先聲恭惟某官學造聖涯行為世表韋編竹簡讀殘萬卷之書玉斚瓊彛壓倒千人之筆才出于天人䇿上名冠于龍虎榜中蓮幕掄才未舒婉婉之畫蘭臺選士已聞衮衮之登立螭陛以書言接鵷行而布武俄分郡寄遠暢王靈以黄霸神明止著循良之譽雖子游文學無闕政事之科未有以千載之通材兼一時之要任直節在庭臣之右治最為天下之先飽聞兩地之生靈自樂二天之庇䕃惟時鄞水實近行都海三埀地綿千里清朝偃武久無烽火之驚潢池弄兵或恃風波之險近禦狗偷之盗遠防虎視之隣必欲得第一流以之為二千石忽聞鳯詔更畀菟符宿姦甚落膽之憂罷俗有息肩之望帡幪伊爾桑梓知歸便道過家大似衣買臣之錦近臣還闕豈惟得子敬之氈行據要津以前大用某夙蒙異顧近别台躔豈知閒冷之身復拜熒煌之座曽是堂前之燕知故壘之可依自憐屋上之烏因丈人而亦好代陳福州陳丞相俊卿啟上公分陜聿嚴帥閫之雄寒士依劉叨處貳車之任爰通名于下執喜托跡于洪鈞恭惟某官百代偉人兩朝元老負特立獨行之氣堅任重道遠之心奥學淵源根六經而排百氏忠誠挺特貫三光而洞九泉當天開地闢之秋遇雷厲風飛之主臣作股肱耳目備宣輔贊之宜爾為麴蘖鹽梅尤著燮調之效維持國是進退人才士夫喜公議之有歸中外知王化之將復功成而退道大不容麾分十國之連地控七閩之要故鄉在望何殊朱賣臣衣錦之榮盛徳若虛肯為蘇季子佩印之樂經綸未究威望益隆公尚居東行見衮衣之復席方虚左重膺玉鉉之求某學術荒疎惟資凡下遲頓不能以及事容貌不足以動人良弓之子必為箕粗守傳家之舊吹竽之門而攻瑟自憐應世之乖念平生願上于膺門而今日得游于儉府趨風伊邇撫已知榮駑馬加鞭倘緩一時之驅䇿頑金躍冶尚希他日之陶鎔潭府靖深暑風清閏願體冕旒之眷茂加茵鼎之調代謝葉丞相衡奏門客恩澤啟孤蹤何取妄干鳯閣之元臣洪造不遺俾于龍門之下客生成有自感戴惟深伏念某一介寒儒半生苦學蹉跎場屋徒堅鐡硯之心荏苒嵗時有愧青箱之業家惟四璧之徒立野無二頃之可耕重念嚴君久為漫仕心勞王事嘗抗塵于三紀之間位亞郎曹竟賚恨于九泉之下弟兄孱弱門户羇單記先友于碑隂孰是金蘭之舊候舍人于門外頓驚霄壤之殊敢期當路之知不忍向隅之泣念子路為曽參所畏固知事契之深有山公則嵇紹不孤尤覺義風之厚假以手援之力開其寸進之階是何遭逄獲此成就茲盖伏遇某官夙髙耆望光輔昌辰雷厲風飛君臣相遇于千載天開地闢日月可兾于中興方將任使于賢能顧豈遺忘于微賤至而不肖亦使有成某敢不俯激懦衷仰酬恩紀便當銜袖以上先壟且將藉手以戰文場黄壤有知豈無結草之報青氈如在敢忘推轂之私代通薛通判鳯啟庠校帥儒兩著佐州之效塵埃俗吏方為學邑之行獲在下風豈勝幸㑹恭惟某官性資沖静經學通明文字五千𣺌波瀾于筆下雲夢八九忘芥蒂于胸中早収俊造之科徑躡清華之武先生入太學久居賢士之關博士伴雙旌乃為刺史之半公論甚鬱髙懷自如登臨洪府之江山嘯詠爛柯之風月撫摩凋瘵關決是非似聞五月之政成多賴貳車之力贊龎士元之展驥其可再乎班景倩之登仙行且升矣某么微晚出蹭蹬半生頃辭箠楚于尉曹復較錐刀于征筦貳令海邦之表脱身選路之初任花縣以無堪驚𤓰期之甫及尚祈加惠俾免曠官非曰能之姑試鉛刀之一割所可恃者正依廣厦之千間代通劉湖州啟建牙三輔誰無附驥之心涉筆一同乃有登龍之幸敢修竿牘仰徹齋鈴恭惟某官聞望雷霆文章河漢穿天心出月脅英詞侔造化之工嚅道真泳聖涯奥學究誠明之蘊周旋中度左右逄其源厯窮千古而若在目前覽百家而不專紙上羲文既遠尚有言傳釋老雖殊皆為我用惟其蓄于中者厚故其發于外也閎入仕皇都聲動百寮之底出臨壯縣治髙三異之書惟聖主以斯民為先而中興視循吏之盛大襃卓魯徑躡龔黄越觀二十載之間不過三數人而止久難其選今見我公矧茲苕霅之區是曰股肱之郡白蘋泛月想神仙窟宅之深皁盖頒春稱師帥風流之美來紆丈二之組密依尺五之天課􅆟易聞上心素簡丈夫功濟四海尚鬱壯猶刺史入為三公更觀盛舉某初無他技早預一官徒堅鐡硯之心猶負金籯之訓典閩山之醝務俄閲十年充檇李之法曹媿無三語轉丞茲邑獲居是邦方涓日以載塗行束身而受察豈惟庀職于吏師之側抑將横經于政學之餘哦二松之間敢言公事而姑退得廣厦之庇庶幾寒士之俱歡代通趙郡王伯圭啟瞻帥閫于瀛壖曽以部民而修敬望齋旄于澤國更容邑吏之趨風肅貢朋緘豫通下執恭惟某官璇源毓秀嵩嶽儲神東平之在漢京為善深知最樂汝陽之居唐室退朝端若無憑宛然韋布之流籍甚搢紳之望惟親賢之並眷宜富貴之逼人寓直西清屢拜兩宫之雨露疏封南服不移十載之旌戲清和兼惠夷之風畏愛如衰盾之日潢池赤子之威名于鯨海之深大舶賈胡傳政譽于鷄林之遠樂苕溪山水之勝奉珍臺香火而歸濯纓而賦滄浪闔門而養威重四子之官二千石用昭盤石之宗列侯之印十九枚式廣維城之助雖有蒼生之徯望不妨緑野之雍容胙新鄭之真封分閬中之巨屏櫜兜㦸纛益嚴亞保之多儀衮繡貂蟬入侍合宫之盛禮寵光有赫福履難量某早預一官本無他技典閩山之醝務俄閲十年充檇李之法曹愧無三語茲叨貳令又獲登門梓里有光復見魯公之拜後棠隂未改尚歌召伯之去思自念孤蹤適逄幸㑹矧是典刑之舊願承土苴之餘哦二松之間敢言公事而姑退得廣厦之庇庶幾寒士之俱歡代通李都大啟髙山仰徳久欲事于賢大夫冷局效官幸獲依于部刺史迹雖殊于兩地庇實托于二天敢因告始之恭少見投誠之素恭惟某官風儀岳峙徳量淵澄才兼文武之資學究天人之際義嘗許國忠不忘軍決䇿請行不獨在十九人之列論功頒賞已足稱五千騎之賢成桃李不言之蹊堅松柏後彫之操爰受朱幡之寄入趨丹陛之嚴宣室受釐謂賈生久不見矣中朝召對歎徐樂皆安在耶亟示睿恩俾遷輔郡擁麾出守屢宣愷悌之仁攬轡觀風端有澄清之志眷貨泉之至重移使節以按臨盡収數路之權悉總三官之利錢流于地貨積如山已書朽貫之功即聽召環之命某濟南冷族海内腐儒䇂苦半生甘在百寮之底﨑嶇末宦濫參九府之司豈期樸􅈪之資獲在帡幪之下純金無用尚期良匠之鈞鎔躍冶不祥敢覬洪爐之造化代謝知潮州啟曳裾東閣載瞻元衮之光華剖竹南州復預大爐之造化寵驚神悚感極涕零竊以在廣極東以掲陽為列侯自唐而後有昌黎之遺風置鄉校以教千里之民驅鱷魚以除百世之害坐使蠻夷之地一如畿甸之間惟我皇家尤重邉徼正當擇士以職承流如某者踸踔無堪嶔﨑可􅀏紹弓冶之餘習綴搢紳之後塵兩地監征力較錙銖之利六年學邑備宣朱墨之勞雖無健吏之聲稱頗究生民之利病頃罷邉城之佐首干上相之尊得倅宛陵忽坐遭于擯斥奉祠梓里亦久就于休閒孤迹若萍歸棲何所仕途如漆跬步而登悵毁譽之交攻驚鐫黜之四至息黥補劓苟逃城旦之書滌慮洗心敢賦大鈞之問㑹中興之英主復圖任于真儒自憐香火之散官曽是門牆之舊物念丘山之莫報幸溝壑之未填尋故步于鈞墀仰勤三握髮三吐哺之禮訴危衷于洪造復煩一舉手一投足之勞俾守海隅以安蠻蜑惡溪瘴聚不妨叱馭以前驅秦嶺雲横何必問家之所在但如僥倖端有夤縁茲盖伏遇某官以王佐才為天子相内以緝熙于庶績外焉鎮撫于四夷虎嘯龍吟弼亮兩朝之治鳶飛魚躍陶成多士之材遂致庸愚亦叨任使某敢不布宣詔㫖撫字民生益遵父教之忠毋怠官司之守興瀧吏之問敢辭行路之八千捐國士之軀庶報龎恩之萬一代謝劉提舉薦舉啟幾邑負丞未展秋毫之效上臣誤聽已形華衮之褒恩重丘山感深肺腑伏念某才如命薄術與世踈忘嘗有志于事功頗亦早親于經學屢操筆硯之習往從場屋之遊良弓之子必為箕有自來矣吹竿之門而攻瑟如不好何衰遲白髪之雙親齟齬青衫之一第賞延于世遂因委質以入官父教之忠粗識律身而奉法念家聲之淪替嗟世緒之凋零敢言隠忍以就功名但欲植立以興門户一行作吏亦知棲枳之為卑再轉為丞寧復哦松之可樂困簿書之叢委驚塵土之昏霾應無窮之求急于星火酬方來之務紛若毛釐但能催科粗可逃責當官動礙于掣肘莅事況多于面牆公家之利無不為誰為知已君子之仕行其義求無媿心曽微片善之可書敢兾當途之肯舉仰鄉閭之先達方彭彭持使者之車憐上世之至交猶戀戀有故人之意夫何么麽適隸按臨忽傳一紙之春風為振孤生之寒色周章拜賜俯僂知歸茲盖恭遇某官識量恢洪風度凝遠北宫黝之勇一毫弗挫于人栁下惠之和三公不易其介聲猷籍甚節義凜然攬轡近畿起澄清天下之志推轂後進稱品題人物之公廣務搜羅誤収庸瑣某敢不飲冰勵操結草酬恩鮒轍可憐方賴激西江之水鵬程欲起更祈借北海之風代賀王詹事十朋啟恭審顯膺宸命擢處宫端朝廷益増國本増固凡在紳緌之列舉深抃舞之私恭惟某官學探精微氣全剛大聳公台之望于庠校談經之曰吐廊廟之言于殿廷射䇿之初結知兩朝傾譽四海堂堂不撓豈惟近古社稷之臣諤諤以昌信是當今諫諍之選進以禮而退以義用之行而舍之蔵四擁隼旟掩漢室龔黄之迹一登鶴禁追商山園綺之蹤朝廷固喜于得人公議咸期于且相弼諧審諭方資李文紀之忠清輔贊彌縫㑹致房𤣥齡之事業某薾然無似少也何知備更州縣之勞幸脱譴何之域貳車來止方將掃齊相之門召驛趣行莫獲為李君之御敢馳賀牘少見忱衷尚期茵鼎之調仰副冕旒之眷代通薛尚書良朋啟拜棨㦸于黟山當辱老商之一眄駕屏星于梓里幸依夫子之仞牆俯已知歸陳誠敢後恭惟某官身兼數器才出萬人深造道真傳伊洛淵源之學發為詞藻追舒向金玉之文自結上知遍儀清貫談􅀏不妨于剸劇切名自覺其逼人握節擁旄外著廉平之績簪筆持槖内為侍從之臣凡建明遇事而敢言宜寵遇在廷之莫及盡四方而屬望期兩地之問津聽履而上星辰忽驚勇退把麾而去江海徑作賦歸周旋泉石之間盤屈公台之器謝傅東山之志寧久遂夫髙懷賈生宣室之思行即膺夫迅召某生平無似門下所知自幕府之終更叨貳車之承乏十年徳施未知圖報之階一代吏師喜有趨風之便始茲洗印未及掃門沈侯方賦郊居輙通名于記室龐公倘入城府期雅拜于前塵仲夏清和燕居優暇願調鼎食以候鋒車代賀趙明州伯圭啟恭審課績上聞為南國諸侯之最寵光下被進西清學士之聫曽何異登瀛之榮又以顯維城之效恭惟某官為善最樂大雅不羣風流追配于古人被服必先于儒者天潢近𣲖于周為魯衛之親帝胄竒才在漢擅間平之譽號宗藩之儀表為聖世之豪傑海沂歌别駕之功丹丘著剖符之烈眷深于上進不以親奉夫人之輿創聞盛事送列侯之印獨被殊恩睠二浙之奥區有四明之佳郡地綿千里海三垂浪舶風帆萃卉服獻琛之利蜂屯蟻聚有潢池弄兵之虞必得升卿以當錯節正須龔遂來理亂繩既易地以䇿勲果自天而渙號賜金増秩爰示寵于侯邦簪筆持荷徑聞津于政路幾京師之蒙福見城郭之生輝坐令風濤萬頃之間隂受刺史二天之庇命召公而江漢化已知治效之優得李勉而朝廷尊行聽召音之播某戴恩最厚仰徳方深側聞二千石寵數之頒實同十萬户驩心之劇恨官司之有守望賓廡以無階燕雀賀大厦之成喜得營巢之地騏驥騁夷途之逸豈無附尾之心代上吕鎮江啟憔悴餘生幸叨末契風波千里敬謁明公敢陳迫切之愚仰溷髙明之聽雖云無因而自至詎敢亡説以為先竊以文舉不羇妄謂李君之有分山公如在定知嵇紹之不孤載在信書以為盛事盖先契者古人最重而高誼者叔世所艱不有豪傑之人孰振頽靡之俗恭惟某官量吞四海氣壓萬夫夙懷公輔之壯猶早屈功名之竒志釣潢渭水世傳柱石之勲取日虞淵身預風雲之㑹獨有用之學兼濟非常之才精忠上結于主知儒術下飾于吏事發硎游刃未見全牛錯節盤根久知利器總軍儲于邉徼仰分西顧之憂守留籥于行都更任東釐之寄惟京口之巨鎮控天塹之要津坐肅未幾卧治自若已聞政績之上達側聽召音之鼎來立懦律貪以名節而自任哀窮悼屈崇風義以獨高寒士赴之如歸羇人倚以為命矧在門牆之舊尤祈甄冶之収伏念某身與萍浮命随葉薄紹箕裘之業不能自振于家風厠簪紱之聨徒以猥縁于世賞羇蹇加人數等流落在天一涯憂患相仍不及養親之三釡飢寒復迫焉能餬口于四方比参醝局之僚越在瀛堧之表方苟升斗而自活未容尺寸之暫施適承弊政之餘例有譴章之及二年于此十口無歸雖嘗知安分之言亦能誦固窮之戒然而比之顔氏既無負郭之田較以淵明更乏儲瓶之粟不求濟于旌麾之下是自投于溝壑之中重念某大父獲㳺相君之門最䝉知遇先人亦為藥籠之物屢辱生成恩紀未酬存殁知感迨宵人攝職于越邑遇明府弭節于舜江蹤跡雖微曽辱步兵之青眼眷私不替間遣使君之白衣是敢仰憑一日之知輙忘三瀆之僭大鵬欲化固將借北海之風涸鮒方危且願激西江之水代通韓總領彥直啟居百僚之底雖知仰泰山之名輕千户之封但願識荆州之面幸茲末屬預在下風雖擁篲之未遑顧馳緘之敢後恭惟某官雄才冠古壯氣横秋當世家聲功孰踰于八柱國妙齡上第名獨高于千佛經錯節盤根共知利器發硎游刃未見全牛顧大丈夫所以致身惟明天子以為知已乃眷江淮之壤實為財貨之淵萬竈列屯用増天塹之險三軍宿飽正資鞭䇿之財爰擢于貳月卿仍暫煩于星使威名逺暨城池不啻金湯儲庤益充菽粟有如水火當邉隅之息燧肅營壘以無譁非惟操贏貲以佐軍所謂不加賦而足用簿書期㑹豈久為外府之淹朝夕論思行即簉甘泉之侍某伶俜何數結約亡竒少讀父書未䇿勲于筆硯早承世賞偶厠跡于簪纓自紆俗吏之青衫羞見古人之黄卷奉祠庭之香火遽纒風木之悲依幕府之芙蓉又屬沙金之汰朅來上國猥備微官董舳艫之轉輸謹朱墨之出入幸預使令之列祗承約束之嚴得大君子為之依歸庶賤有司安于職守駑馬十駕寜敢憚于驅馳鷦鷯一枝願永棲于芘䕃代謝臨安府通判啟拜赤舄于泰階方深榮幸駕緹屏于天邑遽辱生成退而捫心感至流涕伏念某材如樗散性若棗昬妄嘗有志于功名頗亦早親于筆硯與聖賢對獨躭黄卷之書從場屋游終阻青衫之第强顔宦路刻意官箴兩仕窮邉僅脱微軀于萬死一參下幕幸離小選之七階學邑寧川慮傷美錦分司京口莫試鉛刀比改畀于除書俾總提于市𣙜謹朱墨之出入較財賄之有無誓殫一日之長不憚數年之次忽從省汰何所怨尤八嵗三得官莫霑升斗一門四立璧但有號號驚薄命之數竒覺晚途之甚窶顧已往之迹了如蒼狗之浮空閲去速之辰常若白駒之過隙髪種種以如是身遑遑其何之幸宵人未填溝壑之時際元宰方慶風雲之㑹勢殊霄壤契篤金蘭傳好語于西山跫然有喜進孤蹤于東閤歡若平生窮猿方急于投林駑馬但知夫戀棧周旋久矣委曲從之三握三從而謙徳不衰一貴一賤而交情自見官不離于都下職況忝于治中或于多岐初類亡羊之牧未必非福今成喪馬之翁頂踵知歸丘山莫重茲盖恭遇某官為天下宰負王佐才元首明哉股肱良哉適臣主相逄之日受命長矣茀禄康矣佐國家無疆之休大開衆正之門共築太平之址惟賢者在位引類而上臣事君以人凡厥有知誰無附鳯翼之志顧如無似亦叨展驥足之榮某敢不仰戴已知恪居官次飲冰厲操懼為門下之羞結草酬恩敢後古人之報代通李縣丞啟始為刀筆吏愧居栖棘之聨獲逄君子寮行視哦松之樂顧惟幸㑹殊劇懽悰伏惟某官秀毓山川慶鍾閥閱學淵源而有守才砉騞而不留致身于紅蓮幕中舉無遺䇿書名于金閨籍上益著休聲仕不擇地而安丞有負予之嘆立吏行之鴈鶩豈端使然哉造朝列之鵷鴻殆亦非晚矣某江湖泠族簿領下僚父教之忠粗可律身而執贄學失其道徒嗟莅事之面牆疐尾跋胡轉吭觸諱一邑無不當問肯例以嫌三人必有我師願提其耳攻媿集卷六十五欽定四庫全書攻媿集卷六十六宋樓鑰撰書答綦君更生論文書鑰講聞雋譽乆矣茲承恵然肯顧教以長書論文章大體筆力衮衮大過所聞幸甚幸甚鑰少習舉業不過欲應有司之求作吏以來雖粗有意于此而精神多敝于無用宦游往來忽焉半百重以二三年間憂禍薫心偶然不死以至今日舊學本自無㡬益覺荒落尚何足以言此而厚意不可虛辱試吐一二相與質正之來書謂長江東流不見其怪瞿塘灔澦之所廹束而後有動心駭目之觀誠是也然豈水之性也哉水之牲本平彼遇風而紋遇壑而奔浙江之濤蜀川之險皆非有意于竒變所謂湛然而平者固自若也灎澦之立中流或謂其乃所以為平此言尤有深致故樂之未亡也與天地同和可以感發人之良心而其既亡也史紀其精者謂能使人歎息悽愴至泣下霑襟者然後以為聲之妙曽不知哀以思者乃亡國之音所謂安以樂者何在耶清廟之瑟一唱而三嘆其亦異于後世之樂矣妄意論文者當以是求之不必惑于奇而先求其平唐三百年文章三變而後定以其歸于平也而栁子厚之稱韓文公乃曰文益竒文公亦自謂怪怪竒竒二公豈不知此蓋在流俗中以為竒而其實則文之正體也宋景文公知之矣謂其粹然一出于正至其所自為文徃徃竒澀難讀豈平者難為工竒者易以動文人氣習終未免耶典謨訓誥無一語之竒無一字之異何其渾然天成如此文人欲髙一世或挾戰國策士之氣以作新之誠可以傾駭觀聴要必有太過處嗚呼如伊川先生之易傳范太史之唐鑑心平氣和理正詞直然後為文之正體可以追配古作而遽讀之者未必深喜波平水静過者以為無竒必見髙崖懸瀑而後快韓文公之文非無竒處正如長江數千里竒險時一間見皆有觸而後發使所在而然則為物之害多矣故古文之感人如清廟之瑟若孟郊賈島之詩窮而益工者悲憂憔悴之言雖能感切不近于哀以思者乎鑰本不敢為人言言之又極平平視來書豪壯頓挫之氣亦甚異矣人之少而壯壯而老如朝氣之鋭晝墮而暮則歸鑰方墮而將歸欲以當足下之鋭宜其説之不相似然時時讀足下之書以作其墮足下亦味鑰之言以趨于平亦朋友相資之義也豈惟文哉喜怒哀樂之未發與夫平旦之氣顧豈有一毫之不平古人欲寡其過而未能此意安在幸併思之多言媿甚惟足下諒之而已答朱晦菴書鑰伏自壬寅夏間修敬紹興臺治之下伏䝉與進加以宴犒獲侍博約之誨未㡬先生賦歸鑰亦繼遭外艱沈迷憂患後數年赴官永嘉才聞台旆造朝已復還山後知起鎮臨漳俱不得一拜記史之問請違台範遂一紀矣青天白日奴隸知仰歎慕師席無由進拜時得門下所著作誦詠探索尚庶㡬在弟子之列仰惟名徳為一世師表今日端揆而下諸公無不有先登之媿嘗見講筵班退黄夕郎對人浩歎或問之曰好一箇去處吾曹冒處此如晦菴乃不使一來耶鑰學殖荒疎無所可用三入脩門推遷至此進無補于君上退不能寧其親蕪類之詞不足以代絲綸之言孱瑣之資不足以立雷霆之下曰坐針氈未知自免于戾前者表兄陳舎人之子赴楚州户曹一見即言嘗拜牀下䝉齒及賤姓名固已慚愓感著之不暇蔡季通傾盖如故亦言軫記之意晚出何以得此季通定交日淺而得益已多而況得親炙于先生乎諸公方謀以麾節强起門下庶㡬因得伏謁以遂師承之願因季通歸敢此少見悃愊不敢累牘以為苛禮顧雖承顔接辭未有其便或以為可敎欲得警誨使知所歸不勝幸甚易學啓䝉之書反復熟觀無從叩請亦託季通寓下意一二何當摳衣以請伏紙馳誠之切答杜仲髙旃書鑰向者天街一别忽忽四五年兹辱恵書以慰以荷鑰杜門郤掃荷上恩再畀祠禄仰以奉九十之親俯以自適不肖之軀不翅足矣況老態日見夏秋間病足延痛左腕嘗作醮詞云四肢而三痛楚十日而九呻吟其況可知近方稍安九十者其家不從政但當虞侍膝下暇日則以故書遮眼而昏花已不可視細字矣鼓琴足以自娱奕棊可以遣日此外一不以經意來書論出處大致意甚篤詞甚偉佩荷雖深然非所敢當也寄示新詩快讀降歎杜詩集注等書恨未盡見發㣲一編誦之數過卓乎髙哉賢父子真足以發少陵之㣲意非淺識者所及來書云云姑置是事且説杜詩以寄逺懐如何杜之詩韓之文如王右軍之書皆古今一人而已近世士夫水墨積習之工類不甚至唐人多能書歐虞褚薛是其尤穎異者疲精竭神各名家終不足以望右軍閫域若詩與文可以力取而强進之耶詆之為村夫子者固自難言然王荆公以為與元氣侔蓋極言詩之髙致若曰所以拜公像再拜涕泗流正為茅屋為秋風所破歎一詩用意之大東坡謂自是稷契等輩口中語正謂其語似稷契輩爾唐史贊之詩人以來未有如子美者皆極口稱其詩工部之詩真有參造化之妙别是一種肺肝兼備衆體間見層出不可端倪忠義感慨憂世憤激一飯不忘君此其所以為詩人冠冕後人著意形似亦有可雜之詩中而不可辨者至其奔逸絶塵雖諸名公恐未免瞠乎若後此難與不知者道也然儗人必于其倫以言取人先聖所難若直以上比禹稷與孔孟之進退則亦愛之過甚此老如在亦未必敢當鄙見如此更試思之非面言不能究也如中自誅襃妲前輩嘗稱之而陳將軍之不没其實未有人能發此者發㣲如此者非一末篇尤佳歎誦不已又記一二事雖非詩之大節因併及之留花門詩連雲屯左輔百里見積雪以趙次公之詳且博畧不注釋四明舊有卞倅養直圜為注甚詳竟不得其書嘗與之論及此亦止云意其偶有積雪爾蓋花門即回鶻也鑰嘗攷回鶻之俗衣冠皆白故連屯左輔而百里如積雪然不既多乎以此意讀之方覺語意精彩頓别又嘗與蜀士黄文叔裳食花椑因問蜀中有此乎黄曰此物甚多正出閬州杜詩所謂黄知橘柚來極為佳句然誤矣曾親到蒼溪縣順流而下兩岸黄色照耀真似橘柚其實乃此椑也問之土人云工部既誤以為橘柚有好事者欲為之解嘲為于其處大種橘柚終以非其土宜無一活者又云嘉陵江水何所似一本作山水者是蓋嘉陵江至閬州西北折而趨南横流而東復折而北州城三面皆水故亦謂之閬中閬内如河内然地勢平闊江流舒緩城南正當佳處對面即錦屏山蓋山如石黛水如碧玉故云嘉陵山水何所似石黛碧玉相因依真絶唱也此皆前所未聞恐可以助異聞之萬一又信乎不行萬里不可讀杜詩也信筆為報惟為逺業目厚㑹昆仲併道甫問訊為荷答柴殿院之子楙書鑰承長書之貺且示以事目甚詳區區非不知之鑰自叨典選凡滯案至前必究觀之可行則屬使胥輩施行若必不可行求其説而不得則必悉以底藴明告之使知其決不可以倖望息心而歸且曰毋徒為逆旅也是皆未嘗問識不識求盡吾職而已況如先殿院厚徳前輩幸及同朝今見賢子來理遺澤豈不願奉周旋重䝉垂諭不得不詳布之遺表自重官之外舊日惟中奉中散大夫以上方得一名若先殿院生前持服時中奉大夫之告已下未及授而捐館則尚可料理捨此則無説矣何也以為帶貼職朝議大夫與不帶貼職人事體一同則鑰之外祖汪公帶直顯謨閣二十年轉朝議大夫數年而後致仕未嘗敢陳乞遺表恩澤盖無此法也來教所謂一職合比四官不知何所據而言亦所未聞也以為已該唐勘轉中奉大夫之人則苟未授告猶朝議也鑰之親伯父紹興三十二年已下磨勘告未及下而終于朝議大夫亦不敢求遺表蓋告未下則無縁可得也觀尊意所以未能決然者以猶有虞氏之例也亦甞為之求其説虞君終承議郎無可得遺澤之理以其寓直龍圖閣乃在朝請大夫之上想是時有人為之地以其寓直之髙故特與之致仕一名若先殿院所寓之職則猶在朝奉郎之下況已得致仕恩澤而欲以此更得遺表一官求之法例無一而可既必知其不可而不以明告徒使左右乆旅營營則鑰之所不安也病中草草授筆吏以為報切幸加亮答趙共甫書易補音之作所謂鮮不抵掌􅃌為迂闊誠然誠然鑰雅好吴氏詩補音今者皆取其説然尚有當言者如幡幡之下注文用之不盡似有未圓處不若全用或節去不甚親切者如即鹿无虞不叶中字亦可若以音五公謂詩叶蓬豵則上章葭豝又尚何叶此一音可去之詩必有韻易則有不必叶者又不可强通也車之音斤于韋昭之辨只得寫詩補音全文節之意不完難曉艮卦薰心思尋切此不可曉如此則是本音非叶也注中引易林太𤣥乃叶鄰民豈誤音耶小畜象獨富乃取詩瞻卬補音内引老子二項知足者富强行者有志可用如以正叶富呉氏之意不可通不若易之大率古語多韻跋語所謂言出而聲諧辭比而響順不待勉强牽屬而自中音節者極然如聖謨洋洋嘉言孔彰作善降之百祥作不善降之百殃之類甚多只如補音首論服字方悟漢書順天者昌逆天者亡名其為賊敵乃可服作蒲北切方可通耳吴氏以集韻為據而不深攷説文解字之書如碩人盼字注文未為甚當説文盼恨視也从目兮聲胡計切盼詩曰美目盼分从目分聲匹莧切眄目偏合也一曰衺視也乆目丐聲莫甸切三字甚明蓋盼如孟子使民盼盼然眄如老商之一眄又眄庭柯以怡顔以匹莧一切為與倩絢二音不相叶又似太甚若眄則㡬不成字則以不攷信説文之故也姑舉此一端耳江不與陽唐相連而綴于三鍾之後上去入皆然蓋古音江音工謂之轉聲與東通亦有據否有疑處必有攷證方可決然定説不然寧闕之爾毎疑十二齊不綴于支脂之㣲之後而與十三佳十四皆相比乆不得其説後因觀後漢語如天下中庸有胡公萬事不理問伯始五經紛綸井大春之類皆是七字為句而四字一韻下三字一韻若天下模楷李元禮方知楷與禮叶齊之所以近佳皆也非好古者亦不語及此不知者不止謂迂闊而已來教所説屯離蹇乾隨臨噬嗑革卦中諸字今本既叶如王鄭諸家改字不同皆可略而不問如乾之若厲等十二處有不可通者不必强通只如潜龍勿用亢龍有悔見羣龍无首吉雖欲通之不可得也但當採吴氏之説通其可通者足矣如晦菴之説亦及叶韻漸卦上爻以陸為逵雖改經文于儀字卻叶雜卦之末蓋雜而又雜不可終窮自大過顛也而後更不復反對坡公疑之改從反對大非古意觀其韻叶可見非差如歸妹女之終也未濟男之窮也可求反對乎此皆晦菴之説為是若實之從去聲則似未然更湏詳攷此亦未暇入聲之叶去聲恐無此例有則韻皆少差如讀之為讀豆復之為復扶富切覆之為覆敷救切宿之為宿秀無有從其本字之去聲者盡入聲韻中只有厭入厭去二字通用本音卻是實有此二字義又不同實為去聲恐難從也如伸正當為敬比輔也比吉下順從也履艮同人卦首合别著卦名賁彖天文上闕文旅彖兩小亨當是衍來説皆然但流傳已乆不可輕改然亦不可不知也鑰又别有跋語見他紙可用否午暑連日揮汗方能辦此餘不暇及亦不可為不好者道也答徐敬甫書鑰辱示及主敬扁牓艮齋真蹟文昌章公跋語固深歎服然不敢著語者頃竊聞之太府卿王公字正之鑰姑之夫也嘗言此字本翼祖廟諱雖已再經祧遷而在臣子終不當以此為名字及齋室之名張南軒以此為字嚮不以為然鑰又嘗見文潞公帖或勸以為翼祖已入夾室可復舊姓潞公云老夫弼亮四世未敢遽改蓋是時猶是七廟也徽宗朝立九廟翼祖復入廟祏又以為諱後至欽宗祔廟始復祧遷省元錢敬直永嘉人也鑰忠告之遂改易直此不可不知也特臭味相與敢及此切幸加亮答趙郎中崇憲書鑰乆不嗣音正爾馳仰辱書翰以慰以荷䝉示諭濓溪書院尤見政最之餘儒術潤飾甚休甚休謹為冩四字去但谿字當如此寫溪出于陽冰之變體非古也二者俱寫去惟台意所擇濓字有少曲折見之别紙望詳覽九江江古郡于今為重鎮幸有周先生之遺迹表而出之又使士子得以館榖于其下儒風自此愈興賢使君之名與之無窮矣鑰衰瘁求未得尚爾勉强草草修報不究欲言併㡬台察濓谿之濓字書所無鑰少時見林侍郎黄中知江州曾作濓谿祠堂記今想尚有石本便中望以寄示其中亦似説濓字如元次山之􅝓峿浯出于意見近嵗得晁氏參記許氏文字一書以道所編也有云濓徐力鹽反唐力簟反从水从兼徐本曰薄冰也一曰中絶小水唐本曰薄冰也或曰中絶小水又曰淹也或从亷徐本闕濓字接素問夏三月之病至隂不過十日隂陽交期在濓水楊上善曰溓水静也七月水生時也然則从兼者亦古文㢘字非兼并之兼以上皆以道之説徐本謂今世所行徐鉉所定説文解字也以道得唐人本時以校其不同者鑰按素問二十四卷隂陽類論夏三月云云在溓水注溓水者七月也建申水生于申陰陽逆也楊上善云溓㢘檢反水静也七月水生時也唐本既曰或从㢘則非無濓字晁氏之書甚佳止有三冊若因刋之尤佳攻媿集卷六十六欽定四庫全書攻媿集卷六十七宋樓鑰撰書答楊敬仲論詩解鑰蒙示教詩解以病故相仍近始讀竟荷開發鄙陋至多感歎擊服之餘恨未得一遂請益于門下若夫發明無邪之思一貫之旨天人同心大道至平古説難盡信雖載之左傳者亦不可據爾雅亦多誤大學所引亦有牽合詩序多失經意釋文多好異音詩人諷詠或自包于事實制度名數不盡合于禮典先王皆在商世難拘以周禮文王以服事商不應作禮樂如此類未易槩舉皆前輩之所未發者尤用服膺然惟尊意每不自以為足而欲人之言鑰亦不能自已欲効所見試陳其甚明者正欲反覆論辨以歸至當非恃相與之厚非愛此書之深不及此也葛覃毛詩傳曰覃延也其義未安覃本義深也葛葉大而蔓小故墜焉而深下俗謂墜下曰覃徒紺切而廣韻集韻無此字音釋文徒南切方音不同不可知也而謂延也則未安曰覃及鬼方由中國而覃及之則中深旁淺實有覃義實覃實訏后稷之聲深廣也故水中深旁淺曰覃加水以别其字先儒徒因葛推義釋覃曰延然施即延也無乃重複乎大田以我覃耜覃者深也耜宛然有微深之狀故曰覃耜毛傳殆未親見耜徒見易有剡木為耜之義故以覃為利後儒求其説而不獲又轉音為剡又轉字為䎦今正其字義平聲如字覃爾雅釋言流覃也覃延也郭注皆謂蔓延相被及説文長味也从􅳀鹹省聲詩曰實覃實訏徒含切又篆文覃省潭説文从水覃聲集韻一説楚人名深曰潭潭字在六書中為形聲如江河之从水而工與可止取其聲而無義潭从水覃亦取其聲非有義也潭有深義今之言潭潭是也覃欲無深義字書凡有意者如人為為偽人言為信之類皆入㑹意之科王荆公字説所以不能傳者往往以形聲諸體皆入㑹意故有牽合强通之病以葛之蔓延故施于中谷亦未為重複也覃耜之音剡疑是方言集韻以為利耜止以詩傳釋文為據如八月剥棗剥音普卜反荆公以為養老者剥棗之皮而進之後行田野間羣兒相呼撲棗方知釋文之有自來此二覃字更望攷之鵲巢維鳩居之爾雅釋鳥云鳲鳩鴶鵴郭云布榖未安音如布榖者不居鵲巢音如鴶鵴者乃居鵲巢為鸜鵒魯昭公二十五年鸜鵒來巢而公如乾侯此亦假他巢之應也故文成之世已有童謡曰鸜鵒跦跦公在乾侯矧鸜鵒亦鴶鵴之音凡鳥名多用其音埤蒼云鴶鵴方言云戴勝今審究戴勝首有竦毛鸜鵒亦有之而鸜鵒身色黒戴勝身色毼而稍長大豈埤蒼攷之未審歟布榖其音渾然鸜鵒其音亟然穫榖毛毼頭有斑者李氏亦以鳲鳩為鸜鵒多識鳥獸草木之名攷之當如此之詳然鳲鳩之為鸜鵒甚明浙人呼為八八兒川人呼為阿八所謂音如布榖者乃今斑鳩俗謂之步姑其姓雖拙粗能為巢戴勝首有竦毛向後鸜鵒竦毛直上又自不同鳲鳩之刺不壹正謂鸜鵒也郭景純云布榖固已失之歐公言拙鳩極然不知此乃鸜鵒吕氏具載皆未當也簡兮日之方中在前上處將祭習舞以日中為期碩人在前列上處方中將中也碩大也大徳之人俣俣徳容也前輩曾云日之方中則明而易見之時在前上處則近而易察之地君猶不能見況幽逺者乎此意甚切氓于嗟女兮無與士躭士之耽兮猶可説也女之耽兮不可説也耽樂也説解説也今俗説亦以女淫為大醜毛傳云女與士耽則傷禮義鄭箋云士有百行可以功過相補至于婦人無外事惟以貞信為莭然功過相補則士可耽也每疑其害教近得一説無與士耽已是自悔而反正之言盖其初抱布貿絲來即我謀後又以車來則非女之奔之也其言曰始者以士之耽兮故我今日猶可説也若是女之耽兮則我不可説矣如此則得詩之意又免功過相補之害教也兎爰雉離于羅雉文明比君子非為其文明也羅之設所以取鳥獸兎狡如小人爰爰緩行不至觸冒雉性耿介多罹其中世亂網宻小人多幸免而君子多䧟于罪言文明則意差蘀兮此詩凡言女皆指君也女者愛之之辭民勞王欲玉女是用大諌此意尤明又卷阿俾爾彌爾性之類不惟是愛君如古之稱我為朕未至如秦以來分别之嚴也出其東門聊樂我員我自有員姓者吾妻也此説未然毛鄭不解員字疏言樂我心云耳云員古今字助句辭也唐員半千齊州人其先本彭城劉氏十世祖凝之事宋為起部郎及齊受禪奔元魏以忠烈自比伍員因賜姓員古無此姓也況此詩解内云陸徳明以爾雅云徂存也牽合上章思存改且作徂甚無謂也且語助也于義自通何必牽强又改字以此知員亦語助耳侯人維鵜在梁不濡其翼不濡其咮鵜鶘啄長尺餘頷下胡大如數升囊羣飛入水食魚今也在梁不濡其翼咮長如此而亦不濡是當食魚而不得食喻賢者宜得禄而不得禄歐陽氏曰此鵜當居泥水中以自求魚而食今乃邈然髙處魚梁之上竊人之魚以食而得不濡其翼咮如彼小人竊禄于髙位而不稱其服也鵜不當以喻賢者不若歐陽氏之説為長不遂其媾小人富貴縱肆好色淫恣而棄其婦媾婚媾也毛氏曰媾厚也張氏曰不遂其媾不稱其寵待也今人謂遂意亦曰稱意薈兮蔚兮南山朝隮婉兮孌兮季女斯飢董曰集注作嬒蔚文也南山朝隮蝃蝀也人莫敢指者乃隂陽交感不正之氣南山喻在高位朝隮喻淫縱淫縱者惟其意所溺固有其妻雖婉孌而自不説者如衛莊姜雖美而不見答盖不樂于靜正而放于情慾季女者年少之義以其未嘗相親如不為婦也故曰季女不説之則失所至于斯飢矣張氏詩曰林木南山薈蔚時工斤樵斧兢朝隮舉知趨利青㝠上不念幽居季女飢陳氏曰壯者趨利于山則弱者餒窮于室小人肆志于上則君子困窮于下張陳二説雖未必盡得詩人之意然其説猶雅馴今為一媾字一嬒字又婉孌季女遂生此説然朝隮實非蝃蝀也彼蝃蝀之詩首章曰蝃蝀在東莫之敢指故次章曰朝隮于西崇朝其雨至今朝日在東則虹出于西夕日在西則虹出于東鮮有見于南者且此詩初不言虹而徑以朝隮為蝃蝀則不可既曰季女如有齊季女而曰如不為婦亦覺費辭若以南山喻髙位朝隮喻淫縱亦不成詩語宜有以更之七月一之日觱發二之日栗烈觱發者寒氣勁發萬籟盡鳴如觱栗也野俗有語籬端吹觱栗謂烈風吹籬端之虚管作聲也栗烈者丑月寒氣益烈人股戰栗也毛傳謂栗烈寒氣也其以是歟毛氏曰觱發風寒也栗烈寒氣也王氏曰風而寒尚非其至也無風而寒于是為至只如此説足矣觱栗乃胡樂一名悲篥一名笳管羌胡龜兹之樂也其聲悲栗胡人吹之以驚中國馬後世樂始譜其音以為衆器之首周時安得有此俗語尤不足取股戰而栗漢人始有此語二之日鑿氷沖沖鑿氷之時擇沖和之日慮寒氣之傷人也豳公之愛民如此毛氏曰沖沖鑿氷之意孔氏曰沖沖非貌非聲故云鑿氷之意左傳曰深山窮谷固隂沍寒于是取之豳尤寒盛冬安得有沖和之日不如只從毛説東山鸛鳴于垤婦歎于室毛傳曰垤螘塚也將隂雨則穴處先知之鸛好水長鳴而喜也孔疏曰將雨則螘避濕而上塚鸛鳴于垤詩意與零雨其濛同婦歎于室聞其夫將歸感傷而歎也毛公齊人必自知之解不甚詳孔疏亦未明皆不見于垤之義惟胡徳煇珵蒼梧雜志言之最明云新經釋鸛鳴于垤謂垤為丘垤非螘塚盖荆公未嘗到山東螘塚有極髙大者如塚墓然每天將雨則鸛集螘垤而鳴螘知雨鸛喜雨以其類也方説得于垤字分曉正以雨將作故婦歎于室如殷其雷之意正念其勞也若我征聿至自在下句婦歎于室意聮于上孟子所謂丘垤以是知丘是自然髙處垤乃螘塚下王洪盤馬于螘封亦謂此也狼跋老狼有胡進則躐其胡退則跲其尾周公欲進則成王未授公以政如狼跋其胡欲退則又深念民人社稷之重欲退不可如狼㚄其尾周公雖進退不可亦何至如狼之跋㚄故程氏有云狼獸之貪者猛于求欲故䧟于機穽羅縶前跋後㚄進退困險詩人取之以言狼之所以致禍難危困如是者以其有貪欲故也若周公者雖在危疑之地安步舒泰赤舄几几然也又云先儒以狼跋㚄不失其猛與周公不失其聖猛奚若虎豹胡獨取狼也詩人比興以類是以香草譬君子惡鳥譬小人豈有以豺狼興聖人乎程氏之説美矣然詩中無機穽之意猶未為盡也嘗得其説于蜀人楊少卿民望云狼之遇人先旋遶于人之四旁甚疾人為之戰懼自失然後食之詩人盖以狼之跋㚄比四國而周公處其中不懼也此説最為得之常棣儐爾籩豆飲酒之飫兄弟既具和樂且孺妻子好合如鼓瑟琴兄弟既翕和樂且湛孺有柔義兄弟既具猶曰皆在于是和樂且柔孺言辭氣柔巽也其妻其子情好合同言夫婦父子和順孝慈如琴瑟之和毛傳曰翕合孥子也湛和樂之至此解亦平然説詩意未出此詩極言兄弟之間如伐木極言朋友之間前章引陳曰兄弟之急難相救助如此及其既安寧乃謂兄弟不如友生乎此正詩之本意也此二章言凡人以儐爾籩豆飲酒之飫為樂若兄弟既具如謂兄弟無故其樂又何止籩豆飲酒而已其和樂又且如孺子之真情如孺慕之孺有不可解于心者凡人妻子止以好合尚能如鼓瑟琴之和若兄弟翕合而無間其和樂不足以盡之又且湛矣如湛酒湛色然如此方見詩意六月棲棲六月建巳之月也棲淒也淒淒有泠意時有麥秋之寒也毛氏曰棲棲簡閲也蘇黄門曰棲棲不安也李氏曰與論語栖栖同注栖栖猶皇皇言其不安也雖未為定論然以為棲棲有泠意麥秋之寒則不可俗諺云江南兩浙春寒秋熱若中原北方則立春便温和入夏便熱入秋便泠冬則極寒宣王在西周四月豈復有泠也車攻不失其馳舍矢如破惟善御者兩驂不猗雖馳而一無所失此一段不盡其義蘇黄門曰四黄既駕兩驂不猗御者之善也不失其馳舍矢如破射者之善也盖不善射者必待御者為之詭遇則獲故王良為之範則嬖奚不能獲一惟御者不失其馳而舍矢如破方見射者之善不惟此詩意明孟子一段亦皆焕然吉日既伯既禱毛傳曰禱禱獲也禱未必為獲也云云禱者禱其無傷人也弓矢驅馳之間或偶傷人故禱歟毛以禱為禱獲固已贅矣此謂禱其無傷人亦未為的當將田而用馬故禱于馬祖不必専為獲亦不必専為求無傷人與廄焚不問馬之意不侔漆沮之從禹貢雍州漆沮既從從者從入渭水然則天子之所其在渭漆沮之㑹歟漆沮既從禹貢自説治水此詩自説從漆沮驅禽而至天子之所似不必泥此從字庭燎毛傳曰庭燎大燭也云云秋官司烜氏凡邦之大事共墳燭庭燎故書墳為蕡鄭司農云蕡燭麻燭也然則與庭燎有異焉今俗曰盆者庭燎歟麻滓也音詵毛傳以為大燭未安今説亦未安乃麻餅毛謂大燭司農謂麻燭皆是也古者如男子夜行必以燭童子隅坐而執燭又如顔叔之秉燭非如今之蠟燭也凡㸃火而明者如麻骨樺皮松明之類可以照者皆謂之燭今祭祀所用庭燎以麻骨一大束立于地而然其上照耀一庭故毛謂之大燭司農謂之麻燭卻非盆也斯干如跂斯翼如鳥之跂立而張兩翼鳥首如棟甍兩翼如二霤孔氏曰如跂如人跂足直立若如今説下三句已言如矢如鳥如翬矣不應又以跂為鳥之跂不若只用舊説如人之跂立翼言其翼然不必謂鳥之翼也小旻人知其一莫知其他不敢暴虎不敢馮河此固膚近柔懦之士所執常論然而人知其一莫知其他不知聖智所及當大有為亦無所懾但聖智雖不懾亦無慢易忽略而亦戰戰兢兢范氏曰人皆知虎不可暴河不可馮而不知小人之不可不畏臨深履薄懼之甚也此説似勝不必更加委曲也小宛交交桑扈率塲啄粟哀我填寡宜岸宜獄握粟出卜自何能榖桑扈名竊脂食肉之鳥也云云今不得食而率場啄粟喻食肉富貴者今猶失所困乏而況于疹病孤寡貧弱之徒宜其尤甚于入犴獄也云云民窮苦握粟出卜問曰何自而能榖善耶此章言貴賤皆困窮前輩大率如此説意既不屬亦覺其言泮涣桑扈竊脂爾雅釋鳥自有兩義非名竊脂也其曰夏鳸竊𤣥秋鳸竊藍冬鳸竊黄桑鳸竊脂棘鳸竊丹者竊皆訓淺注竊藍青色然則竊脂謂其色淺白也其前又别有兩句云桑鳸竊脂鳭鷯剖葦注云食肉好盜脂膏蘇黄門古史序有云聖人之不為不善如騶虞之不殺竊脂之不榖小宛正謂此竊盜脂膏之義此章盖言遭誣䧟而無告者桑扈食肉而謂其率場啄粟可謂是非顛倒矣惟其填寡宜乎䧟于岸獄也此事甚易見試握粟以卜之謂握粟以試桑扈彼何嘗能食榖乎言是非在目前分明如此而上不能察若以為卜筮之卜則意差矣何人斯維暴之云詳觀是詩非刺暴公也刺其從暴公者也此詩之序必有所傳詩不言蘇而序言之一詩中只有維暴之云一句不知果暴公否鄭氏以蘇暴皆畿内國名孔疏云蘇國在河内温縣是東都之畿内也春秋為公者多是畿内諸侯徧檢書傳未聞畿外有暴國今暴公為卿士明畿内此説亦不定記得鄭漁仲曾辨此云周之畿内無所謂暴者更當攷巷伯㨗㨗幡幡幡幡者隨風翻覆反覆不定之狀如此幡幡誠有反覆之意然謂之隨風翻覆則是今釋道所立之幡也恐古無此秦已有幡信之書未知幡信起于何代更攷北山或王事鞅掌在腹曰鞅此詩士子其職卑矣其鞅在掌方駕車馬故任此勞故世以煩勞為鞅掌毛氏曰鞅掌失容也孔氏曰鞅掌煩勞之狀只湏用孔説今説頗迂韅靷鞅靽皆在馬之身惟轡則在御者之手鞅既在馬腹如今之肚襻不應在人之手掌也陸機草木疏機當作璣非晉之陸士衡也吕氏讀詩託皆作璣又答論易鑰何敢言易間有聞見輙以一二求教兹蒙下問以口耳之所得録呈恐可以少裨聰明坤元亨利牝馬之貞坤利牝馬之貞説者止謂取其順爾曾不知聖人取象皆曲有妙理禽獸之牝者皆順惟牝馬之性最貞㳺牝率以一牡引十牝雖雜以千百苟非其偶他牡犯之則踶齧不可近坤之卦雖主乎順惟其能貞乃成地道故曰至柔而動也剛至静而徳方也妻道臣道豈曰順而已哉答張正字論莊子書鑰比自同朝初欲相親而未能髙才飽學深蔵若虚亦不可得而親也後始得稍稍承教蒙以莊子講義借示遂得以窺見素藴每切感歎謂請益未艾也忽爾去國為之恍然亟令傳寫元本九冊謹以納還伏幸視至聞尚留闗外無由執别尤增悵惘平時讀蒙莊之書安能如執事用功之深士友來言處得喪之際鼻間栩栩則造詣可知略閲講義開發為多然亦有一二鄙見疏之别紙更望示誨治萬里之船何時可行尚容别布今之隠几者非昔之隠几者也郭象云子㳺常見隠几者而未有若子綦也非也講義略之此意甚妙方子綦隠几而臥未有以異于人也仰天而嘘嗒焉似喪其耦則講義所謂超然萬物之表而萬物無與為對者也隠几雖自若忽然有覺則今之隠几者别是一人非適之隠几者矣昔有適也故子綦善其問且曰今者吾喪我吾遇天難講義云天難注與疏皆不解安易雲雷屯剛柔始交而難生動乎險中則天造之難也竊尋上下文恐不為此前曰天忘朕耶後又曰天降朕以徳則是雲將謂鴻濛為天矣講義亦云雲將再見鴻濛而謂之為天盖天其施也前則雲將三問而鴻濛曰吾弗知又三年願聞一言而鴻濛遣之使歸不盡告也故雲將曰吾之遇天可謂難矣故願聞一言而鴻濛始告以心養等言不必求之屯卦也以瓦注者巧以鉤注者憚以黄金注者昏講義云以操舟博塞明之又云博塞之事以瓦注為戲則得失之心忘而其智巧以帶鉤為注得失之心漸重而憚以黄金為注則得失之心愈重而昏今之博者謂所出錢物為注王冀公所謂以陛下為孤注是也然莊子前此説操舟本無博塞之言而博者亦不至以瓦為注盖注者抵擲也謂如玉抵鵲金抵竈之類試欲抵物以瓦抵之則巧以鉤抵之則已有憚心以黄金抵之則必不中此所謂外重則内拙也鉤亦刀之異名如吴鉤是亦不必帶鉤也答徐丞適書鑰比為從弟致謝承報章甚勤且蒙示恵忠壯公事實伏讀不勝歎仰靖康之變死事者寡世以為恨迨五路之失執節守義者衆人以為闗陜多豪英而然若忠壯生于大未而忠勇兩盡是無待而興者也馮通奉之狀之誄范君之傳皆能以雄文發幽光足以傳不朽矣惟後篇稱蕭參政奏請者乃王仲言明清揮塵第三録第二卷具載此文自竊惟國家而下至少厲偷俗之弊則仲言所見而失所著人姓氏者也自此紙頃歲而下至有道處士迥之兄也則皆仲言所述也蕭參政臨江人恐或者謂李邈是其鄉人而為此奏是又不然此文之作盖是朝廷未知三人之時據馮公之狀建炎三年十二月忠壯死事明年賜諡贈節度而蕭公乾道始仕于朝為宫教至淳熙始居言路登政府不應始有此奏今當易去蕭參政某奏請六字而改題云王通判明清揮塵第三録則為得之恃臭味相與不自外如此若更以程北山所作誌銘編入則尤為全備也併㡬垂照攻媿集卷六十七欽定四庫全書攻媿集卷六十八宋樓鑰撰書上宰相書代叔父某聞天地之所以為天地者無私也而人或見其私盖其生育長養以為事有時乎私而實非也寒冬沍寒萬物憔悴春回自東一元磅礴于太空而一草一木咸有生意造物未嘗私也間有朽枿枯株雖無萌蘖之生而其根荄餘潤猶未自絶于造物者一元之氣必且為之融液浸潰費施生之力而不憚雖其生獨後于衆卉而終亦不在造化之外故人或疑造物之私于此而不知其非私也恭惟某官弼亮兩朝經略四海巍巍勲名與嵩岱齊聚精㑹神仰贊聖天子治内治外之務方且收拾人才躬周公吐握之勞視平津東閤為不足道挾鑪錘以造化天下人物正如一元之運行無有偏頗當是時而有匹夫匹婦之失所是當春而有寸卉之不萌也敢不投誠于造化而俟其生成哉某受才最卑賦分最蹇入仕三十餘年歴州縣者七任兩宰劇邑一佐邉郡雖綿力不足以為國家使令而父教之忠粗知亷勤以自守庚辰之春仰于光範之門蒙大丞相恩造俾倅宣城方且自喜萌蘖之得生日望成就而需次之間有報罷之命今日之來其窮甚矣正猶朽枿枯株大費造化之力大丞相秉化鑪于上枯者吹之使生肯使某遂老於窮哉寒谷之黍彼吹律者猶能使之長而況造物者乎願大丞相擴無私之造使萌蘖于今日而備用於後雖吹之嘘之若私于小物而亦豈有累于造化哉天地不可報之恩猶當糜捐以報萬一上宰相書代人天地萬物惟其時而已矣聖人作易幽贊神明然于卦言時必大其義用是知易之作亦明其所謂當其可之時以示後世後世好言機而不及時以為機即㡬也竊以為不然聖人言㡬而不言機盖㡬者動之微而機者事之要後世之所謂機者似時而非也言機即近于人為氣象迫促惟恐失之時則出乎自然者我心休休庶績自達天何言哉四時行焉百物生焉四時自行百物自生天則付之于無私而已一草一木華實各有其時或先之或後之妄者以為奇為瑞其實則反物之妖也天之于物尚爾而況于人乎宰相操造化之柄區區然欲以智力運元化則亦勞矣故當觀萬物之變而聴其時之當然我之用舍時也事物之芸芸于前者亦時也推無一夫不被澤之心以待天下然其自窮自達自進自退若不由乎我而惟物之時之聴夫然後不煩智力而王佐之氣象見矣方今聖賢相遇千載一時神㑹氣合此豈可以人為求之耶相公上佐天子下理萬務四海之求于相公者一一以智處之則且將不勝其應究極化原在乎坐以觀萬物之動植隨其時之可而應焉此相公之所以大也某何為者曩者猥叨龍虎榜之下陳則固已為今日張本屢拜下風誤蒙知遇相公之欲提撕于衆人之中乆矣有其志而未有其權有其權而或非其時故某辱在泥塗雖知相公之不遺微賤而不敢有求于相公之門相公秉鈞當軸二年于兹矣而某適在心制中杜門海嶠實不敢求聞達于時今者收召魂魄彈冠而掃門相公一見便有曲成之意兹非某之時乎敢誦言所聞于平日者以獻古人云君相造命雖曰造命非時不可今日則真可以言命矣惟相公矜而進之某如蟋蟀之秋吟非敢鳴其不平也時焉當鳴盖有不容自已者干冒鈞嚴俯仰俟命上蔣參政書代范孝隆某聞君子之所以得人心者能以天下之心為心而以吾之心為天下之心天下之溺何預禹事禹豈無一席之地以容其足哉而其心視天下之溺猶已溺之也天下之飢何預稷事稷豈無一飽之計以充其腹哉而其心視天下之飢猶已飢之也二君子孜孜汲汲罄竭以拯天下凡能以天下之心為心而以吾之心為天下之心也公卿世家為之子孫者孰不願自植立以振門户其願之從違係乎子孫之賢否然此心則人之所同也夫己欲立而立人己欲達而達人吾夫子以為仁人之用心況夫己已立而人或未立己已達而人或未達仁人見之得無動心乎恭惟某官懐絶世之才輔之以碩大光明之學文章雅奥足以規姚姒謨謀忠嘉足以配臯稷領宥宻參機政天子虚席而論相閣下其選矣仰惟先正太師魏公勲業譽望為前朝第一等人彪炳俊偉具在史冊子孫以似以續持槖擁麾代不乏人以至于閣下閣下以經術魁儒科以詞章鳴海内優㳺都城中極天下清華之選凡書生之所夢寤而古人之所歆艷者無不親歴之人望益隆主眷益深卒以此取卿相蔣氏之家聲日大以肆天下以是知魏公之有孫而閣下之光于前人也閣下以王佐自負一意于尊主庇民固不以是區區之軒冕為事然如閣下之為人子孫可謂盛矣有人焉業弓冶之餘而弗能修播穫之職顛沛流離而呌呼攀援于門下閣下其念之也必矣伏念某先丞相妙年自布衣以䇿于天子風節翹然有聞致位上宰憂國愛君之心終身不少衰至今數紹興中興名臣然亦不在第二流也惟是諸孤不肖既不能以家學取世科委靡闒茸又不能少自振拔于搢紳之列加之憂患相仍三兄淪謝相繼惟一弟相與為命又皆困躓連蹇碌碌州縣間退揣庸虚之質顧何足以求當世聞達惟是痛念先丞相之迹未陳而門户衰落遽已至此㡬無面目以上先人之丘隴矣罷官三年固窮田里非曰絶意榮望顧當路未有為之地者故不得已而為此待時之計一日有聞于人曰朝廷大用蔣公矣問其家世則曰太師魏公之曾孫也某也釋然悟躍然喜曰吾之窮其少瘳乎或曰子于蔣公之門無一日之舊而勢位如霄壤之隔子乃以為往必得所欲何耶某應之曰吾聞蔣公之為人其心則禹之心稷之心也公與魏公相去四世巖巖相望如此某為先丞相之子而沒沒不振如此以此求之其必有以哀我者故今日之來索手無以自見不自知其不可也伏惟仁慈薫然垂徳于不報之所引手于内溝之際使他日有以少見于世士之歸心于門下者多矣豈特某哉上洪丞相書代表兄孫公和某聞臧孫諌君以徳而君子知其有後于魯管仲受下卿之禮而君子知其世祀于齊方二子之為此也求盡乎人臣之事何嘗有意于徼福而此亦豈徼福之具哉然愛君合禮天相神祐百順不期自至而子孫碩大繁衍君子已能逆知于未然嗚呼彼皆一時陪臣效小忠循常禮而天之報施已如此矧本朝鉅公以身徇國建天節排大難功成困讒身不得有為于時天亦媿之必擁佑其後光明俊偉亦非止如管二子而已也恭惟先正内相忠宣公以文學志誼結主知致身華近一旦當戎馬倉卒之變翠華南狩騩馭未反此正主憂臣辱士君子畢命効死之際而肉食者類多選耎蓄縮為保家室計無肯出萬死以報國者獨我忠宣公毅然自奮仗節請行不可回挺平時徳望固已聳服夷裔而専對正辯又足以彈壓倔强不廷之衆故雖間闗險阻節旄盡落而中心如丹卒締金石之盟還長樂之駕嚮者三十年邉鄙不聳而南北無烟火警誰之力也上天助順佑我國家為生賢佐而所以報忠宣公者亦昭昭可知盖丞相首以文章鳴而一門之秀連中宏博異科洪氏之文遂擅天下此雖在丞相為餘事而四海由是人知洪氏之名而家有洪氏之書此天所以侈忠宣公之報而示為善之利也權臣當國衆能勝天方忠宣公還朝被太上皇帝寵遇之厚駸駸大用讒人罔極一斥不復故權臣能貶其位而不知適所以大其聲能抑其身而不知乃所以昌其後天定復有以勝之未㡬而朝廷更化金昆玉季繼踵登用福善禍淫可謂差耶恭惟某官以顔孟之學負伊吕之才周旋外服而隆巖石之瞻翺翔華要而結兩宫之眷比者槐鉉虚席乆至閲歲此古今之所未聞而四海所顯望卒之覆金甌秉魁柄者丞相也明良相遇千載一時決非偶然者是雖報施常理皆人所不能及由是輔中興于無窮而成忠宣之大功天于此不為無意也某不佞一介鄙人無所取材獨念先吏部某早受忠宣公之知君子交情見于尺牘先吏部流離兵火之餘故時圖籍往往埃滅而忠宣公咫尺之書蔵弆巾箱爛然可觀先吏部既捐館舍某雖無似亦知寳祕以俟今日是敢躬自裝褫百拜以獻有以見先世之契不為不厚亦以少裨門下手澤之富比之掃舍人之門者猶為有因也恭惟丞相竭誠節以相天子鞏國勢于千載而衍家慶于綿逺八葉宰相七世内傳將不足為今日道痛念先吏部以筆硯起家忠鯁獨立終于一郡人亦歎其餘才未施而不肖之孤又不能少振于後宦路如漆四壁枵然㡬填溝壑偏親垂白菽水不繼猶强自植立以苟升斗得官安陸困于逺次之官有期矣固將奉板輿携孥累為數千里之適以圖一飽然喜懼之年惴惴朝夕所以謀寸進而為親榮者尤切切于中仰惟閣下仁慈薫然軫念先世一日之素興哀于無用之人道援天下之餘力一振于窮困之地則髙誼絶俗寒士歸心某亦當摩頂放踵以効萬一九原有知先吏部亦不當後結草之報惟閣下哀之上趙憲書代趙推某聞疎不如親親不如賢詩曰豈無他人不如我同姓曰𤓰瓞曰葛藟親親之謂也周公相武王封姬姓五十三國而天下不以為私人皆曰周以宗强噫宗故可以為强也宗而非賢其何以强使受封者五十三而不賢焉天下不以我為私乎無競惟人四方其訓之周以宗强盖以賢强也我國家聖祖神宗敦厚同姓封爵禄廪務極隆異親親之道盡矣賢賢之義則未也乃復慨念宗室雖有才而不得試于是設教養之法開選舉之科人才班班得以自見近歲修潔博習之士因以益衆與寒雋並驅争衡天子又搜舉其尤才能者擢寘周行授之以持莭擁麾之寄視有周無媿焉恭惟某官以光明俊偉之才輔之以淵源該洽之學髙義慷慨薄乎雲天勁氣崢嶸沮乎金石間平之儒雅勉石之事業閣下誠優為之在中為鯁亮之臣在外為循良之吏中朝士夫數當世賢者必以門下為稱首朝夕論思自此升矣激濁揚清顧為閣下胸中自有定論然人才方賴以主盟倘從州邑之吏視天族之可以收拾者長養而成就之俾有以自見于世則親親之道賢賢之義足以仰贊朝廷之盛矣某疎族無似蚤歲而孤上奉孀親下撫幼弟家四壁立無以資其身攻苦讀書不能自已辛勤百戰始得一官為寮于兹亦㡬年矣亷勤自飭不敢少越規矩之外以為終身羞史君察其無他而未敢求知部使者冠葢相望而棄之不顧每自念言是豈惟孤寒之難于進盖未有當世明公以為之引重也閣下按臨曵裾旅進天壤勢異誼不可以冐干然而決于自獻者誠以閣下方主張公道愛惜士類宗族之末尤所矜憐倘引而進之則他人必指之而曰是子也而首受知于宗英其必有以取此也假寵乞靈某之寸進有望矣故某平日之不敢為不肖以幸今日之遇非徒以親親望門下也古語有之為山九仭功虧一簣故士君子于舉士之際多以垂成為辭嗚呼九仭之虧固為可惜然所以致九仭者不由覆一簣而進乎今日之進固有望于閣下之開其始若其終之則在他日上葉樞宻書代人某聞念子桑之飢者有褁飯之仁憐范叔之寒者有綈袍之恵故舊之情誰則無之故窮則相䘏達則相引或故舊之不及用則從而收其子孫此古人之所甚重而今之時絶無而僅有者也故山公在則嵇紹不孤而優旃之戲亦能封叔敖之子載在前史以為美談寥寥髙風非當世大臣孰能振起之恭惟某官道徳配古人聲名滿天下秉大政行公道行將入相明天子以共起中興之功而獨于故舊之情尤為垂意此所以能主盟吾道而振風教於千載之後也伏念某門緒衰微生涯淪落環視一身無寸長可録獨賴先世遺澤得官而蹭蹬連蹇絶人數等齒名仕版今㡬三十年矣頃者得闕桂林待次數載望嶺外之地邈然數千里而偏親垂白不堪逺去重以乆居浙西遭去歲邉警士夫率皆東徙轉寓於越之屬邑羇單可憐無與為比痛念先君之後零丁如許今欲之炎荒之地則有狼狽之憂坐以無䇿則忽不知歲月之换而寸進愈茫茫矣分竒才薄失于初計尚誰咎哉然猶有冀寒灰復然者賴有閣下使某不于今日伸啄而一鳴是自棄于溝壑也方閣下弦歌武城先君宰剡豁獲與閣下有同僚之契而荷致遇為最深今日不肖之孤貧悴無聊至于此極此閣下之所宜動心也然閣下方坐廟堂而進退百官而某也微賤疎逺尾百僚之底前時末契何足恃此以進君子之門獨以嚮者閣下擁麾毘陵某得以桑梓修敬固已蒙眷顧之厚謂某為故人之子有惻然興憐之意今也某之窮益甚而閣下振拔滯淹一舉手力而今日之進不為無因敢冒鈇鉞以干造化區區之命垂于閣下之手伏惟薫然之慈有以憐之振之不勝幸甚上宰相書代人某聞養才之法不一也養大才者勞之養小才者優之譬之植木彼楩楠檜柏之屬不貴其拱把椽􅍻之用也生于隂巖絶壑中風雨之所浸蝕霜雪之所摧折外益枯而中益腴磊砢多節目而材益剛夫然後數十百年而以為棟梁而不橈明堂之柱非此不能勝也然為巨室者棟梁之外椳闑扂楔之用不知其㡬故必有養小材之法焉若樸􅈪小木欲求近用苟不植根于膏腴壤墳之地使之遂其生長則將枯悴萎薾蕩然雖求拱把之材亦亡矣孟子曰天將降大任于是人也必先勞其筋骨餓其體膚此養大才之法也小雅曰薄言采芑于彼新田于此菑畆此養小才之法也才大者用大而志亦大故必先勞之而苦其成小才者用小而志亦小故必先優之而責其近未易以一概論也伏念某生無一竒學無一成猥以賞延登仕版㡬四十年矣平時碌碌以備國家之使令雖不能卓然拔茹于流俗而以功名自期然謹守父教官箴以從事思有尺寸以見乎世比仕東都自計司而為均輸之職亦不敢以為勞且宂方且躬朱出墨入之煩居無何而以罪去退念妄庸孱謬獲戾為宜而一時旁觀莫不搤腕太息知其寃而莫敢辨某亦不敢自明以速戾何也坐廢田里于今五年堂有八十之母而闕旨甘之奉室有數百之指而困啼號之迫日復一日㡬不自聊嗚呼是樸􅈪之才而遭風雨霜雪之所􅆷置之隂崖絶壑將遂摧折于無用之地是大君子所宜動心焉者也恭惟某官以不世出之才輔贊兩朝舉天下之物皆在陶冶而進退士大夫于一舉手之頃比者起東山以鎮壓倔强不廷之國如鳯凰麒麟一出而鴞怪􅈢妖自然逃遁隂受公相之賜者不知其㡬千萬人而猶孜孜以人才為意不倦吐握之勤此周公之用心也重念某孤危之迹屢玷大造而公相寵遇撫存之非一日也今日以窮來歸栖栖如飛鳥之依人人將憐之而況公相耶噫某之此來則窮甚矣公相遂收録之耶則他日必有尺寸之効以報門下今日棄之則遂將槁項黄馘與糞壤俱腐雖欲糜捐以為門下用終不可得録之棄之某之命懸于公相矣伏惟公相哀憐之干冒鈞慈某下情無任戰慄之至禮書馮仁叟表兄請婚任氏書族緒單平猥紹大馮之裔人才凡下敢齒諸任之間偶因媒妁之言獲締婚姻之好伏承某人幽閒秉操素知蘋藻之誠而某長孫某孝謹傳家粗習箕裘之業兹諧燕爾夫豈偶然往之女家想見結縭之戒願為有室遂成合􅈟之歡敢薦薄誠拱聞嘉命不愚弟請婚馮氏書見舅氏于渭陽慚非酷似尋世婚于髙宻兹謂好逑盖將締百年之歡豈惟合二姓之好伏承某人素鍾淑質乆􅈺中饋之儀某男幸忝彌甥不待東牀之選蚤荷千金之諾敢稽百兩之將宜其室家既無嫌于齊鄭傳之孫子俾弗替于朱陳少虚兄請婚孫氏書託契髙門承風乆矣求婚猶子得諾欣然屬事緒之因仍閲歲華之荏苒敢持薄禮逺尋舊盟維鵲有巢正欲資夫内助迨氷未泮深有望乎來歸方當相忘于江湖之中可以盡索于形骸之外從子澤請婚舒氏書定五世之交乆篤金蘭之契合二姓之好敢稽雁幣之恭惟令女素習婦功某男粗修子職既無嫌于齊鄭將永好于朱陳逺不容刀何待買鄰千萬之費告先近日倚觀結縭九十之儀内弟汪文可請婚薛氏書敘百年之親素聮𤓰葛合二姓之好兹始權輿既情話之相通曾媒言之不費令女夙􅈺姆訓從子粗習家傳了無耦鄭之嫌乃有齒任之幸既承面命欲奉婚期嘉禮具存何妨三者之備官占云吉尚㡬五世之昌沈虞卿侍郎女許陳氏書襟期莫逆乆為研席之交臭味不忘兹遂松蘿之託欣然承命捨是焉求伏承某人詩禮素傳稔聞于父教而某女子蘋藻是訓未習于婦容嘉納采納幣之同時實有室有家之伊邇潘楊方睦當豫卜于三星吴越相望尚將杭于一葦史侍郎女許秦氏書老矣從心猶有愛孫之念為之求耦幸逢列鼎之家某人秀出相門素傳詩禮某女幼疎姆訓未習組紃荷鴈幣之多儀知鳯占之協吉深喜潘楊之睦自此權輿既無秦晉之卑庶安家室又鄭府云既無齊鄭之嫌納幣張氏書合二姓之好荷親誼之甚髙尋十年之盟喜宦逰之相遇況老境篤抱孫之愛而兒曹懐歸養之思男女及時幸勿愆于柔日幣帛將意媿不辦于多儀共存素風一洗末習季舅第三女許顧氏書閭里相望其來已乆婚姻之好實始于今某人秀出輩流方謹詩禮之習某女幼居閨壼未􅈺纂組之工既協鳯鳴辱貽鴈幣一言決矣正湏坦腹之求百兩成之當謹結縭之戒汪表兄之子請婚書桑梓相望夙敦雅好金蘭合契幸締華姻某人素習婦功將歸千歲龍魚之裔某人粗傳家法適得五世鳯皇之占二姓是求一言而決欲將厚意敢稽納幣之儀佇俟嘉期終遂肥家之吉婦弟知道長女許李氏書里舍相望曾未諧于識面媒言一定乃屢辱于貽書臭味既同婚姻敢後伏承某人世傳儒業況是太史公之外孫某女幼習婦容未熟曹大家之女誡知鳯鳴之叶吉荷鴈幣之先臨往送之門媿不盈于百兩願為有室庶仰望于終身少及兄女許舒氏書師友從逰爰自宿昔婚姻求偶至于四三況一水之相望宜兩家之合好令子某蚤傳詩禮尚餘獨坐之儒風某女幼習組紃未解大家之女訓既叶鳯鳴之卜首勤鴈幣之臨佳耦曰妃但覺門䦨之喜色同聲相應尚何媒妁之多言次女許鄭氏書鴈塔題名夙講同登之契鳯占叶吉兹諧嘉耦之求一笑相過片言而決伏承某人幼而岐嶷早有成人之風而某女資亦善柔方親慈母之訓俱生丙午之歲真是甲辰之雌惟臭味之既同在禮文而宜簡御之百兩首勤納幣之儀加我數年當展齊眉之敬從子淶請婚陳氏書潁川譙國均著聲稱孟公君卿俱為㳺俠相望千載之下始諧二姓之歡某人柔婉有聞素􅈺姆訓而某孤㷀自立粗習家傳了無間阻之言遂定婚姻之約幸兹叶吉孰云齊鄭之嫌其或自今益締朱陳之好治請婚吴氏書識北平之三世素知事契之深牽張氏之一絲喜有姻親之託鳯占云吉鴈幣是將伏承某人出鄞水之外家遂歸于我而某男某生台山之傳舍爰娶于吴既無非耦之嫌殆有夙縁之幸一言而決因締交于延陵子之門二姓相求用徼福于東樓公之裔攻媿集卷六十八欽定四庫全書攻媿集巻六十九宋樓鑰撰題跋恭題直學士院所賜御筆留正少師判建康府趙汝愚右丞相臣紹熙五年待罪西掖兼直學士院際遇主上龍飛之初書詔填委時翰林學士李巘去國新除中書舍人陳傅良未至臣以非才當内外制斤斤幸無闕事一時册后封拜加恩等皆次第而舉八月二十七日忽蒙宣召不知為何事入院而御筆至亦不聞知既啟御封留正除少師觀文殿大學士判建康府汝愚除右丞相故事命相必設金鑾殿詞臣面受聖語是時主上猶御重華宫仍鎖南内翰苑故以御筆賜臣二者皆有訓辭而汝愚者尤詳遂具載于二制中退不敢以語人讀者往往不知所自也又九月二十三日伯圭加兩鎮節度使十月八日以季秋淫雨罪已降詔慶元元年正月八日汝愚除特進依舊右丞相十三日師夔除開府儀同三司四月四日余端禮除右丞相臣千載幸遇猥以蕪陋之詞視草摛文堂録本例留院中臣得珍蔵宸翰以為家寳未遑勒之堅珉謹齋祓裝褫以傳子孫仍識嵗月大概于右嗣秀王伯圭免奉朝請并聖節批答紹熙五年皇上踐阼之初臣叨掌内外制時從臣方同班一奏事然後以次獨對臣猶未及進也七月二十九日嗣秀王伯圭以衰老乞免奉朝請内批降詔不允懐不自已輙進狂瞽之言仍有貼黄云聖意若允其請不必行出伯圭劄子徑論大臣降一指揮尤為盡善仰蒙聖慈徹去貼黄御筆批依八月十日羣臣上表請以十月十九日誕聖之日為天佑節内批宜允臣又亟奏少俟三表即再得内批降批答不允尋三請而後從之臣謹寳蔵二奏中宸翰御寳于家使世世子孫仰見聖主從善如流不以人廢言之盛抑以記微臣際遇之榮仍録所撰詔書及三批答于前以著事實後以契丹偽號中有天佑二字始改瑞慶節云恭題知貢舉所賜御札皇帝御極十有五年嵗在戊辰禮部試進士五千餘人二月甲辰以御札付臣等臣亟率同知貢舉臣思臣幼學臣時暨㕘詳㸃檢試巻官以下三十三人班列于庭望闕重拜退而啟緘伏讀莫不驚喜感歎以為前此雖間有之未有如今日之盛舉也仰惟皇帝陛下以濬哲之資承付託之重清心寡欲崇儒典學不懈益䖍乃者權臣開邊塗炭生靈陛下憂形于色外鋤叛將内誅元惡處之晏然而天下復定所謂淵黙而雷聲神動而天隨者也方且厲精而躬覽臨政而更化廪廪嚮治安矣先是三錫宸翰于貢闈其二皆以不及臨軒故戒主司以審取舍今嵗親䇿造士而又豫戒臣等至于再三盖自比年以來奸倖弄權公道㡬泯舉場寛縱以私害公士類嗟惋不勝其敝又慮人之議已也専為蒙蔽杜絶人言仰賴陛下聖心感悟首下求言之令繼頒温詔博采芻蕘真社稷之福今聖訓有曰去取之間趨嚮所繫使精加考閲擇文體醇正議論精確者又曰或因問獻言實有可用雖涉訐直勿以為諱陛下隆寛盡下髙視千古屬意人才興起治功煌煌帝謨五三六經載籍之傳敢諌之鼓誹謗之木何以尚此猗歟休兹臣等既以宣示寮屬更相勸厲又以聖意發䇿俾士子盡言無隠矣伏念臣等受國厚恩平日所願推賢遜能圖報萬分矧以孤學誤蒙委以文衡回念場屋之舊固不敢輕于抑揚恪遵告戒謹拔其尤異者寘在前列然士子局于文體雖有竒才恐不得騁又臣等智識荒淺深恐上不足以副陛下求賢之切下不足以得人物之真驚惕祗懼夙宵靡遑敢以奎畫登諸樂石以詔四方仰惟國家設科得人最盛然山林巖穴之士必有逸才髙節非科目所能致爵禄所能誘者惟陛下推此心以往不憚孜孜而求之當有魁壘不世之才出而為陛下用野無遺賢多士濟濟臣等不佞尚庶㡬見之恭題賜陳傅良宸翰臣仰惟皇帝陛下龍潛嘉邸毓徳進學一時宫寮皆出遴選嘗逢誕辰咸獻詩頌既而置酒髙宴初酌黄裳次酌陳傅良各授文書一通致謝再三其一曰上呈翊善其一曰上呈贊讀御名謹封因請問所以謙賜之由陛下為言二公之詩雖因為夀而作皆寓警誨之意輙依所恵親書一本復以為贈以示不忘裳與傅良跽謝而退陛下踐阼之初擢裳禮部尚書傅良中書舍人未㡬裳以疾歿傅良奏請以宸翰刋之堅珉玉音賜許是時臣鑰待罪瑣闥與傅良同直北門嘗過其家傅良以跋語示臣大畧曰季札觀樂歌頌而曰哀而不愁太史遷讀虞書至于君臣相敕維是㡬安未嘗不流涕也成王作頌推己懲艾可不謂戰戰恐懼善始善終者哉益頌者不専于美盛徳之形容皆有警戒之義秦斯以來此義殆絶臣為之矍然作而曰偉哉論也自時大序言以成功告于神明無有以頌為警戒者舜皋賡歌世但以為盛事非司馬遷不足以發聖賢相敕之㫖自李斯頌秦専務溢美人亦不以為過韓愈有曰不以頌而以規亦不悟頌之有規也而傅良能發之臣于傅良平日所畏至是益以歎服促使刻之傅良曰今既刋奎畫于上方不敢使人代書適有目眚當俟小瘉曽未信宿而已報罷臣尋亦去國相忘于江湖者十餘年傅良下世訪遺藁于其家則不知所在矣其子臣師轍求跋其下將碑之以傳逺臣既傷傅良不及見更化之日敢直書始末上以彰陛下好賢樂善之素下以侈傅良等際遇之寵抑使後學知古人賡歌頌詩本非専于形容稱美而諷諌之切未嘗不寓于斯云恭題仁宗賜董淵宸翰臣竊考皇祐五年三月辛丑朔壬子崇政殿試禮部進士圜邱象天賦辛酉放鄭獬等五百二十人前所書十四日是為甲寅盖廷試後二日又自言以大理丞景福殿祗應豈非為諸位官耶孟子曰國家閒暇及是時明其政刑是時神文臨御已三十餘年正月平儂智髙朝廷無事而肆筆匪頒小臣猶不忘保治之要雖止二字足以示萬世法印文左曰帝右則古筆字也見義雲章臣髙祖先臣某以是年中第為第三甲第八十人臣家衣冠實始于此感歎再三謹附書下方恭題仁宗賜懐璉御頌臣仰惟紹興初元髙皇帝南巡慨念天章所蔵祖宗宸翰墜失殆盡求訪山林所得不多惟明州廣利寺住持僧淨曇悉以宸奎閣中仁宗皇帝所賜懐璉賛頌寳墨上進上大悦賜以御札謂卷軸既豐䕶持有道又書佛頂光明之塔以寵之孝宗皇帝賜以妙勝之殿皆口登之樂石惟浄曇摹勒昭陵詩翰雖至今珍蔵而因仍七十餘年未稱尊奉之義今住山臣僧宗印始盡摹而刻之以補名山之闕典而後累朝雲漢昭回之美于焉大備真東南禪林第一盛事也山君海王益當來朝以謹其蔵若禪頌之深妙宸藻之交輝則非小臣贊歎形容之所能盡也恭題仁宗賜張中庸恤刑敕書臣家蔵賜吴紹儒恤刑敕書後止書日不知何帝時祕書丞兼權兵部郎官臣張鈞以其從曽祖中庸所蔵仁宗皇帝暑月敕書一通示臣凡二百五十字紹儒者二百二十七字而同者一百七十有九字始知紹儒者亦昭陵所賜也紹儒當是郡守故有云方伸共理之良中庸為部使者故稍詳焉聞之故事每更一朝則敕字别為一體此二書雖作字不同而每行皆九字璽文大小如一未有敕字絶甚相似則是同時無疑日子不同盖以頒降逺近為先後至今先下川廣次及諸道或恐非一嵗之書也臣仰惟藝祖開基仁覆天下好生之徳洽于民心開寳二年四月詔扇暍泣辜前王能事恤刑緩獄有國通規今朱夏既臨溽暑方甚睠兹縲繫深用哀矜宜令有司限詔到日其囚人枷械囹圄户庭吏每五日一檢視灑掃蕩洗務在清潔貧無所自給者供給飲食病者給醫藥小罪即時決遣重繋無有淹滯太宗太平興國六年詔當鑠石流金之候在黄沙聚棘之中亦有灑掃供饌之文雍熙三年四月詔曰當此炎蒸之際念其縲絏之人宜伸欽恤之文庶協長嬴之候宜令諸道州府軍監縣等凡禁繫之所竝須灑掃牢獄供給漿飲械繫之具皆令潔淨疾病者為致醫療供送飲食畫時傳送無令邀難減刻無家屬者官給口糧無歸法者侯處㫁之時給與酒食小罪逐旋決遣大罪窮究其情無致淹延以稱朕意盖又加詳矣自是每嵗首夏下詔恤刑遂為定制真宗大中祥符仁宗慶歴皆有詔㫖而條約大率如開寳雍熙之詔乃知此二敕書實本朝之家法累聖遵行尤以炎蒸為念肆我主上當盛暑時臨軒疏決分命諸道慮囚悉如故典至開禧二年復因論囚又命提㸃刑獄使者仲冬巡歴如仲夏之法每嵗必再舉行又命御史劾其不䖍者欽恤之恩又益廣矣鈞蜀人也禔身肅括持心篤厚行其所學不苟于職朝譽藹然力求外補今為潼川憲使奉訓詞之丁寧寳前朝之敕書宣揚徳意于萬里之外使逺民自以不寃如在畿甸真可以仰副臨遣之意矣恭題向公起所蔵仁宗宸翰臣頃見故祕書省正字陳師道跋修起居注江休復之孫端禮所蔵仁宗皇帝御書善法刑政四字又言其璽文曰帝籙竊疑其不倫後見昭陵他刻正用此印臣尋考之其字曰葢古文筆字也出義雲章始知師道誤以為籙字爾宻州觀察使贈太尉向恵節公傳範蒙賜以飛白帝筆二大字七世孫新知桂陽軍臨武縣公起刻于石以示臣雲漢昭回不容繪畫敢以舊聞再拜書于下方恭題趙時穆家穆兩朝賜碑臣三造朝行四官玉牒凡聖語御筆在法當書嘗預修仁宗皇帝朝玉牒十年求所謂二者絶無而僅有有則必謹書之盖以臨朝淵黙㡬欲無言雲漢之章尤不輕畀有如尹孝齊公叔充乃獨蒙忠孝之褒則其賢行真可以信後世矣三子決科神宗皇帝又寵異之益彰麟趾之慶君子之澤流衍至今五世孫剡夫與其子時穆以家蔵二碑示臣端拜敬誦仰歎累朝崇篤親賢之盛事孝齊公立身訓子之懿美一時名公或序或議雄文相照碑製古雅書札精到抑以窺見承平文物之大概竊考印章左曰帝人所易識右曰筆義雲章中古字也昭陵多用此印退傳張文懿公士遜富蔵書畫友正能世其家擅書名有晉宋風度此二碑皆其竒畫世所罕見友正不仕故銜中無職守養髙故第中三數十年非孝齊公父子之賢且厚未易得其書丹也剡夫寓四明有鄉曲之譽時穆登世科為開化尉奕奕佳公子也其益寳蔵以無忘先朝先世之典訓恭題神宗賜沈括御札臣仰惟神宗皇帝經畧西事纎悉周宻萬里風烟俱入長算時四明沈公括帥鄜延閲月纔十有六承宻詔至二百七十三道元祐編裕陵御集悉已上送官此祕貯所存者盡元豐五年十月盖以永樂事而公亦歸矣臣頃在都下嘗恭覩宣諭楊公繪宸翰筆法與此卷絶類倉猝戒諭邊臣而字體莊重廟謨逺矣再拜欽歎謹識于後視張丞相魏公浚潭州舊題恰六十年矣恭題徽宗賜沈晦御詩宣和六年御試䇿問非舉子所能條對惟胥山沈公晦以軼羣之才精通象數借箸籌之一揮數千萬言炳如也祐陵喜于得人聞喜宴以御詩寵之雲章昭回具在金花箋上至今如新勢欲飛動是時以貢士人衆特添省額一百人廷試士子至八百有五人文物盛一時沈氏其世世寳之使後來者猶得以想見承平氣象胥山遭時多艱不得躋時于舜禹之前能捐軀盡瘁于干戈搶攘中而去就出處卒保名節褒然舉首可謂不負徽皇知人之哲矣恭題宇文紹節所蔵徽宗御書修禊序臣嘗觀蘭亭修禊序草本流傳千載唐太宗求之尤勤自謂心慕手追一人而已唐人作字無不效之者故南唐後主謂善法書者各得右軍之一體若虞世南得其美韻而失其俊邁歐陽詢得其力而失其温秀褚遂良得其意而失其變化薛稷得其清而失于窘拘顔真卿得其筋而失于粗魯栁公權得其骨而失于生獷徐浩得其肉而失于俗李邕得其氣而失于體格張旭得其法而失于狂獨獻之俱得之而失于驚急無藴藉態度觀此言則是終無有得其全者恭惟徽宗皇帝天縱多能游心六藝筆力超邁髙掩前古自出機杼真書禊序于青繒中雖曰出于薛稷而楷法精妙何止青出于藍而已臣世受國恩先臣大父某受不世之知俾守四明鄉郡者㡬五年寵光狎至細書方國之賜聮翩而下雖遭兵燬遺刻猶有存者兹焉恭覩簽書樞宻院事紹節家蔵御書真蹟昭回之光照耀凡目感歎不足謹流涕再拜書于左方歸其書于宇文氏恭題徽宗賜張繼先御詩嘉定五年嵗在壬申郊祀慶成中外交賀迺季冬甲午皇帝恭謝太一宫臣扈駕陪班既已峻事知宫事髙士臣易如剛以所蔵徽宗皇帝賜虚靖先生張繼先詩翰示臣且求跋其後竊惟漢天師道成于蜀而教傳于龍虎山至三十代而虚靖出仙姿絶人道術驚世人謂天師復生誠不為過祐陵親御詞翰爛然如新再拜御瞻盪耀凡目勒之堅珉以鎮名山已為晚矣嗚呼人知祐陵之崇道教不知仁心實本乎為民人知虚靖之仙去而蜀之青城猶有見之者此詩尤不可以無傳也恭題欽宗御畫十八學士圖唐文皇十八學士猶在秦府盖武徳四年也仰惟欽宗皇帝毓徳春宫以仁孝恭儉聞天下手臨舊畫而又親灑宸翰以誌之誠有慕于貞觀之盛也臣嘗觀後周光禄丞杜良作文皇畫像記曰太宗已定天下而髙祖已登九五矣太宗于閭閻疾瘼干戈勤勞且盡知之于仁義之治興太平極治之功容或有未究焉耳既作文學館延四方英俊講貫紬繹薫陶耳目者莫非帝王之事彼十八登瀛人必曰為如是事而治為如是事而亂以太宗之明刻記于心肯圖衰亂乎一意于求治而已仁鑪義鞴道薪徳火日往月來就聖神之模其為宗廟社稷生靈者炳焉與三代無以異矣故太宗之功烈自漢髙以降莫之與敵十八人之力也此真得太宗之意嗚呼欽宗游戲翰墨而為此固為萬世法由今觀之豈不為臣子萬世之痛哉抑聞後世人君能用材者無如太宗然許敬宗乃得預議者謂如摘瓜手耳取之既多其中不容無濫此又足為世戒故併載之恭題髙宗賜胡直孺御札髙宗皇帝垂精翰墨始為黄庭堅書今戒石銘之類是也偽齊尚存故臣鄭億年輩宻奏豫方使人習庭堅體恐緩急與御筆相亂遂改米芾字皆奪其真嘗覩寫詩自周南至商頌全袠上有帝筆印記天縱多能人固莫及聖度恢然其視使臣下為拙筆書者霄壤矣徐府及洪芻兄弟皆庭堅外甥有酷似之稱俯題雙廟詩有云向使不死賊未必世能容不惟自巡逺以來未有此論盖亦隠永樂之痛庭堅亟稱之且勉諸洪進步非此舅安得此甥也然卒致大用殆亦不喜劉蕡之助云恭題髙宗賜陳正彚御札陳瓘之在四明遣正彚往浙西過杭州遽告變蔡京既得其情必欲寘之死地又欲併以此殺瓘既就逮瓘以勁言得免猶謫通州故其放還謝表云􅈢突教子素存不二之風曽參殺人寧免至三之惑又云海島萬里不如無子之無憂淮壖一身彌覺有生之有患徽皇聰察僅得貸正彚之死既至沙門無復歸望島上巡檢知其為名家子招致館下又有神祠甚靈嘗謁之卜以桮珓且曰若得生還求百聖珓擲之至百皆然未㡬欽宗即位召歸而瓘已下世痛不及見遂得心疾上殿已不能對賜以名方猶傳于世髙宗眷遇又如此擢其子大方為郎瓘之孫大年實正由之子也為臣家壻故得聞其詳謹書之以補衆人之未及者恭題汪逵所蔵髙宗宸翰紹興五年御書廷試䇿問髙宗皇帝踐阼之九載當紹興五年嵗在乙夘二月車駕始自平江還臨安八月癸亥䇿士于行在所射殿時敵兵敗退厲精求治親御翰墨咨以當世之急務一士條對剴切褒然為舉首則信之汪洋也自幼天資髙邁十行俱下筆力絶人其在布衣名已聞于當世臚傳第一年始十有八聖意寤寐英傑得之喜甚且曰惟昭陵天聖八年王拱辰魁多士年實相似賜名應辰誠為儒林盛事既負重名益進于學八年為祕書省正字尋以論和議不合權臣惡其不附己屢擯于外㡬二十年而其學沛然莫禦更化之明年始入為吏部郎望臨一時自爾入從出藩四方以其出處為世輕重位雖止于内相文昌用不盡其學至今學者尊敬真有泰山北斗之望可謂不負親擢矣公之次子逵能繼世科恪守家法仕為吏部尚書太子詹事博學多識綽有父風一日謂臣鑰曰先公所試䇿問思陵御墨既傳于外得為私蔵禁中裝潢亦非人間所及是殆天賜以為家寳也其為逵識之臣鑰再拜聳觀歎仰驚眩前所未覩竊惟國家三年一廷試士子固必有首選惟此舉䇿問既出奎畫下寵多士雲漢昭回照耀編簡汪公一代真儒魁天下今賢嗣又得真蹟蔵弆以詔将來光明俊偉未有如此者其家法書甚富此特為希世之遇雖夏之琱戈商周鼎彛款識甚髙古者亦當在下風矣謹識于後而歸之公少名師閔故字孝伯既得賜名丞相趙鼎字之以聖錫云御書中庸篇髙宗皇帝自履大位時當艱難無他嗜好惟以翰墨自娱始為黄庭堅書改用米芾動皆逼真至紹興初専倣二王不待心慕手追之勤而得其筆意楷法益妙五年䇿士首得汪應辰九月十九日言者乞依雍熙故事賜新進士儒行篇以勵士檢有㫖仍添賜中庸送祕書省校勘正字張㟸校中庸篇髙閌校儒行篇二十二日閌入奏儒行雖間與聖人之意合而其詞夸大類戰國縱横之學盖漢儒雜記決非聖人格言欲望止賜中庸一篇庶㡬學者得知聖學淵源而不惑于偏邪駮雜之見上可其奏御書中庸以十月四日賜之仰惟思陵書六經以幸承學之士此固餘事然中庸無慮三千五百餘字萬㡬至煩而浹日之間書就中篇書生勤篤者亦安能及此尊經崇儒之意真可為萬世法時趙鼎為左僕射例得墨蹟為家蔵仍摹刻分賜鼎晚謫海上而素重應辰遺言以此卷歸汪氏應辰次子逵既以御題示臣併示此卷可謂汪氏二寳矣髙宗夀考遐不作人鳶飛魚躍儒風日盛中興之業實本于此應辰上不負天子下不負所學躬行直道以終其身以及子孫君臣際遇猗歟盛哉流傳千載何止一時之榮也恭題孝宗御書心經淳熙十四年嵗在丁未孝宗皇帝元命之年也十月二十二日㑹慶聖節親灑翰墨書心經于禁中觀堂先是上天竺山再建觀堂既成住山妙珪求記于臣嘗既登之石矣嘉定二年孟夏之十日珪又來言蒙皇帝賜以孝宗所書真蹟願得跋語併刻之山中臣仰惟孝宗皇帝聖學髙明度越前古是時在位已二十有六年不倦于勤治體已定而進徳不已退朝餘暇游心内典深味禪悦毗盧五千餘卷而此經獨名以心盖千經萬論之至要也列聖在御相傳以仁忠厚積累福祚延永蘇軾有云惟佛與佛乃識其真臣謹齋祓書于下方以詔後世恭題曹勛所蔵迎請太后回鑾圖臣嘗恭讀光堯太上皇帝宸翰稱譙公歴事四朝盡瘁國事始終一節夷險不渝且言令請太后天眷至金主前宣予孝思使彼感動俾予母子如初恭惟太上皇帝睿性仁孝天地助順以遂長樂之歡而乃推功臣下堯言炳然亦惟譙公忘身徇主有以得此也臣自為兒時聞臨平道中太后回鑾之盛恨不身見之暨官玉牒預聞史事纔得窺一二今從譙公家獲覩迎請圖丹青煥爛賦篇贍蔚然後一時慶事歴歴在目敬拜歎仰嗚呼休哉夫以譙公功成之初乞身退歸無一毫矜伐意此圖之作非欲自明其功盖所以發揮太上皇帝聖孝之蹟過于方册逺矣是豈惟其家所當寳蔵後之太史氏尚有取于斯焉攻媿集卷六十九欽定四庫全書攻媿集卷七十宋樓鑰撰題跋跋王順伯所蔵二帖鍾繇力命表始順伯示余以定武蘭亭序書賜官奴樂毅論余謂小字無以復加矣順伯笑曰未也又有邁此者乃出鍾繇力命表諦觀久之心為之醉字畫精到乃至是乎順伯博雅好古蓄石刻千計單騎賦歸行李亦數篋家蔵可知也評論字法旁求篆隸上下數千載衮衮不能自休而一語不輕發先鍾後王字家固有定論以此三者坐判優劣豈為知者道耶定武修褉序順伯好石刻成癖蘭亭善本收至三四未已余家無一名帖心顧好之把玩不忍去手雖未若順伯之膏盲然疾在腠理矣豈所謂不治將深者耶跋秦淮海帖山谷晚游浯溪題詩磨崖碑後見少㳺所書文潛詩嘗恨其已下世不得妙墨刊石間時少㳺醉卧古藤下未久也而山谷老人已有此恨矧今相去幾百年此帖灑然如新得而讀之寧不感歎書仰孝子行實後先生孝行出于至誠本不求人之知清朝官之以風厲天下而後先生之名顯永嘉名臣輩起為浙河東西冠嘉遯之士至行卓然必有繼先生者第其深處巖谷不求聲稱故潜徳幽光未之或發鑰不肖願與邦人訪之聞于州于部使者于朝廷使此邦之風義益髙而先生之名不孤不亦可乎跋陳氏續蒙求徐堅作初學記中山劉子儀愛其言曰非止初學可為終身記此書出入史傳援據精確何止應童蒙之求耶跋呉生畫卷李廣射虎史言將軍射沒鏃謂沒矢者殆未必然臨右北平盛秋匈奴避之畫不能真似尚可想見也神氣如此而恂恂如鄙人此所以為李將軍耶山水平逺延陵生丹青無不工適興作山水尤深逺有意趣宦逰三載歸心蕩摇渡口喚舟殆屬夢境跋韓幹馬舊讀坡翁詩恨未見此畫今日得之便覺詩畫互相映發此詩此畫誰當看豈無所待耶跋徐薦伯横槊醉藁上馬能撃賊下馬作露版古人惟以許傳修期薦伯儒者由右學以奮論議慷慨談兵如流擊賊何足言讀其詩頓挫清厲有壯士横槊之氣倚馬而作露版有餘矣修期何人哉跋徐子田菊坡圖徐君傲睨菊坡不復出仕故其樂同彭澤令少日便賦歸而三徑已就荒松菊僅有存者則夫火馳宦途碌碌忘返之士顧有一適如君者耶書元章簡公神道碑後章簡公名徳隆重詞章典裁葢平昔之所慕者兹來佐州披圖牒訪故迹始知甓城牐門疏河建隆梁以為此邦無窮之利者皆公之力曽孫康曽適為監征叩其家世始得碑銘而讀之益加歎仰若蘇魏公之雄文韓南陽之竒畫又皆可寳也跋任氏香圓記齊晉安王以蓮華供佛願竟齋不萎七日齋畢華更鮮紅視甖中稍有根鬚史稱其孝感然猶藉于水也香圓垂之空中而敷華結實可謂異事此理殆未易致詰輕下注脚卻成蹉過跋王清叔畫卷㫁崖小枯木醒菴古木大似梁鵠書有劒拔弩張之氣全幅枯木此幅筆勢尤瓌壯雜之文湖州射澤中未易辨也横披山水觀此圖當作烟雨半開登高臨逺時想苟求形似便失妙意要不可以畫家三尺繩之跋霍氏球川圖霍君來為赤城理官垂去矣益不得志書銜袖過余曰漫仕三年不逢已知圖家之球川得名勝詞翰盈巨軸以此西歸賢于薦書逺甚余頗愛其言展卷久之字呼曰子登宦情如水而家居勝絶乃爾君之歸似晚矣他日有客道南蘭陵捨舟金斗門外徑造竹所者必我也君其容之乎跋王少保行述參政敏肅公父士夫以重名致大位雖才業足以自奮要其先必有所自來而積善累功之人亦往往取必于後㕘政一代偉人恨生晚不及見得此書于公之仲子始知自無怨公以還世有隠徳遂為名臣大家天之報施端不偶然後來者又堅肯堂之志湯湯淮流寧有既耶跋丁端叔所藏鼎彛欵識右商周以來鼎彞尊鬲等八十有六予㳺南蘭陵從丁端叔借觀商周逺矣器之存于今者葢寡識者望而知之以為商質周文世愈逺則文愈簡然周器亦有甚簡者不知何以别其非商也盤誥詰曲聱牙商周皆然其他訓誥誓命之文初不相逺者商頌雖止五篇求其體製比之清廟維清之詩加詳焉豈高識者他有見于此耶古人不可復見而得其器器又不可得有乃摹取款識之文茫昧難讀顧有何好而深好之是殆難與不知者道也跋陳忠肅公表藁范忠宣晚年益以天下自任尤留意人材或問其所儲蓄為今日用者曰陳某又問其次曰陳某自好葢言忠肅公可以獨當天下之重也宣和末年或問㳺公察院以當今可以濟世之人曰陳了翁其人也元城先生嘗因公病勉以醫藥自輔天下將有賴于公當力加保養以待時用讀公表藁及紙尾數語氣凜然如生折而不撓有大臣之風三公真知言哉跋百醉老人詩百醉老人詩追七子凌鮑謝諸公論之已詳逰别圃有句云中原戎馬場故國虎狼窟言歸成黙傷念之中心慄鑰讀而悲之此詩人黍離之歎少陵一飯不忘君之意也百醉間一醒豈真醉耶跋史魏公與心聞禪師帖太傳史魏公得法于心聞愛其子孫至今不忘明書記其從孫也持魏公書偈來讀之益信二老相得之深傳播叢林又為裴相國與黄蘗禪師添一重公案跋趙清憲公遺事憲一本訛獻攷宋史趙挺之傳謚清憲與趙抃異右丞相清憲趙公遺事其孫誼録以示鑰遂獲窺先正之風烈嗚呼建中靖國初徽皇鋭意于治親擢公為御史中丞裕陵人物之舊收用無餘黨論雖興猶有如公者屹立于諸公中讒謗競起而主意不移維持國是尚有賴焉使左右皆薛居州事寧至此耶三讀遺編為之感涕跋戴伯與石屋詩卷莊子秋水篇言埳井之蛙擅一壑之水陸士龍逸民賦富貴者是人之所欲而古之逸民輕天下細萬物而欲専一丘之歡擅一壑之美半山詩曰穰侯久擅闗中政長恐諸侯客子來我亦暮年専一壑忽逢車馬便驚猜葢用其語語則工矣惜乎其不大也石屋之勝余未及識伯與以妙思尋幽而無専擅之意思與好事者共之豈不宏哉跋劉杼山帖先子嗜書如嗜芰平生富蔵名流翰墨而獨謂杼山先生之書光前絶後尤袐寳之鑰自遭家艱文字散落惟此二番宛然巾箱中疑有神物為䕶持焉謹帛其縵而新之以續先子之志跋朱灊山自撰墓誌灊山先生少年以詞藻表見一世士林傳誦追配前良銘中之文如霜降水落掃盡翰墨餘習非飽諳世故晚歲見道不及此尚何疑于死生之際哉跋徐狀元奭祥符五年敕牒歐陽公歸田録載真宗好文雖以文辭取士然必視其形神器識或取其所試文辭有理趣者徐公鑄鼎象物賦云足惟下正詎聞公餗之欹傾鉉乃上居實取王臣之威重以為第一嗚呼公之擢舉首逺業已見于此非徒為偶儷之工祖宗之取人如是宜乎名臣之衆多也跋楊伯子詩巻平生未識誠齋而多見其詩每深向若之歎璘師示以此卷讀之灑然知其為誠齋之子也筆力駸駸真逼人哉跋秦淮海戒殺帖秦淮海妙墨前輩所推余頃得此本愛玩不能去手時在校官念此邦日事鮮食物命不可勝計欲傳于人未暇也兹來假守遂登之石釋氏戒殺誠是而言之太過不若逺庖厨之言為適中然則何取于此嘗感汝南周顒之言曰變之大者莫過死生生之所重無逾性命性命之于彼極切滋味之在吾可賖讀者宜動心焉跋鄭屯田鍔蓬萊山詩先生風神蕭散肺腑清徹不以事物自嬰故出語輒驚人晚歸自道山來賦此詩未幾遂仙去元丞相微之云我是玉皇香案吏謫居猶得小蓬萊先生殆是耶跋杜祁公草書詩鑰在郡庠直舍時薛君文老以近隣相過出杜祁公草書雲詩嘗跋之云歐陽公答祁公惠詩言無俗韻清而勁筆有神鋒老更竒二寳收藏傳百世豈惟榮耀詫當時薛君所蔵詩雖出于唐人而草聖則公真蹟也歐陽公二寳君得其一矣兹遂登之于石跋薛士隆所撰林南仲墓誌淳熙四年冬鑰備員敕局陳君舉任太學録官居相隣一日同林伯順大備相過愴然曰薛寺正之亡吾儕之所痛也嘗為伯順求先銘于寺正書以古篆恐其難辨又作楷法于後已授我而亡之矣後從薛氏子沄得其藁茫不知何語子能辨之否鑰不善篆而素好之一見纔識十二三餘皆竒古難知白仲氏故嚴州使君相與徧閲字書攷究幾月而後盡得之寺正于書無不讀耽玩鐘鼎古文搜竒抉怪凡易識者多不用古文所無間以小篆補其闕真好古哉君舉伯順得之喜甚又十二年假守東嘉二君來見曰寺正所授真篆二本後得之故書中取以校昔所攷無差者併為刊石以授伯順使寳之以成其志以存寺正之遺蹟抑以見吾兄弟用心之勤俯仰皆有感焉始伯順葬父于金舟如寺正之志後以五年九月壬申改葬于親仁鄉龍門山合其母陳氏云書周禮井田譜㑹稽夏君林以篤學名于鄉紹興間有旨郡給筆札録其所著書以進郡出錢百萬就姚江置局謄寫幾千卷春秋易有解律厯有書余從其孫壻袁起宗鼎得其周禮井田譜讀之井田之廢久矣林勲本政書最為有志于古然僅載田制他書亦未有如此之詳且明者井邑丘甸寓兵于農凡出于井田者無不毫分縷析又皆圖以示人如指諸掌文中子曰如有用我者當執周禮以往其講之熟矣事大體重固非歲月可為惟仁政必自經界始此先王經國之本也故為廣其傳思與學者共講之刋既就錢文季文子指其間有不合者胡太初宗亦相與講明而黄君毅又作問答一卷皆有益于書陳君舉許以序引自湖南逺寄詞雄義渾尤為著明遂併刻之惟文子之説以俶裝薄遽不及附見當俟他日夏君年八十餘無一日不著書其精且博如此以上書補官一試吏而止不得少見于施用為可憾云跋諸名公翰墨韓魏公司馬公王文公韓康公富韓公文潞公王宣徽晏元獻陳文惠韓南陽右諸名公翰墨米寳晉題跋過江以來鮮有之或謂得之揚州擾攘中葢故家物真可寳也司馬公書必施于所尊其論出處大致凜然不可奪晏元獻屬其弟于人以為不可温顔兹非前輩之言耶是時士夫書必以小紙圓緘故多用圓印而書無摺痕禮簡而意厚字畫又不苟類可傳後今世専以録子往來語多浮溢紙尾書銜全是吏牘體雖有詞翰之工欲襲藏之終覺不韻重可歎也跋汪季路所蔵書畫徐騎省篆項王亭賦舊見岸老筆談載騎省竵匾之説近有敷原王季中彦良實襄敏諸孫余及見其暮年嘗問古人篆字真蹟何以無燥筆季中笑曰罕有問及此者盖古人力在不盡用筆力今人以筆為力或燒筆使秃而用之移筆則墨已燥矣今觀此軸信然子孫非不甚工惜其自壊家法反以端直姿媚售一時後進競倣之古意頓盡但可為知者道耳龍眠九歌圖三閭大夫見楚先生廟圖畫古聖賢怪物而作天問龍眠讀九歌而為之圖一段風流視楚人何逺王晉卿江山秋晚圖宋大夫聞襄王之夢孫興公見天台山圖皆想像為之賦文章之妙如此若丹青非親見景物則難為工晉卿固自名勝然方其以金狨㳺冶都城嫩寒中安知江山秋晚時事不有南州之行寧能盡寫浩然詞意耶孫浩然詞云一帶江山如畫景物向秋蕭灑水浸碧天何處㫁霽色冷光相射橘樹蓼花洲掩映竹籬茅舍天際客帆高挂煙外酒旗低亞多少六朝興廢事盡入漁樵閒話悵望倚層樓紅日無言西下右離亭燕跋元豐八年進士小録先祖少師以是年登科為三等第十人建炎中金兵至四明諸父倉猝避難室廬遭燬故物一不遺章公擇申公子也實為同年生其孫澥與鑰同登隆興元年進士科家蔵此書至紹熙改元始得傳録以篤年契以示後人是時當泰陵在諒闇貢闈既試而火時有狀元焦之謡已而果然嘗聞之長老焦之文精而麗亞魁劉公之文渾然天成主文争或不勝則曰魁恐終非逺器焦竟不及禄而劉遂為近臣是書大畧與今日相似而不同者九終牓無一宗子葢天族未有試進士者任子當有自鎖試進亦不見一人既無廷試止書第一第二等期集所供職纔二十五人卷首止以二版書雜事試官書知舉而不及參詳以下猶有明經科謝恩延和殿賜優牒于崇政殿門外又不曉優牒之義四月二十九日奏號五月二十日御史拆卷封三日奏名六日奉敕放榜此皆事之變汪公澥職糾彈秦公觀掌牋奏兹又一時之盛也書張武子詩集後武子拱人也父避地南來往返明越遂家于明隆興初與余為同年生自爾益相好人物髙勝筆力可畏非敢以友友也不幸齎志而歿吾黨共哀之其季以道裒詩二編期以行逺遂初尤貳卿為之序以道示余泣且言曰尤公知吾兄之詩而不深知其平生知平生者惟子爾更為我言之余曰尚忍言哉武子天資絶髙少以流寓名薦書文已怪怪竒竒或誚之笑曰吾寧僻無俗寧怪無凡此意卒不變然亦以此不偶閒居好與諸禪逰佛日宏智皆入其室頴悟超卓學亦與之大進結交老蒼聞見多前輩事聴之使人忘倦丞相壽春魏公作尉姚江一見君竒之君亦歸心投以詩曰願同丑萬輩終老孟子門後二十年試南宫魏公得其三䇿心知為武子之文袖以見知舉張公真定曰適得一卷舍人如欲取時文則不敢進果欲得士人否張公曰吾嘗言寧取有瑕玉不欲取無瑕石讀之以為佳魏公曰此某故人張某之文也舍人異而記之比掲牓驚謂魏公曰果張某也魏公罷相居小溪山中武子日從之㳺如裴迪之在輞川兩仕都城司糴于外司帑于内皆甚劇泊然如在山林苟非所知雖貴而欲見不造也平時若不以事物自嬰而官業井井可觀惜乎不見用惟詩傳于江湖間爾余嘗跋其詩卷云與武子評詩謂當有悟入處非積學所能到也君讀之以為得我意嘗曰山谷晚年詩皆是悟門愛其金狨繋馬曉鶯邊之句又曰四更山吐月殘夜水明樓東坡嘗賦五更五詩詞雖工葢惟四更為佳爾又嘗自哦其詩曰客向愁中都老盡祇留平楚伴銷凝又哦其詞曰昨日豆花籬下過忽然迎面好風吹獨自立多時其大約可見矣閉門讀書室中無一物凴案開巻終日凝然性雖嗜詩未嘗輕作或終歲無一語故所作必絶人妻孥至不免饑寒或謂君不為歲晚計君曰水禽有名信天翁者食魚而不能捕兀立沙上俟他禽偶墜魚于前乃拾之然未聞有餓死者其夷澹雅謔類此詩不必贊也其清麗粹潔上㕘古作旁出入禪門寄興髙逺遽讀之或不易了而中有理窟覽者當自知之跋趙君靖所蔵張紫巖帖丞相魏國忠獻公名遂身退又在閒廢憂患中與友壻趙君家問悼亡方切而憂國愛君之言炯然自以為中心未嘗須㬰寧時紹興辛已邊事方擾故公尤以為憂忠肝義膽不徒因事而後見也跋東坡上樞宻論開邊書裕陵鋭意攘夷晚乃信用兵不是好事樞臣得公書惜乎不蚤以聞徒流傳至今也跋陳簡齋戲學劉子曰玉屑滿匣不可以為圭璋余則曰雖不可為圭璋要可寳也于此書亦云跋李伯和所蔵書畫東坡所作文與可硯屏贊老坡文如河漢而寂寥短章措意曲折不窘邊幅大似老泉名二子説而又過之使但言竹石之工何以為文湖州耶薄薄酒二篇兩頭纎纎終不如月初生虚飄飄終不如花飛不到地薄薄酒後作者寖不及前詞人務以相勝似不若别出機杼蘇氏璇璣圖晉史載竇滔妻蘇氏始平人名蕙字若蘭善屬文滔苻堅時為秦州刺史被徙流沙蘇氏思之織錦為迴文旋圖詩以贈滔宛轉循環以讀之詞甚悽惋凡八百四十字即此圖也與武氏所記多不同未知孰是又武氏謂二百首而龍眠止得百二十六首細推之殆不止此也跋安光逺所藏祖廉訪詩跋廉訪公以文受知徽皇屢將使指劉延康之守真定公實佐之分守京城又引以自助尋執節以死公與其三子寳學公以下䕶喪間闗兵火中送之建陽未至而死于道其為人可知鑰頃以假吏過趙石橋色深碧而累甃堅緻中為大洞跨水兩旁橋基各為小洞三若品字洞中多前良題刻不能詳記意公詩在其中也此軸多北刻無别本安氏尤當寳之又張總得與其父子伸帖總得翁才氣髙邁其子紫㣲公文采名重一世議者猶謂不及其父所與安君子伸二帖稱歎如許欲得名章俊語為定山中故事求新詩以矜式此翁豈輕為許可者耶跋撫州崇仁縣義約媺哉義約之立也風俗之媺惡繋乎士大夫先正名公有以孤生薦于鄉厯求裹糧于親故終不滿千錢憤且慙挂錢于城門矢之曰我且顯當徙族以去已而果然非輕去父母之邦葢病其里俗之不可變也崇仁固多士有因此約而成名他日得志必益思有以媺吾之俗凡濟人利物之事相與講求而興起之下至田里必有出入相友守望相助疾病相扶持之風近者悦逺者慕一變至道當于此乎取何止為目前寒士之利也耶書魏丞相奉使事實隆興二年金以兵壓境朝廷選使右丞相壽春魏公時在淮東宣諭司議幕見大夫無可使者召對便殿遂授使節敵勢方張事變叵測所謂飛矢在上行人在下而公握節抗議動中事機氣勁詞直要約遂定迄今三十年邊境晏然厥功茂矣此書所載皆其實跡也方來歸時鑰適在都下士大夫皆謂必有醲賞殊渥迎勞境上以寵其至至則論賞如格與平時泛使無異公亦退然即司宗官次而不自言久之而後為右史又久之僅遷左螭亦以序進而已葢平時壽皇鋭意恢復中原紹祖宗之大烈敵未退聴嘗詔公盡以禮物授督府為犒軍費雖卒就和議聖意不以自安也公既登從班典銓縯綸封駮相繼上眷日隆一歲九遷乾道元二間以夕郎攝大夫徑除同知樞宻院兼㕘知政事不數月㕘預為真是冬遂登揆路宰相代天理物固非賞功之官公之大用君臣遇合殆不以使事至此也制麻初攽賀版如織有客厯叙奉使大節既而曰逮兹登用咸謂疇庸在宵人竊謂其不然待丞相不幾于太淺使蘇中郎亶典屬國固難酬抗匈奴之功然富韓公卒為大臣豈専以使契丹之故公讀之以為佳公之意可知矣元豐中裕陵命蘇魏公纂修南北通和以來國信文字賜名華夷魯衛信録仍别録一本付樞庭聖謨逺矣中更喪亂書遂不全嗚呼攄髙文之宿憤必有任其責者于此書尚有攷焉攻媿集卷七十欽定四庫全書攻媿集卷七十一宋樓鑰撰題跋跋汪季路書畫王岐公立英宗詔草昭陵以英宗為皇子詔曰濮安懿王之子猶朕之子也思陵以壽皇為皇子詔曰藝祖皇帝七世孫也明白洞達曉然使天下後世知之前聖後聖其歸一揆大哉王言兹豈詞臣之力也哉魏野草堂圖冦巴東終于無地起樓臺熟魏三山居乃如許宜乎不肯以此而易彼也蘇子美詩嘗見滄浪補懐素草書至不可辨雖天才豪逸自謂信手縱筆何嘗留意然非水墨積習亦未易至此東坡祭范蜀公文唐人贊狄梁公云取日虞淵洗光咸池潛授五龍夾之以飛公稱蜀公云導日而昇燦如長庚事固不侔詞意亦卓然過之東坡與歐陽叔弼兄弟帖蘇以歐而顯歐以蘇而尊薦士蔽賢後人當知所擇東坡與林子中論賑濟帖荒政無第一手葢蓄積無素聚飢民以千萬計仰給于官活者雖多其不免者亦衆盡心力而為之尚庶幾焉爾坡翁亦自言懲熙寕流殍之禍公私皇皇曉夜措置僅免狼狽九年耕必有三年之蓄古制既不明此賈誼所以哀痛公私之積也黄太史書少游海康詩祭酒芮公賦鶯花亭詩其中一絶云人言多技亦多窮隨意文章要底工淮海秦郎天下士一生懐抱百憂中嘗誦而悲之醉臥古藤誠可深惜宜人者宜于人竟亦不免哀哉蔡京自書竄謫元符黨人詔草裕陵裁決庶政動出親札是時京方為檢正建請差官置局類而為書因委京編次迨事徽皇遂以為相業之本違御筆者初以違制論後又以大不恭論其實皆出于京也黨籍之設臣子所憤纎悉見于此藁尚可掩乎比其再相以至三入寵任既不及舊御筆一從中出京亦不知所為商鞅立法親受其弊隕身覆宗誠自取之敗國殄民中原丘墟豈不痛哉跋喬仲常髙僧誦經圖始余從鄉僧子恂得羅漢摹本舊有跋云姚仲常善畫而不易得一貴人待之三年一日欣然索匹紙為作應真數日而成其本已經四摹固知失真已遠而筆意尚卓然可觀衆像之外人物鬼神山水樹石無不畢備以瑠璃瓶貯藕花小龜縁茄而上童子隔瓶注視末有大蛇横行水簾中節節間㫁而意象自全皆新意也恨不得見真筆後又見摹本于蘇卿伯昌家則已題為龍眠矣大率事不深考又不謹于闕疑見唐人畫則指為道子摩詰不知有盧楞伽輩見國朝畫則指為龍眠亦不知有喬君也今見此圖洎巖壑跋語為之醒然且知姚之為誤也是僧黙誦何經而仙佛諸相縹緲自其口出鬼物俯聴于後皆有妙思又使人之意也消跋游嗣祖所藏帖歐公與薛公期駕部帖歐公有送公期得假歸絳詩山行馬瘦春泥滑野飯天寒餳粥香最為人膾炙簡肅公絳人也公為之壻稱其清徳直節家法嚴子弟多賢材公期豈其人耶山谷草聖草聖可習無如俗何以山谷之髙勝晚乃得脱此耳唐子西與游氏帖蜀士鄭太玉與先生游俱好世出世間法嘗曰文章習氣盍痛掃除雕琢肝腎徒勞人耳先生戲答曰吾寧盡此生筆硯間寂然之樂俟來世尚未晚也其用志如此先生嘗謂其子曰我胸中有見成論五百篇當以授汝未幾疾作遂殁紫微公以為終身之恨云跋王順伯家藏帖蘇子美錦雞詩滄浪文采絶羣正似錦雞雖欲為木雞可乎悲哉范文正公與尹師魯帖師魯自筠州輿疾至南陽託范公以死葢平日之相與者如此韓魏公與尹師魯帖嘗讀安陽集及家傳公之慮事精審非他人所及此帖尤可見兵凶戰危安保必勝或記師魯謂公置勝敗于度外者過矣王荆公書佛語公詩有云世間好事佛説盡豈為此等語耶公之書自有來處非無意于工者林和靖與通判帖通判不知何如人承平無事時佐錢塘佳郡又得此老為州民樂哉右軍章草章草之絶久矣嘗見皇象所書急就章象時有張子並陳梁甫能書甫恨逋並恨峻象斟酌其間甚得其妙中國善書者不能及蒨本自張子並以下六句間空七字今據三國呉志趙逹傳末注文填補惟如此然後可作章草此帖信是合作正使非右軍真蹟決非近世所能為者是可寳也米元章三帖一行書一篆一隸孔融遺張紘書曰前勞手筆多篆書毎舉篇見字欣然獨笑如復覩其人以是知古人作書亦有以篆者寳晉行書妙絶一世此巻四十三字尤髙而不善用二短何耶跋陳聞遠所藏了翁龜山元城帖楊龜山嘗宰餘杭今贊府陳棠則了齋之曾孫也出家藏二公及元城先生手帖家問凡十二紙邑大夫江君相與刻石于縣庠名徳翰墨前後照映整襟讀之凜如三君子相從于一時百世之下尚當興起矧聲迹尚未遠耶跋曾氏獨醒雜志余比官成均臨江曾無逸為僚嘗言其先君子平生示以書一巻葢狀其行事樊少從博士為之哀辭者端明忠簡胡公遺墨二畫得艮齋誠齋諸公為之跋誠齋又序其獨醒雜志嗚呼備矣無逸又曰先子非無意于用世蚤嵗得疾遂棄舉子業専務古學能懸腕作行草追配前良嚮也視富貴若不足浼而曰浮雲居士久益髙尚又以獨醒名齋晚號歸愚所造愈深故死生禍福之至了達如此家有章伯益友直飛跂墨戲數幅初未嘗摹倣落筆輙過之一日于敗紙寫二蟲精彩勝絶未幾遂下世故并手澤藏焉余曰畫不足為居士道也以誠齋之親且厚猶不知游藝之妙其藴蓄不見之外如此畫者多矣可勝歎哉尋得獨醒志讀之益知其為博雅篤論之君子徐節孝平日黙處一室幾若與世相忘至其論天下事則衮衮不倦有不出户而知天下之稱然猶居山陽徃來之衝若居士遠在江右而中原故事厯厯能言則又過之矣跋趙伯山責偽楚晝段太尉奮然擊朱泚人徒知出于一時忠憤栁河東拳拳録其遺事以見非出于苟然者延康二書觀者無不興起近讀其行狀在承平時遇事一一不苟故能自立于搶攘中士大夫平日苟不務操履一旦臨大節能不奪乎跋姚編禮闢敕牒議禮之家名為聚訟彼惟不得卓然名儒而雜進異議故爾嘉祐治平間朝廷清明元老大臣欲修因革禮而于下位拔用姚蘇二人書成而人無異詞為官擇人要當如此而後可以服天下成事功矣跋謝觀妙混元實録道家者流出于老氏而支分𣲖别去本寖疎道藏之書雜取百家士之有聞于世者多以拜章役鬼煉氣􅠉金為能此皆燕齊方士之餘去本又遠矣觀妙本儒生學道于皇甫清虚葢知尊老子者博極書傳薈粹成編窮搜約取自號實録且言凡十六變之説事迹隠晦其餘間見紀傳不載時代者不述與夫放光見瑞示夢傳言靈驗等事非化身下降者亦不復載庶幾傳世不誣然青羊白衞之靈迹瓊臺玉局之奇祥此類尚多果皆實歟嘗誦公是先生之言曰蒼茫六合外𣺌莽三皇初近既未必有遠亦非必無信如斯言安知其非實也跋李武義翼行狀天寶之變擁强兵坐而觀者相環也而賈賁以一尉討賊張巡以縣令起兵朝不坐燕不與古人不免有是言忠臣義士惟知盡節不以位卑為辭也李侯官不過徼吏而獨奮一臂抗方張不制之敵矢死不屈凜然如生三復遺事為之流涕跋朱巖壑鶴賦及送閭丘使君詩承平時洛中有八俊陳簡齋詩俊巖壑詞俊富季申文俊皆一時奇才也南渡以來詩俊文俊皆為執政大臣相與力引巖壑之名始以隠逸召用于朝而骯髒不偶終以退休鶴賦之作其有感于斯耶使其羽翮一成豈不能翺翔寥廓徃而不返猶思以靈藥仙經求報主人愛君之意又見于此余生晚不及見猶識蘄州史君淳誠篤實似古君子宜巖壑相與之厚也書張待制字發行實後余嘗過越與士人語靖康建炎間事歎曰李鄴以吾州降金雖苟全一時之民而貽我千載之辱余慰藉之曰彼但自隤其家聲安能汚大府耶欽宗倉卒遣使廷臣多畏避苟免中書侍郎陳公慨然請行欽宗為之泣下特免其行見大夫無可使者卒遣之其副則待制張公二人皆奮不顧身深入虎狼之區淪陷十餘年竟握節以死忠義之風凜凜如生是豈不足以刷會稽之恥哉士曰然皆吾鄉人也兹讀張公行狀因記于後跋袁起巖所藏閻立本畫蕭翼取蘭亭圖此圖世多摹本或謂韓昌黎見大顛或謂李王見木平皆非也使是二者不應僧據禪牀而客在下座正是蕭翼耳呉公傅朋云書生意氣揚揚有歸全璧之色老僧口張不嗋有遺元珠之態時元珠之元宋避廟諱所改亦非也翼以權謀被選遠取蘭亭首奏乞二王雜帖三數通以行至越衣黄衫極寛長潦倒得山東書生之體方卑辭以求見銜袖之書乃是御府所齎野童自隨亦攜書帙此正畫其納交之時後既得蘭亭則以御史召辨才曉然告之不復作此儒酸態矣且其時此僧為之絶倒良久何止口張不嗋而已右相不惟丹青精妙其人物意度曲折尤非後人可及也跋姜堯章所編張循王遺事栁河東以段太尉逸事上史館自言好問老校退卒能言其事考其所載者三戮郭晞之軍士撫焦令諶之農者不受朱泚大綾之幣顧太尉忠節顯著何必俟此三者而後為賢葢惜其逸墜且以見太尉之平昔非一時奮不顧死以得名者舊唐史之傳雖詳以未見河東之狀故三事皆闕而不書宋景文公謹謹書之其為佳傳之助多矣堯章慕循王大功而惜其細行小節人罕知者矻矻然訪問而得此將以補史氏之遺其志可嘉也跋東坡獲鬼章告裕陵祝文永樂之禍可勝痛哭鬼章生禽宿憤遂攄太宗平突厥髙宗平髙麗當告陵廟葢以唐髙祖蓄憤于北狄太宗鋭意于東夷武功未終後聖繼志亦既平盪所宜啓告此長慶中奏語也不知當奏告時有雄文如此否跋東坡送劉道原歸南康詩劉凝之棄官居南康歐陽公所為賦廬山髙山谷謂其忍貧如鐵石者是生道原坡公亟稱之所謂古君子即凝之也司馬公通鑑一書賴道原為多其子壯輿亦奇士坐客問此詩本末因為道此跋嘉祐二年進士小録鑰曾大父登治平二年乙科大父登元豐八年丙科近嵗傳得小録又因併録紹聖二年者大率與今小異今又見此書四者俱以前一葉盡録雜事而此又分試題為三等殆不可曉同年生無分職姓名下每事輙容一字事之因革類如此不能詳考矣是嵗得名士十五六人而蘇長公少公皆在焉此真千佛名經也跋揚州伯父賦歸六逸圖淵明聨句山谷西軒真長望月太白把酒玉川啜茶東坡題詠嘗見古畫六逸圖孫登長嘯阮孚蠟屐淵明以巾漉酒韓伯休貨藥邊孝先晝眠畢卓甕下皆非同時特取其逸耳非若竹溪六逸之同游也滕子濟藏唐人出游圖亦六人宋之問王維李白髙適史白岑參雲林子跋云據其名題或有弗同時者而揚並驅睇盼相語以為得意忘象者揚州伯父所圖是豈可與俗人言耶又四賢圖謝安游東山張翰思蓴鱸子陵釣臺淵明臨流賦詩謝公雖為蒼生一起而東山之志不渝子陵出見劉文叔終不肯為三公以歸季鷹淵明尤為髙尚伯父擁麾持節十餘年興寄髙遠尚友四賢晚而得歸殆不負此志矣跋了齋有門頌帖鑰舊讀了齋集見有門頌一篇莫知其㫖慶元二年八月上澣有二僧叩門袖出了翁真蹟及與延慶第四代明智講主論此頌二帖讀之恍然因問天台教觀之説云智者大師所説四門一曰有門一曰空門一曰亦空亦有一曰非空非有其實一可貫四四實歸一公之為有門頌葢謂此也近世士大夫用力不及前輩只如學佛或僅能涉獵楞嚴圓覺淨名等經及傳燈録以資談辯爾若唐之梁補闕諸公本朝楊文公楊無為張無盡及了翁皆留心教觀深得其趣讀此頌及書可以知其所造之深矣惟公忠言大節照映千載身罹百謫視死生如旦晝平時學問深造自得固自應爾方在丹丘時逆境尤多而心地泰然深入不二法門公之學佛得力豈易測識哉二僧欲刋之石以信天台之傳謹書于後而歸之二僧曰妙珣了怡云跋施武子所藏諸帖鍾繇墓田丙舎帖慶元二年孟冬壬子見餘姚施令尹葢司諌之子也出其家所藏墓田帖碑石余誦山谷之詩曰平生半世看墨本摩挲石刻鬢成絲為之三歎王右軍東方畫贊李陽冰上李嗣真論右軍書有云畫像贊洛神賦姿儀雅麗有矜莊嚴肅之象視之信然黄庭經硬黄小字臨黄庭平生所見三四非精筆不能到第未知玉軸黄庭比此何如耳雲林子以陶隠居之言證此經非逸少書而隠居與梁武帝啟自以黄庭為逸少有名之迹若遂以為興寧以後宋齊人書恐亦未易定也王大令洛神賦大令好書洛神賦而李陽冰論右軍書與畫像贊同稱右軍之蹟不復可見不知更勝此否栁公權記于前璨題其後何止公慙卿耶東坡救月圖贊舊未見此圖直不知贊之所以作東坡竹樹猶傳之文與可兹以一㸃成月一抹成蛇曲盡妙趣葢自得之若曹不興誤墨成蠅子敬為烏駮㹀牛髙道興墜筆亦成畫彼皆工于畫者坡乃以游戲至此真天人哉東坡醉中書對客醉眠詩公自言我書意造本無法㸃畫信手煩推求然豪逸邁徃如此者不多見毎毎言酒氣從十指間出而飲酒正自不多豈所謂醉中醒者耶跋卞居讓攝泰州長史牒并宣徽院公文余平時見士夫家故物未嘗不起敬亦因考其所自竊考此巻前曰敕泰州團練使乃檢校太保姓荆者敕授之官如今之公牒前必曰知某州軍州事之類也自牒奉處分以後則泰州之公移也既差卞君攝長史故為之詞其後列銜皆泰州之官印文凡七皆泰州團練使印唐朝固有紙告而此非告也後一紙宣徽院之文姓柴者禹錫也禹錫以太平興國七年四月拜樞宻副使至雍熙二年冬方罷而此文乃八年九月所給故知其為禹鍚也國朝舊制宣徽二使通掌院事共院異㕔止用南院印又南院比北院頗優或兼樞宻亦掌本院皆與此合石晉天福五年除翰林承旨改殿前承旨為殿直或云淳化三年始改殿前承㫖為三班奉職葢蘇易簡以是年除承㫖而其次子耆續翰林志云舊有殿前承㫖其父拜翰林承㫖上以其稱呼不别又以其與清貴混淆詔改為三班奉職以避其稱因備載之然此巻乃卞氏故物相傳二百餘年又出于兵火煨燼之中是可寶也跋温公題劉雜端孝叔奏藁孝叔名述神宗初為侍御史知雜事王安石始參知政事述疏論權數不足任云云最為切直宋史本傳失載尚見東都事略士大夫特立獨行無待于助然亦賴巨公正人以為重韓忠獻論事切直有本末王沂公稱其不負所職諫官宜若此而忠獻益自信劉雜端之奏藁司馬文正公以為純忠懇至深識治本明主宜置座側以為觀戒雜端可以自信可以不朽矣一時得喪其猶足存耶跋陳昌年梅花賦皮日休賦桃花欲狀其天冶専取古之美女以為況此賦形容清致故又多取名勝高人以極其變梅固非桃可比體物之工亦又過之跋孫徳輝作薛持國所居記南朝何子季築室秦望山山發洪水樹石皆倒拔惟子季所居巋然獨存太守衡陽王元簡命鍾嶸作瑞室頌刻石以旌之薛君家再脱鬱攸之災鄉人敬之水火雖不同亦可名瑞室云跋李光祖所藏遠祖遷定海縣丞告天福八年乃石晉髙祖之末呉越第三世𢎞佐之三年自同光改元武肅王建國以來二十有一年矣是時呉越雖奉中原正朔事皆専行令丞銀茜之賜豈復有闗于晉朝況此告不稱敕而稱制葢呉越國承制而行者也或者猶疑官制印文等全似中朝考之五代史呉越更名所居曰宮殿府曰朝官屬皆稱臣遣使冊海中諸國封拜其君長又通鑑言建國之始儀衞名稱多如天子之制教令下綂内曰制敕將吏皆稱臣惟不改元置百官有丞相侍郎等又范魯公五代通録云自稱呉越國工參佐稱臣僭朝廷百僚之號府曰朝廷但不改年號而已通鑑又有寶正之稱五代史十國年譜載至六年而後已平章事等官雖不可徧考亦有可言者中書侍郎曰鄭遨五代史一行傳有鄭遨隠居華山唐明宗以左拾遺晉髙祖以諫議大夫召之皆不起則是隠居不仕又天福四年已卒且不與呉越相干非此鄭遨也翰林學士行禮部侍郎知制誥元徳昭後為呉越丞相及事𢎞佐與俶至顯徳三年周世宗使呉越出兵擊南唐時猶在相位所謂元丞相不欲出師者元本危姓危仔倡以信州降武肅武肅惡其姓遂易元氏徳昭即仔倡之子熙寧中參知政事章簡公絳厚之即徳昭之孫也蘇魏公為章簡公神道碑言曾祖仔倡又言祖徳昭武肅王稱制用以為相官至右僕射兼侍中晉國公銘曰憲憲公祖遂相錢塘然則此為呉越之告無疑如給事中曰輦右丞曰𤣥亮皆未詳若門下侍郎平章事曰鼎者疑是林鼎武肅以羅隠林鼎為賔客元瓘以鎮海節度判官林鼎掌教令恐至𢎞佐時為平章事未可知始武肅嘗列賔佐將校名氏于紀功碑隂者五百餘人而見于史者如沈崧沈瑫皮光業輩不過十數人其他不可得而見姑叙其可見者以俟博古之君子云五代亂世仕于晉朝與仕于呉越不足為輕重要欲辨其所自耳李氏藏此告二百五十餘年得以存先世之舊信可尚也光祖所記清泰三年閏十一月正當後唐廢帝之末晉髙祖改元天福之際乾祐元年則漢隠帝之初也併書之又蘇黄門帖蘇少公謫居筠陽今有雜著一編别行于世吾鄉李光祖一日攜其曾祖屯田所傳筠陽唱和集見示時在元豐間雍維瞻度支為守屯田字君績為倅與潁濵及一時士夫唱和甚衆余既假而録之光祖又攜此一帖及二刺字來考之遺老傳少公以著佐為簽書南京判官長公以詩得罪從坐而謫監税居五年移知績溪縣此帖云已離洪州正赴績溪時也餘帖既歸蘇氏此尤當寶藏之舒中丞誌屯田公墓謂雖老翰墨篇章益遒瞻可喜然則宜其與少公相好也書董資政耘元帥府事迹髙廟中興之初紀載時事者類非一書間有異同無從質正初史官奏請詔隨龍人與藩邸帥府舊僚并前宰執各令記録事迹撰為一書以進御取其實而不誣者降付史官計當時臣僚應為此書者多矣而髙廟獨以屬四人葢妙選也大資政董公預焉是髙廟深知公之必不誣也舊嘗見一二編未問登載之工拙紀事之虛實徃徃因而自列其功狀故見者多疑其私公初為大元帥行軍録遇盗亡失既無復見今讀此編據一時見聞之實以事繫日炳炳如丹扈從之久亦云勞矣曾不自言止載二奏劄之可考者若制詔書檄及李綱宗澤之表奏何烈之小史徐偉之忠謀録及痛定録等皆公以為可信者併裒而上之然則此編是所謂實而不誣者真可備史氏之採擇以信後世豈特為董氏之家寶也跋魏忠壯侯勝行實乾道初余嘗過山陽望清河口弔忠壯魏侯戰死之地故老猶能言當時事相與悲吒久之又嘗從老校退卒問知守海州事甚衆猶記一二侯有鍮石具裝明光甲胄日射如黄金出入行陣敵望之膽落嘗被甲坐城樓觀戰備駿馬城上望見我師少卻怒甚推去雉堞飛騎而下徑入陣中敵望風奔潰又嘗戰北門既㨗忽囘騎徑出南門人不知所謂葢慮酣戰于此或擊吾背也已而敵果襲南門以數矢卻之三軍敬服後得參政錢觀文所記言隆興二年仲冬敵出清河連艘而下侯率神勁弓射之矢盡而船出不已以戰艦拒之中流為敵衆所乗矢下如雨勢不可支棄船登岸敵已渡者衆被圍甚急冒東南而出身中數箭拔之復上馬告急于大軍而救不至侯膽勇善鬬而人馬被傷已十七八士氣已竭進退無所因墜馬遂死之而大軍亦喪氣矣觀文時為淮東宣諭使當得其實嗚呼使當時擁强兵坐而觀者稍出數十百騎為之聲援豈至是哉今覽行實為之三喟子孫多壯士尚其勉旃跋蘇魏公所臨閣帖此蘇魏公所臨閣帖也譚訓云嘗于相國寺置得閣本法帖十巻甚奇畢文簡公賜本也魏公記誦絶人固由天分博極羣書葢出學力觀此巻臨摹之工其勤可知申人自怠而欲追及前輩可乎跋華氏中藏經余少讀華佗傳駭其醫之神奇而惜其書之火于獄使之尚存若刳腹㫁臂之妙又非紙上語所能道也古汴陸從老近世之良醫也嘗與之論胍云無如華佗之論最切曰性急者胍亦急性緩者脈亦緩長人脈長短人脈短究其説未暇也一日得閩中倉司所刋中藏經讀之其説具在葢貳卿姜公詵為使者時所刋凡三十餘年而余始得之序引之説頗涉神怪難于盡信然其論議卓然精深髙遠視脈察色以決死生雖不敢以為真是元化之書若行于世使醫者得以習讀之所濟多矣惜乎差舛難據遂攜至姚江以叩從老從老笑曰此吾家所祕不謂版行已久因出其書見假取而校之乃知閩中之本未善至一版或改定數十百字前有目録後有後序藥方増三之二閩本亦間有佳處可以證陸本之失其不同而不可輕改者兩存焉始得為善本老不能繕冩俾從子溉手録之蘄春王使君成甫聞之欣然欲于治所大書鋟木以恵後學且以成余之志因以溉所録面授而記其始末于左藥方凡六十道亦有今世所用者其間難曉者有之恐非凡識所及佗傳稱處齊不過數種又未知此為是否好事者能以閩本校之始知此本之為可傳也攻媿集巻七十一欽定四庫全書攻媿集卷七十二宋樓鑰撰題跋跋陸宣公奏議總要阜陵喜觀陸贄奏議故紫㣲崔公為總要一書上之東坡先生曰如贄之論開卷了然聚古今之精英實治亂之龜鑑然奏議繁重尚勤乙覽是書摭華芟宂因門分類名言確論一閲而盡得之所以開導聰明禆益治道多矣易曰納約自牖崔公有焉跋石曼卿古松詩曼卿上世家幽州燕俗勁武少以氣自豪書體兼顔栁前輩謂愈大愈竒余三見真蹟禮部尤尚書家西師詩有旗光秋曉起甲色夜江横之句歐陽氏籌筆驛詩有意中流水逺愁外舊山青之句今又見此詩影摇千尺聲撼半天尤為人膾炙皆警䇿也歐陽公稱文章勁健稱其意氣余以為字畫尤有劒拔弩張之態吾鄉郡從事官舍中先有籌筆驛石刻久矣今趙君致逺又欲刻此是為二妙也跋周公禮殿圖余近得臨江周公禮殿圖石刻紹興十七年向薌林刻于學宫疑與先人所藏畫本不侔聞大資政趙公帥守成都嘗摹禮殿本為八軸借而校之丹青煥然自盤古而下位次向背不同者十八九虙羲八卦上下各有字位置亦不倫䕫之球為鍾無傅說像孔子弟子中多徒父叔魚原亢又一人闕名石刻中有梁鱣字叔魚而形貌不類卻無顔路公孫龍冉季公祖兹漆雕從狄昱公良孺奚蒧叔仲㑹容蒧顔之僕左郢而有蜀太守李氷又一人無名第七軸畫文翁司馬相如􅋌衡蕭徳仁戴聖王吉嚴君平揚雄劉向服䖍陳實鍾繇諸葛亮崔桓平福王濬杜預張華杜畿豆盧第八軸畫漢武帝蕭何張良叔孫通陸賈陳寛賈誼司馬遷董仲舒漢光武鄧禹桓榮班固張湛廉范馬融第五倫鄭𤣥公孫𢎞兒寛丹青愈工皆石刻所無益州刺史張收未知在漢何帝時後漢諸名儒或在其前若鍾繇諸葛亮王濬杜預張華等皆魏晉間人既在張收之後豈後人所續耶武帝光武列于諸臣之間次序亦多不可攷蕭徳仁崔桓平福名不甚顯豆廬複姓不知何名姑記大概以俟攷證跋孟蜀王與周世宗書余家藏此書既以五代史證其事兹閱張次功所編蜀檮杌載此尤詳因具書于後廣政十七年周世宗即位改元顯徳周師至仇池攻秦州韓繼勲鳯翔王萬迪請益師昶遣雄武監軍使趙季札率師赴之季札怯懦不進乘驛而還成都震恐昶怒斬于市十八年五月李廷珪髙彦儔吕彦珂總衆以禦周師九月戰于唐倉監軍王巒被殺我師敗績廷珪退保青泥閏月周師克秦階成等州雄武節度韓保正棄城遁十一月又克鳯州執節度使王環監軍趙崇溥二十年六月周世宗歸我秦鳯之俘昶遣使致書謝稱大蜀皇帝世宗不答昶曰朕郊祀天地稱天子時爾方䑕竊作賊何得相薄耶二十一年荆南遣使來致書言周世宗已定淮南請通職貢昶不許跋任氏所藏外祖汪少師帖鑰生長外家事外大父少卿二十餘年屢侍筆硯書問多出親札外祖母王夫人居奉川任氏與舒董諸家皆至親相與篤厚類此忽瞻遺墨肅然起敬陳后山謁龎丞相墓有云少日拊頭期類我暮年垂淚向西風陳簡齋跋存誠子帖有云客來空認袁公額淚盡慙無楊惲書三復二詩重増悲歎跋參寥詩參寥以東坡門人得罪黄師是坡之姻家時為京東漕使坡與之書曰參寥以某故竄兖州望為之地師是曰昨方有兖州樓教授見過其人必長者遂以為屬教授鑰大父少師也領其意而行既至兖與之定交後宰登封一日閽人告曰有僧攜行李徑欲入門自言與知縣故人不可止遏少師笑曰必參寥也已而果然館穀縣齋嘗同登嵩嶽之頂游從倡和參寥集中所稱試可即少師之字也諸父猶及見登封時事兖州一段舊得于師是從子叔愚子魯云珣公所藏二軸皆其得意詩翰墨飛動真可寳也集中有九江與東坡話别詩云霅水黄樓赤壁間勝逰長得共躋攀坡亦云算詩人相得如我與君稀周旋如許何止工詩而已耶少師遺文碎于兵燬僅存二十四峯詩與師喜雨詩有云一聲雷碾青山過萬里風驅白雨來之句兹見師詩重増感慨然卷中和愚上人二首開字奉字鵶字三絶漪漣齋一首皆不見于集以此知遺亡者亦多矣跋桑澤卿和林和靖詩和靖詩似其為人自然髙勝不特梅花為絶唱也澤卿一一細和間有不能辨者風度又可知和靖絶筆一篇云湖外青山對結廬墳前修竹亦蕭疎茂陵異日求遺草猶喜曽無封禪書此則不容和矣跋從子深所藏呉紫溪㳺絲書錢塘何傳朋游絲字前無古人黄給事仲秉鈞嘗稱蜀士仲明舉詩云春蠶一縷來不㫁萬鈞筆力歸毫芒佳句也然未若參政漢濱先生王公瞻叔之詩為工伯父揚州嘗得二紙于呉公從子深求書王公之詩于後又題所書羅端良文三篇新安羅端良願公輔器也止于鄂州世所共惜劉子澄清之為倅亟以其詩文為小集以不暇求全也所作無不精妙而陶令祠堂記社壇記爾雅翼後序尤為髙勝端良方無恙時嘗以此三篇見寄意亦其最得意者余每為子弟誦之從子深請書此卷後有作者欲論淵明及社稷事恐無以過此爾雅翼一書深恨未得見之也書吏商贈趙仲堅題其後余從兄之子伯時一女謹擇所歸近以歸趙仲堅佳公子也既尉新城以此巻來求余言老矣幾與世相忘素不長于吏道又非能言者何以告子惟仲堅大父龍學少師一世吏師光顯于朝精明强敏誠有不可及聞其在上虞時忍貧如鐵石已為半刺猶執巻田間躬視僕夫糞田灌蔬竟日一肉故曰人有不為也而後可以有為知宗長子也繼有賢譽仲堅廉謹詳練師祖若父尚何他求為書栁河東吏商以贈而繫以此仲堅勉之哉跋周尚書武仲詩軸余少讀龜山先生集見周憲之墓誌知公孤立于宣和中獨祐陵知之甚深公以御史觸忤權貴屢蹈禍機詰王黼拒梁師成極論童貫蔡攸之罪至往來使不測之敵伏節不屈建炎元二間為刑部吏部尚書髙宗欲柄用之而不及剛毅之氣可畏而仰兹讀公詩詞翰俱高尤使人起敬公諱見詩注憲之其字也建之浦城人嘗為貫所誣謫黄州三年日以詩酒自適無漂泊流寓之歎卷中多黄州詩意其正在謫居中葢宣和末年也又稱公以文學名于世餘暇留心翰墨得歐陽率更筆法至是尤可信矣跋虢國夫人曉妝圖虢國夫人承主恩平明騎馬入金門却嫌脂粉汙顔色淡掃蛾眉朝至尊余每疑此恐非杜少陵語後乃得于張祜集中葢集靈臺第二篇也素聞同年林子長家有虢國夜㳺圖甚佳而未之見或謂此曉妝圖也豈正畫平明騎馬時耶跋范石湖游大峩詩卷文殊示現于五臺普賢示現于大峩光景殊勝大畧相似舊見無盡居士清涼傳書五臺事甚詳亦有詩紀所見今石湖先生大峩數篇尤為竒偉張公素不善書必不能如此翰墨飛動然無盡後謁無業禪師塔塔上五色光現有詩云四入臺山禮吉祥五雲深處看熒煌而今不打這鼓笛為報禪師莫放光尤為禪林稱誦使石湖再登大峩必須别有一則佳話也跋徐神翁真蹟海陵漢晉間有樂真君子長或云徐二翁其後身也如蔡魯公之東明吕東平之善守尤為著驗此卷脱去白字遂為桑公大夫登第之祥可謂神矣然使吾得為二翁道成之後閉口藏舌何用管人間如許間事跋姜氏上梁文藁姜氏在京師以財雄南來吾鄉子孫遂以儒顯舅氏適齋尚書汪公跋語甚詳七夕書此卷閲兩旬而下世殆絶筆也鑰以外門之故向來親見上梁文屬藁之初宣奉公慶七十時丞相壽春魏公見委以樂語有云生長東都親見開元之盛際從㳺諸老及聞正始之遺音又云今日王孫猶有承平之故態當年竹馬得見㑹昌者幾人丞相頗以為然姜氏家風葢有自來其興則未艾也上梁文必言兒郎偉舊不曉其義或以為唯諾之唯或以為竒偉之偉皆所未安在敕局時見元豐中獲盜推賞刑部例皆節元案不改俗語有陳棘云我部領你懣厮逐去深州邊吉云我隨你懣去懣本音悶俗音門猶言輩也獨秦州李徳一案云自家偉不如今夜去云余啞然笑曰得之矣所謂兒郎偉者猶言兒郎懣葢呼而告之此闗中方言也上梁有文尚矣唐都長安循襲之然嘗以語尤尚書延之沈侍郎虞卿汪司業季路諸公皆博洽之士皆以為前所未聞或有云用相兒郎之偉者殆誤矣因附見之跋傅夢良所藏山谷書漁父詩漁家無鄉縣滿船載稚乳鞭笞公私急醉眠聴秋雨右山谷之父亞夫詩也谷之詩既刊諸石此雖僅得三之一殘圭㫁璧要自可寳谷嘗有古漁父詩云四海租庸人草草太平長在碧波中殆此意耶又孫鴻慶作傅和州墓銘鴻慶孫文昌一代文章伯也誌人之墓固未免于稱美兹為和州之誌有云其學自六經太史氏百家諸子浮屠黄老之書無所不讀其文自歌詩賦頌表箋傳序箴銘紀誌亦無所不工又曰文章閎麗可當大典冊詩語精深可列于歌頌以薦郊廟此非心服其能不作此語也夢良為余鄉邑三年且去矣膴仕當未艾若御民一以寛簡聴訟如家人無疾言厲色如和州之在蘄亷直有父風所莅皆有迹又不減繁昌之政能世其家者也和州諱諒友繁昌諱鞏跋可壽上人所藏史文惠公帖于襄陽問紫玉如何是黑風吹其船舫漂墮羅刹鬼國玉云于頔你者漢問恁麽事作麽于當時失色玉云祇者箇便是漂墮羅刹鬼國于於是有省于在襄陽傲上虐下號為襄様節度猶能有此前輩賢達所以好與有道髙僧游者正以富貴隆盛諛言塞耳若不得此等人安能深錐痛割如許太師史公地位中人與師為方外交此詩帖皆其蹟也二人相得必别有針鋒相湊處非外人所知不然安得相與如此之深耶跋禇河南隂符經隂符經説者甚衆以文義不貫頗費牽合葢嘗疑之唐李筌傳驪山老母之言曰此符三百餘言百言演道百言演法百言演術上有神仙抱一之道中有富國安民之法下有强兵戰勝之術分為三章又有六註謂太公范蠡鬼谷張良諸葛亮及筌也繋以正義不言誰作後序中謂出于驪山老母亦間有無主名者略計太公之言八張良之言九鬼谷六諸葛五范蠡纔一見而筌及正義尤詳又與世所版行注本不同後有㫁章三贊又道士希嚴不知何許人作贊三十九首可謂備矣或總題其後云觀注者粗得一二而贊者畧無彷彿信其奥妙不可以智知而言説姑存之耳誠哉是言也比歲于都下三茅寧壽觀見禇河南真蹟注本始知上古真仙各出語一二以至三四自愚人以天地文理聖此句似有脱誤字而彼不言為誰其間有若相應答亦有㫖意全不聯屬者將由羣仙之集而為之耶抑髙真薈祽而成此經耶初有道流攜以求售索價不貲未幾羽化于觀中遂為三茅寳藏摹得其本以歸兹因徐粹中醇一為慈谿至道宫建藏手寫以遺之凡見河南所書三本其一草書貞觀六年奉敕書五十卷其一亦小楷永徽五年奉㫖寫一百廿卷及此葢書百九十本矣二者皆見石刻惟此真蹟尤為合作字至小而楷法精妙河南卒于顯慶三年年六十有三書此時計四十五歲而永徽所書則五十有九矣豈惟筆力不可跂及亦安得此目力耶然三本詳畧亦自不同草書本又冠以黄帝隂符經要當以此本為善仍命長子淳細書臨摹于後尚存舊本之萬一云書石門披雲集後縉雲川谷惟石門最可觀誦太白之詩舊矣乾道五年先工部守括蒼侍旁見石門洞文躍躍然欲㳺未能也明年冬先君解印綬余適分教永嘉奉雙親東下登覽勝處為題詩壁間淳熙末自温守得㫖奏事復過其下相羊竟日盡見巖石留題恨不能悉記奉祠里居而羽士王君愚叟訪余于寂寞之濱自言嘗住此觀裒古今詩文為一編將歸而刻之閲一再過如蹈夢境少作非工亦列其中又荷好事者為之次韻老矣無由更尋故歩慨然為書于後而歸之愚叟好棊與琴詩有佳語又能集此以永山中之傳信雅士也跋趙清臣所藏濮議嘉泰元年三月乙巳訪餘姚令君趙清臣觀書閲畫久之清臣曰嘗見濮議乎余曰固嘗見之君所藏何書也曰頃丞金壇得于蘇氏云歐陽公以此議獻之神宗而出鎮道遇蘇魏公語及此事徑以奏藁授之遂為蘇氏家寳余歸而閲近歲廬陵所刊文忠公集則此卷列在一百二十卷以後首尾俱同而録本多誤亦間有勝于版行者因併為手校而歸之公序此議而進之神宗時罷政而出為觀文殿學士行刑部尚書知亳州以年譜攷之實治平四年正月葢神宗即位三月公得亳社故序稱先帝議稱英宗其第四卷劄子注云是歲十月撰不曽進呈謂治平三年也三月以言者指濮議為邪説求去不允十月成而不及進者英宗時已服藥故併進之神宗也其為後或問二篇及漢魏五君論晉問未知所著年月公薨于熙寧五年壬子年六十六此書進于治平丁未年六十一矣因併見之跋桐隂韓氏家問蘇魏公嘗言韓忠憲教子嚴肅不可犯知亳州日第二子舍人自西京倅謁告省覲坐中忽云二郎吾聞西京有疑獄奏讞者其詳云何舍人思之未得已呵之再問未能對遂推案持梃大詬曰汝食朝廷厚禄事無巨細皆當究心大辟奏案尚不能記則細務不舉可知矣必欲撻之衆賓力解方已諸子股栗累日不能釋家法之嚴如此所以多賢子弟也或疑其言為過觀此家問可信不誣亦是亳社時事可畏而仰哉象君令君猶能守家法邑事整辦庠序一新又刊此卷寘之學宫真桐木韓氏之子孫也跋張徳深辨虚余少時嘗得儀真所刊司馬氏潛虚中多闕文不能遽解隆興改元先光禄官奏邸檢詳新安張公為僚同寓直舍時在侍旁日從之㳺自言家有潛虚全書亟借而傳之又言為慈溪令時有張氏徳深漢邃于易元元謂揚雄所作者宋時避廟諱改書今仍之後同葢未識潛虚也嘗示之一見即言其大義歸閲數日著辨虛一篇洞曉其説因畧為余言之自此始知虚之大概獨未見所謂辨虚者相去幾四十年與新澧陽郡博士張子宓䖍語及此書子宓曰徳深從叔祖也始得見之凡十餘篇兼綜易元二書易曰卦元曰首虚曰名卦有爻首有贊名有變二體四位十等之象八物五行與生成之數乾中元之所以始一三五之所以虚與夫揲法占法皆若異而實同又辨氣體性名行命與蓍虚之得此幾無餘藴徳深之學真有淵源而總序則檢詳為縣令時所為也檢詳又云虚之書未成而已傳温公晚始以全書授范太史淳夫遂傳于蜀後以問蜀士曰非也觀物先生張公兵部行成所補託為此言耳觀物先象數之學著述衍翼元元包總義潛虚演義經世索隠外篇衍義通變等七書近百卷世號精博嘗取演義讀之為卷十六潛虛之書章分句析尤為詳盡比辨虛不啻數倍果如蜀士之言非此人亦不能補此書然觀物之書未出而徳深能辨之此其所以尤難也檢詳又言通鑑為温公之筆學潛虚為心學方疑總序中不見此説兹又得發㣲論攷之則衍總序而為總論遂及筆學心學之説直以為出于已而沒徳深之作自元以準易虚以擬元論而下有九篇八篇皆徳深之舊止有變論一篇論律吕者在此書之外猶恐是其本文而此所傳者或闕焉又不載五宫天軌歲紀三圖徳深辨名之末謂齊處大中之内斟酌造化其斗之任乎今發㣲論乃曰處大中之内在天其北極之任乎輕改一言失其㫖矣土分王于四季齊亦土也居中而斟酌造化故以北斗之任非謂若極之居其所也檢詳為察院時以發㣲授司馬侍郎季思伋其兄漢章倬為湖廣總領遂以版行實乾道二年也淳熙十一年檢詳之子南金又刻之世罕有知所自者鑰非欲與檢詳辨誠不敢沒徳深之實而惜其不少見于世也徳深兄弟讀書躬耕其兄宗丞亨時濟得薦送而歸其父題于門曰三四郎今年免耘田専掌送茶其樸茂類此徳深耽嗜古學天文地理無不該貫此特其一也劉允叔夢紫𤓰而作舍萌題其後退之送窮而延上坐子厚乞巧而甘抱拙若允叔之舍萌則真驅之雖未能絶紫𤓰之生畏君之詞自爾當不復敢入吾夢矣然此種一名不落彼夢滿甑三顆不妨甲科釋褐者殆以此又似不必力驅之也為書其後以壯昆季西上之氣跋朱叔止所藏書畫徐季海題經趙氏金石録目録第七卷一千三百四十唐徐浩題經天寳中立歐陽氏集古目録云經首有楞伽阿跋陀羅寳經一部乃浩所書而經則吕問姚子彦等寫也在嵩山經藏院叔止所藏雖不見所書之經而季海所題為可寳又足以攷天寳中官制之一二云李公垂書樂毅論李公垂短小精悍詩最有名時號短李其在翰林與李徳裕元稹同時又號三俊傳稱以文藝節操見用余固嘗見石刻大字不知其小楷精到如此今世以海字本為第一殘闕已多此卷比右軍所書甚小墨蹟具全尤為可珍詳視印章葢巖壑老人故物也龍眠蓮社横卷余得蓮社圖高三尺横二尺筆力精勁五采煥發妙絶一世龍眠真筆也此為横軸大畧相似時有不同元中之記云童子蹲而汲水者一人而有二書猿一麞一而猿亦有二麞則鹿也元中書甚工既非其親書疑别為一圖作記余所藏童子汲水及猿皆一而麞亦鹿也龍眠為此圖妙意非一自知愛重或縱或横意必有數本恨未能盡見也此卷謝康樂不為長鬛捕蛇翁亦欠朴惷之狀必有能辨之者跋李孟達含章六世祖少卿詩卷少陵之祖審言山谷之父亞夫再傳三傳而詩遂名世自李早梅而下傳數世而詩益昌盛哉跋沈雲巢帖雲巢妙于楷隸諸書備古今體寸墨尺紙落筆輒為人争取富池靈神猶知䕶惜子孫尤宜寳之也跋吳僧若逵所書觀經太府卿蘇公伯昌諤為明州長史僧有獻少公維摩經手澤葢為老泉小祥書此後以示蜀士士曰蜀有長公書圓覺經與此同時字體亦相類以所攜石本示公且許求墨蹟以來後不知曽得之否若逵二經元祐諸名公為之跋而増重觀經儼然如新不知法華經何在安知他日不能復合耶攻媿集巻七十二欽定四庫全書攻媿集卷七十三宋樓鑰撰題跋跋揚州伯父所藏魏元理畫卷蓮荷爾雅釋草言荷最詳其莖茄其葉蕸其本蔤其華菡萏其實蓮其根藕其中的的中薏觀魏君墨戲曲盡形狀殆無餘藴又有熟芡生菱鳧茈之屬一一如生袢暑尤宜觀之所謂宛然坐我水仙府也桂花伯父揚州持節擁麾幾徧東南襟度髙勝所至多與雅士游若魏君元理之畫徐公明叔之書皆擅名一時者桂花才一枝諦觀佳處疑有秋風生其間跋龍眠二馬余家藏白氏長慶集乆矣近又得吳門大字者周伯範模欲得舊本以所藏龍眠二馬遺余古有以妾換馬者矣以書換馬自攻媿始可博一笑跋趙共甫古易補音小學之廢乆矣陸氏經典釋文可謂詳盡近世讀書或至苟簡率意誦習字有不識者始加閲視有訛謬終身不自覺知而况補音乎吳氏好古博洽始作詩補音雖不能變儒生之習而讀之者始知詩無不韻韻無不叶祛所未悟有功于古詩多矣吾友趙共甫又取其説以補古易之音用志甚勤逺以示余閲之不去手鑰老矣習氣未除頗為是正一二目昏成嬾媿不能盡力也噫凡將爰厯等書今不復見惟許叔重説文解字為小學之本顏黄門家訓稱其檢以六文貫以部分櫽括有條例剖析窮根源集韻雖博贍于攷古則未可全據共甫今本諸呉氏多以集韻為證更當以説文解字定之可傳無窮呉氏之書不知者以為苟然而已共甫祖其餘論鑰又喋喋及此皆謂之癖可也雖然自當有好之者題拳毛騧杜少陵觀曹將軍畫馬圖詩云國初已來畫鞍馬神妙獨數江都王又云昔日太宗拳毛騧近時郭家師子花名畫記江都王緒乃霍王元軌之子多藝善書畫鞍馬擅名陳后山亦謂一紙千金不當價人傳此馬為江都筆誠有之長安志太宗昭陵有六駿在陵後曰拳毛騧金石録昭陵琢石象平生征伐所乗六馬為贊刻之此馬神駿耐戰是横行萬里堪託死生者史稱秦王自起兵以來前後數十戰身先士卒輕騎深入雖屢危殆而未嘗為矢刃所傷今觀帝手書親乗之馬槊箭之瘡十有二處而不及其身真天人哉攷之史其平黑闥也洺水大陣信然榖州乃河南府之新安福昌二邑也武徳元年改榖州至顯慶二年始廢此言合鬬蓋征世充時黑闥乃在山東也跋趙振文經幢碑趙振文為臨安郡從事寄示小碑得于井中蓋錢氏専知囘圖酒務曹從暉所立經幢也從書會同十年嵗在丁未七月十五日試攷之石晉嵗在丙申改元天福三年戊戌契丹耶律徳光改元會同至天福九年晉改元開運至開運四年嵗實丁未契丹入汴滅晉六月劉知逺建國曰漢仍用天福十二年正契丹會同十年是丁未一年實晉之開運而漢仍稱天福契丹則日會同也明年戊申漢始改乾祐錢氏兼有兩浙自唐乾寧二年至皇朝太平興國三年凡八十五年當五代時貢奉中國不絶惟唐明宗時安重誨奏削鏐王爵元帥尚父以太師致仕時嘗稱寶正年號安重誨死復鏐官爵復用中國正朔今乃用契丹年號耶律滅晉時大赦改晉國為大遼國開運四年為會同十年意必亦頒正朔于諸國故錢氏用之此史氏所未見也錢𢎞佐以是年卒而俶立史不書月舊五代史𢎞佐以漢初卒于位而倧立漢祖入汴之嵗十二月倧為胡進思所廢此蓋𢎞佐已卒當倧之時也因併著之跋王伯長定武修禊序定武本凡湍流帶右天五字全者皆謂在薛紹彭之前然不能知嵗月之乆近此誠善本王順伯謂是熙寧前摹拓于中山者為可貴近見畢少董所藏董氏淳化間本尤為精好自言為兒時親在定武見青石本帶右天三字已闕壊大觀再見之與舊所見無異則五字未必皆紹彭劖損也更當攷紹彭在中山時嵗月云跋余襄公題崖碑襄公以孤生起嶠南忠言劘上顯于慶厯嘗出居庸闗口伐戎酋于九十九泉退其二十萬之師西邊亦賴以定晚而經制五管前後十年如交趾大理特磨南詔之國皆可以頤指氣使使坐廟堂真可以鎮撫四夷乃終于南方人之功業不惟有時亦各自有地如伏波之在南孔明之在蜀蓋非一人不然昭陵非棄才之主而公之用不得盡為可歎也此帖字有顔體石崖天齊人物亦俱與之相髙云跋李莊簡公與其壻曹純老帖韓文公潮州表柳河東囚山劉賓客謫九年文愈竒而氣愈下盛哉本朝諸公如忠宣之徳度元城之勁節東坡先生英特之氣行乎患難髙掩前人莊簡公流竄瀕死重以愛子之戚尤所難堪家書中言議振發略不少貶其氣何如哉三誦以還慕仰不已純老姓曹氏諱粹中吾鄉之善士有詩傳行于世真冰玉也跋金花帖子綾本小録王扶盛京集賢王公金花帖子其孫鄜州謂端拱二年太宗朝第三牓者誤也當以益公所攷為正尚書宋公名白時以翰林學士禮部侍郎知貢舉其同知貢舉則知制誥李公沆帖子花押蓋二公也咸平元年知舉四人楊給事礪李舍人若拙梁司諫灝朱祕丞台符盛公帖子花押乃此四人也太宗以至道三年上賓咸平改元真宗諒闇遂不廷試而敕下禮部放牓登科記亦稱省試故猶得以帖子報中選者非以不臨軒策試而廢兹制也知舉止列祖父不及三代糊名復于淳化三年至是已七年矣藝祖一朝進士凡十五舉多者不過三十餘人太宗朝取士寖廣至二百餘人獨孫何一牓放三百五十五人諸科合千餘人後世但駭其多而不知前兩年詔權停貢舉至是集闕下者萬人太宗既多取之而後連四年俱有權停之詔次五年為至道三年三月以大喪不暇及至咸平之初詔以乆停貢舉頗滯時才令禮部據合格人内進士放五十人諸科百五十人來嵗不得為例于是進士孫僅等及高麗所貢竝賜及第此小録所載五十一人是也祖宗時貢舉之疏數取士之多寡惟上所命非若近世之定制也鑰髙曽先祖仍三世登科中遭兵燬故書無一存者先祖少師元豐末年焦蹈牓丙科後從年家章氏傳當時小録雖印為大編而與今制不侔者已十餘條又嘗見嘉祐二年章衡牓東坡兄弟小録與焦牓者不殊今始見王盛二家金花帖子及綾本小録前此真未聞也諸公跋語如載知舉家諱私忌等外若韻腳明主空一字按此下有脱落字句詩限六十字以上成論限五百字以上成皆與今小異今止書第一人此直書狀元外氏書其母之封五十人貫開封者三十七人不應如此之多按端拱二年有㫖國子監生並須品官子弟開封府有户貫者充豈以此故士子多用開封貫耶貫建州者二人一日建寧軍一日建州書事不同如此者非一祖父俱存者今曰重慶而第四人張景書榮侍下父祖未仕者書不仕三代名下書皇任者柳河東作陳京行狀云五代祖某陳宜都王曾祖某皇會稽司馬祖某皇晉陵郡司功參軍父某皇右補闕云云或謂書皇者以表其仕于唐也此又不然多有稱皇不仕者又或止書見仕某官每一頂各空一字皆與今不同此牓止五十人可以綾書不知前此孫何一牓三百餘人亦可以綾書耶小録之作近亦屢有輕以意改者要知典故所在前人多有深意一遵其舊可耳吁又何止此耶司諫祕丞各稱其官楊公為翰林學士而止稱給事李公知制誥而稱舍人亦因可見前朝之官稱云楊公開國之初為第一人李公為乾徳四年進士第五人梁公與其子固俱為大魁朱公則孫何牓第二人主文極天下選宜乎得人之盛僅繼兄何固為盛事劉煜子岳父溫穸是終身不聴樂者中山劉子儀參政季子淵皆在此牓髙輔國曾祖季興祖從誨俱為南平王蓋荆南髙氏輔國之父保寅不知在從誨十五子中為第幾人與繼冲俱歸本朝者也吕䝉休三代俱贈師傳父龜圖母劉氏徐國太夫人文穆公䝉正之弟也王克從為彥超中令之孫句希吉為中正之子盛京為文肅公度之弟樂黄庭父史任職方員外郎是作太平寰宇記者其任職方宜矣李山房謂知名之士幾三之一後生寡陋不能盡知姑誦所聞一時人物不亦盛哉借摹本於豐宅之有俊老眼不能細書令從子溉臨寫藏于家仍備書其後而歸之跋雲丘草堂慧舉詩集余頃嵗游雲巖有詩牌挂壁上拂塵讀之云朝見雲從巖上飛暮見雲歸巖下宿朝朝暮暮雲來去屋老僧移幾翻覆夕陽流水空亂山巖前芳草年年緑愛其清甚視其名則僧舉也曰非季若乎僧曰此今之廬山老慧舉也後得其詩編號雲丘草堂集及與吕東萊紫微公雪谿王性之後湖蘇養直徐師川朱希真諸公游最後尤為范石湖所知盡和其大峨諸詩余赴東嘉亦辱詩為贈近世詩僧如具圓復瑩温叟輩淪落既盡而師亦亡矣其徒覺淨求跋其後感念疇昔因為書之師老于禪悦詩句特其餘事而能兼得衆體佳處不可以一二數讀之者可想見其人不勞贊歎也跋蘇氏囘文錦詩圖晉史載竇滔苻堅時為秦州刺史被徙流沙蘇氏思之織錦為囘文旋圖以贈滔宛轉循環以讀之武氏及見晉史之成不知何所據依記載如此之詳滔字連波記之末云因述若蘭之多才復美連波之悔過故山谷題此圖云千詩織就囘文錦如此陽臺暮雨何亦有英靈蘇蕙手只無悔過竇連波正用武氏之記而任子淵止以晉史注之豈未攷此記耶余前後見舊畫數本大小不侔未有如此卷之精者跋東坡行香子詞揮塵第三録載東坡自黄州移汝州中道起守文登舟次泗上偶作詞云何人無事燕坐空山望長橋上燈火閙使君還太守劉士彥法家者流山東木強人也聞之亟謁東坡云知有新詞學士名滿天下一出則京師便傳在法泗州夜過長橋者徒二年况知州耶切告收起勿以示人東坡笑曰軾一生罪過開口不在徒二年以下吾鄉豐吏部叔賈誼倅盱眙游南山寺有老僧云寺舊有苦條木一段上有東坡親書行香子詞後沈于深水中亟募人取得之遺墨如新就刻其上尋為一軍官買去析為槍幹矣此詞惟曾寶文端伯所編本有之亦云與泗守游南山作則揮塵所載殆未盡豈與之同游後乃閲其詞耶偶從豐氏得墨本既登之石又以寄施使君武子請刻之以為都梁一段嘉話跋黄氏所藏東坡山谷二張帖東坡與黄潁州父子厚善嘗書潁州之父子思詩集之後又龍圖二女為少公二子适遜之婦觀此祭潁州之文與龍圖直閣二公書問情好可知子思名上字孝下字先潁州名上字好下字謙龍圖名从宀从是字師是直閣名从宀从辛字才叔居宛丘家藏二蘇翰墨甚富此二十一帖及孫志康二帖墨妙亭記鵶種麥行及山谷二張公挽詩直閣之孫約之年纔十三遭靖康之變隨其父郎中公脱身來南能攜以自隨既又力貧登之石其未刻者一二爾可謂善守家法者也余嘗銘其墓亦為及此約之幼子直義以真蹟見示為記其大略坡書皆有法石本類多失真此卷字字飛動恵州儋耳及北歸等帖尤為老筆信可寶也第六帖云因志康行即孫君也第七帖云乞會稽使其得請則題詩必滿浙東矣第十六帖云乏人寫大狀不罪簡率蓋今所謂外啓者前輩書問皆用之故云第十九帖在曲江云何時定居少安晚節歸及毘陵而仙去曾不得一日之安也悲哉黄太史張右史張浮休皆一時人物之英則潁州之賢可知太史先自金華徙豫章潁州之先自浦城徙宛丘嘗叙宗盟故稱從姪右史為龍圖友壻且居于陳嘗為潁州作友于泉記故敘鄉曲浮休又周旋伯仲間任道即汝陽守誦三公之詩使人興起也墨妙亭記惜未登之石鵶種麥行有章草體别是一種風氣祭潁州文故潁州使君同年黄兄集云幾道大夫年兄之靈終焉玉雪集身為玉雪不緩不集不絙與義降升集與道含章不矜集終焉不矜墨妙亭記以為吳興新集集無以字余以事至吳興集至湖乃為差乆集猶為差乆山谷詩仕路厭風沙集厭作困袖有投虚手集手作刀張右史詩但使將軍桃李在集使作得聞凶哭朋友集聞哀若朋友張浮休詩常憶之官潁上時集作憶昔著靴騎馬集作乘馬三公詩皆親筆集中猶不同如此豈編集時嘗改定耶跋遺教經歐陽叔弼集古録目遺教經巻弟二百六十三右不著書人名氏刻石年月世以為王羲之書石在永興歐陽公集古録跋尾遺教經相傳云羲之書偽也蓋唐世寫經手所書爾唐時佛書今在者大扺書體皆類此第其精粗不同爾近有得唐人經題其一云薛稷一云僧行闕書者皆與二人他所書不類而與此頗同予知寫經手所書也然其字亦自可愛故録之蓋今士夫筆畫能髣髴乎此者鮮矣山谷云不知何世何人書或曰右軍羲之書吾嘗評此書在楷法中小不及樂毅論爾清勁方重蓋度越蕭子雲數等非右軍筆畫也趙明誠金石録云唐遺教經正書無姓名第一千九百四十八跋云國初時人盛傳為王右軍書惟歐公識其非是攷諸公之論非右軍書明矣然歐公謂唐寫經手所書明誠定著為唐遺教經則尚有可疑以世民二字俱如此寫不空筆畫恐非唐人書或若山谷之言不知何世何人得闕如之意也跋東坡紙帳詩坡公次韻柳子玉二詩曰地爐曰紙帳此紙帳詩也集中紋作文㲲作疊煖作暖秖作但皆可通惟以鯨為衾則非也少陵有太子張舍人遺織成褥段詩有云開緘風濤湧中有掉尾鯨後又云錦鯨卷還客始覺心和平坡正用此事而編集者未之攷也此卷字畫飛動不可形容公嘗和子由論書曰端莊雜流麗剛健含婀娜豈自道耶跋陳進道所藏杜祁公詩右杜正獻公詩翰界紙謹書三誦起敬第不知請郡四明者何姓公自注云君侯逺祖諱郃始知其為孫氏按四明題名記云孫郃博學髙才唐末授左拾遺淨恵院即其故宅載于圖經唐文粹有古意效陳拾遺有哭𤣥英方干先生詩有卜世論春秋無賢臣論皆郃之作也又不知孫氏為守者為誰太守題名記中無之止有孫扶在端拱中又與正獻不同時慶厯中王周以司封郎中為守鄉人也政和七年鑰先祖少師為鄉郡兩任涉五年在任除次對所居號晝錦坊南門内有錦照橋與正堂相直宅之後有錦照堂在今竹洲上宅之左有堂名以繼繡以繼王公之後也不聞有姓孫而為鄉守者王岐公作孫威敏墓誌嘗以樞密直學士知益州道中罹母憂服除以為陜西都轉運使未欲逺去墳墓得知明州屬盜起山東改知徐州威敏越人王荆公在鄞時答元規大資書有云比方得邑海上而聞左右之别業實在敝境豈威敏以别業在此故有仁里之言又豈威敏得請而正獻贈以此詩既改徐而不及至郡耶淺陋姑誦所聞未必真是進道好古博雅更試攷之蔡君謨詩㑹亭遇資政孫公赴闕公致仕已七年時召歸將有西鄙之任有云新治甬上居閒逸安暮齒以是知亦嘗居于四明書從兄少虛敎授金書金剛經後嗚呼此從兄教授少虛之真蹟也兄少好二王書筆力素髙後得樂毅論石刻深愛之一筆不妄下故楷法精妙字字可敬觀者當自知之兄諱鈜少虛其字也幼有俊才日誦千言未冠能屬文十五應鄉書中其選又十年始入太學聲聞諸公聞公試聖人肆筆成書賦薛叔雲元鼎魁文固佳而兄之賦云元聖有作斯文在兹惟得書之體也故肆筆以成之兄自少習書未嘗作賦時方兼經一出而爭誦之私試惟聖人可以踐形論冠絶一時蓋他人皆謂聖人能踐形兄獨謂可以踐形尤得孟子之旨而文又勝蜀名士馮圓仲方李知幾石為學官相與擊歎且曰東南乃有如此人才耶必欲寘首選雖以異議小卻而名愈重紹興二十有九年解試為第七名明年省試為第六名三場俱髙而堯仁如天光武總攬權綱二論尤為世所稱述錢子和豫為參詳官批其卷云議論雄特文勢雅健非老于史學者不及此無有與之爭衡者方未第時嫂鄭氏不幸勉強赴省既登丙科授鹽官尉已成見次遭伯父朝散之喪哀毁瘠甚奉親至謹真是食在口則吐之至是欲寛伯母陳氏安人之憂先意承志曲盡子道服闋除泰州教授未幾又罹内艱何其多難耶乾道三年莊文太子將葬宫僚二詹事庶子諭徳當作祭文而難于言或以屬兄為之文曰嗚呼惟天惟祖宗啓佑我國家純篤生哲人允惟元良及兹重離竝明家用平康於萬斯年肆用貳我宸極承我兩朝用奉若于天休洪惟我億萬年竝受丕丕基者庻其在兹若之何弗弔旻天降割于我家虚我主器惟御事庶士越在外服越百姓里居罔不䀌傷心矧惟某等有服在百僚惟我儲君既冠成人夙敏日躋弗勤弗煩惟兹四人無能徃來厥有顯徳亦罔克紀述惟速戾于厥躬是懼若涉淵水今日月有時惟是窀穸之事所以奉神靈于幽宮者其孰敢弗䖍肆惟靈其監于兹雖多用盤誥語而體正文古無能易者衆作為之皆廢尋為臨安府教授以為郡國首善為上庠之亞堅持規矩學者翕然師尊之光宗以東宫尹京内侍知省甘昇怙勢横恣欲廣湖上園囿諷府中移置社壇府命兄為祝文兄執不可以書扺少尹曰依奉令旨改移社壇就昭慶寺前築疊令譔祝文某竊以社稷繫一府利害不可輕有改作况今皇太子殿下領尹事大體重尤難輕議某雖聞見今社壇委是荒蕪沮洳每嵗不問晴雨只就寺宇祠祭深失禮意此實累嵗有失修治止冝芟治增築别建祭屋孟子云祭祀以時然而旱乾水溢則變置社稷趙岐謂其間有旱乾水溢之災則毁社稷而更置蓋謂國之事神者既備而神或不職然後可以易置示加責于神也今六氣順序别無災沴若今輕改社稷神何所依祝史之文其將何辭揆之幽明事未穏便欲望别取令旨止下本府如法修築若必欲改移所有祝文不知所謂難以下筆未敢制譔言雖不用而聞者歎服咸曰昔知其能文不謂風節如是之髙也淳熙改不考試婺女得疾卒于貢院夀止四十有二嗚呼痛哉天胡予以才而嗇其夀畀之名而奪其禄耶娶鄭氏宣和太宰居中之曾孫再娶孫氏紹興參政近之孫郎中大雅之女俱無子以族人之子演為後又得一子灃于民家以其為遺體也始日者唐杞謂兄不夀且大期不逺齋戒泥金以書此經冀望少延而竟如其言尤可哀也兄喜讀莊子漢書故文氣有近似者嘗謂鑰曰我欲手寫古書意所好者首以檀弓繼以天問天對之屬必與時好不合欲名曰攻瑟編大率志尚如此甥壻盛箕號能文自婺來明作四明八詠頗工衆方環坐讀之兄乆與之厚字呼曰次龍沈約文體卑弱可憎君又效之耶坐客赦然盛亦悔媿藏其藁不出鄭先生剛忠席下數十人兄一日忽私謂鑰曰吾黙觀同舍中惟楊聖可與吾弟為佳問之則曰惟汝二人清而有福問兄何如又曰我雖清如無福何今同舍凋謝存者蓋寡聖可名公冶晚得官而有子琛登甲科兄非相形者而風鑒乃如此鑰少兄四嵗愛撫訓奬過于同氣其卒于婺也徃為䕶喪以歸兄之昆弟五人惟幼弟在其子浹裝潢此卷以求跋痛念兄之抱負不羣宜乎逺到顧其少作與場屋之文俱不足為兄道而區區具載于此者傷其不夀而見于世者止此其亡也誌銘不立羣從輩行今亦無幾鑰不書此則兄之哲蹤逺韻遂泯泯矣故書之不嫌于詳鑰非不慕兄之書而天資不潁不及逺甚于是年六十有七矣勉追後塵而猶如此雖覺我形穢亦無所辭焉跋仲兄嚴州所書安遇山房顕扁先君銀青嘗讀葛文康公集見其父清孝公行狀云所居以安遇名軒言遇無定遇安有常安先君欣然曰此吾之心也遂以名所居之堂自號安遇居士先是卜夀藏于報國山仁濟院祖妣魏國墓左因作小菴于山下號安遇山房命仲兄書其扁後既葬于長汀而山房亦廢仲兄遺墨尚存從子濚裝池求跋痛念父兄相繼下世二十餘年撫卷不勝感泣跋王恭叔所藏淵明雪中詩圖初寮跋祖潁所藏東坡帖言吏部趙公元豐元祐與坡為代所藏則公使淮南時坡所行詞也言公之孫竒育而不及棄竒蓋寮之愛壻也集中與之賡唱近三十篇亦謂之趙十六有云何敢壻君真好友端來學道伴衰翁與之别則曰吾詩如鐘須子撞豈可一日相參商則翁壻之間固可知觀此圖則又知其兄弟之相與風度殊不凡王郎示余此卷余何敢望寮君之伴我亦我家之祖潁也跋先大父徽猷閣直學士告政和間先大父少師被命守鄉邦再任至四年宣和二年方臘起睦州連陷睦杭歙處四郡聲摇兩浙承平既乆至勤京師遣大兵而後勦滅時先祖備禦甚嚴保全郡境適召赴闕下不敢遽去奏乞侯代以安人心事定奏聞遂升學士綸告既登之石足為家寶惟是詞臣不知其詳襃詞既簡外祖汪公所記鑰實知之時諸父多仕于外九伯父暨先君待次里中揚州倅卞公養直圜在伯父館下為此跋語亦未深攷也鑰昔聞之臘之初起本無足畏朱勔父子以花石進奉等結怨東南所在頑民好亂者與臘相應賊勢日張其實皆村民也少隨侍處州聞其來處也止以數舟載百餘人絳帛帕首帶鏡于上日光照耀自龍泉山間亂鳴鉦鼓順流而下諸邑洎城中望風而遁略無守備遂據州城又欲破温州賴劉教授士英唱義堅守台州賴滕司户膺二城皆全鑰嘗仕二州尤聞其詳温則處賊洪再使其徒來攻其西呂師囊以魔術發于台之仙居既破樂清又攻其東危甚郭少保仲荀等以西師來援始免台亦師囊之黨攻城甚急久而後解二城雖僅免而城外皆為盜區蹂躙殘滅甚矣越分帥府雖不至為賊所迫而剡川新昌魔冦大熾被害最酷及寧海俱與奉化為鄰避地而來者如織恐賊徒雜于衆中人心恟恟先祖經畫大略如汪公之記神道碑云台越二城雖全而外境皆殘破惟明六邑秋毫無犯為得其實矣爰是東備海道南塞新剡寜川之衝布耳目逺斥堠戒僧寺不復鳴鐘有急則鳴以為警賊知有備不敢犯我在諸郡中闔境獨全明賞信罰境内之盜亦不得發發亦輒得祐陵知之深嘉屢歎故賞之尤厚冦既平改睦州為嚴歙州為徽剡縣為嵊亦可見當時之事變矣鑰不肖且老每念先祖之功無有發其幽潛者會從子深以此卷求跋敬叙所聞使後來者知之書機汲記贈姜子陽題其後乾道五六年間先光禄守括蒼兄弟隨侍郡齋中無處不對谿山之勝而山無水源取汲于谿一日試同仲兄步至谿滸一下數百步又攀援而歸喘汗乆不定相顧曰徒手上下猶如此彼卒輩負水而登日不下數四其勞甚矣思有以免之竟無䇿而止後偶讀劉賓客集有機汲記聱牙難曉詳究其説則啞然曰是可施于括蒼無疑然乆無所告語姜子陽鈐轄沿檄來歸因語及此詢問甚悉是有心于利物者因為録賓客所記又命工作小式以遺之歸見黄堂儻獻其説而贊成兹事縱未能筧以達于正堂但得引寘山上而運之比汲于谿者大有間矣外而公廚及公帑釀酒之須皆可以濟下至巖居而谷汲者亦可倣此若小有不合則又在潤澤之功子陽幸加之意焉跋豫章别集苑原目此首後有跋王伯奮所藏文英華跋清閟居士臨修褉序二首今竝佚其文一詩二銘贊頌三序説四記律賦箋注老子一篇杜詩六十首東坡少游參寥各賦春日詩十首參寥第八首云梅梢青子大于錢慙愧春光又一年亭午無人初破睡杜鵑聲在柳花邊山谷别集書王氏夢錫扇乃是此詩但首句云壓枝梅子末句云杜鵑啼在柳梢邊豈山谷愛參寥詩嘗書之扇耶山谷以承天院塔記為人所訐遂貶宜州記文及毁壁序皆見此集攻媿集卷七十三欽定四庫全書攻媿集卷七十四宋樓鑰撰題跋跋沈智甫所藏東坡帖諌原目此首前有跋五帖一首今佚其文坡公以端明殿學士侍讀學士為定州安撫使紹聖元年落職知英州道貶寧逺軍節度副使安置惠州帖中又言過邢州疑是此時再遭逺斥不知所與何人既言道友恐是佛印參寥諸公以書唁之公不領細人姑息之愛而望其警策以進于道一見梁邢州之善政而亟稱之不計身之百謫恐一善之不聞嗚呼此其所以不可及也跋揚州伯父所藏張魏公帖魏公謫連州凡四載夫人侍太夫人居長沙紹興二十年移永州始迎版輿同處時伯父揚州以湖南漕兼潭帥權臣當國士夫或以傾覆遷客為進身計伯父義概凜然劉杼山在全則持使節以過之魏公在連則時節餽問其母自潭過永又津其行魏公所以致謝之勤也百謫不怨惟思報上徳而收拾人物之心猶不少忘可以畧見公之所存矣又錢希白三經堂歌紹興二十四年嵗在甲戌先銀青部綱過儀真鑰實侍行時七伯父方以漕使兼揚州遂到郡齋公餘出示書畫卷有草書一軸末章云君家世世為好官後書錢希白今五十年矣偶以問諸孫而桂始出此卷葢三經堂歌也希白名易呉越國王倧之子與其兄昆隨俶歸朝願從科舉年十七舉進士御試三題日中而就言者以其輕俊而黜之太宗語蘇易簡曰朕恨不與李白同時易簡曰有錢易者李白才也太宗喜曰若然當用唐故事召至禁林㑹盜起劍南不果用復舉進士甲科又舉賢良方正科官翰林學士俊逸過人為文數千言頃刻而就又善行草書有文集在秘閣觀此卷可知其人也宋諫議敏求著東京記載崇慶坊司空致仕李昉宅有孝經道徳經為三經堂家有東京圖崇慶坊在城之東北有李昉司空宅則詩所謂夾城盡北十里街者也黑轓葢用漢舊儀丞相兩黑轓事攷其家譜子孫為郎者衆獨未知客曹為誰司空之子宗諤為翰林學士年不及五十真宗甚悼之恨不及大用且曰自國朝將相家能以聲名自立不墜門閥者惟昉與曹彬家爾宗諤之子昭述亦為翰林侍讀學士從子昭道為天章閣待制世世為好官非虛言也跋從子深所藏書畫東坡公以元祐五年在杭州治西湖四明圖經載太守七人皆止書元祐年韓宗道李莘李閌王子淵張脩劉淑吕温卿不知所與何人謂視此民猶公民雖欲勿與得乎錢明逸張文潛錢子飛父子兄弟俱中制科作字猶有父風然以言事致杜范富三公皆罷政惜哉張右史手書自有一種風氣與大禮慶成賦藳相類林和靖蔡端明范太史和靖名逋字君復而曰君復頓首古有此例比西臺差少肉信然求仲葢用三徑事也蔡端明詩見於集中第八卷題云二十二日山堂小飲和元郎中牡丹向謝之什范太史筆勢端重似其為人集中今無此詩家傳謂自紹聖之後貶責萬里屢遭焚溺之厄元符喪歸再嚴黨禁家藏文字固已不全靖康避地遷徙所存益少悲夫劉杼山伯父揚州與杼山同在京師太學相與最厚觀此書詞交情可見此皆在貶所書也第二帖三霍之言雖出雅謔葢是時鮮有與遷客相親者故鴻慶孫尚書亦有望望然如避垢汙之言其志先伯之墓有曰余謫洮陽夀玉方持湖南使者節過我相勞苦如平生與此意不侔矣第三帖問疾而進苦語有味其言哉鑰少隨侍溧陽及拜公牀下見與伯父一書其言尤切有曰久聞夀玉後堂甚盛某不敢謂然吾儕老矣違情逆境固不可堪若縱意于聲色之娛為計似疎其于保夀命也左矣人世浮生其誰不死眼前亦何嘗見有百嵗之人然古人必謂衞生有經者大恐未死以前或因此疾病纒身舉動須人其況亦何可堪也嘗厯厯服膺此言不知舊帖何在前輩責善之義如此陶公安世因公之言遂為伯父上客後所立亦不負二公之知時先君銀青為道州僉幕避伯父親嫌而歸亦過清湘見公故帖中兩問及後在溧陽受知尤深公嘗曰某無他長頗能對客發書草聖飛動觀者必謂敏手鑰親見其落筆沈著詳緩甚不茍也感愴疇昔謹為詳志之李西臺西臺不惟以書名毎見其詩真有唐人風度紙尾花押筆力亦不凡錢曲臺昆吕芸閣大臨蘇後湖庠錢裕之善草𨽻而字體又與希白子飛不同郤近李西臺但未老耳芸閣先生經學之餘詞翰皆有餘韻後湖居士詩筆俱老豈奪命鬼手之後哦詩結字尚有餘習耶止之諱正由了翁次子其與前輩相接如此家風可知游御史酢建安㳺先生從伊川逰在謝上蔡楊龜山之間宜其與了翁父子相厚也龍舒為今佳郡是時乃空乏如此天災流行可無先備耶趙清獻清獻平生四入蜀先為蜀州江原縣後厯梓益兩路漕使又兩知成都最後則已為執政矣神宗亦曰能為我行乎帖中言寄家甬上單騎入蜀是為部使者攜一琴一龜時耶徐東湖徐東湖與了翁家相厚如家人通判郎中即了翁次子止之也呼以仁弟情義可知韓南陽宋宣獻文潞公南陽為元章簡公書神道碑字體莊重正如此宣獻傳言筆法精妙上嘗取所書千字文及其家之墨迹藏禁中故敝紙渝墨尚有典刑潞公翰墨飛動使人望而畏之曹子方祐陵盛時曹公上書極論時事廟堂質責之問所從知對曰天下皆知之而相公不知所謂焉用彼相遂貶去京尹不忍辱之引頸荷校而行吏卒問何以為路費曰少俟吾子已而一介草履負擔而至即其子也問所攜前則草履後則乾糧卒輩憤然欲加捽辱子奮曰我父得罪朝廷爾曹敢加無禮我當殺爾愕不敢動靖康初召還寖至樞筦又閩人也宜乎逰了翁之門石曼卿張都官石學士以書名所謂愈大愈竒者張都官未知何等人要是前輩作字不茍如再拜尊候施於所敬今亦不見此風矣張魏公紫巖翁忠肝義膽炳炳如丹蓋矢死而不變也使士夫俱能懐此心國其庶幾乎吕子約哀哉子約見其書如見其人始余以隆興初元與其兄東萊為同年聞子約之賢而未識也淳熙九年子約来掌庾事余在先君服中時時相過情義日篤服除舍弟買舟赴調或傳以為余將西上子約在庾中亟以片紙力言其不可前余固不為行計然此意不可忘也其後兩得同朝迨天台贅倅之行又見其遭貶自此不復得見亦不意其蚤没也嘗評其人楊秉三不惑之外視軒冕又如浮雲非勉强然也見其進未見其止觀人多矣未有表裏如一如子約者所謂葢有之矣我未之見也九原可作微斯人吾誰與歸周蓮峯朱􅈞山王侍御伯庠紹興之末蓮峯周貳卿歸自永嘉􅈞山朱公舍人歸自平江俱以次對來寓四明僧舍侍御王公年雖未及而從二公逰完顔亮既平周公賀表用萬馬救中原對一驢載都市朱公問之侍御適㕘坐誦臧質傳中數十言二公俱稱其强記故倡酬之頻如此周公之詩三惟中篇及朱公一詩皆親筆侍御皆使人代書葢至敬之地不敢縱筆也山谷與王才元舍人詠牡丹詩云欲搜佳句恐春老試遣七言賖一枝周公豈用此事耶鑰少時俱及拜三公牀下撫巻惘然豈復得此前輩人物乎徐明叔剡溪雪霽圖伯父揚州所至辦治官府清簡坐多佳客如徐公明叔其一也幼時猶及望見徐公之風流韻度如晉唐間人翰墨篆畫四明人家多有之時徐貳卿獻之為守與敘宗盟久留郡齋如秦詔刻石篆韻皆其筆也嘗為髙麗使屬盡圖其山川器物以歸兄穉山侍郎有重名從子子禮志其出處甚詳謂畫入神品山水人物二俱冠絶濡毫漱墨成于須臾此卷幾是矣命女壻狀其行則近故㕘政張公伯子也因併記之跋再刋裴公紀徳碣熙陵命王著集法帖第五巻有李斯篆十八字米南宮云未知何人書葢亦不敢以為斯之書也黄秘書伯思長睿著法帖刋誤云按其文云田疇耕耨為政期月而致法令使父子為鄒魯乃李陽冰篆王密所撰明州刺史河東裴公紀徳碣中字也此帖乃摹田疇等十八字為斯書與碑中篆無銖黍差而米云不知何人書葢未見此碑也校書攷古精確類此然秘書又云自蒼頡至程邈書皆偽史籀書傳後世者岐鼓耳今此書云揚州裴易惠糸字殊無三代體與其辭皆唐人筆亦為未盡葢所謂史籀書者即此碑額中字也乃碧落碑第二字唐字也陽冰最愛碧落碑故用之秘書以為楊字殆未攷爾州􅘌惠三字皆在糸即紀字之半但無易字疑以明字疊而成之特以大為小豈秘書卻未攷此碑之額耶若謂字無三代體與其辭皆唐人筆亦可謂精鑒矣建炎三年此邦兵燬最酷舊物幾無存者待制仇公得此碑于蓁莽中重刻之而或毁焉僅存其額識者深惜之貳卿李公以臺省舊徳来臨政成多暇訪得墨本新知繁昌縣玉牒善潼素工小篆専以屬之輦石其家臨視摹刻漫者闕之以成此一段奇事使裴公之政陽冰之筆與公之名俱傳又俾鑰書其後亦預有榮焉按東武趙明誠徳甫金石録此碣又有八分書者今不知所在矣貳卿名景和九江人也為趙晦之書金剛經口訣題其後鑰七世祖以貲為奉化縣錄事當咸平中民俗富厚一意奉佛邑之告成明化等塔廟多所營建時杭州新印華嚴經贖十部以歸又刋法華經版造百部皆以分施邑下諸寺至今猶有存者嘗得古銅觀音像于江沙中長僅尺餘而相好端嚴寶藏于家是生四子六世祖其次也尤篤厚種徳五世祖正議先生以文行教授鄉里三十年皇祐間登第起家一時名公舒豐羅袁童郭姚俞皆為髙弟曾祖金紫兄弟繼世科諸公又皆執友而與提刑羅公尤厚葢其醇茂勤篤甚相似也開禧元年表妹壻新彭澤趙丞晦之師侊欲刋六祖金剛經口訣鑰方居先妣安康郡太夫人之喪痛念先妣平生佛課至謹既于卒哭前手寫法華經以資㝠福因許為晦之書此口訣及觀後序則羅公所作敷暢經意又發明六祖之說且云士大夫無不樂助而四明樓君某願助成其事則我曾大父也遂謹書之且易注文為大字以便觀者區區之誠願以追薦祖先二親無量功徳其中妙旨開警迷懵者非一善讀者當自知之跋山谷西禪聴琴詩此山谷西禪聴戴道士彈琴詩也山谷之詩不待贊揚手自分内外篇今之詩集傳於世任公子淵為之注者皆自入館後詩纔七百餘首外集乃有千餘有如此詩而不得在内篇又或云晚年刪去詩可易言乎内篇有聴宋宗儒摘阮歌不知與此何以分必有能辨之者集中幽水曰幽泉更作曰更似外集又有招戴道士彈琴詩豈亦斯人耶跋晁深甫所藏東萊吕舍人九經堂詩伯父揚州家有錢内翰希白三經堂歌其蹟甚偉初不知為誰氏作後閱宋諫議所著東京志始知為崇慶坊李司空家三經乃孝經道經徳經也末章云三經不滅堂不壊君家世世為好官兹見東萊紫微公題晁氏九經堂詩益知大家文獻相承未始不以經術為本也跋葉氏夫人墓誌四明衣冠雖盛自開國以至紹興曾未有仕登兩府恩及三世者二十四年嵗在甲戌史公才始為端明殿學士簽書樞密院事兼㕘知政事贈三世為東宫三少隆興元年從子浩為㕘知政事未幾為尚書右僕射同中書門下平章事至淳煕五年再為右丞相其後位極人臣生為太師賜第行在所玉帶金魚勳名富貴康寧夀考為近代臣子之冠子孫繁衍不惟為吾鄉衣冠盛事四方搢紳亦莫不歆艷企慕而求其源流之所自則出於八行之一人又遡而上之則八行之母葉氏夫人流慶也夫人以子孫贈典凡十七封為冀國夫人太師文恵王推原本始追崇極品之外上及五世之祖其敘致積慶之由可謂極其至矣然猶未能知葉夫人之詳也開禧二年新監文思院彌忠致族黨之意叩門而告鑰曰葉夫人之志銘碑石既碎於兵火不知所在近方得於故書中始知於煨燼之餘僅得斷碑上世能録其銘雖有闕文而其志銘則子之大父少師為鄉郡時所作也嗚呼建炎三年吾鄉遭兵燬最酷我家先世遺文片紙不存粗能班班見一二不謂乃有此碑伏而讀之不肖孫不敢為溢美之言至其言曰人皆謂天之報施善人在此而余獨以為曷止是哉葢本固則葉茂源深則流長累行積徳厚矣後必有顯者未易量也銘詞又有曰天之報施固未易量後必有顯以大厥光是時樞密方為遂昌縣丞而終貳大政文恵王即夫人之曾孫也碑中五子一尚幼者後名光七孫若訥即文恵王之書名若愚後名淵終朝奉郎知江隂軍若谷後名溥終湖州通判若樸名源為曹娥監場涓以刪定官為南康軍簽判浚為婺州通判是時猶未生也元孫令數十人彌大為禮部侍郎敷文閣待制彌正兩浙東路提刑今彌逺方為起居郎彌堅方為樞密院檢詳彌字一行登科者已六人其餘名薦書逰賢闗以賞延登膴仕者未易縷數況其子孫承上世積善之慶大率性行端良相勉於學以是益知史氏之興未艾而吾大父之言於今已為明驗矣既謹錄之以補家集之闕又著其説於世使為善者知勸他日有秉彤史之筆為列女傳者當以夫人為稱首焉闕文尚多可補者補之餘當以傳疑不敢茍也嗚呼蘇文忠公為三槐堂銘有云善惡之報至於子孫而其定也久矣國之將興必有世徳之臣厚施而不食其報然後其子孫能與守文太平之主共天下之福今夫寓物於人明而取之有得有否而晉公修徳於身獲報於天取必於數十年後如持左契交相付吾是以知天之果可必也又曰世有以晉公比李栖筠者栖筠之子吉甫其孫徳裕功名富貴略與王氏等而忠信仁厚不及魏公父子由此觀之王氏之福葢未艾也鑰不佞於史氏之門亦云跋姚宣伯所立許斯二孝子墓表東陽在婺為壯縣號難治近嵗議者以東鄉尤曠逺别置一尉以領之余里人姚宣伯為之數月以書来曰税籍不明賦役不平非民之頑驅之使頑也余報之曰固也良心人所同然或仁或鄙顧為之上者如何子益勉之未幾又以書来曰管内有許斯二孝子墓許見晉書孝友傳墓在藍硎村所居名孝順里及其親家尚可識鹿峯虎峯俱以得名斯葢吳亦烏間人墓在后侣村地名孝義塘事併見圖經二人皆嘗表其門閭今不復存欲立巨石以表其墓且各刻其事於碑隂以詔邑之人使慕焉願為書之余欣然曰尉以警捕為職而加意於風教子之意逺矣且必耿令君之所樂為也自念得姓於東樓公而望出東陽郡上世遷於四明而婺實吾宗之故里也既書其碑又且勸宣伯併刻之跋張忠簡公闡詩帖煕寧六年日當食四月朔裕陵為徹饌避正殿一夕微雨不見日食百官入賀蔡子正挺為副樞獻詩前四句曰昨夜薫風入舜韶君王未御正衙朝陽輝已得前星助陰沴潛隨夜雨消當時無能過之者葢又有皇子之慶也端明張公紹興十三年為秘書郎是時事既相類詩語精切可以追配前人後以孝宗舊學仕為尚書雖不及大用而清徳映照寵數優渥三子一孫同為郡守叔子遂踐世官張氏之興未艾也拳拳愛君憂國之誠已見於此詩伏讀為之三歎跋王如晦文巻開禧二年下元前二日王周伯垕示余以巨軸曰此曾大父朝議少時場屋之文也大父滁州藏之贈告箱中余曰周伯妙年固非漢之老人而余年七十及識君之曾大父於少時余與表兄中書陳舍人安行俱汪出生長外家舍人幼孤侍母以汪氏為歸余十嵗時見舍人取朝議之女外祖少師待朝議如姻家徃来無時後六年而朝議亡外祖銘其墓而仲舅尚書為之文紹興三十年嵗在庚辰滁州登科余適在都下侍仲舅往賀滁州泣曰先君少在郡庠以明易試優等升内舍籍上庠兵火之後再以本經中鄉舉太學再興又以詩賦聨薦一日外報省榜而不及門先君方理髮吾母勸之曰君髮已種種兹事可已徒費精神何為先君握其髮曰未死終不可已然竟齎志以殁某之僥倖先君之澤也今見所著易義十三篇論二首雖非今時文格然既盡當時之體而議論詳明益見學問之蚤成而老不得售非命也耶滁州既成先志仕至二千石亦足為善士之勸矣若其髙誼樂施雖已見志中抑聞遇西變時鄉之寒士襆被附舟日為食客又濟其乏絶者不知幾人項文學彦思伋貧甚以場屋之舊叩門無時公知使令者厭之一聞項之謦欬則徑出迎之袖出所贈以應其須嘗在旅中項来謁不值逡巡既去而銀盃羽化從者遽白公以為無疑公怡然曰必無之因置不問後乃知從者之廀也聞者益歎服其他折劵已債不可數計王氏之澤未艾也周伯拱而曰皆孫曾所未聞願書卷尾以補家傳之闕又以詔後之人跋趙大資政所藏趙忠定公帖開禧二年大資政趙公奉祠居四明一日理故篋有簡韜紫羅囊中緘封甚密發而視之乃丞相趙公報章翰墨如新葢皇上受禪前一日事已豫定公密以報丞相丞相時為知樞密院喜甚而書此所謂陸賈交歡為公以大義諭殿帥郭果正如平勃之安劉氏也公慨然感念儵已十三年矣公方為蜀帥時嘗被㫖上内禪本末無一言之誣茲欲以此簡登之石以示後人公之意深矣鑰待罪直學士院甲子昧爽之前密聞大議於公相君示以太皇太后之命播告四方實叨視草遂得在二公之間正元朝士存者無幾矣幸日陪杖屨之末公曰微吾子無有深知當時事者為我序之鑰曰唯跋劉師文昆仲乞増母夀疏藁文王謂武王曰我百爾九十吾與爾三焉文王九十七乃終武王九十三而終有是哉正義曰年夀之數賦命自然不可延之寸隂不可減之晷刻然劉氏兄弟以母暴得病欲絶各乞減算三年増母之夀而母後六年乃卒嗚呼真有是哉跋東坡與宗人帖宗人容貧甚吾無以濟之昔年嘗見李駙馬瑋以五百千買王夷甫帖吾書不下夷甫其人則吾之所羞書此以遺生生不得五百千勿以與人然事在五百年後價直如是吾佛一坐六十小刧五百年何足道哉東坡居士俟河之清人夀幾何容方苦貧而使得五百年後坡亦善謔矣錢大參書法源出于坡歎仰若此必能審其為真書李氏建炎備禦錄後始余八九嵗時侍外祖汪少師外祖母福國夫人先妣安定郡夫人季舅江州赴奉川任氏慶集江口秉義李君及王夫人邀過其家隠然巨室猶記及見雙椿芝蘭之盛既長始知二老人康適由長子修武子列一力幹蠱才智絶人孝養備至秉義自六十嵗即以家事付之一絲不掛時已近八十畧無老人衰憊之氣夀至八十八而終侍御王公志其墓先是建炎三年吾鄉被兵禍最酷逺如昌國顓顓獨居一海中亦遭焚燬時髙宗南巡永嘉奉川為孔道敵勢方張承平既久人不知兵望風奔散而邑境獨全嘗以問諸父泊故老則曰此李君子列之力也邑有義社素號趫勇邑官召人士議事皆已竄伏山谷君所居去邑一舍令馳檄使自備餱糧從便控扼而數百人已列庭下君延致其長自任館穀之責椎牛釃酒以勞勉之衆皆感奮逺近来歸隨即撫定軍聲既振冦望風而郤麾衆追躡得其數級而還事定又出私藏犒之方是時處張功閥冒賞射利者甚衆君不自言賞亦不及逮今將八十年李氏之貲産雖寖不及舊而隂徳必報文風大興君有九子長過庭蚤入太學得官亦轉為丞矣第四子迪功充庭是生六子長曰元白授學於舒元彬璘歸以誨諸弟今為上舍生諸弟與其羣從入太學預鄉書者已五六人元白長子亦入學次以制中開禧元年進士第鄉里莫不歆艷盛矣一日迪功理故書盡得修武備禦時支犒總目手澤具存欲以顯揚先人之烈俾鑰序其後詳已見于張公仲房所作行狀矣抑聞之衣冠南渡所在顛躓者非一鑰親見王信州正夫從言時侍二親避地南来倀倀然無所歸寄命一航聞有義勇所聚遂投之衆見其北音遽曰此姦細也欲戕之舉室不知所為忽一士人攘臂曰毋害善良此士大夫之族也問知其為三槐家益善遇之則子列也且曰微子列吾家無噍類矣又聞秉義嘗慶夀百客皆集有壻劉氏獨不至子列欲盡親歡以此為歉問之則以官逋三數百千方繫於有司不可脱也即具舟載錢如所負之數輸之官取壻以歸大率髙誼宏略如許然則李氏之興殆未艾也今方多事思得疏財好義狥公忘私如修武君者豈易得哉故慨然為之書跋秦王獨獵圖山谷題摹燕郭尚父圖云往時李伯時為余作李廣奪畨兒馬挾兒南馳取畨兒弓引滿以射追騎觀箭鋒所直發之人馬皆應弦也伯時笑曰使俗子為之當作中箭追騎矣余因此深悟畫格此文皇獨獵圖唐小李將軍之筆建炎間内府宣取於宗室家奏以非所敢惜但以前射一豕而上生於亥故不敢進復令取之亟摹一本而以真者進御三馬一豕皆極奔驟弓既引滿而箭鋒正與豕相直豈山谷龍眠俱未見此畫耶攻媿集卷七十四欽定四庫全書攻媿集巻七十五宋樓鑰撰題跋書曹武恵王傳後康王之誥曰昔君文武則亦有熊羆之士不二心之臣保乂王家用端命於上帝夫所謂不二心者人但謂其忠於所事而已書之意葢謂其臣與文武之心為一如咸有一徳之謂也藝祖之造邦武恵之元勛不容贊嘆後人徒知藝祖之神武而不知創業埀統本於不嗜殺人徒知武恵為熊羆之士不知其用兵行師不妄殺一人所謂不二心之臣故伐蜀而戢兵藝祖使人謂王曰汝能戒士暴掠成吾不殺之志任得其人矣江南將下藝祖夢神人奏上天以金陵一城生靈為曹厶後自知厶必能副朕不殺之志矣嗚呼我宋之國祚無窮曹氏之餘慶流衍三代之君臣何以尚茲跋趙睎逺使北本末漢武帝得人之盛史贊有曰奉使則張騫蘇武武之執節千古所仰若騫者往来匈奴十餘年謂其勤勞則可然竟不得月氏要領猶之可也奉使有指而多取外國竒物失侯之後益言所聞於他國者以蕩上心帝之黷武以至虚耗騫實啟之殆漢之罪人也少師以皇族之彦孝宗妙選副國信使上方銳意恢拓别持一書前此未有而公遇事詳審抗節不撓既深得膚使之體迨其歸奏力陳遵養之説上意雖無封狼居胥之快而察公之忠誠南北信誓守之愈堅三復遺編手澤粲然敬歎不已既得周文忠公為隧碑以發揚之謹書卷末以慰二賢嗣之孝思云跋黄刺史公移余從妹適新昌石時亨文今主桐廬簿其壻黄君日宣自言鼻祖名從日從成唐五季間為明州刺史始居勤之隠學後徙於剡所居號北莊且攜其家藏明州公移三紙相示草書皆手澤也余毎見舊物無不愛玩又念先大父少師宣和中守鄉郡首尾四年中更兵燬不惟家集不存吏牘亦不復見君家此帖傳三百年可寳也諦視之其第三帖天祐三年嗚呼唐昭宗以天復四年三月改天祐八月而遭朱全忠之禍哀帝嗣位竟不改元三年嵗在丙寅明年四月而唐亡矣嵗在丁卯是為梁開平元年餘二帖皆開平二年嵗在戊辰第二帖則正月而第一帖乃九月三帖之次正失其前後當一正之二帖為雪竇山者前止稱監葢専為監事也印文漫滅僅辨一二疑是監中之印一牒補吳徳為衙官則明州重鑄之印六字甚明晚唐名器益輕一刺史而檢校太傅騎省憲銜下及胥史是時錢武肅王據吳越或勸拒梁使者武肅笑曰吾豈失為孫仲謀耶故用其正朔又言董昌之誅明州君預有力故有佐忠去偽功臣之號因併著之跋歐陽公與張直講帖歐陽公筆札自成一家故所見無偽帖然鮮有如張氏所蓄之夥葢直講出其門久矣嗚呼前輩風範歎仰何極與門人書止以講學進道為問官稱直書外封多用花押皆今之所無也出處君子之大致可以自決若范蜀公之不待年固為髙矣葢有為而發公亦不暇俟從心之期勤勤屢請而後得之本無可疑而於士友間詢士論恤清議又恐或以為逺也李宗易未知何人公欲少遂體息可漸調攝公非他人比也以憂世體國之切又為斯文宗主雖曰忘疲精力耗矣六十四嵗至蔡明年六月得謝又明年當熙寧五年之秋而公薨矣哀哉汝隂處士公待之甚厚騎馬聴朝雞之句可知一從王氏之招頓隳素守春秋猶且倚閣於公何有哉公發明經學於詩最詳易道難言公亦自言不敢以己意為凖也直講五世孫篪示此二軸敬題其後聞家藏直講易説猶恨未及見之公嘗薦直講試制科期待不淺官此大理寺丞秀州倖命也而其後衣冠不絶曽孫諤訢洎篪俱挹世科非垂裕之效耶跋巢經唱和帖向薌林夀岡楊愿巢經蕭奐薌林詞翰固多見之夀岡巢經之酬倡可以見江右文物之懿夀岡臨江之山其字謹仲紹興二十一年進士也樞密楊公字原仲姓名適與夀岡相似今其家在㑹稽杜小冠陳驚坐不可不辨也跋傅欽甫所藏職貢圖河南出鮮卑慕容氏吐谷渾之後也地在河南古之流沙也梁天監元年遣使朝貢獻瑪瑙鍾後或嵗再三至或再嵗一至中天竺國一名身毒天監初其王屈多遣使獻瑠璃唾壺等師子國大通元年其王迦葉伽羅訶黎邪使使貢獻北天竺國天監三年遣使朝貢渇盤陀國于闐中小國也中大同元年始通江左遣獻方物武興蕃國本仇池天監初封武都王後以為東益州滑國車師之别種天監十五年其王厭帶夷栗陁遣使獻方物波斯國中大通五年始通江左遣使獻佛牙百濟國在震旦之地共有五十四國百濟其一也天監十一年遣使朝貢龜茲國西域之舊國自晉渡江不通天監元年遣使朝貢倭國武帝進其王武為征東大將軍因古柯國古梁書及南史並作周柯國此因字似誤呵跋檀國胡密丹國並滑國之旁小國也普通元年使使隨滑國使来獻方物白題國匈奴之别部落也漢灌嬰與匈奴戰斬白題騎一人普通三年遣使来獻方物末國漢世且末國也普通五年始通江左遣使来貢獻林邑國古之越裳漢日南郡象林縣天監九年其王范天凱奉獻白猴婆利國去廣州二月日行天監十年並梁書及南史作天監十六年遣使奉表獻金度宕昌國西羌種天監四年其王梁彌博来獻甘草當歸狼牙脩國在南海中去廣州二萬四千里天監十四年遣使阿撒多奉表右二十國亦有屢至者姑紀其略正字傅欽甫攜職貢圖見示不惟畫筆精好其上題字亦自合作李龍眠有帖云梁元帝蕭繹鎮荆時作職貢圖首虜而終䗺凡三十餘國今此卷纔二十有二必有遺脱者余試攷之其一曰魯國使龍眠以為首虜而此曰魯豈有誤耶徧閱南史梁之記傳及通典太平御覽皆無魯國與丙丙國其下二十國則有之既列於前皆曾朝貢於梁者也武帝紀中又有扶南鄧至於闐蠕蠕髙麗干陁利新羅盤之一丹九國豈圖之所遺耶亦不見所謂䗺者按海南諸國晉代通中國者葢鮮故不載史官及宋齊至梁其奉正朔修職貢航海往往而至自晉氏南渡介居江左北荒西裔隔礙莫通至於南徼東邊界壤所接宋元嘉象浦之捷威震冥海於是鞮譯相係無絶嵗時以洎齊梁職貢有序元帝字世誠武帝第七子也工書善畫自圖宣尼像為之贊而書時人謂之三絶江陵城陷聚圖書十餘萬卷盡燒之著書甚多内有職貢圖一卷此幾是矣然尚有可疑者既曰圖書盡燒何由得傳使不在煨燼中去今已六百五十三年紙之夀雖過於絹素亦不應尚爾全好恐是龍眠摹本前帖即其自跋也故又云恨筆墨凡惡而未究真此葢其自謙之辭也標題小楷與帖字頗類疑亦龍眠之筆又帖云狀其形而識其土俗今不見所識又疑止摹其形也况龍眠好臨古名畫如張僧繇善神李將軍海岸圖呉道子韓幹者尤多晉天福中胡嚴徵臨道子善神亦曾榻木澹巖張公右丞達明龍眠之甥亦言伯時於前人遺跡靡所不叩則元帝之畫當是其所臨者貞觀開元等印髙下匀布如出一時貞觀既在御府不應百濟之下書顯慶四年滅又内殿圖書内合同印集賢院御書等雖皆是李後主印然近世工於臨畫者偽作古印甚精玉印至刻滑石為之直可亂真也姑罄所聞更俟博識之士訂之噫龍眠之筆在今日誠不易遇欽甫寳之安知他日不獲其餘也欽甫云通鑑宋元嘉二十七年將北伐詔云芮芮亦間遣使逺輸誠款誓為犄角疑丙丙與芮芮相類恐傳寫之誤然南史亦無芮芮之名姑俟詳攷梁書西北諸戎傳芮芮國葢匈奴别種魏晉世匈奴分為數百千部各有名號芮芮其一部也自元魏南遷因擅其故地宋引之共伐魏天監十四年遣使獻貂裘是後數嵗一至貞觀中中書舍人裴孝源公私畫録云梁元帝畫六卷並有題印卻不及此又云職貢圖三卷江僧寳畫隋朝官本亦有陳梁年號名畫記云元帝畫職貢圖并序外國貢事又梁書云任荆時畫番客入朝圖下元日再書以助博聞初疑芮芮恐是蠕蠕北史蠕蠕傳甚詳攷之不見而南史蠕蠕傳與梁書芮芮傳首尾止二百餘字事絶相類乃知芮芮果蠕蠕也蠕蠕貢獻已見前跋在武帝紀中因併書之跋二疏圖開僖二年余年七十鄉黨作㑹於敝廬俞恵叔以此圖為夀愛玩不已時余已告老於朝至明年再請而後得之韓文公送楊巨源序引二疏事云後世工畫者又圖其跡至今照人耳目赫赫若前日事則知舊有此圖矣澹巖右丞張公有二疏圖詩自注云世傳顧長康筆故詩中云虎頭圖一卷髙貴鄉公畫隋朝官本二者未知孰是右丞詩又稱潼闗四山萬木送車闐咽導騎交馳疑非此本龍眠思出新意或約舊圖而為之洛陽王夀卿魯翁篆李陽冰琴銘跋尾趙公明誠稱其深入陽冰之室賀公所稱殆是斯人而非公也近又得龍眠四皓圖稍大遂臨此本展以為對題栁公權所跋洛神賦洛神賦本感甄賦王大令好書此故多傳於世嘗見六一居士家傳絹素真蹟亦非全文栁誠懸小楷書跋此巻作章草體雖合作未到皇象諸公其用工亦深矣余以讀者不能盡職欲為行書于後因㕘以他本正定以冗未暇書此歸之他日或再見尚當屬筆跋金縢圖金縢之説不明久矣嘗偶得其意欲著于冊而未暇廬甥祖皋申之攜此圖見示雖出臨摹而古意具在遂為之説書序曰武王有疾周公作金縢讀者遂謂公作金縢之匱殊不知序書者葢言金縢之篇為公而作也古之卜筮非若後世之輕易記曰易抱龜南面天子北面葢聖人齋戒以求蓍龜其求之天也可易乎哉此篇之説既不明似覺文義間斷又若非可以傳後世者間有不通先儒多畧而不道余熟復之始得其意而後詞意聨屬所謂豐不餘一言約不失一辭者要當先正金縢二字所謂金縢之匱者其中實藏占書自后稷之封於邰分茅胙土授之以龜占書至嚴子孫世守非有大事不啟也武王克商纔二年而疾弗豫召公太公曰我其為王穆卜穆敬也二公欲卜之於天也周公曰未可不若以感動我先王遂以告太王王季文王卜三龜而皆吉所謂啟籥見書者正啟先世金縢之匱也既觀占書亦曰吉公納冊於匱中不欲人之見之非聖人欲徼福於後也罪人斯得之後又為鴟鴞之詩以遺王其意切矣史臣書王亦未敢誚公言雖不誦言而不利孺子之讒王之心猶未釋然也雷電以風禾偃木拔王與大夫盡弁以啟金縢之書不知何為而啟此書也以為不知則天變於上何為而啟此以為知之則亦不必啟此書也葢其時正以不知天之所以為變故啟占書以卜天意及得公代武王之説至於執書以泣王心始大悟首曰其勿穆卜葢本欲卜而今不必卜也始知天變之意欲彰公之勤勞爾出郊而迎雨反風而嵗大熟而後一篇之義煥然孔子定書特存此篇以見周公之制禮作樂以致太平本於此也新莽以平帝有疾作策請命願以身代蔵冊金縢莽之讒詐不足言漢去古未逺此説已不明直以金縢之匱為周公所作而况於後世乎跋章達之所藏虞書孔子廟堂碑此本雖無大周二字比余所藏為多又精彩殊勝聞天台有真跡在餘生恨不得見之得見此本斯可矣又心經虞書石刻雖不盡有尚多見之心經精妙始見此本章貳卿自言家藏已百餘年矣栁誠懸蘇浩夫人志銘此本竒甚只一疊字真欲照人小字難於寛綽而有餘不如此不足為楷法户簉李公誠之示以大父㕘政文肅公草堂所藏懐素自敘嘉定元年閏四月丙子同觀於道山堂有疑為臨本者然亦妙矣未易輕議跋潘刑部致堯詩卷彦先濟南潘公之字也登紹興初進士科時方多艱慷慨許國始為尉曹丞相吕忠穆公薦其有専對之才二年嵗在壬子假禮部侍郎使不測之敵一時名公皆壯其行詩章甚衆今其存者四殿院劉公棐察院李公藹又李公愿馬公永卿皆俊偉人也公既得要領以歸和好隨定授朝請郎尚書刑部郎中終焉公諱致堯其行也季氏宗丞公致祥字彦和奉其太夫人居四明余從妹適宗丞之子迂今其子佋樓出也攜以求跋為道梗槩仍請道山諸賢各識姓名於别卷明日又書此於玉堂直舍俾佋襲藏之以為家寶云跋李文敏公遺事士大夫學為文章固足以為國之光華一臨事變隳素守忘大節者多矣二凶變起倉猝文敏公廷叱之而奪其氣事不難無以見君子宗社再安誠國有人哉跋李山房與山谷帖山房不以書名嘗見行書不知草聖乃如此以是知前輩無不過人者所謂不有此舅安得此甥也跋黄子耕定武修禊序子耕明逺以古帖相易不肯各有其寳余以淳化間本與此相似而流帶右天尚全謂子耕曰天下有道丘不與易也明逺姓單名丙父右選之有文者跋郭適之集句梅雪詩集句始於近世莫盛於半山而葛公亞卿繼之後有作者鮮能及也吾鄉郭君適之舉業餘暇為梅雪集絶句至六百餘篇雖曰以詩為戯非博記詳取未易為也然亦有擇之未精者至下取鄙句何耶昔有刺字至半山之前自稱集句詩人坐客駭然公寘之坐末問曰江州司馬青衫濕何以為對應聲曰梨園弟子白髪新公甚恱觀此篇者其可輕視之耶題専壑半山詩云穰侯久擅闗中政長恐諸侯客子来我亦暮年専一壑毎逢車馬輒驚猜葢引穰侯事而採莊子擅一壑之語也余起於告老之餘叨塵樞近寓居乃得此勝處名以専壑客有言曰此真傳舍子安得専余曰公退燕坐酌酒賦詩如在深山窮谷中援琴對之萬壑同響則余實専之矣若自其變者觀之則此身殆非吾有而况此乎客一笑因刻其語於崖下跋韓忠武王詞近見費補之衮梁谿漫志紹興間韓蘄王自樞密使就第放浪湖山匹馬數童飄然意行一日至湖上遥望蘇仲虎尚書宴客也王徑造其席喜甚醉歸翌日折簡謝餉以羊羔且作二詞手書以贈蘇公緘藏之親題其上云二闋三紙勿亂動淳煕丁未蘇公之子夀甫山丞太府攜以示蘄王長子莊敏公莊敏以示余字畫殊傾欹然其詞乃林下道人語莊敏云先人生長兵間不解書晚年乃稍稍能之耳嘉定改元莊敏公次子樞密副都承㫖帶御器械杖以二詞石本見示益信梁谿之説但詞中一二字不同耳昔人有競病之詩及塞北烟塵之句雖皆可稱殆未有超然物外如蘄王之曠達者也跋韓莊敏公遺藳鑰頃在周行荷莊敏公與之進抵掌而談世故慨然有許國之志觀此奏藁葢事有至難而不敢辭身將就死而弗茍避母已老而不以告子在側而不及知事定之後始出以示之忠孝大節可以概見勒石傳逺以昭前人之遺烈此孝子職也跋桑澤卿蘭亭博議禊序之傳歌詩序跋不知其幾愈出愈新贊揚不盡澤卿又從而鳩集之後之作者殆未已也余復何言嘗記本長老赴闕時過金山佛印見其樸野强使賦詩仍誦唐人以来佳句本忽使人代書云水裏有塊石石上有箇寺千人萬人題只是這箇事印深服之余輒用其語曰定州有片石石上幾行字千人萬人題只是這箇事可以發好事者一笑跋黄知命帖山谷真蹟中更禁絶重以兵燬銷爍而四方得之者甚衆則知此老所書未易以千億計知命但傳詩篇今始見此帖於子耕許風度大似伯氏所謂一不為少者尚可想見白衫騎驢搖頭而歌之時山谷以名太髙一世憂患卒以謫死知命雖以躄廢優游終老殆伏波家之少㳺耶跋蔣亢宗所藏錢松窗詩帖鑰汪出生長外門幼時見故大㕘錢公為貳車公壯年風流醖藉喜與士夫㳺與外祖尤厚吾鄉舊有五老㑹宗正少卿王公珩朝議蔣公璿郎中顧公文衡州薛公朋龜太府少卿汪公思温外祖也皆太學舊人宦㳺略相上下歸老於鄉俱年七十餘最為盛事禮部侍郎髙公閌起居舍人吳公東信皆自以後輩不敢預王薛二公下世㕘政王公次翁致仕寓居嘉慕義風始議為八老㑹朝議徐公彦老布衣陳公先而後至顧蔣汪公㕘政洎髙呉二公繼之然已不及前日之純全矣大㕘政詩中所謂八僊人者此也蔣公園中素有集春堂海棠尤多即大㕘所賦也後使淮上猶與蔣公通問今左相當軸與大父相望於四十年間蔣公曾孫亢宗裝池詩帖欲以獻光範門下求跋其後大㕘素博學好詩文詞翰俱勝不待贊嘆又見前輩宦㳺其待寓公如此之厚也跋先太師與張檢詳帖先君太師隆興初元監進奏院檢詳張公為寮俱未有廨宇同處直舍情好日隆未幾先君易諸軍糧料院張公擢監察御史㑹有旨薦郡守遂薦先君其詞曰御下以嚴處事以靜嚴而知恤靜而能辦識者以為曲盡先君尋以軍器監丞兼工部郎因此得守古括公遷檢詳已而歸婺源奉祠先君兩致専書前緘銜位鑰代書之今四十年矣公之子星子令南金以墨蹟逺寄又以二書為碑本見遺仍求真蹟感歎追慕衰淚横集謹書其後而歸之先君一意郡事書尺盡付鑰輩此皆親筆尤見交情之篤餽遺止此又以見前良相予物薄而情厚也跋陳君彦直楚薌圖小子何莫學夫詩多識於草木之名離騷具載香草多湘楚間所産陳君篤好之圖形作贊而闕所不知者四以是知詩人亦不能盡見痛飲讀之取其大指而已陳君所記亦有與余所聞不同者人言木蘭即木筆雖别有辛夷之名未知孰是而頗有證焉半山有籬落黄花滿地金之句歐公云菊無落英半山云歐九不曾讀離騷公笑曰乃介甫不曾讀耳竟無辨之者余嘗得其説不惟悟歐公之意騷之旨亦明靈均自以為與懐王不能復合矣毎切切致此意木蘭仰生而欲飲其墜露菊花不謝而欲餐其落英有此理乎正如薜荔在陸而欲採於水中芙蓉在水而欲搴於木末皆此意也又嘗於蘭有感焉凡花之生深林者皆能不以無人而不芳然古人必以稱蘭者非蘭不足以當此正如疎影暗香他花亦有之惟梅可以語此耳有若無實若虚犯而不校初止言昔者吾友嘗從事於斯而後世以為顔子不疑又此意也余老矣本終身山澤間牽挽至此日􅑁膠擾中一見楚薌卷軸雖未及見陳君已覺鄙吝意消又知為同年雍甫之季也縱筆及此俟来過我相與一笑跋餘姚縣陳山寺碑五代史載耶律徳光問馮道曰天下百姓如何救得道曰此時佛出救不得惟皇帝救得雖俳語人謂契丹不夷滅中國之人賴道一言之善也五季厯五十餘年四方雲擾惟兩浙境内不知兵革但知錢武肅王絫世奉佛崇飾塔廟不知一方生靈佛力所不及者錢王實為之隂功至普於今慶裔緜逺為本朝勲閥之冠姚江陳山一碑具言建立本末主僧妙珣欲持謁丞相於丹丘仍攜忠懿王制書求跋遂書於卷尾跋舊答李希岳啟少嘗問從兄編修景山老杜韓栁洎本朝歐蘇半山山谷諸公晚而詩文益髙何耶兄曰文章精神之發也學問既充精神有養故老而曰進余嘗佩服斯言數年前余方投閒李希岳恵以駢儷之文嘗手報之復以来示又出大篇筆力愈進余退視舊作自覺只在故處為書卷尾以誌吾之媿尚勉希岳之進也跋王額之所藏趙忠定公帖紹煕之末丞相趙忠定公方在西府慨然欲收召天下故老之有清徳雅望者聚之朝時太府卿王公正已吏部郎中豐公誼諸人皆其選也以年髙退處於家皆欲盡起之庶幾大老歸周明年忠定當國王公時已休官豐公先至適以繁言而去此事遂已爾後事愈多變而諸老亦盡矣可勝嘆哉大卿鑰姑之夫也從其孫額之見忠定舊書讀之使人流涕尚寶藏之使後来知前輩相與之意非有私於故舊也跋王岐公端午帖子嘉定二年大宗正丞兼權吏部郎王君以曾祖岐公端午帖子并和范蜀公詩一軸示鑰且求跋鑰曰華陽集一百卷可謂多矣然岐公在翰苑幾二十年著述殆不止此嘗問公之孫大監云不惟有所遺逸如資治通鑑序韓魏公神道碑皆曰御製不敢編入家集中鑰謹攷此軸所書太皇太后慈聖光獻也皇太后宣仁聖烈也皇后欽聖憲肅也時煕寧三年裕陵之盛際也後一詩集中詩題有云兼呈司馬君實内翰又自注云自太平興國以来四世凡十榜登科又云予與景仁君實有子登第公長子仲修蜀公之子百揆俱在葉公祖洽牓第四甲温公之子康中明經一甲亦在是年集中詩與子皆同惟鳴鳳作雛鳳云跋周侍郎聿三帖鑰衰族本出東陽樞密通譜為伯父行使闗陜時聲績甚著侍郎周公書中云樞密於鳳翔長安西六程極川心凡事皆平和無間言而隂能消諸公自恣之心極不易周公古君子言又出於無心則當時使事可見李世輔後名顯忠意随樞密以歸張中孚亦闗中傑黠周公推誠待之是時士夫多出入兵間以濟國事可仰也跋章達之所藏唐石淙詩序同知樞密院章公示以故碑二冊其一則夏日游石淙詩序日制音聖葢則天所作也有云爰有石淙者即平樂澗也則天賦七言太子顯則中宗也相王旦則睿宗也武三思狄仁傑李嶠蘇味道姚元崇閻朝隠崔融薛曜徐彥伯楊敬述於季子沈佺期各稱其官詩皆七言侍逰應制亦有姓名殘缺者後云大周久視元年左奉宸大夫􅖔薛曜奉敕書其一秋日宴石淙序序中言若三陽石淙亦曜書曜乃稷之兄字畫勁正實相似云退而詳攷之唐史則天聖厯三年造三陽宫于嵩山夏四月幸三陽宫五月改年久視七月至自三陽宫唐㑹要乆視元年七月三日右補闕張説以車駕在三陽宫不時還都上疏有云三陽宫至洛城百六十里有伊水之隔崿坂之峻奈何去宗廟之上都安山谷之僻處正其地與時也春明宋次道敏求作河南志登封縣三陽宫武后聖厯三年造有含樞殿長安四年毁之其城曰石淙即平樂澗也或謂石淙即晉石崇之金谷攷之殆不然太平寰宇記及河南忘皆云金谷在河南縣此石淙在登封縣淙與崇字又不同以此知其非也武后傳言則天作十有二文此碑多用之亦有字畫不同者又知之為月之為聖圀之為國全之為人等不能悉書亦可補史之闕文也跋趙明可家藏三物記金蠶為墟墓中物無疑嘗見虞世南家墓厯古多族葬記一墓域有數十冢在某州縣又記松柏若干株石羊石虎石沙門等若干又云金蠶若干蠶乃墓中物不知何以知其數殆不可曉漢鐙制亦甚巧上翻其半可焚膏油置蠟炬亦可收燈灺古人制器不茍如此葛文康公魯卿少仕于兗有手板裁香楷之句此簡真闕里物又傳于唐初信可寶也故家遺物傳數世者葢鮮明可既藏此三者及其宰縣適有龍牙之異亦一竒事也又信岐二王傳開禧元年鑰方閒居書信王岐王二傳其六世孫汝述既登之石至嘉定二年秋汝述歸自慶元縣更求跋語并叙家世岐王之子安康郡王士説嘗使敵營隨二聖北狩不勝忠憤罵敵而自沈于黄河金人服其義葬之河于是生銀青公不柔銀青生岳州善待字時舉乆寓吾鄉又與鑰同為隆興元年進士杜門罕出教其四子甚嚴各設几案正坐其中自為指授後汝述汝逵汝遇汝适俱踵世科十餘年間皆改京秩其興未艾信岐二王之賢徳安康之忠節岳州之義方是宜有後哉跋張正字莊子講義景徳三年敕莊周立言理歸於冲寞郭象為注義造於淵微自莊子之書盛行於晉而清談名理莫不以象為稱首其序首曰莊子者可謂知本也矣莊子固為知本而象所謂本恐非莊子之本也南郭子綦隠几而坐仰天而嘘嗒焉似喪其耦顔成子游曰今之隠几非昔之隠几者此莊生之妙旨而象乃曰子游嘗見隠几者而未有若子綦也嗚呼謂之知莊子可乎自兹以後無能真知者惟王荆公之論蘇文忠之記超乎先儒之表得莊子之本心而荆公専以未篇天下為言蓋其首論六經之道既而曰後世之學者不幸不見天地之純古人之大體百家往而不返必不合矣而後列諸家于後以老耼為博大真人又自稱其道術然而皆在百家之科不敢上與六經比此實蒙莊語也太史公先黄老而後六經六家要㫖以儒為宗顧安知此乎余雖服膺二公之言竊以為前此未有發此秘者而又自知學力淺短不敢輕議嘉定改元始識西蜀張君于朝行聞其耽玩此書且有所著深藏若虚似不能言一日旅進送客而獨留之始敂其説恵然以其書示余始得以盡見所藴因相與商㩁之其言浩博未易究陳大率探莊生之深旨得二公之遺意凡世人真以為荒唐謬悠者皆推引以通乎六經之意雖未敢以為盡得其説而與世儒之説不侔矣方欲時奉從容以求發明之益倐然去國留之不可欲得一言以為别余老矣何能坐進君方以才名入道山冊府澹然不見其喜及其去也亦無幾微見於顔面則其所得所養可知矣萬里相望余將再挂衣冠歸老田里無復再見之日君其勉旃進進不已尚可以寄我也君名興祖廣漢人也攻媿集巻七十五欽定四庫全書攻媿集卷七十六宋樓鑰撰題䟦䟦史太師答范參政薦崔宫教帖太師魏郡王聞人一善則志之隨時薦用不遺餘力此其真帖盛大且有後薦賢之福也乾道間丞相魏文莭公守吳門魏恵憲王鎮宣城過郡宫教為教官作樂語有云天上風姿咸仰吾君之子人間官品休論異姓之王丞相極稱之以是知大參范公不茍於薦士太師謂之二難是矣紫微先生舉鑰自代遂出門下宫教之䘮紫微哭之甚哀人琴俱亡未㡬亦下世矣紫微兼内外制文擅一時宫教之文人鮮知者故表其警聯可以知鼎味云䟦趙忠定公家書丞相忠定公魁多士登館殿侍經帷帥全蜀知貢舉皆本朝天族之所未有受知孝宗擢登從列又留以遺光宗兩朝眷渥特寘樞府引故實力辭至於五六重以御史之有言又列高宗聖訓以為據而詔㫖弗俞尋知樞宻院事紹熙五年七月甲子既成翊戴之功拜右丞相翰林學士李公巘所草麻制已行三命而僂終遂牢辭改樞宻使至八月二十八日鑰時以西掖直學士院主上猶在北内忽蒙宣押御筆留某以少師觀文殿大學士判建康府趙某宗姓之賢偉然忠實太上體夀皇圗任之意擢貳機衡肆朕繼承厥功為大俾居宰路控避莫回殊咈眷懐尤辜輿望朕惟不膠者卓維時之宜今政令未孚水旱間作得一賢佐度越拘攣萬㡬實繁其遂我相可除右丞相詞臣茍得君上一言敢不具載况承宸翰詳宻如此何敢不以屢書并草兩麻丞相制有云夀皇咨其切直屢敷心腹之言太上察其篤誠徑委股肱之寄擢居宥府宻贊籌帷逮予有興厥功尤大又云亟頒詔綍俾踐台甫何循牆之過勤致反汗而中止既辜輿望殊咈眷懐又云矧今政令之未孚復多水旱之間作是圗賢佐以贊繁機越彼拘攣不膠者卓矣置於左右亦職有利哉非為朕私其遂我相蓋具載上語也比嵗不知者以鑰為褒稱太過謹不敢辯雲漢之章至今寳藏然則丞相之進用本末大畧可考矣公之長子太府寺丞以家問示鑰敢詳書之若其戒従子初仕數端真可以為世範云䟦白樂天集目錄香山居士之詩愛之者衆亦有輕之者山谷由貶所寄十小詩如老色日上面歡情日去心今既不如昔後當不如今又輕紗一幅巾短簟六尺牀無客日自静有風終夕凉妙絶一時皆香山詩中句也周公恐懼流言日王莾謙恭下士時若使當時身便死一生真偽有誰知今在王文公集中不知亦香山詩也此特其佳句爾其間安時處順造理齊物履憂患嬰疾苦而其詞意愈益平澹曠達有古人所不易到後來不可及者未容悉數琴詩亦多有曰自彈不及聽人彈又曰近來漸喜無人聽琴意髙低心自知皆有自得難言之秘道徳二經世所尊尚讀老子詩云言者不知知者黙此語吾聞於老君若道老君是知者緣何自著五千文其所見超詣如此留侯之在漢無敢訾之者四皓廟詩云子房得沛公自謂相遇遲終雜霸者道徒稱帝者師子房爾則能此非吾所宜立論至此尤為髙勝而可輕之乎余平日佩服其妙處手編目錄寄吳門使君李公諫議併以所聞錄寄之李徳邵璜有白氏年譜尚當訪求以成此書云䟦戴式之詩卷唐人以詩名家者衆近時文人多而詩人少文猶可以發身詩雖甚工反為屠龍之技故好之者寡黄巖戴君棟字敏才獨能以詩自適終窮而不悔號東臯叟不肯作舉子業且死一子方在襁褓中語親友曰吾之病病矣而子甚幼詩遂無傳乎為之太息語不及他與世異好如此子既長名曰復古字式之或告以遺言深切痛之讀書績文而尤篤意於古律雪巢林景思竹隠徐淵子皆丹丘名士既從之游又登三山陸放翁之門而詩益進一日攜大編訪余求一語余於詩雖知好之而不能工老益廢忘無以答其意夫詩能窮人或謂惟窮然後工笠澤稱玉谿生是已笑語之曰子惟能固窮則詩愈髙矣余之言顧何足為軒輊耶䟦汪季路所藏書帖唐僖宗賜憘實敕書唐末敕書讀之使人悽惻時多工於書倉猝中猶爾可觀文安王君世臣䟦語頗詳謂袁氏本得之古墓中疑即憘實之墓又言徧閲唐史及編年通載不著憘實姓氏葢偏裨也余觀勅書委諭詳宻必非施於偏裨者治平中張唐英次功自號黄松子著外史檮杌十卷載前後蜀事王建永平四年書張琳始末有云大順初憘實為黔南節度辟為推官憘字惟集韻與喜同他未之見鄧校書名世古今姓氏書辯證正引檮杌之説且曰姓書未有此氏今增入乃知姓憘而名實也書後止書十五日尚不書月王君遽以為中和年者以書中言越在巴蜀又有雖元惡未就誅擒凶黨並皆逃竄及已收宫闕之言葢僖宗乾符二年乙未黄巢大盗始起至廣平元年庚子遂入長安帝幸興元次年改元中和遂幸蜀三年癸卯李克用以四月平京師巢遁去所謂元惡未誅已收宫闕殆斯時也四年夏巢既誅乙巳嵗三月始還京師改元光啟是在蜀㡬五年若大順乃昭宗之次年庚戌欲以此為昭宗之敕則昭宗雖嘗播越幸石門幸華州幸鳳翔其在鳳翔詔謀幸蜀王建迎駕而不果是為僖宗中和之敕無疑豈中和間憘實已為黔南節度至大順初始辟張琳耶其詳不可得而知僅得二書知其姓名他書未必無之顧淺陋老懶未能詳攷尚有待於博洽之士王君偶未攷檮杌又惜鄧校書之不及見此書也東坡嘯軒詩易晉卦之九四晉如鼫䑕雖近代大儒皆以為貪而畏人之䑕然詩之碩䑕从頁石聲大也故曰若大䑕也易之鼫䑕從䑕石聲陸徳明釋文音石五技䑕也引本草螻蛄一名鼫䑕始深疑之攷許叔重説文解字註云五技䑕也能飛不能過屋能緣不能窮木能游不能度谷能穴不能掩身能走不能先人是真螻蛄也荀子所謂捂䑕五技而窮楊倞所注乃出於叔重唐本又曰六技䑕也下又有云能歌不能成曲成曲一作度曲余嘗試其五技皆然土中百蟲多能以穴掩身惟此物於淺土穿穴人或取於路窮處必得之署月雨後土中有聲若長哦者俗謂蚯蚓唱歌余既得六技之説嘗於夏夜傾聽久之篝火發土果螻蛄也坡翁詞翰不待贊嘆嘯軒詩云食土蚓無腸亦作終夕呌似亦未知為螻蛄而徇俗耶彌明石鼎聯句云時於蚯蚓竅微作蒼蠅聲亦誤矣付官奴樂毅論余見此刻多矣未有如此之精明者半山集中有江鄰㡬邀觀三館書畫詩或云梅聖俞作有云羲獻墨跡十一卷水玉作軸排疏疏最竒小楷樂毅論永和題尾付官奴豈承平時此論猶有真蹟耶淳化本脩褉序余嘗蓄一二褉序近嵗得畢少董所藏豢龍董氏淳化中本最勝少董䟦其後甚詳自言董氏有三百本取其尤者三此又其最佳者後多名士題䟦而田君秀實大篇亦以此為三本中第一故尤寶之與此本無一毫之差而此長半寸許當是裝潢者用刷太重遂引而伸之爾邵康節觀物篇易之傳尚矣至本朝而後有先天後天之説戴九履一左三右七二四為肩六八為足坎以一居北坤以二居西南震以三居東㢲以四居東南乾以六居西北兑以七居西艮以八居東北離以九居南故説卦云帝出乎震齊乎㢲相見乎離致役乎坤説言乎兑戰乎乾勞乎坎成言乎艮此後天之説文王之易也乾一兑二離三震四㢲五坎六艮七坤八乾自南而左㢲自西南而右故説卦云天地定位山澤通氣雷風相薄水火不相射蓋乾上而坤下離左而坎右震東北而㢲西南兑東南而艮西北二卦各各相對此先天之説伏羲之易也先儒以此二者為先天後天之辨竊嘗攷之説卦惟帝出乎震之序合於今人之説其餘如所謂雷以動之風以散之雨以潤之日以晅之艮以止之兑以説之乾以君之坤以藏之曰乾健也坤順也震動也㢲入也坎陷也離麗也艮止也兑説也曰乾為馬坤為牛震為龍㢲為雞坎為豕離為雉艮為狗兑為羊曰乾為首坤為腹震為足㢲為股坎為耳離為目艮為手兑為口又乾稱父坤稱母震㢲為長男長女坎離為中艮兑為少又乾為天坤為地震為雷㢲為風坎為水離為火艮為山兑為澤終説卦之篇皆先天之説也顧未詳攷爾先天千載絶學麻衣得之傳於希夷累傳至康節而後盛行然余始在永嘉得先天方圎二圗於薛象先叔似傳皇極經世之書於王木叔柟而不見其全後丞外府蜀士吕澤甫凝之以閬州奏事進經世之説阜陵大喜其書留為太府丞同官為寮始得蜀本全帙因得叩其一二後有觀物篇隔眼大書云出康節親筆今見此巻悚然起敬始知板本失真為多然猶恨不見其全也二圖探索無窮康節之學雖不易窺測要皆不出於此繫辭所謂太極生兩儀兩儀生四象四象生八卦明道先生所謂加一倍法盡在是矣使伏羲文王周公孔子復生不能加損毫末於此不如是何以順性命之理通幽明之徳類萬物之情哉熟復嘆仰以還罄其謏聞書之以俟知者温公奏稿平章軍國重事止預大事十二條見申國春秋所以尊尚元老也近嵗竊平章之名而不加重字豈其力不足以得此哉欲盡總衆職以盗大權爾彼亦不足以知此蓋有教之者嗚呼非文潞公吕正獻豈可當此位耶歐公與劉原甫帖公是先生望隆一時而不容於朝出知揚州歐陽公所為賦平山堂之詞也移知青州公是作董仲舒詩云江都才子又膠西擾擾諸侯等棄之為問公孫丞相道不知東閣欲賓誰後又帥長安久之作班超詩云班超投筆起行間傅鄭甘陳不足攀何事眼昏頭髪白却思生入玉門闗二詩不無少望矣歐公與之至厚西齋葢平時羣賢聚㑹之地歐公至今有西齋帖然終不能挽之還朝豈非命耶韓魏公與歐公帖歐公嘗曰纍百歐陽其何敢望他韓公今觀此帖魏王之推尊歐公又如此更相欽服宜乎同心輔政以致慶歴之盛翰墨又其餘事也東坡與秦太虛帖坡公愛淮海如子弟喜黄岡如鄉曲殆前緣耶䟦黄子邁所藏山谷乙酉家乗頃嵗見張志溥庇家藏山谷雜記一小巻諦玩不已因畧效其筆意手錄之兹見子邁所臨乙酉家乗典刑具存為錄雜記於巻末而歸之嗚呼建中靖國以至崇寧元祐諸公多已南歸而先生乃以承天塔記更斥宜人誰能堪之先生方翛然自適觀所記日用事豈復有遷謫之歎所謂青山白雲江湖之水湛然寜復有不足者家乗止四年八月二十八日而先生卒於季秋之晦相去才月餘耳三山陸待制務觀嘗言先生臨終時暑中得雨伸足簷外沾濕清涼欣然自以為平日未有此快死生之際乃如此世言范寥信中訪先生於宜此書信然䟦朱晦菴書中庸乾道末年余客授東嘉貳卿曾公以吏部郎出守嘗侍坐論訓詁音韻數端公皆以為然余因曰此皆學者之細也公正色曰不然中庸所謂博學之審問之慎思之明辨之力行之五者不可闕一兹非所謂博學者乎余為之悚然公乃文清公之次子文清及見元城龜山諸公家學有自來矣中庸之言昭如日星晦菴先生書此以告學者而又曰不可以偏有所緩至哉言乎學者試思之緩其一則必有所蔽而况以力行為可廢乎戒之哉䟦費校書肅被召省劄與陳簡齋同被召不出費校書之不赴特召竊聞之是時人情事力尚可為恢復計遽以和議自屈忠義之士皆惜此機力既不可以回因遂肥遯以求其志不知者謂其為髙而已䟦胡澹菴和學官八詩澹菴先生以一書觸秦氏竄昭州諸賢救之高宗諒其忠再徙為威武簽幕羣憸承一時風㫖相與擠之而又下石焉乃始逺置新州又復移吉陽葢秦氏必欲致之死地也先生處之㤗然雖遭摧辱畧不為屈益窮經學又以昌其詩紹興更化始得北還孝宗初政擢吏部郎隆興改元鑰就試南省先生以秘書少監為參詳官鑰䇿卷誤犯㤗陵舊諱知舉内相洪公方欲為之奏聞先生贊其决遂叨末第葢優㤙也於是始得拜先生下風長身霜鬛神采昭映恭謙磬折音吐洪暢畧不見久居嶺海烟瘴之狀衣冠甚偉如見古人時以短箋投謝坐主或報或不報惟先生報章甚寵以鑰多用諱事遂引釁夏滕文等數十條為言尤切感服寶藏又已載於先生集中今見學省八詩葢攝祭酒時也前輩固多唱酬未聞大篇而人人報之愈出而愈竒最後樊武諭以其右科魁選再登進士第先生首言舞陽次及魁紀皆樊氏之先一武一文益見其工是時年逾六十思若涌泉筆力愈勁英特之氣至今凜然周益公為隧碑言先生刻意詩騷後生投贄率次韻以酬多至百韻數十篇然則此八詩猶先生之細也鑰頃既登門又辱許從其長子季永游雖恨其早沒而仲子季解及季永二子伯圜仲方俱以才業自奮今為湖南憲江西漕樞宻院編修遂踐世官皆相與良厚又在中書嘗預試仲方二子燿煃童子科鑰年七十有四求歸未得於先生之門遂識四世抑以知澹菴之徳澤為朱艾也謹併書於卷尾云䟦鄭徳輿歴代蒙求蒙求始於李氏後有作者終不及之葢自王戎裴楷鳴鶴士龍之類多取其一事而成對如忌鵩畏犧人多知其事而鮮知畏忌二字出於班孟堅幽通賦中蠟屐好財似若不類而事則相闗秉燭不諧尤非切對則以事意相似屢見和韻有句賡者亦有廣編十七史或専用小説及本朝故事左傳西漢或道家之書意亦勤矣終不及李氏之盛行同年鄭君徳輿老不廢書用李氏之體備述歴代由伏羲以至大宋事不求對句以四言童子易於誦習千古大槩如指諸掌徳輿别有著述此特其一爾然比之衆作其殆最優乎其子洽濙鋟板以傳為書其後且將使諸孫誦之䟦黄長睿東觀餘論雲林子妙於攷古是書久行於世余尤所篤好惜其訛舛尚多每欲手寫以傳好事者未暇也著作莊子禮欲得善本傳後再為詳校而寄之王順伯厚之嘗言本朝始自歐陽公集古錄千卷趙徳甫金石錄至二千卷攷訂甚工然猶未免差誤惟雲林之書為盡善順伯蓄古刻最富論議不茍余觀此書辨析隠奥上下千古皆前賢所未發後人所難及修撰劉公燾紫微董公逌皆鴻博之士與之言自以為不及也以雲林之美才又仕於洛多見故家名帖及居館閣盡見太清樓所藏異書時方承平鼎彜古器具見制作欵識之舊嘗自言曰攷校往古事迹先須熟讀强記遇事加之精審决無疎畧又謂歐公攷校非所長則此書宜無毫髪之恨及細讀之尚有疑焉如米襄陽疑李斯書謂不知何人書雲林則曰乃李陽冰篆明州刺史裴公紀徳碣中字可謂精確矣然謂史籀書揚州􅘌易系能辨其字殊無三代體與其辭皆唐人筆顧不知正以紀徳碣額縮而小之既全取州􅘌三字又移明為易系皆取其半乃碧落碑中唐字陽冰素好碧落碑故用其字雲林誤以為揚殆未之攷也王大令静息帖礜石事異苑謂曺公同王粲見此而雲林謂劉表在荆州時未知何據題河南王氏所藏子敬帖云太極璇題猶重書自注云謂不書太極殿榜然璇詩所謂璇題納行月者乃謂以玉飾椽頭如孟子之言榱題非題扁之題也王世將表云頓乏勿勿雲林引顔氏家訓云世中書翰多稱勿勿又引杜牧之詩浮生長勿勿謂古人詩中用之不特稱於書翰顔之推在牧之數十百年之前似難以此詩為證䟦右軍甘蔗帖云䉀似竹於文從焉此帖以之俗從草非是按説文解字蔗从草在草部不得為非是以是益知攷古著書之不易云雲林夀止四十而精博如是余年七十有四聞見寡陋心顧好之不自知其可笑也鍾王以來多以意行筆雲林耽玩古帖與之俱化如隱之為隠最之為㝡之類尚衆此既為小學而作亦畧為正其㸃畫不敢自為詳盡更俟博雅君子相與正之䟦揚州伯父耕織圖周家以農事開基生民之尊祖思文之配天后稷以來世守其業公劉之厚於民太王之于疆于理以致文武成康之盛周公無逸之書切切然欲君子知稼穡之艱難至七月之陳王業則又首言授衣與夫無衣無褐何以卒嵗條桑載績又兼女工而言之是知農桑為天下之本孟子備陳王道之始由於黎民不飢不寒而百畝之田牆下之桑言之至於再三而天子三推皇后親蠶遂為萬世法高宗皇帝身濟大業紹開中興出入兵閒勤勞百為櫛風沐雨備知民瘼尤以百姓之心為心未遑他務下重農之詔躬耕耤之勤伯父時為臨安於潛令篤意民事慨念農夫蠶婦之作苦究訪始末為耕織二圖耕自浸種以至入倉凡二十一事織自浴蠶以至剪帛凡二十四事事為之圖繫以五言詩一章章八句農桑之務曲盡情狀雖四方習俗間有不同其大畧不外於此見者固已韙之未㡬朝廷遣使循行郡邑以課最聞尋又有近臣之薦賜對之日遂以進呈即蒙玉音嘉奬宣示後宫書姓名屏間初除行在審計司後歴廣閩舶使漕湖北湖南淮東攝長沙帥維揚麾節十有餘載所至多著聲績實基於此晚而退閒斥俸餘以為義莊宗黨被賜者近五紀則其居官時恵利之及民者多矣孫洪深等慮其久而湮沒欲以詩刋諸石鑰為之書丹庶以傳永久云嗚呼士大夫飽食煖衣猶有不知耕織者而況萬乗主乎累朝仁厚撫民最深恐亦未必盡知幽隠此圖此詩誠為有補於世夫霑體塗足農之勞至矣而粟不飽其腹蠶繅織絍女之勞至矣而衣不蔽其身使盡如二圖之詳勞非敢憚又必無兵革力役以奪其時無汙吏暴胥以肆其毒人事既盡而天時不可必旱潦螟螣既有以害吾之農夫桑遭雨而葉不可食蠶有變而壊於垂成此實斯民之困苦上之人尤不可以不知此又圗之所不能述也伯父諱从玉从夀字夀玉一字國器官至朝議大夫䟦先大父嵩嶽圖嵩高維嶽峻極于天巍然居四岳之中葢天下之絶境也大父為登封宰家間舊有嵩山圖丹青故暗揚州伯父設於雲岫堂屏間而書大父二十四峯詩于左右鑰幼時猶及誦之先是建炎中四明遭兵燬最酷諸父僅得生全故廬焚蕩一物不遺亦不知嘗刻之石也嘉定三年鑰叨居政地鄉人張致逺翼仕京西一日得書謂北客有以雜碑至𣙜塲貿易忽見嵩山圖碑下有序文及詩知其為大父遺蹟逺以見寄如獲拱璧真我家舊物也惜其嵗久細字欲漫乃敬書之移於樂石于是鑰年七十有四矣不能更作注字使第三子治書之碑不載嵗月知縣伯父生于元符二年小名曰嵩家藏詩序書元符庚辰大父又於少室山逹磨面壁處作菴其上后山先生陳無已為記今在集中云建中靖國元年則辛巳嵗也曇潛書潛即參寥子以二者攷之在縣首尾凡三年大父字試可參寥集中多有唱和如登嵩山絶頂等詩大父遺文顧無傳焉三十六峯賦亦不知何在故此碑尤當寶之嗚呼大父薨於宣和五年甲辰後十四年是為紹興七年丁巳而鑰始生既不獲逮事而登封舊治失守不能復故北望慨然何能自已大父登元豐八年乙科文氣政術過人逺甚讀此碑者可以想見大概受知祐陵官至徽猷閣直學士嘗守鄉郡再任涉五載其詳見於神道碑銘中後諸父累贈至少師鑰始追贈太師齊國公云攻媿集卷七十六欽定四庫全書攻媿集卷七十七宋樓鑰撰題䟦䟦春秋繁露繁露一書凡得四本皆有髙祖正議先生序文始得寫本於里中亟傳而讀之舛誤至多恨無他本可校已而得京師印本以為必佳而相去殊不逺又竊疑竹林玉柸等名與其書不相闗後見尚書程公䟦語亦以篇名為疑又以通典太平御覽太平寰宇記所引繁露之書今書皆無之遂以為非董氏本書且以其名謂必類小説家後自為一編記雜事名演繁露行於世開禧三年今編修胡君仲方榘宰萍鄉得羅氏蘭堂本刻之縣庠攷證頗備凡程公所引三書之言皆在書中則知程公所見者未廣遂謂為小説者非也然止於三十七篇終不合崇文總目及歐陽文忠公所藏八十二篇之數余老矣猶欲得一善本聞婺女潘同年叔度景憲多収異書屬其子弟訪之始得此本果有八十二萹是萍鄉本猶未及其半也喜不可言以校印本各取所長悉加改定義通者兩存之轉寫相訛又古語亦有不可强通者春秋㑹觧一書皇是書未詳孰撰攷晁公武讀書志有祐間進士杜諤集繁露諸書斷以己意名春秋㑹義仲方摭其引繁露十三條今皆具在余又據説文解字王字下引董仲舒曰古之造文者三畫而連其中謂之王三者天地人也而參通之者王也許叔重在後漢和帝時今所引在王道通三第四十四篇中其餘傳中對越三仁之問朝廷有大議使使者及廷尉張湯就其家問之求雨閉諸陽縦諸隂其止雨反是三䇿中言天之仁愛人君天道之大者在隂陽陽為徳隂為刑故王者任徳教而不任刑之類今皆在其書中則其為仲舒所著無疑且其文詞亦非後世所能到也左氏傳猶未行於世仲舒之言春秋多用公羊之説嗚呼漢承秦敝旁求儒雅士以經學専門者甚衆獨仲舒以純儒稱人但見其潛心大業非禮不行對䇿為古今第一余竊謂惟仁人之對曰仁人者正其誼不謀其利明其道不計其功又有言曰不由其道而勝不如由其道而敗此類非一是皆真得吾夫子之心法葢深於春秋者也自揚子雲猶有愧於斯況其他乎其得此意之純者在近世惟范太史唐鑑為庶㡬焉褒貶評論惟是之從不以成敗為輕重也潘氏本楚莊王篇為第一他本皆無之前後增多凡四十二篇而三篇闕焉惟玉柸竹林二篇之名未有以訂之更俟來哲仲方得此尤以為前所未見相與校讐將寄江右漕䑓長兄秘閣公刻之而謂余記其後䟦宋宣獻公書李公垂詩編李公垂詩編自號追昔遊宋宣獻公手書之可謂兩絕乾道七年嘗宿剡川之龍宫寺見李公詩碑今在編中而有闕文亟為求石刻於寺補百餘言宣獻字畫精妙而參以惡札如碔砆列於璠璵中益歎前輩之難及也宣獻父名臯不惟於本字缺筆髙字亦去其口尤見真迹不疑如此等書皆親自傳錄春明三世以博洽稱有以也夫公垂短小精悍才氣絶人其自言治行之偉如此人品真可與文饒相上下惜乎二公徳度如此恩讎太明以此得名位亦以此掇禍大雅曰君子實維秉心無競誰生厲階至今為梗詩人之意謂厲階之生由夫好競者為之也牛李二黨更相摩軋數十年而唐益以衰可不戒哉䟦周氏棣華編歐陽公於燕兄弟之詩發不如友生之義髙矣此詩方以兄弟為急而毛鄭二氏失其本義得公之言詩意始明而末章猶未甚詳深哉詩人之㫖也儐爾籩豆飲食之飫特一時之適耳使兄弟既具而無他則和樂至於且孺猶孺慕之孺此真情也妻子人合也茍能好合猶如琴瑟兄弟天倫也如其既翕而無間則其樂至於且湛猶湛酒之湛其樂尤深矣故又曰如此則可以宜爾室家樂爾妻孥所謂人不間於昆弟之言而家肥矣是究是圗亶其然乎而後篇終兄弟之道無餘藴矣前嵗武寧周氏昆仲俱自上庠来見以棣華集求詩許之已久今其季又至且流涕曰始與吾兄同致此懇不幸兄亡矣願終恵之兄弟無故天下之樂事也余伯仲九人僅存其四備嘗手足之痛為之感歎不足併書古詩之義以遺之因以勉其後人毋隳此意以保其家周氏其有興乎䟦林氏所藏趙清獻公父子詩清獻公以元豐二年春加太子少保致仕明年次子景仁倅永嘉從公游天台雁蕩吳越間榮之至今廨宇有戲綵堂猶以為盛事萱堂林先生隠居樂道與公父子遊頃嵗客授之初登堂慕想嘗錄三人唱和之篇兹従萱堂之元孫晉獲見真蹟以神道碑攷之正三年庚申嵗也清獻父子定交寒士萱堂以布衣與大臣為寮友髙風凛然俱可敬而仰哉䟦八陣圗八陣自桓温一言之後無能究其説者乾道末年客授東嘉始聞其説於毘陵使君薛士隆而陳君又以薛氏所傳握機及馬隆贊示余於是始見武侯之遺意王清叔曉以要畧建安蔡季通元定著論尤詳嘉定三年編修胡仲方榘示余一篇葢其婦翁王景醇方帥䕫門裒前後衆説寄仲方且俾訪求遺逸余遂取所藏薛陳王蔡四家之書悉以授之將以復寄䕫帥併刻焉武侯之陣原於先天六十四卦之方圖而其實則井田之遺法也文中子以不井田為茍道且曰諸葛亮不死禮樂其有興乎葢以深知井田之制也毘陵嘗問余曰一部周禮兵制何在對曰在夏官曰此但畋獵閲習坐作進退之説且非兵制也對曰寓兵於農比閭族黨為伍為什即其制也毘陵曰固然當知古人法制素明中外一致非如後世别有兵法八佾之舞六十四人即此法也祭祀燕饗猶以為用人人習熟公卿皆可為將帥用此道也法制既隳知兵者猶得遺意余因其言而攷之韓信連百萬之衆戰必勝攻必取自謂多多益辦者此也項羽敗亡之後以二十八騎分四隊而下尚能披靡漢軍亦此也晉之馬隆以一小將自薦武帝傾意用之孤軍深入畧無後繼音問既絶而㨗奏忽聞則已斬樹機能而平涼州矣史但言其用偏箱車今乃知其深於八陣如此後之任將帥者可不知此哉跋山谷竒崛帖山谷草書釣魚船上謝三郎之詞後有云上藍寺燕堂夜半鬼出助吾作字故尤竒崛吾儕生晚恨不識山谷上藍何等鬼物乃得以夜半助竒崛之筆此鬼正自不凡䟦劉資政遊縣學留題資政靖文劉公以大魁發身髙宗擢至侍從賢徳日著而不見赫赫之名葢其人深沉醇厚盛徳若不足晚益受知於孝宗乾道五年起之閒廢中先畀内祠兼侍讀除禮部侍郎權尚書年髙求退不至大用後以資政殿學士致其事名莭始終與黄公中徐公嚞名位相似前則有王公十朋周公操陳公良翰此皆孝宗盛時尊老貴徳之懿也龍游有石而鋭古記有之曰尖石圜出狀元紹興十有四年嵗在甲子大水去其鋭次年乙丑公遂魁天下人皆以此為竒䜟而公處之泊然不有也鑰生晚不及拜公親聞介菴趙公少卿彦端云嘗自以好論時事不知諱避時朝廷方經畧中原日為恢復之計調兵造甲諸郡頗擾多指言其非是或譖於上曰陛下究心大舉凡所圗回但資趙彦端一笑爾趙頗聞之不勝恐懼且謂使漢武帝聞此誅滅何疑已而寂然久乃知劉公夜對上從容問曰聞卿監中有人笑朕所為者公初不知端倪徐對曰聖主所為人安敢笑若議論不同則恐有之上意頓解亦曰止是議論不同耳趙公聞此感不容言又歎倉猝中出言之盡善若止曰無之未必其可深悟聖意也帝前動笏移南山推此一端以見獻納之有益于國者多矣鑰年十六時侍先太師仕柯山兄弟學於郡庠者二年頗聞鄉之名公始末但聞公之為士固窮力學以致膴仕不知其他也鑰四明汪出表弟之子之彊力學决科作尉兹邑聞其居官殊有可紀校文漕䑓竣事來見曰縣學大成殿建於至和二年頽圮已甚齋館又甚焉幸士民之相安謀欲撤而新之翕然響應動有緡錢數千可以興役此志甚嘉方勉使成之又曰聞劉公布衣時因鄉飲酒禮之成嘗書講堂壁間以勉後學而壁壞不復存訪其家得之求跋於鑰取而讀焉益知公之平素所以自勉所以教人之大方槩見於此矣其曰山川雖秀未足誇而師友之益為可恃㫖哉斯言然則尖石之䜟豈足為公道是宜刻之堅珉以詔後来公以平日謙退故知之者寡此鑰所以不能自己于言亦不嫌於太詳也頃先公守括蒼公之子之衡宰龍泉縣有聲後為御史䑓檢法官今諸孫為守為倅公之餘慶殆未艾也跋袁光祿轂與東坡同官事迹慶歴詔郡國立學而置教官者纔數處多延致鄉里之有文學行誼者為之師我髙祖正議先生教授四明前後三十餘年一時名公皆在席下是時赴鄉舉者纔百餘人解額六人試于譙樓秋賦之年先生謂舒公亶袁公轂羅公適曰二三子學業既成不應有妨里人薦名于是舒試于鄉袁試于開封羅試于丹丘三人皆在魁選實為一時之盛舒以舜琴歌南風袁以易更三聖賦名于時而袁之著述傳于世者有韻類題選百卷後學賴之元祐五年倅杭州東坡為郡守相得歡甚有迓新啟事坡書龍泉何氏留槎閣記介亭唱和詩坡次韻二詩一謝芎椒一為除夜如别乗一來風月平分破之詞最為膾炙正為公而作則其賓主之間風流可想而知也抑嘗聞坡一日謂公曰素知博洽試徴韈事公一夕錄數十百項坡曰可謂博矣又從而增之前輩之不倦于學如此尚書豐公稷亦正議之髙弟誌公之墓當崇寧中方諱言蘇氏但言為守者至不言坡之姓字鑰隨侍括蒼於郡齋見公作守時十詩石刻摹遺其家此外罕見公之遺文自少學賦最重韻類之書竊以為古今類書第一葢類書必須分門雖多出名公而事多重叠又必有雜門惟此書以韻别之讀者隨字徑取一索而獲每一目之下必有賦題故以題選為名况公編纂精確諸經注疏搜括無遺蜀有書林號為該博止取白氏六帖散于此書之間其實反成猥釀殊失本意世鮮知者公之五世孫槱錄公與東坡同官事迹及豐公所為銘謂鑰書于後因誦所聞併書之兩家子弟衰門既幸未墜而公之後儒風有興有孫字質甫好古篤學教子有聞于時覺名鄉書燮以吏部知九江槱以特科為丞燮之子肅甫一孫字叔平又有名方亦以特科進其子洽與肅俱收世科其興殆未艾也羅公亦為杭之貳車與坡同時有啟云談笑風雲咳唾珠玉弟兄射䇿有機雲慷慨之風父子談經無歆向異同之論是故名動四海號稱三蘇亦為坡所深知意與公適相先後因附見云書陳止齋所作張忠甫墓銘後乾道七年客授東嘉獲従一時賢士遊忠甫居城南相見如平生歡學校中小有所聞必詰其始末而是正之畧無隠情嘗曰性直言惷執友或不能堪不意子之從我如流也鑰曰朋友道䘮已久勁語實所樂聞以此終三年往来如一日又自言舊與其友謝君黔講易謂易與春秋未易窺測詩書執禮夫子雅言于是相與讀書與詩儀禮雖非全書而禮莭具在自古以為難讀而公獨熟復而躬履之貳卿曾公逮時以吏部典州取其所校定大字刻之實為善本嘗問何以不仕曰今之仕皆非古之道是以雖貧而不願祿也問其説曰始至則朝拜遇國忌則引緇黄而薦在天之靈皆古所無也其持論不回類此後十五年叨冒假守則公已亡又二十五年當嘉定四年凡始以志銘求書丹感念疇昔併書于後跋唐林夫父子帖唐質肅公盛名士大夫户知之少時見唐氏風憲記及東坡守杭州贈林夫詩又知有林夫之名鄭君寅宰吉之太和今工部尚書汪季路其舅也以林夫嘗自諫院謫五羊移監太和鹽酒税遂取所藏林夫所書少陵劍器行哀江頭二詩與家問等及其父翰林侍讀學士彦猷二帖併使刻之縣有林夫墨池山谷後為令嘗為之賦詩則其工書可知父子筆墨相照映後来當自知識别不待贊揚云季路好古有素鄭宰實知樞宻院恵叔之次子聞其博雅有能稱必能訪求遺迹以増益之跋六逸圖孫登長嘯馬融卧吹笛陶潛漉酒巾邊韶晝眠阮孚蠟屐金貂換酒畢卓甕下雅放樂暢逹逸蘇子美書頃在髙炳如家見案上有六逸圗意其為竹谿李白孔巢父諸賢閲之乃孫登馬融陶潛邉韶阮孚畢卓此卷絶似而有滄浪真蹟以六字目之尤為可寶余于此見淵明又在館中見唐人為太白寫照始知今世所畫陶則狀其逺韻李則極其俊氣殆出龍眠諸人意匠未必真也展玩未已童子忽曰豈針灸圖耶坐客為之絶倒跋吉日圖此圖古矣意其出于唐人是時六經未版行本各不同故滄浪錄舊文而以今本證之前有壯士驅羣醜而前以待王射得悉率左右以燕天子之意然御者當居中以執轡主將居左必擇勇者為右此畫御者或在左或在右殊未曉也跋史文恵公帖四明沈氏累世為儒鑰幼年猶及識博羅公是生三子長字公權為鄉人師表晚始得官太師史文恵王篤布衣之交薦之孝宗上殿改秩為紹興簽判次字髙卿少負俊才紹興十四年初開太學時侍郎髙公為司業陳公少南為博士皆極天下選得髙卿春秋巻寘之首選聲名籍甚竟以㤙科第一尉食祠祿以終簽判有子曰煥官雖不逹而有盛名尉有子燠力學未效家藏太師所作博羅挽詩及薦尉公于梁丞相帖足以見太師垂情寒士又以知尉之有以得此也前輩日逺後來者可不勉紹遺風乎撫卷三歎謹書其後而歸之跋范丞相江西唱和詩卷髙平公相業之詳見于王大參瞻叔所作行狀公之第四子孝隆棟實為鑰妻之姑之夫獲聞公平生尤著初赴廷試京師人已傳惟襄陽一范吳興一劉直言時方佞諛成風人已想望風采暨臚傳盡甲科不見二公姓名李丞相士美以攷官侍立出班奏知徽宗亟命索此二巻進讀嘉歎再三遂俱寘第二甲首公既得官時何丞相文縝方為内相往别之何公曰如公等人物豈應墮州縣中公年始逾冠對曰偶叨名第且欲歸山中讀書未暇求進也何公尤加歎賞贈以詩曰漢廷初唱乙科時陛楯何知亦歎咨天子方將前席問將軍焉用免冠為髙風已側諛臣目異日應伸壯士眉更向山中讀書去功名如此不嫌遲然公竟自此横翔三十一嵗為髙宗朝名相兹得敬觀詩篇遺墨敢識舊聞于後劉公名寧止云跋米元暉著色春山向薌林有題元暉横軸云早為山谷印可晚陪帝所清閒筆力休論扛鼎神工更解移山向日家居道士今朝落筆仙鄉胸次山髙水逺筆端雲起風狂可謂曲盡矣闗仝李成皆世名筆多大山喬嶽之形元暉專貌江南山水自成一家此卷尤為勝絶超然故物也後人多作贋本去此逺矣跋王都尉湘鄉小景國家盛時禁臠多得名賢而晉卿風流尤勝頃見雅集圖坡谷張秦一時鉅公偉人悉在焉淮海詞所謂憶昔西池㑹鴛鷺同飛葢者又有詩云夢入平陽舊池館隔花猊口吐清寒皆為此也嘗畫孫浩然金陵離亭燕詞多少六朝興廢事盡入漁樵閒話曲盡其妙今又見湘鄉小景著身富貴不以平陽池館為戀而樂荒閒之野雖嘗因謫居而見之四時草木羣飛皆有生意胸次可想而知跋楊叔禹所藏東坡帖二疏淵明洎文太師其退一也老矣既退復來求去未得尤有感于斯言坡公猶以名位過分日負憂責吾曹豈容安處耶人言作文當如作家書長公家書即文也如此等帖可以弔䘮問疾而廢之乎紹熈四年余以左史攝詞掖為殿試篇排官楊渾甫為檢院其子叔禹登甲科明年嘗書此卷又明年當慶元改元余自天官出守婺女叔禹送以詩有云為漢寢謀惟汲直在唐無黨只香山雖不敢當實佳句也萬里之别余自廢退十三年又已休致不謂復來而叔禹召還由學館入冊府再見恍如隔世坡帖八軸復得披閱慨念疇昔遂書卷末云又跋東坡三笑圗贊坡書三笑圗贊不言為誰山谷實以陶陸逺公事陳賢良舜俞廬山記亦云舉世信之有宗室彦通字叔逹作廬嶽獨笑一編乃以為不然謂逺公不與脩静同時余曾因其言細攷之十八賢傳逺公卒于晉義熙之十二年丙辰年八十三而吳筠所撰簡寂陸君碑修静卒于宋明帝元徽五年丙辰去逺公之亡正一甲子而修静年七十有二推而上之生于義熈之三年丁未逺之亡修静才十嵗況修静宋元嘉末始來廬山逺之亡已三十餘年淵明之亡亦二十餘年矣淵明生于晉興寧之乙丑少逺公三十一嵗卒于元嘉之四年丁卯逺亡時淵明年已五十矣固宜相從姑志之以示好事者跋曾召南所藏先侍郎訓戒諡法尚矣子孫孰不欲顯其先世然罕有以清為諡者嘗求之周公之法及春秋廣諡沈約扈蒙諸書皆無清字惟賀琛之書乃有其三曰弗邇聲色曰清弗殖貨利曰清臨官潔正曰清蘇老泉之書有其一曰避逺不義曰清有如趙清獻公豐清敏公皆世所歸重若趙清憲則未免有議之者矣葛文康公之父官雖未及特諡清孝頃見文康謝表有云俯惟先臣夙有卓行飲冰自勵清每服于人知負米服勤孝實由于天禀觀休寧以語姜尉之言可謂嚴矣至曾文清公乃得此名公論為之翕然鑰初筮永嘉時侍郎由吏部郎典州親見美政後十五年叨冒假守凡事以為模楷今閲此卷訓戒其子引文康之言洎文清之書兩家皆以清易名者清白之傳可知三讀歎仰不已召南久更事任已有所試矣其益思所以振家聲者哉攻媿集卷七十七欽定四庫全書攻媿集卷七十八宋樓鑰撰題跋跋􅚏書蜀隆州有山名跨鼇郡人李公新號跨鼇先生有書一編名􅚏書觀物先生張公行成跋云方言曰􅚏倦也丁度謂字或作䜪故司馬相如云窮極倦䜪而釋者亦云倦䜪疲憊也先生之書以􅚏名盖示其倦游不睎時用也余攷之集韻二十陌有􅚏字與劇同音註引方言倦也然則此書之名音從劇義則倦跨鼇之意不過此爾然説文解字無􅚏而有集韻􅚏胡官切䜱􅚏亭名在上谷䜱謨官切説文解字其虐切相踦也二字若不類而俗書足以相亂􅚏從山谷之谷彈丸之丸則是欽宗廟諱嫌名第三十六字止是亭名别無義可取跨鼇卒于宣和之末故不以靖康之嫌名為避從谷亦其虐切口上阿也從口上象其理郤絡皆從此俗書與山谷之谷無别已逆切持也象手也集韻云𨽻變為丸執孰等之丸凡恐筑之凡當从俗書與丸凡無别司馬相如上林賦曰徼䜪受詘曰窮極倦䜪俱音劇倦􅚏疲憊也而説文字徐錯通釋亦引上林賦徼䜪受屈謂以力相踦角徼要極而受屈也䜪竭㦸切其虐切聲亦相近疑即字也跨鼇之書不應取踦之義正用方言上林賦倦䜪之意耳區區雖若辭費詳攷及此因併見之以俟好古者癸未申同年錫赴宏詞多用竒字已在選中正用倦􅚏字而有司以為犯廟諱嫌名而罷之過矣跋􅬊書余君穜編大易粹言刋于龍舒又自著書名曰􅬊書以八起數或問􅬊字何義余攷説文解字二字部亟字注敏疾也从人口又二二天地也去吏反徐錯通釋曰承天之時因地之利口謀之手執之時乎時不可失疾也㑹意氣至切集韻于去聲七志正引上文而又于入聲二十四職出此字亟䓧注亦引上文而云或作䓧余君既擬太元潛虚以為書謂此字實備三才故用之亦務用竒字故又加廾第未知䓧字止用集韻為據雖復别見他書其下又加木則未之見也當攷去吏乃本音也要當从去聲為正跋汪季路所藏書畫東坡西山詩西山詩碑止有坡谷張右史三篇近嵗鄧公裔孫以前輩和篇數十首相示輒不揣次韻附見于後時在翰苑仍效周益公用印章盖南渡來官府印多更鑄惟翰林院猶用承平時舊印鑄于景徳二年蘇鄧二公俱曾用此也顔魯公書裴將軍詩魯公集中不見此詩裴將軍不知為誰既言劍舞疑為裴旻曾子言有若無實若虛犯而不校昔者吾友嘗從事于斯矣初不指名為何人而後世皆以為顔子不疑此書不見姓名其劍拔弩張之勢非忠肝義膽不能為此所謂言言如嚴霜烈日真可畏而仰哉温公倚几銘文正公自不妄語推之亹亹千餘言一出于正是以輔成元祐之治古之人所以大過人者無他善推其所為而已耳蔡端明吐谷渾曲此柳河東鐃歌鼓吹曲第十篇李靖滅吐谷渾西海上曲也忠恵公字人言愈小愈好而大字亦足名世瑰詞妙墨可稱二絕富鄭公帖國初襲前代之舊士夫隔品致敬則端拜自文忠公為相一切罷之潞公嘗云宰相事體都被富鄭公壞了兹觀與李待制師中書詞謙尊而光尤增歎仰公在當時猶山嶽然一趙濟敢摇之而師中亦凌慢如此况他人乎趙徳甫帖趙徳甫為金石錄二千巻最稱精鑑此巻謂宋公無名􅒋者而黄長睿謂汲冢師春書宋之世次曰景公􅒋者昭公子與此銘合當以􅒋為正周􅒋女及􅒋亦人名此謂仲忽以為魯公器者無所據而薛尚功謂乃説文魯字古之文字形聲假借魯公者周公始封為魯公為周公祭文王之器無疑攷古之難如此哉范寛雪景范寛畫亦可模見真者輒能辨之刻削窮絲髮而行筆堅勁鐡屋石人無能及者非其天性甚寛亦不能為此也燕文貴畫卷圖畫見聞誌載燕文貴本𨽻尺籍工畫山水不専師法自立一家規範預玉清昭應宫之役偶畫山水一幅人有告都知者因補圖畫院祗候實為精品此巻不入家數而布置精工别有一種風氣豈其是耶跋王逸老飲中八仙歌朱巖壑跋逸老草書蘭亭禊序云逸少作行書逸老為草字外人那得知當家有風味逸老以草聖擅名其為名公稱道如許寓居烏戍是時先太師岐國公為監鎮與之往還舊亦得其八仙歌此本改从九从日字為顛葢長史素有此稱也羔羊居士乃其自號聖采為所居之堂得柳軒豈亦其家耶鑰隨侍時當紹興十一二年間猶識其人此巻書于庚午嵗自言年七十有五則知生于丙辰余生于丁巳後公六十一年方識公時纔五六嵗嘉定四年辛未始見此書則亦七十五矣感今念昔為之惘然跋張謙中篆金剛經謙中之篆自成一家近嘗跋復古編頗詳此葢其真蹟也然坡公有與趙清獻公帖云表忠觀碑額可用張子野之孫有書之子野吳興人名先而此云追薦亡父張三先生何耶更當詳攷其間以袒為但以轉為褥以薩為薛之類是終不欲書篆法之所無也跋李晉明所藏書畫文與可竹笑字從竹從天而字書不述其義李陽冰云竹得風其體夭屈如人之笑坡公亦曾用其説湖州兩枝開卷一閲真欲向人而笑者妙處可得而窺哉與可老木亷博士宣仲以古木墨戲得名于紹興間嘗以坡公真筆映之全無光彩兹見湖州老筆又出其上坡公有云孰有愛其徳如愛其畫者乎東坡漁父詞元真子生為魯公客後又為坡谷所稱至櫽括其詩篇大書之其與屈靈均答問于江濱者何異耶東坡獲鬼章告廟文鬼章擾邊如唐之黙啜种誼之竒功似郝靈筌第未知當時有詞臣如此否翟忠恵作安南制有云亦惟恃我朝廷爵秩假寵有邦用能保爾山川土田傳祚永世文人多稱服之葢出坡公之遺意時方禁蘇氏學而文人之傑如忠恵公亦祖其緒餘是真不可揜矣跋宇文廷臣所藏吳彩鸞玉篇鈔始余讀文簫傳言吳彩鸞書唐韻事疑其不然近于汪季路尚書家見之雖不敢必其一日可辦然亦竒矣為之賦詩且辨其為陸法言切韻兹見樞宻宇文公所藏玉篇鈔則又過之是尤可寶也既謂之鈔竊謂如北堂書鈔之類盖莭文耳以今玉篇驗之果然不知舊有此鈔而書之耶抑彩鸞以意取之耶有可用之字而畧之有非日用之字而反取之部居如今本皆以朱字别之而三字五字止以墨書字之次序亦不與今合皆不可致詰輒書前嵗所與汪氏詩跋于左庶來者得以覽觀今玉篇惟越本最善末題㑹稽吳氏三一娘寫問之越人無能知者楷法殊精豈亦彩鸞苗裔耶跋所書卞公祠堂記東晉死節之士卞公為最顯忠獻公為之立祠忠簡公為之作記忠肝義膽千載鼎立既成而忠獻趨召碑未及建今五十年矣忠簡之子澥將漕江左俾鑰書之將登于石鑰為何人而敢預此顧惟平生慕卞公之節義恨不及登忠獻之問叨末第時受忠簡公深知實門下士也兹乃幸得以惡札託名于不朽故謹書之跋趙氏所藏大士趙君所供大士聞竹石皆亷博士宣仲之筆梵相則出于司馬參議端行亷諱布司馬諱棿皆以畫得名于紹興初余家亦有此像端行併作山林此軸得二名士各盡所長尤可寶也跋胡五峯論語指南論語一書自昔大儒不知㡬人未有能發明仁之一字樊遲問仁夫子固嘗答以愛人矣韓昌黎原道首曰博愛之謂仁他何望焉自伊洛二先生始發千古之秘洙泗言仁深見本原兹讀指南一巻樞宻黄公察院沈公皆深于此者五峯斷以一言方見二公猶有差處一曰有心于為仁則曰如此立言恐不識心不識仁也一曰能惡人則或者疑焉于是復明仁者之心曰本無所惡也則曰只是當好惡之時胸中元未了了也烏得為仁又顔淵問仁之下有曰人有仁不仁心無不仁此要約處不可毫釐差嗚乎此言㫖哉此論語之本體也然而非二公相與講貫亦無以發五峯之言故易以朋友講習為説盖天下之説未有過于此者夫子以學之不講為憂盖君子之憂未有甚于此者學者可不勉哉跋張樂全上范文正公書范文正公講道睢陽樂全以文受知晏元獻公欲擇二㛰其一則富文忠公次則樂全樂全雖不成㛰然皆文正所薦文正通守河中樂全以布衣寄此書自敘南都知奬甚深蒲坂㑹府則河中也又曰經術興于南郡士林歸乎北海北海濰州也文正未嘗仕于濰亦無北海之稱南郡亦非為南都恐是引用馬季良孔文舉事故俱不平闕而集中却有上北海范天章書又有謝范天章薦應制科詩在明道二年又有謁青州范天章等詩攷之乃范中丞諷也樂全雖為文正所知二范俱曾為天章閣待制俱曾知青州然文正在明道間始為通守而諷已為天章文正知睦州蘇州之後始得此職又執政之後知邠鄧杭晚知青州則已疾甚樂全亦已通顯而諷正以天章守青社又實以明道二年同宋宣獻蔡文忠列薦樂全茂才異等然則集中詩及書皆為諷而作青州在漢屬北海唐天寶曰北海郡皇朝以青北海縣置軍後升為濰州政和始以青州為齊郡以濰州為北海郡此書稱北海葢謂青州也因具列之以俟知者此書當在范氏而乃傳于女孫豈書成不及上仍藏于家耶跋東坡備水帖蘇少公序黄樓賦謂長公之備水有三焉水至而民不恐水大至而民不潰水既去而民益親此帖言得㫖見役七千餘人葢水去之後請增築徐城以木堤捍水衝之時熙寧七年七月河决澶淵九月水至城下帖稱二月十日則其明年元豐元年戊午也坡時年四十三筆雖未老而精彩照人可寶也跋李莊簡公與傅樵風帖建炎四年金陵潰卒四散三月戚方既殘廣徳五月遂圍宣州鋒不可當參政莊簡李公時為太守無兵可恃亟設方畧招潰卒于郊野厚待之以為用戚與其副並馬近城指畫攻具公以一書傅矢射副馬前大畧言戚乃凶冦天誅必加汝為將家何至附賊二人相顧曰此間我也攻稍緩始得為備詔遣統制巨師古劉晏率兵救之晏戰死第三帖所言巨劉為此也嘗廵城親以鐡扇障面而賊箭正中之危機屢矣舊曾問于老校退卒而得其詳經畧潘公其婿也嘗言公當危時寘匕首枕匣中與家人約曰城不可必保若使人取匕首則我必死汝輩亦俱自戕無落賊手一日危甚果遣人至一家慟哭既而報少寛矣公誓以死守勵志如此故將士用命賊遯而城全郡人至今祠事之觀所與給事傅公手帖則所聞益信二公里人忠義相勉風節凛然皆可畏而仰哉跋東萊舍人所作趙鈐轄墓表趙侯死節九江三子相從于難父死于君子死于父忠孝之道萃于一門殆有東晉卞氏之風劉公嘗任從班丞相沆之孫也為之墓表甚詳東萊紫微吕公有文章重名又為之墓表足以傳不朽矣侯之元孫吳興使君崇規先以墓碑示恵朱晦菴跋語謂東萊碑銘今不復存當為求之其家吳興之父道州亦自言未入石而家多故因亡其本吳興一日又過鑰曰近從臨川宗族家遂得墓表錄本且得東萊所答簽判書真蹟欲俾書墓表以補先世之遺慨然為書且勉其併刻東萊之帖以信後世鑰何幸乃得以鄙札託名于斯跋彭子夀甲寅奏藁并日錄手澤紹熙五年嵗在甲寅七月甲子皇上初受内禪恭儉仁孝中外具孚勵精圗治羣賢在列曾未㡬時而權臣已寖寖孽牙其間無有敢白發其端者時惟吏部侍郎彭公以舊學受眷最渥忠憤激發數其奸狀自此補外鑰在東䑓同中書舍人林公繳奏至再竟不得回消長自此分矣三人之言皆騐于後而公尤為曲突徙薪之首更化之初與林公俱召遂列邇聮獨公不及見今日為可痛也公之子司農寺主簿欽出奏藁及日錄手澤等見示覽之輒為流涕公論既白上㤙加厚公亦不自悼其不幸于九原矣欽倅嘉禾求跋其後林公下世亦已五年感念疇昔病中扶憊書此公之徳業皆已見于隧碑不復屢書嗚呼子夀可以不朽矣跋韓熙載投吳狀楊行宻之據淮南一傳渥再傳隆演徐温已專政矣九年温始進隆演為吳王而建國天祐十六年始即吳王位改唐之天祐為武義元年又傳至溥改元順義拜温左丞相其子知誥為左僕射六年嵗在丙戌温雖在金陵制朝權而政已歸知誥立延賓館以待士四方豪傑歸之時中原多故名賢宿徳皆亡身歸順此正熙載投吳之時也其父光嗣為後唐明宗所殺煕載方隠嵩丘懼禍及而南奔所謂司空者非温即知誥而史傳江南諸書不載其為司空宋齊丘雖為司空乃在太和六年嵗在甲午相去九年矣熙載文華擅一時南唐諡以文靖此狀雖挾戰國縱横之氣不脱五季萎􅒒之體然詞翰俱勝惜乎生不逢辰﨑嶇危亂中自朱元之變嗣主益忌北人多酖之遂至自汙要其論議未曾少屈信英物也想見分裂之時南走北走之士類假此等文詞以自見禪月貫休之投孟蜀有詩云一瓶一鉢垂垂老萬水千山得得來亦此類耶跋向薌林拘偽楚檄藁博陸侯既立宣帝威權益重而嚴延年劾其無人臣禮事雖不行朝廷肅然敬憚之使博陸雖有驕慢之心亦足以奪其氣偽楚虛有其表中實謬懦豈敢望博陸之萬一建君主龍天之議則其人可知向公一聞竒變即檄合肥拘其家想其方在惶擾憂恐中聞此寧復敢桀耶封府庫以臣名奉昭慈垂簾而上璽綬于髙宗雖出一時諸公之議而此舉實中其機此豈淺丈夫所能及哉又薌林家規薌林遺訓凛然如生而三子俱賢興國及郡倅既遵行維持于前貳車髙夀獨殿諸公保家之慮尤為深長既聞于郡又刻之石諸孫相與結約為久逺之計士夫名家能守素業少見其比臨武令君悉以見示歎仰不已然嘗聞古之循吏有云律設大法禮緣人情盖不欲專以法臨民也家規如學規然師與弟子以道義相處不得不立規矩以警其不率者非恃此以為庠校當有行于規矩之外者而況家乎臨武令為一門最長更惟勉之以全雍煕之軌則向氏之興未艾也既以薌林文集求序引又書此以贈之代史少保恭題御製和詩臣不肖仰蒙陛下矜念簪履之舊俾待罪經帷寵光殊奕夐無前比廼季秋壬子錫宴于澄碧殿因獲縱觀清激之勝洞心駭目如上崑閬捧手從遊天顔益温命宿玉堂之直廬顧謂臣此㑹不可以無紀臣亦思敘感遇之萬一是夕裁成古詩三十韻上進陛下賜以宸章俯同其韻華衮之褒下飾小已雖聖主所以優禮老臣者務極其至而隆天厚地之恩臣愚何以稱塞竊觀有虞盛時帝庸作歌而後臯陶颺言載賡猶得大書簡䇿垂文後代臣之蕪陋焉敢言詩而乃上勤睿作之妙是豈惟近世儒世遭逢之所未有視臯陶抑有光焉倘不能勒之堅珉以侈大賜臣則有罪臣洪惟陛下聖學淵奥句法深醇渾然天成兼備衆體一詩之中屢致意焉有曰躋民期仁夀有曰朕瘠天下肥得以見陛下之用心有曰都䕶萬年觴何當至庭戺得以見陛下之立志若夫罄嘉謨以起勲業則非臣衰朽之所敢承至使直筆以紀中興臣不佞茍未先狗馬填溝壑雖在田里尚庶㡬見之代仲舅汪尚書跋了齋表藁徳夀皇帝中興慨念裕陵實錄之誣紹興甲寅乃詔三館之士是正之内相范公沖中書舍人任公申先相繼職其事當時英俊皆在選中吾鄉禮部侍郎髙公閌其一也先少卿方官于朝髙公以姻連館寓間見諸公往來議論之餘鑰因得剽聞一二及取忠肅陳公所著尊堯集讀之其立言措意無非忠憤所激英風義氣凛凛乎方冊之上自恨晚出不得端拜下風逮今五十年始獲見公手書表藁于蔣君輝之家盥手諦觀為之歛袵遐想氣象如在左右竊嘗攷之國史政和初元張公商英猶在相位編修政典局其所建也于是得㫖命公繳進此書及奏御留中而張公以八月罷政用事者隠其詔索之實而誣以私九月遂有台州之謫觀公題識數語雖在顛沛艱危中其尊君戴上之心死生禍福有不能奪者抱抑鬰于一時昭聲烈于萬世以此較彼孰得孰失鑰輒不揆敬書其後而歸之攻媿集巻七十八欽定四庫全書攻媿集卷七十九宋樓鑰撰雜著詠歸㑹講説乾道五年暮春辛巳晝錦坊樓氏為詠歸㑹黟縣尉曺主之言志者十三人冠者十二人童子二十人質明謁先聖先師以敘列坐臨安教官講夫子入孝出弟之言已鑰乃作而言曰吾門自髙祖先生以儒學起家衣冠六世仕者以清白相傳學者以詩禮相勉門内雍穆雖總角之童亦恂恂自守家法遂為四明望族亦知夫所以致此者乎先生以古道為鄉里師表一時名士咸出其門儒風蔚然大父行以下以文鳴者相繼金紫孝友絶人少時刻意學問有古人閉門錐股之勤少師宏才大度為聖世名臣竊嘗聞金紫之言曰可使財窮不可使行窮少師之言曰士大夫遇好事不要放過嗚呼味其言其所存可知矣諸父承家學之傳盡洗膏梁習氣至不使人見有子弟態吾曹今日不耕而食不織而衣生長以來不知人間辛苦勞役事正以上世書種不絶故得為天之幸民吾之弟若從子皆宜自勉于學以無負尉曹詠歸之意抑嘗聞闕黨童子將命夫子曰吾見其居于位也見其與先生竝行也非求益者也欲速成者也張童子明經韓子曰夫少之與長也異觀少之時人惟童子之異及其長也將責成人之禮焉成人之禮非盡于童子所能而已也然則童子宜暫息乎其已學者而勤乎其未學者聖賢之言其誘人于善如此其切然而闕黨童子張童子皆無聞焉今日之坐于下者年甚少氣甚鋭豈無文采之可取記誦之可喜然為士者之事等而上之不知其㡬級當佩服夫子速成之戒深求韓子成人之言退而思曰我知此矣能此矣未知未能者何啻千萬計為己之學不至于聖人不可己年有限而道無窮故君子有終身之憂任重道逺死而後已不及今無事時自力于學而以身之勢身之年為可恃謂學無益謂惡無傷茍目前安佚而不思後日事日復一日忽焉老之將至使没世而無聞是豈吾祖宗父兄之所望于後人者鑰將行矣五年而歸丱者弁矣冠者室矣富貴科第是有命焉不可以必求也惟期懋進乎學駸駸日新道學既充所謂取時名而振家聲者不在兹乎日月逝矣嵗不我與後生可畏焉知來者之不如今也古人曰士别三日便當刮目相視況五年之久乎幸毋忽趙子冶循齋説趙子野求名其齋名之以循而告之曰循之義大矣哉莊子曰去知與故循天之理董仲舒曰樂循理謂之君子通天下一理爾循之而行可以寡過可以接物可以處事可以臨政等而上之何所不可亦不必咨是非于人心所不安即是非理循是而行隠于心而安施于人而合天理不外是矣言雖近而㫖甚逺子冶勉之哉趙元衛勉齋説余既為趙振文作毋自欺齋之銘又名子治以循齋其季元衛亦以此請為名曰勉齋而告之曰事在强勉而已矣强勉學問則聞見博而知益明强勉行道則徳日起而大有功吾儕中人之性可上可下如逆水行舟倍用力則可以寸進謹執持則尚在故處放手則流蕩而下不可收拾矣貴賤窮逹自有定分學問亦自有分量盡力終身雖所至未可知與不用其力者有間矣元衛勉之哉後日再見當刮目相視也雙谿金君顯菴説雙谿金君式欲書顯菴扁榜且曰起家寒儒祿不及養自升朝籍三得追榮吾親雖取以顯父母之義非敢當此也願併言其所以顯者因告之曰經所謂顯父母者謂立身行道揚名于後世非取爵位之顯也故孝子養親必薦仁者之粟而況枉道以干進乎若枉道干進則雖位極人臣贈親崇品適足以為九京之辱何顯之有易曰賁其趾舍車而徒揚子曰以其所養養之至也君固所深知聞又自卜夀藏于其側其以此意更以告後之人徐聖可字説臨江徐君簡一見如故交問其字曰敬伯因告之曰君之字善矣然自翼祖再入祧廟雖于禮法不諱為臣子者要不可以為名字君聞而矍然請易之于是字之曰聖可葢亦取仲弓子桑伯子之問也舜命教胄子有曰簡而無傲臯陶九徳曰寛曰柔而下皆性之善也曰栗曰立而下必曰而者皆所以成其徳是以君子不敢恃其天資而貴于學也子桑伯子聖人之所可也君其體舜之無傲臯陶之所謂亷又以仲弓之言而行之不亦善乎贈種牙陳安上韓平子問叔向曰剛與輭孰堅對曰臣年八十矣齒再墮而舌尚在老萊子曰齒雖堅固卒以相磨舌柔順終以不敝而子思以為吾不能為舌叔向老萊曉人以處世之法本非正論子思之言則有意于剛也陳生術妙天下凡齒之有疾者易之以新纔一舉手使人終身保編貝之美吾于此有感焉豈惟已人之疾是喜抑使人知剛者之不必亡也從子渢改字景劉劉渢字處和南陽人父紹仕宋位中書郎渢母早亡紹納路太后兄女為繼室渢年數嵗路氏不以為子復為奴婢輩所苦路氏生溓兄渢憐愛之不忍捨常在牀帳側輒被驅捶終不肯去路氏病經年渢晝夜不離左右每有增加流涕不食路氏病差感其意慈愛遂隆溓有識事渢過于同産事無大小必諮而後行南以上節錄史孝義傳之文渢數嵗時伯兄尚無恙既奉名于二親而立名使鑰字之是時取季札觀樂歌魏曰美哉渢渢乎大而婉故字曰大之伯兄下世且久嫂氏鞠三子如一日渢既冠將授室上則欲其幹母之蠱下則欲其教率二季因閱南史劉君傳實有感焉改字渢曰景劉而告之曰劉君之事可謂難矣後母不以為子而孝益甚溓非其同産而愛益篤又況奴婢従而困苦之惟其至行不移母反慈愛而弟亦終能敬于事兄此天理也伯嫂既非前後之不同而慈祥盡愛又非路氏比二季亦能惟兄之聽渢居其間當慕古人之用心思尊長所以字我之意孝友二事行之惟謹二季亦當如溓之事其兄則雍睦之盛無媿于古人矣尚勉之哉姜子謙以試邑鍾離請益鄉人有為宰而請教于外祖汪少卿語之曰作縣無他切勿作大音做䭾或疑其太簡而又云百里獨専易得作大纔作大且先與丞簿尉等情不通漸至養尊則去民寖逺龔公滂善宰劇邑或問其要云此如浙江踏浪兒投身怒濤中旁觀亦為之寒心所以能濟者謹不可喫了一口水喫着一口便難脱矣前輩有為縣公退以貫珠誦佛其叔父見之云汝欲為佛耶對曰然叔笑曰汝既做了知縣更望做佛耶言造業之多也其人悚然謹不敢為殃民害物等事子謙既挹世科以新制宰鍾離以此冊請益鑰不曽作邑無以塞命況近世如吕觀文治縣法等書已多彭子復臨海一書尤精詳可取而觀也姑誦所聞一二以告言皆通俗易曉俱有㫖哉淮堧事簡土風亦淳長民者惟相與安之而已彈廣陵散書贈王明之唐李琬聞樂工羯鼔謂雖精能而無尾工異而問之自以為求之久矣琬曰曲下意盡乎工曰盡琬曰意盡則曲盡又何索焉工曰柰聲不盡何琬曰可言矣使以他曲解之果相諧協余嘗愛其説少而好琴得廣陵散于盧子嘉鼔之不厭然此曲多潑攦聲葢他曲所無者二序正聲亂聲或以此始皆以此終小序為一曲權輿聲乃發于五六絃間疑若不稱屢以叩人無能知者王明之精于琴為余作此小序獨起以潑攦雍容數聲然後如舊譜聞而欣然遂亟傳之耶婆娑雞得屈柘急遍而得其尾今廣陵不假他曲而得其首聲意俱盡古語真不虛也晉史稱廣陵散于今絶矣而韓臯論之甚詳且其所謂哀憤躁蹙慘痛廹脅之音始末具見而尤致意于宫商二絃至亂聲而愈覺痛快必非後人能作余所得數聲未必真出于古也以其深愜素懷故書以贈明之贈寫照郭拱辰藝無大小胸中有書者居然不凡三山郭君登晦菴之門而游戲丹青挾寫照以示予若鄭公尚書晦菴數公展巻對之如欲笑語陋質不足煩君為貌武洞清神物能得其真有不怒而威之意勉旃更添數百巻書則顧陸不足進矣贈筆工吕文質四明吕文質居桃源谿上多游浙右作筆殊佳在人品中則賈長頭也近筆工苦無兔毫文質深入淮楚始得之韓文公作毛穎傳及贊終始以中山為言意其為定武也傳雖寓言然其中云蒙恬南伐楚次中山將大獵以懼楚則非定武也今溧水有中山去縣纔十五里元和郡縣志云出兔毫為筆精妙此縣唐屬宣州今𨽻建康宣城筆舊有名于世豈以此耶文質試往訪求之贈徐心鏡師曠師冕矇䏂御瞽古人専使之審音此事不復見矣今之聽聲殆其遺意徐心鏡一聞人聲輒能言其休咎周之瞽矇上中下凡三百人不惟禄之而又有相之者而徐生一身餬口之不足噫古道之不行何止是哉趙甥叔明和孺堂外甥趙叔明汝顧昆季四人今與其季季敏汝劰同堂而居求扁于予小雅燕兄弟之詩曰䘮亂既平既安且寧雖有兄弟不如友生儐爾籩豆飲酒之飫兄弟既具和樂且孺妻子好合如鼔瑟琴兄弟既翕和樂且湛深哉詩人之㫖也毛鄭注箋皆不得其意謂安寧之時則友生為急曾不知伐木則専為朋友此詩則専主兄弟葢謂急難禦侮以兄弟為急至于安寧乃謂兄弟不如友生乎此説出于歐陽公嘗因是以推後二章注箋皆非也葢曰陳籩豆以飲酒食一時之樂耳尚得以厭飫而况兄弟既具如孟子所謂兄弟無故一樂也既具矣吾之和樂且至于孺謂直如孺子之時孩提之童其長也無不知敬其兄者此天性也妻子本非天屬徒以好而相合猶能如鼔瑟琴然若兄弟翕合則其和樂且至于湛言甚樂也平日以此意處兄弟之間因名其堂曰和孺且序其意以勉之名厚孫嘉定四年龍集辛未五月二十二日潚得男其八字辛未乙未癸酉癸亥以辛未土克癸亥水或以為大海水非土之所能克是不然辰戌丑未皆為土而未乃坤位納音又為土是坤土也坤為地中庸謂振河海而不洩者也何克之云欲名以振又有當避者易曰地勢坤君子以厚徳載物名曰厚孫抑誨之使從厚云書老牛智融事淳煕七八年間始聞雪竇山有僧智融者善畫而絶不以與人一日見其畫心甚敬之曰此非畫者其殆有道之士乎往山中訪之融素嚴冷不可挹酌一見心許氣韻談吐果如所期歸取匹紙寄之久不見與催以古風有曰古人惜墨如惜金老融惜墨如惜命又曰人非求似韻自足物已忘形影猶映地蒸宿霧日未髙雨帶寒烟山欲暝融得之喜遂為余盡紙作嵗寒三友妙絶一時嘗問尚可作人物否曰老不復能作葢目昬不能下兩筆也問豈非阿堵中耶曰此雖古語近之而非也吾所謂兩筆者葢欲作人物須先畫目之上瞼此兩筆如人意則隨皆隨筆而成精神遂足只此一語畫家所未發也自是數年間時得其得意之筆精深簡妙動人神品尤號作牛自號老牛智融或云源流出于范牛而妙處過之融亡矣不可復得從其徒問以平生俗姓邢名澄世居京師以醫入仕南渡居臨安萬松嶺號草菴邢郎中官至成郎中出入禁廷賞賚殊渥不知從何得道年五十棄官謝妻子祝髪入靈隠寺諸公貴人挽之不可猶以去俗塵不逺又㳺諸方徑山匡廬經行殆徧聞是山之勝遂投跡為終焉計假一室深坐土木形骸泊然如偶人齋餘或曳杖以出有欲相隨則謝遣之山有千丈巖妙峯亭栖靈隠潭皆幽僻絶勝之地意行獨坐或至移晷人莫窺其際初亦不知其能畫也山深多蛇忽作二竒鬼於壁一吹火向空一蹋蛇而掣其尾蛇患遂除而時有火驚或者病之又于火端作土梟梟聲為之革嘗畫龍首半體禱旱輒應頗近于靈怪師亦不以自矜也遇其適意嚼蔗折草蘸墨以作坡岸巖石尤為古勁間作物像不過數筆寂寥蕭散生意飛動或極力摹寫亦有形似而遽不及逺甚此自是悟門非積學所所及也始知向來幽尋之時山林雲氣四時萬變到眼入心一寓筆端游戲㸃化自然髙勝前無古人超出翰墨畦畛畧不可以畫家三尺繩之或加以勢利則避之愈深意茍相與亦輒不吝作詩不多語意清絶字畫亦無俗韻初自言若得為僧三十秋瞑目無言萬事休紹煕四年五月某日卒夀八十僧臘如師言與足菴尤契合相與終始先一年足菴示寂侍者道元來都下求銘于余師亦以書見屬未㡬而師亡亦異矣師晦藏自秘雖與之周旋者不能盡知余亦安能知其所至陳后山謂淵明無意作詩但寫胸中之妙余于師之畫亦云東坡贊文與可竹石曰嗚呼孰有愛其徳如愛其畫者乎此余所以又歎也元之來也以師所予足菴彌勒像及元所藏牛溪烟雨二軸遺余師又寄歸牛圗意葢有在余為作三偈元欲刻之石且請書師之大畧附足菴碑隂因慨然為書之攻媿集卷七十九欽定四庫全書攻媿集巻八十宋樓鑰撰賦課藁所有原集别有試藁一巻其目曰宣王内修政事賦玉巵為夀詩注以省試光武大度同髙祖賦宅道炳星煒詩䇿三道注以教官試又有䇿問一巻合御試召試省試别試解試上舍試州學等試所擬問凡十有三篇今並缺佚無憑錄刋受降如受敵賦以受降之際亦當嚴備為韻上將甚武神機獨潛雖在受降之際亦如待敵之嚴納夫授首之人敢矜已勝類彼臨戎之日以備無厭夫惟兵収决勝之功將有防微之智謂冦之窮也雖已見于屈服而心之險也猶未知其誠偽彼既降矣曾無自滿之心如受敵然必謹非常之備于是大敞堅壁旁標碧幢無醜類脅從之衆納渠魁肉袒之降如將受夫大敵懼見欺于小邦方陳釋縛之儀深虞變詐若處交綏之地敢恃敦厖莫不肅我軍容嚴予兵衛雖殘冦之臣附猶兩軍之交際非惟伸大將之威盖恐墮敵人之計受其璧焚其櫬豫防一旦之危稱爾戈比爾干隂養六師之鋭議者曰彼之降也既挺身而至矣我之受也當開心而待之何必招攜之日乃同禦侮之時葢念犬戎之難信深恐狼心之或欺與其有變以無備孰若居安而慮危豈不見行儉審兹果能平夫突厥耿公明此遂終定乎車師彼有坑既降者固出詐謀使自縛者尤非善畫曷若我外弛金鼓内嚴矛㦸深防禍起于所忽亦慮敵乗夫吾隙彼如犯順以欲為我則稱兵而將亦伐崇因壘既施文考之威就塞築城兼取武皇之䇿因知力角于鋒鏑者敵尚能禦變生于肘腋者患何可當今也勍敵雖聞其讋服禍心猶恐其包藏惟吾之為備也既自嚴宻則彼雖好亂也烏能陸梁且異夫魏子㑹秦卒受欺于商鞅唐臣盟狄果見劫于平涼噫屈膝而服也人固畏威噬臍何及也吾當慮後毋弛禁以自忽必整軍而後受方今將軍納降衆而獻俘于廟焉不廢嚴兵之守擊楫誓清中原賦以渡江擊楫誓清中原為韻國讎未雪壯夫請行擊長楫以前渡誓中原之復清共涉巨川爰叩舟人之枻備言素志願恢天子之京時其典午中衰永嘉南渡憤晉元攘敵之未暇有祖逖奮身而不顧揚舲以往方乗天塹之流擊楫而言誓復皇都之故爾乃緩引蘭櫂旁瞻碧幢一鳴而英氣先奮再鼓而羣心已降志必復夫故土誓有如夫大江吐我赤心忽形言于剡木指夫白水期净掃于中邦謂夫戰塵久滿京師突騎交馳洛汭期狼烟之必掃顧鯨波而作誓方横橈徐撫獨决䇿以前征倘諸夏未平尚何顔而復濟豈不以國始草創人思茍存江山有異也或作楚囚之泣綱維不舉也至形北客之言故我浮巨艦以勇奮視强敵而氣吞倡義有先于温嶠定從不假夫平原遂將電掃風驅盡復神州之大肯使龍蟠虎踞久留法駕之尊果能扶神器之阽危拯遺黎之沈溺長淮以北也復見夫冠帶大河以南也悉除夫荆棘不渝江上之盟坐制目中之敵澄清抗志車同范氏之登慷慨論功柱鄙漢臣之擊向使無妖宿以示異緩若思之代終則必蠢爾醜類墮吾計中盡郊圻而申畫舉幕庭而一空振起江南益大中興之烈掃清兾朔遂成再造之功惜乎大厦未成而忽撓棟梁中流欲濟而遂亡維楫不聞壯志之成就徒有餘威之震叠方今矯矯虎臣皆欲濟河而焚舟下視祖生之事業簞食壺漿迎王師賦以王師所至食漿以迎為韻民意胥附王師出征持簞壺而咸至實食漿而相迎飲食雖微用表歡欣之志遐邇均集喜觀仁義之兵盖憫赤子之無依奮神戈而大舉惟兵之所至也既已不擾則人之樂從也其誰敢拒櫜弓箙矢往平敵民之民簞食壺漿来勞王師之所觀夫老幼紛至饔飱共持我之至也救民于水火彼之迓也恐吾之渴飢凡爾一時之衆悉迎六月之師饋餉鼎來皆望風而逺附干戈所指曰後我以奚為兹盖兵收不戰之功人有再生之喜竭蹶而趨也欣塗炭之時脱襁負而來也知父母之孔邇顧慕義以皆然非弔民而何以以萬乗而伐萬乗罔敢抗衡其小人以迎小人咸來造壘大抵窮兵以殘民者孰肯徯后行師以救亂者衆斯向方今也軍罔秋毫之犯人無血刃之傷是宜至者獻酌來皆裹糧夏衆咸來功可同于商后燕民不悦事有異于齊王向非東征西怨也民望來蘇邇悦逺歸也衆無攜貳又安得輟仰事俯育之物見心悦誠服之意自坐見于功成曾不煩于家至如是則三軍益飽何煩挽粟之勤千里遐征不假望梅之智非不知給餉不絶也何必饋食釃酒以犒也奚煩挹漿然念禮雖薄而心則甚至食雖菲而情烏可忘茍匪同心之奉曷云厚意之將亦何異咸篚元黄人盡歸于周室争持牛酒民皆勞于髙皇彼有築道而饋軍者用力亦多投醪而飲衆者為功非易豈知多助之舉自有争先之饋方今中原之民皆開門而迎王師又豈止于壺漿簞食光武乗時龍而御天賦以時乗六龍以御天也為韻炎徳繼統漢光得時惟乗龍而特起以御天而有為獨收興復之功系隆丕祚盖際飛騰之㑹統制方維迹其奮宛邑而戰昆陽誅青犢而降銅馬念再造丕圗也雖本自于神聖而獨逢興運也故能安乎區夏軍摧九虎成止戈之武焉時乗六龍顯御天之造也觀其業務紹復符能握乾將登四七而上應于列宿載當二百而適際于中天體純剛而有作莅至尊而獨專受命而興協彼真人之應逢辰則奮攬夫帝位之權用能驤首而飛也非在田而在淵馭世而起也遂得位而得祿威羣盗之䑕竄掃中原之鹿逐尊既正于九五祚遂興于百六爰究位天之載允協羲經詳推鬬野之符又同赤伏大抵聖不世出也世必治而斯起龍不時見也時純陽而後升今我恢雄圖之赳赳濟大業以兢兢既當陽而有造宜取象于時乗小利見之神堯第伸潛躍仰同符之髙帝果致隆興因以兆應金刀祥飛白水赤光之照也已新于育聖之際佳氣之鬱也又見于舉兵之始由天意之久屬宜帝尊之獨履盖有致而斯能茍不然而何以遂令耿氏攀鱗翼以願從肯使聖公假風雲而能起故得息盗集之奮蝟破野戰之羣龍回飇既止于九縣彗雲寧見于髙鋒靈貺自甄類五馬渡江之化功臣皆厚笑四蛇入宇之從噫感如諸將也有鱗集之歸驤如吳公也擅風行之譽抑知天徳之位亦賴人謀之助吾皇復受天命而逺跨于漢光乗時龍而在御修身以為弓賦以修身為弓發必中矣為韻學貴務本志當適中惟修身而由道遂取喻以為弓正以不他曲盡飭躬之術張而弗弛自成中的之功士有該百行以研窮端一心而折衷謂存于吾者茍不知審則發于外者何以示衆今也見聖師而由聖當明四重以四輕猶弓人之為弓要在百發而百中觀夫學問尚志操修及時忠信以進徳也我則務敏驕奢所自邪也吾寧詭隨故此誠身之道類夫弦木之為慮以動動惟時罔蹈黨偏之失奠而發發必中宜先審固之持兹盖有不言也言則中倫有弗行也行皆審是施于逺大則何止百步時乎遊息則為之一弛茍出乎而發乎信髙矣而美矣勉夫百行折中矩而周中規志在四方義為的而思為矢彼有忠信為甲胄者第取防閑之固以言行為樞機者深明榮辱之因我是以鑒彼省括謹夫檢身動切戒于失鵠發何勞于扣輪亦猶率乃攸行書取若虞之度反而求已軻言如射之仁因知身之修也有立功立徳之方弓之作也有尚角尚筋之術然器不臧者曷成功于射隼材不良者難求竒于貫蝨理既無邪中斯可必肯同詭遇一朝獲禽以為良尚小儀成終日射侯而不出噫主于皮者徒聞游藝之巧佩以弦者但知矯性之柔曷若志正以體直自然誠立以身修殆將觀徳于矍相奚假矜能于養由如是則有志于弧禮何拘于戴記其直如矢道兼得于成周誠以枉尺直尋也固所不為志眉中目也亦何敢忽取友必端則道豈反害與人無争則行何有闕又當兢兢業業以脩吾之身肯廢前功于一發尊賢則士願立朝賦以尊賢則士願立於朝為韻士固自重君宜罔驕惟克尊于賢徳斯願立于王朝上懐樂道之誠必加優禮下起充庭之望不待旁招凡稱命世之才俱有事君之願然而世或崇儒則與朋類以偕進時乎慢士則雖佚遺而不怨惟明主有尊賢之意每務撝謙則羣髦興入仕之思誰甘肥遯時也晉晝接下鼎烹養賢徳行道藝則必預旌表忠信孝友則皆䝉薦延此既加于體貌彼寧甘于棄捐神聖謙沖毎優崇于儒術英豪歆慕咸樂効于官聯自是來榮軒冕之華去恥山林之入望旒纊者拭目以期見候旌車者比肩而竚立謂邦有道兮于時可見故心欲仕兮如是其急聖人在上既聞有禮之三君子于行願厠亂臣之十大抵士雖貴于求仕位尤慙于茍居視君好惡以决已進退觀道興廢以卜身巻舒雖尊徳樂義而見或嗟晚則離蔬釋蹻而來惟恐徐莫不有道賤焉而恥也豈若吾身幡然而改於立或無方必負割烹之鼎待如不次自投衒鬻之書是何君専行爵之權士守立身之則倘恃祿位者因明月而按劒則安義命者必冥鴻而避戈是故好仁文后有海濱二老之歸慢罵髙皇致商嶺四人之匿譬如鳥巢不覆則鳳集阿閣駿骨必市則驥來四極今也世遇右文之盛朝惟有徳之尊語而前席者非鬼神之論見而賜璧者非捭闔之言又孰不思棄商築來趨舜門盡令雝水之西同為振鷺肯顧鍾山之北猶念驚猿王者以是改容就不召之臣式閭禮非常之士俾乗駒以去者賁然而至卧廬以隠者幡然而起是之謂王公尊賢士乎士乎可以出而仕矣濟河焚舟賦以濟河焚舟志在立功為韻戰欲必勝歸寧豫謀既濟河而赴敵遂决䇿以焚舟涉彼大川肯思還于故國火其巨艦誓死報于强讎昔秦穆違蹇叔以襲人越晉邦而趨利二陵之敗也既自咎于覆將三年之戰也又貽譏于拜賜全師再出俱懷奔北之羞雪恥不忘常起向東之志孟明乃慷慨發憤歡呼即戎謂將之屢敗也固難以語勇而君之専任也當先于効忠昔也䘮師曾媿萬全之䇿今焉賈勇願収一戰之功由是提虎旅以徂征絶鯨波而永逝念解驂之遺辱遂舍舟而自誓兵茍勝也仇則可報功不就也我寧復濟顧吾戰志已為死戰之期慮彼士心猶作生還之計莫若揚一炬以獨决聚萬舟而畢焚烈燄奔電長烟走雲俾歸者以絶望庶往焉而立勲回視歸途渺洪濤之千頃示無還志激壯氣于三軍故得我師奮臂以長驅鄰國歛兵而自戢縱横馳河内之地談笑取王官之邑指茅津而反濟封殽尸而洒泣挫夫强晉既聞國恥之湔威彼西戎尤喜霸功之立茲盖舍生而往也非徒誓于擊楫好謀而成也非不悔于馮河百敗而勇氣不讋一戰而戰功愈多歸志與灰而共滅盛烈如山而不磨誓必破于秦師類湛船之項籍悲不還于易水小叩筑之荆軻噫秦將之忠也既懐報國之心秦伯之任也不數覆軍之罪茍因一眚而遂棄徒使終身而自悔又焉得千載之下仰焚舟之風凛然如在本强則精神折衝賦以本强則以精神折衝為韻本既强固人斯服從得英雋以制勝致精神之折衝俊士朋來益鞏尊崇之勢威風逺暨坐摧奔突之鋒竊原君得士則昌國以賢為本茍并謀兼智也能以徳而為固則懐姦伺隙者自聞聲而逺遁盖朝廷為諸夏之本能制勝于九重故精神折千里之衝自宣威于四逺觀其多士同徳一人勵精肅爾幄中之妙算凛然堂上之竒兵勢既聞于克鞏勝自全于不争朝有徳而益尊人皆奠枕敵望風而引去孰敢争衡兹盖威棱之振也足以聳動于華夷譽望之隆也足以永為夫儀則人咸想于風采我何勞于聲色宜其上兵伐謀大邦畏力晏子不出于尊俎兵自罷于鄰疆齊威必勝于朝廷㑹果來于敵國大抵千里制難者以重任于賢士匹夫敢争者以輕量于大臣今也俊乂垂紳而搢笏臣主聚精而㑹神惟用儒而無敵宜不戰而屈人止須裴度之神明以威悍將不假魯連之談笑坐鄙强秦譬如猛虎在則藜藿不採于山神龍居則網罟不親于水今也紀綱法度有以鞏固威靈氣燄不可嚮邇國家安堵以無事鄰敵從風而自靡顧厭難于無形非得人而曷以賢五千之騎隨何徒詫于片言止百萬之師處厚亦稱于一士噫子玉不去則為晉之患季梁猶在則挫楚之强矧多士之濟濟佐中國之堂堂赫然臨之則夫誰與敵望而畏之則彼烏敢當豈不見汲黯居朝寢淮南之異議仲尼相禮歸魯國之侵疆彼有威却匈奴者未免于窮征口伐可汗者猶勞于面折未若此動容貌而鄙暴斯逺宣靈武而姦邪盡絶方今優游于巖廊之上而精神折衝九有自聞于有截嵗星所在國有福賦以嵗星所居宜其有福為韻國既得嵗祥斯應期占是星之所在有其福以誠宜仰以驗之木精適居常次致當臨之邦域咸被純禧原天下之妖祥係嵗星之贏縮且運于上者象不虛示則居其下者應為甚速爰占景曜適當所次之躔俯驗吾邦誕受非常之福觀其瑞色明潤重華陸離應以仁也既存生育之理王于春也又司長養之時既循度而至止則錫羡以宜其右行于天居一辰而不忒下臨無地備百順以無虧是宜君明臣直而世格昌期時和年豐而人欣樂嵗師之興也戰則必克政之舉也事無不濟由龍宿之所居故鴻禧之可繼越人遇此終摧吳國之强晉室得之果挫符堅之鋭大抵事將兆于休咎星乃為之疾徐超而前者或棄次而旅次行而失者或當居而不居事各有證象誠非虛惟嵗之在也無東西之去則福之來也有山阜之如可以伐人請驗馬遷之史所之得地願稽班固之書彼有國之昌也由太白之當期國之厚也以填星之居久况此應王者而紀于號令主嵗事而為之統首茍非次舍之當居安得休祥之備有豈不見淫在元枵之次徒致鄭饑既居析木之津遂興陳後因知嵗之行也雖本于天度嵗之居也實昭于徳馨今也太史奏瑞清靈炳靈生治國之百樂開寶運之千齡如是則賢士已登不必驗少微之象刑章㡬措何煩占貫索之星王者以是攷星次之攸居知天心之所與歛時福而民罔不錫討有罪而人莫能禦方今天相中興而嵗星臨之孰敢犯王師之所高祖好謀能聽賦以天性明達好謀能聽為韻髙祖獨奮漢圗以成葢有好謀之徳又兼能聽之明顧夙負于英姿乗時以起尤樂聞于羣議擇善而行迹其提三尺以初興念四方之未定謂不咨于衆則孰判利害不擇其言則曷分賢佞從吾心之所好謀之其臧屈羣䇿之兼收又能審聽觀其逐鹿崛起斷蛇勃興善欲納則如恐不及䇿可用則何為不能惟大公至正之是取豈小智淺私之自矜功為最髙雖獨稱于赫赫計將安出每嘉納以兢兢莫不説辭或悦于監門謀主或資于亡命食而吐哺也恐彼敗事言其逆耳也知其利行設施皆合于衆智明逹盖由于天性顧將軍何以教深圗東嚮之功非夫子無所聞爰下南浮之令非不知雌雄之勢可決于一戰甲兵之利可服于諸侯盖念至仁伐不仁也何必恃勇多算勝少算也敢忘用謀我是以疑切戒于築室從有如于順流為真王為假王悟陳平躡足之語趣刻印趣銷印用張良借箸之籌帝之性也非不聰明帝之度也非無豁逹然而助桀為虐者欲居秦室之富養虎遺患者㡬遂鴻溝之割謀茍匪于能用亂何由而可撥所以闗東欲棄問不憚于據鞌戍卒能言見豈嫌于衣褐難者曰趙王之立也不顧叔孫之争匈奴之伐也反囚婁氏之賢謀不詢于多士智難合于敷天殊不知過雖聞于有此改必見于幡然遂令信彼四人爰割體膚之愛封之萬户深懲械繫之愆至兹騎項雖倨也諫而必從溺冠雖慢也賢非不好吾不愛于兼聽人亦為之樂告故能舉秦如鴻毛而取楚若拾遺翦一時之强暴子使漆雕開仕賦以開未從仕聖人使之為韻夫子善誘漆雕受知念從仕之未也爰因言而使之顧至聖以何心惟均教育視吾徒之可用俾効施為蒙嘗尚友及門潛心諸子仕焉非茍于利祿學也所期于官使眷兹尼父當日則何以哉謂彼漆雕可以出而仕矣觀夫心本愛日志思澤民惟可行之道不試于事以有用之學私淑諸人及門之士也皆欲効職升堂之子也誰忘進身惟此魯人頗能參于聖學雖當周季俾往厠于王臣開也倐爾有聞欿然自視謂吾之學也固欲見于行事而學之優也乃可施于從仕茍吾信之未能何已長之足恃斯言既發殆門弟之未聞此意孰知惟聖師之獨喜議者謂士之仕也固所素願師之言也宜無不從然念道之將行則急于一命才或未充則難求萬鍾雖尚遲于奮迅聊自適以從容所以進則未能垂嘉言于頴逹喜其志道激髙論于司農噫有帝王之學者使之為邦在言語之科者使之辭命茍非此子之善學安得發言于將聖今也師以為可而猶切于退託道既未成則尚資于涵泳志有同于曾㸃姑樂舞雩藝或及于冉求始當從政彼有求價而沽者賜亦陋矣干祿而學者師何過哉豈若此心不求于爵祿迹寧滯于蒿萊厯攷闕里賢惟子開固異夫何必讀書子路飾有民之説使之學邑尹何非製錦之才誠以志則在于恬愉心不謀于富貴才已成而已則猶歉師之可而吾猶曰未使斯人也出而仕焉功利之及民也尚何有既天下可傳檄而定賦以今天下可傳檄而定為韻世仰英主威行普天既望風而應也一作乗破竹之勢也可傳檄而定焉王旅既興將大蘇于逺邇軍書所至當自底于安全夫惟信已結于人心助遂多于天下彼陷于塗炭也無不徯我則聞吾號令也孰能禦者赫然一怒皆延頸以望焉于以四方可傳檄而定也時其士勇咸鼓民思已深萬里起簞壺之念中原徯車馬之音茍用十行之札足安四姓之心寰宇雖遥已欣聞乎大號尺書所至自平難于當今是宜敘百世之仁恩收三軍之勇果書至河西則驚萬里之明見莭入北軍則舉一麾而袒左何在我之能然盖斯時而固可極彼不毛之地咸已順從馳吾挿羽之書自然安妥大抵强人之服者必假征誅之及従民之望者止煩命令之宣今也久矣願王師之至歡然聞軍檄之傳自然奸雄畏力而屈膝老穉聞風而息肩所以光武陶儀圅紙首安于平廣淮隂遣使尺書亦足以降燕或曰民已見于歸心國何煩于馳檄殊不知近者已附而逺或未至弱者欲來而强猶作敵故我形惻怛之言也慰雲霓之望振威猛之詞也若雷霆之擊俾爾懐徳而畏威俾爾敉功而底績掉舌而賢五千騎豈勞辯士之隨憑軾而下七十城何用狂生之酈向非戴商之民家則相慶思漢之人心焉悦隨則何以當率土之紛擾也可空言而聳動之興可冀也亂斯已而固異夫通彼夜郎止諭意于蜀道守夫鴨綠卒遺誚于髙麗皇乎哉鉛槧之儒也既務于討論帷幄之臣也又加于審訂俾萬姓以咸悦聳百蠻而退聽方今檄書風馳而人望中興不假一戎衣而大定仁孝二致同源賦以仁孝之道二致同源為韻仁孝至重性情所根用若出于二致理盖同于一源究此兩端皆良知之固有初無異體以大本之中存嘗聞才非曰于爾殊人或多于自異語其大體則似有異用本之一貫則了無餘事惟兹仁孝在人皆可以廣充究厥本源是理曾何于二致觀夫惻隠素禀愛欽自持行之閨門則致終身之慕散之民物則由一念之推莫匪斯心之舉初非二道之為皆是物也孰能外之總百行以率先悉由所性雖兩兼之難備安有他岐豈不以親其親而因不失親老吾老以及人之老篤近舉逺雖則有别舉斯加彼率由内抱信此理之不殊推是心而足保顧施物事親之際雖曰殊途如鉤深探賾而言孰云異道大抵孝之化也先以博愛仁之實也本于事親茍志于仁則豈好犯上有一非孝則適能害仁雖運用或疑于前後而本原不離于真淳當戒波流之蕩曾何泒别之因本立道生載攷魯論之訓功多事寡備形延篤之論是源也㑹精粗于一致之中合内外于同歸之地使兼愛者知厚親之道而敬親者備仁民之意重輕非復于銖兩先後豈殊于源委尊而安義道同曾子之三愛則無差本異夷之之二厥後道不明而去本益逺性好偏而所施不同剔股孝也而深溺鄠人之過摩頂仁也而或淪墨子之風是皆得于此失于彼我則觸而長廣而充純若顔回可並有虞之體徳如閔子豈殊管仲之功以是知天下之得盖以其仁聖人之徳無加于孝見于日用雖有殊品求之吾心初無異教信夫仁孝之道雖二致而本同源又何必分其大較孟荀以道鳴賦以二子皆以其道而鳴為韻周孔既逺孟荀挺生以斯道而自任在當時而善鳴仰兹名世之賢同宗一聖抱此覺民之術茂著英聲當六國之下衰有二賢之可攷以亞聖之才而無所施用以宗王之學而終于窮老其遇于世何如也既不逢辰不得其平則鳴焉獨能以道觀夫名重楚國學傳子思優入聖人之域卓稱王者之師恐斯文之䘮也振吾道以鳴其顧二儒仁義之言一根于正用六藝詩書之教大警于時兹盖二百餘章兮皆立教之文三十二篇兮悉綴文之美闡其前而振其後著乎心而入乎耳蔑千載未光之病豈沒世無聞之恥時將駕説鼓木舌于諸儒經本吐辭和金聲于夫子誠以軻之辯也非出于得已況之説也不貴于難持柰何承道傳之弊也歎徳衰之已而如草木無聲而風或撓矣如金石無聲而人或擊之茍非一鳴之善曷能萬世之知久而益盈固異震雷之喻大而且逺允同木鐸之為寧不由别王霸之尊卑明禮義之統紀一時衛道也信同聲之相應後世聞風也有徳音之不已顧響應以能然非言揚而何以假于韶樂鄙弗能之后䕫鏘若鈞天小為文之韓氏故能倡正道以相和詆異端而力排南蠻之觖兮豈巧舌之能騁天下之鴞兮豈好音之孔懐俾衆議之不惑由大聲之孔皆且異夫卿雲最其善焉文徒稱于壯麗魏晉未嘗純也辭只見于淫哇噫大醇小疵也雖或不同立言指事也未嘗有二羣儒敢飾于邪説處士不容于横議然則先王之道至今在人耳者無他由孟荀之不墜攻媿集巻八十欽定四庫全書攻媿集巻八十一宋樓鑰撰銘胡徳容安静室銘民生之初未嘗不静私慾害之羣邪交騁不操而存必也元聖勉旃學者無非中性乃若異端寂滅清淨死灰不然何有于應寜知聖心塵不著鏡妍媸坐分不将不迎吾嘗從事萬慮悉屏求静得擾薰蕕終勝師乃有言求則増病必有事焉勿忘勿正安則何敢庶㡬游泳吾誰與歸将求安定趙振文毋自欺齋銘上欺乎天謂其甚邈下欺乎人意其㒺覺事親而欺所厚者薄事君而欺陷于大惡所利幾何所喪甚博惟不自欺乃無媿怍一不妄語所守至約事是今日勿謂為昨推此而行餘裕綽綽心惟至靈神不可度戒之戒之惟謹惟恪君如美玉欲資磨琢他山之石可以為錯族兄德潤硯銘惟端溪下巖之石藏古麗州之樓氏用以射䇿閱三世孫子相傳寳千祀王端本硯銘四圭兩圭同一邸未聞一璧踞十趾玉有五色今乃紫磨以禹圭滃雲起羲獻傳家不知㡬傲睨揮毫約詩史淮水不絶璧不毁書種緜緜尚百世贊伏羲像贊不履而跣不冠而髪是何人歟以治以察手持圎蓍畫卦以八嗚呼是所謂古之聰明叡知神武而不殺者夫東坡畫贊出則鳳鳴處則龍卧論議觸海翻聲名塞天破百謫九死一毫不挫嗚呼固已知前無古人後有作者殆恐無有過之者也呂真人贊神氣旺雙瞳碧一劒横飛萬里瞬息旁人道是吕洞賓堪笑旁人初不識自贊平生愛讀書眼昏健忘不如故平生愛為人只有照管不到處老矣百事好罷休山林如許盍歸去惟有媿處便須攻攻到無時方始住伯氏小崑山贊崑山片玉大不彌掌數峯天成暗合心匠懸崖崚嶒咫尺千丈主人樂山一見技癢環以清泚碧樹増兩海岸孤絶大士俯仰我亦膏肓誰㑹清賞援琴對之萬壑同響十六叔祖畫贊猗歟先生嘉遯巖谷中無一塵髙視流俗面壁燕坐形骸土木是誰丹青寫此面目旁觀未知既笑而嘻此身見在何以假為先生粲然徐曰不然若謂是假何必此畫咄哉此身又豈其真趙禹川畫贊一室懸罄萬縁俱掃道窮而志益堅心灰而形不槁予實敬之盖宣和西洛之貢士而淳熙宗室之遺老也陸從老真贊綸中野服河目海口膏肓泉石而能起人于九殞之餘銜盃漱醪真欲遯迹于千載之後是将傲睨塵埃之表盖隠于藥而逃于酒者也莫子大畫贊目光深碧長鬛如漆少從諸公故身處韋布而有素官之風自適其適故年将六十而有孺子之色是将坐安輿脱世故洗眼以看令子之翺翔而逍遥乎仁壽之域者耶叔韶弟畫贊是何為者獨立突兀目視雲漢若書咄咄江山數千里而氣益増齏鹽十九年而志不屈故能起連桂之墜緖收青氈之故物今既漸失布衣之髙是将斂湖海之豪而歸尋理窟者耶髙㑹之畫贊風標秀整興寄髙逺淟涊京塵而素衣之色不緇浮沈宦海而鐵硯之志不淺吾欲與之一局以消白日五絃而送歸鴻盖所謂向若而歎自崖而反者也趙景瞻畫贊寫照求贊其詞多妍子求箴規意已卓然余訥于詞為誦道家之言其言曰和暢命生卑退徳生清静道生慈儉福生君能行此四者而又文之以學富貴何足論當遂為河間東平之賢馮義叟畫贊曵笻者誰曰小馮君謂為山澤寒儒而有食肉之相疑為貴介公子而有驚代之文孤標如峯尖之秋隼秀句如春空之行雲退然不言無異稠人若飛書走檄之敏髙文大册之工有能試之老矣是筆力猶足以挽千鈞者耶汪彊仲畫贊頭圎骨緊短小精明種雙芝之秀擷叢桂之英宦學有傳清白是承勉之哉資禀如此毋曰賢于俗人斯可矣冀有以振吾外門之家聲也豐叔宜真贊志行超卓風神灑落襲清敏之餘慶傳黄梅之家學弟兄怡怡親髪如鶴故居鼎新樸斲丹雘已而意慕山林身去城郭掃溉松楸以自伸其志甘守簞瓢而不改其樂蕭然松廬一邱一壑捜蒼石之空洞引瀑泉之濺撲信盤谷之可序而輞川之可貌也惜乎急景不可以久留泉石之膏肓又不得而藥吾聞其風欲從之游意九京其可作耶從子澤修淨業以彌陀像求贊彌陀何在云在西方垂一隻手接引無際視日入處知幾由旬一念感通如覿面見莊嚴五采聚紫金光全體現前若在浄土汝以色相欲見如來一念或差萬里懸隔惟此世尊衆稱慈父汝能供養懺悔歸依家有慈母與佛無二事母與佛其畢此生觀音像贊宜興蔣雲起示余曹仲元觀音像上有宣和御題筆妙在吳道子之上且曰上天竺瞻禮大士者衆今将摹刻山中使來者得此像以供養用資二親冥福乃稽首為之贊慈悲廣大相好殊勝筆意精微乃與佛稱自在在心固不在相察至秋毫出道子上攜此西還刻之天竺流傳八方植無量福定光佛像贊蟲蝕成文屋漏成痕贈之以中天然者存擬議則錯思量則昏斷是無人能㑹徒自饒舌紛紛直教喚出南安巖主也只解説無門風鈴搖殿角柔櫓過江村南山律師贊曰禪曰教無非為人惟兹律儀尤切于身仰止南山與佛無間人天師尊不容贊歎靈芝律師贊南山既逺教道中微化身再來是為靈芝持律益嚴護法甚勞靈芝之風南山相髙佛法自天竺流入震旦久矣而四海之外奉之尤謹今有日本國僧俊芿慕南山靈芝之法航海求師首畫二師之像求余為贊芿公恪守律嚴究觀諸書既得其説欲歸以淑諸人余非學佛者吾儒曲禮三千散亡多矣然見于日用者如入公門而鞠躬上東階而右足雖造次不可廢也詩曰我心匪石不可轉也我心匪席不可卷也威儀棣棣不可選也此非律之説乎歸矣使律之一宗盛行于東海之東于以補教化之所不及其為利益豈有窮哉哲老真贊本是六一居士後裔郤做臨濟老子兒孫拈槌弄拂便習成出家兒事横説豎説都不見文忠之文若是金剛圏渾身透過栗棘蓬作一口吞直得齒如劒樹口似血盆呵佛罵祖惟我獨尊真箇了此一段大事也不枉了打破家門湖心竹谿政講師贊諸佛諸祖都知源流一片靈臺莫之與儔萬論千經縱横受用一段辯才壓倒大衆定交方外一别九年再見似黄面老子依舊説教説律説禪指望他一口吸盡西湖水郤成火裏打秋千季札挂劒于徐君之樹吾亦説偈于老師之前師豈遂無知耶當亦盱衡而為余欣然也鑑堂昕老贊咄這老頑頑于石鐵喝倒又起棒打不殺急裏翻身當機便拶若教撾鼓説禪也㑹七七八八咄把似口羅舌沸何似耳聾眼瞎瑞巖益老贊鋪席多年欲捲收又攜一錫海東頭雲門不絶僅如綫命脈有人能續不涂毒䇿老贊涂毒已化一絲不挂誰模其形強為描畫是見佛便呵見祖便罵者我銘其塔已成話霸更要注腳我則不暇為此老從來顛蹶不知今在何許而精爽猶為可怕也雪菴瑾老贊俊辯不窮靈臺無比菴空無人雪消成水若道成水流轉未巳一㸃洪爐永超生死英老真贊豎起硬脊梁論交鐵拄杖栖雲菴中若将終身十字街頭蹴踏龍象大地一變直教寸草不留大厦将傾敢将一手扶當翩然去之逺隔風浪維摩示疾幸得無恙且須留取這老古錐要與住山人作箇榜様壽上人真贊年甚髙業甚茂火冷雲深松枯鹤瘦對鬼神而獨説有翻河之辯口人望為大道師終不出一隻手邁祖風之髙絶挽末俗之卑陋求之吾鄉盖前有顔聖徒而今見此山之壽瞎堂逺老真贊少識師于柯山之菴晚見師于靈隠之南荆棘林中吞栗棘蓬觀堂深處見古瞿曇雲歸列岫月印寒潭真圓悟之嫡子而杲風之同參也圓覺菴澄師真贊清浄縁深塵勞念絶雖見比邱尼身有古貞女之潔居然是圓覺菴第一代住持更不須横說豎説偈頌雙峯二偈莫把資深兩處尋此心心外更無心道人欲問資深話自得元無古與今道非身外亦非中左右逢源作麽逢遶寺尋山無好處不知門外有雙峯新昌石佛費盡三生心與力造成石像一百尺相好端嚴具足尊五采黄金妙装飾道不是佛郤不得若道便是也不得上盡層樓郤下来何曽見得真彌勒游金焦兩山以雨而輟余沿檄行浙西冒秋陽之暴烈漕河絶流日有焦槁之歎至京口假舟游二山適是日風雨大作江頭尤甚豈俗語所謂平生不賣漿者耶回城道中因憶本長老金山偈戲續其韻金山寺裹山焦山山裹寺風雨勸我歸也省兩頭事本長老金山偈云水裹有塊石石上有箇寺千人萬人題只是這箇事跋惠峯詢老所編類海古徳手段決裂剥地破㔢地折説道不立文字未免横説豎説草菴文字太多只為老婆心切若不作恁麽看将謂多口饒舌題老融畫彌勒乗風欲去東南回頭此意誰參當時蹉過足菴郤來攻媿同龕戲贈怡雲平老深山中拔出閒身閙市裏尋得静處相逢了白話三通那箇是末後一句不因聞所聞而來不為見所見而去嶺上白雲君自怡何時許得同龕住送清道者住投子山一鉢一衲一邱一壑非去非住無相無作一脚踏著投子機不被旁人輕摸索戲題珪老借菴莫道菴子是借底只你也是借将來勸君莫作來生債盡底還他亦快哉不知當初問誰借至今久假而不歸畢竟還了方是了郤須還我未生時次仲舅韻寄拙菴涵秋古澗落珠旒㡬欲相将作勝游芒屩未穿心已嬾不如莫莫且休休明月堂前玉几山倦游雙徑卻來還舅甥相與成三隠城郭山林等是閒公居山外我城中不見成疎見亦空要是歸來當一見待攜藜杖訪支公莫把坐忘成坐馳歸來須是識真歸壺籌投盡無人拾澹坐藤牀風掩扉送雪竇璧老住雪峯雪竇移将住雪峯兩山雪色本皆同莫言此去八千里明月往來含太空游雪竇雙塔登雲簷有懐海印雲老來禮二師遺像小立雲簷一餉欲見徳雲比邱卻在别峯頂上金峩本老領優婆塞衆求寫選僧堂三大字示以數語行者堂中選僧衆僧堂中選佛人道是我卻不不如莫待僧伽梨便與豎起脊梁骨大丈夫休汨沒一粒爆起冷灰豆十分鈍似遼天鶻赤脚踏透祖師闗神錐擊碎精靈窟君不見盧能只在碓坊前解道本來無一物題壽居仁獨説圖向來八萬四千偈舌端辯才若翻水山空月落說向誰不如出口入吾耳當時受者亡是公烏有先生子虚子我卻曽見語録來秖有空空數張紙題璧老笑菴笑甚底笑甚底若要笑時笑殺你説夢夢中洗泥泥裏頭上安頭以水濟水箇箇一般滔滔皆是我也要笑來終不欲開脣露齒題宏老空谷君看空谷自然空聲有洪纖應則同正為中虛聲自應莫将應處做神通昕老自號鑑堂來住蘆山山中先有鑑堂鑑堂來住鑑堂中兩鑑相磨只一同要是非堂亦非鑑但見寂照含虛空跋涂毒與惠老偈我銘師塔而不識面一瞻頂相爛爛巖電横説豎説不待饒舌涂毒一聲百獸腦裂次韻伯父與心聞偈紹興二十四年伯父帥維揚時在郡齋見所與心聞一偈慶元六年昕老示及真蹟恍如隔世敬次舊韻法器何妨待晩成一朝㸃鐵便成金拽開鼻孔力無限坐斷舌頭功更深揚子江頭言在耳靈山㑹上笑傳心自憐鈍置無香氣四十年來只似今汪耐翁以最首座十𤣥談見示十首𤣥談已贅疣勞君頭上更安頭若還又有九百漢葛藤相纒幾時休題龍眠畫西域聖僧放兩不借疊雙足自在在心機在目黙然深入不二門不知師唱誰家曲戲答益老寄方竹杖瑞巖益老寄方竹杖書云不可削圓也一笑又舉大徳拈起拄杖全得這箇力話謂攻媿下語下得一任提持下不得奪卻作麽生區處快道快道家家竹杖只圓光此竹如何得許方削得團欒無可笑驀然奪去亦何妨咄哉得力處不在這箇答東山一老二偈即心是佛本無難錯郤絲毫隔萬山知有毗盧五千卷誰能分寸費躋攀閉門深坐日知味無限好山都嬾游城裏山中俱是隠江湖不若兩忘休送一老住廬山歸宗久向東山捲藏經鬼神推出舉軍驚從來要去廬山住好就山中過此生啐啄同時不偶然史君提起正當年向來閙市難行道今日人天聽説禪千古名山大道塲止因賦重遂荒凉後之君子誰能弛試向山前問老蒼歸宗法窟寖湮微拭眼餘風靡孑遺法鼓一聲精彩變要如光弼用軍時廬山面目非難識横嶺側峯皆是真若待出來方識破不知何用箇中人題庠老頤菴下震上艮下動上止分明兩片口脣包著許多牙齒禍自此出故以言語為戒病自此入故以飲食為忌庠者養也頤者養也名庠而住頤菴知他養箇甚底直待吞郤栗棘蓬更與吸盡西江水莫問這邊那邉都是一箇道理題慈溪張氏坐化頌慈溪董君之妻張氏坐化作頌云有身有苦無身無礙撒手便行這回自在柏泉諸人稱之為下一轉語苦是自苦有誰縛汝礙是自礙非身為害既知一物本來無何待行時方自在書全無用語錄全公無用無用之用生前已自無用死後葛藤何用雖然如是善用者必自有用不善用者不如勿用試問大衆如何則為善用有時拈起一枝草作丈六金身有時把丈六金身郤作一枝草用跋正法眼蔵正法眼蔵當時滅郤那得許多落落索索問著則差答著則錯喝也喝不住棒也打不著妙喜更得工夫時與下箇注脚休休休莫莫莫若要拈花微笑底事不二法門也低一著攻媿集巻八十一欽定四庫全書攻媿集卷八十二宋樓鑰撰祝文案原目此卷前有致語十五首上梁文四首勸農文三首合為一卷已缺佚無存又有青詞三十四首别為一卷疏文九十六首分為二卷大率道場祈醮佛寺功徳求僧募縁之作今竝刪去温州修大成殿祝文教授殿久弗葺隳蠧日甚神像在兹懼将壓焉易敝從新飭工伊始恐驚神靈不敢不告台州謁廟祝文通判東嶽行祠泰嶽以膚寸之澤及天下功利之在民物者何止一邦鑰佐郡此來伏謁祠庭巖巖之瞻邈在天外神聽則近尚其顧歆靈康行祠惟神之祠肇于永康而靈響之著盛于台城乃崇寜元祀曾祖來守以神之隂功聞于朝是以有仁濟之封鑰佐郡此來所以事神者何敢不肅祗事之始先欵祠下靈康之謁少俟朝夕惟神其鑒之諸廟州之民吏治其明神理其幽神之血食于此既久功利之及民者深鑰佐郡此來祗謁祠下吏之事不敢不勉惟神其隂佑之靈康正廟王之威神震于一方疫癘雨暘罔不禬禳昔曾大父來守海邦列功于朝侯封有光鑰兹叨佐州祗敬靈響巋然祠庭襟山帶江千載喬木鬱乎蒼蒼再拜致謁肴鮮酒薌願廣隂佑保綏此疆十雨五風豐年穰穰吏責茍逃神賜敢忘辭廟祝文先聖夫子曰君子學道則愛人鑰未知道而願學焉羨員此邦所未底于戾者夫子之教也今去矣敢敬致辭然夫子之道無乎不在鑰之心亦當無乎不勉盖夫子之廟可辭而道不可須臾離也諸廟鑰贅倅此邦首尾二年年榖順成無菑無害神之福吾民者如此而吏之被賜也尤為不貲今去矣祇拜祠下非敢邀福于身願神之福吾民者千載猶今日也温州謁廟祝文知郡先聖夫子之道萬世所尊夫子之尊萬國所共鑰頃嘗分教今十五年奉釋奠之舊儀葺大成之廣殿兹叨假守尤仰師尊夫子有言曰敬事而信節用而愛人使民以時鑰雖不敏請事斯語惟夫子實鑒之諸廟永嘉内外百神咸著靈響祠山云惟王威徳著于東南創祠此邦民已受賜海神云惟王勲業冠于唐室威徳著于是邦鑰頃嘗客授祈報屢矣兹焉假守獲共香火之奉今嵗旱災甚廣獨吾州有年神之賜厚矣國家張官置吏凡以為民祀典所載亦惟有功于民者祀之秋氣方中岌岌然以風濤為憂愁霖未止願亟開霽以全農功鑰不敏竭力以祗王事惟神有以相諸幽則吾民其庶㡬乎祗謁之初敢敬以告祭酺神祝文惟周禮族師之職春秋祭酺鄭康成云蝝螟之酺慶厯之制有蝗蟲則祭煕寕議臣欲每嵗春秋行禮終不果行乃閏五月丙戌以蟲螟為害祭以致禱賴神之賜隨即衰息兹當晚禾秀茂之際又有食其心者士民以前日之靈異來請不憚再瀆復舉斯典詩云靡神不舉靡愛斯牲而況明神見之禮經著之祀典専職于蝝螟者吏不敢辭其勞神其不倦于應俾田祖之神畀之炎火以全嵗事于垂成不亦休哉辭廟祝文先聖嗚呼聖人之言可寳萬世而況吾夫子集大成而又拔其萃者乎夫子之言曰道千乗之國敬事而信節用而愛人使民以時鑰不肖試郡以來伏謁之始固嘗請事斯語黽勉萬一由是得二年之間田里相安今去矣敢以展謝四五年間十修釋奠之禮顧瞻廟庭不忍遽去若拳拳願學之志又非止乎此也諸廟惟明神福永嘉之民民之謹奉香火于兹有年矣鑰試郡此來荷神之休凡有禱祠無不響答今歳尤幸十雨五風以迄康年晚禾闕雨不免煩瀆秋髙氣清忽霈膏澤豈么麽能動神聽盖千里之幸也吏之撫民不過二三年鑰拳拳此邦無異鄉社今去矣既謝靈貺神其加惠斯民于無窮哉工部加贈焚黄祝文四首國家蕆事于南郊大賚四海鑰以叨列朝籍贈先考為中散大夫嗚呼惟樓氏世有積徳衣冠相襲既百三十餘載矣自曽大父金紫而下階官至朝議者三人俱不及生登五品我先考厯仕㡬一甲子謹廉周密始終無玷闕官簿益髙壽七十有六而束于新制乃今而後得之仲兄既不勝喪遂不得同致卹典焚黄九京追痛罔極伏惟昭鑒歆承寵渥鑰伏自淳熙十四年七月假守永嘉辭拜塋下聖朝恩賚動及泉壌先君贈典乃至于八前四者固嘗燔黄以告矣今皇帝登極已而鑰遷秩中奉又遇明堂大禮累贈先君為正議大夫今者鑰由權吏部尚書丐郡得婺按故事以請于是遂有正奉之贈歸掃松楸涙沾宿草敢以四告併侈上恩惟我先君位不稱徳積慶流衍十年之間寵渥踵至不肖子鑰蒙被遺澤年除歳遷寖逾分量幸逃譴何得遂一歸皆先君之賜也尚惟祗服命數以佑我後人于無斁惟皇帝御宇之四年親祀南郊霈大澤于天下追榮之恩普及泉壤嗚呼顯考積厚流光鑰不肖祗服義方慿藉隂佑幸不墜門户以為先君羞十有四載之間告第燔黄至是而九兹敢以宣奉大夫之命薦于塋域顧瞻松楸音容如在尚惟歆鑒式綏寵渥伏自嘉泰三年郊祀大禮考加贈銀青光禄大夫妣加封安康郡夫人恩命未頒顯妣遽棄諸孤憂苦摧割未遑蕆事去歳天子宗祀合宫又贈考金紫光禄大夫妣安定郡夫人嗚呼顯考捐館于今二十有六年告第之典至十有二今既視秩天官追蹤曾祖顯妣克享上壽石窌啓封至再至三康寜考終洊更大郡餘慶所暨燕及孫曽世受國恩存歿俱幸惟是奉顯妣色養之久近經初忌又首行燔黄之禮鑰等不勝哀慕之劇謹併以四告三黄展儀塋下移長汀菴祭告祝文三代并陪葬位鑰等罪逆酷罰母氏大寜郡太夫人汪氏傾逝伏自淳熙十年先考葬于長汀祖庵之後是時即議少遷冡舍因循二十餘年兹以母氏卜日合祔移菴于左敢先奉祖考神主于享亭庶免斤斧工役驚動神靈俟新菴之成復還廟室伏惟鑒察密賜隂佑俾大事克修鑰等不勝哀痛感激之至先君工部嗚呼先考之葬二十餘年矣體魄安静子孫蒙休久議遷移祖菴不敢輕易天禍我家母氏大寕郡太夫人以正月九日棄諸孤攀號擗踊痛割何極鑰等忍死力貧已豫卜十二月八日丙申奉太夫人之喪祔先考之墓将以此月二十二日丙辰解屋填基伏恐驚動神靈先于今日設祭昭告惟我先考黙相大事使區區孝誠早遂素志永奠二親九原之居不勝悲痛感激之至䘏典将頒燔黄未果寒食之節以凶服不敢墓祭挂旛追薦併惟歆鑒痛吾母之不及見也土地先祖少師之葬建立菴舍今八十年其鎮安松楸保佑存歿惟神是賴兹以母氏大寕郡太夫人之喪将祔于先考光禄之墓豫卜吉日遷菴于左方伏恐有冐明神謹用昭告奉神位稍就西廂俟工役訖事别當築室妥靈永祗香火惟神鑒察尚隂相之畢工奉安神主長汀建菴垂八十年物各有數撤而新旃顯考之藏安康合焉惟此舊基實蔽新阡忍死竭力徙于東偏土木初興神主告遷兹焉訖役奉以言旋載髹新位敬書掲䖍捨舊從新憑依永傳佑我後來慶系其綿鄉校奉安先生祠堂祝文代工部惟我曾祖以古學起家不務仕進退而教授鄉校一時名公横經授業最為盛際里人推本文風之所由興相與祀于學有年矣近又請于郡願徙祠東序以致尊尚之意郡太守欣然從之遂為四明美事衰族預有榮焉粤子孫不敢以是勤鄉曲身任其責堂宇一新像設嚴備其率子弟祗拜祠下以妥先生之靈世蒙餘休懼弗克稱繼自今歳時瞻敬其勉進學業惟孝惟友以庶幾先生之風以無負里人之意惟先生其鑒之立皇太子祭諸廟祝文以下代温州守皇帝惟宗祧之重豫建太子以固國本爰推恩沛惠綏萬方凡郡國大小之神有功及民者命長吏咸致敬焉惟神廟食兹土法應得祀謹涓吉辰一作謹遣某官奉酒醴牲牢以薦馨香神之聽之相我千里之民自今無或有旱潦疫癘之災仰以答上之賜俯以為邦人之休顧不在兹乎海神廟祈謝祝文祈雨五首惟神相唐若旱作霖精爽凛然廟食歳深民以旱告吏實疚心潔齋致禱罔或弗欽願沛膏澤視古猶今庶幾歎愁變為謳吟海邦之民神所勞驕陽傷農下無告吏實不肖心是悼三日再瀆神勿躁旱魃既虐風亦暴吹雲使醨氣不冒平疇良苖日就燥安得上天隂雨膏神兮至靈随所禱牲牢馨香敢忘報夏旱致禱神既應之驕陽復興實慙再瀆暑氣日甚嘉榖将槁吏無所告惟神是求願為甘露迄成歳事靈應益彰報敢後哉頃歳夏旱秋而得雨農功雖失尚收桑榆惟今之災秋晚未巳千里内外日以告病間有火驚無敢安處麥不入土後日可憂瀆神再三顧豈得已願為膏澤捄此疲氓三時務農以神為命雨暘不若随禱輒應農事既閒人亦少休旱暵吿病惟神之求連甍而居甘井枯竭宜寒而燠疫癘将孽神芘斯民尚聽禱祈三日之霖拱而竢之迎神像行道祈雨旱災致禱雖日造于靈祠甘澍愆期意尚虧于舊禮願同佛像周厯郡城列處黄堂慰萬衆瞻依之切悉裒緇侶盡六時諷唄之勤庶神力之益彰俾雨師之速應人所欲者神其聽之謝雨四首夏旱而雨功歸于神神安厥居盖亦未㡬秋陽為虐于于復來不以為凟而不我聽三日之澤如響應聲苖興勃然一稔可待神之賜也敢謂偶然敬拜于庭神其來格神居是邦民之司命曰雨曰暘來禱必應亢旱既久千里告病迎處黄堂用彰禮敬人心惶惶神實來聽以隂以雨不俟雩禜肅神之歸如初之迎掲䖍妥靈牲酒斯盛或言海氣則風之證祈佑農功俾終有慶秋日亢陽正此無告海風助虐其何以堪吏之不徳不能銷去精祈未既靈貺已昭神之愛民若父于子隨禱而應是焉可誣尚請于朝以伸陽報旱災之餘人心易恐雨小不應千里嗷嗷所不甚恐惟神是恃衛公精爽凛然如生膏澤所霑闔境告足率屬來謝其敢不䖍尚冀時若以汔稔歳祈晴二首惟神廟食之久于民有功曰雨曰暘調護無爽吏政實愆致此隂沴雨雪不已欲耕未能怨咨無告惟神是賴毋以吏故而害于民廓清頑隂使遂開霽吏敢不勉重為神羞春耕欲雨多則告病人既無厭神亦難應然念此邦倚神為命滛霖未巳隂沴日甚嘉種不蘖汨于深濘東作茍失曷為農慶日在甲子占匪休證驅斥雨師惟神之令有禱于兹神其來聽謝晴春霖太甚良農病之吏求于神日俟嘉應上勤宵旰徳音四馳曾不淹辰廓清氛翳回視四野物物昭蘇神實相唐功著千載燮調之妙又及我朝曰雨曰暘尚期終惠祈雨雪惟兹東嘉歳事屢愆神厚其賜書大有年農隙而旱敢瀆神聽泉竭麥枯人亦告病歳云暮矣煖然如春又恐疫癘重困吾民立雲滃興密雪交下益以霡霂潤及原野是在明神不勞餘力倘終芘之何以報徳謝雪冬温不雨為嗣歳憂致禱于神靈應如響微雪欲作先集于霰報神之賜庸有既乎發海舟郡祗天子命遣巨艦數十艘由海道以戌四明惟神廟食此邦靈應如響願隂相之俾往來鯨波如乗安流無有驚畏則所以報神者敢怠哉禳謝􅄓風三首永嘉災荒首尾十年今歳之稔近所無有時暘時雨神賜實宏秋霖未巳害我穡事積隂之久或致􅄓風窮民易驚愁嘆相屬垂成之賜惟神是依驅除雲師使見白日風伯退聽鳴條不聞倘終惠之其敢忘報魯有爰居止于東門展禽曰今其有災乎是歳也海多大風先事之占有可信者此邦歳苦􅄓風邦人畏甚春有飛雪以秋為期暑雨未休深恐馴致惟神靈響千里具依是用祗謁祠下豫罄邱禱曰暘曰雨神已佑之于前其終惠之汔我穡事吏實不肖無功于民神曷芘之隨禱輒應反風之感雖曰偶然如神之靈答貺昭甚震風凌雨一夕掃除祗謝祠庭其敢不恪龍女廟祈雨祝文二首旱潦有數天實為之千里之潤神實司之歳以旱告将困吾民天高難諶用求于神幽蟄奮起霈然膏澤俾成豐年何以報徳靈貺在民廟食久矣靈雖不渝祠則甚圯旱禱未答或其在是吏職養民視飢猶已神相于幽休戚共只願噓𤣥雲沛澤千里何以報神葺祠舊址丹青相輝棟宇豐侈神之聽之誓有如水二龍潭請聖水祝文歳以旱告靡神不舉百榖方仰于膏雨神龍猶卧于靈湫爰遣屬僚修郡故事仍将緇流諷唄致禱挹彼注兹雖曰聖水一勺之多賦靈于中端如泰山膚寸之潤三日之霖将于此乎求之神尚肯來慰此渇望迎四龍王行道祝文深山大澤是生神龍旱魃為灾迎之幽宫聖水一勺神在其中甘霖未施吏罔措躬旗旄幡幢往從紺容願驅妖沴回禄祝融願呼羣靈屏翳豐隆尊居黄堂指麾成功膏雨浪浪黍苖芃芃策勲而歸報神何窮巾子山龍潭請聖水祝文記曰天降時雨山川出雲然惟神龍所居則膚寸之雲雨輙應之郡苦亢旱祈禬之禮徧于羣神雲出相望膏澤未下竊惟巾子山一郡之望真龍之所居也謹命縣大夫修敬靈湫勺聖水以伸誠禱願興雲霓沛以甘雨以慰渇想以蘇千里以示神應于無窮不其休哉九龍潭請聖水祝文神龍之居實為靈山旱憂吾民神不得閒從人之來奮起幽蟄來即公堂杯水可挹𤣥雲四興千畝含滋為此澤者非神而誰求之于初萬目所矚于以将之其敢不肅神乎既居願安幽宫節宣雨暘相予屢豐平水王禱旱祝文亢陽為虐方憂誠禱之未孚故老有言始悟靈神之在邇謂護國通天之號有濟民惠物之功比歳以來幽祠寖廢既上雨旁風之未免何西廂東序之足觀雖吏民已謹于祈禳而守宰久愆于禮敬旱既太甚咎或在兹聞之惕然其敢寜止爰陳菲奠來謁明靈伏願矜小己之寡聞憫斯人之無告沛乎百里之潤為之三日之霖誓率耄倪益謹牲牢之報且令棟宇聿觀輪奐之新郭先生廟祈雨祝文維兹斗城先生卜之厯千百年民用安之亢陽有禱神又聽之廟貌之崇後其圖之祭勾芒神祝文二首正月惟閏既望始春甘雨霢霂土膏墳興祀牛于門協氣是迎司我穡事惟帝與神歆此菲奠用介豐登維時發春盛徳在木帝實主之神實輔之迺祀土牛用介穡事其尚居歆以迄康年春賽諸廟祝文惟神功利及物廟食此邦維暮之春聿修歳祀涓辰致潔徼福于民神之聽之惠我無疆畢文簡公祠堂奉安祝文台州興國之初台為王土擢公朝行首綰郡組宣暢皇風蠲除虐賦去厯華途為公室輔遺愛一方美談千古君子人歟章聖天語迺昔尤侯建祠黌宇遺像未設闕典思舉傳之番易冠佩容與道貌睟然爭先快覩鑰去二百年叨繼前武敢曰尚友庶㡬趨步于以奠之掲示儀矩曰士曰民惟敬惟慕鄉校序拜奠謁祝文代鄉人先聖夫子于鄉恂恂為先鄉人飲酒後杖者出正月之吉敬拜殿庭退序長㓜仰遵聖訓兹與鄉人飲酒以齒謹以清酌薦籩式陳明獻兗國公惟公亞聖苦孔之卓非禮勿動不改其樂願言晞之敬拜于學兹與鄉人飲酒以齒釋菜于先聖謹以薦籩之禮配陳明祀鄒國公學以明倫孝悌具申徐行後長舜予何人鄉黨尚齒遺言是遵兹與鄉人飲酒以齒釋菜于先聖謹以薦籩之禮配陳明祀攻媿集巻八十二欽定四庫全書攻媿集卷八十三宋樓鑰撰祭文孝宗皇帝靈駕發引祭文同侍從維紹熙五年嵗次甲寅十有一月戊子朔十五日壬寅具位臣某等伏覩哲文神武成孝皇帝靈駕發引臣某等謹于道左恭陳薄奠攀慕龍輴臣等謹泣血頓首死罪言曰恭惟尊號皇帝道全徳備仁熟義豐列聖儲休承藝祖神明之胄中興垂統紹髙宗揖遜之傳亶超今冠古之資妙旋乾轉坤之略髙出百王之表規恢億載之圖若孝徳之大成葢聖人之未有永惟四海之養仰奉兩宫之歡以萬乘之尊躬行舜慕以三年之久親執堯喪釋神器以不疑事慈闈而盡禮方且凝神泰極介壽無疆乘飇馭以上賓攀龍髯而何及千官號慟兆姓悲摧茲當同軌之期既庀因山之役臣等叨塵班列夙荷生成痛靈駕之莫囘俯濤江而欲濟同傾丹悃敢薦芹誠臣等無任號天摧絶哀慕感切之至臣等泣血頓首死罪謹祭龔參政茂良嗚呼哀哉先生之生殆不偶然先生之用人則望焉先生之貶自古有此先生之亡則天道亦不可知矣嗚呼哀哉尚何言哉聖度如天斥者多還使先生少須臾毋死且少北矣而何朝露之遽先嗚呼禍福之變處之晏如疾在血脉而居非人之所居以馬伏波之堅壯猶不堪飛鳶之墮況愛嫡埋玉之痛雖有鐵心石腸能無動乎斯人也而有斯禍兹非命夫兹非命夫鑰受知先生十有七年出入東閤託身陶甄既驚嘆于云亡又哀夫父子之相隨于九原也聞旅櫬之言歸愧生芻之闕然向風一慟有淚徹泉祭謝樞密廓然丞同寺監簿丹丘之境上應泰階名徳輩出未躋公台惟公特起抱負竒才遇事風生游刃恢恢一言寤主風雲壯懐含香蘭省峩豸栢臺言聴諌行天顔屢開青霄直上富貴鼎來洪樞運動大政參陪謂當自此麴糵鹽梅天乎不淑梁壊山頽上意震悼生榮死哀某等叨列周行屢登翹材劍佩儼然公安在哉乃列斯殽乃酌斯罍失辭一慟我腸九回祭王丞相淮官同郎嗚呼魯公氣備才全結知三朝運逢半千紹興之季已任諫垣敭厯中外再歸日邊巍巍夀皇尤急親賢知公日深擢之邇聮憂國孜孜愛君拳拳無喜無愠不黨不偏若不勝衣似不能言臨機輒斷得君最專愛惜名器避逺勢權旁求髦俊坐鎮浮儇其崇如山其澄如淵宰輔七府十有四年彌縫藏用海内晏然縟儀大典奉以周旋無器可名靡勞弗宣經綸未究精力未愆名遂身退來歸林泉舜亦命禹龍飛御天甘盤舊學盍歸帝前上意傾屬虛左待旃嗚呼慶門多故天命不延嬴博痛念風木悲纒竟不勝喪一病弗痊兩宫震悼四方驚傳某等叨列郎吏久與陶甄絶望衮衣阻拜新阡敬以菲奠逺致几筵矢哀以詞有淚如川祭羅樞密㸃嗚呼天之生才足用一世如公之生為國之瑞氣勁而和色温而厲立登要津以學自致年不可及衆惟大器亹亹九遷逼以富貴而公謙虚得寵思畏樂善貪賢惟恐弗至公爾忘私力捄時弊憂深思逺語輒歔欷論事剴切無所顧忌退省其私不改端粹謂如若人宜居大位上以舊學眷寵尤異擢貳西樞望以經濟才五浹旬一疾而逝天胡不仁孰主張是賦以宏才登之兩地乃遽奪之哀哉殄瘁平生無玷俯仰何媿母方逺歸子不及侍公之齎恨有此一二某等仕同班列情均兄弟同寅協恭相勉忠義比日扈從尚得聨騎一宿九原驚悼喪氣潭府方新賀弔相繼矢詞寓哀痛哭流涕祭趙觀文彦逾惟我朝之天族兮分銀潢于仙源極富貴于承平兮盛人才于𤓰瓞之緜仰高帝之子孫兮固龍種之不凡惟我公尤為傑出兮掇儒科于妙年初小試于簿領兮騰政譽于瀛壖葺水利于不朽兮兩舟之濟人不知其㡬千由宰縣以佐郡兮聲名上徹于細氈阜陵畀以三輔兮藹遺愛之流傳上不畏于强禦兮下撫恤于黎元鉏積蠧之狡穴兮伸累載之幽寃將使指于諸道兮振風采于兩川一介不輕取予兮信靡勞之弗宣出藩入從兮擢文章之邇聯當紹熙之末年兮鯁論至于駢肩公實領袖于時髦兮心鐵石而愈堅劇羣情之危疑兮方憂夫杞國之天發大計于丹衷兮皇天后土實臨公之一言彼頌梁公之取日兮謂咸池與虞淵未若公之善斷兮定䇿于萬衆之先進忠謀于長樂兮又從容于平勃之間覩大明之繼升兮措世于泰山之安無官可以酬公兮視政路之清班偉君子之勞謙兮推勲名而弗專望蜀道而再登兮兼制閫于帥垣服袍帶而攜琴龜兮追軌躅于趙張之賢方讒邪之競起兮若蜩螗之羣喧馳睿旨于萬里兮俾書龍飛之末與顛陷宗臣于罔測兮將于此而求旃孰知公方平心直筆以進兮無一語之黨偏守陪都之管鑰兮歸佚于橰閒繙萬書以自適兮若將終其身焉痛妖孽之肆行兮裒凶鞠頑而盜大權又妄興于兵端兮致塗炭于三邊公雖身在外兮切憂時而拳拳豁天地之開闢兮更漢化而改弦起大老于海濵兮詢黄􅄠而罔愆屈故事而不得共政兮為帝師于經筵俄引疾以吿歸兮返錦里而名全猶薦賢以報上兮又開東宫之新編曾經濟之未究兮忽一疾而不痊邦國為之殄瘁兮惟我十倍于哀纒悵登門之雖晚兮幸接武于甘泉頃丐外而投閒兮亦來問舍以求田登百尺之樓兮十載奉公以周旋約五日以往還兮澹若水而無閒然酒三行而棊再戰兮望之者或以為仙時抵掌以劇談兮若相和之篪壎忝賜環之同日兮祖生先我而著鞭我方困于沈疴兮尚踸踔而蹣跚陪露門之進讀兮又聨鑣于九閽公既扁舟而東下兮謂將相隨而出闗乃匏繫而不得去兮徒尺書之翩翩謂獨居而無偶兮幸蚤歸而毋留連荷公之心相知兮夢曰繞乎故園何天之不慗遺兮棄塵區而蛻蟬念吾母之窀穸兮公之賜及乎九原感二子之受知兮正禮舉于後而公山舉于前繄龍門之高峻兮殆吾父子之宿縁何雲翰之未乾兮驚身世之遽遷寄薄奠于繐帷兮慘東望之風烟尚乞身以挂冠兮期執紼于南陽之阡相距纔四歲兮亦豈久于人寰爰矢心以致辭兮灑哀涕之潺湲又塟事惟公操厲冰霜忠貫日月東西惟命險夷一節求之古人葢以安社稷為悅者也功成不居橰閒道尊更化還朝進讀露門人望所歸尚秉政機難進易退竟歌式微送公江干欲隨出闗匏繫于茲夢寐故山寄聲促歸相從暮年我未得去公已登仙疾不及問喪不得慟尚期執紼少展悲痛抗章乞身六請未俞聞公窀穸哀不足而媿有餘亟遣長孫往致芻奠東望佳城老淚如濺祭趙侍郎粹中嗚呼惟公族糸盛于山東貂蟬風烈衣冠所宗建炎南渡名勝昂顒源深流逺古今貫通父子兄弟師友磨礱惟公問學俊氣如虹詞場策勲雁行雝雝一登朝班雅望已崇上嗟見晚眷意日隆年除嵗遷龍飛雲從容臺道山螭坳儲宫瑣闈批敕仇然獻忠天官銓綜姦弊一空論議從厚古人追蹤遇事敢言執節始終煌煌藝祖配天其功東向之議公論所同引經据古昭若發蒙言雖未用後當折衷出守池陽吏凜民雍自兹倦游冥冥飛鴻僧坊蕭瑟暮鼓晨鐘人不堪處公方沖融巻不去手圖書横縱顔筋栁骨翰墨尤工一觴一咏其樂無窮四明尚齒猶存古風雖有鄉老亦賴寓公公居其間俯首鞠躬人化其徳事之滋恭慶霈既頒盡還故封宜對宣室自茲登庸胡為小疾樂石弗攻一朝傾摧如千丈松某等辱居里閭許入社中登臨歗歌樽酒從容回首不堪頓失兩翁遺像儼然素髮方瞳有酒既旨有殽斯豐公乎來乎淚如奔洪祭莫侍郎叔光嗚呼國之用賢夫豈易然成徳如公而夀不延禀資中和宅心靜淵決科者三其勇無前朝行恂恂似不能言義有不可論正而堅璧水道山柱史掖垣揚厯清華斤斤十年直如朱絲思若湧泉簡知益深擢居右銓進也未央何疾之綿方將引歸朝露忽先一子秀發衣鉢有傳公固無憾人誰舍旃矧如我輩俱忝官聮不見㡬何遽驚蛻蟬相率來奠尚陳豆籩公能來乎有淚如川祭陳閣學居仁惟公少馳雋聲晚以文鳴徳望寖隆俊偉光明海内孰不知仰而知公之深者非至親不得其真情葢公之性資渾然天成如渾金與璞玉器用莫得而名故人知其坦蕩蕩而不知其日用之矩矱人知其無不可而不知其胸中之渭涇其治郡也但見惠利之及物而孰知鋤姦之若談笑其立朝也但見文章之經國而孰知獻納之出于忠誠以是舉世稱其長者士夫以為儀刑周旋五州有衰之愛盾之畏出入四朝有惠之和夷之清嗚呼人不為不知而知之不盡才不為不用而用之未盈可以穆天縡而謀王體可以運樞極而秉鈞衡於皇孝宗知公至矣謂使是人而坐廟堂自然安靖而和平大哉王言大用之意已形天胡嗇之殊遷之命交臂而失十年外庸身益逺于昕廷皇上趣歸既及帝京衆心顒顒謂今必用矣而一疾困之身欲進而不能君門咫尺而成萬里舟欲至而風引去于蓬瀛奉祠而歸人已觖望猶庶㡬復起而為蒼生豈知到家纔越信宿而千丈之松已傾矣親黨為之慟哭逺邇于焉嘆驚天蒼蒼而難問遂將埋玉璧于泉扄耶鑰生長外家小公九齡挹叢桂之芳潤攀紫薇之餘英相與事諸舅如諸父而中外親密如一門之弟兄卒不欵于情話徒追痛于幽冥朗朗百間可以安享于上夀乃不得一日之寧登虚堂而進拜悵遺像于丹青銜悲送公鬱鬱佳城舉一觴而致奠不知涕淚之交横也祭史敷文彌正八行之孫三公之子術業傅家公實是似小試詞場再拔其萃才名已昭所欠一第入丞大農蘭省攝事持節擁麾所至可紀太師年高貳卿即世相公煌煌惟公是倚拂衣賦歸一則以喜周旋數年先意承志一旦執喪不堪哀毁窀穸之奉杖而後起遂抱沈疴忽若蟬蛻使假嵗年顧何止此嗚呼長才葢棺已矣某等託契素深游從晩嵗持憲者五遽隔生死存誠觴豆兹乃來祭感今念昔相向出涕祭王侍御伯庠嗚呼公之學術能世其家公之操履終始無瑕出遇聖明風雲千載正色立朝藜藿不採退居里門善刀而藏天子念之起殿大邦䕫子萬里蕭然一舸尚無圖書安問蜀貨一來東嘉益見真清愛民戢姦郡政向成公病已侵公志益壯孜孜于民以至屬纊閭里相弔老稺涕洟正人云亡善類疇依精爽如生尚歆薄奠奉公之喪不敢不勉又同官惟公少年有場屋聲晩登霜臺四方威名出入蜀門清節著稱凡我士夫想望典刑一聞公來奔走出迎待人之謙與人之誠相顧歎仰如見古人孰不自勉以事父兄郡政一行風采已新庭訟無留日益精明恂恂拊摩薰然慈仁時濟以猛宿姦震驚博洽諒直如劉更生剛正亷介如宋廣平此真吏師所願奉承盛徳如公宜百其齡天胡不仁奪我老成飲泣巷哭嗟嘆相聞矧在僚吏若何為情巵酒未酹悲涕先傾又路祭嗚呼公之來兮雙旌紛馬輿兮往迎公之去兮丹旐慘千里兮相弔曾日月兮㡬何樂何少兮哀多欲攀轅兮執紼變歡謠兮悲歌嗟若人兮宜久蹇何為兮中夀巷哭兮失聲紛雨淚兮如溜設祖祭兮道周奠單杯兮泣柩瞻望兮弗及此恨兮何究甘棠兮峴碑尚千載兮不朽祭薛寺正季宣嗚呼天之不佑斯文耶如公之道學而施不昌天之未欲平治耶如公之宏才而用不彰議論之醇操履之剛根六經而貫百氏闡微言而蹈大方破千載利欲之謬妄掃諸儒章句之披猖葢書無不通事無不練一話一言皆絶人意表横騖别驅窮極幼眇而究其旨歸貫之以一初無相去之尋常施之政事著之文章真所謂不見其短又惡知其所長者也斯人也而不及中夀福善禍滛之道奈何乎蒼蒼嗚呼公之聲名海内所尊然形之于外者不茍徇乎衰俗之見藴之于中者人亦莫究其所存故不知者以為徒剛而已爾而知之者亦惟稱其直諒而多聞知公之深不過㡬人言之則大而似夸矣尚何言哉相向而哭失聲者葢嘗登公之門者也巵酒之奠相與悼善類之不幸一哀而出涕又何止為薛使君而已耶又辭靈鑰登門最晚受知獨深人之云亡百身何贖解組東去莫預執紼英爽如生諒歆菲誠知己之報嗟無及矣尚行所知毋羞九原淚盡辭窮嗚呼哀哉祭鄭龍圖伯熊嗚呼和氣生物本無偏頗惟公之生得之者多徳量淵澄而不見其涯涘性質玉粹而不勞于琢磨其形于文也渾然天成而上軋于周漢其進于道也怡然理順而深探于雄軻與之游如在春風之中登其門如入泰山之阿是非至明而涵容不顯其迹進退至切而雍容不見其他至于莅官則有不惡而嚴之風憂世則有哀而不傷之意發而中節兹又皆其所以為至和者也外庸既積物望罙重是當羽儀天朝登進法從獻納論思而格君心輔贊彌縫而藏諸用何皇天之不憖忽兩楹之奠夢仰絶識之超詣豈死生之能動惟慈母之垂白反銜哀而擗踊雖行道而心折矧為公之伯仲者耶某等登門最久渉學昏瞢時摳衣而請益或執經而折衷聞公之亡相與嗟痛喪不得束芻而酹葬不得執紼以送馳菲奠以寓哀徒向風而一慟祭吕太史祖謙嗚呼才難之歎豈謂凡才治不如古亦云久哉思得一人庶㡬于此才非不多未知孰是必也學窮本源行有根柢古今貫穿而守之以約規模宏大而不遺其細議論正平而得事機之要人物兼取而無愛憎之累表裏如一俯仰無愧若人者夫然後退可以為後學之師表進可以居朝廷之大位覬斯民之小康抑吾道之不墜惟公其人歟胡為抱道而不得試也嗚呼天之生公其亦甚難而不易賦之徳而嗇其夀誘其衷而不使伸其志葢天子欲用而公已病病不可以有為矣卧家優游尚足以矜式于一世何疾困之宿昔而逝嗟此數年凋喪善類天乎天乎又奪吾大賢是眞可為痛哭流涕者矣某等登公之門嘗聞餘論之一二顧平時師仰之不暇尚何敢知公之所至詩不云乎人之云亡邦國殄瘁抑公其人也相與設奠而哭以斯文是豈曰吾徒之私意也耶祭吕寺丞凝之嗚呼澤甫百夫之特學博而通文麗以則雅量鎮浮長才辦劇妙齡世科幕府婉畫乗邊二年日著聲績分符閬風再登上國入奏帝前漏下數刻論事衮衮濟以亮直庸節之學茫昧莫測君得其傳若數白黑往古來今可驗可索上意響合動容歎息曰卿毋行其在予側俾丞外府始有朝蹟雁序横飛家聲赫奕行且用矣何喪之亟向也聞君才氣無敵迨入脩門已見病色惟我同僚得友三益毎懐私憂勉親藥石戊辰之朝末疾俄得徑走君家已云易簀嗚呼天與以才而夀之嗇秘此絶學不使究極樽酒論文談笑翰墨俯仰之間已為陳迹岷峨西來萬里泛宅今將安歸行道嗟惜難兄乞州經紀甚力庶㡬孤嫠同此休戚鑰定交雖晚義深匍匐遇哀一動涕淚如激祭從舅汪刪定大辯嗚呼惟舅甥之間兮固曰至親粤我之于諸舅兮有異于他人葢生長外家兮非一朝一夕之積公亦依于伯父兮自齠齔而為羣飛黄著鞭兮媿駑馬之弗進一日千里兮悵奔逸之絶塵無詩不酬兮無樽酒之弗與琢磨至切兮亦游焉息焉而是均迨公之鼓篋上庠兮我亦繼薦于鄉老喜南宫之接武兮相與賜第于楓宸情好益篤兮㡬類于同氣年不相遠兮亦忘其分之卑尊仕于百僚之底兮氣出萬夫之上小試以事兮無不闗于細氈之聞逢此百罹兮凡三仕而三已鼻間栩栩兮眇軒冕于浮雲不負臨賀兮反貽怒于柄臣引經諏律兮又以激僚友之紛紜卷懐于家兮志則在于當世沈酣經籍兮益以探聖賢之深醇進于朝兮可以使藜藿之不採居于外兮可以使功利之及民投以所問兮惟明時之所用此公之所自許兮人亦以期于君忽竒禍之作兮真出于意表曾一指之傷兮害右肱之屈伸驚一世之英兮奄葢棺而事已紛孤嫠之叫號兮何蒼蒼之不仁嗚呼鑒裁至高兮不以我為不足語詞章之雄兮若謂我其可以與于斯文顧憂患之沈迷兮荷撫憐之日至登公之堂兮君今其安存望丹青之圖像兮何精神之逼真念一息之千古兮不知淚涕之沾襟翩飛旐之南征兮今其已矣言不成章兮尚何問于穹旻又同鄉人嗚呼景孟天賦竒倔少小孤立氣已英發一登上庠徑挹簪笏讀書俊甚如千里之駒遇事敏强若遼天之鶻知已在朝聲動魏闕當夷途之欲驤驚霜蹄之屢蹶浮湛里閭中不自屈方且横騖藝苑深探理窟冀此生之有用恥修名之泯沒雖矯矯亢亢高視一世而和之者寡然揆之公言顧豈非明時之人物也耶況復顙廣頤張生有竒骨音吐洪暢辭條豐蔚充其所養􅅽壤劘刜何竒疾之遽嬰禍乃生于所忽迨親友之及知則已葢棺而竟歿矣嗚呼今而後里有疑謀孰為之析理于茫昧事有難辦孰為之應變于倉猝此士友之所痛而以福善禍淫欲歸之于恍惚者也家四壁立夫將安施孤嫠一慟行道傷割某等義篤金蘭契連瓜葛悲埋璧于黄壤攬寒涕而執紼嗚呼景孟精爽何之尚能聞此言于髣髴矣乎祭姜總管惟公生長京華起自戚閈積習富貴遭時多難乃能奮身自喜吏幹天資精敏儒雅飾縁治絲之紛解繩之亂投以劇繁談笑立辦結交老蒼衆口爭薦中外筦𣙜所至增衍郡國韜鈐足當一面五十餘年宦游不倦晚而退休雍容閒宴為生有涯雅意作善結廬百間藏書萬卷蘭玉秀發簪笏輝炫外臺薦書上閤賓贊寓公寄客如公者鮮夀㡬八帙鄉閭歆羨胡為沈疴奄如露電嗚呼中原戰氛陸沈赤縣開元舊事于今㡬見承平王孫少日更練靈光一荒有識相喭某等里社從遊交情戀戀嵗月侵尋驚此物變曰樽曰醑曰爼曰饌矢哀以文有淚如濺祭劉宜人王台州母猗歟夫人婉嫕靜專生自名族嬪于太原夫人之夫學行推賢樂善好施餘慶綿綿夫人之子壯嵗騰騫高牙大纛名郡蕃宣相夫一心教子三遷綵衣斑斕孫曾滿前慈祥愷悌舉無間言五福兼備富貴俱全丹丘赤城版輿輕軒壺彛婦則誰其比肩自奉愈約執謙愈堅待人愈厚奉佛愈䖍一語不妄一言不偏坦夷真醇得全其天少疾考終忽如蛻蟬夀開九帙尚何憾焉某等託在鄉曲又忝姻連升堂進拜于兹有年慈容如生望之退然設奠矢哀涕泗潺湲祭史宜人太傳女兄惟靈八行之孫拾遺之婦孟母之賢共姜之守古稱五福其一曰夀夫人尤盛年帙開九惟我魏公視姊如母唐楊慎矜兄弟友愛事姊如母躬率四弟備極孝友俱登高年世所未有六老成圖夫人稱首慶事方隆疾已在腠進粥燎鬚醫禬趨走夜半訃聞悲哽心疚㳟惟此風俗可歸厚女壻乘龍芝蘭俱秀終始哀榮何憾何咎某等出入相門于茲嵗久薄奠薦羞淚落巵酒祭族兄心上人惟我鼻祖四子俱賢仲生先生衣冠蟬聨曰伯叔季仍居奉川既富且庶後乃日朘人物彫零賴有達源天乎不淑朝露溘先壽雖已穹惜不少延達源之生俊氣騰騫使其起家必收青氈少從釋氏白業精専結交老顔直與比肩曰律曰教又參枯禪説祖正令室中機縁通貫一理如珠在穿旁及百家覃思鑽研纂言記事細大不捐出其緒餘翰墨詩篇流傳江湖聲價愈喧世晚寖薄空門亦然耕而鹵莽乃芸人田耳剽塗説妄夸真詮行有説空誑欺人天惟師髙蹈得味中邉或勸出世如墜諸淵先君愛重挽之使前陳義甚髙萬牛莫旋我倅丹邱來游萬年欲與同車往尋祇園曰無累我徒驚林猿踏遍勝境徑歸海壖孤雲悠悠獨鶴翩翩念之意消望之若仙詩晩益工節窮益堅一鉢一衲遂以終焉我媿晩出最辱愛憐家有書種俾其力傳名節器業俾其勉旃我恐不稱服膺拳拳師棄塵世其猶蜕蟬有骨已灰無銘可鐫敬書梗槩以贊遺編茗盌三酹淚下迸泉祭謝雲臺傑嗚呼謝公人物之英爰自上蔡斯以道鳴繼以大參又有列卿文獻奕世不殞其名惟公巋然見謂老成文如綺錯辯欲河傾誘掖後進糾合宗盟髙懐骯髒不以事嬰漫仕委順浮湛半生一邱一壑自喜獨清永嘉名邦來為郡丞闗決之餘名流合并風流醖藉至今有稱然諾不侵自主門庭有如不肖一見心傾忘年許交語必盡誠去秋末宦寄徑赤城衝熱遠臨握手通情黄山密邇詩筒屢賡自言多病懶入帝京慨然奉祠欲為此行冀幕府之裨助望前輩之典刑喜而不寐日聴先聲茍孤縱之未汰當倒屣以逢迎訃音忽聞心折魂驚痛斯人之云亡傷耆老之彫零覽翰墨以猶濕乃遽隔于幽冥亟馳菲奠以寫中扃望東山以興哀尚髣髴其來聴祭周通判去非嗚呼直夫而謂止于斯乎始雖同登各天一隅余分郡符君方憂居間至偃室退公之餘講易談元為之躊躇劇論世故發蒙砭愚再仕嶠南備歴﨑嶇代答一書曲盡錙銖倘不忘逺當有取諸前宰劇邑赫然有譽遇事不茍動有規橅憂患熏心篤志弗渝渇然自憂求方于余謂當良已乃終弗除抱負不凡有銜不袪曽是半刺僅得緋魚近傳短牘周姓言孤啓緘恍然乃君遺書死生大矣何其舒徐揮翰寄别其言穆如數五十五尚明堪輿明月清風猶能自悟通乎晝夜晏然不殊嗚呼直夫而又何憾乎下交私情驚愴欷歔對客三誦淚與之俱淨光東麓遥望故廬矢哀以詞奠之生芻祭陸提刑洸陸氏家聲源流雲間左丞儒宗振于陶山大漕徙鄞及見盛際雙椿偕老八龍列侍公尤秀出三薦漕臺漫登膴仕益展長才荆門擁麾課最上徹孝宗一見畀以華節斂散得宜流殍再生就陞憲車刑期無刑大獄株連平反甚勇煩言俄興公不為動得請祠庭賦歸翩然士師辨明卒如公言宏逺之業巻藏退處卜居斯成生計楚楚里社相從期公長年小病困之卒隨逝川窀穸有時來致菲奠矢哀以詞有淚如濺祭趙安國鎮惟君孝于奉親友于羣弟自信淳直澹乎世味心計有餘能振其家乃築新堂不陋不華優游卒歳足以自適忽焉已矣天乎莫測青山滿門寒梅滿坡公則云亡傷如之何喪此善人鄉里嗟惜舉觴一酹涕淚霑臆祭張梅州祖順嗚呼刺史為千里之尊人生以五馬為貴茍仕宦之平進率以次而馴致今之士夫孰不為之何于君而獨不以畀公之才足以辦劇其嚴足以戢吏折獄則敏于片言理財則優于心計謹于奉法鋭于立事此真良二千石之選也而屢得屢失得又不久終不得以行其志自宰龍游政聲甚美擢守武當時方壮嵗既而數竒三仕三已徃倅番禺薦牘交至就秉一麾謂自此升矣而遽以不起予之早而奪之屢引之深而寘之于烟瘴之地是果有司之者耶豈造物小兒之見戲也嗚呼踰嶺來歸川陸迢遞一家纍然行道隕涕矧鄉黨之素交而同社之深契公之将行開樽盡醉曽嵗月之幾何而舉觴以為酹靈其來乎庶知此悲痛之意嗚呼哀哉祭趙運使善公生于荆南長于五嶺與七閩居乎樂成卒于杭而葬于鄞余與公傾葢稽山尋忝姻家中雖屢見而莫從容于永嘉望公自此嚮用矣而送公之喪于啓霞嗚呼是豈偶然也哉惟公才具有稱既敏而明受知孝皇擢寘列卿謂宜持槖仍尹神京流離數年起擁雙旌飛芻江右轉餉帝城文母上賔因山為陵公方力疾辦護訖成跬步要津徑登西清疾勢寖革大命以傾天子震悼親黨嘆驚夫孰知公此理素精悟死生幾如旦晝知吾身之不可以久生也謝醫郤藥湛然中扃爵禄在前不復入于心恩愛至重不以闗吾情泊然長往無物可嬰然則公之自處者如此吾黨亦何為而哭失聲耶鑰投分素深齊年為兄爰設薄奠以寫此誠蓋一死一生而交情乃見余亦不知夫涕淚之縱横也祭舒簽判琬通判璘猗歟舒氏何其多賢昆仲飛英俱自少年西美元英既已玉折于往嵗所賴以主門户者惟傳正傳道元質之鼎立而乃相隨于九原耶惟吾傳正負氣敢言晩對大廷直聲凛然止或尼之不至帝前尉于武昌恩威並宣日剖滯訟自以不冤五溪峒蠻動興戈鋋匹馬深入且諭且鐫投戈解仇羅拜馬前遠邇驚嘆咏歌四傳通籍金閨将宦閩川一疾困之遂至沈綿祠禄甫頒朝露遽先惟吾元質良知自天蚤登上庠受知南軒一日千里師友淵源學道愛人中心拳拳新安客授範模陶甄横陽撫字吏畏民安私淑諸人春誦夏絃本思無邪貫三百篇處以治中傷哉士元嗚呼二公之亡也固無所憾于其身我之弔也傷吾今不復見此二人兄之于事如燭照而數計季之于人如熙然之陽春主盟義風聲至響臻事無劇易人無故新鄉有曲直不于公堂而惟兄之愬人有叩請不之他人而惟季之親今而忽焉連璧沈淪嗚呼天之于舒氏何多予以才而不使究于用不予以利禄而强其名豈名者造物之所甚貴有非利禄之所能均耶我有疑慮從誰咨詢里有後生繄誰是遵悲夫傷哉靈輀有行雙旐相因薄奠寫哀豈吾儕之私情上為清時惜此人物而下為吾鄉痛二公之不得伸也祭從兄少微縣丞惟我大父二十餘孫列為五家同出一門嵗久凋零僅有十人兄為之長又殞其身兄號秀頴早登成均謂收世科致身青雲留落久之始預搢紳數年之間為尉為丞介然自守不緇不磷歸而後病卜築湖濵奉祠香火女嫁男婚庶可佚老而疾已成抱疴視䕃傷哉沈淪諸父盛時游宦頻仍禮智二院久矣比鄰兩家子弟情誼尤親讀書從師調琴相應方期晩嵗杖屨逢迎幽明遽隔孤嫠惸惸葬從其先遠日數旬酌奠送行涕淚霑巾祭李府君奉化鄉人東郭之外湖水清澈脩梁駕空霜筠茂樾居者何人如湖之清有隱君子隴西先生先生之家為儒絫世上舍之孫香彎之弟仰屋著書其書滿家不偶于世鄉閭之華鸞鶴精神方瞳華髮望之儼然叩之斯發三絶韋編究極微言身則已矣此書當傳謂君百年後進承楷一疾困之無不傷駭原始反終旦暮死生書種有繼何戀何營惟今來者非親則舊典刑之亡使我心疚窀穸有期來奠一巵哭者失聲先生何之祭表兄馮耤田端方外門汪氏諸表森然惟我與兄始終周旋姻好絫世生又齊年嬉則同隊學則差肩惟兄敏悟得之于天加以篤學經史貫穿長而屬文思若湧泉俱從鄭師尤工賦篇鴻慶孫公一代儒先見兄駢儷歎驚屬聨得兄百韻報以長箋二文照映至今流傳盍登青雲操筆如椽命胡數竒場屋迍邅年及半百始沾賞延所至文鳴筆力翩翩詞人所長多工一偏兄備衆體詞妥意全間見層出左右逢原持之以謙似不能言晩尤清修一室罄懸久依相門賔主俱賢貴名日起益壮益堅擢居掌故進司耤田享途伊始一疾弗痊薦紳嗟惜親黨涕漣兄我所畏猥先著鞭吾徒掌制媿在盧前極口贊揚未嘗舍旃喜兄欲達而乃忽焉繐帷咫尺欲酹無緣亟遣兒曹往陳豆籩矢哀以詞歴歴究宣言不盡意老淚如川攻媿集卷八十三欽定四庫全書攻媿集卷八十四宋樓鑰撰祭文祭叔父彬州代工部嗚呼我父是生五子惟我與弟年差無幾幼則同隊長則共被矯矯三兄雍熙同軌歲星一周淪謝相繼雁序彫零門户亦替相與為命二人而已平生宦遊動則干里晚食祠祿俱還桑梓築室比隣為終焉計弟室先成如跂如矢我家未就猶費經理寓止外舎相去密邇有景共賞有酒同醉杖屢相過中有真味所期百年同此燕喜弟抱㣲疴時作時止我官于朝祖餞如禮執手郊原勉進藥餌時得安書亹亹盈紙猶子來調得官辟水弟雖卧病頗亦自慰歸侍十日遽已疲瘁醫禱百端竟以不起嗚呼哀哉才術之施十不一二兩宰劇縣一佐邊壘精明絶人所至可紀莅官行法治家處已内外斬斬無小不治謂宜進用以繼先世天乎不淑遽已亡矣吾之干祿聊復爾耳為飢所驅未免漫仕又謂小别不甚為意安知數旬便隔生死心摧肝裂哀淚如洗使吾之心知其至是雖有萬鐘詎肯舍爾他時賦歸浮湛閭里隻影翩然寧忍念此今也死不得撫其棺葬不得臨其隧向風長號不知有生之為美㫖酒嘉殽遣子以祭情傷不文姑寓哀㫖嗚呼九京其有知乎猶以少見吾手足之義祭安康郡俞夫人蔣㕘議母代工部起于名門作配君子壼助之賢輝于彤史惟子惟孫斑衣盈庭子列朝行孫秀而文嵗時上壽簮笏相映家慶成圖一時之盛年登八十胡不百年日月云吉將祔九原某等相與有連事契不薄哀而送之奠此清酌祭伯母馮恭人同兄弟巨族之胄華宗是歸婚好益締室家具宜事夫如賓捧案齊眉撫族以和恩愛無虧秩秩子舍兟兟孫枝撫循鞠育夫人是依季父游宦十年秉麾夫人從行魚軒生輝方期來歸慰此離思親戚團圞情話嬉嬉何意中途一疢寖危繼以訃聞舉宗傷悲靈轝西旋郊迎奔馳不覿温顔徒瞻靈旗涕洒百行何悲如斯矧此仲春窀穸有期嘉殽在俎㫖酒在巵情寓于文靈其聴之祭王樞密剛中舅代仲猗歟王公生宋八葉身厯四朝險夷一節貫穿百家藝苑耕獵其在江湖名已超躐出陳治安為天下甲道山峩巍金門岌嶪鳯掖優處螭蚴獨攝大哉王言與典謨接坤維謀帥公論誰協帝曰汝諧徃即功業蜀道之難捫參仰脅尊為忠臣叱馭不懾朝無顧憂威動邊堞奉祠以歸高臥鄉邑東山雅志鷗盟不歃邊塵忽驚騎􅅽四匝羽檄星馳軍書夜急尺一趣還承明再入首定國是終始堅執忠肝義膽越見眉睫臣主相遇神㑹氣合樽爼折衝敵人震讋智略縱横闗機開闔王師増氣一月三㨗侵疆復歸信使響答遂登西府以贊調燮人皆謂公行矣爰立大厦梁棟巨川舟楫輔成太平光明煒熠天何不憗變生呼吸人之云亡孰不嗚唈天子震悼為輟朝集見之恨晩用之無及存殁哀榮贈賻雜沓鑰列官于朝莫拜馬鬛靈輿啓途丹旐帖帖哀以送之千載一訣祭鄭衡州若容舅代仲嗚呼衡州才大屈宋筆擅雕龍調高吐鳯妙年馳聲出冠鄉貢吾州多賢不利首送惟公開荒徑挹晁董吏事精明萬口歸重亨途方闢八駿飛鞚䜛口含沙巧發竒中退墜諸淵公不為動天定勝人復為時用惟公之文盍儀禁從清廟作歌追配雅驥足方馳三刀形夢悠然漫仕無所修綜閉閤卻掃胸次空洞至寶横棄稱屈彌衆公乎云亡鄉曲嗟痛來祖公喪為之一慟祭趙路鈐不枯鄉代仲舅同人惟公派出天潢生長昭代政宣隆平出入廣内艱危奮忠脱身騎􅅽卒歸行闕官以寖大來歸四明踰四十載待人謙恭處身静退蓮社從游今為前輩樽酒相過雍容貴介揚清歌以歡洽談中都而感慨葢今日宗室之遺老猶使人識承平王孫之故態也年踰七十風度不改郊廟侍祠峩峩冠佩屬近行尊富貴未艾一疾困之遽至危殆嗚呼安閒一堂真率高㑹忽焉陳迹樂不可再相與設奠以致哀尚英靈之如在也祭徐少卿子寅鄉代仲舅同人惟公骨相竒龎徳量汪汪和而知介圓而能方早繼家聲明習憲章旋自幕府徑登朝行乃分左符乃奏明光留屯之策結知壽皇委寄日隆寵賚相望富貴逼人進用未央賦歸十年林壑徜徉漢東天台尤稱循良持節踰嶠澄按南邦云胡不淑季子夭傷情鍾弗堪公亦云亡歸途千里兩旐飛揚行道霣涕而況州鄉某等從游日望歸艎兹登公門繐帷在堂遺像如生奠此一觴相向失聲尚其來享祭趙恭人王滁州之室人代仲舅同鄉嗚呼彤史不書女教不修閨門之間動多悔尤賢哉夫人獨異輩流天予淑質婉嫕和柔不虐不妬不忮不求事姑以孝與物以周舉無間言豐裕優游宜備五福益高春秋胡為累年心熏百憂使君既亡二子不留馴致末疾遂不可瘳某等辱在親黨具聆芳猷設奠一哀非為膳羞尚爾後人壼彞是收祭袁通判章同代仲舅鄉嗚呼惟袁氏四世五公盛于東都五世登科望于鄉閭惟吾叔平尤為耆儒少鳴膠庠文高行孤中年漫仕日著令譽晩益倦游有宅一區安貧樂道隨時巻舒古所謂篤信好學守死善道居處恭執事敬與人忠者惟公兼之而有餘壽登八帙皤鬢霜鬚出則舎車而徒字則蠅頭細書外和内剛不可得而親疎勞謙終吉矢死弗渝進不聞呂父之卜獵退不見申公之安車禄不及子二孫蚤孤養不至于列鼎仕不過于題輿人或不堪其憂而公處之則晏如也沈疴來侵水已浮膚天不憖遺奄歸泉途識與不識聞者歎吁惟余齊年往來舒徐凡我同社視公步趨有几有杖有琴有壺載平時問字之酒奠今日一束之芻欲寫余悲言與淚俱嗚呼尚復有全徳篤行博物洽聞之君子如吾叔平者乎祭魏丞相代王知道嗚呼惟公盛徳不可涯涘雖欲屢數莫究一二竊窺緒餘葢本實地故其設施不誣不偽少而篤學寢食不置壮而從政動施實恵其奉太夫人也既備于色養又及手足之愛以承其意其事明天子也既盡于輔贊又罄啓沃之忠以順于外敵再犯境淮甸鼎沸見大夫無可使者召從幕府張旜出使所謂飛矢在上行人在下而公神色不動講解而歸和議至今南北之人受公之賜者又不知其幾也晚居碧溪不渝東山之志潭潭之居固已因其舊而山林日涉隨其高下葢天作地藏以為公宴居之計益覽載籍出入釋老觸物而咏遇客則醉其雍容蕭散野老爭席風流醖藉有晉宋之風度則又其餘事也人皆望公再登端揆使其小卻猶當出侯藩方使萬物為之吐氣不然處之林下尚可以典刑于善類天不憖遺奄棄塵世詩不云乎人之云亡邦國殄瘁其公之謂乎某等先祖諸父俱託夙契來官異縣獲拜簪履憐其孤㷀視猶子弟引而進之極力于嘘枯吹生之際頭顱如許莫報洪施再拜公前俯伏流涕嗚呼公乎尚歆此蘋蘩之意祭王令人代陳閣學惟陳氏世家閩中我先少卿兄弟始徙鄞川叔父之外他無期功之親族猶未大也迺嵗在丙戌余得庶子是時年方壮而處貧不得已鞠于趙氏迨今十有九年夫人無恙時屢以為言謂趙氏有子可以歸矣庚子之秋既哭子曅因念夫婦俱涉半百而子姓凋疎兹有意請于趙氏因仍至今夫人忽以疾亡而言猶在耳此子已不得逮事于生前豈應更緩于今日二子鞏芾扶靈轝以東卒哭在邇且將卜塟以十二月戊午之吉命子歸伏喪次使執喪如禮以成夫人之美意以廣陳氏之嗣續又以全諸子手足之愛且俾無忘趙氏撫育之恩夫人有知尚臨此言嗚呼尚忍言之祭劉宜人代陳閣學嗚呼夫人之徳柔恵淳直夫人之福康寧戩榖相夫而夫聞于鄉教子而子顯于朝年益尊而無一事之遺家愈肥而無一毫之驕自奉至約以施則饒言無枝葉聞者意消母儀婦則真可以表儀于閨閫葢八十四年處之如一朝晚嵗尤盛賢侯宴喜安輿徐行去鄉密邇干騎奉迎金章拱侍含飴弄孫斑衣濟濟乃開慶筵大集珠履歡謠雜然洋溢千里云何不淑禍福伏倚内外䀌傷幾為罷市夫人之身固無憾矣他人為壻猶曰半子我壻王氏維子是似撫愛之辱今踰三紀室人云亡神傷未巳夫人訃聞痛哭流涕效官詞掖欲歸無計喪不得摩其棺而一慟塟不得臨其穴而盡禮敬状行事不敢溢美雖已大書特書而淑徳懿行終有不能盡言之媿也二甥東歸致奠甚菲東望長號靈其歆止祭王參政之望部代曾吏惟公負卓犖不羣之才養剛大不屈之氣富閎深自得之學奮經綸四海之志出其緒餘十不一二葢文章直欲追兩都之風而政事已足絶俗而驚世矣正色立朝官曰諫議明白賢佞公非公是振舉綱紀使君子有所恃而小人有所畏督師淮堧長城千里雅歌投壺坐卻敵騎進參政機人謂且相而翩然去之高蹈赤城視富貴如脱屣東坡先生稱張文定公曰上不求合于人主故雖貴而不用用而不盡下不求合于士大夫故悦公者寡不悦者衆然至言天下偉人則以公為首者豈公之謂耶某登公之門俯仰二紀假守海邦猥繼英軌欲一拜公于床下而公已屬疾欲見不遂巍巍巨公何恙不已人之所以期公者未艾也而泰山其頺千丈松崩聞者為之流涕嗚呼吏民方相與泣于甘棠之下亟遣薄奠以寓千里去思之意尚當力追公于步趨之餘庶乎不為九京之媿也祭劉衢州朔吏代曾部嗚呼天之生賢其嗇已甚鍾山川之靈委造化之和不為不靳予之以賢授之以才而獨短其命伯牛之疾顔淵之夭豈獨其身之不幸人物器業有如公者儵焉奪之蒼蒼者又何其太忍耶嗚呼我公受天異稟當今人才在第一品處之孔門未必不升堂而在寢居之廟堂上可使藜藿之不採下可使斯民之奠枕南宫一鳴萬口皆噤風節日新利害益深激貪立懦議論鯁挺不事孫劉身不得一日安于朝廷之上小試兩州皆足以追龔黄之遺軫三仕三已重以疾病正路坦坦孤蹤凜凜四方屬心謂公之未達者天將降以大任孰知夫堂堂王佐之才百不一騁而遂至于隕乎嗚呼公之純孝温靖定省鶴髪在堂公必不瞑公之友愛不見畦町十年相望俱負重名于時忽相從于九原此尤薦紳韋布之所悲哽也某慕公風髙歲月良逺假守東嘉方視公以為繩準惟兹邦人崇仰最謹君子服道德之教小人懷撫字之政訃音一聞哀感萬井詩不云乎人之云亡邦國殄瘁要當為天下惜爾何止為海隅之一郡耶祭王詹事十朋部代曾吏惟公行出乎誠學根乎經髙見逺識特立獨行射策論事仲舒賈生面折廷諍汲黯王陵功成羽翼政如神明人或一得公集其成公論之興公為主盟事失其平公為權衡一有抑揚人為辱榮一有去就國以重輕人亡一鑑夢奠兩楹明主震悼善類失聲天亦惜之為之隕星某昔拜公屣履以迎公去不回誰其典刑往哭不可郡紱是縈設祭道周酹公之靈精爽凜然尚其顧歆又代莫守嗚呼某之于公殆有夙契稽山定交歲踰一紀晩寮青宫益敬益畏道義相勉草木臭味哭公之喪義如同氣兹焉假守實公梓里九京不作何所則視公雖云亡道在百世嘗錄遺事上太史氏盛德大節略具是矣嗚呼我公詩不云乎髙山仰止景行行止奉以周旋未敢失墜視焉如生庶幾無愧欲酹宿草相望一水馳奠告哀澘然出涕祭薛士正代曾吏部惟公學博而知約行髙而不孤政嚴而無苛論正而不迂求之海内未見其比意者天生斯人其必將回狂瀾于千載之絶學建功名于萬里之亨途纔小試而奪之蒼蒼者又何其忍乎公之守吳余在故廬我來剖符公歸里居固嘗服髙風于踐履之舊聴宏論于謦欬之餘方將日親直諒多聞之益盡讀篋中未見之書曾不見于幾日驚死生之頓殊寓哀情于短章灑衰淚于生芻嗚呼吾老矣不知餘生尚復見人物如公者乎祭鄭司法頡官同嗚呼德升止于斯乎早名薦書而不得上太常之一第晚歴曹掾而不能脫七階之選途欲試無所有銜不袪旁觀者為之歎息而君處之則裕如也方其釃酒劇談裁燭賦詩精神爽拔不見衰相謂當收功名于桑榆孰謂夫江風匽薄得疾膚腠一入膏肓而不可除方瞳瞭然强忽笑語凜如對面而葢棺事定青衫已上于畫圖矣嗚呼倡酬之詩易而為哀挽之歌清飲之樽今而酹祖奠之芻德升尚能飲而聴之否淚盡詞殫空相與望君于路隅君則已矣有子是似古人所謂非在其身在其子孫者其在斯人歟祭陳司户僖惟君之家世篤儒學君之皇考尤號淵博噤不得施晚而君生謂興吾宗教之以經齠齔秀發書無不讀中童子科老生嗟服遊學十年暮鹽朝虀乃登上第乃瞻龍飛得官户曹千里跬步云何不淑至此大故君之于家孝友天成收䘏孤露糾合宗盟君之于文亹亹不倦自公之餘手不釋卷君之于義勇于敢為親舊有急匍匐救之積是三者宜其逺到壯年長才廢于中道峩峩閩山靈轝何歸歸旐翩然云何不悲惟我同寮周旋最乆菲奠薦誠疚心疾首又路祭嗚呼武仲學甚富而命甚奇也氣甚髙而位甚卑也天畀之以才而不與以時也又嗇其夀使不及四十之期也一疾困之遽成九原人皆悼其不幸而同寮之心又何其悲也詩盟文㑹書名居以為永好非君主之而誰也青衫畫圖宛宛乎君之芝眉也炎天赫曦道阻且長丹旐翩然君將安歸也官則有守欲送不可惟君家暑行之無恙猶可慰我之思也祖奠于郊外向風長號不可及已嗚呼武仲知乎不知也祭湯寧海烈惟君之資如玉之粹惟君之辭如綺之麗來宰寧川政尚平易悃愊無華彈琴而治兹方及𤓰束擔歸計奇疾困之一旦長逝囊無襲衣室有孤累吏民興哀幾于罷市矧同王事休戚所繫不圖善人忽焉隔世雖有菲奠不得自致君其歸乎望望揮涕祭陳安人詹事良翰女兄旌表門閭同守倅台之著姓朱陳是推既生自陳朱子誠歸一門孝友累世不虧夫人贊之室家具宜之死靡他面割耳剺夫人視之婦道與稽夫人之姑年登期頤孝養既勤夀祉孔齊夫人之弟名德峩巍同氣是似為家門楣月評升聞寵光陸離旌表髙門彤史有輝某兹叨假守欽歎壼彞思播清風以勵幽閨爰設菲奠來瞻繐帷節孝有閭過者式之祭劉天台孝憲倅同守名父之子徒勞州縣悃愊無華夙宵不倦平易近民民罔怨咨生無赫赫死則痛之知君清貧賻贈加厚知君無歸謀葬山阜更率同僚奠此一觴君而有知庶其來享祭周侍郎代侍從惟公惟識淵沖智略輻輳悃愊無華持心近厚趨事赴功力瘁心疚險夷屢更介然有守五溪深入四蜀奔奏給餉數年簡在斯乆擢主大計亨途方驟云何末疾遽啓足手位不稱徳年不及夀急義首功可以不朽信息從班于公何有天其或者欲昌厥後某等為僚屬耳底藴未究忽拜繐帷孰不疾首乃陳斯殽乃酹斯酒矢哀以文公乎知不攻媿集卷八十四欽定四庫全書攻媿集卷八十五宋樓鑰撰事略髙祖先生事略樓某字子文其先婺人不詳徙居之始居奉化縣世以財雄于鄉祖以選為縣錄事有陰徳及人父某尤積善以古學為鄉人所尊慶厯中州縣立學掌教縣庠者數年郡學尋又延請至十餘年遂居城中為郡人登皇祐五年進士第調舒州廬江主簿祿不及親不欲出官以繼母無以養弟妹未成立具見辭墓祝文既歸遂致仕授大理評事其孝行節操如此自後又主郡庠十餘年為州縣士子師前後凡三十餘年號樓先生四明五先生某其次也成就一時人物甚衆豐尚書稷舒中丞亶俞待制充袁知府轂等皆其門人又羅提刑適自天台來學諸公學業既成舒公試鄉里袁公試開封羅公試台州一舉三處皆魁選其亡也舒公為墓銘豐公書丹袁公篆額羅公以仕北方不得預後為浙東提刑拜墓下用闕里故事手植數木今有存者祭文見赤城先生集中郡邑學中皆立祠碑志登載甚備莫教授冠卿一書尤詳子常光孫弁异五世孫鍔鈜鑰鏞六世孫汶皆踵世科异受知祐陵仕都司大卿前後知泗秀蘇州再典鄉郡居晝錦坊宣和初盗發青谿攻陷旁郡一路惶擾异調兵守備軍聲甚振羣盗望風而退郡境獨全以功進徽猷閣直學士諸孫以門蔭入仕者又數十人有文集藏于家行狀亡妣安康郡太夫人行狀亡妣姓汪氏諱慧通字正柔明之鄞人曾祖元吉不仕祖洙明州助教累贈正奉大夫父思温左朝議大夫仕為太府少卿直顯謨閣累贈少師妣恭人王氏累贈越國夫人明今為慶元府亡妣生于大觀四年歲在庚寅五月八日少師長女也先君諱璩曾以軍器監丞兼權尚書工部郎官知處州終朝議大夫累贈銀青光祿大夫先君之祖諱常朝議大夫累贈銀青光祿大夫父諱异徽猷閣直學士朝議大夫累贈少師兩家少師實為中表金紫無恙時始命締婚年十九而歸于我紹興十六年封孺人二十三年封安人二十八年封宜人乾道三年封恭人淳熙九年十二月先君捐館十二年鑰該郊祀恩封太令人十三年髙宗慶霈封太碩人紹興五年夀聖皇太后慶夀恩封太淑人慶元五年光宗聖體清安天子行慶于下封信安郡太夫人六年明堂恩進封大寧郡嘉泰三年郊禮進封安康郡不及拜四年正月癸酉以疾薨于晝錦坊之第室享年九十有五子九人鐊右迪功郎徽州績谿縣尉錫承議郎權發遣嚴州軍州事鑰顯謨閣直學士通議大夫提舉江州太平興國宫錧登仕郎鏘奉議郎知福州永福縣事錙文林郎監淮東總領所鎮江府太平惠民局兼户部大軍倉鋁鍨迪功郎温州司理叅軍鉼女二人蚤夭孫三十一人渢澡迪功郎新泰州海陵縣尉溆滌淳從政郎紹興府上虞縣丞濛潚從政郎紹興府嵊縣丞淜淶涔濚溗洎潗涷治承務郎況濓淛㵄洔潯浯濋㶕淔濡溍渟渥溧孫女十二人此下長適次適云云百餘字間空弗連屬今㮣節去曾孫男十六人棟機杓登仕郎椷枝樾槱格枚札桔櫑櫟机柯檉曾孫女十人第二人許適戴闓之第四人許適陳篚餘在室二兄及錧鏘溆濛棟第二第六第八孫女皆先卒先君葬于奉化縣金鍾之原將以十二月丙申奉亡妣之喪合焉亡妣幼而敏悟五歳從外祖教授雄州歴歴能道河朔所見及邊上風物騎射之詳日在親側凡箋書往來皆能記其人之名字親庭或有遺忘問之如響將嫁外祖曰吾之紺珠往矣數歳已能作家書越國賢明口授詩語教以裁剪紉縫纂組之類不待習而工平正端整皆可為法外祖為王府贊讀敵犯京師事定㩦家南京以歸亡妣及笄籨具遭亂散失餘又壞于漏舟不以為懟也先君自少清介亡妣實為合徳事李氏姑及伯父伯母如公姑之禮曉練世故謙抑遜順被服寒素内外交稱之先祖有幼女亡妣愛育如妹隨事教飭箱篚直與共之為擇良配遂歸王公正己仕至太府卿與之偕老王公之父提舉時方宰長興而外祖知湖州挈往郡治相與為結縭之助罄所有以送之王氏初得賢婦致謝再三是時亡妣年纔二十有七秖此一節過人逺矣自爾同先君宦游内助亷平言不出閫或有觸怒必勸使從寛有所饋予必贊予從厚故廬既碎于兵火先君仕不加進生計日削多寓外家亡妣因得盡晨昏定省之敬二舅出仕叅理家務上下歡服既遂終養執喪盡禮自以不逮事舅姑歳時祭祀蠲潔誠至必躬必親晩雖分命子婦猶臨視之先君乳母劉氏本中原人惠愛子孫亡妣待之甚厚卒老于家又以亡姑三人無後春秋皆預饗焉節序薦新未始少廢竣事飲福必欲家人俱集齠齔不遺暮年髪不勝冠或勸裹以烏紗則曰非所以為禮也謹守家法至于終身澹于榮利素不蓄財有則緣手而盡不喜為時世妝沖靚雅正無珠璣之侈飲食有節靡務精鑿毎言避宼時僅以澗水進脫粟飯有饋以豆豉者其甘如飴今日所享不翅足矣篤于教子至質貸以供束脩諸子粗有成立或問何以為訓曰平生不曾對兒輩出一不義語故薰染至此耳一視九子無嫡庶之間方授室時視家之有無以為豐殺平心處事自無間言其遣嫁女孫亦然女孫有嫁及逺適者多誦北方安夫人之詩有曰女長終為婦親邊不是家睦婣存古訓勤苦是生涯之句以勉之先君有再從弟妹幼孤無依取而育之亡妣為畢其婚嫁其他解衣為助者不能悉書也喜周人之急家藏奪命丹秘方歳營珍劑以為施治疾起死甚多先君在烏鎮時友婿陳公膏已自御史貳外府亡妣毎聞有除目則為女弟贊喜遣賀惟恐後無分毫羡慕及欿然之意少卿忽下世輕舟入都以慰之其達識類此嘗在親戚家聞從子過省之報喜不自勝坐中以夫夫人之子也問得其詳唶曰心地乃爾耶先君夀終固已難堪未半載而嚴州兄又以毁卒亡妣年已髙皆憂其不能處而曠度了達晝夜之哭哀至若不可解哭已則胸次豁然起居不改其度人尤以為難鑰守永嘉迎侍為八十之度暇時領婦孫周行郡圃不假扶掖擷黄甘以分啗略無衰相鑰亦仰體慈訓不敢以嚴苛臨民在後省嘗以封駮乆不決跪以告曰朝夕且得嚴譴恐一有斥逐徒驚尊抱莫若先歸故里脫不可逃寧身當之亡妣曰我亦念歸乆矣盡室為之東下嗣歳復來時仕者間自引去同列或謂鑰曰子有親老可明告于朝使子弟奉以歸非他人比也鑰亦以告亡妣曰吾兩陷圍城中還鄉又脫宼厄以是知生死真有定分在此則猶知事宜外方傳聞多過徒亂人意鑰竦而承命不敢復請聞者無不歎服鑰自吏部尚書謀補外亡妣聞之曰可去即去毋以祿位為累也既歸見親黨道舊故甚自適也越國生二女一子仲舅尚書諱大猷引經告老而陳氏從母之子諱居仁為中書舎人終華文閣直學士里有一舅二甥三學士之語從母及舅母亦皆封贈至夫人外門切鄰亡妣年九十尚書公亦八十里之族姻孟春為慶既報之又合樓氏年過七十者男女二十餘人别為一席以侈其盛仲春為尚書慶酬酢稠疊奉為重客季春又夫人生朝也簫鼓之聲幾無虛日未幾聖朝推老老之恩亡妣授郡封尚書公進直學士郡太守致上命羊酒粟帛之賜焜燿兩家先君在日固已贏八十口逮今二十許年未問納婦及婿惟孫曾子女增四十有五人童丱滿前愛撫惟均歡笑雜沓不以為厭問安直頷之而已晚歳備福誠世所鮮儷也奉佛素謹甫三旬已閱大藏經取龍龕手鑑以正竒字越國嘗再誦及半又與二舅補之近年猶作梵唄時舉因果以示人晨餐以前無非佛事寒暑如一晝靜多觀大字未見之書不問多寡必自首至尾而後已書傳過目如素所習諸史舉大端興亡之際賢否之著者類能道之稗官小說所見尤衆性復善記非出彊勉二族交婚如朱陳然親連至多姓第之外姻婭宗𣲖如燭照數計後生取質焉及見宣和盛時暨靖康間事言之皆有端緒如痛定泣血等書間能指其不然者後得夢華錄覧之曰是吾見聞之舊且謂今之茶褐墨綠等服皆出塞外自開燕山始有至東都者深歎習俗之變也太師史文惠公丞相魏文節公見必加敬數年間遇舉夀則大資趙公郡侯洎倅貳而下俱集或歎曰人間縱有此夀若斑衣珠履之盛則未之見也既倦于行或過諸院近則鑰輩抱持稍逺則子若孫親扶板輿每過笑以為樂客或求升堂苟非有疾未嘗不見問勞周悉旁及其近親之安否談舊事不少差咸仰神明之未衰也燈前則與諸婦為依經馬之劇或至夜分不倦去年方覺頓弱雖齒豁體羸已乆而耳聰目明如鑰比䝉恩與郡以九十者家不從政力辭亡妣亦以為然疾既革元日猶自力危坐以待賀者鑰痛念嚴州兄祿不及後郊恩以奏從子澡歳首受命亡妣猶能以手加額六日忽命浴且理髮自此叩之則應不復出語面西側卧時若㣲哂三日不動以至屬纊殆善業之報也仁慈薰然待妾媵有恩人人懷感不待鞭朴而自馴服去者必使得所歸閭巷匹婦有來者一以恩意接之故弔者無不盡哀聞者無不傷歎已而大資率鄉之士夫近百人制帥尚書黄公郡縣官及鄉校正錄而下各來致祭多有哀辭以形容甚羙與哀榮終始之備且言上夀全福無可憾者嗚呼人子之心豈有窮極況自父兄凋喪以來母子相倚為命年彌髙懼彌甚不敢一日輕去膝下而天祸我家遽降酷罸不孝罪逆以至于此尚何以生為哉方忍死以襄大事追惟吾母淑質懿範著聞逺邇若其容徳廣大孝敬淳篤髙明諒直慈祥清粹曲盡人情而動依大義非惟閨閫之賢婦所不能及有烈丈夫名薦紳之所難能者不肖子鑰自省事以來親見實行聞格言舊矣是敢泣血具載以少伸哀痛孺慕之誠非不欲極意贊揚而屏伏苫塊肝膽潰裂魂魄紛亂不能盡究始末以發濳徳窀穸有時未敢求銘于當世大賢輒援曾文昭公亡妣之稱效后山陳公先夫人行狀之體敬刋之石以對先君之碑銘以示子孫使毋忘哀哉餘生無母可事長號擗踊冀相尋于九原之下耳嗚呼痛哉嗚呼痛哉孝子樓鑰泣血謹狀先兄嚴州行狀曾祖常故任朝議大夫累贈金紫光祿大夫妣翁氏贈永嘉郡夫人祖异故任徽猷閣直學士朝議大夫累贈少師妣馮氏贈秦國夫人馮氏贈魏國夫人父璩故任朝議大夫主管亳州明道宫母汪氏封恭人先兄諱錫字予善一字申伯世家明之奉化今居于鄞葢自我髙祖正議先生始四明之樓實出于東陽不知所遷其可尋者自兄以上才八世先生以古學教授鄉後來者又繼之衣冠彬彬焉先公嘗以軍器監丞攝工部郎有忠厚亷平之稱太保魏國史公為墓銘生九子兄其仲也兄天資穎悟精力絶人自幼從學迥出流輩年十三游郡庠三山陳公元裕典教事鑒裁甚精兄一試占髙第祖居遭建炎之燬依外家以居先公攝事平江母氏攜伯氏繼往兄已能理門内如老成人自爾舉業之餘幹蠱尤篤樓汪二族吉㓙㑹集人夥事叢他人智力所不給兄為主辦則應酬中度談笑自若遇事有膽略不怯不躁委蛇曲盡無劇易必舉故雖未冠而中外親識已極口稱其能而期用于世矣先公乆欲問舎而無其貲兄承親意竭力圖之銖積寸累以立堂宇先公懷太守章歸寓奉川兄慨然曰親年益髙兹可緩耶入城謀度日以就緒落成奉二親定居而後待行葢一力任事米鹽靡密有無相通以全其家者幾二紀隆興二年以先公遇郊祀大禮奏補將仕郎乾道改元中銓授右迪功郎秀州司户叅軍先公赴處州兄率諸弟分掌家務鷄初鳴時左右至受謁聴訟則俟于屏内公退候伺顔色承命惟謹書尺之繁委行李之往來一不以累先公之心故先公專意郡政無有内顔既赴户椽太守徐公蕆曾公逢一見如故交事多資決糾曹懵甚守方委兄恊濟俄有㫖使錄事曹典獄漕使吕公正己行郡部民有訴獄寃者以詰糾曹呿不能答兄前曰兹事甚明是時新制未行錫預聞之因引姓名歳月與事之始末辯數明暢四座屬耳吕公歎曰作吏不當爾耶顧吏一依兄所言糾曹得解而訴者伏辜㑹鎮江有軍校訴于朝且自言乆掌軍用力校貸錢以萬計知其欲訴將殺以滅口脫身而來後必有追者出此門則不得生矣丞相虞公駭其言具奏于上先令郡置獄盡繫所訴者欲遣理官以往今丞相梁公方叅大政慮摇軍心請敕漕臣擇州縣清强官許以理寺推獄行時胡公昉新為東漕與吕公合詞薦兄吕言秀州事胡曰自淮南易節以來密訪人物至秀稱樓君者如出一口徑取㫖以檄兄二公使來見面趣之行兄曰事闗軍旅君相所屬意錫試吏未半歲豈應預此二公不許曰隆暑不可乆繫獄吏已候于郊外數日以待子之來也請械軍校以自隨途中時與之語鉤得其情比至桁楊滿庭所繫有官横行者兄以所訴貸錢之目詰之皆曰誠有此而悉已償矣各以左卷來有須㑹問于軍者頌繫一二餘即日縱遣復引訴者謂之曰爾妄明甚察爾之情欲逃而死耳上㒺朝廷下駭軍伍死有餘責即吐實尚全爾生其人頓首感服一箠不用僅三日而竣事大理吏跽請曰事體甚重今遽已後必有悔兄曰我不知觀望惟盡其情而已汝第為我行文書他日有責我當任之既出尚書蔡公洸為守握兄臂曰何其神也始得制書府庭為之震動非君來某亦無所逃責然尚疑兄年少氣鋭或有疎略因為備言之唶曰弗可及已歸塗比文案該叙請密老獄吏所不能為二漕聞兄及門大驚既見道所以喜甚曰吾二人舉士不謬矣亟呼吏草奏兄曰已具于此讀之又大喜過望涉筆書名即攜兄詣丞相府先入白相唯唯問安在自賓戺徑以便服謁見色尚不怡曰折獄誠敏然訴者肯黙乎亦得所謂伏辯者乎二漕相目兄曰伏辯有二如使吏曹附口語代書辭容有誣服今其親筆也袖出囚辭數百言視首辭筆跡不少異又無一字揩改注乙者相始大稱賞且曰使者誠知人翌日與梁公奏聞上為之嘉嘆因共薦兄謂如此等人不應使沈州縣請以中都官處之適左帑吏有巨蠧既正典刑以兄監都門相謂兄曰是何足慁子特不欲使子捨祿而遲次也既就職潤色成法隨請于上積弊寖銷在法譏訶出入得其過失者賞有差故雖名同事而偵伺甚嚴或成仇隙兄曰吾儕為國主藏任責匪輕各謹攸司錫亦不願得此賞也由是相處甚歡而事益集南庫闕官朝旨命兄兼攝兄視寶貨品目至繁而位置紛糅躬督帑吏彚分之各得其所列屋有定數而總其凡于籍標識粲然未幾上忽遣中使臨視兄執籍取物如探諸囊使無以返命即取屋角敝繒將封以歸奏官吏失色兄徐曰是非軍衣所需葢裒以備賜花等用數實若干籍具在也神氣湛然使無以詰尚書張公津曰某號典領初不得親臨胥輩又不任事㣲君吾其殆乎張公由此受賞兄不屑也任滿主管都茶場㑹子庫闗陞右從政郎上方留意楮幣兄服勤其中纎悉明備凡事皆立成規吏不得搖手日造萬紙無不精好一日謁丞相曾公有同僚力言省罷之便兄立其後具聞之僚顧見兄踧踖而退兄亦不之便果罷已又進謁曰相君曰國家賴楮幣以資用度今罷已何敢復言然度必復于後吏曹失業散之四方他日恐難遽集况作偽者他皆可為惟貫百例不能亂真故多敗此曹無聊若冒為之智者不察也願擇可用者分隸官司使得以自活丞相曰子不謀身而逺慮及此即白于上如兄言旋攝主管尚書刑工部架閣文字遂為真職最清簡靖共自守垂滿欲詣銓部時史魏公再相素以兄為可用力薦上前丞相趙公又舉鎮江獄事贊之且奏曰是時虞某即欲處以職事官今丞相雖知之尚避鄉曲之嫌未敢遽言上曰朕猶記向時事信可用豈應顧小嫌耶遂除詳定一司勑令所刪定官以薦章及格改宣教郎時方修一司一路酬賞法取諸路專降指揮五千餘項立條一千三百繼又編類海行法兄夙夜疚心筆削損益多出其手書成奏篇轉通直郎輪對首誦主上孝儉之徳上曰朕之即位卿預觀否對曰臣是時雖不及見今叨朝列冬至正旦親見陛下拜太上皇夀真千古盛事也上顧而笑再奏請明詔有司議立科目凡是則是傚有一于此者令郡國察舉以聞擇其尤者尊顯以風厲天下孝者舉則忠臣可以求亷者進則贜吏不必治又論乾道修法乆已奉行間有牴牾重加審核雖已出于睿㫁修定新書止緣頒降尚遲州縣無所依㨿胥吏因得為姦反致淹延獄訟欲望頒行使得遵守續有陳請自編别敕仍下諸道且用舊法理㫁免致因循待報遷太府寺丞又以輪對論紹興和買事謂㑹稽一郡賦額最重然經界之初物力及四萬錢者始敷一絹今乃半之既無物力之增徒有科敷之倍止緣下户舊與免科聖朝優恤之恩反為豪户欺隠之地上焉者財力豐裕與吏為市莫可究尋盡以本户之田析以占籍五等分立砧基多至百本卻致中産之家和買歲增偏重已甚乞以産錢均敷不復更問等第議者必曰始科不及下户葢恤之也今反加賦可乎是大不然今名為下户者實富室也真是貧乏十無二三若仍舊貫不為更張則必盡歸五等之籍無復可敷之絹矣又言身丁錢者皆出于下户欲將所取之額總計為絹若干與和買絹數合為歲額止以産錢均開上户雖就和買敷身丁而和買之敷則頓減下户雖就身丁敷和買而身之免丁則甚優上下各得其利而官賦所入無虧鈔書仍以和買身丁為名用防異時重疊倍敷之患若有丁無産之民則又可以全免而為太平之氓矣上褒嘉再四且曰卿所陳利害甚明朕即為􅏔漕臣與郡守共措置而又論左帑權出之弊謂出入之吝具有科條物貨權出勢不能免此等既非正支止是私置文記遇出即注纔入即銷雖有據憑終難檢柅萬一乆假不歸因有重出不無姦弊欲從外府印給二簿付都中兩門專記權出之物門者以時拘收太府每季稽攷上曰其弊如此朕殊不知即命行下至今遵用之宣諭宰執天語甚寵兄前後再對所陳九事皆䝉睿奬今錄其施行于時與其最著者遷大理寺丞獄人之司命廷尉又天下之平因所當謹兄尤恪意從事謂天獄追逮非他處比一夫所向閭里驚搖每見吏牘必詳究其人擇不可已者始稟卿長而行之既至則窮日之力親加聴察茍無用拘留則亟去之或先有案卷者豫審事節一問即得故囚之宿于獄者寡拷掠尤稀闊視之如傷情實俱露而猶有為廋隠者僅施十數囚徒至前未嘗厲威以臨之斥退吏卒使得盡其欲言遇有婦人孺子深以驚迫為戒適有大獄三數皆晻昧翻覆最為難事兄究見底藴處㫁公平不為勢力顧忌亦不詭法以惠姦軍民鬬訟例送寺中是非立決率皆厭服而去由是廟堂相知愈深士大夫則曰此真得人矣始至寺吏曰是為初官時能決詔獄者乆之熟見兄官業咸謂未之見也兄乆去親庭力求外補九年四月差知嚴州時謁告歸省拜命于家未幾交代奉祠有旨趣行不俟臨遣便道之官九月到任郡更旱潦之餘財用空匱陋不成邦逋負動以千萬督責交至以郡計訪寮屬具訴煎熬困急之狀先是曹掾筦庫之官分往諸邑公吏五百又旁午于道日不暇給兄曰郡尚可為也何亟如是悉使歸之一跡不留也諸邑既已肅然然後使來受要束盡取財賦本末審緩急之序與夫當蠲而未蠲已發而更催者人皆得以自言首尾七八日朝暮相處如父兄之詔子弟凡可蠲者落筆掃盡其他或為之倚閣或為之分限其應輸者皆指期至郡倅貳以下爭以為不可兄不為變邑無官吏之擾又罷無名之斂期㑹寛而信欣然承命以行且各置二歴緘以紫囊公文之外守宰欲有所言親題歴上不時往還吏不得預聞其間脈絡貫通了無壅滯文移簡寡上下安便及期無一金之負寮吏聳服郡始少蘇矣木栰出于歙郡由城下以趨錢塘郡帑賴此以濟比歲苛取商賈不通兄為之簡節疎目按舊額而寡取之㑹計甫畢牙儈一為保識即縱之順流而下賈人更相告語來者益衆以故三閲月而錢之入大農者踰十萬緡曾不倍征也版曹漕司差官相踵至則與之道其所以然甚悉又隨所索而應之相與嘆其通敏且曰下車幾何時洞徹乃至此耶歸語諸長故兄之譽益彰民訟多据案親決各適其平受責者亦無辭舉手加額稱誦神明者相屬也外邑番訴間取其甚者自處之必窮其情狀而抑彊扶弱不為己甚有訴喪衣囊于津亭者期以餔時必獲已而果然學校頽圮所未暇及兄為之區處表裏一新像設嚴整士類感嘆人不知役或以疑事來諗從容響答動中要領而以愛民近厚為先務近城本埸苦于潦水築墻則善隤挿籬則易壞或以請兄應聲曰種木以環之則可乆矣聞者以為難及大率迎刃而解庭無留事馭吏接物廚傳賓廡下至舟子軍士之差次具有方略人情翕然愁歎之聲化為謳吟傍郡之訴于監司者亦求直于兄其感化流聞有非人力之所及者十二月丁先公憂徒跣扶喪哀感行路郡人如失慈父設祭于道者相望巷哭以送之在官僅八十餘日人謂良二千石終更以去者未必得此户部侍郎曾公選當今吏師謂人曰試郡而辦事者有之若樓嚴州為政平靜百廢具舉雖老于治民者未易過也既歸追慕摧割不可解于心力貧謀葬顔色深墨十年四月感疾去卒哭未逺也閱七日至五月丁卯竟不勝喪以歿嗚呼痛哉享年五十官至承議郎娶馮氏封孺人子男三人澡濚滐女一人適承務郎新知紹興府餘姚縣蔣綸將以十一年八月壬午葬兄于奉化縣龍潭正議先生之墓左澡錄兄之行事以告于鑰與之相抱持而哭語之曰吾忍言哉子之所不知者吾為汝書之嗚呼兄之所以過人者天才之優也然人之有才者或量不足以容物或學不能以自將恃氣而兀傲矜敏而怠惰察以為明嚴而近刻為已而嗜進計利以自豐者間有未免惟兄器度恢洪莫見涯涘受人之觸傍觀為之憤怒而辭色不少異朋友同寮所閱多矣無不得其歎心居家作吏幾無暇日而學問不倦尤好說詩得風雅之深旨兩薦漕臺卒困于南宫筆力日進動翰如風對客作書真行俱精瞬息數函不見其勞嘗見徐公兢作篆心顧好之下筆輒工好事者爭求扁牓流傳甚多晚更斂制稍尋斯冰之體近方攷證說文仍集張氏復古與鍾鼎遺文從韻昈分欲為一書竟不就餞别慶賀間為詩詞皆清新切當壓倒坐人此其見于外者至涵養饜飫增益徳性委運自適則又其所安也和氣薰然無貴賤長少與之盡禮人有所求惟力是視告以急難必傾身以應之或就之謀事先䆒情實能道人胷中之欲言者為之致曲不翅已事人亦感其誠而許之故率能如請者之意濟則如身得之喜否則介介若有失焉葢其資性篤厚雅存濟物之心而才又足以行其志此所以為不可學遇有不可亦必曲為其言所以不可者以曉之人亦不以為忤克勤小物略不茍簡所居一日必葺船居旅次容膝之地亦務整潔創造器用巧思横出人取以為法終日矻矻有古人運甓之志每日勤則不匱一有自惰則不足以立身矣人之情偽絲髮不能逃而自晦其明含垢匿瑕如弗聞者動有規矱不以己長望人人有弗及率歸于恕徊翔筦庫知已滿前不一登權貴人之門昔人所謂性至通而自然有節者兄為近之心計有餘使之利析秋毫有不足道而䟽財尚義不問家之所有貧無告者時推以濟其須俸入不足以給用而食客無虚日間遇士子就試親賓坌集兄豫為館穀之計帷帳器用咸備手行觴豆彌月無倦色少間又問勞其乏絶商㩁文義人人自以為親已婦家寖窶輟衣食之資以助之外舅姑之喪及葬皆兄為之存歿無憾再從弟鏞幼孤求師所在兄曰是吾叔父子愛子也飲食教誨積數年遂入上庠東陽有族子曰溥以窮來歸兄育其數口又為謀資身之䇿温飽至今少游西安與張元晦汝明厚善乙未張赴省闈兄取其新作讀之曰君文誠工而乆不售者正坐用意太深為取前三年程文數十通使熟觀之曰是未必勝于子惟以筆端無滯礙耳張爽然悟場屋中一揮成篇既在選謂所親曰吾霑一第益友之賜也其于故舊類此嗚呼在私門為亢宗之子在公家為有用之才徳之感人者深惠之及物者廣況復容貌頎偉素少疾病謂必將建立事功為時聞人而止于此是可痛也故斂之日親戚交游下至閭里耋穉皆相向慟哭搏膺盡哀傳聞訃音交相驚悼乆而後信之至今弔者尚未絶也兄亦自度抱負不凡抗志宏逺紹興和買之請既行郡民聞之無不鼓舞且曰不知是何官來惠吾州耶帥奏催科方急未易遽改上尤注意令候省限滿日取旨近臣復有請者遂遣漕臣以行僅能蠲減􅓖宫及寺觀撥賜無名之額終未能盡如兄之言兄深惜上意之未究益訪利害期申言之而無及矣兄之齎志于地下何止此哉嗚呼兄之孝友篤矣伯氏喪于丹丘星馳䕶喪治葬撫孤甚有恩意第八弟鍨之生先公以多男子之故命兄育之撫愛如子以至成人澡之居喪鍨實同力以報焉方伯氏之亡而諸弟尚幼每與鑰相語曰仰事俯育之類吾二人分任之鑰自度才具智略去兄逺甚一聴命焉而悉以意佐其傍處宦從宦更為勉勵欲寡其過以毋貽親憂官敕局丞外府適相後先連簷以居並轡以趨非敢以為榮父母俱存兄弟無故誠人間之一樂也先公七十同歸拜夀壬寅屬疾又同時省侍己而先公益安而兄得輔郡奉雙親西上鄉曲艷其盛丞相史公魏公率里之士夫大合樂以送之兄曰當以一身服為郡之勞而使家女子子極奉親之歡躬調旨甘又間以政事施設具言于庭闈以請益甚適也不幸天禍我家先公棄諸孤兄號慕深切大事未涯百口仰給憂苦鬱結以殞其身天乎哀哉游宦許乆不足以餬其口生事日廢幸能以器業自奮改秩纔四年而得郡紱卒不及澤其子竟何為哉竟何為哉今日之事固有能言之者豈真有定數不可逃耶世言陰德隠行有益夀之理未問兄之平生以棘寺數月治獄平允之心嚴陵一時臨民循良之效亦宜得祐于神明而大禍之餘復不自免福善禍淫豈又有時差耶不可曉也垂白之母晝哭之淚未乾而重以晝夜之哭門户責任之重以兄當之猶懼不能勝鑰何以堪之嗚呼不可活矣與澡等忍死以圗窀穸之事又雪涕以書此或曰子之志雖切詞不亦太繁乎鑰泣曰吾兄之亡㫁吾手足不足以喻其痛且重悲夫人品才氣如此而不得顯于用特書屢書猶未能形容大槩以寫吾之悲也吾暇文乎哉乃號號授澡而使之求銘焉謹狀攻媿集卷八十五欽定四庫全書攻媿集卷八十六宋樓鑰撰行状皇伯祖太師崇憲靖王行状曾祖世將華州觀察使贈太師福國公妣李氏封淑人贈商國夫人祖令譮武略大夫贈太師益國公妣劉氏封宜人贈齊國夫人父子偁左朝請郎秘閣修撰贈皇兄太師中書令追封秀王諡安僖妣張氏封秀王夫人本貫玉牒所諱伯圭字禹錫年七十有八状鑰仰惟皇朝以忠厚仁澤涵養天下累聖家法相守一道本支繁衍日熾而昌親睦九族恩禮隆備真足以度越千古恭攷國史開國以來屬近行尊貴窮人爵富溢萬鍾不知幾人然皆生長宫邸専奉朝請雖威望彰明有如周王亦未嘗著民庸于外自熙寧間稍就外補才業寖顯各以所長自見為世豪英代不乏人曾未有位極人臣出處繫海内重輕者若夫厯事四朝寵光赫奕以間平之賢躬曾閔之行出為龔黄之政入有旦奭之望兼是數者而又壽考康寧子孫盛大始終無憾二百四十餘年間其惟崇憲靖王乎鑰四掌玉牒嘗攷福國公藝祖皇帝之元孫也建炎元年安僖為秀州嘉興縣丞孝宗實生于官舍安僖生不及進用殁有追封賜諡之寵尋又築祠堂于行在所建園廟于塋域如濮安懿王故事又升秀州為嘉興府所以寵賚之極矣王其長子也安僖被服儒雅由舎選擢宣和元年貢士第交游皆一時名公王在髫齡有成人風安僖肅重客必命王侍植立拱聴長而彌謹安僖任子請以先外表張似之安僖大喜雖銓曹以法不許王之器識自少已不凡矣紹興七年明堂恩奏補將仕郎十三年安僖薨王號慟哀毁見者隕涕有㫖令秀州應辦王傾橐以襄事一毫不取于公家十八年授廸功郎秀州華亭縣尉邑苦多盜王周行境内以五家為甲一家警盗則四家應之一家容姦則四家同坐盜無所容焉有鹽鐵塘自金山海口屬郡城二百里而近嵗久淤塞鹽運不通王建議疏鑿卒賴其利齊國之喪以承重解官二十五年調宣州司法參軍既至㑹常平帑廩事發興獄逮繫甚衆守將案前政王請寛假守不聴王曰法固甚重然官劾吏竄則亡失者不可復得若少假嵗月庶可償納懲治未晩也代者得以保全尋為補足有囚當死王疑而爭之守是獄掾觀望者隨靡王辯愈力後加詳讞罪止流役戚方出戍道郡境津險而梁敝檄郡為桴筏期㑹迫甚郡以屬王且行且謀凡官地有林木皆黙識之厯津梁則度廣狹材既周用馳詣軍中勞以牛酒且告戚云筏材已具役民恐不及事又非所習若調軍士五百繕治之可立辦也方既樂從王臨視優犒士卒競勸甫畢而師至民不知役守益歎服三十年孝宗自普安郡王為皇子封建王是冬以舉主循從政郎明年夏添差兩浙西路提刑司幹辦公事未赴特改宣義郎尋添差通判明州三十二年六月孝宗受内禪八月除集英殿修撰知台州隆興元年十二月以職事修舉擢敷文閣待制二年秋潦暴漲加以潮溢亟遣舟濟溺者水將入城囊士塞門補苴罅漏水殆及女垣不爾則民幾為魚矣細民多以鬻鹽抵罪王深念之諭巡尉使嚴譏邏獲鹽則歸之官而縱其人獄訟為之衰息而嵗課自若也以治行改知明州充沿海制置使敵再犯邊嚴海道之備傳檄不絶驚譌訩訩王命邀郵筒于遠郊宻受以入民始晏然乾道元年嵗大歉飢民麕至分處寺觀發廩振救多所全活真里富國大商死于城下囊齎巨萬吏請没入王曰遠人不幸至此忍因以為利乎為具棺斂屬其徒䕶喪以歸明年金人致謝曰吾國貴近亡没尚籍其家今見中國仁政不勝感慕遂除籍没之例矣來者且言死商之家盡捐所歸之貲建三浮屠繪王像以祈壽島夷傳聞無不感悦至今其國人以琛貢至猶問王安否六月以獲海寇功陞敷文閣直學士二年冬以邦人舉留再任益思所以恵民者定海有沈窖湖豪右侵築民失其利開浚復舊蓄泄以時規模宏固抵今賴之又有茅砧碶與慈谿接畛定海居上流旱則足以溉灌水則以慈谿為壑紛爭久不定王以帥事行縣親視其宜俾浚舊溝溝成兩邑皆利而爭者息矣三年秀王夫人寢疾藥必親嘗衣不解帶既遭内艱擗踊攀號絶而復蘇溢米不入于口喪行邦人擁道送之面色深墨哀動行路四方賻禮日至自以俸餘足以終大事悉辭之五年服除八月再知明州下車謁先聖顧瞻學宫頽敝大出緡錢葺之自大成殿御書閣稽古明倫二堂以至齋舎門廡為之一新增置書籍月課諸生所習以酒醴勸之宗子不遵防檢者俾入學舎閑以規矩與生員同後多修飾取科級者于是相與立生祠于東序制司水軍舊屯于城外之江東時得㫖移定海軍于平江之許浦王請于朝謂定海控扼之衝不可撒備移制司軍以實之增葺舊營度容萬竈又造鎧甲器械甚備璽書襃焉歸正揀汰軍士來者無所歸王為度地城隅為屋數十楹以處之頃嵗膠西大㨗之後海波不驚而降者言始謀本欲直犯吾境或譌傳連結髙麗者上下疑之王益治戰艦嚴閲習以張軍聲遣郡人徐徳榮覘之得要領以歸遂寛東顧之憂六年陞學士海寇葛明張甚王以方略授將佐毎遇必勝王曰兵不可久也遣人諭以逆順禍福遂降羅拜于庭股栗莫敢仰視王為卻兵衞霽威嚴以問始末明感泣悔懼願自效又進其黨詰之其脅從者縱使復業寮屬謂明之罪不可貸且恐其飽則颺去王曰既懐來之反其鋒以為用餘孽不足平也奏請授以官有以佚罰為言者王復奏曰誘之降而殺之後日何以使人遂補將校又有倪徳號倪郎尤為難制遣明禽捕人尤危之恐其合而為一也明感恩盡力徳技窮亦從招服明年王以此轉一官願以分及將士復請以徳為禆將自是賊之巢穴虛實動息皆知情見力屈姦黨破散海道一清以王善撫二人而用之也八年陞顯謨閣學士九年陞龍圖閣學士皆以郡人借寇之請也嵗饑糴價翔踊王曰此富者閉糴以幸災治之則益甚乃出二十萬緡遣人糴于浙西閉糴者計窮爭先出糶米舟尋亦踵至其價大平饑而不害官無一金之失而行者又得其利王之慮事周密類此在郡前後十年政尚中和寛猛相濟平易近民千里安之禮遇寮寀人樂為用兩造在庭必据案究其情實多勸諭使平之其抵于罪率從未減平反死囚至數十百人嘗獲鑄銅者數輩謂曰汝欲希利而冒重禁耶人與錢二萬使易業碎其器而書姓名于籍後犯決不貸也亦無敢再犯者每曰節用愛人不易之道與其苛取急征以資妄用孰若量入為出以求裕乎不飾㕑傳不事包苴鄰郡交餽盡歸公帑行之既久沛然有餘百廢具舉斂不及民以郡之西湖為放生池扁其堂曰廣生列石于側刻採捕之禁待遇賓客不為豪侈而尊爼風流恩意周洽寓公寄客皆得其歡心而不敢干以私也自以久去松楸屢求閒退雖優詔狎至而歸志不囘淳熙元年十一月始得請除端明殿學士提舉江州太平興國宫去郡之日貴賤耋稺攀轅挽留出境不絶三年積官至朝奉大夫二月換授安徳軍節度使提舉隆興府玉隆萬壽宫九月加開府儀同三司充萬壽觀使九年九月充明堂大禮橋道頓遞使至是始見孝宗天顔感動清問款密王性素謹不敢以語人又朝于徳壽宫髙皇喜曰久欲見卿撫勞甚至禮成加少保封滎陽郡王髙皇曰吾欲自見篤睦之恩賜以玉帶十二年充郊祀别廟亞獻十四年髙宗登遐王奔赴見孝宗于素幄龍輴啓塗事大體重詔充總䕶使十五年六月加少傅八月充明堂禮頓使十六年二月光宗龍飛以皇伯加少師紹興元年三月詔入覲加太保嗣秀王仍賜甲第于安僖祠堂之側屢欲奉孝宗幸祠第王力辭憲聖慈烈皇后賜水月園堂曰瀛燕亭曰玉林湖州私第中又有堂曰慶遠圃曰小隱樓曰溪山勝㮣扁榜皆三朝宸翰也紹熙中憲聖洎孝宗光宗皆同中闈屢嘗臨幸光賁林壑詔益其地並湖為複閣有司既度材矣王恐重費縣官又固辭焉每侍清燕之閒兩宫皆待以家人禮王執禮愈恭語不輕發一日孝宗宴私隆洽不覺前席密問潛龍時事王遜避良久徐奏臣老矣不復記省問至再三終不敢言孝宗笑曰何太謹也然以此益加愛重嘗召王及諸子宴于北宫之静齋孝宗曰近者元夕簫鼓之聲不絶斯民自得其樂不欲禁止然物戒太盛為之惕然是夕不飲酒僅啜一盃湯而已大抵人君不可不事節省若肆意所為將何所不至王對曰陛下兢業如此雖堯舜無以過自古人君誠能不溺于宴安則怠荒之念何從而起孝宗深然之二年六月判大宗正事宗司任法太過天族固賴以整肅而頗虧親睦之意王處以平恕厲以亷恥鮮犯令者每言要當先教導而後齊之嘗建議别立宗學月書季攷以教天下之宗子請出餘禄以助贍給又以減宫廟員闕之多請復増數以優之事雖不行識者韙之三年六月拜太師五年辭大宗正事七月主上登極加皇伯祖免奉朝請九月充明堂亞獻詔加兩鎮于是兼崇信軍節度使十一月充永阜陵􅓖宫禮儀使慶元元年以復土拜中書令王以曠典五辭御筆答曰遜避莫囘勉從所請可别議襃崇之禮乃詔贊拜不名嘉泰改元賜第為火災延燔乞還湖州故居守園廟二年春趣召賜肩輿至殿門令子孫扶掖命有司復營舊邸四月王丐歸九月癸亥薨于正寢遺奏訃聞上震悼輟視朝三日賵贈加厚賜棺含以蟬冠朝服斂遣内侍押班左武大夫保康軍承宣使呉思忠等五人䕶喪設祭之文甚寵曰藝祖造邦源深流長子孫繩繩百世其昌巖巖秀邸不顯其光積久愈厚篤生賢王濯濯祥麟玉質金相允文孝宗則友其兄召繇外藩賜第于京迺分茅社于彼滎陽赤旂金節絢爛綏章文考念功曰篤不忘建祠秀園舊履是荒太師維垣衮衣煌煌爰暨沖人應龍初翔宣力百為調娯多方予嘉乃勲臚句不名紫㣲是令遜避勿遑貴極愈謙年耋益莊踰七望八熾昌壽臧子侍孫攜蟬冕相望王比來朝精神方强謂當百年鎮此宗盟不遠伊邇降此弗祥維大父行生死哀榮王實無憾典刑云亡緘辭徃尊寄哀一觴又遣太常博士錢易直等軷祭于都門外文曰我伯祖父標的宗英奉釐列邸隱然維城天胡忍予殱此老成爰飭邦典命使以行遥致奠斚以賁泉扄爰以量幣清酌齊牲粢盛庶品用薦哀誠十一月癸卯諸孤奉王之喪葬于烏程縣永新鄉成山之原王娶安徳帝姬之女信安郡主宋氏父保慶軍承宣使駙馬都尉邦光實徽宗皇帝外孫也封衞國夫人先二十四年薨追贈齊魏國夫人夙有懿範嫓徳娠賢用肥王家子男十人長師䕫興寧軍節度使開府儀同三司充萬壽觀使以王之襄奉哀毁而薨贈少師追封新安郡王諡恭滎次師揆檢校少保奉國軍節度使提舉佑神觀兼秀安僖王園令次師垂定江軍節度使提舉佑神觀次師稷蚤亡次師禼深州防禦使提舉佑神觀先五年卒贈昭慶軍節度使追封信國公次師禹慶遠軍承宣使提舉佑神觀次師臯保慶軍承宣使提舉佑神觀次師嵒朝奉郎新權發遣通州軍州事次師彌奉議郎添差通判嘉興軍府事次師貢宣教郎添差通判廣徳軍事師嵒師彌師貢俱得㫖除直秘閣未拜女三人長嘉興縣主適故朝議大夫直秘閣知蘄州軍州事鄭嗣宗蚤亡次永嘉郡主適故宣教郎添差兩浙轉運司主管文字張似續次新安郡主適朝奉郎直秘閣新權發遣髙郵軍事史彌堅孫男二十四人希道朝散郎新權發遣嚴州軍州事希明承議郎新權發遣黄州軍州事希遠通直郎添差通判慶元軍府事希徳通直郎添差權通判衢州軍州事希永武翼郎特添差兩浙西路兵馬鈐轄湖州駐劄希顔故儒林郎紹興府上虞縣主簿希行故將仕郎希古武翼郎特差行在㸃檢贍軍激賞酒庫所幹辦公事希純奉議郎添差通判衢州軍州事希閔右千牛衞將軍權主奉秀安僖王祠事希忼右干牛衞將軍希訓太子右監門率府率權充秀安僖王園令希憕忠翊郎特添差兩浙西路兵馬副都監嘉興府駐劄希栞承事郎新差監臨安府糧料院希諟太子右監門率府率希呂忠翊郎希怟成忠郎希復忠翊郎希邛承事郎餘五人未賜名補官孫女十人長永康縣主適通直郎知江隂軍江隂縣事胡元卿次適承務郎特改添差監兩浙轉運司造船塲范莘次適保義郎新差幹辦御前中佐軍頭引見司呉璞次適從仕郎特添差婺州觀察推官林爕次適承事郎特添差通判嘉興軍府事韓杞次適承節郎新差幹辦御前忠佐軍頭引見司呉珙餘未行曾孫九人未賜名補官曾孫女十五人長適文林郎特改添差婺州觀察推官沈煜餘尚幼嗚呼杜甫謂汝陽王為真天人鑰謂崇王天人也其生也秀王夫人夢彩仗傳呼導朱袍而冕者直至寢所奏鈞天之樂既覺聲猶在耳免乳之際香霧滿室終日方散及為安僖卜宅兆銜哀走數百里惟烏程之菁山最佳卜之而吉然念力不能致裴囘其處一叟忽前曰官豈姓趙而欲求葬地乎王矍然曰汝何以知之叟曰嘗夢神告我矣指所卜之地以售今寢園是也方丞郡時居湖心僧舍夢有形狀獰異而繡衣者乘小舟環繞數四訶問之則曰公他日當為地主故巡䕶爾既為守又嘗夢其人言有召公者過小橋人之憔悴與支體不具者紛紛求拯援甚哀尋見所召者曰適所見得無動心乎此曹久不安居願庇之唯而覺莫知何故後出郊過一橋恍如夢所見而道旁藁葬纍纍有暴露者王悟曰神豈以是望我耶悉為掩瘞之晩嘗率鄉人禱雨道士伏章王盛服端立左右見嵲屼久之暝而不跌頃之語人曰適覺神遊帝所以閔雨告帝既許我矣翌日膏雨如注闔境告足翰林學士洪公邁載于夷堅志尤詳神異之事固為難言如王之交于神皆明白而又有驗于後故屬纊之日起處如平時夜尚觀書甫二鼓始覺體中有異集子孫告之曰時至矣了無怛化殆仙去矣嗚呼王真天人也王風姿秀挺襟度粹夷忠孝誠篤恭儉謙勤皆其天分加以好學善持論春秋二丁必具盛饌祭先聖于家塾率子孫拜之四十年未嘗廢每曰熟讀論語一書平生受用不盡又喜誦孟子間舉二書之疑與客反覆論辯又摭其㫖而為言曰食色雖重禮義以安之富貴可求非道則不處又旁取釋老二家而為之説曰愛欲煩惱對治法門又曰願有情皆得度無情保長生書之坐隅以自警嘗有方外之士書廣大慈悲方便忍辱八字以獻其徒復為之辭幾數百言王書其旁曰廣大聖之事也慈悲仁之用也方便智之功也忍辱謙之徳也㫖要在此奚俟多言其人愕而退葢其所存者如此喜玩法書字畫温秀如其為人賦詠賡酬愈出愈新多記詩詞筆端富麗棊品甚髙皆其餘事居聞則以此自娯也寛厚有餘事秀王夫人尤謹迎養在官退食娯侍夫人必勉以恕服膺慈訓不嚴而治未嘗案一寮屬作尉時有部使者責以躬督人舟王無難色使者見王徒步亦悔之後其子將丞屬邑久之不敢進王趣之且曰何待我之淺也終為剡奏丞至感泣燕居自怡申申夭夭無疾言遽色侍側勝冠者衆童丱紛如也皆假之色辭第戒以謹守儒素下至臧獲未嘗怒辱之不以貴盛自居嘗見丞相魏文節公于山間先屏騶閧及門下車趨就賓廡呉興太守旦日拜表僅畢而謁已入矣賓客至前少賤亦為之加禮總角朋游雖寒左皆能記憶至録其小字以示不忘鄉人為真率之集以勢位遼絶不敢有請王曰非所聞也竟與之周旋自奉至薄食不重味器不華飾衾襦用布浣濯紉補不棄也買屋而居稍加葺治詹事王公十朋為守歎曰某起書生築屋尚窮事力意邸第必極輪奐之美今見之使人媿歎親舊之貧者月有廩給嫁娶病故隨髙下濟之雨雪日久則令人走閭里賑施嬰孩遺棄則募乳者收育之葢用之以義者則所不吝也鑰父子兄弟出入王門晩預班綴時得進拜眷撫有加焉王在朝端山立玉色貂蟬寶帶進止有度照映班列固已增重朝廷紹熙末年徃來兩宫調虞密勿若不動聲色而外廷屬目倚王以為重造厀從容多有獻替一語不露于人或有以傳聞求質者但曰無之故莫得聞焉此鑰所親見者兼直禁林王之加恩兩鎮拜中令三制皆忝視草迨丐外而歸隆暑中訪别于官舍屏居海角不敢以姓名入脩門王賜之書且致酒殽之饋若施于敵已者銘于心不敢忘也王之訃聞識不識皆有殄瘁之痛惟明之人去思最深至流涕相弔葬既不及為執紼之役亟走五詩以寓哀挽之私王之諸子自少保而下遠寄事實俾狀王之行將以求墓隧之碑鑰不佞竊惟王之抱負非淺陋者所能究識爰自建節之後富貴逼人名位日尊而所藴自是無由表見于外人但見其養威重保明哲而已盛徳全美細事本不必書王自少涉厯至多克勤小物持循有素故能善始以終為一代宗工重臣正以平時踐履積而至此故亦不得而略也敢具列之告于太史氏以備採擇謹状攻媿集巻八十六欽定四庫全書攻媿集巻八十七宋樓鑰撰行状少師觀文殿大學士魯國公致仕贈太師王公行状曾祖本累贈太師魯國公妣陳氏贈魯國夫人祖登故任承議郎累贈太師魏國公妣陳氏贈魏國夫人父師徳故任宣義郎累贈太師楚國公妣時氏封魏國太夫人本貫婺州金華縣大雲鄉安期里王公諱淮字季海年六十有四状王氏系出太原五季避地至婺居義烏之鳯林後徙金華遂占名數八世為儒至魯公守道自晦始闢家塾延名士以訓子孫政和二年魏公以科第起家知潭州湘潭縣是生四子次曰師心繼踵世科仕為吏部尚書終顯謨閣學士其幼即楚公也倜儻有大志義風為鄉里所敬故翰林學士何公溥志其墓公生于靖康元年六月七日幼穎悟粹温凝遠寡言正色顧瞻步趨率有彛度力學善屬文紹興十五年由漕薦擢進士科調左迪功郎台州臨海縣尉郡守蕭公振一見即以公輔期之郡事多委公裁決捕盜應格不就二十三年秩滿循左從政郎蕭公帥蜀辟以自隨已而召還諸公爭欲羅致公曰受蕭公深知故奉親為萬里行詎為利禄計耶既歸授國子監書庫官改主管吏部架閣文字二十七年為省試㸃檢試卷官知舉湯公鵬舉薦除樞密院編修官冬兼檢詳諸房文字二十八年改左宣教郎八月為祕書省校書郎二十九年兼呉王益王府教授既入館屏遠人事益讀未見書假休亦入抵暮始歸一時名臣汪公應辰史公浩虞公允文陳公俊卿劉公珙雅相器重三十年再攷省試知舉朱公倬尤知公詔舉臺察薦公及史虞劉四人四月擢監察御史六月遷右正言首論大臣矜勢以養尊小臣持禄以遂私二三執政以括囊為智以引去為髙願陛下正朝廷以正百官體貌大臣勿假以權刑賞黜陟之柄一聴于上使號令無紛更官吏無數易則其他將不革而自去上欣然嘉納公自以不世之遇論事益切其大者論時宰初無素望偶中科目權臣引之要途致位公宰竊弄威權動循覆轍假封駮以行其意嫉風憲以沮其言既罷政又論其植黨營私懐諼迷國竟鐫其職又論大將劉寶之在鎮江私殖貨財隂交權倖方命掊克之罪而罷之此外遇事必言言之必盡時高宗更化之初興滯補弊公所言無非經綸要務嘗謂道揆正于上則法守明于下乃者用事之臣持己私以専國柄四方奏請有送部勘當看詳措置之類當處以無心總要聴成以詔廢置而已今乃均是事而有前批後批之殊同是法而有元降續降之别情法不相當則云更合取自朝廷指揮自知無法可行則云如朝廷特降指揮于本部成法即無所礙變舊章而惑觀聴有司失其守而名實亂矣欲望明詔大臣令各以成法來上盡去宿弊或依違遷就則坐以違制御筆令三省六曹遵守此實公之相業也眷遇日隆且將大用三十一年正月轉左奉議郎四月丁楚國憂上聞之惻然因諫議大夫何公溥入對就令傳㫖慰問亟有金繒之賜隆興元年服除孝宗勵精政事妙選部使者是冬除直敷文閣福建路計度轉運副使除科鹽之宿弊洗滯訟之寃枉治最上聞乾道改元召赴行在陳責難之説必欲致君于堯舜又奏監司郡守數易及内治外治之䇿尤詳上皆賞難且曰卿居言責有補治體四月除秘書少監又以公端厚誠慤五月兼皇子恭王府直講六月兼國史院編修官未幾皇孫降生申乞檢照典故有沮之者與外任三年閏七月轉左承議郎十一月起知江州四年奏事改建寧府仍舊職對祥曦殿陳擇將備器簡兵足食四事又言差役關征賦籍𣙜酤水旱義倉典獄御軍之要既赴鎮人熟公仁厚炷香以迎莅政尤以慈祥清簡崇風教務節儉為先明年就遷轉運副使尋有召命言者尼之公亦力辭而止始建谿用浮梁潦水則撤去行者告病公命以石為之既去而橋成榜曰平政生為立祠八月轉左朝奉郎六年六月改兩浙西路提㸃刑獄公事入奏閩中利病及建劍汀邵上供銀悉施行之奏事畢上令一至東宫皇太子以師儒之重加以拜禮公于詳讞之際尤切哀矜直欲使無一人之獄又切戒豫借折帛之擾冬轉左朝散郎七年天申節上壽奏浙右水災欲令許浦水軍任疏鑿之役又言州郡任情或以輕罪編置失太宗奉法除姦之戒賜田之家或取民間已佃之田所當禁止縣之推吏當行重禄盜販𣙜貨配𨽻加詳上曰議論切當朕所簡注八年十一月除太常少卿十二月兼權中書舎人九年閏正月兼權吏部侍郎二月兼太子左庶子四月兼權直學士院七月除中書舎人仍兼直學士院論軍興以來上下相沿事干機速則先施行而後書押朝臣除授亦有先次供職者望申舊制正救于未行使天下不見其過九月兼侍講十二月兼太子詹事轉左朝請郎封東陽縣開國男食邑三百户淳熙元年陳覺民非隨龍而援例轉兩官龍大淵已致仕而越例求恩數執政罪罷而猶除資政殿皆封還之訓詞深厚得王言之體十二月除翰林學士知制誥兼侍讀依舊太子詹事二年知禮部貢舉上俾擇文學行誼之士薦鄭伯熊李燾程叔達三人皆被進擢張説罷樞密除太尉在京宮觀力陳其不可竟奉外祠三月以東宫講易徹章轉朝奉大夫四月兼修國史兼實録院修撰公在禁林晝接夜對退不以語家人無得而傳焉閏九月除端明殿學士簽書樞密院事進爵開國伯公懇辭上謂卿存心至誠學有淵源及倚用之意且戒以推誠待遇將帥同濟國事有曰人臣須是徇公不當邀權古人有願公無權之説又嘗曰樞密每事詳審有未合法度處必將上理㑹其善朕亦從容多暇又稱遇事無私詳練謹密深賴協濟四川制置使范公成大奏郭鈞馭衆無術幾致生變命龍雱體究上曰成大所陳則鈞之罪大雱條奏亦有不然者公奏雱謂其留心軍務但繩治弛墮甚嚴乃是稱其所長然謂僻于自用剋剥侵漁勢不可復留因薦可代者六人又奏江西捕茶寇真是有功行賞太濫卻須核實此皆大節目也其他應酬邊事如湖北之夷人占城之劫掠皆因事制宜隨即帖息髙宗慶壽奉上尊號為篆寶官進爵東陽郡開國侯三年申議使湯邦彦使囘上怒金人無禮公奏天下為度惟當講自治之䇿以待之四月國史日厯書成轉朝散大夫八月授中大夫除同知樞密院事上又稱公盡公無私禆益為多簽書樞宻院事趙公雄留身奏事上又語之曰王某難得卿宜同寅協恭傜人姚明敷已就禽而率逄原擅入多殺文州蕃部漸就安業而李昌祖誘殺降人公皆謂不足為武徒傷好生之徳上皆令體究責罰上言中宫躬儉誠信太子温恭儉薄本朝后妃多賢朕自以為幸所少者則是功業未成公奏功業雖中主可成齊家治國非上聖莫能及上曰然徳行為本功業次之嘗宣諭十年來欲令宰執進呈退將得㫖文字再具熟状進入朕再行審閲批出然後施行既免専擅之嫌且無遷令之患參知政事李公彦頴奏曰此光武以吏事責三公之道也公奏唐制宰相奏事止是口奏曲折或賜茶而退即作聖㫖施行國初范質等係前代舊人懐不自安始日具事目進呈退就殿廬批㫖然後上焉今若再經審閲然後付外則事無過舉人無可議亦保全大臣之一端也翌日又命進擬仍注鄉貫于臣寮姓名之下公謂除授當論賢否不事形迹誠賢耶不敢以鄉曲故舊而廢苟曰非才亦不當以己私而庇之上曰善郊祀充儀仗使禮成進爵開國公四年六月除參知政事時宰席久虚公與李公同行相事五年三月知樞宻院事十月拜大中大夫樞宻使公在右府憂邊思職約束諸軍擅差白身人任職事揀汰筋力未衰屯駐離軍人改陞等為合入差遣禁黎州所部邀功生事撫存草羌山招到作過人措置歸正添差員闕及冒名承代之弊安邊鄙以懐遠人動中機㑹江西賴文政郴寇陳峒李接之變淮隂刧寇等公應酬羽書號令賞罰明審平當上亦稱其毫釐不差又嘗顧簽書樞宻院事錢公良臣曰王某臨事至公遇事不曾放下卿宜恊贊又曰向來大臣不知兵所以用兵多無成功今卿等究心軍務朕復何憂錢公亦語公曰近郭棣嘗云䝉宣諭王樞使在西府數年不曾錯了一事六年四月日厯書成轉通議大夫八月㑹要書成轉通奉大夫九月明堂充禮儀使或請主兵官置親軍者宰執謂主帥不可無此如韓世忠置背嵬卒能成功上欲令三衙建康主帥相度聞奏公獨曰若令主帥相度孰不願置此軍恐内有肘腋之虞外有尾大不掉之患世忠等輩當艱難日握兵于外置背嵬等軍以募死士今無事而置此他軍必謂主帥自有私人不肯為用又請受賞給勢須加厚怨望日生萬一有警使之擇勇敢出死力亦何不可上曰卿任腹心之寄長慮卻顧如此真善謀者也嘗論立賢無方而或言閩人不可用者公謂固有章子厚吕恵卿蔡京蔡卞然曾公亮蘇頌蔡襄陳襄亦閩人也江浙固多名臣亦有王欽若丁謂輩顧人主所以用之如何爾上極以為然七年八月詔公今後垂拱殿及後殿奏事並免宣名賜宴隱秀上曰朕比來臨事未嘗茍且近欲按軍法誅成光延等王樞使言平常寇賞格比北敵戰功減半議罰亦宜如此朕釋然而悟稱奨久之公復奏曰敗軍之將罪固當戮聖恩溥博遂從寛宥臣何力之有十二月四朝正史書成進正議大夫食邑實封滿萬户封信國公公執政累年謹守成憲執内降之難行者張説之子薦以水教溺士卒褫官封還叙復詔命至于再三乃止守邊綂兵之官各當其才孝宗明見萬里公區處軍務率皆合宜眷意益厚公歸美君上無一毫矜伐之色人望愈歸之八年九月拜右丞相兼樞宻使授光禄大夫封福國公累月亢旱至是大雨霑足人心闓懌公奏事力辭上曰卿直道自將知無不言朕所信用卿而不宜尚誰宜者又曰卿等朕所倚信當盡言無憚公對曰有君如此茍為緘黙豈不辜任用之意右丞相趙公雄罷政朝中蜀士率有去意公曰若宰臣一出而引用之人相隨以去是激之使為黨也皆以次進遷于是始按堵矣大拜之初好進者蟻附踰月無所更易或問之公曰此正奔競之秋若驟爾陞黜非惟有駭觀瞻尤非平日所喜也旱勢既廣力贊荒政起李椿于休致以次對帥長沙知南康朱熹擢浙東提舉以為郡國之倡兩路出粟専濟邊郡歸正之闕食者借貸二麥種子戒飭檢視官司甚嚴孝宗遴選從臣皆出獨㫁版曹闕貳俾公擇才因薦曾逮周嗣武皆從之尤見責任之意公為閩漕時侍御史李處全嘗論公召命至是公謂處全久閒若不録用將有私憾之嫌奏起知處州同列皆服公之仁朝士有論朋黨始聞五鬼七殤之目者上以為問公曰此乃不得志者所為示之以静則無事矣金使魏正吉朝見執書未進公諭以禮而正吉䣛行欲退公即奏請皇帝還宫降㫖别日引令館伴議之次日卒如儀而去樞密副都承㫖王抃竊弄威柄招權納賄軍機邊事輙用白劄子徑作得㫖行下朝廷又不預知士論籍籍無敢斥言公憂之已久至此頗甚造膝極陳上始為之動色既而欣然開納曰非卿盡言朕不聞此當為卿斥之後數日上又及之公奏近習弄權人主鮮不以此受謗一旦斥去中外無不服陛下之明㫁既而宣諭欲改用文臣公曰救弊之初當有以新天下之耳目力薦蕭燧以待制為之上嘗諭丞相直諒無隱君臣之間正欲如此今後有合處分事只與丞相議之上曰朕欲奬用直言以起治道而好名之士至于以虚為實毁譽亂真豈朕所望公曰誠有此病然不可因噎廢食必欲興天下之大利除天下之大害非奬用忠言不能濟也㑹章頴輪對上以為言涉沽激全無根蔕自王藺以言進用一傳而為劉堯夫此後如周洎鄭建徳輩妄肆臆説相師成風不少示以好惡則此風遂扇而章頴又有甚焉欲批與外任以卿前奏故留至今公奏頃以象緯失度陛下畏天求言搢紳當不諱之朝以言相髙恥不相若雖入于激訐而不自知士風如此良亦可賀或加阻抑則有諱言之諦莫若奬其切于治道者好名無實置而不問以示優容則自各安其分矣上稱善久之豐儲倉蠧弊上聞有司請窮治公奏將有不勝治者欠數雖多厯年亦深吏已隨所犯流配官則更易已多難以令見任人獨任其責上即蠲之知䕫州林栗奏譚汝翼之罪而汝翼亦伏闕訴陳有㫖索案而栗奏譚省劄上怒其擅格君命鐫秩罷之大理當汝翼死罪公以其與夷人殺傷略相當又詣闕聲寃欲貸命編管内地處以不死潛消姦宄之心又奏栗亷介有才學此亦無他上曰少俟復職除二廣監司恭涪忠萬饑公奏去嵗荒政施行略備蜀遠旱傷尤當賑卹乞就江陵及總所各撥萬斛以濟之職事官闕上令先及侍從薦舉人公拔其尤如羅㸃陸九淵彭仲剛劉清之並與職事官莫叔光趙鞏除刪定官武臣鄒詡乞大減任子之數以清宂官上付外集議公奏去郊尚遠姑令熟議若行之當自大臣始遂定宰相十人執政八人侍從六人卿監四人帶職員郎以上三人致仕遺表裁減有差上曰張大經説近日差除頗協人望亦欲卿知上又曰黄洽稱成都除留正甚當以得人為賀朕諭以近日進擬莫非公道二人皆臺諫也公奏聖主在上賢不肖較然稟受聖訓庶幾寡過敢不竭誠以圖報嘗因進擬宣諭曰選得甚當丞相于人物不茍如此公奏臣于人物恐不能盡記自有手記有繙閲十餘過而不得其人者何敢輕也九年七月為明堂大禮使九月拜特進左丞相進封冀國公監修國史日厯提舉編修玉牒詳定一司敕令制詞有曰似不能言而智足以決天下之疑如不勝衣而勇足以任天下之重士林誦之是日梁公克家拜右丞相同心輔政上益傾任之公首以用人為己任以館職及郎官多闕欲召試及選治郡髙第者為之于是薦召蔡戡謝師稷周頡尤袤林枅鄭僑羅㸃鄭鍔等又以張枃傅淇徐詡王正已京鏜等分為監司一時翕然稱為得人户部申明赦文蠲閣税租之外其餘赦所不載者欲起催則洊饑方蘇恐致重困公奏嘗令計之為緡錢三十七萬有竒若朝廷補其經費方可蠲放上慨然從之明堂訖事上以任子減前郊幾半公奏仁宗時韓琦等減任子猶不免紛紛陛下行之既盡人情後效不止此也十年以太夫人將八十久任機衡求退甚力上不許嘗欲行推排事公謂同列曰非不知其利以臣寮所請而行猶或可緩若作直㫖則奉行過當利未及而害先之吾輩在此見民所苦當如疾痛之在身可不救乎天長水害七十餘家或謂不必以聞公曰昔人謂人主不可一日不聞水旱盜賊禮曰四方有敗必先知之可謂人之父母矣因擬周極安豐軍公奏跅㢮之士緩急可用臨難不顧其身小亷曲謹者未必能之平日愛惜人才正為此耳對境報金主歸上京所差人使權止一年公既陳設備之詳又謂接伴亦不湏遣葢彼既止吾使之來亦難受彼之使上意恐啓爭端已而敵又報使人更不差發上曰卿言乃驗于今豈非真廟謨哉十二年十一月為郊祀大禮使髙宗慶八十議典禮賞賚甚詳既被命撰尊號冊文又為禮儀使禮成轉兩官力辭恩許囘授十三年三月象緯告異求解機政章四上不允九月公喪長子求去愈力天語開勉又不敢去國史院進四朝國史列傳秘書省㑹要為禮儀使玉牒又進書力辭官進封魯國公十四年以旱又求去上一日以手札問樞宻非古制晩唐不足法欲罷之人吏併歸三省公奏廟謨雄㫁非臣下所及未敢輕對乞少俟籌度已而晝度夜思基命之地軍中稟承號令習熟見聞一旦更張非所謂振士氣又批貞觀開元兵强天下其視唐末密院豈係輕重哉公又奏祖宗規模既定難以輕改上令促擬指揮且曰此于兵將别無利害公奏唐之盛時兵柄在外藩鎮權重不無疑貳故置監軍事從中覆後患其難制又建本兵之地謂之内樞天子臨朝親加裁決實收天下兵柄以制外重于軍中豈無利害與其行而中輟孰若小忍以待大業之定其事遂已髙宗不豫公諸依唐貞觀四年典禮權不視朝以見不遑安之意逮升遐扈從于徳壽宫門外一時典禮皆參畫成之充撰諡號冊文官及陵名廟號充上冊寶禮儀使公撰冊文號大手筆稱天定諡衆説競進髙廟之號公力主其議及定永思陵名因山之役事緒非一皇太子參決庶務于議事堂調䕶尤多兵部侍郎林栗乞增置遺補御筆欲除薛叔似許及之二人資序才望相當否密具奏來公復奏曰陛下方修廢官遴選在廷難逃聖鑑雖非臣所敢預知然二人資序才望實與官職相當上乃出命葢孝宗無事不與公議如此者非一謹著其大者公又以親年益髙上章丐外議政復不茍同十五年髙宗祔廟禮畢請益力五月除觀文殿大學士判衢州内殿朝辭襃諭勞勉至于再三退辭東宫慰撫尤厚宰執百官郊餞奉版輿還鄉極衮衣晝錦戲綵之盛又以便親求閒秋提舉臨安府洞霄宫明堂大禮加恩積食邑一萬五千户食實封五千七百户十六年嵗旦諧鄉校講釋菜序拜之禮齒于韋布間二月光宗受内禪以詔書咨詢初政略曰卿曩以經術羽翼朕躬以徳業股肱聖父周旋政地十有四年凡國家利害生民休戚與夫因革損益之宜可以禆朕者其悉以告朕將受而行之公奉詔感泣遂奏疏曰初詔求言中外之臣咸得條奏不遺舊臣復加特詔臣受國恩至深至厚此而不言臣則有罪天下之事莫難厥初厯陳盡孝懋徳奉天敬民用人立政六事又言髙宗壽皇如堯舜而以禹處陛下又力言禹之所以繼舜者以對有㫖建節開府儀同三司㑹魏國薨候服闋日降制公執喪孺慕悲泣無時不肯少近滋味仲秋中使傳宣撫問賜内帑銀絹七百匹兩為賻公親具表謝纔數日忽語諸子曰六十有四卦氣已盡而衰苦衰病如此其能久乎主恩未報母葬未舉為恨耳遂乞休致口授遺表戒子孫忠孝無一語及他前一月大星隕于第至是神色不少變夜漏下一刻黙然而薨實八月十二日也拜少保致仕遺表上聞兩宫震悼輟朝二日贈少師賜銀絹一千匹兩親屬一人添差本路幹官以䕶葬官其子若孫七人䘏典甚備殄瘁之歎中外所同紹熙元年十二月甲申葬于婺城之北十里許隆壽之原紹熙二年贈太傅五年贈太師皆以諸子陞朝該大禮恩也娶何氏左奉議郎知温州瑞安縣紳之女封冀國夫人後公十二年薨子八人長曰模通直郎監西京中岳廟次曰樞朝散大夫新知岳州軍州事次曰機通直郎監西京中岳廟次曰樸迪功郎次曰棟朝散郎通判臨安軍府事次曰檝通直郎知紹興府上虞縣事次曰橚朝散大夫新知辰州軍州事次曰栻修職郎新監台州支鹽倉模機樸皆先卒女三人長適故宣教郎通判平江軍府事姚頴餘皆蚤卒孫男十三人儼承奉郎儀倫俱承務郎億將仕郎俌承奉郎脩承務郎侑仍承奉郎佖偃儔信倓孫女十一人長適廸功郎新建康府府學教授程珌次適將仕郎姚元特次適姚元哲次適從事郎信州貴溪縣主簿趙汝鍨次適將仕郎丁嗣延餘未行公神宇秀整雅有丰度清虛粹夷望之自是風塵表物加以問學邃深詞藻贍麗蚤步清要輿望已屬中雖邅迴晚乃際遇孝宗皇帝以不世出之資直欲鞭笞四夷以遂大有為之志一時進用多趨事赴功之人淳熙以來益務内治選任儒雅厚重經遠好謀之士而公為之稱首君臣相遇千載一時國家左右相之下則有參知政事右府則有使知樞密院同知簽書凡七府公獨遍厯以王端揆近所未有也孝宗聰明果㫁臨照百官公以寛厚精深調娯萬務守法度行故事大綱小紀持守無失取人才則先器識治民事則務優容理財則不為苛急論兵則尤極周密賞不遺勞而裁其濫刑必當罪而歸于寛中外之官各當其職方内乂安君相儆戒上無驕盈之迹下無危溢之憂至今言治者必稱淳熙之際焉天資謙謹輔贊彌縫而藏諸用者外人不得而見其所薦進能盡其才而避遠名迹若不自已出葢有受恩而不自知者沖澹寡欲自奉至薄食不重味衣至十年不易素不喜酒外物一無所好屏絶聲色之奉一意篤學聚書數萬巻無所不觀雖機務業委退坐靜室飲食亦不釋巻夜則使子弟讀而聴之制誥尤有體要一時文學之士皆出衡鑑上選詞臣必以密訪之有詩文制草奏議四十卷藏于家聚族餘百口上奉慈親既極其誠敬友愛諸弟任子恩先以及之撫息遺孤居無惰容家人不見喜愠之色不治生産門無雜賓功緦之慘素服盡禮皆當于古人中求之鑰不肖再㸃朝行負丞太府忽有容臺博士之除上問班序反下若左遷者公奏議禮之地最當擇人而近嵗乃以序遷臣所以為此者欲重其選也鑰何足以當之有以見公知遇之深雖以私諱不及就職至今不敢忘公之薨一紀鑰之投閒亦久矣樞等以行状為屬將以上于太史氏仰惟公之備道全美宏才遠業鑰何足以知之謹叙次爵里履厯行實之大槩參以見聞而書之葢公之為善不可勝書徒恐辭費又不敢以溢美也嗚呼髙宗擢之言路不及大用孝宗眷倚最久經綸未究而乞身以去光宗以舊學之重待以為政而公不勝喪矣此搢紳之所重歎然自古稱君臣遇合之難而善始以終者尤為罕遇如公之受知累朝哀榮終始士之致身至此者有幾亦可以無憾矣謹状攻媿集巻八十七欽定四庫全書攻媿集巻八十八宋樓鑰撰行状敷文閣學士宣奉大夫致仕贈特進汪公行状曾祖元吉不仕妣何氏祖洙皇明州助教累贈正奉大夫妣陳氏累贈太碩人父思温皇左朝議大夫直顯謨閣致仕累贈少師妣王氏封恭人累贈越國夫人本貫慶元府鄞縣武康鄉沿江里汪大猷字仲嘉年八十有一状惟汪氏派出黄帝得姓尚矣然自厯代以至本朝未嘗有一顯者宣城鄱陽上饒四明諸郡大率皆出于新安英濟王廟食千載後裔繁衍宦路相遇多講宗盟祐陵時大司成澥以耆儒名翰林學士藻以文章顯嘗謝司成薦舉止用張衡思𤣥賦汪氏龍魚及檀弓童汪踦事且曰遙遙譜牒之相傳没没衣冠之不振雖更魏晉之遠莫厠崔盧之間槩可知矣丞相伯彦首相髙宗遂為佐命之臣紹興間簽書樞密院事勃樞密使澈俱至大位子孫宦達相踵端明殿學士尚書應辰以重名崛起雖不至公輔而道誼風烈足為一世師表此其尤盛者也公以文昌舊臣厯仕四朝康寧耆艾獨殿諸老抑其次焉今汪氏所在衆多幾如王謝家豈族姓盛衰亦有待于時耶公之曾祖處約而有士君子之行受知范文正公王荆公正奉為鄉先生文行淳備沾丐後學少師紹興初為太府少卿兩浙漕使風誼尤髙搢紳推重生四子公其仲也始越國方娠公之從伯父夢應真受生産于叔父吏部鄞縣丞之官舎生而岐嶷骨相頴異四嵗誦孝經能對客問學中所講論語孟子輙述口義以示同舎一日千里儕輩皆畏之紹興七年以少師遇宗祀補將仕郎調右迪功郎衢州江山縣尉公漸漬義方曉暢吏道若老于州縣者所部百人黙識姓名及幹力之優劣輙得其用分鄉警捕境内肅然鉤攷滯訟㫁之以理嵗在甲子洪水稽天發廩為粥以食避水者又取鹽商大舟救之存活為多時方申兼經之制以嘗試南宫公餘肄業再薦漕臺遂中十五年進士乙科秩滿闗陞左從事郎為婺州金華縣丞處事益明期限必信文引可以質錢至有以潤其屋者豪民陸氏析産嚚訟案牘紛積公詰其要謂祖屋枕山長兄據其前而使諸弟由山蹊以出公曰此最其不平者按圖更分已得要領又訴義遜及贍塋嫁姑之厚公曰爾父兄同力起家義遜有法奉先冢嫁諸姑豈得不厚一婦以衆錢買田託以嫁資公攷婦家户籍不滿半頃復取均之且諗之曰若送所司一門無全人至親不復可相見汝家破矣命講長幼之禮歎服而退時户部侍郎李公椿年建議行經界選公為龍游縣覆實官約束嚴峻已量之田隠藏畝步不以多寡率至黥配盛氣臨人無敢忤者公獨曰愚民不識弓步不善度量若田少而所供反多須使之首復乃可並行李公問當何如公曰凡有不實許其自陳俟驗實與改正悉皆施行受賜者已不知其幾既至躬行阡陌唱弓量之目則已黙計其廣袤之實吏運籌久之無毫釐差觀者以為神凡事俱有方略邑人鼓舞旁縣皆取為法事畢躬納圖帳李公又欲以十保合為一圖仍與鄰都犬牙相入公曰一保之圖用紙二百番已無地可展又從而十之不惟不能圖畫亦安所用之徒重勞費無益于經界也由是諸郡俱免催科辦事談笑而了不失忠厚二十年丁越國憂星奔哀毁悲動行路服除為嚴州建徳縣丞二十四年饑民嘯聚熾甚守禦調度多出規畫以訖無事分都賑給衆中指一夫詰曰是某都某人也葢居兩都之間而冒請者械繫于前餘多引去事已徐釋之又嘗遜薦牘辭受輸皆人所難能明年用舉者改宣教郎知平江府崑山縣旋遭外艱既造朝有達官使獻生財之説將用以為薦公曰財不可生也生財者必害于民寧甘心寸進耳遂謝之差總領淮西江東軍馬錢糧所幹辦公事金亮犯邊饋饟王師髙宗廵幸供億百出公佐其長以辦羣工扈從咸知公名三十二年賜緋魚袋改幹辦行在諸司糧料院文書盈几目不給視公間摘一二無不切中老吏驚歎謂未有也或言𣙜貨務左藏庫有羡儲朝㫖以諉公躬自檢校得其實以對隆興二年四月參政錢簡肅公宣諭淮東辟為幹辦公事九月改充參議官内禆幕府外按邊陲海泗唐鄧之棄錢公執以為不可公亦贊之雖不得盡行終免倉猝之變者宣諭司之力也遷大宗正丞乾道元年兼吏部郎官主管侍郎左選又兼户部右曹有蜀士理和糴酬賞吏必欲以小節取㑹公曰在法有旁照可驗許比類而行即取其同類者併上之省吏沮抑尤急公力爭之自是始為定例六月輪對錢公先薦于上乞與之言察其人物公奏總覈名實責任臣下因才而任毋違所長量能授官毋拘流品又乞表薦宗子隨事録用止注目久之謂輔臣曰疏通詳雅有議論今日有用之才也除禮部員外郎公自登第嘗習宏辭科應用之文足以行意在州縣時守將多委以箋奏南宫名表一出士林誦之此外無他職務同列言于廟堂謂公撥繁治劇有餘而清簡太甚丞相洪文恵公以此諭公七月遂兼吏部侍郎右選九月除吏部郎官主管尚書左選莊文太子初建東宮妙選僚寀是月以公兼太子左諭徳太子侍講兩日一講孟子多寓規戒莊文深所欽重嘗出龍大淵禁中所進侍燕樂章諭宫僚同賦既退公謂同列曰燕既不預無以措辭若出于御製或儲禁為之猶可賡和鄭衞之音近習為倡非講讀官所當預也白于太子而止二年為省試參詳官參政林公安宅以户簉同知貢舉就除諫議大夫自言去場屋久以攷校事屬公公為之恊心焉訖事日欲邀公議論辭不徃林既罷政獨免于評議六月除秘書少監髙宗聖政書成進讀于紫宸殿徳壽宫道山清髙領袖名士職當修神宗以來㑹要而曠嵗不舉深懼典故散逸率屬分纂上聞之為置局命宰臣提舉書奏五朝之大典始備金國來賀四年正旦借吏部尚書為接送伴使上閲語録見公敏于酬對處事有體滋嚮之尋兼權刑部侍郎六月兼崇政殿説書八月兼權給事中孝宗厲精民事訪問不倦宿直玉堂夜宣對選徳殿賜坐從容導公使言時欲遣察官決獄畿邑公奏使果有滯囚亦且先次決遣事體太重徒擾諸縣必又甚于監司之臨按不得不謹于始遂改命通判以行公首以一言移主意自爾每遇夜對上多訪以時事嘗曰卿為侍從天下之事無所不當論朕毎厭宦官女子之言思與卿等款語正欲知朝政闕失民情利病茍有所聞可極論之公悉進所欲陳者奏對明白曲盡情偽上多聳聴而行之其造厀啓沃之際若講義進故事論治道之要具有遺編亦或削藁而不傳惟見于事功之實者謹書之以池饒信建水災乞用澶州劉渙收買耕牛之法令州郡廣收糴以備賑糶論役法則陳一鄉通差物力均差均錢雇人官户例減限田之詳又别白里正則専主烟火盗賊耆長壯丁則催科承引今取耆長雇直撥入經總制司並縁法意里正承役之初抑使兼充役者受害為甚至死必爭又乞改定役法未可輕變廣求衆議而後可必須遲以嵗月若欲寛其困苦當先嚴禁誅求又論亭户不充役次以鹽折税或有未嘗親熬波之勞居近塲監貸錢取息射利為厚且三公尚有限田而此曹獨無定數反受官户隱寄又均和買于編民欲將家産及二等以上依官户充役又論給賜勲舊近戚以田一得指揮豪奪占據桀黠者妄指官之籍没民之户絶者以為獻藉勢陵轢州縣至不能誰何寧忍恵及一家而使人重罹其苦自今惟當錫以金帛使自求之又論籍没財産止可行于强盜囊橐官吏犯贜之人然朝為富室暮為窮民流離凍餒已自可念至有倉庫綱運負陷官錢而致破家者宜有以處此欲應以欠負拘産不在給賜出賣之數計其租入償欠既足則以給還使復故業以至廢鄉村私立税鋪罷官監酒坊及陳萬户酒之䇿嘗因輪對論銅器之害則曰産銅之地不發浸銅之水漸涸鼓鑄重費楮劵弊深洩于邊境而法不嚴壊為器用而官不問若立用銅之罪重于銷銅之人居官而使人為器用者坐以贓私罪則法乃可行論捕酒之害則曰民户遭劫盜者猶有官司可告盜既不敢肆毒鄰里亦得救應今捕酒者空人之家鄰里至前則誣以拒捕官司不復明白則是捕酒之暴甚于劫盜也殺人者罪止一身而老幼自若今一遇捕酒舉家拘縶非法受苦則是犯酒之罪重于殺人也大率公之論事皆深切著明攷究詳備玉音嘉奬嘗曰卿前後所言皆今日可行之事臣僚所未及一一付外雖議有不同不盡見諸施用亦有遂著之甲令者五年再為參詳官四月除權刑部侍郎兼侍講職千秋官二年餘孝宗垂意刑章哀矜庶獄公乞重修法令謂中興之初首立詳定一司自建炎四年六月以前著為紹興法今四十年多編集監學貢舉常平茶鹽等一司之法而一代條章因革損益迄無成書敕局官多吏繁俸優賞厚因減宂官遽行廢罷舉數十年之法一切不省建炎以後續降指揮二萬餘條若不刪其繁重定其當否有司率用新制而棄舊法日移月改輕重舛牾無所遵承使舞文之吏時出而用之以售其姦及今不為久益難攷乞明詔盡行編纂命大臣典領而選廷臣討論庶幾筆削必當以杜吏姦以一民聴上極以為然即令條具仍差大理二卿本部三郎官寺丞司直各一員公遂兼重修敕令詳定官此四年之冬也他官去留不一惟公疚心修定以為己任推舉詳明通練之士以自佐訪求舊吏網羅故牘若一司一路専法不係海行者即釐送之一時申嚴或雖係續降尋即衝改者即刪去之于見行法中增損元文五百七十四條帶修創立者三百六十一全刪舊文八十三存留照用者百二十有八墨書舊文朱書新條年餘書成進書之奏公所草也謂將前後續降參以累朝法意酌以四方人情攷訂編入各有看詳案冊明言去取之因而例不以頒降欲申敕有司凡州縣于新書有所未曉許條具申所當以元修因依行下孝宗取進本列于選徳殿之左右朝夕觀覽嘗宣問所疑隨即奏對上又取條冊指問與所奏俱合嘉賞再三曰文字繁拏不易盡記留意所職乃至于此對曰此法將與天下共之況屢承宣諭敢不盡心他日又問如初遂亟稱于宰執有忌公者遽入譖言賴聖明不以為信爾後屢更修定今凡再易矣其規畫大率循公之舊而精力不能逮也上又嘗問本職事刑罰黜陟豈無過差公因奏温台大水郡不以聞使之具析以守臣王之望嘗為執政陳巖肖為從官特免違慢之劾乃移罪二漕各降一官上云亦覺未是待作一名目改正公又奏知其未是當明以示衆若别作縁故則前失仍在不若徑改之有㫖改正又奏知信州趙師嚴補糴前政所虧常平米方及半而坐擅用鑴兩秩永不得任親民提舉李庚巳嘗申明送饒州取勘亦以不行檢察坐之且不得與監司雖欲示警而皆不當其罪案上皆得追改前命辯台民楊大任匿盜而能告捕不應坐以越訴即依條給賞仍免其罪論一案推結之法屢變㑹問無期獄訟淹延即令别行立法時尚書周公執羔韓公元吉樞密劉公珙以强盜率不處死無所懲艾侍郎林公栗為右司謂今之强盜非親下手已殺人者類皆不死請依太祖舊法贓滿三貫者皆斬公恐遂行曰此吾職也遂具奏曰強盜豈可恕用舊法而痛懲之何為不可惟是天聖景祐宣和以來益用中典太上與民更始非以刃殺人者一切貸死遠近歸心循襲既久寖失禁姦之意今已議為法六項犯者依法處㫁非此而但得財惟再犯者死可謂寛嚴適中矣此輩雖愚豈無黠者為謀知有可生之路志在得財而已所全尚多若不分首從雖不殺傷悉皆抵死則凡得財鮮不及三貫者此法既立未必能禁其為盜彼先以死自處則被盜者將無噍類為盜者無復全人究其極而計之死者益衆矣陳公良祐為諫議大夫請取案例公以見定一案聞奏用六項法則死者十七人用見行法則纔四人若如舊法則百七人俱死遂從公議借吏部尚書為六年賀金國正旦國信使歸至盱眙得印榜云今後犯强盜並依祖宗舊法所有六項指揮更不施行到闕未及結局即以不得其職自列求去上聞其詳即日復行六項之制至今遵用焉有請以大辟奏案如情理可憫即上朝廷若情法相當者止從刑部審覆行下公以為既經奏聞非有司所得自専當依舊例擬㫁降㫖處分尤見詳審欽恤之仁監司按發官吏不得送置司州軍根勘紹興之良法也久而寖紊為弊亦多公申嚴之使見有違戾者並行改送勘院翻異當究問其詞具申監司有詔物價騰踊以絹定罪者毎匹增為三貫公乞以錢定罪者亦如之其明罰敕法助聖朝好生之徳者未易悉數也使金之役權要為輔行公在朝累年于人甚周而介然有守未嘗與之通至是惟議使事相處亦不為異惟不能過為奉承事已又疎之衆服其裁正而其人自此不相樂矣時孝宗方欲經略中原使囘者或承順㫖意過為大言公歸首以為問因具陳經行所見聞者上曰如卿所言則未可為攻取計耶公頓首曰誠如聖訓今日豈可輕動且湏益務内治以俟機㑹耳玉色不悦公又曰臣不敢妄論迎合聞者以為名言七月除權吏部侍郎九月兼權尚書再置敕局兼詳定一司敕令先少師嘗為吏部郎仕者脱兵火亡失文書訴者日集躬為辨析吏不得蔽建請改官状五紙之外許令改舉聲績卓然公少親見之自為郎嘗厯三選以至長貳清通簡要兼古人之長建明尤多率以先徳為法或曰今日凡事從窄非曩時比葢有務為沮抑號能任怨而至顯用者公曰方且鄙之何忍效尤乎調官陳詞者多孤寒之人于此不為留意使不得其平尚謂之銓衡耶由是鬱者得伸滯者得速求者得遂人人感悦亦未嘗屈法以從人其有不可明以告之退無所恨辨宗室及陣亡人女夫不當在七色之數乞恩科權官選人願致仕者請以厯過嶽廟為攷修正川廣定差之弊命官被訴不經勘正者免闗刑寺注籍以妨差注縣令臧否欲俟其任滿奏聞案後收坐不當之人止就部檢照免行下取㑹又條列部中留滯節目附赦施行皆欲去弊剔蠧使選法流通以為公私之便中使嘗夜傳㫖學士院袖出資治通鑑一冊指唐沈既濟論選舉事曰今日有無此弊其説可與不可行來蚤面對退即呼燭草奏既入先厯陳數項謂事與今異弊雖似之其言則難行上曰卿言甚明更試一言因奏正恐言不能盡曾筆于紙深夜書寫不謹上即令展讀讀畢不敢留中退至廡下又遣宣取且云更欲詳觀可遂留下宸眷日隆㑹當郊特差充鹵簿使人知枋用有漸而忌者愈甚竣事力求外祠上亦知之七年正月除敷文閣待制提舉江州太平興國宮侍從館閣諸公賦詩留題以餞行色今石刻存焉還鄉四月起知泉州到郡遇事風生不勞而辦郡實瀕海中有沙洲數萬畝號平湖忽為島夷號毗舎邪者奄至盡刈所種他日又登海岸殺略禽四百餘人殱其渠魁餘分配諸郡初則毎遇南風遣戍為備更迭勞擾公即其地造屋二百間遣將分屯軍民皆以為便不敢犯境後左翼軍狃于盜賞忽又報侵犯徑捕至庭自以為功公曰毗舎邪面目如漆黥湼不辨此其人服飾俱不類何耶察之乃真臘大商四舟俱行其二已到餘二舟以疑似被誣公驗其物貨什器信然軍人猶譊譊不已公諭其將曰使真是寇賊固不應縱捨既知其為商旅又豈得陷以深文始皆退聴即使盡入來遠驛所販黄蠟償以官錢命牙儈旬日間遣行軍屯城外有入盜庫銀者踰垣而出為邏者所偵反執而歸誣以為盜而上之郡公已得其情仍械邏者使參對失銀十二鋌得十而遺其二主將辯數甚苦公不為動已而軍士首伏即其所窖取之皆伏辜微公明察善處則俱失其情矣蕃商雜處民間而舊法與郡人爭鬭非至折傷皆用其國俗以牛贖罪寖亦難制公號于衆曰安有中國而用畨俗者茍至吾前當依法治之始有所憚無敢鬭者三佛齊請就郡鑄銅瓦三萬片舶司得㫖令泉廣二州守臣監造付之公上疏極論其不可既犯中國之禁又為外夷所役獨不與南外宗正司廪給嵗廣久以為病公撙節用度増價以糴民始免于茍取公再嵗兩求奉祠九年以治行尤異除敷文閣直學士再任賜衣帶淳熙元年申前請始有興國宫之命歸次延平除知隆興府兼江南西路安撫使赴闕奏事甫入國門即令引對臨遣甚寵江上有篙師謀害主人而據其女因有資財女聞公威名密告縣令公為究治得主人夫婦二屍于神祠之傍寃始獲伸吉民王氏雄于財怒武尉之不容冒佃官地誣訴于州尉不屈夜歸過其門使人折其足事逹帥憲公同奏其事且謂父子皆以貲得官恐從末減無以懲姦乞先除其名孝宗閲奏震怒徑下所勘建昌軍皆黥配嶺海併坐推吏之受賕者江右無不快之五月茶寇賴文政等起湖北自湖南向江西帥司即令境上防託江西所恃惟贛吉將兵亟遣未及而賊已入境與吉兵遇一使臣死之以湖南曾戕官軍至此又小勝止為逃死之計遂據禾山洞公遣副總管賈和仲總數州之兵以討之和仲老將意頗輕敵或已議其狠愎難任然兵官無踰此人者未及出門而得㫖果以委之主帥調發而簉牧領兵職也武人謂朝廷専委凡事寖不相闗一到賊壘暮夜驅迫將士入山反為所覆不可復用又遽遣約降至折箭為誓人知其為詐而不寤賊立旗幟為疑兵由鳥道竄去兩日而後知之六月初有㫖湖南令帥臣王炎節制如已入江西即令賈和仲綂率四路人馬討捕是時猶未委公及和仲輕舉妄發將兵已潰賊勢日張則乞就委江州都綂制月末始得金字牌令公節制大暑中兼程而進洪至吉七百里勢不相及賊亡命習險阻常隠叢薄間弓矢所不及官兵驅逐接戰十餘殺傷相當多猝遇于陿隘之處交鋒者不過數人餘已遁去不知蹤跡使荷戈被甲之士與之追逐雖欲列陣併力有所不可既逐入廣而又復囘初就招安列六百餘人後止餘百輩則知所喪已多勢既已窮而有許抜身自首指揮間有禽獲者亦言本非兇逆若開其生路必來降矣遂以小榜具載指揮募人入賊賊云望此久矣茍得曉事文官來即當隨徃提刑辛棄疾同議遣士人借補以行而公已罷盡復逃去未幾興國尉黄倬請行正合前説遂降公初以和仲敗事自劾降龍圖閣待制㑹有為和仲地者又降集英殿修撰後帥既以儶功受賞公遂落職南康軍居住至四年自便十二年始得外祠十三年髙宗慶霈復龍圖閣待制十四年再奉祠十六年提舉鳯翔府上清太平宮紹熙改元盡復舊職二年致仕兩朝即位之初皆有詔求言上又賜詔書撫問賜銀合茶藥公退閒既久無復用世拳拳憂國終不弭忘疏論天下事各數千言慶元五年十一月朝家優老特除敷文閣學士賜衣帶鞍馬六年秋初感疾七月庚辰薨于正寢遺奏上贈四官官一子娶樓氏封碩人先二十七年卒于隆興男三人端中奉議郎兩浙西路提舉常平司幹辦公事立中宣教郎知婺州武義縣丞沿檄歸省弗可久留方將丐祠就養而公亡矣􅔲中將以遺恩補官女四人三蚤夭一適奉議郎知福州永福縣事樓鏘孫男四人之翰承奉郎監嘉興府華亭縣市舶務之幹之輔之範碩人以淳熙五年葬于慈谿縣石臺鄉龍潭之原諸孤將以十二月丙申奉公之柩合焉禮也嗚呼公之為人幾于全矣少而孝弟稱于鄉黨長而聲譽振于塲屋入仕則公勤亷恕施恵于民立朝則忠諒精白結知于君用雖不盡退而居鄉髙誼特達四明素為義郡至公而忠厚之風益盛焉天性樂易于人無不容而風裁自髙截然有不可犯者其在朝行史文恵公有同年之好錢公知奬最深魏成公少小相處如兄弟蔣丞相同為宫僚王侍御伯庠實為姻家前後同時公樂于平進既無附炎之迹又不涉于指議公精敏而寛和處事有體其在禁路尤為梁文靖公陳正獻公及今少傅周益公所知惟虞雍公與史魏錢三公不咸雅不相樂徐而避之孝宗察見隱微幸保終始方龍曽鼎貴一時諸公不事孫劉者葢寡龍在閤門聞諭徳之除亟稱以為當有史官坐中問曰亦與之熟耶龍曰在此未嘗徃來某少為三衢兵官只見人説江山汪縣尉之賢如出一口聞者益以此服公之介曾向有簡驩之嫌隆興之屢貶南康之久謫既歸而八年不得祠多其力也時碩人未葬豈不念歸史公風公通書修好謂求進則不可不爾恐梗歸計公歎曰若能為此前必不致相失竟達空函貽羞千載老矣一聴天命耳後得善脱史公深歎美此節每以語人謂不可及南康之行親戚恐公未免攖懐或致摧沮公方挹送行者曰使某年近六十以恩科得官今赴星子一尉豈不為我賀其曠達類此既至樂廬山之勝杖履徜徉登臨自適若將終身者借書郡庠益沈酣于史冊上下數千載興亡大槩下至稗官小説罔不該究塗中和淵明歸去來辭平易精切視前輩無媿佳處或出其上遇觴容則使歌之王魯公謂公不求復用公聞之曰求之廟堂而辭之君父非自欺乎既登七十即抗章引年求致其事朝論以為髙又予之祠再申力請其後諸公相繼得謝遂為清時美事實自公發之尚書鄭公丙貽書曰公少某二嵗先吾著鞭矣始少師以深仁厚義稱于世嘗曰事事上行方便物物上有利益此吾志也公又能推廣之少師奉先塋素謹公之葬二親皆力貧襄事規橅宏大纎悉周備鄉人視以為式既畢窀穸假貨經營久而冢舎方就廬居終喪拜埽之外諱日必親薦羞于山間南城祖隴外家王氏奉川諸墳一一經理可為永久三妹尚幼竭力嫁遣俱得所歸聚族寖衆闢先廬房宇百餘楹皆身任之内外百口獨當家務出私財以佐用者二十餘年凡公所得盡為諸院公費又以及女弟之貧者二外孫既孤收養至今官賦輸送皆親為之不以累兄弟又得整辦無一金之負少師既任諸子晩嵗一以及伯氏長子行中次當及公位以伯氏子衆推以與次子積中尋又奏其二子得中稽中又及季弟江州之子敏中既拘限員將復與叔弟之子闡中而不果然終念之厥後江州沿公之意命以一官甚愜初志而公之孫今尚有白丁焉兩宫聖節非有疾未嘗謁告子弟之已仕者必使之俱行曰汝曹世受國恩終嵗閒處獨不能以頃刻之勞效後天之祝乎宗黨有急以公為歸産業素薄僅足自給納禄之後用亦寖窘隨力周施嫁人之孤女葬貧者之喪不知其幾敘宗盟及累世外門姻黨宗派條列號興仁録以遺子孫使之不替親好豫營美檟嘗輟以予人至于再三無靳色家有一池鄰里來汲每歎曰安得有財如水以濟人之欲乎力既不及遂率鄉之人為義莊首割二十餘畝以為倡衆皆競勸至三百畆又得郡中益以絶産二頃凡賢士夫之清貧身後不給者量多寡周之買地立莊于城西門之阿親為約束防閑曲盡可謂無窮之利庠校自兵火草創嵗久寖圮勸率巨室且為之文謂崇釋老之居以徼福不如新夫子之宫以助風化首創儀門聞者不約而趨黌舎一新冠于東南冬至嵗旦序拜有規主盟斯事少長以禮推年長者為學賓遇釋菜則為祭酒自編于布韋之間以為一鄉矜式凡里中義事率自公倡之賓客造門必與鈞禮不問遠近必親謝其門性不喜飲而好客觴豆不至過豐而情意周備嵗講壽席自為歌詞皆安分知足之語人多傳誦㑹者不下百客手自勸酬連夕不厭貤及僮僕無不霑給間赴宴集必盡主人之歡危坐笑談雖達旦不先退真率之約觴詠琴奕未嘗以爵齒自居此皆終身行之後生之官多以巻軸求教公樂于訓誘隨所職一一以告能行公言者多著能稱真一代之吏師也成就人固多矣而薦舉非名士不預樞密大資政葉公翥方為掌故公一見識抜于稠人中尚書錢公象祖侍郎劉公孝韙史公彌大經略潘公畤屯田鄭公鍔簽判沈公銖皆卓然者其他汲引光顯于中外有知人之稱晩更篤學如少年書生有適齋存藁二十冊觀書手抄曰適齋備忘十七冊取唐宋名公詩集編為詩韻四十冊又有漫録訓鑒等書端中等方㑹稡俟他日鋟木以傳今藏于家鑰曾祖金紫娶翁氏公祖母陳氏翁陳出也兩家少師為表兄弟行又甚相好先君工部遂締姻焉公之碩人又鑰從伯父之女交婚至今如朱陳然先君依甥館鑰輩生長外家䝉外祖教育之賜事諸舅如諸父受知于公尤深且久公為禮部秘監時鑰留侍側䕶客使金皆許侍行晩而僥倖與表兄華文閣直學士陳公居仁繼登從班居素切鄰公既謝事而鑰得奉祠六年之間有行必從有唱必和徒步徃來殆無虛時劇談傾倒其樂無涯去嵗老母年九十公少十嵗鄉閭合慶元夕之後簫鼓相聞暮春方止嵗晚公既為真學士老母亦進封信安郡太夫人郡奉詔㫖均致粟帛羊酒之賜皆為一時之盛平時慕白樂天之為人仕俱至尚書白以五十八歸休猶一出為京尹公之歸又先二年而壽過之以適名齋宜靜名室畫履道宅圖于屏且書池上等篇于其顔後又易以無可奈何之歌詩造平淡能道人情曲折和達哉樂天行等篇置之集中殆莫能辨也鑰嘗與公同閲石林避暑録話論樂天事甚詳公厯言出處大槩慨然而歎謂吾非敢追配古人而大略偶似之鑰遂録于冊益公見之賦詩甚工以公比樂天尤切公曰雖不敢當然足為不朽之榮矣遂礱石寘適齋中公既有疾時問安否一日奉版輿過公笑語竟日不見少異纔隔再宿有報公之疾變者亟走牀下則已不可為矣藥石禬禳皆所不及嗚呼公豈厭塵世而徑仙耶何去之速也内行修飾名節純全壽考令終幾無可憾惟仙風道骨必謂上壽禍起非意最為驚痛聞公之亡者無問貴賤大小駭怛赴弔相向而哭俱為盡哀鄉之達尊郡太守而下至庠校之士相與設奠而寓哀于文皆盛徳之感也鑰痛徹肺肝固已不堪若太夫人之悲慟罙不忍聞行道之人所共歎也諸孤以葬日迫近未遑求銘于當世儒宗俾鑰敘次行事竊自維念愛我撫我莫如吾舅而知舅之詳者亦莫如鑰公之名位至此小官時事不必屢書痛惟侍坐之次公厯言入仕之初以至通顯凡經區處者嵗月姓名一一不忘聞見所及既不可勝書謹擇其可法者備載之不嫌于詳也他日定謚法秉史筆者庶有取于斯焉謹状攻媿集巻八十八欽定四庫全書攻媿集卷八十九宋樓鑰撰行状華文閣直學士奉政大夫致仕贈金紫光禄大夫陳公行状曽祖砥故不仕妣林氏祖嘉謨故贈右朝奉郎妣黄氏贈安人父膏故任左朝奉大夫太府少卿累贈特進妣蔡氏贈安康郡夫人汪氏封咸寧郡太夫人贈新平郡夫人本貫興化軍莆田縣崇業鄉孝義里陳公居仁字安行年六十有九状惟陳氏胄出姚虞為世著姓後漢文範先生以來世系蟬聯皆可推攷七世祖司直避五代之亂自光州徙于泉之莆田國朝陞邑為軍至今衣冠不絶特進宦游聯姻四明遂著籍慶元之鄞始特進來依甥館公以建炎己酉生于奉化未及月而寇攘蠭起親黨竄伏窮山公在襁褓不作一聲同行相與言曰此貴子也少長頴悟性不好弄厚重如成人十嵗已學屬文特進以文章氣節望于朝始分教汾州佐延康張公克戩守城捍寇知恵州值曾衮之變徑至賊壘譬曉之賊氣奪而降為御史四明有僧法恩謀不軌而事覺或請屠城以示四方力論多殺非聖世事得㫖赦不在法恩之籍者又爭之謂籍餘萬人其實不足稽據況皆脅從願悉寛宥兩州皆賴之其大節如此宜其有子也公幼時侍立聞汾州事能憤然激烈特進為泣下且曰此兒當大吾家特進嘗語之曰似聞欲以我使敵固不憚行汝能任家事乎公曰大人恵州見賊時未嘗反顧今尚何念某雖幼敢不勉特進益竒之甫十四嵗而孤執喪如禮新平夫人挈以依外氏誓終靡他公尤盡孝養相倚為命勉之學益自刻苦有一日千里之敏外祖少師外祖母王夫人撫愛如己子以特進遺澤補將仕郎調信州鉛山尉連取漕薦紹興二十一年登進士科特進舊與秦丞相投分至密時御史多由此大用嘗風特進論一二大臣堅拒之而抗疏求外坐此左遷而弗能害也時秦公威柄方盛喜公取世科或勸一見可得美官公曰是有命焉終不自通鉛山當孔道盜賊出没公設方略部分而厲使之盜不得發嘗以公事忤泉使及行縣以威脅公公請納告辨白退束裝以俟劾使者竟負媿去繼之者翻以此知公授永豐令改監行在㸃檢贍軍激賞酒庫所糴塲隆興元年孝宗修髙廟聖政妙選僚屬時參政范公成大為和劑局與公皆自筦庫中兼檢討官二年攷滿當改秩既已進巻丞相壽春魏公使金公嘗學事之辟公為書状官時和戰未決敵兵在淮北人請恟懼公以身許魏公至境上議久不定突騎大至上下失據公欲上馬猶從容舉酒告魏公曰先生冒寒且釂此觴觀者壮之既退京口尋復北向真所謂飛矢在上行人在下遣諭敵兵開道而入皆引滿以待魏公察公無懼色唶曰仁者之勇也卒遂成禮減嵗幣而還公之贊畫為多改左宣教郎以奉使賞轉兩官差充諸王宫大小學教授時魏公日貴乾道元二年間進秉國均公方忍貧需遠次閉門讀書未嘗求進初虞雍公一見竒公欲引以為用公不欲就六年始赴又導公言兵謝不能退以書抵之謂有定力乃可立事若徒為大言終必無成幸成亦旋敗雍公為之動色踰年始為軍器監主簿明年宗寺闕官競謀攝事以希寶牒之賞俄得堂帖權丞宰執謂公曰求者紛然擇不求者授之輪對奏立國之要在規模先定陛下非無可致之資而規模未立孝宗初頗不懌曰朕未嘗不立規模公奏陛下鋭意恢復繼乃通和和戰守三者迄今無定論不知何者為規模上曰此則隨機而應公復奏發號施令使人必信可也今朝令夕改人得一闕臨時更易尚不能保外間至有前降指揮更不施行已差下人别與差遣之類此不可以不戒以録本納政府雍公曰適已見之規模即前日定力之論某今益知此言之當也遷將作監丞國子監丞秘書丞再對奏文武並用長久之術陛下奬進武臣深得持平救偏之道正恐未必得智謀勇略之士或多便佞輕躁之徒又非兼用之本意上曰只為文臣太勝要當扶而正之又奏聖慮甚至但又不可過恐復至于偏勝又奏邊民盜馬事宣諭直㫖行下少蓬去位公専省事臺察奏太史局生所學淺陋請増三二書以試之公顧同舎曰國家禁此等書嚴甚不應用此増試無敢忤御史者公入奏上稱善即寢前議議者不樂公乞去相君堅卻之且曰上方譽美未巳將上則御史不安是年郊恩賜緋薦攝禮部郎中嘗奏論臺閣宜多用明習典故之士上曰知名之士試舉一二公奏如周必大洪邁久在禁林不待臣言李燾莫濟豈應棄之侯國上欣納甫數日首召李公尋再請差知徽州時朝行三數人以故去皆乞免對公不欲為異亦乞免謝辭上指曰陳某無他可令陛辭而行臨遣甚寵且曰方欲用卿乃遽求去卿其清省獄訟盡心民事政成當召又謂大臣曰陳某論事明練貌類汪大猷曽丞相曰是其甥也淳熙四年赴郡郡自五季楊行密割據刺史陶雅宿重兵賦入倍旁郡祖宗削平每下寛令又以山多田少米則輸八折十絹匹當重十二兩徽獨止十兩左帑忽加退剥守遽使如令民益不堪控訴徹聞上慨然欲蠲之出自睿㫁謂申舊制恐悍吏或能重為民病乃命並輸十二兩而舉郡所輸之數率十二匹而蠲其二以絶並縁之姦公適當其時官吏奉行過當揀擇太精公即諭告而痛革之時版曹威嚴無敢忤之者公貽書謂天子節經費以恵儉瘠不能推廣聖徳吏則有罪自今茍中度程隨至輙受敢豫以告已即自以名銜受輸植二表于庭有中度而遭抑退者抱所輸立表下老校抗聲以告親為分明之鈔至隨即批銷人無留滯吏不得揺手實恵確乎及下秋苗益選良吏減加耗之甚者石可四五升民徃徃裏贏以歸徽之政甚休而得民之深多此類又連嵗大稔米至不論錢民以為數十年所未有也郡有大溪嵗晏民未病涉忽鳩工造渡舟數十艘莫測所用梅霖暴漲遂得以濟始知公先事遠慮之效自是嵗一舉行抵今賴之既新軍資庫造閲武亭復于郡庠創御書閣甚偉皆取于餘財民不知役聴訟明敏剖析滯事情法曲盡或至千言鄰境有詣臺省願得公定㫁者御史府索案去官吏創見為之股栗公略不排比徑以授之御史亟稱于朝曰古之良二千石也既受代吏民遮留真有截鐙㫁橋者公由他道去父老或送别數十里外生為之祠去郡十餘年遇生日郡人必來拜壽後赴武昌取道郡中猶聚綵掲旗填擁道路亡慮千萬人非素有以感其心顧能爾耶還朝入對襃諭再三首曰新安之政甚好從臣臺諫屢為朕言且舉卿所㫁水利之訟為之賞歎不已奏劄四篇皆依奏付出其一乞編類隆興以來寛恤詔令有曰法久則易玩事久則易怠惟申加戒飭有以儆其觀聴則千萬年猶一日也上讀此數句至再曰可謂名言其二論絹賦匹數既減吏胥市例大有朘削恐後日復有苛取重擾乞加告戒上曰變法之初賴卿盡力方成實恵正恐後人未能遵守尋即御批行下本路監司常切覺察如敢違戾具申尚書省取㫖重作施行初在郡因奏五事末章極言歸正忠順過于優渥而戰士反輕雖曰猥多固自有十三處戰功之别此輩皆出萬死䇿勲之人今老矣添差已罷廪稍牛給至丐于市軍士歎恨有解體者乞明詔優恤以示終始念功之意堅後生圖報之心上覽之嘉歎㑹駕幸白石大閲即以是日出命再添差兩任衣糧全給三軍為之呼舞至是上又稱向來五事中論戰功事甚當此曹既曾為國盡死力豈應老不加䘏卿于職事之外能用心采訪尤見為國公遜謝玉色甚悦且曰便當用卿自是受知益深矣翌日諭大臣曰陳某詳練敏達為政極有聲奏論又切當且留為郎以俟用遂除户部右曹郎官㑹要書成奏篇適在除郎指揮之後特㫖轉行朝議大夫且語丞相曰治行方為天下第一一官不足道嘗兼攝度支貳卿欲援嵗例從南帑借貸公曰用度方殷援例或不從則無䇿去嵗明堂借撥左帑金帛莫若徑乞撥還上初以借貸不可為例知為還撥即許之貳卿曰公之先見乃爾耶再兼禮部㑹樞屬闕員方以著庭名進擬上曰陳某今何官對曰今為郎上曰豈有人才如陳某而可久為郎乎即除樞宻院檢詳諸房文字二樞不受私謁差遣恩例悉令投牒送檢詳所公為之攷令甲酌故實可否立決右選翕然歸心年除嵗遷徧厯左右司三年至中書門下省檢正諸房公事天下事上于政省者無不闗都司公處事明審持心忠厚議論寛平咨白又為明暢執政曉然易從間有不可隨事辨析終歸于是乃已退亦不以語人諸公由是開心相予綱餫調撥展轉失序謂如湘潭來赴昇潤江西卻上荆鄂之類道里回遠費倖滋繁公盡搜故牘攷閲程限擇其便且順者更之計嵗省導行費等百餘萬緡賞典不預軍屯得米既便且速嘗因輪對及之上曰非卿忠于體國誰能及此又歎曰似此非一端本為貪賞如此鄭重人樂因循故不能改耳荒政方急事有便民者立為稟行徽旱尤甚蠲放至八九萬緡嚴婺亦且十萬㑹有論徽饒二守捄荒無術又有言流移多二州之民上震怒皆至追停自是守令罷者相踵公奏長吏不能奉行黜免為宜但送迎費重文書㫁絶職業且廢今既罷去其太其者餘或有聞請姑從鑴秩以責來效上深納之先是文書之下六曹指定勘當者三日之限或逾月不報公擿其尤者繩之長貳徑白宰府請從闊略公曰六卿雖尊事在有司安可慢令吾位固卑所以糾六曹者安得以尊撓法卒治之朝綱為肅刑房獄案如山翻閲不倦一以平心應之謂有罪幸免則寃者何告以故平反雖多而無失刑士夫陳理恩賞改正過名有所拘閡者一至都司鮮有克濟公曰吾豈賣恩者若一切沮之則吏愈弄權失職者何賴躬自疏白不以屬吏有任滿賞為部吏所格者公詰之乃曰指揮中有自今後之文公曰前乎此後乎此者皆得之矣指揮本欲從寛今乃為汝輩舞文之具耶徑為放行且請刪此三字以絶吏姦又捕盜賞有執續降為言者公曰格改之法不可用乎吏駭服大禮之後埋雪紛至公為之裁訂擇取七一皆當改正丞相難之辨論數四艴然曰檢正自將上則可公曰丞相以為多耶某于二百人中精覈得此皆坐罣誤而沈抑者願推内溝之念而行之固爭不可退各疏其冤状且欲引去丞相徑以公手疏者將上上一閲之即曰陳某精審尚復何疑便與施行廟堂嘗啓擬某人能文上曰朕但聞陳某能文爾是嵗攝侍立者三嘗因旱求言公應詔乞公卿務行寛大頃嵗監察御史京鏜極論從窄之弊已䝉開納此風未革殊無和平氣象聞者韙之仲冬上謂宰執曰欲令陳某奉使聞其有親能為朕一行否試諭之公囘奏有賤息可以奉老親惟命之從遂借吏部尚書差淳熙十一年賀金國生辰國信使正初陛辭公嘗兼領左藏三庫上首曰每以繁劇相浼備見忠勤但非所以累賢者耳祖宗用人不拘清濁全才湏詳試乃見公奏毎恨駑蹇不足以共煩使襃諭非所敢當也使還除起居郎入謝上曰卿端静自文將處卿以清要久矣去嵗欲用為諫官今日立螭不必多謝論圩田多勢家所據使水無所瀦復無所泄圩田未作嵗多豐稔作圩以來水旱屢告利害甚明上稱誦久之又曰卿今在邇班凡有所聞悉當忠告㑹西掖暫闕即令攝事曰朕亟欲觀陳某詞命兼同詳定一司敕令上曰朝士中如陳某惟善是從所謂心平氣定之人也明年春兼權中書舎人泛恩濫賞封繳無避有察官奏旅櫬之殯寺院及十年無子孫祭省者許自與焚爇公即繳論謂如此則緇徒之無賴者得以藉口而子孫之不肖者亦得以挾詐請増為二十年必經涉郡邑為之勘驗得實方許埋葬仍標識以待其家尋訪上大悦從公之議曰臺諫給舎多成一律如此方見和而不同時金使不通人情多疑公因對上問卿比出使見其情状果何如對曰必不動自古敵國欲有為必匿其壯士健馬今呈露無餘又其上下習驕以兵為諱決不輕舉顧在我不可不備臣以為外敵不足畏而内患不可忽也前郊祀四日除中書舎人人益知上眷之渥陞兼詳定既謝上曰已將宿齋百宂中忽記得卿未為真豈應更過二郊耶公曾以足疾求去問勞尤篤且曰當自處一方賜卿湏是就補中有去風藥乃佳移時方得出奏劄論上有恩恵而小民不預名為寛逋負足以恵頑民耳名為赦宥罪足以恵姦民耳願因慶赦盡放天下五等户身丁四等户一半上笑曰正合朕意乃于赦中行之公在詞掖最久論事不為苛細而詔令有不便事闗國體人所難言公輙論奏率䝉報可安定郡王乞封妾為夫人公以葵丘同盟事繳奏他日入對上迎謂曰所論子彤事極痛快且是有補風教朕為之擊節不已奏事訖求去上曰今氣宇大勝前時何為及此對曰進退之義所當講明況近列乎上曰朕用卿之意殊未艾又嘗論朝廷之事失于好詳君人之道貴在執要今陛下親細故而忽遠猷事末節而紊大體願深思漢明帝黄老養性之言俯循唐劉洎多記多言之諫舉綱要以御臣下省知慮以頤精神上曰邇亦自覺叢脞遠近大小之臣未曾及此尤見忠誠次日語輔臣陳某之言甚忠卿等相與持守簿書細故可省即省不必繁瑣自今亦當少降指揮中書務清方是朝廷之體全在卿等留意熟復其言可也後數日王丞相以外郡財賦事奏上曰前此方言之如此則又非陳某奏劄中意朕不欲自催幾錢此當責之監司方説不可叢脞不應又爾丞相以下媿謝此事已編之聖政中閣老李公巘出疆以闕官奏上曰陳某一人足辦不必更差他人内相洪公邁典貢舉復命兼直學士院王言俱出公手應之不繁上臨朝嘗曰官欲擇人信非虛語向來中書或用三人今内外制獨陳某一人當之略不見其難時因邏者興獄公奏長吏帥屬有贓不劾至煩陛下自用耳目既非執要之道又恐人不自安乞詔内外長吏各公心攷察陛下端拱責成可也伺察之風誠不可長又論列聖徳澤至深自熙豐變更崇觀侈靡利源日以浚廣脂血日以朘竭今賦入數倍于昔而大農調度略不少寛日以益甚聖心焦勞固欲省賦以寛之而養兵所仰有不可闕然今日曰養兵明日曰養兵是終不可為豈不深可慮哉願詔大臣博議絶浮費汰宂兵以其可省之數定為蠲除之目所以續民命而壽天下之脈豈止召和致豐而已哉上皆是之一日從容謂輔臣曰陳某老成凝重可大用葛邲亦其人也又曰使是人坐廟堂自然安靖和平天下本無事庸人擾之耳秋復丐外上固留且曰卿忠厚而疏通朕大用之意已決切勿曠也冬髙宗升遐醫官王涇死有餘罪止從鑴官編置公勃然必欲寘之極典率同僚俱入奏省吏謂無前此公曰臺官既許全臺省官獨不許全省乎極論之得㫖貸命杖脊于都市刺配筠州無不快之給舎久無連銜之舉至是復振矣思陵之役臺察漕臣相繼以戒苛擾節宂費為言公獨奏欑宫應辦事重期迫不無繁擾議臣不得不以上聞陛下不得不加申飭臣剽聞沿路八頓只作二頓翻滚酌獻神幄亦欲轉移酒果微物三日一易過為裁抑四方何觀願存大體毋至削弱以全送徃之孝徳壽宫官屬兵衞宜與寛假上瞿然曰人但以浮宂當節不思反失欽奉之意忽泣數行下曰向非卿言朕亦未悟尤見忠藎更降一詔明示朕意如何對曰不必降詔前日詔百費自内庫支罷諸路州軍貢獻已自明白但乞持之以堅則聖孝有光矣上曰卿毎事盡忠而知體久欲置卿于經筵適無闕近諌大夫有闕深欲處卿亟閲班簿在職已二年不應下遷少湏徑為中司可也公力辭不敢當上曰祖宗時必用淳厚忠直者為之卿正其選又固辭上曰别思所以用卿數日兵部尚書宇文公价對方及欑宫事上遽曰若欲省費㫁然不可公與權禮部侍郎顔公師魯俱久次宰臣奏各二年有半矣上曰顔某奉使囘即與為真陳某則更欲少俟近及三年以其代言論事皆得體又甚盡忠俾久留後省湏殊遷以報之十五年五月新平已被疾求對力丐外祠以便醫藥上卻之且曰卿毎毎要去可見易退即日當峻遷非平進也對曰臣豈敢以求去要進上曰尊親壽幾何何以致疾公對曰小人有母何敢當尊親之稱具以實對竟不許去公再拜復奏懇切上為之蹙額眷眷不已雖許留劄子退及家則不允之命已頒上方之藥踵至次日旬休十一日欲下除目宰執奏已遭内艱矣上嗟惻久之亟賻以全帛公哭過于哀公卿弔者不惟惜公之去國而尤慮公之幾于毁也服闕除集英殿修撰知鄂州鄂號難治唐崔郾所謂土沃民剽雜以夷俗非用威莫能治者在今日最為重鎮三司鼎立尤費調娯及公為之從容泛應三司如一家軍民帖服郡計仰商征公總大綱加恵行旅而課入倍蓰人情翕然盡心力為之三四月而領略江山得坐嘯之適政譽流聞以為前後所無有寛賦勸耕曠土加闢築隄捍江水患遂除興國沔鄂之間私鑄聚衆至數千人巢穴深阻寖成盜敚公聞之曰勢已滋熾緩之則害大急之則事生諸司欲調兵公曰計必出此然民兵習知地理可使大軍持重以為聲援不足平也密召總首諭告纎悉俾圖之不踰旬梟其魁以徇餘皆縱使歸業始以奏聞仍乞分戍以鎮其地郡有案樂寮以養窮民病夫嵗久漸隳公為増大之具器用給公田至者如歸焉紹熙三年進煥章閣待制襃治行也秋大比計使以外郡士子附試公固持不可則徑以勢臨攷官公度其必致紛爭五夜躬至棘闈之前叱外郡士毋得入譁者始定屯兵數萬軍民有訟平心而處隨輕重曲直牒軍中治罪主帥既樂其不相侵亦不輕貸由是感悦而知憚去郡數年人皆祠之不忘此豈驅之使然哉秩滿移建寧府俗尤勁悍動輙殺人公始治鬭毆尤嚴于為首者環視不勸止亦且連坐鬭者為之衰息聞浦城有謀弄兵者戕一家數人鄰里擾動公召左翼戍兵五十人授以方略計日擒之崇安又有因告糴而殺傷者尋亦捕獲今上覃霈公與二使者議此輩皆亂民茍赦之不惟死者含冤將復出為惡矣遂誅之而待罪自列境内肅然郡苦多訟葢有専以把持誣訴為業者家已致饒鑿空造事吏因為姦日不暇給公親筆數百言疏其情狀示以法禁且戒屬邑無輕受妄訴受者先坐之舉必行之令嚴反坐之法自此缿訟頓清矣寛宿逋十餘萬又代輸下五等繭税民以生佛稱之公在鄂渚政聲行于江湖間建去行在所不遠朝家益知公為詳改知鎮江府適當洊饑請粟于朝謂郡有餘貲不應公再疏曰舊將所留緡錢十有四萬不能糴三萬斛以支兵食尚不足何以為振業計又不報直以書抵丞相曰丞相平昔以愛民稱一旦得政豈應遽變所守畿甸之近尚委而不顧遐方遠徼且將若何某願乞身以歸不忍千里之民徒為餓莩也始許稱貸公分畫詳備講究深切委遣僚屬事無遺慮猶以為未盡乘扁舟屏騶衞時一到給散之所茍朝去而暮可還者皆不憚徃有弊即懲有勞即勸至誠惻怛無不感勵吏胥亦習知公勞瘁之意至不忍欺人人如使君臨其旁闔境均及全活數萬計他郡流移者亦及之邦人以為自昔賑荒未有如今日者也始米價翔甚雖給糶以平之正恐不繼又告糴于荆楚遠商聞之曰是陳待制耶俱告于湘北計臺願以米就糶計使胡公瑑以書來曰公之恩信固有以孚于商賈此事殆古所未見米舟沓至價遂以平郡民不知饑之為害也前守造閘于丹徒鎮欲取江潮以灌漕河而地勢髙仰水終不登公為之撤去改造石䃮以泄霪潦父老因公按視羅拜謝曰固民所願不謂使君慮及此也埭下巨艘連檣櫛比江滸公問風濤猝起汝曹安得無患合詞對曰沈溺時有之顧無䇿以避耳公訪問舊有海鮮界港嵗久湮塞亟徃營度鳩工濬治民旅相賀謂自此可以無恐矣又造二巨艦以濟揚子之險皆為永久之利嘗有一僧投牒自言結廬瀕江每為邏卒所侵擾願行禁止公察其庸悍詰之曰距此幾何曰在鎮江江隂之間各數十百里公曰吾得之矣地僻而介于二境官府既遠盜賊出没汝必為之囊橐僧懼甚立命尉曹掩捕果得盜數輩其中多為便房曲室即破壊之悉寘于理撤其屋以增養濟院籍其田歸焉吏民驚以為神咸曰此巨蠧也非迅雷不及掩耳未易鉏治自此奠枕矣饑民既蘇帑庾赤立幾不可支商旅久服公名願出于塗課入增羡公不欲多積又代下户之輸嚚訟未息公自以向者三郡令無不孚此邦獨未盡服是吾之過也乃罰俸以自咎百姓咸悦憲使何公異聞之曰韓延壽之閉閣復見于今具列政績及此事聞于上三山謀帥公為首選加寶文閣待制邦人挽留不可迓吏至或詆之曰爾輩乃奪吾慈父耶赴鎮過建上父老歡迎如過徽時喜公容貌不衰無不以手加額福之屬邑十有二有去城數百里者豫戒令佐毋得詣郡専以静鎮之推所以治建者行之八州初入境領帥事狂民有嘯聚者公念攻之必散入旁郡分遣迓兵數路要截如指諸掌裨校奉成算以行賊計窮酋豪度不能脱皆自經餘數人定罪有差脅從者縱去姦盜為之屏跡治宗子之横暴申蠱毒之舊禁蠲買鹽之宿逋優貢銀之市估内侍幹辦啓運官忽折簡相要公惡其桀傲劾去之慶元三年二月召赴行在長途冒雨得疾及闗遽劇既平待對蕭寺又為嵐濕所乘疾復作力請外祠至再始進華文閣直學士提舉江州太平興國宫六月庚戌抵家甲寅疾勢遽變遂薨于正寢甫歸即語諸子吾之病病矣仕至禁從五綰郡組事君臨民不敢有媿于心今日無可憾者惟先塋之碑未立義莊規矩未備汝曹其圖之其為我上章休致尋有㫖轉一官致仕遺表聞贈金紫光禄大夫娶王氏贈朝議大夫居隠之女封令人先十三年卒贈碩人子男六人曰鞏宣議郎曰革曰曅曰芾通直郎新知湖州武康縣曰卓宣教郎新知紹興府餘姚縣曰阜承奉郎鞏先一年卒革暴未命女一人未嫁皆前卒孫男四人允恊承奉郎允迪允修允諧女五人長適紹興府鄉貢進士石榘次許嫁王埜餘尚幼碩人葬于鄞縣豐樂鄉横溪西奥之原諸孤將以十二月甲申奉公之柩合焉公性資渾厚風度凝遠胸次洞然而臨事甚密與物無忤而見義必勇和氣襲人望之而意消至誠待物不能以形遁忠孝篤實始終不渝恥言人過寸善必取不以己長望人而喜人之勝己自奉如寒素而周人之急則不計有無善與人交久而逾敬道廣而能周雖有强戾鄙俗之人一與之處自然降心非意相干恬不之較彼自悔忸待之如初推賢揚善不遺餘力無一毫媢嫉之心人以為不可及而公出于中心不自以為長也自為小官所立已不茍出入朝行奏論一于納忠知無不言言無不聴推誠薦士有味其言一時推挽多名流有致身法從者林公栗䕫州之罷上怒未已公力救之楊公萬里由秘書監漕江東上疏留行皆人所難獻替甚多而不自表暴故天子信之而士夫推服在都司嘗以論事忤王魯公久乃信服曰吾之益友也知院胡公晉臣同省嘗曰舊聞名而未識面今自以為得師也給事中王公信每語人曰陳公一片心地所謂海内少雙少以文受知于魏丞相汪端明應辰進學不倦文亦愈工尚書韓公元吉稱之曰文詞温潤有制誥體異時必以名世正獻陳公嘗薦于上曰前御史陳某在太上朝挺然為名臣今其子賢而有文金玉之徳絶似乃父文恵史公屢執手曰觀公人物器業必當鼎貴在相位時恨不得相成尚書程公大昌曰陳同年文章今日之巨擘而政事則龔黄當反出其下待制楊公曰陳公海内名勝某平生之知己也周益公尤愛公之文時以佳句誦于百僚上又薦之孝宗嘗曰某交游多矣耐嵗寒者惟公一人此相知之最深者也特進之徙于鄞田廬之在莆者悉與羣從鄞纔有租四百斛仲氏蚤世尤愛其季毎以自隨特進捐館新平命公中分以與叔父後以特恩補官卒老于貧公時自窘于用而周䘏其家甚至試郡奉叔母與板輿俱行葬送婚嫁一力辦集二子諸壻及甥又皆仰給久而彌篤二女弟適張氏王氏夫婦俱亡矣以張氏中女嫁曾嚴州集又嫁其季女王氏妹生一子曰澈新平尤愛撫之今上受内禪公在建命之奉表遂補文資莆中宗族生事死葬無不被賜從弟翟仕于南而殁其兄雃方教育其孤而雃又亡公取其季以來愛之猶子也遂聯入太學兄子肇頗友愛而貧無以自存公以叩益公益公為感動遂官之公又命諸子斥田二頃略用范文正公義莊規矩以給宗婣三山之行晝繡有光族黨接踵至戲下待之如一捐俸以給之親故有急無不周䘏待安康之族不異汪氏義襟特達人有難及徽州招三衙軍立表于門有願行者躬閲之有一人疑其氣度不類卒伍問姓名曰雍彦恭詳問之則泣下曰有先人之遺澤可以仕厄貧故自棄為此公惻然既飲食之命取文書來為召保任奏上且給其費命下又撫養之至數年在都司有稚子訴其父官廣中嵗餘不得俸竟死厯劵具在即堂白下左帑代支令本郡償納仍飭諸道小吏俸不以時給者劾長吏在建有嫗自言前推官之家夫婦俱没二子乞食久矣求自便公訪其實乃華亭柳氏即為闢官舎給常平之粟取布帛于私帑為之買田又教以學去又以屬代者公之及物類如此者衆三事尤其著者公自宰掾以至禁從無嵗不上丐外之請或勸止之則曰叨在要塗不可待君相厭薄而後去晚臨四郡在外八年後來者多已得政或為公稱屈則笑曰前輩有言人生五馬政不惡與人處處為春風故能不薄其官奉職日謹精力徳量皆不可及所至恵利及民水旱有禱率應如響若有相之者尤善因其俗以為政寛猛適宜鋤姦無所顧忌撫恤善良若不可觧于心去徽之後尚為長慮論夏税和買著在甲令兩數有差更法以後臣既去郡乃悉輸十二兩是欲輕而反重請並從定制上從之徽人聞此感徳深矣僚吏各盡其情樂為之用賢者推轂恐後間有按劾皆甚不得已而后發一吏一卒不至屬邑各置一厯守宰親筆徃復吏不得窺情實具見如對面語不待鉤距出竒而政成于户庭矣未嘗以私喜怒施一箠亦不妄用一錢非有疾故不謁告惜官物如己物治公事如私事每曰要當一日必葺而便坐蕭然自謂凝塵滿室澹如也遂以澹名室公退則讀故書尤熟于班左摘其精要為一編名曰擷芳故公之文温厚爾雅有二書之風有奏議制藁二十卷詩文雜著十巻藏于家諸孤將版行以傳世厯任四朝出藩入從飭已甚嚴了無玷缺天下之言長者莫先焉鑰亦汪出與公俱生長外家公見老母及舅氏尚書每興如存之感待中外諸表俱厚鑰既奉祠無時不過舅家聞公之歸謂當春容里社鄉人已有一舅二甥三學士之謠天乎何奪吾表兄之遽也始公荷孝宗隆眷埀上政塗而以憂歸今春召還謂必枋用及門而病不能朝終不得究經綸之藴豈非命耶嗚呼姑無問此以公之仁原有餘竒龎福艾意必享上壽而年不及七旬以卒尤為可痛也薨之日上而士夫下而兒童走卒識不識無不傷嘆内外姻黨哭之盡哀五郡吏民以次致奠且道其邦人聞訃涕泣㡬為罷市殆傳記所罕見也諸子承公義方各以材器自奮鞏嘗魁國子監芾兩以漕薦上禮部卓登紹熙元年進士科積善餘慶其在兹乎将𦵏芾等泣拜求状公之行知公之詳無如鑰者又以舊所聞審于母氏舅氏謹書之将以告于太史氏而請諡于朝若處鄉治家之法皆公之餘事也不屢書謹状攻媿集卷八十九欽定四庫全書攻媿集巻九十宋樓鑰撰行状侍御史左朝請大夫直秘閣致仕王公行状曾祖寂故任永靜軍東光縣令累贈少傅妣趙氏贈成國夫人丘氏贈濟國夫人祖禔累贈少師妣張氏贈衞國夫人父次翁故任資政殿學士左大中大夫致仕累贈太師妣趙氏贈秦國夫人本貫濟南府章丘縣巨徳鄉巨人里王公伯庠年六十有八状公字伯禮其先大名府人五世祖繼文贈特進者以明經出身嘗為河中府虞鄉縣令四世祖异贈太保者以甲科為尚書郎直史館嘉岐王府翊善十餘年請老而歸避大河之患葬特進于濟南因家焉少師古學精深兼通醫卜工真行草篆尤䆳于春秋既免少傅喪不樂進取攜二子屏居青崖山之兩河太師因教授其間以供甘㫖名聞東州學者雲集時號兩河先生紹興初執政凡四年力丐閒退已遂致其事居于四明西湖之陽今遂為鄞人公登紹興二年進士科授左迪功郎吉州左司理參軍試教官為第一改充明州州學教授十一年任滿循左從事郎便親自列主管潭州南嶽廟時太師方在政府詔以諸將成卻敵功皆二三大臣竒謀指縱之力可與一子職名改左宣教郎直秘閣顯仁皇太后囘鑾太師充禮儀使辟公書寫機宜文字尋主管台州崇道觀十四年授兩浙東路安撫司參議官太師薨服除二十二年通判平江軍府奪職罷歸三十年主管台州崇道觀三十一年賜五品服通判鎮江軍府三十二年以覃恩轉左朝請郎隆興元年改兩浙西路安撫司參議官二年省罷知興國軍乾道元年七月召赴行在除户部左曹郎官仍有㫖復舊職明日兼皇子慶王府贊讀尋改直講二年南省試進士為參詳官就院擢殿中侍御史五月遷侍御史八月罷四年主管台州崇道觀十二月知閬州五年八月復直秘閣改知䕫州兼本路安撫七年移知温州九年赴上纔三月終于州治累官至朝請大夫公忠孝謙勤得之天資自幼刻意問學家素清貧太師教子甚力朝夕講習至以楮衣禦寒手種苜蓿以充飢及冠猶未知肉味父子易衣以出而抗志不凡慨然有立名當世之意手抄古書徃徃成誦太師守道州欽宗登位奉表者例當推恩公請以叔父次臯行既乃連中世科人益竒之分教四明人士仰慕適與名士相先後或以見在過去未來三佛名之初被延閣之命時宰欲擢丞列寺太師既不欲私其子公亦力辭焉平江當冠葢之衝毗贊郡政聲稱甚美㑹以讒間遭論自此不復造朝安貧樂道十有餘年若將終其身一旦趨召際遇聖明首論養人才裕民力理財訓兵以為不可勝之備又論攷察薦舉鬻爵積粟等事奏對明白音吐洪暢上意開納陛楯亦屬耳傾聴為之咨歎即日除户部郎講讀王府究繹經㫖詞義俱勝帝子斂袵受之逮執法殿中進遷南牀自以起遠外被異知益展盡底藴謂强國在法制固國在人心然國勢可振而易强人心難得而易失乘航之諭不可不知駭輿之言不可不鑑又奏方今之弊莫大于風俗茍且而茍且之弊生于士大夫議論之不公惟不以虛言先實用不以髙論葢真才茍且之風或可少革是時宿將類以罪廢公奏奔北固為可罪而戰多有不可掩者不應以一眚而廢之宜及此無事之日以次召還使備環衞撫之以恩折之以威庶可收效于後上深以為然稍稍録用沙田蘆塲議起租税民以為病無敢言者公乃極論之其略曰沙漲之地未嘗耕耨施工布種乃是務本之民既未能如漢置立田科以勸農而可擾之乎蘆葦之生本非種植各以其力樵刈必非游手之徒既未能如古捐山澤之利以予民而可困之乎豪强坐據雖曰非法然怨不及上今朝廷遣官增稅怨始有歸矣上感悟即令罷去以便貧民廢省兩浙舶司簡閱宿衛之士皆自公發之由是眷意愈厚甞奏事良久上肅容謂公曰卿所言一一可用議論全似唐王珪公平日恥言人過未甞臧否人物恩仇一視坦無城府既居敢言之地遇事輒發抨彈所及動涉仇怨無少分顧忌意或為公危之公正色曰言責所在顧忠于君者如何爾一有愛身之念紀綱何賴焉筆力素髙作奏不能自休諫藁謹宻子弟不得預論事尚多非施行于外者莫傳也諫長率公論政府乞置詔獄已乃下其事臨安一日太守請間公語之曰始得之風聞不容自嘿今既事在有司豈復當預獄具失實即上章自劾以故俱獲譴而公止從罷免上亦知其非出于公念之不忘或言去國之後事有涉公所嘗論者上必取元奏親加省覽而施行之且嘗曰此真臺諫也奉祠未幾以閬風起公遂易䕫帥䕫部曠遠夷夏雜糅公首圖諸郡地理合而為一分别險要獸蹊鳥道纎悉畢見區處指授盡出于此人莫得而欺也撫夷人以寛養百姓以恵馭官吏以嚴䕫以大治郡有巨刹既為嵩呼祝壽之地而祖宗諱辰薦修及三嵗合五州人士羣試皆在焉公以為厖且陋命葺廢寺分行香之所又建貢闈二區以其一與漕司土木之工皆有條理不日而成士民誦而歌舞之巴俗多略子女以為貨公特嚴其禁有綿竹獄掾者捆載而來為瞿唐闗所詰蓋以此牟利者有年矣公立訊之皆遂寜潼川間人為給貲各還其家或請發其事公曰不可究也惟責而遣之城素無井覓水于山杜少陵所謂白帝城西萬竹蟠接筒引水喉不乾者郡失于葺或課民以錢詹事王公十朋嘗縱民取水目曰義泉公修王公故事又增治焉市人歡呼相謂曰二公豈伯仲耶其他營繕非一先賢遺跡如子美髙齋之屬皆以餘力一新之施黔珍三州與南平軍地接生夷而思州則田氏世襲撫御尤難有何思明任鬼師楊震穆㑹等皆豪族動輒疑阻牒訴累興公化之深得其道宣布威徳譬曉禍福掲示要束至或親致尺書思明投牒乞藏牓于家傳示子孫楊震得書感泣飲血盟誓邊境帖息公遇事敏明臨機善㫁戢吏至嚴莫敢仰視聴訟之際反覆究問誠意具孚無不退聴者既而有伉儷之戚亟請祠禄遂移永嘉赴闕奏事上意欲留惜公已衰矣到郡篤志從事不少懈而疾已不起實二月二十五日也娶同郡成氏封宜人柔淑孝謹克配夫子男三人曰星郎未名而卒曰有大通直郎福建路提舉市舶司幹辦公事後公九年卒曰正大文林郎新處州軍事推官女三人長適朝請郎中書門下省檢正諸房公事周舜元次適承事郎汪大有一幼亡孫男十一人坦域埴堈垍埏垓圻餘未名坦埴將仕郎女八人其一適進士孫瑜餘在室曽孫女一人淳熙元年正月九日葬公于奉化縣忠義鄉之瑞雲山太師墓側公事親至孝少時所得成夫人奩具悉以奉太師居喪哀毁盡禮有人所難及者記問絶人博覽載籍當宣政間舉子惟務金陵之學公獨貫穿經史旁出入百氏至老未嘗釋卷賓客相對諸子侍立奥篇隠帙隨意舉似以探其學問之進否後生多親附之舎人朱公翌嘗問侍郎周公綰曰比見表中用一驢載都市事偶忘所出周公素簡黙僅舉一二公適參坐又以目公公厯誦臧質傳中數十語二公歎賞不已又歸以勵其子焉作文雄竒操紙筆立就若不經意而語多警拔諸公銘誌類出公手有厯山集雲安集奏議告䝉資治編年宏詞集要䕫路圖經等藏于家其他不及屬藁散落甚衆人雖以公不作文字官為恨然崇論宏議日月獻納亦有以少伸素志矣立朝典州威望凜然而待人接物卑牧已甚閒居客至應酬終日倒屣延納惟恐其後朝章野服顛倒層疊人人與之傾寫略無倦色士夫無不愛敬下至閭里聞風悦服疎財好義不計家之有無義所當為無所吝惜四明舊為義郡顯謨汪公思温為之主盟汪公殁公實繼之緩急叩門視所請曲為之經理故鄉人尤歸心焉亷節傳家他無嗜好俸給之外一毫不以費公帑在䕫首禁科買狨麝之類仍以公移鏤版徧滿山谷有以書求市者則以墨本寄之永嘉軍卒百工咸具公一切罷遣服用所需必面與之直至或倍償人謂其過而行之不疑故治温未久病告幾半而喪行之日百姓巷哭以過車非徳之感人者深乎僚屬問疾臥内見公几案蕭然鎮紙以甓皆歎息而退初治入蜀之装于建康有以白金來售者曰以此西上當有倍蓗之獲公曰不幾于商乎止以緡錢行比歸日輕舟而下以餘錢自隨人愈咨其清方家食時未嘗忘國事凡所聞見必詢究講明務求可行之實葢其志尚如此及膺進用期不負所學以報主知去不以罪人猶望其再入也終不得究見徳業朝野共惜之病且革二子以藥進手格之去靜黙焚香宴坐自如上章休致處畫家事若平時及屬纊不怛不亂翌日入歛肢體和柔如生皆積善之報也鑰汪出因外家以拜下風自蚤嵗辱知奬間置坐隅匪怒伊教殆非一日公將泝江鑰以假吏之燕㑹别于金山客授永嘉公適來守尤得窺治行之詳公之二子不鄙以行實見屬自惟荒淺不足以稱下筆復輟者屢矣壬寅之夏提幹公一疾不起殊使人有愧于泉下今推官又以為言乃取所聞見敘次之以俟當世君子立言者採擇云國子司業王公行状曾祖景章屯田員外郎贈金紫光禄大夫祖真臣朝議大夫致仕贈銀青光禄大夫父俱左中大夫充敷文閣待制致仕贈光禄大夫公諱速字致君姓王氏上世居大名葢三槐晉公之别派㑹河決遷墳墓于洛髙祖贈吏部尚書軫徙于陳之宛丘建炎南渡待制再為户部侍郎終工部尚書寓居越之餘姚今遂為餘姚人公幼警悟絶人書一讀輙不忘建炎二年金人破宛丘公年十一被擄能以婉言脱禍至幽燕久之㑹調發騷動脱身走河朔復歸宛丘日為南河計嘗黙寫舊所記論孟六經爾雅教受汝潁間時作歌詩葢未嘗一飯忘君親也紹興八年中原戍兵有自拔而南者公與之俱遂達行在所自是益耽玩書史一試入太學在諸生間已知名二十五年以尚書郊祀恩補登仕郎明年春中銓試第一循右修職郎特差兩浙西路安撫司准備差遣未上丁尚書憂服除監行在雜貨務雜賣塲門樞密使汪公澈以御史中丞宣諭荆襄辟差充湖北京西宣諭使司准備差遣汪公素聞公名事必咨焉公亦不為茍合嘗坐中得蔡捷賔僚相賀公獨歎曰蔡人塗炭矣聞者甚之公道所以然者已而果然汪公既歸宴僚屬亟稱公論事不茍舉一巵屬之訖事特改右承奉郎幹辦行在諸司審計司隆興改元中進士第明年赴計院上問北方人材于尹侍御穡尹以公對忽有旨引見公奏對雍容上喜曰早晩當用卿退除御史臺主簿越七日遷監察御史時金人再窺淮甸朝廷旰食公與同列奏疏曰昔婁敬勸漢祖都闗中張良一勸之是日車駕西都長安趙充國上書請先誅先零六月戊申奏七月甲寅璽書報從史臣書髙祖事必曰是日書宣帝事必著日辰者皆表其從善之速也夫遷都大事也即日啓行金城去長安遠甚璽書徃返僅七日應機如此事何由而不成今天下事急矣臣僚所言不可用則置之或有可采願陛下逺法髙祖宣帝㫁以必行不俟終日庶乎不失事機又嘗奏論西邊上流形勢詳陳備禦之䇿凡五條大略為將帥不和務使輯睦士卒寒苦宜加勞賜益武昌舟師以張黄州之勢分兵戍郢州以防荆襄之衝且請多方疑誤敵衆使不得專意襄陽又奏疏條上急務願下哀痛之詔以收人心選宰相之賢以任國事出令必由三省則命令專一且絶姦人矯偽之萌諸將小衂不聞則必致誤事寜開功過相輔之科因極論大江而上我軍單弱乞詔沿江諸郡守臣從宜措畫一面施行以一上下之力是時宿將如李顯忠卲宏淵趙樽姚仲之徒猶有居閒者公一一條其才用有以貪殘得罪者乞加抆拭以收其死力且言姚仲舊在川陜曾將燕北兩河歸正人號赤心軍以保川蜀今江上歸正人不無危疑宜令姚仲將之以聽督府節制每一進說上皆嘉納十一月擢右正言陛對之日首論擇相之難且言專取親舊排斥異議官義制之人于有初之地置循黙之士于必進之塗樞密院之權反奪于機速房尚書省之事不闗于左右司皆宰相之私也次論其釁未已科擾騷然羣盗根芽姦宄不禁宜詔守宰行寛政務實惠安固羣心以靜邦本次論講和有三可疑且請督師不專于持重諸將不專于分守悉遣銳卒以順攻逆以主待客各為决戰破敵之計此聲一出雖未必交鋒敵人聞之知吾有備和亦在其中矣次論陛下以願治力行之心憤衆事之不理慨然更革令欲必行人情或有不安終至廢格不若責當言者使之言擇其當者明坐其人之奏請而舉行之或有浮議責有所歸若其可行利興害除善聽善用之功歸于陛下矣是時晁公公武為侍御史一日與公同條具急務利害翌日得㫖晁某理財之說最長除户部侍郎公入奏言臣就晁公武家同草奏疏同銜奏入内殿又同奏陳公武既因此改除揆之義分臣不應獨留言路願繁劇自効上賜御筆曰卿方守諫職且朕親擢不須引嫌辭避繁劇之任當俟異日勿復再有陳請上意隆渥且將進用㑹論館職免召詔試非是忤執政遂除吏部郎官供職一日力求外補除直秘閣知鄂州尋以母老丐祠主管台州崇道觀乾道三年除知台州㑹永嘉闕守執政以海溢之後艱其選擬試郡有績效者五人上曰近嘗令王某守台州未行此良吏也遂除知溫州既至一意摩撫寛猛適中除積歳無名之求罷廚傳不急之費公未嘗更州縣而公庭無留訟屬邑無吏迹雖老于吏事者不逮也水利多廢得内帑錢二十萬盡心力而為之擇縣官之能者總其事召鄉之士有才幹者董其役如朱浹埭瑞安塘路石岡斗門功役浩繁皆不日而成民蒙其利災傷流移之餘歲事屢豐士民怡愉遂為樂土郡人畫像于州之普覺寺祠之至今樂清縣令顔大松邑事整辦豪右不得逞相率誣訴于部使者公審其無罪辯之事至臺省朝廷為差理官就郡訊鞫公又執前說使者憤其異已併按公黨蔽贜吏人皆為公危之獄成令果無事始服公之守正不撓四年改荆湖南路提舉常平茶鹽公事丁内艱服除提舉福建路常平茶事公奏陳常平以陳易新之法甚備上令先行之一路公乗傳至部敷諭聖意約以檢校之期親行按觀弊蠧隨革從行不過數輩所至靜謐遇僚屬之賢者一見即薦之求者弗與也裁節浮費公帑積二萬緡以其半入建寧府庫充常平本錢九年丐歸主管台州崇道觀淳熙改元除荆湖南路轉運判官明年入對上迎問曰卿去國有十年否公對向蒙陛下擢從宂官俾任臺諫分符察州十有二年恨無報効上曰毋往湖外且將用卿公奏天下之士口有至公之論而中有至私之情願有以絶覬覦塞流競舉無遺賢劾無佚罸則人無所容其私矣遂留為吏部郎官三年遷軍器監嘗因輪對奏言管子曰人君修官上之道而不言其中人臣比官中之事而不言其外又曰無代馬走使盡其力無代鳥飛使弊其羽翼此言深責成效于臣下也願陛下使羣臣各居其位職任分于臣下之所趨誅賞操于人主之獨㫁日省其事歲攷其成小大恊心以張國勢又奏紹興以來軍器先閱于本監官然後赴部旬終進呈近用御筆軍器非進呈不得出所自此止是文移往來更不加攷察臣以為職與事合則功罪可稽事職相離則誅賞竝廢欲乞略依故事仍令監丞旬月就本所察其美惡不為虚文丞貳專主親臨監部總其大綱有不精詳無敢逃罪十月差充大金賀生辰使接送伴使舊例宰執具郎曹而上姓名以進獨遣公調䕶䕶使客了無間言往回奏對益稱上意四年秋國子監試進士上舎攷官以子弟預上舍試引嫌自列特㫖别開院以公持文柄鑒裁精甚士論稱愜至九月遂除國子司業公在學校乆士子素所欽服人情翕然謹守規繩始終如一公嘗得暍疾至是復作謁告未滿求致其事遂以五年二月二十八日終于官舍享年六十有二累官至朝奉郎娶張氏故知漳州轔之女子男一人中行迪功郎前明州慈溪縣主簿孫男一人大臨將仕郎女一人公性孝友尚書治家嚴整子弟小有不謹正色視之公一兄二弟相繼蚤世公事尚書無闕者居喪盡禮後雖寖顯輿轎出入不敢就廳所避尚書之舊也迓吏到門一不改度母文安郡夫人黄氏生公旬浹而歿痛念終身語輒泣下遇外家特厚繼母河南郡夫人宋氏撫公于齠齡中以至成人事之尤謹尚書捐館之後率循家法加詳悉事寡嫂孤姪内外斬斬無一毫之私遇父母諱日潔齋兼辰哀動左右奉塋域及四時之祭皆可法也少歴艱苦通練世故慨然有大志不為無用之學䆒極事變著明利病動數千言初登第時張魏公方銳意進取公上書辯論以為無規模而決大計以天幸而希成功魏公不以為忤曰正欲各出所見後省率如公言既居言責當國家多事知無不言居憲臺百日諫垣三旬而前後論奏數十上皆切中事幾有人所難言者以遺補舊人再入為郎稍遷監長士論為鬰而公處之恬然出公門入私門貴近未嘗識面旦望一見政府不請間也天資素髙而力學至老不少衰黎明誦書數十過而後盥櫛日常以六經羣書至文選韓栁李杜詩文大率成誦暇日正坐黙誦左氏傳一字不遺尤通貫漢史嘗辯班固牴牾為西漢決疑三巻補註杜詩三巻編集南北戰爭事實為南北龜鑑詩文至多少作皆棄不取存者尚十巻為監門時姚令威寛嘗有所遺忘折簡問公答三百餘字皆史傳全文姚問所遣介云就筆揮答不見有所閲也姚大驚服尹晁同居臺中一日有言蓄鵝于陸者入水輙沈下公曰是必以豆飼之客曰然因引嵇康養生論豆令人重之語二公歎曰公記問可謂精博姚與二公皆號該洽自以為不及也自少才氣不凡方赴銓選時張公綱為禮部侍郎吏持銓牓來張公遽曰魁非王某乎吏曰唯同列怪問之張公因盛稱公才學之懿非第一不可其為前輩所期待如此為文務極本源謂近世學者多茍膚淺其教子弟嘗曰欲為文必自先秦文章欲為詩必自三百篇以及騷選唐人欲作字必自鍾王諸公故公之詩文皆髙古字畫有水墨積習之功尤精小楷手抄書盈溢巾衍首尾遒整開巻粲然對賓客宴笑髙談雄辯援据詳明率傾其座人晚頗務簡嘿叩則應明理益深聞者悚歎居家自奉甚約間以其餘賑宗親之不給者春夏間傾囷廩所有下其直以糶一邑米價賴之以平乙酉大饑為粥以食餓者里人勸率全活甚衆攷公之平生以世家子淪陷異域脱身而歸力學自奮兩薦上庠不上第又以上書得罪權臣閒廢十八年不預世賞年且四十纔得一官暨登一科不兩年居諫省未幾去國更憂患浮湛久之一旦天子引以自近且貴矣曾不得一在言語侍從之列齎志而殁士大夫無不痛惜兩學諸生哭之盡哀又相與祖祭于江干者數百人行道嗟呀以為未有也中行既以五月二十八日葬公于縣之雙林屬鑰狀公行事將以求銘于立言之君子鑰不肖公以兄之子妻之又為癸未同年進士公既撫兄子如己出且不以子壻遇我其敢以固陋辭謹摭平日所親見聞于公者具如左謹狀直秘閣知揚州薛公行狀公諱居寳字云華世為明之鄞人曽祖弁故不仕祖唐累贈右朝議大夫父朋龜故任右朝奉大夫知衡州累贈通議大夫通議公以儒學起家純明簡靜鄉黨尊敬之公自幼敏悟風骨魁梧通議公期以遠到受致仕恩補將仕郎初任福州長溪縣東尉任滿循從政郎尋以監賞改宣義郎知湖州武康縣始至延父老問疾苦一以仁厚遇之追科不擾而集庭訟益稀民方喜公之政而遭母淑人王氏之憂以歸服闋差主管臨安府城南右廂公事南廂户口十四萬最為劇繁公手決訟牒了無滯礙有武弁安儼者其母嘗充掖庭怙勢横恣公曰此而不懲是箭張禁酒趙放復生于今日也列其姦狀于府府上其事有旨鑴秩免官徙之他郡有府胥持公移造庭下肆言慢侮公以為如此何以助彈壓杖而遣之吏部尚書薛公良朋時帥臨安喜公臨事静厚而能不畏强禦貳車有闕必使攝事事多咨訪焉工部侍郎姜公説為漕副當乾道初間都下大疫漕以上命遣府僚視民疾苦惟公傾毉家至議疾賦藥毉不敢欺所活最多于是帥漕共以公績上聞被旨候任滿日陞擢初四明海多盜户部侍郎趙公子潚以龍學出守復制置司以鄉兵分委士夫之里居者公曰是畦下也緩急何可用乃即遠郊勒兵以法教之坐作進退之節是時舳艫雲集而篙師輩無所用心日遨城市公獨率所部與之期而肄習之一日趙公按視公所轄百艘沿泝奮迅餘州為之辟易趙公亟稱之及任都廂曰諌大夫尹公穯出使東浙措置海道雅知公諳練辟以自隨焉授臨安府通判未赴任間㑹曽丞相懐以户簉領𣙜酤始議併二十一庫為七思得通敏静重之士為之屬遂辟公為主管文字當併省之初羣失職者不樂浮議横出欲挽取之公洞究弊源隨事更革不見其迹又能調娯上下以迄于成課入増倍至今行之公之力為多權發遣興化軍始至庭盜跖充斥吏或請分曹以治者公不聴親閲而審詰之徃徃得其情窮教令之黨嚴妄訴之罰處決精當訟者悦服郡以辦治興化士子盛多而學宫隘陋弗稱教養公為之建傑閣以庋御書崇齋宇以安學者廣書籍備器用奕奕一新有浮屠自謂遇金僊得咒術有疾者飲其水或愈愚民相扇所在城市財施日積旬月間累百萬公聞之曰執左道以惑衆罪不容死弗忍究也逐浮屠境外悉以其資歸之學多士韙之郡圃嵗入苧麻以為太守圭租公視地狹不足以出此則曰朘民以自厚非吾志也立罷之就除提舉福建路常平茶事公以為監司自有體簿書期㑹固不可慢而非政之先頗以激揚為己任甌寜尉執盜謀賞㑹公攝憲疑其附㑹摘獄辭之隱以折之獄吏詞屈具得尉曹姦利之状移官審究則良民也駮正其事而散遣之朝廷興修水利公驅馳川谷不憚勤勞所在必集故老與鄉之秀者攷言遺迹一一疏濬吏受成規奉行惟謹循行諸郡約省騎從不以聲勢臨人或不知為部使者也公除郡時少保陳公當國自喜為鄉邑得賢二千石且道主上選擇之意及少保帥閩公方持使節至三山糴價翔踊公還建寜發常平粟萬斛順流而下少保公難其神速尋除廣南東路轉運判官力丐奉祠王管建寧府武夷山沖佑觀秩滿赴都堂審察得㫖内引公力言常平虛數水旱無備請盡洗宿弊與之更始又言閩中部綱公取夫力之費所至輙起夫騷擾以為常請一切禁止上嘉奨留為倉部郎官既而陞郎中漕粟都至有折閲者所司括責逋負之人聨以脩垣百十為羣徒困笞箠而無所從出藍縷枯瘠無復生意公憫其然為同長貳奏請令漕司下所屬償納囚繫一空鼓舞而去淮西漕闕有以公姓名薦者遂除淮南轉運判官兼提刑提舉即日獨班對便殿臨遣甚寵面諭兩淮事宜委以城險要浚池隍又將立倉廥以豐塞下之粟且曰勉力辦職朕不忘卿公感激受命即日引道至治所府庫枵然公訝其已甚及㑹出入之凡則嘆曰用之無節安得不匱吾知所以治之者矣于是汰宂吏罷不急補罅導源時取而約用之蠧弊之迹剗磢殆盡漕計始優一意屯田事修築塘圩廣募種藝又以其餘貲修無為軍庠校遂為淮右之冠興利除害纎悉上聞主眷既渥隨即罷行安豐軍光州舊有忠勇軍水寨不隷漕司上以公肅靜有謀併以委公陛辭之日上親語公漕司所造弓弩就令和州築屋貯藏公檢閲其目虧數尚多亟為奏審御筆仍令増造公不以纎毫擾州縣而如期辦集樞府上其勞特轉一官淮東謀帥上因公奏陳邊事深嘉之即以公知揚州淮地被邊狗鼠之盜雲合鳥散無所踪跡邊民多苦之公設醲賞置耳目取其尤者明正典刑窮治囊橐之黨疏其姓名而掲之市羣盜屏迹外户為之不閉淳熙庚子旱既太甚公以禱禬勤勞蔬素日久遂得下痢之疾郡民日到庭問公起居以安否為休戚閲兩月竟終于郡之正寢十月四日也百姓為之悲慟士夫亦傷惜之累官至朝請大夫嘗以職事修舉除直秘閣娶朱氏封宜人男六人長揚祖迪功郎特充淮南東安撫司書寫機宜文字次佑祖以國子入太學將受公遺澤次循祖懐祖延祖述祖女四人長適進士汪閎中次適承務郎新監兩浙轉運司明州造船場王克常次許嫁將仕郎劉安正次許嫁通仕郎徐睎䕫公稟資寛亮而能濟以嚴遇事明察而不流于刻自奉甚約而未嘗嗇于人性不喜酒居官未嘗夜宴視王事如家事惜官物厯官三十年了無玷缺以緩急叩請者割俸以周之維揚公帑負民錢積數頗多公到郡捐私財先為償之遇事有可疑而難辨或以非意相干必退而深坐思有以處俟其心平氣定徐起而應之故未嘗失色于親舊事亦無不得其平者平生多巨公奬予更為汲引馴致宦達晩結主知親擢閫寄士夫不惟以公之才業應有以得此且謂公竒龎沈毅福禄未易量也而年止五十有八不得盡其才用嗚呼天耶諸孤以九年六月七日葬公于奉化縣志義鄉雙各㠗之原從新卜也鑰母于公為中表鑰視公為諸舅行平時相與素厚公之諸子以公之行事屬鑰編次因紀其大者如右謹狀攻媿集巻九十欽定四庫全書攻媿集卷九十一宋樓鑰撰行狀文華閣待制楊公行狀曾祖端故不仕妣蔣氏魏氏祖零故不仕妣邵氏父渙故宣義郎致仕贈中散大夫妣徐氏贈令人本貫慶元府象山縣政實鄉美政楊公諱王休字子美年六十六狀楊氏世居郡城公之曾門始家象山遂為邑人累世以隱徳聞于鄉公生而竒龎邵夫人中年抱孫極愛撫于髫齡中已有成人氣象莊重寡言樂然後笑相者以為必貴中散延儒士教之家苦無書傾貲買經史于胄監肄業蓬萊山僧庵中窮日夜之力至雪積于階而不自覺尤好詞賦兼通春秋游郡庠名出諸生之右紹興末年始名鄉書再薦登乾道二年進士第調左廸功郎台州黄巖縣尉首興邑庠公自課督又奬拔其尤俊秀者其後登科相踵皆以為出于公也邑有豪民武斷一方蓄雄狡數十輩分而為三曰大神者為之謀事曰中神者為之行貲曰小神者則無賴善鬬之人也官吏莫敢誰何公具得其奸狀白于郡黥𨽻他州閭里懽伏稱公為鐵靣少府遇略賣生口者痛懲而歸其人請捕監立賞格計實而募于衆禱雨則神龍為之示現捕盗則鯨海為之肅清蓋筮仕之初器業聞望過人已數等矣尋以賞典改左承務郎知盧州合肥縣邵夫人年過九十方欲奉重親之歡而邵夫人夀終公追慕含飴之愛不欲行中散同徐夫人執喪于家勉公前邁公攜一僕自隨晝至聽事夜寢書室洛誦或至夜分尚書王公希呂為帥歎曰據案決是非此猶可及官舍如僧居二年如一日實有所不能也又愛公筆端箋奏皆屬之帥漕不相能久不覿靣僚吏無敢言者而皆敬公各致剡舉公因得調娱其間二公為之釋然置酒交懽而待公益厚淮民多為客户所侵地訟難決公親行阡陌為之平章訟日息而野日闢至今賴之賦役均平一毫不擾民樂就役欲及公任内為之嵗饑發防邊馬料運米給貸漕司詰之公疏艱食之狀且已責其秋償矣至期皆不督而集萬弩手赴師司檢閲多苦傷寒喉閉之疾公擇方製藥以給之病者多全活具不幸者官又斂之郡多草廬易致延燔公白于郡請易以瓦帥曰非君孰能辦者公一力經畫市木傍境教民陶瓦未幾民居一新邊方為之壯觀淳熙四年磨勘轉承事郎明年任滿賞轉宣教郎授南康軍簽判郡素號江東道院待制朱公熹時為守日課諸生講書公亦相與發明事無巨細悉以委公自行經界以來境内苦于賦重民不聊生流移者衆公與朱公力請于朝利害甚白雖幸少寛猶惜其不盡如所陳也廬山東南勝境官宇有吏隱堂正與五老峰相直娱侍䨇親于堂上太守尤敬中散扁一亭曰敬老公餘則奉安輿遊名刹以盡其歡六年轉奉議郎初有詔臺諫給舍舉察官王公已在西掖以公及丞相京公鏜應詔京公遂峩豸而公遭内艱以歸矣扶護暑行悲感道路執喪甚苦九年又丁中散憂勉舉大事家為之罄邑鄰台州有蓋蒼山髙絶人迹罕至公處僧室閲佛經一藏以資冥福人以為難服除造朝言士風奔競皆上之人有以來之仍言海舶不可徑造都下貳相王公淮梁公克家是其言有意留公自以五年憂患之餘力求鎮江府分司糧料院以歸人尤髙之十二年到官職務至簡而少保吴公琚為總領一見公期以逺到幕府事既為盡力吴公亦開心聽可一司賴公為多明年轉承議郎吴公召還首薦公才徳之美孝宗命中書識之既滿秩王丞相欲處以司農寺簿公又力請外郡除知洋州十五年轉朝奉郎光宗時以皇太子參決庶務公辭于議事堂論淮甸撮課紹興和買最為民害又論四川綱馬利病光宗喜曰議論人物俱偉當為敷奏施行是冬赴鎮洋本佳郡近嵗有健訟者公剖決精明人不能欺坐以無事治賦期㑹信必不嚴而辦征商𣙜酤亦皆沛然郡有丹淵二蘇鮮于子駿四賢繪像旦望必率子弟拜之丹淵有園池三十詠公盡復故迹退食多賦詠其下又崇教化課農桑百姓安之纔一閲月俄改知金州兼管内安撫前守一武吏居興元席卷以歸又盡焚其籍公至則􅑎然且無所稽攷為之節用度懲吏姦不能給一二詔置獄前守坐編置没其家貲公又極力經理僅能成邦西津两渡公帑征利病民首罷之創浮梁于西津以惠行旅人為立祠過者必祝處分西城漢陰平利三邑綱馬以損均敷之費施竹木柴塲之利去受輸倍征之害州有𣙜茶場其初止𨽻茶馬總領三司抱納息錢之外郡計亦藉其助守或乗勢權取至移用係省以増本錢從官多售既已科擾園戸深治私販配𨽻者相屬守亦或以自累公極白茶司欲賣引以便民朞年始有更引之命公力贊之俾官僚及諭鄉之大夫士各陳其事酌取衆説罷茶場而鬻引一方無不快之帥守尚書宇文公价憲使朱公致知相與歎曰安康之政前所未有也條其政績交薦以聞光宗登極轉朝散郎郡之士風素陋鄉舉者二人其一又流寓也公為大興學宮學者寖盛鼎新祭器春秋釋奠如禮有雅歌投壺之風焉十六年為四川類試攷官境内一水逺通襄鄂行商不絶有鬼愁灘摧舟絶險公出錢募人平理之石堅不可破公臨視之得古鐵于沙中甚夥鑄為鎚鑿嚴醯熾炭以攻之石為之解以砲竿移去遂為安流郡宿重兵多以𣙜利啟爭公視如一家愛軍士如愛吾民都統田公世卿固已交歡殿帥郭公棣奉祠里居相與從容無間嘗獵近郊步騎俱從三公戎服竝馳公又素善射以一矢斃䨇二老將敬服之閒語同僚曰中興之初余為均房鎮撫使敵騎犯塞大將以金舊𨽻京師置不問止保洋州饒風闗遂致此郡失守又乗勝擊破饒風直𢷬漢中賴王師力禦之遂由斜谷而遁今郡為西蜀喉襟上津縣即商於之舊邑自商之豐陽西至洋之重陽闗横亘一千三百里闗隘六十四邊靣闊逺而權輕財匱何以備倉猝乎聽者竦然公曰向以大將為守與三邊軍府角立㕑傳動有重費交賄通及四鄰惟當痛絶舊習雖賈憎不暇恤也嵗餘以所積置防邊器具増保勝民兵衣甲親給支犒無侵漁之患時比箭賞革游惰之習休日則較禁卒事藝號令精明賞罰有差將官有夜飲于城外者私留門鑰以俟公曰吾與敵畫地而守其可弛乎懲閽者而軍中亦治其騎將内外始肅舊有撫養庫例與公使用等公曰此正以防邊也自軍用外不支一錢去之日為緡錢十餘萬紹熙元年轉朝請郎二年除利州路轉運判官自郡赴臺幾千里道遇訟牒隨即受理御吏甚嚴秋毫無擾攷察吏治置籍大書明别淑慝二條區别賢否列城為之震悚利路屬郡多在闗外漕計入不支出適當洊饑西師除掌武門下増俸不貲重以歸正之蠧方左枝右梧之不給而暑雨為災上煩宵旰又躬撫勞賑濟之役金州大火幾無孑遺守卒僅以舟免公兼倉使即發米以救之漕司力不足寢食為廢貳卿楊公輔方護餉四川與公同年氣義相許公力請于楊公曰安康一藝甚矣軍中有事力多使令猶可興起公私赤立何以為州若請僧牒于朝萬里難應頃罷本州安撫司有備邊庫錢二萬萬樁留使所前守拘沒贓錢有㫖輸内帑二者皆本出于金州之民若以此建官府措居民于經費無所損而可以新此邦矣楊公慨然從之公既兼憲使聞闗外六七月方食麥盜賊横行吏惰訟淹徳意壅不宣冐暑慮囚厯階成文鳳四郡賙貧剖訟所至有恩行襃斜谷出武休闗道不通車間用籃輿徒步以度險于中暍以文州地荒民稀而力役最重為奏罷其不急者數條西帥吴公挺久鎮貴重待賓客尤厚公既深入邊闗吏曰當道武興公曰此行正欲到軺傳不到之地遂由文南以歸吴公猶以例卷至司公力辭帥服其亷蜀人翕然稱之有利州兵官告訐太守陰平知縣以縣庠為酒肆公以為犯名分敗風教莫甚于此俱劾罷之嘉陵江暴漲漂壊棧道郵傳隔絶公大為經理以其費上聞總司助其役由益昌至大安軍修創棧閣二千餘間視舊加闢今成夷塗明設條約補役兵之闕畫疆分掌椽柱綯茭乗暇採取風雨侵蝕以時繕治期以勿壞自祥符皇祐元豐三為此役元豐嘗紀用數今役不翅數倍而不以取于民有修橋閣記甚詳蜀中皆歌詠之三年移成都路提刑兼常平事得㫖護試外省公自向為攷官固已具知蜀人多為廋語于程文中有容私而幸中者謂之牢籠公身率官僚力革舊弊寒俊獲伸無不感服又詳究試闈曲折參以南省規式闗防備盡既施行之又編為成式申制司以為後舉照川綿州嵗市黄雀數十百萬一切禁絶之藥局嵗久劑料陳腐焚而易之巨室責租至使耕夫自戕公治其甚者綿漢告饑親至二郡主行荒政故饑而不害西蜀藉江水入堰灌溉舊率取竹木于民春猶未集水已大至積薪救急簡陋重擾徒有倍費公豫于冬初收買嵗始修築又眉州蟆頤山下一堰嵗苦衝決命伐石為之濬廣溝畎謹視瀦泄又捐俸為漢嘉西門石梁郡人名楊公橋皆為永久之利臺有平允齋聚獄案于中夜則閲之有疑則親筆究問緘以紫囊亦令所問官親筆批執吏不得預之故多得其平三年轉朝奉大夫四年冬除本路漕黎州蠻獠青羌攪邊州所遣兵為羌所圍公適攝帥以䇿禦之遂遁嘗聞道旁兒啼聲得嬰兒于枯木中因籍城内外得遺棄者百餘人悉加撫養俱遂生全剖決两司詞訟迎刃而解酒禁素嚴有捕郭二十五私醖至庭下公詢之郭乃一邑令公察其非滌器之徒治告捕者而慰遣之郭少城大族擁笏致謝三十餘人府庠養士至千人每月必再入攷閲程課旌其能文者庖饌豐贍士愈悦造吴蜀㑹子紙每界至六千萬漕計始十七萬緡偶㑹多事費倍平時或慮乏興而公處之裕如遂積緡錢至四十餘萬两在漕臺典外銓倖門尤衆一以公心行之量能授職多得實才人服鑒裁之明慶元元年覃恩轉朝散大夫尋又以年勞轉朝請大夫召赴行在七月除戸部郎官湖廣總領仍令奏事對便朝奏罷邊民守闗及非法役民者以軍兵為之此安邊恤民之急務又奏禁盜賊之法彊盜已有六項指揮欲于殺人屍不經騐而無證佐依大辟疑慮奏裁指揮下添入彊盜殺人者非六字使盜賊有所憚且明示無惠姦之意又論錢弊甚悉謂貲泉取其流通今自裂而三之東南則用行在㑹子两淮則用鐵錢㑹子湖北㑹子則又異于二者是使商旅不通嗟怨相聞不若罷两淮湖北㑹子其在民間用行在官㑹收之俟收两處㑹子盡絶則官㑹通行實為利便總司金榖浩穰公首去八弊而總計為之日充詳閲軍用而覈虧數之實親臨出入而究楮劵之姦分錢交子為三而不容互用判軍糧樁積為二而不許移易拒河支廊支之請而米綱無陳腐之憂繩兌支截支之擾而茶引有通行之便以至廣儲蓄之地两郡為屋百楹舊以蘆荻藉米一易以板後遣使盤量惟湖廣之數豐盈人益歎慮事之周也循行邊屯㑹襄陽火災之餘亟議撥錢五干緡瓦礫之場盡興棟宇公又親撫存之軍中升差赴司按試公勉以忠節親校武藝仍書公移置几上中選者即書其姓名手以授之進退既公軍士感悦三年春就除司農少卿九月令赴行在供職十一月除太府少卿十二月三日除中書門下省檢正諸房公事六日始入國門先次供職明年奏事陳備邊之䇿謂金方與韃靼相攻未知勝負然皆足以為吾患不可不慮也又列擇將審勢修戎器招勇敢士四事因薦統制而下内可為環列外可為將帥十人御筆籍記時中書積獄案甚多月日或有揩改之迹四月轉對即奏曰奏案動闗人命中書豈能悉察吏得以為姦利以小節迂囘而俟赦降或改移月日後先謂該恩宥乞以大理寺及四方案盡申御史臺置籍月委察官一員稽攷勾銷已結絶者而催督其餘或有淹延太久日月差殊則奏劾之庻無冤滯之民又論省部吏引任緦麻親之弊國家以天下之務𨽻于六曹而總于三省故為吏者賞優而廩厚又為保引之法許錄其子孫若異姓而今日厖雜殊甚習學守闕不知幾人氣習趨向非復舊風輕儇苟求詭秘百出反甚于州縣之吏乞加澄汰止許保引子孫者許引同宗大功親一名其異姓之人一切停罷庻少清吏選聞者皆韙之六月假顯謨閣學士兼侍讀為金國賀生辰使過泗州北書表初參索使副出笏公令掌儀以禮折之曰都管而下便服來參乃欲使者以盛服相見豈無差等耶竟受參如儀至眞定謝酒果金之中使忽謂使副不當用皁背白領蓋北方朝儀皆用紫也公曰本朝止用此服且泗州東京既用之儀正如此使以左袵至本朝豈為不恭即麾三節人退班終不能奪歸而奏曰臣將命殊鄰因得觀民情之向背敵勢之盛衰與夫士馬之虚實財貨之盈虧皆已可知此固已見天道好還今古不異然在我不可一日而不備又奏和糴所以惠民而備兵今平糴良法寖壞牙僧胥徒操其權而官受其敝乞置場收糴聽民商從便免致科敷可以絶姦利而價自平矣四年以勞遷轉朝議大夫又以年勞轉中奉大夫十一月遷太府卿轉對論奉使三節人從近嵗託請貨取僥賞而已安有能覘人之國者欲乞除上節親隨等選辟如舊餘悉取于三衙及江上諸軍上自統領下至隊兵輪轉差撥已行者不許再差嵗两遣使約不下百餘人彼城壁之堅瑕地理之要害必有能覘之者因使士卒經行洪河太山激昻壯志轉相傳聞一旦用之必有助焉又論郡縣拘到銅器或憚于解發而收貯不嚴竊取求售所在有之乞令盡發赴錢監仍申嚴禁戢五年差省試參詳官五月除秘書監公性嗜學久從吏道未嘗廢書自謂平日欲見袐府書而不可得遂終日坐省沈觀未見之書尤不喜趨競同省贈以詩有九衢達宦方馳轂羣玉詩仙獨下帷之句有以為後時者公笑不答九月兼實録院檢討官十一月除禮部侍郎兼修玉牒官六年進故事論監司廣朝廷之耳目攷州縣之否臧以惠安斯民者也若罷軟不擇癈耄兼容徇苟且而略風節尚資厯而混賢否亦何取于外臺之寄哉因厯陳髙宗孝宗聖訓願深詔大臣除授之際雖不可廢資厯一當先擇風力强濟材具精敏之人使充此選則一路可以蒙福矣光宗玉牒書成公讀于殿上以賞轉中大夫四月兼工部侍郎夏旱上封事請下罪已之詔修應天之實布之天下使内外之臣圖弭天變五月有詔罪已仍詔侍從而下疏陳闕失又奏備論二税徵𣙜之擾和糴先備之計尤詳時慈懿皇后上仙两部事繁公嘗病暍徃來冐暑感暴下之疾力請外祠三請除文華閣待制提舉江州太平興國宮以歸歸而病寖革啟手足之際色莊不亂命具紙筆曰吾將逝矣書一頌甫畢遂終于正寢寔九月壬申也病中乞致其事轉大中大夫遺奏聞贈四官澤其後二人娶同邑史氏子二人燡將仕郎燧先半年卒女四人長適吴興鄉貢進士周儼次適承事郎新知常州宜興縣丞洪俌丞相之孫也二女皆先卒次適文林郎新紹興府􅌘縣丞俞杭次許嫁未行後公一年卒孫男一人基登仕郎以嘉泰二年九月庚午葬公于鄞縣通逺鄉金谷里四明龍井山之原將𦵏燡請狀公之行鑰少與公同薦公自海上後至遇于途峩冠粹温即語同行者曰風度如許一第何足言且當以賢貴有聞于時遂定交焉今四十年矣中間離合不一公之賢譽日起人猶日長者耳其使蜀也聞公不畏强禦幾危其舟嘗按郡守有為之地者反欲相傾人為公懼公抗辯于朝不少屈中執法為直之而後定于是益壯公之為而加敬焉京丞相嘗謂鑰曰祖宗不以蜀人帥成都又多以東南士夫參錯于諸路麾節間有深㫖哉某帥蜀時固知蜀多名士求其曉暢吏事所至治辦而不疎者無如楊嗣勲東南士夫入蜀者亦多可稱求其最賢而有才者無如楊子羙故某與之尤厚紹熙初詔内外從官薦可為卿監者首薦之公欲歸而未得㑹京公趨召公命燡浮家依京公東歸獨處于蜀者又三年蓋其清修約已一意公家如此前朝用人徃徃厯偏逺而後歸主大計以至柄用公之宏才逺業所莅不苟揚厯最衆見其歸而持槖意必由此而升姑未問經濟事使其婆娑從班吐胸中之竒以見于論思之間亦何止此厄而不得騁豈非命耶逮其賦歸已先卜城居棟宇閎敞猶望為老朋友以相依然公歸而病病遂不可為一見亦不及也哀哉公厚重周密與人不為翕然熟久而敬之士無賢不肖入朝見嫉自古志之矣惟公之來而朝無間言猶謂其晚去而共惜之是必有過人者素少病聞歸班時氣貌尤充悅人咸以為富貴未艾也歸自北方始覺稍衰而又連年有兒女之戚人所難堪使堂堂雅望奄至九京此尤識者之所共嘆也著述甚多宦游名山隨處題咏散落之餘入川時有遊岷漫筆一編又有東齋集五卷諸史闕疑三卷藏于家篤于孝友中散每憚航海之險屢謀入郡而不果公既貴遂問舍于湖上將赴洋州故廬先業盡以與二弟漕成都時以捧表恩任弟之子燫又攜以出疆循從事郎今為台州支鹽倉遺令燡曰吾家素寒㣲羣從多困其有以助之燡泣曰敢不承此志公在蜀中樂賢之衆多所薦引如今吏部尚書費公士寅前兵部侍郎趙公介俱嘗與公同朝此其最表表者也其他大有建立是時燡已奉母而歸不能盡記公又以為王事所當為不惟不夸于人亦鮮以歸語其家恐尚有遺事未能備也謹摭其可記者為之狀將以求銘焉謹狀直秘閣廣東提刑徐公行狀曾祖義贈中奉大夫妣胡氏贈令人祖佐贈宣奉大夫妣許氏贈碩人鞠氏贈碩人考立之故任朝議大夫贈特進妣李氏贈安定郡夫人本貫登州黄縣公諱子寅字協恭世居文登特進以紹聖初元登進士甲科南渡先寓㑹稽建炎四年令人梁氏生公徙居四明今遂為慶元人特進家無儋石儲而篤意教子公生而敏悟尤所鍾愛先意承志務進于學授詩于鄭先生剛中累冠鄉校紹興十年以明堂大禮恩補將仕郎十八年春銓中選授右迪功郎監渾州南嶽廟時法官多山東人與特進厚善勉公習法明年公方弱冠一試中其科二十一年丁特進憂遺訓有云吾以孤寒自奮為正郎者三十年中遭兵燬僅能立家汝曹異時莅官内勿欺心外勿虐民公泣血書紳終身誦之服除授建州司法參軍任滿闗陞右從政郎授潼川府路轉運司主管帳司未赴以法科改福建路提刑司檢法官審復囚牘累百凡駮正死罪七十九人吏部以聞減磨勘一年公曰法所當輕非敢縱囚以求賞也竟存而不用隆興元年以舉主改宣教郎授两浙西路提刑司檢法官改除大理評事乾道元年以鞫制獄除丞其詞曰志業有立操修可觀潛心于孔子孟軻之言兼邃于柱後惠文之事是于聖人之意其知之矣三年差充刪修續降指揮所刪類官四年輪對力以清刑為請上固已識之丐外補除知無為軍十一月陛辭奏两淮議營田屯田久矣地有餘而人不足每以為病比年歸正之人甚衆分處州郡仰給大農徒有重費猶患不給臣嘗因鞫勘歸正人公事嘗以詰問之皆以為飢寒所迫不得已而為此若得官備耕具使治淮上荒田以餬其口何苦犯法哉臣矜其言竊嘗詢究淮上治田之具蓋每招一家必首給錢百二十緡以其二買牛一為室廬耒耜之資是知淮上不惟人稀牛亦艱得計道途之費固應倍于内地又縁經厯商税費亦寖重臣恭覩仁宗皇帝國史凡鬻牛者免算税紹興敇令云若以牛販賣其過税勿收即遇災傷放税及五分過徃税亦免欲望遵仁廟之法申甲令之文並免販牛過税至两淮者住税亦免耕牛輻湊則曠土日闢矣臣恭聞陛下方發内帑委守臣備耕具招歸正人營田若更免牛税則必欣然從事于畎畝農隙閲以武事邊備之至計也上大悦且曰牛税可免卿能保歸正人樂于耕乎對曰臣豈敢為嘗試之説盖詰以汝輩未歸此時在北方亦耕夫耳咸曰然臣使手書欵狀皆其真情因袖出舊辭以進上尤擊賞玉音甚寵曰朕圖此久矣未有利害較然如卿所陳者卿于訊囚之際乃能體國逺慮及此耶卿未可試郡朕將用卿既退御批陳獻可採先次差徃淮南楚州相視措置條具聞奏公在朝行恂恂似不能言一旦對奏卓然動上聽感激自奮始盡力于淮甸而眷寵日深矣公躬履阡陌募樂耕之人與之通情詳議不以使者自居上嘗念公之勞又未見圖上事宜因中使至盱眙戒以訪徐某所在宣諭催促公性簡易方在田間議事語既久出盃酒與之分酌中使適至傳宣既畢匿笑而去以其太簡也歸即奏之上曰孰肯將使㫖而為朕究心如此者明年正月歸奏上首襃諭此事公遂奏條目甚悉大略謂楚之淮陰乃沿淮極邊之地監城沿海雖有間田未有以處歸正人且于寳應山陽得空閒水陸田五百餘頃勸諭到歸正傳昌等四百餘名欲人給一頃五家為甲一為之長隨處置莊仍給備耕牛農具屋宇等錢家與草屋二两牛并屋一種糧萬錢並俟入莊日給付初年開荒免納本錢次均五年還還足給其田為已業候滿十年起納税賦其勸諭等人奬勸有差詔可其奏淮東帥奏乞措置監城喻口两地守禦上曰非徐某不可就俾措置公奏喻口當射陽湖入海之要監城築壘不堅又無屯兵乞下楚州措置守禦從之是月除大理正不候授告先次供職復徃淮東御筆賜知揚州莫濛覽徐某所陳歸正人給田利便甚有條理已令施行卿宜協力使一一就緒五月詔對奏諸莊水利有二古溝可洩水田夏潦循其舊而浚之因而賑給歸正原耕之人實為两利又奏荒田及守令拊摩等事亦得㫖行下並依所乞施行七月詔以莫濛措置淮東山水寨及民兵總首并莊寨使效已及半年未曾審實委公按視激犒仍支舟師器甲等尋兼權尚書駕部郎官又奏仍舊置萬弩營六年正月有㫖徐某措置官田招集人民委有勞效除駕部告詞有云司輿郎吏髙選非曾把麾持節不以授今特命汝上曰徐某清貧不受餽遺繼命中使賚白金五百两四月差知髙郵軍公奏措置官田節次勸諭到歸正人及種田使效計一千四百餘人共置五十莊屋宇牛具畢備縁諸莊散在揚楚髙郵盱眙四郡今差知髙郵切慮諸莊疑惑欲專委才吏措置两淮官田得㫖徑委公兼領許令每年一徃諸莊激犒俄改知泰州又一月召奏事因陳鹽場利害及捍海堰事甚悉遂兼權淮東提舉御札令俞召虎與徐某同措置營田郤令徐某同措置鹽場各宜協濟以副朕使令之意十一月以職事修舉除直秘閣七年賜緋衣銀魚四月奏事選徳殿復條具鹽事遂除提舉淮東茶鹽常平措置官田如故楚州申淮人陸梁恐開敵隙上令相度隨即奏聞上喜御批卿無所避憚挺身任責足見恪勤乃職朕甚嘉之當官處事正宜如此然淮民既已肅静郤當撫之以恩不可專用刑威也恐卿等或未之思故兹奬諭復示朕懐宜加體悉十二月以鹽課増羡特轉一官丞相虞公允文貽書謂一司治辦前所未有欽歎不已是年以和糴最多而先辦仍自行津運委見盡心國事又轉一官八年坐不覺察所部私渡降一官後乃得實改正屢請外祠以鹽司積壓鹽本降二秩卒以總領所申額鹽虧失罷九年七月主管台州崇道觀淳熙元年正月召赴闕奏對稱㫖除工部郎中仍舊措置官莊樞密院得㫖列具淮東官莊已成之數總五部七縣及楚州忠勇使效為五十四莊屋二千四百四十九間耕者一千二百有竒牛六百二十有五稼器六百二十五副老穉五千四百二十有七耕田九百一十四頃上見實效尤以為喜公蒙上異恩感激盡力嘗歎曰古者專以屯田為養兵開邊之計國無重費而可成功今講和方堅無所展究將有見忘者矣已而果然淳熙二年官莊結局除將作監㸃校官莊三年四月除大理少卿六月罷十月主管建寧府武夷山沖佑觀四年春除淮南運判不赴九月再命仍專一措置督修城壘五年兼權揚州于是𤓰州城成六年五月除知揚州八月除運副時暫差知楚州九月修築髙郵興化寳應縣石闥斗門函洞隄岸可以固䕶民田約三千七百餘頃特授中奉大夫封黄縣開國男食邑三百戸未幾罷歸两任提舉武夷山沖佑觀十三年轉中大夫十四年除知隨州十六年賜紫章服冬始赴郡紹熙二年任滿尚書張公杓為帥薦于朝三年除知台州公至郡詢訪利病之實思欲不闕郡計而又裕民量入為出優有餘地𣙜酤征税大率從寛闔郡熙然塗歌巷詠率有太平官府昔所未見之語明年版曹比較上供以台為優人謂既以利子民非天雨鬼輸何以致此益以為不可及或問公則曰求弊當求其源台有二弊偶皆得之一曰秋苗為鈔二曰軍士虚籍有姦胥増改鈔額照以倉籍偽增至八千餘石至以十為百以百為十上下蒙蔽久矣公既發之而使輸苗者每鈔不過一石弊無所容至增萬斛虛籍尤為重耗因立賞罰使之自陳置籍几案上親為銷注月餘十去二三嵗減數千斛財賦條盡較計精詳節不急之費罷饋賂之私杜刺軍之請是以能不擾而辦屬縣寧川邑庠久廢公為買田五百畝以振之剖決滯訟情法俱當人既悦服一毫使民則為之蠲積逋至十餘萬謠頌騰播逺邇寮吏亦皆感歎倅貳賢者還朝語人曰郡太守職在便民政有不平則吾當正救之今徐使君專意撫摩如恐傷之吾無所用其力惟贊之而已憲使陳公杞行郡父老擁車請留太守者累數千牒陳公歎曰得民如許諸郡未見其比當以聞于上五年四月除廣南東路提㸃刑獄公事郡人尤惜公不滿秩而去立祠塑像以歌謠刻之石攀轅臥轍喧動千里幾不容去公歸此亦倦遊矣力丐祠而促行之㫖益嚴既扺所部詳刑決獄務在寛平恩威兼行列郡皆聳慶元元年春夏之交欲徧厯諸郡或謂瘴煙季春為甚姑緩之公謂職在澄按不能自已至五羊疾作而還第四子隨侍自公得疾于道驚憂精禱願以身代公既還而此子先以疾卒公罙不堪遂相繼而逝寔五月八日相去纔五日爾痛哉享年六十有六娶汪氏累贈令人再娶陸氏封令人七子長晞臯通直郎先三年卒次睎益承直郎知台州寧海縣丞次睎稷嚴州觀察支使次睎夔儒林郎新鄂州觀察支使即死于曲江者次睎垂將授公遺澤次睎契睎夷習進士女五人長適朝奉郎主管台州崇道觀唐漼次適進士王然次適從事郎監温州在城商税闕琴次適承奉郎監台州在城商税汪立中次適史宣之寔太師之孫將以遺恩補官孫男十一人師顔師孟師周師偃師雍師錫師㸃師召師伋師夏孫女四人未行諸孤將以二年九月丁酉𦵏公于鄞縣翔鳯鄉隱學之原從新卜且公志也公天性夷曠與人以誠實素嫺吏道晚益更練故台州之政尤為人所稱孝宗知奬實千載之遇徃來淮南數年詳究精密論事上前如辨白黑動輒寤朝奏暮行間有飛奏亦皆響答故凡事皆見功緒人但見其寵渥使藩成大家亦其才業勤勞有以取之公為漕時有揚州教官倚勢援迫諸司求攝傍郡守皆俯從之來求于公公曰此非所以相愛悔吝必在旦夕邊郡章奏動徹上前萬一以為問何辭以對力郤之其人遂陰擠公坐此罷公不以為恨後數年其人以賄失官舉者皆坐公蓋嘗諫之彼自不用故獨免于罰仁者之報也一閒十餘年築屋湖上日以觴奕杖履自適尤善居鄉未嘗忤物宅欲成而東南尋丈之地或執不售公曰我亦何用此左廡止為前榮而缺其後久之求售終以善價酬之晚雖豐餘而自奉如小官時兄子數人撫之有恩意調給惟均無有間言公在淮南鄉人有被盜疑公之僕為囊槖追捕治掠甚苦公聞亦不為動已而得釋伺公歸而訴之公曰我以家事付汝累嵗侵漁已多迨假手以治汝尚何訴其無競類此聞者服之麾符所至前後薦士百二十餘人其間有在從班者而公出入三朝受孝宗之知尤深官止列卿豈非命耶鑰汪出早嵗及與公同舍姨母既歸公情親寖厚丞相留公當國最重然諾鑰一日見之坐中有語及公者留公曰此人有才鑰因問曰相公何以知之曰朝廷每下邊郡措置禁銅錢過界惟隨州一奏甚明而可行因曰其人純茂向來口語非其實也其後丹丘廣東之除皆出其手鑰不惟服公之知人而又喜公之為留公所知也諸孤請狀公行并以所聞書之俾求銘焉謹狀攻媿集卷九十一欽定四庫全書攻媿集卷九十二宋樓鑰撰行狀觀文殿學士錢公行狀代汪尚書曾祖暄故任中大夫寳文閣待制累贈太師鎮國公妣陳氏贈國夫人祖景臻故任少師安武軍節度使累贈太師康國公尚仁宗皇帝女秦曹國賢穆明懿大長公主父忱故任少師潼川軍節度使累贈太師雍國公妣唐氏雍國夫人本貫開封府錢公諱端禮字處和年六十九狀吴越忠懿王六世孫也髙祖惟演以文章受知章聖掌内外制十有餘年擢樞密使以襄鉞鎮盟津移洛陽歐陽文忠公修尹公洙謝公絳皆在幕下一時士靡不歆艷諡文僖鎮公在慶厯治平間號良二千石神宗朝王莊定公存領三司鎮公為副使奕世光顯至康公而愈大公雍公第三子以賢穆之孫政和初授宣義郎七年賜緋宣和三年賜金紫主管西京嵩山崇福宫靖康元年監登聞鼓院未幾隨侍重親避地湖廣累奉祠禄紹興三年添差通判台州嵗饑方議賑給飢民千餘人集譙門下守欲設兵衛公曰是促之為亂也亟開倉俾以次受粟無敢譁者識其閒有猾吏數輩白太守尸諸市一境安堵公時方年二十餘由是聲名籍甚四年通判嚴州又改湖州皆不赴主管華州雲臺觀七年通判明州太守尚書莫公將知公明敏郡政多決于公除直秘閣後政以苛敏自任僚吏重足而立公獨以理折之不為屈又加敬焉十五年除提舉淮東茶鹽引對改除兩浙轉運判官時方繕治行闕増葺宮城公與臨安守分任其役率先告辦除直徽猷閣進寳文閣漕司有積鏹近萬萬或勸公獻之公曰此朝廷外府也何以獻為時宰不樂遂罷歸十七年除淮東轉運副使時金使方通官吏希賞趣辦過豐一切取給于民怨嗟相聞公日力言于朝人皆危之公曰目覩公私之害忍不言乎秦丞相亦察其誠遂為減入至今賴之漕計率耗于無名之費嵗用多請于上公革去宿弊帑廩有餘遂乞罷大農嵗給又儲三年之貲為備用庫明年進直龍圖閣知婺州公入境聞嵗方苦旱即齋素黙禱首祈于星祠香火未收雨已大注邦人歡呼已而霖霪不已公度必有水患亟募客舟百餘艘人或以為蚤計一夕水暴至城不沒者纔數版浮梁既漂去溪南市人求救者號呼震動公坐城上厚賞舟人競載以濟幾數千人公分處僧舍計口給食悉遂全活去之日遮道挽留生立祠至今奉祠三年丁雍國憂服除知衢州過婺闔境送迎近世所無也三衢大火公以民居侵據通途不因是時一正之害未艾也乃訪古溝遺跡盡復其舊自是無火災民方大以為便嘗治一豪氏之無良者偶與漕有連以屬公公必欲竟其獄漕陰中公而罷人皆寃之二十八年除知撫州抵玉山以病匄歸是冬召赴行在次年陛對除太府少卿七月除秘閣修撰两浙轉運副使公嘗領浙漕事至是十四年再至人以為淹囘而公曽不介意振舉職事視昔有加居無何顯仁皇太后上仙太上皇帝欲得典禮嚴備御筆委公專領辦護公晨夕不少懈訖事進右文殿修撰三十年正月除知臨安府府以應辦積欠民戸緡錢幾數萬公曰天府為郡邑首即售物不償其直何以示天下盡還之明年七月除權戸部侍郎先是御史中丞汪公澈論版曹闕官當遴選太上問誰可者對曰錢端禮可故有是命八月兼樞密都承㫖九月兼權知臨安府公嘗建明用楮為弊至是專委公經畫分為六格出納皆有法幾月已易見鏹數百萬三十一年八月丁雍公憂次年今上即位公取故諫議大夫忠肅陳公瓘所撰芻説中二十事事為之説號曰正論進之時邊境方擾公言戰守為尤詳其畧曰當今國家利害莫大于夷狄侵侮然圖大之計不若從是而務實張虗聲蹈實隱非國之福也去年諸軍所可恃者獨一劉錡而首不能支託疾退師其餘或避舍宵遁或全軍陷沒或逗撓不進間取小㨗以欺君上公肆大言然無成效幸而敵人自相殘滅不然可為寒心今金主新立陛下嗣服之初所當講聘睦鄰修明政事訓勵士卒増理邊要外與之和而不忘内修中原之民將見襁負而歸王化矣上每為稱善賜親札曰卿世積忠孝姻聫戚畹雖居憂于外乃心罔不在國家載閲奏篇備詳忠讜嗣有聞見無憚剡牘公又奏曰陛下訓練甲兵申命將帥人人賈勇無如今日兵法曰倍兵不戰蓋衆寡强弱既已不同縱有驍勇之兵忠義之將適足以餌虎口耳今彼勢雖屈而事力尚强未可與之較勝負今日將帥非無忠勇之士恐為匹夫之勇乗危僥倖貪小利而忘大計使得一城一邑而旋得旋失既不能保持其民人又不能堅守其要害更相屠戮以激强敵不惟終無所益久致㓂兵願陛下審思利害而熟計之明詔諸將無妄出兵以蹈後患夫戎狄俗尚殺戮然两世俱遭篡弑矣報應之理各以類至是殺人豈有利哉藝祖不血刃而得天下盡除五代專殺之弊故四海之内歸仁焉陛下若取法祖宗以仁政為先自可以鞭撻夷狄不在于戰勝而後定也令彼殺我亦殺彼鬭我亦鬭諸將疲于奔命民困財竭而兵革不息意外之虞又有不可勝言者太上講好息民二十餘年今一旦欲以虗名招實禍獻言之士徒以口打賊若將帥妄希功賞誤國逺圖後雖孥戮之亦無及矣臣竊謂當修睦鄰好以懐柔為務則安靖休息不妨固守邊障遵養時晦上以奉两宫之歡下以安百姓之生仁及草木則中原不難圖也隆興元年冬外除召對内殿自符離失利之後南北相持和戰未決公奏曰竊觀注措施為可謂勤且勞矣且夫大功必立而未聞其效者豈非議論偏勝機事失宜未得其當耶中原之當復人皆知為不可緩恐須時至則可為耳今士多持以為進身之資揣摩上意所以施為之事未嘗有成徒捐貨財虚費民力有用兵之名無用兵之實是欲増重兵威而反弱國勢豈不為鄰人所侮哉至于招納叛亡交結鄰援此皆賈怨生事無益于國者又以江東守偹未具及所用將帥未盡得人又奏臣聞金人數有文移取索俘擄人衆是釁已開為興師張本敵人犯邊淮東必自清河淮西必自渦口两處當豫選梟將委之拒捍維揚六合和州當為聲援須擇有謀略三大將臨之髙郵僻在一隅三靣阻水止可以處游兵水寨之屬或可為間探不可專恃陸贄謂兵當居重以御輕蓋謂以輕兵居前重兵居後為臂指之用淮上既固則大兵當屯于沿江如采石宣化鎮江江池皆當嚴備又須選名將數人如前日有因事而罷者願加收䘏諭以恩意稍復官爵責之後效孰不願盡死力仍須以威望素著懐忠善謀者使各䕶一路敵知備禦有方未必便敢輕犯若處之失宜反為所易故上兵伐謀不待戰而定勝負也是日除戸部侍郎兼樞密都承㫖二年寓吏部侍郎上靣諭前日劄子議論甚好朝臣皆不及時韓公仲通為尚書同對論及經費因奏所入有限兵食日増正恐此去或更有調發不易應辦公奏曰臣頃在戸部已見支用不足嘗總一嵗出入之數比較五年増損多寡為㑹計録上之後自度牒既行僅得八十萬通約有四百餘萬内庫取撥又不在此數而辛巳調兵為之一空今日匱乏實由于此今宿兵之久未見休息之期臣等所以夙夜惴恐未知救弊之道上云直須恢復中原了財賦須充足仲通奏曰恢復恐未可必且願陛下經度目前所用公奏仲通之言甚是望陛下聽納上亦稱善時左相湯公思退右相張公浚招戸部長貳同到都堂右相問两淮興兵用度錢糧公云未知合用多少右相云軍中大費且備千萬韓公欲退而議公云此事體大須與两丞相執政靣議若非于經費内分撥必須飛泛措置經費既不自足飛泛必取于民民力困敝若無名横斂不惟不堪必致人言韓公云民間科斂甚難不知以何名取之惟有鹽鈔一事容試議之公曰鹽事差可為然添起鈔靣則民食貴鹽未必及千萬之數改法亦重事若一切行之恐致中輟須先有定論然後有司可以奉行後再論鹽事右相云不若賣度牒數萬道尋有㫖且給一萬道然竟不施行時左相乞出公因對又奏今廷臣羣居竊議但以和戰守三事為進身之資未嘗權國之利害分朋植黨牢不可破以惑上聽萬一事變奈何三説不必執一但度事力淺深知彼已當何如耳上極然之問今日當何如公即奏三代以至秦漢夷狄多得志于中國所謂王者不治夷狄非不治也以不治治之也因厯陳秦皇漢武用兵之禍髙帝和親宣帝不用兵之利澶淵之盟為中國之福燕山之役致靖康之變又言太上講觧以致乂安陛下欲成恢復之志此聖主之用心也然兵者凶器帝王之道以仁為本太祖灼見故以不殺為武應天順人指顧而定中原破蕩而四海獨知有趙氏豈非仁恩之至乎非不知順㫖迎合可以保爵禄世受國恩蒙陛下非常之遇臣而不言誰當言者願以符離之潰為戒早決國是為社稷至計上改容欣納云卿論事甚詳因賜巵酒且云卿可見湯思退諭朕㫖令勿再請仍見張浚令早行退詣二相府宣諭右相遂行三月充淮東宣諭使王公之望使淮西公奏又詳陳秦漢之事且言魏晉以下無術制夷狄以至于亂者多矣惟有唐制頡利得先後之序和吐蕃有終始之謀五代石晉之事尤不足言自完顔亮入宼于今四年天下不得休息殺傷不可勝紀疾疫者殆無虚日官爵不足以充賞錢糓不足以為用内外急迫上下煎熬而議者不深維大計惟空言以永虚譽抵巇而要利權國何賴焉臣故厯陳自古所以制夷狄者在徳保人民者在仁願躬行此道以致太平今两淮名曰備守守未必備名曰治兵兵未必精欲増兵則餉饋無所從出欲増備則人力有所不勝雖使敵不犯邊但見日以自困今所以未長驅而來者蓋完顔亮覆車未逺慮挾弹者在後欲與臣下重兵恐有尾大不掉之患又河南困敝未易鳩集故委前日餘兵付一元帥使自經理其意蓋欲和耳故在今日和之為利南北均焉或以前日持用兵恢復之説者為勇為忠為剛以今日和議為懦為怯為弱此不明事機不計事實之甚也用兵而敗豈不為懦連兵數戰而無功豈不為怯與敵角逐而不能勝豈不為弱今斷然行仁義之事修文徳以來逺人可不謂勇陳帝王之道以輔明主可不謂忠以柔克之可不謂剛又況古者兵交使在其間禮文之事安可遽絶前日敵帥九言四郡之地若使命得通庻幾有可商𣙜未至遽行萬一彼以重兵攻下四郡宼襄漢淮甸重相邀索和則退師不和則進兵不知其時議者何以處之昨小使之行自來無此體例為彼摧沮以自取辱蓋縁事多輕發不思後圖兹蒙選擇俾宣徳意于淮東及令經度事宜不敢隱黙取誤國之誅望察臣愚忠明詔大臣早定其議御筆付三省又奏向者經營山東得海州而終不能守中原之人非不懐祖宗之徳澤歸陛下之仁聖然自出兵收復所至刦掠重擾其民既而又不能堅守為金人屠戮肝腦塗地生業蕩散無餘若此望簞食壺漿以迎王師難矣陳蔡順昌夀春等處皆被此患如此招來適足以離人之心堅後日之敵也傳聞道路或謂吴璘已失徳順秦州不守還保川口果爾則可見用兵無效虚費錢糧枉殺軍士初無益也不徒無益正恐釁端再起兵連禍結養成大患雖有智者不能為陛下謀矣方今將帥兵强馬壯未有如璘者力尚不敵況餘人乎建康鎮江之兵經王權李横敗衂之後率皆傷殘之餘又且數易主帥士氣未振江池襄漢之兵尤為烏合殿司一軍為成敏破壞死損大半而東南諸郡起發之兵懦弱不堪披帶緩急必致誤事臣故曰和戎國之福也聞金人大軍見屯虹縣積粟糧秋冬必為邊患两淮城邑半為丘墟雖欲堅守戰備不具又無兵力以拒之或欲清野則是先自棄之萬一彼留戍淮上俯視長江以久相困豈非危道哉雖欲與之連和彼必偃蹇邀索何以應之靖康議割三鎮百官廷議舉朝皆謂寸土不可與人後敵騎長驅事窮勢迫則或言割地或言固守一時不能堅決金人徑抵京師三鎮平下遂成大變前日議臣相與太息而已眞可為痛哭也臣所以墮肝膽吐情實願陛下夷攷前事永以為鑒早定和議遣使通誠以保國安民為計既和之後養勇以待時蓄積以富國待兵力既壯機㑹可乗惟陛下所欲為耳又奏專言用兵者嘗謂敵人已弱可以恢復今止得一宿州而遽棄之則恢復之計復如何有用兵不勝僥倖行險輕躁出師大喪師徒者則必勝之説果如何有自獻其説欲折服人使用敵國之禮者及從而遣之則辱命無所不至使至今和好未決則未見其折服使人之效也有稱長安談笑可取鳳翔之虜如何可逃者今西師取一德順尚不能有則未見其談笑取長安之效也凡此數事皆可攷驗誤國明甚不可掩願聽言則審其忠實立事則黜其浮議幸甚五月公至揚州頒詔勞賜諸軍即申朝廷云雖未至楚泗淮上守備大畧已見揚州城補葺破敝全無樓櫓何以容人借使有人須積糧為一城之計可也設敵人自天長徑入𤓰洲曠野約可容二十萬則揚州巋然在後詎能堅守瓜洲两小城不過容五七千人豈足當其鋒两處守禦止如此泗州邈在淮北如敵兵渡淮不必取泗州逺則光濠近則浮山一帶皆可以濟近日淮北賊過浮山寨卻奪婦女驢馬泗州恬然不知或敵人徑渡及自清河口運糧而來泗州必先隔絶此不待圖上灼然可見若自西路而入則海淮泗折北不支揚楚坐困前日劉錡之敗是也今營屯備守皆嚴將士亦願賈勇其如地勢平曠分布難遍聚于一處則不能分守要害各守一方則臨事難應大敵今劉寳一軍分屯外在寨者不滿二萬自以為憂正以前出後空别無後繼或謂輕兵在邊重兵留屯江上則敵可直臨大江小駐不去坐失两淮尤非䇿也至若軍須調度糧饋犒賞金帛官爵計今日帑藏可充其用否今泗州姑少増兵以張聲勢移江陰一軍亦可以安邊民助軍聲爾若決欲守備如金湯之固前日蓋嘗大有所費矣皆徒勞而必不可恃若欲開拓以希大功萬無一可故曰用兵難而守亦不易罷揚州牧馬監塞楚州滿浦閘増清河之戍兵積監本之贏貲皆公措置之大略也既至盱眙泗州宣詔犒師與守臣遍巡城上觀覽形勢時準御筆云泗州可棄則棄今夏金人蓄鋭秋必犯邊彼以重兵得泗州即去則于我無利害不必與之爭鋒若守而不去則㑹重兵絶糧道是不戰而勝也若彼得泗州而平其城郭而去則我亦平其城郭如淮陽軍之類是也朕調發卿以前軍屯楚州扼清河輕兵守泗王琪以殿司兵二三萬屯揚州郭振屯六合淮西自有王彦張守忠等敵兵雖衆何足憂止恐調發不及而來卿宜保江上朕便遣三衙兵至江上卿宜軍徃楚州别有所見即具奏來時審議官胡昉揚由義已囘两月金人聲言聚兵于近邊有意連和而朝廷尚未通書遣使知揚州周淙提舉茶鹽吴巘謂彼計如此必有所待欲作本路帥臣一書鈎致彼帥之意然後審處其宜公為聞于朝謂两淮與金人各為屯守之計彼既清野稍逺其兵我亦宜休息少減屯戍其意各欲安静然彼此未絶闗防欲休不得休欲静不得静則餉饋不減于前日戰守相去能幾何縁國是未有定論前嘗有書徃來今遂南北阻絶周淙等恐因循及秋敵情難料若彼趣和之意欲速則興師之舉必急兵一交鋒所傷必大若待其無禮侵踰而後與之盟曷若先事通情可以欵其意因具以淙等書上之囘至楚州又奏論前此屢通元帥書使命終不曾行議論久無果決所以致彼之疑必曰既不遣使又無禮幣謂我通書止為欵兵之計持空言以相誤也布薩忠義按布薩舊作僕散今改後同在邉累年若成和解彼則無功今業已簽軍意欲一動力彊則自取待其不可然後連和固執前謀以激功利今雖與之書彼必持此説沮格其議不若便遣信使直造燕山一則可見金主之意一則可伐布薩之謀仍調發諸軍分屯江淮以備不虞或不納我使納而過有邀求則曲在彼而不在我兵以曲直為勝負不繫强弱衆寡前日完顔亮之事正類此也又得御筆云比得陳敏奏泗州兵少欲増戍兵朕俟近秋調發設若七月敵人伺我不備衝突泗州輕則敵衆則避縱使得泗州終何能為卿當按兵持重圖之六月歸奏事納劄子十二及六圖一一指陳仍言守備踈略恐敵人入宼再對上問兵力險要具以實對改除吏部侍郎仍再令日近起發公又一再入奏乞早定和議及和議未決守備當嚴七月囘至鎮江被省劄住楚州以此體度應副北人登舟至江口得盱貽報北人未有來耗公具申朝廷謂來朝未可知若遽徃而守待日久彼無來耗勢必空囘徒致衆疑俟報而動庻合事機又遣屬官楊由義赴闕奏乞遣使發兵云北人來期皆是不定之辭未可信憑今又無耗敵情狡詐竊慮别生姦計其遣使發兵二事皆不可緩若只發兵以待其報則海泗二郡必先受兵中其陰謀若只遣使以俟其和則可否未決不可不虞惟當遣使與發兵並行使以盡其禮兵以防其變若使至北廷則堅決之語誓書一定然後抽囘軍馬脱議論有變勢必相侵則嚴兵固守與之力戰是謂應兵臣雖不武實無所懼所以至于再三冐凟天聽者恐一失機㑹後必噬臍望速賜睿㫖施行數日又申朝廷乞速遣使介以示信彼見使來必喜無有使行而兵來深入者兼使人見敵酋言必端的彼此可決使囘即遷西城所有不過信宿事耳與其先墮其城不若速遣使介彼料吾重于遣使若使命既徃信非空言其間設有小不相從至再至三議當定矣書中務存大體簡嚴其文不必用前日來書中辨曲直之語郤恐引起不遜之言後復難處當少遷就之以濟大議須兵與使同遣一則使敵人聞我有備和議早定二則安海内之心亦知吾本謀得和則和必不得已則戰以和為先事以戰備不虞如此則間言異議無從而入不必待其書來而後遣使書中或有見脅之語則不若先遣以釋其疑以破其謀于計為得八月由義囘自行在云到日得㫖内引上云錢端禮所奏未是左相又靣授劄子三十五道令親納宣諭劄子係奉聖㫖令將海泗二州戍兵先次撤囘便令奉行時丞相魏公杞為本司參議官是日招劉寳及參議官以下與由義㑹議公大言曰某屢于内殿奏和戰之議未決且當固守邊圉觀敵情以待其成舉動皆未可輕必不得已而為應兵曲不在我若與之和彼已求四郡之地前後雖已許之彼必候盟書約定而後退師今使命未遣雖敵帥通書本相未曾計割四郡若無故撤戍而囘是棄之也彼乗虛據之自言收復不以為我之惠他時别有邀求或乗時侵軼孰任其責上不以某不肖付之一路事權一已去就至輕此事繫天下休戚斷之于心必不敢奉行須俟遣使或朝廷通書議定始可議之即具申奏力諭撤戍不便縁繫北界囘書未到之日承降指揮今北界囘書已到本朝之書有續當遣使之文若所議之事北界書中悉已相從則目下撤戍便可交割或事有未定只撤戍占據之後餘事難以商量縱欲備宣聖主示信之意他日亦難以口舌爭也又慮未曾遣使交割撤戍之後敵帥據以要功自稱收復又執盧仲賢之語必愈費力兼两州撤戍合行事多難以申明待報恐致誤事乞暫赴行在靣奏曲折得㫖邊事末定未須求對别有事宜速具奏來遂上奏并牒北界官司檢繳申未挾日金字牌至奉御筆覽卿奏劄欲遣使事朕初遣卿為宣諭意在肅軍政明守備二者皆無所陳卿當與諸將嚴戰守主和議非卿事也雖金人重兵屯于淮北亦須待許我議事方當遣使若因而侵犯則將帥之任安在哉撤戍可早闗邊無害不可遲疑即日便宜施行卿恐兵一動若彼不囘書而發兵則當何如卿欲奏事邊上未可闗卿可頻具奏來翌日又準金字牌魏杞令疾速赴行在奏事公亦乞罷遂請劉寳靣付撤戍省劄仍與議定候朝廷北界書先行然後抽兵庻敵人先得書知是以海泗與之不是白棄两郡日後免于邀索是日發下宰相與布薩書登時入遞盱眙申齎書已過北界九月癸未朔得㫖過淮上措置撫于軍民以二州撤戍人民南奔也報差魏杞奉使康湑副之庚寅盱眙報撤戍人囘辛卯招撫司申胡明兵馬已囘敵已薄海州而未入公申朝廷云自至淮上两具申稟又遣幹官稟議乞發兵遣使二者兼之既而被㫖撤戍即具奏合候使行議定之後正防姦詐尋蒙璽書切責已即恭依近北界射過榜文已相見欺未知厥後之意方今两州未受奉使未過正是危疑之時雖飭諸將嚴備竊恐兵力不加累乞王琦一軍望早賜調發引疾求罷非敢規避誠恐死無益于國耳尋報金人有入宼之意蓋遽得二州反以我無信具以聞望日敵騎已入泗州民有不及南渡者或刖其足海州歸正人亦多被害两州積糧尚二十餘萬半為居民所焚餘者皆為敵用壬寅得御筆已令王琪起發劉寳軍馬有分在他處者可盡抽囘不可使兵分詔劉寳亦如之公奏敵人貪婪無厭既見撤戍遂啟姦心虚張大言公肆迫脅陛下憫南北生靈俯從其議令大臣通書講解撤戍以示大信彼宜應答如響而乃包藏異意自反其説此殆天亡之時也夫無事則深憂有事則不懼臣已謹戒邊吏固守封疆不為禍先不可輕敵若取接使介則信義不可輕變或妄為陰謀别有窺伺臣當傳檄六師奮勵諸將堅壁以老其師持重以乗其敝絶其糧道挫其鋭鋒以逸待勞可以決勝甲辰王公之望除參知政事丁未報左相除都督戊申得省劄除兵部尚書都督府參贊庚戌淮泗報金人侵廬州本州移治初頓遇守夀春金人繫橋不敢禦敵是夜南徙韓璡守廬謂敵已渡淮徑入焦湖郡人奔迸致溺舟狼狽甚衆既而聞虚驚復還十月庚申公以督府既建宣諭司乞結局又申朝廷比得盱眙録到來書副本正縁先得四郡遂致猖獗如取俘擄等人決不可從事須斟酌不宜欲速若固守道理使知我不畏怯乃所以速之也癸亥差充大禮鹵簿使十一月癸未探報敵騎已至濠梁盱眙守移治天長奉使楚州敵未渡淮而盱眙大火軍民奔走一路震動因取所遺錢糧自燕館郡治民間屋宇盡移泗州魏勝力拒于清河死之進據楚州初金人本不為渡淮計而一旦至此豈無自哉丙戌公赴闕既對上曰前後廷臣議論獨卿不變兼戸部尚書乙未上問欲遣楊由義持敵帥書而辭行甚力誰可遣者公奏臣聞王抃者雖不識其人前副盧仲賢行知事之詳又亦密細自願一行更望召見察其人而用之上欣納數日遂行丁酉下詔親征戊戌上宣諭卿議論實忠于國欲用卿為執政公控辭甚力辛丑除端明殿學士簽書樞密院事賜同進士出身甲辰兼權參知政事時邊報日至都下官民多謀移徙或傳徳夀宫亦有諸宫燒香之議人心愈摇太上宣問近事宜公奏金人必和但民間驚疑似聞陛下亦有所備所以日有妄傳臣不敢少誤陛下此豈小事願陛下不可輕動太上開納自是始定去者復還或議峻其法禁公曰朝廷鎮静持重人當自寧豈可家至戸曉也閏十二月乙卯得㫖令執政等進呈文字以左丞相陳公康伯疾也公奏適見付出王之望奏金左副元帥見在滁州恐王抃徑徃都元帥處則于左副元帥情意不通乞將書本别寫發徃左副元帥處臣竊詳之望嘗建三䇿欲放彼處人至淮用兵掩擊今既過淮之望又在江上若見得可擊必已擊之久矣而乞再通左副元帥書可見之望親臨所見必不敢妄言以背前説乃所以盡忠望從而行之乙亥王抃到闕先是上嘗宣問敵情如何有需索否樞密虞允文對必有之公曰若然是不欲和若只如盧仲賢約定方可議耳抃至書未啟封上復問允文奏定有需索恐難應副公獨以為今既駐兵不動又連來通書皆無不遜之言欲和本出彼意若必欲和定無意外或果有難應不足從也及見書止是欲世稱姪國書用名後用再拜皆舊書元定項目内事餘無他請上曰今既别無所需可如其式報之虞曰何必一如他説公曰而今正以未能制彼死命苟力可制又豈以一言半辭為輕重但權其事機而已虞曰且如和尚原最係川蜀襟喉豈可復與上曰他要辛巳年以前舊界為定若于内不與和定不成公奏固知險要我若求之而得彼卻以求何以應之況與向來之和不同虞曰有何不同公曰今既以皇帝兼稱則名位已正雖曰稱姪是敵國與向日殊不同又減十萬嵗幣此三事最大我執之已堅彼不能易此外若更力爭是求釁也謀國當思逺圖姑與之和則我得休息以修内治若為忿兵未見其可恐欲為治兵親征之計臣乞先罷專任能者争辯至漏下數刻方定虞已承命明日又奏王抃行只理㑹乞令奏使朝陵寢一事上曰不若且休待事定了别議公又入奏第一次遣使莫若安静庻幾他日有事卻可與言抃遂行十二月辛卯除參知政事兼權知樞密院事先是已得差遣人限五日出門奏除其令論館職不當限員又論人才當須自外召三五人靣論然後審擇而用上皆從之奉使過界北軍已囘甲午降詔和議已定丙午上問改元事隆興故叛臣趙諗嘗用虞公以為載籍所不載自不必改公曰改元大典也簽書王剛中奏事留身上以為問剛中奏此事具見曾布日録不當復用錢端禮欲改虞允文有不同之論臣以為當改御筆欲用乾統西北虜曾用别擬四號以進遂改乾道元年正月辛亥朔上親祀圜丘公為禮儀使率百僚班賀于端誠殿庚申充徳夀宮使丁卯公乞出不許丁丑殿中侍御史唐堯封論公以帝姻不可任執政公即再乞出堯封除太常少卿戊寅又申前請上云朕已宣諭堯封朕以公選用才即非􅀻意公奏曰既移臺諫愈不自安上曰決難請去己卯降詔不允不得再有陳請二月庚辰朔祥曦殿奏事虞公奏云錢端禮輔佐陛下方成和議恐未可去上曰和議出于朕意參政端不可去王公亦奏大臣進退所繫非輕公又奏乞從臺諫之言間陳累數百言退復入文字辛巳御筆朕念即位以來股肱鮮克勝任倘得其人不以私義廢雖議者或有不容而曾無眚愆見于論疏抗章屢上丐去甚力方憫風俗之極弊嫉浮言之易興卿宜竭節推誠亟安厥位毋以小嫌咈朕意也次詣徳夀宮太上亦再三諭不當去位又云只如許大一件事非卿誰能了得丁酉寒食公奏欲上先世諸王冢上再三宣問因厯敘家世上曰卿以才徳選不縁私親是日約族黨具集表忠觀焚黄两宮夀聖殿並賜酒果以為榮丞相陳公已病公為援典故以長子偉節為直秘閣次子安節賜同進士出身既薨于位以少師大觀文致仕公奏逆亮内㓂康伯以重徳鎮浮陛下踐阼康伯以大忠翊戴宜優贈典遂贈太師已而王剛中薨公亦稱其竭忠輔治引詹大方故事乞贈七官外更加贈一職以示優禮所以周旋二公之後備至公既行相事兼權提舉玉牒監修國史八月乙酉詔立鄧王為皇太子壬辰公入奏避親嫌甲午除資政殿大學士在京宫觀仍奉朝請踰月兼侍讀公在經筵論事不少貶而勇退之志益堅七上章求外祠始改提舉臨安府洞霄宮辭日宣坐賜茶襃諭尤渥四年秋起知寧國府仍奏事而行公治尚簡静幕府省文書蠲畸零税八萬餘緡一方為之鼓舞建炎初劇宼攻城故參政莊簡李公光力卻之奏為立廟境内有麻姑山地曠多藏姦盜公奏立砦仍置官徼巡百廢具舉不加鞭笞而租税如期郡以大治雖鋤治姦猾終以恕行每曰治道去太甚者爾六年四月丐祠六月知紹興府力辭而歸九年申前命辭不獲免適修荒政不憚勤勞民賴以安又勸種麥官與之種明年麥大熟收數倍決滯訟理經費吏民以為神明两郡皆為之修建貢闈且葺公宇廢瓌者率談笑而辦最聞除觀文殿學士公在越凡有建明直達上前請無不從或以御筆批行忌者恐再用因以飛語中公既以祠歸竟降資政殿學士以罷時淳熙二年四月也三年太上皇慶夀公以紹興從臣特轉通奉大夫六月再提舉洞霄宫四年三月復資政殿大學士八月屬疾請致其事復觀文殿學士壬辰薨于正寢娶李氏中奉大夫直顯謨閣莊之女贈文安郡夫人再娶髙氏封鄆國夫人先公一年薨男當故奉議郎女一人為莊文太子妃孫象祖承議郎知處州軍州事女三人修職郎監行在車輅院吴修年迪功郎新福州侯官縣主簿王鐸承務郎知常徳府桃源縣許軫其壻也曾孫二人曰雲曰澤並登仕郎女一人尚幼公生而不羣居重慶下承顔幹蠱曲盡孝道雍國尤所鍾愛親教以詩書雍國父之間質肅公介之幼子嘗仕館閣以元祐黨廢娶晁氏濟北先生補之實為羣從公承平時生長京師富貴中了無膏梁之習唐氏晁氏諸老尚無恙公從容其間因得以講論文詣商㩁古今又先世自文僖公以來文獻相繼故公曰自少多識前言徃行熟于典章由熙寧以至政宣間事世所不及知者厯厯能言之謂李徳裕不應進士科以至宰相非力學烏能至是耽玩經史未嘗一日去手少時嘗手節十七史甚備晚又著史提要行于世尤通于左氏西漢率多成誦幼好為詩伯祖内相文肅公勰字穆父與蘇文忠公游徃來書尺唱和甚多公尤刻意慕效詞翰得其遺風清癯如不勝衣而眸子瞭然如神仙中人尚氣節功名雖在下位時聞國有大事必黙為經畫揣成敗多中嘗稱子房貌若婦人乃能仇秦而興漢蓋自況也為政飾以儒雅不專事文法望之儼然即之也温寮史禀自使盡其詞一言剖決是非立判公家之利知無不為不顧一己之私意所不欲廹之終不能動靖康用兵公親見和戰不決而致大患故力陳和議終始不變公規畫甚逺亦非苟于就和者但以内審國用外察兵力少休王師方可支吾以圖大計崇深果決洞見敵情嗚呼辛巳敵人之變無可奈何若甲申嵗公揣事勢謂金人弑亮之日以無名興師騷動百姓為辭今新造之國又負篡弑之名必不肯效尤以取禍但欲偃兵以靖其國徒張為虚聲實主于和故勤勤懇懇欲乞遣使以通好出兵以示備緩棄海泗以為惠至于執詔書而未出以當之使盡行公言則敵兵不動不至淮楚再遭蹂躪之苦公之言亦不為不用而用之頗失其機西則廬濠先遁東則劉寳不援魏勝以致敗死豈不痛哉是時士氣愈索幾不可支而敵人似進而退似攻而緩公益探其欲和而已之説為是故王抃之行諭之曰此行有三一曰正位號二曰定名分三曰減嵗幣徃徃人不以為然謂如此何以郤敵至有靣詰公者公笑曰事成是非乃定姑少待之抃囘既皆如約金果退師人始服公能斷大事自此南北晏然以至于今誰之力也公始至台呂忠穆公頤浩一見賞歎以公輔期之又為參政席公益所汲引中書舍人潘公良貴元樞賀公充中皆相友善尤有知人之鑑丞相史公浩魏公杞知院王公綸或交于布衣或取于賓僚推輓名士至輔弼禁從卿監臺郎者甚衆一介之士苟所許可無不委曲薦達嘗曰韓安國自謂所舉皆天下士賢于已者誠竊慕之士之賢者恨未盡知耳好賢樂善如恐不及甞奏事徳夀太上賞雪賜坐以玉盃宣勸不以名呼隆眷如此因問及閒居自號乃大書松窻以賜上亦賜忠實二字两朝宸翰光動一時公雖家居而恩數視政府其孫裒所著詩文奏議若干卷號松窻集藏于家初康公賢穆葬天台之護國山公以某年某月甲子從葬遂為台人公初歸寓瑞嚴僧舍年餘始卜築于城之東北隅有林泉之勝立精舍繙經其中暇日幅巾野服與方外之士徜徉笑傲觴詠琴奕甚自適也及遇圓悟禪師䆒心内典超然自得視軒冕如無故出處死生之際絶人逺甚得疾即屏去醫藥曰生則有死亦事之常大期將至待之而已疾革家人捧藥泣告公曰汝曹豈觧此大丈夫何可倖覬萬一浮屠氏或勉之亦笑不答第捐金分施以謝之前一日肩輿登所居山園瞻謁釋道像如平時歸即瞑目安坐至終神色自若豈苟然哉公薨之後象祖以書來曰先大父居官立朝之大節公知之最詳願為紀述將以告于太史氏鑰竊惟參政徳望勲業在家有牒在國有史搢紳知之士民誦之豈衰朽骫骳之辭所能發揚觀公自隆興以來與人主論天下事見于奏對者多矣皆本于忠實合于人情是非有攷于前而所成敗有驗于後其先見如蓍龜之明其定力如金石之堅至如囘太上燒香之行抑都人遷避之擾皆所目擊而心服者載念鑰自幼識公于三衢首蒙賞愛來倅鄉郡鑰初竊第以歸及尉江山公方主漕事即收置門下公之守婺鑰適丞金華知遇益深護慈寧之喪辟以為屬後入為六院正隸版曹煩使必以見屬宣諭之行亦備數幕下進參大政力薦于上前以鑰之不肖叨寘從列實基于此四十餘年所以挈提成就之者至矣而鑰既無所効尺寸于公者矧公之門名人才士凋謝無幾何敢以固陋辭謹摭其大者書之不敢隱不敢諛卒狀如右攻媿集卷九十二欽定四庫全書攻媿集卷九十三宋樓鑰撰神道碑純誠厚徳元老之碑奉敕撰節度標題一作太師保寜軍使致仕魏國公諡文惠追封㑹稽郡王史公神道碑據篇中親灑宸翰云云則此為當日原題髙宗皇帝以孝宗君徳日就將屬以社稷妙選天下學行端粹之士以輔導之紹興二十有九年太師㑹稽郡王史浩以國子博士奏事殿中髙宗一見契合屬目送之諭大臣曰浩今日有用之才也除秘書省秘書郎粤五日兼普安郡王府教授受知髙宗被遇孝宗實昉于此明年孝宗封建王遷司封員外郎兼直講又明年為宗正少卿三十二年五月立皇太子擢起居郎兼左庻子六月孝宗受内禪遷中書舍人兼侍讀十日為翰林學士知制誥八月參知政事明年正月拜尚書右僕射同中書門下平章事兼樞密使未幾罷政再典巨藩淳熙四年春召為侍讀五年三月復拜右丞相十一月罷仍侍經筵八年告歸得請一再召見恩賚罙渥每以老先生呼之孝宗移御重華宮以宴處清閒思見舊學太上皇為頒詔諭賜御札明年遣幹辦御藥院楊舜卿撫問趣行命守臣以禮津發既入覲孝宗顧公曰卿輔朕初潛親遇朕建朱邸陞儲宮登大寳两居相位三入經幃逮今三十餘年君臣相得殆非他人比也五年四月五日公薨于里第之正寢訃聞孝宗上皇震悼賻贈有加有㫖以公身居極品又為夀皇潛藩舊學贈䘏之典宜從優異可特追封自餘賻葬恩數並如陳康伯例今皇帝登極賜諡文惠親灑宸翰書純誠厚德元老之碑以賜焉且命臣鑰為之文臣以末學待罪北門乃得對揚明命敷述盛美以詔不朽臣雖甚陋何敢辭竊伏思自古君臣以遇合為難而篤眷不替善始以終殆千載而不一遇也方孝宗以藝祖統系之逺承髙廟付託之重時公以所學糾正贊弼自其緝熙光明推而至于事親以孝事天以誠兵不輕用刑不妄施人才盛多夷夏乂肅孝宗繼志述事之功承顔順色之愛刑于四海光于萬世而又惠顧帝師日篤日親胙我太師福慶流衍光大顯休追嫓典謨孝宗奄棄慈極公先六旬以遺表聞嗚呼豈偶然哉公諱浩字直翁世為慶元之鄞人曾祖簡祖詔父師仲俱贈太師冀國公曾祖妣葉氏祖妣徐氏妣洪氏俱贈冀國夫人曾祖蚤卒母葉夫人有遺腹指天自誓願得子以續史氏之祧是生公祖教之甚嚴以八行薦于朝積徳垂祐寖大其家仲子才紹興二十三年為簽書樞密院事公又繼登揆路衣冠盛事莫尚焉公性穎異記誦絶人少孤自力于學貫穿經史理致超詣措詞持論出人意表年四十始登進士科授左迪功郎紹興府餘姚縣尉尋為温州州學教授郡守張九成有重名待以國士諸生推崇之以中書舍人吴秉信薦除太學正遷博士改宣教郎自此六年以至相位近世未有也公智慮深長臨機輒斷平居若不勝衣而剸裁勇決毅然不可囘推究經㫖多先儒所未發引經處事動中要領完顔亮南牧邊廷用兵建王抗疏請為前驅誓不與賊俱生公方以疾移告聞之亟徃問孰為大王計誤矣國歩方艱父子豈可須臾離使唐肅宗能隨明皇幸蜀安得有靈武事建王大悔立俾公草奏請扈蹕以供子職辭意懇到髙宗聞議出于公歎曰眞王府官也廟堂方議以建王督師由是不果遂從視師之行而内禪之意決矣髙宗將過徳夀宮公議嗣皇當乗馬扶輦髙宗諭公曰執鞚前導不足為法公對曰臣于肅宗何取父行而子隨萬世不易之道也孝宗竟用公議髙宗數遣使邀還出皇城門而止既參大政召宴禁中公奏臣頃在翰苑雖暮夜宣召可也今居政地非有中使不敢前若恃恩奔命非大臣體孝宗深然之嘗問當今施設何先公曰莫加保邊境收人才前言辛次膺張燾人望所屬即日召還又薦周葵任古胡銓張戒王十朋等以次收用公平時咨問天下人物有所聞密疏其實且識言者録為一編皆于此乎取又得金安節王大寳周必大等三十五人各書所長以聞並為時用嘗對徳夀宮髙宗曰皇帝誠孝卿輔導之效居多今又得卿佐之朕心亦安又曰卿為皇帝親臣凡有規正不可囘忌賴卿悉力調䕶公既推謝次日又因奏事言之上封事者多乞減任子公請嵗一試且損其額試者必習所業以應詔既不傷恩足以激厲孝宗顧左相陳康伯議合公因奏凡有所陳皆先與丞相議而後言自是臣僚奏請更改政令必先以示公然後施行嘗因諌擊鞠事張燾共政退而曰相公愛君至矣燾又嘗語人曰參政今之賢輔不可妄議向來柄臣得君多以威嚴脇人史則不然事多迎刃而解志于寛厚上前别白是非甚明宰相器也康伯乞罷政孝宗批問恩禮已盡當與何職意蓋屬公也公即奏康伯前朝老臣不可不留以為重若其請未已必得徳夀聖諭可安其意是日髙宗賜以御筆康伯乃安職尋密詔公曰朕粗勤庻政然軍務民事未得其要若礦金璞玉方以卿為良工其毋怠焉公既相益思所以報上者首言前宰相趙鼎參政李光之無罪大將岳飛之久冤宜復其官爵録其子孫凡坐廢者次第昭雪悉從之時外建都督府歸正人及諜者日衆公雖憂之而深察其能否故拔皇甫倜于境外官胡昉于書生皆賴其用有滕忠信等八人還自山東自言已結集萬五千人可為内應公詰問再三皆無其實語塞汗下而退初已借閤門宣贊舍人遂令赴督府張浚亦以其無證僅補承信郎而已燕人劉藴古該通古今談辯如流一日濠州奏募到北方游手僅萬人欲以營田藴古力請以抗敵時欲許之公獨謂此必姦人姑欲藉以反其國耳因詰之曰樊噲欲以十萬横行匈奴季布猶以為可斬君得萬人何以成功藴古錯愕不知所對曰此皆無家必不為朝廷留不如乗其未定而用之公曰其家不來宜無固志不知君家何在藴古曰老幼皆在幽燕自知失言戰灼久之後因刺探事宜私遣僕歸燕僕以告遂伏誅吴璘以兵取徳順㨗至方議行賞公奏諸葛亮出師必攻陳倉及郿即今之鳳翔得之則可窺長安髙祖出漢中正此道也姜維舍此而多出隴西狄道臨洮得之無益今乃蹈維覆轍臣恐遂失蜀矣宜勉諭其歸登命公即選徳殿廬作詔令徹戍班師專保蜀口以俟大舉斯須而就詞㫖明暢孝宗閲之曰他人必不能道朕意竒才也既而吴拱王彥奏敵已扼璘歸路方募人徃報璘亦勢迫間道以歸袁孚罷右正言公曰初政而遽去諫官何耶孝宗曰妄言徳夀宮有私酤公曰陛下事親可謂曲盡然宮中左右皆閹官有何知識若非言路時以正論折其萌則將有甚此者上怒少霽又奏諌官無故而罷天下必以為疑若暴其罪恐啟两宫之間願少須之使其引去尋除直秘閣知温州自是益無纖芥之隙張浚屢奏欲取山東公曰宿師于外守備先虚我能出兵山東以牽制川陜彼獨不知警動两淮荆襄以解山東之急耶惟當固守要害為不可勝之計必俟两淮無致敵之慮然後可前若乃順諸將之鋭氣收無用之空城宼去則論賞于朝宼至則僅保山寨顧何益乎繼而大將李顯忠邵宏淵奏乞進兵公又奏二將輒乞戰豈督府之命令不行耶浚繼請入覲乞即日降詔幸建康孝宗以問公公陳三説謂若下詔親征則無故招致敵兵㓂邊何以應之若巡邊犒師則徳夀去年一出州縣供億重費之外朝廷自用緡錢千四百萬今何以繼若曰移蹕欲奉徳夀以行則未有行宮若陛下自行萬一敵人有一騎衝突則都城騷動何以處之孝宗感悟曰都督先徃臨邊俟有功緒朕亦不憚一行浚言陛下當以馬上成功豈可懐安以失事機公執不可退又以詰公公曰帝王之兵當出萬全豈可嘗試而圖僥倖主上承二百年基業之託漢髙祖起于亭長敗亡之餘烏可比也尋復論辯于殿上浚曰中原久陷今不取豪傑必起而收之公曰中原决無豪傑若有之何不起而亡金浚曰彼民間無寸鐵不能自起待我兵至而為内應公曰勝廣能以鉏耰棘矜亡秦彼必待我兵至非豪傑矣若有豪傑而不能起則是彼猶有法制維持之未可以遽取也今不審思將貽後悔又上疏力諫曰靖康之禍臣子孰不痛心疾首思欲蹀血北廷以雪大恥恭想宸衷寢膳不忘然邇安則可以服逺若大臣未附百姓不信而遽為此舉安保其必勝浚老臣慮宜及此而溺于幕下新進之謀眩于北人誑惑之語是以有請耳徳夀豈無報敵之心時張韓劉岳各擁大兵皆西北勇士燕薊良馬猶不能進今欲以顯忠之輕率宏淵之寡謀而取全勝可乎惟當練士卒備器械固邊圉蓄財賦寛民力十年而後用之則進有闢國復讐之功退無勞師費財之患此臣區區素志實天下之至計也督府乏用欲取之民公曰未施徳于民遽重征之恐外賊未必至民貧將自為盜康伯與公相顧同奏曰必欲取于民臣等皆當丐退上為之給虚告五百道以庚費浚又奏歸正人當優待之公以為不可浚康伯俱曰彼以善心至安可拒乎公又两入奏其一曰敵日為姦謀以撓我縱流民以困我而沿邊方以招徠為功數年之後蠶食既多國用益乏彼將反有怨悔之心可不逺慮乎固不可絶其内嚮之意其有至者當諭之使安土以俟恢復彼且無所歸怨而敵亦知國之有人豈應先為自蹙之計其二曰棄實而務名捨近而謀逺見利而忘害願棄名取實以集大勲先近後逺以安邊鄙見利思害以杜亂萌言甚切至又與浚言平時願執鞭而不可得幸同事任而數日議論不同不惟為社稷生靈計亦為相公計相公養成名望一旦失利豈不有損威重浚曰公言良是但浚老矣公曰杜預輩有平吴之功而晉歸功于羊祜以祜立規模而預竟其功相公若先立規模後使人藉是有成亦相公之功也何必身自為之浚因内引奏曰史浩意不可囘恐失機㑹乞出英斷既而省中忽得宏淵出兵知稟狀始知不由三省徑檄諸將公語康伯曰吾屬俱兼右府而出兵不得預聞則焉用相哉由是求去不已孝宗曰何苦至是公對曰道徳元老無如陳康伯忠義慷慨無如張浚臣與之議論俱不合諸將出兵而臣不知近習積憾而臣不去尚何待乎因又言康伯欲納歸正人臣恐他日必為陛下子孫之憂浚鋭意用兵若一失之後恐陛下終不得復望中原臣即日去國遂逺清光然惓惓之忠不容緘黙言訖拜辭而退遂以觀文殿大學士知紹興府公力辭提舉臨安府洞霄宮以歸未及月而宿州失利䘮士馬甚衆軍資器械不可計人心沮喪上降詔罪已而浚亦自劾去位矣初浚措置萬弩營及他所建請公應之如響或問之公曰事力未備故止其進兵若邊防捍禦安可不從公既去其所奏請多不以時報浚亦悔之嗚呼公本欲修政固圉裕民練兵雖不求近功而規模甚逺議者不察以為獨無意于事功惟知之者乃信其非苟為異也公卜居東湖之麓徜徉山水勝絶之地以奉親歡嵗時賀表外不以一字至行在所後除四川制置使知成都府以親老辭月餘改知紹興府两浙東路安撫使孝宗見公首曰卿前所奏陳如龜兆數計無一不驗從容賜坐訪以治道公以求治太速聽言太雜為對至鎮為民興利除害不可縷舉越人至今徳之進檢校少傅領保寧軍節度使㑹洪夫人屬疾思歸力丐祠不允乃許謁告迎侍未幾罹内艱公性至孝平日奉母甚周孝宗素知之在王府時得上方珍饌必以分遺登位之後間問動静以正旦賜酒肴使為夀特于洪夫人生朝拜公為相又嘗以御筆徑賜之曰丞相今日正謝賜酒果為太夫人之慶其歸自帥閫旌旄行前公擁版輿于後人子之榮極矣至是悲毁骨立忍哀舉葬纖悉周備世所難及前即吉數日除知福州兼福建路安撫使避魏王同鎮改崇信軍節度入對賜宴内庭勞問加優後三日除開府儀同三司公自言臣何功徳叨此眷寵孝宗指心而言曰于此甚有功朕學力堅固心術明正皆卿之力也初過越老穉迎拜擁道有垂泣者時方滋為帥謂公曰公去此時有緡錢十六萬米斛四萬漕司取充羡餘遂為嵗例奈何公奏除之至閩甃山路七百餘里葬旅櫬以千萬計闢官舍以益貢闈每事立規四方傳以為式建劔四州多不舉子臧獲則取于福與漳泉間公置田為莊貧婦孕育月有所給既使生齒益繁又免誘畧之害淳熙元年秋丐祠提舉洞霄宮後三年孝宗問執政久不見史浩無他否遂除少保觀文殿大學士充醴泉觀使兼侍讀頗聞有尼之者至两降親批三遣金字牌又取尚書省移文封以付公不得已而後起抵都城聞輔臣謫英州及見奏曰陛下未嘗以大臣投嶺南實國家忠厚之意此門恐不可開孝宗唯唯他日語近臣曰史浩厚徳人蓋深知前日事也進讀三朝寳訓及眞宗正説事闗治體及當法祖宗者必委曲援引開廣上心嘗宴澄碧殿酒數行步至清激觀機泉宣勸無算至二鼓孝宗攜手登橋又賜三爵命宿玉堂夜參半引雙蓮燭以送且曰此游不可無紀是夕公進古詩三十韻孝宗和答之引陳襄故事薦石斗文等五人皆赴闕既再相孝宗曰自葉衡罷虚席以待丞相久矣與執政入謝徳夀宮髙宗曰卿再入相天下之幸也公以士夫留滯旅寓者凡八百人各隨其分處之為之一清初相時蜀帥以緡錢獻公謂宜以儉徳風天下請以賜蜀郡復二税是年紹興所獻復倍此孝宗曰郤之必有散失姑令封椿如何公對曰郡方困于和買丁錢願以代輸其半孝宗欣然從之是年金厯以八月晦為九月朔或言㑹慶節使人將先一日入境請治厯官公曰天道難測未知孰是而遽治厯官是自彰其失也但當諭接伴使若使人渡江則當語以晦朔尚可議皇帝生辰則不可改先一日乃是藝祖忌後若欲行慶禮當如舊期孝宗以為當後皆如公之言車駕既幸太學公因請幸秘書省三衙皆與坐乃奏閤門舍人方以比館職亦當列于西廡崇儒矯弊皆有深意孝宗謂公視文武如一為得大體十月諸軍以多闕額又有逃亡請得自招捕許之而並縁强取被掠者或至斷指以求免都下洶洶公飛奏盡釋所捕又禽為首者送棘寺宣宰輔及樞密都承㫖議罪欲取兵民各一人梟首以徇公謂未得其平兵士可斬百姓陸慶童當坐流罪上怒不以為然公曰陛下恐軍人有語而百姓為可欺耶豈不聞等死死國可乎此豈是軍人語上愈怒曰是比朕為秦二世也同列相顧失色公徐進曰如時日害䘮予及汝偕亡豈二世事聞者縮頸而公不為動議罪既如初遂日求去位除少傅保寧軍節度使醴泉觀使兼侍讀後有言慶童之冤者孝宗曰史浩蓋嘗力争坐此求去至今悔之賜第城中出御製長春花詩酬和至再以示眷留之意又薦薛叔似而下十五人叔似召用餘以次收擢佑聖觀故建邸也孝宗嘗自北宮臨幸語曰去此十七年今得與卿為豐沛故人之飲可謂盛事甘盤無此樂也公屢求歸時陳俊卿已奉祠八年二月除判建康府公奏俊卿年未及七十而去臣以七十有六而徃豈不媿見吏民耶孝宗嘗自擬館職䇿極言取士用人之弊大要謂國朝過于忠厚以示公公讀畢奏曰太祖不忍殺一不辜以得天下累朝仁徳至仁宗而大備夫忠厚豈有過耶乞改曰一于忠厚孝宗曰非卿不能為此言五月始許歸除少師留至八月陛辭猶進八事十年請老除太保致仕公嘗厯永衛魯三國公于是進封于魏仍如曾公亮例入謝明年先降㫖候至國門百官郊迎見畢對御賜宴用文彦博故事道中具辭再三奉俞音乃絶江公晚治第西湖之左裒两朝所賜御書建閣以奉之因奏聞孝宗書明良慶㑹之閣以賜公謝不敢當孝宗曰古人願為良臣卿輔朕之久日聞忠言深悟朕心尚何慊乎敕後苑造扁榜命中使馳賜之上嘗以舊學二字即政事堂賜公同列咸曰自古際遇莫盛于此請鑱諸石為省中榮觀公又謝不敢既歸以名其堂嵗遇誕日錫以金器者十四年年八十又加器寳两宮使命相望髙宗再舉慶典詔公隨班上夀進太傅賜玉帶金魚踰月乃東上皇御極進太師降詔求言首及故老公上封事數千言皆當世要務重華之召引辭甚切孝宗誥曰今與卿皆閒人當衣褐見何必求免耶詔乗肩輿入隔門仍命孫定之扶掖特改京官朝退次詣重華孝宗從容謂公曰與卿復得相見既無嫌疑足可為度暑計毋亟言歸因奏陛下躬行三年之喪復見堯舜三代之盛孝宗曰此皆卿平昔所以語朕者今日得以行之正如滕文公盡哀戚之情而弔者大悦實自然友反命之一言蓋公平時專以忠孝二者發明聖學謂父子天倫雖自有至性亦宜先意承志曲盡誠心後又屢奏欲報莫大之恩惟應尊事不倦使慈孝两盡為萬古父子之懿範垂之子孫永永無極故孝宗不忘此言再對奏陛下召臣非徒使霑被寵光亦恐有一得之愚少裨繼明之治敢為四説以獻曰立天下之大本平天下之隱難收天下之人望伸天下之直氣謂教皇子備夷狄舉人才受盡言也太上垂聽慰奬再三既歸之次年長子彌大以疾不起公起居寖衰後感疾危甚呼諸子及孫戒曰吾受國厚恩欲報無所汝等惟當世竭忠節以圖尺寸命左右取手藁遺表曰吾且死其以是進遂瞑享年八十有九娶貝氏追封魏國夫人先三十九年卒子四人彌大故通奉大夫充敷文閣待制新知寧國軍府事贈銀青光禄大夫彌正朝奉大夫復直祕閣主管華州雲臺觀彌逺朝奉郎主管建寧府武夷山沖佑觀彌堅通直郎两浙路轉運司主管文字彌大彌逺皆登進士第彌正彌堅亦累舉春官人以是服公之教子也女五人長適朝請郎新權發遣永州軍州事陸杞次適從事郎充江淮荆浙福建廣南路都大提㸃坑冶鑄錢司檢踏官豐謙次適朝請郎前通判湖州軍州事李友直次適迪功郎新荆湖北路提舉茶鹽司幹辦公事夏鼎次適承議郎簽書寧海軍節度判官㕔公事王橚孫十二人宗之通直郎改添差沿海制置司幹辦公事宜之宣教郎知臨安府富陽縣丞定之宣議郎新知婺州蘭溪縣守之承事郎前監平江府糧料院安之迪功郎温州瑞安縣主簿實之修職郎監紹興府和㫖酒庫宣之憲之寯之寛之崈之賓之孫女十五人長適奉議郎新知建康府上元縣方叔恭次適通直郎新知明州鄞縣丞吴樸次適宣教郎前知湖州武康縣丞秦鉅次適宣義郎新監臨安府仁和縣臨平鎮税胡綱次適修職郎新秀州華亭縣支鹽官王友元餘未行曾孫八人唐卿虞卿文卿夏卿商卿周卿漢卿顯卿曾孫女十人皆幼以其年十二月庚申𦵏公于鄞縣翔鳳鄉吉祥安樂山合魏國之兆公盛徳絶人備福無比蓋嘗竊窺其大者性本至孝有不可解于心故為士時惟見其事親事長篤朋友鄉黨之義及出而事君則盡其忠謀國則竭其慮接物則極其寛臨事則務于恕匹夫孺子不失其懽心而義有不可不以死生禍福少變率自孝道發之君臣道合脗然無間盖近古人主躬行通䘮自孝宗始而公又以此事之其能不膠漆而固豈無所自哉孝宗嘗謂公曰卿所薦用人其間有負卿者亦知之乎公頓首曰此臣所以報陛下也臣所薦未嘗以語人亦不受其私謝故人人自以為得上意薦賢者臣之責用賢者君之恩也嘗擬知湖州陳之茂進職知平江孝宗知之茂嘗毁公曰卿豈以徳報怨耶對曰臣不知有怨若以為怨而以徳報之是有心也莫濟作詹事王十朋行狀詆毁尤甚公薦濟掌内制孝宗曰濟非議卿者乎公曰臣不敢以私害公遂除中書舍人兼直學士院待之如初蓋公之寛厚類此人雖有不悦然無物可以忤意古人所謂澄之不清淆之不濁雷霆破柱而神色不動者猶未足道也公既極貴處鄉曲一如布衣時每以事親為未足又推本史氏積徳累行之原自為之文時節誦于家廟上以報祖考之施下以勵子孫之習其用意篤矣事物之來不問劇易雖至難甚宂或連日夜廢寢食而精神酬應益有餘裕攷其克勤小物凡事精密園館器用動出新意其在富貴中望之如神人而謙虚退然若無與者野服蕭散皆不足以累其中此如萬斛之舟容物有餘不見其多而經濟之業則用之猶未盡也而又居權之日少安佚之日長故舉世無怨無惡惟以鉅公大度推之生榮死哀無可憾者公屬文多立就雖老表章猶自為之有文集五十卷外集二十卷論語口義尚書講義周禮天官地官講義傳于世餘皆公之細也不勝書銘曰於皇髙宗天開中興鞏宋基業思永繼承藝祖七世有孫神武是用付託纘宋之緒髙宗曰嘻帝命不易我儀圖之謹厥輔翼孝宗武文實惟承之雍雍太師實維成之帝咨臣弼一本于學緝熙光明徳修罔覺两輔予政毋輕黷兵毋過取民毋濫用刑言如蓍龜靡有差忒旁招多士寧我王國天地清夷中外晏然繼志述事二十八年两宮燕娱天夀平格三奉玉巵四登寳冊召對徳夀嘉帝之孝又曰太師輔翼之效帝謂聖父教誨之功臣亦歸美媚于髙宗天用昌之蓍艾康寧帝用休之福禄寵榮孝宗乗雲太師騎箕君臣始終雖恨莫追有赫景命湯孫是纂顧瞻遺烈于以追逺錫之篆碑孝宗有臣報我天子詔爾後人忠文耆徳之碑奉敕撰按此標題一本與後卷自撰者同在當日原題應只此六字嘉泰四年十月庚寅朔故左丞相少傅觀文殿大學士益國周公年七十有九薨于吉州之里第十二月丙申𦵏于廬陵縣斗岡之原至嘉定元年公之子綸告于朝曰先臣備位首相既𦵏而隧碑未立敢泣以請天子曰嘻此四朝之宗臣也諡以文忠御書忠文耆徳之碑以賜且詔臣鑰為之文臣鑰不侫荷文忠公知奬之深屏居四明先已撰公隧道之碑矣聖恩起于告老之餘待罪翰苑欲引前碑以辭綸又曰昔歐陽公修已銘程文簡公琳之墓復以敕命為之碑故事甚切願毋辭臣既共二史館敢不敬承明㫖以答孝子之請以揚公之休光用詔後世公諱必大字子充一字洪道世家鄭州之管城曾祖衎朝奉郎妣郭氏祖詵左朝散大夫妣潘氏李氏張氏父利建左宣教郎大學博士妣王氏公既貴三世俱累贈太師秦國公妣俱贈秦國夫人宣和中祖通判吉州因家焉公幼而孤十三又遭内艱天資髙亮記問絶人紹興二十一年擢進士第授左迪功郎徽州司户參軍改監行在和劑局門二十七年中博學宏詞科建康府府學教授三十年除太學録召試館職髙宗見奏篇曰他日可掌制除秘書省正字次年改左宣教郎兼權國史院編修官明年五月除監察御史六月孝宗即位八月除起居郎直前奏事上曰朕舊見卿文可進近作兼編類聖政所詳定官暫權給事中兼權中書舍人嘗論翟婉容位官吏轉行礙正法事上曰初止謂卿能文不謂剛正如此此其被眷注之始也應詔條上十事皆切時病其一嚴銓試之法又奏羣臣六參除朔望過宮外勿改舊制至今行之事有未便者不憚極論上亟奬歎公亦曰陛下有納諌之資故臣輩各思自竭龍大淵曾覿除知閤門事公與給事中金公安節同奏大淵罷副都承㫖覿罷帶御器械俱為知閤若以攀附舊恩尚有可諉正以搢紳指目臺諌有言外議方喧而除命遽加非舍己從人之義有㫖罷劇就閒己允公論尚茲回繳可特依奏既而再除公曰前已反汗今復申命豈復但已格除目不下越三日不獲命以遷奉請祠两任主管台州崇道觀乾道四年權發遣南劍州未赴六年改福建路提㸃刑獄公事陛對留為秘書少監兼直學士院兼國史院編修官上改告詞首尾公奏陛下取漢宣帝之意親制贊書臣觀漢社稷臣乃在周勃汲黯霍光之徒儒者公孫𢎞輩皆持禄保位故宣帝以為俗儒不達時宜使宣帝求眞儒用之何至雜霸哉上曰卿學術精深記問該博所藴可以自見當曰夕與卿論文兼實録院檢討官加上徳夀尊號公謂太上萬夀而紹興末議文及近上表用嗣皇帝為未安按建炎以後遥拜徽宗表及唐憲宗上順宗尊號冊文皆稱皇帝議遂定七年奏四事重侍從以儲將相増臺諌以廣耳目郎官專以旌外庸監司郡守皆當久任上稱以為要務兼權兵部侍郎上云學士院湫隘公奏宫城不容増廣陛下欲卑宫室臣等居此亦過矣若遴選名儒而信任之不在棟宇之麗也除權禮部侍郎仍兼直學士院陞同修國史實録院修撰有㫖公與吏部侍郎王之竒太子詹事陳良翰對選徳殿出御札引唐太宗魏徵問對以在位之久功未有成治效優劣苦不自知使各極陳其當否公退而條陳練兵以圖恢復而用將之道未盡擇人以守郡國而責實之方未至又指陳大將郡守數易之弊且言貞觀政要四十篇既先之以魏徵論為君之道又著不克終之戒于篇末蓋是時惟徵為善諌願思太宗廣諫諍之徳使嘉言日聞治道日興上嘉納又奏諌官虗位願蚤擇正人先朝參用古制卑其品而厚其禮責其盡言使姦邪望風畏戢銷患未形如近嵗張松韓玉等使臺諌無所顧忌蚤為力言豈至勞民費財始勤英斷上曰朕自此知戒矣又奏曰人主無職事惟在察臣下邪正凡輕于任事速于求售者必至敗事若疑儒者不足用而專用才臣今既累年其效可睹唐太宗之臣即隋之臣藝祖之臣即五代之臣非前愚而後智顧人主用之如何耳又論臣寮務為新説欲徼竒功王安石以堯舜之道告君實行管商之術指司馬光蘇軾輩為流俗尤當察之江湖亢旱上稱龔茂良措置有理公請出緡錢二十萬代民租乃不乏事非不知縣官急闕然艱食則盜起盗起則調兵費可省乎上曰卿議論殊善使朕聞所未聞兼侍講又奏近奉詔以僕射名官非古欲更其名周之太宰卿也小宰中大夫也中間所改非是上曰止欲為左右丞相如同中書門下平章事皆可削公遂奏前古沿革而退八年兼中書舍人固辭且言外制之設正欲謹于出令凡有未當欲其繳奏非專責以詞翰也卒因繳奏而遂免兼張説再除簽書樞密院公當草不允詔奏謂昨者舉朝以為不可陛下欣然聽納曾未周嵗復有此除貴戚預政公私两失臣未敢具草時權給事中莫濟亦封還御筆遂俱與外祠九年除知建寧府再辭不許中道引疾提舉江州太平興國宮天下愈髙之淳熙元年除右文殿修撰説罷召為敷文閣待制兼侍講六月兼權兵部侍郎八月兼直學士院上嘗稱公持重不迎合無附麗除兵部侍郎兼侍講進太上尊號詔草上曰此文難于言而温純典雅無一字可議公奏初上光堯之號臣已預議庚寅之詔亦出臣手上愕然曰前詔亦卿所草耶兼太子詹事嘗論用人惟上智與下愚不移中人惟上所御為官擇人則引中人為君子為人擇官則引中才為小人又奏聞陛下日御毬場固知不忘閲武然太祖二百餘年之天下屬在聖躬可不自愛上作色曰卿言甚忠正以讎恥未雪不欲自逸耳嘗奏聞金星近前星武士擊毬太子亦預臣甚危之上曰卿可語太子公曰太子人子也陛下命以馳驅臣安敢勸以違命陛下勿命之可也陞兼侍讀郊祀禋禮執綏備顧問除吏部侍郎奏朝廷守至公之道有司持一定之法行以無私孰不心服四年除翰林學士奏自唐至本朝優待詞臣以其無簿書之冗可以朝夕論思或有補于治道得人固多最可慕者陸贄歐陽修也五年為御試詳定官得㫖撰選徳殿記及皇朝文鑑序上尤稱之賜御書白居易七徳舞墨猶濕也除禮部尚書兼翰林學士嘗論本朝專以仁立國而又以禁暴安人為本上曰兵勢似弱公曰仁故似弱實非弱也社稷靈長職此之由上曰所以並無禍亂耳公曰本朝似周秦兵雖强興衰竟如何六年詔禮官詳議明堂典禮公定圜丘合宫互舉之議再執綏草赦明著古禮以示來世禮成獻詩又進動天之戒上曰動天誠當以徳惟知道乃可語此公曰皇天親有徳饗有道此豈聰明作為所能為哉除吏部尚書兼翰林學士承㫖論六部長貳判依字改為從上謂公視草勞甚公奏臣素無汗馬之勞致此爵位宣力文字之間未為勞也上曰翰墨之功豈小補哉若大述作固當煩卿七年五月除參知政事上曰卿遇事殊不依違宰執自當和而不同公曰韓琦歐陽修殿上日有所争退則歡然最為可法大臣自應互相可否秦檜用事執政至不敢措一辭後遂以為當然陛下惟恐臣下不言人臣乃欲自是乎嘗極陳民困之由上問其故公曰且以平江府論之二十年前歸正添差等官嵗用五萬緡今已數倍民安得不困此特其一耳上為之悵然進呈湖北月樁錢數公曰固出于不得已亦須平時有以存䘏去嵗荒旱若非先事賑救禁戢苛暴何以免流殍之苦舒州汪革始謀不善若如前代失軍民之心則乘災唱亂必致蠭起亦安肯束身自歸于司敗所貴得民正為是耳此非倉猝所能成也上深以為然有恃長樂之援求為郎者上俾諭給舍繳奏公謂不可諭意不從則失體從之則壊法命下臣等自當執奏上曰卿等肯任怨如此公曰當與而不與則有怨不當與而不與何怨之云上歎曰所謂任責非任怨也九月知樞密院事上曰三省本未可輟卿每見難處之事卿以數語決之可謂敏矣上嘗歎養兵費邦賦之八公奏自古未有五十年屯兵不解古者講和則罷兵今既有嵗幣而兵不敢撤所以倍費上眷公益深嘗奏事退御筆卿臨事明敏而有決朕每嘉之又稱公通練軍政深副擢用之意公謝曰臣本以文墨受知豈曉武事誤蒙任使不敢不勉十一年御筆欲移興元義勝軍于襄陽此軍皆契丹渤海漢兒慕義來歸者上以金商山險非用騎之地聞其營砦遺火因遷之公奏路經金洋當先計人馬之數使郭杲于襄陽豫辦更令彭杲具以此意深察衆情六月拜樞密使上曰卿在西府光前絶後若有邊事宣撫使惟卿可為也先是金主避暑夀安過上京北牒以道逺權止賀正生辰使一年宣諭卿嘗料未必遣使今果不來可謂廟謨矣十二年金州謀帥公欲合侍從管軍薦舉上曰軍帥當自上除授公曰舜用九官皆咨四岳與其私薦不若明揚若能攷實孰敢妄舉因論邊報異同上奬諭云事無巨細卿皆究心昨密問一事條上數端深謀逺慮朕所不及也上謂王藺論事頗偏公奏藺雖稍過然汲黯在朝淮南寝謀盡言而不顧身帝之左右豈可無此等人況以獻納為職若上下相蒙非國之福也御筆嘗謂達實契丹欲加兵于金又諭結約夏國又有呼嚕竊據上京之報按呼嚕舊作忽魯今改後同公奏但當嚴備隨機應之未幾上諭公所傳皆妄眞有先見之明矣十四年二月乙亥面諭卿在樞筦事皆經心更旬日拜相後人難繼也丁亥拜右丞相尋兼提舉國史院㑹要所敕令所上諭以委任之意公奏自古鮮有無事時今賴陛下勤政内外晏然殆將二紀此正可懼之時當思經逺之計又奏舜禹君臣相戒唐太宗不存形迹臣等過失望隨事戒勑免積罪戾臣有所見不敢廢弼直之義日有論奏動繫天下休戚比至給舍繳駮臺諌論列已為後時不若致審于初又奏人才不失之虗夸則失之緘默凡宂宜求篤實為國者因旱求退甚力請依慶厯中例降秩皆不許遂奏實惠及民莫若寛減夏税施徳當自近始上方篤意救荒其所以贊寛仁之政不可勝紀封事多言宰執同異公奏要當各盡所見豈可尚同既是協心體國苟有未然雖面詰何害若人才邪正政事得失安危所繫自應反覆論難止欲歸于是耳陛下復祖宗密白之制使三省覆奏而後行正欲上下相維非止奉行文書也髙宗升遐始末稽攷制度奏置山陵五使贊成聖孝哀禮两備㑹賀生辰使至上在喪次議令館伴使諭遣公奏賀禮固不可行但彼行人逺來而朝無一辭于理未安遂口占數語使歸報焉正旦使將至或請易淡黄袍御殿受書然後素幄見使者公力陳不可止以縞素引見使者果心服手詔討論皇太子參決典禮初欲開資善堂公奏天禧故實恐不宜于今不若取西晉宣猷堂為議事堂十五年正月戊戌公請上特御延和殿令宰執奏事畢始過議事堂思陵發引公奏永熙故典呂端一相猶攝太傅親往而欲用顯仁舊例非是遂再拜請行乃以公攝太傅上慮使人堅欲上夀公奏必無争執上欲先令侍從臺諌集議公曰國之重事謀之帷幄有不必詢衆者上尤稱奬卿能如此國之幸也仲冬之初奏乞骸骨忽宣諭以病倦欲傳位太子卿須少留公奏聖體康寧止是孝思稍過豈應倦勤上曰禮莫嚴于事宗廟而孟饗多以病而分詣孝莫重于執喪而不得日至徳夀欲不退休得乎朕以此委卿公泣而退十二月壬申密賜紹興傳位親札辛卯留身議定二月壬戌之吉又命公草詔專以奉几筵侍東朝為意十六年正月己亥拜左丞相壬子因奏事始諭二府旬日當内禪又令公獨呈詔兼提舉玉牒及監修日厯二月辛酉朔降傳位詔翼日上吉服御紫宸殿公奏陛下巽位與子古今盛典再見聖朝中外同慶臣等輔政無狀自此無由日侍天顏無任依戀之至哽噎幾不能言上亦泫然曰正賴卿等協贊新君光宗首問當世急務公奏用人求言二事尋即降詔公積階至特進爵自管城縣開國男至滎陽郡公厯封濟許二國公三月拜少保益國公公以三孤之官不應以覃霈而得力辭不可又乞囘授至于四五不得已而始受之奏以朔望之次日朝重華宫五月求去方力而諌省有言請益切除觀文殿大學士判潭州言者不已殿中助之遂以少保充醴泉觀使而歸孝宗賜金器勞問紹熙改元判隆興府辭不赴二年除觀文殿學士判潭州罷倍税牙契錢二十萬緡郡事皆親理之三年四月復元職七月坐所舉官以賄敗降滎陽郡公四年八月復舊封冬易鎮隆興力求奉祠主上登極求言于舊弼公奏聖孝敬天崇儉久任四事皆切于世用遣閤門官賜少傅告控免至再始許貤恩慶元元年于是公年七十矣三表引年遂以少傅致仕嘉泰元年布衣上書及公姓名臺評降一官明年乃復遺奏既聞上為震悼輟朝二日贈太師賻銀絹各千累食邑一萬五千六百戸食實封五千八百戸娶王氏監察御史葆之女封益國夫人先一年薨一子即綸也朝請大夫新知筠州軍州事孫顥宣義郎新監饒州浮梁縣景徳鎮兼煙火公事孫女五人長適承事郎監嘉興府糴納倉蕭彖餘尚幼嗚呼天之生公固授之以間氣公之出仕亦可謂千載之遇矣自決科以至考終五十有三年始以文字受知髙宗孝宗以至位極人臣晚輔光宗之初政退被主上之休寵孝宗在位二十有八年公實相為終始其中以十年出入翰苑時方承平極鋪張揚厲之美以十年輔政秉鈞盡輔贊彌縫之妙兩以逆折姦鋒深忤上意事定言驗得眷愈隆致身元宰出處為時重輕幾無纖瑕㣲纇之可指文章則追配作者論議則究極古今風度如張九齡謀謨如崔祐甫宋廣平之守文杜如晦之善斷公幾兼之乃所願則尤切切于陸宣公歐陽文忠此非臣之私言也平日著述為書十餘種總為二百巻行于世校之前碑撮取其名節國事而略其餘謹再拜特書以對揚休命銘曰巍巍孝宗天錫勇智二十八年是為盛際猗歟益公善始以終始進以文終察其忠再折姦萌逆鱗以批事定言驗表表忠規獻納論思知無不為彌縫輔贊百工惟熙三聖相授同守一道公實佐之家有宸藻憂邉思職具存宏模臨機輙斷華夷謐如告老既休著書自若拳拳斯文以惠後學天不憗遺殄瘁興悲既銘公墓又勒豐碑生榮死哀身美君顯是為宗臣後慶其衍攻媿集巻九十三欽定四庫全書攻媿集巻九十四宋樓鑰撰神道碑少傅觀文殿大學士致仕益國公贈太師諡文忠周公神道碑按前巻忠文耆徳之碑作于此篇後二年原目以奉敕撰列前今仍之孝宗皇帝在位二十八年厲精求治久而不倦聖徳日新先紹祖宗宰相凡十有五人明良㑹遇可謂盛矣求其相為終始全徳備福亦未有如益國周文忠公者始公親見龍飛御名之立已嘗預議中間再以力排權倖沮其枋用忤㫖去國略不少貶士大夫之過計者謂公不復用矣聖明洞照愈加襃擢遂至元宰任天下之重周旋密勿終贊與子之決以孝宗之實睿實聰公之明敏肅給眞千載之遇而又事光宗于春宮夾輔初政功成身退既掛衣冠猶被主上寵光者十年嗚呼其可謂聖朝之宗臣矣公薨之二年嗣子綸以書抵四明樓鑰曰先公既𦵏而隧碑未立謂鑰荷公之知晚而益深又嘗待罪太史氏俾為之辭且示以今參知政事李公璧所作行狀鑰不佞謹摭其大槩洎平日見聞之實而書之公諱必大字子充一字洪道世為鄭州管城縣人曾祖衎朝奉郎祖詵左朝散大夫父利建以上舍魁登第終左宣教郎太學博士以公貴三世俱贈太師秦國公曾祖妣郭氏祖妣潘氏李氏張氏妣王氏俱贈秦國夫人宣和中祖為吉州通判因家焉外祖給事中靚知平江府靖康元年公生于郡治幼孤歸信州外家從汳人陳持學太夫人躬督誦書率至夜分十三而太夫人卒公記誦絶人徒手入舉場有問者應如響文又工緻遂名薦書紹興二十一年擢進士第授左迪功郎徽州司戸參軍改監行在和劑局門以鄰火罷二十七年中博學宏詞科循左修職郎建康府府學教授三十年除太學録召試館職髙宗稱奏篇謂他日可掌制除秘書省正字循左文林郎三十一年改左宣教郎兼權國史院編修官三十二年五月除監察御史六月孝宗即位八月除起居郎直前奏事上曰朕舊見卿文有近作進來此眷注之始也侍立講筵奏勸講非為分章析句正欲從容訪問以禆聖聰究治體兼編類聖政所詳定官暫權給事中兼權中書舎人嘗論邊事上以蜀為憂對曰蜀民久困征求願降詔撫諭許以事定寛其力又奏比嵗史官不備故記注多闕欲先自六月十一日修纂前未備者併修之論翟婉容位官吏轉行礙止法事上曰初謂卿止能文不謂剛正如此公奏前宰執侍從依赦復職亦有不合人望當繳奏者上曰固然卿論事但令適中朕無不從也應詔條上十事皆切中時病其一嚴銓試之法又奏羣臣六參除朔望過宫外勿改舊制至今行之安穆皇后追冊祔饗公奏神主謁諸室前殿則不以欽宗服而廢祖宗之樂别廟奉安則乞備而不作金人來邀舊禮詔從臣指陳定論公率同列奏向者祐陵未卜慈寧未返以講好之故寧親寧神兩遂所欲禮雖屈而志則伸今而遽許之必謂我怯將有難塞之請使者之行當再用鄰國之禮彼或有辭則告以通好于用兵之後以何名而屈以何名而受耶事有當駮者皆極論其不可上亟加奬歎公亦言陛下有納諫之資故臣輩各思自竭龍大淵曾覿除知閤門事公同給事中金安節奏大淵罷副都承旨覿罷帶御器械俱以閤門處之實遷也若以攀附舊恩尚有可諉正以搢紳指目臺諌有言外議方喧而除命遽加陛下于將相要官或罷或貶一付公論略無適莫獨此二人乃為之遷就諱避殆非舎已從人之義也有旨罷劇就閒巳允公論尚兹囘繳可特依奏已而二相宣示御札謂給舎為人鼓惑議論羣起小事豈應如此公等奏言昧于事體専徇流俗輕瀆天威居家俟罪再乞重賜竄責俱不允入謝上曰朕察卿務舉職但朕欲破朋黨振紀綱耳旬日二相又道上意已再除兩知閤且云後省想亦無他公曰前已反汗今復申命豈敢但已格除目不下右揆以聞越三日不獲命以信州遷奉請祠兩任主管台州崇道觀乾道四年權發遣南劍州未赴六年改福建路提㸃刑獄公事陛對論帥臣有名而無其實將副具官而非其人又論雜舉中外文武之才以備選用益縣令之俸而責其亷及捕盜官候六攷行賞執政奏擬秘書少監上可之仍令兼直學士院㑹草晁公武知揚州不允詔御筆改定公引故事乞罷不許兼國史院編修官初鄭聞草公制上改首尾詞公奏陛下取漢宣帝之言親制贊書明示好惡敢因訓詞推廣聖意臣觀漢社稷臣乃在乎周勃之鄙樸汲黯之少文霍光之不學至于儒者持禄保位則公孫𢎞輩實為之故宣帝嫉之以為俗儒不達時宜葢有激而云爾使宣帝求真儒用之何至雜霸哉陛下以漢為監則士風趨向歸于正矣上曰卿學術精深記問該博又嘗曰平昔所藴可以自見矣自此當日夕與卿論文兼實録院檢討官加上徳壽尊號公謂太上萬壽而紹興末議文及近上表例用嗣皇帝為未安按建炎以後遥拜徽宗表及唐憲宗上順宗尊號冊文皆稱皇帝議遂定趙丞相雄以中書舍人奉使賀金主生日宗室伯驌為介御札生辰使兼齎國書一封理㑹受書公立具草有云尊卑分定或校等威叔姪情親豈嫌坐起後四日對秘殿上曰朕未嘗諭國書之意而卿能道朕心中事可謂大才賜坐久之欲退而不記來路上指示之命内侍導而出七年奏四事重侍從以儲將相增臺諫以廣耳目郎官専以旌外庸監司郡守皆當久任上稱其為要務皇太子領臨安尹公既草制因奏恐别無被受欲依詔書體式降付東宫兼權兵部侍郎上云學士院湫隘公奏宫城不容增廣陛下欲卑宫室臣等居此亦過矣若遴選名儒而信任之不在棟宇之麗也除權禮部侍郎仍兼直學士院升同修國史實録院修撰有旨公與吏部侍郎王之竒太子詹事陳良翰對選徳殿袖出御札引唐太宗魏徵問對以在位之久功未有成治效優劣苦不自知各極陳其當否公退而條陳練兵以圖恢復而用將之道未盡擇人以守郡國而責實之方未至又指陳大將郡守數易之弊且言貞觀政要四十篇既先之以魏徴論為君之道又著不克終之戒于編末葢是時惟徵為善諌願思太宗廣諌諍之徳使嘉言日聞治道日興上嘉納且曰方圖力革二弊又奏諫官虚位願早擇正人先朝參用古制卑其品而厚其禮責其盡言使姦邪望風畏戢消患未形如近嵗張松韓玉等使臺諫無所顧忌早為力言豈至勞民費財始勤英㫁雖天縱濬哲安能盡見上曰如人奕碁當局多誤惟旁觀乃見之朕自此知戒矣又奏人主無職事惟在察臣下邪正凡輕于任事而速于求售者他日必至敗事不可不察若疑儒者不足用而専謂才臣能趣辨今既累年其效可賭唐太宗之臣即隋之臣藝祖之臣即五代之臣非前愚而後智顧人主用之如何耳又論臣寮務為新説欲徼竒功王安石以堯舜之道告人主實行管商之術指司馬光蘇軾輩為流俗尤當深察之上曰蘇軾卻是流俗可謂顛倒嘗奏江湖大旱上稱龔茂良措置有理公請出南庫緡錢二十萬代民祖乃不乏事非不知大農急闕然艱食則盜起盜起則調兵費可省乎上曰卿議論殊善使朕聞所未聞謝曰臣惟以不欺事陛下兼侍講上以雨雪愆亢欲加精禱公奏洪範肅時雨若此殆言路曠官之證臺端一日不可闕今乃五旬不除上言未有人公奏百執事何至乏才兼御史臺令殿中闕具察官姓名取旨差權苟未欲輕用人亦可舉行此制上驚曰朕不知此遂宣諭宰相具上又奏近奉詔以僕射名官非古欲更其名周之太宰卿也小宰中大夫也中間所改亦未可用上曰太宰今吏部尚書爾止欲為左右丞相如同中書門下平章事皆可削公遂厯奏前古沿革而退八年權中書舎人公奏西浙為今日根本之地而賦税供億反重于他路且户部既理財朝廷又理財爭肆漁取致以隠漏為名増無實之税上曰此漕臣之繆公曰陛下既知何不改正因辭西掖且言外制之設正欲謹于出令凡有未當欲其繳奏非専責以詞翰也上曰正有望于卿因奏閩漕陳峴議變鹽法恐擾民難行又奏曹耜除府推事上曰知其人才欲與寺丞公曰臣即有文字上意不悦退而繳詞頭願别擇俊寮協贊元良耜知嚴州公亦免兼矣張説再除簽書樞密院王之竒賜出身並命公當草不允詔奏謂昨者舉朝以為不可陛下欣然聴納嘗云兹事誠誤旋即改命曾未周嵗復有此除貴戚預政公私兩失若謂西府間以武臣願擇大將有威望者畀之臣非欲専任文吏也且當是時之竒亦曾論奏今乃與説同升恐亦未當遽受也臣未敢具草時權給事中莫濟再封還御筆遂俱與外祠又趣公出門匹馬便面翩然徑行九年除知建寧府再辭不允中道引疾提舉江州太平興國宫天下愈高之淳熙元年除右文殿修撰説罷召還除敷文閣待制兼侍講六月兼權兵部侍郎嘗論改官舉削到部放散之制後雖潤色然自公發之八月兼直學士院上稱公持重不迎合無附麗除兵部侍郎仍兼侍講進太上尊號詔草上曰此文難于言而温純典雅無一字可議公奏向者初上光堯之號臣已預議庚寅之詔亦出臣手上愕然日前詔亦卿所草耶兼太子詹事上論史事公奏李燾于史學如嗜飲食長編攷證異同罕見其比嘗論用人惟上智與下愚不移中人惟上所御為官擇人則引中人為君子若為人擇官則引中才為小人今不及數月已望遷擢後將無官可遷願力革此風愛惜名器又奏兵將官刻削等事上曰今不如此且言王友直極亷安有刻下公曰昨聞殿司進羨餘二十萬緡此何從而得上曰朕已不受公曰雖則不受當思其所自來上曰綂制官不治財賦綂領卻治之可相闗防不致妄費公則曰此尤非也主將而下須令各得懽心今因小利更相猜察情既不通緩急何由得其死力又奏聞陛下日御毬塲固知不忘閲武然太祖二百餘年之天下屬在聖躬可不自愛上作色曰卿言甚忠得非憂銜橜之虞乎正以讎恥未雪不欲自逸耳又奏聞金星近前星上曰止是略近公曰天道高遠當論人事武士擊毬太子亦預臣甚危之上曰卿可語太子公曰太子人子也陛下命以驅馳臣安敢勸以違命陛下勿命之可也陞兼侍讀大禮執綏備顧問除吏部侍郎奏朝廷守至公之道有司持一定之法行以無私孰不心服近乃有任怨之説法行以公人自無怨上曰朕每諭大臣彌縫人情無有是處四年除翰林學士奏自唐至本朝優待詞臣以其無簿書之冗可以朝夕論思或有補于治道得人固多最可慕者陸贄歐陽修而已若乃進則有隠退則不密擠人而利己揚己以取名安能逃日月之照哉上曰學士宴見無時至為親近五年為御試詳定官屢乞去上問文士可代者聞吕祖謙能文公謂翰苑須用有學問者祖謙涵養既久習知典故史院甚得其力不但文字之工也得㫖撰選徳殿記又命書之後内直宣對别令中使引至碑下傳㫖記文詞采贍蔚召卿觀覽既見上又有博美之稱歸至玉堂御書白居易七徳舞賜之墨猶濕也後進呈皇朝文鑑序上曰卿之文在廷莫及真匠手也除禮部尚書兼翰林學士嘗論本朝専以仁立國兵非不用而以禁暴安人為本上曰兵勢似弱公曰仁故似弱實非弱也社稷靈長職此之由上曰所以並無禍亂公曰本朝似周彼秦兵雖彊興衰竟如何六年詔禮官詳議明堂典禮公奏祀帝祀天以祖宗配此前朝已行之制世俗止誦孝經之語未嘗深攷其義致以今日為疑由是定圜丘合宫互舉之議公再執綏草赦引周漢故事有曰俶經路寢有皇祐之彛儀徧秩羣神有紹興之近制葢明著古禮以示來世也禮成獻詩又進動天之誡上曰動天誠當以徳惟知道乃可語此公曰皇天親有徳饗有道此豈聰明作為所能為哉除吏部尚書兼翰林學士承㫖論六部長貳判依字遂改為從嘗奏祖宗涵養善類名卿才大夫相望自章蔡沮士氣以壊風俗奬讒諂以植黨與卒致播遷之禍中興一洗前弊得人為多秦檜以患失之心濟忌刻之資引庸人以充侍從對畢輙納副封既出其門無所不有人才衰落貽患至今論思之職上規人主次及大臣下及四方安可納副封耶願博求文武之英布列中外上曰如曾開輩今豈易得又及舜之無為非皆無所為也特不為期㑹之屑屑耳又言自古上自人君下至士庶鮮有不為左右前後之人所牽制者上謂公視草勞甚公奏臣素無汗馬之勞致此爵位正使宣力文字之間未為勞也上日翰墨之功豈小補哉若大述作固當煩卿七年五月除參知政事上曰近見卿遇事殊不依違執政之于宰相事任非遠自當和而不同公曰韓琦歐陽修殿上日有所爭退則懽然無間最為可法後又嘗曰前此宰相議事執政更無語今乃肯各述所見公奏大臣自應互相可否秦檜用事執政至不敢措一辭後遂以為當然臣嘗以紹興初聖語示同列勉其協濟況陛下虚心無我惟恐臣下不言人臣乃欲自是乎惟小事不敢有隠則大事何縁蔽欺八月以久旱御筆付三省求直言初回奏慮所在因是皆有賑濟之請公言上明目達聰而吾儕不能將順獨不愧于心乎萬一上自行之或以此奏示外豈不獲罪公議相亟從之又奏聖明在上星變旱災殆繇臣等所致上曰若封事及大臣朕須留中公曰付出何害未聞有過而人不知也昌化有箭榖得米相以上再三及此議宣示外廷公曰天若為瑞必無水旱乾道間有以九華山竹米為瑞而得罪者且宣和有此豈是休徵遂已有乞改常平不以赦原之法公奏紹興中因孔括申請遂與謀叛等同科乞令削去祇從海行法遇兩赦或非次赦聴原公嘗極陳民困之由上問其故公曰且以平江府論之二十年前歸正添差等官嵗用五萬緡今乃數倍支移折變之數日有所増齊民安得不困此特其一爾上為之悵然進呈湖北月樁錢數公曰固出于不得已亦須平時有以存卹去嵗旱荒若非陛下先事賑救禁戢苛暴何以免流殍之苦舒州汪革始謀不善若如前代失軍民之心則乘災唱亂必致蠭起彼亦安肯束身自歸于司敗所貴得民正為是耳此非倉猝所能成其來有漸矣上大以為然上嘗謂樞密非古官公奏在唐止司傳導五代始置崇政院分宰相之權神宗亦有意廢併聖諭可謂盡善但二百年官制難以驟改不若且令二府互領更加熟慮有恃長樂之援求為郎者上俾諭給舎公奏臺諫給舎與三省相維持豈可諭意不從則失體從之則壞法命下之日臣等自當執奏上曰卿等肯如此任怨公曰當與而不與則有怨不當與而不與何怨之云上歎曰此所謂任責非任怨也上嘗言唐鑑一書興衰治亂之理甚明公奏祖禹著書皆可備乙夜之覽篇篇即是諌疏九月除知樞密院事上曰卿才堪其任三省本未可輟卿每見難處之事卿以數語決之可謂敏矣上謂公如綂制官之類可時與之接以觀其才公因奏雷世賢説淮南地形緩急欲守滁臣謂不然廬和則當其衝滁沮山林可自守而不可以禦敵楚州舊屯軍八千雷世方乞止差鎮江軍五千人公奏山陽控扼清河口韓世忠實屯重兵今無故減戍他時或增必致敵疑揚州武鋒軍有衆八千本屯山陽若嵗撥三千同戍誠為兩便十年奏白氣自西南亘天宜為兵備上曰日脚之氣冬常有之公言此日官相寛之詞然有備乃能無患上嘗歎養兵費邦賦之八公奏自古未有五十年屯兵不解古者講和則罷兵今既有嵗幣而兵不敢徹所以倍費文州蕃部刧殺二漢人呉挺止申照㑹公請督其根治使知朝廷事必留意不敢忽略日有萬幾不察于微弊不勝救上曰自昔多因不防其微馴致禍敗温州軍士喧悖憲司欲先定汪義端刻削之罪仍正紀律公奏此風不可長恐兵愈驕郭杲請移江陵萬二千人與其孥永屯襄陽公言止當以兵之半分戍杲謂襄陽為要地而江陵亦在江北為呉楚喉衿爭辯甚力乃許萬人且令騎兵盡行上眷公益深嘗奏事退特命中使賜御筆卿臨事明敏而有決朕每嘉之宣諭金主避暑壽安所徙器用倍多且分諸子出鎮或謂欲至東都秋間議過上京公奏當豫為之備甚詳上稱公通練軍政深副朕擢用之意公謝曰臣本以文墨受知豈能曉暢武事誤蒙任使不敢不勉彼方恫疑虚喝正恐我或先動所當精擇邊將鎮之以靜上曰朕嘗戒臣下以公心人自無説公曰所以私者欲收人情其來無窮得者寡不得者衆若不裁以公道恐譽者不若毁者之多以陛下聖明臣等智慮所不及則有之何敢有所欺也十一年奏廣中鹽法既更州縣空乏事勢可憂詹儀之胡庭直皆賢而才短故鋭乎革弊而不能計其後已而果然公言趙汝愚在福州百廢具舉孜孜國事殆不多得王希呂緩急可當一面彼小亷曲謹雖無瑕可指卻恐誤事上曰如趙雄汝愚希呂皆帥才也義勝軍皆契丹渤海漢兒慕義來歸屯于興元御筆以金商山險欲移襄陽用騎之地聞其營砦遭火因以遷之公奏路經金洋當先計人馬之數使郭杲于襄陽豫辦方可議遷更令彭杲具以此意深察衆情御批卿謀慮深遠良用嘉賞六月拜樞密使上曰卿在西府光前絶後若有邊事宣撫使惟卿可他人不能也呈諸軍陞差籍公奏已及一季欲間召一二雖不専用此取人亦因以察其能否使主將不敢容私上令赴樞密院審察後池州李思孝自言正將二人不能開弓乞與罷軍上曰此皆樞使措置之效北牒以上京道遠權止賀正生辰使一年宣諭卿等料未必遣使今果不來可謂廟謨矣王希呂乞增兵戍廬州上以萬弩手民兵已多止可分數千人公奏須與萬人葢當以正軍為主則帥司可立帥司既立則沿淮歸正山水寨民兵皆為我用矣十二年留正申西兵巳免起二年今年取㫖上以三衙不可闕欲令發來公奏襄陽兵少閻世雄欲得此人敵不得志于四川又嘗送死淮南深恐睥睨荆襄遂與一年金州謀帥公欲令侍從管軍薦舉上曰大帥當自上除授公曰舜用九官皆咨四岳與其私薦不若明揚若能攷實孰敢妄舉因論邊報異同上奬諭云事無大小卿皆究心公又曰天下安有不可措置之事上曰昨密問一事卿便條上數端深謀遠慮朕所不及也上謂王藺論事頗偏公奏藺雖稍過然汲黯在朝淮南寢謀盡言而不顧身者陛下左右豈可無此等人況以獻納為職若上下相䝉非國家之福也先是御筆達實契丹欲加兵于金果有之在我豈得漠然固不可違誓或有釁端何以為詞公奏彼一方小警何至移文宿泗若果有釁何患無詞急在間探精審耳至是又諭結約夏國事公奏頃嘗因任令公帛書通信金以示范成大夏國難保如此似未可也後又報呼嚕大王據上京上問公公奏兹事體大當隨機應之未幾上諭公所傳皆妄樞使真有先見之明矣廣東帥潘畤以擅斬逃兵自劾上批無罪公奏帥無便宜之文不經録問詳覆而斬四人雖鋭于除惡然人命至重不可輕許洪邁守婺誅首亂六人止是放罪後不妨旌賞十四年二月乙亥宣諭卿在樞筦凡事無不經心更旬日拜相後人難繼丁亥拜右丞相尋兼提舉國史院㑹要所敕令所上諭以擢用人才及委任之意公奏東府事繁非西樞比自古鮮有無事時今賴陛下勤政内外晏然殆將二紀此正可懼之時當思經遠之計又奏舜禹君臣相戒唐太宗不存形迹臣等過失望陛下隨事戒勑免積罪戾臣有所見不敢廢弼直之義日有論奏動係天下休戚比至給舎繳駮臺諫論列已為後時不若致審于初又奏人才不失之虚夸則失之緘黙凡宂宜求篤實為國者大旱求退甚力上曰方賴卿等協贊若捨朕而去誰與共此又請依慶厯中例降秩一等亦不許徧禱羣望下詔求言遂奏實恵及民莫若寛減夏税施徳當自近始㑹稽和買詭避至多請權免一年徐議釐正秀州乞權減大軍總制錢二萬餘緡吏擬勘當公曰此豈勘當時耶奏蠲之上方篤意捄荒其所以贊寛仁之政不可勝紀封事多言大臣同異公奏豈可尚同要當各盡所見臣每謂同心體國茍有未然雖面相詰責何害止欲歸于是耳若人才邪正政事得失安危治忽所繫自當反覆論難陛下復祖宗密白之制使三省官覆奏而後行正欲斟量可否上下相維非止奉行文書也高宗上仙始末稽攷制度奏置山陵五使贊成聖孝哀禮兩備初欲用顯仁例遣三使公固謂事體不同不當曲徇㑹賀生辰使至上在喪次議令館伴使發遣公奏賀禮固不可行但彼遠來朝無一辭于理未安遂口占數語使歸報後正旦使將至或請權易淡黄袍御殿受書然後素幄見使者公力陳不可止以縞素引見使者果心服手詔討論皇太子叅決庶務典禮初欲開資善堂公奏天禧時仁廟尚幼始見輔臣恐不可用西晉有宣猷堂今作議事堂可也十五年正月戊戌公請上特御延和殿令宰執奏事畢然後過議事堂思陵發引公奏陛下既行三年之喪又用七月之制永熙故典呂端一相猶攝太傅親徃而有司欲用顯仁舊例非是遂再拜請行乃以公攝太傅上慮使人堅欲上壽公奏引見受書即是成禮上壽時不過隨班拜舞若奉觴致詞皆無所預臣等保無爭執上欲先令侍從臺諫集議公曰國家大事謀之帷幄中有不必詢衆者況事理曉然不必徒為紛紛上尤稱奬卿能任責如此國之幸也仲冬之初留身奏臣歸自陵下即欲求外縁京鏜使囘聖慮來賀者求報復令臣少待人使已行願乞體骨上奬勞再三忽宣諭比年病倦欲傳位太子卿須且留公奏聖體康寧止因孝思稍過豈應遽爾勌勤上曰禮莫大于事宗廟而孟饗多以病而分詣孝莫大于執喪而不得日至徳壽欲不退休得乎朕方以此委卿公泣而退十二月壬申密賜紹興傳位親札辛卯留身議定二月壬戌之吉又命公草詔専以奉几筵侍東朝為意十六年正月己亥拜左丞相壬子始因奏事宣諭二府旬日當内禪又令公留身呈詔草兼提舉玉牒及監修日厯二月辛酉朔降傳位詔翌日上吉服御紫宸殿公奏陛下巽位與子古今盛典再見聖朝中外同慶臣等輔政無狀自此無由日侍天顔無任依戀之至哽噎幾不能言上亦泫然曰正賴卿等協贊新君光宗問當世急務公奏用人求言二事尋即降詔公積階至特進爵自管城縣開國男至滎陽郡公厯封濟許二國三月拜少保益國公公以三孤之官不應以霈恩而得力辭不可又乞囘授至于四五不得已而後受焉奏以朔望之次日朝重華宫五月求去甚力既而諫省有言請益切除觀文殿大學士判潭州言者不已副端助之遂以少保充醴泉觀使而歸孝宗賜金器勞問紹熙改元判隆興府辭不赴二年除觀文殿學士判潭州親理郡政不以簡貴自居罷倍税牙契錢二十萬緡三年四月復元職七月坐所舉官以賄敗降滎陽郡公四年八月復舊封冬易鎮隆興五年力求奉祠主上踐阼詔求言于舊弼公奏四事曰聖孝曰敬天曰崇儉曰久任皆訏謨也遣閤門官賜少傅告一再辭免始許貤恩慶元元年公于是年七十矣三上表引年遂以少傅致仕嘉泰元年布衣上書及公姓名臺評降一官明年乃復四年十月庚寅朔薨年七十有九累食邑一萬五千六百户食實封五千八百户遺奏聞上為震悼輟朝兩日贈太師賻銀絹各千仍命弟之子縝添差江南西路轉運司主管帳司以護襄奉尋賜諡文忠娶王氏監察御史葆之女封益國夫人先一年薨一子即綸也朝請大夫行大理司直孫顥宣義郎新監饒州浮梁縣景徳鎮兼烟火公事孫女五人長適承事郎監嘉興府糴納倉蕭彖餘尚幼初益國夫人葬廬陵縣斗岡之原十二月丙申奉公之喪合焉公在高宗朝已擢臺察事孝宗最久始皆以詞章受知可以平挹美官而秉心不欺遇事輙發不復顧身屢跲復奮上久而深察其精忠北門之官有四公徧為之前後十年兩宫極孝治之盛講慶壽加尊號親祠赦宥立后升儲過宫出郊無非盛事大典公皆在屬車間鋪張揚厲實有以佐宋之光明若水旱災異夷狄冦盜之辭咸無焉自參預樞筦以厯二揆又涉十年榻前論事出入經史練習典章動有援據不為空言故天子聳聴嘉奬而同列自以為不及以國事為己任進退人才一本公道養民擇守憂邊訓兵仰贊睿謨慮周而敏被遇日隆數當大事典禮論議裁處曲當内禪尤為至重吉日徽稱宮名母后孝宗獨與公素定于數旬之前近將浹旬始諭宰執注意委任可謂不膠漆而固矣天資超穎非凡材可及而體夫子忠恕之道大易勞謙之義孝友淳篤事從兄如諸父自奉甚約絶聲色之娯周䘏族姻具有恩意官同姓者六異姓者五少自號省齋居士中年曰青原野夫既貴而閒曰平園老叟孝宗生于丁未一時輔相多在丙午丁未間公及丞相王公淮叅政錢公良臣同為叅樞人謂三府為丙午坊公嘗作詩用文潞公同生丙午之韻告老之後猶引故等夷之齊年者遇生朝同㑹用韻賦詩者數年方其端委廟堂一介之善收拾如恐不及退而均逸汲引無虚日士類莫不歸心焉以文苑英華及六一居士集訛舛太甚率同志者朱黄手校如老書生鋟板家塾以恵學者卜築貢院故基公實預薦此地故以充賦名堂作唐虞二典閣藏兩朝内禪詔書洎崇陵宸翰又為玉和蜀錦二堂皆自為之記晚嵗康强神明不衰天下猶望公之再起不謂天之不憖遺也嗚呼殄瘁之痛四海所同有如鑰之不肖素辱知遇假守東嘉屢有收用之意未滿秩而公已歸比忝代言公之除少傅暨加恩兩預草制又四作不允詔書嘗蒙摘句稱賞投閒以來書函詩筒倍加奬予當世銘記多求于公間使鑰書之公已書丹或徑以賤姓名題葢此意甚厚皆非所敢當也嘗竊謂公初入禁林自謂所慕者惟陸宣公歐陽文忠公公之始卒絶似二公者無事不言無言不盡而卒至大用上不負天子下不負所學既不媿于宣公而得時遇主無追仇盡言之患文忠晚居于穎望瀧岡而不得歸公乃優游平園使里人矜式是兼二公之美而又無遺恨者也若克勤小物誘掖後進皆公之細不勝書有省齋文藁别藁平園續藁掖垣叢藁玉堂類藁詞科舊藁政府應制藁厯官表奏奏議奉詔録承明集玉堂雜記龍飛録親征録及閒居紀録等書總二百巻藏于家其行于世者已多屬文之士傳誦以為模楷公之文不待贊揚微至題跋之語攷古證今嵗月先後通徹明白讀者歎服末為三忠堂記謂歐陽文忠楊忠襄胡忠簡皆郡人也精確簡嚴幾于絶筆嗚呼一代風流于焉盡矣鑰何足以銘公銘曰世非乏才何謂才難有君無臣自古所歎吝驕平凡動則為己不合是憂安得竒偉直道而行無患失心一有遇合奚翅斷金於皇孝宗才選于衆誕謾畏縮慨不足用堂堂益公負王佐才始以文名芸省蘭臺高文大冊追配古作獨步禁林不負所學二十八年相為始終屢跲而奮致身上公堯既授舜舜亦命禹首贊大議龍飛再覩功成身退樂哉平園晚陳四事不已于言既挂衣冠無與世道胡不百年遺此一老星隕于堂人之云亡不亡者存文章光芒惟子是似觀行取則後其有興視此銘刻攻媿集巻九十四欽定四庫全書攻媿集巻九十五宋樓鑰撰神道碑簽書樞宻院事贈資政殿大學士謚節愍王公神道碑嗚呼靖康之禍慘矣自古所未有也而一時伏節死義之士絶無而僅有之人皆以為祖宗涵養幾二百年不應至是殊不思自熙寧時當國者惟務變更尚同忌前風俗大敝至章蔡用事日甚一日凡忠臣義士禁錮困苦不容立于世如是者有年矣一時攫取美官當事任者非諂佞姦宄則闒茸貪黷之人禍變忽起搏手無䇿首尾衡決廟謨顛倒甚則賣國抵巇以圖身利安知所謂主辱臣死之義哉當是時而有奮身犯難國爾忘家者自非豪傑之士不待文王而後興者安能及此建炎以來募有能使絶域蹈不測之淵者冠葢相望然亦多以高爵重禄所誘若夫捐軀盡瘁機智勇辯忠義出于天性而又有以濟國事及其事出倉猝執節抗敵卒徇以身如節愍公者比之前後諸公又其卓然者其可無傳乎公諱倫字正道世為大名府莘縣人六世祖祜以文章起家事太祖太宗為名臣是手植三槐者也終兵部侍郎贈太師尚書令兼中書令追封晉國公生三子仲子文正公旦相真宗而王氏益顯始居京師季子諱從九從日官兵部郎中贈太尉則公之五世祖也曾祖端通議大夫贈太子太保妣李氏贈秦國夫人繼李氏贈魏國夫人祖元朝請大夫贈太子太傅妣趙氏贈福國夫人繼晁氏贈定國夫人父毅朝散郎贈太子太師妣李氏贈慶國夫人太師在政和間嘗上疏論蔡京罪惡乞正典刑因是得罪然則公之氣節有自來矣公生于禮義之門而少有大志不護細行喜立竒節輕財好施貧而無悔讀書見古人義概事必慨然慕之徃來京洛浮沉俗間頗以俠自任聞士夫之賢者傾心事之宣和之季知天下將亂欲入廬山為道士靖康敵犯京城公以太平日久官軍驕惰不可用于是上書言民兵之利欲使貧富相資以弭内憂書奏召對翼日授迪功郎充都大提舉守禦使司幹辦公事敵先攻通津門拐子城公説綂制官鄭建雄選健卒縋而出戰敵失利小郤録立功姓名為之謁都太守禦使孫傅傅欲置籍次第之公曰首戰獲㨗行賞豈可緩耶願以便宜從事傅從之士氣十倍是以一拐子城敵攻之兩旬不能下十二月戊申敵自宣化門入公徃麗景門見綂制官渠慥曰事亟矣請速分兵扈法駕上召見公宿禁中乞命慥將兵保東華門班直蔣宣等率衆聲言奉皇帝奪萬勝門以出入欲刦内帑公復乞以慥兵三百與左言俱入斬蔣宣等餘皆股栗聴命或云始公欲入而未得日掃李丞相邦彦之門㑹有㫖前宰執赴殿廷議事公又懇曰此某效鳴之時也李擕以入忽于殿下嵩呼欽宗愕然使問之即大言曰臣真宗朝故相王旦之孫也有致君澤民之術無路自進比嵗嘗上書言大遼不可滅女真不可盟果如臣言今無他䇿京師豪俠臣皆識其人平日能服役之當募死士數萬奉陛下侍上皇挾諸王決圍南幸欽宗忠之慰勞甚厚解所佩夏國寶劔以賜命整齊六軍召募死士且以片紙批曰王倫事成可除尚書兵部侍郎既拜賜以出次日再對自言已得數萬人悉願效死幸陛下勿疑且請上御祥曦殿慰安中外時有勸上幸青城者宰相何㮚已主和議將用其説上以問公公曰此必誤國非臣之所敢聞上悟曰倫之言是也㮚進曰萬一誤國臣當伏死公怒髪衝冠㮚叱曰若何人敢至此耶公亦叱曰爾何人乃至此耶又面斥其不材寡謀必誤大計或至天子䝉塵雖誅相公數百輩何益㮚怒謂狂生言既不用恐為亂請上誅之且乞就令衞士執之上意未決公執御批立于從班中以免又次日㮚畫㫖送御史府將置之死地賴上全䕶獲免用事者乞換公左武大夫吉州防禦使帶御器械公皆不拜止循修職郎已得間出都矣二聖北狩公見張邦昌問國璽安在何不齎迎大元帥康王同韋拱侍淵得璽遂行㑹聞大元帥已次南京即與淵倍道奉璽勸進高宗移蹕維揚公走行在上書自伸前志乞使沙漠問二聖起居時高宗正思擇人即轉朝奉郎借朝議大夫試尚書吏部侍郎河東大金軍前通問使制詞略云胄出公侯資兼智勇朕方俯同晉國命魏絳以和戎汝其遠慕侯生御太公而歸漢金帥尼雅滿㓙焰熾甚滿尼雅舊作粘罕今改後同公與之抗辯旁若無人金帥憤怒留之雲中從行者多不堪公談笑自若勉以節義然尚未知兩宫安否日禱于天以朝通夕死為言有啇人陳忠告使臣楊永亨曰二聖太后在黄龍府公以語副使朱公弁及洪公晧曰此天所贊也即遺之金使逹上意由是兩宫始知本朝中興而江南之信通焉一日尼雅滿使烏陵思謀至驛尤為桀驁公藐視之語及契丹事公曰我道君皇帝與大金先大聖結盟海上約為兄弟大金與契丹相持師老糧盡使使告急即遣兵進援于委頓之時使成雲中之功豈非有重恩于大金耶契丹已滅大金之臣屢請南下先大聖恐敗盟約終身不從後忽稱兵至使二聖北狩生靈塗炭但知貪目前之利天地神明安可欺也大金累年喪失人馬不可勝計殆先大聖冥冥之中必有所不佑比渡江深入﨑嶇敗衂可見我朝徳澤深厚人未厭宋今主上法令一新賢才並用必圖復讐盍為遠謀歸我二聖太母天眷復我土疆講兄弟之好使南北赤子免肝腦塗地之苦幸為贊成大計思謀沈思曰侍郎言是也當達此意明年春尼雅滿忽來盛陳兵衞延入問曰使人來者數輩于吾所問皆未知對今乃遽欲議和決非南朝實情直侍郎私意爾公曰主上臨遣若非尋盟來復何人人衆能勝天天定亦能勝人惟公裁之尼雅滿不知答紹興改元乃以公歸議事二年秋入境有㫖趣覲具奏覊留曲折敵情底藴天語勞奬特轉右朝議大夫充右文殿修撰主管萬壽觀賜銀絹二千匹兩官其二弟一從子公之將歸曰洪皓母老請以所議付之尼雅滿不從遂攜皓弁書歸奏各授其家時劉豫犯邊和戰未決三年韓肖胄使還金遣李永壽王詡踵至驕倨不可告語上聞之曰非王倫不辦此召問之公曰彼性貪但邀賂耳上問幾何時在御書院奏曰但得案上物足矣上聴取去凡筆格鎮紙之屬皆精金為之公袖之拜以出徑入驛與道雲中時事且曰主上喜公等遠來故加勞賜宜拜以謝一人不自知䣛之屈也借左朝議大夫尚書吏部侍郎充送伴使廟堂擬除邊帥公謂前在敵境知烏珠幾為我禽按烏珠舊作兀术今改後同山東河朔久望王師機不可失力陳進取大計詞意剴切覬上親征大臣難其請主管江州太平觀居㑹稽七年春徽宗皇帝顯肅皇后訃至除公徽猷閣待制借直學士左中大夫樞密都承㫖充迎請梓宫使至南京偽齊授館于鴻慶宫移文取國書及使指公曰國書當納金主使指無他報謝訃音迎護梓宮而已明日又來曰大金與齊一也國書當赴齊相府驗實遞至軍前俟得報然後可進公曰有死無二願勿復言再三迫取不遂頓鑴餼廩増兵圍守莫不失色公曰無能為也金遣接伴以九月渡河見金帥達蘭于涿州按達蘭舊作撻辣今改後同問過淮已久何來之遲公備言劉齊邀索住睢陽者數月因言豫在本朝曾擢臺諫外樸内姦營私掊刻民怨神怒方欲喬噬兩朝能保他日不為大國之患乎恐妨遠圖敢布腹心問曰若將豫與南宋能制之否公曰皇帝聖孝神武臥薪嘗膽志在恢復但以天下為度不忍輕以動兵豫之父子忘背國恩孰不願食其肉倘欲驅除何難之有痛言利害泪滿茵席達蘭顧謂烏珠曰江南有忠臣如此何慮不能立國越夕使人導意云侍郎少休已馳奏矣是冬廢豫使謂公曰歸報皇帝强梗掃去自此和議無復間沮但有當議者須不倦以終之于是仗節來歸上在建康嘉歎累日好賜特異徑除所借職任明年又徃見達蘭于祈州出諸軍招誘蠟彈旗榜八百餘通詰公南朝欲和而沿邊日獲姦細文字語言無理奉使只是款兵相陷耳公曰奉命三至専以講信修睦諸將徒見徃返猶豫各欲乗時求尺寸之功若和議一定朝廷明降約束豈復敢爾二酋相視無語初公之族有留京師者季父存欲結太行義士徑擣敵巢聞公拘雲中密以書來公大喜報曰某自恨疲駑無以佐中興辱示正愜素心幸竟斯事未及發而謀泄捕存黨囚之地窖至是知為公之族押存付公存既還改合入官金遣張通古烏陵思謀報聘使者朝謁進止祥華曲盡臣禮上因賜之酒思謀從容進曰陛下知劉齊之廢否始因王某極言遂了此事真口伐也北朝將相重之如山斗真社稷臣也上欣然領略于公益加信任御札令公籌度别以金器龍腦茶具賜思謀公亦拜賜復借龍圖閣學士為迎奉梓宫使兼請太母淵聖祖宗山陵上念東朝之歸尤切丁寧告戒曲盡聖情公泣拜以辭期于必濟既見達蘭具宣上旨願親見郎主敬請達蘭曰非不欲侍郎至闕下但九州之外荒寒殊甚恐不堪疲勞公請益力明日遂行既見金主謝其廢劉豫且伸祈請金主喜公之來撫存加厚且曰山川太遠不易跋涉公曰今日獲遂所請少效使臣之職雖死之日猶生之年詎敢以登頓為勞嗟異良久宴犒連三日遂決大議歸奏上大悦除龍圖閣學士侍讀金遣蕭哲石慶元來及境而不肯進揚言曰此非他使之比豈可用平時禮數相待邀索百端迓客者無如何副使藍公佐密奏乞命公一行借端明殿學士侍讀充計議使哲等聞之即日渡淮相見有慙色曰何煩端明遠來既就館舎公索副書及議朝見哲愕然既不肯道所以欲損朝儀公曰如此則當再詣河北軍前議之退取旨欲行以足瘡未能陛辭哲問館伴使兩日不見王端明來議事何耶上聞之即俾公力疾入令子弟扶掖賜坐命以調䕶哲問連日何不一見公曰簽宣不遵故事已被命再行當少須回日議定二人作番語久之徐謂公曰不決于此遠去何為公曰既不相聴何憚一行哲方肯啓國書割地講和許還兩宫及梓宫既入見起居進書如儀上下喜懌九年春真除端明殿學士簽書樞密院事賜進士出身充迎䕶梓宫奉還兩宫交割地界使兼東京留守公既交河南寛恤疲民大發倉庾以賑窮乏烏珠留數百人取偽齊留貲名落後司公聞其紛擾盡逐之民始安堵烏珠一親信人見公若欲有言公屏人問之遂言烏珠有害達蘭之意公厚遣之即密奏乞令張俊守東京韓世忠守南京岳飛守西京呉玠守長安張浚建督府盡䕶諸將以備不虞上以示大臣持不行連促北去六月渡河北至㑹寧府聞向之主和者盡為烏珠所屠事皆變矣既見金主令耶律紹文作宣勘官傳言問公還知元帥達蘭等罪否答以不知又問交了許多疆界而略不及嵗幣卻欲一一如請只知有元帥不知有北朝耶公曰前日蕭哲等齎書至本朝許割河南歸梓宫太母淵聖天下皆以金國不忘海上之盟庶幾與民休息行人則往來通兩朝之好耳豈有他哉是日風雪寒苦詰難數十反公忠憤激烈辭氣不少沮見者為之喪膽歸館又遣紹文就驛受辭公對如初度必不得歸通夕密語副藍公佐曰前過汴都已知事變亟奏上矣知閤若歸乞檢前奏急命諸將分守所歸侵疆無令輕失中原敵至今日已如强弩之末烏珠不達時變貪而無親將自取斃往囘幽燕父老談道本朝未始不泣下咸知君明臣良必大恢復忍死以待太平金之貴臣往往輸誠相結衆叛親離久矣他日若來請和當盡復土疆則可與議又去年嘗禀宰執乞不發歸正人切無苟且以失後圖自是四旬無所聞十一月庚辰紹文至驛傳言問公向拘雲中本無還期曾不知恩反貳我君臣今遣副歸以待待報將分驛與公佐酌别云區區悉已前白無一語及其私留河間六年金以公為平蠻三路轉運使公力拒之驅迫日甚公曰君命無貳臣之節也貳而苟官爵倫實恥之又脅以威且曰受命則生不受則死公乃振衣冠南望行闕再拜稽首厲聲言曰先臣文正公旦勲業炳然臣為國將命猥被拘留復以偽命見逼敢愛一死上孤國恩以辱君命于是大慟斥罵使者聴其絞死實十四年七月戊午也是日秋宇澄霽忽隂雲晦冥風雹雨雪咫尺不相覩城郭内外地皆震裂數日不已河間人懼甚急立公祠家繪公像以奉之明年公之訃始聞天子震悼特輟視朝報其家贈左通議大夫賜銀絹各千敕就平江府安葬仍令有司應辦享年六十有一娶陳氏封安康郡夫人二子述朝請郎通判光州軍州事贈奉直大夫逸朝請大夫主管華州雲臺觀述之子五人朴承奉郎棣承直郎監三省樞密院激賞庫杞修職郎監行在打套局枏中奉大夫守將作監兼知臨安府主管兩浙西路安撫司公事樞將仕郎曾孫五煥炎從事郎新監衢州都酒務炳郯剡女七逸之子四人梓通直郎機文林郎新臨安府觀察推官棠迪功郎新光州録事叅軍枃迪功郎新監常州薛堰犒賞酒庫曾孫八焯從事郎隆興府分寧縣主簿焌焴燧爚熺煇燦女九公之亡也時相専和戎之功又忌公之死節令公家止稱在金身亡故卹典有未盡孝宗淳熙初搜訪知之始命杞枏機皆為將仕郎述自聞凶問擗踊號絶勺飲不入口者五日是冬冒萬死與從兄遵同北方豪俠訪得公之骨于河間歸葬于長洲縣陽山大石塢之原嗚呼古之膚使止以専對為能若公前後五反烏珠尼雅滿達蘭等皆貪如狼暴如虎未易以口舌辯也性根忠義藐視凶酋隨宜應對悉中事機以濟大事投身鼎鑊刀鋸之間氣不少讋智意横出他人莫及臨死生之際又洞達勇決如此非烈文夫能之乎述等摭公言動及使事始末懼禍久不敢出郎中鍾離公松嘗為使屬知公尤詳乾道間始敢狀公之行紹興元年請諡于朝禮部尚書倪公思為太常博士議以節愍易名鑰時在攷功為之覆諡又二十有二年當嘉定之四年公之諸孫求銘距公之亡葢六十八年矣比嵗權臣妄開釁端横挑強鄰以為功在旬月兵連禍結始謀講解無敢行者枏時為城南廂官帥臣言其有異才又自以大父之志未展被命辭母而行至再至三卒就和議可謂不忝其先矣擢帥淮西進尹京邑皆有聲績其進用未艾也于是列公之節請于朝特贈資政殿大學士廟號忠肅而公之名益顯矣鑰妻祖工部尚書俁實與晉公分派居宛丘公最後出疆之時語尚書曰此歸當講宗盟而竟不還兩家尋此盟久矣閩舶淹公之從孫行也與鑰締婚又助之請鑰生晚竊慕公之節義有年矣謹摭行狀之大概叅以槐庭濟美集中興小厯遺史雪溪王公銍所作御劔銘序與其子明清揮塵録及網羅舊聞以就此碑大懼骫骳之文不足以發潛徳之萬一抑聞之韓信不顧酈生之烹李靖以唐儉為安足惜故使絶域者惟恐其用兵于後公毎先以酈生唐儉自處將行必請戒飭諸將練兵備器脱有可乗之機不必以臣為慮雖閒居于外時時貽書宰相請措置兩淮山水寨以陜西弓弩手法行之沿邊以俟大舉間有召命家人相賀則泣曰大將富貴俱極誰肯進討見上必傾盡愚直又將觸怒大臣未知死所何賀之有然則公之志豈専以求和為功哉嗚呼天未悔禍强敵尚存九京之英必有遺恨此忠臣志士所以痛憤而不能自已也一時假吏必取通儒與之俱其有才智可與同患難者雖屠沽所不廢自以品秩雖微事君以人不敢不勉聞有欲以貨取者輙矣曰是豈所以遺子孫取及其被留士子十餘人競願從公止許留七人有蜀士張大時者年最高且多病終不相捨其能得士心又如此烏珠之犯順昌也逆風暴雨戎壘深濘大為劉公錡所破烏珠輕騎宵遯行一舎間知不雨始稽顙三歎曰小人不信王端明説南朝國富兵强徒虧和好咫尺不雨是天不容南牧而小人違天也乃折箭誓不復敢輕舉三日馳至韓州劉公後親以語公之長子且曰畫淮之約何遽如許苟繹公之言徐與之議則版圖歸復何止河南而已劉公之言必不苟嗚呼此尤非人力之所能為也公初自奮于稠人中驟膺欽宗之眷後又身任南北之議其事日偉及其死節則雖有異議者至是翕然歎服惟公之終始天下喜聞而樂道之而登載于書者各誦所聞不能齊一今特表公之大節以厲世之為臣子者其間小有異同尚可略云銘曰三槐之王族系繁昌衣冠鼎盛名徳相望公生其間不扶而直少慕竒偉人未之識干戈雲擾忽逼神都主憂臣辱顛倒廟謨奮由布衣親上方略欽宗忠之賜劔予槖徒手一呼得數萬人欲奉兩宫決圍南巡謀不及用出狩于北奉璽勸進求使絶域高皇聖孝五以節行㓙酋虓暴望者震驚惟公忠勇以死自誓視之無如而奪之氣隨機肆辯出古入今得其要領以副上心事成功高忌其大用晚遭囚拘疑有隂中欲啖以官死生立分痛哭怒罵卒殉以身天作風雹地為震裂或者蔽之使不上徹有子死孝終歸其骸卹典雖頒烈士所哀公之有行請益兵備機有可乗雖烹何畏分驛之際語不及私死輕鴻毛了無異辭公亦勤止萬里往反全軀之臣尚糵其短迨其執節無不心降鬼必厲賊公乎不亡孫有祖風捐軀將命屢探虎穴和議以定帥淮尹京得請于朝隆名世祠寵數孔昭我作銘文㑹稡衆説萬世臣子仰止忠烈寶謨閣待制贈通議大夫陳公神道碑嘉泰三年集英殿修撰陳公告老于朝天子歎曰此吾舊學且書命之臣也除寶謨閣待制遺奏聞贈四官録其後所以飾其終者如故典門弟子哭之失聲里人聚而相弔四方士夫聞之無不䀌傷者葢非他人云亡之比也公諱傅良字君舉其先自閩徙温州瑞安縣帆遊鄉湗村里至公八世矣曾祖靖祖邦父彬皆不仕父以公貴累贈朝請大夫妣徐氏贈令人朝請邃于易教授鄉里以篤行稱公天分高勝其于學問心悟神解而苦志自勉精力亦絶人隆師親友有不可解于心者興化劉復之朔以南省第一人來為司户叅軍攝教官得公程文以為絶出公之年甚少也而名已高開門受徒于仙巖僧舎士子莫不歸敬薛寺正士龍見公問所安公曰毋不敬士龍曰比叅倚如何公釋然増進歸心薛氏後又相從于滆上讀書一日千里其為薛氏祭文云我昔自喜壁立倚天見兄梅潭忽若墜淵梅潭即仙巖也伊洛之學東南之士自龜山楊公時建安游公酢之外惟永嘉許公景衡周公行已數公親見伊川先生得其傳以歸中興以來言理性之學者宗永嘉惟薛氏後出加以攷訂千載自井田王制司馬法八陣圖之屬該通委曲真可施之實用凡今名士得其説者小之則擅塲屋之名大可以行于臨民治軍之際公游從最久造詣最深以之研精經史貫穿百氏以斯文為己任綜理當世之務攷覈舊聞于治道可以興滯補敝復古至道條畫本末粲如也本朝名公鉅卿不可縷數自韋布而名動宇内者不過數人公自為舉子業其所論著如六經論等文所在流播幾于家有其書蜀中文學最盛讀之者無不動色文體為公一變至傳入夷貊視前賢為尤盛乾道六年始入太學士無賢不肖斂袵下風八年公之高弟蔡公幼學為省元公次之徐公誼又次之薛公叔似鮑君潚劉君春胡君時等皆鄉郡人非公之友則其徒也尤為一時盛事既登甲科朝野想望風采授泰州教授以歸叅政龔公茂良帥江西以書幣招之願與定交公曰此古人羔雁之禮不行于世有年矣善辭之未赴㑹太學録闕求之者衆龔公實行宰相事奏孝宗曰待次不改闕初官不堂除陛下良法也太學録一闕而睥睨者衆臣欲擇取名儒為士林所推者越拘攣而用之則人自服矣上問為誰以公對上曰是朕所素知者除命一下果無異辭就職幾月車駕幸學改承奉郎龔公既罷政亦寖有相嫉者添差通判福州帥相梁公克家得公喜甚以政委之公悉心禆贊不事形跡卒以専擅論罷時淳熙七年也尋主管台州崇道觀起知桂陽軍閒居八年始赴郡提舉荆湖南路常平茶鹽事就遷轉運判官改兩浙西路提㸃刑獄公在桂陽蠲除宿負罷弛斜科倉司則補糴諸郡米至十萬斛漕司亦蠲錢數萬緡力講荒政所及者廣進登極銀三千兩屬方救荒力不能辦申請減額損三之二實恵遂及一方以服勤使事嘗感寒疾至是以奏事再入脩門鬚鬢如雪丞相留公正一見歎曰幾年陳君舉尚可使外補耶奏留為吏部員外郎初對上曰卿去國幾何時朕欲見卿久矣知卿學問深醇有所著書進來時上臨朝淵黙罕有聖語公敬謝而退以周禮説進擢秘書少監訓詞曰朕日御便朝延見郎吏有郎白首色夷而氣温儐者贊其名則汝傅良也朝列傳誦實黄公裳之詞也兼實録院檢討官皇子嘉王府妙選官寮以公兼贊讀未幾除起居舎人兼權中書舎人期年始遷起居郎紹熙末年龍樓問寢不以時自大臣而下更進讜言從班多連名騰奏或同班叩請公自以受不世之遇必欲身任其責請對直前幾無虛月剴切痛憤指陳利害無所不用其至葢嘗贊嘉邸為中宫言之又嘗奏疏謂臣等在王邸于古今父子君臣之際人之大倫天地之正義以開導賢王而㑹慶闕上觴之禮長至虧稱賀之儀區區口耳之感必不能勝躬行之化紙上之習必不如家傳之法今既上失三宫之歡則臣等講讀皆為空言矣其餘骨鯁之言有敵已以下所不能堪者上終不加譴而言亦不用一日奏云陛下屢許臣以出又令傳旨于廟堂而復不然臣貪戀厚恩未忍決去容臣遂思補過更圖入奏若不垂聴則有致為臣而去耳又從而草奏曲盡事節犯顔極論度上意不回遂上挂冠之奏上雖不受玉音賜可公即申省乞致仕宰輔留之不可既行授秘閣修撰嘉王府贊讀皇上御極以中書舎人召還兼侍講兼直學士院實録院同修撰謂可行素藴矣而言者指其學術不正罷為提舉江州太平興國宫慶元二年復劾其在太上朝奏對狂率降三官罷祠嘉泰二年叙復元官再畀祠禄遂除泉州以病力辭除集英殿修撰病革謝事遂有次對之命十一月十有二日終于里第享年六十有七積官至朝議大夫爵永嘉縣開國男食邑三百户娶張氏名幼昭字景恵主管禮兵部架閣文字孝愷之女以婦徳著聞先公九年卒子男二人師轍迪功郎安豐軍壽春縣主簿師朴承務郎女七人長適迪功郎監鎮江府凌口酒庫潘子順次適從政郎新福州連江縣丞薛師雍次適迪功郎處州州學教授林子燕次適迪功郎新福州連江縣尉徐沖次適進士張紹次適進士張疇一尚幼令人葬于前山開禧元年三月庚申二子奉公之喪合焉嗚呼以公之抱負偉傑學博而精觀書别有高識作文自出機杼類非今人所可企及求之古人亦未易多得也受知三朝掌内外制經帷史館不為不遇而名高多忌卒不得究其經世之學為可痛也公行誼著于鄉曲述作擅于當世不待屢書敢摭其論奏之大者列之然後知其非諛墓之詞也公之赴郡免奏事而去歸覲光宗以舊欲奏之孝宗者陳之葢公憂國之心澤民之具其説不易謂藝祖創業垂綂無非可傳之法而深仁厚澤裕我後人則専以愛惜民力為本攷之故牘自建隆至景徳四十五年間南征北伐未嘗無事而金銀錢帛糧草雜物七千一百四十八萬計在州縣不㑹古所謂富藏天下者也諸道上供隨所輸送初無定額留州錢物雖盡曰係省而不盡取大中祥符元年三司始奏立上供税額熙寧用事者始取藝祖之約束一切紛更之新法既行増上供之額一倍至崇寧遂增數倍此特上供耳其他雜物熙寧則有令項封椿元豐則有無額上供宣和之經制紹興之總制月樁皆至今為額而折帛和買之類不預焉茶引盡歸都茶塲鹽鈔盡歸𣙜貨務秋苗以十之八九為綱運是皆不在州縣于是取之斛面取之折變取之科敷抑配贓罰而民之困極矣方今之患何但夷狄葢天命之永不永在民力之寛不寛豈不甚可畏哉上曰莫急于此但以處置為難公奏第三劄子乃是處置之説既奏襃美再三其大略曰嗣位之初詔為寛民置局講究而民窮如故葢以裁抑細微或蠲空張之數未有以稱明詔慰民望也國家財力竭于養兵又莫甚于江上之軍故毎欲省賦朝廷以為可則版曹不可版曹可則總領不可總領可則都綂司不可以謂之御前軍馬雖朝廷不得知謂之大軍錢糧雖版曹不得預中外勢分職掌不同事權不一施行不専雖欲寛民得乎使都綂司之兵與向者在制置司時無異總領所與向者在轉運司時無異事出一體而後可議寛民力矣轉對又論藝祖治大而不治細以上書人文字令知制誥看詳升降以聞次對章奏下尚書省叅詳人主所自擇不過臺省長官豈不甚易行哉又嘗論役法謂免役錢者本以恤民使出錢雇役而逸其力也自罷募户長壯丁而取其錢今隷總制之類于是役者白著而法不得不壞保正長催科是以保甲法亂役法而行之也熙寧自有役法五等簿是也自有保甲法魚鱗簿是也五等則通縣計之魚鱗以比屋計之保甲但以稽察盜賊與免役初不相闗熙寧七年始以保丁充甲頭催稅而耆戸長壯丁之屬以次罷募利其雇錢而封椿之法起矣元豐遂著為令以甲頭同大保長催科元祐匆匆復舊隨即紛更至紹聖二年催科悉用大保長役法轉而為保甲嘉祐以前固無此法至此又非王安石之舊特章厚為之今士夫恥言安石之為人指章厚為罪魁而方世守其變亂之餘以為成憲萬古設法一安石能改之章厚能力行之此斯民最大之害乃若出于三代之舊而莫敢議有議之者則付之有司不過檢坐見行條法申嚴行下此臣尤所未喻也誠能不以保甲法亂役法雖未足以盡寛民力亦可謂至恩矣進故事以真宗詔兩浙福建荆湖身丁錢並特除放其論尤詳以為減折帛不如身丁切于窮民此皆公平時攷古驗今可舉而行非若泛然美觀之言卒不得見于用若其封還詞頭遇事輒發未易悉數如請還黄裳給事中則引唐吕元膺紹興程瑀以為比論張子仁之建節則請先處分留正之去留吳挺之除代而其甚難者莫如陳源與率逢原二者源之貫盈幸不及誅忽除内侍省押班瑣闥攝事者繳章五上人皆傳誦大臣力請觸雷霆之怒㡬不自全一為書行公議沸騰黨與凶焰不可嚮邇而公獨當之逢原麄暴恃有奥援所至兇横其在池陽㡬至軍變為總領鄭湜所發按其偏裨上命樞臣鐫戒方待罪間自副統制陞都統公又論之源供職自如而詞命不行終不得俸逢原先被宣劄已自書銜而公于二者執奏再三終不奉詔以至乞身而去公去未㡬而内禪子仁訖不得節鉞源亦罷去逢原以病廢惟此三事無敢嬰其鋒者公神色不動來則繳奏旁觀者為之寒心而外間罕知之者鑰與公同生于丁巳少我九日自分教東嘉為布衣交義兼師友後雖一同朝蹟而情義日篤一旦同在西掖同攝北門相與如弟昆然至于同寅協恭尤非他人之比藝祖東嚮宗廟大典集議至再始正百年之禮而臺誎有異論鑰極論之丞相趙公宣㫖鑰又執不可公從旁力賛其決而事遂定謝知閤淵以太母之弟有旨請給等依禄格全支公已書行而鑰駮之再命特與書行公上奏先具鑰之駮章且曰樓鑰委是允當始知臣失于㸃檢不及論奏若更書行臣有三罪一則迎合聖意不敢執奏二則衝改旨揮使有司無所憑守三則恥過遂非無見善則遷之義欲望追寢御筆仍正臣鹵莽之罪其事遂已嗚呼孰有負重名于時致身至此而服義引慝同濟公議如公者乎汲引人才如恐不及在湖南應詔薦宋文仲呉獵蔣礪楊昭在朝則薦朱熹葉適呉仁傑王明清修中苟知其賢不復以私嫌為忌其他成就延譽使就聲名者不知其幾也博極羣書而于春秋左氏尤究極聖人制作之本意左氏翼經之深旨著春秋後傳左氏章㫖二書葢經止獲麟孔子卒傳止韓魏反而喪之之後殆未有此書也願見不可得則曰此吾身後之書近既得之誦讀不已不揣而為之序其門人遂以銘為請鑰欲述公行事或恐有觸忌之嫌自以投閒十有三年已掛衣冠視䕃幾何知公為最詳若畏避而没其實豈不負吾亡友㑹稡未集而病深恐溘先朝露不究此志小愈遂扶憊而畢之公風度高遠動輙過人詩律之精深字畫之遒媚登覽高致吟諷低昻親之則使人意消王謝韻度尚可想也方主上在宫邸時寮寀以詩為壽惟翊善黄公與公之詩皆有諷諫上為置酒各親書所上詩謝之公後嘗奏知以御札登諸石而跋其下以其稿示鑰未及刻而公歸訪求此藁不可復得猶記其略云季札觀樂歌頌而曰哀而不愁太史公讀虞書至于君臣相勑維是幾安未嘗不流涕也成王作頌推己懲艾可不謂戰戰恐懼善守善終哉葢頌者不専于美盛徳之形容皆敕戒之義秦斯以來此義殆絶鑰讀之為之感咽嗚呼此又先儒之所未發也銘曰温居瀛壖儒學之淵間氣所鍾挺生斯賢舒向金玉游夏淵源羣書博極本末貫穿退然布衣名震八埏晚登周行帝席為前典刑具存訓詞是専王邸螭陛史館經筵獨當雷霆力欲回天經世澤民齎志終焉天之生才夫豈偶然儲神毓秀其必有年宦匪不達受才則全道之不行賴有遺編後有百載復見儒先哀哉止齋見此銘鐫攻媿集巻九十五欽定四庫全書攻媿集巻九十六宋樓鑰撰神道碑寶謨閣待制致仕特贈龍圖閣學士忠肅彭公神道碑皇上踐阼之十有四年十有一月乙亥詔樓鑰林大中赴行在大中先至首言故吏部侍郎彭龜年之忠乞賜襃贈嘉定改元鑰求對又以為請且録其諌草以進皇帝為之愴悼詔贈寶謨閣直學士仍與一子陞擢既又御批彭龜年係朕潛藩舊學當權臣用事之始首能抗疏折其姦萌襃卹之典理宜優異雖已追贈未稱朕懐可特加贈龍圖閣學士其子欽與寺監簿差遣三年禮部尚書章頴侍御史劉榘起居郎黄中就講筵同進公家所被賜御書御製正邪論且言公之盡忠知無不言首論侂胄之姦為其沮抑抱恨以殁乞賜美諡上賜諡忠肅又云是肅敬之意恐有司行之遲緩當為批出八月三人又因晚講奏謝上云彭龜年忠鯁可嘉宜得此諡使人人如此必能寘人主于無過之地先是紹熙五年七月甲子上受内禪公時以右史兼嘉王府直講上在重華宫一時舊寮惟公最承睿眷宣召幾無虚日未幾由西掖遷貳卿方趙公汝愚決大䇿之初曾遣韓侂胄奏憲聖慈烈皇后有一日之勞至是寖以出入兩宫始有竊弄威權之漸公極論之且乞去公除職與郡侂胄罷知閤門等職事轉一官内祠時鑰為給事中大中為中書舎人同状繳奏上批彭龜年除職與郡已為優異韓侂胄無罪辭劇就閒可與書行鑰與大中再奏龜年以貳卿得此若以為優異侂胄無故轉承宣使非優異乎若以侂胄為無罪龜年以盡忠陛下直言無隱何罪之有龜年一去必不復來侂胄内祠日在左右若併使出外則人言自息矣鑰遂為吏部尚書大中竟由給事中為吏部侍郎尋皆補外郡鑰得婺不赴而奉祠公在荆南亦以疾丐閒林公在慶元罷歸三人者鐫職罷祠至于一再惟公之謫尤重侂胄檀權之久罪惡貫盈妄開兵端舉世震動主上奮發威斷加以誅殛中外稱快故翌日而二人趣還獨公不幸已成千古不及見更化之盛士大夫莫不痛惜之公字子壽世為臨江軍清江縣人曾祖廣祖愈考文通俱不仕考以公貴贈朝奉大夫妣楊氏累贈碩人公七嵗而孤奉母盡孝如成人幼穎異讀書能曉大義比長得程氏易讀之至忘寢食年十八薦于鄉三預計偕登乾道五年進士第授左廸功郎袁州宜春縣尉時丞相趙忠定公將漕公以書言月樁錢病民趙公因計為緡錢七十萬而無名者强半皆出于苛斂趙公首取最甚者如宜春麴引之類先罷之乃以聞獲盜八人自以為非親捕不就賞公方初筮而利民自立已如此闗陞從政郎調吉州安福縣丞縣有寅陂灌田萬三千餘畆彊宗錮其利嵗以旱告按圖疏治陂成而嵗稔郡委檢察保甲而無其籍憮然曰是縣之根本不務可乎乃以法聨合綂紀又户别其老病强弱之丁士農工賈之業租税有無多寡之數調夫既均後有賑貸按籍立辦他日檢旱賴此尤得其要蠲放不及二分而民間歡服以為前此未有得實如此者請藏此牘以為後法育嬰兒救疫疾雖不禁巫覡之禬禳而各使勉病者以服藥全活尤衆淳熙十二年用舉主改宣教郎以母碩人年高丐祠便養主管建昌軍仙都觀自初第而歸益篤于學以毋自欺名齋以書問南軒張公中庸語孟大義至是義理愈明開發後進摳衣北面者日衆復與劉子澄清之往復問辯時相與折衷于晦菴朱公而學愈成矣再請祠未滿而丁内艱執喪盡禮誠信備極葬之日觀者歎其可法以致敬致樂致憂致哀致嚴裒集格言類為一書名五致録晚又定祭儀行于家服除吏部尚書鄭公僑兵部尚書張公枃同薦之得旨引見時光宗初即位内降頗多公首論正始之道願以仁宗杜權要請屬為法以崇寧御筆為戒公又言嘉王傅相少而侍御多請用司馬光令伴讀官提舉左右之議使府寮之勢重于侍御道義之訓密于宴游光宗首肯久之且曰當世急務也又以開樂之初進逸豫之戒謂國家大讎未復而内外宴安猶襲宣和之舊淫侈成習光宗曰風俗驕侈太甚至此極矣朕日夜思所以革之因奏陛下為之不難風俗之變未有不自上始也二月除太學博士時殿中侍御史劉公光祖因論帶御器械呉端改太府少卿公上疏乞復其位又貽書宰相云祖宗嘗改易差除以伸臺諫之氣不聞改易臺諌以伸倖臣之私有諫大夫同知貢舉欲大變文格下太學選經義詩賦論策各二百篇為式長以督課學官公獨不可曰使士明經術熟古文則文格自正校文已為下策又使之習時文此非所謂教也雖忤諫官意然遂不復選二年兼魏王府教授六月除國子監丞郊禮遇雨祠于望祭光宗意鬱鬱不豫至展恭謝之日公具嘉祐中文潞公因設醮宿殿中故事白廟堂又言重華命押醫官下都堂亦欲大臣共此憂責次日乃聞内引宰執三年許國公始朝參公為言保富貴之道無過恭儉又集禮記論孟子史中朝見之禮為朝參須知且言雖與嘉王同行在禮世子不可與同名非惟名不可同色色不當相似至生日又以恭儉惟徳為韻作四詩壽之六月侍御史林公大中辟公充御史臺主簿謂公操行堅正不為詭隨遇事通明不事沽激八月以舊班對乞復經筵典故謂勸講之臣當用明經之士人各有長經須素業不應不問所學例以序遷又謂宣召講官多用晝接不如夜直之有益也光宗云親儒生最有益十二月林公以論事除吏部侍郎公乞去張公叔椿代林再奏乞留卒不就四年正月除司農寺丞三月除秘書郎先是外傳召姜特立公白丞相留公恐非虚傳至是果然留公引李絳事乞退公率同館論奏又勉樞廷爭之遂寢五月兼嘉王府直講論説經理精切明白禆益為多不勝書書其大者嘗論梁燾辨邪正之奏公曰此正是元祐末年小人將進君子將退之時不可不詳覽王曰君子小人不可參用參用則小人勝公因具述元祐紹聖君子小人進退之大略王一日親製邪正辨以賜公正指燾奏而發又嘗賜所書瑤山詩乃光宗在東宫時作有雪詩云閭閻多凍餒廣厦媿膏粱公言人主當如是用心嘗因講詩王曰下以風刺上已是人臣委曲要知為君者須使人臣直言其事方是公曰願大王無忘此意而推廣之則善言至矣讀曾肇奏議因言用人須先識邪正王親題其説于奏議上贊讀沈公有開講三風十愆謂十不可有一王曰要是病根全在比頑童一比頑童何事不有公稱贊不已亦請王題講義上聞王宴居書知人難三字于坐右公質之于王王曰然畢竟人如何知君子以小人為小人小人亦以君子為小人正恐錯看爾公曰堯舜亦以為難也光宗久不詣重華宫公與同館入疏又以㑹慶節未舉進香之禮自上封事力請俱不報十二月除起居舎人明年正月直前奏事光宗曰久欲見卿説話此官待有學識人方除公謝且進内治聖鍳奏以祖宗家法集為此書光宗曰祖宗家法最善漢唐所不及待外戚尤嚴不可容易壊了公對曰聖論及此天下之福祖宗不委以權乃是愛親戚之道此書宦官女子之防尤嚴恐不得進御光宗云不至是三月直前奏起居注乃繫日之書言動無不記者今一月四次書免到宫陛下半年不出如此已書三十餘次以貽後世實累聖徳四月駕幸玉津園公言于宰相謂近捨聚景而遠幸玉津不奉三宫而獨出宴遊宰執以公言乞恭請公亦入奏㑹被命禱雨因言兩宫不和則天下不和天下不和則天地不和葢天地和則雨未有不和而雨者自是屢許過宫或仗集而不出侍從奏陳不效皆居家待罪公又獨奏誤以臣充嘉王府講讀之官正欲臣等教以父子君臣之道臣聞身教者從言教者訟陛下以身教臣以言教者也言豈若身之切哉五月重華不豫已奏告公與侍從臺諫請對不果八日戊辰公繳納告敕乞竄逐待命江滸戊寅壽皇服藥赦下始入城癸未公念屢乞對及求去至今日不可不極諫拜訖獨不離班位伏地敂額久不已血漬甃甓搢笏取劄子置龍墀上再拜欲辭出始傳旨上殿光宗云知卿忠直理㑹何事公奏今日無大于不過宫事光宗云須用去公又極言陛下屢許羣臣一入則又不然内外不通禍亂不聞臣實痛心光宗為之慘然曰終當去六月戊戌壽皇升遐七月甲子主上受内禪是晚召公對于大堂聖容蹙額云前但聞建儲之議亦自可息浮言豈知遽踐大位泣辭不許至今怔忪公奏此乃宗廟社稷所繫陛下亦不得而辭首乞奏知太上皇因擬劄本上即寫入又問初政及人物明日再見猶云朕一日不曾食因泣下又言昨太匆匆參決可爾公奏今只得盡人子事親之誠心再擬起居劄子乞日進一通又與翊善黄公裳同奏往朝南内因定過宫之禮乞先一日入奏率百官恭謝壬申擢中書舎人庚辰上朝泰安宫至則寢門閉矣拜表牋而退上嘗問恐太上皇未肯過泰安如何公奏陛下本出于不得已必不以位為樂況宫室乎壽皇梓宫在殯且居喪次于禮為正旬日間三降㫖經營泰安紛紛不定太上微疾未瘳不若且居南内以休息聖躬陛下少留重華以居喪聴政從之代言之初李孝純孝友轉右武大夫帶行遥刺公封還詞頭謂固當推恩母黨然上事三宫禮有隆殺恩有後先乞候三宫戚屬次第推恩内侍符滌得罪于太上而差幹辦泰安宫劉慶祖已帶遥郡承宣使而以太上隨龍人落階官公皆繳奏上于劉慶祖事批可與書行公又奏曰慶祖無官可轉止有建節若念其忠勸不若任之以事不必優之以官臣非為慶祖惜此一官葢為朝廷惜此一門陛下自登大寶聴言如流忽于此事首降可與書行指揮夫可與書行乃近世敝令也使其可行臣即書矣何待再令使不可行豈敢因再令而書哉上嘗言中宫未建聖節未立隨龍人恩例之類直俟祔廟後施行公即極口稱贊聖徳後隨龍命下封還再四且言祖宗隨龍人止轉一官元符中方轉兩官如徐勣何執中除待制侍講亦止轉一官靖康以後方有四官之例誠是太優今于巳分正當過為裁損酌中推恩命遂寢因對上語公曰朕尚未見父母如何敢恩及下人孰重孰輕且稱繳章為是然公亦以此等故不久而遷矣上問講筵所奏諒闇罷講舊例公奏多故以來兩三月不與儒生講矣不可不以為急務上袖出二紙一具太上講筵書目一具潛邸講堂書目謂講筵講書太少公奏今有機務不比講堂専一讀書上云朝退亦無事恐自怠惰況酬應萬務非多讀書不可又奏人君之學與書生不同惟能虚心受諫遷善改過乃聖學第一事不在多也他日又出二紙一御書經史十件春秋禮記詩書孟子通鑑唐書三朝寶訓奏議長編節本一書臣寮十人黄裳陳傅良彭龜年黄由沈有開朱熹李巘京鏜黄艾鄧馹公請聖意上云朕欠讀書太上讀許多書養徳東宫垂二十年今欲添講官至十員各専講一件兩日一次五人上講早二件晚三件早依舊講殿上晚只用小衫依講堂例坐講公曰講學愈切此帝王之舉也若少讀而精庶幾有益又曰十人充講官否陛下若招徠一世之傑如朱熹輩方厭人望不可専以潛邸學官為之尋除侍講而待制朱公中書舎人陳公俱以召至公引傅堯俞乞班蘇頌之下以請繼除侍讀三辭而後受御筆舉御史有不植黨與之言公奏但當察君子小人不可問黨與元祐黨籍第一人是司馬光小人陷君子變白為黑何所不有又言近差除多自中出此不足為威斷適為小人所賣耳九月除吏部侍郎公知事勢漸變乃陳四太之説其略曰用臣太驟處臣太高臣跡太危臣分太滿因震雷暴雨言近日好出不測之號令故天應以不測之風雷因極陳今日小人竊弄權柄皆起于號令之不測借吏部尚書充金國弔祭接送伴使至平江奏漢元帝時日青無光恭顯指為堪猛用事之咎及斥堪猛復有日變始切責言者小人機心古今一轍楚州應詔一疏尤極剴切謂信任君子之意未孚于人而暱比小人之跡已見于外君子告陛下之言小人或得預聞而小人誤陛下之事君子或不能知送伴至楚聞朱公奉祠又奏君子小人消長甚詳皆不得報及歸屢乞對不許自知不能久矣明堂禮成封清江縣開國男食邑三百户公見廟堂之權日輕侂胄之勢愈重言官又多出其門于是厯數其姦大要云進退大臣更易言路皆初政最闗大體者大臣或不能知而侂胄知之假託聲勢竊弄威福陛下總攬之權恐為此人所盜矣時十二月九日也上聞奏甚駭且曰只為親戚故信之不謂如此奏事退已聞下之中書晚又聞復取以入知必不濟再入一奏丞相以聞上云侂胄是親戚龜年是舊學講堂五人一死一憂去二人俱罷只有龜年在又性直肯言今當如何丞相陳兩留之説已而侂胄雖罷職而予内祠公除職與郡給舎繳駮不能囘也除煥章閣待制知江陵府荆湖北路安撫使公既去丞相竟論罷矣公至荆罷和糴以平米價罷沙市官買之敝治牙儈以寛商旅撙浮費以除魚湖之輸復奏修長隄教民兵乞支還備邊庫錢俱不報公遂以疾丐祠一請而提舉江州太平興國宫慶元二年六月以論列落職罷祠五年言者以蔡璉誣告公與趙丞相言政和中嘉王事乞加貶竄于是追三官勒停嘉泰三年秋復元官再奉興國祠開禧二年起知贛州以疾力辭除集英殿修撰提舉建寧府武夷山沖佑觀俄以疾甚致其事除寶謨閣待制三月二十三日終于家享年六十有五遺奏聞特贈中奉大夫娶敖氏先三十年卒贈碩人生二子欽承事郎守司農寺主簿鉅迪功郎新特差充荆湖北路提㸃刑獄司幹辦公事女四人長適進士陳復之次適鄉貢進士胡夢得次適從政郎揚州江都縣丞章瑢次適進士敖清之再娶燕王宫宣州位宗室潭州益陽縣丞贈中大夫伯攄之女封碩人後二年卒生一子鉉承務郎新監江州在城税務孫男二人滋沄孫女四人俱幼七月壬午諸孤奉公之柩窆于縣之建安鄉金家井之原從治命也公性資剛方學識正大而議論尤為簡嚴勁直善惡是非務盡道理義所當為白刃可蹈正色立朝其愛君憂世之誠先見之識敢言之氣皆人所難及故公議浩然歸重晚既投閒専以養性讀書為事扁所居曰止堂悠然自得幾微不見于顔面賓客非親與賢不妄交郡縣吏乗時羅織公之親黨文致之罪潛窺隂伺欲捃摭細微以媚權倖公視之如無彼亦不得毫毛之隙自偽學之説興鮮不變者公于闗洛之書益加涵詠著止堂訓蒙一書葢終始不變者也聞蘇師旦為節度使曰此韓氏之陽虎也其禍韓氏必矣及聞用兵曰禍其在此乎皆如公言著内治聖鑒二十卷訓蒙經解奏議外制并表牋雜著合為若干卷藏于家塾鑰幸同朝一見如故相與日厚公之三子求銘謂知公之深者莫如鑰偶然未死尚何辭銘曰矯矯彭公天予剛介學問淵䆳言議正大自其筮仕憂國愛民登朝屢奏心乎愛君嘉邸簡寮極天下選遇事獻規務納于善重華違豫問寢有愆朝夕思慮不已于言螭陛直前龍墀敂額言雖不用忠節愈白聖主龍飛風雲是依無日不召擢居綸闈開口論事略無顧避志欲回天側目多忌權姦櫱牙惟公先知抗疏逆折鳴鼓攻之上色為動公言益切聞者縮頸驚歎膽決一去一留消長遂分言者雖力無救絲棼聲生勢長附炎日盛太阿倒持竊弄威柄横挑强敵塗炭斯民赫然天誅公論復伸改弦之初與世更始曲突徙薪如公有幾嗚呼天乎不假之年身不及見徒為知言恩光優渥施及其子公凜如生誰顙有泚九京可作非公誰歸金井之原過者式之寶謨閣待制獻簡孫公神道碑開禧三年嵗在丁卯余以衰疾引年幸而得謝因自念以凡才叨近列一時同朝多君子寮投閒以來相忘道術遂隔死生者多矣忽得故吏部侍郎孫公從之之子新瑞金西尉鐩之書寄示從之行述且曰先公不幸薨于慶元五年四月之丁丑葬未有銘因仍八九年重不幸二兄俱蚤世凜然門户之託惟先友有以碑于隧道以恵顧九京以少贖不孝之愆余執書以泣曰方公之薨余方遭嚴譴不得致生芻于前已而又自遭内艱憂苦無生意以至于今悲愧多矣老而學落本不足以銘公義激于中有不容已閲五年始克謹摭行實之大概序公平生而系以銘公諱逄吉從之其字也先世居南蘭陵五季避地于吉之太和五世祖徳弼奉其父銀青霸之命徙名數于龍泉今為邑人曾祖文妣李氏祖叔遇通經博古倜儻有奇節雅不喜王氏學棄科舉不就尤為里人所推晚以經旨授諸孫卒昌其家公以按行阜陵恩特贈承務郎妣李氏考宜文行尤髙兩上禮部而不及禄以公貴累贈奉直大夫妣羅氏贈令人奉直三子公居長次逄年終上猶令季逄辰終袁州守俱中儒科里人有三傑之稱公生于紹興五年時方俶擾學士解散公就學雖晚而資實俊邁課藝頴出父祖竒之自弱冠三薦于鄉隆興元年擢進士第調左迪功郎郴州司户參軍乾道四年校試長沙塲屋喧動同列踰垣避之公諭以義理衆方帖息尚書沈公介為帥給事黄公鈞領漕計相與愛敬沈公留寘幕府御吏剛嚴無敢迕其意者公自以受知之深知無不言未始一語詭隨始若難合終必垂聴豪民匿罪越訴捕之不獲吏執其子于嶽麓書院沈公怒甚既得其父必欲併杖之公獨不僉書且曰父有罪子不知情何可從坐爭之數日而後得因力辭攝事而歸沈既薦公闗陞既而又畀以京削或謂公未可用沈公曰但知舉賢安知其他歸欲力薦于朝而不果七年陞左從事郎黄公還朝薦于廟堂欲處以學官公以二弟游宦懼闕子職授常徳府教授㑹侍郎李公燾出守常徳以史局自隨熟聞公之該洽先以書約見于公安傾葢之頃質以數疑公了辯如響恨得之晚且曰儀曹有京削留以待鄉人今日不可失士亟以畀公樞宻劉公珙少司成鄭公伯熊劉公焞皆有重名薦章交上初不識面淳熙五年改宣教郎太令人春秋高不忍去左右閲兩嵗令人强之始授袁州萍鄉縣公以學道愛人為心不為赫赫名而慘怛恵利之政出于至誠值嵗大祲待哺者數萬荒政皆有實恵不為便文逃責事已而得雨又教民芟旱苗養禾孫是嵗饑而不害例有添給别貯之久而盈溢輟四十萬市榖創社倉以濟貧乏擇賢士主之民賴其利催科不亟不徐行雨露于膏火中民亦樂輸縣計既裕稍蠲其餘還以予民邑之西北土瘠民窶受役甚苦公與錢市田教之義役縣苗税素重為裁酌而損其額又以餘力代貧民之賦為錢四百餘萬馬驛三在境内嵗有繕修芻藁之擾事又不集公既葺其陋又糴粟以給之遂有經久之計修學市書督課諸生身為之師士風大振公之政直可比古之循吏非有矯飾求名之心而邑當孔道謡誦藹然起居舎人呉公燠出使湖隂過縣貽書江西諸司曰部有賢令如此雖欲蔽賢可乎諸臺競列上治最有㫖籍記士民亦至今歌之代還丁内艱服闋家居又久之十三年幹辦行在諸軍審計司十五年九月遷國子博士十六年光宗覃恩轉朝奉郎賜緋衣銀魚六月隂司農寺丞兼實録院檢討官紹熙元年五月徙秘書郎八月兼皇子嘉王府直講二年二月雷雪交作詔求直言公疏八事以獻一曰去蔽䛕二曰親講讀三曰伸論駮四曰崇氣節五曰省用度六曰惜名器七曰抜材武八曰飭戎備明白剴切深中時弊輪對論今嵗初郊請遵用隆興三年詔書節用恵民以當天心上諭公曰圜壇不尚華飭亦事天簡素之意又曰中外支賜合從減省復勸上容納狷直併論和買折帛之弊上喜悉可其奏㑹諫官鄧馹請增諌員即擢公右正言首奏帝王經世之學根于一心大而隂陽寒暑之變化小而人民事物之綂紀皆係于此心之運此心融徹發之政事則天地可位萬物可育舉無難者其言甚備時營繕寖廣一第之建撤民居數百咨怨者衆公力言其弊公自以受天子特達之知思欲補報切磨治道七旬中章二十上多人所難言者期于不負所學無復顧忌故亦不得久居其職臨安守潘景珪交結謀進鄧公疏其罪反以計傾之鄧移大匠公曰名為優遷而罷其言職後不可為矣兩疏不報再對復論言路壅塞諫臣結舌天下利害無由上聞願留神于逆心遜志之戒則雖失之于前尚可收之于後也併論景珪脅持臺諫蔑視紀綱連章劾奏竟逐之未幾公亦有遷官之命大臣奏踐阼以來屢易諫臣非所以示中外若以二監處之必不肯留遂除國子司業辭不拜上諭旨曰士論所推此師儒之選也不得已就職而求去愈力公之初除或議其弱丞相留公正曰是有仁者之勇上之親擢得人矣及是丞相曰某有獻替上豈能一一垂聴然不敢以是求去也公對曰宰相與諫官不同宰相平章國事不能無可否官以諫為名是専以言為職業也不得其言而不去人將狗彘我矣烏可與丞相比哉君相知其不可奪九月遂除荆湖南路提㸃刑獄公事兩學之士數百人出祖闗外人謂中興以來纔一再見公褰帷入境風采凜然守法度識大體不専按刺傅經決獄多所貸宥案牘盈几披閲參攷決遣如流未數月文書為清民亦自以為不冤尤篤意人物太府卿項安世吏部呉鎰方銓工部徐應龍皆所薦也五峯胡先生宏之子大時元城劉先生安世之曾孫孝昌俱隱衡嶽公請官之以繼賢人之世事雖不行聞者韙之兩攝漕事通融有無深得計度之體衡之茶陵秋輸特重公曰昔祠官使臣大軍仰給于邑不免加賦今則咸無焉尚取贏可乎量出計入蠲十之三令下歡聲如雷邑人相與作佛家道塲三晝夜以報伐石刻詞至今尸而祝之也愛惜公帑不以毫髮自奉諸臺月餽隨以還之一無取焉參政陳公騤首疏六名士公在其中上亦念公久外嘗曰孫逄吉好士人三年九月召為秘書少監訓詞有當今第一流人物之襃承上意也五年朝謁重華不以時公數具疏援引古誼深言之又率同館列名以進七月主上受内禪登用舊學越三日擢公兼權尚書吏部侍郎初公入諫省翊善黄公裳曰孫直講問學醇正勸講多益今遂失助上曰言路得斯人尤可慶也又言所論有不樂者上曰既為言事官豈可不使之盡言葢上之在嘉邸知公已深至是首陳初政有曰陛下嗣膺大寶葢非得已願起敬起孝數申温清撫接宗戚俾之開釋太上推明陛下之本心乃若建立長秋推恩隨龍人之屬皆可緩也又請進學以養其明揆事以審其㫁凡立政造事皆明以先之㫁以輔之則守經事而得其宜遭變事而達其權天下可運于掌矣上欣然納之覃恩轉朝奉大夫九月除權尚書吏部侍郎賜金紫服明堂恩封廬陵縣開國男食邑三百嘗告丞相以和買折帛之價太重宜因初政稍議蠲減庶可固結民心丞相舉行之然止限以三年非公之本意也十月擢兼侍講公在嘉邸嘗集羣經格言以獻至是請講論語葢公平日潛心此書有自得之趣欲以遂格君之志也差充孝宗􅓖宫按行使朝方議撤秘書省以為壽康宫而以東宫為館閣公毅然力爭謂于理非順地狹屋敝不可以奉慈極事亦竟止待制朱公熹在經筵持論切直忽奉祠而去公于上前爭論甚苦因講權輿之詩反覆紬繹以為諷上曰朱熹所言多不可用公曰熹論祧廟獨與衆論不合他所説皆正理未見其不可施用願留之以重經幄冬有震雷詔求闕失公言過失所當謹者二曰奉親曰親儒闕違所當講者二曰謹爵禄曰節用度又論治體之要曰治化之原肇于宫壼而達于外廷宫壼嚴則内外之禁肅外廷正則上下之職修后妃之家多啓私謁嬪御或養私身願擇老成宫嬪佐六宫之政内侍本備掃除自閣長而上願遵舊制選年四十以上者知内省之事樞宰之職論道經邦願萬幾之暇從容與之議政近習之臣職在禁密願全其恩數勿使預事上深然之十二月假煥章閣學士提舉萬壽觀兼侍讀充館伴金國賀正使金使需竹牛角之屬期以必得公奏皆難得之物戎心無厭當遏之于初大璫王徳謙典司國信所密請匪頌公卒卻之慶元元年正月兼實録院同修撰使事畢入對因奏臣比縁館伴刺求北事竊聞自孝宗上賔寖有輕視中國之心比年公卿習安將帥習媮士卒習惰風俗習侈上恬下嬉無復有枕戈復讎之意願陛下拔材賢旌循良核名實蓄財用選將帥簡精鋭城要害備器械講求孝宗内治外攘之䇿上尤嘉納而公于是時已有不見容者矣待制朱公熹之去公力捄之侍郎彭公龜年補郡又論不應為近習而逐正人忤韓侂胄之意又嘗扈蹕有馬上迴揖之者公獨不顧彼又以為簡驩也一日㑹食部中或報王喜除閤門祗候公曰此乃優伶嘗于内廷效朱侍講容止以儒為戲者豈可以汙清選當抗疏力爭否則于經筵論之有飛語上聞五月内批與郡而王喜之命亦寢或以為出于誤報而公憂國愛君之心亦云至矣潛邸恩轉朝散大夫七月除知太平州累章丐祠九月提舉江州太平興國宫三年轉朝請大夫五年三月起知贛州言者始疏前事沮之公素有徳量未嘗語人以去國之由杜門深居時事一不掛口書史自娯不以得喪介意至是以言者傳播公之直節愈顯而公已屬疾上章納禄矣終于里第壽六十有五五月除集英殿修撰致仕嘉定五年上以公舊學軫其遺忠特贈寶謨閣待制仍度越彞典賜諡獻簡娶李氏累封令人與公相繼而卒子男三人銶承奉郎監鄂州在城鹽税務錤迪功郎新臨安府餘杭縣尉季即鐩也女五人進士李三聘李拓羅沂迪功郎前臨江軍司户羅晟通直郎前知南康軍都昌縣事胡杙其壻也孫男四人渙溱女一人尚幼六年十一月乙酉葬公于萬安縣龍泉鄉緜津之原公資稟醇澹于外物一無所好惟刻意經史不可解于心自幼至老手不釋卷務為有用之學尤精于國朝典章事物之源委宦族之譜系除拜之嵗月與夫前代疆理卒乘之法封國行河之利參貫融液無不通流修世教植治道誠有志焉發為文詞以理為主以意為先體制具備闗鍵嚴宻簡而有法不為綺麗之習晚嵗自號靜閲居士有文集七十卷外集三十卷藏于家左規右矩言笑不妄恂恂似不能言遇人無賢愚貴賤少長咸接以禮平實誠慤表裏如一修身踐言樂于聞過遜賢達善心無媢忌喜怒不形于色而正大剛方之氣有臨大節不可奪之風以鑰平昔之所見聞攷之胡君之行述不隠不誣足以傳遠而瑞金必欲以銘見屬老復病瘁豈敢言文念公之三子而失其二余亦視䕃幾何有不能已者與公為同年初未相知晚幸定交情義至篤為少司成則實為交承出入從班又為寮于講讀之官余與給事林公大中于晚講之次論救吕祖儉之貶公從旁贊言尤力嘗論日食事謂上即位未久多有隂翳一得明照必有背氣等變三月朔去正陽之月一間先一日大雨謂必以隂雲不見至朔日乃暸然使萬目見其剥蝕天之示戒如此公又奏曰至次日則又雨此雖片言為助多矣當紹熙慶元之間上既隆寛下亦多盡言余幸周旋其間固有激于忠憤不容不言惟公天與諒直事君不以犯顔為難與同列不以忤意為憚劉徳秀為諫官以私意劾左史劉光祖公謂之曰人君寄心膂于宰相寄耳目于臺諫皆當以天之心為心倘任私以害忠良如彼蒼何願自此三思而後行其盡言類此居之不疑惟義所在嗚呼斯人而在諫爭論思之列可謂天下選時非不遇位非不至而道卒不行任以史事尤為當才相與論修史之規模甚備汗青無日而身去矣嗚呼殄瘁之悲識者所同孰知余心之悲有在于此乎銘曰帝王之興四門以闢無人不言猶恐不力官以諫名惟言是職視古已狹言又不得憂世之士所共太息孰為敢言為糾邪慝矯矯孫公古之遺直學為有用博聞多識其處友朋直諒三益幕中之辯不為婉畫一登諫垣身任言責有犯無隠攖鱗之逆天姿則然不動聲色鯁論日聞不容煖席召還蓬山上方御極首擢從班寵光赫奕經帷史館人望丞弼遑遑靡寧期補君徳飛語中人又成去國命非不通而道之塞不容何病為天下惜銘以昭之後人斯式攻媿集卷九十六欽定四庫全書攻媿集卷九十七宋樓鑰撰神道碑資政殿大學士致仕贈特進婁公神道碑國家中興八十餘年四朝以聖繼聖相守一道夫豈不欲復大讎歸侵疆而申締鄰好遵養時晦以俟天命葢其廟謨深矣比嵗權臣竊弄威柄富貴已極猶以為未足假恢復之名以逭危溢之禍其黨又相與嗾之平章軍國益無忌憚一旦妄發以債帥為方召以驕兵當犬羊人人知其必危競進者方縱臾以苟爵位不在其位者固不容强聒仕于朝者雖面從而腹非無敢有誦言爭之者時惟婁公機以直諒之資抗議無所囘撓一為御史即上疏明辯之是時權臣雖倡此議猶未敢自任鄧友龍初不知兵將漕淮右騰書投合妄薦大將既叨召還専主此議為侍御史為給事中公皆與為寮每語及此未始不奮然力詆以為必敗國事友龍至不能堪曰不逐此人則異議者不已公亦自以不合丐歸除職與郡竟求奉祠㑹泗州獲㨗友龍上表稱賀自以為勢當如破竹羣讙競和諫大夫遂以詆公褫職罷祠此開禧二年之五月也已而延敵致寇塗炭數郡姦黨失措始媿公之言八月再畀祠禄明年二月復職十一月元惡既誅大明黜陟天子思公之忠十二月除吏部侍郎兼太子左庶子嘉定改元正月到闕兼太子詹事五月除給事中兼權工部尚書七月除禮部尚書兼給事中八月擢同知樞宻院事兼太子賓客十月參知政事葢公天資忠鯁不畏强禦逆折兵鋒言雖不用而後日皆驗先見敢言人所畏服既坐廟堂不以詞色假人相與維持和議密贊更化惜乎年高疾侵奉身而退居無何考終于家經濟未究孰不興殄瘁之悲諸孤以鑰同宗同朝交情之厚既葬而求銘義不得以老退為解先書立朝之大節系以言行履厯之詳而銘之惟樓氏自武王封夏禹之後東樓公于杞而始得姓後有食采于婁者别為婁氏其實則一宗也建信侯在漢為劉蟬聨數十世至䢿事呉越避武肅王嫌名始復為婁仕左千牛衞上將軍占數嘉興五傳而至公之曾祖諱億億生乾曜俱為將仕郎父壽朝奉郎以公貴三世累贈少保少傅少師曾祖妣杜氏祖妣鄧氏顧氏妣郭氏為譙國崇國榮國成國夫人少師荘重有家法教子甚嚴公其第三子也字彦發幼而頴悟日誦數百言能自刻苦長益奮勵該貫經史百家之書作文直欲以左氏班馬韓柳為標的或謂其持論太高公曰他日以此致君澤民要當自立詎可苟徇時好葢其立志已不凡矣兩上鄉書乾道二年賜進士出身授左迪功郎臨安府鹽官縣尉丁成國憂服除主和之含山簿銅城有八十四圩遭夏潦大壞僅存其一郡以委公役工三千有竒設廬以處之優給庸直時犒酒炙器用材植一出于官民樂勸趨兩旬告畢邑人歡服礱石以記七攝淮邑率以治辦聞薦章交上尋丞於潛漕使檄公攝宰之闕潛川以蠶桑為命織紡貿易至于再税公首罷其一民甚徳之酒坊縣計所仰久廢弗葺公大修酒政嵗羡息錢近二十萬日以寛裕先代輸貧民之竒税寖以及四等户所被廣矣版籍既亡有産去税存之害公一新之獄訟幾絶庭空圄虛治行稱最邑素無學大比無應選之士公首建夫子廟啓庠序擇師儒士有以養李廷光首預賓送擢賢科親書桂枝坊以表其廬士益知勸政聲上聞有旨都堂審察以少師得疾而歸既遭外艱士民莫不借留匍匐奔慰縞素盈門公性至孝居喪盡禮手書華嚴法華等經以伸冥報免喪為江東提舉司幹辦公事嘗易淮東已而復舊淳熙十二年以舉主改宣教郎知衢州西安縣十六年光宗覃恩賜銀緋縣當舟車之衝號難治公以學道愛人自任不可干以私有騰謗者不為動巨室買地為塋域發地遇石復索元價公曰設得金將誰歸守督賦峻厲公不忍施一箠課亦不乏親閲案籍豫定役次民服其公紹興二年通判饒州五年皇上踐阼轉朝請郎慶元二年到官事多闕決而無侵官之嫌滯訟隨以清省一重囚獄具欲上察其誣白郡覆鞫之得不冤死又二人已經詳覆以其可疑者同太守以聞俱得減等參政袁公説友帥蜀辟議幕不就攝州及南康諸臺益稱其能相率列薦内相洪公邁稱道尤不容口謂公學有源委工詞章身端行治既以敘公所輯漢隸字源又以監司科薦之丞相京公一見即除幹辦諸軍審計司五年之七月也輪對奏祖宗盛時吏禄兵廩嵗不過緡錢十數萬熙寧月支四萬南渡無嵗不用兵月猶不及百萬乾道已支百六十萬欲請裁損經費又論刑名疑慮之弊六年十一月遷宗正寺主簿嘉泰元年為太常博士秘書郎請續編中興館閣書目又請寛䘏淮浙被旱州縣時皇太子以恵國公始就外傅遴選學官以公兼資善堂小學教授國公鋭情學問公日陳正言正道又以累朝事親修身治國愛民四事手書以獻寘之坐右朝夕觀省嘗謂公曰今日甚熱禁廷深邃尚爾閭閻細民豈能堪之公以奏之上問昨日與先生説何事國公具言之上喜曰唐文宗但云人皆苦炎熱我愛夏日長更無一句及百姓此意過之遠矣又嘗語孝宗戒食蛤蜊事國公曰此無他只是廣好生之意公隨事開明多所禆益三年除太常丞仍兼資善旋兼右漕郎官五月為秘書省著作郎尋以民曹事煩改兼駕部以専訓導都城大火命百官條具闕政公力言三弊謂朝臣務為奉承不能出已見以禆國論外臣不稱其職至苛刻以困民財將帥偏禆務為交結而不知訓閲以强軍律時公年七十丐閒上以資善倚重不允周旋四載不懈益䖍同寮予告公每當之首尾如一日國公睠顧最親字畫少差必求是正公深于小學辨析如響又著廣干禄字一編國公得之尤喜命講官戴公溪為之跋四年六月擢監察御史講未退而除命已頒國公戀戀幾不忍捨公亦為之感涕入臺省論近時士風薄惡聞者聳然又論京官必兩任有舉主年三十以上方許作縣又論郡守輕濫太甚貽害千里時小史蘇師旦怙勢妄作蒙蔽自肆語及者必罪去而獨憚公嘗與閤門納謁公于寒暄外他無所及師旦俛首不敢吐一詞而去兵端方開惟公極口沮之謂恢復之名非不美亦孰不願今士卒驕逸遽驅于鋒鏑之下人才難得財力未裕萬一兵連禍結久而不解奈何權臣聞之不悦所議愈宻外廷罔測公又上疏極論雖宻謀人莫得知而羽書一馳中外惶惑友龍方為臺端主議甚力公日以苦語勸之且曰今日大將為誰計臣孰任正使以殿巖當之能保其可用乎開禧改元六月除右正言兼侍講首論廣蓄人才乞詔侍從臺諫學士待制三衙管軍各舉將帥邊郡一二人召問甄抜優養以備緩急八月除太常少卿兼權中書舎人閏月真除今丞相史公樞宻宇文公同省毎㑹坐親見公力詆友龍用兵之説㑹有㫖令宰執侍從臺諫集議公義形于色略不少變聞欲以公宣諭荆襄公昌言曰使往慰安人情則可必欲開邊啓釁有死而已不能從也春初卒以此去四月聞諸道進兵謂吾老矣無所施力惟晨香致禱願天佑國家以安邊境及聞泗㨗愈増憂危且曰若自此成功以攄高文之宿憤老臣雖死亦幸謫官尚何言但恐進鋭退速禍愈深耳未幾還朝徳望益隆鸞鶴精神照映朝列人莫不想聞風采見上首論三事謂至公始可以服天下權臣以私意横生敗國殄民今惟當行以至公若曰私恩未報首為汲引私讎未復且為沮抑一涉于私人心將無所觀感矣次論兩淮招集敢勇不難于招而難于處若非繩以紀律課其勤惰必為後害仍請檢柅權臣内侍等所籍家貲専為養兵之助天顔悦穆玉音嘉奬曰太子尚小煩卿教導待卿久矣公謝以衰暮耄昏恐無以補儲徳上曰昨已除詹事猶未知耶皇太子念公最篤嘗親書問安否以多事未果發聞公來歸問信絡繹仍致前書以示不忘之眷自是簡注尤深而東宫愈加愛重矣公在選部守法革弊吏銓為清有里人故任天官喪未舉而子赴調公謂彼既冒法禁而部胥不之問即撻數吏使之治葬而後來聞者韙之上望治甚切公奏古人為國之心頃刻不忘而望治之誠未嘗以日月冀夫子無欲速之戒誠以維持成就非可亟圖而驟致也又言貢舉貴公乞下禮部具朝官親族有赴廷對者並與免差御試諸位官以絶異議嘗繳奏海巡八廂親從都軍頭指揮使年勞轉資恩㫖太濫乞收寝未應年格之人年已及者予之上顧宰臣曰所繳極當庶不為小人欺隠又稱至再三上以皇太子春秋鼎盛欲使預聞廟論諳知民瘼命日侍昕朝宰執並兼宫官仍時赴宫㑹議公為宫端益思所以禆助遂取舊所著厯代帝王總要一書加以潤色上下三千年間君道之汙隆治效之優劣綱舉領挈燦然畢陳俾鑰為之序以備參決之餘可用攷訂儲扄尤以為要覽時以飛蝗求言公奏和議甫成先務安静葺罅漏以成紀綱節財用以固邦本練士卒以壮國威又謂臺諌論奏以為月課若政有闕失人有非賢或除授之不當患在不知知之則恐去之不亟當隨事輙言無嫌于數所論皆切于時既登兩地當干戈甫定信使往來之始瘡痍方深弊蠧紛然公彌縫協恭禆贊為多重惜名器持循法度進退人物直言可否不市私恩不避嫌怨有舉員及格當改秩作邑而必欲内除公曰如此則有勞者何以勸孤寒者何以伸若至上前自應執奏堂吏寄資未仕而例以陞朝官賞陳乞封贈公曰士夫辛勤一第非通籍不能及親汝輩乃以白身得之㫁不可行嘉定二年八月臨軒行皇太子冊命公攝中書令讀冊于廷百辟傾聴九月明堂為禮儀使前導趨拜如少壯然儲君與公俱生于癸丑雖相去一甲子而生日同在仲秋先後纔五日賜生餼詔曰九秋風露之清裒時英氣三呉山水之秀生我耆儒固已寵甚是年七十有七盛典縟儀適聚旬浹間都省後堂久不講祝頌之禮公首當之貢闈方按鼓吹嚴更警塲五使同坐堂上正用公之生朝鑰退而慶以詩公與諸公皆屬和尤為晚景一段美談冬再納禄不允三年五月以禱雨感疾復四上告老之章詔曰太公既老猶起海濱留侯雖病强輔太子公弗敢復言孟冬分詣原廟疾又大作求歸尤切上猶未許方形詔旨云年雖耄矣初未聞知慮之昏志方浩然亦未見精神之憊公復叙四説以進懇請不已皇太子又遣宫寮勉留而去意堅決除資政殿學士知福州力辭提舉臨安府洞霄宫以歸延見親故上冢燔黄寖復康强尋上休致之請忽感微疾猶取表奏展閲檢視命筆書偈顧諸子曰大期迫矣勿以藥來是夕遂薨實四年十一月辛酉也享年七十有九累官正議大夫除資政殿大學士致仕爵至嘉興郡開國公食邑二千六百户食實封六百户國史實録敕令㑹要皆嘗提舉纂修遺奏聞上為之震悼輟視朝贈金紫光禄大夫旋以東宫徹章加贈特進賞延䘏典如制皇太子賻奠加厚可謂哀榮矣娶徐氏大晟府典樂申之曾孫封呉郡夫人先公四年卒子三人紹曾迪功郎紹彭從事郎紹耼承務郎以公參預俱監西京中嶽廟女一人適故朝請大夫直煥章閣知慶元府程準孫二人續祖承務郎知於潛縣丞同祖尚幼女三人長適進士史沾次適承務郎監兩浙轉運司慶元府造船塲程端節次適進士魯之績曾孫一楚孫女一五年三月甲寅葬公于嘉興縣履仁鄉東州之原公天分素高加以篤學而家訓尤嚴親聞公言初第拜親少師戒之曰得官誠為可喜然為官正自未易爾其謹之義方類如此又禾興輔郡紹興間寓公寄客多時英賢朱少卿自號巖壑最為名勝次如董公彌大將方公景南雲翼祝舜俞師龍鮑任道仔聞人務徳滋皆源流前輩詞章政事學問論議各有所長公從之遊聞見益廣所著諸書悉有功于後學既以此發身又自初筮厯官所至可紀逢辰雖晚譽望已高擢用甚峻而士論遲之主眷日隆注意大用皇太子垂情宫寮雖在遠外念之不忘惟公侍資善最久輔導最勤顧遇尤渥然方居急流而抗議以沮權姦翩然求閒不復顧忌一歸若將終身焉憂國一心耿耿不少變再為聖主一出干霄直上建立愈偉老而益壮然用之太晚耄未及而疾困之性篤孝友少師囑公以二弟模年貌相若愛之固深棟未冠而孤撫育訓飭卒為善士近嵗先卒貤恩贈官詔特從之嘗命諸子以遺澤任二弟之子居鄉以誠接物不事縁飾是非枉直判于語下不為後言人雖憚而服之周貧濟急尤篤姻黨生理素薄輸送自同編民門無雜賓亦無敢干以私者故廬僅庇風雨既歸闢丈室于左以東宫所書一軒榜以銀題朝夕游處庭前殆不容旋馬清裁若不可犯而樂善好賢稱奨人才不遺寸長又訪問賢能疏列姓名及其可用之實以備采取其所薦進亦不欲人之知也近時小學日微公素耽嗜字源干禄用意最深好之者始知其為工作字遒美行草俱勝隸古小篆動皆有法尺牘人多藏弆扁榜亦所在寶之鑰初未識公而同年李吏部聖俞嘉言同在宗寺出班馬字類致公之意俾為序引則知公之相與有年矣既老復來公亦賜環而歸㑹當集議傾葢于政事堂一見如平生歡同入兩地協心無間議政餘閒啇㩁古今論文説詩亦時出法書名畫清談從容温然如春事有不可剛毅不囘久而益敬真畏友也執别而歸書問時徃來墨猶未乾而訃聞云亡之痛固非稠人比既受銘文之託偶以多病心志凋耗筆硯盡廢日過故府惕然于中乞身欲歸僅能屬稿既不能發明潛徳終有媿于公云銘曰婁之得姓實本東樓在漢為劉自建信侯後復厥初乃因避鏐累葉嘉禾義豐徳修惟公國器河圖天球文以發身仕學俱優立朝正色告后嘉猷寖登要津貴名日休權姦専國欲挑氈裘債帥總師妄人運籌衆莫敢言徒懐私憂公獨抗論力遏狂謀六月出師石爍金流人厭綌絺士困櫜兜僅取邊壘㨗書置郵自謂破竹期功于秋老師致寇氣索語偷幾如鄧騭欲棄涼州謂公立異屏居林丘一偓不容衆楚競咻初謂沮軍末乃思婁元惡既誅舊徳是求四皓來漢二老歸周間于兩社克壮其猶同寅協恭厚徳鎮浮饑饉寇攘瘡痍未瘳彌縫調燮相與咨諏勢方向平公去不留哀榮雖備急景已遒典刑已矣後孰與儔殄瘁悲深為銘諸幽尚爾後人先烈是侔集英殿修撰致仕贈光禄大夫曾公神道碑宋興崇尚儒術振起一代之治直史館贈太師密國公南豐曾公致堯以文鳴當世直道正言事太宗真宗為名臣是生博士贈太師魯國公易占有文章政事材而仕不合為文十餘萬言又著時議十卷荆國王文公志其墓葢首稱之六子皆登進士第達者三人曰鞏為中書舎人以道徳文章名世學者宗之號南豐先生曰布位宰相諡文肅曰肇終翰林學士諡文昭當元祐盛際徽皇初政再為詞臣氣節論議尤挺特卓偉名儒如上蔡龜山俱謂端嚴有大臣之風其後亦最盛後六十餘年曾孫刑部侍郎炎與從弟吏部尚書㬇相繼取世科同為天子從臣故家文獻表表一時而南豐之曾益重于天下矣侍郎字南仲祖纁明春秋擢第奉使數道厯知高郵軍舒州甫强仕終承議郎贈左中奉大夫父協年十九以詞賦魁胄監一上不第則攷古著書有雲莊集行于世終朝奉大夫知永州贈正奉大夫自文昭三世皆娶强氏文憲公家永州始居湖之徳清公幼警悟能言即知讀書正奉語公曰吾家由密魯二公至而祖雖皆取科第然師友淵源非止利禄而已汝當志其遠且大者因銘其書室曰求已以勉之公服膺義方益自刻勵從名儒授毛鄭詩紹興三十年入太學端明汪公應辰為司業深器之隆興元年賜進士出身授左迪功郎㤗州海陵縣尉兼主簿時敵騎驚擾所在寇攘官吏多解散公曰巡徼職也吾其可去乎乃廣為榜諭以安集之親捕劇盜數十輩不以賞格介意而言于理官兵燬之後宜從矜貸類得末減臺郡爭論薦將羅致幕下竟守職不就秩滿以闗陞及酬奬循左儒林郎調徽州教授篤意教養更新學宫課試精審有自旁郡執經席下者奉二親就養與其季燮俱公立三樂齋以見志丞相周文忠公必大參政李忠文公彦穎繼為禮部侍郎與當路交上京削垂滿丁正奉憂服除再為温州教授如所以治徽學者凡經指授皆為時名人淳熙八年改通直郎知建康府江寧縣事轉奉議承議郎江寧軍民雜處治訟多牽制公不以利害囘撓一意字民獄犴屢空催科無擾民感其恵皆先期樂輸推排陞降悉得其實至役有不俟差而願充者公先于暇時摭前輩賢令嘉言善行與法令之所當守者為邑政總類一書講畫既詳故施于臨民迎刃而解父老詣臺府借留參政錢文恵公良臣帥江東偕監司上治最吏部侍郎沈公揆繼將漕又請亟加奬拔以為天下治邑者勸任滿命赴都堂審察十五年以明堂恩賜緋衣銀魚十一月幹辦行在諸司糧料院光宗覃恩暨年勞轉朝奉朝散郎紹熙元年八月遷大理寺主簿以新制兼左評事究心詳讞稱為平允輪對請選劇縣嵗命近臣舉厯任二人以授之無拘資格隨事旌賞治有殊績則待以不次又請申飭𣙜酤征税之禁利害詳明時論韙之二年八月除司農寺丞被㫖和糴米石五十萬選屬吏之才者授以成算戒以苛取不趣而辦三年轉朝請郎九月丁母碩人憂五年十二月擢知温州慶元元年三月陛辭復申劇邑薦舉為令之議又請稽版籍聯保伍汰巡尉之罷輭者永嘉號多士素服公化故教令所下不誡用勸闢良田以贍學養濟院以醫廪其廢疾無告者民産子棄而弗字月以公錢給乳哺者費全活甚衆二年秋未穫颶風淫雨海溢為菑樂清尤酷具舟筏畚梮以濟捍之極意賑䘏奏蠲丁錢數千緡水退修築瑞安石岡及平陽三斗門為東塘以殺其衝皆使可久至今人賴其利公正身帥下細大畢舉戢吏拊民以循良稱里社生為立祠且碑以紀其徳丞相葛文定公邲鎮越及諸使者皆以最列二年轉朝奉大夫三年召赴行在所四月入對勸上垂意經術恪守祖訓嘉納忠諫斥遠私昵杜絶用例之弊申嚴贓墨之科遴選邊將久任帥守停印造以重楮劵禁銷泄以羡銅錢廣和糴以厚邦儲蠲逋負以寛民力皆當世急務除尚書户部郎中治左曹事躬理文案滯訟頓清九月充金國正旦國信使將行值憲聖慈烈之喪既越境諭使去樂接伴納哈塔厚之以他辭解抵故京地前導奏胡伎公叱止之比押宴者至猶然公避席不拜引義詰責往復論難竟去口宣賜樂等語始就位授館燕山凡命宴皆請去樂及罷燕射悉勉從使還未嘗道其事惟以講求内治諄諄為上言之始文昭嘗使朔方増重國體及是有問公家世以南豐對稱歎名家者再知典刑之所存也四年以竣事轉朝散大夫六月復除户部郎中總領淮西江東軍馬錢糧諸郡賦不時入侵期移用其目實繁綱運弊蠧特甚緡錢失期者三百萬餘他物稱是師不宿飽公奏請下諸路期以兩月起發且議賞罰上可之公復手疏屬部約以不多為文書不遣吏卒要束既定輸送以時凡部運當進秩者面以奏剡授之競知趨勸軍給以饒五年轉朝請大夫七月除直敷文閣福建路計度轉運副使首亷所部疾苦民有被訟久繫而訟者反匿不出乃戒郡縣必兩造俱集始得予決自是良愿無擾姦無容欺奉詔上便民事公奏請委部使者以翻訴之多寡當否為縣令殿最詳列賦税于契劵之首以革産去税存之患二税不許高價折估獄案以時奏報定物力選獄官多見施行又奏倚閣上四州積負鹽本併免州縣所負正税及虧收錢合十有六萬緡累嵗困于郡邑囚繫者呼舞散去而漕計視始至増鏹百萬悉付來者以寛氓征嘉泰元年三月詔入奏計因論屬縣掊克之弊謂縣有内外内縣于州取給故苗税征商悉歸于州若外縣則俸給衣糧與凡支費不一而足今為郡者苗税或概輸于州倉征商或使他官吏侵擾為縣者反藉以旁征巧取肆行無忌小民赴訴郡不敢詰宜戒其交相規奪上嘉納之除樞密院檢詳諸房文字厯右司左司郎中兼刪修勑令官二年三月遷中書門下省檢正諸房公事嵗中徧居宰掾禆贊為多四月除起居舎人因直前奏事請捜舉遺逸長吏禮遣詣闕以備咨訪九月敕令所修進慶元條法事類轉朝議大夫十一月除起居郎兼權刑部侍郎同詳定敕令十二月轉中奉大夫尋改兼國史院編修官實録院檢討官三年四月除權侍郎賜服金紫經筵讀兩朝寶訓終篇轉中大夫公持心忠恕臨事明審每謂刑獄為生民之命必使姦豪畏法吏不舞文乃可言政廣右鉅商虐死其弟流竄逃歸輙從外臺改正復有訴者下棘寺閲實權門諸用事者表裏寺吏曲為道地綴補文書肆為誕嫚公察其姦執付京兆獄吏求解萬端公持不少貸且併劾商人罪卒以是去六月提舉江州太平興國宫史院進孝宗光宗實録轉大中大夫郊祀恩封曲阜縣開國男食邑三百户開禧三年轉通議大夫嘉定改元皇上更化盡起故老二月公被命守婺未幾改姑孰暑行抵郡適師旅饑饉之後勞來流徙寛逋節費政聲徹聞至秋感暈眩疾㑹合肥擇帥詔以集英殿修撰移鎮公曰臣子事君東西惟命今既屬疾焉可冒為丐免之章數上有旨輟行治姑孰如故雖整軍息民為國遠慮而疾日以侵求去益堅二年二月竟遂祠請復提舉隆興府玉隆萬壽宫宗祀禮成進封開國子加食邑二百户四年自為奏述出處大槩乞骸骨詔以通奉大夫仍本職致仕越數日薨矣實正月二十日甲辰也享年七十有一遺奏聞以光禄大夫告第官其後如格八月丙午葬于臨安府錢塘縣欽賢鄉西谿山先塋之次從所自卜也娶九江王氏封碩人克有令徳善相夫子先十年卒子掄承務郎前監嘉興府都税務女適承事郎新知婺州東陽縣陳貴誠孫仲良登仕郎公資稟純明器識凝遠事親盡禮謹守家法妙年決科安于平進自海陵赴調有同姓為聘使者金人問其氏族自言蜀人又問南豐後孰在班列既歸以告于是朝廷始加搜訪時相意屬公而公方欲從校官卒故業遂為新安之行不復以姓名通未受代三十六日遭外艱既免喪或以銓制方嚴欲為圖賞典以補餘日公亦不顧竟遲次六年而前舉者皆無恙恬于勢利乃如是先世資産推與其季又以正奉遺澤及公郊恩任二從子内外族姻以至鄉黨鄰里婚葬急難必賑而助焉待人接物謙抑有加而律己持正不可迴奪敭厯中外徊翔久之始登禁從既不得其職而去杜門卻埽谿園數畆杖屨徜徉自號覺翁因以名菴晚年意象簡黙所造益深由少至老好學不倦六經子史手自校定且以諸史傳記攷釋資治通鑑續于攷異後短章大篇凡所述作率皆温潤典雅而楷法行草見謂精詣尺牘書判好事者藏弆為榮有覺菴集與邑政總類藏于家公既葬掄以校書郎陳君貴謙之状來曰先君子于法當得謚將有請矣願先為銘詩表于隧道慨念在昔先太師岐公初掌奏邸正奉接武周行一時列院有子若弟多為新進士鑰于公事契既深襟期莫逆攝事西垣公丞大農俱奉親輿升堂展敬兩仕永嘉載筆左螭皆有在前之媿及鑰起于挂冠公方奏最藩部同年生落落如晨星日徯公歸以慰遲暮而公薨矣鑰長于公四嵗亦豈久于世者死生契闊撫事興悲衰顇何足言文惟公不負文獻之傳故立本朝使鄰壤挺挺有祖風烈詩云惟其有之是以似之非公之謂歟銘其可辭銘曰惟曾受氏曲列始封舞雩之傳望于南豐有户部郎事我二宗博士繼之顯不在躬六子聯芳弟上攷功徳望彰徹曰文昭公本厚源深實生覺翁學以求己中積外充早挹世科奏最一同翺翔周行敭厯西東仗節殊鄰氣讋夷戎外庸既訖從上法宫進難退易先哲之風聖化更新起于閒中由畀鉅藩疾已内攻施弗盡才奄其令終西谿之原父祖是從後來方興銘詔無窮攻媿集卷九十七欽定四庫全書攻媿集卷九十八宋樓鑰撰神道碑簽書樞密院事致仕贈資政殿學士正恵林公神道碑開禧三年十有一月四日有旨樓鑰林大中召赴行在先是平章軍國事韓侂胄専國弄權妄啓兵端禍及南北生靈國勢幾殆主上赫然震怒俾誅殛之更化善治之始才一日而有此命公足以當此矣鑰何以堪之公字和叔婺之永康人曾祖禄太子少保妣陳氏延寧郡夫人祖邦太子少傅妣姚氏高平郡夫人考茂臣太子少師妣李氏信安郡夫人皆以公貴追贈初少傅隨母嫁盧氏再世承其姓公始復為林公少篤志問學文章自出機杼紹興二十七年入太學文行俱高士論歸重三十年登進士科調左迪功郎湖州烏程縣主簿貧甚俸薄郡欲月有增餽卒謝之所立已如此乾道六年丞貴池用薦者改左宣教郎淳熙三年知撫州金谿縣郡督財計太急公堅請寛以數月不敢有負又貽書至四三不聴公取告敕納之州求劾而去守媿謝許之邑民感公之深恐其受責競輸于郡已而視嵗額反加焉差役盡公多端寛䘏受役者無異詞有先一年而豫定者丁少師憂役人泣曰反誤我矣七年知湖州長興縣在浙右號難治公益究心官事民情孚洽若有相之者縣境高于太湖嵗旱河涸米價翔貴已有攘奪之患民寡葢藏官無贏蓄公方憂慮而無䇿夜半涌水自荻浦灌河聲震數里米舟輻湊闔境以為神和買比經界前增四之三公必欲寛之推見衆弊獲免者五千餘戸増輸以實者帖然訟牒必竟曲直不許私和或謂恐益多事公曰此乃省事之法也以是缿訟曰稀期限寛而信可展而不可違去如始至所下文移無一紙遺于民間二邑遺愛迨今未泯也詹侍郎儀之力薦于朝十年幹辦行在諸司糧料院十二年冬求補外同擬者四人孝宗皇帝指公與計衡姓名曰此二人佳可除職事官遂除太常寺主簿十四年遭内艱十六年夏除諸王宫大小學教授時光宗皇帝初即位詔侍從舉察官户部葉尚書翥等四人俱以公薦擢監察御史論事無所回挺紹熙改元三月御批賜公等曰臺綱正則朝廷理委寄匪輕言事覺察各有舊制兹示朕意宜務遵承公謂臺官不當踰越分守誠如聖訓然居此當以抗直敢言為稱職遂與同列答奏又曰職有常守期各務于遵承言所當言庶不孤于委寄自是風采益振五月遷殿中侍御史二年八月除侍御史三年三月兼侍講公之論事根于忠實上不求合于人主下亦不避嫌怨而愛君憂國務存大體毁譽皆有所試抨彈無不聳服在臺首尾四年最為稱職知靜江府陳賈將奏事之任知潭州趙善俊得㫖奏事皆極論而寢其命其論善俊也謂若欲收用宗室以强本朝當擇其賢者善俊何人而可當特召上問孰賢公以知福州汝愚對退又申其説御批善俊與郡又兩日遂召汝愚此諌行言聴之始也鄧司諫馹以忤㫖移將作監公請曲加優容俾復舊職丞相留公正丐去公率同寮奏乞宣諭使安相位遂不果去身居言路而伸諫省之氣誦宰相之賢他人不敢為也有薦公入臺而論其多可而無特操不可為執政與公舊故而論其囘邪不靖不可典刑獄户簉督迫州郡太甚公上彈章上曰别易一部何如對曰昨為刑郡専為深刻易别部亦不可章至三上宣諭宰臣遣都司道上意公曰言事不行只有一去更無可商㩁者此語既聞竟與郡而去監文思院常良孫以賄遭重劾公奏此人死有餘責然其曾祖安民為元祐名臣高宗念其以忠直斥死擢其子同為中司願特免其真決寧加遠竄公勇于逐方用之從臣而拳拳于一纍囚如此排擊固多此皆其著者至其論議尤為切直而當理首論君子小人大槩曰趨向果正雖小節可議不害為君子趨向不正雖小有可喜不失為小人正者當益厚其養無責其一節之過差以消沮其直大之氣不正者深絶其漸無以一節之可喜而長其姦偽之萌則君子得以全其美而小人無所容其姦又論今日之事莫大于讎恥之未復此事未就則此念不可忘然事變不常我有備而後可為彼有釁而後可乗恢復固未容輕議惟此念存于心則陵寢如見于羮牆故都如見其禾黍于以來天下之才作天下之氣倡天下之義根本既立綱紀日張而治功可得而成矣雷雪求言公以事多中出疏曰雷電之後大雪繼作則隂勝陽之明驗也當毋使小人得以間君子夷狄得以窺中國女謁得以行于外嘗論邊事謂今之言備邊者皆其細務當遴選行實才略之人付以江淮荆襄經理之任使文武合為一道慶厯中分河北陜西各為四路悉用文臣為大帥武臣副之平時使之通情而共事則緩急可以協濟而成功無事則同任撫養士卒之責有事則獨當號令行營之寄久其任重其權則邊防立而國勢張矣又奏律有别籍異財之禁祖父母父母令别籍者減一等而令異財者無罪淳熙敕令所看詳亦然今州縣不明法意父祖令異財者亦罪之知美風教之虚名而不知壊風教之實禍欲申嚴律文疏議及淳熙指揮若止令其異財初不析開户籍自不應坐父祖之罪其非理破蕩所異田宅者理為己分則不肖者不萌昏賴之心而其餘子孫皆可自安實美化移風之大要也詔頒行之至今為便江浙四路以和買折帛重困公奏有産則有税于税絹而折帛猶有説也和買其初先支錢而後輸絹中以錢與鹽分數均給後遂白納紬絹今又使納折帛反成倍輸全失立法之本意欲求對補之䇿以寛民力而固邦本于是減其輸者三嵗公初論版曹齟齬者幾月僅能去之繼論棘卿至四章不報遂明以姓名申尚書省而力求補外改除吏部侍郎丐外祠除直寶文閣與棘卿俱與郡後省同奏留公且言當與被論者有别公尋知寧國府改贛州而卿以祠去何正言異因對上謂曰林某好人朕甚念之已為易章貢見次矣贛為劇郡公一以平心處之文移期㑹動有成規裁斷曲直不可動摇聴訟初有數百後惟十餘紙猾胥豪民為之束手所奏便民五事一論州之宂官無職事而糜廪禄者可罷二請添置土軍弓兵三請以錢分給諸邑而禁科罰四乞禁廣東之民誘致盜掠郡人賣為奴婢五謂贛縣兩武尉乞差文臣一員皆郡之急務五年七月主上登極趣召公還贛石至險公欲行不雨而水高數尺怪石盡没俗謂之清漲殆出神助趙清獻公以後惟此時得之九月除中書舎人十二月遷給事中尋兼侍講公代言得制誥之體而繳詞批敕風裁如臺中時侂胄來見公接之無他語因使人通問願内交又笑卻之㑹彭侍郎龜年抗論侂胄甚切有㫖侂胄特轉一官依所乞除在京宫觀龜年除煥章閣待制與郡公尚在西掖鑰在鎖闥連名上疏謂次對不過在外之職序反下于貳卿亷車之升留務則寵之已至況一去一留恩意不侔去者不復得侍左右留者既曰内祠則召見無時終不能遠請留龜年于經筵不然則命侂胄以外祠奉御筆龜年除職與郡已為優異侂胄初無過尤罷職奉祠亦不為過可並書行又同繳奏龜年以真侍郎除職與郡若以為優異則侂胄之轉承宣使非優異乎若謂侂胄初無過尤則龜年論事乃出于愛陛下之誠心豈為過乎恐自此無敢為陛下出力論事者龜年既已決去侂胄難以獨留望予外任或予外祠以慰公議初趙丞相登政府汪義端為監察御史力攻之不得遂罷去至是侂胄引為右史公又駮之改除公吏部侍郎葢兩以言事得此官竟不拜除煥章閣待制知慶元府時慶元元年鑰素聞贛上之最慶元鄉郡也奉祠家居公之善政實親見之公清心寡欲無一物可以動其念日坐黄堂非二膳不入克勤小物如為長興宰時剖決民訟是非立辨人固不敢干以私亦無可干者始居郡齋有盜若鬼神之状人人皇惑公以為此黠賊也必欲捕治已而果然前政所失器物亦皆得之由是姦人屏息公亷明敏皆安而行之不可屢數精力有餘足以行其志城南有河而江浦抵隄下者數處河漲潮登幾混為一行者病之間遇潮退隄決河水盡傾鑰自幼即熟聞此害不知自舊幾年矣嚮之有才知者屢謀而未遂公聞之初不以語人在郡纔數月撙節浮費得贏貲二萬緡一日委官置局命富室才力兼備者七人分董其役悉以石為之吏不得預民不知擾指日而成砥平繩直自甬水橋以至北渡凡二十五里有欲記者公曰何用而利及永久民用歌之二年求祠至于再三始得請郡人曰守有三林後林尤冠謂侍郎栗郎中枅皆在前有聲也得守如此未聞有所襃進又不留以福吾州乃聴其求閒耶未行銀臺駮論鐫職罷祠而歸耋穉攀留嗟惋如出一口公怡然而行五年四月提舉武夷山沖佑觀六年引經有請復元職致仕未幾御史承風㫖論列摭四明異政一二為最謬再落職公道安在哉嘉泰三年十月再復職一閒一紀退然一布衣也去邑居三里所得龜潭之勝作莊園其上最得一縣勝處時挾書以徃客至則擷杞菊取谿魚以佐酒談笑自適亭榭隨意有獨樂之風或謂公不以書入脩門縱不求福亦欲免禍公則曰禍福皆天也豈智力所能移乎邊釁既啓朝夕憂之歎曰恢復之名則不可議權臣之心則不可知今欲宗社再安非息兵不可欲息兵非去權臣不可既有召命令州軍以禮津遣又促其行始到闕而吏部尚書之命已五日矣内引奏對玉音嘉奬公首論防微杜漸無求更化之名必務更化之實次厯陳朱熹彭龜年呂祖儉以論擊侂胄皆以貶死其他類此者量輕重旌表之以伸其冤且以為直言之勸末謂侂胄之竊權陳自强之貪沓官有定價乞嚴贜吏之罪是月除端明殿學士簽書樞密院事嘉定改元閏四月命宰執並兼東宫官公兼太子賓客公抱負所學中外俱有聲績及在西府當侂胄殘毒之餘未易經理事之當為推誠以佐其長但論事之是否不顧身之利害亦不暇顧忌而後發嘗在榻前議講解事上曰朕為生靈不憚屈已事定之後亦欲與卿等作家計侂胄十三年敝政豈可不革公與同列謝且賀曰陛下之言及此國之福也退為所親言年將八十豈堪勞勩獨念和議未成未能體承聖訓盡革敝倖為經久之計略遂此心則乞身以歸然和使未囘而公薨矣廬帥王柟初徃通好金人謂之曰近報韓侂胄已就戮矣又問公與鑰同日被召二人如何王以實對歸誦其語公以語鑰且益相勉不可忘也公孝于親友愛諸弟既終信安夫人之喪悉以先疇分與之又官其從子二人自奉甚薄清俸之餘以給宗黨莊敬好禮不惡而嚴一言之出終身可復讀書至老不倦郡齋公退躬督諸孫課程吏卒或聞洛誦聲而不識其面悼亡之後自言子雖蚤殁而三孫足以承家清修幾二十年尤人所難家居不以事干州縣守令能訪利病則極口告之接人深有恩意或浼以外事雖至親不答也所居殊陋既貴不改出以二僕肩輿僅免徒行而已素不求人知人自服其名節朱待制嘗貽書朝士有曰林和叔初不識之但聞其入臺無一事不中的去國一節風誼凜然當于古人中求之後同在從班相得愈深公文詞淳實如其為人未嘗無用而作有奏議十卷外制三卷文集二十卷藏于家冒暑得病猶自力以趨朝謁六月壬申薨于位上為之震悼徹視朝三日賜水銀龍腦及銀絹各五百東宫亦致賻焉享年七十有八積官至朝議大夫爵東陽郡侯食邑一千一百户食實封一百户贈資政殿學士正奉大夫有司將設軷祭力辭之以二年十一月已未塟公于縣之長安鄉南塘山之原有司定諡曰正恵特添差從子籥為婺之司户參軍䕶其塟朝旨轉運司應辦可謂終始哀榮矣娶趙氏先十八年卒贈永嘉郡夫人至是合祔焉子簡以公樞府恩例特贈登仕郎女七人長適從事郎新汀州州學教授陳黼次適進士胡一之王樾宣教郎新通判臨安軍府事應懋之國學生喬時敏里士趙遜孫栻孫三人楷樅竝迪功郎監西京中嶽廟棫迪功郎新湖州歸安縣主簿楷實承重觧官曾孫四人子熙子㸃並將仕郎餘未名女五人尚幼公標矩自髙望之儼然若不可以挹酌臭味苟同歡如平生始在宫庠鑰為攷功郎一見傾葢公久在御史府鑰入後省當紹熙間各欲維持公議徃徃不謀而同交情由是益厚已又同司論駮相隨出闗託芘桑梓别後俱墮百謫自謂此生不復再見矣赴闕之初握手笑且歎相語曰吾儕相逢此殆天也嘗為龜潭賦大篇公見而喜寄烏絲欄使書之鑰取友固多晚而出處略相似名位相上下未有如公者非所謂君子之交淡以成者耶天不憗遺喪此元老殄瘁之悲又非他人比楷等求銘義不容辭發揮幽光愧弗克稱詩曰我心匪石不可轉也我心匪席不可卷也范太史稱司馬溫公曰其清如水而澄之不已其直如矢而端之不止嗚呼林公其幾于是乎銘曰儒者制行或流于偏猗歟林公行幾于全喜怒未發公名斯得發而中節以表公徳學以致身政能及民秉心無競掇皮皆真具區灌河贛石清漲心與天通動有隂相謹終如始視險若夷非通非介不磷不緇遇事敢言獨立不懼兩貳天官不合則去號三不欺藹然吏師四明之政實親見之風生柏臺節著瑣闥百謫横加清聲四達歸老龜潭若將終身更化之初首圖舊人上喜見公俾貳宥府望尊朝廷名讋蕃部經綸未究胡不憗遺一鑑云亡殄瘁何悲子産遺愛叔向遺直孰其兼之視此銘刻中書舎人贈光禄大夫陳公神道碑公諱希㸃字子與處州青田人陳姓出于有媯其來遠矣九世祖名師訥呉越王時為銀青光禄大夫積勲上柱國曾祖圭贈宣奉大夫祖汝錫擢紹聖四年進士第仕至左朝請大夫秘閣修撰知紹興府兩浙東路安撫贈中奉大夫高宗駐蹕㑹稽朝廷草創賴彈壓辦䕶之力為多威名甚聳直道自將不能與時高下一斥不復士論惜之父棣篤學有賢行奉議郎通判潭州贈中大夫妣葉氏馮氏俱封孺人贈碩人公葉出碩人石林先生從兄之女也公承家訓少有塲屋聲入太學再預薦連丁内外艱淳熙八年以南省第六人登甲科授從事郎平江府觀察推官樞密丘公崈為守屢以職事爭辯丘公或憑怒折之公退立屏息俟其少霽執論如初至于再三竟不能奪自爾公所書擬望而許之樞密羅公㸃以浙西提舉兼府事舉兩司事無大小悉以屬公行荒政修水利決積訟皆公左右之除主管尚書吏部架閣文字再嵗遷國子正日進諸生問難經史而嚴私謁所拔多宿學有行誼之士時重華寢疾光宗亦不豫省覲闊疏或夙戒而中止物論紛然公謂上實被疾而間其心者得以肆其邪説因疑成畏遂至猜阻上疏備言之讀者以為辯而不激直而有禮深體父子之至情又嘗代從班兩疏反覆至數千言皆剴切出于衷誠言及則悲傷感泣不能自已愛君憂國其深切類此尋遷太學博士上即位之初輪對首陳三事曰畏天命曰法祖宗曰結人心敷敘詳明用故事不納副封時宰以公嘗出其門不以間見固己不樂至是以為輕我且曰是不尊廟堂也奏令赴吏部銓上獨喜公所奏遷大理寺主簿人為之憤公曰上知我矣欣然就職素不讀律而原情引經法家自以為不及丞將作監又幾年丞司農大農除江浙十一州運米外餘仰和糴中糴以助嵗計淳熙初州郡嵗額糴降本緡錢計一百六十八萬是時年豐楮重未至迫蹙後又議寛減加以虚額及收馬料等凡減去二十餘萬有竒中熟僅可支吾一或不登則廪廪有乏興之懼公與同列究弊源權輕重為之少裕時權倖方張公不少屈遲囘久之丐外知泰州陛辭陳農寺四弊三策且曰此其在有司者耳弊在朝家有大于此者乾道二年一嵗除馬軍一司二十二萬石之外實支一百三十八萬餘石馬司既已移屯而紹熙以來不下支一百六十萬此臣所未解也願究昔之所以省今之所以多力圖而痛革之然後採三策而去四弊庶幾國計稍可為官吏亦得以任責上從公言方議施行而不樂者益衆言者有未作縣不當守邊為辭公上祠請改知衢州州當舟車之衝訟繁事夥將迎無虚日公謂財裕則可以行志首閲嵗入之籍痛節浮費力裁厨傅用既不闕時有蠲減得以裕民寓公服其風裁軍士犒給無闕而憚其嚴愛民如子惜官錢不啻己私或用至數十緡拊心歎息曰此皆民之膏血箠楚所取安可輕用耶秩滿視帑藏元額餘十四萬緡吏請上聞公曰吾豈以羡餘取世資者止以少過舊數申發留其贏以寛征取召赴行在首奏農寺和糴嵗歉價増富商大賈反操其權以邀原利不若乗此粒米狼戾之時廣行收貯積及三百萬則可以備㓙年之急矣又言役法之弊欲以限田視品秩為等限以止法三品以上自依舊法四品至六品止于曾孫七品至正八品止于孫從八品止于子八品而未嘗厯任與九品止于本身一依宣和舊法子孫自致通顯者别計庶官户既有限節下户可以少寛詭寄之弊亦可漸革除户部右曹郎官嘉泰四年都市大火延燔省部家人進饌公輟七箸曰主上無失徳皆姦邪致此言畢流涕㑹求直言遂極論弊事大略謂西漢之末人主無甚過行徒以上下偷安風俗脂韋寖成衰弱併論贓吏債帥及士風日偷州郡數易皆闕政之大者又言晉之南渡未嘗主和故不弛備而戰亦不慴今上下恃和為安將驕卒怨敵勢雖衰未易乗也遷右司郎官時權臣専制政柄貪相濁亂朝綱公與今知樞密院雷公彌縫其間一裁以法雖盡所職而念去已深遷軍器監平章之初方觀衆情向背公一見首求外補旁觀者為公危之公曰去意已久非容心于矯也遂以直寳謨閣為福建路提㸃刑獄訟訴萃于憲司明恕而行處決不倦人以不冤時方用兵征求益繁建有飢民鈔略逮繫百數公謂皆迫于乏食不足深治取為首數人寘之輕典餘悉縱遣之召還論邊事皆深長之思切中時務復歸著著不數日元惡就誅遂除中書門下省檢正諸房公事未幾擢起居舎人兼太子侍講進兼侍讀兼左諭徳公講讀之際至人道大綱治亂大端祖宗立國之本意必反覆陳述太子為之起敬聴者聳然立螭之初首陳西蜀兵事謂重兵駐漢沔東南禁旅不能為之輕重成都者漢沔之根柢也今漢中三大軍無慮十萬而成都之兵不滿百何以制末大之患逆曦之變至無敢抗者謂宜如揚廬帥司增置親兵仍增募屬縣之卒庶足以鎮一方緩急可以倚仗策無便于此嘉定初元當兵荒之餘久旱飛蝗人情惶惑或謂成肅喪制未終主上不應親出禱雨公直前奏謂出而于逸于畋于觀則不可若循仁皇禱西太乙故事親屈萬乗為民一出則人人皆知陛下閔雨之切人心悦而天意解孚應必矣上為之感動越三日車駕禱于太乙宫甘雨隨車都人歡呼嵗亦中熟進起居郎未踰月兼權中書舎人尋為真公既代言詞尚體要隨職戒諭不為虚美遇有繳奏身任其責奏或未下不憚繼入事闗大體漸不可長者必痛抑一二以警其餘末節細故亦不屑屑也詔求時政闕失公言太上知天其次畏天其下慢天知天者興畏天者存慢天者亡請以周事明之文王知天故以之興成王宣王以畏天而存厲王幽王以慢天而亡累聖繼承祈天永命中更變亂而天命人心彌久彌固者在此也陛下即位十有六年恭儉之心敬畏之誠上通于天下信于民是陛下有其心矣夫有其心者必有其政有其政者必有其事苟徳意未宣政事多闕是殆未知推其所為而已公前後論奏于天命人心之際必反覆開説指切事情雖不盡見于施行而立論率可稱述公素多疾至是以久次方擬進擢而公之病病矣二年十二月壬午卒于位享年六十有六積階至通議大夫遺奏聞贈宣奉大夫以皇太子冊寶恩贈光禄大夫爵青田縣開國男食邑三百户先三日設榻正堂至是斂襟危坐而逝問以家事一無所答識與不識莫不傷正人之云亡上深惜之賻贈加禮贈官之制首引唐文皇之言曰收也若在當以中書令處之亦足以見眷遇之深矣皇太子尤為惻然三年二月諸孤奉公之柩以歸十二月甲申塟于鳴鶴鄉慈明之原公娶同邑朱氏封碩人子仲堪迪功郎福州羅源縣主簿仲埴承務郎仲垍國學生先公九年卒仲垓仲坊將以公致仕遺表恩補承務通仕郎女二人文林郎新汀州州學教授孔夢符迪功郎鎮江府延陵鎮税兼烟火公事盛立禮其壻也孫男女五人尚幼公性素剛交際簡淡其不為阿附人以為難公葢優為之慕王陵汲長孺為人少作見剛録以寓意其哭知樞宻院胡公晉臣文曰朝有正臣其國乃重漢曰汲蕭唐稱魏宋誼形于色賁育其勇或招麾之亢立不動其抱負如此三登朝著二十餘年終以落落不為當路所知自博士左遷遠迹清要更化以來始遂向用以世道為己任嘗曰世之不治非謂無法法亂之弊也救時之相固不易得苟得平心守法者其庶幾乎葢自許也孝友勤儉得于家傳碩人能承公意謹奉甘旨既畢塟送弟妹婚嫁謹奉先志事兄如事父春冬賜帛必先奉其兄而後入私室既又推所遺田宅悉以予兄弟自奉如未遇時所居纔蔽風雨作詩雖多録其得意者文尤簡古字畫端方如其為人公靜黙嚴重出于天資兒時已如成人及長左右規矩風標益峻起居飲食之處終始如一喜愠不見于辭色雖家人莫窺其際笑語有度使人意消讀書觀大略苟有㑹心處則涵泳充廣必使心通意解達于踐履執喪哀慕之餘一意探討免喪始登東萊吕太史之門一見契合相與質疑辨惑由是聞見益明而所守愈定矣有淡齋筆談淇渌遣興璧水雜著西掖類藁經筵講解及奏議各藏于家此皆右史王公介状公行之詞也仲堪等求銘于鑰自念及識潭州已服其賢厚與公同朝相好非一日掛冠復來恩及三世一嵗間封贈至三四訓詞皆出公手知鑰家世之詳敘述委折使自為之亦不過是也殄瘁之歎倍于他人故不敢以固陋辭銘曰誦詩讀書孰非儒雅悠悠千載未見剛者我重彼輕惡圓喜方禍福度外乃全吾剛惟公不羣尚友陵黯持志養氣明目張膽天分既高學力尤深閲世多變秉吾一心進退以義落落難合更化始用論恩獻納西掖代言訓詞温淳東宫横經輔道諄諄折而不撓人望公輔一疾困之遂隔千古鶴溪之原父祖相從孰有如公一節始終龍圖閣待制趙公神道碑孝宗皇帝在位之十三年吏部侍郎趙公粹中奏乞正太祖東嚮之位上攷三代六經之制旁引漢魏晉唐之規近取本朝馮公京司馬公光范公鎮孫公固中興以來董公弅王公普朱公震以下及公之叔父渙奏議參訂其説集而成編謂太祖當居太廟第一室永為不祧之祖太宗居第二室永為不祧之宗遇祫饗當奉太祖居中東嚮尊無與二昭穆旁列以侍所尊實允萬世公議久而未正願陛下一定廟制上當天心光昭祖烈上極向之㑹有沮其議者公又為闢異一書尤為著明人以比唐之陳京而攷論過之上既謙遜未遑公嘗撫其書而歎曰兹事未明吾死不瞑後之君子誰能信之至上遺表猶曰推藝祖肇造之功早正東嚮之位念中原沈淪之久無忘北伐之圖其志可哀也葢我宋之興與商周不同契稷為始封之祖其下皆親盡則毁漢魏祖廟凡曰太祖而上四親之廟亦親盡則毁禮之正也惟唐雖起于高祖而景皇帝始封唐公故以比契稷為唐太祖建隆初元立僖祖順祖翼祖宣祖四廟如漢魏之祀太祖造邦之主所以列于昭穆者以上有四廟也仁宗祔廟七世已備至英宗既祔祧僖祖于西夾室禮也神宗熙寧五年王安石異議請祔僖祖以為太廟始祖居第一室祫祭居東嚮之位故馮公司馬公等引經爭之安石强辯固執至欲以僖祖配天孫公欲救其已甚請以僖祖權居東嚮之位哲宗祔則宣祖當祧蔡京在徽宗朝又建九廟之議遂不祧宣祖而復奉翼祖于廟高宗中興公之叔父以將作監丞對首陳其説時方明宣仁之誣謗除元祐之黨籍皆足以快天人之憤故一聞此議慨然從之擢為御史俾廷臣共議議者十有七人皆合亦以横議而止光宗時太常少卿丘公崈有請盡用公之説得㫖集議又不果上嗣服將祔孝宗始議祧宣祖而少卿曾公三復又申此議吏部尚書鄭公僑以下集于御史臺無不以為當然而鮮有知其詳者鑰不肖素荷公之知嘗授以全書得以備究始末時待罪瑣闥羣公俾為之辭既又有㫖使定祧廟之制再議而益定自熙寧至是一百四年而藝祖始居第一室正東嚮之位實自公發之而公之亡已八年不及見矣又十年鑰方投閒四明公之子來請曰先公之亡既辱状其行而墓隧之碑未立且先公立朝建明之大者無如廟議又蒙力信其説卒正國家之大典先公死且不朽今之知此者幾人哉願有以詩之泣拜不已鑰亦為之流涕敢敬列斯事以冠碑首又序而銘之公字叔達密州諸城人家世多以文發身號東西趙西有丞相清憲公而公則東趙也曾祖伸不仕祖公綽累贈右正奉大夫父濬左朝散大夫累贈通奉大夫通奉因官東南久寓㑹稽卒葬明之鄞遂占名數明今為慶元府公天資絶人書一覽不忘厲志高邁自幼篤學不煩師傅下筆成章詞鋒鋭甚通奉文高一時父子間自為知己謂此兒必大吾門紹興二十四年與弟大猷同登進士科授左迪功郎南劍州順昌縣主簿乞免截鹽充失收經制錢州與邵武虚認明谿寨兵請給乞正支官錢以寛民力葢初筮己不苟于其職如此三十一年闗陞左從政郎監行在雜買務雜賣塲門雖在筦庫論當世事皆天下大計人已屬望以為國器矣乾道元年用薦者改左宣教郎調吉州永豐縣丞二年丁妣碩人高氏憂四年通奉公下世公抱負不凡聲望已聳七年甫免喪除太常寺主簿公世明禮學用贊其長輪對奏乞辨雪岳少保飛之􅬁録功定諡優䘏其家以激厲將士又乞募人耕江淮荆襄荒田不税不役家出一兵如四川義士進恢復機密十論俾邊帥招中原之人用竒以擣燕山又進制狄權鑑取書傳制狄之説參攷厯代事迹總歸條例為十六門四十卷又富强要䇿十卷専論屯田頻年雖嘗留意而未及前代者其説有三利害未盡爵賞未重委任未専三書既進送給舎看詳咸云學問淵源議論詳確八年冬遷太府寺丞再對極論文具之弊願詔大臣崇尚實用明年春除秘書郎翼日兼權起居舎人閏月暫權給事中自後凡三攝此職論事無所囘挺建康將佐以獲盜轉官承旨司主之公謂軍律不修部曲劫盜曾無責罰反以捕獲推賞何以示警權臣館客奪官已久直赴殿試除倅臨安公謂其無一日考第如此則其類進矣耶律科里乞其子閤職又二子為額外綂領乞寢罷使遠人知朝廷之尊不敢妄有僥覬劉光祖濫以邊功求厚賞條其不應格者五以駮之又論紹興府㑹稽和買太重欲除子户之弊莫若以田畝均科仍下兩省集議亦不拘臣之説上曰如此則利害詳盡又奏選將于行伍中有才武智略者許自相推擇更加考察上曰誠如卿言已試而顯者多輭熟不足用對曰彼惟保守富貴不思報國自下拔擢人始奮勵上以公誠實振職每加激奬不可屢書大將真俸從臣召命亦行繳奏上尤歎其正直且曰卿不沽激不求名封駮皆當正欲如此朕見卿有節概是以用卿公奏臣孤立惟陛下聖明是以容臣愚直後省維持紀綱封駮多則可見公朝臣屢攝瑣闈無非務發明公道陛下總攬于上宰執圖囘于中臣輩扶持于下如此一心皆能守法則僥倖路塞小人道消矣但以不避仇怨恐遭中傷上曰朕自照知無慮也五月遷起居郎冬兼太子左諭徳嘗奏講求渡江以來用度酌定定制以賦入之數七為經費儲其三以備水旱非常又命江東漕臣及此稔嵗糴米分貯諸郡郊祀先雪後霽願益加兢業以答上天之眷州郡或獻羨餘請更加覈實以代下户之輸除權吏部侍郎暫權刑部侍郎淳熙元年金遣泛使梁肅富察守中來按富察舊作蒲察今改二月借朝請大夫試工部尚書充接送伴使待之以誠折之以理因論和好公曰煬王敗盟送死為千古笑肅等唯唯且言其主遣使正欲再堅和好不肯舉兵先舉則曲有所歸公曰皇帝守天下以仁尤以南北生靈為念豈肯容易言兵彼此從順自然和好堅固肅等相顧云如此則濟矣以尚書開懐見待略無疑忌是以盡布腹心不敢有隠事訖備奏上大悦曰卿可謂専對之才矣二年九月除吏部侍郎公久貳天官盡公革弊不遺餘力乞將堂除架閣以下歸部以開公道以清中書右選必候呈試方許參選免試恩例並不許用曾經堂除人及舊許壓在部者請依次注擬以均寒素而待才能川廣福建到任賞格輕重不等宜加裁抑以革宂濫選人有力者初任或併取京状有妨平進公請次任方許薦舉改官條列銓試之禁甚密嘗奏自入銓曹不敢苟簡惟恐有負委任之意近懲數吏為之肅然上曰公生明卿既無私澄汰多矣公雖愛惜名器而持心近厚士夫受賜者衆有蜀士數人當改秩而吏以微文沮格累嵗公立為申改有恩科得官而復衰病來赴銓量公慰藉周至或問之公曰一官姑以慰其蹉跎待次尚數年何忍沮之聞者感歎此皆本職大概若論思之際知無不言嘗奏承平日久士風不振凡取人材當以氣節為先論軍政則乞遴選大將郡守申嚴藝祖階級之法使分守益明一日又論四事一博訪諳悉水利之人開震澤百瀆以除壅塞二歸正添差猥多難以贍養宜分給田廬以為兩淮殿最三文武官欲換授者並試文藝四罷大學混補令方州于解試内取貢敷奏詳蔚上曰似卿人材難得前後更無一人説卿嘗論王安石及雱父子姦邪當罷從祀畫像又乞崇奬直言謂人主能來天下之言則下情通下情通則君子有所恃小人有所畏近日襃贈魏掞之奬諭鄭鑑足以風動天下監司郡守治状顯著宜候任滿召還或令因任過失苟非已甚且令鐫降以責後效庶免數易之患宰執侍從嵗舉邊帥一人堂察奏聞且與邊方差遣以儲将帥之才又論唐取武士以八科不試孫呉之書欲倣其制止以步射步弩步槍步刀四事招兵號武士科中者與免丁役如齊之内政唐之府兵農隙教閲以次犒賞擇其出衆者為之長又請條具積欠錢物有名無實之數因行慶典咸賜蠲除尋遇高宗過南内宴賞坐出此奏兩宫歡甚就宴降旨施行公前後四求外補上眷曲留求之愈力三年始得請十二月御批久典銓曹勞績日著除敷文閣待制知池州時孝宗方以職名為重非有功不除公以簡眷之深首得之四年三月赴鎮臨政勤敏寛猛相濟布宣徳意詢訪利病以簡静不擾為本而賞罰必行吏畏民愛姦盜為之屏迹理財節用久而充溢既補積逋又代貧民之税決訟如流吏不得預秋税受輸多取于民公深疾之至是使輸者自槩事既徹聞有㫖行之諸路増葺學校親較諸生課程時加餽遺以勉之嘗謂𣙜禁太嚴愚民抵冒者衆嘗獲私茶其數甚多但籍其物而薄其罪官醖價亷味醇私酤不禁而自戢有邑令侵漁官帑止令備償其人慙甚引去公曰錮人聖世不忍為也大軍分屯下車大閲以錢三百萬犒之軍士歡服營壘取水囘遠為創大池以便汲者百廢具舉兵民安之五年冬詔郡政修舉實恵及民陞龍圖閣待制民為立生祠六年春移知湖州挽留者繫道不絶在池陽與監司互乞囘避㑹有言者到任三日而罷凡四任提舉江州太平興國宫初遞卒汪青私啓遞筒實以匿名書至徹宸聴獄成具奏公因言事闗邊徼此而不懲恐有甚于此者上深以為然遂處極典八年臺評以為疑公坐鐫職十三年高宗八十之慶盡復舊職十四年屬疾寖劇自言厄運方迫必不可為卻藥不進求致其事四月甲戍薨于寓舎公自持橐之年年勞賞格不用者二十餘年故官止承議郎爵高密縣開國伯食邑七百户遺奏聞特贈四官官其家二人娶錢氏朝議大夫億年之女封碩人先公一年卒子四人長幼亡次端承事郎知平江府常熟縣丞次端承奉郎後公十五年卒次竴修職郎新吉州永豐縣主簿女三長適迪功郎前温州司法參軍辛勸次適修職郎監嘉興府澉浦鎮税曾晏次適承事郎知滁州清流縣魏峴孫男七槩棨棐梁㮚杲棠女二尚幼碩人葬縣之陽堂鄉同奥之原通奉墓側六月乙酉諸孤奉公之喪合焉公事親盡孝居喪哀禮俱至先以通奉遺澤遜與長兄之子靖次兄以疾廢又無後公經紀其家取從子竦為之嗣先以世賞及之崇篤外家養從母終身事乳母尤謹親故有以緩急告者力周之孤忠亮直無所附離名公前輩多知己者不縁介紹自結主知器業蚤就年幾五十始有朝績乾道末年一嵗幾于九遷入從出藩睿簡罙厚人謂枋用而遽退閒居鄞十年夷然不以得喪芥蔕與太師史公丞相魏公尚書汪公為真率之集僑居僧坊僅芘風雨自號曰梅堂號燕坐曰意足曰樂静聚書萬卷手不停披持身玉潔表裏無異望之儼然即之甚和無貴賤疏戚均為盡禮愈貴愈謙儉素不啻寒士杜門寂寂郡邑幾于相忘凝塵滿席處之淡如暇日幅巾蕭散猝遇之不知其為甘泉舊徳也字有楷法水墨積習出入率更公權之間尺牘為人藏弆告身書名端重勁正見者敬之學有原本文有體要表章雅健追配前人尤喜論治道古今典章無不該貫論事剴切通暢能動人主之聴詩律酷似唐人杜詩韓筆深造精詣劉白之作誦習無遺不為艱深奇澀之言矯激崖異之行貌若介而有容交雖淡而能久位既通顯専以薦士為己任片善必欲揚之使達所舉至多皆知名之彦有至公輔者文集十卷奏議二卷梅堂雜誌五卷史評五卷及廟議諸書藏于家晚猶取厯朝實録纂提綱目當世之志未衰也遺令諸子友悌守家法治塟以時親戚之貧者廪給之或請禱曰吾素不欺無事于此嗚呼公之所存可知也矣銘曰藝祖造邦功冠萬世廟立四親如漢如魏廟曰太祖尊無二工室居第一祫則東嚮昔在五朝四親未祧開基之主列穆與昭猶虚東嚮以俟後世既祧而復熙寧横議羣公爭論百有餘年惟公會稡集其大全神堯興唐封始于虎陳京抗論為唐太祖公之為力倍過于京惜議之行不見其成孝宗聖明惟賢是柬問公安在何見之晚乾道末年幾于九遷入從出藩聲望赫然建明非一廟議為大自公發之禮正昭代惟兹大端足以不朽在天之靈其昌厥後我作斯銘不顯幽光巖巖豐碑以賁其藏攻媿集卷九十八欽定四庫全書攻媿集卷九十九宋樓鑰撰誌銘端明殿學士致仕贈資政殿學士黄公墓誌銘公諱裳字文叔其先岀江夏唐晚徙梓之安泰六世祖曰文友者寳元康定間發粟賑梓劍閬三州饑民所活萬計朝廷特官之文友生阜阜生􅠐􅠐生楰是為公祖壻何氏始籍隆慶之普成考安中居縣東郊顧公齒長恐無所見聞悉捐舊産居邑中不治他事篤于教子母鄭氏繩之加嚴公未冠刻勵激昻登乾道五年進士第調閬州新井尉未赴罹外艱邑子從授業公語以經義又為之講解其後學益詣悉焚其稿服闋授巴州通江尉三年杜門潛究經傳出入古今黙而精思或達旦不寐人與語若無聞然于是剖微析幽宏深四達文詞明暢動中律度始時人傳其詩不知其學已成非復前日文叔矣總領趙公公說聞其名俾諸子從之游賴其束脩葬父祖及其諸父兩世九喪已而奉太夫人遊青城無為諸山率賦詩以寄意其純孝幽尚有古風于世澹如也後總領李公蘩復招以往時邊民苦和糴實不得一錢吏且督輸旁午漢中尤以為病公作漢中行以諷與李公意合力奏罷之民大恱公又作罷糴行至今歌之公将之官經紀其昆弟親族之家而後行放滿用舉主闗陞為興元府錄事參軍能以情求獄脱冤死伸無告甚衆終不訊一囚用舉主當改秩制帥留公正薦五士公為之首召對論蜀兵民大計曰蜀中民貧兵困極矣臣愚其故有二恨焉闗外四州邊于敵境勢便地饒兵火之餘田萊多荒不用屯田積榖之䇿乃𣙜民以養兵嵗月既深兵民俱困此一恨也邊民仰給外府米運率指沿江若稍分邊屯使就食諸郡外計費省今千里漕粟商因為利幾以三石而致一石名為養兵十萬實養三十萬人兵困民窮職此之由此二恨也今屯田積榖勢已難行分兵就糧事猶可及孝宗下其說卒不果行次論常平賑濟其略曰古人救荒良法不過常平義倉見今官司豈無樁積以一州言之則少以一路計之則多水旱之災決不常有不幸而有決不同時苟甲乙相推逓相賑救則豐凶迭用可以無窮以此救荒似為良䇿又論闗外義士人材驍勁緩急可使往年師出秦州鼓譟先登官軍坐視不救遂皆䧟沒自今苟遇調發宜令主将自作一軍專攻守之謀任成敗之責明日除國子錄未幾太夫人不幸宰相以闕官進擬孝宗怪問黄裳何在因奏其故特賜錢七十萬甫除喪而趣召既至太上已登極公謂守成之主要在恢張志度為先因論大利害凡數千言大畧以為古人論創業守成中興謂之三難今陛下雖當守成之時而實任中興之責守成之道必有能為陛下言之者若夫中興規模則與守成不同出攻入守當據利便之勢不可不定行都富國強兵當求功利之實不可不課吏治捍内禦外當有緩急之備不可不立重鎮因論都建康有五利天下大勢終在建康及言方今官雖具而職實不修一當立品式以課其功二當計資攷以久其任既建都邑課官吏根本固矣則又據要地立名城環大兵以守之分大臣以鎮之今呉蜀綿亘萬里雖號為重鎮宿師之地受兵之處率三年一易僅同列郡所謂國之藩籬門户者固當若是耶陛下即位之始所與共濟中興者宰相也陛下主其謀宰相任其責用之則勿疑疑之則勿用苟輕用之于始必輕棄之于終别奏國方有大讎大恥大害大憂而為人臣子乃狃于無事忽然忘之此風之成已非一日其要在陛下篤于躬行以感愧之而已矣又上奏曰今日之最弊兵多而食少一也吏多而官少二也變而通之惟當省兵省吏臣以為守備不闕則戰兵可省竊謂沿邊郡守宜悉除用武臣付以民兵責以軍政無事則耕有事則守如此則藩籬固而邊備實省兵之説始可言矣以民兵守雖多而無養兵之費以官軍戰雖少而有可用之實官軍之食可以少増吾民之賦可以漸減豈非至計乎若夫省官之說則當以理論之縱有怨咨寜無曲直夫實邊備則可以省兵執事理則可以省吏使即日行之其效猶将在十年之後苟又不然兵日以衆吏日以多他時雖欲逃怨于目前嫁禍于後日不可得矣公在憂中益熟觀天下大勢至陛對其言條達明切太上異之于是始被簡記除太學博士不敷月改秘書郎又旬日親擢公為嘉王府翊善曰黄裳善論事必能開益皇子公感主知遂以輔導為己任前後凡五年規切諷諌之語無虗日前朝號為能直言如姚坦輩皆所不及後來諸賢講貫切劘亦皆自公發之公講春秋初及王正月曰周之王即今之帝也王不能號令諸侯則王不足以為王帝不能統御郡鎮則帝不足以為帝今之郡鎮即古之諸侯也周之王惟其不能號令諸侯故春秋必書王正月所以一諸侯之正朔也今天下境土比祖宗時不能十之四然猶連跨呉蜀荆廣閩越二百州兵與民分任任吾民者二百州也任吾兵者九都統也中興以來三聖相授苟惟不能統御則何以服之上曰何謂九都統公曰唐太宗年十八起義兵平禍亂今大王年既過之而國家九都統之說豈容不知然則是可不汲汲于學乎公性真率而語疏達上大感悟恨得公晚及講鄭伯克段于鄢公曰段驕而有過鄭伯乃以兵取勝使大王如鄭伯之有段宜如何處之上思良久公曰大王獨不見孟子載舜之事乎象舜弟也舜封之有庳不及以政凡親親之道但當富貴之不可使之預政事此舜與鄭伯之得失也上曰善公因事啓發大率類此他日有東宫舊人除帶御器械詣王府謁謝上接之重輕中節左右咸大驚退以告公公翌日講左氏禮有等衰因問上曰昨日聞大王待某人正得等衰之說有之乎上曰有之人不可無學前日臨事胸中即有區處如有人在心腹間商度也公大喜曰大王之學正當見之處事今日等衰之說即是意也公大抵即某事則以某書言舉某書則以某事合雖所汎論亦必曰前日某書云云或上所未喻又曰某日某書云云上意益嚮因作八圖以獻曰太極曰三才正性曰天文曰地理曰王霸學術曰九流學術曰帝王紹運而終之以百官文武各述其大㫖陳之可謂該盡而宏逺矣公每曰為學之道要當體之于身本之于心大王宜以心為嚴師于王心有一毫不安者皆所不可為也凡上所行有一善必誘掖稱贊俾日進不已否則盡言無所諱上謂人曰黄翊善言語亦難堪惟我則能受之每至喪敗危亡之事無不為上精言之上必傾聽上嘗侍宴宫中從容誦酒誥語太上喜曰翊善之功也一日輪對勸太上曰陛下有五美三戒何謂五美曰仁曰誠曰明曰公曰㫁公各指事如此如此曰此陛下之五美也何謂三戒曰立規模崇儉徳受忠言時太上意主安静之說因循寢怠而用度賜予過多忠鯁之士相踵去國故以諷焉後命接伴金使因通兩國名諱而髙宗猶稱帝名公曰髙宗祔廟已久乃不稱廟諱前實失之安可不改乎令典儀通意使者難之公曰前乎此在二十七朔之内故未遑及今已即吉當互傳廟諱往返數四來使語塞然卒以前例不果從公還奏曰臣以理詰之其辭已順事關國體後遣使人當力議改正太上納其說紹熙二年二月雷雪交作公具封事其畧曰謹按易帝出乎震震為雷君象也震本坤體陽自外來交之有動乎情慾之象是以聖人于六十四卦之中凡涉震體者取義尤嚴在復則曰雷在地中先王以至日閉闗欲其復之静也在隨則曰澤中有雷君子以嚮晦入宴息欲其居之安也在頤則曰山下有雷君子以慎言語節飲食欲其養之正也復之静晝不可以鄭聲撓之居之安夜不可以慾心蕩之養之正食不可以㫖酒亂之夫人主起居動息人雖不知而天則知之變異之來豈容掩覆震之象曰洊雷震君子以恐懼修省修省云者謂省己之私也豈時政之謂哉公疏特切深皆人所難言者時求言之詔及舘職郎省而不及公不果上四月擢起居舍人未幾瘡發于背告滿百日甫出即直前奏事曰唐太宗最重魏徵一旦至欲殺之凡人主私心非必如好色好貨之類然後謂之私也事苟不出于公而執以己見皆私也私心既生則以諌者為病必求有以勝之勝心既生則以諌者為仇必求有以逐之因私心而生勝心因勝心而生忿心是三物者為之蔽雖以太宗之于徵猶不免況其他乎陛下即位以來臺諌之臣不得其職而去者幾七八輩陛下亦知三蔽之所以然乎且如陛下之待某人本不甚厚徒以臺諌攻之愈甚故陛下庇之愈力陛下之本心亦忽不自知其如此也望陛下静察吾心勿使有秋毫之私此心既公無所偏係則聞臺諌之言必從何由以勝心臨之待臺諫之情必厚何由以忿心加之乎公久侍王邸一再遷官兼翊善如故見上為學日益因誕日作渾天儀輿地圖以獻皆以木為之因為歌詩勉上進學如天之運行而不息及念祖宗郡國大半陷為賊區乃王心所宜感憤者觀公之志凡可以動悟王意者無不為也居數月除中書舍人制詞坦明人多傳誦公既擢禁從念國家日忘武備勢寖削弱復勸太上以右武為事曰壽皇在位三十年待遇武臣拊循士卒恩意深厚三軍之士至今言者無不感激恨天下無事不得效死以報君父願陛下勿替此意又謂權撥鄂渚兵一二萬人分屯襄漢張形勢以備敵公心之素所存者然也天下方恬于宴安公䇿無所施用都人比嵗日夜望車駕之出譁言紛紛公奏疏極論自今宜五日一朝以解中外之謗一疏之中凡六七致意焉尋除給事中同知貢舉未幾除侍講公在瑣闥甫一月封駮之章無慮數十上貴戚宦寺一限以法最後指侍臣進用不當繳論甚切翌日遷公兵部侍郎公不受命堅乞去久之王邸奏乞留公遂除顯謨閣待制専為翊善公始就職未幾瘡復作轉甚連丐去不許病稍差又上封事請車駕即日過兩宫言極苦尋復除公侍講引對便坐又為太上力言父子天性陛下于重華不應有他疑太上徐勞公曰近見嘉王學問殊進應對議論益非前日比皆卿力也公曰臣伎止此朱熹四十年學問陛下宜收召使備僚屬且言王初就傅蜀士楊輔劉光祖相繼在選可復充學官以廣王之聞見太上悉嘉納時太上久不過宫中外莫喻其故侍從同班抗論不已孝宗不豫中外憂危事勢益急轉臣交口諫不聴公復抗聲切諫至號泣隨之宫門閉掩涕而出公自是瘡復作連章請外又請歸田里書再上不報即移疾闗外待命兼旬聞孝宗遺詔亟入臨瘡遂大作上即位公病不能朝再除給事中上語輔臣此黄裳舊官宜改擬他職明日以權禮部尚書進上曰獨不可真尚書乎且令兼侍讀上意即欲大用數問公疾如何公力疾入謝出一奏諄諄數千言備極忠愛大略謂書傳所載前古人君如堯舜禹湯文武壽皆百餘嵗在位之日多至五六十年而其所為之事自少至老只如一日至于後世之主享國之日率多不久其間如漢武帝梁武帝唐明皇此三君者得年稍高在位稍久而其平生所為是非美惡如出兩人治亂安危亦全相反此非他故由其持心之一與不一也持心一則始終如一否則有始而無終陛下今日正如涉大川行萬里固未知登岸税駕之期臣請略舉已行之事諭之且陛下新即大位初臨萬幾虚心忘我委任大臣政出中書萬事坐理此正得人君好要之道使大臣得人常如今日則陛下雖終身守之可也臣恐數年之後陛下應酬日熟聰明日新亦欲出意作為躬親聴㫁左右迎合之徒竊窺聖意因而獻説謂陛下委任大臣意非不善然事皆決于外庭權不歸于人主日積月累恐成亂階陛下聞之能不介然于心乎臣恐是時委任大臣不能如今日矣若不委任大臣必須借助左右小人得志何所不為隂竊主權潛移上意引用邪黨殘害忠良其為禍患何所不至乎臣之所憂者此也陛下深鑒近弊奬用臺諫每有彈劾無不聴從善惡區分綱紀振立此正得祖宗設官之意使臺諫得人常如今日則陛下雖終身守之可也然臣恐自今以徃臺諫之言日闗聖聴或斥小人之過使陛下欲用之而不能或暴近習之罪使陛下欲親之而不可所言滋多不能無厭厭心既生不能無怒左右迎合之徒竊窺聖意因而獻説謂陛下奬用臺諫本以革弊然臺諫得志遂使人主不能自由陛下聞之能不怫然于心乎臣恐是時奬用臺諌亦不能如今日矣夫朝廷所恃以分别善惡使君子小人不相侵亂者専在臺諫陛下苟厭其多言不復聴用則為臺諌者咋舌閉口無所論列君子日退小人日進而天下亂矣臣之所憂者此也此二事者朝政之大者也若自其切于陛下之身者言之又有大者焉因條舉曰陛下篤于孝愛如是勤于學問如是薄于嗜好如是然臣亦恐陛下自不能保其常如今日也又曰天下之事不可勝言也人君之憂不可勝計也姑自臣所言數事思之其可憂者已如此其衆而臣安得不以為憂乎昔唐太宗老于世故在位日久魏徵猶以十漸戒之一謂其漸不寡欲二謂其漸不愛民三謂其漸不利物四謂其漸疎君子五謂其漸貴異物六謂其漸疑大臣七謂其漸好畋獵八謂其漸輕臣下九謂其漸倦朝政十謂其漸忽水旱使徵生于今時其所以為陛下憂者又當如何夫心者動物易縱難收人主之心又與常人不同溺于富貴放于安逸朝善暮惡固不可保陛下欲求所以持心之説臣請終言之自古及今有治則有亂有安則有危有存則有亡使人主之心常知亂知危知亡則又豈肯須臾自放于安逸之地書曰予臨兆民凜乎若朽索之馭六馬又曰慄慄危懼若將隕于深淵又曰心之憂危若蹈虎尾此聖人持心之法也世豈有馭六馬臨深淵蹈虎尾而安危存亡之念不闗于心者乎凡首末皆主此意公絶筆之作也明日上復召公移坐與語從容良久後數日有旨充明堂禮頓使公疾寖羸不復可出時時獨語曰五年之功無使一日壊之度吾必不可為矣後之君子必有能任其責者葢憂之深也公連三嵗病瘡至是以積憂故瘡雖損而他疾乘之九月二十四日卒不起方疾亟命子弟秉筆口占遺表大抵不異前奏意曰陛下好為之上大驚詫傷悼即日批出除公端明殿學士致仕他恩禮悉依執政朝廷上下聞公死皆撫手相弔以為國之不幸也丞相為上言至泣下不能已遂贈公資政殿學士所以賻䘏之加厚公寛簡樂易不為拘拘平時于利害是非若不經意至忠義所激奮然忘身每論事人主前其氣平其辭切其事核其理盡人但見其發于造次若天機之自然不知其燕居深念索之精而見之切也為人喜思慮樂辛勤而對客輙懽然言笑終日飲酒無算其為學恥一物之不知苟一家言無不與之交而究其説推賢奬善憫孤恤貧葢出天性外内僅書一十攷積官至朝請郎公娶蘇氏繼王氏王氏既喪又連失二孫每語人曰富貴真博禍之具也既病客視公公嘻笑曰僕甚愛田間與耕夫為伍此時稻芋蓊然豆飰藜羮山中之樂真無央也倘得乞骸骨以歸足矣嗚呼公之立朝終始大節如此朝野望公即預大政而天遽奪之壽止四十有九惜哉皇考贈承議郎母妻皆贈碩人一子瑾承務郎女二人許適進士何鏜前進士何伯巽鑰與公同在後省年餘相與甚厚抵掌談世故言議多合各誦所聞終日不倦地相去萬里而肝胆相照傾倒無不盡嘗笑謂鑰曰前後得制詞數篇皆出君手思有以報未能也尚忍言之左史劉公光祖状公之行瑾以請銘于鑰因盡得誦公遺文高處殆不可及平處亦自有一種風氣至論事之書明白洞達夫入而能知之若其剴切精忠憂深而思遠撫卷三歎使人流涕而不自已也惟左史之作文實事覈敬俾載于石而系之以銘銘曰井絡之區為東西川鍾秀在人名士出焉有卿有雲有武有淵三蘇諸范踵登英躔巖巖劍門山險地偏勢連闗隴秀氣弗宣涉厯千載扶輿蜿蟺萬山之中乃生斯賢英特雄邁高視八埏輔以學力窮探本源移孝為忠立朝卓然大放厥辭亹亹百篇惟我慈皇識之最先俾侍嗣聖設職惟専官雖屢進職終不遷公能盡忠左右累年引經据古指事陳前義所當為執之彌堅死生禍福咸委于天神㑹氣合奉以周旋夾日以飛入侍細旃將降大任忽焉登仙上心震悼恩賁九泉炳炳八圖今寘經筵殄瘁之悲心折涕漣嗚呼余嘗評之先見如呂中丞勇決如范蜀公敢言如蘇文忠葢司馬公自以為不及者公或過之而皆得其全嗚呼尚何言哉惟知公之深者然後以余為知言朝議大夫秘閣修撰致仕王公墓誌銘紹興七年有旨王勲召赴行在所三十二年有旨王正已不畏强禦節槩可稱三省詳加訪問其人如在可與甄録尋召赴行在二人葢父子也先是公之父知湖州長興縣有治聲髙宗皇帝以廣南舶政大弊命二府大臣擇士人修潔者為之樞密沈公與求參政陳公與義俱以為薦既對擢提舉市舶果以清裁著名嵗大疫夫婦繼殁賈胡哀之率錢二百萬為賻公時纔冠固卻之且曰吾父以亷直聞吾雖貧旅猶能負喪以歸不媿亷叔度也聞者歎服以為有是父而有是子公在海陵當孝宗皇帝厲精之初既有訪問之寵至淳熙元年詔求亷吏以勵末俗丞相葉公衡方在政府以公辭賻事為稱首又復召用嗚呼人亦有言亷者士大夫之所當為古者在位皆節儉正直故不以亷稱然攷之周禮天官小宰以聴官府之六計弊羣吏之治一曰亷善二曰亷能三曰亷敬四曰亷正五曰亷能六曰亷辨説者曰弊斷也既斷以六事又以亷為本然則成周盛時亦以亷為難而況亷恥道喪之久惟王氏仍父子以亷顯父不究于用而子卒為世名卿皆自此發之盛哉公舊名上字從小從真下字言以避孝宗嫌名改焉字伯仁父舊字正之至今以舊字行其先桐廬人六世祖仁鎬仕呉越為明州衙推因家于鄞之桃源曾祖説以學行為鄉里所宗師實五先生之一也以季子宗正少卿珩贈銀青光禄大夫祖玩贈朝奉郎父提舉也終左朝散郎贈金紫光禄大夫母蔡氏元氏薛氏贈武陵永寜普寧郡夫人公蔡出也事後母尤謹幼警悟少長益嗜書史既免喪首以金紫遺澤奏長弟少卿尚無恙自欲任公又請與季弟必欲自取世科少卿諭勉再三始授將仕郎既而幡然曰仕行吾志不負所學足矣何必爾遂不復事舉業而與信州王使君從相與通經攷古務為有用至今二王為桃源之望焉為洪州豐城縣主簿漕檄部綱方詣臺受要束使者卻謁叱鈴下卒迫遣公不勝憤遽乞休致遂遭重劾公處之如平時使者罷乃免帥以公易理官有寓公為時相姻之先與一富民有他憾會冢舍失瑞香花以疑似誣之逮繫郡獄諷公文致其罪公證其無他又忤帥意竟稱疾而去游宦之始所立已然歸而攻苦食淡左圖右書饘粥幾不繼泊如也又二年始授婺州司法參軍詔舉縣令會稽郡王史公浩為司封郎以公姓名進知泰州海陵縣張忠獻公浚募萬弩手官吏畏怖奔走恐後公獨以邑民方脱兵火之酷募既難從聚亦無用陳利害以獻旁觀為之股栗公亦謁告以俟忠獻以書遜謝慰勉安職人始服公有守而歎忠獻之樂善也隆興改元正月對􅂷拱殿上意嚮納改宣教郎幹辦行在諸軍糧料院乾道二年詔薦監司郡守丞相魏公杞在瑣闥薦對祥曦殿權司農寺主簿知江隂軍在任得旨沿江郡籍民為兵防江守城為大軍聲援公抗疏列上徒擾良民無益備禦者七條且言舊嘗為山水寨騷動兩淮競進圖册謂得勝兵數十萬完顔亮深入乃無一人為用敵退起焚官寺聲言欲燒棄山水寨案牘以絶後害此最深切著明者公以此罷而他郡亦徒擾如公言起知饒州改嚴州復改饒州以事忤憲司劾罷主管台州崇道觀以葉丞相之薦除尚書吏部員外郎權右司郎官遂為真葉公去國公亦遭論再奉祠除嚴州改婺州内引奏事尤加襃納至漏下數刻治婺數月改荆湖北路轉運判官移知湖州未半年罷而版曹以一全年逋欠奏公鑴兩秩不辯也又為外祠除廣南西路轉運判官議臣請行客販鈔鹽薦浙西帥屬胡庭直至二廣議可否公首貽書于胡又奏其事胡還朝盡變前説議臣亦駮公所陳金字牌踵至必欲施行公不為屈復辯析甚苦大略謂西路官賣誠非鹽法之善然科折有弊尚可禁止若客鈔有虧無法可救漕計立見空匱諸郡取辦勢必不勝弊而又變矣臣去替不遠計任内決可支吾豈以利害不及身遂為詭隨以欺陛下移公漕湖南而議臣帥桂林以庭直代公且領鹽事行其説庭直身受其弊以憂死既而公私告乏民不聊生孝宗聞之震怒議臣坐嚴譴而法果變矣為江西提刑易節江東未到改運判又移淮南以職事修舉直寶文閣江東運判俄除左司遷中書門下省檢正諸房公事借禮部尚書接送伴金國賀正旦使正使者之非儀折儐者之踞肆無不聳服太上皇帝踐阼賜金紫遷宗正少卿自以任子不當預玉牒史事力辭改太府卿丐外除秘閣修撰江東提刑俄改浙西以未疾求歸主管建寧府武夷山沖祐觀既再任紹熙五年八月乞致其事十月以今上覃恩轉朝議大夫慶元二年三月二日屬疾卻藥不進翌日終于正寢享年七十有八娶樓氏徽猷閣直學士贈少師之季女封宜人先七年卒贈㳟人子男五人汲洌渙皆蚤世澤文林郎監紹興府都税務潛登仕郎洌出繼少卿為曽孫女六人文林郎鎮江府金壇縣丞延平陳大應武節郎閤門舎人開封朱龜年同郡樓錝將仕郎延平陳仲紱宣教郎新提領建康府户部贍軍酒庫所幹辦公事廣漢張忠恕其壻也一幼亡今惟朱氏樓氏二女在孫男八頤之顒之額之顯之頔之頡之穎之顥之先一年顒之卒孫女五長適同郡樓滌次適毘陵張篪餘未行曾孫男四惟賢惟寅惟明惟清女三俱幼諸孫以五月丙申奉公之喪合于恭人之墓是為午嶺之原公資不凡而自力于學多識前言徃行曉暢事理立身立朝所守一定不可囘奪尤安義命置禍福于度外始則不畏上官之嚴久益自强雖壓以大君之命亦固執而明辯之仕以此多齟齬上下既信服亦以此踣而復振云平生惟是之行視人所難揆以古道謂彼亦人也吾何為不可人駭其不易而自處恬然亦不以此干名于時廣東一節有孫偉竒甫者知名士自號七澤老漁作蔣周翰傳具載始末公嘗刻于金紫碑隂以彰先徳而削去辭賻數十言則公豈干名者耶未嘗求合于人而當世大賢相知甚衆孝宗擢公于下僚奬待尤渥漕淮南時或言鎮江軍帥張詔不法幾中深文特命公竟其事公為辯明止坐薄責前此監司未有越所部而治事者眷倚之意可知然中外踐敭終不得一登禁近非命耶身退之後聞朝論欲再起之笑曰少欲挂衣冠老乃强吾顔以進耶風力素高晚而益嚴絶不可干以私剖符數郡持節幾半東南所至無聚斂之政省鞭扑之苛不徒以文法臨賔屬而有父兄教子弟之意薦舉必公按刺至寡而端毅簡黙望風畏之及其即之也温洞見肺腑一善可取口之不置臭味苟同忘年忘輩行與之傾倒風流韻度如晉宋名勝又使人意也消藏書至二萬巻手抄為多號酌古居士又以名其堂詩文似其為人少嗜山谷詩造詣已深為紫微王公洋所擊賞晚又以杜少陵蘇長公為標準石湖參政范公成大見公近詩唶曰不惟把降幡殆將焚筆硯矣有文集若干卷藏于家始孤撫養弟妺妺得所歸二弟教之有成正功今為蘄州正民倅天邑鑰不肖晚出以威姑之故辱在親黨省事以來䝉誨予特異比㸃朝行聞公林泉甚適夢寐欲侍巾屨歸而相得愈歡以為不負我所期也劇談痛飲或連日不倦人之云亡有識共歎豈鑰一夫之私哭之以詩曰槁梧誰共語空㫁伯牙絃嗚呼尚忍銘公也哉銘曰士為民瞻莫先于亷惟公父子持身特嚴父不究用子以是顯終始一節百行俱善皇皇孝宗知公最深視公之心如日斯臨風裁日高譽望日偉三仕三已踣而復起毅焉而和介焉而通老成典刑今孰踰公人惜公歸公自謂晚一丘一壑徃而不返我銘斯阡匪哭其私繄爾後人尚其似之攻媿集卷九十九欽定四庫全書攻媿集卷一百宋樓鑰撰誌銘朝請大夫致仕王君墓誌銘吾鄉五先生俱以文行師表士子惟桃源王先生暨我高祖之後皆大葢其啓迪後學徳澤之及來裔者源深而流長矣先生之子宗正少卿珩孫廣南提舉市舶勲繼登進士科提舉疎財尚義以亷節著所積尤厚是生三子長太府卿諱正已次即君也朝請大夫諱正功季知安慶府諱正民三人以節誼政術能世其家嘗一嵗同奏子興固未艾也嗚呼昔者鑰既銘太府之墓纔八年而君與季相繼下世既葬矣君之諸子以國子正袁君燮之状求銘惟王氏樓氏自二先生以道義定交至太府壻吾門姻好稠疊感今懐昔乃摭其大概為之書而系以銘君舊名上字乃摭其真下曰思字有之後以避孝宗嫌名改焉遂字承甫曾祖説先生也贈銀青光禄大夫祖玩贈朝奉郎父贈金紫光禄大夫娶蔡氏元氏薛氏贈武陵永寧普寧郡夫人君薛出也家世之詳已載于太府之志惟君生而不凡幼篤于學不待彊教已如成人以金紫遺澤補將仕郎紹興二十四年由銓選授右迪功郎撫州宜黄縣主簿尋易處州青田有訴夫死于毆者君按視則更曰自經君察其必以賄故即用初情訊之具服隆興初調筠州司理參軍筠號道院而獄事亦繁精意推鞫狴岸屢空乾道二年循右從政郎四年為荆湖南路轉運司主管帳司給事黄公鈞主漕計以嚴明稱寮屬僅取充位君果于立事滯訟見屬剖析無留難黄公舉以厲同列之持兩端者尚書沈公介為帥尤簡貴威重裁決無敢輙經外臺者理或未安君改之不疑沈公更加敬異不以為忤也二公爭薦之又為延譽不朞月舉削應格七年改宣教郎知興化軍莆田縣縣素難治始至牒訴數百懲其非實而決其久滯者遂寖以清省宋氏子怙勢突入毆吏林公枅守信其從父太學諸生也喧競于庭皆捕治使服而徐釋之且戒曰後復爾不汝貸也感謝而去林公由是知君後為監司嘗表薦之邑岸大姓鬻鹽因為冦鈔捕獲數十人其黨篡取殺傷卒徒篡官亦被數創救至得免而郡怒其生事君曰拒捕至此而賞罰不伸何以厲其後即窮治之而賞官兵焉又修陳霸斗門以永灌溉之利淳熙六年賜緋衣銀魚七年通判潮州推誠佐郡守貳無間言郡人有為憲屬者武㫁鄉曲征利于近郊君裁以法不勝慚怨擠之不遺餘力君用是罷將歸會劇冦沈師逼城民走依官寺君開門納之力贊郡將修戰守具甚悉賊知有備而退衆唶曰是已罷官而為民深切乃如此耶至其行多涕泣者九年簽書武安軍節度判官㕔公事十一年改淮南皆以伯氏將漕引嫌十四年主管湖北安撫司機宜文字紹熙元年差知澧州陛辭論沙毛錢及雜賣塲二事上亦深知其弊嘉嘆再四三年到郡帑庾枵然廩禄累月不給君去其侵蠧之已甚者節浮費汰冗食補罅漏郡計無乏及朞而用頗裕乃從邦人之請即州治之前闢城通道建澧陽樓前俯大江巨麗軒豁遂為一方偉觀嘗屬鑰記之由是人心闓懌士氣振厲比舉多決科者藥園寺僧以稔惡聞邑令發其端謂罪不可赦而以賄緩其獄君詰之治始急復賕于上司之吏移文使先縱遣而以牘來君曰欲以勢力求免耶即日杖之五年奉最還朝奏事重華宫行内深稱上意遂知蘄州自私錢之廢淮民多窶鮮有葢藏遇霪雨至絶市無糴君以慶元四年視事急發廩而損其直且多邀米商許以蠲征舳艫輳湊又念嵗收纔能自給而巨商率先以他貨來售禾始登塲厚取其贏君以為遏糴固非古訓而坐視民食之空咎將誰執力請于朝乞禁止商販許之民相謂曰使君通變如此自爾有足食之望矣有言銀礦發于山者君欲遏之而未得其説耆老訴云往嵗嘗有此事官不熟計而遽行之非徒無益冶户以虧額坐深文鬻産以償者數百家痛猶未定也君為奏罷之佛燈大師者自稱戚里挾權要書走州縣攫取無藝人病其擾莫敢詰君出郊有訴者立捕之寮佐勸止不聴比至一黥隸爾致之法六年除廣南西路提㸃刑獄公事嘉泰元年賜四品服廣右之俗輕于冒禁而上官以不按吏為從厚君深病之劾其貪暴之尤者請託一無所聴始知悚懼而君亦寖危矣興安令之子蹴小吏至死逮繫郡獄令脅治獄者欲變之君怒曰臺治所在可使死者抱冤乎劾令而移獄鄰路令誣訴于言者公遭論而歸自以無慊于中處之怡然二年冬主管建寧府武夷山沖佑觀三年正初屬疾癸未終于家享年七十有一娶同郡伍氏贈宜人先二十九年卒今宜人應氏子男六人深從事郎新無為軍巢縣尉􅜐迪功郎新池州青陽縣尉洙迪功郎太平州蕪湖縣主簿登紹熙四年進士科泌將以遺澤補官女八人長適從事郎監紹興府㑹稽縣户部贍軍上臯酒庫毘陵張符女後君半年卒次適進士伍遵第五第六女蚤亡餘與第四第五男俱有廢疾孫男三人仁之儀之信之信之先一年卒二女一夭一未行先是伍宜人葬于鄞縣桃源鄉排隩之原諸孤以四月己酉奉君之柩合焉君資稟忠信不發一妄語妻子不見喜愠之色開心見誠吐露情素孩孺有問亦告以實不敢戲侮之田夫野老市井小人過而挹之俯接惟謹或遇機穽險巇之人一對以誠彼自意消以是善與人交終始不變筮仕之初或言邑令有心術亦當有以牢籠之太府問客言何如君曰以誠待之爾何術之可用卒與令甚厚至執手不忍别人但以君為恂恂自謹之人而遇事敢為毅然不可干以私每曰食君之禄徇情撓法以取悦于人自為計則得矣其如體國何亷潔守家法俸入非令所載者謝不受澧陽終更吏白有資送錢三百萬悉拒之惟備舟浮家而歸郡人歎服所至未嘗飾治器用不市一物莆陽荔子最盛有以名品餽者堅辭之怡于仕進不求知于人而人自知之丞相趙魏公樞密使軒山王公每欲汲引丞相京公尤稱其真淳力薦于上晚厯麾節皆其力而君不自知也張侍講栻風裁甚高在潭游從雅相愛重呼君為齊年兄清貧自處質貸以給奉已至薄得禄不足以償逋負如是者三十年然持損有餘補不足之説有義事亦勉為之後既稍裕親故有求隨力以應隆冬細民乏食賑與無倦色幼孤鞠于兄嫂少長省事自念孝養無及以事親之禮事之嫂即鑰先祖少師之季女也伍宜人亦順適君志躬執婦禮既亡祔于廟以時奉祀太府諸女之行竭力以助籨具良厚皆人所難者性嗜學多録未見之書唐諸帝實録略備今寫本及版行者各萬餘卷少喜為詩周旋太府與王信州之間佳句與之相下上暮年益造平澹有荆澧集行于時餘藏于家嗚呼書曰吉人為善惟日不足卷阿之詩言求賢用吉士也漢文帝初立召田叔問曰公知天下長者乎周家用人以吉士為首文帝之化㡬三王實基于此王氏父子兄弟皆有以自見于世惟君制行醇篤立身處家施于有政風誼聳然而其本體盖所謂吉人吉士長者人也故鄉評卒以是歸之使其得位而行可使鄙夫寛頑夫亷而風俗庶㡬于古小試緒餘感化已多一區之宅始成求田足以卒嵗天假之年亦可表率鄉曲而遽已矣此鑰平日敬嘆毎以語人者今也四子俱列仕版家道肅穆天之敷佑如此為善者亦可以勸矣銘曰恂恂王君家世儒雅君尤篤恭視如樸野周云吉士漢言長者君其人歟力行不捨藍田皆真元規非假施于有政不言而化義所當為勇于施舎麾節倦遊求田問舎謂宜上壽式是鄉社云何不淑棣華凋謝高其門閭尚容駟馬詩以颺之用慰泉下叔祖居士并張夫人墓誌銘居士姓樓氏諱儀字元應明之鄞人也先世居奉川後徙焉曾祖杲不仕祖郁以古學全徳為鄉先生登第主廬江簿以禄不逮親不復仕進終大理評事累贈正議大夫考肖正議之季子篤學晚不衰以特奏名補和州助教居士世其家者也讀書敏而勤百氏之言無不該貫句讀音訓攷證是否有先儒之所未發朱黄讎校學者取法焉小學尤精鄙流俗簡陋手以古字寫春秋左氏傳禮記莊子以課其子用志如此然澹于榮利少舉進士一再不遇已甚厭之遂不復為塲屋文而學問益高娶夫人張氏里人詢之女勤儉静専克相夫子早嵗居貧甚夫人心計有餘而濟之以識知所取予未始與人為怨二人同心而家益饒兄弟五人居士處其仲性孝悌和州病沈綿累嵗下二弟二妺皆幼稚未立所以奉甘旨畢婚嫁者維力之盡夫人承其意無不周悉他日罄先世家産四分之獨不取一金夫人亦無難色且贊其決正議好著書手澤盈篋兵火倉猝居士尤以為憂夫人捐金募人窖藏至今得為家寶居士中年益薄世故好浮屠氏之説名山古刹意有所寓假榻宴坐一鉢一衲或累嵗忘返間過親族所至如歸為人樂易無少長與之無間豪飲劇談衮衮竟夕道古今涉經史旁出入釋老稗官之説如畫一二坐客傾聴不暇倦遊還家屏處一室乾道癸巳嵗于是年七十有五矣正月十有六日感疾以卒夫人既率諸孤以是年十二月二十有一日葬于陽堂鄉梅湖之原持門户愈謹奉佛愈嚴平生自奉至薄見華靡之服至瞑目不觀曰吾以儉之故不妄取不妄用雖不能甚富亦未嘗困乏此夫人治家之要也至賙人之急雖多不較病給以藥死給以棺者日相踵寺觀營繕隨所求而應之晚益了悟歎曰吾焉能以垂盡之年尚較米鹽耶聚族而謀盡以家所蓄分給子舎戒以自力毋輕費淳熙壬寅四月十有四日卒享年七十有八將以明年閏十有一月十一日啓居士之墓而合葬焉子男五人曰由仁曰行仁先居士卒曰珹先夫人卒曰球曰琰俱業儒承居士之訓書傳如流女二人福州懐安縣丞杜友直其壻也一早亡孫四人鋙鍰鉉錦女六人長適翁烜次適豐有基餘未行曾孫一人嗚呼樓氏自先生起家皇祐中衣冠相傳六七世矣豈惟祖考積善所至葢先生教授鄉校三十餘年諸生皆當世名士一門書種賴以不絶有如和州居士雖不得施用而力紹世業流傳典刑使後生猶得沾丐其所以維持之力為多後來者可無念乎居士實先祖少師之從弟葬之日夫人以墓銘見屬鑰自念生晚少見前輩毎侍居士則愛誨良渥尚厯厯能記餘論又為字鑰以大防也嘗為詮次行事未及成而夫人又亡矣乃以二叔之命併序而銘之銘曰學焉甚博行也無闕窮通有命不繫巧拙達人大觀欣戚泯絶不亡者存厥有高節孌彼賢配千載同穴孰發其潛視此幽碣盛夫人墓誌銘孺人姓盛氏世為餘杭人有曰蟠者仕呉越位通顯錢氏納土始居嚴之建徳又徙嘉禾因家焉曾大父偕徳興令大父兑贈通直郎父師聖迪功郎尤户部經界所措置官徳興公且老猶提五子試塲屋各明一經號六經家孺人年十有八歸于洪氏夫曰懐祖今為通直郎賜緋魚袋實吏部尚書文憲公之次子也元祐中孺人之伯祖僑以名儒為國子司業文憲公從之遊雅相器重遂為忘年交既銘徳興之墓又締婚焉孺人資凝重喜怒不見于色平居斂袵危坐一語不妄發有所醻答唯而已笑纔啓齒若懼有所聞閫内雍如也孺人厚貲裝嬪大家舅又鼎貴而自處沖靚食不兼味裘葛無副未嘗有所表襮姑文安郡夫人尤愛之通直夙登仕版而宦情甚薄兄升朝籍弟亦補京秩通直公固不屑意孺人亦安之也文憲多孫孺人之長子藏年始髫齔文憲愛其穎悟欲先奏補孺人力辭至泣下文憲為之嘉歎然卒先之遇下有恩意待子婦如賔客未嘗見惰容妾媵有過告諭至再三不加鞭扑故有終身不忍去者淳熙乙未秋七月屬疾藏官泉南孺人念之甚苦疾遂革以二十八日卒享年六十有三㑹通直引年休致明年以郊霈贈孺人子男八藏新處之松陽令新建康府司法參軍皆從政郎曰蘧先卒曰芹曰謁曰薈曰藝曰薫女四長適姑蘇翁浩次適丹丘錢起二人未行孫男八伯景仲杲昭孫叔旦會孫晧孫曽孫㬇孫孫女六長適延平陳仲達餘皆幼以其年十二月八日葬孺人于台州寧海縣鳯潭西之原通直與諸子哭之甚哀松陽一日過予泣曰藏不孝素為吾母所鍾愛宦學垂二十年輙不偶無以奉一日歡隨牒遠方又不得終養恨不得即死以從吾母于九京願得子銘吾母之墓以塞無窮之悲予于洪氏有連又與松陽厚也不得辭銘曰予于善而壽不洪安于儉而報不豐夫與偕老而生不得被其封子既强仕而養不洎于千鐘嗚呼其命耶斯銘也尚以詔于無窮江元適墓誌銘始余遊柯山聞南塘徐誠叟先生之名其學本于伊川欲見而不得今二十餘年乃聞其江徒君之賢于其鄉之秀士且曰南塘之門顯者固多而江君則得其傳而不仕者也君諱泳字元適世居衢之開化大父以上潛徳弗耀考沔從常山起家主饒之安仁簿辟泉司屬以卒君其季子也束髪知讀書一以為已為本手抄中庸大繫置座右口誦心維寒暑不廢弱冠有聲庠序漳守陳公杲得君諸生中以其予妻之子葢張出是為右史文潛外孫紹興初黨籍解詔沒者官其子孫一人無後者許授異姓親右史與龔公夬俱無後龔氏以官予外孫壻臧珙陳公欲以右史之澤與君君辭焉迺及其友壻戚竢既欲奏以他官又不就至是君之年益壯學益明再應鄉大夫舉不利絶不為舉子語既遭外艱廬墓毁瘠除喪因弗去遂不復謀仕而行其志于家號所居為西莊堂室軒館下至器用悉有銘記以便觀省創樓西偏掲先聖像朝夕瞻仰如親見而師之榜家塾曰明善命其子震升謙蒙革肄業其中所訓先徳行後文藝絶口不以利達啓其心亦不使預家務而治家自有法中閫有亭以限僕妾細大條理擇謹厚者董其凡不勞而辦不事生産家業無所增益伯氏仲氏貲息日倍人以百畝與之謝不取樂以所聞見告人願學而力不逮者教且食之曰吾非養其口體養其才也常有小疾一日出就外寢焚香黙坐間一諷詠不異平時惟勵諸子以毋忘疇昔之訓語畢而逝實乾道八年八月二十九日享年四十有九以其年十二月二十六日庚申葬于禄墩之原遺文曰西莊題意曰朋遊講習曰天籟編曰因心録易中庸有解他論述尚多藏于家未傳也葬之五年始得以銘諸墓嗚呼人孰不欲仕如君才足以取事足以得而其學又可見于用乃翛然自適以終其身余惟孔門有用之學上可以為邦南面而其流亞皆可使從政觀至人與㸃説漆雕之意則知樂道者之為高而以政學者皆自欺也余于道未有聞而仕仕而未能優也聞君之風有媿焉故為之銘銘曰仕以行志而或害義孰若不仕以全吾氣允矣南塘源由二程有派其流君挹其清徳成行修不用于世淑諸人者抑君之細命維匪長後其熾昌銘以訂之觀者勿忘知嵊縣季君墓誌銘皇帝即位之六年五月壬戌有旨季光弼所獻文字有補治道可與循兩資制曰上書公車日以百計高則近迂卑則涉諂至于出入經史動含諷諫覽爾奏篇朕甚嘉之進官一列不獨爾私庶聞其風亦克用勸先是四月戊辰朔日有食之君摭光武十事備論以進目曰美芹文簡而旨深意篤而言婉訓詞既頒士夫相與傳誦聖天子導人使諫盛徳日新而君之名亦由此暴白于天下君居八年再上萬言書敷繹前説又泛論當世之務不報一日聞西府除目愀然曰樞筦與中書並立繫朝廷輕重其可忽諸遂攷唐之宰相起自武徳裴寂終于天祐楊涉作編年録論説二百五十有五去取抑揚皆有微意苟位之非據假以隆名雖元勛如郭子儀亦不得預讀者為之聳歎嗚呼才不得究齎志而殁著書一二亦足以不朽矣君字觀國其先家處之龍泉七世祖超為呉越錢氏常侍始籍于温居平陽之桂源曾祖宗喬祖文瑩俱不仕父敦習以君陞朝贈宣教郎妣林氏贈孺人宣教公早世君方在髫齔號慕如成人祖母猶無恙與林孺人自釐家務卑君一意問學君少穎悟痛自激昻于書無所不讀詩禮左氏春秋及諸子古文皆手自編寫寒暑不少變年十六授室益加刻苦視生産作業與閨房之私一不經意羣試庠校輙出其輩行而器識凝邃不見圭角閣學林公待聘待制蕭公振里之先達少所許可咸器重之兩薦于鄉紹興二十七年遂登進士第授左迪功郎調福州福清縣主簿以祖母憂不赴服除授臨安府鹽官主簿秩滿用薦者闗陞左從政郎特旨授左儒林郎充邵州教授丁太孺人憂授福州寧徳縣丞改通直郎知紹興府嵊縣磨勘轉奉議郎代者且至俄疾卒于縣治享年五十有七時淳熙十年四月四日也嗚呼君之抱負厚矣學行政術皆欲以古人自期而見于用者止于州縣間所在皆著聲績而其甚可稱者數端鹽官邑庠久不振君召張横浦高弟于恕郎曄勉以身率士子課試皆臨視之咸自奮勵登巍科如張少良等數人邵陽僻遠士無師承君遇諸生如朋儕程度甚悉鄰郡縣之士至者相屬凡經指授多成美才如陳偕謝特起輩有聲湖湘間此君之善教養者然也浙西漕河淺淤例調民運水以濟往來嵗旱民勞水愈不至君相地形鑿河引潮以灌之至今為便閩有僊湖為豪右所田君按黄諫議之舊疏濬以廣灌溉此君之善興民利者然也君之聴訟不為鉤距一以至誠臨之公而生明無不洞察羅源尉鍛錬平民為盜以希賞連帥丞相陳車公命君鞫治悉從平反公欲騰奏又力辭之有母改適而子有後言訟其不孝君曰不為伋也妻者是不為白也母安得以不孝坐之申公稱其引經之決剡民張僖之子為盜所戕疑怨家黄氏為之黄無以自明君察其非殺人者故緩其獄得子之衣于東陽遂禽真盜又有王生與僧有隙匿田家之子使其交訟之旁引曲証僧自誣服君獨以為疑求之竟得于其家告者遂伏辜焉君之救荒不為文具皆出于惻怛之意所至疚心受賜者衆隆興之初畿邑大歉尚書薛公良朋尹京以事屬君君列急務六條獻之隨即施行給事程公叔達以六察行縣喜曰使諸邑皆如君尚憂飢民哉丞相史魏公聞丞之才常下君所陳盡發常平裁價分糶民為之謡曰飢不憂與之庾儒林季公民之父寒不憂今有袴儒林季公民之母既為縣又遭洊饑山谷窮民易致嘯聚君加意拊摩豫令富室致呉中之米七千餘斛丐于府得常平緡錢二萬于鄰邑始得按堵而嗣嵗尤甚禾未登場民已菜色秘丞朱公熹力舉一道荒政尤詳于越君求哀諸司得米四萬斛縣有二十七鄉凡為賑糶塲賑濟場養濟坊三十餘所戴星出入以課督之數月之後鬚髪為變朱公每貽書勞勉曰省刑緩賦以囘天意非體國愛民之切不及此也君為丞貳則悉心以贊其長謀事甚詳請于長而後行及為長則待寮友如兄弟莫不樂為盡力故所至皆有可紀而去輙見思卒之日剡中耋穉相持聚泣至巷哭以過車識與不識皆唶曰善人亡矣平日安于義命論説甚明儒林之命既下人謂君且通顯君曰吾豈以此釣爵位耶竟客授湖外以去巨公知巳甚衆亦有欲薦于朝亦或有尼之者君雖聞之不以介介至義所當為則奮然直前無所顧忌親故以出位抗論得罪後當叙理無敢保任君方為簿領慨然許之有貴臣過縣境冠葢相望或勸俱往君為詩曰不堪枉道依陽虎可是無心簡子敖聞者韙之亦以是終不得為時用可哀也已娶同里周氏清儉端恪克相夫子先君十年卒後以明堂恩贈孺人男五人復之泰之蒙之俱習世業次兼善舉善早世女二人長適進士林仲明次適陳權皆周出也君天資篤厚孝謹過人少小孤立奉祖母及母甚至未始暫去厀下有疾必躬治湯藥執喪以毁聞與弟兄光度友愛誦書作文自為師友終身無間言無他嗜好惟以論著自娛奉養寡薄俸錢多以買書别有文集八卷藏于家為文渾厚典雅言皆有用庶幾乎一飯不忘君者雅愛東山林泉之勝築室其下樓曰雙清軒曰靜寧欲為晚嵗歸休之地竟不得一日之適顧非命耶諸子將以某年某月甲子葬君于邑之某鄉某原以君之甥朱徳成之狀來求銘鑰頃官東嘉一見辱定交盡得君之書讀之相與益厚今其可辭銘然君志不負所學而見于行事者僅如許既已屢書于前惟所著之書當表其大者以示後世銘曰惟君之生未為不遇位雖不豐朝有顯譽章交公車君獨進御美芹之書一言而寤唐三百年曰宰曰輔汎論其尤姚宋房杜君獨究觀一一論著忠邪昈分咸有旨趣位非其據勲如汾陽而不與事有責備徳如晉公而不恕上可以發潛徳而誅姦諛下可以垂世鑒而切時務細繹乎義命之説磊砢乎經濟之具使用于世則必古人之與稽使之作史亦必大明于勸沮嗚呼尚何言哉後之君子必有撫是書而太息者銘實昭之用以載君子名于不腐者也攻媿集卷一百欽定四庫全書攻媿集卷一百一宋樓鑰撰誌銘朝散郎李公墓誌銘公諱宗質字文叔世家于濮六世祖文定公相真宗仁宗隠然為社稷臣子太子少師柬之諡懿靖又以名徳世其家徙洛中號西京房生中散大夫贈金紫光禄大夫孝孫則公之曾祖也金紫生朝奉大夫偉偉生晟承議郎知懐安軍贈奉直大夫配曰劉氏贈恭人公八嵗而孤未㡬而所生母展氏去嫡母四子又散于靖康之亂從兄提舉宗臣攜公入蜀聞叔父直閣旼亦在蜀中間闗尋訪至則已下世惟叔母劉氏在又公之從母也柔順賢明撫之如已子竟以直閣延賞命公紹興八年補将仕郎公有姊歸司馬文正公之諸孫與之俱詣行在所至江州水南始遇展氏于廛中物色良是司馬氏姊見之而信抱持相哭人以為孝感别十餘年而得奉色養者二十年贈安人赴調授右迪功郎監明州大嵩鹽場九年到官惟李氏代有顯人子孫目濡耳染為世吏師公年尚少筮仕筦庫臨事極不苟秩滿之日例裒花帶錢五十萬公悉謝遣之因家于僧坊晚卜居名塘遂為明之鄞人矣十七年為洪州新建縣丞二十年闗陞右從政郎就差處州遂昌縣令饑冦作于傍郡或告豪民将率數百人侵昬犯邑者公亟捕首惡斃之杖下而後聞于州羣黨帖息授湖州長興丞遇主上登極恩循右文林郎隆興元年改右宣教郎知紹興府蕭山縣未赴給事吴公芾為帥以會稽劇邑非健吏不可為奏改命公既至剸裁有方政譽甚休賦租素重公思有以寛之先是以奉永祐􅓖宫免三鄉支移折變公請依永安祖宗陵寝儀制舉邑皆免仍豁除折帛止輸本色吴公具以聞亦浹日而得上㫖父老歡呼拜詔至今紀之丁展氏憂服除權通判明州引寓居之嫌改隆興府時江西大旱安撫龔公茂良垂意荒政多以事屬公賑濟盡力全活者衆倅㕔有贏資頗豐致之公帑帥以助公之歸不得已以其半分給吏卒義不受一錢龔公益嘉歎之提轄行在雜買務雜賣場改通判鎮江府外臺以清亷公勤列薦于朝差知台州陛辭上曰乆聞卿才宜以節用愛民為務公祇上命罙自奮勵聽訟必先抑告訐懲姦惡郡有靜鎮堂退公不入私室危坐堂上吏抱案牘至前隨即決遣庭無留事暇則黙而觀書治家尤嚴外人無識子弟面者内外斬斬人不能欺理財精察量入為出無一毫妄費帑庾為之充衍增田于學以養士者㡬百畝上下贍足凡事整辦簿書器物位置粲然惟公之精力足以行之嵗時按閱及調戍兵遣海舟咸設方略羣立庭下厲威以臨之號令簡明凜有風采舉衆聳聽無敢譁者伍符尺籍一閱而識其人間有廋隠隨即擿發人以為神以故威名逺聞寇不得發發亦輒得治獄雖以寛縱為戒而重囚苟有罣誤之跡必求有以生之郡縣吏重足承命而未嘗輕用鞭撻每曰此曹但欲其不犯吾令然亦民也可魚肉之耶有婦人訟前母之子不孝者親子實使之公深得其情責以子不順母弟不恭兄一等繩治母不忍視求為母子如初諄複訓諭使之改事而退聞者服其平允年餘擢提舉兩浙東路常平茶鹽公事始至庫藏枵然八閱月而罷所蓄已四萬緡盖公之儉勤過人食不兼味自奉至薄以其行于家者移于官真有古人竹頭木屑之智所至不加賦而用以饒侵尋暮境倦游而歸不復有當世意尋差主管建寧府武夷山沖佑觀官五轉至朝散郎淳熙十一年公于是年七十有三矣素少病俄致其事或勸止之不可拜命纔數月遽感疾六月十五日卒于正寢若前知然娶夏氏朝奉大夫知徽州承之女能相其夫亡十九年矣贈安人以十二年十二月辛酉合𦵏于天童山南奥之原男四人長文鑄通直郎通判臨安府先公一年卒次文鎮次文錡卒于隆興次文鑑将受公遺澤文鎮實遜之亦以成公之志也女二人長適姜處俊再適夏祖禹次適登仕郎王祐之孫男五人澤涇津潛源孫女三人尚幼公系出名門而遭時多故且以孤孽不得于親挺身自立艱難險阻有人所不能堪者先世舊物不遺一簮致位部使者退而燕閒生理頗裕皆公刻苦以至此時出其餘以濟人遇嵗寒散廩以食貧者安分知足未病而挂衣冠可謂賢矣然惜其不究于用也先君工部久與公周旋鑰贅倅丹丘以父執事公公相與殆忘輩行治郡之績皆所親見侍坐從容猶得窺中原故家典刑年來憂居公時時相勞苦庖饌有珍解必畀以奉甘㫖方為林下游從之約而公亡矣公抗直有祖風不輕以詞色假人不知者或以為忤獨于鑰拳拳如許使人不能忘二子求銘公之墓義不得辭銘曰矯矯李公文定之孫奮身孤藐思大其門事無劇易遇之輒辦低徊宦塗惜用之晚丹丘之政尚有可紀使其用大所立必偉未疾引年得終其天公乎不亡視此銘鐫洪子忱墓誌銘余故人洪子忱以名家子力官業而試邑之始横遭上官摧折心實念之事既白會余從兄編修作州摩撫扶持使得自見一旦聞子忱之訃乃道逺不得摩其棺一慟其子以書來求銘言甚悲請甚勤紀遺事甚備愴然其不能自己也子忱諱蘩姓洪氏其先丹陽人曾大父固贈特進大父擬紹興初為吏部尚書終徽猷閣直學士左通奉大夫丹陽郡侯累贈左金紫光禄大夫諡文憲父光祖右朝奉郎通判湖州以君郊祀恩贈朝請郎妣王氏贈安人尚書晚居台之寧川君以婦家在南豐因家焉紹興二十四年通判遺澤補将仕郎二十九年授右迪功郎監興國軍在城酒稅未赴間以綱賞循右修職郎改監行在户部贍軍糴場君少孤有意自立一嵗金穀出入以千萬計倖門至多挾勢行賄變亂色價君一切裁之以公無敢犯者樞宻林公安宅時以户簉領糴事庖人以緘題補吏君察其偽白林公公治庖人甚峻奨君于稠人中時人兩賢之秩滿陞右從政郎又以賞循右文林郎授鎮南軍節度推官屬邑奉新有苖米五百餘斛名存而實亡公私交病宰以書抵君君為閱簿書得其始末告于帥而蠲之參政龔公召還尚書汪公為代問寮吏能否大參言君首公任怨臨事不苟尚書與君有連素知君者由是益善君督捕茶寇引以自隨無一日不同艱難功未及成而罷君復還官次分寧宰謝君磐忤後帥意有妄訴者降攝旁縣酒官囚繫滿獄君深知其誣會以漕檄行縣中父老皆詣君訟冤歸白漕使趙公汝愚始解一日帥俾君訊問即呼訟者究詰之皆無實状官吏俱按堵如故府西門火延燔數十家兵官五人捄焚甚力徹旦方止帥欲委罪兵官劾章已具君厯道其焦灼勤勞之狀始寢其奏五人者相率繫謝君無徳色淳熙五年改宣教郎知江州徳安縣始視事民以丞暴弱羣訴于漕臺跡狀昭晰丞竟罷去郡將芘之不可遷怒于君督責日峻君謀避之有以告守守益怒移徳安丞吹毛鍛鍊遽按以聞君時到官方月餘人皆知其無他尋置獄筠陽竟遂昭雪守去而君亦歸矣邑素劇至是愈不可為逋負不貲君力請于郡吏責少寛始得整頽綱而一新之春霖暴漲田家無所得食斂手待盡君載米家至損直以糶間有無貲者以私帑償之夏亢陽躬禱名山率家人蔬食逾月徹盖行烈日中或至忘食發廩蠲征弛刑緩逋以次舉行無不極其至已而甘澤霶霈謠誦相聞疫癘繼作飭毉藥謹䕶視頼以全活者衆崇飾縣庠弦誦不輟有刲股以奉母者奨勵有加邑人勸焉初癸夘嵗旱民負官租七千餘斛至是猶未及半君曲為之圖糴及三之二從漕司和糴米以足上供期以年嵗償之可以寛箕斂之煩林公枅嘉其意俾郡給千斛未能盡行也君惓惓三請謂不及今為之他日必至重擾迨從其言而君不及見矣人尤哀之君自禱雨得疾猶勉親細務寖不自堪顧孺人曰我父年五十三水浮膚而卒我年既及而疾又甚似殆不免矣遂以八月十七日卒于縣治之正寝神色不亂三日而斂如生也娶曾氏封孺人吉州教授發之女男五人柟孫棣孫栝孫桂孫椿孫女二人長未行幼早卒孫男一人諸孤将以某年某月日𦵏于某鄉某里君天資孝友推誠待物髙誼過人自痛禄不逮親且以蚤鞠于外家因仍未能還鄉嵗時祀享東望松楸追慕悽愴不能自勝幼妺未行舉部綱所贏又益以曾孺人槖中物歸李君司法順之季兄芑為邵陽從事逢郡侯之怒捕擊甚急君聞之垂涕徑走湖外往來都下願納禄以贖其罪移獄江西又哀訴于當塗諸公卒脫吏議閱數嵗始得官廣州道由君家别三日而僨于道銜哀星奔䕶其喪歸𦵏南豐又挈其孥于邵併育伯兄之子甘苦同之勉以學問弟葆聚首二十年使之有室周給無倦隆興寓客胡峽州括挂冠家居貧不能堪縣不加禮至以逋租沒入其田君請計嵗入以償責還半俸以活其家南豐宰盧君孝孫與君定交嘗以公事忤貳車既頼君解紛其死也又周之葉君大辯免官待命邑下君念其清貧餉饋無虚日且為求直于有司而君已病矣縣主簿之妻以免乳暴卒君驚惻不已委曲調護其家遇人有急難惟力之視人或負之曾無怨言方窘辱時亦有下石者已而待之如初更覆護其所不及人以為難民有姓胡者險健好訟君治之鼠伏又善諭之絶迹不至公庭君之喪胡泣于前甚哀良民失所依至巷哭以過車君在官名為二年莅事之日纔半其得人心乃如此潔亷自將祿粟圭租有升斗之贏必懲其人而歸之然剛直自任胷中無留事一有不平空臆肆言不肯詭隨以徇人雖以此故所在整辦然亦以此寡合君殊不暇顧卹乆而人亦亮之惜乎天不假之年見于事為者止是可悲已銘曰惟文憲公策名中興丹陽之洪藹然簪纓君志自立家訓克承試邑九江罪罟是嬰人皆謂君否終則傾齎志以殁聞者歎驚急誼首公尚有令名勒銘山阿以詔昆仍蔣徳言墓誌銘仕宦以作邑為難而又有甚難者姚江為越壮縣户口繁庶士夫駢集令才而勤猶不暇給四明蔣君徳言以便親為之宰貌不勝衣年又尚少平時簡易和同或慮其不能辦吏民亦望而易之去鄉近當舟車之衝毫髮不及悔吝必至此其甚難者府主丘公崈一世吏師威望赫然君一見白事已當其意退而視篆遇事風生曾未浃日聲稱流聞滯訟見則冰釋兩造至前或片言折之無不厭服得君書判者傳播道路皆以為神明催科徭役綱目簡明不妄施一箠而官賦夙辦受役者俛首以聴令丘公及部使者大稱之以為今日之最則又以其餘力修學校葺傳舍講序拜以崇義風歌鹿鳴以勸多士應酬曲當下情益通進見者人人自以為親已殆無一人議其後纔半嵗而屬微疾不閱月而不可為矣闔境相弔如喪所親日相與聚哭于門喪舟之行耋稚長號江滸雖古之循良乆于其職者未必得民之深如是是豈可以力致哉盖君家以詩書相傳父子自為知己者累世君少俊邁近嵗尤刻意向學刳心好問進進未已故其敏于政如此以是知非作邑之難顧其人不易得爾嗚呼斯民之不見徳乆矣如君能變愁嘆為謳吟于旬月之間曾不得究見所藴天遽奪之其不仁哉丹陽金壇蔣氏自東漢有封義興函亭侯者代為聞族君之曾祖猷事徽皇為中執法終徽猷閣直學士左宣奉大夫累贈少師忠言直道冠冕一時龍溪汪公誌其墓曰至今論宣和賢者必曰蔣公嘗守明州靖康來避寇難卒于海山𦵏隠學山子孫遂為鄞人祖謨右朝散大夫贈金紫光祿大夫父臺卿奉直大夫皆篤厚君子也母恭人張氏君諱綸徳言其字也以乾道三年郊恩父任為将仕郎五年試銓闈六年授迪功郎饒州安仁縣尉淳熙三年之官八年以强盜賞改承務郎知信州貴溪縣丁奉直憂不赴十年授姚江十三年七月到任磨勘轉承奉郎三月丙寅卒于縣治六月癸酉𦵏于定海縣太丘鄉富都奥之原與父祖之藏相望也君之在安仁已能卓然有立當路名公知已甚衆盡力所職殺傷者驗視必親人以不冤盜賊不敢發發亦輒得改秩之後憂患相仍祖母安康郡太夫人俞氏既喪而父行三人俱以毁卒君性至孝執喪甚哀調娱上下内外婣族了無間言君之志得行于其家而不得仕者七年性不喜治生而好周人之急客至必置酒不問家有無以是益匱得祿曾未信眉而已矣君之才有餘而夀甚嗇又素多病見于用者止此豈造物者不能延其定數姑使之發名譽于是數月之頃乎使又不得此則君之所長益無以自見而人未必信其能過人也今邑人稱頌之于前㡬不容口追痛于後乆而未忘是亦足以不朽矣君昆弟四人叔氏早喪君哭之不能自勝至于成疾與伯氏季氏友愛尤篤傍及羣從切磋學問觴詠相從甚適也去秋君以視篆之初不及秋賦伯氏季氏皆在選中又相繼之官搢紳以為榮太恭人首過姚江方将往來諸郎之間一旦禍起不堪晝夜之哭行道所不忍聞而况于親黨乎始余仲兄嚴州止一女為欲得快女壻戊子嵗就試漕臺歸而喜曰吾得壻矣有蔣氏子從其兄入場屋動翰如流取而讀之駸駸逼人父母少之未欲其覓舉上書請行氣宇爽甚閱三年成婚翁壻俱名薦書即徳言也徳言于余最厚既嘗為之状奉直之行今忍銘君耶仲兄之亡相抱持而哭且曰外舅既不可見事公猶舅也今女姪既失終身之託君以兄子為後曰興仁晚得一女曰餘拊之輒心折因君昆仲請銘于辭亦不忍也哀哉銘曰君之往兮秋風藹流聲兮與江俱東手摩兮瘡痍居無何兮民歌之忽不見兮何當歸父老頓足兮咨嗟涕洟君歸兮奈何風搖摇兮水揚波英爽兮如在託體兮山阿山可傾兮水可涸惟姚江之名兮不磨太府寺主簿周君墓誌銘君諱元卿字景仁别字聖予舊諱冬卿字成甫世為處之遂昌人曾大父諱從諌不仕大父諱逷贈少傅父諱綰左大中大夫敷文閣待制致仕贈正奉大夫以君陞朝贈光禄大夫文學清裁有重名兩娶李氏尚書諱南公之女孫贈永嘉郡縉雲郡夫人君縉雲所出也年十三以郊恩補将仕郎既冠授右迪功郎池州建徳縣尉光禄由祭酒遷吏部侍郎更今名奏承務郎監潭州南嶽廟充福建路安撫使準備差遣未赴丁縉雲憂尋監左藏西庫又丁光禄憂服除差充兩浙西路安撫司幹辦公事監左藏西庫提轄文思院提轄𣙜貨務都茶場行太府寺主簿淳熙十三年閏七月十三日以疾卒年四十有七積官至承議郎賜五品服娶樓氏封孺人伯父淮東帥諱璹之次子諱鏜之女子男二人長大受從政郎監泰州鹽倉次未名而夭女三人長適葉相次適樓椅次蚤亡孫男三人文之前君半月卒遷之将受光禄遺澤次復之三女皆幼明年九月辛酉𦵏君于明之奉化縣松林鄉桃花西奥之原君性明悟過人光祿為當世儒宗教子甚篤㑹伯仲俱殁于壮嵗叔氏寖長晚乃得君愛之尤切常撫之曰吾不患汝不能學然亦不强汝之苦學受命之後見葉氏甥肄業慨然曰吾舅也反不若耶遂發憤進學不半載下筆成文衆皆驚嘆自爾手卷不釋博貫經史雅有父風尤精班左二書前賢詩文稗官雜說動輒成誦鼓琴善自度曲挽弓能左右射舞劍擊刺圍碁投壺無不精到釋氏教律禪宗之說道家符籙錬養之法隂陽筮占推步之術一聞則心通類解記輒不忘發為文詞筆不停綴飲酒餘斗不亂席聞賦詩敏若風雨似不經意而語出驚人後或十數年問其故作歴舉不遺一字商㩁古今抵掌劇談通暢磊落四座傾歎間出雅謔應口如響又莫不絶倒也加以臨事能㫁有志于當世之務張魏公當國上書論十事皆國家大計魏公聳然異之欲擢置朝行而未果除左帑以旌其言又嘗集漢唐事跡切于今日者著要鑑三十篇獻于朝士友相期功名不足為君道長養成就當為一世偉人平時少病精力兼數人而小疾困之挾日而逝可痛也已帥幕多不以事物自嬰君曰食焉而怠其事可乎帥知其才試以滯訟剖決如流有㫖降神勁弓俾帥司製造以頒諸州君實董之且持檄徧閱于外工力精緻至今為用西帑最為浩穰君處之裕如又以其餘閒温習故業登名薦書間有綱運稽程調度偶闕上下搏手無䇿君臨時制變動中事機一日郊賚甫畢而嵗幣迫期當市銀七萬餘兩君威信素著老吏巨駔無不厭服出錢纔數千緡以次分授約期償直不日登足版曹賴以無恐尤器重之任滿增秩盖朱出墨入二年無纎毫詿誤乃始得此同僚皆藉君以濟文思雜用金玉寳貝綾錦之屬尤難稽攷君始創簿物以號别之至今遵用北使之來凡錫賚器皿下至徒御衣衾等物皆以職守次第按視至勤御覽君以為此特分賜行人不應過禮以傷事體起部以聞上深然之支用餘羨嵗乆積腐君請于部編估而鬻之得錢數萬萬以給工費侍郎李公昌圖賞歎不已力引于朝又以邊郡薦之𣙜筦嵗額八十萬緡類多虧數君始就職皆曰君來則嵗事無慮矣既視事宻詢訪得數十條皆名數期㑹所當先吏輩匿之以為竒貨未始輕出間因白事君引類擿發旁通無餘愕眙相顧莫知其所以然後雖有不在條中者亦不敢隠以是未嘗汲汲趣辦嵗未終而額已溢矣乙巳南郊攝符寳郎先郊三日命宿八寳于奉常君謂寳國重鎮也今先兩夕置于外非便日者祀明堂設寳于殿左宜即其所俟駕興以從㑹宰執取旨不及遂已然識者咸謂君知體焉勾稽外府方嚮于用左右揆知君素深自為筦庫時皆略去東閤苛禮見不以時君亦自喜有朝蹟将因是以見天子一吐胸中之奇使見于用當愈出而愈髙孰謂其止是耶然上而受知于當世名公往往期以國士與人無髙下賢愚又悉與之歡有以急難告輒傾身赴之匍匐救喪尤為周盡見有陷于罪者苟可以營護之無不至故位雖未甚顯而聲名已籍甚才雖未盡用而恩之及人者多殁之日朝列皆為之痛惜親黨鄉曲下至閭里無不咨嗟相弔葢其得人心者如此括蒼達官最盛皆與君至厚亦欲引而致之華途未能也光禄晚益清苦君性至孝奉承左右常時誦書以娱恱之父子兄弟自為知己談經論文侃侃如也執喪哀毁過禮叔兄已先喪一力任門户之責襄奉勞苦人所難能自郡至蓮峯𦵏所凡三百里水陸險絶又適大雪君徒跣露拜以禱喪行日光粲然道中灘水激舟㡬至傾覆君號呼入水負舟以出人共哀之初光禄與鑰伯父俱将漕湖南始議締婚伯父由淮甸丐閒以歸光禄入蜀道還使江東君乃就成于四明光禄自永嘉奉祠寓于鄞置田欲為終焉計後雖還鄉治命俾叔氏之子守墳墓而俾君來依外舍然君未嘗忘鄉國也君與人甚周而待鑰尤厚相從之日又乆兩仕于朝復更為鄰無一日不奉周旋頃鑰遭外艱銜哀星奔委家不暇顧經紀其後君之力為多思欲一致泣謝未果而以訃聞矣間過君家有慟而不知所從也大受乞銘銘曰括蒼之周文獻有傳光禄大之世推儒先君濟其美有志當世天分最髙身兼數器中都十年始有朝蹟夷途發軔何夀之嗇千載之英閟此一丘尚爾後人有發其幽鮑明叔墓誌銘友人鮑氏明叔将𦵏其子萬里萬石萬容踵門再拜求銘于余余為之悲始余數嵗時侍二兄從李先生若訥學明叔亦與其兄徳光受業于門既冠矣余兄弟皆以兄事之明叔二十六而入太學猶時時相過友誼日篤隆興改元試南宫明叔與鄉人張伯玉璧王彦方敦義同邸余與從舅汪公刪定求分以處而舅甥偶在選中今又二十四年矣回首舊遊徳光與伯兄俱蚤世伯玉亦不禄彦方止于一尉淳熙十年春仲兄與余䕶先君之喪歸自嚴陵明叔來弔甚哀未㡬聞明叔之訃為之失聲又兩月而仲兄不幸甲辰之冬刪定亦亡矣憂苦之餘親朋凋喪俛仰感觸尚忍言哉明叔之亡也余方在苫凷中不得摩其棺一慟今其可銘君諱俊徳字日新明叔其少時字也世居明之奉化曾大父遂良大父智俱不仕父璿以君故該慶典封迪功郎母江氏封孺人大父力穡起家迪功愛二子之敏入城就師友能相勵勉洛誦聲徹夜旦不休賦篇素工兼長于書多記經史子傳之文喜為人講說纚纚可聴以其餘力為詩詞發語清麗倡酬無虚時君性端重簡出自奉隨力不為異三兄繼殁獨任仰事俯育之寄經理生事米鹽靡宻處之裕如與人交闗務適其平門户雖大若無事者孝謹和易率子弟以學延名儒訓督之皆嶷嶷自立君尤篤親故見單寒者親解衣以遺之無徳色間有造門觴豆留連談笑彌日不倦庠校二十年閱人甚衆交情終始無纎芥之間儕輩或致位通顯曾不以毫末干請人尤敬愛之兩上禮部竟以不售病且革戒其子母為禬禳事遺言琅琅有序三月六日卒享年纔五十有六嗚呼可哀也已娶丘氏女一人孫男二人長曰初幼未名孫女一人諸孤卜地于嵩溪王奥祖塋之側以十四年正月己酉襄事銘曰吁嗟明叔而止于斯少也篤學㡬忘寒飢足用皸瘃目侵腦脂勵志愈確期用于時命之不淑十上空歸孝友衆知月評則推有子克家尚其似之我作銘詩維後之詒攻媿集卷一百一欽定四庫全書攻媿集卷一百二宋樓鑰撰誌銘朝奉郎主管雲臺觀趙公墓誌銘公諱善譽字静之一字徳廣系出太宗皇帝後曽大父仲暹䕫州觀察使贈開府儀同三司少傅嘉國公大父士迨武翼郎考不晦忠翊郎四舉進士以節行稱贈通直郎公弱不好弄年十二三誦詩書屬文如老成人未冠失怙恃固窮自立手不釋卷足不越戸不知飢渇寒暑之變兩試胄監乾道五年試禮部俱為第一登進士第調明州昌國縣主簿昌國邈在海嶼公介然有守不鄙夷其人為辨曲直皆明達平允邑人相與愛服之或訴于郡多願決于主簿今太師嗣秀王時為守俾攝邑事對易定海慈溪三年簿領而無撫字之寄踰二期三邑父老猶能道其惠政海盜竊發捕得全黨郡欲奏以上賞公言攝令捕盜不足為功誠不欲以人命希賞典嗣秀王為奏貸羣盜殊死力薦之朝公未始聞也授兩浙轉運司幹官忽報改秩知撫州臨川縣縣在江西最為繁劇公始視事即為文徧諭鄉井出于愛利之誠心告教既孚乃具為條目日限量地之逺近以定期約里長月不過一再至訟事皆躬自予奪頃刻即釋去牒訴日省縣乆困于豫借吏以嵗例來白且謂不爾必不繼公命取稅籍閱之逋負實繁盖上下蒙蔽無有發此者按籍征催不擾而辦有無額官地嵗入頗多以資妄用公白罷之復請併罷諸邑類是者或議虛市比之私創稅場請撤屋罷市公力沮之以從民便太守趙公曄葛公郯列治績十數條奏之有㫖中書籍記去邑五年人相與立生祠于縣治邑宰陸侃之記可攷也添差通判常州浙右饑饉躬行賑濟一郡賴以全活倉使以荒政論薦太師丞相史公上章舉士備言文學政事之美召審察差監都進奏院遷大理寺主簿秋旱下詔求言公草封事上之凡萬餘言其略曰陛下兼收衆善而言者志在投合搜抉隠微條目益廣而奸偽益生甚者唱為任怨之說竊徇公不阿之名一切付之不恤下情安得不壅習俗安得不薄和氣安得不虧乎天下之習日趨于褊狹機巧之域而無有優游舒泰氣象士不畏義民不畏刑則是二十年來攘臂建議争以為功者果何補歟夀皇嘉納為大理丞有以左帑宿蠧告者逮繫天獄官吏重足以俟譴公察其無辜謂將自其作俑者罪之則不可勝誅若㫁以一二年來且有刑罰不均之歎上覽奏開悟得末減平江民唐贇之獄皆以為凶惡無可矜之理公條可疑狀十六謂􅂍證無實情款抵捂卒釋之十一年充省試攷官六月除提舉荆湖北路常平茶鹽陛辭夀皇曰朕精擇得卿公論士大夫為已之心重則愛民之誠必虧營私之念切則奉公之志必怠得失之慮深則伏節死義之風必泯上深然之先嘗進南北攻守類攷上曰卿向所進書可謂有志至是又進易說謂聖人以斯道寓之書上又曰聖人以此寓之于書天何言哉易學要須兼通天人卿史學如此經學又如此及臨遣又曰卿向來學優則仕今乃仕優則學朕得人矣數日有請薦擢宗室人才上復言公經學文章雖士林中亦罕有之湖北大旱鼎澧尤甚入境一日躬走村落撫慰飢羸得戸四萬餘口二十萬通融諸郡常平之儲盡以為用賑糶貸濟三者並行動得其實疫者藥餌兼之奏閣貧弱夏稅是嵗粟麥倍收禾稼豐盈民至扶老攜幼來謝初行賑貸或謂洊饑將無所取至是民争負以償諸郡充足嘗奏買撲稅場十餘河渡四十五嵗入甚微而豪民大為民害盡罷之十三年除潼川府路提㸃刑獄重囚讞議州縣鬬訟稽攷平反細大不遺纔三閱朔漕使闕上稱公儒者可使治財就除轉運判官公嘗論國朝置轉運使本以收藩鎮之權絶妄用之蠧脫斯民于暴征苛斂之苦近時司漕計者特以賦斂為事號為材能者務趣辦而事督迫州縣之困弊民力之寛乏未始問也故其視州縣如一體有無緩急皆得上達悉力以應之諸郡所貸緡錢至十餘萬俾守貳置籍約以期年優裕乃償自是蜀東諸郡舉無憂熬窘缺之狀十四年詔諸路監司條陳民瘼公言賦役不均獄訟不平征斂繁急酒稅苛暴四事且曰陛下延見牧守固將以觀人才也而計臣請以奏劄之一陳上供之數郡守垂滿者莫不督責舊逋宿負征商𣙜酤肆行苟虐以藉手求進近議者有刑輕之疑帥臣治盜輒先斬以自劾而求彈壓之名使其皆當不過能速殺之而已倘歸之有司按鞫亦不免于死萬一愚誠不能自明寃恨之氣豈不上干陰陽之和乎兼遂寧郡事闔郡熙熙民有争競且曰公未始擾我其忍負之公措置常平深察宿弊擇官就倉和糴石増百金市有増損亦隨低昻聴民隨所有求售亦不限日糴之數實惠及民官儲充積公私便之所至就郡庠立學以教宗子率知嚮學持節東蜀凡三年士民愛之如父母遂寧尤所歸心寢疾二旬上章力丐歸主管華州雲臺觀百姓始則朝夕偵問相率禱祈及歸耋稚奔送涕泣不肯去既達寓里屏絶家事獨處一室圗史自娱一日忽謂家人將歸正寢且欲自為志翌日天將明燕坐榻上瞑然而逝十六年八月癸卯也娶錢氏僅再嵗而亡贈孺人再娶杜氏祁國正獻公之後封孺人子男五人汝傅修職郎新監舒州山口鎮次汝伋以公遺澤補將仕郎次汝儼次汝何國子進士次汝仲一女許適承奉郎楊㮤孫男一人崇揆孫女二人以是年十一月甲申𦵏于紹興府餘姚縣緒山之原通直墓左公天資髙明識見超詣研精性命之說發為議論及所著易說明白簡易晦菴朱先生一見歎賞以為擴先儒之未明頤正郭先生嘗序易書謂貫三才之理于其中一諸儒之說于其外二公師表一世于公特厚晦菴屢以書來相期甚至頤正出一編書公以奏之上孜孜好學公退不少懈率夜分乃寐嘗即國史所載深求藝祖開創之微意為書十四卷曰皇朝開基要覽又為皇朝聖政類編不幸寢疾僅成數十卷其他如南北攻守類攷晉載記年表皆行于時又有論語說鐃歌鼓吹曲祝堯文等詩文六十卷號恕齋類藁藏于家公孝行根于天性自以禄養不及祭祀務極豐潔悲慕不少衰弱弟稚妹備殫鞠育教之有成仲弟善與同登科季善􅞳亦以取應得官女弟再適人皆竭力資遣遇母家桂氏特厚舅氏既卒訪其遺腹子為之嗣且厚給之其他篤故舊撫姻族恩意稱是亷靖自將一介不妄取行郡例冊皆擯不使前按例饋遺者悉歸公帑刺舉尤所盡心苟賢矣不待其請舉奏牘面授之其在他州則郵置以達人知其不可以有挾無敢以浼公者間有按劾不以强有力為憚所部肅然楚蜀之士夫類能稱道之公抗志不羣砥節礪行不泥紙上之空言必欲施所學而見之行事尚友古人思與之齊人或疑其好異公不顧行愈力乆而益安人益信之攷求世故貫穿今古直欲立事業以傳不腐少名齋以宗迂以勵其操後名以恕其志將以及物也出而從宦苟有利于民圗之甚于飢渴救荒施舍之外又所在為經乆之計在昌國已能勸勉富室買田與山専為編氓嫁娶喪𦵏之資在湖外則率十四郡買田各畀郡文學司之毎三嵗則以給士之預計偕者在潼川則以漕計之餘使州縣置舉子莊孕者産者俱給之米皆至于今賴之使天假之年處以大位益攄所藴膏澤必將下于民而官止于員郎夀止于四十七識者痛惜之嗚呼豈以多記損心憤世疾邪而至是抑果有數不可逃耶鑰與公相見之日可數而相與特厚汝傅妙年躋世科大似其父率諸弟力學以守素業汝伋入太學盖前所未有義方之訓可知汝傅㑹稡公行事來求銘採其可銘者書之餘弗著銘曰熙陵諸孫嘉國好文流傳至公遂為儒門公起孤藐立志堅正尚友古人期與之並學貫經史仕更麾符學仕俱優形于帝俞平心濟民一變齊魯志勤道逺中道而阻齎志何言勒銘山阿有子繼之尚其不磨太府卿王公墓誌銘公諱卿月字清叔世居開封府祥符縣曽祖壊左朝奉郎大理評事祖阜和安郎父思正翰林醫痊累贈朝議大夫朝議辟地轉徙寓居台州今為台人公生于贑上嫡母太恭人商氏夢月墜于前以裾承之僅得其半是夜陸宜人實生公故以名命焉公頴悟不凡未冠而失怙恃固窮自守必欲以學奮身隆興改元試入右庠乾道二年中其科授承節郎徳安府復州漢陽軍都巡檢非其志也益進于學五年遂登進士第調温州樂清尉到官值海冦充斥制司督捕甚急諸將皇遽公處之自若宻使人扼其境路所出相繼就擒以授諸將不自以為功爾後獲盜不一公謂此曹雖有兇暴實以失業至此多為寛其獄識者知其為偉器憲使程公大昌奇其才薦于朝乾道七年十一月召對稱㫖改承奉郎守宗政寺主簿九年三月遷太府丞六月為秘書郎兼吳王益王府教授淳熙元年七月除起居舍人十一月除起居郎閱日兼權中書舍人二年兼直學士院公起尉曹不四年擢用為文字官制詞温厚真若素宦嘗草胡公銓詞云吾寧身蹈東海獨仲連不欲帝秦至今名重泰山微相如何以强趙人多稱之論事尤不避權貴是嵗為殿試編排官宣召之日繳奏池州守臣忤時宰之意因以帥才薦之五月除直祕閣知廬州時方年三十八在廬僅七旬而陸宜人年髙嬰疾請祠而歸日侍毉藥衣不觧帶五年春除荆湖南路計度轉運副使八月丁内艱哀毁盡禮甫終喪起知静江府當李接陸梁之後專務摩撫八年秋閱先期有告效用將殺將官以叛公廷詰而叱之曰前帥平賊功賞有不明何預我事我待此曹如子弟汝乃誣之耶械以屬吏且曰事畢當行軍法監司遣僚佐來欲用他日公不為動陰部勒以制其變仍攜家縱觀以安衆心效用謀既泄而形格比訖事無敢譁者歸即取告者謂當反坐汗喘不能言公曰妄人無知不足以膏吾斧鉞叱遣之效用又率其衆訴曰前日誣枉已蒙辨明而市井訛言不已願納軍器于庫以釋疑謗公善諭之羅拜而退為出錢五十萬于市許告捕訛言者翕然而定其處事類此時臣僚有謂廣西鹽法不便于民欲罷官鬻而行鈔法詔監司帥臣條具可否公力言鈔法之害五千餘言雖一時不能回卒如公所料十年七月移帥襄陽觀覽形勢極論事宜致于元樞周公大要謂襄陽重地當屯三萬人乞移荆南之屯併歸襄陽仍以鄂兵萬人隸荆南分荆鄂為二軍以襄陽為都統荆南為副未㡬夀皇令條列邊防利害公徑以此書繳進纔一年均州報金人侵地數里削木大書曰移封疆過此均人詾詾謂必開邊釁公知其妄奮筆為檄告諭邊民安業西府馳問所以公以家族保無他毎嵗敵騎多逼近境公與兵帥先期圍獵于郊視舊加逺敵騎遂不至又嘗虚傳有警為之出遊峴首抵暮而歸終以無事赴鎮之初遭嵗洊饑竭力賑濟奏陳至于五六田里得免流徙十一年言者乃謂公恬不講荒政十二月罷歸十二年再主管建寧府武夷山沖佑觀十五年冬除利州路提刑既奏事進直顯謨閣改帥瀘州敘人與石門蠻互市紛争蠻被殺傷者三公謂蜂蠆有毒不可不備奏易守臣練兵習武時忘戰日久士卒驕惰分習勁弓强弩躬自教督軍聲大振其後石門蠻王特錯果貽書卭部川都蠻王墨崖欲借兵以侵邊又集蠻衆二十部兵事勢甚急公雖已素備不忍戕民于兵令蕃漢耆長王文通父子諭以禍福蠻人堅欲得前敘守而甘心焉相持數月公諜知蠻中有郭萬肆者最號桀黠為之主謀致此邊患以厚賞生致之或請誅以示衆公曰此易爾恐復因此生事奏請縻以重役迄今役于神泉監蠻既失心腹之人始以印狀設誓待命下吏邊徼以寧紹熙元年進龍圗閣再任明年召還三年正月始至行在所除宗正少卿尋兼中書門下檢正諸房公事六月假吏部尚書為金國生辰使未行除太府卿已而瘍發于背或勸其辭行公曰君命不可辭也七月壬午行次揚州卒于舟中享年五十有五積官至朝請大夫娶趙氏先公十年卒贈宜人子三人好謙迪功郎紹興府諸暨縣尉好問好生並將仕郎女二人在室孫男曇將受遺澤孫女二人尚幼諸孤以十月己酉𦵏公于臨海縣之牛極山合趙氏之墓公性警敏記誦絶人先以武舉進既精習兵書武事又登儒科詞章贍蔚隨事立就議論通暢灑灑可聴古事今事問無不知旁通釋老之書百家之學游藝多能為士林第一醫卜星厯動皆精詣琴奕雅鄭入手輒工儀表瑰偉神情灑落唱第之日夀皇屬目良乆簡記盖有自矣從游玉津一發中的亟被金帶之賜在瀘南教士卒衆列兩旁百矢出帳中蝟集帖上無不駭服至于攷辨鼎彞古物游戲翰墨丹青一一造妙其他世故叩之無窮而又貫穿文法練習吏事恩威兼舉所在辦治心計有餘秋豪可察而持心忠恕事率從厚僚吏有請度其可用雖忤公意幡然從之故人樂自盡公亦不勞而事集疏財容物尤所難及厯官雖乆用度之餘隨以散施親舊無所計惜月給嵗賦旁及鄰里之鰥寡孤獨者身後纔有田六十餘畝書畫圗籍之外儲蓄無㡬暫攝檢正于讞議之際務從寛典亦有譏其過甚者公不䘏也居鄉恭謹無貴賤與之均禮閉門省事而不絶物不以一毫之私干州縣鄉人以此益加敬愛築圃北山之麓取孔徳璋移文中語列為扁牓泊然若與世相忘者徜徉盡日望之者以為仙平日有志事功留意世務擁麾㡬遍東南所至觀山川問風俗厯厯胸次獨恨未識中原張旜有行欲周覽洪河大山以賛國家規恢之略而齎志以歿薦紳痛惜之諸孤彚其遺藁僅得三十卷藏于家鑰客授東嘉始以同寅相與特厚贅倅丹丘周旋二年見輒傾倒嘗與之論兵公曰兵不易言也指授大略則又曰謹之戒之惟忍于殺人者可以言吾儕皆不忍也毎歎服之公自蜀歸一見即自言此行他無所得嘗從康節先生孫曾傳易數甚詳以兼官玉牒時時相過論人窮達夀夭奇驗甚衆許以傳授乆而弗得語其家人曰今年我當厄㑹萬里之行其能免乎一日取其書細焚之而去未㡬遂下世豈偶然也哉好謙兄弟來求銘余亦痛公之不得行其志也遂為之銘銘曰穆穆王公世家開封寓居赤城乃亢其宗始以武進旋以文顯一尉討賊賞謝彞典召對明光結知至尊不四三年西掖北門于廬于桂于襄于瀘所至稱最復歸中都司宗司府拭圭北行望舒感夢卒止于卿人皆期公出入將相齎志以歿天乎不諒六尺之軀才兼百人死而可贖人百其身我誌且銘辭無溢美以詔後人以慰孫子知婺州趙公墓誌銘公諱師龍字舜臣太祖皇帝九世孫曽大父令蘧邕州管内觀察使累贈少師追封昌國公諡孝良大父子翔修武郎累贈武節大夫父伯述武翼郎改贈朝散大夫前母錢氏贈宜人繼郭氏封太恭人建炎南渡公以紹興十三年生于長興先大夫宦遊遷徙尋定居于紹興府之餘姚公幼穎悟嶷如成人七嵗聴講春秋能觧其義太師史魏公初為邑尉二子與公同研席公日記千言下筆成章魏公奇之未習聲律以古體著雪賦甚工三十年取應授承節郎監潭州南嶽廟夀皇登極轉保義郎隆興二年以鎖試登丙科改授左承務郎監建康府糧料院郡委受輸庾吏以壓案銀來公正色叱去盡革宿弊俾自概量邦人已稱之有民田在大江中流訟久不決官吏憚風濤之險無親臨者率不得其實公輕舟徑至田所訪之耆老曲直始明帥閱其辭稱奬不已疑獄多以屬公仍兼領獄掾帥漕交薦秩滿調知武進縣訟牒填委剖析如流落筆精當老胥聳服縣為士夫淵藪豪民倚勢縱横嵗輸殿諸邑送使緡錢負數萬公諭以理而嚴其期㑹翕然樂輸不費鞭箠先期以足乾道六年騎軍徙屯旁郡屬邑分造廬舍將校邀賂公不從徙之磽埆地倍費工力公躬自督工落成又先他邑愛民御吏寛猛適宜而若老于吏事者而公年始及壯人尤服之守知其才事無小大皆與公謀年少行卑而俾兼尊長司攝郡博士宗子儒流又皆驚歎譽益聞部使者列薦于朝權知邵武軍陛辭所奏皆郡邑利民事進止詳華占對明辯夀皇嘉納且曰秀王之孫與卿同名孰為長公對曰臣為兄行遂命幼者更名皇族更名實自此始郡以運鹽為嵗計積蠧殊甚用度益匱僚吏俸給至累月不支公剗磢百弊規畫一新課入増衍去郡之日帑藏充溢至今賴之土俗慓悍至白晝以刃相殘有手刃十餘人者又多盜公重為之禁俗為衰止嘗捕强盜至庭公一閱知其非縱釋之邦人疑其太匆猝已而得真盜衆始駭歎以為神有富民兄子尚幼熏其目又寘毒食中幽囚以覬其死偶以他事到官須其兄子為証逾期不至俾搜其家得于僻舍瞽廢骨立非復人形公為析其産命醫用藥復為全人真生死肉骨之恩也興郡縣二學増其廩給鼎新貢闈士氣益奮遂有以經學冠南宫者造鎧甲承命最後而辦集最早試于御前彊弩不能徹而第賞乃次他郡上供溢額亦不自言郡人刻石以紀政績監司入境耆艾遮道攀留不可數計憲使謝公師稷首以聞漕使柴公瑾錢公佃繼之有㫖審察還朝欲使持節嶠南公辭以親老除知滁州未上丁先大夫憂服闋除真州奏事睿奬尤寵儀真酒政廢闕稅課日虧公為之削酒價以便民蠲征取以通商用度頓饒㑹南北泛使交馳供億數倍處之從容又以公帑之餘助漕計前此未有也飭武備修社壇百廢具舉諸司争言治狀歸奏民兵及兩淮備禦之策擢知温州温在東浙為劇郡人士尤繁公延見盡禮務以儒雅縁飾春秋釋奠于學元日序拜皆宴以觴豆儒士歸心焉閱牒訴數百紙不以屬吏治豪猾雪冤誣或持短長囂訟者得其情不欲已甚正色誚責之媿謝而去不敢復至庭下缿筩為清積逋殘欠追逮日繁公悉蠲之四邑不下數萬緡而公樽節有方不以乏告也吏有偽為符印以盜庫金亦為印鈔以欺鄉民者公據法黥竄吏重足一迹無敢犯者㑹嵗疫甚公盡力調護全活者不知幾人年餘以謡誦轉聞徙知婺州首蠲宿逋減折苗以寛民力罷酒務敷賣之擾人尤樂之纔閱月而公病一日謂家人曰吾數將盡平生不泥佛老不諂鬼神不好禨祥不信陰陽卜筮方術之書毋為禳禬使我為畏死戀生者名醫四集皆以禮遣之又曰吾死無憾惟八十之母不得終養為吾大恨吾婦吾子能孝能養有加于前則吾死亦瞑矣易簀之際不怛不亂以紹熙四年正月壬辰終于郡治之正寢享年五十一娶聞人氏封宜人子男四人希醇髙郵軍髙郵縣尉希一泰州如臯縣尉希白湖州烏程縣主簿皆迪功郎三人累薦胄監未上禮部希章尚幼受遺澤女四人長適文學應宗度及幼女皆先亡餘未行孫男三人長與慶次俱未名女三人十二月庚申諸孤將𦵏公于縣東石堰西㠗之原以秘書省正字顔君棫之狀來求銘余與公同登進士科相與素厚假守東嘉去郡數月而公至如臯又娶舅氏汪韶州之女契好益厚正字嘗在公幕下所載詳實可攷為掇其大者而序之嗚呼公簡重而周于物謙退而敏于事務清勤謹然諾事父母盡孝居父喪哀毁㡬不勝錢宜人早喪殯于青田公自幼聞之每深霜露之感卒遷奉以歸以公遺命𦵏于先大夫之近山弟妹嫁娶身任其責門内專守禮法長幼進退有度事無巨細動有䋲約内外肅然篤于教子雖吏道倥􅘓公退必使之環侍講貫經史商榷人物或通夕不倦故皆有場屋之效家素窶忍貧如鐵石食不重味衣無華采藏書外無他嗜好姚江一區之宅僅庇風雨觀者若不堪而公以數十口處之泰然治移于官吏事心計有不習而能者故所至可紀亷介自厲而以恕待人方在郡時親舊及寒士隨力周䘏各盡其意雖居閒亦以其餘周人之急作文若不經意而援筆輒就嘗採史傳治亂成敗之跡為博古摘華三十卷臨江築小室號翠霞有詩㡬千篇以名其藁他文稱是嗚呼惟我國家慶系繁衍賢才輩出進與寒畯並驅仕為朝廷重臣漢唐之盛不及也以公之才抗志尤髙而進學不倦使遂登用必有以大表見于世天不假之年其所施設著于四郡而止君子以其所已為足以知其欲為者可銘也已銘曰周强以宗宋祚尤隆本支日繁人材日豐公生明時不為不逢惠洽四州聲流南東然而宏博之習以早達而事不就逺大之業以中夀而位不充家學有傳餘慶所鍾詩以颺之尚詔無窮益陽縣丞趙君墓誌銘紹熙四年冬余待罪西掖臨江彭子夀龜年以秘書郎擢右史一日相與論近世皇族人物之盛余曰自元祐初子湜始見于進士題名至紹興十五年有伯攄者登甲科余時已省事人皆言南渡以來所創見此人必遂通顯矣後聞其沈滯選調而賢譽益髙子夀曰子之論乃及此耶此吾之婦翁也其仲子興化使君今夏遭母太宜人曹氏之喪以歸將祔𦵏于吾鄉清江縣建安鄉磐石之西宅原君之墓以君之行狀來欲併求銘于朝士子其為我銘之君字徳藴藝祖皇帝七世孫也曽祖世統贈安化軍節度使濟陰侯祖令杳贈昭慶軍節度使吳興郡公父子暉武經郎君生于東都睦親宅幼而穎悟不為兒嬉五嵗誦書數千言儼如成人吳興愛而拊之曰是兒必以詩書光吾門靖康避地徽之婺源武經赴調君年纔十四幹蠱有條道方梗踰年不聞問君晝夜泣禱一夕然臂武經心為之動投袂徑歸人以為孝感武經官臨安母孺人王氏屬疾君侍奉甚謹藥非嘗不進衣不觧帶居喪哀毁悲號感動行路兒有歌呼過門者長老呵止之汝不聞趙孝子之泣乎里巷肅然從祖令畤以王爵司宗必欲官之君以願學辭及隨侍臨江聚㑹數十人君盡力調娱羣從幼孤未立友愛備至躬率講習其後聨名薦送有登科先于君者髙宗嘗諭宰臣曰朕閱取應宗子伯攄程文多引詩書良不易得可令赴正奏名及臨軒放進士劉章以下至第九人見君名顧廷臣曰是能力學取髙第誠可嘉也召見稱奬欲加進擢君不屈于當國者止依格授左迪功郎徽州司戸參軍用特恩循修職郎太守初亦易君後知其亷勤而臨事明敏歎曰平昔自謂善料人㡬失之趙掾殆未易量也經界法行君躬按阡陌抑强扶弱不容奸欺樞宻何公鑄繼為守見君文體典雅牋奏悉以屬焉汪公勃歸自西府聞鄉人譽君甚曰吾頃為廷試諸位官嘗愛其䇿恨未識之㑹君沿檄至黟一見如平生歡即薦于朝秩滿循從政郎為鄱陽縣丞洪公興祖守饒亟稱之曰棄膏粱之習躬寒素之行宗室之標的也㕘政程公克俊方閒居與君論詩文或至終日二公俱薦之調栁州州學教授武經勉使之官不得已留家侍傍單騎以往至宜春慨然曰深入瘴鄉重貽親憂仕進非所急也遂乞侍養以歸初陳文恭公康伯知貢舉擢君為舉首及登㕘預聞君赴調喜甚延譽時宰欲振耀之㑹銓曹有南安教官闕君曰是可以便親他何求焉陳公欲留之不可曰此非所以處賢者姑以成公美志爾將之官代者祈少緩君與之同年為遲遲㡬年而後進㑹陳公入相或勸申前日之語君謂方安于此苟求非吾願也郡在庾嶺下君訓導有方士皆奮勵弦誦寖廣甫書攷遭武經憂哀禮有餘治𦵏惟按之禮經略陰陽拘忌之說曰𦵏者藏也卜宅兆而安厝之禮也親喪分當即死敢徼福乎服除轉為益陽縣丞張公孝祥方師湖南邑事多以付君訟乆不決君徐詰其情折以片言莫不恱服有求薦于提舉范公成象者范曰非敢惜此章欲留以待一賢者君眎篆首以剡上盖與君嘗寮知之尤深也乾道四年夏君以勤職而又禱旱重為暑氣所乗疾如痢瘧屏去醫葯起居如平時七月四日晨起猶對問疾者已而不言但以手加額若誦佛然而逝家人環泣忽顧曰母擾我良乆復瞑目既晡卒于官舍之正寢享年五十有五興化通籍朝列累贈君朝奉大夫太宜人少君五嵗開封人左宣教郎知海門縣棟之女有賢行安其夫之貧故能保其家而又教子以有立君之𦵏以其年十一月壬申太宜人之卒以五月二十七日其祔也以九月庚午子四人師侗從義郎永州兵馬監押師俠即興化也官朝奉大夫師攸師翰俱為承信郎監潭州南嶽廟女二人長適通直郎知文州軍州事王沇次適子夀朝散郎試吏部侍郎兼侍讀龜子夀彭年之字因已見前是以此不書姓孫六人希諫蚤世希謨承節添添差監永州在城稅務希律希訦希詢希許女七人長適王節之次許嫁王汝嘉次適承節郎胡晉餘未行曽孫女一人抑聞君之為人誠以處已恕以接物寛以待下儉以居家嘗教子弟曰人福力有分量當重惜之仕宦盡其在我不可苟求妄進與其有求于人不若無欲于已與其取賤于人不若以賤自安嗚呼賢哉君以二弟少亡撫教諸孤不翅已出君之長女未笄武經久已許嫁文州君方遭外艱語所親曰介弟諸女已長求配當先於吾女迨終喪則從子受室女出適又嫁一表妹然後畢王氏婣事親族之長者以禮待其幼以慈有疾或喪竭力赴之寒暑風雨不顧也未嘗談人之短聞人有善若已有之為人謀必長慮郤顧為經久計而忠告之性酷嗜書經史百家無不該究手抄者至數百卷動以書自娛曰老矣豈以求進但欲賴此收放心免為外事撓耳奉佛尤謹旦必課經終身不替世味沖澹不蓄長物其容退然而所存甚逺使盡其才用于世必有大過人者厥後孝宗尤親睦九族搜取人才中外進用不減周宗而君止于中夀墓木拱矣豈非命耶興化能以才諝自見庶將大其家銘曰猗嗟益陽宗姓之望也少登巍科中興之倡也受知思陵迨文恭之相也竟沈下僚何天之不諒也道行于家而賢譽之暢也使盡其用㡬今之劉向也我問其賢而銘于既𦵏也後人勉旃尚惟宗之亢也永寧郡夫人孫氏墓誌銘夫人姓孫氏池之石埭人世為大家曽祖某祖某父某夫人幼而警敏事父母以孝長歸故中書舍人直學士院王公鎡公以一時名儒篤學洽聞典内外制光顯于朝每語人曰我方窮約時刻意于學夫婦攻苦食淡久而愈相安及從仕以來尤能齊家治内賔祭省禮略不以累吾心所以得專意宦學者皆其助也以是人益知夫人之賢舍人書無不通尤精于易一日自卜卦顧家人曰吾殆將死矣遽捐館舍年甫四十有三夫人不堪其憂時舅姑在堂幼孤滿前舍人清貴無生業家道艱窘姑實繼室性又嚴厲夫人身任一門之責娛侍阿姑率能當其意舍人有弟為廬州録事㕘軍亦早世孤嫠又衆夫人經紀其家撫愛其子女不翅已私憂樂與之同婚嫁與之均人尤以為難孀居十餘年二子長立從仕則盡付家事不復介意且曰我辛苦教子幸爾輩能任事吾何求哉安輿往來兩間優游自適專精佛課諷唄無倦色暇則歌酒為娱含飴弄孫如此㡬二十年長子宰鄂之崇陽迎侍滿秩夫人以微恙卒于郡中頭陀寺之寓舍淳熙二年九月五日也享年七十有三二子長曰溉朝請大夫直祕閣知平江軍府事次曰渥故朝請郎守大理少卿致仕女五人承議郎新通判施州湯允徳迪功郎臨安府教授章綱進士李昌齡汪淼李熙載其壻也孫男七人長木蚤卒次克昌從事郎充四川都大茶馬司幹辦公事次伯昌迪功郎次東文林郎江州彭澤縣主簿次夢昌次汝昌次楠迪功郎嚴州夀昌縣主簿克昌暨東俱嘗上禮部而夢昌兩預首選孫女二人長適承事郎監建寧府大挺場葉延年次適承事郎監無為軍崑山鎮虞方簡夫人始𦵏于石埭之黄龍山少卿嘗位于朝方以才奮而遽下世東其子也痛其父齎志而歿日者又盛言黄龍山之不利紹興三年啟夫人之穴謀改卜焉平江時方將漕西蜀既歸遂以五年九月望相與遷𦵏于九華山下鑰少嘗誦舍人之文三入脩門不及識少卿及平江為戸部郎一見如舊識慶元改元自吳門貽書以夫人之銘相屬且示以巴之通江陳宰淇所狀遺行而鑰已得婺而歸今日又以書來曰子既得閒其遂成吾志惟夫人淑範懿行皆可得銘因平江之請勤甚敢敬書之銘曰惟紫微公掌内外制謂將枋用而不永世二子克家以才致身熟知閫範自孫夫人夫人之賢用心均壹始任其勞終享其逸九華之麓千載是藏我颺以詩後其允臧攻媿集卷一百二欽定四庫全書攻媿集卷一百三宋樓鑰撰誌銘高端叔墓誌銘余與端叔游舊矣宦游契闊而情好愈篤蓋其清苦勤敏皆余所畏而與人薫然又不得而疎也投閒來歸攜變離騷一軸遺余曰試讀之當相與論其當余退而讀之擊歎其精深而悲其志方將與之痛飲而極論之而端叔已病病久而不可為精爽猶前日也一日遣女奴來手札炳然以所藏歐陽公為進士時白襴及其史藁詩章見遺且曰吾將亡以此為永好辭之又至未幾而亡矣實慶元三年九月癸丑也往而哭之哀將葬其門人來告曰先生葬有日願得銘其墓余為之泣曰嚮固嘗狀其先君之行今又忍銘端叔耶卒敘而銘之君姓高氏諱元之端叔其字也韓國武烈王曾孫曰士擥朝議大夫是為君之曾祖祖公仔右宣教郎燕山府路宣撫使司主管機宜文字考世埴修職郎致仕母洪氏封孺人高氏家薊門五代之亂徙濠梁又徙亳是為蒙城高氏後居京師建炎衣冠南渡修職始寓明州今曰慶元府著籍于鄞安貧而喜教子君性穎悟絶人勤篤亦絶人居近市獨處赭山蕭寺顧無書得易一編晝夜誦不輟遂曉大㫖鄰士異焉稍借以書君下意質疑謹聽强記執禮甚恭人亦樂告之饑寒寥落辛苦萬狀人或厭且怒至排擯不容瀕死者屢矣而志愈厲夜依佛燈寒擁敗楮或數月不盥櫛由是博通經史諸子百家之書少未知名屯田郎三山鄭公鍔一見竒之俾訓其子鄭公為鄞士師表人以此加敬始寖得束修以奉親且力于學今漳州使君傅公伯成為教授折節定交不以諸生遇之由是門人益衆殆數百人少讀襄陵許公翰書及從沙隨程公迴故尤邃于春秋博采諸儒所長搜抉無遺聞人有書曾不憚遠裹糧徒步而求之前後凡三百餘家訂其指歸刪其不合者㑹稡為一書間出已意號義宗蓋十餘年而後成晚多所更定專務明經自三傳而下不盡以為可吾鄉及旁郡之為春秋者多出君之門或其門人之弟子也嘗病學者不務下學上達驟而求之太高故自天文地理稗官小説隂陽方技種藝之書靡不䆒極雖庸人一技可取亦盡禮問焉佛氏大藏經五千卷讀之再過他可知也含英咀華以昌其文困阨多故其思苦憤悱極故其得深真有劌目鉥心穿天出月之工既乃日造平淡以幾于古作詩數萬存不能什一自謂樂府不媿前作嘗謂離騷之學幾亡矣為之九篇曰愍畸志曰臣薄才曰惜來日曰感囘波曰力敶曰危衷曰悲嬋娟曰古誦曰繹思深得三閭大夫㫖意且曰變離騷者沿流于千載之後而探端于千載之前非變而求異于騷所以極其志之所歸引而達于理義之衷以障隄于隤波之不反者也又者班固揚雄王逸劉勰顔之推揚之者或過其實抑之者多損其真宋玉賈誼東方朔嚴忌淮南小山王襃劉向之徒皆悲原意各有纂著大抵紬續緒言相與詹詠而已原之微㫖不能有所建明噫君以為騷人之本意將亡君之意又將誰明之耶性嗜書家藏數千卷手自㸃勘寶之如珠玉遇所未見解衣輟餐不計其直又好周人之急有古人内溝之心田不滿半頃或割十畮以遺親黨事父母盡孝浣濯炊爨必身親之初入郡庠一羮胾必以奉甘㫖而食淡自如人設異饌不敢嘗必歸以遺親平居無疾言遽色彊力而忍訽薄之以患難而不可奪教導生徒勤慤盡誠如訓己子貧者致貨財則卻之而訓愈力有念其孤苦衣食教誨卒名于鄉君無德色也婺士柳義老于逆旅君哀其窮率鄉人供給之死為之棺斂至殯于家皆人所難乾道四年薦于鄉淳熙改元又為第一凡五上春官卒不第僅得因慶霈以榮其親去年當受特恩不就年纔五十有六而卒疾既革不食者月餘自分必死卻葯屏醫而處之怡然區處身後事纖悉無遺獨以不得終養母氏為痛修職葬奉化之察亷岡力疾作書以母氏他日事屬其門人屠君槐以其居近察亷也且為書以别親舊君子曰終豈不信哉豈不哀哉娶朱氏里士友聞之女先三年卒子男三人子高子亯子文一女淑尚幼家貧無以葬門人相與經紀其家以十二月甲申葬君于桃源鄉蔣山新盛隩之原始修職生名門實為殿撰睢陽劉公棐之甥君學問固有自來蚤受知于殿撰從子侍郎孝韙周公侍郎綰周公年八十有二為君記謙齋稱君之刻苦雖聚螢積雪和膽刺股不能過也屬文贍蔚咄咄逼人學益富文益進行益修此其志欲立于萬人之上而以謙名齋可謂有志之士矣客游括蒼吏部何公偁風裁最高愛君之才教以詩律其子參政公遇君尤厚至今不衰也禮部㑹稽陸公游文章少所許可以詩人稱君君又好前輩遺墨故物對之則起敬如見其人得之則喜而不寐以遺余者一二也老校退卒與之語中原及兵家事抵掌忼慨有封狼居胥之志故論兵法尤精或得其一䇿以干時宰諸公為之驚歎使得少分自見且將著于事業而坎壈終身不得一官以死豈非命耶義宗百五十卷又有易論詩説論語傳後漢厯志解各一卷揚子發揮三卷詩三千雜著五百號荼甘甲乙藁藏于家嘗結廬察廉在大小萬竹之間著萬竹先生傳自言為人達生任性不拘拘儒者之節好學而未至于道好文而不中繩墨好閒而刳心于古澹苦吟而不能自已鄉評亦謂君有不可曉者三貧而疎財貎古氣嚴而樂易已甚衣冠垢敝望之如木雞而胸次灑落綽有晉韻知君者以為然銘曰君之生兮何為君之往兮何之學窮百氏兮五上而空歸蓄書萬卷兮竟死而何裨天不可問兮吾將誰訴君視如歸兮吾又何悲志在乎魯史之義宗文存乎楚人之騷詞噫後有欲知萬竹先生者其視諸斯工部郎中曹公墓誌銘代汪尚書公諱耜字仲本姓曹氏世為開封府祥符縣人曾祖之器宣義郎祖組由太學登宣和三年進士第晚因郊祀進祥光賦徽宗稱賞召試中書省換授武階兼閤職仍給事殿中仕至道州刺史有箕潁集叅政謝公克家為之序父勛得世父官厯事四朝為昭信軍節度吏開府儀同三司累贈太師諡忠靖三代皆贈至太師宣義為嘉國公道州為魏國公忠靖之亡也高宗皇帝在德壽宫悼念平昔賜以宸翰具言其嘗從徽廟北狩親被密㫖持御札御衣以歸俾予繼統且達二后書信請梓宫太后之還盟烏珠而卻其師木烏珠舊作兀今改後同使逆亮而得其情且曰終始一節夷險不渝厚其賻贈之禮因疏行事大概賜其後且見予不忘之懐搢紳讀之無不感歎以為君臣之際古所未有也公為忠靖仲子幼而敏慧孝謹好學屬文忠靖尤愛之紹興十九年忠靖為保信軍承宣使以郊恩奏補成忠郎二十六年添差幹辦翰林司二十九年忠靖北使適當危疑之時高宗念其忠勤無以示寵遇之意乃召公赴中書後省試䇿深喜其才特改授右承奉郎差充奉使大金國信所親屬十月充顯仁皇后􅓖宫總䕶使司幹辦公事三十年幹辦行在諸司審計司三十二年除軍器監主簿隆興元年知大宗正丞二年遷宗正丞乾道二年以便親主管台州崇道觀四年差通判紹興府五年除太府寺丞俱不赴添差通判明州公未嘗厯州縣而曉暢吏事通練人情如素宦者時嗣秀王出鎮多以郡事委之公亦盡心禆贊相得甚歡八年太上皇帝時以皇太子尹京妙選寮宷除公臨安府推官尤被眷奬未幾隨府罷出知嚴州年未四十初試畿輔為治得寛嚴之中吏民安之尚書張公枃亦以妙年為别駕俱敏于政庭無留事至今相與如兄弟然錢塘江岸為風濤所壊大興工役公進錢萬緡石版五千片以佐其費朝廷嘉其不擾而事辦特轉一官以寵之淳熙元年秋丁忠靖憂執喪盡禮號慕毁瘠聞者稱美始忠靖既奉梓宫太后以歸功高眷渥見忌于權臣因丐外祠卜居天台至是奉喪歸葬遂為台人四年起知徽州到官尤篤意民事剖決滯訟皆得其平山城民生甚艱下至薪炭㣲物必竭力而後得之公知其然因細民負重至城而不能售遂以官錢居之以俟嚴冬用元價以應民之須初非有規利之心故人皆感其惠因此乃反致繁言江東大饑公拊摩如不及荒政備舉而百姓終以艱食未免流移孝宗皇帝深軫疲甿令言者以徽饒二州流民獨多謂不峻其罰則無以勵方國遂與饒守俱鐫三秩停任于是列郡聳然民益受賜公退而安之不敢自辯尋主管建寧府武夷山沖佑觀十三年差知衡州十六年冬陛辭奏事太上一見曰此吾尹京時賢寮也問勞甚寵留為尚書司封郎官以職兼司勲避父嫌名改工部郎中既出親擢朝士不知所自或告之故且曰曹工部宦逹最久今日卿相在小官或布衣時已嘗丞宗正矣公以故家子雍容省戸言議文采豐蔚可觀人始翕然稱之謂其宜有以得此也紹熙改元夏上章求外補差知常州未赴以諭罷明年復任沖佑慶元元年差知蘄州待次里第三年閏六月乙未卒于正寢享年六十有一積官至中奉大夫祥符縣開國男食邑三百户服四品娶洪氏吏部尚書擬之孫通判明州光祖之女封令人子男二人恕承奉郎志忠翊郎改奏授迪功郎處州松陽縣主簿俱先卒孫一人復將以遺澤補官是歲八月丙申葬公于臨海縣靖安鄉小石保之原忠靖奉佛老甚謹即小石建精舍以延往來公奉先志又加葺焉先一年自營夀藏于其側從新卜也公生長富貴而以儒素自將幼少無驕矜之色忠靖出入禁中手擅筆墨而謹畏無比有萬石君之風避遠權勢辭謝寵榮高宗知公為愛子又閲其詩文故擢之朝列後受知于太上進登郎省然三十年更厯内外才不見于施用迄止于此非命也耶忠靖樂桐柏山水築庵于西偏高宗書沖嗇二字榜之傍有雲壑尤勝公閒居日久增飾其舊徜徉于中意度蕭散不復嬰拂世故獨好以餘財為鄉曲義事為邑中建西橋甃通途榖貴則損其直以平市價雪寒則散所積以賑貧民死喪者助以棺斂逆旅者濟其空乏野有暴骸為之焚瘞建佑聖殿于松隠山為一方祈福之地水旱為沴必齋戒躬禱多獲嘉應自邑入郛有三渡之險為置大舟以濟不通民户無擾邑人德之故死之日士夫相率致祭厯言其事鄉閭無不嗟痛嘗過越上見茶園路僻雨濘則不可行又天姥一嶺尤巉巖難進皆捐金平治加之以石為利大矣官至六品賞延未及其子先以奏弟之子怤今為奉化縣尉宗族親黨倚以自給者甚衆風誼出于天性非勉强為之者達于時變自以再世由文華際遇累朝亦欲以此自見既不得與寒畯爭執每遇吏事必疚心圖之觀其所已見者如此使得盡其才設施必有過人者既感疾卻葯弗進嘿無一語及家事恬然而化又可知其所存矣修謹潔亷仕途略無玷闕新安雖坐嚴譴無有為之明白者及得毘陵言者止謂引疾丐去不應治劇當别與閒地然其中却稱在徽之政捄荒自有條理而人或咎其有膏梁之習夷攷其迹乃大不然罷非其罪人多冤之由是知人有善可稱者公論自不能掩也噫公今亦可以無恨矣某女弟為洪文憲公孫婦與公有連又素相好也公之將葬復在齠齔奉祖母洪氏之命求銘余既哀公之不究于用子皆蚤世不得詳載行事姑掇其家所録參以平日見聞者為敘而銘之銘曰有周振鐸始封于曹參起相漢至當塗高中更累代達者蓋鮮惟我國初武惠最顯猗歟太皇門多侯王公家晚著奮于潁昌曰文曰章名馳宣政忠靖繼起閥閲益盛公實鍾愛克世其家蚤登三丞荏苒歲華受知太上始在郎列卒不得施蘭摧玉折二州遺愛一鄉隂功孤孫秀潁其報必豐天台赤城父子仙去我惟銘之以詔不腐孺人俞氏墓誌銘紹熙四年余為殿廬諸位官臚唱之日掌以甲乙科號名奏御時前五名婺人居其四君相以下皆動色以為一郡之盛喬君行簡則第五人也余從父弟鏞嘗與喬君兄弟同研席又與行簡為同年生同以表牋事人期集所時相與見過故與喬君尤稔慶元改元余既丐外得婺而歸喬君有書介鏞以來則知去載季冬之癸酉遭其母太孺人俞氏之艱矣未幾又以教授李君誠之所為太孺人行狀至且曰行簡不孝不得以一日之禄奉吾母菽水願求銘以賁九京余哀其言又知李君非溢美者遂摭其實而書之太孺人世家東陽曾大父羲大父咨益父嗣囘年二十嫁同邑喬居士森時舅姑已歿恨不逮事事其神主于正寢如生問其平生所嗜如古人所謂昌歜羊棗者歲時祭祀必供焉見親黨之事舅姑者每加羨慕且曰宜善事之吾不及盡此禮矣治家嚴整内外肅然自奉甚薄時儲酒肴以待居士之須賓至則奔走治具晤言燕語必以善道有犯者諭居士以不爭居士深于黄帝岐伯之書鄉有病者多即之頗厭其繁必勉之曰是可以濟人不務規利何厭也由是所活滋多比鄰以室廬求售成劵已久忽欲復取人皆難之則贊其夫曰法不可復取矣然彼戀故棲而我必取之則非所安也居士即還之其人感悦終身居士憂二妹之嫠而貧孺人慨然曰吾未有以報舅姑況君之同氣忍坐觀其失所耶併其子挈以歸撫養皆有恩意有子不責以營生惟勉之學里巷舊無學者喬氏獨闢家塾延師儒以為之倡逺來者館榖之弦誦日相聞助成居士之羙皆此類也寡居之後身任家事一毫不以累諸子子嘗手揣輕重曰是猶足存耶既不得求師四方則合鄉之秀士相勵以學業當論文時往往立屏間傾聽記其要處退必詢究之不㑹于中不已也故士亦樂與其子游升堂進拜禮如家人春秋寢高子屢舉不得志念無以慰母心則諭之曰吾欲汝為善士豈求必于進取乎行簡以上第歸鄉曲歆豔孺人視之淡然徐省其私持身益謹不以驕人始為之喜及屬疾既革則又曰吾生于宣和之三年至此不為不壽汝曹第求自見于世以顯其親禄養不及吾無憾焉人以是知孺人之教子眞有義方非夫慕富貴以為悦者也子三人長德佐先三年卒次子驤業儒幼即行簡也從事郎饒州州學教授女二人長適王元諭次適杜之琮孫男三人從龍次龍元龍女六人尚幼先是長子既喪孺人于婦孫慈愛有加至是冡婦鄭氏以毁卒亦可以知婦姑之間矣十一月丙申將合葬孺人于居士之墓孺人嘗該慈福慶壽恩故得封云銘曰柔而寡識閨門則均愛而失教婦人之仁猗歟夫人乃異于是以義相夫以學教子子登甲科喜猶未深察其所安始慰于心壼彞之懿莫此為盛我銘諸幽尚篤餘慶趙明道墓誌銘慶元二年趙共甫自丹丘来主鄞簿粹然佳士也已而其長兄見過晜仲俱賢意源流必有自一日共甫為余雪涕言曰先君之葬三十餘年矣既不及銘願有以表墓道庶幾有傳焉以贖不孝之罪且以行實來余悲其意矧共甫之言篤實必無溢美為次而書之昌陵皇子燕懿王德昭生彰化軍節度使舒國公惟忠舒國生定州觀察使博陵侯從實博陵生保康軍節度使開府儀同三司房國公世彊是為公之曾祖房國生皇兄昭慶軍節度使安康郡公令磾是為祖武德郎子祐公之父也武德南渡轉徙久之始寓于台公諱伯直字明道建炎二年三月詔宗室羣試于有司特授承節郎累轉至訓武郎初監南劍州沙縣鹽税厯台州黄巖縣酒税明州奉化縣税婺州兵馬監押以親老不赴三任嶽祠再調贑州興化軍兵馬監押明州兵馬都監又以外艱不赴遂主管台州崇道觀乾道三年八月辛丑以疾終于家享年六十有五十有一月丙寅葬于臨海縣大固鄉蔡嶺之原去武德墓西少南三十步娶程氏以紹興二十一年五月庚子朔卒殯于白龍潭之精舍至是合焉四男子師絃今為忠訓郎添差充潭州排岸次師泉亡矣次師絳保義郎添差監婺州都税務次師䢼修職郎共甫也各以科目進二女長適修武郎李蒙次適成忠郎張萬孫男九人希魚希珉希賀希淵希魯希㻦希韺希韶希梴女十人公生承平時習見富貴而天資端靜莊謹自將長好儒學善屬文治尚書博觀史傳尤習知國朝憲章性至孝兵燬流離事親就養無闕武德晚嬰未疾葯必先嘗而進十餘年如一日居喪毁瘠兄弟和樂無間言介不絶物和不同流聞善則勇于必為見惡則避之若將浼焉居無縁飾動有典刑雖退然若不勝衣言如不出諸口至是非利害剖決明辨人以為不可及横逆或加未嘗校也蓋其質本夙成而厯世故蹈艱險困心衡慮多識前言往行故能躬行如此居官廉恪御下多得其心在章貢日羣卒忽擁門告曰軍且變恐併害公盡徙公家出城而後去公始諭之不從乃㣲服間道以入迨羣集郡庭則公從中出衆愕相顧因開譬禍福羅拜聽命事遂息公雖不自言而郡人甚德之自奉雖薄而豐于祭祀教子嚴篤觀其義方之訓可知仲弟早世公善撫其孤卒使有成有子師酇今為承節郎公恬于利禄北客之同寓居者如參政賀公錢公皆欲力挽其進公謝曰國家多難大父而上陪葬山陵悉淪異域痛心北望不如無生禄仕實非素志家貧親老無以為養故未能自已而暇求榮耶二公皆愴其言不欲强也晚號老圃每愛歐陽公吾欲四時攜酒去莫教一日不花開之句負郭卜居手種花卉時節互秀無日不徜徉其中帶月荷鋤臨風曵杖㣲吟舒嘯自適其適既不事生産禄又不足代耕因以别畦藝蔬日鬻以助用安分自足與物無競超然獨樂以終此生嗚呼賢哉使其得試于用其志決不在富貴而已惜其終不少見于世然胸次夷曠無毫髮怨尤形于詞色識者可以見其所存矣余以淳熙五年贅倅丹丘一介之善多與之接聞公之風已後之矣幸因其子之請得為公銘姑以致尊慕之意云銘曰王孫翩翩舊聞其賢篤學自立詞采燦然孝以事親欽以奉先半生漫仕樂以窮年教子義方科目相傳定交令子獲聆緒言老圃之適吾將學焉為發幽光見此銘鐫奉議郎黄君墓誌銘君諱仁儉字約之姓黄氏本出建寧浦城谿東之族慶厯皇祐間高祖銀青仕于中原因家于陳之宛丘曾祖好謙朝散郎知潁州贈通議大夫祖宰承事郎特贈直秘閣累贈金紫光禄大夫父子游朝請大夫以君升朝贈奉直大夫母武氏贈恭人紹興初奉直自度支郎出守台州遂居明之奉化縣十三年之任補將仕郎次年監潭州南嶽廟次調嚴州淳安縣主簿秩滿以奉直年高不敢去左右再奉祠未幾遭外艱服除監台州支鹽倉厯處州青田縣紹興府餘姚縣永綱賞循從政郎孝宗覃恩循文林郎高宗慶典循儒林郎引年致仕授通直郎賜緋衣銀魚今上登極轉奉議郎慶元二年四月丙子卒于黄巖長子官舍享年八十有三娶高氏建昌軍通判公惕之女后族也先四十一年卒再娶陸氏處州通判康民之女實左丞諸孫先八年卒皆贈孺人子三人直行迪功郎監台州黄巖縣鹽監管押袋鹽次直古早卒次直義女二人長未行而亡次適進士陳經孫男三人正蒙正需正師女四人長許適進士鄭樞君先葬高氏于縣之寶化山又自卜壽藏于禽孝鄉車盤隩之原既葬陸氏今諸孤以十二月庚申奉君之喪合陸氏之墓君家世多名德性警悟長于記問史記兩漢杜詩韓文黙誦連數百言無遺忘及見前輩逮事直閣公典刑具存多記承平舊事談之纚纚不倦内明而行以至誠不事外飾居家孝友端愿絶口不言人過有德于人亦不道也確守官箴亷勤自將不為矯激沽名事韜晦恬淡不與物競人莫窺其際淳安俗獷悍競渡多致殺傷尉懼而在告君攝事處之以術帖然不譁邑人謂未有也嚴歲取米數萬斛于婺多不得全數君被漕檄受米于蘭溪去取以公吏不能欺婺既如約嚴乃得實用焉在台攝郡幕給軍衣有紕薄者羣卒掉臂忿怨坐上倉惶失措君徐呼其長諭以禍福羅拜曰黄佛子有言安敢不聽汔事肅然邑隸縱𣙜貨受賕不盈尺而法當流君攝法官曰法重情輕可從輕乎吏以為不可君曰法本忠恕非爾所知請于守詹公儀之卒如君議赴青田日道由縉雲今樞密葉公自户簉居喪一見道舊久之且曰青田鐵阬錢多以促辦害民今得長者為丞民其少蘇乎君期㑹寛而信課反盈于舊永嘉遣海舟詣軍前既籍篙師為兵乞取家屬樞密院下其事帥司檄君覈實小人憑勢妄指怨家妻女以為其家人君悉究其實吏曰此軍事恐有不可測者君曰如此何名覈實彼豈不能徑取之不為動人多懷其德始奉直公間闗南渡聚族頗衆身任其責君又從旁經紀之宦既不達家道益困未嘗問也先世與二蘇公為同年且通婚姻書尺甚多兵火之後所存無幾君力貧悉刻之石君書法甚精源流二王而遒勁似歐率更至老不衰在黄巖年餘真草行書幾滿屋壁見者驚歎臨終初無疾苦對客歌笑如平時少焉就寢則已逝矣豈非善人君子之報乎鑰妻祖尚書王公舊居宛丘娶君之祖姑奉川又為同郡識君諸父及昆仲甚稔二子求銘銘曰中原故家存者無幾典刑尚在言議可紀惟君壽考龎眉兒齒上接前輩終殿餘子舊事厯厯及聞正始靈光獨存今焉已矣吉德之報手足為啟後其昌兮勒銘千祀周伯濟墓誌銘周氏為鄞聞族始慶厯中殿中丞造以進士起家是生三子曰處厚温厚師厚伯季俱躡世科仲亦以特恩入官父子兄弟皆以儒奮家聲卓然伯知建州永州季為荆湖兩路轉運判官終左朝散郎累贈銀青光禄大夫娶范氏文正公之女二子皆有俊聲鍔登元豐二年第以宏才直節有志當世坐黨籍仕至左中大夫知南雄州而止公論歎息銖登崇寧二年第仕為邑令小不合棄官而歸鄉里尤高之中大夫長子沖任右迪功郎監潭州南嶽廟憂患之餘又更建炎兵燬慕叔父之節不復仕進優游終身蓋自崇寧至淳煕相去八十有七年歲在屠維作噩有煜薦于鄉焯薦于漕臺紹熙改元焯遂登第鑰時待罪朝行問之鄉人曰此周伯濟之二子監嶽之孫也惟周氏名士繼出仕不甚達而多以退為高中大夫望最偉而不究于用伯濟守家法有隠德不務進取鄉人亦罕識其靣故其二子能振發如許鑰晚出及拜監嶽下風而隨侍游宦在都下嘗見其二子而聞伯濟之賢獨未之識既而奉祠里居慶元四年二月壬申聞伯濟之亡因往弔之二子一日率諸季泣以請曰先君雖不及定交而託契已數世先君嘗卜通逺鄉金谷里銀山之原去祖塋二里而近將以九月丙午襄大事願有以銘君諱楫伯濟其字也莊重剛簡幼不喜嬉戲從濟南劉壽夫學凜如成人扃户誦書率至夜分家人不得而入抄書用楷法既冠一舉不售即棄舉子業而耽翫書史以詩自娯好讀杜工部韋蘇州詩至忘寢食故下筆有二公之風對客清談無一語及名利事監嶽燕居好客日與賢士夫從容觴豆君無兼侍奉承惟謹朝廷搜訪黨籍之後欲加録用清敏豐公少尹夏公之家皆以此登仕版君為中大夫適長孫郡上于朝未報連遭内外艱遂不以介意又不事生産奉祀之餘僅取自給田有逋租未嘗訟于官公賦則先期而輸間至質貸了無愠色寡言若訥不為諂諛克勤小物憂深慮逺舉足如蹈規矩遇人無少長與之均禮真有不欺闇室之意教子甚篤每以門户之重訓飭之且曰吾家以清白相傳使汝輩能自奮勵貧非所患也延禮師儒意不少懈躬自督課始終如一鄉校月書季攷焯焯屢占前列君曰吾方以此卜汝之進否投卷必以實年兩際慶霈㷆年不及或為惜之君更喜其不欺焯拜恩以歸賀客滿門君以為幸不失舊物繼此有望矣亦不見其甚喜也焯之官請君御安輿以行曰吾方蕭散物外寧能閉置車中自為局促耶晚益杜門簡出入絶嗜好薄滋味康强少疾不近葯石先一年忽以脾疾不喜食他皆如平時歲除祀先不改其度正旦㣲覺困憊疾遽侵矣諸子日奉毉禬不效竟卒于家享年七十善人云亡識與不識相與嗟悼是宜銘矣娶林氏子男九人煇曄焯煥㷆炤煜煒燀長子及炤煜早卒焯迪功郎台州臨海縣尉女三人壻孫輈劉佃紀橒皆里士孫二人塤坦女四人在室銘曰周為名門中有人豪世以學為業而仕以退為高猗歟夫君閲世滔滔哦詩擁書隠居以自遨有子克家為時髦君則已矣後其有遭乎知江州汪公墓誌銘外祖少師生于熙寧十年後自太府少卿為兩浙轉運副使年六十一季舅始生年丁巳時庚申皆與少師同深異之母氏歸寧亦以是年生鑰又長于外家與季舅草角嬉戲少長同研席年十三同冠而公已受世賞周旋二十餘年相與不翅如同氣中雖游宦南北見輒傾倒對酒劇談幾忘輩行不謂去歲一别遂成千古每拜繐帷哭之未嘗不盡哀也將葬内弟求銘何忍銘吾季舅又何敢不銘公諱大定字季應世為鄞人曾祖元吉有隠德于鄉祖洙為鄉先生以特恩補官贈正奉大夫父思温左朝議大夫直顯謨閣贈少師母王氏封恭人贈越國夫人所生母沈氏贈宜人公性開爽宏達了無城府十四歲遭越國憂伯仲二舅未及歸弔客盈門公哀毁擗踊如成人受弔盡禮宗黨稱之少師撫愛尤篤甫冠又丁外艱服除授右迪功郎特監潭州南嶽廟未幾沈宜人下世隆興二年差兩浙西路安撫使幹辦公事未赴省罷監行在排岸司乾道五年就充賀金國正旦國信所官屬六年任滿七年以奉使賞循文林郎監鎮江府𣙜貨務都茶場請兩浙轉運司文解九年到任務場歲課三百萬公平時不屑㑹計至是躬親簡書乃以増羨受賞獨厚淳熙元年循承直郎四年改通直郎知紹興府上虞縣以賞典用新制對實歴凢十年至朝請郎公在上虞政務平易吏民相安事日以理邑有寓公吏部豐公誼左司潘公畤皆清介之士相與如平生觀魏王薨于四明將葬于越詔遣刑部尚書謝公廓然運副韓公彦質䕶喪使者旁午州縣震動官吏股栗他邑不過供頓之勞惟上虞通明一堰最為高峻潮汐雖登僅過數舟則已涸矣公相視地形復興舊閘増浚渣湖别于支港創小堰以通餘舟募游手二百人别以旗色分列左右俟大舟入閘立柵既定引湖水灌之水溢堰平衆力掖喪舟以進略無欹側舳艫相銜序進而不譁俄頃俱濟二公驚歎稱不容口至邑復見館舍三十餘區一一整辦器用精明帟幕華煥祭饌頓食尤為珍腆上下翕然迨至府中貽書求假供張之具公又擇新潔者七十襲以應之二公既歸言于廟堂諸公以為一路之最故公之才益顯贊府嘗以縣録事小忤其意不以闗白徑杖之吏來謝且訴公曰本縣丞何為不可撻汝輩尚敢訴耶更加懲治丞始媿服聞者以公為善處事也九年郊祀大禮恩賜緋衣銀魚通判揚州大鄉趙公子濛為帥政事嚴明公謹事之而從容忠告開心相與禆贊為多間遇其怒徐而解之終為之平僚屬恃公以無恐久而相知益深移憲浙右握手惜别時人兩賢之税契一司有所謂導行費者吏引例以啗公公正色卻之曰我知勾攷簿書盡吾職而已他日代者以此得譴獄吏推尋根源公汔無一毫之累漕司交歲幣于金遴選其人命公與幹官權公安節俱行敵貪而愎齟齬萬狀至欲易白金四之一濡滯踰期雖已過淮北使者辭疾不出一日與權公誓曰今日不決斷不可空囘于是襆被為留宿計始相感歎遣人遜謝不待有請而事畢漕使以聞權公以是進擢公不自言也知韶州郡計惟仰諸邑常賦而令多攝官去來不一幾不可攷究舊者未足新者復積計逋緡錢三萬公曰民貧可重困耶徒費文移且以飽吏貪爾盡蠲舊負惟新是圖五邑欣然承命民亦樂輸焉舊有漏澤園在光運寺之側其廢已久遺骸多貯以瓶罌垂之梁間纍纍無數公因勞農見之其間亦有游宦不能歸者惻然興念而未有以充費㑹曲江尉許君教老無妻子卒于官下公既為之經紀葬送篋中尚餘數百千公悉舉以辦役掩骼埋胔各得其所曰以此為許君植福勝于他用逺矣邦人尤德之幕官陳光祖為之記甚詳經畧趙公彦操漕使黄公掄倉使呉公昭夫各以所知薦漕又與憲車李公信甫倉使趙公不迂列于朝其畧言以寛得衆行簡臨民勤儉公亷慈祥愷悌庶幾古循吏之風代還朝廷用諸司薦書而嘉其才遂除知江州江素號名郡訟簡財裕可以卧治及公之至大異故時帑藏不盈萬緡而負諸司之錢幾二十萬官兵俸給亦積至萬五千公為之矍然日與同寮圖之蓋征賦既弗辦而游士耗之又特甚公曰浚民膏血而使往来者挹取之以邀虛譽吾不忍為也㑹有㫖申游謁之禁公奉行尤嚴凢有挾而來者止以尊酒謝遣之或恐由此起謗公不為動剔蠧剗弊謹朱墨節浮費飾廚傳稱過使客之事一切畧去屬邑舊逋蠲貸之如曲江不三數月而用粗足補解諸司十七萬緡吏俸亦以次支行民不加賦益安公之政而不得志者萋斐寖成矣公竟以此罷歸郡人冤之相與語曰不知誰為飛語厚誣吾賢侯耶有曹官坐侵用郡帑吏乘為姦既下有司公曲為保全姑與易地以息衆譁彼更以為怨鼓倡游言巧為隂中人尤為不平二倅張君泌陳君邕總幹王君興翁皆一時名士情交意浹驩然莫逆有頼叶濟數月政成公退觴詠相樂前此未有惜公之歸尤眷眷不忍别二郡皆有大兵屯駐待軍帥一以誠意敬公亦有加焉士卒有犯結證明白送軍中使自懲戒了無間言兩造至庭究問詳盡俟其首服多歸于恕惟姦惡盜竊之徒治必盡法為之屏跡則又仁者之勇也水旱有禱隨輒響應舊祭社多委寮吏代行寖以弗䖍公曰社稷重事豈可憚勞乃躬修祠禮貳車有詩曰九江代拜嗟從昔五馬親祠始自今公自以由支郡升巨鎮荷朝家選委之重洗手奉職罙自奮厲又素著廉潔而横遭口語皆出風聞不能無怏怏去郡尚無他重罹風雪之苦將次池陽忽得㣲疾一昔歿于舟中寔慶元四年正月丙辰也嗚呼痛哉享年六十有二官朝請大夫娶陸氏故發運使寘之女明慧勤約内助甚飭相夫教子俱有可稱先二十六年卒贈宜人子男五人敏中從事郎撫州軍事推官教中將受公遺澤餘幼亡女八人其三亦先卒一適陸森宜人弟之子其次迪功郎監鎮江府延陵鎮趙希一從事郎台州臨海縣丞趙師侊里士黄沐皆壻也一尚幼孫男一人之綱迪功郎臨安府富陽縣主簿始宜人葬于慈溪縣石臺鄉龍潭之原敏中等將以十二月壬申奉公之喪合焉公之處家居鄉出而從宦表裏如一明白空洞不問大小待之鈞禮故所至與人無所怨惡檢身謹密杜門省事又不治生産了無贏餘婚嫁交迫俸入縁手而盡處故廬西偏欲少增闢竟莫之遂外家友恭之名聞于時仲舅尚書任兄弟之子猶子也叔舅運幹蚤世澤不及子公奏闡中以官其篤于友愛有父兄之風焉訃音至鄉親故無不隕涕母氏洎仲舅皆以高年見公之亡傷悼尤甚公素少疾持心近厚孰謂其止于此耶公洊以臨遣奏事上動兩朝之聽其一論韶州岑水場兵匠之弊甚悉謂諸路配隸之餘選以應役或聚而為盜害及一方若從爐户之便添認銅額可省廩給之費其到場及四年者照舊格給據縱遣餘人以次歸元配州軍實逺方經久之利敢書大概庶幾後人或有取于斯銘曰猗歟汪氏積德數世先生淳篤文行兼備少師起家深仁厚義舅承其傳慈祥愷悌載擁州麾仕非不遂胡嗇其年歿而齎志公之為政慕古循吏害公客耶亦命之制龍潭之原往從伉儷有銜不袪慶在來裔攻媿集卷一百三欽定四庫全書攻媿集卷一百四宋樓鑰撰誌銘知梅州張君墓誌銘龍游為浙東壯縣號難治自紹興間陶安世定有聲之後厯數政不以善罷四明張和卿由袁州萬載尉以捕盜賞改右承務郎年壯氣鋭往為之宰親黨或勸止之既至謁廟以亷勤公平自誓上不負于君下不欺于民終始如一神其臨之聞者竦然首定規畫凢聽訟追科出納簡稽公吏抱案進退皆有程度鄉胥姦弊智者不能盡察君左右參驗甲乙相紏簿籍更川薄楮以防削改字畫分明欺偽畧盡有宗室子與强民為仇各聚衆至數百期操兵夜鬭于市尉趨告公曰安有是事命置酒尉股栗不敢飲吏又告將合矣君笑不答俄散去約明日復至遲明召二人者至庭謂曰汝自相仇彼衆何罪而使濫被殺傷乎不如挺身持刃決雌雄于前兩人者相顧欲退公曰官府有法可容爾耶分囚廡下至累月始悔過求免邑衆為言願相保任使自新即縱之俱媿惕感服君既歸猶以時節致書問起居者數年設保伍之法繪為魚鱗圖居處嚮背山川逺近如指諸掌又籍其家之長幼姓名年齒生業纖悉畢載其崛强無行鄰里可以紏告或犯法未就捕而君已知其人私忿鬭毆鄰不為勸止者與同罪牒訴誣妄必坐其教令者法令易行井若畫一欲以獻之朝通行天下未果也豪右竝大溪為舂磑以擅利久為舟行之害聞有廢之僅能徹去浮屋君始併其基址去之初謁太守司諫施公元之迎謂曰邑大未易治蓋以君尚少也君曰正恐上官以為易今知其難則可為矣守待寮屬嚴一日令賦外别輸四令奉命惟謹君獨爭曰使某左枝右梧月獻緡錢千計未為甚難如貽患後人何守盛怒君辭益堅且曰寧棄官以歸已束裝矣守曰試子爾乃能剛果如此更薦之後日書問如待子姓家事亦或咨謀焉白革湖鎮當水陸之衝戍兵經山不翅寇盜莫敢誰何君白帥府以軍法齊之無敢譁者有一士籠禽于市為惡少年侵侮君責其不學送縣庠從師受蒙謹其程課居數日而後杖其所侮者人皆悦服視事纔三月有訴君于部使者覈其言不根反以此受知又訴之朝洎付有司乃扳引前令事為言其人既伏辜君之治行益白久之謡誦雜然如十德詩能官賦十可喜歌頌鋟木鏤石幾不勝數流聞四逺境内多立生祠惟靈耀成志二寺至以神事之或致禱焉帥憲具績效奏聞有㫖候任滿赴都堂審察淳熙初元既造朝幹辦行在諸軍審計司俄改差權發遣均州制詞有云風力敏彊有聲劇邑是時孝宗皇帝垂意民事由治縣而擢為郡者不過數人如丞相葉公衡自於潛守毘陵卒至大用均有管内安撫之權人謂君自此升矣四年陛辭奏事稱上意且屬以有機密事奏來而臺評以資淺論罷五年差知興國軍前論者又以為言改通判筠州遭所生母安人方氏憂服除通判衡州既授代而報罷紹熙二年主管台州崇道觀四年通判廣州幾年適梅州闕守諸司奏辟未幾而屬疾慶元三年十月丙子歿于郡之正寢享年六十有一官止朝散郎嗚呼命矣夫娶伍氏封安人子男五人度廙庠序廉度將以君遺澤補官孫男六人竒之湘之衡之環之次俱未名先一年竒之卒孫女三人尚幼君之入廣從行者多困于瘴癘第四子序卒于梅君念之切閲月而君亡安人來自富家善事其姑君既受命悉以祖産歸諸兄而又不事生産安人攻苦食淡閫助為多人無間言奉祭祀未嘗不躬親撫庶子不翅如已出初封孺人後得今封率諸孤扶君之喪逺歸悲苦勞勩人所難堪歸而治葬尋亦感疾五年三月乙巳不起始公卜壽藏于鄞縣清道鄉邵家橋祖塋之側既以四年十一月丙申大葬又以五月壬寅祔安人于君之墓鳴呼天之禍張氏何其酷耶先是君之諸子為君求銘以君既葬而遲之弔安人之喪又哭踊以請余于君有連又以齊年相好尚何辭惟張氏自仲以孝友稱衣冠代不乏人永嘉南渡始居于呉五季之亂避地東來有官于四明者因家焉君之曾大父綸累贈宣奉大夫大父寅贈朝散大夫父邦彦政和二年繇太學上舍擢進士第官左朝散郎贈朝議大夫自叔祖宏舉經明行修為吏部郎遂為鄉之望族君諱祖順和卿其字也生七歲而孤當紹興十四年以朝議致仕恩補將仕郎性資明悟執喪如成人長從鄉先生僉判沈公銖游沈公愛之至育于家曉暢世務以氣義自許庻幾大其家者居官所至可紀萬載有盜竊發躬勒部伍禽得之念其窮無所衣食而致此以為案問自首盜得不死衡陽歲饑道殣相望君遽發廩賑給而後報監司不罪其専而以才具優長薦之提刑姚公恪轉運張公縯提舉陳公傅良謂君敏彊精勤㢘平簡素不詭隨而失守不强梗以侵權嘗稽其簿書條目雖多撮為一編上収下支日總其最簡當精密無所容姦委之決獄酌情參法隨手剖析人稱平允相率列其狀于上今諫議張公釡為廣帥以歲有登歉欲廣儲蓄以備緩急為經畧司樁備倉創立未久専以委君為之條畫綱紀辦事既速了無遺䇿張公亟稱之梅在萬山間官舍民居率以茅竹為屋公慮火災更以木瓦自驛舍庫廩兩獄先以公帑為之民亦樂從郡計匱竭為之經理而用稍足又能葺學校為養士計汀贛接境歲晚輒百十為羣名曰負販實為剽掠松源石下為二州淵藪淳熙間有嘯聚者自是幾無寧歲君下車即用龍游魚鱗比伍之法行之羣盗為之屏跡郡治之後茅葦彌望君令民築室兩傍者復其身遂為通途舊以土客户社丁供州家之役各有科調為罷去之皆起來暮之嘆惜其見于用者止此也與人樂易持論平恕而勇于立事不顧彊禦毅然不可囘奪居官㢘約為令時鬻産以繼禄又好周人之急力竭而無倦色嫉吏姦如仇洞見肺肝人不能欺衡陽之劾良以此也平居念當世利害擬為奏草以待施用久遂成編名愚見録藏書教子尤所留意朝議有經解雜著數十卷大書編次寶藏甚飭對之輒泣下嗚呼古人以方六七十如五六十猶可以行志為邑宰而得名于史傳者衆如君龍游之政可以不朽故余表而出之家有治縣捷徑等書皆公見于已試者後來尚得以攷其規撫云銘曰張氏著姓孝友惟仲漢良晉華支派尤衆永嘉南渡始為呉人或官于明遂大于鄞君起孤藐以才自奮所至可紀芒刃不頓龍游之政絶後光前治聲炳然徹于帝前謂自此升欲起輒仆晚試于梅遂罹變故抱負有餘齎志而亡哀哀賢助又不勝喪邑人尸祝足以不朽銘以表之尚啓厥後黄仲友墓誌銘余從兄編修娶黄氏諸暨名族也嫂氏兄子定之又為編修壻定之佳子弟聞其父推官之賢恨未識也一日以書來訴推官亡于上饒之官舍歸葬而求銘為摭所録行實而銘之君諱宗諒字仲友世居洪之雙井與豫章先生俱本于婺州之黄五季有避亂而居剡者又遷諸暨遂為縣人七世而上失其譜矣曾祖舜卿贈正議大夫祖彦朝議大夫贈大中大夫父克寛朝散大夫贈中大夫君幼而孤刻意問學手卷不釋紹興初建太學以弱冠上優選月書季攷屢占前列馳聲二十餘年秦申王當國之久士子習為諛言漢唐非七制三宗不道時文中不復及興亡治亂事至不識資治通鑑為何書二十六年歲在丙子高宗更化之初公道大開申挾書之禁防閑甚密秋賦多趑趄其行君以素業賈勇而前登名薦書儕輩歎服時命不偶淳熙五年始以特恩補將仕郎明年中銓授處州遂昌尉年近六旬而勞苦不憚警捕之職甚舉境接建安俗獷悍小歉則盜竊公行里正嘗以嘯聚聞君亟率所部操兵往逐之凶徒相顧駭曰黄佛出矣忍犯之耶相與遁去一境晏然十年任滿調台州司法參軍到官適歲大祲義倉出納惟謹尋授信州軍事推官慶元二年始入幕國正季君翔為守布衣交也郡事多以委君幾于畫諾君老而益壯剖析滯訟案牘山積推究無遺據法予奪不容一毫之私二年間類為四冊近五百事四年之夏忽苦脾濕雖多在告竭力公務不見惰容痼疾復作遂求致其事轉承事郎方將俶裝東歸放意林壑以樂餘年未幾疾革竟以十月戊寅卒于正寢享年七十有七娶趙氏融州觀察使贈開府儀同三司潤國公士筏之女聯姻天族袒免親法當補官君獨不就識者高之子四人與之先六年卒次即定之登仕郎次一之尚之皆業儒女二人長蚤亡次許嫁姚銓參政令憲之諸孫也孫男三季雅季文季野孫女四諸孤將以五年季秋某日葬君于縣之孝義鄉魯墓之原合趙氏之墓君資彊毅而與人謙和及見前輩源流有自他無嗜好惟教子甚力交游至多未嘗失色遂昌邑庠草剏二丁祭器亦不能備君悉力整辦為之一新課試士子翕然悦服尚書王公佐方尹京邑貽書相賀有闢黌舍以延生員為斯文宗主之語在丹丘時直閣田公渭以倉使按郡一見唶曰老先生尚爾淹恤乃令吾徒冒乘傳之寄自顧歉然即以舉削來詞曰學高前輩政有典刑允謂老成尚堪繁劇人以為知言禮部尚書尤公袤時居西掖以詩寄君有云金馬玉堂慙我輩青衫白髮念君遲三數公皆上庠故人故知君尤深推此可見君之為人垂絶不亂命諸子無他言惟以進業保家勉之自號隠退老人有文集二十卷藏于家銘曰吁嗟黄君馳騁文囿少蜚雋聲不為不售晚服官政感歎耆舊踰七望八不為不壽日月逝矣用不及究善積慶餘尚啓厥後趙深甫墓誌銘長兄績溪尉蚤世三子五女以次婚嫁丘嫂最愛季女聞小溪寓居趙氏家法媒妁之言曰武德夫婦偕老杜門約居教子甚嚴諸子聯中科第多有賢稱其第三子師信既以淳熙二年賜進士出身得尉台之臨海矣請婚審于鄉評曰然遂以兄之子妻之後以近制改師潯字深甫既壻于我與之游處被服儒雅畧無膏粱之習慶元二年君既悼亡謀葬于通逺鄉白石里石營保之原而後之官甫四年而君亡矣哀哉母安人馮氏尚無恙一女二子哭聲不忍聞石營去所居纔里許將舉深甫之喪合焉求銘于余忍銘君乎哉君實為藝祖之帝系孫贈保康軍節度使高密郡公令儇君之曾祖也贈武義大夫子葢祖也主管台州崇道觀伯􅙝武德也武德生長承平南渡流落居四明之鄞縣大抵居官㢘儉謹蓄俸餘以為待次計與鄰里不以財交故内外肅然深甫生而竒龐長服義方自力于學登第五年而後授室彊敏自喜始調官或賀之曰臨海尉多以捕盜改秩者君以為非吾志也在官果兩得强盜一獲私鹽甚夥皆應受賞照驗明備終不自言又達于吏事以此受知于諸公邑民自經而有傷又以移尸興訟令受私謁諭君毋生事君正色曰事干人命今日正欲得實耳長揖而起終直其事人皆稱平令慙且不樂時以職事相窘君弗恤也有士將雄狡無賴前政莫敢誰何偶有犯當治輒肆言曰尉欲治我不望改官耶君寘之理窮詰宿過卒逐之餘皆聳服尋為衢州西安丞工部尚書謝公源明時為守趨召轉運使潘公景珪問曰郡中有賢丞乎謝公以二人對而以君為優備言㢘勤曉暢民事之詳潘公曰得之矣俄列上謂才術優長可以作邑兩易知嚴州桐廬縣最號難治君為之談笑而辦才譽益顯任滿授紹興府録事參軍丁武德憂不赴服除㑹有㫖侍從臺諫各舉宗子二人余在西掖薦君之兄師津今知樞密院謝公深甫台人也極知君恨舉員已足未有以及之方為御史中丞而吏部尚書劉公德秀為監察御史問人于憲長謝公亟稱君之賢劉公慨然薦之其詞曰奥學有源素履無玷雖厯官未久而聲聞益彰併及辭盜賞事為逺到之識乞以備朝廷選擢初不識靣真公舉也天族蕃衍人才衆多昆仲屏居山間憂患之餘名徹天聽照移狎至幾于羔鴈成羣者鄉人榮之本無意于干進僅以此俱得添差幕官君授建康府節度推官留守尚書張公枃多以滯訟屬君處之當人情合法意衆議有未定者獨招入郡齋議之或至夜分而後退大資趙公彦逾素知其才見其盡心贊畫受輸決事無不曲當首授京削參政又為之延譽諸司交薦僅二攷而歸既調嚴州節度掌書記為部胥所賣再往都下久之得疾逆旅遂以五年四月戊寅卒哀哉若人之不淑也始既辭盜賞而不用蹉跎至此知已方當路可以伸矣而止于儒林郎素壯强飯年五十有二何疾遽困之耶子希偘希女未行君性質直忍貧自立職務之外進學不倦垂意經史同寮賡和往往傾其座人心計精密治公事如家事言不妄發持論甚正孝友勤謹自奉淡薄不務華飾思有以自見于世遂吞志而已矣方鼓盆時手記費用之目甚悉其子請曰何用爾君忽曰我且死汝輩從此為之兹聞訃音變起倉猝昆仲方議經紀之希偘等出舊所編按以從事適奢儉之中噫豈有知耶葬以六月某日銘曰父子之賢聞于鄉閭兄弟之美徹于帝都君才甚優知已當塗謂進未艾而止斯乎兄子既殂又銘其夫尚惟諸孤承慶之餘安光逺墓誌銘淳熙十二年余方懐東嘉之綬于家頗聞安君光逺詩聲一日褏長箋臨門倒屣迎之貌甚偉文甚工與之語纚纚可聽而忘倦也又六年過余于外府求跋其大父詩卷比余投閒里居故人罕不見者獨光逺未能相過已而聞其病遂不起寔慶元四年七月丙辰也六年諸孤將以四月丁酉葬君于鄞縣之通逺鄉建隩南山其次子踵門以銘為請手編先集列載行實粲然可觀余既哀光逺之不遇愛其子之克家遂屬筆焉惟安氏系出唐忠義傳金藏五代後唐中書門下平章事金全之後國朝勲籍節度留後守忠即君之九世祖司徒忠果雄勇功臣習七世祖也曾祖希文崇信軍節度使祖㝢武德大夫真定中山府路㢘訪使者父時從義郎三世皆娶趙氏家開封祥符縣建炎避地著籍于明今為慶元府居小溪鎮四十年矣君諱昭祖娶軒氏亳社左承議郎中美之孫子男四勝非辟彊去華棄疾女二長歸馮季參次未行孫男一女三君世為名將至㢘訪始以文采受知祐陵與樞密宇文公虛中雍帥蔡公靖游尤與寶學劉公子羽厚善劉公狀其行自謂急難之義天屬莫加也從義仕不顯而家學尤懿見于張公總得祁之帖正字土公衜之銘兄弟終鮮承父祖之傳幼敏悟力學抗志高邁從義指物命題脱手成句見類書輒屏去曰此豫以不能待人者性端靜衣或數歲一瀚繙書已熟若手未觸者舉動不苟絶無子弟過從義年踰四十得君篤愛之擇師以教日益秀發父子短檠相對至十餘載自為知己出入不能相捨既冠同客都下從義得疾委頓君憂惴願以身代旋即東歸竟至捐館執喪哀毁悲感行路母素嚴重家政至是益肅君亦敬事盡其歡心及疾革醫禬未效至刲股以進家人竊窺而後知之喪葬俱備哀禮自以世襲衣冠未有以文發身者扁其室曰觀行朝暮激昻期紹先志蹉跎至五十始慨歎曰科舉之不效命也遂一意于義理性命之學舍後築圃中闢一徑自號通村老子好為古文尤工于詩平澹敷膄不為艱深之詞每曰工夫到處卻無竒特有文集二十卷名通村遺藁丞相壽春魏公退處碧谿山中之客惟雪窻張武子與君從容觴詠如裴迪之在輞川也鄭黄中王德新龔養正薛清卿湯孫將諸君皆相與為文㑹酬倡之友致仕應君良弼一鄉推為長者老而益高君尤與之厚嘗銘其墓人以君為應之亞匹云與物無競不見喜愠之色每戒子弟勿與人辨是非待其自釋又曰横逆之來如在荆棘中徐行緩解而已禮法自將不識公府以誠待人久而相孚内外無間言喜事愛客客至趣備酒肴擷蔬買魚陶然徑醉氣同志合或館致累日室無長物惟好古不衰先世遺書殘編斷簡皆手自整比書尺往來有可觀者亦謹藏之筆札素工稱其文骯髒高簡莫窺其際客去則取所聞見者劇談示訓諸子不待出門而家傳充然有得也自卜葬地無復世間意參閲内典旁接諸禪跌坐至深夜不動年纔五十有七而疾病垂絶猶大書偈語詞意超詣亦足以知君所存矣銘曰窮亦樂困而亨奚其為政不言而行惟卒不施以昌其詩江山為助筆乃縱横優游田里以得此生彼其憂于心而毁于後雖曰得志未知與此孰重而孰輕安氏之積厚矣非此其身後其有興者乎朝奉大夫李公墓誌銘太師史文惠公兩登相位其持論以求賢用吉士為先蓋其天資寛宏務為忠厚家傳孝謹以此教子以此擇壻玉局李公刪定其一也公諱友直字叔益世家紹興府之餘姚太師為尉與公之父游見公所為文竒之又喜其端粹遂締姻焉公甫冠入上庠太師鼎貴公退然未嘗自言同舍有不知其為丞相壻者其恬于勢利自為諸生時已如此太師尤器重之既登科而太師再相孝宗垂意人物一日問太師子壻孰賢以公對即除詳定一司勑令所刪定官時淳熙五年二月也有以資淺為言者雖寢前命至七年再除始就職朝論翕然以為眞吉士可謂冰清玉潤矣公曾祖尚邕州太平寨主簿祖竑從事郎累贈奉直大夫父梓承務郎累贈朝請大夫妣茅氏贈宜人公幼警悟蚤已能綴文父祖竒愛之稍長益自刻厲主簿學行為里人所宗以貢入京師晚纔得一官延師儒訓子孫孫曾四人踵入太學公最以詞賦得名屢占上游自名薦書後以恩免舉將再上禮部俄遭外艱乾道初試上舍中優等又丁茅夫人憂淳熙改元該免省者五人公獨不就遂登二年進士第授迪功郎明州慈谿縣主簿易太平之蕪湖未上而有勑局之擢纔半載以修進條法事類特改承奉郎輪對便殿進止詳雅敷奏明白歴陳救荒漕運附試三事孝宗嘉納悉以付中書或諷公謁廟堂施行之公曰吾知盡愚忠爾後議者立附試之額卒如公言同列序遷方擬以客臺博士處公言者又以為驟得㫖外補丞相王魯公諭使求倅謂杭則不失故步明則可以便鄉公止匄祠魯公深歎其逺識也九年主管台州崇道觀十一年通判婺州既至郡參正李公彦穎中丞蔣公繼周為守皆知公賢厚每事咨焉公外寛内明政務大體而畧苛細恂恂若不能言而從容裁決無不均當謙和樂易事上官以禮雖不為異亦不肯希意苟合惟是之從不可干以私僚屬吏民敬而信之不忍欺也既歸宦情愈薄去國且十年未嘗以一字自媒于諸公居歲餘復求郡丞遂倅湖州劇郡數易守公間行郡事輒稱治吏引例卷以攝承當增俸叱去之一金不取也提刑陳公公亮提舉黄公遹將列薦于朝公力辭之趙公不迹來守强敏明察官吏嚴憚且謂公必不合公不改其度守為之降色辭公亦以吏師事之始終賓敬不可得而親疎時人兩賢之後守至未煗席劾去外臺怒未釋偵邏日至符移旁午先是郡有舊胥為守家吏與之俱來已而頗肆籍其家得守與其壻數書戎官將發之公曰何忍發私書以隮人于險乎亟焚之止械其人以前使者聞之弗罪也後窮詰之守果無預事遂白微公幾殆矣秋賦多鼓譟之患公為監試前期以訪鄉老具得其情為之區畫無敢譁者攷官以去取求決于公辭不可以詞賦定取四人時預計偕者十一人獨此四人擢上第人深服鑒裁之精也尚書程文簡公大昌舊為司業素知公嘗曰公澄之不清撓之不濁眞淵乎似道者哉侍郎莫公叔光代公為刪定郎嘗貽書曰公如美玉固未嘗掩瑕而綷粹之至無瑕可指此平昔之所敬慕未易及也其為名勝所重如此慶元改元制曾兩任通判者方許拜州曾經擢用者方許除職事官交親趣之起勉至修門謂公必留而一造相府即以小壘自詭丞相余公謂何取之廉耶許知臨江軍命未下已謁告歸矣五年夏以疾求閒甚力今左丞相京公意謂憚逺委曲勉諭既不可囘又為之易廣德且諭公曰地近事簡可以卧治毋惜一行也時廣德守已得祠需公之至公謂求閒居而得便郡辭逺次而就見禄君相之恩誠厚非本志也復申前請改成都府玉局觀後兩月疾益侵求致其事竟以其年八月乙亥卒于正寢享年六十有六積官至朝奉大夫賜緋衣銀魚史宜人有賢操先二年卒蓋宜人朝祥而公以暮捐館舍人尤哀之子四人曰賡曰康迪功郎婺州浦江縣主簿曰庸曰庲以公遺澤補官賡庸皆蚤世四女長適迪功郎臨安府新城縣尉趙師固而卒次適修職郎監紹興府和㫖酒庫史實之實之亡矣餘在室孫男三人該將仕郎謐詡女一人諸孤將以六年九月辛酉葬公于縣之蘭風鄉新湖劉公隩之原合于宜人之兆嗚呼公金玉人也簡淡無嗜好經學䆳于二禮屬文長于駢四儷六間為人草箋奏談笑成篇初若未始經意詞㫖明切號為得體他有碑志銘贊等出輒為人取去無留藁公既沒僅裒二百餘篇藏于家詞氣雄渾似其為人字畫遒美鄉有石刻必求焉凡公所長不以自衒也性至孝禄不及親終身以為恨故于族黨恩意有加訓子若弟示以趣向使自知勸誘掖後進絶口不言人過杜門卻掃或十餘年不至城邑令佐歆其賢多就見之清修謙謹無賢不肖一接以禮犯者不校不見喜愠之色故哭公之喪者無不盡哀里閭耋穉亦咨嗟痛惜謂無復見若人矣康少而幹蠱即委以家事俾毋闗我築堂曰竹隠一丘一壑不啻自足多焚香黙坐得喪榮辱不以介懷疏財喻義不事生産而趨人之急成人之美恐力不及既無德色或莫之知也先卒一月忽告二子曰吾以進士起家仕至二千石將以善終無可憾者遽屏醫藥至屬纊無一語亂膚色温潤竟日無小異家人幾不忍斂顧非寡欲積善之效耶鑰父子出入太師之門識公甚久既又同朝婦王氏之姪歸康與鑰之次子實為僚壻稔知公平日大槩故康來求銘康謹愿克孝濡染有自來嘗薦漕臺進學不已是能世其家者銘曰温良恭儉先聖規撫門人從事有無實虛猗歟李公渾金璞玉終始如一慊不自足施于有政如古循良進稱于朝退淑于鄉云胡不弔喪此吉士慶必有餘昌爾來裔知復州張公墓誌銘孝宗龍潛妙選寮寀端明張忠簡公與太師史文惠公實為贊讀直講内禪之際二公翊贊為多文惠既相忠簡為工部尚書告老而歸上意恨用之不盡恩數優渥視簽書樞密院君臣相遇可謂盛矣公諱仲梓字才卿忠簡次子也世為温之永嘉人曾祖稹祖忱贈中奉大夫忠簡諱闡母盧氏累贈魏國夫人公資彊敏少承義方力學博記年十四入上庠時中興學校更新在選多名士已能與之相下上月書季攷率在前列又兩預薦書紹興三十一年以明堂恩補將仕郎非公志也明年授右迪功郎監潭州南嶽廟隆興二年丁忠簡憂乾道五年差監行在豐儲倉九年史公以使相帥福州過闕力薦其才孝宗念舊學之子即日召對閏月改宣義郎三月除大理寺主簿淳熙元年遷太府寺丞四年乞外補知通州七月陛辭因論常平利病敷奏詳明上為之嘉歎問闕在何時以實對即許改除且諭公曰他日莅職毋忘所陳遂改荆南路提舉常平茶鹽公事六年持節入境體臨遣丁寧之意疚心區畫利興害除因劾寮吏之慢令者忤同事意㝷遭論罷公之仕進自此齟齬矣十年主管建寧府武夷山沖佑觀後知江州再知通州俱不赴凢三授祠禄至慶元改元始為兩浙西路安撫司參議官秩滿知復州四年赴郡古號竟陵廢置靡定旁枕襄沔地卑水匯間三四歲僅一熟富商歲首以鹺茗貸民秋取民大艑捆載而去公至首訪民瘼嘆曰種未入土民已無所告糴可無以處此乎騰書帥漕借所儲粟禁止商販又廣為収糴之計倉廩充實邦人賴之野曠多盜重為民害公分置鄉兵部分嚴整犯者痛懲以法盜為引去期年公感未疾視事不少懈未幾寢革遂以五年十月辛酉卒享年七十有一積官至朝請大夫娶周氏朝議大夫奉先之曾孫視永嘉先生行已為大父行少公一歲先一年二月甲午卒封宜人男三人爚通仕郎既冠而亡次烜燠俱以公任補將仕郎女三人孫一人埴當授公遺澤孫女二人公蚤厯艱苦忠簡晚既貴家事賴公經理性介特不好華飾圖史之外他無長物通經餘暇諸子漢晉唐諸史鈎竒撮要手自抄録所為詩文盈帙簡古䆳深今藏于家既登仕版又再薦于外臺四上禮部竟不偶中間困于煩言才不得試孝宗簡記擢守九江亦不果出卜築謝池陶然自樂終不見戚戚之色家傳有自來矣宜人幼潁悟嫁時公家尚窶相與刻苦以奉忠簡閨門無間言善相其夫者也二子將以六年十月甲申奉公及宜人之喪合葬于縣之吹臺鄉西山法濟院之右來求銘鑰于公家為有連歲在癸未與公之弟尚書公春卿為同年進士獲拜忠簡下風迨官勑局公之季弟延卿為寮公方丞外府居又比鄰客授公鄉後又假守昆仲偶皆家居春卿同列從班公入議幕交情事契日益加厚公之在復春卿以華文閣學士守鎮江延卿為濠州伯兄之子晦之為泰州一門四郡守諸孫秀發人皆嘆忠簡君子之澤夫何公與春卿繼卒于郡逺不能致束芻而駭悼實深故不得辭而為之銘銘曰忠簡深醇求之古人位嗇台輔望壓薦紳君承義方蚤入太學嘗顯于朝卒困流落復政未報而乃忽焉哀哀介弟相隨九原君子之澤其流未已我惟銘之以詔孫子攻媿集卷一百四欽定四庫全書攻媿集卷一百五宋樓鑰撰誌銘朝請大夫史君墓誌銘四明衣冠之族紹興以來莫盛于史氏自八行先生以純德奥學積善餘慶是生樞密公吾鄉之登政地者實自公始樞密兄之子是為太師會稽郡王文惠公位極人臣而史氏益大故君之髙曾皆重疊追贈者四十年不惟賞延繁衍而決取世科者累舉不乏人其興又未艾也盛哉君樞密之子也諱浚字堯翁世為明州鄞人今為慶元府曽祖簡祖詔俱贈太師冀國公曽祖妣葉氏祖妣徐氏皆冀國夫人樞密諱才嘗任端明殿學士簽書樞密院事官左朝奉郎致仕累贈金紫光禄大夫妣孫氏封齊安郡夫人累贈大寧郡夫人樞密以紹興二十四年歸休三十年致其事奏君將仕郎授右迪功郎監潭州南嶽廟以便養三十二年丁樞密憂服除引孝宗登極恩循修職郎再奉祠乾道六年調福州古田縣尉九年文惠公帥閩以避親不赴崇憲靖王知明州辟為定海制置使司準備差遣淳熙四年秩滿闗陞從政郎用舉主改宣教郎知紹興府新昌縣十三年差權通判婺州十六年光宗覃恩轉朝㪚郎紹熙五年今上覃恩轉朝㪚大夫餘以年勞積官至朝請大夫嘉泰元年引年致仕三年九月旦卒于家享年七十有五嗚呼君年三十而得官歸自婺女纔六十有三已無復宦情其見于施設者止新昌婺女兩任而所至聲績可紀其奉親立身處家居鄉又皆以古人前軰自期是亦為政豈虛語哉樞密之歸君已壯矣謂君曰吾之進退固自無歉第郊恩不能及汝耳公拱而對曰大人方欲全晚節豈當以某為念樞密喜曰吾姑試之而氣貌泰然足以成吾志矣參政李莊簡公守永嘉樞密為簽幕待遇極厚君方就傅附學郡齋每旦必束書以俟户外寒暑如一李公奇愛之樞密赴餘杭君侍大寧次長安埭時有數百艘相持旬餘公猶總角為之登岸處分使往來之舟以叙而行已舟獨殿不日遂通樞密被召將行吏有以白金遺僕夫者公侍側奮然曰是將汙我當發之樞密喜曰吾兒可謂清白吏子孫矣性篤孝大寧既下世樞密年益髙父子相與為命娛侍左右藥非親嘗不進未食不敢食執䘮盡禮既葬結廬其旁捨城居而家焉致敬家廟旦旦集家人拜謁風雨不渝蔬菜之屬未薦者弗敢嘗祭祀備極誠潔滌濯烹飪必躬必親將奉祀則衣深衣以寢諱日先期齋素哀慕涕洟如始䘮生朝不為宴樂在官吏民無知者同氣惟一女兄適周氏事之甚篤見其卜居以金谿别墅遺之制幕例得僦直君曰吾有先人之故廬在僕從亦以鄉曲不當用悉辭之魏王來鎮君以職事迎謁境上典客謂當庭拜君曰此必非王旨揖而出王首以此見重遂被論薦將校捕海寇㡬百人吏欲逮治匿贓事君曰彼出死力得盜以贓為賞亦不為過若以屬吏是為賊報仇也誰復用命王為寛之皆感激盡力海道亦清幕寮蔡君大成亷明有守或汙衊之將寘于法君力辯其非辜及出又厚為之禮東錢湖積葑膠轕王欲開治之有請于朝欲給錢穀及設醲賞且以屬君君引嫌以不敏辭又白王曰今為民興利所費非不多水軍有舟楫畚臿之屬儻優給軍士當必樂趨第嚴為紀律毋令擾民足矣請列杙岸旁取葑積之日久自成隄矣若屬之官吏必致煩擾民疲于奔命吏急于言功止得目下瀰漫可觀根蔓不除適滋後害爾已而皆如君言始至新昌待制朱公熹時為提學一見如舊即以滯訟委之天台有王烏頭者中産之民以析戸交訟三紀矣案牘山積君盡召其黨諭之曰至親終訟未有不破家者我非不能處㫁一有勝負汝必將復訴詞意愿款察其感動遂與酒肴使交相悔謝明日俱拜庭下曰今不復訟矣朱公深為器重自是親戚有訟率以此處之或使之拜起揖遜于前而去得罪于父母者輕重亦惟父母之聽曰吾盡法則傷恩矣由是無不感厲自新葢平時鄉鄰有失孝弟之義者必諭之以禮曉之以法不悛者或媿辱之感悟則與以酒食之資使其奉父兄之歡乃已其有暴戾恣睢狠于鬬昌于貨者亦誨之諄諄俾歸于善故見于政者專以風化為本也君于催科不擾而集嘗曰寛之于粒米狼戾之時而迫之于半菽不給之際是罔民也乃為之曉諭謂及今不即輸納將來不免追催諒勤周悉無慮數百言讀之者雖頑鈍之夫亦知感悟租賦不待促而辦部使者至以移示旁邑至今邑人猶傳誦之邑在山間異時趣辦役夫以稱過使客近鄉之民一月或至數四君令鄉各置籍據籍㸃差出厯為信自輦輸官物之外一無所役三年間户不過再及之逺者或終不及也大谿自天台而下溉田甚廣舊有隄以障狂潦而善壊㡬無寜歳君曰人力不至爾出官錢屬耆老督民修築民競勸趨其他陂埭經君修繕者無不堅久鄉吏銷鈔不以時遇有㸃追擾及已輸之民者多矣君深慰勞其人問其道里期㑹之費官為還之罰吏金以償官吏困于輸金其弊遂絶有士與民訟田君謂士直而牘未具士復來謁君曰兹事已決彼當無辭今見諭則成請求之私移丞佐決之後無敢有私請者僧訟一民負錢至數百緡君疑之問民妻安在曰近鬻于人矣即詰僧曰此人甚窶何屢貸之汝必私其妻妻鬻故訟爾僧詘又有訴僧寺殺其子而屍亡者君念筍蕨方盛此必為盗被擒而竄爾責僧令㝷訪而寛其期㝷獲之一訊而服豪民以稱貸獲利倍蓰償者無所出則以錢百萬獻于官公問錢安在曰散于民間官取之易耳君曰以此餌我而欲自為計也即受其獻而列名及數悉蠲之無不稱快或殺人于野而未獲尉兩以他盜塞責君察其非是皆縱使去既而眞盜乃見猶微服至其處覈之與獄辭合縣計初無百金之儲而逋負以萬計君攷歳入之目窮蠧耗之原曰吏姦耳吾能裕之先是歳用一吏司出納號場典羣吏表裏假貸為姦君使日一易之凡一日之入暮歸諸帑久而寖饒曰此理官錢法也規模既立上下寖以相安再歳所用益衍重門頽圯衆以為請區畫自出一物不取之民有與官為市及就役者加與之庸直有獻木者君曰官自足用此汝先壟中物或與族黨不平將假手于我耶卻之先嘗籍諸鄉之盜日飼之而拘焉民間無復犬吠之警既數月相率而訴曰某等失業為此然朝暮惕恐未嘗得飽食安卧如今日也各已知悔且望少寛許其日就傭役夜必歸宿及是皆執役于官元夕落成棟宇華煥鄉民不知有役咸聚觀以為神縣庠久敝欲新之而前迫于民業一徑㡬不容車馬君謀闢地或曰其家富饒未易得也君召與議即以為獻厚償其直于是面勢軒豁新殿廡列棨㦸觀者唶曰吾邑文風其昌乎其後名薦書取儒科者相踵元日為敘拜禮衣冠畢集為陳尊爼設介僎敘長少獻酬雍臾無敢譁者且曰鄉飲之禮昔固嘗行之未有濟濟如此者耋穉皆相與觀禮焉君資明而健決兩詞至前情偽立見書判數百千言反覆切當每曰久訟廢業實官司不決之過惟詳盡不可轉移則安居矣故一經予決雖宿姦巨猾無復異辭及君將去念一任所決滯訟幸無翻訴吾去之後猾吏或為姦利則貧弱必受其害乃許請㫁由以備于是請者日至一一給之或感泣者曰令君為我長慮及此眞父母也咸請立生祠君力止之既去民知其不可留扶老攜幼前期出境數十百里俟于水濵泣且拜曰不復有此知縣矣婺遭大水溪南之民登屋緣木以避者數千計守倅乗陴君首募善舟者救之令曰活一人者給錢五千竭貳㕔之蓄繼以私帑到者分處官舍既飲食之又列炬通夕以男女混處恐其淆雜也人尤伏其慮深盜入民舍覺而遁隱于桑間主人訪求盜投以石㡬中主舂以矛盜墜而殞吏以盜徒手受矛當主人以殺人之罪君詰之曰石非仗乎雖非所持然中則主人死矣闇中偶傷于刃此為登時勿論可也守不能決交讞以上棘寺卒從君議有毆傷保辜限日未滿而殂者吏坐毆者以重辟君已知傷者能遨于市飲啗自若偶以宿疾發而斃再訊如所聞吏民驚伏葢于獄事尤留意深思以得其情平反如此等者非一也婦人有欲棄其夫者誣舅以私舅不承而死于獄吏白無所攷證守將從婦君曰使其有之亂倫之罪固不為輕使其無之厚誣其舅亦當反坐舅由此以死婦可已乎聞之憲臺遂坐婦罪里婦獨處惡少謔之不從夜詐稱夫歸婦痛無以自明泣告其夫而縊君聞而為葬之表曰義婦冢罪其為詐者君之莅政多此類嘗禱用于龍潭冒險親至其處肅然若有所感雲出湫中得神物以歸隂雲隱隱及郡而霈然作邑時凡禱皆應如此豈人力哉守既行而新刺史之兵百餘人未知所歸君使盡集于庭探籌分管隨即帖定三易郡將備盡禮敬事有利害必力爭事已和好如初君在州縣一時監司帥守多名公相知甚深然不為苟求終無有以姓名薦達者恬于仕進改秩之初文惠公在經筵欲以請于孝宗而君辭焉曰未更吏事且欲字民以行志耳晚年閒居歳久祠禄亦不復就廟堂聞其亷退亟稱之以厲躁競者山居蕭然棊酒自適不以一事至公庭鄉之太守或欲見而不可得居官以亷節自厲俸給之外凡有例者皆不取用度一切取贍于家歳計僅給均為十二每月一出之效東坡段作三十塊之説不治産業凡貨利之事未嘗為也好仁樂施聞親戚之貧乏者以濟之䘮不能舉女不能嫁多為成就為梁以濟渉解衣以蔽寒塗潦者予以笠屨年凶則為粥以飼餓者疾疫之家既遺以藥至量其所食昬暮潛送其家不使知也親見義役之便民及歸見鄉鄰有以爭役破家者君謂受役之害小爭役之害大勸率為之為請于邑大夫力主其説今賴其利焉近山有虎樵牧失業者㡬月募獵者許以厚賞獵具入山虎亦遁去晚益嚴重端莊守禮語不輕發居不雜交親朋有過靣折之有一善則奬借勸勉如自已出取司馬公家範書儀約為冠婚䘮祭之禮行于家子弟有惰容必正色以臨之童穉笑語亦不敢妄衣服器用不追逐時好家人俱不敢為華靡之飾或見之則嘆息世態之薄也嘗在衆中服布衣鄉先生沈公銖笑其激君曰某不知其為陋也淡然一室無他嗜好惟取禮記檀弓學記中庸大學祭義祭統儒行表記等篇通鑑唐鑑朝夕從事尤篤于教子招延名士宗族子弟之願學者皆預勉以修身之要不徒望其取青紫也長子中第又二子入太學未嘗以為喜葢所期望者不止此夜課童幼語孟為之講大義每曰雒誦之聲賢于絲竹逺矣莊談梵帙深究理趣病中區處家事秩秩有條醫至嬉笑待之呼諸子曰我無所憾惟汝祖隱德實行太史紀載甚略我死則汝輩不復知矣口授數千言既革神觀愈清自書一頌尤為曠逺又書二紙戒毋受賻贈大略言生無益于親故歿可擾之乎仍戒毋用緇流既畢盥手炷香奄然而逝其視死生眞若旦晝耶君娶舒氏御史中丞亶之曽孫先君十四年卒贈宜人孝敬誠篤四德全備樞密方為國子監簿宜人未嫁而樞密超遷臺諫大寧喜曰此婦其昌吾家乎未歸登政地歸享上壽康寧宴衎宜人未始一日不在側也大寧性嚴事之至謹遂信愛之樞密久未有弄孫之樂宜人請君置妾君曰設心如此何患不昌既而得子今兹蕃衍葢不妒忌之效也新昌相傳有白虎神為祟吏言請避正堂君弗顧宜人亦曰何物小鬼敢據公宇乎不為動而亦帖然族妹為邑士之室始至遣饋之及歸則與之酌别中間不時求見則謝之果有私請也在官未嘗問梱外事俸入亦不舉知其目君之清德所助為多凡君所為極意奉承君待之如賓言必稱名有出入宜人必攝衣揖之子婦侍側雍雍如也待婢使未嘗譴怒詈言不出諸口衣必澣濯不事珠翠綺綉之飾年纔五十有七卒于婺之官舍葬于陽堂鄉包家山之原子男五人彌遜迪功郎紹興府蕭山縣主簿彌迥迪功郎新台州臨海縣主簿彌遵先卒彌進將仕郎彌逮太學生女二人早夭孫男十三人麟之中之介之舉之希之翬之阜之常之準之异之􅠐之􅋷之彛之女九人在室諸孤將以十二月壬寅奉君之葬合于宜人之墓來求銘鑰託契非一日君之清介實所難及諸孤録君行實甚詳且其施于政者皆可為後法又自言其母之賢尤痛其早没懼無以顯于世願併書之故為具載而系以銘用慰孝子之思云銘曰史氏之賢德惟邁種衣冠之盛輔相我宋君生而秀弱不好弄父兄濡染以義折衷比宰百里始見于用亷白照人輕徭清訟人皆望君夷庚飛鞚僅乗貳車其退甚勇平生介然晚益嚴重閨門自養無所修綜潭府不居歸侍丘隴家廟時享極其欽奉動循禮度周旋勉中閨門化之無敢奢縱屏絶聲樂喜聆雒誦謝去機事志甘抱甕力行所知不牽于衆誰毁誰譽終不為動老成云亡鄉黨所痛君則了達如幻如夢我方臥痾向風一慟詩以颺之後人其諷太孺人蔣氏墓誌銘衞世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許此栢舟之詩所為作也女不事二夫古之道也共姜獨見于詩則知是時必有不能守者而況後世然共姜亦惟知守義不聞他美若從嫂太孺人蔣氏眞有共姜之節而婦道壼彛則又過之其可以無紀乎蔣氏世著籍于明之鄞今曰慶元府曽祖諱侃隱德不仕鄉里稱長者祖諱浚明贈金紫光祿大夫父諱珫朝請大夫贈宣奉大夫妣宜人周氏贈碩人方孺人兒時有善相者謂他日必領百口既歸于我實伯父揚州諱璹之仲子也諱鏜字仲宏紹興十五年伯父提舉福建市舶從兄以疾卒于官舍兄資孝謹事親主于敬接物謙和遇臧獲亦未嘗失色伯父宦未達産薄累重或至乏食上不以病二親下不以語妻孥經營彌縫以盡其歡間輟口腹以與兒輩猶嘆曰人多不能報上但知報下爾壯益進學屬文舊作止存一二手抄書皆有楷法雖米鹽細事亦然在泉南嘗受詩于柯先生宋英先生亟稱之伯父與恭人馮氏尤所鍾愛哭之甚哀孺人年纔二十有九一女六歳居長四子幼者生始半月時二兄一弟皆在仕途所生母楊氏太安人眞欲奪而嫁之舅姑亦不能必其留也其伯父中奉璿諭之曰守志固美行顧汝年尚少能自保乎泣謝曰相待如賓誠所不忍抑不如是諸孤何以自存卒不為動揚州擁麾持節厯十餘年所在隨侍雖舅姑存撫備至兒女子羣居間有人所難處者一切安之而婦職愈謹歸自維揚恭人得疾就醫于京口一力奉藥餌非親嘗不進卧起必俱既卒執䘮盡禮歳在辛巳揚州以廪橐均付子舍用稍裕矣即戒諸子曰父葬未安而當遷汝曹俱壯而當娶異時長穉猥衆何以待之吾性儉約有素汝其毋徇侈習衣食之餘銖積而寸累之後數年由奉化之長汀舉從兄之柩改葬于松林鄉報國山祖妣魏國夫人塋之右求姻家蓮峯侍郎周公綰為之志諸子遂以次授室將析居黙禱于先曰未亡人願守故廬也果得之㕔宇不改餘皆一新視舊不敢加瀕湖仍存風月閣之號謂家法子孫所當世守命鑰大書勤儉二字扁于正堂揚州略用范文正公義莊規約以贍宗族之不給者孺人思有以増益之戒諸子及從子節他費遇稔歳則儲其贏今有端緒焉延慶寺有十六觀堂禮長懺僧未免乞食揚州欲賣田贍之始捐百斛孺人復用四十萬錢以酬先志且為揚州立祠得龍眠李公伯時所繪五十三善知識于故家置廣慧寺中有以乏告隨力周卹葢義所當用者大率不吝至其自奉則衣雜布素不事華飾纖粟不輕用也諸子少小蒙訓夜坐則諄諄然語昔者嫠孤艱棘與夫處已治家事上撫下之道一燈明滅泊如也每言今衣食登足不惟汝曹享其成我亦何力之有僅知守而勿失爾故凡牟利稱貸等事未嘗過而問惟計所入而嗇其出磨以歳月而至此亦不復詳記多寡坐總其凡諸子幹母之蠱無敢欺者子若孫今已九房孫㑹詵詵時節上壽斑衣滿前遂成大家和氣浹洽終孺人之世百口無間言内外姻戚莫不歎仰以為古之烈女無以過或謂節約已甚者至是皆心服焉然終不以此自滿時以手加額曰非舅姑之賜不及此故于諱日及家廟香火四時祭享必躬親之孀居㡬六十年執禮益恭吾母大寧郡太夫人間一過之奉之如姑未始少失禮于上下前數年嘗至奉川凡樓氏蔣氏松楸一一躬拜之曰吾老矣恐不能再至也病中不喜服藥區處家事甚詳且謂家人曰汝既不能留我吾亦不復戀汝勿為哀毁能保家如今日足矣戒䘮葬母侈以髙侍郎夫人為法嘉泰二年四月辛巳終于家享年八十有六男子長曰淵承議郎知婺州浦江縣賜緋魚袋仲曰源皆先亡叔曰洪季曰深國學生女歸故承議郎太府寺主簿周元卿孫十三人椅國學生桐國子進士棣梓㯃枅栱槐植根棁櫛栟俱業儒桐梓栱槐植先卒女九人兩浙轉運司進士趙巘夫從政郎新差監行在太平惠民和劑局趙師固宣教郎建康府溧水縣丞趙善潼國學上舍生宣繒髙保孫吳槱之國子進士趙汝括皆壻也二未行曽孫六人儀伾僖儲儒儼女六人俱在室明年將奉孺人之䘮以十二月丙午祔于從兄之墓淵既陞朝贈父至宣教郎孺人先以髙宗慶壽恩被封孺人壽考康寧安享備福如相者之言而子孫亦復多故淵最為可哀葢其資禀有父之謹承母之訓而又充之以學問文辭蔚然鄉評甚休厯五任所至以賢稱職事無不辦受知于名公而未嘗一與同寮相忤行已無毫髪之玷此宗族之所痛而況母子乎然孺人之䘮洪深率婦孫哀禮俱至孺人為不亡矣銘曰女教不興彤史無稱猗歟孺人婦道備成執節守義固女子之髙致處事善㫁㡬烈丈夫之所不能葢孟光之潔顧婦之清軻親之嚴篤陶母之賢明殆將兼而有之何止乎繼柏舟之名耶從妹樓夫人墓誌銘夫人姓樓氏名某字靚之曾祖常左朝議大夫累贈金紫光祿大夫祖异徽猷閣直學士左朝議大夫累贈少師父琚右朝㪚郎世為明之鄞人母安人陳氏朝㪚子女最衆及娶嫁者男五女六而家訓素嚴紹興二十三年知紹興之新昌縣夫人于是年十有公矢謹擇所歸石氏為邑中衣冠名族有娶吾鄉金川馮氏者其子曰文朝㪚曰馮亦吾外家而又知文之賢遂以歸之文字時亨生未晬而孤所生母太孺人某氏相與為命忍貧扶持備嘗艱棘人視之蔑如也得夫人而家寖以立夫人性資曉慧容止端莊幼閑禮度動有儀矩尤勤婦功且精其能既歸石氏仰奉其姑謹相夫子一以儉約職中饋事婦姑相安慈孝兩盡若親母子相處四十載怡愉如一日太孺人舉家務付之年未侵而身得優逸遂以上壽被慶典之封加賜冠帔以華晚節時亨有志古學結交多名士客至則酒肴不待需而具或游他郡從師友一不以俗務嬰拂之䇿名薦書賢譽日聞而夫人亦有内助之稱焉時節烝嘗必躬必親嚴潔精專至晚不倦石氏族黨最盛夫人承順上下皆有禮而恩意加之遇有慶弔率先而往無不敬歎時亨尉羅源道逺單騎以行夫人與家人奉姑尤謹有疾則調藥餌須臾不去左右既䘮哀踊不勝棺椁衣衾既已孫備送終纖悉舉出其手雖皆子婦之職亦云難矣時亨相待如賓夫人性剛氣直習聞論議以及死生之說往往領解慶元六年年六十有四聰明如少壯髪無斑白又素少疾病一旦以下利奄然如蜕既斂面如生兩手俱結釋氏印信為善之報寔六月乙未也親黨哭之皆盡哀生四男子穉徠侗顓長先十二年卒次為太學生二女子長適里士黄日宣先八年卒次在室二孫順孫興孫將以嘉泰二年某月某日葬夫人于仙桂鄉石谿之原祔祖塋金紫之兆次時亨不堪悼亡之戚來求銘鑰諸父五院猶記少時惟伯父洎先工部多鄉居兩家往來最為親密夫人與余齊年而後一月相與㡬如同氣又念羣從兄弟及姊妹五十餘人存者僅十數而夫人又亡矣時亨復雅與余以臭味相好兩嘗過其家登飽山閣舉酒道舊故如昨日至是不勝愴悼而為之銘云時亨今為修職郎新嚴州桐廬縣主簿銘曰夫出名門孤立無朋夫人相之家道以成事姑克終睦族以禮子且有稱遽悲陟屺窆而求銘伉儷之情吾有感焉引筆涕零績谿縣尉樓君墓誌銘先光祿有十丈夫子惟伯兄績谿尉生于紹興二年仲兄嚴州生于四年至七年而鑰始生二兄愛鑰厚期待尤逺硯席相從有師友之義伯兄年方三十有二而蚤世仲兄與鑰不堪手足之痛祭之以文有云左琴右書一室環堵熒熒夜燈共㡬寒暑讀者悲之葬送之餘調䕶孤嫠不一而足仲兄不勝先公之䘮五十而終鑰益孤露上奉慈母以及二嫂下領諸弟從子幸不失雍熙之軌猶可樂也不幸丘嫂又亡矣哀哉兄卒于隆興元年十月丙子以十二月庚申葬于奉化縣長汀先祖冢舍之側嫂卒于慶元六年七月辛巳嘉泰改元得吉卜于禽孝鄉白石里徐隩之原二年二月甲申諸孤遷兄之藏以三月丙午朔奉夫人之柩合焉先葬泣以請曰渢滌不天父之葬不及銘今䘮吾母忍死竭力以襄大事惟潛徳懿行叔父知之為詳請併登之石鑰亦為之泣念吾伯兄抱負不凡不見于用不惟他人莫知諸弟生晚亦不及知也欲無為銘得乎兄諱鐊字昭聲世為明之鄞人為今慶元府曽祖常朝議大夫累贈金紫光祿大夫祖异徽猷閣直學士朝議大夫累贈少師父璩嘗權工部郎出知處州終朝議大夫累贈光祿大夫母汪氏今為大寧郡太夫人兄生而英發少長風姿灑落從鄉先生游自力于學舉業之外哦詩結字遇其得意警拔清新無不稱歎登覽勝地好風佳月必倡率儕輩觴詠酣適未始虚度寓處室亦必隨宜増葺拳石泓水昌陽蘭蕙芬馥秀潁而燕居其中間作墨戲小山叢篠雅有思致及見杼山劉公慕用其人摹草書千文㡬于亂真又有幹才先公築室深入窮山取材董工身任其勞疎財好義篤于親故恨力之不足宗族託以吉凶事未嘗云難甚劇者亦談笑而辦人以逺業期之歳在戊寅光禄丞溧陽以郊祀恩補將仕郎次年中銓選授右迪功郎徽州績谿縣尉未赴今嗣秀王方守丹丘檄監大田酒庫勤于所職檢柅弊蠧不擾而事集能令一方之人惜其去詣郡乞畱未㡬以小疾不祿使假之年其自見于世者何止此而已耶嫂陳氏家番易祖宗道父兖登政和八年進士科止于發運司幹官母太安人徐氏新城名族膳部公偉達之女也無子生三女嫂其季也光祿知烏戍鎮事從姑之夫吏部孫公邦亦新城人與徐氏親厚以膳部之壻為屬遂締姻焉素有母訓歸而家人宜之嫁十六年而兄亡嫂方盛年幼穉纍纍長女始及笄而吾家清貧又非今日比徐安人尚無恙欲嫁之自以幼更多難又爾寡居命也奈何矢死靡他一意俯育人已服其守義自爾斥去鉛華專靜勤約心計精密銖積寸累五女遣嫁三子納婦雖次第成立而嫂氏亦為之早衰年逾從心猶執婦道姑嫜娣姒歡然終身晚耽内典一絲不掛養痾自佚得壽七十有五中子漵後七月而卒女長適蔣與求次適奉直大夫知南劍州軍事朱軝次適迪功郎紹興府新昌縣尉兼主簿孫逢吉次適儒林郎添差建康軍節度推官趙師潯伍趙二壻及趙氏女亦俱亡矣孫七人曰棟年十三而夭曰機曰椷曰枝曰樾曰枚曰格孫女七人皆在室銘曰嗚呼伯氏自立千仞齎志壯年其用勿盡變彼賢配厥有髙節栢舟自誓以汔同穴俯仰疇昔首尾四紀稱于宗姻光于彤史徐隩之藏捨舊從新我為詩之用啟後人攻媿集卷一百五欽定四庫全書攻媿集卷一百六宋樓鑰撰誌銘戴伯度墓誌銘紹興三十二年鑰叨薦于鄉時二戴皆在前列曰機為詞賦之冠曰樟以周禮選長字伯度次字伯臯戴氏世為鄞人居桃源鄉曽大父侃以財雄大父冕以通經屬文上禮部不及仕而卒父汝明能傳家學見二子蚤歳競爽尤篤意訓教母夫人朱氏亦課督之一日俱擅場屋聲父以二子故㝷封至宣義郎賜五品服母封孺人而戴氏愈著伯臯擢乾道五年進士科終諸暨丞伯度至紹熙之元始以特恩補官鄉黨固已歎其晚暮纔厯金華簿待次鐡冶而一疾已矣實嘉泰元年二月甲午也君之子燧以行狀踵門泣且拜曰既已忍死治墳于鄉之萬隩將以十二日丁酉襄事敢求銘于先友余亦為之泣曰葢嘗銘子之祖矣忍銘吾伯度耶讀其狀則袁和叔之文也和叔不輕許可又為伯度内弟知之尤深無一語溢美又念頃與昆仲定交晚與伯度益厚君之歸余偶苦足疾竟不及一見遂備錄所狀益以見聞而系之以銘惟昆仲皆游郡庠朋儕斂袵畏之伯度尤長于賦俊逸而不肆妥帖而不局體物匠意有前輩風君初調迪功郎紹興府蕭山縣尉未上丁宣義憂服除始為主簿官雖卑惟既厥心夜漏未盡而起旦即坐曹簿書鈎校不遺纖微皁吏莫不苦其勤憚其嚴而心敬服焉事不詭隨亦不苟異每以出位近名為戒厯事五太守或寛或嚴同列或未免少變君趣操自若曰吾知盡吾職爾田賦之入異時莅其事者有刻下奉上以溢數為能輸者苦之累月而未畢漕以屬君更前之為僅兩月告具貧弱下户有積年未盡輸者守俾督之君詢究得實言于郡曰民畏法敢有不盡吏擅私隱欺爾郡計幸無乏奈何重困吾民守悚聽亟命蠲減合七萬餘緡先是縣吏輕侮士類被以惡名有赴愬者多沮挫不能自直而眞為姦者庇之君處心公平于吏無所聽沮者伸而庇焉者屏迹邑人稱誦之守與憲交薦其詞甚美既終更今丞相謝公一見深念之以為提㸃江淮湖北鐵冶鑄錢司檢踏官踰年會屬疾以承務郎致仕終于家享年六十有七娶汪氏二子長即燧也次炳女適嚴仲游伍玠方復嚴輔之皆里士孫男塤埴一女君風規峻整志尚卓犖恥與碌碌者伍平居介然未嘗諂辭令色蘄恱于人非道義之契不與深語區别善惡若已甚者而徳性温温胷懐四達不設防畛色養親闈恪謹朝夕不敢少忤其意友愛諸弟于仲氏尤篤拊存孤嫠族黨稱述初師事鄉先生髙公開而深為先生之兄侍郎公所器重自是為學愈力有勝己者必從之研窮講切日進而不止根本諸經博采百氏喜史漢書敘事奮筆效之沛若泉湧英詞麗藻出必驚俗愈出而愈新尤工偶儷之文如覩寶藏金珠象犀爛然溢目喜作七字詩多關風教有蟄齋集十卷葢庶㡬乎詞人之秀一第易爾而困躓若是人為慨嘆君處之怡然無隕穫憔悴之色晚得一官稍見施設方為當路所知則又不幸而病病愈復作竟致大故嗚呼如彼其才發攄素藴足以顯于用顧若是而止乎然君之持身傳後自有不可泯沒者官金華也俸入至微而尉廪差厚守曰主簿尉官等爾而勤怠有間勤者薄而怠者厚可乎使均之固辭不許曰吾以懲勸官吏非為主簿也然卒不受其義利昭晰如此官事稍暇時從名勝相與講貫有日新之益教詔二子朝夕諄諄無非切己曰吾平生所守不欺二字而已其子亦刻志自立親炙師友將大其門君之培養根源顧不厚哉銘曰昔吾鄉兮兵燬求故家兮無㡬訪戴氏兮故廬自熙寧兮經始歎古風兮猶在信不陋兮不侈川流兮無窮喬木兮髙風忽不見兮伯度儼丹青兮徳容嗟二雋兮齊名抱器業兮長終百不試兮一二泣遺稿兮焉從幸素業兮有傳庶不悼兮土中表斯銘兮宿草尚過者兮必恭駱觀國墓誌銘易道不明乆矣夫子之于易不可及已然讀之至于韋編三絶是時十翼猶未作也近世通易者莫如康節先生亦寫易一部貼屋壁間日誦數十遍今之學者未論明易能讀者盖寡甞聞旁邑有駱君觀國能凌晨暗誦全帙大寒暑如一日至老不廢每歎以為難及而未之識近者叔父學賔與從子沐致郡博士楊君成己之意云有里士駱士宏與之有連求志其先人之墓既而沐又介以見泣拜且請就閱行實即觀國也乃為序而系之銘駱氏統仕吴為偏将軍封新陽侯姓苑曰東陽人又曰㑹稽烏傷人至唐有賓王以文章顯貫義烏實烏傷也五季之末有友義延訓者相繼為台守自義烏徙寧海遂為邑人君諱季友觀國其字也曾大父益大父全父恂世為著姓君于兄弟為季幼敏慧父竒愛之多買書而題其卷末曰留遺子孫君少長即感勵力學未冠而父與長兄俱亡母項氏以悲憂感疾氣㿂如石鍼藥弗及君創屋一區寛明温凊娱侍無闕家人化之未期年而頓愈至九十以夀終鄉黨稱孝事仲兄尤謹協力克家嘗讀佛書有感脫略世故逍遙林壑者數年儼若凝思専以達性為事聞儒士釋子有理學明徹者不問逺近必往叩請後果通悟幡然而歸曰吾乃今知天地萬物初無二致儒墨殊塗而同歸求其體用具存者莫大乎吾聖人之事業精義入神所以致用由是求為有用之學家政益井井有條年近五十不復作出仕念讀書必研究至極嘗自嘆曰若欲窮理盡性知時識勢開物成務無出于易非圓機之士孰可與論是哉其子至前間取卦爻象辭以警之使之通貫而後已子雖鍾愛十歳即就外傅有名士必使從之逺亦不憚歸必使誦所聞士宏讀孟子至引而不發躍如也君撫几三嘆且令掩卷曰此正孟子警拔人處既不待發尚思其所躍如者何以得此此不可以口耳章句求之語至數四士宏聳然因名以躍而字以子發後始改焉淳熙間髙宗慶霈封迪功郎致仕非其志也鰥居二十餘年不復再醮獨處一室植竹繞榻而讀書其中雍容閒雅作詩如其人暇則風詠以自適日渉家圃好吟歸去來辭其于聲利澹如也性耿介事有曲直必為之辯析里人憚之感疾既革神閒氣定不異平時至親環立忽語之曰生必有死世間止如此爾初非異事命筆俾書四句頃之氣絶慶元五年十月七日也娶同里魏氏生一男士宏也二女長適進士王夏國子監丞知信州及之堂弟次適楊考叔成己之從兄也孫男五人朝宗光宗儒宗可宗皆業儒開宗尚幼以嘉泰元年九月十四日葬君于縣北大中山之原合孺人之墓余將屬稿會閬風劉允叔次臯過余問以鄉評曰此真吾邑之善士也贊余銘銘曰君之于易日讀一通百徧義見況終其躬學成不試得正而斃積慶之餘尚啟來裔朝請大夫曹君墓誌銘紹興李莊簡公光以直道大節屹然為中興元臣聞四明曹公粹中之賢妻以長女翁壻間自為知已學問大率以躬行實用為先真有冰玊之譽君其仲子也天資穎悟記誦絶人長而力學既有家傳而又源流外門氣節自許詞章煥發落筆千言仕雖不顯而見于政事有可紀者足為一世名士余里人也客授東嘉君時主平陽簿深歎其不可及交情日深三十年來君之文益工政益明操守益固方相期為世用而遽亡矣哀哉將葬君之子孝忠以行録泣求銘君諱盅字困明明之定海縣人曾祖慎微贈宣教郎祖實贈奉議郎曽祖妣袁氏祖妣閔氏黄氏皆贈太孺人父朝㪚郎建寧府通判君既升朝累贈中奉大夫妣太宜人乾道三年君以中奉致仕恩補將仕郎明年銓試上等授迪功郎為平陽主簿次調江陵令遭内艱淳熙九年循從政郎監行在贍軍激賞酒庫十五年以舉者改宣教郎知秀州嘉興縣既書再攷引親嫌改知福州長溪縣慶元改元通判楚州六年授福建轉運司主管文字積官至朝請大夫嘉泰二年九月朔以疾終于官舍享年六十有八娶陸氏封宜人子二人長孝忠也將仕郎次孝先當被遺澤一女尚幼十月還鄉三年三月癸酉葬君于奉化縣禽孝鄉童隩先塋之側宜人祔焉君兄弟競爽而君尤俊邁不羣十二能作舉子業未冠已博綜經史百家之言天文地理與夫天下形勢兵家之學靡不通貫詩章文賦命題立就動輒驚人少嘗留題寧都金精山有曰手擎白日浴滄海氣使列嶽如羣兒中奉見之為失色且戒以力除此等氣象見其留心詩文以為當究經術務為實學君自是日則幹蠱夜則讀書昏定率飲三盃君止求小盂置書燈上至四鼓酒温始一引而寢奉親盡于敬愛不忍頃刻違膝下貧不足養恐貽親憂至躬負米之勞中奉被疾衣不解帶藥必先嘗既革許誦金剛經萬卷誦之終身至于倍蓰自少攻苦食淡忍貧自克奉身至薄至用于義則不吝尤篤于友愛伯氏多女為嫁其二餘又厚助之介弟寓江陵逺宦相值情好尤篤見其子與能書不翅身得之喜幼弟早亡撫其孤為次子即孝先也其在平陽能聲已著上司委以事㡬無虚日訟者亦多自請求決士民歸心去而挽留殆不容行侍郎曽公逮自温除漕深知其才而薦之大卿辛公棄疾帥江陵治盜素嚴有盜牛者配江州吏縁其意欲沈之江君慨然禀白公改容歎賞卒俾如令寸金隄去城二里實捍大江衝突之患歳役人夫數千具文而徒勞君調夫均平躬自督課増卑培厚以為永利又以農隙修築沿江官隄使前日巨浸衝決之地復為膏腴流移歸業耕墾日闢諸司公舉具載實跡南軒張公栻尤知君引置簽幕其舉詞有云直論敢言不肯詭隨有足嘉者𣙜酤餘杭京尹尚書張公枃韓公彦質更薦之遂以更選公餘任刀筆之須談笑揮翰無難色嘉興劇邑且當孔道牒訴山積君以五鼓秉燭治事遲明而畢人歎其敏既至長溪辛公帥閩以鬻鹽來委君謂縣為出産之地開國以來未嘗與民爭利持不可帥怒易糾曹比至帥已釋然不使就職相與觴咏彌旬會貳車闕即以處君其在山陽尤悉邊事帥漕總餉合詞乞不次擢用嘗論五事一乞令楚州守臣仍舊節制出戍軍馬二乞開壽河以為山陽饋餉之備三乞申嚴淮禁四乞止用官會不必再印兩淮鐵錢交子五乞開淮東荒田以實邊儲習邊事者皆以為當思欲一登玊陛方寸之地以吐胸臆而所向不偶性素剛銓部偶有漕幕見次授之以歸㑹閩中歳旱白使長此不可謂細故緇黄禱祈亦置勿論辯析滯訟疏決岸獄加以振貸庶可感格貳卿曽公炎悉從其說隨獲甘澍君位不稱徳其見于政事者止此中奉詩易皆有傳先以詩傳俾鑰為序而刋之遺藁自甲至辛凡八帙尚可傳逺也君之屬文兼備衆體高宗七十之慶一時文賦表頌獻于闕下者無慮千數君進賦篇無媿古作尋有旨付後省看詳取文理優長者十人以聞給事王公希吕中書舍人鄭公丙李公木以君為第六觀者無不嘆服其工開府吴公琚倅京邑監漕臺試夢神人以黃牒書君之名者不能遽識明以語同事俱異之君時自平陽來試吴得君名而喜已而果在選中比為浙漕君引夢事為詩以見之吴公加禮焉君抱負不凡動以古人自期標致甚高不合于俗每謂與其取美以求合孰若行吾之志官雖不顯而氣不少慴所至放達不暇商計嘗嘆曰識真者少從古以然知我者希則我貴矣君御家嚴整居鄉尚和父老童孺相為爾汝非意相干自能理遣晚卜築奉川一區雅潔聚書萬卷多手自讎校每言夜以一燈使婦奉姑别以一燈觀書積學老不衰客至則討論古今觴詠奕棊意殊不倦客去則凝坐一室多採釋氏高勝之言可以警悟者書之坐右自號牧庵居士不喜雜交以傍人門為恥髒兀傲自適其適既不能少貶以求進使得壽考為鄉里老成夫豈不可中更游宦處此室廬僅十稔而夫婦俱以喪歸可哀也已宜人世居台之寧海曾祖熙祖扆父之機起于富室而温恭勤儉無媢妒之私事姑相夫婦道惟謹君有幼妹寡居君欲奪而嫁之妹自以姑嫂相處無間不願再適同居二十年此尤可稱者君之成家出處無玷缺内助為多年纔五十有二先君一年卒七月二十有一日也孝忠痛怙恃之繼亡併求著其母之賢亦君平時之所稱者牽聨書之以慰孝子之思云銘曰矯矯囦明天與令姿學有自來而文益奇駢四儷六篤論工詩奏賦明光大放厥辭見于有政精敏光輝才髙位下知我者希胸中耿耿噤不得施吾徒掌制愧先于之伉儷同穴行道興悲我銘其藏慰爾孝思參議方君墓誌銘余為兒時先光禄知烏戍已知秀州使君方公之名既冠公守四明纔三閲月而去民歌之至今乾道七年由永嘉郡文學為秀之攷官公方奉祠居城中訖事始得一拜牀下侍徳容聆教言從同事者各詢其鄉里官所之詳故家意象寛𢎞歎仰前輩風度以為不可及公既云亡始識其子夷吾納交雖淺而意甚親後貳司府夷吾之子叔恭為打套局喜其有父祖之遺風遂薦之幸遂識方氏三世嘉泰元年聞夷吾以九月八日終于家二年叔恭等既以二月甲申葬君于臨安縣靈鳯鄉歸長山之原祖禰塋次以書來求銘新浙西參議官王明清仲言實余所敬娶君之女弟既狀其行又助之請仲言有史學書詳備乃摭其實而系之銘君諱導夷吾其字也方氏自周之方叔以來逺有世譜後居嚴之鸕原晚唐元英先生以詩鳴七世而楷以進士起家仕至駕部員外郎生蒙朝㪚郎尚書屯田員外郎贈銀青光祿大夫君之曽祖也妣陳氏贈永嘉郡夫人祖元修朝請郎大名府主管機宜文字贈特進妣王氏贈餘杭郡夫人父滋敷文閣學士通議大夫累贈少師妣李氏贈越國夫人少師未四十而專城擁麾㡬徧東南所至有惠愛晚登從班隠然為一代名臣及見正始源流深逺所交皆當世名士在二廣八年自趙忠簡公鼎張忠獻公浚洪忠宣公皓李莊簡公光諸巨公皆為秦氏所擯斥流散湖廣或在海外秦方興羅織之獄急進者睥睨遷客以為奇貨少師獨一一以時存省饋遺濟其乏絶不幸歿于煙瘴者又為津致北歸旁觀者危之曾弗之卹竟亦不能害此其最為世所稱君忠垕孝謹目濡耳染之久故濟物之心切因得師承侍郎横浦張公九成又從御史樊公光逺三山宗丞林公之奇游講究精微達識宏度是以似之局于名位雖不得展布而平生出處有可書者紹興十九年以郊恩補將仕郎㝷兩該恩例循右從事郎二十一年差充總領淮東軍馬錢糧所幹辦公事改辟福建路安撫司主管書寫機宜文字少師罷四明寓姚江不忍去側自監潭州嶽廟凡兩任孝宗登極循右文林郎乾道初元少師出疆以親屬恩循右承直郎差充兩浙西路提㸃刑獄司幹辦公事七年入幕冬遭内艱九年丁少師憂淳熙三年兼兩浙運司造船場八年改通直郎知湖州武康縣明年明堂大禮賜緋衣銀魚十二年差通判平江府十六年光宗覃恩授朝散郎紹熙二年到官五年差知沅州主上覃恩授朝散大夫請祠王管建寧府武夷山沖祐觀三年差知黄州復請武夷之祠久之差淮南安撫司參議官而遂已矣享年六十有九積階至朝請大夫娶常氏御史中丞同之女君之姑秦國太夫人所出封宜人相敬如賓動合法度閨閫視以為則子男三人長叔恭也朝奉郎新通判臨安軍府事次叔寛宣教郎淮南東路提舉常平司幹辦公事皆賜緋魚袋次叔敏繼季弟後承事郎新監鎮江府大軍倉女四人長從釋氏次適進士張淳厚次適計詵季尚幼孫男六人熙將仕郎㸃將以遺恩補官黙熊照然女五人長未行次適承奉郎知常州晉陵縣丞張佺齡次許嫁四明史文卿次許嫁進士李景藩餘尚幼初君在憲幕王丞相淮為使長雅知君賢君亦疚心協贊多所平反德清縣鞫茹菜者數十人請論如律君究其實乃鄰邑鄉民因售薪致競為怨家誣訴兩造俱斃案中皆牽連者又婺有倡家子規富室之産既已伏辜而嚚訟不已君悉白使者平其獄魯公大喜欲以論薦而君憂去矣船場在華亭造船本錢舊屬五郡期㑹玩弛歲額侵虧君克勤細務額既登足異時闕廩貸物者俱償之漕司于青龍鎮剏許浦移屯寨屋三百餘間久之未定君承檄定基既便于事請以所征商販木植為用尅日而辦仍為痛除重征之弊武康密邇行都易致越訴君律身既嚴剖決公平不科罰一錢寛猛得宜訟亦衰少縣出絲纊賴以濟税課郡利其羨使别儲以俟命縣無所從出商人患苦倍征旁出山蹊公私交病君請于郡復舊規蠲宿逋申法禁減則例以招之曾不踰時來者輻輳并邑亦為之改觀米運至豐儲倉退卻至數百斛典吏鬻妻子不足以償君為于他州賤糴取贏以補其數又以餘貲代下五等畸税義役良法也行之或反以致害君更立規式勸諭誠篤民咸信之追科不事鞭扑間出郊野食用百須皆以自隨無纖粟之擾于是爭先就役他縣至取以為法後有欲更張者老稚叩閽幾二千人竟仍其舊嘗久雨有怪民昌言水且大至人皆悚懼謀避亟捕至庭焚其書械繫以俟期既不驗杖而逐之有訴夫久出不還知其必死而迹不明者君為設方畧得姓徐者一問即承境内盜賊帖息雨暘致禱多驗洊値豐歲上下熙然寓客任公紳諌議古之從兄也靖康失母長齋泣血以求之金人歸我河南徒步走北方奉之以歸孝行上聞擢敕令所刪定官改秩主管官告院母終廬墓事之如生與世相忘久矣君訪其家列其高節于朝控懇備至遂賜金紫聞者欽嘆風化之美提刑劉公潁行郡謂太守曰自蘇至此惟武康無一詞至前蓋君專務行所學視四境如一家不表暴以取赫赫名而民受實惠便坐有梧桐瑞香一曰甘露降其上晶熒潤液浹日不晞邑人聚觀士夫形于歌詠者數十人其去也遮道挽留越境追送者不以數計此豈可力致耶呉門最號劇郡君闗決閒暇貳卿沈公揆同里之舊相得甚歡外臺多屬公以事無不得其平兩攝郡事尤為得體秩滿久滯逆旅今丞相謝公深甫大資政趙公彦逾俱在起部亟稱公始有沅州之命黄州陛辭乞銓擇巡檢以備不虞又論犯茶鹽之禁多妄引仇怨與多藏之家乞不許淹延枝蔓敷奏詳敏上甚悦皆見于施行逾年㑹言路申七十之制君官簿適及即為納禄計再就祠禄又授議幕皆非其志也呉門苦旱嘗躬禱于横山龍母祠有隨車之應都城延燔之後人情未定秀亦連歲大旱公憂惴尤甚若任其責者率里人禱于道宫極其精誠至四晝夜雨為霈然既病猶以裕民之要聞于廟堂丞相擊嘆致謝少師在番禺羅致洪忠宣公長子适為屬丞相文惠公也仍命君定交共處郡齋文惠入相然後引之退然惟循塗守轍而已入仕甚早重去親側居官之日可數若刲股以救越國之疾執親之喪號慕幾致滅性皆人所難誦列子如流達其㫖奥尤喜讀通鑑策其治亂原委往往懸合嘗論太湖高于運河當疏霅川浦漊之要者庶無饑歲後湖守得其説為之果有功焉少師敭厯最久非令甲當給者悉不取閒居又戒與民爭利君守遺訓惟謹歲歉或食不足未始以語人也取友必端志趣相投一見如平生歡苟非其人雖强附弗與年甫弱冠夜聞有溺于江者竭力拯之從叔希文以窮來歸少師解衣推食君又為畢其喪葬婚嫁事隆興二年金人犯淮少師守鎮江警檄交馳君日視烽火安危之報多至夜䦨軍士有失號者法當誅君黙念之㝷訪而還其人少師喜為似我也明年㐫荒之後饑􅥌盈路嬰孩悲啼不忍聞君取道旁數十人育之皆遂全活既長男女各有所歸或詢訪其家而還之好周人之急假貸亦隨力而應之施藥餌以濟貧疾歲時酒炙以遺鄰里先有小圃相羊其中客至稱家有無歡宴終日不倦蘇氏女兄既寡奉之盡禮晚年姊弟合處夫婦垂白子孫衆多簪紱滿前雍睦之風鄉閭稱焉又以平日見聞為覺齋見聞録病中呼子弟戒以孝弟保家終制從約書四句偈以見志幼嘗有得于佛書長從大慧宗杲游且死猶誦杲舊所遺法語而逝是皆可銘銘曰惟方叔之在周兮以壯猶而為勇子孫蟬聨兮見衣冠之光寵元英出晚唐兮擅詩名而最重六傳七傳兮為名臣于我宋仰少師之深仁厚義兮有盛德之邁種禱祠求子兮感精神于吉夢君之初度兮信釋氏之抱送宇量是似兮惟慈顔之是奉孝弟根于心兮利欲不為之動推是心以往兮仁將不可勝用源流老蒼兮學無不綜䇿千古之治忽兮寤沖虚而成誦小試雖不得騁兮著聲望之已聳片言可以折獄兮幾空庭而無訟蹇挽須與扣閽兮何不約而有衆致甘露之下墜兮著碧梧而流湩懷憂世之心兮不敢諫而以諷吐其一二以自見兮言必有中悲長者之云亡兮非夫人之誰慟幸相從于九京兮依世上之丘隴詩以颺之兮顧何取于折衷尚後之人傳業兮庶家風之接踵知鍾離縣姜君墓誌銘嘉泰元年春姜君子謙赴鍾離既餞之又為攷濠梁故迹為大篇以贈别所以期之者甚逺也明年冬初其兄鈐轄子陽來見涕泣而言曰鍾離弟將亡矣以書來相報亟往赴之袖出其書言甚悲而不亂謂得疾之不可為而復甦殆不可免婦弱子幼非兄來不可其末猶曰見攻媿尚書為致永決之意鑰為之失聲而泣然猶冀其無恙也未幾而訃至比閒闕扶喪以歸往哭之哀見其遺書一卷甚備又曰求攻媿數語以表吾墓其友袁木叔槱又得書云欲懇攻媿求銘而孤介能自植立不肯頽墮惟子深知我望與發揮之嗚呼子謙死生之際不亂如此而何拳拳于我之銘將葬木叔為述其平昔大槩文核而事實子陽又以見屬余不得而辭也君諱柄子謙其字也家世汴京曾祖侁故右侍禁閤門祗候贈武德郎祖寛故成忠郎閤門祗候贈吉州刺史以靖康避地始徙鄞今為慶元府人父浩故武顯大夫累贈和州防禦使君既升朝改贈宣奉大夫母朱氏仁懷皇后姪也封宜人累贈碩人君初以世賞補承節監監潭州南嶽廟秩滿充樞密院準備差使淳熙十二年轉保義郎監行在豐儲倉丁宣奉公憂服除辟差監婺州蘭谿酒庫十六年覃恩轉成忠郎紹熙四年轉忠翊郎是年登進士科改授承務郎知臨安府於潛縣丞五年覃恩轉授承事郎慶元三年轉宣教郎知濠州鍾離縣五年轉奉議郎以疾卒于縣治十月四日也享年四十有九娶魏氏丞相文節公母弟知寧國府涇縣梠之女封孺人男一煓女二長許嫁迪功郎新黄州黄岡縣尉司馬遂三年九月乙酉葬君于縣之豐樂鄉東山唐家隩之原從治命也初姜氏之富甲于京師而喜延名儒以立家塾宣奉記覧多聞教子弟尤力兵火流離貲財蕩盡銖積寸累以立門户雖事力不及上世之一二而儒風寢昌矣宣奉之弟諱濤始登科于紹興十二年終諸王宫大小學教授君與四兄皆朱出模四取漕薦棫蒙孝宗召對特除閤職樸雖抱疾不仕其子有場屋聲桐即子陽也與君同升禮部君最幼一再垂翅南宫必欲以科第發身感慨奮發蚤夜力學不知饑渴寒暑蚊䖟噆膚洛誦不輟謂事不成則無靣目見先人于地下卒遂其志又與子陽之子光同登後六年光之弟燧復躡世科自爾兄弟之子薦漕臺登胃監人太學者相繼實自君興之在密院時已名薦書不以官卑而辭勞近郡有禁卒犯階級而主帥不以實聞君上書樞密使周益公謂軍政不修緩急何以使人語苦切益公大竒之宣奉之喪或言可免解官者君曰吾忍為此哉倚廬三年哭不絶聲不茹葷亦不入于家寺丞吕子約時仕于眀見其居處容貌愀然動色遂相與討論喪禮洗末俗之陋後數年貽書朋舊猶曰君執喪有禮足勉世俗士友所共欽也君資素警敏初止鋭意舉業年二十六七翻然自以昨非為悔有志于古人為己之學折節虛心親近師友里社先達及四方賢士大夫遇之必斂袵求益反覆叩請其在蘭谿與婺女諸賢尤稔陶染既久懲忿矯薄見于踐履臨事規規典刑中其進殆未已也於潛巖邑士風久不振君之邑庠為選士之秀者補弟子員每旦升堂講書校藝皆有尺度口授指畫與士日親期年而向學者彬彬然鄉舉占名者三而登第者二尹光庭者名在第五邑人榮之相語曰贊府作成之倡也昌化為鄰舊許民釀酒而輸賦于官有議欲𣙜酤者衆訴于府尹以屬君或謂出于朝㫖且欲以裨郡計君曰此實民便安可漁奪卒免之老稚歡呼爭繪像立祠君力止其議尹益重之檄入僉幕贊助為多君本以鍾離事簡而往而訟牒紛委不減内地君疚心剖析日力不足夜以繼之内和外剛勇于為義人不能奪有獄吏罪惡貫盈而持吏短長不能去有盜牛馬者就逮已得其情而輒翻異君曰必吏教之也一鞫而服白于郡竄之逺近無不快之或言在君左右者皆其黨恐有為之報者君不為動吏民聳服聲聞煒然外臺多以滯訟相委隨即剖決總領韓公亞卿以文章政事科薦于朝郡太守尤加敬異應用之文又以屬君體素弱撫字已勞而種學績文畧不少懈縣事畢舉而君病矣君生長膏梁而丰度高勝簡澹清苦無聲色之奉又不喜飲酒藏書數千卷凝塵滿室蕭然如物外人即所居超蓮堂池西累石創亭名曰磻塢時從雅士徜徉其中坐無雜賓尤工小楷作詩清婉有思致文節公于詩少許可閒居惟雪牕張武子為山中客碧谿泉石勝絶君每至甥舘遇遊賞必參坐論詩善與人交同寮相與如至親疾既侵至相率寢食于縣齋醫禬盡力前數日即命妻子治後事已而屏人危坐既為子陽書又書以與親故人人致訣别之意作偈以寄禪衲之厚善者大書數紙以戒其子弟區處細故纖悉明白意象正大思深而見逺皆平時薰染講切見于躬行者如此可以信君之所存而推見其所未為者其亡也邑人為之聚哭喪歸鄉曲無不為之痛惜者哀哉銘曰嗚呼子謙是好名耶躬行自立疾沒世而無稱耶以其學力致其身起其家施于政事未而見于死生之際足以不朽矣而何待于余之銘耶余方畸于人無用于世吾何足為九京之重輕耶顧言猶在耳遺墨未乾余不得而黙然悼痛之深將何時而卒耶攻媿集卷一百六欽定四庫全書攻媿集卷一百七宋樓鑰撰誌銘林府君墓誌銘四明有善士林君諱碩字興祖開禧二年十一月七日卒年七十有四力學而不見于用言議亦無以表暴于外躬行于家里閭敬之其亡也弔者盡哀明年三月丙申葬于鄞縣通逺鄉金谷里之赤隴楊敬仲簡既識其壙袁和叔燮又状其行樓鑰納交既乆君之子若孫請銘銘曰惟林之先著籍于青五季避地遂居四明曾祖曰簡隠徳自髙祖暐漫仕韶司户曹財雄一鄉積豐施厚植徳名堂用昌厥後父嵩儒科晚仕不顯節度推官官止清逺母也馮氏賢如軻親君少挺特篤于自信講學至勤求友至切質疑請益甚于飢渇網羅百家博覽彊記或問所在開卷指示儉不苟費傾貲買書手不停披萬卷有餘㝷得目眚謂當佚我使人誦之竦聴無惰君之讀書根本經學乆而愈明自詳趨約恭敬誠慤檢柅此身劇暑甚病飯必冠巾心若無倦形體自攝聖學之要正在兢業人靈于物知反為累吾有知哉道斯可致執喪盡禮水漿不入祭祀必齋箴規汲汲捄人之失退無後言謀人必忠赴急必先清心窒慾不作無益聞過則喜改無難色嫠不恤緯惟時是憂賢否用舍如身戚休禹功萬世予獨何人究觀聖心専在為民敬奉遺體不敢不懼涕唾不輕爪髮藏去克勤小物動有彛則端勁小楷見之心畫誦言行録自深愧怍詠康節詩如在伊洛躬行于家是亦為政恂恂二子處恭事敬伯曰惟忠叔曰惟孝字之以全義方之教叔既登科伯亦舍選人謂君家慶由積善伯也忽焉人疑于天宗一繼進纔閱三年夫人曰任克相夫子叔官從政司越之理孫主邑簿宣之旌徳次傳省任不渝淳則壻曰周焯僅試一尉次曰楊忻孫女惟二祖葬豐林逺七十里願依九京今從其志君疾病矣呼友執别神氣泰定怡然不屑收視云久已無晝夜今忘生死安有怛化君則無憾士友傷尚其不亡視此銘章戴俊仲墓誌銘乾道七年余客授東嘉盖士夫之淵也職于學者多佳士而戴君俊仲為録以文行為鄉先生著春秋經解數萬言能為詞章詩清婉有思致性質粹溫不得而親疎乆處庠校與之議事詳審而寡失故尤與之密君是時已嘗薦于鄉五上禮部至淳熙八年始以特奏名試補賀州文學尋授迪功郎婺州金華縣尉光堯慶夀恩循修職郎余去官十五年而復假守真欲下榻以禮孺子避堂以舍盖公而君已得末疾監潭州南嶽廟不可出矣徒有室邇人逺之歎十六年既以光宗覃恩循從事郎余以八月去郡聞君以十有一月甲申終于家享年六十有八娶陶山張氏相敬待如賔家無間言後君十五年卒寔嘉泰三年七月十二日也年八十男二人誠之為郡直學淇為太學生女六人長適張渙次適諸葛詵次適包暹次適迪功郎廬州州學教授張泳次為尼名法夀住處州回向院幼適王廷碩孫男三人橚杕復孫女五人君之喪以紹熙元年三月辛酉殯于徳政鄉湖嶼之原夫人以開禧元年仲冬合葬焉君方領袖諸生時誠之已能屢試上游淇雖幼亦秀爽可喜與余諸子同硯席雖嘆君之滯留庶二子之奮發今誠之亦困于場屋淇在上庠尚可望也公之初喪二子來求銘乆而因仍未就夫人既祔又以請余投閒多病又復許乆杜工部既葬四十年其孫過江陵謁銘于元微之一日而成余既許君之銘二十年而不就有媿多矣君性孝友幼失怙恃語一及則痛自憫悼至飲泣不已弟一飛夫婦蚤沒力貧治葬撫愛其子女如已出開門授徒席下多名士郡延之學後進皆知所矜式至今猶推淵源所自而卒不偶兹非命歟經解三十卷文集號横蕩類藁五十卷藏于家後人尚猶因此以見君之大概云俊仲諱厚又字長文世為鄉之著姓曾大父天休大父臨父端夫俱隠徳不曜後其有興乎從兄之子溪闓之俱擢儒科溪有盛名今為兵部侍郎太子右庶子在君諸生中尤傑然者也銘曰嗟嗟俊仲鄉之勝流學博文優衿佩從游坎壈半生不忮不求命也奈何何所怨尤我銘雖緩尚銘諸幽後有知者其惟春秋通判姚君墓誌銘四明自國初以來端拱二年至乾道末登進士科者㡬二百人矣淳熙五年姚君穎始以第一人及第實為吾鄉之光又其才業足以稱褎然之選意必逺到而竟以不顯可哀也已君字洪卿世家吴興後徙于明明今為慶元府曾大父阜迪功郎容州司户輕財好施創必慶堂于城南延師以教宗族之子弟于是姚氏後又有曰太任曰持曰孚者相踵擢第遂為聞族孚即君之大父也尤號博洽三預計偕入太學宦情素薄再調和州録事參軍遂致其事終左奉議郎父孝全封朝奉大夫致仕賜紫金魚袋母宜人楊氏君在髫齔嶷然已有成人風五嵗讀書過目不忘十嵗能屬文試鄉校占前列郡博士疑之别命題使試于前應手成章時號神童師事屯田鄭先生鍔累年能自刻苦洛誦多至徹旦㡬忘寒暑飢渴經史百氏傳記注疏下至稗官小說多所貫穿大書論語置几案間又取二程上蔡龜山之書仁義禮樂道徳性命之說決擇是非類聚成帙以便講習文體簡嚴自出機杼有以為後時者曰是有命焉由漕臺試南宫參知政事范文穆公成大以宗伯知貢舉得公文竒之及發策集英推明中庸大學之㫖㡬數千言末論敵國事宜尤備孝宗皇帝以其議論正大剴切親擢首選而戒勿版行盖不欲傳于外也聞喜宴御書旅獒篇以賜授承事郎簽書寧國軍節度判官㕔公事特命員外置力祈寝免上嘉歎而許之皇子魏惠憲王鎮吾邦欲侈其盛命以騶哄鼓吹迓君而扁舟已歸郊居矣祖妣史氏盖太師文惠王之姑時文惠再相侍立上前一聞臚傳再拜謝恩丞相王魯公方知樞蜜院問與公何物文惠道所以且盛稱其賢魯公鍾愛一女託文惠以締婚焉魯公後因對及之孝宗曰策中用趙逢墜馬事甚佳乃知簡眷之深也七年之官龍圖鄭公伯熊為守相得歡甚繼之者治尚嚴君能濟之以寛乗間語之曰催科之急郡有十之一則邑十之五吏曹以為利懼民之不堪也守感其言為之霽威適大旱𣙜酤之課不登逮治苛峻君緩其期而蠲其無所從出者人心歡然甘澍隨應邦人尤徳之八年被召有㫖引見以未經審察辭不敢當次日遂對便殿君首以數被異恩叙謝繼論治體切于時者凡十有八條進讀未終玉音琅然云道理當如是又論義倉等利病及守令乆任上皆嘉納除秘書省校書郎供職之日胥吏例以雌黄塗數字請書其上以應故事君不欲循襲非手校真有譌舛不下筆也時言路多選于館中頗有饋遺君不啓書加以緘封而還之魯公當國引嫌丐外周益公欲處以一郡君力辭添差通判平江府又辭釐務不果館閣皆一時名勝惜君之去相與餞飲道山用風流半刺史清絶校書郎分韻賦詩以送之仲冬奉二親以行㑹郊祀以曾任館職恩封及親吴門一都㑹地大事夥闗決無壅吴江民交訟乆不決部使者以屬君邑以其人素不可追君曰張官置吏非以治貧弱正以制豪强耳窮竟黨與卒究其獄一郡竦服君自念蚤以大魁丞輔藩斂藏淵靚若無所能為者間有所為亦不欲人之指目為能也不要名不混俗無所阿附名齋曰迂嗚呼可謂深藏若虚者矣十年禱旱勞悴感疾以終年纔三十有四官止宣教郎屬纊之際語不及他惟以君恩未報親養不終為恨寔十有一月十三日也二子元特四嵗元哲二嵗一女在二子之間君未第時欲卜築于鄞之陽堂鄉延夀山至是遂以其年十二月壬申歸葬妻以丞相恩封孺人于時年二十有三泣告父母誓不背姚氏卻鉛華不御賦柏舟之詩撫教其子女大夫公夫婦至今夀且康嵗時供婦禮無敢慢嗚呼賢哉魯公家訓清肅孺人處昆弟無間言後諸昆弟遵秦國夫人之命以遺奏恩予元特未㡬朝家用故事命元哲以官今俱為迪功郎調饒州安仁福州連江縣主簿皆壻于外家女適承奉郎新監臨安府糧料院王儼又魯公之孫新吉州通判檝之子也孫男女今各二人君性孝謹少居大父母之喪已能悲慕盡禮大夫素嚴重先意承志未嘗少忤遇有慍色至閉户自撾屏息不敢喘母病疽衣不解帶藥非親嘗不進祈以身代友愛弟妹惟力之盡平日動以古人自期文詞之作尤為精敏他人汲汲不能發舒者下筆輒過之掩抑覆護不欲衒耀而自不可掩真如其為人也裒為家集十卷方在甥館時諄諄言宰相之職惟進賢退不肖昔王文正在位僉壬豈能悉去不以為憂也惟多引諸賢使不為小人所勝耳因宻疏賢才三十餘人雖不及盡用終多為知名士君之志豈小哉體瘠神清人以為似文惠而與魯公真有冰玉之譽出門軸折此識不識所共嘆也開禧三年君之二子踵門泣曰先君之葬時兄弟穉幼未及銘墓念不可以無傳又以通判贑州袁君燮所作行状為請余尤哀其意為之銘銘曰人之生子惟恐不敏敏而好學乃善之盡既敏而學又或恃才浮躁衒露為身之災猗歟洪卿實具才美蚤冠儒科一日千里抗志逺古力行在躬文惠是似清如魯公天胡不仁蘭摧玉折二親俱存共姜守節有子競爽志于家傳不在其身天其舍旃王夫人墓誌大名王氏至晉公魏公益顯占籍京師號三槐家魏公之兄諱懿仕秘書丞贈兵部侍郎曾孫為夫人之曾祖震吏部尚書龍圖閣直學士贈少師妣潘氏越國夫人祖仰尚書金部員外郎贈大中大夫妣閻氏碩人唐氏淑人父從知信州贈正議大夫母金氏陳氏俱贈碩人大中建炎避地來明後遂葬于鄞正議定居桃源鄉夫人生于紹興八年十一月年十九歸于向氏文簡公八世孫欽聖憲肅皇后五世侄名公援字伯劭太府卿兼權兵部侍郎士偉之子也終修職郎徽州司法參軍夫人金出也幼失所恃唐淑人鞠育以至成長淑人為質肅公之孫有家法夫人習熟閫範動以為楷至疾革猶以祖母為言逮事侍郎之母游碩人者一紀曲盡誠敬寝疾厯嵗奉養無怠容侍郎季女適仇氏寳學悆之孫由尉贑之㑹昌夫婦俱喪一子伸孤立伯劭與夫人既經紀其家夫人又以幼妹歸之以振仇氏之門侍郎之薨有女纔七嵗夫人拊愛教以婦徳擇曾文清公之孫樵以歸之伯劭友愛素至介弟登仕郎公擢蚤世無嗣其婦髙氏嫠居二女俱幼夫人承夫之志命仲孫大年為之繼以其長女歸髙氏兄子銳賴其經理之助次歸蔣興邦亦名家子也伯劭晚有女甚愛之夫人篤于手足議以歸仲弟涵之次子槩涵授樂清令而不禄資送加厚過于已出伯劭先娶括蒼葉氏僅閱嵗而亡寄葬山寺夫人為繼室略無諱忌土冢修祀如奉其先伯劭将葬謂二子曰葉無子而又别葬若不舉以同穴則後日必寖致廢禮遂合祔焉此尤人所難能也伯劭嗜書手不釋卷或忘寝食夫人時其寒煖不以俗務累其心及其亡也治葬送撫諸孤益謹家政米鹽靡宻井井有條平居凝重語笑不輕發闔門㡬百口内外肅然嵗時姻族㑹聚始假借顔色雖諸院子弟亦知敬憚苟有過惟恐夫人聞之性明淑曉文義旁通醫卜之說又善攝養少病疾年七十忽得疾遂不可為寔開禧三年二月戊午也二子之邵之翰二女長適甥王蒼舒次即槩也孫男四人大成大卞大方大應女二人長許嫁蒼舒之子将仕郎簡次尚幼将以五月甲申祔于雙鴈鄉蓮峯之原司法之墓始余妻祖尚書公俣上世由大名徙宛丘自晉公分派故南渡以來與三槐通譜二王氏向氏皆居明越間夫人之弟柯山使君淹又與余締婚焉于是使君哭女兄甚哀以書來曰自涵弟云亡與吾姊相倚為命幼而至老氣同聲應専以謹守學業不辱門户相勉罔敢怠忽今舍我而逝人皆謂其令終吾今獨存何以善吾後冤乎痛哉吾姊夙佩慈訓善學力行遇事處決有大丈夫所不及某實敬畏之與君姻連必亦稔聞為我志之以塞吾悲以慰諸甥之孝思可乎余姑之夫太府卿王公正已與信州為莫逆之友每稱伯劭風度之佳記問之博一日見伯劭于鄞簿廨舍而不值夫人相見于碧梧軒縱談家務世故及伯劭所職纚纚移晷卿退而語鑰曰吾與信州通家如兄弟而又同姓知其女之慧亦不知其通曉如許雖嫺于辭令者所不逮也蒼舒及簡又尚書之孫曾余以故屢獲升堂辱延遇益信卿公之言敢併敘之云承議郎孫君墓誌銘淳熙五年余贅倅天台已而會稽孫君應時季和尉黄巖見其學行吏事詞采翰墨動輒過人與之定交問其家世始知其父雪齋先生之賢甚悉方與四方士友期季和以逺到開禧二年二月二十三日将赴邵武貳車忽一疾不起遂以朝奉郎致仕識與不識莫不痛之三年十月二十五日其母太孺人張氏繼卒于家季和之兄應符遣其子祖祐來見余曰祖父雪齋之亡季父嘗持故國子録沈君煥所状行實乞銘于晦菴朱公公許以銘曰古所謂志士仁人今復見之恨不及展龎公之拜銘文見屬其何敢辭既而公亡迄不果銘今不幸祖妣繼季父以逝顧當今孰能繼晦菴者敢泣以請余以衰病掛衣冠而迫于上㫖收置北扉震懼固辭不獲命念季和之交誼又不可以固陋為解讀其所示事實見雪齋七十嵗時倣程公大中自誌其墓有云雪齋野叟孫介字不朋越之餘姚人也族緒寒㣲難援譜系但聞五代祖自睦州徙居此力田自業余曾祖諱亮生二子余祖為長諱政孝慈馴善鄉黨稱之生四子長從釋氏為昇師次為十伯父次為十三伯父次先考十七府君諱子全昇師持苦行而有髙識兼通儒書喜聴賢士大夫語歸葬父母守冢三年則聚諸弟之子躬授語孟詩禮蘄變其家為儒已而余生于政和甲午八月辛未實十三伯父之子命以為先考嗣四嵗能離家入郡庠隨兄夀朋讀書日數百言七嵗學于鄉先生胡定翁家聞本生伯母及先考之訃號噎奔喪哭臨以時孝悌之端發于天性衆稍驚異其後兄常攜寓鄉館側聴講說文義粗通然退侣燕朋弛怠不進十四五潛喜哦詩兄使誦杜集頗費日寡益十八九始學舉子賦遽罹兄喪哀痛之情如失乳哺如割肺腸倀倀無相㡬不自立因從畏友厲徳輔肄業紫溪漸漬稍勝既冠迫于凍飢踵兄故步授書自給益發憤自課經史注疏且閱且抄不敢荒逸竊志古人務為實學時文非其所好而又無師屢試不利決意退藏尊拜先聖覬扶吾道晨誦孝經以致時思人多非笑不之恤也壮室張氏既得三子捨館歸訓鬻田就竭人不堪其憂五十九嵗始幸小子應時試入太學閱三載遂叨中進士科其後長子亦厠鄉選余于是家居寡出諸兒分寓歸辦菽水今既七十已隨應時滿尉黄巖還鄉閉門養疴不交人事挾策自適凡余自少至老備嘗艱阻不可具言初侍所後母陳氏遭義兄陵暴慨然景念孤臣孽子竊以舜曾閔為師承意調諧各終其世紹興乙丑仲兄有重罪余未諳律令以身援之㡬併坐縲絏偶值星變原赦俱免其他困阨危難苦心衡慮改過遷善迄能自持厥躬不見薄于鄉里吾家父行享年多止五十今幸同産次兄七十有七與余白髮相保夫妻兒婦歡聚無缺捫心感舊粗足樂矣然余所以行已立心不忘恭敬近而冠屨微而紙筆未嘗輒輕易服用嘗謂不能動天地不足以言誠不能正室家不可以為道故其在畎畝未始一日忽忘君民對妻子惟恐食息偝違禮教一言一事必求合于人情可無怨悔者而後出之其受人子弟之託教之不啻己子隨才指授専事講釋至老不倦與人交不敢失信廢禮受侮不敢爭忿蓄怨平居確意安貧守分不萌非義之求聞人有善心恨弗及見人之惡口不忍言自信不移量力而動平生謹畏求寡乎愧怍而已噫使余少年微有依怙不厯屯剥壮嵗窒于理性不明否泰未必能操心慮患固窮順命亦何以至于今哉凡吾子孫勿墜家學推本源流念之敬之此吾之實録也余三復而嘆曰嗚呼其可謂躬行篤學樂道知命之君子矣凡君平生操履大槩已見于此而國録沈君所状尤為詳備余復何所措其辭至于蓬藋之居陋甚玉川而門堦户庭咸有銘勒簞食菜羮終日不飽而潔齋整齊如對大賓子良婦教孫枝競秀家法修明門雍户肅下逮僮僕舉訢訢也其遺風餘範至今藹然亦足以想見其典刑矣初君以淳熙十一年太上皇后慶夀恩封承務郎致仕十三年上皇再慶進承奉郎十五年正月二十八日甲子卒于泰州海陵縣丞官舍享年七十有五後應時陞朝累贈承議郎張氏同邑人也曾大父嚞大父儼父日休封太孺人享年八十有六三子長曰應求後君四年卒次曰應符次即應時也一女未嫁而夭孫男三人祖祐祖詒祖開孫女五人長適文正范公五世孫克家次適宣教郎知婺州義烏縣丞胡衍次適里士胡伯韶次許嫁四明沈嚴曾一尚幼曾孫男二曰珍曰珤君初葬于燭溪湖潘山之塢穴頗不安季和之亡得吉卜于新奥竹山始遂遷葬今将以嘉定改元某月某日奉太孺人之柩祔焉太孺人質性荘重雪齋動以古人自律孺人事之如賔終始若一日季和宰平江之常熟縣號難治吏民歡服既滿横為郡将所捃摭困阨兩朞至開人使訴卒無一詞猶被鐫降孺人曰但不得罪于公論足矣窮達非所計也閒廢累年方權臣用事不肯附麗求進菽粟不繼族黨姻舊皆勉以禄仕孺人獨未嘗一語及之曰使吾兒失節以為養不如粗糲之為甘盖不如此不足以配君子不足以生賢子孫不足以成禮法之家也季和不幸出門軸折不得究所抱負以彰積慶諸孫皆孝友以承先訓後其有興乎銘曰徳在隂報必明活千人後必興天人間響應聲有篤行出志誠子必賢家必名偉孫君真不朋動以禮善服膺不愧怍無虧成廟之璉壺之冰行于家森典刑噤不施閟幽扄過者式視斯銘攻媿集卷一百七欽定四庫全書攻媿集卷一百八宋樓鑰撰誌銘贈金紫光禄大夫姜公墓誌銘公諱浩建炎紹興間來寓四明至十年嵗在庚申公之弟濤以流寓名薦書十二年遂登進士第人爭曰是東都大家能以舉子業致身于兵火流離之餘耶惟姜氏當承平時富盛甲京師婚姻多后妃侯王之家聲勢翕赫而最重儒學藏書築館延太學名士以訓子弟禮意隆洽賓至亦留設盛饌參政簡齋陳公及一時勝遊皆求閱未見書或登科以去又請舉其友若昆弟題名家塾多有顯人如參政謝公克家侍御江公躋待制髙公至臨少卿汪公思溫及其季吏部思齊皆在焉積而至此以起其家公盡室南來弟猶未冠公方急禄每以未能卒業為恨獨任家事勉其弟力學撫育訓導儒風益振二十九年其長子模中浙漕舉至于三四訖不第又二十年曰桐曰柄曰煁曰煥曰光等相繼累上禮部入太學而柄與光同以紹熙四年賜第㸂又繼之皆公之子若孫也噫亦盛矣公字浩然曾祖徳安杭州助教贈忠翊郎祖侁右侍禁閤門祗候累贈武經郎父寛成忠郎閤門祗候累贈武功大夫吉州刺史娶朱氏封宜人累贈和政郡夫人少師孝荘之女視欽成皇后為祖姑又仁懐皇后之姪也宣和四年少師以郊祀恩奏補承信郎調監平江府都稅務福州鹽稅務改明州市舶務行在草料場嚴州在城都稅務臨安府比較務㸃檢户部贍軍酒庫所糴場行在左藏庫再任京畿第二将荆湖北路安撫司準備将領改兩浙東路兵馬都監駐明州者四一改婺州㝷除兵馬鈐轄紹興府駐劄陞馬步軍副總管駐明州秩滿改福州踰年丐祠主管台州崇道觀又任建寧府武夷山沖佑觀未滿納禄淳熙十二年十二月癸亥卒于家享年七十有七積官至武節大夫始夫人先公十年卒葬于慶元府鄞縣豐樂鄉東山之原明年二月庚申諸孤奉公之喪合焉男六人模故忠翊郎監建康府户部贍軍酒庫所糴場贈通直郎棫以召對職賔贊終武經大夫閤門宣贊舍人兩浙東路兵馬鈐轄樸以疾不仕桐武翼大夫新權發遣郴州軍州事柄故奉議郎知濠州鍾離縣事林女六人長適故朝奉大夫知泰州司馬儼次適武節郎新東南第四副将紹興府駐劄董璆次適奉議郎知嘉興府海鹽縣事史彌謹次適國子進士樓溱次適建昌軍新城縣主簿王深一蚤亡孫男一十人炳煜武經郎新特差充殿前司書寫機宜文字煁故承節郎閤門看班祗候監饒州在城商稅煥故從義郎監兩浙轉運司婺州蘭谿酒庫光奉議郎新通判婺州軍州事㸂文林郎監泰州角斜鹽場焯爚國子進士剡國學生煒煓熠國子進士㷆燔焴燐煟燫炎承信郎孫女九人修武郎新監湖州在城都酒務宋克明太學生汪祥進士陸枃迪功郎辰州司户參軍司馬遂奉議郎知江州彭澤縣事趙希蓁迪功郎新臨安府仁和縣主簿黄夢與史挺之承信郎新監撫州户部贍軍酒庫王堅迪功郎新嚴州淳安縣主簿趙希怤其壻也餘在室曾孫二十人埏垓填垕埜塈坰奎坡塾增堂􅟓墅基墉壁至􅘏堅曾孫女十人適進士何沖朱中庸顧大聲國子進士趙時古餘在室公少警敏及見前輩篤志問學書傳多成誦尤熟老荘之書人但知為佳子弟耳家在汴都外城一旦碎于兵燬至京口遇潰兵劫鹵忽為窶人吉州旋即世聚食數十口皆仰給于公甫冠入仕厲志官業動有可稱北兵将陷平江郡人驚奔而閽者阻之公叱使開闗去者不勝計公殿後㡬不免人皆徳之及掌𣙜酤請創糴場以供酒事貸本錢于版曹要告身為質公以文書銜褏而進即命公為之定糴價三等比時估為髙初亦罔測未㡬米商輻湊價日以平嵗終會其息至百萬緡衆始歎服至今遵用焉孝宗登極婺以犒軍稍緩口語籍籍公禽治數輩無敢譁者所至總戎有律閱武有程慢令者毫髮不貸行之以公人自畏讋所事帥守魏惠憲王崇憲靖王丞相梁儀公克家參政周公葵給事吴公芾敷文閣直學士俞公俟龍圖閣學士趙公子潚皆深相器重樞宻胡公松年守姑蘇擇官寮十人日供故事右列中惟公得預選所陳又能切中時病仕于明最乆詹事周公操朝請莫公伯鎔俱嘗同寮相與素厚莫公諸子皆為清望官公至必使環立以侍中書舍人濟來為長史以父執致敬周公為御史露章推薦太師史文惠王丞相王魯公周益公皆稱于朝廷諸子出仕猶賴前數公提挈之力觀其所與則其所存可知矣前後以見辭五對清光奏陳多合上意有老成更練之襃遂賜横帶入仕㡬一甲子吏攷十之七八終始無玷臨機健決不問劇易遇事風生以智為樂談論亹亹音吐洪暢聴者忘倦此皆出于天資惟是生長富貴既更世故遽能率家人刻苦亷介有寒素之所不及田里細務詳練通曉尤為難能少有至性母恭人郭氏疾革刲股以進友愛宗黨初以銖積寸累漸為温飽計會從弟迫于官逋舉以濟之季父客死江西又無嗣公取其遺骨葬于先塋之側嵗時祭享族人之廢祀必徧及之弟妹婚嫁身任其責一介不妄取予性實好施推其餘以周人之急亦所不靳也宫教濤出繼伯父既定居吾鄉買地城北分東隅與之築室比隣人羨其雍熙之軌焉舊學不忘時有清新之句自為上梁之文思舊隠于夷門不堪回首築新居于鄞水粗可容身此特其一班耳専意教子不以家務嬰其心夜或焚香危坐使之誦習率二鼓而罷模柄之預薦栻之賜對公皆及見之其在婺時東萊吕太史未第公知其賢遣二子從游模與之同中漕薦既即世子孫益守遺訓雖事力不及盛時一二而文風彬彬遂為儒家始以次子封武顯大夫累至和州防禦使柄升朝改贈宣奉大夫今至金紫光禄大夫足以信公之志于泉下後裔方興殆未可量也奉佛素謹楞嚴法華諸經夫婦繙閱以千萬計入閩積俸置大藏經歸寘家舍結字端重雖薄遽中家書無一筆行草手鈔内典數十軸首尾如一從妺歸丞相夀春魏文節公平昔相好為堂西偏藕花盈池丞相名以超蓮書扁以遺之既屬疾掛衣冠杜門自頤家庭孝謹調娱藥餌乆而不倦多拱手黙坐間乘安輿致敬家廟佛像一絲不掛訖以夀終可以無憾矣鑰汪出也外祖少卿兄弟仕京師同為王府贊讀既皆嘗授館通家如至親先妣吴國時猶未笄能備言公家風範相依下汴初寓浙右數困冦攘其卒來鄞盖以外祖為歸也外祖尤顧舊好經理不遺餘力既命伯舅娶公之女弟而宫教洎文節公與伯仲二舅同在家塾訓飭如一四人聮捷薦書自爾姻婭如朱陳然鑰以外門之故得從公游又與諸郎共學仲舅尚書状公之行盖嘗助之屬藁今二十餘年母氏舅氏俱即世而棫樸柄煁煥剡㷆亦皆亡矣郴陽泣謂鑰曰先銘未立日夜痛心兄弟凋零汪氏中表亦無㡬捨君無有知先人之詳者敢以請鑰撫事感慨又嘗銘其二兄及鍾離之墓不得辭銘曰太嶽之後著姓惟姜承平百年益大而昌延招名儒談經左塾典刑具存燕及嗣續矯矯姜公克荷克承艱難百罹既踣而興才有餘刃仕一甲子黄金横帶晚克知止積善餘慶遺訓有傳踵登賢科儒風蔚然東山之原松柏斯兊銘以表之其興未艾司法晁君墓誌銘晁氏系出于西周王子朝漢有錯為御史大夫元魏有清為樂陵太守唐有左補闕大夫杲或謂其家有劉元徳起兵時錢劵宋此稱蜀漢昭烈帝之字避朝始祖廟諱故書作元則其傳世逺矣本朝文元公以清徳雅望冠一時文荘公繼掌内外制賜第京師昭徳坊後益蕃衍散處汴鄭澶濟間南渡以來江浙蜀道所在寓居實皆出于昭徳無他晁也君諱某字某生于濟之任城曾祖仲參贈金紫光禄大夫祖端義奉議郎簽書髙郵軍判官㕔公事考㢲之超然不仕妣閭丘氏君資稟不凡少承家法篤于孝友嘗刲股以起母及仲兄之危疾年踰强仕從叔侍郎濟陽侯謙之以郊恩補君将仕郎授迪功郎監潭州南嶽廟循從政郎調建昌軍新城縣主簿繼為沅州司法參軍君宦情素薄而臨事殊不苟率有可稱其在新城豪强犁人之墓冤訴莫直君為得遺骸于田中遂伸存亡之枉廣昌令以匿冦事攘富人之貲骨肉駭散凍餒于外獄乆不決君受責欲行令輒賂君拒之以實聞而還所籍其家優裕如初居沅纔三月有冒官稱者守意希賞抵以深文僚吏和之君獨不可守數諭意不為動善善惡惡行其志類此俄感疾已而起居如平時忽趺坐而逝安靜不怛不惟積善之報殆有自得而莫知也君宜達而沉下位宜夀而止六十一寔乾道元年正月三日也娶姜氏蚤卒子五人子騫子與子思子游子冉文學才幹俱有家法三女壻通直郎趙某沈忠恕杜雋皆世家也孫男八人百源百則百海百制百利百禮百揚百順女六人曾孫二世黻世表七月朔歸至寓居撫州金溪縣十月二十六日葬君于臨川縣崇徳鄉嵯峩山之西敷文閣直學士公武君之弟行嘗状君之行事至開禧三年凡四十三年矣君之子惟子游在孫亦亡二人矣百海游鄞求銘于鑰老矣學落何足以發幽光獨念中原衣冠故家日就凋零文獻相傳如昭徳之晁則又鮮矣少時及識敷學風采服其該洽其誦君之賢如許以託名不朽為幸銘曰王謝故家風氣一種晁之在漢實配于董至宋益大名勝繼踵法藏耄智讀者皆竦濟北嵩山詞采泉湧恂恂法曹典刑荘重以君之才卒于流冗我思前良託名為寵直秘閣徐公墓誌銘慶元二年有㫖朝散大夫徐夢華除直秘閣盖異恩也始公生于靖康之初元嵗在丙午是冬金人再犯闕海内雲擾建炎二年寇躪江右叛将大盜蜂起公之生纔四年母氏襁負走陂頭劉氏家僅免于難公既省事自念生長兵間欲得盡見事之始末宦游四方收羅野史及他文書多至二百餘家為編年之體㑹稡成書傳聞異辭者又從而訂正之號三朝北盟集編自政和七年海上之盟迄逆亮之斃上下四十五載間具列事實制敕詔誥國書奏疏記序碑誌之文有正史所不及載者搜掇無遺成二百五十卷又有綱目一冊併藏于家至是史官方修髙宗皇帝實録修撰楊公輔率同寮十人奏乞取公所編之書仍下臨江軍給筆札抄録以進十一月史官又奏其書有補于史筆為多仍薦公之賢大略云亷靜樂道好學不衰故有是命又奏所編書目内有百餘家館所未備復命録其全書諸公欲相挽一出與同筆削有諭公者答曰此書本不為進身計力辭之後又得未見之書再編集補三帙所居闢一堂取詞命襃語篇曰儒榮以侈上賜樞宻劉公徳秀為之記待制楊公萬里為之銘少傅周公必大端明洪公邁而下賦詩者數百篇逺邇流傳而公之名愈顯矣公字商老清江縣人曾祖用和祖士穏俱不仕父世亨累贈通議大夫母楊氏贈碩人公俊敏篤學至忘飢渴寒暑讀書過眼輒不忘通貫經史百家尤熟晉宋南北五代時事自熙豐元祐以來名公奏議及出處大致無不該綜作文皆有根據用事精確紹興二十四年登進士科授左迪功郎洪州新建縣尉以外艱不赴調鬱林州司户參軍到官未㡬又以母憂而歸後為江陵府司户任滿闗陞左從政郎乾道四年外移南安軍教授以舉主改宣教郎知潭州湘隂縣次授廣南西路轉運司主管文字賜緋衣銀魚諸司辟知賓州到郡遭罷主管建寧府武夷山沖佑觀華州雲臺觀紹熙元年授荆湖北路安撫司參議官慶元初引親嫌徑歸再奉沖佑祠引年致仕六年賜紫衣金魚仕宦㡬五十年間居之日為多南安官舍素在城外請遷入以附校官建雲漢閣以奉御書立濓溪二程先生祠于左劉元城張横浦先生祠于右自為之記參政龔公茂良時帥江西讀而善之以講筵官薦湘隂並湖少田多盜帥括盜耕湖田者悉輸租號増耕稅他邑或移别賦應命公恐重困吾民謂邑無新田稅無從出帥盛怒移湘潭丞仍窘摭邑事無可疵瑕者卒免于行更加禮焉增葺學宫嚴設祠像祭器書籍以次而舉選士主之湘隂于是始興于學矣朝廷議更二廣鹽法遣浙西安撫司幹官胡廷直銜命與二漕臣集議境上西漕王公正己以公審知利害邀至蒼梧㑹所公謂二廣事體不同使者徒見東路郡多瀕江可通客販固已非是若西路多山郡近江者少道阻運艱客販不通價必騰踴郡計不給重為民害郡有兵吏可役民不告勞若止循官般舊法初無抑配等弊公私俱便可以經乆衆不能奪胡亦是之議定而去将入奏為主議者所訹畏罪希進盡變其說擢為東路提舉旋升西漕侍郎詹公儀之出鎮桂林共行客販之策慮公或以賓州奏事必撼成說武憲熊飛素不快于公二人從而惎之熊上悔舉之章公遂罷不三年二廣之害果如公言民食貴鹽富商至破産喪生胡憂懼至死詹亦得罪復行舊制至今便之周益公當軸謂公前謾未直公答以事乆自明不待辨也歸而悼亡連喪子女宦情愈泊然矣楊誠齋挽使造朝薦進甚力廟堂将處内郡止求議幕荆帥樞使王公藺移鎮長沙以公可任帥事申省委公經時而侍郎袁公樞始來知公止請上幕俸給盡以三月帥俸歸之又力辭尤歎其亷既而從母之子侍郎彭公龜年為帥公去替止半年法不用避公乞祠以去彭公餞以詩云法許公不許法不如公嚴年雖已髙手不釋卷有讀書記忘集醫録集仙後録各三冊㑹録四冊皆以儒榮冠其目家有萬書閣籖帙甚整能視細字如年少時事親盡孝祭器封鐍惟謹有家記一編載時祀禮式又揭百不憂堂以志義方之效閣前亂石森立石間多紅薇花若張錦然號紫薇洞天勝日深衣坐閣下二鶴翔舞于前殆神仙中人也弟妹四人弟得之亦休官而歸時節聚會子孫甥壻羅拜為夀竟觴卜夜無倦色從母昆弟七人時置酒款集韋濟川楫黄仲禮琮彭子夀而下俱效之開禧元年親黨為八十之慶宴笑數日乃罷中嬰小疾精明如故猶能課諸孫誦習三年八月浴出瞑目危坐而化二十有一日也娶豐城鄢氏先公二十一年卒封贈至宜人五男子簡從事郎新邵州新化縣令範迪功郎新袁州司理參軍簵業進士次子符幼子節皆蚤殁二女長適免解進士曾三異次適進士鄒塒亦前卒孫男十人長峯亡矣次嶢次金酉薦于鄉崧峩訔崇嶷㠖􅍲一女適鄉貢進士向公美曾孫二人郯郁二女尚幼諸孤以嘉定元年十一月庚申奉公之柩葬于縣之修徳鄉古牛岡之原始鑰屏居四明得子夀書俾為儒榮堂賦詩時雖抱疴為作古風寄之已而子夀與公俱以書來謝比聞子夀之訃固已不堪云亡之痛而公亦下世矣公既葬之二年簡以赴調來見謂前詩恨未見北盟全書盡録以見遺又出其季父致政所作行状求銘致政嘗著左氏國紀中書舍人陳公傅良為之序盖深于經者書事尤覈敬掇其状而為之銘銘曰靖康兵禍古所未有凡曰臣子痛心疾首公生初元以及己酉犬羊長驅薦食江右幼而得全實賴襁負少長讀書志已不苟宦游四方諮訪㝷究網羅舊聞編不停手二百餘家筆下輻湊繫日繫年别記誰某有制有書有疏有奏衆說雜然攷証是否名聞于朝六丁下取蓬萊漢閣寵數加厚儒榮名堂足以不朽才不盡用仕多不偶身退名尊二疏俱夀奄然仙去何憾何咎有子克孝慶流在後銘以發之尚照林藪朝請大夫吴公并碩人姚氏墓誌銘仙居吴氏自龍圖閣直學士給事中康肅公以儒術發身入從出藩為時名臣長子興化使君首躡世科兄弟簪笏蟬聮多至郡守族黨中登貢籍擢科級者相望遂為巨族鑰淳熙五年由敕令所刪定官贅倅丹丘始拜康肅于湖山堂時居邑之石井既掛衣冠夫婦偕踰七十子孫詵詵坐享耆福谿山勝絶來者如游崑閬鑰一見辱知奨良厚因得與諸子游今識其家四世矣興化明銳竒龎謂必可接武夷路不幸嬰末疾止于中夀次子鄞丞壻四明史氏鑰以第三子娶其女遂為姻家今知吉州公比為大理寺主簿同朝見過泣而言曰先君抱負不凡先妣婦徳素著而葬之日兄弟尚未立未有銘文以傳後介弟既亡繄誰之責援親契以請余感念疇昔為之永慨乃掇括蒼貳車郭君睎宗所為行状及興化自為姚碩人行述大槩併為之銘君諱津字仲登世為台之仙居人曾祖允昭故贈武略大夫祖師錫故任右承議郎累贈光禄大夫考芾康肅公也官通奉大夫累贈少師妣郭氏贈魯國夫人君幼嗜學强記博通羣書尤熟文選或覆誦終帙年十有五以詞賦魁鄉校嘗從秘書郎王公衜頌臺主簿胡公權殿中季公棠游三人皆名儒每器重之康肅為御史以郊恩任将仕郎為銓闈第二人授右迪功郎監潭州南嶽廟侍旁益肆于學連薦漕臺登乾道五年進士乙科充兩浙東路安撫司幹辦公事改宣教郎知處州麗水縣監行在都進奏院為親求補外添差通判紹興府淳熙九年賜五品服十年繼丁内外艱執喪哀甚倚廬增慕靈芝産于楣人嗟其孝感紀以詩文服除權發遣江隂軍未上改主管建寧府武夷山沖佑觀㝷知廣徳軍以足疾丐歸改興化軍慶元二年屬疾八月四日終于家享年六十有四累官至朝請大夫娶姚氏封安人先公六年卒𦵏之地曰西隩去先墓百步累贈碩人男四人機朝請郎知吉州軍州事樸故通直郎知慶元府鄞縣丞栻迪功郎福州福清縣主簿標迪功郎衢州開化縣尉兼主簿女一人適進士姚棟孫男四人華煜煒灼孫女九人長適承奉郎監西京中嶽廟樓治次適從事郎新贛州司户參軍葉言次適将仕郎盧樵次適承信郎新差都大提㸃坑冶司監轄銅錢金銀場顧士龍餘在室曾孫男一人諸孤以十二月辛酉葬公于郭但山東隩之原遷碩人之柩祔焉公志趣髙邁不溺于膏粱之習種學績文與寒畯爭馳乆在親側宦學增益小試于外動有可稱初入帥幕丞相蒋公太師史公為帥屬以文詞以逺器期之丞相葛公樞使黄公為僚相好號一時幕府之盛麗水試邑恪守家範夙興冠帶視事決訟如流庭無留牘嚴于治盗民以奠居邑社稷壇壝圮壊學宫尤不葺公謂非所以安士訓民也乃築三壇于學之東偏又徹學而新之嵗祀月書如儀士民俱勸焉及官奏邸同知樞密院事謝公時在諌坡舉公自代有曰治邑有聲立朝無玷方嚮于用懐親求歸朝士歎其髙致賦詩宴餞歸娱厀下乆之乃到官參政李忠文公多以郡事委之裁決嵗饑流殍盈路公請發圭租倡率勸分人遂樂從待制朱文公為提舉官任以荒政躬走阡陌如懐隠憂有所措畫俱從其言以文學淵源政事詳練薦之廣徳乆旱種不入土粟價翔踴公齋禱祠山隨車沛然時米舟輻湊官兵得空劵累月悉以給之積訟不決而兩獄隘陋卑濕公曰不葺不決疫将興矣先呼囚徒稽貌察辭隨處以法輕繫以片言折之諭獄官邑令日決數事旬餘囹圄為清減商算損酒價訪水利民聴已孚而去矣遮道擁車至有泣者曰官何來之暮而去之速乎康肅軫惠隣里穀貴則損價以糶嵗寒則賦粟以濟散藥給棺一方賴之公謹不敢廢湖山亭館以時整葺追慕不足築祠于堂之隩又以隠居詩篇刻石時節擷芳薦新事之如生耆舊有為父母所厚者尊禮之如故時正旦合鄉之士夫于邑庠謁先聖先師及先賢之祠序齒講拜升堂舉酒略如鄉飲之儀為文平淡援筆成詩蔚有父風合詩文十五卷藏于家荘重恬靜中無機心與人交乆而彌親不知者或以為簡公不改其度寛裕容物無疾言遽色服用儉約而厚拊姻舊雖甚費不靳康肅嘗以嵗侵為憂公適歸自稽山白曰頃年得禄儲穀可數千斛舉以均濟親顔大喜殆有前輩麥舟之餘意使其得究于用可以及物可以亢宗而見于世者止此可哀也已碩人家黄巖承信郎義之女甫笄喪母已能任家政既歸于吴舅始丞郡而家尚寠寓族長之家光禄洎夫人俱存家法素嚴魯國病足已乆矣夫子方從師友于外無娣姒之助以冢婦獨任梱内之責人以為難光禄與夫人既喪用益窘小姑出適發奩具以佐之石井卜築竭所儲以庚費康肅素好賓客不問家有無先意治具以竣所需康肅以賢婦稱之見于遺札其亡也夫子哭之甚哀吉州以作邑有聲連嵗進擢以至大郡可以知興化義方之訓鄞丞既亡而吉州求嫡母之銘甚切又可以見碩人鳲鳩之徳是皆可銘也已銘曰括之陽兮仙所居伊石井兮公之廬隄萬壑兮清流瀦夾明鏡兮澄冰壺偉康肅兮蚤垂車謝軒冕兮天為徒君冢嫡兮如伯魚傳衣鉢兮鄴侯書宦學富兮厯仕塗見諸用兮直緒餘歸不改兮先規模終相從兮山之隅夫人徳兮鳲鳩如義方壺彞兮藹里閭我維銘兮子刻諸慰孝思兮賁幽墟直秘閣孟君墓誌銘君諱嵩字嶠之孟姓也昭慈聖獻皇后兄子信安郡王之次子也后以聖徳母儀四朝信安勲在社稷宻贊中興賢徳問學為戚閈之冠髙宗寵遇如唐肅宗之待李鄴侯無與比者公之髙祖在安武軍觀察留後贈太師韓王祖彦衍中散大夫行開封府左司録贈太師豫章郡王信安諱忠厚少師保寧軍節度使充萬夀觀使提舉秘書省贈太師母秦魯國夫人王氏世本汴人五世祖魏王徙居衛州共城後復居汴信安南渡家姑蘇遂為長洲縣人君十嵗以祖䕃補承事郎性至孝不忍捨親出仕奉祠膝下者數年紹興二十七年任軍器監主簿未㡬信安薨懇免臨奠特恩除直秘閣賜緋魚服除授浙西安撫司主管機宜文字幕府笑談一坐盡傾事無巨細勤于闗決使長多資決而後行未滿除監尚書六部門時隆興改元之季冬也乾道初供職職事簡寡而才地有餘尚書郎或有假故長貳更委攝承㡬遍二十四曹遇事益練習而聲譽日休輪對陳利害甚悉上嘉納之六月始以制書攝倉部公自以驟進抗章請外二年通判楚州又力請祠再任主管台州崇道觀滿秩通判臨安府七年瓜期将及㑹光宗以皇太子尹京易倅為府推八年始改浙西安撫司參議官淳熙三年八月到任盖家食者餘十載淡然不復以仕進為意人皆期以逺到而明年八月丙戌以微疾卒享年四十有四累官至朝奉郎五年四月癸酉葬于常州無錫縣富安鄉許峴山之原去先塋數百步娶仲氏左朝請大夫淮南安撫司參議官并之女後公七年嵗在甲辰卒有賢行克相夫子子男五人夔右宣義郎監秀州華亭縣市舶務次曰曾俱先卒次曰猷朝請大夫主管建寧府武夷山沖佑觀次曰導朝奉大夫權知嚴州幼曰翔故迪功郎信州司户參軍女一人適朝奉郎知真州李大理孫五人繼勲修職郎監鎮江府大軍倉門繼華修職郎監行在㸃檢贍軍激賞酒庫所都錢庫繼顯迪功郎新鎮江府丹陽縣尉繼勤将仕郎繼勇兩浙轉運司進士惟信安謙恭威重有大功而不居遜逺權勢被服儒雅居第擇窮僻處門宇卑陋以終其身至今不為勢家所奪猶存其舊吴公棫字才老仲公參議字彌性皆名士以女弟嫁吴而與仲為姻家其好賢類此故子孫多賢公自幼承義方問學有原委論議正平性又强記一經見聞輒不忘詩句清新有冰翁之風一時名公多與之游自奉寒素而好濟人之急篤于教子刮磨豪習二子三孫俱聮名薦書繼顯先登嘉定元年進士科藹然為儒家矣鑰少隨侍都下嘗識風度而不及相接親見公在部門丞相魏文節公為天官舅氏尚書汪公為郎與公相厚稱美不容口沖佑漕淮浙為太府卿兼權刑部侍郎嚴州嘗為大理正兄弟有賢譽俱得奉周旋鑰比知貢舉首閱榜帖一見公之孫姓名為之忻然知孟氏之方興而未艾也得書以公之𦵏未有銘逺以見屬遂銘之以慰孝思云銘曰昭慈之聖信安之忠輔成中興盛徳豐功公爲愛子餘慶所鍾問津郎曹受知諸公位不稱徳夀弗及中積善曠達不于其躬子孫日興益振家風我惟詩之表于幽宫攻媿集卷一百八欽定四庫全書攻媿集卷一百九宋樓鑰撰誌銘周伯範墓誌銘周氏為四明望族不惟名宦相繼而前輩源流其來也逺孰不欲仕惟周氏之仕者多以壮年退休有四休堂則家風可知明今為慶元府周氏世為鄞人居城中西湖十洲之西君之髙祖告贈正議大夫曾祖師厚登皇祐五年進士科娶范氏文正公之女忠宣公之姊也仕至朝散郎任荆湖南路轉運判官贈銀青光禄大夫次子曰鍔元豐二年登科娶胡氏右丞宗愈之女兩娶王氏翰林學士覿之女又娶陳氏正言伯强之女仕至中大夫才業尤髙嘗以忠憤上書遂陷黨籍又以外家妻族皆一時名公俱在姦黨動輒拘礙以經世之才僅知南雄小郡賢士大夫多痛惜之仲子諱淵亦有家聲仕止右儒林郎娶俞氏君即儒林之子也諱模字伯範性敏悟承家世之傳幼篤志于學如成人從濟南劉夀夫游又學書于睢陽徐濟甫有楷法年纔十七而儒林下世兄弟終鮮四姊一妹俱未行親黨為之危慮君雅有心計沈靜善謀既訖𦵏送女兄弟俱歸里之善士皆人所難免喪之後一舉不遂即棄舉子業一意世學繙經閱史㡬不釋卷以為名第有命不可彊求不墜家聲足矣建炎兵燬先廬蕩然儒林所居湫隘以此事屬之君君承先志大啓堂宇甲于吾鄉奉累世丘壟隨力葺理嵗時修祀事物必親臨器必親濯諸父既亡從兄伯濟比隣君事之如同氣榜所居曰怡怡堂以著其友愛之篤中大夫遺文甚多如承宣集等行于世文集僅二十卷君恐其久而墜失手加編校以千緡為鋟版印造之費始得家有此書年登半百即以槥櫝施貧人之喪所濟甚衆官道傾圮加以甃甓行者賴焉經理家務井井有條時出其餘以周人之急姊妹既行及宗族之疎逺者恩意有差居閒好客觴豆終日不倦晚又增葺後圃益以自適號得閒居士縱心之㑹鄉里合慶以為君福夀未艾也明年是為嘉定元年三月二十九日以疾卒于家娶朱氏子男二人曰熺慶元四年為鄉貢進士次曰烜先五年卒女三人長適汪之彦次適鄉貢進士李夢龍幼在室孫男六壄垓圭垍堪埏女五人長適陳錤餘未笄先是朱夫人𦵏于通逺鄉銀山熺将以十二月壬午奉君之柩合焉君素了達不以窮通死生累其心豫卜夀藏美檟之備已十餘年吾邦舊有真率之集仲舅尚書汪公主盟斯事君實預焉余投閒一紀從容其間君少余一嵗棊品又相近在㑹中尤為親宻後雖以憂患疾疢寖廢去冬西上君送于郊握手道别尚期餘生為老伴侣聞君之訃䀌傷殊甚熺來求銘義不得辭余有表妹之夫子建植于君為疎族死無所歸君呼其子某使𦵏于其先塋之傍某游學又任其掃松之勞是尤可書也銘曰四明之周著名吾州家在十洲堂有四休君承其流抱才則優不忮不求無悔無尤家立身修晚益夷猶棊枰觥籌里閭沉浮積善未酧如穡有秋我銘諸幽後人其收承奉郎致仕李君墓誌銘江口李氏鑰及識其五世矣始秉義諱珂善富樂施鄉稱長者再娶王氏寔提舉廣東市舶勲之女兄太府卿正己之姑也卿為鑰之姑之夫以是與李氏有連鑰生長外門幼年外祖汪公少師外祖母越國王夫人過其家先妣吴國攜侍行時李氏鼎盛夫婦偕老子孫滿前宴樂連日侍御史王公伯庠銘秉義之墓謂其持心廣大與造物者合三子長諱佾字子列一善幹蠱奉親有稱仕為修武郎建炎三年冦殘四明遊騎向奉川出財力募鄉兵守禦邑境以全鑰嘗記其事甚詳是生九子第四子諱充庭則君也字伯振資孝謹最為大父母鍾愛昆弟既衆家析而非舊矣君躬行善道刻意教子元白居長受學于舒貳車元彬歸以淑諸弟既為大學上舍優選待年廷試弟及子俱有場屋聲聮翩科級詵伯中嘉定元年進士第迪功郎監紹興府三江鹽場詒伯鄉貢進士訓伯國學免解以稱内舍生又中上舍選以制中開禧元年進士第迪功郎新紹興府餘姚縣尉詞伯在兄弟間才氣實相上下雖進取未效而士友固已期之從子森同以舍法待年從弟之子誨伯亦薦于鄉于是文風大振遂為儒門鄉里歆艷其興未艾也君澹與物無競善處宗黨周旋彌縫無間言父母既沒撫弟妹畢昏嫁經理不遺餘力親族子弟不問賢否一家誨誘里人間有彊獷之人遇君輒斂避教子以踐履為先不専事舉業諸子學成而不偶不以介意及其名第寖興視之亦藐然人莫窺其際平居以書史自娱前言徃行有契于心者必書之座右首曰有一言而可以終身行之者其恕乎如心之謂恕也又曰我必不忠不仁無禮皆自反之道也又曰一飯之徳必報况其有甚于一飯之徳者乎可以知君所存矣間作歌詩平淡如其人閱名臣言行録遇合意即作詩以記之至百餘篇慈福宫慶典以二子在學封迪功郎嘉定二年郊祀恩轉承奉郎就養三江以疾卒于官舍寔三年十月二十三日也娶張氏封孺人朝奉郎嗣良之女姑之子也六男子長即元白次詵伯詒伯詞伯諴伯訓伯惜詒伯諴伯先卒女四人黄直愛張復袁邦傑張繹其壻也孫男九以稱以制以牧以豫以清以寧以生以似以翼孫女六人長適袁沂餘在室曾孫女一人明年閏二月甲子諸孤𦵏君于鄞縣塔嶺之原書來求銘數年以來日見李氏昆仲奮發益歎積善餘慶之盛聞君既亡家人始得遺言于篋中區處後事甚悉且戒喪𦵏俱循古制無徇世俗有曰家中遺産惟有一經教子而已又曰吾幸有子所欠惟一死不以諱也賢哉銘曰祖開慶門父全鄉邑君繼以善子孫玉立或升于學或慶于鄉儒風大振名第相望衣冠方興所貴持乆毋渝淳則用篤厥後承議郎謝君墓誌銘余家世業儒五世祖正議始以鄉先生決科起家五子俱傳業而季子夢弼諱肖尤攻小學又傳其五子其仲元應諱弆獨殿諸老說文解字經典釋文始末通貫㡬于成誦鑰侍教累年故頗知字學客授東嘉與諸名士游獨謝君季澤最為同好相與攷訂文字毫髮必計後十五年復叨假守時過郡齋晤語甚樂也别後時見其筆畫愈工余既投閒聞其亡矣亡又十五年當嘉定四年得其子有開書以銘為請既列君之行實又以張忠甫所作乃祖志銘陳君舉序君所著正字韻類五卷來撫其書為之傷歎此真季澤留意之書也因為掇其大槩而系以銘君諱雩季澤其字也温之永嘉人曾祖文淵祖君任有鄉行父知柔嘗居瑞安之樂善里里人稱樂善先生君仕升朝贈承事郎母張氏贈孺人兄黔有聲上庠君性穎悟承父兄之訓博學强記自經子百家之書皆手自校定音訓句讀一一不苟以是文亦日進援筆立就不為艱深之辭紹興三十年入太學乾道五年登進士科授左迪功郎福州連江縣主簿丁母憂服除再調台州司户參軍闗陞從事部淳熙十二年為髙郵軍軍學教授改宣教郎知福州寧徳縣主上覃恩轉奉議郎賜緋衣銀魚慶元改元年勞轉承議郎三年以疾卒于官享年六十有三娶萬氏有婦道先君五年卒贈孺人十一月庚申合𦵏于西山廣惠院先塋之後山二子有開有大孫四人師中師善師俞師心女三人君講學務出于正早受知于舅氏端明忠簡張公闡忠甫名淳君之内兄君舉名傳良又張氏壻龍圖鄭公伯熊毗陵薛使君季宣皆里之名公周旋其間不扶而直聞佛老巫覡之說必深排之既仕而知者益衆丹丘郡用不足取于民者多居甞受輸為之撙額外之求宿蠧一空五邑稱之朱公熹為庾使風裁甚髙一見君如故交留語或至終夕屬以荒政及滯訟以辦集稱祭酒李公祥為淮南提舉薦四人于朝籍記中書髙郵教官預焉錢公之望為帥舊與君同舍知其才訪以民瘼君為論科買瓦甓薪葦洎差役工匠之害尤悉帥得書喜曰仁人之言其利溥哉下屬郡盡蠲之及試邑日危坐聴事事至立決故無留獄出儲粟以賑之增學糧以養士閩有蠱毒法禁數嚴而姦民反以誣善良吏復鍜鍊或至誣服君察其誣白之部使者曰蓄蠱者固不可赦誣人者自應反坐卒平反之鄰邑連江亦有是獄太師鄭公僑復以委君又得其情無不感服故吏畏其明而民樂其寛焉死之日巷哭相聞有攀號輀車不忍去者士夫挽章盈帙祭文率數十百言且相與祠于老氏之宫平時勤謹禮法冠昏喪祭皆有典則律子弟尤嚴于拜跪舉止之際衣冠服色斥去浮薄之飾君既亡其子行絞紟之制悉去世俗不經之文承君志也君性孝友二兄早世撫育諸孤為之畢婚嫁治室廬又勉之學勇于赴人之急惟力是視樂聞人善有過多面折之敏而善謀審度事宜往往中的惜乎不假之年其見于用者僅止此耳韻類一書援據精確不知者以為苟然惟好之者然後信其積學之工每謂使之在天禄校讐之職必有補于斯文然亦不及此余所以重歎也銘曰古之設教學有大小六藝之目殆不為少幼而貞淳習之既成壮而用世足了一生惟此字學是為一藝後世忽之謂學之細禮樂既壊射御罕知數亦失傳惟書可為我家有原余亦素嗜間亦語人鮮有同志頃仕東嘉日親友朋惟此謝君時稱筆精以文發身又敏于政篤意斯文字為之正亡年五十始得其書著之于銘以賁幽墟贈銀青光禄大夫宇文公墓誌銘宇文氏本居河南唐末入蜀遂為成都大家隆興初元鑰忝進士科與淮東總領子震兵部尚書价同登尚書嘗幸同朝而總領以出入參差竟不及識三仕周行多見蜀士尤聞今貳卿及樞宻之名恨未遇也告老復來樞宻由京襄宣威召還文昌遂躋右府貳卿以棘寺奉使北歸上從班皆一見如故交貳卿引嫌出守當塗鑰既叨參預與樞宻情好日隆一日親攜貳卿書以二親銀青及夫人之銘為委謝不敏至再三終不得辭謹摭所示行述書而銘之銀青諱師說字徳承曾祖宗象累贈太師魏國公祖邦彦故任朝奉大夫尚書屯田員外郎累贈太師齊國公父時中故任左中大夫直龍圖閣累贈通議大夫公之二伯父以文學被固陵深知迭掌翰苑繼為丞轄樞廷家聲臨一時公少在富貴中而天資沖淡惟專意于學自為程度風雨不渝由伯父任補承務郎銳情舉業兩占薦書尚選父母既鍾愛之公亦不忍離膝下既冠三請祠禄以便養龍圖勉以仕始為潼川府路轉運司主管文字使長喜興獄一道騷然州邑為之屏息凌忽官寮雖有言不屑也公氣平而語勁遇事堅執未嘗少屈下期于用己之學長為斂容獄亦寖息俄丁母碩人房氏憂父既奉祠公亦不調龍圖服除又任常平司幹辦公事甫到官而以疾卒年止四十寔紹興二十六年五月二十八日也官止奉議郎平時鄉黨搢紳品論世家子弟之賢必以公為稱首至是相與嗟惜又不能自已也兩娶房氏贈通議文安郡夫人四子紹猷故奉直大夫知漢州紹諤故文林郎知敘州南谿縣次紹彭由權户部侍郎右文殿修撰知太平州次紹節以龍圖治命繼伯祖樞宻太傅肅愍公後端明殿學士簽書樞宻院事兼太子賔客一女適承議郎新知簡州楊思成孫五人景韓景脩俱終于将仕郎景琦迪功郎監漢州商稅景度儒林郎添差兩浙西路提㸃刑獄司幹辦公事景厚迪功郎邛州安仁縣尉孫女三人曾孫人二子以郊恩累贈公銀青光禄大夫以某年某月某日𦵏于廣都縣龍華山之原後三十餘年文安夫人祔焉公既蚤殁諸子尚幼公之學行俱不得顯于世文安每舉公之遺烈以教之大略以為公之讀書為文皆有繩準經史百家之言悉以次第繙閱沈濳反覆隨疏坐右旦為某書夜為某氏之文手抄成誦若布衣初學之勤者喜與士友談易時誦家人正家之道以勉我相敬如賔公退則閉閣弦誦哦詩緝文一不以家事介意此皆公之所安而道行于妻子之實也歐陽公幼失所怙罔知其父崇公之詳其見于瀧岡阡表者皆鄭夫人之言也敢引以為比公之隠徳所謂非此其身在其子孫貳卿方以名從臣出典藩方樞宻先膺大用宇文氏之興真未艾也天之報施豈不昭昭乎銘曰宇文之先其積已厚樞筦丞轄赫然華胄公居其間卓稱孝秀天爵為貴多文為富學優入仕不渝素守出門軸折才不及究非此其身宜昌厥後我惟銘之用詔不朽文安郡夫人房氏墓誌銘夫人姓房氏諱妙光其先顯于唐廣明中扈䟆西狩因家于成都之華陽曾祖審能贈朝請郎妣安人宇文氏祖希參朝散郎贈通議大夫妣碩人張氏杜氏父永朝奉大夫通判嘉州妣宜人張氏夫人性明悟在羣兒中獨若成人少長事親知色難之義不但長于女工也宇文氏世有姻好嘉州先以次女歸直龍圖閣時中之子銀青公師說又以第四女繼室是為夫人夫人之姑姑也未㡬即世執喪哀慕扶護以歸又謹視龍圗次舍食飲之宜已而治閫内奉烝嘗一如姑無恙時以寛龍圖悼亡之悲銀青為潼川漕幕夫人年纔過笄恪守家法食不重肉而豐賓客之奉夫子盡職不苟退則耽書一不以事物自嬰内助之力也嘗侍龍圖疾奉藥餌甚謹少間曰吾婦孝敬他日願汝子婦如此銀青事兄如父夫人待長姒如姑百口無間言銀青卒于潼川倉司夫人三十有二諸子皆幼送終治𦵏無一不盡自後専意教子晝夜不怠又舉銀青學行以為法故諸子益自刻苦相繼預薦季子紹節遂登淳熙十四年進士第銀青之兄赴合州夫人領諸子留里舍教愈力用愈儉嵗入之餘悉儲以聴一毫不自私合州晚嵗閒適夫人與其姒分月主家務或客至紛沓供酒肴無倦色伯與姒皆敬歎之姒既寡居相好益篤事夫大小未嘗先可否至不敢専席而坐若非輩行然二十年如一日親黨皆以為不可及姒止中夀四女未行悲卹撫摩不啻已出俱使之得所歸長子紹猷得官成都張宜人年髙喜于便親即聴迎侍一二日必歸母側曲盡孝養宜人及見外孫以次授室相繼出仕謂夫人曰汝父與舅皆稱汝孝盛年守志不以悲哀亂所守固知其有今日矣送子之官戒飭尤備引雋不疑之母之語及談上世官業以勉之且俾亷勤首公無躁進無詭隨不以馳騖寵禄為急也肅愍公靖康奉使結約舉義謀泄遭變盡室死之龍圖命銀青以紹節繼伯祖為孫甫冠夫人即遣詣行在所以其事本末請于朝留十寒暑每以書戒其盡力毋念我事既昭明卹典優渥乃俾追喪略無嫌忌人尤以為難平生動中準繩髙見絶識有士大夫所不逮然語笑不妄發未嘗以所長自為表襮賙人之急如恐弗及故奩衣襦乆而如新視世之紛華榮耀一無所累其中者淳熙九年六月十八日卒享年五十有九明年十一月甲子祔于銀青之墓子女孫曾悉在銀青誌中嗚呼夫人在家為賢女既嫁為孝婦妻道母道又皆兼盡可以為閨門之規範矣是宜銘銘曰彤管不作傅姆無教孰能閨門惟敬惟孝猗歟夫人謹于三從事姒如姑又篤其終義方尤嚴繩繩孫子慶必有餘川至雲委典刑如存是為壼彞凡此婦道百世仰之朝散郎致仕宋君墓誌銘隆興改元永嘉進士得人最盛尚書木藴之既在魁選一郡同登至二十七人余忝末科至乾道七年客授此邦三年間多與同年往還甚樂也後又假守則在者已寡矣今四十載惟余叅議光逺宋貳車正卿在鑰亦偶未死故三人時以音問往來而正卿又亡矣明年其弟習之持書求銘正卿之墓抆涕之餘為序其平生而系之銘且請光逺篆其葢云君諱晉之正卿其字也舊名孝先字舜卿五季時處士靖自福之長谿徙温之樂清邑有張文君隠居築室為鄰而緱山僊人吹簫臺峙其前真勝地也今八葉矣子孫繁衍為名族曾祖惟表祖世則俱晦徳不耀考允修行義過人有聲舍選而終不偶篤意教子既口授以尚書大義又力貧為之擇師君既升朝生封承務郎後又贈至奉直大夫妣萬氏繼母張氏皆贈恭人由是邑人益勵子于學君幼穎悟日誦數百千言弱冠從梅溪先生王公十朋游學徒數百人獨君首出王公器之曾以詩贈别襃借甚至未㡬入太學登乙科授左迪功郎汀州司户參軍王公又以詩送行期待尤逺到官明銳任事不擇劇易郡政待户曹乃決有霹靂手之名秋稼加耗病民君以郡命蠲之人皆讙服校文三山士踰二萬杜君申有場屋聲又嘗名薦書文卷已遭摧剥君識于衆人中引義力爭竟寘舉首果以經魁南省人尤服鑒裁之明時丞相王公淮檢正吴公龜年少卿鄭公伯熊同為部使者皆欲出其門外移長谿丞縣去福州數百里休戚㡬不相同丞相陳公俊卿為帥君言邑之利病多所開納贊其長黄君藻和而不同相得尤深罷官祖餞揮涕而别海舟之𨽻于邑者數千艘君既被檄總籍其目分番以備調發舟人安之時造戰艦期㑹趣迫君緩其期事亦隨辦伐木必親相視而後取其免于斧斤者號宋公松丁奉直憂治喪諸費一金不仰于公家歸營𦵏送仍自為夀藏于側泣曰尚當供養于地下也除服調臨海令以辦治聞催科不擾囹圄屢空太守邀入簽幕郡縣視猶一體知無不為軺車行部士民遮道稱徳政者動數百人樞宻丘公崈為憲使率諸臺薦于朝及去官壺漿攀戀旗幟咽道相望不絶前此未有也再調光化令鄉人王公自中為守每稱為老先生被邊事簡作亭豐山之顛遙望卧龍舊隠暇日相與登髙弔古哦詩度曲不復以僚屬相遇改奉議郎知奉化縣君三更邑寄熟于綱目刓方為圜坐以無事民大愛之丞相謝公深甫臨海人素知治行時在參預欲引之周行君赴部授信州通判以歸佐郡期月即引年求謝事謝公又卻其請且勉留之秩滿竟以朝散郎致仕或謂理賞可及正郎君曰不翅足矣翩然還家聞者愧服天資孝友奉直素為鄉曲所敬憚以儒術自信黜釋老之說每曰親亡而藉緇黄以薦何待之薄也死欲速𦵏或溺于隂陽家之言以幸富貴至累年不入土者不孝為大其卓見類如此君之執喪一遵遺言追慕老而不衰嵗時祭祀焄蒿悽愴如将見之言及則必泫然弟習之少君四十嵗撫之如子捐祖産以畀之而不忍析爨弟亦恭謹好學事君猶父門内以禮法稱護墳塋如䕶頭目拜掃必躬必親宗黨貧者收卹經紀有孤女則為遣嫁之不惟子弟承教修飭厮僕亦能以生事相戒有古樟䕃蔽甚廣自號樟坡居士晚又築亭其上榜曰可髙賦詩賡酬者衆鑰亦預焉嘉定四年八月屬疾終于家享年八十有六娶孫氏繼萬氏皆贈安人二子長曰統迪功郎寧徳主簿衢州比校務調邵武軍司法姿稟端重居家臨政綽有父風不幸先二年亡矣次曰纓孫四人㑂僑俶皆業儒幼曰宅孫女四人伯適進士劉頤仲適國學進士張復道叔從浮屠名法定季適進士萬逵女孫三人習之與纓将以五年十月丁酉𦵏君于縣盖竹山寔附先塋君志也君敏而靜貫穿百家不為艱深之文明白豐贍詩辭髙勝淡而實腴即席唱酬鋒起泉湧人畏其捷而服其工所至留心風教勉厲後學長谿有隠君子林君維屏號榕臺先生君屈致邑庠遇講書與其長率邑之寓公聴焉學者益勵丞相梁文靖公聞之遂招入郡中一時政化之盛君實啓之憂居開義學來者輒受勸諭有文齋舍有銘深衣大帶濟濟翼翼習俗益媺臨海官事整暇太守熊公克遇視學則請君為說春秋光化既為一新軍學至奉化則又親見之銳意興作里士監南嶽廟汪君伋與其弟份斥家財為之倡衆亦競勸輸奐鼎新照映山川舉梁之文落成之記皆鑰為之自爾累舉得士為多家素貧孫安人初以田四頃自隨伏臘粗給仕㡬四紀無一丘之益客至必留盡歡或假貸以續食人為不堪晏如也歸老餘年齒落復生髮白更黑頎然為鄉曲之望詩文甚多隨有散佚今惟乾坤二卦中庸大學禹貢洪範講義春秋十二公論各一卷厯代中興君臣論二卷擬進萬言書一卷樟坡集三十卷藏焉銘曰阜陵取士隆興之春惟溫􅇰盛二十七人我幸同升洊官海濵相與往來乆而益親四十餘年如星向晨惟宋與余夀踰八旬宋君忽焉而迹遽陳行義治政藹然弗泯難弟貽書其請甚勤哀懐易感勒銘翠珉從兄樓府君墓誌銘我大父太師齊國公五子二十五孫惟九伯父五子皆鑰之兄也諸兄凋零殆盡惟兄長鑰一嵗自幼少追逐晚益相親鑰投閒十三年時時步屧相過山肴野䔩聴琴觀奕酒酣而歸甚適也憂患之餘既掛衣冠期與兄樂此晚暮嚴召還朝重惜此别初謂可以復㝷舊銘兄亦促使蚤歸忽聞兄訃驚痛不自勝乞身未遂又聞将𦵏二子來求銘嗚呼遂無兄可事矣雪涕書之兄諱鎡字少及吾家世為明之奉化人入城而著籍于鄞者至吾兄弟五世矣推而上之僅得八世積徳有素至髙祖先生諱郁決科起家一仕遽休仍教授鄉里官止大理評事累贈正議大夫曾祖諱常朝議大夫累贈太傅祖諱异徽猷閣直學士累贈太師齊國公父諱琚朝散郎母陳氏封安人朝散兒女俱衆與安人勤儉治家尤篤意教子叔子鋐有場屋盛名以丙科仕至臨安教官季子鉅亦自太學晚為歙丞兄幼子也天姿謹恪讀書之外竭力事親于伯仲間急病讓夷心計精宻既不及禄仕一意守家法安分知足自奉至薄量入為用數十年如一日朝散得齊公繼繡堂故基為宅後既不足以容衆兄得田三畝力營築室未㡬落成過者駭觀入其家濟濟如禪房精舍地無一塵闢門臨水得城南勝處内地纔㡬弓花卉果蓏手植以供小摘之需真隠士之廬也朝而誦經晝則假寝暮止三酌陶然自適一呼燭則不復飲食故絶少疾病性諒直語輒見肺肝親故有過忠告或面折之自謂愛人以徳人亦諒而服之奉丘壟及致祭謹甚一物一器必出親臨尤好賓客至則談笑欵洽小酌亦有恩義夫婦齊年俱至七十親黨合樂髙㑹扁其堂曰雙慶冬至元旦鄉校有序拜之禮兄必夙戒子弟率先而往風雨不渝每自言曰吾無才術以發身賴祖先宗族之庇處夏屋三紀何以堪之生計素薄不足以卒嵗斤斤自處人不見其際遂為鄉里善人以終嘉定四年六月屬疾初無他苦丙申卒于家享年七十有六娶寧海李氏克相夫子以齊其家二子浹洽一女適文林郎撫州崇仁縣丞舒祐孫六人權柄校槢檜榗俱業儒柄出繼為長兄主簿鈺之孫孫女人長適方楷次許適舒樞外孫也餘尚幼将以五年八月丙申𦵏兄于通逺鄉金谷之原植徳菴後兄所自卜欲從父兄于地下也兄雖出世家辛苦自立竹頭木屑未始輕棄物多可為兩用若瑣瑣者先具美檟夀藏雖一日二日可為者亦皆豫辦略無拘忌之嫌又可見兄之曠達矣二子事親素謹兄亦以家務分委之繼繡舊堂㡬不能保兄言之或至泣下浹力圖而得之兄又喜甚将以故扁揭之未能也鑰既不得歸奉吾兄自念叨竊逾分上有憂責下困應酬每起伏波羨少游之嘆今日東望尤為心折淚迸哀哉無及也已銘曰齊公守鄉始立錦坊五家聚處昆令季强兄之與我親如同氣期盡此生日夕陪侍病不及問喪不得歸尚銘諸幽以寫我悲鄉里善人又以考終咨爾後來尚振素風攻媿集卷一百九欽定四庫全書攻媿集卷一百十宋樓鑰撰塔銘徑山涂毒禪師塔銘徑山為東南第一叢林非第一等人不足以居之淳熙十五年冬丈室虚席臨安守臣奏請無錫華藏涂毒禪師夀皇素聞師名制曰可明年二月初吉方入寺遇今皇帝始登寳位詔就靈隠開堂中使齋御香以賜恩禮甚渥道俗輻湊驚歎未有且曰是為叢林一段盛事非師不足以當此也師名智䇿姓陳氏天台人自號涂毒巖生英敏穎異父母素竒之十嵗護國僧楚光見之曰此子風骨巉巉有出塵之姿又六年遂祝髮光授以經律理詣昭徹迥出流輩性剛簡居處語黙肅如也尤不喜泛交善則慕之有不善雖親暱亦絶不與通年十九或告以定慧等學可以明見佛性即造護國請謁寂室光僅七日偶過門洒然有省寂室許之謂老于叢林者不能過也育王無示萬夀大圎皆一時大名徳無不肯可大圎問師甚處來曰天台曰見智者大師麽曰即今亦不少曰因甚在汝腳跟下曰當面蹉過圎曰上人不耘而秀不扶而直一日辭去圎送之門拊師背曰寳所在近此誠非寳師領之時豫章雲巖游禪師號典牛聲震江湖師往投之道由雲居風雪塞路坐閱四十二日午初版聲鏗然豁爾大悟及造門典牛獨指師曰甚處見神見鬼曰雲居聞版聲來曰是什麽師曰打破虚空全無柄靶牛曰向上事未在師曰東家暗坐西家厮罵牛曰嶄然超出佛祖他日起家一麟足矣貞淨老人若在見子亦當下拜遂領師至僧堂前撞鐘大言曰侍者大徹矣牛機辯峻峭莫有嬰其鋒者師與之平章今古泉湧風駛聞者為之錯愕踰年告别牛送以偈曰咄咄臨濟宗行行正在爾遂結菴于淮西烏崖之下典牛凡見浙客必曰識策公否客曰識之則欣然曰不虚生于浙江其器重如此大圎移大溈請居第一座秉拂之初衆已驚服嘗問訊圎圎俛眉不語師曰何其瞀悶圎曰期子濟濟多衆如雪峯存溈山祐之流而談天者謂子無徒子意如何師曰參學惟恐無本苟有本對泥像說法亦髙出諸方圎曰吾子器識過人𤣥酒太羮非常流所能知味也東歸又分座于國清此菴景元方住護國謂師曰公來歸三峯景元即收卷波瀾矣出世住黄巖普澤為典牛焚香是為黄龍四世孫厯天台太平吉之祥符越之等慈及大能仁所至道價興行旋自護國華藏來住此山而師已老矣力行祖道衆至千餘每謂其徒曰來日無多豈久于此者弟子請建塔于東岡之麓紹熙三年秋畢工師曰生平言出没死生如適園觀此言㡬户知之時節因縁乃在于此十六日升堂訣别舉衆曰請偈賛者如市隨叩即信筆應之二十五日門人宗惠問疾囑以後事仍曰子以文祭我師整襟危坐傾聴乆之至酹茶尚饗為之旴衡一笑二十七日辰初湯沐已竟剃髮更衣萬衆雲集說偈云四大既分飛烟雲任意歸秋天霜夜月萬里轉光暉俄頃泊然而逝八月二日舉全身瘞于東塔夀七十有六臘六十夏得法弟子已出世者十二人度四十三人空此下原本缺十餘字余非學佛者未嘗參禪又與師無半面而惠公余鄉人録師行實求銘既適越貽書不已惟師之始末勁挺洞達無一毫回護意氣于余心似有契焉乃具載所録而系以銘其實無此可也銘曰臨濟正宗直下不絶楊岐積翠何有分别矯矯典牛付授親切涂毒一聲聞者腦裂雲居版聲風撼深雪徑山一著霜夜秋月掃盡葛藤光明透徹我詞賛揚慙媿饒舌天童大休禪師塔銘余家四明十禪刹錯立名山中兒時未甚省事已聞人稱老尊宿頗衆而大覺小玨之名尤著且乆大則宏智正覺小則師也師名宗玨和州烏江人姓孫氏生不茹葷世業儒而性樂空門年十六白父母願出家止之不可遂依貞州定山貞如住持徳雲十八進具長蘆祖照道和聲振東南師往叩謁照與語竒之留為侍者時真歇了公為座元師入室問云佛祖不到處是什麽境界歇豎起一拳師擬議歇揮之師即領悟遂云将謂無人到歇云放過一著宣和中歇主長蘆學徒益集至千七百衆師代居第一座為衆說法建炎初元之蒋山入慈受深公室語契淵㣲尤相器重尋避地浙東侍歇居補陀巖道價愈髙郡請住岳林布袋道場不就寵智時在天童視歇為兄邀歸山間又命師挂牌領衆象山廷夀虚席使君延請再三始從之紹興二年太守陸公長民仍遷師于岳林備禮開堂丞相范公宗尹自號退晦居士與師為方外交逺來勸請參政孫公近時為部使者為范公草疏禪門以為美談師即嗣真歇㡬三年退處翠山依宗禪師待制仇公悆遷之香山一住十八年衲子雲趨寺為一新二十五年尚書王公俣請住雪竇二十九年真閣張公偁遂以天童招之師念太白名山實寵智之後一遵規式無所更改道俗益嚮之師容貌竒龎度量恢偉喜慍不見于色終日頽然無所修綜亦未嘗振厲風采而見地明白深造自得死生之際卓然過人人于是尤以為不可及也時城中湖心辯公宗師與師生之年月皆同三十二年八月上浣辯以遺書來師初無恙覽書笑曰齊年既行吾亦逝矣翌日迎賔如平時晚欲小參侍僧以為暮矣即令集優婆塞衆人知其有異舉寺咸㑹師從容普說多致垂别之意既歸丈室濯足就座整容跏趺汨然而逝又八日學徒奉全身𦵏于南谷夀七十二臘五十四師等慈接物無貴賤之間侍制張公劭昆弟與師為中外親舍人孝祥又視公為父行皆一時名勝師視之藐如也嗣法三十餘人分領宗風而足菴智鑑為􅇰顯足菴住雪竇數年與余素厚紹熙三年余官後省忽得足菴垂絶之書專以先師大休塔銘為祝大休師自號也余幼欽師之名而不忍違足菴之祝為之銘曰是釋者流視生若浮生兮若浮死兮若休生既曰休死又何求足菴之求為銘諸幽瑞巖石牕禪師塔銘師諱法恭明州奉化人俗姓林母楊氏號佛光道人日誦蓮經甚専一夕夢胡僧來謁既寤而生師父早喪年十五乃白母出家以棲真禪院僧則韶落髮為師宣和七年受具戒習南山律于湖心寺繼受天台教天童宏智覺禪師法席方盛師又更從之兄事自得暉晝夜危坐一日坐殿廡間忽傍有僧曰本自不生性無和合師一入耳根豁然開悟流汗浹體即見宏智反覆問答機應如響智遂留侍傍乆之再厯江湖徧參石佛萬年閑公室中嘗一舉似地擎山話經月不契他日再往閑日似地擎山作麽生師掩耳而出草堂清不許暫到入室師真造前清舉拂日識得這個參學事畢師曰拈卻這箇喚作什麽清擬再舉師奪拂子擲地上曰老漢拂子也不識一衆駭嘆黄龍忠置界方槌拂于香案上師謂其侍者曰和尚此一絡索作何用少頃一一拈起問過一機不來莫言不道侍者白忠乃盡撤去三年復歸天童主藏事即分座說法遂為第一座智所舉宗要師不為苟合智愛而畏之紹興二十三年越之光孝虚席帥移書于智求一本色人智以師參學行業始終明白薦之既往㑹應天塔壤或請捨去師曰非我尚誰為耶塔成始行未㡬復住能仁隆興改元趙公侍郎出守四明命主報恩兵燹之餘前人相繼興造凡所未備者如鐘經一臺等處皆師所建軒敞宏大遂為一城蘭若之冠乾道六年退居小溪之彰聖明年滎陽郡王又起住瑞巖居山㡬一周星闢舍宇以安衆開山田以足食又建圎通傑閣輪奐甚美皆師餘事也大參范公請師于雪竇自得暉公歸自淨慈乃請雪竇竇還之復居瑞巖淳熙八年八月十三日感微疾謂弟子曰母以藥石累我殆将行矣十九日以書招自得且促之越五日始至談笑如平時付以後事作士大夫及道友書六緘已而諸山皆㑹以翌日遲明升座說偈而逝郡守謝公修撰得師遺書唶曰恨不識此老即以其座元如璧繼之師夀八十臘五十九受度者四十三人嗣法者十人山之西偏夙號上方于是立塔以𦵏寔九月三日也師之從姑歸余叔祖故自少時與師遊璧求銘于余余非學佛者然竊謂桑門之法有三曰律曰教曰禪學者當先習律以檢其身次聴教以廣其業然後參禪以求直指人心見性成佛一聞千悟世出世間法則為全人矣況是三者本無異途苟能貫通何所不可惟師天姿勁挺持律嚴甚而禪教並行直以古徳自期愛身如冰玉終老不衰絫主大刹起居寝食無一日不與衆共不務縁飾無他嗜好自號石窻叟峭直骨骾未嘗借人以詞色見有道者雖坐下版必力加提引成就名譽郡命公定師畧不容私或以賂得叱之不貸至白郡将汰遣之諸方異辭輒遭呵咄衲子慧而狂者至則摧折有僧自謂罷參指地曰人人喚作地我道不是汝喚作什麽僧未及對即斥去同行僧請代一轉語遂舉一拳師曰同坑無異土併逐之臨安淨慈人所願得嘗馳書請師乃航海以避命郡為申免皇子魏王作牧每加敬禮欲訪師于山間辭曰路逺而險徒勞民耳其嚴冷類此公卿名士為方外交者甚衆丞相魏公晚嵗與師尤厚嘗嘆曰自得如深雲中片石石窻則空門中御史也緇流以為名言師行解甚髙不為夸詡以驚衆壬辰夏旱郡請說法即日甘澍次年又旱定海宰延之師曰前此偶爾非吾力也堅拒不受邑人固請即又雨焉嗚呼禪林五枝盖出一本惟曹洞宗至芙蓉而大振石林葉公左丞稱其與之嚴者得之必精傳之必乆河南邵公子文稱其為特立之士二公皆名儒言必不苟一再傳而至宏智尤光明俊偉而師得其正傳卓立傑出確然自信末後一著照映今昔盛矣師機縁有三㑹録瑞巖後録壁立千仞不可挹酌叢林尤所尊敬讀者尚自知之瑞巖古道場璧以師故出世即居之乆而衆無異辭不負所託矣銘曰此道本無二五派寖分别猗歟曹洞宗綿宻更親切稽首芙蓉師壁立蹊徑絶邇來一再傳竒鄒出丹穴石窻嗣宏智游方俱洞徹門庭晚益峻坐㫁衲僧舌如識滋味人啗土炭石鐵醎酸甘苦辛開口了無說何以傳不腐君其視兹碣表裏無纎瑕瑠璃含寳月雪竇足菴禪師塔銘師諱智鑑滁之全椒人俗姓吴自兒時已喜佛書每以白紙為經跏趺端坐誦之琅琅然母嘗與洗手瘍因曰是什麽手忽對曰我手是佛手遂視母大笑少長日記經文千餘言連遭親喪決意出家誓修苦行以報罔極之恩真歇禪師方住長蘆徑往依投一見異之師勤苦精進終嵗脇不至席大休小玨禪師領千七百衆為首座獨指師為法器曰汝當振吾宗已而侍真歇來四明至補陀山遇羣盜蠭起避地之馬秦駭浪翻空舉舟驚懼師坐篷外獨不沾濕真歇益異之㑹京城三藏道法師講菩薩戒師受戒已背若負萬金然道曰汝真得上乘戒之証也徐即身輕真歇住雪峯服勤三載雖日親示誨終未超徹復回四明遯于象山縣之鄭行山乃海岸孤絶之處相傳山有怪妖不可入入亦多以驚異逃歸師曰吾為法忘形何懼耶乃即山中盤石縛茅為菴地髙無泉脉師禱曰吾辦道來此山神其惠吾泉因鋤小坎移時而水溢食不繼則啖松枝以療飢時紹興二年也一日有巨蟒入菴矯首怒視越數日復旋繞于牀師不顧而去夜聞菴後巖谷震響如霆擊旦起視之有巨石飛墜越菴而立于門並菴大木皆為之摧拉變怪百出略可記者如此師不為動終不能害也明年正月十四夜于深定中豁然開悟師自念云威音王以前無師自証威音王以後無師自証者皆天魔外道遂下山見延夀然曰日來肚大無物可餐菴小無牀可臥若能與食展菴則住不然則去然與師反覆問答不能屈因叩師見地師云一坐四旬身心瑩徹忽爾古鏡現前非由天降不從地出自是本有垢淨光通不勞心力自照也昔真歇嘗于室中舉門一物上拄天下拄地常在動用中動用中收不得是什麽物得恁麽而今照破方知天蓋不及地載不起喚作古鏡亦是謗他遂有頌云箇鏡光流遍刹塵鑑照無碍體難分羣靈巨徳皆稱妙凡聖無非裏許身然云不易到者田地師至陳山欲航海或指曰此鄭行山中肉身菩薩也人皆環遶求偈時天大風不可渡師謂篙人曰吾為汝借風洎登舟俄頃而濟抵岸則逆風如故徑至岳林見大休云乆違尊顔即不無如何是同風不門底人玨云井底蝦蟇吞卻月師云賔主不立報化平吞玨云向賔主不立處道師云不辭道恐涉唇吻玨云只今将什麽抵對師云不借玨云佛祖不奈爾何師禮拜遂令受具聞翠山宗白頭機鋒峻峭往叩焉時師方為岳林行匄擔二布囊隨得即受備厯艱勤人所不堪宗云為衆竭力不無其勞師云須知有不勞者宗云尊貴位中收不得時何如師云觸處相逢不相識宗云猶是途中賔主作麽生是主中主師云丙丁吹滅火宗以手掩師口師拂袖出宗遷雪竇挽師偕行荷負衆事㑹法堂新飾且命師為衆普說宗嘆曰吾生有耳未嘗聞也叢林愈加敬焉宗乃宏智髙弟師因造宏智室動輒深契二十四年遂舉住棲真隆興二年移定水侍郎趙公子潚聞師名屬侍御王公伯庠製疏備開堂禮嗣法大休寔曹洞十一世孫也乾道五年退席遂之天台八年嗣秀王來鎮請住廣慧淳熙四年皇子魏惠憲王請住香山七年參政范公移主報恩十年遂歸西山為終焉計十一年雪竇虚席衆皆以師為請師念明覺知覺道場勉為起廢一住八載所在道俗歸仰至是尤盛隨力葺理内外一新紹熙二年謝事止于寺之東庵太守林公枅稔聞道價命師再住不從必欲識面既見問道終日致請益堅力辭而歸三年七月乙未示疾己亥親筆遺書晦日以道具抄録八月哉生魄夜分戒其徒曰吾行矣送終其務簡約勿用素服哀慟言訖書偈趺坐而化時暴雨疾風震動山谷人尤嗟異四逺聞者奔赴盡哀于是相與建塔于山之左戊午奉全身以𦵏夀八十八臘五十三嗣法及受度三十餘人師素與余厚在雪竇作錦鏡以蓄飛雪上流為一山竒觀甞為之記師且死手書遺余告别以大休塔銘為屬余既銘之師之徒又以此請不忍拒也余不習釋氏學然聞古徳相與傳授之際多藉導師有以啓發之惟師根器過絶人自誓不悟不為僧則識趣已不凡操心如鐵石視身猶土芥又有人所不能及者初雖乆依真歇鄭行之居略無怖畏非有師傳而遂得道禪門少見其比是時自覺般若有靈真有飢則一與之食寒則一與衣之騐夜行深雪自然得路若有隂相自以為大千世界無如我者一見大休誦言所厯休徐曰但盡凡心勿為異解師為之漼然意消而歸心焉師天資樸厚見地真實業履孤峻苦行堅宻至死不少變等慈接物法施不吝具大辯才浩博無碍為人說法或自曉至暮或自昏達旦至連日亦無倦色音吐洪暢晚亦不衰聞者聳服學徒每出衣資請師演說此尤禪林所未有也雲深火冷尸居淵黙有召之者雖祁寒隆暑不拒一毫施利悉為公用丈室蕭然故六主廢刹積逋動數千緡不過期月百廢具舉若禱雨暘捄疾苦其應如響神祠烹宰物命輒為易以素饌有藏其鬚髮而得舍利者此皆世俗所創見師不欲人言之以為非此道之極致使其有之亦皆師之餘也師既亡太師史文惠公祭之以文有曰了悟圎通如觀音大士隨機化俗如善導和尚人不以為過也師生于淮南而化縁獨在四明屢易法席名震江湖而終不越境自號足菴人以古佛稱之惟師可以無媿云銘曰祖師西來乃始有禪燈燈相續皆有師傳師之得道㡬于神曜心鏡孤圎大千俱照曹洞正宗實艱其承十有二傳至師中興蛇虺之宅聞者怖恐惟師宴坐曾不為動振錫出山據大道場四衆歸仰廣為津梁生于淮壖縁在甬東名震江湖卒老吾邦法施不吝辯才無碍行實堅苦而大自在人稱古佛師則無媿銘以表之用詔末世瑞巖谷菴禪師塔銘淳熙五年秋有㫖以明州智門僧景蒙住台州瑞巖寺先是㕘政錢公請為墳院公既薨其孫今江東轉運判官象祖以大父治命辭于朝仍請敕差住持太傅史魏公再當國謂蒙可瑞巖台甲刹師一旦自海山膺敕命孤雲野鶴雖無心于去來然空門之盛舉也魏公分教永嘉時與心聞賁禪師為方外交罷相里居夢如平生傍有僧曰景蒙貌古神清談笑久之覺而叩天童朴曰僧名頗異有斯人否朴曰是方為堂中第一座招之恍如夢所見與論出世法了辯如響問其師則心聞也大異之遂為延譽而得智門一住七年寺以寖興甞葺古殿得瓦于脊有字粲然盖建隆改元之秋䜟語六言中有師名若言超進之意抑又異矣在瑞巖前後十夏道俗傾嚮寺居兩山間樓觀層出有溪自東北横貫寺中一夕暴漲衝決隄防棟宇漂蕩强半為瓦礫之場人以為不復可興矣師曰吾當任此既而財力交施從容規畫曾不踰時輪奐一新壮麗反過其舊師才智超邁不以毫末自見因事而顯無不嘆服韜養之深從可知矣師姓邵溫之平陽人族姓甚衆多以儒自業母感異夢而娠英特開爽幼聞鐘梵則喜年十三從惠安淨覺大師惟梵著僧伽梨明習天台教觀自以名相之學不足了大事去遊國清又參育王山佛智裕公裕問以宗門節目師不知所對甞入室誤問鄉里師曰永嘉人還識永嘉大師麽未及答批頰而出至于再兀然如癡寝食不安者累月行道次忽聞鐘聲而悟即造室中又問永嘉大師即今在什麽處師曰即日伏惟和尚尊體起居萬福裕隨問向上事如何師擬酬應又復逐去次日再入裕方發問師抗聲曰老漢今日敗闕也一拍而出裕曰雋哉念母而歸龍翔心聞一見深器之問曰言無展事語不投機承言者喪滯句者迷試向言詮不及處通個消息師以在手畫一圎相聞以拂子擊左師即畫以右手擊右師又畫于中以兩手托呈聞以拂子當中畫兩畫師禮拜而立聞大笑云三十年揀辨苖裔今日得此烏喙耶由是依止室中通徹無滯遂令執侍左右既歸鹿園如在菴賢雪菴瑾咦菴鑑全菴存筠谷達還菴淳㑹下皆一時之名流惟師妙齡傑出聞以谷名師菴且為之銘蒙侍者之名曰髙矣又甞謁臨安顯寧志公志聞風壁立學者望崖而退獨謂師曰先世遺風餘烈若未墜者尚在汝躬吾且拭目觀之名山法席聚衆千數師分座提唱諸方咸畏而仰之師孤髙絶俗若不勝衣而嚴冷峻峭不可挹酌既坐道場槌拂所加龍象蹴踏長靈之道光焉十四年十月十有七日為施主說法似感微疾既歸趺坐良乆泊然而逝山林震動鳥獸鳴悲緇白奔湊如哀所親越七日闍維舍利遺骨瘞干居禪師塔之右寔晦日也夀六十四臘五十一度小師四十嗣法者十餘人鑰贅倅丹丘草疏請師赴郡假道别未㡬時而師以訃聞亟遣茗奠其徒以魏公真翰來俾銘其塔且曰吾師生得公贊死又辱祭以文願終惠之鑰不敏敢不承相君之命銘曰鞔峯髙髙壓千嶺寳坊樓閣非人境大浸稽天夜溟涬世界變滅彈指頃金碧掃地誰復整谷菴若子一笑領發揮金粟舊光景手髙妙絶風斤郢稜稜鶴骨雙眸炯古廟香爐無波井栗棘横施發深省一超透出毗盧頂真隠神交錐脫穎聲駕諸方增九鼎我游丹丘與三請再别㡬何俄奠茗石上主人呼不醒迷途多岐孰知警勿謂空言如縛影影與俱傳乆逾炳延慶月堂講師塔銘吾鄉延慶教院為東南諸郡之冠祖師建立不置佛殿所以待後人者不淺累代多得人如所期焉余不及見紹興以前事矣余嵗時見鄉人尊重圎辨講師道琛永嘉人初至說法是時宏智禪師諸大老拱手相顧曰此非闍黎也道價最髙大興此山繼以覺去予嘗銘其塔月堂惠詢之住持在乾道五年之後然得圎辨之正傳者也惠詢字謀道月堂其自號也姓陳氏父安寔家昌國縣蓬萊鄉之昫山母馬氏夢僧倚門乞食而娠生有竒相甫八嵗父母攜入寳印院謁了印大師善隆摩其頂曰能出家否欣然願留不肯去父母見其幼靜不類凡兒每竊竒之不奪其志始授蓮經兩月而成誦無不駭嘆十四為僧即造延慶依澄照子先法師學日勤講業夜則坐禪迥與衆異或以飰食物玩游戲等試之一切謝絶獨行獨坐惟以參尋祖意為急衆目之曰詢獨立章菴道因法師髙視衆作時居第一座驟加稱賞親炙數嵗盡得其說欲徧見諸山問所先因曰天台能仁法照老人當今大善知識也且送之以序有曰吾子氣貌温恭烈暑鑠金而法服襪履望之儼然夜坐而不卧不與羣輩相狎戲又曰兩山宿學皆吾故人盍行矣法照尤喜朝夕與處衆嫉之且曰吾曹久侍老師反不若新進耶夜堂講習一呼而隨者數人俱至師前遽曰教門多途叢雜非一欲從公以決之師正容徐曰吾學佛祖之大道夀量觀法十境十乘三千三諦皆是也得之則見性成佛失之則殃墜無間有疑則問來若名相之學方困算沙非吾所知也一衆愕然不敢措辭而退或曰此學海義龍也安得以衆人待之獨步于兩山者三載圎辨方住延慶師曰百聞不如一見宻入衆底竊聴開演已自欣快偶聞提唱曰吾祖之道荆谿之後傳者雖多不無小疵惟法智天資超悟不假傳而自知用一性惡之㫖大闡圎頓之談論即論具豈待煩惱之轉除約佛約心寧外婆娑之别㫖一理貫通諸法悉捨師于言下洞然明白感發既深涕泪俱下遂造丈室自列辨曰子再來人也特吾之㸃示耳既日挈包在弟子列自爾左右逢源鋒不可觸㝷入堂司有監寺以事忤衆衆欲捲堂負擔于門矣師急止之吾當任責乃領衆白辨曰維那之言然即書片紙付堂司起監寺不共住衆遂帖然微師片言豈不殆哉辨亡為廣嚴第一座偶擇主僧郡以十名寘瓶中一索而得師或以年少為言師曰吾何求哉力辭之㝷出世住海瀕華雲以省母之便欣然就之沙岸持鉢忽遇羣盜刦盡所有将解師衣正色叱曰汝何為者我法戒貪嗔癡貪求何益于汝生有王法死有地獄眼光落地受極苦時悔将何及貧富有命强取之物豈為終身之樂幸自無事而作此業實可寒心盜曰我将殺汝師曰吾以寂滅為樂汝若殺我早歸寂滅受大快樂有何不可盜相顧曰是善知識也安可害之盡還其物羅拜而退慈力攝持又能如此移住奉川之禪院又遷淨居前田後江師曰此處可與鬼神說法夜必炷香暗坐講法華經信宿間有飛螢一二遶于前後尋有百十乃至千萬明于燃燭講罷輒去甞夜出螢往來江上不入講室夜分既歸螢忽來迎如繁星然師見而笑曰是待吾講耶自爾每見之師不以語人然自以為差適人意也移住普和問于草菴草菴曰僻在一隅大江横前峭壁對聳佛影岩也前輩聚徒之地吾子其當之學子雲集鐘鼔一新朝參暮請晝誦夜禪禮講以時䇿筵有節乾道五年延慶虚席公定場中一舉師名衆口翕然師氣貌魁梧儀矩凝重未甞以詞色假人精持律範動不踰矩法席謹嚴數百衆無敢犯者說法必窮蘊奥學者有不能解昏後坐起信堂一香一燈逺在簷下僧徒畢集師乃揮塵縱辯夜靜堂深言詳理到境法俱勝隨資發越直疑祖師之復生忘其乆立之疲也至今舊人過其處遐想髙風多至隕涕制帥秀王每曰延慶人中鳯也寺之西有蔬圃官欲以為貢院勢甚急師怡然不顧方杜門終日禪定纔信宿府主見招迎謂師曰貢院之擾得無動心乎今已得基址可以放懐矣師謝外護之庇蓋有神現夢以為言也丞相魏文節公好内典法華中有是法住法位世間相常住稽疑以叩自得石窗終未有所契舉以問師師曰此非大力量人不能致此問乃曰春生夏長秋凋冬落世間之相乎曰然非以其遷變而致疑乎曰然師曰四時遷變嵗嵗同耶異耶曰無以異也師曰非止今年明年無以異窮過去極未來亦無所異既無所異豈非世間之相常住哉以至君臣父子生息大小不動本位皆得究竟以至天地日月明暗色空海闊山髙鶴長鳧短皆出自然莫不名體不轉貞常圎極故曰是法住法位世間相常住了此法者不落階梯隨所見聞立地成佛文節有省嘆曰經綸之妙還他教家魏惠憲王臨鎮來游獨坐一搨俾師坐而問所傳何道師曰天台教王曰恐不及禪家之直指師又曰禪教皆如在方便若就實知實見言之何為禪何為教妙悟之人一切掃除絲毫不掛然後龍菩提妙華徧荘嚴隨所住處常安樂王大恱屢以金繒為齋施㝷盡出衣盂建雨華堂等又募縁一新兩廡至于卧不解衣講必更淨非入浴走厠袈裟未始去體非赴齋啜粥蓮經不曾離念㕑庫諸司不一回顧工匠報作略不舉目大綱整肅不事苛細然犯必不恕欺必照破中外井井無毫髮之遺史文惠王曰能使教門增重今惟月堂一人而已師之傳道直欲追配古人非徒塞責每曰以語之相似而證其言以資之善記而駕其說皆非所以說法也惟自悟心宗而宣演之庶得祖師之傳吾求悟門切勿目畫凡說教義不出私科惟著立宗解一卷以救時弊淳熙六年十月二十五日召門人曰吾覺背痛殆将不乆矣越二日辛丑集衆諷十六觀經經終而逝十一月庚申奉全身𦵏于崇法祖塔之側師夀六十一法臘四十五聚髮一器舍相無所𦵏于蓬萊先塋遵遺言也分舍利之半同法智頂骨塔于太悲閣郎中省菴陸公沅贊之甚詳所度小師嗣法者六十人今柏庭善月其上足也餘皆散處諸方靈龕即路之日緇素男女秉爐持花填郛溢郭㡬于罷市觀者贊嘆以為前此未有此豈人力也哉後二十有五年其徒請銘其塔余非學佛者尤昧于教乘以其請之勤而察其實行實諦為可敬為之銘曰智者禪師祖天台教乃知禪教本無二道禪貴直指教若支離存乎其人統而一之圎辨之興教門鼎盛奥惟詢公傳得其正如淵之淳如玉之潔入自悟門縱横演說辯才無碍脫落窠臼如老斲輪得心忘手月雖已墮孤老故躔柏庭之徒尚永其傳育王山妙智禪師塔銘代魏丞相皇帝即位之十五年有詔明州阿育王山廣利禪寺釋迦文佛舍利寳塔詣行在所住持僧從廓侍行既至命入禁中觀堂安奉上御素膳焚香瞻禮親覩殊勝遂召廓對碧琳堂問舍利從何發見奏曰自陛下聖心發見上大恱親洒宸翰大書妙勝之殿賜廓以妙智禪師號仍度僧五員頒錢萬緡眷賚優渥前所未見由是寳塔之靈益顯而廓之名愈彰矣廓姓林氏福之長溪人家世業儒踵登賢科生而穎悟不妄言笑羣兒强以聚嬉泊焉如不聞有以出世法語之則忻然解悟年十五依邑之建善寺祝髮受具戒時閩中名刹多有道之士悉往從之佛心纔分室中舉四大各離今身妄身當在何處有所感發述投機頌佛心首肯之而不自以為足也去之見懶菴需公為侍者復依大圎璞璞大慧果公之髙弟門庭甚髙始叩之若自失久之豁然有得服勤數載璞撫之以為類已然以未識大慧為恨不憚重趼見于衡之回鴈峯下大慧深加器重留三年告歸送之以偈又以書屬璞曰廓乃佳衲子可為成就使異日為吾家種子自此叢林爭下之紹興丙子大慧被旨來育王復來依焉大慧移徑山璞以繼之衆踰千數以為第一座制帥丞相沈公以廬山請出世大慧方名冠天下無不願出其門以借重開堂日乃以瓣香嗣大圎諸方以此益髙之已而育王虚席尚書韓公欲邀大慧而舉以自代遂主此山禪衲雲集以祖孫三人世繼坐道場築堂于丈室之東名以三秀遂為空門美談才具素髙以其暇日興土木之工皆極其壮麗增庾入數千斛施者委金帛創為長生局五所百需皆備月施金錢飰僧以萬計又造金塔以奉舍利此特其餘事爾日本國王閱師偈語自言有所發明至遜國以從釋氏嵗修弟子禮辭幣甚恭且以良材建舍利殿器用精妙荘嚴無比丞相史公帥七閩以鼓山趣其歸滎陽郡王力挽無行魏王出鎮一見其風儀目為僧中龍又聞其機辯峻發肅然加敬師晚以衣囊立菴于烏石山名以笑月為終焉計有偈云三峯斂卻閒雲大海冷涵秋月庚子季春拂衣歸菴杜門不與世接俄示微疾八月四日呼左右付以後事澡浴趺坐書偈曰掣㫁黄金鎖鑿碎玉樓鐘騰身大虚外半夜日輪紅擲筆而逝夀六十二臘四十七月五日𦵏于菴之寝室惟臨濟楊岐之宗至大慧而益震又得如師者為嫡孫上承聖天子之休寵下為帝子公相之所尊禮近焉道俗之歸向逺焉外夷之師仰可謂盛矣籌室所度未易悉數有宜意者得法最的住平江開元方有聲于時而遽即世禪家惜之徒弟至百餘人家法嚴甚嘗以師語録萃為巨編師呵之曰汝輩隨語生解去道益逺矣固不許師既沒乃始得百之一二刊之余投老山林與世相忘師謂可以語道往來無虚月警所未至相期嵗寒一旦棄我而先愴念不已其徒求銘于余為之銘曰楊岐千古栗棘蓬諸方誰敢嬰其鋒佛日老子雲夢胸呵佛罵祖一洗空子孫三秀玉几峯妙智傑出傳家風碧琳一語開淵衷帝子謂是僧中龍三韓萬里滄海東酋傑稽首禮益恭一聲擊碎玉樓鐘日輪夜半通天紅亭亭寳塔上凌空烏石與之俱無窮延慶覺雲講師塔銘浮屠氏法盛于東南而明為最蘭若相望名徳輩起予固不能盡知其人然採之公言其間雖一代宗仰者往往未免評議至問覺雲師則同然無異辭余尤不能知也甞造焉修幹古貌丹脣碧眼長松野鶴無一㸃世間氣與之語愈叩而愈無窮名下士信不虚矣師既以隆興癸未嵗十二月十有八日化叔祖居士語鑰曰士之難其全乆矣趙魏老猶不可為滕薛大夫矧釋氏事寂滅而不免于應世二者冰炭誰能一之能使學佛者宗其教交游者服其人周旋酬酢無一可議殆鮮有覺雲如者我與之方外交既已敘其行事汝銘之遂謹書而系以銘師諱志連字文秀覺雲其賜號也俗杜氏世家于明州鄞縣之寵山孕有祥生又不凡故母山氏篤志竺乾法令從禮寂公慧云為師肄業崇夀年十八受具戒明智目為僧中鳳雛圎照授以天台教義後從智湧頓悟圎宗年登三十適延慶為第一座始開講席辯才先放落落風生四衆聳服靖康以來更主五刹惟妙音不及煖席而遷餘皆碎于兵火師一居之卒化瓦礫為寳所圎辯重建延慶于煨燼之餘功未竟而死遺基廢礎尚多有之虚席曠嵗實難其人天童宏智禪師以師為首衆議是之遂徙居焉經營十年無有不備施利山積一毫不自奉悉以資建立事雲棟雪脊傑然城隅望之如崑閬間物非大勤勞不易至此而師未嘗足也或贊其新伽藍者四當不媿智者師曰此有為功徳耳豈敢以此比跡前哲深恐不能洪宣祖道為法門罪人故雖所至興建而講學不少休承學之徒翕然向風誠于祈禱感應響捷或欲記之必痛以妄語為戒秘監姜公守四明為師作真賛門人固請立石師終不以為榮其不求名聞類如此一時名士多樂與游望之則毅不可犯即之則和易温恭乆益敬之終不得而親疎也有達官與之劇談貫穿禪律纚纚不倦驚曰師禪教並通師曰冰泮雪消固一水耳又問華嚴般若似過于繁師曰支離所以為簡易也于是肅然尤敬異之丞相沈公來鎮以僧職處師師以老疾固辭丞相遺手札曰師當表正一方紀綱諸刹毋退避以自潔且迫于諸方勸請始受命謙退謹愿不見有異然主盟衆事惟是之從或有私請雖大勢力富檀那不能回也時度牒再頒受戒者僧吏邀取無藝師為立成規省十之九沙彌至于今徳之有不逺數百里求附壇者所革宿弊徐而不暴嗚呼此皆人所難及者然師之所存心大而不宻體卑而道尊恭而不偽博而不雜寂用之涯不可得也感疾既革衆以葯進師曰十方無碍入一道出生死書偈畢撫掌大哂又以指彈屏風或問之曰我自幸至此不覺喜樂鐘鳴當往矣已而信然師之所存果易識耶享年七十有六僧臘五十有八度弟子行丕等十有二人登門者甚衆傳道者三十餘人即以十二月二十有八日𦵏于城南祖塔之側銘曰舟不涂車不川離乎器用必偏惟寂滅釋所先惟應酬世所䖍工與拙必一焉偉覺雲㡬于全峻而通周而専得其得悟獨圎出緒餘應世縁識不識無間言教不吝道以傳建塔廟崇人天定生慧無碍禪融一理逢其原金而玉嶽而淵尊尊師豈偶然道既成如蛻蟬嗟後人視銘鐫攻媿集卷一百十欽定四庫全書攻媿集卷一百十一宋樓鑰撰北行日録上時待次温州教授隨侍兖公守括蒼受仲舅汪尚書大猷之辟乾道五年己丑十月九日辛夘邸報仲舅侍郎充賀正使曾總管覿副之十日壬辰蔡興以仲舅書來辟充書状官二親許一行是日游南園微雨十一日癸巳雨俶装十二日甲午隂十三日乙未雨十四日丙申雨李器之以鳳棲梧餞行十五日丁酉雨周仁甫約同登途十六日戊戌晴仁甫酌别于少微閣醉中唱和十七日己亥晴十八日庚子晴飯後别二親徑出城張子質一見于驛亭仲兄器之元聲弟相送至夀寜寺仁甫繼至飲罷東行宿巖泉夏家店去城十五里十九日辛丑晴行二十里飯午頓驛行二十五里宿荆山上方二十日壬寅晴早登小樓眺望行十里飯蒋家店過縉雲縣少候仁甫即行道經放生潭山水秀發策杖縱觀聞有趙侯廟鄉人敬之石有如杖如履如罋如舟者皆以侯名雙頭巖白巖烏巖皆竒偉白巖峭立臨溪松竹秀潤烏巖下有石室端植如門渡溪入仙都玉虚宫路回顧南岸石筍森列有亭翼然僕夫曰此初暘谷也中有石鼓扣之有聲以既濟不復往路轉山回已見獨峯大松夾立清溪映帶眇視林間有巨石屹據如雪且行且觀遇道童問石之名云有洞名忘歸既懲初暘之失遂回登焉洞中可容數十人四旁嵌空如出鐫斲旁有小洞又一石横陳如臺松風清㣲俯和湍瀨是真使人忘歸也下行里許益近獨峯峯之上相傳有鼎湖嘗有巨蓮葉因風而下石壁隠隠有車轍世言黄帝由此飛昇塘曰黄履言遺履之地地曰靜樂言鈞天至此而不聞峯後大山如屏竒石崷崒始望之髙列峯外自謂倘登其上必可俯瞰鼎湖下有銳石僅如一筍及即之後山靡迤而退聴石筍亦不可跂及而此峯獨上摩穹漢巍然削立無階而升人有捫蘿登後山之巔者猶覺未及强半是知此峯真衆山之宗非凡目所可窺測也後山有石空洞躋攀而上一竇通明昔劉先生于竇之外横木為床以居至今遺簀猶在號隠真洞髙不可登恨望乆之循峯而北又有仙水洞一名鏡巖懸崖數十尺級石以上石罅有水僅如屋漏終古不竭下鑿小泓貯之名公遺墨鑱滿四壁迂叟介夫趙清獻公皆在焉攜酒對酌清坐移時亦記嵗月而還再至峯下大書姓字小憩宫前兩亭顧瞻偉觀兀不得去洞心駭目生所未見入據上方相與痛飲賦詩醉墨淋漓揮掃滿壁秉燭朗誦傍若無人詩榜櫛比盖自香山居士而下不知其㡬閱十之三四不能盡讀也宫前有門書祈仙總真洞天是日行四十五里二十一日癸夘晴早復筆詩于版各置醉墨髙處謁黄帝祠宇李陽冰篆額今留縣庠聞有上宫名妙庭相去三里而近他無勝槩有洞名金龍一竇通獨峯下僅容小兒出入而其中甚寛宣和間甞以金龍鎮之為睦寇盜去腳力既倦不得窮歴出門相羊峯下絶溪而西數里間山川猶競秀未已有徐氏小亭横跨練溪小憩而行三十里飯黄碧村醪醇釅不殊家釀二十八里宿和尚店去李溪猶二里㑹倅㕔一兵楊靖自紹興回因發家書第一封録所題仙都二詩寄仲兄二十二日甲辰夜㣲霰早隂晴行二十七里飯諸應行三十餘里至龍窟行五里宿尚書塘二十三日乙巳晴行二十里飯楊溪仁甫由新塘路往四明分袂于此田間行乆之猶能相望将入山舉手一揖而别四十里宿横塘暮嶺間張家店途中惟售溪坊酒頗佳然比之黄碧味不及而價又三倍深夜㣲雨即霽二十四日丙午晴行十餘里入東陽縣先見同年姚尉瀛次見王宰楫為諸卒批旁小憩一店尉已先至再三留一飯力辭之行十里飯愛頭孫家渡溪行五十里宿余店盖過蘇谿八里矣夜㣲雨二十五日丁未㣲雨作而復止行二十二里飯羅嶺下篆坑何店行三十五里宿義井夏店過牌頭十里二十六日戊申晴風過平厯遇客将李濬等回發家書第二封行三十里飯髙擁楊家行三十五里宿灰竈頭於店二十七日己酉晴行三十里飯溪口傅店行三十里宿漁浦鎮上朱店東陽士人周忠厚同邸清話乆之夜分小雨作二十八日庚戌㣲雨辰巳間晴早作飯了同周君行數里三憩方到渡頭装載既畢潮落舟膠監渡厲君以小舟般剥已又加一舟蕩兀波間乆之大舟既前復挈行李装載勞擾良甚又艤棹食頃挽繂徐行近廟山始用櫓潮上方急篙櫓努力欲進為山石所激進寸退尺舟人失色少縱復上乆方得過又挽行十餘里雨霽風靜一波不興至六和塔下登岸已薄暮矣驅馳至嘉㑹門閉闗已乆宿俞家店是日又有松陽一士人姓葉同渡二十九日辛亥晴早起入城館于仲舅家飯罷侍叔舅同去偽謁副使曾總管因登三茅山上步司教場觀仲舅習射夜發家書第三封三十日壬子晴同去偽見劉察院待范郎中成大乆之竟不見客次遇蔡架閣霖去嵗書状官也又遇留丞正臣飯季舅家發承局繆欽歸以第三書行十一月一日癸丑晴講禮何季膺葉先生憲平閭丘監丞尤監簿袤訪及仲舅赴副使㑹二日甲寅晴同去偽習儀都亭驛部中見梁監門叔玠范丈呂郎中正已赴景孟舅晚飯三日乙夘晴習儀驛中已不及習于參政府梁郎中訪及四日丙辰天明㣲雨即霽使副以下習儀驛中閱禮物授衣衫翟楫及承局翁葉行兩發家書仲舅招副使飯五日丁巳晴習儀政府候黄御藥甚乆周邵州伯駿王智叟沈尉徳潤葉主管翥訪及六日戊午晴驛中大習儀使副以下備衣冠賈國信竑六知閤張說張掄宋鈞宋直温康諝王抃偕來歸寫奏藁七日己未雨侍叔舅偕去偽赴何季膺陳叔强早飯于豐樂樓八月庚申陰發行李上船九日辛酉雨下遞擔籠十日壬戌晴飯了登舟髙伯定劉君任送出門張伯純劉邦逵送過赤岸景孟舅姜子用沈澤逺王智叟約送長河十一日癸亥晴飯時過長河九十里遣第六書發周徳歸午過崇徳蘇彭年來迓水縮舟膠牽挽寸進更初遇士頴弟于官窑十二日甲子晴飯時過永樂行二十七里至秀州仲舅入城回謁閘頭登舟風作李同年唐卿相見十三日乙丑晴四更行六十里過平望姚漕相訪仲舅破睡見之行四十五里過吴江又行四十五里至平江仲舅入城回謁船由城外至閶門叔舅别去一夕行九十里十四日丙寅晴早到無錫攜刺謁孫饒州父子中途聞其入城遂謁喻郎中樗以謝去春先辱魏子師子智訪及行九十里深夜去毘陵數里泊十五日丁夘晴生朝作湯餅遣人訪李表兄長卿已同王直甫候于門蘇彭年亦來皆延入船相見王江隂正已惠茶并公醖蘇李别于荆溪館直甫同行十里待書而别徐協恭過船棊戰三十六里過奔牛又十八里過吕城月明水深挽舟甚駛夜行五十四里過丹陽縣約五更矣十六日戊辰晴行二十七里小泊新豐又二十七里過丹徒鎮行三十六里午後到鎮江以水澀良乆方抵丹陽館沈抑强中立既迓于門又攜具館下協恭同集使人通問于王侍御十七日己巳晴上館盥櫛仲舅欲同謁王侍御而侍御已在門侍季舅同沈抑强去偽别侍御聞泊舟金山因約同遊窮覽勝處主僧寳印首座心鑑皆嘉州人侍御方赴夔州不謂得見于此以小詩道别又辱和篇入船别其家遂歸仲舅招副使早飯抑强復攜具來嚴墨卿同集二鼓方散十八日庚午晴四更起天微明即從使副到江干先登舟以待沈嚴二君相送晴和無風俄頃至瓜洲登岸未㡬風作胡撫幹仲文俞尉茂先陸㤗興況相迓俟行李上坐船即行薄暮至揚州城中水澀更餘方出城發第七書遞達親庭十九日辛未晴三鼓報送伴鍾尚書世明等回仲舅起相見前處州湯路分逢時為鍾引接送狼頭帽五指子各一副拂手香四貼為發親庭第八書又以小舟來過仲舅方與胡漕昉對語因與湯畧見于舟外少選鍾尚書徐知閤本中船到仲舅見之約四更方得行辰時到召伯埭去揚州纔四十五里以夜來留滯故爾張帆而行三十里過露筋三十里到髙郵仲舅入城回謁兩岸然草如晝三十里夜過塘頭二十日壬申晴三十里過界首二十五里過范水三十五里至寳應夜風雨行三十里過黄蒲二十里過平柯橋二十一日癸酉晴辰時到楚州仲舅入城回謁登熙臺應山陽藏宻晏判官喆一揖于舟次三十里過磨盤三十里夜過淮隂三十里過聞家峯二十二日甲戌晴三十里到洪澤前去歐家渡極淺欲為般剥計使副借潮于瀆頭神東北風作欲候酉潮而申初已應開閘張帆三十里過瀆頭使副上廟挂幡又過數里舟膠而止二十三日乙亥晴未明東北風大作潮亦先期而應談笑過歐家渡去瀆頭十五里一行人歡呼而行且感神貺之如響也行十五里至龜山以風大不可出淮擺泊山下見監鎮王九思曾同舍二十四日丙子晴早出淮三十里至盱眙泊燕館下龔守攜具宴使副約季舅去偽分冬發家書第九封附遞二十五日丁丑晴冬至早起乘馬陪使副天慶觀朝拜歸館望拜兩宫各展賀偕季舅去偽遊第一山玻瓈泉冰不可酌遍觀磨崖石刻見周司法深譙提轄熙載王幹辦茂龔守就館請使副早食軍衙晚食二十六日戊寅隂晴使副以下具衣冠習儀館中依例就皇華館犒三節人二十七日己卯晴盱眙客将李寳渡淮探問接伴使副已到泗州使副赴龔守晚㑹偕季舅去偽赴王幹辦之招二十八日庚辰晴掌儀引接等渡淮傳銜少頃同北引接禮信司髙琚等傳到接伴使副名銜正使昭武大将軍行尚書吏部郎中上輕車都尉彭城郡開國伯食邑七百户唐括安徳副使朝奉大夫侍御史騎都尉廣陵縣開國男食邑三百户賜紫金魚袋髙徳裕使副坐燕館須其至犒以三杯而去移舟淮亭使副燕亭上偕季舅去偽赴譙提轄㑹發第九書遣吕葵張吉歸二十九日辛巳天明雪作使副以下巳時渡淮至泗州草館望拜如儀各就幕次三節人互參使副使副互展起居状茶酒三行上馬入城天色開霽和氣翕然至館分位是日與季舅别十二月一日壬午晴車行六十里臨淮縣早頓縣境有徐城本徐國嬴姓有徐君墓季札挂劒之所又八十里宿青陽鎮驛臨淮尉奪客牛以駕車為客所訴鞭條子八十金法士夫無免捶撻者太守至撻同知又聞宰相亦不免惟以紫褥藉地少異庶僚耳二日癸未晴風車行八十里虹縣早頓城門不容車乘馬入驛市井多在城外驛之西有古寺大屋二層瓦以琉璃柱以石聞其上多米元章諸公遺刻三年前于寺中待使客飯後乘馬行八十里宿靈壁行數里汴水斷流人家獨處者皆燒拆去聞北人新法路傍居民盡令移就鄰保恐藏姦盜違者焚其居有一鹿起草間截馬前西去兩岸皆竒石近靈壁東岸尤多皆宣政花石綱所遺也虞姬墓在西岸荒草中横安二石板相去尺餘隆興間我得泗虹以此墓為界縣外山上有叢祠漢髙帝廟也淮北荒凉特甚靈壁兩岸人家皆瓦屋亦有小城始成縣道有粉壁云準南京都轉運帖理㑹買撲坊場遞鋪皆築小塢四角插皁旗遇賀正人使先排兩馬南去金法金牌走八騎銀牌三木牌二皆鋪馬也木牌最急日行七百里軍期則用之三日甲申晴車行六十里靜安鎮早頓又六十里宿宿州自離泗州循汴而行至此河益堙塞㡬與岸平車馬皆由其中亦有作屋其上州城新築雉堞甚整聞是五月下旬上畔指揮重修限四旬畢工費一出于民城中人物頗繁庶麫每斤二百一十粟穀每斗百二十粟米倍之陌以六十大寺數所皆承平時物酒樓二所甚偉其一跨街榜曰清平䕶以葦蓆市肆列觀無禁老者或以手加額而拜有倒卧腳引書鋪般販官局湯藥蔡五經家餅子風藥去州二里許二郎廟前有下馬亭即李顯忠斬李福李保之地驛舍鄰郡治顯忠駐軍于此破城之初毎兵止犒以三鐶士卒憤惋及逃歸創殘之士不能自力悉碎于敵手為數坑埋之中庭有井自投者尤多負郭縣曰符離項羽破漢軍于靈壁東睢水為之不流即此縣界四日乙酉隂晴風作車行四十五里蘄澤鎮早頓又四十五里宿栁子鎮晚小雪即止五日丙戌霜寒頗力行人鬚髮皆冰六十里永城縣早頓驛中猶有燈縣本芒敬丘二縣地有芒山與碭山相接漢髙帝隠于此漢更敬丘為太丘陳寔嘗為長故城在今縣西北又七十里宿㑹亭鎮六日丁亥霜晴車行四十五里沙山岡换驢三十五里穀熟縣早頓縣即商之南亳湯所都也縣外有虹橋跨汴甚雄政和中造今兩傍築小土牆且敝損不可行絶河以入又二十二里至金果園果木甚多馬行十八里入南京城市井益繁觀者多閉户以窺夾道甲騎百餘城外及驛前皆步兵大樓曰睢陽製作雄古傾圮已甚驛曰睢陽穀熟甲卒自言西人月請五百短錢聞本朝養兵之豐歎感不已南京城樓側有亭名解愠承應人有自言姓趙者不欲窮問之云城中猶有徐太宰路樞宻鄭宣徽等大宅多為官中所占亦有子孫居者按此地即髙辛氏子閼伯所居商丘也武王封㣲子啟是為宋國後唐以為歸徳軍節度本朝以王業所基景徳四年升應天府祥符七年升南京金改曰歸徳府漢梁孝王所都兔園平臺雁鶩池蓼堤皆在此春秋隕石五猶存七日戊子晴車行六十里寧陵縣早頓古葛伯國湯所征也魏信陵君無忌封于此又六十里宿拱州本襄邑縣屬開封崇寧四年建名輔州以為東輔又改拱州治襄邑本宋承匡襄陵鄉也襄公所𦵏故曰襄陵金曰濉州八日己丑晴車行六十里雍丘縣早頓縣故杞國武王封禹後東樓公故至今土人猶曰杞縣祖逖鎮此以禦石勒圉城鎮在東南本漢圉縣屬睢陽國王莽擊翟義為京觀于此漢外黄縣故城在東又有葵丘齊桓公所㑹也承應人杜從自言邑手分邑有令簿尉酒稅都監同監共五員二稅輸粟及米亦納絹但薄而小此間只是舊時風範但改變衣装耳又行二十里過空桑伊尹所生之地也又里餘過伊尹墓惟一大枯木在側㫁碑卧其下曰湯相伊尹之墓又數里過三塜駕車人自言姓趙云向來不許人看南使近年方得縱觀我鄉里人善見南家有人被擄過來都為藏了有被軍子搜得必致破家然所甘心也宿陳留縣去雍丘六十里驛中有蒼柏可愛縣本鄭邑為陳所并故名九日庚寅晴車行四十五里道傍多陂塘路頗迂回古塚相望發掘無遺至東御園小亭少憩使副以下具衣冠上馬入東京城改曰南京新宋門舊曰朝陽今曰𢎞仁城樓雄偉樓櫓壕塹壮且整夾壕植栁如引繩然先入甕城上設敵樓次一甕城有樓三間次方入大城下列三門冠以大樓由南門以入内城相去尚逺城外人物極稀疎有粉壁曰信陵坊盖無忌之遺跡城裏亦凋殘街南有聖倉屋甚多望見婆臺寺塔云城破之所街比望見景徳開寳寺二塔并七寳閣寺上清儲祥宫頽毁已甚金榜猶在皮場廟甚飾雖在深處有望柱在路側各挂一牌左曰皮場儀門右曰靈應之觀又有欒将軍廟頽垣滿目皆大家遺址入舊宋門舊曰麗景今曰賔曜亦列三門由北門入尤壮麗華好門外有廟曰靈護兩門裏之左右皆有闕亭門之南即汴河也故街南無巷街北即甜水巷過鄭太宰宅西南角有小樓都人列觀間有耆婆服飾甚異戴白之老多歎息掩泣或指副使曰此必宣和中官員也相國寺如故每月亦以三八日開寺兩塔相對相輪上銅珠尖左暗右明横過大内前逆亮時大内以遺火殆盡新造一如舊製而基址并州橋稍移向東大約宣徳樓下有五門兩傍朶樓尤竒御廊不知㡬間二樓特起其中浮屋買賣者甚衆過西御廊數十步過交鈔所入都亭驛五代上元驛基本朝以待遼使猶是故屋但西偏已廢為瓦子矣十日辛夘隂晴歇泊承應人有及見承平者多能言舊事後生者亦云見父母備說有言其父囑之曰我已矣汝輩當見快活時豈知擔閣三四十年猶未得見多是市中提瓶人言倡優尚有五百餘亦有旦望接送禮數又言舊日衣冠之家陷于此者皆毁抹舊告為北兵驅役號閒糧官不復有俸仰其子弟就末作以自給有舊親事官自言月得粟二斗錢二貫短陌日供重役不堪其勞語及舊事泫然不能已留守來謁接伴使副使副連一榻南向坐㕔上留守設胡牀侍其左過盞勸酒翼而退接伴所得私覿物盡貨于此物有定價責付行人盡取見錢分附衆車以北嵗嵗如此又金人浚民膏血以實巢穴府庫多在上京諸處故河南之民貧甚錢亦益少塗中曾遇蒲簍數杠導之以旗殿以二騎或云其中皆交子也都管愠其主人貪墨以穢語詆之又有萬福包待制之語承應人各與少香茶紅果子或跪或喏跪者北禮喏者猶是中原禮數語音亦有㣲帶燕音者尤使人傷歎十一日壬辰晴賜宴既傳銜使副率三節人具衣冠出接伴位前對揖而出就褥位與接伴天使對立三節人立使副後先引使副東北向開敕兩拜天使烏庫哩璋傳口宣云卿等逺持使節來㑹嵗元適冒寒威宜加宴勞今遣具位璋賜卿等宴仍差南京留守耶律成押宴并賜教坊樂使副舞蹈五拜又開敕兩拜再傳口宣云卿等來朝嵗旦逺抗使旌爰增原隰之華宜有甘芳之錫今差璋賜卿等酒果使副搢笏跪左厀义手受賜五拜舞蹈如儀還立褥位對展次揖接伴退就幕次與璋茶酒三行再立褥位引接石旦側跪捧表正使拜跪受表卻以授璋仍送土物與之璋退即引押宴出與接伴拜舞謝恩押宴先升㕔側立使副拜舞訖與接伴對行升㕔與押宴對展訖就座㸃湯端笏離位少立三節人東北向再拜呼噪升㕔占位東向南上小立俟使副初盞罷三節方坐初盞燥子粉次肉油餅次腰子羮次茶食以大柈貯四十楪比平日又加工巧别下松子糖粥糕糜裏蒸蠟黄批羊餅子之類不能悉計次大茶飯先下大棗豉二大餅肉山又下㸇魚醎豉等五楪繼即數十品源源而來仍以供頓之物雜之兩下飯與肚羮三下子五下魚不曉其意盖其俗盛禮也次餅餤三次小雜椀次羊頭次煿肉次剗子次羊頭假鼈次雙下灌漿饅頭次粟米水飯大簇飣凡十三行樂次筝笙方響三次升㕔餘皆作樂以送亦有雜劇逐次皆有束帛銀椀為犒使副以下皆離立以待謝恩或云所賜初不及皆文具耳第十二行依例勸上中節酒罷三節先就班使副進第十三行茶罷與押宴接伴謝宴拜表庭下如儀再送璋土物與璋成互展辭状即與接伴對揖歸位送押宴私覿往回自此每賜宴禮數準此食味樂次大同小異十二日癸巳晴五更出驛穿御街循東御廊過宣徳樓側東角樓下潘樓街頭東過左掖門出馬行街頭北過東華門出舊封丘門金改曰𤣥武新封丘門舊曰安逺金改曰順常河中有亂石萬嵗山所棄也北郊方壇在路西青城在路東面南中開三門左右開掖門西開一門以通壇皆荒墟也北門内外人煙比南門稍盛車行四十五里飯封丘又四十五里宿胙城縣途中遇老父云女壻戍邊十年不歸苦于乆役今又送衣装與之或云新制大定十年為始凡物力五十貫者招一軍不及五十貫者率數户共之下至一二千者亦不免毎一軍費八十緡納錢于官以供此費東京有千户二十一人各有三四百人共有八千兵耳有張千户者向來率其人戰符離一敗止存數十人至此除籍為民又言簽軍遇王師皆不甚盡力徃往一戰而散迫于嚴誅耳若一一與之盡力非南人所能敵符離之戰東京無備先聲已自摇動指日以望南兵之來何為遽去中原思漢之心雖甚切然河南之地極目荒蕪蕩然無可守之地得之亦難于堅凝也胙城之南有南湖去嵗五月河決所損甚多河水今與南湖通衝㫁古路用柴木横疊其上積草土以行車馬按東京春秋衛陳鄭三國之境戰國屬魏東魏立梁州後周改汴州興元為宣武軍節度使後梁以州建國升為東京開封府後唐復為汴州晉漢周本朝因梁舊汴河古萇蕩渠首受黄河水隋煬帝開浚兼引汴水開封縣有浚溝即衛詩浚都也有沙海戰國䇿顔率言大梁君臣欲得九鼎謀于沙海之上蓼堤自睢陽至此三百里吹臺今曰繁臺本師曠作孝王增築祥符縣有夷門山夷門大梁城之東門侯嬴抱闗于此蔡河古琵琶溝也寒泉阪詩所謂爰有寒泉在浚之下中牟縣趙襄子時佛肸以叛有中牟臺是為官渡城曹袁相持之所陽武縣有博浪沙張良擊始皇于此河決金堤亦此地長垣縣衛之匡邑孔子畏于匡古之蒲邑子路為之宰鄢陵縣克段之地也封丘縣古封父國左傳所謂周以封父之繁弱賜魯縣有黄池吴王夫差所㑹胙城屬滑州故南燕國周公諸子所封左傳富辰曰凡蒋邢茅胙祭周公之𦙍也十三日甲午晴五更車行四十五里到黄河因河決打損口岸去年人使迂行數十里方得上渡今嵗措置只就淺水冰上積柴草為路里餘車馬行其上策策有冰泮聲遇深險處即有人跣立道傍指示使驅車疾行河心有沙墠甚闊盖河決時所淤積者一行人兵車馬盡于此登舟渡舟底平無篷屋于船頭品字用抄兩傍又以大枋為槳併力喝號使副以下露坐其中分數舟以渡風静不寒上卞冰合僅二寸許惟通舟處見水面數丈此李固渡本非通途浮橋相去尚數里馬行三里許飯武城鎮一名沙店車行四十五里宿滑州途中有土山夾道塵埃最甚咫尺不可辨俗號小灰洞盖前路有甚于此者路西有白龍潭傍有大碑盖亦是昔年河決所瀦也滑即古豕韋氏之國春秋戰國屬衛負郭白馬縣本衛國曹邑狄滅衛立戴公以廬于曹袁紹遣顔良于白馬闗羽斬良以報曹公酈生所謂守白馬之津皆此也有滑臺本鄭之廩延十四日乙未晴五更車行二十五里至濬州城外乘馬入城早頓東廊有大碑曰天成橋太師魯國公蔡京奉聖㫖書濬依山為州子城據山上故州在今郡城之北紹興初河失故道蕩為陂澤遺堞猶有存者舊河卻為通途東有黎陽山因以名縣聞上有大佛與館相直橋之兩岸也馬行三十里過屯子河河出太行泝流而上可至燕山故金人又名清御河築三橋以濟行者望范公善化二山是日供黄河鱖魚甚鮮而肥始作家饌道遇細車自北來先牌云蔡州都巡檢使宅眷與接伴使有連各下車相見一嫗一婦與正使皆屈膝拱手摇肘為禮然後立談良乆而去復車行四十五里過伏道望扁鵲墓墓前多生艾功倍于他艾經伏道河伏道店入湯隂縣縣有重城自此州縣有城壁市井繁盛大勝河南縣屬相州本二漢蕩隂縣羑里城在東南十五日丙申晴四更車行三十六里至相州城外安陽驛早頓馬入城人煙尤盛二酒樓曰康樂樓曰月白風清又二大樓夾街西無名東起三層秦樓也望傍巷中又有琴樓亦雄偉觀者如堵大街直北出朝京門牌曰通逺門皆甕城相即河亶甲所居魏文帝後趙石季龍前燕慕容雋北齊皆都焉東南二十五里朝歌城紂所都也中出莤草冣多故相纈名天下俗傳漂杵餘血所化也門外過安陽河至更衣亭有脊記大金正隆三年八月二十九日光禄大夫彰徳軍節度使開國公鄭建元移建雖規模甚草草然所創見也至此從便馬行每十里置一馬鋪及所過豐樂鎮居民頗多皆築小塢以自衛各有城樓西望太行頗為風埃所蔽土地平曠膏沃桑棗相望至漳河水縮沙出中多石子俗傳可以煖腹南向循河行三四里于陿處作柴橋以渡層冰峨峨中有水甚駛載冰凘以東聞水盛時至與髙岸平闊可數里土人號小黄河北行沙中又數里復渡一小橋即漳支流也回望鄴鎮有塔古都皆在其地聞魏銅雀臺故基猶在昔為縣金以為鎮矣經講武城猶有壁壘氣象雄壮有将臺甚髙城外髙丘相望號七十二塚世傳曹公之𦵏以此惑後人使不至發掘或云其家數世所𦵏有廟屋甚雄即曹公祠也塚間又有螭首碑聞是晉碑六十里過滏河上有觀魚亭頗新壮少西百餘步入磁州城門與州治相近篆牌字甚穏大定五年所立過惠政門入禮賓坊又有東溪在驛之東聞其中是郡庠有士人十餘人夜宿滏陽驛之東北望見崔府君廟靈星門并廟棟使副以下焚香遥謁是日相州承應人状貌甚偉衣冠亦楚楚呼問之云姓馬有校尉名目以少二百千使用一坐二十年不調非錢不行也既無差遣多只監本州酒稅務又言並無俸禄只以所收課額之餘以自給雖至多不問若有虧欠至鬻妻子以償亦不恤且歎曰若以宋朝法度未說别事且得俸禄養家又得寸進以自别吏民今此間與奴𨽻一等官雖甚髙未免箠楚成甚活路又本州以相纈百疋分獻接伴十六日丁酉晴自南京來飲食日勝河北尤佳可以知其民物之盛否自是不必家饌矣車行七十里邯鄲縣早頓有城及樓甚壮皆舊物也未至三里許有舊城戰國趙都漳水相去三十里許漢髙祖征陳豨至此曰豨不南據邯鄲而阻漳水吾知無能為也趙王叢臺在縣之北上有亭榭馬行四十里宿臨洺鎮洺河出其下隸洺州永年縣館舍極寛潔前有大㕔傍列三節位次㕔後主廊方分使副位㕔有脊記鎮國大将軍充洺州防禦使護軍開國侯食邑一千户食實封一百户吾古論薩哈重建吾古論意即烏庫哩因語訛耳薩哈曾以兵部侍郎來泗州理會俘擄人又聞彼中有三等官漢官契丹女直三者雜居省部文移官司牓示各用其字吏人及教學者亦以此為别道傍數處賣酒皆掘地深闊可三四尺累塊上風以禦寒一瓶貯酒苕菷為望石炭數塊以備煖盪河朔之樸如此道中有一㬠尸棚其俗行有死者不埋立四木髙丈餘為棚其上以荆棘覆其户以防鴟梟狗鼠之害立一牌以記其名姓年月有人識認則從便𦵏埋否則任之十七日戊戌晴車行三十五里過沙河縣屬邢州縣有重城換驢行二十五里至邢州今榜曰安國軍甕城三重入門直對州衙東入邢臺驛早頓過七教坊椽木巷立節坊成義坊熙暉樓市肆牌額多寫般作有大塔十三層寺宇亦雄壮北門外陂塘冰厚尺餘臠疊岸上如柱礎然青瑩如菜石三里至栁溪唐栁公權遺跡亭榭數所引溪水載之髙岸流觴曲水為邢臺遊觀之地東北有邢山出邢沙碾玉所用也過沙河數處春夏間皆不可徒涉四十五里宿内丘縣沙河縣漢襄國縣地邢即春秋邢國衛滅之戰國屬趙漢常山王張耳後趙石勒皆都焉勒陷冀州張賓曰襄國因山慿險形勝之地可都也内丘亦屬邢有干言山詩所謂出宿于干飲餞于言者十八日己亥晴車行六十里柏鄉縣早頓舊日堯山即柏人也漢髙祖心動不宿之地六十里宿趙州道中過漢光武廟有塑像坐而侍者四人云是宰相不著姓氏壁間畫二十八将廟屋止一間廊廡故基甚廣碑石露立者凡四一開元十九年本郡進士李雲撰范陽盧規書一開元廿二年立皆對偶文也餘皆本朝所立有二石人皆腰斬道傍俗云光武欲北渡滹沱有二人捧漿以進行數里恐追襲者得其踪復還斬之或云夜遇二人問途不應怒而斬之已乃石也行十里由王郎城縱廣約數里去趙州五里使副以下觀石橋橋有石欄髙二尺餘上分三道下為洞橋兩馬頭又各為二洞傍為小亭板閣以入石理堅緻題刻甚衆多是昔時奉使者有云連鵬舉使大金至絶域實居首選宣和六年八月亦有天㑹中回謝大齊使人留題不能盡讀橋上片石有張果老驢迹四遇一夫自言舉人問所業云通三史試詞賦論䇿然褐衣與皁𨽻無别上馬入城外驛負郭曰平棘縣今改曰沃州春秋屬晉戰國屬趙後魏曰殷北齊曰趙隋曰欒為慶源軍節度使臨城縣有泜水韓信斬成安君于此是日聞接伴使之兄左丞安禮罷為滄州刺史初安禮娶金主之妹妹死欲妻以女辭以不當復娶妻姪强之不可金主怒以抗敕坐之道逢重車三載鐵餘載板木欲修河橋十九日庚子晴風車行三十里欒城縣早頓晉大夫欒氏之邑又七十里宿真定府城外館館分東西道中見掃帚桑特起林中數尺枝條叢細宛如帚状稍指東南或謂此方有居民受其䕃者過滹沱河由土橋以行河側有開凌村以光武渡河未畢數車而冰陷俗傳河冰隨車而拆故以名自河以北每五里許必有小舍或在古塚上每夜輪保甲十人宿其中以伺察行者真定在春秋時屬鮮虞國為晉所滅戰國屬趙漢為恒山郡文帝改常山本中山國之東垣陳豨将趙利守此髙帝攻拔之改曰真定元和改鎮州五代改曰真定府唐叛将李寳臣王武俊王廷湊等皆據此二十日辛丑晴歇泊住驛二十一日壬寅晴賜宴東館口宣云來持使節逺冒寒威宜頒在鎬之恩以示禮賔之意又云逺涉道途衝冒霜雪爰嘉勞勩宜錫芳甘禮悉如汴京但第三第四行及飯遍使樂人舞旋大茶飯中有沙糖熊白使副下食人趨進尤肅押宴下人李泉爭執禮數語具語録泉撻條子六十其徒三人各三十每一下必令毒打十下易一人不惟三節人快之雖都管監門吏卒皆怒其生事無不稱快俗雖好勝要可以禮屈也安徳為開州刺史以治行聞道中頗讀荘子故臨事間有可觀然貪㳫狠愎不知何以有政聲益知北方守令難得循良者二十二日癸卯晴四更車行七十里飯新樂縣尤度庶古鮮虞國也又四十五里宿中山府靖康之禍真定中山皆固守不下中山城外猶有敗城圍之金所築也此地堯所始封戰國初為中山國魏文侯使樂羊伐取之以封太子擊後燕慕容垂移都後魏為安州唐改定州城門曰昭化甕城三里甚壮城濠有流水過信利鮮虞髙陽三坊坊各有小樓又有明月樓道傍多重車有先牌云輔國新授西京同知留守子城門亦雄偉曰中山門兩傍亦有挾樓入門東行百餘步入驛子城西門曰夕陽樓即望長安詞所作之地北去又有仁教化原二坊負郭安喜縣令姓夾谷酒名曰九醖曰瓊酥二十三日甲辰晴天氣清寒方思近火四更車行五十里望都縣早飯縣有城樓又七十里宿保州城壕甕城皆三里城約厚十餘丈門曰雞川負郭為保塞縣驛曰金臺燕昭王遺迹也驛西城上有亭曰富覽御荘聞在西上四十里過鴻福院三門有樓崇積倉道西有小門榜曰教女直學州樓曰順天軍驛在州治西南驛分東西供張如法屋宇寛潔初至望都聞國主近打圍曾至此自後人家粉壁多標寫禁約不得採捕野物舊傳為禁殺下令至此乃知燕京五百里内皆是御圍場故不容民間採捕耳皇朝初置保塞軍後升為州政和三年為清苑郡望都堯母慶都所居堯山在北慶都山在南登堯山見慶都山故名望都二十四日乙巳晴五更車行四十五里至安肅軍南城外上馬由城中又入北城驛早食軍本遂城縣屬易州皇朝置静戎軍後改焉二城甚固南城南門三重北門一重為安肅縣治有雄威營二所北城兩門各二重二城之間有濠塹水櫃積冰甚多方取以入窖又有祥光塔福善寺食罷又乘馬出北門過一大廟或云北嶽行宫車行二十五里過白溝河又五里宿固城鎮人物衣装又非河北比男子多露頭婦人多耆婆把車人云只過白溝都是北人人便别也二十五日丙午晴五更車行三十里定興縣早食縣本黄村近以為邑今嵗九月方築城四旬畢工雉堞甚整獨門樓未起驛舍亦創造始待使客于此又六十里至涿州漢髙帝立涿郡魏文帝更名范陽新城縣有督亢陂溉田號為膏腴即太子丹所獻督亢地圖也入宣清門過釋迦普賢堂商稅務范陽縣樓入子城城無門上有清風樓兩傍土累為髙臺左曰迎月樓右曰棲霞樓州治在道西門廡陋甚館驛尤湫隘天使髙徳亨傳宣撫問虞友益賜銀合湯藥銀合二十五兩藥十貼皆客路所資以紅綾為貼有曰每服一榛子大如南方之比梧子也録其語如後敕某卿㑹朝嵗旦䝉犯寒威眷惟将命之恭有加勞勩宜錫衛生之物迎致沖和今差入内内侍御直郎虞友益賜卿湯藥一銀合往堂祗受故兹詔諭想宜知悉冬寒卿比平好否遣書指不多及二十五日敕某複名不書姓副使書姓名二十六日丁未晴五更車行六十里良鄉縣早食因宿道中以瑠璃河或云劉李河堤岸為水所壊又迂行二十里方抵縣縣有城門二重衙在道左驛在北門牆下有大防山二十七日戊申晴風大作抵暮不止四更初車行六十里過盧溝河至燕山城外去燕賓館百餘步使副上馬三節具衣冠隨入館中亭子館伴傳銜正使起復正議大夫都水監上輕車都尉安定郡開國伯食邑七百户賜紫金魚袋梁肅副使廣威将軍尚書工部郎中上騎都尉廣平郡開國子食邑五百户圖克坦子澄坦圖克舊作徒單今改肅兼押宴白琮賜宴李顯金賜酒果酒九行罷入城道傍無居民城濠外土岸髙厚夾道植栁甚整行約五里經端禮門外方至南門過城壕上大石橋入第一樓七間無名傍有二亭兩傍青粉髙屏牆甚長相對開六門以通出入或言其中細軍所屯也次入豐宜門門樓九間尤偉麗分三門由東門以入又過龍津橋二橋皆以石欄分為三道中道限以護穽國主所行也龍津雄壮特甚中道及扶欄四行華表柱皆以燕石為之其色正白而鐫鏤精巧如圖畫然橋下一水清深東流橋北二小亭東亭有橋名碑次入宣陽門樓九間分三門由西門入會同館館在内廊之西南向入館門使副與館伴立馬下節人從互聲兩喏傳示訖分位張鉉撫問琮口宣云逺持使節已次近郊宜示宴慈以彰眷遇顯金云逺乘軺傳已次國門宜有寵頒以休勞勩鉉云㑹朝嵗旦弭節宴亭爰念勤勞宜加省問二十八日己酉晴風止賜酒果口宣云已休侯館将造明庭方修進止之儀宜有甘芳之錫閤門副使左光慶到館說朝見儀二十九日庚戌晴天明行司捧國書上馬前行使副上馬與館伴並行入見館之西有門門外皆民居宣陽門内街分三道中有朱欄二行跨大溝為限欄外植栁髙麗人西夏人二館在東與㑹同館相對立馬門外俟使副一行既過方相繼而行長廊東西曲尺各二百五十間廊頭各有三層樓亭䕶以緑欄杆廊有三路貫其中南路兩門外皆民居中路無門而路甚闊左為太廟右為三省北路左門外有屏牆夾道中有官府南向右門入六部蓋在三省之後也正門十一間下列五門號應天門左右有行樓折而南朶樓曲尺各三層四垂朶樓城下有檢鼓院又有左右掖門在東西城之中兩角又朶樓曲尺三層初出館横過馳道皆卻盖三節人至東廊北頭下馬使副至左掖門皆步而入左掖門後為敷徳門其東廊之外樓觀翬飛聞是東苑西廊有門即大安殿門外左翔龍門之後敷徳後為集英門兩門左右各又有門集英之右曰㑹通其東偏為東宫西有長廊中起髙樓即大安殿前廣祐樓也㑹通門内之西廊即大安之東榮為麗夏茶酒幕次其後為承明門北向相對為昭慶門東為集禧門西即左嘉㑹門之後相對有右嘉㑹門其中即大安殿後宣明門之前待班幕次在其西敷徳之西門及㑹通承明左嘉㑹皆所由之路也入宣明門及仁政殿左門在隔門外當中立俟百官裏見退即左入殿下大氈上上有一品至七品牌子盖是其朝著也氈中有大花鳯使立鳯花之中副在其右大殿九楹前有露臺金主坐榻上儀衛整肅殆如塑像殿兩傍廊二間髙門三間又廊二間通一行二十五間殿柱皆衣文繡兩廊各三十間中有鐘鼓樓垂紅縁金漆簾簷頭皆挂繡額亭下有撮椒井亭二宣明門三仁政殿側門二皆列㦸殿門外衛士二百人分列兩階皆戴金花帽錦袍宣明門以外直至外廊下除麗夏幕次前皆甲士青絛甲居左執黄龍旗紅絛甲居右執紅龍旗外廊下皆銀鎗自左掖門以入皆金鎗執鎗者具装門以執弓矢者一被七分甲人依一柱以立每數人必以一女真衣皁緊絲衫者部之凡門屋下皆素隊挾弓矢大門四十人小門二十人惟仁政左門用甲士皆自未明分立訖見退無有移動者是日髙麗西夏使人同見髙麗使三綱衣冠如本朝一為賀正一謝遣使一謝賜羊酒上節幞頭犀偏帶中節折上巾犀束帶下節獻頂巾犀束帶皆紫衫西夏使二綱一賀正一謝遣使皆以正子為正使戴金冠製作甚工朱袍蹀躞状貌甚偉副使衣冠如髙麗人三節皆不入見椎髻被髮小巾尖帽皆夷服也西夏人進禮物十二牀馬二十匹海東青七細狗五亦旅于庭馬嘶狗吠頗亂朝儀隔門在殿門後簷下上以木雕為銅瓦小栱甚巧麗隨門五間每間朱門四扇金釘粲然入見如儀受衣帶而退就館賜茶酒左宣徽使敬嗣暉押伴賜宴之禮押宴與正使對坐接伴使副坐押宴下副使對二者之中惟茶酒則小異本是殿上置酒多就館安排必以兩府為押伴押伴廟坐使副接伴對坐兩傍立班及對揖位次必差向前嗣暉雍容荘重而善應接嘗使于我盡記朝儀以歸國中典章禮文多出其手舊為宣徽力諫亮南牧削籍為民新主立復用之三十日辛亥晴賜宴館中完顔宗嗣賜宴烏庫哩璋賜酒果完顔彦押宴宴罷館伴送葡萄酒攻媿集卷一百十一欽定四庫全書}
