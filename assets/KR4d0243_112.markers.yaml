  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書集部四攻媿集别集類三宋提要臣等謹案攻媿集一百一十二巻宋樓鑰撰鑰有范文正年譜已著録其集載於諸家書目者或作百巻或作八十五巻而世所傳鈔本有僅存四十二巻者葢流傳既乆多所佚脱此本原作一百二十卷與宋史藝文志及陳振孫書録解題所載相同猶為舊帙惟中缺第七十七巻據原目為宣王内修政事光武大度同髙祖二賦玉巵為夀宅道炳星緯二詩用人安民治兵三䇿又缺第七十八巻據原目為御試進士舉人台試館職閣職省試别試解試上舍州學諸試所擬䇿問十五篇又缺第七十九巻據原目為宴㑹慶賀致語十五篇上梁文四篇勸農文二篇其第七十三卷據原目缺跋王伯奮所藏文苑英華跋清閟居士臨修禊序二篇第七十四卷據原目缺跋劉元城江諫議任諫議鄒道鄉陳了齋五諫帖一篇而第五十六巻中揚州平山堂記亦缺其後半諸家所藏刻本鈔本並同今俱無從校補至第四十八巻第八十巻第八十一巻第八十二巻有青詞朱表齋文疏文之類凡一百六十七篇均非文章之正軌謹稟承聖訓槩從刪削重編為一百一十二巻用聚珍版摹印以廣其傳鑰居官持正有守而學問賅博文章淹雅尤多為世所傳述本傳稱其代言坦明得制誥體葉紹翁四朝聞見録載鑰草光宗内禪制詞有雖喪紀自行於宫中而禮文難示于天下二語為海内所稱此言其工於内外制也本傳又稱鑰試南宫以犯諱請㫖冠末等投贄諸公胡銓稱為翰林才今集中謝省闈主文啓一首即是時所作此言其工于啟劄也王應麟困學紀聞取其門前莫約頻來客坐上同觀未見書二句載入評詩類中此言其工於聲偶也而袁桷延祐四明志稱其于中原師友傳授悉窮淵奥經訓小學精据可傳信尤能盡鑰之實葢宋自南渡而後士大夫多求勝于空言而不甚究心於實學鑰獨綜貫今古折衷攷校凡所論辨悉能洞澈源流可謂有本之文不同浮議王士禎居易録稱其行盡松杉三十里看來樓閣幾由旬一百五日麥秋泠二十四番花信風水真緑净不可唾魚若空行無所依諸句而病是集多叢冗謂表狀内外制之類刪去半部亦可然貪多務博即誠齋劍南平園諸集亦然葢一時之風氣不必以是為鑰病也至於題跋諸篇尤多原原本本證據分明不止於居易録所稱三笑圗賛吳彩鸞玉篇鈔唐昭宗賜憘實勅書三篇毛晉輯津逮秘書摘録宋人題跋共為一集而獨不及鑰其偶未見此書歟乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀攻媿集原序鄮山參政樓公攻媿先生文集一百二十卷建安眞徳秀伏讀而嘆曰嗚呼此可以觀公立朝事君之大節矣葢公之文如三辰五星森立天漢昭昭乎可觀而不可窮如泰華喬嶽蓄泄雲雨巖巖乎莫測其巔際如九江百川波瀾蕩潏淵淵乎不見其涯涘人徒覩英華發外之盛而不知其本有在也慶元初韓侂胄除知閤門事忠肅彭公力諫改侂胄内祠彭公予郡公在瑣闥極論之云去者不復侍左右留者召見無時終不能逺時侂胄之惡未著也既而竊弄國柄以黨論盡錮天下賢士挑敵棄盟中外騷然天下始服公先見朱文公侍經筵内批予祠公持其命不下曰當今人望儒宗無出熹之右者奏雖寢然當邪説充塞之時首倡學者共尊朱公後卒賴其言而學禁遂開道統有續然則觀公平生大節而後可以讀公之文矣公生于故家接中朝文雅博極羣書識古文竒字文偹衆體非如他人窘狹僻澀以一長名家而又發之以忠孝本之以仁義其大典册大議論則世道之消長學術之廢興善類之離合繋焉方淳熈間鴻碩滿朝毎以奏篇出其援據該洽義理條達者學士大夫讀之必曰樓公之文也一詔令下其詞氣雄渾筆力雅健者亦必曰樓公之文也嗚呼所謂有本者如是非耶公既齾侂胄之鋒退居卻掃者十有四年嘉定初起為内相俄輔大政向來儔輩凋喪略盡而公巋然獨存遂為一代文宗徳秀嘗竊論南渡以來詞人固多其力量氣魄可與全盛時先賢並驅惟鉅野李公漢老龍溪汪公彦章及公三人而已念昔校藝南宮自事東府或清言竟日或極論達旦徳秀退而書紳終身誦之其所以猶爲當世善人君子所與而不遂為塗人之歸者公之教也公季子治以集序見命徳秀何敢辭建安眞徳秀謹序欽定四庫全書攻媿集卷一宋樓鑰撰古體詩攻媿齋余以攻媿名齋俞致翁惠書謂若無媿可攻者讀之悚然不敢當以謝之聖賢不得見道散固已久學者多自賢鮮肯事師友顚㝠聲利中悔吝皆自取動言無媿怍未知果然否寡過云未能先聖欣善誘凛凛孟氏言幾希異禽獸參乎病知免遂使啟足手寧知起易簀又在此叚後吾儕況小人氣質素凡陋以其所以養孝道亦何有勉前類水馬立處祇如舊倘復不自立其末當愈謬毎思攻所媿扁牓銘座右三誦故人書慙汗幾欲溜夫豈爲戲言知君于我厚因之更加警補過尚无咎謝湖山居士示和陶詩吳給事芾淵明千載人風節仰孤峭豈惟辭督郵蓮社不得召書不求甚解眼髙得𤣥要詩亦本無意但寫胸中妙齊梁紛衆作嘈雜春禽叫稚子候簷隙文通劇捜紹矯矯玉局翁尚友謝浮漂飽喫惠州飯追和欲同調湖山老居士宏才蓋廊廟出入官五紀懐歸自年少屢賡歸來辭吾行有先兆老龍卧林壑年髙徳彌劭向來批勅手甘心事耕釣築室據仙居泉石造深奥亭榭望堂皇蓬萊對圓嶠渉園日成趣遇客酒頻釂巖巖鸞鶴姿炯炯雙眸瞭墮體黜聰明坐忘樂遺照西疇時告春東臯快舒嘯襟期古暗合此事不容詔盡和靖節詩筆走追風驃又如斐旻劍騰空徑投鞘人生嗜欲深山林不供燒何當從公游翛然寧荷蓧小子敢言詩未免事華彯西施難效顰邯鄲恐貽笑思欲焚舊藁世味輕咀嚼稍尋韋蘇州旁引孟貞曜絶去翰墨畦母鑿渾沌竅尚或庶幾焉未暇期速肖送袁和叔尉江陰澄江少日曽經行髙城傍有長江横君山特立江之汀下瞰淮甸一堂平中港引潮深無聲萬頃灌注滋農耕戰國今幾二千齡黄歇此地猶垂名舊以邑屬南蘭陵疲于奔命吏失寧今焉裂地為專城獨當一面行雙旌井市雖小民厚生四十萬緡輸賦征舶商輻凑衆貨贏牒訴簡省官曹清一邑負郭相依憑守宰同僚齊弟兄脈絡貫通易盡情尉職無卑近編氓坐閲是否真權衡傍郡孔道困將迎我乃静趣如郊坰安輿並行人子榮況有海錯供庖烹河肫鰣􅚝鮮不鯹車螯蛤蟹均藜羮夫君傳家有典刑父子知己人一經詩書滿門不慙卿豈羨漢士黄金籯薦口久已徹帝京九萬自此開鵬程平生寒牕照短檠興亡千古無遁形妙年射䇿當彤庭歸領後生為主盟友朋講習誠專精世故多端須飽更京口直下連滄溟官府濶稀行旅驚邉頭久無夕烽青要在彈壓潢池兵簿書期㑹勤經營人物酬應審重輕一言行之可終身謹毋失己毋失人贈人以言豈吾能頗嘗于此三折肱舉以送君君試聼登育王山望海亭瘦藤拄破山頭雲山溪盡處開危亭平田萬頃際大海海無所際空冥冥乾端坤倪悉呈露飛帆去鳥無遺形蓬萊去人似不逺指㸃水上三山青褰裳濡足恐未免倘有飈馭吾當乗是中始覺宇宙大眼力雖窮了無礙雲夢八九不足吞回視塵寰一何隘曽聞芥子納須彌漫説草菴舍法界看我振衣千仞岡笑把毫端捲烟海林景思雪巢四時不皆雪陸居本非巢髙人興寄逺表此一把茅吾非二祖可夜立寒齊腰吾非鳥巢師結廬置樹梢白日照我心不以見晛消兩腳踏實地風雨無漂揺作詩窮益工寒瘦逼島郊落筆句驚人不復尋推敲客至不問誰淡若君子交直氣干霄上不視鄙斗筲富貴頃刻花疇能等幻泡附離如幕燕自謂漆與膠先生閲世熟兀坐山城坳春陽㑹有時豈曰終繫匏錫山寄雄文凛然䜿髪毛我非敢言詩為君聊解嘲題龍眠畫騎射抱毬戲緑楊幾枝插平沙柔梢裊裊隨風斜紅綃去地不及尺錦袍壯士斫鬃射横磨箭鋒滿分靶一箭正截紅綃下前騎長纓抱繡毬後騎射中如星流繡毬飛䃂最難射十中三四稱為優元豐䇿士集英殿金門應奉人方倦日長因過衛士班飛騎如雲人馬健駕幸寳津知有日窮景馳驅欣縱觀龍眠胸中空萬馬駭目洞心千百變追圖大槩寫當時至今想象如親見静中似有叱咤聲墨淡猶疑錦繡眩閒牕撫卷三太息五紀胡塵暗幾甸安得士馬有如此長驅為決單于戰題羅春伯所藏修禊圖序東遊登㑹稽祇見蘭亭不見碑北過中山府欲訪此碑不知處間從故家看墨本如此二者絶難遇曽經耶律氈裹去至今薊北猶知慕時將一二餽北使持歸往往快先覩未知玉石真在否要比江南終近古他日縛取呼韓作編户勒銘歸來過定武只問君王乞此碑打向人間莫論數題孟東野聼琴圖因次其韻誰歟住前溪夜深以琴鳴天髙顥氣肅日斜映疎星橡林助蕭瑟泉聲激琮琤彈者人定佳能使東野聼束帶不立朝遥夜甘空庭龍眠發妙思神交窮杳冥不見彈琴人畫出琴外聲郊寒凛如對作詩太瘦生恨不從之遊撫卷空含情壽安撫伯父東樓徳澤流無窮我公挺生慶所鍾瓊枝玉樹瑩精彩迥然不墮風塵中少年慷慨吐虹氣文彩元不減儕輩胸中妙藴經綸才剸劇裁繁特餘事曽從蓮幕試牛刀舉城但識劉功曹瀾翻薦口動天聼一語便逾華袞襃上方欲革嶺南弊柬才果得吳刺史不妨一勺飲貪泉清徳泠泠今可紀憑軾雍容安七閩列郡合詞稱得人從兹十載秉麾節坐令萬里回陽春洞庭風月瀟湘雨君王無復憂南顧抗章乞得半生閒遥指山家賦歸去廟堂未肯閒宏才大開東閣需公來朝隨召節赴天闕夜馳使馹歸長淮廣陵卧治要汲直金節熒煌照熊軾底用腰纒十萬錢且看身享二千石忽思鱸膾寒菰羮拂衣欲遂鄉闗情視去西陽如脫屣意色蕭然同鬭生畫船重汎西湖上水光山色都恙恙主人管領東風回故園桃李倍清爽六鼇背負三山歸輪囷老檜蒼龍姿了無塵俗敗人意棐儿長物皆瑰竒横岸綸巾披鶴氅神情直出羲皇上塵事到頭曽不聞卧聼歌臺傳緩響百花堂前手自栽興來一杯復一杯人生亦欲自適爾富貴于我何為哉仲春況屬懸弧旦使君亭榭風光煖東君豫借一分春不許芳菲作春殿綺羅香深初肆筵弟兄酬酢盃相傳此時更復借一醉君從何處拌垂蓮五侯貴盛徳未美簪纓不滿髙陽里何如清白傳家風奕世青氈盡朱紫燕居今喜相比隣其如四海須陶鈞羽書鼎來在朝夕何數羔雁徒成羣芙蓉城中有仙室十洲三島環其側此中樂不減商山功成歸作茹芝客送伯舅汪運幹大雅人生自古悲别離别離今日何足悲試問今日行者誰鄞江名族真男兒虬鬚燕頷軀十圍凛凛端有熊豹姿毅然剛立不怒威笑視鼠輩何脂韋州縣小試囊中錐政績今在衆口思姓名通籍黄金閨便泛王儉紅蓮池平時幕府多素尸坐縻公粟遨以嬉只今方當多事時正要名士同驅馳森森百萬虎與貔荷戈分駐淮東西兩淮千里雙使麾幕中僚吏皆耀犀惟公婉畫明蓍龜辯如懸河不可隄胸中武庫深難窺決䇿固有堂上竒朔風吹空黄草齊正恐秋髙胡馬肥萬人相顧目睽睽見公此去多腹非公獨襆被行不疑單車西去征馬嘶平生氣槩衝虹霓恨無尺箠笞羌夷方今天相中興期黠虜戴頭來邉陲顧公速蹈功名機匈奴不滅何家為出門千里何足辭但願滿引金屈巵夜月泛舟姚江秋暑不可耐幾思泛中川晚來興有適溪船偶及門凉月纔上弦平湖可黄昏倚楫縱所如卧看龍泉山長虹跨空濶過之凛生寒坐穩興亦佳夜氣方漫漫草蟲鳴東西飛鳥相與還仰頭數明星垂手揺碧瀾主客惜此景不及攜清樽無酒要不惡徜徉足幽歡幽歡有何好扣舷澹無言送王正言守永嘉江頭潮生江月小暝烟緑暗垂楊道有客扁舟送使君道傍不怕揶揄笑向來一别三換嵗正喜親情得傾倒吏民引領望推麾空有離愁滿懐抱使君讀殘萬巻書古事今事俱了了便應珥筆侍天陛不然代言登鳳沼瀛堧山水久寂寥為屈朱轓來坐嘯帢幘峰髙舊題咏赤城所在經行飽永嘉名郡太守尊靈運後來詩絶少天作雁蕩地為藏蠟屐穿山未曽到改轅卻向箇中去更得江山助詩好齋鈴静處定得句不待池塘夢春草去年海水上平地大風駕浪從天杪蒼生濈濈生魚頭聚落隨波迹如掃今年二麥連野秀田家扶犂事秔稻使君憂國眉不開叱馭徑行仍及早哀哉千里方更生縣官租錢酒力曉縱民自恐上不足誅取何憐下無告邦儲邦本孰輕重肯使疲民困征擾君不見巖巖千古陽道州政拙催科自書攷游龍瑞宫隔山望危石老面凛如鐵路回兩屏開見此髙嵽嵲偉哉名公卿峩冠㑹朝列又如鼓迅霆𤣥雲助擊烈癡雲不作雨空翠襲氷雪野水不知源遶徑幾萬折子長真愛竒萬里探禹穴我家甬水東扁舟輕入越竊此半日閒到處輒清絶傳聞古洞天瓊臺照金闕神仙杳難問一笑山石裂相逢客路中翻手數年别勝地更躋扳莫厭屐齒折三日不得過都泗堰南朝何公棲禹穴嘉遯悠然老髙潔一朝送人都泗埭歸歎此途於此絶我亦何為走塵埃數年不記幾往來船横三日不得度愧想髙風安在哉宿佛日山平生臨平山知誦藕花句輕帆幾來往山色澹如故寧知千萬峯中間著佳趣蕭蕭蒼髯翁為指花城路我來春正濃天寒日將暮雲深鐘唄鳴自喜得勝具緬懐玉局仙老筆掃朝霧玉槊儼相持珠旒竟何所惟餘渥洼水蒼龍角牙露人間翻覆手烈日變烟雨俗子眩炎凉三四錯賦芋道人笑視之萬化隨所寓深坐十笏地一息了千慮箇中誰得知幽鳥背人去求仲抑招逰山歸途遇雨竹輿遶湖濵宿露尚厭浥徑到玉岑下坐久客始集起穿靈石山萬松介而立梅天氣清潤空翠行可挹古藤幾百年枝蔓兩山及見説暮春時花紫光熠熠直疑老潛虬初起夜來蟄俯玩嵗寒泉齒冷不敢吸相將上龍泓塵鞅謝羈􅎗洞有靈獸居臨深心岌岌魚遊明鏡中巨浪無三級寒苔載水去萬頃潤原隰濛濛山雨來歸僕鳥飛急野興殊未已日昃不暇給衝泥上湖船雨陣遽奔襲飄風將急㸃回旋驚四入中流益蕩兀短篷不當笠停篙亦久之怒勢不少戢我徒方嘯歌弗謂改豪習但苦瓶罍罄莫問衣裳濕吳江舟中阿連久已共一被小别愁生夜無寐風帆將我上征途回首江中日千里小舟横卧吳江水夢回依約蕭齋裏五更漏急月黄昏鳥散一聲人未起讀范吏部三髙祠堂記三髙之風天與髙三髙之靈或可招小山以後無此作具區笠澤空寥寥幾從垂虹蕩雙槳寓目滄浪獨怊悵筆端不倒三峡流欲遽招之恐長往前身陶朱今董狐襟抱磊落吞江湖瑰詞三章妙天下大書深刻江之隅我來誦詩凛生氣若有人兮在江水扁舟獨釣膾鱸魚茶竈筆牀歸南里先生同是丘壑人只今方迫功與名謝公捉鼻恐未免便看林藪生風雲他年事業滿彞鼎乞身歸來坐佳境不嫌俗士三斗塵容我漁蓑理烟艇仙都獨峯漢家武徹求神仙方士搤掌多夸言蓬萊隔海不可到屬車徜徉上喬山傳聞黄帝久仙去胡為有石髙巑岏游談不經理欲屈謾言此地藏衣冠縉雲自是仙窟宅萬壑千巖比如櫛突然一石摩青雲造化應勞巨靈擘仙風吹墮碧蓮花玉井半空人不識望之不計幾千尺八柱擎天此其一伯夷制行髙且孤萬世猶能立懦夫英魂凛凛今不死化作此石山之隅横斜轍跡依然在我亦何能窮古初靈壁道傍怪石飽聞兹山産竒石東南寳之如尺璧誰知狼籍亂如麻往往嵌空類鑱刻長安東南萬嵗山捜抉珍怪窮人間汴流一舸載數輩徑上艮嶽増孱顔當時巧匠斵山骨寘之江干髙突兀干戈動地胡塵飛坐使竒材成棄物君不見黄金横帶號神運不數臺城拜三品只今零落荒草中萬古凄凉有遺恨木人漂漂不如土坐閲興亡知幾許行人沈嘆馬不前石雖不言恐能語括蒼溪漲雨餘大溪觸山流氣勢直欲凌沙洲浮梁中分斷螮蝀流沬東去行蛟虬人家嘈嘈避新漲雲稼苒苒添平疇漁翁輕生有如此小艇横絶隨飛鷗石門洞扁舟百里遶城回青山中斷立兩崖清都虎豹隱不見但見閶闔排雲開峯回失喜大飛瀑聲震萬壑驚春雷掀髯目極九霄外玉虹千丈飛空來一冬青女靳天雪不知聚此山之隈傳聞神龍卧其上寳藏擊碎真瓊瑰胸中先自無塵埃到此更覺心崔嵬天風為我噀空翠春水瀉入騷人懐謫仙曽來寫勝句劉郎又為開天台我慙筆無挽牛力醉墨滿壁誰為裁或言龍湫更竒絶鴈山髙處深雲埋我方攜笻往尋訪未知比此何如哉大龍湫北上太行東禹穴鴈蕩山中最竒絶龍湫一派天下無萬衆贊揚同一舌行行路人兩山間踏碎苔㾗屐將折山窮路斷腳力盡始見銀河落雙闕矩羅宴坐看不厭騷人弄詞困捜抉謝公千載有遺恨李杜復生吟不徹我遊石門稱勝地未信此湫真卓越一來氣象大不侔石屏倚天驚鬼設飛泉直自天際來來處益髙聲益烈溟池倒瀉三峡流到此誰能定優劣鴈山佳趣須要領一日盡游神惡䙝驪龍髙卧喚不應自愧筆端無電掣輪囷蕭索湍不怒非霧非煙亦非雪我聞凍雨初霽時噴擊生風散空濶更期雨後再來看净洗一生煩惱熱連雲亭望海中諸山鴈山本在雲海中波濤千古相撞舂泥沙洗盡見山骨巖壑所在皆玲瓏是誰一口汲水盡平地卓立成竒峯至今往往有遺跡相傳渺漭何能窮我乗單車來自東佳處十數一覽空晚登四十九峯頂曠望巨海烟濛濛羣山錯立不知幾朝日照燿天霞紅是間瑰竒定多有鯨波掩蔽深莫通我無太真燃犀法安得一闖馮夷宮㑹聞滄海變成陸卻與鴈山争長雄寄題張法曹瞻雲軒張侯名軒意可知如登太行看雲移我雖未得登軒墀不鄙要我巴人詞爾時膝下遨以嬉欲斵數語語不隨娛侍東嘉樂無涯官舍偪仄親不怡安輿相將甬水湄日日東望勞支頤秋風得檄欣星馳歸拜親下聊信眉官事有程不得違欲去故國行遲遲重來橘柚黄金垂霜著新蟹雙螯肥海魚甘鮮一尺圍欲奉色飬春為期瞻雲之思今同之慨然落筆成新詩人間至樂在庭闈何用自縛㣲官為君方欲解左顧龜我亦日思投檄歸相望百里俱萊衣從他天外閒雲飛次韻翁處度同遊北山兩夫持鎌行我先巧尋徑路其智專我扶枯藤衣短後意氣已出層峯巔何郎鮑叔飽經歴勝處一一手自編我攜舊紀訪陳迹止恐急景不得延徜徉共登青雲梯今日邀我為擊鮮始觀神龜闖青泚上有石壁來飛泉隱蹟遺基平可坐下顧亂石如磨鋋懸崖雙瀑灑空雪來自一握孤雲天郤從下流泝深險﨑嶇直到青潭邉朝陽射光破幽閟斷虹上下遮潺湲傳聞髙山更髙處雅有行路從西偏同行無乃深好事盃酒自犒腳力全誅鋤荆棘窮鳥道欲進不得意愈堅旋呼童僕累危石笑採野菊聊盤旋捫蘿騰身上苔磴往往歡呼爭著鞭側行危歩汗浹背石角或使衣裳褰少焉身在雙瀑上又見髙派衝泓淵自笑泉石成膏盲愛賞不減蟻慕羶巉巖數峯巧遮護妙處二老初無傳脱迹塵埃到此地便覺神思飄飄然回首江南塵一聚城郭歴歴眼欲穿相期更看水流處歩履未倦夸輕翩一上千尺窮山椒碧澗靡迤流蒼烟尋源不能且忘返石猊巍距驚神鐫退求歸徑惘難問藤蘿所在相縈纒我方踟蹰風煙表披披衣袂身欲仙晚歸招提各痛飲讀盡屋壁長短篇截筒環山覧清駛竅出珠穗心亦憐棊枰相與論𤓰葛横琴不妨揮五絃人生易老費扶掖勝具大率須少年伊余歴聘佳山水愛竒切慕太史遷明年炎暑襲故歩與君共枕清流眠遊白石巖我遊仙都觀獨峯轍跡雖在車不通鼎湖望極幾怊悵悵無羽翮凌天風兹來樂成望白石玉甑突兀摩蒼穹人言真人老耼裔鑿開洞府遺仙蹤無人共登青雲梯躋攀伴我惟枯笻縈回約畧三十里踏遍萬疊髙嶐嵸斷崖泠泠落殘雨雙石凛凛亭孤松郤從山椒下谷口石欄屈曲遮碧椶頗疑山髙氣凝凛古來積雪今未融是誰玉斧妙鐫斵仙洞雙闢驚神工巖深白日尚幽閟别有石竅開天聰傳聞峯頭貯清泚苔罅涓滴聲冬瓏奮身便與上虚閣海山錯立烟濛濛腳㡳千山行伏龍手揮五絃俯冥鴻霜林摇落當𤣥冬長嘯一覽萬象空解衣寄宿旦過寮魂夢亦墮氷壺中曉看日出滄海東蠟炬百萬燒天紅眼髙不數鴈蕩雄行田下笑康樂公未能辟糓追仙翁頗亦有意棲琳宫三山不覺去人逺安期羨門宜相從驂鸞駕鶴太多事但欲御氣游無窮約諸公再游龍湫昨暮與君上龍湫天久不雨無湍流笑呼拊掌喚不應悵望頗亦令人愁夜來雷鼓驚龍起溪聲已覺亂人耳莫辭重訪尊者居坐看倒翻三峽水送劉仲起主簿劉郎鸞棲海瀕邑不減向來人性習凛然軀幹即之温語恐傷人中有立論交雖厚笑甘醴御史以嚴無束濕公餘黄卷頻巻舒藝圃工夫日加葺永嘉數多君子僚休沭新盟有清集伯倫忽去誰鯨吸欲挽不留情悒悒君年方盛才有餘逸驥寧容在羈􅎗期君欲蹈功名機塞草連雲朔風急王侍御夀詩使君威名聞四方南牀凛凛凝秋霜使君和氣到甌越幕府初開夜飛雪頗聞此雪近嵗無定知來隨御史車黄堂洗印未多日慶朝況此當懸弧明年豐登日可數父老兒童爭起舞遲明賀版擁譙門試拾歡謡作詩語使君風度神仙人相門出相寧非真妙齡兩科談笑得脱趨嚴召依風雲臺端敢言姦聼聳至今讜論時傳誦踏遍巫山十二峯却尋春草池塘夢人傳使君威稜稜我知威愛元兼行蒼髯如㦸面如鐵惠養自有循良稱髙牙入境紛進謁賔屬庭趨躬磬折民生共喜愛日温吏行獨畏春氷裂向來夔州妙籌邉夷蠻落膽皇靈宣還朝奏課居第一夜半帝席為之前東嘉今為股肱郡小試望之三輔近㑹循故事入三公致君要使登堯舜東風未動春先回梅花照眼歌筵開吏民合詞誦難老一笑千里傳銀杯佳兒恂恂受衣鉢玉樹芝蘭俱秀發江南世胄比長淮更看雲來萃簪笏平生知己今上天敢復作歎寒無氈巴言未足贊公夀載誦峻極崧髙篇鮑清卿病目不赴竹院之集詩寄坐客次韻鮑侯少年老文學藝苑優㳺富耕穫胸中涵養自成趣妙處正恐兒輩覺我慚門巷非尺五字欲問竒誰與㩁開樽竹院望同醉遮眼腦脂何太虐圓圞十客踏雨来相從不負東風約投壺雅歌了無恨秖恨公車一前卻海棠春深照眼明風物融融悟非昨從教雨洗臙脂淡小摘何妨供把握夜䦨燒燭照何睡靚妝如在結綺閣牆頭西望爛蜀錦嫣然一笑無聲樂飛紅㸃地繡作茵正須席地天為幕要知富貴出天姿艷杏夭桃何足録主人小築眞好事肯學區區專一壑洞門不鎖要客來笑君太似羊公鶴雨餘珠淚色慘悽一顧正嫌無伯樂忽驚新詩來叩門妙語天然不煩琢坐中傳觀字欲漫我䜿降幡甘面縛清明已過雨不休雲霧猶屯四山腳揩摩病目不應遲及此紅英半零落枝頭尚有未開花縱已離披亦何惡知君既負西岑遊可使一春終落寞㑹須來此共賦之正要重聞誦新作贈光孝益老光孝長老師益蘇魏公諸孫兄延壽為台州判官别四十餘年一見歡甚林吏部有詩次韻原鴒鴻雁行此理懸諸天萬事可變滅天性難推遷顯庵幼出家潔飲同𤣥蟬一鉢寄西東悠悠經幾年外慕等浮雲百念灰無煙難兄忽相逢觸動歡喜縁光隂信可惜征袂何翩翩叱胥掩簿領来問妙峰禪剌剌道家世客淚如迸泉玉堂與黄閣衣鉢親相傳游宦非為貧不敢替所先老師雖晏坐至情豈唐捐此㑹非偶爾絶倒秋風前手持詩卷來謂予得無言曉以天性語人生要有原嗟哉偽日薄萁荳本同根一旦成讐敵釡中急相煎寧知有佳人芳草夢阿連相見無幾時瞥見魚躍淵固知出世法惜别詎不然又當作大觀勿為愛網牽千山原不隔毋庸對牀眠送王道州九疑之南為舂陵瀟木清駛山為城郡齋正據山直上一覽萬家無遺形家君頃年入蓮幕我不得往空馳情先生分符此中去心旌揺颺隨雙旌先生平生飽文學身上著作承明庭奥篇隱帙亦如響一時自許文章鳴髙辭坐奪造化巧凛凛韶濩聲鏗鏘把麾江海非無意親扶版輿賦南征頗聞楚俗未蘇息糟糠不厭嗟疲氓正資儒術飭吏事拔去强薤摩孩嬰政成環召事未晚天子日夜開延英風流千古三刺史往繼聱叟陽先生毋庸自書追科攷但願寄我舂陵行哭王知幾墓知幾少也爽萬事談笑了自謂頗寡合見我輒傾倒百年能幾見一别迹如掃父子俱埋璧嗚呼何其早向來論文酒和淚傾宿草此意誰復知寤嘆令人老仲舅尚書生朝去年生朝燕稽山館舍朗朗屋百間紅裙合樂飲徹旦坐上衆客皆酡顔今年生朝半歸路竹輿瀟瀟曉衝雨回頭風景非去年當時賔客今何處仕已喜愠曽何分適齊未減楚子文鼻間栩栩固自若世情物態徒紛紛平生知足志閒退歸老鄉關了無悔但欲年年醉西風坐閲人間百千嵗人間萬事日不同尚書人望方顒顒明年舉酒拜公夀安知不在槐庭中送鄭惠叔司封江西提舉君名切斗魁歩武上霄極蓬萊羣玉府圖書照奎壁郎官應列宿寢覺象緯逼胡為作使星烱烱向江國仰奉鶴髮親版輿映萊服昔日紅蓮池帥垣資婉畫方將散餘潤連城被膏澤官𣙜與民繇豐儉煩振糴小試活國手疲氓賴休息便歸侍玉皇拱立香案側富貴殊未已行行上鸞掖君其妙演綸三能看齊色次韻胡元川茉莉花殘暑未盡秋欲來玉刻萬葉瓊英開孤標雅韻一枝足江上紫翠空成堆素娥嘗與明月約青女細把輕綃裁主人好事趂時買買寘此地真宜哉牆間閒地方丈所幾年累甓裝層臺春花秋卉紛互發胡葵芍藥参徘徊眼明忽見此竒絶弟畜素馨兄事梅夜深飛香性幽獨未許蜂蝶來相陪糖甖封餘有閩土㑹須掃取添花栽吾聞閩山千萬本人或視此齊蒿萊何如航海上天闕玉色照映琉璃盃新凉徙倚看不足坐見日影敧庭槐同官登勅局小樓觀雪去年嵗豐登雨暘應時須所欠惟一雪祈禳遍精廬晚亦粗飄瞥六花舞空虚雲氣不待簇風伯隨驅除殘春寒尚深忽見雲糢糊撒鹽壓衡茅晨興粟生膚隨班上廊廟恍若登蓬壺岧嶢宫殿深朱扉黄金鋪百神衛靈居半天散瓊琚又疑守䕶嚴寳網絡明珠参差鴛鴦行簪笏皆沾濡退歸冷局中牕間竹扶疎為思此絶景往往終年無不應憚凌寒閉門守紅爐為君登危樓深盃泛酴酥崔巍瞻吳山莽蒼望西湖瓊枝宿饑鷹玉階走韓盧酒興萬里逺容我歌且呼坐欲斵五言所媿李與蘇君與工屬聨灞橋去騎驢久不作詩喜仲兄遷隣因成長句宦遊各天涯皇州今鴈行官居半里所相過復相望西鄰得老屋往來連戸牕水竹占幽勝風雨對一牀十年短擎燈今夜分餘光兒曹亦可樂洛誦聲洋洋天邊有白雲隨風正飛揚相期奉甘㫖萊衣戲親傍軒冕皆倘來此意可暫忘詩成喜可知且復釂此觴送林宗丞浙東議幕劭先生風骨天與清孤松野鶴何瘦生胷中落落笥五經大篇短章筆縱横壯年文塲諸老驚俯仰世故雙鬢星萬事不理詩自鳴笑視軒冕秋毫輕市者爭利朝爭名著腳往往遭譏評先生四五官神京又復歸去鴻冥冥臺家急賢理不應況復寮舊離觴傾先生自喜行此行禄粟可以號號聲秦望之山髙且平卧龍横亘環州城鏡湖千頃波不興晋宋遺跡多豪英議幕了無塵務縈撫物弔古皆闗情我亦久矣懐滄溟旦夕欲乗緹油屏相望縱復三四程詩筒尚得尋前盟臨海縣治琴堂子賤彈琴真是琴我今無絃知琴心使我不得琴中趣弦以修綆誰知音才術髙低不自由單父二子心則侔後人不得彈琴暇勿以戴星為可羞送石應之司戸歸剡以室邇人逺為韻㨗徑指終南索價譏少室窮達豈無命踏地胡不實之人吏海隅所吐百未一夷途澹無營君其有終吉年來歎離羣磨琢殆無幾資凡學益落駑駘費尺箠羨君富春秋發軔方自邇驊騮更著鞭洗眼日千里南明千古秀慶源久益新剡谿照人清況復屈斯人摻袪不容留椒觴思拜新他年風雪中扁舟倘知津平生企賢心山川恨悠緬寧知日相見懐抱竟不展樽酒了無暇離情果深淺室邇猶許疎況今乃眞逺送王仲矜倅興元蜀道難難于上青天蜀道易易于履平地蜀山天險固自若視難為易在人爾王尊眞有四方志叱馭徑行了無累早登岷峨仕陰城談笑動行千萬里漢中由來説鷄肋意謂棄之為可惜君今此去良似之更欲逺遊尋故迹漢都南鄭啟炎圖秦置石牛山徑闢淮陰拜將餘髙臺武伯葬處空松柏大笑出門何慨慷天涯離愁各盡觴荷君走馬卻送我李侯參語夜未央君方往蹈功名機何止别駕歌王祥先正九年遺愛在更攜故笏訪甘棠仲矜象簡乃參政入蜀時所用巾山兩鼇贔屭隨西行勢欲吸盡西江清是誰繚以千丈城欲去不去豈不靈化為青山鎮東溟首冠窣堵雙崢嶸安輿從東喜逢迎笑指鼇背同來登春殘雨足緑陰成山鳥相和聲咿嚶自從半山經小亭仰望巨石扶軒楹千山萬山擁翠屏陰霾歸静纖雲興翠㣲下有長江横滾滾不盡千古情横軒俯瞰萬瓦平佳處歴歴堪指名雪蓬蹙雲連曲肱蜂房蟻垤棲殘僧扶欄更上三兩層一覽衆物無遺形徙倚未厭茗椀傾長嘯兩腋清風生親顔甚怡輪為停我亦色笑喜不勝願我雙親俱遐齡方瞳鍊顔華髮星如此兩峯相對青沿檄柯山歸别張特秀我昔志學年侍親宦西安弟兄逰庠校見君平生歡君才獨頴出逸駕不可攀夜牕共檠燈春逰合盃盤虚堂卧雪嶺傑閣横雲槃爛柯上危磴烏巨沿溪灣是時氣相髙辨論俱瀾翻一别三十年天街見峩冠殿廬看決科藍袍立清班黄牒墨猶濕大弨力能彎爾來又五載短書能幾番兹焉捧檄來吏牘方挐煩室邇嘆人逺一朝脱籠樊滿意縱劇談痛飲到夜䦨十歩九太息此事亦孔艱進哭老先生畵圖惨青綸特顯顧何爲一昔成大還回思我伯氏人琴有餘嘆感今念疇昔相與涕淚潸故人悵無幾恍如春夢殘有酒不得飲有琴不成彈復歸坐冷屋使我凋朱顔我歸不可遲倚門夢連環君言欲舂糧伴我行路難欲去不得去僧房話閒闗年各幾半百後㑹鬢亦斑何處更有待此心匪石頑羣憂發孤笑屬聨不當慳氣岸有如君著身簿尉間鹽車復長鳴㑹當上天閑掺袪不忍别雨聲為潺潺君有門户責慇懃願加餐次韻沈使君懐浮岡梅花玉人迥立山谷裏不有使君誰與憐毋庸髙牙煞風景為著佳句増孤妍寒溪照影漫千樹横笛吹殘又一年傳聞年後更多發便須躍馬趨平川送王木叔推官分韻得錦字王郎天下士中和自生禀澹然初無營見者輙斂袵幕中資婉畫處事極精審與人如恐傷律已淵氷懔深恐馬駃輿要使鴞食葚一寸憂國心幾年不甘寢此意大未酬退静若已甚使之行所學庶幾人奠枕向來孰閒之未免斯立噤川詠而雲飛賴有東陽沈露章極推轂分韻句裁錦風流有如許不復歎踔踸如君豈蓬蒿人物妙流品才應奉香火為養謀禄廪與君幸𤓰葛心交今十稔豈惟我惜别行道情苒荏紅蓮色何似翠柏風愈凛願君疏藥裹一意䕶茵餁棄鼎寳康瓠浮名如拾瀋行矣無多言臨岐且劇飲彭子復臨海縣齋乾道癸巳冬此邦我經行鬱攸氣未殄千家眞赤城来訪臨海令瓦礫紛縱横翹然二尺髙問是戒石銘徘徊重太息更聞愁嘆聲試詢來者誰共言令姓彭我時語傍人此邑其將興迨予來贅倅客館方暫停夜聞簫鼔沸㕔事先落成起望輪奐美壯觀聳連薨百堵日已作斧斤喜丁丁層樓庋敕書兩廡環中庭久乃逰其間宏大使我驚位置既深穩斵削仍工精田里不知役纎粟無輸征安得屋朗朗突兀有寧馨退食不苟處扁榜皆佳名中虚物自照政平由心平樨柏已可悦況有賢弟兄小亭眞吏隱縣擁髙山青琴堂雖増舊此意宜細評智調天下理夸言笑後生大弦可以急小弦恐弗勝舉意屬俄頃立言如所營手足民無措吏姦意相乗不如疎節目示以信與誠施行有次第幽逺無隱情上下始相應温和亮以清子賤意不傳僅許勝戴星彭令蓋得此所以千里稱此非以政學淵源甚分明行笑解印去衆心已先傾太守薦之朝一鶚飛青冥傍無蚍蟻援日夜思歸耕我無薦賢柄直書氣塡膺安得採詩官取以徹明廷送虞仲房赴潼川漕我來丹丘乗貳車送客往往萬里餘盛山使君别寖久漢中郡丞今寄書公指四明喜鄰境典午何知成畫餅揚旌忽作梓潼行去路六千抑何迥餘杭名家多俊竒君于輩行尤白眉雍容音韻足夷曠百家到手無停披向來郎曹天咫尺引山閩山接商舶賈胡嘆仰清節髙霧中親見越王石此行叱馭不作難手遮西日又長安長安日近公應往未放使星臨蜀山不然一行亦不惡潼川應如錦城樂鄧侯功名凛如在拾遺風采今猶昨流馬木牛諸葛公飛輓正欲修前功蜀民險逺日凋瘵撫摩要令畿甸同況公五絶追鼻祖𨽻古真有兩漢風歸來富貴固未晚為傳此學川西東奉口遇雨七月欲盡八月初天久不雨暑未徂下田焦卷上田槁愁嘆不止田間夫嘔啞水車日夜響漕河揚塵成坦途喜見此溪深且廣𤣥雲忽起西北隅林間槭槭氷漚起兩岸人物歡欲呼未聞滂沛潤龜坼且使萬物聊沾濡船牕飄灑疎篷漏客意自適凉襟裾引身東望雲氣薄未知帝城有此無傳聞今日方奏告便有響應來斯須人家百萬苦炎熇君王齋禱幾月餘君王齋禱幾月餘雲師雨師其疾驅游天台石橋兩龍争欲起深壑觸破山骨成修梁滔滔共出一門去凛凛直落千丈强初疑鞭石跨滄海絶勝乗鵲横銀潢要須髙躡前峯過往叩山中眞寳坊攻媿集巻一欽定四庫全書攻媿集卷二宋樓鑰撰古體詩史少師賜第賞芍藥分韻得木字帝城有僊山雙徑森萬王洞户入深􅆼突兀見華屋相君領衆客紅藥想芬馥霜刀妙裁翦臙胋㸃氷縠枝弱不勝花翠葉共斜矗向來爭春風桃李媿粗谷百卉紛何在庭樹擁新緑此花丈人行儼立見幽獨相君戴花笑和氣俱可掬人言此花勝相君意傾屬誰知心廣大何物不䝉幅豈以庭中花而肯棄凡木君看擇勝具所可可追逐自言居閒時情話㑹親族一花有可觀爛賞費銀燭此心何揀擇寓意本無欲以此宰天下以此鎮藩服兒童與走卒人人歌相國有能逹此觀春風四時足送錢伯同寺丞守嚴陵嚴陵錢使君丐外得請外府同僚相與飲餞於錢塘之津某病疹弗得預方得請之初某歎曰去年送君來今年送君歸君笑曰此節送行詩也卧病枕上口占去年送君來今年送君歸君善全去就我獨念别離君是忠孝家襲紫傳金龜門户二百年所寄在一夔少年便老蒼况今更險夷不獨妙言語理窟深莫窺健筆照手澤典刑從可知向來御祥琴欲把江海麾促召歸舊班退食方委蛇世事等飄瓦人情嘆然萁向非渾金質百鍊豈不衰浩然賦歸歟潔身而去之為寮曾未幾棄我忽若遺君既棄我去謫僊復追隨陡去二良友撡袪重分岐前别易再㑹後見當何時才具素絶倫涵養日以滋且為牧嚴陵赤手磨瘡痍歸來應不晚青氈當屬誰願君厚自愛嵗寒尚相期送楊嗣勲校書守眉山我生東南陬不識蜀道難觀君眉宇秀想見岷峨山漢廷射䇿時連璧照鴛班伯氏書萬言逸駕不可攀兹焉從君游頗得窺一斑僊凡隔弱水接辭良亦艱矧兹萬里别望望何當還三蘇騎鯨去詞章滿人問豈無後來者遺珠有餘歎願君效樂全飛章逹天闗報國此最急餘事付等閑宜室行見思朝暮當予環别語敢言詩屬聨不容慳送何道夫祕監守潼川妙齡冠蜀士名聲振王畿晚隨召節來天朝增羽儀我昔倅丹邱鹿侯掛冠歸羣公俱祖送見公四三詩頗恨著鞭先自言乞身遲拳拳慕下風直欲夢見之還朝挹髙致氣宇清且竒稱者不容口往往同一詞始見荷傾倒笑談欲忘疲况當秋風髙濫吹叅試闈鼎臠得一嘗豹班容管窺叔度真似道莊生信忘機親疎皆不可況容磷與緇諸生得公來歎曰真吾師叩簾或三請響答了不疑私謂如此人定應備論思胡為歸興勇抗章氣不衰鼓盆萬里外抱孫更成悲擁麾東川去無人留孔戣别懐不自勝别酒聴淋漓他時念老成追風且復西公能重來否此意非吾私送趙子直貳卿帥三山一蹴登從班人胡謂公遲建牙帥七閩人胡為公疑公今第一流志操古與期雨州有遺愛江西憺霜威重來長道山批勅兼瑣闈一片憂國心輾轉中夜思正色抗危言傳誦滿紳綏造膝有啟沃削藁知者誰此心與天通此意上所知所以名愈尊萬口同一詞進用恐不速小卻成歎咨天語自昭然更欲試望之況彼三山重謀帥皆衮衣兹行豈細事報政不待期登門恨最晚臭味忘賤微自慙空惜别不解留孔戣十連終斂惠居中乃其宜試問行道人但知望公歸玉版鮮次陸子亢郎中韻鱘黄不減鯨與鱣迎風鼓鬛噴腥涎漁人不顧浪如山談笑坐致扁舟前不鉤香餌不得去何用大網相索纒揮刀紛紜臠肉骨巨口噞喁誠可憐珍鮓萬甕不論錢頭顱萬里赬行肩星郎日叅玉版禪頗厭蔬食供盤筵尚書親作孟宗寄坐覺匕箸生春妍卻笑多事張茂先光怪異説空十年走筆送僧義沖一氣行太虚流行紛不齊要之本無物洞然無是疑梵志有至言還我未生時燒了似不曾亦有毛僧詞沖師名家子少年習裘箕談吐霏木屑落筆皆珠璣自稱十年來不復念作詩空門坐枯禪綺語知昨非聞之意已消談笑到日西習氣終未盡舊編還自携秀句堪供佛古作力可追愛玩不去手未免成一癡又欲上西湖駐錫來語離我生墮宿業筆硯置藩籬拔擢困胃腎未老神已疲幾欲焚故稿要使清夷君詩既不化作何不等棄之萬事都放下一意控𤣥機語罷復自笑無使髙人知作詩固無用叅禪亦胡為勸人反自蹈此紙何必揮不知兩俱忘他時體體歸催老融墨戲古人惜墨如惜金老融惜墨如惜命濡亳洗盡始輕拂意匠經營極深夐人非求似韻自足物已忘形影猶映地蒸宿霧日未髙雨帯寒烟山欲暝中含太古不盡意筆墨超然絶畦逕畫家安得論三尺身世生縁俱墮甑人言可望不可親夜半叩門寜復聴三生宿契誰得知一見未言心已應巖傾千丈雪散空上有清池開錦鏡意行忽發虎溪笑許作新圖寫幽勝歸尋一紙五十尺傅以礬膠如練淨自知能事難促迫捲送松忩待清興筆端膚寸今何如西抹東塗應畧定何當一日快先睹洗我昏眸十年病獨旦蕈次九五從叔韻朝菌晦朔雖不知食之實冠東南味庾郎二十有七品一見流涎驚絶異擷蔬剪韭皆可却味苦應無夏蟲避大阮哦詩聲未了又索蒸芝今再遺邇來枯枿尚未茁拳拳頗媿臺無餽倘容小摘寄情親㑹見長髪見芹意雪丙午九月才入冬晦日忽驚雪墮空傳聞都城更復早萬官入賀明光宫自從開霽更不雨和氣真似青春濃斗柄插子日丁邜夜煽裂缺鞭雷公從以震霆至三四驚破蟄户紛昆蟲寜知𤣥冥全未究翻手作雲千里同暗牕初聴灑珠雹巽二勝六方施工一日喜見瓦溝積忍寒待伴炯不融二日三日遂盈尺髙潤四海恩無窮古來詩人詠不盡巧思横出昌黎公少時奮筆不肯已老矣䄂手便疎慵兒曹作戲記昨夢舞狻獰踞金雙瞳誰人若欲撩詩思更作玉山髙數峯移將劉义兩氷柱暉映愈覺清心胸見之躍躍忽技養起呵凍筆尋詩筒開門一見天宇濶棄蜺百萬飛長空瓊樓玉宇滿妙畧干林寳樹春玲瓏恨無髙臺三百尺從觀萬象凌空濛固知幻景有變滅一時如入崑閬中僊家俄頃閲塵刦安知此際非神功賸喜年來米價賤便欲扶犁隨老農牆頭濁醪走來過相與痛飲歌年豐少潜兄真率㑹晝錦坊中作真率羣從相過無俗物主人就樹折楊梅醉倒薫風凉拂拂小舟傍城登雉堞坐看白鳥蒼烟沒須臾撑出洞天去傑閣三層髙突兀樽前賦詩貴神速十分鈍似遼天鶻從他銀漏促殘更要見林間紅日出送元聲弟赴水陽監鎮吾翁積徳厚九子官其六不幸失二人孤嫠紛在目三弟尚白丁升沈猶未卜吾人扶門户叅立如鼎足脱死憂患餘偏親須水菽阿連先著鞭去去長江曲弱冠承賞延十載荷衣緑間闗困家食才就五斗粟要知官無卑毫髮當畏肅督耕兩丈圩受輸十萬斛處之誠未易勉㫋直自朂執别動萬感酌酒再三祝吾子素解自涉世要未熟意行須揆理言輕恐招辱王事究一心言玷復三復細行累大徳隂財損陽禄豈惟贈爾言余亦每自恧公餘稍有暇更取故書讀行矣更自愛家聲要人續伯中弟生朝賦荼䕷春日足風雨不知艷陽天桃李俱成塵懶上西湖船春餘忽微和荼䕷發清妍池塘芳草夢況復向阿連中庭月方午密林澹清烟䝉䝉青羅帔粲粲白玉鈿幽歡久不講羣從俱讙然銀燭煩髙燒妃子浴温泉花以酒為名我以杯相傳爛醉不復辭此㑹期明年黄巖令鄭仁叔索委羽洞府詩君不見王君羽化脱尋厄故山至今名落翮又不見烏程野鶴投氅毛佞臣稱瑞民斯勞何如奉林控鶴凌青霄蕩然委羽登山椒青衣出入洞方杳紫氣氤氲風尚飄今君頗似丁令威鶴馭久去雙鳬歸山川良是人民非一新琳宫還舊規黄山父老歌循良誦君詩句游雲房更將山名比堅操百嵗猶能徹骨芳青林郡齋偶休沐驅車出西城依依山水佳瀟瀟松栢聲雪餘春意動新緑生㘭泓行行到青林老眼增雙明主人喜客來倒屣欣逄迎幽居迹甚遐健筆詩方鳴回首幾年别千里搖心旌相見又暌隔此意猶未平不如造齋閣四座酒重傾風流陶彭澤骯髒阮步兵看劍引三尺論文驅六丁緑野秀横檻山寺傍連甍石罅幽泉溢脚底輕雲生詩盟忝予㑹奕道從君爭哦詩谷禽應列炬林雅驚清歎未云足累句忽已成環坐粲十眉舉酒酬三英滿壁灑醉墨歸夢含餘清我方媿此集君欲尋前盟吏鞅才縳我秋風為君行隠清右軍訪文君遁迹入深竹我來尋歔歈人亡但空谷靈龜闖澄潭華宇對我瀑若人今何之尚想舊茅屋吾聞古君子千載守孤獨楚些不可招懐我愴喬木送劉晉父監嶽濟南劉夫子生來逄百罹乃翁負長才宦游至京西時當建炎間宼盜紛不齊轉徙入湘廣一家屢阽危五羊買海舟萬里向鮚埼舟破投永嘉有如鳥擇棲哀哀老治中藁葬山之陲母家在衡陽孤嫠往相依久卧漳濵疾羇窮命如絲事母以孝聞執喪禮無虧廬墓屏葷茹至行徹丹墀有詔寵數蕃得官祗奉祠行年六十二霜髯照龎眉慨然念防墓千里來海涯西山如蓮華古今冢纍纍况此久宿草蕪穢不復治孝思雖甚切冥漠何從催行道為興歎智力無所施有僧幾九齡自言記當時君聞亟叩請東崗指荒墓吾師慕泓公少也從吾師墓中有版識倉猝不暇碑素棺無石槨灰炭周四圍君方感斯言鑚穴從旁窺其言皆可驗自此不知疑惟餘蓋棺木遺骨不堪移斲石表故阡遂塞無窮悲此僧老而壮斗酒如覆巵與君登山椒下上幾如飛竣事才數日溘然不可為孝感人益仰真有神相之君曰某不孝遷奉致失期未得如有失既得滴滴頤嗟我誠寡陋識君顧已遲一朝來短札謂我從此辭皎皎真白駒安得施縶維戴侯舊山長叅語心相知謂余當此時頽風激澆漓世出世間法君方控𤣥機引証即賸語焉用骩骳詞衡陽尚寄書當有鴻鴈歸後㑹𣺌無日為賦古别離王成之給事囿山堂烟雨望麗陽前山羅紫翠照氷挹南明不與巾子對朅來登囿山一覽萬山㑹蓮城山固多此地要為最主人意軒豁物景供曠快山椒湧華屋迴立風埃外一物無遁形所在皆鮮芥清霜肅天壤佳樹隔闤闠俯仰隨取舍左右從盻睞門牆尋故步杖屢許從邁恍然至絶頂更覺宇宙大樽酒屢勸酧棊枰更勝敗秋髙月色皎浮雲了無碍不俟攀僊掌徙手吸溪瀬兹堂極崇敞意若欠深䆳先植易生木徐待松栢兑望逺仍可喜意滿聊自晦無使山下人或得窺外内但恐趣賜環樹藝或不逮先生味斯言一笑相領解吾將飭園丁隨我添醫薈他時遶扶疎吾廬益可愛游初暘谷及白巖重來游僊都止欲訪獨峯寜知一峯外佳境無終窮何處頴川子鏡巖便相逄約我游白巖輕舟借溪翁齋餘尋宿諾秋霽波溶溶清徹見石底鑱刻驚神工昨登初暘谷但見石嵌空兹浮懸崖下萬石森巃嵸上有勝絶地古語留郭公鬼神謹呵䕶雷霆掃塵蹤換船到白巖修篁搖清風縈回進石屋孤竹攅沙蜂洞府僊所閟無由辨西東扣船過巖下數仞如崇墉石趾平如秋竒怪遮蒼穹更尋小蓬萊俯瞰馮夷宫篙師進深窈捫蘿捨枯笻游子非不多無人解從容我因一日留幽尋極山中秋旻快排蕩日暖如春融歸坐獨峯下石影横空濛急呼醽醁清澆此磊磈胸幸有濟勝具未能上金龍為君揮五絃決眥送飛鴻夜游獨峯下峯背正白月舒光峯影横野萬丈强仰之彌髙立卓爾蔽遮星斗摩穹蒼半秋風露清徹骨望望直欲隨風翔歸尋玉虚步松徑月輪正湧門中央送顔希聖尚書守泉南聖朝寳運開虞唐太平天子垂衣裳恢張治具崇儒良孰不願依日月光用之則行舍則藏孔門賢徳遙相望朝望方隆位文昌跬步可到中書堂問公擁麾何太忙公獨三清志益剛俞音一下冥鴻翔行李徑出臨濤翔爭留公戣動朝行公更傴俯不敢當老成全徳真圭璋温如春風嚴如霜栢臺峩豸肅朝綱賢闗之風士氣揚大天小天稱公方五年吏姦葢而彰金華勸講言加詳明主傾聴談皇王盍膺枋除任贊襄名遂身退天所臧明哲保身身更康髙風可仰不可量泉山壤土接臨漳建牙千里開封疆老龍負圖寵煌煌何殊衣錦還故鄉賤子薄宦接王楊曾陪御史臨文場風簾官燭夜未央劇談獨記聲琅琅兹來誤忝尚書郎始尋故步依門牆西風津頭望歸艎輓公不留逺予將兩宫念公未詎忘公雖逺去如在旁庻幾重來上錢塘夾輔大業恢中邦倘有重事須平章陳順之靈壁石硯山陳順之吏部靈壁石硯山中有雙澗低處為硯下米元章題云唐𢎞文館校書李羣玉有詩南唐李重先故物也蔣教授文㑹有詩次韻名畫法書環四壁中有米家真寳石壁峯森聳外澗流他物雖竒敢爭席舊屬半山老僊人佛印乞之如乞鄰阿章有力負之走一時攘取成紛綸此石天然非琢磨是時有水生巖阿至今硯池尚餘潤嵗月既久惜不多幾年徒見士夫説一旦喜看形偃月傍連玉立兩於莬主人照映氷壺澈陳侯之富可敵國會有寳光驚四塞呼童吸盡硯中水更為輕翻玩竒刻不堪回首江南李空唱多愁似春水不如此石千載傳玉砌雕欄等糠粃寳晉得之真不易身後寜知亦輕棄只今傳玩知幾人當日瑣忩空自秘端歙爭名南北部勿向雷門揚布鼓銅臺渴瓦更不須秪合觚稜䕃風雨跋汪季路所藏修禊序永和嵗癸丑羣賢㑹蘭亭流觴各賦詩風流見丹青右軍草禊序文采粲日星選文乃見遺至今恨昭明字畫最得意自言勝平生七傳到永師襲藏過金籯辯才畫祕重名以徹天庭屢詔不肯獻託言墮戎兵妙選蕭御史微服山隂行譎詭殆萬徑徑取歸神京辯才恍如失何異敕六丁文皇好已甚丁寜殉昭陵當時馮趙輩臨寫賜公卿惟此定武本謂出歐率更採擇獨稱善遂以鑴瑤瓊流傳迨五季皆在御寢扄耶律殘石晉睥睨不知名意必希世寳氈裏載輜軿帝羓既北去棄與朽壤并久乃遇知者龕置太守㕔或云政宣間此石歸紹彭又言入内府宣取恐違程焚膏繼知晷拓本手不停疊紙至三四肥瘠遂異形南渡愈難得得者輒相矜我見十數本對之心欲酲汪侯端明子嗜古自弱齡錦囊荷傾倒快覩喜失聲帯流及右天往往字不成而此獨全好䕶持如有靈尤王號愽雅異論誰與評硬黄極摹冩唐人若無稱贗本滿城南𤨏𤨏不足呈猶有婺與撫碔砆近璜珩右軍再三作已覺不稱情心摹且手追安能效筆精響摺固近似形似神不清不如叅其意到手隨縱横況我筆素拙何由望羣英近亦得舊物庻幾窺典型此本更髙勝著語安敢輕孤風邈難繼悵望冥鴻征送劉徳修少卿潼川漕清朝重諍臣選取妙一世矯矯劉御史一鶚勝百鷙顧瞻最有力步武亦嚴毅一生憂國心千古敢言氣氣足充所學文能行其意遇事輒奮發觸邪無顧忌乗驄行且止斂手已知避但思補衮闕何暇為身計獨立當雷霆三進氣彌厲去魯固遲遲出晝豈濡滯上終行其言羣賢挽挽致將輸向潼川寓直尚書祕風裁仰清峻進退審難易伊昔聨周行暌違十餘嵗來為同舍郎愈篤金蘭契洗眼盼騰上寜知攬征袂抗章歎髙絶勇退尤知愧去勿窮日力予環日月冀承君送道鄉硬語吁可畏毋以此自滿當為不止是臨别提斯語少盡交朋誼萬里句同心呉蜀安有異次韻李季章監簿泛湖僊舟共泛滄波去且向蘇公堤下住西風吹就芙容城青鏡閑妝兩呈露皇家家法常儉素宸心但欲乘啇輅離宫别殿無興作天以西湖共一豫吾儕公退得清賞酒醆棊枰不知暮深知夕照戀狎鷗又恐昕朝追振鷺自憐三人鳯凰城嵗月黄塵等閑度湖光正欲捲簾看風色更煩褰幙䕶孤山不見處士廬司馬空尋蘇小墓酒乾人醉歡有餘聨騎還趨湧金路歸路健倒渾不知睡覺燈前裊香霧文人公子真氷玉曾為出遊揮妙句匆匆借韻僅成章敢託尊前鸚鵡賦送楊廷秀祕監赴江東漕平生楊誠齋可仰不可見去年尺一書老忽忽同傳道山故僊伯再上右文殿蓬萊幾清淺筆力愈雄健獨挾風雅輈孰敢當白戰一官定一集流傳殆千巻拙工見大匠有技不敢獻誰持所鬃篇徑掣巖下電誦之百寮上慙汗幾被面公今欲何之江左去乗傅鼻間長栩栩仕已忘欣怨英英日暮雲薦紳極追戀挽公不得留觴豆紛祖餞惟應三山髙須公和江練君王念疇昔臨遣尤繾綣公乎遂來歸密侍清閑燕坐寢淮南謀如彼雪帷見睥睨從容處侵疆歸古汴送曾無玷寺丞守池陽我朝衣冠盛名家數三曾南豐暨頴川後起叅温陵邇來騾川族駸駸著簮纓春風雁塔中叅差見姓名君才素頴出健筆泛縱横江右兩壯縣談笑政已成河陽桃李花武城弦歌聲入朝八九載去擁池陽旌年家有舊好一見意氣傾更因劉御史為君寫先銘去年少省郎君轉為寺丞中都但交謁名紙空毛生惟因候賔廡接膝傾交情分隂尤可惜翻恐到屣迎阿連幸為寮庻幾多合并寜知成勇退拂袖尋歸程秩滿素簡靜不足煩公行要當試盤錯操刀新發硎似聞有劇部或已薦長卿君其少停驂有詔來皇扄劉望之國録惠示文卷次韻為謝君聞三峽江湍流下無底吾聞岷峩山聳秀且千里坤維氣淑靈所産多名士髙文既鑑然特立亦卓爾久慕黄中劉近有貢公喜氣從蜀士問人物定誰比少年負竒節論事如翻水萬里見張胡義激非氣使賢闗遂為寮八尺見英偉諸君皆斂避相與推徳齒惠我春容篇句法叅子美再誦平生言作者真近似戰國信徒勞秦貪不知止漢唐取與守反覆皆造理藩鎮論加詳河朔分鼎峙詞源既淵深浩博渺無涘從今使諸生教育均䝉被論議歸正平辭章掃浮靡古人去已逺時毋分彼此君其挽之回續絃須鳯髓餞李君亮著作守眉山分韻得翠字天下大峨山雄秀盤厚地山雖不在眉所在擁空翠矯矯三蘇公挹此淑靈氣文章垂日星照映蓋一世李侯起廣漢射䇿叩丹陛裒然出羣英東南藹名字來上著作庭行入甘泉侍胡為把一麾西歸尋藥市吾聞此州俗秉法更陳義厚徳坐鎮之近古翻易治君家義槩堂活人百萬計老親懐故山色養謹承志還家萬里餘赴鎮夕可至不作題柱驕豈有晝繡意班班老萊衣人間真樂事忠孝兩無心出處固一致他日上思君命駕當不俟此别諒非久毋庸撡征袂送張定叟尚書鎮襄陽武部尚書張公鎮襄陽士夫莫不惜其去昔韓昌黎送鄭尚書詩韻必以來字祝使成政而來歸疾去而願歸蓋人之至情也而公自受隆委謂邊事非可趣辦願加久任庻有成績憂國而不為身謀聞者壯之某嘗陪郎省餞别分韻得壤字未能措辭繼又隨西蜀諸賢之後始得詳聞臨遣奏請之言被酒夜歸亟述長韻公家忠獻公勲名照穹壤南軒傳聖學後進斗山仰尚書天分髙百聞真朗朗日坐四益堂濡染助涵養小出輒驚世發譽自英蕩兩朝倚才辦三接氶睿奬堂堂尹京手風采漢張敞九街寢桴鼓終朝清訟缿汙流化清溝閙市鋤巨駔鈴齋晝無人士友厚吾黨政成化自行渾笑揮浩穰皇家重閫寄拊髀勞注想頗牧起禁中帝曰汝其往人多惜公去地位切台兩惟公不擇地引義猶慨慷諏度更周詢千里若尋丈再拜受臨遣因得進忠讜邊臣固多事備禦當素講要須久其任百弊隨剗磢願假臣嵗月表裏如指掌人材固不乏第一戒欺罔樸拙勝巧心好佞寜不彊願求忠信士枉植謹誅賞更須寛㘘䇿奏請應如響上問卿何先安靜最為上上憂襄漢間呉楚欠遮障公因論形勢衮衮到遜抗是時晉在洛武昌勢相向是為必爭地南北謹隄防今雖居上游事與古殊狀狂宼縱欲來無處可傳向況今三埵靜皇靈方逺暢與蜀相倚角國勢自爭壯尚期效尺寸才疎意非廣忠肝氣凜凜秋旻足排蕩上喜憂顧寛趣行開玉帳捐金示優寵諭賜煩上相惟公最得士離别俱惘惘薦紳紛祖餞直欲傾家釀賦詩冩胸臆一一成技癢家聲與國事負荷有餘量邊頭十萬兵公臨如挾纊吾聞胡運窮羣酋欲爭長不戢將自焚前轍有狂煬當為不可勝有和謹毋倡千載羊叔子制敵恢天網行將友斯人山川固無恙備成撫機動應煩䕶諸將功髙歸未晚㑹見登弼亮他時名父子繼踵凌烟像送鄭惠叔尚書守建寜十五年前送别詩道山持節向江西今年又見送公别大夭擁麾鎮閩越向來惜别固已深今日撡袪尤動心尚書自是第一人氣義相許披胸襟南宫平表平明入列辟傳聞俱聳立夀皇聖孝冠百王三復髙文天為泣擢處螭㘭寵數新果然百日掌絲綸拭圭修聘稱應變握節不撓威殊鄰直上銀臺尤振職李藩氣槩時批敕嗣皇鋭意新百度筆端真有回天力星辰聴履冠文昌急流勇退驚朝行望之正欲試馮翊長儒寜肯薄淮陽孤拙自憐銷壯志三入修門空負媿薦人不進終不已獨頼當時言有味公在猶歎一居州公去無人為王留公乎行歸佐天子肯休管晏卑微休送蘇夀甫少卿赴潼川漕老坡送江直入海君今歸尋江之源外臺去鄉若不逺為持使節臨潼川君家家世四海聞單于一問驚胡塵歸來便合上清禁胡為日念横峨岷賢哉羣從傳家風夕郎名節世所宗諸卿亦復載清徳况君又似尚書公夀皇念舊久更深聖明親擢傳王音君歸寜能及黔突定應召驛來追尋清獻入蜀携一龜君今數鶴同載歸他時未免蕙帳怨人在西清鶴自飛分韻送孫從之司業使湖南得千字夫君靜而敏十人已則千讀破萬巻書操筆思湧泉古事與今事一一探本源蚤蜚場屋聲作吏志益堅朅來上清班漢庭在在先雍容行必書史館躬槧鉛片言寤明主立使登諫垣拳拳憂國心傾倒十三篇司成天下選歸志已浩然赤日送妻子襆被尋豁船諸生慕陽城欲挽不得専竟持湖南節征袂何翩翩憶昨忝同登于今三十年朝行喜相㑹終恨非官聨請益殊未饜匆匆啟離筵始以長官來來以繡衣還書生素安分豈問卻與前第惟公輩流自應留日邊徳星聚南楚予環當茹連事體有闗繫臨岐欲無言送王恭甫倉部知洋州天清無雲秋氣明好風叢桂傳芳聲乃於此時送君行江空日短難為情蚤從兩川馳大名眉宇瑩徹春壺冰語輒傾倒心地平大篇小篇韶鈞鳴夀皇一見喜不勝璧水邊山照羣英潼川題輿逺有聲痛洗鹽筴疲民醒天子呼來再登瀛典領著作承明庭絶域往陪蘇子卿馬上談笑胡人驚歸來期君侍西清胡為西去謀専城士友重歎君不譍視此進退秋毫輕洋川風物天下稱文翁流詠人載賡當時猶待羣政成君今未到意已傾岢峩大艑秋江澄圖史萬巻鷗與盟殘編㫁軸恐飄零數輩装潢手不停我亦重來預彯纓三日不見鄙吝生況此撡袪將長征欲挽不留鴻冥冥賜環勿憚萬里程江山多助筆縱横黼藻王度扶中興題范寛秋山小景山髙最難圖意足不待大尺楮眇千里長江浸横翠畫家雜雲烟戃恍徒意㑹苟或森三尺便若俗子對此畫格律嚴興寄獨超邁洗眼映牕明妙處乃不昧流泉見原委著屋分向背推車度危橋指路向闗隘輕舟最渺茫浦嶼如有待山稜瘦露骨汀洲横若帶木蔕黄欲脱秋容儼然在霜餘無片雲厯厯數沙界搜尋因力疲欲賦無可奈近山才四寸萬象紛納芥欲識無窮意聳翠更天外江西李君千能能和墨及畫梅艮齋許以三竒而詩非所長也游藝無小大要皆知本原後人率意作終當媿前賢老潘妙對膠法從玉局傳或假季心名空掃干鐙烟補之貌梅花疎瘦仍清妍折枝映月影真態得之天李君信雅尚二者將求全諸公競稱許試之乃誠然江西有詩派皎皎俱成編兹事未易窺屬君尚加鞭分韻送盧國華福建提刑得華字盧侯場屋聲天馬騰渥洼殘膏沾後人竒芬􅄍天葩來踏九陌塵去種河陽花向來再去國盛山建髙牙平生長者譽靜篤語不譁古井絶微波璞玉無纎瑕使星照蜀道惠愛流三巴吏姦賴刮磨民瘼煩搔爬田里誦虚公兒童知國華白首尚郎潛坐曹如如麻翩翩擁軺車去去向合沙朝行惜君去與酒相邀遮共登獅子峯巨石臨唅呀郤來登湖邊野梅訪萌芽老栁掃黄葉枯荷矗寒茄碁枰戰文楸醉㡌欹烏紗倚昔送君行相去萬里賖荷君逺寄書得得來東嘉一見又成别感念成咨嗟羡君徑褰帷往戍不待􅆶先尋上水船何殊泛仙槎作粥喜奉姊上冢仍過家此計正未疎所恨成天涯尚幾或留行船皷毋庸撾題老融畫牛溪烟雨暝烟吹雨冥冥兩牛半渡深清京塵久汚巾履頗思歸濯吾纓慧元畫寒林七賢舊有唐人出游圖謂宋之問王維李白髙適史白岑叅六人多畫七賢不知第七人為誰或云是潘趙遙然未見所據病起坐攻媿齋元公忽作寒林七賢相寄余方夢寐故山見之灑然戲作數語謝之羣賢俱詩豪世代不同處安得寒林中聨鑣睇相語誰歟創妙意臭味無今古吾聞顧陸輩寓意或如許桃李並芙蓉雪中蕉葉吐元師師老融淡墨掃風雨作此寄攻媿歸興渺烟渚舊六今則七未知果誰與我欲從之遊詎敢厠儔侣畫我往執鞭欣為李君御李文綬和所贈老融詩復次韻為謝鄴侯插架書最多筆力雄竒天所命萬人深中深閉門理窟搜尋到幽夐我詩無律如山謳形穢豈㻣珠玉映時時歸入夢故山曳杖松間記投瞑因君佳句撩秋思便欲歸尋舊三徑兼旬足痺不良行況復炎蒸如釡甑夜來一雨洗河漢簷溜涓涓清入㕔晨興剥啄誰叩門乃有同聲喜相應讀之恍若濯清風自覺昏眸怯明鏡伊余何幸㸃班行結交往往多名勝夫君平處顧清新解道澄江如練淨從今我乃得四友不特官梅動詩興推枕裁詩謝髙致扶憊搖毫心靡定舊聞讀檄愈頭風今頼長篇起衰病次韻六和塔秀江亭壁間留題江外叅差列萬山我家深在萬山間好山正不用錢買但要未老身先閑長江比愁終似少江水能回愁不了扁舟何日過西陵鄮山佳處吾歸老跋袁起巖所蔵修褉亭悵望當時真蹟臨慕所在支分千載但稱合作誰能有感斯文定本為世第一此又在定定前今日錦標玉軸向來不直一錢送陳君舉舍人東歸皇天生人物千載非偶然冲和兼萬人始得一美賢夫君乃其人人一已百千飛黄欲追風況復勤著鞭文陣蚤奔放氣欲摩青天短褐東海濵名貫斗牛躔聞道更獨蚤自言若墜淵出登龍虎榜徑上鵷鷺聨中間幾流落清湘窮泝沿自首始為郎一見意已傳登臨上麟臺授簡游兔園擢為柱下史遂居紫㣲垣去天真尺五朝綱頼扶顛龍樓闕問寢萬口爭進言惟君最湧決螭頭屢直前危言破人膽三進加勤拳天髙聴亦髙歸决何翩翩髙風激頽波同列空慚顔君雖未必去一去勝九遷我欲留孔戣有懐不得專况我自欲去何心挽歸船嗟我生何為與君幸齊年先後才九日相與同氣然幾年若契闊班心忽差肩判花同代庖君思如湧泉上房草數制一房時一篇一篇輒髙妙隗始媿余先春秋隠公傳國史建隆編周官授大㫖所得俱未全聚散不可料餞别滄江邊君將處於陵我耕綿上田君行無疾驅中途恐傳宣不然遂能别孤㠶渺風烟夢魂不可制隨君墮中川次韻趙子野石城釣月圖石城江頭可憐月曾照六朝清夜獵古往今來知幾何長江衮衮蕭蕭葉謫僊去後詩盟寒王孫詩瘦清欒欒詩情浩蕩坐無奈扁舟笑把磻溪笑江平風輕波瑟瑟宿靄巻空天一色東風吹句入長安一巻風流坐中得初得神意清再讀胷次平回顧明月秪如故世上興廢徒分更想君一葉方掀舞夜靜水寒誰與語船頭有酒且孤斟莫向金陵重懐古戍溪道中寒潮髙于埭黄流濯西河人牛俱力壯相與衝流過潮落勢回禦轉櫂依丘阿暮靄起平楚隂雲翳寒莎夜分潮復上櫓聲相擊摩大江𣺌無津不知身在何餘生一虚舟兀然聴風波吾親白雲下況爾方卧疴逺遊非吾事歸矣毋蹉跎哭表弟汪去偽墓内弟幼而敏抗志欲決科一行試曹掾吏才猶患多謂當為時用舌在如命何通籍已難阻入幕終蹉跎我生依外家侵尋閲羲娥視君如同氣竹馬聲相和少長聨硯席詞場深琢磨相期到晚嵗杖履俱婆娑寜知五年别君隨東逝波憶同戍溪行我馬君乘驘馬駑費十駕驘俊已倍過重來意慘愴樹擁山嵯峩嗟君父與兄相望空山阿宿草埋白璧寒風撼林柯沈吟痛疇昔有淚如懸河次韻蔣徳要三徑居山或稱囚得閑乃賦謫我方樂靜退來作三徑客西山致朝爽膏肓在泉石況當秋空靜萬里看一碧呉叅議逹觀齋君不見大鵬與鷽鳩自適俱是逍遙遊又不見大椿視朝􅌲一修一短終期盡況乎秋毫為大泰山小莫夀殤子彭為天漆園老子超衆作立論雖竒定非矯鳬脛從短鶴脛長蠻觸亦能成戰場譽堯非桀兩置之讀書博簺俱亡羊世人顛倒名利途躋攀分寸爭錙銖河伯猶驚北海若井蛙醯雞何足誅試同萬衆走城市躍馬途行分賤貴卻登髙處望塵中但見紛紛如聚蟻暫髙猶爾況真髙神遊八表非矜豪寜能髙舉去人世勿以役役隨滔滔是知逹人有大觀蝶夢為周聊自玩翛然無入不自得處若終身仕成漫呉侯晚到東海濵飽諳世故無戚欣相逄一笑成莫逆似知我亦個中人送姜子謙丞於潛處則有超蓮出則將哦松眉宇無一塵出處皆雍容君看妙蓮花本出汙泥中兩松痛掃溉下有簿書叢汙潔無二致喧寂本亦同於潛今畿邑蜀道里通通至今存古意民風尚醇醲一邑既當問尤宜撫疲癃藍田文最髙後學仰韓公彼言蓋有激昩者但稱工成案漫不省丞哉豈真聾姜氏太嶽後夷門慕家風教子延名師列碑多儒宗宫庠既開荒書種慶所鍾換桂雙枝秀益見筆硯功後生日加勉衣鉢傳無窮君才有餘刃壯行氣方充功名此椎輪勁翮看摩空我歸幸同社棊酒時相從尊前不忍别吟愁夕陽春我家老揚州五記有遺蹤向來耕織圖為煩訪溪翁送從弟叔韶尉東陽阿連少也爽孤立生氣燄壯年淬詞鋒傾心事鉛槧膠庠困虀鹽世科終穏占再興蘭桂堂爾祖真不忝況將尉東白士友尚歆豔惟我愛子深老矣猶不厭固知為子喜頗亦動吾念贈子當以言苦口當針砭此邑子舊游厯厯數行店棠隂見郎君遺老喜窺覘其民最服義情偽靡容掩莫恃彩棒威要使慕巾墊子文多立就詞采更華贍吾聞得雋者塞門差反坫前賢最加謹臨用更重檢他時可待取天庭得錦吾家有素風耳目久濡染毋庸慕豪舉助亷先以儉湎酒更宜戒平地有深塹酣暢當有時勿習盃瀲灧將論毋過髙斯言卻防玷立節毋務竒躐等恐成僣外物思過分檢身但多欠勿嫌一尉卑封清尚為傔仕途固嶮巘大要進以漸不須若求知真知奏應剡向來湖海豪四十可收斂寜為處囊錐莫作露刃劍匆匆撡袪别魚鮮酒方釅刮目待子歸罔俾吾言驗攻媿集巻二欽定四庫全書攻媿集巻三宋樓鑰撰古體詩送制帥林和叔歸使君一何清鶴骨天與瘦少年場屋聲六藝飽芳淑一行起作吏所立已不苟立朝凜大節論事幾及霤發言必體國平正無矯揉藜藿為不採風采照宇宙出入有本末眼見凡三就來不為苟合薦召乃結綬去亦不好髙三宿除出晝天官豈不貴陳義堅素守贛川嘗報政復來守鄞鄮不求赫赫名實出龔黄右情為千萬端到眼輒空透撫民過嬰兒閭里息爭鬬姦胥及强吏時用霹靂手人誦南山判情通理亦究六合俱帖靜稱賛不容口律身至嚴冷無能掣吾肘吏事精且勤呼燭侵夜漏公退入家塾諸孫後來秀吏卒不識面雒誦出牕牖幾年南塘路來往困僵仆一朝平似掌行歌紛老幼公心信如水古井波不皺榮觀處超然軒冕亦何有翩翩欲賦歸排雲屢騰奏廟論終不許斯民方借㓂上心重閔勞詞官向廬阜闔境極攀戀人人懐杜母君看卧轍人誰能使奔走挽須不得留百拜願公夀老我幸同朝傾蓋已如舊聨事東西省交情久益厚我歸公亦來門户託雲覆黄堂間叅語惟我甥與舅揚旌鳴鼓吹賁此蓬蓽陋清談不及私翁歸況不受義命孰不知踐履或差謬惟公見善明力行真耐久有時相與言心同蘭茝臭撡袪寜忍别追送列觴豆公雖不好飲勉為引醇酎公去我亦隠菽水翻綵袖花溪𣺌何許望望幾雙堠千里共月明懐人重搔首惟應折梅花臨風為三嗅賦揚州伯父海檜潛虬拔地徑天矯騰挐勢出青雲表為誰猶向此中蟠坐閲春秋昏復曉團團圓葢月輪平矗矗蒼叢衆星小枯槎當面結生香外有霜皮細匀遶乃知造化有神巧散覺樛枝窮樹杪雖非直幹棟梁材怪怪竒竒樂幽窈獨秀海山臨浩漾駭浪翻空雲縹𣺌茁芽自有甘露滋弄影幾經霜月皎崢嶸老氣本天然後生矯揉何時了我家揚州真好事買歸但覺千金少夜半有力欲負之䕶持和璧終歸趙從來冩照無髣髴畫師欲快毫端掃解衣盤礴意慘澹卷起生綃色徒悄我來青邊立寒峭自憐氣與秋高杳倚笻一笑賔亦歡開尊相與傾清醥謂當好此如好賢為君三復緇衣笑時時來前看不足終待結屋平湖道跋綦北海扈從書事詩晉陽固自有髙共奉天豈可無宣公當時扶日滄海東尚想健筆驅長風指揮諸將如奴童中興内相當推功終待毋庸詫詩工制藁具在鑾坡中送萬耕道帥瓊管黎山千仞摩蒼穹顓顓獨在大海中自從漢武置兩郡黎人始與南州通厯厯更革不勝計唐設五筦如容邕皇朝聲教久漸被事體全有中華風生黎中居不可近熟黎百洞蟠疆封或從徐聞向南望一粟不見波吞空靈神至禱如響答征㠶飽掛輕飛鴻曉行不計幾多里彼岸往往夕陽春琉球大食更天表舶交海上俱朝宗勢須至此少休息乗風徑集番禺東不然舶政不可為兩地雖逺休戚同古今事變無定論難信捐之與揚雄四州隅分各置守瓊臺帥困尤尊崇髙牙大擁方伯鼓吹振響驚蛇龍漢家威名兩伏波盧丁以來幾宗工衛公精爽尚如生妙語況有玉局翁使君吏事素髙了明若古鏡磨青銅叱馭行行不作難平生惟仗信與忠布宣王靈萬里外益使向化來蠻賨頑獷未率宜以漸勿示駭政先含容平平之䇿用定逺下下之攷書陽公吏臣生長固安土尚當摩撫如童䝉屬僚宦游豈得已士多失職悲途窮名分尊卑不可紊更念何處不相逄官事既了兩無間可使和氣俱沖融鄉閭惜别情所鍾臨岐為傾琥珀濃手遮西日念逺去欲留奈何鼓逄逄願君穩度三合溜早歸入侍明光宫寄題髙汝一少卿識山堂廬山之髙誰不識欲識其真了難得往來山中最親切嶺為横看峯是側曾從彭蠡望山外識得山南昧山北山體如一本不動人苦求之愈多惑君搆一堂據溢城香爐五老皆嘉賔莫問前後與向背面目還君多識真君今與山如故人慎毋忽作白頭新堂中燕坐靜且夀君其於此知吾心侍仲舅同諸表游山來游大梅山陟山幾百重平行十仞岡俯瞰他山峯一步一步髙勢欲凌虚空左顧九地底樓臺鳴鼓鐘蓬萊反在下直恐船引風又疑海水竭洞見馮夷宫行行愈就順故步尋苔封十年舊主人相對如夢中清談虚閣上坐到夕陽春年來頗畏影掣身慕冥鴻入山非不深猶有行人縱安得更深處尚友荷衣翁未問梅子熟寜能噉青松庻幾適吾心餘生得從容大梅山此山名大梅驅車入山麓試問山中人山名竟誰屬禪家開道塲為説梅子熟僊家指為巖曾此隠梅福或云古有梅其大蔽山谷至今二梅梁靈鄉皆其族他山抗驚湍禹祠横殿屋三者尚誰慿禪師有遺族餘皆不可辨安得究圖録但愛山又山喬林間修竹金峨潄石亭溪聲真是廣長舌厯刦談空聲不絶不知來自何處山一意傾東忘萬折我欲潄石向水濱無奈牙齒搖落頻夜半寒聲到客枕只疑身是枕流人寄題台州倅㕔雲壑圖頃年登臨赤城裏江遶城中萬家市治中寄我雲壑圖快讀新詩眼如洗回思嵗月如星流念念飛空尋舊游披圖哦詩想幽致直欲携笻上山頭聞有於莬在芩蔚晚徑寒鵶敢翔集幾年榛棘蔽鼪鼯一朝絶境從中出細路雖非五逹康縈迴自覺阻且長萬壑風烟開絶頂一丘曲折於中蔵老砂射日銀星炯梅峽含風襟袖冷千巖髙下各異狀如障如鋒亦如領天景須慿意匠營山不在髙僊則名規橅已定力未暇他時㑹有滕王亭風濤隔濶天垂幕安得扣門應剥啄吟詩夢到故山川睡美不知鐘鼓傳王原慶新遷居南堂以古風求冩恕齋二大字并石刻次韻三槐諸孫有竒士才髙特未遇時爾作詩猶能備衆體短章大篇仍雜擬觧紛便掉三寸舌隨陸蘇張何足比鵰鶚猶未離風塵蛟螭尚爾蟠泥滓平生曳裾向侯門豪傑聞風親瞻企只今交游亦凋落凜凜一身嗟獨峙槐隂滿庭𣺌何在久寓瀛壖成故里瀕湖小樓太孤露何殊玉川洛城裏邇來深入作郊居髙屋好山成二美未能拔劍斬樓蘭幾欲袖椎摧晉鄙便將拂袖武陵溪誰能著脚長安市西門性急佩柔韋栁子氣髙戕曲几衡宇全似歸柴桑茅茨大勝居儋耳我詩非工字尤拙荷子愛忘剛見喜夜來縱筆冩恕齋自笑黔驢技止此更求古刻訪少作頗記醉中曾諾唯舊書紛沓費搜尋魚鑰未開塵事起呼童卷送三數軸僅可障風同故紙新詩鼎來亟予和顛字敢追張長史不須更投苦海中一笑以還隨棄毁徑須㩗酒登南堂朗詠白駒三四章又次韻投老歸稱前進士時與田夫相汝爾淵明賦歸何敢望曼容自免差可擬門前爵羅真可設老圃灌畦聊自比恕齋空洞最相親笑談頗覺清無滓時時過我共銜杯望望不來予為企丈夫未遇困泥塗誰識鸞停兼鵠峙方期從容結詩社相與浮沈向閭里一朝别我欲逺游欲入桃源深洞裏為言半隠欲偕行一子風流真儷美向來早有四方志行盡東南到邊鄙只今名利遂兩忘爭心無復於朝市秪有哦詩興未闌連得新詩照塵几調髙韻險不易和白雪陽春驚俚耳年登六十鬢未斑乘興一人若可喜宗盟莫逆素相忘並轡笑談無彼此湖海豪氣儘収斂以恕名齋幾一唯匆匆撡袪不得留巵酒未乾人欲起寄聲半隠不容言空有語離書滿紙歸時賡和必盈箱冩盡山川詩作史送子才歸深閉門莫問是非并譽毁但期逺歸亦升堂西湖仍訪老知章送鄭楚客司法之岳陽先生作賦真八吟髙處獨步無古今少從三山來四明一衿士子多青郡我嘗學仕六七載膏腹沾匄資之深竊名文場掌帝制至今不敢忘指南英英二子俱秀爽遺以一經無籯金長公奉母上巴陵念君逺去因論心見君詩編筆雖敏三嘆未見朱弦音此下似尚有數句為傳冩者脱去史清翁次前韻覔酒以金川玉女一枕瓶西安酒一斗送之次韻社中日相從此意豈不真其初定要約深期往來頻今年苦多故孤負四郊春清和到新秋其間足良辰而我獨抱疴未能㑹嘉賔道人得玉友風味尤可人思與君痛飲欲招復逡巡忽焉得新酒亟遣徑入唇别有酒一斗使使君意申我雖不敢嘗為洗胷中塵陳天成用東坡趙清獻髙齋詩韻賦適齋次韻二公晚辭軒冕勞兩齋莫辨適與髙嘗登雲山仰清獻平地著屋山周遭白頭適過適齋下釣游尚想隨兒曹方從家舅與俱隠野鶴誰能鳴九臯加我數年未納禄解去簮紱甘同袍世間此事要識破差去不可容一毫頴川尉僊賦長句數寸之管煩君操欲追險韻繼老老詞鋒尾鋭真吹毛舅家見詩勉續貂長松相倚慙青蒿我今無復望禄仕不應招我更由敖送元衛弟赴長亭堪場阿連生而秀二親所甚愛仲兄勤撫養遇時輒加誨幹蠱靜而辦胷次無卑隘今焉􅕄牢盆官宇臨渤澥毋謂官為小要使所居大毋言才可了檢身到纎芥我家門户重衣冠綿數代當以誠心求子視勿自懈亭民亦良民孰謂俱無頼官吏既擾之兼并責逋債熬波亦良苦樂嵗色猶菜輸鹽不得錢何以禁私賣所在積蠧久良法寖多壊吾聞不無述更當審利害熟視不為謀空餐媿難葢不應行一切遽使絶稱貸富者能寡取倍息久仍在貧者庻少寛公私可緩帶母年登九十家居幸康泰其家不從政禮經有深戒幸子去不逺時時可歸拜小别不足惜輕舟送前邁送從子沆宰鄖鄉小阮幼鍾愛長乃遭百罹風木既深痛棣華更纒悲所頼有吾子獨立守家規上有門户託傍有孤與嫠忽為麏國行泝江秋為期冬澇與夏漲漢水足險巘撡袪送子去風㠶不可羈城中楮為幣邑下尤可知定知公事少不必事作為用智正惡鑿大道本自夷家無壯子弟宗族各天涯幸有知己人方且把一麾四海皆兄弟言寮善待之眠食謹調攝家務須自持俸薄用宜嗇無使實漏巵此别動深念毋忘故鄉思一書抵萬金何時賔鴻歸送髙仲逺赴滁倅髙氏在四明於今為清門貳卿道素髙夫人徳尤尊子弟皆恂恂夫君更春温昔年奉慈親定省嚴晨昏今日當門户有愛深弟昆伉儷信縁合端良由性根門中有孤嫠極意均撫存與我親兒女次第了嫁婚不可解於心肯自以為恩不言而躬行後生熟見聞諸郎已秀發頴異有佳孫鄉評共歸重内外無間言公勤官業廣所至治不煩僊舟何遽西行行佐侯藩環滁皆好山風月當平分醉翁與樂全遺蹟今尚存況有賢使君易鎮方北轅公餘陪嘯咏相映如瑤琨生來仕平進自此朱兩轓從兄今鼎貴鼇禁兼掖垣君其繼英躅復収舊青氈老我得投閑平年接清歡同社撡君袪戀戀傾離樽梅風吹溽暑祝君尚加餐秋雨兀坐王原慶携孫吉甫菊花倡和見過有分遺之意次韻五載杜門居海角無復及堦賦紅藥自憐荒徑菊猶存夕餐空待秋英落眼明喜見緑叢叢始也抽芽今滿握扶笻著意養孤芳荆棘旁連細開斫天香入骨徐吐芬中有秋風非外鑠傳聞南堂有佳種願過屠門思大嚼頗亦有意欲見之此意末容兒輩覺乃知便許移芳根不止園官供小摘要令夀客來駢肩何用潭水求延年有時採之東籬邉不覺南山在眼前淵明千載幸同調老我此際方悠然西風吹花日夜急散金坐看開田田兩詩先到衡門下思向平臺尋戯馬從君九日去行樂莫為登髙淚盈把送王粹中教授入蜀王粹中教授赴新蜀帥尚書黄公之招萬里有行古調一篇贈别因誦所聞以求益雜然陳叙不暇較工拙也萬山四塞圍平陸大為闗中次為蜀我生東南未曽到蜀士游從聞頗熟自從襄陽上峻途髙欲登天下臨谷女媧大山塞空虛麻綫名堆千萬曲行人一升鹿頭闗下瞰平川如畫幅幅員二百四十里里出萬緡民自蹙向來陜西五路兵退守諸闗疆地促計臣權宜重増賦民力尚寛隨所欲爾來因仍七十年鬼不輸錢無雨粟民生哀哉不堪命外若富饒中不足益梓尚有繁盛風夔峽窮民幾比屋側耕危穫供稅租飯多稊稗無嘉穀朝廷謀帥弄印乆宣諭尚書剖符竹尚書當今第一流翁壻相望冰映玉貽書挽君為此行古人義槩非流俗君亦慨然挈家去操祛未免再三祝君行豈為温飽計一舉髙飛快鴻鵠丈夫生有四方志登覽山川非碌碌頃為假吏到燕山未行先取山經讀所至訪尋多得力中原至今在吾目北征西征昔有賦何肯從行空逐逐子西嘗因過峴山遐想羊公欲相沃闗右放賈眼拔鏃表留卒使癰潰肉試推此意向前去到處前人有遺躅五丁開山果何在贊皇籌邉言可覆劍門石角皆北向雪嶺界天望身毒髙皇將臺在漢中武候八陣留魚復棧閣繩橋世稱嶮威茂渡笮來夷族李冰離􅕞如厎柱大寧鹽泉若飛瀑四路尤多未見書買歸何止三萬軸黄松次功蜀檮杌石湖居士呉船録君宜豫攷經行地卻見所見書之牘幕中便可資籌䇿逺業因兹増藴蓄又聞渡瀘不在瀘南在沈黎卭崍九折是君家世尤當知藝祖按圖揮玉斧大渡河外等棄之本朝獨無南詔患一語決定無敢違成都郡庠千白袍後來之秀日益竒周公禮殿巋然在畫像盤古繼宓犧春秋奠謁用舊樂想見節奏并威儀談經酌史各専門學問可以相發揮康節遺書有傳者不惜師問窮精㣲先天僅得十二三聲音律吕無由窺更有異聞多細事試因餘暇質所疑青城大面訪仙跡普賢多變窮峩嵋街名棊盤路九逵江號濯錦如汙池古栢參天二千尺水滸鼎立三石犀藥有珂貝說尤詭字書不見栮與榿金堂鸚鵡掃孤塔蒼溪橘柚五出椑嘉陵梵像為最巨閬州城南天下稀少陵入蜀往來乆須行萬里方知詩我慙寡聞言又拙君其更為加詢咨老我無復為世用但當杜門待君歸歸期未知果何時時寄尺楮寛吾思山行歸來喜栽新竹平生好看竹毎見覺相與小大或疎密一一皆媚嫵恨無地可種所至造竹所近方闢門徑得地尋丈許乞鄰栽百箇參差正當戸天公有老眼恵以三日雨山行不厭泥但喜竹無苦歸來報平安翠葉多楚楚不妨來子猷奚必希蔣詡何當遶扶疎嵗寒與君侣小溪道中晚出城西門循牆過南境夏橋日沈輝旅店月成影納納出路遥聒聒水聲冷攲枕擁衾禂樂此寒夜永醉題魚屏五干買得見屏風白魚相逐菰蒲中俊尾潑剌有生意旁人未易分雌雄屏後諸孫更雍容濈濈無數迷西東我雖非魚知魚樂樂處未必魚知儂范牛人問吾何愛一牛范僊真筆倍風流繩牽雖未如自放猶勝更著金籠頭白醉陶内翰清異録首載開元時髙太素隠商山起六逍遥館各製一銘其三曰冬日初出銘曰折膠墮指夢想炙背金鑼騰空映簷白醉余愛其言取以名閣陳進道恵示大篇次韻處世難獨醒時作映簷醉年少足裘馬安知老夫味天梳與日㡌且免供酒事謫居幸三適得此更慚愧向來六逍遥特書見清異君家老希夷相求諒同氣曲身成直身朝寒俄失記醉中知其天不飲乃同意書生暫竒温難與純綿麗贈范緯文秀才括蒼范牛自題云中興道士范子珉異人也淳熙間武昌羅端良使君逺寄詩篇有贈畫牛范秀才一詩愛玩不能去手時時誦之以寫云亡之悲今十八年矣有范緯文叩門初談風鑒旋及墨戲事自言視子珉為大父行羅使君贈詩即其人也既試其說草數語畀之中興道士以牛鳴淡墨百果尤著聲妙入神品仍有靈我不識之欽其名曽得烏犍兩横軸又有石榴才一幅武昌使君舊寄詩末言秀才乃其族忽有緯文來款門自言真是當家孫口誦羅詩若翻水他詩厯厯俱能言一見前畫歎真蹟願得生綃奮吾筆為作來禽對石榴一掃横枝生意出我詩不工人已陳有詩豈復能動人為君一冩使君語更求知己如羅君送陳表道宰南豐與君出西郊送子之南盱子為名父子才器真璠璵乃翁老從臣循吏追兩都益公工擬人謂比王仲舒積善必餘慶於公大門閭子能傳家學何止讀父書執䘮真有聞孺慕乆不渝彈琴不成聲西上何徐徐文場嘗得雋一跌重歎吁通籍金閨中夷庚因少迂邑中有三曽聲名照堪輿士夫秀面文比屋多為儒萬里此發軔胸中有全模將别更求言老馬從問途乃翁同注出親誼崇終初以規不以頌不自知其愚民社非細事况此壯大區不飲第一䇿精神長有餘以此奉塵刹以此當萬殊何官不可為禍福皆在吾劇邑最為難謹畏可無虞試看悔吝者實惟予之辜民力乆已囨未免索稅租欲如古什一攻琴難吹竽古意行今法自應知樂輸有弊勿遽革有姦勿亟鋤責已重以周檢束到錙銖兩腳踏實地處事隨精粗頑不在斯民猾不在吏胥苟以明恕行乆之定交孚為善無近名實著名與俱飲啄信前定富貴不容圖三年報政成明時其舎諸老我世無用情親肯自疎盡此一杯酒惘然操子袪相依忽成别加餐意何如陳天成詩多和陳坡韻茲因寄喜雨詩走筆謝之一春垂垂困多雨雖曰如膏反成苦自知潦後必成旱果見晴天雨黄土連旬不雨已嘆嗟滌滌山川雲不吐未聞鵓鳩鳴屋角但有蚊蠅爭振羽一梅無望望重梅旱魃為妖無術禦閒居憂國徯雲霓夜夜三星正當户君王側身歎涼徳雲漢之詩無媿古避殿減膳率以躬已債縱囚真有補使君精禱盡誠意千里歸心稱杜母四郊神物招螉蜓所在疲氓加手撫風伯在今誠可訟已聞石燕空中舞時時小雨慰人心渇瓦流膏僅兒乳傳言望日當通濟老巫已得靈神語霈然三日果應期靡神不舉誰為主河流頓已復舊痕良苖喜見興南畆中宵愁念不成夢摩挲便腹眠清午從今一飽便可望坻京行見曽孫庾陳候忽就舂容篇徑遣長須入城府歎君健筆今已老不草敕書招贊普坡翁相去已百年時出新詩追步武六月十六夜觀月翼早紀所見成長謡海雲湧立雙鐵山明月正在山中間初疑渼陂藍田出水面又似長風吹度玉門闗須㬰雲過月愈上太虚㸃綴從飛翻白衣蒼狗不足究千變萬態俱可觀忽焉横卧如蒼龍驪珠頷下光團圓山河清影見歴歴桂枝扶疎若可攀夜深醉到鷄鳴起光景不類居塵寰長庚曄然朝曦發望舒猶掛西林端我欲呼吸晶華駐朱顔左有金丹右玉丹昔聞兩曜在天如磨蟻日行日止一度慳太隂行速朔必㑹金餅旋復成弓變八卦萬物盡闗繫厯古不已真跳丸急景惝恍難控摶但見霞彩生斕斑老我已復卦氣闌學道無成空自歎不如安坐委天順一聴運化更循環它山堰它山吾鄉絶境也屢游而不及賦近過其上得前四句而歸季夏鬱蒸午寂無事因足成篇寫罷長哦遐想勝地寖覺風生兩腋汙垢俱清比之陵陽冷語尤為逃暑上䇿也它山堰頭足竒觀百萬雷霆聲不斷誰把并州快剪刀平剪波瀾成兩叚四明山深水源逺衆壑㑹谿長漫汗滔天狂潦不少留瀉入長江勢奔竄賢哉唐家王長官欲圖永利輸長算想得慘澹經營時下上山川應飽看西偏千嶺相屬聨惟有茲山擁東岸遂於此地築横埭截取衆流心自斷斟酌利害不全取髙下參差僅强半水大十分七入江徐挹三分供溉灌支流瀰瀰穿郡城脈絡貫通平且緩旱時反此水亦足坐使千年忘旱暵無窮廟祀報元㘦像設森嚴人敢玩梅梁夭矯有冥助大患於今尚能捍前輩所作多神靈日月真成赤心貫後人小智或更易費盡工夫隨破散河堙盍浚謀不集堤斷河傾流甚悍富民縮手人受殃仰望古人重興歎老木號風波湛碧畫屏俯仰丹青煥更須積雨看驚湍濡足褰裳何足憚去家不逺時一遊短艇垂綸流可亂八月倘有仙槎來便欲乗之沂天漢林復之求為僧陳君舉為寫山谷與俞清老詩而和之次韻歸墨氣何銳為儒意何闌勸沮皆不可要惟心所安何必收澄觀强欲加市冠余看飲光衣以次傳阿難送秦仲防制幹秦郎相家子被服一寒士不味膏梁珍嗜書如嗜芰仕途樂平進欲上行或止制使䕶瀛壖婉畫幕中試不避癡兒譏但欲了官事君賢他可及好善無與比公餘仍進學訪問無巨細片言苟有聞必欲窮根柢一介有可觀窮閻必躬履老我甘投閒衡門人所棄惟君異時好時來訪生死淡交乆而敬清談或移晷一朝語余别操袪不容已向來二三公頗亦同臭味去去羣欲空今君又行矣欲歸投金瀬尚眷甬東水結交多老蒼要路有知己青氈我家舊勉旃取上第先聴傳除書使我喜不寐别後未相忘母愛書一紙送蔣徳常宰鄱陽棊社頗寥落聚㑹多差參矧如夫君賢貴重雙南金豈可無此君周旋相與深一别歸未乆征鞌又駸駸老我苦多病别酒難重斟操袪不可留贈言効規箴吾聞古番君甚得江湖心官無崇與卑時無古與今古人乃能爾斂袵當致欽我亦一丈夫毋謂力難任未暇言偃歌肯彈宓賤琴明恕加撫摩細故多親臨網密吏易姦賦重民弗禁飛鴞懷桑椹烹魚溉釡鬵此邦熟往來當有慰黎黔君能踐世科朝行佇朋簪公餘昌逺業書讀松竹林故家未見書校讎如向歆時時為尋訪歸來共書淫勿以三徑荒間作莊舄吟勉哉赴功名莫待二毛侵數年倘加我寒盟尚能尋題家蔵二畫一龍老龍卧海沙覺來未欠伸珠光發海底闖然目有神畫龍不畫全必雜煙與雲此龍未嘗動具見爪與鱗一龍望見之爭心生怒嗔奮迅勇欲前便爾雲滿身不知出誰筆定非塵中人若非親見之何由寫其真雲濤方洶湧恍若𣺌無津為霖㑹有時正爾良苦辛乃知青雲髙不如寂寞濵深虞或飛去什襲聊自珍一虎一虎弭耳行一虎立而顧猛鷙乃天資亦爾相媚嫵媚嫵尚耽耽況復逢其怒吾聞宣城包今古稱獨步投老筆愈精利牙爪可怖方其欲畫時閉户張絹素磨墨備丹彩飲酒至斗許解衣恣盤礴手足平地踞顧盻或騰拏窺之真是虎捉筆一揮成神全威不露此其真是歟為我振蓬戸藜藿將不採何止讋狐兔送陳進道倅三山陳候少有塲屋聲嵗在壬午聨薦名晚年倦游安里居君亦懷綬歸家庭齊年連姻更同社臭味相與如弟兄一朝話别欲逺去洗盞更酌歌渭城金沙樂土宜宦遊或謂不減洛與京平分風月信可樂人家弦誦幾連甍豈惟帥閫賴闗決定知秋闈望陶成西都外司掌宗盟須君共二為之丞勿謂為丞但虛稱享途要當自此升惟君儒雅聞簪纓種學嵗乆筆縱横奥篇隠帙了如響清談吐屑四座傾詩筒來往附郵傳時出妙語人為驚梅花萬樹照山白荔子百種輝空明九門雄尊盛官府三山森聳多地靈長樂一志書不盡平生頗恨未經行煩君傑句為摹寫逺寄使我心神清送姜子謙宰鍾離濠梁自古揚州域禹娶塗山城尚留鍾離雖嘗作椘縣子男之國書春秋卑梁爭桑起呉釁隂陵失道除漢讎嬴秦屬之九江郡典午置郡任愈優蕭梁尤重北徐鎮髙齊又為西楚州貞觀割淮疆理失元和加水號名修陽冰篆虎書戸冊竒畫於今照譙樓浮山築堰誰與謀漫引童謡為激溝役工沈鐵不勝計欲灌夀陽為廢邱霧昏三日水怪出一決空貽千古羞上格下格果何在西濠東濠猶並流守邉在人不在險險阻如故事不侔元魏擁兵數十萬義兵堅守竄其酋向來横澗一失據凜凜重貽宵旰憂刺史舊帶兩城使渦口兩城今不在君候妙年筆為投名位詎肯卑微休世科髙挹更膴仕哦松壯志未足酬欲効金城上方畧宦遊直到窮邉頭三光五嶽氣猶分故疆慨想何時收邑事不足煩大手往訪古今資逺猷老我無用重多病為君相與數觥籌棊社泠落故人少況復臨風送行舟看君徑赴功名㑹努力自取公與候又聞魚臺在近境誰知魚樂如莊周烽沈柝靜若多暇從容何惜觀游儵送潚丞剡川工部丞崐邱我生丁巳年比吾既逾冠再轉丞金囦年齡過半百奏子哦松軒親見覲小物如彼少壯然受輸導行費畧不取一錢飛糠至眯目猶恐勞弗宣汝方壯有室行行貳剡川地近既便親俸外有圭田惟當念爾祖奉職㒺不䖍邑無不當問事亦不得専退無為避事進勿至侵權莊生才不才其間要求旃去年苦旱歉榖熟殊頗偏未知催科時何取何當蠲一十七鄉民户口富人煙去天曽不逺媺惡易以傳大寧九十餘父母俱華顛況子勤幹蠱豈不深愛憐食禄須盡瘁毋歎我獨賢不應頻往來恃有檄可沿時時寄安書何殊在目前秋賦已復近公餘更加鞭金罍喜接境一水通鄉船他時尚少病尚能催擊鮮送王知復宰建徳筮仕一何早字民一何遲歴歴三十年中間多險巇宦途秪平進分寸窮攀躋最後官胄監一蹴黄金閨秪由能自愛風鷁甘退飛寧為紅蓮幕往尋武陵谿親黨多勸止君去獨不疑治家有賢媛應門委佳兒安居捨大厦列屋閒歌姬風霜登客路單車如雞棲勇決有如此端是英雄姿有志事竟成不後一年期明詔趣鵷班壯縣催瓜時嬴得為君子否泰相因依古郡足瀟灑年來困征追守宰俱賢明斯民其庶幾杭葦欲走别有足如繫維舉酒向西望離愁𣺌天涯惟君才素髙邑若不足為謂難易將至謂易後難支老我百念泠安能效良規猶記簿領初過庭聞舊詩惟畏為過寡惟勤無功虧遺訓儼如在終身當誦之題趙尊道渥注圖趙尊道制幹以龍眠渥注圖示余余曰誤矣本韓幹馬東坡曽為賦詩者此龍眠所臨而以後為前俾易之為書坡詩於後而次其韻馬實十六坡集詩云十四四豈誤耶良馬六十有四蹄騰驤進止紛不齊權竒倜儻多不羈亦有顧影成驕嘶或行或涉更相顧交頸相靡若相語畫出老杜沙苑行將軍弟子早有聲中間名種雞羣鶴無復瘦瘡鳥暮啄當時玉花可媒龍後曰去盡烏呼風開元四十萬匹馬俯仰興亡空見畫龍眠妙手欲希韓莫遣鐵面闗西看題髙麗行看子髙麗賈人有以韓幹馬十二匹質於鄉人者題曰行看子接處黄綾上書韓幹馬表飾以綾尾以精紙皆麗物也聞有懷金來取因命工臨寫而歸之再用東坡韻書臨本之後竹批雙耳風入蹄霜鬛剪作三花齊相隨西去皆良種撼首勢竄迎風嘶丹青不減陸與顧麗人傳來譯通語裝為横軸看且行云是韓幹非虚聲圉人乗馬如乗鶴人馬相語同呼啄中有二匹真游龍爬梳迴立緑楊風賈胡攜金贖此馬亟呼工人臨舊畫我詩無分到三韓寫向新圖時自看跋李少裴修禊序唐文皇之賜韓王有崔潤甫之題為可攷若李重光撥鐙書斷然無能效之者其為真筆何疑朱徐開皇之記則已見少裴之辨開元去貞觀未逺潤甫又職校定四部圖書以為最善本則真善矣辯才之本既殉昭陵今世止以定武本為第一又出歐陽率更所臨石本自應在墨跡之下則知此本信為冠絶葢希代之寳也然攷之新舊唐史崔湜弟液滌及從兄淮並有文翰居清要液至殿中侍御史液弟滌明皇用為祕書監出入禁中後賜名澄如此則液為湜之親弟而為秘書監者滌也又宰相世系表博陵安平崔氏仁師相太宗髙宗次子擢擢之子液吏部員外郎第四子挹挹之子湜相中宗湜之弟滌秘書監如此則液為湜之從弟又不為秘書監傳之與表已自不同而滌之親筆乃爾於是知作史與攷古之難也因併述之仍賦長句以副少裴好古之意蘭亭修禊永和中羣賢髙㑹俱雍容右軍作序亦寓爾藁草乃致傳無窮自言疑若有神助他日屢書終不同歴代傳寳在秘府尤其甚者唐太宗當時搜取極心力摹本一一頒羣公惟此真跡最竒絶蕭梁開皇有遺蹤親御奎文賜元嘉龍蟠鳳翥何其工辯才所取秘昭陵此本一洗凡馬空崔家兄弟列清要誨子況復稱龜龍圖書四部資校讎當時尚有貞觀風自云此為最善本冰銜臣液題甚恭李王深得撥鐙法筆力絶勁雄江東右軍以來皆妙筆名勝異代如相從病餘扶憊行掃松李君攜來為發䝉平生多看舊墨本一見使我開心胸摩挲歎息不自已至寳盍入明光宫隠居懷寳正不惡異氣或能牛斗衝叩門有客勿傾倒恐有御史來乗驄送鄭楚客司法之岳陽原本脫去此首據集目在本卷第十二首今從他本録補於此先生作賦真八吟髙處獨步無古今少從三山來四明一郡士子多青衿我嘗學事六七載膏馥沾丐資之深竊名文場掌帝制至今不敢忘指南英英二子俱秀爽遺以一經無籯金長公奉母上巴陵念君逺去因論心見君詩編筆雖敏三嘆未見朱弦音海濵熬波幸解組未知宦路多嶇嶔先生賦編更熟讀非止駢儷誇詞林其中闗鍵妙一世字字諧協如鳴琴談經況有諸述在持論肯為向與歆青箱但能世其業前躡雋軌將駸駸君家曽無錐可卓遲次幸此突不黔不惟母老身非少亷介又務循官箴量入為出可不謹斤斤饑食寒有衾非求多蔵第約已瓶儲紙裹迹可尋法曹持平守三尺平反一笑神所臨謹毋失已毋失人同列當和時盍簪上官善事免曠職首上尻髙宜致欽岳陽樓號天下稀地圻呉楚連衡郴洞庭漫汗天立壁君山當中出青岑向來命名字以楚宦游直到重湖潯登樓談笑領僚屬風流欣遇賢候任君行應得江山助新篇寄我毋浮沈操袪欲言不盡意更取濁酒從君斟太守任洙道原攻媿集巻三欽定四庫全書攻媿集卷四宋樓鑰撰古體詩趙資政建三層樓中層藏書危樓傑立潭府雄仰望驚瞿何穹窿擎以八柱眞良工恍如水天移海東扶闌三級横復縱八牕交映光玲瓏更上一層迥不同歴覽萬象俱空濛東南太白金峩峯西山千疊青芙蓉環遶不斷如犀風平疇彌望禾芃芃城郭市井聚螘蜂烟樹髙低知幾叢澄湖一片磨青銅潮來江漲銀在鎔海市三垂屬提封四山寛圍城在中地平樓小望易窮安得髙卧陳元龍麗譙公府難從容二閣均在道佛宮江山得助無遺蹤眼前突兀忽此逢主人幹國成棟隆鼎彞久書柱石功名遂身退兹明農卜築深静依髙墉百間朗朗羅心胷咄嗟不待鼛鼓鼕最後竒觀凌虚空牕戸未須濕青紅似聞盧陵周益公亦作此樓髙于崧相望落落見兩翁心匠不謀如影從我欲效顰意方濃一朝登眺若發矇不願侍公飲十鍾不願舞女紛歌僮挿架三萬牙千重此身願為書蠧蟲不然相陪夕陽舂與公憑欄送冥鴻再題行看子先引䕶欄毬子驄九馬逺近俱相從黑駒騧黄騅素騮亦有笏面仍銀騣夏國一種青于藍五明錯靴皆如龍或骖或引恣馳驟坐覺隱耳聲瓏瓏人間安得有此輩一一必自天閑中不惟骨相異凡馬圉人貴介多雍容三花翦鬛自宫様空鞍更以香羅幪中間二者蓋天馬齒雖已老氣尚雄不知幾出横門道雙立栁下青隂濃擡韁捽頷刷背膂旋梳騣尾揺清風人人生意馬欲動態度曲盡各不同韓生去我幾百年藻色尚濕青與紅不知何時墮雞林萬里逺在東海東賈人攜來得寓目一見絶歎丹青工千金可買真不惜忽復携去何匆匆亟令臨寫得形似如此神駿那得逢開元内外馬盈億色别為羣從登封韓生所貌定傑出七尺為騋八尺駥向來鶯邉繫金絨歸乘款段頭已童伏􅇫寧能忘千里卻笑區區據鞍矍鑠翁寄題吳漢英玩芳亭吳侯奕奕天分髙歴記萬卷無差毫青雲垂上忽歸去年來益收湖海豪志同三閭時則異玩此芳物亭之臯視彼憔悴亦何苦鼻間栩栩忘鬱陶詩文滿軸寄海嶠靈均細論無乃勞與君齊年況同袍秖今衡門沒蓬蒿有芳可玩便自適草間野卉時一遭蘺芷辛夷蘭杜若未暇一一追離騷詩文皆以屈平異同為言送孫子祥赴新昌主簿髙士不為簿子嚴論獨殊不遭何不可而況主簿乎夫君豈其裔南明筮仕初要知官無卑禄可代耕鋤正須勾小稽使民能樂輸矧復兼尉曹鼠竊隨除驅兩職去民近亨途此權輿君誠吾里秀質厚素有餘埋蛇有陰徳映雪讀古書起家決儒科鄉評足名譽妻以兄之子相與久相娛小别不足惜未免掺子祛邑境連台剡好山環四隅二子丞鄰封川陸通舟車乘輿或一往徑欲造庭除公餘想續文尤當惜居諸㑹看興公賦擲地金聲如送丞上虞我老不復仕行將掛衣冠兩子俱貳令官職恪一般剡川且書攷上虞亦之官人言易捧檄歸奉重親歡我意正不爾期汝政可觀食焉怠其事古訓戒捨鏝汝職與民親簿書當細看一邑無不問正爾良獨難江海帀三垂長堤捍驚湍埭髙幾如山潮至不留殘宣和有遺迹能使潮浸灘陂湖謹蓄洩可以救旱乾長溝濟漕運浚治令通寛此皆丞所職勿憚心力殫江頭有東山永懐謝家安邑有李與豐況復居二潘尚友更從㳺問學加研鑽平時固知汝亷謹無欺謾渉世終未深送汝能忘言故鄉去帝鄉舟馭多往還失已固不可待人亦多端罔求違道譽善遣非意干窮達自有時此理真如丹聚散不足較豈得長團圞閒静我所便汝其自加餐有時或乘興往來二子間踏雨送汝行浮家當㳺般走筆如家書誰能苦雕剜送伯中弟尉新喻伯父盛徳人伯中實暮子不惟能象賢氣貌亦相似幼日讀父書結字得皮髓粹然金玉姿少日期千里寧知游上庠蹉跎困門第晚始著青衫酸寒就一尉歘然報瓜時往戍眞樂事自惟羣從希惜别不能已中年重離别況我衰如此親故例作惡況復于吾弟兹行豈得休雅懐聊漫仕勿憚三年留江南富山水尉曹官雖卑去民最宻邇一日斯必葺職務毋少弛善保金石軀離觴且同醉歸來畢婚嫁相從期暮齒教子以義方忍貧授經史素業俱有傳見進未見止大兒方決科如摘頷髭耳子尚徐其驅中途聼㨗喜送張子宓分教澧陽澧陽𣺌何許逺在天盡頭頃為郡樓記圖志不可求王侯録故實頗亦費冥搜忠以申明著學有車公優外挹蘭江水下俯僊明洲讀書記羣玉採藥思浮丘況得子厚語謂冠漢南州見謂頗詳盡豐碑照城陬可憐城與樓百姓不知修乃知尚有遺家傳載鄴侯張君將客授蓋嘗叙其由為我謝澧人聊以遮前羞君家世為儒青箱襲箕裘太𤣥洎潛虚探賾深可鉤君才兼數器博洽誰與儔南廟推第一鵰鶚快九秋得官愈嗜學手抄不能休館殿要人物衆寳登琳璆演綸及視草如君真勝流蘭芷生顔色暫煩為逺㳺君方俟𤓰時相依意綢繆樽酒接從客詩篇更唱酬論文䆒今昔析理到孔周老我澹無伴掺袪不容留别乗澹庵子傾盖當相投公餘文字飲能思故人不送周君可宰㑹稽作邑誠匪易況子之稽山銀茜視兩赤朝家知其難鼎鼎數萬戸賦重民生囏山陵五雲飛辦䕶力更殫豫買萬世弊法貪至于殘越人瘠已甚當饋幾發嘆名臣為竭力減額宜少寛不齊物之情兹事終變翻箕斂及鷄豚詭戸多容姦竟未得要領條令何其煩通才善治劇南康遂通班誠心試求之要使後可觀古仕不出鄉習俗皆素􅈺東嘉嘗客授尋乃乘朱轓畧如仕故鄉非意不得干況昔攝邑久疾苦知民間故吏想猶在疲民知長官宜若差易牙未免送以言權雖與正同事體終兩般趣辦不計久為眞事多端遇事勿生風三思庶能安試登寛簡堂取我前碑看六一眞格言坐右當銘盤向來難奉母版輿今似潘外盡撫字勞退公悅慈顔蓮峯聲望重待子興門䦨勉哉發政譽行矣聞天闗錢清王千里得王大令保母甎刻為賦長句書家千載稱蘭亭蘭亭真跡藏昭陵只今定本誇第一貞觀臨寫鐫瑶瓊黄閍岡下得寳墨古人燒甎堅于石大令親書保毋銘況是當時晋人刻甎雖破裂文多全妙畫逺過蘭亭鐫其間曲水悲夫字駸駸欲度驊騮前我家阿連縛虎手更得退堂方外友王君系出三槐家參坐㑹文真耐久田丁初來獻小硯尋見津津若㣲溜細看背刻晋獻之永和彷彿在傍右亟訪田家叩所從始知墓崩隨意取大甎支牀得前叚掀倒浮屠全尾首字為十行行十二百十有七二字漏交螭方壺不復見貞石摧藏松亦朽我得此碑喜不寐摩娑三嘆歎未已興寧甲子十四周更閲三年仍乙丑若非洞曉未來數安知八百餘年後坡翁應未見此志金蟬之銘何絶類又知文章有暗合智謀所見畧相似二王遺蹤無所遺誰知地下此叚竒三君共為成勝事至寳呈露端有時越山盤屈獻與羲付與兒孫世守之煩君更為䕶幽竁或恐意如猶有知趙資政招賞川海棠次袁和叔韻少陵千古詩人傑毎見名花輙題絶錦棠無如蜀川盛見説千林天染纈大篇短草合無數忍對此花舌如結黄鵠銜子萬里來春光頗向東南洩橰間老子攜春歸移石鬱林表髙潔崇桃炫晝不足言紅艶燒林疑益烈棠梨小紅自退聼不待騷人定優劣兩登蜀道歸海濵一琴一龜全晚節嘉招容我到花下春酒新篘公自挈攀翻亂插人共醉十二金釵不成列袁安参坐為長哦同氣相求磁石鐵不須髙燭映紅妝佳月自能明作哲紅潮滿頰卧林間風流誰敢來分别泉口凈明院晝寢沙頭古招提往來幾經行兹來當春晝解衣愒西楹玉立青琅玕小牕虚且明紙帳白如雪牀輭枕更平偃仰四體適欠申困思生須㬰右脇卧徑入華胥城無人夢自覺閴然四無聲林間婆餅焦悠悠時一鳴翻身更從容意泰氣亦清連朝走丘壑百拜不遑寧老我久倦㳺幸兹息營營衰相益已迫世念日愈輕自欣天與閒身是半髪僧未能遂髙隱庶幾保餘齡賦蔣生若水番馬圖何處驅來良馬六騮黄參錯如花簇胡為不作騰驤去各有㳺韁縶前足胡人下馬俱少休背倚氈裘眠正熟酋豪揀箭奚奴撚意欲射麞不遺鏃琵琶横倚續續彈一夫坐聼胡中曲卧擁提壺將引飲英氣虬鬚皆貴族沙磧坡陀髙復低天寒不見寸草緑我行燕冀頗見之狼帽烏靴乃其俗勿云恃勇不知義要以赤心置其腹嗚呼安得壯士健馬咸作使坐令戎虜為臣僕陳表道惠米纜平生所嗜惟湯餅下箸輒空眞雋永年來風痺忌觸口厭聞來力勅正整江西誰將米作䌫捲送銀絲光可鑑僊禾為餅亞來侔細剪暴乾供健啖如來螺髻一毛拔卷然如蠆都人髪新弦未上尚盤盤獨繭長繰猶軋軋盱江珍品推南豐荷君歸來攜來東知君正直如羔羊貽我素絲踰五總僊禾本出從嘉糓色味俱同無餅毒鼎深熟煮葱豉香大美元來加臠肉有時飯素芼以虀饞口屬饜味更竒束晳一賦不及此為君卻作補亡詩盧甥申之自吳門寄顔樂閒畫牋年來吳門牋色澤勝西蜀春膏最宜書葉葉瑩栗玉賢甥更好竒惠我小畫副開緘粲殷紅展玩光溢目巧隨砑光花傅色濕丹綠桃杏春共嫵蘭桂秋始肅趙昌工折枝露華清可掬妙手真似之藏去不忍觸苟非歐虞輩誰敢當簡牘又聞樂閒君古篆頗絶俗併求數紙書寄我慰幽獨題申之寄示春郊畫軸郊原膴膴春意足細草凄迷芳樹緑雁鶩無數泛陂塘牛羊相與隨芻牧幾年不泛浙西船恍如蘇臺俯平川閒人憂國無他䇿但願好雨成豐年六言問天池寳華昔年曽賦虎丘猶恨靈巖未㳺天池之景絶勝寳華有水倒流老矣不復西去夢入陶朱扁舟煩君為我尋訪能以新詩寄不贈成都魯講書焯字叔獻君家江發源我生瀛之壖相望萬里外中間幾山川近聞今子敬文價驚鸞鵷何由夢見之失喜瞻在前幅巾聳英標銜袖出文編倒屣平生歡劇談河漢懸老我三入朝廣識兩蜀賢相與論諸公與君最周旋自言隱青城讀書三十年城中竹谿居肥遯逺市㕓清谿擁屋後緑樹環前軒一舟號横雪可泝復可沿拂衣下三峡非為名利牽灔澦追古作海潮賦新篇舊依橰閒公來乘甬東船顧我何所取有懐俱盡言老親苦多病嘗藥冀少痊佳客不容留欲著歸驂鞭間為惡草具願君少流連報無錦繡叚贈有朱絲絃一别無復㑹掺袪意茫然蜀山渺何許同聲惟杜鵑趙資政當山堂我公仁存心樂山心如丹平生經行處不厭行路難青城及大面萬疊連百蠻捫參仰脇息亦嘗坐長歎功成歸四明得地數畝慳城隅路窮際小橋水汪灣蕭條漁家市中有屋百間危樓俯人世一看山四環堂深無他景猶以城當山城荒披緑莎青青透橰間秀潤長滿門坐對無躋攀日夕氣亦佳飛鳥相與還終日看不厭徙倚十二欄有如擁泰華管窺見一斑況兹緑成陰連朝雨潺潺濃翠真欲滴秀色幾可餐我家但環堵窮年困彎跧出門得曠逺遥碧羅烟鬟有時碧雲湧半空聳髙顔須㬰輒變滅欲駐良亦艱羨公得佳趣容我游其藩悠然時見之重門勿令闗風琴淵明有琴本無絃白傅偏喜聼人彈不如空中風度曲隨風往來聲斷續非宮非商從君聼不中律呂無虧成大如角韻來孤城細似蚓竅蒼蠅聲華亭夜鶴圓吭清顫動長引寒蟬鳴或疑鳳咮叫霄漢又恐僊佩雲中行使具似曲無别調安得自在聲泠泠蛙喧尚謂勝鼔吹牛鳴猶以黄鐘稱絲不如竹亦漫語賴此七竅俱瓏玲幽人院静新凉生八風不問來縱横短簟六尺午睡足拂拂神來傳廣陵送袁恭安赴江州節推袁氏四世凡五公唐朝三相傳家風君家九代擅儒業髙曽藝苑俱稱雄大父謙尊古君子諸父名髙表吾里一門子弟更競爽挹取乙科自君始九江需次今幾年去去渌水依紅蓮忘年論交正相與叱馭欲往難流連老我秋来抱病久臨岐無由置尊酒秖從卧内叙離懐戀戀摻袪仍握手鵬程萬里兹權輿平時義方師有餘送人以言古所重雖誦所言寧啟予君看公孝與孟博太守坐嘯仍畫諾一郡之政賴闗决千里應須念民瘼鄉州義事煩主盟纖悉于余無隱情處事條理亦為政知君出仕當有聲尊公亦手閩中幕公退著書端不惡君才更得江山助簡書旣練尋家學君行逺業未可量弟兄丹桂終齊芳老誖無庸況多病尚能留眼㸔翺翔趙南仲寄王樸畫貓犬戲為之賦鬖兩狻猊胡為到庭戸細觀畫手妙摹寫真態度意足謝繁筆不待丹青汙亂掃腹背毛頭足巧分布尨也如愁胡眉攢眼光注豈惟足生氂垂耳紛敗絮掉尾固自若狸奴為驚懼側耳寔畏之衝目猶敢怒誠知取形似不吠亦不捕對之輒一笑聊用慰沈痼朱季公寄詩有懐真率之集次韻伊昔羊尹臨丹陽真率之名初濫觴香山尚齒當㑹昌卧雲不羨坐巖廊七人各列官與鄉年德俱髙世所臧丙午同甲遥相望清談生風想琅琅耆英人物尤軒昂賦詩逺追白侍郎文富歸休夀而康衣冠十二何鏘鏘吾鄉五老如雁行至今月旦尚推揚家舅仕宦接王楊眉夀遂及渭水姜我如傷禽趁鸞鳳忽驚騎箕歸銀潢向來雅約猶寳藏菜羮草具烹彘肪四皓中間有夏黄藹藹義風誇句章年來抱疴久在牀同社闊别如河梁君嘗逺宦踰沅湘又向封川憇甘棠瘴雨蠻烟暗桄榔何時歸安朝士坊忽傳新詩几生光斂袵正色而寒芒詩境幾成破天荒徐為續貂未須忙静揣歸期應未央歸縱未衰亦老蒼暮年甘與子同裳何事相望天一方呉少由惠詩百篇久未及謝又以委貺勉次來韻江右一世稱名公首出劉惔與王濛自髙直以天自況何止數仞言髙墉虚聲一傳實何在但知景附而風從我朝諸公門戸濶普納萬象如虚空羣才俱入大鑪鞴鑄人端如金在鎔又如東君一布令白者自白紅自紅巖巖千載玉局老少年徑以吾道東首干樂全次六一三公自是燕許宗奏篇六論初流傳四海一日俱承風其間傑出六君子香薰班馬猶為濃涪翁又分江西派作圖序次由本中哦詩作文各務實薦鶚不愧北海融坐令文物掩前代主盟豈非諸老功固知文氣僵湜籍亦許詩律沾徐洪宛丘諸黄接前輩宜有此甥風味同蚤嘗決勝翰墨場筆端豪健誰争工新篇句句多灑落妙畫字字真玲瓏惜哉生晚百餘載歐蘇之門久登龍尚兹踸踔未濶歩吞舟之魚溝豈容我方投老與世隔映牕愛景方曈曨十年屏居可羅雀何人來顧一秃翁儼然衣冠見吾子文書銜袖名自通向來兩卷餘百篇諷詠至今未能窮更攜大篇如拱璧刻畫無鹽賁孤蹤人言霜蹄騁夷路我今秋水凌三峯愛余過厚擬前良此事如何著得儂老我不入杞梓林嶧陽髙隱如孤桐平生習氣掃欲盡只有媿處著力攻子歸求之有餘師惟知歎息錦繡胸時時杖屨許來往庶可嵗寒相始終龍潭丈室一筍穿入露滿其上因賦之一筍入屋照座寒凌晨仍有清露漙益信露珠自根起正如真水潮泥丸厦屋不應為汝穿不肯屈節斜倚欄干霄拂雲已在望且復自保青琅玕旱久無水王伯容分惠桃源大谿泉將以長篇水至已雨走筆次韻七十老翁門晝閉終日蕭然無一事卻因不雨動衰懐擁笏黄堂與祠祀兼旬旱涸舟不通井泉欲竭知無計僮奴抱甕叩比鄰水不得清僅無滓舊時見説横谿源有水側出萬竹前攷之爾雅名汍泉頗思走介分微涓去之一驛不易到午暑坐想空垂涎不知何人剥啄叩我門惠以小罌童稚驚相傳啟封一勺挹清泚烹試茗碗真増妍況當精禱已孚應三日簷溜傾潺湲病中一笑誠莞爾城闉安有泉如此吳松四橋思陸羽白帝城西歌子美何用中􅍽取揚子已覺清甘氷入齒前人所品殊不定一下一髙隨所喜老我住世能幾年引飲一瓢幾子淵行見甫田取十千坐使逺近俱安然欲和大篇不覺沈吟久擊鉢成章慙敏手送瀟宰富陽富春富山水地勝雄三吳壯哉十萬戸畿邑拱行都大江横吾前上下萬賈趨吾子丞剡川攝事姦已鉏試縣力愈難勉旃立規橅治縣古有譜近頗多著書橰閒愛汝厚誨語皆良圖老我不惜别所望安官居汝亦頗練事正恐才尚疎我以熱肺腸有求應所須遇事費十思一跌真不虞雖當從心年兢兢矩不踰況汝年方壯勿恃才有餘據輪始窺井任誕寧失居三年待汝歸二親真倚閭又送從子漼二孫吾所愛别去殊闗情阿剡將賞延伴子性亦靈煩子善誘之他日使有成公餘松竹林共勉雒誦聲寄題林宗山巢龜彼澤之陂蒲與荷有美一人傷如何潔清如許豈不好紉蘭綴蘺何足多七十二鑽無遺䇿不靈于已徒遭厄人生何用千歳為願似巢蓮足清白送趙仲禮守天台橰間社稷臣卷藏經濟手功名付諸郎秀出諸公右大見倅東嘉洗印去未久次子鎮赤城急流去何驟二者皆為親欲奉喬松夀況有戲綵堂可繼清獻後鄰封尤便養榮侍各錦晝春風扇㣲和安輿雲出岫家傳吏師法從政于何有還歸鴛鷺行金印當繫肘向來嘗佐郡山川若僚友南渡多北客風味中都舊士夫喜公來紛然送馬首其中多故知頗問老夫否贈相手文李道生有文在手縱横殆天予其間動成字往往傳自古舜褎梁武武老十子貢五季友太叔虞仲子竟歸魯仲弓有鈎文宰我亦握戸敏士自文雅習道本因輔鄧淵彭城符瑣瑣不足數李郃陶士行三公皆定數白帝矜竒瑞見笑漢世祖何為言禍福歴歴如君語自言傳希夷妙處勝貌取見手知國封況此細紋縷研油燎栴檀始見掌中虜何如一覧頃坐談樂與苦老我縮袖間不復煩推歩子其訪城中英傑在何許跋余子夀所藏山谷書范孟博傳山谷晚在宣州或求作字山谷問欲何書則曰惟先生之意山谷許以書范孟博傳或謂南方無復書山谷曰平時好讀此傳遂黙誦而書之舊聞此説又知在上饒大夫家願見不可余子夀來入制幕博記善屬文偶談及此又出摹本及尊公跋語始知其為先世舊物也爲賦長句宜人初未宜於人菜肚老人竟不振承天院記顧何罪一斥致死南海濵賢哉别駕眷遷客不恤罪罟深相親攘攘不容處城闉夜遣二子從夫君一日攜紙丐竒畫引筆行墨生烟雲南方無書可尋閱黙寫此傳終全文補亡三箧比安世偶熟此卷非張巡巖巖汝南范孟博清裁千載無比倫坡翁侍母曽啟問百謫九死氣自伸别駕去官公亦已身雖既衰筆有神我聞此書久欲見摹本尚爾況其眞輟公清俸登堅珉可立懦夫羞佞臣葉處士寫照頃在朝行葉處士光逺為余寫照置于山林中欣然自贊有云山林如許盍歸去蓋志于歸也一歸十三年既掛冠再寄一圖為老人星狀形容變盡非復固吾矣戲作長句謝之我老舊曽官日邉隨衆年除仍嵗遷母子日夜望鄉國但欲共耕綿上田棄官寫照妙一世畫我形模在山水有如虎頭貌幼輿正合置之巖石裏猶記有客為諛言盍更野服為貂蟬我笑不答心不然拂衣徑得歸林泉歸來嵗月不知久十餘年中何不有此心炯炯尚如丹只為幽憂成老醜久矣與世俱相忘荷君念我應老蒼新圖白髭添一二豈知雙鬢皆成霜兩圖對掛耿相照顧盼從容成一笑更添松竹作夀星我已甘心就枯槁人言姿態與真同如照止水窺青銅明知己非故吾矣小孫指㸃能呼翁君居天街號稱首侯王生面羅左右邊頭飛將新立功颯爽英氣照牕牖名滿四方求者多千金造門君不呵能事固不受促迫應酬雖繁可奈何胡為有暇及衰朽楚楚裝潢意尤厚我今已是行路人不須重累丹青手送宣宗禹保寧軍掌書記宣之為姓世所稀暇日試為君家推宋之宣公舍與夷子孫相承此為基或云出自魯宣伯元和姓纂言則非西京功臣虎與義侯封累世皆宗枝盛哉雲陽宣巨公光武稱其勝二龔酆為司空懐在趙遥遥久矣無亢宗君家本自太末來世以儒術為家風尚及瞻識諸父行君方髫齓成孤童艱難歴徧屹中立五行俱下攻時習自從一登賢士庭貴名日起人誰及舍選真似青銅錢一躍龍門浪三級吾鄉驚喜破天荒歸見朋儔愈謙抑寳婺古郡名浙東往泛緑水依芙蓉如君入幕假途爾及今民事宜加工亨途萬里才發軔掺袪勿使金樽空從今家聲當愈大坐使宣氏崔盧同攻媿集巻四欽定四庫全書攻媿集巻五宋樓鑰撰古體詩林和叔侍郎龜潭莊林和叔侍郎永康别墅龜潭莊以蜀中烏絲欄為寄使賦詩而書之頃年曽記逰花谿宗樞潭府谿之湄徘徊其上嘆秀爽宜有英才瑞明時巖巖林公天與竒勁氣不為金石移少以六藝鳴上庠游宦所至英聲馳瀾翻薦口徹旒冕通籍直上黄金閨出宰長城如卓魯至今遺愛人歌之入朝一冠御史豸臺綱振厲先光輝光宗聖度如天度俾承舊制形宸奎言所當言公不屈上書抗直深倚毗歴居三院上横榻首尾獨擊及四期擢居小天不肯仕逺指章貢把一麾政成召節不旋踵神與清漲促公歸代言批勅節彌勵藜藿不採非公誰竟以松班分制閫海邦雖陋不鄙夷撫摩赤子厪一稔功利及物難周知公方在臺我立螭臺省相望心事齊皇上初政公賜環我居青瑣公紫薇時平論事同努力寄名雷霆如恐遲我求外補徑投閒公亦出闗喜相隨受㕓親見賢郡侯攀轅卧轍同旄倪公時自謂二宜去吏民猶誦三不欺棠陰蔽芾勿翦伐萬人來往城南隄書來不復説餘事頗言别墅躬鉏犁頻年日渉愈成趣去家三里共游嬉首崇御扎極尊閤又以副墨登之碑非欲自詫稽古力鋪張聖徳彰仁慈猶記殿上爭挽衣咫尺龍顔犯天威坐以漢法當粉虀廷臣就列仍紳緌箧藏常裾不容毁如以折檻存軒墀公嚴十襲我書榜老臣追往空涕洟吾聞一潭浩深緑上有怪石形如龜是為古麗最佳處地藏天作公發揮大谿横貫地坦平演迤明秀山四圍十峯歴歴可名數餘如芙蓉聳天涯獨此一山亘里許中立壁峻難攀躋堂名娛老正東南比漢二疏公庶幾海棠炫畫遶欄檻細數嫣紅遍繁枝雜花滿地秀而野何殊迂居洛師千嵗靈龜巢蓮葉祝公耆夀登龎眉桃花源杳號霞隱木奴霜後黄金垂深可藏書曠可射初篁細香臨月池狎鷗渚邊鷗為下觀魚梁上魚不疑懸崖石横筍斜出拒霜為城媚清漪公既垂車棄軒冕鴻飛冥冥不受羈超然但欲適吾意抱甕直欲心忘機我雖未到景畧序盡録無心圖畫為花朝月夕景何限想見晴好雨亦宜落霞孤鶩映西日多少空翠仍烟霏此雖見之咏不足强欲著雨是耶非兩守寳婺行或止無由徃叩山中扉舊聞趙公訪歐陽千里命駕如呂稽清風明月兩閒人萬口猶傳樂府詩我雖掛冠病雙足頌繫一榻當炎曦荷公雖若魚相忘尺書時來自緘題屢索鄙書懶未暇又恐境勝難為詞兹來督我語益峻逺寄蜀絹欄烏絲為吾贈詩仍就寫欲待相好無時衰想像試作髙堂賦身知難往心欲飛才固不多老更盡況此病瘁神亦疲不如及今為公作語成不工不敢辭兩家子弟向後日庶幾二老同襟期次韻黄文叔正言送日鑄茶龍圖正言年兄寄日鑄貢品且以東坡詩中妖邪奴𨽻等語為病使為直之既與佳客品嘗比平日所得者絶不同仰嘆鍳賞之精也細觀坡公和錢安道寄惠建茶詩一時和韻反爲雙井所牽後在北方和蔣䕫寄茶則云沙谿北苑强分别水腳一線争誰先又云老妻稚子不知愛一半已入薑鹽煎人生所遇無不可南北嗜好知誰賢死生禍福久不擇更論甘苦争媸妍則是此老初亦無定論似不必深較輒次前韻聊為日鑄解嘲以資一笑古人養老食而酳後人既飽須啜茗唐稱陽羨顧渚茶惠建之名猶未省小團花􅙧矞雲龍競巧争妍動天聼要之造化生萬物甘苦酸鹽適其性古來水品多異同茶品知誰得其正芽新火活善調湯種類雖殊俱雋永坡翁立論亦疲當一貶一襃何太猛北苑固為天下最未必餘茶盡邪懭越山日鑄名最髙種在陽坡性非冷父老不堪痛摧抑待以奴隸心若鯁草木端有地所宜此品標竒惟一嶺秖應雜取應人須寖使虚名成畫餅坡公殆未識吾真真者如珠光自炯白頭拾遺辨真贗非是容心為鄉井寄來雙缶妙絶倫病新嘗信僥倖七盌自煎成水厄笑看腹似支離癭長生草我方髫齔時已復見兹草仲舅尉江陽奉親顔色好牕門掛經冬珠絲罩輕縞意為霜雪殘白花乃明杲世間三友外此有嵗寒操年至十七八童心如木槁隨時到柯山逢人細訪考買之野人手何須訪蓬島嘗為伯氏夀作詩頌難老經今五十年得自江南道老我日就衰嵗月豈長保一笑哦子詩猶將伴棃棗又次王㳟叔韻仲冬方寒荔挺出仲夏方炎靡草死若將朝菌北大椿相去何啻千萬里金芝僊草不可見長生之草畧相似少時曽識青青色今日得之乃真是天工矜憫輕喪生故出珍苖普相示若言神僊可學致自是未得養生理人爲天地最靈物野卉無情猶若此石間薜荔水昌陽巻柏生崖并葛藟是皆草中號長久末見懸空解葩蘂柯葉不改耐嵗寒土著青松那可擬不須丹砂訪葛洪毋用僊方傳李耳未知此種誰為傳烏有先生子虚賦寄題閬風劉允叔月波浮海思乘桴拾月或掛席何如閬風僊渤澥坐中得隱几時觀瀾黏天四無壁清夜水不揺孤蟾浄沈璧飄風一過之波光湛空碧萬頃玻璃田蕩以黄金液我欲從之游尚恐一層隔何當擕珍茶石井試餘滴題楊子元琪所藏東坡古木東坡筆端游戲槎牙老氣横秋笑揖退廉博士信酷似文湖州同倪正甫尚書㳺西湖靈芝寺臨西湖倪正甫尚書曰此湖如賢者别久再見儼然如昨感其言而作舊說西湖比西子君言西湖似賢士吁嗟契濶十五年一日相逢祇如此南山北山兩髙峯春波灔灔摩青銅未能蕩槳窮勝處倚欄一望開心胸老我掛冠隱田里豈知再見烟連水小須夏日醉滿荷脱屣東歸甘已矣贈犁春謝耕道歸耕十三年此來殊欿然一犁正春雨君行欲何處我方買紅船重歸尋舊㕓君亦早歸來勿荒負郭田訪李國器于包山同登寺後山庵訪客包家山相與登層顚嶙峋巨石中屈曲扶欄干夜來雨初過石罅時涓涓輕輿到岡頭大江横吾前亭午潮方盛千艘散平川道人茅三間花木羅後先朅來汨京塵曠望為洗煎山斷塔層層西陵渺蒼烟此道走邯鄲歸心更翩翩謝林徳久正字惠詩次韻老我甘投閒晏然十三秋兹來何所似反衣狐白裘京塵素為緇夢想思首丘低徊未成去黽勉終自羞久聞歌楚騷欲見知無由詩文惠盈軸一誦消百憂便當細論文夜雨同春蒭平生萬事了此去復何求尚貪未見書痛洗千斛愁得此不翅足擕歸老先疇次韻東坡武昌西山詩讜論一興誰可回賢路荆棘爭先栽竄流多能擅筆墨囚拘或可為鹽梅雪堂先生萬人敵議論磊落心崔嵬向來羅織脱一死至今詩話存烏臺憑髙望逺想宏放眼界四海空無埃黄岡踏遍興未盡絶江浪破琉璃堆漫郎神交信如在石為窊樽勝金罍鄧侯先曽訪遺跡銘文深刻山之隈山荒地僻分埋没二公前後分莓苔元祐一洗人間怨天地清寧公道開玉堂同念舊㳺勝筆端萬物挫欲摧時哉難得復易失弟兄逺過崖與雷北歸天涯望陽羨買田不及歸去來我為長歌弔此老慟哭未扺長歌哀盛山十二詩俱在石刻而不見于諸公集中唱和之盛未有如西山者舊軸既不知所在後來跋語亦僅存録本爾輒不揣和韻以寓弔古之意仍效周益公用翰苑印章重嘆二公俱曽佩此也次韻雷知院觀因詩因叙家中銅像之詳鼻祖家住江東邉推擇為吏心静淵朝朝趨邑過圯上時見暗磧光煜然平時奉佛心至謹建立塔廟崇諸天試令便介識所在退公始得來其前揮鉏去沙若有物微見銅像傷其顚須㬰衆覩全體見端嚴相好巧且堅迎歸供飬備精潔我家舊物猶青氈銖衣飄揺俱梵相珠纓垂裊穿淮蠙雖非丈六黄金身他處像設無能先不知何人妙陶冶㡳用五色増華妍自兹累葉永為寳如以衣鉢更相便是時承平最盛際正在景徳咸平間畫工難貌天人妙劫風不動神光圓益知佛教來已逺徧滿震旦尊金僊慈悲無量應成禱影響若與人周旋耳則聞音目可觀此有妙理誰能詮寳光燄燄擁身後貝花葉葉俱成全頂戴天冠工莫及中有一佛立不偏有孫是為鄉先生決科衣冠遂蟬聨大父持䘮久廬墓曽以此事形碑鐫起身月卿出為郡殿上寤主以一言易守鄉邦凡五年寵光赫奕當政宣移至湖心值兵燬精廬灰滅因亡焉初聞諸父話遺跡興歎欲見無因縁揚州伯父初賦歸慨念孝感如參騫零丁募以十萬錢里巷響應慶愈綿木工先為小臺殿居以古像小之旃後人事之加篤敬日裊香篆長蜿蜒衰宗幸有此竒特信知福利非唐捐安得東歸奉香火晏坐終老甘三椽桃園圖夷堅丙志載桃園圖畫事甚詳曽茂昭尚書以所藏墨本題識其上後見遺余益信夷堅之説不誣作長句以謝桃園初傳武陵谿靖節作記人不疑其先深避嬴政虐嘉遯與世真相違尚不知漢況晋魏子孫綿逺無終期正如三韓有秦語傳為神僊愈難知桃園洞府漁人窺别有天地均四時意必志者塞其谿不然將為世所羈後人想像作圖畫但見耋稚咸嬉嬉人家隨處成井市畎畝頗亦分塍畦井鬼不照坤之維方士異人多崛竒筠籠二版堅如鐵能刻景物窮纖微浄室給以酒盈斗一昔圖成了無虧同寮欲求第二本版忽震裂人已非夷堅作怪言歴歴何意今乃親見之未知桃源有此否此事茫昧不可稽初疑長房縮地脈又似照影歸摩尼巨麗寫成阿房賦牽連貌出連昌辭采女細數七十二人言霓裳舞羽衣樓閣玲瓏在縹緲其間恐有太眞妃刻畫工巧世固鮮磨以嵗月或可為彩鸞唐韻已甚㨗未見神速能如斯尚有漁舟傍階遲咫尺安知前路迷天聖已踰三甲子何人寳藏至今兹南豐丈人惠墨本老眼増明失昏眵固知凡蹤不可到一夢遊僊猶庶幾祕之十襲何以報贈子相好無衰時吳山井寒泉堂道流王徳正屢求呉山井記而臨安圖經所載甚畧無可考證賦長句以遺之錢塘東南一都㑹西湖宛在髙城外鑿為六井引入城唐相鄴侯功尚在吳山横亘城中央左右江湖盡襟帶寒泉迸溢清且甘發自靈源匪分派天目兩乳龍鳳來秀氣所鍾此其最海濵斥鹵潤作醎安得一泉獨滂沛四朝駐蹕八十年民聚五方真衆大抱甕桔橰萬夫汲飛泉仰流筒吸快大旱不乾潦不溢數里頳肩競分賣人言神龍宅其下濟物陰功至今在川澤固多資灌溉此井猶能濟闤闠皇家徳澤如此泉福祚與之俱不改代書寄内弟耐翁總幹我昔生外家半世猶相依至今連牆居日日相聞知諸表如羣從休戚眞同之耐翁生而秀愛惜從兒時文采既俊發吏才人共推低徊久選調毎毎為嘆咨兹行佐王人未到聲已蜚郵置屢得書論事語益竒使長首推薦婉畫多所資近觀㑹稽編分析及毫釐益知足心計薦書徧諸司正欲助才選非敢請以私惜君年欲侵正以逺大期得書再三讀惘然増愕眙非所望于子所言何背馳江湖兩路間弄兵分潢池羽檄以時至廟堂日三思調度供軍需發兵帀四垂吾事誠可慮彼亦安能為豈曰白頭賊指日當誅夷使子任賊衝尚望羽扇揮如何隔千里遽來奉檄歸長沙屹巨鎮洞庭渺無涯鄂渚屯重兵上㳺藉兵威當思深逺謀胡為先自萎此言及同寮必為人所窺歸以語閨門徒驚妾與妻無端使禀議在此何為辭望子置私憂志立官無卑張巡起縣令力拒百萬師逆徒哽喉牙蔽遮賴渙濉韋寛守玉璧臧質全盱眙丈夫立節義有才尤當施殺身以成仁致命須見危讀書不念此萬卷終何禆但當安義命前定無參差勉哉盡所職造物不汝遺況復受國恩當與相維持今子仕髙沙偶然脱危機正須加義方豈應使同斯向也未得禄遑遑不自支既入紅蓮幕圖進亦其宜今日寧為民此乃無聊詞歸來事若定又思登王畿胸中空擾擾禍福不在兹倘能悟愚言便可知昨非著枕必安寢食淡甘如飴老誖非强聒鄙見不可移少安常毋躁通籍看金閨題汪季路家藏吳彩鸞唐韻後舊説僊人吳彩鸞日書切韻歸毫端不應神速有如此令人至今疑稗官相傳此事三百載誰知眞蹟儼然在筆精墨妙信入神間以朱丹倍晶彩法言初為此韻時賸裒文字覺後知寧知遂經謫僊手諱字曽闕民與基經生矻矻盡精力摩以嵗月或可得動翰如飛猶恐遲一日一揮出心畫神僊之説云渺茫僊凡配耦尤荒唐簫史弄玉乗鳳去藍田空説容裴航文簫之遇真是否豈比虚名傳不朽五篇歴歴為全書始信傳聞是真有當時所直才五緡于今千金價未均十年蓋有數百本未知幾本傳今人惜哉字畫太纎細後日傳之知幾嵗秖今已有字不全欲鐫翠珉固非易我踰七十方見之暫借一觀聊自怡平生願見心便足何必更謀身後為隋開皇初陸法言與劉儀同等八人論具音韻燭下握筆略記綱紀至仁夀元年始成切韻五卷比之前人韻集韻畧音譜等書已不羣矣後有郭知立等九人各有増加惟天寳十載孫愐唐韻最著今世所行廣韻則皇朝景徳祥符重修遂至二萬六千一百九十四言而集韻又在其後也今以廣韻較彩鸞所書東有十七而此本止三字同有四十五而此止十九公有十三而此止于八䝉有二十七而此止于十二注文亦多不全況法言及愐二序今該立于唐韻之前彩鸞所書既名曰切韻又首書法言之序則其為法言之切韻明矣傳記已誤曰孫愐唐韻今亦多以三書為一或至謂廣韻為唐韻而彩鸞能書之是皆非也且五篇其四皆于其首書凡若干韻而于上聲獨闕序中辛得源偶言旁有闕文後人遽以東字足之為諫議非也葢諮議云題汪宏輔三馬圖玉花流雲照夜白開元尚想行九街韓李鄭君俱已矣健筆誰能如順齋樞密府雪後作故韓氏子舍也平生好流水雅欲臨流賦澗谿或過之眷眷不能去青山圍故鄉不肯入城府寧知開八表重來尋故歩勢家遺故居傳舍偶成寓軒楹立竒石巉巖髙丈許三面立屏障曲沼水深貯荏苒將半載未見有時雨新春積雪餘簷聲夜如注曉起推閒窻石穴水噴吐下穿玲瓏餘數尺成瀑布髣髴小龍湫雖㣲體畧具退公輒對之相逢歡遲暮有客與同賞酌酒更告語雖云京塵深燕坐得幽趣懸崖掛長藤絶頂列佳樹㣲風一披拂墜㸃紛無數吾方謀乞身信美難久駐未能寫成圖聊用賦長句謝文思許尚之石函廣陵散譜余好彈廣陵散比見周待制清真集序石函中譜歎味不已念無從可得文思許尚之中行云家有此本後自武昌録寄深嘆雅尚又以知然諾之不輕也因作是詩以謝之叔夜千載人生也當晋魏君卑臣寖强駸駸司馬氏幽憤無所洩舒寫向桐梓慢商與宮同惨痛聲足備規橅既𢎞濶音節分巨細撥剌洎全扶他曲安有是昌黎贈潁師必為此曲製眤眤變軒昂悲壯見英氣形容泛絲聲雲絮無根蒂孤鳳出喧啾或失千丈勢謂此琵琶詩歐蘇俱過矣余生無他好嗜此如嗜芰清彈五十年良夜或無寐向時幾似之激烈至流涕素攷韓臯言神授託竒詭别姊取韓相多用聶政事近讀清眞序始知石函祕賢哉許阿訥自言家有此文君昔寳藏人亡琴亦廢荷君重然諾寫譜逺相寄按拍三十六大同小有異此即名止息八拍信為贅君逺未能來我老從此逝何當為君彈更窮不盡意韓文公聼潁師彈琴詩幾為古今絶唱前十句形容曲盡是必為廣陵散而作他曲不足以當此歐公以為琵琶詩而蘇公遂櫽括為琵琶詞二公皆天人何敢輕議然俱非深于琴者也丁卯夏秋間嘗有一詞謾録呈所謂激烈至流涕者也正聲第一拍名取韓相第十三拍名别姊又一本序五拍亦有名第一拍名井里史記刺客傳聶政軹深井里人也刺殺韓相俠累為姊曰榮韓臯知叔夜之託于神授以避禍而不知名拍以聶政事又以見古有此曲也鮮有知者故及之王叔達以尉彭澤潛玉洞述見示書巖已竒甚潛玉尤偉哉李君漫盤谷元子空峿臺神不得自祕天應為君開淵明如得此應不賦歸來題董亨道八景圖錢塘怒濤天下無誰將尺紙為新圖賀家湖上如鏡浄屢向烟波逢釣徒彩虹横卧吳淞上洞庭一螺浮具區亦曽泛舟彭蠡湖插立千劍名大孤廬山髙哉不得到歴歴五老聨香爐上鍾下鍾夾湖口半江清濁涇渭如多景雄據金焦間夕陽㣲照海門山其餘知名不知處赤壁但歌前後賦江漢至鄂始合流黄鶴樓前鸚鵡洲瀟湘見説青如染道林岳麓横清秋我欲逺逰嗟暮齒蝶夢翩翩漫千里但欲絶江尋越山歸老故山吾已矣魚計亭平生信天公頽然不作計顧我雖非魚想見亦相似潛深本其性魚亦非有意浮陽或在渚不能終自祕或為饑所驅危機在香餌輕絲引纎鈎性命困刀几魚以味得烹我以名自累安得兩相忘容我從此逝跋盧申之所藏韋偃三馬名畫記言韋鍳工龍馬妙得精氣從子鶠善小馬有小馬放牧圖傳于代思陵親為再書尤為可寳申之求詩感而有作嗟哉馬之生馳驟乃其性一為人所羈寸歩不得騁局促閑廐中專俟圉人令調服無踶齧始可用朝請戰騎冒鋒鏑或致隕其命繡羈非不華金狨號為盛青黄木之此此亦馬所病立仗尤貴重一鳴輒斥屏何如在牧時卧起玩煙景豐草勝芻荳清波恣㳺泳韋侯擅筆精幻出無人境思陵賜珍題昭回光炳炳身方縛名韁三年慙負乗細窺樂寛閒悠然動歸興宇文樞宻借示范寛春山圖妙絶一時以詩送還范生本以寛得名不學闗仝與李成筆端自出一機杼理通神㑹真其能横披小軸屢到眼頗亦時能辨真贗未見𢎞大如公藏茂樹喬山春爛漫此圖不是江南山寒空青嶂疑商顔髙髙下下幾佳處莊家時有茅三間橋梁樓觀各有趣一夫驅驢何處去安得隨入杳靄間布襪青鞋踏空霧近山忽斷見遥碧天涯一望無中極胸中丘壑誰測知鐵屋石人驚筆力鵞谿六幅髙堂空終日坐對心神融看罷為我捲還客自此歸余境夢中錢文季少卿以蜀中織成山谷書廬山髙為夀次韻七十衰翁年愈髙意氣銷盡湖海豪平生萬事不翅足但欲乞身歸故巢幾番掛冠不容去歸夢屢渉滄浪濤縱使不去豈能久命如槁葉風將飄一陽來復值初度方念吹棘心夭夭何期老友加記録乃爲衰朽親揮毫廬山髙哉山谷字蜀女織就新氷綃安得東歸抱四絶雙鳧飛舄追王喬張圖痛飲信一快更須傳寳留兒曹慶朝非逺卻圖報别當作頌齊崧髙以太湖石響板為季文夀太湖中心洞庭山千巖萬壑髙孱顔風濤舂撞自太古漱成樂石如雕剜玲瓏中空窮變態竒竒怪怪羅滄灣良工巧手琢威鳳片雲承足同飛翻叩之五聲八音足疑有僊風揺珮環月􅀸蜚聲塞宇宙文如九苞瑞世間秖今在治眞若鳳朝陽一鳴聞九闗先從鵷閣掌帝制徑上鸞臺領朝班徳既不衰石不泐祝君遐夀如彭籛次韻章樞宻賦吳彩鸞玉篇文簫躡彩鸞夜半恐不逮山深忽呼名驚喜不得退僊謫無所逃士貧何可耐乃以三生縁遂為二姓配至人與凡夫伉儷豈其輩鬻書以自給細字如玉碎一一存楷法明珠蔑瑕纇初出鶼比翼久若魚同隊終日了韻編心畫無罣礙人間八百本終古知敬愛玉篇尤可珍何必贈雜珮倘邀千黄金雖貧亦當貸摩挲惜見晚老眼看茫昧墨妙饒精神筆勁含姿態次第部居中盤曲法庫内九齡美風度孟博信清裁書拙無合作見此増愧慨尤物難久假雪牕暫相對遺蹤雖已邈眞蹟儼然在輒效西子顰小楷書牘背題太乙宫武林山贈易髙士易居求賦武林山日困塵勞無暫間我求掛冠欲歸去念此詩債須當還武林山出武林水靈隱後山無乃是此山亦復用此名細攷其來真有以天目兩乳到錢塘一山環湖萬龍翔扶輿磅礴擁王氣皇居壯麗環宮牆湖陰一峯如怒猊勢臨城北尤瑰竒吳越大作緇黄廬為穿百井以厭之從來有龍必有珠此雖培塿千山餘中興南渡為行都崇列原廟太乙廬曽因祀事來登眺闤闠塵中有圓嶠薰風時來洗袢暑緑樹陰陰隱殘照我得暫來猶醒心羨君清福住年深長安信美非吾土倦翼惟思歸故林寄題王以道寧蘭墅百卉生深林無人皆自芳楚騷發妙意惟蘭乃能當我欲效潞公賸種坡之陽不須强披拂風來味愈長君乃先為之滋畹雙雁鄉正欲生階庭聚書教諸郎父子自同心久之不聞香老我行西歸一造君子堂勉哉篤義方雙雁看髙翔蕉菴雜言環植巒蕉數十株幻成方丈一屠蘇幾重青蒼兩邊合四壁穿空一物無早凉日薄坐其下爽氣肅颯風來徐此為天下易生物不多嵗月眞可廬王愷謾夸紫歩障石崇安得青珊瑚寓居得地不畝許好事便可傳規模顧余老矣豈久處後來得此自足娛若謂霜雪成摧枯瓊臺瑶室今何如攻媿集卷五欽定四庫全書攻媿集卷六宋樓鑰撰古體詩石時亨飽山閣乾道七年冬見時亨相與登飽山閣淳熙七年秋又過之今三十有三年矣時亨書來索詩老矣日困憂責之重應酬之繁何處有此慨念舊逰況昔止齋陳君舉洎薛象先諸公往來必逰焉此閣名因以傳黄文叔則又里人也存者無幾併于末章見之率爾有作蕪拙媿甚層層得好山是處足飽看君眞樂山者心地尤平寛生長山水縣慣見青巑岏築室欲飫賞憑虚著危欄天亦遂君意俾君老其間塲屋早得名晚始就一官官又不得進甘心樂瓢簞官少家食多知更幾暑寒朝見山嵐髙暮喜山雲還山氣日夕佳秀色幾可餐晴雨各變態雪月更萬端于山真屬饜清明流肺肝膏粱與芻豢與世殊鹹酸久矣謝世紛屏息專内觀鬢無一莖白八十顔如丹所得不既多愈飽天不慳此閣本不華何處無此山苟為名利驅人境無相闗吾鄉山苦逺可望不可攀東樓快登眺聳翠羅烟鬟年來勇欲歸匏繫未許閒君索飽山詩南明恍在前十年兩訪君共醉苜蓿盤向時多名流與君平生歡秖今幾人在一見良獨難叔度鎮金陵道衡處瀛壖舊逰如晨星相望可長歎歸夢遶故丘非晚再掛冠何當泛剡谿往從子于盤林徳久祕書寄楚詞故訓傳及叶音草木疏求序于余病中未暇因以詩寄謝平時盛歎屈靈均離騷三誦涕欲零向來傳注賴王逸尚以舛陋遭譏評河東天對最傑作釋問多本山海經練塘後出號詳備晦翁集註尤精明比逢善本窮日誦章分句析無遁情林侯忽又示此帙正欲叅攷搴華英屬余近嵗方苦疾筆硯廢墮幾塵生嘗鼎一臠已知味始知用工久已成況復身到荆楚地詳䆒蘭芷聞芳馨前此同朝幸相與錦囊詩文為我傾惜哉不早見此書病中欲續神不寧年老耋及屢求去倘得掛冠早歸耕尚當一一爲尋繹期以爝火禆明星謾揮斐語塞厚意深媿所報非瓊瑩贈黄真䕶道人游茅山少年曽上三茅山千巖萬壑窮躋攀烟霏空翠不可狀弟兄聨騎欣清閒回頭五十有餘載至今夢境猶班班初從崇禧入僊境元符玉晨紛幢幡草庵精舍不知數各占山麓清溪灣蓑衣相見黑虎谷蒼然白髮猶朱顔延之土窟款清論桃皮釀酒無留殘達道所居更竒絶萬山開豁如重闗一山巉巗似筆格聳秀正矗湖中間白馬真人尚生氣長史舊井藏餘丹異石若碎還復合豢龍幾處多澄瀾華陽洞門閉已久傳聞亦有㳺其藩撫掌浮漚湧如沸僊人捧石手可扳最竒無如大茅峯千尋直上天市壇中峯小峯如雁行下視堆阜羅烟鬟三君司命時歸降往往天風吹珮環人言春日羽衣㑹胎禽終日來飛翻𤣥帝大鼎秦皇璧丹砂六千在流泉地無虺虎與荆棘但有衆藥堪延年洞天凡蹤不易到我欲再往良獨難有時慨想舊逰處陟岡惘惘涕為潸江夏僊人有僊骨卓爾抜俗甘瓢簞揺鈴真能徹帝所揮钁自足驅神姦曽入金華訪初平今徃地肺求洞元㳺經都城道價重拂袖忽厭拘塵煩徑登紫芝繡衣亭咫尺衆真相往還神僊渺茫信可學秖恐涓塵天意慳但見茅君極僊品誰知求道越岨艱至今豐碑載錫文舟墮千劒如指彈君得此居宜勇退勿使學歩譏邯鄲我欲休官未容去歸夢遇覺多愁歎終當掛冠四明隱捫羅采石紉芝蘭江東日暮雲生處安得羽化同霞餐舅氏適齋汪公尚書慕香山之髙續達哉行集香山詩句次韻脫衣典酒曲江邊不作閒逰即醉眠大扺浮雲何足道生理何曽得自全朝廷雇我作閒人髣髴緡錢二三千一種共君官職冷收得身來已五年五年炎凉凡十變老後誰能惜酒錢塵纓世網重重縛七十八十百病纒千萬人中無一人自喜天教我少縁六十三翁頭雪白貧家强健亦天憐毎愧尚書情眷眷為君一醉一陶然其間氣味多相似猶在病羸昏耄前月夜徐行石橋上累累棟宇相連延嵗種薄田一頃餘薄産處置有後先更無俗物當人眼遊魚潑潑荷田田為君舉酒歌短歌不妨兼有散花天適齋示池水大篇效元白體相答適齋一片心世人難與比少時發此念樂施到暮齒婚姻成者衆葬埋不知幾義氣追古人仁風動桑梓利益及物物方便形事事先正有此言源流固有自外家有天池清波照叢桂來者不問誰小大聼盈器及其旱將涸一雨復清泚我舅為欣然作詩自言志平生欲濟人往往多割已向來俸可分挂冠踰一紀心勤力不逮不得盡如意安得有貲財如此池中水來求則應之吾心斯足矣長篇筆餘力亹亹遂滿紙病足正僵臥三誦為之起韻險不容次愚言不能止公曰汝答我只用元白體公心與天通言合孟軻氏菽粟如水火此意豈不美黄金土同價但恐無此理求水易足用近止及隣里上不過飲水下亦止濯洗求財則無厭來不問逺邇應者力已竭求者殊未已有如一富翁獨處百家市終焉遂什一貧富本相濟餘波被四隣人情皆可喜久之責望重爭訟隨謗毁不言理曲直但謂富者鄙堯舜有至仁獨病在博濟所以漢昭烈其言有深㫖富者民之怨百萬輒散棄貧富各有分取予尤不易生長在舅側義事熟于耳頗亦知為人緩急力不計舅言出于仁甥言裁以義二者若不同同歸于一際愛苟無差等兼愛等墨子豈惟道非中安有力及此仁民而愛物要自親親始適齋約同社往來無事形迹次韻舅氏年益髙何止七十稀神明曽未衰髮黄齒如兒義概同古人閭里咸歸依度量海深濶仁愛佛慈悲居然三達尊後生願影隨為作真率集率以月為期平生持謙柄自牧何太卑善學柳下惠不欲慕伯夷一鄉有善士收拾畧不遺以此娛我老今是勝昨非何必汗漫遊據龜食蛤蜊但欲客長滿痛飲真吾師鄉黨既恂恂朋友亦偲偲凡我同盟人共當惜此時間或造竹所寧容掩柴扉耆英古有約不勸亦不辭此意豈不美謹當守良規達哉杜陵客從他人見嗤代魏丞相為錢參政夀天台傑立滄海東古今名士長相從神遊八極司馬子擲金作賦孫興公松牕先生千載士文價道骨相與同芙蓉為裳蘭為佩一笑坐斷千山峯向來羽扇揮羣雄貔貅給使如奴僮淮南草木識姓字烽燧一掃邉庭空勲名巍峩謝不有天子神聖非臣功黄扉安坐斷國論精神自折千里衝東山之志意不改歸來碧落稱僊翁調元老手自燮理鬖鬖緑髮雙方瞳蒼生顒望謝公起中興事業須宗工新冬五日記糓旦霜餘和氣回春風門牆老生繫郡紱欲借夀斚斟吳松祝公夀考與家世山河帶礪俱無窮代仲舅尚書賦江山得助樓江山信美非吾土王粲登樓意凄楚麗譙井幹髙則髙未免綺羅相滓汚君家華屋照城隅丹壁重重不知數誰令作此三層樓雪脊干霄千尺所幾番遺書來索詩只許歸田為君賦快哉今日真得歸無復黄塵涴巾屨試凭欄干俯人世城郭村畦可枚數四山雲物任卷舒大江波濤恣吞吐曉看紅日上滄溟夜見氷蟾轉天宇四明山水秀東南秖恨青山不肯入城府我家朗朗屋百間欲創一樓兄未許羨君輪奐日日新鼛鼓一聲紛郢斧眼明見此髙突兀騷人當得江山助我久欲歸未得閒門巷相望纔尺五賦詩幸不負前盟但慙筆㡳無風雨從今造門不復問主人醉倒樓上君莫嗔代求子紹上魏邸夀詩皇家基業天與隆金枝玉葉槃石宗我皇聖徳摩蒼穹朱邸森列慶所鍾仲氏吹箎何雝雝雲夢八九羅心胸羣經讀遍巾箱中筆端豪氣舒長虹殿前玉佩聲冬瓏天人眉宇輝宸楓大名起魏茅土封黄旛豹尾雙鎮雄宣城名郡煩憑熊政績越過黄與龔樓前疊嶂横雲空佳句不減𤣥暉工賢王易鎮甬水東陽春有腳皆仁風百蠻面内文軌同坐清聚蟻驅屯蠭碧海萬里樓船通天子神聖非臣功薰風入絃槐陰濃新荷泛緑榴花紅曉來佳氣飛青葱驚詫野老田家翁簫鼓動地光融融堂上帝子方雍容清旦燕賀簪笏叢負弩小吏隨登龍由來降靈自神崧難老何用齊喬松年年箕翼夀兩宮捧觴戲彩俱無窮代毛崇夫賀婦翁黄圯老生朝東都競風節清裁稱巨賢焱馳不自定相與扶其顚獨立黄徵君道周性具全辟舉既不就言論亦無傳當時論篤士比之孔與顔陳蕃為三公自媿不敢先丈人豈苖裔徳髙静而專不清復不濁量陂渺無邉學問粹然正師友承淵源詞章玉無瑕作者當摩肩向來登王畿悟主在一言校讎天禄閣朱黄手自研郎潛不啻足肯羨嵗九遷清朝奬亷退擢居先府員膴仕皆坐致髙懐越拘攣出乗使者車徑歸卧林泉出處無戚欣鼻間栩栩然謝公恐未免召馹行著鞭松山介閩浙淑氣常蜿蜒隆冬正疑沍愛日回春妍懸弧慶生申飄若區中僊僊風自難老何須記椿年賤子託枌榆掃門如宿縁叨在玉潤選得窺樂廣天川涂阻拜夀舂容陳大篇孺子倘可教願受書一編贈吏部夀詩集老杜句刺史諸侯貴春城海水邉層城臨媚景水合數百源山色佳有餘雲門吼瀑泉遊山憶謝公頻逰任履穿三寸如黄金朱橘不論錢瀟洒到江心石瀨月娟娟翠華擁吳岳誰扶黄屋尊御榻在嵽嵲佳氣拂周旋多除南省郎一麾出守還城中賢府主今之黄頴川筆落驚風雨談論淮湖奔羣書一萬巻分明在眼前老氣横九州黄鵠摩蒼天歴職漢庭久磊落映時賢否臧太常議正直朱絲絃東下姑蘇臺戮力效鷹鸇謁帝似馮唐明公獨妙年列宿頓輝光馨香粉署妍卿月昇金掌等級敢比肩巢許山林志虚心味道𤣥此邦承平日接近與名藩時節立復度水旱其數然百波漏波濤狂風大放顚江流氣不平地軸為之翻人烟眇蕭瑟茅茨寄短椽凋瘵滿膏盲誅求何多門至尊方旰食鴻雁美周宣平生方寸心窮年憂黎元恐辜明主恩筋力不辭煩晨趨閶闔内應對如轉環制可題未乾御札早流傳斯人亦何幸已聞動行軒滯務兹一掃煩苛法令蠲撫飬甚分明連檣並米船蜂蠆不敢毒歌笑輕波瀾驕陽化為霖江鳴夜雨懸公鎮踰嵗月人安若㤗山且如今年冬祈寒為之暄蕭蕭理體静迥出諸侯先何時降璽書誰能叫帝閽絲綸實具新載渥照乾坤借問今何官蓬萊漢閣連鴛鷺回金闕㑹是正陶甄煊赫舊家聲風流今尚存嚴家聚徳星文雅見天倫曽參與游夏寔為親弟昆潘輿送喜頻堂後自生萱國與大名新中堂有神僊令子各清標芝蘭疊璵璠今朝烏鵲喜僊鶴下人間甘作老人星晨霞朝可餐但求椿夀永何曽藉偓佺獻壽更稱觴肅肅秩初筵爛漫倒芳樽華燭蟠長烟清朝燕賀人佳句染華牋吾非文人特不敢廢詩篇顧惟魯鈍姿喧争懶著鞭出遊翰墨場常受衆目憐尚為諸侯客坐客寒無氈未見有知音非理誰與論始知賢主人見我顔色温包容忻有擊豁達露心肝竊效貢公喜兼盡賔主歡吹嘘人所羨推轂期孤騫琴操七月上浣游裴園醉翁操茫茫蒼蒼青山遶千頃波光新秋露風荷吹香悠颺心地翛然生清凉古岸揺垂楊時有白鷺飛來雙隱君如在鶴與翺翔老先何處尚有流風未忘琴與君兮宮商酒與君兮杯觴清歡殊未央西山忽斜陽欲去且徜徉更將霜髩臨滄浪和東坡醉翁操韻詠風琴泠然輕圓誰彈向屋山何言清風至陰徳之天悠颺餘響嬋娟方晝眠迥立八風前八韻相宣知孰賢有時悲壯鏗若龍泉有時幽杳彷彿猿吟鶴怨忽若巍巍山顛蕩蕩幾如流川聊將娛暮年聼之身欲僊弦索滿人間未有逸韻如此弦楚辭雪谿僊隱余讀叢桂堂記而知雙流宋氏之盛觀登科記而知四川類元仲正之名忽過余于寂寞之濵問其所以來則懐閬風之綬而訪其大父閬中君雪谿之僊蹤也其詳見于楊獻子之記矣又言其先君諱庶俊特才多藝閬中素所鍾愛年止四十于是時正仲之生始九閱月爾少長女兄淑仲告之曰汝之生也卜人曰棄之先君不然取洪範攸好徳之言作詩以名汝謂夀富康寧考終是有命焉惟好徳在人爲可勉詩末以世科為屬自爾刻本誓斷絶世故將從雪谿為物外游不幸志不克就汝其識之則又泣曰先君已矣大父之來四明不知其果何在萬里來游志在此也余聞其言而哀其意為作楚辭以招之君之生兮天之西望雪山兮名之以雪谿君之游兮海之湄隱於雪竇兮杳然何歸子從其父兮孫訪吾祖子志不遂兮孫之心良苦嗟嗟閬中君兮棄家而逺遊蹇胡為乎不久留其遂蟬蜕塵埃而僊耶其亦肥遯得道不死而隱于四牕之幽耶捫蘿以尋于爛平兮既不可見莽白雲之廿里兮欲進兮焉求青櫺兮實繁莎羅兮花稠鞠侯兮相與羣白鷴兮嘯其儔謂為逺兮何景物之良是謂在邇耶將徑之何由肖君像兮茲堂謹奉嘗兮良疇君其來兮庶幾其見之君之不來兮徒相羊以夷猶此是集傳寫多訛缺處因無善本參校毎仍其舊首青櫺句原缺櫺字鞠候句原缺鞠字今據陸龜䝉四明山詩小序云有青櫺子味極甘有猿謂之鞠俟補入又考寧波府志宋耕號雪谿世家雙流紹興中為閬中令後仙去其孫徳之聞其在四明來訪至雪竇山遇蜀僧告以山後爛平山有宋宣教居焉徳之攀躋至巔果見丹竈而終不得耕所在乃置祠其上而歸云足補樓鑰是序所未詳謹附注于此攻媿集巻六欽定四庫全書攻媿集巻七宋樓鑰撰今體詩姚江髙風閣邑有嚴先生墓不從文叔作三公歸著羊裘大澤中石瀨釣臺非故地雲山江水自髙風烟迷宿草古遺恨樹擁危樓新奏功僊馭飄颻疑不逺翩然獨鶴度寒空夜坐重雲烟雨日冥冥柱礎流津意未晴頼得溪風送雲出放開山月照人明紛紜世態長松影荏苒時光流水聲坐乆蕭然轉琴軸為君更作九臯鳴山陰道中昨望山陰古道中蕺山直上最髙峰今朝更踏山陰道郤向雲間認八松捲上疎簾莫放垂迎眸景色自淋漓有雲更覺千山秀不雨争知萬壑竒古道經行盡遺跡羣賢風度想當時奚囊莫怪新篇少應接山川不暇詩蘭亭别于果鄉山隂巗壑妙人寰十載扁舟空往還贊府端能慰牢落連朝相與上孱顔龍蟠鳯翥無竒畫霞蔚雲蒸有舊山弔古凄凉更離别滿懐秋思到眉間早行水餘枯枿尚棲苴催促征夫趂曉鴉細路繚山穿亂石輕輿掠樹得飛花柔桑彌望兩三里脩竹深藏四五家徑處不容行客戀可憐一歩一天涯水漲乗小舟一番凍雨洗郊丘冷逼征衫四月秋只喜青山㵼懸瀑不知黄潦漲平疇登途已厭頻輿轎得意何妨且榜舟處順安貧聊自適未應坎止愧乗流繡川道中伏波莫作古胡留雨意垂垂未肯休不憚征衫有㣲濕只愁平地又横流行人自厭衝泥苦野老方當得意秋倦僕如何致千里登天徒笑傳鳴鳩過蘇谿處處谿還舍家家石累牆有時逢老稚無事只耕桑野色撩詩思村醪引醉鄉山川已如許急雨更斜陽東陽遇雨萬壑千巗已飽看更尋佳處為開顔無端早上一番雨遮盡東陽縣裏山即事雨外山光淡烟中草色鮮斷橋依古岸流水自斜川紫椹餘桑表青籐繞樹顛人情兼物態只合付天然荆坑道中古澗隨山轉征人趁水行懸崖當歩險空翠逼人清石路無尋直沙田不畝平千巗得一二亦足慰平生馮公嶺百級山田帶雨耕驅牛扶耒半空行不如身倚市門者飽食豐衣過一生括蒼烟雨樓莫為看山只凭欄逺懐猶恨兩山間坐深却得無窮趣秪看平川一半山晚歩少㣲閣落日謝虛閣横琴相對閒片雲將急雨一笑失前山夜坐燒香臺長晝苦炎熱夜分凉始生電中千嶂立琴外一蛩鳴急雨催詩思遥空打鼔聲誰知一府地得此意凄清即事睡重不知曉山髙意得秋風來已落葉潦去忽中洲幽閴素所願登臨儘自由瀕溪千萬壑何日上扁舟卜雨好風先雨到危欄郤送殘雲過别山不用開襟强披拂自然凉意滿人間烟雨樓夜坐暮靄横空黯未收晚來凉動滿懐秋澹雲影裏千山月殘角聲中百尺樓叅坐共為文字飲髙談不見古今愁夜闌半醉意方適徑欲乗風汗漫遊晚自擬滁亭轉烟雨樓聼角兩寺疎鐘夾岸聞荒烟無數亂前村山銜落日雲生彩谿溜孤舟水不痕蟲羽凄凄鳴綠暗星暉隠隱照黄昏欲歸重到層樓上更為梅花一斷魂重陽佳處逢佳節寜辭望眼勞有樓皆眺逺無日不登髙野栗炊新秫寒萸泛濁醪黄花何太晚籬落上蕭騷北行雪中渡淮風捲清淮夜不休曉驚急雪遍郊丘坐令和氣三邊滿便覺胡塵萬里收瑟瑟江頭輝玉節蕭蕭馬上㸃貂裘歸來風物渾相似二月楊花遶御溝泗州道中宿雪助寒色相看汴水濵輕車兀殘夢羣馬濺飛塵行役過周地官儀泣漢民中原陸沈乆任責豈無人靈壁道中古汴㣲流絶餘民尚孑遺髙丘祠漢祖荒草𦵏虞姬垓下空陳迹鴻溝愴近時膏腴滿荆棘傷甚黍離離陳留柏驛門深閉柏参天月可中庭夜影圓人静好風喧客枕坐令歸夢到林泉湘州道中千古興亡一夢驚就中物理似持衡茜花空染朝歌血荒草猶祠羑里城但見反身知自咎誰言修政欲相傾知音只有昌黎操臣罪當誅主聖明即事行盡窮邊歲亦殫倚門應是念衣單寜知今日幕南地不似去年江上寒乗馬惟欣日可愛逢人長説雪初乾三衾四襖半無用何必重歌行路難臘月二十五日大人生朝去年沙岸倚歸舟今日驅車古涿州綵服難陪萊子戲巴詞應付雪兒謳客途行及五千里夀宴須開十二樓南望飛雲天様逺太行山外乆凝眸初出燕山去國三千里還家第一程都緣人意樂便覺馬蹄輕落日催心速飛雲逐望生莫嫌歸去晚猶得趁清明春雨石斗微㣲覆淺沙蘭叢短短茁青芽春花著眼未云乆花事于人漸有涯漫漫平湖接逺天濛濛細雨濕輕烟野橋横著草深外何處渡頭人上船送人之官池州春空吹雨作餘寒去去扁舟不可扳伊昔曾游三大水到今獨記九華山想君脈脈征途逺屬我悠悠夢境間回首江山固無恙懐人倚待好詩還春遊遇雨公子喜青春歡遊弗厭頻乆晴都不問好雨郤成嗔桃杏紅方入禾苖綠未匀請君停杖履俯念耦耕人糧料院葵向亭結屋蒼崖畫不譁崚嶒亂石繞簾牙濤江渺莾三千頃烟瓦叅差百萬家雉堞環山餘暮雪龍樓聳闕煥朝霞登臨可是望都省但有葵心向日華廨舍小軒衮袞羣山尾横忩更此岑塵埃遮物外風物宛山陰作吏何妨隱尋山不用深居然一丘壑便足快登臨尺五亭舊説城南社今登山外亭宫牆歩可到御桞望中青引嘯千巖響哦詩過鳥聽曲欄頻徙倚歸思渺東溟挈從子滌歸烏戍外家五年不泛浙西船今日重來倍黯然葦席不重寒刺被菱歌孤唱月揺川吚啞回櫓鳬鷗狎來往輕帆風雨便㸃檢湖山固無恙鴒原遺恨到黄泉烏戍道中田在港西家港東斷橋春水歩難通束蘆挾瓮穩來去不礙小船分釣筒重陽寄雪牕從叔秋意未教籬菊知不妨烏帽著風吹絶憐對酒君歸矣更欲登髙誰共之風雨滿城千里夢茱茰綴席一年期君非俗物敗意者莫為催租便不詩次伯舅汪運幹大雅所寄韻遥憶牢之舅功名志欲成離思滿方寸望眼費雙明攬筆四愁詠登樓千里情賢勞休自歎幢下本書生佛日山曉出都城暮入山杖藜蕭㪚易開顔松風五里未行盡隠隠疎鐘紫翠間遊香山次王正言逨韻四山過雨翠光流境勝心閒自㸃頭野鳥叫春多格磔晚風吹鬢故颼飀三年幾作舊山夢一笑喜成今日遊獨歎寒泉本無意强隨機械走溪溝過西興幾載京塵涴客裘江村乍入倍清幽柔桑穉麥寒猶在流水落花春又休蒼狗浮空驚易失白駒過隙若為留細思誰似垂綸者寘酒烹魚百不憂攜家再游姚江又作泛舟行浮家一葉輕潮生江外晚月比夜來明雲盡天容徹風髙水氣清五湖乘興去何苦慕功名渡揚子江豚吹浪雨颼飀望斷天涯人白頭一舸乗風渡揚子數鷗導我過瓜州曉霧曉霧冥濛水拍堤稜嶒亂石與雲齊扁舟不用兼程去到得稽城日已西登蕺山晚歩蕺山上休辭腳力窮八松不碍眼萬里欲乗風逸興浮滄海髙歌徹太空羲之不可見猶得想胸中永嘉試院謝曾使君送酒一簾疎雨洗塵埃滿架酴釄自在開正恨烹茶殺風景忽驚門外白衣來脱身場屋幾春秋故歩重尋我自羞閉置有如三日婦畫成應遣一生愁與錢誰是老司業送酒更無賢郡侯掩巻出門花下坐真成一酌散千憂木藴之國博遷居寄齋今日又遷居門巷相過五尺餘王子何妨借人屋淵明不必愛吾廬大千眼裏無非寄三十乗中皆是書祀竈卜鄰無用爾秖今天上有鋒車名大人稱屈心閒我自餘言詩今子貢作賦古𤣥虛鳯沼定平進鷗盟殊未疎潭潭府中去只作寄齋居次南真宫龔道士壁間韻幽舍足留客疎篁不用林相過幾樽酒清坐一瑶琴野鶴伴僊隱閒雲寄此心黄冠如有許來者為低簪送樂清姚令行可長官清政玉無瑕卓魯循良不足誇前席有期吾黨喜挽鬚無路邑人嗟才髙雁蕩千峰石惠足河陽一縣花欲信三年渾不擾遊山今日始携家入雁山過雙峯眼前未見古龍湫望望前山景自幽紅日一門千嶂曉翠峯雙聳半空秋風髙落木無邉下氣勁閒雲逐處收要識雁山真面目直湏霜後一來遊靈峯老笻扶我轉林丘直到僧房最上頭地擁雙峯遮勝境天分半石閟靈湫空中大士澹相對山罅清泉空自流人謂石崖宜置我不知來此有緣不龍湫地聳峰巒秀天開氣象寛九霄銀漢落千古玉龍寒壯觀供尊者幽居稱冷官何時遂肥遯不厭白頭看又次王瑞安韻雲鎖千峰碧泉飛百尺湫山蹊驚險絶洞府足深幽谷靜揺虚箔巗髙卧老虬賈胡還似我到處輙遲留忘歸亭一峯凛凛插烟霏誰築新亭占石磯標榜未應專一壑此山何處不忘歸登馬鞍嶺軋軋輕輿上馬鞍半天嵐翠逼人寒從教宿靄迷清嶂明日晴空取意看游西山次范丞公興韻東風吹我上西岡更覺僧房白晝長草色已翻新嵗碧梅花秪是去年香好山圍繞屏三面野竹蕭森玉數行千里同遊逢范叔綈袍他日未相忘喜雪曉風吹起雪漫漫來兆豐年喜有端玉樹瓊枝無限好雪牕髙閣不勝寒直疑天上梅花落莫作人間桞絮看我欲乗風游汗漫倚欄空自羡飛翰同年翁處招遊北山次韻不嫌屐齒碎莓苔秪要吾人得得來見説飛泉髙落澗待尋曲水作流杯竹林素約羣賢集雞黍相過一笑開政恐清遊自忘返不應空棹酒船回