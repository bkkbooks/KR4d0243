明妙句羣賢和疏傳佳名萬古存加我數年祈謝事此心難與俗人論次適齋韻四絶初得曽孫女外子惟知媿可攻羡公八十未衰癃曽孫喜見新文褓尚想當年擲鏡翁茉莉花江南創見喜孤芳見説閩花徧海鄉安得一居香盛處帳中巧作寶毬妝從子澡滌築居荷池上樓臺牆宇家家月楊栁荷花處處風最喜兩涯相映帶一時倒影入池塘山亭納凉不嫌西照為朝曦城郭誰知住翠微天幸外門纔咫尺欲陪杖履夜忘歸次適齋韻五首山行野老問年田夫笑把褐衣牽莫問壺中别有天齒髪雖殘渾未覺精神愈勝果何縁公言已老偶能爾我本無心只自然再禱百分纔及一定因椿壽八千年堅鄭貴温棊社二公休致我來歸儘可同裁隱士衣此已屢謀登竹所君其無吝造城扉人間厭見手翻覆樂處須當頤指揮凉氣一新宜近酒盍簪莫似向來稀秋凉有感公看魚躍與鳶飛鶴脛雖長㫁則悲世事不容人苦較秋風自有葉先知青奴難免交新絶素扇寧須手自持宋玉賦片終未達不如老子笑成詩諭悲秋者黄雲萬頃一時收喜見高空風露秋嵗事及今將告畢人生到老盍歸休固知景物能興感亦有痴人苦過憂胸次果然無一累豈容秋月使人愁舅甥賡酬之樂神明未覺晉公衰老母尤忻兄弟怡范甯王忱無許壽牢之無忌不聞詩秋風對酒勸酬處夜月乗橋來往時但要兩家同此適不須更遣外人知八月十四夜攜家泛月次適齋韻月到平湖金作波一城惟此占秋多水晶宫裏清無比何用重登漢馺娑九秋風月正分平盛滿水晶分外明老子此行端不惡夜深幾得聖之清稍先一日是中秋行遍芙蓉與菊洲作意安排卻非適不如乗興徑行舟猶記年時看水嬉不如此夜月相宜仙翁一醉非塵世為問姮娥知未知草草真成一叚竒比鄰非不借餘輝板輿何敢侵風露略望簷間且勸歸次適齋韻十首懶學仙家煉火還但欣晚節在林間鴛行免奏三千牘駑駕難參十二閑短艇有時浮緑水輕輿到處賞佳山莫言冷淡為生活冷淡終然無後艱秋來病體費支吾深閉柴門臥草廬藥裏多尋醫者問酒樽寖與故人疏特須勉强陪來客未免辛勤答遠書此外儒生真氣習簡編猶欲趁三餘大率舟行岸自移機緘何必更相思雨餘坐見水三尺雲淨喜看天四垂荷沼已殘霜後葢桂林初綻日邊枝閒中氣味深長甚問卻西風總不知幸堪擊壤樂清時衰病情懷百不宜秖好灌畦陪漢叟更欣學圃慕樊遲逢人草草須傾酒得韻怱怱且和詩琴意高低猶自適高山流水久心知甥舅相尋向酒邊相忘情話更怡然人言難遇雙延閣自媿叨聨兩大天只覺光隂詩裏過何妨枕簟醉時眠此中别有真消息莫為人間醒者傳從來憂道不憂貧晚向閒中得此身直把宦途如夢過任他世事似棊新坐間可説舊時話眼底幸多同社人賡唱本求閒燕樂莫誇末路費精神自憐鶴髪奉慈親舅氏還欣託比鄰已向雲間收倦翼甘從波底作潛鱗果然松菊連三徑誰謂神仙隔一塵野服相從成二叟不須更現宰官身笑他咄咄向空書既老投閒計未疎釜裏有魚長自足門前無雀是吾居休論仙子生塵襪莫問高軒織翠裾百念已如灰様冷更無驕色與人鋤秋宵坐到玉繩低歴歴明蟾數桂枝重露半翻蕉葉徑好風時颭荳花籬不妨起舞弄清影何用撞鐘誇小詩濁酒困人垂欲睡更揩病眼一揚眉秋到先生舊草堂凉飆林葉已飄黄漸看天宇清霜肅更覺人家白晝長歴世已經三折臂坐愁何必九迴腸世間舊事消磨盡秪有詩情未遽忘客省中次適齋韻三年此日綺筵開盛意勤拳不待催豫約行人須已集先欣數客肯俱來詩筒纔到先賡韻酒興方濃莫算杯更欲秋深窮勝跡鄒枚後乗可容陪花若開時定自開芳心深靚不容催上人又有新詩出佳客應尋舊雨來樓上已聞香撲鼻堂前儘放酒盈杯高燒銀燭照花睡便到更深亦願陪定數無過偶與竒達人循順更安時不于椿菌量長短豈為彭殤較疾遲雖是一時身有疾行開九秩壽無期外生六十頭先白杖履相從最得宜戲和適齋絶句三首脱索纒縳千遭趁酒巡環觀巧手競稱神莫言名利如韁鎖猛烈抽身亦在人藏擪儘教逞技儘多般畢竟甘心受面謾解把人間等嬉戲不妨笑與大家看傀儡假合隂陽有此身使形全在氣和神王家㓜戲猶堅固線索休時尚木人晝寢正酣適齋以二十韻詩來亟為次韻老氏正求知我希吾今老矣更何之極知仕宦皆由命縱有功名已過時覽鏡形容寧復我還鄉交友定從誰慈親多幸方難老舅氏猶欣未覺衰教誨至今仍似舊襟期暗合自相知新詩必使篇篇和勝地還容處處隨晝永劇談俱喜聽夜深清坐更忘疲素欽行已初無玷願學持心不自欺紫槖清班叨預列黄金横帶沗同垂六旬顧我猶加懶八秩如公尚自持但仰三尊知共慶孰云十拗敢輕嗤無情到此方為達省病從他不用治世事只將同蝶夢人生幾得見雞皮觀書自識非求解䇿杖徐行莫厭遲儉素何妨貧勝富優游真是樂忘飢雖然調樂無千指儘喜當歌有十眉報謁要須親自到赴筵直以散為期醉翁雅意非謀醉棊社清歡豈為棊白髪只宜甘散誕紅塵任彼自奔馳安輿來往常陪伴此意終身誓不移次適齋贈少微兄韻汪樓比屋古城隅彼此清貧不願餘南阮諸賢今有幾東牀佳壻竟誰如歸鄉年亦非全老對酒情猶未覺疏來往兩家無倦色此身端合老犁鋤桂花方開約客次適齊韻久疑岩桂儘遲開留待來朝伴舉杯老去欲尋千日醉客來同引百花醅況臨高閣枝枝秀好判閒身日日陪家釀盡傾君不惜莫教瓶罄恥為罍蔣德尚棊㑹展日次適韻齋棊社經年能幾回身閒深幸屢參陪一旬又見朋簪集三徑還應聽履開休苦索居徒面壁何如相遇且銜杯雖有藥褁寛初約不碍重尋舊雨來太上皇帝聖體清康老母進封信安郡太夫人適齋除敷文閣學士有詩為賀次韻清朝孝治古無倫通籍推恩總及親八秩升班惟二老九齡拜命更何人春初慶席歡猶在嵗晚宸綸喜共新須信長年多富貴秪因同見㑹昌春吾母年高絶等倫痴兒何幸得榮親九重錫類真千載八座承恩只一人共仰外門流慶遠喜同介弟寵光新兩家盛事人爭賀和氣薰為臘裏春題曉上人閒靜軒次適齋韻我居城郭子居山兩地相望數里間我已得閒猶未靜子雖處靜不曾閒莫將花與夢相似只用心如石様頑要識箇中真信息孤雲僧寺兩相闗次適齋韻十首棊會歸來鄉曲大家閒同社仍欣取友端無事銜杯何不可有時㑹面亦良難少曽環坐坐常滿賴有主盟盟未寒琴奕相尋詩間作笑談終日有餘歡老態舅甥身退不為遲肥遯猶當未老時東晉雖慚古元亮晚唐知慕老天隨公開九秩身方健我甫六旬心已疲不敢自言成酷似腹心惟喜兩相知晨朝懶起坐見一翁兩鬢皤只贏曉夢到無何牕凉風透真成適日出事生還更多足弱已難堪蠟屐齒搖初不為鄰梭囘思螭陛班心處日日奔趨向馺娑見客車轍常多長者臨相過肯笑席門深寒暄固有三分話臭味還傾一寸心客至自應閒不厭年來寖覺老難禁應酬既了無餘事面壁何妨學少林晝寢才盡甘為世所捐不如高臥了餘年時逢毁譽心無諍間有詩文手自編老去已知身是夢閒來更得酒中天簾深午寂渾無念只與白鷗相對眠喜閒投閒時以醉為鄉人既相忘我亦忘雨足已期南畝熟風清更愛北牕凉晝觀碧落雲千疊夜看中庭月一方時撫素琴聊自遣誰能更作鳯求凰杜陵鄭老共襟期門外紅塵勿預知近日頗荒攻媿課多時不見適齋詩竹深荷靜相留處月白風清偶㑹時地僻衣裳俱自懶黄冠野服淡相宜讀香山詩詩到香山不計篇相逢佳處輒欣然明知無子可傳業每遇為文自入編舉世慕名多諷誦惟公著句得純全胸中相似詩方似一等不為名利牽即事旋插杉枝蔽曉曦緩搖輕箑自融怡調琴不用求成曲得句何須凑作詩無復趨炎同褦襶但能尋睡學希夷太倉日糴五升米老矣不嫌人更嗤西山兩岸杉松翠䕃長輕輿連日得徜徉絶憐林下朝還暮不問人間炎與凉睡起閒情方自樂齋餘歸路未須忙何時更向月溪去願著青鞋走侍旁燕居大老今居東海濱燕居晚嵗更申中外生但喜長依教一笑相從莫問貧閒裏只將詩作活酒邊猶有筆如神乞言授几俱休論且做羲皇以上人子成兄年八十六史子久八十二舅氏八十八㑹于適齋次適齋韻二絶堂中三壽喜同時黄髪相逢齒更兒參坐共談宣政舊風流不許後生知閭里舊遊能幾人適齋猶有筆如神莫言二老升沈異各現宰官居士身攻媿集巻十二欽定四庫全書攻媿集巻十三宋樓鑰撰今體詩陳文懿公居仁輓詞衆口推文伯何人識吏師義襟惟古有心地只天知至死終無玷平生本不欺在公無可憾猶恨哲人萎珍館徑歸鄞人猶望秉鈞郵傳千里訃哀動五州民躃踊森賢嗣攀號感路人公乎不忘矣衮衮看簪紳宅相惟公乆伊余忝後塵十年追桂籍兩禁踵詞臣接武參吾舅承顔奉老親幸成三學士何意失斯人一别屢經嵗歸舟已及門方期情話悦空訝語音存善行傳千載蕪詞愧九原傷心歌楚些無地可招魂邱文定公崈輓詞謀國規模闊絶人才具高三朝千載遇四海一身勞儒將通鴛序樞庭握豹韜皇家資柱石天遽奪伊臯初擬文翁化誰知懷逺圖廟謨專制閫世將易兵符養虎竟遺患斷蛇由不殊寧同死諸葛空恨失吞呉處事拘攣外鋤姦談笑中幾年亡主將全蜀頼明公畏愛盾衰日清和夷恵風屢書終不盡詩意亦何窮王文忠公十朋輓詞夙負敢言氣輸忠不愛身劉蕡仍遇主綺季更憂民治行真循吏風稜古諍臣搢紳千載恨不得究經綸梁木今其壞誰能問大鈞恩深兩宫賻哀慟四州民已矣天人䇿傷哉社稷臣吾生良可恥不及見斯人婁忠簡公機輓詞壯嵗志先定耆年氣不衰治高為縣日名重佐州時雅望登朝著忠言徹帝墀亨途日千里闊步不容遲邊事釁初開惟公論不囘深謀比婁敬極力阻王恢兒戲何堪用冰山忽已摧朝廷始更化大老盍歸來共政三年乆蜚英四海尊色詞無假借風裁弭囂喧但欲持公道寧容啓幸門經綸終未究猶有典型存寮寀侍儲闈如公乆任稀載欣啇皓起終惜漢疏歸問字煩參訂談經頼發輝一書真總要星日重光輝得姓共東樓同朝兩故侯文編叨二序誕日頌千秋老矣俱宜去公乎不少留來書墨猶濕展讀淚空流程文簡公大昌輓詞仕宦接王楊諸公嘆老蒼門生多紫禁子舍屢黄堂自得垂車樂誰傳郤老方桃花千樹滿空憶舊劉郎徐邈今非介申棖焉得剛立朝無附麗受謫更芬香戲綵衣冠盛圍棊日月長典刑今已矣無復巋靈光持論真遺直操心本至公贏貲寧市寵平㓂不言功光禄文階峻嘉興色養豐誰能死生際猶得教之忠晚出荷公知登門未覺遲通班依漢橐試郡守蕭規藻翰猶頻寄宫牆不再窺新阡何處是西望不勝悲林正惠公大中輓詞愛直趙清獻忠文范景仁累朝推舊徳今日見斯人正色欲劘上敢言寧顧身紫樞方大用惜不究經綸去國名逾重還朝道益尊清虚懷骨鯁嚴冷帶春温公綽真無欲臧孫尚立言騎箕雖永隔精爽儼如存凛凛古循吏堂堂真巨公死生忘度外邪正炯胸中憂世心誠切籌邊事已空龜潭山下水流淚與無窮觀文殿學士陳公騤輓詞台嶽鍾神秀居然社稷臣海涵書萬巻魁冠數千人南服頻懷綬西垣屢演綸惜哉真漢相不遂秉洪鈞幾見衣冠偉終聞羽翼成先皇崇舊學大政任名卿神器親傳授崇朝再太平功成身自退寵利一毫輕朝著登門乆詞林辱眷深代言稱據古議禮許同心去國臨歸路還家寄好音病中聞訃告老淚動盈襟觀文殿學士趙公彦逾輓詞千古盛周宗皇朝實比隆謂多擔貴爵誰見立王功一語國先定寸心天與通龍飛稽事實信史詔無窮授受唐虞