原花木在愁絶舊生涯客授早登龍襟期一笑同門清心似水論正氣如虹近問書猶濕重來跡遂空無因送丹旐老淚灑西風李撫州庚輓詞與物初無忤臺評反謂傾麾符成漫仕林壑寄平生跪履嗟何晚揮犀空復情天台隔風浪無地拜佳城李下真無徑門前可設羅詩如翰林逸書似鄴侯多竒字今誰問遺編尚不磨從來好哀輓薤露忍興歌蚤嵗文聲振長沙見賈生積薪看晚輩推轂致名卿子舍真連璧生涯付短擎風流今李漢極口贊氷清張欽州舟之輓詞少誦東牕句從君見典型義襟希竇十才刃比庖丁古鏡悲鸞偶寒原愴脊鴒恂恂守家法蘭玉滿階庭姻好自諸馮東狀取阿戎平時深念我晚嵗忍銘公書字今猶濕心期誰與同回頭三十載灑涕向西風錢江隂佖輓詞庾嶺梅花暖賢侯恵愛深精神雖滿腹撫字亦勞心九轉竟難遇二毛何處侵傷哉東逝水無復大江隂前知南安軍移知江隂客授向東甌君為郡督郵豈惟寮契篤更喜吏才優每歎頻年别俄驚一夢休虞山𣺌何許淚落不能收李刪定叔益輓詞積善務增厚求名惟恐多白圭寧有玷古井竟無波議法資修定監州極撫摩佳兒傳素業留眼看巍科冰玉心相照誰云内舉私深居無浪出清節畏人知尚憶紫芝宇無慙有道碑填空雨黄葉西望不勝悲樊運使光逺輓詞科目公餘事南宫第一人七閩新使節三署舊儒臣倦拜方辭餽哀良莫贖身家聲知有繼仙桂兩枝春模浦云亡後斯文付此賢命其隨道喪學又絶心傳河洛湮來派西州憶舊縁傷心耆老盡揮淚對霜天丁寺丞允元輓詞家世傳經術膠庠藹雋聲上方思舊學公乃擅專城滁上功尤著潮陽政愈明哀哉鍔流水猶觧不平鳴嚴冷不可向其中實曠然行藏暌素志燕樂了餘年鶴化人何處鸞孤影自憐才高不盡用流慶尚綿綿曹工部耜輓詞箕潁文章士儀同社稷功惟公承慶裔有意振家風祠禄真崇道郎潛嘆老馮傷心循吏手齎志九原中宦達推公早丁年備皂衣幾為銅虎去終向石橋歸齊國世臣少貞元朝士稀松風談笑地囘首倍歔欷范致政錞輓詞義俠乆無迹吾鄉見此翁紫㣲欣税駕飛將許同功銀茜聫恩渥金蘭藹義風雖增嬴博恨猶喜桂成叢酒後昇平曲閒中安樂窩千金曾累致一醉竟無何老驥志空在孤鸞悲亦多相望纔嵗許託體共山阿梁審計季琦輓詞壯嵗嶄頭角夷途試著鞭羣公争倒屣諸老亦忘年論議傾朝譽功名短世縁神傷賢伯仲風雨夜無眠壽夭固難問吁嗟不忍言嬰啼摧玉樹衰淚灑芳萱事契深羣從英才愴九原悲吟慙楚些無地與招魂吕從徳晝問輓詞剸劇推才刃臨機妙斵輪傳家得清白滿腹是精神未上金閨籍空留花縣春善人陽報在蘭玉正詵詵回首情親處相過瀨水陽十年能幾見一疾痛云亡縣郭山空秀家園橘自霜主人今已矣鷗鷺亦凄凉王縣尉彦正輓詞幹蠱恢才刃誰能貨殖私人皆競毫髪我獨破藩籬風雨空殘夢池臺愴昔時板輿臨穴處行道亦興悲潤屋公餘事能為人所難蓼莪遺恨在夜雨舊盟寒家有書堪讀囊無錢為看情親悲不那望絶旐飛丹唐舍人關輓詞鴈塔名三世螭坳侍九重循循儀學館諤諤囊著封至性悲三釡高懷薄萬鐘典刑傷不見哀涕忽無從夷路方馳輿甘棠喜問津廟廊平日志露電百年身搯掌雖多恨為箕自有人發棠隂徳在陽報質蒼旻徐少卿子寅輓詞聖主一言寤長淮千耦耕山川皆在目草木尚知名盍被腰金寵徒為攬轡行諸郎襲餘慶定自繼長卿所至多遺愛丹邱最有聲奉常千載乆攀戀一城傾已恨數離别寧知隔死生湖邊舊門巷一到一心驚陸提刑洸輓詞數馬謙恭甚揮犀色笑温風流士龍裔文采左丞孫晚幸成三徑身胡遽九原素欽仁者勇大嶽竟平反早嵗擅詞場夷途列鴈行一麾分楚甸雙節照江鄉蓮社容寒晚葭莩接老蒼八旬俱已矣囘首倍凄凉陸參議沇輓詞中外衣冠盛流傳識後凋聲名三語掾身世半身寮寶晉書尤逸坡仙隱可招梅溪殘月墮蕪没舊風標飾吏先儒雅低徊五十霜萑蒲掃韶右桑柘滿黄岡知已平津老家傳删定郎八龍無半在風雨夜侵牀蔣慈谿鶚輓詞伊昔丹邱去相逢意氣傾樓前巾子秀山下育泉清敬梓情逾厚交梨論益明凄凉千古意潮落又潮生下筆欲生風磨礱日有功推敲詩益練駢儷語尤工經問南雷叟家傳十八公詞人誰可繼文陣滑稽雄呉大監飛英輓詞庠校聲名早朝廷譽望尊忠言如日皎笑語若春温四擁皇華節屢登金馬門用才終不盡流慶在仍昆曠典將行日南宫得舍人銓衡輕易地造化漫勞神舊事誰能記交情獨我親吁嗟三昧手不見掌絲綸俞通判茂元輓詞强仕賦歸去頻年亦漫行宦情雖淡泊官事極精明贊畫王公幕監州亞父城佳兒守遺訓清白勝金籯象邑推三俊靈光頼此賢老成俄已矣逺邇為澘然孝敬心何極公平録尚傳佳城隔風浪忍賦薤歌篇陳崇道輓詞學造龜山藴詩傳汝水餘于公足隂徳陶令竟閒居白業追蓮社丹經授寢虚其父號寢虚先生平生了無恨善類勿欷歔未第聲先振纔官節已竒精誠與神合隂行畏人知晚境終無玷遺文尚可師功名齎志殁囘施稱家兒鮑潮州潚輓詞三試皆前列一官何後時低徊廣文舍齟齬使君麾遇事有如燭衛生寧及葵舊游成隔世流涕讀新碑客授壬辰嵗巍科盛永嘉芹宫屢揮塵竹院幾烹茶假守深交誼清談及道家猶懷郡齋晚羣雀噪簷蛇攻媿集巻十三欽定四庫全書攻媿集卷十四宋樓鑰撰今體詩趙路鈐不枯輓詞蚤嵗游金闕霞冠拜紫宸可堪天寳亂及見㑹昌春宛宛王孫態飄飄物外身靈光愴陳迹遺老更何人諸父論交久忘年許預盟豋山陪躡屐泛月共飛觥來往開三徑安閒羨一生山深凄薤露愁憶醉歌聲姜總管浩輓詞及見開元盛曾聞正始音雕蟲徒壯嵗冠鶡豈初心論事風生席疏恩帶錫金精神空滿腹愁絶病沈沈富盛俄遭變艱難却起家田園新活計詩禮舊生涯仙桂應傳秀庭蘭更茁芽眞歸了無恨超徹妙蓮華祝通判鍔輓詞坦坦曾無我休休早見㡬虚舟寧忤物抱甕自忘機老去心逾壮歸來事已非賞延推不及有子尚家肥花縣弦歌化蓮城水竹居舊寮情意厚近别音信疎不作三刀夢空垂别駕車新阡何處是東望倍欷歔裘參議子紹輓詞累世朱陳舊宦游多向鄞飛鳧觀政美展驥愈情親久草歸田賦欣迎入幕賔斯人忽千古望斷剡溪濵玉立期清貴龎眉望壽齡父兄嗟奄忽姑姊亦凋零厚德今誰在佳城慘欲扃孫曾聞競爽蘭玉在階庭朱坡史居士輓詞巖邑富人物才惟史氏多流傳有丹桂遺逸嘆朱坡學飽終難售詩成秖自哦空餘著書在令子挹餘波交友俱名士儀曹禮意周使華臨夏口詩興共南樓喜得江山助還同汗漫游更煩賢宅相相與發潛幽戴縣丞機輓詞小戴久仙去何堪更哭君舊遊驚昨夢陳迹愴遺文晚暮期相與死生俄遽分銘成媿贊德揮淚望新墳高士終為薄豈惟勾小稽鸞凰雖在棘桃李自成蹊官府資闗決儒流仰品題定知餘慶遠遺愛滿雙谿方興化叔珪輓詞廟乏著靴鬼夢中言更明起家尤感勵為吏極廉平薦口聲名重朝行去就輕奏篇真確論何日遂施行鴈塔深論契鵷班試著行參亡聞易簀越弔後除喪支郡難留鄧佳城久夢方吁嗟德浮位回施與諸郎戴迪功應龍輓詞猶記天街㑹同為乳竇游姻家頻㑹聚親意愈綢繆吉德冝多壽奇疴竟不瘳無由見安道汎雪悵回舟好學數仍奇躬行家遂肥時將詩自樂晚悟世俱非教子惟黄卷高門看緑衣阿連悲未泯無淚為君揮王通判琰輓詞世篤青箱學驊騮更著鞭半山分近派巖壑誦新篇竹馬迎雙舄棠陰憶二天黄扉伸讜論風節尚翹然才具盍時用拂衣俄去之善藏經世手回施稱家兒嬴博延陵恨人琴子敬悲連年事如許天道杳難知姜鍾離柄輓詞門户期興起交朋務琢磨反身求大學決意取儒科贊府聲尤著鄰封惠亦多傷心濠上路無復聽絃歌别去期三載伻來痛一書死生誠大矣力量果何如平日真知我遺言苦問予作銘雖不愧回首自欷歔顧養直義剛輓詞萬頃東湖下曾門起大家子孫昌世業文字作生涯堂後萱猶樹庭中桂欲華惜哉時不待誰忍送悲笳舊向君家去冝齋屢舉觴人常誦諸顧里不見他楊身世驚春暮湖山愴夕陽園林未成趣鷗鷺亦凄凉李度支嘉言輓詞忽作堂堂去門前雀已羅夢隨弹指斷事向盖棺多心繫六州鐵身傾千丈坡喑喑晝夜哭奈此敬姜何孰匪同升素君于我最親詞章傳自舊翰墨恍猶新别去情逾篤歸來迹遽陳無從效經紀悲結淚沾巾何司業伯謹輓詞頃嵗遊孤嶼名門説二何胡為終璧水自合上鑾坡器重連城價心澄古井波傳家衣鉢在袞袞並儒科骯髒陽司業作州如理家源流知有自悃愊信無華方喜亨途遠俄驚暮景斜傷心傾盖舊何處望東嘉王遂安時叙輓詞淮水古王氏生平熟義方三珠欣競秀兩桂早聨芳才大用何嗇源深流自長青氈傳令子一箭取雙鶬問學自冰翁詞章聳巨公不慙循吏傳真有古人風捫蝨書猶在飛鳧迹遽空人琴悲子敬三讀愴深𠂻周左司頡輓詞從政心無愧敢言人所難精忠憂世切清節照人寒交臂失持槖乞身終考槃老成今已矣西望淚汍瀾乙丑慈恩㑹今㡬六十霜軺車來握節相府記傳觴詩藪懷高隠郵筒見短章不堪千里隔丹旐想飛揚蘓江陰十能輓詞萬卷蟠胸次千篇秀筆端朝行期奮迅賢路竟艱難雖號循良守欠為文字官遺編幸無恙留與後人看伊昔初傾盖摛文已甚工親聞南澗語謂有魏公風既往言多驗歸來道更窮誨言非教佞後裔報冝豐魯少卿訔輓詞棣蕚儀鴛綴翛然兩鬢斑時清嗟嵗晚遊倦得身閒人在羲皇上經傳伯仲間桂枝芳未已何止倍燕山六十年間豋科者十人前輩風流泯靈光獨巋然指囷推甲族跪履記丁年有子傷埋璧惟翁亦蛻蟬功名雖已矣千載尚遺編陸郎中沅輓詞壮嵗聨雙㨗衰年困百罹肉身心佛子霜髮貌嬰兒萬事㡬樽酒百年千首詩浮生成夢覺吾道竟何之從弟忝東牀相從二十霜人琴一何苦冰玉兩俱傷别久成今昔歸來失老蒼稽陰終反葬西望倍凄凉梁仲蒼輓詞延賞高三讓殊科擅一鳴元賔文未極長吉記先成妙語遺膏馥𤣥談悟死生行人痛埋璧父子若為情人物如君少相期上石渠博文該四部篤學富三餘淚盡知無及交深未覺疎何時酹墳草細讀茂陵書王檢正回輓詞到處稱循吏星軺復郡侯威名致降虜恩信感亡牛省闥主公議祠庭尋舊遊善人天不憗愁絶峴湖秋客授䝉傾盖朝參喜綴班開藩才一水去國遂千山晚遇名方重言歸鬢未斑功名付諸子含笑謝塵寰彭宣義汝知子復之父輓詞種德不在大至誠天所親但能存一念何用活千人經笥儒風遠香山句法新功名付兒輩不必在吾身籍甚清湘守修名所在聞宦途資畏友家訓仰嚴君歸路飛丹旐長空慘白雲生芻不成奠揮淚想江濆朱婺州安國輓詞治行古循吏風稜真諫官鋤姦清遠徼持重息羣讙久弄趙堯印重彈貢禹冠去天纔尺五惜不見長安莫銅陵堂輓詞經學高餘子躬行慕古人儒風三葉秀和氣一門春台嶺漸摩久銅官撫字均庠東亡二老凝望淚沾巾張泰州禮本輓詞燕趙多奇士如公名不虚胸中九域志筆底百家書報國心尤壮籌邊智有餘功名竟齎恨西望倍欷歔徐季節輓詞公府推徐穉山陽薦仲車盛時遺此老沒世竟窮廬行道嗟無命傳家幸有書魯山終不識撫卷倍欷歔周德遠輓詞家世傳儒業鄉邦聳義風將迎無倦色交友盡名公太學飛聲早浮生轉首空怡如堂下月猶照紫荆叢汝能之兄余承彦輓詞户外諸生屨門前長者車柳袍空自染瓶粟竟無儲隠行刑宗黨清風照里閭沈冥誰為表賴有子雲書李堯卿唐佐輓詞里社久相從知君陰有功救人多藥喜持論耻雷同素業諸郎在浮