  - {type: variant, offset: 0, length: 12349, content: 攻媿集卷一百十一宋樓鑰撰北行日録上括蒼受仲舅汪尚書大猷之辟時待次温州教授隨侍兖公守乾道五年己丑十月九日辛卯邸報仲舅侍郎充賀正使曾總管覿副之十日壬辰蔡興以仲舅書來辟充書状官二親許一行是日游南園微雨十一日癸巳雨俶裝十二日甲午隂十三日乙未雨十四日丙申雨李器之以鳳棲梧餞行十五日丁酉雨周仁甫約同登途十六日戊戌晚晴仁甫酌别于少微閣醉中唱和十七日己亥晴十八日庚子晴飯後别二親徑出城張子質一見于驛亭仲兄器之元聲弟相送至夀寜寺仁甫繼至飲罷東行宿巖泉夏家店去城十五里十九日辛丑晴行二十里飯午頓驛行二十五里宿荆山上方二十日壬寅晴早登小樓眺望行十里飯蒋家店過縉雲縣少候仁甫卽行道經放生潭山水秀發策杖縱觀聞有趙侯廟鄉人敬之石有如杖如履如罋如舟者皆以侯名雙頭巖白巖烏巖皆奇偉白巖峭立臨溪松竹秀潤烏巖下有石室端植如門渡溪入仙都玉虚宫路回顧南岸石筍森列有亭翼然僕夫曰此初暘谷也中有石鼓扣之有聲以旣濟不復往路轉山回已見獨峯大松夾立清溪映帶眇視林間有巨石屹據如雪且行且觀遇道童問石之名云有洞名忘歸既懲初暘之失遂回登焉洞中可容數十人四旁嵌空如出鐫斲旁有小洞又一石横陳如臺松風清㣲俯和湍瀨是真使人忘歸也下行里許益近獨峯峯之上相傳有鼎湖嘗有巨蓮葉因風而下石壁隱隱有車轍世言黄帝由此飛昇塘曰黄履言遺履之地地曰靜樂言鈞天至此而不聞峯後大山如屏奇石崷崒始望之髙列峯外自謂倘登其上必可俯瞰鼎湖下有銳石僅如一筍及即之後山靡迤而退聽石筍亦不可跂及而此峯獨上摩穹漢巍然削立無階而升人有捫蘿登後山之巔者猶覺未及强半是知此峯眞衆山之宗非凡目所可窺測也後山有石空洞躋攀而上一竇通明昔劉先生于竇之外横木爲床以居至今遺簀猶在號隱真洞髙不可登恨望乆之循峯而北又有仙水洞一名鏡巖懸崖數十尺級石以上石罅有水僅如屋漏終古不竭下鑿小泓貯之名公遺墨鑱滿四壁迂叟介夫趙清獻公皆在焉攜酒對酌清坐移時亦記嵗月而還再至峯下大書姓字小憩宫前兩亭顧瞻偉觀兀不得去洞心駭目生所未見入據上方相與痛飲賦詩醉墨淋漓揮掃滿壁秉燭朗誦旁若無人詩榜櫛比蓋自香山居士而下不知其㡬閱十之三四不能盡讀也宫前有門書祈仙總真洞天是日行四十五里二十一日癸卯晴早復筆詩于版各置醉墨髙處謁黄帝祠宇李陽冰篆額今留縣庠聞有上宫名妙庭相去三里而近他無勝槩有洞名金龍一竇通獨峯下僅容小兒出入而其中甚寛宣和間甞以金龍鎮之為睦寇盜去腳力既倦不得窮歴出門相羊峯下絶溪而西數里間山川猶競秀未已有徐氏小亭横跨練溪小憩而行三十里飯黄碧村醪醇釅不殊家釀二十八里宿和尚店去李溪猶二里㑹倅廳一兵楊靖自紹興囘因發家書第一封録所題仙都二詩寄仲兄二十二日甲辰夜微霰早隂晴行二十七里飯諸應行三十餘里至龍窟行五里宿尚書塘二十三日乙巳晴行二十里飯楊溪仁甫由新塘路往四明分袂于此田間行乆之猶能相望將入山舉手一揖而别四十里宿横塘暮嶺間張家店途中惟售溪坊酒頗佳然比之黄碧味不及而價又三倍深夜微雨卽霽二十四日丙午晴行十餘里入東陽縣先見同年姚尉瀛次見王宰楫為諸卒批旁小憩一店尉已先至再三留一飯力辭之行十里飯愛頭孫家渡溪行五十里宿余店蓋過蘇谿八里矣夜微雨二十五日丁未微雨作而復止行二十二里飯羅嶺下篆坑何店行三十五里宿義井夏店過牌頭十里二十六日戊申晴風過平歴遇客將李濬等回發家書第二封行三十里飯髙擁楊家行三十五里宿灰竈頭於店二十七日己酉晴行三十里飯溪口傅店行三十里宿漁浦鎮上朱店東陽士人周忠厚同邸清話乆之夜分小雨作二十八日庚戌微雨辰巳間晴早作飯了同周君行數里三憩方到渡頭裝載旣畢潮落舟膠監渡厲君以小舟般剥已又加一舟蕩兀波間乆之大舟既前復挈行李裝載勞擾良甚又艤棹食頃挽繂徐行近廟山始用櫓潮上方急篙櫓努力欲進為山石所激進寸退尺舟人失色少縱復上乆方得過又挽行十餘里雨霽風靜一波不興至六和塔下登岸已薄暮矣驅馳至嘉㑹門閉闗已乆宿俞家店是日又有松陽一士人姓葉同渡二十九日辛亥晴早起入城館于仲舅家飯罷侍叔舅同去偽謁副使曾總管因登三茅山上步司教場觀仲舅習射夜發家書第三封􅊨三十日壬子晴同去偽見劉察院待范郎中成大乆之竟不見客次遇蔡架閣霖去嵗書状官也又遇留丞正臣飯季舅家發承局繆欽歸以第三書行十一月一日癸丑晴講禮何季膺葉先生憲平閭丘監丞尤監簿袤訪及仲舅赴副使㑹二日甲寅晴同去偽習儀都亭驛部中見梁監門叔玠范丈呂郎中正已赴景孟舅晚飯三日乙夘晴習儀驛中已不及習干參政府梁郎中訪及四日丙辰天明㣲雨卽霽使副以下習儀驛中閱禮物授衣衫翟楫及承局翁葉行兩發家書仲舅招副使飯五日丁巳晴習儀政府候黄御藥甚乆周邵州伯駿王智叟沈尉徳潤葉主管翥訪及六日戊午晴驛中大習儀使副以下備衣冠賈國信竑六知閤直温康諝王抃張說張掄宋鈞宋偕來歸寫奏藁七日己未雨侍叔舅偕去偽赴何季膺陳叔强早飯于豐樂樓八月庚申陰發行李上船九日辛酉雨下遞擔籠十日壬戌晴飯了登舟髙伯定劉君任送出門張伯純劉邦逵送過赤岸景孟舅姜子用沈澤遠王智叟約送長河十一日癸亥晴飯時過長河九十里遣第六書發周徳歸午過崇徳蘇彭年來迓水縮舟膠牽挽寸進更初遇士頴弟于官窑十二日甲子晴飯時過永樂行二十七里至秀州仲舅入城回謁閘頭登舟風作李同年唐卿相見十三日乙丑晴四更行六十里過平望姚漕相訪仲舅破睡見之行四十五里過吴江又行四十五里至平江仲舅入城回謁船由城外至閶門叔舅别去一夕行九十里十四日丙寅晴早到無錫攜刺謁孫饒州父子中途聞其入城遂謁喻郎中樗以謝去春先辱魏子師子智訪及行九十里深夜去毘陵數里泊十五日丁夘晴生朝作湯餅遣人訪李表兄長卿已同王直甫候于門蘇彭年亦來皆延入船相見王江陰正已惠茶幷公醖蘇李别于荆溪館直甫同行十里待書而别徐協恭過船棊戰三十六里過奔牛又十八里過吕城月明水深挽舟甚駛夜行五十四里過丹陽縣約五更矣十六日戊辰晴行二十七里小泊新豐又二十七里過丹徒鎮行三十六里午後到鎮江以水澀良乆方抵丹陽館沈抑强中立旣迓于門又攜具館下協恭同集使人通問于王侍御十七日己巳晴上館盥櫛仲舅欲同謁王侍御而侍御已在門侍季舅同沈抑强去偽别侍御聞泊舟金山因約同遊窮覽勝處主僧寳印首座心鑑皆嘉州人侍御方赴夔州不謂得見于此以小詩道别又辱和篇入船别其家遂歸仲舅招副使早飯抑强復攜具來嚴墨卿同集二鼓方散十八日庚午晴四更起天微明卽從使副到江干先登舟以待沈嚴二君相送晴和無風俄頃至瓜洲登岸未㡬風作胡撫幹仲文俞尉茂先陸泰興況相迓俟行李上坐船卽行薄暮至揚州城中水澀更餘方出城發第七書遞達親庭十九日辛未晴三鼓報送伴鍾尚書世明等回仲舅起相見前處州湯路分逢時為鍾引接送狼頭帽五指子各一副拂手香四貼為發親庭第八書又以小舟來過仲舅方與胡漕昉對語因與湯畧見于舟外少選鍾尚書徐知閤本中船到仲舅見之約四更方得行辰時到召伯埭去揚州纔四十五里以夜來留滯故爾張帆而行三十里過露筋三十里到髙郵仲舅入城囘謁兩岸然草如晝三十里夜過塘頭二十日壬申晴三十里過界首二十五里過范水三十五里至寳應夜風雨行三十里過黄蒲二十里過平柯橋二十一日癸酉晴辰時到楚州仲舅入城回謁登熙臺應山陽藏宻晏判官喆一揖于舟次三十里過磨盤三十里夜過淮隂三十里過聞家峯二十二日甲戌晴三十里到洪澤前去歐家渡極淺欲為般剥計使副借潮于瀆頭神東北風作欲候酉潮而申初已應開閘張帆三十里過瀆頭使副上廟挂幡又過數里舟膠而止二十三日乙亥晴未明東北風大作潮亦先期而應談笑過歐家渡去瀆頭十五里一行人歡呼而行且感神貺之如響也行十五里至龜山以風大不可出淮擺泊山下見監鎮王九思曾同舍二十四日丙子晴早出淮三十里至盱眙泊燕館下龔守攜具宴使副約季舅去偽分冬發家書第九封附遞二十五日丁丑晴冬至早起乘馬陪使副天慶觀朝拜歸館望拜兩宫各展賀偕季舅去偽遊第一山玻瓈泉冰不可酌遍觀磨崖石刻見周司法深譙提轄熙載王幹辦茂龔守就館請使副早食軍衙晚食二十六日戊寅隂晴使副以下具衣冠習儀館中依例就皇華館犒三節人二十七日己卯晴盱眙客將李寳渡淮探問接伴使副已到泗州使副赴龔守晚㑹偕季舅去偽赴王幹辦之招二十八日庚辰晴掌儀引接等渡淮傳銜少頃同北引接禮信司髙琚等傳到接伴使副名銜正使昭武大將軍行尚書吏部郎中上輕車都尉彭城郡開國伯食邑七百户唐括安徳副使朝奉大夫侍御史騎都尉廣陵縣開國男食邑三百户賜紫金魚袋髙徳裕使副坐燕館須其至犒以三杯而去移舟淮亭使副燕亭上偕季舅去偽赴譙提轄㑹發第九書遣吕葵張吉歸二十九日辛巳天明雪作使副以下巳時渡淮至泗州草館望拜如儀各就幕次三節人互參使副使副互展起居狀茶酒三行上馬入城天色開霽和氣翕然至館分位是日與季舅别十二月一日壬午晴車行六十里臨淮縣早頓縣境有徐城本徐國嬴姓有徐君墓季札挂劒之所又八十里宿青陽鎮驛臨淮尉奪客牛以駕車為客所訴鞭條子八十金法士夫無免捶撻者太守至撻同知又聞宰相亦不免惟以紫褥藉地少異庶僚耳二日癸未晴風車行八十里虹縣早頓城門不容車乘馬入驛市井多在城外驛之西有古寺大屋二層瓦以琉璃柱以石聞其上多米元章諸公遺刻三年前于寺中待使客飯後乘馬行八十里宿靈壁行數里汴水斷流人家獨處者皆燒拆去聞北人新法路旁居民盡令移就鄰保恐藏姦盜違者焚其居有一鹿起草間截馬前西去兩岸皆奇石近靈壁東岸尤多皆宣政花石綱所遺也虞姬墓在西岸荒草中横安二石板相去尺餘隆興間我得泗虹以此墓為界縣外山上有叢祠漢髙帝廟也淮北荒凉特甚靈壁兩岸人家皆瓦屋亦有小城始成縣道有粉壁云準南京都轉運帖理㑹買撲坊場遞鋪皆築小塢四角插皁旗遇賀正人使先排兩馬南去金法金牌走八騎銀牌三木牌二皆鋪馬也木牌最急日行七百里軍期則用之三日甲申晴車行六十里靜安鎮早頓又六十里宿宿州自離泗州循汴而行至此河益堙塞㡬與岸平車馬皆由其中亦有作屋其上州城新築雉堞甚整聞是五月下旬上畔指揮重修限四旬畢工費一出于民城中人物頗繁庶麫每斤二百一十粟穀每斗百二十粟米倍之陌以六十大寺數所皆承平時物酒樓二所甚偉其一跨街榜曰清平䕶以葦蓆市肆列觀無禁老者或以手加額而拜有倒臥腳引書鋪般販官局湯藥蔡五經家餅子風藥去州二里許二郎廟前有下馬亭卽李顯忠斬李福李保之地驛舍鄰郡治顯忠駐軍于此破城之初毎兵止犒以三鐶士卒憤惋及逃歸創殘之士不能自力悉碎于敵手為數坑埋之中庭有井自投者尤多負郭縣曰符離項羽破漢軍于靈壁東睢水為之不流卽此縣界四日乙酉隂晴風作車行四十五里蘄澤鎮早頓又四十五里宿栁子鎮晚小雪卽止五日丙戌霜寒頗力行人鬚髮皆冰六十里永城縣早頓驛中猶有燈縣本芒敬丘二縣地有芒山與碭山相接漢髙帝隱于此漢更敬丘為太丘陳寔嘗為長故城在今縣西北又七十里宿㑹亭鎮六日丁亥霜晴車行四十五里沙山岡换驢三十五里穀熟縣早頓縣卽商之南亳湯所都也縣外有虹橋跨汴甚雄政和中造今兩旁築小土墙且敝損不可行絶河以入又二十二里至金果園果木甚多馬行十八里入南京城市井益繁觀者多閉户以窺夾道甲騎百餘城外及驛前皆步兵大樓曰睢陽製作雄古傾圮已甚驛曰睢陽穀熟甲卒自言西人月請五百短錢聞本朝養兵之豐歎感不已南京城樓側有亭名解愠承應人有自言姓趙者不欲窮問之云城中猶有徐太宰路樞宻鄭宣徽等大宅多為官中所占亦有子孫居者按此地卽髙辛氏子閼伯所居商丘也武王封微子啟是為宋國後唐以為歸徳軍節度本朝以王業所基景徳四年升應天府祥符七年升南京金改曰歸徳府漢梁孝王所都兔園平臺雁鶩池蓼堤皆在此春秋隕石五猶存七日戊子晴車行六十里寧陵縣早頓古葛伯國湯所征也魏信陵君無忌封于此又六十里宿拱州本襄邑縣屬開封崇寧四年建名輔州以為東輔又改拱州治襄邑本宋承匡襄陵鄉也襄公所葬故曰襄陵金曰濉州八日己丑晴車行六十里雍丘縣早頓縣故𣏌國武王封禹後東樓公故至今土人猶曰𣏌縣祖逖鎮此以禦石勒圉城鎮在東南本漢圉縣屬睢陽國王莽擊翟義為京觀于此漢外黄縣故城在東又有葵丘齊桓公所㑹也承應人杜從自言邑手分邑有令簿尉酒稅都監同監共五員二稅輸粟及米亦納絹但薄而小此間只是舊時風範但改變衣装耳又行二十里過空桑伊尹所生之地也又里餘過伊尹墓惟一大枯木在側㫁碑臥其下曰湯相伊尹之墓又數里過三塜駕車人自言姓趙云向來不許人看南使近年方得縱觀我鄉里人善見南家有人被擄過來都為藏了有被軍子搜得必致破家然所甘心也宿陳留縣去雍丘六十里驛中有蒼柏可愛縣本鄭邑為陳所并故名九日庚寅晴車行四十五里道傍多陂塘路頗迂回古塚相望發掘無遺至東御園小亭少憩使副以下具衣冠上馬入東京城改曰南京新宋門舊曰朝陽今曰弘仁城樓雄偉樓櫓壕塹壯且整夾壕植栁如引繩然先入甕城上設敵樓次一甕城有樓三間次方入大城下列三門冠以大樓由南門以入内城相去尚遠城外人物極稀疎有粉壁曰信陵坊蓋無忌之遺跡城裏亦凋殘街南有聖倉屋甚多望見婆臺寺塔云城破之所街比望見景徳開寳寺二塔并七寳閣寺上清儲祥宫頽毁已甚金榜猶在皮場廟甚飾雖在深處有望柱在路側各挂一牌左曰皮場儀門右曰靈應之觀又有欒將軍廟頽垣滿目皆大家遺址入舊宋門舊曰麗景今曰賓曜亦列三門由北門入尤壯麗華好門外有廟曰靈護兩門裏之左右皆有闕亭門之南卽汴河也故街南無巷街北即甜水巷過鄭太宰宅西南角有小樓都人列觀間有耆婆服飾甚異戴白之老多歎息掩泣或指副使曰此必宣和中官員也相國寺如故每月亦以三八日開寺兩塔相對相輪上銅珠尖左暗右明横過大内前逆亮時大内以遺火殆盡新造一如舊製而基址并州橋稍移向東大約宣徳樓下有五門兩傍朶樓尤奇御廊不知㡬間二樓特起其中浮屋買賣者甚衆過西御廊數十步過交鈔所入都亭驛五代上元驛基本朝以待遼使猶是故屋但西偏已廢為瓦子矣十日辛夘隂晴歇泊承應人有及見承平者多能言舊事後生者亦云見父母備說有言其父囑之曰我已矣汝輩當見快活時豈知擔閣三四十年猶未得見多是市中提瓶人言倡優尚有五百餘亦有旦望接送禮數又言舊日衣冠之家陷于此者皆毁抹舊告為戎酋驅役號閒糧官不復有俸仰其子弟就末作以自給有舊親事官自言月得粟二斗錢二貫短陌日供重役不堪其勞語及舊事泫然不能已留守來謁接伴使副使副連一榻南向坐㕔上留守設胡牀侍其左過盞勸酒翼而退接伴所得私覿物盡貨于此物有定價責付行人盡取見錢分附衆車以北歲歲如此又金人浚民膏血以實巢穴府庫多在上京諸處故河南之民貧甚錢亦益少塗中曾遇蒲簍數杠導之以旗殿以二騎或云其中皆交子也都管愠其主人貪墨以穢語詆之又有萬福包待制之語承應人各與少香茶紅果子或跪或喏跪者胡禮喏者猶是中原禮數語音亦有㣲帶燕音者尤使人傷歎十一日壬辰晴賜宴既傳銜使副率三節人具衣冠出接伴位前對揖而出就褥位與接伴天使對立三節人立使副後先引使副東北向開敕兩拜天使烏古倫璋傳口宣云卿等遠持使節來㑹嵗元適冒寒威宜加宴勞今遣具位璋賜卿等宴仍差南京留守耶律成押宴并賜教坊樂使副舞蹈五拜又開敕兩拜再傳口宣云卿等來朝歳旦遠抗使旌爰增原隰之華宜有甘芳之錫今差璋賜卿等酒果使副搢笏跪左厀义手受賜五拜舞蹈如儀還立褥位對展次揖接伴退就幕次與璋茶酒三行再立褥位引接石旦側跪捧表正使拜跪受表卻以授璋仍送土物與之璋退卽引押宴出與接伴拜舞謝恩押宴先升㕔側立使副拜舞訖與接伴對行升㕔與押宴對展訖就座㸃湯端笏離位少立三節人東北向再拜呼噪升廰占位東向南上小立俟使副初盞罷三節方坐初盞燥子粉次肉油餅次腰子羮次茶食以大柈貯四十楪比平日又加工巧别下松子糖粥糕糜裏蒸蠟黄批羊餅子之類不能悉計次大茶飯先下大棗豉二大餅肉山又下㸇魚醎豉等五楪繼卽數十品源源而來仍以供頓之物雜之兩下飯與肚羮三下餅子五下魚不曉其意蓋其俗盛禮也次餅餤三次小雜椀次羊頭次煿肉次剗子次羊頭假鼈次雙下灌漿饅頭次粟米水飯大簇飣凡十三行樂次筝笙方響三次升廳餘皆作樂以送亦有雜劇逐次皆有束帛銀椀為犒使副以下皆離立以待謝恩或云所賜初不及皆文具耳第十二行依例勸上中節酒罷三節先就班使副進第十三行茶罷與押宴接伴謝宴拜表庭下如儀再送璋土物與璋成互展辭狀卽與接伴對揖歸位送押宴私覿往囘自此每賜宴禮數準此食味樂次大同小異十二日癸巳晴五更出驛穿御街循東御廊過宣徳樓側東角樓下潘樓街頭東過左掖門出馬行街頭北過東華門出舊封丘門金改曰玄武新封丘門舊曰安遠金改曰順常河中有亂石萬嵗山所棄也北郊方壇在路西青城在路東面南中開三門左右開掖門西開一門以通壇皆荒墟也北門内外人煙比南門稍盛車行四十五里飯封丘又四十五里宿胙城縣途中遇老父云女壻戍邊十年不歸苦于乆役今又送衣裝與之或云新制大定十年為始凡物力五十貫者招一軍不及五十貫者率數户共之下至一二千者亦不免毎一軍費八十緡納錢于官以供此費東京有千户二十一人各有三四百人共有八千兵耳有張千户者向來率其人戰符離一敗止存數十人至此除籍為民又言簽軍遇王師皆不甚盡力往往一戰而散迫于嚴誅耳若一一與之盡力非南人所能敵符離之戰東京無備先聲已自搖動指日以望南兵之來何為遽去中原思漢之心雖甚切然河南之地極目荒蕪蕩然無可守之地得之亦難于堅凝也胙城之南有南湖去嵗五月河決所損甚多河水今與南湖通衝㫁古路用柴木横疊其上積草土以行車馬按東京春秋衛陳鄭三國之境戰國屬魏東魏立梁州後周改汴州興元為宣武軍節度使後梁以州建國升為東京開封府後唐復為汴州晉漢周本朝因梁舊汴河古莨蕩渠首受黄河水隋煬帝開浚兼引汴水開封縣有浚溝卽衛詩浚都也有沙海戰國策顔率言大梁君臣欲得九鼎謀于沙海之上蓼堤自睢陽至此三百里吹臺今曰繁臺本師曠作孝王增築祥符縣有夷門山夷門大梁城之東門侯嬴抱闗于此蔡河古琵琶溝也寒泉阪詩所謂爰有寒泉在浚之下中牟縣趙襄子時佛肸以叛有中牟臺是為官渡城曹袁相持之所陽武縣有博浪沙張良擊始皇于此河決金堤亦此地長垣縣衛之匡邑孔子畏于匡古之蒲邑子路為之宰鄢陵縣克段之地也封丘縣古封父國左傳所謂周以封父之繁弱賜魯縣有黄池吴王夫差所㑹胙城屬滑州故南燕國周公諸子所封左傳富辰曰凡蒋邢茅胙祭周公之胤也十三日甲午晴五更車行四十五里到黄河因河決打損口岸去年人使迂行數十里方得上渡今嵗措置只就淺水冰上積柴草為路里餘車馬行其上策策有冰泮聲遇深險處即有人跣立道旁指示使驅車疾行河心有沙墠甚闊蓋河決時所淤積者一行人兵車馬盡于此登舟渡舟底平無篷屋于船頭品字用抄兩旁又以大枋為槳併力喝號使副以下露坐其中分數舟以渡風静不寒上卞冰合僅二寸許惟通舟處見水面數丈此李固渡本非通途浮橋相去尚數里馬行三里許飯武城鎮一名沙店車行四十五里宿滑州途中有土山夾道塵埃最甚咫尺不可辨俗號小灰洞蓋前路有甚于此者路西有白龍潭旁有大碑蓋亦是昔年河決所瀦也滑卽古豕韋氏之國春秋戰國屬衛負郭白馬縣本衛國曹邑狄滅衛立戴公以廬于曹袁紹遣顔良于白馬闗羽斬良以報曹公酈生所謂守白馬之津皆此也有滑臺本鄭之廩延十四日乙未晴五更車行二十五里至濬州城外乘馬入城早頓東廊有大碑曰天成橋太師魯國公蔡京奉聖旨書濬依山為州子城據山上故州在今郡城之北紹興初河失故道蕩為陂澤遺堞猶有存者舊河卻為通途東有黎陽山因以名縣聞上有大佛與館相直橋之兩岸也馬行三十里過屯子河河出太行泝流而上可至燕山故金人又名清御河築三橋以濟行者望范公善化二山是日供黄河鱖魚甚鮮而肥始作家饌道遇細車自北來先牌云蔡州都巡檢使宅眷與接伴使有連各下車相見一嫗一婦與正使皆胡跪拱手搖肘為禮然後立談良乆而去復車行四十五里過伏道望扁鵲墓墓前多生艾功倍于他艾經伏道河伏道店入湯隂縣縣有重城自此州縣有城壁市井繁盛大勝河南縣屬相州本二漢蕩隂縣羑里城在東南十五日丙申晴四更車行三十六里至相州城外安陽驛早頓馬入城人煙尤盛二酒樓曰康樂樓曰月白風清又二大樓夾街西無名東起三層秦樓也望旁巷中又有琴樓亦雄偉觀者如堵大街直北出朝京門牌曰通逺門皆甕城相卽河亶甲所居魏文帝後趙石季龍前燕慕容雋北齊皆都焉東南二十五里朝歌城紂所都也中出莤草最多故相纈名天下俗傳漂杵餘血所化也門外過安陽河至更衣亭有脊記大金正隆三年八月二十九日光禄大夫彰徳軍節度使開國公鄭建元移建雖規模甚草草然所創見也至此從便馬行每十里置一馬鋪及所過豐樂鎮居民頗多皆築小塢以自衛各有城樓西望太行頗為風埃所蔽土地平曠膏沃桑棗相望至漳河水縮沙出中多石子俗傳可以煖腹南向循河行三四里于陿處作柴橋以渡層冰峨峨中有水甚駛載冰凘以東聞水盛時至與髙岸平闊可數里土人號小黄河北行沙中又數里復渡一小橋即漳支流也囘望鄴鎮有塔古都皆在其地聞魏銅雀臺故基猶在昔為縣金以為鎮矣經講武城猶有壁壘氣象雄壮有將臺甚髙城外髙丘相望號七十二塚世傳曹公之葬以此惑後人使不至發掘或云其家數世所葬有廟屋甚雄即曹公祠也塚間又有螭首碑聞是晉碑六十里過滏河上有觀魚亭頗新壮少西百餘步入磁州城門與州治相近篆牌字甚穩大定五年所立過惠政門入禮賓坊又有東溪在驛之東聞其中是郡庠有士人十餘人夜宿滏陽驛之東北望見崔府君廟靈星門并廟棟使副以下焚香遥謁是日相州承應人狀貌甚偉衣冠亦楚楚呼問之云姓馬有校尉名目以少二百千使用一坐二十年不調非錢不行也既無差遣多只監本州酒稅務又言並無俸禄只以所收課額之餘以自給雖至多不問若有虧欠至鬻妻子以償亦不恤且歎曰若以宋朝法度未說别事且得俸禄養家又得寸進以自别吏民今此間與奴隸一等官雖甚髙未免箠楚成甚活路又本州以相纈百疋分獻接伴十六日丁酉晴自南京來飲食日勝河北尤佳可以知其民物之盛否自是不必家饌矣車行七十里邯鄲縣早頓有城及樓甚壯皆舊物也未至三里許有舊城戰國趙都漳水相去三十里許漢髙祖征陳豨至此曰豨不南據邯鄲而阻漳水吾知無能為也趙王叢臺在縣之北上有亭榭馬行四十里宿臨洺鎮洺河出其下隸洺州永年縣館舍極寛潔前有大廳旁列三節位次廳後主廊方分使副位廳有脊記鎮國大將軍充洺州防禦使護軍開國侯食邑一千户食實封一百户吾古論三合重建吾古論意卽烏古倫因語訛耳三合曾以兵部侍郎來泗州理會俘擄人又聞彼中有三等官漢官契丹女直三者雜居省部文移官司牓示各用其字吏人及教學者亦以此為别道旁數處賣酒皆掘地深闊可三四尺累塊上風以禦寒一瓶貯酒苕菷為望石炭數塊以備煖盪河朔之樸如此道中有一㬠尸棚其俗行有死者不埋立四木髙丈餘為棚其上以荆棘覆其尸以防鴟梟狗䑕之害立一牌以記其名姓年月有人識認則從便塟埋否則任之十七日戊戌晴車行三十五里過沙河縣屬邢州縣有重城換驢行二十五里至邢州今榜曰安國軍甕城三重入門直對州衙東入邢臺驛早頓過七教坊椽木巷立節坊成義坊熙暉樓市肆牌額多寫般作有大塔十三層寺宇亦雄壯北門外陂塘冰厚尺餘臠疊岸上如柱礎然青瑩如菜石三里至柳溪唐柳公權遺跡亭榭數所引溪水載之髙岸流觴曲水為邢臺遊觀之地東北有邢山出邢沙碾玉所用也過沙河數處春夏間皆不可徒涉四十五里宿内丘縣沙河縣漢襄國縣地邢卽春秋邢國衛滅之戰國屬趙漢常山王張耳後趙石勒皆都焉勒陷冀州張賓曰襄國因山慿險形勝之地可都也内丘亦屬邢有干言山詩所謂出宿于干飲餞于言者十八日己亥晴車行六十里柏鄉縣早頓舊日堯山卽柏人也漢髙祖心動不宿之地六十里宿趙州道中過漢光武廟有塑像坐而侍者四人云是宰相不著姓氏壁間畫二十八將廟屋止一間廊廡故基甚廣碑石露立者凡四一開元十九年本郡進士李雲撰范陽盧規書一開元廿二年立皆對偶文也餘皆本朝所立有二石人皆腰斬道旁俗云光武欲北渡滹沱有二人捧漿以進行數里恐追襲者得其踪復還斬之或云夜遇二人問途不應怒而斬之已乃石也行十里由王郎城縱廣約數里去趙州五里使副以下觀石橋橋有石欄髙二尺餘上分三道下為洞橋兩馬頭又各為二洞旁為小亭板閣以入石理堅緻題刻甚衆多是昔時奉使者有云連鵬舉使大金至絶域實居首選宣和六年八月亦有天㑹中回謝大齊使人留題不能盡讀橋上片石有張果老驢迹四遇一夫自言舉人問所業云通三史試詞賦論䇿然褐衣與皁隸無别上馬入城外驛負郭曰平棘縣今改曰沃州春秋屬晉戰國屬趙後魏曰殷北齊曰趙隋曰欒為慶源軍節度使臨城縣有泜水韓信斬成安君于此是日聞接伴使之兄左丞安禮罷為滄州刺史初安禮娶金主之妹妹死欲妻以女辭以不當復娶妻姪强之不可金主怒以抗敕坐之道逢重車三載鐵餘載板木欲修河橋十九日庚子晴風車行三十里欒城縣早頓晉大夫欒氏之邑又七十里宿真定府城外館館分東西道中見掃帚桑特起林中數尺枝條叢細宛如帚狀稍指東南或謂此方有居民受其䕃者過滹沱河由土橋以行河側有開凌村以光武渡河未畢數車而冰陷俗傳河冰隨車而拆故以名自河以北每五里許必有小舍或在古塚上每夜輪保甲十人宿其中以伺察行者真定在春秋時屬鮮虞國為晉所滅戰國屬趙漢為恒山郡文帝改常山本中山國之東垣陳豨將趙利守此髙帝攻拔之改曰真定元和改鎮州五代改曰真定府唐叛将李寳臣王武俊王廷湊等皆據此二十日辛丑晴歇泊住驛二十一日壬寅晴賜宴東館口宣云來持使節遠冒寒威宜頒在鎬之恩以示禮賓之意又云遠涉道途衝冒霜雪爰嘉勞勩宜錫芳甘禮悉如汴京但第三第四行及飯遍使樂人舞旋大茶飯中有沙糖熊白使副下食人趨進尤肅押宴下人李泉爭執禮數語具語録泉撻條子六十其徒三人各三十每一下必令毒打十下易一人不惟三節人快之雖都管監門吏卒皆怒其生事無不稱快俗雖好勝要可以禮屈也安徳為開州刺史以治行聞道中頗讀莊子故臨事間有可觀然貪呇狠愎不知何以有政聲益知北方守令難得循良者二十二日癸卯晴四更車行七十里飯新樂縣尤繁庶古鮮虞國也又四十五里宿中山府靖康之禍真定中山皆固守不下中山城外猶有敗城圍之金所築也此地堯所始封戰國初為中山國魏文侯使樂羊伐取之以封太子擊後燕慕容垂移都後魏為安州唐改定州城門曰昭化甕城三里甚壯城濠有流水過信利鮮虞髙陽三坊坊各有小樓又有明月樓道旁多重車有先牌云輔國新授西京同知留守子城門亦雄偉曰中山門兩旁亦有挾樓入門東行百餘步入驛子城西門曰夕陽樓卽望長安詞所作之地北去又有仁教化原二坊負郭安喜縣令姓夾谷酒名曰九醖曰瓊酥二十三日甲辰晴天氣清寒方思近火四更車行五十里望都縣早飯縣有城樓又七十里宿保州城壕甕城皆三里城約厚十餘丈門曰雞川負郭為保塞縣驛曰金臺燕昭王遺迹也驛西城上有亭曰富覽御莊聞在西上四十里過鴻福院三門有樓崇積倉道西有小門榜曰教女直學州樓曰順天軍驛在州治西南驛分東西供張如法屋宇寛潔初至望都聞國主近打圍曾至此自後人家粉壁多標寫禁約不得採捕野物舊傳為禁殺下令至此乃知燕京五百里内皆是御圍場故不容民間採捕耳皇朝初置保塞軍後升為州政和三年為清苑郡望都堯母慶都所居堯山在北慶都山在南登堯山見慶都山故名望都二十四日乙巳晴五更車行四十五里至安肅軍南城外上馬由城中又入北城驛早食軍本遂城縣屬易州皇朝置静戎軍後改焉二城甚固南城南門三重北門一重為安肅縣治有雄威營二所北城兩門各二重二城之間有濠塹水櫃積冰甚多方取以入窖又有祥光塔福善寺食罷又乘馬出北門過一大廟或云北嶽行宫車行二十五里過白溝河又五里宿固城鎮人物衣裝又非河北比男子多露頭婦人多耆婆把車人云只過白溝都是北人人便别也二十五日丙午晴五更車行三十里定興縣早食縣本黄村近以為邑今歳九月方築城四旬畢工雉堞甚整獨門樓未起驛舍亦創造始待使客于此又六十里至涿州漢髙帝立涿郡魏文帝更名范陽新城縣有督亢陂溉田號為膏腴即太子丹所獻督亢地圖也入宣清門過釋迦普賢堂商稅務范陽縣樓入子城城無門上有清風樓兩旁土累為髙臺左曰迎月樓右曰棲霞樓州治在道西門廡陋甚館驛尤湫隘天使髙徳亨傳宣撫問虞友益賜銀合湯藥銀合二十五兩藥十貼皆客路所資以紅綾為貼有曰每服一榛子大如南方之比梧子也録其語如後敕某卿㑹朝嵗旦䝉犯寒威眷惟將命之恭有加勞勩宜錫衛生之物迎致沖和今差入内内侍御直郎虞友益賜卿湯藥一銀合往堂祗受故兹詔諭想宜知悉冬寒卿比平好否遣書指不多及二十五日敕某複名不書姓副使書姓名二十六日丁未晴五更車行六十里良鄉縣早食因宿道中以瑠璃河李河或云劉堤岸為水所壊又迂行二十里方抵縣縣有城門二重衙在道左驛在北門牆下有大防山二十七日戊申晴風大作抵暮不止四更初車行六十里過盧溝河至燕山城外去燕賓館百餘步使副上馬三節具衣冠隨入館中亭子館伴傳銜正使起復正議大夫都水監上輕車都尉安定郡開國伯食邑七百户賜紫金魚袋梁肅副使廣威將軍尚書工部郎中上騎都尉廣平郡開國子食邑五百户圖克坦子澄坦舊作案圖克今改徒單肅兼押宴白琮賜宴李顯金賜酒果酒九行罷入城道旁無居民城濠外土岸髙厚夾道植栁甚整行約五里經端禮門外方至南門過城壕上大石橋入第一樓七間無名旁有二亭兩旁青粉髙屏牆甚長相對開六門以通出入或言其中細軍所屯也次入豐宜門門樓九間尤偉麗分三門由東門以入又過龍津橋二橋皆以石欄分為三道中道限以護穽國主所行也龍津雄壯特甚中道及扶欄四行華表柱皆以燕石為之其色正白而鐫鏤精巧如圖畫然橋下一水清深東流橋北二小亭東亭有橋名碑次入宣陽門樓九間分三門由西門入會同館館在内廊之西南向入館門使副與館伴立馬下節人從互聲兩喏傳示訖分位張鉉撫問琮口宣云遠持使節已次近郊宜示宴慈以彰眷遇顯金云遠乘軺傳已次國門宜有寵頒以休勞勩鉉云㑹朝嵗旦弭節宴亭爰念勤勞宜加省問二十八日己酉晴風止賜酒果口宣云已休侯館將造明庭方修進止之儀宜有甘芳之錫閤門副使左光慶到館說朝見儀二十九日庚戌晴天明行司捧國書上馬前行使副上馬與館伴並行入見館之西有門門外皆民居宣陽門内街分三道中有朱欄二行跨大溝為限欄外植栁髙麗人西夏人二館在東與㑹同館相對立馬門外俟使副一行既過方相繼而行長廊東西曲尺各二百五十間廊頭各有三層樓亭䕶以綠欄杆廊有三路貫其中南路兩門外皆民居中路無門而路甚闊左為太廟右為三省北路左門外有屏牆夾道中有官府南向右門入六部蓋在三省之後也正門十一間下列五門號應天門左右有行樓折而南朶樓曲尺各三層四垂朶樓城下有檢鼓院又有左右掖門在東西城之中兩角又朶樓曲尺三層初出館横過馳道皆卻葢三節人至東廊北頭下馬使副至左掖門皆步而入左掖門後為敷徳門其東廊之外樓觀翬飛聞是東苑西廊有門卽大安殿門外左翔龍門之後敷徳後為集英門兩門左右各又有門集英之右曰㑹通其東偏為東宫西有長廊中起髙樓卽大安殿前廣祐樓也㑹通門内之西廊卽大安之東榮為麗夏茶酒幕次其後為承明門北向相對為昭慶門東為集禧門西即左嘉㑹門之後相對有右嘉㑹門其中即大安殿後宣明門之前待班幕次在其西敷徳之西門及㑹通承明左嘉㑹皆所由之路也入宣明門及仁政殿左門在隔門外當中立俟百官裏見退即左入殿下大氈上上有一品至七品牌子蓋是其朝著也氈中有大花鳯使立鳯花之中副在其右大殿九楹前有露臺金主坐榻上儀衛整肅殆如塑像殿兩旁廊二間髙門三間又廊二間通一行二十五間殿柱皆衣文繡兩廊各三十間中有鐘鼓樓垂紅縁金漆簾簷頭皆挂繡額亭下有撮椒井亭二宣明門三仁政殿側門二皆列㦸殿門外衛士二百人分列兩階皆戴金花帽錦袍宣明門以外直至外廊下除麗夏幕次前皆甲士青絛甲居左執黄龍旗紅絛甲居右執紅龍旗外廊下皆銀鎗自左掖門以入皆金鎗執鎗者具裝門以執弓矢者一被七分甲人依一柱以立每數人必以一女真衣皁緊絲衫者部之凡門屋下皆素隊挾弓矢大門四十人小門二十人惟仁政左門用甲士皆自未明分立訖見退無有移動者是日髙麗西夏使人同見髙麗使三綱衣冠如本朝一為賀正一謝遣使一謝賜羊酒上節幞頭犀偏帶中節折上巾犀束帶下節獻頂巾犀束帶皆紫衫西夏使二綱一賀正一謝遣使皆以正子為正使戴金冠製作甚工朱袍蹀躞狀貌甚偉副使衣冠如髙麗人三節皆不入見椎髻被髮小巾尖帽皆夷服也西夏人進禮物十二牀馬二十匹海東青七細狗五亦旅于庭馬嘶狗吠頗亂朝儀隔門在殿門後簷下上以木雕為銅瓦小栱甚巧麗隨門五間每間朱門四扇金釘粲然入見如儀受衣帶而退就館賜茶酒左宣徽使敬嗣暉押伴賜宴之禮押宴與正使對坐接伴使副坐押宴下副使對二者之中惟茶酒則小異本是殿上置酒多就館安排必以兩府為押伴押伴廟坐使副接伴對坐兩旁立班及對揖位次必差向前嗣暉雍容莊重而善應接嘗使于我盡記朝儀以歸國中典章禮文多出其手舊為宣徽力諫亮南牧削籍為民新主立復用之三十日辛亥晴賜宴館中完顔宗嗣賜宴烏古倫璋賜酒果完顔彦押宴宴罷館伴送葡萄酒攻媿集卷一百十一, WYG: ''}
