body:
  text: 宋樓鑰撰志銘贈金紫光祿大夫薑公墓志銘公諱浩建炎紹興間來寓四明至十年嵗在庚申公之弟濤以流寓名薦書十二年遂登進士第人爭曰是東都大家能以舉子業致身于兵火流離之餘耶惟薑氏當承平時富盛甲京師婚姻多后妃侯王之家聲勢翕赫而最重儒學藏書築館延太學名士以訓子弟禮意隆洽賓至亦留設盛饌參政簡齋陳公及一時勝遊皆求閲未見書或登科以去又請舉其友若昆弟題名家孰多有顯人如參政謝公克家侍御江公躋待制髙公至臨少卿汪公思溫及其季吏部思齊皆在焉積而至此以起其家公盡室南來弟猶未冠公方急祿每以未能卒業為恨獨任家事勉其弟力學撫育訓導儒風益振二十九年其長子模中浙漕舉至于三四訖不第又二十年曰桐曰柄曰煁曰煥曰光等相繼纍上禮部入太學而柄與光同以紹熙四年賜第燧又繼之皆公之子若孫也噫亦盛矣公字浩然曾祖德安杭州助教贈忠翊郎祖侁右侍禁閣門祗候纍贈武經郎父寬成忠郎閣門祗候纍贈武功大夫吉州刺史娶朱氏封宜人纍贈和政郡夫人少師孝莊之女視欽成皇后為祖姑又仁懷皇后之姪也宣和四年少師以郊祀恩奏補承信郎調監平江府都稅務福州鹽稅務改明州市舶務行在草料場嚴州在城都稅務臨安府比較務點檢户部贍軍酒庫所糴場行在左藏庫再任京畿第二將荆湖北路安撫司準備將領改兩浙東路兵馬都監駐明州者四一改婺州尋除兵馬鈐轄紹興府駐劄升馬步軍副總管駐明州秩滿改福州踰年丐祠主管台州崇道觀又任建寧府武夷山沖佑觀未滿納祿淳熙十二年十二月癸亥卒于家享年七十有七積官至武節大夫始夫人先公十年卒葬于慶元府鄞縣豐樂鄉東山之原明年二月庚申諸孤奉公之喪合焉男六人模故忠翊郎監建康府户部贍軍酒庫所糴場贈通直郎棫以召對職賔贊終武經大夫閣門宣贊舍人兩浙東路兵馬鈐轄朴以疾不仕桐武翼大夫新權發遣郴州軍州事柄故奉議郎知濠州鍾離縣事林女六人長適故朝奉大夫知泰州司馬儼次適武節郎新東南第四副將紹興府駐劄董璆次適奉議郎知嘉興府海鹽縣事史彌謹次適國子進士樓溱次適建昌軍新城縣主簿王深一蚤亡孫男一十人炳煜武經郎新特差充殿前司書寫機宜文字煁故承節郎閣門看班祗候監饒州在城商稅煥故從義郎監兩浙轉運司婺州蘭溪酒庫光奉議郎新通判婺州軍州事燧文林郎監泰州角斜鹽場焯爚國子進士剡國學生煒煓熠國子進士㷆燔焴磷煟燫炎承信郎孫女九人修武郎新監湖州在城都酒務宋克明太學生汪祥進士陸枃迪功郎辰州司户參軍司馬遂奉議郎知江州彭澤縣事趙希蓁迪功郎新臨安府仁和縣主簿黃夢與史挺之承信郎新監撫州户部贍軍酒庫王堅迪功郎新嚴州淳安縣主簿趙希怤其壻也餘在室曾孫二十人埏垓填垕野塈坰奎坡孰增堂􅟓墅基墉壁至􅘏堅曾孫女十人適進士何沖朱中庸顧大聲國子進士趙時古餘在室公少警敏及見前輩篤志問學書傳多成誦尤熟老莊之書人但知為佳子弟耳家在汴都外城一旦碎于兵燬至京口遇潰兵劫鹵忽為窶人吉州旋即世聚食數十口皆仰給于公甫冠入仕厲志官業動有可稱北兵將陷平江郡人驚奔而閽者阻之公叱使開關去者不勝計公殿後幾不免人皆德之及掌榷酤請創糴場以供酒事貸本錢于販曹要告身為質公以文書銜褎而進即命公為之定糴價三等比時估為髙初亦罔測未幾米商輻湊價日以平嵗終會其息至百萬緡衆始歎服至今遵用焉孝宗登極婺以犒軍稍緩口語籍籍公禽治數輩無敢譁者所至總戎有律閲武有程慢令者毫髮不貸行之以公人自畏讋所事帥守魏惠憲王崇憲靖王丞相梁儀公克家參政周公葵給事吳公芾敷文閣直學士俞公俟龍圖閣學士趙公子潚皆深相器重樞密胡公松年守姑蘇擇官寮十人日供故事右列中惟公得預選所陳又能切中時病仕于明最久詹事周公操朝請莫公伯鎔俱嘗同寮相與素厚莫公諸子皆為清望官公至必使環立以侍中書舍人濟來為長史以父執致敬周公為御史露章推薦太師史文惠王丞相王魯公周益公皆稱于朝廷諸子出仕猶賴前數公提挈之力觀其所與則其所存可知矣前後以見辭五對清光奏陳多合上意有老成更練之褒遂賜橫帶入仕幾一甲子吏考十之七八終始無玷臨機健決不問劇易遇事風生以智為樂談論亹亹音吐洪暢聽者忘倦此皆出于天資惟是生長富貴既更世故遽能率家人刻苦亷介有寒素之所不及田里細務詳練通曉尤為難能少有至性母恭人郭氏疾革刲股以進友愛宗黨初以銖積寸纍漸為溫飽計會從弟迫于官逋舉以濟之季父客死江西又無嗣公取其遺骨葬于先塋之側嵗時祭享族人之廢祀必遍及之弟妹婚嫁身任其責一介不妄取豫性實好施推其餘以周人之急亦所不靳也宫教濤出繼伯父既定居吾鄉買地城北分東隅與之築室比鄰人羡其雍熙之軌焉舊學不忘時有清新之句自為上梁之文思舊隱于夷門不堪回首築新居于鄞水粗可容身此特其一班耳専意教子不以家務嬰其心夜或焚香危坐使之誦習率二鼓而罷模柄之預薦栻之賜對公皆及見之其在婺時東萊吕太史未第公知其賢遣二子從遊模與之同中漕薦既即世子孫益守遺訓雖事力不及盛時一二而文風彬彬遂為儒家始以次子封武顯大夫纍至和州防禦使柄升朝改贈宣奉大夫今至金紫光祿大夫足以信公之志于泉下後裔方興殆未可量也奉佛素謹楞嚴法華諸經夫婦翻閲以千萬計入閩積俸置大藏經歸置家舍結字端重雖薄遽中家書無一筆行草手鈔內典數十軸首尾如一從妹歸丞相夀春魏文節公平昔相好為堂西偏藕花盈池丞相名以超蓮書扁以遺之既屬疾挂衣冠杜門自頤家庭孝謹調娛藥餌久而不倦多拱手默坐間乘安輿致敬家廟佛像一絲不挂訖以夀終可以無憾矣鑰汪出也外祖少卿兄弟仕京師同為王府贊讀既皆嘗授館通家如至親先妣吳國時猶未笄能備言公家風範相依下汴初寓浙右數困冦攘其卒來鄞蓋以外祖為歸也外祖尤顧舊好經理不遺餘力既命伯舅娶公之女弟而宫教洎文節公與伯仲二舅同在家孰訓飭如一四人聯捷薦書自爾姻婭如朱陳然鑰以外門之故得從公遊又與諸郎共學仲舅尚書狀公之行蓋嘗助之屬藁今二十餘年母氏舅氏俱即世而棫朴柄煁煥剡㷆亦皆亡矣郴陽泣謂鑰曰先銘未立日夜痛心兄弟凋零汪氏中表亦無幾捨君無有知先人之詳者敢以請鑰撫事感慨又嘗銘其二兄及鍾離之墓不得辭銘曰太嶽之後著姓惟薑承平百年益大而昌延招名儒談經左孰典刑具存燕及嗣續矯矯薑公克荷克承艱難百罹既踣而興才有餘刃仕一甲子黃金橫帶晚克知止積善餘慶遺訓有傳踵登賢科儒風蔚然東山之原松柏斯兊銘以表之其興未艾司法朝君墓志銘朝氏系出于西周王子朝漢有錯為御史大夫元魏有清為樂陵太守唐有左補闕大夫杲或謂其家有劉元德起兵時錢劵宋朝始祖廟諱故書作元案此稱蜀漢昭烈帝之字避則其傳世逺矣本朝文元公以清德雅望冠一時文莊公繼掌內外制賜第京師昭德坊後益蕃衍散處汴鄭澶濟間南渡以來江浙蜀道所在寓居實皆出于昭德無他朝也君諱某字某生于濟之任城曾祖仲參贈金紫光祿大夫祖端義奉議郎簽書髙郵軍判官廳公事考巽之超然不仕妣閭丘氏君資稟不凡少承家法篤于孝友嘗刲股以起母及仲兄之危疾年踰強仕從叔侍郎濟陽侯謙之以郊恩補君將仕郎授迪功郎監潭州南嶽廟循從政郎調建昌軍新城縣主簿繼為沅州司法參軍君宦情素薄而臨事殊不苟率有可稱其在新城豪強犁人之墓冤欣莫直君為得遺骸于田中遂伸存亡之枉廣昌令以匿冦事攘富人之資骨肉駭散凍餒于外獄久不決君受責欲行令輒賂君拒之以實聞而還所籍其家優裕如初居沅才三月有冒官稱者守意希賞抵以深文僚吏和之君獨不可守數諭意不為動善善惡惡行其志類此俄感疾已而起居如平時忽趺坐而逝安靜不怛不惟積善之報殆有自得而莫知也君宜達而沈下位宜夀而止六十一實乾道元年正月三日也娶薑氏蚤卒子五人子騫子與子思子遊子冉文學才幹俱有家法三女壻通直郎趙某沈忠恕杜雋皆世家也孫男八人百源百則百海百制百利百禮百揚百順女六人曾孫二世黻世表七月朔歸至寓居撫州金溪縣十月二十六日葬君于臨川縣崇德鄉嵯峩山之西敷文閣直學士公武君之弟行嘗狀君之行事至開禧三年凡四十三年矣君之子惟子遊在孫亦亡二人矣百海遊鄞求銘于鑰老矣學落何足以發幽光獨念中原衣冠故家日就凋零文獻相傳如昭德之朝則又鮮矣少時及識敷學風采服其該洽其誦君之賢如許以託名不朽為幸銘曰王謝故家風氣一種朝之在漢實配于董至宋益大名勝繼踵法藏耄智讀者皆竦濟北嵩山詞采泉湧恂恂法曹典刑莊重以君之才卒于流冗我思前良託名為寵直祕閣徐公墓志銘慶元二年有旨朝散大夫徐夢華除直祕閣蓋異恩也始公生于靖康之初元嵗在丙午是冬金人再犯闕海內雲擾建炎二年寇躪江右叛將大盜蜂起公之生才四年母氏襁負走陂頭劉氏家僅免于難公既省事自念生長兵間欲得盡見事之始末宦遊四方收羅野史及他文書多至二百餘家為編年之體會稡成書傳聞異辭者又從而訂正之號三朝北盟集編自政和七年海上之盟迄逆亮之斃上下四十五載間具列事實制敕詔誥國書奏疏記序碑志之文有正史所不及載者搜掇無遺成二百五十卷又有綱目一册併藏于家至是史官方修髙宗皇帝實録修撰楊公輔率同寮十人奏乞取公所編之書仍下臨江軍給筆札抄録以進十一月史官又奏其書有補于史筆為多仍薦公之賢大略云亷靜樂道好學不衰故有是命又奏所編書目內有百餘家館所未備復命録其全書諸公欲相挽一出與同筆削有諭公者答曰此書本不為進身計力辭之後又得未見之書再編集補三帙所居闢一堂取詞命褒語篇曰儒榮以侈上賜樞密劉公德秀為之記待制楊公萬里為之銘少傅周公必大端明洪公邁而下賦詩者數百篇逺邇流傳而公之名愈顯矣公字商老情江縣人曾祖用和祖士穩俱不仕父世亨纍贈通議大夫母楊氏贈碩人公俊敏篤學至忘飢渴寒暑讀書過眼輒不忘通貫經史百家尤熟晉宋南北五代時事自熙豐元祐以來名公奏議及出處大致無不該綜作文皆有根據用事精確紹興二十四年登進士科授左迪功郎洪州新建縣尉以外艱不赴調鬱林州司户參軍到官未幾又以母憂而歸後為江陵府司户任滿關升左從政郎乾道四年外移南安軍教授以舉主改宣教郎知潭州湘隂縣次授廣南西路轉運司主管文字賜緋衣銀魚諸司辟知賓州到郡遭罷主管建寧府武夷山沖佑觀華州雲臺觀紹熙元年授荆湖北路安撫司參議官慶元初引親嫌徑歸再奉沖佑祠引年致仕六年賜紫衣金魚仕宦幾五十年間居之日為多南安官舍素在城外請遷入以附校官建雲漢閣以奉御書立濓溪二程先生祠于左劉元城張橫浦先生祠于右自為之記參政龔公茂良時帥江西讀而善之以講筵官薦湘隂並湖少田多盜帥括盜耕湖田者悉輸租號增耕稅他邑或移别賦應命公恐重困吾民謂邑無新田稅無從出帥盛怒移湘潭丞仍窘托邑事無可疵瑕者卒免于行更加禮焉增葺學宫嚴設祠像祭器書籍以次而舉選士主之湘隂于是始興于學矣朝廷議更二廣鹽法遣浙西安撫司幹官胡廷直銜命與二漕臣集議境上西漕王公正己以公審知利害邀至蒼梧會所公謂二廣事體不同使者徒見東路郡多瀕江可通客販固已非是若西路多山郡近江者少道阻運艱客販不通價必騰踴郡計不給重為民害郡有兵吏可役民不告勞若止循官般舊法初無抑配等弊公私俱便可以經久衆不能奪胡亦是之議定而去將入奏為主議者所訹畏罪希進盡變其説擢為東路提舉旋升西漕侍郎詹公儀之出鎮桂林共行客販之策慮公或以賓州奏事必撼成説武憲熊飛素不快于公二人從而惎之熊上悔舉之章公遂罷不三年二廣之害果如公言民食貴鹽富商至破産喪生胡憂懼至死詹亦得罪復行舊制至今便之周益公當軸謂公前謾未直公答以事久自明不待辨也歸而悼亡連喪子女宦情愈泊然矣楊誠齋挽使造朝薦進甚力廟堂將處內郡止求議幕荆帥樞使王公藺移鎮長沙以公可任帥事申省委公經時而侍郎袁公樞始來知公止請上幕俸給盡以三月帥俸歸之又力辭尤歎其亷既而從母之子侍郎彭公龜年為帥公去替止半年法不用避公乞祠以去彭公餞以詩云法許公不許法不如公嚴年雖已髙手不釋卷有讀書記忘集醫録集仙後録各三册會録四册皆以儒榮冠其目家有萬書閣籖帙甚整能視細字如年少時事親盡孝祭器封鐍惟謹有家記一編載時祀禮式又揭百不憂堂以志義方之效閣前亂石森立石間多紅薇花若張錦然號紫薇洞天勝日深衣坐閣下二鶴翔舞于前殆神仙中人也弟妹四人弟得之亦休官而歸時節聚會子孫甥壻羅拜為夀竟觴卜夜無倦色從母昆弟七人時置酒款集韋濟川楫黃仲禮琮彭子夀而下俱效之開禧元年親黨為八十之慶宴笑數日乃罷中嬰小疾精明如故猶能課諸孫誦習三年八月浴出瞑目危坐而化二十有一日也娶豐城鄢氏先公二十一年卒封贈至宜人五男子簡從事郎新邵州新化縣令範迪功郎新袁州司理參軍簵業進士次子符幼子節皆蚤殁二女長適免解進士曾三異次適進士鄒塒亦前卒孫男十人長峯亡矣次嶢次金酉薦于鄉嵩峩訔崇嶷嶬􅍲一女適鄉貢進士向公美曾孫二人郯郁二女尚幼諸孤以嘉定元年十一月庚申奉公之柩葬于縣之修德鄉古牛岡之原始鑰屏居四明得子夀書俾為儒榮堂賦詩時雖抱疴為作古風寄之已而子夀與公俱以書來謝比聞子夀之訃固已不堪云亡之痛而公亦下世矣公既葬之二年簡以赴調來見謂前詩恨未見北盟全書盡録以見遺又出其季父致政所作行狀求銘致政嘗著左氏國紀中書舍人陳公傅良為之序蓋深于經者書事尤核敬掇其狀而為之銘銘曰靖康兵禍古所未有凡曰臣子痛心疾首公生初元以及己酉犬羊長驅薦食江右幼而得全實賴襁負少長讀書志已不苟宦遊四方咨訪尋究網羅舊聞編不停手二百餘家筆下輻湊繫日繫年别記誰某有制有書有疏有奏衆説雜然考證是否名聞于朝六丁下取蓬萊漢閣寵數加厚儒榮名堂足以不朽才不盡用仕多不偶身退名尊二疏俱夀奄然仙去何憾何咎有子克孝慶流在後銘以發之尚照林藪朝請大夫吳公并碩人姚氏墓志銘仙居吳氏自龍圖閣直學士給事中康肅公以儒術發身入從出藩為時名臣長子興化使君首躡世科兄弟簪笏蟬聮多至郡守族黨中登貢籍擢科級者相望遂為巨族鑰淳熙五年由敕令所刪定官贅倅丹丘始拜康肅于湖山堂時居邑之石井既挂衣冠夫婦偕踰七十子孫詵詵坐享耆福溪山勝絶來者如遊崑閬鑰一見辱知奬良厚因得與諸子遊今識其家四世矣興化明鋭竒龎謂必可接武夷路不幸嬰末疾止于中夀次子鄞丞壻四明史氏鑰以第三子娶其女遂為姻家今知吉州公比為大理寺主簿同朝見過泣而言曰先君抱負不凡先妣婦德素著而葬之日兄弟尚未立未有銘文以傳後介弟既亡繄誰之責援親契以請余感念疇昔為之永慨乃掇括蒼二車郭君睎宗所為行狀及興化自為姚碩人行述大概併為之銘君諱津字仲登世為台之仙居人曾祖允昭故贈武略大夫祖師錫故任右承議郎纍贈光祿大夫考芾康肅公也官通奉大夫纍贈少師妣郭氏贈魯國夫人君幼嗜學強記博通羣書尤熟文選或覆誦終帙年十有五以詞賦魁鄉校嘗從祕書郎王公衜頌臺主簿胡公權殿中季公棠遊三人皆名儒每器重之康肅為御史以郊恩任將仕郎為銓闈第二人授右迪功郎監潭州南嶽廟侍旁益肆于學連薦漕臺登乾道五年進士乙科充兩浙東路安撫司幹辦公事改宣教郎知處州麗水縣監行在都進奏院為親求補外添差通判紹興府淳熙九年賜五品服十年繼丁內外艱執喪哀甚倚廬增慕靈芝産于楣人嗟其孝感紀以詩文服除權發遣江隂軍未上改主管建寧府武夷山沖佑觀尋知廣德軍以足疾丐歸改興化軍慶元二年屬疾八月四日終于家享年六十有四纍官至朝請大夫娶姚氏封安人先公六年卒葬之地曰西隩去先墓百步纍贈碩人男四人機朝請郎知吉州軍州事朴故通直郎知慶元府鄞縣丞栻迪功郎福州福清縣主簿標迪功郎衢州開化縣尉兼王簿女一人適進士姚棟孫男四人燁煜煒灼孫女九人長適承奉郎監西京中嶽廟樓治次適從事郎新贛州司户參軍葉言次適將仕郎盧樵次適承信郎新差都大提點坑冶司監轄銅錢金銀場顧士龍餘在室曾孫男一人諸孤以十二月辛酉葬公于郭但山東隩之原遷碩人之柩祔焉公志趣髙邁不溺于膏粱之習種學績文與寒畯爭馳久在親側宦學增益小試于外動有可稱初入師幕丞相蔣公太師史公為帥屬以文詞以逺器期之丞相葛公樞使黃公為僚相好號一時幕府之盛麗水試邑恪守家範夙興冠帶視事決訟如流庭無留牘嚴于治盜民以奠居邑社稷壇壝圮壞學宫尤不葺公謂非所以安士訓民也乃築三壇于學之東偏又徹學而新之嵗祀月書如儀士民俱勸焉及官奏邸同知樞密院事謝公時在諌坡舉公自代有曰治邑有聲立朝無玷方嚮于用懷親求歸朝士歎其髙致賦詩宴餞歸娛膝下久之乃到官參政李忠文公多以郡事委之裁決嵗飢流殍盈路公請發圭租倡率勸分人遂樂從待制朱文公為提舉官任以荒政躬走阡陌如懷隱憂有所措畫俱從其言以文學淵源政事詳練薦之廣德久旱種不入土粟價翔踴公齋禱祠山隨車沛然時米舟輻湊官兵得空劵纍月悉以給之積訟不決而兩獄隘陋卑濕公曰不葺不決疫將興矣先呼囚徒稽貌察辭隨處以法輕繫以片言折之諭獄官邑令日決數事旬餘囹圄為清減商算損酒價訪水利民聽已孚而去矣遮道擁車至有泣者曰官何來之暮而去之速乎康肅軫惠鄰里穀貴則損價以糶嵗寒則賦粟以濟散藥給棺一方賴之公謹不敢廢湖山亭館以時整葺追慕不足築祠于堂之隩又以隱居詩篇刻石時節擷芳薦新事之如生耆舊有為父母所厚者尊禮之如故時正旦合鄉之士夫于邑庠謁先聖先師及先賢之祠序齒講拜升堂舉酒略如鄉飲之儀為文平淡援筆成詩蔚有父風合詩文十五卷藏于家莊重恬靜中無機心與人交久而彌親不知者或以為簡公不改其度寬裕容物無疾言遽色服用儉約而厚拊姻舊雖甚費不靳康肅嘗以嵗侵為憂公適歸自稽山白曰頃年得祿儲穀可數千斛舉以均濟親顔大喜殆有前輩麥舟之餘意使其得究于用可以及物可以亢宗而見于世者止此可哀也已碩人家黃巖承信郎義之女甫笄喪母已能任家政既歸于吳舅始丞郡而家尚寠寓族長之家光祿洎夫人俱存家法素嚴魯國病足已久矣夫子方從師友于外無娣姒之助以冢婦獨任梱內之責人以為難光祿與夫人既喪用益窘小姑出適發奩具以佐之石井卜築竭所儲以庚費康肅素好賓客不問家有無先意治具以竣所需康肅以賢婦稱之見于遺札其亡也夫子哭之甚哀吉州以作邑有聲連嵗進擢以至大郡可以知興化義方之訓鄞丞既亡而吉州求嫡母之銘甚切又可以見碩人鳲鳩之德是皆可銘也已銘曰括之陽兮仙所居伊石井兮公之廬隄萬壑兮清流瀦夾明鏡兮澄冰壺偉康肅兮蚤垂車謝軒冕兮天為徒君冢嫡兮如伯魚傳衣鉢兮鄴侯書宦學富兮歷仕塗見諸用兮直緒餘歸不改兮先規模終相從兮山之隅夫人德兮鳲鳩如義方壺彞兮藹里閭我維銘兮子刻諸慰孝思兮賁幽墟直祕閣孟君墓志銘君諱嵩字嶠之孟姓也昭慈聖獻皇后兄子信安郡王之次子也后以聖德母儀四朝信安勳在社稷密贊中興賢德問學為戚閈之冠髙宗寵遇如唐肅宗之待李鄴侯無與比者公之髙祖在安武軍觀察留後贈太師韓王祖彥衍中散大夫行開封府左司録贈太師豫章郡王信安諱忠厚少師保寧軍節度使充萬夀觀使提舉祕書省贈太師母秦魯國夫人王氏世本汴人五世祖魏王徙居衛州共城後復居汴信安南渡家姑蘇遂為長洲縣人君十嵗以祖蔭補承事郎性至孝不忍捨親出仕奉祠膝下者數年紹興二十七年任軍器監主簿未幾信安薨懇免臨奠特恩除直祕閣賜緋魚服除授浙西安撫司主管機宜文字幕府笑談一坐盡傾事無巨細勤于關決使長多資決而後行未滿除監尚書六部門時隆興改元之季冬也乾道初供職職事簡寡而才地有餘尚書郎或有假故長二更委攝承幾遍二十四曹遇事益練習而聲譽日休輪對陳利害甚悉上嘉納之六月始以制書攝倉部公自以驟進抗章請外二年通判楚州又力請祠再任主管台州崇道觀滿秩通判臨安府七年瓜期將及會光宗以皇太子尹京易倅為府推八年始改浙西安撫司參議官淳熙三年八月到任蓋家食者餘十載淡然不復以仕進為意人皆期以逺到而明年八月丙戌以微疾卒享年四十有四纍官至朝奉郎五年四月癸酉葬于常州無錫縣富安鄉許峴山之原去先塋數百步娶仲氏左朝請大夫淮南安撫司參議官并之女後公七年嵗在甲辰卒有賢行克相夫子子男五人夔右宣義郎監秀州華亭縣市舶務次曰曾俱先卒次曰猷朝請大夫主管建寧府武夷山沖佑觀次曰導朝奉大夫權知嚴州幼曰翔故迪功郎信州司户參軍女一人適朝奉郎知真州李大理孫五人繼勳修職郎監鎮江府大軍倉門繼華修職郎監行在點檢贍軍激賞酒庫所都錢庫繼顯迪功郎新鎮江府丹陽縣尉繼勤將仕郎繼勇兩浙轉運司進士惟信安謙恭威重有大功而不居遜逺權勢被服儒雅居第擇窮僻處門宇卑陋以終其身至今不為勢家所奪猶存其舊吳公棫字才老仲公參議字彌性皆名士以女弟嫁吳而與仲為姻家其好賢類此故子孫多賢公自幼承義方問學有原委論議正平性又強記一經見聞輒不忘詩句清新有冰翁之風一時名公多與之遊自奉寒素而好濟人之急篤于教子刮磨豪習二子三孫俱聮名薦書繼顯先登嘉定元年進士科藹然為儒家矣鑰少隨侍都下嘗識風度而不及相接親見公在部門丞相魏文節公為天官舅氏尚書汪公為郎與公相厚稱美不容口沖佑漕淮浙為太府卿兼權刑部侍郎嚴州嘗為大理正兄弟有賢譽俱得奉周旋鑰比知貢舉首閲榜帖一見公之孫姓名為之欣然知孟氏之方興而未艾也得書以公之葬未有銘逺以見屬遂銘之以慰孝思云銘曰昭慈之聖信安之忠輔成中興盛德豐功公為愛子餘慶所鍾問津郎曹受知諸公位不稱德夀弗及中積善曠達不于其躬子孫日興益振家風我惟詩之表于幽宫攻愧集卷一百八
