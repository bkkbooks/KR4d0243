body:
  text: 宋樓鑰撰神道碑簽書樞宻院事贈資政殿大學士謚節愍王公神道碑嗚呼靖康之禍慘矣自古所未有也而一時伏節死義之士絶無而僅有之人皆以為祖宗涵養幾二百年不應至是殊不思自熙寧時當國者惟務變更尚同忌前風俗大敝至章蔡用事日甚一日凡忠臣義士禁錮困苦不容立于世如是者有年矣一時攫取美官當事任者非諂佞姦宄則闒茸貪黷之人禍變忽起搏手無䇿首尾衡決廟謨顛倒甚則賣國抵巇以圖身利安知所謂主辱臣死之義哉當是時而有奮身犯難國爾忘家者自非豪傑之士不待文王而後興者安能及此建炎以來募有能使絶域蹈不測之淵者冠葢相望然亦多以高爵重禄所誘若夫捐軀盡瘁機智勇辯忠義出于天性而又有以濟國事及其事出倉猝執節抗敵卒徇以身如節愍公者比之前後諸公又其卓然者其可無傳乎公諱倫字正道世為大名府莘縣人六世祖祜以文章起家事太祖太宗為名臣是手植三槐者也終兵部侍郎贈太師尚書令兼中書令追封晉國公生三子仲子文正公旦相真宗而王氏益顯始居京師季子諱從九從日官兵部郎中贈太尉則公之五世祖也曾祖端通議大夫贈太子太保妣李氏贈秦國夫人繼李氏贈魏國夫人祖元朝請大夫贈太子太傅妣趙氏贈福國夫人繼晁氏贈定國夫人父毅朝散郎贈太子太師妣李氏贈慶國夫人太師在政和間嘗上疏論蔡京罪惡乞正典刑因是得罪然則公之氣節有自來矣公生于禮義之門而少有大志不護細行喜立奇節輕財好施貧而無悔讀書見古人義概事必慨然慕之往來京洛浮沈俗間頗以俠自任聞士夫之賢者傾心事之宣和之季知天下將亂欲入廬山爲道士靖康寇犯京城公以太平日久官軍驕惰不可用于是上書言民兵之利欲使貧富相資以弭内憂書奏召對翼日授迪功郎充都大提舉守禦使司幹辦公事敵先攻通津門拐子城公説綂制官鄭建雄選健卒縋而出戰敵失利小郤録立功姓名為之謁都大守禦使孫傅傅欲置籍次第之公曰首戰獲㨗行賞豈可緩耶願以便宜從事傅從之士氣十倍是以一拐子城敵攻之兩旬不能下十二月戊申敵自宣化門入公往麗景門見綂制官渠慥曰事亟矣請速分兵扈法駕上召見公宿禁中乞命慥將兵保東華門班直蔣宣等率衆聲言奉皇帝奪萬勝門以出實欲刦内帑公復乞以慥兵三百與左言俱入斬蔣宣等餘皆股栗聴命或云始公欲入而未得日掃李丞相邦彦之門㑹有㫖前宰執赴殿廷議事公又懇曰此某效鳴之時也李擕以入忽于殿下嵩呼欽宗愕然使問之即大言曰臣真宗朝故相王旦之孫也有致君澤民之術無路自進比嵗嘗上書言大遼不可滅女真不可盟果如臣言今無他䇿京師豪俠臣皆識其人平日能服役之當募死士數萬奉陛下侍上皇挾諸王決圍南幸欽宗忠之慰勞甚厚解所佩夏國寶劔以賜命整齊六軍召募死士且以片紙批曰王倫事成可除尚書兵部侍郎既拜賜以出次日再對自言已得數萬人悉願效死幸陛下勿疑且請上御祥曦殿慰安中外時有勸上幸青城者宰相何㮚已主和議將用其説上以問公公曰此必誤國非臣之所敢聞上悟曰倫之言是也㮚進曰萬一誤國臣當伏死公怒髪衝冠㮚叱曰若何人敢至此耶公亦叱曰爾何人乃至此耶又面斥其不材寡謀必誤大計或至天子䝉塵雖誅相公數百輩何益㮚怒謂狂生言既不用恐為亂請上誅之且乞就令衞士執之上意未決公執御批立于從班中以免又次日㮚畫㫖送御史府將置之死地賴上全䕶獲免用事者乞換公左武大夫吉州防禦使帶御器械公皆不拜止循修職郎已得間出都矣二聖北狩公見張邦昌問國璽安在何不齎迎大元帥康王同韋拱侍淵得璽遂行㑹聞大元帥已次南京即與淵倍道奉璽勸進高宗移蹕維揚公走行在上書自伸前志乞使沙漠問二聖起居時高宗正思擇人即轉朝奉郎借朝議大夫試尚書吏部侍郎河東大金軍前通問使制詞略云胄出公侯資兼智勇朕方俯同晉國命魏絳以和戎汝其遠慕侯生御太公而歸漢金帥尼雅滿㓙焰熾甚滿舊作案尼雅改後同粘罕今公與之抗辯旁若無人金帥憤怒留之雲中從行者多不堪公談笑自若勉以節義然尚未知兩宫安否日禱于天以朝通夕死為言有商人陳忠告使臣楊永亨曰二聖太后在黄龍府公以語副使朱公弁及洪公皓曰此天所贊也即遺之金使逹上意由是兩宫始知本朝中興而江南之信通焉一日尼雅滿使烏陵思謀至驛尤為桀驁公藐視之語及契丹事公曰我道君皇帝與大金先大聖結盟海上約為兄弟大金與契丹相持師老糧盡使使告急即遣兵進援于委頓之時使成雲中之功豈非有重恩于大金耶契丹已滅大金之臣屢請南下先大聖恐敗盟約終身不從後忽稱兵至使二聖北狩生靈塗炭但知貪目前之利天地神明安可欺也大金累年喪失人馬不可勝計殆先大聖冥冥之中必有所不佑比渡江深入﨑嶇敗衂可見我朝徳澤深厚人未厭宋今主上法令一新賢才並用必圖復讐盍為遠謀歸我二聖太母天眷復我土疆講兄弟之好使南北赤子免肝腦塗地之苦幸為贊成大計思謀沈思曰侍郎言是也當達此意明年春尼雅滿忽來盛陳兵衞延入問曰使人來者數輩于吾所問皆未知對今乃遽欲議和決非南朝實情直侍郎私意爾公曰主上臨遣若非尋盟來復何爲人衆能勝天天定亦能勝人惟公裁之尼雅滿不知答紹興改元乃以公歸議事二年秋入境有㫖趣覲具奏羈留曲折敵情底藴天語勞奬特轉右朝議大夫充右文殿修撰主管萬壽觀賜銀絹二千匹兩官其二弟一從子公之將歸曰洪皓母老請以所議付之尼雅滿不從遂攜皓弁書歸奏各授其家時劉豫犯邊和戰未決三年韓肖胄使還金遣李永壽王詡踵至驕倨不可告語上聞之曰非王倫不辦此召問之公曰彼性貪但邀賂耳上問幾何時在御書院奏曰但得案上物足矣上聴取去凡筆格鎮紙之屬皆精金為之公袖之拜以出徑入驛與道雲中時事且曰主上喜公等遠來故加勞賜宜拜以謝二人不自知䣛之屈也借左朝議大夫尚書吏部侍郎充送伴使廟堂擬除邊帥公謂前在敵境知烏珠幾為我禽舊作兀案烏珠後同术今改山東河朔久望王師機不可失力陳進取大計詞意剴切覬上親征大臣難其請主管江州太平觀居㑹稽七年春徽宗皇帝顯肅皇后訃至除公徽猷閣待制借直學士左中大夫樞密都承㫖充迎請梓宫使至南京僞齊授館于鴻慶宫移文取國書及使指公曰國書當納金主使指無他報謝訃音迎護梓宮而已明日又來曰大金與齊一也國書當赴齊相府驗實遞至軍前俟得報然後可進公曰有死無二願勿復言再三迫取不遂頓鑴餼廩増兵圍守莫不失色公曰無能爲也金遣接伴以九月渡河見金帥達蘭于涿州作撻辣今案達蘭舊同改後問過淮已久何來之遲公備言劉齊邀索住睢陽者數月因言豫在本朝曾擢臺諫外樸内姦營私掊刻民怨神怒方欲吞噬兩朝能保他日不為大國之患乎恐妨遠圖敢布腹心問曰若將豫與南宋能制之否公曰皇帝聖孝神武臥薪嘗膽志在恢復但以天下為度不忍輕以動兵豫之父子忘背國恩孰不願食其肉倘欲驅除何難之有痛言利害泪滿茵席達蘭顧謂烏珠曰江南有忠臣如此何慮不能立國越夕使人導意云侍郎少休已馳奏矣是冬廢豫使謂公曰歸報皇帝强梗掃去自此和議無復間沮但有當議者須不倦以終之于是仗節來歸上在建康嘉歎累日好賜特異徑除所借職任明年又往見達蘭于祁州出諸軍招誘蠟彈旗榜八百餘通詰公南朝欲和而沿邊日獲姦細文字語言無理奉使只是款兵相陷耳公曰奉命三至専以講信修睦諸將徒見往返猶豫各欲乗時求尺寸之功若和議一定朝廷明降約束豈復敢爾二酋相視無語初公之族有留京師者季父存欲結太行義士徑擣敵巢聞公拘雲中密以書來公大喜報曰某自恨疲駑無以佐中興辱示正愜素心幸竟斯事未及發而謀泄捕存黨囚之地窖至是知為公之族押存付公存既還改合入官金遣張通古烏陵思謀報聘使者朝謁進止詳華曲盡臣禮上因賜之酒思謀從容進曰陛下知劉齊之廢否始因王某極言遂了此事真口伐也北朝將相重之如山斗真社稷臣也上欣然領略于公益加信任御札令公籌度别以金器龍腦茶具賜思謀公亦拜賜復借龍圖閣學士為迎奉梓宫使兼請太母淵聖祖宗山陵上念東朝之歸尤切丁寧告戒曲盡聖情公泣拜以辭期于必濟既見達蘭具宣上旨願親見郎主敬請達蘭曰非不欲侍郎至闕下但九州之外荒寒殊甚恐不堪疲勞公請益力明日遂行既見金主謝其廢劉豫且伸祈請金主喜公之來撫存加厚且曰山川太遠不易跋涉公曰今日獲遂所請少效使臣之職雖死之日猶生之年詎敢以登頓為勞嗟異良久宴犒連三日遂決大議歸奏上大悦除龍圖閣學士侍讀金遣蕭哲石慶元來及境而不肯進揚言曰此非他使之比豈可用平時禮數相待邀索百端迓客者無如何副使藍公佐密奏乞命公一行借端明殿學士侍讀充計議使哲等聞之即日渡淮相見有慙色曰何煩端明遠來既就館舎公索副書及議朝見哲愕然既不肯道所以欲損朝儀公曰如此則當再詣河北軍前議之退取旨欲行以足瘡未能陛辭哲問館伴使兩日不見王端明來議事何耶上聞之即俾公力疾入令子弟扶掖賜坐命以調䕶哲問連日何不一見公曰簽宣不遵故事已被命再行當少須回日議定二人作番語久之徐謂公曰不決于此遠去何爲公曰既不相聴何憚一行哲方肯啓國書割地講和許還兩宫及梓宫既入見起居進書如儀上下喜懌九年春真除端明殿學士簽書樞密院事賜進士出身充迎䕶梓宫奉還兩宫交割地界使兼東京留守公既交河南寛恤疲民大發倉庾以賑窮乏烏珠留數百人取偽齊留貲名落後司公聞其紛擾盡逐之民始安堵烏珠一親信人見公若欲有言公屏人問之遂言烏珠有害達蘭之意公厚遣之即密奏乞令張俊守東京韓世忠守南京岳飛守西京呉玠守長安張浚建督府盡䕶諸將以備不虞上以示大臣持不行連促北去六月渡河北至㑹寧府聞向之主和者盡為烏珠所屠事皆變矣既見金主令耶律紹文作宣勘官傳言問公還知元帥達蘭等罪否答以不知又問交了許多疆界而略不及嵗幣卻欲一一如請只知有元帥不知有北朝耶公曰前日蕭哲等齎書至本朝許割河南歸梓宫太母淵聖天下皆以金國不忘海上之盟庶幾與民休息行人則往來通兩朝之好耳豈有他哉是日風雪寒苦詰難數十反公忠憤激烈辭氣不少沮見者為之喪膽歸館又遣紹文就驛受辭公對如初度必不得歸通夕密語副藍公佐曰前過汴都已知事變亟奏上矣知閤若歸乞檢前奏急命諸將分守所歸侵疆無令輕失中原敵至今日已如强弩之末烏珠不達時變貪而無親將自取斃往囘幽燕父老談道本朝未始不泣下咸知君明臣良必大恢復忍死以待太平金之貴臣往往輸誠相結衆叛親離久矣他日若來請和當盡復土疆則可與議又去年嘗稟宰執乞不發歸正人切無苟且以失後圖自是四旬無所聞十一月庚辰紹文至驛傳言問公向拘雲中本無還期曾不知恩反貳我君臣今遣副歸留以待報將分驛與公佐酌别云區區悉已前白無一語及其私留河間六年金以公爲平蠻三路轉運使公力拒之驅迫日甚公曰君命無貳臣之節也貳而苟官爵倫實恥之又脅以威且曰受命則生不受則死公乃振衣冠南望行闕再拜稽首厲聲言曰先臣文正公旦勲業炳然臣爲國將命猥被拘留復以偽命見逼敢愛一死上孤國恩以辱君命于是大慟斥罵使者聴其絞死寔十四年七月戊午也是日秋宇澄霽忽隂雲晦冥風雹雨雪咫尺不相覩城郭内外地皆震裂數日不已河間人懼甚亟立公祠家繪公像以奉之明年公之訃始聞天子震悼特輟視朝報其家贈左通議大夫賜銀絹各千敕就平江府安葬仍令有司應辦享年六十有一娶陳氏封安康郡夫人二子述朝請郎通判光州軍州事贈奉直大夫逸朝請大夫主管華州雲臺觀述之子五人朴承奉郎棣承直郎監三省樞密院激賞庫杞修職郎監行在打套局枏中奉大夫守將作監兼知臨安府主管兩浙西路安撫司公事樞將仕郎曾孫五煥炎從事郎新監衢州都酒務炳郯剡女七逸之子四人梓通直郎機文林郎新臨安府觀察推官棠迪功郎新光州録事參軍枃迪功郎新監常州薛堰犒賞酒庫曾孫八焯從事郎隆興府分寧縣主簿焌焴燧爚熺煇燦女九公之亡也時相専和戎之功又忌公之死節令公家止稱在金身亡故卹典有未盡孝宗淳熙初搜訪知之始命杞枏機皆為將仕郎述自聞凶問擗踊號絶勺飲不入口者五日是冬冒萬死與從兄遵同北方豪俠訪得公之骨于河間歸葬于長洲縣陽山大石塢之原嗚呼古之膚使止以専對為能若公前後五反烏珠尼雅滿達蘭等皆貪如狼暴如虎未易以口舌辯也性根忠義藐視凶酋隨宜應對悉中事機以濟大事投身鼎鑊刀鋸之間氣不少讋智意横出他人莫及臨死生之際又洞達勇決如此非烈丈夫能之乎述等摭公言動及使事始末懼禍久不敢出郎中鍾離公松嘗為使屬知公尤詳乾道間始敢狀公之行紹興元年請諡于朝禮部尚書倪公思為太常博士議以節愍易名鑰時在攷功為之覆諡又二十有二年當嘉定之四年公之諸孫求銘距公之亡蓋六十八年矣比嵗權臣妄開釁端横挑強鄰以為功在旬月兵連禍結始謀講解無敢行者枏時為城南廂官帥臣言其有異才又自以大父之志未展被命辭母而行至再至三卒就和議可謂不忝其先矣擢帥淮西進尹京邑皆有聲績其進用未艾也于是列公之節請于朝特贈資政殿大學士廟號忠肅而公之名益顯矣鑰妻祖工部尚書俁實與晉公分派居宛丘公最後出疆之時語尚書曰此歸當講宗盟而竟不還兩家尋此盟久矣閩舶淹公之從孫行也與鑰締婚又助之請鑰生晚竊慕公之節義有年矣謹摭行狀之大概參以槐庭濟美集中興小歴遺史雪溪王公銍所作御劔銘序與其子明清揮塵録及網羅舊聞以就此碑大懼骫骳之文不足以發潛徳之萬一抑聞之韓信不顧酈生之烹李靖以唐儉為安足惜故使絶域者惟恐其用兵于後公毎先以酈生唐儉自處將行必請戒飭諸將練兵備器脱有可乗之機不必以臣為慮雖閒居于外時時貽書宰相請措置兩淮山水寨以陜西弓弩手法行之沿邊以俟大舉間有召命家人相賀則泣曰大將富貴俱極誰肯進討見上必傾盡愚直又將觸怒大臣未知死所何賀之有然則公之志豈専以求和為功哉嗚呼天未悔禍强寇尚存九京之英必有遺恨此忠臣志士所以痛憤而不能自已也一時假吏必取通儒與之俱其有才智可與同患難者雖屠沽所不廢自以品秩雖微事君以人不敢不勉聞有欲以貨取者輙矣曰是豈所以遺子孫耶及其被留士子十餘人競願從公止許留七人有蜀士張大時者年最高且多病終不相捨其能得士心又如此烏珠之犯順昌也逆風暴雨戎壘深濘大為劉公錡所破烏珠輕騎宵遯行一舎間知不雨始稽顙三歎曰小人不信王端明説南朝國富兵强徒虧和好咫尺不雨是天不容南牧而小人違天也乃折箭誓不復敢輕舉三日馳至韓州劉公後親以語公之長子且曰畫淮之約何遽如許苟繹公之言徐與之議則版圖歸復何止河南而已劉公之言必不苟嗚呼此尤非人力之所能為也公初自奮于稠人中驟膺欽宗之眷後又身任南北之議其事日偉及其死節則雖有異議者至是翕然歎服惟公之終始天下喜聞而樂道之而登載于書者各誦所聞不能齊一今特表公之大節以厲世之為臣子者其間小有異同尚可略云銘曰三槐之王族系繁昌衣冠鼎盛名徳相望公生其間不扶而直少慕竒偉人未之識干戈雲擾忽逼神都主憂臣辱顚倒廟謨奮由布衣親上方略欽宗忠之賜劔予槖徒手一呼得數萬人欲奉兩宫決圍南巡謀不及用出狩于北奉璽勸進求使絶域高皇聖孝五以節行凶酋虓暴望者震驚惟公忠勇以死自誓視之無如而奪之氣隨機肆辯出古入今得其要領以副上心事成功高忌其大用晚遭囚拘疑有隂中欲啖以官死生立分痛哭怒罵卒殉以身天作風雹地爲震裂或者蔽之使不上徹有子死孝終歸其骸卹典雖頒烈士所哀公之有行請益兵備機有可乗雖烹何畏分驛之際語不及私死輕鴻毛了無異辭公亦勤止萬里往反全軀之臣尚糵其短迨其執節無不心降鬼必厲賊公乎不亡孫有祖風捐軀將命屢探虎穴和議以定帥淮尹京得請于朝隆名世祠寵數孔昭我作銘文㑹稡衆説萬世臣子仰止忠烈寶謨閣待制贈通議大夫陳公神道碑嘉泰三年集英殿修撰陳公告老于朝天子歎曰此吾舊學且書命之臣也除寶謨閣待制遺奏聞贈四官録其後所以飾其終者如故典門弟子哭之失聲里人聚而相弔四方士夫聞之無不䀌傷者蓋非他人云亡之比也公諱傅良字君舉其先自閩徙温州瑞安縣帆遊鄉湗村里至公八世矣曾祖靖祖邦父彬皆不仕父以公貴累贈朝請大夫妣徐氏贈令人朝請邃于易教授鄉里以篤行稱公天分高勝其于學問心悟神解而苦志自勉精力亦絶人隆師親友有不可解于心者興化劉復之朔以南省第一人來為司户參軍攝教官得公程文以為絶出公之年甚少也而名已高開門受徒于仙巖僧舎士子莫不歸敬薛寺正士龍見公問所安公曰毋不敬士龍曰比參倚如何公釋然増進歸心薛氏後又相從于滆上讀書一日千里其為薛氏祭文云我昔自喜壁立倚天見兄梅潭忽若墜淵梅潭即仙巖也伊洛之學東南之士自龜山楊公時建安游公酢之外惟永嘉許公景衡周公行已數公親見伊川先生得其傳以歸中興以來言理性之學者宗永嘉惟薛氏後出加以攷訂千載自井田王制司馬法八陣圖之屬該通委曲真可施之實用凡今名士得其説者小之則擅埸屋之名大可以行于臨民治軍之際公游從最久造詣最深以之研精經史貫穿百氏以斯文為己任綜理當世之務攷覈舊聞于治道可以興滯補敝復古至道條畫本末粲如也本朝名公鉅卿不可縷數自韋布而名動宇内者不過數人公自為舉子業其所論著如六經論等文所在流播幾于家有其書蜀中文學最盛讀之者無不動色文體為公一變至傳入夷貊視前賢為尤盛乾道六年始入太學士無賢不肖斂袵下風八年公之高弟蔡公幼學為省元公次之徐公誼又次之薛公叔似鮑君潚劉君春胡君時等皆鄉郡人非公之友則其徒也尤為一時盛事既登甲科朝野想望風采授泰州教授以歸參政龔公茂良帥江西以書幣招之願與定交公曰此古人羔雁之禮不行于世有年矣善辭之未赴㑹太學録闕求之者衆龔公實行宰相事奏孝宗曰待次不改闕初官不堂除陛下良法也太學録一闕而睥睨者衆臣欲擇取名儒為士林所推者越拘攣而用之則人自服矣上問為誰以公對上曰是朕所素知者除命一下果無異辭就職幾月車駕幸學改承奉郎龔公既罷政亦寖有相嫉者添差通判福州帥相梁公克家得公喜甚以政委之公悉心禆贊不事形跡卒以専擅論罷時淳熙七年也尋主管台州崇道觀起知桂陽軍閒居八年始赴郡提舉荆湖南路常平茶鹽事就遷轉運判官改兩浙西路提㸃刑獄公在桂陽蠲除宿負罷弛斜科倉司則補糴諸郡米至十萬斛漕司亦蠲錢數萬緡力講荒政所及者廣進登極銀三千兩屬方救荒力不能辦申請減額損三之二實恵遂及一方以服勤使事嘗感寒疾至是以奏事再入脩門鬚鬢如雪丞相留公正一見歎曰幾年陳君舉尚可使外補耶奏留爲吏部員外郎初對上曰卿去國幾何時朕欲見卿久矣知卿學問深醇有所著書進來時上臨朝淵黙罕有聖語公敬謝而退以周禮説進擢秘書少監訓詞曰朕日御便朝延見郎吏有郎白首色夷而氣温儐者贊其名則汝傅良也朝列傳誦實黄公裳之詞也兼實録院檢討官皇子嘉王府妙選官寮以公兼贊讀未幾除起居舎人兼權中書舎人期年始遷起居郎紹熙末年龍樓問寢不以時自大臣而下更進讜言從班多連名騰奏或同班叩請公自以受不世之遇必欲身任其責請對直前幾無虛月剴切痛憤指陳利害無所不用其至蓋嘗贊嘉邸為中宫言之又嘗奏疏謂臣等在王邸于古今父子君臣之際人之大倫天地之正義以開導賢王而㑹慶闕上觴之禮長至虧稱賀之儀區區口耳之感必不能勝躬行之化紙上之習必不如家傳之法今既上失三宫之歡則臣等講讀皆為空言矣其餘骨鯁之言有敵已以下所不能堪者上終不加譴而言亦不用一日奏云陛下屢許臣以出又令傳旨于廟堂而復不然臣貪戀厚恩未忍決去容臣遂思補過更圖入奏若不垂聴則有致為臣而去耳又從而草奏曲盡事節犯顔極論度上意不回遂上挂冠之奏上雖不受玉音賜可公即申省乞致仕宰輔留之不可既行授秘閣修撰嘉王府贊讀皇上御極以中書舎人召還兼侍講兼直學士院實録院同修撰謂可行素藴矣而言者指其學術不正罷為提舉江州太平興國宫慶元二年復劾其在太上朝奏對狂率降三官罷祠嘉泰二年叙復元官再畀祠禄遂除泉州以病力辭除集英殿修撰病革謝事遂有次對之命十一月十有二日終于里第享年六十有七積官至朝議大夫爵永嘉縣開國男食邑三百户娶張氏名幼昭字景恵主管禮兵部架閣文字孝愷之女以婦徳著聞先公九年卒子男二人師轍迪功郎安豐軍壽春縣主簿師朴承務郎女七人長適迪功郎監鎮江府凌口酒庫潘子順次適從政郎新福州連江縣丞薛師雍次適迪功郎處州州學教授林子燕次適迪功郎新福州連江縣尉徐沖次適進士張紹次適進士張疇一尚幼令人葬于前山開禧元年三月庚申二子奉公之喪合焉嗚呼以公之抱負偉傑學博而精觀書别有高識作文自出機杼類非今人所可企及求之古人亦未易多得也受知三朝掌内外制經帷史館不為不遇而名高多忌卒不得究其經世之學為可痛也公行誼著于鄉曲述作擅于當世不待屢書敢摭其論奏之大者列之然後知其非諛墓之詞也公之赴郡免奏事而去歸覲光宗以舊欲奏之孝宗者陳之蓋公憂國之心澤民之具其説不易謂藝祖創業垂綂無非可傳之法而深仁厚澤裕我後人則専以愛惜民力為本攷之故牘自建隆至景徳四十五年間南征北伐未嘗無事而金銀錢帛糧草雜物七千一百四十八萬計在州縣不㑹古所謂富藏天下者也諸道上供隨所輸送初無定額留州錢物雖盡曰係省而不盡取大中祥符元年三司始奏立上供税額熙寧用事者始取藝祖之約束一切紛更之新法既行増上供之額一倍至崇寧遂增數倍此特上供耳其他雜物熙寧則有令項封椿元豐則有無額上供宣和之經制紹興之總制月樁皆至今為額而折帛和買之類不預焉茶引盡歸都茶塲鹽鈔盡歸榷貨務秋苗以十之八九為綱運是皆不在州縣于是取之斛面取之折變取之科敷抑配贓罰而民之困極矣方今之患何但夷狄蓋天命之永不永在民力之寛不寛豈不甚可畏哉上曰莫急于此但以處置為難公奏第三劄子乃是處置之説既奏襃美再三其大略曰嗣位之初詔為寛民置局講究而民窮如故蓋以裁抑細微或蠲空張之數未有以稱明詔慰民望也國家財力竭于養兵又莫甚于江上之軍故毎欲省賦朝廷以為可則版曹不可版曹可則總領不可總領可則都綂司不可以謂之御前軍馬雖朝廷不得知謂之大軍錢糧雖版曹不得預中外勢分職掌不同事權不一施行不専雖欲寛民得乎使都綂司之兵與向者在制置司時無異總領所與向者在轉運司時無異事出一體而後可議寛民力矣轉對又論藝祖治大而不治細以上書人文字令知制誥看詳升降以聞次對章奏下尚書省參詳人主所自擇不過臺省長官豈不甚易行哉又嘗論役法謂免役錢者本以恤民使出錢雇役而逸其力也自罷募户長壯丁而取其錢今隷總制之類于是役者白著而法不得不壞保正長催科是以保甲法亂役法而行之也熙寧自有役法五等簿是也自有保甲法魚鱗簿是也五等則通縣計之魚鱗以比屋計之保甲但以稽察盜賊與免役初不相闗熙寧七年始以保丁充甲頭催稅而耆戸長壯丁之屬以次罷募利其雇錢而封椿之法起矣元豐遂著為令以甲頭同大保長催科元祐匆匆復舊隨即紛更至紹聖二年催科悉用大保長役法轉而為保甲嘉祐以前固無此法至此又非王安石之舊特章厚爲之今士夫恥言安石之爲人指章厚爲罪魁而方世守其變亂之餘以爲成憲萬古設法一安石能改之章厚能力行之此斯民最大之害乃若出于三代之舊而莫敢議有議之者則付之有司不過檢坐見行條法申嚴行下此臣尤所未喻也誠能不以保甲法亂役法雖未足以盡寛民力亦可謂至恩矣進故事以眞宗詔兩浙福建荆湖身丁錢並特除放其論尤詳以爲減折帛不如身丁切于窮民此皆公平時攷古驗今可舉而行非若泛然美觀之言卒不得見于用若其封還詞頭遇事輒發未易悉數如請還黄裳給事中則引唐吕元膺紹興程瑀以為比論張子仁之建節則請先處分留正之去留吳挺之除代而其甚難者莫如陳源與率逢原二者源之貫盈幸不及誅忽除内侍省押班瑣闥攝事者繳章五上人皆傳誦大臣力請觸雷霆之怒㡬不自全一為書行公議沸騰黨與凶焰不可嚮邇而公獨當之逢原麄暴恃有奥援所至兇横其在池陽㡬至軍變為總領鄭湜所發按其偏裨上命樞臣鐫戒方待罪間自副統制陞都統公又論之源供職自如而詞命不行終不得俸逢原先被宣劄已自書銜而公于二者執奏再三終不奉詔以至乞身而去公去未㡬而内禪子仁訖不得節鉞源亦罷去逢原以病廢惟此三事無敢嬰其鋒者公神色不動來則繳奏旁觀者為之寒心而外間罕知之者鑰與公同生于丁巳少我九日自分教東嘉為布衣交義兼師友後雖一同朝蹟而情義日篤一旦同在西掖同攝北門相與如弟昆然至于同寅協恭尤非他人之比藝祖東嚮宗廟大典集議至再始正百年之禮而臺諫有異論鑰極論之丞相趙公宣㫖鑰又執不可公從旁力賛其決而事遂定謝知閤淵以太母之弟有旨請給等依禄格全支公已書行而鑰駮之再命特與書行公上奏先具鑰之駮章且曰樓鑰委是允當始知臣失于㸃檢不及論奏若更書行臣有三罪一則迎合聖意不敢執奏二則衝改旨揮使有司無所憑守三則恥過遂非無見善則遷之義欲望追寢御筆仍正臣鹵莽之罪其事遂已嗚呼孰有負重名于時致身至此而服義引慝同濟公議如公者乎汲引人才如恐不及在湖南應詔薦宋文仲呉獵蔣礪楊炤在朝則薦朱熹葉適呉仁傑王明清修中苟知其賢不復以私嫌為忌其他成就延譽使就聲名者不知其幾也博極羣書而于春秋左氏尤究極聖人制作之本意左氏翼經之深旨著春秋後傳左氏章㫖二書蓋經止獲麟孔子卒傳止韓魏反而喪之之後殆未有此書也願見不可得則曰此吾身後之書近既得之誦讀不已不揣而為之序其門人遂以銘為請鑰欲述公行事或恐有觸忌之嫌自以投閒十有三年已掛衣冠視䕃幾何知公為最詳若畏避而没其實豈不負吾亡友㑹稡未集而病深恐溘先朝露不究此志小愈遂扶憊而畢之公風度高遠動輙過人詩律之精深字畫之遒媚登覽高致吟諷低昻親之則使人意消王謝韻度尚可想也方主上在宫邸時寮寀以詩為壽惟翊善黄公與公之詩皆有諷諫上為置酒各親書所上詩謝之公後嘗奏知以御札登諸石而跋其下以其藁示鑰未及刻而公歸訪求此藁不可復得猶記其略云季札觀樂歌頌而曰哀而不愁太史公讀虞書至于君臣相勑維是幾安未嘗不流涕也成王作頌推己懲艾可不謂戰戰恐懼善守善終哉蓋頌者不専于美盛徳之形容皆敕戒之義秦斯以來此義殆絶鑰讀之為之感咽嗚呼此又先儒之所未發也銘曰温居瀛壖儒學之淵間氣所鍾挺生斯賢舒向金玉游夏淵源羣書博極本末貫穿退然布衣名震八埏晚登周行帝席為前典刑具存訓詞是専王邸螭陛史館經筵獨當雷霆刀欲回天經世澤民齎志終焉天之生才夫豈偶然儲神毓秀其必有年宦匪不達受才則全道之不行賴有遺編後有百載復見儒先哀哉止齋見此銘鐫攻媿集卷九十五
