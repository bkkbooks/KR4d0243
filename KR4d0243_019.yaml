  text: 攻愧集卷十九
  hash: sha256:d2377dc1006faa7ca927434a9ef7fd0b376eab67f8f7d0bad825c650d8d29303
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_019-1a}
body:
  text: 宋樓鑰撰表箋代謝宫觀表史待制彌正以下三首代賦祿真祠俯從私請升班次對更出鴻恩是何極陋之蹤得此殊常之渥中謝伏念臣志徒慕古才不逮人由庠校之諸生叨承延賞勉箕裘之餘習偶玷世科甘從州縣之勞敢覬朝廷之選惟睿主曲敦于舊學故微臣誤簡于淵衷自給札于中書寖彯纓于册府退量幸冒秖務靖其固嘗持節以言歸旋即豫環而就列寸長尺短第知自竭于愚衷年除嵗遷何意遂塵于法從代言西掖進讀東宫皆老父之故官實儒生之希遇力辭禁管改二秩宗威儀三千兹豈養痾之地春秋八十不勝愛日之思奏牘朝聞俞音夕至廩以祝釐之粟寵之荷橐之聯毫釐莫報于公家頂踵悉由于聖造甫還私室已拜宸綸兹蓋伏遇皇帝陛下政本用中仁惟厚下素矜朴拙初無進取之心重賜褒揚庸示保全之意父子感深而至泣里閭圜視以為榮臣敢不增激懦衷稍休弱質循陔承志庶幾棄官歸養之風戀關馳誠尚勉移孝為忠之節代謝皇太子箋儲禁簡僚久充員于中護祠庭得請仍寓職于西清退省至愚敢忘所自中謝伏念某稟生甚弱賦性尤疏一經徒守于家傳纍嵗寖汙于朝迹獨惟老父獲際聖君乃眷潛藩曾是甘盤之舊遂容小子亦陪綺季之遊自慚遲鈍之資無補溫文之學丏間得寵拜命知歸茲蓋伏遇皇太子殿下盛德在躬勞謙禮士兩宫侍膳益勤愛日之誠千里懷親深察望雲之念俾從私志實荷隆寬某敢不祇服訓詞仰承色養扶羸東下遽收迹于鵷行矯首西瞻尚馳心于雞戟代謝皇太子宫講堂徹章轉官箋儲闈進讀嘗預英遊奏議終篇遂遷爵秩曾是優隆之渥亦霑逺外之蹤中謝伏念某學匪洽聞身逢盛際宸扆念甘盤之舊俾鯫生獲綴于賓僚經帷翻陸贄之書命鶴禁亦為之訓説備見經綸之用具存仁義之言戒彼覆車實為可監申其占畢顧有何勞方茲去國以奉祠乃以徹章而受賞被恩有自揣已知慚兹蓋伏遇皇太子殿下任重承祧志勤好古傳聖父誠明之學自得之心玩名臣論諫之文如對其面尚思記誦使遂褒升某敢不拜手祇榮銘心戴德一物三善固知裨贊之無功九弊六條更冀講明之不怠代賀光堯夀聖憲天體道太上皇帝夀聖明慈太上皇后上尊號表州曾吏部逮以下六首代溫熙事備成惟聖人能饗帝徽稱具舉雖天子必有尊歡動兩宫化刑四海中賀竊以太上立德本無事于飾名大美不言顧曷資于崇報雖九載已都于顯號而一人尚歉于宸衷乃因泰畤之精禋併舉纍朝之曠典恭惟皇帝陛下恩被動植孝通神明登大位之崇高受上皇之付託玉巵稱夀視昔有光寶册奉親自我作古謂天祖羣物式昭時憲之明謂道法自然更著體元之正俞音誕布盛事一新萬國得歡心共仰仁天之大百姓加德教益知聖治之彰臣出守偏州恭承明詔捧觴再拜頓回鳯閣之春稽首三呼但想龍樓之曉代賀太上皇帝表禮行于郊咸慶縟儀之備尊歸于父聿嚴媺稱之加覆載兩間歡呼四起中賀竊以巍巍者至高之貌用形容于博衍優遊蕩蕩乎民無能名獨著見于聰明文思仰堯仁之天大邁湯德之日新宜因百神受職之時更益大德得名之懿恭惟尊號太上皇帝陛下怡神于淡遊物之初膺寶籙以興拜授神器而與子凡此知人安民之要傳諸問安侍膳之間黃屋非心樂逍遙于特室紫壇蕆事介福履于慈闈雖秉謙尊莫回忱請光之大大之謂聖已陶萬國之歡天法道道法自然益顯百王之冠臣叨憑熊軾莫簉鵷行想漢殿之觴寧免滯南之歎效華封之祝敢忘拱北之誠代賀太上皇后箋備舉盛儀誕揚懿號凡資持載罔不歡呼中賀竊以迎長者三王之郊既告虔于上帝有名者萬物之母爰歸美于慈親益增地道之光深副天心之願恭惟尊號太上皇后殿下德高任姒功邁娀姺力贊睿謀親授重華之帝尊同太極式安長樂之居受五日一朝之榮備四海九州之養爰因大祀載舉徽音箕疇謂視曰明用顯進賢之志老氏以慈為寶於昭生物之恩合茲二者之稱仰止一時之盛臣分符有守戀闕無階莫陪椒掖之趨但劇葵心之向代謝立皇太子降赦表儲禁宏開宸綸誕布法前星之瑞象仰粲重暉揚少海之餘波沛為膏澤神人胥悅宗社奠安中謝恭惟皇帝陛下道冠皇王仁霑動植端居南面受光堯付託之隆豫建東宫綿有宋延洪之福爰推恩霈下及黎民罄萬國之歡心屬一人之有慶臣叨紆郡紱阻賀闕庭比屋歡呼咸喜元良之正微衷感勵謹宣寬大之書代謝御書戒百僚手詔石刻表詔旨中頒具孚羣聽宸章申錫下及侯邦凡屬照臨舉知感奮中謝竊以官刑警有位之士成湯切戒于三風手書賜萬國之臣光武尤嚴于一札聿稽前代王者之盛未如今日天語之溫蓋九重雖備于躬行而百辟或違于德意玩嵗愒日猶有謬悠拱默之流易慮洗心尚乏砥勵激昂之氣仰勞翰墨下訪臣鄰一新琬琰之刋傳甚置郵之速兹蓋恭遇皇帝陛下循名責實任賢使能形憂勤于宵旰之間十年于此示好惡于用舍之際四海胥然爰申播告之修更勤勵精之始臣叨膺郡寄肅奉訓辭祗率乃僚各共厥職欲令真偽毋亂敢為欺謾之文會聞上下相安莫有茍且之志代謝直祕閣表濫膺郡寄初無善狀之稱寓直奎文忽被寵光之渥拊躬有靦拜命增榮中謝伏念臣學昧家傳才非時用猥緣遭際得效馳驅衣以繡衣雖謹惟良而折獄置之粉省未知何自以為郎退尋於越之居俄假東嘉之守四郊菜色重丹扆之憂勤一介萍蹤荷玉音之臨遣首問吏民之疾苦備聞田里之歎愁凡所奏陳悉蒙垂應移鄰邦之粟不容遏糴之私蠲下邑之租又免追科之擾罷民粗給和氣隨生雨暘以時黍麥增稔闔境方歌夫聖德誤恩乃及于守臣顧撫字之徒勞愧清華之非據兹蓋伏遇皇帝陛下核孝宣之名實總光武之權綱民瘼是求尤重専城之寄璽書加勵滋多循吏之賢顧如微臣亦霑醲賞臣敢不仰銜鴻施俯竭駑才未讀五千卷之書已冒登瀛之目加撫十萬戶之衆誓堅報國之心謝慶夀赦加恩表政茂良代龔參慈皇介夀幸陪前殿之儀慶沛頒春首被通侯之寵循牆莫避踳地自驚中謝竊以堯年符巽位之期舜孝極重華之盛請福夀之祝百僚咸預于駿奔下寬大之書萬國宜霑夫錫賚豈繄邇列獨冒殊恩況骫骳之文嘗獲登于徽册以蹣跚之質偶進攝于上公固已不勝千載之榮敢意更竊九重之眷封疏故郡地衍多畬端章甫以立朝安識周旋之中禮分茅土而建社自慙談笑以封侯兹蓋伏遇皇帝陛下義篤奉親仁均厚下廣宫闈之至樂用以及人録臣子之微勞遂先與邑臣敢不誓殫素節仰報鴻私五日一朝密扈天顔之睟穆萬年億載永瞻孝治之光華代仲兄謝嚴州到任表負丞棘寺久愧空餐假守桐廬遽叨共理初以還鄉而拜命終然便道以之官被寵過優撫躬莫稱中謝竊以子陵舊隱浙水奧區昔為太上之潛藩今實行都之近輔頻年旱潦寖多凋瘵之民纍政推遷宜擇循良之吏如臣者稟生甚陋懵學寡聞猥承延賞之餘甘老徒勞之役偶平詔獄入仕帝京財貨暴如丘山敢辭委吏文書盈于几閣第謹攸司逮聯敕局之刪修才脫選途之塵穴進參外府曾何補于公家移贊司刑頗服勤于臬事銜上恩而莫報念色養之多違因謁告以遄歸以治民而自詭仰蒙睿眷徑畀左符方少遂于家居忽又承夫人乏蓋歉嵗方勞于旰食謂小臣曾對于清光頒嚴旨以趣行免內朝之臨遣望龍顔于九陛不勝戀闕之心侍鶴髮之雙親少展循陔之志兹蓋伏遇皇帝陛下天臨萬宇器使羣材培植邦基尤重牧人之任茂隆孝治俯推錫類之仁雖久歷于王官必加試以民事有如臣輩亦在選中臣敢不恪奉教條布宣德意中外本一致顧何有于重輕忠孝無二心誓益殫于報效謝南郊肆赦表給事濟代溫州莫泰畤陳儀聳百神而受職端門肆眚罄萬國以歸仁覆載兩間歡呼四起中謝竊以聖人享上帝既竣事于圜丘厚福浸黎元爰疏恩于方夏配天其澤與物為春恭惟皇帝陛下歷數在躬聰明作后治內以治外期臻宴粲之隆事天如事親曲盡寅恭之至粢盛豐潔圭幣輝華風馬來臨已見高靈之隨星雞載舉喜聞鴻霈之頒不俟終朝遂霑四逺臣逖居支郡莫望清光趨左右而奉章徒想冠裳之盛率將吏而拜詔更欣囹圄之空齊北滿無囚可赦惟率將吏拜詔而已時溫州兩獄俱空宋良為清河太守甚有善政天保初大赦獄內蓬蒿俱代謝舉官不當降官表守臣繆舉莫蓋前愆司敗議刑尚從寬典仰至仁之善貸拜嚴旨以猶驚中謝伏念臣頃自作州屢嘗薦士雖昧知人之鑒敢不盡心偶緣入幕之賓實能辦事察之既至譽者亦多況聞奏牘之交馳皆謂吏材之足取逮升劇縣頗著能聲雀角鼠牙乃寖招夫仇怨瓜田李下曾不謹于嫌疑嘖有煩言自貽伊戚在昔親民之始嘗陳同罪之章歷時雖多逃責無所與潔而不保其往祗佩訓詞之溫取人而失之以言深犯聖門之戒僅行鐫削仰賴保全茲蓋伏遇皇帝陛下馭下惟公待臣以恕謂引其類以俱進任則甚專若簡乃僚而弗虔咎將誰執臣敢不深思創艾益謹品題應物未明當起懲羮吹虀之念求賢圗報敢萌因噎廢食之心代謝知瓊州表一札十行俾逺憑于熊軾四州百洞幸利涉于鯨波首及治封具宣德意中謝伏念臣奮身疏逖賦性愚蒙蚤叨世賞之延屢困宦途之滯字民淮甸慙非製錦之工式政衡陽有玷題輿之選頃分陋郡未及期年資淺望輕易致人言之噂沓地偏財匱不堪嵗計之支吾已甘置散之科安有復然之望豈圗抆拭更任蕃宣眷古珠崖實今瓊管邈在萬里之外顓居一海之中漢晉廢置之不齊隋唐分合之靡定久服本朝之聲教遂同內地之流風惟黎母錯居當謹邊防之慮而賈胡遙集實為舶政之源自揆庸虛難勝寄委茲蓋伏遇皇帝陛下仁思濟衆德務包荒緬懷卉服之人遴選竹符之守知臣嘗更于逺外或可承流謂臣備歷夫險艱庶幾使過臣敢不仰銜恩紀謹布邦條幸依兩伏波之神毋憚三合溜之險仕方行志敢為乘桴浮海之言忠不忘君徒詠登樓望京之句誓殫駑力用答鴻私代賀太上皇帝慶夀表啓七十之慶將傳萬嵗之玉巵率三千之臣先上兩宮之寶册美備形容之至光增授受之初孝治愈隆生民未有中賀竊以子有天下而尊為父方當祝耆艾之辰德為聖人而得其名詎可襲尋常之號一紀再加夫縟典九重尚慊于淵衷兹講未央之儀爰採康衢之頌榮歸慈扆燕及中闈恭惟尊號太上皇帝陛下道大難窮功成不有聰明遜位於昭與子之公逸樂延年自得從心之適曰仁曰德無能名焉乃武乃文紀其盛者尊號太上皇后殿下久參太極密贊重離天下濟而地上行允謂相成之道堯南鄉而舜北面實同稀有之期皇帝陛下愛篤嚴君親傳家法謂夀富之福惟彝倫之所先而父母之年在常人而猶喜況承社稷之託獲見春秋之高不有極尊之稱曷為甚盛之慶優遊博衍雖問之朝野而不知揚厲鋪張要編之詩書而無愧禮文照古雲物致祥歡均軒陛之間化浹華夷之外臣預瞻鸞輅入覲龍樓嵩嶽傳呼誠四海九州之至樂赭袍端拜願十年一慶于修齡代新進士謝賜花表柳染青袍叨預天官之燕花裁絳綵更分禁籞之春敢望微生遽承華寵中謝伏念臣等性根浮弱學植荒疏吐天葩之奇篇初無詞采啓瓊林之茂典咸戴恩榮謝槐市之舊遊尋杏園之故事兹蓋伏遇皇帝陛下仁霑行葦材育菁莪萬國春陽顧豈遺于寒谷九天雨露遂均及于羣英臣等敢不種學績文去華務實芝蘭馥烈但堅自潔之心桃李芬芳共樂不言之化代趙侍郎粹中遺表負罪屏居方還舊物臥痾垂絶將謝明時顧屬纊以甚危猶戀軒而不忍孤忠未泯衰涕徒傾中謝伏念臣起自諸生粗傳末學弟兄射䇿偶登俊造之科州縣服勞安有功名之望奉聖旨欲收于羣䇿謂故家或有夫遺才嘗因輪對之初誤辱衮褒之寵神會氣合不自知遇主之因年除嵗遷俄寖上從臣之列二史屢書于言動三銓深柅于姦欺承攝瑣闈亦知效古人批敕之節建明謀議欲以奉列聖在天之靈雖自詭以治民詎敢忘于報國逮池陽之奏課就苕水以交符投檄得間歸處四明之舊隱騰章褫職誦言一卒之幽冤固知不辨而自明卒荷容光之必照矜其久困賜以更生通禁路之班許尋故步繼廩人之粟俾盡餘年未酬骨肉之恩俄屬負薪之疾水浮膚而成痼藥苦口而勿靈殘息僅存大期已迫愧論思之無補尚攀戀而有言伏望皇帝陛下寅奉慈闈益隆寶祚以寬仁夀天下之脈以清靜養主躬之和尊藝祖肇造之功早正東向之位念神州沈淪之久無忘北伐之圖臣易簀何為蓋棺遂已生無可戀敢言滯太史于周南死或有知尚可抗杜回于輔氏代陳閣學居仁遺表承命造朝旋抱負薪之疾奉祠還舍遽興易簀之言忍死有陳報恩無所戀明時而何及灑哀涕以空悲中謝伏念臣生也無奇幼而孤立自世賞而䇿進士奉大對于高皇之廷繇穴僚而登皇官受異知于孝宗之聖晉遊學省出試州麾收置郎曹殆遍更于宰掾擢居柱史遂徑躐于詞垣陟彼屺以纏哀豫之琴而終制誤蒙慈扆屢畀左符際真主之膺期升大邦而分閫每經煩使實堅徇國之心縱有微勞皆是守藩之職敢意凝旒之眷忽叨召節之頒雲氣在前不許三山之到君門甚邇翻成萬里之遙撫薄命以自傷懷孤忠而莫吐卒困陰陽之冦竟違咫尺之顔洊貢忱誠僭干淵聽念甘泉從臣之已老況正元朝士之無多祝釐之請則卻而後從寓直之寵則辭而不獲仰戴天地生成之造得為山林休養之謀然而精爽欲離形容盡變抵家而迹未定過信而病益增身方臥于漳濱魂已遊于岱嶽龍光罙厚愧未補于秋毫駒隙易馳將溘先于朝露少留殘景冒進危衷恭願皇帝陛下寅紹皇圗聿新孝治躬憂勤以致中興之業進英俊以鞏太平之基內修外攘坐復祖宗之舊東漸西被聿觀聲教之行臣假息幾何蓋棺遂已塵勞五紀悵莫賦夫歸田冥漠九原顧敢忘于結草攻愧集卷十九
