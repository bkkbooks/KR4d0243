  text: 攻媿集卷五十
  hash: sha256:e25f33e06eef08085d95352af64d75620c5fb909ec46fa5f5b8148c1daa10a8a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_050-1a}
body:
  text: 宋樓鑰撰進故事唐鑑李絳對憲宗曰人臣死生繫人主喜怒敢發口以諫者有㡬就有諌者皆晝度夜思朝刪暮減比得上達十無二三故人主孜孜求諌猶懼不至况罪之乎帝善其言比諌官多朋黨論奏不實皆陷謗訕欲黜其尤者若何案舊唐書李絳傳不載此新唐書載絳見浴堂殿帝曰拒諫亡夫人臣進言于上豈易哉君尊如天臣卑如地絳曰此非陛下意必憸人以此營誤上心自古納練昌及將以聞則又憚而削其半故上達者纔十二何哉干加有雪霆之威彼晝度夜思始欲陳十事俄而去五六譴訶之使直士杜口非社稷利也帝曰非卿言我不知不測之禍顧身無利耳雖開納奨勵尚恐不至今乃欲同而詳約其異云云與此大意帝謂宰相曰太宗以神聖之資羣臣進諌者猶往覆數四况朕寡昧自今事有違宜卿當十論毋但一二而已丙辰上謂宰臣曰朕覽國書見文皇帝案舊唐書憲宗本紀元和二年十二月未明今後事或未當卿等毎事十論不可一二而止與行事少有過差諫臣論諍往復數四况朕之寡昧涉道語句不盡同此無異意而臣嘗謂近古敢言者在唐太宗時無如魏徴太宗嘗賞其直言徴對曰陛下導臣使言所以敢爾不然臣敢數批逆鱗哉在憲宗時無如李絳而絳之言如此不惟曲盡人臣之情蓋亦躬自蹈之而後能言之以此知一介之臣敢言于人主之前者至鮮惟在人主有以導之憲宗有意貞觀之治魏證貞觀作正觀今竝更正案原集因避宋仁宗諱魏徵作謂事有違宜卿當十論毋但一二而已絳既能開廣帝意憲宗又能勵其羣臣如此中興唐祚不在兹乎仰惟陛下和顔聴言好善忘勢凡有奏對無不俯納臣宻侍清光實親見之而臣猶援憲宗李絳之言者蓋當國家閒暇人心易弛朝廷之上罕聞直聲又自聖躬康復以来羣臣深恐仰勞聴覽奏事不敢遲乆言而簡切固不在多第恐相習成風各務省事朝刪暮減恐無二三情實不輸事理不究羣臣苟免煩瀆之過陛下因謂無事可言私憂過計昧死陳述願陛下厲太宗憲宗之志俾廷臣竭魏徴李絳之忠知無不言言無不盡上下交泰以興治功聖度優容擇其可用者力行之顧何事之不濟哉竊見陛下視朝之際宰輔奏事已乆亦難以坐至日晏壽皇在御之日多于進膳之後便殿引見臣寮得以從容詢訪此實陛下家法可舉而行也資治通鑑武徳九年今據資治通鑑改正案九年舊本訛八年房玄齡嘗言秦府舊人未遷官者皆嗟怨曰吾屬奉事左右㡬何年矣今除官反出前宫齊府人之後太宗曰王者至公無私故䏻服天下之心朕與卿軰日所衣食皆取諸民者也故設官分職以為民也當擇賢才而用之豈以新舊為先後哉新而賢舊而不肖安可舍新而取舊乎今不論其賢不肖而直言嗟怨豈為政之體乎貞觀元年或上言秦府舊兵宜盡除武職進入宿衞進案資治通鑑改正舊本訛追今據太宗謂之曰朕以天下為家惟賢是與豈舊兵之外皆無可信者乎汝之此意非所以廣朕徳于天下也三年濮州刺史龐相夀坐貪汚解任自陳嘗在秦王幕府上憐之欲聴還舊任魏徴諫曰秦府左右中外甚多恐人人皆恃私恩是使為善者懼上欣然納之謂相夀曰我昔為秦王乃一府之主今居大位乃四海之主不得獨私故人大臣所執如是朕何敢違賜帛遣之相夀流涕而去九年岷州都督髙甑生坐減死徙邊或言甑生秦府功臣寛其罪太宗曰甑生違李靖節度又誣其反此而可寛法將安施且國家自起晉陽功臣多矣甑生獲免則人人犯法安可復禁乎我于舊勲未嘗忘也為此不敢赦耳臣聞書曰官不及私眤惟其賢爵罔及惡徳惟其能蓋官爵者天下之公器人主所以厲世摩鈍犇走天下而天下為之服役者以其用之公也唐太宗由秦王嗣位其平日陪從于左右者往往經百戰之餘冒矢石犯霜露出萬死而得一生及見興王之盛者蓋無㡬也太宗以至公為心雖有故人舊勲而求遷官者未始輕予祈入衛者不肯偏用至于坐貪者雖憐之而終遣之去犯法者雖不忘而終不敢赦惟其見之明而行之果是以能成貞觀之治本朝列聖故事一一可攷陛下毓徳春宫之乆攀附之人官之禄之其人甚多既歴四年而扳援求請今猶未已動煩宸衷曲為區處臣願陛下逺鑒文皇之公心近遵列聖之定法裁抑僥倖使各安分而退聼則外此而妄求者亦當息心朝政清明非為小補唐鑑太宗貞觀三年帝謂侍臣曰中書門下機要之司詔敕有不便者皆應論執比来惟睹順從不聞違異若但行文書則誰不可為何必擇才也房玄齡等皆頓首謝舊案者皆應執奏毋得阿從云云竝載在貞觀四年七月與唐書太宗本紀及資治通鑑令百司自今詔敕有不便三年異此作貞觀臣聞機要之司譬之人身則喉舌也舜之命龍曰夙夜出納朕命惟允蓋命令之出或出焉或納焉惟欲其允而已然必先之曰命汝作納言以納名官正欲其能納也命令之頒于天下猶飲食之入腹也飲食不擇則身必病命令不審則下必傷人之飲食也柔則當茹剛則當吐喉舌之責也若不問剛柔知茹而不知吐一過喉舌所傷必多雖欲悔之已無及矣大雅之稱仲山甫曰出納王命王之喉舌惟其或出或納如喉舌之謹焉夫然後賦政于外而四方爰發也太宗其可謂知此者矣不惟聴臣下之言又敕責而使之言范祖禹亦曰朝廷設官分職非徒使上下相從欲交修其所不逮也苟取充位而奉行上令則是胥史而已仰惟陛下平心處事虛已聴言後省間有論奏率䝉賜可不憚更改是將比隆大舜予違汝弻之訓而臣猶以太宗之事為言者言切而易明事近而可鍳亦工執藝事以諫之意惟陛下行事毎毎如此則聖徳益新朝政亦清貞觀之治不難致也三朝政要太宗淳化四年六月以左諫議大夫魏庠司封郎中知制誥柴成務同知給事中事凡制敕之有所不便許依故事封駮以聞八月命樞宻直學士向敏中張詠同知銀臺通進司凡天下章奏案牘必由二司然後進御先是中外奏報但由尚書内省籍以下有司有司或行或否得縁而為姦禁中不得知外司無糾察之職至是始命敏中等謹視其出入而鈎稽焉事無大小不敢有所留滯矣九月以給事中封駮隸銀臺通進司應詔敕竝令樞宻直學士向敏中張詠詳酌可否然後行下富弼等釋曰古者詔命皆中書奉行門下省審封駮改正厥有司存太宗親選向敏中張詠同判通進司等以察稽失二府奉行之過皆得改駮闗防之意謹之于始也今之羣臣多不舉職官有封還之名未聞駮正之實所以命令不由此司十有六七蓋因循之弊也臣竊惟唐給事中之職凡百司奏鈔侍中既審則駮正違失詔敕不便者塗竄而奏還謂之塗歸李藩為給事中制有不便就敕尾批卻之吏驚請聫他紙藩曰聫紙是牒豈曰批敕耶唐制之嚴如此中更五季寖失其職太宗皇帝深究治亂之源特振其職業妙選名臣為之曰凡制敕有所不便許依故事封駮曰應詔敕竝令詳酌可否然後行下則是事無輕重政無大小官無尊卑封駮詳酌是其職也近者給事中論奏除目或謂止當駮論横恩不當及此臣深恐此論有誤宸聰使後省寖失其職紀綱廢紊所闗者大是敢仰稽太宗致治之要為陛下言之庶使後省臣僚得舉其職言聴計行以禆聖治臣不勝惓惓漢書髙帝紀六年上歸櫟陽五日一朝太公云云詔曰人之至親莫親于父子故父有天下傳歸于子子有天下尊歸于父此人道之極也臣聞文王之為世子也朝于王季日三武王帥而行之不敢有加焉父子之道天性也一日不見豈容自安漢髙帝五日一朝其父比之文武雖曰稍踈然文武皆以世子事親髙帝已有天下曰見則有所不暇故立五日之制焉本朝列聖務盡孝道凡事祖后母后于宫中見之無時至尊夀皇聖帝之事髙宗正以異宫而處不得已俯從漢制二十八年终始不倦陛下今春過宫者再恭請者一人情感悦歡聲四起自兹以後積雨既不可出極暑又難進拜因仍至今五閲月矣都人顒顒日望翠華之駕今則雨師灑道之餘仲秋新凉之始伏望早降睿旨夙戒有司講定省之禮上以奉兩宮之歡下以慰兆姓之望臣不勝惓惓資治通鑑唐貞觀六年監察御史馬周上疏云太上皇春秋已髙陛下宜朝夕視膳今九成宫去京師三百餘里太上皇或時思念陛下陛下何以赴之又車駕此行欲以避暑太上皇尚留暑中而陛下獨居凉處温凊之禮竊所未安今行計已成不可復止願速示返期以解衆惑上深納之臣竊攷唐太宗時髙祖以太上皇居大安宫而太宗欲往九成宫避暑馬周切諌以為車駕此行欲以避暑太上皇尚留暑中陛下獨居凉處温凊之禮竊所未安又曰九成宫去京師三百餘里太上皇或時思念何以赴之此皆忠臣愛君之切足以感悟主聴垂憲後世仰惟陛下誠孝著聞乃去嵗之冬及至日嵗旦三詣重華都人歡呼中外慶快今猶未乆也霜寒陰雨固難屢出竊聞夀皇近曽宣醫外間傳聞日望翠華夫以九成宫去大安之逺馬周切切欲太宗之速還今則鳴蹕至近伏恐夀皇思念敢望出自聖意亟修定省之禮實天下幸甚攻媿集卷五十
