  text: 攻愧集卷三十二
  hash: sha256:618b54baef0c4d1757218e75301d45ce601b3fa38c3eded600fe038b1bd5e50e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_032-1a}
body:
  text: 宋樓鑰撰狀劄辭免除起居郎狀年四月紹熙三右臣准尚書省劄子奉聖旨除起居郎者有命自天措躬無地竊以柱下之史密侍于清光螭頭之班尤先于左陛必得俊髦之士以居記注之司如某者學不知方才非適用自登仕路屢㸃朝行但期平進之安敢啓超遷之望忽叨新擢實出誤恩已深據蒺之憂更重積薪之愧自知若此公論謂何伏望朝廷特賜敷奏收還成渙改畀真才俾退即于卿聯庶少安于愚分所有恩命未敢祗受辭免兼權中書舍人狀右臣准尚書省劄子奉聖旨兼權中書舍人者自揣僥逾彌增震惕伏念臣技能至薄見謂頓遲學術素疏且多廢忘躐遷左陛曾閲日之未深密侍清光懼記言之非稱矧是縯綸之要實參造命之嚴非智略該通不足以裨贊國論非辭章典麗不足以潤色王猷可使凡才而預華選暫承人乏雖弗許于控辭退睥時髦顧豈容于冒進欲望朝廷特賜敷奏曲回宸命更選詞臣俾專柱下之官庶愜廷中之議辭免除中書舍人狀右臣准尚書省劄子奉聖旨除中書舍人者有命自中撫躬失措竊以仕朝廷者以三字為要知制誥者以一日為榮前代選才必試言而後授近時攝事多滿嵗以為真察之加詳過于明試臣自頃承乏最為罔功詞華不足以彰播告之修論議不足以效論思之益久虞幽黜敢冀親除伏望皇帝陛下俯鑒忱衷亟收成渙俾仍記注之舊精求潤色之工庶穆師言且安愚分辭免兼實録院同修撰狀右臣准尚書省劄子奉聖旨差兼實録院同修撰者疊拜寵光伏增震懼竊惟高宗皇帝中興之烈信逺邁于前王必如太史公實録之書乃可傳于後世當求直筆仰贊宏模如臣憃愚遭世明盛自慙薄宦幸三入于修門雖㸃從班未一登于東觀為直詞掖方忝誤恩共二史官敢汙清選欲望皇帝陛下俯垂睿照改畀時髦使專掌于王言庶或逃于公論辭免兼直學士院狀右臣准尚書省劄子奉聖旨兼直學士院者忽拜恩光俯增震灼竊惟翰苑之職儒者至榮雖曰兼官亦當遴選如臣之陋與世多違蚤玷世科粗嘗為場屋之技久從吏役豈能工制誥之文獨蒙睿主之深知獲備詞臣之下列叨居西掖已懼空餐攝直北扉尤驚誤寵矧清䟆尚稽于問寢顧禁林何急于充員伏望皇帝陛下洞鑒愚衷亟收成渙詔書日簡方當視草之得人英俊駢羅安用積薪之居上辭免除給事中狀右臣准尚書省劄子奉聖旨除臣給事中依舊兼直學士院者惕聞寵命莫措微躬竊以掌制紫垣久慚無補進官青瑣尤懼非宜蓋機要之愈嚴繄出納之攸繫自非學足以與聞國論智足以深照事機或非其人必害于政臣退量至陋深恐不堪昔惟潤色之司猶虞疏闕兹任塗歸之職是速顛隮矧當書詔填委之時仍兼詞翰清切之地聖恩誠厚愚分難安自知斷斷以無他衆必齗齗而不可伏望皇帝陛下收還成渙俯鑒忱衷别擇時髦俾當夕拜庶幾得批敕之手不至纍知人之明辭免除權吏部尚書狀右臣准尚書省劄子奉聖旨除權吏部尚書兼職依舊者寵光下逮惕懼靡遑竊以選部攸司是曰六官之長文昌攝事亦叨八座之稱縱難求傑異之才猶當取踐揚之舊臣一登仕路三入修門年除嵗遷寖踰于始望寢驚夢愕屢蹈于危機惟兹瑣闈幾更月琯遇事輒發徒自積于怨仇忤旨為多方日虞于呵譴敢期睿奬亟賜褒遷徑由夕拜之聯擢試天官之職兼汗青于東觀仍視草于北門揣愚分以何堪恐公言之不貸伏望皇帝陛下收還成渙改畀真賢俾退服于舊班庶漸伸于歸志辭免升兼實録院修撰狀右臣准尚書省劄子奉聖旨升兼實録院修撰者疊被恩榮深增戰灼竊以思陵在位著三紀之治功儒館修書垂百王之憲則宜求良史以贊宏模臣才不逮中職多共二北門視草顧五技之已窮東觀濫竽曾一辭之未措矧乍躐選曹之長方將謝史筆之兼敢冒寵光進升論撰銓曹至冗尚憂綿力之弗勝髦俊滿前安用庸才之備數仰祈睿鑒遴選實能庶大典之速成免公朝之虛授辭免兼侍讀狀右臣准尚書省劄子奉聖旨兼侍讀者朝拜宸綸暮叨恩命退量謭薄罙切驚惶竊以帝幄執經之臣尤高露門進讀之選自非耆儒博碩古學精深雖得侍清燕之間何以贊緝熙之盛如臣至陋冒寵已多推遷才閲于七年起躐寖登于八座已不堪于共二尚敢望于至三昨為載筆之官猶慙于記注今進邇英之列安有于發明當觀術業以旁求豈以班聯而序進仰祈睿鑒俯照愚衷儀圖名世之賢增光稽古之治庶容一介專意三銓乞補外劄子臣輒傾丹悃上瀆天聽伏念臣庸陋無堪敢萌榮望比自三汚朝蹟六閲歲華太上擢之冗散之中俾居詞掖陛下賜以便蕃之寵遂長銓曹侍帝幄之深嚴極儒生之榮遇汔無毫末仰贊高明況今福過災生量盈器溢近遭介弟之戚復有冢婦之喪重貽親憂尤不遑處重念臣有老母年八十有六氣血寖衰喜懼交切久去鄉國日夕念歸伏望聖慈俯矜孤迹畀臣祠祿使息疲勞或得州郡差遣許其效力于外庶幾不妨賢路少逭身災干冒天威臣下情無任惶懼俟命之至辭免除職與郡狀年五月慶元元右臣准尚書省劄子奉聖旨除職與郡者聞命云初揣躬知懼伏念臣久汙近綴無補明時自憐小器之易盈況復私門之多故輒傾危悃仰叩宸聰果蒙從欲之仁俯遂閒歸之志已為厚幸敢冒殊榮乃叨寓職之恩仍畀典州之寄實踰始望爰瀝忱辭欲望朝廷特賜敷奏俾遂真祠之請庶安故里之居辭免除顯謨閣直學士知婺州狀右臣准尚書省劄子奉聖旨除顯謨閣直學士知婺州者恭拜絲綸若臨淵谷竊以東陽望郡當選循良延閣顯名以優耆德豈容一介之賤併叨二者之榮伏念臣三入修門十更除目經帷史觀實為儒學之華翰苑銓曹寖躐從班之長屬以私門多故老母念歸力陳丐外之章幸動蓋高之聽本欲少休于疲曳敢期疊受于寵光伏望皇帝陛下俯鑒忱衷特回成命廩以祝釐之祿從其學稼之心庶使微臣得安愚分乞宫觀第一狀臣輒瀝危衷仰干宸扆伏念臣比以便親求外自詭治民伏䝉聖恩俯從所請文謨寓直寶婺分符一旦得之實踰分量臣因得過家上冢以遂私心誓當勉竭疲駑圖報君父已擇行日即戒征途偶緣臣母以犯暑來歸感疾頗重始則冒風作熱以臟腑下利年已八十有六平時雖幸康强而血氣既衰不堪觸動今既伏枕旬日其勢未有向安之期訪醫治藥曾無退候舉家惶擾朝不謀夕自知稽留官期合取違慢之罪又准七月二日指揮以臣寮奏請將應未申到任帥守監司排日催促疾速起發仰惟陛下以千里重寄付之微臣在臣豈不願即祗郡事上寬顧憂情迫意切不免有言偃然方命迹幾似之儻不投誠陛下竊恐難逃譴責震恐憂懼無以自容臣與老母相與為命既未容扶持上道又不可單騎先行若更遷延月日深恐輔郡久無正官或致闕誤重臣之罪無以自逭欲望聖慈察臣由中之言出于懇切特賜宫觀差遣一次使得少遂其私庶幾母子或可保全盡出天地父母之恩糜捐頂踵不足以報冒犯天威臣下情無任惶懼俟命之至第二狀臣比蒙聖恩除臣顯謨閣直學士知婺州者臣暫還鄉曲即欲之官臣母年八十有六忽以冒暑感疾瘧痢交攻屢瀕危殆不免控告君父乞奉祠侍養得旨不允此猶是朝廷故事又有量展赴官日限指揮明詔之頒詞旨溫厚俯矜危悃洞照真情登拜三讀闔門感涕臣仰銜隆天厚地之恩不敢隨即再請今詔下幾旬局蹐不遑臣母雖幸向安年高易于感動其勢非更寬以日月安得頓復舊觀黽勉上道深慮顛隮母子相與為命又不可單騎先往深恐稽留君命使婺女久曠守臣之職臣則有罪不免復申誠禱欲望睿慈察臣之請出不獲已差臣在外宫觀一次使得杜門專意醫藥不惟保全母子之至恩亦足仰助孝治之萬一干冒天威臣下情無任惶懼俟命之至第三狀臣比以母病陳乞宫觀伏准尚書省劄子奉聖旨不允依已降指揮前去之任者拜命三次周章局蹐無所措躬伏念臣憃愚不肖誤蒙陛下拔擢便親求外過家上冡悉荷矜從誠願勉竭少圗報效而況臣所得州素為浙東佳郡財計粗優嵗事登熟去鄉不逺使臣得奉親之官宣布德意豈非臣之至願實緣臣母一病五十餘日雖曾少間而年高易于感動近嘗夜作嘔逆次日心脾痛楚幾于委頓闔門無以自存驚惴度日此去舟行三日至越遵陸七程始到婺州見今尚須扶掖方能起坐委難支吾若迫于威命勉强登途脫有不虞萬死莫贖昔陳實為太丘長吏有詐稱母病求假事覺收之以為欺君不忠病母不孝不忠不孝其罪莫大臣雖不孝安敢為此不免復冒斧鉞之誅三以情實披訴于君父之前欲望聖慈特賜矜察除臣在外宫觀一次使臣得以杜門專意醫藥之奉保全老母之餘生臣無任祈天望聖惶懼懇禱之至辭免再差知婺州狀右臣准尚書省劄子奉聖旨差知婺州者自天有命無地措躬伏念臣比剖左符暫歸故里屬親闈之感疾叩宸陛以陳情荷溫詔之一頒控忱辭而三請因殊庭香火之奉得專心醫禬之營仰戴恩私寖成藥喜忽蒙柬記再畀藩宣不移東婺之輔邦俾遂南陔之孝養固當仰體趣行之旨勉圗共理之良惟母夀益高幾近九齡之耄雖官程甚邇尚踰數驛之遙儻扶侍以亟驅恐疲勞之未免況臣世系本出部封至今三邑同姓之人不減四明聚族之衆向于宦路或講宗盟親疏之間悔吝斯起憂患不堪于纍歲聰明尤減于前時敢以妄庸冒此煩劇欲望皇帝陛下收還成渙别選長才庶安衡泌之居以盡晨昏之職辭免復職狀右臣准尚書省劄子奉聖旨復元職名依舊宮觀者臣逖聞成命深震危衷伏念臣生遇昌期仕叨從列頃以便私而請外旋因奉母以求閒處此纍年安如一日閉門自屏尚遭白簡之彈踳地靡遑敢冀靑氈之舊忽頒綸于北闕復寓職于西清拜寵若驚祝釐如故不圗簡記逺及微蹤揣愚分以非宜恐人言之可畏伏望皇帝陛下俯矜賤悃亟寢誤恩庶安敝里之居免玷甘泉之列辭免與郡狀右臣准尚書省劄子奉聖旨與郡者臣恭聞明命莫措微躬伏念臣少習一經本因覓舉仕踰三紀非敢為高論思無補于清朝更迭遂求于輔郡為親而歸故里九易嵗華復職而畀外祠一由上賜與郡有旨闔門皆驚久伏丘樊豈不願承于任使儻無疾病猶當出效于驅馳兹貢需章實有危悃母以九十四之耄日抱沈疴臣以六十七之年又嬰宿疢顧二人相與為命無一日不曾用醫湯藥扶持茍延暮景里閭勞苦具見真情心志已凋豫切不虞之懼頭顱如許寧堪共理之良伏望聖慈俯憐舊物許令終養以全烏鳥之私仍俾祝釐少安麋鹿之性乞致仕狀十二月開禧二年右臣么微之迹遭際聖時叨綴從班曾無補報憂患餘生自貽嚴譴杜門省愆衰瘁日甚重念臣生于紹興七年今年及七十揆之禮經實當告老伏望睿慈許臣致仕干冒天威臣下情無任祈天請命激切屏營之至第二狀右臣昨具奏乞致仕奉聖旨不允者引年有請願畢餘生賜旨未俞敢申再瀆仰動蓋高之聽冀垂從欲之仁竊以致為臣者實纍載之素心不得謝者乃清朝之異數茍非宿望厥有彞章如臣者少既無奇今將安用不堪荷橐賦彭澤之歸來但切杜門類介推之偕隱子欲養而親已矣老將知而耄及之而況拜不能興扶而後起退量病體何必待年揆以禮經適當納祿弗容自默非敢為高伏望聖慈俯矜愚悃俾安畎畝遂終齒于幸民許掛衣冠庶獲全于晚節辭免復職狀右臣准尚書省劄子奉聖㫖與復元職者臣忽聞牽復倍切驚惶伏念臣久遂退閒晚更憂患不知自謹宜得大呵曲荷隆寬止從薄責既坐糜于祠祿復進冒于侯封增衍圭腴方申謝牘敢圖睿眷尚及孤蹤未容掛神武之冠仍為洗丹書之籍寵還故職以賁餘生感上意之至優恐輿言之弗貸欲望皇帝陛下鑒由衷之悃憫垂盡之年追寢誤恩少安愚分辭免除龍圗閣直學士致仕狀年四月開禧三右臣准尚書省劄子奉聖旨除龍圗閣直學士依所乞致仕者聞命自天措躬無地竊以引年載請方拜俞音進律過優幾成誤寵重念臣仕參法從歸即隱居多病蚤衰久有掛衣冠之志為貧急祿尚存戀棧豆之私不因及七十之期安敢為再三之瀆幸兹得謝何望叨榮矧惟漢閣之班莫重河圗之直當以處赴功之彥豈應畀納祿之人伏望聖慈收還渙渥念臣素知止足俾臣粗保始終惟舊貫之是仍庶餘生之無愧臣除已遵奉聖旨致仕外所有龍圗閣直學士恩命臣未敢祗受辭免召赴行在狀十一月開禧三年右臣准尚書省劄子奉聖旨召赴行在者臣聞命震驚罔知所措伏念臣本無可用老而益衰既已引年方兹待盡忽蒙頒命不知所為況號召之一新以人才而為急有如臣者將焉用之輸忠竭誠則已忘舊學陳力就列則又為廢人伏望朝廷特賜敷奏非敢飾辭以控免悉自衷誠而吐陳冀别用于真賢庶少安于愚分再辭免召命狀右臣准尚書省劄子樓鑰召赴行在即具奏辭免恩命奉聖旨不允令所在州軍以禮津遣疾速赴行在又蒙賜臣詔書一道者召命鼎來亟伸控免詔音俯及未賜允俞敢陳再瀆之私上動九重之聽伏念臣投閒已久告老方新憂患薰心積有負薪之疾權豪側目尤深據蒺之危不賴至仁豈存孤迹忽聞上聖雷霆之斷復見中天日月之明四方相賀以同聲萬物亦為之吐氣雖曰杜門而待盡寧當俟駕而後行實以蒲柳蚤凋桑榆暮迫病纒雙足時歷半年弱質既衰曾針砭之弗及餘災未殄致醫禬之無功已分終窮豈萌他望仰蒙簡記首預旁招已掛衣冠敢效從班之專逹肆頒綸綍更加禮遣之優恩洊瀝丹心仰干洪造伏望皇帝陛下恕其方命察此由衷略反汗之小嫌遂乞骸之素志或寬嵗月俾息田廬儻拜起之粗堪豈奔趨之敢後辭免落致仕除翰林學士狀右臣近具奏再辭免召命未准回降間又准尚書省劄子奉聖旨樓鑰落致仕除翰林學士日下前來供職者臣控辭未允聞命尤驚伏念臣性資顓蒙學殖荒淺仰逢休運屢㸃周行本無藻繪之工每叨文字之選知南宮之名表有愧錦窠代西掖之王言久塵薇省攝承翰苑親預禪書兼內外播告之修當書詔填委之際疚心自勉血指知慚伏自一去闕庭巳周歲紀飽更憂患嗟視蔭之幾何絶望功名幸引年之得遂矧嬰沈痼期保餘齡逮茲更化之初狎奉趣歸之旨循牆固請出綍又新彈虎門已掛之冠殊乖素志正鼇禁久虛之席尤懼非才伏望皇帝陛下俯察忱衷别求髦俊俾司是職大放厥辭庶德音昭示于萬方雖武夫亦為之三歎獲茍安于故里免有玷于隆知再辭免狀右臣蒙恩落致仕除翰林學士繼具奏辭免狀准詔書不允者屢辭召節已干方命之誅疊遜詔綸又冒執愚之懼自量其分不已于言竊以起廢江湖豈非臣子之大願充員翰墨尤號儒生之至榮而臣昔者攝空實由西省今焉被命乃自外方身已納祿而復齒垂紳之間仰上恩之特異年過從心而使當視草之職真近此之所無臣自知其弗堪人必以為不可進退之際局蹐靡遑欲望皇帝陛下念及衰殘許其引避或不容于固請姑别處于閒曹雖懷知止之慚猶有可勉之理謝宣召入院狀右臣伏蒙聖慈除臣翰林學士仍依故事本院待詔李舜臣至臣所居宣入院充學士者逺頒除命賁臨東海之濵甫覲威顔徑上北扉之直重勤主眷申遣王人荷新渥以無堪撫舊游而自失伏念臣學徒泥古仕本代耕素甘州縣之勞敢冀朝廷之選而乃屢參鵷序寖上螭坳紫薇久典于訓辭青瑣進司于封駮天官掌選兼侍金華之嚴史觀綴文久攝玉堂之邃投閒置散已分終焉告老休官遂將已矣寧知末路復被優恩不容臥家趣使赴闕對邇英之閣曲軫淵衷登螭文之堂殆成陳迹自歎形容之盡變況聞榱棟之洊更已試罔功既衰焉用兹蓋伏遇皇帝陛下才無終棄仁不遐遺解琴瑟以更張聿修治具出絲綸而彌大下取故臣欽佩隆知頗驚羣聽臣敢不勉尋末學增葺寡聞彊為骫骳之詞少答便蕃之寵辭免除吏部尚書兼翰林學士兼侍讀狀右臣准尚書省劄子奉聖旨除吏部尚書兼翰林學士兼侍讀者疊拜恩光彌深震恐伏念臣頃者攝承文部兼直禁林進讀露門無匪高華之選退耕綿上不堪憂患之罹冀垂車以示子孫辱賜骸而歸田里敢圗出綍復使彈冠況在七旬之餘悉紆三組之重不惟共二俱俾為真有如朽鈍之蹤曷稱便蕃之寵欲望皇帝陛下别圗衆俊無備一夫念齒髮之早衰察精神之不及姑仍舊貫尚竭庸材再辭免狀右臣蒙恩除吏部尚書兼翰林學士兼侍讀繼具奏辭免伏准詔書不允者詞禁再登甫祗官次恩光三錫益震愚衷貢遜牘以未俞望宸居而力請伏念臣才本無用病因易衰休官方幸于杜門承詔忽驚于赴闕尋鑾坡之舊已懼不堪居從槖之先尤為非據況二選並稱于劇部而九重密侍于邇英仍兼視草之司深切負芒之懼欲望皇帝陛下俯矜誠悃曲軫頽齡既知斷斷以無他安得多多而益辦許容避寵庶免妨賢辭免兼修國史實録院修撰狀右臣准尚書省劄子奉聖旨兼修國史兼實録院修撰者臣再入修門屢膺寵渥周章亟拜局蹐靡寧伏念臣頃簉從班嘗共衆職既典銓于選部仍視草于禁林兹皆遂于為真又已參于進讀更頒恩旨俾預史官比緣疊組之煩疲于奔命乃若汗青之重無所措詞至今愧之況復老矣三者已難于勝任一身安得以貪榮欲望皇帝陛下憫其已過于七旬察其難兼于數器以國典為甚巨擇英才而别求庶使微蹤粗殫駑力攻愧集卷三十二
