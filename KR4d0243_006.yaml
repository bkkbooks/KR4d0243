front:
  text: 攻媿集卷六
  hash: sha256:4ad8580f94b7441bf44acbec9e5c8674d672e360591e7ac5a171878df3172ee7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_006-1a}
body:
  text: 宋樓鑰撰古體詩石時亨飽山閣乾道七年冬見時亨相與登飽山閣淳熙七年秋又過之今三十有三年矣時亨書來索詩老矣日困憂責之重應酬之繁何處有此慨念舊遊況昔止齋陳君舉洎薛象先諸公往來必遊焉此閣名因以傳黄文叔則又里人也存者無幾併于末章見之率爾有作蕪拙媿甚層層得好山是處足飽看君眞樂山者心地尤平寛生長山水縣慣見青巑岏築室欲飫賞憑虚著危欄天亦遂君意俾君老其間場屋早得名晚始就一官官又不得進甘心樂瓢簞官少家食多知更幾暑寒朝見山嵐髙暮喜山雲還山氣日夕佳秀色幾可餐晴雨各變態雪月更萬端于山真屬饜清明流肺肝膏粱與芻豢與世殊鹹酸久矣謝世紛屏息專内觀鬢無一莖白八十顔如丹所得不既多愈飽天不慳此閣本不華何處無此山苟為名利驅人境無相闗吾鄉山苦逺可望不可攀東樓快登眺聳翠羅烟鬟年來勇欲歸匏繫未許閒君索飽山詩南明恍在前十年兩訪君共醉苜蓿盤向時多名流與君平生歡秖今幾人在一見良獨難叔度鎮金陵道衡處瀛壖舊遊如晨星相望可長歎歸夢遶故丘非晚再掛冠何當泛剡谿往從子于盤林徳久祕書寄楚辭故訓傳及叶音草木疏求序于余病中未暇因以詩寄謝平時感歎屈靈均離騷三誦涕欲零向來傳注賴王逸尚以舛陋遭譏評河東天對最傑作釋問多本山海經練塘後出號詳備晦翁集註尤精明比逢善本窮日誦章分句析無遁情林侯忽又示此帙正欲參攷搴華英屬余近歲方苦疾筆硯廢墮幾塵生嘗鼎一臠已知味始知用工久已成況復身到荆楚地詳究蘭芷聞芳馨前此同朝幸相與錦囊詩文為我傾惜哉不早見此書病中欲續神不寧年老耄及屢求去倘得掛冠早歸耕尚當一一爲尋繹期以爝火禆明星謾揮斐語塞厚意深媿所報非瓊瑩贈黄真䕶道人游茅山少年曽上三茅山千巖萬壑窮躋攀烟霏空翠不可狀弟兄聨騎欣清閒囘頭五十有餘載至今夢境猶班班初從崇禧入僊境元符玉晨紛幢幡草庵精舍不知數各占山麓清溪灣蓑衣相見黑虎谷蒼然白髮猶朱顔延之土窟款清論桃皮釀酒無留殘達道所居更奇絶萬山開豁如重闗一山巉巖似筆格聳秀正矗湖中間白馬真人尚生氣長史舊井藏餘丹異石若碎還復合豢龍幾處多澄瀾華陽洞門閉巳久傳聞亦有游其藩撫掌浮漚湧如沸僊人捧石手可扳最奇無如大茅峯千尋直上天市壇中峯小峯如雁行下視堆阜羅烟鬟三君司命時歸降往往天風吹珮環人言春日羽衣㑹胎禽終日來飛翻玄帝大鼎秦皇璧丹砂六千在流泉地無虺虎與荆棘但有衆藥堪延年洞天凡蹤不易到我欲再往良獨難有時慨想舊游處陟岡惘惘涕爲潸江夏僊人有僊骨卓爾抜俗甘瓢簞揺鈴真能徹帝所揮钁自足驅神姦曽入金華訪初平今往地肺求洞元游經都城道價重拂袖忽厭拘塵煩徑登紫芝繡衣亭咫尺衆真相往還神僊渺茫信可學秖恐涓塵天意慳但見茅君極僊品誰知求道越岨艱至今豐碑載錫文舟墮千劍如指彈君得此居宜勇進勿使學歩譏邯鄲我欲休官未容去歸夢遇覺多愁歎終當掛冠四明隱捫蘿采石紉芝蘭江東日暮雲生處安得羽化同霞餐舅氏適齋汪公尚書慕香山之髙續達哉行集香山詩句次韻脫衣典酒曲江邊不作閒遊即醉眠大扺浮雲何足道生理何曽得自全朝廷雇我作閒人髣髴緡錢三二千一種共君官職冷收得身來巳五年五年炎凉凡十變老後誰能惜酒錢塵纓世網重重縛七十八十百病纒千萬人中無一人自喜天教我少縁六十三翁頭雪白貧家强健亦天憐毎愧尚書情眷眷為君一醉一陶然其間氣味多相似猶在病羸昏耄前月夜徐行石橋上累累棟宇相連延歲種薄田一頃餘薄産處置有後先更無俗物當人眼遊魚潑潑荷田田為君舉酒歌短歌不妨兼有散花天適齋示池水大篇效元白體相答適齋一片心世人難與比少時發此念樂施到暮齒婚姻成者衆葬埋不知幾義氣追古人仁風動桑梓利益及物物方便形事事先正有此言源流固有自外家有天池清波照叢桂來者不問誰小大聽盈器及其旱將涸一雨復清泚我舅為欣然作詩自言志平生欲濟人往徃多割已向來俸可分挂冠踰一紀心勤力不逮不得盡如意安得有貲財如此池中水來求則應之吾心斯足矣長篇筆餘力亹亹遂滿紙病足正僵臥三誦為之起韻險不容次愚言不能止公曰汝答我只用元白體公心與天通言合孟軻氏菽粟如水火此意豈不美黄金土同價但恐無此理求水易足用近止及鄰里上不過飲食下亦止濯洗求財則無厭來不問逺邇應者力巳竭求者殊未巳有如一富翁獨處百家市始焉逐什一貧富本相濟餘波被四鄰人情皆可喜久之責望重爭訟隨謗毁不言理曲直但謂富者鄙堯舜有至仁獨病在博濟所以漢昭烈其言有深㫖富者民之怨百萬輒散棄貧富各有分取予尤不易生長在舅側義事熟于耳頗亦知為人緩急力不計舅言出于仁甥言裁以義二者若不同同歸于一際愛苟無差等兼愛幾墨子豈惟道非中安有力及此仁民而愛物要自親親始適齋約同社往來無事形迹次韻舅氏年益髙何止七十稀神明曽未衰髮黄齒如兒義概同古人閭里咸歸依度量海深闊仁愛佛慈悲居然三達尊後生願影隨為作真率集率以月為期平生持謙柄自牧何太卑善學柳下惠不欲慕伯夷一鄉有善士收拾畧不遺以此娛我老今是勝昨非何必汗漫遊據龜食蛤蜊但欲客長滿痛飲真吾師鄉黨既恂恂朋友亦偲偲凡我同盟人共當惜此時間或造竹所寧容掩柴扉耆英古有約不勸亦不辭此意豈不美謹當守良規達哉杜陵客從他人見嗤代魏丞相為錢參政夀天台傑立滄海東古今名士長相從神遊八極司馬子擲金作賦孫興公松牕先生千載士文價道骨相與同芙蓉為裳蘭為佩一笑坐斷千山峯向來羽扇揮羣雄貔貅給使如奴僮淮南草木識姓字烽燧一掃邉庭空勲名嵬峩謝不有天子神聖非臣功黄扉安坐斷國論精神自折千里衝東山之志意不改歸來碧落稱僊翁調元老手自燮理鬖鬖緑髮雙方瞳蒼生顒望謝公起中興事業須宗工新冬五日記榖旦霜餘和氣囘春風門牆老生繫郡紱欲借夀斚斟吳松祝公夀考與家世山河帶礪俱無窮代仲舅尚書賦江山得助樓江山信美非吾土王粲登樓意凄楚麗譙井幹髙則髙未免綺羅相滓汚君家華屋照城隅丹壁重重不知數誰令作此三層樓雪脊干霄千尺所幾番貽書來索詩只許歸田為君賦快哉今日真得歸無復黄塵涴巾屨試凭欄干俯人世城郭村畦可枚數四山雲物任卷舒大江波濤恣吞吐曉看紅日上滄溟夜見冰蟾轉天宇四明山水秀東南秖恨青山不肯入城府我家朗朗屋百間欲創一樓兄未許羨君輪奐日日新鼛鼓一聲紛郢斧眼明見此髙突兀騷人當得江山助我久欲歸未得閒門巷相望纔尺五賦詩幸不負前盟但慚筆㡳無風雨從今造門不復問主人醉倒樓上君莫嗔代求子紹上魏邸夀詩皇家基業天與隆金枝玉葉槃石宗我皇聖徳摩蒼穹朱邸森列慶所鍾仲氏吹箎何雝雝雲夢八九羅心胸羣經讀遍巾箱中筆端豪氣舒長虹殿前玉佩聲冬瓏天人眉宇輝宸楓大名起魏茅土封黄旛豹尾雙鎮雄宣城名郡煩憑熊政績越過黄與龔樓前疊嶂横雲空佳句不減玄暉工賢王易鎮甬水東陽春有腳皆仁風百蠻面内文軌同坐清聚蟻驅屯蠭碧海萬里樓船通天子神聖非臣功薰風入弦槐陰濃新荷泛緑榴花紅曉來佳氣飛青葱驚詫野老田家翁簫鼓動地光融融堂上帝子方雍容清旦燕賀簪笏叢負弩小吏隨登龍由來降靈自神崧難老何用齊喬松年年箕翼夀兩宮捧觴戲彩俱無窮代毛崇夫賀婦翁黄圯老生朝東都競風節清裁稱巨賢焱馳不自定相與扶其顚獨立黄徵君道周性具全辟舉既不就言論亦無傳當時論篤士比之孔與顔陳蕃為三公自媿不敢先丈人豈苖裔徳髙静而專不清復不濁量陂渺無邉學問粹然正師友承淵源詞章玉無瑕作者當摩肩向來登王畿悟主在一言校讎天禄閣朱黄手自研郎潛不啻足肯羨歲九遷清朝奬廉退擢居西府員膴仕皆坐致髙懐越拘攣出乗使者車徑歸臥林泉出處無戚欣鼻間栩栩然謝公恐未免召馹行著鞭松山介閩浙淑氣常蜿蜒隆冬正凝沍愛日囘春妍懸弧慶生申飄若區中僊僊風自難老何須記椿年賤子託枌榆掃門如宿縁叨在玉潤選得窺樂廣天川涂阻拜夀舂容陳大篇孺子倘可教願受書一編贈吏部夀詩集老杜句刺史諸侯貴春城海水邉層城臨媚景水合數百源山色佳有餘雲門吼瀑泉遊山憶謝公頻遊任履穿三寸如黄金朱橘不論錢瀟洒到江心石瀨月娟娟翠華擁吳岳誰扶黄屋尊御榻在嵽嵲佳氣拂周旋多除南省郎一麾出守還城中賢府主今之黄頴川筆落驚風雨談論淮湖奔羣書一萬卷分明在眼前老氣横九州黄鵠摩蒼天歴職漢庭久磊落映時賢否臧太常議正直朱絲弦東下姑蘇臺戮力效鷹鸇謁帝似馮唐明公獨妙年列宿頓輝光馨香粉署妍卿月昇金掌等級敢比肩巢許山林志虚心味道玄此邦承平日接近與名藩時節立復度水旱其數然百谷漏波濤狂風大放顚江流氣不平地軸為之翻人烟眇蕭瑟茅茨寄短椽凋瘵滿膏肓誅求何多門至尊方旰食鴻雁美周宣平生方寸心窮年憂黎元恐辜明主恩筋力不辭煩晨趨閶闔内應對如轉環制可題未乾御札早流傳斯人亦何幸巳聞動行軒滯務兹一掃煩苛法令蠲撫飬甚分明連檣並米船蜂蠆不敢毒歌笑輕波瀾驕陽化為霖江鳴夜雨懸公鎮踰歳月人安若㤗山且如今年冬祁寒為之暄蕭蕭理體静迥出諸侯先何時降璽書誰能叫帝閽絲綸實具新載渥照乾坤借問今何官蓬萊漢閣連鴛鷺囘金闕㑹是正陶甄煊赫舊家聲風流今尚存嚴家聚徳星文雅見天倫曽參與游夏寔為親弟昆潘輿送喜頻堂後自生萱國與大名新中堂有神僊令子各清標芝蘭疊璵璠今朝烏鵲喜僊鶴下人間甘作老人星晨霞朝可餐但求椿夀永何曽藉偓佺獻壽更稱觴肅肅秩初筵爛漫倒芳樽華燭蟠長烟清朝燕賀人佳句染華牋吾非文人特不敢廢詩篇顧惟魯鈍姿喧争懶著鞭出遊翰墨場常受衆目憐尚為諸侯客坐客寒無氈未見有知音非理誰與論始知賢主人見我顔色温包蒙忻有擊豁達露心肝竊效貢公喜兼盡賔主歡吹嘘人所羨推轂期孤騫琴操七月上浣游裴園醉翁操茫茫蒼蒼青山遶千頃波光新秋露風荷吹香悠颺心地翛然生清凉古岸揺垂楊時有白鷺飛來雙隱君如在鶴與翺翔老先何處尚有流風未忘琴與君兮宮商酒與君兮杯觴清歡殊未央西山忽斜陽欲去且徜徉更將霜髩臨滄浪和東坡醉翁操韻詠風琴泠然輕圓誰彈向屋山何言清風至陰徳之天悠颺餘響嬋娟方晝眠迥立八風前八音相宣知孰賢有時悲壯鏗若龍泉有時幽杳彷彿猿吟鶴怨忽若巍巍山顛蕩蕩幾如流川聊將娛暮年聽之身欲僊弦索滿人間未有逸韻如此弦楚辭雪谿僊隱余讀叢桂堂記而知雙流宋氏之盛觀登科記而知四川類元正仲之名忽過余于寂寞之濵問其所以來則懐閬風之綬而訪其大父閬中君雪谿之僊蹤也其詳見于楊獻子之記矣又言其先君諱庶俊特多才藝閬中素所鍾愛年止四十于是時正仲之生始九閱月爾少長女兄淑仲告之曰汝之生也卜人曰棄之先君不然取洪範攸好徳之言作詩以名汝謂夀富康寧考終是有命焉惟好徳在人爲可勉詩末以世科爲屬自爾刻本誓斷絶世故將從雪谿爲物外游不幸志不克就汝其識之則又泣曰先君巳矣大父之來四明不知其果何在萬里來游志在此也余聞其言而哀其意爲作楚辭以招之君之生兮天之西望雪山兮名之以雪谿君之游兮海之湄隱于雪竇兮杳然何歸子從其父兮孫訪吾祖子志不遂兮孫之心良苦嗟嗟閬中君兮棄家而逺遊蹇胡為乎不久留其遂蟬蜕塵埃而僊耶其亦肥遯得道不死而隱于四牕之幽耶捫蘿以尋于爛平兮既不可見莽白雲之廿里兮欲進兮焉求青櫺兮實繁莎羅兮花稠鞠侯兮相與羣白鷴兮嘯其儔謂為逺兮何景物之良是謂在邇耶將徑之何由肖君像兮茲堂謹奉嘗兮良疇君其來兮庶幾其見之君之不來兮徒相羊以夷猶此首青櫺句原缺櫺字鞠侯句原缺鞠字今據陸案是集傳寫多訛缺處因無善本參校每仍其舊俟補入又攷寧波府志宋耕號雪谿世家雙流紹興中龜䝉四明山詩小序云有青櫺子味極甘有猿謂之鞠山遇蜀僧告以山後爛平山有宋宣教居焉徳之攀躋為閬中令後仙去其孫徳之聞其在四明來訪至雪竇而歸云足補樓鑰是序所未詳謹附注于此至巔果見丹竈而終不得耕所在乃置祠其上攻媿集巻六
