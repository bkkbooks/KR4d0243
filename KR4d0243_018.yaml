body:
  text: 宋樓鑰撰表箋代宰臣謝宣示太上皇御書宋玉高唐賦傅毅舞賦陸機文賦嵇康琴賦曹植洛神賦王粲登樓賦史節故事段陳羽古意詩蘇軾養生論周興嗣千字文御跋表乾道辛卯春被賜真行草書總十卷臣下拜瞻玩心目開明竊惟書法自東漢迄于晉唐代有名家然莫不祖述鍾張憲章羲獻而各得一偏未有超軼拔乎其萃者恭惟光堯夀聖憲天體道太上皇帝高蹈羲皇之上遊戲翰墨之間初若無意而筆力所到自得之妙集乎大成如春雲行空千狀萬態逺視前古有不足述固知天縱之能心與神會非衆庶曲學之所可致也帝王餘事猶能至此顧不休哉三月二日臣某恭題奎畫昭回來從慈極睿思優渥宣示邇聯是何不世之逢獲快爭先之覩中謝竊以翰墨有法肇自東都帝王好書無如貞觀雖具龍蟠鳯翥之體徒為心摹手追之勤若夫天縱之能拔乎其萃自得之妙集此大成聿觀歷代以還未有今日之懿恭惟尊號太上皇帝陛下宸衷淵靜帝學融明一札細書居多方國之賜六經大訓式畀膠庠之傳既全脫屣之高益有怡神之樂坐進此道作新斯文取楚客之賦篇逮梁臣之韻語舒箋自適肆筆而成乃因五日之朝併演十編之富恭惟皇帝陛下茂隆孝治仰識聖心金口發明究羣書之薀奧雲章交煥掩二典之光華是雖餘事之能然誠非曲學之所及中祕將嚴于尊閣外廷咸預于榮觀臣夙際休期幸瞻鴻藻登牀競取何敢效昔人之豪鏤玉匪頒尚幾為私室之寶代宰臣進吏部七司法表朝建天官實總吏銓之要詔刊治典恭承聖作之規會衆目以畢張集前編之未備幸終載筆敢後奏篇中謝臣竊以皇家韙纍洽之期選部有一成之法蜀中興之始爰盡纂于舊章逮更化以來嘗再參于中制惟奇請它比隨日以滋而巧吏猾徒緣姦而奮乃裒四紀之沿革修為一代之經常然而漢定章程止由柱史唐更律令亦任柄臣未有上軫淵衷俯埀明聽凡曰甲令之著首塵乙夜之觀親灑宸毫具標汗簡必使繹尋而盡善更容開釋其所然既咨可録之言時出非常之斷合吏封勳考之目貫敕令格式之文以至黜贓罪之賞延進軍功于流內恩防寬縱例絶扳援莫非近古而便今務在舉宏而撮要筆則筆削則削罔有差訛官言官朝言朝此為依據恭惟皇帝陛下治先自內名不假人澄三省之源已嚴道揆定七司之制更肅班僚立通用以去煩文申權宜以存故典警捕有酬奬之等升改易參照之科使官人之方得以兼明于核實之政誠非小補臣等粗殫末技莫望清光事倣石渠稱制仰勤于臨決才非山甫有司終愧于將明尚冀頒行庶憑遵用代宰臣進仁宗皇帝今上皇帝玉牒表神文出治光紹三朝睿主膺期系隆列聖鬯皇猷而潤色寫翠琰以齊輝中謝恭惟皇帝陛下政用時中言為世則繼志述事親承太上之心傳遵制揚功盡循我宋之家法眷仁皇之盛際延今日之宏規惟天聖之元實基四十二年之治惟乾德之懿將繼五三六經之隆爰命儒臣並修史牒登載斯謹會萃不遺稽故事以成編肅昕朝而進御忠厚之及草木知積纍之自來廣大之配乾坤豈繪畫之能見牙籤初秩金匱祕藏臣獲遇休明居慙典領祖功如在期載纘于無疆帝業方崇當特書而不一代皇子鄧王辭免册立皇太子表丹悃冒陳祈免升儲之命皇恩加厚未頒賜允之書仰叩九重敢伸再瀆中謝臣聞元良以正萬國記言世子之能繼明而照四方易謹大人之象以奉粢盛之祀以繫億兆之心苟素望之無聞豈盛儀之敢受伏念臣性難語上學不知方仰承君父之規久親師傅之誨奉長安日邊之對蚤乏奇辭辨陳留牘上之書素無英識戴乾坤之大造升爵位之崇班安知懷德之維城但愧無功而受祿綸言忽播綺殿爰開實懷不稱之慙難冒非常之寵伏望皇帝陛下特回聖意俯聽忱辭不嫌渙汗之收姑寢震宫之建誓虔子職少答睿慈又代謝册立表睿旨中頒誕開宫邸微躬內愧亟上封章恩深弗遂于循牆懼甚有同于臨谷中謝臣聞仰觀乾象前星密邇于帝星俯察坤維少海實源于大海歷稽盛古必建元良自非有賢聖仁孝之聞備恭敬溫文之懿何以二體宸極正位少陽伏念臣學識無長器資非敏實託本支之盛屢叨爵位之崇日就月將幼已慙于慈訓夏絃春誦今未底于多聞自愧孱庸居懷兢懼忽拜玉音之寵冒升銅輦之榮入侍皇居仰承天序茲蓋伏遇皇帝陛下仁周溥率明照幾微膺列聖之丕圖奉上皇之色養眷求主鬯以重承祧儲德未充曷副人神之望睿謨素定不由羽翼之成臣敢不益念前修永遵雅誥謹文王安否之問敢怠帥行書唐宗仁孝之詩仰祈札賜又代謝太上皇帝表從五日之朝夙荷抱孫之愛拜十行之札俄膺立二之求仰慈訓之曲臨懼微躬之匪稱中謝臣竊以大人有繼明之義蓋取諸離長子為主器之親故受之震豫建儲嗣雖本前規獲奉重親未如今日伏念臣幸以弱植出逢聖時列亞保之崇班初非功致胙真王之尊爵深愧名浮徒以託體嚴宸承休慈極忽頒丹詔叨處青宫共知睿斷之不回實本聖謨之丕顯兹蓋伏遇尊號太上皇帝陛下德高堯舜道合羲黃雖與造物者遊自求至樂仍有孫謀之燕以永無疆爰舉曠儀以安神器臣敢不力修四學祗奉兩宫立愛自親仰體承祧之重聿修厥德敢忘念祖之勤又代謝皇后箋坤德無疆實依厚載震宫肇建遽及凡材中謝伏念臣託質天支承華壼則干戈羽籥教雖備于四時父子君臣學不臻于三善忽奉褒揚之册俾當監撫之權仰宸斷之剛明賴母儀之裨助茲蓋恭遇皇后殿下德齊任姒賢過娀姺陰教聿修坐致人倫之正淑謀經逺更圗國本之安臣敢不居近正人力尋舊學祗召而不犯馳道當奉君尊問安而必至寢門益虔子職又代謝受册表銅門肇啓方慙主鬯之良珉册誕頒更舉臨軒之禮恩隆天地懼劇淵冰中謝伏念臣素乏材猷積叨寵數金印盩綬蚤處于宗藩青蓋斑輪俄升于儲位復差良日爰御正衙備金石以盈庭儼纓縷而就列授之寶牒訓以綸言退省其私不知所稱兹蓋恭遇皇帝陛下道高世表機照物先斷自宸衷豈私于愛子蕆茲曠典蓋重于承祧臣敢不仰體聖謨恪供子職出有師入有保起居惟近于正人親則父尊則君夙夜益勤于順事代宰臣賀立皇太子表冡嗣稱賢夙仰吾君之子儲闈定禮果安天下之心歡動兩宫慶均四海中賀恭以離著麗天之象繼明實繫于大人震有洊雷之文主器必歸于長子闢東朝之縟禮綿列聖之丕基曠古難逢于今創見恭惟皇帝陛下孝如虞舜樂似文王敬奉親嚴屢上玉巵之夀大寧國本首開銀榜之宫慶幼海之澄瀾瞻前星之騰耀一人獨斷非山羽翼之成三善自將克荷宗祧之守臣叨居近列恭覩盛儀日下重光已備夙成之德嵩呼萬嵗敢忘歸美之誠代宰臣賀太上皇帝表神謨早定俾建元儲聖孝丕承誕揚宸制事關宗社喜動華夷中賀恭以甲觀之生嫡王孫但有命名之愛一日而見三天子止聞臨澡之歡載在信書以為美事曾未有傳神器而與子見東宫之立孫介茀祿于無疆固蘿圖而有永恭惟尊號太上皇帝陛下道高百聖仁覆萬方翼燕孫謀獨享後天之算儲登世嫡共仰前星之輝問安獲事于重親主器仍歸于長子臣欣逢盛際獲在邇聯卜世卜年期過周家之歷重輪重潤願賡漢樂之詩代宰臣賀皇太子箋儲德日新久繫于衆望睿謨獨斷爰舉于曠儀覆載兩間歡呼四起中賀恭惟皇太子殿下地居冡嫡天與奇姿震一索而得長男宣膺主鬯之寄漢元年而建太子益知享國之長仰九廟之儲休信兩宫之增慶人心自定神器愈安某等肅領鵷行進瞻雞戟元良既正不煩賈誼之言盛美難名莫盡卞蘭之述代謝吏部侍郎表魏丞相杞以下四首代代言西掖方拜誤恩攝二東銓復叨改命循牆莫避臨谷增危中謝伏念臣濩落無堪迂愚自信正以經營于菽水故嘗希望于斗升昨自外官恭趨嚴召猥厠內朝之鵷列親覩上聖之龍飛五歷粉闈一參月寺籌邊戎幕無婉畫之可稱將命薊庭幸歡盟之復締冒柱史詞臣之選兼宫端寶牒之司初無左右之先容盡出聖神之親擢忽承帝制俾倅天官一新龜紫之榮仍假銓衡之長莫回成渙徒激懦衷兹蓋恭遇皇帝陛下虛以受人明于分職憐臣孤立于宦路借以末光謂臣曾歷于劇曹付之重委臣敢不寅遵邦憲嚴制吏姦朝夕論思雖素乏嚴吾之譽簿書期會庶勉追裴馬之名代謝侍講表攝居選部已困劇曹擢在經幃更承清問退慙衰朽有此遭逢中謝伏念臣幼歷羇艱學無師法顧孤陋寡聞之習但為決科之資無疏通知逺之經素匪專門之業矧是帝王之大學非為章句之小儒必求鴻博之人以究淵源之蘊豈容朴學獲奉細旃茲蓋恭遇皇帝陛下巍巍成功謙謙終吉時降至尊之勢兼收可録之言遂容草莽之臣亦預金華之講臣敢不黽勉微力綴緝舊聞為二三萬言之辭敢求釋義暢五十八篇之旨庶補重明代辭免進國史轉官表約史何功敢叨醲賞騰章避寵未拜俞音洊貢誠衷仰干睿聽中謝竊以三朝之治迹允為萬世之成規信傳信疑傳疑已備不刊之典筆則筆削則削屢資多學之儒而臣方二政之未幾適成書之已久暫領纂修之職曾無潤色之勞使冒賞而不疑則叨榮之太甚而況近辭珍賜陛下固已許其廉兹躐崇資公議必傳以為笑謂少者辭而多者則受謂今日是則前日為非雖故事之有初在微臣而焉敢伏望皇帝陛下俯矜賤悃特寢異恩益使人心知清朝以名器為重誓殫愚慮效薄伎于志傳之間代遺表生而致主曾亮采之無聞死不忘君豈效忠之可已危悰欲吐老淚先傾中謝伏念臣奮自羇單本無僥覬蚤厠熙朝之鵷序親逢上聖之龍飛猥以謭材屢叨隆委凡一時清切之選皆九重特逹之知兵交而使在其間備更險阻猷告而爾順于外嘗預論思寖歷政塗遂登揆席迄緣朴拙用速顛隮俯憐簪履之遺旋畀屏藩之寄人言噂沓何敢控陳天鑒高明卒蒙昭雪賦以真祠之祿豫之祕殿之名屏迹衡門銜大恩而莫報馳心魏闕顧一飽以何安今則蒲柳益衰桑榆既逼老將智而耄及福已過而災生卧疾漳濱恍精神之易散遊魂岱嶽嗟頃刻之難留僅存餘息之微重結明時之戀伏望皇帝陛下治功惟敘聖德又新總萬幾之要以充育天和合羣賢之智以維持國是問安慈極日承尊養之歡注想中原身濟規恢之業臣命隨氣索志與辭殫王度清夷固無煩于尸諌死期迫促徒自切于哀鳴代知泉州謝進職再任表氏汪尚書大猷以下四首代舅承南服之流忽叨因任進西清之秩併辱柬知拜寵命以增榮俯懦躬而有靦中謝伏念臣奮自寒逺遭世休明分甘州縣之塵勞敢望朝廷之拔擢十年服采寖登侍從之班千載逢辰曲被聖神之眷此雖攝六官之長猶未為二卿之真及遂求間遽超次對退惟愚孱已劇優隆起試外藩以治民而自詭洊更下考無報政之可書方將重上真祠之章豈意更升學士之列一變閩俗初無常袞之稱更與泉麾仍繼蔡襄之後已試如此其可再乎無功而遷誠為過矣茲蓋伏遇皇帝陛下政先實核恩不遐遺念微臣非可用之才粗堪郡寄謂長吏多數易之弊就畀璽書復增延閣之華益重專城之任臣敢不勉其未至究所當行久悉邦風既無勞于問俗務攻吏事庶不負于分憂代謝隆興府到任表上印泉南方遂祠庭之請把麾江右遽叨帥閫之除猥荷柬知若為稱塞中謝伏念臣幸逢昌運忝綴從班昨辭逺于修門效蕃宣于遐服目駐堯天之日月身留閩徼之山川未及終更已叨因任共知鼯鼠不堪五技之窮自分鷦鷯惟望一枝之足屢申誠悃仰扣淵聰卒蒙從欲之仁獲遂投間之志千里未還于榆社十連復冒于綸音旋促對于清光誤親承于睿奬授之方略俾以奉行茲延見于吏民方究詢夫風俗惟南昌之名郡實上聖之潛藩襟帶江湖首尾吳楚雨暘方若正賴春耕秋斂之勤凋瘵已蘇猶藉左粥右餐之惠必得循良之吏庶安流冗之民豈應蠢愚堪此委寄茲蓋伏遇皇帝陛下恢張治具駕御人材察臣久被使令既深知于德意念臣備嘗險阻亦粗識于民情特畀虎符俾殫駑力臣敢不布宣寬大禁戢姦欺當使田間盡改帶刀之習且令州縣毋存珥筆之風代賀太上皇帝上尊號表啓龍樓七十之慶春朝將展于上儀率鵷列三千之臣至朔先加夫媺稱事高治古歡溢綿區中賀竊以薦舜于天堯帝聰明而遜位以武為子文王逸樂以延年不有極尊之稱曷為甚盛之舉鏤白玉之牒歸美兩宫建翠華之旗親朝五日書契未有宗社無疆恭惟皇帝陛下道盡事親仁先自內謂富夀之福為彞倫之所先而父母之年在常人而猶喜況承社稷之託親見春秋之高自非得九州四海之歡心備五帝三王之全美何以效之慈極副我淵衷爰集廷紳取于經而定大號更推帝澤斂時福以錫庶民上皇增萬夀之昌太姒嗣徽音之懿至矣盡矣不可有加舞之蹈之莫知所自臣退甘屏處莫預駿奔奏薄技于從官之間敢懷故步效三祝于封人之請徒切愚誠代謝宫觀表十年念咎蹐地靡遑一日奉祠從天而下孤迹有自新之路聖朝無終棄之人恩重難名感深至泣中謝伏念臣猥由寒陋誤辱眷知持槖近班何有論思之益把麾逺郡粗殫惠養之勤鄉關甫遂于歸休帥閫忽叨于推擇患生意表盜起鄰封調戍卒于屬州授伍符于簉牧不虞宿將反墮姦謀方騰訟過之章乃被督師之命大兵雲集謂當指日而可擒醜類麕奔曾不回戈而內向力追蹤于山谷尚假息于朝晡績既弗成罪將誰執七旬未格莫寬西顧之憂三褫猶輕難逭南遷之謫獲歸故里已佩深仁自量擯斥之餘宜在孰何之外敢圖鴻造憫其垂朽之年特渙綸言廩以祝釐之祿削刋丹籍叨竊素餐茲蓋伏遇皇帝陛下治本隆寬政先總核動加矜軫豈為匹夫而求全凡與使令不以一眚而終廢俯憐庸懦曲賜涵容臣敢不擢髮省愆銘肌感德散材無用深知復玷闕之囏壯志雖衰尚得效糜捐之報攻愧集卷十八
