  text: 攻愧集卷二十八
  hash: sha256:0f712c52008db652b491dbd43ccc64b6b9e81ce1b7d9e4d983ea5a64b156332d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_028-1a}
body:
  text: 宋樓鑰撰奏議奏稿西掖繳潘景圭差知平江府臣仰惟陛下不忘簪槖之舊念景圭家食之久授以大藩本無不可兼景圭屢試劇郡節用明法亦未嘗有害于民惟是近歲洊致煩言倍費君上保全之賜王畿輔邦吳門最大而起于散地而遽得之必至公論籍籍恐非所以愛之也士大夫茍無大過清朝不忍終棄矧如景圭付以一州自可辦治而臣猶以為言蓋恐未允公議終難區處欲望聖慈改畀以次州郡俟其治績稍見以序升遷不過少遲歲月人亦無得而言所有録黃臣未敢書行繳劉煒監司差遣見效依舊與監司差遣聖旨首議禁戢私錢今已臣與劉煒初不相聞知第聞其為人頗有志于事功故朝廷任以邊郡權為淮漕然以前年禁私鐵錢之事觀之則知其人非善于處事者也兩淮鐵錢私鑄太甚浸淫入于內郡合行措置禁戢人雖以為私憂然無敢以身任其事者朝廷以衆言下之漕司煒自任其事故一以委之然而慮之不審處之不詳行一切之令而欲去積年之弊當時公私兵民行商坐賈雖貧富多寡之不同茍蓄一錢則望一錢之用而煒為之太遽徒以片紙出令使盡失其平一路騷然無不怨憤愁苦其不致生事者特天幸耳是後倍費朝廷調護為之遣使為之集議始則降官會終則給交子紛紜久之中外寒心僅得少定至今追咎未已猶未有以為經久之計識者方且憂之雖得私錢粗息所傷已多是何異拔小兒之齒齒雖得脫而兒殆矣如此處事誰則不能若非朝廷改圖幾無以善其後方是時煒亦倉皇無䇿幸而罷歸得以茍免尚足以為功乎陛下若念其為國任事其志可憐前日之擾非始謀所及不忍廢棄則可耳今忽有旨以其首議禁戢私錢今已見效依舊與監司差遣若反以為功而賞之者誠恐此命一出必致大駭物論亦無以謝淮甸之人臣雖甚愚知其必不可行故不敢以仇怨為憚冒昧奏陳欲望睿慈寢罷上件指揮少俟事體平息録之未晚臣數犯天威罪在不赦惟陛下原貸所有録黃臣未敢書行繳陳峴差知靖江府臣竊惟國家之待士大夫亦厚矣雖有過愆陷于罪籍未嘗終棄遲以歲月多抆拭而用之此朝廷之至恩也然亦當視其人之如何彼雖有廢放之歎我則有民社之重平時既無善狀而又貪黷太甚者自不應復以民社畀之而況師藩乎峴之處家醜聲甚彰棄妻之訟人憤其寃峴之居官汙聲尤著帥蜀之迹最不可掩前後章疏指陳實事臣不敢復論頃除鄂渚守臣公議尚且不容隨即寢罷桂林重鎮控制南方非有才具不足以應事機非有廉節不足以服逺民其可使峴居之乎間廢雖久衆尚齗齗臣若不言亦必有論之者欲望聖聰寢新命于未行之時别選良牧以鎮撫二十五州之民庶使士夫知畏公議所有録黃臣未敢書行繳鄭汝諧除權吏部侍郎臣伏見四月二十七日鄭汝諧除權吏部侍郎二十八日給事中黃裳繳奏五月二日黃裳除兵部侍郎于是汝諧與裳俱不就職因仍不決遂至踰月臣下罔測聖意所在今三月三日始有前項指揮臣竊惟給舍臺諫紀綱風采日以振作則朝廷益尊寖以消弭則亷陛陵夷蓋紀綱者陛下之紀綱風采者國家之風采必賴陛下主張然後可為故自來中外之臣所以畏朝廷者以其有給舍臺諫也所以畏給舍臺諫者蓋以尊朝廷也故非才而得美官無故而求橫恩者皆惴惴然不敢自安始則曰給舍肯放過否一聞臺諫奏事則又曰不至及我否纍朝以來務謹重此選使人不肅而嚴蓋未有如今日不振者也況所貴于士夫者為其能存廉恥侍從之官又士大夫所屬望以為表率也小大之臣一聞給舍臺諫語及姓名不當辨説是非即合奉身而去脫有不當公論固存不惟伸言者之氣正以增朝廷之嚴臣不敢更引古義只以近事明之淳熙二年莫濟以袐書監兼權中書舍人因司諫湯彥邦論韓彥古職名事後有貼黃云初除職名後省失于繳駮莫濟自念前在後省曽經書行皇恐引咎即求補外壽皇謂輔臣曰濟何故求去輔臣以實對壽皇即取入文字揭取貼黃而後付出濟終不敢復留壽皇亦聽其去人皆以濟為賢而服壽皇之重言路也是時習熟見聞亦不以為異事近日一二士夫明見臺諌推彈乃敢睥睨復留名為引退實有覬望強愎之氣反出言路之上汨喪亷恥取笑朝野不得已而後去言者又與之俱是以風采摧頽無復氣焰汝諧士人也一聞裳有繳駮即已出城待命一再入奏力求外補固已深知事體不復可留陛下雖使就職汝諧必畏公議不敢效尤彼莫濟初無姓名在白簡中推迹其故猶自引去矧汝諧親為黃裳繳論何顔復就從列黃裳已蒙陛下眷留臣不敢復論然終以不得其言而奪封駮之職矣而汝諧秋毫不動儼然居職事理顛倒公論不平亦何以表率朝列宣示中外流傳四方重取譏訕雖欲以職事自見亦無以為容矣臣愚欲望睿慈重紀綱風采之地全士夫亷恥之道許其補外以正事之體度汝諧未敢就職必再辭免而從之則陛下退人以禮汝諧處身有義君臣之間頗為得體實天下幸甚臣誠不肖攝事西掖泯默憤悶寢食不安正以事未經申不敢論奏今而不言則為失職是敢不避斧鉞冒貢愚忠伏惟陛下深察早賜處分所有録黃臣未敢書行繳鄭汝諧第二狀臣今月初三日準録黃鄭汝諧日下赴部供職初四日嘗具奏繳至今未蒙處分初七日再準録黃鄭汝諧辭免乞祠祿或一郡奉御筆依已降指揮供職臣么麼攝承西掖以論駮為職言語拙訥不足以動天聽汝諧之奏既勤陛下親灑宸翰必是已蒙省覽其言曰自叨除命之後凡三遭省官論奏其意不過欲正國家之事體而存給舍之紀綱是其言可聽者一也又曰論事者罷被論者留不惟事體不順而紀綱幾于盡廢是其言可聽者二也又曰自始被命至今已四十日矣有合區處施行之事不為不多乃以一小除目閲日已久何必留臣以啓多事之原是其言可聽者三也其説皆與臣言暗合以此猶知人情本不相逺此天下之公言也況黃裳一經繳奏陛下察其難以並在從列故處以王府舊職而汝諧之命謝深甫繳之臣又論之矣汝諧必知難以並立深甫與臣又當如黃裳之引去自此一有論奏則先危其身向來猶得與之俱去去非臣子之所憚與之俱去事已可駭今則論事者罷被論者留臺諌給舍不復可為雖具其官而職盡廢其何以為國乎陛下若徇其請付以外郡以靖朝列在陛下一舉手之頃耳朝廷則可以正紀綱振風采汝諧則可以全去就知亷恥上下兩得之矣近來事緒日出論駮日至煩瀆聖聽皆非得已陛下本務安靜而滋益多事臣愚不避萬死伏望聖慈採之公論付之無心刻印銷印惟是之從使朝廷肅然是非别白實為幸甚不然恐紛紛未已徒駭觀聽無益也所有鄭汝諧供職指揮此特其一爾欲望先賜宸斷俯從所乞他日如欲用之亦未為晚上項録黃臣未敢書行繳鄭汝諧第三狀臣備數左史誤蒙聖恩兼攝西掖比因鄭汝諧除吏部侍郎曾經給舍繳奏之後得旨令日下供職繼又準御筆批汝諧乞祠劄子臣兩具繳奏未承處分又蒙宣諭書行臣以愚蠢固執不敢奉詔伏念臣以么麼小臣區區抗論實非有他正為朝廷維持紀綱庶幾後省猶有官守然自知荒陋之文不足以立雷霆之下朝夕俟命靡遑寧處今兹再降指揮仰窺聖意以汝諧為有才故排羣議而用之萬鈞勢重罪無可逃三諌不從臣可以去不敢更有繳奏但以上件録黃難以書行臣亦無顔復玷朝列謹具奏聞見今居家俟命伏望聖慈將臣早賜罷黜庶免久妨賢路冒犯宸嚴臣下情無任惶懼戰栗之至所有録黃臣未敢書行繳給還陳源産業什物告劄臣竊惟陳源近除內侍省押班後有繳奏蒙陛下採納雖許其趨走于禁中而外廷之議獲伸告命不給俸祿不支仰見皇明洞燭足使近習屏氣今來忽有指揮給還物産臣亟取會數目除追納及賣過外所餘不多若不必深較然事體所關則有不可陳源罪惡貫盈死有餘辜幸蒙寬宥復備使令陛下既已伸外廷之議而復還其已沒之物産則賞罰近于無章矣且其前後賜賚及其侵盜其數不資今其所餘田産不滿萬緡雜物稱是又多不可售之物舉以與之豈惟不足以示恩適所以啓寵納侮且小人無厭之求其勢未必遽止臣愚欲望聖慈追寢上件指揮以絶姦萌不勝幸甚所有録黃臣未敢書行繳封樁庫取金銀臣竊惟祖宗置內藏庫蓋以乘輿服用之餘别儲以備邊費壽皇置封樁庫亦欲蓄于無事之時以為有事之用非若前代瓊林大盈專以為私藏而輕費也故纍朝惟聞時出內藏以補有司之不給借用或至百萬償還不足往往貰之未嘗無故反取外帑以實之也高宗皇帝嘗曰祖宗儲積內帑本以備邊陲緩急之用此真陛下所當取法也今日比祖宗時事力不及十之三四專仰東南以立國取已竭澤矣州縣困乏田里憔悴重以去年水旱所在飢荒江上流殍盈路往來皆能言之聖慈力加賑恤所濟無幾二麥未熟可為寒心當今别無生財之道惟賴陛下身履恭儉愛惜財用禁戢貪暴檢柅姦弊尤恐不給而竊聞內庭宴飲無時費用無度內帑所積支用不資既不領于有司無從知其虛實然觀屢降指揮多取樁錢物則所謂當亦不妄臣職分戶房每見宣取數多實為驚懼蓋今日民財竭盡既不在民則當在官而經費既不可減用之又如此不節封樁家計所儲正自不多若如此支用又將竭矣內帑既虛封樁又竭國將奈何古者無三年之蓄猶曰國非其國而況虛竭如此豈細故哉臣職當論奏正以每降指揮必以恭奉三宫為名故臣子不敢有言然而外議籍籍謂所取之錢多為內廷浮費不過支散樂工賜豫近幸日甚一日如此以江海實漏巵山林供野燒豈有紀極哉州縣上煎下迫不惟民不堪命吏不得息縣既不可為州亦無少寬監司例被督責版曹日憂不足椎剝疲民取其膏血百十之逋動遭鞭撻取之盡錙銖用之如泥沙豈不可痛哉今月十三日連有兩項録黃其一曰令封樁庫支銀八萬兩會子二十萬貫赴內藏庫供納恭奉壽聖隆慈備福皇太后至尊壽皇聖帝壽成皇后使用陛下自正月一日行慶壽禮之後至今未曽再駕內外方日夜望鳴蹕之行既欲以錢糧為恭請之用臣敢不書行又一日得旨令于封樁庫取金二萬兩銀五萬兩內藏庫送納此項實為無名之費一日兩指揮前者則為奉重親之用猶為有名如後一項則為不可府庫陛下之府庫微臣安敢方命誠願聖慈惻然興念母以生民膏血供無涯之費以固邦本以保宗社夫二萬之金五萬之銀在陛下富貴之極視之若不多以民間計之不知為中人幾家之産細民幾萬之資州縣取之于民不知用多少笞箠竭多少資産輟多少衣食而後得此故拳拳為陛下言之望俯鑒愚衷收還詔旨務為節儉以益聖德以寬民力實天下幸甚所有録黃臣未敢書行繳萬鐘除起居郎兼權中書舍人臣仰惟陛下即位以來求賢是急收召人物布滿班行是以政事雖有闕遺而紀綱不致隳紊茲忽聞萬鐘為起居郎兼權中書舍人人已甚駭臣尤不遑鐘之為人臣所深識性資浮薄舉止輕儇少有不檢之名老無自艾之意世居京邑日偶賤倡至今市井之間咸知姓字凡曰縉紳之彥鮮與交遊重玷臺評難逃物議頃方屏處俄報召還何緣受知不使置散言者強顔就職固巳可羞鐘乃先期入朝如恐不及復居卿列尚曰舊人謬厠從班實汙清選但工諧謔何以當吏筆之嚴僅習歌調何以代王言之重斷然不可衆所共知豈微臣視樊噲恥與為伍將有正士問元稹適從何來若陛下必用萬鐘則孤蹤謹避三舍議已出口安可同寅詞不逮心始陳大概敢祈睿斷亟寢誤恩況茲西掖之司下房最穴身當衆怨力拒斜封今欲使斯人在官是先與羣小為地亟伸繳奏仰冀聽從重千天威恭俟嚴譴所有録黃臣未敢書行攻愧集卷二十八
