body:
  text: 宋樓鑰撰內制端明殿學士四川宣撫副使安丙乞宫觀不允詔卿沈毅善謀尤長將略內鉏臣姦外禦強敵履天下之至難為全蜀之司命虜實畏卿如所謂祭北門祭西門者然彼之技亦窮矣乃眷西顧嘉歎不忘方升書殿之班以重閫外之寄胡為引疾願解印章朕方賴卿以當一面賢于長城逺矣卿其身任保障之責以稱朕意京西湖南北路宣撫使宇文紹節辭免除寶謨閣學士不允詔入陪經幄外暢王靈既物望之愈隆豈褒章之可後卿受才挺特抗志崇深不惟誓報于國恩尤欲仰追于祖烈宣威邊徼遂寬北顧之憂寓直文謨益峻西清之職尚殫忠藎嗣有寵嘉毋事牢辭亟祇新渥新除寶謨閣直學士李寅仲辭免召赴行在不允詔朕志于有為心不忘逺矧惟簪槖之舊具宣藩翰之勞既頒優恩仍趣歸覲卿素全忠孝備著事功豈惟徑草之知實障狂瀾之倒峻西清之職未稱眷懷望東海之來方深渴想尚騰遜牘未就鋒車式遄其馳勿重有請禮部侍郎章良能乞宫觀不允詔卿以該洽通敏之才洊直鼇禁亦既三載身兼數器宣勞翰墨之間夥矣朕更化之初大述作多出卿手方有賴于論思之助遽欲以目眚求退非所樂聞也卿雖欲奉身而去使朕幾似于棄才者可乎其安厥位勿重有請新除觀文殿學士趙彥逾再辭免不允不得再有陳請詔朕更化之始登用賢才宗老典刑無如卿者閔勞以官職之事雍容進讀以冀日新之益進班延恩少示眷意一辭贅矣況于再乎身其康強謀猶克壯少親醫藥毋復重陳勉為朕留以繫人望侍讀趙彥逾倪思宇文紹節侍講章良能辭免進講毛詩終篇轉一官不允詔朕日御邇英講明經理三百五詩至是終篇敘進官聨厥有故典卿為宗老宇文紹節云卿雖處閫外倪思章良能云卿居從列實助緝熙毋事固辭益思所以輔朕之不逮新除刑部侍郎曽㬇辭免不允詔朕更新治化欽恤刑章遴選二卿久令攝事以卿性資直諒器度寬洪承東魯之儒風襲南豐之家學比安閒外促使來歸入對便朝喜聞正論刑惟弼教方有望于老成德本好生當務先于明恕亟祇隆委勿事牢辭吏部侍郎梁季珌乞宫觀不允詔惟卿先正受知髙皇既登聽履之班尤多活國之計是宜有子為豫從臣比更民曹浩穰之司又歷銓部公方之選胡為引疾乃欲求閒尚安厥官以副眷倚之意刑部侍郎曾㬇辭免兼同修國史兼實録院同修撰不允詔昔在先世嘗繼列于史官爾為近臣亦洊司于直筆閒居自適更化惟新召還獻納之聯兼卑纂修之舊豈特助成于國典抑將大振于家聲明命既頒遜辭可略福州觀察使鎮江府駐劄御前諸軍都統制兼知揚州畢再遇乞奉祠不允詔牧守之良方圖久任將帥之重尤戒迭更惟卿沈鷙之資拳勇自奪身經數載最多汗馬之勞賞不踰時亟上亷車之峻領京口戎旃之寄鎮淮堧制閫之雄深明保障之圖日講留屯之策流民寖復信使始通甫臻按堵之期遽上奉祠之請其安爾位以訖外庸皇太子某辭免每遇視事令侍立宰執赴資善堂㑹議不允詔閏四月嘉定元年朕惟古者立國必建儲闈共為子職實資主器之重惟豫元子篤意問學年未及冠綽如成人朕欲俾爾習知國家之務侍立吾左預聞政事師賔㑹議皆吾大臣朕方一新治體兼聽公言爾當周旋其間日增聞見以成溫文之德尚其勉旃毋事多遜四川宣撫副使安丙再辭免資政殿學士不允不得再有陳請詔朕更化以來愛惜名器未嘗輕以假人其有度越拘攣超資級而授者非如卿之雋功茂績不豫也書殿升華以所以待執政者待卿其內撫兵民外飭邊備使全蜀之境奠枕無虞以稱朕委任之意以保爾功名之成可矣服我休命毋為固辭皇伯嗣秀王師揆生日詔月十五日嘉定元年五薰風南來當朱明之方半望舒東出慶伯父之始生是曰宗英宜膺天夀匪頌惟舊寵數益新新除吏部侍郎章良能辭免不允詔卿以剛徑之資濟以博洽之學為吾詞臣仍兼數器其在儀曹事有不可者堅執不移朕所歎嘉進二天官其以處儀曹者處之柅吏姦明銓法庶使無賢愚同滯之嗟何為固辭更欲求去非所望也新除侍衛步軍副都指揮使夏震辭免不允詔卿赤心體國忠勇自將久攝殿巖尤見勞效步旅謀帥卿實宜之其為吾協和三軍訓之以義密衛行闕以折遐衝胡為固辭其服休命開府儀同三司楊次山生日詔月二十三日嘉定元年六卿志樂燕閒躬持亷靖時當初度宜介多祥是為戚閈之華爰厚上方之錫知閣門事楊谷乞祠不允詔卿戚畹之良周行素謹職司賔閣寵畀亷車忽求祠館之閒欲侍家庭之佚且弟兄並列于朝著以何嫌倘父子退休在眷私而有歉惟益崇于謙靖亦奚慮于滿盈其服厥官毋庸有請寶謨閣學士前四川安撫制置使楊輔乞宫觀不允詔朕以國家多囏更化善治收用耆耉如恐不及慨念舊學存者幾人就傳之初卿為首選蓋吾烈祖之所親擢向者持槖未久翩然西歸朕念此弗忘也非不知制閫之重有賴壯猶而圖任之意則有所在召節既往注想待卿控辭愈切殊用憮然載覽封章宣示邇列備見愛君憂國之志益知尊主庇民之學然與其獻言于萬里孰若造膝而陳前乃欲引疾求閒效蜀莊之沈冥何耶矧西蜀之士卿為標表肯為朕行則後生英俊將于于而來矣三命益勤朕志不易勿復有請式遄爾驅京西湖南北路宣撫使宇文紹節乞祠不允詔卿以通敏之才淵博之學起趨勳名之㑹欲報家國之仇輟從經帷出撫邊徼修好伊始息肩可期有如賢勞盍還舊著屬以繕修備禦之未畢勞來安集之方勤將圖爾功少俟其定忽上真祠之請欲為便道之歸在卿則固所願焉于朕則豈所望者其攄長算毋有遐心右丞相錢象祖乞解罷機政不允詔方國家多事之時任廟堂一相之職卿蓋屢形于固避朕亦自知其甚難然而朕以更化云初尤冀和平之福而卿受恩最厚素為忠孝之家正使慮有未周力有弗及猶需同心協志求以尊主庇民而況察卿之才為衆所服寵以告廷之拜豈曰歷階而升幸邊瑣之粗寧恐事機之難測中外未能小息臣主靡容自安旱魃既驅星文未格日不暇給他何可言偶微爽于節宣宜倍加于攝養勿念去計共圖治功宵盰實勤曷嘗以位為樂燮調有賴安得奉身而歸新除御史中丞章良能辭免不允詔朕惟振朝廷之紀綱當先重紀綱之地新天下之耳目必遴求耳目之官卿鯁亮之資淵深之學自奮于韋布之日有聞于搢紳之儒雖遍歷于淸華亦屢更于夷險處身無玷疾惡如風欲堅塞于幸門曾不辭于怨府彈擊之任簡求實宜其力辨于官邪以共扶于國論發卿所藴助朕有為勿騰避寵之章益勵敢言之氣衛涇乞解罷機政不允不得再有陳請詔居九五之正位方以遇災而憂何二三之大臣皆欲引身而去豈朕所望于卿奚安尚賴同寅而協恭庶幾轉禍而為福要須持久或可圖功雖屢請以難從毋再辭而為贅錢象祖乞歸田里不允不得再有陳請詔朕慨踐阼之既久念治效之不進不惟不進殆將阽危是以惕然改圖勵精更化庶幾更也人皆仰之之意首論一相得卿之賢旁招俊乂如恐不及前此寒心數月方幸交鄰少定可以盡力內治自卿及執政以至論思之臣造膝而言無不傾聽君臣之間了無疑阻卿等以災異請去朕方側身自警不容重陳而數日以來廟堂五臣而三求退留行之詔屢下請猶未巳不惟朕失所望四方傳聞其謂朕何卿以勤勞致愆調攝惟益謹藥餌以速痊愈所謂故國者有世臣之謂也非卿而誰其體一心勿致三瀆褒語卿相豫未久備罄忠勞方圖內修正藉協贊知卿小疾豫告甚優佇聞有瘳勿復言去刑部侍郎曽㬇乞祠不允詔朕延登耆雋列在邇聨豈惟資讞議之平真有賴論思之益卿夙髙譽處久樂燕閒粵從一節之趨增重二卿之選惟明克允方持憲以盡公非道不陳曽閲時之未久忽披來諗遽欲告歸有嘉易退之風殊匪趣還之意刑章方簡議無待于過三史筆至嚴職何妨于共二少安定著難徇謙辭禮部尚書倪思乞祠不允詔朕召收舊人以圖新政比者凡有一事宰輔相與謀于廟堂侍從相與議于臺省粗無過舉朕心以懌今兹未能略定而求去者紛然從班亦有一二矣矧卿素為敢言自陳讜論不畏強禦不避怨仇歷歷為朕陳之擢長儀曹以示褒表亦為此舉何耶朕求其故豈朕有以致此耶相應以文止見辭費惟當一切不聽庶幾以一天下之觀瞻其體眷懷勿復有請簽書樞密院事林大中乞仍舊休致不允詔朕更化之初未遑他務求賢甚急首召耆英起自挂冠之餘擢居持橐之長延登樞管增重朝廷言必出于內心謀實稽于古訓倚毗方切而疾遽侵沖養有來何恙不已胡為騰奏即欲告歸尚精醫藥之調以繫搢紳之望江淮制置大使丘崈乞致仕不允詔朕惟屯禁兵百萬而邊鄙是虞開幕府四三而留都尤急畀以樞廷之寄增吾天塹之雄卿久安里閭洊分帥閫徒得君重肯為朕行上寬宵旰之憂外撫貔貅之衆盡護諸將獨當北門草木亦知其威名狄鞮想聞乎風采力禆廟論卒靖封陲人皆望歸衮之期卿乃有掛冠之請矧方叔之謀猷克壯而晉公之神明不衰益堅體國之心毋作明農之計寶謨閣直學士李寅仲乞祠不允詔朕緬懷巴蜀之民未嘗忘逺夢想淵雲之彥尤務招來卿蚤冠倫魁久騰英譽洊登朝蹟嘗為獻納之臣出殿侯邦尤著蕃宣之績特立搶攘之際實增嘉歎之深升學士之班既以旌其風節趣鋒車之召誠有望于謀謨何辭之煩以疾來諗萬里云逺當已戒途三命滋恭諒無俟駕右丞相錢象祖辭免提舉國史院實録院提舉編修國朝㑹要不允詔纂修史冊深賴于公平㑹稡典章尤先于鴻博允資碩輔坐總宏摹卿識洞古今學該流略接詞華于奕葉用則有餘考故實于纍朝蓋其素習舉以並命了無異辭毋遜牘之重陳期奏篇之俱上參知政事雷孝友辭免權監修國史日歷不允詔密贊政塗日預萬機之決參提史筆正資數器之兼卿早冠詞場寖登冊府逮通班于侍從已嘗賴于纂修朕慨大典之未成選鴻儒而坐領趣就纍朝之策仍嚴繫日之書故事當然謙辭可略刑部侍郎曽㬇辭免兼太子詹事不允詔朕遴選從臣方賴論思之益精求儲寀尤資輔導之功卿纍葉儒風半生朝蹟何止衣冠之偉實為簮槖之英擢處宫端允符公論亟承明命毋庸固辭觀文殿學士侍讀趙彥逾乞歸田里不允詔朕更化之始起大老于東海之濵明德懿親老成典刑趣行造朝國勢增重訏謨逺慮見于進讀圖任共政束于定制偃息藩魏人望所歸小疾既痊正宜休養大臣不可以暑行其為朕留庶幾猶得奉露門之從容也吏部侍郎梁季珌乞待次州郡不允詔朕惟論思之臣欲全進退之義若其未可以去則亦難以遽從卿為國宣勞既云纍嵗任豫典選實號劇曹胡為抗章必欲求外冕旒密侍正有賴于協恭符節屢更顧奚煩于詳試尚安舊著以副眷懷禮部尚書倪思乞待次州郡不允詔卿以一時人物之望召還未久拳拳獻納朕所樂聞何嫌何疑屢欲求外此固足以見難進易退之節非朕所以待卿者且更迭之制豈為卿輩設哉江淮制置大使丘崈再辭免召赴行在不允不得再有陳請詔卿以超世之資篤濟時之志久安故里曾不忘畎畝之思洊鎮陪都專以徇國家之急言皆砥績事不辭難禦侮折衝既以著偃兵之效聞命引退謂不應俟駕而行一歸疑丞之班足為宗社之重既頒溫詔日俟來音共政而圖舊人注想以待元老而乃抗章至再稱疾愈堅極知難進之風殊非虛佇之意況聞老而益壯氣不少衰式遄其驅以副所望使朝廷得以咨訪而搢紳視為表儀務逺乃猷以弼豫治顧何恙之不已諒無說之可辭知平江府李大異辭免除寶謨閣直學士不允詔朕惟斯民宅生于牧守苟有治理效者倣虞朝考績之法取宣帝增秩之意不惟示勸抑以數易為重也卿以諍臣出守吳㑹政聲上徹朕所深知進職西清庸示褒表成命已頒尚何辭焉賜皇太子生日詔月十七日嘉定元年八敕某商皓中分元良初度賜生設醴用為宴衎之資授粲貽牟仍厚匪頒之寵共期難老益體隆私通奉大夫趙師􅋷辭免復寶謨閣直學士依所乞宫觀不允詔卿起臨近甸嘗著外庸既辭制閫之行仍徇祠庭之請念宣勞于北固欲華爾歸俾寓直于西清但仍其舊卿毋多遜朕不汝忘觀文殿學士何淡再辭免知建康府仍奉祠祿不允不得再有陳請詔以金陵而為陪都保釐素重護天塹而開制閫委寄尤隆卿以時名人為豫舊學蚤膺擢任屢嘗入從以出藩尋遂登庸俾爾二公而洪化時避廟諱所改案洪化之洪宋方權臣之用事宜正論之多違久鎮三山時稱治最言歸數載朕不汝忘屬邊鄙之甫寧擇邦侯而分遣惟大使之所蒞非良弼其誰宜朕方躬宵旰之勤卿當體股肱之寄聞命引道知己屆于中途奉親為榮顧何妨于色養毋格成渙式遄爾驅鎮江府都統制畢再遇乞歸田里不允詔卿以拳勇之資挾忠毅之氣撫士最為得衆遇敵幾于無前外則營壘之不譁內則里閭之甚靖屬邊陲之甫定亦信使之交通諸將于焉少休來奏亦求引退乃眷維揚之重鎮實為淮甸之要衝其為朕以少留豈于卿而獨後總周廬而入衛終當誰歸歌出車以勞還固應有日京西湖南北路宣撫使宇文紹節辭免召赴行在不允詔卿以勸誦之近臣往宣威于遐徼邊陲以靖邦好汔修爰念賢勞亟頒命召何控辭之未已又引疾以為言朕渴想風儀急聞方略俟交符于制閫即趣駕于歸途毋復重陳副豫虛佇何淡辭免兼江淮制置大使不允詔國家間遣輔臣往營邊事粵從近代加以大名不惟欲憂顧之寬正以增使華之寵疇咨于衆喜得其人卿以舊弼之賢畀留都之寄英聲有素輿望已孚疆場甫寧先上宣威之組江淮併護再隆分閫之稱其為朕行徒得君重獨當一面正資經理之良坐使諸軍咸屬指呼之下往祇成命毋致牢辭新除煥章閣學士改知江陵府充京西湖北路制置使李大性辭免乞奉祠不允詔謀帥以鎮上游素為重任分閫以護兩道尤賴長才卿久列從臣屢更藩服比奏三吳之課繼擁七閩之麾方塞北之休兵屬荆南之缺守仁聲夙著僉論攸推進學士之清班益隆眷倚總邊庭之諸將咸蒞指呼引道既前遄驅毋緩爰事循墻之避佇聞洗印之期新除同知樞密院事丘崈辭免不允詔朕厲精更化當饋思賢樞庭既得于耆英宣室實深于注想謂何恙之不已故申命以益勤載覽封章備陳疾狀使翦須而可療亦所當為倘賜几而肯來自應增重宜進萬金之藥勿為三命之辭攻愧集卷四十四
