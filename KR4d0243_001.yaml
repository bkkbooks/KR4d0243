front:
  text: 攻愧集卷一
  hash: sha256:8218e65fe82dd27eeb1a4926a574aa8efa2e4b8264f31994b1b1a4a8c79ac75e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0243_SBCK_001-1a}
body:
  text: 宋樓鑰撰古體詩攻愧齋余以攻愧名齋俞致翁惠書謂若無愧可攻者讀之悚然不敢當以詩謝之聖賢不得見道散固巳久學者多自賢鮮肯事師友顚冥聲利中悔吝皆自取動言無愧怍未知果然否寡過云未能先聖欣善誘凜凜孟氏言幾希異禽獸參乎病知免遂使啓足手寧知起易簀又在此段後吾儕況小人氣質素凡陋以其所以養孝道亦何有勉前類水馬立處秖如舊倘復不自力其末當愈謬每思攻所愧扁榜銘座右三誦故人書慙汗幾欲溜夫豈為戲言知君于我厚因之更加警補過尚無咎謝湖山居士示和陶詩吳給事芾淵明千載人風節仰孤峭豈惟辭督郵蓮社不得召書不求甚解眼髙得玄要詩亦本無意但寫胸中妙齊梁紛衆作嘈雜春禽叫稚子候簷隙文通劇搜紹矯矯玉局翁尚友謝浮漂飽喫惠州飯追和欲同調湖山老居士宏才蓋廊廟出入官五紀懷歸自年少屢賡歸來詞吾行有先兆老龍臥林壑年髙德彌劭向來批敕手甘心事耕釣築室據仙居泉石造深奧亭榭望堂皇蓬萊對圓嶠涉園日成趣遇客酒頻釂巖巖鸞鶴姿炯炯雙眸瞭墮體黜聰明坐忘樂遺照西疇時告春東臯快舒嘯襟期古暗合此事不容詔盡和靖節詩筆走追風驃又如裴旻劍騰空徑投鞘人生嗜欲深山林不供燒何當從公遊翛然寧荷蓧小子敢言詩未免事華彯西施難效顰邯鄲恐貽笑思欲焚舊藁世味輕咀嚼稍尋韋蘇州旁引孟貞曜絶去翰墨畦毋鑿渾沌竅尚或庶幾焉未暇期速肖送袁和叔尉江陰澄江少日曾經行髙城傍有長江橫君山特立江之汀下瞰淮甸一堂平中港引潮深無聲萬頃灌注滋農耕戰國今幾二千齡黃歇此地猶垂名舊以邑屬南蘭陵疲于奔命吏失寧今焉裂地為專城獨當一面行雙旌井市雖小民厚生四十萬緡輸賦征舶商輻湊衆貨贏牒訴簡省官曹淸一邑負郭相依憑守宰同僚齊弟兄脈絡貫通易盡情尉職無卑近編氓坐閲是否真權衡傍郡孔道困將迎我乃靜趣如郊坰安輿並行人子榮況有海錯供庖烹河肫鰣􅚝鮮不鯹車螯蛤蟹均藜羮夫君傳家有典刑父子知己人一經詩書滿門不慙卿豈羡漢士黃金籯薦口久巳徹帝京九萬自此開鵬程平生寒窗照短檠興亡千古無遁形妙年射策當彤庭歸領後生為主盟友朋講習誠專精世故多端須飽更京口直下連滄溟官府闊稀行旅驚邊頭久無夕烽青要在彈壓潢池兵簿書期會勤經營人物酬應審重輕一言行之可終身謹毋失己毋失人贈人以言豈吾能頗嘗于此三折肱舉以送君君試聽登育王山望海亭瘦藤拄破山頭雲山蹊盡處開危亭平田萬頃際大海海無所際空冥冥乾端坤倪悉呈露飛帆去鳥無遺形蓬萊去人似不遠指點水上三山青褰裳濡足恐未免倘有飈馭吾當乘是中始覺宇宙大眼力雖窮了無礙雲夢八九不足吞回視塵寰一何隘曾聞芥子納須彌漫説草菴舍法界看我振衣千仞岡笑把毫端捲煙海林景思雪巢四時不皆雪陸居本非巢高人興寄遠表此一把茅吾非二祖可夜立寒齊腰吾非鳥窠師結廬置樹梢白日照我心不以見睍消兩腳踏實地風雨無漂搖作詩窮益工寒瘦逼島郊落筆句驚人不復尋推敲客至不問誰淡若君子交直氣干霄上下視鄙斗筲富貴頃刻花疇能等幻泡附離如幕燕自謂漆與膠先生閲世熟兀坐山城坳春陽會有時豈曰終繫匏錫山寄雄文凜然豎髮毛我非敢言詩為君聊解嘲題龍眠畫騎射抱毬戲緑楊幾枝插平沙柔梢裊裊隨風斜紅綃去地不及尺錦袍壯士斫鬃射橫磨箭鋒滿分靶一箭正截紅綃下前騎長纓抱繡毬後騎射中如星流繡毬飛䃂最難射十中三四稱為優元豐策士集英殿金門應奉人方倦日長因過衛士班飛騎如雲人馬健駕幸寶津知有日窮景馳驅欣縱觀龍眠胸中空萬馬駭目洞心千百變追圖大槩寫當時至今想象如親見靜中似有叱吒聲墨淡猶疑錦繡昡間窗撫卷三太息五紀胡塵暗畿甸安得士馬有如此長驅為決單于戰題羅春伯所藏修禊圖序東遊登會稽秖見蘭亭不見碑北過中山府欲訪此碑不知處間從故家看墨本如此二者絶難遇曾經耶律氈裹去至今薊北猶知慕時將一二餽北使持歸往往快先覩未知玉石真在否要比江南終近古他日縛取呼韓作編戶勒銘歸來過定武只問君王乞此碑打向人間莫論數題孟東野聽琴圖因次其韻誰歟住前溪夜深以琴鳴天高皓氣肅月斜映疏星橡林助蕭瑟泉聲激琮琤彈者人定佳能使東野聽束帶不立朝遙夜甘空庭龍眠發妙思神交窮杳冥不見彈琴人畫出琴外聲郊寒凜如對作詩太瘦生恨不從之遊撫卷空含情壽安撫伯父東樓德澤流無窮我公挺生慶所鍾瓊枝玉樹瑩精彩迥然不墮風塵中少年慷慨吐虹氣文彩元不減儕輩胸中妙蘊經綸才剸劇裁繁特餘事曽從蓮幕試牛刀舉城但識劉功曹瀾翻薦口動天聽一語便逾華袞褒上方欲革嶺南弊柬才果得吳刺史不妨一勺飲貪泉淸德泠泠今可紀憑軾雍容安七閩列郡合詞稱得人從兹十載秉麾節坐令萬里回陽春洞庭風月瀟湘雨君王無復憂南顧抗章乞得半生間遙指山家賦歸去廟堂未肯間宏材大開東閣需公來朝隨召節赴天闕夜馳使馹歸長淮廣陵臥治要汲直金節熒煌照熊軾底用腰纒十萬錢且看身享二千石忽思鱸膾寒菰羮拂衣欲遂鄉關情視去西陽如脫屣意色蕭然同鬭生畫船重泛西湖上水光山色都無恙主人管領東風回故園桃李倍淸爽六鼇背負三山歸輪囷老檜蒼龍姿了無塵俗敗人意棐几長物皆瑰奇橫岸綸巾披鶴氅神情直出羲皇上塵事到頭曾不聞臥聽歌臺傳緩響百花堂前手自栽興來一杯復一杯人生亦欲自適爾富貴于我何為哉仲春況屬懸弧旦使君亭榭風光暖東君豫借一分春不許芳菲作春殿綺羅香深初肆筵弟兄酬酢杯相傳此時更復借一醉君從何處拌垂蓮五侯貴盛德未美簪纓不滿高陽里何如淸白傳家風奕世靑氈盡朱紫燕居今喜相比鄰其如四海須陶鈞羽書鼎來在朝夕何數羔雁徒成羣芙蓉城中有仙宅十洲三島環其側此中樂不減商山功成歸作茹芝客送伯舅汪運幹大雅人生自古悲别離別離今日何足悲試問今日行者誰鄞江名族真男兒虬鬚燕頷軀十圍凜凜端有熊豹姿毅然剛立不怒威笑視鼠輩何脂韋州縣小試囊中錐政績今在衆口碑姓名通籍黃金閨便泛王儉紅蓮池平時幕府多素尸坐縻公粟遨以嬉只今方當多事時正要名士同驅馳森森百萬虎與貔荷戈分駐淮東西兩淮千里雙使麾幕中僚吏皆耀犀惟公婉畫明蓍龜辨如懸河不可隄胸中武庫深難窺決策固有堂上奇朔風吹空黃草齊正恐秋髙胡馬肥萬人相顧目睽睽見公此去多腹非公獨襆被行不疑單車西去征馬嘶平生氣槩衝虹霓恨無尺箠笞羌夷方今天相中興期黠虜戴頭來邊陲顧公速蹈功名機胸奴不滅何家為出門千里何足辭但願滿引金屈巵月夜泛舟姚江秋暑不可耐幾思泛中川晚來興有適溪船偶及門涼月才上弦平潮可黃昏倚楫縱所如臥看龍泉山長虹跨空闊過之凜生寒坐穩興亦佳夜氣方漫漫草蟲鳴東西飛鳥相與還仰頭數明星垂手搖碧瀾主客惜此景不及攜清樽無酒要不惡徜徉足幽歡幽歡有何好扣舷淡無言送王正言守永嘉江頭潮生江月小暝煙緑暗垂楊道有客扁舟送使君道傍不怕揶揄笑向來一别三換歲正喜親情得傾倒吏民引領望推麾空有離愁滿懷抱使君讀殘萬卷書古事今事俱了了便應珥筆侍天陛不然代言登鳳沼瀛堧山水久寂寥為屈朱轓來坐嘯帢幘峰高舊題咏赤城所在經行飽永嘉名郡太守尊靈運後來詩絶少天作雁蕩地為藏蠟屐穿山未曽到攺轅卻向箇中去更得江山助詩好齋鈴靜處定得句不待池塘夢春草去年海水上平地大風駕浪從天杪蒼生濈濈生魚頭聚落隨波迹如掃今年二麥連野秀田家扶犁事粳稻使君憂國眉不開叱馭徑行仍及早哀哉千里方更生縣官租錢酒戶曉縱民自恐上不足誅取何憐下無告邦儲邦本孰輕重肯使疲民困征擾君不見巖巖千古陽道州政拙催科自書考遊龍瑞宮隔山望危石老面凜如鐵路回兩屏開見此高嵽嵲偉哉名公卿峩冠會朝列又如鼓迅霆玄雲助擊烈癡雲不作雨空翠襲冰雪野水不知源繞徑幾萬折子長真愛奇萬里探禹穴我家甬水東扁舟輕入越竊此半日間到處輒清絶傳聞古洞天瓊臺照金闕神仙杳難問一笑山石裂相逢客路中翻手數年别勝地更躋扳莫厭屐齒折三日不得過都泗堰南朝何公棲禹穴嘉遁悠然老高潔一朝送人都泗埭歸歎此途于此絶我亦何為走塵埃數年不記幾往來船橫三日不得度愧想高風安在哉宿佛日山平生臨平山知誦藕花句輕帆幾來往山色淡如故寧知千萬峰中間著佳趣蕭蕭蒼髯翁為指花城路我來春正濃天寒日將暮雲深鐘唄鳴自喜得勝具緬懷玉局仙老筆掃朝霧玉槊儼相持珠旒竟何所惟餘渥窪水蒼龍角牙露人間翻覆手烈日變煙雨俗子眩炎涼三四錯賦芋道人笑視之萬化隨所寓深坐十笏地一息了千慮箇中誰得知幽鳥背人去求仲抑招遊山歸途遇雨竹輿繞湖濱宿露尚厭浥徑到玉岑下坐久客始集起穿靈石山萬松介而立梅天氣淸潤空翠行可挹古藤幾百年枝蔓兩山及見説暮春時花紫光熠熠直疑老潛虬初起夜來蟄俯玩歲寒泉齒冷不敢吸相將上龍泓塵鞅謝羈􅎗洞有靈獸居臨深心岌岌魚遊明鏡中巨浪無三級寒苔載水去萬頃潤原隰𪷟𪷟山雨來歸僕鳥飛急野興殊未巳日昃不暇給衝泥上湖船雨陳遽奔襲飄風將急點回旋驚四入中流益蕩兀短篷不當笠停篙亦久之怒勢不少戢我徒方嘯歌弗謂攺豪習但恥瓶罍罄莫問衣裳濕吳江舟中阿連久矣共一被小别愁生夜無寐風帆將我上征途回首江山日千里小舟橫臥吳江水夢回依約蕭齋裏五更漏急月黃昏鳥散一聲人未起讀范吏部三高祠堂記三高之風天與高三高之靈或可招小山以後無此作具區笠澤空寥寥幾從垂虹蕩雙槳寓目滄浪獨怊悵筆端不倒三峽流欲遽招之恐長往前身陶朱今董狐襟抱磊落吞江湖瑰詞三章妙天下大書深刻江之隅我來誦詩凛生氣若有人兮在江水扁舟獨釣膾鱸魚茶竈筆牀歸南里先生同是丘壑人只今方迫功與名謝公捉鼻恐未免便看林藪生風雲他年事業滿彞鼎乞身歸來坐佳境不嫌俗士三斗塵容我漁蓑理煙艇仙都獨峰漢家武徹求神仙方士扼掌多夸言蓬萊隔海不可到屬車徜徉上橋山傳聞黃帝久仙去胡為有石髙巑岏遊談不經理欲屈謾言此地藏衣冠縉雲自是仙窟宅萬壑千巖比如櫛突然一石摩靑雲造化應勞巨靈擘仙風吹墮碧蓮花玉井半空人不識望之不計幾千尺八柱擎天此其一伯夷制行高且孤萬世猶能立懦夫英魂凜凜今不死化作此石山之隅橫斜轍迹依然在我亦何能窮古初靈壁道傍怪石飽聞兹山産奇石東南寶之如尺璧誰知狼籍亂如麻往往嵌空類鑱刻長安東南萬歲山搜抉珍怪窮人間汴流一舸載數輩徑上艮嶽增孱顔當時巧匠斫山骨置之江干高突兀干戈動地胡塵飛坐使奇材成棄物君不見黃金橫帶號神運不數臺城拜三品只今零落荒草中萬古凄涼有遺恨木人漂漂不如土坐閲興亡知幾許行人沈歎馬不前石雖不言恐能語括蒼溪漲雨餘大溪觸山流氣勢直欲凌沙洲浮梁中分斷螮蝀流沫東去行蛟虬人家嘈嘈避新漲雲稼苒苒添平疇漁翁輕生有如此小艇橫絶隨飛鷗石門洞扁舟百里連城回青山中斷立兩崖淸都虎豹隱不見但見閶闔排雲開峰回失喜大飛瀑聲震萬壑驚春雷掀髯目極九霄外玉虹千丈飛空來一冬青女靳天雪不知聚此山之隈傳聞神龍臥其上寶藏擊碎真瓊瑰胸中先自無塵埃到此更覺心崔嵬天風為我噀空翠春水瀉入騷人懷謫仙曾來寫勝句劉郎又為開天台我慚筆無挽牛力醉墨滿壁誰為裁或言龍湫更奇絶鴈山高處深雲埋我方攜笻往尋訪未知比此何如哉大龍湫北上太行東禹穴鴈蕩山中最奇絶龍湫一派天下無萬衆贊揚同一舌行行路入兩山間踏碎苔痕屐將折山窮路斷腳力盡始見銀河落雙闕矩羅宴坐看不厭騷人弄詞困搜抉謝公千載有遺恨李杜復生吟不徹我遊石門稱勝地未信此湫真卓越一來氣象大不侔石屏倚天驚鬼設飛泉直自天際來來處益高聲益烈溟池倒瀉三峽流到此誰能定優劣鴈山佳趣須要領一日盡遊神惡褻驪龍高臥喚不應自愧筆端無電掣輪囷蕭索湍不怒非霧非煙亦非雪我聞凍雨初霽時噴擊生風散空闊更期雨後再來看淨洗一生煩惱熱連雲亭望海中諸山鴈山本在雲海中波濤千古相撞春泥沙洗盡見山骨巖壑所在皆玲瓏是誰一口吸水盡平地卓立成奇峰至今往往有遺迹相傳渺漭何能窮我乘單車來自東佳處十數一覽空晚登四十九盤頂曠望巨海煙𪷟𪷟羣山錯立不知幾朝日照耀天霞紅是間瑰奇定多有鯨波掩蔽深莫通我無太真燃犀法安得一闖馮夷宫會聞滄海變成陸卻與鴈山爭長雄寄題張法曹瞻雲軒張侯名軒意可知如登太行看雲移我雖未得登軒墀不鄙要我巴人詞爾時膝下遨以嬉欲斫數語語不隨娛侍東嘉樂無涯官舍逼仄親不怡安輿相將甬水湄日日東望勞支頤秋風得檄欣星馳歸拜親下聊信眉官事有程不得違欲去故國行遲遲重來橘柚黃金垂霜著新蟹雙螯肥海魚甘鮮一尺圍欲奉色養春為期瞻雲之思今同之慨然落筆成新詩人間至樂在庭闈何用自縛微官為君方欲解左顧龜我亦日思投檄歸相望百里俱萊衣從他天外間雲飛次韻翁處度同遊北山兩夫持鎌行我先巧尋徑路其智專我扶枯藤衣短後意氣巳出層峰巔何郎鮑叔飽經歷勝處一一手自編我攜舊紀訪陳迹止恐急景不得延徜徉共登青雲梯今日邀我為擊鮮始觀神龜闖靑泚上有石壁來飛泉隱迹遺基平可坐下顧亂石如磨鋋懸崖雙瀑灑空雪來自一握孤雲天郤從下流泝深險崎嶇直到青潭邊朝陽射光破幽閟斷虹上下遮潺湲傳聞高山更高處雅有行路從西偏同行無乃深好事杯酒自犒腳力全誅鋤荆棘窮鳥道欲進不得意愈堅旋呼童僕纍危石笑採野菊聊盤旋捫蘿騰身上苔磴往往歡呼爭著鞭側行危步汗浹背石角或使衣裳褰少焉身在雙瀑上又見高派衝泓淵自笑泉石成膏盲愛賞不減蟻慕羶巉巖數峰巧遮護妙處二老初無傳脫迹塵埃到此地便覺神思飄飄然回首江南塵一聚城郭歷歷眼欲穿相期更看水流處步履未倦夸輕翩一上千尺窮山椒碧澗靡迤流蒼煙尋源不能且忘返石猊巍距驚神鐫退求歸徑惘難問藤蘿所在相縈纏我方踟蹰風煙表披披衣袂身欲仙晚歸招提各痛飲讀盡屋壁長短篇截筒環山覽清駛竅出珠穗心亦憐棊枰相與論瓜葛橫琴不妨揮五絃人生易老費扶掖勝具大率須少年伊余歷聘佳山水愛奇切慕太史遷明年炎暑襲故步與君共枕淸流眠遊白石巖我遊仙都觀獨峰轍迹雖在車不通鼎湖望極幾怊悵悵無羽翮凌天風兹來樂成望白石玉甑突兀摩蒼穹人言真人老聃裔鑿開洞府遺仙蹤無人共登靑雲梯躋攀伴我惟枯笻縈回約略三十里踏遍萬疊高巃嵸斷崖泠泠落殘雨雙石凜凜亭孤松卻從山椒下谷口石欄屈曲遮碧棕頗疑山高氣凝凜古來積雪今未融是誰玉斧妙鐫斫仙洞雙闢驚神工巖深白日尚幽閟别有石竅開天聰傳聞峰頭貯淸泚苔罅涓滴聲冬瓏奮身便與上虛閣海山錯立煙𪷟𪷟腳底千山行伏龍手揮五絃俯冥鴻霜林搖落當玄冬長嘯一覽萬象空解衣寄宿旦過寮魂夢亦墮冰壺中曉看日出滄海東蠟炬百萬燒天紅眼高不數鴈蕩雄行田下笑康樂公未能辟穀追仙翁頗亦有意棲琳宮三山不覺去人遠安期羡門宜相從驂鸞駕鶴太多事但欲御氣遊無窮約諸公再遊龍湫昨暮與君上龍湫天久不雨無湍流笑呼拊掌喚不應悵望頗亦令人愁夜來雷鼓驚龍起溪聲巳覺亂人耳莫辭重訪尊者居坐看倒翻三峽水送劉仲起主簿劉郎鸞棲海瀕邑不減向來人性習凜然軀幹即之溫語恐傷人中有立論交雖厚笑甘醴御吏以嚴無朿濕公餘黃卷頻卷舒藝圃工夫日加葺永嘉數多君子僚休沐新盟有淸集伯倫忽去誰鯨吸欲挽不留情悒悒君年方盛才有餘逸驥寧容在羈􅎗期君欲蹈功名機塞草連雲朔風急王侍御壽詩使君威名聞四方南牀凜凜凝秋霜使君和氣到甌越幕府初開夜飛雪頗聞此雪近歲無定知來隨御史車黃堂洗印未多日慶朝況此當懸弧明年豐登日可數父老兒童爭起舞遲明賀版擁譙門試拾歡謠作詩語使君風度神仙人相門出相寧非真妙齡兩科談笑得脫趨嚴召依風雲臺端敢言姦聽聳至今讜論時傳誦踏遍巫山十二峰卻尋春草池塘夢人傳使君威稜稜我知威愛元兼行蒼髯如戟面如鐵惠養自有循良稱高牙入境紛進謁賓屬庭趨躬磬折民生共喜愛日溫吏行獨畏春冰裂向來夔州妙籌邊夷蠻落膽皇靈宣還朝奏課居第一夜半帝席為之前東嘉今為股肱郡小試望之三輔近會循故事入三公致君要使登堯舜東風未動春先回梅花照眼歌筵開吏民合詞誦難老一笑千里傳銀杯佳兒恂恂授衣鉢玉樹芝蘭俱秀發江南世胄比長淮更看雲來萃簪笏平生知已今上天敢復坐歎寒無氈巴言未足贊公壽載誦峻極嵩高篇鮑淸卿病目不赴竹院之集詩寄坐客次韻鮑侯年少老文學藝苑優遊富耕穫胸中涵養自成趣妙處正恐兒輩覺我慚門巷非尺五字欲問奇誰與榷開樽竹院望同醉遮眼腦脂何太虐團圝十客踏雨來相從不負東風約投壺雅歌了無恨秖恨車公一前卻海棠春深照眼明風物融融悟非昨從教雨洗胭脂淡小摘何妨供把握夜闌燒燭照花睡靚妝如在結綺閣牆頭西望爛蜀錦嫣然一笑無聲樂飛紅點地繡作茵正須席地天為幕要知富貴出天姿艷杏夭桃何足録主人小築真好事肯學區區專一壑洞門不鎖要客來笑君太似羊公鶴雨餘珠淚色慘悽一顧正嫌無伯樂忽驚新詩來叩門妙語天然不煩琢坐中傳觀字欲漫我豎降幡甘面縛清明已過雨不休雲霧猶屯四山腳揩摩病目不應遲及此紅英半零落枝頭尚有未開花縱巳離披亦何惡知君既負西岑遊可使一春終落寞會須來此共賦之正要重聞誦新作贈光孝益老光孝長老師益蘇魏公諸孫兄延壽為台州判官别四十餘年一見歡甚林吏部有詩次韻原鴒鴻鴈行此理懸諸天萬事可變滅天性難推遷顯庵幼出家潔飲同玄蟬一鉢寄西東悠悠經幾年外慕等浮雲百念灰無煙難兄忽相逢觸動歡喜緣光陰信可惜征袂何翩翩叱胥掩簿領來問妙峰禪剌剌道家世客淚如迸泉玉堂與黃閣衣鉢親相傳遊宦非為貧不敢替所先老師雖晏坐至情豈唐捐此會非偶爾絶倒秋風前手持詩卷來謂豫得無言曉以天性語人生要有原嗟哉偽日薄萁豆本同根一旦成讎敵釡中急相煎寧知有佳人芳草夢阿連相見無幾時瞥如魚躍淵固知出世法惜别詎不然又當作大觀勿為愛網牽千山元不隔毋庸對牀眠送王道州九疑之南為舂陵瀟水淸駛山為城郡齋正據山直上一覽萬家無遺形家君頃年入蓮幕我不得往空馳情先生分符此中去心旌搖揚隨雙旌先生平生飽文學身上著作承明庭奧篇隱帙亦如響一時自許文章鳴高辭坐奪造化巧凜凜韶濩聲鏘鏗把麾江海非無意親扶版輿賦南征頗聞楚俗未蘇息糟粳不厭嗟疲氓正資儒術飭吏事拔去強薤摩孩嬰政成環召事未晚天子日夜開延英風流千古三刺史往繼聱叟陽先生毋庸自書追科考但願寄我舂陵行哭王知幾墓知幾少也爽萬事笑談了自謂頗寡合見我輒傾倒百年能幾見一别迹如掃父子俱埋璧嗚呼何其早向來論文酒和淚傾宿草此意誰復知寤歎令人老仲舅尚書生朝去年生朝燕稽山館舍朗朗屋百間紅裙合樂飮徹旦坐上衆客皆酡顔今年生朝半歸路竹輿瀟瀟曉衝雨回頭風景非去年當時賓客今何處仕巳喜愠曽何分適齊未減楚子文鼻間栩栩固自若世情物態徒紛紛平生知足志間退歸老鄉關了無悔但欲年年醉西風坐閲人間百千歲人間萬事日不同尚書人望方顒顒明年舉酒拜公壽安知不在槐庭中送鄭惠叔司封江西提舉君名切斗魁步武上霄極蓬萊羣玉府圖書照奎壁郎官應列宿寢覺象緯逼胡為作使星炯炯向江國仰奉鶴髮親版輿映萊服昔日紅蓮池帥垣資婉畫方將散餘潤連城被膏澤官榷與民繇豐儉煩振糴小試活國手疲氓賴休息便歸侍玉皇拱立香案側富貴殊未巳行行上鸞掖君其妙演綸三能看齊色次韻胡元用茉莉花殘暑未盡秋欲來玉刻萬葉瓊英開孤標雅韻一枝足江上紫翠空成堆素娥常與明月約青女細把輕綃裁主人好事趂時買買置此地真宜哉牆間間地方丈所幾年纍甓裝層臺春花秋卉紛互發胡葵芍藥參徘徊眼明忽見此奇絶弟畜素馨兄事梅夜深飛香性幽獨未許蜂蝶來相陪糖罌封餘有閩土會須掃取添花栽吾聞閩山千萬本人或視此齊蒿萊何如航海上天闕玉色照映琉璃杯新涼徙倚看不足坐見日影攲庭槐同官登敕局小樓觀雪去年歲豐登雨暘應時須所欠惟一雪祈禳遍精廬晚亦粗飄瞥六花舞空虛雲氣不待簇風伯隨驅除殘春寒尚深忽見雲糢糊撒鹽壓衡茅晨興粟生膚隨班上廊廟恍若登蓬壺岧嶢宮殿深朱扉黃金鋪百神衛靈居半天散瓊琚又疑守護嚴寶網絡明珠參差鴛鷺行簪笏皆沾濡退歸冷局中窗間竹扶疏為思此絶景往往終年無不應憚凌寒閉門守紅爐為君登危樓深杯泛酴酥崔巍瞻吳山莽蒼望西湖瓊枝宿飢鷹玉階走韓盧酒興萬里遠容我歌且呼坐欲斫五言所愧李與蘇君與工屬聯灞橋去騎驢久不作詩喜仲兄遷鄰居因成長句宦遊各天涯皇州今鴈行官居半里所相過復相望西鄰得老屋往來連戶窗水竹占幽勝風雨對一牀十年短檠燈今夜分餘光兒曹亦可樂洛誦聲洋洋天邊有白雲隨風正飛揚相期奉甘旨萊衣戲親傍軒冕皆倘來此意可暫忘詩成喜可知且復釂此觴送林宗丞浙東議幕劭先生風骨天與淸孤松野鶴何瘦生胸中落落笥五經大篇短章筆縱橫壯年文場諸老驚俯仰世故雙鬢星萬事不理詩自鳴笑視軒冕秋毫輕市者爭利朝爭名著腳往往遭譏評先生四五官神京又復歸去鴻冥冥臺家急賢埋不應況復寮舊離觴傾先生自喜得此行祿粟可巳啼號聲秦望之山高且平臥龍橫亘環州城鏡湖千頃波不興晉宋遺迹多豪英議幕了無塵務縈撫物弔古皆關情我亦久矣懷滄溟旦夕欲乘緹油屏相望縱復三四程詩筒尚得尋前盟臨海縣治琴堂子賤彈琴真是琴我今無絃知琴心使我不得琴中趣弦以修綆誰知音才術高低不自由單父二子心則侔後人不得彈琴暇勿以戴星為可羞送石應之司戶歸剡以室邇人遠為韻捷徑指終南索價譏少室窮達豈無命踏地胡不實之人吏海隅所吐百未一夷途淡無營君其有終吉年來歎離羣磨琢殆無幾資凡學益落駑駘費尺箠羡君富春秋發軔方自邇驊騮更著鞭洗眼日千里南明千古秀慶源久益新剡溪照人清況復屈斯人摻袪不容留椒觴思拜新他年風雪中扁舟倘知津平生企賢心山川恨悠緬寧知日相見懷抱竟不展樽酒了無暇離情果深淺室邇猶許疏況今乃真遠送王仲矜倅興元蜀道難難于上青天蜀道易易于履平地蜀山天險固自若視難為易在人爾王尊真有四方志叱馭徑行了無纍早登岷峨仕陰城談笑動行千萬里漢中由來説雞肋意謂棄之為可惜君今此去良似之更欲遠遊尋故迹漢都南鄭啓炎圖秦置石牛山徑闢淮陰拜將餘高臺武侯葬處空松柏大笑出門何慨慷天涯離愁各盡觴荷君走馬卻送我李侯參語夜未央君方往蹈功名機何止别駕歌王祥先正九年遺愛在更攜故笏訪甘棠政入蜀時所用仲矜象簡乃參巾山兩鼇贔屭隨西行勢欲吸盡西江淸是誰繚以千丈城欲去不去豈不靈化為青山鎮東溟首冠窣堵雙崢嶸安輿從東喜逢迎笑指鼇背同來登春殘雨足緑陰成山鳥相和聲咿嚶自從半山經小亭仰望巨石扶軒楹千山萬山擁翠屏陰霾歸靜纖雲興翠微下有長江橫滾滾不盡千古情橫軒俯瞰萬瓦平佳處歷歷堪指名雪蓬蹙雲連曲肱蜂房蟻垤棲殘僧扶欄更上三兩層一覽物衆無遺形徙倚未厭茗碗傾長嘯兩腋淸風生親顔甚怡輪為停我亦色笑喜不勝願我雙親俱遐齡方瞳鍊顔華髮星如此兩峰相對靑沿檄柯山歸别張特秀我昔志學年侍親宦西安弟兄遊庠校見君平生歡君才獨頴出逸駕不可攀夜窗共檠燈春遊合杯盤虛堂臥雪嶺傑閣橫雲槃爛柯上危磴烏巨沿溪灣是時氣相高辨論俱瀾翻一别三十年天街見峩冠殿廬看決科藍袍立淸班黃牒墨猶濕大弨力能彎爾來又五載短書能幾番兹焉捧檄來吏牘方拿煩室邇嘆人遠一朝脫籠樊滿意縱劇談痛飮到夜闌十步九太息此事亦孔艱進哭老先生畫圖慘靑綸特顯顧何為一昔成大還回思我伯氏人琴有餘嘆感今念疇昔相與涕淚潸故人悵無幾恍如春夢殘有酒不得飮有琴不成彈復歸坐冷屋使我凋朱顔我歸不可遲倚門夢連環君言欲舂糧伴我行路難欲去不得去僧坊話間關年各幾半百後會鬢亦斑何處更有待此心匪石頑羣憂發孤笑屬聯不當慳氣岸有如君著身簿尉間鹽車復長鳴會當上天間摻袪不忍別雨聲為潺潺君有門戶責殷勤願加餐次韻沈使君懷浮岡梅花玉人迥立山谷裏不有使君誰與憐毋庸高牙煞風景為著佳句增孤妍寒溪照影漫千樹橫笛吹殘又一年傳聞年後更多發便須躍馬趨平川送王木叔推官分韻得錦字王郎天下士中和自生稟淡然初無營見者輒斂袵幕中資婉畫處事極精審與人如恐傷律已淵冰懍深恐馬駃輿要使梟食椹一寸憂國心幾年不甘寢此意大未酬退靜若巳甚使之行所學庶幾人奠枕向來孰間之未免斯立噤川泳而雲飛賴有東陽沈露章極推轂分韻句裁錦風流有如許不復嘆踔踸如君豈蓬蒿人物妙流品才應奉香火為養謀祿廩與君幸瓜葛心交今十稔豈惟我惜别行道情苒荏紅蓮色何似翠柏風愈凜願君疏藥裹一意護茵飪棄鼎寶康瓠浮名如拾瀋行矣無多言臨岐且劇飮彭子復臨海縣齋乾道癸巳冬此邦我經行鬱攸氣未殄千家真赤城來訪臨海令瓦礫紛縱橫翹然二尺高問是戒石銘徘徊重太息更聞愁嘆聲試詢來者誰共言令姓彭我時語傍人此邑其將興逮豫來贅倅客館方暫停夜聞簫鼓沸廳事先落成起望輪奐美壯觀聳連甍百堵日巳作斧斤喜丁丁層樓庋敕書兩廡環中庭久乃遊其間宏大使我驚位置既深穩斫削仍工精田里不知役纖粟無輸征安得屋朗朗突兀有寧馨退食不苟處扁榜皆佳名中虛物自照政平由心平樨柏巳可悅況有賢弟兄小亭真吏隱縣擁高山靑琴堂雖增舊此意宜細評智調天下理夸言笑後生大弦可以急小弦恐弗勝舉意屬俄頃立欲如所營手足民無措吏姦益相乘不如疏節目示以信與誠施行有次第幽遠無隱情上下始相應溫和亮以淸子賤意不傳僅許勝戴星彭令蓋得此所以千里稱此非以政學淵源甚分明行笑解印去衆心巳先傾太守薦之朝一鶚飛青冥傍無蚍蟻援日夜思歸耕我無薦賢柄直書氣填膺安得採詩官取以徹明廷送虞仲房赴潼川漕我來丹丘乘二車送客往往萬里餘盛山使君别寖久漢中郡丞今寄書公指四明喜鄰境典午何知成畫餅揚旌忽作梓潼行去路六千抑何迥餘杭名家多俊奇君于輩行尤白眉雍容音韻足夷曠百家到手無停披向來郎曹天咫尺引身閩山接商舶賈胡嘆仰淸節高霧中親見越王石此行叱馭不作難手遮西日又長安長安日近公應往未放使星臨蜀山不然一行亦不惡潼川應如錦城樂鄧侯功名凜如在拾遺風采今猶昨流馬木牛諸葛公飛挽正欲修前功蜀民險遠日凋瘵摩撫要令畿甸同況公五絶追鼻祖隸古真有兩漢風歸來富貴固未晚為傳此學川西東奉口遇雨七月欲盡八月初天久不雨暑未徂下田焦卷上田稿愁嘆不止田間夫嘔啞水車日夜響漕河揚塵成坦途喜見此溪深且廣玄雲忽起西北隅林間槭槭水漚起兩岸人物歡欲呼未聞滂沛潤龜坼且使萬物聊沾濡船窗飄灑疏篷漏客意自適涼襟裾引身東望雲氣薄未知帝城有此無傳聞今日方奏告便有響應來斯須人家百萬苦炎熇君王齋禱幾月餘君王齋禱幾月餘雲師雨師其疾驅遊天台石橋兩龍爭欲起深壑觸破山骨成修梁滔滔共出一門去凜凜直落千丈強初疑鞭石跨滄海絶勝乘鵲橫銀潢要須高躡前峰過往叩山中真寶坊攻愧集卷一
